  \ 1、2 和 3）以及值列表（“Joe”、“Cindy”和“Frank”）。不必担心键和值的顺序。重点是检查每个键的顺序是否与正确的值匹配，例如 1 对应“Joe”，2\
  \ 对应“Cindy”，3 对应“Frank”。\n3.  在**Delete**按钮右侧的 Key 字段中输入 3，然后点击**Delete**按钮。\n4.\
  \  点击**Query**按钮。注意，现在字典中只包含两个项：键 1 和 2，以及值“Joe”和“Cindy”，如图 9-9 所示。\n\n![A437923_1_En_9_Fig9_HTML.jpg](img/A437923_1_En_9_Fig9_HTML.jpg)\n\
  \nFigure 9-9.\n\n\n\n5.  单击`Add`按钮右侧的`Key`文本字段，然后输入`5`。\n6.  单击`Add`按钮右侧的`Value`文本字段，然后输入`Felicia`。\n\
  7.  单击`Add`按钮。\n8.  单击`Query`按钮。请注意，计数现在恢复为`3`，键为`1`、`2`和`5`，对应的值为`\"Joe\"`、`\"\
  Cindy\"`和`\"Felicia\"`。\n9.  选择`DictionaryProgram` ➤ `Quit DictionaryProgram`。\n\
  \n### 总结\n\n数组和字典是将相关数据列表存储到单个变量中的两种方式。数组便于存储数据，但检索数据可能较为繁琐，因为必须知道待检索数据的确切索引值。\n\
  \n字典强制你通过键来存储数据，但该键使得后续无需知道数据在字典中的确切存储位置即可轻松检索。\n\n在你创建的示例 macOS 程序中，你还学习了`for-in`循环如何自动遍历字典。现在，你应该对创建用户界面以及判断哪些项需要`IBOutlet`、哪些项需要`IBAction`方法更加得心应手。\n\
  \n程序设计可分为三个清晰的步骤。首先，创建并自定义用户界面。其次，将用户界面连接到你的 Swift 文件。最后，编写 Swift 代码使你的`IBAction`方法生效。\n\
  \n将数组和字典视为超级变量，它们可以在单个变量名下存储多个数据。如果仅需保存单个值，请使用变量。如果需要存储相关数据的列表，则使用数组或字典。\n\n"
- "# 10. 元组和集合\n\n变量适合存储单个数据块，而数组和字典适合存储相关数据的列表。为了更高的灵活性，Swift 还提供了称为元组和集合的附加数据结构。\n\
  \n元组允许你将可能包含不同数据类型（如字符串和整数，可表示人的姓名和员工 ID 编号）的相关数据存储在一个地方。集合与数组或字典类似，允许你存储两个或多个相关数据块，例如字符串或整数。\n\
  \n元组和结构体最大的优势或许在于将它们与其他数据结构结合使用时。你可以创建元组数组或结构体数组，而不是创建整数数组。这使你能够灵活地将不同的数据类型存储在一起，并存储多个相似数据的副本。\n\
  \n## 使用元组\n\n假设你想存储某人的姓名和年龄。你可以创建两个独立的变量，如下所示：\n\n```\nvar name : String\nvar age\
  \ : Int\nname = \"Janice Parker\"\nage = 47\n```\n\n创建两个或多个独立的变量来存储相关数据可能会很麻烦，因为这两个变量之间没有任何关联来表明关系。为了解决这个问题，Swift\
  \ 提供了一种独特的数据结构，称为元组。\n\n元组可以存储两个或多个数据块到单个变量中，这些分离的数据块甚至可以是完全不同的数据类型，例如字符串和整数。声明元组就像声明变量一样。主要区别在于，不是定义单一数据类型，而是可以在圆括号内定义多种数据类型，如下所示：\n\
  \n```\nvar tupleName : (DataType1, DataType2)\n```\n\n就像声明变量一样，你必须为元组声明一个唯一的名称。然后，你需要定义要存储的不同数据块的数量及其数据类型。元组可以容纳两个或多个数据块，但元组持有的数据越多，理解和检索数据就越笨拙。\n\
  \n创建元组的一种方法是声明元组名称及其可以容纳的数据类型。列出的数据类型数量也定义了元组可以存储的数据块数量。因此，如果你想在元组中存储一个字符串和一个整数，可以使用以下\
  \ Swift 代码：\n\n```\nvar person : (String, Int)\n```\n\n然后，你可以像这样在该元组中存储数据：\n\n```\n\
  person = (\"Janice Parker\", 47)\n```\n\n在向元组赋值时，请确保数据块的数据类型和数量都正确。因此，以下操作会失败，因为`person`元组期望先有字符串，然后是整数，而不是先有整数再有字符串：\n\
  \n```\nperson = (47, \"Janice Parker\")\n```\n\n定义元组的第二种方法是直接为其提供数据并让 Swift 推断数据类型，例如：\n\
  \n```\nvar person = (\"Janice Parker\", 47)\n```\n\n如果你通过列出数据类型来定义元组，或者让 Swift 通过你存储的数据类型来推断数据类型，那么每个数据块代表什么并不总是很清楚。为了更容易地识别不同的数据块，Swift\
  \ 还允许你为数据类型命名，例如：\n\n```\nvar person : (name: String, age: Int)\n```\n\n如果你希望 Swift\
  \ 通过直接向元组分配数据来推断数据类型，可以这样做：\n\n```\nvar person = (name: \"Janice Parker\", age:\
  \ 47)\n```\n\n命名元组有助于阐明每个数据块代表什么。在此示例中，字符串代表姓名，整数代表年龄。\n\n\n\n### 访问元组中的数据\n\n创建元组并在其中存储数据后，最终需要检索这些数据。由于元组包含两个或多个数据块，Swift\
  \ 提供了三种方式来检索所需数据。\n\n首先，你可以创建多个变量来访问元组数据，如下所示：\n\n```\nvar petInfo = (\"Rover\"\
  , 38, true)\nvar (dog, number, yesValue) = petInfo\nprint (dog)\nprint (number)\n\
  print (yesValue)\n```\n\n在第一行代码中，`petInfo` 是一个包含三个数据块的元组：一个字符串（`\"Rover\"`）、一个整数（`38`）和一个布尔值（`true`）。\n\
  \n第二行代码创建了三个变量（`dog`、`number`、`yesValue`），并将它们的值分别赋给 `petInfo` 元组中存储的对应数据。这意味着 `dog`\
  \ 存储了 `\"Rover\"`，`number` 存储了 `38`，`yesValue` 存储了 `true`。`print` 命令只是将这些数据打印出来，以验证它从元组中检索到了信息。\n\
  \n要从元组访问数据，你必须知道元组存储数据的顺序。因此，如果你想从 `petInfo` 元组中检索一个字符串，你必须知道 `petInfo` 元组将名称（字符串）作为第一个数据块存储，数字作为第二个数据块，布尔值作为第三个数据块。\n\
  \n如果你不想检索元组中存储的所有值，你可以只创建一个变量来存储你想要的数据，并使用下划线字符（`_`）作为占位符，代表你想要忽略的元组中的其他每个值。\n\n\
  这意味着你仍然需要知道元组包含的数据块数量，以便识别出你想要检索的那一个数据块。例如，如果一个元组包含三项，你可以像这样检索第一项：\n\n```\nvar petInfo\
  \ = (\"Rover\", 38, true)\nvar (pet,_,_) = petInfo\nprint (pet)\n```\n\n这会将 `\"\
  Rover\"` 存储到 `pet` 变量中，因此 `println` 命令会打印出 `\"Rover\"`。\n\n如果你只想检索中间的值，可以输入以下代码：\n\
  \n```\nvar petInfo = (\"Rover\", 38, true)\nvar (_,aValue,_) = petInfo\nprint (aValue)\n\
  ```\n\n这会将数字 `38` 存储到 `aValue` 变量中，然后 `println` 命令会打印出 `38`。\n\n下划线字符充当占位符，用于标识元组中你想要忽略的数据。如果省略下划线字符，Swift\
  \ 将不知道你想要元组中的哪个特定数据。要从元组中检索数据，你必须知道元组存储的条目数量和顺序。\n\n从元组中检索值的第二种方法是使用索引编号，其中第一个元素被分配索引编号\
  \ `0`，第二个元素被分配索引编号 `1`，以此类推。例如，你可以像这样将数据存储在元组中：\n\n```\nvar petInfo = (\"Rover\"\
  , 38, true)\nprint (petInfo.0)\nprint (petInfo.1)\nprint (petInfo.2)\n```\n\n元组中的第一项被分配索引编号\
  \ `0`，因此元组名称（例如 `petInfo`）后跟索引编号的组合，让你可以直接检索特定的元组值。因此，`petInfo.0` 检索 `\"Rover\"\
  `，`petInfo.1` 检索 `38`，`petInfo.2` 检索 `true`。\n\n请确保，当你通过索引编号访问元组数据时，使用了有效的索引编号。在上面的例子中，`petInfo`\
  \ 元组在索引 `0`、`1` 和 `2` 处包含数据，但如果你试图访问不同的索引（例如索引编号 `3`），那里没有数据，所以你的程序将无法工作。\n\n访问元组数据的第三种方法涉及使用名称。要使用这种方法，你必须先为每个元组数据分配名称。例如，以下\
  \ Swift 代码定义了两个名称：`\"name\"` 和 `\"age\"`：\n\n```\nvar tupleName = (name: \"Bridget\"\
  , age: 31)\n```\n\n现在，你可以通过引用元组名称后跟每个数据的标识名称来访问元组数据，如下所示：\n\n```\nprint (tupleName.name)\
  \   // 打印 \"Bridget\"\nprint (tupleName.age)    // 打印 31\n```\n\n这三种方法为你提供了不同的访问元组中存储数据的方式，因此只需使用你最喜欢的方法即可。为了清晰起见，为元组的特定元素命名会使你的代码更易于理解，但这会牺牲一点灵活性，迫使你为元组数据命名。索引编号方法和多变量方法可能更简单，但清晰度较差，并且需要你知道想要检索的数据的确切顺序。\n\
  \n要了解如何使用元组，请按照以下步骤创建一个新的 playground：\n\n1.  在 Xcode 中打开 IntroductoryPlayground\
  \ 文件。\n2.  按如下方式编辑代码：\n\n```\n    import Cocoa\n    var tupleName = (greeting: \"\
  Happy Birthday\", age: 58, happy: true)\n    // 方法 #1\n    var (message, howOld,\
  \ mood) = tupleName\n    print (message)\n    print (howOld)\n    print (mood)\n\
  \    var (_,stuff,_) = tupleName\n    print (stuff)\n    // 方法 #2\n    print (tupleName.0)\n\
  \    print (tupleName.1)\n    print (tupleName.2)\n    // 方法 #3\n    print (tupleName.greeting)\n\
  \    print (tupleName.age)\n    print (tupleName.happy)\n```\n\n当你尝试所有三种从元组访问值的方法时，你会看到它们的工作原理相似。元组可以轻松地将相关数据分组到单个变量中，这样你就可以轻松地保持相关信息的条理性。然后，你可以选择使用三种不同方法之一从元组中检索数据，如图\
  \ 10-1 所示。\n\n![A437923_1_En_10_Fig1_HTML.jpg](img/A437923_1_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1.\n\n从元组检索数据的三种不同方式\n\n## 使用集合\n\n数组和字典可以存储相同数据类型的列表，例如字符串列表或整数列表。数组和字典之间的区别在于你如何检索数据。数组强制你使用索引值按位置检索数据。字典允许你使用键来检索数据，但你必须为你存储的每个数据块定义一个唯一的键。\n\
  \n集合代表了另一种存储相同数据类型（例如字符串或十进制数字）列表的方式。集合的一个速度优势是判断某个元素是否被存储。如果你将数据存储在数组中，你必须彻底搜索整个数组才能确定数组是否存储了特定项。如果你将数据存储在字典中，你必须知道与该值一起存储的键，否则你必须彻底搜索字典的值列表。\n\
  \n集合允许你比数组或字典快得多地确定以下内容：\n\n-   一个元素是否存储在集合中\n-   一个集合是否包含与另一个集合完全相同的元素\n-   一个集合是否是另一个集合的子集（包含与更大集合相同的元素）\n\
  -   一个集合是否是另一个集合的超集（包含与更小集合相同的元素以及更多元素）\n-   两个集合是否包含相同的元素\n\n集合使得比较两组不同的数据变得容易，而数组和字典则无法轻易做到这一点。\n\
  \n### 创建集合\n\n要创建集合，你可以定义一个空集合及其可以保存的数据类型，如下所示：\n\n```\nvar setName = Set()\n```\n\
  \n如果你想同时创建一个集合并用数据填充它，请将集合内容列在方括号内，并让 Swift 推断数据类型（所有数据必须为相同数据类型），例如：\n\n```\nvar\
  \ setName = Set([Data1, Data2, Data2 ... DataN])\n```\n\n创建集合的第三种方法是定义一个集合名称，使用\
  \ `Set` 关键字，然后列出集合中的数据，如下所示：\n\n```\nvar setName: Set = [Data1, Data2, Data2 ...\
  \ DataN]\n```\n\n\n\n#### 向集合中添加和删除元素\n\n使用集合时，你可以随时添加新元素，只要新元素与现有元素的数据类型相同即可。要向集合中添加一个元素，只需指定集合名称、`insert`\
  \ 命令以及要添加的数据（放在括号内），如下所示：\n\n```\nsetName.insert(data)\n```\n\n你必须指定要添加数据的数组名称，并将实际数据放在括号中。确保你添加的数据是适当的数据类型。因此，如果你想向一个当前只包含整数的集合添加数据，你只能向该集合添加另一个整数。\n\
  \n如果你尝试添加集合中已存在的数据，则不会发生任何操作。这意味着如果一个集合包含数字 53，你就无法再向该集合添加另一个 53 的副本。\n\n要从集合中删除数据，只需指定集合名称、`remove`\
  \ 命令以及要删除的数据（放在括号内），如下所示：\n\n```\nsetName.remove(data)\n```\n\n如果你尝试删除集合中不存在的数据，`remove`\
  \ 命令会返回一个 nil 值。但是，如果 `remove` 命令成功地从集合中删除了数据，它会返回一个可选变量。这意味着如果你将删除的数据存储在一个变量中，例如\n\
  \n```\nvar variableName = setName.remove(data)\n```\n\n则可以通过使用感叹号来访问存储在变量中的值，例如\n\
  \n```\nprint(variableName!)\n```\n\n如果你想删除集合中的所有项目，请指定集合名称和 `removeAll` 命令，如下所示：\n\
  \n```\nsetName.removeAll()\n```\n\n要了解如何创建集合以及如何向其中添加和删除数据，请按照以下步骤创建一个新的 playground：\n\
  \n1. 在 Xcode 中打开 `IntroductoryPlayground` 文件。\n2. 输入如下代码：\n\n    ```\n    import\
  \ Cocoa\n    var setOne = Set([2, 45, -9, 8, -34])\n    var setTwo : Set = [34,\
  \ 90, -83]\n    setOne\n    setTwo\n    setOne.insert(65)\n    setTwo.insert(-381)\n\
  \    var temp = setOne.remove(45)\n    print(temp)\n    print(temp!)\n    setOne\n\
  \    setTwo\n    setOne.removeAll()\n    ```\n\n这段 Swift 代码通过直接存储数据并让 Swift 推断数据类型（即整数）来创建一个名为\
  \ `setOne` 的集合。然后它创建第二个名为 `setTwo` 的集合，该集合也只包含整数。\n\n创建 `setTwo` 之后，两个 `insert`\
  \ 命令将不同的整数存储到 `setOne` 和 `setTwo` 中。当代码从 `setOne` 中删除数字 45 时，它会将 45 作为可选变量存储在 `temp`\
  \ 变量中。要访问实际值，你必须使用感叹号 (!) 解包可选变量。\n\n最后，`removeAll` 命令清空了 `setOne`，使其不包含任何内容，如图\
  \ 10-2 所示。\n\n![A437923_1_En_10_Fig2_HTML.jpg](img/A437923_1_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2. 创建集合、向集合中插入数据以及从集合中删除数据\n\n请注意，Xcode 会在 `print(temp)` 行的左侧显示一条警告。这是因为\
  \ `temp` 表示一个可选变量，你需要解包（使用 ! 符号）才能获取实际值。\n\n## 查询集合\n\n一旦你拥有一个集合，就可以使用以下命令来获取关于该集合的信息：\n\
  \n* `count`：统计集合中的项目数量\n* `isEmpty`：检查集合是否为空（包含 0 个项目）\n* `isSubset(of:)`：检查一个集合是否完全包含在另一个集合中\n\
  * `isSuperset(of:)`：检查一个集合是否包含另一个集合的所有项目\n* `isDisjoint(with:)`：检查两个集合是否有共同的元素\n\
  \n无论这些命令的结果如何，它们都不会影响集合中存储的数据。\n\n`count` 命令返回一个整数值，只需要指定集合名称和 `count` 命令即可，如下所示：\n\
  \n```\nsetName.count\n```\n\n你也可以将此值赋值给一个变量，例如\n\n```\nvar total = setName.count\n\
  ```\n\n如果集合中项目数为零，`isEmpty` 命令返回布尔值 true，否则返回 false。只需指定集合名称，后跟 `isEmpty` 命令，如下所示：\n\
  \n```\nsetOne.isEmpty\n```\n\n`isSubset(of:)` 命令检查一个集合是否包含第二个集合中也包含的元素。只有当第二个集合包含了第一个集合中的每一个元素时，才认为第一个集合是子集。\n\
  \n`isSuperset(of:)` 命令检查一个集合是否更大，并且包含另一个较小集合中的所有相同元素。只有当第一个集合更大且其所有元素都存储在第二个集合中时，才认为它是超集。\n\
  \n`isDisjoint(with:)` 命令比较两个集合。如果它们没有共同元素，则此命令返回 true，否则返回 false。\n\n要了解如何查询集合，请按照以下步骤操作：\n\
  \n1. 确保在 Xcode 中加载了 `IntroductoryPlayground` 文件。\n2. 按如下方式编辑代码：\n\n    ```\n   \
  \ import Cocoa\n    var mySet = Set([\"Fred\", \"Cindy\", \"Jody\", \"Grant\"])\n\
  \    print(mySet.isEmpty)\n    mySet.count\n    mySet.removeAll()\n    print(mySet.isEmpty)\n\
  \    var myNewSet = Set([\"John\", \"Oscar\"])\n    var myOtherSet = Set([\"John\"\
  , \"Oscar\", \"Sally\"])\n    var myThirdSet = Set([\"Rick\", \"Vinny\"])\n    myNewSet.isSubset(of:\
  \ myOtherSet)\n    myOtherSet.isSuperset(of: myNewSet)\n    myNewSet.isDisjoint(with:\
  \ myThirdSet)\n    ```\n\n这段代码创建了一个包含四个字符串的集合。它使用 `isEmpty` 命令检查集合是否为空（结果为 false）。然后它统计集合中的元素数量（有四个元素）。最后，它从集合中删除所有元素，并再次使用\
  \ `isEmpty` 命令检查集合是否为空（结果为 true）。\n\n下一批代码创建了三个不同的集合，分别命名为 `myNewSet`、`myOtherSet`\
  \ 和 `myThirdSet`，并用不同的名称填充它们。然后 `isSubset(of:)` 命令检查 `myNewSet` [\"John\", \"Oscar\"\
  ] 中的所有元素是否也都存在于 `myOtherSet` [\"John\", \"Oscar\", \"Sally\"] 中，结果为 true。\n\n`isSuperset(of:)`\
  \ 命令检查 `myOtherSet` [\"John\", \"Oscar\", \"Sally\"] 是否包含更多元素并且还包含 `myNewSet` [\"\
  John\", \"Oscar\"] 中存储的所有元素，结果也为 true。\n\n最后，`isDisjoint(with:)` 命令检查 `myNewSet`\
  \ [\"John\", \"Oscar\"] 与 `myThirdSet` [\"Rick\", \"Vinny\"] 是否没有共同元素，结果同样为 true，如图\
  \ 10-3 所示。\n\n![A437923_1_En_10_Fig3_HTML.jpg](img/A437923_1_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3. 查询集合\n\n\n\n"
- "# 11. 将代码存储在函数中\n\n每个程序都会存储数据（存储在变量或诸如数组、集合或字典等数据结构中），然后以某种方式对这些数据进行操作。操作数据的代码被称为**算法**。\n\
  \n如果希望在程序中的多个位置使用同一个算法，你可以复制那段代码并将其粘贴到不同的地方。然而，如果你之后想要修改代码，这可能会带来问题。如果你复制了 20 份相同的算法，那么你就必须修改程序中所有这\
  \ 20 份副本。这不仅耗时，而且容易出错。\n\n更好的解决方案是将算法存储在程序中称为**函数**的独立部分。第 6 章向你介绍了数学函数，但你也可以创建自己的函数。与其复制算法并将其存储在多个位置，不如将算法只存储在一个函数中。函数有几个用途：\n\
  \n-   在程序的不同部分重用代码\n-   将相关算法分组到一个地方\n-   使程序中的问题易于隔离\n\n把函数看作是构建模块。就像用砖块盖房子比用一整块岩石雕刻更容易一样，当你能够将大型程序分解为多个函数时，永远不应该尝试将其编写成一个命令列表。\n\
  \nCocoa 框架包含了许多你可以在自己的程序中使用的函数。函数背后的基本思想是，你可以在不了解其工作原理的情况下使用它。要让函数内部的代码运行，你只需按名称“调用”该函数即可。\n\
  \n你应该始终尽可能地使用 Cocoa 框架的内置函数，因为这能让你使用经过预测试的、可靠的代码来创建程序。当然，Cocoa 框架无法提供你可能会需要的每一个函数，所以你最终需要创建自己的函数。\n\
  \n函数的目的是简化代码。函数基本上用一行称为函数调用的代码替换了多行代码。\n\n你可以创建三种类型的函数：\n\n-   不接受任何数据、执行相同操作的函数\n\
  -   接受数据的函数\n-   返回值的函数\n\n记住，接受数据的函数也可以返回值。\n\n## 无参数且无返回值的简单函数\n\n最简单的函数只包含一个名称，如下所示：\n\
  \n```\nfunc functionName () {\n\n}\n```\n\n通过在大括号之间插入一行或多行代码，你可以让函数执行某些操作，例如：\n\n\
  ```\nfunc simpleFunction () {\n    print (\"Hello\")\n    print (\"there\")\n}\n\
  ```\n\n要运行函数内部的代码，你只需按名称调用该函数，例如：\n\n```\nsimpleFunction()\n```\n\n要了解这个函数是如何工作的，请遵循以下步骤：\n\
  \n1.  在 Xcode 中打开 `IntroductoryPlayground` 文件。\n2.  按如下方式编辑代码：\n\n```\nimport Cocoa\n\
  func simpleFunction () {\n    print (\"Hello\")\n}\nvar i = 1\nwhile i <= 5 {\n\
  \    simpleFunction()\n    i = i + 1\n}\n```\n\n这段代码定义了一个简单的函数，它只打印 \"Hello\" 和\
  \ \"there\"。然后它使用一个 `while` 循环运行五次，并运行或调用了 `simpleFunction` 五次，如图 11-1 所示。\n\n![A437923_1_En_11_Fig1_HTML.jpg](img/A437923_1_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1. 定义和调用一个简单函数\n\n---\n\n## 操作集合\n\n当你拥有两个或更多集合时，你可以对这两个集合执行操作以创建第三个集合。一些常见的集合操作包括：\n\
  \n-   `union`：将两个集合中的所有项目合并到一个新集合中\n-   `subtracting`：从第一个集合中移除第二个集合中的项目，以形成一个新集合\n\
  -   `intersection`：找出两个集合中共有的项目，并将其存储在一个新集合中\n-   `symmetricDifference`：找出只存在于其中一个集合中，而非两个集合中都存在的项目\n\
  \n可以将 `union` 命令视为将两个集合相加，而 `subtract` 命令视为从一个集合中减去另一个集合。`union` 命令指定两个集合名称，如下所示：\n\
  \n```\nfirstSet.union(secondSet)\n```\n\n可以将其视为等同于 `firstSet` + `secondSet`，其中两个集合中的所有项目都被合并到第三个集合中。\n\
  \n`subtracting` 命令指定两个集合名称，但顺序会影响结果，例如：\n\n```\nthirdSet.subtracting(firstSet)\n\
  firstSet.subtracting(thirdSet)\n```\n\n根据每个集合的内容，这两个命令可能会产生不同的结果。假设 `thirdSet` 包含\
  \ `[1, 2, 3, 4, 5]`，并且 `firstSet` 包含 `[1, 3, 5, 7]`。`thirdSet.subtracting(firstSet)`\
  \ 命令的工作原理如下：\n\n```\n[1, 2, 3, 4, 5] thirdSet\n[1, 3, 5, 7] firstSet\n```\n\n两个集合都包含\
  \ 1、3 和 5，因此这些数字被消除。从 `thirdSet` 中移除 1、3 和 5，你将剩下 `[2, 4]`。\n\n`firstSet.subtracting(thirdSet)`\
  \ 命令的工作原理如下：\n\n```\n[1, 3, 5, 7] firstSet\n[1, 2, 3, 4, 5] thirdSet\n```\n\n两个集合都包含\
  \ 1、3 和 5，因此这些数字被消除。从 `firstSet` 中移除 1、3 和 5，你将剩下 `{7}`。\n\n`intersecting` 命令找出两个集合中共有的项目。`symmetricDifference`\
  \ 命令找出不在两个集合中都存在的项目。可以将 `symmetricDifference` 命令视为 `intersect` 命令的相反操作。\n\n要了解这四种操作集合的不同方式是如何工作的，请遵循以下步骤：\n\
  \n1.  确保在 Xcode 中加载了 `IntroductoryPlayground` 文件。\n2.  按如下方式输入代码：\n\n```\nimport\
  \ Cocoa\nvar firstSet = Set([1, 3, 5, 7])\nvar secondSet = Set([2, 4, 6, 8])\nvar\
  \ thirdSet = Set ([1, 2, 3, 4, 5])\nfirstSet.union(secondSet)\nsecondSet.subtracting(firstSet)\n\
  firstSet.subtracting(secondSet)\nfirstSet.subtracting(thirdSet)\nthirdSet.subtracting(firstSet)\n\
  firstSet.intersection(thirdSet)\nfirstSet.symmetricDifference(thirdSet)\n```\n\n\
  请注意 `subtracting` 命令根据列出两个集合的顺序而工作方式不同，如图 10-4 所示。\n\n![A437923_1_En_10_Fig4_HTML.jpg](img/A437923_1_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4. 操作集合\n\n### 总结\n\n元组是一种在单个变量中存储不同数据类型的方式。与数组和字典一样，集合可以存储相同数据类型的列表。虽然数组最适合存储有序信息，字典最适合快速检索数据，但集合最适合检查项目是否属于某个集合，以及便于操作两个或多个集合。\n\
  \n如果你需要存储大量相关的数据，可以使用元组，但元组在处理大量数据时会变得笨拙。通过元组、集合、数组和字典，你可以根据特定需求以最灵活的方式存储数据。\n\n\
  \n\n## 带参数的简单函数\n\n简单函数无论情况如何变化，都只能重复执行相同的操作。为了让函数更灵活，通常允许函数接收数据作为输入。这些数据被称为参数。\n\
  \n`参数`让函数能够接收数据，并利用这些数据计算出不同的结果。要定义参数，你必须：\n\n*   列出一个描述性的参数名称。\n*   指定一个数据类型，例如\
  \ `Int` 或 `Double`。\n\n一个接受单个参数的函数如下所示：\n\n```\nfunc functionName (parameterName:\
  \ dataType) {\n}\n```\n\n要调用一个定义了参数的函数，你必须指定参数名称，后跟你要赋予或传递给函数的数据，例如：\n\n```\nfunctionName\
  \ (parameterName: inputData)\n```\n\n当调用带参数的函数时，你需要确保传递正确数量的参数，列出每个参数的名称，并为每个参数提供正确的数据类型。因此，如果你有一个接受一个字符串参数的函数，比如：\n\
  \n```\nfunc parameterFunction (name : String) {\n}\n```\n\n你可以通过其名称并在括号内传入一个（且仅一个）字符串来调用这个参数，例如：\n\
  \n```\nparameterFunction (name : “Oscar”)\n```\n\n函数调用失败的方式有以下几种：\n\n*   函数名输入错误。\n\
  *   没有包含参数名称。\n*   传递的参数数量不正确。\n*   没有列出或传递正确数据类型的参数。\n\n在这个例子中，`parameterFunction`\
  \ 期望一个必须是 `String` 数据类型的参数。以下是调用此函数可能失败的所有情况：\n\n*   拼写错误函数名（`parameterFunction`）。\n\
  *   未能包含或拼写错误参数名称（`name:`）。\n*   没有传递正确数量的参数（单个 `String` 数据类型）。\n*   没有列出或传递正确数据类型的参数（一个\
  \ `String` 数据类型）。\n\n要了解带参数的函数如何工作，请按照以下步骤操作：\n\n1.  确保你的 `IntroductoryPlayground`\
  \ 文件已在 Xcode 中加载。\n2.  按如下所示编辑代码：\n\n    ```\n    import Cocoa\n    func parameterFunction\
  \ (name : String) {\n        print (\"Hello, \" + name)\n    }\n    parameterFunction(name:\
  \ \"Oscar\")\n    ```\n\n这个 Swift 程序调用了 `parameterFunction` 并向其传递了一个字符串参数（`\"Oscar\"\
  `）。当 `parameterFunction` 接收到这个参数（`\"Oscar\"`）时，它会将其存储在其 `name` 变量中。然后它会打印出 `\"Hello,\
  \ Oscar\"`，如图 11-2 所示。\n\n![A437923_1_En_11_Fig2_HTML.jpg](img/A437923_1_En_11_Fig2_HTML.jpg)\n\
  \n**图 11-2.** 向函数传递字符串参数\n\n尽管这个例子只使用了一个参数，但一个函数可以接受的参数数量没有限制。要接受更多参数，你只需要定义额外的变量名称和数据类型，像这样：\n\
  \n```\nfunc functionName (parameter: dataType, parameter2 : dataType) {\n}\n```\n\
  \n每个参数可以接受不同的数据类型，因此你可以向函数传递一个字符串和一个整数，例如：\n\n```\nfunc functionName (parameter:\
  \ String, parameter2 : Int) {\n}\n```\n\n要调用此函数，你需要指定函数名称及其两个具有正确数据类型的参数：\n\n```\n\
  functionName (parameter: \"Hello\", parameter2: 48)\n```\n\n如果你传递参数的顺序错误，函数调用将无法工作：\n\
  \n```\nfunctionName (parameter: 48, parameter2: \"Hello\")\n```\n\n传递参数时，务必确保传递正确数量的参数、每个参数的名称以及正确数据类型，并且顺序也要正确。\n\
  \n## 带参数并返回值的函数\n\n最通用的函数是那些使用参数接收数据，然后基于该数据返回值的函数。一个返回值函数的基本结构如下所示：\n\n```\nfunc\
  \ functionName (parameter: ParameterDataType) -> DataType {\n    return someValue\n\
  }\n```\n\n函数名称可以是任意你想使用的名称。理想情况下，函数名称应能描述其用途。\n\n参数很像声明一个变量，通过指定参数名称及其可以接受的数据类型来实现。参数是可选的，但没有参数的函数通常不大有用，因为它们会重复执行相同的任务。\n\
  \n`->` 符号定义了函数名称所代表的数据类型。\n\n`return` 关键字后面必须跟一个值或计算该值的命令。这个值的数据类型必须与 `->` 符号后面的数据类型一致。任何返回值的函数都可以存储在一个相同数据类型的变量中。\n\
  \n假设你定义了一个如下所示的函数：\n\n```\nfunc salesTax (amount: Double) -> Double {\n    let currentTax\
  \ = 0.075 // 7.5% 销售税\n    return amount * currentTax\n}\n```\n\n这个函数的名称为 `salesTax`，它接受一个名为\
  \ `amount` 的参数，该参数可以存储 `Double` 数据类型。当它计算结果时，该结果也是一个 `Double` 数据类型，如 `->` 符号后的 `Double`\
  \ 所标识。`return` 关键字指明了函数如何计算要返回的值。\n\n由于此函数返回一个 `Double` 数据类型，你可以将结果存储在一个同样是 `Double`\
  \ 数据类型的变量中。\n\n要了解此函数如何工作，请按照以下步骤操作：\n\n1.  确保你的 `IntroductoryPlayground` 文件已在 Xcode\
  \ 中加载。\n2.  按如下所示编辑代码：\n\n    ```\n    import Cocoa\n    func salesTax (amount:\
  \ Double) -> Double {\n        let currentTax = 0.075\n        return amount * currentTax\n\
  \    }\n    let purchasePrice = 59.95\n    var total : Double\n    total = purchasePrice\
  \ + salesTax(amount:purchasePrice)\n    print (\"包括销售税，您的总金额为 = \\(total)\")\n \
  \   ```\n\n请注意，此代码通过将 `purchasePrice` 中存储的值传递给 `salesTax` 函数来调用它。当你在 Playground\
  \ 中输入此代码时，你会在右侧边栏看到显示的结果，如图 11-3 所示。更改 `purchasePrice` 和 `currentTax` 中存储的值，以查看它如何影响此\
  \ Swift 代码计算出的结果。\n\n![A437923_1_En_11_Fig3_HTML.jpg](img/A437923_1_En_11_Fig3_HTML.jpg)\n\
  \n**图 11-3.** 定义和调用函数\n\n当一个函数返回值时，请确保指定：\n\n*   函数所代表的数据类型（`-> dataType`）\n*  \
  \ 函数名称所代表的值（`return`）\n*   将返回的函数值存储在一个能够容纳该返回数据类型的变量中\n\n在调用一个返回值的函数时，请确保数据类型匹配。在上述示例中，`salesTax`\
  \ 函数返回一个 `Double` 数据类型，因此在 Swift 代码中，这个 `salesTax` 函数的值被存储在 `total` 变量中，该变量也是 `Double`\
  \ 数据类型。\n\n\n\n## 使用变量参数\n\n当函数接受参数时，会将该参数视为常量。这意味着在函数内部，Swift 代码无法修改该参数。如果你想在函数内部修改参数，则需要使用\
  \ `var` 关键字将该参数标识为变量参数，如下所示：\n\n```\nfunc functionName (parameter: dataType) {\n\
  var parameter = parameter\n}\n```\n\n要了解变量参数如何工作，请按照以下步骤操作：\n\n1.  确保你的 `IntroductoryPlayground`\
  \ 文件已在 Xcode 中加载。\n2.  按如下方式编辑代码：\n\n```\nimport Cocoa\nfunc internalChange (name\
  \ : String) {\nvar name = name\nname = name.uppercased()\nprint (\"Hello \" + name)\n\
  }\ninternalChange (name : \"Tasha\")\n```\n\n在 `internalChange` 函数内部，`name` 参数会发生改变，因为该参数被声明为变量（`var\
  \ name = name`）。`internalChange` 函数中的第二行将 `name` 参数转换为大写。然而，`internalChange` 函数对\
  \ `name` 参数所做的任何更改都不会影响程序的其他部分。所有更改都仅限于 `internalChange` 函数内部。\n\n如果你想更改参数并使这些更改在函数外部生效，那么你需要改用\
  \ `inout` 参数。\n\n## 使用 Inout 参数\n\n向函数传递数据有两种方法。一种是传递固定值，例如\n\n```\nsqrt(5)\n```\n\
  \n第二种方法是传递一个代表值的变量，例如\n\n```\nvar z : Double = 45.0\nvar answer : Double\nanswer\
  \ = sqrt(z)\n```\n\n在这段 Swift 代码中，`z` 的值为 45.0，并被传递给 `sqrt` 函数。无论 `sqrt` 函数做什么，`z`\
  \ 的值仍然保持为 45.0。\n\n如果你希望函数更改其参数的值，你可以创建所谓的 `inout` 参数。这意味着当你将一个变量传递给函数时，该函数会更改那个变量。\n\
  \n要定义一个函数可以更改的参数，你只需使用 `inout` 关键字标识该参数，例如\n\n```\nfunc functionName (parameter:\
  \ inout dataType) {\n}\n```\n\n如果一个函数有两个或更多参数，你可以将其中一个或多个参数指定为 `inout` 参数。当你将一个参数标识为\
  \ `inout` 参数时，该函数必须更改这个 `inout` 参数。当你调用函数并传递 `inout` 参数时，必须使用 `&` 符号来标识 `inout`\
  \ 参数，例如\n\n```\nfunctionName (parameter: &variable)\n```\n\n要了解 `inout` 参数如何工作，请按照以下步骤操作：\n\
  \n1.  确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。\n2.  按如下方式编辑代码：\n\n```\nimport\
  \ Cocoa\nfunc changeMe (name: inout String, age: Int) {\nprint (name + \" is \\\
  (age) years old\")\nname = name.uppercased()\n}\nvar animal : String = \"Oscar the\
  \ cat\"\nchangeMe (name: &animal, age: 2)\nprint (animal)\n```\n\n`changeMe` 函数定义了两个参数：\n\
  \n*   一个名为 `name` 的字符串参数，被标识为 `inout` 参数\n*   一个名为 `age` 的整数参数\n\n`changeMe` 函数必须以某种方式修改\
  \ `inout` 参数，它通过将 `name` 参数改为大写来实现这一点，如图 11-4 所示。\n\n![A437923_1_En_11_Fig4_HTML.jpg](img/A437923_1_En_11_Fig4_HTML.jpg)\n\
  \n图 11-4. 使用 inout 参数\n\n调用 `changeMe` 函数时，会向其传递一个名为 `animal` 的 `String` 变量，该变量包含字符串\
  \ `\"Oscar the cat\"`。`changeMe` 函数期望两个参数，其中第一个是 `inout` 参数。这意味着调用 `changeMe` 函数必须满足以下条件：\n\
  \n*   `changeMe` 函数期望两个参数：一个字符串和一个整数，顺序如此。\n*   由于字符串参数是 `inout` 参数，因此第一个参数必须是一个使用\
  \ `&` 符号标识的变量。\n\n在调用 `changeMe` 函数之前，`animal` 变量包含字符串 `\"Oscar the cat\"`。调用 `changeMe`\
  \ 函数之后，`animal` 变量现在包含字符串 `\"OSCAR THE CAT\"`。这是因为 `changeMe` 函数中的 `inout` 参数修改了它。\n\
  \n## 返回多个值\n\n要使函数返回一个值，你必须指定两个项目：\n\n*   函数返回的数据类型，使用 `->` 符号标识，例如 `-> Double`\n\
  *   函数末尾的 `return` 关键字，用于标识单个值\n\n以下函数返回一个 `Int` 值：\n\n```\nfunc add2Numbers (first\
  \ : Int, second : Int) -> Int {\nreturn first + second\n}\nadd2Numbers (first: 5,\
  \ second: 17)\n```\n\n在大多数情况下，你可能希望函数只返回一个值，但函数也可以返回两个或更多值。如果你希望函数返回两个或更多值，你需要执行以下操作：\n\
  \n*   在 `->` 符号之后，用括号指定所有你希望函数返回的数据类型。\n*   使用 `return` 关键字，并按正确的顺序和数据类型（放在括号内）列出所有数据。\n\
  *   将返回的多个值存储在一个元组中。\n\n请记住，元组（第 10 章）是一种可以容纳两个或更多值的变量，其中每个值可以是不同的数据类型，例如\n\n```\n\
  var myTuple : (Double, Double, Double)\n```\n\n要创建一个返回多个值的函数，你只需将一种或多种数据类型括在括号中。因此，如果你希望一个函数返回三个\
  \ `Double` 值，你可以像这样定义一个返回三个 `Double` 值的函数：\n\n```\nfunc currencyConversion (USD\
  \ : Double) -> (Double, Double, Double) {\n}\n```\n\n在这个函数内部，你需要返回三个 `Double` 数据类型的值，例如\n\
  \n```\nreturn (USD * 0.8975, USD * 0.7988, USD * 6.76)\n```\n\n要了解如何使用返回多个值的函数，请按照以下步骤操作：\n\
  \n1.  确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。\n2.  按如下方式编辑代码：\n\n```\nimport\
  \ Cocoa\nvar myTuple : (Double, Double, Double)\nfunc currencyConversion (USD :\
  \ Double) -> (Double, Double, Double) {\nreturn (USD * 0.8975, USD * 0.7988, USD\
  \ * 6.76)\n}\nmyTuple = currencyConversion (USD: 20)\nprint (myTuple.0)\nprint (myTuple.1)\n\
  print (myTuple.2)\n```\n\n要检索存储在元组中的各个项目，你可以使用索引号，其中元组中的第一项位于索引 0，第二项位于索引 1，依此类推。图\
  \ 11-5 展示了如何创建一个返回多个值的函数，将多个值存储在元组中，并访问元组中的每个项目。\n\n![A437923_1_En_11_Fig5_HTML.jpg](img/A437923_1_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5. 从函数返回多个值并在元组中访问它们\n\n\n\n## 理解 `IBAction` 方法\n\n如果你还记得第 3 章的内容，当时你将用户界面的按钮连接到了\
  \ Swift 代码，创建了一个 `IBAction` 方法，它本质上就是一个看起来像这样的函数：\n\n```\n@IBAction func changeCase(_\
  \ sender: NSButton) {\nlabelText.stringValue = messageText.stringValue.uppercased()\n\
  }\n```\n\n既然你已经了解了函数的工作方式，让我们逐行分析这段代码。首先，`@IBAction` 标识了一个函数，该函数仅在用户操作某个界面元素时运行。查看参数列表，你会看到\
  \ `(sender: NSButton)`，这表明当用户点击按钮时，`changeCase` 函数将运行花括号内的 Swift 代码。\n\n任何 `IBAction`\
  \ 方法中存储的 Swift 代码通常都会以某种方式处理数据。在目前的例子中，它获取文本字段中的文本（由 `IBOutlet` 变量 `messageText`\
  \ 表示），将其转换为大写，然后将大写的文本显示在标签中（由 `IBOutlet` 变量 `labelText` 表示）。\n\n由于有可能两个或更多界面元素连接到同一个\
  \ `IBAction` 方法，因此 `sender` 参数用于标识用户点击的是哪个按钮。由于这个 `IBAction` 方法只连接到一个按钮，所以 `sender`\
  \ 参数会被忽略。\n\n`IBAction` 方法不过是一些与界面元素相关联的特殊函数。在任何程序中，你很可能会有多个 `IBAction` 方法（函数），同时还有许多你自定义的其他函数。\n\
  \n此外，即使你从未见过那些函数运行的源代码，也可能会用到 Cocoa 框架中定义的函数。在创建任何程序时，你都会以这种或那种形式使用函数。\n\n### 小结\n\
  \n函数是执行单一任务的迷你程序。与其试图编写一个庞大的程序，不如编写多个较小的程序（函数），然后将它们拼接在一起组成一个更大的程序。函数就像构建模块一样。\n\
  \n最简单的函数会反复执行相同的操作，但更灵活的函数能够接收输入，从而利用这些输入来计算结果。当函数接收一个或多个数据块时，它会将其存储在参数中，参数类似于变量。\n\
  \n有些函数不仅可以接收数据，还能返回一个值。要创建一个返回值的函数，你必须指定返回的数据类型（使用 `->` 符号），并在函数内部使用 `return` 关键字来指定要返回的具体数据。\n\
  \n如果函数返回单个值，你可以将该值存储在变量中。函数也可以返回多个值，你可以将这些值存储在元组中。\n\n当你将界面元素（如按钮）连接到 Swift 代码时，会创建称为\
  \ `IBAction` 方法的特殊函数。这些 `IBAction` 方法是在用户点击或操作界面元素时运行的程序。\n\n每次用 Swift 编写程序时，你都需要使用函数。你可以使用\
  \ Cocoa 框架中已有的函数，但你很可能也需要创建自己的函数。\n\n"
- "# 12. 定义自定义数据类型\n\n为了存储数据，Swift 提供了常见的数据类型，如整数（`Int`）、小数（`Float` 或 `Double`）和文本（`String`）。此外，Swift\
  \ 还提供了布尔数据类型（`Bool`）来存储 `true` 或 `false` 值。\n\n尽管几乎每个程序都需要使用这些 Swift 数据类型中的一种或多种，但你可能会发现它们过于局限。因此，Swift\
  \ 提供了多种基于基本 Swift 数据类型创建自定义数据类型的方法。此外，Swift 还提供了几种以独特的方式组织基本数据类型（`Int`、`String`、`Double`\
  \ 等）的方法。定义不同的数据类型组织方式称为数据结构。\n\n本质上，程序由算法和数据结构组成。算法定义了程序如何处理数据，而数据结构定义了程序如何存储和组织数据。\n\
  \n程序存储数据的方式能极大地决定程序的速度和效率。如果程序组织数据的方式不佳，可能就需要很长时间才能找到所需的数据。组织数据没有绝对的正确或错误之分，因为每个程序的需求都不同。\n\
  \n创建自定义数据类型能使程序更易于理解。Swift 提供了以下几种创建自定义数据类型的方式：\n\n- 类型别名\n- 枚举\n- 结构体\n- 不同数据类型的组合\n\
  \n## 类型别名\n\n将变量声明为 `Int`、`Double` 或 `String` 等数据类型，只能告诉你该变量可以存储什么类型的数据，但不能说明这些数据的含义。例如，如果你声明两个变量为\
  \ `Int` 数据类型，每个变量都可以存储整数，但一个变量可能表示年龄，而另一个变量可能表示员工 ID 编号。\n\n为了使数据类型的用途更清晰，Swift\
  \ 允许你使用一种叫做类型别名的特性。类型别名让你能为泛型数据类型名称赋予一个描述性的名称，例如：\n\n```\ntypealias EmployeeID =\
  \ Int\n```\n\n现在，你不再需要将变量声明为整数（`Int`）数据类型，而可以将其声明为 `EmployeeID` 数据类型，例如：\n\n```\n\
  typealias EmployeeID = Int\nvar employee : EmployeeID\nemployee = 192\n```\n\n这等同于：\n\
  \n```\nvar employee : Int\nemployee = 192\n```\n\n\n\n## 使用枚举\n\nSwift 中基础数据类型的一大问题是，它们告诉你数据包含什么（整数、字符串等），但没有告诉你数据代表什么。`类型别名`\
  \ 有助于为数据类型赋予有意义的名称，但这只是解决方案之一。另一种解决方案就是枚举。\n\n枚举的核心思想在于，让你创建自己的数据类型，并列举该数据类型的可用选项。当你将变量声明为\
  \ `Int` 数据类型时，本质上允许该变量保存众多可能的整数值之一，而这很可能远超你的实际需求。\n\n枚举允许你使用描述性名称定义自己的数据类型，并定义可存储的选项列表。要创建枚举，需要定义一个枚举名称，例如：\n\
  \n```\nenum 枚举名称 {\n// 此处为枚举定义\n}\n```\n\n枚举名称通常首字母大写。创建枚举名称后，需要列出该枚举可以保存的可用选项。你创建的选项列表不必是任何数据类型，可以是任何你想要的描述性名称。\n\
  \n假设你想创建一个代表允许饲养的宠物的数据类型。可以像这样创建一个枚举：\n\n```\nenum 宠物 {\ncase 狗\ncase 猫\ncase 鱼\n\
  case 鸟\n}\n```\n\n这定义了该枚举只保存 `狗`、`猫`、`鱼` 或 `鸟` 这些值。由于你可以任意命名枚举的数据类型，因此可以使这些选项具有描述性和实际意义。\n\
  \n创建枚举后，需要声明一个变量来表示该枚举，例如：\n\n```\nvar 允许的宠物 : 宠物\n```\n\n如果要给这个变量（声明为 `宠物` 数据类型）赋值，需要指定枚举定义的一个选项，例如：\n\
  \n```\n允许的宠物 = 宠物.猫\n```\n\n或者使用快捷方式：\n\n```\n允许的宠物 = .猫\n```\n\n由于 `允许的宠物` 变量已被声明为\
  \ `宠物` 数据类型，因此在赋值允许的选项时，无需再次键入 “宠物”（使用 `.猫` 代替 `宠物.猫`）。\n\n要了解具有参数的函数如何工作，请按照以下步骤操作：\n\
  \n1.  确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。\n2.  按如下方式编辑代码：\n\n    ```\n\
  \    enum 宠物 {\n    case 狗\n    case 猫\n    case 鱼\n    case 鸟\n    }\n    var 允许的宠物\
  \ : 宠物\n    允许的宠物 = .狗\n    print (\"一只 \\(允许的宠物) 是可接受的宠物\")\n    允许的宠物 = 宠物.猫\n\
  \    print (\"一只 \\(允许的宠物) 是可接受的宠物\")\n    ```\n\n`宠物` 枚举定义了 `宠物` 可以保存 `狗`、`猫`、`鱼`\
  \ 或 `鸟` 这些值。\n\n`允许的宠物` 变量被声明为 `宠物` 数据类型，因此它只能保存这四个值（`狗`、`猫`、`鱼` 或 `鸟`）之一。\n\n给\
  \ `允许的宠物` 变量赋值时，既可以列出 `宠物` 枚举名称，也可以省略它。然后 `print` 命令将 `宠物` 数据打印在字符串中，如图 12-1 所示。\n\
  \n![A437923_1_En_12_Fig1_HTML.jpg](img/A437923_1_En_12_Fig1_HTML.jpg)\n\n图 12-1.\n\
  使用枚举定义描述性数据\n\n如果给变量赋予枚举未定义的数据会发生什么？Swift 会捕获错误并阻止你的程序运行。因此，如果你尝试\n\n```\n允许的宠物\
  \ = .仓鼠\n```\n\n它将无法运行，因为 `仓鼠` 未被定义为 `宠物` 枚举中的可用选项。正如 Swift 不允许你将整数存储到 `String`\
  \ 变量中一样，它也不允许你在枚举中存储任何未明确定义的数据。\n\n## 使用结构体\n\n假设你想存储几百人的姓名、街道地址、员工 ID 号和年薪金额列表。你将如何存储所有这些数据？\n\
  \n要存储一个人的信息，你可以创建几个变量，例如：\n\n```\nvar 姓名 : String\nvar 街道 : String\nvar ID : Int\n\
  var 薪资 : Double\n```\n\n不幸的是，创建单独的变量并不能明确标识每个人的姓名必须同时包含街道地址、员工 ID 和薪资。为了解决这个问题，你可以将相关变量分组到称为结构体的同一位置。\n\
  \n结构体将不同类型的数据存储在一个单独的位置。使用传统变量，你一次只能存储一块数据。使用结构体，你可以定义两块或更多数据存储在一个变量中。在结构体内部声明的变量称为属性。\n\
  \n一个存储两块数据的结构体可以如下所示：\n\n```\nstruct 结构体名称 {\nvar 变量名 1 : 数据类型\nvar 变量名 2 : 数据类型\n\
  }\n```\n\n请记住，每个变量的数据类型可以是像 `Int`、`String` 或 `Double` 这样的简单数据类型，也可以是像数组、元组、集合、枚举或字典这样更复杂的数据类型。\n\
  \n你可以在结构体内部定义两个或更多变量，每个变量可以包含不同的数据类型，例如字符串或整数。无论结构体包含多少个属性，在存储数据之前，都必须先初始化这些属性。\n\
  \nSwift 提供了三种初始化属性的方法。首先，你可以为每个属性定义初始值，如下所示：\n\n```\nstruct 结构体名称 {\nvar 变量名 1 :\
  \ 数据类型 = 初始值\nvar 变量名 2 : 数据类型 = 初始值\n}\n```\n\n为了简化属性声明，第二种方法是省略数据类型，让 Swift 推断数据类型，如下所示：\n\
  \n```\nstruct 结构体名称 {\nvar 变量名 1 = 初始值\nvar 变量名 2 = 初始值\n}\n```\n\n当你为属性分配初始值时，可以创建一个变量来表示该结构体，如下所示：\n\
  \n```\nvar 变量名 = 结构体名称()\n```\n\n初始化结构体属性的第三种方法是创建一个 `init` 函数。这意味着你必须创建一个属性名称及其数据类型的列表。然后，在创建表示该结构体的变量时，为这些属性赋值。\n\
  \n例如，假设你想存储一个人的信息，如姓名、电子邮件地址和电话号码。你可以创建三个单独的变量，而是创建一个单独的结构体，如下所示：\n\n```\nstruct\
  \ 人员 {\nvar 姓名 : String\nvar 电子邮件 : String\nvar 电话 : String\n}\n```\n\n如果你只是定义了每个属性的数据类型，则需要创建一个名为\
  \ `init` 的初始化器，如下所示：\n\n```\nstruct 人员 {\nvar 姓名 : String\nvar 电子邮件 : String\nvar\
  \ 电话 : String\ninit (姓名: String, 电子邮件: String, 电话: String) {\nself.姓名 = 姓名\nself.电子邮件\
  \ = 电子邮件\nself.电话 = 电话\n}\n}\n```\n\n当你基于此结构体创建一个变量时，需要包含初始值，例如：\n\n```\nvar 员工\
  \ = 人员(姓名: \"苏\", 电子邮件: \"sdk@aol.com\", 电话: \"555-1234\")\n```\n\n创建结构体包含三个部分：\n\
  \n*   创建一个包含两个或更多变量（属性）的结构体。\n*   通过为每个属性赋值或创建 `init` 函数来初始化所有结构体属性。\n*   创建一个表示该结构体的变量。\n\
  \n\n\n### 在结构中存储和检索项目\n\n结构体让你能定义要存储的相关数据的类型。然后你需要创建一个变量名来代表该结构体。要使用结构体存储数据，你需要指定用句点分隔的结构体名称和变量名，如下所示：\n\
  \n```\n结构体变量.变量名 = 值\n```\n\n要从结构体中检索数据，你可以将一个变量赋值给结构体的变量，如下所示：\n\n```\nvar 变量名\
  \ = 结构体变量.变量名\n```\n\n要了解如何创建结构体、初始化其属性、以及添加和检索数据，请按照以下步骤创建一个新的 Playground：\n\n\
  1.  确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。\n2.  按如下方式编辑代码：\n\n    ```\n \
  \   import Cocoa\n    struct Pet {\n    var name : String = \"\"\n    var age :\
  \ Int = 0\n    }\n    var dog = Pet()\n    dog.name = \"Fido\"\n    dog.age = 4\n\
  \    print (dog.name)\n    print (dog.age)\n    struct Person {\n    var name :\
  \ String\n    var email : String\n    var phone : String\n    init (name: String,\
  \ email: String, phone: String) {\n    self.name = name\n    self.email = email\n\
  \    self.phone = phone\n    }\n    }\n    var workers = Person(name: \"Sue\", email:\
  \ \"sdk@aol.com\", phone: \"555-1234\")\n    let boss = workers.name\n    print\
  \ (boss)\n    workers.name = \"Bo\"\n    print (workers.email)\n    print (workers.phone)\n\
  \    ```\n\n第一个结构体为其属性定义了初始值，因此不需要 `init` 函数。这就是为什么你可以用空括号创建一个变量，如下所示：\n\n```\n\
  var dog = pet()\n```\n\n第二个结构体没有为其属性定义初始值，因此当你创建一个变量来表示该结构体时，你必须定义初始值：\n\n```\n\
  var workers = person(name: \"Sue\", email: \"sdk@aol.com\", phone: \"555-1234\"\
  )\n```\n\n要在结构体中存储数据，你需要指定代表该结构体的变量名，后跟属性名，如图 12-2 所示。\n\n![A437923_1_En_12_Fig2_HTML.jpg](img/A437923_1_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2. 创建结构体并检索数据\n\n## 组合数据结构\n\n在最简单的层面上，你可以使用可用的基本数据类型（`Int`、`Float`、`Double`、`String`）。为了获得更大的灵活性，你可以组合数据结构。例如，数组通常包含单一值的列表，如整数或字符串。一种常见的组合是创建一个结构体数组，它可以包含相关的信息列表，如姓名和地址，如图\
  \ 12-3 所示。\n\n![A437923_1_En_12_Fig3_HTML.jpg](img/A437923_1_En_12_Fig3_HTML.jpg)\n\
  \n图 12-3. 结构体数组可以保存相关数据\n\n通过组合不同的数据结构，你可以创建独特的方式来组织数据，例如集合的数组、包含数组的字典，或元组结构体。任何你可以使用\
  \ `Int` 或 `String` 等数据类型的地方，你也可以使用数组、集合或字典等数据结构。\n\n一种常见的组合是包含结构体的数组。单独使用时，结构体只能保存有限数量的数据。而结构体数组则像一个简单的数据库。结构体定义了要存储的关于一个人的信息类型，例如姓名、地址和年龄，而数组则保存了这些数据的多个副本。\n\
  \n为了演示如何创建结构体数组，你将创建一个程序，允许你输入多个姓名、地址和电话号码，并且还能删除数据。\n\n1.  在 Xcode 中选择“文件” ➤ “新建”\
  \ ➤ “项目”。\n2.  在 macOS 类别下，点击“应用程序”。\n3.  点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 现在会要求输入产品名称。\n\
  4.  在“产品名称”文本字段中点击，并输入 `StructureProgram`。\n5.  确保“语言”弹出菜单显示 Swift，并且没有勾选任何复选框。\n\
  6.  点击“下一步”按钮。Xcode 会询问你想在哪里存储项目。\n7.  选择一个文件夹来存储你的项目，然后点击“创建”按钮。\n8.  在项目导航器中点击\
  \ `MainMenu.xib` 文件。\n9.  点击 `StructureProgram` 图标，使用户界面窗口显示出来。\n10.  选择“视图” ➤ “工具”\
  \ ➤ “显示对象库”，让对象库出现在 Xcode 窗口的右下角。\n11.  将两个按钮、四个标签和四个文本字段拖到用户界面上，然后双击按钮和标签更改其上显示的文本，使其看起来类似于图\
  \ 12-4。\n\n![A437923_1_En_12_Fig4_HTML.jpg](img/A437923_1_En_12_Fig4_HTML.jpg)\n\
  \n图 12-4. `StructureProgram` 的用户界面\n\n在适当的文本字段中输入姓名、地址和电话号码后，“添加”按钮会将此信息存储到一个结构体中，然后将该结构体存储到一个数组中。每次你添加另一个姓名、地址和电话号码时，都会向数组添加另一个结构体，同时“姓名总数”文本字段会持续更新显示数组中存储的结构体总数。\n\
  \n“视图”按钮会从数组中移除最后一项，并在一个警告对话框中显示其内容，以便你验证其内容。然后它会显示数组中新的结构体总数。\n\n每个文本字段都需要一个单独的\
  \ `IBOutlet`，每个按钮都需要一个单独的 `IBAction` 方法。你可以通过从用户界面按住 Control 键拖动每个项目到你的 `AppDelegate.swift`\
  \ 文件中来创建这些。\n\n\n\n1.  在你的用户界面仍然显示在 Xcode 窗口中的情况下，选择 View ➤ Assistant Editor ➤ Show\
  \ Assistant Editor。`AppDelegate.swift` 文件会出现在用户界面旁边。\n2.  将鼠标移到 Add 按钮上，按住 Control\
  \ 键，然后向下拖动到 `AppDelegate.swift` 文件底部最后一个右花括号的正上方。\n3.  松开鼠标和 Control 键。会弹出一个窗口。\n\
  4.  点击 Connection 弹出菜单，然后选择 Action。\n5.  点击 Name 文本字段，输入 `addData`。\n6.  点击 Type\
  \ 弹出菜单，然后选择 NSButton。接着点击 Connect 按钮。\n7.  将鼠标移到 View 按钮上，按住 Control 键，然后向下拖动到 `AppDelegate.swift`\
  \ 文件底部最后一个右花括号的正上方。\n8.  松开鼠标和 Control 键。会弹出一个窗口。\n9.  点击 Connection 弹出菜单，然后选择 Action。\n\
  10. 点击 Name 文本字段，输入 `viewButton`。\n11. 点击 Type 弹出菜单，然后选择 NSButton。接着点击 Connect 按钮。`AppDelegate.swift`\
  \ 文件的底部应该看起来像这样：\n\n```\n    @IBAction func addData(_ sender: NSButton) {\n    }\n\
  \    @IBAction func viewData(_ sender: NSButton) {\n    }\n    ```\n\n12. 将鼠标移到\
  \ Add 按钮右侧的 Name 文本字段上，按住 Control 键，然后向下拖动到 `AppDelegate.swift` 文件中 `@IBOutlet`\
  \ 行的下方。\n13. 松开鼠标和 Control 键。会弹出一个窗口。\n14. 点击 Name 文本字段，输入 `nameField`，然后点击 Connect\
  \ 按钮。\n15. 将鼠标移到 Add 按钮右侧的 Address 文本字段上，按住 Control 键，然后向下拖动到 `AppDelegate.swift`\
  \ 文件中 `@IBOutlet` 行的下方。\n16. 松开鼠标和 Control 键。会弹出一个窗口。\n17. 点击 Name 文本字段，输入 `addressField`，然后点击\
  \ Connect 按钮。\n18. 将鼠标移到 Delete 按钮右侧的 Phone 文本字段上，按住 Control 键，然后向下拖动到 `AppDelegate.swift`\
  \ 文件中 `@IBOutlet` 行的下方。\n19. 松开鼠标和 Control 键。会弹出一个窗口。\n20. 点击 Name 文本字段，输入 `phoneField`，然后点击\
  \ Connect 按钮。\n21. 将鼠标移到 Query 按钮右侧的 Total Names 文本字段上，按住 Control 键，然后向下拖动到 `AppDelegate.swift`\
  \ 文件中 `@IBOutlet` 行的下方。\n22. 松开鼠标和 Control 键。会弹出一个窗口。\n23. 点击 Name 文本字段，输入 `totalField`，然后点击\
  \ Connect 按钮。现在你应该拥有代表用户界面上所有文本字段的以下 IBOutlets：\n\n```\n    @IBOutlet weak var window:\
  \ NSWindow!\n    @IBOutlet weak var nameField: NSTextField!\n    @IBOutlet weak\
  \ var addressField: NSTextField!\n    @IBOutlet weak var phoneField: NSTextField!\n\
  \    @IBOutlet weak var totalField: NSTextField!\n    ```\n\n至此，你已经将用户界面连接到 Swift\
  \ 代码，这样你就可以使用 IBOutlets 来检索和显示用户界面上的数据。你还创建了 IBAction 方法，以便用户界面上的按钮能真正使程序工作。现在你只需要编写\
  \ Swift 代码来创建一个初始结构，然后再编写更多 Swift 代码来创建一个包含该结构的数组。\n24. 在 `AppDelegate.swift` 文件中\
  \ `@IBOutlet` 列表的下方，输入以下内容来创建一个能包含三个字符串（name、address 和 phone）的结构、一个代表该结构的变量以及一个结构数组：\n\
  \n```\n    struct Person {\n    var name : String = \"\"\n    var address : String\
  \ = \"\"\n    var phone : String = \"\"\n    }\n    var employee = Person()\n  \
  \  var arrayOfStructures = [Person] ()\n    ```\n\n25. 修改 `addData` IBAction 方法，使其从\
  \ Name、Address 和 Phone 文本字段获取值，并将它们存储在 `employee` 结构中。然后将该结构存储到数组中，在 Total Names\
  \ 文本字段中显示数组项的总数，并清空 Name、Address 和 Phone 文本字段：\n\n```\n    @IBAction func addData(_\
  \ sender: NSButton) {\n    employee.name = nameField.stringValue\n    employee.address\
  \ = addressField.stringValue\n    employee.phone = phoneField.stringValue\n    arrayOfStructures.append(employee)\n\
  \    totalField.integerValue = arrayOfStructures.count\n    nameField.stringValue\
  \ = \"\"\n    addressField.stringValue = \"\"\n    phoneField.stringValue = \"\"\
  \n    }\n    ```\n\n26. 修改 `viewData` IBAction 方法，使其从 Key 文本字段获取一个值，并从字典中删除关联的值，如下所示：\n\
  \n```\n    @IBAction func viewData(_ sender: NSButton) {\n    let myAlert = NSAlert()\n\
  \    if arrayOfStructures.isEmpty {\n    myAlert.messageText = \"Array is empty\"\
  \n    myAlert.runModal()\n    } else {\n    var personData = Person()\n    personData\
  \ = (arrayOfStructures.removeLast())\n    totalField.integerValue = arrayOfStructures.count\n\
  \    myAlert.messageText = personData.name + \"\\r\\n\" + personData.address + \"\
  \\r\\n\" + personData.phone\n    myAlert.runModal()\n    }\n    }\n    ```\n\n`viewData`\
  \ IBAction 方法中的代码创建了一个警报对话框。然后它检查数组是否为空。如果是，它会在警报对话框中显示 \"Array is empty\"。\n\n\
  如果数组不为空，则移除数组中存储的最后一个结构，在 Total Names 文本字段中显示数组项的新总数，并在警报对话框中显示被移除的结构数据。\n\n`AppDelegate.swift`\
  \ 文件的完整内容应该看起来像这样：\n\n```\nimport Cocoa\n@NSApplicationMain\nclass AppDelegate:\
  \ NSObject, NSApplicationDelegate {\n@IBOutlet weak var window: NSWindow!\n@IBOutlet\
  \ weak var nameField: NSTextField!\n@IBOutlet weak var addressField: NSTextField!\n\
  @IBOutlet weak var phoneField: NSTextField!\n@IBOutlet weak var totalField: NSTextField!\n\
  struct Person {\nvar name : String = \"\"\nvar address : String = \"\"\nvar phone\
  \ : String = \"\"\n}\nvar employee = Person()\nvar arrayOfStructures = [Person]\
  \ ()\nfunc applicationDidFinishLaunching(_ aNotification: Notification) {\n// Insert\
  \ code here to initialize your application\n}\nfunc applicationWillTerminate(_ aNotification:\
  \ Notification) {\n// Insert code here to tear down your application\n}\n@IBAction\
  \ func addData (_ sender: NSButton) {\nemployee.name = nameField.stringValue\nemployee.address\
  \ = addressField.stringValue\nemployee.phone = phoneField.stringValue\narrayOfStructures.append(employee)\n\
  totalField.integerValue = arrayOfStructures.count\nnameField.stringValue = \"\"\n\
  addressField.stringValue = \"\"\nphoneField.stringValue = \"\"\n}\n@IBAction func\
  \ viewData(_ sender: NSButton) {\nlet myAlert = NSAlert()\nif arrayOfStructures.isEmpty\
  \ {\nmyAlert.messageText = \"Array is empty\"\nmyAlert.runModal()\n} else {\nvar\
  \ personData = Person()\npersonData = (arrayOfStructures.removeLast())\ntotalField.integerValue\
  \ = arrayOfStructures.count\nmyAlert.messageText = personData.name + \"\\r\\n\"\
  \ + personData.address + \"\\r\\n\" + personData.phone\nmyAlert.runModal()\n}\n\
  }\n}\n```\n\n要查看这个程序如何工作，请遵循以下步骤：\n\n1.  选择 Product ➤ Run。Xcode 运行你的 StructureProgram\
  \ 项目。\n2.  点击 Name 文本字段，输入 Bob。\n3.  点击 Address 文本字段，输入 123 Main。\n4.  点击 Phone\
  \ 文本字段，输入 555-1234。\n5.  点击 Add 按钮。程序在 Total Names 文本字段中显示数组中的项目数量（1）。\n6.  重复步骤\
  \ 2–5，但输入名字 Jane、地址 90 Oak Lane 和电话号码 555-9874。Total Names 文本字段中会显示数字 2。\n7.  点击\
  \ View 按钮。会出现一个警报对话框，显示 Jane、90 Oak Lane 和 555-9874，如图 12-5 所示。\n\n\n\n![A437923_1_En_12_Fig5_HTML.jpg](img/A437923_1_En_12_Fig5_HTML.jpg)\n\
  \n**图 12-5.**  \n一个显示最后添加到数组中的结构的提醒对话框\n\n8.  点击“确定”关闭提醒对话框。\n9.  选择 StructureProgram\
  \ ➤ 退出 StructureProgram。\n\n### 摘要\n\n每个程序都需要存储和操作数据。在最简单的层面，你可以将数据存储在 Swift 的基本数据类型（`Int`、`Double`、`Float`、`String`）之一中。为了让这些基本数据类型更具描述性，你可以使用\
  \ `typealiases`，它能让你选择一个更有意义的名字来表示一个基本数据类型，例如 `String` 或 `Double`。\n\n要创建你自己的数据类型并限制其能保存的值，你可以使用枚举。枚举让你列出该枚举所能包含的所有可能选项，从而可以创建更具描述性的名称。\n\
  \n如果你想将相关的数据分组在一起，无论其数据类型如何，都可以使用结构体。通过将结构体与数组等其他数据结构结合，你可以创建相关数据的列表。组合数据结构可以让你以对程序最高效的方式来组织数据。\n\
  \n"
- "# 13. 创建类与对象\n\n使用 Xcode 在 Swift 中编程的核心是面向对象编程。其主要思想是将一个大型程序划分为独立的对象，其中每个对象理想地代表一个物理实体。例如，如果你正在创建一个控制汽车的程序，一个对象可能代表汽车的引擎，第二个对象代表汽车的娱乐系统，第三个对象代表汽车的加热和冷却系统。\n\
  \n现在，如果你想要更新程序中控制汽车引擎的部分，你只需修改或替换控制该引擎的对象。对象不仅帮助你更好地理解程序的不同部分如何协同工作，还能隔离代码，这样你就可以创建构建块，以组合出更大、更复杂的程序。\n\
  \n对象帮助你像看待彼此独立的构建块一样来审视你的程序。在面向对象编程出现之前，程序员将程序划分为函数，这些函数也类似于微型的构建块。函数和对象之间的主要区别在于，函数可以访问其他函数使用的数据。这意味着如果你修改了一个函数，常常会在无意中影响到程序的其他部分。这不仅使得修复错误或缺陷变得困难，也让修改程序变得棘手。\n\
  \n而对于对象，其主要思想是创建独立、自足的构建块，它们协同工作且互不影响彼此的数据。为了保持数据隔离，对象使用了封装。这意味着一个对象拥有自己的变量（称为属性）和函数（称为方法）。\n\
  \n修改对象中数据的唯一方法是使用该对象的方法。这样，如果出现问题，你可以将问题定位到该对象的方法上。没有对象，程序的任何部分都可能干扰另一部分所使用的数据，这使得查找和修复问题几乎不可能。\n\
  \n对象可以通过两种方式相互通信：\n\n*   在另一个对象的属性中存储新值\n*   调用另一个对象的方法\n\n理想情况下，一个程序应由完全独立执行任务的对象组成。这使得通过用一个对象的改进版本来替换它，来修改程序变得简单。\n\
  \n## 创建类\n\n创建对象有两个步骤。首先，你必须创建一个类。其次，基于该类创建一个对象。\n\n一个类的外观和工作方式与结构体非常相似（参见第 12 章）。主要区别在于，结构体只包含数据，而类可以包含数据以及操作这些数据的函数。\n\
  \n一旦定义了类，你就可以基于该类创建一个或多个对象。可以把类看作是定义饼干形状的模具，而对象则是你可以根据该类定义的不同类型的面团。\n\n你可以定义的最简单的类如下所示：\n\
  \n```\nclass ClassName {\n}\n```\n\n要从此类创建对象，你只需声明一个变量，但不是定义像 `Int` 或 `String` 这样的数据类型，而是定义类的名称，例如：\n\
  \n```\nvar myObject = ClassName()\n```\n\n当然，一个不含任何代码的类是无用的，因此你可以在类中包含的两种代码是变量（称为属性）和用于操作数据的函数（称为方法）。在类中创建属性涉及创建一个或多个变量，并定义数据类型和初始值，例如：\n\
  \n```\nclass ClassName {\nvar name : String = \"\"\nvar ID : Int = 0\nvar salary\
  \ : Double = 0\n}\n```\n\n初始值很重要，因为当你在类的基础上创建对象时，你不希望存在未初始化的值，这些值在你尝试使用它们时可能会引发问题。\n\
  \n要定义属性，你需要声明一个变量名、数据类型和初始值。由于 Swift 可以推断数据类型，你可以省略数据类型声明，只分配初始值，像这样：\n\n```\nclass\
  \ ClassName {\nvar name = \"\"\nvar ID  = 0\nvar salary = 0\n}\n```\n\n如果你不确定要存储何种类型的初始值，你可以直接使用可选变量，例如：\n\
  \n```\nclass ClassName {\nvar name : String?\nvar ID : Int?\nvar salary : Double?\n\
  }\n```\n\n可选变量的初始值为 `nil`，因此你最终很可能需要存储实际的值。\n\n无论你是用初始值定义类的属性，还是用可选变量将其定义为 `nil`\
  \ 值，你都可以通过创建一个变量名，将其赋值为类名，并在其后跟一对空括号来从该类创建对象，如下所示：\n\n```\nvar myObject = ClassName()\n\
  ```\n\n以上两种方法都会为类的属性创建相同的初始值。为了更灵活，你可以创建一个名为 `init` 的初始化方法。它允许你在每次从类创建对象时定义初始值。类中的初始化器可能如下所示：\n\
  \n```\nclass SecondClass {\nvar name : String\nvar ID : Int\nvar salary : Double\n\
  init (name: String, ID: Int, salary: Double) {\nself.name = name\nself.ID = ID\n\
  self.salary = salary\n}\n}\n```\n\n这个初始化方法 (`init`) 定义了一个接受三个参数（一个字符串、一个整数和一个双精度浮点值）的参数列表。然后它将这些信息分别存储在\
  \ `name`、`ID` 和 `salary` 属性中。当一个类具有初始化器时，你必须通过包含与初始化器参数列表匹配的正确数量和数据类型来创建该类的对象。\n\
  \n这意味着在括号中包含一个字符串、一个整数和一个双精度浮点值来创建对象，像这样：\n\n```\nvar secondObject = SecondClass\
  \ (name: \"Joe\", ID: 102, salary: 120000)\n```\n\n请注意，当你在参数列表中包含数据时，必须使用初始化器参数列表中定义的变量名来标记每个数据块。在这个例子中，三个参数名是\
  \ `name`、`ID` 和 `salary`，因此创建对象意味着使用相同的这些参数名来标识数据。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n### 访问对象中的属性\n\n要访问对象的属性，您必须指定对象名称，后跟一个句点和属性名称，例如：\n\n```\nobjectName.propertyName\
  \ = data\n```\n\n您也可以将对象的属性值赋给一个变量，如下所示：\n\n```\nvar person = myObject.name\n```\n\
  \n要访问属性，您需要指定对象名称、一个句点以及您想要访问的属性名称，例如：\n\n```\nprint (person.name)\n```\n\n**注意**\
  \  \n访问存储在属性中的值时，请确保指定的是对象名称，而不是类名。如果您从 `ClassName` 类创建了一个 `person` 对象，则应通过指定对象名称\
  \ (`person`) 和属性名称 (`name`、`ID`、`salary`) 来访问属性，例如 `person.name` 或 `person.ID`。您不能通过使用类名（如\
  \ `ClassName.name` 或 `className.ID`）来访问属性值。如果您尝试这样做，代码将无法运行。\n\n与普通变量一样，对象的属性每次只能保存一个数据块。一旦您在属性中存储了新数据，就会覆盖之前的数据。\n\
  \n要了解如何创建类并使用对象的属性，请遵循以下步骤：\n\n1.  确保 `IntroductoryPlayground` 文件已在 Xcode 中加载。\n\
  2.  按如下方式编辑代码：\n\n```\nimport Cocoa\nclass ClassName {\nvar name = \"\"\nvar ID\
  \  = 0\nvar salary = 0\n}\nvar worker = ClassName()\nworker.name = \"Bob\"\nworker.ID\
  \ = 102\nworker.salary = 10\nclass SecondClass {\nvar name : String\nvar ID : Int\n\
  var salary : Double\ninit (name: String, ID: Int, salary: Double) {\nself.name =\
  \ name\nself.ID = ID\nself.salary = salary\n}\n}\nvar executive = SecondClass (name:\
  \ \"Joe\", ID: 17, salary: 50000)\nprint (worker.name)\nprint (worker.ID)\nprint\
  \ (worker.salary)\nprint (executive.name)\nprint (executive.ID)\nprint (executive.salary)\n\
  ```\n\n第一个类在声明其属性时对其进行了初始化。然后，它基于该类 (`ClassName`) 创建了一个对象 (`worker`)。为了在 `worker`\
  \ 对象中存储数据，代码指定了对象名称 (`worker`) 和属性名称，并为其赋值。\n\n第二个类示例使用初始化器来定义属性值。`init` 方法按顺序接受三个数据块：一个字符串、一个整数和一个十进制\
  \ (`Double`) 值。\n\n要从第二个类 (`SecondClass`) 创建一个对象 (`executive`)，括号中需要包含正确数量和顺序的数据，以及正确的数据类型，此外还要显示一个标签来标识数据的含义，如图\
  \ 13-1 所示。\n\n![A437923_1_En_13_Fig1_HTML.jpg](img/A437923_1_En_13_Fig1_HTML.jpg)\n\
  \n**图 13-1.** 创建类文件并访问属性\n\n### 对象中的计算属性\n\n作为为属性定义固定值的一种替代方案，您还可以使用计算属性，其中一个属性的初始值取决于另一个属性的值。创建计算属性的最简单方法是定义一个属性名称、数据类型，然后在大括号中编写计算值的代码。最后，使用\
  \ `return` 关键字定义要存储在该属性中的值。\n\n这个计算属性只是获取存储在 `height` 属性中的值，将其乘以 2，然后将结果存储在 `width`\
  \ 属性中。当您基于 `shape` 类创建对象时，初始值 5 会存储在 `height` 属性中，计算属性会将 `height` 值 (5) 乘以 2 得到\
  \ 10，并将其存储在 `width` 属性中，如图 13-2 所示。\n\n![A437923_1_En_13_Fig2_HTML.jpg](img/A437923_1_En_13_Fig2_HTML.jpg)\n\
  \n**图 13-2.** 使用计算属性来确定属性的初始值\n\n在这个计算属性的示例中，一个属性 (`width`) 的值是通过获取另一个属性 (`height`)\
  \ 的值来确定其自身值的。在技术术语中，这被称为 getter。\n\n### 设置其他属性\n\n另一种在属性中存储值的选项是使用所谓的 setter。使用\
  \ setter，定义一个属性会设置另一个属性的值。由于 getter 和 setter 非常相似，它们通常在同一属性中使用。这样，一个属性使用 getter\
  \ 从另一个属性计算其值，因此如果您为该属性设置一个值，它可以更改另一个属性。定义 getter 和 setter 如下所示：\n\n```\nclass Blob\
  \ {\nvar property1 : dataType = value\nvar property2 : dataType {\nget {\nreturn\
  \ valueHere\n}\nset {\nproperty1 = valueHere\n}\n}\n}\n```\n\n在 getter 中，您始终需要一个\
  \ `return` 关键字来将值返回给拥有该 getter 的属性。在 setter 中，您必须将一个属性赋值给一个值。这个值可以是一个固定值，也可以是一个返回值的计算结果。\n\
  \n**注意**  \n您不需要同时拥有 getter 和 setter。您可以只使用 getter，通过省略 `get` 关键字并将代码仅用大括号括起来来简化它，就像本节开头\
  \ `shape` 类示例中那样。您也可以只使用 setter，但需要使用 `set` 关键字。\n\n在上面的示例中，每当 `property2` 被赋予一个新值时，它都会使用其\
  \ setter 为 `property1` 定义一个新值。\n\nSetter 还可以接受一个值，并使用该值为不同的属性计算新结果。要接受一个 setter\
  \ 的值，您只需要创建一个用括号括起来的变量，并使用该值为另一个属性计算结果，例如：\n\n```\nclass Blob {\nvar property1 :\
  \ dataType = value\nvar property2 : dataType {\nget {\nreturn valueHere\n}\nset\
  \ (newValue) {\nproperty1 = valueHere based on newValue\n}\n}\n}\n```\n\n要了解 getter\
  \ 和 setter 如何工作，请遵循以下步骤：\n\n1.  确保您的 `IntroductoryPlayground` 文件已加载到 Xcode 中。\n\
  2.  按如下方式编辑代码：\n\n```\nimport Cocoa\nclass Shape {\nvar height : Int = 5\nvar width\
  \ : Int {\nreturn height * 2\n}\n}\nvar rectangle = Shape()\nprint (rectangle.height)\n\
  print (rectangle.width)\nrectangle.height = 20\nprint (rectangle.width)\nclass Blob\
  \ {\nvar height : Int = 5\nvar width : Int = 10\nvar area : Int {\nget {\nreturn\
  \ height * width\n}\nset (newValue) {\nheight = newValue + 10\nwidth = newValue\
  \ - 5\n}\n}\n}\nvar CEO = Blob()\nprint (CEO.area)\nCEO.area = 247\nprint (CEO.height)\n\
  print (CEO.width)\n```\n\n您可以将 getter 和 setter 视为改变其他属性的函数。不过，在使用 getter 和 setter\
  \ 时要小心，因为如果您不了解它们的存在或工作原理，它们可能会导致意外行为。图 13-3 显示了上述代码的结果，以便您了解 getter 和 setter 如何影响属性。\n\
  \n![A437923_1_En_13_Fig3_HTML.jpg](img/A437923_1_En_13_Fig3_HTML.jpg)\n\n**图 13-3.**\
  \ 使用 getter 和 setter 修改属性\n\n\n\n### 使用属性观察器\n\nSwift 提供了两个名为 `willSet` 和 `didSet`\
  \ 的属性观察器。`willSet` 属性观察器在属性接收新值之前运行代码。`didSet` 属性观察器在属性接收新值之后运行代码。\n\n与 getter 和\
  \ setter 类似，属性观察器本质上是在属性获得新值时运行的函数。`willSet` 和 `didSet` 属性观察器的基本结构与 getter 和 setter\
  \ 的结构相同：\n\n```\nvar property : dataType = initialValue {\nwillSet {\n}\ndidSet\
  \ {\n}\n}\n```\n\n`willSet` 属性观察器在属性获得新值之前运行代码。`didSet` 属性观察器在属性获得新值之后运行代码。要了解属性观察器的工作原理，请按照以下步骤操作：\n\
  \n1.  确保你的 `IntroductoryPlayground` 文件已加载到 Xcode 中。  \n2.  按如下方式编辑代码：\n\n    ```\n\
  \    import Cocoa\n    class Animal {\n    var IQ : Int = 0\n    var legs : Int\
  \ = 0 {\n    willSet {\n    IQ += 10\n    }\n    didSet {\n    IQ -= 3\n    }\n\
  \    }\n    }\n    var pet = Animal()\n    print (pet.IQ)\n    pet.legs = 4\n  \
  \  print (pet.IQ)\n    ```\n\n在这个例子中，`IQ` 属性的初始值为 0。请注意，当你将 `legs` 属性设置为 4 时，它会立即运行\
  \ `willSet` 属性观察器中的代码，该代码将 `IQ` 属性增加 10。然后它会立即运行 `didSet` 属性观察器中的代码，该代码减去 3，如图 13-4\
  \ 所示。\n\n![A437923_1_En_13_Fig4_HTML.jpg](img/A437923_1_En_13_Fig4_HTML.jpg)\n\n\
  图 13-4。\n\n使用属性观察器\n\n## 创建方法\n\n一个仅仅存储一个或多个属性的类可以方便地将相关数据分组在一起。然而，使面向对象编程更有用的是，对象也可以操作自己的数据。要为对象创建要运行的小程序，你需要在类内部定义函数（称为方法）。\n\
  \n当你从用户界面连接按钮以在 Swift 代码文件中创建 IBAction 方法时，你已经见过方法了。类内部最简单的方法执行完全相同的功能：\n\n```\n\
  class CountDown {\nvar counter = 10\nfunc decrement() {\ncounter = counter - 1\n\
  }\n}\n```\n\n这个 `decrement` 方法简单地从 `counter` 属性中减去 1，该属性的初始值为 10。要使此方法运行，你必须指定对象名称、一个点和方法名称，如下所示：\n\
  \n```\nvar myObject = CountDown ()\nmyObject.decrement()\n```\n\n这个 `decrement`\
  \ 方法每次做的事情完全相同，即从 `counter` 属性中减去 1。一个更有趣且灵活的方法会接受数据（一个或多个参数）来修改方法中代码的工作方式，例如：\n\
  \n```\nclass CountDown {\nvar counter = 10\nfunc decrement() {\ncounter = counter\
  \ - 1\n}\nfunc decrementByValue (step : Int) {\ncounter -= step\n}\n}\n```\n\n第二个方法\
  \ `decrementByValue` 接受一个整数，该整数存储在一个名为 `step` 的变量中。然后它从 `counter` 属性中减去 `step` 的值，如图\
  \ 13-5 所示。\n\n![A437923_1_En_13_Fig5_HTML.jpg](img/A437923_1_En_13_Fig5_HTML.jpg)\n\
  \n图 13-5。\n\n运行一个接受值的方法\n\n当一个方法接受数据时，它也可以返回一个特定的值。要创建这样的方法，你需要标识该方法返回的数据类型（使用 `➤`\
  \ 符号）以及定义要返回的具体值的 `return` 关键字。\n\n因此，如果你想创建一个返回 `Float` 数据类型的方法，你可以定义一个如下所示的方法：\n\
  \n```\nclass MathBrain {\nvar tempValue: Float = 0\nfunc average (first : Float,\
  \ second : Float) -> Float {\nreturn (first + second) / 2\n}\n}\n```\n\n此方法接受两个\
  \ `Float` 数字（存储在名为 `first` 和 `second` 的变量中）并返回一个 `Float` 值。要调用此方法，你需要指定一个对象名称、一个点、方法名称以及两个\
  \ `Float` 数据类型的数字。\n\n请注意，此方法有两个名为 `first` 和 `second` 的参数。传递参数时，你必须指定参数名称（`first`\
  \ 和 `second`），例如：\n\n```\nvar math = MathBrain()\nvar temp : Float = math.average(first:\
  \ 4.0, second: 9.0)\nprint (temp)\n```\n\n要了解如何创建一个集合，并向其中添加和删除数据，请按照以下步骤创建一个新的\
  \ playground：\n\n1.  确保你的 `IntroductoryPlayground` 文件已加载到 Xcode 中。  \n2.  按如下方式编辑代码：\n\
  \n    ```\n    import Cocoa\n    class MathBrain {\n    var tempValue: Float = 0\n\
  \    func average (first : Float, second : Float) -> Float {\n    return (first\
  \ + second) / 2\n    }\n    }\n    var math = MathBrain()\n    var temp : Float\
  \ = math.average(first: 4.0, second: 9.0)\n    print (temp)\n    ```\n\n`average`\
  \ 方法接受两个参数，将它们相加，然后除以 2。然后它使用 `return` 关键字返回此值。\n\n当给 `average` 方法传递数字 4.0 和 9.0\
  \ 时，它返回 6.5 的值，该值存储在一个名为 `temp` 的变量中，如图 13-6 所示。\n\n![A437923_1_En_13_Fig6_HTML.jpg](img/A437923_1_En_13_Fig6_HTML.jpg)\n\
  \n图 13-6。\n\n向对象中的方法传递参数\n\n\n\n## 在 macOS 程序中使用对象\n\n对象可以包含任意数量的属性，这些属性可以保存整数或字符串等简单数据类型，也可以保存元组、集合或数组等更复杂的数据类型。一个对象还可以包含一个或多个方法，这些方法通常用于操作该对象的属性。\n\
  \n在这个示例程序中，你将定义一个类，并基于该类创建两个对象。你还将了解如何将类存储在单独的文件中。与其将所有内容塞进一个文件，不如将代码分别存储在多个文件中，这样更便于管理。\n\
  \n这两个对象将会运行存储在另一个对象中的方法。用户界面也会从两个对象的属性中检索值，并将其显示在用户界面的文本字段中。\n\n为了进一步了解用户界面，你还将学习如何将两个按钮连接到同一个\
  \ `IBAction` 方法，并确定用户点击了哪个按钮。和往常一样，你将了解如何通过 `IBOutlet` 在用户界面元素中显示数据。要创建这个示例程序，请按照以下步骤操作：\n\
  \n1.  在 Xcode 中选择“文件”➤“新建”➤“项目”。\n2.  点击 macOS 类别下的“应用”。\n3.  点击“Cocoa 应用”，然后点击“下一步”按钮。Xcode\
  \ 现在会要求输入产品名称。\n4.  点击“产品名称”文本字段，然后输入 `ObjectProgram`。\n5.  确保“语言”弹出菜单显示为 Swift，并且没有选中任何复选框。\n\
  6.  点击“下一步”按钮。Xcode 会询问你想将项目存储在何处。\n7.  选择一个文件夹来存储你的项目，然后点击“创建”按钮。\n8.  在项目导航器中点击\
  \ `MainMenu.xib` 文件。\n9.  点击 ObjectProgram 图标以显示用户界面窗口。\n10. 选择“视图”➤“工具”➤“显示对象库”，使对象库出现在\
  \ Xcode 窗口的右下角。\n11. 将两个按钮、两个标签和两个文本字段拖到用户界面上，然后双击按钮和标签，更改其上显示的文本，使其看起来类似于图 13-7。\n\
  \n![A437923_1_En_13_Fig7_HTML.jpg](img/A437923_1_En_13_Fig7_HTML.jpg)\n\n**图 13-7.**\
  \ ObjectProgram 的用户界面\n\n该用户界面将显示两个角色（警长和歹徒）的生命值点数。每次你点击“警长射击”或“歹徒射击”按钮时，一个 `IBAction`\
  \ 方法会随机判断另一个角色是否被击中。如果被击中，它还会判断射击造成了多少伤害，伤害范围为 1 到 3。任何变化都会显示在“警长”或“歹徒”标签下方的文本字段中。\n\
  \n“警长射击”和“歹徒射击”按钮运行一个 `IBAction` 方法，该方法首先判断用户点击的是哪个按钮，是“警长射击”按钮还是“歹徒射击”按钮。为了识别用户点击了哪个按钮，你需要修改每个按钮的\
  \ `Tag` 属性，使“警长射击”按钮的 `Tag` 值为 0，“歹徒射击”按钮的 `Tag` 值为 1。\n\n在确定是警长还是歹徒在射击之后，`IBAction`\
  \ 方法会运行 `shoot` 方法，该方法随机判断射击是否命中以及造成的伤害，伤害值会从每个对象的 `hitPoints` 属性中减去。\n\n生命值点总数会显示在“警长”和“歹徒”标签下方的文本字段中。一旦警长或歹徒的生命值点总数降至\
  \ 0 或以下，就会弹出一个警告对话框，告知你警长或歹徒是否死亡。要将你的用户界面连接到 Swift 代码，请按照以下步骤操作：\n\n1.  在 Xcode\
  \ 窗口中用户界面仍然可见的情况下，选择“视图”➤“辅助编辑器”➤“显示辅助编辑器”。`AppDelegate.swift` 文件会出现在用户界面旁边。\n2.\
  \  将鼠标移到“警长射击”按钮上，按住 Control 键，然后拖拽到 `AppDelegate.swift` 文件底部最后一个大括号的上方。\n3.  松开鼠标和\
  \ Control 键。会弹出一个弹出窗口。\n4.  在“连接”弹出菜单中点击，然后选择“操作”。\n5.  在“名称”文本字段中点击，然后输入 `shootButton`。\n\
  6.  在“类型”弹出菜单中点击，然后选择 NSButton。接着点击“连接”按钮。\n7.  将鼠标移到“歹徒射击”按钮上，按住 Control 键，然后拖拽到你刚刚创建的现有\
  \ `IBAction` `shootButton` 方法上，直到整个方法高亮显示，如图 13-8 所示。\n\n![A437923_1_En_13_Fig8_HTML.jpg](img/A437923_1_En_13_Fig8_HTML.jpg)\n\
  \n**图 13-8.** 将“歹徒射击”按钮连接到现有的 `IBAction` 方法\n\n8.  松开鼠标和 Control 键，将“歹徒射击”按钮连接到现有的\
  \ `IBAction` `shootButton` 方法。\n9.  将鼠标移到“警长”文本字段上，按住 Control 键，然后拖拽到 `AppDelegate.swift`\
  \ 文件中 `@IBOutlet` 行的下方。\n10. 松开鼠标和 Control 键。会弹出一个弹出窗口。\n11. 在“名称”文本字段中点击，然后输入 `sheriffHitPoints`，并点击“连接”按钮。\n\
  12. 将鼠标移到出现在“添加”按钮右侧的“歹徒”文本字段上，按住 Control 键，然后拖拽到 `AppDelegate.swift` 文件中 `@IBOutlet`\
  \ 行的下方。\n13. 松开鼠标和 Control 键。会弹出一个弹出窗口。\n14. 在“名称”文本字段中点击，然后输入 `outlawHitPoints`，并点击“连接”按钮。现在，你应该拥有以下这些\
  \ `IBOutlet`，它们代表了你用户界面上的所有文本字段：\n\n```\n@IBOutlet weak var window: NSWindow!\n\
  @IBOutlet weak var sheriffHitPoints: NSTextField!\n@IBOutlet weak var outlawHitPoints:\
  \ NSTextField!\n```\n\n此时，你已经将用户界面连接到了 Swift 代码，因此你可以使用 `IBOutlet` 在用户界面上显示数据。你还创建了一个单一的\
  \ `IBAction` 方法，当用户点击两个按钮中的任意一个时，该方法会运行。现在你需要更改“歹徒射击”按钮的 `Tag` 属性。\n\n1.  点击“歹徒射击”按钮以选中它。\n\
  2.  选择“视图”➤“工具”➤“显示属性检查器”。“属性检查器”面板会出现在 Xcode 窗口的右上角。\n3.  向下滚动到“视图”类别，然后将 `Tag`\
  \ 属性更改为 1，如图 13-9 所示。\n\n![A437923_1_En_13_Fig9_HTML.jpg](img/A437923_1_En_13_Fig9_HTML.jpg)\n\
  \n**图 13-9.** “属性检查器”面板底部的 `Tag` 属性\n\n既然你已经定义好了用户界面，下一步就是创建一个单独的 Swift 文件来存放你的类，你可以按照以下步骤进行操作：\n\
  \n1.  选择“文件”➤“新建”➤“文件”。会出现一个对话框，要求你选择要使用的模板。\n2.  点击 macOS 类别下的“源”，然后点击“Swift 文件”，如图\
  \ 13-10 所示。\n\n![A437923_1_En_13_Fig10_HTML.jpg](img/A437923_1_En_13_Fig10_HTML.jpg)\n\
  \n**图 13-10.** 选择用于存放类定义代码的文件\n\n3.  点击“下一步”按钮。Xcode 会询问你想将这个文件存储在哪里，以及你想给它起什么名字。\n\
  4.  在“保存为”文本字段中点击，然后输入 `personClass`。接着点击“创建”按钮。Xcode 会在“项目导航器”面板中显示 `personClass.swift`\
  \ 文件。\n5.  在“项目导航器”面板中点击 `personClass.swift` 文件。Xcode 会显示该文件的内容。\n6.  按如下方式编辑 `personClass.swift`\
  \ 文件：\n\n\n```swift\nimport Foundation\nclass Person {\nvar hitPoints = 10\nfunc\
  \ shoot () -> Int {\nlet odds = 1 + Int(arc4random_uniform(3))\nif odds == 3 {\n\
  // 命中，随机在 1 到 3 之间决定伤害值\nreturn 1 + Int(arc4random_uniform(3))\n} else {\nreturn\
  \ 0 // 未命中\n}\n}\n}\n```\n\n这个类定义了一个名为 `hitPoints` 的属性，并将它初始化为 10。它还定义了一个名为 `shoot`\
  \ 的方法，这个方法不接受任何参数，但返回一个整型值。在 `shoot` 方法内部，它会计算一个 1 到 3 之间的随机数，并将这个值存储在 `odds` 变量中。\n\
  \n接下来，它会检查 `odds` 的值是否正好等于 3。如果是，则再计算一个 1 到 3 之间的随机数并返回该值；如果 `odds` 的值不是 3，则方法返回\
  \ 0。\n\n现在你已经在单独的 Swift 文件中定义了一个类，是时候使用这个类来创建对象了。你可以按照以下步骤操作：\n\n1. 在项目导航面板中点击 `AppDelegate.swift`\
  \ 文件。Xcode 会显示 `AppDelegate.swift` 文件的内容。\n2. 在 `AppDelegate.swift` 文件的 IBOutlet\
  \ 列表下方，输入以下代码，基于 `personClass.swift` 文件中定义的 person 类创建两个对象：\n\n```swift\n@IBOutlet\
  \ weak var window: NSWindow!\n@IBOutlet weak var sheriffHitPoints: NSTextField!\n\
  @IBOutlet weak var outlawHitPoints: NSTextField!\nvar sheriff = Person ()\nvar outlaw\
  \ = Person ()\n```\n\n3. 修改 `applicationDidFinishLaunching` 方法，使其在用户界面的文本字段中显示警官和罪犯对象的\
  \ `hitPoints` 属性的初始值。这两个文本字段分别对应名为 `sheriffHitPoints` 和 `outlawHitPoints` 的 IBOutlet：\n\
  \n```swift\nfunc applicationDidFinishLaunching(aNotification: NSNotification) {\n\
  // 在此处插入代码以初始化应用\nsheriffHitPoints.integerValue = sheriff.hitPoints\noutlawHitPoints.integerValue\
  \ = outlaw.hitPoints\n}\n```\n\n4. 按如下方式修改 `shootButton` IBAction 方法：\n\n```swift\n\
  @IBAction func shootButton(_ sender: NSButton) {\nif sender.tag == 0 {    // 警官射击\n\
  outlaw.hitPoints -= sheriff.shoot()\n} else {    // 罪犯射击\nsheriff.hitPoints -= outlaw.shoot()\n\
  }\nsheriffHitPoints.integerValue = sheriff.hitPoints\noutlawHitPoints.integerValue\
  \ = outlaw.hitPoints\nif sheriffHitPoints.integerValue <= 0 {\nlet myAlert = NSAlert()\n\
  myAlert.messageText = \"警官阵亡。\"\nmyAlert.runModal()\n} else if outlawHitPoints.integerValue\
  \ <= 0 {\nlet myAlert = NSAlert()\nmyAlert.messageText = \"罪犯阵亡。\"\nmyAlert.runModal()\n\
  }\n}\n```\n\n这段代码会检查 `sender` 变量的 `Tag` 属性，该属性用于判断用户点击了哪个按钮。如果 `Tag` 属性为 0，则表示用户点击了“警官射击”按钮，因此它会执行警官对象的\
  \ `shoot` 方法，并从 `outlaw.hitPoints` 属性中减去其结果（0 到 3 之间的值）。\n\n如果用户点击了“罪犯射击”按钮，则 `shoot`\
  \ 方法会执行 `outlaw` 对象中的 `shoot` 方法，并从 `sheriff.hitPoints` 属性中减去其结果（0 到 3 之间的值）。\n\n\
  无论结果如何，它都会将警官和罪犯最新的 `hitPoints` 属性值更新显示在用户界面上的两个文本字段中，这两个字段由 `sheriffHitPoints`\
  \ 和 `outlawHitPoints` IBOutlet 标识。\n\n最后，如果警官或罪犯中任意一方的 `hitPoints` 属性降到 0 或以下，则会弹出一个警告对话框，显示警官或罪犯阵亡的消息。`AppDelegate.swift`\
  \ 文件的完整内容如下：\n\n```swift\nimport Cocoa\n@NSApplicationMain\nclass AppDelegate: NSObject,\
  \ NSApplicationDelegate {\n@IBOutlet weak var window: NSWindow!\n@IBOutlet weak\
  \ var sheriffHitPoints: NSTextField!\n@IBOutlet weak var outlawHitPoints: NSTextField!\n\
  var sheriff = Person ()\nvar outlaw = Person ()\nfunc applicationDidFinishLaunching(_\
  \ aNotification: Notification) {\n// 在此处插入代码以初始化应用\nsheriffHitPoints.integerValue\
  \ = sheriff.hitPoints\noutlawHitPoints.integerValue = outlaw.hitPoints\n}\nfunc\
  \ applicationWillTerminate(_ aNotification: Notification) {\n// 在此处插入代码以清理应用\n}\n\
  @IBAction func shootButton(_ sender: NSButton) {\nif sender.tag == 0 {    // 警官射击\n\
  outlaw.hitPoints -= sheriff.shoot()\n} else {    // 罪犯射击\nsheriff.hitPoints -= outlaw.shoot()\n\
  }\nsheriffHitPoints.integerValue = sheriff.hitPoints\noutlawHitPoints.integerValue\
  \ = outlaw.hitPoints\nif sheriffHitPoints.integerValue <= 0 {\nlet myAlert = NSAlert()\n\
  myAlert.messageText = \"警官阵亡。\"\nmyAlert.runModal()\n} else if outlawHitPoints.integerValue\
  \ <= 0 {\nlet myAlert = NSAlert()\nmyAlert.messageText = \"罪犯阵亡。\"\nmyAlert.runModal()\n\
  }\n}\n}\n```\n\n要查看这个程序的运行效果，请按照以下步骤操作：\n\n1. 选择“产品” ➤ “运行”。Xcode 会运行你的 ObjectProgram\
  \ 项目。注意警官和罪犯标签下方的文本字段都显示 10，代表他们的总生命值。每被击中一次，生命值就会下降。生命值降到 0 或以下的角色即为失败者。\n2. 点击“警官射击”按钮。如果警官击中了罪犯，你会看到罪犯标签下方的数值从\
  \ 10 降到更小的值，例如 8。如果警官未命中，那么罪犯下方的数字将保持不变。\n3. 点击“罪犯射击”按钮。\n4. 重复步骤 2 和 3，交替点击“警官射击”和“罪犯射击”按钮，直到其中一个角色的生命值降到\
  \ 0 或以下。此时会弹出一个警告对话框，如图 13-11 所示。\n\n![A437923_1_En_13_Fig11_HTML.jpg](img/A437923_1_En_13_Fig11_HTML.jpg)\n\
  \n图 13-11. 当某个角色的总生命值降到 0 或以下时，会弹出警告对话框\n\n5. 点击“确定”关闭警告对话框。\n6. 选择“ObjectProgram”\
  \ ➤ “退出 ObjectProgram”。\n\n### 总结\n\nSwift 编程完全依赖于对象和面向对象编程的原则。要创建对象，必须先定义类。一个类通常包含一个或多个变量（称为属性）以及一个或多个函数（称为方法）。一旦定义了类，就可以创建该类的对象。\n\
  \n类中的属性始终需要被初始化。你可以在定义属性的同时为每个属性设置初始值，也可以创建一个特殊的初始化方法，通过接收数据来为对象定义初始值。\n\n属性可以用固定值进行初始化，也可以基于其他属性的值进行计算。一个属性的值可以改变另一个不同属性的值。\n\
  \n你可以从一个类中创建任意数量的对象。通常最好将类定义放在单独的文件中，以保持代码的组织性。面向对象程序通过对象向其他对象的属性发送数据，或调用其他对象中存储的方法来工作。通过协同工作且保持独立性，对象使得创建可靠且复杂的程序比以往更快更容易。\n\
  \n\n"
- "# 14. 继承、多态与类的扩展\n\n在第 13 章中，你已经学习了如何通过类创建对象，以及类如何定义属性和方法。为了保护其数据和方法不被程序的其他部分访问，对象会隔离或封装其代码。封装是面向对象编程的一大优势，因为它创建了自包含的代码，你可以轻松修改或替换这些代码，而不会影响程序的任何其他部分。\n\
  \n通过尽可能保持代码独立于程序的其他部分，对象提高了可靠性。想象一下用扑克牌搭建的房子。移除一张牌，整个房子就会倒塌——这正是面向对象编程出现之前大多数软件的运作方式。\n\
  \n对象就像扑克牌一样，你可以移除或替换其中一张，而不会影响其他任何牌。除了封装之外，面向对象编程还包含另外两个特性，称为继承和多态。\n\n继承背后的理念是重用现有代码，而无需实际制作该代码的另一份副本。多态背后的理念是你可以替换继承的代码，而无需修改原始代码。通过继承和多态，即使不了解原始代码的工作原理，你也可以重用现有代码。\n\
  \n事实上，每次你在 Xcode 中创建一个项目时，查看你的 Swift 文件顶部，应该会看到类似这样的一行代码：\n\n```\nimport Cocoa\n\
  ```\n\n这行代码告诉 Xcode 使用 Apple 为你创建并存储在 Cocoa 框架中的所有类。在之前的示例程序中，你使用了 Cocoa 框架来操作数组、集合和字典。如果没有\
  \ Cocoa 框架，你就必须自己编写 Swift 代码来实现这些通用功能。这不仅耗时，而且容易出错，因为你需要编写代码并进行测试以确保其正常工作。\n\n只需依赖\
  \ Cocoa 框架中的类，你就可以在不编写大量代码的情况下为程序添加功能。随着你编写自己类的经验越来越丰富，你可以创建自己的实用库，并轻松地将其插入到其他项目中，从而重用你所有的辛勤成果。\n\
  \n## 理解继承\n\n继承的主要目的是让代码重用变得简单。在过去，人们通过简单地复制代码副本来实现代码重用。但是，如果你在代码中发现了一个错误（bug），会发生什么呢？你需要在代码的每个副本中修复这个\
  \ bug。遗漏一个出错代码的副本，你的程序就无法运行。\n\n创建同一代码的多个副本会导致两个问题。首先，它浪费空间。其次，它使修改代码变得更加困难，因为代码的多个副本散布在整个程序中。继承解决了这两个问题。\n\
  \n首先，继承从不制作代码的副本，因此它从不浪费空间。其次，由于继承只保留一份代码副本，你只需修改一份代码，你的修改就会自动影响依赖于该代码的程序的所有部分。\n\
  \n继承本质上不是物理复制代码，而是创建指向一份代码副本的指针或引用。当你创建一个类时，你可以简单地声明它的名称，如下所示：\n\n```\nclass ClassName\
  \ {\n}\n```\n\n要从另一个类继承代码，请命名另一个类，如下所示：\n\n```\nclass ClassName : SuperClass {\n\
  }\n```\n\n这段代码定义了一个名为 `ClassName` 的类，它从另一个名为 `SuperClass` 的类中继承代码。这意味着在 `Superclass`\
  \ 中定义的任何属性和方法都会自动在 `ClassName` 中生效，即使 `ClassName` 类完全是空的。\n\n如果你查看之前章节中创建的任何 macOS\
  \ 示例程序，你可能会看到类似这样的代码：\n\n```\nclass AppDelegate: NSObject, NSApplicationDelegate\
  \ {\n```\n\n这定义了一个名为 `AppDelegate` 的类，它从另一个名为 `NSObject` 的类继承代码。（这段代码还通过另一个名为 `NSApplicationDelegate`\
  \ 的文件向 `AppDelegate` 类添加了额外的代码，关于这个文件，你将在本章后面部分了解更多。）\n\n要了解如何对类使用继承，请按照以下步骤创建一个新的\
  \ playground：\n\n1.  在 Xcode 中打开 `IntroductoryPlayground` 文件。\n2.  按如下方式编辑代码：\n\n\
  ```\n    import Cocoa\n    class FirstClass {\n    var speed : Int = 0\n    var\
  \ locationX : Int = 3\n    var locationY : Int = 5\n    func move (X: Int, Y: Int)\
  \ {\n    locationX += X\n    locationY += Y\n    }\n    }\n    class CopyCat : FirstClass\
  \ {\n    }\n    var kitten = CopyCat ()\n    print (kitten.locationX)\n    print\
  \ (kitten.locationY)\n    kitten.speed = 4\n    kitten.move(X: 4, Y: 8)\n    print\
  \ (kitten.locationX)\n    print (kitten.locationY)\n    ```\n\n这段 Swift 代码定义了两个类。首先，它定义了一个类（名为\
  \ `FirstClass`），该类具有三个属性（`speed`、`locationX` 和 `locationY`）和一个方法（`move`）。然后，它定义了第二个类（名为\
  \ `CopyCat`），这个类完全是空的，但它从 `FirstClass` 继承了所有代码。\n\n为了证明 `CopyCat` 类从 `FirstClass`\
  \ 继承了代码，Swift 代码接下来创建了一个名为 `kitten` 的对象，该对象基于 `CopyCat` 类。`kitten` 对象可以将数据存储在 `speed`\
  \ 属性中，并使用 `move` 方法更改其 `locationX` 和 `locationY` 属性，尽管 `CopyCat` 类完全是空的。图 14-1 显示了在\
  \ playground 中运行这段 Swift 代码的结果。\n\n![A437923_1_En_14_Fig1_HTML.jpg](img/A437923_1_En_14_Fig1_HTML.jpg)\n\
  \n**图 14-1.** 展示继承的工作原理\n\n注意\n\n某些编程语言（如 C++）允许一个类从两个或多个类继承，这称为多重继承。然而在 Swift 中，一个类只能从一个其他类继承，这称为单继承。\n\
  \n在上述示例中，`CopyCat` 类从 `FirstClass` 继承了三个属性（`speed`、`locationX` 和 `locationY`）和一个方法（`move`）。由于\
  \ `CopyCat` 类没有定义自己的任何属性或方法，`CopyCat` 类基本上与 `FirstClass` 相同。\n\n\n\n在实际使用中，一个类完全没有理由原封不动地继承另一个类。更常见的情况是，一个类（称为子类）继承自另一个类（称为超类或父类），然后添加自己额外的属性和方法。\n\
  \n这样一来，子类只需包含这些新属性和方法的代码，同时仍然能够访问超类的所有属性和方法。例如，考虑以下类：\n\n```\nclass CopyDog : CopyCat\
  \ {\nvar name : String = \"\"\n}\n```\n\n这个类继承了 `CopyCat` 类的所有代码，并添加了一个名为 `name`\
  \ 的新属性，该属性可以存储一个字符串。上述定义了 `name` 属性并继承 `CopyCat` 类代码的类定义，等价于以下代码：\n\n```\nclass\
  \ CopyDog {\nvar speed : Int = 0\nvar locationX : Int = 3\nvar locationY : Int =\
  \ 5\nfunc move (X: Int, Y: Int) {\nlocationX += X\nlocationY += Y\n}\nvar name :\
  \ String = \"\"\n}\n```\n\n请记住，`CopyCat` 类继承了 `FirstClass` 的所有内容，而 `FirstClass`\
  \ 定义了 `speed`、`locationX` 和 `locationY` 属性以及 `move` 方法。相比之下，从 `CopyCat` 类继承代码的 `CopyDog`\
  \ 类要简短得多且更简单。\n\n继承就像一条链式结构。如果类 A 继承自类 B，但类 B 继承自类 C 的所有内容，那么类 A 就同时继承了类 B 和类 C\
  \ 的所有内容。例如，`CopyDog` 类继承自 `CopyCat` 类的所有内容，而 `CopyCat` 类又继承自 `FirstClass` 的所有内容。这意味着\
  \ `CopyDog` 类最终同时继承了 `CopyCat` 类和 `FirstClass` 的所有内容，如图 14-2 所示。\n\n![A437923_1_En_14_Fig2_HTML.jpg](img/A437923_1_En_14_Fig2_HTML.jpg)\n\
  \n图 14-2. 类继承前面所有类的所有内容\n\n这种继承的链式结构正是 Cocoa 框架的设计方式。在最基础的层级，有一个名为 `NSObject` 的基本类。另一个名为\
  \ `NSControl` 的类继承自 `NSObject` 的所有内容，并添加了自己的新属性和方法。当你为用户界面创建一个文本字段时，该文本字段基于一个名为\
  \ `NSTextField` 的类，该类继承自 `NSControl` 的所有内容。如果你在对象库中点击一个用户界面对象，Xcode 会列出该用户界面对象基于哪个类，如图\
  \ 14-3 所示。\n\n![A437923_1_En_14_Fig3_HTML.jpg](img/A437923_1_En_14_Fig3_HTML.jpg)\n\
  \n图 14-3. 在对象库中点击一个项目可以识别该用户界面对象的父类\n\n要了解继承如何在多个类之间工作，请按照以下步骤操作：\n\n1. 确保 `IntroductoryPlayground`\
  \ 文件已在 Xcode 中加载。\n2. 将代码编辑如下：\n\n```\n    import Cocoa\n    class Animal {\n  \
  \  var legs : Int = 0\n    }\n    class PackAnimal : Animal {\n    var strength\
  \ : Int = 100\n    }\n    class Biped : PackAnimal {\n    var IQ : Int = 75\n  \
  \  }\n    var snake = Animal()\n    print (snake.legs)\n    var mule = PackAnimal()\n\
  \    mule.legs = 4\n    mule.strength = 120\n    print (mule.legs)\n    print (mule.strength)\n\
  \    var relative = Biped()\n    relative.legs = 2\n    relative.strength = 55\n\
  \    relative.IQ = 10\n    print (relative.legs)\n    print (relative.strength)\n\
  \    print (relative.IQ)\n```\n\n这段代码创建了三个类：`Animal`（`legs` 属性）、`PackAnimal`（`strength`\
  \ 属性）和 `Biped`（`IQ` 属性）。然后，它基于这些类创建了三个对象。第一个对象 `snake` 基于 `Animal` 类。第二个对象 `mule`\
  \ 基于 `PackAnimal` 类。第三个对象 `relative` 基于 `Biped` 类。\n\n最终，`relative` 对象包含来自所有三个类的属性，`mule`\
  \ 对象只包含来自 `Animal` 和 `PackAnimal` 类的属性，而 `snake` 对象只包含来自 `Animal` 类的属性，如下所示：\n\n\
  | 对象 | 基于以下类 | 包含这些属性 |\n| --- | --- | --- |\n| snake | Animal | legs |\n| mule\
  \ | PackAnimal、Animal | legs、strength |\n| relative | Biped、PackAnimal、Animal |\
  \ legs、strength、IQ |\n\n`snake`、`mule` 和 `relative` 对象基于它们不同的类以及它们所继承的类，包含不同的属性，如图\
  \ 14-4 所示。\n\n![A437923_1_En_14_Fig4_HTML.jpg](img/A437923_1_En_14_Fig4_HTML.jpg)\n\
  \n图 14-4. 观察继承如何作用于存储在不同类中的属性\n\n### 理解多态\n\n当一个类（子类）继承自另一个类（超类）时，它包含了超类中存储的所有属性和方法。尽管子类继承了超类的所有属性和方法，但这些属性和方法并不会在子类中显示出来。每个类中出现的代码，都是该类的独特属性和方法。\n\
  \n从另一个类继承的属性会保留相同的名称和数据类型。从另一个类继承的方法会保留相同的方法名称以及使其执行有用功能的代码。\n\n继承方法的一个问题是，你可能想要修改继承方法中的代码。例如，假设你有一个视频游戏，其中有狗在地上跑，鸟在天上飞。你可以创建一个像这样的基本类：\n\
  \n```\nclass GameObject {\nvar speed : Int = 0\nvar locationX : Int = 3\nvar locationY\
  \ : Int = 3\nfunc move (X: Int, Y: Int) {\nlocationX += X + speed\nlocationY +=\
  \ Y + speed\n}\n}\nvar dog = GameObject()\n```\n\n现在，从 `GameObject` 类创建的 `dog` 对象有三个属性（`speed`、`locationX`\
  \ 和 `locationY`）和一个方法（`move`），该方法会更改 `locationX` 和 `locationY` 属性。\n\n狗只能在地上跑，但鸟可以在二维空间中移动，因此它需要一个额外的\
  \ `height` 属性。要移动一个飞行对象，`move` 方法需要更改 `height` 属性。这意味着 `move` 方法需要有所不同。\n\n解决这个问题的一个笨拙方法是给\
  \ move 方法起一个不同的名称，例如将其名称从 “move” 改为 “fly”：\n\n```\nclass FlyingObject : GameObject\
  \ {\nvar height : Int = 0\nfunc fly (X: Int, Y: Int) {\nlocationX += X + speed\n\
  locationY += Y + speed\nheight += (X + Y) / 2\n}\n}\nvar bird = FlyingObject()\n\
  ```\n\n这种解决方案的问题是，从 `FlyingObject` 类创建的 `bird` 对象现在有两个方法：从 `GameObject` 继承的 `move`\
  \ 方法，以及在 `FlyingObject` 中定义的新 `fly` 方法。\n\n你可以简单地忽略 `move` 方法并使用 `fly` 方法，但这存在风险：如果你不小心使用了\
  \ `move` 方法来改变鸟的位置，而不是使用正确的、能在二维空间中移动鸟的 `fly` 方法，就可能导致错误。\n\n这就是多态存在的原因。多态基本上允许你重用方法名称（例如\
  \ `move`），但用完全不同的代码替换它以实现功能。为了标识你正在使用多态来重用方法名称但修改其代码，必须在你要更改的方法前面使用 `override` 关键字，例如：\n\
  \n```\noverride func move (X: Int, Y: Int) {\nlocationX += X + speed\nlocationY\
  \ += Y + speed\nheight += (X + Y) / 2\n}\n```\n\n当你覆盖一个方法（使用多态）时，你实际上拥有了两个名称相同的方法，但一个版本定义在一个类中，第二个版本定义在另一个类中。计算机永远不会混淆，因为你只能通过指定对象名称和方法名称来运行每个方法。尽管方法名称相同，但对象名称是不同的。\n\
  \n要了解多态如何工作，请按照以下步骤操作：\n\n1. 确保你的 `IntroductoryPlayground` 文件已加载到 Xcode 中。\n2. 将代码编辑如下：\n\
  \n\n```swift\nimport Cocoa\nclass GameObject {\n    var speed : Int = 0\n    var\
  \ locationX : Int = 3\n    var locationY : Int = 3\n    func move (X: Int, Y: Int)\
  \ {\n        locationX += X + speed\n        locationY += Y + speed\n    }\n}\n\
  var dog = GameObject()\nclass FlyingObject : GameObject {\n    var height : Int\
  \ = 0\n    override func move (X: Int, Y: Int) {\n        locationX += X + speed\n\
  \        locationY += Y + speed\n        height += (X + Y) / 2\n    }\n}\nvar bird\
  \ = FlyingObject()\ndog.speed = 1\ndog.move (X: 4, Y: 7)\nbird.speed = 3\nbird.move\
  \ (X: 4, Y: 7)\nprint (dog.locationX)\nprint (dog.locationY)\nprint (dog.speed)\n\
  print (bird.locationX)\nprint (bird.locationY)\nprint (bird.height)\nprint (bird.speed)\n\
  ```\n\n要重写方法，`FlyingObject` 类必须首先继承自另一个类。在这个例子中，`FlyingObject` 继承了 `GameObject`。现在，`FlyingObject`\
  \ 类可以使用 `override` 关键字来指定它要修改实现 `move` 方法的代码。在这个例子中，唯一的修改是添加了更新 `height` 属性的代码，但你完全可以在重写的\
  \ `move` 方法中添加完全不同的代码。\n\n请注意，当你对 `dog` 对象（`dog.move`）执行 `move` 方法时，该方法仅更改 `locationX`\
  \ 和 `locationY` 的值；但当你对 `bird` 对象（`bird.move`）执行 `move` 方法时，运行的是重写后的方法，它还会修改 `height`\
  \ 属性，如图 14-5 所示。\n\n![A437923_1_En_14_Fig5_HTML.jpg](img/A437923_1_En_14_Fig5_HTML.jpg)\n\
  \n**图 14-5.** 重写的方法可以有不同的行为\n\n重写方法时，你只能更改方法内部的代码。不能更改方法的参数列表。例如，考虑以下类：\n\n```swift\n\
  class BasicDesign {\n    var location : Int = 0\n    func moveMe (X : Int) {\n \
  \       location += X\n    }\n}\n```\n\n要重写 `moveMe` 方法，下一个类需要继承 `BasicDesign` 类，并且只更改重写方法内部的代码。下面的做法是行不通的：\n\
  \n```swift\nclass NewDesign : BasicDesign {\n    override moveMe (X: Int, Y: Int)\
  \ { // 无效\n    }\n}\n```\n\n注意，原始的 `moveMe` 方法只有一个参数（`X : Int`），但 `NewDesign` 类中的\
  \ `moveMe` 方法有两个参数（`X: Int`，`Y: Int`）。尽管方法名相同，但这个方法的参数列表不同，所以它不会生效。重写方法时，你只能更改代码，不能更改参数列表。\n\
  \n## 重写属性\n\n除了重写方法，Swift 还允许你重写属性。重写属性时，你必须保持相同的属性名和数据类型。你可以更改的是 getter、setter\
  \ 以及变量的属性观察器。\n\n在最简单的层面上，getter 只是返回一个变量的值。在更复杂的层面上，getter 可以计算出一个值。考虑以下示例：\n\n\
  ```swift\nclass BasicDesign {\n    var location: Int {\n        get {\n        \
  \    return 4\n        }\n    }\n}\n```\n\n这个 `BasicDesign` 类定义了一个名为 `location`\
  \ 的属性，其 getter 返回 `location` 属性的值 4。要重写这个属性，你需要保留变量名和数据类型（`Int`），但你可以更改 getter 代码，例如：\n\
  \n```swift\nclass NewDesign : BasicDesign {\n    override var location: Int {\n\
  \        get {\n            return 7\n        }\n    }\n}\n```\n\n这个 `NewDesign`\
  \ 类从 `BasicDesign` 类继承了 `location` 属性。然而，它用一个新的 getter 重写了 `location` 属性，该 getter\
  \ 返回值为 7。\n\n若要查看重写属性的实际效果，请执行以下步骤：\n\n1.  确保你的 `IntroductoryPlayground` 文件已加载到\
  \ Xcode 中。\n2.  按如下方式编辑代码：\n\n    ```swift\n    import Cocoa\n    class BasicDesign\
  \ {\n        var location: Int {\n            get {\n                return 4\n\
  \            }\n        }\n    }\n    class NewDesign : BasicDesign {\n        override\
  \ var location: Int {\n            get {\n                return 7\n           \
  \ }\n        }\n    }\n    var ant = BasicDesign()\n    var fly = NewDesign()\n\
  \    ant.location\n    fly.location\n    ```\n\n在这个例子中，`ant` 对象基于 `BasicDesign`\
  \ 类，该类将 `location` 属性定义为值为 4。`fly` 对象基于 `NewDesign` 类，该类继承了 `location` 属性。然而，`NewDesign`\
  \ 类重写了 `location` 属性的 getter 代码，因此 `location` 属性中存储的值不再是 4，而是 7，如图 14-6 所示。\n\n\
  ![A437923_1_En_14_Fig6_HTML.jpg](img/A437923_1_En_14_Fig6_HTML.jpg)\n\n**图 14-6.**\
  \ 使用新的 getter 代码重写属性\n\n请记住，重写方法和属性时，你只能更改：\n\n- 方法中的代码\n- 属性的 getter/setter 或属性观察器中的代码\n\
  \n你永远不能更改：\n\n- 方法名\n- 方法的参数列表\n- 属性名\n- 属性数据类型\n\n## 防止多态\n\n在某些情况下，你可能希望防止某个方法、属性甚至整个类被多态修改。要实现这一点，你只需插入\
  \ `final` 关键字。如果你想防止整个类被继承，只需将 `final` 关键字放在类名前面，如下所示：\n\n```swift\nfinal class\
  \ ClassName {\n    var propertyName = initialValue\n    func methodName() {\n  \
  \  }\n}\n```\n\n> **注意：** 如果将 `final` 放在类名前面，它会自动阻止该类的属性和方法被重写，因此你无需在每个属性或方法名前放置\
  \ `final`。\n\n如果你只想阻止某个特定的属性或方法被重写，只需将 `final` 关键字放在该属性或方法前面，如下所示：\n\n```swift\n\
  class ClassName {\n    final var propertyName = initialValue\n    func methodName()\
  \ {\n    }\n}\n```\n\n上例中的 `final` 关键字阻止了属性被重写，同时允许方法被重写。如果你希望允许属性被重写而阻止方法被重写，则将\
  \ `final` 关键字放在方法前面，如下所示：\n\n```swift\nclass ClassName {\n    var propertyName =\
  \ initialValue\n    final func methodName() {\n    }\n}\n```\n\n\n## 使用扩展\n\n如果某个类包含你需要的属性和方法，面向对象的方法是继承该类（创建子类）。不断创建子类的问题在于，从略有不同的类文件中创建对象可能会变得很麻烦。\n\
  \n当你想要扩展属于 Cocoa 框架的类功能时尤其如此。例如，如果你正在处理 `String` 数据类型，你可能不想创建 `String` 数据类型的子类，然后基于这个新的子类创建对象。理想情况下，你希望继续使用\
  \ `String` 数据类型，但同时也增加一些功能。\n\n这就是 Swift 提供扩展的原因。扩展本质上允许你向现有类添加代码，而无需创建子类。这样你仍然可以使用原始类，同时无需通过继承、多态或子类就能为该类添加新功能。扩展的结构如下所示：\n\
  \n```\nextension ClassName {\n}\n```\n\n扩展除了可以定义方法，还可以定义包含如下代码的属性：\n\n- 获取器和设置器\n\
  - 构造器\n- 属性观察器\n\n虽然扩展无需继承就能向类添加新的属性和方法，但扩展不能覆盖类中已有的方法或属性。扩展也不能创建被赋予初始值的属性，例如：\n\
  \n```\nvar temperature : Int = 100    // 不能在扩展中使用\n```\n\n要了解扩展如何向类添加属性和方法，请按照以下步骤创建一个新的\
  \ playground：\n\n1.  确保你的 `IntroductoryPlayground` 文件已加载到 Xcode 中。\n2.  按如下所示编辑代码：\n\
  \n```\nimport Cocoa\nclass EmptyClass {\n}\nextension EmptyClass {\nvar age : Int\
  \ {\nget {\nreturn 50\n}\n}\nfunc retire (testAge : Int) -> String {\nif testAge\
  \ < 62 {\nreturn \"Keep working\"\n} else {\nreturn \"Time to retire\"\n}\n}\n}\n\
  var aWorker = EmptyClass ()\naWorker.retire(testAge: 65)\naWorker.age\n```\n\n这段代码创建了一个完全空的类，然后创建了一个扩展，向这个空类添加了一个\
  \ `age` 属性和一个 `retire` 方法。最后，它从这个空类创建了一个对象，调用了 `retire` 方法（在扩展中定义的），并显示了存储在 `age`\
  \ 属性中的值，如图 14-7 所示。\n\n![A437923_1_En_14_Fig7_HTML.jpg](img/A437923_1_En_14_Fig7_HTML.jpg)\n\
  \n图 14-7. 使用扩展向空类添加属性和方法\n\n你可以看到这个类本身什么也没做，但通过扩展，这个类现在拥有了它之前没有的新功能。\n\n## 使用协议\n\
  \n在本章的开头，你第一次接触到了出现在 `AppDelegate.swift` 类文件中的内容，这个文件是你为了学习每章基本原理而创建的。这个 `AppDelegate`\
  \ 类的声明如下所示：\n\n```\nclass AppDelegate: NSObject, NSApplicationDelegate {\n```\n\n\
  这行代码创建了一个名为 `AppDelegate` 的类，它继承了 Cocoa 框架中 `NSObject` 类的属性和方法。然而，`NSApplicationDelegate`\
  \ 是另一个用于扩展类而无需通过继承或子类的文件名。\n\n`NSApplicationDelegate` 文件是一个协议文件。上面的 Swift 代码创建了一个名为\
  \ `AppDelegate` 的类，它继承了 `NSObject` 类的属性和方法，同时也继承了 `NSApplicationDelegate` 文件中的代码。（你可以通过在\
  \ Xcode 文档窗口中查看，来了解关于 `NSApplicationDelegate` 协议的更多细节。）\n\n类（例如 `NSObject`）和协议（例如\
  \ `NSApplicationDelegate`）之间的主要区别在于，类定义了属性和方法，而协议只定义了属性和方法的名称，没有任何实际实现它们的代码。协议有时被称为空类，因为它从不定义任何实际使功能生效的\
  \ Swift 代码。\n\n协议定义了一组用于解决特定类型问题的属性和方法名称。现在，由采用或遵循此协议的类来提供实现每个方法或属性声明的实际 Swift 代码。\n\
  \n协议声明看起来与类或结构体声明相同。唯一的区别是协议声明使用 `protocol` 关键字：\n\n```\nprotocol ProtocolName {\n\
  }\n```\n\n在这个协议声明中，你可以定义属性和方法而不实现任何 Swift 代码，如下所示：\n\n```\nprotocol ProtocolName\
  \ {\nvar property1 : datatype { get }        // 只读\nvar property2 : datatype { get\
  \ set }    // 读写\nfunc methodName (parameters) -> datatype\n}\n```\n\n当协议定义了属性或方法时，任何采用该协议的类都必须完全按照协议中的定义来实现该属性或方法。在上面的例子中，`property1`\
  \ 被定义为拥有一个获取器，`property2` 被定义为拥有一个获取器和一个设置器。\n\n这意味着当一个类实现这两个属性时，它必须只为 `property1`\
  \ 定义一个获取器，而为 `property2` 定义获取器和设置器两者。\n\n类似地，协议中定义的方法在被类文件采用时必须是精确的。这意味着如果方法在协议中定义为带有两个整数参数，那么该方法的实现也必须带有完全相同的两个整数参数。\n\
  \n协议通常用于处理常见的用户界面元素，这些元素需要特定类型的方法来操作它们，但又不能精确定义如何操作它们，因为数据可能因程序而异。\n\n例如，表格视图是一种以行列表形式显示数据的用户界面元素。表格视图需要知道要容纳多少行数据以及每行显示什么类型的数据。由于每个表格视图都需要知道这些信息，因此创建标准方法来执行此操作是合理的，但由于每个表格视图需要包含不同的信息，因此避免编写实际的\
  \ Swift 代码来填充表格视图数据也是合理的。\n\n任何包含表格视图的程序都可以利用存储在协议中的预定义方法名来操作数据。你只需要添加 Swift 代码来用数据填充表格视图。\n\
  \n\n\n通过使用协议，你可以用相同的方法名在不同程序中操作表格视图。如果没有表格视图协议，你就只能自己创建用于在表格视图中添加和显示数据的方法名。因此，Cocoa\
  \ 框架通常使用协议来提供一套一致的方法列表，用于执行常见任务。\n\n要了解协议的工作原理，请遵循以下步骤：\n\n1. 确保`IntroductoryPlayground`文件已加载到\
  \ Xcode 中。\n2. 按如下方式编辑代码：\n\n```\nimport Cocoa\nprotocol TestMe {\n    var cash\
  \ : Int { get }\n    var creditCheck : Int { get set }\n    func purchase (price\
  \ : Int) -> String\n}\nclass WindowShopper : TestMe {\n    var tempValue : Int =\
  \ 0\n    var cash : Int = 0\n    var creditCheck : Int {\n        get {\n      \
  \      return tempValue\n        }\n        set (newValue) {\n            tempValue\
  \ = newValue\n            cash -= 10\n        }\n    }\n    func purchase (price\
  \ : Int) -> String {\n        cash -= price\n        return \"Bought something!\"\
  \n    }\n}\nvar shopper = WindowShopper ()\nshopper.cash = 450\nshopper.purchase\
  \ (price: 129)\nshopper.cash\n```\n\n注意，`TestMe`协议定义了两个属性和一个方法。`cash`属性仅定义了 getter。`creditCheck`属性同时定义了\
  \ getter 和 setter。`purchase`方法仅列出了其参数（`price`为整数）及其返回值（类型为`String`）。请注意，该协议实际上并没有实现任何必要的\
  \ Swift 代码。\n\n当创建`WindowShopper`类时，它采用或遵守了`TestMe`协议。这意味着它必须提供 Swift 代码来定义`cash`属性的\
  \ getter，以及`creditCheck`属性的 getter 和 setter。它还需要为`purchase`方法实现 Swift 代码。\n\n如果你未能为`TestMe`协议中定义的所有属性和方法编写\
  \ Swift 代码，Xcode 会报错，提示`WindowShopper`类未能遵守协议。在采用协议时，请确保实现了所有必要的属性和方法。\n\n运行上述代码会显示如图\
  \ 14-8 所示的结果。\n\n![A437923_1_En_14_Fig8_HTML.jpg](img/A437923_1_En_14_Fig8_HTML.jpg)\n\
  \n图 14-8.\n\n遵守协议的类\n\n### 在协议中定义可选方法和属性\n\n当你创建一个协议时，你定义的每个属性和方法都必须被采用该协议的类实现。然而，你也可以将一个或多个属性和方法设为可选，以便它们可以被忽略。要定义可选的属性或方法，你需要使用`@objc`关键字标识该协议，并使用`optional`关键字标识各个属性或方法，例如：\n\
  \n```\n@objc protocol ProtocolName {\n    var requiredProperty : dataType { get\
  \ }\n    @objc optional var optionalProperty : dataType { get }\n    @objc optional\
  \ func optionalMethod ()\n}\n```\n\n要采用或遵守此协议，类只需要实现未被`optional`关键字标识的任何属性或方法。要实现必需的属性或方法，你需要使用`@objc`关键字标识它们，例如：\n\
  \n```\nclass ClassName : ProtocolName {\n    @objc var requiredProperty : dataType\
  \ = initialValue\n}\n```\n\n然而，如果你想要实现一个可选的属性或方法，你可以省略`@objc`关键字，像这样：\n\n```\nclass\
  \ ClassName : ProtocolName {\n    @objc var requiredProperty : dataType = initialValue\n\
  \    var optionalProperty : dataType = initialValue\n}\n```\n\n要了解如何在协议中创建可选的属性和方法，请遵循以下步骤：\n\
  \n1. 确保`IntroductoryPlayground`文件已加载到 Xcode 中。\n2. 按如下方式编辑代码：\n\n```\nimport Cocoa\n\
  @objc protocol Person {\n    var name : String { get }\n    @objc optional var age\
  \ : Int { get }\n    @objc optional func move (X: Int) -> Int\n}\nclass Politician\
  \ : Person {\n    @objc var name : String = \"\"\n}\nvar candidate = Politician\
  \ ()\ncandidate.name = \"John Doe\"\n```\n\n注意，上面定义的`Person`协议中唯一必需的项目是`name`属性。这就是为什么`Politician`类只需要实现`name`属性，但它必须使用`@objc`关键字标识它。\n\
  \n尝试将不同的属性和方法设为可选，以便观察它们如何影响你在类中的实现方式。\n\n### 将继承与协议一起使用\n\n协议甚至可以从其他协议继承属性和方法。这使得一个协议可以从多个协议继承属性和方法。此时，一个类必须采用或遵守所有协议中定义的所有属性和方法。\n\
  \n要了解如何从多个协议继承属性和方法，请遵循以下步骤：\n\n1. 确保`IntroductoryPlayground`文件已加载到 Xcode 中。\n2.\
  \ 按如下方式编辑代码：\n\n```\nimport Cocoa\nprotocol First {\n    var name : String { get\
  \ }\n}\nprotocol Second {\n    var ID : Int { get }\n}\nprotocol Third: First, Second\
  \ {\n    var email : String { get }\n}\nclass InheritProtocols : Third {\n    var\
  \ name : String = \"\"\n    var ID : Int = 0\n    var email : String = \"\"\n}\n\
  var friend = InheritProtocols()\nfriend.name = \"Cindy Smith\"\nfriend.ID = 12\n\
  friend.email = cindysmith@isp.com\nprint (friend.name)\nprint (friend.ID)\nprint\
  \ (friend.email)\n```\n\n在这个例子中，`name`、`ID`和`email`属性在三个不同的协议中被定义。第三个协议继承了第一个和第二个协议。\n\
  \n现在，当一个类采用最后一个协议时，它必须实现在所有协议中存储的属性和方法。尽管`name`、`ID`和`email`属性都是在不同的协议中声明的，但`InheritProtocols`类可以访问它们全部，如图\
  \ 14-9 所示。\n\n![A437923_1_En_14_Fig9_HTML.jpg](img/A437923_1_En_14_Fig9_HTML.jpg)\n\
  \n图 14-9.\n\n从多个协议继承属性和方法\n\n\n\n## 使用委托\n\n协议与委托密切相关。委托的核心思想是让一个类将责任移交给另一个类中存储的代码。因此，与其创建新的子类来添加新功能，不如使用一个包含额外功能的委托。\n\
  \n使用委托的一种常见方式是让视图（用户界面）与控制器进行通信。通常，控制器通过 `IBOutlet` 与视图通信，这使得控制器能够在用户界面上显示数据或从用户界面检索数据。\n\
  \n然而，视图也可以通过协议与控制器进行通信。协议文件定义了方法，并将实现这些方法的责任委托给控制器。控制器实现的最常见方法类型包括名称中包含 \"will\"\
  、\"should\" 和 \"did\" 的方法，例如 `applicationDidFinishLaunching` 或 `applicationWillTerminate`。\n\
  \n图 14-10 展示了控制器如何通过 `IBOutlet` 与视图通信，视图如何通过协议与控制器通信。\n\n![A437923_1_En_14_Fig10_HTML.jpg](img/A437923_1_En_14_Fig10_HTML.jpg)\n\
  \n图 14-10. 视图可以通过协议与控制器通信。\n\n要了解视图如何使用委托与控制器通信，请按照以下步骤操作：\n\n1. 在 Xcode 中选择“文件”\
  \ ➤ “新建” ➤ “项目”。\n2. 在 macOS 类别下点击“应用程序”。\n3. 点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 会要求输入产品名称。\n\
  4. 点击“产品名称”文本字段，输入 `DelegateProgram`。\n5. 确保“语言”弹出菜单显示为 Swift，并且未选中任何复选框。\n6. 点击“下一步”按钮。Xcode\
  \ 会询问项目存储位置。\n7. 选择一个文件夹来存储项目，然后点击“创建”按钮。\n8. 在项目导航器中点击 `AppDelegate.swift` 文件。`AppDelegate.swift`\
  \ 文件的内容会显示在 Xcode 窗口的中间区域。找到以下代码行：\n   ```\n   class AppDelegate: NSObject, NSApplicationDelegate\
  \ {\n   ```\n   这行代码定义了一个名为 `AppDelegate` 的类，它继承了 `NSObject` 类的属性和方法。此外，它还采用了 `NSApplicationDelegate`\
  \ 文件定义的所有属性和方法。\n9. 按住 Option 键，将鼠标悬停在 `NSObject` 上。当鼠标指针变成问号时，点击 `NSObject` 会弹出一个窗口，如图\
  \ 14-11 所示。\n   ![A437923_1_En_14_Fig11_HTML.jpg](img/A437923_1_En_14_Fig11_HTML.jpg)\n\
  \   图 14-11. 按住 Option 键点击类名会显示该类的信息\n10. 松开 Option 键，点击弹出窗口底部的“类参考”超链接。文档窗口会打开，显示\
  \ `NSObject` 类中可用的不同属性和方法的详细信息，如图 14-12 所示。所有这些属性和方法在你的 `AppDelegate` 类中也可用。\n \
  \   ![A437923_1_En_14_Fig12_HTML.jpg](img/A437923_1_En_14_Fig12_HTML.jpg)\n    图\
  \ 14-12. 文档窗口显示关于 `NSObject` 类的信息\n11. 点击文档窗口左上角的关闭按钮（红点）以关闭它。\n12. 按住 Option 键，将鼠标悬停在\
  \ `NSApplicationDelegate` 上。当鼠标指针变成问号时，点击 `NSApplicationDelegate` 会弹出一个窗口，如图 14-13\
  \ 所示。\n    ![A437923_1_En_14_Fig13_HTML.jpg](img/A437923_1_En_14_Fig13_HTML.jpg)\n\
  \    图 14-13. 按住 Option 键点击会显示关于 `NSApplication` 协议的信息\n13. 松开 Option 键，点击弹出窗口底部的“协议参考”超链接。文档窗口会打开，显示\
  \ `NSApplicationDelegate` 协议的详细信息，如图 14-14 所示。注意 `NSApplicationDelegate` 协议定义了两个方法，分别叫做\
  \ `applicationDidFinishLaunching` 和 `applicationWillTerminate`。\n    ![A437923_1_En_14_Fig14_HTML.jpg](img/A437923_1_En_14_Fig14_HTML.jpg)\n\
  \    图 14-14. 在文档窗口中查看 `NSApplicationDelegate` 协议\n14. 点击文档窗口左上角的关闭按钮（红点）以关闭它。Xcode\
  \ 窗口再次出现。注意 `AppDelegate.swift` 文件包含两个空函数，分别名为 `applicationDidFinishLaunching` 和\
  \ `applicationWillTerminate`。这些函数由 `NSApplicationDelegate` 协议文件定义，但在 `AppDelegate.swift`\
  \ 文件中实现。\n15. 将这两个函数修改如下：\n    ```\n    func applicationDidFinishLaunching(aNotification:\
  \ NSNotification) {\n    print (\"这行文字应该会在程序运行后打印\")\n    }\n    func applicationWillTerminate(aNotification:\
  \ NSNotification) {\n    print (\"这行文字应该会在程序停止前打印\")\n    }\n    ```\n16. 选择“产品”\
  \ ➤ “运行”。Xcode 会运行你的 `DelegateProgram` 项目并显示一个空白的用户界面。\n17. 选择“DelegateProgram”\
  \ ➤ “退出 DelegateProgram”。Xcode 窗口会出现。\n18. 选择“视图” ➤ “调试区域” ➤ “显示调试区域”。调试区域出现在 Xcode\
  \ 窗口底部，并显示两个 `print` 命令打印的文本。注意，`applicationDidFinishLaunching` 函数中的 print 命令首先运行，如图\
  \ 14-15 所示。\n    ![A437923_1_En_14_Fig15_HTML.jpg](img/A437923_1_En_14_Fig15_HTML.jpg)\n\
  \    图 14-15. `NSApplicationDelegate` 文件定义的方法会告知程序用户界面的状态\n\n\n\n## 在 macOS 程序中使用继承\n\
  \n继承允许你创建在两个类之间底层代码变化时保持相同的方法名。在下面的示例程序中，你将定义一个类，然后为第二个类继承其属性和方法。第二个类还将重写一个方法，并添加代码使该重写方法的行为略有不同。\n\
  \n要创建展示继承工作原理的示例程序，请按以下步骤操作：\n\n1. 在 Xcode 中选择 **文件** ➤ **新建** ➤ **项目**。\n2. 在 macOS\
  \ 类别下点击 **应用程序**。\n3. 点击 **Cocoa 应用程序**，然后点击 **下一步** 按钮。Xcode 现在会要求你输入产品名称。\n4.\
  \ 点击 **产品名称** 文本字段，输入 `InheritProgram`。\n5. 确保 **语言** 弹出菜单显示为 **Swift**，且未选中任何复选框。\n\
  6. 点击 **下一步** 按钮。Xcode 会询问你希望将项目存储在何处。\n7. 选择一个文件夹存储项目，点击 **创建** 按钮。\n8. 在项目导航器中点击\
  \ `MainMenu.xib` 文件。\n9. 点击 **窗口** 图标，使用户界面窗口显示出来。\n10. 选择 **视图** ➤ **工具** ➤ **显示对象库**，使对象库显示在\
  \ Xcode 窗口的右下角。\n11. 在用户界面上拖放一个按钮和两个标签，然后双击按钮和标签以更改上面显示的文本，使其看起来类似于图 14-16。\n\n\
  ![A437923_1_En_14_Fig16_HTML.jpg](img/A437923_1_En_14_Fig16_HTML.jpg)\n\n**图 14-16.**\
  \ `InheritProgram` 的用户界面\n\n该用户界面显示了代表两个不同对象的标签。`Object 1` 只包含一个属性和一个修改该属性的方法。`Object\
  \ 2` 继承自 `Object 1`，包含一个额外的属性，并重写了在 `Object 1` 中定义的方法。\n\n当你点击 **更改** 按钮时，两个标签都会根据每个对象定义的属性和方法更改其外观。要将用户界面连接到\
  \ Swift 代码，请按以下步骤操作：\n\n1. 在 Xcode 窗口中保持用户界面可见，选择 **视图** ➤ **助理编辑器** ➤ **显示助理编辑器**。`AppDelegate.swift`\
  \ 文件会出现在用户界面旁边。\n2. 将鼠标移到 **更改** 按钮上，按住 **Control** 键，拖拽到 `AppDelegate.swift` 文件底部最后一个花括号的上方。\n\
  3. 松开鼠标和 **Control** 键。会弹出一个窗口。\n4. 点击 **连接** 弹出菜单，选择 **操作**。\n5. 点击 **名称** 文本字段，输入\
  \ `changeButton`。\n6. 点击 **类型** 弹出菜单，选择 `NSButton`。然后点击 **连接** 按钮。Xcode 会创建一个名为\
  \ `changeButton` 的空 `IBAction` 方法。\n7. 将鼠标移到 `Object 1` 标签上，按住 **Control** 键，拖拽到\
  \ `AppDelegate.swift` 文件中 `@IBOutlet` 行的下方。\n8. 松开鼠标和 **Control** 键。会弹出一个窗口。\n9.\
  \ 点击 **名称** 文本字段，输入 `ObjectOne`，然后点击 **连接** 按钮。\n10. 将鼠标移到 `Object 2` 标签上，按住 **Control**\
  \ 键，拖拽到 `AppDelegate.swift` 文件中 `@IBOutlet` 行的下方。\n11. 松开鼠标和 **Control** 键。会弹出一个窗口。\n\
  12. 点击 **名称** 文本字段，输入 `ObjectTwo`，然后点击 **连接** 按钮。现在你应该拥有以下表示用户界面上所有标签的 `IBOutlet`：\n\
  \n```\n@IBOutlet weak var window: NSWindow!\n@IBOutlet weak var ObjectOne: NSTextField!\n\
  @IBOutlet weak var ObjectTwo: NSTextField!\n```\n\n13. 直接在 `IBOutlet` 代码行下方输入以下内容：\n\
  \n```\nclass One {\n    var myColor : NSColor = NSColor.black\n    func change ()\
  \ {\n        myColor = NSColor.red\n    }\n}\nclass Two : One {\n    var myBackground\
  \ : NSColor = NSColor.white\n    override func change() {\n        myColor = NSColor.blue\n\
  \        myBackground = NSColor.green\n    }\n}\nvar ThingOne = One()\nvar ThingTwo\
  \ = Two()\n```\n\n14. 按如下方式修改 `IBAction` `changeButton` 方法：\n\n```\n@IBAction func\
  \ changeButton(_ sender: NSButton) {\n    ThingOne.change()\n    ThingTwo.change()\n\
  \    ObjectOne.textColor = ThingOne.myColor\n    ObjectTwo.textColor = ThingTwo.myColor\n\
  \    ObjectTwo.drawsBackground = true\n    ObjectTwo.backgroundColor = ThingTwo.myBackground\n\
  }\n```\n\n这个 `IBAction` 方法对 `ThingOne` 和 `ThingTwo` 对象（分别基于 `One` 和 `Two` 类）都运行了\
  \ `change()` 方法。`Two` 类继承自 `One` 类，但重写了 `change()` 方法以额外修改一个名为 `myBackground` 的属性。\n\
  \n在 `ThingOne` 和 `ThingTwo` 都更改其属性后，第一个标签（由 `ObjectOne` 表示）将其文本颜色设置为 `ThingOne`\
  \ 对象中的 `myColor` 属性。第二个标签（由 `ObjectTwo` 表示）更改了其 `myColor` 和 `myBackground` 属性，因此将这些属性设置到标签上。\n\
  \n`AppDelegate.swift` 文件的完整内容应如下所示：\n\n```\nimport Cocoa\n@NSApplicationMain\nclass\
  \ AppDelegate: NSObject, NSApplicationDelegate {\n    @IBOutlet weak var window:\
  \ NSWindow!\n    @IBOutlet weak var ObjectOne: NSTextField!\n    @IBOutlet weak\
  \ var ObjectTwo: NSTextField!\n    \n    class One {\n        var myColor : NSColor\
  \ = NSColor.black\n        func change () {\n            myColor = NSColor.red\n\
  \        }\n    }\n    class Two : One {\n        var myBackground : NSColor = NSColor.white\n\
  \        override func change() {\n            myColor = NSColor.blue\n        \
  \    myBackground = NSColor.green\n        }\n    }\n    var ThingOne = One()\n\
  \    var ThingTwo = Two()\n    \n    func applicationDidFinishLaunching(_ aNotification:\
  \ Notification) {\n        // 在此处插入代码以初始化应用程序\n    }\n    func applicationWillTerminate(_\
  \ aNotification: Notification) {\n        // 在此处插入代码以拆除应用程序\n    }\n    \n    @IBAction\
  \ func changeButton(_ sender: NSButton) {\n        ThingOne.change()\n        ThingTwo.change()\n\
  \        ObjectOne.textColor = ThingOne.myColor\n        ObjectTwo.textColor = ThingTwo.myColor\n\
  \        ObjectTwo.drawsBackground = true\n        ObjectTwo.backgroundColor = ThingTwo.myBackground\n\
  \    }\n}\n```\n\n要查看此程序的工作原理，请按以下步骤操作：\n\n1. 选择 **产品** ➤ **运行**。Xcode 会运行你的 `InheritProgram`\
  \ 项目。注意两个标签看起来完全相同。\n2. 点击 **更改** 按钮。`Object 1` 标签仅更改其文本颜色，因为它代表了一个只有一个属性（`myColor`）的类。`Object\
  \ 2` 标签同时更改其文本颜色和背景颜色，因为它有两个属性（`myColor` 和 `myBackground`），如图 14-17 所示。尽管两个类中的 `change()`\
  \ 方法名称完全相同，但它在第二个类中被重写以修改 `myBackground` 属性。\n\n![A437923_1_En_14_Fig17_HTML.jpg](img/A437923_1_En_14_Fig17_HTML.jpg)\n\
  \n**图 14-17.** 点击 **更改** 按钮会使用相同的方法名修改两个不同的对象\n\n3. 选择 **InheritProgram** ➤ **退出\
  \ InheritProgram**。\n\n\n\n### 摘要\n\n类（Class）让你可以将相关的代码组织在一起，使数据（属性）和操作这些数据的函数（方法）存储在同一个地方。扩展类功能最直接的方式是通过继承（inheritance）来创建子类（subclass）。\n\
  \n继承允许你继承另一个类的所有属性和方法。一个类只能继承自另一个类，但这个被继承的类也可以继承自其他类，从而形成一个类之间相互继承的链条（daisy-chain）效应。Cocoa\
  \ 框架正是基于这种类的链条式继承思想构建的。\n\n要阻止继承，可以使用 `final` 关键字。当你重写某个属性或方法时，需要使用 `override` 关键字。\n\
  \n除了继承，你还可以通过扩展（extensions）和协议（protocols）来扩展类的功能。协议在 Cocoa 框架中常被用来扩展类的功能。通过继承、扩展和协议，你可以扩展任何类的功能，从而轻松复用现有代码。\n\
  \n"
- "# 15. 创建用户界面\n\n虽然可以创建完全不与用户交互的程序（例如控制交通灯的程序），但更常见的是创建显示某种用户界面的程序。通常，这意味着显示一个包含各种不同项目的窗口，例如用于显示文本的标签（label）、允许用户输入内容的文本字段（text\
  \ field），以及让用户控制程序的按钮或下拉菜单（pull-down menu）。\n\n创建有效的用户界面完全取决于程序的目的。商业程序通常遵循带有下拉菜单和按钮的标准惯例，而视频游戏则可能创建自定义界面，看起来与标准的\
  \ macOS 程序完全不同。归根结底，用户界面需要满足用户的需求。如果在遵循标准的用户界面设计惯例和让用户界面更易于使用之间做选择，请始终以用户为中心。\n\n\
  为了帮助你更好地理解用户界面设计，Apple 提供了一份名为《macOS 人机界面指南》（The macOS Human Interface Guidelines）的免费文档。该文档简要概述了如何让典型的\
  \ macOS 用户界面高效工作，并特别强调了利用 macOS 最新特性。遵循这些指南，你的 macOS 程序将显得现代且与时俱进。如果未能利用 macOS 的最新特性，即使你的程序是全新的，也可能看起来过时。\n\
  \n在前面的章节中，你使用 Xcode 设计了简单的用户界面。在本章中，你将更深入地了解 Xcode 中专注于帮助你设计用户界面的不同部分。\n\n请记住，用户界面不存在“完美”的设计。所谓“完美”的用户界面，是能让任务尽量简单、省力，以至于用户甚至没有意识到自己在与任何用户界面进行交互。用户界面充当了你与程序之间的中间人或翻译者。任何用户界面的目标都是让用户感觉他们正在直接与程序进行沟通和操作。\n\
  \n## 理解用户界面文件\n\nCocoa 框架定义了用于创建各种用户界面项目的类，从按钮（`NSButton` 类）、文本字段（`NSTextField`）到滑块（`NSSlider`）或日期选择器（`NSDatePicker`）。理论上，完全可以使用\
  \ Swift 代码来创建整个用户界面。但这样做可能很繁琐，因为除非实际运行程序，否则无法看到用户界面的样子。这就好比试图通过描述画笔需要精确放在画布的哪个位置，以及手移动的具体角度和方向来画一幅画，显得非常笨拙。\n\
  \nXcode 并没有强迫你编写 Swift 代码来定义用户界面，而是提供了一个名为 Interface Builder 的功能。Interface Builder\
  \ 的设计理念是，你可以通过将项目拖放到窗口中来设计用户界面。\n\n通过拖放项目来创建用户界面的优点是，你可以实时看到用户界面的样子，从而快速进行调整和修改。此外，通过将用户界面的设计与\
  \ Swift 代码分离，你现在可以在不影响 Swift 代码的情况下更改用户界面，反之亦然。\n\n在过去，程序员必须通过编写代码来创建用户界面时，修改用户界面代码可能会影响程序运行的核心代码（反之亦然）。因此，修改程序的速度很慢，因为你需要不断测试以确保你的更改不会影响程序的其他部分。\n\
  \n通过将用户界面与 Swift 代码隔离，Xcode 让你能够比以前更快地创建可靠的程序。现在，你可以替换一个用户界面并换上另一个，而不影响代码；或者修改代码而不影响用户界面。\n\
  \nXcode 为你提供了两种存储用户界面的选择：\n\n*   存储在 `.xib` 文件中\n*   存储在 `.storyboard` 文件中\n\n一个\
  \ `.xib` 文件（代表 Xcode Interface Builder）通常包含用户界面的单个窗口或视图。一个简单的程序可能只需一个 `.xib` 文件来存储其用户界面，但更复杂的程序可能需要多个\
  \ `.xib` 文件来存储不同的窗口。\n\n一个 `.storyboard` 文件由一个或多个视图（view）和转场（segue，即视图之间的过渡）组成，其中视图通常代表屏幕上出现的窗口，而转场定义了从一个视图到下一个视图的过渡。\n\
  \n实际上，你可以将 `.xib` 和 `.storyboard` 文件组合在同一个项目中，来创建程序的用户界面。由于 `.storyboard` 文件常用于创建\
  \ iOS 应用，现在它也越来越多地被用于创建 macOS 用户界面。（第 16 章会进一步介绍故事板（storyboards）和转场（segues）。）\n\n\
  用户界面的基本组件是视图（view），它在屏幕上显示信息。一个视图可以是一个完整的窗口，也可以只是一个能够显示信息的方框，例如表格、可滚动的文本列表或图片。无论你使用\
  \ `.xib` 文件还是 `.storyboard` 文件，用户界面总是由一个或多个包含其他用户界面项目（如按钮和文本字段）的视图组成。\n\n\n\n##\
  \ 搜索对象库\n\n要显示程序的用户界面，需要在项目导航窗格中点击 `.xib` 或 `.storyboard` 文件。选定要修改的用户界面文件后，就可以从对象库（位于\
  \ Xcode 窗口右下角）中拖拽项目，并将其放置在用户界面的任意位置。若要查看对象库，请选择“显示”➤“工具”➤“显示对象库”。\n\n搜索对象库有两种方法。一种方法是直接上下滚动，直到找到所需项目。由于对象库列出了所有可用的用户界面项目，滚动浏览可能会显得笨拙且缓慢。\n\
  \n更快的方法是使用对象库窗格底部的搜索字段，如图 15-1 所示。只需输入要使用的用户界面项目名称的一部分，对象库就会过滤掉所有不匹配的项目。\n\n![A437923_1_En_15_Fig1_HTML.jpg](img/A437923_1_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1. 搜索字段让您能快速在对象库中找到用户界面项目\n\n要学习如何搜索对象库，请遵循以下步骤：\n\n1.  在 Xcode 中选择“文件”➤“新建”➤“项目”。\n\
  2.  在 macOS 类别下点击“应用程序”。\n3.  点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 现在会要求输入产品名称。\n4.\
  \  点击“产品名称”文本字段，输入 `UIProgram`。\n5.  确保“语言”弹出菜单显示为 Swift，并且没有选中任何复选框。请注意，此时您可以通过选中“使用故事板”复选框来选择使用故事板，如图\
  \ 15-2 所示。暂时保持“使用故事板”复选框为未选中状态。\n\n    ![A437923_1_En_15_Fig2_HTML.jpg](img/A437923_1_En_15_Fig2_HTML.jpg)\n\
  \n    图 15-2. 创建新项目时，您可以选择为界面使用故事板\n6.  点击“下一步”按钮。Xcode 会询问您希望将项目存储在何处。\n7.  选择一个文件夹来存储项目，然后点击“创建”按钮。\n\
  8.  在项目导航器中点击 `MainMenu.xib` 文件。程序的用户界面将会显示出来。\n9.  点击“窗口”图标，如图 15-3 所示，以显示程序用户界面的窗口。\n\
  \n    ![A437923_1_En_15_Fig3_HTML.jpg](img/A437923_1_En_15_Fig3_HTML.jpg)\n\n  \
  \  图 15-3. “窗口”图标代表您的用户界面窗口\n10. 点击“窗口”图标，如图 15-3 所示，以显示程序用户界面的窗口。\n11. 选择“显示”➤“工具”➤“显示对象库”。对象库会出现在\
  \ Xcode 窗口的右下角。\n12. 上下滚动浏览对象库。注意您可以添加到用户界面中的不同项目的名称和种类。\n13. 点击对象库底部的搜索字段，输入 `text`。请注意，对象库现在只显示名称或描述中包含“text”的项目，如图\
  \ 15-4 所示。\n\n    ![A437923_1_En_15_Fig4_HTML.jpg](img/A437923_1_En_15_Fig4_HTML.jpg)\n\
  \n    图 15-4. 在对象库中搜索“text”\n14. 点击对象库底部的搜索字段，点击关闭图标（搜索字段最右侧灰色圆圈内的 X）以清空搜索字段。\n\
  15. 输入 `button`。请注意，对象库现在只显示名称或描述中包含“button”的项目。如果您知道所需项目的全部或部分名称或用途，那么在对象库中搜索要比在冗长的所有可用用户界面项目列表中滚动浏览快得多。\n\
  \n## 显示和接受文本的用户界面项目\n\n尽管对象库包含大量可放置在用户界面上的可用项目，但大多数项目可以按功能分组归类。请记住，用户界面具有三种功能：\n\
  \n*   向用户显示信息\n*   接收用户输入的数据\n*   允许用户控制程序\n\n在用户界面上显示信息的最简单方法是通过标签。在 Cocoa 框架中，标签基于\
  \ `NSTextField` 类。本质上，标签是一种不可编辑的文本字段。要识别对象库中任何项目的类，只需点击它，就会弹出一个窗口，描述该项目的用途及其基于的类（见图\
  \ 15-5）。\n\n![A437923_1_En_15_Fig5_HTML.jpg](img/A437923_1_En_15_Fig5_HTML.jpg)\n\
  \n图 15-5. 识别对象库中用户界面项目的类\n\n任何基于 `NSTextField` 的用户界面项目都可用于显示和接受文本，尽管更常见的做法是使用标签来显示文本，并使用其他类型的文本字段让用户输入文本。基于\
  \ `NSTextField` 的用户界面项目列表如图 15-6 所示：\n\n![A437923_1_En_15_Fig6_HTML.jpg](img/A437923_1_En_15_Fig6_HTML.jpg)\n\
  \n图 15-6. 基于 `NSTextField` 类的用户界面项目\n\n*   标签：显示文本，但不允许用户输入或编辑文本\n*   文本字段：允许用户输入和编辑文本\n\
  *   带数字格式器的文本字段：允许用户轻松输入和编辑格式化的数字\n*   自动换行标签：在多行上显示文本\n*   自动换行文本字段：允许用户输入和编辑显示在多行上的文本\n\
  *   文本字段单元格：允许您在表格等单元格中以彩色显示文本\n\n## 限制选择的用户界面项目\n\n让用户在文本字段中输入数据提供了最大的灵活性。然而，这种灵活性也意味着您的程序无法知道用户可能输入哪种类型的数据。如果程序期望用户输入年龄的数字，但用户却输入了“forty-nine”，那么程序很可能会崩溃，因为它期望的是数字，但收到的却是单词。\n\
  \n更糟糕的是，程序可能会询问某人的年龄，而用户可能输入一个负数或一个高得离谱的数字（如 239），这显然不可能是某人的年龄。为了确保用户输入正确的数据，您可以使用各种不同的用户界面项目，让用户从一系列有效选项中进行选择。显示文本（包括数字）选项的用户界面项目包括：\n\
  \n*   弹出按钮 (`NSPopUpButton`)：显示一个有效选项的菜单\n*   单选组 (`NSButton`)：显示一组单选按钮，一次只能选择一个\n\
  *   复选框 (`NSButton`)：显示一个或多个复选框，让用户选择多个选项\n*   组合框 (`NSComboBox`)：兼具文本字段和弹出按钮的功能，用户既可以输入文本，也可以从有效选项列表中选择\n\
  \n允许用户选择一系列有效数值选项的用户界面项目包括：\n\n*   日期选取器 (`NSDatePicker`)：让用户选择包含日、月、年的日期\n*   水平/垂直/圆形滑块\
  \ (`NSSlider`)：让用户移动滑块以选择固定范围内的有效数值\n*   步进器 (`NSStepper`)：以固定增量增加或减少数值\n\n对于文本选项，您需要列出用户可以选择的所有有效选项。对于数值选项，您只需列出一个所有有效选项的范围，例如让用户选择\
  \ 1 到 100 之间的数字。\n\n\n\n### 可接收命令的用户界面元素\n\n最常见的用户界面元素是那些能接收命令，以便用户控制程序的元素。其中最常见的两类可接收命令的界面元素是**按钮**和**菜单**。每个按钮或菜单项都代表一条单一命令，因此当用户点击按钮或菜单项时，该命令便会指示程序执行相应操作。\n\
  \n按钮和菜单都允许视图使用一种称为“目标-动作”（target-action）的机制与控制器通信，如图 15-7 所示。目标是触发控制器中某个动作（例如运行一个\
  \ `IBAction` 方法）的按钮或菜单项。\n\n![A437923_1_En_15_Fig7_HTML.jpg](img/A437923_1_En_15_Fig7_HTML.jpg)\n\
  \n**图 15-7.** 按钮和菜单让视图能够与控制器通信\n\n用户界面按钮基于 `NSButton` 类。菜单项基于 `NSMenuItem` 类。对象库中显示了多种不同类型的按钮和菜单项，但它们的工作原理相同，即按钮或菜单项代表一条命令。要使该命令生效，需要将界面上的按钮连接到\
  \ Swift 文件中的 `IBAction` 方法。\n\n### 用于分组元素的用户界面元素\n\n有一类用户界面元素只负责对界面上的其他元素进行分组和组织，例如在相关按钮或文本周围显示一个边框。这些界面元素更具装饰性，因此通常不需要使用\
  \ `IBOutlet` 或 `IBAction` 方法将其连接到 Swift 代码。一些用于分组和组织其他界面元素的示例如下：\n\n-   **表格视图**\
  \ (`NSTableView`)：以行形式显示数据\n-   **集合视图** (`NSCollectionView`)：以行和列形式显示数据\n-   **盒视图**\
  \ (`NSBox`)：显示一个在相关元素周围绘制边框的盒子\n-   **标签视图** (`NSTabView`)：显示两个或多个标签页，可更改盒子内显示的数据，如图\
  \ 15-8 所示\n\n    ![A437923_1_En_15_Fig8_HTML.jpg](img/A437923_1_En_15_Fig8_HTML.jpg)\n\
  \n    **图 15-8.** 标签视图可以在同一个盒子内对两组或多组相关元素进行分组。\n\n-   **窗口** (`NSWindow`)：显示一个可容纳其他界面元素的窗口\n\
  -   **工具栏** (`NSToolbar`)：显示代表命令的图标\n\n尽管对象库中包含许多其他元素，但它们通常可分为以下四类：\n\n-   显示或接收文本的元素\n\
  -   允许用户从有限的合法选项中进行选择的元素\n-   允许用户选择命令来控制程序的元素\n-   对其它界面元素进行分组或组织的元素\n\n## 在自动布局中使用约束\n\
  \n无论您在界面上放置何种元素，都需要考虑用户调整窗口大小时会发生什么。窗口太大可能会在界面上留下过多空白空间；窗口太小则可能裁剪掉部分元素，如图 15-9 所示。\n\
  \n![A437923_1_En_15_Fig9_HTML.jpg](img/A437923_1_En_15_Fig9_HTML.jpg)\n\n**图 15-9.**\
  \ 当用户调整窗口大小时，若界面不能自适应，就可能裁剪掉部分元素\n\n有两种方法可以确保用户调整窗口大小时界面仍保持可用。首先，可以为窗口定义最小和最大尺寸，以防止其过度缩小或放大。其次，可以为单个元素设置约束，定义相邻元素之间以及元素与窗口边缘之间的距离。\n\
  \n在大多数情况下，您可以同时使用这两种方法。这样，您既可以为窗口定义最小和最大尺寸，也可以定义界面元素应如何适应窗口大小的变化。\n\n### 定义窗口尺寸\n\
  \n窗口用于在屏幕上显示程序的用户界面。Xcode 允许您为窗口定义以下内容（如图 15-10 所示）：\n\n![A437923_1_En_15_Fig10_HTML.jpg](img/A437923_1_En_15_Fig10_HTML.jpg)\n\
  \n**图 15-10.** 尺寸检查器允许您定义窗口大小\n\n-   窗口的初始尺寸\n-   窗口的最小尺寸\n-   窗口的最大尺寸\n-   窗口在屏幕上的初始位置\n\
  \n要在 Xcode 中定义 `.xib` 文件的窗口尺寸，请按照以下步骤操作：\n\n1.  在项目导航窗格中点击 `.xib` 文件。Xcode 将显示存储在\
  \ `.xib` 文件中的用户界面。\n2.  如有必要，点击左下角的“隐藏文档大纲”图标，如图 15-11 所示。\n\n![A437923_1_En_15_Fig11_HTML.jpg](img/A437923_1_En_15_Fig11_HTML.jpg)\n\
  \n**图 15-11.** “隐藏文档大纲”图标\n\n3.  点击代表您用户界面窗口的底部图标，如图 15-12 所示。\n\n![A437923_1_En_15_Fig12_HTML.jpg](img/A437923_1_En_15_Fig12_HTML.jpg)\n\
  \n**图 15-12.** 底部图标代表您的用户界面窗口\n\n4.  选择“视图”➤“实用工具”➤“显示尺寸检查器”。尺寸检查器窗格将出现（参见图 15-10）。\n\
  \n存储在 `.storyboard` 文件中的窗口与 `.xib` 文件的处理方式略有不同。创建 macOS 项目时，您可以选择使用 `.xib` 文件或 `.storyboard`\
  \ 文件。如果您创建的是使用 `.storyboard` 文件的项目，可以通过以下步骤在 Xcode 中定义 `.storyboard` 文件的窗口尺寸：\n\n\
  1.  在项目导航窗格中点击 `.storyboard` 文件。Xcode 将显示存储在 `.storyboard` 文件中的用户界面。\n2.  点击要修改窗口的视图控制器，如图\
  \ 15-13 所示。\n\n![A437923_1_En_15_Fig13_HTML.jpg](img/A437923_1_En_15_Fig13_HTML.jpg)\n\
  \n**图 15-13.** 视图控制器定义您的用户界面窗口\n\n3.  选择“视图”➤“实用工具”➤“显示尺寸检查器”。尺寸检查器窗格将出现（参见图 15-10）。\n\
  \n无论您使用 `.xib` 文件还是 `.storyboard` 文件创建用户界面，Xcode 都提供两种更改任何窗口尺寸的方法。首先，您可以使用鼠标拖动窗口（或视图控制器）的边或角。其次，您可以点击“尺寸”标签旁边的“宽度”和“高度”文本框，为窗口的宽度和高度选择精确值，如图\
  \ 15-14 所示。\n\n![A437923_1_En_15_Fig14_HTML.jpg](img/A437923_1_En_15_Fig14_HTML.jpg)\n\
  \n**图 15-14.** 定义窗口的宽度和高度\n\n定义窗口的最小和/或最大尺寸需要两步操作。首先，您需要选中**最小尺寸**和/或**最大尺寸**复选框。其次，您需要输入或选择宽度和高度，以定义窗口的最小或最大尺寸。\n\
  \n最后，您还可以定义窗口首次出现时的初始位置。为此，您可以在模拟屏幕上拖动窗口图标，或者在**初始位置**文本框中输入 X 和 Y 值，如图 15-15 所示。\n\
  \n![A437923_1_En_15_Fig15_HTML.jpg](img/A437923_1_En_15_Fig15_HTML.jpg)\n\n**图 15-15.**\
  \ 定义窗口的初始位置\n\n模拟屏幕下方的两个弹出菜单允许您定义如何确定窗口的初始位置：\n\n-   **从左侧/右侧固定**：定义窗口边缘与屏幕边缘之间的固定值\n\
  -   **水平/垂直比例**：根据屏幕尺寸，定义窗口边缘与屏幕边缘之间的比例值\n-   **水平/垂直居中**：定义窗口显示在屏幕中央\n\n\n\n\n\
  ### 为用户界面项添加约束\n\n为窗口定义最小尺寸可以防止用户将窗口缩得太小，以致于裁剪掉用户界面上显示的项目。但是，如果用户放大了窗口会发生什么？此时，窗口中的项目理想情况下应调整其位置，以适应放大的窗口尺寸。\n\
  \n约束定义了两个项目之间的距离，例如按钮与窗口边缘之间，或两个按钮之间的距离。Xcode 提供了三种方式来为用户界面项添加约束：\n\n- 从某个用户界面项按住\
  \ Control 键拖动鼠标到另一个项目或窗口边缘\n- 选择 `Editor ➤ Resolve Auto Layout Issues`（编辑器 ➤ 解决自动布局问题）\n\
  - 点击右下角的 `Add New Constraints`（添加新约束）或 `Resolve Auto Layout Issues`（解决自动布局问题）图标，如图\
  \ 15-16 所示\n\n![A437923_1_En_15_Fig16_HTML.jpg](img/A437923_1_En_15_Fig16_HTML.jpg)\n\
  \n图 15-16. `Align`（对齐）、`Pin`（固定）和 `Resolve Auto Layout Issues`（解决自动布局问题）图标\n\n要使用\
  \ Control-拖拽方法添加约束，请遵循以下步骤：\n\n1. 将鼠标指针移动到您想要添加约束的用户界面项上。\n2. 按住 `Control` 键，并将鼠标拖向另一个用户界面项或窗口边缘。\n\
  3. 当鼠标指针出现在另一个用户界面项或窗口边缘附近时，松开 `Control` 键和鼠标按钮。此时会弹出一个窗口，类似于图 15-17 所示。\n\n![A437923_1_En_15_Fig17_HTML.jpg](img/A437923_1_En_15_Fig17_HTML.jpg)\n\
  \n图 15-17. 松开 `Control` 键和鼠标会显示一个弹出窗口\n\n根据您 `Control`-拖拽鼠标的方向，弹出窗口中会显示不同的选项，如表\
  \ 15-1 所示。\n\n表 15-1. 弹出窗口选项\n\n| 拖拽方向 (至窗口边缘) | 约束选项 |\n| --- | --- |\n| 向上 | `Top\
  \ space to container`（到容器顶部间距） |\n| 向下 | `Bottom space to container`（到容器底部间距） |\n\
  | 向右 | `Trailing space to container`（到容器尾部间距） |\n| 向左 | `Leading space to container`（到容器首部间距）\
  \ |\n\n除了拖拽到窗口边缘，您还可以从一个用户界面项 `Control`-拖拽到另一个用户界面项上。这样做可以定义用户界面上两个项目之间的距离，例如两个按钮之间或一个按钮与一个文本字段之间的距离。\n\
  \n当您 `Control`-拖拽鼠标到另一个用户界面项上时，会弹出一个窗口。如果您正在定义两个并排项目之间的距离，弹出窗口将显示 `Horizontal Spacing`（水平间距）选项。如果您正在定义两个上下堆叠项目之间的距离，弹出窗口将显示\
  \ `Vertical Spacing`（垂直间距）选项，如表 15-2 所示。\n\n表 15-2. 间距选项\n\n| 拖拽方向 (至另一项目) | 约束选项\
  \ |\n| --- | --- |\n| 左/右 | `Horizontal spacing`（水平间距） |\n| 上/下 | `Vertical spacing`（垂直间距）\
  \ |\n\n`Control`-拖拽方法让您可以直观地约束不同的用户界面项。定义约束的另一种方法是点击您想要约束的用户界面项，然后点击 `Pin`（固定）图标以显示弹出窗口。要通过\
  \ `Pin`（固定）图标定义约束，请遵循以下步骤：\n\n1. 点击您想要约束的用户界面项。\n2. 点击 `Add New Constraints`（添加新约束）图标。此时会弹出一个窗口，显示四个方向的约束：左、右、上、下。在图\
  \ 15-18 中，距窗口顶部的距离为 139，距窗口左侧的距离为 145，距窗口右侧的距离为 239，距窗口底部的距离为 199。\n\n![A437923_1_En_15_Fig18_HTML.jpg](img/A437923_1_En_15_Fig18_HTML.jpg)\n\
  \n图 15-18. `Add New Constraints`（添加新约束）图标显示一个约束弹出窗口\n\n3. 点击某个约束以将其选中。当您点击一个约束时，它会显示为红色。如果约束显示为虚线，则表示该约束尚未被选中。\n\
  4. 点击任意其他复选框。\n5. 点击弹出窗口底部的 `Add Constraints`（添加约束）按钮来定义一个或多个约束。\n\n`Add New Constraints`（添加新约束）弹出窗口允许您为所选用户界面项定义其他类型的约束：\n\
  \n- `Width`（宽度）或 `Height`（高度）：将所选用户界面项的大小保持在固定尺寸\n- `Equal Widths`（等宽）或 `Heights`（等高）：将两个或多个选定的用户界面项保持为相同的固定尺寸\n\
  - `Aspect Ratio`（宽高比）：如果调整大小，则保持所选用户界面项的宽高比适当\n- `Align`（对齐）：将两个或多个选定的用户界面项对齐\n\n\
  定义约束的第三种方法是让 Xcode 为您选择约束。这可以让您快速添加约束，但风险是 Xcode 可能无法正确定义约束。幸运的是，您之后始终可以编辑约束。\n\n\
  要让 Xcode 选择约束，请遵循以下步骤：\n\n1. 点击您想要约束的用户界面项。\n2. 点击 `Resolve Auto Layout Issues`（解决自动布局问题）图标以显示一个弹出窗口，如图\
  \ 15-19 所示（或选择 `Editor ➤ Resolve Auto Layout Issues`（编辑器 ➤ 解决自动布局问题））。\n\n![A437923_1_En_15_Fig19_HTML.jpg](img/A437923_1_En_15_Fig19_HTML.jpg)\n\
  \n图 15-19. `Resolve Auto Layout Issues`（解决自动布局问题）弹出窗口\n\n3. 选择 `Add Missing Constraints`（添加缺失约束）或\
  \ `Reset to Suggested Constraints`（重置为建议约束）选项。\n\n如果您选择窗口上半部分的选项，则只会影响所选定的用户界面项。如果您选择窗口下半部分的选项，则无论是否选中，都会影响所有用户界面项。\n\
  \n请记住，添加约束可能是一个反复试验的过程：定义一个约束，观察其效果，然后再修改或完全删除它。在您添加约束时，Xcode 会在您的用户界面项周围显示约束线。如果\
  \ Xcode 认为您的约束不足，该项上的所有约束将显示为橙色。一旦 Xcode 认为您对某个项添加了足够的约束，这些约束将显示为蓝色。\n\n\n\n###\
  \ 编辑约束\n\n定义了一个或多个约束后，你随时可以删除或编辑现有约束。要删除约束，有几种方法：\n\n- 点击该约束，然后按下 `Delete` 或 `Backspace`\
  \ 键\n- 点击包含该约束的用户界面元素，打开“`大小检查器`”面板，然后点击该约束并按下 `Delete` 或 `Backspace` 键\n\n你还可以从单个用户界面元素或当前显示的用户界面的所有元素中删除或清除所有约束。为此，你有两种选择：\n\
  \n- 选择 `Editor` ➤ `Resolve Auto Layout Issues`\n- 点击窗口右下角的 `Resolve Auto Layout\
  \ Issues` 图标\n\n选择任一选项后，你都会看到一个分为上半部分和下半部分的菜单（见图 15-20）。点击上半部分的 `Clear Constraints`\
  \ 选项，只会清除当前选中元素的约束。点击下半部分的 `Clear Constraints` 选项，则会清除当前显示的用户界面中所有元素的约束，无论你是否选中它们。\n\
  \n除了删除约束，你还可以编辑它。编辑可以让你修改约束的行为方式。关于约束，你可以修改三个值：\n\n- `Constant`（常量）：一个固定值，用于定义约束的值\n\
  - `Priority`（优先级）：一个数值，决定哪些约束必须优先遵循\n- `Modifier`（修正符）：一个数值，用于定义影响两个值的比率，例如元素高度与宽度的比率，或一个元素宽度与另一个元素宽度的比率\n\
  \n要编辑约束，请按以下步骤操作：\n\n1.  点击包含你想要编辑的约束的用户界面元素。\n2.  选择 `View` ➤ `Utilities` ➤ `Show\
  \ Size Inspector`。“`大小检查器`”面板会列出所有已定义的约束，如图 15-21 所示。\n\n![A437923_1_En_15_Fig20_HTML.jpg](img/A437923_1_En_15_Fig20_HTML.jpg)\n\
  \n图 15-20. 在“`大小检查器`”面板中查看已定义约束的列表\n\n3.  点击你想要修改的约束最右侧的 `Edit` 按钮。此时会出现一个弹出窗口，如图\
  \ 15-22 所示。\n\n![A437923_1_En_15_Fig21_HTML.jpg](img/A437923_1_En_15_Fig21_HTML.jpg)\n\
  \n图 15-21. 弹出窗口允许你修改约束\n\n请注意，在 `Constant:` 标签的右侧，有一个显示等号（`=`）的弹出菜单。如果你点击此弹出菜单，可以选择大于或等于、小于或等于，或等于。\n\
  \n在 `Constant` 标签的更右侧是一个显示数字的下拉字段。如果你点击向下的箭头，你将能够在三个选项中进行选择：\n\n- 一个可以输入或编辑的数值\n\
  - `Use Standard Value`（使用标准值）：让 Xcode 决定最佳值\n- `Use Canvas Value`（使用画布值）：使用屏幕上的当前距离来定义固定值\n\
  \n请记住，固定值或画布值在不同尺寸的显示器上表现可能不同。你可能需要反复试验，直到找到适合你特定用户界面的正确值。\n\n优先级用于解决两个或多个可能相互矛盾的约束之间的冲突，例如，一个约束将按钮固定在窗口的右边缘，第二个约束将同一个按钮固定在窗口的左边缘，而第三个约束则固定按钮的宽度。通过修改优先级，你可以确保约束之间不会冲突。\n\
  \n找到正确的约束组合有时既繁琐又令人沮丧。为了简化设置约束的过程，Xcode 提供了两种为你定义约束的方法：\n\n- `Add Missing Constraints`（添加缺失的约束）：保留你已定义的任何现有约束，并添加\
  \ Xcode 认为你缺失的新约束\n- `Reset to Suggested Constraints`（重置为建议的约束）：删除你可能为某个元素设置的所有约束，并用其自身的约束替换它们\n\
  \n当你初次定义约束时，Xcode 会用红色或橙色显示它们，以提示你现有的约束不足以定义用户界面中元素的位置。一旦你定义了足够多的约束来指定位置，Xcode 就会用蓝色显示这些约束。\n\
  \n\n\n## 在 macOS 程序中定义约束\n\n要完全理解约束，你需要了解它们在实际程序中是如何运作的。然后你就能看到每次调整窗口大小时，用户界面是如何随之调整的。在接下来的示例程序中，你将为一个按钮和一个文本字段定义关系约束，同时还会为一个图像定义宽高比约束。\n\
  \n本章前面你已经创建了一个名为 `UIProgram` 的 macOS 项目，现在我们用它来看看约束是如何工作的：\n\n1.  确保你的 `UIProgram`\
  \ 项目已在 Xcode 中加载。\n2.  在项目导航器中点击 `MainMenu.xib` 文件。\n3.  点击 `UIProgram` 图标，使用户界面窗口显示出来。\n\
  4.  选择 View ➤ Utilities ➤ Show Object Library，使对象库显示在 Xcode 窗口的右下角。\n5.  将按钮、文本字段和文本视图各拖一个到用户界面上，使其看起来类似于图\
  \ 15-22。\n\n![A437923_1_En_15_Fig22_HTML.jpg](img/A437923_1_En_15_Fig22_HTML.jpg)\n\
  \n图 15-22.\n\n`UIProgram` 的用户界面\n\n虽然这个用户界面目前看起来还行，但一旦用户调整窗口大小，它就会变得很难看。选择 Product\
  \ ➤ Run，然后调整窗口大小，看看缩小窗口是如何裁剪或隐藏用户界面上的元素的。现在再放大窗口，注意观察放大后窗口中出现的所有空白区域。通过选择 UIProgram\
  \ ➤ Quit `UIProgram` 退出程序。\n\n首先，我们按照以下步骤来定义窗口的最小尺寸：\n\n1.  在项目导航器中点击 `Main.xib`\
  \ 文件。\n2.  点击左侧窗格中的“窗口”图标以选中整个窗口。\n3.  选择 View ➤ Utilities ➤ Show Size Inspector\
  \ 以显示窗口约束（见图 15-14）。\n4.  点击选中顶部的“最小尺寸”复选框，将当前窗口尺寸定义为其最小尺寸。\n5.  选择 Product ➤ Run。调整用户界面窗口的大小。注意，你只能将窗口缩小到特定尺寸。\n\
  6.  选择 UIProgram ➤ Quit `UIProgram`。\n\n通过定义最小窗口尺寸，你已防止了用户将窗口缩得过小时用户界面被裁剪或元素消失。现在我们添加约束，使用户界面在窗口放大时也能自适应。\n\
  \n1.  将鼠标指针移到按钮上，按住 Control 键，向右拖动鼠标，在到达窗口右边缘前停止，如图 15-23 所示。\n\n![A437923_1_En_15_Fig23_HTML.jpg](img/A437923_1_En_15_Fig23_HTML.jpg)\n\
  \n图 15-23.\n\n调整用户界面窗口的大小\n2.  松开 Control 键和鼠标。此时会弹出一个窗口。\n3.  选择“距容器的尾部间距”。注意，按钮显示为红色，说明你对该按钮的约束还不够。\n\
  4.  将鼠标指针移到按钮上，按住 Control 键，向下拖动鼠标，在到达窗口底部边缘前停止。\n5.  松开 Control 键和鼠标。此时会弹出一个窗口。\n\
  6.  选择“距容器的底部间距”。注意，按钮现在显示为蓝色，说明约束已足够。\n7.  点击文本字段以选中它。\n8.  选择 Editor ➤ Resolve\
  \ Auto Layout Issues ➤ Add Missing Constraints。Xcode 会自动添加约束，如图 15-24 所示。\n\n![A437923_1_En_15_Fig24_HTML.jpg](img/A437923_1_En_15_Fig24_HTML.jpg)\n\
  \n图 15-24.\n\n文本字段上的约束\n9.  选择 Product ➤ Run。\n10.  调整窗口大小。注意观察放大窗口时用户界面元素是如何调整的。如你所见，无论用户如何调整窗口大小，约束都能让用户界面元素保持在适当的位置和尺寸。你可以自由尝试编辑约束，看看它们是如何工作的。\n\
  11.  选择 UIProgram ➤ Quit `UIProgram`。\n\n### 总结\n\n程序中的用户界面决定了用户如何与你的程序交互。每个用户界面都需要显示信息、从用户处获取信息，并允许用户选择命令。理想情况下，用户应更专注于使用你的程序，而不是花心思去弄明白用户界面是如何运作的。\n\
  \n无论你使用 `.xib` 文件还是 `.storyboard` 文件，对象库都会显示所有可以添加到用户界面的元素。为了帮助你快速找到所需元素，你可以在对象库底部的搜索框中输入完整或部分单词进行搜索。\n\
  \n约束能帮助你的用户界面在任何窗口大小调整下都保持美观。两种基本的约束类型包括：\n\n*   **关系约束**：定义相邻元素之间的距离，例如两个按钮之间，或按钮与窗口边缘之间的距离。\n\
  *   **尺寸约束**：定义元素的高度、宽度或宽高比。\n\n你可以自己定义约束，让 Xcode 自动定义约束，或者两者结合使用。定义约束可能需要反复尝试，直到你的用户界面能完全按照你的期望适应窗口大小的变化。\n\
  \n\n"
- "# 16. 使用故事板\n\n每个程序用户界面中最常见的部分就是用来显示按钮和文本字段等项目的窗口。在 Xcode 中，窗口被称为视图。除了最简单的程序之外，大多数程序的用户界面都可能包含两个或更多的窗口或视图。这意味着你的程序需要知道如何打开额外的窗口，以及如何再次关闭它们。\n\
  \n创建和存储视图的两种方式是用 ` .xib` 文件和 ` .storyboard` 文件。一个 ` .xib` 文件只保存一个视图，因此如果你需要显示多个视图，就需要创建多个\
  \ ` .xib` 文件。而一个 ` .storyboard` 文件可以保存一个或多个视图。\n\n你可以使用 ` .xib` 文件或 ` .storyboard`\
  \ 文件，或者两者的组合来创建用户界面。最初，你可以使用 ` .xib` 或 ` .storyboard` 文件来创建 iOS 应用，但 Xcode 8 现在只为\
  \ iOS 应用创建 ` .storyboard` 文件。对于创建 macOS 程序，你仍然可以使用 ` .xib` 或 ` .storyboard` 文件，但由于\
  \ iOS 应用主要依赖 ` .storyboard` 文件，苹果也很可能将 macOS 编程迁移到 ` .storyboard` 文件。因此，你应该更多地学习如何使用\
  \ ` .storyboard` 来创建用户界面。\n\n最终，无论你是使用 ` .xib` 还是 ` .storyboard` 文件，都不及学会如何设计一个良好的用户界面来得重要，这个界面的目标是让用户能尽可能轻松地完成任务。\n\
  \n每次创建新项目时，Xcode 都会让你选择是否使用故事板，如图 16-1 所示。如果你选择不使用故事板，那么 Xcode 会将你的用户界面创建并存储在一个\
  \ ` .xib` 文件中。如果你选择使用故事板，那么 Xcode 会将你的用户界面存储在一个 ` .storyboard` 文件中。\n\n![A437923_1_En_16_Fig1_HTML.jpg](img/A437923_1_En_16_Fig1_HTML.jpg)\n\
  \n图 16-1. 创建 macOS 项目时，Xcode 会给你选择是否使用故事板\n\n要尝试使用故事板，你需要按照以下步骤创建一个使用故事板的项目：\n\n\
  1. 在 Xcode 中选择 文件 ➤ 新建 ➤ 项目。\n2. 单击 macOS 类别下的“应用”。\n3. 单击“Cocoa 应用”，然后单击“下一步”按钮。Xcode\
  \ 会要求你输入产品名称。\n4. 单击“产品名称”文本字段，输入 `StoryProgram`。\n5. 确保“语言”弹出菜单显示为 Swift，并且只选中了“使用故事板”复选框（见图\
  \ 16-1）。\n6. 单击“下一步”按钮。Xcode 会询问你希望将项目存储在哪里。\n7. 选择一个文件夹来存储你的项目，然后单击“创建”按钮。\n8.\
  \ 在项目导航窗格中单击 `Main.storyboard` 文件。` .storyboard` 用户界面就会出现，如图 16-2 所示。\n\n   ![A437923_1_En_16_Fig2_HTML.jpg](img/A437923_1_En_16_Fig2_HTML.jpg)\n\
  \n   图 16-2. 一个 ` .storyboard` 文件显示了一个窗口控制器和一个视图控制器。与只显示一个窗口来布局按钮、文本字段和标签等用户界面项目的\
  \ ` .xib` 文件不同，` .storyboard` 文件显示两个窗口。上面的窗口（顶部标有“窗口控制器”）定义了窗口在屏幕上的外观。下面的窗口（顶部标有“视图控制器”）定义了该窗口上显示的内容。当你从对象库拖拽用户界面项目时，需要将它们放置在视图控制器（下面的窗口）上。\n\
  \n9. 选择 产品 ➤ 运行。注意，你的程序用户界面会作为一个单独的窗口出现，这与之前使用 ` .xib` 文件创建的项目完全相同。\n10. 选择 StoryProgram\
  \ ➤ 退出 StoryProgram 来退出你的程序并返回 Xcode。\n\n## 使用故事板\n\n就其本身而言，` .storyboard` 文件与 `\
  \ .xib` 文件差别不大。` .storyboard` 文件的主要优势在于，它们能让你轻松地创建和链接多个视图（窗口）。例如，一个程序可能会显示一个登录屏幕，要求用户输入用户名和密码。一旦用户正确输入这些信息，第二个屏幕就可能出现。\n\
  \n这些屏幕中的每一个都代表了程序的一个不同视图或窗口。第一个视图显示登录屏幕，第二个视图显示不同的屏幕。` .storyboard` 文件不仅清晰地定义了不同视图之间是如何连接的，而且还清楚地展示了用户将按怎样的顺序看到每个视图。\n\
  \n故事板由两部分组成，如图 16-3 所示：\n\n![A437923_1_En_16_Fig3_HTML.jpg](img/A437923_1_En_16_Fig3_HTML.jpg)\n\
  \n图 16-3. 故事板将用户界面组织成场景和 segue。\n\n- **场景**：显示用户界面的窗口\n- **Segue**：定义场景之间的连接\n\n\
  场景包含诸如按钮和文本字段之类的用户界面项目。Segue 则显示用户将按什么顺序查看用户界面。\n\n当你首次使用故事板创建一个新项目时，Xcode 会包含一个用于控制单个视图的窗口控制器，你可以在该视图上放置按钮或文本字段等用户界面项目。要向故事板添加额外的视图，你必须使用对象库并添加额外的控制器。\n\
  \n除了显示用户界面项目外，对象库还包含用于故事板的控制器，如图 16-4 所示。\n\n![A437923_1_En_16_Fig4_HTML.jpg](img/A437923_1_En_16_Fig4_HTML.jpg)\n\
  \n图 16-4. 对象库中可以添加到故事板的控制器\n\n你可以放置在故事板上的五种控制器类型包括：\n\n- **视图控制器**：控制一个 ` .xib`\
  \ 文件，以便你可以将其包含在故事板中\n- **窗口控制器**：控制单个窗口或视图\n- **页面控制器**：定义视图之间的动画效果\n- **垂直/水平拆分视图控制器**：并排或堆叠显示两个视图\n\
  - **标签视图控制器**：显示一个带标签的界面，用于控制两个或更多视图\n\n窗口控制器不过是一个包含视图的窗口。窗口中显示的视图由从窗口控制器指向视图的箭头标识（见图\
  \ 16-2）。\n\n页面控制器显示一个允许多个页面出现或消失的视图，从而产生动画效果。这让你可以隐藏视图上的用户界面项目，以便它们稍后出现（和消失）。\n\n\
  垂直/水平拆分视图控制器像一个包含两个视图的窗口，它们要么并排放置，要么上下堆叠，如图 16-5 所示。\n\n![A437923_1_En_16_Fig5_HTML.jpg](img/A437923_1_En_16_Fig5_HTML.jpg)\n\
  \n图 16-5. 拆分视图控制器包含两个视图。\n\n标签视图控制器也由一个可以包含两个或更多视图的单一窗口组成。区别在于它可以显示标签，每个标签代表一个不同的视图，如图\
  \ 16-6 所示。你也可以向标签视图控制器添加两个以上的视图。\n\n![A437923_1_En_16_Fig6_HTML.jpg](img/A437923_1_En_16_Fig6_HTML.jpg)\n\
  \n图 16-6. 标签视图控制器在单个窗口中显示两个或多个视图，并由标签标识。\n\n\n\n### 向故事板添加场景\n\n要向故事板添加场景，必须添加额外的控制器。要了解如何在故事板上创建新场景，请按照以下步骤操作：\n\
  \n1.  确保你的`StoryProgram`项目已加载到 Xcode 中。\n2.  在项目导航器窗格中点击`Main.storyboard`文件。\n3.\
  \  选择“视图”➤“实用工具”➤“显示对象库”。\n4.  从对象库中拖出一个蓝色窗口控制器（见图 16-4），并将其放置在故事板中现有窗口控制器的旁边。\n\
  5.  拖动窗口控制器及其附带的视图控制器，使其如图 16-7 所示。\n\n    ![A437923_1_En_16_Fig7_HTML.jpg](img/A437923_1_En_16_Fig7_HTML.jpg)\n\
  \n    图 16-7. 在故事板中放置第二个窗口控制器\n\n当你开始向故事板添加更多场景时，这些场景不会显示在屏幕上。要使场景显示，你必须使用**转场**将该场景连接到现有场景，或者将该新场景定义为初始场景。\n\
  \n### 定义故事板中的初始场景\n\n在每个故事板中，必须将一个场景定义为初始场景，即程序运行时所显示的第一个窗口或视图。Xcode 使用一个指向右侧的箭头来标识初始场景。\n\
  \n另一种标识初始场景的方法是，点击控制器顶部中间的蓝色图标，并打开“显示属性检查器”窗格。如果`\"Is Initial Controller\"`复选框被选中，则当前选中的窗口即为初始场景，如图\
  \ 16-8 所示。\n\n![A437923_1_En_16_Fig8_HTML.jpg](img/A437923_1_En_16_Fig8_HTML.jpg)\n\
  \n图 16-8. 初始屏幕由箭头和`\"Is Initial Controller\"`复选框标识。\n\n若要更改初始场景，你可以拖动初始场景箭头，使其指向另一个场景。要使用`\"\
  Is Initial Controller\"`复选框定义初始场景，请按照以下步骤操作：\n\n1.  在项目导航器窗格中点击`.storyboard`文件。\n\
  2.  点击你想要设为初始场景的场景。\n3.  点击场景顶部的蓝色控制器图标，如图 16-9 所示。\n\n    ![A437923_1_En_16_Fig9_HTML.jpg](img/A437923_1_En_16_Fig9_HTML.jpg)\n\
  \n    图 16-9. 选择场景的控制器图标\n\n4.  选择“视图”➤“实用工具”➤“显示属性检查器”。右侧窗格的属性检查器窗口中会出现“窗口控制器”类别（见图\
  \ 16-8）。\n5.  选中`\"Is Initial Controller\"`复选框。\n\n请注意，一次只能有一个初始场景。一旦你为一个场景选中了`\"\
  Is Initial Controller\"`复选框，如果另一个场景也选中了该复选框，Xcode 会自动清除该场景中的`\"Is Initial Controller\"\
  `复选框。\n\n### 使用转场连接场景\n\n当故事板包含两个或更多场景时，如果运行程序，只会显示初始场景。要显示故事板中的其他场景，你需要创建场景之间的转场。转场在两个场景之间建立链接，以便用户能够依次查看场景。\n\
  \n要了解如何在场景之间创建转场，请按照以下步骤操作：\n\n1.  确保你的`StoryProgram`项目已加载到 Xcode 中，并在项目导航器窗格中点击`Main.storyboard`文件。\n\
  2.  从对象库窗口中拖出一个按钮，并将其放置在第一个场景上。\n3.  将鼠标指针移到该按钮上，按住 Control 键，然后从该按钮向第二个场景拖动鼠标。Xcode\
  \ 会高亮显示第二个场景，如图 16-10 所示。\n\n    ![A437923_1_En_16_Fig10_HTML.jpg](img/A437923_1_En_16_Fig10_HTML.jpg)\n\
  \n    图 16-10. 按住 Control 键从按钮拖动到另一个场景可创建转场。\n\n4.  松开 Control 键和鼠标。Xcode 会显示一个弹出菜单，如图\
  \ 16-11 所示。\n\n    ![A437923_1_En_16_Fig11_HTML.jpg](img/A437923_1_En_16_Fig11_HTML.jpg)\n\
  \n    图 16-11. 弹出菜单让你定义如何显示场景。\n\n5.  选择“Show”。Xcode 会在两个场景之间创建一个转场。\n6.  在第二个场景上拖放一个标签，并将其文本更改为“Second\
  \ scene here”。\n7.  选择“产品”➤“运行”。Xcode 运行你的程序，并显示带有按钮的窗口。\n8.  点击按钮。第二个窗口出现，其中包含标签“Second\
  \ scene here”，如图 16-12 所示。\n\n    ![A437923_1_En_16_Fig12_HTML.jpg](img/A437923_1_En_16_Fig12_HTML.jpg)\n\
  \n    图 16-12. 转场打开第二个视图。\n\n### 显示转场中的场景\n\n转场有两个用途。第一，转场将一个场景连接到另一个场景。第二，转场定义了第二个场景的显示方式。创建转场时，你有五种选择：\n\
  \n*   **Show**：将场景显示为一个单独的窗口，该窗口可以移动和调整大小。\n*   **Custom**：允许你为场景创建自定义外观。\n*   **Modal**：将场景显示为一个对话框，用户在关闭此对话框之前无法执行其他任何操作。\n\
  *   **Popover**：显示一个场景，并带有一个指向某个对象的箭头，如图 16-13 所示。\n\n    ![A437923_1_En_16_Fig13_HTML.jpg](img/A437923_1_En_16_Fig13_HTML.jpg)\n\
  \n    图 16-13. 弹出的 Popover 指向用户点击的对象。\n\n*   **Sheet**：将场景显示为一个从窗口标题栏下拉并覆盖窗口的 Sheet，如图\
  \ 16-14 所示。\n\n    ![A437923_1_En_16_Fig14_HTML.jpg](img/A437923_1_En_16_Fig14_HTML.jpg)\n\
  \n    图 16-14. 一个 Sheet 从窗口标题栏下拉。\n\n首次创建转场时，你可以定义转场应如何显示场景。但是，你随时可以通过以下步骤更改此设置：\n\
  \n1.  确保你的`StoryProgram`项目已加载到 Xcode 中，并在项目导航器窗格中点击`Main.storyboard`文件。\n2.  点击你想要修改的转场。Xcode\
  \ 会高亮显示你选择的转场。\n3.  选择“视图”➤“实用工具”➤“显示属性检查器”。属性检查器窗格会显示`Kind`属性弹出菜单。\n4.  点击`Kind`弹出菜单，并选择不同的样式，例如`modal`或`custom`，如图\
  \ 16-15 所示。\n\n    ![A437923_1_En_16_Fig15_HTML.jpg](img/A437923_1_En_16_Fig15_HTML.jpg)\n\
  \n    图 16-15. 你可以更改转场显示场景的方式。\n\n\n\n### 为场景添加控制器文件\n\n每次向故事板添加不同的场景时，实际上都是在为程序的用户界面添加另一个窗口。然而，每个场景也需要其专属的\
  \ Swift 文件来进行控制。这样一来，如果添加了按钮或其他用户界面元素，就可以编写 Swift 代码来在该场景上显示数据，或处理用户可能选择的任何命令（例如点击按钮）。\n\
  \n首先，必须为添加到故事板的每个额外场景创建一个 Swift 文件。其次，必须将这个 Swift 文件链接到该场景，以便场景能够使用它。\n\n要了解如何创建用于控制场景的\
  \ Swift 文件，请遵循以下步骤：\n\n1.  确保你的 `StoryProgram` 项目已在 Xcode 中加载，并在项目导航器窗格中点击 `Main.storyboard`\
  \ 文件。\n2.  选择“文件” ➤ “新建” ➤ “文件”。Xcode 会显示不同的可用模板。\n3.  在“macOS”下选择“源”，然后点击“Cocoa\
  \ Class”图标，如图 16-16 所示。然后点击“下一步”按钮。会出现另一个对话框，要求输入名称和父类。\n\n![A437923_1_En_16_Fig16_HTML.jpg](img/A437923_1_En_16_Fig16_HTML.jpg)\n\
  \n图 16-16. 创建用于存储视图控制器 Swift 代码的 Cocoa 类文件\n\n4.  点击“名称”文本框，为你用来控制场景的类输入一个描述性名称，例如\
  \ `SecondController`。\n5.  点击“父类”弹出菜单，并选择 `NSViewController`。（如果你正在为其他类型的控制器创建 Swift\
  \ 文件，例如页面控制器或标签视图控制器，请选择不同的父类，例如 `NSPageController` 或 `NSTabView`。）\n6.  清除“同时为用户界面创建\
  \ XIB 文件”复选框。\n7.  确保“语言”弹出菜单显示为 Swift，如图 16-17 所示。点击“下一步”按钮。Xcode 会询问你想将新的 Swift\
  \ 类保存在何处。\n\n![A437923_1_En_16_Fig17_HTML.jpg](img/A437923_1_En_16_Fig17_HTML.jpg)\n\
  \n图 16-17. 创建用于控制故事板场景的 Swift 类\n\n8.  选择一个文件夹，然后点击“创建”按钮。Xcode 会在项目导航器窗格中显示你的 Swift\
  \ 类。此时，Swift 类和场景尚未连接，因此你必须将场景的视图控制器设置为你刚刚创建的 Swift 文件的类。\n9.  点击 `Main.storyboard`\
  \ 文件以显示你的用户界面。\n10. 点击场景上带有“Second scene here”标签的蓝色视图控制器图标。\n11. 选择“视图” ➤ “实用工具”\
  \ ➤ “显示身份检查器”。\n12. 点击“类”弹出菜单，并选择 `SecondController`，即你之前创建的视图控制器，如图 16-18 所示。\n\
  \n![A437923_1_En_16_Fig18_HTML.jpg](img/A437923_1_En_16_Fig18_HTML.jpg)\n\n图 16-18.\
  \ 将场景连接到 Swift 视图控制器文件\n\n13. 将一个按钮拖放到这个第二个场景上。\n14. 选择“视图” ➤ “助理编辑器” ➤ “显示助理编辑器”。助理编辑器会显示你刚刚创建的\
  \ `SecondController.swift` 文件。\n15. 将鼠标指针移到第二个场景的标签上，按住 Control 键，然后将鼠标拖放到 `class\
  \ SecondController` 行下方。会出现一个弹出窗口。\n16. 在“名称”字段中输入 `labelName`，然后点击“连接”按钮。你的代码中应该会出现下面这一行：\n\
  \n```\n@IBOutlet weak var labelName: NSTextField!\n```\n\n17. 将鼠标指针移到第二个场景的按钮上，按住\
  \ Control 键，然后将鼠标拖放到 `SecondController.swift` 文件底部最后一个大括号的上方，如图 16-19 所示。会出现一个弹出窗口。\n\
  \n![A437923_1_En_16_Fig19_HTML.jpg](img/A437923_1_En_16_Fig19_HTML.jpg)\n\n图 16-19.\
  \ 为按钮创建 IBAction 方法\n\n18. 点击“连接”弹出菜单并选择“Action”。\n19. 点击“名称”文本框并输入 `changeLabel`。\n\
  20. 点击“类型”弹出菜单并选择 `NSButton`。然后点击“连接”按钮。Xcode 会显示一个空的 IBAction 方法。\n21. 按如下方式修改\
  \ IBAction 方法：\n\n```\n@IBAction func changeLabel(_ sender: NSButton) {\n    labelName.stringValue\
  \ = \"Button clicked\"\n}\n```\n\n22. 选择“产品” ➤ “运行”。程序的初始场景会随按钮一起出现。\n23. 点击这个第一个场景上的按钮。你的第二个场景会作为另一个窗口出现。\n\
  24. 点击第二个场景上的按钮。第二个场景上的标签会从“Second scene here”变为“Button clicked”。\n25. 选择“StoryProgram”\
  \ ➤ “退出 StoryProgram”。\n\n本练习展示了如何创建一个作为 Cocoa Class 文件的 Swift 文件。然后展示了如何将此 Swift\
  \ 文件链接到第二个视图控制器。一旦将 Swift 文件连接到视图控制器，就可以编写 Swift 代码，使任何用户界面元素实际响应 Swift 代码。\n\n\
  ### 总结\n\n你可以创建用户界面并将其存储在多个 `.xib` 文件或一个包含多个场景的 `.storyboard` 文件中。故事板文件用于创建 iOS\
  \ 应用，因此最好也将故事板文件用于 macOS 程序，因为故事板文件很可能成为创建用户界面的标准方式。\n\n故事板允许你定义构成程序用户界面的场景出现的顺序。当你向故事板添加额外场景时，需要创建控制这些场景的\
  \ Swift 文件。这些 Swift 文件需要属于 `NSViewController` 类，然后必须将你的场景连接到该 Swift 文件。\n\n设计程序的用户界面涉及使用\
  \ `.xib` 或 `.storyboard` 文件，或两者的组合。故事板减少了编写 Swift 代码的需求，但无论使用哪种类型的文件，你仍然需要编写一些 Swift\
  \ 代码来让你的用户界面完全工作。\n\n\n\n"
- "# 17. 使用按钮选择命令\n\n每个程序都需要为用户提供一种控制计算机的方式。在过去，这意味着要知道如何键入正确的命令来使程序运行，但在如今的图形用户界面时代，更简单的程序控制方式是从可用命令列表中进行选择。向程序下达命令的最简单方法是通过按钮。\n\
  \n通过在屏幕上显示多个按钮，用户界面随时为用户提供多种选择。用户无需记忆晦涩难懂的命令，只需用鼠标指向命令并点击选择即可。\n\nXcode 提供了多种不同类型的按钮，你可以将它们放置在用户界面上，但它们的运作方式都相同。一个按钮代表一个单一命令，点击该按钮会执行存储在\
  \ `IBAction` 方法中的 Swift 代码。\n\n要使用按钮，只需将它们放置在用户界面（无论是 `.xib` 文件还是 `.storyboard`\
  \ 文件）上，修改标签以显示你希望该按钮代表的命令，然后通过 `IBAction` 方法将按钮连接到 Swift 代码。\n\n所有按钮都基于 Cocoa 框架中定义的\
  \ `NSButton` 类。虽然大多数按钮显示可包含其代表命令的文本，但有些按钮根本不显示文本。尽管外观不同，所有按钮的运作方式都相同，并且可以随时更改成另一种按钮类型。可用的不同按钮类型如图\
  \ 17-1 所示：\n\n![A437923_1_En_17_Fig1_HTML.jpg](img/A437923_1_En_17_Fig1_HTML.jpg)\n\
  \n图 17-1. 可以放置在用户界面上的不同类型按钮\n\n- 推送按钮 (Push Button)\n- 纹理圆角按钮 (Textured Rounded\
  \ Button)\n- 渐变按钮 (Gradient Button)（不显示文本）\n- 弹出按钮 (Pop-Up Button)\n- 复选框按钮 (Checkbox\
  \ Button)\n- 单选按钮 (Radio Button)\n- 凹陷按钮 (Recessed Button)\n- 内嵌按钮 (Inline Button)\n\
  - 圆角矩形按钮 (Rounded Rectangle Button)\n- 展开三角形 (Disclosure Triangle)（不显示文本）\n- 帮助按钮\
  \ (Help Button)（不显示文本）\n- 图像按钮 (Image Button)（不显示文本）\n- 展开按钮 (Disclosure Button)（不显示文本）\n\
  \n没有文本标题的按钮占用的空间更少，但可能看起来晦涩难懂，因为用户不知道那个按钮是做什么的。图像按钮通常用于显示代表命令的图标。\n\n## 修改按钮上的文本\n\
  \n对于显示文本的按钮，Xcode 提供了两种修改按钮文本的方式：\n\n- 直接双击按钮上的文本进行编辑。\n- 点击按钮将其选中，选择“视图”➤“工具”➤“显示属性检查器”，然后编辑“标题\
  \ (Title)”属性，如图 17-2 所示。\n\n![A437923_1_En_17_Fig2_HTML.jpg](img/A437923_1_En_17_Fig2_HTML.jpg)\n\
  \n图 17-2. “显示属性检查器”面板允许你编辑按钮的标题\n\n“属性检查器”允许你在程序运行时定义按钮上的文本。但是，如果你以后想要更改该文本，则需要使用\
  \ Swift 代码修改按钮的文本。为此，你首先必须创建一个代表按钮的 `IBOutlet`。其次，你必须使用类似下面的代码在 Swift 中修改该按钮的“标题\
  \ (Title)”属性：\n\n```\n@IBOutlet weak var myButton: NSButton!\nmyButton.title = \"\
  新文本 (New Text)\"\n```\n\n“标题 (Title)”属性定义了显示在按钮上的文本，但许多按钮还提供了“备用标题 (Alternate)”属性。“备用标题”属性的目的是，当一个按钮的“类型\
  \ (Type)”属性设置为 `toggle` 或 `switch` 时，允许该按钮显示文本，如图 17-3 所示。\n\n![A437923_1_En_17_Fig3_HTML.jpg](img/A437923_1_En_17_Fig3_HTML.jpg)\n\
  \n图 17-3. 更改按钮的“类型 (Type)”属性\n\n当一个按钮的“备用标题 (Alternate Title)”文本非空，且该按钮的“类型 (Type)”属性为\
  \ `toggle` 或 `switch` 时，点击这个切换按钮会在显示“标题 (Title)”文本和“备用标题”文本之间交替切换。要了解按钮的“标题 (Title)”和“备用标题\
  \ (Alternate Title)”属性是如何工作的，请按照以下步骤操作：\n\n1. 在 Xcode 中，选择“文件”➤“新建”➤“项目”。\n2. 在\
  \ macOS 类别下点击“应用程序 (Application)”。\n3. 点击“Cocoa 应用程序 (Cocoa Application)”，然后点击“下一步\
  \ (Next)”按钮。Xcode 现在会询问产品名称。\n4. 点击“产品名称 (Product Name)”文本字段，输入 `ButtonProgram`。\n\
  5. 确保“语言 (Language)”弹出菜单显示 Swift，并且勾选了“使用 Storyboard (Use Storyboards)”复选框。\n6.\
  \ 点击“下一步 (Next)”按钮。Xcode 会询问你想要在哪里存储项目。\n7. 选择一个文件夹来存储你的项目，然后点击“创建 (Create)”按钮。\n\
  8. 在项目导航器中点击 `Main.storyboard` 文件。你的程序用户界面将会出现。\n9. 选择“视图”➤“工具”➤“显示对象库 (Show Object\
  \ Library)”。对象库会出现在 Xcode 窗口的右下角。\n10. 将一个推送按钮和一个文本字段拖曳到视图控制器窗口上，调整这两个项目的大小，使其看起来像图\
  \ 17-4。\n\n![A437923_1_En_17_Fig4_HTML.jpg](img/A437923_1_En_17_Fig4_HTML.jpg)\n\
  \n图 17-4. ButtonProgram 的用户界面\n\n11. 点击推送按钮，然后选择“视图”➤“工具”➤“显示属性检查器”。“显示属性检查器”面板会出现在\
  \ Xcode 窗口的右上角。\n12. 点击“类型 (Type)”弹出菜单，然后选择“切换 (Toggle)”。\n13. 点击“标题 (Title)”文本字段，输入\
  \ `Change Me` 并按下回车键。\n14. 点击“备用标题 (Alternate)”文本字段，输入 `Alternate Text`。\n15. 选择“产品”➤“运行\
  \ (Run)”。你的用户界面会出现。\n16. 点击 `Change Me` 按钮。注意，按钮上的文本现在显示为“Alternate Text”。\n17.\
  \ 再次点击同一个按钮。注意，文本会在 `Change Me` 和 `Alternate Text` 之间交替切换。\n18. 选择“ButtonProgram”➤“退出\
  \ ButtonProgram (Quit ButtonProgram)”。\n\n现在让我们看看如何通过从文本字段获取文本并将其存储到按钮的“标题 (Title)”属性中来修改按钮的标题，请按照以下步骤操作：\n\
  \n1. 在项目导航器窗格中点击 `Main.storyboard` 文件。\n2. 点击当前显示文本“Change Me”的推送按钮。\n3. 选择“视图”➤“助理编辑器”➤“显示助理编辑器\
  \ (Show Assistant Editor)”。`ViewController.swift` 文件会出现在 `Main.storyboard` 文件旁边。\n\
  4. 将鼠标指针移到推送按钮上，按住 Control 键，然后拖曳鼠标到 `ViewController.swift` 文件中 `@IBOutlet` 行下方。\n\
  5. 松开 Control 键和鼠标。会弹出一个菜单。\n6. 点击“名称 (Name)”文本字段，输入 `myButton`。\n7. 将鼠标指针移到文本字段上，按住\
  \ Control 键，然后拖曳鼠标到 `AppDelegate.swift` 文件中 `@IBOutlet` 行下方。\n8. 松开 Control 键和鼠标。会弹出一个菜单。\n\
  9. 点击“名称 (Name)”文本字段，输入 `changeText`。你现在应该已经创建了两个 `IBOutlet`，看起来像这样：\n\n```\n  \
  \  @IBOutlet weak var myButton: NSButton!\n    @IBOutlet weak var changeText: NSTextField!\n\
  ```\n\n10. 将鼠标指针移到推送按钮上，按住 Control 键，然后拖曳鼠标到 `AppDelegate.swift` 文件底部最后一个花括号的上方。\n\
  11. 松开 Control 键和鼠标。会弹出一个菜单。\n12. 点击“连接 (Connection)”弹出菜单，选择“动作 (Action)”。\n13.\
  \ 点击“名称 (Name)”文本字段，输入 `changeTitle`。\n14. 点击“类型 (Type)”弹出菜单，选择 `NSButton`，然后点击“连接\
  \ (Connect)”按钮。Xcode 会创建一个空的 `IBAction` 方法。\n15. 按如下方式修改这个 `IBAction` 方法：\n\n```\n\
  \    @IBAction func changeTitle(_ sender: NSButton) {\n    myButton.title = changeText.stringValue\n\
  \    }\n```\n\n这段 Swift 代码会检索文本字段（`IBOutlet changeText`）中的文本，并将其存储到按钮（`IBOutlet\
  \ myButton`）的“标题 (Title)”属性中。\n16. 选择“产品”➤“运行 (Run)”。你的用户界面会出现。\n17. 点击文本字段，输入 `Hello\
  \ there!`。\n18. 点击 `Change Me` 按钮。备用文本会出现在按钮上。\n19. 再次点击按钮。文本字段中的文本现在会出现。\n20. 选择“ButtonProgram”➤“退出\
  \ ButtonProgram (Quit ButtonProgram)”。\n\n\n\n## 为按钮添加图像和声音\n\n按钮通常显示文本，列出按钮所代表的命令，例如“确定”或“取消”。不过，你也可以在按钮上显示图像。这对于创建工具栏图标非常有用，可以显示描述性图标来表示命令（例如，显示打印机来表示“打印”命令）。图像可以单独显示在按钮上，也可以与描述性文本一起显示。\n\
  \n除了显示图像，按钮还可以播放声音，为用户提供音频反馈。虽然大多数人使用鼠标（或触控板）点击按钮，但有些人更喜欢使用按键快捷键，因此你还可以将按键快捷键分配给连接到特定按钮的`IBAction`方法。\n\
  \n要添加图像到按钮，只需在属性检查器中修改“图像”属性和“图像”属性正下方的“备用”属性，如图 17-5 所示。\n\n![A437923_1_En_17_Fig5_HTML.jpg](img/A437923_1_En_17_Fig5_HTML.jpg)\n\
  \n**图 17-5**  \n“图像”和“备用”弹出菜单允许你从预定义图像列表中进行选择。\n\n你还可以使用`NSButton`的`Image`和`alternateImage`属性来定义按钮上显示的图像。定义按钮上显示的图像时，你还可以选择该图像相对于按钮上任何文本的位置。\n\
  \n“位置”属性定义了图像与文本的显示方式，其中文本用水平线表示，图像用正方形表示，如图 17-6 所示。\n\n![A437923_1_En_17_Fig6_HTML.jpg](img/A437923_1_En_17_Fig6_HTML.jpg)\n\
  \n**图 17-6**  \n“位置”属性允许你对齐按钮上的文本和图像。\n\n从左到右的七种不同位置分别是：\n\n*   仅文本\n*   仅图像\n*\
  \   图像在左，文本在右\n*   文本在左，图像在右\n*   文本覆盖在图像中间\n*   文本在图像下方\n*   文本在图像上方\n\n要定义用户点击按钮时播放的声音，可以修改“声音”属性，如图\
  \ 17-7 所示。（你可能需要调整电脑音量才能听到点击按钮时播放的声音。）\n\n![A437923_1_En_17_Fig7_HTML.jpg](img/A437923_1_En_17_Fig7_HTML.jpg)\n\
  \n**图 17-7**  \n“声音”属性允许你选择要播放的声音。\n\n要了解如何向按钮添加图像和声音，请确保你的`ButtonProgram`项目已在 Xcode\
  \ 中加载，然后按照以下步骤操作：\n\n1.  在项目导航器中点击`Main.storyboard`文件。\n2.  点击用户界面上的按钮以选中它。\n3.\
  \  选择“视图”>“工具”>“显示属性检查器”。“显示属性检查器”窗格会出现在 Xcode 窗口的右上角。\n4.  点击“图像”弹出菜单，选择`NSCaution`。\n\
  5.  点击“备用”弹出菜单，选择`NSComputer`（参见图 17-5）。\n6.  点击“位置”属性，选择第三个（从左起）图标，该图标将图像显示在左侧，文本显示在右侧（参见图\
  \ 17-6）。\n7.  点击“声音”弹出菜单，选择一种声音，例如`Frog`。\n8.  选择“产品”>“运行”。你的程序会启动。注意，按钮上会出现警告图标。\n\
  9.  点击文本字段，输入`Hello there!`。\n10. 点击该按钮。按钮上的文本会显示备用文本，并播放你选择的声音。每次点击按钮时，它都会在“标题”和“图像”属性与“备用”（文本和图像）属性之间交替显示。\n\
  11. 选择`ButtonProgram`>“退出 ButtonProgram”。\n\n## 将多个用户界面项连接到 IBAction 方法\n\n通常，你会将一个`IBAction`方法链接到一个用户界面项（例如按钮）。但是，也可以将多个项连接到同一个`IBAction`方法。当这样做时，`IBAction`方法需要知道是哪个用户界面项调用了它。\n\
  \n要标识特定的用户界面项，你需要更改链接到同一个`IBAction`方法的每个项的“标签”属性。“标签”属性可以保存一个整数值，因此你可以使用不同的`Tag`值来标识不同的用户界面项。\n\
  \n一旦为每个用户界面项分配了不同的`Tag`值，你就可以正常创建一个`IBAction`方法，方法是从一个用户界面项按住 Control 键拖拽到你的 Swift\
  \ 文件中。然后，使用相同的 Control 键拖拽方法将其余的用户界面项连接到那个已有的`IBAction`方法。\n\n只要使用`Tag`属性来标识是哪个用户界面项调用了`IBAction`方法，可以链接到同一个`IBAction`方法的项数量就没有限制。\n\
  \n要了解如何将多个项连接到单个`IBAction`方法，请按照以下步骤操作：\n\n1.  在 Xcode 中，选择“文件”>“新建”>“项目”。\n2. \
  \ 在 macOS 类别下点击“应用程序”。\n3.  点击“Cocoa 应用”，然后点击“下一步”按钮。Xcode 现在要求输入产品名称。\n4.  在“产品名称”文本字段中点击并输入`MultipleButtons`。\n\
  5.  确保“语言”弹出菜单显示为`Swift`，并且“使用故事板”复选框已选中。\n6.  点击“下一步”按钮。Xcode 会询问你要将项目存储在何处。\n\
  7.  选择一个文件夹来存储项目，然后点击“创建”按钮。\n8.  在项目导航器中点击`Main.storyboard`文件。\n9.  将一个“按钮”、“凹进按钮”、“内联按钮”和“标签”拖拽到用户界面上，并调整标签的宽度，如图\
  \ 17-8 所示。\n\n![A437923_1_En_17_Fig8_HTML.jpg](img/A437923_1_En_17_Fig8_HTML.jpg)\n\
  \n**图 17-8**  \n`MultipleButtons`程序的用户界面\n\n此时，窗口上有三种不同类型的按钮和一个标签。你将创建一个所有三个按钮都可以运行的`IBAction`方法。当你点击一个按钮时，标签将显示该按钮的标题，以显示你刚刚点击了哪个按钮。\n\
  \n首先，你需要修改每个按钮的“标签”属性。顶部按钮的`Tag`值为 0，中间按钮的`Tag`值为 1，最下面的按钮的`Tag`值为 2。\n\n然后，创建一个`IBAction`方法，该方法识别`Tag`属性并在标签中显示按钮的标题。为此，请遵循以下步骤：\n\
  \n1.  在项目导航器中点击`Main.storyboard`文件。\n2.  选择“视图”>“辅助编辑器”>“显示辅助编辑器”。Xcode 会在用户界面旁边显示`ViewController.swift`文件。\n\
  3.  将鼠标指针移到标签上，按住 Control 键，然后拖拽到`AppDelegate.swift`文件中`IBOutlet`行下方。\n4.  松开 Control\
  \ 键和鼠标按钮。会弹出一个窗口。\n5.  在“名称”文本字段中点击，输入`displayLabel`，然后点击“连接”按钮。你应该得到一个类似于以下的`IBOutlet`：\n\
  \n```\n    @IBOutlet weak var displayLabel: NSTextField!\n```\n\n\n\n6.  将鼠标指针移到按钮上，按住\
  \ `Control` 键，将鼠标拖到 `AppDelegate.swift` 文件底部最后一个花括号上方。\n7.  松开 `Control` 键和鼠标按钮。系统会弹出一个窗口。\n\
  8.  点击“Connection”弹出菜单，选择“Action”。\n9.  点击“Name”文本框，输入`displayButton`。\n10.  确保“Type”弹出菜单显示为`NSButton`，这样其他按钮也能连接到这个`IBAction`方法。\n\
  11.  点击“Connect”按钮。Xcode 会显示一个空的`IBAction`方法。\n12.  将鼠标指针移到“Recessed Button”上，按住\
  \ `Control` 键，将鼠标拖到`IBAction`方法中的`func`关键字上，直到 Xcode 高亮显示整个方法，如图 17-9 所示。\n\n![A437923_1_En_17_Fig9_HTML.jpg](img/A437923_1_En_17_Fig9_HTML.jpg)\n\
  \n图 17-9. 将现有`IBAction`方法连接到另一个用户界面元素\n\n13.  松开 `Control` 键和鼠标按钮。Xcode 会将`IBAction`方法连接到凹陷按钮。\n\
  14.  将鼠标指针移到内联按钮上，按住 `Control` 键，将鼠标拖到`IBAction`方法中的`func`关键字上，直到 Xcode 高亮显示整个`IBAction`方法。\n\
  15.  松开 `Control` 键和鼠标按钮。Xcode 会将内联按钮连接到`IBAction`方法。\n16.  点击凹陷按钮以选中它，然后选择“View\
  \ ➤ Utilities ➤ Show Attributes Inspector”。“属性检查器”面板会出现在 Xcode 窗口的右上角。\n17.  向下滚动到“View”类别（最初可能隐藏不可见），点击“Tag”文本框并输入`1`。（按钮的默认`Tag`值为`0`，凹陷按钮的`Tag`值为`1`，内联按钮的`Tag`值为`2`。）\n\
  18.  点击内联按钮以选中它。\n19.  向下滚动到“View”类别，点击“Tag”文本框并输入`2`。\n20.  按如下方式修改`IBAction`方法：\n\
  \n```\n    @IBAction func displayButton(_ sender: NSButton) {\n    switch sender.tag\
  \ {\n    case 0:\n    displayLabel.stringValue = \"Clicked Push Button\"\n    case\
  \ 1:\n    displayLabel.stringValue = \"Clicked Recessed Button\"\n    case 2:\n\
  \    displayLabel.stringValue = \"Clicked Inline Button\"\n    default:\n    displayLabel.stringValue\
  \ = \"Unknown\"\n    }\n    }\n```\n\n`sender: NSButton`表示`IBAction`方法可以连接到任何属于`NSButton`类型的用户界面元素。首先，你通过`switch`语句使用`sender`（`NSButton`）的`Tag`属性来判断用户点击了哪个按钮。然后，根据用户点击的按钮，在标签中显示相应的消息。\n\
  \n21.  选择“Product ➤ Run”。你的程序用户界面会显示出来。\n22.  点击三个不同的按钮，观察标签中是否显示正确的消息。\n23.  选择“MultipleButtons\
  \ ➤ Quit MultipleButtons”。\n\n## 使用弹出按钮\n\n按钮可以方便地在屏幕上显示命令，但如果你需要提供多个选项，那么让每个按钮代表一个命令会显得繁琐且拥挤。一种解决方案是将多个选项浓缩到一个弹出按钮中。弹出按钮占用的空间更少，并且可以为用户提供大量选项。\n\
  \n当用户在弹出按钮中选择一个选项时，该选中项会存储在弹出按钮的`titleOfSelectedItem`属性中。\n\n要了解弹出按钮的工作原理，请按照以下步骤操作：\n\
  \n1.  在 Xcode 中选择“File ➤ New ➤ Project”。\n2.  在“macOS”类别下点击“Application”。\n3.  点击“Cocoa\
  \ Application”，然后点击“Next”按钮。Xcode 会要求输入产品名称。\n4.  点击“Product Name”文本框，输入`PopupProgram`。\n\
  5.  确保“Language”弹出菜单显示为“Swift”，并且“Use Storyboards”复选框已被选中。\n6.  点击“Next”按钮。Xcode\
  \ 会询问项目存储位置。\n7.  选择一个文件夹来存储项目，然后点击“Create”按钮。\n8.  在项目导航器中点击`Main.storyboard`文件。你的程序用户界面会显示出来。\n\
  9.  选择“View ➤ Utilities ➤ Show Object Library”。对象库会出现在 Xcode 窗口的右下角。\n10.  将一个弹出按钮和一个标签拖到用户界面窗口上，并调整标签的宽度，使其看起来像图\
  \ 17-10。\n\n    ![A437923_1_En_17_Fig10_HTML.jpg](img/A437923_1_En_17_Fig10_HTML.jpg)\n\
  \n    图 17-10. PopupProgram 的用户界面\n\n11.  选择“View ➤ Assistant Editor ➤ Show Assistant\
  \ Editor”。Xcode 会将`ViewController.swift`文件显示在你的用户界面旁边。\n12.  将鼠标指针移到标签上，按住 `Control`\
  \ 键，将其拖到`ViewController.swift`文件中`IBOutlet`行的下方。\n13.  松开 `Control` 键和鼠标。系统会弹出一个窗口。\n\
  14.  点击“Name”文本框，输入`labelChoice`，然后点击“Connect”按钮。Xcode 会创建一个`IBOutlet`，如下所示：\n\n\
  ```\n    @IBOutlet weak var labelChoice: NSTextField!\n```\n\n15.  将鼠标指针移到弹出按钮上，按住\
  \ `Control` 键，将其拖到`AppDelegate.swift`文件底部最后一个花括号的上方。\n16.  松开 `Control` 键和鼠标。系统会弹出一个窗口。\n\
  17.  点击“Connection”弹出菜单，选择“Action”。\n18.  点击“Name”文本框，输入`showChoice`。\n19.  点击“Type”弹出菜单，选择`NSPopUpButton`。然后点击“Connect”按钮。Xcode\
  \ 会显示一个空的`IBAction`方法。\n20.  按如下方式修改`IBAction`方法：\n\n```\n    @IBAction func showChoice(_\
  \ sender: NSPopUpButton) {\n    labelChoice.stringValue =\n    sender.titleOfSelectedItem!\n\
  \    }\n```\n\n21.  选择“Product ➤ Run”。你的用户界面窗口会显示出来。\n22.  点击弹出按钮。请注意，默认情况下，弹出按钮包含三个通用项，分别标记为`Item\
  \ 1`、`Item 2`和`Item 3`。\n23.  点击一个选项。你选择的选项会出现在标签中。\n24.  选择“PopupProgram ➤ Quit\
  \ PopupProgram”。\n\n\n\n### 以可视化方式修改弹出按钮菜单项\n\n弹出按钮默认包含三个菜单项的列表。不过，你随时可以对此列表中的项目进行添加、编辑或删除。要编辑弹出菜单列表，请遵循以下步骤：\n\
  \n1.  双击用户界面上的弹出按钮。当前菜单项列表即会显示，如图 17-11 所示。\n\n    ![A437923_1_En_17_Fig11_HTML.jpg](img/A437923_1_En_17_Fig11_HTML.jpg)\n\
  \n    图 17-11. 双击弹出按钮会显示其菜单项列表\n\n2.  双击你想要编辑的菜单项。Xcode 会高亮所选菜单项的文本，如图 17-12 所示。\n\
  \n    ![A437923_1_En_17_Fig12_HTML.jpg](img/A437923_1_En_17_Fig12_HTML.jpg)\n\n\
  \    图 17-12. 双击菜单项可编辑其文本。注意：你也可以选择“视图”>“工具”>“显示属性检查器”，然后通过编辑所选菜单项的 `Title` 属性来修改菜单项文本。\n\
  \n3.  使用方向键、`Backspace` 或 `Delete` 键来编辑文本，并输入任何新文本。\n4.  按下 `Return` 键。Xcode 便会保存你对该菜单项编辑后的文本。\n\
  \n要从弹出按钮中删除菜单项，请遵循以下步骤：\n\n1.  双击用户界面上的弹出按钮。当前菜单项列表即会显示（见图 17-11）。\n2.  单击你想要删除的菜单项。Xcode\
  \ 会高亮你所选的菜单项。\n3.  按下 `Backspace` 或 `Delete` 键。你所选的菜单项便会消失。\n\n注意：如果你误删了某菜单项，只需按下\
  \ `Command + Z` 或选择“编辑”>“撤销”来撤销删除操作。\n\n要向弹出按钮添加一个菜单项，请遵循以下步骤：\n\n1.  双击用户界面上的弹出按钮。当前菜单项列表即会显示（见图\
  \ 17-11）。\n2.  选择“视图”>“工具”>“显示对象库”。对象库随即显示在 Xcode 窗口的右下角。\n3.  在对象库底部的搜索字段中输入 `menu\
  \ item` 并按下 `Return` 键。对象库会显示一个菜单项列表，如图 17-13 所示。\n\n    ![A437923_1_En_17_Fig13_HTML.jpg](img/A437923_1_En_17_Fig13_HTML.jpg)\n\
  \n    图 17-13. 对象库中的菜单项列表\n\n4.  将菜单项从对象库拖到用户界面弹出按钮中存储的菜单项列表上。一条水平的蓝色线条会指示新菜单项在弹出按钮列表中出现的位置。\n\
  5.  松开鼠标按钮。Xcode 便会向弹出按钮列表添加一个菜单项。\n\n### 使用 Swift 代码添加弹出菜单项\n\n除了以可视化方式修改弹出按钮中的菜单项外，你也可以使用\
  \ Swift 代码来添加、删除或更改菜单项。弹出按钮的菜单项基于 `NSMenuItem` 类，但你可以在 `NSMenu` 类中找到操作弹出按钮菜单项列表所需的方法。\n\
  \n如果你想为弹出按钮仅添加一个新的菜单项，可以使用 `addItemWithTitle` 方法并指定一个字符串，例如：\n\n```\nmyPopUp.addItem(withTitle:\
  \ \"New Item\")\n```\n\n你也可以通过将新菜单项存储在一个数组中，并使用 `addItemsWithTitles` 方法来添加多个菜单项，例如：\n\
  \n```\nmyPopUp.addItems(withTitles: [\"Cat\", \"Dog\", \"Bird\", \"Fish\", \"Reptile\"\
  ])\n```\n\n你可以使用 `removeItem` 方法移除单个菜单项，该方法需要一个 `Int` 值来指定要移除的项目。弹出按钮列表中的第一个项目索引为\
  \ 0，第二个为 1，以此类推。要从弹出按钮列表中移除第一个项目，你使用索引值 0，如下所示：\n\n```\nmyPopUp.removeItem(at: 0)\n\
  ```\n\n要移除弹出按钮菜单列表中的所有项目，只需使用 `removeAllItems()` 方法，它会清空整个列表，无论该列表中当前存储了多少项目。\n\n\
  要了解如何使用 Swift 代码在弹出按钮菜单列表中添加和删除项目，请遵循以下步骤：\n\n1.  在 Xcode 中，选择“文件”>“新建”>“项目”。\n\
  2.  在 macOS 类别下单击“应用程序”。\n3.  单击“Cocoa 应用程序”，然后单击“下一步”按钮。Xcode 会要求输入产品名称。\n4.  在“产品名称”文本字段中单击并输入\
  \ `EditPopProgram`。\n5.  确保“语言”弹出菜单显示为 Swift，并且“使用故事板”复选框已被选中。\n6.  单击“下一步”按钮。Xcode\
  \ 会询问你想要存储项目的位置。\n7.  选择一个文件夹来存储你的项目，然后单击“创建”按钮。\n8.  在项目导航器中单击 `Main.storyboard`\
  \ 文件。你的程序的用户界面随即显示。\n9.  选择“视图”>“工具”>“显示对象库”。对象库随即显示在 Xcode 窗口的右下角。\n10. 将一个弹出按钮、三个“推送按钮”和一个文本字段拖到用户界面窗口上，并编辑两个“推送按钮”的标题，使其看起来如图\
  \ 17-14 所示。\n\n![A437923_1_En_17_Fig14_HTML.jpg](img/A437923_1_En_17_Fig14_HTML.jpg)\n\
  \n图 17-14. EditPopProgram 的用户界面\n\n11. 选择“视图”>“助手编辑器”>“显示助手编辑器”。Xcode 会在你的用户界面旁边显示\
  \ `ViewController.swift` 文件。\n12. 将鼠标指针移到弹出按钮上，按住 Control 键，然后将鼠标拖到 `ViewController.swift`\
  \ 文件顶部附近的 `IBOutlet` 行下方。\n13. 松开 Control 键和鼠标。一个弹出窗口会出现。\n14. 在“名称”文本字段中单击并输入 `myPopUp`。然后单击“连接”按钮。Xcode\
  \ 会创建一个 `IBOutlet`。\n15. 将鼠标指针移到文本字段上，按住 Control 键，然后将鼠标拖到 `ViewController.swift`\
  \ 文件顶部附近的 `IBOutlet` 行下方。\n16. 松开 Control 键和鼠标。一个弹出窗口会出现。\n17. 在“名称”文本字段中单击并输入 `newItem`。然后单击“连接”按钮。Xcode\
  \ 会创建另一个 `IBOutlet`，因此你应该有两个 `IBOutlet`，看起来像这样：\n\n```\n@IBOutlet weak var myPopUp:\
  \ NSPopUpButton!\n@IBOutlet weak var newItem: NSTextField!\n```\n\n\n\n18.  将鼠标指针移到`Add\
  \ New Item`按钮上，按住`Control`键，然后将鼠标拖拽到`ViewController.swift`文件底部最后一个花括号的上方。\n19. \
  \ 松开`Control`键和鼠标。将出现一个弹出窗口。\n20.  单击`Connection`弹出菜单并选择`Action`。\n21.  单击`Name`文本字段并键入`addNewItem`。\n\
  22.  单击`Type`弹出菜单并选择`NSButton`，然后单击`Connect`按钮。Xcode 会创建一个空的`IBAction`方法。\n23. \
  \ 将鼠标指针移到`Delete First Item`按钮上，按住`Control`键，然后将鼠标拖拽到`ViewController.swift`文件底部最后一个花括号的上方。\n\
  24.  松开`Control`键和鼠标。将出现一个弹出窗口。\n25.  单击`Connection`弹出菜单并选择`Action`。\n26.  单击`Name`文本字段并键入`deleteFirstItem`。\n\
  27.  单击`Type`弹出菜单并选择`NSButton`，然后单击`Connect`按钮。Xcode 会创建一个空的`IBAction`方法。\n28. \
  \ 将鼠标指针移到`Add New List`按钮上，按住`Control`键，然后将鼠标拖拽到`ViewController.swift`文件底部最后一个花括号的上方。\n\
  29.  松开`Control`键和鼠标。将出现一个弹出窗口。\n30.  单击`Connection`弹出菜单并选择`Action`。\n31.  单击`Name`文本字段并键入`addList`。\n\
  32.  单击`Type`弹出菜单并选择`NSButton`，然后单击`Connect`按钮。Xcode 会创建另一个空的`IBAction`方法。\n33.\
  \  按如下所示修改所有三个`IBAction`方法：\n\n```\n@IBAction func addNewItem(_ sender: NSButton)\
  \ {\nmyPopUp.addItem(withTitle: newItem.stringValue)\n}\n@IBAction func addList(_\
  \ sender: NSButton) {\nmyPopUp.removeAllItems()\nmyPopUp.addItems(withTitles: [\"\
  Cat\", \"Dog\", \"Bird\", \"Fish\", \"Reptile\"])\n}\n@IBAction func deleteFirstItem(_\
  \ sender: NSButton) {\nmyPopUp.removeItem(at: 0)\n}\n```\n\n`addNewItem` `IBAction`方法从文本字段获取文本，并使用`addItem`方法将该文本作为新的菜单项添加到弹出按钮的列表中。`deleteFirstItem`\
  \ `IBAction`方法使用`removeItem`方法删除弹出按钮列表中的第一个菜单项。`addList` `IBAction`方法使用`removeAllItems`方法清除弹出按钮中的当前列表，然后将其替换为一个新的字符串数组。\n\
  34.  选择“产品” ➤ “运行”。你的用户界面将会出现。\n35.  单击弹出按钮。请注意，菜单项列表显示三个项目，分别标记为`Item 1`、`Item\
  \ 2`和`Item 3`。\n36.  单击弹出按钮以外的区域，使菜单项列表不再显示。\n37.  单击`Delete First Item`按钮。\n38.\
  \  单击弹出按钮。请注意，菜单项列表现在只显示两个项目，分别标记为`Item 2`和`Item 3`。\n39.  单击文本字段并输入`My Item`。\n\
  40.  单击`Add New Item`按钮。\n41.  单击弹出按钮。请注意，现在菜单项列表显示三个项目，分别标记为`Item 2`、`Item 3`和`My\
  \ Item`。\n42.  单击`Add New List`按钮。\n43.  单击弹出按钮。请注意，现在菜单项列表显示在`addList` `IBAction`方法内部定义的字符串数组。\n\
  44.  选择`EditPopProgram` ➤ 退出`EditPopProgram`。\n\n### 总结\n\n按钮代表用户可以单击以选择某个选项的命令。Xcode\
  \ 提供了几种不同类型的按钮，可以放置在用户界面上，但它们都基于 Cocoa 框架中定义的同一个`NSButton`类。\n\n并非所有按钮都显示文本，但那些显示文本的按钮使用`Title`属性来保存文本。如果你想在按钮上显示图像，可以使用`Image`属性来定义图像。如果你将按钮的`Type`属性更改为开关或切换按钮，那么你可以让按钮显示存储在`Title`属性中的文本，以及显示在`Alternate\
  \ Text`属性和/或`Alternate Image`属性中的文本。\n\n如果你需要向用户提供多个选项，在用户界面上放置多个按钮可能会显得杂乱无章。一个更简单的替代方案是使用弹出按钮，它可以显示一个选项列表，你可以通过可视化方式或\
  \ Swift 代码对其进行修改。\n\n按钮通常连接到单个`IBAction`方法，但你可以将多个按钮链接到同一个`IBAction`方法。当将多个用户界面项连接到一个`IBAction`方法时，你需要使用\
  \ Swift 代码，通过唯一标识每个按钮的`Tag`属性来识别调用该`IBAction`方法的用户界面项。按钮是向用户提供可选择选项最直接的方式。\n\n"
- "# 18. 使用单选按钮、复选框、日期选择器和滑块做出选择\n\n用户界面通常不会让用户通过按钮选择特定命令，而是提供选择项供用户挑选。这些选择项允许用户选择一个或多个选项，例如自定义程序的工作方式。当用户界面需要提供多个选项时，最常见的两种提供选项的方式是通过单选按钮和复选框。\n\
  \n单选按钮的名称来源于汽车收音机，它允许你按下一个按钮来切换到不同的广播电台。由于一次只能收听一个广播电台，因此单选按钮为你提供了多个选项，但限制你只能选择一个按钮。一旦你选择了另一个按钮，你之前的选择就不再被选中。对于单选按钮，你可以选择零个按钮，或者一次只选择一个按钮。\n\
  \n复选框的工作方式略有不同。与单选按钮类似，复选框也提供多个选择。主要区别在于，对于一组复选框，你可以同时选择零个或多个复选框，因此可以一次选择多个选项。\n\
  \n当需要将用户限制为零个或一个选择时，请使用单选按钮。当需要让用户选择零个或多个选项时，请使用复选框。图 18-1 显示了 Xcode 偏好设置对话框，该对话框同时使用单选按钮和复选框让用户自定义\
  \ Xcode 的行为。\n\n![A437923_1_En_18_Fig1_HTML.jpg](img/A437923_1_En_18_Fig1_HTML.jpg)\n\
  \n图 18-1.\n\nXcode 偏好设置对话框同时使用单选按钮和复选框让用户选择选项。\n\n虽然单选按钮和复选框通常用于显示以文本形式呈现的选择项，但日期选择器会显示不同类型的日期供用户选择。然后日期选择器会将用户的选择存储为一种特殊的日期格式（而不是表示月份的单独文本或表示日期的数字）。\n\
  \n通过以特殊格式存储日期，你的程序可以根据用户在其计算机上的设置正确地显示日期。例如，在世界某些地方，他们按 `mm/dd/yyyy` 格式显示日期。而在世界其他地方，他们则按\
  \ `dd/mm/yyyy` 格式显示日期。\n\n日期选择器使用一种特殊的日期格式，这样计算机就可以根据用户当前的设置正确地显示格式，而无需担心每台用户电脑上的特定日期格式设置。\n\
  \n与单选按钮和复选框一样，日期选择器为用户提供一组固定但有限的、有效的选项以供选择。这确保了无论用户做出何种选择，该选择对你的程序来说都是可接受的。\n\n\
  复选框和单选按钮适合为用户提供有限范围的选项，这些选项通常是文本形式。如果要为用户提供一系列数值选项，则可以使用滑块。滑块让用户可以直观地选择有效的数值范围。\n\
  \n\n\n## 使用复选框\n\n你可以单独使用一个复选框，也可以将多个复选框组合使用。复选框实际上基于`NSButton`类，尽管它的外观和行为与典型按钮大不相同。对于复选框而言，最重要的三个属性是：\n\
  \n*   **标题**：显示在复选框旁边，描述供用户选择的选项的文本。\n*   **状态**：确定复选框是选中（1）还是未选中（0）。\n*   **替代文本**：复选框未选中时显示的文本。（复选框选中时显示标题文本。）\n\
  \n要了解复选框的工作原理，请按照以下步骤操作：\n\n1.  在 Xcode 中选择“文件”➤“新建”➤“项目”。\n2.  在 macOS 类别下点击“应用程序”。\n\
  3.  点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 现在会要求您输入产品名称。\n4.  点击“产品名称”文本字段，输入 `CheckProgram`。\n\
  5.  确保“语言”弹出菜单显示“Swift”，并且“使用故事板”复选框已选中。\n6.  点击“下一步”按钮。Xcode 会询问您希望将项目存储在哪里。\n\
  7.  选择一个文件夹来存储项目，然后点击“创建”按钮。\n8.  在项目导航器中点击 `MainMenu.xib` 文件。您的程序用户界面将会出现。\n9.\
  \  选择“视图”➤“实用工具”➤“显示对象库”。对象库会出现在 Xcode 窗口的右下角。\n10. 将一个推送按钮、三个复选框和一个可换行的文本字段拖到用户界面窗口中。请确保调整可换行文本字段和所有复选框的宽度，使其看起来像图\
  \ 18-2。\n\n![A437923_1_En_18_Fig2_HTML.jpg](img/A437923_1_En_18_Fig2_HTML.jpg)\n\
  \n图 18-2. CheckProgram 的用户界面\n\n11. 选择“视图”➤“实用工具”➤“显示属性检查器”。“显示属性检查器”面板会出现在 Xcode\
  \ 窗口的右上角。\n12. 点击顶部的复选框，在“显示属性检查器”面板中，将其标题改为“无狗”，替代文本改为“狗”。\n13. 点击中间的复选框，在“显示属性检查器”面板中，将其标题改为“无猫”，替代文本改为“猫”。\n\
  14. 点击顶部的复选框，在“显示属性检查器”面板中，将其标题改为“无鸟”，替代文本改为“鸟”。\n15. 双击推送按钮，将其标题改为“检查”。\n16. 选择“视图”➤“助理编辑器”➤“显示助理编辑器”。Xcode\
  \ 会在用户界面旁边显示 `ViewController.swift` 文件。\n17. 将鼠标指针移到“狗”复选框上，按住 Control 键，将鼠标拖到 `ViewController.swift`\
  \ 文件中 `IBOutlet` 行下方。\n18. 松开 Control 键和鼠标。会弹出一个窗口。\n19. 点击“名称”文本字段，输入 `dogBox`，然后点击“连接”按钮。\n\
  20. 将鼠标指针移到“猫”复选框上，按住 Control 键，将鼠标拖到 `ViewController.swift` 文件中 `IBOutlet` 行下方。\n\
  21. 松开 Control 键和鼠标。会弹出一个窗口。\n22. 点击“名称”文本字段，输入 `catBox`，然后点击“连接”按钮。\n23. 将鼠标指针移到“鸟”复选框上，按住\
  \ Control 键，将鼠标拖到 `ViewController.swift` 文件中 `IBOutlet` 行下方。\n24. 松开 Control 键和鼠标。会弹出一个窗口。\n\
  25. 点击“名称”文本字段，输入 `birdBox`，然后点击“连接”按钮。\n26. 将鼠标指针移到可换行文本字段上，按住 Control 键，将鼠标拖到\
  \ `ViewController.swift` 文件中 `IBOutlet` 行下方。\n27. 松开 Control 键和鼠标。会弹出一个窗口。\n28.\
  \ 点击“名称”文本字段，输入 `messageBox`，然后点击“连接”按钮。您现在应该拥有了四个新的 `IBOutlet`，如下所示：\n\n```\n@IBOutlet\
  \ weak var dogBox: NSButton!\n@IBOutlet weak var catBox: NSButton!\n@IBOutlet weak\
  \ var birdBox: NSButton!\n@IBOutlet weak var messageBox: NSTextField!\n```\n\n29.\
  \ 将鼠标指针移到“检查”推送按钮上，按住 Control 键，将鼠标拖到 `ViewController.swift` 文件底部最后一个花括号上方。\n30.\
  \ 松开 Control 键和鼠标。会弹出一个窗口。\n31. 点击“连接”弹出菜单，选择“动作”。\n32. 点击“名称”文本字段，输入 `checkBoxes`。\n\
  33. 点击“类型”弹出菜单，选择 `NSButton`。\n34. 点击“连接”按钮。Xcode 会创建一个空的 `IBAction` 方法。\n35. 按如下方式修改此\
  \ `checkBoxes` `IBAction` 方法：\n\n```\n@IBAction func checkBoxes(_ sender: NSButton)\
  \ {\n    let nextLine = \"\\r\\n\"\n    var message : String = \"\"\n    if dogBox.state\
  \ == 1 {\n        message = \"狗复选框已选中\" + nextLine\n    } else {\n        message\
  \ = \"狗复选框未选中\" + nextLine\n    }\n    if catBox.state == 1 {\n        message =\
  \ message + \"猫复选框已选中\" + nextLine\n    } else {\n        message = message + \"\
  猫复选框未选中\" + nextLine\n    }\n    if birdBox.state == 1 {\n        message = message\
  \ + \"鸟复选框已选中\" + nextLine\n    } else {\n        message = message + \"鸟复选框未选中\"\
  \ + nextLine\n    }\n    messageBox.stringValue = message\n}\n```\n\n此代码创建了一个常量（`nextLine`），它代表一个回车符（`\\\
  r`）和一个换行符（`\\n`）。它声明了一个可以保存 `String` 数据类型的消息变量，并且初始包含 `\"\"`，一个空字符串。多个 `if`-`else`\
  \ 语句检查每个复选框的 `State` 属性，以确定它是选中（`state = 1`）还是未选中（`state = 0`）。然后，它会将结果显示在可换行文本字段中，该字段由一个名为\
  \ `messageBox` 的 `IBOutlet` 变量表示。\n\n36. 选择“产品”➤“运行”。您的用户界面将会出现。\n37. 点击不同的复选框。注意，每次选择或取消选择复选框时，标题或替代文本都会出现。\n\
  38. 点击“检查”推送按钮。可换行文本字段会识别出您选中了哪些复选框以及哪些复选框是未选中的。\n39. 选择“CheckProgram”➤“退出 CheckProgram”。\n\
  \n\n\n## 使用单选按钮\n\n与允许用户选择多个选项的复选框不同，单选按钮会显示多个选项，但每次只允许用户选择一个。当用户选择另一个单选按钮时，当前选中的单选按钮会自动取消选中。\n\
  \n要识别用户选择了哪个单选按钮，你需要更改每个单选按钮的 `Tag` 属性。然后，你可以使用 `selectedTag()` 方法来获取选中的单选按钮。\n\n\
  若要了解如何使用单选按钮，请按照以下步骤操作：\n\n1.  在 Xcode 中，选择“文件”>“新建”>“项目”。\n2.  在 macOS 类别下，点击“应用程序”。\n\
  3.  点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 现在会要求输入产品名称。\n4.  点击“产品名称”文本字段，然后输入 `RadioProgram`。\n\
  5.  确保“语言”弹出菜单显示为 Swift，并且勾选了“使用故事板”复选框。\n6.  点击“下一步”按钮。Xcode 会询问你要将项目存储在哪里。\n7.\
  \  选择一个文件夹来存储你的项目，然后点击“创建”按钮。\n8.  在项目导航器中点击 `Main.storyboard` 文件。你的程序用户界面会显示出来。\n\
  9.  点击 `RadioProgram` 图标以显示程序用户界面的窗口。\n10. 选择“视图”>“工具”>“显示对象库”。对象库会出现在 Xcode 窗口的右下角。\n\
  11. 将一个按钮和四个单选按钮拖到用户界面窗口上，使其看起来像图 18-3 所示。\n\n![A437923_1_En_18_Fig3_HTML.jpg](img/A437923_1_En_18_Fig3_HTML.jpg)\n\
  \n图 18-3. `RadioProgram` 的用户界面\n\n12. 点击左上角的单选按钮，并确保在“属性检查器”面板的“视图”类别中，其 `Tag` 属性设置为\
  \ `0`。\n13. 点击右上列的单选按钮，并确保其 `Tag` 属性设置为 `1`。\n14. 点击左下角的单选按钮，并确保其 `Tag` 属性设置为 `2`。\n\
  15. 点击右下角的单选按钮，并确保在“显示属性检查器”面板中，其 `Tag` 属性设置为 `3`。\n16. 选择“视图”>“辅助编辑器”>“显示辅助编辑器”。`ViewController.swift`\
  \ 文件会出现在用户界面旁边。\n17. 将鼠标指针移到左上角的单选按钮上，按住 Control 键，然后拖拽到 `IBOutlet` 代码行下方。\n18.\
  \ 松开 Control 键和鼠标。此时会出现一个弹出窗口。\n19. 点击“名称”文本字段，然后输入 `radioZero`。一个 `IBOutlet` 出现，如下所示：\n\
  \n```\n@IBOutlet weak var radioZero: NSButton!\n```\n\n20. 选择“视图”>“工具”>“显示属性检查器”。\n\
  21. 向下滚动“属性检查器”面板，确保 `Tab` 属性为 `0`。\n22. 将鼠标指针移到右上角的单选按钮上，按住 Control 键，然后拖拽到 `IBOutlet`\
  \ 代码行下方。\n23. 松开 Control 键和鼠标。此时会出现一个弹出窗口。\n24. 点击“名称”文本字段，然后输入 `radioOne`。\n25.\
  \ 选择“视图”>“工具”>“显示属性检查器”。\n26. 向下滚动“属性检查器”面板，并将 `Tab` 属性更改为 `1`。\n27. 将鼠标指针移到左下角的单选按钮上，按住\
  \ Control 键，然后拖拽到 `IBOutlet` 代码行下方。\n28. 松开 Control 键和鼠标。此时会出现一个弹出窗口。\n29. 点击“名称”文本字段，然后输入\
  \ `radioTwo`。\n30. 选择“视图”>“工具”>“显示属性检查器”。\n31. 向下滚动“属性检查器”面板，并将 `Tab` 属性更改为 `2`。\n\
  32. 将鼠标指针移到右下角的单选按钮上，按住 Control 键，然后拖拽到 `IBOutlet` 代码行下方。\n33. 松开 Control 键和鼠标。此时会出现一个弹出窗口。\n\
  34. 点击“名称”文本字段，然后输入 `radioThree`。你应该拥有如下四个 `IBOutlet`：\n\n```\n@IBOutlet weak var\
  \ radioZero: NSButton!\n@IBOutlet weak var radioOne: NSButton!\n@IBOutlet weak var\
  \ radioTwo: NSButton!\n@IBOutlet weak var radioThree: NSButton!\n```\n\n35. 选择“视图”>“工具”>“显示属性检查器”。\n\
  36. 向下滚动“属性检查器”面板，并将 `Tab` 属性更改为 `3`。\n37. 在四个 `IBOutlet` 下方输入以下内容：\n\n```\nvar\
  \ radioButtonSelected : String?\n```\n\n38. 将鼠标指针移到按钮上，按住 Control 键，然后将鼠标拖拽到 `ViewController.swift`\
  \ 文件底部最后一个大括号上方。\n39. 松开 Control 键和鼠标。此时会出现一个弹出窗口。\n40. 点击“连接”弹出菜单并选择“动作”。\n41.\
  \ 点击“名称”文本字段，然后输入 `displayButton`。\n42. 点击“类型”弹出菜单并选择 `NSButton`。\n43. 点击“连接”按钮。Xcode\
  \ 会创建一个空的 `IBAction` 方法。\n44. 按如下方式修改 `IBAction` 方法：\n\n```\n@IBAction func displayButton(_\
  \ sender: NSButton) {\n    let myAlert = NSAlert()\n    if radioButtonSelected !=\
  \ nil {\n        myAlert.messageText = \"你点击了位于 \" + radioButtonSelected! + \" 的单选按钮\"\
  \n    } else {\n        myAlert.messageText = \"未选择任何单选按钮\"\n    }\n    myAlert.runModal()\n\
  }\n```\n\n45. 将鼠标指针移到左上角的单选按钮上，按住 Control 键，然后将鼠标拖拽到 `ViewController.swift` 文件底部最后一个大括号上方。\n\
  46. 松开 Control 键和鼠标。此时会出现一个弹出窗口。\n47. 点击“连接”弹出菜单并选择“动作”。\n48. 点击“名称”文本字段，然后输入 `whichRadioButton`。\n\
  49. 点击“类型”弹出菜单并选择 `NSButton`。\n50. 点击“连接”按钮。Xcode 会创建一个空的 `IBAction` 方法。\n51. 按如下方式修改\
  \ `IBAction` 方法：\n\n```\n@IBAction func whichRadioButton(_ sender: NSButton) {\n\
  \    switch sender.tag {\n    case 0 :\n        radioOne.state = 0\n        radioTwo.state\
  \ = 0\n        radioThree.state = 0\n        radioButtonSelected = \"左上角\"\n   \
  \ case 1 :\n        radioZero.state = 0\n        radioTwo.state = 0\n        radioThree.state\
  \ = 0\n        radioButtonSelected = \"右上角\"\n    case 2 :\n        radioZero.state\
  \ = 0\n        radioOne.state = 0\n        radioThree.state = 0\n        radioButtonSelected\
  \ = \"左下角\"\n    case 3 :\n        radioZero.state = 0\n        radioOne.state =\
  \ 0\n        radioTwo.state = 0\n        radioButtonSelected = \"右下角\"\n    default:\n\
  \        radioButtonSelected = \"未选择任何单选按钮\"\n    }\n}\n```\n\n52. 将鼠标指针移到右上角的单选按钮上，按住\
  \ Control 键，然后将鼠标拖拽到 `ViewController.swift` 文件中 `whichRadioButton` 这个 `IBAction`\
  \ 函数的 `func` 关键字上，直到整个函数高亮显示。\n53. 松开鼠标和 Control 键。\n54. 将鼠标指针移到左下角的单选按钮上，按住 Control\
  \ 键，然后将鼠标拖拽到 `ViewController.swift` 文件中 `whichRadioButton` 这个 `IBAction` 函数的 `func`\
  \ 关键字上，直到整个函数高亮显示。\n55. 松开鼠标和 Control 键。\n56. 将鼠标指针移到右下角的单选按钮上，按住 Control 键，然后将鼠标拖拽到\
  \ `ViewController.swift` 文件中 `whichRadioButton` 这个 `IBAction` 函数的 `func` 关键字上，直到整个函数高亮显示。\n\
  57. 松开鼠标和 Control 键。现在所有四个单选按钮都应该连接到 `whichRadioButton` 这个 `IBAction` 函数上。\n58.\
  \ 选择“产品”>“运行”。你的用户界面会出现。\n59. 点击一个单选按钮，然后点击按钮。会出现一个提醒对话框，显示你选择的单选按钮。\n60. 点击“确定”按钮关闭提醒对话框。\n\
  61. 选择 `RadioProgram` > “退出 RadioProgram”。\n\n\n\n`radioButtonSelected`变量的目的是保存一个字符串，用于标识用户选择了哪个单选按钮。最初，没有选中任何单选按钮，因此`radioButtonSelected`变量是一个可选变量。\n\
  \n`displayButton` IBAction 函数会创建一个警告对话框，并检查`radioButtonSelected`变量中是否有值。如果有，则显示该值；如果没有，则显示“No\
  \ radio button selected”。\n\n`whichRadioButton` IBAction 函数通过单选按钮的 Tag 属性来识别用户点击了哪个单选按钮。此外，点击任何单选按钮都会取消选择所有其他单选按钮，因此一次只能选中一个单选按钮。\n\
  \n请注意，您已将四个单选按钮全部连接到了 IBAction `whichRadioButton`函数。这意味着无论何时点击其中任何一个单选按钮，`whichRadioButton`函数都会运行。\n\
  \n## 使用日期选择器\n\n日期选择器使用户能够以正确的格式轻松选择日期和/或时间。日期选择器的三种外观类型如图 18-4 所示：\n\n![A437923_1_En_18_Fig4_HTML.jpg](img/A437923_1_En_18_Fig4_HTML.jpg)\n\
  \n图 18-4. 日期选择器的三种变体\n\n*   **文本型**：在文本字段中显示日期，要求用户键入正确的日期\n*   **带步进器的文本型**：在文本字段中显示日期，用户可以通过单击步进器来修改当前选中的日期部分\n\
  *   **图形型**：显示一个日历，用户可以直接点击选择日期\n\n日期选择器中可修改的一些属性如图 18-5 所示：\n\n![A437923_1_En_18_Fig5_HTML.jpg](img/A437923_1_En_18_Fig5_HTML.jpg)\n\
  \n图 18-5. 属性检查器窗格中的日期选择器属性\n\n*   **Style**：决定日期选择器的外观\n*   **Selects**：决定用户是选择单个日期还是一个日期范围\n\
  *   **Elements**：决定显示哪些日期和时间元素，例如月、日、年、时、分和秒\n*   **Minimum Date**：定义可能的最早日期\n*\
  \   **Maximum Date**：定义可能的最晚日期\n*   **Date**：定义当前显示的日期和/或时间\n\n若要从日期选择器中检索用户选择的日期，您需要访问`dateValue`属性，该属性表示`NSDate`类型。\n\
  \n要了解如何使用日期选择器，请按以下步骤操作：\n\n1.  在 Xcode 中，选择 **File** ➤ **New** ➤ **Project**。\n\
  2.  在 **macOS** 类别下点击 **Application**。\n3.  点击 **Cocoa Application**，然后点击 **Next**\
  \ 按钮。Xcode 现在会要求输入产品名称。\n4.  点击 **Product Name** 文本字段，输入`DateProgram`。\n5.  确保 **Language**\
  \ 弹出菜单显示为 **Swift**，并且所有复选框都为清除且未选中状态。\n6.  点击 **Next** 按钮。Xcode 会询问您要存储项目的位置。\n\
  7.  选择一个文件夹来存储您的项目，然后点击 **Create** 按钮。\n8.  在项目导航器窗格中点击`Main.storyboard`文件。\n9.\
  \  将一个**推送按钮**和一个**日期选择器**拖到用户界面上。\n10. 点击日期选择器，然后选择 **View** ➤ **Utilities** ➤\
  \ **Show Attributes Inspector**。\n11. 点击 **Style** 弹出菜单，选择 **Graphical**，使日期选择器看起来像月历，如图\
  \ 18-6 所示。\n\n![A437923_1_En_18_Fig6_HTML.jpg](img/A437923_1_En_18_Fig6_HTML.jpg)\n\
  \n图 18-6. DateProgram 的用户界面\n12. 选择 **View** ➤ **Assistant Editor** ➤ **Show Assistant\
  \ Editor**。Xcode 会在用户界面旁边显示`ViewController.swift`文件。\n13. 将鼠标指针移到日期选择器上，按住 **Control**\
  \ 键，然后将其拖到`ViewController.swift`文件中的`IBOutlet`行下方。\n14. 松开 **Control** 键和鼠标按钮。此时会出现一个弹出窗口。\n\
  15. 点击 **Name** 文本字段，输入`chooseDate`，然后点击 **Connect** 按钮。Xcode 会创建一个类似这样的 IBOutlet：\n\
  \n```\n@IBOutlet weak var chooseDate: NSDatePicker!\n```\n\n16. 将鼠标指针移到推送按钮上，按住\
  \ **Control** 键，然后将其拖到`ViewController.swift`文件底部最后一个花括号上方。\n17. 松开 **Control** 键和鼠标。此时会出现一个弹出窗口。\n\
  18. 点击 **Connect** 弹出菜单，选择 **Action**。\n19. 点击 **Name** 文本字段，输入`showDate`。\n20.\
  \ 点击 **Type** 弹出菜单，选择 **NSButton**。然后点击 **Connect** 按钮。Xcode 会创建一个 IBAction 方法。\n\
  21. 按如下方式修改此 IBAction 方法：\n\n```\n@IBAction func showDate(_ sender: NSButton) {\n\
  \    let myAlert = NSAlert()\n    myAlert.messageText = \"You chose this date =\
  \  \\(chooseDate.dateValue)\"\n    myAlert.runModal()\n}\n```\n\n22. 选择 **Product**\
  \ ➤ **Run**。您的用户界面会出现。\n23. 在日期选择器上选择一个日期，然后点击推送按钮。会弹出一个警告对话框，显示您选择的日期。\n24. 点击\
  \ **OK** 按钮关闭此警告对话框。\n25. 选择 **DateProgram** ➤ **Quit DateProgram**。\n\n\n\n## 使用滑块\n\
  \n滑块可以垂直或水平显示。滑块直观地表示一系列数值范围，用户可以通过前后（或上下）拖动滑块进行选择。一端代表最小值（左侧或底部），另一端代表最大值（右侧或顶部）。为了帮助用户理解滑块表示的不同数值，您还可以选择显示刻度线，如图\
  \ 18-7 所示。\n\n![A437923_1_En_18_Fig7_HTML.jpg](img/A437923_1_En_18_Fig7_HTML.jpg)\n\
  \n图 18-7. 带有和不带刻度线的滑块外观\n\n在滑块上定义的一些比较重要的属性包括：\n\n- **刻度线（Tick Marks）**：定义刻度线的位置以及要显示的刻度线数量\n\
  - **最小值（Minimum）**：定义可能的最小值\n- **最大值（Maximum）**：定义可能的最大值\n- **当前值（Current）**：标识滑块首次出现在用户界面时的初始值\n\
  \n您可以使用 `integerValue` 属性来检索滑块的当前值，并将该值显示在另一个用户界面项（如文本字段）中。要了解如何操作，请按照以下步骤进行：\n\n\
  1. 在 `Xcode` 中，选择 **文件** ➤ **新建** ➤ **项目**。\n2. 点击 `macOS` 类别下的 **应用程序**。\n3. 点击\
  \ **Cocoa 应用程序**，然后点击 **下一步** 按钮。`Xcode` 现在会要求您输入产品名称。\n4. 点击 **产品名称** 文本字段，然后输入\
  \ `SliderProgram`。\n5. 确保 **语言** 弹出菜单显示为 `Swift`，并且 **“使用故事板”** 复选框处于选中状态。\n6. 点击\
  \ **下一步** 按钮。`Xcode` 会询问您希望将项目存储在哪里。\n7. 选择一个文件夹来存储您的项目，然后点击 **创建** 按钮。\n8. 在 **项目导航器**\
  \ 窗格中点击 `Main.storyboard` 文件。\n9. 点击 `SliderProgram` 图标，使用户界面窗口显示出来。\n10. 将一个水平滑块和一个文本字段拖到用户界面上，使其看起来如图\
  \ 18-8 所示。\n\n    ![A437923_1_En_18_Fig8_HTML.jpg](img/A437923_1_En_18_Fig8_HTML.jpg)\n\
  \n    图 18-8. `SliderProgram` 的用户界面\n\n11. 选择 **视图** ➤ **助理编辑器** ➤ **显示助理编辑器**。`Xcode`\
  \ 会在用户界面旁边显示 `ViewController.swift` 文件。\n12. 将鼠标指针移到水平滑块上，按住 **Control** 键，然后将鼠标拖到\
  \ `ViewController.swift` 文件中 `IBOutlet` 行的下方。\n13. 松开 **Control** 键和鼠标。会弹出一个窗口。\n\
  14. 点击 **名称** 文本字段，输入 `mySlider`，然后点击 **连接** 按钮。\n15. 将鼠标指针移到文本字段上，按住 **Control**\
  \ 键，然后将鼠标拖到 `ViewController.swift` 文件中 `IBOutlet` 行的下方。\n16. 松开 **Control** 键和鼠标。会弹出一个窗口。\n\
  17. 点击 **名称** 文本字段，输入 `sliderValue`，然后点击 **连接** 按钮。您现在应该拥有这两个 `IBOutlet`：\n\n  \
  \  ```swift\n    @IBOutlet weak var mySlider: NSSlider!\n    @IBOutlet weak var\
  \ sliderValue: NSTextField!\n    ```\n\n18. 将鼠标指针移到水平滑块上，按住 **Control** 键，然后将鼠标拖到\
  \ `AppDelegate.swift` 文件底部最后一个花括号的上方。\n19. 松开 **Control** 键和鼠标。会弹出一个窗口。\n20. 点击\
  \ **连接** 弹出菜单，然后选择 **动作**。\n21. 点击 **名称** 文本字段，然后输入 `getValue`。\n22. 点击 **类型** 弹出菜单，然后选择\
  \ `NSSlider`。接着点击 **连接** 按钮。`Xcode` 会创建一个空的 `IBAction` 方法。\n23. 按如下方式修改此 `IBAction`\
  \ 方法：\n\n    ```swift\n    @IBAction func getValue(_ sender: NSSlider) {\n     \
  \   sliderValue.integerValue = mySlider.integerValue\n    }\n    ```\n\n24. 选择 **产品**\
  \ ➤ **运行**。您的用户界面将会显示。\n25. 左右拖动滑块。请注意，每次拖动滑块并松开鼠标按钮时，滑块的当前值都会出现在文本框中。\n26. 选择 **SliderProgram**\
  \ ➤ **退出 SliderProgram**。\n\n### 摘要\n\n复选框、单选按钮和日期选择器允许您向用户提供一系列有效的选项供其选择。这确保了用户不会意外地（或故意地）向程序提供无效数据。\n\
  \n复选框允许用户选择零个或多个选项。一组单选按钮只允许用户选择一个选项。日期选择器允许用户选择格式正确的日期。\n\n要识别用户选择了哪些复选框，请检查每个复选框的\
  \ `State` 属性。如果 `State` 值为 1，则表示该复选框被选中。如果 `State` 值为 0，则表示该复选框未被选中。\n\n可以在复选框和单选按钮上显示备选文本。这样，当复选框或单选按钮被选中时，会显示一种文本；当复选框或单选按钮未被选中时，则会显示另一种不同的文本。\n\
  \n要识别用户可能选择了哪个单选按钮，需要使用 `Tag` 属性。每个单选按钮需要一个唯一的 `Tag` 值，该值可以是整数。通过识别 `Tag` 值，就可以确定用户选择了哪个单选按钮。\n\
  \n日期选择器使用户可以轻松选择日期和/或时间。日期选择器将以特殊的 `NSDate` 格式存储所选日期/时间，您可以通过日期选择器的 `dateValue`\
  \ 属性来访问该格式。\n\n滑块允许用户从一系列有效的数值中进行选择。通过使用复选框、单选按钮、日期选择器和滑块，程序可以确保用户只能从一系列有效选项中进行选择。\n\
  \n"
- "# 19. 将文本与标签、文本字段和组合框配合使用\n\n当程序需要向用户提供有限范围的有效选项时，您会想要使用复选框、单选按钮、日期选择器或滑块。然而，有时程序需要允许用户输入永远无法提前预测的数据，例如人名。当程序需要允许用户输入数据时，您就需要使用文本字段或组合框。\n\
  \n文本字段允许用户输入数字、特殊字符或普通字母。这意味着程序可能需要验证用户输入的数据是否有效。\n\n有时，程序可以为用户提供从有限的有效选项中进行选择，或者自行输入数据的选项。例如，程序可能要求用户选择一个国家。然后，程序可以提供一系列有限的可能选项，或者允许用户自由地输入其他内容。\n\
  \n这种既可以从有限的选项中进行选择，又可以自行输入内容的能力是组合框的主要优势。组合框之所以得名，是因为它结合了弹出按钮（显示有效选项列表）的功能和可以自由输入任何内容（如文本字段）的灵活性。\n\
  \n虽然文本字段和组合框用于接收用户输入的数据，但标签用于向用户显示信息。当您只需要显示信息时，例如显示说明或标识文本字段的用途（如提示用户输入姓名或地址），您会想要使用标签。标签、文本字段和组合框协同工作，在用户界面上接收和显示文本。\n\
  \n\n\n## 使用文本字段\n\n由于用户可以在文本字段中输入任何内容，文本字段会以字符串形式存储数据，你可以通过 `stringValue` 属性获取该数据。不过，由于用户也可以输入整数或小数，文本字段足够灵活以识别这些数字。\n\
  \n如果用户输入整数，你可以通过访问 `intValue` 属性来获取该值。如果用户输入小数，你可以通过访问 `floatValue` 或 `doubleValue`\
  \ 属性来获取该值。\n\n无论用户在文本字段中输入什么，你都能获取到正确的值。由于文本字段可以接受字符串或数字，你的程序可以通过访问以下任一属性来获取正确的值：\n\
  \n- `intValue`：获取整数值。如果用户输入字符串，该属性存储 0。如果用户输入小数（例如 10.9），它只存储整数值（例如 10）。\n- `floatValue`\
  \ 或 `doubleValue`：获取浮点值或双精度值。如果用户输入字符串，该属性存储 0.0。如果用户输入整数（例如 4），`floatValue` 和 `doubleValue`\
  \ 属性会将其存储为小数（例如 4.0）。\n- `stringValue`：获取字符串值。如果用户输入数字，它会将该数字存储为字符串（例如 \"4.305\"\
  ）。\n\n**注意：** 当用户在文本字段中输入文本时，该输入文本会存储在所有四个属性中：`intValue`、`floatValue`、`doubleValue`\
  \ 和 `stringValue`。\n\n除了标准文本字段，Xcode 还提供了几种用于处理不同类型文本输入的文本字段变体：\n\n- **带数字格式器的文本字段**：定义可输入的数字类型\n\
  - **安全文本字段**：屏蔽输入的文本\n- **搜索字段**：存储先前输入的文本列表\n- **令牌字段**：允许用户除了输入普通文本外，还可以输入内容令牌\n\
  \n## 使用数字格式器\n\n数字格式器让你可以定义用户能在文本框中输入的有效数字值，例如最小值或最大值，或特定的输入方式，比如带 `%` 符号，或输入“四”而不是\
  \ 4。\n\nXcode 提供了两种方法来创建带数字格式器的文本字段。首先，你可以从“对象库”中拖放“带数字格式器的文本字段”并将其放置到你的用户界面上。其次，你可以从“对象库”中拖放“数字格式器”并将其放置到用户界面上已有的文本字段上。\n\
  \n找到这些项目最快的方法是在“对象库”底部的搜索文本字段中键入“数字格式器”，如图 19-1 所示。\n\n![A437923_1_En_19_Fig1_HTML.jpg](img/A437923_1_En_19_Fig1_HTML.jpg)\n\
  \n**图 19-1.** “对象库”中的“带数字格式器的文本字段”和“数字格式器”\n\n无论你是使用“带数字格式器的文本字段”项创建一个新的文本字段，还是将数字格式器应用于现有文本字段，你都需要定义数字格式器的设置。为此，你需要遵循以下几个步骤：\n\
  \n1. 点击**显示文稿大纲**图标以显示文稿大纲。\n2. 点击使用数字格式器的文本字段左侧的展开三角形。\n3. 点击文本字段下方的文本字段单元格左侧出现的展开三角形。\n\
  4. 点击数字格式器，如图 19-2 所示。\n\n![A437923_1_En_19_Fig2_HTML.jpg](img/A437923_1_En_19_Fig2_HTML.jpg)\n\
  \n**图 19-2.** “数字格式器”出现在“文稿大纲”中\n\n5. 选择**显示** ➤ **工具** ➤ **显示检查器**。“显示检查器”窗格会出现在\
  \ Xcode 窗口的右上角，如图 19-3 所示。\n\n![A437923_1_En_19_Fig3_HTML.jpg](img/A437923_1_En_19_Fig3_HTML.jpg)\n\
  \n**图 19-3.** “显示检查器”窗格\n\n**最小值**和**最大值**复选框允许你定义文本字段将接受的最小值和/或最大值。如果你定义最小值为 10，而用户输入的数字小于\
  \ 10，则文本字段将不会接受该数字。\n\n**本地化格式**复选框指示 Xcode 使用用户的本地设置来确定小数点和货币符号的显示方式。在世界上的某些地区，小数点使用句点，而在其他地区则使用逗号。\n\
  \n同样对于货币，欧洲人使用欧元符号，美国人使用美元符号，英国用户使用英镑符号。选中**本地化**复选框可确保你的文本字段数字格式器无论程序在世界上任何地方使用都能正常工作。\n\
  \n**样式**弹出菜单允许你定义数字格式化的不同方式。当你选择一种样式时，**示例**类别下的**未格式化**和**已格式化**文本字段会显示你的数字可能的外观。\n\
  \n例如，在图 19-3 中，选择**无**样式意味着，如果用户在带有数字格式器的文本字段中输入 1,234.75 并按回车键，该文本字段会将该数字格式化为简单的\
  \ 1235。\n\n然而，如果样式是**货币**、**百分比**、**科学计数**或**拼写数字**，则意味着用户可以按照**已格式化**示例所定义的方式输入数字，而文本字段将按照**未格式化**示例所示的方式存储该数字。\n\
  \n要了解如何使用这些不同的数字格式器，请遵循以下步骤：\n\n\n\n1.  在 Xcode 中选择“文件”➤“新建”➤“项目”。\n2.  在 macOS\
