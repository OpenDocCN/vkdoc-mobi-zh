  \ `TouchProgram`。\n5.  确保“语言”弹出菜单显示 Swift，并且“使用 Storyboard”复选框已被勾选。\n6.  单击“下一步”按钮。\
  \ Xcode 会询问您希望将项目存储在何处。\n7.  选择一个文件夹来存储您的项目，然后单击“创建”按钮。\n8.  在项目导航器中单击 `Main.storyboard`\
