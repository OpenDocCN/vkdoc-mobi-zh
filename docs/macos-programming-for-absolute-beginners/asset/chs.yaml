  \n\n虽然搜索字段（`search fields`）、令牌字段（`token fields`）和安全文本字段（`secure text fields`）外观不同，但在访问其中存储的值时，它们的行为与文本字段完全一致。\n\
  \n## 使用组合框\n\n文本字段允许用户输入任意内容，而弹出按钮则显示一组固定的选项。当你希望显示一组固定选项，同时允许用户输入文本时，便可以使用组合框。\n\
  \n组合框基于`NSComboBox`类，而该类又派生自定义所有文本字段的`NSTextField`类。因此，你可以通过`intValue`、`floatValue`、`doubleValue`或`stringValue`属性从组合框中检索值。\n\
  \n使用组合框时，有两种方式可以填充其弹出式选项列表。首先，你可以使用“显示属性检查器”面板创建一个内部列表。其次，你可以使用外部数据源，使组合框从数据库文件或通过网络检索数据。\n\
  \n### 创建内部列表\n\n当你预先确切知道组合框中要存储多少个项目以及哪些项目时（例如国家列表或产品名称列表），内部列表是最佳选择。要创建内部列表，请遵循以下步骤：\n\
  \n1.  在你的程序用户界面上放置一个组合框。\n2.  点击以选中该组合框。\n3.  选择“视图”>“实用工具”>“显示属性检查器”。“项目”列表随即出现，如图\
  \ 19-9 所示。\n\n![A437923_1_En_19_Fig9_HTML.jpg](img/A437923_1_En_19_Fig9_HTML.jpg)\n\
  \n**图 19-9.**\n\n“项目”列表允许你定义要在组合框中显示的项目\n\n- 要编辑列表中的现有项目，点击该项目将其选中，然后按`Return`键。现在你可以编辑文本了。\n\
  - 要移除现有项目，点击该项目将其选中，然后点击减号图标。\n- 要添加新项目，点击加号图标。然后点击新添加的项目，按`Return`键，并编辑文本。\n\n\
  “可见项目数”文本字段定义了组合框菜单显示的项目数量。\n\n“自动完成”复选框允许组合框显示列表中与用户输入内容相匹配的项目。因此，如果用户键入一个字母，自动完成功能会显示组合框列表中以该字母开头的所有项目。\n\
  \n“使用数据源”复选框确定组合框是使用其内部“项目”列表来显示菜单项，还是从其他来源检索数据。如果选中了“使用数据源”复选框，则需要编写 Swift 代码来向组合框中填充数据。\n\
  \n要了解如何使用内部列表填充组合框，请遵循以下步骤：\n\n1.  在 Xcode 内部，选择“文件”>“新建”>“项目”。\n2.  在 macOS 类别下点击“应用程序”。\n\
  3.  点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 现在会要求输入产品名称。\n4.  点击“产品名称”文本字段，然后输入`ComboProgram`。\n\
  5.  确保“语言”弹出菜单显示为`Swift`，并且“使用故事板”复选框已被选中。\n6.  点击“下一步”按钮。Xcode 会询问你希望将项目存储在哪里。\n\
  7.  选择一个文件夹来存储项目，然后点击“创建”按钮。\n8.  在项目导航器窗格中点击`Main.storyboard`文件。\n9.  将一个组合框、一个推送按钮和一个标签拖放到用户界面上，并加宽标签，使其看起来如图\
  \ 19-10 所示。\n\n![A437923_1_En_19_Fig10_HTML.jpg](img/A437923_1_En_19_Fig10_HTML.jpg)\n\
  \n**图 19-10.**\n\n`ComboProgram`的用户界面\n10.  选择“视图”>“助理编辑器”>“显示助理编辑器”。Xcode 会在用户界面旁显示`ViewController.swift`文件。\n\
  11.  将鼠标指针移到组合框上，按住`Control`键，然后将鼠标拖到`ViewController.swift`文件中的`IBOutlet`行下方。\n\
  12.  松开`Control`键和鼠标。会弹出一个窗口。\n13.  点击“名称”文本字段，输入`myCombo`，然后点击“连接”按钮。\n14.  将鼠标指针移到标签上，按住`Control`键，然后将鼠标拖到`ViewController.swift`文件中的`IBOutlet`行下方。\n\
  15.  松开`Control`键和鼠标。会弹出一个窗口。\n16.  点击“名称”文本字段，输入`comboResult`，然后点击“连接”按钮。现在你应该有了这两个`IBOutlet`：\n\
  \n```\n    @IBOutlet weak var myCombo: NSComboBox!\n    @IBOutlet weak var comboResult:\
  \ NSTextField!\n```\n\n17.  将鼠标指针移到推送按钮上，按住`Control`键，然后将鼠标拖到`ViewController.swift`文件底部最后一个花括号的上方。\n\
  18.  松开`Control`键和鼠标。会弹出一个窗口。\n19.  点击“连接”弹出菜单，选择“动作”。\n20.  点击“名称”文本字段，输入`showResult`。\n\
  21.  点击“类型”弹出菜单，选择`NSButton`。然后点击“连接”按钮。Xcode 会创建一个空的`IBAction`方法。\n22.  按如下方式修改此`IBAction`方法：\n\
  \n```\n    @IBAction func showResult(sender: NSButton) {\n        comboResult.stringValue\
  \ = myCombo.stringValue\n    }\n```\n\n23.  选择“产品”>“运行”。你的用户界面会出现。\n24.  点击组合框，输入`Hello`。\n\
  25.  点击推送按钮。单词`Hello`会出现在标签中。\n26.  点击组合框右侧边缘向下的箭头，显示其项目列表。由于你没有修改默认列表，因此组合框列表包含三个项目，分别标记为`Item\
  \ 1`、`Item 2`和`Item 3`。\n27.  点击`Item 3`，然后点击推送按钮。下方的标签会显示`Item 3`。\n28.  选择`ComboProgram`>“退出`ComboProgram`”。\n\
  \n此示例使用了组合框的默认项目列表。尝试添加或修改此组合框的项目列表，并选中“自动完成”复选框，以观察这些选项如何改变组合框的行为。\n\n\n\n### 使用数据源\n\
  \n当组合框需要显示可能随时间变化的数据时，使用数据源是最佳选择，例如显示来自数据库的信息列表。要使用数据源，你需要编写 Swift 代码。首先，你需要在 `ViewController.swift`\
  \ 文件中遵循 `NSComboBoxDataSource` 协议，如下所示：\n\n```\nclass ViewController: NSViewController,\
  \ NSComboBoxDataSource {\n```\n\n接下来，你需要编写两个函数。一个函数需要计算要在组合框中显示的项目数量。第二个函数需要检索数据以插入到组合框的项目列表中。\n\
  \n最后，你需要指定一个数据源（包含你想要在组合框中显示的数据的文件），并确保在“显示属性检查器”窗格中选中了组合框的“使用数据源”复选框，或者使用 Swift\
  \ 代码将 `usesDataSource` 属性设置为 `true`。\n\n若要查看数据源如何为组合框填充项目列表，请按照以下步骤操作：\n\n1.  确保\
  \ ComboProgram 项目已在 Xcode 中加载。  \n2.  点击项目导航窗格中的 `ViewController.swift` 文件。  \n\
  3.  修改 `AppDelegate.swift` 文件中的类名，以包含 `NSComboBoxDataSource` 协议，如下所示：\n\n    ```\n\
  \    class ViewController : NSViewController, NSComboBoxDataSource {\n    ```\n\n\
  4.  在 `IBOutlet` 行下方，添加以下行以创建一个字符串数组，用于填充组合框的项目列表：\n\n    ```\n    let myArray =\
  \ [\"Sandwich\", \"Chips\", \"Soda\", \"Salad\"]\n    ```\n\n5.  按如下方式修改 `viewDidLoad`\
  \ 函数：\n\n    ```\n    override func viewDidLoad() {\n    super.viewDidLoad()\n \
  \   // 执行视图加载后的任何其他设置。\n    self.myCombo.usesDataSource = true\n    self.myCombo.dataSource\
  \ = self\n    }\n    ```\n\n    这段 Swift 代码将组合框的数据源（由 `myCombo` IBOutlet 标识）定义为\
  \ `self`，这意味着同一个类同时也是数据源。它确保 `usesDataSource` 属性为 `true`，以便使用数据源。  \n6.  在 `IBAction`\
  \ 方法上方，添加以下两个函数的实现：  \n7.  在 `ViewController.swift` 文件的最后一个花括号上方，添加以下内容：\n\n   \
  \ ```\n    func numberOfItems (in comboBox: NSComboBox) -> Int {\n    return myArray.count\n\
  \    }\n    func comboBox(_ comboBox: NSComboBox, objectValueForItemAt index: Int)\
  \ -> Any? {\n    return myArray[index]\n    }\n    ```\n\n    `numberOfItems` 函数计算\
  \ `myArray` 数组中所有项目的数量并返回该整数。`comboBox` 函数将每个数组项目放置到组合框的项目列表中。  \n8.  选择“产品”➤“运行”。\
  \  \n9.  点击组合框向下指的箭头。注意，其项目列表包含了在 `myArray` 中定义的项目（“Sandwich”、“Chips”、“Soda”和“Salad”）。\
  \  \n10. 在组合框中点击“Sandwich”将其选中，然后点击“按钮”。注意，下方的标签显示“Sandwich”。  \n11. 选择“ComboProgram”➤“退出\
  \ ComboProgram”。  \n\n这个简单的程序演示了如何从另一个数据源（在本例中是一个名为 `myArray` 的数组）检索项目列表，以填充组合框的项目列表。`ViewController.swift`\
  \ 文件的完整代码应如下所示：\n\n```\nimport Cocoa\nclass ViewController: NSViewController, NSComboBoxDataSource\
  \ {\n@IBOutlet weak var myCombo: NSComboBox!\n@IBOutlet weak var comboResult: NSTextField!\n\
  let myArray = [\"Sandwich\", \"Chips\", \"Soda\", \"Salad\"]\noverride func viewDidLoad()\
  \ {\nsuper.viewDidLoad()\n// 执行视图加载后的任何其他设置。\nself.myCombo.usesDataSource = true\n\
  self.myCombo.dataSource = self\n}\noverride var representedObject : Any? {\ndidSet\
  \ {\n// 如果视图已加载，则更新视图。\n}\n}\n@IBAction func showResult(_ sender: NSButton) {\n\
  comboResult.stringValue = myCombo.stringValue\n}\nfunc numberOfItems(in comboBox:\
  \ NSComboBox) -> Int {\nreturn myArray.count\n}\nfunc comboBox(_ comboBox: NSComboBox,\
  \ objectValueForItemAt index: Int) -> Any? {\nreturn myArray[index]\n}\n}\n```\n\
  \n### 总结\n\n文本字段允许用户输入任何内容，例如数字或字符串，因此文本字段提供了多个属性（`intValue`、`floatValue`、`doubleValue`\
  \ 和 `stringValue`），以将输入的信息存储为适当的数据类型。要限制用户可能输入的数值信息，你可以使用数字格式化器来定义最小值和/或最大值，同时定义用户输入数值数据的不同方式，例如使用百分比符号或货币符号。\n\
  \n除了普通的文本字段之外，Xcode 还提供了几种用于特定用途的文本字段变体。标签旨在简单地显示文本，而不允许用户编辑显示的文本。安全文本字段对输入的数据进行掩码处理，以防被窥视。令牌字段将输入的数据显示为组或令牌，而搜索字段则提供一个属性来记住之前输入的数据。\n\
  \n组合框结合了文本字段和弹出按钮的特性。组合框可以显示一个有效选项列表供用户点击，或者用户可以自行输入数据。你可以在“显示属性检查器”窗格中定义组合框的选项列表，也可以从其他来源（例如数组）检索数据。\n\
  \n文本字段和组合框的主要目的是允许用户输入任何类型的数据。当用户输入数据时，你可能需要编写 Swift 代码来验证输入的数据是否对你的程序有效。\n\n"
- "# 20. 使用约束设计用户界面\n\n用户界面让人们能够控制程序、向程序提供数据并接收返回的数据。由于人们只能通过程序界面与之交互，因此确保用户界面简洁明了且易于理解至关重要。\n\
  \n在设计程序的用户界面时，可以尝试不同的设计方案。对你来说可能直观易用的东西，对新手来说可能完全陌生且令人困惑。\n\n为了帮助你创建和尝试不同的用户界面设计，Xcode\
  \ 让你能够轻松地在用户界面上拖放和排列按钮、文本字段、复选框等项目。一旦找到最佳的用户界面设计方案，接下来的挑战就是确保该用户界面在任何情况下都看起来正确。\n\
  \n对于 macOS 程序，用户界面会出现在一个可调整大小的窗口中。这意味着用户可能会将窗口拉伸得更宽（或更窄）、更高（或更矮），或同时进行这两种操作，因此你的用户界面必须适应不同的窗口尺寸。如果程序窗口缩小并切断或隐藏了用户界面的部分内容，即使是最好的用户界面也会变得毫无价值，如图\
  \ 20-1 所示。\n\n![A437923_1_En_20_Fig1_HTML.jpg](img/A437923_1_En_20_Fig1_HTML.jpg)\n\
  \n图 20-1. 调整窗口大小可能会切断或隐藏程序的用户界面\n\n为确保调整窗口大小不会扭曲用户界面，你需要使用约束。约束可以定义以下一项或多项内容：\n\n\
  - 用户界面元素可以扩展或收缩的最大和最小尺寸\n- 用户界面元素相对于窗口边框的位置\n- 两个用户界面元素之间的距离\n\n通过将约束应用于用户界面的所有部分，你可以确保无论用户如何调整窗口大小，用户界面都能始终保持良好外观。\n\
  \n\n\n## 约束窗口大小\n\n默认情况下，你程序的每个窗口都可以由用户调整大小。这意味着用户可以缩小或放大窗口。当用户缩小窗口时，窗口可能会遮住或隐藏部分用户界面。当用户放大窗口时，窗口中将主要包含空白区域。\n\
  \n若要约束窗口的最大和最小尺寸，请按照以下步骤操作：\n\n1. 点击包含你程序用户界面的 `.xib` 或 `.storyboard` 文件。如果使用故事板，请确保点击窗口控制器（而不是视图控制器）。\n\
  2. 选择“视图”➤“实用工具”➤“显示尺寸检查器”。尺寸检查器面板会显示出来，如图 20-2 所示。\n\n![A437923_1_En_20_Fig2_HTML.jpg](img/A437923_1_En_20_Fig2_HTML.jpg)\n\
  \n*图 20-2. 尺寸检查器允许你定义窗口的最大和最小尺寸*\n\n3. 点击“内容大小”类别下的“最小内容大小”复选框，然后在“宽度”和“高度”文本字段中输入值。你在此定义的值将是窗口的最小尺寸。\n\
  4. 点击“内容大小”类别下的“最大内容大小”复选框，然后在“宽度”和“高度”文本字段中输入值。你在此定义的值将是窗口的最大尺寸。\n\n通过定义最小尺寸，你可以确保缩小窗口不会遮住或隐藏部分用户界面。通过定义最大尺寸，你可以确保放大窗口不会产生大片空白区域。\n\
  \n## 将用户界面项约束到窗口边缘\n\n当用户调整窗口大小时，窗口中的任何项（例如按钮、文本字段或标签）都会保持在原位。这就是为什么缩小窗口可能会覆盖或隐藏部分用户界面，而放大窗口则可能产生空白区域的原因。\n\
  \n要使用户界面适应窗口大小的变化，你需要在用户界面项（按钮、文本字段等）与窗口边缘之间放置约束。这样一来，当用户调整窗口大小时，用户界面项会保持与某条窗口边缘的固定距离。这使得用户界面可以在窗口改变宽度和/或高度时进行扩展或收缩。\n\
  \n要了解如何使用约束将用户界面项固定到窗口边缘，请按照以下步骤操作：\n\n1. 在 Xcode 内，选择“文件”➤“新建”➤“项目”。\n2. 在 macOS\
  \ 类别下点击“应用程序”。\n3. 点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 会要求输入产品名称。\n4. 点击“产品名称”文本字段，然后输入\
  \ `ConstraintProgram`。\n5. 确保“语言”弹出菜单显示 Swift，并且“使用故事板”复选框处于选中状态。\n6. 点击“下一步”按钮。Xcode\
  \ 会询问你想将项目存储在何处。\n7. 选择一个文件夹来存储你的项目，然后点击“创建”按钮。\n8. 在项目导航器中点击 `Main.storyboard`\
  \ 文件。你程序的用户界面将会显示出来。\n9. 选择“视图”➤“实用工具”➤“显示对象库”。\n10. 在场景中的任意位置放置一个按钮。（确保将其放置在视图控制器上，而不是窗口控制器上。）\n\
  11. 选择“产品”➤“运行”。用户界面将会显示出来。\n12. 将鼠标指针移到程序窗口的右下角，然后向右下方拖动鼠标。请注意，尽管窗口大小发生了变化，但按钮仍保持在原位。\n\
  13. 选择 `ConstraintProgram`➤“退出 `ConstraintProgram`”。Xcode 会再次出现。当你调整窗口大小时，按钮保持在原位，是因为按钮没有任何约束。通过在按钮与右侧窗口边缘之间放置一个约束，你可以让按钮随着右侧窗口边缘的移动而移动。\n\
  14. 在项目导航器中点击 `Main.storyboard` 文件，然后点击按钮将其选中。\n15. 将鼠标指针移到按钮上方，按住 Control 键，然后将鼠标向右侧窗口边缘方向拖动。Xcode\
  \ 会显示一条蓝色线条，如图 20-3 所示。\n\n![A437923_1_En_20_Fig3_HTML.jpg](img/A437923_1_En_20_Fig3_HTML.jpg)\n\
  \n*图 20-3. 按住 Control 键拖动鼠标会创建一个约束*\n\n16. 在按钮和窗口右边缘之间松开 Control 键和鼠标左键。会弹出一个菜单，如图\
  \ 20-4 所示。\n\n![A437923_1_En_20_Fig4_HTML.jpg](img/A437923_1_En_20_Fig4_HTML.jpg)\n\
  \n*图 20-4. 用于选择约束的弹出菜单*\n\n17. 选择“尾部空间到容器”选项。Xcode 会从按钮到窗口右边缘绘制一个约束，如图 20-5 所示。\n\
  \n![A437923_1_En_20_Fig5_HTML.jpg](img/A437923_1_En_20_Fig5_HTML.jpg)\n\n*图 20-5.\
  \ 约束显示为一条线*\n\n18. 选择“产品”➤“运行”。用户界面将会显示出来。\n19. 将鼠标指针移到程序窗口的右下角，然后向右下方拖动鼠标。请注意，由于按钮有一个约束将其链接到窗口右边缘，每当窗口大小发生变化时，按钮都会移动，以保持与窗口右边缘的固定距离。\n\
  20. 选择 `ConstraintProgram`➤“退出 `ConstraintProgram`”。Xcode 会再次出现。\n\n当你对按钮放置一个约束时，Xcode\
  \ 会在按钮周围显示一个红色边框。这个红色边框提示你，该用户界面项上的约束不足。\n\n在这种情况下，该约束定义了当窗口右边缘移动时按钮如何反应。但是，按钮缺少定义当窗口在高度上缩小或放大时按钮如何反应的约束。\n\
  \n理想情况下，你应该在每个用户界面项上放置足够的约束，以便它们定义窗口改变宽度或高度时所有可能的变化。要解决按钮的这个问题，你需要添加另一个约束，定义按钮相对于窗口顶部或底部的垂直位置。\n\
  \n1. 点击按钮将其选中。\n2. 按住 Control 键，然后向窗口底部方向拖动鼠标。\n3. 在按钮和窗口底部边缘之间松开 Control 键和鼠标左键。会弹出一个菜单，如图\
  \ 20-6 所示。\n\n![A437923_1_En_20_Fig6_HTML.jpg](img/A437923_1_En_20_Fig6_HTML.jpg)\n\
  \n*图 20-6. 另一个用于为按钮应用约束的弹出菜单*\n\n4. 选择“底部空间到容器”选项。Xcode 会从按钮到窗口底部绘制一个约束。请注意，Xcode\
  \ 不再以红色高亮显示按钮周围的边框，因为你现在有足够的约束了。\n5. 选择“产品”➤“运行”。用户界面将会显示出来。\n6. 将鼠标指针移到程序窗口的右下角，然后向右下方拖动鼠标。请注意，由于按钮有一个约束将其链接到窗口的右边缘和底部边缘，每当窗口大小发生变化时，按钮都会移动，以保持与窗口右边缘和底部边缘的固定距离。\n\
  7. 选择 `ConstraintProgram`➤“退出 `ConstraintProgram`”。\n\n对于每个用户界面项，你可以定义其相对于窗口顶部、左侧、右侧或底部的约束：\n\
  \n- `Trailing Space to Container`（尾部空间到容器）：将项约束到窗口的右边缘。\n- `Leading Space to Container`（前导空间到容器）：将项约束到窗口的左边缘。\n\
  - `Top Space to Container`（顶部空间到容器）：将项约束到窗口的顶部边缘。\n- `Bottom Space to Container`（底部空间到容器）：将项约束到窗口的底部边缘。\n\
  \n一旦你在用户界面项上放置了一个或多个约束，就可以在“尺寸检查器”面板中查看这些约束的更多详细信息，如图 20-7 所示。\n\n![A437923_1_En_20_Fig7_HTML.jpg](img/A437923_1_En_20_Fig7_HTML.jpg)\n\
  \n*图 20-7. “尺寸检查器”面板列出了每个约束的详细信息*\n\n\n\n### 编辑约束\n\n创建约束后，你可以随时修改它。修改约束的几种方式包括：\n\
  \n*   **更改约束的长度**：约束长度可以等于、小于等于或大于等于某个固定值。\n*   **更改约束的优先级**：优先级用于定义哪些约束最重要。\n*\
  \   **更改约束的乘数**：（默认值为 `1`，代表 100%或 1:1。）乘数会改变约束调整用户界面项目大小方式。\n\n要修改约束，请遵循以下步骤：\n\
  \n1.  单击包含要修改约束的用户界面项目。\n2.  选择 `View` ➤ `Utilities` ➤ `Show Size Inspector`。此时将出现“大小检查器”面板，并显示该项目上的约束（参见图\
  \ 20-7）。\n3.  在要修改的约束右侧，单击出现的 `Edit` 按钮。此时将弹出一个窗口，如图 20-8 所示。\n\n![A437923_1_En_20_Fig8_HTML.jpg](img/A437923_1_En_20_Fig8_HTML.jpg)\n\
  \n图 20-8. 编辑约束\n\n4.  在 `Constant` 弹出菜单中单击，然后选择 `=`、`≤` 或 `≥`，如图 20-9 所示。\n\n![A437923_1_En_20_Fig9_HTML.jpg](img/A437923_1_En_20_Fig9_HTML.jpg)\n\
  \n图 20-9. 编辑约束\n\n5.  在 `Constant:` 标签右侧的文本框中单击，输入一个值，或选择 `standard value`（Xcode\
  \ 使用推荐值）或 `canvas value`（Xcode 使用用户界面项目之间的距离来定义一个数值）。在大多数情况下，`standard value` 是最安全的选择，适用于不同类型的屏幕。\n\
  6.  在 `Priority` 文本框中单击并输入一个值。该值越高，约束的优先级就越高。当两个或更多约束冲突时，优先级决定了遵循哪个约束。\n7.  在 `Multiplier`\
  \ 文本框中单击并输入一个值，例如 `0.5` 或 `2`。`Multiplier` 的值定义了用户界面项目如何拉伸或收缩。\n\n要了解多个约束如何影响用户界面项目的外观，请遵循以下步骤：\n\
  \n1.  确保你的 `ConstraintProgram` 已加载到 Xcode 中。\n2.  在导航面板中单击 `Main.storyboard` 文件。程序的用户界面随之出现。\n\
  3.  单击推送按钮。应该有一个约束将该按钮连接到窗口的右边缘，另一个约束将按钮连接到窗口底部。\n4.  将鼠标指针移到推送按钮上，按住 `Control`\
  \ 键，然后将鼠标拖向窗口的左边缘。\n5.  松开 `Control` 键和鼠标左键。此时将出现一个弹出菜单，如图 20-10 所示。\n\n![A437923_1_En_20_Fig10_HTML.jpg](img/A437923_1_En_20_Fig10_HTML.jpg)\n\
  \n图 20-10. 为窗口左边缘定义新约束\n\n6.  选择 `Leading Space to Container`。Xcode 会从推送按钮到窗口左边缘绘制一条约束。此时，你应该有了三个约束，分别作用于窗口的左、右和底部边缘，如图\
  \ 20-11 所示。\n\n![A437923_1_En_20_Fig11_HTML.jpg](img/A437923_1_En_20_Fig11_HTML.jpg)\n\
  \n图 20-11. 推送按钮上的三个约束\n\n7.  选择 `Product` ➤ `Run`。用户界面随之出现。\n8.  将鼠标指针移到窗口的右边缘，然后拖动鼠标调整窗口大小。注意，左侧约束使推送按钮的左边缘与窗口左边缘保持固定距离，而右侧约束使推送按钮的右边缘与窗口右边缘保持固定距离，这将强制按钮拉伸，如图\
  \ 20-12 所示。\n\n![A437923_1_En_20_Fig12_HTML.jpg](img/A437923_1_En_20_Fig12_HTML.jpg)\n\
  \n图 20-12. 窗口调整大小时，多个约束可以改变项目的外观\n\n9.  选择 `ConstraintProgram` ➤ `Quit ConstraintProgram`。\n\
  \n由于你为推送按钮的左侧和右侧创建了两个约束，因此当窗口调整大小时，推送按钮会扩展。这是因为左侧和右侧约束都定义了推送按钮与窗口左右边缘之间的固定距离。\n\n\
  防止推送按钮扩展的一种方法是修改其左侧和右侧约束。右侧约束可以定义一个大于或等于的值，而不是固定值。要了解其工作原理，请遵循以下步骤：\n\n1.  确保 `ConstraintProgram`\
  \ 已加载到 Xcode 中。\n2.  在项目导航面板中单击 `Main.storyboard` 文件。\n3.  单击推送按钮。\n4.  选择 `View`\
  \ ➤ `Utilities` ➤ `Show Size Inspector`。此时将出现“大小检查器”面板，显示推送按钮上的约束（参见图 20-7）。\n5.\
  \  在 `Trailing Space` 约束（右侧约束）右侧，单击出现的 `Edit` 按钮。此时将弹出一个窗口（参见图 20-8）。\n6.  在 `Constant`\
  \ 弹出菜单中单击，然后选择 `≥`，如图 20-13 所示。\n\n![A437923_1_En_20_Fig13_HTML.jpg](img/A437923_1_En_20_Fig13_HTML.jpg)\n\
  \n图 20-13. 将约束从 `=` 更改为 `≥`\n\n7.  选择 `Product` ➤ `Run`。你的用户界面随之出现。\n8.  将鼠标指针移到窗口的右边缘，然后拖动鼠标调整窗口大小。注意，左侧约束使推送按钮的左边缘与窗口左边缘保持固定距离，但当你加宽窗口时，推送按钮不再扩展。这是因为右侧约束定义了推送按钮到窗口右边缘的距离必须大于或等于一个固定值。\n\
  9.  选择 `ConstraintProgram` ➤ `Quit ConstraintProgram`。\n\n\n\n### 创建尺寸约束\n\n前面的示例展示了如何通过将约束从\
  \ `=` 修改为 `≥` 来防止按钮扩展尺寸。然而，保持用户界面元素固定尺寸的另一种方法是应用尺寸约束。尺寸约束可以定义以下之一：\n\n- 高度\n- 宽度\n\
  - 宽高比\n\n宽高比使高度和宽度之间的比率保持固定值，因此加宽元素也会使其变高（反之亦然）。要定义尺寸约束，您只需在用户界面元素的边界内按住 Control\
  \ 键并拖动。要了解如何定义尺寸约束，请按照以下步骤操作：\n\n1. 确保 `ConstraintProgram` 已在 Xcode 中加载。\n2. 在项目导航器窗格中点击\
  \ `Main.storyboard` 文件。\n3. 点击该按钮。\n4. 选择“视图” ➤ “实用工具” ➤ “显示尺寸检查器”。尺寸检查器窗格出现，显示该按钮上的约束（参见图\
  \ 20-7）。\n5. 将鼠标指针移动到按钮上。\n6. 按住 Control 键并向左或向右拖动鼠标，但保持在按钮的边界内。\n7. 松开 Control\
  \ 键和鼠标左键。将出现一个弹出菜单，如图 20-14 所示。\n\n   ![A437923_1_En_20_Fig14_HTML.jpg](img/A437923_1_En_20_Fig14_HTML.jpg)\n\
  \n   图 20-14. 创建尺寸约束\n8. 选择“宽度”。注意，Xcode 会在按钮下方显示一个宽度约束，如图 20-15 所示。此宽度约束使按钮保持固定尺寸。\n\
  \n   ![A437923_1_En_20_Fig15_HTML.jpg](img/A437923_1_En_20_Fig15_HTML.jpg)\n\n \
  \  图 20-15. 项目下方出现一个宽度约束\n9. 点击出现在宽度约束右侧的“编辑”按钮。将出现一个弹出窗口。\n10. 点击“常量”弹出菜单并将 `=`\
  \ 更改为 `≤`。\n11. 点击“常量”文本字段，并将其中显示的任意值（如 70）改为该值的两倍（如 140）。这将定义宽度约束，使按钮宽度小于或等于特定值。\n\
  12. 选择“产品” ➤ “运行”。您的用户界面将出现。注意，您只能将窗口宽度调整到有限大小。当您加宽窗口时，按钮宽度会扩展到一定尺寸。然后约束会阻止窗口继续调整大小。\n\
  13. 选择 `ConstraintProgram` ➤ 退出 `ConstraintProgram`。\n\n### 在多个用户界面元素之间创建约束\n\n\
  将元素约束到窗口边缘以及约束元素尺寸是使用约束的两种方式。使用约束的第三种方式是定义两个独立用户界面元素（例如按钮和文本字段）之间的距离。\n\n通过在用户界面元素之间定义约束，您可以确保无论用户如何调整程序窗口大小，整个用户界面都看起来良好。此外，在用户界面元素之间创建约束可以避免您为每个用户界面元素详尽地定义到窗口边缘的约束。\n\
  \n要在用户界面元素之间创建约束，请按住 Control 键并从其中一个用户界面元素拖动到另一个用户界面元素。您可以定义两个元素之间的固定距离，或者定义两个元素如何对齐，例如保持它们的顶部或底部彼此对齐。\n\
  \n要了解如何在用户界面元素之间创建约束，请按照以下步骤操作：\n\n1. 确保 `ConstraintProgram` 已在 Xcode 中加载。\n2. 在项目导航器窗格中点击\
  \ `Main.storyboard` 文件。\n3. 点击该按钮。按钮与窗口右、左和下边缘之间应有三个约束。此外，按钮下方应有一个尺寸约束。\n4. 在按钮右侧放置一个文本字段。\n\
  5. 将鼠标指针移到文本字段上，按住 Control 键并拖动鼠标，直到鼠标指针出现在按钮上方，如图 20-16 所示。\n\n   ![A437923_1_En_20_Fig16_HTML.jpg](img/A437923_1_En_20_Fig16_HTML.jpg)\n\
  \n   图 20-16. 在用户界面元素之间定义约束\n6. 松开 Control 键和鼠标左键。将出现一个弹出菜单，如图 20-17 所示。\n\n   ![A437923_1_En_20_Fig17_HTML.jpg](img/A437923_1_En_20_Fig17_HTML.jpg)\n\
  \n   图 20-17. 在用户界面元素之间选择约束\n7. 选择“水平间距”选项。Xcode 在按钮和文本字段之间显示一个约束。注意，Xcode 会在文本字段周围显示红色边框，因为没有足够的约束来定义文本字段在窗口中的位置。您可以手动添加更多约束，但也可以让\
  \ Xcode 自动添加约束。唯一的缺点是 Xcode 并不总能猜测到您需要的正确约束。\n8. 确保文本字段仍处于选中状态，然后选择“编辑器” ➤ “解决自动布局问题”\
  \ ➤ 子菜单上半部分的“添加缺少的约束”，如图 20-18 所示。（如果您选择子菜单下半部分的“添加缺少的约束”，Xcode 将向用户界面上当前的所有元素添加约束。）Xcode\
  \ 会添加额外的约束并移除文本字段周围的红色边框。\n\n   ![A437923_1_En_20_Fig18_HTML.jpg](img/A437923_1_En_20_Fig18_HTML.jpg)\n\
  \n   图 20-18. Xcode 可以自动添加约束\n9. 选择“产品” ➤ “运行”。您的用户界面将出现。注意，当您调整窗口大小时，文本字段总是会移动以保持与按钮的固定距离。\n\
  10. 选择 `ConstraintProgram` ➤ 退出 `ConstraintProgram`。\n\n**注意**\n\n如果您选择“编辑器” ➤ “解决自动布局问题”\
  \ ➤ “重置为建议的约束”，Xcode 将自动向当前选中的用户界面元素添加所有必要的约束（如果您选择子菜单上半部分的“重置为建议的约束”），或者向所有用户界面元素添加约束（如果您选择子菜单下半部分的“重置为建议的约束”）。\n\
  \n### 删除约束\n\n定义约束通常是一个反复试验的过程，直到获得您想要的结果。如果您定义的约束无法按预期工作，您可以随时删除该约束。要删除单个约束，您有两种选择：\n\
  \n- 点击用户界面上的约束，然后按退格键。\n- 点击尺寸检查器窗格中的约束，然后按退格键。\n\n如果您想删除单个用户界面元素（如按钮或文本字段）上的所有约束，请按照以下步骤操作：\n\
  \n1. 点击包含要删除约束的用户界面元素。\n2. 选择“编辑器” ➤ “解决自动布局问题” ➤ “清除约束”（在子菜单的上半部分）。\n\n如果您想删除用户界面上所有元素的约束，请按照以下步骤操作：\n\
  \n1. 点击包含要删除约束的用户界面元素。\n2. 选择“编辑器” ➤ “解决自动布局问题” ➤ “清除约束”（在子菜单的下半部分）。\n\n\n\n###\
  \ 摘要\n\n约束确保无论用户如何调整程序窗口大小，您的用户界面都能保持良好的外观。您可以定义三种类型的约束：\n\n*   从用户界面项到窗口边缘\n* \
  \  定义用户界面项高度和/或宽度的尺寸约束\n*   在两个用户界面项之间\n\n当使用多个约束时，您可以分配一个固定值，或者一个大于或小于的比较值。您还可以为约束分配优先级，以便当两个或多个约束冲突时，优先级较高的约束会优先被使用。\n\
  \n`Xcode`可以自动添加约束，但它们可能并非总是正常工作，因此请准备好尝试不同的约束，直到您的用户界面按照您期望的方式运行。\n\n"
- "# 21. 使用警报和面板\n\n在每个程序中，您都可以设计程序的独特功能，同时让 `Cocoa`框架负责使您的程序看起来像标准的 `macOS`程序并具有标准行为。为了创建几乎所有\
  \ `macOS`程序的通用功能，您可以使用警报和面板。\n\n警报通常会弹出在屏幕上以通知用户，例如要求用户确认删除文件或提醒用户出现问题。面板显示通用的用户界面项，例如\
  \ `macOS`程序通常显示的打印面板，用于提供打印选项，或用于选择文件的面板。\n\n通过使用警报和面板，您可以添加常见的 `macOS`用户界面元素，而无需创建自己的用户界面或编写\
  \ `Swift`代码。警报和面板是 `Cocoa`框架的一部分，您的 `macOS`程序可以使用它们来创建标准的 `macOS`用户界面。\n\n## 使用警报\n\
  \n警报基于 `Cocoa`框架中的 `NSAlert`类。在最简单的层面上，您可以用两行 `Swift`代码创建一个警报：\n\n```\nlet myAlert\
  \ = NSAlert()\nmyAlert.runModal()\n```\n\n第一行声明了一个名为`myAlert`的对象，它基于`NSAlert`类。然后第二行使用`runModal()`方法来显示警报。当警报出现时，它被认为是模态的，这意味着警报在用户解除它之前不会让用户执行任何操作。\n\
  \n上面的两行代码创建了一个通用警报，它显示一个“好”按钮、一个通用图形图像和一个通用文本消息，如图 21-1 所示。\n\n![A437923_1_En_21_Fig1_HTML.jpg](img/A437923_1_En_21_Fig1_HTML.jpg)\n\
  \n**图 21-1.** 创建一个通用警报\n\n要自定义警报，您可以修改以下属性：\n\n*   `messageText`：以粗体显示主要警报消息。在图\
  \ 21-1 中，“警告”是`messageText`。\n*   `informativeText`：直接在`messageText`下方显示非粗体文本。在图\
  \ 21-1 中，没有`informativeText`。\n*   `icon`：显示一个图标。默认情况下，该图标是程序的图标。\n*   `alertStyle`：当设置为`NSAlertStyle.critical`时显示关键图标。否则，它显示默认的警报图标。\n\
  *   `showsSuppressionButton`：显示一个复选框，默认文本为“不再显示此消息”，除非定义了`suppressionButton?.title`属性。\n\
  *   `suppressionButton?.title`：将复选框的默认文本（“不再显示此消息”）替换为自定义文本。\n\n要了解如何自定义警报，请按照以下步骤操作：\n\
  \n1.  在 `Xcode`中选择文件 ➤ 新建 ➤ 项目。\n2.  在 `macOS`类别下单击应用程序。\n3.  单击 `Cocoa`应用程序，然后单击“下一步”按钮。`Xcode`现在会要求输入产品名称。\n\
  4.  单击“产品名称”文本字段，然后输入 `AlertProgram`。\n5.  确保语言弹出菜单显示 `Swift`，并且“使用故事板”复选框被选中。\n\
  6.  单击“下一步”按钮。`Xcode`会询问您想要将项目存储在哪里。\n7.  选择一个文件夹来存储您的项目，然后单击“创建”按钮。\n8.  在项目导航器中单击`Main.storyboard`文件。您的程序用户界面会出现。\n\
  9.  选择视图 ➤ 工具 ➤ 显示对象库。对象库出现在 `Xcode`窗口的右下角。\n10. 将一个按钮拖到用户界面窗口上。\n11. 选择视图 ➤ 助理编辑器\
  \ ➤ 显示助理编辑器。`ViewController.swift`文件会出现在用户界面旁边。\n12. 将鼠标指针移到按钮上，按住 `Control`键，然后将鼠标拖到`ViewController.swift`文件底部最后一个花括号上方。\n\
  13. 松开 `Control`键和鼠标按钮。会出现一个弹出窗口。\n14. 单击“连接”弹出菜单，然后选择操作。\n15. 单击“名称”文本字段，然后输入 `showAlert`。\n\
  16. 单击“类型”弹出菜单，选择 `NSButton`，然后单击“连接”按钮。`Xcode`会创建一个空的 `IBAction`方法。\n17. 修改 `IBAction`方法如下：\n\
  \n    ```\n    @IBAction func showAlert(_ sender: NSButton) {\n        let myAlert\
  \ = NSAlert()\n        myAlert.messageText = \"Warning!\"\n        myAlert.informativeText\
  \ = \"Zombies approaching\"\n        myAlert.alertStyle = NSAlertStyle.critical\n\
  \        myAlert.showsSuppressionButton = true\n        myAlert.suppressionButton?.title\
  \ = \"Stop scaring me\"\n        myAlert.runModal()\n    }\n    ```\n\n18. 选择产品\
  \ ➤ 运行。您的用户界面会出现。\n19. 单击按钮。会出现一个警报，如图 21-2 所示。\n\n    ![A437923_1_En_21_Fig2_HTML.jpg](img/A437923_1_En_21_Fig2_HTML.jpg)\n\
  \n    **图 21-2.** 显示自定义警报\n20. 单击警报上的“好”按钮关闭它。\n21. 选择 `AlertProgram` ➤ 退出 `AlertProgram`。\n\
  \n\n\n### 从警告框中获取反馈\n\n警告框通常只显示一个“确定”按钮，供用户关闭对话框。然而，警告框可以通过以下两种方式之一从用户处获取反馈：\n\n\
  -   选中“不再提示”复选框\n-   点击“确定”按钮之外的按钮\n\n要判断用户是否勾选了“不再提示”复选框，你需要访问 `suppressionButton!.state`\
  \ 属性。如果复选框被选中，`suppressionButton!.state` 属性的值为 1；如果复选框未被选中，则该属性值为 0。\n\n从警告框获取反馈的第二种方式是显示两个或更多按钮。要向警告框添加更多按钮，你需要使用\
  \ `addButton` 方法。然后，要确定用户点击了哪个按钮，你需要使用 `NSAlertFirstButtonReturn`、`NSAlertSecondButtonReturn`\
  \ 或 `NSAlertThirdButtonReturn` 这些常量。\n\n如果你在警告框上有四个或更多按钮，你可以通过 `NSAlertThirdButtonReturn\
  \ + 1` 检测第四个按钮，通过 `NSAlertThirdButtonReturn + 2` 检测第五个按钮，以此类推。\n\n要了解如何识别用户在警告框中选择了哪个选项，请遵循以下步骤：\n\
  \n1.  确保你的 `AlertProgram` 项目已在 Xcode 中加载。\n2.  在项目导航窗格中点击 `ViewController.swift`\
  \ 文件。\n3.  按如下方式修改 IBAction `showAlert` 方法：\n\n    ```\n    @IBAction func showAlert(_\
  \ sender: NSButton) {\n        let myAlert = NSAlert()\n        myAlert.messageText\
  \ = \"Warning!\"\n        myAlert.informativeText = \"Zombies approaching\"\n  \
  \      myAlert.alertStyle = NSAlertStyle.critical\n        myAlert.showsSuppressionButton\
  \ = true\n        myAlert.suppressionButton?.title = \"Stop scaring me\"\n     \
  \   myAlert.addButton(withTitle: \"Ignore it\")\n        myAlert.addButton(withTitle:\
  \ \"Run\")\n        myAlert.addButton(withTitle: \"Panic\")\n        myAlert.addButton(withTitle:\
  \ \"Do nothing\")\n        let choice = myAlert.runModal()\n        switch choice\
  \ {\n        case NSAlertFirstButtonReturn:\n            print (\"User clicked Ignore\
  \ it\")\n        case NSAlertSecondButtonReturn:\n            print (\"User clicked\
  \ Run\")\n        case NSAlertThirdButtonReturn:\n            print (\"User clicked\
  \ Panic\")\n        case NSAlertThirdButtonReturn + 1:\n            print (\"User\
  \ clicked Do nothing\")\n        default: break\n        }\n        if myAlert.suppressionButton!.state\
  \ == 1 {\n            print (\"Checked\")\n        } else {\n            print (\"\
  Not checked\")\n        }\n    }\n    ```\n\n    `addButton` 方法在警告框上创建按钮，其中第一个 `addButton`\
  \ 方法创建默认按钮，其余方法创建附加按钮。为了捕获用户点击的按钮，上述代码创建了一个名为“choice”的常量。然后，它使用一个 switch 语句来识别用户点击的是哪个按钮。请注意，第四个按钮是通过将\
  \ `NSAlertThirdButtonReturn` 常量加 1 来识别的。`suppressionButton!.state` 属性用于检查用户是否选中了警告框上显示的复选框。如果其值为\
  \ 1，则表示用户选中了复选框；否则，如果值为 0，则表示未选中。\n\n4.  选择 **Product** ➤ **Run**。你的用户界面将出现。\n5.\
  \  点击该按钮。警告框将出现，如图 21-3 所示。\n\n    ![A437923_1_En_21_Fig3_HTML.jpg](img/A437923_1_En_21_Fig3_HTML.jpg)\n\
  \n    **图 21-3.** 由 Swift 代码创建的警告框\n\n6.  点击“Stop scaring me”复选框以将其选中。\n7.  点击其中一个按钮，例如\
  \ Panic 或 Run。无论你点击哪个按钮，警告框都会消失。\n8.  选择 **AlertProgram** ➤ **Quit AlertProgram**。Xcode\
  \ 将再次出现，并在调试区域显示文本，例如“User clicked Panic”和“Checked”。\n\n### 以工作表形式显示警告框\n\n警告框通常显示为一个模态对话框，它会创建一个可以独立于主程序窗口移动的新窗口。另一种显示警告框的方式是作为工作表，从当前活动窗口的标题栏向下展开。\n\
  \n要使警告框显示为工作表，你需要使用 `beginSheetModalForWindow` 方法，如下所示：\n\n```\nalertObject.beginSheetModal(for:\
  \ window, completionHandler: closure)\n```\n\n第一个参数定义了你希望工作表出现的窗口。在 `AlertProgram`\
  \ 项目中，代表用户界面窗口的 IBOutlet 被称为 `window`。第二个参数是完成处理器标签，它标识了一个名为闭包的特殊函数的名称。\n\n闭包代表了一种编写函数的简写方式。你不是用传统方式编写函数，例如：\n\
  \n```\nfunc functionName(parameters) -> Type {\n    // Insert code here\n    return\
  \ value\n}\n```\n\n你可以像这样编写一个闭包：\n\n```\nlet closureName = { (parameters) -> Type\
  \ in\n    // Insert code here\n}\n```\n\n要了解如何将警告框转换为工作表并使用闭包，请遵循以下步骤：\n\n1.  确保你的\
  \ `AlertProgram` 项目已在 Xcode 中加载。\n2.  在项目导航窗格中点击 `ViewController.swift` 文件。\n3.\
  \  按如下方式修改 IBAction `showAlert` 方法：\n\n    ```\n    @IBAction func showAlert(_ sender:\
  \ NSButton) {\n        let myAlert = NSAlert()\n        myAlert.messageText = \"\
  Warning!\"\n        myAlert.informativeText = \"Zombies approaching\"\n        myAlert.alertStyle\
  \ = NSAlertStyle.critical\n        myAlert.showsSuppressionButton = true\n     \
  \   myAlert.suppressionButton?.title = \"Stop scaring me\"\n        myAlert.addButton(withTitle:\
  \ \"Ignore it\")\n        myAlert.addButton(withTitle: \"Run\")\n        myAlert.addButton(withTitle:\
  \ \"Panic\")\n        myAlert.addButton(withTitle: \"Do nothing\")\n        let\
  \ myCode = { (choice:NSModalResponse) -> Void in\n            switch choice {\n\
  \            case NSAlertFirstButtonReturn:\n                print (\"User clicked\
  \ Ignore it\")\n            case NSAlertSecondButtonReturn:\n                print\
  \ (\"User clicked Run\")\n            case NSAlertThirdButtonReturn:\n         \
  \       print (\"User clicked Panic\")\n            case NSAlertThirdButtonReturn\
  \ + 1:\n                print (\"User clicked Do nothing\")\n            default:\
  \ break\n            }\n            if myAlert.suppressionButton!.state == 1 {\n\
  \                print (\"Checked\")\n            } else {\n                print\
  \ (\"Not checked\")\n            }\n        }\n        myAlert.beginSheetModal(for:\
  \ NSApp.keyWindow!, completionHandler: myCode)\n    }\n    ```\n\n4.  选择 **Product**\
  \ ➤ **Run**。用户界面将出现。\n5.  点击按钮。注意，现在警告框会作为工作表下拉显示，如图 21-4 所示。\n\n    ![A437923_1_En_21_Fig4_HTML.jpg](img/A437923_1_En_21_Fig4_HTML.jpg)\n\
  \n    **图 21-4.** 作为工作表的警告框\n\n6.  点击“Stop scaring me”复选框以将其选中。\n7.  点击其中一个按钮，例如\
  \ Panic 或 Run。无论你点击哪个按钮，警告框都会消失。\n8.  选择 **AlertProgram** ➤ **Quit AlertProgram**。Xcode\
  \ 将再次出现，并在调试区域显示文本，例如“User clicked Run”和“Checked”。\n\n在上述 Swift 代码中，闭包定义如下：\n\n\
  ```\nlet myCode = { (choice:NSModalResponse) -> Void in\n    switch choice {\n \
  \   case NSAlertFirstButtonReturn:\n        print (\"User clicked Ignore it\")\n\
  \    case NSAlertSecondButtonReturn:\n        print (\"User clicked Run\")\n   \
  \ case NSAlertThirdButtonReturn:\n        print (\"User clicked Panic\")\n    case\
  \ NSAlertThirdButtonReturn + 1:\n        print (\"User clicked Do nothing\")\n \
  \   default: break\n    }\n    if myAlert.suppressionButton!.state == 1 {\n    \
  \    print (\"Checked\")\n    } else {\n        print (\"Not checked\")\n    }\n\
  }\n```\n\n不过，你同样可以将闭包内联放置，这意味着不再由完成处理器标识闭包的名称，而是直接将闭包本身放在该位置。因此，在以上代码中，`beginSheetModal`\
  \ 方法通过名称调用闭包，如下所示：\n\n```\nmyAlert.beginSheetModal(for: NSApp.keyWindow!, completionHandler:\
  \ myCode)\n```\n\n你可以将闭包名 `myCode` 替换为实际的闭包代码。\n\n\n\n```swift\nmyAlert.beginSheetModal(for:\
  \ NSApp.keyWindow!, completionHandler: {(choice:NSModalResponse) -> Void in\n  \
  \  switch choice {\n    case NSAlertFirstButtonReturn:\n        print (\"用户点击了“忽略”\"\
  )\n    case NSAlertSecondButtonReturn:\n        print (\"用户点击了“运行”\")\n    case\
  \ NSAlertThirdButtonReturn:\n        print (\"用户点击了“恐慌”\")\n    case NSAlertThirdButtonReturn\
  \ + 1:\n        print (\"用户点击了“不做任何事”\")\n    default: break\n    }\n    if myAlert.suppressionButton!.state\
  \ == 1 {\n        print (\"已勾选\")\n    } else {\n        print (\"未勾选\")\n    }\n\
  })\n```\n\n将闭包直接内联放在方法中可以缩短代码量，但代价是可能降低整体代码的可读性。通过名称分离闭包并按名称调用，可以更方便地在程序其他位置重复使用该闭包，同时也能让代码更清晰，但代价是你需要编写更多代码。\n\
  \n请选择你最喜欢的方式，但正如编程的所有方面一样，保持一致的风格，这样即使日后你不在场解释代码，其他程序员也能轻松理解。\n\n## 使用面板\n\n面板代表\
  \ macOS 程序所需的常见用户界面元素，例如显示“打开”面板，让用户选择要打开的文件；以及“保存”面板，让用户选择存储文件的文件夹。“打开”面板基于 `NSOpenPanel`\
  \ 类，而“保存”面板基于 `NSSavePanel` 类。\n\n### 创建打开面板\n\n“打开”面板让用户选择一个要打开的文件。如果用户选择了文件，该面板需要返回一个文件名。“打开”面板使用的一些属性包括：\n\
  \n*   `canChooseFiles`：允许用户选择文件。\n*   `canChooseDirectories`：允许用户选择文件夹或目录。\n*  \
  \ `allowsMultipleSelection`：允许用户选择多个项目。\n*   `urls`：保存所选项目的名称。如果 `allowsMultipleSelection`\
  \ 属性设置为 `true`，那么 `urls` 属性保存一个项目数组；否则，它只保存单个项目。\n\n要了解如何使用“打开”面板，请按照以下步骤操作：\n\n\
  1.  在 Xcode 中，选择“文件” ➤ “新建” ➤ “项目”。\n2.  在 macOS 类别下单击“应用程序”。\n3.  单击“Cocoa 应用程序”，然后单击“下一步”按钮。Xcode\
  \ 会要求输入产品名称。\n4.  在“产品名称”文本字段中单击，然后输入 `PanelProgram`。\n5.  确保“语言”弹出菜单显示 Swift，并且“使用\
  \ Storyboard”复选框已勾选。\n6.  单击“下一步”按钮。Xcode 会询问你想将项目存储在哪里。\n7.  选择一个文件夹来存储项目，然后单击“创建”按钮。\n\
  8.  在项目导航器中单击 `Main.storyboard` 文件。程序的用户界面会显示出来。\n9.  选择“视图” ➤ “工具” ➤ “显示对象库”。对象库会出现在\
  \ Xcode 窗口的右下角。\n10. 将一个“按钮”拖放到用户界面窗口上，然后双击它，将其标题更改为 `打开`。\n11. 选择“视图” ➤ “助理编辑器”\
  \ ➤ “显示助理编辑器”。`ViewController.swift` 文件会出现在用户界面旁边。\n12. 将鼠标指针移到“按钮”上，按住 Control\
  \ 键，然后将鼠标拖到 `ViewController.swift` 文件底部最后一个花括号的上方。\n13. 释放 Control 键和鼠标按钮。会弹出一个窗口。\n\
  14. 在“连接”弹出菜单中单击，并选择“操作”。\n15. 在“名称”文本字段中单击，然后输入 `openPanel`。\n16. 在“类型”弹出菜单中单击，选择\
  \ `NSButton`，然后单击“连接”按钮。Xcode 会创建一个空的 `IBAction` 方法。\n17. 按如下方式修改 `IBAction` 方法：\n\
  \n    ```swift\n    @IBAction func openPanel(_ sender: NSButton) {\n        let\
  \ myOpen = NSOpenPanel()\n        myOpen.canChooseFiles = true\n        myOpen.canChooseDirectories\
  \ = true\n        myOpen.allowsMultipleSelection = true\n        myOpen.begin {\
  \ (result) -> Void in\n            if result == NSFileHandlingPanelOKButton {\n\
  \                print (myOpen.urls)\n            }\n        }\n    }\n    ```\n\
  \n18. 选择“产品” ➤ “运行”。用户界面会显示出来。\n19. 单击该按钮。会出现一个“打开”面板，如图 21-5 所示。\n\n    ![A437923_1_En_21_Fig5_HTML.jpg](img/A437923_1_En_21_Fig5_HTML.jpg)\n\
  \n    图 21-5. 打开面板\n\n20. 按住 Command 键，然后点击两个不同的项目，例如两个不同的文件，或者一个文件和一个文件夹。\n21.\
  \ 单击“打开”按钮。\n22. 选择“PanelProgram” ➤ “退出 PanelProgram”。Xcode 会再次出现。在调试区域中，你应该会看到你所选文件/文件夹的列表。\n\
  \n**注意：** “打开”面板只负责选择文件/文件夹，你仍然需要编写 Swift 代码来实际打开用户选择的任何文件。\n\n### 创建保存面板\n\n“保存”面板看起来和“打开”面板类似，但其目的是让用户选择一个文件夹并定义一个文件名来保存文件。如果用户选择了文件，该面板需要返回一个文件名。“保存”面板使用的一些属性包括：\n\
  \n*   `title`：在“保存”面板顶部显示文本。如果未定义，默认显示“保存”。\n*   `prompt`：在默认按钮上显示文本。\n*   `url`：保存用户所选内容的路径名和文件名。\n\
  *   `nameFieldStringValue`：仅保存用户选择的文件名。\n\n要了解如何使用“保存”面板，请按照以下步骤操作：\n\n1.  确保在 Xcode\
  \ 中加载了 `PanelProgram` 项目。\n2.  在项目导航器窗格中单击 `Main.storyboard` 文件。\n3.  将一个“按钮”拖放到用户界面上，然后双击它，将其标题更改为\
  \ `保存`。\n4.  选择“视图” ➤ “助理编辑器” ➤ “显示助理编辑器”。Xcode 会在用户界面旁边显示 `ViewController.swift`\
  \ 文件。\n5.  将鼠标指针移到“保存”按钮上，按住 Control 键，然后将鼠标拖到 `ViewController.swift` 文件中 `IBOutlet`\
  \ 行的下方。\n6.  释放 Control 键和鼠标。会弹出一个窗口。\n7.  在“连接”弹出菜单中单击，并选择“操作”。\n8.  在“名称”文本字段中单击，输入\
  \ `savePanel`，然后单击“连接”按钮。\n9.  在“类型”弹出菜单中单击，选择 `NSButton`。然后单击“连接”按钮。Xcode 会创建一个空的\
  \ `IBAction` 方法。\n10. 按如下方式修改这个 `IBAction` 方法：\n\n    ```swift\n    @IBAction func\
  \ savePanel(_ sender: NSButton) {\n        let mySave = NSSavePanel()\n        mySave.title\
  \ = \"在此处保存文件\"\n        mySave.prompt = \"保存我\"\n        mySave.begin { (result)\
  \ -> Void in\n            if result == NSFileHandlingPanelOKButton {\n         \
  \       print (mySave.url!)\n                print (mySave.nameFieldStringValue)\n\
  \            }\n        }\n    }\n    ```\n\n11. 选择“产品” ➤ “运行”。用户界面会显示出来。\n12. 单击“保存”按钮。会出现一个“保存”面板，如图\
  \ 21-6 所示。请注意，`title` 属性创建了出现在“保存”面板顶部的文本，而 `prompt` 属性则创建了出现在“保存”面板右下角默认按钮上的文本。\n\
  \n    ![A437923_1_En_21_Fig6_HTML.jpg](img/A437923_1_En_21_Fig6_HTML.jpg)\n\n  \
  \  图 21-6. 紧凑型保存面板\n\n13. 单击“另存为”文本字段最右侧出现的“展开”按钮。“保存”面板会展开，如图 21-7 所示。\n\n    ![A437923_1_En_21_Fig7_HTML.jpg](img/A437923_1_En_21_Fig7_HTML.jpg)\n\
  \n    图 21-7. 展开后的保存面板\n\n14. 在“另存为”文本字段中单击，然后输入 `TestFile`。\n15. 单击“保存我”按钮。\n16.\
  \ 选择“PanelProgram” ➤ “退出 PanelProgram”。Xcode 窗口会再次出现。在 Xcode 窗口底部的调试区域中，你应该能看到所选文件和文件夹的完整路径名，以及你输入的文件名。\n\
  \n\n\n### 创建颜色面板\n\n颜色面板用于显示不同的颜色选项，以便用户选择不同的颜色。颜色面板需要返回用户选择的颜色。颜色面板使用的一些属性包括：\n\
  \n- `activate`：显示颜色面板\n- `action`：定义打开颜色面板时要运行的函数\n- `color`：以 `NSColor` 类的形式存储用户选择的颜色值\n\
  \n要学习如何使用颜色面板，请遵循以下步骤：\n\n1.  在 Xcode 中，选择**文件 ➤ 新建 ➤ 项目**。\n2.  在 **macOS** 类别下，点击**应用程序**。\n\
  3.  点击**Cocoa 应用程序**，然后点击**下一步**按钮。Xcode 会要求你输入产品名称。\n4.  在**产品名称**文本框中点击，然后输入 `ColorPanelProgram`。\n\
  5.  确保**语言**弹出菜单显示为 **Swift**，并且“使用故事板”复选框已被选中。\n6.  点击**下一步**按钮。Xcode 会询问你想在哪里存储项目。\n\
  7.  选择一个文件夹来存储你的项目，然后点击**创建**按钮。\n8.  在项目导航器中点击 `Main.storyboard` 文件。你程序的用户界面将会出现。\n\
  9.  选择**视图 ➤ 工具 ➤ 显示对象库**。对象库会出现在 Xcode 窗口的右下角。\n10. 将一个按钮拖拽到用户界面窗口中，并双击它，将其标题更改为**颜色**。\n\
  11. 将一个标签拖拽到用户界面窗口中，并双击它，将其显示的文本更改为**你选择了此颜色**，如图 21-8 所示。\n\n    ![A437923_1_En_21_Fig8_HTML.jpg](img/A437923_1_En_21_Fig8_HTML.jpg)\n\
  \n    **图 21-8.** ColorPanelProgram 的用户界面\n\n12. 选择**视图 ➤ 助理编辑器 ➤ 显示助理编辑器**。`ViewController.swift`\
  \ 文件会出现在你的用户界面旁边。\n13. 将鼠标指针移动到标签上，按住 **Control** 键，然后将鼠标拖拽到 `ViewController.swift`\
  \ 文件中最后一行的 `class ViewController` 代码下方。\n14. 松开 **Control** 键和鼠标按钮。会弹出一个窗口。\n15.\
  \ 在**名称**文本框中点击，输入 `myLabel`，然后点击**连接**按钮。Xcode 会创建一个 `IBOutlet`，如下所示：\n\n    ```\n\
  \    @IBOutlet weak var myLabel: NSTextField!\n    ```\n\n16. 在此 `IBOutlet` 下方，输入以下代码：\n\
  \n    ```\n    let colorPanel = NSColorWell()\n    ```\n\n17. 将鼠标指针移动到按钮上，按住 **Control**\
  \ 键，然后将鼠标拖拽到 `ViewController.swift` 文件底部最后一个花括号的上方。\n18. 松开 **Control** 键和鼠标按钮。会弹出一个窗口。\n\
  19. 在**连接**弹出菜单中点击，并选择**动作**。\n20. 在**名称**文本框中点击，然后输入 `chooseColor`。\n21. 在**类型**弹出菜单中点击，选择\
  \ `NSButton`，然后点击**连接**按钮。Xcode 会创建一个空的 `IBAction` 方法。\n22. 修改此 `IBAction` 方法，如下所示：\n\
  \n    ```\n    @IBAction func chooseColor(_ sender: NSButton) {\n        colorPanel.activate(true)\n\
  \        colorPanel.action = #selector(changeColor(_:))\n    }\n    ```\n\n    `activate`\
  \ 命令用于显示颜色面板，`#selector` 命令用于运行 `changeColor` 函数，你需要创建这个函数。\n\n23. 在此 `IBAction`\
  \ 方法上方，输入以下函数：\n\n    ```\n    override func changeColor(_ sender: Any?) {\n   \
  \     myLabel.textColor = colorPanel.color\n    }\n    ```\n\n    这个 `changeColor`\
  \ 函数的作用是，获取用户在颜色面板中选择的任何颜色，并将其赋值给标签的文本颜色。\n\n24. 选择**产品 ➤ 运行**。用户界面将会出现。\n25. 在你程序的用户界面上点击**颜色**按钮。会显示一个颜色面板，如图\
  \ 21-9 所示。\n\n    ![A437923_1_En_21_Fig9_HTML.jpg](img/A437923_1_En_21_Fig9_HTML.jpg)\n\
  \n    **图 21-9.** 颜色面板\n\n26. 点击一种颜色。请注意，每次你点击一种颜色时，标签中文本的颜色都会随之改变。\n27. 选择**ColorPanelProgram\
  \ ➤ 退出 ColorPanelProgram**。\n\n### 总结\n\n在设计标准的 macOS 用户界面时，你不必事事都亲力亲为。通过利用 Cocoa\
  \ 框架，你可以创建外观和行为与其他 macOS 程序相一致的警报和面板，而无需自己编写大量额外的代码。\n\n警报让你可以向用户显示简短的消息，例如警告。你可以使用文本和图形自定义警报，并在警报上放置两个或更多按钮。如果你在警报上放置了两个或更多按钮，则需要编写\
  \ Swift 代码来识别用户点击了哪个按钮。\n\n警报通常显示为一个独立的窗口，但你也可以让它以从窗口标题栏向下弹出的表单形式出现。\n\n面板显示常用的用户界面元素，例如用于选择要打开文件的“打开”面板，以及用于选择保存数据的文件夹和文件名的“保存”面板。“打开”和“保存”面板是\
  \ Cocoa 框架的一部分，但你还需要编写额外的 Swift 代码，才能使“打开”和“保存”面板实际打开文件或将文件保存到硬盘。\n\n颜色面板让用户选择不同的颜色。要获取用户选择的颜色，请使用\
  \ `NSColorWell` 类的 `color` 属性。\n\n警报和面板让你只需编写很少的额外代码就能创建标准的 macOS 用户界面元素。通过使用 Cocoa\
  \ 框架的这些特性，你可以创建运行稳定、行为符合用户对 macOS 程序预期的标准 macOS 程序。\n\n"
- "# 22. 创建下拉菜单\n\n下拉菜单是与 macOS 程序进行交互的标准方式。虽然你的程序可能会使用按钮来表示命令，但过多的按钮会使屏幕显得杂乱。为了避免在屏幕上塞入过多按钮，你可以将相关的命令分组到多个下拉菜单中。默认情况下，Xcode\
  \ 创建的每个 macOS 项目都包含以下下拉菜单标题：\n\n-   **文件**：显示用于打开、保存、创建和打印的命令。\n-   **编辑**：显示用于复制、剪切、粘贴、撤销和重做命令的命令。\n\
  -   **格式**：显示用于修改文本或图形的命令，例如更改字体。\n-   **视图**：显示用于更改数据在窗口中显示方式的命令，例如放大和缩小，或显示其他用户界面项目（如工具栏）。\n\
  -   **窗口**：显示用于操作文档窗口的命令，例如在多个打开的窗口之间切换。\n-   **帮助**：显示用于获取程序使用帮助的命令。\n\n虽然 Xcode\
  \ 可以为你创建下拉菜单标题，但你还是需要编写 Swift 代码才能让它们真正起作用。除了使用标准的下拉菜单标题，你还可以添加自己的菜单标题或删除现有的标题。为了组织下拉菜单内的命令，你可以使用水平线将相似命令分组，或者将它们存储在子菜单中。为了方便用户，你还可以为命令分配键盘快捷键。\n\
  \n下拉菜单是用户控制程序的标准方式。通过为你自己的程序创建下拉菜单，你可以创建熟悉的用户界面，以便他人可以在几乎不需要额外培训的情况下，快速学习和使用你的程序。\n\
  \n\n\n## 编辑下拉菜单\n\n每次创建 Cocoa 应用程序项目时，Xcode 都会创建一个包含常见菜单标题和命令的默认下拉菜单。无需编写一行 Swift\
  \ 代码，其中许多命令就已经可以正常工作了。例如，应用程序菜单（即你的程序名称，如 `MenuProgram`）下的“退出”命令知道如何退出程序，而“窗口”菜单标题下的“缩放”和“最小化”命令知道如何缩放和最小化用户界面窗口。\n\
  \n在大多数情况下，你需要通过编辑现有命令、添加新命令以及删除现有命令来自定义这些下拉菜单。要修改程序的下拉菜单，你有两种选择：\n\n*   直接编辑下拉菜单\n\
  *   打开文档大纲并编辑菜单\n\n要直接编辑下拉菜单，请点击“项目导航器”窗格中的 `.xib` 或 `.storyboard` 文件，然后直接点击程序的下拉菜单，如图\
  \ 22-1 所示。\n\n![A437923_1_En_22_Fig1_HTML.jpg](img/A437923_1_En_22_Fig1_HTML.jpg)\n\
  \n图 22-1. 你可以直接点击程序的下拉菜单来选择单个项目\n\n编辑下拉菜单的第二种方法是点击“显示文档大纲”图标以打开文档大纲，如图 22-2 所示。\n\
  \n![A437923_1_En_22_Fig2_HTML.jpg](img/A437923_1_En_22_Fig2_HTML.jpg)\n\n图 22-2.\
  \ “显示文档大纲”图标\n\n打开文档大纲后，你可以点击展开三角形来查看不同的下拉菜单及其命令，如图 22-3 所示。\n\n![A437923_1_En_22_Fig3_HTML.jpg](img/A437923_1_En_22_Fig3_HTML.jpg)\n\
  \n图 22-3. 在“文档大纲”窗格中查看菜单\n\n要删除某个菜单项，请点击它以将其选中（可以直接点击下拉菜单项，也可以在“文档大纲”窗格中点击该菜单项），然后按退格键或删除键。这可以让你删除单个菜单项或整个菜单标题，例如“文件”或“编辑”下拉菜单标题。\n\
  \n> **注：** 如果你误删了某个菜单项或整个下拉菜单标题，只需选择“编辑”>“撤销”或按 `Command + Z` 即可立即恢复。\n\n要向程序的下拉菜单中添加项目，你有两种选择：\n\
  \n*   向现有的下拉菜单标题（例如“文件”或“编辑”）添加一个新菜单项\n*   添加一个包含自身命令列表的新下拉菜单标题\n\n## 向菜单栏添加新的下拉菜单标题\n\
  \n你既可以直接在下拉菜单上添加菜单项和下拉菜单标题，也可以在文档大纲内部添加。\n\n“对象库”显示了以下你可以添加到程序菜单栏的下拉菜单标题，如图 22-4\
  \ 所示：\n\n![A437923_1_En_22_Fig4_HTML.jpg](img/A437923_1_En_22_Fig4_HTML.jpg)\n\n\
  图 22-4. 你可以添加到程序菜单栏的下拉菜单标题\n\n*   应用程序菜单项：包含应用程序下拉菜单标题中的典型命令，例如“关于”、“偏好设置”和“服务”\n\
  *   文件菜单项：包含文件下拉菜单标题中的典型命令，例如“打开”、“新建”和“保存”\n*   编辑菜单项：包含编辑下拉菜单标题中的典型命令，例如“剪切”、“复制”和“粘贴”\n\
  *   字体菜单项：包含字体下拉菜单标题中的典型命令，例如“粗体”、“更大”和“拷贝样式”\n*   格式菜单项：包含格式下拉菜单标题中的典型命令，例如“字体”和“文本”\n\
  *   文本菜单项：包含文本下拉菜单标题中的典型命令，例如“居中”、“书写方向”和“显示标尺”\n*   查找菜单项：包含查找下拉菜单标题中的典型命令，例如“查找”、“查找和替换”以及“查找下一个”\n\
  *   窗口菜单项：包含窗口下拉菜单标题中的典型命令，例如“最小化”、“置于最前”和“缩放”\n*   帮助菜单项：包含帮助下拉菜单标题中的典型命令，例如“应用程序帮助”\n\
  \n要将下拉菜单标题添加到程序的菜单栏，请遵循以下步骤：\n\n1.  点击“项目导航器”窗格中的 `.xib` 或 `.storyboard` 文件。\n2.\
  \  选择“视图”>“工具”>“显示对象库”，以在 Xcode 窗口的右下角显示对象库。\n3.  从对象库中拖出一个下拉菜单项（见图 22-4），并将鼠标移动到程序的菜单栏上，直到出现一条垂直的蓝线，显示下拉菜单标题将要出现的位置，如图\
  \ 22-5 所示。\n\n   ![A437923_1_En_22_Fig5_HTML.jpg](img/A437923_1_En_22_Fig5_HTML.jpg)\n\
  \n   图 22-5. 向菜单栏添加新的下拉菜单标题\n\n   除了在程序菜单栏上拖动鼠标，你也可以在文档大纲中将鼠标拖到下拉菜单标题之间，直到出现一条水平的蓝线，显示菜单标题将要出现的位置，如图\
  \ 22-6 所示。\n\n   ![A437923_1_En_22_Fig6_HTML.jpg](img/A437923_1_En_22_Fig6_HTML.jpg)\n\
  \n   图 22-6. 使用“文档大纲”向菜单栏添加新的下拉菜单标题\n\n4.  松开鼠标。新的下拉菜单标题就会出现在菜单栏上。\n\n要重新排列下拉菜单标题，请将鼠标指针移到要移动的菜单标题上（在菜单栏上或文档大纲中），然后拖动鼠标将菜单标题移到新位置。\n\
  \n## 向下拉菜单添加新命令\n\n你可以在任何下拉菜单上删除、重新排列和添加命令。要删除命令，只需选中它并按退格键或删除键。要重新排列命令，请将其拖放到新位置。\n\
  \n要向下拉菜单添加新命令，你需要使用对象库中的以下三个项目，如图 22-7 所示：\n\n![A437923_1_En_22_Fig7_HTML.jpg](img/A437923_1_En_22_Fig7_HTML.jpg)\n\
  \n图 22-7. 用于修改下拉菜单命令的三个项目\n\n*   菜单项：表示单个命令\n*   子菜单项：表示一个包含更多命令的子菜单\n*   分隔菜单项：显示一条水平线，用于分隔下拉菜单上的命令\n\
  \n要向下拉菜单添加新命令，请遵循以下步骤：\n\n1.  点击“项目导航器”窗格中的 `.xib` 或 `.storyboard` 文件。\n2.  选择“视图”>“工具”>“显示对象库”，以在\
  \ Xcode 窗口的右下角显示对象库。\n3.  点击你要添加新命令的下拉菜单。你可以直接点击菜单栏上的下拉菜单标题，也可以在文档大纲中点击展开三角形来打开一个下拉菜单标题，如图\
  \ 22-8 所示。\n\n   ![A437923_1_En_22_Fig8_HTML.jpg](img/A437923_1_En_22_Fig8_HTML.jpg)\n\
  \n   图 22-8. 你可以直接在下拉菜单上或通过文档大纲添加新命令\n\n4.  从对象库中拖出一个菜单项（见图 22-7），并将鼠标移入下拉菜单列表，直到出现一条水平的蓝线，显示命令将要出现的位置，如图\
  \ 22-9 所示。\n\n   ![A437923_1_En_22_Fig9_HTML.jpg](img/A437923_1_En_22_Fig9_HTML.jpg)\n\
  \n   图 22-9. 向下拉菜单列表中拖放新命令\n\n5.  松开鼠标。Xcode 会将你的新菜单项添加到下拉菜单中。如果你添加的是子菜单项，现在就可以编辑存储在其子菜单中的命令了。\n\
  \n\n\n## 编辑命令\n\n当你修改了菜单栏上出现的下拉菜单标题，以及每个下拉菜单上出现的命令后，你可能希望使用“检查器”面板进一步编辑每个单独的命令。“检查器”面板可用于修改以下属性：\n\
  \n- **标题**：显示菜单命令的文本\n- **键位等效**：定义命令的键盘快捷键\n\n要编辑命令（或下拉菜单标题），请按照以下步骤操作：\n\n1. 在项目导航器面板中点击`.xib`或`.storyboard`文件。\n\
  2. 在“文档大纲”中或直接在下拉菜单上，点击要编辑的下拉菜单命令（或下拉菜单标题）。\n3. 选择“显示”➤“实用工具”➤“显示属性检查器”。此时会出现“显示属性检查器”面板，如图\
  \ 22-10 所示。\n\n    ![A437923_1_En_22_Fig10_HTML.jpg](img/A437923_1_En_22_Fig10_HTML.jpg)\n\
  \n    图 22-10. 向下拉菜单列表中拖放新命令\n\n4. 点击“检查器”面板中的“标题”文本字段，以编辑命令的文本。\n5. 点击“键位等效”文本字段，然后按下（而非输入）你要分配给该命令的键盘快捷键。确保此键盘快捷键未被其他命令使用（例如“剪切”命令的\
  \ Command + X）。Xcode 将在下拉菜单命令的右侧显示你的键盘快捷键。\n\n## 将菜单命令连接到 Swift 代码\n\n当你修改了下拉菜单标题并用适当的命令填充它们后，最终你需要让这些命令真正执行某些操作。这意味着将你的菜单命令连接到`IBAction`方法，这与将按钮或其他用户界面项目连接到包含\
  \ Swift 代码的文件类似。你可以按住 Control 键，从下拉菜单上的菜单命令或“文档大纲”中显示的菜单命令拖拽。\n\n当你创建一个 Cocoa 应用程序项目时，你会发现许多菜单命令已经可以工作，例如“文件”➤“打印”、“窗口”➤“最小化”以及应用程序名称➤“关于”命令。这些功能由\
  \ Cocoa 框架中的`NSApplication`、`NSWindow`、`NSView`和`NSResponder`类提供。\n\n如果你点击 Cocoa\
  \ 应用程序项目中的某个菜单命令，然后选择“显示”➤“实用工具”➤“显示连接检查器”，你将看到 Xcode 窗口右上角的“连接检查器”面板。\n\n“连接检查器”面板允许你查看所选用户界面项目（如下拉菜单上的命令）连接到了什么，如图\
  \ 22-11 所示。\n\n![A437923_1_En_22_Fig11_HTML.jpg](img/A437923_1_En_22_Fig11_HTML.jpg)\n\
  \n图 22-11. “连接检查器”面板显示了用户界面连接到了哪个`IBAction`方法\n\n在图 22-11 中，“文件”菜单上的“打印”菜单命令连接到了`print:`\
  \ `IBAction`方法，但此`IBAction`方法并不存储在特定文件中。相反，它连接到了一个名为“第一响应者”的对象，该对象由`NSResponder`类定义。\n\
  \n用户界面由多个基于`NSApplication`、`NSWindow`和`NSView`的对象组成，因此“第一响应者”只是指向第一个应响应用户点击用户界面项目（如“文件”菜单上的“打印”命令）的对象。如果这个第一个对象没有`print:`\
  \ `IBAction`方法，它就会在下一个对象中搜索此`IBAction`方法。\n\n因此，如果你在窗口上有一个文本字段并点击“文件”菜单上的“打印”命令，“打印”命令将首先在该文本字段（基于`NSTextField`，而`NSTextField`又基于`NSView`）中查找`print:`\
  \ `IBAction`方法。如果在`NSTextField`类中找不到`print:` `IBAction`方法，它会接着在窗口（基于`NSWindow`）或应用程序本身（基于`NSApplication`）中查找。\n\
  \n如果你点击“第一响应者”图标，然后选择“显示”➤“实用工具”➤“显示连接检查器”，你可以看到“第一响应者”的“连接检查器”面板，该面板标识了所有连接到典型\
  \ Cocoa 应用程序项目默认下拉菜单的`IBAction`方法，如图 22-12 所示。\n\n![A437923_1_En_22_Fig12_HTML.jpg](img/A437923_1_En_22_Fig12_HTML.jpg)\n\
  \n图 22-12. “第一响应者连接检查器”面板列出了所有连接到 Cocoa 应用程序项目默认下拉菜单的`IBAction`方法\n\n> **注意：** 另一种查看“连接检查器”的方法是右键点击“第一响应者”图标，如图\
  \ 22-13 所示。\n\n![A437923_1_En_22_Fig13_HTML.jpg](img/A437923_1_En_22_Fig13_HTML.jpg)\n\
  \n图 22-13. 右键点击“第一响应者”图标会列出所有连接到 Cocoa 应用程序项目默认下拉菜单的`IBAction`方法\n\n尽管 Cocoa 应用程序模板创建了标准下拉菜单和命令，你仍需要编写\
  \ Swift 代码才能使许多命令真正生效。例如，“保存”命令不知道要保存什么或如何保存，“新建”命令不知道要创建哪种类型的文档。\n\n要了解菜单命令如何像其他带有`.xib`文件的用户界面项目一样，与`IBAction`方法协同工作，请按照以下步骤操作：\n\
  \n\n\n从 Xcode 中选择 File ➤ New ➤ Project。  \n点击 macOS 类别下的 Application。  \n点击 Cocoa\
  \ Application，然后点击 Next 按钮。Xcode 会要求输入产品名称。  \n在 Product Name 文本字段中点击并输入 `MenuProgram`。\
  \  \n确保 Language 弹出菜单显示 Swift，并且没有选中任何复选框。本项目将使用 `.xib` 文件作为用户界面。  \n点击 Next 按钮。Xcode\
  \ 会询问项目存储位置。  \n选择一个文件夹来存储项目，然后点击 Create 按钮。  \n在项目导航器中点击 `MainMenu.xib` 文件。  \n\
  在文档大纲中点击 Window 图标，以显示程序的用户界面。  \n选择 View ➤ Utilities ➤ Show Object Library。Object\
  \ Library 会出现在 Xcode 窗口的右下角。  \n将一个文本字段拖拽到用户界面窗口中。你可能需要加宽该文本字段的宽度。  \n将 Object Library\
  \ 中的一个菜单项拖拽到 File 菜单的底部。你可以将该菜单项拖拽到 File 下拉菜单上，或拖拽到文档大纲中，如图 22-14 所示。\n\n![A437923_1_En_22_Fig14_HTML.jpg](img/A437923_1_En_22_Fig14_HTML.jpg)\n\
