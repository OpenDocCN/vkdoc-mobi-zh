  \n`MenuProgram` 项目展示了如何将菜单命令连接到文本字段，以便文本字段显示用户点击的菜单命令的名称。但是，在使用 storyboard 时，连接菜单命令的方式略有不同。\n\
  \n主要区别在于，在 storyboard 中，下拉菜单存储在与实际用户界面不同的场景中，如图 22-17 所示。\n\n![A437923_1_En_22_Fig17_HTML.jpg](img/A437923_1_En_22_Fig17_HTML.jpg)\n\
  \n图 22-17.  \n在 storyboard 中，下拉菜单出现在与用户界面分离的场景中\n\n这意味着，当你对下拉菜单命令进行 Control 拖拽时，Xcode\
  \ 会将你的 Swift 代码存储在 `AppDelegate.swift` 文件中；但如果你对用户界面元素（如文本字段）进行 Control 拖拽，Xcode\
  \ 会将你的 Swift 代码存储在 `ViewController.swift` 文件中。\n\n本质上，这意味着如果你为文本字段创建了一个 `IBOutlet`，它会存储在\
  \ `ViewController.swift` 文件中，而你的下拉菜单命令的 `IBAction` 方法则存储在 `AppDelegate.swift` 文件中，这意味着\
  \ `IBOutlet` 不知道这些 `IBAction` 方法的存在（反之亦然）。\n\n解决这个问题的方法是将你的下拉菜单命令连接到 First Responder\
  \ 图标。这意味着你的程序会首先在其 `AppDelegate.swift` 文件中查找 `IBAction` 方法，然后也会在其他文件中查找相同的 `IBAction`\
  \ 方法。\n\n因此，技巧是在 `AppDelegate.swift` 文件中创建一个空的 `IBAction` 方法，并在 `ViewController.swift`\
  \ 文件中创建一个相同的 `IBAction` 方法，但你需要用 Swift 代码填充这第二个 `IBAction` 方法，以使其能够检索所选菜单命令的标题。\n\
  \n要了解菜单命令如何与 storyboard 配合工作，请按照以下步骤操作：\n\n从 Xcode 中选择 File ➤ New ➤ Project。  \n\
  点击 macOS 类别下的 Application。  \n点击 Cocoa Application，然后点击 Next 按钮。Xcode 会要求输入产品名称。\
  \  \n在 Product Name 文本字段中点击并输入 `StoryMenu`。  \n确保 Language 弹出菜单显示 Swift，并且仅选中“Use\
  \ storyboards”复选框。  \n点击 Next 按钮。Xcode 会询问项目存储位置。  \n选择一个文件夹来存储项目，然后点击 Create 按钮。\
  \  \n在项目导航器中点击 `Main.storyboard` 文件。程序的用户界面会出现。  \n选择 View ➤ Utilities ➤ Show Object\
  \ Library，然后将一个文本字段拖拽到用户界面（由标题栏中的视图控制器标识）上。你可能需要加宽文本字段的宽度。  \n选择 View ➤ Assistant\
  \ Editor ➤ Show Assistant Editor。Xcode 会在用户界面旁边显示 `ViewController.swift` 文件。  \n\
  将鼠标指针移到文本字段上，按住 Control 键，然后将其拖拽到 `class ViewController` 行下方。  \n松开 Control 键和鼠标。会出现一个弹出窗口。\
  \  \n在 Name 文本字段中点击并输入 `textResult`，然后点击 Connect 按钮。Xcode 会创建以下 `IBOutlet`：\n\n\
  ```\n    @IBOutlet weak var textResult: NSTextField!\n```\n\n\n\n14.  点击你程序中的**文件**下拉菜单（不是\
  \ Xcode 的**文件**菜单），显示其完整列表。此时助理编辑器应显示 `AppDelegate.swift` 文件。\n15.  从对象库中拖拽一个菜单项，放到**文件**下拉菜单底部**打印**命令下方。\n\
  16.  将鼠标指针移到你刚刚添加到**文件**下拉菜单底部的新菜单项上，按住 Control 键，然后将鼠标拖到 `AppDelegate.swift` 文件底部最后一个花括号上方。此时会弹出一个窗口。\n\
  17.  点击“连接”弹出菜单，选择**操作**。\n18.  点击“名称”文本字段，输入 `myMenu`。\n19.  点击“类型”弹出菜单，选择 `NSMenuItem`，然后点击**连接**按钮。Xcode\
  \ 会创建一个空的 IBAction 方法。\n20.  选中这个空的 IBAction 方法，然后选择**编辑** ➤ **拷贝**。\n21.  将鼠标指针移到你刚刚添加到**文件**菜单底部的新菜单项上，按住\
  \ Control 键，然后将鼠标拖到**第一响应者**图标上，如图 22-18 所示。\n\n![A437923_1_En_22_Fig18_HTML.jpg](img/A437923_1_En_22_Fig18_HTML.jpg)\n\
  \n**图 22-18.** 将菜单命令连接到第一响应者图标\n\n22.  松开 Control 键和鼠标。此时会弹出一个菜单，如图 22-19 所示。\n\n\
  ![A437923_1_En_22_Fig19_HTML.jpg](img/A437923_1_En_22_Fig19_HTML.jpg)\n\n**图 22-19.**\
  \ 将菜单命令连接到第一响应者图标\n\n23.  点击 `myMenu`。\n24.  将鼠标指针移到你程序中**文件**下拉菜单里的**保存**命令上（不是\
