  \n**图 7-18.** 从顶部文本字段按住 Control 键拖拽到 `AppDelegate.swift` 文件\n\n3. 松开鼠标和 **Control**\
  \ 键。会弹出一个窗口，如图 7-19 所示。\n\n![A437923_1_En_7_Fig19_HTML.jpg](img/A437923_1_En_7_Fig19_HTML.jpg)\n\
  \n**图 7-19.** 用于定义 `IBOutlet` 的弹出窗口\n\n4. 点击 **Name** 文本字段，输入 `IDField`，然后点击 **Connect**\
  \ 按钮。Xcode 会创建一个 `IBOutlet`。\n\n5. 将鼠标移到底部的文本字段上，按住 **Control** 键，将鼠标拖拽到 `AppDelegate.swift`\
  \ 文件中 `@IBOutlet` 行的下方。\n\n6. 松开鼠标和 **Control** 键。会弹出一个窗口。\n\n7. 点击 **Name** 文本字段，输入\
  \ `PasswordField`，然后点击 **Connect** 按钮。Xcode 会创建另一个 `IBOutlet`。你现在应该有两个 `IBOutlets`，分别代表你用户界面上的两个文本字段：\n\
  \n```swift\n@IBOutlet weak var IDField: NSTextField!\n@IBOutlet weak var PasswordField:\
  \ NSTextField!\n```\n\n8. 将鼠标移到 **Check Password** 按钮上，按住 **Control** 键，然后将鼠标拖拽到\
  \ `AppDelegate.swift` 文件中最后一个大括号的上方，如图 7-20 所示。\n\n![A437923_1_En_7_Fig20_HTML.jpg](img/A437923_1_En_7_Fig20_HTML.jpg)\n\
  \n**图 7-20.** 从按钮按住 Control 键拖拽到 `AppDelegate.swift` 文件\n\n9. 松开鼠标和 **Control**\
  \ 键。会弹出一个窗口。\n\n10. 点击 **Connection** 弹出菜单，选择 **Action** 以创建一个 `IBAction` 方法。\n\n\
  11. 点击 **Name** 文本字段，输入 `checkPassword`。\n\n12. 点击 **Type** 弹出菜单，选择 `NSButton`，如图\
  \ 7-21 所示。\n\n![A437923_1_En_7_Fig21_HTML.jpg](img/A437923_1_En_7_Fig21_HTML.jpg)\n\
  \n**图 7-21.** 定义一个 `IBAction` 方法\n\n13. 点击 **Connect** 按钮。Xcode 会创建一个空的 `IBAction`\
  \ 方法。\n\n14. 按如下方式修改 `IBAction` `checkPassword` 方法：\n\n```swift\n@IBAction func\
  \ checkPassword(sender: NSButton) {\n    let validPassword = \"password\"\n    var\
  \ ID : Int\n    ID = IDField.integerValue\n    let myAlert = NSAlert()\n    switch\
  \ ID {\n    case 100...150: if (PasswordField.stringValue == validPassword) {\n\
  \        myAlert.messageText = \"Access granted\"\n    } else {\n        myAlert.messageText\
  \ = \"No access\"\n    }\n    default:\n        myAlert.messageText = \"No access\"\
  \n    }\n    myAlert.runModal()\n}\n```\n\n这个 `IBAction` 方法使用一个 `switch` 语句来检查用户输入的\
  \ ID 是否在 `100...150` 范围内。如果是，接着检查用户在密码文本字段中是否输入了 “password”。如果这也是真的，那么 `switch`\
  \ 语句会在一个警报对话框中显示 “Access granted”。如果 ID 不在 `100...150` 范围内，或者密码文本字段中没有包含 “password”，那么警报对话框会显示\
  \ “No access。”。在上述 `IBAction` 代码中，你也可以将这两行代码：\n\n```swift\nvar ID : Int\nID = IDField.integerValue\n\
  ```\n\n替换为使用类型推断的一行代码，如下所示：\n\n```swift\nvar ID = IDField.integerValue\n```\n\n\
  **注意：** 你可能想知道上述代码中的 `stringValue` 和 `integerValue` 是从哪里来的。如果你查看你的 `IBOutlets`，你会发现每个文本字段的\
  \ `IBOutlet` 都基于 `NSTextField` 类。在 Xcode 的文档中查找 `NSTextField`，你会发现 `NSTextField`\
  \ 基于 `NSControl` 类。`NSControl` 类包含像 `stringValue` 和 `integerValue` 这样的属性，这意味着任何基于\
  \ `NSTextField` 的对象（例如代表你用户界面上文本字段的 `IBOutlets`）也可以使用这些 `stringValue` 和 `integerValue`\
  \ 属性。\n\n15. 选择 **Product ➤ Run**。Xcode 会运行你的 `BranchingProgram` 项目。\n\n16. 点击你的\
  \ `BranchingProgram` 用户界面的 **ID** 文本字段，输入 `120`。\n\n17. 点击你的 `BranchingProgram`\
  \ 用户界面的 **Password** 文本字段，输入 `password`。\n\n18. 点击 **Check Password** 按钮。会弹出一个警报对话框，如图\
  \ 7-22 所示。\n\n![A437923_1_En_7_Fig22_HTML.jpg](img/A437923_1_En_7_Fig22_HTML.jpg)\n\
  \n**图 7-22.** 显示一个警报对话框\n\n19. 点击警报对话框中的 **OK** 按钮使其消失。\n\n20. 点击你的 `BranchingProgram`\
  \ 用户界面的 **ID** 文本字段，输入 `1`。\n\n21. 点击 **Check Password** 按钮。注意，现在警报对话框显示的是 “No access。”\n\
  \n22. 点击警报对话框中的 **OK** 按钮使其消失。\n\n23. 选择 **BranchingProgram ➤ Quit BranchingProgram**。\n\
  \n\n\n### 总结\n\n为了智能地响应用户，每个程序都需要一种做出决策的方式。做出决策的第一步是定义一个布尔值，它要么是`true`，要么是`false`。布尔值可以通过比较运算符或逻辑运算符计算得出。\n\
  \n一旦你能确定一个布尔值，就可以在分支语句中使用该布尔值来决定执行哪段代码。最简单的分支是`if`语句，它要么执行一组代码，要么什么也不做。\n\n另一种分支是`if-else`语句，它恰好提供两组待执行的代码。如果布尔值为`true`，则执行第一组代码；否则，执行第二组代码。\n\
  \n如果你需要在三组或更多组代码之间进行选择，可以使用`if-else-if`语句。不过，使用`switch`语句通常更简单。当使用`switch`语句时，你必须预判所有可能的值。\n\
  \n`switch`语句可以让你匹配精确值、一组值、一个范围（包含起始和结束数值）、半个范围（仅包含起始数值，不包含结束数值），或者使用 `<`、`<=`、`>`\
  \ 和 `>=` 进行比较。\n\n分支语句与布尔值相结合，使你的程序能够根据接收到的数据做出决策并运行不同的代码。本质上，分支语句能让你的程序智能地响应外部数据。\n\
  \n"
- "# 8. 使用循环重复执行代码\n\n编程的基本目标是编写尽可能少的代码，同时做尽可能多的事情。你写的代码越少，程序日后就越容易理解和修改。你的代码能做的事情越多，程序就越强大。\n\
  \n减少代码编写量的一种方法是在函数中复用代码。第二种复用代码的方法是使用循环。循环可以多次运行一行或多行代码，从而无需编写多条冗余代码。\n\n例如，如果你想打印一条消息五次，可以编写如下代码：\n\
  \n```\nprint (\"Hello\")\nprint (\"Hello\")\nprint (\"Hello\")\nprint (\"Hello\"\
  )\nprint (\"Hello\")\n```\n\n这样做虽然繁琐，但可以正常工作。然而，如果你突然决定需要将一条消息打印一千次，那么你现在必须书写那个命令一千次。不仅反复输入相同的命令很繁琐，而且还会增加其中某条命令出错的概率。\n\
  \n更简单的方法是使用循环。循环允许你编写一次一个或多个命令，然后按照你需要运行的次数来执行这些命令，例如：\n\n```\nvar counter = 1\n\
  while counter <= 5 {\n    print (\"Hello\")\n    counter = counter + 1\n}\n```\n\
  \n上述循环运行了五次，并打印了五次\"Hello\"。如果你想打印一千次\"Hello\"，只需将数字 5 替换为 1000 即可。循环让代码更容易编写和修改，同时完成更多工作。\n\
  \n## `while` 循环\n\nSwift 中最简单的循环称为 `while` 循环，其结构如下：\n\n```\nwhile 布尔值 {\n}\n```\n\
  \n在 `while` 循环执行任何操作之前，它首先检查布尔值是 `true` 还是 `false`。如果是 `true`，则运行其花括号内的代码一次。然后它会再次检查其布尔值，看它是否变为\
  \ `false` 还是仍为 `true`。一旦这个布尔值变为 `false`，`while` 循环就会停止。\n\n由于 `while` 循环在执行任何操作之前会检查布尔值，因此\
  \ `while` 循环有可能永远不会执行其任何代码。更重要的是，只有当其布尔值为 `true` 时，`while` 循环才会运行。这意味着在 `while`\
  \ 循环的花括号内，必须存在最终将布尔值变为 `false` 的代码。\n\n如果 `while` 循环未能将其布尔值从 `true` 变为 `false`，那么循环将永远运行，这被称为无限循环。无限循环可能导致程序崩溃或无响应，从而无法再与用户交互。\n\
  \n在最简单的层面上，`while` 循环的布尔值可以只是 `true` 或 `false`，例如：\n\n```\nwhile true {\n}\n```\n\
  \n更常见的是，`while` 循环使用比较运算符来确定布尔值，例如：\n\n```\nwhile counter <= 5 {\n}\n```\n\n只要 `counter\
  \ <= 5` 保持为 `true`，`while` 循环就会运行。当 `counter <= 5` 不再为 `true` 时，`while` 循环将停止。\n\
  \n使用 `while` 循环时，你需要在循环开始前定义布尔值（确保它是 `true` 或 `false`），然后在 `while` 循环内部的某处更改该布尔值（以确保\
  \ `while` 循环最终停止）。\n\n要了解布尔值如何与 `while` 循环协同工作，请按照以下步骤创建一个新的 playground：\n\n1. 在\
  \ Xcode 中打开 Introductory Playground 文件。\n2. 按如下方式编辑代码：\n\n    ```\n    import Cocoa\n\
  \    var counter = 1\n    while counter <= 10 {\n        print (\"Hello\")\n   \
  \     counter = counter + 1\n    }\n    ```\n\n请注意，`var counter = 1` 这一行定义了 `while`\
  \ 循环用来确定布尔值（`true` 或 `false`）的变量。同时也要注意 `while` 循环内部的 `counter = counter + 1` 这一行。它不断地改变\
  \ `while` 循环用来决定何时停止的变量。通过更改布尔比较条件（`counter <= 10`），你可以改变 `while` 循环的运行次数。\n\n为了确保你能看到\
  \ `print` 命令的作用，点击左下角的“显示调试区域”图标，使调试区域显示出来，如图 8-1 所示。\n\n![A437923_1_En_8_Fig1_HTML.jpg](img/A437923_1_En_8_Fig1_HTML.jpg)\n\
  \n**图 8-1.** 在 playground 中运行 `while` 循环\n\n使用 `while` 循环时，请记住以下几点：\n\n- 在 `while`\
  \ 循环之前，确保定义 `while` 循环布尔值所使用的任何变量（例如 `var counter = 1` 这一行）。\n- `while` 循环可能会运行零次或多次。\n\
  - 在 `while` 循环内部，确保循环所使用的布尔值最终能变为 `false`，以避免创建无限循环（例如 `counter = counter + 1` 这一行）。\n\
  \n## `repeat-while` 循环\n\n作为 `while` 循环的替代方案，Swift 还提供了 `repeat-while` 循环，其工作方式完全相同。唯一的区别是，`repeat-while`\
  \ 循环不是在运行前检查布尔值，而是在运行之后才检查。\n\n这意味着 `repeat-while` 循环至少会运行一次。`repeat-while` 循环的结构如下：\n\
  \n```\nrepeat {\n} while 布尔值\n```\n\n与 `while` 循环一样，`repeat-while` 循环也需要在其循环内部包含能够将其布尔值从\
  \ `true` 变为 `false` 的代码，并且还需要在 `repeat-while` 循环之前初始化用于计算该循环布尔值的任何变量。\n\n要了解布尔值如何与\
  \ `repeat-while` 循环协同工作，请按照以下步骤操作：\n\n1. 确保在 Xcode 中加载了 IntroductoryPlayground 文件。\n\
  2. 按如下方式编辑代码：\n\n    ```\n    import Cocoa\n    var counter = 1\n    repeat {\n\
  \        print (\"Goodbye\")\n        counter = counter + 1\n    } while counter\
  \ <= 10\n    ```\n\n请注意，布尔值（`counter <= 10`）决定了 `repeat-while` 循环运行的次数，如图 8-2 所示。\n\
  \n![A437923_1_En_8_Fig2_HTML.jpg](img/A437923_1_En_8_Fig2_HTML.jpg)\n\n**图 8-2.**\
  \ 在 playground 中运行 `repeat-while` 循环\n\n请记住，`while` 循环和 `repeat-while` 循环的主要区别在于：`repeat-while`\
  \ 循环至少会运行一次，而 `while` 循环如果其布尔值初始为 `false`，则可能一次都不运行。\n\n\n\n## for-in 循环\n\n`while`\
  \ 或 `repeat-while` 循环会重复多少次？这完全取决于其布尔值。如果你希望循环运行固定的次数，你可以使用 `while` 或 `repeat-while`\
  \ 循环进行简单的计数，例如：\n\n```\nvar counter = 1\nwhile counter <= 5 {\n    print (\"while\
  \ 循环 \\(counter)\")\n    counter = counter + 1\n}\ncounter = 1\nrepeat {\n    print\
  \ (\"repeat 循环 \\(counter)\")\n    counter = counter + 1\n} while counter <= 5\n\
  ```\n\n这两个循环都恰好运行五次，如图 8-3 所示。\n\n![A437923_1_En_8_Fig3_HTML.jpg](img/A437923_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3. `while` 和 `repeat-while` 循环可以运行固定的次数\n\n请注意，`print` 命令只能打印字符串。任何时候你想在 `print`\
  \ 命令中使用非字符串的值，可以将其放在括号内，并在前面加上一个 `\\` 符号，例如 `\\(counter)`。\n\n使用 `while` 或 `repeat-while`\
  \ 循环进行计数可能比较笨拙，因为你必须确保创建一个计数变量，并在 `while` 或 `repeat-while` 循环内持续更新该计数变量，以避免无限循环。\n\
  \n当你希望循环运行固定次数时，使用 `for-in` 循环要好得多。其主要优势在于，`for-in` 循环自动知道如何计数，因此你不必指定何时停止。\n\n\
  要使用 `for-in` 循环，你需要指定以下内容：\n\n- 起始值\n- 结束值\n- 起始值和结束值之间的范围，例如 `...` 或 `..<`\n\n\
  `for-in` 循环的结构如下所示：\n\n```\nfor 计数变量 in 起始值...结束值 {\n}\n```\n\n这告诉 Swift 从 `起始值`\
  \ 开始按 1 递增计数，并在达到 `结束值` 时停止，例如：\n\n```\nfor i in 1...5 {\n    print (\"循环 \\(i)\"\
  )\n}\n```\n\n上面的 `for-in` 循环从 1, 2, 3, 4 计数，并在 5 之后停止。下面类似的 `for-in` 循环使用了不同的范围，告诉\
  \ Swift 在 `结束值` 之前停止计数：\n\n```\nfor i in 1..<5 {\n    print (\"第二个循环 \\(i)\")\n\
  }\n```\n\n与前一个 `for-in` 循环不同，此 `for-in` 循环从 1, 2, 3 计数，并在 4 之后停止，如图 8-4 所示。\n\n\
  ![A437923_1_En_8_Fig4_HTML.jpg](img/A437923_1_En_8_Fig4_HTML.jpg)\n\n图 8-4. 比较 `for-in`\
  \ 循环中的不同范围\n\n请注意，`for-in` 循环远比比 `while` 或 `repeat-while` 循环简单，后者需要初始化一个计数变量，然后在循环内更新该计数变量以防止无限循环。\n\
  \n默认情况下，`for-in` 循环总是按 1 递增计数。如果你希望按 1 以外的值计数，可以按如下方式指定增量值：\n\n```\nfor i in 起始值...结束值\
  \ where i%增量值 == 0 {\n}\n```\n\n此 `for-in` 循环使用余数运算符（`%`）来确定要计数的值。因此，如果你想按 3 增量计数，可以使用以下\
  \ `for-in` 循环：\n\n```\nfor i in 1...20 where i%3 == 0 {\n}\n```\n\n此 `for-in` 循环从\
  \ 1 开始计数，但在运行花括号内的任何代码之前，它会将计数变量（`i`）除以 3，以确定它是否能被 3 整除（如 Swift 代码 `== 0` 所示，等于\
  \ 0）。如果计数变量（`i`）能被 3 整除，则运行循环内的代码。\n\n要查看 `for-in` 循环是否按增量计数运行，请按照以下步骤创建一个新的 playground：\n\
  \n1. 在 Xcode 中打开 Introductory Playground 文件。\n2. 按如下方式编辑代码：\n\n```\nfor i in 1...20\
  \ where i%3 == 0 {\n    print (\"循环 \\(i)\")\n}\n```\n\n此 `for-in` 循环从 1 开始，但 `1%3`\
  \ 不等于 0，因此跳到 2。然而，`2%3` 也不等于 0，因此跳到 3。由于 `3%3` 等于 0，它运行花括号内的代码并打印“循环 3”。此后继续，直到计数变量（`i`）达到\
  \ 20，如图 8-5 所示。\n\n![A437923_1_En_8_Fig5_HTML.jpg](img/A437923_1_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5. `for-in` 循环可以按增量计数\n\n如果你将 `i%3` 替换为 `i%4`，`for-in` 循环将按 4 增量计数。只需更改这个值，你就可以定义\
  \ `for-in` 循环如何以 1 以外的增量进行计数。\n\n### 使用 for-in 循环遍历数组\n\n使用 `for-in` 语句最直接的方式是指定起始值和结束值，从\
  \ 1 数到 10 或从 0 数到 34。然而，`for-in` 循环在遍历存储在数组（一种数据结构）中的数据列表时也特别方便。`for-in` 循环自动知道从哪里开始和结束，因此你永远不必担心自己数出有多少项。\n\
  \n用于遍历数据列表的 `for-in` 循环结构如下所示：\n\n```\nfor 计数变量 in 项目列表 {\n}\n```\n\n`计数变量` 对某种列表中的每一项进行计数，而\
  \ `项目列表` 代表某种列表，例如数组（由数据列表组成）。要了解 `for-in` 循环如何工作，请执行以下步骤：\n\n1. 确保在 Xcode 中加载了\
  \ `IntroductoryPlayground` 文件。\n2. 按如下方式编辑代码：\n\n```\nimport Cocoa\nlet names =\
  \ [\"Oscar\", \"Sally\", \"Marty\", \"Louis\"]\nfor person in names {\n    print\
  \ (person)\n}\n```\n\n图 8-6 显示了 `for-in` 循环如何运行四次，因为 `names` 数组包含四个项目。如果你向此数组添加或删除一个名称，`for-in`\
  \ 循环会自动计数数组中项目的新数量。\n\n![A437923_1_En_8_Fig6_HTML.jpg](img/A437923_1_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6. 使用 `for-in` 循环遍历数组\n\n## 提前退出循环\n\n通常，循环会一直运行直到布尔值改变。然而，你可以通过使用 `break`\
  \ 命令提前退出循环。通常此循环会运行四次：\n\n```\nlet names = [\"Oscar\", \"Sally\", \"Marty\", \"\
  Louis\"]\nfor person in names {\n    print (person)\n}\n```\n\n如果你插入一个 `break` 命令，可以使此循环仅运行一次后退出，如下所示：\n\
  \n```\nlet names = [\"Oscar\", \"Sally\", \"Marty\", \"Louis\"]\nfor person in names\
  \ {\n    print (person)\n    break\n}\n```\n\n此 `for-in` 循环将运行一次，打印名称“Oscar”，遇到\
  \ `break` 命令，然后退出 `for-in` 循环。当然，在 `for-in` 循环中一直放置 `break` 命令来提前停止它相当没有意义，因此更常见的是将\
  \ `break` 命令与分支语句一起使用。这样，如果某个布尔值为真，循环就会提前退出。否则，循环将继续运行。\n\n要了解如何提前退出循环，请执行以下步骤：\n\
  \n1. 确保在 Xcode 中加载了 `IntroductoryPlayground` 文件。\n2. 按如下方式编辑代码：\n\n```\nimport Cocoa\n\
  let employees = [\"Fred\", \"Jane\", \"Sam\", \"Kelly\"]\nfor person in employees\
  \ {\n    if person == \"Sam\" {\n        print (\"Break 命令\")\n        break\n \
  \   }\n    print (person)\n}\n```\n\n此 `for-in` 循环通常运行四次，因为 `employees` 数组包含四个名称。然而，一旦\
  \ `for-in` 循环找到名称“Sam”，它就会打印该名称，遇到 `break` 命令，然后提前退出 `for-in` 循环，因此它只运行了三次，如图 8-7\
  \ 所示。\n\n![A437923_1_En_8_Fig7_HTML.jpg](img/A437923_1_En_8_Fig7_HTML.jpg)\n\n图\
  \ 8-7. 使用 `break` 命令提前退出循环\n\n\n\n## 在 macOS 程序中使用循环\n\n在下面的示例程序中，计算机会随机生成一个 1 到\
  \ 10 之间的数字。用户必须猜出这个数字。为防止用户猜测超出 1 到 10 的范围，用户界面允许用户通过滑块选择数值。\n\n每次用户猜错时，标签会显示提示信息，说明猜测的数字过高或过低。当用户猜对数字时，循环会打印出每次猜测的列表，并在警告对话框中显示。\n\
  \n请按照以下步骤创建一个新的 macOS 项目：\n\n1. 在 Xcode 中，选择 **文件** ➤ **新建** ➤ **项目**。\n2. 在 macOS\
