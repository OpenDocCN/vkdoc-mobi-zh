  \ 键和鼠标。此时会弹出一个菜单（参见图 22-19）。\n27.  点击 `myMenu`。\n28.  选择**视图** ➤ **标准编辑器** ➤ **查看标准编辑器**，使\
  \ Xcode 窗口中只显示一个文件。\n29.  在项目导航器窗格中点击 `ViewController.swift` 文件。\n30.  将光标移到 `ViewController.swift`\
  \ 文件中最后一个花括号上方，然后选择**编辑** ➤ **粘贴**。Xcode 会将第 20 步中的 IBAction 方法粘贴过来。\n31.  按如下方式修改这个\
  \ IBAction 方法：\n\n```swift\n@IBAction func myMenu(_ sender: NSMenuItem) {\n    textResult.stringValue\
  \ = \"Clicked on = \" + sender.title\n}\n```\n\n32.  选择**产品** ➤ **运行**。你的用户界面会出现。\n\
  33.  在你的 StoryMenu 菜单栏上选择**文件** ➤ **保存**。请注意，文本字段会显示“Clicked on = Save…”。\n34. \
  \ 在你的 StoryMenu 菜单栏上选择**文件** ➤ **项目**。请注意，文本字段现在会显示“Clicked on = Item”。\n35.  选择**StoryMenu**\
  \ ➤ **退出 StoryMenu**。\n\n### 总结\n\n当你创建一个 Cocoa 应用程序项目时，Xcode 会自动为你的程序创建下拉菜单。你可以添加、删除或重新排列菜单栏上的菜单标题，或者下拉菜单中的菜单命令。为了方便用户，你甚至可以为菜单命令分配快捷键。\n\
  \n要编辑下拉菜单，你可以直接在下拉菜单上编辑，或者打开文档大纲。你可以通过 Control-拖拽的方式，从下拉菜单命令或文档大纲将菜单命令连接到 IBAction\
  \ 方法。\n\n在处理 `.storyboard` 文件时，你通常会将菜单命令连接到**第一响应者**图标。然后，你需要在正确的 Swift 文件中实现 IBAction\
  \ 方法，以使该菜单命令生效。在处理 `.xib` 文件时，你可以直接将菜单命令连接到 IBAction 方法。\n\n当 Xcode 为你的 Cocoa 应用程序创建下拉菜单时，许多菜单命令已经知道如何工作，例如**窗口**\
  \ ➤ **缩放**和**文件** ➤ **关闭**。然而，大多数菜单命令在你编写自己的 Swift 代码使其在你的特定程序中正常工作之前，不会执行任何操作。\n\
  \n下拉菜单上的菜单命令为你提供了一种将命令连接到 IBAction 方法的额外方式。由于大多数 macOS 程序都依赖下拉菜单，因此应首先专注于将程序命令组织到下拉菜单中，然后编写\
  \ Swift 代码让每个菜单命令实际生效。\n\n"
- "# 23. 触控栏编程\n\nMacintosh 电脑的最新输入设备是**触控栏**，它位于键盘上方，原本那一排功能键所在的位置。**触控栏**会根据你当前正在执行的操作显示上下文相关的快捷方式。例如，如果你正在打字，**触控栏**可能会显示建议输入的单词，你可以点击它们，从而无需完整键入整个单词。如果你正在编辑视频，**触控栏**可以让你在视频中前后滚动。\n\
  \n由于**触控栏**提供了一种与 Macintosh 交互的新方式，所有 macOS 程序都需要知道如何在**触控栏**上显示信息。**触控栏**编程的关键在于认识到并非所有\
  \ Macintosh 都配备**触控栏**。这意味着你不能在**触控栏**上显示任何无法同时在屏幕上查看的关键信息或命令。\n\n**触控栏**的第二个关键特性是显示用户在那个特定时刻最可能需要的命令的快捷方式。如果你在编辑文本，**触控栏**应显示文本格式快捷方式，例如**粗体**、*斜体*和**下划线**命令。如果你在编辑图形，**触控栏**应切换并显示图形编辑快捷方式，例如用于选择不同颜色或更改绘图工具大小的按钮。\n\
  \n**触控栏**的关键在于使其适应用户。当为你自己的 macOS 程序添加**触控栏**快捷方式时，你需要：\n\n-   在你程序用户界面的窗口中添加一个**触控栏**\n\
  -   在你的**触控栏**上添加按钮\n-   创建一个 Swift 文件来控制包含**触控栏**的窗口\n-   将**触控栏**按钮连接到 Swift 文件中的\
  \ IBAction 方法，使其能够执行操作\n\n**注意：** 即使你的 Macintosh 没有配备**触控栏**，你也可以使用**触控栏**模拟器。要使用**触控栏**模拟器，你必须拥有\
  \ Xcode 8.1 或更高版本以及 macOS Sierra 10.12.1 或更高版本。\n\n## 添加触控栏\n\n**触控栏**只是对象库中的另一个项目，你可以将其拖拽到你的窗口上。如果你打开对象库并在搜索字段中输入**触控**，你可以轻松找到**触控栏**以及你可以添加到其中的所有项目，例如按钮或标签（参见图\
  \ 23-1）。\n\n![A437923_1_En_23_Fig1_HTML.jpg](img/A437923_1_En_23_Fig1_HTML.jpg)\n\
  \n**图 23-1.** 对象库包含可以添加到**触控栏**的所有内容\n\n向你的程序添加**触控栏**的第一步是将**触控栏**项目拖拽到窗口控制器上（不是视图控制器），如图\
  \ 23-2 所示。\n\n![A437923_1_En_23_Fig2_HTML.jpg](img/A437923_1_En_23_Fig2_HTML.jpg)\n\
  \n**图 23-2.** 将**触控栏**从对象库拖拽到窗口控制器\n\n一旦你将**触控栏**放置在窗口控制器上，它就会出现在其下方，如图 23-3 所示。现在你需要创建一个\
  \ Swift 类文件，以包含使**触控栏**工作的 Swift 代码。\n\n![A437923_1_En_23_Fig3_HTML.jpg](img/A437923_1_En_23_Fig3_HTML.jpg)\n\
  \n**图 23-3.** **触控栏**作为用户界面的一部分\n\n\n\n## 创建 Swift 类文件\n\n此时，Touch Bar 已连接到用户界面的窗口，但你还无法编写任何\
  \ Swift 代码使其工作，因为窗口控制器尚未定义对应的类文件。\n\n要创建 Swift 类文件，请遵循以下步骤：\n\n1.  选择“文件”➤“新建”➤“文件”。此时会出现模板窗口，如图\
  \ 23-4 所示。\n\n    ![A437923_1_En_23_Fig4_HTML.jpg](img/A437923_1_En_23_Fig4_HTML.jpg)\n\
  \n    图 23-4. 选择 Swift Cocoa 类文件  \n\n2.  在 macOS 类别下的“Source”组中，点击“Cocoa Class”。\
  \  \n3.  点击“下一步”按钮。此时会出现一个对话框，要求输入类名和子类，如图 23-5 所示。\n\n    ![A437923_1_En_23_Fig5_HTML.jpg](img/A437923_1_En_23_Fig5_HTML.jpg)\n\
  \n    图 23-5. 定义一个类  \n\n4.  点击“Class”文本字段，并输入你的类名，例如 `TouchClass`。  \n5.  确保“Subclass\
  \ of”字段显示为 `NSWindowController`。  \n6.  取消勾选“Also create XIB file for user interface”复选框。\
  \  \n7.  确保“Language”弹出菜单显示为 Swift。  \n8.  点击“下一步”按钮。此时会出现一个“保存”对话框。  \n9.  点击“创建”按钮。Xcode\
  \ 窗口将再次出现。\n\n创建类文件后，需要将其连接到窗口控制器。要将类文件连接到窗口控制器，请执行以下步骤：\n\n1.  点击包含窗口控制器和 Touch\
  \ Bar 的 `.storyboard` 文件。  \n2.  点击窗口顶部中央的蓝色“Window Controller”图标。  \n3.  选择“视图”➤“实用工具”➤“显示身份检查器”。\
  \  \n4.  点击“Class”字段右侧的向下箭头。你将看到一个可选的有效类文件菜单，如图 23-6 所示。\n\n    ![A437923_1_En_23_Fig6_HTML.jpg](img/A437923_1_En_23_Fig6_HTML.jpg)\n\
  \n    图 23-6. 为窗口控制器选择类文件  \n\n5.  点击你创建的类名（例如 `TouchClass`）。\n\n至此，你的 Swift 类文件已连接到窗口控制器和\
  \ Touch Bar。现在，你可以向 Touch Bar 添加项目，并在刚选择的类文件中为 Touch Bar 创建 `IBOutlet` 和 `IBAction`\
  \ 方法。\n\n### 向 Touch Bar 添加项目\n\n对象库包含了所有可以添加到 Touch Bar 的项目。你只能将 Touch Bar 项目放置在\
  \ Touch Bar 上，而不能放置普通的按钮或标签。要将项目放置在 Touch Bar 上，只需从对象库中拖放任意 Touch Bar 项目到 Touch\
  \ Bar 上即可，如图 23-7 所示。\n\n![A437923_1_En_23_Fig7_HTML.jpg](img/A437923_1_En_23_Fig7_HTML.jpg)\n\
  \n图 23-7. 从对象库将项目拖拽到 Touch Bar 上\n\nTouch Bar 上常用的一些项目包括：\n\n*   Touch Bar 按钮：显示一个单独的按钮\n\
  *   Touch Bar 固定/弹性间距：在多个 Touch Bar 项目之间创建间距\n*   Touch Bar 标签：显示文本\n*   Touch Bar\
  \ 滑块：显示水平滑块\n\n### 将 Touch Bar 项目连接到 Swift 代码\n\n在 Touch Bar 上放置一个或多个项目后，你可以按住 Control\
  \ 键从这些 Touch Bar 项目拖拽到你的 Swift 类文件，以创建 `IBOutlet` 和 `IBAction` 方法，如图 23-8 所示。\n\n\
  ![A437923_1_En_23_Fig8_HTML.jpg](img/A437923_1_En_23_Fig8_HTML.jpg)\n\n图 23-8. 从\
  \ Touch Bar 按住 Control 键拖拽到 Swift 类文件\n\n对于许多 Touch Bar 项目，你可能需要编写额外的 Swift 代码才能让它们工作。如果你的\
  \ Macintosh 键盘上方没有 Touch Bar，你可以使用 Xcode 的 Touch Bar 模拟器。要启用 Touch Bar 模拟器，请选择“窗口”➤“显示\
  \ Touch Bar”（或按 Shift + Command + 5），如图 23-9 所示。\n\n![A437923_1_En_23_Fig9_HTML.jpg](img/A437923_1_En_23_Fig9_HTML.jpg)\n\
  \n图 23-9. “显示 Touch Bar”命令出现在 Xcode 的“窗口”菜单中\n\n如果你的 Macintosh 没有 Touch Bar，你需要运行你的程序，切换到\
  \ Xcode，选择“窗口”➤“显示 Touch Bar”，然后再切换回正在运行的程序，即可在屏幕上看到程序的模拟 Touch Bar。\n\n\n\n## 创建触控栏程序\n\
  \n要创建示例触控栏程序并了解触控栏模拟器的工作原理，请按以下步骤操作：\n\n1.  在 Xcode 中选择“文件”➤“新建”➤“项目”。\n2.  在 macOS\
