  \ `myMenu` IBAction 方法。  \n选择 Product ➤ Run。用户界面会出现。  \n点击 File 菜单标题。注意，你的菜单项（标记为\
  \ Item）会出现在 File 下拉菜单的底部。  \n点击 Save 命令。文本字段会显示“Clicked on = Save…”。  \n点击 File\
