  \ 8-12 所示。\n\n![A437923_1_En_8_Fig12_HTML.jpg](img/A437923_1_En_8_Fig12_HTML.jpg)\n\
  \n图 8-12. 修改水平滑块属性\n\n通过此用户界面，用户将使用水平滑块在 1 到 10 之间选择一个数字。如果用户猜的数字过高，标签会显示 \"Too\
  \ High\"。如果用户猜的数字过低，标签会显示 \"Too Low\"。\n\n每次用户猜错时，底部标签会显示错误的猜测。当用户猜对数字时，顶部标签会显示\
  \ \"You got it!\"。\n\n在此示例中，你需要两个`IBOutlet`变量来连接每个标签，以便在每个标签上显示信息。然后，你需要一个`IBAction`方法来连接\
  \ Guess 按钮。这样，当用户点击 Guess 按钮时，`IBAction`方法可以通过水平滑块检查用户是否选对了数字。\n\n你需要编写 Swift 代码，在\
  \ 1 到 10 之间随机选择一个数字。然后使用循环列出用户的所有猜测，并在警告对话框中显示结果。\n\n如果你不完全理解示例中的所有 Swift 代码，不必担心。只要确保你理解代码的功能即可，不必纠结于代码具体是如何工作的。在现阶段，重要的是看到更复杂的程序实际运行起来。\n\
  \n要将 Swift 代码连接到用户界面，请按照以下步骤操作：\n\n1. 在 Xcode 窗口中用户界面仍然显示的情况下，选择 **视图** ➤ **辅助编辑器**\
  \ ➤ **显示辅助编辑器**。`AppDelegate.swift` 文件会出现在用户界面旁边。\n2. 将鼠标移动到顶部标签上，按住 Control 键，从顶部文本框拖拽到\
  \ `AppDelegate.swift` 文件中现有的 `@IBOutlet` 行下方，如图 8-13 所示。\n\n![A437923_1_En_8_Fig13_HTML.jpg](img/A437923_1_En_8_Fig13_HTML.jpg)\n\
  \n图 8-13. 从顶部标签按住 Control 键拖拽到 AppDelegate.swift 文件\n\n3. 松开鼠标和 Control 键。会弹出一个窗口，如图\
  \ 8-14 所示。\n\n![A437923_1_En_8_Fig14_HTML.jpg](img/A437923_1_En_8_Fig14_HTML.jpg)\n\
  \n图 8-14. 用于定义 IBOutlet 的弹出窗口\n\n4. 点击 **名称** 文本框，输入 `messageLabel`，然后点击 **连接**\
  \ 按钮。Xcode 会创建一个 `IBOutlet`。\n5. 将鼠标移动到底部标签上，按住 Control 键，拖拽到 `AppDelegate.swift`\
  \ 文件的 `@IBOutlet` 行下方。\n6. 松开鼠标和 Control 键。会弹出一个窗口。\n7. 点击 **名称** 文本框，输入 `guessLabel`，然后点击\
  \ **连接** 按钮。Xcode 会创建另一个 `IBOutlet`。\n8. 将鼠标移动到水平滑块上，按住 Control 键，拖拽到 `AppDelegate.swift`\
  \ 文件的 `@IBOutlet` 行下方。\n9. 松开鼠标和 Control 键。会弹出一个窗口。\n10. 点击 **名称** 文本框，输入 `guessSlider`，然后点击\
  \ **连接** 按钮。Xcode 会创建又一个 `IBOutlet`。\n11. 现在你应该有三个 `IBOutlet`，分别代表用户界面中的两个文本框：\n\
  \n```swift\n@IBOutlet weak var messageLabel: NSTextField!\n@IBOutlet weak var guessLabel:\
  \ NSTextField!\n@IBOutlet weak var guessSlider: NSSlider!\n```\n\n12. 将鼠标移动到 Guess\
  \ 按钮上，按住 Control 键，拖拽到 `AppDelegate.swift` 文件中的最后一个花括号上方。\n13. 松开鼠标和 Control 键。会弹出一个窗口。\n\
  14. 点击 **连接** 弹出菜单，选择 **操作** 以创建一个 `IBAction` 方法。\n15. 点击 **名称** 文本框，输入 `checkGuess`。\n\
  16. 点击 **类型** 弹出菜单，选择 `NSButton`，如图 8-15 所示。\n\n![A437923_1_En_8_Fig15_HTML.jpg](img/A437923_1_En_8_Fig15_HTML.jpg)\n\
  \n图 8-15. 定义 IBAction 方法\n\n17. 点击 **连接** 按钮。Xcode 会创建一个空白的 `IBAction` 方法。\n18.\
  \ 按如下方式修改 `IBAction checkGuess` 方法：\n\n\n\n```\n@IBAction func checkGuess (_ sender:\
  \ NSButton) {\n    var userGuess = 0\n    // 从水平滑块获取猜测值\n    userGuess = guessSlider.integerValue\n\
  \    // 将猜测值存入 guessArray\n    guessArray.append(userGuess)\n    if userGuess <\
  \ randomNumber {\n        messageLabel.stringValue = \"太低\"\n    } else if userGuess\
  \ > randomNumber {\n        messageLabel.stringValue = \"太高\"\n    } else {\n  \
  \      messageLabel.stringValue = \"猜对了！\"\n        arrayTotal = guessArray.count\n\
  \        for i in 0..<arrayTotal {\n            guessHistory += \"第 \\(i+1) 次猜测\
  \ = \\(guessArray[i])\" + \"\\r\\n\"\n        }\n        let myAlert = NSAlert()\n\
  \        myAlert.messageText = guessHistory\n        myAlert.runModal()\n    }\n\
  \    guessLabel.stringValue = guessLabel.stringValue + \" \\(userGuess)\"\n}\n```\n\
  \n让我们仔细分析这个 `IBAction` 方法，以便准确理解其执行过程。首先，用户需要使用水平滑块选择一个数字进行猜测。选定数字后，用户需要点击“猜测”按钮，该按钮会触发名为\
  \ `checkGuess` 的 `IBAction` 方法。下面这行代码声明了一个名为 `userGuess` 的整型变量并将其初始化为 0。这行代码并非绝对必要，但它确保了\
  \ `userGuess` 变量有一个初始值。\n\n```\nvar userGuess = 0\n```\n\n下一行代码从水平滑块中获取数值，该滑块由名为\
  \ `guessSlider` 的 `IBOutlet` 变量表示。要获取水平滑块代表的整数值，需要使用 `integerValue` 属性。该属性将水平滑块的值存入刚刚声明为整型变量的\
  \ `userGuess` 中。\n\n```\nuserGuess = guessSlider.integerValue\n```\n\n下一行代码将 `userGuess`\
  \ 变量中存储的值添加到名为 `guessArray` 的数组中。该数组必须事先在程序中定义。\n\n```\nguessArray.append(userGuess)\n\
  ```\n\n这个 if-else if 语句创建了三个分支。第一个分支在 `userGuess` 变量小于 `randomNumber` 变量时执行，`randomNumber`\
  \ 变量必须事先在程序中定义。该分支会在 `messageLabel` IBOutlet 表示的标签中显示“太低”文本。\n\n```\nif userGuess\
  \ < randomNumber {\n    messageLabel.stringValue = \"太低\"\n```\n\n第二个分支在 `userGuess`\
  \ 变量大于 `randomNumber` 变量时执行。该分支会在 `messageLabel` IBOutlet 表示的标签中显示“太高”文本。\n\n```\n\
  } else if userGuess > randomNumber {\n    messageLabel.stringValue = \"太高\"\n```\n\
  \n第三个分支在 `userGuess` 变量既不小于也不大于 `randomNumber` 变量时执行，这意味着它必须与 `randomNumber` 完全相等。该分支会在\
  \ `messageLabel` IBOutlet 表示的标签中显示“猜对了！”文本。\n\n```\n} else {\n    messageLabel.stringValue\
  \ = \"猜对了！\"\n```\n\n然后它统计 `guessArray` 中存储的元素总数，并将该值存入 `arrayTotal` 变量，该变量必须事先在程序中定义。\n\
  \n```\narrayTotal = guessArray.count\n```\n\n现在，它使用一个 for 循环从 0 遍历到 `arrayTotal\
  \ – 1 (i < arrayTotal)`，并每次递增 1 (`i++`)。该循环创建一个字符串，存储猜测序号（例如`第 1 次猜测`）以及用户选择的猜测值，存入名为\
  \ `guessHistory` 的字符串变量中，该变量必须事先在程序中定义。请注意，通过在括号内的非字符串值两侧使用 `\\()` 符号，可以将数字打印到字符串中。这使得无需先将非字符串值转换为字符串数据类型即可将其存储在字符串中。另请注意，如果直接键入\
  \ `第 \\(i) 次猜测`，则第一个字符串将会存储值 `第 0 次猜测` 作为首次猜测。为避免这种情况，需要在当前 `i` 值的基础上加 1。注意，字符串末尾还包含\
  \ `\\r\\n` 字符。这些符号分别代表回车符和换行符。这些是不可见字符，用于告诉 Xcode，如果添加更多文本，它将显示在下一行。\n\n```\nfor\
  \ var i in 0..<arrayTotal {\n    guessHistory += \"第 \\(i+1) 次猜测 = \\(guessArray[i])\"\
  \ + \"\\r\\n\"\n}\n```\n\nfor 循环内部的代码使用复合赋值运算符 (`+=`) 将此字符串添加到 `guessHistory` 变量中已存储的任何字符串中。由于\
  \ `\\r\\n` 字符会产生回车和换行，任何新添加的字符串都会出现在下一行。接下来的三行代码创建了一个警报对话框 (`NSAlert`)，将 `guessHistory`\
  \ 变量中的字符串存储到警报对话框的 `messageText` 属性中，然后显示该对话框，展示猜测次数以及每次猜测所选数字，如图 8-16 所示。\n\n![A437923_1_En_8_Fig16_HTML.jpg](img/A437923_1_En_8_Fig16_HTML.jpg)\n\
  \n图 8-16. 警报对话框中显示的典型结果\n\n```\nvar myAlert = NSAlert()\nmyAlert.messageText = guessHistory\n\
  myAlert.runModal()\n```\n\n`IBAction` 方法的最后一行将用户的猜测值存储到 `guessLabel` IBOutlet 中，这使得文本显示在底部标签中。\n\
  \n```\nguessLabel.stringValue = guessLabel.stringValue + \" \\(userGuess)\"\n```\n\
  \n19. 编辑 IBAction 方法上方的代码，使其如下所示：\n\n```\nimport Cocoa\n@NSApplicationMain\nclass\
  \ AppDelegate: NSObject, NSApplicationDelegate {\n    @IBOutlet weak var window:\
  \ NSWindow!\n    @IBOutlet weak var messageLabel: NSTextField!\n    @IBOutlet weak\
  \ var guessLabel: NSTextField!\n    @IBOutlet weak var guessSlider: NSSlider!\n\
  \    var randomNumber : Int\n    var guessHistory : String\n    var guessNumber\
  \ : Int\n    var guessArray = [Int]()\n    var arrayTotal : Int\n    override init\
  \ () {\n        self.guessHistory = \"\"\n        self.guessNumber = 0\n       \
  \ self.guessArray = []\n        self.arrayTotal = 0\n        self.randomNumber =\
  \ 1 + Int(arc4random_uniform(10))\n        // Int(arc4random_uniform(10)) 会选择一个介于\
  \ 0 和 9 之间的随机数，因此需要加 1，使其选择一个介于 1 和 10 之间的随机数\n    }\n    func applicationDidFinishLaunching(aNotification:\
  \ NSNotification) {\n        // 在此处插入代码以初始化应用程序\n    }\n    func applicationWillTerminate(aNotification:\
  \ NSNotification) {\n        // 在此处插入代码以销毁应用程序\n    }\n}\n```\n\n`IBOutlet` 变量连接到用户界面上的控件：\n\
  \n```\n@IBOutlet weak var window: NSWindow!\n@IBOutlet weak var messageLabel: NSTextField!\n\
  @IBOutlet weak var guessLabel: NSTextField!\n@IBOutlet weak var guessSlider: NSSlider!\n\
  ```\n\n接下来的五行代码声明了整个 `AppDelegate` 类可以使用的变量：\n\n```\nvar guessHistory : String\n\
  var guessNumber : Int\nvar guessArray = [Int]()\nvar arrayTotal : Int\nvar randomNumber\
  \ : Int\n```\n\n当你在类内部定义变量（称为属性）时，需要为它们赋予初始值。这就是 `override init` 方法的作用。\n\n\n\n\
  ```swift\noverride init () {\n    self.guessHistory = \"\"\n    self.guessNumber\
  \ = 0\n    self.guessArray = []\n    self.arrayTotal = 0\n    self.randomNumber\
  \ = 1 + Int(arc4random_uniform(10))\n    // Int(arc4random_uniform(10)) 会在 0 到 9\
  \ 之间随机选取一个整数，因此需要加 1，使其在 1 到 10 之间选取随机数\n}\n```\n\n`self`关键字告诉 Xcode 所有这些变量都定义在同一个类（`AppDelegate`类）中。最后一行代码生成一个介于\
  \ 1 和 10 之间的随机数。整个程序的工作方式是：首先创建所有变量，然后运行`override init`方法为这些变量存储初始值。此时，程序等待用户在水平滑动条中选择一个值并点击\
  \ Guess 按钮。\n\n20. 选择 Product ➤ Run。Xcode 会运行你的 LoopingProgram 项目。\n21. 在水平滑动条中点击一个值来猜测数字。\n\
  22. 点击 Guess 按钮。如果你猜得太低或太高，将出现\"Too Low\"或\"Too High\"信息。最终当你猜中正确数字时，会出现一个警告对话框，如图\
  \ 8-17 所示。\n\n![A437923_1_En_8_Fig17_HTML.jpg](img/A437923_1_En_8_Fig17_HTML.jpg)\n\
  \n图 8-17 显示警告对话框\n\n23. 点击警告对话框中的 OK 按钮以关闭它。\n24. 选择 LoopingProgram ➤ Quit LoopingProgram。\n\
  \n### 小结\n\n循环通过运行代码直到布尔值变为`false`来重复执行一行或多行代码。`while`循环首先检查布尔值，这意味着它可以运行零次或多次。`repeat-while`循环最后检查布尔值，这意味着它可以运行一次或多次。\n\
  \n创建`while`或`repeat-while`循环时，始终确保循环有结束的方法。如果循环永不结束，就会变成无限循环，导致程序假死且无响应。\n\n`for-in`循环允许你根据起始值和结束值指定循环运行的次数。要使`for-in`循环以非\
  \ 1 的增量计数，可以使用取余运算符（`%`）配合`where`命令。除了遍历一系列值外，`for-in`循环还可以自动计算列表中的项数。\n\n每种循环都有其优缺点，但你可以使每种循环实现其他循环的功能。如果需要提前退出循环，可以结合`if`语句使用`break`命令。\n\
  \n循环让你的程序能够执行重复性任务，而无需编写重复的命令。只需确保循环最终会结束，并且在停止前运行了正确的次数。\n\n"
- "# 9. 数组与字典\n\n几乎每个程序都需要接收数据，以便处理数据并计算出有用的结果。存储数据最简单的方式是通过变量来存储数字或文本字符串。然而，如果需要存储多个数据块（如姓名列表或产品编号列表）该怎么办？你可以创建多个变量，如下所示：\n\
  \n```swift\nvar employee001, employee002, employee003 : String\n```\n\n不幸的是，为存储相关数据而创建单独的变量可能很笨拙。如果你不知道需要存储多少项数据会怎样？那么你可能会创建过多或过少的变量。更糟糕的是，将相关数据存储在单独的变量中意味着很容易忽略数据之间的关系。\n\
  \n例如，如果你将三名员工的名字存储在不同的变量中，如何知道是否还有第四、第五或第六个变量包含其他员工姓名？除非你将变量在代码中保持在一起，否则很容易丢失散落在不同变量中的相关数据。\n\
  \n因此，Swift 提供了两种额外的数据存储方式：数组和字典。这两种数据结构的核心思想是，创建一个可以容纳多个项的单一变量。现在你可以将相关数据存储在一个位置，并轻松地查找和检索它们。\n\
  \n数组和字典都设计用于存储多个相似数据的副本，例如姓名列表或数字列表。在大多数情况下，你会在数组或字典中存储相同数据类型的列表。但是，你也可以通过声明数组或字典可以存储任意类型的数据（使用`Any`数据类型，例如整数和字符串）来存放不同数据类型，如下所示：\n\
  \n```swift\nvar mixedArray: [Any] = [1, \"Temp\", 2.6]\n```\n\n通常，最好在数组或字典中存储相同类型的数据，这样你始终知道期望的数据类型。\n\
  \n## 使用数组\n\n你可以将数组想象为一系列无限的桶，每个桶恰好可以存储一份数据。为了帮助你找到数组中存储的数据，每个数组元素（桶）都由一个称为索引的数字标识。数组中的第一个项定义在索引\
  \ 0 处，第二个项定义在索引 1 处，第三个项定义在索引 2 处，以此类推，如图 9-1 所示。\n\n![A437923_1_En_9_Fig1_HTML.jpg](img/A437923_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1 数组的结构\n\n要创建数组，你可以定义数组的名称和数组可以保存的数据类型。创建数组的一种方式如下：\n\n```swift\nvar arrayName\
  \ : [DataType] = []\n```\n\n一旦你创建了数组并定义了它可以保存的数据类型，就可以像这样向数组存储数据：\n\n```swift\n\
  var arrayName : [Int] = []\narrayName = [34, 89, 70, 1, -24]\n```\n\n比起先定义一个空数组及其数据类型，然后再给数组赋值，更简单的方法是直接在一行内定义数组名称并将其设置为相同数据类型的项列表，如下所示：\n\
  \n```swift\nvar myArrray = [34, 89, -2, 84]\n```\n\nSwift 会根据数据推断数组的数据类型。只需确保数组中的所有数据都是相同的数据类型，例如`Int`、`Float`、`Double`或`String`。\n\
  \n注意：当你使用`var`关键字声明数组时，可以添加和删除数组中的项。如果你不希望数组发生变化，请使用`let`关键字声明数组，如下所示：`let arrayName\
  \ = [34, 89, 70, 1, -24]`。使用`let`关键字声明的数组永远不能被修改。\n\n当你向数组存储数据时，数组中的每个项都位于固定的位置。在前面的整数数组示例中，第一个数字（34）位于索引\
  \ 0，第二个数字（89）位于索引 1，第三个数字（70）位于索引 2，第四个数字（1）位于索引 3，第五个数字（-24）位于索引 4。由于 Swift 数组从\
  \ 0 开始计数索引，因此它们被称为零基数组。（某些编程语言从 1 开始计数数组索引，因此它们被称为一基数组。）\n\n如果你想检索数组中的第二个项（位于索引\
  \ 1），可以像这样检索该项并将其存储在变量中：\n\n```swift\nvar arrayName = [4, 5, 9, -3]\nvar number\
  \ : Int\nnumber = arrayName[1]\n```\n\n上述 Swift 代码创建了一个包含四个整数（4, 5, 9, -3）的数组，然后创建了一个名为`number`且可以保存整数数据类型的变量。第三行代码检索存储在`arrayName`索引\
  \ 1 位置的项。在本例中，`number`变量现在持有值 5。\n\n\n\n### 向数组添加元素\n\n无论数组是空的还是已经存有数据，你都可以通过 `append`\
  \ 命令向数组中添加更多元素，如下所示：\n\n```\narrayName.append(data)\n```\n\n你必须指定要添加数据的数组名称，并将实际数据放在括号内。确保你添加的数据类型正确。因此，如果你要向一个只能存储整数的数组添加数据，则只能向该数组添加另一个整数。\n\
  \n除了使用 `append` 命令，你还可以使用加法复合赋值运算符向数组末尾添加元素，如下所示：\n\n```\narrayName3 += [data1,\
  \ data2, data3, ... dataN]\n```\n\n`+=` 复合赋值运算符可以向数组末尾添加多个元素，而 `append` 命令每次只能向数组末尾添加一个元素。\n\
  \n`append` 命令总是将新元素添加到数组末尾。如果你想在数组的特定位置添加新元素，可以使用 `insert` 和 `at` 命令，如下所示：\n\n```\n\
  arrayName.insert(data, at: index)\n```\n\n使用 `insert` 命令时，你必须添加与该数组数据类型一致的数据。然后，你还必须指定索引编号。如果你选择的索引编号大于数组大小，`insert`\
  \ 命令将不会生效。\n\n要了解如何创建数组并添加数据，请按照以下步骤操作：\n\n1.  在 Xcode 中打开 IntroductoryPlayground\
  \ 文件。\n2.  按如下方式编辑代码：\n\n    ```\n    import Cocoa\n    var arrayName = Array(arrayLiteral:\
  \ 34, 89, 70, 1, -24)\n    var arrayName2 = Int\n    arrayName.append(2)\n    arrayName2.append(2)\n\
  \    arrayName.insert(-37, at: 2)\n    arrayName2.insert(-37, at: 2)\n    ```\n\n\
  请注意，`append` 命令如何将数据添加到数组末尾，而 `insert` 命令则可以将数据添加到数组中的特定位置，如图 9-2 所示。\n\n![A437923_1_En_9_Fig2_HTML.jpg](img/A437923_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2. 向数组添加数据的两种方式\n\n### 从数组中删除元素\n\n正如你可以向数组添加元素一样，你也可以从数组中删除元素。要删除数组中的最后一个元素，你可以使用\
  \ `removeLast` 命令，如下所示：\n\n```\narrayName.removeLast()\n```\n\n这不仅能删除数组中的最后一个元素，还会返回该值。如果你想将数组的最后一个元素保存到变量中，可以这样做：\n\
  \n```\nvar item = arrayName.removeLast()\n```\n\n如果你想从数组中删除一个特定元素，可以使用 `remove(at:)`\
  \ 命令并指定该元素的索引编号，如下所示：\n\n```\narrayName.remove(at: number)\n```\n\n因此，如果你想删除数组中的第二个元素，需要指定索引为\
  \ 1。与 `removeLast` 命令一样，`remove(at:)` 命令也会返回一个值，你可以将其存储在变量中，如下所示：\n\n```\nvar item\
  \ = arrayName.remove(at: 1)\n```\n\n如果你想删除数组中的所有元素，可以使用 `removeAll` 命令，如下所示：\n\n\
  ```\narrayName.removeAll()\n```\n\n要了解如何从数组中删除元素，请按照以下步骤操作：\n\n1.  确保 IntroductoryPlayground\
  \ 文件已在 Xcode 中加载。\n2.  按如下方式编辑代码：\n\n    ```\n    import Cocoa\n    var arrayName\
  \ = Int\n    var item = arrayName.removeLast()\n    print (arrayName)\n    print\
  \ (item)\n    item = arrayName.remove(at: 1)\n    print (arrayName)\n    print (item)\n\
  \    arrayName.removeAll()\n    ```\n\n请注意在从数组中删除元素时不同命令的工作方式，如图 9-3 所示。在指定索引值时，你必须确保索引编号存在。这意味着，如果一个数组包含三个元素，第一个元素的索引为\
  \ 0，第二个为 1，第三个为 2。因此，你只能从该数组中删除索引为 0、1 或 2 的元素，任何其他索引编号都将无效。\n\n![A437923_1_En_9_Fig3_HTML.jpg](img/A437923_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3. 从数组中删除元素\n\n从数组中删除元素会将这些元素从数组中物理移除。除了删除数组中的元素，你也可以用新值替换现有元素。你只需指定要替换的数组元素的索引值，并为其分配新数据即可，如下所示：\n\
  \n```\narrayName[index] = newData\n```\n\n因此，如果你想替换数组中的第二个元素（索引值为 1），可以执行以下操作：\n\
  \n```\narrayName[1] = 91\n```\n\n存储在数组索引 1 处的任何现有值都会被数字 `91` 替换。替换数据时，新数据的数据类型必须与数组中的其他元素相同，例如整数或字符串。\n\
  \n### 查询数组\n\n当你拥有一个数组时，你可能想知道该数组是否为空（其中存储了零个元素），或者如果数组不为空，它包含多少个元素。要确定数组是否为空，可以使用返回布尔值的\
  \ `isEmpty` 命令，如下所示：\n\n```\narrayName.isEmpty\n```\n\n如果你想将此布尔值存储在变量中，可以这样做：\n\n\
  ```\nvar flag = arrayName.isEmpty\n```\n\n如果你想知道数组中存储了多少个元素，可以使用 `count` 命令，如下所示：\n\
  \n```\narrayName.count\n```\n\n如果你想将此整数值存储在变量中，可以这样做：\n\n```\nvar total = arrayName.count\n\
  ```\n\n### 操作数组\n\n操作数组的两种常见方法是反转所有元素的顺序，或者按升序或降序重新排列元素。这仅仅是反转数组中所有元素的顺序，而不考虑它们的实际值，例如：\n\
  \n```\narrayName.reversed()\n```\n\n当你按升序对数组进行排序时，最小值存储在数组的第一个元素中，最大值存储在数组的最后一个元素中。当你对字符串进行排序时，Swift\
  \ 会按字母顺序排序。要按升序对数组排序，请使用：\n\n```\nmyArray.sort { $0 < $1 }\n```\n\n当你按降序对数组进行排序时，最大值存储在数组的第一个元素中，最小值存储在数组的最后一个元素中。当你对字符串进行排序时，Swift\
  \ 会按反向字母顺序排序。要按降序对数组排序，请使用：\n\n```\nmyArray.sort { $1 < $0 }\n```\n\n要了解反转和排序数组的工作原理，请按照以下步骤操作：\n\
  \n1.  确保 IntroductoryPlayground 文件已在 Xcode 中加载。\n2.  按如下方式编辑代码：\n\n    ```\n   \
  \ import Cocoa\n    var myArray = [\"Bob\", \"Fred\", \"Alice\", \"Mary\"]\n   \
  \ let backwardsArray : [String]\n    backwardsArray = myArray.reversed()\n    myArray.sort\
  \ { $0 < $1 }\n    print (myArray)\n    myArray.sort { $1 < $0 }\n    print (myArray)\n\
  \    ```\n\n请注意，反转数组仅仅是重新排列元素，而排序数组则是根据元素内容实际改变其位置，如图 9-4 所示。\n\n![A437923_1_En_9_Fig4_HTML.jpg](img/A437923_1_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4. 对数组进行排序和反转\n\n\n\n## 使用字典\n\n数组适用于存储相关数据的列表。当你想要检索特定数据时，数组的最大缺点就暴露出来了。除非你知道数组中某个条目的确切索引号，否则检索数据会十分繁琐。\n\
  \n这正是字典的用途所在。与仅存储数据的数组不同，字典存储两段数据，称为键值对。`值`（value）代表你想要保存的数据，而`键`（key）代表一种快速检索数据的方式。\n\
  \n例如，考虑一个电话号码列表。如果你将电话号码存储在数组中，就必须知道确切的索引值才能检索到特定的电话号码。然而，如果你将电话号码存储在字典中，就可以将每个电话号码（值）与一个姓名（键）一起存储。现在，如果你想检索某个特定的电话号码，只需查找键（该人的姓名）即可。\n\
  \n无论数据在字典中存储于何处，你都可以使用键快速检索到值。这使得从字典中检索数据比从数组中检索类似数据要容易得多。\n\n你可以把字典想象成数组，但它不是存储一段数据，而是存储一对数据（一个键和一个值）。键和值可以是不同的数据类型，但字典中的所有键和所有值必须分别是同一种数据类型。\n\
  \n要创建一个字典，你需要定义字典本身及其键和关联值的数据类型。一种定义字典的方式如下：\n\n```\nvar DictionaryName = [keyDataType:\
  \ valueDatatype]()\n```\n\n这定义了一个空字典，但指定了键和值的数据类型。\n\n第二种定义字典的方式是创建一个键值对列表，如下所示：\n\
  \n```\nvar DictionaryName = [102: \"Fred\", 87: \"Valerie\"]\n```\n\n当你直接赋值键值对时，Swift\
  \ 会推断键和值的数据类型。在这个例子中，键的数据类型是整数（`Int`），值的数据类型是字符串（`String`）。\n\n### 向字典添加条目\n\n无论字典是空的还是已有数据，你都可以通过指定字典名称及其键，然后赋值来向字典添加更多条目，例如：\n\
  \n```\nDictionaryName[key] = value\n```\n\n要了解如何创建字典并向其中添加数据，请按照以下步骤创建一个新的 playground：\n\
  \n1. 在 Xcode 中打开 `IntroductoryPlayground` 文件。\n2. 如下编辑代码：\n\n    ```\n    import\
  \ Cocoa\n    var DictionaryName = [102: \"Fred\", 87: \"Valerie\"]\n    DictionaryName[120]\
  \ = \"John\"\n    DictionaryName[96] = \"Jane\"\n    print(DictionaryName)\n   \
  \ ```\n\n这段 Swift 代码定义了一个键值数据类型为 `Int:String` 的字典，该类型由 Swift 根据字典中初始存储的数据类型推断得出。\n\
  \n接下来的两行定义了一个键（`120`）和一个值（`\"John\"`），该键值对被存入字典。然后另一行定义了一个键（`96`）和一个值（`\"Jane\"\
  `），也同样存入字典。最后的 `print` 命令让你看到字典的变化，如图 9-5 所示。\n\n![A437923_1_En_9_Fig5_HTML.jpg](img/A437923_1_En_9_Fig5_HTML.jpg)\n\
  \n**图 9-5.** 创建一个字典并添加新的键值对数据\n\n### 检索和更新字典中的数据\n\n一旦字典包含键值对，你就可以使用键来检索值。具体做法是指定字典名称和一个键，然后将此值赋给一个变量，例如：\n\
  \n```\nvariable = DictionaryName[key]!\n```\n\n该变量的数据类型必须与字典中存储的值的数据类型相同。同时请注意感叹号，它定义了一个隐式解包变量。这个感叹号确保如果字典中不存在该键，不存在的值不会导致程序崩溃。\n\
  \n下面的示例在字典中定义了两个键值对数据。然后它使用键 `87` 从字典中检索值，即字符串 `\"Valeria\"`，如图 9-6 所示。\n\n![A437923_1_En_9_Fig6_HTML.jpg](img/A437923_1_En_9_Fig6_HTML.jpg)\n\
  \n**图 9-6.** 使用键检索值并使用新数据更新现有键\n\n```\nvar DictionaryName = [102: \"Fred\", 87:\
  \ \"Valerie\"]\nvar name: String\nname = DictionaryName[87]!\nprint(name)\n```\n\
  \n一旦你在字典中存储了一个键值对，就可以使用 `updateValue` 命令为现有键分配新值，如下所示：\n\n```\nDictionaryName.updateValue(value,\
  \ forKey: key)\n```\n\n因此，如果你想更新与键 `87` 关联的值，可以这样做：\n\n```\nDictionaryName.updateValue(\"\
  Sam\", forKey: 87)\n```\n\n要了解如何从字典中使用键检索值，然后更新现有键的值，请遵循以下步骤：\n\n1. 确保 `IntroductoryPlayground`\
  \ 文件已在 Xcode 中加载。\n2. 如下编辑代码：\n\n    ```\n    import Cocoa\n    var DictionaryName\
  \ = [102: \"Fred\", 87: \"Valerie\"]\n    DictionaryName[120] = \"John\"\n    DictionaryName[96]\
  \ = \"Jane\"\n    print(DictionaryName)\n    var name: String\n    name = DictionaryName[87]!\n\
  \    print(name)\n    DictionaryName.updateValue(\"Sam\", forKey: 87)\n    name\
  \ = DictionaryName[87]!\n    print(name)\n    ```\n\n请注意，第一次字典检索与键 `87` 关联的值时，返回字符串\
  \ `\"Valerie\"`。然后 `updateValue` 命令用 `\"Sam\"` 替换了 `\"Valerie\"`，所以下次字典检索与键 `87`\
  \ 关联的值时，将返回字符串 `\"Sam\"`，如图 9-6 所示。\n\n### 删除字典中的数据\n\n一旦字典包含键值对，你可以使用 `removeValue(forKey:key)`\
  \ 命令删除与特定键关联的值，如下所示：\n\n```\nDictionaryName.removeValue(forKey: key)\n```\n\n`removeValue(forKey:key)`\
  \ 命令会同时移除键及其关联的值。请注意，如果你指定的键在字典中不存在，`removeValue(forKey:key)` 命令不会执行任何操作。\n\n如果你想删除字典中的所有键值对，可以直接使用\
  \ `removeAll` 命令，如下所示：\n\n```\nDictionaryName.removeAll()\n```\n\n\n\n#### 查询字典\n\
  \n在字典中存储键值对后，你可以使用以下命令获取字典的相关信息：\n\n- `count`：统计字典中存储的键值对数量\n- `keys`：检索字典中存储的所有键的列表\n\
  - `values`：检索字典中存储的所有值的列表\n\n`count` 命令只需提供字典名称，并返回一个整数值，你可以将其赋值给变量，例如：\n\n```\n\
  var total = DictionaryName.count\n```\n\n`keys` 和 `values` 命令需要提供字典名称，并返回一个项目列表，你可以将其存储在数组中，例如：\n\
  \n```\nlet myKeys = Array(DictionaryName.keys)\n```\n\n要了解如何从字典中统计和检索键与值，请按以下步骤操作：\n\
  \n1.  确保 `IntroductoryPlayground` 文件已在 Xcode 中加载。\n2.  按如下方式编辑代码：\n\n    ```\n \
  \   import Cocoa\n    var myDictionary = [12: \"Joe\", 7: \"Walter\"]\n    myDictionary.removeValue(forKey:\
  \ 7)\n    print (myDictionary)\n    myDictionary.removeAll()\n    print (myDictionary)\n\
  \    myDictionary = [25: \"Stephanie\", 98: \"Nancy\"]\n    print (myDictionary.count)\n\
  \    let myKeys = Array(myDictionary.keys)\n    let myValues = Array(myDictionary.values)\n\
  \    ```\n\n注意，`removeValueForKey` 命令用于移除一个已有的键值对，而 `removeAll` 命令则清空整个字典。另外，`count`\
  \ 命令统计所有键值对的数量，而 `keys` 和 `values` 命令分别返回键和值的列表，如图 9-7 所示。\n\n![A437923_1_En_9_Fig7_HTML.jpg](img/A437923_1_En_9_Fig7_HTML.jpg)\n\
