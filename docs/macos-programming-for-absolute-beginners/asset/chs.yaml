  ## 关于技术审校者




  '
- "# 1. 理解编程\n\n编程无非就是为计算机编写一步步的指令，让计算机遵循执行。如果你曾经写下做菜的步骤，或者为假期时照顾宠物草拟过注意事项，那么你已经走过了编写程序的基本步骤。关键在于：明确你想要实现的目标，然后确保写出正确的指令，告诉别人如何达成这个目标。\n\
  \n尽管编程在理论上很简单，但细节却可能让你栽跟头。首先，你需要确切知道自己想要什么。如果你想做的是鸡肉炒面菜谱，按照烤三文鱼的菜谱来操作可不会管用。\n\n\
  其次，你需要写下从起点到预期结果所需的每一条指令。如果你跳过一步或指令顺序写错，就无法得到相同的结果。试想一下，当驾车前往餐厅的路线说明遗漏了告诉你在哪条路转弯时，即使\
  \ 99%的指令都是正确的，但只要有一条指令出错，你就无法到达目标。\n\n目标越简单，就越容易实现。编写一个在屏幕上显示计算器的程序，远比编写一个监控核电站安全系统的程序简单得多。程序越复杂，你需要编写的指令就越多；需要编写的指令越多，遗漏指令、写错指令或指令顺序出错的概率就越大。\n\
  \n编程不过是一种控制计算机解决问题的方式，无论这台计算机是笔记本电脑、智能手机、平板电脑还是智能手表。在开始编写自己的程序之前，你需要理解编程的基本原理。\n\
  \n> **注意**\n> 不要把学习编程和学习某种特定的编程语言搞混了。实际上，你甚至可以在完全不碰计算机的情况下学习编程的原理。一旦理解了编程原理，你就能轻松学会任何特定的编程语言，比如\
  \ Swift。\n\n## 编程原理\n\n要编写一个程序，你必须写出计算机能够执行的指令。无论程序做什么事，或者程序有多庞大，世界上的每一个程序都不过是由计算机一步步依次执行的指令组成的。最简单的程序可能只有一行，例如：\n\
  \n```\nprint (\"Hello, world!\")\n```\n\n显然，只有一行指令的程序做不了太多事，因此大多数程序都由多行指令（或代码）组成，例如：\n\
  \n```\nprint (\"Hello, world!\")\nprint (\"Now the program is done.\")\n```\n\n\
  这个两行程序从第一行开始执行，接着执行第二行的指令，然后停止。当然，你可以不断向程序中添加指令，直到拥有上百万条指令，计算机可以依次一条一条地执行。\n\n按顺序列出指令是编程的基础。不幸的是，这也有局限性。例如，如果你想把同一条消息打印五次，可以使用以下代码：\n\
  \n```\nprint (\"Hello, world!\")\nprint (\"Hello, world!\")\nprint (\"Hello, world!\"\
  )\nprint (\"Hello, world!\")\nprint (\"Hello, world!\")\n```\n\n重复写五条相同的指令既繁琐又冗余，但确实能行得通。如果你想把同一条消息打印一千次呢？你就得把同一条指令写上一千遍。\n\
  \n多次编写相同的指令显得很笨拙。为了让编程更轻松，目标是用最少的指令完成最多的工作。避免重复编写相同指令的一种方法是利用编程的另一个基本原——**循环**。\n\
  \n循环的思想是重复执行一条或多条指令多次，但只需要把这些指令写一次。典型的循环可能如下所示：\n\n```\nfor i in 1...5 {\nprint\
  \ (\"Hello, world!\")\n}\n```\n\n第一行告诉计算机将循环重复五次。第二行告诉计算机在屏幕上打印消息“Hello, world”。第三行定义了循环的结束。\n\
  \n现在，如果你想让计算机把一条消息打印一千次，就不需要把同一条指令写一千遍了。相反，你只需修改循环的重复次数：\n\n```\nfor I in 1...1000\
  \ {\nprintln (\"Hello, world!\")\n}\n```\n\n虽然循环在阅读和理解上比顺序指令稍微复杂一些，但它让你更容易重复执行指令，而无需反复编写相同的指令。\n\
  \n大多数程序并非纯粹地按顺序或循环列出指令，而是将两者结合使用，例如：\n\n```\nprint (\"Hello, world!\")\nprint (\"\
  Now the program is starting.\")\nfor I in 1...1000 {\nprint (\"Hello, world!\")\n\
  }\n```\n\n在这个例子中，计算机按顺序执行前两行，然后循环重复执行最后三行。通常，当你只需要计算机执行一次指令时，按顺序列出指令就足够了。当你需要计算机多次运行指令时，就需要使用循环。\n\
  \n计算机的强大之处不仅在于能按顺序或循环执行指令，更在于能做出决策。决策意味着计算机需要评估某个条件，然后根据该条件决定下一步该做什么。\n\n例如，你可以编写一个程序，除非有人输入正确的密码，否则将其锁定在计算机之外。如果输入了正确的密码，程序就授予访问权限。但如果输入了错误的密码，程序就阻止访问计算机。以下是一个此类决策的示例：\n\
  \n```\nif password == \"secret\" {\nprint (\"Access granted!\")\n} else {\nprint\
  \ (\"Login denied!\")\n}\n```\n\n\n\n在这个例子中，计算机询问密码，当用户输入密码时，计算机会检查它是否与单词“secret”匹配。如果匹配，计算机就授予该用户访问权限。如果用户没有输入“secret”，则计算机拒绝访问。\n\
  \n做出决策是让编程变得灵活的原因。如果你编写一系列顺序指令，计算机会每次都完全相同地执行这些指令列表。然而，如果你加入决策指令（也称为分支指令），那么计算机就可以根据用户的操作做出响应。\n\
  \n以电子游戏为例。没有任何游戏可以完全由顺序组织的指令编写而成，因为那样游戏每次都会以完全相同的方式运行。相反，电子游戏需要随时根据玩家的行为进行调整。如果玩家将物体向左移动，游戏需要做出与向右移动或不移动不同的响应。使用分支指令赋予了计算机做出不同反应的能力，从而使程序永远不会有完全相同的运行方式。\n\
  \n要编写计算机程序，你需要以下列三种方式之一组织指令，如图 1-1 所示。\n\n![A437923_1_En_1_Fig1_HTML.jpg](img/A437923_1_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1. 编程的三种基本构建块\n\n- **顺序执行**：计算机一条接一条地执行指令。\n- **循环**：计算机重复执行一条或多条指令。\n- **分支**：计算机根据外部数据选择执行一组或多组指令。\n\
  \n虽然简单的程序可能只以顺序方式组织指令，但每个大型程序都会以顺序、循环和分支的方式组织指令。使编程更像一门艺术而非科学的，正是没有唯一的“最佳”方式来编写程序。事实上，完全有可能编写出两个行为完全相同但代码不同的程序。\n\
  \n由于没有唯一的“正确”方式来编写程序，因此只有一些指导原则来帮助你轻松编写程序。最终，重要的是你编写出一个能正常工作的程序。\n\n在编写任何程序时，通常存在两个往往相互排斥的目标。首先，程序员努力编写易于阅读、理解和修改的程序。这通常意味着要编写多条指令，清晰地定义解决特定问题所需的步骤。\n\
  \n其次，程序员试图编写能高效执行任务的程序，使程序尽可能快地运行。这通常意味着要使用技巧或利用鲜为人知的特性，尽可能压缩多条指令，即使这些特性难以理解，甚至会让经验丰富的程序员感到困惑。\n\
  \n在起步阶段，要努力让你的程序尽可能清晰、符合逻辑且易于理解，即使为此你不得不编写更多或更长的指令。之后，随着你积累更多的编程经验，你可以致力于创建最小、最快、最高效的程序，但请记住，你的最终目标是编写出能正常工作的程序。\n\
  \n## 结构化编程\n\n小程序包含的指令较少，因此更容易阅读、理解和修改。不幸的是，小程序只能解决小问题。要解决复杂问题，你需要编写包含更多指令的更大程序。你输入的指令越多，出错（称为“bug”）的可能性就越大。更糟糕的是，程序越大，就越难理解其工作原理，以便日后进行修改。\n\
  \n为了避免编写一个庞大的单一程序，程序员只需将大型程序分解为更小的部分，称为子程序或函数。其思想是每个函数解决一个单一任务。这使得编写变得简单，并能确保它正常工作。\n\
  \n当所有独立函数都正常工作后，你可以将它们连接起来创建一个单一的大型程序，如图 1-2 所示。这就像用砖块建造房子，而不是试图从一块巨大的岩石中凿出一整栋房子。\n\
  \n![A437923_1_En_1_Fig2_HTML.jpg](img/A437923_1_En_1_Fig2_HTML.jpg)\n\n图 1-2. 将大型程序划分为多个子程序或函数有助于使编程更可靠\n\
  \n将大型程序划分为较小的程序有几个好处。首先，编写较小的函数既快又容易，并且小型函数使得指令易于阅读、理解和修改。\n\n其次，函数像构建块一样协同工作，因此多个程序员可以分别处理不同的函数，然后将这些独立的函数组合起来创建一个大型程序。\n\
  \n第三，如果你想修改一个大型程序，只需取出、重写并替换一个或多个函数即可。如果没有函数，修改大型程序就意味着要翻阅存储在大型程序中的所有指令，并试图找到需要更改的那些指令。\n\
  \n函数的第四个好处是，如果你编写了一个有用的函数，可以将该函数插入到其他程序中。通过创建一个经过测试的、有用的函数库，你可以通过重用现有代码快速轻松地创建其他程序，从而减少从头开始编写所有内容的需要。\n\
  \n当你将一个大型程序划分为多个函数时，你可以选择：将所有函数存储在一个文件中，或者将每个函数存储在单独的文件中，如图 1-3 所示。通过将函数存储在单独的文件中，多个程序员可以处理不同的文件而不会影响到他人。\n\
  \n![A437923_1_En_1_Fig3_HTML.jpg](img/A437923_1_En_1_Fig3_HTML.jpg)\n\n图 1-3. 你可以将函数存储在一个文件或多个文件中\n\
  \n将所有函数存储在一个文件中，可以方便地查找和修改程序的任何部分。然而，程序越大，你需要编写的指令就越多，这会使在单个大文件中搜索变得笨拙，就像翻阅一本未按字母顺序排列的词典来查找特定单词一样。\n\
  \n此外，将所有函数存储在一个文件中会使得多个程序员无法分别处理程序的不同部分，因为每个程序员都需要使用同一个文件。\n\n将所有函数存储在单独的文件中，意味着你需要跟踪哪个文件包含哪个函数。然而，这样做的好处是修改函数要容易得多，因为一旦你打开正确的文件，你只会看到单个函数的指令，而不是十几个或更多其他函数的指令。\n\
  \n由于当今的程序可能变得非常庞大，因此通常将函数存储在单独的文件中。\n\n\n\n## 事件驱动编程\n\n在计算机早期时代，大多数程序的工作方式是：从第一条指令开始，逐行执行，直到结束。这样的程序在任何时刻都严格地控制着计算机的行为。\n\
  \n当计算机开始显示带有窗口和下拉菜单的图形用户界面，以便用户能够在任何时刻自由选择操作时，这一切都发生了改变。突然间，每个程序都必须等待用户执行某个操作，比如选择菜单命令或点击按钮。现在，程序必须对用户的操作做出响应。\n\
  \n用户每次执行的操作都被视为一个**事件**。用户点击鼠标左键，与点击鼠标右键是完全不同的事件。程序不再规定用户在任何时刻能做什么，而是必须对用户触发的不同事件做出响应。使程序能够响应不同事件的方法，就称为**事件驱动编程**。\n\
  \n事件驱动编程将一个大型程序拆分为多个函数，每个函数负责响应一个特定的事件。如果用户点击了一个菜单命令，一个函数就会执行其指令；如果用户点击了一个按钮，另一个函数就会执行另一组指令。\n\
  \n事件驱动编程始终在等待并响应于用户的操作。\n\n## 面向对象编程\n\n将大型程序拆分为多个函数，使得创建和修改程序变得容易。然而，理解这样一个大型程序的工作原理常常令人困惑，因为没有简单的方法来确定哪些函数协同工作，或者它们可能需要从其他函数中获取哪些数据。\n\
  \n更糟糕的是，函数经常修改其他函数所使用的数据。这意味着有时一个函数会在另一个函数使用数据之前就修改了它。使用错误的数据会导致另一个函数运行失败，进而导致整个程序崩溃。这种情况不仅会降低软件的可靠性，还会使确定问题原因和修复位置变得更加困难。\n\
  \n为了解决这个问题，计算机科学家们创建了**面向对象编程**。其目标是将大型程序拆分为更小的函数，但将相关的函数组织在一起，形成称为**对象**的组。为了让面向对象程序更容易理解，对象也对现实世界中的物理实体进行建模。\n\
  \n假设你需要编写一个程序来控制机器人。按任务划分这个问题，你可能会创建一个函数来移动机器人，第二个函数让机器人感知附近的障碍物，第三个函数计算最佳的移动路径。如果机器人的移动出现问题，你将无法判断问题出在控制移动的函数，还是控制机器人感知障碍物的函数，抑或是计算最佳路径的函数。\n\
  \n如果将同样的机器人程序按对象划分，你可能会创建一个 `Legs` 对象（用于移动机器人），一个 `Eye` 对象（用于感知附近障碍物），以及一个 `Brain`\
  \ 对象（用于计算避开障碍物的最佳路径）。现在，如果机器人的移动出现问题，你可以将问题隔离在 `Legs` 对象所包含的代码中。\n\n除了在对象内部隔离数据，面向对象编程的第二个核心理念是让大型程序的复用和修改变得容易。假设你要将机器人的腿替换为履带。现在你必须修改用于移动机器人的函数，因为履带的行为与腿不同。接下来，你还必须修改计算障碍物最佳路径的函数，因为履带迫使机器人必须绕开障碍物，而腿则允许机器人跨越小障碍物并绕开较大的障碍物。\n\
  \n如果你想把机器人的腿换成履带，面向对象编程可以让你直接移除 `Legs` 对象，并用一个新的 `Treads` 对象替换它，而无需影响或修改组成程序其余部分的任何其他对象。\n\
  \n由于大多数程序会不断被修改，以修复错误（通常称为 bug）或添加新功能，面向对象编程允许你使用独立的功能模块（对象）来构建大型程序，并且只需修改单个对象就能修改整个程序。\n\
  \n面向对象编程的关键在于隔离程序的不同部分，并通过三个特性——**封装**、**继承**和**多态**来提升可复用性。\n\n## 封装\n\n封装的主要目的是保护并隔离程序的某一部分，使其不受程序其他部分的影响。为此，封装会隐藏数据，使其永远不会被程序的另一部分更改。此外，封装还会包含所有操作该对象内存储数据的函数。如果出现问题，封装可以轻松地将问题隔离在特定对象内。\n\
  \n每个对象都应该完全独立于程序的其他部分。对象将数据存储在**属性**中。操作这些属性的唯一方式是使用被称为**方法**的函数，这些方法也封装在同一个对象中。属性和方法组合在一起，并被隔离在对象内部，这使得使用对象作为构建块（building\
  \ blocks）来快速、可靠地创建大型程序成为可能，如图 1-4 所示。\n\n![A437923_1_En_1_Fig4_HTML.jpg](img/A437923_1_En_1_Fig4_HTML.jpg)\n\
  \n图 1-4. 对象将相关函数和数据封装在一起，对其他程序隐藏\n\n## 继承\n\n创建大型、复杂的程序很困难，而从零开始编写整个程序则让这项任务更加艰巨。这就是大多数程序员会重用现有程序部分代码的两个原因。首先，他们无需从头重写所需的功能。这意味着他们可以更快地创建大型程序。其次，他们可以使用已经过测试、证明能正确运行的代码。这意味着通过重用可靠的代码，他们可以更快地创建更可靠的软件。\n\
  \n代码重用的一个巨大问题在于，你绝不希望创建重复的副本。假设你复制了一个函数并将其粘贴到第二个位置。现在你在同一个程序的两个不同位置有了两份完全相同的代码。这不仅浪费空间，更重要的是，它可能在将来引发问题。\n\
  \n假设你发现某个函数中存在一个问题。要修复这个问题，你需要在你复制并粘贴了该代码的所有位置都进行修复。如果你将这段代码复制并粘贴到了程序中的另外两个位置，你就必须找到这两个位置并修复代码。如果你将这段代码复制并粘贴到了程序中的一千个位置，你就必须找到这一千个不同的位置并逐一修复。\n\
  \n这不仅不方便且耗时，还增加了忽略某些代码，从而在该代码中遗留问题的风险。这会导致程序的可靠性降低。\n\n为了避免修复同一代码的多个副本的问题，面向对象编程使用了称为**继承**的机制。其核心理念是，一个对象可以使用存储在另一个对象中的所有代码，而无需物理地复制该代码。相反，一个对象从另一个对象**继承**代码，但该代码始终只存在一个副本。\n\
  \n现在你可以根据需要多次重用同一个代码副本。如果你需要修复一个问题，你只需要修复该代码一次，而这些更改会自动出现在任何通过继承重用该代码的对象中。\n\n基本上，继承让你可以在不创建物理代码副本的情况下重用代码。这使得代码重用变得容易，并且将来修改起来也很方便。\n\
  \n\n\n### 多态性\n\n每个对象都由数据（存储在属性中）和操作这些数据的函数（称为方法）组成。通过继承，一个对象可以使用另一个对象中定义的属性和方法。然而，当某个函数（方法）需要执行不同的代码时，继承可能会引发问题。\n\
  \n假设你正在开发一款电子游戏。你将汽车定义为一个对象，将怪物定义为第二个对象。如果怪物向汽车扔石头，那么石头就是第三个对象。为了让汽车、怪物和石头在屏幕上移动，你创建了一个名为\
  \ `Move` 的方法。\n\n不幸的是，汽车在屏幕上的移动方式需要与怪物或扔出的石头不同。你可以创建三个函数，分别命名为 `MoveCar`、`MoveMonster`\
  \ 和 `MoveRock`。然而，一个更简单的解决方案是让这三个函数都使用相同的名称，比如 `Move`。\n\n在传统编程中，你绝不能给两个或更多的函数起相同的名称，因为计算机不知道你想运行哪个函数。但在面向对象编程中，由于多态性的存在，你可以使用重复的函数名。\n\
  \n多态性允许你使用相同的方法名，但用不同的代码来替代它。多态性之所以有效，是因为每个 `Move` 函数（方法）都存储在不同的对象中——一个代表汽车的对象，一个代表怪物的对象，还有一个代表扔出的石头的对象。要运行每个\
  \ `Move` 函数，你需要指明包含你想使用的 `Move` 函数的对象，例如：\n\n```\nCar.Move\nMonster.Move\nRock.Move\n\
  ```\n\n通过同时指明你想要操作的对象以及你想要使用的函数，面向对象编程能够正确识别应运行哪一组指令，即使一个函数与另一个函数名称完全相同。\n\n本质上，多态性让你能够创建描述性的函数名，并在使用继承时随意地重复使用这个描述性的名称。\n\
  \n封装、继承和多态性的结合构成了面向对象编程的基础。封装将程序的某一部分与另一部分隔离开来。继承允许你复用代码。多态性则允许你重用方法名称，但使用不同的代码。\n\
  \n## 理解编程语言\n\n编程语言不过是一种表达思想的特定方式，就像西班牙语、阿拉伯语、中文或英语等人类语言一样。计算机科学家创造编程语言是为了解决特定类型的问题。这意味着一种编程语言可能非常适合解决某一类问题，但在解决另一类问题时可能表现极差。\n\
  \n最流行的编程语言是 C 语言，它被设计用于对计算机硬件进行底层访问。因此，C 语言非常适合创建操作系统、杀毒程序和硬盘加密程序。任何需要完全控制硬件的任务都是\
  \ C 语言的绝佳应用场景。\n\n不幸的是，C 语言可能晦涩难懂且功能简练，因为它被设计为追求计算机的最大效率，而不考虑人类阅读、编写或修改 C 程序的效率。为了改进\
  \ C 语言，计算机科学家创建了 C 的面向对象版本，即 C++。不久之后，出现了一个更精致的 C++ 版本，称为 Objective-C，这是苹果公司为 macOS\
  \ 和 iOS 编程所采用的语言。\n\n由于 C 语言最初的设计目的是牺牲人类效率来换取计算机效率，因此包括 C++ 和 Objective-C 在内的所有\
  \ C 语言变体也可能难以学习、使用和理解。这就是为什么苹果公司创建了 Swift。Swift 的目的是在提供 Objective-C 强大功能的同时，使其更易于学习、使用和理解。Swift\
  \ 基本上是 Objective-C 的改进版本，而 Objective-C 本身又是 C++ 的改进版本，C++ 则是 C 的改进版本。\n\n计算机编程的每一次演进都建立在先前的编程标准之上。当你用\
  \ Swift 编写程序时，你可以使用 Swift 的独特功能，同时结合面向对象编程、事件驱动编程、结构化编程以及编程的三大基本构件（顺序、循环和分支）。\n\n\
  Swift 与所有计算机编程语言一样，包含一个固定的命令列表，称为关键字。为了告诉计算机做什么，你使用关键字来创建语句，这些语句使计算机执行单个任务。\n\n\
  你已经见过 `print` 关键字，它用于打印文本，例如：\n\n```\nprint (\"Hello, world!\")\n```\n\n这个 Swift\
  \ 关键字是 `print`（意为打印）；然后你必须在括号内告诉关键字你要打印什么。就像学习人类语言需要首先学习用于书写字母的基本符号（如字母表或其他符号）一样，学习编程语言也需要首先学习该特定编程语言的关键字。\n\
  \n尽管 Swift 包含数十个关键字，但你不必为了用 Swift 编写程序而一次性全部学会。你最初只需要学习少数几个关键字。随着你经验越来越丰富，你会逐渐需要学习更多的\
  \ Swift 关键字。\n\n为了尽可能简化编程，Swift（像许多编程语言一样）使用看起来像普通英语单词的关键字，例如 `print` 或 `var`（variable\
  \ 的缩写）。然而，许多编程语言也使用代表不同功能的符号。\n\n常见的符号是数学符号，如加法（`+`）、减法（`-`）、乘法（`*`）和除法（`/`）。\n\n\
  为了标识协同工作的命令的起始和结束，Swift（像 C 语言一样）使用花括号将代码括起来，例如：\n\n```\n{\nprint (\"This is a message\"\
  );\n}\n```\n\n与人类语言不同，你可能拼错单词或忘记在句子末尾加句号，而人们仍然能理解你的意思，但编程语言可没那么宽容。对于编程语言，每个关键字都必须拼写正确，每个符号都必须用在需要的地方。拼错一个关键字、用错符号或将正确的符号放在错误的位置，都会导致整个程序无法运行。\n\
  \n编程语言是精确的。编程的关键在于编写。\n\n\n*   尽可能少的代码\n*   功能尽可能强大的代码\n*   尽可能易于理解的代码\n\n你希望编写尽可能少的代码，因为代码越少，就越容易确保其正确运行。\n\
  \n你希望代码功能尽可能强大，因为这能让你的程序具备解决更大问题的能力。\n\n你希望代码易于理解，因为这能让修复问题和添加功能变得容易。\n\n不幸的是，这三个标准常常相互矛盾，如图\
  \ 1-5 所示。\n\n![A437923_1_En_1_Fig5_HTML.jpg](img/A437923_1_En_1_Fig5_HTML.jpg)\n\
  \n图 1-5.\n\n编程中三个常常相互矛盾的目标\n\n如果你编写的代码尽可能少，这通常意味着你的代码功能有限。这就是程序员经常借助捷径和编程技巧来压缩代码量的原因，但这会增加代码的复杂度，使其更难理解。\n\
  \n如果你编写的代码功能尽可能强大，这通常意味着要编写大量的命令，这会使代码更难理解。\n\n如果你编写易于理解的代码，它通常功能有限。如果你编写更多代码来增强功能，这又会降低代码的可读性。\n\
  \n归根结底，计算机编程更像是一门艺术而非科学。通常，最好专注于让代码尽可能易于理解，因为这会使得修复问题和添加新功能更加容易。此外，易于理解的代码意味着，如果你无法亲自维护，其他程序员也能修复和修改你的程序。\n\
  \n这正是苹果公司创建 `Swift` 的原因：在不牺牲 `Objective-C` 强大功能的前提下，使代码比 `Objective-C` 更易于理解。尽管\
  \ `Swift` 比 `Objective-C` 更强大，但 `Swift` 代码通常可以比等效的 `Objective-C` 代码更短。因此，苹果未来的编程语言将是\
  \ `Swift`。\n\n## Cocoa 框架\n\n关键字（和符号）让你能够向计算机发出指令，但没有任何一种编程语言能提供创建所有类型程序所需的一切命令。为了提供额外的命令，程序员使用关键字来创建执行特定任务的函数。\n\
  \n当他们创建了一个有用的函数后，通常会将其保存在一个包含其他有用函数的库中。在编写程序时，你可以使用编程语言的关键字以及库中存储的任何函数。通过复用库中的函数，你可以创建更强大、更可靠的代码。\n\
  \n例如，一个库可能包含用于显示图形的函数。另一个库可能包含用于将数据保存到磁盘并重新读取数据的函数。还有的库可能包含用于计算数学公式的函数。为简化和 `macOS`\
  \ 及 `iOS` 程序的编写，苹果公司创建了一个名为 `Cocoa` 框架的实用函数库。\n\n复用现有框架有两个原因。首先，复用框架使你不必为完成别人已经解决的问题而编写自己的指令。框架不仅提供了现成的解决方案，而且已经过他人的测试，因此你可以直接使用框架，并确信它能正确运行。\n\
  \n使用现有框架的第二个原因是为了保持一致性。苹果提供了用于定义程序在屏幕上外观的框架，即用户界面。这定义了程序应如何运行，从在屏幕上显示窗口，到让你通过点击鼠标来调整窗口大小或关闭窗口。\n\
  \n你完全可以编写自己的指令来在屏幕上显示窗口，但编写自己的指令很可能需要耗费时间来创建和测试，最终得到的用户界面可能看起来或操作起来与其他 `macOS` 或\
  \ `iOS` 程序并不一致。\n\n然而，通过复用现有框架，你可以快速创建自己的程序，并确保你的程序与其他程序的行为方式一致。虽然编程听起来可能很复杂，但苹果提供了数百个预先编写并经过测试的函数，可以帮助你快速、轻松地创建程序。你只需编写那些能让你的程序解决特定、独特问题的自定义指令即可。\n\
  \n要理解苹果的 `Cocoa` 框架是如何工作的，你需要了解面向对象编程，这有两个原因。首先，`Swift` 是一种面向对象的编程语言，因此要充分利用 `Swift`\
  \ 的优势，你需要理解面向对象编程的好处。\n\n其次，苹果的 `Cocoa` 框架基于面向对象编程。要理解如何使用 `Cocoa` 框架，你需要使用对象。\n\
  \n注意\n\n`Cocoa` 框架是为创建 macOS 程序而设计的。一个名为 `Cocoa Touch` 的类似框架是为创建 iOS 应用而设计的。由于 `Cocoa\
  \ Touch` 框架（iOS）基于 `Cocoa` 框架（macOS），它们的工作方式相似，但提供了不同的功能。\n\n通过依赖 `Cocoa` 框架，你的程序在苹果每次更新和改进\
  \ `Cocoa` 框架时都能获得新功能。例如，拼写检查是 `Cocoa` 框架的一个内置功能。如果你使用 `Cocoa` 框架编写程序，你的程序会自动获得拼写检查能力，而无需你编写任何额外的代码。当苹果改进\
  \ `Cocoa` 框架中的拼写检查功能时，你的程序无需你付出任何额外努力就能自动获得这些改进。\n\n`Cocoa` 框架是一个总称，描述了苹果所有预先编写并经过测试的代码库。`Cocoa`\
  \ 框架的不同部分可以为你的程序提供音频播放能力、图形能力、联系人信息（如姓名和地址）存储能力以及互联网能力。\n\n`Cocoa` 框架构建了典型 macOS\
  \ 程序的基础。你只需编写使你的程序独一无二的 `Swift` 代码即可。\n\n\n\n## 视图-模型-控制器设计\n\n虽然可以编写一个大型程序并将所有代码存储在一个文件中，但这会让查找程序中的任何内容变得困难得多。更好的解决方案是将大型程序划分为多个部分，并将相关的部分存储在单独的文件中。这样，你就能快速找到需要修改的程序部分，并且便于多个程序员协作，因为一个程序员可以处理一个文件，而另一个程序员可以处理另一个文件。\n\
  \n将程序划分为多个文件时，最好保持条理清晰。就像你可能会把袜子放在一个抽屉里，把 T 恤放在另一个抽屉里，以便轻松找到所需衣物一样，你也应该将程序组织成多个文件，使每个文件只包含相关的数据。这样，你就能快速轻松地找到需要修改的文件。\n\
  \n文件中存储的数据类型通常归为三类，如图 1-6 所示：\n\n![A437923_1_En_1_Fig6_HTML.jpg](img/A437923_1_En_1_Fig6_HTML.jpg)\n\
  \n图 1-6. 将程序划分为模型-视图-控制器设计\n\n* 视图（用户界面）\n* 模型\n* 控制器\n\n视图或用户界面是用户所看到的内容。每个用户界面的目的是显示信息、接收数据以及接受用户的命令。在过去，程序员通常通过编写代码来创建用户界面。虽然在`Swift`中仍可如此操作，但这样做既耗时、又容易出错，并且缺乏一致性，因为一个程序员的用户界面可能在视觉和行为上与另一个程序员的用户界面不完全相同。\n\
  \n更好的选择是以可视化的方式设计用户界面，而这正是`Xcode`的功能。只需在用户界面上绘制按钮、文本字段和菜单等对象，`Xcode`就会自动创建一个无错误、外观一致的用户界面，仅需几秒钟即可完成。当你使用`Xcode`创建用户界面时，实际上是在使用\
  \ Apple 的`Cocoa`框架来完成。\n\n用户界面本身看起来不错，但没有任何功能。要使程序执行有用的操作，你需要编写解决特定问题的代码。例如，一个彩票选取程序可能会分析最近选出的号码，并确定下周最有可能被选中的号码。代码中计算有用结果的部分称为模型。\n\
  \n模型实际上与视图（用户界面）完全分离。这使得修改用户界面而不影响模型（反之亦然）变得容易。通过尽可能地将程序的不同部分相互隔离，可以减少修改程序时出现错误的几率。\n\
  \n由于模型始终与视图完全分离，因此需要控制器。当用户在用户界面中选择命令或输入数据时，控制器从视图中获取这些信息并将其传递给模型。\n\n模型响应这些数据或命令，并计算出新的结果。然后，它将计算结果发送给控制器，再由控制器将其传回视图进行显示，供用户查看。视图和模型始终保持完全分离。\n\
  \n使用`Xcode`，这意味着你将大部分`Swift`代码编写并存储在定义程序模型的文件中。如果你正在计算中奖彩票号码，用于执行这些计算的`Swift`代码将存储在模型中。\n\
  \n你还需要在控制器文件中编写并存储`Swift`代码。在简单程序中，你可能只有一个视图。在更复杂的程序中，你可能有几个视图。每个视图通常需要一个控制器文件来控制该视图。因此，第二个编写和存储`Swift`代码的地方是控制器文件。\n\
  \n在简单程序中，常见做法是将模型与控制器合并到一个文件中。然而，对于更大、更复杂的程序，最好为模型创建一个（或多个）文件，并为每个控制器创建一个文件。控制器文件的数量通常等于构成用户界面的视图数量。\n\
  \n一旦你将程序清晰地划分为模型、视图和控制器，就可以通过用一个新文件替换另一个文件来快速、轻松地修改程序。例如，如果你想修改用户界面，只需设计一个不同的视图，将其连接到你的控制器，就大功告成了，无需触碰模型文件。\n\
  \n如果你想修改模型以添加新功能，只需更新模型文件并将其连接到控制器，无需触碰视图。\n\n事实上，这正是程序员为`macOS`和`iOS`创建程序的方式。他们的模型保持不变。他们所做的只是为`macOS`编写一个控制器和视图，并为`iOS`编写一个控制器和视图。然后，他们就可以使用完全相同的模型创建`macOS`和`iOS`应用。\n\
  \n\n## 程序员是如何工作的\n\n早期，一名程序员可以产生一个想法，然后直接编写代码让这个程序运行起来。如今，程序要复杂得多，用户期望也高得多，因此在编写任何代码之前，你需要先设计你的程序。事实上，大多数程序员实际上并不会花大量时间编写或编辑代码。相反，程序员的大部分时间都用于思考、规划、组织和设计程序。\n\
  \n当程序员有了一个程序构想时，第一步是判断这个想法是否真的有价值。程序必须解决特定类型的问题。例如，文字处理软件让编写、编辑和格式化文本变得容易。电子表格软件让输入数字并根据这些数字计算结果变得简单。演示文稿软件让输入文本和插入图形来创建幻灯片变得方便。甚至电子游戏也是通过提供具有挑战性的谜题或目标让玩家去达成，来解决缓解无聊的问题。\n\
  \n> **注意**  \n> 软件开发最大的失败是未能定义要解决的具体问题。软件开发第二大的失败是确定了要解决的具体问题，但却低估了解决该问题所需步骤的复杂性。你必须知道要解决什么问题以及如何解决这个问题。如果你两者都不知道，就无法编写出有用的程序。\n\
  \n一旦你有了要解决的问题的想法，下一步就是定义如何解决这个问题。有些问题实在过于困难而无法解决。例如，你怎么写一个程序来写一本畅销小说？你也许可以写一个程序来帮助你写小说，但除非你确切知道如何可预测地创作出一本畅销小说，否则你根本无法写出这样的程序。\n\
  \n知道要解决的问题就是你的目标。一旦你清楚理解了你的问题，你需要找出解决该问题所需的所有步骤。如果你不知道如何解决某个特定问题，那么你也就无法告诉计算机如何解决这个问题。\n\
  \n在定义了解决问题所需的步骤之后，现在你终于可以编写程序了。通常，你会分部分编写程序，并在继续之前测试每个部分。通过这种方式，你逐步扩展程序的功能，同时确保每个部分都能正确工作。\n\
  \n使用 `Xcode` 时，你经历的主要步骤是：\n\n- 编写代码和设计用户界面\n- 编辑代码和用户界面\n- 运行和测试你的程序\n\n当你的程序终于完成时，猜猜看？它永远不会真正完成。总会有需要修复的错误，以及想要添加的新功能。程序员实际上花在编辑和修改现有程序上的时间，比他们创建新程序的时间还要多。\n\
  \n当你编写和编辑代码时，你会使用一个编辑器，这是一个类似于文字处理程序的程序，可以让你输入和编辑文本。当你设计和修改用户界面时，你会使用 `Xcode` 中一个名为\
  \ `Interface Builder` 的功能，它类似于一个绘图程序，可以让你在屏幕上拖拽、放置和调整对象大小。当你运行和测试程序时，你会使用编译器，它将你的\
  \ `Swift` 代码转换（或编译）成一个实际可运行的 `macOS` 程序。\n\n要创建一个 `macOS` 程序，你只需要一份 `Xcode` 的副本，这是苹果公司提供的免费编程工具，你可以从\
  \ `Mac App Store` 下载。在 `Macintosh` 上安装了 `Xcode` 后，你只需学习 `Xcode` 和 `Swift`，就可以免费创建自己的程序。\n\
  \n### 总结\n\n要学习如何为 `Macintosh` 编写程序，你需要学习几种不同的技能。首先，你需要理解编程的基本原理。这包括将指令组织成顺序、循环或分支结构，并理解结构化编程技术、事件驱动编程和面向对象编程。\n\
  \n其次，你需要学习一门特定的编程语言。对于 `Macintosh`，你将学习 `Swift`。这意味着你将学习 `Swift` 中使用的关键字，并学习如何在不同文件中编写和组织你的\
  \ `Swift` 代码。\n\n第三，你需要知道如何使用 `Xcode`，这是苹果公司用于创建 `macOS` 和 `iOS` 应用的编程工具。`Xcode`\
  \ 让你能够编写和编辑 `Swift` 代码，同时还能让你以可视化方式设计并修改用户界面。\n\n第四，你需要学习如何使用苹果的 `Cocoa` 框架，这样你就可以专注于编写让程序实现独特功能的指令。\n\
  \n无论你是想编写自己的软件进行销售，还是想出售你的编程技能为他人创建定制软件，你都会发现编程是一项任何人都能学会的技能。\n\n请记住，编程无非就是解决问题。通过了解如何使用\
  \ `Swift` 和 `Xcode` 来解决问题，你就能为自己创建 `Macintosh` 程序，而且会比想象中更容易也更快。\n\n\n"
- "# 2. 初识 Xcode 8\n\n要在 Macintosh 上使用 Swift 编写程序，你需要用到 Xcode。Apple 将 Xcode 开发为一款专业的编程工具，并免费提供，以鼓励大家为\
  \ macOS 以及其他の操作系统（如 iOS、tvOS 和 watchOS）编写软件。尽管 Xcode 是免费程序，但它功能强大，被包括 Microsoft、Adobe、Google\
  \ 乃至 Apple 在内的各大公司所使用。在 Macintosh 上安装了 Xcode，你就拥有了创建 macOS 程序以及 iOS、tvOS 和 watchOS\
  \ 应用的最强大的编程工具之一。\n\n虽然 Xcode 包含数十项专为专业程序员设计的功能，但任何人都可以学会使用它。Xcode 繁多的功能乍看之下可能令人困惑甚至望而生畏，但请放心。使用\
  \ Xcode，你无需学会所有功能。相反，你只需学会需要的那一小部分功能，并忽略其他所有功能。随着经验增长，你可以逐渐学习 Xcode 的其他功能。然而，你可能永远也用不上\
  \ Xcode 的全部功能。\n\nXcode 能让你从头到尾创建一个 macOS 程序或 iOS、tvOS、watchOS 应用，而无需使用其他任何程序。在\
  \ Xcode 中，你可以执行以下操作：\n\n-   创建新项目。\n-   编写和编辑 Swift 代码。\n-   设计并修改用户界面。\n-   管理组成单个项目的文件。\n\
  -   运行并测试你的项目。\n-   调试你的 Swift 代码。\n\n你可以通过 Mac App Store 免费下载并安装 Xcode。在你的 Macintosh\
  \ 上，只需点击 Apple 菜单并选择 \"App Store\"。当 App Store 窗口出现后，点击右上角的搜索文本字段，输入 `Xcode`，然后按\
  \ Return 键。点击 Xcode 图标下方的按钮进行下载，如图 2-1 所示。由于 Xcode 是一个相当大的文件，你需要快速的网络连接和足够的磁盘空间才能将其安装到你的\
  \ Macintosh 上。\n\n![A437923_1_En_2_Fig1_HTML.jpg](img/A437923_1_En_2_Fig1_HTML.jpg)\n\
  \n**图 2-1.** 当你搜索 Xcode 时，它通常出现在 App Store 窗口的左上角\n\n你将经常使用的 Xcode 的四个最主要部分是：\n\n\
  -   项目管理器\n-   编辑器\n-   Interface Builder\n-   编译器\n\n一个项目代表一个单独的 macOS、iOS、tvOS\
  \ 或 watchOS 程序。在过去程序简单的年代，你可以将代码存储在一个单独的文件中。如今程序变得庞大且复杂得多，将代码存储在单独的文件中更为普遍。协同工作的文件集合构成一个项目，因此\
  \ Xcode 项目管理器允许你在项目中创建、重新排列和删除文件。\n\n每个项目都包含一个代码文件，以其 `.swift` 文件扩展名标识。代码文件是你存储、编辑和键入\
  \ Swift 代码的地方。通过使用 Xcode 的编辑器，你可以打开代码文件，复制和粘贴代码，删除代码，以及编写新代码并保存到该文件中。编辑器本质上就像一个简单的文字处理器，专门为帮助你用\
  \ Swift 编程语言编写代码而设计。\n\n除了包含 Swift 代码的代码文件外，每个项目还包含一个用户界面，该界面存储在另一个以 `.xib` 或 `.storyboard`\
  \ 文件扩展名标识的单独文件中。一个简单的程序可能只有一个包含其用户界面的文件，但一个更复杂的程序可能有几个包含用户界面不同部分的文件。Xcode 中让你设计、创建和修改用户界面的功能称为\
  \ Interface Builder。\n\n在你编写了 Swift 代码并设计了用户界面之后，你需要将项目中的所有文件转换成一个实际可运行的程序。将 Swift\
  \ 代码翻译成计算机能理解的语言（称为机器码）的过程称为编译，因此 Xcode 中执行此操作的部分被称为编译器。\n\n你经常会以不同的顺序使用 Xcode 的这四个主要部分。例如，你可能使用项目管理器功能创建一个项目并修改其文件。然后，你可能使用编辑器编写\
  \ Swift 代码，并使用 Interface Builder 设计用户界面。最后，你将使用编译器测试你的程序。如果出现问题，你可能会多次回到编辑器或 Interface\
  \ Builder，直到程序正常运行。你甚至可能创建新文件并在项目管理器中重新排列它们。\n\n归根结底，使用 Xcode 没有唯一的“最佳”或“正确”方式。Xcode\
  \ 提供了功能供你在需要时使用。\n\n## 向 Xcode 下达指令\n\n与许多程序一样，Xcode 提供多种方式来完成完全相同的任务。例如，要打开一个项目，你可以选择\
  \ \"文件\" ➤ \"打开\" 或按下 `Command + O`。通常，Xcode 提供三种方式来执行常见类型的命令：\n\n-   使用屏幕顶部菜单栏中的下拉菜单。\n\
  -   按下独特的按键组合，如 `Command + O`。\n-   点击代表某个命令的图标。\n\n下拉菜单有助于你找到特定命令，但使用起来可能较慢且笨拙，因为你需要点击菜单标题拉出菜单，然后点击菜单上出现的命令。\n\
  \n按键组合更快更便捷，但它们迫使你记忆常用命令的晦涩按键组合。为了帮助你了解哪些命令有按键组合，查看每个下拉菜单，你会看到不同命令右侧显示的按键组合，如图 2-2\
  \ 所示。（但并非所有命令都有按键组合。）\n\n![A437923_1_En_2_Fig2_HTML.jpg](img/A437923_1_En_2_Fig2_HTML.jpg)\n\
  \n**图 2-2.** 按键组合显示在下拉菜单中命令的右侧\n\n按键组合通常包括一个修饰键加一个字母或功能键。四个修饰键包括 Command、Control、Option\
  \ 和 Shift，如图 2-3 所示。\n\n![A437923_1_En_2_Fig3_HTML.jpg](img/A437923_1_En_2_Fig3_HTML.jpg)\n\
  \n**图 2-3.** 用于表示常见修饰键的符号\n\n点击图标选择命令可能是所有方法中最快的，但你必须知道每个图标所代表的命令。为了帮助你理解图标的作用，只需将鼠标指针移到图标上并等待几秒钟。会出现一个小窗口，简要描述该图标的用途，见图\
  \ 2-4。\n\n![A437923_1_En_2_Fig4_HTML.jpg](img/A437923_1_En_2_Fig4_HTML.jpg)\n\n\
  **图 2-4.** 将鼠标指针悬停在图标上会显示该图标功能的简要描述\n\n有些人只使用下拉菜单，另一些人更依赖图标和按键快捷方式，还有一些人会混合使用这三种方法。通常，人们从下拉菜单开始，但当他们开始频繁使用相同命令时，会逐渐转向图标和按键快捷方式。\n\
  \n选择你喜欢的任何方法，但要意识到几乎总是有替代方案。重点是让你通过自己喜欢的方式熟练使用 Xcode，这样你就能花更多时间进行创造性工作，而减少寻找所需命令的时间。\n\
  \n\n\n## 修改 Xcode 窗口\n\n由于 Xcode 提供了众多功能，其窗口有时会显得杂乱。为了简化 Xcode 的外观，你有以下几种选择：\n\n\
  -   调整 Xcode 窗口大小，使其变大（或变小）。\n-   关闭面板以隐藏 Xcode 的某些部分。\n-   打开面板以查看 Xcode 的某些部分。\n\
  \n与所有 Macintosh 窗口一样，调整 Xcode 窗口大小最直接的方式是将鼠标指针移到 Xcode 窗口的边缘或角落，直到鼠标指针变为双向箭头。然后拖动鼠标即可调整窗口大小。\n\
  \n调整 Xcode 窗口大小的第二种方法是点击 Xcode 窗口左上角的绿色圆点。这会将 Xcode 窗口扩展到全屏，同时隐藏 Xcode 菜单栏。要退出全屏模式，只需将鼠标指针移到屏幕顶部，使\
  \ Xcode 菜单栏再次出现，然后再次点击窗口左上角的绿色圆点即可。\n\n调整 Xcode 窗口大小的第三种方法是选择 `窗口 ➤ 缩放`。这会在将 Xcode\
  \ 窗口扩展至填满屏幕（同时仍显示 Xcode 菜单栏）和将 Xcode 窗口缩小回之前大小之间切换。\n\n为了减少任何时刻显示的信息量，Xcode 提供了三个可以隐藏（或打开）的面板，如图\
  \ 2-5 所示：\n\n![A437923_1_En_2_Fig5_HTML.jpg](img/A437923_1_En_2_Fig5_HTML.jpg)\n\
  \n图 2-5. Xcode 的导航面板、调试面板和工具面板\n\n-   **导航面板**：显示关于你项目的信息。\n-   **调试区域**：允许你查找程序中的错误或缺陷。\n\
  -   **工具面板**：允许你自定义用户界面中的不同项目。\n\n导航面板上显示多个图标，让你可以在不同类型的信息视图之间切换。导航面板最常见的用途是通过显示项目导航器，让你选择要打开的文件。要在隐藏和显示导航面板之间切换，你有三种选择：\n\
  \n-   选择 `视图 ➤ 导航器 ➤ 显示/隐藏导航器`。\n-   按下 `Command + 0`（数字零）。\n-   点击 Xcode 窗口右上角的“显示/隐藏导航面板”图标，如图\
  \ 2-6 所示。\n\n![A437923_1_En_2_Fig6_HTML.jpg](img/A437923_1_En_2_Fig6_HTML.jpg)\n\
  \n图 2-6. “显示/隐藏导航面板”图标\n\n当你想要检查程序是否正常运行时会用到调试区域。当你设计用户界面或编写 Swift 代码时，你可能希望隐藏这个调试区域。要在隐藏和显示调试区域之间切换，你有三种选择：\n\
  \n-   选择 `视图 ➤ 调试区域 ➤ 显示/隐藏调试区域`。\n-   按下 `Shift + Command + Y`。\n-   点击 Xcode 窗口右上角的“显示/隐藏调试区域”图标，如图\
  \ 2-7 所示。\n\n![A437923_1_En_2_Fig7_HTML.jpg](img/A437923_1_En_2_Fig7_HTML.jpg)\n\
  \n图 2-7. “显示/隐藏调试区域”图标\n\n工具面板上显示多个图标，让你可以在显示不同类型的信息之间切换。工具面板最常见的用途是帮助你设计并修改用户界面。要在隐藏和显示工具面板之间切换，你有三种选择：\n\
  \n-   选择 `视图 ➤ 工具 ➤ 显示/隐藏工具`。\n-   按下 `Option + Command + 0`（数字零）。\n-   点击 Xcode\
  \ 窗口右上角的“显示/隐藏工具”图标，如图 2-8 所示。\n\n![A437923_1_En_2_Fig8_HTML.jpg](img/A437923_1_En_2_Fig8_HTML.jpg)\n\
  \n图 2-8. “显示/隐藏工具”图标\n\n通过有选择地显示或隐藏导航面板、调试区域或工具面板，你可以让 Xcode 窗口看起来不那么杂乱，并为你想查看的\
  \ Xcode 部分提供更多空间。要快速打开或隐藏这三个面板，点击 Xcode 窗口右上角的“显示/隐藏导航器”、“调试区域”或“工具”图标通常是最快的方式。\n\
  \n\n\n## 创建与管理文件\n\n当你需要创建项目（代表一个全新的程序）或文件（添加到现有项目中）时，有两种选择：\n\n- 选择 **文件** ➤ **新建**\
  \ 显示子菜单，如图 2-9 所示。\n\n![A437923_1_En_2_Fig9_HTML.jpg](img/A437923_1_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9. **文件** ➤ **新建**命令会显示一个子菜单，让你选择创建文件或项目\n\n- 在导航器面板中右键点击任意文件，弹出上下文菜单，如图 2-10\
  \ 所示。\n\n![A437923_1_En_2_Fig10_HTML.jpg](img/A437923_1_En_2_Fig10_HTML.jpg)\n\n\
  图 2-10. 在导航器面板中右键点击文件会弹出菜单，让你选择创建文件\n\n> **注意**：部分 Macintosh 电脑可能禁用了右键点击功能。你可以按住\
  \ `Control` 键同时点击来模拟右键点击。要开启右键点击，请点击苹果菜单，选择系统偏好设置，然后点击鼠标或触控板图标。接着选中“辅助点按”复选框即可开启右键功能。\n\
  \n创建新文件时，你可以选择该文件适用于 macOS、iOS、tvOS 或 watchOS 项目。本书中，你将始终为 macOS 创建文件。\n\n除了选择为\
  \ macOS 创建文件外，你还需要选择创建的文件类型。最常见的两种文件类型是：用于存放 Swift 代码的文件（归类在“源代码”类别下，如图 2-11 所示），以及用于存放用户界面的文件（归类在“用户界面”类别下，如图\
  \ 2-12 所示）。\n\n![A437923_1_En_2_Fig12_HTML.jpg](img/A437923_1_En_2_Fig12_HTML.jpg)\n\
  \n图 2-12. 你可以创建的第二种文件类型用于存放程序的部分用户界面\n\n![A437923_1_En_2_Fig11_HTML.jpg](img/A437923_1_En_2_Fig11_HTML.jpg)\n\
  \n图 2-11. 你可以创建的一种文件类型用于存放 Swift 代码\n\n当你创建文件后，该文件会出现在项目导航器中。导航器面板实际上可以显示多种不同类型的信息，但最常见的是项目导航器，它会列出组成项目的所有文件。要在导航器面板中打开项目导航器，你有三种选择：\n\
  \n- 选择 **视图** ➤ **导航器** ➤ **显示项目导航器**。\n- 按下 `Command` + `1`。\n- 点击 **显示项目导航器**\
  \ 图标，如图 2-13 所示。\n\n![A437923_1_En_2_Fig13_HTML.jpg](img/A437923_1_En_2_Fig13_HTML.jpg)\n\
  \n图 2-13. 项目导航器面板会列出组成项目的所有文件\n\n项目导航器与访达非常相似，会显示文件和文件夹。要重命名文件或文件夹，只需选中它并按 `Return`\
  \ 键即可编辑名称。\n\n要移动文件或文件夹，只需用鼠标将其拖拽到新位置。\n\n要选中一个或多个项目，请按住 `Command` 键并点击文件或文件夹。\n\
  \n与访达一样，项目导航器允许你将文件组织到文件夹中。这样可以让你将相关文件分组，并将其收纳到视线之外，以免杂乱地堆放在项目导航器中。要创建文件夹，请点击项目导航器中的文件或文件夹，然后执行以下任一操作：\n\
  \n- 选择 **文件** ➤ **新建** ➤ **组**（或选择**从所选内容创建组**，将选中的一个或多个文件存入文件夹）。\n- 按下 `Option`\
  \ + `Command` + `N`。\n- 在项目导航器中右键点击任意文件或文件夹，在弹出的菜单中选择**新建组**（或选择**从所选内容创建组**，将选中的一个或多个文件存入文件夹）。\n\
  \n要删除文件或文件夹，请选中它并执行以下任一操作：\n\n- 选择 **编辑** ➤ **删除**。\n- 按下 `Delete` 键或 `Command`\
  \ + `Backspace`。\n- 在项目导航器中右键点击任意文件或文件夹，在弹出的菜单中选择**删除**。\n\n> **注意**：删除文件或文件夹时，你有两个选项：**移除引用**（从项目中移除文件/文件夹，但不会从\
  \ Macintosh 中实际删除）或**移至废纸篓**（从项目中移除文件/文件夹，并从 Macintosh 中实际删除）。\n\n项目导航器最重要的用途或许就是让你能够编辑项目中的文件。当你点击项目导航器中的某个文件时，Xcode\
  \ 窗口的中间面板会显示所选文件的内容，这些内容要么是 Swift 代码，要么是你的用户界面（见图 2-14）。\n\n![A437923_1_En_2_Fig14_HTML.jpg](img/A437923_1_En_2_Fig14_HTML.jpg)\n\
  \n图 2-14. 在导航器面板中选择文件会显示该文件的内容\n\n\n\n## 创建和自定义用户界面\n\n`Utilities` 面板最常用于创建和自定义项目的用户界面。在\
  \ macOS 程序中，用户界面文件可以是以下两种类型之一：\n\n- `.xib` 文件\n- `.storyboard` 文件\n\n创建项目时，你可以选择要使用的类型。通常，`.xib`\
  \ 文件用于单窗口用户界面，而 `.storyboard` 文件用于按特定顺序链接显示的多个窗口。可以混合使用 `.xib` 和 `.storyboard` 文件来创建用户界面，或者只使用\
  \ `.xib` 或 `.storyboard` 文件。\n\n无论你使用 `.xib` 还是 `.storyboard` 文件，你都需要使用 `Utilities`\
  \ 面板来实现两个目的。首先，你需要将按钮、文本字段和图片等项拖放到用户界面上。其次，你需要通过更改这些用户界面项的名称、颜色或大小来自定义它们。\n\n要设计用户界面，你首先需要使用\
  \ `Object Library`，它出现在 `Utilities` 面板的底部，如图 2-15 所示。要打开 `Object Library`，你可以执行以下操作：\n\
  \n![A437923_1_En_2_Fig15_HTML.jpg](img/A437923_1_En_2_Fig15_HTML.jpg)\n\n图 2-15.\
  \ Object Library 包含不同的用户界面项\n\n- 选择 `View` ➤ `Utilities` ➤ `Show Object Library`。\n\
  - 按下 `Control` + `Option` + `Command` + `3`。\n- 点击 `Show Object Library` 图标。\n\n\
  要在 `Object Library` 中查找用户界面项，你可以简单地上下滚动列表。但是，如果你知道所需项的名称，更快的方法是在 `Object Library`\
  \ 窗口底部的 `Search` 字段中点击，输入所需项的全部或部分名称，然后按 `Return`。`Object Library` 将仅显示与你输入内容匹配的项。因此，如果你输入了\
  \ `\"Button\"`，`Object Library` 将只显示你可以添加到用户界面的不同按钮。\n\n在用户界面上放置了一个或多个项之后，第二步是使用\
  \ `Inspector` 面板自定义这些项。`Inspector` 面板可以显示多种类型的窗格，但你最常用于自定义用户界面项的两个是：\n\n- `Attributes\
  \ Inspector`\n- `Size Inspector`\n\n`Attributes Inspector` 允许你修改项的外观。`Size Inspector`\
  \ 允许你修改项在用户界面中的大小和位置。\n\n要打开 `Attributes Inspector`，你可以执行以下操作之一：\n\n- 选择 `View`\
  \ ➤ `Utilities` ➤ `Show Attributes Inspector`。\n- 按下 `Option` + `Command` + `4`。\n\
  - 点击 `Show Attributes Inspector` 图标，如图 2-16 所示。\n\n![A437923_1_En_2_Fig16_HTML.jpg](img/A437923_1_En_2_Fig16_HTML.jpg)\n\
  \n图 2-16. Show Attributes Inspector 和 Show Size Inspector 图标\n\n要打开 `Size Inspector`，你可以执行以下操作之一：\n\
  \n- 选择 `View` ➤ `Utilities` ➤ `Show Size Inspector`。\n- 按下 `Option` + `Command`\
  \ + `5`。\n- 点击 `Show Size Inspector` 图标，如图 2-16 所示。\n\n打开 `Attributes` 或 `Size Inspectors`\
  \ 后，你可以点击一个用户界面项（例如按钮或文本字段）来进行修改，然后输入或选择不同的选项来修改该项的外观。\n\n## 标准编辑器和辅助编辑器\n\n你将大部分时间花在使用编辑器或\
  \ `Interface Builder` 上。编辑器的功能类似于文字处理器，允许你输入和编辑 Swift 代码。`Interface Builder` 的功能类似于绘图程序，允许你在用户界面上拖放、调整大小和移动按钮、文本字段和图形等项。\n\
  \n要编辑 Swift 代码，只需在 `Project Navigator` 面板中点击任何包含 `.swift` 文件扩展名的文件。当你点击一个 `.swift`\
  \ 文件时，该文件的内容会显示在 Xcode 窗口的中间窗格中，如图 2-17 所示。\n\n![A437923_1_En_2_Fig17_HTML.jpg](img/A437923_1_En_2_Fig17_HTML.jpg)\n\
  \n图 2-17. 点击一个 `.swift` 文件会显示该文件中存储的 Swift 代码\n\n要编辑你的用户界面，只需在 `Project Navigator`\
  \ 面板中点击任何包含 `.xib` 或 `.storyboard` 文件扩展名的文件。这会将该用户界面的内容显示在 Xcode 窗口的中间窗格中，如图 2-18\
  \ 所示。\n\n![A437923_1_En_2_Fig18_HTML.jpg](img/A437923_1_En_2_Fig18_HTML.jpg)\n\n\
  图 2-18. 点击一个 `.xib` 或 `.storyboard` 文件会显示该文件中存储的用户界面\n\n每次你在 `Project Navigator`\
  \ 面板中点击不同的文件时，Xcode 都会在 Xcode 窗口的中间窗格中显示该新文件的内容。\n\n当 Xcode 在其中间窗格中显示单个文件的内容时，这被称为\
  \ `Standard Editor`。但是，并排查看两个文件的内容通常很有用。当 Xcode 并排显示两个文件内容时，第二个文件窗格被称为 `Assistant\
  \ Editor`。\n\n打开 `Assistant Editor` 最常见的原因是你将用户界面显示在左侧窗格中，将 Swift 文件显示在右侧窗格中，如图\
  \ 2-19 所示。这样做的目的是让你将用户界面链接到 Swift 代码。\n\n![A437923_1_En_2_Fig19_HTML.jpg](img/A437923_1_En_2_Fig19_HTML.jpg)\n\
  \n图 2-19. Assistant Editor 并排显示两个文件内容\n\n当你创建用户界面时，它完全独立于你的 Swift 代码（反之亦然）。这让你可以自由地用新的用户界面替换旧用户界面，而不会影响\
  \ Swift 代码的行为方式。同样，这也允许你修改 Swift 代码，而无需担心影响用户界面。\n\n在过去，程序员必须使用代码来创建用户界面，这意味着更改代码经常会影响用户界面，增加了程序出错或出现\
  \ bug 的可能性。通过将用户界面与代码分离，Xcode 消除了这个问题，并帮助你创建更可靠的软件。\n\n当你最初创建用户界面时，它不会执行任何操作。这就是为什么你需要将一些用户界面项链接到使界面实际工作的\
  \ Swift 代码。例如，如果你的用户界面显示一个按钮，点击该按钮不会执行任何操作。你必须编写 Swift 代码来告诉该按钮要做什么。然后，你必须将你的按钮链接到你的\
  \ Swift 代码。\n\n这就是 `Assistant Editor` 的目的。通过将你的用户界面显示在你的 Swift 代码文件旁边，`Assistant\
  \ Editor` 使得从用户界面拖拽鼠标到 Swift 代码文件变得容易，从而在用户界面和 Swift 代码之间建立链接。\n\n要打开 `Assistant\
  \ Editor`，你可以选择以下方式之一：\n\n- 选择 `View` ➤ `Assistant Editor` ➤ `Show Assistant Editor`。\n\
  - 按下 `Option` + `Command` + `Return`。\n- 点击 `Assistant Editor` 图标，如图 2-20 所示。\n\n\
  ![A437923_1_En_2_Fig20_HTML.jpg](img/A437923_1_En_2_Fig20_HTML.jpg)\n\n图 2-20. Standard\
  \ 和 Assistant Editor 图标\n\n要关闭 `Assistant Editor`，你必须通过以下方式之一打开 `Standard Editor`。\n\
  \n\n\n*   选择`View ➤ Standard Editor ➤ Show Standard Editor`。\n*   按下`Command + Return`。\n\
  *   点击`Standard Editor`图标（如图 2-20 所示）。\n\n使用 Assistant Editor 的一个问题是，Xcode 将两个文件的内容都显示在狭窄的窗格中。如果你希望以更宽的视图查看两个或多个文件，可以在单独的标签页中显示它们。这样你可以在\
  \ Xcode 的中间窗格中查看每个文件的内容，只需点击标签页即可查看不同文件的内容。\n\n标签页的缺点是你一次只能看到一个文件的内容。第二个缺点是你无法在\
  \ Swift 代码旁边看到用户界面，因此无法将用户界面元素连接到你的 Swift 代码。\n\n要创建一个标签页，请选择以下方式之一：\n\n*   选择`File\
  \ ➤ New ➤ Tab`。\n*   按下`Command + T`。\n\n现在你可以点击每个标签页来查看该文件的内容。要关闭一个标签页，将鼠标移到该标签页上，然后选择以下方式之一：\n\
  \n*   点击标签页左侧的关闭图标（看起来像一个大的`X`）。\n*   右键点击标签页，在弹出的菜单中点击`Close Tab`，如图 2-21 所示。\n\
  \n![A437923_1_En_2_Fig21_HTML.jpg](img/A437923_1_En_2_Fig21_HTML.jpg)\n\n图 2-21。\n\
  \n右键点击标签页会显示一个弹出菜单\n\n## 运行程序\n\n通常你会多次运行程序来测试并确保它工作正常。当你运行程序时，Xcode 会将其编译成一个文件，如果你愿意，可以分发给其他人。运行程序让你可以直接在\
  \ Macintosh 上测试你的程序。\n\n运行程序有三种方式：\n\n*   选择`Product ➤ Run`。\n*   按下`Command + R`。\n\
  *   点击`Run`图标，如图 2-22 所示。\n\n    ![A437923_1_En_2_Fig22_HTML.jpg](img/A437923_1_En_2_Fig22_HTML.jpg)\n\
  \n    图 2-22。\n\n    `Run`和`Stop`图标让你可以测试你的 macOS 项目\n\n程序运行后，你可以通过几种方式停止它：\n\n\
  *   选择`YourProgramName ➤ Quit`（其中“`YourProgramName`”是你的项目名称）。\n*   点击 Dock 上代表你程序的图标，然后按下`Command\
  \ + Q`。\n*   点击 Xcode 中的`Stop`图标（见图 2-22）。\n\n如果你的程序有严重错误，导致无法响应任何命令，你也可以使用`Force\
  \ Quit`命令来关闭程序。要使用`Force Quit`，请点击 Apple 菜单并选择`Force Quit`。\n\n当`Force Quit`窗口出现时，点击你的程序名称，然后点击`Force\
  \ Quit`按钮将其关闭。\n\n### 总结\n\n本章向你介绍了 Xcode 的主要功能，并展示了选择常用命令的各种方式。暂时不必担心记住或完全理解本章的所有内容。将本章视为对\
  \ Xcode 的介绍，当你遇到问题时可以随时参考。\n\n在下一章中，你将实际经历使用 Xcode 创建 macOS 程序的典型过程。这样你就可以看到本章所学各种\
  \ Xcode 功能的目的。\n\n请记住，使用 Xcode 时，选择完全相同的命令通常有两种或更多方式，但你不必学会所有这些不同的方法。选择你最喜欢的方法，忽略其他方法。\n\
  \n正如你所看到的，Xcode 提供了将你的想法转变为完全功能化的 macOS 程序所需的一切，你可以将其出售并分发给他人。通过学习 Xcode，你将学会使用专业程序员用来创建\
  \ macOS、iOS、tvOS 或 watchOS 软件的编程工具。你使用 Xcode 越多，就会越得心应手，Xcode 用户界面的压迫感也会越少。很快你就会像专业人士一样使用\
  \ Xcode。\n\n请记住，编程的真正关键不是拥有最好的编程工具，而是知道如何使用它们。你使用 Xcode 越多，就越能理解如何将你的好想法变成真正可运行的程序。学习\
  \ Xcode 是你为 Macintosh 和苹果众多其他设备（如 iPhone、iPad、Apple Watch 和 Apple TV）编写软件的途径。通过今天学习\
  \ Xcode，你可以抓住现在乃至未来许多有利可图的编程机会。\n\n欢迎来到 Xcode 的世界！\n\n"
- "# 3. 创建 Mac 程序的基础\n\n无论你想创建哪种类型的 macOS 程序，例如视频游戏或专为牙医或房地产经纪人定制的程序，你总是会经历相同的基本步骤。首先，你需要创建一个\
  \ macOS 项目。这会创建一个包含通用用户界面的基本 macOS 程序。\n\n其次，你需要以两种方式定制这个通用的 macOS 程序：向用户界面添加元素，以及编写\
  \ Swift 代码使程序真正执行某些操作。\n\n第三，你需要运行并测试你的程序。在运行和测试程序之后，你可能需要不断地返回并修改用户界面或 Swift 代码，以修复问题并添加新功能。最终你的程序会达到一个完整的阶段（暂时），然后你可以发布它。然后你会再次重复这些基本步骤，以添加更多新功能。\n\
  \n通常，你花在修改程序上的时间会比创建新程序的时间多。然而，创建小程序来测试不同的功能是很有用的。一旦这些较小的实验性程序能够运行，你就可以将它们添加到另一个程序中。通过这样做，你不会冒着破坏一个正在工作的程序的风险。\n\
  \n\n\n## 创建项目\n\n创建程序的第一步是新建一个项目。创建项目时，Xcode 会提供多种模板供你选择，这些模板提供了基础功能，你只需对其进行个性化定制。macOS\
  \ 模板分为三大类，如图 3-1 所示：\n\n![A437923_1_En_3_Fig1_HTML.jpg](img/A437923_1_En_3_Fig1_HTML.jpg)\n\
  \n*图 3-1. 创建项目时可供选择的三种 macOS 模板类别*\n\n- 应用程序 (Application)\n- 框架与库 (Framework &\
  \ Library)\n- 其他 (Other)\n\n大多数情况下，你会选择“应用程序”类别中的模板。其中最常用的模板是 **Cocoa 应用程序**，它可以创建一个带有下拉菜单和窗口的标准\
  \ macOS 程序。\n\n其他两种应用程序模板是“游戏”（用于创建视频游戏）和“命令行工具”（用于创建无需传统图形用户界面的程序）。\n\n“框架与库”类别用于创建可复用的软件库。“其他”类别则适用于创建插件或驱动程序等不属于前两类的程序。\n\
  \n在本书中，你将始终使用 macOS 应用程序类别下的 **Cocoa 应用程序**。其他 macOS 类别专为高级程序员设计，本书将不予涉及。\n\n创建\
  \ Cocoa 应用程序项目时，你需要定义几个项目，如图 3-2 所示：\n\n![A437923_1_En_3_Fig2_HTML.jpg](img/A437923_1_En_3_Fig2_HTML.jpg)\n\
  \n*图 3-2. 定义 Cocoa 应用程序项目*\n\n- 产品名称\n- 使用的编程语言（`Objective-C` 或 `Swift`）\n- 是否为用户界面使用故事板\n\
  - 是否创建基于文档的应用程序\n- 是否使用 Core Data\n\n产品名称完全由你决定，但应具有描述性，因为 Xcode 会以你选择的名称命名文件夹来存储所有文件。\n\
  \n组织名称和标识符同样是自定义的，通常从你的 Apple 开发者账号中获取。如果你愿意，这两者也可以使用任意字符串，但如果你计划通过 Mac App Store\
  \ 分发程序，则应将它们与你的 Apple 开发者账号关联。\n\n“语言”弹出菜单允许你选择 `Objective-C` 或 `Swift`。在本书中，你将始终选择\
  \ `Swift`。`Objective-C` 是 Apple 仍在支持的一种更复杂的编程语言，但已不再是 Apple 的官方编程语言。\n\n“使用故事板”复选框允许你创建包含单个窗口（如果取消勾选“使用故事板”，则为\
  \ `.xib` 文件）或一系列链接在一起的窗口（如果勾选“使用故事板”，则为 `.storyboard` 文件）的用户界面。我将在本书后面介绍创建用户界面的这两种方法。\n\
  \n“创建基于文档的应用程序”选项意味着 Xcode 会创建一个能打开和管理多个窗口的 Cocoa 应用程序，例如文字处理软件中的多个窗口。管理多个窗口更为复杂，因此除非你需要创建能够打开并在窗口中显示多个文档的程序，否则请保留“创建基于文档的应用程序”复选框为空。在本书中，请保持此复选框未选中。\n\
  \n“使用 Core Data”复选框用于存储数据，通常用于数据库应用程序，如姓名和地址列表。大多数情况下，除非你的程序需要存储数据，否则请保持此复选框未选中。在本书中，请保持此复选框未选中。\n\
  \n“包含单元测试”和“包含 UI 测试”复选框允许你对 Swift 代码和用户界面设计进行测试，以确保其正常工作。在本书中，请保持“包含单元测试”和“包含 UI\
  \ 测试”复选框为空。\n\n准备好创建你的第一个 macOS 程序了吗？请按照以下步骤操作：\n\n1. 启动 Xcode。如果出现“欢迎使用 Xcode”屏幕（如图\
  \ 3-3 所示），请点击“创建新的 Xcode 项目”。如果欢迎屏幕未出现，请选择“文件”➤“新建”➤“项目”，或选择“窗口”➤“欢迎使用 Xcode”以显示此屏幕，然后选择“创建新的\
  \ Xcode 项目”。Xcode 会显示项目模板列表（参见图 3-1）。\n\n   ![A437923_1_En_3_Fig3_HTML.jpg](img/A437923_1_En_3_Fig3_HTML.jpg)\n\
  \n   *图 3-3. 欢迎使用 Xcode 的启动屏幕*\n\n2. 在 macOS 类别下点击“应用程序”。将出现一个包含不同 macOS 应用程序模板的列表。\n\
  \n3. 点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 现在会询问你的项目名称（参见图 3-2）。\n\n4. 点击“产品名称”文本框，并输入\
  \ `MyFirstProgram`。\n\n5. 点击“语言”弹出菜单，确保显示的是 `Swift`。\n\n6. 确保所有复选框都处于未选中状态，然后点击“下一步”按钮。Xcode\
  \ 现在会询问你希望将项目存储在哪里。\n\n7. 点击一个文件夹来存放你的 Xcode 项目，然后点击“创建”按钮。恭喜！你刚刚创建了你的第一个 macOS\
  \ 程序。至此，Xcode 已经创建了一个通用的 Macintosh 程序，而你甚至还没有编写一行 `Swift` 代码或设计用户界面，就已经创建了一个可以实际运行的程序。\n\
  \n8. 选择“产品”➤“运行”，按下 `Command + R`，或点击“运行”图标。Xcode 会运行你命名为 `MyFirstProgram` 的程序，如图\
  \ 3-4 所示。请注意，`MyFirstProgram` 显示了一个包含下拉菜单的菜单栏和一个你可以在屏幕上移动或调整大小的窗口。因为你使用了 Cocoa 应用程序模板，Xcode\
  \ 自动创建了运行一个通用 Macintosh 程序所需的全部代码。\n\n   ![A437923_1_En_3_Fig4_HTML.jpg](img/A437923_1_En_3_Fig4_HTML.jpg)\n\
  \n   *图 3-4. MyFirstProgram 运行中*\n\n9. 选择 `MyFirstProgram` ➤ 退出 `MyFirstProgram`。Xcode\
  \ 界面重新出现。请保持 `MyFirstProgram` 项目在 Xcode 中打开，以便进行下一节的操作。\n\n你几乎无需动手，就成功创建了一个外观和行为都像典型\
  \ Macintosh 程序的程序。当然，这个极简的 Macintosh 程序还无法做任何有趣的事情，直到你自定义用户界面并编写 `Swift` 代码，让它真正发挥效用。\n\
  \n\n\n## 设计用户界面\n\n在设计用户界面时，请牢记任何用户界面都具备的三个目的：\n\n- 向用户显示信息\n- 从用户处获取数据\n- 让用户向程序下达命令\n\
  \n当你设计用户界面时，每个元素都必须满足这些标准之一。颜色和线条可能看起来只是装饰性的，但它们可以用来组织用户界面，使用户知道在哪里找到信息、如何输入数据，或如何向程序下达命令。\n\
  \n要在 Xcode 中创建用户界面，你需要遵循一个两步流程：\n\n- 使用对象库将项目拖放到你的用户界面上。\n- 使用检查器面板自定义每个用户界面项目。\n\
  \n为了了解如何使用对象库，让我们向 `MyFirstProgram` 用户界面添加一个标签、一个文本字段和一个按钮。标签将向用户显示文本，文本字段将允许用户输入数据，而按钮将使程序从文本字段中获取文本，将其修改为每个字符都大写，然后将修改后的大写文本放入标签中。\n\
  \n为此，请按照以下步骤操作：\n\n1. 确保你的 `MyFirstProgram` 项目已加载到 Xcode 中。\n2. 选择“显示”➤“导航器”➤“显示项目导航器”，或按\
  \ Command + 1 查看组成 `MyFirstProgram` 项目的所有文件列表。\n3. 点击 `MainMenu.xib` 文件。Xcode 会显示用户界面。请注意，在点击\
  \ `MyFirstProgram` 图标之前，`MyFirstProgram` 的实际窗口是不可见的。\n4. 点击出现在项目导航器与用户界面之间窗格中的窗口图标。这将显示\
  \ `MyFirstProgram` 用户界面的窗口，如图 3-5 所示。\n\n![A437923_1_En_3_Fig5_HTML.jpg](img/A437923_1_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5. 窗口图标显示 `MyFirstProgram` 用户界面\n\n5. 选择“显示”➤“实用工具”➤“显示对象库”。对象库出现在 Xcode 窗口的右下角。\n\
  6. 从对象库中拖出一个按钮，并将其拖放到 `MyFirstProgram` 窗口的底部附近。请注意，当你将按钮放在窗口中间且靠近底部时，会出现蓝色参考线以帮助你对齐用户界面项目，如图\
  \ 3-6 所示。\n\n![A437923_1_En_3_Fig6_HTML.jpg](img/A437923_1_En_3_Fig6_HTML.jpg)\n\
  \n图 3-6. 使用蓝色参考线将按钮放置在 `MyFirstProgram` 窗口底部附近\n\n7. 在对象库的搜索字段中点击，然后输入 `label`。请注意，对象库现在只显示标签用户界面项目，如图\
  \ 3-7 所示。\n\n![A437923_1_En_3_Fig7_HTML.jpg](img/A437923_1_En_3_Fig7_HTML.jpg)\n\
  \n图 3-7. 在搜索字段中键入内容可帮助您轻松找到对象库中的项目\n\n8. 从对象库中拖放一个标签到 `MyFirstProgram` 窗口的中间。\n\
  9. 点击出现在对象库底部搜索字段右侧的清除图标（灰色圆圈中的 X）。对象库现在显示所有可能的用户界面项目。\n10. 滚动对象库，直到找到文本字段项目。\n\
  11. 将文本字段拖放到标签上方，使你的整个用户界面显示如图 3-8 所示。（不必担心每个用户界面项目的精确位置。）\n\n![A437923_1_En_3_Fig8_HTML.jpg](img/A437923_1_En_3_Fig8_HTML.jpg)\n\
  \n图 3-8. `MyFirstProgram` 用户界面上的一个标签、文本字段和按钮\n\n此时，你已经自定义了通用用户界面。现在你必须使用检查器面板自定义每个用户界面项目。通过检查器面板，你可以为用户界面项目选择不同的选项，例如输入按钮的确切宽度或为文本字段选择背景颜色。\n\
  \n在调整用户界面上项目的大小或移动项目时，你可以在大小检查器面板中输入精确值，或者直接拖动鼠标来调整大小或移动项目。两种方法都可以接受，但大小检查器面板能让你对项目进行精确控制。让我们看看如何使用检查器面板自定义通用用户界面。\n\
  \n1. 点击 `MyFirstProgram` 窗口底部附近的按钮以选中它。\n2. 选择“显示”➤“实用工具”➤“显示属性检查器”。属性检查器面板出现在 Xcode\
  \ 窗口的右上角，如图 3-9 所示。\n\n![A437923_1_En_3_Fig9_HTML.jpg](img/A437923_1_En_3_Fig9_HTML.jpg)\n\
  \n图 3-9. 属性检查器面板允许你自定义项目的外观\n\n3. 在当前显示“Button”的标题文本字段中点击。删除标题文本字段中的任何现有文本，输入 `Change\
  \ Case`，然后按回车键。按钮上的文本现在显示“Change Case”。但是，按钮的宽度太窄了。\n4. 选择“显示”➤“实用工具”➤“显示大小检查器”。大小检查器面板出现在\
  \ Xcode 窗口的右上角。\n5. 在宽度文本字段中点击，将值更改为 `120`（如图 3-10 所示），然后按回车键。Xcode 会更改按钮的宽度。\n\n\
  ![A437923_1_En_3_Fig10_HTML.jpg](img/A437923_1_En_3_Fig10_HTML.jpg)\n\n图 3-10. 大小检查器面板中的宽度文本字段\n\
  \n6. 点击标签以选中它。要修改标签的大小，你需要打开大小检查器面板，这可以通过选择“显示”➤“实用工具”➤“显示大小检查器”来完成，但有一种更快的方法，即使用按键快捷键或图标。\n\
  7. 按 Option + Command + 5，或直接点击“大小检查器”图标（看起来像一把垂直的尺子）。大小检查器面板出现在 Xcode 窗口的右上角。\n\
  8. 在宽度文本字段中点击，输入 `250`，然后按回车键。Xcode 会加宽你的标签的宽度。\n9. 点击文本字段以选中它。\n10. 按 Option +\
  \ Command + 5，或直接点击“大小检查器”图标（看起来像一把垂直的尺子）。大小检查器面板出现在 Xcode 窗口的右上角。\n11. 在宽度文本字段中点击，输入\
  \ `250`，然后按回车键。Xcode 会加宽你的文本字段的宽度。此时，所有用户界面项目都偏离了中心。\n12. 拖动每个项目，直到出现蓝色参考线，表明你已将其在\
  \ `MyFirstProgram` 窗口中居中，如图 3-11 所示。\n\n![A437923_1_En_3_Fig11_HTML.jpg](img/A437923_1_En_3_Fig11_HTML.jpg)\n\
  \n图 3-11. 使用蓝色参考线将项目在用户界面上居中\n\n此时，你已经自定义了用户界面的外观。如果你运行此程序，用户界面看起来会不错，但它实际上不会执行任何操作。要使用户界面正常工作，你还需要完成两个步骤：\n\
  \n- 编写 Swift 代码。\n- 将你的用户界面连接到你的 Swift 代码。\n\n你需要编写 Swift 代码使你的程序计算一些有用的结果。你需要将你的用户界面连接到你的\
  \ Swift 代码，以便你可以从用户界面检索数据，并将信息显示回用户界面。\n\n在此示例中，你将编写 Swift 代码，该代码从文本字段中检索文本，将其转换为大写，然后在用户点击\
  \ `Change Case` 按钮时，将大写文本显示回标签中。\n\n因此，你需要编写将文本转换为大写的 Swift 代码。然后你需要连接文本字段和标签，以便\
  \ Swift 代码可以从文本字段检索数据并将新数据放入标签中。\n\n要从用户界面项目发送或检索数据以便 Swift 代码可以访问它，你需要使用一种叫做 `IBOutlet`\
  \ 的东西。一个 `IBOutlet` 本质上将用户界面项目（例如标签或文本字段）表示为 Swift 代码可以使用的变量。\n\n\n\n为了帮助你创建一个`IBOutlet`，请使用助理编辑器。助理编辑器可以让你在左侧窗格中显示用户界面，在右侧窗格中显示你的\
  \ Swift 代码。然后，你可以使用鼠标从用户界面元素拖拽到你的 Swift 代码中，从而创建一个将标签或文本字段连接到`IBOutlet`的`IBOutlet`。让我们看看它是如何工作的：\n\
  \n1.  确保选中`MainMenu.xib`文件，以便在屏幕上显示 MyFirstProgram 用户界面窗口。（如果没有选中，请在项目导航器中点击`MainMenu.xib`文件，然后点击\
  \ MyFirstProgram 图标以显示用户界面窗口。）\n\n2.  选择 View ➤ Assistant Editor ➤ Show Assistant\
  \ Editor。助理编辑器会在`MainMenu.xib`文件的用户界面旁边显示`AppDelegate.swift`文件中的 Swift 代码，如图 3-12\
  \ 所示。\n\n    ![A437923_1_En_3_Fig12_HTML.jpg](img/A437923_1_En_3_Fig12_HTML.jpg)\n\
  \n    图 3-12. 助理编辑器让你可以并排查看用户界面和 Swift 代码文件\n\n3.  点击 MyFirstProgram 窗口上的标签。\n\n\
  4.  按住 Control 键，同时将鼠标从标签拖拽到`AppDelegate.swift`文件中`@IBOutlet`行的下方，直到你在 Swift 代码文件中看到一条水平线出现，如图\
  \ 3-13 所示。\n\n    ![A437923_1_En_3_Fig13_HTML.jpg](img/A437923_1_En_3_Fig13_HTML.jpg)\n\
  \n    图 3-13. Control-拖拽会在一个用户界面项和你的 Swift 代码之间创建一个连接\n\n5.  松开 Control 键和鼠标。会弹出一个窗口，如图\
  \ 3-14 所示。\n\n    ![A437923_1_En_3_Fig14_HTML.jpg](img/A437923_1_En_3_Fig14_HTML.jpg)\n\
  \n    图 3-14. 弹出窗口让你为你的`IBOutlet`定义一个名称\n\n6.  点击 Name 文本字段，输入`labelText`，然后点击 Connect\
  \ 按钮。（你选择的名称应该具有描述性，但可以是任何你想要的名称。）Xcode 会在你的 Swift 文件中创建一个如下所示的`IBOutlet`：\n\n \
  \   ```\n        @IBOutlet weak var labelText: NSTextField!\n    ```\n\n7.  点击文本字段以选中它。\n\
  \n8.  按住 Control 键，同时将鼠标从文本字段拖拽到你刚刚创建的`IBOutlet`下方，直到`AppDelegate.swift`文件中出现一条水平线。\n\
  \n9.  松开 Control 键和鼠标。会弹出一个窗口。\n\n10. 点击 Name 文本字段，输入`messageText`，然后点击 Connect\
  \ 按钮。Xcode 会在你的 Swift 文件中创建第二个如下所示的`IBOutlet`：\n\n    ```\n        @IBOutlet weak\
  \ var messageText: NSTextField!\n    ```\n\n我们来回顾一下你刚才的操作。首先，你创建了一个`IBOutlet`来表示标签和文本字段。现在，标签由名称`labelText`表示，文本字段由名称`messageText`表示。当你的\
  \ Swift 代码需要从用户界面上的标签或文本字段存储或检索数据时，它可以直接通过名称`labelText`或`messageText`来引用它们。\n\n\
  其次，你在你的 Swift 代码和用户界面元素之间创建了一个链接。现在，你的 Swift 代码可以向你程序用户界面上的标签和文本字段发送数据，也可从中检索数据。\n\
  \n将你的用户界面连接到 Swift 代码是让用户界面真正工作的重要一步。但是，你需要让 Change Case 按钮在用户点击时执行某些操作。要做到这一点，你需要创建一个称为`IBAction`方法的东西。\n\
  \n`IBOutlet`允许 Swift 代码从用户界面元素发送或检索数据，而`IBAction`方法则允许用户界面元素运行执行某些操作的 Swift 代码。在这个例子中，你希望用户将文本输入到文本字段中。然后，程序将获取该文本，将其转换为大写，并将这个转换后的文本显示回标签中。\n\
  \n为此，你需要知道如何执行以下操作：\n\n- 创建一个`IBAction`方法。\n- 从文本字段检索文本。\n- 将检索到的所有文本转换为大写。\n- 将大写的文本存储在标签中。\n\
  \n从文本字段和标签中存储和检索文本是相似的，因为两者都由`IBOutlet`变量定义。让我们看看这些`IBOutlet`的含义：\n\n```\n@IBOutlet\
  \ weak var labelText: NSTextField!\n@IBOutlet weak var messageText: NSTextField!\n\
  ```\n\n对象库中的所有用户界面元素都基于构成 Cocoa 框架的类文件。在这个例子中，你创建了两个名为`labelText`和`messageText`的`IBOutlet`变量，它们都基于`NSTextField`类文件。\n\
  \n如果你在 Xcode 的文档中查找`NSTextField`类文件，你会看到一长串属性列表，任何基于`NSTextField`的对象都可以拥有这些属性。但是，你找不到任何描述用于保存文本的属性的内容。\n\
  \n但是，如果你还记得第 1 章的内容，面向对象编程意味着类文件可以继承自其他类文件。在这个例子中，`NSTextField`类继承自另一个名为`NSControl`的类。在\
  \ Xcode 文档中查找`NSControl`（你将在下一章学习如何操作），你可以看到`NSControl`有一个名为`stringValue`的属性用于保存文本，如图\
  \ 3-15 所示。\n\n![A437923_1_En_3_Fig15_HTML.jpg](img/A437923_1_En_3_Fig15_HTML.jpg)\n\
  \n图 3-15. Xcode 的文档显示了 `NSControl` 用于保存文本的属性\n\n要访问存储在文本字段中的文本，你需要通过名称（`messageText`）及其保存文本的属性（`stringValue`）来标识该文本字段，例如：\n\
  \n```\nmessageText.stringValue\n```\n\n要在标签中显示文本，你需要通过名称（`labelText`）及其保存文本的属性（`stringValue`）来标识该标签，例如：\n\
  \n```\nlabelText.stringValue\n```\n\n下一个问题是，如何将文本转换成大写？Swift 将文本存储在一个名为`String`的数据类型中，它具有一个名为`uppercased`的方法，如图\
  \ 3-16 所示。\n\n![A437923_1_En_3_Fig16_HTML.jpg](img/A437923_1_En_3_Fig16_HTML.jpg)\n\
  \n图 3-16. Xcode 的文档显示了 `NSString` 类有一个名为 `uppercaseString` 的方法用于将文本转换为大写\n\n要转换存储在文本字段（由名为`messageText`的`IBOutlet`表示）中的文本，你只需在`IBOutlet`的`text`属性上应用`uppercaseString`方法，如下所示：\n\
  \n```\nmessageText.stringValue.uppercased\n```\n\n这个 Swift 代码的意思是：获取`messageText`对象（即用户界面上的文本字段），检索它包含的文本（在`stringValue`属性中），并对该文本应用`uppercased`方法。\n\
  \n现在你已经知道如何从文本字段检索文本、将其转换为大写以及将新文本存储回标签，最后一步是编写一个`IBAction`方法，在其中包含执行所有这些操作的代码。每当用户点击\
  \ Change Case 按钮时，都需要运行这个`IBAction`方法。因此，你需要创建一个`IBAction`方法并将其链接到 Change Case 按钮。\n\
  \n1.  确保助理编辑器仍然打开，并且并排显示用户界面和`AppDelegate.swift`文件。\n\n2.  点击 MyFirstProgram 用户界面上的\
  \ Change Case 按钮以选中它。\n\n3.  按住 Control 键，同时将鼠标拖拽到最后一个花括号上方，直到出现一条水平线，如图 3-17 所示。\n\
  \n    ![A437923_1_En_3_Fig17_HTML.jpg](img/A437923_1_En_3_Fig17_HTML.jpg)\n\n  \
  \  图 3-17. 从按钮 Control-拖拽到 `AppDelegate.swift` 文件\n\n4.  松开 Control 键和鼠标。会弹出一个窗口。\n\
  \n5.  点击 Connection 弹出菜单，然后选择 Action，如图 3-18 所示。\n\n    ![A437923_1_En_3_Fig18_HTML.jpg](img/A437923_1_En_3_Fig18_HTML.jpg)\n\
  \n    图 3-18.\n\n\n\n## 创建操作连接（Action connection）\n\n6. 在名称（Name）文本栏中单击，然后键入 `changeCase`（您选择的名称应具有描述性，但可以是您想要的任何名称。）\n\
  7. 在类型（Type）弹出菜单中单击，然后选择 `NSButton`，如图 3-19 所示。接着点击连接（Connect）按钮。Xcode 会创建一个如下所示的\
  \ `IBAction` 方法：\n\n![A437923_1_En_3_Fig19_HTML.jpg](img/A437923_1_En_3_Fig19_HTML.jpg)\n\
  \n图 3-19. 为 `IBAction` 方法选择类型\n\n```\n@IBAction func changeCase(_ sender: NSButton)\
  \ {\n}\n```\n\n至此，您已经创建了一个 `IBAction` 方法，该方法会在用户每次单击“更改大小写”（Change Case）按钮时运行。当然，这个\
  \ `IBAction` 方法内部还没有 Swift 代码，因此现在您需要在定义 `IBAction` 方法起始和结束的花括号内键入 Swift 代码。\n\n\
  1. 确保 Xcode 仍然并排显示您的用户界面和 `AppDelegate.swift` 文件。\n2. 选择 视图（View）➤ 标准编辑器（Standard\
  \ Editor）➤ 显示标准编辑器（Show Standard Editor）。Xcode 现在只显示您的 MyFirstProgram 用户界面。\n3.\
  \ 在项目导航器（Project Navigator）中单击 `AppDelegate.swift` 文件。Xcode 会显示存储在 `AppDelegate.swift`\
  \ 文件中的所有 Swift 代码。\n4. 如下所示编辑 `IBAction` 的 `changeCase` 方法：\n\n```\n@IBAction func\
  \ changeCase(_ sender: NSButton) {\n    labelText.stringValue = messageText.stringValue.uppercased()\n\
  }\n```\n\n5. 选择 产品（Product）➤ 运行（Run）。您的 MyFirstProgram 程序开始运行。\n6. 在 MyFirstProgram\
  \ 用户界面的文本栏中单击，并键入 `hello, world`。\n7. 单击“更改大小写”（Change Case）按钮。标签会显示 `HELLO, WORLD`，如图\
  \ 3-20 所示。\n\n![A437923_1_En_3_Fig20_HTML.jpg](img/A437923_1_En_3_Fig20_HTML.jpg)\n\
  \n图 3-20. 运行 MyFirstProgram\n\n8. 选择 MyFirstProgram ➤ 退出 MyFirstProgram（Quit MyFirstProgram）。Xcode\
  \ 再次出现。\n\n如您所见，您几乎没写多少 Swift 代码就创建了一个简单的 Macintosh 程序。您实际编写的 Swift 代码只是单行代码，它获取存储在文本栏中的文本，将其转换为大写，然后将这个大写的文本存储在标签中。\n\
  \nSwift 的强大之处很大程度上在于尽可能地依赖 Apple 的 Cocoa 框架，该框架会显示一个用户可以移动或调整大小的窗口。此外，Cocoa 框架还会创建您可以修改的下拉菜单。要理解\
  \ Cocoa 框架，您必须理解面向对象编程，以及类如何定义属性（用于存储数据）和方法（用于操作数据），并理解如何使用继承——这些内容将在下一章中进一步学习。\n\
  \n重点在于理解 Xcode 是如何创建通用的 macOS 程序，这样您只需要设计和定制用户界面，然后编写 Swift 代码让它全部运作起来。\n\n### 使用文档大纲和连接检查器\n\
  \n在结束对创建第一个 Macintosh 程序的简短介绍之前，让我们看看另外两个将来使用 Xcode 时会有帮助的工具：文档大纲（Document Outline）和连接检查器（Connections\
  \ Inspector）。\n\n文档大纲列出了构成用户界面的所有项目。要打开或隐藏文档大纲，请单击用户界面文件（左窗格中的 `.xib` 或 `.storyboard`\
  \ 文件），然后执行以下操作之一，如图 3-21 所示：\n\n![A437923_1_En_3_Fig21_HTML.jpg](img/A437923_1_En_3_Fig21_HTML.jpg)\n\
  \n图 3-21. 文档大纲\n\n- 选择 编辑器（Editor）➤ 显示/隐藏文档大纲（Show/Hide Document Outline）。\n- 单击文档大纲图标。\n\
  \n文档大纲让您可以轻松选择用户界面上的不同项目。在您的 MyFirstProgram 中，只有三个项目（一个标签、一个文本栏和一个按钮），但在更复杂的用户界面中，可能会有更多项目，它们可能隐藏在其它项目后面，或者太小不易看清。\n\
  \n如果您在文档大纲中单击一个项目，Xcode 会在用户界面中选中该项目（反之亦然），如图 3-22 所示。\n\n![A437923_1_En_3_Fig22_HTML.jpg](img/A437923_1_En_3_Fig22_HTML.jpg)\n\
  \n图 3-22. 在文档大纲窗口中单击一个项目会在用户界面上选中该项目\n\n可以将文档大纲视为一种快速查看用户界面的所有部分并仅选择所需项目的方法。\n\n\
  一旦您开始通过 `IBOutlet` 和 `IBAction` 方法将用户界面项目连接到您的 Swift 代码，您可能会想知道哪些项目连接到了哪些 `IBOutlet`\
  \ 和 `IBAction` 方法。要查看 `IBOutlet`/`IBAction` 方法与用户界面项目之间的连接，您有两种选择。\n\n首先，您可以使用连接检查器。其次，您可以使用助理编辑器（Assistant\
  \ Editor）。\n\n要打开连接检查器，首先单击您想要检查的用户界面中的任意项目，然后执行以下操作之一，以显示位于 Xcode 窗口右上角的连接检查器，如图\
  \ 3-23 所示：\n\n![A437923_1_En_3_Fig23_HTML.jpg](img/A437923_1_En_3_Fig23_HTML.jpg)\n\
  \n图 3-23. 连接检查器显示当前所选用户界面项目的所有连接\n\n- 选择 视图（View）➤ 工具（Utilities）➤ 显示连接检查器（Show Connections\
  \ Inspector）。\n- 按下 Option + Command + 6 键。\n- 单击显示连接检查器图标。\n\n连接检查器会显示包含与所选用户界面项目相连的\
  \ `IBOutlet` 或 `IBAction` 方法的 Swift 文件。\n\n注意：如果仔细查看，连接检查器会在链接到当前所选用户界面项目的 Swift\
  \ 文件左侧显示一个 X。如果您单击这个 X，就可以断开用户界面项目与其 `IBOutlet` 或 `IBAction` 方法之间的链接。\n\n查看哪些 `IBOutlet`\
  \ 和 `IBAction` 方法连接到用户界面项目的另一种方法是打开用户界面（例如单击 `MainMenu.xib` 文件），然后打开助理编辑器。\n\n在\
  \ Swift 文件中每个 `IBOutlet` 和 `IBAction` 方法的左侧，您会看到一个灰色圆圈。当您将鼠标指针移到灰色圆圈上时，Xcode 会高亮显示连接到该\
  \ `IBOutlet` 或 `IBAction` 方法的用户界面项目，如图 3-24 所示。\n\n![A437923_1_En_3_Fig24_HTML.jpg](img/A437923_1_En_3_Fig24_HTML.jpg)\n\
  \n图 3-24. 助理编辑器允许您查看哪些 `IBOutlet` 和 `IBAction` 方法连接到了用户界面项目\n\n\n\n### 摘要\n\nXcode\
  \ 是你设计、编写和修改自己的 macOS 程序所需的唯一程序。当你想要创建一个 macOS 程序时，只需遵循以下基本步骤：\n\n- 选择一个项目模板（通常为\
  \ **Cocoa Application**）。\n- 设计并自定义用户界面。\n- 将用户界面元素连接到 `IBOutlets` 和 `IBAction`\
  \ 方法。\n- 编写 Swift 代码使 `IBAction` 方法执行相应操作。\n- 运行并测试你的程序。\n\n要设计用户界面，你需要从对象库中拖放元素，然后使用属性检查器和尺寸检查器来自定义每个用户界面元素。为帮助你选择用户界面元素，你可以使用文稿大纲。\n\
  \n设计好用户界面后，你需要通过 `IBOutlets`（用于检索或显示数据）和 `IBAction` 方法（用于让用户界面执行操作），使用助理编辑器将用户界面连接到\
  \ Swift 代码。\n\n要检查用户界面元素与 Swift 代码之间的连接，你可以使用连接检查器或助理编辑器。\n\n你已经可以看到 Xcode 的不同部分如何协同工作来帮助你创建程序，而我们尚未探索\
  \ Xcode 的许多其他功能。创建 Macintosh 程序时最令人困惑的部分，或许在于编写 Swift 代码以及使用构成 Cocoa 框架的类文件中存储的方法，因此下一章将对此进行更详细的说明。\n\
  \n如你所见，只要专注于实际需要的功能并忽略其余部分，使用 Xcode 实际上相当简单。随着每一章的学习，你会逐渐了解更多关于 Xcode 和 Swift 编程的知识。\n\
  \n你已经学到了如此多关于 Xcode 的知识，而这仅仅是个开始。\n\n"
- "# 4. 获取帮助\n\n学习任何新技能的最好方法是有人向你展示需要学习的内容。既然这并非总是可行，那么你会高兴地知道，Xcode 自带了很多内置帮助功能，让使用\
  \ Xcode 不再那么有压力，而是更加愉快。\n\n要使用 Xcode 的帮助，你首先需要理解 Swift 程序如何工作，以及它们如何与 Cocoa 框架协同工作。一旦你理解了典型的\
  \ macOS 程序如何运作以及它如何依赖 Cocoa 框架，你就能更好地理解如何获取所需的帮助，以及如何理解你在 Xcode 中找到的帮助信息。\n\n##\
  \ 理解 Cocoa 框架\n\n使用 Xcode 时，你必须理解你创建的每个程序都基于 Cocoa 框架，该框架包含各种属性和方法的类。通过使用这些现有的类，你可以节省时间，而无需自己编写和测试代码。相反，你可以直接使用\
  \ Cocoa 框架中已有的、已经过测试的代码。这让你能够腾出更多时间专注于编写特定于你程序的独特代码。\n\n要使用 Cocoa 框架，你必须理解面向对象编程的原理以及对象如何工作。要创建一个对象，你首先必须定义一个类。类包含定义属性（用于保存数据）和方法（用于操作存储在其属性中的数据）的实际代码。定义好类之后，你可以基于该类定义一个或多个对象。\n\
  \n就像饼干模具定义了饼干的形状，但并非实际的饼干一样，类定义了对象，但并非实际的对象。\n\nCocoa 框架由多个类文件组成，其中许多类文件继承自其他类文件的属性和方法。当你创建\
  \ macOS 程序时，你通常会基于 Cocoa 框架的类文件创建对象。事实上，你从对象库中创建的每个用户界面元素都基于一个 Cocoa 框架的类。\n\n为了查看每个用户界面元素基于哪个类文件，我们来检查你创建的三个用户界面元素：一个标签、一个文本字段和一个按钮。\n\
  \n1. 在 Xcode 中打开 `MyFirstProgram` 项目。\n2. 点击 `MainMenu.xib` 文件。Xcode 会显示你的用户界面。\n\
  3. 选择 **View** ➤ **Utilities** ➤ **Show Object Library**。对象库会出现在 Xcode 窗口的右下角。\n\
  4. 点击 **Push Button** 元素。会出现一个弹出窗口，如图 4-1 所示。请注意，这个弹出窗口会告诉你类文件（`NSButton`），并描述 `NSButton`\
  \ 类文件的功能。\n\n![A437923_1_En_4_Fig1_HTML.jpg](img/A437923_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1 查找按钮的类文件\n\n5. 点击 **Done** 按钮关闭弹出窗口。\n6. 浏览对象库并点击 **Label** 元素。会出现一个弹出窗口，如图\
  \ 4-2 所示。这个弹出窗口会告诉你类文件（`NSTextField`），描述 `NSTextField` 类文件的功能，并告诉你 `NSTextField`\
  \ 类继承自（是...的子类）`NSControl` 类。\n\n![A437923_1_En_4_Fig2_HTML.jpg](img/A437923_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2 查找标签的类文件\n\n7. 浏览对象库并点击 **Text Field** 元素。会出现一个弹出窗口，如图 4-3 所示。如果你到目前还没注意到，可以存储数据的用户界面元素通常继承自\
  \ `NSControl` 类文件的属性和方法。\n\n![A437923_1_En_4_Fig3_HTML.jpg](img/A437923_1_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3 查找文本字段的类文件\n\n通过使用 Xcode 针对对象库中每个元素提供的简单帮助弹出窗口，你了解了关于用户界面的以下信息：\n\n- 按钮基于\
  \ `NSButton` 类文件。\n- 标签基于 `NSTextField` 类文件。\n- 文本字段也基于 `NSTextField` 类文件。\n- `NSButton`\
  \ 类和 `NSTextField` 类都继承自（是...的子类）`NSControl` 类。\n\n任何时候你需要查找某个用户界面元素的类文件，只需在对象库窗口中点击该元素即可。要了解每个用户界面元素可用的属性和方法，你需要查找该特定类的所有属性和方法。例如，如果你想知道文本字段可以使用哪些属性和方法，你必须查找\
  \ `NSTextField` 类定义的属性和方法。\n\n此外，由于 `NSTextField` 类继承自 `NSControl` 类，你还可以使用 `NSControl`\
  \ 类定义的任何属性和方法。（如果 `NSControl` 类又继承自另一个类，你也可以使用那个类中存储的属性和方法。）\n\n注意\n\n每个类名称前的 `NS`\
  \ 前缀代表 **NextStep**，这是最初创建 macOS 和 Cocoa 框架的公司。当 Apple 收购 NextStep 时，他们只是保留了 `NS`\
  \ 前缀。\n\n## 在类文件中查找属性和方法\n\n一旦你知道了某个特定用户界面元素基于哪个类，你可以在 Xcode 文档中查找其属性和方法列表。有两种方法可以做到这一点：\n\
  \n- 选择 **Help** ➤ **Documentation and API Reference**。\n- 按住 Option 键并点击 Swift 代码中的类名。\n\
  \n还记得你需要查找标签和文本字段中存储文本的属性吗？以下是查找此信息的步骤：\n\n- 确定每个用户界面元素基于的类文件（`NSTextField`，这是你通过在对象库中点击该元素了解到的）。\n\
  - 在 Xcode 文档中查找关于 `NSTextField` 类文件的信息。\n- 如果在 `NSTextField` 类文件中找不到所需的信息，请查找 `NSControl`\
  \ 类文件，因为 `NSTextField` 类继承了 `NSControl` 类的所有属性和方法。\n\n\n\n### 使用帮助菜单查找类文件\n\nXcode\
  \ 的菜单栏和下拉菜单通常是查找任何命令最直接的方式。因此，第一步是打开 Xcode 的文档窗口，如图 4-4 所示，可通过以下两种方式之一打开：\n\n1.\
  \  点击文档窗口顶部的“搜索文档”文本字段，输入 `NSTextField`，然后按 Return 键。文档窗口会显示关于 `NSTextField` 类的信息，如图\
  \ 4-5 所示。\n\n    ![A437923_1_En_4_Fig5_HTML.jpg](img/A437923_1_En_4_Fig5_HTML.jpg)\n\
  \n    图 4-5. 文档窗口显示了关于 `NSTextField` 类的信息\n\n2.  滚动浏览关于 `NSTextField` 类的信息。然而，`NSTextField`\
  \ 文档中并没有解释它是如何存储文本的。要找到答案，您需要接下来查看 `NSTextField` 的父类，即“概述”类别下的 `NSControl`。\n3.\
  \  点击 `NSControl`（它显示为蓝色超链接）。\n4.  向下滚动到“访问控件的值”部分，查看所有基于 `NSTextField` 类的对象中检索数据的不同方法，如图\
  \ 4-6 所示。\n\n    ![A437923_1_En_4_Fig6_HTML.jpg](img/A437923_1_En_4_Fig6_HTML.jpg)\n\
  \n    图 4-6. 文档窗口列出了 `NSTextField` 中存储数据的所有属性\n\n![A437923_1_En_4_Fig4_HTML.jpg](img/A437923_1_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4. Xcode 文档窗口\n\n*   选择 帮助 ➤ 文档和 API 参考。\n*   按下 Shift + Command + 0（数字零）。\n\
  \n一旦您知道可以使用 `stringValue` 属性来保存任何基于 `NSTextField` 类的对象的文本数据，您就知道可以使用 `stringValue`\
  \ 属性来访问标签和文本字段的文本数据。\n\n## 使用快速帮助查找类文件\n\n使用文档窗口查找类文件很方便，但 Xcode 还提供了另一种称为“快速帮助”的方法。要使用快速帮助，您可以将光标或鼠标指针移动到包含\
  \ Swift 代码文件中的类文件名上，然后选择以下方法之一：\n\n*   选择 帮助 ➤ 所选项目的快速帮助。\n*   按下 Control + Command\
  \ + Shift + ?。\n*   按住 Option 键并点击类文件名。\n\n快速帮助随后会显示一个弹出窗口，其中包含所选类文件的简要描述，并提供选项让您可以选择在文档窗口中查看完整描述。要了解如何使用\
  \ Option 键和鼠标操作快速帮助，请按照以下步骤操作：\n\n1.  确保 MyFirstProgram 已加载到 Xcode 中。\n2.  在项目导航器中点击\
  \ `AppDelegate.swift` 文件。Xcode 会在中间窗格中显示 `AppDelegate.swift` 文件的内容。\n3.  按住 Option\
  \ 键，并将鼠标移动到 `IBOutlet` 中的 `NSTextField` 单词上。鼠标指针会变成一个问号，如图 4-7 所示。\n\n    ![A437923_1_En_4_Fig7_HTML.jpg](img/A437923_1_En_4_Fig7_HTML.jpg)\n\
  \n    图 4-7. 当鼠标悬停在类文件名上时，按住 Option 键会使其指针变成问号\n\n4.  在按住 Option 键且鼠标指针位于 `NSTextField`\
  \ 上的同时，点击鼠标。Xcode 会显示一个弹出窗口，简要描述 `NSTextField` 类的功能，如图 4-8 所示。\n\n    ![A437923_1_En_4_Fig8_HTML.jpg](img/A437923_1_En_4_Fig8_HTML.jpg)\n\
  \n    图 4-8. Option + 点击类文件名会显示一个描述该类的弹出窗口\n\n5.  点击弹出窗口底部“参考”标签旁的“类参考”。Xcode 会显示文档窗口，列出\
  \ `NSTextField` 类文件（见图 4-5）。\n\nOption + 点击只是打开文档窗口的一种方式，无需通过“帮助 ➤ 文档和 API 参考”命令并输入类文件名。\n\
  \n## 浏览文档\n\n快速帮助可以显示特定类文件的信息，但如果您知道自己需要信息却不知道在哪里找到它，该怎么办呢？这时您可以花时间浏览文档窗口，快速翻阅不同的帮助主题，直到找到所需内容。\n\
  \n即使您没有找到想要的内容，您也很有可能偶然发现一些关于 Xcode 或 macOS 的有趣信息，这些信息将来可能会派上用场。\n\n如果您发现了有趣的信息，可以将其添加书签，以便日后快速再次找到。您还可以通过电子邮件或短信发送信息，因此请随时与他人分享有用的信息。\n\
  \n要浏览文档，请按照以下步骤操作：\n\n1.  选择 帮助 ➤ 文档和 API 参考。文档窗口出现。\n2.  点击“浏览 API 参考文档”图标。左窗格会显示一个列表，列出了创建\
  \ macOS 程序时可用的不同框架，如图 4-9 所示。\n\n    ![A437923_1_En_4_Fig9_HTML.jpg](img/A437923_1_En_4_Fig9_HTML.jpg)\n\
  \n    图 4-9. 查看可用的框架\n\n3.  点击类别（如 HealthKit 或 Core Data）左侧显示的灰色展开三角。一个附加主题列表（带有各自的灰色展开三角）会出现。通过继续点击主题的展开三角，您最终会找到可以点击查看信息的主题列表，如图\
  \ 4-10 所示。\n\n    ![A437923_1_En_4_Fig10_HTML.jpg](img/A437923_1_En_4_Fig10_HTML.jpg)\n\
  \n    图 4-10. 每个类别列出了几个其他不同主题的类别\n\n4.  点击“浏览指南和示例代码”图标。会出现一个不同主题的列表，如图 4-11 所示。\n\
  \n    ![A437923_1_En_4_Fig11_HTML.jpg](img/A437923_1_En_4_Fig11_HTML.jpg)\n\n  \
  \  图 4-11. “浏览指南和示例代码”图标显示了 macOS 编程的各种主题\n\n5.  点击类别（如“安全”或“图形与动画”）左侧显示的灰色展开三角。一个附加主题列表（带有各自的灰色展开三角）会出现。通过继续点击主题的展开三角，您最终会找到可以点击查看信息的主题列表，如图\
  \ 4-12 所示。\n\n    ![A437923_1_En_4_Fig12_HTML.jpg](img/A437923_1_En_4_Fig12_HTML.jpg)\n\
  \n    图 4-12. 查看特定编程技术或示例代码的信息\n\n\n\n## 搜索文档\n\n快速帮助可以显示特定类文件的信息，而浏览文档则能帮助你探索有关\
  \ Cocoa 框架和 macOS 编程的海量信息。问题在于，快速帮助仅适用于查找类文件的信息，并且浏览文档可能非常耗时。如果你清楚自己想找什么，直接搜索会更高效。\n\
  \n在搜索信息时，请尽可能输入更多内容以缩小搜索范围。如果只输入单个字母或单词，Xcode 的文档会向你抛出大量不相关的结果。\n\n要了解文档搜索窗口的工作原理，请尝试以下步骤：\n\
  \n1. 选择“帮助”➤“文档和 API 参考”。文档窗口随即出现。\n2. 点击“搜索文档”文本字段并输入文本。此时会显示一个包含不同文本结果的菜单，你可以点击获取更多信息，如图\
  \ 4-13 所示。\n\n   ![A437923_1_En_4_Fig13_HTML.jpg](img/A437923_1_En_4_Fig13_HTML.jpg)\n\
  \n   图 4-13. 搜索“text”的结果菜单\n3. 点击某个主题以查看该信息。\n\n通过搜索 Xcode 的文档，你可以快速轻松地找到所需内容。\n\
  \n## 使用代码补全\n\n在第 3 章中，当你开始输入 Swift 代码时，可能注意到了某些奇怪的现象。每次输入部分 Swift 命令时，Xcode 编辑器可能会显示灰色文本和一个包含与你已输入内容相匹配的可能命令的菜单；请参见图\
  \ 4-14。\n\n![A437923_1_En_4_Fig14_HTML.jpg](img/A437923_1_En_4_Fig14_HTML.jpg)\n\
  \n图 4-14. 代码补全提示你可能正在尝试输入的命令\n\n此功能称为代码补全，是 Xcode 帮助你插入长命令的方式，而无需你亲自键入每个字符。当你看到灰色文本和菜单时，有三种选择：\n\
  \n* 按下 Tab 键，让 Xcode 自动键入部分灰色文本（你可能需要多次按 Tab 键才能完全选中所有灰色文本）。\n* 双击弹出菜单中的某个命令以自动键入该命令。\n\
  * 继续手动输入。\n\n如果你继续输入，Xcode 会持续显示新的灰色文本（它认为你可能正在尝试输入的内容），同时显示一个包含与你已输入内容匹配的不同命令的菜单。我们来看看代码补全是如何工作的。\n\
  \n要了解代码补全的工作原理，请尝试以下步骤：\n\n1. 确保你的 `MyFirstProgram` 已在 Xcode 中加载。\n2. 在项目导航器窗格中点击\
  \ `AppDelegate.swift`。`AppDelegate.swift` 文件的内容会显示在 Xcode 的中间窗格中。\n3. 修改 `@IBAction\
  \ changeCase (sender: NSButton)` 代码，删除花括号之间的那一行代码，使其现在显示如下：\n\n   ```\n   @IBAction\
  \ func changeCase(_ sender: NSButton) {\n   }\n   ```\n\n4. 将光标移动到此 `@IBAction`\
  \ 方法的花括号之间，然后输入 `labelText.s`，此时会注意到灰色文本出现，并且一个包含可能命令的菜单也随之出现，如图 4-15 所示。\n\n  \
  \ ![A437923_1_En_4_Fig15_HTML.jpg](img/A437923_1_En_4_Fig15_HTML.jpg)\n\n   图 4-15.\
  \ 代码补全提示 `stringValue` 作为可能命令\n5. 按下 Tab 键。第一次按 Tab 键时，Xcode 会键入 `\"string\"`。\n\
  6. 第二次按下 Tab 键，现在 Xcode 会键入完整的 `\"stringValue\"`。\n7. 输入 `= messageText.stringValue.uppercased()`。请注意，在你输入时，代码补全会持续在弹出菜单中显示不同的灰色文本和命令。\n\
  \n通过使用代码补全，你可以更快、更准确地输入命令。如果你开始输入一个命令，但没有看到代码补全的灰色文本或菜单出现，这可能是一个信号，表示你输入的命令有误。代码补全只是\
  \ Xcode 让输入代码变得更简单的另一种方式。\n\n## 理解 macOS 程序如何工作\n\n为了帮助你更好地理解 Xcode 所有帮助文档的含义，你需要了解\
  \ macOS 程序是如何工作的。在过去程序规模较小的时候，程序员将所有程序命令存储在一个文件中。然后计算机从文件顶部的第一个命令开始，逐行执行，直到文件末尾才停止。\n\
  \n如今程序规模大得多，因此它们通常被分割成多个文件。无论你将程序分成多少个文件，Xcode 都会将它们视为存储在一个文件中。将程序分割成多个文件是为了方便你管理。\n\
  \n让我们逐行分析你的 `MyFirstProgram`，以便你理解发生了什么。当你在 Xcode 中查看 Swift 代码时，你会注意到 Xcode 编辑器用不同颜色标记不同的文本。这些颜色有助于你识别不同文本的用途，具体如下：\n\
  \n* 绿色：注释，Xcode 会完全忽略它们。注释用于解释附近代码的用途。\n* 紫色：Swift 语言的关键字\n* 红色：文本字符串\n* 蓝色：类文件名\n\
  * 黑色：命令\n\n第一行代码告诉 Xcode 导入或包含 Cocoa 框架中的所有代码作为程序的一部分。这行代码如下：\n\n```\nimport Cocoa\n\
  ```\n\n下一行代码运行一个 Swift 函数，用于加载你的用户界面（`MainMenu.xib`），并从你的 `AppDelegate` 类创建一个对象。这基本上让你的整个程序作为一个通用的\
  \ Macintosh 程序运行。这行代码如下：\n\n```\n@NSApplicationMain\n```\n\n下一行代码定义了一个名为 `AppDelegate`\
  \ 的类，它基于 `NSObject` 类，并使用了 `NSApplicationDelegate` 协议（稍后你将了解）。这行代码如下：\n\n```\nclass\
  \ AppDelegate: NSObject, NSApplicationDelegate {\n```\n\n接下来的三行代码定义了 IBOutlets，用于将此\
  \ Swift 代码连接到用户界面元素：用户界面的窗口以及标签和文本字段。窗口基于 `NSWindow` 类（定义在 Cocoa 框架中），而标签和文本字段基于\
  \ `NSTextField` 类。这些行代码如下：\n\n```\n@IBOutlet weak var window: NSWindow!\n@IBOutlet\
  \ weak var labelText: NSTextField!\n@IBOutlet weak var messageText: NSTextField!\n\
  ```\n\n每次 Xcode 创建一个新的 macOS Cocoa 应用程序项目时，你都会看到两个不执行任何操作的空函数。如果你在这些函数内输入代码，代码会在程序启动后立即运行（`applicationDidFinishLaunching`），或者在程序结束时立即运行（`applicationWillTerminate`）。目前，请将这些函数保留原样，不必理会。\n\
  \n接下来的三行代码定义了一个 IBAction 方法，它连接到用户界面上的推送按钮。该代码获取存储在 `messageText`（文本字段）中的文本，并将其转换为大写。然后将大写文本存储到\
  \ `labelText`（标签）中。标签和文本字段都基于 `NSTextField` 类（定义在 Cocoa 框架中）。这些行代码如下：\n\n```\n@IBAction\
  \ func changeCase(_ sender: NSButton) {\nlabelText.stringValue = messageText.stringValue.uppercased()\n\
  }\n```\n\n当 `MyFirstProgram` 运行时，它会导入 Cocoa 框架并运行，在屏幕上显示一个包含你用户界面的通用 Macintosh 程序。`applicationDidFinishLaunching`\
  \ 函数会运行，但由于它不包含任何代码，因此什么也不会发生。之后程序停止并等待某些事件发生。\n\n如果用户退出程序，`applicationWillTerminate`\
  \ 函数将运行，但由于它不包含任何代码，因此什么也不会发生。\n\n\n\n当用户点击 Change Case 按钮时，会运行 IBAction 方法`changeCase`。该\
  \ IBAction 方法中唯一的 Swift 命令会获取文本字段中的文本（存储在`messageText`的`stringValue`属性中），将其转换为大写，并将转换后的文本存储在标签中（由`labelText`的`stringValue`属性显示）。\n\
  \n了解了 MyFirstProgram 的工作原理后，让我们从更理论化的角度来看 macOS 编程。首先，创建程序需要用到 Cocoa 框架定义的类文件。当你在用户界面上放置元素时，你使用的正是\
  \ Cocoa 框架的类文件（例如`NSTextField`和`NSButton`）。\n\n当你在`AppDelegate.swift`文件中定义类时，你使用的也是\
  \ Cocoa 框架文件中的类（`NSObject`）。\n\n一个典型的 macOS 程序会从 Cocoa 框架的类文件以及你在 Swift 文件中可能定义的任何类文件创建对象。对象之间通过以下两种方式之一进行通信：\n\
  \n-   从其他对象存储的属性中存储或检索数据\n-   调用其他对象中的方法\n\n要在对象的属性中存储数据，你需要在等号左侧指定对象名称及其属性，在等号右侧指定值，如下所示：\n\
  \n```\nlabelText.stringValue = \"Hello, world!\"\n```\n\n要从对象的属性中检索数据，你需要在等号左侧指定一个变量来保存数据，在等号右侧指定对象名称及其属性，如下所示：\n\
  \n```\nlet warning = labelText.stringValue\n```\n\n要调用另一个对象中的方法，你需要指定对象的名称和要使用的方法，如下所示：\n\
  \n```\nmessageText.stringValue.uppercased()\n```\n\n此命令告诉 Xcode 对`messageText`对象中存储的`stringValue`属性运行`uppercased()`方法。\n\
  \n设置属性值、检索属性值和调用方法是对象之间相互通信的三种方式。\n\n当你创建一个类时，必须指定要使用的类文件，例如：\n\n```\nclass AppDelegate:\
  \ NSObject\n```\n\n这一行代码告诉 Xcode 定义一个名为`AppDelegate`的类，并将其基于名为`NSObject`的类文件（定义在\
  \ Cocoa 框架中）。\n\n当你基于现有类创建一个新类时，该类会自动包含该现有类定义的所有属性和方法。因此，在上面的定义了`AppDelegate`类的代码行中，任何从`AppDelegate`类创建的对象都会自动拥有`NSObject`类定义的所有属性和方法。\n\
  \n有时一个类文件可能没有你需要的所有方法。为了解决这个问题，你可以继承一个现有的类，然后在你的类中定义一个新方法。然而，如果你创建了一个希望其他类也能使用的方法名，第二种替代方案是定义一个所谓的协议。\n\
  \n协议不过是一系列相关方法名的列表，但并不包含任何让这些方法实际执行操作的 Swift 代码。在下面的代码中，`AppDelegate`类不仅基于`NSObject`类文件，而且还使用了由`NSApplicationDelegate`协议定义的方法。\n\
  \n如果你打开文档窗口并搜索`NSApplicationDelegate`协议，你会看到`NSApplicationDelegate`协议定义的一系列方法名，例如`applicationDidFinishLaunching`或`applicationWillTerminate`，如图\
  \ 4-16 所示。\n\n![A437923_1_En_4_Fig16_HTML.jpg](img/A437923_1_En_4_Fig16_HTML.jpg)\n\
  \n图 4-16. 文档窗口中的 NSApplicationDelegate 协议\n\n`AppDelegate`类继承了`NSObject`类的属性和方法，同时也使用了由`NSApplicationDelegate`协议定义的方法名。任何基于某个协议的类都必须编写\
  \ Swift 代码，使这些协议方法实际完成某些操作。用技术术语来说，这被称为“实现或遵循协议”。\n\n因此，Cocoa 框架实际上由类和协议组成。类定义对象，而协议定义不同类可能需要的通用方法名。\n\
  \n当你编写 macOS 程序时，经常需要同时使用 Cocoa 框架的类和协议。当你使用 Cocoa 框架的类时，你可以直接使用那些已有的功能方法，例如能够将文本转换为大写的`uppercased()`方法。\n\
  \n当你使用 Cocoa 框架的协议时，你需要编写 Swift 代码来让该方法实际工作。在浏览 Xcode 文档时，请留意类和协议之间的这种区别。\n\n让我们在\
  \ Xcode 文档窗口中看一个同时涉及类和协议的示例：\n\n1.  确保你的 MyFirstProgram 项目已加载到 Xcode 中。\n2.  点击项目导航器中的`AppDelegate.swift`文件。Xcode\
  \ 的中间窗格会显示该`.swift`文件的内容。\n3.  将光标移至`NSApplicationDelegate`上。\n4.  选择“帮助” ➤ “快速帮助”，或按住\
  \ Option 键并点击`NSApplicationDelegate`。一个快速帮助弹窗会出现，如图 4-17 所示，解释`NSApplicationDelegate`是一个协议。\n\
  \n![A437923_1_En_4_Fig17_HTML.jpg](img/A437923_1_En_4_Fig17_HTML.jpg)\n\n图 4-17.\
  \ NSApplicationDelegate 快速帮助弹窗\n\n5.  点击此窗口底部的“Protocol Reference”（协议参考）。`NSApplicationDelegate`协议参考页面会出现在文档窗口中（参见图\
  \ 4-16）。\n\n协议可以在不创建新类的情况下为现有类添加方法，但你并不一定非要使用协议。在 Xcode 中编写程序时，你会用到 Cocoa 框架的类和协议。出于程序的特定目的，你也可能创建自己的类和协议。\n\
  \n在浏览 Xcode 文档时，在编写自己的代码之前，先在类中查找属性和方法。如果在一个类中找不到所需的方法和属性，可以去查找其父类。\n\n例如，在 MyFirstProgram\
  \ 项目中，你本可以编写 Swift 代码来将文本字段中输入的文字转换为大写。然而，直接使用现有的`uppercased()`方法要简单得多。这节省了你编写代码和调试代码所需的时间，而你本可以直接使用\
  \ Cocoa 框架中经过验证的代码。\n\n你对 Cocoa 框架了解得越多，编写自己程序时需要做的工作就越少。利用 Xcode 的文档来帮助你更好地理解构成整个\
  \ Cocoa 框架的所有类和协议。\n\n由于 Cocoa 框架非常庞大，不必试图一次性学习所有内容。只学习你需要的部分，忽略其余部分。你使用 Xcode 和编写程序越多，你就越有可能需要并学习\
  \ Cocoa 框架的其他部分。\n\n总体思路是尽可能依赖 Cocoa 框架，仅在必要时编写 Swift 代码。这样可以更轻松、省力地快速编写出可靠的软件。\n\
  \n\n\n### 摘要\n\n学习 Xcode 可能令人望而生畏，因此请循序渐进，依靠 Xcode 的文档来学习。如果你急需帮助，可以使用“快速帮助”查找关于\
  \ Cocoa 框架类的信息。如果你需要某个特定主题的帮助，可以搜索文档。\n\n当你只是出于好奇时，可以浏览 Xcode 的文档，探索其海量的可用功能。通过随机浏览，你常常能学到关于\
  \ Xcode 或为 macOS 编写程序的有趣知识。\n\n如你所见，学习编写程序涉及学习 Xcode、Cocoa 框架以及 Swift 编程语言。慢慢来，只学你需要知道的内容，并逐步扩展你的知识。通过稳步前进，你会学到越来越多，直到有一天你会发现自己实际上已经掌握了这么多知识。\n\
  \n用 Xcode 学习编写 macOS 程序不会一蹴而就，但你会惊讶于通过持续稳步的进步能学到多少东西。只需练习编写程序，并依靠“帮助”菜单中提供的 Xcode\
  \ 文档。不知不觉中，你就能自信地编写小程序，然后逐步挑战更大、更复杂的程序。\n\n"
- "# 5. 使用 Playgrounds 学习 Swift\n\n要编写任何程序，你都需要选择一种编程语言。编程语言让你能够定义计算机要执行的命令。没有所谓“最好”的编程语言，因为每种编程语言都是为了解决特定问题而设计的。这意味着某种编程语言可能非常擅长解决某些类型的问题，但在解决其他类型的问题时却表现糟糕。\n\
  \n对于大多数编程语言而言，易用性和效率之间需要做出权衡。例如，BASIC 编程语言旨在易于学习和使用，而 C 编程语言则旨在让你完全控制计算机。通过最大化计算机效率，C\
  \ 语言非常适合创建像操作系统或硬盘实用程序这样的复杂程序。\n\n由于 BASIC 从未被设计为能够最大程度地控制计算机，因此它永远不会被用来创建操作系统或硬盘实用程序。而\
  \ C 语言被设计为追求最大的计算机效率，因此对于新手来说难以学习，甚至对于经验丰富的程序员来说也难以使用。许多程序中的大多数错误或漏洞，完全归咎于 C 编程语言的复杂性，这甚至会让拥有数十年经验的专业程序员感到困惑。\n\
  \n苹果公司官方编程语言曾经是 Objective-C，它是 C 编程语言的超集，也是面向对象语言 C++ 的替代方案。遗憾的是，Objective-C 难以学习，更难以掌握。Objective-C\
  \ 让编程变得比实际需要更困难，使得新手和经验丰富的程序员都难以创建 macOS 和 iOS 软件。\n\n这就是为什么在 2014 年，苹果推出了一门名为 Swift\
  \ 的新编程语言。Swift 旨在与 Objective-C 同样强大，同时又更易于学习。由于苹果将在 macOS、iOS、tvOS 和 watchOS 编程中使用\
  \ Swift，Swift 现在已成为 Macintosh、iPhone、iPad、Apple Watch、Apple TV、CarPlay 以及苹果未来任何其他产品的编程语言。\n\
  \n由于太多人使用 Objective-C 编写程序，因此始终需要程序员来修改现有的 Objective-C 程序。但是，你可以在一个程序中混合使用 Objective-C\
  \ 和 Swift。这意味着随着时间的推移，对 Objective-C 程序员的需求会减少，而对 Swift 程序员的需求会增加。如果你想学习编写 macOS\
  \ 和 iOS 程序最强大的编程语言，那么你就要学习 Swift。\n\n注意\n\n如果你已经熟悉 Objective-C，你会注意到 Swift 在多个方面让编码变得更容易得多。首先，Swift\
  \ 不需要每行结尾加分号。其次，Swift 不需要用星号表示指针，也不需要方括号来表示对对象的方法调用。第三，Swift 将所有内容存储在一个单独的 `.swift`\
  \ 文件中，而 Objective-C 则需要创建一个 `.h` 头文件和一个 `.m` 实现文件。如果你对 Objective-C 一无所知，只需看看任何用\
  \ Objective-C 编写的程序，就能看到代码是多么令人困惑。一看到 Objective-C 代码，你就会意识到学习和使用 Swift 要容易得多。\n\n\
  \n\n## 使用 Playground\n\n在过去，程序员有两种工具来帮助他们学习编程。第一种叫作解释器。解释器允许你输入一条命令，并立即显示结果。这样你就能准确地知道自己哪里做对了或做错了。\n\
  \n解释器的缺点是运行速度慢，而且无法用它们创建可销售的程序。要在解释器中运行程序，你既需要解释器本身，也需要包含所有用特定编程语言编写的命令的文件（称为源代码）。由于在解释器中运行程序时必须提供源代码，其他人可以轻易复制并窃取你的程序。因此，解释器虽然不适合销售软件，但非常适合学习编程语言。\n\
  \n程序员用来学习编程的第二种工具叫作编译器。编译器会获取存储在文件中的一系列命令，并将其转换为计算机能理解的机器语言。编译器的优点是能防止他人看到你程序的源代码。\n\
  \n使用编译器的问题是，你必须编写一个完整的程序并编译它，才能判断命令是否生效。如果命令不生效，你还得回头去修复问题。与解释器的交互式特性不同，编译器会使学习编程语言的过程变得更加缓慢和笨拙。\n\
  \n使用解释器时，你可以编写一条命令，然后立即看到它是否生效。而使用编译器时，你必须编写命令、编译程序，然后再运行程序才能判断是否生效。\n\n解释器更有利于学习，而编译器更适用于创建可以在不泄露源代码的情况下分发给他人的软件。幸运的是，`Xcode`\
  \ 为你提供了两全其美的方案。\n\n当你运行程序时，你使用的是 `Xcode` 的编译器。然而，如果你只想试验一些命令，可以使用 `Xcode` 的解释器，它被称为\
  \ Playground。\n\nPlayground 让你可以试验 `Swift` 代码，看看它是否生效。当代码生效后，你可以将其复制粘贴到项目文件中，并进行编译，从而创建一个可以运行的程序。通过让你同时拥有解释器和编译器的能力，`Xcode`\
  \ 让学习 `Swift` 变得轻松，同时也让创建可销售或分发给他人的程序变得实用。\n\n要创建一个 Playground，请按照以下步骤操作：\n\n1.\
  \ 启动 `Xcode`。\n2. 选择 `文件 ➤ 新建 ➤ Playground`。（如果你看到了 `Xcode` 欢迎屏幕，也可以点击 `从 Playground\
  \ 开始`。）`Xcode` 会要求你输入 Playground 名称和平台，如图 5-1 所示。\n\n![A437923_1_En_5_Fig1_HTML.jpg](img/A437923_1_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1. 创建 Playground 文件\n\n3. 在 `名称` 文本字段中点击，输入 `IntroductoryPlayground`。\n4.\
  \ 在 `平台` 弹出菜单中点击，选择 `macOS`。`Xcode` 会询问你希望将 Playground 文件保存到何处。\n5. 点击你想要保存 Playground\
  \ 文件的文件夹，然后点击 `创建` 按钮。`Xcode` 会显示 Playground 文件，如图 5-2 所示。\n\n![A437923_1_En_5_Fig2_HTML.jpg](img/A437923_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2. Playground 窗口\n\n6. 按如下方式编辑第二行：\n\n```\n    var str = \"这是 Swift 解释器\"\n\
  ```\n\n请注意，Playground 窗口会立即在右侧边距中显示你代码更改的结果，如图 5-3 所示。\n\n![A437923_1_En_5_Fig3_HTML.jpg](img/A437923_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3. Playground 窗口即时显示代码更改\n\nPlayground 让你可以自由地试验 `Swift`，并访问 `Cocoa` 框架中的每一个类，而无需担心让你的\
  \ `Swift` 代码与用户界面协同工作。\n\n当你输入 `Swift` 代码时，`Xcode` 可能会以不同颜色显示某些文本。请注意，你的 Playground\
  \ 中的第一行文本以绿色显示。在 `Swift` 中，这被称为注释，这意味着任何以 `//` 符号开头的文本都会被 `Xcode` 忽略，仅用于供人阅读。任何时候你在某行代码前输入\
  \ `//`，`Xcode` 都会将该文本变为绿色并忽略它。\n\n> **提示**：与其删除一行代码，不如在该行前输入`//` 符号。这将把代码变成 `Xcode`\
  \ 会忽略的注释。当你希望 `Xcode` 再次运行那段代码时，只需删除该行前的 `//` 符号即可。\n\n如果你想将多行代码变成注释，可以在每一行前输入 `//`\
  \ 符号，但这既耗时又繁琐。一个简单得多的解决方案是在要变成注释的代码开头输入 `/*`，然后在要变成注释的代码结尾输入 `*/`。\n\n\n\n### 在\
  \ Swift 中存储数据\n\n每个程序都需要接收数据，以某种方式处理数据，然后将结果展示给用户。为了接收数据，程序需要将数据临时存储在内存中。从技术上讲，计算机会将数据存储在内存地址中，记住这些地址可能会令人困惑。为了更容易知道数据存储在哪里，编程语言允许你给这些内存地址起个描述性的名字。在\
  \ Swift 中，这两种选择被称为：\n\n*   变量\n*   常量\n\n变量和常量的核心思想都是定义一个描述性的名称，并将其赋值以保存数据，例如：\n\
  \n```\nstr = \"This is the Swift interpreter\"\n```\n\n在上述例子中，`str` 是描述性的名称，而 `\"\
  This is the Swift interpreter\"` 是被存储的数据。数据可以是文本字符串，也可以是数字，例如整数（`3`、`12`、`-9` 等）或小数（也称为浮点数，如\
  \ `12.84`、`-0.83`、`8.02` 等）。在任何给定时间，你可以在一个描述性名称中存储一份数据，这个名称可以被定义为变量或常量。\n\n变量和常量的主要区别在于，你可以根据需要多次重用一个变量来存储新数据（因此得名“变量”）。常量则只允许你向其存储一次数据。\n\
  \n要定义一个变量，你必须使用 `var` 关键字，像这样：\n\n```\nvar str = \"This is the Swift interpreter\"\
  \n```\n\n要定义一个常量，你必须使用 `let` 关键字，像这样：\n\n```\nlet str = \"This is the Swift interpreter\"\
  \n```\n\n当你第一次向变量或常量存储数据时，Swift 会推断其数据类型，可能是以下之一：\n\n*   文本字符串（定义为 `String`）\n*\
  \   整数（定义为 `Int`）\n*   小数（定义为 `Double`）\n\n知道变量或常量可以保存哪些数据类型至关重要，因为它只能保存一种数据类型，不能保存其他类型。所以，如果你创建了一个变量并向其中存储了一个字符串，那么这个变量从此以后就只能存储字符串了。\n\
  \n**注意：** Swift 被称为类型安全的编程语言，因为它强制你显式地定义每个变量或常量可以存储的数据类型。这可以防止你的程序试图处理不正确的数据，例如试图将数字添加到诸如\
  \ `\"John\"` 这样的文本字符串中。\n\n为了明确变量或常量可以保存的数据类型，你可以显式地定义四种常见数据类型之一，例如：\n\n```\nvar\
  \ cat: String\nvar dog: Int\nvar fish: Float\nvar snake: Double\n```\n\n`String`\
  \ 数据类型只能包含由双引号括起来的字符，例如 `\"This is a string\"` 和 `\"15\"`。任何在双引号内的内容都被视为字符串。\n\n\
  `Int`（整数）数据类型只能保存整数，例如 `-25`、`4` 和 `3928`。如果你需要保存 `-2,147,483,648` 到 `2,147,483,647`\
  \ 之间的任何整数，请使用 `Int` 数据类型。\n\n`Float` 和 `Double` 数据类型可以保存小数，例如 `2.01`、`-0.577` 和\
  \ `51.634`。两者之间的主要区别在于，`Float` 数据类型可以保存小数点后的七位数字，而 `Double` 数据类型可以保存小数点后两倍于 `Float`\
  \ 的数字位数。\n\n例如，假设你想将数字 `0.123456789123456789` 存储在一个变量中。如果你将其存储在一个仅能保存 `Float` 值的变量中，Swift\
  \ 实际上会存储值 `0.1234568`（对最后一位进行四舍五入）。\n\n```\nvar floatVar: Float = 0.123456789123456789\n\
  // 0.1234568\n```\n\n然而，如果你将完全相同的数字存储在一个仅能保存 `Double` 值的变量中，Swift 将存储小数点后多达十四位的所有数字，例如：\n\
  \n```\nvar doubleVar: Double = 0.123456789123456789\n// 0.12345671234568\n```\n\n\
  因为 Swift 是一种类型安全的语言，你不能将 `Float` 和 `Double` 数据类型一起处理。作为一般规则，要存储小数请使用 `Double` 数据类型，除非你特别有理由使用\
  \ `Float` 数据类型。\n\n如果你试图向变量或常量中存储错误类型的数据，Swift 不会允许。这是为了防止程序在使用错误数据类型时出现问题。例如，如果一个程序询问用户要订购多少件物品，而用户输入了\
  \ `\"five\"` 而不是数字 `5`，程序将不知道如何对 `\"five\"` 进行数学计算，这会导致程序崩溃或运行异常。\n\nSwift 提供了三种定义变量或常量的方式：\n\
  \n*   `let cat = \"Oscar\" // 推断为 String 数据类型`\n*   `let cat: String = \"Oscar\"\
  `\n*   `let cat: String`\n    *   `cat = \"Oscar\"`\n\n第一种方法允许你将数据直接存入变量或常量。基于你首次存储的数据类型，Swift\
  \ 将数据类型推断为 `String`、`Int` 或 `Double`（而不是 `Float`，因为 `Float` 存储的小数精度低于 `Double`，并且\
  \ Swift 默认你想要精确的精度）。\n\n第二种方法允许你显式声明数据类型并将数据存入该变量或常量。虽然这可能更冗长，但能明确知道你想要存储的数据类型。\n\
  \n第三种方法需要两行代码。第一行定义数据类型。第二行实际存储数据。这对于可能在程序的不同部分被赋予不同数据的变量来说非常方便。你可以将变量声明放在文件顶部附近以便查找，然后在需要时再向它赋值。\n\
  \n当创建多个相同数据类型的变量时，你可以将每个变量声明放在不同的行上，像这样：\n\n```\nvar cat : Int\nvar dog : Int\n\
  ```\n\n作为快捷方式，你可以在单行上声明相同数据类型的变量，像这样：\n\n```\nvar cat, dog : Int\n```\n\n上面这一行声明了\
  \ `cat` 和 `dog` 为可以保存 `Int` 数据类型的变量，这与声明 `cat` 为 `Int` 数据类型然后 `dog` 为另一个 `Int` 数据类型的两行代码是相同的。通过将所有相同数据类型的变量声明放在一行上，你可以轻松地看出哪些变量使用相同的数据类型。\n\
  \n要了解如何在 Swift 中声明变量和常量，请按以下步骤操作：\n\n1.  确保你的 `IntroductoryPlayground` 文件已加载到 Xcode\
  \ 中。\n2.  按如下方式修改 playground 文件中的 Swift 代码：\n\n```\nimport Cocoa\nlet cat: String\n\
  cat = \"Oscar\"\ncat = \"Bo\"\n```\n\n请注意，当你试图向已保存数据的常量赋值新数据时，你会收到一条警告。点击左侧边距中的警告图标会显示一条错误消息，如图\
  \ 5-4 所示。\n\n![A437923_1_En_5_Fig4_HTML.jpg](img/A437923_1_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4。一条错误消息警告你不能多次向常量中存储数据。\n\n**注意：** 常量也被称为“不可变的”，因为一旦你向其中存储了数据，它们就不能被更改。变量被称为“可变的”，因为你可以不断更改它们存储的数据。只需要记住变量一次只能保存一份数据。当你向变量中存储新数据的那一刻，该变量中任何已有的数据都会被清除。\n\
  \n3.  按如下方式修改 playground 文件中的 Swift 代码，将常量更改为变量（将 `let` 替换为 `var`）：\n\n```\nimport\
  \ Cocoa\nvar cat: String\ncat = \"Oscar\"\ncat = 42.7\n```\n\n请注意，当你试图向一个仅能保存字符串的变量中赋值数字时，你会收到一条警告。点击左侧边距中的警告图标会显示一条错误消息，如图\
  \ 5-5 所示。\n\n![A437923_1_En_5_Fig5_HTML.jpg](img/A437923_1_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5。一条错误消息警告你不能存储错误类型的数据。\n\n4.  按如下方式修改 playground 文件中的 Swift 代码：\n\n```\n\
  import Cocoa\nvar cat: String\ncat = \"Oscar\"\nvar greeting = \"Hello, \"\nvar\
  \ period : String = \".\"\nprint (greeting + cat + period)\n```\n\n\n\n在图 5-6 中，您可以在右侧边栏看到\
  \ Playground 显示 Swift 代码的结果。\n\n![A437923_1_En_5_Fig6_HTML.jpg](img/A437923_1_En_5_Fig6_HTML.jpg)\n\
  \n**图 5-6** Playground 窗口的右侧边栏持续显示代码结果\n\n当您使用`print`命令时，Swift 的 Playground 会在右侧边栏和\
  \ Playground 窗口底部的调试区同时显示结果。要切换显示或隐藏调试区，请点击“显示/隐藏调试区”图标（见图 5-6）。\n\n隐藏调试区可以让您看到更多\
  \ Playground 的 Swift 代码，而显示调试区则可以查看 Swift 代码中`print`命令的结果。\n\n## 使用 Unicode 字符作为名称\n\
  \n在大多数编程语言中，变量和常量的命名仅限于特定范围的字符集，通常排除外语字符。为了使 Swift 对熟悉其他语言的程序员更友好，Swift 允许使用 Unicode\
  \ 字符作为变量和常量名。\n\nUnicode 是一种代表不同字符的新通用标准。如果选择“编辑”➤“表情与符号”，您可以从有限字符集中选择字符，作为普通字母和数字的替代或补充，如图\
  \ 5-7 所示。\n\n![A437923_1_En_5_Fig7_HTML.jpg](img/A437923_1_En_5_Fig7_HTML.jpg)\n\
  \n**图 5-7** Xcode 允许您使用特殊字符作为变量或常量名\n\n要了解如何在变量名中使用特殊字符，请遵循以下步骤：\n\n1. 确保您的`IntroductoryPlayground`文件已在\
  \ Xcode 中打开。\n2. 删除 Playground 中除`import Cocoa`行以外的所有代码。\n3. 在`import Cocoa`行下方，输入`let`然后按空格键。\n\
  4. 选择“编辑”➤“表情与符号”。弹出窗口如图 5-8 所示。\n\n   ![A437923_1_En_5_Fig8_HTML.jpg](img/A437923_1_En_5_Fig8_HTML.jpg)\n\
  \n   **图 5-8** 包含不同类别特殊字符的弹出窗口\n\n5. 双击任何您感兴趣的字符。Xcode 会将该字符作为常量名输入。\n6. 输入`= \"\
  Funny symbol here\"`并按回车键。\n7. 复制该字符，并将其粘贴到`print`命令的括号内。注意，Playground 窗口的右侧边栏会显示常量变量的内容，如图\
  \ 5-9 所示。\n\n   ![A437923_1_En_5_Fig9_HTML.jpg](img/A437923_1_En_5_Fig9_HTML.jpg)\n\
  \n   **图 5-9** 在 Swift 代码中使用特殊字符作为常量名\n\n特殊字符在显示实际数学符号（而非拼写单词）或以外语输入变量及常量名时非常有用。通过使变量和常量名更灵活，Swift\
  \ 让更多人能够理解编程。\n\n## 转换数据类型\n\n如果您有一个整数类型的数字需要转换为小数，或者有一个小数需要转换为整数，该怎么办？答案是只需指定目标数据类型即可转换，例如：\n\
  \n```\nInt(decimal)\n```\n\n前面的`Int`数据类型告诉 Swift 将括号内的数字转换为整数。如果该数字是小数，转换为整数通常意味着舍弃小数点后的所有数字，因此像`4.9`这样的数会变成整数`4`。\n\
  \n当 Swift 将整数转换为小数时，它仅在小数点后补零。例如，将整数`75`转换为浮点数后，Swift 会将其存储为`75.0`。要了解如何将整数转换为小数（以及反之），请遵循以下步骤：\n\
  \n1. 确保您的`IntroductoryPlayground`文件已在 Xcode 中打开。\n2. 将 Playground 文件中的代码修改如下：\n\n\
  \   ```\n   import Cocoa\n   var whole : Int = 4\n   var decimal : Double = 4.902\n\
  \   print (Int(decimal))\n   print (Double(whole))\n   ```\n\n注意 Swift 如何将整数转换为小数（将`4`变为`4.0`），以及如何通过舍弃小数点右侧的所有值将小数转换为整数（将`4.902`变为`4`），如图\
  \ 5-10 所示。\n\n![A437923_1_En_5_Fig10_HTML.jpg](img/A437923_1_En_5_Fig10_HTML.jpg)\n\
  \n**图 5-10** 整数与小数的相互转换\n\n\n## 计算属性\n\n到目前为止，声明变量和常量，然后将数据赋值给这些变量或常量，与其他编程语言相比并无太大区别。如果你有一个变量与另一个变量相关，可以这样操作：\n\
  \n```\nvar cats = 4\nvar dogs: Int\ndogs = cats + 2\nprint(dogs)\n```\n\n不幸的是，这样将`dogs`的变量声明与`dogs`变量的实际赋值分开了。为了保持变量声明与其定义代码的关联性，Swift\
  \ 提供了一种称为计算属性的功能。\n\n使用计算属性时，你不会直接将数据存储到变量中。相反，你定义变量可以保存的数据类型，然后使用其他变量或常量来计算一个新值，再存储到该变量中。这种计算称为\
  \ getter（获取器），其代码如下所示：\n\n```\nvar dogs : Int {\nget {\nreturn cats + 2 // 用于计算值的代码\n\
  }\n}\n```\n\n上述代码声明了一个名为`dogs`的变量，该变量只能保存整数（`Int`）数据类型。然后，它将代码包含在由关键字`get`定义的 getter\
  \ 花括号中。\n\n实际上，你可以在 getter 的花括号内编写任意数量的 Swift 代码，但此示例只包含了最重要的一行，即使用`return`关键字返回一个值，该值会被存储到`dogs`变量中。\n\
  \n在本例中，它获取`cats`变量中存储的值，将该值加 2，然后将新值存储到`dogs`变量中。更改 getter 中的代码，就会改变存储在`dogs`变量中的计算值。\n\
  \n让我们通过以下步骤来看看这是如何工作的：\n\n1.  确保你的`IntroductoryPlayground`文件已在 Xcode 中加载。\n2.  将\
  \ playground 文件中的代码修改如下：\n\n```\nimport Cocoa\nvar cats = 4\nvar dogs : Int {\n\
  get {\nreturn cats + 2 // 用于计算值的代码\n}\n}\nprint(dogs)\n```\n\n请注意，playground 窗口的右侧边距显示了`dogs`的值，如图\
  \ 5-11 所示。\n\n![A437923_1_En_5_Fig11_HTML.jpg](img/A437923_1_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11.\n\nplayground 窗口的右侧边距显示了 getter 部分的工作方式\n\nGetter 使用代码来计算变量的值。第二种类型的计算属性称为\
  \ setter（设置器），它运行用于计算不同变量值的代码。\n\n每当其变量被赋值时，setter 就会运行。要了解 getter 和 setter 是如何工作的，请按照以下步骤操作：\n\
  \n1.  确保你的`IntroductoryPlayground`文件已在 Xcode 中加载。\n2.  将 playground 文件中的代码修改如下：\n\
  \n```\nimport Cocoa\nvar cats = 4\nvar dogs : Int {\nget {\nreturn cats + 2 // 用于计算值的代码\n\
  }\nset(newValue) {\ncats = 3 * newValue\n}\n}\nprint(dogs)\nprint(cats)\ndogs =\
  \ 5\nprint(dogs)\nprint(cats)\n```\n\n注意当你为`dogs`变量赋一个不同的值时，`cats`和`dogs`变量的值是如何变化的，如图\
  \ 5-12 所示。\n\n![A437923_1_En_5_Fig12_HTML.jpg](img/A437923_1_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12.\n\nplayground 窗口的右侧边距显示了 getter 和 setter 代码的工作方式\n\n让我们逐行分析这段代码。首先，数字\
  \ 4 被存储到`cats`变量中。在 getter 中使用`cats`变量（4）返回`cats` + 2，即 4 + 2（6）。所以第一个`print(dogs)`命令打印出\
  \ 6。\n\n第二个`print(cats)`打印`cats`变量的值，该值仍然是 4。\n\n当`dogs`变量被赋值为数字 5 时，setter 会运行。临时变量`newValue`被赋值为数字\
  \ 5，从而为`cats`计算出一个新值：3 * `newValue`，即 3 * 5 或 15。现在`cats`变量的值被设置为 15。\n\n接下来运行`print(dogs)`命令，使用由\
  \ getter 计算出的`dogs`的值。由于`cats`的值是 15，getter 计算出`cats` + 2，即 15 + 2，结果为 17。因此下一个`print(dogs)`命令打印出\
  \ 17，最后一个`print(cats)`命令打印出 15。\n\n**注意**  \n计算属性可以在给变量赋值时运行代码。但是，请谨慎使用计算属性，因为它们可能会使你的代码更难理解。计算属性最常用于面向对象编程中的类属性。例如，如果一个对象代表屏幕上绘制的一个正方形，改变正方形的宽度必须同时改变该正方形的高度（反之亦然）。\n\
  \n\n## 使用可选变量\n\n声明变量时最大的缺陷在于，在向变量中存入数据之前，你无法使用该变量。如果在变量存储任何数据之前就试图使用它，程序将会运行失败并崩溃。为避免此问题，许多程序员会先在变量中存储“占位”数据。不幸的是，这种“占位”数据仍可能被程序使用并导致错误。\n\
  \n为解决此问题，Swift 提供了一种称为“可选变量”的机制。可选变量既可以存储数据，也可以什么也不存储。如果可选变量中不包含任何内容，则被视为持有名为 `nil`\
  \ 的值。通过使用可选变量，即使变量不包含数据，你也能避免程序崩溃。\n\n要创建可选变量，只需在声明变量及其数据类型时加上问号，如下所示：\n\n```\n\
  var fish : String?\n```\n\n问号将变量标识为可选类型。你可以像使用普通变量一样使用可选变量来存储数据，例如：\n\n```\nfish\
  \ = \"goldfish\"\n```\n\n虽然向可选变量存储数据与向普通变量存储数据并无不同，但从可选变量中取回数据则需要额外的步骤。首先，你必须检查可选变量中是否包含数据。一旦确认可选变量包含数据，你就需要用感叹号来解包该可选变量以获取实际数据，例如：\n\
  \n```\nprint (fish!)\n```\n\n要了解可选变量如何工作，请尝试以下操作：\n\n1.  确保你的 `IntroductoryPlayground`\
  \ 文件已在 Xcode 中加载。\n2.  按如下方式修改代码：\n\n```\n    import Cocoa\n    var fish : String?\n\
  \    fish = \"goldfish\"\n    print (fish)\n    print (fish!)\n```\n\n请注意，`fish`\
  \ 本身实际上是一个可选变量，但当你使用感叹号解包它时，就能访问到可选变量内部的实际数据，如图 5-13 所示。\n\n![A437923_1_En_5_Fig13_HTML.jpg](img/A437923_1_En_5_Fig13_HTML.jpg)\n\
  \n图 5-13. 查看可选变量与其内部解包后数据的区别\n\n3.  在下方再输入两行代码：\n\n```\n    var str : String\n \
  \   str = fish\n```\n\n请注意，你不能将可选变量 `fish` 赋值给 `str`，因为 `str` 只能持有 `String` 数据类型。相反，你必须解包可选变量\
  \ `fish`，并使用感叹号取出其实际的字符串内容，如下所示：\n\n```\nvar str : String\nstr = fish!\n```\n\n\
  在解包可选变量以获取其数据之前，务必先检查该可选变量包含的是 `nil` 值还是实际变量。如果你在可选变量包含 `nil` 值时尝试使用它，程序可能会崩溃。\n\
  \n要检查可选变量是否持有 `nil` 值，你有两种选择。首先，你可以显式检查 `nil` 值，如下所示：\n\n```\nif fish != nil {\n\
  print (\"该可选变量不是 nil\")\n}\n```\n\n这段代码检查 `fish` 可选变量是否不等于（`!=`）`nil`。如果可选变量不是 `nil`，那么它一定持有某个值，因此可以安全地取出。\n\
  \n检查可选变量是否有值的第二种方法是将其赋值给一个常量，如下所示：\n\n```\nif let food = fish {\nprint (\"该可选变量有值\"\
  )\nprint (food)\n}\n```\n\n如果可选变量有值，它会将该值存储在常量中。现在你就通过该常量来访问这个值了。要观察其工作原理，请按以下步骤操作：\n\
  \n1.  确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。\n2.  按如下方式修改代码：\n\n```\n   \
  \ import Cocoa\n    var fish : String?\n    fish = \"goldfish\"\n    if fish !=\
  \ nil {\n    print (\"该可选变量不是 nil\")\n    var str : String\n    str = fish!\n  \
  \  print (str)\n    }\n    if let food = fish {\n    print (\"该可选变量有值\")\n    print\
  \ (food)\n    }\n```\n\n请注意，你可以通过使用感叹号解包可选变量，或将其存储在常量中再使用该常量，这两种方式来取出可选变量中的值，如图\
  \ 5-14 所示。\n\n![A437923_1_En_5_Fig14_HTML.jpg](img/A437923_1_En_5_Fig14_HTML.jpg)\n\
  \n图 5-14. 访问可选变量中存储的值的两种方式\n\n\n\n## 将 Swift 代码与用户界面链接\n\n每个程序都需要存储数据，而将数据存入变量最常见的方式之一就是从用户界面中获取数据。要将用户界面元素与\
  \ Swift 代码链接起来，你需要创建一个 `IBOutlet` 变量。\n\n如果有一个文本字段连接到了 `IBOutlet` 变量，用户在文本字段中输入的任何内容都会自动存储到该\
  \ `IBOutlet` 变量中。同样，你存储在 `IBOutlet` 变量中的任何内容也会立即显示在文本字段中。`IBOutlet` 变量就像 Swift 代码和用户界面之间的纽带，如图\
  \ 5-15 所示。\n\n![A437923_1_En_5_Fig15_HTML.jpg](img/A437923_1_En_5_Fig15_HTML.jpg)\n\
  \n图 5-15. `IBOutlet` 变量将用户界面元素与 Swift 代码链接起来\n\n由于文本字段等用户界面元素初始时可能为空，`IBOutlet`\
  \ 变量被定义为隐式解包的可选变量，用感叹号声明，如下所示：\n\n```\n@IBOutlet weak var labelText: NSTextField!\n\
  ```\n\n如果 `IBOutlet` 是一个普通变量，并且连接到了一个空文本字段，那么当 `IBOutlet` 变量中没有任何数据时，程序可能会崩溃。\n\n\
  如果 `IBOutlet` 是一个可选变量，你可以用问号来定义它，如下所示：\n\n```\n@IBOutlet weak var labelText: NSTextField?\n\
  ```\n\n不幸的是，每次你想访问存储在这个可选变量中的数据时，都必须输入一个感叹号。如果你多次访问这个 `IBOutlet` 变量，每次都需要输入感叹号，这既麻烦又会让代码变得难以阅读。\n\
  \n为了让你无需每次都输入感叹号就能访问 `IBOutlet` 变量，更简单的方式是将 `IBOutlet` 变量创建为隐式解包的可选变量，这意味着如果它包含值，你无需输入解包感叹号即可访问它。\n\
  \n要了解 Xcode 如何将 `IBOutlet` 创建为隐式解包的可选变量，请打开你之前创建的 `MyFirstProgram` 项目。\n\n1.  确保你的\
  \ `MyFirstProgram` 已加载到 Xcode 中。\n2.  在项目导航器中点击 `AppDelegate.swift` 文件。Xcode 的中间面板会显示该\
  \ `.swift` 文件的内容。注意，所有的 `IBOutlet` 变量都是用感叹号声明的，这意味着它们是隐式解包的可选变量：\n\n```\n    @IBOutlet\
  \ weak var labelText: NSTextField!\n    @IBOutlet weak var messageText: NSTextField!\n\
  ```\n\n同时请注意，`IBAction changeCase` 方法允许你无需使用感叹号就能访问这些隐式解包可选变量的内容。\n\n```\n    @IBOutlet\
  \ weak var labelText: NSTextField!\n    @IBOutlet weak var messageText: NSTextField!\n\
  \    @IBAction func changeCase(_ sender: NSButton) {\n    labelText.stringValue\
  \ = messageText.stringValue.uppercased()\n    let warning = labelText.stringValue\n\
  \    }\n```\n\n3.  将每个 `IBOutlet` 变量末尾的感叹号替换为问号，如下所示：\n\n```\n    @IBOutlet weak\
  \ var labelText: NSTextField?\n    @IBOutlet weak var messageText: NSTextField?\n\
  ```\n\n注意，现在每次使用 `IBOutlet` 变量时，Xcode 都会显示错误信息。这是因为你需要用感叹号解包每个可选变量，如下所示：\n\n```\n\
  @IBAction func changeCase(_ sender: NSButton) {\nlabelText!.stringValue = messageText!.stringValue.uppercased()\n\
  let warning = labelText!.stringValue\n}\n```\n\n如果你将 `IBOutlet` 定义为普通的可选变量（用问号定义），那么为了访问其值，你必须用感叹号解包每个可选变量。\n\
  \n如果你简单地将 `IBOutlet` 定义为隐式解包的可选变量（Xcode 会为你这样做），那么你就不需要输入感叹号来解包这些可选变量了。\n\n基本上，让\
  \ Xcode 将你的 `IBOutlet` 创建为隐式解包的变量（带感叹号）能让编写 Swift 代码更轻松。\n\n那么，什么时候该使用可选变量（用 `?`\
  \ 定义），什么时候该使用隐式解包的可选变量（用 `!` 定义）呢？\n\n一般来说，对于 `IBOutlet`，使用隐式解包的可选变量可以让你更轻松地编写 Swift\
  \ 代码，无需到处输入感叹号。如果在其他场合使用隐式解包的可选变量，你的变量可能包含 `nil` 值，而当你尝试使用它时，Xcode 不会捕获任何潜在错误。\n\
  \n要了解使用隐式解包可选变量的危险性，请遵循以下步骤：\n\n1.  确保你的 `IntroductoryPlayground` 文件已加载到 Xcode 中。\n\
  2.  修改代码如下：\n\n```\n    import Cocoa\n    var safe : Int?  // 可选变量\n    var danger\
  \ : Int!// 隐式解包的可选变量\n    print (danger * 2)\n    print (safe * 2)\n```\n\n请注意，这两个整数变量都没有值，但\
  \ Xcode 却允许你使用隐式解包可选变量中的 `nil` 值进行计算，而对于普通可选变量，则会标记一个可能的错误，如图 5-16 所示。\n\n![A437923_1_En_5_Fig16_HTML.jpg](img/A437923_1_En_5_Fig16_HTML.jpg)\n\
  \n图 5-16. Xcode 可以识别未定义可选变量可能存在的问题，但无法识别未定义隐式解包可选变量的问题\n\n通过要求你用感叹号（`!`）解包可选变量，Xcode\
  \ 强制你承认正在使用可选变量，这样你就能记得检查它是否包含 `nil` 值。\n\n由于隐式解包的可选变量允许你直接输入变量名而无需附加符号，因此更容易忘记自己正在处理可选变量，并且在尝试使用之前检查可能的\
  \ `nil` 值。可选变量无法防止问题，但能强制你记住自己正在处理可能为 `nil` 的值。\n\n### 总结\n\n如果你来自其他编程环境，你已经看到 Swift\
  \ 与其他语言的诸多不同之处。Swift 的 Playground 解释器让你在将代码复制粘贴到实际程序之前，可以先在安全环境中测试代码。Playground\
  \ 让你可以自由地实验 Swift 命令。\n\n三种最常见的数据类型是整数（`Int`）、小数（`Float` 或 `Double`）和文本字符串（`String`）。为了避免在存储小数时混用数据类型，除非你有特定原因要使用\
  \ `Float` 数据类型，否则请使用 `Double` 数据类型。\n\n为了更灵活地命名变量，你可以使用能够表示符号或外语字符的 Unicode 字符。\n\
  \n将数据存储到变量中，可以简单到直接为其赋值。Swift 还提供了计算属性，允许你在为新值赋值时修改变量或其他变量。计算属性在处理类和面向对象编程时更为有用。\n\
  \n更重要的是可选变量，它允许你处理 `nil` 值而不会导致程序崩溃。在使用 `IBOutlet` 将 Swift 代码连接到标签和文本字段等用户界面元素时，可选变量尤其重要。\n\
  \n当你创建一个可选变量（用问号）时，你需要解包它（用感叹号）才能访问其实际数据。\n\n变量对于临时存储数据至关重要，因此你会经常使用它们。当你开始学习类和面向对象编程时，你会使用变量来定义属性。本质上，任何时候你需要存储一块数据，你都会声明一个变量来保存它。\n\
  \n\n\n"
- "# 6. 操作数字和字符串\n\n每个程序都需要将数据临时存储在变量中。然而，要使程序真正有用，它还必须以某种方式操作这些数据，以计算出有用的结果。电子表格可以让你对数字进行加、减、乘、除运算。文字处理器则操作文本以纠正拼写错误并设置文本格式。即使是电子游戏，也会响应摇杆的移动，为玩家的角色（如卡通人物、飞机或汽车）计算新的位置。利用数据计算出新的结果，正是每个程序存在的全部意义。\n\
  \n为了操作数字，Swift 提供了四个基本的数学运算符：加法（`+`）、减法（`-`）、乘法（`*`）、除法（`/`）以及一个取余运算符（`%`）。当你想要将两个字符串合并为一个时，你甚至可以使用加法运算符（`+`）来操作字符串。\n\
  \n尽管 Swift 包含了多种用于操作数字和文本的运算符，但 Cocoa 框架提供了更多强大的函数来操作数字和字符串。如果这些函数都不适用，你始终可以创建自己的函数来操作文本和数字数据。通过创建名为函数的迷你程序，你可以按任意方式操作数据，并可根据需要重复使用你的函数。\n\
  \n## 使用数学运算符\n\n操作数字最简单的方法是执行加法、减法、除法或乘法。在操作数字时，首先确保所有数字都是相同的数据类型，例如全部是整数，或者全部是\
  \ `Float` 或 `Double` 类型的小数。由于将整数与小数混合可能导致计算错误，因此 Swift 会强制你在计算中使用相同的数据类型。如果你的数据并非全是相同的数据类型，则需要转换一个或多个数据类型，例如：\n\
  \n```\nvar cats = 4\nvar dogs = 5.4\ndogs = Double(cats) * dogs\n```\n\n在这个例子中，Swift\
  \ 推断 `cats` 是 `Int` 数据类型，`dogs` 是 `Double` 数据类型。要相乘 `cats` 和 `dogs`，它们必须是相同的数据类型（`Double`），因此你必须先将\
  \ `cats` 的值转换为 `Double` 数据类型，然后计算才能安全地进行。\n\n当使用多个数学运算符时，请使用括号来定义哪些计算应该优先执行。Swift\
  \ 通常从左到右计算数学运算符，但乘法和除法的优先级高于加法和减法。如果你输入以下 Swift 代码，仅因数学计算的顺序不同，就会得到两个不同的结果：\n\n\
  ```\nvar cats, dogs : Double\ndogs = 5 *  9 - 3  /  2 + 4     // 47.5\ncats = 5\
  \ * (9 - 3) / (2 + 4)    // 5.0\n```\n\n为了清晰起见，始终使用括号对数学运算符进行分组。最常见的数学运算符被称为二元运算符，因为它们需要两个数字才能计算出结果，如表\
  \ 6-1 所示。\n\n**表 6-1.** Swift 中的常见数学运算符\n\n| 数学运算符 | 用途 | 示例 |\n| --- | --- | ---\
  \ |\n| `+` | 加法 | `5 + 9 = 14` |\n| `-` | 减法 | `5 - 4 = 1` |\n| `*` | 乘法 | `5 *\
  \ 9 = 45` |\n| `/` | 除法 | `45 / 9 = 5` |\n| `%` | 取余 | `5 % 9 = 5` |\n\n在所有数学运算符中，取余运算符可能需要额外的解释。本质上，取余运算符是将一个数除以另一个数，然后只返回该除法的余数。所以\
  \ 5 除以 9 结果是 0 余 5，而 26 除以 5 的余数是 1。\n\n### 复合赋值运算符\n\n如果你想给一个变量增加或减少某个数字，你可以使用如下\
  \ Swift 代码：\n\n```\ntemp = temp + 5\n```\n\n这个命令告诉 Swift 将 5 加到 `temp` 变量中存储的当前值上。虽然这种代码可以工作，但重复键入相同的变量名可能会显得笨拙。\n\
  \n作为一种快捷方式，Swift 提供了看起来像（`+=`）或（`-=`）的复合赋值运算符。要使用复合赋值运算符，你需要指定一个变量、要使用的复合赋值运算符，然后是你要增加或减少的值，例如：\n\
  \n```\ntemp += 5\n```\n\n这相当于：\n\n```\ntemp = temp + 5\n```\n\n要了解复合赋值运算符是如何工作的，请按照以下步骤操作：\n\
  \n1. 在 Xcode 中打开 `IntroductoryPlayground` 文件。\n2. 将代码编辑如下：\n\n    ```\n    import\
  \ Cocoa\n    var temp = 2\n    temp += 57                // 相当于 temp = temp + 57\n\
  \    print (temp)\n    temp -= 7                 // 相当于 temp = temp - 7\n    print\
  \ (temp)\n    ```\n\n如图 6-1 所示，`+=` 复合赋值运算符将 57 加到 `temp` 的当前值上。然后 `-=` 复合赋值运算符从\
  \ `temp` 的当前值中减去 7。\n\n![A437923_1_En_6_Fig1_HTML.jpg](img/A437923_1_En_6_Fig1_HTML.jpg)\n\
  \n**图 6-1.** 观察复合赋值运算符如何工作\n\n通过组合数学运算符，你可以创建任何类型的计算。然而，如果你需要执行常见的数学运算，例如求一个数的平方根或对数，使用\
  \ Cocoa 框架中内置的数学函数会更简单、更可靠。\n\n## 使用数学函数\n\nCocoa 框架提供了数十个你可以使用的数学函数。一些更常见的数学函数包括：\n\
  \n- 取整函数\n- 计算函数（`sqrt`， `cbrt`， `min`/`max` 等）\n- 三角函数（`sin`，`cos`，`tan` 等）\n-\
  \ 指数函数\n- 对数函数\n\n### 取整函数\n\n当你处理小数时，可能希望将它们四舍五入到最接近的位。然而，在 Swift 中有多种取整数字的方法，例如：\n\
  \n- `round`：0.5 及以上舍入，0.49 及以下舍去\n- `floor`：向下取整到最接近的整数\n- `ceil`：向上取整到最接近的整数\n\
  - `trunc`：直接舍弃小数部分\n\n要了解这些不同的取整函数如何工作，请按照以下步骤创建一个新的 playground：\n\n1. 确保 `IntroductoryPlayground`\
  \ 文件已在 Xcode 中加载。\n2. 将代码编辑如下：\n\n    ```\n    import Cocoa\n    var testNumber\
  \ : Double\n    testNumber = round(36.98)\n    testNumber = round(-36.98)\n    testNumber\
  \ = round(36.08)\n    testNumber = floor(36.98)\n    testNumber = floor(-36.98)\n\
  \    testNumber = floor(36.08)\n    testNumber = ceil(36.98)\n    testNumber = ceil(-36.98)\n\
  \    testNumber = ceil(36.08)\n    testNumber = trunc(36.98)\n    testNumber = trunc(-36.98)\n\
  \    testNumber = trunc(36.08)\n    ```\n\n图 6-2 展示了每种取整函数在处理负数和正数时的不同之处，以及每个函数是向上取整还是向下取整。\n\
  \n![A437923_1_En_6_Fig2_HTML.jpg](img/A437923_1_En_6_Fig2_HTML.jpg)\n\n**图 6-2.**\
  \ 观察不同的取整函数如何工作\n\n\n\n### 计算函数\n\n你可以组合使用 Swift 的四种基本数学运算（加、减、除、乘）来创建任意类型的复杂计算。不过，Cocoa\
  \ 框架包含了常见类型的数学函数，你可以直接使用，而无需自行创建。一些常见的计算函数包括：\n\n- `fabs`：计算一个数字的绝对值\n- `sqrt`：计算一个正数的平方根\n\
  - `cbrt`：计算一个正数的立方根\n- `hypot`：计算（`x*x + y*y`）的平方根\n- `fmax`：找出两个数字中的最大值或最大数\n-\
  \ `fmin`：找出两个数字中的最小值或最小数\n\n要了解这些不同计算函数的工作方式，请按以下步骤操作：\n\n1.  确保你的 `IntroductoryPlayground`\
  \ 已在 Xcode 中加载。\n2.  按如下所示编辑代码：\n\n```\nimport Cocoa\nvar testNumber : Double\n\
  testNumber = fabs(52.64)\ntestNumber = fabs(-52.64)\ntestNumber = sqrt(5)\ntestNumber\
  \ = cbrt(5)\ntestNumber = hypot(4, 9)\ntestNumber = fmax(34.2, 89.2)\ntestNumber\
  \ = fmin(34.2, 89.2)\n```\n\n图 6-3 展示了每种计算函数的不同工作方式。\n\n![A437923_1_En_6_Fig3_HTML.jpg](img/A437923_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3. 查看不同计算函数的工作方式\n\n## 三角函数\n\n如果你还记得学校学过的知识（即使不记得也没关系），三角学是一个涉及相交线之间夹角的数学领域。由于三角函数在实际应用中确实很方便，Cocoa\
  \ 框架提供了大量函数用于计算余弦、双曲正弦、反正切和反双曲余弦。一些常见的三角函数包括：\n\n- `sin`：计算以弧度为单位的角度正弦值\n- `cos`：计算以弧度为单位的角度余弦值\n\
  - `tan`：计算以弧度为单位的角度正切值\n- `sinh`：计算以弧度为单位的角度双曲正弦值\n- `cosh`：计算以弧度为单位的角度双曲余弦值\n-\
  \ `tanh`：计算以弧度为单位的角度双曲正切值\n- `asin`：计算以弧度为单位的角度反正弦值\n- `acos`：计算以弧度为单位的角度反余弦值\n\
  - `atan`：计算以弧度为单位的角度反正切值\n- `asinh`：计算以弧度为单位的角度反双曲正弦值\n- `acosh`：计算以弧度为单位的角度反双曲余弦值\n\
  - `atanh`：计算以弧度为单位的角度反双曲正切值\n\n要了解这些不同三角函数的工作方式，请按以下步骤操作：\n\n1.  确保你的 `IntroductoryPlayground`\
  \ 已在 Xcode 中加载。\n2.  按如下所示编辑代码：\n\n```\nimport Cocoa\nvar testNumber : Double\n\
  testNumber = sin(1)\ntestNumber = cos(1)\ntestNumber = tan(1)\ntestNumber = sinh(1)\n\
  testNumber = cosh(1)\ntestNumber = tanh(1)\ntestNumber = asin(1)\ntestNumber = acos(1)\n\
  testNumber = atan(1)\ntestNumber = asinh(1)\ntestNumber = acosh(1)\ntestNumber =\
  \ atanh(1)\n```\n\n图 6-4 展示了每种三角函数的不同工作方式。\n\n![A437923_1_En_6_Fig4_HTML.jpg](img/A437923_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4. 查看不同三角函数的工作方式\n\n### 指数函数\n\n指数函数涉及乘法运算，例如将数字 2 自身相乘固定次数。一些常见的指数函数包括：\n\
  \n- `exp`：计算 e**x，其中 x 是一个整数\n- `exp2`：计算 2**x，其中 x 是一个整数\n- `__exp10`：计算 10**x，其中\
  \ x 是一个整数\n- `expm1`：计算 e**x - 1，其中 x 是一个整数\n- `pow`：计算 x 的 y 次幂\n\n要了解这些不同指数函数的工作方式，请按以下步骤操作：\n\
  \n1.  确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。\n2.  按如下所示编辑代码：\n\n```\nimport\
  \ Cocoa\nvar testNumber : Double\ntestNumber = exp(3)\ntestNumber = exp2(3)\ntestNumber\
  \ = __exp10(3)\ntestNumber = expm1(3)\ntestNumber = pow(2,4)\n```\n\n图 6-5 展示了每种指数函数的不同工作方式。\n\
  \n![A437923_1_En_6_Fig5_HTML.jpg](img/A437923_1_En_6_Fig5_HTML.jpg)\n\n图 6-5. 查看不同指数函数的工作方式\n\
  \n### 对数函数\n\n对数函数允许在计算中使用大数的乘法、除法和加法，与指数函数类似。一些常见的对数函数包括：\n\n- `log`：计算一个数字的自然对数\n\
  - `log2`：计算一个数字以 2 为底的对数\n- `log10`：计算一个数字以 10 为底的对数\n- `log1p`：计算 1 + x 的自然对数\n\
  \n要了解这些不同对数函数的工作方式，请按以下步骤操作：\n\n1.  确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。\n\
  2.  按如下所示编辑代码：\n\n```\nimport Cocoa\nvar testNumber : Double\ntestNumber = log(3)\n\
  testNumber = log2(3)\ntestNumber = log10(3)\ntestNumber = log1p(3)\n```\n\n图 6-6\
  \ 展示了每种对数函数的不同工作方式。\n\n![A437923_1_En_6_Fig6_HTML.jpg](img/A437923_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6. 查看不同对数函数的工作方式\n\n## 使用字符串函数\n\n正如 Cocoa 框架提供了数十种数学函数一样，它也包含了一些字符串操作函数。一些常见的字符串函数包括：\n\
  \n- `+`：将两个字符串连接或组合在一起，例如 \"Hello \" + \"world\"，会创建字符串 \"Hello world\"\n- `characters.count`：返回字符串的长度\n\
  - `capitalized`：将每个单词的首字母大写\n- `lowercased()`：将整个字符串转换为小写字母\n- `uppercased()`：将整个字符串转换为大写字母\n\
  - `isEmpty`：检查一个字符串是否为空或至少包含一个字符\n- `hasPrefix`：检查特定文本是否出现在字符串的开头\n- `hasSuffix`：检查特定文本是否出现在字符串的结尾\n\
  \n使用 `+` 运算符追加或组合字符串时，请注意空格。如果省略空格，可能会得到不期望的结果。例如，`\"Hello\" + \"world\"` 会创建不带任何空格的字符串\
  \ `\"Helloworld\"`。这就是为什么你需要确保在单词之间加上空格，例如 `\"Hello \" + \"world\"` 来创建 `\"Hello\
  \ world\"`。\n\n要了解这些不同字符串函数的工作方式，请按以下步骤操作：\n\n1.  确保 `IntroductoryPlayground` 已在\
  \ Xcode 中加载。\n2.  按如下所示编辑代码：\n\n```\nimport Cocoa\nvar text : String = \"Hello everyone!\"\
  \nprint (text.characters.count)\nprint (text.capitalized)\nprint (text.lowercased())\n\
  print (text.uppercased())\nprint (text.isEmpty)\nprint (text.hasPrefix (\"Hello\"\
  ))\nprint (text.hasSuffix (\"world\"))\n```\n\n图 6-7 展示了每种对数函数的不同工作方式。\n\n![A437923_1_En_6_Fig7_HTML.jpg](img/A437923_1_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7. 查看不同字符串函数的工作方式\n\n\n\n### 摘要\n\n任何程序的核心都是能够接受数据、操作数据并返回有用结果的能力。操作数值数据最简单的方法是通过常见的数学运算符，例如\
  \ `+`（加法）、`-`（减法）、`/`（除法）、`*`（乘法）和 `%`（取余）。操作字符串的常见方法是通过 `+` 运算符进行拼接，它将两个字符串组合在一起。\n\
  \n作为快捷方式，你可以使用递增和递减运算符来给变量加 1 或减 1。如果需要增减的值不是 1，你可以改用复合赋值运算符。\n\n除了这些基本运算符，你还可以通过\
  \ Cocoa 框架定义的函数来操作数据。你不需要了解这些函数的工作原理；你只需要知道它们存在，以便在自己的程序中通过调用这些函数名称来使用它们。\n\n"
- "# 7. 使用分支做出决策\n\n程序接收数据后，需要以某种方式操作这些数据以返回有用的结果。简单的程序以相同的方式操作数据，但更复杂的程序需要就如何操作这些数据做出决策。\n\
  \n例如，程序可能要求用户输入密码。如果用户输入了有效的密码，那么程序就允许用户访问。如果用户没有输入有效的密码，那么程序必须显示错误消息并阻止访问。\n\n\
  当程序分析数据并根据数据做出决策时，它会使用布尔值和分支语句。布尔值表示 `true` 或 `false` 值。分支语句让你的程序可以选择执行两个或多个不同的指令集。布尔值与分支语句相结合，使程序能够对不同的数据做出响应。\n\
  \n## 理解比较运算符\n\n之前你了解了常见的数据类型，例如 `Int`、`Double` 和 `String`。Swift 还包含一种布尔数据类型，它可以保存\
  \ `true` 或 `false` 值。你可以通过声明 `Bool` 数据类型来创建布尔变量，例如：\n\n```\nvar flag : Bool\n```\n\
  \n`Bool` 代表布尔数据类型。任何定义为 `Bool` 数据类型的变量只能保存两个值之一，例如：\n\n```\nflag = true\nflag =\
  \ false\n```\n\n虽然你可以直接将 `true` 和 `false` 赋值给代表布尔数据类型的变量，但更常见的是使用比较运算符来计算布尔值。表 7-1\
  \ 展示了一些常见的比较运算符。\n\n**表 7-1.** Swift 中的常见比较运算符\n\n| 比较运算符 | 作用         | 示例    \
  \   | 布尔值  |\n|------------|--------------|------------|---------|\n| `==`     \
  \  | 等于         | `5 == 14`  | False   |\n| `<`        | 小于         | `5 < 14` \
  \  | True    |\n| `>`        | 大于         | `5 > 14`   | False   |\n| `<=`     \
  \  | 小于或等于   | `5 <= 14`  | True    |\n| `>=`       | 大于或等于   | `5 >= 14`  | False\
  \   |\n| `!=`       | 不等于       | `5 != 14`  | True    |\n\n**注意：** 等于（`==`）比较运算符是唯一也可以比较字符串的比较运算符，例如\
  \ `\"Joe\" == \"Fred\"`（计算结果为 `false`）或 `\"Joe\" == \"Joe\"`（计算结果为 `true`）。\n\n\
  比较运算符比较两个值，例如 `38 == 8` 或 `29.04 > 12`。任何比较的结果总是 `true` 或 `false`。由于使用实际值与比较运算符总是返回相同的\
  \ `true` 或 `false` 值，因此更常见的是使用比较运算符将一个固定值与一个变量进行比较，或者比较两个变量，例如：\n\n```\nlet myValue\
  \ = 45\nmyValue > 38            // 计算结果为 true\nlet yourValue = 39\nmyValue < yourValue\
  \     // 计算结果为 false\n```\n\n当你比较一个或多个变量时，结果会根据这些变量的当前值而变化。但是，在使用等于（`==`）比较运算符时，处理小数值时要小心。这是因为\
  \ `45.0` 与 `45.0000001` 不是同一个数字。在处理小数值时，最好使用大于或小于比较运算符。\n\n要了解比较运算符如何生成 `true` 或\
  \ `false` 值，请按照以下步骤操作：\n\n1. 在 Xcode 中打开 `IntroductoryPlayground` 文件。\n2. 按如下方式编辑代码：\n\
  \n```\nimport Cocoa\n4 > 9\n23 >= 12\n3.4 < 8.5\n73 <= 29\n3.0 == 3.01\n3.0 != 3.01\n\
  ```\n\n注意右边距显示了每个比较运算符的布尔值，如图 7-1 所示。\n\n![A437923_1_En_7_Fig1_HTML.jpg](img/A437923_1_En_7_Fig1_HTML.jpg)\n\
  \n**图 7-1.** 比较运算符总是计算为 true 或 false 布尔值\n\n## 理解逻辑运算符\n\n任何比较运算符，例如 `78 > 9`，都会计算出一个\
  \ `true` 或 `false` 值。然而，Swift 提供了专门用于处理两个或多个布尔值的逻辑运算符，如表 7-2 所示。\n\n**表 7-2.** Swift\
  \ 中的常见逻辑运算符\n\n| 逻辑运算符 | 作用 |\n|------------|------|\n| `&&`       | 与   |\n| `\\\
  |\\|`       | 或   |\n| `!`        | 非   |\n\n与（`&&`）和或（`||`）逻辑运算符都接受两个布尔值并将它们转换为单个布尔值。非（`!`）逻辑运算符接受一个布尔值并将其转换为相反的值。表\
  \ 7-3 展示了非（`!`）逻辑运算符的工作方式。\n\n**表 7-3.** 非（`!`）逻辑运算符\n\n| 示例      | 值    |\n|------------|-------|\n\
  | `!true`  | False |\n| `!false` | True  |\n\n与（`&&`）运算符接受两个布尔值，并根据表 7-4 计算出一个单独的布尔值。\n\
  \n**表 7-4.** Swift 中的与（`&&`）逻辑运算符\n\n| 第一个布尔值 | 第二个布尔值 | 结果  |\n|--------------|--------------|-------|\n\
  | True         | `&&` True    | True  |\n| True         | `&&` False   | False |\n\
  | False        | `&&` True    | False |\n| False        | `&&` False   | False |\n\
  \n或（`||`）运算符接受两个布尔值，并根据表 7-5 计算出一个单独的布尔值。\n\n**表 7-5.** Swift 中的或（`||`）逻辑运算符\n\n\
  | 第一个布尔值 | 第二个布尔值 | 结果  |\n|--------------|--------------|-------|\n| True     \
  \    | `\\|\\|` True  | True  |\n| True         | `\\|\\|` False | True  |\n| False\
  \        | `\\|\\|` True  | True  |\n| False        | `\\|\\|` False | False |\n\
  \n要了解布尔值如何与比较运算符和逻辑运算符一起工作，请按照以下步骤创建一个新的 playground：\n\n1. 在 Xcode 中打开 `IntroductoryPlayground`\
  \ 文件。\n2. 按如下方式编辑代码：\n\n```\nimport Cocoa\nvar x, y, z : Int\nx = 35\ny = 120\n\
  z = -48\nx == y\nx < z\ny != z\nz > -48\n// 与 && 运算符\n(y != z) && (x > z)\n(y !=\
  \ z) && (x == y)\n(x == y) && (x < z)\n(z > -48) && (x == y)\n// 或 || 运算符\n(y !=\
  \ z) || (x > z)\n(y != z) || (x == y)\n(x == y) || (x < z)\n(z > -48) || (x == y)\n\
  ```\n\n图 7-2 显示了比较运算符如何计算为 `true` 或 `false`，以及逻辑运算符（与和或）如何接受两个布尔值并返回单个 `true` 或\
  \ `false` 值。\n\n![A437923_1_En_7_Fig2_HTML.jpg](img/A437923_1_En_7_Fig2_HTML.jpg)\n\
  \n**图 7-2.** 使用比较运算符和逻辑运算符计算布尔值\n\n最终，每个布尔值必须是：\n\n- 一个 `true` 或 `false` 值\n- 一个结果为\
  \ `true` 或 `false` 的两个值的比较\n- 使用逻辑运算符组合成的、计算结果为 `true` 或 `false` 的布尔值组合\n\n\n\n\
  ## `if` 语句\n\n布尔值对于程序做出选择至关重要。如果有人输入密码，程序会检查该密码是否有效。如果为 `true`（密码有效），那么程序就授予访问权限。如果为\
  \ `false`（密码无效），那么程序就阻止访问。\n\n为了决定下一步做什么，每个程序都需要评估一个布尔值。只有这样，它才能基于该布尔值来决定下一步的行动。\n\
  \nSwift 中最简单的分支语句类型是 `if` 语句，它看起来像这样：\n\n```\nif BooleanValue == true {\n}\n```\n\
  \n为了简化这个 `if` 语句，你可以省略 `“== true”` 部分，使 `if` 语句变成这样：\n\n```\nif BooleanValue {\n\
  }\n```\n\n这个简化版本的意思是：“如果 `BooleanValue` 为 `true`，则运行花括号内的代码。如果 `BooleanValue` 为\
  \ `false`，则跳过花括号内的所有代码，不运行它们。”\n\n要了解布尔值如何与 `if` 语句配合使用，请按照以下步骤操作：\n\n1.  在 Xcode\
  \ 中打开 `IntroductoryPlayground` 文件。\n2.  按如下方式编辑代码：\n\n    ```\n    import Cocoa\n\
  \    var BooleanValue = true\n    if BooleanValue {\n    print (\"The BooleanValue\
  \ is true\")\n    }\n    ```\n\n图 7-3 显示了 `if` 语句运行的结果。将 `BooleanValue` 的值改为 `false`，你会看到\
  \ `if` 语句不再打印字符串 `“The BooleanValue is true”`。\n\n![A437923_1_En_7_Fig3_HTML.jpg](img/A437923_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3. 运行 `if` 语句\n\n## `if-else` 语句\n\n`if` 语句的主要限制是它要么运行代码，要么什么都不运行。如果你希望在一组布尔值为\
  \ `true` 时运行一组代码，在布尔值为 `false` 时运行另一组代码，你可以编写两个独立的 `if` 语句，如下所示：\n\n```\nif BooleanValue\
  \ {\n}\nif !BooleanValue {\n}\n```\n\n第一个 `if` 语句在 `BooleanValue` 为 `true` 时运行。如果不是，则什么都不做。\n\
  \n第二个 `if` 语句在 `BooleanValue` 为 `false` 时运行。如果不是，则什么都不做。\n\n编写两个独立 `if` 语句的问题在于程序的逻辑不够清晰。为了解决这个问题，Swift\
  \ 提供了 `if-else` 语句，如下所示：\n\n```\nif BooleanValue {\n// 第一组代码：布尔值为 true 时运行\n} else\
  \ {\n// 第二组代码：布尔值为 false 时运行\n}\n```\n\n`if-else` 语句正好提供两个不同的分支。如果布尔值为 `true`，则运行第一组代码。如果布尔值为\
  \ `false`，则运行第二组代码。在任何情况下，`if-else` 语句中的两组代码都不可能同时运行。\n\n要了解布尔值如何与 `if-else` 语句配合使用，请按照以下步骤操作：\n\
  \n1.  在 Xcode 中打开 `IntroductoryPlayground` 文件。\n2.  按如下方式编辑代码：\n\n    ```\n    import\
  \ Cocoa\n    var BooleanValue = true\n    if BooleanValue {\n    print (\"The BooleanValue\
  \ is true\")\n    } else {\n    print (\"The BooleanValue is false\")\n    }\n \
  \   ```\n\n图 7-4 显示了当 `BooleanValue` 为 `true` 时 `if-else` 语句的工作方式。将 `BooleanValue`\
  \ 改为 `false`，看看 `if-else` 语句如何运行第二组代码。\n\n![A437923_1_En_7_Fig4_HTML.jpg](img/A437923_1_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4. 运行 `if-else` 语句\n\n## `if-else-if` 语句\n\n`if` 语句要么运行一组代码，要么什么都不运行。`if-else`\
  \ 语句总是运行一组代码或另一组代码。但是，如果你希望在两组或多组可能的代码之间进行选择怎么办？在这种情况下，你需要使用 `if-else-if` 语句。\n\n\
  与 `if` 语句一样，`if-else-if` 语句可能根本不运行任何代码。最简单的 `if-else-if` 语句如下所示：\n\n```\nif BooleanValue\
  \ {\n// 第一组代码：布尔值为 true 时运行\n} else if BooleanValue2 {\n// 第二组代码：布尔值为 true 时运行\n\
  }\n```\n\n使用 `if-else-if` 语句，必须有一个布尔值为 `true` 才能运行代码。如果没有布尔值为 `true`，那么可能根本不会运行任何代码。`if-else-if`\
  \ 语句等效于多个 `if` 语句，如下所示：\n\n```\nif BooleanValue {\n// 第一组代码：布尔值为 true 时运行\n}\nif\
  \ BooleanValue2 {\n// 第二组代码：布尔值为 true 时运行\n}\n```\n\n使用 `if-else-if` 语句，你可以根据需要检查任意数量的布尔值，例如：\n\
  \n```\nif BooleanValue {\n// 第一组代码：布尔值为 true 时运行\n} else if BooleanValue2 {\n//\
  \ 第二组代码：布尔值为 true 时运行\n} else if BooleanValue3 {\n// 第三组代码：布尔值为 true 时运行\n} else\
  \ if BooleanValue4 {\n// 第四组代码：布尔值为 true 时运行\n} else if BooleanValue5 {\n// 第五组代码：布尔值为\
  \ true 时运行\n}\n```\n\n一旦 `if-else-if` 语句找到一个为 `true` 的布尔值，它就会运行花括号内附带的代码。但是，有可能所有布尔值都不为\
  \ `true`，在这种情况下，`if-else-if` 语句内的所有代码都不会运行。\n\n如果你想确保至少有一组代码会运行，那么你需要在 `if-else-if`\
  \ 语句的末尾添加一个最终的 `else` 子句，例如：\n\n```\nif BooleanValue {\n// 第一组代码：布尔值为 true 时运行\n\
  } else if BooleanValue2 {\n// 第二组代码：布尔值为 true 时运行\n} else if BooleanValue3 {\n//\
  \ 第三组代码：布尔值为 true 时运行\n} else if BooleanValue4 {\n// 第四组代码：布尔值为 true 时运行\n} else\
  \ if BooleanValue5 {\n// 第五组代码：布尔值为 true 时运行\n} else {\n// 如果其他所有布尔值都为 false，则运行此代码\n\
  }\n```\n\n要了解布尔值如何与 `if-else-if` 语句配合使用，请按照以下步骤操作：\n\n1.  在 Xcode 中打开 `IntroductoryPlayground`\
  \ 文件。\n2.  按如下方式编辑代码：\n\n    ```\n    import Cocoa\n    var BooleanValue = false\n\
  \    var BooleanValue2 = false\n    var BooleanValue3 = false\n    if BooleanValue\
  \ {\n    print (\"BooleanValue is true\")\n    } else if BooleanValue2 {\n    print\
  \ (\"BooleanValue2 is true\")\n    } else if BooleanValue3 {\n    print (\"BooleanValue3\
  \ is true\")\n    } else {\n    print (\"This prints if everything else is false\"\
  )\n    }\n    ```\n\n注意，因为每个布尔值都是 `false`，唯一运行的代码发生在 `if-else-if` 语句最终的 `else` 部分，如图\
  \ 7-5 所示。\n\n![A437923_1_En_7_Fig5_HTML.jpg](img/A437923_1_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5. 运行包含多个布尔值的 `if-else-if` 语句\n\n如果你将不同的布尔值更改为 `true`，你可以通过运行不同的代码集来观察 `if-else-if`\
  \ 语句如何表现不同。\n\n关于 `if-else-if` 语句：\n\n*   除非最后一部分只是一个普通的 `else` 语句，否则可能不会运行任何代码。\n\
  *   程序可以在两组或多组代码之间进行选择。\n*   可选选项的数量不限于像 `if-else` 语句那样只有两个选项。\n\n由于 `if-else-if`\
  \ 语句会检查多个布尔值，那么如果两个或更多布尔值为 `true` 会发生什么？在这种情况下，`if-else-if` 语句仅运行与第一个为 `true` 的布尔值关联的代码集，并忽略所有其余代码，如图\
  \ 7-6 所示。\n\n![A437923_1_En_7_Fig6_HTML.jpg](img/A437923_1_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6. 运行包含多个布尔值为 true 的 `if-else-if` 语句\n\n\n\n## `switch` 语句\n\n`if-else-if`\
  \ 语句可以让你创建两套或多套可能运行的代码。遗憾的是，当需要检查的布尔值过多时，`if-else-if` 语句会变得难以理解。为了解决这个问题，Swift 提供了\
  \ `switch` 语句。\n\n`switch` 语句的工作方式与 `if-else-if` 语句非常相似，但它的可读性和可写性更强。主要区别在于，`switch`\
  \ 语句不是检查多个布尔值，而是检查单个变量的值。基于这个单一变量的值，`switch` 语句可以选择运行不同的代码块。\n\n最简单的 `switch` 语句会检查一个变量是否精确等于不同的值，例如：\n\
  \n```\nswitch 值/变量/表达式 {\ncase 值 1: // 如果变量等于值 1，则运行的第一套代码\ncase 值 2: // 如果变量等于值\
  \ 2，则运行的第二套代码\ncase 值 3: // 如果变量等于值 3，则运行的第三套代码\ndefault: // 如果其他条件都不匹配，则运行的第四套代码\n\
  }\n```\n\n`switch` 语句首先会检查一个固定值（如 38 或 \"Bob\"）、一个变量（代表数据）或一个表达式（如 `3 * age`，其中\
  \ `age` 是一个变量）。最终，`switch` 语句需要确定一个单一值，并将其与它找到的第一个 `case` 语句进行匹配。一旦找到完全匹配，它就会运行与该\
  \ `case` 语句关联的一行或多行代码。\n\n要了解布尔值如何与 `case` 语句配合使用，请按照以下步骤操作：\n\n1. 在 Xcode 中打开 `IntroductoryPlayground`\
  \ 文件。\n2. 按如下所示编辑代码：\n\n```\n    import Cocoa\n    var whatNumber = 3\n    switch\
  \ whatNumber {\n    case 1: print (\"数字是 1\")\n    case 2: print (\"数字是 2\")\n \
  \   case 3: print (\"数字是 3\")\n    print (\"这难道不神奇吗？\")\n    case 4: print (\"数字是\
  \ 4\")\n    case 5: print (\"数字是 5\")\n    default: print (\"数字未定义\")\n    }\n```\n\
  \n由于 `whatNumber` 变量的值是 3，`switch` 语句会将其与 `case 3:` 匹配，然后运行冒号后面的 Swift 代码，如图 7-7\
  \ 所示。请注意，你可以在冒号后面存放多行代码，并且无需用花括号将这些代码括起来。改变 `whatNumber` 变量的值，观察它如何影响 `switch` 语句的行为。\n\
  \n![A437923_1_En_7_Fig7_HTML.jpg](img/A437923_1_En_7_Fig7_HTML.jpg)\n\n图 7-7. 运行\
  \ `switch` 语句以匹配精确值\n\n注意：与 Objective-C 等其他编程语言不同，你不需要使用 `break` 命令来分隔 `switch`\
  \ 语句中不同 `case` 里存储的代码。\n\n上述 `switch` 语句等价于：\n\n```\nif whatNumber == 1 {\n    print\
  \ (\"数字是 1\")\n} else if whatNumber == 2 {\n    print (\"数字是 2\")\n} else if whatNumber\
  \ == 3 {\n    print (\"数字是 3\")\n    print (\"这难道不神奇吗？\")\n} else if whatNumber\
  \ == 4 {\n    print (\"数字是 4\")\n} else if whatNumber == 5 {\n    print (\"数字是 5\"\
  )\n} else {\n    print (\"数字未定义\")\n}\n```\n\n如你所见，`switch` 语句更简洁，更易于阅读和理解。\n\n\
  创建 `switch` 语句时，必须处理所有可能性。在上述 `switch` 语句中，`whatNumber` 变量可以是任何整数，因此 `switch` 语句可以显式处理从\
  \ 1 到 5 的任何值。如果值不在 1 到 5 的范围内，那么 `switch` 语句的 `default` 部分会处理任何其他值。如果你未能包含 `default`，Xcode\
  \ 会将你的 `switch` 语句标记为可能的错误。这是为了保护你的代码，防止因 `switch` 语句接收到它不知道如何处理的数据而崩溃。\n\n这个 `switch`\
  \ 语句的例子试图将 `值/变量/表达式` 精确匹配一个值。然而，`switch` 语句可以尝试匹配多个值。`switch` 语句有三种方式可以检查值的范围：\n\
  \n- 显式列出所有可能的值，用逗号分隔\n- 用三个点（`...`）定义数字的起始和结束范围\n- 用两个点和一个小于号（`..<`）定义起始数字和结束范围\n\
  \n当一个 `case` 语句列出所有用逗号分隔的值时，只有当 `switch` 的 `值/变量/表达式` 精确匹配这些值之一时，其代码才会运行。例如，考虑以下\
  \ `case` 语句：\n\n```\nswitch whatNumber {\ncase 1, 2, 3: print (\"数字是 1、2 或 3\")\n\
  default: print (\"数字未定义\")\n}\n```\n\n只有当 `whatNumber` 的值是 1、2 或 3 时，其代码才会打印 \"\
  数字是 1、2 或 3\"。\n\n显式列出所有可能的值对于少量数字来说没问题，但对于多个数字，写出每个可能的数字可能会很繁琐。作为快捷方式，Swift 允许你指定一个范围。如果你想匹配\
  \ 4 到 20 之间的数字，`switch` 语句的 `case` 部分可能如下所示：\n\n```\nswitch whatNumber {\ncase 4...20:\
  \ print (\"数字在 4 到 20 之间\")\ndefault: print (\"数字未定义\")\n}\n```\n\n在这种情况下，`whatNumber`\
  \ 可以是 4、20 或介于两者之间的任何数字。三个点表示一个包含起始和结束数字（4 和 20）的范围。\n\nSwift 还可以检查一个半开范围，由两个点和一个小于号组成，例如：\n\
  \n```\nswitch whatNumber {\ncase 20..<49: print (\"数字在 20 到 48 之间\")\ndefault: print\
  \ (\"数字未定义\")\n}\n```\n\n只有当 `whatNumber` 是 20、48 或介于两者之间的任何数字时，这个 `20..<49` 半开范围才会匹配。请注意，如果\
  \ `whatNumber` 是 49，它将不会匹配这个半开范围，但如果 `whatNumber` 是 20，它就会匹配。\n\n要了解这三种多值变体是如何工作的，请按照以下步骤操作：\n\
  \n1. 在 Xcode 中打开 `IntroductoryPlayground` 文件。\n2. 按如下所示编辑代码：\n\n```\n    import\
  \ Cocoa\n    var whatNumber = 49\n    switch whatNumber {\n    case 1, 2, 3: print\
  \ (\"数字是 1\")\n    println (\"这难道不神奇吗？\")\n    case 4...20: print (\"数字在 4 到 20\
  \ 之间\")\n    case 20..<49: print (\"数字在 20 到 48 之间\")\n    default: print (\"数字未定义\"\
  )\n    }\n```\n\n当值为 49 时，`switch` 语句没有匹配到任何内容，因此它使用 `switch` 语句的 `default` 部分，如图\
  \ 7-8 所示。\n\n![A437923_1_En_7_Fig8_HTML.jpg](img/A437923_1_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8. 运行检查多个值的 `switch` 语句\n\n将 `whatNumber` 变量的值改为 2、12 和 48，观察 `switch` 语句如何匹配不同的值。\n\
  \n在前面的例子中，`switch` 语句可以检查多个值（1, 2, 3）或值的范围（`4...20`）和（`20..<49`）。然而，有时你可能想要检查一个值是小于、小于等于、大于还是大于等于。要在\
  \ `switch` 语句中检查 `<`、`<=`、`>` 或 `>=`，你必须使用以下语法：\n\n```\ncase _ where 变量名 < 值:\n\
  ```\n\n`_ where` 代码告诉 Swift，如果特定变量与某个值满足 `<`、`<=`、`>` 或 `>=` 关系，则匹配此 `case`。要了解如何在\
  \ `switch` 语句中检查 `<`、`<=`、`>` 或 `>=`，请按照以下步骤操作：\n\n1. 在 Xcode 中打开 `IntroductoryPlayground`\
  \ 文件。\n2. 按如下所示编辑代码：\n\n```\n    import Cocoa\n    var whatNumber = 49\n    switch\
  \ whatNumber {\n    case _ where whatNumber = 11 : print (\"数字大于或等于 11\")\n    default:\
  \ print (\"数字未定义\")\n    }\n```\n\n当值为 49 时，`switch` 语句匹配了 `>= 11` 这个 `case` 语句，因此它打印出\
  \ \"数字大于或等于 11\"；见图 7-9。\n\n![A437923_1_En_7_Fig9_HTML.jpg](img/A437923_1_En_7_Fig9_HTML.jpg)\n\
  \n图 7-9. 运行检查多个值的 `switch` 语句\n\n\n\n## 在 macOS 程序中做出决策\n\n使用 playground 文件来测试 `Swift`\
  \ 代码既有趣又简单，因为你可以专注于学习 `Swift` 的工作原理，而不会被编写程序的其他部分所干扰。然而，你最终还需要了解 `Swift` 代码在 playground\
  \ 文件之外是如何运行的。\n\n在这个示例程序中，用户需要输入员工 ID 号和密码。有效的员工 ID 号必须在 100 到 150 的范围内。密码必须与字符串\
  \ `\"password\"` 完全匹配（虽然这并非一个非常安全的密码）。\n\n这意味着你将使用两个比较运算符来检查名字和密码是否有效。然后，你将使用一个逻辑运算符来确保两者都有效。\n\
  \n按照以下步骤创建一个新的 macOS 项目：\n\n1.  在 `Xcode` 中，选择 **文件** ➤ **新建** ➤ **项目**。\n2.  在\
  \ `macOS` 类别下，单击 **应用程序**。\n3.  单击 **Cocoa 应用程序**，然后单击 **下一步** 按钮。`Xcode` 会询问产品名称。\n\
  4.  单击 **产品名称** 文本框并输入 `BranchingProgram`。\n5.  确保 **语言** 弹出菜单显示为 `Swift`，且未选中任何复选框。\n\
  6.  单击 **下一步** 按钮。`Xcode` 会询问你希望将项目存储在哪里。\n7.  选择一个文件夹来存储你的项目，然后单击 **创建** 按钮。\n\
  8.  在 **项目导航器** 中单击 `MainMenu.xib` 文件。\n9.  单击 **窗口** 图标以显示用户界面的窗口，如图 7-10 所示。\n\
  \n![A437923_1_En_7_Fig10_HTML.jpg](img/A437923_1_En_7_Fig10_HTML.jpg)\n\n图 7-10.\
  \ 显示用户界面窗口\n\n10. 选择 **视图** ➤ **实用工具** ➤ **显示对象库**，使对象库出现在 `Xcode` 窗口的右下角。\n11.\
  \ 在用户界面上拖放两个标签、两个文本字段和一个按钮，使其看起来类似于图 7-11。\n\n![A437923_1_En_7_Fig11_HTML.jpg](img/A437923_1_En_7_Fig11_HTML.jpg)\n\
  \n图 7-11. 使用标签、文本字段和按钮创建基本用户界面\n\n12. 单击顶部标签以选中它。然后选择 **视图** ➤ **实用工具** ➤ **显示属性检查器**。属性检查器面板会出现在\
