  \n**图 23-16.** 颜色选择器在触控栏上显示可供选择的颜色\n\n30. 点击任意颜色。注意调试区会显示你选择的颜色的名称（参见图 23-17）。\n\
  \n![A437923_1_En_23_Fig17_HTML.jpg](img/A437923_1_En_23_Fig17_HTML.jpg)\n\n**图 23-17.**\
  \ Xcode 的调试区显示来自触控栏的消息\n\n31. 点击触控栏左侧圆圈中的 X，即可再次在触控栏上显示按钮、颜色选择器和滑块。\n32. 选择 `TouchProgram`\
  \ ➤ `Quit TouchProgram`。\n\n### 总结\n\n在所有 Macintosh 电脑都配备触控栏之前，触控栏将是用户与 macOS 程序交互的一种可选方式。最终，每台\
  \ Macintosh 都将配备触控栏，但在此之前，你需要添加下面这行代码，以确保触控栏程序仅在运行 macOS 10.12.2 或更高版本的 Macintosh\
  \ 上运行：\n\n```swift\n@available(OSX 10.12.2, *)\n```\n\n要创建触控栏，你只需从对象库中将一个触控栏项目拖放到你的窗口控制器（而不是视图控制器）上。然后你需要创建一个\
  \ Swift 类文件，用于存放从你放置在触控栏上的任何项目（如按钮、滑块或标签）中关联的 `IBOutlet` 和 `IBAction` 方法。创建完 Swift\
  \ 类文件后，你必须通过使用身份检查器将该类文件定义为与你的窗口控制器配合使用。\n\n要让触控栏模拟器在没有触控栏的 Macintosh 上显示，你必须先运行你的程序，然后切换回\
  \ Xcode，选择 `Window` > `Show Touch Bar`。接着你需要切换回你正在运行的程序，才能看到触控栏实际工作。\n\n触控栏将成为 Macintosh\
  \ 的标准输入设备，因此可以预见 Apple 将添加你可以添加到触控栏上的新项目。随着越来越多的人习惯使用触控栏，可以肯定每个 macOS 程序都需要添加对触控栏的支持。\n\
  \n"
- "# 24. 面向协议编程\n\n当 Apple 在 2014 年的全球开发者大会上推出 Swift 时，它被宣传为一种比 Objective-C 更简单、更安全、更快的用于\
  \ iOS、macOS、tvOS 和 watchOS 开发的编程语言。虽然 Swift 和 Objective-C 都支持面向对象编程，但 Swift 更进一步，还提供了面向协议编程。\n\
  \n纯面向对象编程语言的最大问题之一是，扩展类的功能意味着要创建额外的子类。然后你必须基于这些新子类创建对象。这可能是一种笨拙的解决方案，因为你现在必须跟踪一个或多个子类，其中每个子类都有不同的名称，并且它们之间可能只有细微的差别。\n\
  \n更糟糕的是，Swift（与某些面向对象编程语言不同）只允许单继承。这意味着一个类只能恰好继承自另一个类。如果你真的想从两个不同的类继承属性和方法，这是不可能的。\n\
  \n为了解决继承和多子类的问题，Swift 提供了协议。协议的工作方式与面向对象编程非常相似，但有一些额外的优势：\n\n-   协议可以扩展类、结构体和枚举的功能。继承只能扩展类的功能。\n\
  -   单个类、结构体或枚举可以由一个或多个协议扩展。继承只能扩展单个类。\n\n这意味着协议比类更灵活、更通用，同时为你提供了面向对象编程的优点，而没有其缺点。你可以使用协议（面向协议编程）代替类（面向对象编程），或者混合使用面向对象编程和面向协议编程，以兼得两者的优点。\n\
  \n\n\n## 理解协议\n\n与类相似，协议可以定义属性（变量）和方法（函数）。主要区别在于，协议无法为属性设置初始值，也无法实现方法本身。协议仅定义属性及其数据类型。在协议中定义属性时，需要明确以下三项内容：\n\
  \n- 属性名称，可以是任意具有描述性的名称\n- 属性的数据类型，例如 `Int`、`Double`、`String` 等\n- 属性是只读 `{ get }`，还是可读写\
  \ `{ get set }`\n\n**注意：** 可读写 `{ get set }` 属性不能赋值给常量存储属性（使用 `let` 关键字定义）或只读计算属性。只读\
  \ `{ get }` 属性则没有此类限制。\n\n请参考下列协议：\n\n```\nprotocol Cat {\n    var name: String\
  \ { get set }\n    var age: Int { get }\n}\n```\n\n现在你可以基于此协议创建一个结构体，例如：\n\n```\n\
  struct pet : Cat {\n    var name : String\n    // let name : String -- 无效，因为 \"\
  let\" 定义了常量存储属性\n    // var name : String { return \"Fred\" } -- 无效，因为这是只读计算属性\n\
  \    let age : Int\n}\n```\n\n上述代码定义了一个名为 `pet` 的结构体，它遵循 `Cat` 协议。这意味着该结构体需要声明 `name`\
  \ 属性为字符串类型，`age` 属性为整数类型。\n\n请注意，由于 `Cat` 协议将 `age` 属性定义为只读 `{ get }`，你可以使用 `let`\
  \ 关键字将其实现为常量。你也可通过返回一个值来计算 `age` 属性，例如：\n\n```\nstruct pet : Cat {\n    var name\
  \ : String\n    var age : Int { return 4 }\n}\n```\n\n要了解如何使用含有不同类型属性的协议和结构体，请按以下步骤操作：\n\
  \n1.  在 Xcode 中选择 **File > New > Playground**。Xcode 会要求输入 playground 名称。\n2.  点击\
  \ **Name** 文本框，输入 `ProtocolPlayground`。\n3.  确保 **Platform** 弹出菜单显示为 `macOS`。\n\
  4.  点击 **Next** 按钮。Xcode 会询问你希望将 playground 存储在何处。\n5.  选择一个文件夹来存储你的项目，然后点击 **Create**\
  \ 按钮。\n6.  按如下方式编辑 playground 代码：\n\n    ```\n    import Cocoa\n    protocol Cat\
  \ {\n        var name: String { get set }\n        var age: Int { get }\n    }\n\
  \    // 使用计算属性\n    struct pet : Cat {\n        var name : String\n        var age\
  \ : Int { return 4 }\n    }\n    var animal = pet(name: \"Taffy\")\n    print (animal.name)\n\
  \    print (animal.age)\n    // 使用 \"let\" 定义常量存储属性\n    struct feral : Cat {\n\
  \        var name : String\n        let age : Int\n    }\n    var pest = feral (name:\
  \ \"Stinky\", age: 2)\n    print (pest.name)\n    print (pest.age)\n    ```\n\n\
  请注意基于结构体声明变量时的差异。当 age 使用计算属性时，声明变量时无需创建初始值，例如：\n\n```\n// 使用计算属性 { return 4 }\n\
  struct pet : Cat {\n    var name : String\n    var age : Int { return 4 }\n}\nvar\
  \ animal = pet(name: \"Taffy\")\n```\n\n然而，如果你没有使用计算属性，那么在创建变量时必须显式地初始化它，例如：\n\n\
  ```\n// 使用 \"let\" 定义常量存储属性\nstruct feral : Cat {\n    var name : String\n    let\
  \ age : Int\n}\nvar pest = feral (name: \"Stinky\", age: 2)\n```\n\n图 24-1 展示了如何基于同一个协议定义两个结构体。\n\
  \n![A437923_1_En_24_Fig1_HTML.jpg](img/A437923_1_En_24_Fig1_HTML.jpg)\n\n**图 24-1.**\
  \ 两个不同的结构体可以遵循同一个协议\n\n## 在协议中使用方法\n\n当协议定义一个方法时，它仅定义方法名称、参数以及返回值的数据类型，但不包含任何实际实现该方法的\
  \ Swift 代码，例如：\n\n```\nprotocol Cat {\n    var name: String { get set }\n    var\
  \ age: Int { get }\n    func meow (sound: String)\n}\n```\n\n如果一个类、结构体或枚举遵循此 `Cat`\
  \ 协议，它不仅需要定义 `name` 和 `age` 属性，还必须使用 Swift 代码实现协议中的方法，例如：\n\n```\nstruct pet : Cat\
  \ {\n    var name : String\n    var age : Int\n    func meow (sound : String) {\n\
  \        print (sound)\n    }\n}\n```\n\n即使类、结构体或枚举遵循的是完全相同的协议，其方法的实际实现也可能大相径庭。在上述示例中，`pet`\
  \ 结构体使用单个 `print` 语句定义了 `meow` 函数。在下面的示例中，`feral` 结构体使用两个 `print` 语句定义了 `meow` 函数：\n\
  \n```\nstruct feral : Cat {\n    var name : String\n    var age : Int\n    func\
  \ meow (sound : String) {\n        print (\"听我咆哮\")\n        print (sound.uppercased())\n\
  \    }\n}\n```\n\n要了解如何在协议中定义方法并在不同结构体中实现它们，请按以下步骤操作：\n\n1.  确保 Xcode 中已加载 `ProtocolPlayground`\
  \ 文件。\n2.  按如下方式编辑 playground 代码：\n\n```\nimport Cocoa\nprotocol Cat {\n    var\
  \ name: String { get set }\n    var age: Int { get }\n    func meow (sound : String)\n\
  }\n// 实现 meow 方法的一种方式\nstruct pet : Cat {\n    var name : String\n    var age :\
  \ Int\n    func meow (sound : String) {\n        print (sound)\n    }\n}\nvar animal\
  \ = pet(name: \"Taffy\", age: 16)\nprint (animal.name)\nprint (animal.age)\nanimal.meow(sound:\
  \ \"喂我\")\n// 实现同一个 meow 方法的第二种方式\nstruct feral : Cat {\n    var name : String\n\
  \    var age : Int\n    func meow (sound : String) {\n        print (\"听我咆哮\")\n\
  \        print (sound.uppercased())\n    }\n}\nvar pest = feral(name: \"Stinky\"\
  , age: 2)\nprint (pest.name)\nprint(pest.age)\npest.meow(sound: \"低吼\")\n```\n\n\
  图 24-2 展示了同一协议方法的两种不同实现的工作方式。\n\n![A437923_1_En_24_Fig2_HTML.jpg](img/A437923_1_En_24_Fig2_HTML.jpg)\n\
  \n**图 24-2.** 尽管遵循同一协议，方法的实现可以不同\n\n## 遵循多个协议\n\n与面向对象编程相比，协议的一大优势在于单个类、结构体或枚举可以遵循两个或更多的协议。要实现这一点，你只需指定要遵循的每个协议的名称，如下所示：\n\
  \n```\nstruct structureName : protocolName1, protocolName2, protocolNameN {\n```\n\
  \n通过允许你遵循多个协议，Swift 使编码更加灵活，因为你可以选择和使用所需的协议。要了解如何实现遵循多个协议，请按以下步骤操作：\n\n1.  确保 Xcode\
  \ 中已加载 `ProtocolPlayground` 文件。\n2.  按如下方式编辑 playground 代码：\n\n    ```\n    import\
  \ Cocoa\n    protocol Cat {\n        var name: String { get }\n        var age:\
  \ Int { get }\n    }\n    protocol CatSounds {\n        func meow (sound : String)\n\
  \    }\n    struct pet : Cat, CatSounds {\n        var name : String\n        var\
  \ age : Int\n        func meow (sound : String) {\n            print (sound)\n \
  \       }\n    }\n    var animal = pet(name: \"Fluffy\", age: 6)\n    print (animal.name)\n\
  \    print (animal.age)\n    animal.meow(sound : \"起床!\")\n    ```\n\n图 24-3 展示了这段代码如何通过一个结构体遵循两个协议来工作。请注意，这段代码的运行效果与将\
  \ `name` 和 `age` 属性与 `meow` 方法定义在同一协议中完全相同。通过将不同的属性和方法分离到两个或更多的协议中，你无需实现那些不需要的属性和/或方法。\n\
  \n![A437923_1_En_24_Fig3_HTML.jpg](img/A437923_1_En_24_Fig3_HTML.jpg)\n\n**图 24-3.**\
  \ 一个结构体可以遵循两个或更多协议\n\n由于你可以遵循多个协议，通常最好让每个协议尽可能简短和简单。这样可以更容易地只使用你需要的协议，而无需被迫实现你可能不想要或不必要的额外属性和/或方法。\n\
  \n\n好的，身为高级文档工程师和翻译员，我将遵循您的指示，将以下英文文本翻译成中文，并严格保留 Markdown 格式。\n\n\n### 协议扩展\n\n\
  在面向对象编程的世界中，你可以通过继承来扩展一个类，这会继承该类可能从其他类继承而来的所有属性和方法。在面向协议编程的世界中，你可以通过协议扩展来扩展一个协议。\n\
  \n协议扩展的用途之一是为属性定义默认值。你可以通过简单地为某个或多个属性赋值来定义默认值，例如：\n\n```\nprotocol Cat {\n    var\
  \ name: String { get }\n    var age: Int { get }\n}\n```\n\n这段代码定义了一个名为 `Cat` 的协议，它定义了\
  \ `name` 和 `age` 属性为可获取的 `{ get }`。然后，你可以创建一个遵循 `Cat` 协议并为每个属性赋予初始值的结构体：\n\n```\n\
  struct pet : Cat {\n    var name : String = \"Frank\"\n    var age : Int = 2\n}\n\
  ```\n\n现在，如果你基于此结构体声明一个变量，该变量将包含这些初始值。尽管有初始值，你仍然可以随时在这些属性中存储新数据。要了解如何在不使用扩展的情况下为协议属性定义初始值，请按照以下步骤操作：\n\
  \n1.  确保 `ProtocolPlayground` 文件已在 Xcode 中加载。\n2.  按如下方式编辑 playground 代码：\n\n```\n\
  import Cocoa\nprotocol Cat {\n    var name: String { get }\n    var age: Int { get\
  \ }\n}\nstruct pet : Cat {\n    var name : String = \"Frank\"\n    var age : Int\
  \ = 2\n}\nvar animal = pet()\nprint (animal.name)\nprint (animal.age)\nanimal.name\
  \ = \"Joey\"\nanimal.age = 13\nprint (animal.name)\nprint (animal.age)\n```\n\n\
  当你第一次基于 `pet` 结构体创建 `animal` 变量时，初始的 `name` 属性值为 \"Frank\"，初始的 `age` 属性值为 2。你可以随时为这两个属性存储新值，如图\
  \ 24-4 所示。\n\n![A437923_1_En_24_Fig4_HTML.jpg](img/A437923_1_En_24_Fig4_HTML.jpg)\n\
  \n图 24-4. 你可以为协议定义的可获取属性分配初始值\n\n如果你想为一个属性设置（并保持）一个初始值，这时就可以使用协议扩展了。协议扩展仅能用于可获取的\
  \ `{ get }` 属性。一个协议扩展只需使用 `extension` 关键字，后跟要扩展的协议名称，例如：\n\n```\nextension Cat {\n\
  \    // 在此处为一个或多个可获取属性设置默认值\n}\n```\n\n在扩展内部，你可以使用 `return` 关键字为一个或多个可获取属性计算默认值，例如：\n\
  \n```\nextension Cat {\n    var name : String { return \"Frank\" }\n}\n```\n\n协议扩展不仅将\
  \ `name` 属性定义为包含字符串 \"Frank\"，还免除了在类、结构体或枚举中定义 `name` 属性的需要，例如：\n\n```\nextension\
  \ Cat {\n    var name : String { return \"Frank\" }\n}\nstruct pet : Cat {\n   \
  \ var age : Int = 2\n}\n```\n\n上述协议扩展和结构体本质上等同于以下代码：\n\n```\nstruct pet : Cat {\n\
  \    var name : String = \"Frank\"\n    var age : Int = 2\n}\n```\n\n主要区别在于，当 `name`\
  \ 属性在结构体内部声明时，你可以在之后为其分配新的字符串。当 `name` 属性在协议扩展内部声明并设置为一个值时，你之后就不能再为其分配新的字符串了。要了解协议扩展如何定义默认值，请按照以下步骤操作：\n\
  \n1.  确保 `ProtocolPlayground` 文件已在 Xcode 中加载。\n2.  按如下方式编辑 playground 代码：\n\n```\n\
  import Cocoa\nprotocol Cat {\n    var name: String { get }\n    var age: Int { get\
  \ }\n}\nextension Cat {\n    var name : String { return \"Frank\" }\n}\nstruct pet\
  \ : Cat {\n    //var name : String = \"Frank\"\n    var age : Int = 2\n}\nvar animal\
  \ = pet()\nprint (animal.name)\nprint (animal.age)\n//animal.name = \"Joey\"\nanimal.age\
  \ = 13\nprint (animal.name)\nprint (animal.age)\n```\n\n在上面的代码中，两行被注释掉的代码向你展示了协议扩展所省略的内容。一旦你在协议扩展中定义了\
  \ `name` 属性，就不再需要在 `pet` 结构体中声明该 `name` 属性。在协议扩展中为 `name` 属性分配了默认值后，你也不能再为其分配新的字符串（例如\
  \ \"Joey\"）。图 24-5 显示了上述代码的结果。\n\n![A437923_1_En_24_Fig5_HTML.jpg](img/A437923_1_En_24_Fig5_HTML.jpg)\n\
  \n图 24-5. 使用协议扩展定义默认值\n\n在协议扩展中定义默认值的一个问题是，任何遵循该协议的对象都必须同时遵循该协议的扩展。这意味着所有基于该协议和扩展的对象都将拥有相同的、无法更改的默认值。\n\
  \n如果你希望在定义默认值时拥有灵活性，但仅针对特定的类、结构体或枚举，你可以创建一个协议扩展，该扩展仅适用于也遵循另一个协议的类、结构体或枚举：\n\n```\n\
  extension protocol2Extend where Self: protocol2Use {\n    // 在此处为一个或多个可获取属性设置默认值\n\
  }\n```\n\n上述 Swift 代码扩展了一个由 `protocol2Extend` 定义的协议。然而，`where Self:` 关键字标识了由 `protocol2Use`\
  \ 定义的第二个协议。\n\n因此，如果一个类、结构体或枚举遵循 `protocol2Extend` 定义的协议，那么只有当该类、结构体或枚举也遵循 `protocol2Use`\
  \ 定义的第二个协议时，扩展才会设置默认值。\n\n假设你创建了以下协议扩展：\n\n```\nextension Cat where Self: CatType\
  \ {\n    var name : String { return \"Frank\" }\n}\n```\n\n这将为任何遵循 `Cat` 协议和 `CatType`\
  \ 协议的类、结构体或枚举的 `name` 属性定义一个默认值 \"Frank\"。如果一个类、结构体或枚举仅遵循 `Cat` 协议，那么它的 `name` 属性将不会被分配默认值\
  \ \"Frank\"。\n\n要了解此版本的协议扩展如何仅在类、结构体或遵循特定协议的前提下工作，请按照以下步骤操作：\n\n1.  确保 `ProtocolPlayground`\
  \ 文件已在 Xcode 中加载。\n2.  按如下方式编辑 playground 代码：\n\n```\nimport Cocoa\nprotocol Cat\
  \ {\n    var name: String { get }\n    var age: Int { get }\n}\nprotocol CatType\
  \ {\n    var species: String { get }\n}\nextension Cat where Self: CatType {\n \
  \   var name : String { return \"Frank\" }\n}\nstruct pet : Cat {\n    var name\
  \ : String = \"Max\"\n    var age : Int = 2\n}\nvar animal = pet()\nprint (animal.name)\n\
  print (animal.age)\nanimal.name = \"Joey\"\nanimal.age = 13\nprint (animal.name)\n\
  print (animal.age)\n// 遵循两个协议的新结构体\nstruct wild : Cat, CatType {\n    var age :\
  \ Int = 2\n    var species : String = \"Lion\"\n}\nvar beast = wild()\nprint (beast.name)\n\
  print (beast.age)\nprint (beast.species)\n```\n\n注意，`pet` 结构体遵循了 `Cat` 协议，但由于它没有同时遵循\
  \ `CatType` 协议，因此你可以为其 `name` 属性分配一个初始值 \"Max\"，并且之后可以重新分配 \"Joey\" 给同一个 `name`\
  \ 属性。\n\n然而，`wild` 结构体同时遵循了 `Cat` 和 `CatType` 协议，因此它也遵循了协议扩展，该扩展将 \"Frank\" 作为默认值分配给\
  \ `wild` 结构体的 `name` 属性，如图 24-6 所示。\n\n![A437923_1_En_24_Fig6_HTML.jpg](img/A437923_1_En_24_Fig6_HTML.jpg)\n\
  \n图 24-6. 协议扩展可以选择性地为遵循特定协议的结构体分配默认值\n\n\n\n### 使用协议扩展扩展通用数据类型\n\n协议扩展最有趣的用途之一，可能是为诸如\
  \ `String`、`Int` 和 `Double` 这样的通用数据类型添加属性。用于扩展数据类型的协议扩展如下所示：\n\n```\nextension dataType\
  \ {\n// 新属性 {\n// 返回计算值\n}\n}\n```\n\n当你使用协议扩展通用数据类型时，必须创建一个变量，该变量代表数据类型，后跟一个句点和属性名。因此，如果你为\
  \ `Int` 数据类型创建了如下扩展：\n\n```\nextension Int {\nvar name : String {\nreturn text\n\
  }\n}\n```\n\n你可以像这样存储一个字符串值：\n\n```\nvar status = 25.name   // 表示一个 String\n```\n\
  \n要了解如何使用协议扩展来扩展通用数据类型，请按以下步骤操作：\n\n1.  确保 `ProtocolPlayground` 文件已在 Xcode 中加载。\
  \  \n2.  按如下方式编辑 playground 代码：\n\n```\nimport Cocoa\nfunc checkMe (myAge : Int)\
  \ -> String {\nif myAge >= 21 {\nreturn \"Legal\"\n} else {\nreturn \"Underage\"\
  \n}\n}\nvar text : String\nvar myAge : Int\nmyAge = 32\ntext = checkMe (myAge :\
  \ myAge)\nextension Int {\nvar name : String {\nreturn text\n}\n}\nvar status =\
  \ myAge.name\nprint (myAge)\nprint (status)\nmyAge = 16\ntext = checkMe (myAge :\
  \ myAge)\nstatus = myAge.name\nprint (myAge)\nprint (status)\n```\n\n图 24-7 显示了运行此代码的结果。如您所见，当\
  \ `myAge` 变量大于 21 时，其 `name` 属性会存储一个字符串，该字符串会被存入 `status` 变量。根据 `myAge` 变量的值，`name`\
  \ 属性会存储字符串“Legal”或字符串“Underage”。\n\n![A437923_1_En_24_Fig7_HTML.jpg](img/A437923_1_En_24_Fig7_HTML.jpg)\n\
  \n**图 24-7.** 协议扩展可以扩展通用数据类型\n\n### 总结\n\n协议提供了一种扩展现有代码的替代方式。就像类一样，协议可以定义属性和方法。主要区别在于，协议只定义方法的名称和参数，但并未实际包含实现该方法的\
  \ Swift 代码。\n\n另一个区别是，当协议定义属性时，它还必须定义该属性是只读的 (`{ get }`) 还是可读写的 (`{ get set }`)。\n\
  \n协议的工作原理与继承非常相似。虽然继承只允许类继承自恰好一个其他类，但协议可以使用一个或多个协议来扩展类、结构体和枚举。\n\n协议扩展允许你为属性定义默认值。当与诸如\
  \ `Int`、`String` 和 `Double` 这样的通用数据类型结合使用时，协议扩展允许数据类型存储额外的信息。\n\n请记住，你可以混合使用面向对象编程和面向协议编程，因此你无需在两者之间二选一。对象和协议都可能有用，具体取决于你在特定程序中需要完成的任务。确保你理解如何定义、使用和扩展协议，因为协议将是\
  \ Swift 程序的一个常见特性。\n\n"
- "# 25. 防御性编程\n\n程序员往往很乐观，因为当他们编写代码时，他们会假设代码能够正确运行。然而，在编程方面，更悲观一些通常更好。与其假设你的代码第一次就能运行成功，不如假设你的代码根本不能运行，这样更安全。这会迫使你在编写\
  \ Swift 代码时格外小心，以确保代码完全按照你的预期工作，并且不会发生任何意外行为。\n\n没有程序是没有错误的。与其浪费时间查找问题，不如提前预见它们，并尽最大努力从一开始就防止它们潜入你的代码中。虽然\
  \ 100% 的时间都编写出无错误的代码是不可能的，但你在编写代码时越具有防御性，就越不需要花时间查找导致代码无法正常工作的错误。\n\n总的来说，不要做任何假设。假设每次都会让你大吃一惊，而且很少有好的结果。通过提前预见问题，你可以为它们制定计划，这样它们就不会破坏你的程序，也不会迫使你花费无数时间试图修复一个你本以为根本不应该存在的问题。\n\
  \n## 使用极限值进行测试\n\n测试代码最简单的方法是从极限值开始，看看你的程序如何处理远远超出预期范围的数据。在处理数字时，程序通常假设用户会提供固定范围内的有效数据，但如果用户输入的是字母或符号（比如笑脸）而不是数字，会发生什么？如果用户输入的是整数而不是小数（或反之）呢？如果用户输入的是像\
  \ 420 亿或 -0.00000005580 这样的极端数字呢？\n\n在处理字符串时，进行同样类型的测试。当程序期望一个字符串却收到了一个数字时，它会如何反应？如果它收到一个包含\
  \ 3000 个字符的巨大字符串呢？如果它收到带有重音符号或不寻常字母的外语符号呢？\n\n通过使用极限值测试你的程序，你可以观察程序是优雅地响应，还是直接崩溃。最终目标是避免崩溃并优雅地响应。这可能意味着反复要求用户提供有效数据，或者至少在程序收到无效数据时警告用户。可靠的程序需要防范任何可能威胁其正常运行的因素。\n\
  \n\n\n## 使用可选变量\n\nSwift 最强大的功能之一就是可选变量。可选变量可以包含一个值，也可以完全不包含任何值（用 `nil` 值标识）。不过，你必须小心使用可选变量，因为如果在它们包含\
  \ `nil` 值时试图使用它们，程序可能会崩溃。\n\n使用可选变量时，需要注意以下几点：\n\n*   检查可选变量是否持有 `nil` 值\n*   解包可选变量以获取其实际值\n\
  \n通常情况下，你可以使用感叹号来访问可选变量内部存储的值，这被称为解包可选变量。解包可选变量时最大的问题在于，你可能错误地假定它的值不是 `nil`。假设你写了如下代码：\n\
  \n```\nvar test : String?\nprint (test)\nprint (test!)\n```\n\n由于 `test` 可选变量未被赋值，其默认值为\
  \ `nil`。第一个 `print` 命令会直接打印 `nil`。然而，第二个 `print` 命令试图解包这个可选变量，但由于其值为 `nil`，这会导致错误，如图\
  \ 25-1 所示。\n\n![A437923_1_En_25_Fig1_HTML.jpg](img/A437923_1_En_25_Fig1_HTML.jpg)\n\
  \n图 25-1.\n\n解包一个值为 `nil` 的可选变量会导致错误\n\n处理可选变量时，始终要先检查它们是否为 `nil`，再尝试使用。检查 `nil`\
  \ 值的方法之一就是直接判断可选变量是否等于 `nil`，如下所示：\n\n```\nimport Cocoa\nvar test : String?\nif\
  \ test == nil {\nprint (\"Nil value\")\n} else {\nprint (test!)\n}\n```\n\n在这个例子中，`if-else`\
  \ 语句首先检查 `test` 可选变量是否等于 `nil`。如果是，则打印“Nil value”。如果不是，则可以使用感叹号安全地解包该可选变量。\n\n另一种检查\
  \ `nil` 值的方法是将可选变量赋值给一个常量，这被称为可选绑定。与其直接使用可选变量，不如将其值绑定到一个常量上，例如：\n\n```\nif let constant\
  \ = optionalVariable {\n// 可选变量不为 nil\n} else {\n// 可选变量为 nil 值\n}\n```\n\n如果需要同时检查多个可选变量，可以在一行中列出它们，如下所示：\n\
  \n```\nif let constant = optionalVariable, constant2 = optionalVariable2 {\n// 所有可选变量都不为\
  \ nil\n} else {\n// 一个或多个可选变量为 nil\n}\n```\n\n如果常量持有值，那么 `if-else` 语句就可以使用该常量值。如果常量不持有值（包含\
  \ `nil`），那么 `if-else` 语句会执行其他操作，以避免使用 `nil` 值。通过使用常量来存储可选变量的值，你可以避免使用感叹号来解包可选变量。\n\
  \n让我们看看如何使用可选绑定：\n\n1.  在 Xcode 中，选择“文件” ➤ “新建” ➤ “Playground”。Xcode 会要求输入一个 Playground\
  \ 名称。\n2.  点击“名称”文本字段，输入 `DefensePlayground`。\n3.  确保“平台”弹出菜单显示为 macOS。\n4.  点击“下一步”按钮。Xcode\
  \ 会询问你想将 Playground 存储在何处。\n5.  选择一个文件夹来存储项目，然后点击“创建”按钮。\n6.  按如下方式编辑 Playground\
  \ 代码：\n\n```\nimport Cocoa\nvar test : String?\nvar final : String?\nif let checkMe\
  \ = test, let checkMe2 = final {\nprint (checkMe)\n} else {\nprint (\"Nil value\
  \ in one or both optionals\")\n}\ntest = \"Hello\"\nif let checkMe = test, let checkMe2\
  \ = final {\nprint (checkMe)\n} else {\nprint (\"Nil value in one or both optionals\"\
  )\n}\nfinal = \"Bye\"\nif let checkMe = test, let checkMe2 = final {\nprint (checkMe\
  \ + \" & \" + checkMe2)\n} else {\nprint (\"Nil value in one or both optionals\"\
  )\n}\n```\n\n上面的代码将两个不同的可选变量值分别赋值给了两个不同的常量。只有当两个常量都包含非 nil 值时，`if-else` 语句的第一部分才会执行。如果其中一个或两个常量包含\
  \ `nil` 值，则会执行 `if-else` 语句的 `else` 部分，如图 25-2 所示。另请注意，代码中没有任何地方使用感叹号解包可选变量。\n\n\
  ![A437923_1_En_25_Fig2_HTML.jpg](img/A437923_1_En_25_Fig2_HTML.jpg)\n\n图 25-2.\n\
  \n使用可选绑定将可选变量的值赋给常量\n\n\n\n## 使用可选链\n\n在处理可选类型时，通常使用问号来声明可选变量，例如 `Int?`、`String?`、`Float?`\
  \ 和 `Double?`。除了使用常见的数据类型之外，你还可以将任何类型声明为可选变量，包括类。\n\n要将一个普通数据类型声明为可选变量，只需在数据类型名称后加上问号，如下所示：\n\
  \n```\nvar myNumber : String?\n```\n\n通常情况下，类中的属性持有常见的数据类型，例如 `String`、`Int` 或 `Double`。然而，类的属性也可以持有另一个类。如果你可以将一个类声明为一种类型，那么你也可以将一个类声明为可选变量，如下所示：\n\
  \n```\nclass Dreamer {\nvar candidate: Politician?\n}\nclass Politician {\nvar name\
  \ = \"\"\n}\n```\n\n现在，如果你基于 `Dreamer` 类创建一个对象，你会得到一个持有可选变量的 `candidate` 属性：\n\n\
  ```\nlet person = Dreamer()\n```\n\n`person` 对象基于 `Dreamer` 类，这意味着它也持有一个名为 `candidate`\
  \ 的属性。然而，`candidate` 属性也是一个基于 `Politician` 类的可选变量对象。此时，`candidate` 属性的初始值为 `nil`。\n\
  \n要了解一个对象如何将另一个对象作为可选变量，请按照以下步骤操作：\n\n1. 确保 `DefensePlayground` 已加载到 Xcode 中。\n\
  2. 将 playground 代码编辑如下：\n\n```\n    import Cocoa\n    class Dreamer {\n    var candidate:\
  \ Politician?\n    }\n    class Politician {\n    var name : String = \"\"\n   \
  \ }\n    let person = Dreamer()\n    if let check = person.candidate?.name {\n \
  \   print (\"Name = \\(check)\")\n    }\n    else {\n    print (\"Nil value here\"\
  )\n    }\n```\n\n这段代码未能从 `Politician` 类创建对象，因此 `candidate` 属性为 `nil`。因为你将 `candidate`\
  \ 属性声明为可选变量，所以你可以在 `if-else` 语句中使用所谓的可选链来访问其 `name` 属性，如图 25-3 所示。\n\n![A437923_1_En_25_Fig3_HTML.jpg](img/A437923_1_En_25_Fig3_HTML.jpg)\n\
  \n图 25-3. 可选链可以访问类的可选变量属性\n\n要在 `candidate` 属性中存储一个值，你需要创建另一个对象，如下所示：\n\n```\nperson.candidate\
  \ = Politician()\n```\n\n然后，你需要将数据存储到 `Politician` 类的 `name` 属性中。为此，你需要解包可选变量（`Politician`\
  \ 类）以访问其 `name` 属性，如下所示：\n\n```\nperson.candidate!.name = \"Sally\"\n```\n\n请记住，只有当你绝对确定可选变量包含一个值时，才应使用感叹号解包可选变量。在这种情况下，你正在给可选变量赋值（`\"\
  Sally\"`），因此解包可选变量是安全的。\n\n让我们看看如何修改之前的代码以在可选变量属性中存储一个值：\n\n1. 确保 `DefensePlayground`\
  \ 已加载到 Xcode 中。\n2. 将 playground 代码编辑如下：\n\n```\n    import Cocoa\n    class Dreamer\
  \ {\n    var candidate: Politician?\n    }\n    class Politician {\n    var name\
  \ : String = \"\"\n    }\n    let person = Dreamer()\n    if let check = person.candidate?.name\
  \ {\n    print (\"Name = \\(check)\")\n    }\n    else {\n    print (\"Nil value\
  \ here\")\n    }\n    person.candidate = Politician ()\n    person.candidate!.name\
  \ = \"Sally\"\n    if let check = person.candidate?.name {\n    print (\"Name =\
  \ \\(check)\")\n    }\n    else {\n    print (\"Nil value here\")\n    }\n```\n\n\
  请注意，`candidate` 可选变量（`Politician`）在你明确存储一个值之前是未定义的或为 `nil`。一旦你将字符串（`\"Sally\"`）存储到\
  \ `name` 属性中，它就不再持有 `nil` 值，如图 25-4 所示。\n\n![A437923_1_En_25_Fig4_HTML.jpg](img/A437923_1_En_25_Fig4_HTML.jpg)\n\
  \n图 25-4. 你需要解包可选变量才能在其中存储一个值\n\n处理可选变量的关键在于确保你正确使用问号和感叹号符号。幸运的是，如果你省略了任一符号，Xcode\
  \ 通常可以提示你选择正确的符号，如图 25-5 所示。\n\n![A437923_1_En_25_Fig5_HTML.jpg](img/A437923_1_En_25_Fig5_HTML.jpg)\n\
  \n图 25-5. Xcode 编辑器可以在你处理可选变量时提示你何时使用 `?` 或 `!` 符号\n\n问号符号用于创建可选变量或安全地访问可选变量。感叹号符号用于解包可选变量，因此要确保那些被解包的可选变量持有非\
  \ nil 的值。\n\n通常，每当你看到可选变量使用了问号，你的代码在处理 `nil` 值时很可能是安全的。然而，每当你看到可选变量使用了感叹号，请确保该可选变量持有一个值，因为如果它持有\
  \ `nil` 值，你的代码可能不安全并可能导致崩溃。\n\n## 错误处理\n\n由于你不可能每次都编写无错误的代码，Swift 提供了一种称为错误处理的功能。错误处理背后的理念是识别并捕获可能的错误，以便你的程序能够优雅地处理它们，而不是让程序崩溃或不可预测地运行。要处理错误，你需要遵循以下几个步骤：\n\
  \n* 定义你想要识别的描述性错误\n* 识别一个或多个函数来检测错误并识别发生的错误类型\n* 处理错误\n\n### 使用枚举定义错误\n\n在过去，程序经常显示充满十六进制数字和奇怪符号的晦涩错误消息。这类错误消息通常对于识别可能发生的问题毫无用处。这就是为什么错误处理的第一步是创建一个描述性错误类型的列表。\n\
  \n你为不同错误指定的名称完全是任意的，但你应该为不同类型的错误消息赋予有意义的名称。要创建一个描述性错误类型的列表，你需要创建一个使用 `ErrorType`\
  \ 协议的 `enum`，如下所示：\n\n```\nenum enumName : Error {\ncase descriptiveError1\ncase\
  \ descriptiveError2\ncase descriptiveError3\n}\n```\n\n将 `enumName` 替换为能够标识你想要识别的错误类型的描述性名称。然后使用\
  \ `case` 关键字输入一个单词形式（不带空格）的描述性错误名称。你的可能错误列表可以少至一个，也可以多到你想要描述的任意数量，因此你不受固定数量的限制。如果你想创建一个列出三种错误类型的\
  \ `enum`，可以使用如下代码：\n\n```\nenum ageError : Error {\ncase negativeAge // 负数\ncase\
  \ unrealAge   // 大于 140 的数\ncase underAge    // 未满 21 岁\n}\n```\n\n\n\n#### 创建识别错误的函数\n\
  \n创建描述性错误类型的列表后，现在需要创建一个或多个你认为可能发生错误的函数。通常，你会像这样定义一个函数：\n\n```\nfunc functionName\
  \ {\n// 代码写在这里\n}\n```\n\n要让一个函数识别错误，你需要插入 `throws` 关键字，如下所示：\n\n```\nfunc functionName\
  \ throws {\n// 代码写在这里\n}\n```\n\n`throws` 关键字表示该函数“抛出”错误，由代码的其他部分来处理。在带有 `throws`\
  \ 关键字的函数内部，你需要使用一个或多个 `guard` 语句。\n\n`guard` 语句用于识别允许的情况，其工作方式类似于 `if-else` 语句。如果\
  \ `guard` 语句的布尔条件为 `true`，则不会发生任何事。然而，如果 `guard` 语句为 `false`，则 `guard` 语句可以使用 `throws`\
  \ 关键字来识别特定类型的错误，如下所示：\n\n```\nguard 布尔条件 else {\nthrows 枚举名称.描述性错误\n}\n```\n\n如果你只允许大于\
  \ 21 的值，可以像这样创建一个 `guard` 语句：\n\n```\nguard myAge > 21 else {\nthrows ageError.underAge\n\
  }\n```\n\n如果布尔条件（`myAge > 21`）为 `true`，这个 `guard` 语句将不执行任何操作。否则，它将抛出 `ageError.underAge`\
  \ 错误，其中“`ageError`”是枚举的名称，列出了要识别的不同错误，而“`underAge`”是可能发生的其中一个错误。\n\n`guard` 语句总是定义可接受的行为（`myAge\
  \ > 21`），否则它会通过 `throws` 关键字识别一个错误。一个函数（用 `throws` 关键字标识）可以包含一个或多个 `guard` 语句。\n\
  \n### 处理错误\n\n当你用一个或多个 `throws` 关键字标识了函数，且这些函数使用一个或多个 `guard` 语句来识别可能的错误后，你最终需要一种方法来处理这些错误。在\
  \ Swift 中，你可以使用 `do-try-catch` 语句来完成，如下所示：\n\n```\ndo {\ntry 调用可能抛出错误的函数\n} catch\
  \ 枚举名称.描述性错误 {\n// 处理错误的代码\n}\n```\n\n`do-try-catch` 语句尝试运行一个可以使用 `throws` 关键字识别错误的函数。如果该函数没有通过任何\
  \ `guard` 语句识别出错误，那么 `do-try-catch` 语句的执行效果与普通的函数调用完全相同。\n\n然而，如果函数识别出一个错误，你就需要在\
  \ `do-try-catch` 语句中编写代码来处理该错误。处理这个错误的方式可以很简单，比如打印一条消息来告知你存在问题，也可以很复杂，比如运行一整套全新的代码来专门处理该问题。\n\
  \n关键在于，如果你预见到可能出现的错误并为处理这些错误编写了代码，那么你的程序崩溃的可能性就会降低。如果你的程序确实崩溃了，只需找出原因（这也许并不容易），创建一个新的描述性错误名称来标识它，然后创建一个新的\
  \ `catch` 语句来处理该错误。\n\n让我们看看错误处理是如何工作的：\n\n1.  确保 `DefensePlayground` 已加载到 Xcode\
  \ 中。\n2.  按如下方式编辑 playground 代码：\n\n    ```\n    import Cocoa\n    enum ageError\
  \ : Error {\n    case negativeAge // 负数\n    case unrealAge   // 大于 140 的数字\n  \
  \  case underAge    // 未满 21 岁\n    }\n    func checkAge(myAge : Int) throws {\n\
  \    print (myAge)\n    guard myAge > 0 else {\n    throws ageError.negativeAge\n\
  \    }\n    guard myAge <= 140 else {\n    throws ageError.unrealAge\n    }\n  \
  \  guard myAge >= 21 else {\n    throws ageError.underAge\n    }\n    }\n    var\
  \ oldAge = -9\n    do {\n    try checkAge (myAge: oldAge)\n    } catch ageError.negativeAge\
  \ {\n    print (\"年龄不能是负数\")\n    } catch ageError.unrealAge {\n    print (\"年龄不能大于\
  \ 140\")\n    } catch ageError.underAge {\n    print (\"抱歉，你必须年满 21 岁\")\n    }\n\
  \    print (oldAge)\n    ```\n\n注意负数是如何被识别并通过一条简单的消息来处理的，如图 25-6 所示。\n\n![A437923_1_En_25_Fig6_HTML.jpg](img/A437923_1_En_25_Fig6_HTML.jpg)\n\
  \n图 25-6.\n\n错误处理涉及一个枚举、一个包含 `guard` 语句的函数以及一个 `do-try-catch` 语句\n\n将 `oldAge` 变量的值改为\
  \ 250，看看 `do-try-catch` 语句如何将该数字识别为大于 140，从而判定为不现实的值。将 `oldAge` 变量的值改为 15，看看 `do-try-catch`\
  \ 语句如何识别出年龄未满 21 岁。\n\n要在程序中使用错误处理，你必须首先识别可能的问题，然后决定如何处理这些问题。错误处理只能识别你已经知道的错误，但它能让你的程序在面对可能遇到的常见问题时不那么脆弱。\n\
  \n### 总结\n\n无论作为程序员的你多么有天赋、有技巧或受过何种教育，偶尔都会犯错误。有时这些错误是你可以轻松修正的小问题，但有时你犯的错误会导致各种难以捉摸的问题，让你在查找和修复时感到挑战重重且沮丧不已。这就是编程的本质。\n\
  \n然而，你无意间造成的任何问题，也都是你可以学会发现并修复的问题。一旦你明白了某个错误是如何产生的，你就很可能记住将来如何修复这类错误——无论是你自己还是别人再次犯下同样的错误。这让你得以解放，去犯那些你可能从未遇到过的新错误。\n\
  \n减少程序中错误的最佳方法是仔细检查你的代码，并假设任何事情都不会顺利运行。然后，寻找一切可能的方式来确保它不会出错。你越是带着防御心态去编码，就越有可能在问题发生之前就预防它们。\n\
  \n编程与其说是一门科学，不如说是一门艺术，因此，学会最适合你自己的方法来减少程序中引入的错误。在尝试新代码时，通常更安全的做法是在 Swift playground\
  \ 或者与你实际程序分离的简单程序中先进行测试。\n\n这样，你可以安全地隔离并测试你的代码。当它正常工作后，你就可以将其复制粘贴到你的程序中。\n\n错误是编程世界的常态。理想情况下，你希望将更多时间花在编写代码上，而减少调试代码的时间。\n\
  \n"
- "# 简化用户界面设计\n\n设计用户界面可能颇具挑战。你不仅需要设计一个易于使用的用户界面，还需要设计一个能够响应用户对窗口大小所做任何更改的自适应用户界面。如果用户缩小窗口，你的用户界面必须相应缩小，且不能截断任何元素。如果用户放大窗口，你的用户界面必须相应扩展，以保持外观一致。\n\
  \n为了帮助创建自适应用户界面，Xcode 提供了约束，这些约束可以将各种用户界面元素的边缘固定到窗口边缘或其他用户界面元素的边缘。在本章中，你将了解更多关于约束和故事板的知识，这将帮助用户界面设计变得比以往任何时候都更简单。\n\
  \n\n\n## 使用堆栈视图\n\n如果你的用户界面包含几个项目，例如一个文本字段、一个按钮和一个标签，那么对这些项目设置约束以使它们保持在正确的位置是相当直接的。但是，如果你的用户界面包含多个项目，那么对每个项目设置如此多的约束可能会变得混乱。更改一个约束，你的整个用户界面就可能无法正确适配，这通常意味着浪费时间去尝试让多个约束正常工作。图\
  \ 26-1 展示了多个约束在拥挤的用户界面上看起来有多混乱。\n\n![A437923_1_En_26_Fig1_HTML.jpg](img/A437923_1_En_26_Fig1_HTML.jpg)\n\
  \n图 26-1. 多个约束使得正确布局用户界面变得困难\n\n为了解决这个问题，Xcode 提供了一项名为堆栈视图（stack view）的功能。堆栈视图的基本思想是，用户界面项目组通常需要保持在一起。你无需为每个项目单独设置约束，而是将它们分组到一个堆栈视图中，然后为这个单一的堆栈视图设置约束。\n\
  \n要了解如何创建和使用堆栈视图，请遵循以下步骤：\n\n1. 在 Xcode 中选择“文件” ➤ “新建” ➤ “项目”。\n2. 在 macOS 类别下点击“应用程序”。\n\
  3. 点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 现在会要求输入产品名称。\n4. 在“产品名称”文本字段中点击，然后输入 `StackViewProgram`。\n\
  5. 确保“语言”弹出菜单显示为“Swift”，并且“使用故事板”复选框已被选中。\n6. 点击“下一步”按钮。Xcode 会询问你希望将项目存储在哪里。\n\
  7. 选择一个文件夹来存储你的项目，然后点击“创建”按钮。\n8. 在项目导航器中点击 `Main.storyboard` 文件。你的程序用户界面将会出现。\n\
  9. 选择“视图” ➤ “实用工具” ➤ “显示对象库”。对象库会出现在 Xcode 窗口的右下角。\n10. 将三个复选框拖到用户界面窗口上，使它们上下堆叠。请注意，除非你将每个复选框精确对齐，否则它们看起来不会整齐。\n\
  11. 拖动鼠标选中所有三个复选框，如图 26-2 所示。（另一种选择多个项目的方法是按住 Shift 键，然后点击你想要选择的每个项目。）\n\n    ![A437923_1_En_26_Fig2_HTML.jpg](img/A437923_1_En_26_Fig2_HTML.jpg)\n\
  \n    图 26-2. 拖动是快速选择多个项目的方法\n\n12. 选择“编辑器” ➤ “嵌入” ➤ “堆栈视图”（或点击中间 Xcode 面板右下角的“嵌入堆栈”图标）。Xcode\
  \ 会将你选中的项目分组到一个单独的堆栈视图中。\n13. 将鼠标指针移到包含三个复选框的堆栈视图上，按住 Control 键，然后将鼠标向窗口的右边缘拖动。\n\
  14. 松开 Control 键和鼠标按钮。会弹出一个窗口。\n15. 选择“尾随空间到容器”选项。Xcode 会为整个堆栈视图显示约束。\n16. 将鼠标指针移到包含三个复选框的堆栈视图上，按住\
  \ Control 键，然后将鼠标向窗口的底部边缘拖动。\n17. 松开 Control 键和鼠标按钮。会弹出一个窗口。\n18. 选择“底部空间到容器”选项。Xcode\
  \ 会为整个堆栈视图显示约束。\n19. 选择“产品” ➤ “运行”。程序的用户界面会出现。\n20. 拖动窗口的右下角来缩小和放大窗口。请注意，当你改变窗口的宽度和高度时，三个复选框的堆栈会作为一个整体一起移动。\n\
  21. 选择“StackViewProgram” ➤ “退出 StackViewProgram”。\n\n## 修复约束冲突\n\n理想情况下，约束应该将项目与窗口边缘或其他用户界面项目边缘保持特定距离。但是，如果你缩小或放大窗口，约束可能会产生意想不到的问题。\n\
  \n让我们看看在用户界面项目上设置两个约束是如何产生问题的：\n\n1. 确保 `StackViewProgram` 项目已加载到 Xcode 中。\n2. 在项目导航器面板中点击\
  \ `Main.storyboard` 文件。\n3. 选择“编辑” ➤ “全选”（或按 Command + A）。Xcode 将选中当前在用户界面窗口上的堆栈视图。\n\
  4. 按下键盘上的 Delete 键，或选择“编辑” ➤ “删除”以从窗口中删除所有用户界面项目。\n5. 选择“视图” ➤ “实用工具” ➤ “显示对象库”。\n\
  6. 将一个单独的文本字段拖到用户界面窗口的中间。（不必担心精确定位。）\n7. 将鼠标指针移到文本字段上，按住 Control 键，然后将鼠标向窗口的右边缘拖动。\n\
  8. 松开 Control 键和鼠标。会弹出一个窗口。\n9. 选择“尾随空间到容器”选项。Xcode 会为文本字段的右边缘到窗口的右边缘创建一个约束。\n10.\
  \ 将鼠标指针移到文本字段上，按住 Control 键，然后将鼠标向窗口的左边缘拖动。\n11. 松开 Control 键和鼠标。会弹出一个窗口。\n12. 选择“前导空间到容器”选项。Xcode\
  \ 会为文本字段的左边缘到窗口的左边缘创建一个约束。\n13. 选择“产品” ➤ “运行”。用户界面窗口会出现。\n14. 将鼠标指针移到窗口的右边缘，通过向右拖动鼠标来增加窗口宽度。请注意，文本字段会向右扩展。\n\
  15. 将鼠标指针移到窗口的右边缘，通过向左拖动鼠标来缩小窗口宽度。请注意，文本字段会缩小。如果你继续缩小窗口宽度，文本字段最终会完全消失。\n16. 选择“StackViewProgram”\
  \ ➤ “退出 StackViewProgram”。\n\n现在，你有两个约束将文本字段与两个窗口边缘保持固定距离，但它们并没有阻止文本字段在窗口过度缩小时消失。解决这个问题的一种方法是创建一个压缩约束。\n\
  \n压缩约束可以防止用户界面项目过度缩小或扩展。要创建压缩约束，你需要按住 Control 键，并在该用户界面元素的边界内拖动鼠标。\n\n1. 确保 `StackViewProgram`\
  \ 项目已加载到 Xcode 中。\n2. 在项目导航器面板中点击 `Main.storyboard` 文件。\n3. 将鼠标指针移到文本字段上。\n4. 按住\
  \ Control 键，并左右拖动鼠标，确保鼠标指针保持在文本字段的边界内。\n5. 松开 Control 键和鼠标。会弹出一个菜单，如图 26-3 所示。\n\
  \n![A437923_1_En_26_Fig3_HTML.jpg](img/A437923_1_En_26_Fig3_HTML.jpg)\n\n图 26-3.\
  \ 定义压缩约束\n\n6. 选择“宽度”。Xcode 会在文本字段下方显示一个压缩约束，如图 26-4 所示。\n\n![A437923_1_En_26_Fig4_HTML.jpg](img/A437923_1_En_26_Fig4_HTML.jpg)\n\
  \n图 26-4. 压缩约束出现在用户界面项目下方\n\n7. 选择“产品” ➤ “运行”。用户界面窗口会出现。\n8. 将鼠标指针移到窗口的右边缘，尝试拖动窗口以扩展或缩小其宽度。请注意，由于压缩约束的存在，你无法做到这一点。\n\
  9. 选择“StackViewProgram” ➤ “退出 StackViewProgram”。\n\n\n\n压缩约束告诉 Xcode 保持文本字段的固定宽度，而左侧和右侧的约束则告诉\
  \ Xcode 保持文本字段与窗口左右边缘的固定距离。为了满足所有这些约束，窗口的宽度将无法再调整大小。\n\n如果你想保持文本字段宽度不小于当前宽度，但允许窗口调整大小，该怎么办？一种解决方案是使用约束优先级。\n\
  \n优先级定义了哪些约束必须首先被满足。每次创建约束时，Xcode 都会为其分配优先级 1000，这是可能的最高优先级。如果你为某个约束设置了较低的优先级，那么该约束将允许具有更高优先级的约束优先执行。让我们看看更改约束优先级是如何工作的：\n\
  \n1.  确保 `StackViewProgram` 项目已在 Xcode 中加载。\n2.  点击项目导航面板中的 `Main.storyboard` 文件。\n\
  3.  点击文本字段以将其选中。\n4.  选择 “视图” ➤ “实用工具” ➤ “显示尺寸检查器”。尺寸检查器面板会出现在 Xcode 窗口的右上角。\n5.\
  \  点击宽度约束右侧的 “编辑”。将出现一个弹出窗口，如图 26-5 所示。\n\n![A437923_1_En_26_Fig5_HTML.jpg](img/A437923_1_En_26_Fig5_HTML.jpg)\n\
  \n图 26-5. 编辑约束\n6.  点击优先级文本字段右侧的向下箭头。将出现一个弹出菜单，如图 26-6 所示。\n\n![A437923_1_En_26_Fig6_HTML.jpg](img/A437923_1_En_26_Fig6_HTML.jpg)\n\
  \n图 26-6. 更改约束的优先级\n7.  选择 “低 (250)”。请注意，Xcode 现在将宽度约束显示为虚线，以直观地表明其优先级低于用实线显示的约束，如图\
  \ 26-7 所示。\n\n![A437923_1_En_26_Fig7_HTML.jpg](img/A437923_1_En_26_Fig7_HTML.jpg)\n\
  \n图 26-7. 优先级较低的约束显示为虚线\n8.  选择 “产品” ➤ “运行”。用户界面窗口出现。\n9.  将鼠标指针移动到窗口的右边缘，并尝试拖动窗口以扩展或收缩其宽度。请注意，如果缩小窗口宽度，文本字段会再次消失。\n\
  10. 选择 `StackViewProgram` ➤ “退出 StackViewProgram”。\n\n更改约束优先级可能并不总能达到你想要的效果，因此你可能需要更改约束的工作方式。大多数约束定义了一个必须满足的固定值。为了获得更大的灵活性，你还可以将这个相等约束更改为大于或等于约束，或小于或等于约束。\n\
  \n1.  确保 `StackViewProgram` 项目已在 Xcode 中加载。\n2.  点击项目导航面板中的 `Main.storyboard` 文件。\n\
  3.  点击文本字段以将其选中。\n4.  选择 “视图” ➤ “实用工具” ➤ “显示尺寸检查器”。尺寸检查器面板会出现在 Xcode 窗口的右上角。\n5.\
  \  点击宽度约束右侧的 “编辑”。将出现一个弹出窗口（见图 26-5）。\n6.  点击 “常量” 标签右侧的弹出菜单。将出现一个弹出菜单，如图 26-8 所示。\n\
  \n![A437923_1_En_26_Fig8_HTML.jpg](img/A437923_1_En_26_Fig8_HTML.jpg)\n\n图 26-8.\
  \ 将等号更改为大于或等于号，或小于或等于号\n7.  选择 `≥`（大于或等于号）。\n8.  点击优先级文本字段右侧的向下箭头，出现菜单后选择 “高 (750)”。\n\
  9.  选择 “产品” ➤ “运行”。请注意，如果缩小窗口宽度，压缩约束只会将文本字段收缩到一定距离，然后停止，从而防止文本字段完全消失。如果扩展窗口宽度，文本字段也会随之扩展。\n\
  10. 选择 `StackViewProgram` ➤ “退出 StackViewProgram”。\n\n当你的用户界面无法正确地自适应时，请尝试以下一种或多种选项：\n\
  \n*   添加或删除约束\n*   更改约束优先级\n*   将约束从等于固定值的关系更改为大于或等于，或小于或等于的关系\n\n每个用户界面在适应窗口大小调整时遇到的问题可能都不同，因此解决该问题可能简单到只修改一个约束，也可能复杂到需要修改多个约束。如果用户界面元素组会一起移动，为简化起见，可以将它们分组到一个栈视图中。\n\
  \n很多时候，你可能需要尝试修改不同的约束，以了解它们在不同组合下的工作方式。只要了解修改约束的各种选项，你最终会找到针对特定用户界面的最佳解决方案。\n\n\
  ### 总结\n\n每个程序的用户界面对于让用户控制程序都至关重要。如果用户界面让用户感到沮丧并阻止他们使用该程序，那么你的程序再强大也无济于事。\n\n由于每个用户界面都需要响应用户可能对窗口大小进行的更改，栈视图允许你将相关元素分组，并将约束应用于整个栈视图。如果不将相关元素分组，你将不得不为每个元素单独应用约束，这可能会变得混乱，并且如果它们没有按预期响应，修复起来也会很困难。\n\
  \n如果存在约束冲突，你可以修改每个约束的优先级和/或修改约束的工作方式。最初创建约束时，Xcode 会将约束设置为等于一个固定值。为了提供灵活性，你可以将此等号更改为大于或等于号，或小于或等于号。\n\
  \n为了保持用户界面元素可见，你还可以应用压缩约束。与将元素链接到另一个元素或窗口边缘的普通约束不同，压缩约束定义了用户界面元素的宽度和/或高度。如果用户调整窗口大小，压缩约束可防止用户界面元素消失。\n\
  \n对于设计以特定顺序显示窗口或视图的用户界面，你可能会发现故事板文件比使用多个 `.xib` 文件更容易使用。无需将整个用户界面存储在一个故事板文件中（这可能会变得杂乱且难以理解），你可以创建故事板引用。\n\
  \n故事板引用将用户界面划分为多个故事板文件。通过将用户界面分离到多个故事板文件中，你可以更轻松地设计和理解用户界面的结构。\n\n\n\n"
- "# 27. 调试你的程序\n\n在专业的软件开发领域中，你实际上会花费更多时间来修改现有程序，而不是创建新程序。然而，无论是编写新程序还是编辑现有程序，无论你拥有多少经验或受过多少教育，即便是最优秀的程序员也可能会犯错。事实上，你可以预料到，无论你多么小心，都难免会出错。一旦你接受了这个编程中不可避免的事实，你就可以学习如何发现并修复你的错误了。\n\
  \n在计算机世界里，错误通常被称为“bug”（臭虫），这个名称源于早期使用物理开关工作的计算机的一次事故。有一天计算机出了故障，当技术人员打开计算机时，发现一只飞蛾被压扁在一个开关里，导致开关无法闭合。从那时起，编程错误就被称为\
  \ bug，而修复计算机问题则被称为调试（debugging）。\n\n三种常见的计算机 bug 类型是：\n\n*   **语法错误**：当你拼错某些内容，例如关键字、变量名、函数名或类名，或者错误地使用了一个符号时发生。\n\
  *   **逻辑错误**：当你正确使用了命令，但代码的逻辑并未实现你预期的效果时发生。\n*   **运行时错误**：当程序遇到意外情况时发生，例如用户输入了无效数据，或者其他程序意外地干扰了你的程序。\n\
  \n语法错误最容易发现和修复，因为它们只是你创建的变量名拼写错误，或者是 Xcode 可以帮助你识别的 Swift 命令拼写错误。如果你输入一个 Swift 关键字，例如\
  \ `var` 或 `let`，Xcode 会以粉红色（或你在 Xcode 编辑器中为关键字指定的任何颜色）显示该关键字。\n\n现在，如果你输入一个 Swift\
  \ 关键字，但它没有以通常的标识颜色显示，那么你就知道自己可能输入有误。通过给代码着色，Xcode 的编辑器可以帮助你直观地识别常见的拼写错误或笔误。\n\n\
  除了使用颜色之外，Xcode 编辑器还提供了第二种方法来帮助你在需要输入 Cocoa 框架中定义的方法或类名时避免错误。一旦 Xcode 识别出你可能正在输入\
  \ Cocoa 框架中的内容，它就会弹出一个可能选项的菜单。现在，你无需自己输入整个命令，只需在弹出菜单中点击你的选择，然后按一次或多次 Tab 键，让 Xcode\
  \ 正确地输入你选择的命令，如图 27-1 所示。\n\n![A437923_1_En_27_Fig1_HTML.jpg](img/A437923_1_En_27_Fig1_HTML.jpg)\n\
  \n**图 27-1.** Xcode 显示一个你可能想要使用的命令菜单\n\n语法错误常常会使你的程序完全无法运行。当语法错误阻止程序运行时，Xcode 通常可以识别出程序中拼写错误的命令所在的行（或附近区域），以便你进行修复，如图\
  \ 27-2 所示。\n\n![A437923_1_En_27_Fig2_HTML.jpg](img/A437923_1_En_27_Fig2_HTML.jpg)\n\
  \n**图 27-2.** 语法错误通常会使程序无法运行，这使得 Xcode 能够识别出语法错误\n\n> **注意：** Swift 将大写和小写字母视为完全不同的字符。一个常见的错误是输入小写字母代替大写字母（或反之）。\n\
  \n逻辑错误比语法错误更难发现和检测。Xcode 可以识别语法错误，因为它能识别拼写正确的 Swift 关键字（例如 `var`）和拼写错误的 Swift 关键字（例如\
  \ `varr`）之间的区别。\n\n然而，逻辑错误发生在你正确使用了 Swift 代码，但代码并未按你预期的方式运行时。由于你的代码实际上是有效的，Xcode\
  \ 无法知道它没有按你的预期工作。因此，逻辑错误可能难以调试，因为你认为自己编写的代码是正确的，但（显然）事实并非如此。\n\n你如何在一个自认为编写正确的代码中发现错误呢？发现错误通常需要从程序的开头开始，一直详查每一行直到结束。（当然，有比逐行搜索整个程序更快的方法，你将在本章后面学习到。）\n\
  \n最后，最难发现和调试的错误是运行时错误。语法错误通常会使程序无法运行，因此，如果你的程序实际上能运行，你可以假设已经消除了代码中大部分（即使不是全部）语法错误。\n\
  \n逻辑错误可能更难发现，但它们是可预测的。例如，如果你的程序要求用户输入密码，但即使用户输入了正确的密码，程序却未能授予用户访问权限，你就知道自己遇到了一个逻辑错误。每次运行程序时，你都能可靠地预测逻辑错误何时会发生。\n\
  \n运行时错误则更加隐蔽，因为它们并非总是可预测地发生。例如，你的程序在你的计算机上可能运行得非常好，但当你将同一程序运行在一台完全相同的计算机上时，程序可能就会出错。这是因为两台不同计算机之间的条件永远不会完全相同。\n\
  \n因此，同一个程序在一台计算机上运行良好，但在另一台相同类型的计算机上却可能出错。问题在于，意外的外部环境可能会影响程序的行为。例如，你的程序可能一直运行正常，直到用户按下数字小键盘上的数字键，而不是字母数字键区顶部的数字键。\n\
  \n即使用户输入的是完全相同的数字（例如 5），程序可能会将位于 R 和 T 键上方的 5 键视为与数字小键盘上的 5 键完全不同的键。尽管这可能很细微，但足以导致程序失败或崩溃。\n\
  \n由于运行时错误并不总能复现，它们可能令人沮丧地难以发现，甚至更难修复，因为你无法总是检查程序在其他计算机上运行时可能面临的每一种情况。有些程序已知可以完美运行，除非用户意外同时按下了两个键。其他程序则运行良好，直到用户恰好在另一个程序试图通过互联网接收电子邮件的那一刻保存了文件。\n\
  \n通常您可以消除大多数语法错误，并发现和修复大多数逻辑错误。然而，可能无法发现并完全消除程序中的所有运行时错误。避免花费时间寻找 bug 的最佳方法是努力编写良好的代码，并仔细测试，以确保它尽可能没有错误。\n\
  \n\n## 简易调试技巧\n\n当程序无法正常运行时，你常常对问题所在毫无头绪。虽然可以耐着性子从头到尾检查代码，但通常更快的做法是直接猜测错误可能出在哪里。\n\
  \n一旦大致确定了程序中可能出问题的部分，你有两个选择。第一，删除可疑代码并重新运行程序。如果问题神奇地消失了，那就说明删除的代码很可能就是罪魁祸首。\n\n\
  然而，如果程序依然无法运行，你就得把删除的代码重新输入回去。一个更简便的方法是把代码从 Xcode 中剪切粘贴并存储到文本编辑器（比如每台 Mac 都自带的 TextEdit\
  \ 程序）中，但这也可能很繁琐。\n\n因此，第二个解决方案是暂时隐藏你怀疑可能引发问题的代码。这样，如果问题依然存在，你只需取消隐藏，让代码重新可见即可。在\
  \ Xcode 中实现这一操作，只需将你的代码变成注释即可。\n\n记住，注释是 Xcode 完全忽略的文本。你可以通过三种方式创建注释：\n\n- 在要转换为注释的每一行开头添加\
  \ `//` 符号。这种方法允许你将单行代码转换为注释。\n- 在要转换为注释的代码开头添加 `/*` 符号，在代码结尾添加 `*/` 符号。这种方法允许你将一行或多行代码转换为注释。\n\
  - 选中要转换为注释的代码行，然后选择 Editor ➤ Structure ➤ Comment Selection（或按 Command + `/`）。这种方法会在你选中的每一行代码开头添加\
  \ `//` 符号，从而将一行或多行代码转换为注释。\n\n**注意**：Xcode 会用绿色（或你自定义的用于识别注释的颜色）为注释着色。创建注释后，请确保\
  \ Xcode 正确着色，以确认你已经成功创建了注释。如果 Xcode 未能识别你的注释，它会将你的文本视为有效的 Swift 命令，这很可能导致程序无法正常运行。\n\
  \n通过将代码转换为注释，你实际上是将那段代码对 Xcode 隐藏了。现在，如果你想将注释恢复为代码，只需移除定义注释代码的 `//` 或 `/*` 和 `*/`\
  \ 符号即可。\n\n如果你是通过选择 Editor ➤ Structure ➤ Comment Selection（或按 Command + `/`）来注释代码的，那么只需再选择\
  \ Editor ➤ Structure ➤ Uncomment Selection（或再次按 Command + `/`），即可将注释的代码恢复为可工作的代码。\n\
  \n除了将代码变为注释来临时隐藏之外，第二种简单的调试技巧是使用 `print` 命令。其理念是在代码中插入 `print` 命令，以打印出变量的值。\n\n\
  通过这种方式，你可以查看一个或多个变量可能包含的值。在程序中放置多个 `print` 命令，可以让你有机会确保程序运行正确。\n\n要了解如何使用 `print`\
  \ 命令结合代码注释来调试程序，请按以下步骤操作：\n\n1. 在 Xcode 中选择 File ➤ New ➤ Project。\n2. 在 macOS 类别下点击\
  \ Application。\n3. 点击 Cocoa Application，然后点击 Next 按钮。Xcode 会要求输入产品名称。\n4. 点击 Product\
  \ Name 文本字段，输入 `DebugProgram`。\n5. 确保 Language 弹出菜单显示为 Swift，并且 \"Use Storyboards\"\
  \ 复选框已选中。\n6. 点击 Next 按钮。Xcode 会询问你希望将项目存储在哪里。\n7. 选择一个文件夹来存储项目，然后点击 Create 按钮。\n\
  8. 在项目导航器中点击 `AppDelegate.swift` 文件。`AppDelegate.swift` 文件的内容会显示出来。\n9. 将 `applicationDidFinishLaunching`\
  \ 方法编辑如下：\n\n```\nfunc applicationDidFinishLaunching(_ aNotification: Notification)\
  \ {\n    var myMessage = \"Temperature in Celsius:\"\n    let temp = 100.0\n   \
  \ print (myMessage + \"\\(temp)\")\n    myMessage = \"Temperature in Fahrenheit:\"\
  \n    print (myMessage + \"\\(C2F(tempC: temp))\")\n}\n```\n\n10. 直接在这个函数上方添加以下代码：\n\
  \n```\nfunc C2F (tempC : Double) -> Double {\n    var tempF : Double\n    tempF\
  \ = tempC + 32 * 9/5\n    return tempF\n}\n```\n\n11. 选择 Product ➤ Run。你的程序用户界面会出现（显示为空白）。\n\
  12. 选择 DebugProgram ➤ Quit DebugProgram。Xcode 界面再次出现。如果你查看 Xcode 窗口底部调试区域，可以看到两个\
  \ `print` 命令打印的内容，即 \"Temperature in Celsius: 100.0\" 和 \"Temperature in Fahrenheit:\
  \ 157.6\"，如图 27-3 所示。\n\n![A437923_1_En_27_Fig3_HTML.jpg](img/A437923_1_En_27_Fig3_HTML.jpg)\n\
  \n**图 27-3.** `print` 命令在 Xcode 窗口的调试区域显示文本\n\n要显示或隐藏调试区域，你有三个选项：\n\n- 点击 Xcode\
  \ 窗口右上角的显示/隐藏调试区域图标。\n- 选择 View ➤ Debug Area ➤ 显示/隐藏调试区域。\n- 按 Shift + Command +\
  \ Y。\n\n通过查看调试区域，你可以看到 `print` 命令显示的内容。如果你对摄氏度和华氏度有所了解，就会知道摄氏度的沸点是 100 度，而华氏度的沸点是\
  \ 212 度。然而，你的温度转换程序计算得出 100 摄氏度等于 157.6 华氏度，这意味着华氏温度应该接近 212 而不是 157.6。显然有问题，所以我们用\
  \ `print` 命令和注释来帮助调试问题。\n\n1. 确保 DebugProgram 项目已在 Xcode 中加载。\n2. 在项目导航器窗格中点击 `AppDelegate.swift`\
  \ 文件。\n3. 编辑 `C2F` 函数，在 `*` 符号（乘号）左侧输入 `//` 符号，如下所示：\n\n```\nfunc C2F (tempC : Double)\
  \ -> Double {\n    var tempF : Double\n    tempF = tempC + 32 //* 9/5\n    return\
  \ tempF\n}\n```\n\n这个注释可以让你检查 `tempC` 参数是否正确传递到 `C2F` 函数并存储到 `tempF` 变量中。\n\n4.\
  \ 在 `return` 语句上方添加一个 `print (tempC)` 命令，如下所示：\n\n```\nfunc C2F (tempC : Double)\
  \ -> Double {\n    var tempF : Double\n    tempF = tempC + 32 //* 9/5\n    print\
  \ (tempF)\n    return tempF\n}\n```\n\n5. 选择 Product ➤ Run。程序空白的用户界面会出现。\n6. 选择\
  \ DebugProgram ➤ Quit DebugProgram。Xcode 界面再次出现，在调试区域显示结果，打印出：\n\n`Temperature in\
  \ Celsius: 100.0 132.0 Temperature in Fahrenheit: 132.0`\n\n通过注释掉代码的计算部分并使用 `print\
  \ (tempF)` 命令，你可以看到 `C2F` 函数正确地存储了 100.0 到 `tempC` 变量中，并在存储到 `tempF` 变量之前加了 32。因为你注释掉了代码的计算部分，可以假设错误一定存在于被你注释掉的代码部分。\n\
  \n虽然公式看起来可能正确，但错误之所以发生，是因为 Swift（以及大多数编程语言）计算公式的方式。首先，它们从左到右计算。其次，它们会先计算乘法等运算，后计算加法。错误的发生是因为你的转换公式先计算\
  \ 32 乘以 9（得到 288），然后将结果（288）除以 5 得到 57.6。最后，它将 57.6 加到 100.0 上，得到错误的结果 157.6。它真正应该做的是将\
  \ 9/5 乘以摄氏温度，然后将结果加上 32。\n\n7. 将 `C2F` 函数修改如下：\n\n```\nfunc C2F (tempC : Double)\
  \ -> Double {\n    var tempF : Double\n    tempF = tempC * (9/5) + 32\n    print\
  \ (tempF)\n    return tempF\n}\n```\n\n\n\n8.  选择**产品** ➤ **运行**。程序空白的用户界面出现。\n\
  9.  选择**调试程序** ➤ **退出调试程序**。Xcode 界面再次出现。\n10. 查看调试区，你会发现程序现在已正确地将 100 摄氏度转换为 212\
  \ 华氏度。\n\n对于简单的调试，临时将代码注释掉并使用`print`命令可以奏效，但反复添加和移除注释符号及`print`命令相当笨拙。更好的方法是使用断点和变量观察，这本质上等同于使用注释和`print`命令的效果。\n\
  \n## 使用 Xcode 调试器\n\n虽然注释和`print`命令能帮你隔离代码中的问题，但使用起来可能很笨拙。`print`命令尤其繁琐，因为你必须先将其键入代码，然后在准备发布程序时记得将其移除。\n\
  \n虽然在程序中遗留一条或多条`print`命令不太可能损害程序性能，但在代码中保留不再起任何作用的代码是一种糟糕的编程实践。\n\n作为在程序中四处键入`print`命令的替代方案，Xcode\
  \ 提供了使用 Xcode 调试器这一更便捷的方案。调试器提供了两种查找和识别程序中错误的方法：\n\n-   断点\n-   变量观察\n\n### 使用断点\n\
  \n断点允许你在代码中指定想要程序停止运行的具体行。程序停止后，你可以逐行单步执行代码。在此过程中，你还可以查看一个或多个变量的内容，以检查变量是否保存了正确的值。\n\
  \n例如，如果你的程序将摄氏度转换为华氏度，但不知何故将 100 摄氏度转换成了-41259 华氏度，你就知道代码运行不正常了。通过在代码中插入断点并在每个断点处检查变量的值，你可以确定代码是在哪里计算其值的。一旦你发现计算错误的那一行，你就知道程序中需要修复的确切区域了。\n\
  \n你可以通过以下任一方式设置断点：\n\n-   在想要设置断点的代码左侧点击\n-   将光标移动到想要设置断点的行，然后按下**Command** + **\\\
  **\n-   选择**调试** ➤ **断点** ➤ **在当前行添加断点**\n\n### 单步执行代码\n\n一旦断点使程序停止运行，你就可以使用`step`命令逐行单步执行代码。Xcode\
  \ 提供了多种不同的`step`命令，但最常用的有三种：\n\n-   `step over`（单步跳过）\n-   `step into`（单步进入）\n-\
  \   `step out`（单步跳出）\n\n`step over`命令会检查下一行代码，并将函数或方法调用视为单行代码。\n\n`step into`命令在遇到高亮显示的函数或方法调用之前，其工作方式与`step\
  \ over`命令完全相同。然后它会跳转到该函数或方法的第一行代码。\n\n`step out`命令用于提前退出你使用`step into`命令进入的函数或方法。`step\
  \ out`命令会返回到调用该函数或方法的那一行代码。\n\n所有这三个`step`命令都是在程序在断点处暂时停止后使用的。通过使用`step`命令，你可以逐行检查代码，并观察不同变量中存储的值可能发生的变化。\n\
  \n这种变量观察允许你检查一个或多个变量的内容，以验证其是否保存了正确的数据。一旦你发现某个变量持有错误数据，就能准确定位到产生该错误的那一行代码。\n\n断点最棒的地方在于，你可以轻松地添加和移除它们，因为它们完全不会修改你的代码，这与注释和多个`print`命令不同。Xcode\
  \ 可以自动为你移除所有断点，这样你就不必在代码中逐个查找并移除了。\n\n要了解如何使用断点、step 命令和变量观察，请遵循以下步骤：\n\n1.  确保\
  \ Xcode 中已加载 DebugProgram 项目。\n2.  在项目导航器窗格中点击`AppDelegate.swift`文件。\n3.  按如下方式修改`C2F`函数：\n\
  \n```\n    func C2F (tempC : Double) -> Double {\n    var tempF : Double\n    tempF\
  \ = tempC + 32 * 9/5\n    return tempF\n    }\n    ```\n\n4.  将光标移动到`applicationDidFinishLaunching`函数中以下行内的任意位置：\n\
  \n```\n    var myMessage = \"Temperature in Celsius:\"\n    ```\n\n5.  选择**调试**\
  \ ➤ **断点** ➤ **在当前行添加断点**。Xcode 会显示一个蓝色箭头形式的断点，如图 27-4 所示。\n\n![A437923_1_En_27_Fig4_HTML.jpg](img/A437923_1_En_27_Fig4_HTML.jpg)\n\
  \n图 27-4.\n\n断点出现在 Swift 代码的左侧  \n6.  选择**产品** ➤ **运行**。注意 Xcode 会高亮显示断点所在的行，如图\
  \ 27-5 所示。注意，最初`myMessage`变量的值是未定义的。\n\n![A437923_1_En_27_Fig5_HTML.jpg](img/A437923_1_En_27_Fig5_HTML.jpg)\n\
  \n图 27-5.\n\n断点暂停了程序执行，以便你能检查其当前状态  \n7.  选择**调试** ➤ **单步跳过**（或按**F6**）。Xcode 会高亮显示断点下方的下一行。调试区左侧的信息会显示程序当前使用的值，如图\
  \ 27-6 所示。注意，在断点处代码运行后，`myMessage`变量的值现在被定义为字符串“Temperature in Celsius:”。\n\n![A437923_1_En_27_Fig6_HTML.jpg](img/A437923_1_En_27_Fig6_HTML.jpg)\n\
  \n图 27-6.\n\n通过观察变量如何变化，你可以看到每行代码如何影响每个变量  \n8.  多次选择**调试** ➤ **单步跳过**（或按**F6**），直到\
  \ Xcode 高亮显示以下行：\n\n```\n    print (myMessage + \"\\(C2F(temp))\")\n    ```\n\n\
  9.  选择**调试** ➤ **单步进入**（或按**F7**）。Xcode 现在会高亮显示`C2F`函数的第一行代码，如图 27-7 所示。\n\n![A437923_1_En_27_Fig7_HTML.jpg](img/A437923_1_En_27_Fig7_HTML.jpg)\n\
  \n图 27-7.\n\n单步进入命令允许你单步执行存储在函数或方法中的代码  \n10. 选择**调试** ➤ **单步跳出**（或按**F8**）。Xcode\
  \ 现在会高亮显示调用了`C2F`函数的那一行。  \n11. 选择**调试** ➤ **继续**以继续运行程序，直到下一个断点。在此程序中只有一个断点，因此程序会显示其空白的用户界面。\
  \  \n12. 选择**调试程序** ➤ **退出调试程序**。Xcode 窗口再次出现。  \n13. **调试** ➤ **停用断点**。Xcode 会使断点变暗。Xcode\
  \ 将忽略已停用的断点。  \n14. 选择**产品** ➤ **运行**。注意，因为你已停用断点，Xcode 会忽略它，并显示空白的用户界面来运行你的程序。\
  \  \n15. 选择**调试程序** ➤ **退出调试程序**。Xcode 窗口再次出现。\n\n\n\n### 管理断点\n\n在一个程序中，你可以设置的断点数量没有上限，因此请根据需要随意放置任意数量的断点，以帮助你追踪错误。当然，如果你在程序中放置了断点，你可能会忘记自己设置了多少个断点以及它们被设置在了哪里。为了帮助你管理断点，Xcode\
  \ 提供了断点导航器。\n\n你可以通过以下三种方式之一打开断点导航器：\n\n*   选择“视图”➜“导航器”➜“显示断点导航器”\n*   按下 `Command\
  \ + 7`\n*   点击导航器面板中的“显示断点导航器”图标\n\n断点导航器会列出你在程序中设置的所有断点，并标识这些断点所在的文件以及每个断点的行号，如图\
  \ 27-8 所示。\n\n![A437923_1_En_27_Fig8_HTML.jpg](img/A437923_1_En_27_Fig8_HTML.jpg)\n\
  \n图 27-8. 断点导航器识别你所有的断点\n\n由于断点导航器通过行号来识别断点，你可能希望在 Xcode 编辑器中显示行号（参见图 27-8）。要开启行号显示，请按以下步骤操作：\n\
  \n1.  选择 Xcode ➜ 偏好设置。此时会显示 Xcode 偏好设置窗口。\n2.  点击“文本编辑”图标。文本编辑选项随即出现。\n3.  选中“行号”复选框，如图\
  \ 27-9 所示。\n\n    ![A437923_1_En_27_Fig9_HTML.jpg](img/A437923_1_En_27_Fig9_HTML.jpg)\n\
  \n    图 27-9. “行号”复选框可让你在 Xcode 编辑器中显示或隐藏行号\n4.  点击 Xcode 偏好设置窗口左上角的关闭按钮（红色按钮）。现在，Xcode\
  \ 会在编辑器的左侧边距中显示行号。\n\n要学习如何使用断点导航器，请按以下步骤操作：\n\n1.  确保 DebugProgram 项目已加载到 Xcode\
  \ 中。\n2.  在 Xcode 中开启行号显示。\n3.  在项目导航器面板中点击 `AppDelegate.swift` 文件。\n4.  在你代码中的任意位置放置三个断点，使用你认为最方便的方法，例如点击\
  \ Xcode 编辑器的左侧边距、按下 `Command + \\`，或者选择“调试”➜“断点”➜“在当前行添加断点”。（具体位置无关紧要。）\n5.  在项目导航器面板中点击\
  \ `Main.storyboard` 文件。Xcode 会显示你程序的用户界面。\n6.  选择“视图”➜“导航器”➜“显示断点导航器”。断点导航器会显示你的三个断点。\n\
  7.  点击任意一个断点。Xcode 会显示包含你所选断点的文件。\n8.  在断点导航器面板中右键点击任意一个断点。此时会出现一个弹出菜单，如图 27-10\
  \ 所示。\n\n    ![A437923_1_En_27_Fig10_HTML.jpg](img/A437923_1_En_27_Fig10_HTML.jpg)\n\
  \n    图 27-10. 弹出菜单可让你修改断点\n9.  选择“停用断点”。请注意，这可以让你单独停用或禁用某个断点，而不是通过“调试”➜“停用断点”命令一次性禁用所有断点。\n\
  10. 在断点导航器面板中右键点击任意一个断点，然后选择“删除断点”。（另一种删除断点的方法是将断点从代码中拖开，然后释放鼠标左键。）\n11. 删除所有断点，直到没有剩余的断点为止。\n\
  \n### 使用符号断点\n\n当你创建一个断点时，必须将其放置在希望程序执行时暂时停止的那一行代码上。然而，这通常意味着需要猜测问题可能在哪里，然后再使用各种单步执行命令来逐行检查代码。\n\
  \n为了避免这个问题，Xcode 提供了符号断点。符号断点仅在特定函数或方法运行时才停止程序执行。如果你不希望某个特定函数或方法每次运行时都停止程序执行，你可以告诉\
  \ Xcode 忽略它一定次数，例如 10 次。这意味着该函数或方法最多可以运行 10 次，到第 11 次被调用时，符号断点才会暂时暂停执行，以便你逐行逐步调试代码。\n\
  \n要创建一个符号断点，你可以定义以下内容：\n\n*   符号：要暂停程序执行的函数或方法的名称\n*   模块：包含“符号”文本字段所定义函数或方法的文件名\n\
  *   忽略次数：在程序执行被临时暂停之前，你希望该函数或方法运行的次数（0 或更多）\n\n要了解符号断点是如何工作的，请按以下步骤操作：\n\n1.  确保\
  \ DebugProgram 项目已加载到 Xcode 中。\n2.  选择“调试”➜“断点”➜“创建符号断点”。此时会出现一个“符号断点”弹出窗口，如图 27-11\
  \ 所示。\n\n    ![A437923_1_En_27_Fig11_HTML.jpg](img/A437923_1_En_27_Fig11_HTML.jpg)\n\
  \n    图 27-11. “符号断点”弹出窗口可让你定义一个断点\n3.  点击“符号”文本字段，并输入 `C2F`，这是你想要检查的函数或方法的名称。\n\
  4.  （可选）如果你在“符号”文本字段中指定的函数或方法名也用于其他文件，请点击“模块”文本字段并输入一个文件名。此文件名会将符号断点限定为仅作用于该特定文件中的那个函数或方法。由于\
  \ `C2F` 函数只使用一次，你可以将“模块”文本字段留空。\n5.  （可选）点击“忽略次数”文本字段，输入一个数字，以指定在暂停程序执行之前，忽略函数或方法被调用的次数。在此例中，将\
  \ `0` 保留在“忽略次数”文本字段即可。\n6.  点击“符号断点”弹出窗口之外的任意位置，使其消失。\n7.  选择“产品”➜“运行”。`C2F` 符号断点会使程序在\
  \ `C2F` 函数中计算结果的代码的第一行处暂停执行，如图 27-12 所示。\n\n    ![A437923_1_En_27_Fig12_HTML.jpg](img/A437923_1_En_27_Fig12_HTML.jpg)\n\
  \n    图 27-12. 符号断点使程序在“符号”文本字段定义的 `C2F` 函数中暂停执行\n8.  选择“产品”➜“停止”来让程序停止运行。\n9. \
  \ 选择“视图”➜“导航器”➜“显示断点导航器”。断点导航器面板会显示出来。\n10. 在断点导航器面板中右键点击 `C2F` 断点，当弹出菜单出现时，选择“删除断点”。断点导航器面板中应不再显示任何断点。\n\
  \n注意\n\n另一种无需指定特定代码行来设置断点的方法是创建异常断点。通常情况下，如果你的程序崩溃，Xcode 会显示一堆难以理解的错误信息，而你并不知道错误的原因。如果你设置了一个异常断点，Xcode\
  \ 就能识别出导致崩溃的那行代码，以便你进行修复。\n\n\n\n### 使用条件断点\n\n普通断点通常会在每次执行到特定行时停止程序。然而，你可能希望仅当某个条件成立时才在特定行停止程序执行，例如当某个变量超过特定值时，这可能是程序出现问题的信号。\n\
  \n要了解条件断点的工作原理，请按照以下步骤操作：\n\n1. 确保 `DebugProgram` 项目已在 Xcode 中加载。\n2. 在项目导航器窗格中点击\
  \ `AppDelegate.swift` 文件。\n3. 通过点击左侧页边距，或将光标移至该行并按 Command + \\，或选择“调试”➤“断点”➤“在当前行添加断点”，在下面这行设置一个断点：\n\
  \n    ```\n    print (myMessage + \"\\(C2F(temp))\")\n    ```\n\n4. 选择“视图”➤“导航器”➤“显示断点导航器”。断点导航器窗格出现，显示你刚刚创建的断点。\n\
  5. 在断点导航器窗格中右键点击该断点，并选择“编辑断点”。此时会弹出一个窗口，如图 27-13 所示。\n\n    ![A437923_1_En_27_Fig13_HTML.jpg](img/A437923_1_En_27_Fig13_HTML.jpg)\n\
  \n    图 27-13.\n    该符号断点在由“符号”文本字段定义的 `C2F` 函数中暂停程序执行。\n\n6. 点击“条件”文本字段，输入 `temp\
  \ ➤ 1` 然后按 Return 键。\n7. 选择“产品”➤“运行”。Xcode 会高亮你的断点以临时暂停程序执行，这意味着条件 (`temp ➤ 1`)\
  \ 必须为真。\n8. 选择“产品”➤“停止”以暂停并退出程序，然后返回 Xcode。\n9. 选择“视图”➤“导航器”➤“显示断点导航器”，右键点击你创建的断点，并选择“编辑断点”。弹出窗口出现。\n\
  10. 点击“条件”文本字段，将文本编辑为 (`temp ➤ 500`)。按 Return 键。\n11. 选择“产品”➤“运行”。请注意，这次你的断点没有停止程序执行，因为它的条件\
  \ (`temp ➤ 500`) 不成立。由于断点未停止程序，程序的空白用户界面出现了。\n12. 选择“DebugProgram”➤“退出 DebugProgram”。\n\
  13. 将断点从左侧页边距拖走，松开鼠标左键以删除该断点。（你也可以在断点导航器窗格中右键点击该断点，并选择“删除断点”。）\n\n### 总结\n\n任何程序中都难免出现错误或缺陷。虽然语法错误易于发现和修复，但逻辑错误更难定位，因为你本以为代码会产生某种结果，结果却产生了另一种结果。此时，你需要弄清楚本以为自己一切正确，但究竟哪里做错了。更难以追踪的是运行时错误，它们往往看似随机发生，原因在于那些影响程序的未知条件。\n\
  \n为了帮助你追踪并消除大多数错误，可以使用 `print` 命令配合注释，但对于更健壮的调试，你应该使用 Xcode 内置的调试器。借助调试器，你可以在代码中设置断点，并观察值是如何存储在一个或多个变量中的。\n\
  \n条件断点仅在特定条件发生时停止程序执行。符号断点仅在调用特定函数或方法时停止程序执行。一旦断点停止了程序，你可以使用各种单步执行命令逐行继续检查代码。`step\
  \ into` 命令允许你查看存储在函数或方法内部的代码，而 `step out` 命令则允许你提前退出函数或方法，并跳回到调用该函数或方法的位置。\n\n通过使用断点和单步执行命令，你可以详尽地逐行检查程序的工作原理，从而尽可能多地消除错误。程序包含的错误越少，用户就会越满意。\n\
  \n"
- '# 28. 在编码前后规划程序


  在你投入数天、数周、数月甚至数年来开发一个程序之前，首先要确保这个世界确实需要你的程序。如果你是为自己编写程序，那么可以忽略其他人的看法。但是，如果你打算将程序出售给他人，请确保你的程序在开始之前就有前景。


  以下是判断你的程序是否存在市场的一种方法。寻找竞争对手。大多数人认为瞄准没有竞争的市场更好，但如果没有竞争，这可能是一个重要的线索，表明同样也没有市场。


  然而，如果你寻找一个充满众多竞争对手的市场，这意味着该类程序存在着一个活跃的市场。只需快速搜索一下彩票选号软件或占星程序，你就会发现大量的竞争对手。竞争越激烈，市场越活跃。


  如果只有一两家大公司主导着某个特定市场，那么这个市场中的机会很可能已经过去了。例如，尽管有 macOS 和 Linux 可用，但 Windows 仍然是个人电脑的主流操作系统。同样，iOS
  和 Android 主导着移动电脑市场，因此，试图编写一个与 Windows、Android 或 iOS 竞争的操作系统很可能会浪费你的时间。


  同样，当今市场上只有少数几个主要的文字处理器、电子表格和演示程序，这意味着尝试编写另一个通用的文字处理器、电子表格或演示程序很可能是徒劳的。


  竞争激烈意味着市场活跃。竞争极少或没有竞争意味着市场可能已经选定了一个领导者，你的程序很可能永远无法推翻这个领导者。试图说服人们购买你的文字处理器而不是使用 Microsoft
  Word 或 Pages，很可能是浪费时间。


  因此，要寻找细分市场。例如，文字处理器市场可能已被 Microsoft Word 主导，但专用的文字处理器仍有需求。虽然 Microsoft Word 可以用于编写剧本和小说，但它并非为此目的而优化。这就是为什么其他公司能够成功销售用于编写剧本或小说的专用文字处理器，这些处理器能帮助你组织创意。


  这样的细分市场对于大公司来说太小，不值得关注，这意味着你永远不必直接与这些大公司竞争。除了瞄准大公司忽略的细分市场之外，第二种方法是找出大公司软件中缺乏什么，然后编写一个程序来满足这个缺失的需求。


  例如，Microsoft Office 提供了密码保护功能来锁定文件。然而，Microsoft 的加密功能很弱，容易被破解。因此，市场上就需要这样一种软件：它能够比
  Microsoft Office 更好地加密文件，同时提供与 Microsoft Office 相似的用户界面。


  最重要的是，编写程序是因为你对这个特定领域感兴趣，而不是因为你认为它能让你赚大钱。销售房地产管理软件或无人机控制软件可能有利可图，但除非你对这些领域感兴趣，否则你很可能没有热情或长期的兴趣去投入漫长的时间为这些用户开发和推广程序。


  作为一般规则，要避免直接与大公司竞争。即使是苹果，也无法在个人电脑操作系统市场上与 Microsoft Windows 竞争，而像 Linux 这样的免费产品在对抗
  Windows 方面也并未取得太大成功。


  与其直接与大公司竞争，不如寻找那些太小以至于大公司无法涉足的细分市场，或者寻找补充大公司现有程序的方法。最重要的是，在你充满热情想要解决的某个领域里发现一个问题，这将为你提供动力去创造最好的程序。



  ## 明确程序的目标


  当程序员初次产生一个想法时，他们往往会本能地冲到电脑前开始编写代码。然而，这就像住在洛杉矶时，突然想去纽约看看，然后跳上车就开过去。你最终或许能到达目的地，但若没有计划，很可能会因未规划路线或未准备让旅途更愉快的东西而浪费时间。


  正如你在匆忙前往另一座城市之前，应该花时间提前规划一样，在开发新程序时，你也应该花时间提前规划。如果你凭着一时灵感冲动地开始编写 Swift 代码，很可能在程序完成前就耗尽了精力和想法。这很可能会产生一个半成品、设计糟糕的程序，需要大幅修改才能运行，或者更糟的是，可能不得不彻底放弃。


  编写代码实际上是创建任何程序中最简单的部分。编程最难的部分，往往是确定你希望程序在完成后能实现什么目标。


  例如，如果你正在学习和实验 Swift，你可能只是想通过创建程序来掌握某个特定功能，比如如何从股票市场网站获取数据，或者如何为游戏创建动画。在这种情况下，你的目标只是创建一些简短、一次性的程序，让你了解如何使用特定的编程功能。


  如果你计划创建程序供他人使用，那么你需要做一些额外的规划。首先，你为什么想为他人创建程序？也许你想为某个人定制一个程序，或者你想创建一个具备现有程序所缺乏功能的程序。无论出于何种原因，每个程序最终都必须满足用户的需求。


  如果你为自己使用而创建程序，那么你就是用户。但如果你为他人创建程序，那么用户可以是特定的人和计算机（例如，你所在牙科诊所的一位牙医），也可以是一个广泛的用户群体（任何需要管理牙科诊所的牙医）。无论用户是谁，都要找出你的程序必须为该用户解决的最重要的单一任务。然后确保你的程序能正确完成这一关键任务。


  **注意**


  2000 年至 2005 年间，美国联邦调查局（FBI）耗资 1.7 亿美元创建了一个名为“虚拟案件档案”的程序。由于该程序的目标和运作方式的规范不断变更，政府最终放弃了整个项目。如果你不知道程序应该做什么，你也就不会知道它应该如何实现那个结果。


  在编写任何程序之前，请明确以下内容：


  -   程序的用户是谁？

  -   程序应该为用户做什么？

  -   程序将如何为用户实现这一结果？


  程序的用户完全决定了程序用户界面的设计。比较一下 777 喷气式客机的驾驶舱和普通汽车的仪表盘。对普通人来说，777 的驾驶舱可能看起来令人生畏，但对经验丰富的飞行员来说，一切触手可及，易于理解。如果你的程序面向专业人士，你的用户界面可以依赖用户的知识来操作。如果你的程序面向普通大众，你的用户界面可能需要更频繁地引导用户。


  每个程序都必须为用户创造有用的结果。文字处理器将文本组织成格式整齐的页面，电子表格自动准确地计算数学公式，甚至游戏也能提供娱乐。想象一下，你的程序赋予了用户一种无法通过其他方式获得的超能力。你的程序将赋予用户什么超能力？


  一旦你明确了程序应该为用户做什么，最后一步就是确定它将如何实现这一结果。程序通常接收用户输入，以某种方式处理这些输入，并提供新的结果。作为程序员，你需要一步一步地确定如何实现这个新结果。然后，你需要将这些步骤翻译成
  Swift 这样的编程语言。


  归根结底，编程是一种需要清晰、具体的目标和持之以恒的毅力才能获得成功的创造性才能。


  ## 设计程序的结构


  一旦你明确了程序需要做什么以及如何做到，下一步就是设计程序实际工作的方式。编写程序并没有唯一的“最佳”方法，因为你可以用一百万种不同的方式编写同一个程序。然而，你需要设计的程序不仅要能工作，还要易于理解和在未来进行修改。


  每个程序总有改进的空间。有时改进意味着优化程序，使其运行更快或占用更少内存。其他时候改进意味着为程序添加新功能。无论哪种情况，每个程序在其生命周期内都可能经历多次修改，因此从一开始就设计好程序至关重要，使其易于理解和修改。


  在面向对象编程的世界里，设计程序的常见方式是将一个大型程序拆分为多个代表逻辑功能的对象。例如，如果你正在设计一个控制汽车的程序，你可以将程序划分为以下对象：


  -   发动机对象

  -   转向对象

  -   音响对象

  -   变速箱对象


  现在，如果你需要改进程序的转向能力，你只需用一个新的`转向`对象替换旧的即可，而不会有改动影响程序其他部分的风险。


  如何将程序划分为对象是完全自由的。你也可以将同一个汽车程序设计为以下对象：


  -   前部对象

  -   后部对象

  -   内部对象

  -   底盘对象


  如果你从一开始就设计好程序，那么你或其它程序员将来就能轻松地对其进行修改。




  ## 设计程序的用户界面


  除了程序设计的结构，程序的另一个关键要素是用户界面。借助 `Xcode`，你可以完全独立于用户界面来设计程序的结构（即它的各种对象），反之亦然。这让你拥有自由，可以轻松地设计或修改程序的结构或用户界面，而不会影响到程序的另一部分。


  用户界面定义了用户如何看待你的程序。糟糕的用户界面会使程序难以使用，而优秀的用户界面则能让程序易于操作。即便程序底层结构很差，一个好的用户界面也能让程序看起来反应灵敏、优雅且设计精良。


  那么，什么是好的用户界面呢？理想情况下，用户界面会融入背景，以至于用户甚至察觉不到它的存在。当你在 iPhone 或 iPad 的屏幕上用两根手指捏合时，就能让图像看起来变大或变小。


  从用户的角度来看，用户界面仿佛不存在，因为用户获得了直接操控图像的直观感受。实际上，是用户界面将用户指尖的位置转换成了放大图像外观的效果。用户界面依然存在，但用户不需要阅读厚厚的培训手册并遵循多个步骤来操作它。优秀的用户界面本质上会融入背景之中。


  下面来看看一个笨拙的用户界面会如何完成完全相同的任务。首先，用户需要点击屏幕上的一个按钮来显示菜单。其次，用户需要从该菜单中选择一个 `Zoom` 命令。第三，用户需要输入一个代表放大百分比的数字，例如
  50% 或 125%。第四，用户需要点击一个 `OK` 按钮，才能最终完成任务并改变图像的放大倍率。


  你更愿意使用哪一种用户界面？


  通常来说，完成一项任务所需的步骤越多，用户界面就越难用，因为如果用户遗漏了一个步骤，或打乱了某个步骤的顺序，整个任务就会失败。程序员们常常试图通过增加快捷键或工具栏图标等更多方式来完成同一任务，以此来修复糟糕的用户界面设计。不幸的是，如果你的用户界面本身就很差，增加更多完成任务的方式并不一定会让它变得更容易使用。


  如果你有一个糟糕的用户界面，与其试图修复一个有缺陷的设计，不如重新设计整个界面。


  ### 用纸和笔设计用户界面


  通常来说，你对用户界面的第一个想法很少会成为最终的设计。这是因为你认为行得通的东西可能行不通，而你甚至没有考虑到的事情可能对用户至关重要。因此，与其先设计用户界面再被迫修改，不如用纸和笔来设计用户界面，这样会快得多，也简单得多。


  一旦你在纸上有了一个粗略的设计，就把它拿给最终用户看，以获取他们的反馈。尽管看着静态的、粗略绘制的用户界面图像似乎没什么意义，但它能让你获得关于用户界面总体设计的反馈。在评估初步的用户界面时，可以向用户提出以下问题：


  - 缺少什么？是否有命令或功能需要显示却没有显示出来？

  - 什么是不需要的？是否有当前显示但不必要的命令或功能？

  - 什么能让操作更简便？如何重新排列或组织用户界面使其更简单？

  - 什么令人困惑？是否有用户不理解的地方？帮助菜单和描述性工具提示永远无法替代清晰简洁的用户界面设计。

  - 什么是直观的？用户期望对你的用户界面做什么？你的用户界面是支持还是挫败了用户的期望？


  在纸上设计用户界面快速、迅捷且容易。由于你在任何一个特定的用户界面设计上投入的时间都不多，因此抛弃糟糕的设计比试图辩护和证明保留它们的合理性要容易得多。


  此外，纸上设计也方便你或他人在上面涂写以重新设计。因为任何人都可以快速而简单地制作纸质用户界面设计，所以请随意尝试。你能创建的用户界面设计越多，你就越有可能偶然发现一个可行的方案。


  研究现有的程序，看看你最喜欢什么，最不喜欢什么。然后将这两种特性（你喜欢的和你讨厌的）放入不同的用户界面设计中。你可能认为最好的设计，也许恰恰是别人最不喜欢的；而你最不喜欢的那个设计，可能别人觉得是最好的。


  ### 用软件设计用户界面


  当你已经尝试了不同的用户界面设计，并找到了一个或多个看起来很有前途的方案后，是时候超越纸和笔，创建一个能在电脑屏幕上实际查看的用户界面原型了。


  在纸上看起来不错的东西，在电脑屏幕上可能行不通。更重要的是，电脑屏幕可以创建一种简单的交互形式。当用户点击按钮时，一个新屏幕会出现，就像真实的用户界面那样工作。这种交互性是纸笔设计难以模仿的。


  创建交互式用户界面原型的一个快速方法是使用演示软件，例如 `PowerPoint` 或 `Keynote`。演示软件允许你创建幻灯片，每张幻灯片可以代表你的用户界面的一个窗口。你可以放置按钮和图形来创建粗略的用户界面设计，然后在这些按钮和幻灯片之间创建链接，以形成有限形式的交互。


  交互式用户界面原型能让你测试用户期望用户界面如何响应。例如，用户可能期望在点击一个命令后看到某个特定窗口。如果你的交互式原型向用户展示了一个不同的窗口，那么你就知道需要修复什么了。


  与纸笔设计一样，用户界面原型的目标是找出哪些可行、哪些不可行，同时尽可能少地花费时间在设计原型上。你在设计原型上花的时间越少，就有越多的时间去构思替代方案并测试它们。


  除了使用演示软件创建用户界面原型外，你还可以购买专门的模拟软件，这些软件包含了常见的用户界面元素，如按钮、窗口和复选框，你可以快速拖放它们来创建一个模拟的用户界面，如图
  28-1 所示。


  ![A437923_1_En_28_Fig1_HTML.jpg](img/A437923_1_En_28_Fig1_HTML.jpg)


  图 28-1. Balsamiq Mockups 是一款专门用于创建用户界面原型的程序


  用户界面原型的软件版本提供了交互性。当你对作为原型的用户界面设计感到满意时，最后一步就是将你的原型转换为真正的 `Xcode` 用户界面。


  请记住，`Xcode` 允许你将 `Swift` 代码与用户界面完全分开创建。这意味着你可以在 `Xcode` 中创建用户界面，而无需编写一行代码。当你对用户界面的外观和设计感到满意时，可以将其各种元素（按钮、菜单等）连接到
  `IBOutlets` 和 `IBAction` 方法，从而将你的用户界面与你的 `Swift` 代码链接起来。




  ## 营销你的软件


  一旦创建了程序，你就需要对其进行测试以确保它能正常工作。这些早期测试者（称为 Alpha 和 Beta 测试者）可以帮助发现程序中的漏洞，以便你及时修复。当你的程序尽可能没有漏洞时，就是把它推向市场的时候了。


  大多数人都会犯这样一个最大的错误：他们编写了一个程序，搭建了一个网站来宣传这个程序或他们的公司，然后就坐等订单纷至沓来。在 macOS 的世界里，苹果公司提供了专门的
  Mac App Store，让每个 Mac 用户都有机会访问你的软件。


  然而，仅仅在网站或 Mac App Store 上宣传你的软件，然后坐等人们购买是远远不够的。为了最大化销售额，你还必须推广你的软件。


  对许多人来说，营销意味着花钱做广告。虽然你可以这样做，但最好还是尽可能少花钱。在广告和营销上花钱很容易，但除非你的广告和营销支出低于它们所产生的销售额，否则你就有慢慢破产的风险。大多数人犯错的地方在于，他们把钱花在了广告和营销上，却不知道这些投入是否带来了足够的销售额来证明这笔开销是值得的。


  这就是为什么你应该专注于免费的方式来宣传和营销你的软件，这样你就能了解人们喜欢你的软件哪些方面，哪些类型的人更有可能购买你的软件，以及接触潜在用户的最佳方式，而所有这些都无需倾家荡产。


  例如，假设你销售一款能让视频看起来像几十年前胶片拍摄的陈旧效果软件，画面带有划痕、褪色图像以及胶片在电影放映机中穿行的音效。你可能会最初瞄准那些想把视频变成老电影图乐子的用户，但你可能发现你的实际市场是好莱坞电影制片厂，他们需要创建视觉效果来模拟老电影。


  你的初始市场可能并不在乎你的软件，但一个完全不同的市场却可能感兴趣。如果你把钱花在了对初始市场的广告上，那就等于把钱浪费在了那些并不真正想要你程序的人身上。也许要等到后来，你才能找到软件的真正市场，而这个市场可能来自你从未想过的某个意想不到的细分领域。


  所以，不要用花钱来代替市场调研。花钱很容易，但花时间去评估你的营销和广告到底有多有效，以及你是否从一开始就瞄准了软件最有利可图的市场，这却要难得多。


  除了花最少的钱通过网站推广你的软件之外，这里还有一些低成本的、几乎免费的其他推广方式：


  *   开设博客。

  *   赠送免费软件。

  *   在 YouTube 等视频分享网站上发布你的软件视频。

  *   创建并免费提供包含技巧的 PDF 文件，面向那些可能是你软件潜在客户的人群。

  *   找到你的潜在客户聚集的社交网络，参与讨论并回答他们的问题。


  ### 撰写关于你软件的博客


  一个网站就像是在沙漠中央竖立一块广告牌，指望人们会奇迹般地发现它。虽然搜索引擎可以帮助人们找到你的网站，但在你的网站上同时包含一个博客要好得多。


  博客有几个目的。首先，通过坚持至少每周更新一篇博客，你为网站生成了新内容。新内容告诉搜索引擎你的网站是活跃的，因此搜索引擎会将其排名比那些几个月甚至几年未更新的网站更高。所以博客能提高你的搜索引擎排名，从而增加潜在客户找到你产品的机会。


  其次，博客为你的软件赋予了人性化的一面。通过讨论你在创建软件时面临的挑战，以及回答人们关于你软件的疑问，你展示出有人在乎并愿意回应关于该软件的问题。在从一个匿名的公司购买，还是从一个看起来像真实的人那里购买之间做选择时，这种微妙的差异可以增加潜在客户购买你软件的可能性。


  第三，每篇博文都相当于一个为你的软件做宣传的迷你广告。大多数人创建一个描述其软件的网站，希望以此说服人们购买他们的产品。而博客让你可以聚焦于软件的不同方面。一篇博文可能会谈论一个你特别引以为豪的特色功能。第二篇博文可能会讲述一个满意客户使用你的软件解决问题的故事。第三篇博文可能会解释你为何以某种特定方式设计你的程序。


  由于每篇博文都略有不同，你避免了重复。然而，因为每篇博文都在持续推广你的软件，你便从不同角度不断宣传你的软件。这增加了某篇博文能说服某人购买你软件的机会。


  写博客只需要花费时间，却能在反复推广你的软件的同时，提高搜索引擎排名。把博客看作是在互联网上免费做广告的一种方式。


  ### 赠送免费软件


  公司免费赠送从食品到牙膏等各种样品是有原因的。他们知道，一旦你尝试并喜欢上某个产品，你购买它的可能性就会大大增加。如果你从未尝试过某个产品，公司想说服你购买就难得多。


  赠送免费软件的原理也是如此。一些公司会免费提供他们软件的“精简版”，这些版本功能齐全。这让客户可以免费试用你的软件。一定比例的客户最终会想要更高级的功能，这些人就会转化为付费客户。


  使用你免费软件的人越多，为高级版本付费的人也就越多。


  例如，假设有 1% 尝试你免费软件的人决定购买你的高级版本。如果你能让 100 个人用上你的免费软件，那就意味着达成一笔销售。然而，如果你能让 10,000 个人用上你的免费软件，那就意味着
  100 笔销售。


  由于分发免费软件不会给你带来任何复制或分发成本，你的广告和营销成本基本上为零。


  除了提供免费的“精简版”程序，你还可以提供与主要程序相关的免费软件。例如，假设你销售一款面向科学家的文字处理器，它可以编写复杂的数学和化学公式。与其赠送程序的免费“精简版”，不如赠送你的目标受众（工程师和科学家）可能喜欢的免费软件，比如一个交互式的元素周期表或一个简单的方程求解程序。


  这样的免费软件只是免费提供给潜在客户一些东西。现在，如果他们喜欢你的免费软件，他们就更有可能信任你的商业软件。如果你的免费软件设计精良且实用，潜在客户就会相信你的商业软件也一定同样设计精良且实用。免费软件让潜在客户能够无风险地体验你的产品。




  #### 发布关于你软件的演示视频


  为你的软件撰写博客文章对喜欢阅读的人来说很棒。可惜如今世事繁忙，许多人没时间阅读。另一种方法是制作短视频演示你的软件如何运作，让人们看到你的软件能解决什么问题以及如何解决。


  通常来说，没人想购买或使用你的软件。他们真正想要的是你的软件所能提供的解决方案，而这正是你需要在视频中强调的。不要解释菜单系统或用户界面的布局。专注于解决一个具体问题，并突出你软件中的独特之处。


  例如，假设你的软件是为房地产经纪人设计的。你的潜在客户要么想节省时间，要么想赚更多钱，所以请展示你的软件如何能帮助房地产经纪人实现这两个目标。演示一个能简化现有耗时流程的功能。再展示另一个能以较少额外工作量增加房产潜在买家人数的功能。始终关注你的软件如何为用户带来好处。


  保持视频简短且切中要点。更多人会观看一个不到一分钟、演示单一功能的视频。观看一个 30 分钟、演示多个功能的视频的人则要少得多。在像 YouTube 这样的许多视频分享网站上，你甚至可以将多个视频串联起来，这样当一个视频结束时，第二个视频自动开始。这样一来，每个视频都成了你产品的又一个广告，而通过将每个视频链接到另一个，每个新视频都能增加有人发现并观看其中至少一个视频的机会。


  #### 提供免费信息


  人们倾向于从他们信任的人那里购买更多产品，因此让人们对您产生信任的一种方法就是免费提供有用的信息。例如，如果你的软件帮助编辑照片，那就写一份捕捉更佳照片的窍门清单。然后以
  PDF 文件形式分享这份窍门清单并免费赠送，附上一个链接到你的网站来推广你的软件。


  免费、有用的信息充当着一种巧妙的广告。传统广告直接推销产品，这可能会立刻让哪怕是最好的潜在客户望而却步。而免费信息则巧妙地推广产品。由于免费信息对你的潜在客户有用，他们会更愿意查看它，甚至与他人分享。如果他们想了解更多信息，他们可以访问你的网站。


  一种在视觉上吸引人的提供免费信息的方式是通过图文结合的形式，也就是所谓的信息图。信息图以色彩丰富的方式呈现信息，使其易于阅读和理解，无需阅读大量文字。如图 28-2
  所示，就连 IBM 也会制作并分发免费的信息图来推广其服务和产品。


  ![A437923_1_En_28_Fig2_HTML.jpg](img/A437923_1_En_28_Fig2_HTML.jpg)


  图 28-2. IBM 提供一份 PDF 格式的信息图，以推广其服务如何帮助了 American Greetings 公司


  通过提供免费、有用的信息，你将自己塑造成权威。如果你能提供免费、有用的信息（以 PDF 文件和博客文章的形式）放在你的网站上，你就会给人们更多理由反复访问你的网站/博客。人们访问的次数越多，他们最终购买你的软件或向他人介绍你的网站/博客的可能性就越大。


  免费、有用的信息能让你显得值得信赖，这降低了购买你软件的门槛。人们越信任你，他们就越有可能相信你的产品能实现你所宣称的功能。


  ### 加入社交网络


  在你的博客中或以 PDF 文件形式免费提供有用的信息，可以帮助你确立自己在该领域的权威地位。然而，博客需要有人访问你的网站，而 PDF 文件则需要有人下载。分享免费有用信息的另一种方法是与热门社交网络保持持续联系。


  找出你的潜在客户在使用哪些社交网络，然后加入这些网络。当人们提出问题，就跳进去用有用的建议回答他们。目的是解答人们的问题，并让自己显得值得信赖。然后确保你发布的每条消息都包含一个指向你网站或博客的链接。


  参与社交网络能让你比指望人们访问你的博客或找到你的 PDF 文件更快地接触到潜在客户。只是要确保你提供的是有用的信息，而不是那些只会惹恼别人的、伪装拙劣的广告文案。人们在社交网络上越信任你，他们就越有可能访问你的网站/博客。


  借助于所有这些技巧，目标并非让人立刻购买你的产品（尽管这总是好事）。真正的目标是引导他们向了解更多你和你的产品迈进一步。人们越了解你的产品，就越有可能向你购买。


  广告和营销本质上是一场数字游戏。持续以不占用太多时间或金钱的方式免费帮助他人，最终你会发发现有人找到你并购买你的软件。你帮助别人越多，别人就越信任你并从你这里购买。


  传统的营销和广告方式试图强迫人们听广告并违背自己意愿购买（这也是为什么这么多人讨厌营销和广告）。更有效的营销和广告方式是在要求潜在客户购买之前，先给他们一些有价值的东西。




  ### 总结


  大多数程序员都专注于提升编程方面的技术知识。虽然尽可能多地了解 `Swift` 的功能特性和 `Cocoa` 框架总是有益的，但仅有技术知识通常是不够的。


  编程并不仅仅是编写代码。在你开始编写 `Swift` 代码之前，需要确保你的程序有市场需求。与其试图与大公司竞争，不如寻找那些被大公司忽视的利基市场，或者想办法让你的程序能够补充大公司所提供的产品。大公司拥有远超你的资源，可以用来碾压任何直接竞争对手，因此，瞄准利基市场或为他们的产品提供补充，可以避免与体量更大的公司直接竞争。


  在开始编写 `Swift` 代码之前，请先为你的软件用户界面创建原型。虽然对程序员来说，用户界面设计可能不像深入研究编写代码的复杂性那样有吸引力，但它是任何软件项目至关重要的组成部分。用户界面决定了人们如何看待你的程序。设计良好的用户界面能让你的程序更易于使用。而设计欠佳的用户界面则会让程序显得难以使用，即便它可能具备出色的技术特性。


  使用纸和笔来尽可能快速、低成本地测试你的用户界面设计。当你需要创建交互式版本的用户界面时，可以使用像 `Keynote` 或 `PowerPoint` 这样的演示软件来制作简单的模拟图，或者考虑购买专门的原型设计软件。


  当你有了最终的用户界面设计后，在 `Xcode` 中将其实现。请记住，随着程序的不断演进，你很可能还需要对用户界面进行调整。


  最后，当你的程序完成时，你的工作仍未结束。你还需要为你的软件做广告和营销。与其花钱购买广告，不如优先选择免费的推广方式，这样成本更低，而且通常效果更好。


  开设一个博客，免费分享信息，为他人提供有价值的东西。你给予他人的越多，他人就越有可能被你的产品吸引并购买。


  正如你所看到的，编码只是创建和营销软件的一个环节。技术知识可以创造软件，但在编码之前和之后，你还需要额外的技能来恰当地设计你的程序，并在日后成功将其销售出去。




