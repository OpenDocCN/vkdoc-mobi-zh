  trans: "好的，身为高级文档工程师和翻译员，我将遵循您的指示，将以下英文文本翻译成中文，并严格保留 Markdown 格式。\n\n\n### 协议扩展\n\
    \n在面向对象编程的世界中，你可以通过继承来扩展一个类，这会继承该类可能从其他类继承而来的所有属性和方法。在面向协议编程的世界中，你可以通过协议扩展来扩展一个协议。\n\
    \n协议扩展的用途之一是为属性定义默认值。你可以通过简单地为某个或多个属性赋值来定义默认值，例如：\n\n```\nprotocol Cat {\n   \
    \ var name: String { get }\n    var age: Int { get }\n}\n```\n\n这段代码定义了一个名为 `Cat`\
    \ 的协议，它定义了 `name` 和 `age` 属性为可获取的 `{ get }`。然后，你可以创建一个遵循 `Cat` 协议并为每个属性赋予初始值的结构体：\n\
    \n```\nstruct pet : Cat {\n    var name : String = \"Frank\"\n    var age : Int\
    \ = 2\n}\n```\n\n现在，如果你基于此结构体声明一个变量，该变量将包含这些初始值。尽管有初始值，你仍然可以随时在这些属性中存储新数据。要了解如何在不使用扩展的情况下为协议属性定义初始值，请按照以下步骤操作：\n\
    \n1.  确保 `ProtocolPlayground` 文件已在 Xcode 中加载。\n2.  按如下方式编辑 playground 代码：\n\n\
    ```\nimport Cocoa\nprotocol Cat {\n    var name: String { get }\n    var age:\
    \ Int { get }\n}\nstruct pet : Cat {\n    var name : String = \"Frank\"\n    var\
    \ age : Int = 2\n}\nvar animal = pet()\nprint (animal.name)\nprint (animal.age)\n\
    animal.name = \"Joey\"\nanimal.age = 13\nprint (animal.name)\nprint (animal.age)\n\
    ```\n\n当你第一次基于 `pet` 结构体创建 `animal` 变量时，初始的 `name` 属性值为 \"Frank\"，初始的 `age` 属性值为\
    \ 2。你可以随时为这两个属性存储新值，如图 24-4 所示。\n\n![A437923_1_En_24_Fig4_HTML.jpg](img/A437923_1_En_24_Fig4_HTML.jpg)\n\
    \n图 24-4. 你可以为协议定义的可获取属性分配初始值\n\n如果你想为一个属性设置（并保持）一个初始值，这时就可以使用协议扩展了。协议扩展仅能用于可获取的\
    \ `{ get }` 属性。一个协议扩展只需使用 `extension` 关键字，后跟要扩展的协议名称，例如：\n\n```\nextension Cat\
    \ {\n    // 在此处为一个或多个可获取属性设置默认值\n}\n```\n\n在扩展内部，你可以使用 `return` 关键字为一个或多个可获取属性计算默认值，例如：\n\
    \n```\nextension Cat {\n    var name : String { return \"Frank\" }\n}\n```\n\n\
    协议扩展不仅将 `name` 属性定义为包含字符串 \"Frank\"，还免除了在类、结构体或枚举中定义 `name` 属性的需要，例如：\n\n```\n\
    extension Cat {\n    var name : String { return \"Frank\" }\n}\nstruct pet : Cat\
    \ {\n    var age : Int = 2\n}\n```\n\n上述协议扩展和结构体本质上等同于以下代码：\n\n```\nstruct pet\
    \ : Cat {\n    var name : String = \"Frank\"\n    var age : Int = 2\n}\n```\n\n\
    主要区别在于，当 `name` 属性在结构体内部声明时，你可以在之后为其分配新的字符串。当 `name` 属性在协议扩展内部声明并设置为一个值时，你之后就不能再为其分配新的字符串了。要了解协议扩展如何定义默认值，请按照以下步骤操作：\n\
    \n1.  确保 `ProtocolPlayground` 文件已在 Xcode 中加载。\n2.  按如下方式编辑 playground 代码：\n\n\
    ```\nimport Cocoa\nprotocol Cat {\n    var name: String { get }\n    var age:\
    \ Int { get }\n}\nextension Cat {\n    var name : String { return \"Frank\" }\n\
    }\nstruct pet : Cat {\n    //var name : String = \"Frank\"\n    var age : Int\
    \ = 2\n}\nvar animal = pet()\nprint (animal.name)\nprint (animal.age)\n//animal.name\
    \ = \"Joey\"\nanimal.age = 13\nprint (animal.name)\nprint (animal.age)\n```\n\n\
    在上面的代码中，两行被注释掉的代码向你展示了协议扩展所省略的内容。一旦你在协议扩展中定义了 `name` 属性，就不再需要在 `pet` 结构体中声明该 `name`\
    \ 属性。在协议扩展中为 `name` 属性分配了默认值后，你也不能再为其分配新的字符串（例如 \"Joey\"）。图 24-5 显示了上述代码的结果。\n\
    \n![A437923_1_En_24_Fig5_HTML.jpg](img/A437923_1_En_24_Fig5_HTML.jpg)\n\n图 24-5.\
    \ 使用协议扩展定义默认值\n\n在协议扩展中定义默认值的一个问题是，任何遵循该协议的对象都必须同时遵循该协议的扩展。这意味着所有基于该协议和扩展的对象都将拥有相同的、无法更改的默认值。\n\
    \n如果你希望在定义默认值时拥有灵活性，但仅针对特定的类、结构体或枚举，你可以创建一个协议扩展，该扩展仅适用于也遵循另一个协议的类、结构体或枚举：\n\n\
    ```\nextension protocol2Extend where Self: protocol2Use {\n    // 在此处为一个或多个可获取属性设置默认值\n\
    }\n```\n\n上述 Swift 代码扩展了一个由 `protocol2Extend` 定义的协议。然而，`where Self:` 关键字标识了由 `protocol2Use`\
    \ 定义的第二个协议。\n\n因此，如果一个类、结构体或枚举遵循 `protocol2Extend` 定义的协议，那么只有当该类、结构体或枚举也遵循 `protocol2Use`\
    \ 定义的第二个协议时，扩展才会设置默认值。\n\n假设你创建了以下协议扩展：\n\n```\nextension Cat where Self: CatType\
    \ {\n    var name : String { return \"Frank\" }\n}\n```\n\n这将为任何遵循 `Cat` 协议和 `CatType`\
    \ 协议的类、结构体或枚举的 `name` 属性定义一个默认值 \"Frank\"。如果一个类、结构体或枚举仅遵循 `Cat` 协议，那么它的 `name`\
    \ 属性将不会被分配默认值 \"Frank\"。\n\n要了解此版本的协议扩展如何仅在类、结构体或遵循特定协议的前提下工作，请按照以下步骤操作：\n\n1.\
