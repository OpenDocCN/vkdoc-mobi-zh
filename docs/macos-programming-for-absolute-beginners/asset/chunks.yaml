    \ in Figure [5-5](#A437923_1_En_5_Chapter.html#Fig5).\n\n![A437923_1_En_5_Fig5_HTML.jpg](A437923_1_En_5_Fig5_HTML.jpg)\n\
    \nFigure 5-5.\n\nAn error message warns that you cannot store the wrong type of\
    \ data  \n4.  Modify the Swift code in the playground file as follows:\n\n```\n\
    \    import Cocoa\n    var cat: String\n    cat = \"Oscar\"\n    var greeting\
    \ = \"Hello, \"\n    var period : String = \".\"\n    print (greeting + cat +\
    \ period)\n    ```"
  trans: "\n### 在 Swift 中存储数据\n\n每个程序都需要接收数据，以某种方式处理数据，然后将结果展示给用户。为了接收数据，程序需要将数据临时存储在内存中。从技术上讲，计算机会将数据存储在内存地址中，记住这些地址可能会令人困惑。为了更容易知道数据存储在哪里，编程语言允许你给这些内存地址起个描述性的名字。在\
    \ Swift 中，这两种选择被称为：\n\n*   变量\n*   常量\n\n变量和常量的核心思想都是定义一个描述性的名称，并将其赋值以保存数据，例如：\n\
    \n```\nstr = \"This is the Swift interpreter\"\n```\n\n在上述例子中，`str` 是描述性的名称，而\
    \ `\"This is the Swift interpreter\"` 是被存储的数据。数据可以是文本字符串，也可以是数字，例如整数（`3`、`12`、`-9`\
    \ 等）或小数（也称为浮点数，如 `12.84`、`-0.83`、`8.02` 等）。在任何给定时间，你可以在一个描述性名称中存储一份数据，这个名称可以被定义为变量或常量。\n\
    \n变量和常量的主要区别在于，你可以根据需要多次重用一个变量来存储新数据（因此得名“变量”）。常量则只允许你向其存储一次数据。\n\n要定义一个变量，你必须使用\
    \ `var` 关键字，像这样：\n\n```\nvar str = \"This is the Swift interpreter\"\n```\n\n\
    要定义一个常量，你必须使用 `let` 关键字，像这样：\n\n```\nlet str = \"This is the Swift interpreter\"\
    \n```\n\n当你第一次向变量或常量存储数据时，Swift 会推断其数据类型，可能是以下之一：\n\n*   文本字符串（定义为 `String`）\n\
    *   整数（定义为 `Int`）\n*   小数（定义为 `Double`）\n\n知道变量或常量可以保存哪些数据类型至关重要，因为它只能保存一种数据类型，不能保存其他类型。所以，如果你创建了一个变量并向其中存储了一个字符串，那么这个变量从此以后就只能存储字符串了。\n\
    \n**注意：** Swift 被称为类型安全的编程语言，因为它强制你显式地定义每个变量或常量可以存储的数据类型。这可以防止你的程序试图处理不正确的数据，例如试图将数字添加到诸如\
    \ `\"John\"` 这样的文本字符串中。\n\n为了明确变量或常量可以保存的数据类型，你可以显式地定义四种常见数据类型之一，例如：\n\n```\n\
    var cat: String\nvar dog: Int\nvar fish: Float\nvar snake: Double\n```\n\n`String`\
    \ 数据类型只能包含由双引号括起来的字符，例如 `\"This is a string\"` 和 `\"15\"`。任何在双引号内的内容都被视为字符串。\n\
    \n`Int`（整数）数据类型只能保存整数，例如 `-25`、`4` 和 `3928`。如果你需要保存 `-2,147,483,648` 到 `2,147,483,647`\
    \ 之间的任何整数，请使用 `Int` 数据类型。\n\n`Float` 和 `Double` 数据类型可以保存小数，例如 `2.01`、`-0.577`\
    \ 和 `51.634`。两者之间的主要区别在于，`Float` 数据类型可以保存小数点后的七位数字，而 `Double` 数据类型可以保存小数点后两倍于\
    \ `Float` 的数字位数。\n\n例如，假设你想将数字 `0.123456789123456789` 存储在一个变量中。如果你将其存储在一个仅能保存\
    \ `Float` 值的变量中，Swift 实际上会存储值 `0.1234568`（对最后一位进行四舍五入）。\n\n```\nvar floatVar:\
    \ Float = 0.123456789123456789\n// 0.1234568\n```\n\n然而，如果你将完全相同的数字存储在一个仅能保存 `Double`\
    \ 值的变量中，Swift 将存储小数点后多达十四位的所有数字，例如：\n\n```\nvar doubleVar: Double = 0.123456789123456789\n\
    // 0.12345671234568\n```\n\n因为 Swift 是一种类型安全的语言，你不能将 `Float` 和 `Double` 数据类型一起处理。作为一般规则，要存储小数请使用\
    \ `Double` 数据类型，除非你特别有理由使用 `Float` 数据类型。\n\n如果你试图向变量或常量中存储错误类型的数据，Swift 不会允许。这是为了防止程序在使用错误数据类型时出现问题。例如，如果一个程序询问用户要订购多少件物品，而用户输入了\
    \ `\"five\"` 而不是数字 `5`，程序将不知道如何对 `\"five\"` 进行数学计算，这会导致程序崩溃或运行异常。\n\nSwift 提供了三种定义变量或常量的方式：\n\
    \n*   `let cat = \"Oscar\" // 推断为 String 数据类型`\n*   `let cat: String = \"Oscar\"\
    `\n*   `let cat: String`\n    *   `cat = \"Oscar\"`\n\n第一种方法允许你将数据直接存入变量或常量。基于你首次存储的数据类型，Swift\
    \ 将数据类型推断为 `String`、`Int` 或 `Double`（而不是 `Float`，因为 `Float` 存储的小数精度低于 `Double`，并且\
    \ Swift 默认你想要精确的精度）。\n\n第二种方法允许你显式声明数据类型并将数据存入该变量或常量。虽然这可能更冗长，但能明确知道你想要存储的数据类型。\n\
    \n第三种方法需要两行代码。第一行定义数据类型。第二行实际存储数据。这对于可能在程序的不同部分被赋予不同数据的变量来说非常方便。你可以将变量声明放在文件顶部附近以便查找，然后在需要时再向它赋值。\n\
    \n当创建多个相同数据类型的变量时，你可以将每个变量声明放在不同的行上，像这样：\n\n```\nvar cat : Int\nvar dog : Int\n\
    ```\n\n作为快捷方式，你可以在单行上声明相同数据类型的变量，像这样：\n\n```\nvar cat, dog : Int\n```\n\n上面这一行声明了\
    \ `cat` 和 `dog` 为可以保存 `Int` 数据类型的变量，这与声明 `cat` 为 `Int` 数据类型然后 `dog` 为另一个 `Int`\
    \ 数据类型的两行代码是相同的。通过将所有相同数据类型的变量声明放在一行上，你可以轻松地看出哪些变量使用相同的数据类型。\n\n要了解如何在 Swift 中声明变量和常量，请按以下步骤操作：\n\
    \n1.  确保你的 `IntroductoryPlayground` 文件已加载到 Xcode 中。\n2.  按如下方式修改 playground 文件中的\
    \ Swift 代码：\n\n```\nimport Cocoa\nlet cat: String\ncat = \"Oscar\"\ncat = \"Bo\"\
    \n```\n\n请注意，当你试图向已保存数据的常量赋值新数据时，你会收到一条警告。点击左侧边距中的警告图标会显示一条错误消息，如图 5-4 所示。\n\n\
    ![A437923_1_En_5_Fig4_HTML.jpg](img/A437923_1_En_5_Fig4_HTML.jpg)\n\n图 5-4。一条错误消息警告你不能多次向常量中存储数据。\n\
    \n**注意：** 常量也被称为“不可变的”，因为一旦你向其中存储了数据，它们就不能被更改。变量被称为“可变的”，因为你可以不断更改它们存储的数据。只需要记住变量一次只能保存一份数据。当你向变量中存储新数据的那一刻，该变量中任何已有的数据都会被清除。\n\
    \n3.  按如下方式修改 playground 文件中的 Swift 代码，将常量更改为变量（将 `let` 替换为 `var`）：\n\n```\nimport\
    \ Cocoa\nvar cat: String\ncat = \"Oscar\"\ncat = 42.7\n```\n\n请注意，当你试图向一个仅能保存字符串的变量中赋值数字时，你会收到一条警告。点击左侧边距中的警告图标会显示一条错误消息，如图\
    \ 5-5 所示。\n\n![A437923_1_En_5_Fig5_HTML.jpg](img/A437923_1_En_5_Fig5_HTML.jpg)\n\
    \n图 5-5。一条错误消息警告你不能存储错误类型的数据。\n\n4.  按如下方式修改 playground 文件中的 Swift 代码：\n\n```\n\
    import Cocoa\nvar cat: String\ncat = \"Oscar\"\nvar greeting = \"Hello, \"\nvar\
    \ period : String = \".\"\nprint (greeting + cat + period)\n```\n"
- fmt: "在图[5-6](#A437923_1_En_5_Chapter.html#Fig6)中，您可以在右侧边栏看到Playground显示Swift代码的结果。\n\
    \n![A437923_1_En_5_Fig6_HTML.jpg](A437923_1_En_5_Fig6_HTML.jpg)\n\n图5-6 Playground窗口的右侧边栏持续显示代码结果\n\
    \n当您使用`print`命令时，Swift的Playground会在右侧边栏和Playground窗口底部的调试区同时显示结果。要切换显示或隐藏调试区，请点击“显示/隐藏调试区”图标（见图[5-6](#A437923_1_En_5_Chapter.html#Fig6)）。\n\
    \n隐藏调试区可以让您看到更多Playground的Swift代码，而显示调试区则可以查看Swift代码中`print`命令的结果。\n\n## 使用Unicode字符作为名称\n\
    \n在大多数编程语言中，变量和常量的命名仅限于特定范围的字符集，通常排除外语字符。为了使Swift对熟悉其他语言的程序员更友好，Swift允许使用Unicode字符作为变量和常量名。\n\
    \nUnicode是一种代表不同字符的新通用标准。如果选择“编辑”➤“表情与符号”，您可以从有限字符集中选择字符，作为普通字母和数字的替代或补充，如图[5-7](#A437923_1_En_5_Chapter.html#Fig7)所示。\n\
    \n![A437923_1_En_5_Fig7_HTML.jpg](A437923_1_En_5_Fig7_HTML.jpg)\n\n图5-7 Xcode允许您使用特殊字符作为变量或常量名\n\
    \n要了解如何在变量名中使用特殊字符，请遵循以下步骤：\n\n1. 确保您的`IntroductoryPlayground`文件已在Xcode中打开。\n\
    2. 删除Playground中除`import Cocoa`行以外的所有代码。\n3. 在`import Cocoa`行下方，输入`let`然后按空格键。\n\
    4. 选择“编辑”➤“表情与符号”。弹出窗口如图[5-8](#A437923_1_En_5_Chapter.html#Fig8)所示。\n\n   ![A437923_1_En_5_Fig8_HTML.jpg](A437923_1_En_5_Fig8_HTML.jpg)\n\
    \n   图5-8 包含不同类别特殊字符的弹出窗口\n5. 双击任何您感兴趣的字符。Xcode会将该字符作为常量名输入。\n6. 输入`= \"Funny\
    \ symbol here\"`并按回车键。\n7. 复制该字符，并将其粘贴到`print`命令的括号内。注意，Playground窗口的右侧边栏会显示常量变量的内容，如图[5-9](#A437923_1_En_5_Chapter.html#Fig9)所示。\n\
    \n   ![A437923_1_En_5_Fig9_HTML.jpg](A437923_1_En_5_Fig9_HTML.jpg)\n\n   图5-9\
    \ 在Swift代码中使用特殊字符作为常量名\n\n特殊字符在显示实际数学符号（而非拼写单词）或以外语输入变量及常量名时非常有用。通过使变量和常量名更灵活，Swift让更多人能够理解编程。\n\
    \n## 转换数据类型\n\n如果您有一个整数类型的数字需要转换为小数，或者有一个小数需要转换为整数，该怎么办？答案是只需指定目标数据类型即可转换，例如：\n\
    \n```\nInt(decimal)\n```\n\n前面的`Int`数据类型告诉Swift将括号内的数字转换为整数。如果该数字是小数，转换为整数通常意味着舍弃小数点后的所有数字，因此像`4.9`这样的数会变成整数`4`。\n\
    \n当Swift将整数转换为小数时，它仅在小数点后补零。例如，将整数`75`转换为浮点数后，Swift会将其存储为`75.0`。要了解如何将整数转换为小数（以及反之），请遵循以下步骤：\n\
    \n1. 确保您的`IntroductoryPlayground`文件已在Xcode中打开。\n2. 将Playground文件中的代码修改如下：\n\n\
    \   ```\n   import Cocoa\n   var whole : Int = 4\n   var decimal : Double = 4.902\n\
    \   print (Int(decimal))\n   print (Double(whole))\n   ```\n\n注意Swift如何将整数转换为小数（将`4`变为`4.0`），以及如何通过舍弃小数点右侧的所有值将小数转换为整数（将`4.902`变为`4`），如图[5-10](#A437923_1_En_5_Chapter.html#Fig10)所示。\n\
    \n![A437923_1_En_5_Fig10_HTML.jpg](A437923_1_En_5_Fig10_HTML.jpg)\n\n图5-10 整数与小数的相互转换"
  raw: "In Figure [5-6](#A437923_1_En_5_Chapter.html#Fig6), you can see that the playground\
    \ displays the results of your Swift code in the right margin.\n\n![A437923_1_En_5_Fig6_HTML.jpg](A437923_1_En_5_Fig6_HTML.jpg)\n\
    \nFigure 5-6.\n\nThe right margin of the playground window constantly shows the\
    \ result of your code\n\nWhen you use the `print` command, Swift’s playground\
    \ displays the result in both the right margin and the bottom of the playground\
    \ window in the Debug area. To toggle between showing or hiding the Debug area,\
    \ click the Show/Hide Debug area icon (see Figure [5-6](#A437923_1_En_5_Chapter.html#Fig6)).\n\
    \nBy hiding the Debug area, you can view more of your playground Swift code .\
    \ By showing the Debug area, you can view the results of the `print` command in\
    \ your Swift code.\n\n## Using Unicode Characters as Names\n\nIn most programming\
    \ languages, variables and constants are limited to a specific range of characters,\
    \ often excluding foreign language characters. To help make Swift more accessible\
    \ to programmers comfortable with other languages, Swift lets you use Unicode\
    \ characters for your variable and constant names.\n\nUnicode is a new universal\
    \ standard that represents different characters. If you choose Edit ➤ Emojis &\
    \ Symbols, you can choose from a limited number of characters that you can use\
    \ instead of or in addition to ordinary letters and numbers, as shown in Figure\
    \ [5-7](#A437923_1_En_5_Chapter.html#Fig7).\n\n![A437923_1_En_5_Fig7_HTML.jpg](A437923_1_En_5_Fig7_HTML.jpg)\n\
    \nFigure 5-7.\n\nXcode lets you use special characters as variable or constant\
    \ names\n\nTo see how to use special characters in variable names, follow these\
    \ steps:\n\n1.  Make sure your IntroductoryPlayground file is loaded in Xcode.\
    \  \n2.  Delete all the code in your playground except for the “import Cocoa”\
    \ line.  \n3.  Underneath the “import Cocoa” line, type let and press the spacebar.\
    \  \n4.  Choose Edit ➤ Emojis & Symbols. A pop-up window appears, as shown in\
    \ Figure [5-8](#A437923_1_En_5_Chapter.html#Fig8).\n\n    ![A437923_1_En_5_Fig8_HTML.jpg](A437923_1_En_5_Fig8_HTML.jpg)\n\
    \n    Figure 5-8.\n\n    A pop-up window with different categories of special\
    \ characters  \n5.  Double-click any character that looks interesting. Xcode types\
    \ that character as your constant name.  \n6.  Type = “Funny symbol here” and\
    \ press Return.  \n7.  Copy the character and paste it in between the parentheses\
    \ of the print command. Notice that the right margin of the playground window\
    \ displays the contents of your constant variable, as shown in Figure [5-9](#A437923_1_En_5_Chapter.html#Fig9).\n\
    \n    ![A437923_1_En_5_Fig9_HTML.jpg](A437923_1_En_5_Fig9_HTML.jpg)\n\n    Figure\
    \ 5-9.\n\n    Using a special character as a constant name in Swift code  \n\n\
    Special characters can come in handy for displaying actual mathematical symbols\
    \ instead of spelling them out, or typing variable or constant names in a foreign\
    \ language. By making variable and constant names more versatile, Swift makes\
    \ programming understandable for more people.\n\n## Converting Data Types\n\n\
    If you have a number stored as an integer and need to convert it to a decimal,\
    \ or if you have a decimal and need to convert it to an integer, what can you\
    \ do? The answer is that you can convert one number data type to another just\
    \ by specifying the data type you want, such as\n\n```\nInt(decimal)\n```\n\n\
    The Int data type in front tells Swift to convert the number inside the parentheses\
    \ to an integer. If the number is a decimal, converting it to an integer basically\
    \ means dropping all numbers after the decimal point, so a number like 4.9 is\
    \ turned into the integer 4.\n\nWhen Swift converts an integer to a decimal number,\
    \ it simply tacks on a decimal point with zeroes. So if you convert the integer\
    \ 75 to a floating-point number, Swift now stores it as 75.0\\. To see how converting\
    \ integers to decimals (and vice versa) works, follow these steps:\n\n1.  Make\
    \ sure your IntroductoryPlayground file is loaded in Xcode.  \n2.  Modify the\
    \ code in the playground file as follows:\n\n    ```\n    import Cocoa\n    var\
    \ whole : Int = 4\n    var decimal : Double = 4.902\n    print (Int(decimal))\n\
    \    print (Double(whole))\n    ```\n\nNotice how Swift turns an integer into\
    \ a decimal (changing 4 to 4.0) and how it turns a decimal into an integer by\
    \ dropping every value to the right of the decimal point (changing 4.902 to 4),\
    \ as shown in Figure [5-10](#A437923_1_En_5_Chapter.html#Fig10).\n\n![A437923_1_En_5_Fig10_HTML.jpg](A437923_1_En_5_Fig10_HTML.jpg)\n\
    \nFigure 5-10.\n\nChanging integers to decimals and vice versa"
