    22. 点击 Guess 按钮。如果你猜得太低或太高，将出现 \"Too Low\" 或 \"Too High\" 信息。最终当你猜中正确数字时，会出现一个警告对话框，如图\
    \ 8-17 所示。\n\n![A437923_1_En_8_Fig17_HTML.jpg](A437923_1_En_8_Fig17_HTML.jpg)\n\
    \n图 8-17 显示警告对话框\n\n23. 点击警告对话框中的 OK 按钮以关闭它。\n24. 选择 LoopingProgram ➤ Quit LoopingProgram。\n\
    \n## Summary\n\n循环通过运行代码直到布尔值变为`false`来重复执行一行或多行代码。`while`循环首先检查布尔值，这意味着它可以运行零次或多次。`repeat-while`循环最后检查布尔值，这意味着它可以运行一次或多次。\n\
    \n创建`while`或`repeat-while`循环时，始终确保循环有结束的方法。如果循环永不结束，就会变成无限循环，导致程序假死且无响应。\n\n`for-in`循环允许你根据起始值和结束值指定循环运行的次数。要使`for-in`循环以非\
    \ 1 的增量计数，可以使用取余运算符（`%`）配合`where`命令。除了遍历一系列值外，`for-in`循环还可以自动计算列表中的项数。\n\n每种循环都有其优缺点，但你可以使每种循环实现其他循环的功能。如果需要提前退出循环，可以结合`if`语句使用`break`命令。\n\
    \n循环让你的程序能够执行重复性任务，而无需编写重复的命令。只需确保循环最终会结束，并且在停止前运行了正确的次数。\n\n# 9. Arrays and Dictionaries\n\
    \n几乎每个程序都需要接收数据，以便处理数据并计算出有用的结果。存储数据最简单的方式是通过变量来存储数字或文本字符串。然而，如果需要存储多个数据块（如姓名列表或产品编号列表）该怎么办？你可以创建多个变量，如下所示：\n\
    \n```\nvar employee001, employee002, employee003 : String\n```\n\n不幸的是，为存储相关数据而创建单独的变量可能很笨拙。如果你不知道需要存储多少项数据会怎样？那么你可能会创建过多或过少的变量。更糟糕的是，将相关数据存储在单独的变量中意味着很容易忽略数据之间的关系。\n\
    \n例如，如果你将三名员工的名字存储在不同的变量中，如何知道是否还有第四、第五或第六个变量包含其他员工姓名？除非你将变量在代码中保持在一起，否则很容易丢失散落在不同变量中的相关数据。\n\
    \n因此，Swift 提供了两种额外的数据存储方式：数组和字典。这两种数据结构的核心思想是，创建一个可以容纳多个项的单一变量。现在你可以将相关数据存储在一个位置，并轻松地查找和检索它们。\n\
    \n数组和字典都设计用于存储多个相似数据的副本，例如姓名列表或数字列表。在大多数情况下，你会在数组或字典中存储相同数据类型的列表。但是，你也可以通过声明数组或字典可以存储任意类型的数据（使用`Any`数据类型，例如整数和字符串）来存放不同数据类型，如下所示：\n\
    \n```\nvar mixedArray: [Any] = [1, \"Temp\", 2.6]\n```\n\n通常，最好在数组或字典中存储相同类型的数据，这样你始终知道期望的数据类型。\n\
    \n## Using Arrays\n\n你可以将数组想象为一系列无限的桶，每个桶恰好可以存储一份数据。为了帮助你找到数组中存储的数据，每个数组元素（桶）都由一个称为索引的数字标识。数组中的第一个项定义在索引\
    \ 0 处，第二个项定义在索引 1 处，第三个项定义在索引 2 处，以此类推，如图 9-1 所示。\n\n![A437923_1_En_9_Fig1_HTML.jpg](A437923_1_En_9_Fig1_HTML.jpg)\n\
    \n图 9-1 数组的结构\n\n要创建数组，你可以定义数组的名称和数组可以保存的数据类型。创建数组的一种方式如下：\n\n```\nvar arrayName\
    \ : [DataType] = []\n```\n\n一旦你创建了数组并定义了它可以保存的数据类型，就可以像这样向数组存储数据：\n\n```\nvar\
    \ arrayName : [Int] = []\narrayName = [34, 89, 70, 1, -24]\n```\n\n比起先定义一个空数组及其数据类型，然后再给数组赋值，更简单的方法是直接在一行内定义数组名称并将其设置为相同数据类型的项列表，如下所示：\n\
    \n```\nvar myArrray = [34, 89, -2, 84]\n```\n\nSwift 会根据数据推断数组的数据类型。只需确保数组中的所有数据都是相同的数据类型，例如`Int`、`Float`、`Double`或`String`。\n\
    \n注意：当你使用`var`关键字声明数组时，可以添加和删除数组中的项。如果你不希望数组发生变化，请使用`let`关键字声明数组，如下所示：`let arrayName\
    \ = [34, 89, 70, 1, -24]`。使用`let`关键字声明的数组永远不能被修改。\n\n当你向数组存储数据时，数组中的每个项都位于固定的位置。在前面的整数数组示例中，第一个数字（34）位于索引\
    \ 0，第二个数字（89）位于索引 1，第三个数字（70）位于索引 2，第四个数字（1）位于索引 3，第五个数字（-24）位于索引 4。由于 Swift 数组从\
    \ 0 开始计数索引，因此它们被称为零基数组。（某些编程语言从 1 开始计数数组索引，因此它们被称为一基数组。）\n\n如果你想检索数组中的第二个项（位于索引\
    \ 1），可以像这样检索该项并将其存储在变量中：\n\n```\nvar arrayName = [4, 5, 9, -3]\nvar number : Int\n\
    number = arrayName[1]\n```\n\n上述 Swift 代码创建了一个包含四个整数（4, 5, 9, -3）的数组，然后创建了一个名为`number`且可以保存整数数据类型的变量。第三行代码检索存储在`arrayName`索引\
    \ 1 位置的项。在本例中，`number`变量现在持有值 5。"
