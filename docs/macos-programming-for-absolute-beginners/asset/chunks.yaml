  trans: "\n### 访问元组中的数据\n\n创建元组并在其中存储数据后，最终需要检索这些数据。由于元组包含两个或多个数据块，Swift 提供了三种方式来检索所需数据。\n\
    \n首先，你可以创建多个变量来访问元组数据，如下所示：\n\n```\nvar petInfo = (\"Rover\", 38, true)\nvar (dog,\
    \ number, yesValue) = petInfo\nprint (dog)\nprint (number)\nprint (yesValue)\n\
    ```\n\n在第一行代码中，`petInfo` 是一个包含三个数据块的元组：一个字符串（`\"Rover\"`）、一个整数（`38`）和一个布尔值（`true`）。\n\
    \n第二行代码创建了三个变量（`dog`、`number`、`yesValue`），并将它们的值分别赋给 `petInfo` 元组中存储的对应数据。这意味着\
    \ `dog` 存储了 `\"Rover\"`，`number` 存储了 `38`，`yesValue` 存储了 `true`。`print` 命令只是将这些数据打印出来，以验证它从元组中检索到了信息。\n\
    \n要从元组访问数据，你必须知道元组存储数据的顺序。因此，如果你想从 `petInfo` 元组中检索一个字符串，你必须知道 `petInfo` 元组将名称（字符串）作为第一个数据块存储，数字作为第二个数据块，布尔值作为第三个数据块。\n\
    \n如果你不想检索元组中存储的所有值，你可以只创建一个变量来存储你想要的数据，并使用下划线字符（`_`）作为占位符，代表你想要忽略的元组中的其他每个值。\n\
    \n这意味着你仍然需要知道元组包含的数据块数量，以便识别出你想要检索的那一个数据块。例如，如果一个元组包含三项，你可以像这样检索第一项：\n\n```\n\
    var petInfo = (\"Rover\", 38, true)\nvar (pet,_,_) = petInfo\nprint (pet)\n```\n\
    \n这会将 `\"Rover\"` 存储到 `pet` 变量中，因此 `println` 命令会打印出 `\"Rover\"`。\n\n如果你只想检索中间的值，可以输入以下代码：\n\
    \n```\nvar petInfo = (\"Rover\", 38, true)\nvar (_,aValue,_) = petInfo\nprint\
    \ (aValue)\n```\n\n这会将数字 `38` 存储到 `aValue` 变量中，然后 `println` 命令会打印出 `38`。\n\n下划线字符充当占位符，用于标识元组中你想要忽略的数据。如果省略下划线字符，Swift\
    \ 将不知道你想要元组中的哪个特定数据。要从元组中检索数据，你必须知道元组存储的条目数量和顺序。\n\n从元组中检索值的第二种方法是使用索引编号，其中第一个元素被分配索引编号\
    \ `0`，第二个元素被分配索引编号 `1`，以此类推。例如，你可以像这样将数据存储在元组中：\n\n```\nvar petInfo = (\"Rover\"\
    , 38, true)\nprint (petInfo.0)\nprint (petInfo.1)\nprint (petInfo.2)\n```\n\n\
    元组中的第一项被分配索引编号 `0`，因此元组名称（例如 `petInfo`）后跟索引编号的组合，让你可以直接检索特定的元组值。因此，`petInfo.0`\
    \ 检索 `\"Rover\"`，`petInfo.1` 检索 `38`，`petInfo.2` 检索 `true`。\n\n请确保，当你通过索引编号访问元组数据时，使用了有效的索引编号。在上面的例子中，`petInfo`\
    \ 元组在索引 `0`、`1` 和 `2` 处包含数据，但如果你试图访问不同的索引（例如索引编号 `3`），那里没有数据，所以你的程序将无法工作。\n\n\
    访问元组数据的第三种方法涉及使用名称。要使用这种方法，你必须先为每个元组数据分配名称。例如，以下 Swift 代码定义了两个名称：`\"name\"` 和\
    \ `\"age\"`：\n\n```\nvar tupleName = (name: \"Bridget\", age: 31)\n```\n\n现在，你可以通过引用元组名称后跟每个数据的标识名称来访问元组数据，如下所示：\n\
    \n```\nprint (tupleName.name)   // 打印 \"Bridget\"\nprint (tupleName.age)    //\
    \ 打印 31\n```\n\n这三种方法为你提供了不同的访问元组中存储数据的方式，因此只需使用你最喜欢的方法即可。为了清晰起见，为元组的特定元素命名会使你的代码更易于理解，但这会牺牲一点灵活性，迫使你为元组数据命名。索引编号方法和多变量方法可能更简单，但清晰度较差，并且需要你知道想要检索的数据的确切顺序。\n\
    \n要了解如何使用元组，请按照以下步骤创建一个新的 playground：\n\n1.  在 Xcode 中打开 IntroductoryPlayground\
    \ 文件。\n2.  按如下方式编辑代码：\n\n```\n    import Cocoa\n    var tupleName = (greeting:\
    \ \"Happy Birthday\", age: 58, happy: true)\n    // 方法 #1\n    var (message, howOld,\
    \ mood) = tupleName\n    print (message)\n    print (howOld)\n    print (mood)\n\
    \    var (_,stuff,_) = tupleName\n    print (stuff)\n    // 方法 #2\n    print (tupleName.0)\n\
    \    print (tupleName.1)\n    print (tupleName.2)\n    // 方法 #3\n    print (tupleName.greeting)\n\
    \    print (tupleName.age)\n    print (tupleName.happy)\n```\n\n当你尝试所有三种从元组访问值的方法时，你会看到它们的工作原理相似。元组可以轻松地将相关数据分组到单个变量中，这样你就可以轻松地保持相关信息的条理性。然后，你可以选择使用三种不同方法之一从元组中检索数据，如图\
    \ 10-1 所示。\n\n![A437923_1_En_10_Fig1_HTML.jpg](img/A437923_1_En_10_Fig1_HTML.jpg)\n\
    \n图 10-1.\n\n从元组检索数据的三种不同方式\n\n## 使用集合\n\n数组和字典可以存储相同数据类型的列表，例如字符串列表或整数列表。数组和字典之间的区别在于你如何检索数据。数组强制你使用索引值按位置检索数据。字典允许你使用键来检索数据，但你必须为你存储的每个数据块定义一个唯一的键。\n\
    \n集合代表了另一种存储相同数据类型（例如字符串或十进制数字）列表的方式。集合的一个速度优势是判断某个元素是否被存储。如果你将数据存储在数组中，你必须彻底搜索整个数组才能确定数组是否存储了特定项。如果你将数据存储在字典中，你必须知道与该值一起存储的键，否则你必须彻底搜索字典的值列表。\n\
    \n集合允许你比数组或字典快得多地确定以下内容：\n\n-   一个元素是否存储在集合中\n-   一个集合是否包含与另一个集合完全相同的元素\n-   一个集合是否是另一个集合的子集（包含与更大集合相同的元素）\n\
    -   一个集合是否是另一个集合的超集（包含与更小集合相同的元素以及更多元素）\n-   两个集合是否包含相同的元素\n\n集合使得比较两组不同的数据变得容易，而数组和字典则无法轻易做到这一点。\n\
    \n### 创建集合\n\n要创建集合，你可以定义一个空集合及其可以保存的数据类型，如下所示：\n\n```\nvar setName = Set()\n\
    ```\n\n如果你想同时创建一个集合并用数据填充它，请将集合内容列在方括号内，并让 Swift 推断数据类型（所有数据必须为相同数据类型），例如：\n\n\
    ```\nvar setName = Set([Data1, Data2, Data2 ... DataN])\n```\n\n创建集合的第三种方法是定义一个集合名称，使用\
    \ `Set` 关键字，然后列出集合中的数据，如下所示：\n\n```\nvar setName: Set = [Data1, Data2, Data2 ...\
    \ DataN]\n```\n"
- fmt: "# Adding and Removing Items from a Set\n\nWith a set, you can add new items\
    \ at any time, just as long as the new item is the same data type as the existing\
    \ data. To add an item to a set, just specify the set name, the `insert` command,\
    \ and the data you want to add inside parentheses, like this:\n\n```\nsetName.insert(data)\n\
    ```\n\nYou must specify the array name to add data to and put the actual data\
    \ in parentheses. Make sure the data you add is of the proper data type. So if\
    \ you want to add data to a set that currently holds only integers, you can only\
    \ add another integer to that set.\n\nIf you try to add data that already exists\
    \ in the set, nothing will happen. This means if a set contains the number 53,\
    \ you can’t add another copy of 53 into that set.\n\nTo remove data from a set,\
    \ you just specify the set name, the `remove` command, and the data you want to\
    \ remove enclosed in parentheses like this:\n\n```\nsetName.remove(data)\n```\n\
    \nIf you try to remove data that doesn’t exist in the set, the `remove` command\
    \ returns a nil value. However, if the `remove` command succeeds in removing data\
    \ from a set, it returns an optional variable. This means if you store removed\
    \ data in a variable, as in\n\n```\nvar variableName = setName.remove(data)\n\
    ```\n\nthe value stored in the variable can be accessed by using an exclamation\
    \ mark, as in\n\n```\nprint(variableName!)\n```\n\nIf you want to remove all items\
    \ in a set, specify the set name and the `removeAll` command, like this:\n\n```\n\
    setName.removeAll()\n```\n\nTo see how to create a set and add and remove data\
    \ from it, create a new playground by following these steps:\n\n1. Open the `IntroductoryPlayground`\
    \ file in Xcode.\n2. Enter the code as follows:\n\n    ```\n    import Cocoa\n\
    \    var setOne = Set([2, 45, -9, 8, -34])\n    var setTwo : Set = [34, 90, -83]\n\
    \    setOne\n    setTwo\n    setOne.insert(65)\n    setTwo.insert(-381)\n    var\
    \ temp = setOne.remove(45)\n    print(temp)\n    print(temp!)\n    setOne\n  \
    \  setTwo\n    setOne.removeAll()\n    ```\n\nThis Swift code creates a set called\
    \ `setOne` by storing data directly and letting Swift infer the data types, which\
    \ are integers. Then it creates a second set called `setTwo`, which also holds\
    \ only integers.\n\nAfter creating `setTwo`, the two `insert` commands store different\
    \ integers into both `setOne` and `setTwo`. When the code removes the number 45\
    \ from `setOne`, it stores 45 as an optional variable in the `temp` variable.\
    \ To access the actual value, you have to unwrap the optional variable using the\
    \ exclamation mark (!).\n\nFinally, the `removeAll` command empties `setOne` so\
    \ it contains nothing, as shown in Figure [10-2](#A437923_1_En_10_Chapter.html#Fig2).\n\
    \n![A437923_1_En_10_Fig2_HTML.jpg](A437923_1_En_10_Fig2_HTML.jpg)\n\nFigure 10-2.\
    \ Creating sets, inserting data in a set, and removing data from a set\n\nNote\
    \ that Xcode will display a warning to the left of the `print(temp)` line. That’s\
    \ because `temp` represents an optional variable that you need to unwrap (using\
    \ the ! symbol) to retrieve the actual value.\n\n## Querying a Set\n\nOnce you\
    \ have a set, you can use the following commands to get information about that\
    \ set:\n\n* `count`: Counts the number of items in a set\n* `isEmpty`: Checks\
    \ if a set is empty (contains 0 items)\n* `isSubset(of:)`: Checks if one set is\
    \ wholly contained within another set\n* `isSuperset(of:)`: Checks if one set\
    \ contains all the items of another set\n* `isDisjoint(with:)`: Checks if two\
    \ sets have no items in common\n\nWhatever the result of these commands, they\
    \ never affect the data stored in a set.\n\nThe `count` command returns an integer\
    \ value and just requires the set name and the `count` command, like this:\n\n\
    ```\nsetName.count\n```\n\nYou can also assign this value to a variable, such\
    \ as\n\n```\nvar total = setName.count\n```\n\nThe `isEmpty` command returns a\
    \ Boolean value of true if a set has zero items in it. Otherwise, it returns false.\
    \ Just specify the set name followed by the `isEmpty` command, like this:\n\n\
    ```\nsetOne.isEmpty\n```\n\nThe `isSubset(of:)` command checks if one set contains\
    \ items that are also contained in a second set. Only if this second set contains\
    \ every item from the first set is it considered a subset.\n\nThe `isSuperset(of:)`\
    \ command checks if one set is larger and contains all the same items as a smaller\
    \ set. Only if this first set is larger and has all its items stored in the second\
    \ set is it considered a superset.\n\nThe `isDisjoint(with:)` command compares\
    \ two sets. If they have no items in common, then this command returns true. Otherwise,\
    \ it returns false.\n\nTo see how to query a set, follow these steps:\n\n1. Make\
    \ sure the `IntroductoryPlayground` file is loaded in Xcode.\n2. Edit the code\
    \ as follows:\n\n    ```\n    import Cocoa\n    var mySet = Set([\"Fred\", \"\
    Cindy\", \"Jody\", \"Grant\"])\n    print(mySet.isEmpty)\n    mySet.count\n  \
    \  mySet.removeAll()\n    print(mySet.isEmpty)\n    var myNewSet = Set([\"John\"\
    , \"Oscar\"])\n    var myOtherSet = Set([\"John\", \"Oscar\", \"Sally\"])\n  \
    \  var myThirdSet = Set([\"Rick\", \"Vinny\"])\n    myNewSet.isSubset(of: myOtherSet)\n\
    \    myOtherSet.isSuperset(of: myNewSet)\n    myNewSet.isDisjoint(with: myThirdSet)\n\
    \    ```\n\nThis code creates a set that holds four strings. It uses the `isEmpty`\
    \ command to check if the set is empty (false). Then it counts the set (it has\
    \ four items). Finally, it removes all the items from the set and uses the `isEmpty`\
    \ command again to check if the set is empty (true).\n\nThe next batch of code\
    \ creates three different sets called `myNewSet`, `myOtherSet`, and `myThirdSet`,\
    \ which are filled with different names. Then the `isSubset(of:)` command checks\
    \ if all the items in `myNewSet [\"John\", \"Oscar\"]` are also in `myOtherSet\
    \ [\"John\", \"Oscar\", \"Sally\"]`, which is true.\n\nThe `isSuperset(of:)` command\
    \ checks if `myOtherSet [\"John\", \"Oscar\", \"Sally\"]` contains more items\
    \ and also contains all the items stored in `myNewSet [\"John\", \"Oscar\"]`,\
    \ which is also true.\n\nFinally, the `isDisjoint(with:)` command checks if `myNewSet\
    \ [\"John\", \"Oscar\"]` has nothing in common with `myThirdSet [\"Rick\", \"\
    Vinny\"]`, which is also true, as shown in Figure [10-3](#A437923_1_En_10_Chapter.html#Fig3).\n\
    \n![A437923_1_En_10_Fig3_HTML.jpg](A437923_1_En_10_Fig3_HTML.jpg)\n\nFigure 10-3.\
    \ Querying a set"
