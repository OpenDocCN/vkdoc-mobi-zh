  trans: '

    # 创建和自定义用户界面


    `Utilities` 面板最常用于创建和自定义项目的用户界面。在 macOS 程序中，用户界面文件可以是以下两种类型之一：


    - `.xib` 文件

    - `.storyboard` 文件


    创建项目时，你可以选择要使用的类型。通常，`.xib` 文件用于单窗口用户界面，而 `.storyboard` 文件用于按特定顺序链接显示的多个窗口。可以混合使用
    `.xib` 和 `.storyboard` 文件来创建用户界面，或者只使用 `.xib` 或 `.storyboard` 文件。


    无论你使用 `.xib` 还是 `.storyboard` 文件，你都需要使用 `Utilities` 面板来实现两个目的。首先，你需要将按钮、文本字段和图片等项拖放到用户界面上。其次，你需要通过更改这些用户界面项的名称、颜色或大小来自定义它们。


    要设计用户界面，你首先需要使用 `Object Library`，它出现在 `Utilities` 面板的底部，如图 2-15 所示。要打开 `Object
    Library`，你可以执行以下操作：


    ![A437923_1_En_2_Fig15_HTML.jpg](img/A437923_1_En_2_Fig15_HTML.jpg)


    图 2-15. Object Library 包含不同的用户界面项


    - 选择 `View` ➤ `Utilities` ➤ `Show Object Library`。

    - 按下 `Control` + `Option` + `Command` + `3`。

    - 点击 `Show Object Library` 图标。


    要在 `Object Library` 中查找用户界面项，你可以简单地上下滚动列表。但是，如果你知道所需项的名称，更快的方法是在 `Object Library`
    窗口底部的 `Search` 字段中点击，输入所需项的全部或部分名称，然后按 `Return`。`Object Library` 将仅显示与你输入内容匹配的项。因此，如果你输入了
    `"Button"`，`Object Library` 将只显示你可以添加到用户界面的不同按钮。


    在用户界面上放置了一个或多个项之后，第二步是使用 `Inspector` 面板自定义这些项。`Inspector` 面板可以显示多种类型的窗格，但你最常用于自定义用户界面项的两个是：


    - `Attributes Inspector`

    - `Size Inspector`


    `Attributes Inspector` 允许你修改项的外观。`Size Inspector` 允许你修改项在用户界面中的大小和位置。


    要打开 `Attributes Inspector`，你可以执行以下操作之一：


    - 选择 `View` ➤ `Utilities` ➤ `Show Attributes Inspector`。

    - 按下 `Option` + `Command` + `4`。

    - 点击 `Show Attributes Inspector` 图标，如图 2-16 所示。


    ![A437923_1_En_2_Fig16_HTML.jpg](img/A437923_1_En_2_Fig16_HTML.jpg)


    图 2-16. Show Attributes Inspector 和 Show Size Inspector 图标


    要打开 `Size Inspector`，你可以执行以下操作之一：


    - 选择 `View` ➤ `Utilities` ➤ `Show Size Inspector`。

    - 按下 `Option` + `Command` + `5`。

    - 点击 `Show Size Inspector` 图标，如图 2-16 所示。


    打开 `Attributes` 或 `Size Inspectors` 后，你可以点击一个用户界面项（例如按钮或文本字段）来进行修改，然后输入或选择不同的选项来修改该项的外观。


    # 标准编辑器和辅助编辑器


    你将大部分时间花在使用编辑器或 `Interface Builder` 上。编辑器的功能类似于文字处理器，允许你输入和编辑 Swift 代码。`Interface
    Builder` 的功能类似于绘图程序，允许你在用户界面上拖放、调整大小和移动按钮、文本字段和图形等项。


    要编辑 Swift 代码，只需在 `Project Navigator` 面板中点击任何包含 `.swift` 文件扩展名的文件。当你点击一个 `.swift`
    文件时，该文件的内容会显示在 Xcode 窗口的中间窗格中，如图 2-17 所示。


    ![A437923_1_En_2_Fig17_HTML.jpg](img/A437923_1_En_2_Fig17_HTML.jpg)


    图 2-17. 点击一个 `.swift` 文件会显示该文件中存储的 Swift 代码


    要编辑你的用户界面，只需在 `Project Navigator` 面板中点击任何包含 `.xib` 或 `.storyboard` 文件扩展名的文件。这会将该用户界面的内容显示在
    Xcode 窗口的中间窗格中，如图 2-18 所示。


    ![A437923_1_En_2_Fig18_HTML.jpg](img/A437923_1_En_2_Fig18_HTML.jpg)


    图 2-18. 点击一个 `.xib` 或 `.storyboard` 文件会显示该文件中存储的用户界面


    每次你在 `Project Navigator` 面板中点击不同的文件时，Xcode 都会在 Xcode 窗口的中间窗格中显示该新文件的内容。


    当 Xcode 在其中间窗格中显示单个文件的内容时，这被称为 `Standard Editor`。但是，并排查看两个文件的内容通常很有用。当 Xcode 并排显示两个文件内容时，第二个文件窗格被称为
    `Assistant Editor`。


    打开 `Assistant Editor` 最常见的原因是你将用户界面显示在左侧窗格中，将 Swift 文件显示在右侧窗格中，如图 2-19 所示。这样做的目的是让你将用户界面链接到
    Swift 代码。


    ![A437923_1_En_2_Fig19_HTML.jpg](img/A437923_1_En_2_Fig19_HTML.jpg)


    图 2-19. Assistant Editor 并排显示两个文件内容


    当你创建用户界面时，它完全独立于你的 Swift 代码（反之亦然）。这让你可以自由地用新的用户界面替换旧用户界面，而不会影响 Swift 代码的行为方式。同样，这也允许你修改
    Swift 代码，而无需担心影响用户界面。


    在过去，程序员必须使用代码来创建用户界面，这意味着更改代码经常会影响用户界面，增加了程序出错或出现 bug 的可能性。通过将用户界面与代码分离，Xcode
    消除了这个问题，并帮助你创建更可靠的软件。


    当你最初创建用户界面时，它不会执行任何操作。这就是为什么你需要将一些用户界面项链接到使界面实际工作的 Swift 代码。例如，如果你的用户界面显示一个按钮，点击该按钮不会执行任何操作。你必须编写
    Swift 代码来告诉该按钮要做什么。然后，你必须将你的按钮链接到你的 Swift 代码。


    这就是 `Assistant Editor` 的目的。通过将你的用户界面显示在你的 Swift 代码文件旁边，`Assistant Editor` 使得从用户界面拖拽鼠标到
    Swift 代码文件变得容易，从而在用户界面和 Swift 代码之间建立链接。


    要打开 `Assistant Editor`，你可以选择以下方式之一：


    - 选择 `View` ➤ `Assistant Editor` ➤ `Show Assistant Editor`。

    - 按下 `Option` + `Command` + `Return`。

    - 点击 `Assistant Editor` 图标，如图 2-20 所示。


    ![A437923_1_En_2_Fig20_HTML.jpg](img/A437923_1_En_2_Fig20_HTML.jpg)


    图 2-20. Standard 和 Assistant Editor 图标


    要关闭 `Assistant Editor`，你必须通过以下方式之一打开 `Standard Editor`。

