    }\n```\n\nWhen MyFirstProgram runs, it imports the Cocoa framework and runs to\
    \ display a generic Macintosh program on the screen that includes your user interface.\
    \ The `applicationDidFinishLaunching` function runs, but since it doesn’t contain\
    \ any code, nothing happens. Now the program stops and waits for something to\
    \ happen.\n\nIf the user quits out of the program, the `applicationWillTerminate`\
    \ function will run, but since it doesn’t contain any code, nothing happens."
  trans: "\n## 搜索文档\n\n快速帮助可以显示特定类文件的信息，而浏览文档则能帮助你探索有关 Cocoa 框架和 macOS 编程的海量信息。问题在于，快速帮助仅适用于查找类文件的信息，并且浏览文档可能非常耗时。如果你清楚自己想找什么，直接搜索会更高效。\n\
    \n在搜索信息时，请尽可能输入更多内容以缩小搜索范围。如果只输入单个字母或单词，Xcode 的文档会向你抛出大量不相关的结果。\n\n要了解文档搜索窗口的工作原理，请尝试以下步骤：\n\
    \n1. 选择“帮助”➤“文档和 API 参考”。文档窗口随即出现。\n2. 点击“搜索文档”文本字段并输入文本。此时会显示一个包含不同文本结果的菜单，你可以点击获取更多信息，如图\
    \ 4-13 所示。\n\n   ![A437923_1_En_4_Fig13_HTML.jpg](img/A437923_1_En_4_Fig13_HTML.jpg)\n\
    \n   图 4-13. 搜索“text”的结果菜单\n3. 点击某个主题以查看该信息。\n\n通过搜索 Xcode 的文档，你可以快速轻松地找到所需内容。\n\
    \n## 使用代码补全\n\n在第 3 章中，当你开始输入 Swift 代码时，可能注意到了某些奇怪的现象。每次输入部分 Swift 命令时，Xcode 编辑器可能会显示灰色文本和一个包含与你已输入内容相匹配的可能命令的菜单；请参见图\
    \ 4-14。\n\n![A437923_1_En_4_Fig14_HTML.jpg](img/A437923_1_En_4_Fig14_HTML.jpg)\n\
    \n图 4-14. 代码补全提示你可能正在尝试输入的命令\n\n此功能称为代码补全，是 Xcode 帮助你插入长命令的方式，而无需你亲自键入每个字符。当你看到灰色文本和菜单时，有三种选择：\n\
    \n* 按下 Tab 键，让 Xcode 自动键入部分灰色文本（你可能需要多次按 Tab 键才能完全选中所有灰色文本）。\n* 双击弹出菜单中的某个命令以自动键入该命令。\n\
    * 继续手动输入。\n\n如果你继续输入，Xcode 会持续显示新的灰色文本（它认为你可能正在尝试输入的内容），同时显示一个包含与你已输入内容匹配的不同命令的菜单。我们来看看代码补全是如何工作的。\n\
    \n要了解代码补全的工作原理，请尝试以下步骤：\n\n1. 确保你的 `MyFirstProgram` 已在 Xcode 中加载。\n2. 在项目导航器窗格中点击\
    \ `AppDelegate.swift`。`AppDelegate.swift` 文件的内容会显示在 Xcode 的中间窗格中。\n3. 修改 `@IBAction\
    \ changeCase (sender: NSButton)` 代码，删除花括号之间的那一行代码，使其现在显示如下：\n\n   ```\n   @IBAction\
    \ func changeCase(_ sender: NSButton) {\n   }\n   ```\n\n4. 将光标移动到此 `@IBAction`\
    \ 方法的花括号之间，然后输入 `labelText.s`，此时会注意到灰色文本出现，并且一个包含可能命令的菜单也随之出现，如图 4-15 所示。\n\n\
    \   ![A437923_1_En_4_Fig15_HTML.jpg](img/A437923_1_En_4_Fig15_HTML.jpg)\n\n  \
    \ 图 4-15. 代码补全提示 `stringValue` 作为可能命令\n5. 按下 Tab 键。第一次按 Tab 键时，Xcode 会键入 `\"string\"\
    `。\n6. 第二次按下 Tab 键，现在 Xcode 会键入完整的 `\"stringValue\"`。\n7. 输入 `= messageText.stringValue.uppercased()`。请注意，在你输入时，代码补全会持续在弹出菜单中显示不同的灰色文本和命令。\n\
    \n通过使用代码补全，你可以更快、更准确地输入命令。如果你开始输入一个命令，但没有看到代码补全的灰色文本或菜单出现，这可能是一个信号，表示你输入的命令有误。代码补全只是\
    \ Xcode 让输入代码变得更简单的另一种方式。\n\n## 理解 macOS 程序如何工作\n\n为了帮助你更好地理解 Xcode 所有帮助文档的含义，你需要了解\
    \ macOS 程序是如何工作的。在过去程序规模较小的时候，程序员将所有程序命令存储在一个文件中。然后计算机从文件顶部的第一个命令开始，逐行执行，直到文件末尾才停止。\n\
    \n如今程序规模大得多，因此它们通常被分割成多个文件。无论你将程序分成多少个文件，Xcode 都会将它们视为存储在一个文件中。将程序分割成多个文件是为了方便你管理。\n\
    \n让我们逐行分析你的 `MyFirstProgram`，以便你理解发生了什么。当你在 Xcode 中查看 Swift 代码时，你会注意到 Xcode 编辑器用不同颜色标记不同的文本。这些颜色有助于你识别不同文本的用途，具体如下：\n\
    \n* 绿色：注释，Xcode 会完全忽略它们。注释用于解释附近代码的用途。\n* 紫色：Swift 语言的关键字\n* 红色：文本字符串\n* 蓝色：类文件名\n\
    * 黑色：命令\n\n第一行代码告诉 Xcode 导入或包含 Cocoa 框架中的所有代码作为程序的一部分。这行代码如下：\n\n```\nimport Cocoa\n\
    ```\n\n下一行代码运行一个 Swift 函数，用于加载你的用户界面（`MainMenu.xib`），并从你的 `AppDelegate` 类创建一个对象。这基本上让你的整个程序作为一个通用的\
    \ Macintosh 程序运行。这行代码如下：\n\n```\n@NSApplicationMain\n```\n\n下一行代码定义了一个名为 `AppDelegate`\
    \ 的类，它基于 `NSObject` 类，并使用了 `NSApplicationDelegate` 协议（稍后你将了解）。这行代码如下：\n\n```\n\
    class AppDelegate: NSObject, NSApplicationDelegate {\n```\n\n接下来的三行代码定义了 IBOutlets，用于将此\
    \ Swift 代码连接到用户界面元素：用户界面的窗口以及标签和文本字段。窗口基于 `NSWindow` 类（定义在 Cocoa 框架中），而标签和文本字段基于\
    \ `NSTextField` 类。这些行代码如下：\n\n```\n@IBOutlet weak var window: NSWindow!\n@IBOutlet\
    \ weak var labelText: NSTextField!\n@IBOutlet weak var messageText: NSTextField!\n\
    ```\n\n每次 Xcode 创建一个新的 macOS Cocoa 应用程序项目时，你都会看到两个不执行任何操作的空函数。如果你在这些函数内输入代码，代码会在程序启动后立即运行（`applicationDidFinishLaunching`），或者在程序结束时立即运行（`applicationWillTerminate`）。目前，请将这些函数保留原样，不必理会。\n\
    \n接下来的三行代码定义了一个 IBAction 方法，它连接到用户界面上的推送按钮。该代码获取存储在 `messageText`（文本字段）中的文本，并将其转换为大写。然后将大写文本存储到\
    \ `labelText`（标签）中。标签和文本字段都基于 `NSTextField` 类（定义在 Cocoa 框架中）。这些行代码如下：\n\n```\n\
    @IBAction func changeCase(_ sender: NSButton) {\nlabelText.stringValue = messageText.stringValue.uppercased()\n\
    }\n```\n\n当 `MyFirstProgram` 运行时，它会导入 Cocoa 框架并运行，在屏幕上显示一个包含你用户界面的通用 Macintosh\
    \ 程序。`applicationDidFinishLaunching` 函数会运行，但由于它不包含任何代码，因此什么也不会发生。之后程序停止并等待某些事件发生。\n\
    \n如果用户退出程序，`applicationWillTerminate` 函数将运行，但由于它不包含任何代码，因此什么也不会发生。\n"
- fmt: '当用户点击 Change Case 按钮时，会运行 IBAction 方法`changeCase`。该 IBAction 方法中唯一的 Swift
    命令会获取文本字段中的文本（存储在`messageText`的`stringValue`属性中），将其转换为大写，并将转换后的文本存储在标签中（由`labelText`的`stringValue`属性显示）。


    了解了 MyFirstProgram 的工作原理后，让我们从更理论化的角度来看 macOS 编程。首先，创建程序需要用到 Cocoa 框架定义的类文件。当你在用户界面上放置元素时，你使用的正是
    Cocoa 框架的类文件（例如`NSTextField`和`NSButton`）。


    当你在`AppDelegate.swift`文件中定义类时，你使用的也是 Cocoa 框架文件中的类（`NSObject`）。


    一个典型的 macOS 程序会从 Cocoa 框架的类文件以及你在 Swift 文件中可能定义的任何类文件创建对象。对象之间通过以下两种方式之一进行通信：


    -   从其他对象存储的属性中存储或检索数据

    -   调用其他对象中的方法


    要在对象的属性中存储数据，你需要在等号左侧指定对象名称及其属性，在等号右侧指定值，如下所示：


    ```

    labelText.stringValue = "Hello, world!"

    ```


    要从对象的属性中检索数据，你需要在等号左侧指定一个变量来保存数据，在等号右侧指定对象名称及其属性，如下所示：


    ```

    let warning = labelText.stringValue

    ```


    要调用另一个对象中的方法，你需要指定对象的名称和要使用的方法，如下所示：


    ```

    messageText.stringValue.uppercased()

    ```


    此命令告诉 Xcode 对`messageText`对象中存储的`stringValue`属性运行`uppercased()`方法。


    设置属性值、检索属性值和调用方法是对象之间相互通信的三种方式。


    当你创建一个类时，必须指定要使用的类文件，例如：


    ```

    class AppDelegate: NSObject

    ```


    这一行代码告诉 Xcode 定义一个名为`AppDelegate`的类，并将其基于名为`NSObject`的类文件（定义在 Cocoa 框架中）。


    当你基于现有类创建一个新类时，该类会自动包含该现有类定义的所有属性和方法。因此，在上面的定义了`AppDelegate`类的代码行中，任何从`AppDelegate`类创建的对象都会自动拥有`NSObject`类定义的所有属性和方法。


    有时一个类文件可能没有你需要的所有方法。为了解决这个问题，你可以继承一个现有的类，然后在你的类中定义一个新方法。然而，如果你创建了一个希望其他类也能使用的方法名，第二种替代方案是定义一个所谓的协议。


    协议不过是一系列相关方法名的列表，但并不包含任何让这些方法实际执行操作的 Swift 代码。在下面的代码中，`AppDelegate`类不仅基于`NSObject`类文件，而且还使用了由`NSApplicationDelegate`协议定义的方法。


    如果你打开文档窗口并搜索`NSApplicationDelegate`协议，你会看到`NSApplicationDelegate`协议定义的一系列方法名，例如`applicationDidFinishLaunching`或`applicationWillTerminate`，如图4-16所示。


    ![A437923_1_En_4_Fig16_HTML.jpg](A437923_1_En_4_Fig16_HTML.jpg)


    图 4-16. 文档窗口中的 NSApplicationDelegate 协议


    `AppDelegate`类继承了`NSObject`类的属性和方法，同时也使用了由`NSApplicationDelegate`协议定义的方法名。任何基于某个协议的类都必须编写
    Swift 代码，使这些协议方法实际完成某些操作。用技术术语来说，这被称为“实现或遵循协议”。


    因此，Cocoa 框架实际上由类和协议组成。类定义对象，而协议定义不同类可能需要的通用方法名。


    当你编写 macOS 程序时，经常需要同时使用 Cocoa 框架的类和协议。当你使用 Cocoa 框架的类时，你可以直接使用那些已有的功能方法，例如能够将文本转换为大写的`uppercased()`方法。


    当你使用 Cocoa 框架的协议时，你需要编写 Swift 代码来让该方法实际工作。在浏览 Xcode 文档时，请留意类和协议之间的这种区别。


    让我们在 Xcode 文档窗口中看一个同时涉及类和协议的示例：


    1.  确保你的 MyFirstProgram 项目已加载到 Xcode 中。

    2.  点击项目导航器中的`AppDelegate.swift`文件。Xcode 的中间窗格会显示该`.swift`文件的内容。

    3.  将光标移至`NSApplicationDelegate`上。

    4.  选择“帮助” ➤ “快速帮助”，或按住 Option 键并点击`NSApplicationDelegate`。一个快速帮助弹窗会出现，如图 4-17
    所示，解释`NSApplicationDelegate`是一个协议。


    ![A437923_1_En_4_Fig17_HTML.jpg](A437923_1_En_4_Fig17_HTML.jpg)


    图 4-17. NSApplicationDelegate 快速帮助弹窗


    5.  点击此窗口底部的“Protocol Reference”（协议参考）。`NSApplicationDelegate`协议参考页面会出现在文档窗口中（参见图
    4-16）。


    协议可以在不创建新类的情况下为现有类添加方法，但你并不一定非要使用协议。在 Xcode 中编写程序时，你会用到 Cocoa 框架的类和协议。出于程序的特定目的，你也可能创建自己的类和协议。


    在浏览 Xcode 文档时，在编写自己的代码之前，先在类中查找属性和方法。如果在一个类中找不到所需的方法和属性，可以去查找其父类。


    例如，在 MyFirstProgram 项目中，你本可以编写 Swift 代码来将文本字段中输入的文字转换为大写。然而，直接使用现有的`uppercased()`方法要简单得多。这节省了你编写代码和调试代码所需的时间，而你本可以直接使用
    Cocoa 框架中经过验证的代码。


    你对 Cocoa 框架了解得越多，编写自己程序时需要做的工作就越少。利用 Xcode 的文档来帮助你更好地理解构成整个 Cocoa 框架的所有类和协议。


    由于 Cocoa 框架非常庞大，不必试图一次性学习所有内容。只学习你需要的部分，忽略其余部分。你使用 Xcode 和编写程序越多，你就越有可能需要并学习 Cocoa
    框架的其他部分。


    总体思路是尽可能依赖 Cocoa 框架，仅在必要时编写 Swift 代码。这样可以更轻松、省力地快速编写出可靠的软件。'
  raw: 'When the user clicks the Change Case button, it runs the IBAction `changeCase`
    method. The only Swift command in this IBAction method takes the text from the
    text field (stored in the `stringValue` property of `messageText`), capitalizes
    it, and stores the capitalized text in the label (displayed by the `stringValue`
    property of `labelText`).


    Now that you’ve seen how the MyFirstProgram works, let’s look at macOS programming
    from a more theoretical standpoint. First, creating a program involves using class
    files defined by the Cocoa framework. When you place items on a user interface,
    you’re using Cocoa framework class files (such as `NSTextField` and `NSButton`).


    When you define a class in your `AppDelegate.swift` file, you’re also using a
    class from the Cocoa framework file (`NSObject`).


    A typical macOS program creates objects from the class files in the Cocoa framework
    and any class files you may define in your Swift files. Objects now communicate
    with one another in one of two ways:


    *   Storing or retrieving data from properties stored in other objects

    *   Calling methods stored in other objects


    To store data in an object’s property , you have to specify the object name and
    its property on the left side of an equal sign and a value on the right, like
    this:


    ```

    labelText.stringValue = "Hello, world!"

    ```


    To retrieve data from an object’s property, you have to specify a variable to
    hold data on the left side of an equal sign and the object name and its property
    on the right, like this:


    ```

    let warning = labelText.stringValue

    ```


    To call a method stored in another object, you have to specify the object’s name
    and the method to use, like this:


    ```

    messageText.stringValue.uppercased()

    ```


    This command tells Xcode to run the `uppercased()` method on the `stringValue`
    property stored in the `messageText` object.


    Setting property values, retrieving property values, and calling methods to run
    are the three ways objects communicate with each other.


    When you create a class, you must define the class file to use, such as


    ```

    class AppDelegate: NSObject

    ```


    This line tells Xcode to define a class called `AppDelegate` and base it on the
    class file called `NSObject` (which is defined in the Cocoa framework).


    When you create a class based on an existing class, that class automatically includes
    all the properties and methods defined by that class. So in the above line of
    code that defines the `AppDelegate` class, any object created from the `AppDelegate`
    class automatically has all the properties and methods defined by the `NSObject`
    class.


    Sometimes a class file doesn’t have all the methods you may need. To fix this,
    you can inherit from an existing class and then define a new method in your class.
    However, if you create a method name that you want other classes to use, a second
    alternative is to define something called a protocol.


    A protocol is nothing more than a list of related method names together but doesn’t
    include any Swift code to make those methods actually do anything. In the code
    below, the `AppDelegate` class is not only based on the `NSObject` class file,
    but also uses methods defined by the `NSApplicationDelegate` protocol .


    If you open the Documentation window and search for `NSApplicationDelegate` protocol,
    you’ll see a list of method names defined by the `NSApplicationDelegate` protocol,
    such as `applicationDidFinishLaunching` or `applicationWillTerminate`, as shown
    in Figure [4-16](#A437923_1_En_4_Chapter.html#Fig16).


    ![A437923_1_En_4_Fig16_HTML.jpg](A437923_1_En_4_Fig16_HTML.jpg)


    Figure 4-16.


    The NSApplicationDelegate protocol in the Documentation window


    The `AppDelegate` class inherits properties and methods from the NSObject class
    and also uses the method names defined by the `NSApplicationDelegate` protocol.
    Any class based on a protocol must write Swift code to make those protocol methods
    actually do something. In technical terms, this is known as “implementing or conforming
    to a protocol.”


    So the Cocoa framework actually consists of classes and protocols. Classes define
    objects and protocols define commonly used method names that different classes
    may need.


    When you write macOS programs, you’ll often use both Cocoa framework classes and
    protocols. When you use a Cocoa framework class, you can use methods that already
    work, such as the `uppercased()` method that knows how to capitalize text.


    When you use a Cocoa framework protocol, you’ll need to write Swift code to make
    that method actually work. When browsing through Xcode’s documentation, keep your
    eye out for this difference between classes and protocols.


    Let’s see an example of both classes and protocols in the Xcode documentation
    window :


    1.  Make sure your MyFirstProgram is loaded in Xcode.  

    2.  Click the `AppDelegate.swift` file in the Project Navigator. Xcode’s middle
    pane displays the contents of that `.swift` file.  

    3.  Move the cursor in `NSApplicationDelegate`.  

    4.  Choose Help ➤ Quick Help for Selected Item, or hold down the Option key and
    click `NSApplicationDelegate`. A Quick Help pop-up window appears, as shown in
    Figure [4-17](#A437923_1_En_4_Chapter.html#Fig17), explaining how `NSApplicationDelegate`
    is a protocol.


    ![A437923_1_En_4_Fig17_HTML.jpg](A437923_1_En_4_Fig17_HTML.jpg)


    Figure 4-17.


    The NSApplicationDelegate Quick Help pop-up window  

    5.  Click Protocol Reference at the bottom of this window. The `NSApplicationDelegate`
    protocol reference appears in the Documentation window (see Figure [4-16](#A437923_1_En_4_Chapter.html#Fig16)).


    Protocols add methods to a class without the need to create a new class, but you
    never need to use protocols. When you write programs in Xcode, you’ll use Cocoa
    framework classes and protocols. For the unique purposes of your program, you’ll
    likely create your own classes and protocols as well.


    When browsing through Xcode’s documentation, look for properties and methods in
    classes before writing your own code. If you don’t find the properties and methods
    you need in one class, look in the parent class.


    For example, in the MyFirstProgram project , you could have written Swift code
    to capitalize text typed into the text field. However, it was much easier to just
    use the existing `uppercased()` method instead. This saved you the time it would
    take to write code and debug it, when you could just use proven code in the Cocoa
    framework instead.


    The more you know about the Cocoa framework, the less work you’ll have to do when
    writing your own programs. Use Xcode’s documentation to help you better understand
    all the classes and protocols that make up the entire Cocoa framework.


    Since the Cocoa framework is so large, don’t bother trying to learn everything
    at once. Just learn what you need and ignore the rest. The more you use Xcode
    and write programs, the more likely you’ll need and learn the other parts of the
    Cocoa framework.


    The general idea is to rely on the Cocoa framework as much as possible and only
    write Swift code when you have to. This makes it easy to write reliable software
    quickly with less effort.'
  trans: '

    当用户点击 Change Case 按钮时，会运行 IBAction 方法`changeCase`。该 IBAction 方法中唯一的 Swift 命令会获取文本字段中的文本（存储在`messageText`的`stringValue`属性中），将其转换为大写，并将转换后的文本存储在标签中（由`labelText`的`stringValue`属性显示）。


    了解了 MyFirstProgram 的工作原理后，让我们从更理论化的角度来看 macOS 编程。首先，创建程序需要用到 Cocoa 框架定义的类文件。当你在用户界面上放置元素时，你使用的正是
    Cocoa 框架的类文件（例如`NSTextField`和`NSButton`）。


    当你在`AppDelegate.swift`文件中定义类时，你使用的也是 Cocoa 框架文件中的类（`NSObject`）。


    一个典型的 macOS 程序会从 Cocoa 框架的类文件以及你在 Swift 文件中可能定义的任何类文件创建对象。对象之间通过以下两种方式之一进行通信：


    -   从其他对象存储的属性中存储或检索数据

    -   调用其他对象中的方法


    要在对象的属性中存储数据，你需要在等号左侧指定对象名称及其属性，在等号右侧指定值，如下所示：


    ```

    labelText.stringValue = "Hello, world!"

    ```


    要从对象的属性中检索数据，你需要在等号左侧指定一个变量来保存数据，在等号右侧指定对象名称及其属性，如下所示：


    ```

    let warning = labelText.stringValue

    ```


    要调用另一个对象中的方法，你需要指定对象的名称和要使用的方法，如下所示：


    ```

    messageText.stringValue.uppercased()

    ```


    此命令告诉 Xcode 对`messageText`对象中存储的`stringValue`属性运行`uppercased()`方法。


    设置属性值、检索属性值和调用方法是对象之间相互通信的三种方式。


    当你创建一个类时，必须指定要使用的类文件，例如：


    ```

    class AppDelegate: NSObject

    ```


    这一行代码告诉 Xcode 定义一个名为`AppDelegate`的类，并将其基于名为`NSObject`的类文件（定义在 Cocoa 框架中）。


    当你基于现有类创建一个新类时，该类会自动包含该现有类定义的所有属性和方法。因此，在上面的定义了`AppDelegate`类的代码行中，任何从`AppDelegate`类创建的对象都会自动拥有`NSObject`类定义的所有属性和方法。


    有时一个类文件可能没有你需要的所有方法。为了解决这个问题，你可以继承一个现有的类，然后在你的类中定义一个新方法。然而，如果你创建了一个希望其他类也能使用的方法名，第二种替代方案是定义一个所谓的协议。


    协议不过是一系列相关方法名的列表，但并不包含任何让这些方法实际执行操作的 Swift 代码。在下面的代码中，`AppDelegate`类不仅基于`NSObject`类文件，而且还使用了由`NSApplicationDelegate`协议定义的方法。


    如果你打开文档窗口并搜索`NSApplicationDelegate`协议，你会看到`NSApplicationDelegate`协议定义的一系列方法名，例如`applicationDidFinishLaunching`或`applicationWillTerminate`，如图
    4-16 所示。


    ![A437923_1_En_4_Fig16_HTML.jpg](img/A437923_1_En_4_Fig16_HTML.jpg)


    图 4-16. 文档窗口中的 NSApplicationDelegate 协议


    `AppDelegate`类继承了`NSObject`类的属性和方法，同时也使用了由`NSApplicationDelegate`协议定义的方法名。任何基于某个协议的类都必须编写
    Swift 代码，使这些协议方法实际完成某些操作。用技术术语来说，这被称为“实现或遵循协议”。


    因此，Cocoa 框架实际上由类和协议组成。类定义对象，而协议定义不同类可能需要的通用方法名。


    当你编写 macOS 程序时，经常需要同时使用 Cocoa 框架的类和协议。当你使用 Cocoa 框架的类时，你可以直接使用那些已有的功能方法，例如能够将文本转换为大写的`uppercased()`方法。


    当你使用 Cocoa 框架的协议时，你需要编写 Swift 代码来让该方法实际工作。在浏览 Xcode 文档时，请留意类和协议之间的这种区别。


    让我们在 Xcode 文档窗口中看一个同时涉及类和协议的示例：


    1.  确保你的 MyFirstProgram 项目已加载到 Xcode 中。

    2.  点击项目导航器中的`AppDelegate.swift`文件。Xcode 的中间窗格会显示该`.swift`文件的内容。

    3.  将光标移至`NSApplicationDelegate`上。

    4.  选择“帮助” ➤ “快速帮助”，或按住 Option 键并点击`NSApplicationDelegate`。一个快速帮助弹窗会出现，如图 4-17
    所示，解释`NSApplicationDelegate`是一个协议。


    ![A437923_1_En_4_Fig17_HTML.jpg](img/A437923_1_En_4_Fig17_HTML.jpg)


    图 4-17. NSApplicationDelegate 快速帮助弹窗


    5.  点击此窗口底部的“Protocol Reference”（协议参考）。`NSApplicationDelegate`协议参考页面会出现在文档窗口中（参见图
    4-16）。


    协议可以在不创建新类的情况下为现有类添加方法，但你并不一定非要使用协议。在 Xcode 中编写程序时，你会用到 Cocoa 框架的类和协议。出于程序的特定目的，你也可能创建自己的类和协议。


    在浏览 Xcode 文档时，在编写自己的代码之前，先在类中查找属性和方法。如果在一个类中找不到所需的方法和属性，可以去查找其父类。


    例如，在 MyFirstProgram 项目中，你本可以编写 Swift 代码来将文本字段中输入的文字转换为大写。然而，直接使用现有的`uppercased()`方法要简单得多。这节省了你编写代码和调试代码所需的时间，而你本可以直接使用
    Cocoa 框架中经过验证的代码。


    你对 Cocoa 框架了解得越多，编写自己程序时需要做的工作就越少。利用 Xcode 的文档来帮助你更好地理解构成整个 Cocoa 框架的所有类和协议。


    由于 Cocoa 框架非常庞大，不必试图一次性学习所有内容。只学习你需要的部分，忽略其余部分。你使用 Xcode 和编写程序越多，你就越有可能需要并学习 Cocoa
    框架的其他部分。


    总体思路是尽可能依赖 Cocoa 框架，仅在必要时编写 Swift 代码。这样可以更轻松、省力地快速编写出可靠的软件。

    '
- fmt: '# Summary


    Learning Xcode can be daunting, so learn it slowly by relying on Xcode’s documentation.
    If you need help in a hurry, use Quick Help to find information about the Cocoa
    framework classes. If you need help on a particular topic, search the documentation.


    For those times when you’re just curious, browse through Xcode’s documentation
    so you can explore the vast amount of features available. Through random browsing,
    you can often learn interesting information about Xcode or writing programs for
    macOS.


    As you can see, learning to write programs involves learning about Xcode, learning
    about the Cocoa framework, and learning the Swift programming language. Just take
    it easy, learn only what you need to know, and gradually keep expanding your knowledge.
    Through steady progress, you’ll learn more and more until one day you’ll realize
    how much you actually know.


    Learning to write macOS programs with Xcode won’t happen overnight, but you’ll
    be surprised how much you can learn through steady progress over time. Just practice
    writing programs and rely on Xcode’s documentation available from the Help menu.
    Before you know it, you’ll be capable of writing small programs with confidence
    and then larger and more complicated programs.


    # 5. Learning Swift with Playgrounds


    To write any program, you need to choose a programming language. A programming
    language lets you define commands for the computer to follow. There’s no one “best”
    programming language because every programming language is meant to solve a specific
    problem. This means that a certain programming language may be great at solving
    certain types of problems, but horrible at solving other types of programs.


    With most programming languages, there’s a tradeoff between ease of use and efficiency.
    For example, the BASIC programming language is meant to be easy to learn and use,
    while the C programming language is meant to give you complete control over the
    computer. By maximizing computer efficiency, the C language is great for creating
    complicated programs like operating systems or hard disk utility programs.


    Since BASIC was never designed for maximum control over a computer, BASIC would
    never be used to create an operating system or a hard disk utility program. Since
    C was designed for maximum computer efficiency, it’s difficult for novices to
    learn and even difficult for experienced programmers to use. The majority of errors
    or bugs in many programs are due solely to the complexity of the C programming
    language, which confounds even professional programmers with decades of experience.


    Apple’s official programming language used to be Objective-C, which was a superset
    of the C programming language and an alternative to the object-oriented C++ language.
    Unfortunately, Objective-C can be difficult to learn and even harder to master.
    By making programming harder than it needs to be, Objective-C makes creating macOS
    and iOS software difficult for novices and experienced programmers alike.


    That’s why in 2014, Apple introduced a new programming language called Swift.
    Swift is meant to be just as powerful as Objective-C while also being much easier
    to learn. Because Apple will use Swift for macOS, iOS, tvOS, and watchOS programming,
    Swift is now the future programming language for the Macintosh, iPhone, iPad,
    Apple Watch, Apple TV, CarPlay, and any other future products from Apple.


    Since so many people have written programs using Objective-C, there will always
    be a need for programmers to modify existing Objective-C programs. However, you
    can always mix Objective-C and Swift in a program. This means over time, there
    will be less of a need for Objective-C programmers and more of a need for Swift
    programmers. If you want to learn the most powerful programming language for writing
    macOS and iOS programs, you want to learn Swift.


    Note


    If you’re already familiar with Objective-C, you’ll notice several ways that Swift
    makes coding far easier. First, Swift doesn’t require a semicolon to end each
    line. Second, Swift doesn’t need asterisks to represent pointers or square brackets
    to represent method calls to objects. Third, Swift stores everything in a single
    `.swift` file in comparison to Objective-C, which needs to create an `.h` header
    file and an `.m` implementation file. If you know nothing about Objective-C, just
    look at any program written in Objective-C and see how confusing the code can
    be. One look at Objective-C code will make you realize how much easier learning
    and using Swift can be.'
  raw: '## Summary


    Learning Xcode can be daunting, so learn it slowly by relying on Xcode’s documentation.
    If you need help in a hurry, use Quick Help to find information about the Cocoa
    framework classes. If you need help on a particular topic, search the documentation.


    For those times when you’re just curious, browse through Xcode’s documentation
    so you can explore the vast amount of features available. Through random browsing,
    you can often learn interesting information about Xcode or writing programs for
    macOS.


    As you can see, learning to write programs involves learning about Xcode, learning
    about the Cocoa framework, and learning the Swift programming language. Just take
    it easy, learn only what you need to know, and gradually keep expanding your knowledge.
    Through steady progress, you’ll learn more and more until one day you’ll realize
    how much you actually know.


    Learning to write macOS programs with Xcode won’t happen overnight, but you’ll
    be surprised how much you can learn through steady progress over time. Just practice
    writing programs and rely on Xcode’s documentation available from the Help menu.
    Before you know it, you’ll be capable of writing small programs with confidence
    and then larger and more complicated programs.


    # 5. Learning Swift with Playgrounds


    To write any program, you need to choose a programming language. A programming
    language lets you define commands for the computer to follow. There’s no one “best”
    programming language because every programming language is meant to solve a specific
    problem. This means that a certain programming language may be great at solving
    certain types of problems, but horrible at solving other types of programs.


    With most programming languages, there’s a tradeoff between ease of use and efficiency.
    For example, the BASIC programming language is meant to be easy to learn and use,
    while the C programming language is meant to give you complete control over the
    computer. By maximizing computer efficiency, the C language is great for creating
    complicated programs like operating systems or hard disk utility programs.


    Since BASIC was never designed for maximum control over a computer, BASIC would
    never be used to create an operating system or a hard disk utility program. Since
    C was designed for maximum computer efficiency, it’s difficult for novices to
    learn and even difficult for experienced programmers to use. The majority of errors
    or bugs in many programs are due solely to the complexity of the C programming
    language, which confounds even professional programmers with decades of experience.


    Apple’s official programming language used to be Objective-C, which was a superset
    of the C programming language and an alternative to the object-oriented C++ language
    . Unfortunately, Objective-C can be difficult to learn and even harder to master.
    By making programming harder than it needs to be, Objective-C makes creating macOS
    and iOS software difficult for novices and experienced programmers alike.


    That’s why in 2014, Apple introduced a new programming language called Swift.
    Swift is meant to be just as powerful as Objective-C while also being much easier
    to learn. Because Apple will use Swift for macOS, iOS, tvOS, and watchOS programming
    , Swift is now the future programming language for the Macintosh, iPhone, iPad,
    Apple Watch, Apple TV, CarPlay, and any other future products from Apple.


    Since so many people have written programs using Objective-C , there will always
    be a need for programmers to modify existing Objective-C programs. However, you
    can always mix Objective-C and Swift in a program. This means over time, there
    will be less of a need for Objective-C programmers and more of a need for Swift
    programmers. If you want to learn the most powerful programming language for writing
    macOS and iOS programs, you want to learn Swift.


    Note


    If you’re already familiar with Objective-C , you’ll notice several ways that
    Swift makes coding far easier. First, Swift doesn’t require a semicolon to end
    each line. Second, Swift doesn’t need asterisks to represent pointers or square
    brackets to represent method calls to objects. Third, Swift stores everything
    in a single `.swift` file in comparison to Objective-C, which needs to create
    an `.h` header file and an `.m` implementation file. If you know nothing about
    Objective-C, just look at any program written in Objective-C and see how confusing
    the code can be. One look at Objective-C code will make you realize how much easier
    learning and using Swift can be.'
  trans: '

    # 摘要


    学习 Xcode 可能令人望而生畏，因此请循序渐进，依靠 Xcode 的文档来学习。如果你急需帮助，可以使用“快速帮助”查找关于 Cocoa 框架类的信息。如果你需要某个特定主题的帮助，可以搜索文档。


    当你只是出于好奇时，可以浏览 Xcode 的文档，探索其海量的可用功能。通过随机浏览，你常常能学到关于 Xcode 或为 macOS 编写程序的有趣知识。


    如你所见，学习编写程序涉及学习 Xcode、Cocoa 框架以及 Swift 编程语言。慢慢来，只学你需要知道的内容，并逐步扩展你的知识。通过稳步前进，你会学到越来越多，直到有一天你会发现自己实际上已经掌握了这么多知识。


    用 Xcode 学习编写 macOS 程序不会一蹴而就，但你会惊讶于通过持续稳步的进步能学到多少东西。只需练习编写程序，并依靠“帮助”菜单中提供的 Xcode
    文档。不知不觉中，你就能自信地编写小程序，然后逐步挑战更大、更复杂的程序。


    # 5. 使用 Playgrounds 学习 Swift


    要编写任何程序，你都需要选择一种编程语言。编程语言让你能够定义计算机要执行的命令。没有所谓“最好”的编程语言，因为每种编程语言都是为了解决特定问题而设计的。这意味着某种编程语言可能非常擅长解决某些类型的问题，但在解决其他类型的问题时却表现糟糕。


    对于大多数编程语言而言，易用性和效率之间需要做出权衡。例如，BASIC 编程语言旨在易于学习和使用，而 C 编程语言则旨在让你完全控制计算机。通过最大化计算机效率，C
    语言非常适合创建像操作系统或硬盘实用程序这样的复杂程序。


    由于 BASIC 从未被设计为能够最大程度地控制计算机，因此它永远不会被用来创建操作系统或硬盘实用程序。而 C 语言被设计为追求最大的计算机效率，因此对于新手来说难以学习，甚至对于经验丰富的程序员来说也难以使用。许多程序中的大多数错误或漏洞，完全归咎于
    C 编程语言的复杂性，这甚至会让拥有数十年经验的专业程序员感到困惑。


    苹果公司官方编程语言曾经是 Objective-C，它是 C 编程语言的超集，也是面向对象语言 C++ 的替代方案。遗憾的是，Objective-C 难以学习，更难以掌握。Objective-C
    让编程变得比实际需要更困难，使得新手和经验丰富的程序员都难以创建 macOS 和 iOS 软件。


    这就是为什么在 2014 年，苹果推出了一门名为 Swift 的新编程语言。Swift 旨在与 Objective-C 同样强大，同时又更易于学习。由于苹果将在
    macOS、iOS、tvOS 和 watchOS 编程中使用 Swift，Swift 现在已成为 Macintosh、iPhone、iPad、Apple Watch、Apple
    TV、CarPlay 以及苹果未来任何其他产品的编程语言。


    由于太多人使用 Objective-C 编写程序，因此始终需要程序员来修改现有的 Objective-C 程序。但是，你可以在一个程序中混合使用 Objective-C
    和 Swift。这意味着随着时间的推移，对 Objective-C 程序员的需求会减少，而对 Swift 程序员的需求会增加。如果你想学习编写 macOS
    和 iOS 程序最强大的编程语言，那么你就要学习 Swift。


    注意


    如果你已经熟悉 Objective-C，你会注意到 Swift 在多个方面让编码变得更容易得多。首先，Swift 不需要每行结尾加分号。其次，Swift 不需要用星号表示指针，也不需要方括号来表示对对象的方法调用。第三，Swift
    将所有内容存储在一个单独的 `.swift` 文件中，而 Objective-C 则需要创建一个 `.h` 头文件和一个 `.m` 实现文件。如果你对 Objective-C
    一无所知，只需看看任何用 Objective-C 编写的程序，就能看到代码是多么令人困惑。一看到 Objective-C 代码，你就会意识到学习和使用 Swift
    要容易得多。

    '
- fmt: "# Using Playgrounds\n\nIn the old days, programmers had two types of tools\
    \ to help them learn programming. The first is called an interpreter. An interpreter\
    \ lets you type in a command and then immediately shows you the results. This\
    \ way you can see exactly what you are doing right or wrong.\n\nThe drawback with\
    \ interpreters is that they are slow and you can’t use them to create programs\
    \ you can sell. To run a program in an interpreter, you need both the interpreter\
    \ and the file (called the source code) that contains all your commands written\
    \ in a particular programming language. Because you have to give away your source\
    \ code to run programs in an interpreter, others can easily copy your program\
    \ and steal it. As a result, interpreters aren’t practical for selling software\
    \ but are great for learning a programming language.\n\nThe second tool programmers\
    \ use to learn programming is called a compiler. A compiler takes a list of commands,\
    \ stored in a file, and converts them to machine language so the computer can\
    \ understand them. The advantage of a compiler is that it keeps others from seeing\
    \ the source code of your program.\n\nThe problem with using a compiler is that\
    \ you have to write a complete program and compile it just to see if your commands\
    \ work or not. If your commands don’t work, now you have to go back and fix the\
    \ problem. Unlike the interactive nature of an interpreter, a compiler makes learning\
    \ a programming language much slower and clumsier.\n\nWith an interpreter you\
    \ can write a command and immediately see if it works or not. With a compiler,\
    \ you have to write a command, compile your program, and run your program to see\
    \ if it works or not.\n\nInterpreters are better for learning, and compilers are\
    \ better for creating software you can distribute to others without giving away\
    \ your source code. Fortunately, `Xcode` gives you the best of both worlds.\n\n\
    When you run your program, you’re using `Xcode`’s compiler. However, if you only\
    \ want to experiment with some commands, you can use `Xcode`’s interpreter, called\
    \ a playground.\n\nPlaygrounds let you experiment with `Swift` code to see if\
    \ it works or not. When you get it to work, then you can copy and paste the code\
    \ into your project files and compile them to create a working program. By giving\
    \ you the ability to use both an interpreter and a compiler, `Xcode` makes it\
    \ easy to learn `Swift` and practical for creating programs you can sell or give\
    \ away to others.\n\nTo create a playground, follow these steps:\n\n1. Start `Xcode`.\n\
    2. Choose `File ➤ New ➤ Playground`. (If you see the `Xcode` welcome screen, you\
    \ can also click on `Get started with a playground`.) `Xcode` asks for a playground\
    \ name and platform, as shown in Figure 5-1.\n\n![A437923_1_En_5_Fig1_HTML.jpg](A437923_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1. Creating a playground file\n\n3. Click in the `Name` text field\
    \ and type `IntroductoryPlayground`.\n4. Click in the `Platform` pop-up menu and\
    \ choose `macOS`. `Xcode` asks where you want to save your playground file.\n\
    5. Click a folder where you want to save your playground file and click the `Create`\
    \ button. `Xcode` displays the playground file, as shown in Figure 5-2.\n\n![A437923_1_En_5_Fig2_HTML.jpg](A437923_1_En_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2. The playground window\n\n6. Edit the second line as follows:\n\n\
    ```\n    var str = \"This is the Swift interpreter\"\n```\n\nNotice that the playground\
    \ window immediately displays the results of your code change in the right margin,\
    \ as shown in Figure 5-3.\n\n![A437923_1_En_5_Fig3_HTML.jpg](A437923_1_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3. The playground window displays code changes immediately\n\nPlaygrounds\
    \ let you freely experiment with `Swift` and access every class in the `Cocoa`\
    \ framework without worrying about getting your `Swift` code to work with a user\
    \ interface.\n\nWhen you type `Swift` code, `Xcode` may display certain text in\
    \ different colors. Notice that the top line in your playground displays text\
    \ in green. In `Swift`, this is known as a comment, which means any text that\
    \ begins with the `//` symbols are ignored by `Xcode` and exist solely for people\
    \ to read. Any time you type `//` in front of any line of code, `Xcode` will turn\
    \ the text green and ignore it.\n\n> **Tip**: Rather than delete a line of code,\
    \ just type the `//` symbols in front of that line. This will turn the code into\
    \ a comment that `Xcode` will ignore. Just delete the `//` symbols in front of\
    \ the line when you want `Xcode` to run that code again.\n\nIf you want to turn\
    \ multiple lines of code into a comment, you can type the `//` symbols in front\
    \ of each line, but that’s time-consuming and tedious. A far simpler solution\
    \ is to type `/*` at the beginning of the code you want to turn into a comment\
    \ and then type `*/` at the end of the code you want to turn into a comment."
