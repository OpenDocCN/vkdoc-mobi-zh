  trans: "\n### 使用属性观察器\n\nSwift 提供了两个名为 `willSet` 和 `didSet` 的属性观察器。`willSet` 属性观察器在属性接收新值之前运行代码。`didSet`\
    \ 属性观察器在属性接收新值之后运行代码。\n\n与 getter 和 setter 类似，属性观察器本质上是在属性获得新值时运行的函数。`willSet`\
    \ 和 `didSet` 属性观察器的基本结构与 getter 和 setter 的结构相同：\n\n```\nvar property : dataType\
    \ = initialValue {\nwillSet {\n}\ndidSet {\n}\n}\n```\n\n`willSet` 属性观察器在属性获得新值之前运行代码。`didSet`\
    \ 属性观察器在属性获得新值之后运行代码。要了解属性观察器的工作原理，请按照以下步骤操作：\n\n1.  确保你的 `IntroductoryPlayground`\
    \ 文件已加载到 Xcode 中。  \n2.  按如下方式编辑代码：\n\n    ```\n    import Cocoa\n    class Animal\
    \ {\n    var IQ : Int = 0\n    var legs : Int = 0 {\n    willSet {\n    IQ +=\
    \ 10\n    }\n    didSet {\n    IQ -= 3\n    }\n    }\n    }\n    var pet = Animal()\n\
    \    print (pet.IQ)\n    pet.legs = 4\n    print (pet.IQ)\n    ```\n\n在这个例子中，`IQ`\
    \ 属性的初始值为 0。请注意，当你将 `legs` 属性设置为 4 时，它会立即运行 `willSet` 属性观察器中的代码，该代码将 `IQ` 属性增加\
    \ 10。然后它会立即运行 `didSet` 属性观察器中的代码，该代码减去 3，如图 13-4 所示。\n\n![A437923_1_En_13_Fig4_HTML.jpg](img/A437923_1_En_13_Fig4_HTML.jpg)\n\
    \n图 13-4。\n\n使用属性观察器\n\n## 创建方法\n\n一个仅仅存储一个或多个属性的类可以方便地将相关数据分组在一起。然而，使面向对象编程更有用的是，对象也可以操作自己的数据。要为对象创建要运行的小程序，你需要在类内部定义函数（称为方法）。\n\
    \n当你从用户界面连接按钮以在 Swift 代码文件中创建 IBAction 方法时，你已经见过方法了。类内部最简单的方法执行完全相同的功能：\n\n```\n\
    class CountDown {\nvar counter = 10\nfunc decrement() {\ncounter = counter - 1\n\
    }\n}\n```\n\n这个 `decrement` 方法简单地从 `counter` 属性中减去 1，该属性的初始值为 10。要使此方法运行，你必须指定对象名称、一个点和方法名称，如下所示：\n\
    \n```\nvar myObject = CountDown ()\nmyObject.decrement()\n```\n\n这个 `decrement`\
    \ 方法每次做的事情完全相同，即从 `counter` 属性中减去 1。一个更有趣且灵活的方法会接受数据（一个或多个参数）来修改方法中代码的工作方式，例如：\n\
    \n```\nclass CountDown {\nvar counter = 10\nfunc decrement() {\ncounter = counter\
    \ - 1\n}\nfunc decrementByValue (step : Int) {\ncounter -= step\n}\n}\n```\n\n\
    第二个方法 `decrementByValue` 接受一个整数，该整数存储在一个名为 `step` 的变量中。然后它从 `counter` 属性中减去 `step`\
    \ 的值，如图 13-5 所示。\n\n![A437923_1_En_13_Fig5_HTML.jpg](img/A437923_1_En_13_Fig5_HTML.jpg)\n\
    \n图 13-5。\n\n运行一个接受值的方法\n\n当一个方法接受数据时，它也可以返回一个特定的值。要创建这样的方法，你需要标识该方法返回的数据类型（使用\
    \ `➤` 符号）以及定义要返回的具体值的 `return` 关键字。\n\n因此，如果你想创建一个返回 `Float` 数据类型的方法，你可以定义一个如下所示的方法：\n\
    \n```\nclass MathBrain {\nvar tempValue: Float = 0\nfunc average (first : Float,\
    \ second : Float) -> Float {\nreturn (first + second) / 2\n}\n}\n```\n\n此方法接受两个\
    \ `Float` 数字（存储在名为 `first` 和 `second` 的变量中）并返回一个 `Float` 值。要调用此方法，你需要指定一个对象名称、一个点、方法名称以及两个\
    \ `Float` 数据类型的数字。\n\n请注意，此方法有两个名为 `first` 和 `second` 的参数。传递参数时，你必须指定参数名称（`first`\
    \ 和 `second`），例如：\n\n```\nvar math = MathBrain()\nvar temp : Float = math.average(first:\
    \ 4.0, second: 9.0)\nprint (temp)\n```\n\n要了解如何创建一个集合，并向其中添加和删除数据，请按照以下步骤创建一个新的\
    \ playground：\n\n1.  确保你的 `IntroductoryPlayground` 文件已加载到 Xcode 中。  \n2.  按如下方式编辑代码：\n\
    \n    ```\n    import Cocoa\n    class MathBrain {\n    var tempValue: Float =\
    \ 0\n    func average (first : Float, second : Float) -> Float {\n    return (first\
    \ + second) / 2\n    }\n    }\n    var math = MathBrain()\n    var temp : Float\
    \ = math.average(first: 4.0, second: 9.0)\n    print (temp)\n    ```\n\n`average`\
    \ 方法接受两个参数，将它们相加，然后除以 2。然后它使用 `return` 关键字返回此值。\n\n当给 `average` 方法传递数字 4.0 和 9.0\
    \ 时，它返回 6.5 的值，该值存储在一个名为 `temp` 的变量中，如图 13-6 所示。\n\n![A437923_1_En_13_Fig6_HTML.jpg](img/A437923_1_En_13_Fig6_HTML.jpg)\n\
    \n图 13-6。\n\n向对象中的方法传递参数\n"
- fmt: '# Using Objects in a macOS Program


    Objects can contain any number of properties, and those properties can hold simple
    data types like integers or strings, or more complicated data types like tuples,
    sets, or arrays. An object can also contain one or more methods that typically
    manipulate the object’s properties.


    In this sample program, you’ll define one class and create two objects based on
    that class. You’ll also see how to store a class in a separate file. Rather than
    cram everything into a single file, it’s easier to store code in separate files.


    The two objects will run methods stored in the other object. The user interface
    will also retrieve values from both object’s properties to display in the text
    field of the user interface.


    To learn more about user interfaces, you’ll also see how to connect two buttons
    to a single `IBAction` method and determine which button the user clicked. As
    usual, you’ll see how to display data in a user interface item through an `IBOutlet`.
    To create the sample program, follow these steps:


    1.  From within Xcode choose File ➤ New ➤ Project.

    2.  Click Application under the macOS category.

    3.  Click Cocoa Application and click the Next button. Xcode now asks for a product
    name.

    4.  Click in the Product Name text field and type ObjectProgram.

    5.  Make sure the Language pop-up menu displays Swift and that no check boxes
    are selected.

    6.  Click the Next button. Xcode asks where you want to store the project.

    7.  Choose a folder to store your project and click the Create button.

    8.  Click the `MainMenu.xib` file in the Project Navigator.

    9.  Click the ObjectProgram icon to make the window of the user interface appear.

    10.  Choose View ➤ Utilities ➤ Show Object Library to make the Object Library
    appear in the bottom right corner of the Xcode window.

    11.  Drag two push buttons, two labels, and two text fields onto the user interface
    and double-click the push buttons and labels to change the text that appears on
    them so that it looks similar to Figure [13-7](#A437923_1_En_13_Chapter.html#Fig7).


    ![A437923_1_En_13_Fig7_HTML.jpg](A437923_1_En_13_Fig7_HTML.jpg)


    Figure 13-7. The user interface of the ObjectProgram


    This user interface will display the number of hit points for two characters:
    a sheriff and an outlaw. Each time you click either the Sheriff Shoot or the Outlaw
    Shoot button, an `IBAction` method will randomly determine if the other character
    was hit or not. If so, it will also determine how much damage the shot caused,
    ranging from 1 to 3. Any changes will appear in the text field under the Sheriff
    or Outlaw label.


    The Sheriff Shoot and Outlaw Shoot buttons runs an `IBAction` method that first
    determines which button the user clicked, the Sheriff Shoot or the Outlaw Shoot
    button. To identify which button the user clicked, you need to modify a `Tag`
    property on each button so the Sheriff Shoot button has a `Tag` value of 0 and
    the Outlaw Shoot button has a `Tag` value of 1.


    After determining whether the sheriff or the outlaw is shooting, the `IBAction`
    method runs the `shoot` method that randomly determines if the shot hit and the
    damage it caused, which gets subtracted from the `hitPoints` property of each
    object.


    The total number of hit points appears in the text field under the Sheriff and
    Outlaw label. The moment the total number of hit points for either the sheriff
    or outlaw drops to 0 or less, an alert dialog appears to let you know whether
    the sheriff or the outlaw died. To connect your user interface to your Swift code,
    follow these steps:


    1.  With your user interface still visible in the Xcode window, choose View ➤
    Assistant Editor ➤ Show Assistant Editor. The `AppDelegate.swift` file appears
    next to the user interface.

    2.  Move the mouse over the Sheriff Shoot button, hold down the Control key, and
    drag just above the last curly bracket at the bottom of the `AppDelegate.swift`
    file.

    3.  Release the mouse and the Control key. A pop-up window appears.

    4.  Click in the Connection pop-up menu and choose Action.

    5.  Click in the Name text field and type shootButton.

    6.  Click in the Type pop-up menu and choose NSButton. Then click the Connect
    button.

    7.  Move the mouse over the Outlaw Shoot button, hold down the Control key, and
    drag over the existing `IBAction` `shootButton` method you just created until
    the entire method appears highlighted, as shown in Figure [13-8](#A437923_1_En_13_Chapter.html#Fig8).


    ![A437923_1_En_13_Fig8_HTML.jpg](A437923_1_En_13_Fig8_HTML.jpg)


    Figure 13-8. Connecting the Outlaw Shoot button to an existing `IBAction` method


    8.  Release the mouse and the Control key to connect the Outlaw Shoot button to
    the existing `IBAction` `shootButton` method.

    9.  Move the mouse over the Sheriff text field, hold down the Control key, and
    drag below the `@IBOutlet` line in the `AppDelegate.swift` file.

    10.  Release the mouse and the Control key. A pop-up window appears.

    11.  Click in the Name text field and type sheriffHitPoints and click the Connect
    button.

    12.  Move the mouse over the Outlaw text field that appears to the right of the
    Add button, hold down the Control key, and drag below the `@IBOutlet` line in
    the `AppDelegate.swift` file.

    13.  Release the mouse and the Control key. A pop-up window appears.

    14.  Click in the Name text field and type outlawHitPoints and click the Connect
    button. You should now have the following `IBOutlet`s that represent all the text
    fields on your user interface:


    ```

    @IBOutlet weak var window: NSWindow!

    @IBOutlet weak var sheriffHitPoints: NSTextField!

    @IBOutlet weak var outlawHitPoints: NSTextField!

    ```


    At this point, you’ve connected the user interface to your Swift code so you can
    use the `IBOutlet`s to display data on the user interface. You’ve also created
    a single `IBAction` method to run when the user clicks either of the two push
    buttons. Now you need to change the `Tag` property of the Outlaw Shoot button.


    1.  Click on the Outlaw Shoot button to select it.

    2.  Choose View ➤ Utilities ➤ Show Attributes Inspector. The Attributes Inspector
    pane appears in the upper right corner of the Xcode window.

    3.  Scroll down to the View category and change the `Tag` property to 1, as shown
    in Figure [13-9](#A437923_1_En_13_Chapter.html#Fig9).


    ![A437923_1_En_13_Fig9_HTML.jpg](A437923_1_En_13_Fig9_HTML.jpg)


    Figure 13-9. The `Tag` property at the bottom of the Attributes Inspector pane


    Now that you’ve defined the user interface, the next step is to create a separate
    Swift file to hold your class, which you can do by following these steps:


    1.  Choose File ➤ New ➤ File. A dialog appears asking for a template to use.

    2.  Click Source under the macOS category and then click the Swift File, as shown
    in Figure [13-10](#A437923_1_En_13_Chapter.html#Fig10).


    ![A437923_1_En_13_Fig10_HTML.jpg](A437923_1_En_13_Fig10_HTML.jpg)


    Figure 13-10. Selecting a file to hold the class definition code


    3.  Click the Next button. Xcode asks where you want to store this file and what
    name you want to give it.

    4.  Click in the Save As text field and type personClass. Then click the Create
    button. Xcode displays the `personClass.swift` file in the Project Navigator pane.

    5.  Click the `personClass.swift` file in the Project Navigator pane. Xcode displays
    the file’s contents.

    6.  Edit the `personClass.swift` file as follows:'
