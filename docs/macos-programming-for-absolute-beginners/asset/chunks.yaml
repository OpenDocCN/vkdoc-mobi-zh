- fmt: "# Creating a Project\n\nThe first step to creating a program is to create\
    \ a new project. When you create a project, Xcode gives you the option of choosing\
    \ different templates, which provide basic functions. All you have to do is customize\
    \ the template. The three categories of macOS templates are shown in Figure [3-1](#A437923_1_En_3_Chapter.html#Fig1):\n\
    \n![A437923_1_En_3_Fig1_HTML.jpg](A437923_1_En_3_Fig1_HTML.jpg)\n\n*Figure 3-1.\
    \ The three categories of macOS templates for creating a project*\n\n- Application\n\
    - Framework & Library\n- Other\n\nMost of the time you’ll choose a template in\
    \ the Application category. The most common template is Cocoa Application, which\
    \ creates a standard macOS program with pull-down menus and a window.\n\nThe other\
    \ two Application templates are Game (for creating video games) and Command Line\
    \ Tool (for creating programs that don’t need a traditional graphical user interface).\n\
    \nThe Framework & Library category is meant to create reusable software libraries.\
    \ The Other category is meant for creating programs that don’t fit into the other\
    \ categories such as creating plug-ins or drivers.\n\nIn this book, you’ll always\
    \ use the Cocoa Application under the macOS Application category. The other macOS\
    \ categories are designed for advanced programmers and won’t be covered in this\
    \ book.\n\nWhen you create a Cocoa Application project, you need to define several\
    \ items, as shown in Figure [3-2](#A437923_1_En_3_Chapter.html#Fig2):\n\n![A437923_1_En_3_Fig2_HTML.jpg](A437923_1_En_3_Fig2_HTML.jpg)\n\
    \n*Figure 3-2. Defining a Cocoa Application project*\n\n- The name of your product\n\
    - The programming language to use (`Objective-C` or `Swift`)\n- Whether to use\
    \ storyboards or not for your user interface\n- Whether to create a document-based\
    \ application\n- Whether to use Core Data\n\nYour product’s name is completely\
    \ arbitrary but should be descriptive since Xcode will store all your files in\
    \ a folder using your chosen name.\n\nYour organization name and identifier are\
    \ also arbitrary and are typically assigned from your Apple Developer account.\
    \ Both of them can also be arbitrary strings if you want, but if you plan on distributing\
    \ your programs through the Mac App Store, they should be linked to your Apple\
    \ Developer account.\n\nThe Language pop-up menu lets you choose `Objective-C`\
    \ or `Swift`. For the purposes of this book, you’ll always choose `Swift`. `Objective-C`\
    \ is a more complicated programming language that Apple still supports, but it’s\
    \ no longer considered Apple’s official programming language.\n\nThe Use Storyboards\
    \ check box lets you create a user interface that either consists of a single\
    \ window (a `.xib` file if the “Use Storyboards” check box is clear) or a series\
    \ of windows linked together (a `.storyboard` file if the “Use Storyboards” check\
    \ box is selected). I’ll go over both methods for creating a user interface later\
    \ in this book.\n\nThe Create Document-Based Application option means that Xcode\
    \ creates a Cocoa Application that can open and manage multiple windows, such\
    \ as the multiple windows available in a word processor. Managing multiple windows\
    \ is more complicated so leave the Create Document-Based Application check box\
    \ empty unless you need to create a program that can open and display multiple\
    \ documents in windows. For the purposes of this book, leave this check box blank.\n\
    \nThe Use Core Data check box lets you store data typically for database applications\
    \ such as lists of names and addresses. Leave this check box blank in most cases\
    \ unless your program needs to store data. For the purposes of this book, leave\
    \ this check box blank.\n\nThe Include Unit Tests and Include UI Tests check boxes\
    \ let you run tests on your Swift code and user interface design to make sure\
    \ it works properly. For the purposes of this book, leave the Include Unit Tests\
    \ and Include UI Tests check boxes blank.\n\nReady to create your first macOS\
    \ program? Then follow these steps:\n\n1. Start Xcode. If a Welcome to Xcode screen\
    \ appears (as shown in Figure [3-3](#A437923_1_En_3_Chapter.html#Fig3)), click\
    \ Create a new Xcode project. If this welcome screen does not appear, choose File\
    \ ➤ New ➤ Project or choose Window ➤ Welcome to Xcode to display this screen so\
    \ you can choose Create a new Xcode project. Xcode displays a list of project\
    \ templates (see Figure [3-1](#A437923_1_En_3_Chapter.html#Fig1)).\n\n   ![A437923_1_En_3_Fig3_HTML.jpg](A437923_1_En_3_Fig3_HTML.jpg)\n\
    \n   *Figure 3-3. The Welcome to Xcode opening screen*\n\n2. Click Application\
    \ under the macOS category. A list of different macOS application templates appears.\n\
    \n3. Click Cocoa Application and then click the Next button. Xcode now asks for\
    \ your project name (see Figure [3-2](#A437923_1_En_3_Chapter.html#Fig2)).\n\n\
    4. Click in the Product Name text field and type `MyFirstProgram`.\n\n5. Click\
    \ in the Language pop-up menu and make sure `Swift` appears.\n\n6. Make sure all\
    \ check boxes are empty and then click the Next button. Xcode now asks where you\
    \ want to store your project.\n\n7. Click a folder where you want to store your\
    \ Xcode project and click the Create button. Congratulations! You’ve just created\
    \ your first macOS program. At this point, Xcode just created a generic Macintosh\
    \ program but you haven’t had to write a single line of `Swift` code or even design\
    \ the user interface to create an actual working program.\n\n8. Choose Product\
    \ ➤ Run, press `Command + R`, or click the Run icon. Xcode runs your program called\
    \ `MyFirstProgram`, as shown in Figure [3-4](#A437923_1_En_3_Chapter.html#Fig4).\
    \ Notice that `MyFirstProgram` displays a menu bar with pull-down menus and a\
    \ window that you can move or resize on the screen. Because you used the Cocoa\
    \ Application template, Xcode automatically created all the code necessary to\
    \ create a generic Macintosh program.\n\n   ![A437923_1_En_3_Fig4_HTML.jpg](A437923_1_En_3_Fig4_HTML.jpg)\n\
    \n   *Figure 3-4. The MyFirstProgram running*\n\n9. Choose `MyFirstProgram` ➤\
    \ Quit `MyFirstProgram`. Xcode appears. Keep your `MyFirstProgram` project open\
    \ in Xcode for the next section.\n\nWithout doing a thing, you managed to create\
    \ a program that looks and behaves like a typical Macintosh program. Of course,\
    \ this bare-bones Macintosh program won’t do anything interesting until you customize\
    \ the user interface and write `Swift` code to make the program do something useful."
  raw: '## Creating a Project


    The first step to creating a program is to create a new project. When you create
    a project, Xcode gives you the option of choosing different templates, which provide
    basic functions. All you have to do is customize the template. The three categories
    of macOS templates are shown in Figure [3-1](#A437923_1_En_3_Chapter.html#Fig1):


    ![A437923_1_En_3_Fig1_HTML.jpg](A437923_1_En_3_Fig1_HTML.jpg)


    Figure 3-1.


    The three categories of macOS templates for creating a project


    *   Application

    *   Framework & Library

    *   Other


    Most of the time you’ll choose a template in the Application category. The most
    common template is Cocoa Application , which creates a standard macOS program
    with pull-down menus and a window.


    The other two Application templates are Game (for creating video games) and Command
    Line Tool (for creating programs that don’t need a traditional graphical user
    interface).


    The Framework & Library category is meant to create reusable software libraries.
    The Other category is meant for creating programs that don’t fit into the other
    categories such as creating plug-ins or drivers.


    In this book, you’ll always use the Cocoa Application under the macOS Application
    category. The other macOS categories are designed for advanced programmers and
    won’t be covered in this book.


    When you create a Cocoa Application project, you need to define several items,
    as shown in Figure [3-2](#A437923_1_En_3_Chapter.html#Fig2):


    ![A437923_1_En_3_Fig2_HTML.jpg](A437923_1_En_3_Fig2_HTML.jpg)


    Figure 3-2.


    Defining a Cocoa Application project


    *   The name of your product

    *   The programming language to use (Objective-C or Swift)

    *   Whether to use storyboards or not for your user interface

    *   Whether to create a document-based application

    *   Whether to use Core Data


    Your product’s name is completely arbitrary but should be descriptive since Xcode
    will store all your files in a folder using your chosen name.


    Your organization name and identifier are also arbitrary and are typically assigned
    from your Apple Developer account. Both of them can also be arbitrary strings
    if you want, but if you plan on distributing your programs through the Mac App
    Store, they should be linked to your Apple Developer account.


    The Language pop-up menu lets you choose Objective-C or Swift. For the purposes
    of this book, you’ll always choose Swift. Objective-C is a more complicated programming
    language that Apple still supports, but it’s no longer considered Apple’s official
    programming language.


    The Use Storyboards check box lets you create a user interface that either consists
    of a single window (a .`xib` file if the “Use Storyboards” check box is clear)
    or a series of windows linked together (a `.storyboard` file if the “Use Storyboards”
    check box is selected). I’ll go over both methods for creating a user interface
    later in this book.


    The Create Document-Based Application option means that Xcode creates a Cocoa
    Application that can open and manage multiple windows, such as the multiple windows
    available in a word processor. Managing multiple windows is more complicated so
    leave the Create Document-Based Application check box empty unless you need to
    create a program that can open and display multiple documents in windows. For
    the purposes of this book, leave this check box blank.


    The Use Core Data check box lets you store data typically for database applications
    such as lists of names and addresses. Leave this check box blank in most cases
    unless your program needs to store data. For the purposes of this book, leave
    this check box blank.


    The Include Unit Tests and Include UI Tests check boxes let you run tests on your
    Swift code and user interface design to make sure it works properly. For the purposes
    of this book, leave the Include Unit Tests and Include UI Tests check boxes blank.


    Ready to create your first macOS program? Then follow these steps:


    1.  Start Xcode. If a Welcome to Xcode screen appears (as shown in Figure [3-3](#A437923_1_En_3_Chapter.html#Fig3)),
    click Create a new Xcode project. If this welcome screen does not appear, choose
    File ➤ New ➤ Project or choose Window ➤ Welcome to Xcode to display this screen
    so you can choose Create a new Xcode project. Xcode displays a list of project
    templates (see Figure [3-1](#A437923_1_En_3_Chapter.html#Fig1)).


    ![A437923_1_En_3_Fig3_HTML.jpg](A437923_1_En_3_Fig3_HTML.jpg)


    Figure 3-3.


    The Welcome to Xcode opening screen  

    2.  Click Application under the macOS category . A list of different macOS application
    templates appears.  

    3.  Click Cocoa Application and then click the Next button. Xcode now asks for
    your project name (see Figure [3-2](#A437923_1_En_3_Chapter.html#Fig2)).  

    4.  Click in the Product Name text field and type MyFirstProgram.  

    5.  Click in the Language pop-up menu and make sure Swift appears.  

    6.  Make sure all check boxes are empty and then click the Next button. Xcode
    now asks where you want to store your project.  

    7.  Click a folder where you want to store your Xcode project and click the Create
    button. Congratulations! You’ve just created your first macOS program. At this
    point, Xcode just created a generic Macintosh program but you haven’t had to write
    a single line of Swift code or even design the user interface to create an actual
    working program.  

    8.  Choose Product ➤ Run, press Command + R , or click the Run icon. Xcode runs
    your program called MyFirstProgram, as shown in Figure [3-4](#A437923_1_En_3_Chapter.html#Fig4).
    Notice that MyFirstProgram displays a menu bar with pull-down menus and a window
    that you can move or resize on the screen. Because you used the Cocoa Application
    template, Xcode automatically created all the code necessary to create a generic
    Macintosh program.


    ![A437923_1_En_3_Fig4_HTML.jpg](A437923_1_En_3_Fig4_HTML.jpg)


    Figure 3-4.


    The MyFirstProgram running  

    9.  Choose MyFirstProgram ➤ Quit MyFirstProgram. Xcode appears. Keep your MyFirstProgram
    project open in Xcode for the next section.


    Without doing a thing, you managed to create a program that looks and behaves
    like a typical Macintosh program. Of course, this bare-bones Macintosh program
    won’t do anything interesting until you customize the user interface and write
    Swift code to make the program do something useful.'
  trans: "\n# 创建项目\n\n创建程序的第一步是新建一个项目。创建项目时，Xcode 会提供多种模板供你选择，这些模板提供了基础功能，你只需对其进行个性化定制。macOS\
    \ 模板分为三大类，如图 3-1 所示：\n\n![A437923_1_En_3_Fig1_HTML.jpg](img/A437923_1_En_3_Fig1_HTML.jpg)\n\
    \n*图 3-1. 创建项目时可供选择的三种 macOS 模板类别*\n\n- 应用程序 (Application)\n- 框架与库 (Framework\
    \ & Library)\n- 其他 (Other)\n\n大多数情况下，你会选择“应用程序”类别中的模板。其中最常用的模板是 **Cocoa 应用程序**，它可以创建一个带有下拉菜单和窗口的标准\
    \ macOS 程序。\n\n其他两种应用程序模板是“游戏”（用于创建视频游戏）和“命令行工具”（用于创建无需传统图形用户界面的程序）。\n\n“框架与库”类别用于创建可复用的软件库。“其他”类别则适用于创建插件或驱动程序等不属于前两类的程序。\n\
    \n在本书中，你将始终使用 macOS 应用程序类别下的 **Cocoa 应用程序**。其他 macOS 类别专为高级程序员设计，本书将不予涉及。\n\n\
    创建 Cocoa 应用程序项目时，你需要定义几个项目，如图 3-2 所示：\n\n![A437923_1_En_3_Fig2_HTML.jpg](img/A437923_1_En_3_Fig2_HTML.jpg)\n\
    \n*图 3-2. 定义 Cocoa 应用程序项目*\n\n- 产品名称\n- 使用的编程语言（`Objective-C` 或 `Swift`）\n- 是否为用户界面使用故事板\n\
    - 是否创建基于文档的应用程序\n- 是否使用 Core Data\n\n产品名称完全由你决定，但应具有描述性，因为 Xcode 会以你选择的名称命名文件夹来存储所有文件。\n\
    \n组织名称和标识符同样是自定义的，通常从你的 Apple 开发者账号中获取。如果你愿意，这两者也可以使用任意字符串，但如果你计划通过 Mac App Store\
    \ 分发程序，则应将它们与你的 Apple 开发者账号关联。\n\n“语言”弹出菜单允许你选择 `Objective-C` 或 `Swift`。在本书中，你将始终选择\
    \ `Swift`。`Objective-C` 是 Apple 仍在支持的一种更复杂的编程语言，但已不再是 Apple 的官方编程语言。\n\n“使用故事板”复选框允许你创建包含单个窗口（如果取消勾选“使用故事板”，则为\
    \ `.xib` 文件）或一系列链接在一起的窗口（如果勾选“使用故事板”，则为 `.storyboard` 文件）的用户界面。我将在本书后面介绍创建用户界面的这两种方法。\n\
    \n“创建基于文档的应用程序”选项意味着 Xcode 会创建一个能打开和管理多个窗口的 Cocoa 应用程序，例如文字处理软件中的多个窗口。管理多个窗口更为复杂，因此除非你需要创建能够打开并在窗口中显示多个文档的程序，否则请保留“创建基于文档的应用程序”复选框为空。在本书中，请保持此复选框未选中。\n\
    \n“使用 Core Data”复选框用于存储数据，通常用于数据库应用程序，如姓名和地址列表。大多数情况下，除非你的程序需要存储数据，否则请保持此复选框未选中。在本书中，请保持此复选框未选中。\n\
    \n“包含单元测试”和“包含 UI 测试”复选框允许你对 Swift 代码和用户界面设计进行测试，以确保其正常工作。在本书中，请保持“包含单元测试”和“包含\
    \ UI 测试”复选框为空。\n\n准备好创建你的第一个 macOS 程序了吗？请按照以下步骤操作：\n\n1. 启动 Xcode。如果出现“欢迎使用 Xcode”屏幕（如图\
    \ 3-3 所示），请点击“创建新的 Xcode 项目”。如果欢迎屏幕未出现，请选择“文件”➤“新建”➤“项目”，或选择“窗口”➤“欢迎使用 Xcode”以显示此屏幕，然后选择“创建新的\
    \ Xcode 项目”。Xcode 会显示项目模板列表（参见图 3-1）。\n\n   ![A437923_1_En_3_Fig3_HTML.jpg](img/A437923_1_En_3_Fig3_HTML.jpg)\n\
    \n   *图 3-3. 欢迎使用 Xcode 的启动屏幕*\n\n2. 在 macOS 类别下点击“应用程序”。将出现一个包含不同 macOS 应用程序模板的列表。\n\
    \n3. 点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 现在会询问你的项目名称（参见图 3-2）。\n\n4. 点击“产品名称”文本框，并输入\
    \ `MyFirstProgram`。\n\n5. 点击“语言”弹出菜单，确保显示的是 `Swift`。\n\n6. 确保所有复选框都处于未选中状态，然后点击“下一步”按钮。Xcode\
    \ 现在会询问你希望将项目存储在哪里。\n\n7. 点击一个文件夹来存放你的 Xcode 项目，然后点击“创建”按钮。恭喜！你刚刚创建了你的第一个 macOS\
    \ 程序。至此，Xcode 已经创建了一个通用的 Macintosh 程序，而你甚至还没有编写一行 `Swift` 代码或设计用户界面，就已经创建了一个可以实际运行的程序。\n\
    \n8. 选择“产品”➤“运行”，按下 `Command + R`，或点击“运行”图标。Xcode 会运行你命名为 `MyFirstProgram` 的程序，如图\
    \ 3-4 所示。请注意，`MyFirstProgram` 显示了一个包含下拉菜单的菜单栏和一个你可以在屏幕上移动或调整大小的窗口。因为你使用了 Cocoa\
    \ 应用程序模板，Xcode 自动创建了运行一个通用 Macintosh 程序所需的全部代码。\n\n   ![A437923_1_En_3_Fig4_HTML.jpg](img/A437923_1_En_3_Fig4_HTML.jpg)\n\
    \n   *图 3-4. MyFirstProgram 运行中*\n\n9. 选择 `MyFirstProgram` ➤ 退出 `MyFirstProgram`。Xcode\
    \ 界面重新出现。请保持 `MyFirstProgram` 项目在 Xcode 中打开，以便进行下一节的操作。\n\n你几乎无需动手，就成功创建了一个外观和行为都像典型\
    \ Macintosh 程序的程序。当然，这个极简的 Macintosh 程序还无法做任何有趣的事情，直到你自定义用户界面并编写 `Swift` 代码，让它真正发挥效用。\n"
- fmt: '# Designing a User Interface


    When designing a user interface, keep in mind the three purposes for any user
    interface:


    - To display information to the user

    - To get data from the user

    - To let the user give commands to the program


    When you design a user interface, every element must satisfy one of these criteria.
    Colors and lines might just seem decorative, but they can be useful to organize
    a user interface so users will know where to find information, how to input data,
    or how to give commands to the program.


    To create a user interface in Xcode, you need to follow a two-step process:


    - Use the Object Library to drag and drop items on to your user interface.

    - Use the Inspector pane to customize each user interface item.


    To see how to use the Object Library, let’s add a label, a text field, and a button
    to the `MyFirstProgram` user interface. The label will display text to the user,
    the text field will let the user type in data, and the button will make the program
    take the text from the text field, modify it by capitalizing every character,
    and place the modified uppercase text into the label.


    To do this, follow these steps:


    1. Make sure your `MyFirstProgram` project is loaded into Xcode.

    2. Choose View ➤ Navigators ➤ Show Project Navigator or press Command + 1 to view
    the list of all the files that make up your `MyFirstProgram` project.

    3. Click the `MainMenu.xib` file. Xcode displays the user interface. Notice that
    the actual window of your `MyFirstProgram` is not visible until you click the
    `MyFirstProgram` icon.

    4. Click the Window icon that appears in the pane between the Project Navigator
    and the user interface. This displays the window of the `MyFirstProgram` user
    interface, as shown in Figure [3-5](#A437923_1_En_3_Chapter.html#Fig5).


    ![A437923_1_En_3_Fig5_HTML.jpg](A437923_1_En_3_Fig5_HTML.jpg)


    Figure 3-5. The Window icon displays the `MyFirstProgram` user interface


    5. Choose View ➤ Utilities ➤ Show Object Library. The Object Library appears in
    the bottom right corner of the Xcode window.

    6. Drag a push button from the Object Library and drop it near the bottom of your
    `MyFirstProgram` window. Notice that when you place the button in the middle and
    near the bottom of the window, blue guidelines appear to help you align user interface
    items, as shown in Figure [3-6](#A437923_1_En_3_Chapter.html#Fig6).


    ![A437923_1_En_3_Fig6_HTML.jpg](A437923_1_En_3_Fig6_HTML.jpg)


    Figure 3-6. Using blue guidelines to place a push button near the bottom of the
    `MyFirstProgram` window


    7. Click in the Search field at the Object Library and type `label`. Notice that
    the Object Library now only displays label user interface items, as shown in Figure
    [3-7](#A437923_1_En_3_Chapter.html#Fig7).


    ![A437923_1_En_3_Fig7_HTML.jpg](A437923_1_En_3_Fig7_HTML.jpg)


    Figure 3-7. Typing in the search field helps you find items in the Object Library
    easily


    8. Drag and drop the label from the Object Library to the middle of your `MyFirstProgram`
    window.

    9. Click the clear icon (the X in the gray circle) that appears to the right of
    the Search field at the bottom of the Object Library. The Object Library now displays
    all possible user interface items.

    10. Scroll through the Object Library until you find the text field item.

    11. Drag and drop the text field above the label so your entire user interface
    appears as shown in Figure [3-8](#A437923_1_En_3_Chapter.html#Fig8). (Don’t worry
    about the exact position of each user interface item.)


    ![A437923_1_En_3_Fig8_HTML.jpg](A437923_1_En_3_Fig8_HTML.jpg)


    Figure 3-8. A label, text field, and button on the `MyFirstProgram` user interface


    At this point, you’ve customized the generic user interface. Now you have to customize
    each user interface item using the Inspector pane. Through the Inspector pane,
    you can choose different options for a user interface item, such as typing the
    exact width of a button or choosing a background color for a text field.


    When resizing or moving an item on the user interface, you can either type exact
    values into the Size Inspector pane, or you can just drag the mouse to resize
    or move an item. Either way is acceptable but the Size Inspector pane gives you
    precise control over items. Let’s see how to use the Inspector pane to customize
    the generic user interface.


    1. Click the push button near the bottom of the `MyFirstProgram` window to select
    it.

    2. Choose View ➤ Utilities ➤ Show Attributes Inspector. The Attributes Inspector
    pane appears in the upper right corner of the Xcode window, as shown in Figure
    [3-9](#A437923_1_En_3_Chapter.html#Fig9).


    ![A437923_1_En_3_Fig9_HTML.jpg](A437923_1_En_3_Fig9_HTML.jpg)


    Figure 3-9. The Attributes Inspector pane lets you customize the appearance of
    items


    3. Click in the Title text field that currently displays “Button.” Delete any
    existing text in the Title text field, type `Change Case`, and press Return. The
    text on the push button now displays “Change Case.” However, the button width
    is too narrow.

    4. Choose View ➤ Utilities ➤ Show Size Inspector. The Size Inspector pane appears
    in the upper right corner of the Xcode window.

    5. Click in the Width text field, change the value to `120` (as shown in Figure
    [3-10](#A437923_1_En_3_Chapter.html#Fig10)), and press Return. Xcode changes the
    width of the push button.


    ![A437923_1_En_3_Fig10_HTML.jpg](A437923_1_En_3_Fig10_HTML.jpg)


    Figure 3-10. The Width text field appears in the Size Inspector pane


    6. Click the label to select it. To modify the size of the label, you need to
    open the Size Inspector pane, which you can do by choosing View ➤ Utilities ➤
    Show Size Inspector, but there’s a faster method using either keystroke shortcuts
    or icons.

    7. Press Option + Command + 5 or just click the Size Inspector icon (it looks
    like a vertical ruler). The Size Inspector pane appears in the upper right corner
    of the Xcode window.

    8. Click in the Width text field, type `250`, and press Return. Xcode widens the
    width of your label.

    9. Click the text field to select it.

    10. Press Option + Command + 5 or just click the Size Inspector icon (it looks
    like a vertical ruler). The Size Inspector pane appears in the upper right corner
    of the Xcode window.

    11. Click in the Width text field, type `250`, and press Return. Xcode widens
    the width of your text field. At this point, all the user interface items appear
    off center.

    12. Drag each item until you see a blue guideline showing that you’ve centered
    it in the `MyFirstProgram` window, as shown in Figure [3-11](#A437923_1_En_3_Chapter.html#Fig11).


    ![A437923_1_En_3_Fig11_HTML.jpg](A437923_1_En_3_Fig11_HTML.jpg)


    Figure 3-11. Using blue guidelines to center items on the user interface


    At this point, you’ve customized the appearance of your user interface. If you
    run this program, the user interface will look good but it won’t actually do anything.
    To make a user interface work, you need to finish two more steps:


    - Write the Swift code.

    - Connect your user interface to your Swift code.


    You need to write the Swift code to make your program calculate some useful result.
    You need to connect your user interface to your Swift code so you can retrieve
    data from the user interface and display information back on the user interface.


    In this example, you’ll write Swift code that retrieves text from the text field,
    changes it to uppercase, then displays the uppercase text back on to the label
    when the user clicks the `Change Case` push button.


    So you need to write Swift code that converts text to uppercase. Then you need
    to connect the text field and the label so the Swift code can retrieve data from
    the text field and put new data on the label.


    To send or retrieve data from a user interface item so the Swift code can access
    it, you need to use something called an `IBOutlet`. An `IBOutlet` essentially
    represents a user interface item (such as a label or a text field) as a variable
    that Swift code can use.'
