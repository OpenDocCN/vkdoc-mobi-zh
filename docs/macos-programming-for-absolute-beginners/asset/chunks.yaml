  raw: "### Querying a Dictionary\n\nOnce you store key:value pairs in a dictionary,\
    \ you can use the following commands to get information about a dictionary:\n\n\
    *   count: Counts the number of key:value pairs stored in a dictionary\n*   keys:\
    \ Retrieves a list of all the keys stored in a dictionary\n*   values: Retrieves\
    \ a list of all the values stored in a dictionary\n\nThe `count` command only\
    \ needs the dictionary name and returns an integer value that you can assign to\
    \ a variable, such as\n\n```\nvar total = DictionaryName.count\n```\n\nThe `keys`\
    \ and `values` commands need a dictionary name and returns a list of items that\
    \ you can store in an array, such as\n\n```\nlet myKeys = Array(DictionaryName.keys)\n\
    ```\n\nTo see how to count and retrieve keys and values from a dictionary, follow\
    \ these steps:\n\n1.  Make sure the IntroductoryPlayground file is loaded in Xcode.\
    \  \n2.  Edit the code as follows:\n\n    ```\n    import Cocoa\n    var myDictionary\
    \ = [12: \"Joe\", 7: \"Walter\"]\n    myDictionary.removeValue(forKey: 7)\n  \
    \  print (myDictionary)\n    myDictionary.removeAll()\n    print (myDictionary)\n\
    \    myDictionary = [25: \"Stephanie\", 98: \"Nancy\"]\n    print (myDictionary.count)\n\
    \    let myKeys = Array(myDictionary.keys)\n    let myValues = Array(myDictionary.values)\n\
    \    ```\n\nNotice how the `removeValueForKey` command removes an existing key:value\
    \ pair while the `removeAll` command empties the entire dictionary. Also notice\
    \ how the `count` command counts all key:value pairs while the `keys` and `values`\
    \ commands return a list of the keys and values, respectively, as shown in Figure\
    \ [9-7](#A437923_1_En_9_Chapter.html#Fig7).\n\n![A437923_1_En_9_Fig7_HTML.jpg](A437923_1_En_9_Fig7_HTML.jpg)\n\
    \nFigure 9-7.\n\nDeleting dictionary data, counting, and retrieving keys and values\n\
    \n## Using Dictionaries in a macOS Program\n\nIn the following sample program,\
    \ the computer creates a list of data stored in a dictionary. Then through the\
    \ user interface, the user can add new data to the dictionary, delete existing\
    \ data, or get information about the dictionary.\n\nCreate a new macOS project\
    \ by following these steps:\n\n1.  From within Xcode choose File ➤ New ➤ Project.\
    \  \n2.  Click Application under the macOS category.  \n3.  Click Cocoa Application\
    \ and click the Next button. Xcode now asks for a product name.  \n4.  Click in\
    \ the Product Name text field and type DictionaryProgram.  \n5.  Make sure the\
    \ Language pop-up menu displays Swift and that no check boxes are selected.  \n\
    6.  Click the Next button. Xcode asks where you want to store the project.  \n\
    7.  Choose a folder to store your project and click the Create button.  \n8. \
    \ Click the `MainMenu.xib` file in the Project Navigator.  \n9.  Click the DictionaryProgram\
    \ icon to make the window of the user interface appear.  \n10.  Choose View ➤\
    \ Utilities ➤ Show Object Library to make the Object Library appear in the bottom\
    \ right corner of the Xcode window.  \n11.  Drag three push buttons, six labels,\
    \ and six text fields onto the user interface, and double-click the push buttons\
    \ and labels to change the text that appears on them so they look similar to Figure\
    \ [9-8](#A437923_1_En_9_Chapter.html#Fig8).\n\n![A437923_1_En_9_Fig8_HTML.jpg](A437923_1_En_9_Fig8_HTML.jpg)\n\
    \nFigure 9-8.\n\nThe user interface of the DictionaryProgram\n\nThe Add button\
    \ will let you type in a key and value in the text fields on the right. The Delete\
    \ button will let you specify a key to delete its associated value from a dictionary.\
    \ The Query button will display the total number of items along with the list\
    \ of keys and values currently stored in the dictionary.\n\nEach text field will\
    \ need a separate IBOutlet and each push button will need a separate IBAction\
    \ method , which you create by Control-dragging each item from the user interface\
    \ to your `AppDelegate.swift` file .\n\n1.  With your user interface still visible\
    \ in the Xcode window, choose View ➤ Assistant Editor ➤ Show Assistant Editor.\
    \ The `AppDelegate.swift` file appears next to the user interface.  \n2.  Move\
    \ the mouse over the Add button, hold down the Control key, and drag just above\
    \ the last curly bracket at the bottom of the `AppDelegate.swift` file.  \n3.\
    \  Release the mouse and the Control key. A pop-up window appears.  \n4.  Click\
    \ in the Connection pop-up menu and choose Action.  \n5.  Click in the Name text\
    \ field and type addButton.  \n6.  Click in the Type pop-up menu and choose NSButton.\
    \ Then click the Connect button.  \n7.  Move the mouse over the Delete button,\
    \ hold down the Control key, and drag just above the last curly bracket at the\
    \ bottom of the `AppDelegate.swift` file.  \n8.  Release the mouse and the Control\
    \ key. A pop-up window appears.  \n9.  Click in the Connection pop-up menu and\
    \ choose Action.  \n10.  Click in the Name text field and type deleteButton.  \n\
    11.  Click in the Type pop-up menu and choose NSButton. Then click the Connect\
    \ button.  \n12.  Move the mouse over the Query button, hold down the Control\
    \ key, and drag just above the last curly bracket at the bottom of the `AppDelegate.swift`\
    \ file.  \n13.  Release the mouse and the Control key. A pop-up window appears.\
    \  \n14.  Click in the Connection pop-up menu and choose Action.  \n15.  Click\
    \ in the Name text field and type queryButton.  \n16.  Click in the Type pop-up\
    \ menu and choose NSButton. Then click the Connect button. The bottom of the `AppDelegate.swift`\
    \ file should look like this:\n\n```\n    @IBAction func addButton(_ sender: NSButton)\
    \ {\n    }\n    @IBAction func deleteButton(_ sender: NSButton) {\n    }\n   \
    \ @IBAction func queryButton(_ sender: NSButton) {\n    }\n    ```"
  trans: "\n### 查询字典\n\n在字典中存储键值对后，你可以使用以下命令获取字典的相关信息：\n\n- `count`：统计字典中存储的键值对数量\n\
    - `keys`：检索字典中存储的所有键的列表\n- `values`：检索字典中存储的所有值的列表\n\n`count` 命令只需提供字典名称，并返回一个整数值，你可以将其赋值给变量，例如：\n\
    \n```\nvar total = DictionaryName.count\n```\n\n`keys` 和 `values` 命令需要提供字典名称，并返回一个项目列表，你可以将其存储在数组中，例如：\n\
    \n```\nlet myKeys = Array(DictionaryName.keys)\n```\n\n要了解如何从字典中统计和检索键与值，请按以下步骤操作：\n\
    \n1.  确保 `IntroductoryPlayground` 文件已在 Xcode 中加载。\n2.  按如下方式编辑代码：\n\n    ```\n\
    \    import Cocoa\n    var myDictionary = [12: \"Joe\", 7: \"Walter\"]\n    myDictionary.removeValue(forKey:\
    \ 7)\n    print (myDictionary)\n    myDictionary.removeAll()\n    print (myDictionary)\n\
    \    myDictionary = [25: \"Stephanie\", 98: \"Nancy\"]\n    print (myDictionary.count)\n\
    \    let myKeys = Array(myDictionary.keys)\n    let myValues = Array(myDictionary.values)\n\
    \    ```\n\n注意，`removeValueForKey` 命令用于移除一个已有的键值对，而 `removeAll` 命令则清空整个字典。另外，`count`\
    \ 命令统计所有键值对的数量，而 `keys` 和 `values` 命令分别返回键和值的列表，如图 9-7 所示。\n\n![A437923_1_En_9_Fig7_HTML.jpg](img/A437923_1_En_9_Fig7_HTML.jpg)\n\
    \n图 9-7.\n\n删除字典数据、统计以及检索键和值\n\n## 在 macOS 程序中使用字典\n\n在下面的示例程序中，计算机会创建一个存储在字典中的数据列表。然后通过用户界面，用户可以添加新数据到字典、删除已有数据或获取字典信息。\n\
    \n请按以下步骤创建一个新的 macOS 项目：\n\n1.  在 Xcode 中选择 \"File\" ➤ \"New\" ➤ \"Project\"。\n\
    2.  在 macOS 类别下点击 \"Application\"。\n3.  点击 \"Cocoa Application\"，然后点击 \"Next\"\
    \ 按钮。Xcode 会要求输入产品名称。\n4.  点击 \"Product Name\" 文本字段，输入 `DictionaryProgram`。\n\
    5.  确保 \"Language\" 下拉菜单显示 \"Swift\"，并且没有勾选任何复选框。\n6.  点击 \"Next\" 按钮。Xcode 会询问你项目的存储位置。\n\
    7.  选择一个文件夹来存储你的项目，然后点击 \"Create\" 按钮。\n8.  在 Project Navigator 中点击 `MainMenu.xib`\
    \ 文件。\n9.  点击 `DictionaryProgram` 图标以显示用户界面窗口。\n10. 选择 \"View\" ➤ \"Utilities\"\
    \ ➤ \"Show Object Library\"，使 Object Library 出现在 Xcode 窗口的右下角。\n11. 将三个按钮、六个标签和六个文本字段拖拽到用户界面上，然后双击这些按钮和标签来修改其上显示的文本，使其看起来类似于图\
    \ 9-8。\n\n![A437923_1_En_9_Fig8_HTML.jpg](img/A437923_1_En_9_Fig8_HTML.jpg)\n\n\
    图 9-8.\n\n`DictionaryProgram` 的用户界面\n\n\"Add\" 按钮将允许你在右侧的文本字段中输入键和值。\"Delete\"\
    \ 按钮将允许你指定一个键，以从字典中删除其关联的值。\"Query\" 按钮将显示字典中当前存储的项目总数，以及键和值的列表。\n\n每个文本字段都需要一个独立的\
    \ `IBOutlet`，每个按钮都需要一个独立的 `IBAction` 方法，你可以通过从用户界面按住 Control 键拖拽到你的 `AppDelegate.swift`\
    \ 文件中来创建它们。\n\n1.  在 Xcode 窗口中用户界面仍可见的情况下，选择 \"View\" ➤ \"Assistant Editor\" ➤\
    \ \"Show Assistant Editor\"。`AppDelegate.swift` 文件会出现在用户界面旁边。\n2.  将鼠标移到 \"Add\"\
    \ 按钮上，按住 Control 键，拖拽至 `AppDelegate.swift` 文件底部最后一个花括号的上方。\n3.  松开鼠标和 Control\
    \ 键。会弹出一个窗口。\n4.  点击 \"Connection\" 弹出菜单，选择 \"Action\"。\n5.  点击 \"Name\" 文本字段，输入\
    \ `addButton`。\n6.  点击 \"Type\" 弹出菜单，选择 `NSButton`。然后点击 \"Connect\" 按钮。\n7.  将鼠标移到\
    \ \"Delete\" 按钮上，按住 Control 键，拖拽至 `AppDelegate.swift` 文件底部最后一个花括号的上方。\n8.  松开鼠标和\
    \ Control 键。会弹出一个窗口。\n9.  点击 \"Connection\" 弹出菜单，选择 \"Action\"。\n10. 点击 \"Name\"\
    \ 文本字段，输入 `deleteButton`。\n11. 点击 \"Type\" 弹出菜单，选择 `NSButton`。然后点击 \"Connect\"\
    \ 按钮。\n12. 将鼠标移到 \"Query\" 按钮上，按住 Control 键，拖拽至 `AppDelegate.swift` 文件底部最后一个花括号的上方。\n\
    13. 松开鼠标和 Control 键。会弹出一个窗口。\n14. 点击 \"Connection\" 弹出菜单，选择 \"Action\"。\n15. 点击\
    \ \"Name\" 文本字段，输入 `queryButton`。\n16. 点击 \"Type\" 弹出菜单，选择 `NSButton`。然后点击 \"\
    Connect\" 按钮。`AppDelegate.swift` 文件的底部应如下所示：\n\n```\n@IBAction func addButton(_\
    \ sender: NSButton) {\n}\n@IBAction func deleteButton(_ sender: NSButton) {\n\
    }\n@IBAction func queryButton(_ sender: NSButton) {\n}\n```\n"
- fmt: "17.  将鼠标移到Add按钮右侧出现的Key文本字段上，按住Control键，拖拽到`AppDelegate.swift`文件中`@IBOutlet`行下方。\n\
    18.  松开鼠标和Control键，会出现一个弹出窗口。\n19.  点击Name文本字段，输入`addKeyField`，然后点击Connect按钮。\n\
    20.  将鼠标移到Add按钮右侧出现的Value文本字段上，按住Control键，拖拽到`AppDelegate.swift`文件中`@IBOutlet`行下方。\n\
    21.  松开鼠标和Control键，会出现一个弹出窗口。\n22.  点击Name文本字段，输入`addValueField`，然后点击Connect按钮。\n\
    23.  将鼠标移到Delete按钮右侧出现的Key文本字段上，按住Control键，拖拽到`AppDelegate.swift`文件中`@IBOutlet`行下方。\n\
    24.  松开鼠标和Control键，会出现一个弹出窗口。\n25.  点击Name文本字段，输入`deleteKeyField`，然后点击Connect按钮。\n\
    26.  将鼠标移到Query按钮右侧出现的Count文本字段上，按住Control键，拖拽到`AppDelegate.swift`文件中`@IBOutlet`行下方。\n\
    27.  松开鼠标和Control键，会出现一个弹出窗口。\n28.  点击Name文本字段，输入`queryCountField`，然后点击Connect按钮。\n\
    29.  将鼠标移到Query按钮右侧出现的Keys文本字段上，按住Control键，拖拽到`AppDelegate.swift`文件中`@IBOutlet`行下方。\n\
    30.  松开鼠标和Control键，会出现一个弹出窗口。\n31.  点击Name文本字段，输入`queryKeysField`，然后点击Connect按钮。\n\
    32.  将鼠标移到Query按钮右侧出现的Values文本字段上，按住Control键，拖拽到`AppDelegate.swift`文件中`@IBOutlet`行下方。\n\
    33.  松开鼠标和Control键，会出现一个弹出窗口。\n34.  点击Name文本字段，输入`queryValuesField`，然后点击Connect按钮。\n\
    35.  现在你应该拥有以下代表用户界面上所有文本字段的`IBOutlet`：\n\n```\n    @IBOutlet weak var window:\
    \ NSWindow!\n    @IBOutlet weak var addKeyField: NSTextField!\n    @IBOutlet weak\
    \ var addValueField: NSTextField!\n    @IBOutlet weak var deleteKeyField: NSTextField!\n\
    \    @IBOutlet weak var queryCountField: NSTextField!\n    @IBOutlet weak var\
    \ queryKeysField: NSTextField!\n    @IBOutlet weak var queryValuesField: NSTextField!\n\
    ```\n\n至此，你已经将用户界面连接到Swift代码中，因此可以使用`IBOutlet`来检索和显示用户界面上的数据。你还创建了`IBAction`方法，使得用户界面上的按钮能够让程序实际运行。现在你只需要编写Swift代码来创建一个初始字典，然后在每个`IBAction`方法中编写更多Swift代码来添加、删除或查询字典。\n\
    \n1.  在`AppDelegate.swift`文件的`IBOutlet`列表下方，输入以下代码来创建一个键为整数、值为字符串的字典：\n\n```\n\
    \    var myDictionary = [1:\"Joe\", 2:\"Cindy\", 3:\"Frank\"]\n```\n\n2.  修改`addButton`的`IBAction`方法，使其从Key和Value文本字段获取值，并将它们添加到字典中，如下所示：\n\
    \n```\n    @IBAction func addButton(_ sender: NSButton) {\n        myDictionary.updateValue(addValueField.stringValue,\
    \ forKey: addKeyField.integerValue)\n    }\n```\n\n3.  修改`deleteButton`的`IBAction`方法，使其从Key文本字段获取值，并从字典中删除关联的值，如下所示：\n\
    \n```\n    @IBAction func deleteButton(_ sender: NSButton) {\n        myDictionary.removeValue(forKey:\
    \ deleteKeyField.integerValue)\n    }\n```\n\n4.  修改`queryButton`的`IBAction`方法，如下所示：\n\
    \n```\n    @IBAction func queryButton(_ sender: NSButton) {\n        queryCountField.integerValue\
    \ = myDictionary.count\n        var keyList : String = \"\"\n        for key in\
    \ myDictionary.keys {\n            keyList = keyList + \"\\(key)\" + \" \"\n \
    \       }\n        queryKeysField.stringValue = keyList\n        var valueList\
    \ : String = \"\"\n        for value in myDictionary.values {\n            valueList\
    \ = valueList + \"\\(value)\" + \" \"\n        }\n        queryValuesField.stringValue\
    \ = valueList\n    }\n```\n\n`myDictionary.count`命令会统计字典中键值对的数量，并将该数字显示在`queryCountField`这个`IBOutlet`中。\n\
    \n第一个`for-in`循环遍历字典中的每个键，并将其存储到一个名为`keyList`的字符串中，然后将此文本字符串显示在`queryKeysField`这个`IBOutlet`中。\n\
    \n最后一个`for`循环遍历字典中的每个值，并将其存储到一个名为`valueList`的字符串中，然后将此文本字符串显示在`queryValuesField`这个`IBOutlet`中。\n\
    \n`AppDelegate.swift`文件的完整内容应如下所示：\n\n```\nimport Cocoa\n@NSApplicationMain\n\
    class AppDelegate: NSObject, NSApplicationDelegate {\n    @IBOutlet weak var window:\
    \ NSWindow!\n    @IBOutlet weak var addKeyField: NSTextField!\n    @IBOutlet weak\
    \ var addValueField: NSTextField!\n    @IBOutlet weak var deleteKeyField: NSTextField!\n\
    \    @IBOutlet weak var queryCountField: NSTextField!\n    @IBOutlet weak var\
    \ queryKeysField: NSTextField!\n    @IBOutlet weak var queryValuesField: NSTextField!\n\
    \    var myDictionary = [1:\"Joe\", 2:\"Cindy\", 3:\"Frank\"]\n    func applicationDidFinishLaunching(_\
    \ aNotification: Notification) {\n        // Insert code here to initialize your\
    \ application\n    }\n    func applicationWillTerminate(_ aNotification: Notification)\
    \ {\n        // Insert code here to tear down your application\n    }\n    @IBAction\
    \ func addButton(_ sender: NSButton) {\n        myDictionary.updateValue(addValueField.stringValue,\
    \ forKey: addKeyField.integerValue)\n    }\n    @IBAction func deleteButton(_\
    \ sender: NSButton) {\n        myDictionary.removeValue(forKey: deleteKeyField.integerValue)\n\
    \    }\n    @IBAction func queryButton(_ sender: NSButton) {\n        queryCountField.integerValue\
    \ = myDictionary.count\n        var keyList : String = \"\"\n        for key in\
    \ myDictionary.keys {\n            keyList = keyList + \"\\(key)\" + \" \"\n \
    \       }\n        queryKeysField.stringValue = keyList\n        var valueList\
    \ : String = \"\"\n        for value in myDictionary.values {\n            valueList\
    \ = valueList + \"\\(value)\" + \" \"\n        }\n        queryValuesField.stringValue\
    \ = valueList\n    }\n}\n```\n\nQuery按钮的作用是，只需点击它即可显示当前字典内容的相关信息。\n\nAdd按钮的作用是，用户在Key和Value文本字段中输入一个键（整数）和一个名称（字符串），然后点击Add按钮。\n\
    \nDelete按钮的作用是，用户在Key文本字段中输入一个键（整数），然后点击Delete按钮。\n\n点击Add或Delete按钮后，再次点击Query按钮即可查看更改。要了解此程序的工作方式，请按照以下步骤操作：\n\
    \n1.  选择Product ➤ Run。Xcode会运行你的DictionaryProgram项目。\n2.  点击Query按钮。程序将显示字典中的项数（3）、键列表（数字1、2和3）以及值列表（“Joe”、“Cindy”和“Frank”）。不必担心键和值的顺序。重点是检查每个键的顺序是否与正确的值匹配，例如1对应“Joe”，2对应“Cindy”，3对应“Frank”。\n\
    3.  在Delete按钮右侧的Key字段中输入3，然后点击Delete按钮。\n4.  点击Query按钮。注意，现在字典中只包含两个项：键1和2，以及值“Joe”和“Cindy”，如图[9-9](#A437923_1_En_9_Chapter.html#Fig9)所示。\n\
    \n![A437923_1_En_9_Fig9_HTML.jpg](A437923_1_En_9_Fig9_HTML.jpg)\n\nFigure 9-9."
