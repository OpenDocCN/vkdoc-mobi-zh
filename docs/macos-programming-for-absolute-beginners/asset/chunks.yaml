    \ (X: Int) -> Int\n}\nclass Politician : Person {\n    @objc var name : String\
    \ = \"\"\n}\nvar candidate = Politician ()\ncandidate.name = \"John Doe\"\n```\n\
    \n注意，上面定义的`Person`协议中唯一必需的项目是`name`属性。这就是为什么`Politician`类只需要实现`name`属性，但它必须使用`@objc`关键字标识它。\n\
    \n尝试将不同的属性和方法设为可选，以便观察它们如何影响你在类中的实现方式。\n\n### 将继承与协议一起使用\n\n协议甚至可以从其他协议继承属性和方法。这使得一个协议可以从多个协议继承属性和方法。此时，一个类必须采用或遵守所有协议中定义的所有属性和方法。\n\
    \n要了解如何从多个协议继承属性和方法，请遵循以下步骤：\n\n1. 确保`IntroductoryPlayground`文件已加载到 Xcode 中。\n\
    2. 按如下方式编辑代码：\n\n```\nimport Cocoa\nprotocol First {\n    var name : String {\
    \ get }\n}\nprotocol Second {\n    var ID : Int { get }\n}\nprotocol Third: First,\
    \ Second {\n    var email : String { get }\n}\nclass InheritProtocols : Third\
    \ {\n    var name : String = \"\"\n    var ID : Int = 0\n    var email : String\
    \ = \"\"\n}\nvar friend = InheritProtocols()\nfriend.name = \"Cindy Smith\"\n\
    friend.ID = 12\nfriend.email = cindysmith@isp.com\nprint (friend.name)\nprint\
    \ (friend.ID)\nprint (friend.email)\n```\n\n在这个例子中，`name`、`ID`和`email`属性在三个不同的协议中被定义。第三个协议继承了第一个和第二个协议。\n\
    \n现在，当一个类采用最后一个协议时，它必须实现在所有协议中存储的属性和方法。尽管`name`、`ID`和`email`属性都是在不同的协议中声明的，但`InheritProtocols`类可以访问它们全部，如图\
    \ 14-9 所示。\n\n![A437923_1_En_14_Fig9_HTML.jpg](img/A437923_1_En_14_Fig9_HTML.jpg)\n\
    \n图 14-9.\n\n从多个协议继承属性和方法\n"
- fmt: "# Using Delegates\n\nProtocols are closely related to delegation. The main\
    \ idea behind delegation is for a class to hand off or delegate responsibility\
    \ to code stored in another class. So rather than create a new subclass to add\
    \ new features, you can use a delegate that contains additional features.\n\n\
    One common way to use delegates is to allow the view (the user interface) to communicate\
    \ to the controller. Normally, the controller communicates to the view through\
    \ `IBOutlet`s that allow the controller to display data on the user interface\
    \ or retrieve data from the user interface.\n\nHowever, the view can also communicate\
    \ back to the controller through protocols. The protocol file defines methods\
    \ and delegates the responsibility to the controller for implementing those methods.\
    \ The most common types of methods the controller implements involve method names\
    \ that include \"will,\" \"should,\" and \"did\" such as `applicationDidFinishLaunching`\
    \ or `applicationWillTerminate`.\n\nFigure [14-10](#A437923_1_En_14_Chapter.html#Fig10)\
    \ shows how the controller communicates to the view through `IBOutlet`s and the\
    \ view communicates with the controller through protocols.\n\n![A437923_1_En_14_Fig10_HTML.jpg](A437923_1_En_14_Fig10_HTML.jpg)\n\
    \nFigure 14-10. Views can communicate to controllers through protocols.\n\nTo\
    \ see how a view uses delegates to communicate with the controller, follow these\
    \ steps:\n\n1. From within Xcode choose File ➤ New ➤ Project.\n2. Click Application\
    \ under the macOS category.\n3. Click Cocoa Application and click the Next button.\
    \ Xcode now asks for a product name.\n4. Click in the Product Name text field\
    \ and type `DelegateProgram`.\n5. Make sure the Language pop-up menu displays\
    \ Swift and that no check boxes are selected.\n6. Click the Next button. Xcode\
    \ asks where you want to store the project.\n7. Choose a folder to store your\
    \ project and click the Create button.\n8. Click the `AppDelegate.swift` file\
    \ in the Project Navigator. The contents of the `AppDelegate.swift` file appear\
    \ in the middle of the Xcode window. Look for the following line of code:\n  \
    \ ```\n   class AppDelegate: NSObject, NSApplicationDelegate {\n   ```\n   This\
    \ line defines a class called `AppDelegate` that inherits properties and methods\
    \ from the `NSObject` class. In addition, it also adopts any properties and methods\
    \ defined by the `NSApplicationDelegate` file.\n9. Hold down the Option key and\
    \ click the mouse over `NSObject`. When the mouse pointer turns into a question\
    \ mark, click over `NSObject` to make a pop-up window appear, as shown in Figure\
    \ [14-11](#A437923_1_En_14_Chapter.html#Fig11).\n   ![A437923_1_En_14_Fig11_HTML.jpg](A437923_1_En_14_Fig11_HTML.jpg)\n\
    \   Figure 14-11. Option-clicking on a class name displays information about that\
    \ class\n10. Release the Option key and click the mouse over the Class Reference\
    \ hyperlink at the bottom of the pop-up window. The Documentation window appears,\
    \ showing details about the different properties and methods available in the\
    \ `NSObject` class, as shown in Figure [14-12](#A437923_1_En_14_Chapter.html#Fig12).\
    \ All those properties and methods are also available in your `AppDelegate` class\
    \ as well.\n    ![A437923_1_En_14_Fig12_HTML.jpg](A437923_1_En_14_Fig12_HTML.jpg)\n\
    \    Figure 14-12. The Documentation window displaying information about the `NSObject`\
    \ class\n11. Click the close button (the red dot) in the upper left corner of\
    \ the Documentation window to make it go away.\n12. Hold down the Option key and\
    \ click the mouse over `NSApplicationDelegate`. When the mouse pointer turns into\
    \ a question mark, click over `NSApplicationDelegate` to make a pop-up window\
    \ appear, as shown in Figure [14-13](#A437923_1_En_14_Chapter.html#Fig13).\n \
    \   ![A437923_1_En_14_Fig13_HTML.jpg](A437923_1_En_14_Fig13_HTML.jpg)\n    Figure\
    \ 14-13. Option-clicking displays information about the `NSApplication` protocol\n\
    13. Release the Option key and click the mouse over the Protocol Reference hyperlink\
    \ at the bottom of the pop-up window. The Documentation window appears, showing\
    \ details about the `NSApplicationDelegate` protocol, as shown in Figure [14-14](#A437923_1_En_14_Chapter.html#Fig14).\
    \ Notice that two methods that the `NSApplicationDelegate` protocol defines are\
    \ called `applicationDidFinishLaunching` and `applicationWillTerminate`.\n   \
    \ ![A437923_1_En_14_Fig14_HTML.jpg](A437923_1_En_14_Fig14_HTML.jpg)\n    Figure\
    \ 14-14. Viewing the `NSApplicationDelegate` protocol in the Documentation window\n\
    14. Click the close button (the red dot) in the upper left corner of the Documentation\
    \ window to make it go away. The Xcode window appears again. Notice that the `AppDelegate.swift`\
    \ file contains two empty functions called `applicationDidFinishLaunching` and\
    \ `applicationWillTerminate`. These are defined by the `NSApplicationDelegate`\
    \ protocol file but implemented in the `AppDelegate.swift` file.\n15. Modify both\
    \ of these functions as follows:\n    ```\n    func applicationDidFinishLaunching(aNotification:\
    \ NSNotification) {\n    print (\"This line should print after the program runs\"\
    )\n    }\n    func applicationWillTerminate(aNotification: NSNotification) {\n\
    \    print (\"This line should print before your program stops\")\n    }\n   \
    \ ```\n16. Choose Product ➤ Run. Xcode runs your `DelegateProgram` project and\
    \ displays an empty user interface.\n17. Choose DelegateProgram ➤ Quit DelegateProgram.\
    \ The Xcode window appears.\n18. Choose View ➤ Debug Area ➤ Show Debug Area. The\
    \ debug area appears at the bottom of the Xcode window and displays the text that\
    \ the two `print` commands printed. Notice that the print command inside the `applicationDidFinishLaunching`\
    \ function ran first, as shown in Figure [14-15](#A437923_1_En_14_Chapter.html#Fig15).\n\
    \    ![A437923_1_En_14_Fig15_HTML.jpg](A437923_1_En_14_Fig15_HTML.jpg)\n    Figure\
    \ 14-15. The methods defined by the `NSApplicationDelegate` file tell the program\
    \ what the user interface is doing"
