    \ changeCase` 方法允许你无需使用感叹号就能访问这些隐式解包可选变量的内容。\n\n```\n    @IBOutlet weak var labelText:\
    \ NSTextField!\n    @IBOutlet weak var messageText: NSTextField!\n    @IBAction\
    \ func changeCase(_ sender: NSButton) {\n    labelText.stringValue = messageText.stringValue.uppercased()\n\
    \    let warning = labelText.stringValue\n    }\n```\n\n3.  将每个 `IBOutlet` 变量末尾的感叹号替换为问号，如下所示：\n\
    \n```\n    @IBOutlet weak var labelText: NSTextField?\n    @IBOutlet weak var\
    \ messageText: NSTextField?\n```\n\n注意，现在每次使用 `IBOutlet` 变量时，Xcode 都会显示错误信息。这是因为你需要用感叹号解包每个可选变量，如下所示：\n\
    \n```\n@IBAction func changeCase(_ sender: NSButton) {\nlabelText!.stringValue\
    \ = messageText!.stringValue.uppercased()\nlet warning = labelText!.stringValue\n\
    }\n```\n\n如果你将 `IBOutlet` 定义为普通的可选变量（用问号定义），那么为了访问其值，你必须用感叹号解包每个可选变量。\n\n如果你简单地将\
    \ `IBOutlet` 定义为隐式解包的可选变量（Xcode 会为你这样做），那么你就不需要输入感叹号来解包这些可选变量了。\n\n基本上，让 Xcode\
    \ 将你的 `IBOutlet` 创建为隐式解包的变量（带感叹号）能让编写 Swift 代码更轻松。\n\n那么，什么时候该使用可选变量（用 `?` 定义），什么时候该使用隐式解包的可选变量（用\
    \ `!` 定义）呢？\n\n一般来说，对于 `IBOutlet`，使用隐式解包的可选变量可以让你更轻松地编写 Swift 代码，无需到处输入感叹号。如果在其他场合使用隐式解包的可选变量，你的变量可能包含\
    \ `nil` 值，而当你尝试使用它时，Xcode 不会捕获任何潜在错误。\n\n要了解使用隐式解包可选变量的危险性，请遵循以下步骤：\n\n1.  确保你的\
    \ `IntroductoryPlayground` 文件已加载到 Xcode 中。\n2.  修改代码如下：\n\n```\n    import Cocoa\n\
    \    var safe : Int?  // 可选变量\n    var danger : Int!// 隐式解包的可选变量\n    print (danger\
    \ * 2)\n    print (safe * 2)\n```\n\n请注意，这两个整数变量都没有值，但 Xcode 却允许你使用隐式解包可选变量中的\
    \ `nil` 值进行计算，而对于普通可选变量，则会标记一个可能的错误，如图 5-16 所示。\n\n![A437923_1_En_5_Fig16_HTML.jpg](img/A437923_1_En_5_Fig16_HTML.jpg)\n\
    \n图 5-16. Xcode 可以识别未定义可选变量可能存在的问题，但无法识别未定义隐式解包可选变量的问题\n\n通过要求你用感叹号（`!`）解包可选变量，Xcode\
    \ 强制你承认正在使用可选变量，这样你就能记得检查它是否包含 `nil` 值。\n\n由于隐式解包的可选变量允许你直接输入变量名而无需附加符号，因此更容易忘记自己正在处理可选变量，并且在尝试使用之前检查可能的\
    \ `nil` 值。可选变量无法防止问题，但能强制你记住自己正在处理可能为 `nil` 的值。\n\n## 总结\n\n如果你来自其他编程环境，你已经看到\
    \ Swift 与其他语言的诸多不同之处。Swift 的 Playground 解释器让你在将代码复制粘贴到实际程序之前，可以先在安全环境中测试代码。Playground\
    \ 让你可以自由地实验 Swift 命令。\n\n三种最常见的数据类型是整数（`Int`）、小数（`Float` 或 `Double`）和文本字符串（`String`）。为了避免在存储小数时混用数据类型，除非你有特定原因要使用\
    \ `Float` 数据类型，否则请使用 `Double` 数据类型。\n\n为了更灵活地命名变量，你可以使用能够表示符号或外语字符的 Unicode 字符。\n\
    \n将数据存储到变量中，可以简单到直接为其赋值。Swift 还提供了计算属性，允许你在为新值赋值时修改变量或其他变量。计算属性在处理类和面向对象编程时更为有用。\n\
    \n更重要的是可选变量，它允许你处理 `nil` 值而不会导致程序崩溃。在使用 `IBOutlet` 将 Swift 代码连接到标签和文本字段等用户界面元素时，可选变量尤其重要。\n\
    \n当你创建一个可选变量（用问号）时，你需要解包它（用感叹号）才能访问其实际数据。\n\n变量对于临时存储数据至关重要，因此你会经常使用它们。当你开始学习类和面向对象编程时，你会使用变量来定义属性。本质上，任何时候你需要存储一块数据，你都会声明一个变量来保存它。\n"
- fmt: "# 6. Manipulating Numbers and Strings\n\nEvery program needs to store data\
    \ temporarily in variables. However, for a program to be useful, it must also\
    \ manipulate that data somehow to calculate a useful result. A spreadsheet lets\
    \ you add, subtract, multiply, and divide numbers. A word processor manipulates\
    \ text to correct your spelling and format text. Even a video game responds to\
    \ joystick movements to calculate a new position for the player’s object such\
    \ as a cartoon person, airplane, or car. Using data to calculate a new result\
    \ is the whole purpose of every program.\n\nTo manipulate numbers, Swift includes\
    \ four basic mathematic operators for addition (`+`), subtraction (`-`), multiplication\
    \ (`*`), division (`/`), and a remainder operator (`%`). You can even manipulate\
    \ strings using the addition operator (`+`) when you want to combine two strings\
    \ into one.\n\nAlthough Swift includes multiple operators for manipulating numbers\
    \ and text, the Cocoa framework includes plenty of more powerful functions for\
    \ manipulating numbers and strings. If none of these functions prove suitable,\
    \ you can always create your own functions to manipulate text and numeric data.\
    \ By creating miniature programs called functions, you can manipulate data in\
    \ any way you like and reuse your function as often as necessary.\n\n## Using\
    \ Mathematical Operators\n\nThe simplest way to manipulate numbers is to perform\
    \ addition, subtraction, division, or multiplication. When manipulating numbers,\
    \ first make sure all your numbers are the same data type, such as all integers\
    \ or all `Float` or `Double` decimal numbers. Since mixing integers with decimal\
    \ numbers can lead to calculation errors, Swift will force you to use the same\
    \ data types in a calculation. If all your data isn’t the same data type, you\
    \ need to convert one or more data types such as\n\n```\nvar cats = 4\nvar dogs\
    \ = 5.4\ndogs = Double(cats) * dogs\n```\n\nIn this case, Swift infers that `cats`\
    \ is an `Int` data type and `dogs` is a `Double` data type. To multiply `cats`\
    \ and `dogs`, they must be the same data type (`Double`), so you must first convert\
    \ the `cats` value to a `Double` data type and then the calculation can proceed\
    \ safely.\n\nWhen using multiple mathematical operators, use parentheses to define\
    \ which calculations should occur first. Swift normally calculates mathematical\
    \ operators from left to right, but multiplication and division occur before addition\
    \ and division. If you typed the following Swift code, you’d get two different\
    \ results based solely on the order of the mathematical calculations:\n\n```\n\
    var cats, dogs : Double\ndogs = 5 *  9 - 3  /  2 + 4     // 47.5\ncats = 5 * (9\
    \ - 3) / (2 + 4)    // 5.0\n```\n\nFor clarity, always group mathematical operators\
    \ in parentheses. The most common mathematical operators are known as binary operators\
    \ because they require two numbers to calculate a result, as shown in Table 6-1.\n\
    \n**Table 6-1.** Common Mathematical Operators in Swift\n\n| Mathematical Operator\
    \ | Purpose | Example |\n| --- | --- | --- |\n| `+` | Addition | `5 + 9 = 14`\
    \ |\n| `-` | Subtraction | `5 - 4 = 1` |\n| `*` | Multiplication | `5 * 9 = 45`\
    \ |\n| `/` | Division | `45 / 9 = 5` |\n| `%` | Remainder | `5 % 9 = 5` |\n\n\
    Out of all these mathematical operators, the remainder operator may need some\
    \ additional explanation. Essentially the remainder operator divides one number\
    \ into another and returns just the remainder of that division. So 5 divided by\
    \ 9 is 0 with a remainder of 5, and 26 divided by 5 gives a remainder of 1.\n\n\
    ### Compound Assignment Operators\n\nIf you want to add or subtract a number to\
    \ a variable, you can use Swift code like this:\n\n```\ntemp = temp + 5\n```\n\
    \nThis command tells Swift to add 5 to the current value stored in the `temp`\
    \ variable. While this type of code will work, it can be clumsy to type the same\
    \ variable name twice.\n\nAs a shortcut, Swift offers a compound assignment operator\
    \ that looks like (`+=`) or (`-=`). To use a compound assignment operator, you\
    \ need to specify a variable, the compound assignment operator you want to use,\
    \ and then the value you want to add or subtract, such as\n\n```\ntemp += 5\n\
    ```\n\nThis is equivalent to\n\n```\ntemp = temp + 5\n```\n\nTo see how compound\
    \ assignment operators work, follow these steps:\n\n1. Open the `IntroductoryPlayground`\
    \ file in Xcode.\n2. Edit the code as follows:\n\n    ```\n    import Cocoa\n\
    \    var temp = 2\n    temp += 57                // Equivalent to temp = temp\
    \ + 57\n    print (temp)\n    temp -= 7                 // Equivalent to temp\
    \ = temp - 7\n    print (temp)\n    ```\n\nAs Figure 6-1 shows, the `+=` compound\
    \ assignment operator adds 57 to the current value of `temp`. Then the `-=` compound\
    \ assignment operator subtracts 7 from the current value of `temp`.\n\n![A437923_1_En_6_Fig1_HTML.jpg](A437923_1_En_6_Fig1_HTML.jpg)\n\
    \n**Figure 6-1.** Seeing how compound assignment operators work\n\nBy combining\
    \ mathematical operators, you can create any type of calculation. However, if\
    \ you need to perform common mathematical operations such as finding the square\
    \ root or logarithm of a number, it’s much simpler and more reliable to use built-in\
    \ math functions that are part of the Cocoa framework.\n\n## Using Math Functions\n\
    \nThe Cocoa framework provides dozens of math functions that you can use. Some\
    \ of the more common math functions include the following:\n\n- Rounding functions\n\
    - Calculation functions (`sqrt`, `cbrt`, `min`/`max`, etc.)\n- Trigonometry functions\
    \ (`sin`, `cosine`, `tangent`, etc.)\n- Exponential functions\n- Logarithmic functions\n\
    \n### Rounding Functions\n\nWhen you’re working with decimal numbers, you may\
    \ want to round them to the nearest place value. However, there are many ways\
    \ to round numbers in Swift, such as\n\n- `round`: Rounds up from 0.5 and higher\
    \ and rounds down from 0.49 and lower\n- `floor`: Rounds to the lowest integer\n\
    - `ceil`: Rounds to the highest integer\n- `trunc`: Drops the decimal value\n\n\
    To see how these different rounding functions work, create a new playground by\
    \ following these steps:\n\n1. Make sure the `IntroductoryPlayground` file is\
    \ loaded in Xcode.\n2. Edit the code as follows:\n\n    ```\n    import Cocoa\n\
    \    var testNumber : Double\n    testNumber = round(36.98)\n    testNumber =\
    \ round(-36.98)\n    testNumber = round(36.08)\n    testNumber = floor(36.98)\n\
    \    testNumber = floor(-36.98)\n    testNumber = floor(36.08)\n    testNumber\
    \ = ceil(36.98)\n    testNumber = ceil(-36.98)\n    testNumber = ceil(36.08)\n\
    \    testNumber = trunc(36.98)\n    testNumber = trunc(-36.98)\n    testNumber\
    \ = trunc(36.08)\n    ```\n\nFigure 6-2 shows how each type of rounding function\
    \ works differently with both negative and positive numbers as well as how each\
    \ function rounds up or down.\n\n![A437923_1_En_6_Fig2_HTML.jpg](A437923_1_En_6_Fig2_HTML.jpg)\n\
    \n**Figure 6-2.** Seeing how different rounding functions work"
