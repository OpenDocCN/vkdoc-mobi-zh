  trans: "\n# 11. 将代码存储在函数中\n\n每个程序都会存储数据（存储在变量或诸如数组、集合或字典等数据结构中），然后以某种方式对这些数据进行操作。操作数据的代码被称为**算法**。\n\
    \n如果希望在程序中的多个位置使用同一个算法，你可以复制那段代码并将其粘贴到不同的地方。然而，如果你之后想要修改代码，这可能会带来问题。如果你复制了 20\
    \ 份相同的算法，那么你就必须修改程序中所有这 20 份副本。这不仅耗时，而且容易出错。\n\n更好的解决方案是将算法存储在程序中称为**函数**的独立部分。第\
    \ 6 章向你介绍了数学函数，但你也可以创建自己的函数。与其复制算法并将其存储在多个位置，不如将算法只存储在一个函数中。函数有几个用途：\n\n-   在程序的不同部分重用代码\n\
    -   将相关算法分组到一个地方\n-   使程序中的问题易于隔离\n\n把函数看作是构建模块。就像用砖块盖房子比用一整块岩石雕刻更容易一样，当你能够将大型程序分解为多个函数时，永远不应该尝试将其编写成一个命令列表。\n\
    \nCocoa 框架包含了许多你可以在自己的程序中使用的函数。函数背后的基本思想是，你可以在不了解其工作原理的情况下使用它。要让函数内部的代码运行，你只需按名称“调用”该函数即可。\n\
    \n你应该始终尽可能地使用 Cocoa 框架的内置函数，因为这能让你使用经过预测试的、可靠的代码来创建程序。当然，Cocoa 框架无法提供你可能会需要的每一个函数，所以你最终需要创建自己的函数。\n\
    \n函数的目的是简化代码。函数基本上用一行称为函数调用的代码替换了多行代码。\n\n你可以创建三种类型的函数：\n\n-   不接受任何数据、执行相同操作的函数\n\
    -   接受数据的函数\n-   返回值的函数\n\n记住，接受数据的函数也可以返回值。\n\n## 无参数且无返回值的简单函数\n\n最简单的函数只包含一个名称，如下所示：\n\
    \n```\nfunc functionName () {\n\n}\n```\n\n通过在大括号之间插入一行或多行代码，你可以让函数执行某些操作，例如：\n\
    \n```\nfunc simpleFunction () {\n    print (\"Hello\")\n    print (\"there\")\n\
    }\n```\n\n要运行函数内部的代码，你只需按名称调用该函数，例如：\n\n```\nsimpleFunction()\n```\n\n要了解这个函数是如何工作的，请遵循以下步骤：\n\
    \n1.  在 Xcode 中打开 `IntroductoryPlayground` 文件。\n2.  按如下方式编辑代码：\n\n```\nimport\
    \ Cocoa\nfunc simpleFunction () {\n    print (\"Hello\")\n}\nvar i = 1\nwhile\
    \ i <= 5 {\n    simpleFunction()\n    i = i + 1\n}\n```\n\n这段代码定义了一个简单的函数，它只打印\
    \ \"Hello\" 和 \"there\"。然后它使用一个 `while` 循环运行五次，并运行或调用了 `simpleFunction` 五次，如图\
    \ 11-1 所示。\n\n![A437923_1_En_11_Fig1_HTML.jpg](img/A437923_1_En_11_Fig1_HTML.jpg)\n\
    \n图 11-1. 定义和调用一个简单函数\n\n---\n\n## 操作集合\n\n当你拥有两个或更多集合时，你可以对这两个集合执行操作以创建第三个集合。一些常见的集合操作包括：\n\
    \n-   `union`：将两个集合中的所有项目合并到一个新集合中\n-   `subtracting`：从第一个集合中移除第二个集合中的项目，以形成一个新集合\n\
    -   `intersection`：找出两个集合中共有的项目，并将其存储在一个新集合中\n-   `symmetricDifference`：找出只存在于其中一个集合中，而非两个集合中都存在的项目\n\
    \n可以将 `union` 命令视为将两个集合相加，而 `subtract` 命令视为从一个集合中减去另一个集合。`union` 命令指定两个集合名称，如下所示：\n\
    \n```\nfirstSet.union(secondSet)\n```\n\n可以将其视为等同于 `firstSet` + `secondSet`，其中两个集合中的所有项目都被合并到第三个集合中。\n\
    \n`subtracting` 命令指定两个集合名称，但顺序会影响结果，例如：\n\n```\nthirdSet.subtracting(firstSet)\n\
    firstSet.subtracting(thirdSet)\n```\n\n根据每个集合的内容，这两个命令可能会产生不同的结果。假设 `thirdSet`\
    \ 包含 `[1, 2, 3, 4, 5]`，并且 `firstSet` 包含 `[1, 3, 5, 7]`。`thirdSet.subtracting(firstSet)`\
    \ 命令的工作原理如下：\n\n```\n[1, 2, 3, 4, 5] thirdSet\n[1, 3, 5, 7] firstSet\n```\n\n\
    两个集合都包含 1、3 和 5，因此这些数字被消除。从 `thirdSet` 中移除 1、3 和 5，你将剩下 `[2, 4]`。\n\n`firstSet.subtracting(thirdSet)`\
    \ 命令的工作原理如下：\n\n```\n[1, 3, 5, 7] firstSet\n[1, 2, 3, 4, 5] thirdSet\n```\n\n\
    两个集合都包含 1、3 和 5，因此这些数字被消除。从 `firstSet` 中移除 1、3 和 5，你将剩下 `{7}`。\n\n`intersecting`\
    \ 命令找出两个集合中共有的项目。`symmetricDifference` 命令找出不在两个集合中都存在的项目。可以将 `symmetricDifference`\
    \ 命令视为 `intersect` 命令的相反操作。\n\n要了解这四种操作集合的不同方式是如何工作的，请遵循以下步骤：\n\n1.  确保在 Xcode\
    \ 中加载了 `IntroductoryPlayground` 文件。\n2.  按如下方式输入代码：\n\n```\nimport Cocoa\nvar\
    \ firstSet = Set([1, 3, 5, 7])\nvar secondSet = Set([2, 4, 6, 8])\nvar thirdSet\
    \ = Set ([1, 2, 3, 4, 5])\nfirstSet.union(secondSet)\nsecondSet.subtracting(firstSet)\n\
    firstSet.subtracting(secondSet)\nfirstSet.subtracting(thirdSet)\nthirdSet.subtracting(firstSet)\n\
    firstSet.intersection(thirdSet)\nfirstSet.symmetricDifference(thirdSet)\n```\n\
    \n请注意 `subtracting` 命令根据列出两个集合的顺序而工作方式不同，如图 10-4 所示。\n\n![A437923_1_En_10_Fig4_HTML.jpg](img/A437923_1_En_10_Fig4_HTML.jpg)\n\
    \n图 10-4. 操作集合\n\n## 总结\n\n元组是一种在单个变量中存储不同数据类型的方式。与数组和字典一样，集合可以存储相同数据类型的列表。虽然数组最适合存储有序信息，字典最适合快速检索数据，但集合最适合检查项目是否属于某个集合，以及便于操作两个或多个集合。\n\
    \n如果你需要存储大量相关的数据，可以使用元组，但元组在处理大量数据时会变得笨拙。通过元组、集合、数组和字典，你可以根据特定需求以最灵活的方式存储数据。\n"
- fmt: "# Simple Functions with Parameters\n\nSimple functions can only do the same\
    \ thing over and over again regardless of changing circumstances. To make a function\
    \ more flexible, it’s more common to allow functions to accept data as input.\
    \ Such data are called parameters.\n\n`Parameters` let functions accept data and\
    \ use that data to calculate a different result. To define a parameter, you must:\n\
    \n*   List a descriptive parameter name.\n*   Specify a data type such as `Int`\
    \ or `Double`.\n\nA function that accepts one parameter looks like this:\n\n```\n\
    func functionName (parameterName: dataType) {\n}\n```\n\nTo call a function that\
    \ defines a parameter, you must specify the parameter name followed by the data\
    \ you want to give or pass to the function, such as:\n\n```\nfunctionName (parameterName:\
    \ inputData)\n```\n\nWhen calling functions with parameters, you need to make\
    \ sure you pass the correct number of parameters, list each parameter name, and\
    \ give each parameter the correct data type. So if you have a function that accepts\
    \ one string parameter, like:\n\n```\nfunc parameterFunction (name : String) {\n\
    }\n```\n\nyou can call this parameter by its name and with one (and only one)\
    \ string inside parentheses, like:\n\n```\nparameterFunction (name : “Oscar”)\n\
    ```\n\nThere are several ways a function call can fail:\n\n*   If you type the\
    \ function name incorrectly.\n*   If you don’t include the parameter name.\n*\
    \   If you don’t pass the correct number of parameters.\n*   If you don’t list\
    \ or pass parameters of the correct data type.\n\nIn this example, the `parameterFunction`\
    \ expects one parameter that must be a `String` data type. Here are all the ways\
    \ calling this function can fail:\n\n*   If you misspell the function name (`parameterFunction`).\n\
    *   If you fail to include or misspell the parameter name (`name:`).\n*   If you\
    \ don’t pass the correct number of parameters (a single `String` data type).\n\
    *   If you don’t list or pass parameters of the correct data type (one `String`\
    \ data type).\n\nTo see how a function with parameters works, follow these steps:\n\
    \n1.  Make sure your `IntroductoryPlayground` file is loaded in Xcode.\n2.  Edit\
    \ the code as follows:\n\n    ```\n    import Cocoa\n    func parameterFunction\
    \ (name : String) {\n        print (\"Hello, \" + name)\n    }\n    parameterFunction(name:\
    \ \"Oscar\")\n    ```\n\nThis Swift program calls `parameterFunction` and passes\
    \ it one string parameter (`\"Oscar\"`). When the `parameterFunction` receives\
    \ this parameter (`\"Oscar\"`), it stores it in its `name` variable. Then it prints\
    \ `\"Hello, Oscar\"`, as shown in Figure 11-2.\n\n![A437923_1_En_11_Fig2_HTML.jpg](A437923_1_En_11_Fig2_HTML.jpg)\n\
    \n**Figure 11-2.** Passing a string parameter to a function\n\nAlthough this example\
    \ uses one parameter, there’s no limit to the number of parameters a function\
    \ can accept. To accept more parameters, you just need to define additional variable\
    \ names and data types, like this:\n\n```\nfunc functionName (parameter: dataType,\
    \ parameter2 : dataType) {\n}\n```\n\nEach parameter can accept different data\
    \ types so you can pass a function a string and an integer, such as:\n\n```\n\
    func functionName (parameter: String, parameter2 : Int) {\n}\n```\n\nTo call this\
    \ function, you specify the function name and its two parameters of the proper\
    \ data type:\n\n```\nfunctionName (parameter: \"Hello\", parameter2: 48)\n```\n\
    \nIf you pass the parameters in the wrong order, the function call won’t work:\n\
    \n```\nfunctionName (parameter: 48, parameter2: \"Hello\")\n```\n\nWhen passing\
    \ parameters, always make sure you pass the correct number of parameters, the\
    \ name of each parameter, and the proper data types in the right order as well.\n\
    \n# Functions with Parameters That Return Values\n\nThe most versatile functions\
    \ are those that use parameters to accept data and then return a value based on\
    \ that data. The basic structure of a function that returns a value looks like\
    \ this:\n\n```\nfunc functionName (parameter: ParameterDataType) -> DataType {\n\
    \    return someValue\n}\n```\n\nThe function name is any arbitrary name you want\
    \ to use. Ideally, make the function name descriptive of its purpose.\n\nThe parameter\
    \ is much like declaring a variable by specifying the parameter name and its data\
    \ type that it can accept. Parameters are optional but functions without parameters\
    \ aren’t generally useful since they perform the same tasks over and over.\n\n\
    The `->` symbol defines the data type that the function name represents.\n\nThe\
    \ `return` keyword must be followed by a value or commands that calculate a value.\
    \ This value must be of the same data type that follows the `->` symbols. Any\
    \ function that returns a value can be stored in a variable of the same data type.\n\
    \nSuppose you had a function defined as follows:\n\n```\nfunc salesTax (amount:\
    \ Double) -> Double {\n    let currentTax = 0.075 // 7.5% sales tax\n    return\
    \ amount * currentTax\n}\n```\n\nThis function name is `salesTax`, it accepts\
    \ one parameter called `amount`, which can store a `Double` data type. When it\
    \ calculates a result, that result is also a `Double` data type as identified\
    \ by `Double` after the `->` symbol. The `return` keyword identifies how the function\
    \ calculates a value to return.\n\nSince this function returns a `Double` data\
    \ type, you can store the results in a variable that is also a `Double` data type.\n\
    \nTo see how this function works, follow these steps:\n\n1.  Make sure your `IntroductoryPlayground`\
    \ file is loaded in Xcode.\n2.  Edit the code as follows:\n\n    ```\n    import\
    \ Cocoa\n    func salesTax (amount: Double) -> Double {\n        let currentTax\
    \ = 0.075\n        return amount * currentTax\n    }\n    let purchasePrice =\
    \ 59.95\n    var total : Double\n    total = purchasePrice + salesTax(amount:purchasePrice)\n\
    \    print (\"Including sales tax, your total is =  \\(total)\")\n    ```\n\n\
    Notice that this code calls the `salesTax` function by passing it the value stored\
    \ in `purchasePrice`. When you type this code in the playground, you’ll see the\
    \ results displayed in the right margin, as shown in Figure 11-3. Change the values\
    \ stored in `purchasePrice` and `currentTax` to see how it affects the results\
    \ that this Swift code calculates.\n\n![A437923_1_En_11_Fig3_HTML.jpg](A437923_1_En_11_Fig3_HTML.jpg)\n\
    \n**Figure 11-3.** Defining and calling a function\n\nWhen a function returns\
    \ a value, make sure you specify:\n\n*   The data type the function represents\
    \ (`-> dataType`)\n*   The value the function name represents (`return`)\n*  \
    \ That you store the returned function value in a variable that can hold the returned\
    \ data type\n\nWhen calling a function that returns a value, make sure the data\
    \ types match. In the above example, the `salesTax` function returns a `Double`\
    \ data type so in the Swift code, this `salesTax` function value gets stored in\
    \ the `total` variable, which is also a `Double` data type."
