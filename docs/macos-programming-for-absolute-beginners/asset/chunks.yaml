  trans: '

    # 在 macOS 程序中做出决策


    使用 playground 文件来测试 `Swift` 代码既有趣又简单，因为你可以专注于学习 `Swift` 的工作原理，而不会被编写程序的其他部分所干扰。然而，你最终还需要了解
    `Swift` 代码在 playground 文件之外是如何运行的。


    在这个示例程序中，用户需要输入员工 ID 号和密码。有效的员工 ID 号必须在 100 到 150 的范围内。密码必须与字符串 `"password"` 完全匹配（虽然这并非一个非常安全的密码）。


    这意味着你将使用两个比较运算符来检查名字和密码是否有效。然后，你将使用一个逻辑运算符来确保两者都有效。


    按照以下步骤创建一个新的 macOS 项目：


    1.  在 `Xcode` 中，选择 **文件** ➤ **新建** ➤ **项目**。

    2.  在 `macOS` 类别下，单击 **应用程序**。

    3.  单击 **Cocoa 应用程序**，然后单击 **下一步** 按钮。`Xcode` 会询问产品名称。

    4.  单击 **产品名称** 文本框并输入 `BranchingProgram`。

    5.  确保 **语言** 弹出菜单显示为 `Swift`，且未选中任何复选框。

    6.  单击 **下一步** 按钮。`Xcode` 会询问你希望将项目存储在哪里。

    7.  选择一个文件夹来存储你的项目，然后单击 **创建** 按钮。

    8.  在 **项目导航器** 中单击 `MainMenu.xib` 文件。

    9.  单击 **窗口** 图标以显示用户界面的窗口，如图 7-10 所示。


    ![A437923_1_En_7_Fig10_HTML.jpg](img/A437923_1_En_7_Fig10_HTML.jpg)


    图 7-10. 显示用户界面窗口


    10. 选择 **视图** ➤ **实用工具** ➤ **显示对象库**，使对象库出现在 `Xcode` 窗口的右下角。

    11. 在用户界面上拖放两个标签、两个文本字段和一个按钮，使其看起来类似于图 7-11。


    ![A437923_1_En_7_Fig11_HTML.jpg](img/A437923_1_En_7_Fig11_HTML.jpg)


    图 7-11. 使用标签、文本字段和按钮创建基本用户界面


    12. 单击顶部标签以选中它。然后选择 **视图** ➤ **实用工具** ➤ **显示属性检查器**。属性检查器面板会出现在 `Xcode` 窗口的右上角，如图
    7-12 所示。


    ![A437923_1_En_7_Fig12_HTML.jpg](img/A437923_1_En_7_Fig12_HTML.jpg)


    图 7-12. 标签的属性检查器面板


    13. 单击 **标题** 文本框，将 `Label` 替换为 `ID`。按下 **Return** 键。注意顶部标签现在显示为 `ID`。当你更改标签的
    **标题** 属性时，也就更改了该标签上显示的文本。接下来看看更改标签文本的第二种更快的方法。

    14. 双击第二个标签。`Xcode` 会高亮显示你选中的标签，如图 7-13 所示。


    ![A437923_1_En_7_Fig13_HTML.jpg](img/A437923_1_En_7_Fig13_HTML.jpg)


    图 7-13. 双击标签即可更改文本，无需使用属性检查器面板


    15. 输入 `Password` 并按下 **Return** 键。注意第二个标签现在显示为 `Password`。通过双击标签，你可以更改标签上的文本，而无需打开属性检查器面板。

    16. 单击顶部文本字段，然后选择 **视图** ➤ **实用工具** ➤ **显示大小检查器**。大小检查器面板会出现在 `Xcode` 窗口的右上角，如图
    7-14 所示。


    ![A437923_1_En_7_Fig14_HTML.jpg](img/A437923_1_En_7_Fig14_HTML.jpg)


    图 7-14. 大小检查器面板


    17. 单击 **宽度** 文本框并输入 `250`。然后按下 **Return** 键。`Xcode` 会扩展该文本字段的宽度。

    18. 单击第二个文本字段，使其周围出现操作柄。然后将最右侧的操作柄向右拖动，直到它与顶部文本字段对齐，如图 7-15 所示。


    ![A437923_1_En_7_Fig15_HTML.jpg](img/A437923_1_En_7_Fig15_HTML.jpg)


    图 7-15.

    '
- fmt: "# Aligning a Text Field Using the Mouse\n\n19. Release the mouse button. Just\
    \ as you can modify text on a label by using either the Attributes Inspector pane\
    \ or double-clicking directly on that label, so can you modify the size of an\
    \ item through the Size Inspector pane or by resizing that item with the mouse.\n\
    \n20. Double-click the push button to select it and type `Check Password`. Then\
    \ press Return. Your completed interface should look similar to Figure [7-16](#A437923_1_En_7_Chapter.html#Fig16).\n\
    \n![A437923_1_En_7_Fig16_HTML.jpg](A437923_1_En_7_Fig16_HTML.jpg)\n\n**Figure\
    \ 7-16.** The completed user interface\n\nWith this user interface, the user will\
    \ type an ID (an integer) into the ID text field, a password (string) in the Password\
    \ text field, and then click the `Check Password` button to see if the ID and\
    \ password are valid. Once you have a user interface, the next step is to connect\
    \ the user interface to Swift code using `IBOutlets` and `IBAction` methods.\n\
    \nRemember, `IBOutlets` let you retrieve or display information to a user interface.\
    \ `IBAction` methods let the user interface make your program do something.\n\n\
    In this example, you’ll need two `IBOutlet` variables to connect to each text\
    \ field so you can retrieve the data the user types in. Then you’ll need one `IBAction`\
    \ method to connect to the `Check Password` button. This way, when the user clicks\
    \ the `Check Password` button, the `IBAction` method can verify the ID and password.\n\
    \nTo connect Swift code to your user interface, follow these steps:\n\n1. With\
    \ your user interface still visible in the Xcode window, choose **View ➤ Assistant\
    \ Editor ➤ Show Assistant Editor**. The `AppDelegate.swift` file appears next\
    \ to the user interface, as shown in Figure [7-17](#A437923_1_En_7_Chapter.html#Fig17).\n\
    \n![A437923_1_En_7_Fig17_HTML.jpg](A437923_1_En_7_Fig17_HTML.jpg)\n\n**Figure\
    \ 7-17.** The Assistant Editor displays the user interface next to the `AppDelegate.swift`\
    \ file\n\n2. Move the mouse over the top text field, hold down the **Control**\
    \ key, and drag from the top text field to underneath the existing `@IBOutlet`\
    \ line in the `AppDelegate.swift` file, as shown in Figure [7-18](#A437923_1_En_7_Chapter.html#Fig18).\n\
    \n![A437923_1_En_7_Fig18_HTML.jpg](A437923_1_En_7_Fig18_HTML.jpg)\n\n**Figure\
    \ 7-18.** Control-dragging from the top text field to the `AppDelegate.swift`\
    \ file\n\n3. Release the mouse and the **Control** key. A pop-up window appears,\
    \ as shown in Figure [7-19](#A437923_1_En_7_Chapter.html#Fig19).\n\n![A437923_1_En_7_Fig19_HTML.jpg](A437923_1_En_7_Fig19_HTML.jpg)\n\
    \n**Figure 7-19.** The pop-up window for defining an `IBOutlet`\n\n4. Click in\
    \ the **Name** text field and type `IDField` and click the **Connect** button.\
    \ Xcode creates an `IBOutlet`.\n\n5. Move the mouse over the bottom text field,\
    \ hold down the **Control** key, and drag the mouse underneath the `@IBOutlet`\
    \ line in the `AppDelegate.swift` file.\n\n6. Release the mouse and the **Control**\
    \ key. A pop-up window appears.\n\n7. Click in the **Name** text field and type\
    \ `PasswordField` and click the **Connect** button. Xcode creates another `IBOutlet`.\
    \ You should now have two `IBOutlets` that represent the two text fields on your\
    \ user interface:\n\n```swift\n@IBOutlet weak var IDField: NSTextField!\n@IBOutlet\
    \ weak var PasswordField: NSTextField!\n```\n\n8. Move the mouse over the **Check\
    \ Password** push button, hold down the **Control** key, and drag the mouse above\
    \ the last curly bracket in the `AppDelegate.swift` file, as shown in Figure [7-20](#A437923_1_En_7_Chapter.html#Fig20).\n\
    \n![A437923_1_En_7_Fig20_HTML.jpg](A437923_1_En_7_Fig20_HTML.jpg)\n\n**Figure\
    \ 7-20.** Control dragging from the push button to the `AppDelegate.swift` file\n\
    \n9. Release the mouse and the **Control** key. A pop-up window appears.\n\n10.\
    \ Click in the **Connection** pop-up menu and choose **Action** to create an `IBAction`\
    \ method.\n\n11. Click in the **Name** text field and type `checkPassword`.\n\n\
    12. Click in the **Type** pop-up menu and choose `NSButton`, as shown in Figure\
    \ [7-21](#A437923_1_En_7_Chapter.html#Fig21).\n\n![A437923_1_En_7_Fig21_HTML.jpg](A437923_1_En_7_Fig21_HTML.jpg)\n\
    \n**Figure 7-21.** Defining an `IBAction` method\n\n13. Click the **Connect**\
    \ button. Xcode creates a blank `IBAction` method.\n\n14. Modify the `IBAction`\
    \ `checkPassword` method as follows:\n\n```swift\n@IBAction func checkPassword(sender:\
    \ NSButton) {\n    let validPassword = \"password\"\n    var ID : Int\n    ID\
    \ = IDField.integerValue\n    let myAlert = NSAlert()\n    switch ID {\n    case\
    \ 100...150: if (PasswordField.stringValue == validPassword) {\n        myAlert.messageText\
    \ = \"Access granted\"\n    } else {\n        myAlert.messageText = \"No access\"\
    \n    }\n    default:\n        myAlert.messageText = \"No access\"\n    }\n  \
    \  myAlert.runModal()\n}\n```\n\nThis `IBAction` method uses a `switch` statement\
    \ to check if the user typed an ID that falls within the `100...150` range. If\
    \ so, then it checks if the user typed “password” in the Password text field.\
    \ If this is also true, then the `switch` statement displays “Access granted”\
    \ in an Alert dialog. If the ID does not fall within the `100...150` range or\
    \ the Password text field does not contain “password”, then the Alert dialog displays\
    \ “No access.” In the above `IBAction` code, you could also replace these two\
    \ lines:\n\n```swift\nvar ID : Int\nID = IDField.integerValue\n```\n\nwith a single\
    \ line that uses type inference like this:\n\n```swift\nvar ID = IDField.integerValue\n\
    ```\n\n**Note:** You may be wondering where `stringValue` and `integerValue` came\
    \ from in the above code. If you look at your `IBOutlets`, you’ll see that each\
    \ text field `IBOutlet` is based on the `NSTextField` class. Look up `NSTextField`\
    \ in Xcode’s documentation and you’ll see that `NSTextField` is based on the `NSControl`\
    \ class. The `NSControl` class contains properties like `stringValue` and `integerValue`\
    \ so that means anything based on `NSTextField` (such as the `IBOutlets` that\
    \ represent the text fields on your user interface) can also use these `stringValue`\
    \ and `integerValue` properties.\n\n15. Choose **Product ➤ Run**. Xcode runs your\
    \ `BranchingProgram` project.\n\n16. Click in the **ID** text field of your `BranchingProgram`\
    \ user interface and type `120`.\n\n17. Click in the **Password** text field of\
    \ your `BranchingProgram` user interface and type `password`.\n\n18. Click the\
    \ **Check Password** push button. An Alert dialog appears, as shown in Figure\
    \ [7-22](#A437923_1_En_7_Chapter.html#Fig22).\n\n![A437923_1_En_7_Fig22_HTML.jpg](A437923_1_En_7_Fig22_HTML.jpg)\n\
    \n**Figure 7-22.** Displaying an Alert dialog\n\n19. Click the **OK** button in\
    \ the Alert dialog to make it go away.\n\n20. Click in the **ID** text field of\
    \ your `BranchingProgram` user interface and type `1`.\n\n21. Click the **Check\
    \ Password** push button. Notice that now the Alert dialog displays “No access.”\n\
    \n22. Click the **OK** button in the Alert dialog to make it go away.\n\n23. Choose\
    \ **BranchingProgram ➤ Quit BranchingProgram**."
  raw: "Aligning a text field using the mouse  \n19.  Release the mouse button. Just\
    \ as you can modify text on a label by using either the Attributes Inspector pane\
    \ or double-clicking directly on that label, so can you modify the size of an\
    \ item through the Size Inspector pane or by resizing that item with the mouse.\
    \  \n20.  Double-click the push button to select it and type Check Password. Then\
    \ press Return. Your completed interface should look similar to Figure [7-16](#A437923_1_En_7_Chapter.html#Fig16).\n\
    \n![A437923_1_En_7_Fig16_HTML.jpg](A437923_1_En_7_Fig16_HTML.jpg)\n\nFigure 7-16.\n\
    \nThe completed user interface\n\nWith this user interface, the user will type\
    \ an ID (an integer) into the ID text field, a password (string) in the Password\
    \ text field, and then click the Check Password button to see if the ID and password\
    \ are valid. Once you have a user interface, the next step is to connect the user\
    \ interface to Swift code using IBOutlets and IBAction methods.\n\nRemember, IBOutlets\
    \ let you retrieve or display information to a user interface. IBAction methods\
    \ let the user interface make your program do something.\n\nIn this example, you’ll\
    \ need two IBOutlet variables to connect to each text field so you can retrieve\
    \ the data the user types in. Then you’ll need one IBAction method to connect\
    \ to the Check Password button. This way, when the user clicks the Change Password\
    \ button, the IBAction method can verify the ID and password.\n\nTo connect Swift\
    \ code to your user interface, follow these steps:\n\n1.  With your user interface\
    \ still visible in the Xcode window, choose View ➤ Assistant Editor ➤ Show Assistant\
    \ Editor. The `AppDelegate.swift` file appears next to the user interface, as\
    \ shown in Figure [7-17](#A437923_1_En_7_Chapter.html#Fig17).\n\n![A437923_1_En_7_Fig17_HTML.jpg](A437923_1_En_7_Fig17_HTML.jpg)\n\
    \nFigure 7-17.\n\nThe Assistant Editor displays the user interface next to the\
    \ AppDelegate.swift file  \n2.  Move the mouse over the top text field, hold down\
    \ the Control key, and drag from the top text field to underneath the existing\
    \ `@IBOutlet` line in the `AppDelegate.swift` file , as shown in Figure [7-18](#A437923_1_En_7_Chapter.html#Fig18).\n\
    \n![A437923_1_En_7_Fig18_HTML.jpg](A437923_1_En_7_Fig18_HTML.jpg)\n\nFigure 7-18.\n\
    \nControl-dragging from the top text field to the AppDelegate.swift file  \n3.\
    \  Release the mouse and the Control key. A pop-up window appears, as shown in\
    \ Figure [7-19](#A437923_1_En_7_Chapter.html#Fig19).\n\n![A437923_1_En_7_Fig19_HTML.jpg](A437923_1_En_7_Fig19_HTML.jpg)\n\
    \nFigure 7-19.\n\nThe pop-up window for defining an IBOutlet  \n4.  Click in the\
    \ Name text field and type IDField and click the Connect button. Xcode creates\
    \ an IBOutlet.  \n5.  Move the mouse over the bottom text field, hold down the\
    \ Control key, and drag the mouse underneath the `@IBOutlet` line in the AppDelegate.swift\
    \ file .  \n6.  Release the mouse and the Control key. A pop-up window appears.\
    \  \n7.  Click in the Name text field and type PasswordField and click the Connect\
    \ button. Xcode creates another IBOutlet. You should now have two IBOutlets that\
    \ represent the two text fields on your user interface:\n\n```\n    @IBOutlet\
    \ weak var IDField: NSTextField!\n    @IBOutlet weak var PasswordField: NSTextField!\n\
    \    ```\n\n8.  Move the mouse over the Check Password push button, hold down\
    \ the Control key, and drag the mouse above the last curly bracket in the `AppDelegate.swift`\
    \ file , as shown in Figure [7-20](#A437923_1_En_7_Chapter.html#Fig20).\n\n![A437923_1_En_7_Fig20_HTML.jpg](A437923_1_En_7_Fig20_HTML.jpg)\n\
    \nFigure 7-20.\n\nControl dragging from the push button to the AppDelegate.swift\
    \ file  \n9.  Release the mouse and the Control key. A pop-up window appears.\
    \  \n10.  Click in the Connection pop-up menu and choose Action to create an IBAction\
    \ method.  \n11.  Click in the Name text field and type checkPassword.  \n12.\
    \  Click in the Type pop-up menu and choose NSButton, as shown in Figure [7-21](#A437923_1_En_7_Chapter.html#Fig21).\n\
    \n![A437923_1_En_7_Fig21_HTML.jpg](A437923_1_En_7_Fig21_HTML.jpg)\n\nFigure 7-21.\n\
    \nDefining an IBAction method  \n13.  Click the Connect button. Xcode creates\
    \ a blank IBAction method.  \n14.  Modify the IBAction checkPassword method as\
    \ follows:\n\n```\n    @IBAction func checkPassword(sender: NSButton) {\n    let\
    \ validPassword = \"password\"\n    var ID : Int\n    ID = IDField.integerValue\n\
    \    let myAlert = NSAlert()\n    switch ID {\n    case 100...150: if (PasswordField.stringValue\
    \ == validPassword) {\n    myAlert.messageText = \"Access granted\"\n    } else\
    \ {\n    myAlert.messageText = \"No access\"\n    }\n    default:\n    myAlert.messageText\
    \ = \"No access\"\n    }\n    myAlert.runModal()\n    }\n    ```\n\nThis IBAction\
    \ method uses a switch statement to check if the user typed an ID that falls within\
    \ the 100…150 range. If so, then it checks if the user typed “password” in the\
    \ Password text field. If this is also true, then the switch statement displays\
    \ “Access granted” in an Alert dialog. If the ID does not fall within the 100…150\
    \ range or the Password text field does not contain “password”, then the Alert\
    \ dialog displays “No access.” In the above IBAction code, you could also replace\
    \ these two lines:\n\n```\n    var ID : Int\n    ID = IDField.integerValue\n \
    \   ```\n\nwith a single line that uses type inference like this:\n\n```\n   \
    \ var ID = IDField.integerValue\n    ```\n\nNote You may be wondering where `stringValue`\
    \ and `integerValue` came from in the above code. If you look at your IBOutlets,\
    \ you’ll see that each text field IBOutlet is based on the `NSTextField` class.\
    \ Look up `NSTextField` in Xcode’s documentation and you’ll see that `NSTextField`\
    \ is based on the `NSControl` class. The `NSControl` class contains properties\
    \ like `stringValue` and `integerValue` so that means anything based on `NSTextField`\
    \ (such as the IBOutlets that represent the text fields on your user interface)\
    \ can also use these `stringValue` and `integerValue` properties.  \n15.  Choose\
    \ Product ➤ Run. Xcode runs your BranchingProgram project.  \n16.  Click in the\
    \ ID text field of your BranchingProgram user interface and type 120.  \n17. \
    \ Click in the Password text field of your BranchingProgram user interface and\
    \ type password.  \n18.  Click the Check Password push button. An Alert dialog\
    \ appears, as shown in Figure [7-22](#A437923_1_En_7_Chapter.html#Fig22).\n\n\
    ![A437923_1_En_7_Fig22_HTML.jpg](A437923_1_En_7_Fig22_HTML.jpg)\n\nFigure 7-22.\n\
    \nDisplaying an Alert dialog  \n19.  Click the OK button in the Alert dialog to\
    \ make it go away.  \n20.  Click in the ID text field of your BranchingProgram\
    \ user interface and type 1.  \n21.  Click the Check Password push button. Notice\
    \ that now the Alert dialog displays “No access.”  \n22.  Click the OK button\
    \ in the Alert dialog to make it go away.  \n23.  Choose BranchingProgram ➤ Quit\
    \ BranchingProgram."
  trans: "\n# 使用鼠标对齐文本字段\n\n19. 松开鼠标按钮。就像你可以通过属性检查器面板或直接双击标签来修改标签上的文本一样，你也可以通过大小检查器面板或使用鼠标调整项目大小来修改项目的大小。\n\
    \n20. 双击该按钮以选中它，然后输入 `Check Password`。接着按下 Return 键。你完成的界面应类似于图 7-16。\n\n![A437923_1_En_7_Fig16_HTML.jpg](img/A437923_1_En_7_Fig16_HTML.jpg)\n\
    \n**图 7-16.** 完成的用户界面\n\n通过这个用户界面，用户将在 ID 文本字段中输入一个 ID（整数），在密码文本字段中输入密码（字符串），然后点击`Check\
    \ Password`按钮来查看 ID 和密码是否有效。一旦你拥有了用户界面，下一步就是使用 `IBOutlets` 和 `IBAction` 方法将用户界面连接到\
    \ Swift 代码。\n\n请记住，`IBOutlets` 让你能够从用户界面检索信息或向用户界面显示信息。`IBAction` 方法则让用户界面能够促使你的程序执行某些操作。\n\
    \n在这个示例中，你需要两个 `IBOutlet` 变量来连接每个文本字段，以便你能够检索用户输入的数据。然后，你需要一个 `IBAction` 方法来连接到\
    \ `Check Password` 按钮。这样，当用户点击 `Check Password` 按钮时，这个 `IBAction` 方法就能验证 ID 和密码。\n\
    \n要将 Swift 代码连接到用户界面，请遵循以下步骤：\n\n1. 在 Xcode 窗口中用户界面仍然可见的情况下，选择 **View ➤ Assistant\
    \ Editor ➤ Show Assistant Editor**。`AppDelegate.swift` 文件会显示在用户界面旁边，如图 7-17 所示。\n\
    \n![A437923_1_En_7_Fig17_HTML.jpg](img/A437923_1_En_7_Fig17_HTML.jpg)\n\n**图 7-17.**\
    \ 助理编辑器将用户界面显示在 `AppDelegate.swift` 文件旁边\n\n2. 将鼠标移到顶部的文本字段上，按住 **Control** 键，然后从顶部文本字段拖拽到\
    \ `AppDelegate.swift` 文件中现有 `@IBOutlet` 行的下方，如图 7-18 所示。\n\n![A437923_1_En_7_Fig18_HTML.jpg](img/A437923_1_En_7_Fig18_HTML.jpg)\n\
    \n**图 7-18.** 从顶部文本字段按住 Control 键拖拽到 `AppDelegate.swift` 文件\n\n3. 松开鼠标和 **Control**\
    \ 键。会弹出一个窗口，如图 7-19 所示。\n\n![A437923_1_En_7_Fig19_HTML.jpg](img/A437923_1_En_7_Fig19_HTML.jpg)\n\
    \n**图 7-19.** 用于定义 `IBOutlet` 的弹出窗口\n\n4. 点击 **Name** 文本字段，输入 `IDField`，然后点击 **Connect**\
    \ 按钮。Xcode 会创建一个 `IBOutlet`。\n\n5. 将鼠标移到底部的文本字段上，按住 **Control** 键，将鼠标拖拽到 `AppDelegate.swift`\
    \ 文件中 `@IBOutlet` 行的下方。\n\n6. 松开鼠标和 **Control** 键。会弹出一个窗口。\n\n7. 点击 **Name** 文本字段，输入\
    \ `PasswordField`，然后点击 **Connect** 按钮。Xcode 会创建另一个 `IBOutlet`。你现在应该有两个 `IBOutlets`，分别代表你用户界面上的两个文本字段：\n\
    \n```swift\n@IBOutlet weak var IDField: NSTextField!\n@IBOutlet weak var PasswordField:\
    \ NSTextField!\n```\n\n8. 将鼠标移到 **Check Password** 按钮上，按住 **Control** 键，然后将鼠标拖拽到\
    \ `AppDelegate.swift` 文件中最后一个大括号的上方，如图 7-20 所示。\n\n![A437923_1_En_7_Fig20_HTML.jpg](img/A437923_1_En_7_Fig20_HTML.jpg)\n\
    \n**图 7-20.** 从按钮按住 Control 键拖拽到 `AppDelegate.swift` 文件\n\n9. 松开鼠标和 **Control**\
    \ 键。会弹出一个窗口。\n\n10. 点击 **Connection** 弹出菜单，选择 **Action** 以创建一个 `IBAction` 方法。\n\
    \n11. 点击 **Name** 文本字段，输入 `checkPassword`。\n\n12. 点击 **Type** 弹出菜单，选择 `NSButton`，如图\
    \ 7-21 所示。\n\n![A437923_1_En_7_Fig21_HTML.jpg](img/A437923_1_En_7_Fig21_HTML.jpg)\n\
    \n**图 7-21.** 定义一个 `IBAction` 方法\n\n13. 点击 **Connect** 按钮。Xcode 会创建一个空的 `IBAction`\
    \ 方法。\n\n14. 按如下方式修改 `IBAction` `checkPassword` 方法：\n\n```swift\n@IBAction func\
    \ checkPassword(sender: NSButton) {\n    let validPassword = \"password\"\n  \
    \  var ID : Int\n    ID = IDField.integerValue\n    let myAlert = NSAlert()\n\
    \    switch ID {\n    case 100...150: if (PasswordField.stringValue == validPassword)\
    \ {\n        myAlert.messageText = \"Access granted\"\n    } else {\n        myAlert.messageText\
    \ = \"No access\"\n    }\n    default:\n        myAlert.messageText = \"No access\"\
    \n    }\n    myAlert.runModal()\n}\n```\n\n这个 `IBAction` 方法使用一个 `switch` 语句来检查用户输入的\
    \ ID 是否在 `100...150` 范围内。如果是，接着检查用户在密码文本字段中是否输入了 “password”。如果这也是真的，那么 `switch`\
    \ 语句会在一个警报对话框中显示 “Access granted”。如果 ID 不在 `100...150` 范围内，或者密码文本字段中没有包含 “password”，那么警报对话框会显示\
    \ “No access。”。在上述 `IBAction` 代码中，你也可以将这两行代码：\n\n```swift\nvar ID : Int\nID =\
    \ IDField.integerValue\n```\n\n替换为使用类型推断的一行代码，如下所示：\n\n```swift\nvar ID = IDField.integerValue\n\
    ```\n\n**注意：** 你可能想知道上述代码中的 `stringValue` 和 `integerValue` 是从哪里来的。如果你查看你的 `IBOutlets`，你会发现每个文本字段的\
    \ `IBOutlet` 都基于 `NSTextField` 类。在 Xcode 的文档中查找 `NSTextField`，你会发现 `NSTextField`\
    \ 基于 `NSControl` 类。`NSControl` 类包含像 `stringValue` 和 `integerValue` 这样的属性，这意味着任何基于\
    \ `NSTextField` 的对象（例如代表你用户界面上文本字段的 `IBOutlets`）也可以使用这些 `stringValue` 和 `integerValue`\
    \ 属性。\n\n15. 选择 **Product ➤ Run**。Xcode 会运行你的 `BranchingProgram` 项目。\n\n16. 点击你的\
    \ `BranchingProgram` 用户界面的 **ID** 文本字段，输入 `120`。\n\n17. 点击你的 `BranchingProgram`\
    \ 用户界面的 **Password** 文本字段，输入 `password`。\n\n18. 点击 **Check Password** 按钮。会弹出一个警报对话框，如图\
    \ 7-22 所示。\n\n![A437923_1_En_7_Fig22_HTML.jpg](img/A437923_1_En_7_Fig22_HTML.jpg)\n\
    \n**图 7-22.** 显示一个警报对话框\n\n19. 点击警报对话框中的 **OK** 按钮使其消失。\n\n20. 点击你的 `BranchingProgram`\
    \ 用户界面的 **ID** 文本字段，输入 `1`。\n\n21. 点击 **Check Password** 按钮。注意，现在警报对话框显示的是 “No\
    \ access。”\n\n22. 点击警报对话框中的 **OK** 按钮使其消失。\n\n23. 选择 **BranchingProgram ➤ Quit\
    \ BranchingProgram**。\n"
- fmt: "# Summary\n\nTo respond intelligently to the user, every program needs a way\
    \ to make decisions. The first step to making a decision is to define a Boolean\
    \ value, which is either `true` or `false`. Boolean values can be calculated through\
    \ comparison operators or logical operators.\n\nOnce you can determine a Boolean\
    \ value, then you can use that Boolean value to decide which code to follow in\
    \ a branching statement. The simplest branch is an `if` statement that either\
    \ runs a set of code or does nothing at all.\n\nAnother branch is the `if-else`\
    \ statement, which offers exactly two sets of code to run. If a Boolean value\
    \ is `true`, then the first set of code runs. Otherwise, the second set of code\
    \ runs.\n\nIf you want to choose between three or more sets of code to run, you\
    \ can use an `if-else-if` statement. However, it’s often simpler to use a `switch`\
    \ statement instead. When using a `switch` statement, you must anticipate all\
    \ possible values.\n\nA `switch` statement lets you match an exact value, a list\
    \ of values, a range of values (which includes the beginning and ending numbers),\
    \ a half range of values (which only includes the beginning number but not the\
    \ end), or `<`, `<=`, `>`, and `>=` comparisons.\n\nBranching statements combined\
    \ with Boolean values gives your program the ability to make decisions and run\
    \ different code based on the data it receives. Branching statements essentially\
    \ let your program respond intelligently to outside data.\n\n# 8. Repeating Code\
    \ with Loops\n\nThe basic goal of programming is to write as little code as possible\
    \ that does as much as possible. The less code you write, the easier the program\
    \ will be to understand and to modify later. The more your code does, the more\
    \ powerful your program will be.\n\nOne way to write less code is to reuse code\
    \ stored in functions. A second way to reuse code is through loops. A loop runs\
    \ one or more lines of code multiple times, thereby eliminating the need to write\
    \ multiple, redundant lines of code.\n\nFor example, if you want to print a message\
    \ five times, you can write the following:\n\n```\nprint (\"Hello\")\nprint (\"\
    Hello\")\nprint (\"Hello\")\nprint (\"Hello\")\nprint (\"Hello\")\n```\n\nThis\
    \ is tedious but it will work. However, if you suddenly decide you need to print\
    \ a message a thousand times, now you must write that command a thousand times.\
    \ Not only is typing the same command tedious, but it increases the chance of\
    \ making a mistake in one of those commands.\n\nA far simpler method is to use\
    \ a loop. A loop lets you write one or more commands once and then run those commands\
    \ as many times as you want, such as:\n\n```\nvar counter = 1\nwhile counter <=\
    \ 5 {\n    print (\"Hello\")\n    counter = counter + 1\n}\n```\n\nThe above loop\
    \ runs five times and prints \"Hello\" five times. If you want to print \"Hello\"\
    \ a thousand times, you can just replace the number 5 with the number 1000. Loops\
    \ make code easier to write and modify while doing more work at the same time.\n\
    \n## The `while` Loop\n\nThe simplest loop in Swift is called the `while` loop,\
    \ which looks like this:\n\n```\nwhile BooleanValue {\n}\n```\n\nBefore the `while`\
    \ loop does anything, it first checks if a Boolean value is `true` or `false`.\
    \ If it's `true`, then it runs the code inside its curly brackets once. Then it\
    \ checks its Boolean value again to see if it's changed to `false` or if it's\
    \ still `true`. The moment this Boolean value becomes `false`, the `while` loop\
    \ stops.\n\nBecause the `while` loop checks a Boolean value before doing anything,\
    \ it's possible that the `while` loop may never run any of its code. More importantly,\
    \ the `while` loop only runs if its Boolean value is `true`. This means somewhere\
    \ inside the `while` loop's curly brackets, there must be code that eventually\
    \ changes this Boolean value to `false`.\n\nIf a `while` loop fails to change\
    \ its Boolean value from `true` to `false`, then the loop will run forever, which\
    \ is known as an endless loop. An endless loop may crash or freeze your program\
    \ so it no longer responds to the user.\n\nAt the simplest level, a `while` loop's\
    \ Boolean value can just be `true` or `false`, such as:\n\n```\nwhile true {\n\
    }\n```\n\nMore commonly, `while` loops use comparison operators to determine a\
    \ Boolean value, such as:\n\n```\nwhile counter <= 5 {\n}\n```\n\nAs long as `counter\
    \ <= 5` remains `true`, the `while` loop will run. The moment `counter <= 5` is\
    \ no longer `true`, the `while` loop will stop.\n\nWhen using `while` loops, you\
    \ need to define the Boolean value before the loop begins (to make sure it's either\
    \ `true` or `false`) and then you must change the Boolean value somewhere inside\
    \ the `while` loop (to make sure the `while` loop eventually stops).\n\nTo see\
    \ how Boolean values work with a `while` loop, create a new playground by following\
    \ these steps:\n\n1. Open the Introductory Playground file in Xcode.\n2. Edit\
    \ the code as follows:\n\n    ```\n    import Cocoa\n    var counter = 1\n   \
    \ while counter <= 10 {\n        print (\"Hello\")\n        counter = counter\
    \ + 1\n    }\n    ```\n\nNote that the `var counter = 1` line defines the variable\
    \ that the `while` loop uses to determine a Boolean value (`true` or `false`).\
    \ Also note the `counter = counter + 1` line inside the `while` loop. This constantly\
    \ changes the variable used by the `while` loop to determine when to stop. By\
    \ changing the Boolean comparison (`counter <= 10`), you can change how many times\
    \ the `while` loop runs.\n\nTo make sure you can see what the `print` command\
    \ does, click the Show Debug area icon in the bottom left corner to make the Debug\
    \ area appear, as shown in Figure 8-1.\n\n![A437923_1_En_8_Fig1_HTML.jpg](A437923_1_En_8_Fig1_HTML.jpg)\n\
    \n**Figure 8-1.** Running a `while` loop in a playground\n\nWhen using a `while`\
    \ loop, keep in mind the following:\n\n- Before the `while` loop, make sure to\
    \ define any variables used by the `while` loop's Boolean value (such as the `var\
    \ counter = 1` line).\n- A `while` loop may run zero or more times.\n- Inside\
    \ the `while` loop, make sure the Boolean value used by the `while` loop can change\
    \ to `false` eventually to avoid creating an endless loop (such as the `counter\
    \ = counter + 1` line).\n\n## The `repeat-while` Loop\n\nAs an alternative to\
    \ the `while` loop, Swift also offers a `repeat-while` loop that works exactly\
    \ the same way. The only difference is that instead of checking a Boolean value\
    \ before running, the `repeat-while` loop checks its Boolean value after it runs.\n\
    \nThis means the `repeat-while` loop will always run at least once. The structure\
    \ of a `repeat-while` loop looks like this:\n\n```\nrepeat {\n} while BooleanValue\n\
    ```\n\nLike the `while` loop, the `repeat-while` loop also needs code inside its\
    \ loop that can change its Boolean value from `true` to `false`, and it also needs\
    \ code before the `repeat-while` loop to initialize any variables that are used\
    \ to calculate the `repeat-while` loop's Boolean value.\n\nTo see how Boolean\
    \ values work with a `repeat-while` loop, follow these steps:\n\n1. Make sure\
    \ the IntroductoryPlayground file is loaded in Xcode.\n2. Edit the code as follows:\n\
    \n    ```\n    import Cocoa\n    var counter = 1\n    repeat {\n        print\
    \ (\"Goodbye\")\n        counter = counter + 1\n    } while counter <= 10\n  \
    \  ```\n\nNotice that the Boolean value (`counter <= 10`) determines how many\
    \ times the `repeat-while` loop runs, as shown in Figure 8-2.\n\n![A437923_1_En_8_Fig2_HTML.jpg](A437923_1_En_8_Fig2_HTML.jpg)\n\
    \n**Figure 8-2.** Running a `repeat-while` loop in a playground\n\nRemember, the\
    \ main difference between the `while` loop and the `repeat-while` loop is that\
    \ the `repeat-while` loop always runs at least once while the `while` loop may\
    \ never run at all if its Boolean value is initially `false`."
  raw: "## Summary\n\nTo respond intelligently to the user, every program needs a\
    \ way to make decisions. The first step to making a decision is to define a Boolean\
    \ value, which is either true or false. Boolean values can be calculated through\
    \ comparison operators or logical operators.\n\nOnce you can determine a Boolean\
    \ value , then you can use that Boolean value to decide which code to follow in\
    \ a branching statement. The simplest branch is an if statement that either runs\
    \ a set of code or does nothing at all.\n\nAnother branch is the if-else statement\
    \ , which offers exactly two sets of code to run. If a Boolean value is true,\
    \ then the first set of code runs. Otherwise, the second set of code runs.\n\n\
    If you want to choose between three or more sets of code to run, you can use an\
    \ if-else-if statement . However, it’s often simpler to use a switch statement\
    \ instead. When using a switch statement, you must anticipate all possible values.\n\
    \nA switch statement lets you match an exact value, a list of values, a range\
    \ of values (which includes the beginning and ending numbers), a half range of\
    \ values (which only includes the beginning number but not the end), or <, <=,\
    \ >, and > = comparisons.\n\nBranching statements combined with Boolean values\
    \ gives your program the ability to make decisions and run different code based\
    \ on the data it receives. Branching statements essentially let your program respond\
    \ intelligently to outside data.\n\n# 8. Repeating Code with Loops\n\nThe basic\
    \ goal of programming is to write as little code as possible that does as much\
    \ as possible. The less code you write, the easier the program will be to understand\
    \ and to modify later. The more your code does, the more powerful your program\
    \ will be.\n\nOne way to write less code is to reuse code stored in functions.\
    \ A second way to reuse code is through loops. A loop runs one or more lines of\
    \ code multiple times, thereby eliminating the need to write multiple, redundant\
    \ lines of code.\n\nFor example, if you want to print a message five times, you\
    \ can write the following:\n\n```\nprint (\"Hello\")\nprint (\"Hello\")\nprint\
    \ (\"Hello\")\nprint (\"Hello\")\nprint (\"Hello\")\n```\n\nThis is tedious but\
    \ it will work. However, if you suddenly decide you need to print a message a\
    \ thousand times, now you must write that command a thousand times. Not only is\
    \ typing the same command tedious, but it increases the chance of making a mistake\
    \ in one of those commands.\n\nA far simpler method is to use a loop. A loop lets\
    \ you write one or more commands once and then run those commands as many times\
    \ as you want, such as\n\n```\nvar counter = 1\nwhile counter <= 5 {\nprint (\"\
    Hello\")\ncounter = counter + 1\n}\n```\n\nThe above loop runs five times and\
    \ prints “Hello” five times. If you want to print “Hello” a thousand times, you\
    \ can just replace the number 5 with the number 1000\\. Loops make code easier\
    \ to write and modify while doing more work at the same time.\n\n## The while\
    \ Loop\n\nThe simplest loop in Swift is called the while loop, which looks like\
    \ this:\n\n```\nwhile BooleanValue {\n}\n```\n\nBefore the while loop does anything,\
    \ it first checks if a Boolean value is true or false. If it’s true, then it runs\
    \ the code inside its curly brackets once. Then it checks its Boolean value again\
    \ to see if it’s changed to false or if it’s still true. The moment this Boolean\
    \ value becomes false, the while loop stops.\n\nBecause the while loop checks\
    \ a Boolean value before doing anything, it’s possible that the while loop may\
    \ never run any of its code. More importantly, the while loop only runs if its\
    \ Boolean value is true. This means somewhere inside the while loop’s curly brackets,\
    \ there must be code that eventually changes this Boolean value to false.\n\n\
    If a while loop fails to change its Boolean value from true to false, then the\
    \ loop will run forever, which is known as an endless loop. An endless loop may\
    \ crash or freeze your program so it no longer responds to the user.\n\nAt the\
    \ simplest level, a while loop’s Boolean value can just be true or false, such\
    \ as\n\n```\nwhile true {\n}\n```\n\nMore commonly, while loops use comparison\
    \ operators to determine a Boolean value , such as\n\n```\nwhile counter <= 5\
    \ {\n}\n```\n\nAs long as `counter <=5` remains true, the while loop will run.\
    \ The moment `counter <= 5` is no longer true, the while loop will stop.\n\nWhen\
    \ using while loops, you need to define the Boolean value before the loop begins\
    \ (to make sure it’s either true or false) and then you must change the Boolean\
    \ value somewhere inside the while loop (to make sure the while loop eventually\
    \ stops).\n\nTo see how Boolean values work with a while loop, create a new playground\
    \ by following these steps:\n\n1.  Open the Introductory Playground file in Xcode.\
    \  \n2.  Edit the code as follows:\n\n    ```\n    import Cocoa\n    var counter\
    \ = 1\n    while counter <= 10 {\n    print (\"Hello\")\n    counter = counter\
    \ + 1\n    }\n    ```\n\nNote that the `var counter = 1` line defines the variable\
    \ that the while loop uses to determine a Boolean value (true or false). Also\
    \ note the `counter = counter + 1` line inside the while loop. This constantly\
    \ changes the variable used by the while loop to determine when to stop. By changing\
    \ the Boolean comparison (`counter <=10`), you can change how many times the while\
    \ loop runs.\n\nTo make sure you can see what the `print` command does, click\
    \ the Show Debug area icon in the bottom left corner to make the Debug area appear,\
    \ as shown in Figure [8-1](#A437923_1_En_8_Chapter.html#Fig1).\n\n![A437923_1_En_8_Fig1_HTML.jpg](A437923_1_En_8_Fig1_HTML.jpg)\n\
    \nFigure 8-1.\n\nRunning a while loop in a playground\n\nWhen using a while loop,\
    \ keep in mind the following:\n\n*   Before the while loop, make sure to define\
    \ any variables used by the while loop’s Boolean value (such as the `var counter\
    \ = 1` line).\n*   A while loop may run zero or more times.\n*   Inside the while\
    \ loop, make sure the Boolean value used by the while loop can change to false\
    \ eventually to avoid creating an endless loop (such as the `counter = counter\
    \ + 1` line).\n\n## The repeat-while Loop\n\nAs an alternative to the while loop,\
    \ Swift also offers a repeat-while loop that works exactly the same way. The only\
    \ difference is that instead of checking a Boolean value before running, the repeat-while\
    \ loop checks its Boolean value after it runs.\n\nThis means the repeat-while\
    \ loop will always run at least once. The structure of a repeat-while loop looks\
    \ like this:\n\n```\nrepeat {\n} while BooleanValue\n```\n\nLike the while loop,\
    \ the repeat-while loop also needs code inside its loop that can change its Boolean\
    \ value from true to false, and it also needs code before the repeat-while loop\
    \ to initialize any variables that are used to calculate the repeat-while loop’s\
    \ Boolean value.\n\nTo see how Boolean values work with a repeat-while loop, follow\
    \ these steps:\n\n1.  Make sure the IntroductoryPlayground file is loaded in Xcode.\
    \  \n2.  Edit the code as follows:\n\n    ```\n    import Cocoa\n    var counter\
    \ = 1\n    repeat {\n    print (\"Goodbye\")\n    counter = counter + 1\n    }\
    \ while counter <= 10\n    ```\n\nNotice that the Boolean value (`counter <= 10`)\
    \ determines how many times the repeat-while loop runs, as shown in Figure [8-2](#A437923_1_En_8_Chapter.html#Fig2).\n\
    \n![A437923_1_En_8_Fig2_HTML.jpg](A437923_1_En_8_Fig2_HTML.jpg)\n\nFigure 8-2.\n\
    \nRunning a repeat-while loop in a playground\n\nRemember, the main difference\
    \ between the while loop and the repeat-while loop is that the repeat-while loop\
    \ always runs at least once while the while loop may never run at all if its Boolean\
    \ value is initially false."
  trans: "\n# 总结\n\n为了智能地响应用户，每个程序都需要一种做出决策的方式。做出决策的第一步是定义一个布尔值，它要么是`true`，要么是`false`。布尔值可以通过比较运算符或逻辑运算符计算得出。\n\
    \n一旦你能确定一个布尔值，就可以在分支语句中使用该布尔值来决定执行哪段代码。最简单的分支是`if`语句，它要么执行一组代码，要么什么也不做。\n\n另一种分支是`if-else`语句，它恰好提供两组待执行的代码。如果布尔值为`true`，则执行第一组代码；否则，执行第二组代码。\n\
    \n如果你需要在三组或更多组代码之间进行选择，可以使用`if-else-if`语句。不过，使用`switch`语句通常更简单。当使用`switch`语句时，你必须预判所有可能的值。\n\
    \n`switch`语句可以让你匹配精确值、一组值、一个范围（包含起始和结束数值）、半个范围（仅包含起始数值，不包含结束数值），或者使用 `<`、`<=`、`>`\
    \ 和 `>=` 进行比较。\n\n分支语句与布尔值相结合，使你的程序能够根据接收到的数据做出决策并运行不同的代码。本质上，分支语句能让你的程序智能地响应外部数据。\n\
    \n# 8. 使用循环重复执行代码\n\n编程的基本目标是编写尽可能少的代码，同时做尽可能多的事情。你写的代码越少，程序日后就越容易理解和修改。你的代码能做的事情越多，程序就越强大。\n\
    \n减少代码编写量的一种方法是在函数中复用代码。第二种复用代码的方法是使用循环。循环可以多次运行一行或多行代码，从而无需编写多条冗余代码。\n\n例如，如果你想打印一条消息五次，可以编写如下代码：\n\
    \n```\nprint (\"Hello\")\nprint (\"Hello\")\nprint (\"Hello\")\nprint (\"Hello\"\
    )\nprint (\"Hello\")\n```\n\n这样做虽然繁琐，但可以正常工作。然而，如果你突然决定需要将一条消息打印一千次，那么你现在必须书写那个命令一千次。不仅反复输入相同的命令很繁琐，而且还会增加其中某条命令出错的概率。\n\
    \n更简单的方法是使用循环。循环允许你编写一次一个或多个命令，然后按照你需要运行的次数来执行这些命令，例如：\n\n```\nvar counter = 1\n\
    while counter <= 5 {\n    print (\"Hello\")\n    counter = counter + 1\n}\n```\n\
    \n上述循环运行了五次，并打印了五次\"Hello\"。如果你想打印一千次\"Hello\"，只需将数字 5 替换为 1000 即可。循环让代码更容易编写和修改，同时完成更多工作。\n\
    \n## `while` 循环\n\nSwift 中最简单的循环称为 `while` 循环，其结构如下：\n\n```\nwhile 布尔值 {\n}\n\
    ```\n\n在 `while` 循环执行任何操作之前，它首先检查布尔值是 `true` 还是 `false`。如果是 `true`，则运行其花括号内的代码一次。然后它会再次检查其布尔值，看它是否变为\
    \ `false` 还是仍为 `true`。一旦这个布尔值变为 `false`，`while` 循环就会停止。\n\n由于 `while` 循环在执行任何操作之前会检查布尔值，因此\
    \ `while` 循环有可能永远不会执行其任何代码。更重要的是，只有当其布尔值为 `true` 时，`while` 循环才会运行。这意味着在 `while`\
    \ 循环的花括号内，必须存在最终将布尔值变为 `false` 的代码。\n\n如果 `while` 循环未能将其布尔值从 `true` 变为 `false`，那么循环将永远运行，这被称为无限循环。无限循环可能导致程序崩溃或无响应，从而无法再与用户交互。\n\
    \n在最简单的层面上，`while` 循环的布尔值可以只是 `true` 或 `false`，例如：\n\n```\nwhile true {\n}\n```\n\
    \n更常见的是，`while` 循环使用比较运算符来确定布尔值，例如：\n\n```\nwhile counter <= 5 {\n}\n```\n\n只要\
    \ `counter <= 5` 保持为 `true`，`while` 循环就会运行。当 `counter <= 5` 不再为 `true` 时，`while`\
    \ 循环将停止。\n\n使用 `while` 循环时，你需要在循环开始前定义布尔值（确保它是 `true` 或 `false`），然后在 `while` 循环内部的某处更改该布尔值（以确保\
    \ `while` 循环最终停止）。\n\n要了解布尔值如何与 `while` 循环协同工作，请按照以下步骤创建一个新的 playground：\n\n1.\
    \ 在 Xcode 中打开 Introductory Playground 文件。\n2. 按如下方式编辑代码：\n\n    ```\n    import\
    \ Cocoa\n    var counter = 1\n    while counter <= 10 {\n        print (\"Hello\"\
    )\n        counter = counter + 1\n    }\n    ```\n\n请注意，`var counter = 1` 这一行定义了\
    \ `while` 循环用来确定布尔值（`true` 或 `false`）的变量。同时也要注意 `while` 循环内部的 `counter = counter\
    \ + 1` 这一行。它不断地改变 `while` 循环用来决定何时停止的变量。通过更改布尔比较条件（`counter <= 10`），你可以改变 `while`\
    \ 循环的运行次数。\n\n为了确保你能看到 `print` 命令的作用，点击左下角的“显示调试区域”图标，使调试区域显示出来，如图 8-1 所示。\n\n\
    ![A437923_1_En_8_Fig1_HTML.jpg](img/A437923_1_En_8_Fig1_HTML.jpg)\n\n**图 8-1.**\
    \ 在 playground 中运行 `while` 循环\n\n使用 `while` 循环时，请记住以下几点：\n\n- 在 `while` 循环之前，确保定义\
    \ `while` 循环布尔值所使用的任何变量（例如 `var counter = 1` 这一行）。\n- `while` 循环可能会运行零次或多次。\n\
    - 在 `while` 循环内部，确保循环所使用的布尔值最终能变为 `false`，以避免创建无限循环（例如 `counter = counter + 1`\
    \ 这一行）。\n\n## `repeat-while` 循环\n\n作为 `while` 循环的替代方案，Swift 还提供了 `repeat-while`\
    \ 循环，其工作方式完全相同。唯一的区别是，`repeat-while` 循环不是在运行前检查布尔值，而是在运行之后才检查。\n\n这意味着 `repeat-while`\
    \ 循环至少会运行一次。`repeat-while` 循环的结构如下：\n\n```\nrepeat {\n} while 布尔值\n```\n\n与 `while`\
    \ 循环一样，`repeat-while` 循环也需要在其循环内部包含能够将其布尔值从 `true` 变为 `false` 的代码，并且还需要在 `repeat-while`\
    \ 循环之前初始化用于计算该循环布尔值的任何变量。\n\n要了解布尔值如何与 `repeat-while` 循环协同工作，请按照以下步骤操作：\n\n1.\
    \ 确保在 Xcode 中加载了 IntroductoryPlayground 文件。\n2. 按如下方式编辑代码：\n\n    ```\n    import\
    \ Cocoa\n    var counter = 1\n    repeat {\n        print (\"Goodbye\")\n    \
    \    counter = counter + 1\n    } while counter <= 10\n    ```\n\n请注意，布尔值（`counter\
    \ <= 10`）决定了 `repeat-while` 循环运行的次数，如图 8-2 所示。\n\n![A437923_1_En_8_Fig2_HTML.jpg](img/A437923_1_En_8_Fig2_HTML.jpg)\n\
    \n**图 8-2.** 在 playground 中运行 `repeat-while` 循环\n\n请记住，`while` 循环和 `repeat-while`\
    \ 循环的主要区别在于：`repeat-while` 循环至少会运行一次，而 `while` 循环如果其布尔值初始为 `false`，则可能一次都不运行。\n"
- fmt: "# The for-in Loop\n\nHow many times will a `while` or `repeat-while` loop\
    \ repeat? It all depends on its Boolean value. If you want to run a loop a fixed\
    \ number of times, you can simply count using either a `while` or `repeat-while`\
    \ loop, such as:\n\n```\nvar counter = 1\nwhile counter <= 5 {\n    print (\"\
    while loop \\(counter)\")\n    counter = counter + 1\n}\ncounter = 1\nrepeat {\n\
    \    print (\"repeat loop \\(counter)\")\n    counter = counter + 1\n} while counter\
    \ <= 5\n```\n\nBoth of these loops run exactly five times, as shown in Figure\
    \ [8-3](#A437923_1_En_8_Chapter.html#Fig3).\n\n![A437923_1_En_8_Fig3_HTML.jpg](A437923_1_En_8_Fig3_HTML.jpg)\n\
    \nFigure 8-3. A `while` and `repeat-while` loop can run a fixed number of times\n\
    \nNote that the `print` command can only print strings. Any time you want to use\
    \ a non-string value in the `print` command, you can enclose it within parentheses\
    \ with a `\\` symbol in front of it such as `\\(counter)`.\n\nUsing a `while`\
    \ or `repeat-while` loop to count can be clumsy because you must make sure you\
    \ create a counting variable and that you constantly update that counting variable\
    \ within the `while` or `repeat-while` loop to avoid an endless loop.\n\nWhen\
    \ you want a loop to run a fixed number of times, it’s far better to use a `for-in`\
    \ loop. The main advantage is that the `for-in` loop automatically knows how to\
    \ count so you don’t have to specify when to stop.\n\nTo use the `for-in` loop,\
    \ you need to specify the following:\n\n- A starting value\n- An ending value\n\
    - The range between the starting and ending values, such as `...` or `..<`\n\n\
    The structure of a `for-in` loop looks like this:\n\n```\nfor countingVariable\
    \ in startingValue...endingValue {\n}\n```\n\nThis tells Swift to start counting\
    \ by 1 at the `startingValue` and stop when it reaches the `endingValue`, such\
    \ as:\n\n```\nfor i in 1...5 {\n    print (\"Loop \\(i)\")\n}\n```\n\nThe above\
    \ `for-in` loop counts from 1, 2, 3, 4, and stops after 5. The following similar\
    \ `for-in` loop uses a different range that tells Swift to stop counting before\
    \ the `endingValue`:\n\n```\nfor i in 1..<5 {\n    print (\"Second loop \\(i)\"\
    )\n}\n```\n\nUnlike the previous `for-in` loop, this `for-in` loop counts from\
    \ 1, 2, 3, and stops after 4, as shown in Figure [8-4](#A437923_1_En_8_Chapter.html#Fig4).\n\
    \n![A437923_1_En_8_Fig4_HTML.jpg](A437923_1_En_8_Fig4_HTML.jpg)\n\nFigure 8-4.\
    \ Comparing different ranges in a `for-in` loop\n\nNotice that the `for-in` loop\
    \ is far simpler than the `while` or `repeat-while` loop that requires initializing\
    \ a counting variable and then updating that counting variable within the loop\
    \ to prevent an endless loop.\n\nBy default, the `for-in` loop always counts by\
    \ 1. If you want to count by values other than 1, you can specify an increment\
    \ value as follows:\n\n```\nfor i in startValue...endValue where i%incrementValue\
    \ == 0 {\n}\n```\n\nThis `for-in` loop uses the remainder operator (`%`) to determine\
    \ which values to count. So if you want to count by 3, you can use the following\
    \ `for-in` loop:\n\n```\nfor i in 1...20 where i%3 == 0 {\n}\n```\n\nThis `for-in`\
    \ loop starts counting at 1 but before it runs any code inside the curly brackets,\
    \ it divides the counting variable (`i`) by 3 to determine if it’s evenly divisible\
    \ by 3 (equals to 0 as shown in the Swift code `== 0`). If the counting variable\
    \ (`i`) is evenly divisible by 3, then it runs the code inside the loop.\n\nTo\
    \ see if the `for-in` loop works by counting in increments, create a new playground\
    \ by following these steps:\n\n1. Open the Introductory Playground file in Xcode.\n\
    2. Edit the code as follows:\n\n```\nfor i in 1...20 where i%3 == 0 {\n    print\
    \ (\"Loop \\(i)\")\n}\n```\n\nThis `for-in` loop starts at 1, but `1%3` is not\
    \ equal to 0 so it skips to 2. However, `2%3` is also not equal to 0 so it skips\
    \ to 3. Since `3%3` is equal to 0, it runs the code inside the curly brackets\
    \ and prints “Loop 3”. This continues until the counting variable (`i`) reaches\
    \ 20, as shown in Figure [8-5](#A437923_1_En_8_Chapter.html#Fig5).\n\n![A437923_1_En_8_Fig5_HTML.jpg](A437923_1_En_8_Fig5_HTML.jpg)\n\
    \nFigure 8-5. The `for-in` loop can count in increments\n\nIf you replace `i%3`\
    \ with `i%4`, the `for-in` loop will count by 4. Just by changing this value,\
    \ you can define how the `for-in` loop counts in increments other than 1.\n\n\
    ## Counting Through Arrays with the for-in Loop\n\nThe most straightforward way\
    \ to use a `for-in` statement is to specify a starting and ending value to count\
    \ from 1 to 10 or 0 to 34. However, the `for-in` loop can also be especially handy\
    \ for counting through lists of data stored in an array (which is a type of data\
    \ structure). The `for-in` loop automatically knows where to begin and end so\
    \ you never have to worry about counting how many items yourself.\n\nThe structure\
    \ of a `for-in` loop for counting through a list of data looks like this:\n\n\
    ```\nfor countingVariable in listOfItems {\n}\n```\n\nThe `countingVariable` counts\
    \ each item in a list of some kind, and `listOfItems` represents a list of some\
    \ kind such as an array (which consists of a list of data). To see how `for-in`\
    \ loops can work, follow these steps:\n\n1. Make sure the `IntroductoryPlayground`\
    \ file is loaded in Xcode.\n2. Edit the code as follows:\n\n```\nimport Cocoa\n\
    let names = [\"Oscar\", \"Sally\", \"Marty\", \"Louis\"]\nfor person in names\
    \ {\n    print (person)\n}\n```\n\nFigure [8-6](#A437923_1_En_8_Chapter.html#Fig6)\
    \ shows how the `for-in` loop runs four times because the `names` array contains\
    \ four items. If you add or subtract a name from this array, the `for-in` loop\
    \ automatically counts the new number of items in the array.\n\n![A437923_1_En_8_Fig6_HTML.jpg](A437923_1_En_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6. Counting through an array with a `for-in` loop\n\n## Exiting Loops\
    \ Prematurely\n\nNormally loops run until a Boolean value changes. However, you\
    \ can prematurely exit out of a loop by using the `break` command. Normally this\
    \ loop will run four times:\n\n```\nlet names = [\"Oscar\", \"Sally\", \"Marty\"\
    , \"Louis\"]\nfor person in names {\n    print (person)\n}\n```\n\nIf you insert\
    \ a `break` command, you can make this loop exit after running only once, like\
    \ this:\n\n```\nlet names = [\"Oscar\", \"Sally\", \"Marty\", \"Louis\"]\nfor\
    \ person in names {\n    print (person)\n    break\n}\n```\n\nThis `for-in` loop\
    \ will run once, print the name “Oscar”, hit the `break` command, and exit out\
    \ of the `for-in` loop. Of course, it’s rather pointless to put a `break` command\
    \ inside a `for-in` loop to stop it prematurely all the time, so it’s more common\
    \ to use the `break` command with a branching statement. That way if a certain\
    \ Boolean value is true, the loop exits prematurely. Otherwise, the loop keeps\
    \ running.\n\nTo see how to exit out of the loop prematurely, follow these steps:\n\
    \n1. Make sure the `IntroductoryPlayground` file is loaded in Xcode.\n2. Edit\
    \ the code as follows:\n\n```\nimport Cocoa\nlet employees = [\"Fred\", \"Jane\"\
    , \"Sam\", \"Kelly\"]\nfor person in employees {\n    if person == \"Sam\" {\n\
    \        print (\"Break command\")\n        break\n    }\n    print (person)\n\
    }\n```\n\nThis `for-in` loop will normally run four times because the `employees`\
    \ array contains four names. However, as soon as the `for-in` loop finds the name\
    \ “Sam”, it prints that name, hits the `break` command, and prematurely exits\
    \ out of the `for-in` loop, so it only runs three times, as shown in Figure [8-7](#A437923_1_En_8_Chapter.html#Fig7).\n\
    \n![A437923_1_En_8_Fig7_HTML.jpg](A437923_1_En_8_Fig7_HTML.jpg)\n\nFigure 8-7.\
    \ Using the `break` command to exit out of a loop prematurely"
