    \ and implement them in different structures, follow these steps:\n\n1.  Make\
    \ sure the ProtocolPlayground file is loaded in Xcode.  \n2.  Edit the playground\
    \ code as follows:  \n\n```\nimport Cocoa\nprotocol Cat {\nvar name: String {\
    \ get set }\nvar age: Int { get }\nfunc meow (sound : String)\n}\n// One way to\
