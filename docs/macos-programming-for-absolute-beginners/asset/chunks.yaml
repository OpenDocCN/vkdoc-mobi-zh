    \ and drop it to a new location.\n\nTo add a new command to a pull-down menu,\
    \ you need to use the following three items from the Object Library, as shown\
    \ in Figure [22-7](#A437923_1_En_22_Chapter.html#Fig7):\n\n![A437923_1_En_22_Fig7_HTML.jpg](A437923_1_En_22_Fig7_HTML.jpg)\n\
    \nFigure 22-7.\n\nThree items for modifying commands on a pull-down menu\n\n*\
    \   Menu Item: Represents a single command\n*   Submenu Menu Item: Represents\
    \ a submenu of additional commands\n*   Separate Menu Item: Displays a horizontal\
    \ line to separate commands on a pull-down menu\n\nTo add a new command to a pull-down\
    \ menu, follow these steps:\n\n1.  Click the `.xib` or `.storyboard` file in the\
    \ Project Navigator pane.  \n2.  Choose View ➤ Utilities ➤ Show Object Library\
    \ to display the Object Library in the bottom right corner of the Xcode window.\
    \  \n3.  Click the pull-down menu where you want to add a new command. You can\
    \ either click directly on the pull-down menu title on the menu bar or click a\
    \ disclosure triangle to open a pull-down menu title in the Document Outline,\
    \ as shown in Figure [22-8](#A437923_1_En_22_Chapter.html#Fig8).\n\n    ![A437923_1_En_22_Fig8_HTML.jpg](A437923_1_En_22_Fig8_HTML.jpg)\n\
    \n    Figure 22-8.\n\n    You can add a new command directly on a pull-down menu\
    \ or through the Document Outline  \n4.  Drag a menu item (see Figure [22-7](#A437923_1_En_22_Chapter.html#Fig7))\
    \ from the Object Library and move the mouse in the pull-down menu list until\
    \ a horizontal blue line appears to show you where the command will appear, as\
    \ shown in Figure [22-9](#A437923_1_En_22_Chapter.html#Fig9).\n\n    ![A437923_1_En_22_Fig9_HTML.jpg](A437923_1_En_22_Fig9_HTML.jpg)\n\
    \n    Figure 22-9.\n\n    Dragging and dropping a new command in a pull-down menu\
    \ list  \n5.  Release the mouse. Xcode adds your new menu item to the pull-down\
    \ menu. If you added a submenu menu item, you can now edit the commands stored\
    \ on its submenu."
  trans: "\n# 编辑下拉菜单\n\n每次创建 Cocoa 应用程序项目时，Xcode 都会创建一个包含常见菜单标题和命令的默认下拉菜单。无需编写一行 Swift\
    \ 代码，其中许多命令就已经可以正常工作了。例如，应用程序菜单（即你的程序名称，如 `MenuProgram`）下的“退出”命令知道如何退出程序，而“窗口”菜单标题下的“缩放”和“最小化”命令知道如何缩放和最小化用户界面窗口。\n\
    \n在大多数情况下，你需要通过编辑现有命令、添加新命令以及删除现有命令来自定义这些下拉菜单。要修改程序的下拉菜单，你有两种选择：\n\n*   直接编辑下拉菜单\n\
    *   打开文档大纲并编辑菜单\n\n要直接编辑下拉菜单，请点击“项目导航器”窗格中的 `.xib` 或 `.storyboard` 文件，然后直接点击程序的下拉菜单，如图\
    \ 22-1 所示。\n\n![A437923_1_En_22_Fig1_HTML.jpg](img/A437923_1_En_22_Fig1_HTML.jpg)\n\
    \n图 22-1. 你可以直接点击程序的下拉菜单来选择单个项目\n\n编辑下拉菜单的第二种方法是点击“显示文档大纲”图标以打开文档大纲，如图 22-2 所示。\n\
    \n![A437923_1_En_22_Fig2_HTML.jpg](img/A437923_1_En_22_Fig2_HTML.jpg)\n\n图 22-2.\
    \ “显示文档大纲”图标\n\n打开文档大纲后，你可以点击展开三角形来查看不同的下拉菜单及其命令，如图 22-3 所示。\n\n![A437923_1_En_22_Fig3_HTML.jpg](img/A437923_1_En_22_Fig3_HTML.jpg)\n\
    \n图 22-3. 在“文档大纲”窗格中查看菜单\n\n要删除某个菜单项，请点击它以将其选中（可以直接点击下拉菜单项，也可以在“文档大纲”窗格中点击该菜单项），然后按退格键或删除键。这可以让你删除单个菜单项或整个菜单标题，例如“文件”或“编辑”下拉菜单标题。\n\
    \n> **注：** 如果你误删了某个菜单项或整个下拉菜单标题，只需选择“编辑”>“撤销”或按 `Command + Z` 即可立即恢复。\n\n要向程序的下拉菜单中添加项目，你有两种选择：\n\
    \n*   向现有的下拉菜单标题（例如“文件”或“编辑”）添加一个新菜单项\n*   添加一个包含自身命令列表的新下拉菜单标题\n\n## 向菜单栏添加新的下拉菜单标题\n\
    \n你既可以直接在下拉菜单上添加菜单项和下拉菜单标题，也可以在文档大纲内部添加。\n\n“对象库”显示了以下你可以添加到程序菜单栏的下拉菜单标题，如图 22-4\
    \ 所示：\n\n![A437923_1_En_22_Fig4_HTML.jpg](img/A437923_1_En_22_Fig4_HTML.jpg)\n\
    \n图 22-4. 你可以添加到程序菜单栏的下拉菜单标题\n\n*   应用程序菜单项：包含应用程序下拉菜单标题中的典型命令，例如“关于”、“偏好设置”和“服务”\n\
    *   文件菜单项：包含文件下拉菜单标题中的典型命令，例如“打开”、“新建”和“保存”\n*   编辑菜单项：包含编辑下拉菜单标题中的典型命令，例如“剪切”、“复制”和“粘贴”\n\
    *   字体菜单项：包含字体下拉菜单标题中的典型命令，例如“粗体”、“更大”和“拷贝样式”\n*   格式菜单项：包含格式下拉菜单标题中的典型命令，例如“字体”和“文本”\n\
    *   文本菜单项：包含文本下拉菜单标题中的典型命令，例如“居中”、“书写方向”和“显示标尺”\n*   查找菜单项：包含查找下拉菜单标题中的典型命令，例如“查找”、“查找和替换”以及“查找下一个”\n\
    *   窗口菜单项：包含窗口下拉菜单标题中的典型命令，例如“最小化”、“置于最前”和“缩放”\n*   帮助菜单项：包含帮助下拉菜单标题中的典型命令，例如“应用程序帮助”\n\
    \n要将下拉菜单标题添加到程序的菜单栏，请遵循以下步骤：\n\n1.  点击“项目导航器”窗格中的 `.xib` 或 `.storyboard` 文件。\n\
    2.  选择“视图”>“工具”>“显示对象库”，以在 Xcode 窗口的右下角显示对象库。\n3.  从对象库中拖出一个下拉菜单项（见图 22-4），并将鼠标移动到程序的菜单栏上，直到出现一条垂直的蓝线，显示下拉菜单标题将要出现的位置，如图\
    \ 22-5 所示。\n\n   ![A437923_1_En_22_Fig5_HTML.jpg](img/A437923_1_En_22_Fig5_HTML.jpg)\n\
    \n   图 22-5. 向菜单栏添加新的下拉菜单标题\n\n   除了在程序菜单栏上拖动鼠标，你也可以在文档大纲中将鼠标拖到下拉菜单标题之间，直到出现一条水平的蓝线，显示菜单标题将要出现的位置，如图\
    \ 22-6 所示。\n\n   ![A437923_1_En_22_Fig6_HTML.jpg](img/A437923_1_En_22_Fig6_HTML.jpg)\n\
    \n   图 22-6. 使用“文档大纲”向菜单栏添加新的下拉菜单标题\n\n4.  松开鼠标。新的下拉菜单标题就会出现在菜单栏上。\n\n要重新排列下拉菜单标题，请将鼠标指针移到要移动的菜单标题上（在菜单栏上或文档大纲中），然后拖动鼠标将菜单标题移到新位置。\n\
    \n## 向下拉菜单添加新命令\n\n你可以在任何下拉菜单上删除、重新排列和添加命令。要删除命令，只需选中它并按退格键或删除键。要重新排列命令，请将其拖放到新位置。\n\
    \n要向下拉菜单添加新命令，你需要使用对象库中的以下三个项目，如图 22-7 所示：\n\n![A437923_1_En_22_Fig7_HTML.jpg](img/A437923_1_En_22_Fig7_HTML.jpg)\n\
    \n图 22-7. 用于修改下拉菜单命令的三个项目\n\n*   菜单项：表示单个命令\n*   子菜单项：表示一个包含更多命令的子菜单\n*   分隔菜单项：显示一条水平线，用于分隔下拉菜单上的命令\n\
    \n要向下拉菜单添加新命令，请遵循以下步骤：\n\n1.  点击“项目导航器”窗格中的 `.xib` 或 `.storyboard` 文件。\n2.  选择“视图”>“工具”>“显示对象库”，以在\
    \ Xcode 窗口的右下角显示对象库。\n3.  点击你要添加新命令的下拉菜单。你可以直接点击菜单栏上的下拉菜单标题，也可以在文档大纲中点击展开三角形来打开一个下拉菜单标题，如图\
    \ 22-8 所示。\n\n   ![A437923_1_En_22_Fig8_HTML.jpg](img/A437923_1_En_22_Fig8_HTML.jpg)\n\
    \n   图 22-8. 你可以直接在下拉菜单上或通过文档大纲添加新命令\n\n4.  从对象库中拖出一个菜单项（见图 22-7），并将鼠标移入下拉菜单列表，直到出现一条水平的蓝线，显示命令将要出现的位置，如图\
    \ 22-9 所示。\n\n   ![A437923_1_En_22_Fig9_HTML.jpg](img/A437923_1_En_22_Fig9_HTML.jpg)\n\
    \n   图 22-9. 向下拉菜单列表中拖放新命令\n\n5.  松开鼠标。Xcode 会将你的新菜单项添加到下拉菜单中。如果你添加的是子菜单项，现在就可以编辑存储在其子菜单中的命令了。\n"
- fmt: "# Editing Commands\n\nOnce you’ve modified the pull-down menu titles that\
    \ appear on a menu bar and modified the commands that appear on each pull-down\
    \ menu, you may want to further edit each individual command using the `Inspector`\
    \ pane. The `Inspector` pane can be useful to modify the following properties:\n\
    \n- **Title**: Displays the text of the menu command\n- **Key Equivalent**: Defines\
    \ a keystroke shortcut for a command\n\nTo edit a command (or a pull-down menu\
    \ title), follow these steps:\n\n1. Click the `.xib` or `.storyboard` file in\
    \ the Project Navigator pane.\n2. Click the pull-down menu command (or pull-down\
    \ menu title) that you want to edit either in the Document Outline or directly\
    \ on the pull-down menu itself.\n3. Choose View ➤ Utilities ➤ Show Attributes\
    \ Inspector. The Show Attributes Inspector pane appears, as shown in Figure 22-10.\n\
    \n    ![A437923_1_En_22_Fig10_HTML.jpg](A437923_1_En_22_Fig10_HTML.jpg)\n\n  \
    \  Figure 22-10. Dragging and dropping a new command in a pull-down menu list\n\
    \n4. Click in the Title text field in the `Inspector` pane to edit the text of\
    \ the command.\n5. Click in the Key Equivalent text field and press (not type)\
    \ the keystroke shortcut you want to assign to your command. Make sure this keystroke\
    \ shortcut isn’t used by another command (such as Command + X for the Cut command).\
    \ Xcode displays your keystroke shortcut to the right of the command on the pull-down\
    \ menu.\n\n# Connecting Menu Commands to Swift Code\n\nOnce you’ve modified your\
    \ pull-down menu titles and filled them with the proper commands, you’ll eventually\
    \ need to make these commands actually do something. This means linking your menu\
    \ commands to `IBAction` methods, much like connecting buttons or other user interface\
    \ items to a file containing Swift code. You can Control-drag from either the\
    \ menu command on the pull-down menu itself or from the menu command displayed\
    \ in the Document Outline.\n\nWhen you create a Cocoa Application project, you’ll\
    \ find that many menu commands already work, such as the File ➤ Print, Window\
    \ ➤ Minimize, and application name ➤ About commands. These features are provided\
    \ by the `NSApplication`, `NSWindow`, `NSView`, and `NSResponder` classes in the\
    \ Cocoa framework.\n\nIf you click a menu command in a Cocoa Application project,\
    \ and then choose View ➤ Utilities ➤ Show Connections Inspector, you’ll see the\
    \ Connections Inspector pane in the upper right corner of the Xcode window.\n\n\
    The Connections Inspector pane lets you see what the selected user interface item\
    \ (such as a command on a pull-down menu) is connected to, as shown in Figure\
    \ 22-11.\n\n![A437923_1_En_22_Fig11_HTML.jpg](A437923_1_En_22_Fig11_HTML.jpg)\n\
    \nFigure 22-11. The Connections Inspector pane shows what `IBAction` method a\
    \ user interface is connected to\n\nIn Figure 22-11, the Print menu command on\
    \ the File menu is connected to the `print:` `IBAction` method, but this `IBAction`\
    \ method isn’t stored in a specific file. Instead, it’s connected to something\
    \ called First Responder, which is defined by the `NSResponder` class.\n\nA user\
    \ interface consists of several objects based on `NSApplication`, `NSWindow`,\
    \ and `NSView`, so First Responder simply points to the first object that should\
    \ respond to the user clicking a user interface item (such as the Print command\
    \ on the File menu). If this first object doesn’t have a `print:` `IBAction` method,\
    \ then it searches for this `IBAction` method in the next object.\n\nSo if you\
    \ have a text field on a window and click the Print command on the File menu,\
    \ the Print command will look for the `print:` `IBAction` method in the text field\
    \ (based on `NSTextField`, which is based on `NSView`) first. If it fails to find\
    \ the `print:` `IBAction` method in the `NSTextField` class, it will look next\
    \ in the window (based on `NSWindow`) or the application itself (based on `NSApplication`).\n\
    \nIf you click the First Responder icon and then choose View ➤ Utilities ➤ Show\
    \ Connections Inspector, you can see the Connections Inspector pane for the First\
    \ Responder, which identifies all the `IBAction` methods connected to the default\
    \ pull-down menus of a typical Cocoa Application project, as shown in Figure 22-12.\n\
    \n![A437923_1_En_22_Fig12_HTML.jpg](A437923_1_En_22_Fig12_HTML.jpg)\n\nFigure\
    \ 22-12. The First Responder Connections Inspector pane lists all the `IBAction`\
    \ methods connected to the default pull-down menus of a Cocoa Application project\n\
    \n> **Note:** Another way to view the Connections Inspector is to right-click\
    \ the First Responder icon, as shown in Figure 22-13.\n\n![A437923_1_En_22_Fig13_HTML.jpg](A437923_1_En_22_Fig13_HTML.jpg)\n\
    \nFigure 22-13. Right-clicking the First Responder icon lists all the `IBAction`\
    \ methods connected to the default pull-down menus of a Cocoa Application project\n\
    \nAlthough the Cocoa Application template creates standard pull-down menus and\
    \ commands, you’ll still need to write Swift code to make many of these commands\
    \ actually work. For example, the Save command doesn’t know what to save or how\
    \ to save it, and the New command doesn’t know what type of document to create.\n\
    \nTo see how menu commands work with `IBAction` methods like other user interface\
    \ items with `.xib` files, follow these steps:"
