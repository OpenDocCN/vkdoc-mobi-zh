    \ types, you could omit the data type declaration and just assign initial values,\
    \ like this:\n\n```\nclass ClassName {\nvar name = \"\"\nvar ID  = 0\nvar salary\
    \ = 0\n}\n```\n\nIf you aren’t sure what type of initial values you want to store,\
    \ you can just use optional variables, such as\n\n```\nclass ClassName {\nvar\
    \ name : String?\nvar ID : Int?\nvar salary : Double?\n}\n```\n\nOptional variables\
