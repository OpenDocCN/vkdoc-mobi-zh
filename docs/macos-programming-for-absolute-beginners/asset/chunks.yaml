  trans: "\n## 使用滑块\n\n滑块可以垂直或水平显示。滑块直观地表示一系列数值范围，用户可以通过前后（或上下）拖动滑块进行选择。一端代表最小值（左侧或底部），另一端代表最大值（右侧或顶部）。为了帮助用户理解滑块表示的不同数值，您还可以选择显示刻度线，如图\
    \ 18-7 所示。\n\n![A437923_1_En_18_Fig7_HTML.jpg](img/A437923_1_En_18_Fig7_HTML.jpg)\n\
    \n图 18-7. 带有和不带刻度线的滑块外观\n\n在滑块上定义的一些比较重要的属性包括：\n\n- **刻度线（Tick Marks）**：定义刻度线的位置以及要显示的刻度线数量\n\
    - **最小值（Minimum）**：定义可能的最小值\n- **最大值（Maximum）**：定义可能的最大值\n- **当前值（Current）**：标识滑块首次出现在用户界面时的初始值\n\
    \n您可以使用 `integerValue` 属性来检索滑块的当前值，并将该值显示在另一个用户界面项（如文本字段）中。要了解如何操作，请按照以下步骤进行：\n\
    \n1. 在 `Xcode` 中，选择 **文件** ➤ **新建** ➤ **项目**。\n2. 点击 `macOS` 类别下的 **应用程序**。\n\
    3. 点击 **Cocoa 应用程序**，然后点击 **下一步** 按钮。`Xcode` 现在会要求您输入产品名称。\n4. 点击 **产品名称** 文本字段，然后输入\
    \ `SliderProgram`。\n5. 确保 **语言** 弹出菜单显示为 `Swift`，并且 **“使用故事板”** 复选框处于选中状态。\n6.\
    \ 点击 **下一步** 按钮。`Xcode` 会询问您希望将项目存储在哪里。\n7. 选择一个文件夹来存储您的项目，然后点击 **创建** 按钮。\n8.\
    \ 在 **项目导航器** 窗格中点击 `Main.storyboard` 文件。\n9. 点击 `SliderProgram` 图标，使用户界面窗口显示出来。\n\
    10. 将一个水平滑块和一个文本字段拖到用户界面上，使其看起来如图 18-8 所示。\n\n    ![A437923_1_En_18_Fig8_HTML.jpg](img/A437923_1_En_18_Fig8_HTML.jpg)\n\
    \n    图 18-8. `SliderProgram` 的用户界面\n\n11. 选择 **视图** ➤ **助理编辑器** ➤ **显示助理编辑器**。`Xcode`\
    \ 会在用户界面旁边显示 `ViewController.swift` 文件。\n12. 将鼠标指针移到水平滑块上，按住 **Control** 键，然后将鼠标拖到\
    \ `ViewController.swift` 文件中 `IBOutlet` 行的下方。\n13. 松开 **Control** 键和鼠标。会弹出一个窗口。\n\
    14. 点击 **名称** 文本字段，输入 `mySlider`，然后点击 **连接** 按钮。\n15. 将鼠标指针移到文本字段上，按住 **Control**\
    \ 键，然后将鼠标拖到 `ViewController.swift` 文件中 `IBOutlet` 行的下方。\n16. 松开 **Control** 键和鼠标。会弹出一个窗口。\n\
    17. 点击 **名称** 文本字段，输入 `sliderValue`，然后点击 **连接** 按钮。您现在应该拥有这两个 `IBOutlet`：\n\n\
    \    ```swift\n    @IBOutlet weak var mySlider: NSSlider!\n    @IBOutlet weak\
    \ var sliderValue: NSTextField!\n    ```\n\n18. 将鼠标指针移到水平滑块上，按住 **Control** 键，然后将鼠标拖到\
    \ `AppDelegate.swift` 文件底部最后一个花括号的上方。\n19. 松开 **Control** 键和鼠标。会弹出一个窗口。\n20. 点击\
    \ **连接** 弹出菜单，然后选择 **动作**。\n21. 点击 **名称** 文本字段，然后输入 `getValue`。\n22. 点击 **类型**\
    \ 弹出菜单，然后选择 `NSSlider`。接着点击 **连接** 按钮。`Xcode` 会创建一个空的 `IBAction` 方法。\n23. 按如下方式修改此\
    \ `IBAction` 方法：\n\n    ```swift\n    @IBAction func getValue(_ sender: NSSlider)\
    \ {\n        sliderValue.integerValue = mySlider.integerValue\n    }\n    ```\n\
    \n24. 选择 **产品** ➤ **运行**。您的用户界面将会显示。\n25. 左右拖动滑块。请注意，每次拖动滑块并松开鼠标按钮时，滑块的当前值都会出现在文本框中。\n\
    26. 选择 **SliderProgram** ➤ **退出 SliderProgram**。\n\n## 摘要\n\n复选框、单选按钮和日期选择器允许您向用户提供一系列有效的选项供其选择。这确保了用户不会意外地（或故意地）向程序提供无效数据。\n\
    \n复选框允许用户选择零个或多个选项。一组单选按钮只允许用户选择一个选项。日期选择器允许用户选择格式正确的日期。\n\n要识别用户选择了哪些复选框，请检查每个复选框的\
    \ `State` 属性。如果 `State` 值为 1，则表示该复选框被选中。如果 `State` 值为 0，则表示该复选框未被选中。\n\n可以在复选框和单选按钮上显示备选文本。这样，当复选框或单选按钮被选中时，会显示一种文本；当复选框或单选按钮未被选中时，则会显示另一种不同的文本。\n\
    \n要识别用户可能选择了哪个单选按钮，需要使用 `Tag` 属性。每个单选按钮需要一个唯一的 `Tag` 值，该值可以是整数。通过识别 `Tag` 值，就可以确定用户选择了哪个单选按钮。\n\
    \n日期选择器使用户可以轻松选择日期和/或时间。日期选择器将以特殊的 `NSDate` 格式存储所选日期/时间，您可以通过日期选择器的 `dateValue`\
    \ 属性来访问该格式。\n\n滑块允许用户从一系列有效的数值中进行选择。通过使用复选框、单选按钮、日期选择器和滑块，程序可以确保用户只能从一系列有效选项中进行选择。\n\
    \n# 19. 将文本与标签、文本字段和组合框配合使用\n\n当程序需要向用户提供有限范围的有效选项时，您会想要使用复选框、单选按钮、日期选择器或滑块。然而，有时程序需要允许用户输入永远无法提前预测的数据，例如人名。当程序需要允许用户输入数据时，您就需要使用文本字段或组合框。\n\
    \n文本字段允许用户输入数字、特殊字符或普通字母。这意味着程序可能需要验证用户输入的数据是否有效。\n\n有时，程序可以为用户提供从有限的有效选项中进行选择，或者自行输入数据的选项。例如，程序可能要求用户选择一个国家。然后，程序可以提供一系列有限的可能选项，或者允许用户自由地输入其他内容。\n\
    \n这种既可以从有限的选项中进行选择，又可以自行输入内容的能力是组合框的主要优势。组合框之所以得名，是因为它结合了弹出按钮（显示有效选项列表）的功能和可以自由输入任何内容（如文本字段）的灵活性。\n\
    \n虽然文本字段和组合框用于接收用户输入的数据，但标签用于向用户显示信息。当您只需要显示信息时，例如显示说明或标识文本字段的用途（如提示用户输入姓名或地址），您会想要使用标签。标签、文本字段和组合框协同工作，在用户界面上接收和显示文本。\n"
- fmt: '# Using Text Fields


    Since a user can type anything into a text field, a text field stores data as
    a string, which you can retrieve using the `stringValue` property. However, since
    users can type in integer or decimal numbers, a text field is versatile enough
    to recognize such numbers.


    If the user types in an integer, you can retrieve that value by accessing the
    `intValue` property. If the user types in a decimal number, you can retrieve that
    value by accessing either the `floatValue` or `doubleValue` properties.


    No matter what the user types into a text field, you can retrieve the proper value.
    Since text fields can accept strings or numbers, your program can retrieve the
    proper value by accessing one of the following properties:


    - `intValue`: Retrieves an integer value. If the user types a string, this property
    stores 0. If the user types a decimal number such as 10.9, it stores only the
    integer value such as 10.

    - `floatValue` or `doubleValue`: Retrieves a floating point or double value. If
    the user types a string, this property stores 0.0. If the user types an integer
    such as 4, the `floatValue` and `doubleValue` properties store it as a decimal
    such as 4.0.

    - `stringValue`: Retrieves a string value. If the user types a number, it stores
    that number as a string (such as “4.305”).


    **Note:** When the user types text into a text field, that typed text gets stored
    in all four properties: `intValue`, `floatValue`, `doubleValue`, and `stringValue`.


    Beyond the standard text field, Xcode offers several text field variations for
    handling different types of text entry:


    - **Text Field with Number Formatter**: Defines the type of numbers that can be
    typed in

    - **Secure Text Field**: Masks typed text

    - **Search Field**: Stores a list of previously entered text

    - **Token Field**: Allows the user to enter tokens of content in addition to typing
    ordinary text


    ## Using a Number Formatter


    A number formatter lets you define valid numeric values the user can type into
    the text box such as a minimum or maximum value, or a specific way to enter data,
    such as with a `%` sign or by typing “four” instead of 4.


    Xcode gives you two ways to create a text field with a number formatter. First,
    you can drag and drop the text field with number formatter from the Object Library
    and place it on your user interface. Second, you can drag and drop the number
    formatter from the Object Library and place it on an existing text field on your
    user interface.


    The quickest way to find these items is to type “Number Formatter” in the search
    text field at the bottom of the Object Library, as shown in Figure 19-1.


    ![A437923_1_En_19_Fig1_HTML.jpg](A437923_1_En_19_Fig1_HTML.jpg)


    **Figure 19-1.** The text field with number formatter and number formatter in
    the Object Library


    Whether you create a new text field with the text field with number formatter
    item or apply a number formatter to an existing text field, you’ll need to define
    the number formatter settings. To do this, you need to follow several steps:


    1. Click the **Show Document Outline** icon to display the Document Outline.

    2. Click the disclosure triangle to the left of the text field that uses the number
    formatter.

    3. Click the disclosure triangle that appears to the left of the text field cell
    underneath the text field.

    4. Click the number formatter, as shown in Figure 19-2.


    ![A437923_1_En_19_Fig2_HTML.jpg](A437923_1_En_19_Fig2_HTML.jpg)


    **Figure 19-2.** The number formatter appears in the Document Outline


    5. Choose **View** ➤ **Utilities** ➤ **Show Attributes Inspector**. The Show Attributes
    Inspector pane appears in the upper right corner of the Xcode window, as shown
    in Figure 19-3.


    ![A437923_1_En_19_Fig3_HTML.jpg](A437923_1_En_19_Fig3_HTML.jpg)


    **Figure 19-3.** The Show Attributes Inspector pane


    The **Minimum** and **Maximum** check boxes let you define a minimum and/or maximum
    value that the text field will accept. If you define a minimum value of 10 and
    the user types in a number less than 10, the text field won’t accept the number.


    The **Localize Format** check box tells Xcode to use the user’s local settings
    to determine the appearance of a decimal point and currency symbol. In some parts
    of the world, they use a period for a decimal point, while in others they use
    a comma.


    Likewise for currency, Europeans use the Euro symbol, Americans use the dollar
    symbol, and British users use the British pound symbol. Selecting the **Localize**
    check box ensures that your text field number formatter works no matter where
    in the world the program is used.


    The **Style** pop-up menu lets you define different ways to format numbers. When
    you choose a style, the **Unformatted** and **Formatted** text fields under the
    **Sample** category displays how your numbers may look.


    For example, in Figure 19-3, choosing the **None** style means that if the user
    types in 1,234.75 into a text field with a number formatter and presses Return,
    the text field formats that number as simply 1235.


    However, if the style is **Currency**, **Percent**, **Scientific**, or **Spell
    Out**, that means the user can enter a number as defined by the **Formatted**
    example, and the text field will store the number as shown in the **Unformatted**
    example.


    To see how to use these different number formatters, follow these steps:'
