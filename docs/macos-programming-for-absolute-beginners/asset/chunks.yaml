  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 访问对象中的属性\n\n\
    要访问对象的属性，您必须指定对象名称，后跟一个句点和属性名称，例如：\n\n```\nobjectName.propertyName = data\n```\n\
    \n您也可以将对象的属性值赋给一个变量，如下所示：\n\n```\nvar person = myObject.name\n```\n\n要访问属性，您需要指定对象名称、一个句点以及您想要访问的属性名称，例如：\n\
    \n```\nprint (person.name)\n```\n\n**注意**  \n访问存储在属性中的值时，请确保指定的是对象名称，而不是类名。如果您从\
    \ `ClassName` 类创建了一个 `person` 对象，则应通过指定对象名称 (`person`) 和属性名称 (`name`、`ID`、`salary`)\
    \ 来访问属性，例如 `person.name` 或 `person.ID`。您不能通过使用类名（如 `ClassName.name` 或 `className.ID`）来访问属性值。如果您尝试这样做，代码将无法运行。\n\
    \n与普通变量一样，对象的属性每次只能保存一个数据块。一旦您在属性中存储了新数据，就会覆盖之前的数据。\n\n要了解如何创建类并使用对象的属性，请遵循以下步骤：\n\
    \n1.  确保 `IntroductoryPlayground` 文件已在 Xcode 中加载。\n2.  按如下方式编辑代码：\n\n```\nimport\
    \ Cocoa\nclass ClassName {\nvar name = \"\"\nvar ID  = 0\nvar salary = 0\n}\n\
    var worker = ClassName()\nworker.name = \"Bob\"\nworker.ID = 102\nworker.salary\
    \ = 10\nclass SecondClass {\nvar name : String\nvar ID : Int\nvar salary : Double\n\
    init (name: String, ID: Int, salary: Double) {\nself.name = name\nself.ID = ID\n\
    self.salary = salary\n}\n}\nvar executive = SecondClass (name: \"Joe\", ID: 17,\
    \ salary: 50000)\nprint (worker.name)\nprint (worker.ID)\nprint (worker.salary)\n\
    print (executive.name)\nprint (executive.ID)\nprint (executive.salary)\n```\n\n\
    第一个类在声明其属性时对其进行了初始化。然后，它基于该类 (`ClassName`) 创建了一个对象 (`worker`)。为了在 `worker` 对象中存储数据，代码指定了对象名称\
    \ (`worker`) 和属性名称，并为其赋值。\n\n第二个类示例使用初始化器来定义属性值。`init` 方法按顺序接受三个数据块：一个字符串、一个整数和一个十进制\
    \ (`Double`) 值。\n\n要从第二个类 (`SecondClass`) 创建一个对象 (`executive`)，括号中需要包含正确数量和顺序的数据，以及正确的数据类型，此外还要显示一个标签来标识数据的含义，如图\
    \ 13-1 所示。\n\n![A437923_1_En_13_Fig1_HTML.jpg](img/A437923_1_En_13_Fig1_HTML.jpg)\n\
    \n**图 13-1.** 创建类文件并访问属性\n\n### 对象中的计算属性\n\n作为为属性定义固定值的一种替代方案，您还可以使用计算属性，其中一个属性的初始值取决于另一个属性的值。创建计算属性的最简单方法是定义一个属性名称、数据类型，然后在大括号中编写计算值的代码。最后，使用\
    \ `return` 关键字定义要存储在该属性中的值。\n\n这个计算属性只是获取存储在 `height` 属性中的值，将其乘以 2，然后将结果存储在 `width`\
    \ 属性中。当您基于 `shape` 类创建对象时，初始值 5 会存储在 `height` 属性中，计算属性会将 `height` 值 (5) 乘以 2 得到\
    \ 10，并将其存储在 `width` 属性中，如图 13-2 所示。\n\n![A437923_1_En_13_Fig2_HTML.jpg](img/A437923_1_En_13_Fig2_HTML.jpg)\n\
    \n**图 13-2.** 使用计算属性来确定属性的初始值\n\n在这个计算属性的示例中，一个属性 (`width`) 的值是通过获取另一个属性 (`height`)\
    \ 的值来确定其自身值的。在技术术语中，这被称为 getter。\n\n### 设置其他属性\n\n另一种在属性中存储值的选项是使用所谓的 setter。使用\
    \ setter，定义一个属性会设置另一个属性的值。由于 getter 和 setter 非常相似，它们通常在同一属性中使用。这样，一个属性使用 getter\
    \ 从另一个属性计算其值，因此如果您为该属性设置一个值，它可以更改另一个属性。定义 getter 和 setter 如下所示：\n\n```\nclass\
    \ Blob {\nvar property1 : dataType = value\nvar property2 : dataType {\nget {\n\
    return valueHere\n}\nset {\nproperty1 = valueHere\n}\n}\n}\n```\n\n在 getter 中，您始终需要一个\
    \ `return` 关键字来将值返回给拥有该 getter 的属性。在 setter 中，您必须将一个属性赋值给一个值。这个值可以是一个固定值，也可以是一个返回值的计算结果。\n\
    \n**注意**  \n您不需要同时拥有 getter 和 setter。您可以只使用 getter，通过省略 `get` 关键字并将代码仅用大括号括起来来简化它，就像本节开头\
    \ `shape` 类示例中那样。您也可以只使用 setter，但需要使用 `set` 关键字。\n\n在上面的示例中，每当 `property2` 被赋予一个新值时，它都会使用其\
    \ setter 为 `property1` 定义一个新值。\n\nSetter 还可以接受一个值，并使用该值为不同的属性计算新结果。要接受一个 setter\
    \ 的值，您只需要创建一个用括号括起来的变量，并使用该值为另一个属性计算结果，例如：\n\n```\nclass Blob {\nvar property1\
    \ : dataType = value\nvar property2 : dataType {\nget {\nreturn valueHere\n}\n\
    set (newValue) {\nproperty1 = valueHere based on newValue\n}\n}\n}\n```\n\n要了解\
    \ getter 和 setter 如何工作，请遵循以下步骤：\n\n1.  确保您的 `IntroductoryPlayground` 文件已加载到 Xcode\
    \ 中。\n2.  按如下方式编辑代码：\n\n```\nimport Cocoa\nclass Shape {\nvar height : Int = 5\n\
    var width : Int {\nreturn height * 2\n}\n}\nvar rectangle = Shape()\nprint (rectangle.height)\n\
    print (rectangle.width)\nrectangle.height = 20\nprint (rectangle.width)\nclass\
    \ Blob {\nvar height : Int = 5\nvar width : Int = 10\nvar area : Int {\nget {\n\
    return height * width\n}\nset (newValue) {\nheight = newValue + 10\nwidth = newValue\
    \ - 5\n}\n}\n}\nvar CEO = Blob()\nprint (CEO.area)\nCEO.area = 247\nprint (CEO.height)\n\
    print (CEO.width)\n```\n\n您可以将 getter 和 setter 视为改变其他属性的函数。不过，在使用 getter 和 setter\
    \ 时要小心，因为如果您不了解它们的存在或工作原理，它们可能会导致意外行为。图 13-3 显示了上述代码的结果，以便您了解 getter 和 setter\
    \ 如何影响属性。\n\n![A437923_1_En_13_Fig3_HTML.jpg](img/A437923_1_En_13_Fig3_HTML.jpg)\n\
    \n**图 13-3.** 使用 getter 和 setter 修改属性\n"
- fmt: "### Using Property Observers\n\nSwift provides two property observers called\
    \ `willSet` and `didSet`. The `willSet` property observer runs code before a property\
    \ receives a value. The `didSet` property observer runs code after a property\
    \ receives a value.\n\nLike getters and setters, property observers essentially\
    \ are functions that run when a property gets a new value. The basic structure\
    \ for a `willSet` and `didSet` property observer is identical to the structure\
    \ for a getter and setter:\n\n```\nvar property : dataType = initialValue {\n\
    willSet {\n}\ndidSet {\n}\n}\n```\n\nThe `willSet` property observer runs code\
    \ before the property gets a new value. The `didSet` property observer runs code\
    \ after the property gets a new value. To see how property observers work, follow\
    \ these steps:\n\n1.  Make sure your `IntroductoryPlayground` file is loaded into\
    \ Xcode.  \n2.  Edit the code as follows:\n\n    ```\n    import Cocoa\n    class\
    \ Animal {\n    var IQ : Int = 0\n    var legs : Int = 0 {\n    willSet {\n  \
    \  IQ += 10\n    }\n    didSet {\n    IQ -= 3\n    }\n    }\n    }\n    var pet\
    \ = Animal()\n    print (pet.IQ)\n    pet.legs = 4\n    print (pet.IQ)\n    ```\n\
    \nIn this example, the `IQ` property has an initial value of 0. Notice that when\
    \ you set the `legs` property to 4, it immediately runs the `willSet` property\
    \ observer code, which increases the `IQ` property by 10. Then it immediately\
    \ runs the code in the `didSet` property observer, which subtracts 3, as shown\
    \ in Figure [13-4](#A437923_1_En_13_Chapter.html#Fig4).\n\n![A437923_1_En_13_Fig4_HTML.jpg](A437923_1_En_13_Fig4_HTML.jpg)\n\
    \nFigure 13-4.\n\nUsing property observers\n\n## Creating Methods\n\nA class that\
    \ simply stores one or more properties can be convenient for grouping related\
    \ data together. However, what makes object-oriented programming more useful is\
    \ when objects can also manipulate their own data. To create mini-programs for\
    \ objects to run, you need to define functions (called methods) inside a class.\n\
    \nYou saw methods when you linked push buttons from the user interface to create\
    \ an IBAction method in the Swift code file. The simplest method inside a class\
    \ performs the exact same function:\n\n```\nclass CountDown {\nvar counter = 10\n\
    func decrement() {\ncounter = counter - 1\n}\n}\n```\n\nThis `decrement` method\
    \ simply subtracts 1 from the `counter` property, which has an initial value of\
    \ 10. To make this method run, you have to specify the object name, a period,\
    \ and the method name, like this:\n\n```\nvar myObject = CountDown ()\nmyObject.decrement()\n\
    ```\n\nThis `decrement` method does the exact same thing every time, which is\
    \ it subtracts 1 from the `counter` property. A more interesting and flexible\
    \ method would accept data (one or more parameters) to modify the code in the\
    \ method works, such as:\n\n```\nclass CountDown {\nvar counter = 10\nfunc decrement()\
    \ {\ncounter = counter - 1\n}\nfunc decrementByValue (step : Int) {\ncounter -=\
    \ step\n}\n}\n```\n\nThe second method, `decrementByValue`, accepts a single integer\
    \ that gets stored in a variable called `step`. Then it subtracts the value of\
    \ `step` from the `counter` property, as shown in Figure [13-5](#A437923_1_En_13_Chapter.html#Fig5).\n\
    \n![A437923_1_En_13_Fig5_HTML.jpg](A437923_1_En_13_Fig5_HTML.jpg)\n\nFigure 13-5.\n\
    \nRunning a method that accepts a value\n\nWhen a method accepts data, it can\
    \ also return a specific value. To create such a method, you need to identify\
    \ the data type the method returns (using the `➤` symbols) along with the `return`\
    \ keyword that defines the specific value to return.\n\nSo if you want to create\
    \ a method that returns a `Float` data type, you can define a method such as\n\
    \n```\nclass MathBrain {\nvar tempValue: Float = 0\nfunc average (first : Float,\
    \ second : Float) -> Float {\nreturn (first + second) / 2\n}\n}\n```\n\nThis method\
    \ accepts two `Float` numbers (stored in variables called `first` and `second`)\
    \ and returns a `Float` value. To call this method, you specify an object name,\
    \ a period, the method name, and two numbers that are `Float` data types.\n\n\
    Notice that this method has two parameters called `first` and `second`. When passing\
    \ parameters, you must specify the parameter name (`first` and `second`), such\
    \ as\n\n```\nvar math = MathBrain()\nvar temp : Float = math.average(first: 4.0,\
    \ second: 9.0)\nprint (temp)\n```\n\nTo see how to create a set, and add and remove\
    \ data from it, create a new playground by following these steps:\n\n1.  Make\
    \ sure your `IntroductoryPlayground` file is loaded into Xcode.  \n2.  Edit the\
    \ code as follows:\n\n    ```\n    import Cocoa\n    class MathBrain {\n    var\
    \ tempValue: Float = 0\n    func average (first : Float, second : Float) -> Float\
    \ {\n    return (first + second) / 2\n    }\n    }\n    var math = MathBrain()\n\
    \    var temp : Float = math.average(first: 4.0, second: 9.0)\n    print (temp)\n\
    \    ```\n\nThe `average` method accepts two parameters, adds them together, and\
    \ divides by 2. Then it uses the `return` keyword to return this value.\n\nWhen\
    \ the `average` method gets passed the numbers 4.0 and 9.0, it returns a value\
    \ of 6.5, which gets stored in a variable called `temp`, as shown in Figure [13-6](#A437923_1_En_13_Chapter.html#Fig6).\n\
    \n![A437923_1_En_13_Fig6_HTML.jpg](A437923_1_En_13_Fig6_HTML.jpg)\n\nFigure 13-6.\n\
    \nPassing parameters to a method in an object"
