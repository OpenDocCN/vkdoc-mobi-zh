- fmt: '### Posting Videos About Your Software


    Blogging about your software can be great for people who like reading. Unfortunately,
    in today’s busy world, many people don’t have time to read. Another approach is
    to make short videos demonstrating how your software works so people can see what
    problems your software solves and how it does it.


    In general, nobody wants to buy or use your software. What they really want are
    the solutions your software offers, and that’s what you need to emphasize in your
    videos. Don’t explain the menu system or the organization of your user interface.
    Focus on solving a single problem and emphasize something unique about your software.


    For example, suppose your software is designed to help real estate agents. Your
    potential customers will either want to save time or make money, so show how your
    software can help real estate agents do both. Show a feature that simplifies an
    existing, time-consuming process. Show another feature that increases the number
    of potential buyers of a property with little additional work. Always focus on
    how your software benefits the user.


    Keep your videos short and to the point. More people will watch a video demonstrating
    a single feature that runs under a minute. Far fewer people will watch a 30 minute
    video demonstrating multiple features. With many video sharing sites, like YouTube,
    you can even link multiple videos together so when one video ends, a second one
    begins. Now each video acts like another advertisement for your product, and by
    linking each video to another one, each new video increases the chance that someone
    will find and watch at least one of them.


    ### Give Away Free Information


    People tend to buy more from people they trust, so one way to get people to trust
    you is to give out free, useful information. For example, if your software helps
    edit photographs, write up a list of tips for capturing better pictures. Now share
    that list of tips as a PDF file and give it away for free, with a link back to
    your website promoting your software.


    Free, useful information acts as a subtle advertisement. Traditional ads blatantly
    promote a product, which can immediately turn off even your best potential customers.
    Free information subtly promotes a product. Since the free information is useful
    to your potential customer, they’ll be more willing to look at it and even share
    it with others. If they want more information, they can visit your website.


    One visually appealing way to provide free information is through a combination
    of text and graphics known as infographics. An infographic presents information
    in a colorful manner so it’s easy to read and understand without wading through
    large amounts of text. As Figure [28-2](#A437923_1_En_28_Chapter.html#Fig2) shows,
    even IBM creates and distributes free infographics to promote their services and
    products.


    ![A437923_1_En_28_Fig2_HTML.jpg](A437923_1_En_28_Fig2_HTML.jpg)


    Figure 28-2. IBM provides an infographics as a PDF file to promote how their services
    helped American Greetings


    By providing free, useful information, you establish yourself as an authority.
    If you can provide free, useful information as PDF files and blog posts on your
    website, you’ll give people additional reasons to keep coming back to your website/blog
    over and over again. The more times people visit, the more likely they’ll eventually
    buy your software or tell others about your website/blog.


    Free, useful information establishes you as trustworthy, which lowers the barrier
    to buying your software. The more people trust you, the more likely they’ll believe
    your product will do what you claim it does.


    ### Join Social Networks


    Giving away free, useful information in your blog or as PDF files can help establish
    you as an authority in your field. However, a blog requires that someone visits
    your site and a PDF file requires someone download that file. Another way to share
    useful information for free is to stay in constant contact with popular social
    networks.


    Find out which social networks your potential customers visit and join those networks.
    As people post questions, jump in and answer them with useful advice. The purpose
    is to answer people’s questions and establish yourself as trustworthy. Then make
    sure each post you make includes a link back to your website or blog.


    Visiting social networks lets you reach potential customers far faster than hoping
    they’ll visit your blog or find your PDF file. Just make sure you provide useful
    information instead of thinly disguised advertising copy that will simply annoy
    others. The more people learn to trust you on a social network, the more likely
    they’ll also visit your website/blog.


    With all of these techniques, the goal isn’t to get someone to buy your product
    right away (although that’s always nice). The real goal is to draw them one step
    closer towards learning more about you and your product. The more people know
    about your product, the more likely they’ll buy from you.


    Advertising and marketing are basically numbers games. Keep helping others for
    free in ways that don’t take up much time or money, and you’ll eventually find
    that others will find you and buy your software. The more you help others, the
    more others will trust and buy from you.


    The old way of marketing and advertising involves trying to force people to listen
    to ads and buy against their will (which is why so many people dislike marketing
    and advertising). The far more effective way of marketing and advertising is to
    give potential customers something of value before you ask them to buy from you.'
