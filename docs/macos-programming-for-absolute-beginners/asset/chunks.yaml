    \   employee.address = addressField.stringValue\n    employee.phone = phoneField.stringValue\n\
    \    arrayOfStructures.append(employee)\n    totalField.integerValue = arrayOfStructures.count\n\
    \    nameField.stringValue = \"\"\n    addressField.stringValue = \"\"\n    phoneField.stringValue\
    \ = \"\"\n    }\n    ```\n\n26. 修改 `viewData` IBAction 方法，使其从 Key 文本字段获取一个值，并从字典中删除关联的值，如下所示：\n\
    \n```\n    @IBAction func viewData(_ sender: NSButton) {\n    let myAlert = NSAlert()\n\
    \    if arrayOfStructures.isEmpty {\n    myAlert.messageText = \"Array is empty\"\
    \n    myAlert.runModal()\n    } else {\n    var personData = Person()\n    personData\
    \ = (arrayOfStructures.removeLast())\n    totalField.integerValue = arrayOfStructures.count\n\
    \    myAlert.messageText = personData.name + \"\\r\\n\" + personData.address +\
    \ \"\\r\\n\" + personData.phone\n    myAlert.runModal()\n    }\n    }\n    ```\n\
    \n`viewData` IBAction 方法中的代码创建了一个警报对话框。然后它检查数组是否为空。如果是，它会在警报对话框中显示 \"Array is\
    \ empty\"。\n\n如果数组不为空，则移除数组中存储的最后一个结构，在 Total Names 文本字段中显示数组项的新总数，并在警报对话框中显示被移除的结构数据。\n\
    \n`AppDelegate.swift` 文件的完整内容应该看起来像这样：\n\n```\nimport Cocoa\n@NSApplicationMain\n\
    class AppDelegate: NSObject, NSApplicationDelegate {\n@IBOutlet weak var window:\
    \ NSWindow!\n@IBOutlet weak var nameField: NSTextField!\n@IBOutlet weak var addressField:\
    \ NSTextField!\n@IBOutlet weak var phoneField: NSTextField!\n@IBOutlet weak var\
    \ totalField: NSTextField!\nstruct Person {\nvar name : String = \"\"\nvar address\
    \ : String = \"\"\nvar phone : String = \"\"\n}\nvar employee = Person()\nvar\
    \ arrayOfStructures = [Person] ()\nfunc applicationDidFinishLaunching(_ aNotification:\
    \ Notification) {\n// Insert code here to initialize your application\n}\nfunc\
    \ applicationWillTerminate(_ aNotification: Notification) {\n// Insert code here\
    \ to tear down your application\n}\n@IBAction func addData (_ sender: NSButton)\
    \ {\nemployee.name = nameField.stringValue\nemployee.address = addressField.stringValue\n\
    employee.phone = phoneField.stringValue\narrayOfStructures.append(employee)\n\
    totalField.integerValue = arrayOfStructures.count\nnameField.stringValue = \"\"\
    \naddressField.stringValue = \"\"\nphoneField.stringValue = \"\"\n}\n@IBAction\
    \ func viewData(_ sender: NSButton) {\nlet myAlert = NSAlert()\nif arrayOfStructures.isEmpty\
    \ {\nmyAlert.messageText = \"Array is empty\"\nmyAlert.runModal()\n} else {\n\
    var personData = Person()\npersonData = (arrayOfStructures.removeLast())\ntotalField.integerValue\
    \ = arrayOfStructures.count\nmyAlert.messageText = personData.name + \"\\r\\n\"\
    \ + personData.address + \"\\r\\n\" + personData.phone\nmyAlert.runModal()\n}\n\
    }\n}\n```\n\n要查看这个程序如何工作，请遵循以下步骤：\n\n1.  选择 Product ➤ Run。Xcode 运行你的 StructureProgram\
    \ 项目。\n2.  点击 Name 文本字段，输入 Bob。\n3.  点击 Address 文本字段，输入 123 Main。\n4.  点击 Phone\
    \ 文本字段，输入 555-1234。\n5.  点击 Add 按钮。程序在 Total Names 文本字段中显示数组中的项目数量（1）。\n6.  重复步骤\
    \ 2–5，但输入名字 Jane、地址 90 Oak Lane 和电话号码 555-9874。Total Names 文本字段中会显示数字 2。\n7. \
    \ 点击 View 按钮。会出现一个警报对话框，显示 Jane、90 Oak Lane 和 555-9874，如图 12-5 所示。\n"
