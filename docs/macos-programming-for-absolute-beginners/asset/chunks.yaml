  trans: "\n# 使用委托\n\n协议与委托密切相关。委托的核心思想是让一个类将责任移交给另一个类中存储的代码。因此，与其创建新的子类来添加新功能，不如使用一个包含额外功能的委托。\n\
    \n使用委托的一种常见方式是让视图（用户界面）与控制器进行通信。通常，控制器通过 `IBOutlet` 与视图通信，这使得控制器能够在用户界面上显示数据或从用户界面检索数据。\n\
    \n然而，视图也可以通过协议与控制器进行通信。协议文件定义了方法，并将实现这些方法的责任委托给控制器。控制器实现的最常见方法类型包括名称中包含 \"will\"\
    、\"should\" 和 \"did\" 的方法，例如 `applicationDidFinishLaunching` 或 `applicationWillTerminate`。\n\
    \n图 14-10 展示了控制器如何通过 `IBOutlet` 与视图通信，视图如何通过协议与控制器通信。\n\n![A437923_1_En_14_Fig10_HTML.jpg](img/A437923_1_En_14_Fig10_HTML.jpg)\n\
    \n图 14-10. 视图可以通过协议与控制器通信。\n\n要了解视图如何使用委托与控制器通信，请按照以下步骤操作：\n\n1. 在 Xcode 中选择“文件”\
    \ ➤ “新建” ➤ “项目”。\n2. 在 macOS 类别下点击“应用程序”。\n3. 点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode\
    \ 会要求输入产品名称。\n4. 点击“产品名称”文本字段，输入 `DelegateProgram`。\n5. 确保“语言”弹出菜单显示为 Swift，并且未选中任何复选框。\n\
    6. 点击“下一步”按钮。Xcode 会询问项目存储位置。\n7. 选择一个文件夹来存储项目，然后点击“创建”按钮。\n8. 在项目导航器中点击 `AppDelegate.swift`\
    \ 文件。`AppDelegate.swift` 文件的内容会显示在 Xcode 窗口的中间区域。找到以下代码行：\n   ```\n   class AppDelegate:\
    \ NSObject, NSApplicationDelegate {\n   ```\n   这行代码定义了一个名为 `AppDelegate` 的类，它继承了\
    \ `NSObject` 类的属性和方法。此外，它还采用了 `NSApplicationDelegate` 文件定义的所有属性和方法。\n9. 按住 Option\
    \ 键，将鼠标悬停在 `NSObject` 上。当鼠标指针变成问号时，点击 `NSObject` 会弹出一个窗口，如图 14-11 所示。\n   ![A437923_1_En_14_Fig11_HTML.jpg](img/A437923_1_En_14_Fig11_HTML.jpg)\n\
    \   图 14-11. 按住 Option 键点击类名会显示该类的信息\n10. 松开 Option 键，点击弹出窗口底部的“类参考”超链接。文档窗口会打开，显示\
    \ `NSObject` 类中可用的不同属性和方法的详细信息，如图 14-12 所示。所有这些属性和方法在你的 `AppDelegate` 类中也可用。\n\
    \    ![A437923_1_En_14_Fig12_HTML.jpg](img/A437923_1_En_14_Fig12_HTML.jpg)\n \
    \   图 14-12. 文档窗口显示关于 `NSObject` 类的信息\n11. 点击文档窗口左上角的关闭按钮（红点）以关闭它。\n12. 按住 Option\
    \ 键，将鼠标悬停在 `NSApplicationDelegate` 上。当鼠标指针变成问号时，点击 `NSApplicationDelegate` 会弹出一个窗口，如图\
    \ 14-13 所示。\n    ![A437923_1_En_14_Fig13_HTML.jpg](img/A437923_1_En_14_Fig13_HTML.jpg)\n\
    \    图 14-13. 按住 Option 键点击会显示关于 `NSApplication` 协议的信息\n13. 松开 Option 键，点击弹出窗口底部的“协议参考”超链接。文档窗口会打开，显示\
    \ `NSApplicationDelegate` 协议的详细信息，如图 14-14 所示。注意 `NSApplicationDelegate` 协议定义了两个方法，分别叫做\
    \ `applicationDidFinishLaunching` 和 `applicationWillTerminate`。\n    ![A437923_1_En_14_Fig14_HTML.jpg](img/A437923_1_En_14_Fig14_HTML.jpg)\n\
    \    图 14-14. 在文档窗口中查看 `NSApplicationDelegate` 协议\n14. 点击文档窗口左上角的关闭按钮（红点）以关闭它。Xcode\
    \ 窗口再次出现。注意 `AppDelegate.swift` 文件包含两个空函数，分别名为 `applicationDidFinishLaunching`\
    \ 和 `applicationWillTerminate`。这些函数由 `NSApplicationDelegate` 协议文件定义，但在 `AppDelegate.swift`\
    \ 文件中实现。\n15. 将这两个函数修改如下：\n    ```\n    func applicationDidFinishLaunching(aNotification:\
    \ NSNotification) {\n    print (\"这行文字应该会在程序运行后打印\")\n    }\n    func applicationWillTerminate(aNotification:\
    \ NSNotification) {\n    print (\"这行文字应该会在程序停止前打印\")\n    }\n    ```\n16. 选择“产品”\
    \ ➤ “运行”。Xcode 会运行你的 `DelegateProgram` 项目并显示一个空白的用户界面。\n17. 选择“DelegateProgram”\
    \ ➤ “退出 DelegateProgram”。Xcode 窗口会出现。\n18. 选择“视图” ➤ “调试区域” ➤ “显示调试区域”。调试区域出现在\
    \ Xcode 窗口底部，并显示两个 `print` 命令打印的文本。注意，`applicationDidFinishLaunching` 函数中的 print\
    \ 命令首先运行，如图 14-15 所示。\n    ![A437923_1_En_14_Fig15_HTML.jpg](img/A437923_1_En_14_Fig15_HTML.jpg)\n\
    \    图 14-15. `NSApplicationDelegate` 文件定义的方法会告知程序用户界面的状态\n"
- fmt: "# Using Inheritance in a macOS Program\n\nInheritance lets you create method\
    \ names that remain the same while the underlying code changes between two classes.\
    \ In the following sample program, you’ll define one class and then inherit properties\
    \ and methods for a second class. This second class will also override a method\
    \ and add code to make that overridden method behave slightly differently.\n\n\
    To create the sample program that shows how inheritance works, follow these steps:\n\
    \n1. From within Xcode choose File ➤ New ➤ Project.\n2. Click Application under\
    \ the macOS category.\n3. Click Cocoa Application and click the Next button. Xcode\
    \ now asks for a product name.\n4. Click in the Product Name text field and type\
    \ `InheritProgram`.\n5. Make sure the Language pop-up menu displays Swift and\
    \ that no check boxes are selected.\n6. Click the Next button. Xcode asks where\
    \ you want to store the project.\n7. Choose a folder to store your project and\
    \ click the Create button.\n8. Click the `MainMenu.xib` file in the Project Navigator.\n\
    9. Click on the Window icon to make the window of the user interface appear.\n\
    10. Choose View ➤ Utilities ➤ Show Object Library to make the Object Library appear\
    \ in the bottom right corner of the Xcode window.\n11. Drag one push button and\
    \ two labels on the user interface and double-click the push buttons and labels\
    \ to change the text that appears on them so that they look similar to Figure\
    \ 14-16.\n\n![A437923_1_En_14_Fig16_HTML.jpg](A437923_1_En_14_Fig16_HTML.jpg)\n\
    \nFigure 14-16. The user interface of the `InheritProgram`\n\nThis user interface\
    \ displays two labels that represent two different objects. `Object 1` only contains\
    \ one property and a method to alter that property. `Object 2` inherits from `Object\
    \ 1` and contains one additional property along with overriding the method defined\
    \ in `Object 1`.\n\nWhen you click the Change button, both labels will change\
    \ their appearance based on the properties and method defined by each object.\
    \ To connect your user interface to your Swift code, follow these steps:\n\n1.\
    \ With your user interface still visible in the Xcode window, choose View ➤ Assistant\
    \ Editor ➤ Show Assistant Editor. The `AppDelegate.swift` file appears next to\
    \ the user interface.\n2. Move the mouse over the Change button, hold down the\
    \ Control key, and drag just above the last curly bracket at the bottom of the\
    \ `AppDelegate.swift` file.\n3. Release the mouse and the Control key. A pop-up\
    \ window appears.\n4. Click in the Connection pop-up menu and choose Action.\n\
    5. Click in the Name text field and type `changeButton`.\n6. Click in the Type\
    \ pop-up menu and choose `NSButton`. Then click the Connect button. Xcode creates\
    \ an empty `IBAction` method called `changeButton`.\n7. Move the mouse over the\
    \ `Object 1` label, hold down the Control key, and drag below the `@IBOutlet`\
    \ line in the `AppDelegate.swift` file.\n8. Release the mouse and the Control\
    \ key. A pop-up window appears.\n9. Click in the Name text field and type `ObjectOne`\
    \ and click the Connect button.\n10. Move the mouse over the `Object 2` label,\
    \ hold down the Control key, and drag below the `@IBOutlet` line in the `AppDelegate.swift`\
    \ file.\n11. Release the mouse and the Control key. A pop-up window appears.\n\
    12. Click in the Name text field and type `ObjectTwo` and click the Connect button.\
    \ You should now have the following `IBOutlet`s that represent all the labels\
    \ on your user interface:\n\n```\n@IBOutlet weak var window: NSWindow!\n@IBOutlet\
    \ weak var ObjectOne: NSTextField!\n@IBOutlet weak var ObjectTwo: NSTextField!\n\
    ```\n\n13. Type the following directly underneath the `IBOutlet` lines of code:\n\
    \n```\nclass One {\n    var myColor : NSColor = NSColor.black\n    func change\
    \ () {\n        myColor = NSColor.red\n    }\n}\nclass Two : One {\n    var myBackground\
    \ : NSColor = NSColor.white\n    override func change() {\n        myColor = NSColor.blue\n\
    \        myBackground = NSColor.green\n    }\n}\nvar ThingOne = One()\nvar ThingTwo\
    \ = Two()\n```\n\n14. Modify the `IBAction` `changeButton` method as follows:\n\
    \n```\n@IBAction func changeButton(_ sender: NSButton) {\n    ThingOne.change()\n\
    \    ThingTwo.change()\n    ObjectOne.textColor = ThingOne.myColor\n    ObjectTwo.textColor\
    \ = ThingTwo.myColor\n    ObjectTwo.drawsBackground = true\n    ObjectTwo.backgroundColor\
    \ = ThingTwo.myBackground\n}\n```\n\nThis `IBAction` method runs the `change()`\
    \ method in both the `ThingOne` and `ThingTwo` objects, which are based on the\
    \ `One` and `Two` classes, respectively. The `Two` classes inherit from the `One`\
    \ class, but override the `change()` method to modify an additional property called\
    \ `myBackground`.\n\nAfter both `ThingOne` and `ThingTwo` change their properties,\
    \ the first label (represented by `ObjectOne`) assigns its text color to the `myColor`\
    \ property from the `ThingOne` object. The second label (represented by `ObjectTwo`)\
    \ changed its `myColor` and `myBackground` properties, so it sets those properties\
    \ to the label.\n\nThe complete contents of the `AppDelegate.swift` file should\
    \ look like this:\n\n```\nimport Cocoa\n@NSApplicationMain\nclass AppDelegate:\
    \ NSObject, NSApplicationDelegate {\n    @IBOutlet weak var window: NSWindow!\n\
    \    @IBOutlet weak var ObjectOne: NSTextField!\n    @IBOutlet weak var ObjectTwo:\
    \ NSTextField!\n    \n    class One {\n        var myColor : NSColor = NSColor.black\n\
    \        func change () {\n            myColor = NSColor.red\n        }\n    }\n\
    \    class Two : One {\n        var myBackground : NSColor = NSColor.white\n \
    \       override func change() {\n            myColor = NSColor.blue\n       \
    \     myBackground = NSColor.green\n        }\n    }\n    var ThingOne = One()\n\
    \    var ThingTwo = Two()\n    \n    func applicationDidFinishLaunching(_ aNotification:\
    \ Notification) {\n        // Insert code here to initialize your application\n\
    \    }\n    func applicationWillTerminate(_ aNotification: Notification) {\n \
    \       // Insert code here to tear down your application\n    }\n    \n    @IBAction\
    \ func changeButton(_ sender: NSButton) {\n        ThingOne.change()\n       \
    \ ThingTwo.change()\n        ObjectOne.textColor = ThingOne.myColor\n        ObjectTwo.textColor\
    \ = ThingTwo.myColor\n        ObjectTwo.drawsBackground = true\n        ObjectTwo.backgroundColor\
    \ = ThingTwo.myBackground\n    }\n}\n```\n\nTo see how this program works, follow\
    \ these steps:\n\n1. Choose Product ➤ Run. Xcode runs your `InheritProgram` project.\
    \ Notice that both labels look identical.\n2. Click the Change button. The `Object\
    \ 1` label only changes its text color because it represented a class that only\
