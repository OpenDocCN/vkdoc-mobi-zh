    \ you have to write a command, compile your program, and run your program to see\
    \ if it works or not.\n\nInterpreters are better for learning, and compilers are\
    \ better for creating software you can distribute to others without giving away\
    \ your source code. Fortunately, Xcode gives you the best of both worlds..\n\n\
    When you run your program, you’re using Xcode ’s compiler . However, if you only\
    \ want to experiment with some commands, you can use Xcode’s interpreter, called\
    \ a playground.\n\nPlaygrounds let you experiment with Swift code to see if it\
    \ works or not. When you get it to work, then you can copy and paste the code\
    \ into your project files and compile them to create a working program. By giving\
    \ you the ability to use both an interpreter and a compiler, Xcode makes it easy\
    \ to learn Swift and practical for creating programs you can sell or give away\
    \ to others.\n\nTo create a playground, follow these steps:\n\n1.  Start Xcode.\
    \  \n2.  Choose File ➤ New ➤ Playground. (If you see the Xcode welcome screen,\
    \ you can also click on Get started with a playground.) Xcode asks for a playground\
    \ name and platform, as shown in Figure [5-1](#A437923_1_En_5_Chapter.html#Fig1).\n\
    \n![A437923_1_En_5_Fig1_HTML.jpg](A437923_1_En_5_Fig1_HTML.jpg)\n\nFigure 5-1.\n\
    \nCreating a playground file  \n3.  Click in the Name text field and type IntroductoryPlayground.\
    \  \n4.  Click in the Platform pop-up menu and choose macOS. Xcode asks where\
    \ you want to save your playground file.  \n5.  Click a folder where you want\
    \ to save your playground file and click the Create button. Xcode displays the\
    \ playground file, as shown in Figure [5-2](#A437923_1_En_5_Chapter.html#Fig2).\n\
    \n![A437923_1_En_5_Fig2_HTML.jpg](A437923_1_En_5_Fig2_HTML.jpg)\n\nFigure 5-2.\n\
    \nThe playground window  \n6.  Edit the second line as follows:\n\n```\n    var\
    \ str = \"This is the Swift interpreter\"\n    ```\n\nNotice that the playground\
    \ window immediately displays the results of your code change in the right margin,\
    \ as shown in Figure [5-3](#A437923_1_En_5_Chapter.html#Fig3).\n\n![A437923_1_En_5_Fig3_HTML.jpg](A437923_1_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3.\n\nThe playground window displays code changes immediately\n\nPlaygrounds\
    \ let you freely experiment with Swift and access every class in the Cocoa framework\
    \ without worrying about getting your Swift code to work with a user interface.\n\
    \nWhen you type Swift code , Xcode may display certain text in different colors.\
    \ Notice that the top line in your playground displays text in green. In Swift,\
    \ this is known as a comment, which means any text that begins with the // symbols\
    \ are ignored by Xcode and exist solely for people to read. Any time you type\
    \ // in front of any line of code, Xcode will turn the text green and ignore it.\n\
    \nTip\n\nRather than delete a line of code, just type the // symbols in front\
    \ of that line. This will turn the code into a comment that Xcode will ignore.\
    \ Just delete the // symbols in front of the line when you want Xcode to run that\
    \ code again.\n\nIf you want to turn multiple lines of code into a comment, you\
    \ can type the // symbols in front of each line, but that’s time-consuming and\
    \ tedious. A far simpler solution is to type /* at the beginning of the code you\
    \ want to turn into a comment and then type */ at the end of the code you want\
    \ to turn into a comment."
  trans: "\n# 使用 Playground\n\n在过去，程序员有两种工具来帮助他们学习编程。第一种叫作解释器。解释器允许你输入一条命令，并立即显示结果。这样你就能准确地知道自己哪里做对了或做错了。\n\
    \n解释器的缺点是运行速度慢，而且无法用它们创建可销售的程序。要在解释器中运行程序，你既需要解释器本身，也需要包含所有用特定编程语言编写的命令的文件（称为源代码）。由于在解释器中运行程序时必须提供源代码，其他人可以轻易复制并窃取你的程序。因此，解释器虽然不适合销售软件，但非常适合学习编程语言。\n\
    \n程序员用来学习编程的第二种工具叫作编译器。编译器会获取存储在文件中的一系列命令，并将其转换为计算机能理解的机器语言。编译器的优点是能防止他人看到你程序的源代码。\n\
    \n使用编译器的问题是，你必须编写一个完整的程序并编译它，才能判断命令是否生效。如果命令不生效，你还得回头去修复问题。与解释器的交互式特性不同，编译器会使学习编程语言的过程变得更加缓慢和笨拙。\n\
    \n使用解释器时，你可以编写一条命令，然后立即看到它是否生效。而使用编译器时，你必须编写命令、编译程序，然后再运行程序才能判断是否生效。\n\n解释器更有利于学习，而编译器更适用于创建可以在不泄露源代码的情况下分发给他人的软件。幸运的是，`Xcode`\
    \ 为你提供了两全其美的方案。\n\n当你运行程序时，你使用的是 `Xcode` 的编译器。然而，如果你只想试验一些命令，可以使用 `Xcode` 的解释器，它被称为\
    \ Playground。\n\nPlayground 让你可以试验 `Swift` 代码，看看它是否生效。当代码生效后，你可以将其复制粘贴到项目文件中，并进行编译，从而创建一个可以运行的程序。通过让你同时拥有解释器和编译器的能力，`Xcode`\
    \ 让学习 `Swift` 变得轻松，同时也让创建可销售或分发给他人的程序变得实用。\n\n要创建一个 Playground，请按照以下步骤操作：\n\n\
    1. 启动 `Xcode`。\n2. 选择 `文件 ➤ 新建 ➤ Playground`。（如果你看到了 `Xcode` 欢迎屏幕，也可以点击 `从 Playground\
    \ 开始`。）`Xcode` 会要求你输入 Playground 名称和平台，如图 5-1 所示。\n\n![A437923_1_En_5_Fig1_HTML.jpg](img/A437923_1_En_5_Fig1_HTML.jpg)\n\
    \n图 5-1. 创建 Playground 文件\n\n3. 在 `名称` 文本字段中点击，输入 `IntroductoryPlayground`。\n\
    4. 在 `平台` 弹出菜单中点击，选择 `macOS`。`Xcode` 会询问你希望将 Playground 文件保存到何处。\n5. 点击你想要保存 Playground\
    \ 文件的文件夹，然后点击 `创建` 按钮。`Xcode` 会显示 Playground 文件，如图 5-2 所示。\n\n![A437923_1_En_5_Fig2_HTML.jpg](img/A437923_1_En_5_Fig2_HTML.jpg)\n\
    \n图 5-2. Playground 窗口\n\n6. 按如下方式编辑第二行：\n\n```\n    var str = \"这是 Swift 解释器\"\
    \n```\n\n请注意，Playground 窗口会立即在右侧边距中显示你代码更改的结果，如图 5-3 所示。\n\n![A437923_1_En_5_Fig3_HTML.jpg](img/A437923_1_En_5_Fig3_HTML.jpg)\n\
    \n图 5-3. Playground 窗口即时显示代码更改\n\nPlayground 让你可以自由地试验 `Swift`，并访问 `Cocoa` 框架中的每一个类，而无需担心让你的\
    \ `Swift` 代码与用户界面协同工作。\n\n当你输入 `Swift` 代码时，`Xcode` 可能会以不同颜色显示某些文本。请注意，你的 Playground\
    \ 中的第一行文本以绿色显示。在 `Swift` 中，这被称为注释，这意味着任何以 `//` 符号开头的文本都会被 `Xcode` 忽略，仅用于供人阅读。任何时候你在某行代码前输入\
    \ `//`，`Xcode` 都会将该文本变为绿色并忽略它。\n\n> **提示**：与其删除一行代码，不如在该行前输入`//` 符号。这将把代码变成 `Xcode`\
    \ 会忽略的注释。当你希望 `Xcode` 再次运行那段代码时，只需删除该行前的 `//` 符号即可。\n\n如果你想将多行代码变成注释，可以在每一行前输入\
    \ `//` 符号，但这既耗时又繁琐。一个简单得多的解决方案是在要变成注释的代码开头输入 `/*`，然后在要变成注释的代码结尾输入 `*/`。\n"
- fmt: "### Storing Data in Swift\n\nEvery program needs to accept data, manipulate\
    \ that data somehow, and display that result to the user. To accept data, programs\
    \ need to store data temporarily in memory. Technically, computers store data\
    \ in memory addresses, which can be confusing to remember. To make it easier to\
    \ know where data gets stored, programming languages let you give those memory\
    \ addresses descriptive names. In Swift, those two choices are called:\n\n*  \
    \ Variables\n*   Constants\n\nThe idea behind both variables and constants is\
    \ that you define a descriptive name and assign it to hold data, such as:\n\n\
    ```\nstr = \"This is the Swift interpreter\"\n```\n\nIn the above example, `str`\
    \ is the descriptive name and `\"This is the Swift interpreter\"` is the data\
    \ that gets stored. Data can either be a text string or a number such as an integer\
    \ (`3`, `12`, `-9`, etc.) or a decimal, also known as a floating-point number\
    \ (`12.84`, `-0.83`, `8.02`, etc.). At any given time, you can store one chunk\
    \ of data in a descriptive name, which can be defined as a variable or a constant.\n\
    \nThe main difference between a variable and a constant is that you can reuse\
    \ a variable by storing new data as many times as you want (hence the name “variable”).\
    \ A constant only lets you store data in it once.\n\nTo define a variable, you\
    \ have to use the `var` keyword, like this:\n\n```\nvar str = \"This is the Swift\
    \ interpreter\"\n```\n\nTo define a constant, you have to use the `let` keyword\
    \ like this:\n\n```\nlet str = \"This is the Swift interpreter\"\n```\n\nThe first\
    \ time you store data in a variable or a constant, Swift infers the data type,\
    \ which can be either:\n\n*   Text strings (defined as `String`)\n*   Integers\
    \ (defined as `Int`)\n*   Decimal numbers (defined as `Double`)\n\nKnowing the\
    \ data type a variable or constant can hold is crucial because it can only hold\
    \ one type of data and nothing else. So if you create a variable and store a string\
    \ in it, that variable can only store strings from now on.\n\n**Note:** Swift\
    \ is known as a type-safe programming language because it forces you to explicitly\
    \ define the type of data each variable or constant can store. This prevents your\
    \ program from trying to work with incorrect data, such as trying to add a number\
    \ to a text string like `\"John\"`.\n\nTo make it clear what type of data a variable\
    \ or constant can hold, you can explicitly define one of four common data types,\
    \ such as:\n\n```\nvar cat: String\nvar dog: Int\nvar fish: Float\nvar snake:\
    \ Double\n```\n\n`String` data types can only contain characters enclosed within\
    \ double quotation marks such as `\"This is a string\"` and `\"15\"`. Anything\
    \ within double quotation marks is treated as a string.\n\n`Int` (Integer) data\
    \ types can only hold whole numbers such as `-25`, `4`, and `3928`. If you need\
    \ to store any whole number between `-2,147,483,648` and `2,147,483,647`, use\
    \ the `Int` data type.\n\n`Float` and `Double` data types can hold decimal numbers\
    \ such as `2.01`, `-0.577`, and `51.634`. The main difference between the two\
    \ is that a `Float` data type can hold seven digits after the decimal point while\
    \ `Double` data types can hold twice the number of digits after the decimal point.\n\
    \nFor example, suppose you want to store the number `0.123456789123456789` in\
    \ a variable. If you store it in a variable that can only hold `Float` values,\
    \ Swift will actually store the value `0.1234568` (rounding up the last digit).\n\
    \n```\nvar floatVar: Float = 0.123456789123456789\n// 0.1234568\n```\n\nHowever,\
    \ if you store that exact same number in a variable that can only hold `Double`\
    \ values, Swift will store all the digits up to fourteen decimal places, such\
    \ as:\n\n```\nvar doubleVar: Double = 0.123456789123456789\n// 0.12345671234568\n\
    ```\n\nBecause Swift is a type-safe language, you cannot manipulate `Float` and\
    \ `Double` data types together. As a general rule, use `Double` data types for\
    \ storing decimal numbers unless you have a specific reason to use `Float` data\
    \ types.\n\nIf you try to store the wrong type of data in a variable or constant,\
    \ Swift won’t let you. This is to prevent problems when a program tries to use\
    \ the wrong type of data. For example, if a program asks the user for how many\
    \ items to order and the user types in `\"five\"` instead of the number `5`, the\
    \ program will have no idea how to do a mathematical calculation on `\"five\"\
    `, which will cause the program to either crash or work erratically.\n\nSwift\
    \ gives you three ways to define a variable or a constant:\n\n*   `let cat = \"\
    Oscar\" // Infers String data type`\n*   `let cat: String = \"Oscar\"`\n*   `let\
    \ cat: String`\n    *   `cat = \"Oscar\"`\n\nThe first method lets you store data\
    \ directly into a variable or constant. Based on the type of data you first store,\
    \ Swift infers the data type as `String`, `Int`, or `Double` (not a `Float`, because\
    \ a `Float` stores less precise decimal numbers than `Double`, and Swift assumes\
    \ you want exact precision).\n\nThe second method lets you explicitly declare\
    \ the data type and store data into that variable or constant. While this can\
    \ be wordier, it’s clear exactly what type of data you want to store.\n\nThe third\
    \ method takes two lines. The first line defines the data type. The second line\
    \ actually stores the data. This can be handy for variables that may get assigned\
    \ different data in various parts of your program. You can declare the variable\
    \ near the top of your file to make it easy to find, and then assign data to it\
    \ later when you need it.\n\nWhen creating multiple variables of the same data\
    \ type, you can place each variable declaration on a different line, like this:\n\
    \n```\nvar cat : Int\nvar dog : Int\n```\n\nAs a shortcut, you can declare variables\
    \ of the same data type on a single line, like this:\n\n```\nvar cat, dog : Int\n\
    ```\n\nThe above line declares `cat` and `dog` as variables that can hold `Int`\
    \ data types, which is identical to the two lines that declare `cat` as an `Int`\
    \ data type and then `dog` as another `Int` data type. By putting all data type\
    \ variable declarations on a single line, you can easily see which variables use\
    \ identical data types.\n\nTo see how to declare variables and constants in Swift,\
    \ follow these steps:\n\n1.  Make sure your `IntroductoryPlayground` file is loaded\
    \ into Xcode.\n2.  Modify the Swift code in the playground file as follows:\n\n\
    ```\nimport Cocoa\nlet cat: String\ncat = \"Oscar\"\ncat = \"Bo\"\n```\n\nNotice\
    \ that when you try to assign new data to a constant that already holds data,\
    \ you get a warning. Clicking that warning icon in the left margin displays an\
    \ error message, as shown in Figure 5-4.\n\n![A437923_1_En_5_Fig4_HTML.jpg](A437923_1_En_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4. An error message warns that you cannot store data in a constant\
    \ more than once.\n\n**Note:** Constants are also called “immutable” because they\
    \ cannot be changed after you’ve stored data in them. Variables are called “mutable”\
    \ because you can constantly change the data that they store. Just remember that\
    \ variables can only hold one chunk of data at a time. The moment you store new\
    \ data in a variable, any existing data in that variable gets wiped out.\n\n3.\
    \  Modify the Swift code in the playground file by changing the constant to a\
    \ variable (replacing `let` with `var`) as follows:\n\n```\nimport Cocoa\nvar\
    \ cat: String\ncat = \"Oscar\"\ncat = 42.7\n```\n\nNotice that when you try to\
    \ assign a number to a variable that can only hold strings, you get a warning.\
    \ Clicking on that warning icon in the left margin displays an error message,\
    \ as shown in Figure 5-5.\n\n![A437923_1_En_5_Fig5_HTML.jpg](A437923_1_En_5_Fig5_HTML.jpg)\n\
    \nFigure 5-5. An error message warns that you cannot store the wrong type of data.\n\
    \n4.  Modify the Swift code in the playground file as follows:\n\n```\nimport\
    \ Cocoa\nvar cat: String\ncat = \"Oscar\"\nvar greeting = \"Hello, \"\nvar period\
    \ : String = \".\"\nprint (greeting + cat + period)\n```"
