  trans: '

    # 在 macOS 程序中使用对象


    对象可以包含任意数量的属性，这些属性可以保存整数或字符串等简单数据类型，也可以保存元组、集合或数组等更复杂的数据类型。一个对象还可以包含一个或多个方法，这些方法通常用于操作该对象的属性。


    在这个示例程序中，你将定义一个类，并基于该类创建两个对象。你还将了解如何将类存储在单独的文件中。与其将所有内容塞进一个文件，不如将代码分别存储在多个文件中，这样更便于管理。


    这两个对象将会运行存储在另一个对象中的方法。用户界面也会从两个对象的属性中检索值，并将其显示在用户界面的文本字段中。


    为了进一步了解用户界面，你还将学习如何将两个按钮连接到同一个 `IBAction` 方法，并确定用户点击了哪个按钮。和往常一样，你将了解如何通过 `IBOutlet`
    在用户界面元素中显示数据。要创建这个示例程序，请按照以下步骤操作：


    1.  在 Xcode 中选择“文件”➤“新建”➤“项目”。

    2.  点击 macOS 类别下的“应用”。

    3.  点击“Cocoa 应用”，然后点击“下一步”按钮。Xcode 现在会要求输入产品名称。

    4.  点击“产品名称”文本字段，然后输入 `ObjectProgram`。

    5.  确保“语言”弹出菜单显示为 Swift，并且没有选中任何复选框。

    6.  点击“下一步”按钮。Xcode 会询问你想将项目存储在何处。

    7.  选择一个文件夹来存储你的项目，然后点击“创建”按钮。

    8.  在项目导航器中点击 `MainMenu.xib` 文件。

    9.  点击 ObjectProgram 图标以显示用户界面窗口。

    10. 选择“视图”➤“工具”➤“显示对象库”，使对象库出现在 Xcode 窗口的右下角。

    11. 将两个按钮、两个标签和两个文本字段拖到用户界面上，然后双击按钮和标签，更改其上显示的文本，使其看起来类似于图 13-7。


    ![A437923_1_En_13_Fig7_HTML.jpg](img/A437923_1_En_13_Fig7_HTML.jpg)


    **图 13-7.** ObjectProgram 的用户界面


    该用户界面将显示两个角色（警长和歹徒）的生命值点数。每次你点击“警长射击”或“歹徒射击”按钮时，一个 `IBAction` 方法会随机判断另一个角色是否被击中。如果被击中，它还会判断射击造成了多少伤害，伤害范围为
    1 到 3。任何变化都会显示在“警长”或“歹徒”标签下方的文本字段中。


    “警长射击”和“歹徒射击”按钮运行一个 `IBAction` 方法，该方法首先判断用户点击的是哪个按钮，是“警长射击”按钮还是“歹徒射击”按钮。为了识别用户点击了哪个按钮，你需要修改每个按钮的
    `Tag` 属性，使“警长射击”按钮的 `Tag` 值为 0，“歹徒射击”按钮的 `Tag` 值为 1。


    在确定是警长还是歹徒在射击之后，`IBAction` 方法会运行 `shoot` 方法，该方法随机判断射击是否命中以及造成的伤害，伤害值会从每个对象的 `hitPoints`
    属性中减去。


    生命值点总数会显示在“警长”和“歹徒”标签下方的文本字段中。一旦警长或歹徒的生命值点总数降至 0 或以下，就会弹出一个警告对话框，告知你警长或歹徒是否死亡。要将你的用户界面连接到
    Swift 代码，请按照以下步骤操作：


    1.  在 Xcode 窗口中用户界面仍然可见的情况下，选择“视图”➤“辅助编辑器”➤“显示辅助编辑器”。`AppDelegate.swift` 文件会出现在用户界面旁边。

    2.  将鼠标移到“警长射击”按钮上，按住 Control 键，然后拖拽到 `AppDelegate.swift` 文件底部最后一个大括号的上方。

    3.  松开鼠标和 Control 键。会弹出一个弹出窗口。

    4.  在“连接”弹出菜单中点击，然后选择“操作”。

    5.  在“名称”文本字段中点击，然后输入 `shootButton`。

    6.  在“类型”弹出菜单中点击，然后选择 NSButton。接着点击“连接”按钮。

    7.  将鼠标移到“歹徒射击”按钮上，按住 Control 键，然后拖拽到你刚刚创建的现有 `IBAction` `shootButton` 方法上，直到整个方法高亮显示，如图
    13-8 所示。


    ![A437923_1_En_13_Fig8_HTML.jpg](img/A437923_1_En_13_Fig8_HTML.jpg)


    **图 13-8.** 将“歹徒射击”按钮连接到现有的 `IBAction` 方法


    8.  松开鼠标和 Control 键，将“歹徒射击”按钮连接到现有的 `IBAction` `shootButton` 方法。

    9.  将鼠标移到“警长”文本字段上，按住 Control 键，然后拖拽到 `AppDelegate.swift` 文件中 `@IBOutlet` 行的下方。

    10. 松开鼠标和 Control 键。会弹出一个弹出窗口。

    11. 在“名称”文本字段中点击，然后输入 `sheriffHitPoints`，并点击“连接”按钮。

    12. 将鼠标移到出现在“添加”按钮右侧的“歹徒”文本字段上，按住 Control 键，然后拖拽到 `AppDelegate.swift` 文件中 `@IBOutlet`
    行的下方。

    13. 松开鼠标和 Control 键。会弹出一个弹出窗口。

    14. 在“名称”文本字段中点击，然后输入 `outlawHitPoints`，并点击“连接”按钮。现在，你应该拥有以下这些 `IBOutlet`，它们代表了你用户界面上的所有文本字段：


    ```

    @IBOutlet weak var window: NSWindow!

    @IBOutlet weak var sheriffHitPoints: NSTextField!

    @IBOutlet weak var outlawHitPoints: NSTextField!

    ```


    此时，你已经将用户界面连接到了 Swift 代码，因此你可以使用 `IBOutlet` 在用户界面上显示数据。你还创建了一个单一的 `IBAction` 方法，当用户点击两个按钮中的任意一个时，该方法会运行。现在你需要更改“歹徒射击”按钮的
    `Tag` 属性。


    1.  点击“歹徒射击”按钮以选中它。

    2.  选择“视图”➤“工具”➤“显示属性检查器”。“属性检查器”面板会出现在 Xcode 窗口的右上角。

    3.  向下滚动到“视图”类别，然后将 `Tag` 属性更改为 1，如图 13-9 所示。


    ![A437923_1_En_13_Fig9_HTML.jpg](img/A437923_1_En_13_Fig9_HTML.jpg)


    **图 13-9.** “属性检查器”面板底部的 `Tag` 属性


    既然你已经定义好了用户界面，下一步就是创建一个单独的 Swift 文件来存放你的类，你可以按照以下步骤进行操作：


    1.  选择“文件”➤“新建”➤“文件”。会出现一个对话框，要求你选择要使用的模板。

    2.  点击 macOS 类别下的“源”，然后点击“Swift 文件”，如图 13-10 所示。


    ![A437923_1_En_13_Fig10_HTML.jpg](img/A437923_1_En_13_Fig10_HTML.jpg)


    **图 13-10.** 选择用于存放类定义代码的文件


    3.  点击“下一步”按钮。Xcode 会询问你想将这个文件存储在哪里，以及你想给它起什么名字。

    4.  在“保存为”文本字段中点击，然后输入 `personClass`。接着点击“创建”按钮。Xcode 会在“项目导航器”面板中显示 `personClass.swift`
    文件。

    5.  在“项目导航器”面板中点击 `personClass.swift` 文件。Xcode 会显示该文件的内容。

    6.  按如下方式编辑 `personClass.swift` 文件：

    '
- fmt: '```swift

    import Foundation

    class Person {

    var hitPoints = 10

    func shoot () -> Int {

    let odds = 1 + Int(arc4random_uniform(3))

    if odds == 3 {

    // Hit, randomly determine damage from 1..3

    return 1 + Int(arc4random_uniform(3))

    } else {

    return 0 // Missed

    }

    }

    }

    ```


    This class defines one property called `hitPoints`, which it initializes with
    a value of 10. It also defines one method called `shoot`, which does not accept
    any parameters but does return an integer value. Inside the `shoot` method, it
    calculates a random number from 1 to 3 and stores this value in the `odds` variable.


    Next, it checks if the value in `odds` is exactly equal to 3. If so, then it calculates
    a second random number from 1 to 3 and returns this value. If the value in `odds`
    is not 3, then the method returns 0.


    Now that you’ve defined a class in a separate Swift file, it’s time to actually
    use that class to create objects, which you can do by following these steps:


    1. Click the `AppDelegate.swift` file in the Project Navigator pane. Xcode displays
    the contents of the `AppDelegate.swift` file.

    2. Underneath the IBOutlet list in the `AppDelegate.swift` file, type the following
    to create two objects based on the person class defined in the `personClass.swift`
    file:


    ```swift

    @IBOutlet weak var window: NSWindow!

    @IBOutlet weak var sheriffHitPoints: NSTextField!

    @IBOutlet weak var outlawHitPoints: NSTextField!

    var sheriff = Person ()

    var outlaw = Person ()

    ```


    3. Modify the `applicationDidFinishLaunching` method so it displays the initial
    values of the `hitPoints` properties of the sheriff and outlaw objects in the
    text fields on the user interface. These are the two IBOutlets called `sheriffHitPoints`
    and `outlawHitPoints`:


    ```swift

    func applicationDidFinishLaunching(aNotification: NSNotification) {

    // Insert code here to initialize your application

    sheriffHitPoints.integerValue = sheriff.hitPoints

    outlawHitPoints.integerValue = outlaw.hitPoints

    }

    ```


    4. Modify the `shootButton` IBAction method follows:


    ```swift

    @IBAction func shootButton(_ sender: NSButton) {

    if sender.tag == 0 {    // Sheriff shooting

    outlaw.hitPoints -= sheriff.shoot()

    } else {    // Outlaw shooting

    sheriff.hitPoints -= outlaw.shoot()

    }

    sheriffHitPoints.integerValue = sheriff.hitPoints

    outlawHitPoints.integerValue = outlaw.hitPoints

    if sheriffHitPoints.integerValue <= 0 {

    let myAlert = NSAlert()

    myAlert.messageText = "The sheriff died."

    myAlert.runModal()

    } else if outlawHitPoints.integerValue <= 0 {

    let myAlert = NSAlert()

    myAlert.messageText = "The outlaw died."

    myAlert.runModal()

    }

    }

    ```


    This code checks the `Tag` property of the `sender` variable, which identifies
    which button the user clicked. If the `Tag` property is 0, then the user clicked
    on the Sheriff Shoot button so it runs the `shoot` method in the sheriff object
    and subtracts the result (a value from 0 to 3) from the `outlaw.hitPoints` property.


    If the user clicked the Outlaw Shoot button, then the `shoot` method runs the
    `shoot` method in the `outlaw` object and subtracts the result (a value from 0
    to 3) from the `sheriff.hitPoints` property.


    Whatever the result, it then displays the latest values of the `hitPoints` property
    from both the sheriff and the outlaw back in the two text fields on the user interface,
    identified by the `sheriffHitPoints` and `outlawHitPoints` IBOutlets.


    Finally, if the `hitPoints` property of either the sheriff or the outlaw falls
    to 0 or less, then an alert dialog appears to display a message that either the
    sheriff or the outlaw died. The complete contents of the `AppDelegate.swift` file
    should look like this:


    ```swift

    import Cocoa

    @NSApplicationMain

    class AppDelegate: NSObject, NSApplicationDelegate {

    @IBOutlet weak var window: NSWindow!

    @IBOutlet weak var sheriffHitPoints: NSTextField!

    @IBOutlet weak var outlawHitPoints: NSTextField!

    var sheriff = Person ()

    var outlaw = Person ()

    func applicationDidFinishLaunching(_ aNotification: Notification) {

    // Insert code here to initialize your application

    sheriffHitPoints.integerValue = sheriff.hitPoints

    outlawHitPoints.integerValue = outlaw.hitPoints

    }

    func applicationWillTerminate(_ aNotification: Notification) {

    // Insert code here to tear down your application

    }

    @IBAction func shootButton(_ sender: NSButton) {

    if sender.tag == 0 {    // Sheriff shooting

    outlaw.hitPoints -= sheriff.shoot()

    } else {    // Outlaw shooting

    sheriff.hitPoints -= outlaw.shoot()

    }

    sheriffHitPoints.integerValue = sheriff.hitPoints

    outlawHitPoints.integerValue = outlaw.hitPoints

    if sheriffHitPoints.integerValue <= 0 {

    let myAlert = NSAlert()

    myAlert.messageText = "The sheriff died."

    myAlert.runModal()

    } else if outlawHitPoints.integerValue <= 0 {

    let myAlert = NSAlert()

    myAlert.messageText = "The outlaw died."

    myAlert.runModal()

    }

    }

    }

    ```


    To see how this program works, follow these steps:


    1. Choose Product ➤ Run. Xcode runs your ObjectProgram project. Notice that the
    text fields under both the Sheriff and Outlaw display 10, which represents their
    total hit points. Each time they’re hit, their hit point total will drop. The
    loser will be the character whose hit points drops to 0 or less.

    2. Click the Sheriff Shoot button. If the sheriff hit the outlaw, then you’ll
    see the value under the outlaw label drop from 10 to a lower value such as 8.
    If the sheriff missed, then the number under the outlaw won’t change at all.

    3. Click the Outlaw Shoot button.

    4. Repeat steps 2 and 3 to alternate clicking the Sheriff Shoot and Outlaw Shoot
    buttons until one character’s hit points drops to 0 or less. Then an alert dialog
    appears, as shown in Figure [13-11](#A437923_1_En_13_Chapter.html#Fig11).


    ![A437923_1_En_13_Fig11_HTML.jpg](A437923_1_En_13_Fig11_HTML.jpg)


    Figure 13-11. When one character''s hit point total drops to 0 or less, an alert
    dialog appears


    5. Click OK to make the alert dialog go away.

    6. Choose ObjectProgram ➤ Quit ObjectProgram.


    ## Summary


    Swift programming depends entirely on objects and the principles of object-oriented
    programming. To create an object, you must first define a class. A class typically
    consists of one or more variables (called properties) and one or more functions
    (called methods). Once you’ve defined a class, you can create an object that represents
    that class.


    Properties in a class always need to be initialized. You can define initial values
    for every property at the same time you define those properties, or you can create
    a special initializer method that lets you accept data to define initial values
    for an object.


    Properties can be initialized with a fixed value, or they can be computed based
    on values of another property. The value of one property can change the value
    of a different property.


    You can create as many objects from a single class as you want. Typically it’s
    best to store class definitions in separate files to keep your code organized.
    An object-oriented program works by objects sending data to the properties of
    other objects, or calling methods stored in other objects. By working together,
    yet being independent, objects make it easy to create reliable and sophisticated
    programs much faster than before.'
