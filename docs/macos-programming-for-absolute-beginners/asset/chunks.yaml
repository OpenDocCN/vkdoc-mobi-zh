    \n重点在于理解 Xcode 是如何创建通用的 macOS 程序，这样您只需要设计和定制用户界面，然后编写 Swift 代码让它全部运作起来。\n\n##\
    \ 使用文档大纲和连接检查器\n\n在结束对创建第一个 Macintosh 程序的简短介绍之前，让我们看看另外两个将来使用 Xcode 时会有帮助的工具：文档大纲（Document\
