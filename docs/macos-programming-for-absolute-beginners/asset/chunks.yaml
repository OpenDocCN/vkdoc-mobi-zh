    \ triangle that appears to the left of a category such as the HealthKit or Core\
    \ Data. A list of additional topics (with their own gray disclosure triangles)\
    \ appears. By continuing to click the disclosure triangle of topics, you will\
    \ eventually find lists of topics that you can click to view that information,\
    \ as shown in Figure [4-10](#A437923_1_En_4_Chapter.html#Fig10).\n\n    ![A437923_1_En_4_Fig10_HTML.jpg](A437923_1_En_4_Fig10_HTML.jpg)\n\
    \n    Figure 4-10.\n\n    Each category lists several other categories of various\
    \ topics  \n4.  Click in the Browse guides and sample code icon . A list of different\
    \ topics appears, as shown in Figure [4-11](#A437923_1_En_4_Chapter.html#Fig11).\n\
    \n    ![A437923_1_En_4_Fig11_HTML.jpg](A437923_1_En_4_Fig11_HTML.jpg)\n\n    Figure\
    \ 4-11.\n\n    The Browse guides and sample code icon display various topics for\
    \ macOS programming  \n5.  Click the gray disclosure triangle that appears to\
    \ the left of a category, such as the Security or Graphics & Animation. A list\
    \ of additional topics (with their own gray disclosure triangles) appears. By\
    \ continuing to click the disclosure triangle of topics, you will eventually find\
    \ lists of topics that you can click on to view that information, as shown in\
    \ Figure [4-12](#A437923_1_En_4_Chapter.html#Fig12).\n\n    ![A437923_1_En_4_Fig12_HTML.jpg](A437923_1_En_4_Fig12_HTML.jpg)\n\
    \n    Figure 4-12.\n\n    Viewing information about specific programming techniques\
    \ or sample code"
  trans: "\n# 使用帮助菜单查找类文件\n\nXcode 的菜单栏和下拉菜单通常是查找任何命令最直接的方式。因此，第一步是打开 Xcode 的文档窗口，如图\
    \ 4-4 所示，可通过以下两种方式之一打开：\n\n1.  点击文档窗口顶部的“搜索文档”文本字段，输入 `NSTextField`，然后按 Return\
    \ 键。文档窗口会显示关于 `NSTextField` 类的信息，如图 4-5 所示。\n\n    ![A437923_1_En_4_Fig5_HTML.jpg](img/A437923_1_En_4_Fig5_HTML.jpg)\n\
    \n    图 4-5. 文档窗口显示了关于 `NSTextField` 类的信息\n\n2.  滚动浏览关于 `NSTextField` 类的信息。然而，`NSTextField`\
    \ 文档中并没有解释它是如何存储文本的。要找到答案，您需要接下来查看 `NSTextField` 的父类，即“概述”类别下的 `NSControl`。\n\
    3.  点击 `NSControl`（它显示为蓝色超链接）。\n4.  向下滚动到“访问控件的值”部分，查看所有基于 `NSTextField` 类的对象中检索数据的不同方法，如图\
    \ 4-6 所示。\n\n    ![A437923_1_En_4_Fig6_HTML.jpg](img/A437923_1_En_4_Fig6_HTML.jpg)\n\
    \n    图 4-6. 文档窗口列出了 `NSTextField` 中存储数据的所有属性\n\n![A437923_1_En_4_Fig4_HTML.jpg](img/A437923_1_En_4_Fig4_HTML.jpg)\n\
    \n图 4-4. Xcode 文档窗口\n\n*   选择 帮助 ➤ 文档和 API 参考。\n*   按下 Shift + Command + 0（数字零）。\n\
    \n一旦您知道可以使用 `stringValue` 属性来保存任何基于 `NSTextField` 类的对象的文本数据，您就知道可以使用 `stringValue`\
    \ 属性来访问标签和文本字段的文本数据。\n\n## 使用快速帮助查找类文件\n\n使用文档窗口查找类文件很方便，但 Xcode 还提供了另一种称为“快速帮助”的方法。要使用快速帮助，您可以将光标或鼠标指针移动到包含\
    \ Swift 代码文件中的类文件名上，然后选择以下方法之一：\n\n*   选择 帮助 ➤ 所选项目的快速帮助。\n*   按下 Control + Command\
    \ + Shift + ?。\n*   按住 Option 键并点击类文件名。\n\n快速帮助随后会显示一个弹出窗口，其中包含所选类文件的简要描述，并提供选项让您可以选择在文档窗口中查看完整描述。要了解如何使用\
    \ Option 键和鼠标操作快速帮助，请按照以下步骤操作：\n\n1.  确保 MyFirstProgram 已加载到 Xcode 中。\n2.  在项目导航器中点击\
    \ `AppDelegate.swift` 文件。Xcode 会在中间窗格中显示 `AppDelegate.swift` 文件的内容。\n3.  按住 Option\
    \ 键，并将鼠标移动到 `IBOutlet` 中的 `NSTextField` 单词上。鼠标指针会变成一个问号，如图 4-7 所示。\n\n    ![A437923_1_En_4_Fig7_HTML.jpg](img/A437923_1_En_4_Fig7_HTML.jpg)\n\
    \n    图 4-7. 当鼠标悬停在类文件名上时，按住 Option 键会使其指针变成问号\n\n4.  在按住 Option 键且鼠标指针位于 `NSTextField`\
    \ 上的同时，点击鼠标。Xcode 会显示一个弹出窗口，简要描述 `NSTextField` 类的功能，如图 4-8 所示。\n\n    ![A437923_1_En_4_Fig8_HTML.jpg](img/A437923_1_En_4_Fig8_HTML.jpg)\n\
    \n    图 4-8. Option + 点击类文件名会显示一个描述该类的弹出窗口\n\n5.  点击弹出窗口底部“参考”标签旁的“类参考”。Xcode\
    \ 会显示文档窗口，列出 `NSTextField` 类文件（见图 4-5）。\n\nOption + 点击只是打开文档窗口的一种方式，无需通过“帮助 ➤\
    \ 文档和 API 参考”命令并输入类文件名。\n\n# 浏览文档\n\n快速帮助可以显示特定类文件的信息，但如果您知道自己需要信息却不知道在哪里找到它，该怎么办呢？这时您可以花时间浏览文档窗口，快速翻阅不同的帮助主题，直到找到所需内容。\n\
    \n即使您没有找到想要的内容，您也很有可能偶然发现一些关于 Xcode 或 macOS 的有趣信息，这些信息将来可能会派上用场。\n\n如果您发现了有趣的信息，可以将其添加书签，以便日后快速再次找到。您还可以通过电子邮件或短信发送信息，因此请随时与他人分享有用的信息。\n\
    \n要浏览文档，请按照以下步骤操作：\n\n1.  选择 帮助 ➤ 文档和 API 参考。文档窗口出现。\n2.  点击“浏览 API 参考文档”图标。左窗格会显示一个列表，列出了创建\
    \ macOS 程序时可用的不同框架，如图 4-9 所示。\n\n    ![A437923_1_En_4_Fig9_HTML.jpg](img/A437923_1_En_4_Fig9_HTML.jpg)\n\
    \n    图 4-9. 查看可用的框架\n\n3.  点击类别（如 HealthKit 或 Core Data）左侧显示的灰色展开三角。一个附加主题列表（带有各自的灰色展开三角）会出现。通过继续点击主题的展开三角，您最终会找到可以点击查看信息的主题列表，如图\
    \ 4-10 所示。\n\n    ![A437923_1_En_4_Fig10_HTML.jpg](img/A437923_1_En_4_Fig10_HTML.jpg)\n\
    \n    图 4-10. 每个类别列出了几个其他不同主题的类别\n\n4.  点击“浏览指南和示例代码”图标。会出现一个不同主题的列表，如图 4-11 所示。\n\
    \n    ![A437923_1_En_4_Fig11_HTML.jpg](img/A437923_1_En_4_Fig11_HTML.jpg)\n\n\
    \    图 4-11. “浏览指南和示例代码”图标显示了 macOS 编程的各种主题\n\n5.  点击类别（如“安全”或“图形与动画”）左侧显示的灰色展开三角。一个附加主题列表（带有各自的灰色展开三角）会出现。通过继续点击主题的展开三角，您最终会找到可以点击查看信息的主题列表，如图\
    \ 4-12 所示。\n\n    ![A437923_1_En_4_Fig12_HTML.jpg](img/A437923_1_En_4_Fig12_HTML.jpg)\n\
    \n    图 4-12. 查看特定编程技术或示例代码的信息\n"
- fmt: "## Searching the Documentation\n\nQuick Help can display information about\
    \ specific class files, and browsing the documentation can help you explore the\
    \ vast information about the Cocoa framework and macOS programming. The problems\
    \ are that Quick Help is only useful for finding information about class files\
    \ and browsing the documentation can be time-consuming. If you know what you want\
    \ to find, you can just search for it instead.\n\nWhen searching for information,\
    \ type as much as possible to narrow your search results. If you just type a single\
    \ letter or word, Xcode's documentation will bombard you with irrelevant results.\n\
    \nTo see how searching the documentation window works, try the following:\n\n\
    1. Choose Help ➤ Documentation and API Reference. The Documentation window appears.\
    \  \n2. Click in the Search documentation text field and type text. A menu of\
    \ different text results appears that you can click to get more information, as\
    \ shown in Figure [4-13](#A437923_1_En_4_Chapter.html#Fig13).\n\n   ![A437923_1_En_4_Fig13_HTML.jpg](A437923_1_En_4_Fig13_HTML.jpg)\n\
    \n   Figure 4-13. A menu of results for \"text\"\n3. Click a topic to view that\
    \ information.\n\nBy searching through Xcode's documentation, you can find what\
    \ you need quickly and easily.\n\n## Using Code Completion\n\nIn Chapter [3](#A437923_1_En_3_Chapter.html),\
    \ when you started typing Swift code, you may have noticed something odd. Each\
    \ time you typed part of a Swift command, the Xcode editor may have displayed\
    \ grayed text and a menu of possible commands that match what you partially typed;\
    \ see Figure [4-14](#A437923_1_En_4_Chapter.html#Fig14).\n\n![A437923_1_En_4_Fig14_HTML.jpg](A437923_1_En_4_Fig14_HTML.jpg)\n\
    \nFigure 4-14. Code completion suggests a likely command you may be trying to\
    \ type\n\nThis feature is called code completion and it is Xcode's way of helping\
    \ you insert long commands without actually typing every character yourself. When\
    \ you see grayed out text and a menu, you have three choices:\n\n* Press the Tab\
    \ key to let Xcode automatically type part of the grayed out text. (You may need\
    \ to press the Tab key several times to completely select all the grayed out text.)\n\
    * Double-click a command in the pop-up menu to type that command automatically.\n\
    * Keep typing.\n\nIf you keep typing, Xcode keeps displaying new grayed out text\
    \ that it thinks you may be trying to type along with a menu of different commands\
    \ that match what you've typed so far. Let's see how code completion works.\n\n\
    To see how code completion works, try the following:\n\n1. Make sure your `MyFirstProgram`\
    \ is loaded in Xcode.  \n2. Click `AppDelegate.swift` in the Project Navigator\
    \ pane. The contents of the `AppDelegate.swift` file appear in the middle Xcode\
    \ pane.  \n3. Modify the `@IBAction changeCase (sender: NSButton)` code by deleting\
    \ the one line between the curly brackets so it now appears as follows:\n\n  \
    \ ```\n   @IBAction func changeCase(_ sender: NSButton) {\n   }\n   ```\n\n4.\
    \ Move the cursor between the curly brackets of this `@IBAction` method and type\
    \ `labelText.s` and notice that grayed out text appears and a menu of possible\
    \ commands also appears, as shown in Figure [4-15](#A437923_1_En_4_Chapter.html#Fig15).\n\
    \n   ![A437923_1_En_4_Fig15_HTML.jpg](A437923_1_En_4_Fig15_HTML.jpg)\n\n   Figure\
    \ 4-15. Code completion suggests `stringValue` as a possible command\n5. Tap the\
    \ Tab key. The first time you tap the Tab key, Xcode types `\"string\"`.  \n6.\
    \ Tap the Tab key a second time and now Xcode types the complete `\"stringValue\"\
    `.  \n7. Type `= messageText.stringValue.uppercased()`. Notice that as you type,\
    \ code completion keeps showing different grayed out text and commands in the\
    \ pop-up menu.\n\nBy using code completion, you can type commands faster and more\
    \ accurately. If you start typing a command and you don't see code completion's\
    \ grayed out text or menu appear, this could be a signal that you mistyped the\
    \ command. Code completion is just one more way Xcode tries to make typing code\
    \ easier for you.\n\n## Understanding How macOS Programs Work\n\nTo help you better\
    \ understand what all of Xcode's help documentation means, you need to understand\
    \ how macOS programs work. In the old days when programs were small, programmers\
    \ stored all program commands in a single file. Then the computer started at the\
    \ first command at the top of the file, worked its way down line by line, and\
    \ stopped when it reached the end of the file.\n\nToday programs are much larger\
    \ so they're often divided into multiple files. No matter how many files you divide\
    \ your program into, Xcode treats everything as if it were stored in a single\
    \ file. Dividing a program into files is for your convenience.\n\nLet's examine\
    \ your `MyFirstProgram` line by line so you can understand what's happening. When\
    \ you view Swift code in Xcode, you'll notice that the Xcode editor color codes\
    \ different text. These colors help you identify the purpose of different text\
    \ as follows:\n\n* Green: Comments, which Xcode completely ignores. Comments are\
    \ meant to explain something about the nearby code.\n* Purple: Keywords of the\
    \ Swift language\n* Red: Text strings\n* Blue: Class file names\n* Black: Commands\n\
    \nThe very first line tells Xcode to import or include all the code in the Cocoa\
    \ framework as part of your program. This line looks like this:\n\n```\nimport\
    \ Cocoa\n```\n\nThe next line runs a Swift function that loads your user interface\
    \ (`MainMenu.xib`) and creates an object from your `AppDelegate` class. This basically\
    \ gets your whole program running as a generic Macintosh program. This line looks\
    \ like this:\n\n```\n@NSApplicationMain\n```\n\nThe next line defines a class\
    \ called `AppDelegate` that is based on the `NSObject` class and uses the `NSApplicationDelegate`\
    \ protocol (which you'll learn about shortly). This line looks like this:\n\n\
    ```\nclass AppDelegate: NSObject, NSApplicationDelegate {\n```\n\nThe next three\
    \ lines define IBOutlets that connect this Swift code to the user interface items:\
    \ the window of the user interface along with the label and text field. The window\
    \ is based on the `NSWindow` class (defined in the Cocoa framework) while the\
    \ label and text field are based on the `NSTextField` class. These lines look\
    \ like this:\n\n```\n@IBOutlet weak var window: NSWindow!\n@IBOutlet weak var\
    \ labelText: NSTextField!\n@IBOutlet weak var messageText: NSTextField!\n```\n\
    \nEvery time Xcode creates a new macOS Cocoa Application project, you'll see two\
    \ empty functions that don't do anything. If you typed code inside of these functions,\
    \ the code would run right after your program started up (`applicationDidFinishLaunching`)\
    \ or it would run as soon as your program ended (`applicationWillTerminate`).\
    \ For now, leave these functions alone and ignore them.\n\nThe next three lines\
    \ define an IBAction method that's connected to the push button on the user interface.\
    \ The code takes the text stored in `messageText` (the text field) and converts\
    \ it to uppercase. Then it stores the uppercase text into `labelText` (the label).\
    \ Both the label and text field are based on the `NSTextField` class (defined\
    \ in the Cocoa framework). These lines look like this:\n\n```\n@IBAction func\
    \ changeCase(_ sender: NSButton) {\nlabelText.stringValue = messageText.stringValue.uppercased()\n\
    }\n```\n\nWhen `MyFirstProgram` runs, it imports the Cocoa framework and runs\
    \ to display a generic Macintosh program on the screen that includes your user\
    \ interface. The `applicationDidFinishLaunching` function runs, but since it doesn't\
    \ contain any code, nothing happens. Now the program stops and waits for something\
    \ to happen.\n\nIf the user quits out of the program, the `applicationWillTerminate`\
    \ function will run, but since it doesn't contain any code, nothing happens."
