    \ write a program that solves that missing need.\n\nFor example, Microsoft Office\
    \ offers a password protection feature to lock files. However, Microsoft’s encryption\
    \ feature is weak and easily broken. As a result, there’s a market for software\
    \ that can encrypt files much better than Microsoft Office while offering a similar\
    \ user interface as Microsoft Office.\n\nMost importantly, write a program because\
