  trans: "\n### 向数组添加元素\n\n无论数组是空的还是已经存有数据，你都可以通过 `append` 命令向数组中添加更多元素，如下所示：\n\n\
    ```\narrayName.append(data)\n```\n\n你必须指定要添加数据的数组名称，并将实际数据放在括号内。确保你添加的数据类型正确。因此，如果你要向一个只能存储整数的数组添加数据，则只能向该数组添加另一个整数。\n\
    \n除了使用 `append` 命令，你还可以使用加法复合赋值运算符向数组末尾添加元素，如下所示：\n\n```\narrayName3 += [data1,\
    \ data2, data3, ... dataN]\n```\n\n`+=` 复合赋值运算符可以向数组末尾添加多个元素，而 `append` 命令每次只能向数组末尾添加一个元素。\n\
    \n`append` 命令总是将新元素添加到数组末尾。如果你想在数组的特定位置添加新元素，可以使用 `insert` 和 `at` 命令，如下所示：\n\n\
    ```\narrayName.insert(data, at: index)\n```\n\n使用 `insert` 命令时，你必须添加与该数组数据类型一致的数据。然后，你还必须指定索引编号。如果你选择的索引编号大于数组大小，`insert`\
    \ 命令将不会生效。\n\n要了解如何创建数组并添加数据，请按照以下步骤操作：\n\n1.  在 Xcode 中打开 IntroductoryPlayground\
    \ 文件。\n2.  按如下方式编辑代码：\n\n    ```\n    import Cocoa\n    var arrayName = Array(arrayLiteral:\
    \ 34, 89, 70, 1, -24)\n    var arrayName2 = Int\n    arrayName.append(2)\n   \
    \ arrayName2.append(2)\n    arrayName.insert(-37, at: 2)\n    arrayName2.insert(-37,\
    \ at: 2)\n    ```\n\n请注意，`append` 命令如何将数据添加到数组末尾，而 `insert` 命令则可以将数据添加到数组中的特定位置，如图\
    \ 9-2 所示。\n\n![A437923_1_En_9_Fig2_HTML.jpg](img/A437923_1_En_9_Fig2_HTML.jpg)\n\
    \n图 9-2. 向数组添加数据的两种方式\n\n### 从数组中删除元素\n\n正如你可以向数组添加元素一样，你也可以从数组中删除元素。要删除数组中的最后一个元素，你可以使用\
    \ `removeLast` 命令，如下所示：\n\n```\narrayName.removeLast()\n```\n\n这不仅能删除数组中的最后一个元素，还会返回该值。如果你想将数组的最后一个元素保存到变量中，可以这样做：\n\
    \n```\nvar item = arrayName.removeLast()\n```\n\n如果你想从数组中删除一个特定元素，可以使用 `remove(at:)`\
    \ 命令并指定该元素的索引编号，如下所示：\n\n```\narrayName.remove(at: number)\n```\n\n因此，如果你想删除数组中的第二个元素，需要指定索引为\
    \ 1。与 `removeLast` 命令一样，`remove(at:)` 命令也会返回一个值，你可以将其存储在变量中，如下所示：\n\n```\nvar\
    \ item = arrayName.remove(at: 1)\n```\n\n如果你想删除数组中的所有元素，可以使用 `removeAll` 命令，如下所示：\n\
    \n```\narrayName.removeAll()\n```\n\n要了解如何从数组中删除元素，请按照以下步骤操作：\n\n1.  确保 IntroductoryPlayground\
    \ 文件已在 Xcode 中加载。\n2.  按如下方式编辑代码：\n\n    ```\n    import Cocoa\n    var arrayName\
    \ = Int\n    var item = arrayName.removeLast()\n    print (arrayName)\n    print\
    \ (item)\n    item = arrayName.remove(at: 1)\n    print (arrayName)\n    print\
    \ (item)\n    arrayName.removeAll()\n    ```\n\n请注意在从数组中删除元素时不同命令的工作方式，如图 9-3\
    \ 所示。在指定索引值时，你必须确保索引编号存在。这意味着，如果一个数组包含三个元素，第一个元素的索引为 0，第二个为 1，第三个为 2。因此，你只能从该数组中删除索引为\
    \ 0、1 或 2 的元素，任何其他索引编号都将无效。\n\n![A437923_1_En_9_Fig3_HTML.jpg](img/A437923_1_En_9_Fig3_HTML.jpg)\n\
    \n图 9-3. 从数组中删除元素\n\n从数组中删除元素会将这些元素从数组中物理移除。除了删除数组中的元素，你也可以用新值替换现有元素。你只需指定要替换的数组元素的索引值，并为其分配新数据即可，如下所示：\n\
    \n```\narrayName[index] = newData\n```\n\n因此，如果你想替换数组中的第二个元素（索引值为 1），可以执行以下操作：\n\
    \n```\narrayName[1] = 91\n```\n\n存储在数组索引 1 处的任何现有值都会被数字 `91` 替换。替换数据时，新数据的数据类型必须与数组中的其他元素相同，例如整数或字符串。\n\
    \n### 查询数组\n\n当你拥有一个数组时，你可能想知道该数组是否为空（其中存储了零个元素），或者如果数组不为空，它包含多少个元素。要确定数组是否为空，可以使用返回布尔值的\
    \ `isEmpty` 命令，如下所示：\n\n```\narrayName.isEmpty\n```\n\n如果你想将此布尔值存储在变量中，可以这样做：\n\
    \n```\nvar flag = arrayName.isEmpty\n```\n\n如果你想知道数组中存储了多少个元素，可以使用 `count` 命令，如下所示：\n\
    \n```\narrayName.count\n```\n\n如果你想将此整数值存储在变量中，可以这样做：\n\n```\nvar total = arrayName.count\n\
    ```\n\n### 操作数组\n\n操作数组的两种常见方法是反转所有元素的顺序，或者按升序或降序重新排列元素。这仅仅是反转数组中所有元素的顺序，而不考虑它们的实际值，例如：\n\
    \n```\narrayName.reversed()\n```\n\n当你按升序对数组进行排序时，最小值存储在数组的第一个元素中，最大值存储在数组的最后一个元素中。当你对字符串进行排序时，Swift\
    \ 会按字母顺序排序。要按升序对数组排序，请使用：\n\n```\nmyArray.sort { $0 < $1 }\n```\n\n当你按降序对数组进行排序时，最大值存储在数组的第一个元素中，最小值存储在数组的最后一个元素中。当你对字符串进行排序时，Swift\
    \ 会按反向字母顺序排序。要按降序对数组排序，请使用：\n\n```\nmyArray.sort { $1 < $0 }\n```\n\n要了解反转和排序数组的工作原理，请按照以下步骤操作：\n\
    \n1.  确保 IntroductoryPlayground 文件已在 Xcode 中加载。\n2.  按如下方式编辑代码：\n\n    ```\n \
    \   import Cocoa\n    var myArray = [\"Bob\", \"Fred\", \"Alice\", \"Mary\"]\n\
    \    let backwardsArray : [String]\n    backwardsArray = myArray.reversed()\n\
    \    myArray.sort { $0 < $1 }\n    print (myArray)\n    myArray.sort { $1 < $0\
    \ }\n    print (myArray)\n    ```\n\n请注意，反转数组仅仅是重新排列元素，而排序数组则是根据元素内容实际改变其位置，如图\
    \ 9-4 所示。\n\n![A437923_1_En_9_Fig4_HTML.jpg](img/A437923_1_En_9_Fig4_HTML.jpg)\n\
    \n图 9-4. 对数组进行排序和反转\n"
- fmt: "# Using Dictionaries\n\nArrays can be useful for storing lists of related\
    \ data. The biggest drawback with array comes when you want to retrieve specific\
    \ data. Unless you know the exact index number of an item in an array, retrieving\
    \ data can be cumbersome.\n\nThat's the purpose of a dictionary. Unlike an array\
    \ that just stores data, a dictionary stores two chunks of data known as a key-value\
    \ pair. The value represents the data you want to save and the key represents\
    \ a quick way to retrieve your data.\n\nFor example, consider a list of phone\
    \ numbers. If you stored phone numbers in an array, you would have to retrieve\
    \ a specific phone number by knowing its exact index value. However, if you stored\
    \ phone numbers in a dictionary, you could store each phone number (value) with\
    \ a name (key). Now if you wanted to retrieve a particular phone number, you just\
    \ search for the key (the person's name).\n\nRegardless of where that data might\
    \ be stored in the dictionary, you can quickly retrieve a value using a key. This\
    \ makes retrieving data from a dictionary far easier than retrieving similar data\
    \ from an array.\n\nThink of a dictionary like an array, but instead of storing\
    \ one chunk of data, you're storing a pair of data (a key and a value). Both the\
    \ key and the value can be of different data types but all the keys and all the\
    \ values in a dictionary must be of the same data type.\n\nTo create a dictionary,\
    \ you must define the dictionary and the data types for both the key and its associated\
    \ value. One way to define a dictionary is to do this:\n\n```\nvar DictionaryName\
    \ = [keyDataType: valueDatatype]()\n```\n\nThis defines an empty dictionary but\
    \ specifies the data type of both the key and the value.\n\nA second way to define\
    \ a dictionary is to create a list of key:value pairs like this:\n\n```\nvar DictionaryName\
    \ = [102: \"Fred\", 87: \"Valerie\"]\n```\n\nWhen you directly assign key:value\
    \ pairs, Swift infers the data type of the key and the value. In this case, the\
    \ key data type is an integer (`Int`) and the value data type is a string (`String`).\n\
    \n## Adding Items to a Dictionary\n\nWhether a dictionary is empty or already\
    \ filled with data, you can always add more items to a dictionary by specifying\
    \ the dictionary name and its key value, and then assigning a value such as:\n\
    \n```\nDictionaryName[key] = value\n```\n\nTo see how to create a dictionary and\
    \ add data to it, create a new playground by following these steps:\n\n1. Open\
    \ the `IntroductoryPlayground` file in Xcode.\n2. Edit the code as follows:\n\n\
    \    ```\n    import Cocoa\n    var DictionaryName = [102: \"Fred\", 87: \"Valerie\"\
    ]\n    DictionaryName[120] = \"John\"\n    DictionaryName[96] = \"Jane\"\n   \
    \ print(DictionaryName)\n    ```\n\nThis Swift code defines a dictionary where\
    \ the key:value data types are `Int:String`, which Swift infers from the type\
    \ of data initially stored in the dictionary.\n\nThe next two lines define a key\
    \ (`120`) and a value (`\"John\"`), which gets stored in the dictionary. Then\
    \ the other line defines a key (`96`) and a value (`\"Jane\"`), which also gets\
    \ stored in the dictionary. The last `print` command lets you see how the dictionary\
    \ has changed, as shown in Figure [9-5](#A437923_1_En_9_Chapter.html#Fig5).\n\n\
    ![A437923_1_En_9_Fig5_HTML.jpg](A437923_1_En_9_Fig5_HTML.jpg)\n\nFigure 9-5. Creating\
    \ a dictionary and adding new key:value data to it\n\n## Retrieving and Updating\
    \ Data in a Dictionary\n\nOnce a dictionary contains key:value pairs, you can\
    \ retrieve the value by using the key. To do so, you specify the dictionary name\
    \ and a key. Then you assign this value to a variable such as:\n\n```\nvariable\
    \ = DictionaryName[key]!\n```\n\nThe variable must be the same data type as the\
    \ value stored in the dictionary. Also notice the exclamation mark, which defines\
    \ an implicitly unwrapped variable. This exclamation mark ensures that if the\
    \ key doesn't exist in the dictionary, the non-existent value does not crash your\
    \ program.\n\nThe following example defines two key:value pairs of data in a dictionary.\
    \ Then it uses the `87` key to retrieve the value from the dictionary, which is\
    \ the string `\"Valeria\"`, as shown in Figure [9-6](#A437923_1_En_9_Chapter.html#Fig6).\n\
    \n![A437923_1_En_9_Fig6_HTML.jpg](A437923_1_En_9_Fig6_HTML.jpg)\n\nFigure 9-6.\
    \ Retrieving a value with a key and updating an existing key with new data\n\n\
    ```\nvar DictionaryName = [102: \"Fred\", 87: \"Valerie\"]\nvar name: String\n\
    name = DictionaryName[87]!\nprint(name)\n```\n\nOnce you've stored a key:value\
    \ pair in a dictionary, you can always assign a new value to an existing key using\
    \ the `updateValue` command, like this:\n\n```\nDictionaryName.updateValue(value,\
    \ forKey: key)\n```\n\nSo if you wanted to update the value stored with the `87`\
    \ key, you could do the following:\n\n```\nDictionaryName.updateValue(\"Sam\"\
    , forKey: 87)\n```\n\nTo see how to retrieve a value from a dictionary using a\
    \ key and then update a value for an existing key, follow these steps:\n\n1. Make\
    \ sure the `IntroductoryPlayground` file is loaded in Xcode.\n2. Edit the code\
    \ as follows:\n\n    ```\n    import Cocoa\n    var DictionaryName = [102: \"\
    Fred\", 87: \"Valerie\"]\n    DictionaryName[120] = \"John\"\n    DictionaryName[96]\
    \ = \"Jane\"\n    print(DictionaryName)\n    var name: String\n    name = DictionaryName[87]!\n\
    \    print(name)\n    DictionaryName.updateValue(\"Sam\", forKey: 87)\n    name\
    \ = DictionaryName[87]!\n    print(name)\n    ```\n\nNotice that the first time\
    \ the dictionary retrieves the value associated with the `87` key; it returns\
    \ the string `\"Valerie\"`. Then the `updateValue` command replaces `\"Valerie\"\
    ` with `\"Sam\"` so the next time the dictionary retrieves the value associated\
    \ with the `87` key, it returns the string `\"Sam\"`, as shown in Figure [9-6](#A437923_1_En_9_Chapter.html#Fig6).\n\
    \n## Deleting Data in a Dictionary\n\nOnce a dictionary contains key:value pairs,\
    \ you can delete the value associated with a specific key by using the `removeValue(forKey:key)`\
    \ command like this:\n\n```\nDictionaryName.removeValue(forKey: key)\n```\n\n\
    The `removeValue(forKey:key)` command removes both the key and the value associated\
    \ with that key. Note that if you specify a key that doesn't exist in the dictionary,\
    \ the `removeValue(forKey:key)` command does nothing.\n\nIf you want to delete\
    \ all of the key:value pairs in a dictionary, you can just use the `removeAll`\
    \ command, like this:\n\n```\nDictionaryName.removeAll()\n```"
  raw: "## Using Dictionaries\n\nArrays can be useful for storing lists of related\
    \ data. The biggest drawback with array comes when you want to retrieve specific\
    \ data. Unless you know the exact index number of an item in an array, retrieving\
    \ data can be cumbersome.\n\nThat’s the purpose of a dictionary. Unlike an array\
    \ that just stores data, a dictionary stores two chunks of data known as a key-value\
    \ pair. The value represents the data you want to save and the key represents\
    \ a quick way to retrieve your data.\n\nFor example, consider a list of phone\
    \ numbers. If you stored phone numbers in an array, you would have to retrieve\
    \ a specific phone number by knowing its exact index value. However, if you stored\
    \ phone numbers in a dictionary, you could store each phone number (value) with\
    \ a name (key). Now if you wanted to retrieve a particular phone number, you just\
    \ search for the key (the person’s name).\n\nRegardless of where that data might\
    \ be stored in the dictionary, you can quickly retrieve a value using a key. This\
    \ makes retrieving data from a dictionary far easier than retrieving similar data\
    \ from an array.\n\nThink of a dictionary like an array, but instead of storing\
    \ one chunk of data, you’re storing a pair of data (a key and a value). Both the\
    \ key and the value can be of different data types but all the keys and all the\
    \ values in a dictionary must be of the same data type.\n\nTo create a dictionary,\
    \ you must define the dictionary and the data types for both the key and its associated\
    \ value. One way to define a dictionary is to do this:\n\n```\nvar DictionaryName\
    \ = [keyDataType: valueDatatype]()\n```\n\nThis defines an empty dictionary but\
    \ specifies the data type of both the key and the value.\n\nA second way to define\
    \ a dictionary is to create a list of key:value pairs like this:\n\n```\nvar DictionaryName\
    \ = [102: \"Fred\", 87: \"Valerie\"]\n```\n\nWhen you directly assign key:value\
    \ pairs, Swift infers the data type of the key and the value. In this case, the\
    \ key data type is an integer (Int) and the value data type is a string (String).\n\
    \n### Adding Items to a Dictionary\n\nWhether a dictionary is empty or already\
    \ filled with data , you can always add more items to a dictionary by specifying\
    \ the dictionary name and its key value, and then assigning a value such as\n\n\
    ```\nDictionaryName [key] = value\n```\n\nTo see how to create a dictionary and\
    \ add data to it, create a new playground by following these steps:\n\n1.  Open\
    \ the IntroductoryPlayground file in Xcode.  \n2.  Edit the code as follows:\n\
    \n    ```\n    import Cocoa\n    var DictionaryName = [102: \"Fred\", 87: \"Valerie\"\
    ]\n    DictionaryName [120] = \"John\"\n    DictionaryName [96] = \"Jane\"\n \
    \   print (DictionaryName)\n    ```\n\nThis Swift code defines a dictionary where\
    \ the key:value data types are Int:String, which Swift infers from the type of\
    \ data initially stored in the dictionary.\n\nThe next two lines define a key\
    \ (120) and a value (“John”), which gets stored in the dictionary. Then the other\
    \ line defines a key (96) and a value (“Jane”), which also gets stored in the\
    \ dictionary. The last `print` command lets you see how the dictionary has changed,\
    \ as shown in Figure [9-5](#A437923_1_En_9_Chapter.html#Fig5).\n\n![A437923_1_En_9_Fig5_HTML.jpg](A437923_1_En_9_Fig5_HTML.jpg)\n\
    \nFigure 9-5.\n\nCreating a dictionary and adding new key:value data to it\n\n\
    ### Retrieving and Updating Data in a Dictionary\n\nOnce a dictionary contains\
    \ key:value pairs, you can retrieve the value by using the key. To do so, you\
    \ specify the dictionary name and a key. Then you assign this value to a variable\
    \ such as\n\n```\nvariable = DictionaryName [key]!\n```\n\nThe variable must be\
    \ the same data type as the value stored in the dictionary. Also notice the exclamation\
    \ mark, which defines an implicitly unwrapped variable. This exclamation mark\
    \ insures that if the key doesn’t exist in the dictionary, the non-existent value\
    \ does not crash your program.\n\nThe following example defines two key:value\
    \ pairs of data in a dictionary. Then it uses the 87 key to retrieve the value\
    \ from the dictionary, which is the string “Valeria”, as shown in Figure [9-6](#A437923_1_En_9_Chapter.html#Fig6).\n\
    \n![A437923_1_En_9_Fig6_HTML.jpg](A437923_1_En_9_Fig6_HTML.jpg)\n\nFigure 9-6.\n\
    \nRetrieving a value with a key and updating an existing key with new data\n\n\
    ```\nvar DictionaryName = [102: \"Fred\", 87: \"Valerie\"]\nvar name : String\n\
    name = DictionaryName [87]!\nprint (name)\n```\n\nOnce you’ve stored a key:value\
    \ pair in a dictionary, you can always assign a new value to an existing key using\
    \ the `updateValue` command, like this:\n\n```\nDictionaryName.updateValue(value,\
    \ forKey: key)\n```\n\nSo if you wanted to update the value stored with the 87\
    \ key, you could do the following:\n\n```\nDictionaryName.updateValue(\"Sam\"\
