    is known as optional binding. Instead of using the optional variable, you assign
    or bind its value to a constant, such as


    ```

    if let constant = optionalVariable {

    // Optional is not nil

    } else {

    // Optional is a nil value

    }

    ```


    If you need to test several optional variables, you can list them on a single
    line like this:


    ```

    if let constant = optionalVariable, constant2 = optionalVariable2 {

    // No optionals are nil

    } else {

    // One or more optionals are nil

    }

    ```


    If the constant holds a value, then the if-else statement can use the constant
    value. If the constant does not hold a value (contains nil), then the if-else
    statement does something else to avoid using a nil value. By using a constant
    to store the value of an optional variable, you avoid unwrapping an optional variable
    using the exclamation mark.


    Let''s see how to use optional binding:


    1.  From within Xcode choose File ➤ New ➤ Playground. Xcode now asks for a playground
    name.  

    2.  Click in the Name text field and type DefensePlayground.  

    3.  Make sure the Platform pop-up menu displays macOS.  

    4.  Click the Next button. Xcode asks where you want to store the playground.
     

    5.  Choose a folder to store your project and click the Create button.  

    6.  Edit the playground code as follows:


    ```

    import Cocoa

    var test : String?

    var final : String?

    if let checkMe = test, let checkMe2 = final {

    print (checkMe)

    } else {

    print ("Nil value in one or both optionals")

    }

    test = "Hello"

    if let checkMe = test, let checkMe2 = final {

    print (checkMe)

    } else {

    print ("Nil value in one or both optionals")

    }

    final = "Bye"

    if let checkMe = test, let checkMe2 = final {

    print (checkMe + " & " + checkMe2)

    } else {

    print ("Nil value in one or both optionals")

    }

    ```


    The above code assigns two different optional variable values to two different
    constants. Only if both constants contain a non-nil value will the first part
    of the if-else statement run. If one or both constants contain a nil value, then
    the else part of the if-else statement runs, as shown in Figure [25-2](#A437923_1_En_25_Chapter.html#Fig2).
    Also notice that none of the code unwraps any optional variable using the exclamation
    mark.


    ![A437923_1_En_25_Fig2_HTML.jpg](A437923_1_En_25_Fig2_HTML.jpg)


    Figure 25-2.


    Using optional binding to assign an optional variable value to a constant'
