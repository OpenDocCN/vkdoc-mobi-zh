  trans: "\n# 使用复选框\n\n你可以单独使用一个复选框，也可以将多个复选框组合使用。复选框实际上基于`NSButton`类，尽管它的外观和行为与典型按钮大不相同。对于复选框而言，最重要的三个属性是：\n\
    \n*   **标题**：显示在复选框旁边，描述供用户选择的选项的文本。\n*   **状态**：确定复选框是选中（1）还是未选中（0）。\n*   **替代文本**：复选框未选中时显示的文本。（复选框选中时显示标题文本。）\n\
    \n要了解复选框的工作原理，请按照以下步骤操作：\n\n1.  在 Xcode 中选择“文件”➤“新建”➤“项目”。\n2.  在 macOS 类别下点击“应用程序”。\n\
    3.  点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 现在会要求您输入产品名称。\n4.  点击“产品名称”文本字段，输入 `CheckProgram`。\n\
    5.  确保“语言”弹出菜单显示“Swift”，并且“使用故事板”复选框已选中。\n6.  点击“下一步”按钮。Xcode 会询问您希望将项目存储在哪里。\n\
    7.  选择一个文件夹来存储项目，然后点击“创建”按钮。\n8.  在项目导航器中点击 `MainMenu.xib` 文件。您的程序用户界面将会出现。\n\
    9.  选择“视图”➤“实用工具”➤“显示对象库”。对象库会出现在 Xcode 窗口的右下角。\n10. 将一个推送按钮、三个复选框和一个可换行的文本字段拖到用户界面窗口中。请确保调整可换行文本字段和所有复选框的宽度，使其看起来像图\
    \ 18-2。\n\n![A437923_1_En_18_Fig2_HTML.jpg](img/A437923_1_En_18_Fig2_HTML.jpg)\n\
    \n图 18-2. CheckProgram 的用户界面\n\n11. 选择“视图”➤“实用工具”➤“显示属性检查器”。“显示属性检查器”面板会出现在 Xcode\
    \ 窗口的右上角。\n12. 点击顶部的复选框，在“显示属性检查器”面板中，将其标题改为“无狗”，替代文本改为“狗”。\n13. 点击中间的复选框，在“显示属性检查器”面板中，将其标题改为“无猫”，替代文本改为“猫”。\n\
    14. 点击顶部的复选框，在“显示属性检查器”面板中，将其标题改为“无鸟”，替代文本改为“鸟”。\n15. 双击推送按钮，将其标题改为“检查”。\n16.\
    \ 选择“视图”➤“助理编辑器”➤“显示助理编辑器”。Xcode 会在用户界面旁边显示 `ViewController.swift` 文件。\n17. 将鼠标指针移到“狗”复选框上，按住\
    \ Control 键，将鼠标拖到 `ViewController.swift` 文件中 `IBOutlet` 行下方。\n18. 松开 Control 键和鼠标。会弹出一个窗口。\n\
    19. 点击“名称”文本字段，输入 `dogBox`，然后点击“连接”按钮。\n20. 将鼠标指针移到“猫”复选框上，按住 Control 键，将鼠标拖到\
    \ `ViewController.swift` 文件中 `IBOutlet` 行下方。\n21. 松开 Control 键和鼠标。会弹出一个窗口。\n22.\
    \ 点击“名称”文本字段，输入 `catBox`，然后点击“连接”按钮。\n23. 将鼠标指针移到“鸟”复选框上，按住 Control 键，将鼠标拖到 `ViewController.swift`\
    \ 文件中 `IBOutlet` 行下方。\n24. 松开 Control 键和鼠标。会弹出一个窗口。\n25. 点击“名称”文本字段，输入 `birdBox`，然后点击“连接”按钮。\n\
    26. 将鼠标指针移到可换行文本字段上，按住 Control 键，将鼠标拖到 `ViewController.swift` 文件中 `IBOutlet` 行下方。\n\
    27. 松开 Control 键和鼠标。会弹出一个窗口。\n28. 点击“名称”文本字段，输入 `messageBox`，然后点击“连接”按钮。您现在应该拥有了四个新的\
    \ `IBOutlet`，如下所示：\n\n```\n@IBOutlet weak var dogBox: NSButton!\n@IBOutlet weak\
    \ var catBox: NSButton!\n@IBOutlet weak var birdBox: NSButton!\n@IBOutlet weak\
    \ var messageBox: NSTextField!\n```\n\n29. 将鼠标指针移到“检查”推送按钮上，按住 Control 键，将鼠标拖到\
    \ `ViewController.swift` 文件底部最后一个花括号上方。\n30. 松开 Control 键和鼠标。会弹出一个窗口。\n31. 点击“连接”弹出菜单，选择“动作”。\n\
    32. 点击“名称”文本字段，输入 `checkBoxes`。\n33. 点击“类型”弹出菜单，选择 `NSButton`。\n34. 点击“连接”按钮。Xcode\
    \ 会创建一个空的 `IBAction` 方法。\n35. 按如下方式修改此 `checkBoxes` `IBAction` 方法：\n\n```\n@IBAction\
    \ func checkBoxes(_ sender: NSButton) {\n    let nextLine = \"\\r\\n\"\n    var\
    \ message : String = \"\"\n    if dogBox.state == 1 {\n        message = \"狗复选框已选中\"\
    \ + nextLine\n    } else {\n        message = \"狗复选框未选中\" + nextLine\n    }\n\
    \    if catBox.state == 1 {\n        message = message + \"猫复选框已选中\" + nextLine\n\
    \    } else {\n        message = message + \"猫复选框未选中\" + nextLine\n    }\n   \
    \ if birdBox.state == 1 {\n        message = message + \"鸟复选框已选中\" + nextLine\n\
    \    } else {\n        message = message + \"鸟复选框未选中\" + nextLine\n    }\n   \
    \ messageBox.stringValue = message\n}\n```\n\n此代码创建了一个常量（`nextLine`），它代表一个回车符（`\\\
    r`）和一个换行符（`\\n`）。它声明了一个可以保存 `String` 数据类型的消息变量，并且初始包含 `\"\"`，一个空字符串。多个 `if`-`else`\
    \ 语句检查每个复选框的 `State` 属性，以确定它是选中（`state = 1`）还是未选中（`state = 0`）。然后，它会将结果显示在可换行文本字段中，该字段由一个名为\
    \ `messageBox` 的 `IBOutlet` 变量表示。\n\n36. 选择“产品”➤“运行”。您的用户界面将会出现。\n37. 点击不同的复选框。注意，每次选择或取消选择复选框时，标题或替代文本都会出现。\n\
    38. 点击“检查”推送按钮。可换行文本字段会识别出您选中了哪些复选框以及哪些复选框是未选中的。\n39. 选择“CheckProgram”➤“退出 CheckProgram”。\n"
- fmt: "# Using Radio Buttons\n\nUnlike check boxes that allow the user to select\
    \ multiple options, radio buttons display multiple options but only let the user\
    \ select one at a time. The moment the user selects another radio button, the\
    \ currently selected radio button gets cleared.\n\nTo identify which radio button\
    \ a user selected, you need to change the `Tag` property of each radio button\
    \ individually. Then you can retrieve the selected radio button by using the `selectedTag()`\
    \ method.\n\nTo see how to use radio buttons, follow these steps:\n\n1.  From\
    \ within Xcode choose File ➤ New ➤ Project.\n2.  Click Application under the macOS\
    \ category.\n3.  Click Cocoa Application and click the Next button. Xcode now\
    \ asks for a product name.\n4.  Click in the Product Name text field and type\
    \ `RadioProgram`.\n5.  Make sure the Language pop-up menu displays Swift and that\
    \ the “Use Storyboards” check box is selected.\n6.  Click the Next button. Xcode\
    \ asks where you want to store the project.\n7.  Choose a folder to store your\
    \ project and click the Create button.\n8.  Click the `Main.storyboard` file in\
    \ the Project Navigator. Your program's user interface appears.\n9.  Click the\
    \ `RadioProgram` icon to display the window of your program's user interface.\n\
    10.  Choose View ➤ Utilities ➤ Show Object Library. The Object Library appears\
    \ in the bottom right corner of the Xcode window.\n11.  Drag a push button and\
    \ four radio buttons on to the user interface window so it looks like Figure [18-3](#A437923_1_En_18_Chapter.html#Fig3).\n\
    \n![A437923_1_En_18_Fig3_HTML.jpg](A437923_1_En_18_Fig3_HTML.jpg)\n\nFigure 18-3.\
    \ The user interface of the `RadioProgram`\n\n12.  Click the top radio button\
    \ in the upper left corner and make sure its `Tag` property in the View category\
    \ of the Attributes Inspector pane is set to `0`.\n13.  Click the top radio button\
    \ in the upper right column and make sure its `Tag` property is set to `1`.\n\
    14.  Click the bottom radio button in the lower left column and make sure its\
    \ `Tag` property is set to `2`.\n15.  Click the bottom radio button in the lower\
    \ right column and make sure its `Tag` property in the Show Attributes Inspector\
    \ pane is set to `3`.\n16.  Choose View ➤ Assistant Editor ➤ Show Assistant Editor.\
    \ The `ViewController.swift` file appears next to your user interface.\n17.  Move\
    \ the mouse pointer over the radio button in the upper left corner, hold down\
    \ the Control key, and drag underneath the `IBOutlet` line.\n18.  Release the\
    \ Control key and the mouse. A pop-up window appears.\n19.  Click in the Name\
    \ text field and type `radioZero`. An `IBOutlet` appears as follows:\n\n```\n\
    @IBOutlet weak var radioZero: NSButton!\n```\n\n20.  Choose View ➤ Utilities ➤\
    \ Show Attributes Inspector.\n21.  Scroll down the Attributes Inspector pane and\
    \ make sure the `Tab` property is `0`.\n22.  Move the mouse pointer over the radio\
    \ button in the upper right corner, hold down the Control key, and drag underneath\
    \ the `IBOutlet` line.\n23.  Release the Control key and the mouse. A pop-up window\
    \ appears.\n24.  Click in the Name text field and type `radioOne`.\n25.  Choose\
    \ View ➤ Utilities ➤ Show Attributes Inspector.\n26.  Scroll down the Attributes\
    \ Inspector pane and change the `Tab` property to `1`.\n27.  Move the mouse pointer\
    \ over the radio button in the lower left corner, hold down the Control key, and\
    \ drag underneath the `IBOutlet` line.\n28.  Release the Control key and the mouse.\
    \ A pop-up window appears.\n29.  Click in the Name text field and type `radioTwo`.\n\
    30.  Choose View ➤ Utilities ➤ Show Attributes Inspector.\n31.  Scroll down the\
    \ Attributes Inspector pane and change the `Tab` property to `2`.\n32.  Move the\
    \ mouse pointer over the radio button in the lower right corner, hold down the\
    \ Control key, and drag underneath the `IBOutlet` line.\n33.  Release the Control\
    \ key and the mouse. A pop-up window appears.\n34.  Click in the Name text field\
    \ and type `radioThree`. You should have four `IBOutlet`s as follows:\n\n```\n\
    @IBOutlet weak var radioZero: NSButton!\n@IBOutlet weak var radioOne: NSButton!\n\
    @IBOutlet weak var radioTwo: NSButton!\n@IBOutlet weak var radioThree: NSButton!\n\
    ```\n\n35.  Choose View ➤ Utilities ➤ Show Attributes Inspector.\n36.  Scroll\
    \ down the Attributes Inspector pane and change the `Tab` property to `3`.\n37.\
    \  Type the following underneath the four `IBOutlet`s:\n\n```\nvar radioButtonSelected\
    \ : String?\n```\n\n38.  Move the mouse pointer over the push button, hold down\
    \ the Control key, and drag the mouse over the last curly bracket at the bottom\
    \ of the `ViewController.swift` file.\n39.  Release the Control key and the mouse.\
    \ A pop-up window appears.\n40.  Click in the Connect pop-up menu and choose Action.\n\
    41.  Click in the Name text field and type `displayButton`.\n42.  Click in the\
    \ Type pop-up menu and choose `NSButton`.\n43.  Click the Connect button. Xcode\
    \ creates an empty `IBAction` method.\n44.  Modify the `IBAction` method as follows:\n\
    \n```\n@IBAction func displayButton(_ sender: NSButton) {\n    let myAlert = NSAlert()\n\
    \    if radioButtonSelected != nil {\n        myAlert.messageText = \"You clicked\
    \ the radio button in the \" + radioButtonSelected!\n    } else {\n        myAlert.messageText\
    \ = \"No radio button selected\"\n    }\n    myAlert.runModal()\n}\n```\n\n45.\
    \  Move the mouse pointer over the upper left radio button, hold down the Control\
    \ key, and drag the mouse over the last curly bracket at the bottom of the `ViewController.swift`\
    \ file.\n46.  Release the Control key and the mouse. A pop-up window appears.\n\
    47.  Click in the Connect pop-up menu and choose Action.\n48.  Click in the Name\
    \ text field and type `whichRadioButton`.\n49.  Click in the Type pop-up menu\
    \ and choose `NSButton`.\n50.  Click the Connect button. Xcode creates an empty\
    \ `IBAction` method.\n51.  Modify the `IBAction` method as follows:\n\n```\n@IBAction\
    \ func whichRadioButton(_ sender: NSButton) {\n    switch sender.tag {\n    case\
    \ 0 :\n        radioOne.state = 0\n        radioTwo.state = 0\n        radioThree.state\
    \ = 0\n        radioButtonSelected = \"Upper left\"\n    case 1 :\n        radioZero.state\
    \ = 0\n        radioTwo.state = 0\n        radioThree.state = 0\n        radioButtonSelected\
    \ = \"Upper right\"\n    case 2 :\n        radioZero.state = 0\n        radioOne.state\
    \ = 0\n        radioThree.state = 0\n        radioButtonSelected = \"Lower left\"\
    \n    case 3 :\n        radioZero.state = 0\n        radioOne.state = 0\n    \
    \    radioTwo.state = 0\n        radioButtonSelected = \"Lower right\"\n    default:\n\
    \        radioButtonSelected = \"No radio button selected\"\n    }\n}\n```\n\n\
    52.  Move the mouse pointer over the upper right radio button, hold down the Control\
    \ key, and drag the mouse over the `func` keyword in the `whichRadioButton` `IBAction`\
    \ function in the `ViewController.swift` file until the entire function appears\
    \ highlighted.\n53.  Release the mouse and the Control key.\n54.  Move the mouse\
    \ pointer over the lower left radio button, hold down the Control key, and drag\
    \ the mouse over the `func` keyword in the `whichRadioButton` `IBAction` function\
    \ in the `ViewController.swift` file until the entire function appears highlighted.\n\
    55.  Release the mouse and the Control key.\n56.  Move the mouse pointer over\
    \ the lower right radio button, hold down the Control key, and drag the mouse\
    \ over the `func` keyword in the `whichRadioButton` `IBAction` function in the\
    \ `ViewController.swift` file until the entire function appears highlighted.\n\
    57.  Release the mouse and the Control key. All four radio buttons should now\
    \ be connected to the `whichRadioButton` `IBAction` function.\n58.  Choose Product\
    \ ➤ Run. Your user interface appears.\n59.  Click a radio button and then click\
    \ the push button. An alert dialog appears, displaying the radio button you selected.\n\
    60.  Click the OK button to make the alert dialog go away.\n61.  Choose RadioProgram\
    \ ➤ Quit RadioProgram."
