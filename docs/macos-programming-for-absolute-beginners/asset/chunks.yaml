    \ \"Legal\"\n} else {\nreturn \"Underage\"\n}\n}\nvar text : String\nvar myAge\
    \ : Int\nmyAge = 32\ntext = checkMe (myAge : myAge)\nextension Int {\nvar name\
    \ : String {\nreturn text\n}\n}\nvar status = myAge.name\nprint (myAge)\nprint\
    \ (status)\nmyAge = 16\ntext = checkMe (myAge : myAge)\nstatus = myAge.name\n\
    print (myAge)\nprint (status)\n```\n\nFigure 24-7 shows the result of running\
    \ this code. As you can see, when the `myAge` variable is greater than 21, its\
    \ `name` property stores a string, which gets stored in the `status` variable.\
    \ Depending on the value of the `myAge` variable, the `name` property stores either\
    \ the string “Legal” or the string “Underage.”\n\n![A437923_1_En_24_Fig7_HTML.jpg](A437923_1_En_24_Fig7_HTML.jpg)\n\
    \n**Figure 24-7.** Protocol extensions can extend common data types\n\n## Summary\n\
    \nProtocols offer an alternate way to extend existing code. Just like a class,\
    \ a protocol can define properties and methods. The main difference is that a\
    \ protocol only defines a method’s name and parameters, but does not actually\
    \ include Swift code that implements that method.\n\nAnother difference is that\
    \ when a protocol defines properties, it must also define whether that property\
    \ is gettable `{ get }` or gettable and settable `{ get set }`.\n\nProtocols work\
    \ much like inheritance. While inheritance only allows classes to inherit from\
    \ exactly one other class, protocols can extend classes, structures, and enums\
    \ using one or more protocols.\n\nProtocol extensions let you define default values\
