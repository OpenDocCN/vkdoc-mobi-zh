    以电子游戏为例。没有任何游戏可以完全由顺序组织的指令编写而成，因为那样游戏每次都会以完全相同的方式运行。相反，电子游戏需要随时根据玩家的行为进行调整。如果玩家将物体向左移动，游戏需要做出与向右移动或不移动不同的响应。使用分支指令赋予了计算机做出不同反应的能力，从而使程序永远不会有完全相同的运行方式。


