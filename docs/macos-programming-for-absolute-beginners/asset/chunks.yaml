- fmt: "### Creating Size Constraints\n\nThe previous example showed how to keep a\
    \ push button from expanding in size by modifying a constraint from `=` to `≥`.\
    \ However, another way to keep user interface items a fixed size is to apply size\
    \ constraints. A size constraint can define one of the following:\n\n- Height\n\
    - Width\n- Aspect Ratio\n\nThe aspect ratio keeps the ratio between the height\
    \ and width a fixed value so widening the item also makes it taller (and vice\
    \ versa). To define a size constraint, you simply Control-drag within the boundaries\
    \ of a user interface item. To see how to define a size constraint, follow these\
    \ steps:\n\n1. Make sure the `ConstraintProgram` is loaded in Xcode.  \n2. Click\
    \ the `Main.storyboard` file in the Project Navigator pane.  \n3. Click the push\
    \ button.  \n4. Choose View ➤ Utilities ➤ Show Size Inspector. The Size Inspector\
    \ pane appears, displaying the constraints on the push button (see Figure [20-7](#A437923_1_En_20_Chapter.html#Fig7)).\
    \  \n5. Move the mouse pointer over the push button.  \n6. Hold down the Control\
    \ key and drag the mouse to the left or right but stay within the boundaries of\
    \ the push button.  \n7. Release the Control key and the left mouse button. A\
    \ pop-up menu appears, as shown in Figure [20-14](#A437923_1_En_20_Chapter.html#Fig14).\n\
    \n   ![A437923_1_En_20_Fig14_HTML.jpg](A437923_1_En_20_Fig14_HTML.jpg)\n\n   Figure\
    \ 20-14. Creating a size constraint  \n8. Choose Width. Notice that Xcode displays\
    \ a width constraint under the push button, as shown in Figure [20-15](#A437923_1_En_20_Chapter.html#Fig15).\
    \ This width constraint keeps the push button a fixed size.\n\n   ![A437923_1_En_20_Fig15_HTML.jpg](A437923_1_En_20_Fig15_HTML.jpg)\n\
    \n   Figure 20-15. A width constraint appears under the item  \n9. Click the Edit\
    \ button that appears to the right of the Width constraint. A pop-up window appears.\
    \  \n10. Click the Constant pop-up menu and change the `=` to a `≤`.  \n11. Click\
    \ in the Constant text field and whatever value is there (such as 70), enter double\
    \ that value (such as 140). This defines the width constraint to make the push\
    \ button width equal or less than a specific value.  \n12. Choose Product ➤ Run.\
    \ Your user interface appears. Notice that you can only resize the window width\
    \ to a limited size. When you widen the window, the push button expands in width\
    \ up to a certain size. Then the constraint keeps the window from resizing any\
    \ wider.  \n13. Choose `ConstraintProgram` ➤ Quit `ConstraintProgram`.\n\n###\
    \ Creating Constraints Between Multiple User Interface Items\n\nConstraining items\
    \ to the edge of a window and constraining the size of an item are two ways to\
    \ use constraints. A third way to use constraints is to define distances between\
    \ two separate user interface items such as a button and a text field.\n\nBy defining\
    \ constraints between user interface items, you can insure that your entire user\
    \ interface looks good no matter how the user may resize the program windows.\
    \ In addition, creating constraints between user interface items keeps you from\
    \ exhaustively defining constraints to the window edges for every user interface\
    \ item.\n\nTo create constraints between user interface items, Control-drag the\
    \ mouse from one user interface item to another. You can define a fixed distance\
    \ between two items or how two items must align, such as keeping their tops or\
    \ bottoms aligned with one another.\n\nTo learn how to create constraints between\
    \ user interface items, follow these steps:\n\n1. Make sure the `ConstraintProgram`\
    \ is loaded in Xcode.  \n2. Click the `Main.storyboard` file in the Project Navigator\
    \ pane.  \n3. Click the push button. There should be three constraints between\
    \ the push button and the right, left, and bottom window edges. In addition, there\
    \ should be a size constraint underneath the push button.  \n4. Place a text field\
    \ to the right of the push button.  \n5. Move the mouse pointer over the text\
    \ field, hold down the Control key, and drag the mouse until the mouse pointer\
    \ appears over the push button, as shown in Figure [20-16](#A437923_1_En_20_Chapter.html#Fig16).\n\
    \n   ![A437923_1_En_20_Fig16_HTML.jpg](A437923_1_En_20_Fig16_HTML.jpg)\n\n   Figure\
    \ 20-16. Defining a constraint between user interface items  \n6. Release the\
    \ Control key and the left mouse button. A pop-up menu appears, as shown in Figure\
    \ [20-17](#A437923_1_En_20_Chapter.html#Fig17).\n\n   ![A437923_1_En_20_Fig17_HTML.jpg](A437923_1_En_20_Fig17_HTML.jpg)\n\
    \n   Figure 20-17. Choosing a constraint between user interface items  \n7. Choose\
    \ the Horizontal Spacing option. Xcode displays a constraint between the push\
    \ button and the text field. Notice that Xcode displays a red border around the\
    \ text field because there aren’t enough constraints to define the text field’s\
    \ position in the window. You could manually add more constraints but you can\
    \ also let Xcode add the constraints automatically. The only drawback is that\
    \ Xcode doesn’t always guess the correct constraints you need.  \n8. Make sure\
    \ the text field is still selected and then choose Editor ➤ Resolve Auto Layout\
    \ Issues ➤ Add Missing Constraints in the top half of the submenu, as shown in\
    \ Figure [20-18](#A437923_1_En_20_Chapter.html#Fig18). (If you choose Add Missing\
    \ Constraints in the bottom half of the submenu, Xcode will add constraints to\
    \ all items currently on the user interface.) Xcode adds additional constraints\
    \ and removes the red border around the text field.\n\n   ![A437923_1_En_20_Fig18_HTML.jpg](A437923_1_En_20_Fig18_HTML.jpg)\n\
    \n   Figure 20-18. Xcode can automatically add constraints  \n9. Choose Product\
    \ ➤ Run. Your user interface appears. Notice that when you resize the window,\
    \ the text field always moves to maintain a fixed distance from the push button.\
    \  \n10. Choose `ConstraintProgram` ➤ Quit `ConstraintProgram`.\n\n**Note**\n\n\
    If you choose Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints,\
    \ Xcode will automatically add all necessary constraints to the currently selected\
    \ user interface item (if you choose Reset to Suggested Constraints in the top\
    \ half of the submenu) or to all user interface items (if you choose Reset to\
    \ Suggested Constraints in the bottom half of the submenu).\n\n### Deleting Constraints\n\
    \nDefining constraints can often be a process of trial and error until you get\
    \ the results you want. If you define a constraint that doesn’t work the way you\
    \ want, you can always delete that constraint. To delete a single constraint,\
    \ you have two choices:\n\n- Click the constraint on the user interface and then\
    \ press the Backspace key.\n- Click the constraint in the Size Inspector pane\
    \ and then press the Backspace key.\n\nIf you want to remove all constraints from\
    \ a single user interface item such as a button or text field, follow these steps:\n\
    \n1. Click the user interface item that contains the constraints you want to delete.\
    \  \n2. Choose Editor ➤ Resolve Auto Layout Issues ➤ Clear Constraints (in the\
    \ top half of the submenu).\n\nIf you want to remove all constraints from a user\
    \ interface, follow these steps:\n\n1. Click the user interface item that contains\
    \ the constraints you want to delete.  \n2. Choose Editor ➤ Resolve Auto Layout\
    \ Issues ➤ Clear Constraints (in the bottom half of the submenu)."
