  trans: '

    ### 发布关于你软件的演示视频


    为你的软件撰写博客文章对喜欢阅读的人来说很棒。可惜如今世事繁忙，许多人没时间阅读。另一种方法是制作短视频演示你的软件如何运作，让人们看到你的软件能解决什么问题以及如何解决。


    通常来说，没人想购买或使用你的软件。他们真正想要的是你的软件所能提供的解决方案，而这正是你需要在视频中强调的。不要解释菜单系统或用户界面的布局。专注于解决一个具体问题，并突出你软件中的独特之处。


    例如，假设你的软件是为房地产经纪人设计的。你的潜在客户要么想节省时间，要么想赚更多钱，所以请展示你的软件如何能帮助房地产经纪人实现这两个目标。演示一个能简化现有耗时流程的功能。再展示另一个能以较少额外工作量增加房产潜在买家人数的功能。始终关注你的软件如何为用户带来好处。


    保持视频简短且切中要点。更多人会观看一个不到一分钟、演示单一功能的视频。观看一个 30 分钟、演示多个功能的视频的人则要少得多。在像 YouTube 这样的许多视频分享网站上，你甚至可以将多个视频串联起来，这样当一个视频结束时，第二个视频自动开始。这样一来，每个视频都成了你产品的又一个广告，而通过将每个视频链接到另一个，每个新视频都能增加有人发现并观看其中至少一个视频的机会。


    ### 提供免费信息


    人们倾向于从他们信任的人那里购买更多产品，因此让人们对您产生信任的一种方法就是免费提供有用的信息。例如，如果你的软件帮助编辑照片，那就写一份捕捉更佳照片的窍门清单。然后以
    PDF 文件形式分享这份窍门清单并免费赠送，附上一个链接到你的网站来推广你的软件。


    免费、有用的信息充当着一种巧妙的广告。传统广告直接推销产品，这可能会立刻让哪怕是最好的潜在客户望而却步。而免费信息则巧妙地推广产品。由于免费信息对你的潜在客户有用，他们会更愿意查看它，甚至与他人分享。如果他们想了解更多信息，他们可以访问你的网站。


    一种在视觉上吸引人的提供免费信息的方式是通过图文结合的形式，也就是所谓的信息图。信息图以色彩丰富的方式呈现信息，使其易于阅读和理解，无需阅读大量文字。如图
    28-2 所示，就连 IBM 也会制作并分发免费的信息图来推广其服务和产品。


    ![A437923_1_En_28_Fig2_HTML.jpg](img/A437923_1_En_28_Fig2_HTML.jpg)


    图 28-2. IBM 提供一份 PDF 格式的信息图，以推广其服务如何帮助了 American Greetings 公司


    通过提供免费、有用的信息，你将自己塑造成权威。如果你能提供免费、有用的信息（以 PDF 文件和博客文章的形式）放在你的网站上，你就会给人们更多理由反复访问你的网站/博客。人们访问的次数越多，他们最终购买你的软件或向他人介绍你的网站/博客的可能性就越大。


    免费、有用的信息能让你显得值得信赖，这降低了购买你软件的门槛。人们越信任你，他们就越有可能相信你的产品能实现你所宣称的功能。


    ### 加入社交网络


    在你的博客中或以 PDF 文件形式免费提供有用的信息，可以帮助你确立自己在该领域的权威地位。然而，博客需要有人访问你的网站，而 PDF 文件则需要有人下载。分享免费有用信息的另一种方法是与热门社交网络保持持续联系。


    找出你的潜在客户在使用哪些社交网络，然后加入这些网络。当人们提出问题，就跳进去用有用的建议回答他们。目的是解答人们的问题，并让自己显得值得信赖。然后确保你发布的每条消息都包含一个指向你网站或博客的链接。


    参与社交网络能让你比指望人们访问你的博客或找到你的 PDF 文件更快地接触到潜在客户。只是要确保你提供的是有用的信息，而不是那些只会惹恼别人的、伪装拙劣的广告文案。人们在社交网络上越信任你，他们就越有可能访问你的网站/博客。


    借助于所有这些技巧，目标并非让人立刻购买你的产品（尽管这总是好事）。真正的目标是引导他们向了解更多你和你的产品迈进一步。人们越了解你的产品，就越有可能向你购买。


    广告和营销本质上是一场数字游戏。持续以不占用太多时间或金钱的方式免费帮助他人，最终你会发发现有人找到你并购买你的软件。你帮助别人越多，别人就越信任你并从你这里购买。


    传统的营销和广告方式试图强迫人们听广告并违背自己意愿购买（这也是为什么这么多人讨厌营销和广告）。更有效的营销和广告方式是在要求潜在客户购买之前，先给他们一些有价值的东西。

    '
- fmt: '# Summary


    Most programmers focus on increasing their technical knowledge of programming.
    While knowing as much as possible about `Swift`’s features and the `Cocoa` framework
    can always be helpful, technical knowledge alone is rarely enough.


    Programming involves more than just writing code. Before you even start writing
    `Swift` code, you need to make sure there’s a market for your program. Rather
    than trying to compete against big companies, look for niche markets that big
    companies are ignoring, or look for ways your program can supplement programs
    offered by a big company. Big companies have far more resources that they can
    use to crush any direct competitors, so by targeting a niche market or a way to
    supplement their own products, you can avoid directly competing with a much bigger
    company.


    Before you start writing `Swift` code, create prototypes of your software’s user
    interface. Although user interface design may not sound as appealing to programmers
    as digging into the intricacies of writing code, it’s a vital part of any software
    project. The user interface determines how people view your program. A well-designed
    user interface can make your program easier to use. A poorly designed user interface
    can make a program seem harder to use, despite any technical features it may offer.


    Test your user interface designs as quickly and cheaply as possible using paper
    and pencil. When you need to create an interactive version of your user interface,
    create simple mockups using presentation software like `Keynote` or `PowerPoint`,
    or consider buying special mockup construction software.


    When you have a final user interface design, create it in `Xcode`. Just remember
    that as your program continues to evolve, you’ll likely still need to make changes
    to your user interface.


    Finally, when your program is complete, your work still isn’t done. You’ll still
    need to advertise and market your software. Rather than spend money buying ads,
    it’s far less expensive and often more effective to pursue free options instead.


    Start a blog, give away free information, and provide something of value to others.
    The more you give to others, the more likely others will be attracted to your
    product and buy from you.


    As you can see, coding is just one stage of creating and marketing software. Technical
    knowledge can create software, but you still need additional skills before and
    after coding to properly design your program and successfully sell it afterwards.'
