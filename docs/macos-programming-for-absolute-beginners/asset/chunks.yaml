    \ 以及变量的属性观察器。\n\n在最简单的层面上，getter 只是返回一个变量的值。在更复杂的层面上，getter 可以计算出一个值。考虑以下示例：\n\
    \n```swift\nclass BasicDesign {\n    var location: Int {\n        get {\n    \
    \        return 4\n        }\n    }\n}\n```\n\n这个 `BasicDesign` 类定义了一个名为 `location`\
    \ 的属性，其 getter 返回 `location` 属性的值 4。要重写这个属性，你需要保留变量名和数据类型（`Int`），但你可以更改 getter\
    \ 代码，例如：\n\n```swift\nclass NewDesign : BasicDesign {\n    override var location:\
    \ Int {\n        get {\n            return 7\n        }\n    }\n}\n```\n\n这个 `NewDesign`\
    \ 类从 `BasicDesign` 类继承了 `location` 属性。然而，它用一个新的 getter 重写了 `location` 属性，该 getter\
    \ 返回值为 7。\n\n若要查看重写属性的实际效果，请执行以下步骤：\n\n1.  确保你的 `IntroductoryPlayground` 文件已加载到\
    \ Xcode 中。\n2.  按如下方式编辑代码：\n\n    ```swift\n    import Cocoa\n    class BasicDesign\
    \ {\n        var location: Int {\n            get {\n                return 4\n\
    \            }\n        }\n    }\n    class NewDesign : BasicDesign {\n      \
    \  override var location: Int {\n            get {\n                return 7\n\
    \            }\n        }\n    }\n    var ant = BasicDesign()\n    var fly = NewDesign()\n\
    \    ant.location\n    fly.location\n    ```\n\n在这个例子中，`ant` 对象基于 `BasicDesign`\
    \ 类，该类将 `location` 属性定义为值为 4。`fly` 对象基于 `NewDesign` 类，该类继承了 `location` 属性。然而，`NewDesign`\
    \ 类重写了 `location` 属性的 getter 代码，因此 `location` 属性中存储的值不再是 4，而是 7，如图 14-6 所示。\n\n\
    ![A437923_1_En_14_Fig6_HTML.jpg](img/A437923_1_En_14_Fig6_HTML.jpg)\n\n**图 14-6.**\
    \ 使用新的 getter 代码重写属性\n\n请记住，重写方法和属性时，你只能更改：\n\n- 方法中的代码\n- 属性的 getter/setter 或属性观察器中的代码\n\
    \n你永远不能更改：\n\n- 方法名\n- 方法的参数列表\n- 属性名\n- 属性数据类型\n\n## 防止多态\n\n在某些情况下，你可能希望防止某个方法、属性甚至整个类被多态修改。要实现这一点，你只需插入\
    \ `final` 关键字。如果你想防止整个类被继承，只需将 `final` 关键字放在类名前面，如下所示：\n\n```swift\nfinal class\
    \ ClassName {\n    var propertyName = initialValue\n    func methodName() {\n\
    \    }\n}\n```\n\n> **注意：** 如果将 `final` 放在类名前面，它会自动阻止该类的属性和方法被重写，因此你无需在每个属性或方法名前放置\
    \ `final`。\n\n如果你只想阻止某个特定的属性或方法被重写，只需将 `final` 关键字放在该属性或方法前面，如下所示：\n\n```swift\n\
    class ClassName {\n    final var propertyName = initialValue\n    func methodName()\
    \ {\n    }\n}\n```\n\n上例中的 `final` 关键字阻止了属性被重写，同时允许方法被重写。如果你希望允许属性被重写而阻止方法被重写，则将\
    \ `final` 关键字放在方法前面，如下所示：\n\n```swift\nclass ClassName {\n    var propertyName\
    \ = initialValue\n    final func methodName() {\n    }\n}\n```"
- fmt: '# Using Extensions


    If there’s a class that contains the properties and methods you need, the object-oriented
    approach is to inherit from that class (create a subclass). The problem with constantly
    creating subclasses is that it can get awkward to create objects from slightly
    different class files.


    This can be especially true when you want to extend the features of classes that
    are part of the Cocoa framework. For example, if you’re working with `String`
    data types, you probably don’t want to create a subclass of the `String` data
    type and then create objects based on this new subclass. Ideally, you want to
    continue using `String` data types but have added features as well.


    That’s why Swift offers extensions. Extensions essentially let you add code to
    an existing class without creating a subclass. This way you can still get to use
    the original class but you also get to add new features to that class without
    going through inheritance, polymorphism, or subclasses. The structure of an extension
    looks like this:


    ```

    extension ClassName {

    }

    ```


    Extensions can define methods along with properties that contain code such as:


    - Getters and setters

    - Initializers

    - Property observers


    While extensions add new properties and methods to a class without inheritance,
    extensions cannot override existing methods or properties in a class. Extensions
    also can’t create properties assigned an initial value, such as:


    ```

    var temperature : Int = 100    // Cannot be used in an extension

    ```


    To see how an extension can add properties and methods to a class, create a new
    playground by following these steps:


    1. Make sure your `IntroductoryPlayground` file is loaded into Xcode.

    2. Edit the code as follows:


    ```

    import Cocoa

    class EmptyClass {

    }

    extension EmptyClass {

    var age : Int {

    get {

    return 50

    }

    }

    func retire (testAge : Int) -> String {

    if testAge < 62 {

    return "Keep working"

    } else {

    return "Time to retire"

    }

    }

    }

    var aWorker = EmptyClass ()

    aWorker.retire(testAge: 65)

    aWorker.age

    ```


    This code creates a completely empty class, and then creates an extension that
    adds an `age` property and a `retire` method to the empty class. Finally, it creates
    an object from that empty class, calls the `retire` method (defined in the extension)
    and displays the value stored in the `age` property, as shown in Figure 14-7.


    ![A437923_1_En_14_Fig7_HTML.jpg](A437923_1_En_14_Fig7_HTML.jpg)


    Figure 14-7. Using an extension to add a property and method to an empty class


    You can see that the class itself does nothing, but with extensions, the class
    now gets added features that it didn’t have before.


    # Using Protocols


    In the beginning of this chapter, you were first introduced to something that
    appears in the class `AppDelegate.swift` file that you’ve been creating to learn
    the basic principles of each chapter. This class `AppDelegate` declaration looks
    like this:


    ```

    class AppDelegate: NSObject, NSApplicationDelegate {

    ```


    This line of code creates a class called `AppDelegate`, which inherits properties
    and methods from the `NSObject` class that’s part of the Cocoa framework. However,
    `NSApplicationDelegate` is the name of another file used to extend classes without
    going through inheritance or subclasses.


    The `NSApplicationDelegate` file is a protocol file. The above Swift code creates
    a class called `AppDelegate`, inherits properties and methods from the `NSObject`
    class, and also inherits code from the `NSApplicationDelegate` file. (You can
    see more details about the `NSApplicationDelegate` protocol by viewing it in the
    Xcode Documentation window.)


    The main difference between a class (such as `NSObject`) and a protocol (such
    as `NSApplicationDelegate`) is that a class defines properties and methods while
    a protocol only defines properties and method names without any code that actually
    implements them. A protocol is sometimes called an empty class because it never
    defines any Swift code to make anything actually work.


    A protocol defines a group of property and method names for solving a particular
    type of problem. Now it’s up to the class that adopts or conforms to this protocol
    to provide the actual Swift code that implements each method or property declaration.


    A protocol declaration looks identical to a class or structure declaration. The
    only difference is that a protocol declaration uses the `protocol` keyword:


    ```

    protocol ProtocolName {

    }

    ```


    Within this protocol declaration you can define properties and methods without
    implementing any Swift code, like this:


    ```

    protocol ProtocolName {

    var property1 : datatype { get }        // read-only

    var property2 : datatype { get set }    // read-write

    func methodName (parameters) -> datatype

    }

    ```


    When a protocol defines a property or method, any class that adopts that protocol
    must implement that property or method exactly as defined in the protocol. In
    the above example, `property1` is defined with a getter and `property2` is defined
    with a getter and a setter.


    This means when a class implements those two properties, it must define a getter
    only for `property1` and both a getter and a setter for `property2`.


    Likewise, the method defined in the protocol must be exact when adopted in the
    class file. This means if the method is defined in the protocol with two integer
    parameters, then the implementation of that method must also have the exact same
    two integer parameters.


    Protocols are generally used when working with common user interface items that
    require specific types of methods to manipulate them, but can’t define exactly
    how to manipulate them because the data may differ from one program to another.


    For example, table views are a user interface item that displays a list of data
    in rows. The table view needs to know how many rows of data to hold and what type
    of data to display in each row. Since every table view needs to know this information,
    it makes sense to create standard methods to do this, but since every table view
    needs to contain different information, it also makes sense to avoid writing Swift
    code to actually fill a table view with data.


    Any program that includes a table view can take advantage of predefined method
    names stored in a protocol for manipulating data. All you need to do is add Swift
    code to fill the table view with data.'
