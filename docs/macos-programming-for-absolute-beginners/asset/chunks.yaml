    \ Auto Layout Issues ➤ Clear Constraints (in the bottom half of the submenu)."
  trans: "\n### 创建尺寸约束\n\n前面的示例展示了如何通过将约束从 `=` 修改为 `≥` 来防止按钮扩展尺寸。然而，保持用户界面元素固定尺寸的另一种方法是应用尺寸约束。尺寸约束可以定义以下之一：\n\
    \n- 高度\n- 宽度\n- 宽高比\n\n宽高比使高度和宽度之间的比率保持固定值，因此加宽元素也会使其变高（反之亦然）。要定义尺寸约束，您只需在用户界面元素的边界内按住\
    \ Control 键并拖动。要了解如何定义尺寸约束，请按照以下步骤操作：\n\n1. 确保 `ConstraintProgram` 已在 Xcode 中加载。\n\
    2. 在项目导航器窗格中点击 `Main.storyboard` 文件。\n3. 点击该按钮。\n4. 选择“视图” ➤ “实用工具” ➤ “显示尺寸检查器”。尺寸检查器窗格出现，显示该按钮上的约束（参见图\
    \ 20-7）。\n5. 将鼠标指针移动到按钮上。\n6. 按住 Control 键并向左或向右拖动鼠标，但保持在按钮的边界内。\n7. 松开 Control\
    \ 键和鼠标左键。将出现一个弹出菜单，如图 20-14 所示。\n\n   ![A437923_1_En_20_Fig14_HTML.jpg](img/A437923_1_En_20_Fig14_HTML.jpg)\n\
    \n   图 20-14. 创建尺寸约束\n8. 选择“宽度”。注意，Xcode 会在按钮下方显示一个宽度约束，如图 20-15 所示。此宽度约束使按钮保持固定尺寸。\n\
    \n   ![A437923_1_En_20_Fig15_HTML.jpg](img/A437923_1_En_20_Fig15_HTML.jpg)\n\n\
    \   图 20-15. 项目下方出现一个宽度约束\n9. 点击出现在宽度约束右侧的“编辑”按钮。将出现一个弹出窗口。\n10. 点击“常量”弹出菜单并将\
    \ `=` 更改为 `≤`。\n11. 点击“常量”文本字段，并将其中显示的任意值（如 70）改为该值的两倍（如 140）。这将定义宽度约束，使按钮宽度小于或等于特定值。\n\
    12. 选择“产品” ➤ “运行”。您的用户界面将出现。注意，您只能将窗口宽度调整到有限大小。当您加宽窗口时，按钮宽度会扩展到一定尺寸。然后约束会阻止窗口继续调整大小。\n\
    13. 选择 `ConstraintProgram` ➤ 退出 `ConstraintProgram`。\n\n### 在多个用户界面元素之间创建约束\n\n\
    将元素约束到窗口边缘以及约束元素尺寸是使用约束的两种方式。使用约束的第三种方式是定义两个独立用户界面元素（例如按钮和文本字段）之间的距离。\n\n通过在用户界面元素之间定义约束，您可以确保无论用户如何调整程序窗口大小，整个用户界面都看起来良好。此外，在用户界面元素之间创建约束可以避免您为每个用户界面元素详尽地定义到窗口边缘的约束。\n\
    \n要在用户界面元素之间创建约束，请按住 Control 键并从其中一个用户界面元素拖动到另一个用户界面元素。您可以定义两个元素之间的固定距离，或者定义两个元素如何对齐，例如保持它们的顶部或底部彼此对齐。\n\
    \n要了解如何在用户界面元素之间创建约束，请按照以下步骤操作：\n\n1. 确保 `ConstraintProgram` 已在 Xcode 中加载。\n2.\
    \ 在项目导航器窗格中点击 `Main.storyboard` 文件。\n3. 点击该按钮。按钮与窗口右、左和下边缘之间应有三个约束。此外，按钮下方应有一个尺寸约束。\n\
    4. 在按钮右侧放置一个文本字段。\n5. 将鼠标指针移到文本字段上，按住 Control 键并拖动鼠标，直到鼠标指针出现在按钮上方，如图 20-16 所示。\n\
    \n   ![A437923_1_En_20_Fig16_HTML.jpg](img/A437923_1_En_20_Fig16_HTML.jpg)\n\n\
    \   图 20-16. 在用户界面元素之间定义约束\n6. 松开 Control 键和鼠标左键。将出现一个弹出菜单，如图 20-17 所示。\n\n  \
    \ ![A437923_1_En_20_Fig17_HTML.jpg](img/A437923_1_En_20_Fig17_HTML.jpg)\n\n  \
    \ 图 20-17. 在用户界面元素之间选择约束\n7. 选择“水平间距”选项。Xcode 在按钮和文本字段之间显示一个约束。注意，Xcode 会在文本字段周围显示红色边框，因为没有足够的约束来定义文本字段在窗口中的位置。您可以手动添加更多约束，但也可以让\
    \ Xcode 自动添加约束。唯一的缺点是 Xcode 并不总能猜测到您需要的正确约束。\n8. 确保文本字段仍处于选中状态，然后选择“编辑器” ➤ “解决自动布局问题”\
    \ ➤ 子菜单上半部分的“添加缺少的约束”，如图 20-18 所示。（如果您选择子菜单下半部分的“添加缺少的约束”，Xcode 将向用户界面上当前的所有元素添加约束。）Xcode\
    \ 会添加额外的约束并移除文本字段周围的红色边框。\n\n   ![A437923_1_En_20_Fig18_HTML.jpg](img/A437923_1_En_20_Fig18_HTML.jpg)\n\
    \n   图 20-18. Xcode 可以自动添加约束\n9. 选择“产品” ➤ “运行”。您的用户界面将出现。注意，当您调整窗口大小时，文本字段总是会移动以保持与按钮的固定距离。\n\
    10. 选择 `ConstraintProgram` ➤ 退出 `ConstraintProgram`。\n\n**注意**\n\n如果您选择“编辑器” ➤\
    \ “解决自动布局问题” ➤ “重置为建议的约束”，Xcode 将自动向当前选中的用户界面元素添加所有必要的约束（如果您选择子菜单上半部分的“重置为建议的约束”），或者向所有用户界面元素添加约束（如果您选择子菜单下半部分的“重置为建议的约束”）。\n\
    \n### 删除约束\n\n定义约束通常是一个反复试验的过程，直到获得您想要的结果。如果您定义的约束无法按预期工作，您可以随时删除该约束。要删除单个约束，您有两种选择：\n\
    \n- 点击用户界面上的约束，然后按退格键。\n- 点击尺寸检查器窗格中的约束，然后按退格键。\n\n如果您想删除单个用户界面元素（如按钮或文本字段）上的所有约束，请按照以下步骤操作：\n\
    \n1. 点击包含要删除约束的用户界面元素。\n2. 选择“编辑器” ➤ “解决自动布局问题” ➤ “清除约束”（在子菜单的上半部分）。\n\n如果您想删除用户界面上所有元素的约束，请按照以下步骤操作：\n\
    \n1. 点击包含要删除约束的用户界面元素。\n2. 选择“编辑器” ➤ “解决自动布局问题” ➤ “清除约束”（在子菜单的下半部分）。\n"
- fmt: "## Summary\n\n约束确保无论用户如何调整程序窗口大小，您的用户界面都能保持良好的外观。您可以定义三种类型的约束：\n\n*   从用户界面项到窗口边缘\n\
    *   定义用户界面项高度和/或宽度的尺寸约束\n*   在两个用户界面项之间\n\n当使用多个约束时，您可以分配一个固定值，或者一个大于或小于的比较值。您还可以为约束分配优先级，以便当两个或多个约束冲突时，优先级较高的约束会优先被使用。\n\
    \n`Xcode`可以自动添加约束，但它们可能并非总是正常工作，因此请准备好尝试不同的约束，直到您的用户界面按照您期望的方式运行。\n\n# 21. 使用警报和面板\n\
    \n在每个程序中，您都可以设计程序的独特功能，同时让 `Cocoa`框架负责使您的程序看起来像标准的 `macOS`程序并具有标准行为。为了创建几乎所有 `macOS`程序的通用功能，您可以使用警报和面板。\n\
    \n警报通常会弹出在屏幕上以通知用户，例如要求用户确认删除文件或提醒用户出现问题。面板显示通用的用户界面项，例如 `macOS`程序通常显示的打印面板，用于提供打印选项，或用于选择文件的面板。\n\
    \n通过使用警报和面板，您可以添加常见的 `macOS`用户界面元素，而无需创建自己的用户界面或编写 `Swift`代码。警报和面板是 `Cocoa`框架的一部分，您的\
    \ `macOS`程序可以使用它们来创建标准的 `macOS`用户界面。\n\n## 使用警报\n\n警报基于 `Cocoa`框架中的 `NSAlert`类。在最简单的层面上，您可以用两行\
    \ `Swift`代码创建一个警报：\n\n```\nlet myAlert = NSAlert()\nmyAlert.runModal()\n```\n\n\
    第一行声明了一个名为`myAlert`的对象，它基于`NSAlert`类。然后第二行使用`runModal()`方法来显示警报。当警报出现时，它被认为是模态的，这意味着警报在用户解除它之前不会让用户执行任何操作。\n\
    \n上面的两行代码创建了一个通用警报，它显示一个“好”按钮、一个通用图形图像和一个通用文本消息，如图 [21-1](#A437923_1_En_21_Chapter.html#Fig1)\
    \ 所示。\n\n![A437923_1_En_21_Fig1_HTML.jpg](A437923_1_En_21_Fig1_HTML.jpg)\n\n图\
    \ 21-1.\n\n创建一个通用警报\n\n要自定义警报，您可以修改以下属性：\n\n*   `messageText`：以粗体显示主要警报消息。在图 [21-1](#A437923_1_En_21_Chapter.html#Fig1)\
    \ 中，“警告”是`messageText`。\n*   `informativeText`：直接在`messageText`下方显示非粗体文本。在图 [21-1](#A437923_1_En_21_Chapter.html#Fig1)\
    \ 中，没有`informativeText`。\n*   `icon`：显示一个图标。默认情况下，该图标是程序的图标。\n*   `alertStyle`：当设置为`NSAlertStyle.critical`时显示关键图标。否则，它显示默认的警报图标。\n\
    *   `showsSuppressionButton`：显示一个复选框，默认文本为“不再显示此消息”，除非定义了`suppressionButton?.title`属性。\n\
    *   `suppressionButton?.title`：将复选框的默认文本（“不再显示此消息”）替换为自定义文本。\n\n要了解如何自定义警报，请按照以下步骤操作：\n\
    \n1.  在 `Xcode`中选择文件 ➤ 新建 ➤ 项目。\n2.  在 `macOS`类别下单击应用程序。\n3.  单击 `Cocoa`应用程序，然后单击“下一步”按钮。`Xcode`现在会要求输入产品名称。\n\
    4.  单击“产品名称”文本字段，然后输入 `AlertProgram`。\n5.  确保语言弹出菜单显示 `Swift`，并且“使用故事板”复选框被选中。\n\
    6.  单击“下一步”按钮。`Xcode`会询问您想要将项目存储在哪里。\n7.  选择一个文件夹来存储您的项目，然后单击“创建”按钮。\n8.  在项目导航器中单击`Main.storyboard`文件。您的程序用户界面会出现。\n\
    9.  选择视图 ➤ 工具 ➤ 显示对象库。对象库出现在 `Xcode`窗口的右下角。\n10. 将一个按钮拖到用户界面窗口上。\n11. 选择视图 ➤ 助理编辑器\
    \ ➤ 显示助理编辑器。`ViewController.swift`文件会出现在用户界面旁边。\n12. 将鼠标指针移到按钮上，按住 `Control`键，然后将鼠标拖到`ViewController.swift`文件底部最后一个花括号上方。\n\
    13. 松开 `Control`键和鼠标按钮。会出现一个弹出窗口。\n14. 单击“连接”弹出菜单，然后选择操作。\n15. 单击“名称”文本字段，然后输入\
    \ `showAlert`。\n16. 单击“类型”弹出菜单，选择 `NSButton`，然后单击“连接”按钮。`Xcode`会创建一个空的 `IBAction`方法。\n\
    17. 修改 `IBAction`方法如下：\n\n    ```\n    @IBAction func showAlert(_ sender: NSButton)\
    \ {\n        let myAlert = NSAlert()\n        myAlert.messageText = \"Warning!\"\
    \n        myAlert.informativeText = \"Zombies approaching\"\n        myAlert.alertStyle\
    \ = NSAlertStyle.critical\n        myAlert.showsSuppressionButton = true\n   \
    \     myAlert.suppressionButton?.title = \"Stop scaring me\"\n        myAlert.runModal()\n\
    \    }\n    ```\n\n18. 选择产品 ➤ 运行。您的用户界面会出现。\n19. 单击按钮。会出现一个警报，如图 [21-2](#A437923_1_En_21_Chapter.html#Fig2)\
    \ 所示。\n\n    ![A437923_1_En_21_Fig2_HTML.jpg](A437923_1_En_21_Fig2_HTML.jpg)\n\
    \n    图 21-2.\n\n    显示自定义警报\n20. 单击警报上的“好”按钮关闭它。\n21. 选择 `AlertProgram` ➤ 退出\
    \ `AlertProgram`。"
  raw: "## Summary\n\nConstraints insure that your user interface will always look\
    \ good no matter how the user may resize the program windows. You can define three\
    \ types of constraints:\n\n*   From a user interface item to a window edge\n*\
    \   A size constraint that defines the height and/or width of a user interface\
    \ item\n*   Between two user interface items\n\nWhen working with multiple constraints,\
    \ you can assign a fixed value or a greater than or less than comparison value.\
    \ You can also assign priorities to constraints so that if two or more constraints\
    \ conflict, the constraint with the higher priority gets used first.\n\nXcode\
    \ can automatically add constraints but they may not always work right, so be\
    \ prepared to experiment with different constraints until you get your user interface\
    \ to behave the way you want it to.\n\n# 21. Using Alerts and Panels\n\nIn every\
    \ program, you can design the unique features of your program while letting the\
    \ Cocoa framework worry about making your program look and behave like a standard\
    \ macOS program. To create the common features of nearly every macOS program,\
    \ you can use alerts and panels.\n\nAn alert typically pops up on the screen to\
    \ inform the user, such as asking the user to verify the deletion of a file or\
    \ to alert the user of a problem. A panel displays common user interface items\
    \ such as a print panel that macOS programs typically display to give you options\
    \ for printing, or an open panel for selecting a file.\n\nBy using alerts and\
    \ panels, you can add common macOS user interface elements without having to create\
    \ your own user interface or without needing to write Swift code. Alerts and panels\
    \ are part of the Cocoa framework that your macOS programs can use to create a\
    \ standard macOS user interface.\n\n## Using Alerts\n\nAn alert is based on the\
    \ `NSAlert` class in the Cocoa framework. At the simplest level, you can create\
    \ an alert with two lines of Swift code:\n\n```\nlet myAlert = NSAlert()\nmyAlert.runModal()\n\
    ```\n\nThe first line declares an object called `myAlert` that is based on the\
    \ `NSAlert` class. Then the second line uses the `runModal()` method to display\
    \ the alert. When an alert appears, it’s considered modal, which means the alert\
    \ won’t let the user do anything until the user dismisses the alert.\n\nThe above\
    \ two lines of code create a generic alert that displays an OK button, a generic\
    \ graphic image, and a generic text message, as shown in Figure [21-1](#A437923_1_En_21_Chapter.html#Fig1).\n\
    \n![A437923_1_En_21_Fig1_HTML.jpg](A437923_1_En_21_Fig1_HTML.jpg)\n\nFigure 21-1.\n\
    \nCreating a generic alert\n\nTo customize an alert, you can modify the following\
    \ properties:\n\n*   `messageText` : Displays the main alert message in bold.\
    \ In Figure [21-1](#A437923_1_En_21_Chapter.html#Fig1), Alert is the `messageText`.\n\
    *   `informativeText` : Displays non-bold text directly underneath the messageText.\
    \ In Figure [21-1](#A437923_1_En_21_Chapter.html#Fig1), there is no `informativeText`.\n\
    *   `icon` : Displays an icon. By default, the icon is the program’s icon.\n*\
    \   `alertStyle` : Displays a critical icon when set to `NSAlertStyle.critical`.\
    \ Otherwise, it displays the default alert icon.\n*   `showsSuppressionButton`:\
    \ Displays a check box with the default text of “Do not show this message again”\
    \ unless the `suppressionButton` `?.title` property is defined.\n*   `suppressionButton?.title`:\
    \ Replaces the default text (“Do not show this message again”) with custom text\
    \ for the check box.\n\nTo see how to customize an alert, follow these steps:\n\
    \n1.  From within Xcode choose File ➤ New ➤ Project.  \n2.  Click Application\
    \ under the macOS category.  \n3.  Click Cocoa Application and click the Next\
    \ button. Xcode now asks for a product name.  \n4.  Click in the Product Name\
    \ text field and type AlertProgram.  \n5.  Make sure the Language pop-up menu\
    \ displays Swift and that the “Use Storyboards” check box is selected.  \n6. \
    \ Click the Next button. Xcode asks where you want to store the project.  \n7.\
    \  Choose a folder to store your project and click the Create button.  \n8.  Click\
    \ the `Main.storyboard` file in the Project Navigator. Your program’s user interface\
    \ appears.  \n9.  Choose View ➤ Utilities ➤ Show Object Library. The Object Library\
    \ appears in the bottom right corner of the Xcode window.  \n10.  Drag a Push\
    \ Button on to the user interface window.  \n11.  Choose View ➤ Assistant Editor\
    \ ➤ Show Assistant Editor. The `ViewController.swift` file appears next to your\
    \ user interface.  \n12.  Move the mouse pointer over the push button, hold down\
    \ the Control key, and drag the mouse above the last curly bracket in the bottom\
    \ of the `ViewController.swift` file.  \n13.  Release the Control key and the\
    \ mouse button. A pop-up window appears.  \n14.  Click in the Connect pop-up menu\
    \ and choose Action.  \n15.  Click in the Name text field and type showAlert.\
    \  \n16.  Click in the Type pop-up menu, choose NSButton, and click the Connect\
    \ button. Xcode creates an empty IBAction method.  \n17.  Modify the IBAction\
    \ method as follows:\n\n    ```\n    @IBAction func showAlert(_ sender: NSButton)\
    \ {\n    let myAlert = NSAlert()\n    myAlert.messageText = \"Warning!\"\n   \
    \ myAlert.informativeText = \"Zombies approaching\"\n    myAlert.alertStyle =\
    \ NSAlertStyle.critical\n    myAlert.showsSuppressionButton = true\n    myAlert.suppressionButton?.title\
    \ = \"Stop scaring me\"\n    myAlert.runModal()\n    }\n    ```\n\n18.  Choose\
    \ Product ➤ Run. Your user interface appears.  \n19.  Click the push button. An\
    \ alert appears, as shown in Figure [21-2](#A437923_1_En_21_Chapter.html#Fig2).\n\
    \n    ![A437923_1_En_21_Fig2_HTML.jpg](A437923_1_En_21_Fig2_HTML.jpg)\n\n    Figure\
    \ 21-2.\n\n    Displaying a customized alert  \n20.  Click the OK button on the\
    \ alert to make it go away.  \n21.  Choose AlertProgram ➤ Quit AlertProgram."
  trans: "\n## 摘要\n\n约束确保无论用户如何调整程序窗口大小，您的用户界面都能保持良好的外观。您可以定义三种类型的约束：\n\n*   从用户界面项到窗口边缘\n\
    *   定义用户界面项高度和/或宽度的尺寸约束\n*   在两个用户界面项之间\n\n当使用多个约束时，您可以分配一个固定值，或者一个大于或小于的比较值。您还可以为约束分配优先级，以便当两个或多个约束冲突时，优先级较高的约束会优先被使用。\n\
    \n`Xcode`可以自动添加约束，但它们可能并非总是正常工作，因此请准备好尝试不同的约束，直到您的用户界面按照您期望的方式运行。\n\n# 21. 使用警报和面板\n\
    \n在每个程序中，您都可以设计程序的独特功能，同时让 `Cocoa`框架负责使您的程序看起来像标准的 `macOS`程序并具有标准行为。为了创建几乎所有 `macOS`程序的通用功能，您可以使用警报和面板。\n\
    \n警报通常会弹出在屏幕上以通知用户，例如要求用户确认删除文件或提醒用户出现问题。面板显示通用的用户界面项，例如 `macOS`程序通常显示的打印面板，用于提供打印选项，或用于选择文件的面板。\n\
    \n通过使用警报和面板，您可以添加常见的 `macOS`用户界面元素，而无需创建自己的用户界面或编写 `Swift`代码。警报和面板是 `Cocoa`框架的一部分，您的\
    \ `macOS`程序可以使用它们来创建标准的 `macOS`用户界面。\n\n## 使用警报\n\n警报基于 `Cocoa`框架中的 `NSAlert`类。在最简单的层面上，您可以用两行\
    \ `Swift`代码创建一个警报：\n\n```\nlet myAlert = NSAlert()\nmyAlert.runModal()\n```\n\n\
    第一行声明了一个名为`myAlert`的对象，它基于`NSAlert`类。然后第二行使用`runModal()`方法来显示警报。当警报出现时，它被认为是模态的，这意味着警报在用户解除它之前不会让用户执行任何操作。\n\
    \n上面的两行代码创建了一个通用警报，它显示一个“好”按钮、一个通用图形图像和一个通用文本消息，如图 21-1 所示。\n\n![A437923_1_En_21_Fig1_HTML.jpg](img/A437923_1_En_21_Fig1_HTML.jpg)\n\
    \n**图 21-1.** 创建一个通用警报\n\n要自定义警报，您可以修改以下属性：\n\n*   `messageText`：以粗体显示主要警报消息。在图\
    \ 21-1 中，“警告”是`messageText`。\n*   `informativeText`：直接在`messageText`下方显示非粗体文本。在图\
    \ 21-1 中，没有`informativeText`。\n*   `icon`：显示一个图标。默认情况下，该图标是程序的图标。\n*   `alertStyle`：当设置为`NSAlertStyle.critical`时显示关键图标。否则，它显示默认的警报图标。\n\
    *   `showsSuppressionButton`：显示一个复选框，默认文本为“不再显示此消息”，除非定义了`suppressionButton?.title`属性。\n\
    *   `suppressionButton?.title`：将复选框的默认文本（“不再显示此消息”）替换为自定义文本。\n\n要了解如何自定义警报，请按照以下步骤操作：\n\
    \n1.  在 `Xcode`中选择文件 ➤ 新建 ➤ 项目。\n2.  在 `macOS`类别下单击应用程序。\n3.  单击 `Cocoa`应用程序，然后单击“下一步”按钮。`Xcode`现在会要求输入产品名称。\n\
    4.  单击“产品名称”文本字段，然后输入 `AlertProgram`。\n5.  确保语言弹出菜单显示 `Swift`，并且“使用故事板”复选框被选中。\n\
    6.  单击“下一步”按钮。`Xcode`会询问您想要将项目存储在哪里。\n7.  选择一个文件夹来存储您的项目，然后单击“创建”按钮。\n8.  在项目导航器中单击`Main.storyboard`文件。您的程序用户界面会出现。\n\
    9.  选择视图 ➤ 工具 ➤ 显示对象库。对象库出现在 `Xcode`窗口的右下角。\n10. 将一个按钮拖到用户界面窗口上。\n11. 选择视图 ➤ 助理编辑器\
    \ ➤ 显示助理编辑器。`ViewController.swift`文件会出现在用户界面旁边。\n12. 将鼠标指针移到按钮上，按住 `Control`键，然后将鼠标拖到`ViewController.swift`文件底部最后一个花括号上方。\n\
    13. 松开 `Control`键和鼠标按钮。会出现一个弹出窗口。\n14. 单击“连接”弹出菜单，然后选择操作。\n15. 单击“名称”文本字段，然后输入\
    \ `showAlert`。\n16. 单击“类型”弹出菜单，选择 `NSButton`，然后单击“连接”按钮。`Xcode`会创建一个空的 `IBAction`方法。\n\
    17. 修改 `IBAction`方法如下：\n\n    ```\n    @IBAction func showAlert(_ sender: NSButton)\
    \ {\n        let myAlert = NSAlert()\n        myAlert.messageText = \"Warning!\"\
    \n        myAlert.informativeText = \"Zombies approaching\"\n        myAlert.alertStyle\
    \ = NSAlertStyle.critical\n        myAlert.showsSuppressionButton = true\n   \
    \     myAlert.suppressionButton?.title = \"Stop scaring me\"\n        myAlert.runModal()\n\
    \    }\n    ```\n\n18. 选择产品 ➤ 运行。您的用户界面会出现。\n19. 单击按钮。会出现一个警报，如图 21-2 所示。\n\n\
    \    ![A437923_1_En_21_Fig2_HTML.jpg](img/A437923_1_En_21_Fig2_HTML.jpg)\n\n \
    \   **图 21-2.** 显示自定义警报\n20. 单击警报上的“好”按钮关闭它。\n21. 选择 `AlertProgram` ➤ 退出 `AlertProgram`。\n"
- fmt: "### Getting Feedback from an Alert\n\nAn alert typically displays a single\
    \ OK button so the user can dismiss the alert. However, an alert can get feedback\
    \ from the user in one of two ways:\n\n- Selecting the suppression check box\n\
    - Clicking a button other than the OK button\n\nTo determine if the user selected\
    \ the suppression check box or not, you need to access the `suppressionButton!.state`\
    \ property. If the check box is selected, the `suppressionButton!.state` property\
    \ is 1. If the check box is clear, the `suppressionButton!.state` property is\
    \ 0.\n\nThe second way to get feedback from an alert is by displaying two or more\
    \ buttons on an alert. To add more buttons to an alert, you need to use the `addButton`\
    \ method. Then, to determine which button the user selected, you need to use the\
    \ `NSAlertFirstButtonReturn`, `NSAlertSecondButtonReturn`, or `NSAlertThirdButtonReturn`\
    \ constants.\n\nIf you have four or more buttons on an alert, you can check for\
    \ the fourth button by using `NSAlertThirdButtonReturn + 1`, a fifth button by\
    \ using `NSAlertThirdButtonReturn + 2`, and so on for each additional button beyond\
    \ the third one.\n\nTo see how to identify what options the user chose in an alert,\
    \ follow these steps:\n\n1. Make sure your `AlertProgram` project is loaded in\
    \ Xcode.\n2. Click the `ViewController.swift` file in the Project Navigator pane.\n\
    3. Modify the IBAction `showAlert` method as follows:\n\n    ```\n    @IBAction\
    \ func showAlert(_ sender: NSButton) {\n        let myAlert = NSAlert()\n    \
    \    myAlert.messageText = \"Warning!\"\n        myAlert.informativeText = \"\
    Zombies approaching\"\n        myAlert.alertStyle = NSAlertStyle.critical\n  \
    \      myAlert.showsSuppressionButton = true\n        myAlert.suppressionButton?.title\
    \ = \"Stop scaring me\"\n        myAlert.addButton(withTitle: \"Ignore it\")\n\
    \        myAlert.addButton(withTitle: \"Run\")\n        myAlert.addButton(withTitle:\
    \ \"Panic\")\n        myAlert.addButton(withTitle: \"Do nothing\")\n        let\
    \ choice = myAlert.runModal()\n        switch choice {\n        case NSAlertFirstButtonReturn:\n\
    \            print (\"User clicked Ignore it\")\n        case NSAlertSecondButtonReturn:\n\
    \            print (\"User clicked Run\")\n        case NSAlertThirdButtonReturn:\n\
    \            print (\"User clicked Panic\")\n        case NSAlertThirdButtonReturn\
    \ + 1:\n            print (\"User clicked Do nothing\")\n        default: break\n\
    \        }\n        if myAlert.suppressionButton!.state == 1 {\n            print\
    \ (\"Checked\")\n        } else {\n            print (\"Not checked\")\n     \
    \   }\n    }\n    ```\n\n    The `addButton` methods create buttons on the alert\
    \ where the first `addButton` method creates a default button and the other `addButton`\
    \ methods create additional buttons. To capture the button that the user clicked,\
    \ the above code creates a constant called \"choice\". Then it uses a switch statement\
    \ to identify which button the user clicked. Notice that the fourth button is\
    \ identified by adding 1 to the `NSAlertThirdButtonReturn` constant. The `suppressionButton!.state`\
    \ property checks if the user selected the check box that appears on the alert.\
    \ If its value is 1, then the user selected the check box. Otherwise, if its value\
    \ is 0, the check box is clear.\n\n4. Choose **Product** ➤ **Run**. Your user\
    \ interface appears.\n5. Click the button. The alert appears, as shown in Figure\
    \ 21-3.\n\n    ![A437923_1_En_21_Fig3_HTML.jpg](A437923_1_En_21_Fig3_HTML.jpg)\n\
    \n    **Figure 21-3.** The alert created by Swift code\n\n6. Click in the \"Stop\
    \ scaring me\" check box to select it.\n7. Click one of the buttons, such as Panic\
    \ or Run. No matter which button you click, the alert goes away.\n8. Choose **AlertProgram**\
    \ ➤ **Quit AlertProgram**. Xcode appears again and displays text in the Debug\
    \ Area such as \"User clicked Panic\" and \"Checked.\"\n\n### Displaying Alerts\
    \ as Sheets\n\nAlerts typically appear as a modal dialog that creates another\
    \ window that you can move separately from the main program window. Another way\
    \ to display an alert is as a sheet that appears to scroll down from the title\
    \ bar of the currently active window.\n\nTo make an alert appear as a sheet, you\
    \ need to use the `beginSheetModalForWindow` method, like this:\n\n```\nalertObject.beginSheetModal(for:\
    \ window, completionHandler: closure)\n```\n\nThe first parameter defines the\
    \ window where you want the sheet to appear. In the `AlertProgram` project, the\
    \ IBOutlet representing the user interface window is called `window`. The second\
    \ parameter is the completion handler label, which identifies the name of a special\
    \ function called a closure.\n\nA closure represents a shorthand way of writing\
    \ a function. Instead of writing a function the traditional way, like\n\n```\n\
    func functionName(parameters) -> Type {\n    // Insert code here\n    return value\n\
    }\n```\n\nyou can write a closure like this:\n\n```\nlet closureName = { (parameters)\
    \ -> Type in\n    // Insert code here\n}\n```\n\nTo see how to turn an alert into\
    \ a sheet and use closures, follow these steps:\n\n1. Make sure your `AlertProgram`\
    \ project is loaded in Xcode.\n2. Click the `ViewController.swift` file in the\
    \ Project Navigator pane.\n3. Modify the IBAction `showAlert` method as follows:\n\
    \n    ```\n    @IBAction func showAlert(_ sender: NSButton) {\n        let myAlert\
    \ = NSAlert()\n        myAlert.messageText = \"Warning!\"\n        myAlert.informativeText\
    \ = \"Zombies approaching\"\n        myAlert.alertStyle = NSAlertStyle.critical\n\
    \        myAlert.showsSuppressionButton = true\n        myAlert.suppressionButton?.title\
    \ = \"Stop scaring me\"\n        myAlert.addButton(withTitle: \"Ignore it\")\n\
    \        myAlert.addButton(withTitle: \"Run\")\n        myAlert.addButton(withTitle:\
    \ \"Panic\")\n        myAlert.addButton(withTitle: \"Do nothing\")\n        let\
    \ myCode = { (choice:NSModalResponse) -> Void in\n            switch choice {\n\
    \            case NSAlertFirstButtonReturn:\n                print (\"User clicked\
    \ Ignore it\")\n            case NSAlertSecondButtonReturn:\n                print\
    \ (\"User clicked Run\")\n            case NSAlertThirdButtonReturn:\n       \
    \         print (\"User clicked Panic\")\n            case NSAlertThirdButtonReturn\
    \ + 1:\n                print (\"User clicked Do nothing\")\n            default:\
    \ break\n            }\n            if myAlert.suppressionButton!.state == 1 {\n\
    \                print (\"Checked\")\n            } else {\n                print\
    \ (\"Not checked\")\n            }\n        }\n        myAlert.beginSheetModal(for:\
    \ NSApp.keyWindow!, completionHandler: myCode)\n    }\n    ```\n\n4. Choose **Product**\
    \ ➤ **Run**. The user interface appears.\n5. Click the button. Notice that now\
    \ the alert drops down as a sheet, as shown in Figure 21-4.\n\n    ![A437923_1_En_21_Fig4_HTML.jpg](A437923_1_En_21_Fig4_HTML.jpg)\n\
    \n    **Figure 21-4.** The alert as a sheet\n\n6. Click in the \"Stop scaring\
    \ me\" check box to select it.\n7. Click one of the buttons, such as Panic or\
    \ Run. No matter which button you click, the alert goes away.\n8. Choose **AlertProgram**\
    \ ➤ **Quit AlertProgram**. Xcode appears again and displays text in the Debug\
    \ Area such as \"User clicked Run\" and \"Checked.\"\n\nIn the above Swift code,\
    \ the closure is defined as follows:\n\n```\nlet myCode = { (choice:NSModalResponse)\
    \ -> Void in\n    switch choice {\n    case NSAlertFirstButtonReturn:\n      \
    \  print (\"User clicked Ignore it\")\n    case NSAlertSecondButtonReturn:\n \
    \       print (\"User clicked Run\")\n    case NSAlertThirdButtonReturn:\n   \
    \     print (\"User clicked Panic\")\n    case NSAlertThirdButtonReturn + 1:\n\
    \        print (\"User clicked Do nothing\")\n    default: break\n    }\n    if\
    \ myAlert.suppressionButton!.state == 1 {\n        print (\"Checked\")\n    }\
    \ else {\n        print (\"Not checked\")\n    }\n}\n```\n\nHowever, you can also\
    \ place closures inline, which means instead of the completion handler identifying\
    \ the closure name, you simply put the closure itself in that location. So in\
    \ the above code, the `beginSheetModal` method calls the closure by name like\
    \ this:\n\n```\nmyAlert.beginSheetModal(for: NSApp.keyWindow!, completionHandler:\
    \ myCode)\n```\n\nYou could replace the closure name of `myCode` with the actual\
    \ closure code in its place."
