- fmt: '# Marketing Your Software


    Once you create a program, you’ll need to test it to make sure it works. Such
    early testers (known as alpha and beta testers) can help spot bugs in your program
    so you can fix them right away. When your program is as bug-free as possible,
    that’s the time to release your software on the market.


    Here’s the biggest mistake most people make: they write a program, put up a website
    advertising the program or their company, and wait for the orders to roll in.
    In the macOS world, Apple offers a special Mac App Store that gives every Macintosh
    user potential access to your software.


    However, it’s never enough to advertise your software on a website or the Mac
    App Store and wait for people to buy it. To maximize sales, you must also promote
    your software.


    To many people, marketing means spending money advertising. While you could do
    that, it’s always best to spend as little as possible. It’s easy to spend money
    on advertising and marketing, but unless your advertising and marketing expenses
    are less than the sales that the advertising and marketing generates, you risk
    going bankrupt slowly. Where most people go wrong is that they spend money on
    advertising and marketing, but they have no idea if all that advertising and marketing
    is generating enough sales to justify the expense.


    This is why you should focus on free ways to advertise and market your software
    so you can find out what people like about your software, what types of people
    are more likely to buy your software, and the best ways to reach your potential
    users, all without going broke to do it.


    For example, suppose you sell software that makes video look aged as if it had
    been filmed decades ago on film, complete with scratches, faded images, and sound
    effects of film threading through a movie projector. You might initially target
    people who want to turn their videos into older movies for fun, but you may find
    that your actual market is Hollywood studios that need to create visual effects
    to simulate older films.


    Your initial market may not care about your software but an entirely different
    market just might. If you spent money advertising to your initial market, you
    would have wasted money targeting people who didn’t really want your program after
    all. Only later might you find the real market for your software and it could
    come from an unexpected niche that you never thought about before.


    So don’t substitute spending money for doing market research. It’s easy to spend
    more money. It’s harder to take the time to determine how effective your marketing
    and advertising really is and whether you’re even targeting the most lucrative
    market for your software in the first place.


    Beyond spending a minimal amount of money promoting your software through a website,
    here are some other ways to promote your software for little or no cost:


    * Start a blog.

    * Give away free software.

    * Post videos of your software on video sharing sites like YouTube.

    * Create and give away free information stored in PDF files offering tips for
    people who are potential customers of your software.

    * Find the social networks where your potential customers gather and participate
    in discussions to answer their questions.


    ## Blogging About Your Software


    A website is like putting a billboard in the middle of the desert and hoping people
    will magically find it. While search engines can help people find your website,
    it’s far better to include a blog on your website as well.


    A blog serves several purposes. First, by constantly blogging at least once a
    week, you generate new content for your website. New content tells search engines
    that your site is active and thus search engines will rank it as more relevant
    than a site that hasn’t been updated in months or even years. So blogs increase
    your search engine rank, increasing the chance that potential customers can find
    your product.


    Second, a blog puts a human face behind your software. By discussing the challenges
    you faced creating the software and responding to questions from people about
    your software, you demonstrate that there’s someone who cares and is willing to
    respond to questions about that software. Given a choice between buying from a
    faceless corporation or someone who seems like a real person, this subtle difference
    can increase the likelihood that potential customers will buy your software.


    Third, each blog post acts like another miniature ad for your software. Most people
    create a website describing their software and hope it will convince people to
    buy their product. A blog lets you focus on different aspects of your software.
    One blog post might talk about a special feature that you’re particularly proud
    to highlight. A second blog post might tell a story of a happy customer who used
    your software to solve a problem. A third blog post might explain why you designed
    your program the way you did.


    Since each blog post is slightly different, you avoid repetition. Yet since each
    blog post continually promotes your software, you’re constantly advertising your
    software from different points of view. This increases the chance that one of
    your blog posts will convince someone to buy your software.


    Blogging simply costs time, yet provides higher search engine rankings while promoting
    your software over and over again. Think of blogs as a free way to advertise on
    the Internet.


    ## Giving Away Free Software


    There’s a reason companies give away free samples of everything from food to toothpaste.
    They know once you try a product and like it, you’ll be far more likely to buy
    it. If you never try a product, it’s much harder for a company to convince you
    to buy it.


    Giving away free software works the same way. Some companies give away free “lite”
    versions of their software, which are fully functional. This lets customers try
    and use your software at no cost. A certain percentage of people will eventually
    want more advanced features, and those people will translate into paying customers.


    The more people you get using your free software, the more people you’ll get paying
    for the advanced version.


    For example, assume 1% of all people trying your free software decide to buy your
    advanced version. If you can get your free software in the hands of 100 people,
    that translates into one sale. However, if you can get your free software in the
    hands of 10,000 people, that translates into 100 sales.


    Since distributing free software doesn’t cost you anything to duplicate or distribute,
    your advertising and marketing costs are essentially zero.


    Besides offering a free “lite” version of your program, you could also offer free
    software related to your main program. For example, suppose you sell a word processor
    targeted for scientists that writes complex mathematical and chemical formulas.
    Rather than give away a free “lite” version of your program, you could give away
    free software that your target audience (engineers and scientists) might like,
    such as an interactive periodic table of elements or a simple equation solving
    program.


    Such free software simply gives potential customers something for free. Now if
    they like your free software, they’ll be far more likely to trust your commercial
    software. If your free software is well-designed and useful, potential customers
    will believe your commercial software must also be just as well-designed and useful.
    Free software lets potential customers sample your products without risk.'
