    \n![A437923_1_En_16_Fig3_HTML.jpg](A437923_1_En_16_Fig3_HTML.jpg)\n\nFigure 16-3.\n\
    \nStoryboards organize a user interface into scenes and seques.\n\n*   Scenes:\
    \ Displays the windows of your user interface\n*   Segues: Defines the connections\
    \ between scenes\n\nScenes contain user interface items like buttons and text\
    \ fields. Segues show the order in which users will view the user interface.\n\
    \nWhen you first create a new project using storyboards, Xcode includes a window\
    \ controller that controls a single view where you can place user interface items\
    \ like buttons or text fields. To add additional views to a storyboard, you must\
    \ use the Object Library and add additional controllers.\n\nIn addition to displaying\
    \ user interface items, the Object Library also contains controllers for storyboards,\
    \ as shown in Figure [16-4](#A437923_1_En_16_Chapter.html#Fig4).\n\n![A437923_1_En_16_Fig4_HTML.jpg](A437923_1_En_16_Fig4_HTML.jpg)\n\
    \nFigure 16-4.\n\nControllers in the Object Library that you can add to a storyboard\n\
    \nThe five types of controllers you can place on a storyboard include\n\n*   View\
    \ Controller : Controls a .xib file so you can include it with a storyboard\n\
    *   Window Controller : Controls a single window or view\n*   Page Controller\
    \ : Defines the animation between views\n*   Vertical/Horizontal Split View Controller\
    \ : Displays two views side by side or stacked on top of each other\n*   Tab View\
    \ Controller : Displays a tabbed interface that controls two or more views\n\n\
    A window controller is nothing more than a window that contains a view. The view\
    \ displayed inside the window is identified by an arrow pointing from the window\
    \ controller to the view (see Figure [16-2](#A437923_1_En_16_Chapter.html#Fig2)).\n\
    \nA page controller displays a view that allows multiple pages that can appear\
    \ or disappear, creating an animated effect. This lets you hide user interface\
    \ items on the view so they can appear (and disappear) later.\n\nA vertical/horizontal\
    \ split view controller acts like a window that holds two views either side by\
    \ side or stacked on top of each other, as shown in Figure [16-5](#A437923_1_En_16_Chapter.html#Fig5).\n\
    \n![A437923_1_En_16_Fig5_HTML.jpg](A437923_1_En_16_Fig5_HTML.jpg)\n\nFigure 16-5.\n\
    \nA split view controller contains two views .\n\nA tab view controller also consists\
    \ of a single window that can contain two or more views. The difference is that\
    \ it can display tabs where each tab represents a different view, as shown in\
    \ Figure [16-6](#A437923_1_En_16_Chapter.html#Fig6). You can also add more than\
    \ two views to a tab view controller.\n\n![A437923_1_En_16_Fig6_HTML.jpg](A437923_1_En_16_Fig6_HTML.jpg)\n\
    \nFigure 16-6.\n\nA tab view controller displays two or more views in one window\
    \ identified by tabs."
  trans: "\n# 16. 使用故事板\n\n每个程序用户界面中最常见的部分就是用来显示按钮和文本字段等项目的窗口。在 Xcode 中，窗口被称为视图。除了最简单的程序之外，大多数程序的用户界面都可能包含两个或更多的窗口或视图。这意味着你的程序需要知道如何打开额外的窗口，以及如何再次关闭它们。\n\
    \n创建和存储视图的两种方式是用 ` .xib` 文件和 ` .storyboard` 文件。一个 ` .xib` 文件只保存一个视图，因此如果你需要显示多个视图，就需要创建多个\
    \ ` .xib` 文件。而一个 ` .storyboard` 文件可以保存一个或多个视图。\n\n你可以使用 ` .xib` 文件或 ` .storyboard`\
    \ 文件，或者两者的组合来创建用户界面。最初，你可以使用 ` .xib` 或 ` .storyboard` 文件来创建 iOS 应用，但 Xcode 8 现在只为\
    \ iOS 应用创建 ` .storyboard` 文件。对于创建 macOS 程序，你仍然可以使用 ` .xib` 或 ` .storyboard` 文件，但由于\
    \ iOS 应用主要依赖 ` .storyboard` 文件，苹果也很可能将 macOS 编程迁移到 ` .storyboard` 文件。因此，你应该更多地学习如何使用\
    \ ` .storyboard` 来创建用户界面。\n\n最终，无论你是使用 ` .xib` 还是 ` .storyboard` 文件，都不及学会如何设计一个良好的用户界面来得重要，这个界面的目标是让用户能尽可能轻松地完成任务。\n\
    \n每次创建新项目时，Xcode 都会让你选择是否使用故事板，如图 16-1 所示。如果你选择不使用故事板，那么 Xcode 会将你的用户界面创建并存储在一个\
    \ ` .xib` 文件中。如果你选择使用故事板，那么 Xcode 会将你的用户界面存储在一个 ` .storyboard` 文件中。\n\n![A437923_1_En_16_Fig1_HTML.jpg](img/A437923_1_En_16_Fig1_HTML.jpg)\n\
    \n图 16-1. 创建 macOS 项目时，Xcode 会给你选择是否使用故事板\n\n要尝试使用故事板，你需要按照以下步骤创建一个使用故事板的项目：\n\
    \n1. 在 Xcode 中选择 文件 ➤ 新建 ➤ 项目。\n2. 单击 macOS 类别下的“应用”。\n3. 单击“Cocoa 应用”，然后单击“下一步”按钮。Xcode\
    \ 会要求你输入产品名称。\n4. 单击“产品名称”文本字段，输入 `StoryProgram`。\n5. 确保“语言”弹出菜单显示为 Swift，并且只选中了“使用故事板”复选框（见图\
    \ 16-1）。\n6. 单击“下一步”按钮。Xcode 会询问你希望将项目存储在哪里。\n7. 选择一个文件夹来存储你的项目，然后单击“创建”按钮。\n\
    8. 在项目导航窗格中单击 `Main.storyboard` 文件。` .storyboard` 用户界面就会出现，如图 16-2 所示。\n\n   ![A437923_1_En_16_Fig2_HTML.jpg](img/A437923_1_En_16_Fig2_HTML.jpg)\n\
    \n   图 16-2. 一个 ` .storyboard` 文件显示了一个窗口控制器和一个视图控制器。与只显示一个窗口来布局按钮、文本字段和标签等用户界面项目的\
    \ ` .xib` 文件不同，` .storyboard` 文件显示两个窗口。上面的窗口（顶部标有“窗口控制器”）定义了窗口在屏幕上的外观。下面的窗口（顶部标有“视图控制器”）定义了该窗口上显示的内容。当你从对象库拖拽用户界面项目时，需要将它们放置在视图控制器（下面的窗口）上。\n\
    \n9. 选择 产品 ➤ 运行。注意，你的程序用户界面会作为一个单独的窗口出现，这与之前使用 ` .xib` 文件创建的项目完全相同。\n10. 选择 StoryProgram\
    \ ➤ 退出 StoryProgram 来退出你的程序并返回 Xcode。\n\n## 使用故事板\n\n就其本身而言，` .storyboard` 文件与\
    \ ` .xib` 文件差别不大。` .storyboard` 文件的主要优势在于，它们能让你轻松地创建和链接多个视图（窗口）。例如，一个程序可能会显示一个登录屏幕，要求用户输入用户名和密码。一旦用户正确输入这些信息，第二个屏幕就可能出现。\n\
    \n这些屏幕中的每一个都代表了程序的一个不同视图或窗口。第一个视图显示登录屏幕，第二个视图显示不同的屏幕。` .storyboard` 文件不仅清晰地定义了不同视图之间是如何连接的，而且还清楚地展示了用户将按怎样的顺序看到每个视图。\n\
    \n故事板由两部分组成，如图 16-3 所示：\n\n![A437923_1_En_16_Fig3_HTML.jpg](img/A437923_1_En_16_Fig3_HTML.jpg)\n\
    \n图 16-3. 故事板将用户界面组织成场景和 segue。\n\n- **场景**：显示用户界面的窗口\n- **Segue**：定义场景之间的连接\n\
    \n场景包含诸如按钮和文本字段之类的用户界面项目。Segue 则显示用户将按什么顺序查看用户界面。\n\n当你首次使用故事板创建一个新项目时，Xcode 会包含一个用于控制单个视图的窗口控制器，你可以在该视图上放置按钮或文本字段等用户界面项目。要向故事板添加额外的视图，你必须使用对象库并添加额外的控制器。\n\
    \n除了显示用户界面项目外，对象库还包含用于故事板的控制器，如图 16-4 所示。\n\n![A437923_1_En_16_Fig4_HTML.jpg](img/A437923_1_En_16_Fig4_HTML.jpg)\n\
    \n图 16-4. 对象库中可以添加到故事板的控制器\n\n你可以放置在故事板上的五种控制器类型包括：\n\n- **视图控制器**：控制一个 ` .xib`\
    \ 文件，以便你可以将其包含在故事板中\n- **窗口控制器**：控制单个窗口或视图\n- **页面控制器**：定义视图之间的动画效果\n- **垂直/水平拆分视图控制器**：并排或堆叠显示两个视图\n\
    - **标签视图控制器**：显示一个带标签的界面，用于控制两个或更多视图\n\n窗口控制器不过是一个包含视图的窗口。窗口中显示的视图由从窗口控制器指向视图的箭头标识（见图\
    \ 16-2）。\n\n页面控制器显示一个允许多个页面出现或消失的视图，从而产生动画效果。这让你可以隐藏视图上的用户界面项目，以便它们稍后出现（和消失）。\n\
    \n垂直/水平拆分视图控制器像一个包含两个视图的窗口，它们要么并排放置，要么上下堆叠，如图 16-5 所示。\n\n![A437923_1_En_16_Fig5_HTML.jpg](img/A437923_1_En_16_Fig5_HTML.jpg)\n\
    \n图 16-5. 拆分视图控制器包含两个视图。\n\n标签视图控制器也由一个可以包含两个或更多视图的单一窗口组成。区别在于它可以显示标签，每个标签代表一个不同的视图，如图\
    \ 16-6 所示。你也可以向标签视图控制器添加两个以上的视图。\n\n![A437923_1_En_16_Fig6_HTML.jpg](img/A437923_1_En_16_Fig6_HTML.jpg)\n\
    \n图 16-6. 标签视图控制器在单个窗口中显示两个或多个视图，并由标签标识。\n"
- fmt: "### Adding Scenes to a Storyboard\n\nTo add scenes to a storyboard, you must\
    \ add additional controllers. To see how to create a new scene on a storyboard,\
    \ follow these steps:\n\n1.  Make sure your `StoryProgram` project is loaded into\
    \ Xcode.\n2.  Click the `Main.storyboard` file in the Project Navigator pane.\n\
    3.  Choose View ➤ Utilities ➤ Show Object Library.\n4.  Drag the blue window controller\
    \ from the Object Library (see Figure [16-4](#A437923_1_En_16_Chapter.html#Fig4))\
    \ and place it next to the existing window controller in your storyboard.\n5.\
    \  Drag the window controller and its accompanying view controller so they appear\
    \ as shown in Figure [16-7](#A437923_1_En_16_Chapter.html#Fig7).\n\n    ![A437923_1_En_16_Fig7_HTML.jpg](A437923_1_En_16_Fig7_HTML.jpg)\n\
    \n    Figure 16-7. Placing a second window controller in a storyboard\n\nWhen\
    \ you start adding additional scenes to a storyboard, those scenes will never\
    \ appear on the screen. To make a scene appear, you must either connect that scene\
    \ to existing scenes using segues, or define that new scene as the initial scene.\n\
    \n### Defining the Initial Scene in a Storyboard\n\nIn every storyboard, one scene\
    \ must always be defined as the initial scene, which is the first window or view\
    \ that appears when your program runs. Xcode identifies the initial scene with\
    \ an arrow pointing to the right.\n\nAnother way to identify the initial scene\
    \ is to click on the blue icon in the top middle part of the controller and open\
    \ the Show Attributes Inspector pane. If the `\"Is Initial Controller\"` check\
    \ box is selected, then the currently selected window is the initial scene, as\
    \ shown in Figure [16-8](#A437923_1_En_16_Chapter.html#Fig8).\n\n![A437923_1_En_16_Fig8_HTML.jpg](A437923_1_En_16_Fig8_HTML.jpg)\n\
    \nFigure 16-8. The initial screen is identified by an arrow and the `\"Is Initial\
    \ Controller\"` check box.\n\nTo change the initial scene, you can drag the initial\
    \ scene arrow and make it point to a different scene. To define the initial scene\
    \ using the `\"Is Initial Controller\"` check box, follow these steps:\n\n1. \
    \ Click the `.storyboard` file in the Project Navigator pane.\n2.  Click the scene\
    \ that you want to make the initial scene.\n3.  Click the blue controller icon\
    \ at the top of the scene, as shown in Figure [16-9](#A437923_1_En_16_Chapter.html#Fig9).\n\
    \n    ![A437923_1_En_16_Fig9_HTML.jpg](A437923_1_En_16_Fig9_HTML.jpg)\n\n    Figure\
    \ 16-9. Selecting the controller icon of a scene\n\n4.  Choose View ➤ Utilities\
    \ ➤ Show Attributes Inspector. The Windows Controller category appears in the\
    \ Attributes Inspector window in the right pane (see Figure [16-8](#A437923_1_En_16_Chapter.html#Fig8)).\n\
    5.  Select the `\"Is Initial Controller\"` check box.\n\nNote that there can only\
    \ be one initial scene at a time. As soon as you check the `\"Is Initial Controller\"\
    ` check box for one scene, Xcode automatically clears that `\"Is Initial Controller\"\
    ` check box if it’s selected for a different scene.\n\n### Connecting Scenes with\
    \ Segues\n\nWhen a storyboard consists of two or more scenes, only the initial\
    \ scene will appear if you run your program. To display other scenes in a storyboard,\
    \ you need to create a segue between scenes. A segue creates a link between two\
    \ scenes so the user can view one scene after another.\n\nTo learn how to create\
    \ a segue between scenes, follow these steps:\n\n1.  Make sure your `StoryProgram`\
    \ project is loaded in Xcode and click the `Main.storyboard` file in the Project\
    \ Navigator pane.\n2.  Drag a button from the Object Library window and place\
    \ it on the first scene.\n3.  Move the mouse pointer over this button, hold down\
    \ the Control key, and drag the mouse from this button over the second scene.\
    \ Xcode highlights the second scene, as shown in Figure [16-10](#A437923_1_En_16_Chapter.html#Fig10).\n\
    \n    ![A437923_1_En_16_Fig10_HTML.jpg](A437923_1_En_16_Fig10_HTML.jpg)\n\n  \
    \  Figure 16-10. Control-dragging the mouse from a button to another scene creates\
    \ a segue.\n\n4.  Release the Control key and the mouse. Xcode displays a pop-up\
    \ menu, as shown in Figure [16-11](#A437923_1_En_16_Chapter.html#Fig11).\n\n \
    \   ![A437923_1_En_16_Fig11_HTML.jpg](A437923_1_En_16_Fig11_HTML.jpg)\n\n    Figure\
    \ 16-11. A pop-up menu lets you define how to display the scene.\n\n5.  Choose\
    \ Show. Xcode creates a segue between the two scenes.\n6.  Drag a label on to\
    \ the second scene and change its text to read “Second scene here”.\n7.  Choose\
    \ Product ➤ Run. Xcode runs your program and displays the window with the push\
    \ button on it.\n8.  Click the button. The second window appears that contains\
    \ the label “Second scene here”, as shown in Figure [16-12](#A437923_1_En_16_Chapter.html#Fig12).\n\
    \n    ![A437923_1_En_16_Fig12_HTML.jpg](A437923_1_En_16_Fig12_HTML.jpg)\n\n  \
    \  Figure 16-12. A segue opens a second view.\n\n### Displaying Scenes from a\
    \ Segue\n\nSegues serve two purposes. First, a segue connects one scene to another\
    \ scene. Second, a segue defines how that second scene appears. When creating\
    \ a segue, you have five options:\n\n*   **Show**: Displays a scene as a separate\
    \ window that can be moved and resized\n*   **Custom**: Lets you create a custom\
    \ appearance for the scene\n*   **Modal**: Displays a scene as a dialog that won’t\
    \ let the user do anything else until dismissing this scene\n*   **Popover**:\
    \ Displays a scene with an arrow pointing to an object, as shown in Figure [16-13](#A437923_1_En_16_Chapter.html#Fig13).\n\
    \n    ![A437923_1_En_16_Fig13_HTML.jpg](A437923_1_En_16_Fig13_HTML.jpg)\n\n  \
    \  Figure 16-13. A popover appears pointing at the object the user clicked.\n\n\
    *   **Sheet**: Displays a scene as a sheet that drops down from a window’s title\
    \ bar and covers it up, as shown in Figure [16-14](#A437923_1_En_16_Chapter.html#Fig14).\n\
    \n    ![A437923_1_En_16_Fig14_HTML.jpg](A437923_1_En_16_Fig14_HTML.jpg)\n\n  \
    \  Figure 16-14. A sheet drops down from a window’s title bar.\n\nWhen you first\
    \ create a segue, you can define how the segue should display the scene. However,\
    \ you can always change this by following these steps:\n\n1.  Make sure your `StoryProgram`\
    \ project is loaded in Xcode and click the `Main.storyboard` file in the Project\
    \ Navigator pane.\n2.  Click the segue you want to modify. Xcode highlights your\
    \ chosen segue.\n3.  Choose View ➤ Utilities ➤ Show Attributes Inspector. The\
    \ Attributes Inspector pane displays the `Kind` property pop-up menu.\n4.  Click\
    \ the `Kind` pop-up menu and choose a different style such as `modal` or `custom`,\
    \ as shown in Figure [16-15](#A437923_1_En_16_Chapter.html#Fig15).\n\n    ![A437923_1_En_16_Fig15_HTML.jpg](A437923_1_En_16_Fig15_HTML.jpg)\n\
    \n    Figure 16-15. You can change how a segue displays a scene."
