    \ size.\n\n### Defining Window Sizes\n\nA window displays your program’s user\
    \ interface on the screen. Xcode lets you define the following for a window (as\
    \ shown in Figure [15-10](#A437923_1_En_15_Chapter.html#Fig10)):\n\n![A437923_1_En_15_Fig10_HTML.jpg](A437923_1_En_15_Fig10_HTML.jpg)\n\
    \nFigure 15-10.\n\nThe Size Inspector lets you define the size of a window\n\n\
    *   The initial size of the window\n*   The minimum size of the window\n*   The\
    \ maximum size of the window\n*   The initial position of the window on the screen\n\
    \nTo define the size of a window of a `.xib` file in Xcode, follow these steps:\n\
    \n1.  Click the .xib file in the Project Navigator pane. Xcode displays the user\
    \ interface stored in the `.xib` file.  \n2.  If necessary, click the Hide Document\
    \ Outline icon that appears in the bottom left corner, as shown in Figure [15-11](#A437923_1_En_15_Chapter.html#Fig11).\n\
    \n![A437923_1_En_15_Fig11_HTML.jpg](A437923_1_En_15_Fig11_HTML.jpg)\n\nFigure\
    \ 15-11.\n\nThe Hide Document Outline icon  \n3.  Click the bottom icon that represents\
    \ the window of your user interface, as shown in Figure [15-12](#A437923_1_En_15_Chapter.html#Fig12).\n\
    \n![A437923_1_En_15_Fig12_HTML.jpg](A437923_1_En_15_Fig12_HTML.jpg)\n\nFigure\
    \ 15-12.\n\nThe bottom icon represents your user interface window  \n4.  Choose\
    \ View ➤ Utilities ➤ Show Size Inspector. The Size Inspector pane appears (see\
    \ Figure [15-10](#A437923_1_En_15_Chapter.html#Fig10)).\n\nWindows stored in `.storyboard`\
    \ files work slightly differently than `.xib` files. When you create a macOS project,\
    \ you have a choice between using `.xib` files or `.storyboard` files. If you\
    \ create a project that uses `.storyboard` files, you can define the size of a\
    \ window of a `.storyboard` file in Xcode by following these steps:\n\n1.  Click\
    \ the `.storyboard` file in the Project Navigator pane. Xcode displays the user\
    \ interface stored in the `.storyboard` file.  \n2.  Click the View Controller\
    \ of the window you want to modify, as shown in Figure [15-13](#A437923_1_En_15_Chapter.html#Fig13).\n\
    \n![A437923_1_En_15_Fig13_HTML.jpg](A437923_1_En_15_Fig13_HTML.jpg)\n\nFigure\
    \ 15-13.\n\nThe View Controller defines your user interface window  \n3.  Choose\
    \ View ➤ Utilities ➤ Show Size Inspector. The Size Inspector pane appears (see\
    \ Figure [15-10](#A437923_1_En_15_Chapter.html#Fig10)).\n\nWhether you create\
    \ a user interface with `.xib` or `.storyboard` files, Xcode gives you two ways\
    \ to change the size of any window. First, you can drag a side or corner of the\
    \ window (or view controller) using the mouse. Second, you can click in the `Width`\
    \ and `Height` text fields next to the Size label to choose a precise size for\
    \ your window’s width and height, as shown in Figure [15-14](#A437923_1_En_15_Chapter.html#Fig14).\n\
    \n![A437923_1_En_15_Fig14_HTML.jpg](A437923_1_En_15_Fig14_HTML.jpg)\n\nFigure\
    \ 15-14.\n\nDefining the width and height of a window\n\nDefining the minimum\
    \ and/or maximum size of a window involves a two-step process. First, you need\
    \ to select the Minimum Size and/or Maximum Size check box. Second, you need to\
    \ type or choose a width and height to define the minimum or maximum size for\
    \ your window.\n\nFinally, you can define the initial position of a window when\
    \ it first appears. You can do this by either dragging on the window icon on the\
    \ simulated screen or by typing in an X and Y value into the Initial Position\
    \ text fields, as shown in Figure [15-15](#A437923_1_En_15_Chapter.html#Fig15).\n\
    \n![A437923_1_En_15_Fig15_HTML.jpg](A437923_1_En_15_Fig15_HTML.jpg)\n\nFigure\
    \ 15-15.\n\nDefining the initial position of a window\n\nThe two pop-up menus\
    \ underneath the simulated screen let you define how to determine the initial\
    \ position of a window:\n\n*   Fixed from Left/Right: Defines a fixed value between\
    \ the window edge and the screen edge\n*   Proportional Horizontal/Vertical: Defines\
    \ a proportional value between the window edge and the screen edge, based on the\
    \ size of the screen\n*   Center Horizontally/Vertically: Defines the window to\
    \ appear in the center of the screen"
  trans: "\n### 可接收命令的用户界面元素\n\n最常见的用户界面元素是那些能接收命令，以便用户控制程序的元素。其中最常见的两类可接收命令的界面元素是**按钮**和**菜单**。每个按钮或菜单项都代表一条单一命令，因此当用户点击按钮或菜单项时，该命令便会指示程序执行相应操作。\n\
    \n按钮和菜单都允许视图使用一种称为“目标-动作”（target-action）的机制与控制器通信，如图 15-7 所示。目标是触发控制器中某个动作（例如运行一个\
    \ `IBAction` 方法）的按钮或菜单项。\n\n![A437923_1_En_15_Fig7_HTML.jpg](img/A437923_1_En_15_Fig7_HTML.jpg)\n\
    \n**图 15-7.** 按钮和菜单让视图能够与控制器通信\n\n用户界面按钮基于 `NSButton` 类。菜单项基于 `NSMenuItem` 类。对象库中显示了多种不同类型的按钮和菜单项，但它们的工作原理相同，即按钮或菜单项代表一条命令。要使该命令生效，需要将界面上的按钮连接到\
    \ Swift 文件中的 `IBAction` 方法。\n\n### 用于分组元素的用户界面元素\n\n有一类用户界面元素只负责对界面上的其他元素进行分组和组织，例如在相关按钮或文本周围显示一个边框。这些界面元素更具装饰性，因此通常不需要使用\
    \ `IBOutlet` 或 `IBAction` 方法将其连接到 Swift 代码。一些用于分组和组织其他界面元素的示例如下：\n\n-   **表格视图**\
    \ (`NSTableView`)：以行形式显示数据\n-   **集合视图** (`NSCollectionView`)：以行和列形式显示数据\n-  \
    \ **盒视图** (`NSBox`)：显示一个在相关元素周围绘制边框的盒子\n-   **标签视图** (`NSTabView`)：显示两个或多个标签页，可更改盒子内显示的数据，如图\
    \ 15-8 所示\n\n    ![A437923_1_En_15_Fig8_HTML.jpg](img/A437923_1_En_15_Fig8_HTML.jpg)\n\
    \n    **图 15-8.** 标签视图可以在同一个盒子内对两组或多组相关元素进行分组。\n\n-   **窗口** (`NSWindow`)：显示一个可容纳其他界面元素的窗口\n\
    -   **工具栏** (`NSToolbar`)：显示代表命令的图标\n\n尽管对象库中包含许多其他元素，但它们通常可分为以下四类：\n\n-   显示或接收文本的元素\n\
    -   允许用户从有限的合法选项中进行选择的元素\n-   允许用户选择命令来控制程序的元素\n-   对其它界面元素进行分组或组织的元素\n\n## 在自动布局中使用约束\n\
    \n无论您在界面上放置何种元素，都需要考虑用户调整窗口大小时会发生什么。窗口太大可能会在界面上留下过多空白空间；窗口太小则可能裁剪掉部分元素，如图 15-9\
    \ 所示。\n\n![A437923_1_En_15_Fig9_HTML.jpg](img/A437923_1_En_15_Fig9_HTML.jpg)\n\
    \n**图 15-9.** 当用户调整窗口大小时，若界面不能自适应，就可能裁剪掉部分元素\n\n有两种方法可以确保用户调整窗口大小时界面仍保持可用。首先，可以为窗口定义最小和最大尺寸，以防止其过度缩小或放大。其次，可以为单个元素设置约束，定义相邻元素之间以及元素与窗口边缘之间的距离。\n\
    \n在大多数情况下，您可以同时使用这两种方法。这样，您既可以为窗口定义最小和最大尺寸，也可以定义界面元素应如何适应窗口大小的变化。\n\n### 定义窗口尺寸\n\
    \n窗口用于在屏幕上显示程序的用户界面。Xcode 允许您为窗口定义以下内容（如图 15-10 所示）：\n\n![A437923_1_En_15_Fig10_HTML.jpg](img/A437923_1_En_15_Fig10_HTML.jpg)\n\
    \n**图 15-10.** 尺寸检查器允许您定义窗口大小\n\n-   窗口的初始尺寸\n-   窗口的最小尺寸\n-   窗口的最大尺寸\n-   窗口在屏幕上的初始位置\n\
    \n要在 Xcode 中定义 `.xib` 文件的窗口尺寸，请按照以下步骤操作：\n\n1.  在项目导航窗格中点击 `.xib` 文件。Xcode 将显示存储在\
    \ `.xib` 文件中的用户界面。\n2.  如有必要，点击左下角的“隐藏文档大纲”图标，如图 15-11 所示。\n\n![A437923_1_En_15_Fig11_HTML.jpg](img/A437923_1_En_15_Fig11_HTML.jpg)\n\
    \n**图 15-11.** “隐藏文档大纲”图标\n\n3.  点击代表您用户界面窗口的底部图标，如图 15-12 所示。\n\n![A437923_1_En_15_Fig12_HTML.jpg](img/A437923_1_En_15_Fig12_HTML.jpg)\n\
    \n**图 15-12.** 底部图标代表您的用户界面窗口\n\n4.  选择“视图”➤“实用工具”➤“显示尺寸检查器”。尺寸检查器窗格将出现（参见图 15-10）。\n\
    \n存储在 `.storyboard` 文件中的窗口与 `.xib` 文件的处理方式略有不同。创建 macOS 项目时，您可以选择使用 `.xib` 文件或\
    \ `.storyboard` 文件。如果您创建的是使用 `.storyboard` 文件的项目，可以通过以下步骤在 Xcode 中定义 `.storyboard`\
    \ 文件的窗口尺寸：\n\n1.  在项目导航窗格中点击 `.storyboard` 文件。Xcode 将显示存储在 `.storyboard` 文件中的用户界面。\n\
    2.  点击要修改窗口的视图控制器，如图 15-13 所示。\n\n![A437923_1_En_15_Fig13_HTML.jpg](img/A437923_1_En_15_Fig13_HTML.jpg)\n\
    \n**图 15-13.** 视图控制器定义您的用户界面窗口\n\n3.  选择“视图”➤“实用工具”➤“显示尺寸检查器”。尺寸检查器窗格将出现（参见图 15-10）。\n\
    \n无论您使用 `.xib` 文件还是 `.storyboard` 文件创建用户界面，Xcode 都提供两种更改任何窗口尺寸的方法。首先，您可以使用鼠标拖动窗口（或视图控制器）的边或角。其次，您可以点击“尺寸”标签旁边的“宽度”和“高度”文本框，为窗口的宽度和高度选择精确值，如图\
    \ 15-14 所示。\n\n![A437923_1_En_15_Fig14_HTML.jpg](img/A437923_1_En_15_Fig14_HTML.jpg)\n\
    \n**图 15-14.** 定义窗口的宽度和高度\n\n定义窗口的最小和/或最大尺寸需要两步操作。首先，您需要选中**最小尺寸**和/或**最大尺寸**复选框。其次，您需要输入或选择宽度和高度，以定义窗口的最小或最大尺寸。\n\
    \n最后，您还可以定义窗口首次出现时的初始位置。为此，您可以在模拟屏幕上拖动窗口图标，或者在**初始位置**文本框中输入 X 和 Y 值，如图 15-15\
    \ 所示。\n\n![A437923_1_En_15_Fig15_HTML.jpg](img/A437923_1_En_15_Fig15_HTML.jpg)\n\
    \n**图 15-15.** 定义窗口的初始位置\n\n模拟屏幕下方的两个弹出菜单允许您定义如何确定窗口的初始位置：\n\n-   **从左侧/右侧固定**：定义窗口边缘与屏幕边缘之间的固定值\n\
    -   **水平/垂直比例**：根据屏幕尺寸，定义窗口边缘与屏幕边缘之间的比例值\n-   **水平/垂直居中**：定义窗口显示在屏幕中央\n\n"
- fmt: '### Placing Constraints on User Interface Items


    Defining a minimum size for a window can keep the user from shrinking a window
    so small that it cuts off the items that appear on the user interface. However,
    what happens if the user expands a window? Then the items in the window should
    ideally adjust their position to adapt to the expanded window size.


    Constraints define the distance between two items, such as between a button and
    the edge of the window or between two buttons. Xcode gives you three ways to place
    constraints on a user interface item:


    - Control-drag the mouse from a user interface item to another item or the edge
    of a window

    - Choose `Editor ➤ Resolve Auto Layout Issues`

    - Click the `Add New Constraints` or `Resolve Auto Layout Issues` icons in the
    bottom right corner, as shown in Figure [15-16](#A437923_1_En_15_Chapter.html#Fig16)


    ![A437923_1_En_15_Fig16_HTML.jpg](A437923_1_En_15_Fig16_HTML.jpg)


    Figure 15-16. The `Align`, `Pin`, and `Resolve Auto Layout Issues` icons


    To use the Control-drag method to place a constraint, follow these steps:


    1. Move the mouse pointer over the user interface item you want to constrain.

    2. Hold down the `Control` key and drag the mouse towards another user interface
    item or the edge of the window.

    3. Release the `Control` key and the mouse button when the mouse pointer appears
    near the other user interface item or window edge. A pop-up window appears, similar
    to Figure [15-17](#A437923_1_En_15_Chapter.html#Fig17).


    ![A437923_1_En_15_Fig17_HTML.jpg](A437923_1_En_15_Fig17_HTML.jpg)


    Figure 15-17. Releasing the `Control` key and the mouse displays a pop-up window


    Depending on the direction you `Control`-drag the mouse, you''ll see different
    options in the pop-up window, as shown in Table [15-1](#A437923_1_En_15_Chapter.html#Tab1).


    Table 15-1. Pop-Up Options


    | Direction to Window Edge | Constraint Option |

    | --- | --- |

    | Up | `Top space to container` |

    | Bottom | `Bottom space to container` |

    | Right | `Trailing space to container` |

    | Left | `Leading space to container` |


    Besides Control-dragging to a window edge, you can also `Control`-drag from one
    user interface item over another user interface item. Doing this lets you define
    the distance between two items on the user interface, such as the distance between
    two buttons or one button and a text field.


    When you `Control`-drag the mouse over another user interface item, a pop-up window
    appears. If you''re defining the distance between two items that are side by side,
    the pop-up window will display the `Horizontal Spacing` option. If you''re defining
    the distance between two items that are stacked one on top of another, the pop-up
    window will display the `Vertical Spacing` option, as shown in Table [15-2](#A437923_1_En_15_Chapter.html#Tab2).


    Table 15-2. Spacing Options


    | Direction to Another Item | Constraint Option |

    | --- | --- |

    | Left/Right | `Horizontal spacing` |

    | Up/Down | `Vertical spacing` |


    The `Control`-drag method lets you place constraints visually on different user
    interface items. Another way to define constraints is to click the user interface
    item you want to constrain, and then click the `Pin` icon to display a pop-up
    window. To define constraints through the `Pin` icon, follow these steps:


    1. Click the user interface item that you want to constrain.

    2. Click the `Add New Constraints` icon. A pop-up window appears, showing four
    constraints to the left, right, up, and down. In Figure [15-18](#A437923_1_En_15_Chapter.html#Fig18),
    the distance to the top of the window is 139, the distance to the left of the
    window is 145, the distance to the right of the window is 239, and the distance
    to the bottom of the window is 199.


    ![A437923_1_En_15_Fig18_HTML.jpg](A437923_1_En_15_Fig18_HTML.jpg)


    Figure 15-18. The `Add New Constraints` icon displays a pop-up window of constraints


    3. Click a constraint to select it. When you click a constraint, it appears in
    red. If a constraint appears as a dotted line, this means the constraint has not
    been selected yet.

    4. Click in any of the additional check boxes.

    5. Click the `Add Constraints` button at the bottom of the pop-up window to define
    one or more constraints.


    The `Add New Constraints` pop-up window lets you define additional types of constraints
    for your selected user interface item:


    - `Width` or `Height`: Keeps the size of your selected user interface item at
    a fixed size

    - `Equal Widths` or `Heights`: Keeps two or more selected user interface items
    at the same fixed size

    - `Aspect Ratio`: Keeps the ratio between the selected user interface item properly
    proportioned if it''s resized

    - `Align`: Aligns two or more selected user interface items


    A third way to define constraints is to let Xcode choose constraints for you.
    This lets you add constraints quickly, but at the risk that Xcode may not define
    constraints correctly. Fortunately, you can always edit constraints later.


    To let Xcode choose constraints, follow these steps:


    1. Click the user interface item that you want to constrain.

    2. Click the `Resolve Auto Layout Issues` icon to display a pop-up window, as
    shown in Figure [15-19](#A437923_1_En_15_Chapter.html#Fig19) (or choose `Editor
    ➤ Resolve Auto Layout Issues`).


    ![A437923_1_En_15_Fig19_HTML.jpg](A437923_1_En_15_Fig19_HTML.jpg)


    Figure 15-19. The `Resolve Auto Layout Issues` pop-up window


    3. Choose either the `Add Missing Constraints` or `Reset to Suggested Constraints`
    option.


    If you choose the options in the top half of the window, you''ll affect only the
    selected user interface item. If you choose the options in the bottom half of
    the window, you''ll affect all user interface items whether you selected them
    or not.


    Remember, adding constraints can be a trial-and-error process of defining a constraint
    and seeing how it works before modifying or deleting it altogether. As you add
    constraints, Xcode displays constraint lines around your user interface item.
    If Xcode doesn''t think you have enough constraints, all constraints on that item
    will appear as orange. The moment Xcode thinks you have enough constraints on
    an item, the constraints will appear in blue.'
