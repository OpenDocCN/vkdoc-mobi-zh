    \ against anything that threatens to keep it from working properly."
  raw: '### Using Protocol Extensions to Extend Common Data Types


    Perhaps the most interesting use for protocol extensions is to add properties
    to common data types such as String, Int, and Double. A protocol extension for
    extending data types looks like this:


    ```

    extension dataType {

    // New property {

    // return computed value

    }

    }

    ```


    When you extend a common data type with a protocol, you must create a variable
    that represents the data type followed by a period and the property name. So if
    you created an extension for the Int data type like


    ```

    extension Int {

    var name : String {

    return text

    }

    }

    ```


    you could store a string value like


    ```

    var status = 25.name   // represents a String

    ```


    To see how to use protocol extensions to extend common data types, follow these
    steps:


    1.  Make sure the ProtocolPlayground file is loaded in Xcode.  

    2.  Edit the playground code as follows:  


    ```

    import Cocoa

    func checkMe (myAge : Int) -> String {

    if myAge >= 21 {

    return "Legal"

    } else {

    return "Underage"

    }

    }

    var text : String

    var myAge : Int

    myAge = 32

    text = checkMe (myAge : myAge)

    extension Int {

    var name : String {

    return text

    }

    }

    var status = myAge.name

    print (myAge)

    print (status)

    myAge = 16

    text = checkMe (myAge : myAge)

    status = myAge.name

    print (myAge)

    print (status)

    ```


    Figure [24-7](#A437923_1_En_24_Chapter.html#Fig7) shows the result of running
    this code. As you can see, when the `myAge` variable is greater than 21, its `name`
    property stores a string, which gets stored in the `status` variable. Depending
    on the value of the `myAge` variable, the `name` property stores either the string
    “Legal” or the string “Underage.”


    ![A437923_1_En_24_Fig7_HTML.jpg](A437923_1_En_24_Fig7_HTML.jpg)


    Figure 24-7.


    Protocol extensions can extend common data types


    ## Summary


    Protocols offer an alternate way to extend existing code. Just like a class, a
    protocol can define properties and methods. The main difference is that a protocol
    only defines a method’s name and parameters, but does not actually include Swift
    code that implements that method.


    Another difference is that when a protocol defines properties, it must also define
    whether that property is gettable { get } or gettable and settable { get set }.


    Protocols work much like inheritance. While inheritance only allows classes to
    inherit from exactly one other class, protocols can extend classes, structures,
    and enums using one or more protocols.


    Protocol extensions let you define default values for properties. When combined
    with common data types like Int, String, and Double, protocol extensions allow
    a data type to store additional information.


    Just remember that you can mix object-oriented programming with protocol-oriented
    programming so you don’t have to choose between one or the other. Both objects
    and protocols can be useful depending on what you need to accomplish in your particular
    program. Make sure you understand how to define protocols, use them, and extend
    them because protocols will be a common feature of Swift programs.


    # 25. Defensive Programming


    Programmers tend to be optimistic, because when they write code, they assume that
    it will work correctly. However, it''s often better to be more pessimistic when
    it comes to programming. Instead of assuming your code will work the first time,
    it''s safer to assume your code won''t work at all. This forces you to be extra
    careful when writing Swift code to make sure it does exactly what you want and
    doesn''t do anything unexpected.


    No program is error-free. Rather than waste time hunting down problems, it''s
    far better to anticipate them and do your best to prevent them from creeping into
    your code in the first place. While it''s not possible to write error-free code
    100% of the time, the more defensive you are in writing code, the less likely
    you''ll need to spend time hunting down errors that keep your code from working
    properly.


    In general, assume nothing. Assumptions will surprise you every time, and rarely
    for the better. By anticipating problems ahead of time, you can plan for them
    so they won''t wreck your program and force you to spend countless hours trying
    to fix a problem that you assumed should never have existed at all.


    ## Test with Extreme Values


    The simplest way to test your code is to start with extreme values to see how
    your program handles data way out of range from the expected. When working with
    numbers, programs often assume that the user will give it valid data within a
    fixed range, but what happens if the user types a letter or a symbol such as a
    smiley face instead of a number? What if the user types an integer instead of
    a decimal number (or vice versa)? What if the user types an extreme number like
    42 billion or -0.00000005580?


    When working with strings, do the same type of test. How does your program react
    when it expects a string but receives a number instead? What happens if it receives
    a huge string consisting of 3,000 characters? What happens if it receives foreign
    language symbols with accent marks or unusual letters?


    By testing your program with extreme values, you can see if your program responds
    gracefully or simply crashes. Ultimately, the goal is to avoid crashes and respond
    gracefully. This might mean asking the user for valid data over and over again,
    or at least warning the user when the program receives invalid data. Reliable
    programs need to guard against anything that threatens to keep it from working
    properly.'
  trans: '

    ### 使用协议扩展扩展通用数据类型


    协议扩展最有趣的用途之一，可能是为诸如 `String`、`Int` 和 `Double` 这样的通用数据类型添加属性。用于扩展数据类型的协议扩展如下所示：


    ```

    extension dataType {

    // 新属性 {

    // 返回计算值

    }

    }

    ```


    当你使用协议扩展通用数据类型时，必须创建一个变量，该变量代表数据类型，后跟一个句点和属性名。因此，如果你为 `Int` 数据类型创建了如下扩展：


    ```

    extension Int {

    var name : String {

    return text

    }

    }

    ```


    你可以像这样存储一个字符串值：


    ```

    var status = 25.name   // 表示一个 String

    ```


    要了解如何使用协议扩展来扩展通用数据类型，请按以下步骤操作：


    1.  确保 `ProtocolPlayground` 文件已在 Xcode 中加载。  

    2.  按如下方式编辑 playground 代码：


    ```

    import Cocoa

    func checkMe (myAge : Int) -> String {

    if myAge >= 21 {

    return "Legal"

    } else {

    return "Underage"

    }

    }

    var text : String

    var myAge : Int

    myAge = 32

    text = checkMe (myAge : myAge)

    extension Int {

    var name : String {

    return text

    }

    }

    var status = myAge.name

    print (myAge)

    print (status)

    myAge = 16

    text = checkMe (myAge : myAge)

    status = myAge.name

    print (myAge)

    print (status)

    ```


    图 24-7 显示了运行此代码的结果。如您所见，当 `myAge` 变量大于 21 时，其 `name` 属性会存储一个字符串，该字符串会被存入 `status`
    变量。根据 `myAge` 变量的值，`name` 属性会存储字符串“Legal”或字符串“Underage”。


    ![A437923_1_En_24_Fig7_HTML.jpg](img/A437923_1_En_24_Fig7_HTML.jpg)


    **图 24-7.** 协议扩展可以扩展通用数据类型


    ## 总结


    协议提供了一种扩展现有代码的替代方式。就像类一样，协议可以定义属性和方法。主要区别在于，协议只定义方法的名称和参数，但并未实际包含实现该方法的 Swift
    代码。


    另一个区别是，当协议定义属性时，它还必须定义该属性是只读的 (`{ get }`) 还是可读写的 (`{ get set }`)。


    协议的工作原理与继承非常相似。虽然继承只允许类继承自恰好一个其他类，但协议可以使用一个或多个协议来扩展类、结构体和枚举。


    协议扩展允许你为属性定义默认值。当与诸如 `Int`、`String` 和 `Double` 这样的通用数据类型结合使用时，协议扩展允许数据类型存储额外的信息。


    请记住，你可以混合使用面向对象编程和面向协议编程，因此你无需在两者之间二选一。对象和协议都可能有用，具体取决于你在特定程序中需要完成的任务。确保你理解如何定义、使用和扩展协议，因为协议将是
    Swift 程序的一个常见特性。


    # 25. 防御性编程


    程序员往往很乐观，因为当他们编写代码时，他们会假设代码能够正确运行。然而，在编程方面，更悲观一些通常更好。与其假设你的代码第一次就能运行成功，不如假设你的代码根本不能运行，这样更安全。这会迫使你在编写
    Swift 代码时格外小心，以确保代码完全按照你的预期工作，并且不会发生任何意外行为。


    没有程序是没有错误的。与其浪费时间查找问题，不如提前预见它们，并尽最大努力从一开始就防止它们潜入你的代码中。虽然 100% 的时间都编写出无错误的代码是不可能的，但你在编写代码时越具有防御性，就越不需要花时间查找导致代码无法正常工作的错误。


    总的来说，不要做任何假设。假设每次都会让你大吃一惊，而且很少有好的结果。通过提前预见问题，你可以为它们制定计划，这样它们就不会破坏你的程序，也不会迫使你花费无数时间试图修复一个你本以为根本不应该存在的问题。


    ## 使用极限值进行测试


    测试代码最简单的方法是从极限值开始，看看你的程序如何处理远远超出预期范围的数据。在处理数字时，程序通常假设用户会提供固定范围内的有效数据，但如果用户输入的是字母或符号（比如笑脸）而不是数字，会发生什么？如果用户输入的是整数而不是小数（或反之）呢？如果用户输入的是像
    420 亿或 -0.00000005580 这样的极端数字呢？


    在处理字符串时，进行同样类型的测试。当程序期望一个字符串却收到了一个数字时，它会如何反应？如果它收到一个包含 3000 个字符的巨大字符串呢？如果它收到带有重音符号或不寻常字母的外语符号呢？


    通过使用极限值测试你的程序，你可以观察程序是优雅地响应，还是直接崩溃。最终目标是避免崩溃并优雅地响应。这可能意味着反复要求用户提供有效数据，或者至少在程序收到无效数据时警告用户。可靠的程序需要防范任何可能威胁其正常运行的因素。

