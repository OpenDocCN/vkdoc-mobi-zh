    使用 Assistant Editor 的一个问题是，Xcode 将两个文件的内容都显示在狭窄的窗格中。如果你希望以更宽的视图查看两个或多个文件，可以在单独的标签页中显示它们。这样你可以在\
    \ Xcode 的中间窗格中查看每个文件的内容，只需点击标签页即可查看不同文件的内容。\n\n标签页的缺点是你一次只能看到一个文件的内容。第二个缺点是你无法在\
    \ Swift 代码旁边看到用户界面，因此无法将用户界面元素连接到你的 Swift 代码。\n\n要创建一个标签页，请选择以下方式之一：\n\n*   选择`File\
    \ ➤ New ➤ Tab`。\n*   按下`Command + T`。\n\n现在你可以点击每个标签页来查看该文件的内容。要关闭一个标签页，将鼠标移到该标签页上，然后选择以下方式之一：\n\
    \n*   点击标签页左侧的关闭图标（看起来像一个大的`X`）。\n*   右键点击标签页，在弹出的菜单中点击`Close Tab`，如图[2-21](#A437923_1_En_2_Chapter.html#Fig21)所示。\n\
    \n![A437923_1_En_2_Fig21_HTML.jpg](A437923_1_En_2_Fig21_HTML.jpg)\n\n图 2-21。\n\
    \n右键点击标签页会显示一个弹出菜单\n\n## 运行程序\n\n通常你会多次运行程序来测试并确保它工作正常。当你运行程序时，Xcode 会将其编译成一个文件，如果你愿意，可以分发给其他人。运行程序让你可以直接在\
    \ Macintosh 上测试你的程序。\n\n运行程序有三种方式：\n\n*   选择`Product ➤ Run`。\n*   按下`Command +\
    \ R`。\n*   点击`Run`图标，如图[2-22](#A437923_1_En_2_Chapter.html#Fig22)所示。\n\n    ![A437923_1_En_2_Fig22_HTML.jpg](A437923_1_En_2_Fig22_HTML.jpg)\n\
    \n    图 2-22。\n\n    `Run`和`Stop`图标让你可以测试你的 macOS 项目\n\n程序运行后，你可以通过几种方式停止它：\n\n\
    *   选择`YourProgramName ➤ Quit`（其中“`YourProgramName`”是你的项目名称）。\n*   点击 Dock 上代表你程序的图标，然后按下`Command\
    \ + Q`。\n*   点击 Xcode 中的`Stop`图标（见图[2-22](#A437923_1_En_2_Chapter.html#Fig22)）。\n\
    \n如果你的程序有严重错误，导致无法响应任何命令，你也可以使用`Force Quit`命令来关闭程序。要使用`Force Quit`，请点击 Apple 菜单并选择`Force\
    \ Quit`。\n\n当`Force Quit`窗口出现时，点击你的程序名称，然后点击`Force Quit`按钮将其关闭。\n\n## 总结\n\n本章向你介绍了\
    \ Xcode 的主要功能，并展示了选择常用命令的各种方式。暂时不必担心记住或完全理解本章的所有内容。将本章视为对 Xcode 的介绍，当你遇到问题时可以随时参考。\n\
    \n在下一章中，你将实际经历使用 Xcode 创建 macOS 程序的典型过程。这样你就可以看到本章所学各种 Xcode 功能的目的。\n\n请记住，使用\
    \ Xcode 时，选择完全相同的命令通常有两种或更多方式，但你不必学会所有这些不同的方法。选择你最喜欢的方法，忽略其他方法。\n\n正如你所看到的，Xcode\
    \ 提供了将你的想法转变为完全功能化的 macOS 程序所需的一切，你可以将其出售并分发给他人。通过学习 Xcode，你将学会使用专业程序员用来创建 macOS、iOS、tvOS\
    \ 或 watchOS 软件的编程工具。你使用 Xcode 越多，就会越得心应手，Xcode 用户界面的压迫感也会越少。很快你就会像专业人士一样使用 Xcode。\n\
    \n请记住，编程的真正关键不是拥有最好的编程工具，而是知道如何使用它们。你使用 Xcode 越多，就越能理解如何将你的好想法变成真正可运行的程序。学习 Xcode\
    \ 是你为 Macintosh 和苹果众多其他设备（如 iPhone、iPad、Apple Watch 和 Apple TV）编写软件的途径。通过今天学习\
    \ Xcode，你可以抓住现在乃至未来许多有利可图的编程机会。\n\n欢迎来到 Xcode 的世界！\n\n# 3. 创建 Mac 程序的基础\n\n无论你想创建哪种类型的\
    \ macOS 程序，例如视频游戏或专为牙医或房地产经纪人定制的程序，你总是会经历相同的基本步骤。首先，你需要创建一个 macOS 项目。这会创建一个包含通用用户界面的基本\
    \ macOS 程序。\n\n其次，你需要以两种方式定制这个通用的 macOS 程序：向用户界面添加元素，以及编写 Swift 代码使程序真正执行某些操作。\n\
    \n第三，你需要运行并测试你的程序。在运行和测试程序之后，你可能需要不断地返回并修改用户界面或 Swift 代码，以修复问题并添加新功能。最终你的程序会达到一个完整的阶段（暂时），然后你可以发布它。然后你会再次重复这些基本步骤，以添加更多新功能。\n\
    \n通常，你花在修改程序上的时间会比创建新程序的时间多。然而，创建小程序来测试不同的功能是很有用的。一旦这些较小的实验性程序能够运行，你就可以将它们添加到另一个程序中。通过这样做，你不会冒着破坏一个正在工作的程序的风险。"
  raw: "*   Choose View ➤ Standard Editor ➤ Show Standard Editor.\n*   Press Command\
    \ + Return.\n*   Click the Standard Editor icon (see Figure [2-20](#A437923_1_En_2_Chapter.html#Fig20)).\n\
    \nOne problem with using the Assistant Editor is that Xcode displays both file\
    \ contents in narrow panes. If you prefer seeing two or more files in a wider\
    \ view, you can display them in separate tabs. This lets you see the contents\
    \ of each file in the middle pane of Xcode and simply click a tab to see a different\
    \ file’s contents.\n\nThe drawback of tabs is that you can only see the contents\
    \ of one file at a time. A second drawback is that you can’t see your user interface\
    \ next to your Swift code so you can’t connect user interface items to your Swift\
    \ code.\n\nTo create a tab, choose one of the following:\n\n*   Choose File ➤\
    \ New ➤ Tab.\n*   Press Command + T.\n\nNow you can click on each tab to view\
    \ the contents of that file. To close a tab, move the mouse over the tab and choose\
    \ one of the following:\n\n*   Click the close icon (it looks like a big X) in\
    \ the left of the tab.\n*   Right-click the tab and when a pop-up menu appears,\
    \ click Close Tab, as shown in Figure [2-21](#A437923_1_En_2_Chapter.html#Fig21).\n\
    \n![A437923_1_En_2_Fig21_HTML.jpg](A437923_1_En_2_Fig21_HTML.jpg)\n\nFigure 2-21.\n\
    \nRight-clicking a tab displays a pop-up menu\n\n## Running a Program\n\nTypically\
    \ you run your program multiple times to test and make sure it works right. When\
    \ you run a program, Xcode compiles it into a file that you can distribute to\
    \ others if you wish. Running a program lets you test your program directly on\
    \ your Macintosh.\n\nThe three ways to run a program are\n\n*   Choose Product\
    \ ➤ Run.\n*   Press Command + R.\n*   Click the Run icon, as shown in Figure [2-22](#A437923_1_En_2_Chapter.html#Fig22).\n\
    \n    ![A437923_1_En_2_Fig22_HTML.jpg](A437923_1_En_2_Fig22_HTML.jpg)\n\n    Figure\
    \ 2-22.\n\n    The Run and Stop icons let you test your macOS project\n\nOnce\
    \ your program is running, you can stop it in several ways:\n\n*   Choose YourProgramName\
    \ ➤ Quit (where “YourProgramName” is the name of your project).\n*   Click the\
    \ icon on the Dock that represents your program and press Command + Q.\n*   Click\
    \ the Stop icon in Xcode (see Figure [2-22](#A437923_1_En_2_Chapter.html#Fig22)).\n\
    \nIf your program has major errors that prevent it from responding to any commands,\
    \ you can also use the Force Quit command to shut down your program. To use Force\
    \ Quit, click the Apple menu and choose Force Quit.\n\nWhen the Force Quit window\
    \ appears , click your program’s name and then click the Force Quit button to\
    \ shut it down.\n\n## Summary\n\nThis chapter introduced you to the major features\
    \ of Xcode and showed various ways to choose common commands. Don’t worry about\
    \ memorizing or fully understanding everything in this chapter just yet. Think\
    \ of this chapter as an introduction to Xcode that you can refer back to whenever\
    \ you have a question.\n\nIn the next chapter, you’ll actually go through the\
    \ typical process of creating a macOS program using Xcode. This way you can see\
    \ the purpose of the various Xcode features that you learned about in this chapter.\n\
    \nJust remember that with Xcode, there are often two or more ways to choose the\
    \ exact same command, but you don’t have to learn all of these different ways.\
    \ Choose the method you like best and ignore the other methods.\n\nAs you can\
    \ see, Xcode offers everything you need to turn your ideas into a fully functional\
    \ macOS program that you can sell and distribute to others. By learning Xcode,\
    \ you’ll be learning to use the programming tool that professional programmers\
    \ use to create macOS and iOS, tvOS, or watchOS software. The more you use Xcode,\
    \ the more comfortable you’ll get and the less intimidating Xcode’s user interface\
    \ will feel. Pretty soon you’ll be using Xcode like a pro.\n\nRemember, the real\
    \ key to programming isn’t having the best programming tools but knowing how to\
    \ use them. The more you use Xcode, the more you’ll understand how to turn your\
    \ great ideas into actual working programs. Learning Xcode is your path to writing\
    \ software for the Macintosh and Apple’s many other devices such as the iPhone,\
    \ iPad, Apple Watch, and Apple TV. By learning Xcode today, you can take advantage\
    \ of the many lucrative programming opportunities that will be available now and\
    \ far into the future.\n\nWelcome to the world of Xcode!\n\n# 3. The Basics of\
    \ Creating a Mac Program\n\nWhatever type of macOS program you want to create,\
    \ such as a video game or a custom program for dentists or real estate agents,\
    \ you’ll always go through the same basic steps. First, you’ll need to create\
    \ a macOS project. This creates a bare-bones macOS program that includes a generic\
    \ user interface.\n\nSecond, you’ll need to customize this generic macOS program\
    \ in two ways: by adding items to the user interface and by writing Swift code\
    \ to make the program actually do something.\n\nThird, you’ll need to run and\
    \ test your program. After running and testing your program, you’ll likely need\
    \ to constantly go back and modify your user interface or Swift code to fix problems\
    \ and add new features. Eventually your program will reach a point where it’s\
    \ complete (for now) and you can ship it. Then you’ll repeat these basic steps\
    \ all over again to add new features once more.\n\nGenerally, you’ll spend more\
    \ time modifying a program than creating new ones. However, it’s useful to create\
    \ small programs to test out different features. Once you get these smaller, experimental\
    \ programs working, you can add them to another program. By doing this, you don’t\
    \ risk messing up a working program."
