    \ **Language** 弹出菜单显示为 **Swift**，并且所有复选框都为清除且未选中状态。\n6.  点击 **Next** 按钮。Xcode\
    \ 会询问您要存储项目的位置。\n7.  选择一个文件夹来存储您的项目，然后点击 **Create** 按钮。\n8.  在项目导航器窗格中点击`Main.storyboard`文件。\n\
    9.  将一个**推送按钮**和一个**日期选择器**拖到用户界面上。\n10. 点击日期选择器，然后选择 **View** ➤ **Utilities**\
    \ ➤ **Show Attributes Inspector**。\n11. 点击 **Style** 弹出菜单，选择 **Graphical**，使日期选择器看起来像月历，如图\
    \ 18-6 所示。\n\n![A437923_1_En_18_Fig6_HTML.jpg](img/A437923_1_En_18_Fig6_HTML.jpg)\n\
    \n图 18-6. DateProgram 的用户界面\n12. 选择 **View** ➤ **Assistant Editor** ➤ **Show Assistant\
    \ Editor**。Xcode 会在用户界面旁边显示`ViewController.swift`文件。\n13. 将鼠标指针移到日期选择器上，按住 **Control**\
    \ 键，然后将其拖到`ViewController.swift`文件中的`IBOutlet`行下方。\n14. 松开 **Control** 键和鼠标按钮。此时会出现一个弹出窗口。\n\
    15. 点击 **Name** 文本字段，输入`chooseDate`，然后点击 **Connect** 按钮。Xcode 会创建一个类似这样的 IBOutlet：\n\
    \n```\n@IBOutlet weak var chooseDate: NSDatePicker!\n```\n\n16. 将鼠标指针移到推送按钮上，按住\
    \ **Control** 键，然后将其拖到`ViewController.swift`文件底部最后一个花括号上方。\n17. 松开 **Control**\
    \ 键和鼠标。此时会出现一个弹出窗口。\n18. 点击 **Connect** 弹出菜单，选择 **Action**。\n19. 点击 **Name** 文本字段，输入`showDate`。\n\
    20. 点击 **Type** 弹出菜单，选择 **NSButton**。然后点击 **Connect** 按钮。Xcode 会创建一个 IBAction\
    \ 方法。\n21. 按如下方式修改此 IBAction 方法：\n\n```\n@IBAction func showDate(_ sender: NSButton)\
    \ {\n    let myAlert = NSAlert()\n    myAlert.messageText = \"You chose this date\
    \ =  \\(chooseDate.dateValue)\"\n    myAlert.runModal()\n}\n```\n\n22. 选择 **Product**\
    \ ➤ **Run**。您的用户界面会出现。\n23. 在日期选择器上选择一个日期，然后点击推送按钮。会弹出一个警告对话框，显示您选择的日期。\n24. 点击\
    \ **OK** 按钮关闭此警告对话框。\n25. 选择 **DateProgram** ➤ **Quit DateProgram**。\n"
- fmt: "## Using Sliders\n\nA slider can appear vertically or horizontally. Sliders\
    \ visually represent a range of values that the user can select by dragging the\
    \ slider back and forth (or up and down). One end represents the minimum value\
    \ (left or bottom) while the other end represents the maximum value (right or\
    \ top). To help users understand the different values a slider represents, you\
    \ can also choose to display tick marks, as shown in Figure [18-7](#A437923_1_En_18_Chapter.html#Fig7).\n\
    \n![A437923_1_En_18_Fig7_HTML.jpg](A437923_1_En_18_Fig7_HTML.jpg)\n\nFigure 18-7.\
    \ The appearance of a slider with and without tick marks\n\nSome of the more important\
    \ properties to define on a slider include:\n\n- **Tick Marks**: Defines the position\
    \ of tick marks and how many tick marks to display\n- **Minimum**: Defines the\
    \ smallest value possible\n- **Maximum**: Defines the largest value possible\n\
    - **Current**: Identifies the initial value of the slider when it first appears\
    \ on the user interface\n\nYou can use the `integerValue` property to retrieve\
    \ the current value of the slider and display this value in another user interface\
    \ item such as a text field. To see how to do this, follow these steps:\n\n1.\
    \ From within `Xcode` choose **File** ➤ **New** ➤ **Project**.\n2. Click **Application**\
    \ under the `macOS` category.\n3. Click **Cocoa Application** and click the **Next**\
    \ button. `Xcode` now asks for a product name.\n4. Click in the **Product Name**\
    \ text field and type `SliderProgram`.\n5. Make sure the **Language** popup menu\
    \ displays `Swift` and that the **“Use Storyboards”** check box is selected.\n\
    6. Click the **Next** button. `Xcode` asks where you want to store the project.\n\
    7. Choose a folder to store your project and click the **Create** button.\n8.\
    \ Click the `Main.storyboard` file in the **Project Navigator** pane.\n9. Click\
    \ the `SliderProgram` icon to make the window of the user interface appear.\n\
    10. Drag a horizontal slider and a text field on to the user interface so it looks\
    \ like Figure [18-8](#A437923_1_En_18_Chapter.html#Fig8).\n\n    ![A437923_1_En_18_Fig8_HTML.jpg](A437923_1_En_18_Fig8_HTML.jpg)\n\
    \n    Figure 18-8. The user interface of the `SliderProgram`\n\n11. Choose **View**\
    \ ➤ **Assistant Editor** ➤ **Show Assistant Editor**. `Xcode` shows the `ViewController.swift`\
    \ file next to the user interface.\n12. Move the mouse pointer over the horizontal\
    \ slider, hold down the **Control** key, and drag the mouse under the `IBOutlet`\
    \ line in the `ViewController.swift` file.\n13. Release the **Control** key and\
    \ the mouse. A pop-up window appears.\n14. Click in the **Name** text field, type\
    \ `mySlider`, and click the **Connect** button.\n15. Move the mouse pointer over\
    \ the text field, hold down the **Control** key, and drag the mouse under the\
    \ `IBOutlet` line in the `ViewController.swift` file.\n16. Release the **Control**\
    \ key and the mouse. A pop-up window appears.\n17. Click in the **Name** text\
    \ field, type `sliderValue`, and click the **Connect** button. You should now\
    \ have these two `IBOutlets`:\n\n    ```swift\n    @IBOutlet weak var mySlider:\
    \ NSSlider!\n    @IBOutlet weak var sliderValue: NSTextField!\n    ```\n\n18.\
    \ Move the mouse pointer over the horizontal slider, hold down the **Control**\
    \ key, and drag the mouse just above the last curly bracket at the bottom of the\
    \ `AppDelegate.swift` file.\n19. Release the **Control** key and the mouse. A\
    \ pop-up window appears.\n20. Click in the **Connection** pop-up menu and choose\
    \ **Action**.\n21. Click in the **Name** text field and type `getValue`.\n22.\
    \ Click in the **Type** pop-up menu and choose `NSSlider`. Then click the **Connect**\
    \ button. `Xcode` creates an empty `IBAction` method.\n23. Modify this `IBAction`\
    \ method as follows:\n\n    ```swift\n    @IBAction func getValue(_ sender: NSSlider)\
    \ {\n        sliderValue.integerValue = mySlider.integerValue\n    }\n    ```\n\
    \n24. Choose **Product** ➤ **Run**. Your user interface appears.\n25. Drag the\
    \ slider left and right. Notice that each time you drag the slider and release\
    \ the mouse button, the slider's current value appears in the text box.\n26. Choose\
    \ **SliderProgram** ➤ **Quit SliderProgram**.\n\n## Summary\n\nCheck boxes, radio\
    \ buttons, and date pickers let you provide the user with a range of valid options\
    \ to select. This insures that the user can't give a program invalid data by mistake\
    \ (or deliberately).\n\nCheck boxes allow the user to choose zero or more options.\
    \ A group of radio buttons only allow the user to choose one option. A date picker\
    \ allows the user to choose a correctly formatted date.\n\nTo identify which check\
    \ boxes a user selected, examine the `State` property of each check box. If the\
    \ `State` value is 1, the check box is selected. If the `State` value is 0, the\
    \ check box is clear.\n\nIt's possible to display alternate text on a check box\
    \ and radio button. This way, text appears when the check box or radio button\
    \ is selected and different text appears when the check box or radio button is\
    \ clear.\n\nTo identify which radio button a user may have selected, you need\
    \ to use the `Tag` property. Each radio button needs a unique `Tag` value, which\
    \ can be an integer. By identifying the `Tag` value, you can identify the radio\
    \ button that the user selected.\n\nThe date picker makes it easy for the user\
    \ to choose a date and/or a time. The date picker stores the selected date/time\
    \ in a special `NSDate` format that you can access through the `dateValue` property\
    \ of the date picker.\n\nSliders let users choose from a range of valid numeric\
    \ values. By using check boxes, radio buttons, date pickers, and sliders, a program\
    \ insures that users can only choose from a range of valid options.\n\n# 19. Using\
    \ Text with Labels, Text Fields, and Combo Boxes\n\nWhen a program needs to offer\
    \ a limited range of valid options to the user, that’s when you want to use check\
    \ boxes, radio buttons, date pickers, or sliders. However, sometimes a program\
    \ needs to allow the user to type in data that can never be predicted ahead of\
    \ time, such as a person’s name. When a program needs to allow the user to type\
    \ in data, that’s when you need to use a text field or a combo box.\n\nA text\
    \ field lets the user type in numbers, unusual characters, or ordinary letters.\
    \ This means a program may need to verify that the user typed in valid data.\n\
    \nSometimes a program can offer the user the option of choosing from a limited\
    \ selection of valid options or typing in data instead. For example, a program\
    \ might ask the user to choose a country. Then the program can offer a limited\
    \ range of likely options or give the user the freedom to type something else.\n\
    \nThis ability to either choose from a limited range of options or type something\
    \ in is the main advantage of a combo box. The combo box gets its name because\
    \ it combines the features of a pop-up button (displaying a list of valid options)\
    \ with the freedom to type anything in (like a text field).\n\nWhile text fields\
    \ and combo boxes are used to accept data from the user, labels are used to display\
    \ information to the user. When you just need to display information such as displaying\
    \ instructions or identifying the purpose of a text field (such as telling a user\
    \ to type a name or address), you’ll want to use a label. Labels, text fields,\
    \ and combo boxes work together to accept and display text on a user interface."
