    \ Xcode asks where you want to store the playground.  \n5.  Choose a folder to\
    \ store your project and click the Create button.  \n6.  Edit the playground code\
    \ as follows:\n\n    ```\n    import Cocoa\n    protocol Cat {\n    var name:\
    \ String { get set }\n    var age: Int { get }\n    }\n    // Using a computed\
    \ property\n    struct pet : Cat {\n    var name : String\n    var age : Int {\
    \ return 4 }\n    }\n    var animal = pet(name: \"Taffy\")\n    print (animal.name)\n\
    \    print (animal.age)\n    // Using a constant stored property with \"let\"\n\
    \    struct feral : Cat {\n    var name : String\n    let age : Int\n    }\n \
    \   var pest = feral (name: \"Stinky\", age: 2)\n    print (pest.name)\n    print\
    \ (pest.age)\n    ```\n\nNotice the differences when you declare a variable based\
    \ on a structure. With computed properties for age, you don’t need to create an\
    \ initial value when declaring the variable , such as\n\n```\n// Using a computed\
    \ property { return 4 }\nstruct pet : Cat {\nvar name : String\nvar age : Int\
    \ { return 4 }\n}\nvar animal = pet(name: \"Taffy\")\n```\n\nHowever, if you don’t\
    \ have computed properties, then you must specifically initialize it when creating\
    \ a variable, such as\n\n```\n// Using a constant stored property with \"let\"\
    \nstruct feral : Cat {\nvar name : String\nlet age : Int\n}\nvar pest = feral\
    \ (name: \"Stinky\", age: 2)\n```\n\nFigure [24-1](#A437923_1_En_24_Chapter.html#Fig1)\
    \ shows how you can define two structures based on the same protocol.\n\n![A437923_1_En_24_Fig1_HTML.jpg](A437923_1_En_24_Fig1_HTML.jpg)\n\
    \nFigure 24-1.\n\nTwo different structures can adopt the same protocol\n\n###\
    \ Using Methods in Protocols\n\nWhen a protocol defines a method , it only defines\
    \ the method name, any parameters, and any data type it returns, but it does not\
    \ include any Swift code that actually implements that method, such as\n\n```\n\
    protocol Cat {\nvar name: String { get set }\nvar age: Int { get }\nfunc meow\
    \ (sound: String)\n}\n```\n\nIf a class, struct, or enum adopts this `Cat` protocol,\
    \ it must not only define a `name` and `age` property, but it must also implement\
    \ the protocol method with Swift code such as\n\n```\nstruct pet : Cat {\nvar\
    \ name : String\nvar age : Int\nfunc meow (sound : String) {\nprint (sound)\n\
    }\n}\n```\n\nEven though a class, structure, or enum might adopt the exact same\
    \ protocol, the actual implementation of a method can be wildly different. In\
