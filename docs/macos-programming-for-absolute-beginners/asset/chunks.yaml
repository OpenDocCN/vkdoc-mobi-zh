    \ 5-9 所示。\n\n   ![A437923_1_En_5_Fig9_HTML.jpg](img/A437923_1_En_5_Fig9_HTML.jpg)\n\
    \n   **图 5-9** 在 Swift 代码中使用特殊字符作为常量名\n\n特殊字符在显示实际数学符号（而非拼写单词）或以外语输入变量及常量名时非常有用。通过使变量和常量名更灵活，Swift\
    \ 让更多人能够理解编程。\n\n## 转换数据类型\n\n如果您有一个整数类型的数字需要转换为小数，或者有一个小数需要转换为整数，该怎么办？答案是只需指定目标数据类型即可转换，例如：\n\
    \n```\nInt(decimal)\n```\n\n前面的`Int`数据类型告诉 Swift 将括号内的数字转换为整数。如果该数字是小数，转换为整数通常意味着舍弃小数点后的所有数字，因此像`4.9`这样的数会变成整数`4`。\n\
    \n当 Swift 将整数转换为小数时，它仅在小数点后补零。例如，将整数`75`转换为浮点数后，Swift 会将其存储为`75.0`。要了解如何将整数转换为小数（以及反之），请遵循以下步骤：\n\
    \n1. 确保您的`IntroductoryPlayground`文件已在 Xcode 中打开。\n2. 将 Playground 文件中的代码修改如下：\n\
    \n   ```\n   import Cocoa\n   var whole : Int = 4\n   var decimal : Double = 4.902\n\
    \   print (Int(decimal))\n   print (Double(whole))\n   ```\n\n注意 Swift 如何将整数转换为小数（将`4`变为`4.0`），以及如何通过舍弃小数点右侧的所有值将小数转换为整数（将`4.902`变为`4`），如图\
    \ 5-10 所示。\n\n![A437923_1_En_5_Fig10_HTML.jpg](img/A437923_1_En_5_Fig10_HTML.jpg)\n\
    \n**图 5-10** 整数与小数的相互转换\n"
- fmt: "# Computed Properties\n\nUp until this point, declaring variables and constants,\
    \ and then assigning data to those variable or constants, is little different\
    \ than in other programming languages. If you have one variable related to another\
    \ one, you could do something like this:\n\n```\nvar cats = 4\nvar dogs: Int\n\
    dogs = cats + 2\nprint (dogs)\n```\n\nUnfortunately, this separates the variable\
    \ declaration for `dogs` from the actual setting of the value of the `dogs` variable.\
    \ To keep a variable declaration linked with the code that defines it, Swift offers\
    \ something called computed properties.\n\nWith a computed property, you don’t\
    \ store data directly into a variable. Instead, you define the data type a variable\
    \ can hold and then use other variables or constants to calculate a new value\
    \ to store in that variable. This calculation is known as a getter, with code\
    \ that looks like this:\n\n```\nvar dogs : Int {\nget {\nreturn cats + 2 // Code\
    \ to calculate a value\n}\n}\n```\n\nThe above code declares a variable called\
    \ `dogs` that can only hold integer (`Int`) data types. Then it encloses code\
    \ in curly brackets known as a getter (defined by the keyword `get`).\n\nYou can\
    \ actually have any amount of Swift code inside the getter’s curly brackets, but\
    \ this example only includes the most important line, which uses the `return`\
    \ keyword to return a value that gets stored in the `dogs` variable.\n\nIn this\
    \ case, it takes the value stored in the `cats` variable, adds 2 to that value,\
    \ and stores that new value in the `dogs` variable. Change the code in the getter\
    \ and you change the computed value that gets stored in the `dogs` variable.\n\
    \nLet’s see how this works by following these steps:\n\n1.  Make sure your `IntroductoryPlayground`\
    \ file is loaded in Xcode.\n2.  Modify the code in the playground file as follows:\n\
    \n```\nimport Cocoa\nvar cats = 4\nvar dogs : Int {\nget {\nreturn cats + 2 //\
    \ Code to calculate a value\n}\n}\nprint (dogs)\n```\n\nNotice that the right\
    \ margin of the playground window shows the value of `dogs`, as shown in Figure\
    \ [5-11](#A437923_1_En_5_Chapter.html#Fig11).\n\n![A437923_1_En_5_Fig11_HTML.jpg](A437923_1_En_5_Fig11_HTML.jpg)\n\
    \nFigure 5-11.\n\nThe right margin of the playground window shows how the getter\
    \ portion works\n\nGetters use code to calculate the value of a variable. A second\
    \ type of computed property is known as a setter, which runs code that calculates\
    \ the value of a different variable.\n\nA setter runs every time its variable\
    \ gets assigned a value. To see how getters and setters work, follow these steps:\n\
    \n1.  Make sure your `IntroductoryPlayground` file is loaded in Xcode.\n2.  Modify\
    \ the code in the playground file as follows:\n\n```\nimport Cocoa\nvar cats =\
    \ 4\nvar dogs : Int {\nget {\nreturn cats + 2 // Code to calculate a value\n}\n\
    set(newValue) {\ncats = 3 * newValue\n}\n}\nprint (dogs)\nprint (cats)\ndogs =\
    \ 5\nprint (dogs)\nprint (cats)\n```\n\nNotice how the value of the `cats` and\
    \ `dogs` variables change when you assign a different value to the `dogs` variable,\
    \ as shown in Figure [5-12](#A437923_1_En_5_Chapter.html#Fig12).\n\n![A437923_1_En_5_Fig12_HTML.jpg](A437923_1_En_5_Fig12_HTML.jpg)\n\
    \nFigure 5-12.\n\nThe right margin of the playground window shows how the getter\
    \ and setter code works\n\nLet’s go through this code line by line. First, the\
    \ number 4 gets stored in the `cats` variable. Using the `cats` variable (4) in\
    \ the getter returns `cats` + 2 or 4 + 2 (6). So the first `print (dogs)` command\
    \ prints 6.\n\nThe second `print (cats)` prints the value of the `cats` variable,\
    \ which is still 4.\n\nWhen the `dogs` variable gets assigned the number 5, it\
    \ runs the setter. The temporary variable `newValue` gets assigned the number\
    \ 5, which calculates a new value for `cats` as 3 * `newValue`, which is 3 * 5\
    \ or 15. The value of the `cats` variable is now set to 15.\n\nNow the next `print\
    \ (dogs)` command runs, using the value of `dogs`, which is calculated by the\
    \ getter. Since the value of `cats` is 15, the getter calculates `cats` + 2 or\
    \ 15 + 2, which is 17. So the next `print (dogs)` command prints 17 and the last\
    \ `print (cats)` command prints 15.\n\n**Note**  \nComputed properties can run\
    \ code when assigning a value to a variable. However, use computed properties\
    \ sparingly since they can make your code harder to understand. Computed properties\
    \ are most often used for class properties in object-oriented programming. For\
    \ example, if an object represents a square drawn on the screen, changing the\
    \ width of the square must also change the height of that square at the same time\
    \ (and vice versa)."
