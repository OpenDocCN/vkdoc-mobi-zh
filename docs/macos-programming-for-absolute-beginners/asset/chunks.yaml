  trans: '

    # 使用文本字段


    由于用户可以在文本字段中输入任何内容，文本字段会以字符串形式存储数据，你可以通过 `stringValue` 属性获取该数据。不过，由于用户也可以输入整数或小数，文本字段足够灵活以识别这些数字。


    如果用户输入整数，你可以通过访问 `intValue` 属性来获取该值。如果用户输入小数，你可以通过访问 `floatValue` 或 `doubleValue`
    属性来获取该值。


    无论用户在文本字段中输入什么，你都能获取到正确的值。由于文本字段可以接受字符串或数字，你的程序可以通过访问以下任一属性来获取正确的值：


    - `intValue`：获取整数值。如果用户输入字符串，该属性存储 0。如果用户输入小数（例如 10.9），它只存储整数值（例如 10）。

    - `floatValue` 或 `doubleValue`：获取浮点值或双精度值。如果用户输入字符串，该属性存储 0.0。如果用户输入整数（例如 4），`floatValue`
    和 `doubleValue` 属性会将其存储为小数（例如 4.0）。

    - `stringValue`：获取字符串值。如果用户输入数字，它会将该数字存储为字符串（例如 "4.305"）。


    **注意：** 当用户在文本字段中输入文本时，该输入文本会存储在所有四个属性中：`intValue`、`floatValue`、`doubleValue`
    和 `stringValue`。


    除了标准文本字段，Xcode 还提供了几种用于处理不同类型文本输入的文本字段变体：


    - **带数字格式器的文本字段**：定义可输入的数字类型

    - **安全文本字段**：屏蔽输入的文本

    - **搜索字段**：存储先前输入的文本列表

    - **令牌字段**：允许用户除了输入普通文本外，还可以输入内容令牌


    ## 使用数字格式器


    数字格式器让你可以定义用户能在文本框中输入的有效数字值，例如最小值或最大值，或特定的输入方式，比如带 `%` 符号，或输入“四”而不是 4。


    Xcode 提供了两种方法来创建带数字格式器的文本字段。首先，你可以从“对象库”中拖放“带数字格式器的文本字段”并将其放置到你的用户界面上。其次，你可以从“对象库”中拖放“数字格式器”并将其放置到用户界面上已有的文本字段上。


    找到这些项目最快的方法是在“对象库”底部的搜索文本字段中键入“数字格式器”，如图 19-1 所示。


    ![A437923_1_En_19_Fig1_HTML.jpg](img/A437923_1_En_19_Fig1_HTML.jpg)


    **图 19-1.** “对象库”中的“带数字格式器的文本字段”和“数字格式器”


    无论你是使用“带数字格式器的文本字段”项创建一个新的文本字段，还是将数字格式器应用于现有文本字段，你都需要定义数字格式器的设置。为此，你需要遵循以下几个步骤：


    1. 点击**显示文稿大纲**图标以显示文稿大纲。

    2. 点击使用数字格式器的文本字段左侧的展开三角形。

    3. 点击文本字段下方的文本字段单元格左侧出现的展开三角形。

    4. 点击数字格式器，如图 19-2 所示。


    ![A437923_1_En_19_Fig2_HTML.jpg](img/A437923_1_En_19_Fig2_HTML.jpg)


    **图 19-2.** “数字格式器”出现在“文稿大纲”中


    5. 选择**显示** ➤ **工具** ➤ **显示检查器**。“显示检查器”窗格会出现在 Xcode 窗口的右上角，如图 19-3 所示。


    ![A437923_1_En_19_Fig3_HTML.jpg](img/A437923_1_En_19_Fig3_HTML.jpg)


    **图 19-3.** “显示检查器”窗格


    **最小值**和**最大值**复选框允许你定义文本字段将接受的最小值和/或最大值。如果你定义最小值为 10，而用户输入的数字小于 10，则文本字段将不会接受该数字。


    **本地化格式**复选框指示 Xcode 使用用户的本地设置来确定小数点和货币符号的显示方式。在世界上的某些地区，小数点使用句点，而在其他地区则使用逗号。


    同样对于货币，欧洲人使用欧元符号，美国人使用美元符号，英国用户使用英镑符号。选中**本地化**复选框可确保你的文本字段数字格式器无论程序在世界上任何地方使用都能正常工作。


    **样式**弹出菜单允许你定义数字格式化的不同方式。当你选择一种样式时，**示例**类别下的**未格式化**和**已格式化**文本字段会显示你的数字可能的外观。


    例如，在图 19-3 中，选择**无**样式意味着，如果用户在带有数字格式器的文本字段中输入 1,234.75 并按回车键，该文本字段会将该数字格式化为简单的
    1235。


    然而，如果样式是**货币**、**百分比**、**科学计数**或**拼写数字**，则意味着用户可以按照**已格式化**示例所定义的方式输入数字，而文本字段将按照**未格式化**示例所示的方式存储该数字。


    要了解如何使用这些不同的数字格式器，请遵循以下步骤：

    '
- fmt: "1.  From within Xcode choose File ➤ New ➤ Project.\n2.  Click Application\
    \ under the macOS category.\n3.  Click Cocoa Application and click the Next button.\
    \ Xcode now asks for a product name.\n4.  Click in the Product Name text field\
    \ and type `NumberProgram`.\n5.  Make sure the Language pop-up menu displays Swift\
    \ and that the “Use Storyboards” check box is selected.\n6.  Click the Next button.\
    \ Xcode asks where you want to store the project.\n7.  Choose a folder to store\
    \ your project and click the Create button.\n8.  Click the `Main.storyboard` file\
    \ in the Project Navigator. Your program’s user interface appears.\n9.  Choose\
    \ View ➤ Utilities ➤ Show Object Library. The Object Library appears in the bottom\
    \ right corner of the Xcode window.\n10. Drag a pop-up button, a push button,\
    \ and a text field with number formatter (it looks like a normal text field) on\
    \ to the user interface window so it looks like Figure [19-4](#A437923_1_En_19_Chapter.html#Fig4).\n\
    \n![A437923_1_En_19_Fig4_HTML.jpg](A437923_1_En_19_Fig4_HTML.jpg)\n\nFigure 19-4.\
    \ The user interface of the NumberProgram\n\n11. Double-click the pop-up button.\
    \ Xcode displays a list of three choices labeled Item 1, Item 2, and Item 3, as\
    \ shown in Figure [19-5](#A437923_1_En_19_Chapter.html#Fig5).\n\n![A437923_1_En_19_Fig5_HTML.jpg](A437923_1_En_19_Fig5_HTML.jpg)\n\
    \nFigure 19-5. Modifying a pop-up button\n\n12. Double-click Item 1, and when\
    \ Xcode highlights it, type `None`.\n13. Double-click Item 2, and when Xcode highlights\
    \ it, type `Decimal`.\n14. Double-click Item 3, and when Xcode highlights it,\
    \ type `Currency`.\n15. Drag three menu items from the Object Library to the bottom\
    \ of the pop-up button list.\n16. Double-click each of these three new menu items\
    \ and modify the name so they displays `Percent`, `Scientific`, and `Spell Out`,\
    \ as shown in Figure [19-6](#A437923_1_En_19_Chapter.html#Fig6).\n\n![A437923_1_En_19_Fig6_HTML.jpg](A437923_1_En_19_Fig6_HTML.jpg)\n\
    \nFigure 19-6. The modified pop-up button menu\n\n17. Choose View ➤ Assistant\
    \ Editor ➤ Show Assistant Editor. The `ViewController.swift` file appears next\
    \ to your user interface.\n18. Move the mouse pointer over the pop-up button,\
    \ hold down the Control key, and drag underneath the IBOutlet line.\n19. Release\
    \ the Control key and the mouse. A pop-up window appears.\n20. Click in the Name\
    \ text field, type `popUpChoice`, and click the Connect button. An IBOutlet appears.\n\
    21. Move the mouse pointer over the text field, hold down the Control key, and\
    \ drag the mouse under the IBOutlet line.\n22. Release the Control key and the\
    \ mouse. A pop-up window appears.\n23. Click in the Name text field, type `textBox`,\
    \ and click the Connect button.\n24. Move the mouse pointer over the label, hold\
    \ down the Control key, and drag the mouse under the IBOutlet line.\n25. Release\
    \ the Control key and the mouse. A pop-up window appears.\n26. Click in the Name\
    \ text field, type `labelResult`, and click the Connect button.\n27. Click the\
    \ Show Document Outline icon to reveal the Document Outline.\n28. Move the mouse\
    \ pointer over Number Formatter, hold down the Control key, and drag the mouse\
    \ under the IBOutlet line.\n29. Release the Control key and the mouse. A pop-up\
    \ window appears.\n30. Click in the Name text field, type `numberFormat`, and\
    \ click the Connect button. You should have four IBOutlet lines as follows:\n\n\
    ```\n@IBOutlet weak var popUpChoice: NSPopUpButton!\n@IBOutlet weak var textBox:\
    \ NSTextField!\n@IBOutlet weak var labelResult: NSTextField!\n@IBOutlet weak var\
    \ numberFormat: NumberFormatter!\n```\n\n31. Click the Hide Document Outline icon\
    \ to hide the document outline.\n32. Move the mouse pointer over the push button,\
    \ hold down the Control key, and drag the mouse above the last curly bracket in\
    \ the bottom of the `ViewController.swift` file.\n33. Release the Control key\
    \ and the mouse button. A pop-up window appears.\n34. Click in the Connect pop-up\
    \ menu and choose Action.\n35. Click in the Name text field and type `showResults`.\n\
    36. Click in the Type pop-up menu, choose NSButton, and click the Connect button.\
    \ Xcode creates an empty IBAction method.\n37. Modify the IBAction method as follows:\n\
    \n```\n@IBAction func showResults(_ sender: NSButton) {\n    if popUpChoice.titleOfSelectedItem!\
    \ == \"None\" {\n        numberFormat.numberStyle = NumberFormatter.Style.none\n\
    \    } else if popUpChoice.titleOfSelectedItem! == \"Decimal\" {\n        numberFormat.numberStyle\
    \ = NumberFormatter.Style.decimal\n    } else if popUpChoice.titleOfSelectedItem!\
    \ == \"Currency\" {\n        numberFormat.numberStyle = NumberFormatter.Style.currency\n\
    \    } else if popUpChoice.titleOfSelectedItem! == \"Percent\" {\n        numberFormat.numberStyle\
    \ = NumberFormatter.Style.percent\n    } else if popUpChoice.titleOfSelectedItem!\
    \ == \"Scientific\" {\n        numberFormat.numberStyle = NumberFormatter.Style.scientific\n\
    \    } else if popUpChoice.titleOfSelectedItem! == \"Spell Out\" {\n        numberFormat.numberStyle\
    \ = NumberFormatter.Style.spellOut\n    }\n    labelResult.stringValue = String(stringInterpolationSegment:\
    \ textBox.doubleValue)\n}\n```\n\n38. Choose Product ➤ Run. Your user interface\
    \ appears.\n39. Click the pop-up button, choose `Decimal`, type `2.3` into the\
    \ text field, and then click the push button. The label displays `2.3` in the\
    \ text field’s number formatter.\n40. Click the pop-up button, choose `Currency`,\
    \ type `$4.56` into the text field, and then click the push button. The label\
    \ displays `4.56`.\n41. Click the pop-up button, choose `Percent`, type `25%`\
    \ into the text field, and then click the push button. The label displays `0.25`.\n\
    42. Click the pop-up button, choose `Scientific`, type `1.2E3` into the text field,\
    \ and then click the push button. The label displays `1200.0`.\n43. Click the\
    \ pop-up button, choose `Spell Out`, type `forty-five` into the text field, and\
    \ then click the push button. The label displays `45.0`.\n44. Choose `NumberProgram`\
    \ ➤ Quit `NumberProgram`.\n\nThe above Swift code in the IBAction method uses\
    \ the `titleOfSelectedItem` property to determine which option the user chose.\
    \ Then it uses multiple `if-else if` statements to change the number style property\
    \ of the number formatter.\n\nThe pop-up button lets you choose different number\
    \ formatting styles so you can see how they work when you type a formatted number\
    \ into the text field. By choosing different formatting styles, you can see how\
    \ the text field lets you type in differently formatted numbers such as `25%`\
    \ (which gets converted into `0.25`) or `1.2E3` (which gets converted into `1200.0`)."
  raw: "1.  From within Xcode choose File ➤ New ➤ Project.  \n2.  Click Application\
    \ under the macOS category.  \n3.  Click Cocoa Application and click the Next\
    \ button. Xcode now asks for a product name.  \n4.  Click in the Product Name\
    \ text field and type NumberProgram.  \n5.  Make sure the Language pop-up menu\
    \ displays Swift and that the “Use Storyboards” check box is selected.  \n6. \
