    ## 总结


    每个程序的用户界面对于让用户控制程序都至关重要。如果用户界面让用户感到沮丧并阻止他们使用该程序，那么你的程序再强大也无济于事。


    由于每个用户界面都需要响应用户可能对窗口大小进行的更改，栈视图允许你将相关元素分组，并将约束应用于整个栈视图。如果不将相关元素分组，你将不得不为每个元素单独应用约束，这可能会变得混乱，并且如果它们没有按预期响应，修复起来也会很困难。


    如果存在约束冲突，你可以修改每个约束的优先级和/或修改约束的工作方式。最初创建约束时，Xcode 会将约束设置为等于一个固定值。为了提供灵活性，你可以将此等号更改为大于或等于号，或小于或等于号。


    为了保持用户界面元素可见，你还可以应用压缩约束。与将元素链接到另一个元素或窗口边缘的普通约束不同，压缩约束定义了用户界面元素的宽度和/或高度。如果用户调整窗口大小，压缩约束可防止用户界面元素消失。


    对于设计以特定顺序显示窗口或视图的用户界面，你可能会发现故事板文件比使用多个 `.xib` 文件更容易使用。无需将整个用户界面存储在一个故事板文件中（这可能会变得杂乱且难以理解），你可以创建故事板引用。


    故事板引用将用户界面划分为多个故事板文件。通过将用户界面分离到多个故事板文件中，你可以更轻松地设计和理解用户界面的结构。

    '
- fmt: '# 27. Debugging Your Programs


    In the professional world of software development, you’ll actually spend more
    time modifying existing programs than you ever will creating new ones. However,
    whether writing new programs or editing existing ones, it doesn’t matter how much
    experience or education you might have because even the best programmers can make
    mistakes. In fact, you can expect that you will make mistakes no matter how careful
    you may be. Once you accept this inevitable fact of programming, you can learn
    how to find and fix your mistakes.


    In the world of computers, mistakes are commonly called “bugs,” a name based on
    an incident with an early computer that used physical switches to work. One day
    the computer failed, and when technicians opened the computer, they found that
    a moth had been crushed within a switch, preventing the switch from closing. From
    that point on, programming errors have been called bugs, and fixing computer problems
    has been known as debugging.


    Three common types of computer bugs are


    *   **Syntax Errors** : Occur when you misspell something such as a keyword, variable
    name, function name, or class name, or you use a symbol incorrectly

    *   **Logic Errors** : Occur when you use commands correctly, but the logic of
    your code doesn’t do what you intended

    *   **Runtime Errors** : Occur when a program encounters unexpected situations
    such as the user entering invalid data or when another program somehow interferes
    with your program unexpectedly


    Syntax errors are the easiest to find and fix because they’re merely misspellings
    of variable names that you created or misspellings of Swift commands that Xcode
    can help you identify. If you type a Swift keyword such as `var` or `let`, Xcode
    displays that keyword in pink (or whatever color you specify for displaying keywords
    in the Xcode editor).


    Now if you type a Swift keyword and it doesn’t appear in its usual identifying
    color, then you know you probably typed it wrong somehow. By coloring your code,
    Xcode’s editor helps you visually identify common misspellings or typos.


    Besides using color, the Xcode editor provides a second way to help you avoid
    mistakes when you need to type the name of a method or class defined in the Cocoa
    framework. As soon as Xcode recognizes that you might be typing something from
    the Cocoa framework, it displays a pop-up menu of possible options. Now instead
    of typing the entire command yourself, you can simply click your choice in the
    pop-up menu and press the Tab key one or more times to let Xcode type your chosen
    command correctly, as shown in Figure [27-1](#A437923_1_En_27_Chapter.html#Fig1).


    ![A437923_1_En_27_Fig1_HTML.jpg](A437923_1_En_27_Fig1_HTML.jpg)


    **Figure 27-1.** Xcode displays a menu of possible commands that you might want
    to use


    Syntax errors often keep your program from running at all. When a syntax error
    keeps your program from running, Xcode can usually identify the line (or the nearby
    area) of your program where the misspelled commands appears so you can fix it,
    as shown in Figure [27-2](#A437923_1_En_27_Chapter.html#Fig2).


    ![A437923_1_En_27_Fig2_HTML.jpg](A437923_1_En_27_Fig2_HTML.jpg)


    **Figure 27-2.** Syntax errors often keep a program from running, which allows
    Xcode to identify the syntax error


    > **Note:** Swift treats uppercase and lowercase letters as completely different
    characters. One common mistake is to type a lowercase letter instead of an uppercase
    letter (or vice versa).


    Logic errors are much harder to find and detect than syntax errors. Xcode can
    identify syntax errors because it recognizes the difference between a properly
    spelled Swift keyword (such as `var`) and a misspelled Swift keyword (such as
    `varr`).


    However, logic errors occur when you use Swift code correctly, but it doesn’t
    do what you intended it to do. Since your code is actually valid, Xcode has no
    way of knowing that it’s not working the way you intended. As a result, logic
    errors can be difficult to debug because you think you wrote your code correctly
    but you (obviously) did not.


    How do you find a mistake in code that you thought you wrote correctly? Finding
    your mistake can often involve starting from the beginning of your program and
    exhaustively searching each line all the way until the end. (Of course, there
    are faster ways than searching your entire program line by line, which you’ll
    learn about later in this chapter.)


    Finally, the hardest errors to find and debug are runtime errors. Syntax errors
    usually keep your program from running so if your program actually runs, you can
    assume that you have eliminated most, if not all, syntax errors in your code.


    Logic errors can be tougher to find, but they’re predictable. For example, if
    your program asks the user for a password but fails to give the user access even
    though the user types a correct password, you know you have a logic error. Each
    time you run your program, you can reliably predict when the logic error will
    occur.


    Runtime errors are more insidious because they don’t always occur predictably.
    For example, your program may run perfectly well on your computer, but the moment
    you run the same program on an identical computer, the program may fail. That’s
    because conditions between two different computers will never be exactly the same.


    As a result, the same program can run fine on one computer but fail on the exact
    same type of computer somewhere else. The problem is that unexpected, outside
    circumstances can affect your program’s behavior. For example, your program may
    run just fine until the user presses a number key on the numeric keypad instead
    of the number key at the top of the alphanumeric keys.


    Even though the user may be typing the exact same number (such as 5), the program
    may treat the 5 key above the R and T keys as a completely different key than
    the 5 key on the numeric keypad. As subtle as that may be, it could be enough
    to cause a program to fail or crash.


    Because runtime errors can’t always be duplicated, they can be frustrating to
    find and even harder to fix since you can’t always examine every possible condition
    your program might face when running on other computers. Some programs have been
    known to work perfectly, except if the user accidentally presses two keys at the
    same time. Other programs work just fine until the user happens to save a file
    at the exact moment that another program tries to receive e-mail over the Internet.


    Usually you can eliminate most syntax errors, and find and fix most logic errors.
    However, it may not be possible to find and completely eliminate all runtime errors
    in a program. The best way to avoid spending time hunting for bugs is to strive
    to write good code and test it carefully to make sure it’s as error-free as possible.'
