  trans: "\n### 以可视化方式修改弹出按钮菜单项\n\n弹出按钮默认包含三个菜单项的列表。不过，你随时可以对此列表中的项目进行添加、编辑或删除。要编辑弹出菜单列表，请遵循以下步骤：\n\
    \n1.  双击用户界面上的弹出按钮。当前菜单项列表即会显示，如图 17-11 所示。\n\n    ![A437923_1_En_17_Fig11_HTML.jpg](img/A437923_1_En_17_Fig11_HTML.jpg)\n\
    \n    图 17-11. 双击弹出按钮会显示其菜单项列表\n\n2.  双击你想要编辑的菜单项。Xcode 会高亮所选菜单项的文本，如图 17-12 所示。\n\
    \n    ![A437923_1_En_17_Fig12_HTML.jpg](img/A437923_1_En_17_Fig12_HTML.jpg)\n\n\
    \    图 17-12. 双击菜单项可编辑其文本。注意：你也可以选择“视图”>“工具”>“显示属性检查器”，然后通过编辑所选菜单项的 `Title` 属性来修改菜单项文本。\n\
    \n3.  使用方向键、`Backspace` 或 `Delete` 键来编辑文本，并输入任何新文本。\n4.  按下 `Return` 键。Xcode 便会保存你对该菜单项编辑后的文本。\n\
    \n要从弹出按钮中删除菜单项，请遵循以下步骤：\n\n1.  双击用户界面上的弹出按钮。当前菜单项列表即会显示（见图 17-11）。\n2.  单击你想要删除的菜单项。Xcode\
    \ 会高亮你所选的菜单项。\n3.  按下 `Backspace` 或 `Delete` 键。你所选的菜单项便会消失。\n\n注意：如果你误删了某菜单项，只需按下\
    \ `Command + Z` 或选择“编辑”>“撤销”来撤销删除操作。\n\n要向弹出按钮添加一个菜单项，请遵循以下步骤：\n\n1.  双击用户界面上的弹出按钮。当前菜单项列表即会显示（见图\
    \ 17-11）。\n2.  选择“视图”>“工具”>“显示对象库”。对象库随即显示在 Xcode 窗口的右下角。\n3.  在对象库底部的搜索字段中输入\
    \ `menu item` 并按下 `Return` 键。对象库会显示一个菜单项列表，如图 17-13 所示。\n\n    ![A437923_1_En_17_Fig13_HTML.jpg](img/A437923_1_En_17_Fig13_HTML.jpg)\n\
    \n    图 17-13. 对象库中的菜单项列表\n\n4.  将菜单项从对象库拖到用户界面弹出按钮中存储的菜单项列表上。一条水平的蓝色线条会指示新菜单项在弹出按钮列表中出现的位置。\n\
    5.  松开鼠标按钮。Xcode 便会向弹出按钮列表添加一个菜单项。\n\n### 使用 Swift 代码添加弹出菜单项\n\n除了以可视化方式修改弹出按钮中的菜单项外，你也可以使用\
    \ Swift 代码来添加、删除或更改菜单项。弹出按钮的菜单项基于 `NSMenuItem` 类，但你可以在 `NSMenu` 类中找到操作弹出按钮菜单项列表所需的方法。\n\
    \n如果你想为弹出按钮仅添加一个新的菜单项，可以使用 `addItemWithTitle` 方法并指定一个字符串，例如：\n\n```\nmyPopUp.addItem(withTitle:\
    \ \"New Item\")\n```\n\n你也可以通过将新菜单项存储在一个数组中，并使用 `addItemsWithTitles` 方法来添加多个菜单项，例如：\n\
    \n```\nmyPopUp.addItems(withTitles: [\"Cat\", \"Dog\", \"Bird\", \"Fish\", \"\
    Reptile\"])\n```\n\n你可以使用 `removeItem` 方法移除单个菜单项，该方法需要一个 `Int` 值来指定要移除的项目。弹出按钮列表中的第一个项目索引为\
    \ 0，第二个为 1，以此类推。要从弹出按钮列表中移除第一个项目，你使用索引值 0，如下所示：\n\n```\nmyPopUp.removeItem(at:\
    \ 0)\n```\n\n要移除弹出按钮菜单列表中的所有项目，只需使用 `removeAllItems()` 方法，它会清空整个列表，无论该列表中当前存储了多少项目。\n\
    \n要了解如何使用 Swift 代码在弹出按钮菜单列表中添加和删除项目，请遵循以下步骤：\n\n1.  在 Xcode 中，选择“文件”>“新建”>“项目”。\n\
    2.  在 macOS 类别下单击“应用程序”。\n3.  单击“Cocoa 应用程序”，然后单击“下一步”按钮。Xcode 会要求输入产品名称。\n4.\
    \  在“产品名称”文本字段中单击并输入 `EditPopProgram`。\n5.  确保“语言”弹出菜单显示为 Swift，并且“使用故事板”复选框已被选中。\n\
    6.  单击“下一步”按钮。Xcode 会询问你想要存储项目的位置。\n7.  选择一个文件夹来存储你的项目，然后单击“创建”按钮。\n8.  在项目导航器中单击\
    \ `Main.storyboard` 文件。你的程序的用户界面随即显示。\n9.  选择“视图”>“工具”>“显示对象库”。对象库随即显示在 Xcode\
    \ 窗口的右下角。\n10. 将一个弹出按钮、三个“推送按钮”和一个文本字段拖到用户界面窗口上，并编辑两个“推送按钮”的标题，使其看起来如图 17-14 所示。\n\
    \n![A437923_1_En_17_Fig14_HTML.jpg](img/A437923_1_En_17_Fig14_HTML.jpg)\n\n图 17-14.\
    \ EditPopProgram 的用户界面\n\n11. 选择“视图”>“助手编辑器”>“显示助手编辑器”。Xcode 会在你的用户界面旁边显示 `ViewController.swift`\
    \ 文件。\n12. 将鼠标指针移到弹出按钮上，按住 Control 键，然后将鼠标拖到 `ViewController.swift` 文件顶部附近的 `IBOutlet`\
    \ 行下方。\n13. 松开 Control 键和鼠标。一个弹出窗口会出现。\n14. 在“名称”文本字段中单击并输入 `myPopUp`。然后单击“连接”按钮。Xcode\
    \ 会创建一个 `IBOutlet`。\n15. 将鼠标指针移到文本字段上，按住 Control 键，然后将鼠标拖到 `ViewController.swift`\
    \ 文件顶部附近的 `IBOutlet` 行下方。\n16. 松开 Control 键和鼠标。一个弹出窗口会出现。\n17. 在“名称”文本字段中单击并输入\
    \ `newItem`。然后单击“连接”按钮。Xcode 会创建另一个 `IBOutlet`，因此你应该有两个 `IBOutlet`，看起来像这样：\n\n\
    ```\n@IBOutlet weak var myPopUp: NSPopUpButton!\n@IBOutlet weak var newItem: NSTextField!\n\
    ```\n"
- fmt: "18.  Move the mouse pointer over the `Add New Item` button, hold down the\
    \ `Control` key, and drag the mouse above the last curly bracket at the bottom\
    \ of the `ViewController.swift` file.  \n19.  Release the `Control` key and the\
    \ mouse. A pop-up window appears.  \n20.  Click in the `Connection` pop-up menu\
    \ and choose `Action`.  \n21.  Click in the `Name` text field and type `addNewItem`.\
    \  \n22.  Click in the `Type` pop-up menu and choose `NSButton`. Then click the\
    \ `Connect` button. Xcode creates an empty `IBAction` method.  \n23.  Move the\
    \ mouse pointer over the `Delete First Item` button, hold down the `Control` key,\
    \ and drag the mouse above the last curly bracket at the bottom of the `ViewController.swift`\
    \ file.  \n24.  Release the `Control` key and the mouse. A pop-up window appears.\
    \  \n25.  Click in the `Connection` pop-up menu and choose `Action`.  \n26.  Click\
    \ in the `Name` text field and type `deleteFirstItem`.  \n27.  Click in the `Type`\
    \ pop-up menu and choose `NSButton`. Then click the `Connect` button. Xcode creates\
    \ an empty `IBAction` method.  \n28.  Move the mouse pointer over the `Add New\
    \ List` button, hold down the `Control` key, and drag the mouse above the last\
    \ curly bracket at the bottom of the `ViewController.swift` file.  \n29.  Release\
    \ the `Control` key and the mouse. A pop-up window appears.  \n30.  Click in the\
    \ `Connection` pop-up menu and choose `Action`.  \n31.  Click in the `Name` text\
    \ field and type `addList`.  \n32.  Click in the `Type` pop-up menu and choose\
    \ `NSButton`. Then click the `Connect` button. Xcode creates another empty `IBAction`\
    \ method.  \n33.  Modify all three `IBAction` methods as follows:\n\n```\n@IBAction\
    \ func addNewItem(_ sender: NSButton) {\nmyPopUp.addItem(withTitle: newItem.stringValue)\n\
    }\n@IBAction func addList(_ sender: NSButton) {\nmyPopUp.removeAllItems()\nmyPopUp.addItems(withTitles:\
    \ [\"Cat\", \"Dog\", \"Bird\", \"Fish\", \"Reptile\"])\n}\n@IBAction func deleteFirstItem(_\
    \ sender: NSButton) {\nmyPopUp.removeItem(at: 0)\n}\n```\n\nThe `addNewItem` `IBAction`\
    \ method takes text from the text field and uses the `addItem` method to add that\
    \ text as a new menu item in the pop-up button’s list. The `deleteFirstItem` `IBAction`\
    \ method uses the `removeItem` method to delete the first menu item in the pop-up\
    \ button's list. The `addList` `IBAction` method uses the `removeAllItems` method\
    \ to clear out the current list in the pop-up button, and then replaces it with\
    \ a new array of strings.  \n34.  Choose Product ➤ Run. Your user interface appears.\
    \  \n35.  Click the pop-up button. Notice that the menu item list displays three\
    \ items labeled `Item 1`, `Item 2`, and `Item 3`.  \n36.  Click away from the\
    \ pop-up button so the menu item list no longer appears.  \n37.  Click the `Delete\
    \ First Item` button.  \n38.  Click the pop-up button. Notice that the menu item\
    \ list now displays only two items labeled `Item 2` and `Item 3`.  \n39.  Click\
    \ in the text field and type `My Item`.  \n40.  Click the `Add New Item` button.\
    \  \n41.  Click the pop-up button. Notice that now the menu item list displays\
    \ three items labeled `Item 2`, `Item 3`, and `My Item`.  \n42.  Click the `Add\
    \ New List` button.  \n43.  Click the pop-up button. Notice that now the menu\
    \ item list displays the array of strings defined inside the `addList` `IBAction`\
    \ method.  \n44.  Choose `EditPopProgram` ➤ Quit `EditPopProgram`.\n\n## Summary\n\
    \nButtons represent commands that users can click in order to choose an option.\
    \ Xcode offers several different types of buttons you can place on a user interface\
    \ but they're all based on the same `NSButton` class defined in the Cocoa frameworks.\n\
    \nNot all buttons display text, but those buttons that do display text use a `Title`\
    \ property to hold text. If you want to display an image on a button, you can\
    \ define an image using the `Image` property. If you change the `Type` property\
    \ of a button to switch or toggle, then you can make a button display text stored\
    \ in the `Title` property along with text displayed in the `Alternate Text` property\
    \ and/or the `Alternate Image` property as well.\n\nIf you need to offer multiple\
    \ options to the user, placing more than a handful of buttons on the user interface\
    \ can get messy and cluttered. A simpler alternative is to use a pop-up button\
    \ instead that displays a list of options that you can modify visually or through\
    \ Swift code.\n\nButtons often connect to a single `IBAction` method, but you\
    \ can link multiple to a single `IBAction` method. When connecting multiple user\
    \ interface items to an `IBAction` method, you need to use Swift code to identify\
    \ the user interface item that called the `IBAction` method by uniquely identifying\
    \ each button’s `Tag` property. Buttons represent the most straightforward way\
    \ to offer users an option to select.\n\n## 18. Making Choices with Radio Buttons,\
    \ Check Boxes, Date Pickers, and Sliders\n\nRather than let the user choose a\
    \ specific command through a button, user interfaces often give choices to pick\
    \ from. Such choices let the user pick one or more options, such as customizing\
    \ the way a program works. When a user interface needs to offer multiple choices,\
    \ the two most common ways to offer options are through radio buttons and check\
    \ boxes.\n\nRadio buttons get their name from car radios that let you press a\
    \ button to switch to a different radio station. Since you can only listen to\
    \ one radio station at a time, radio buttons give you multiple options but limit\
    \ you to choosing only one button. The moment you select a different button, your\
    \ previous choice is no longer selected. With radio buttons, you can either select\
    \ zero buttons or select exactly one button at a time.\n\nCheck boxes work slightly\
    \ differently. Like radio buttons, check boxes offer multiple choices. The main\
    \ difference is that with a group of check boxes, you can select zero or more\
    \ check boxes at the same time, so you can choose multiple options at once.\n\n\
    When you need to limit the user to zero or one choices, use radio buttons. When\
    \ you need to let the user choose zero or more choices, use check boxes. Figure\
    \ 18-1 shows the Xcode Preferences dialog that uses both radio buttons and a check\
    \ box to let the user customize how Xcode behaves.\n\n![A437923_1_En_18_Fig1_HTML.jpg](A437923_1_En_18_Fig1_HTML.jpg)\n\
    \nFigure 18-1.\n\nThe Xcode Preferences dialog uses both radio buttons and check\
    \ boxes to let the user select options.\n\nWhile radio buttons and check boxes\
    \ are commonly used to display choices displayed as text, a date picker displays\
    \ different types of dates for the user to choose from. Then the date picker stores\
    \ the user's choice in a special date format (rather than separate text representing\
    \ months or numbers representing days or years).\n\nBy storing dates in a special\
    \ format, your program can properly display dates according to the user's settings\
    \ on their computer. For example, in some parts of the world, they display dates\
    \ like this: `mm/dd/yyyy`. Yet in other parts of the world they display dates\
    \ like this: `dd/mm/yyyy`.\n\nRather than worry about a particular date format\
    \ setting on each user's computer, a date picker uses a special date format so\
    \ this way the computer can properly display the correct format based on the user's\
    \ current settings.\n\nDate pickers, like radio buttons and check boxes, give\
    \ users a fixed but limited range of valid options to select. This insures that\
    \ whatever choice the user makes, the choice will be acceptable to your program.\n\
    \nCheck boxes and radio buttons are good for offering users a limited range of\
    \ choices that are usually text options. For offering users a range of numeric\
    \ values to select, you can use a slider. Sliders let the user visually select\
    \ a range of valid options."
