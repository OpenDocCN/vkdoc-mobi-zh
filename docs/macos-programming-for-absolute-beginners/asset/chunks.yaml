  trans: "\n# for-in 循环\n\n`while` 或 `repeat-while` 循环会重复多少次？这完全取决于其布尔值。如果你希望循环运行固定的次数，你可以使用\
    \ `while` 或 `repeat-while` 循环进行简单的计数，例如：\n\n```\nvar counter = 1\nwhile counter\
    \ <= 5 {\n    print (\"while 循环 \\(counter)\")\n    counter = counter + 1\n}\n\
    counter = 1\nrepeat {\n    print (\"repeat 循环 \\(counter)\")\n    counter = counter\
    \ + 1\n} while counter <= 5\n```\n\n这两个循环都恰好运行五次，如图 8-3 所示。\n\n![A437923_1_En_8_Fig3_HTML.jpg](img/A437923_1_En_8_Fig3_HTML.jpg)\n\
    \n图 8-3. `while` 和 `repeat-while` 循环可以运行固定的次数\n\n请注意，`print` 命令只能打印字符串。任何时候你想在\
    \ `print` 命令中使用非字符串的值，可以将其放在括号内，并在前面加上一个 `\\` 符号，例如 `\\(counter)`。\n\n使用 `while`\
    \ 或 `repeat-while` 循环进行计数可能比较笨拙，因为你必须确保创建一个计数变量，并在 `while` 或 `repeat-while` 循环内持续更新该计数变量，以避免无限循环。\n\
    \n当你希望循环运行固定次数时，使用 `for-in` 循环要好得多。其主要优势在于，`for-in` 循环自动知道如何计数，因此你不必指定何时停止。\n\n\
    要使用 `for-in` 循环，你需要指定以下内容：\n\n- 起始值\n- 结束值\n- 起始值和结束值之间的范围，例如 `...` 或 `..<`\n\n\
    `for-in` 循环的结构如下所示：\n\n```\nfor 计数变量 in 起始值...结束值 {\n}\n```\n\n这告诉 Swift 从 `起始值`\
    \ 开始按 1 递增计数，并在达到 `结束值` 时停止，例如：\n\n```\nfor i in 1...5 {\n    print (\"循环 \\(i)\"\
    )\n}\n```\n\n上面的 `for-in` 循环从 1, 2, 3, 4 计数，并在 5 之后停止。下面类似的 `for-in` 循环使用了不同的范围，告诉\
    \ Swift 在 `结束值` 之前停止计数：\n\n```\nfor i in 1..<5 {\n    print (\"第二个循环 \\(i)\")\n\
    }\n```\n\n与前一个 `for-in` 循环不同，此 `for-in` 循环从 1, 2, 3 计数，并在 4 之后停止，如图 8-4 所示。\n\n\
    ![A437923_1_En_8_Fig4_HTML.jpg](img/A437923_1_En_8_Fig4_HTML.jpg)\n\n图 8-4. 比较\
    \ `for-in` 循环中的不同范围\n\n请注意，`for-in` 循环远比比 `while` 或 `repeat-while` 循环简单，后者需要初始化一个计数变量，然后在循环内更新该计数变量以防止无限循环。\n\
    \n默认情况下，`for-in` 循环总是按 1 递增计数。如果你希望按 1 以外的值计数，可以按如下方式指定增量值：\n\n```\nfor i in 起始值...结束值\
    \ where i%增量值 == 0 {\n}\n```\n\n此 `for-in` 循环使用余数运算符（`%`）来确定要计数的值。因此，如果你想按 3 增量计数，可以使用以下\
    \ `for-in` 循环：\n\n```\nfor i in 1...20 where i%3 == 0 {\n}\n```\n\n此 `for-in`\
    \ 循环从 1 开始计数，但在运行花括号内的任何代码之前，它会将计数变量（`i`）除以 3，以确定它是否能被 3 整除（如 Swift 代码 `== 0`\
    \ 所示，等于 0）。如果计数变量（`i`）能被 3 整除，则运行循环内的代码。\n\n要查看 `for-in` 循环是否按增量计数运行，请按照以下步骤创建一个新的\
    \ playground：\n\n1. 在 Xcode 中打开 Introductory Playground 文件。\n2. 按如下方式编辑代码：\n\n\
    ```\nfor i in 1...20 where i%3 == 0 {\n    print (\"循环 \\(i)\")\n}\n```\n\n此 `for-in`\
    \ 循环从 1 开始，但 `1%3` 不等于 0，因此跳到 2。然而，`2%3` 也不等于 0，因此跳到 3。由于 `3%3` 等于 0，它运行花括号内的代码并打印“循环\
    \ 3”。此后继续，直到计数变量（`i`）达到 20，如图 8-5 所示。\n\n![A437923_1_En_8_Fig5_HTML.jpg](img/A437923_1_En_8_Fig5_HTML.jpg)\n\
    \n图 8-5. `for-in` 循环可以按增量计数\n\n如果你将 `i%3` 替换为 `i%4`，`for-in` 循环将按 4 增量计数。只需更改这个值，你就可以定义\
    \ `for-in` 循环如何以 1 以外的增量进行计数。\n\n## 使用 for-in 循环遍历数组\n\n使用 `for-in` 语句最直接的方式是指定起始值和结束值，从\
    \ 1 数到 10 或从 0 数到 34。然而，`for-in` 循环在遍历存储在数组（一种数据结构）中的数据列表时也特别方便。`for-in` 循环自动知道从哪里开始和结束，因此你永远不必担心自己数出有多少项。\n\
    \n用于遍历数据列表的 `for-in` 循环结构如下所示：\n\n```\nfor 计数变量 in 项目列表 {\n}\n```\n\n`计数变量` 对某种列表中的每一项进行计数，而\
    \ `项目列表` 代表某种列表，例如数组（由数据列表组成）。要了解 `for-in` 循环如何工作，请执行以下步骤：\n\n1. 确保在 Xcode 中加载了\
    \ `IntroductoryPlayground` 文件。\n2. 按如下方式编辑代码：\n\n```\nimport Cocoa\nlet names\
    \ = [\"Oscar\", \"Sally\", \"Marty\", \"Louis\"]\nfor person in names {\n    print\
    \ (person)\n}\n```\n\n图 8-6 显示了 `for-in` 循环如何运行四次，因为 `names` 数组包含四个项目。如果你向此数组添加或删除一个名称，`for-in`\
    \ 循环会自动计数数组中项目的新数量。\n\n![A437923_1_En_8_Fig6_HTML.jpg](img/A437923_1_En_8_Fig6_HTML.jpg)\n\
    \n图 8-6. 使用 `for-in` 循环遍历数组\n\n## 提前退出循环\n\n通常，循环会一直运行直到布尔值改变。然而，你可以通过使用 `break`\
    \ 命令提前退出循环。通常此循环会运行四次：\n\n```\nlet names = [\"Oscar\", \"Sally\", \"Marty\", \"\
    Louis\"]\nfor person in names {\n    print (person)\n}\n```\n\n如果你插入一个 `break`\
    \ 命令，可以使此循环仅运行一次后退出，如下所示：\n\n```\nlet names = [\"Oscar\", \"Sally\", \"Marty\"\
    , \"Louis\"]\nfor person in names {\n    print (person)\n    break\n}\n```\n\n\
    此 `for-in` 循环将运行一次，打印名称“Oscar”，遇到 `break` 命令，然后退出 `for-in` 循环。当然，在 `for-in` 循环中一直放置\
    \ `break` 命令来提前停止它相当没有意义，因此更常见的是将 `break` 命令与分支语句一起使用。这样，如果某个布尔值为真，循环就会提前退出。否则，循环将继续运行。\n\
    \n要了解如何提前退出循环，请执行以下步骤：\n\n1. 确保在 Xcode 中加载了 `IntroductoryPlayground` 文件。\n2. 按如下方式编辑代码：\n\
    \n```\nimport Cocoa\nlet employees = [\"Fred\", \"Jane\", \"Sam\", \"Kelly\"]\n\
    for person in employees {\n    if person == \"Sam\" {\n        print (\"Break\
    \ 命令\")\n        break\n    }\n    print (person)\n}\n```\n\n此 `for-in` 循环通常运行四次，因为\
    \ `employees` 数组包含四个名称。然而，一旦 `for-in` 循环找到名称“Sam”，它就会打印该名称，遇到 `break` 命令，然后提前退出\
    \ `for-in` 循环，因此它只运行了三次，如图 8-7 所示。\n\n![A437923_1_En_8_Fig7_HTML.jpg](img/A437923_1_En_8_Fig7_HTML.jpg)\n\
    \n图 8-7. 使用 `break` 命令提前退出循环\n"
- fmt: '# Using Loops in a macOS Program


    In the following sample program, the computer picks a random number between 1
    and 10. The user must guess that number. To keep the user from guessing a number
    outside the range of 1 and 10, the user interface will let the user choose a value
    from a slider.


    Each time the user guesses incorrectly, a label will display a message that the
    guess is too high or too low. When the user correctly guesses the number, a loop
    will print a list of each guess and display it in an alert dialog.


    Create a new macOS project by following these steps:


    1. From within Xcode choose File ➤ New ➤ Project.

    2. Click Application under the macOS category.

    3. Click Cocoa Application and click the Next button. Xcode now asks for a product
    name.

    4. Click in the Product Name text field and type `LoopingProgram`.

    5. Make sure the Language pop-up menu displays Swift and that no check boxes are
    selected.

    6. Click the Next button. Xcode asks where you want to store the project.

    7. Choose a folder to store your project and click the Create button.

    8. Click the `MainMenu.xib` file in the Project Navigator.

    9. Click the Window icon to make the window of the user interface appear, as shown
    in Figure 8-8.


    ![A437923_1_En_8_Fig8_HTML.jpg](A437923_1_En_8_Fig8_HTML.jpg)


    Figure 8-8. Making the window of the user interface visible


    10. Choose View ➤ Utilities ➤ Show Object Library to make the Object Library appear
    in the bottom right corner of the Xcode window.

    11. Drag a horizontal slider, two labels, and a push button on the user interface
    and resize them so the user interface looks similar to Figure 8-9.


    ![A437923_1_En_8_Fig9_HTML.jpg](A437923_1_En_8_Fig9_HTML.jpg)


    Figure 8-9. Creating a basic user interface with two labels, a horizontal slider,
    and a push button


    12. Double-click the top label to select it. Then choose View ➤ Utilities ➤ Show
    Attributes Inspector. The Attributes Inspector pane appears in the upper right
    corner of the Xcode window.

    13. Click in the Title text field and type `Guess a number`.

    14. Click the Center alignment icon, as shown in Figure 8-10.


    ![A437923_1_En_8_Fig10_HTML.jpg](A437923_1_En_8_Fig10_HTML.jpg)


    Figure 8-10. The Attributes Inspector pane for a label


    15. Double-click the bottom label and type `Your guesses =` and then press Return.

    16. Double-click the push button, type `Guess`, and then press Return. Your user
    interface should look like Figure 8-11.


    ![A437923_1_En_8_Fig11_HTML.jpg](A437923_1_En_8_Fig11_HTML.jpg)


    Figure 8-11. The completed user interface


    17. Click the horizontal slider to select it and choose View ➤ Utilities ➤ Show
    Attributes Inspector. The Attributes Inspector pane appears in the upper right
    corner of the Xcode window.

    18. Select the “Only stop on tick marks” check box.

    19. Click in the text field directly above the “Only stop on tick marks” check
    box and type `10`.

    20. Click in the Minimum text field and type `1`.

    21. Click in the Maximum text field and type `10`.

    22. Click in the Current text field and type `5`, as shown in Figure 8-12.


    ![A437923_1_En_8_Fig12_HTML.jpg](A437923_1_En_8_Fig12_HTML.jpg)


    Figure 8-12. Changing the horizontal slider attributes


    With this user interface, the user will use the horizontal slider to choose a
    number between 1 and 10. If the user guesses a number too high, the label will
    display “Too High”. If the user guesses a number too low, the label will display
    “Too Low”.


    Each time the user guesses wrong, the bottom label will display the incorrect
    guess. When the user guesses the correct number, the top label will display “You
    got it!”


    In this example, you need two `IBOutlet` variables to connect to each label so
    you can display information on each label. Then you need one `IBAction` method
    to connect to the Guess button. This way, when the user clicks the Guess button,
    the `IBAction` method can check if the user picked the correct number using the
    horizontal slider.


    You need to write Swift code that chooses a random number between 1 and 10. Then
    you use a loop to list all the guesses the user made and display those results
    in an alert dialog.


    Don’t worry if you don’t completely understand all the Swift code in the example.
    Just make sure you understand what the code is doing but don’t worry about the
    specific details of how the code actually works. At this point, it’s just important
    to see a more complex program actually work.


    To connect Swift code to your user interface, follow these steps:


    1. With your user interface still visible in the Xcode window, choose View ➤ Assistant
    Editor ➤ Show Assistant Editor. The `AppDelegate.swift` file appears next to the
    user interface.

    2. Move the mouse over the top label, hold down the Control key, and drag from
    the top text field to underneath the existing `@IBOutlet` line in the `AppDelegate.swift`
    file, as shown in Figure 8-13.


    ![A437923_1_En_8_Fig13_HTML.jpg](A437923_1_En_8_Fig13_HTML.jpg)


    Figure 8-13. Control-dragging from the top label to the AppDelegate.swift file


    3. Release the mouse and the Control key. A pop-up window appears, as shown in
    Figure 8-14.


    ![A437923_1_En_8_Fig14_HTML.jpg](A437923_1_En_8_Fig14_HTML.jpg)


    Figure 8-14. The pop-up window for defining an IBOutlet


    4. Click in the Name text field and type `messageLabel` and click the Connect
    button. Xcode creates an `IBOutlet`.

    5. Move the mouse over the bottom label, hold down the Control key, and drag the
    mouse underneath the `@IBOutlet` line in the `AppDelegate.swift` file.

    6. Release the mouse and the Control key. A pop-up window appears.

    7. Click in the Name text field and type `guessLabel` and click the Connect button.
    Xcode creates another `IBOutlet`.

    8. Move the mouse over the horizontal slider, hold down the Control key, and drag
    the mouse underneath the `@IBOutlet` line in the `AppDelegate.swift` file.

    9. Release the mouse and the Control key. A pop-up window appears.

    10. Click in the Name text field and type `guessSlider` and click the Connect
    button. Xcode creates another `IBOutlet`.

    11. You should now have three `IBOutlet`s that represent the two text fields in
    your user interface:


    ```swift

    @IBOutlet weak var messageLabel: NSTextField!

    @IBOutlet weak var guessLabel: NSTextField!

    @IBOutlet weak var guessSlider: NSSlider!

    ```


    12. Move the mouse over the Guess push button, hold down the Control key, and
    drag the mouse above the last curly bracket in the `AppDelegate.swift` file.

    13. Release the mouse and the Control key. A pop-up window appears.

    14. Click in the Connection pop-up menu and choose Action to create an `IBAction`
    method.

    15. Click in the Name text field and type `checkGuess`.

    16. Click in the Type pop-up menu and choose NSButton, as shown in Figure 8-15.


    ![A437923_1_En_8_Fig15_HTML.jpg](A437923_1_En_8_Fig15_HTML.jpg)


    Figure 8-15. Defining an IBAction method


    17. Click the Connect button. Xcode creates a blank `IBAction` method.

    18. Modify the `IBAction checkGuess` method as follows:'
