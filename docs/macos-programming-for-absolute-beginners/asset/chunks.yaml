    \ under the macOS category.  \n3.  Click Cocoa Application and click the Next\
    \ button. Xcode now asks for a product name.  \n4.  Click in the Product Name\
    \ text field and type ConstraintProgram.  \n5.  Make sure the Language pop-up\
    \ menu displays Swift and that the “Use Storyboards” check box is selected.  \n\
    6.  Click the Next button. Xcode asks where you want to store the project.  \n\
    7.  Choose a folder to store your project and click the Create button.  \n8. \
    \ Click the Main.storyboard file in the Project Navigator. Your program’s user\
    \ interface appears.  \n9.  Choose View ➤ Utilities ➤ Show Object Library.  \n\
    10.  Place a push button anywhere on the scene. (Make sure you place it on the\
    \ view controller and not on the window controller.)  \n11.  Choose Product ➤\
    \ Run. The user interface appears.  \n12.  Move the mouse pointer over the bottom\
    \ right corner of the program window and drag the mouse to the right and down.\
    \ Notice that although the window changes size, the push button remains in place.\
    \  \n13.  Choose ConstraintProgram ➤ Quit ConstraintProgram. Xcode appears again.\
    \ The push button remained in place when you resized the window because the button\
    \ had no constraints. By placing a constraint on the button to the right window\
    \ edge, you can make the button move as the right window edge moves as well.  \n\
    14.  Click the `Main.storyboard` file in the Project Navigator and then click\
    \ the push button to select it.  \n15.  Move the mouse pointer over the push button,\
    \ hold down the Control key, and drag the mouse to the right towards the right\
    \ edge of the window. Xcode displays a blue line, as shown in Figure [20-3](#A437923_1_En_20_Chapter.html#Fig3).\n\
    \n![A437923_1_En_20_Fig3_HTML.jpg](A437923_1_En_20_Fig3_HTML.jpg)\n\nFigure 20-3.\n\
    \nControl-dragging the mouse creates a constraint  \n16.  Release the Control\
    \ key and left mouse button in-between the push button and the right edge of the\
    \ window. A pop-up menu appears, as shown in Figure [20-4](#A437923_1_En_20_Chapter.html#Fig4).\n\
    \n![A437923_1_En_20_Fig4_HTML.jpg](A437923_1_En_20_Fig4_HTML.jpg)\n\nFigure 20-4.\n\
    \nA pop-up menu for choosing constraints  \n17.  Choose the “Trailing Space to\
    \ Container” option. Xcode draws a constraint from the push button to the right\
    \ edge of the window, as shown in Figure [20-5](#A437923_1_En_20_Chapter.html#Fig5).\n\
    \n![A437923_1_En_20_Fig5_HTML.jpg](A437923_1_En_20_Fig5_HTML.jpg)\n\nFigure 20-5.\n\
    \nA constraint appears as a line  \n18.  Choose Product ➤ Run . The user interface\
    \ appears.  \n19.  Move the mouse pointer over the bottom right corner of the\
    \ program window and drag the mouse to the right and down. Notice that because\
    \ the push button has a constraint that links it to the right window edge, each\
    \ time the window changes size, the push button moves to remain a fixed distance\
    \ from the right edge of the window.  \n20.  Choose ConstraintProgram ➤ Quit ConstraintProgram.\
    \ Xcode appears again.\n\nWhen you place one constraint on the push button, Xcode\
    \ displays a red border around the push button. This red border lets you know\
    \ that you don’t have enough constraints on the user interface item.\n\nIn this\
    \ case, the constraint defines how the push button reacts when the right edge\
    \ of the window moves. However, the push button lacks constraints that define\
    \ how the push button reacts when the window shrinks or expands in height.\n\n\
    Ideally, you should place enough constraints on every user interface item so they\
    \ define all possible variations if the window changes width or height. To fix\
    \ this problem for the push button, you need to add another constraint that defines\
    \ the push button’s vertical position to the top or bottom of the window.\n\n\
    1.  Click the push button to select it.  \n2.  Hold down the Control key and drag\
    \ the mouse down towards the bottom of the window.  \n3.  Release the Control\
    \ key and left mouse button in-between the push button and the bottom edge of\
    \ the window. A pop-up menu appears, as shown in Figure [20-6](#A437923_1_En_20_Chapter.html#Fig6).\n\
    \n![A437923_1_En_20_Fig6_HTML.jpg](A437923_1_En_20_Fig6_HTML.jpg)\n\nFigure 20-6.\n\
    \nAnother pop-up menu for applying constraints to the push button  \n4.  Choose\
    \ the “Bottom Space to Container ” option. Xcode draws a constraint from the push\
    \ button to the bottom of the window. Notice that Xcode no longer highlights the\
    \ border around the push button in red because you have enough constraints.  \n\
    5.  Choose Product ➤ Run. The user interface appears.  \n6.  Move the mouse pointer\
    \ over the bottom right corner of the program window and drag the mouse to the\
    \ right and down. Notice that because the push button has a constraint that links\
    \ it to the right and bottom window edges, each time the window changes size,\
    \ the push button moves to remain a fixed distance from the right and bottom edge\
    \ of the window.  \n7.  Choose ConstraintProgram ➤ Quit ConstraintProgram.\n\n\
    With each user interface item , you can define a constraint to the top, left,\
    \ right, or bottom of the window:\n\n*   Trailing Space to Container: Constrains\
    \ an item to the right edge of a window.\n*   Leading Space to Container: Constrains\
    \ an item to the left edge of a window.\n*   Top Space to Container: Constrains\
    \ an item to the top edge of a window.\n*   Bottom Space to Container: Constrains\
    \ an item to the bottom edge of a window.\n\nOnce you’ve placed one or more constraints\
    \ on a user interface item, you can see more details about those constraints in\
    \ the Size Inspector pane, as shown in Figure [20-7](#A437923_1_En_20_Chapter.html#Fig7).\n\
    \n![A437923_1_En_20_Fig7_HTML.jpg](A437923_1_En_20_Fig7_HTML.jpg)\n\nFigure 20-7.\n\
    \nThe Size Inspector pane lists details of each constraint"
  trans: '

    # 约束窗口大小


    默认情况下，你程序的每个窗口都可以由用户调整大小。这意味着用户可以缩小或放大窗口。当用户缩小窗口时，窗口可能会遮住或隐藏部分用户界面。当用户放大窗口时，窗口中将主要包含空白区域。


    若要约束窗口的最大和最小尺寸，请按照以下步骤操作：


    1. 点击包含你程序用户界面的 `.xib` 或 `.storyboard` 文件。如果使用故事板，请确保点击窗口控制器（而不是视图控制器）。

    2. 选择“视图”➤“实用工具”➤“显示尺寸检查器”。尺寸检查器面板会显示出来，如图 20-2 所示。


    ![A437923_1_En_20_Fig2_HTML.jpg](img/A437923_1_En_20_Fig2_HTML.jpg)


    *图 20-2. 尺寸检查器允许你定义窗口的最大和最小尺寸*


    3. 点击“内容大小”类别下的“最小内容大小”复选框，然后在“宽度”和“高度”文本字段中输入值。你在此定义的值将是窗口的最小尺寸。

    4. 点击“内容大小”类别下的“最大内容大小”复选框，然后在“宽度”和“高度”文本字段中输入值。你在此定义的值将是窗口的最大尺寸。


    通过定义最小尺寸，你可以确保缩小窗口不会遮住或隐藏部分用户界面。通过定义最大尺寸，你可以确保放大窗口不会产生大片空白区域。


    ## 将用户界面项约束到窗口边缘


    当用户调整窗口大小时，窗口中的任何项（例如按钮、文本字段或标签）都会保持在原位。这就是为什么缩小窗口可能会覆盖或隐藏部分用户界面，而放大窗口则可能产生空白区域的原因。


    要使用户界面适应窗口大小的变化，你需要在用户界面项（按钮、文本字段等）与窗口边缘之间放置约束。这样一来，当用户调整窗口大小时，用户界面项会保持与某条窗口边缘的固定距离。这使得用户界面可以在窗口改变宽度和/或高度时进行扩展或收缩。


    要了解如何使用约束将用户界面项固定到窗口边缘，请按照以下步骤操作：


    1. 在 Xcode 内，选择“文件”➤“新建”➤“项目”。

    2. 在 macOS 类别下点击“应用程序”。

    3. 点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 会要求输入产品名称。

    4. 点击“产品名称”文本字段，然后输入 `ConstraintProgram`。

    5. 确保“语言”弹出菜单显示 Swift，并且“使用故事板”复选框处于选中状态。

    6. 点击“下一步”按钮。Xcode 会询问你想将项目存储在何处。

    7. 选择一个文件夹来存储你的项目，然后点击“创建”按钮。

    8. 在项目导航器中点击 `Main.storyboard` 文件。你程序的用户界面将会显示出来。

    9. 选择“视图”➤“实用工具”➤“显示对象库”。

    10. 在场景中的任意位置放置一个按钮。（确保将其放置在视图控制器上，而不是窗口控制器上。）

    11. 选择“产品”➤“运行”。用户界面将会显示出来。

    12. 将鼠标指针移到程序窗口的右下角，然后向右下方拖动鼠标。请注意，尽管窗口大小发生了变化，但按钮仍保持在原位。

    13. 选择 `ConstraintProgram`➤“退出 `ConstraintProgram`”。Xcode 会再次出现。当你调整窗口大小时，按钮保持在原位，是因为按钮没有任何约束。通过在按钮与右侧窗口边缘之间放置一个约束，你可以让按钮随着右侧窗口边缘的移动而移动。

    14. 在项目导航器中点击 `Main.storyboard` 文件，然后点击按钮将其选中。

    15. 将鼠标指针移到按钮上方，按住 Control 键，然后将鼠标向右侧窗口边缘方向拖动。Xcode 会显示一条蓝色线条，如图 20-3 所示。


    ![A437923_1_En_20_Fig3_HTML.jpg](img/A437923_1_En_20_Fig3_HTML.jpg)


    *图 20-3. 按住 Control 键拖动鼠标会创建一个约束*


    16. 在按钮和窗口右边缘之间松开 Control 键和鼠标左键。会弹出一个菜单，如图 20-4 所示。


    ![A437923_1_En_20_Fig4_HTML.jpg](img/A437923_1_En_20_Fig4_HTML.jpg)


    *图 20-4. 用于选择约束的弹出菜单*


    17. 选择“尾部空间到容器”选项。Xcode 会从按钮到窗口右边缘绘制一个约束，如图 20-5 所示。


    ![A437923_1_En_20_Fig5_HTML.jpg](img/A437923_1_En_20_Fig5_HTML.jpg)


    *图 20-5. 约束显示为一条线*


    18. 选择“产品”➤“运行”。用户界面将会显示出来。

    19. 将鼠标指针移到程序窗口的右下角，然后向右下方拖动鼠标。请注意，由于按钮有一个约束将其链接到窗口右边缘，每当窗口大小发生变化时，按钮都会移动，以保持与窗口右边缘的固定距离。

    20. 选择 `ConstraintProgram`➤“退出 `ConstraintProgram`”。Xcode 会再次出现。


    当你对按钮放置一个约束时，Xcode 会在按钮周围显示一个红色边框。这个红色边框提示你，该用户界面项上的约束不足。


    在这种情况下，该约束定义了当窗口右边缘移动时按钮如何反应。但是，按钮缺少定义当窗口在高度上缩小或放大时按钮如何反应的约束。


    理想情况下，你应该在每个用户界面项上放置足够的约束，以便它们定义窗口改变宽度或高度时所有可能的变化。要解决按钮的这个问题，你需要添加另一个约束，定义按钮相对于窗口顶部或底部的垂直位置。


    1. 点击按钮将其选中。

    2. 按住 Control 键，然后向窗口底部方向拖动鼠标。

    3. 在按钮和窗口底部边缘之间松开 Control 键和鼠标左键。会弹出一个菜单，如图 20-6 所示。


    ![A437923_1_En_20_Fig6_HTML.jpg](img/A437923_1_En_20_Fig6_HTML.jpg)


    *图 20-6. 另一个用于为按钮应用约束的弹出菜单*


    4. 选择“底部空间到容器”选项。Xcode 会从按钮到窗口底部绘制一个约束。请注意，Xcode 不再以红色高亮显示按钮周围的边框，因为你现在有足够的约束了。

    5. 选择“产品”➤“运行”。用户界面将会显示出来。

    6. 将鼠标指针移到程序窗口的右下角，然后向右下方拖动鼠标。请注意，由于按钮有一个约束将其链接到窗口的右边缘和底部边缘，每当窗口大小发生变化时，按钮都会移动，以保持与窗口右边缘和底部边缘的固定距离。

    7. 选择 `ConstraintProgram`➤“退出 `ConstraintProgram`”。


    对于每个用户界面项，你可以定义其相对于窗口顶部、左侧、右侧或底部的约束：


    - `Trailing Space to Container`（尾部空间到容器）：将项约束到窗口的右边缘。

    - `Leading Space to Container`（前导空间到容器）：将项约束到窗口的左边缘。

    - `Top Space to Container`（顶部空间到容器）：将项约束到窗口的顶部边缘。

    - `Bottom Space to Container`（底部空间到容器）：将项约束到窗口的底部边缘。


    一旦你在用户界面项上放置了一个或多个约束，就可以在“尺寸检查器”面板中查看这些约束的更多详细信息，如图 20-7 所示。


    ![A437923_1_En_20_Fig7_HTML.jpg](img/A437923_1_En_20_Fig7_HTML.jpg)


    *图 20-7. “尺寸检查器”面板列出了每个约束的详细信息*

