  trans: '

    # 2. 初识 Xcode 8


    要在 Macintosh 上使用 Swift 编写程序，你需要用到 Xcode。Apple 将 Xcode 开发为一款专业的编程工具，并免费提供，以鼓励大家为
    macOS 以及其他の操作系统（如 iOS、tvOS 和 watchOS）编写软件。尽管 Xcode 是免费程序，但它功能强大，被包括 Microsoft、Adobe、Google
    乃至 Apple 在内的各大公司所使用。在 Macintosh 上安装了 Xcode，你就拥有了创建 macOS 程序以及 iOS、tvOS 和 watchOS
    应用的最强大的编程工具之一。


    虽然 Xcode 包含数十项专为专业程序员设计的功能，但任何人都可以学会使用它。Xcode 繁多的功能乍看之下可能令人困惑甚至望而生畏，但请放心。使用 Xcode，你无需学会所有功能。相反，你只需学会需要的那一小部分功能，并忽略其他所有功能。随着经验增长，你可以逐渐学习
    Xcode 的其他功能。然而，你可能永远也用不上 Xcode 的全部功能。


    Xcode 能让你从头到尾创建一个 macOS 程序或 iOS、tvOS、watchOS 应用，而无需使用其他任何程序。在 Xcode 中，你可以执行以下操作：


    -   创建新项目。

    -   编写和编辑 Swift 代码。

    -   设计并修改用户界面。

    -   管理组成单个项目的文件。

    -   运行并测试你的项目。

    -   调试你的 Swift 代码。


    你可以通过 Mac App Store 免费下载并安装 Xcode。在你的 Macintosh 上，只需点击 Apple 菜单并选择 "App Store"。当
    App Store 窗口出现后，点击右上角的搜索文本字段，输入 `Xcode`，然后按 Return 键。点击 Xcode 图标下方的按钮进行下载，如图 2-1
    所示。由于 Xcode 是一个相当大的文件，你需要快速的网络连接和足够的磁盘空间才能将其安装到你的 Macintosh 上。


    ![A437923_1_En_2_Fig1_HTML.jpg](img/A437923_1_En_2_Fig1_HTML.jpg)


    **图 2-1.** 当你搜索 Xcode 时，它通常出现在 App Store 窗口的左上角


    你将经常使用的 Xcode 的四个最主要部分是：


    -   项目管理器

    -   编辑器

    -   Interface Builder

    -   编译器


    一个项目代表一个单独的 macOS、iOS、tvOS 或 watchOS 程序。在过去程序简单的年代，你可以将代码存储在一个单独的文件中。如今程序变得庞大且复杂得多，将代码存储在单独的文件中更为普遍。协同工作的文件集合构成一个项目，因此
    Xcode 项目管理器允许你在项目中创建、重新排列和删除文件。


    每个项目都包含一个代码文件，以其 `.swift` 文件扩展名标识。代码文件是你存储、编辑和键入 Swift 代码的地方。通过使用 Xcode 的编辑器，你可以打开代码文件，复制和粘贴代码，删除代码，以及编写新代码并保存到该文件中。编辑器本质上就像一个简单的文字处理器，专门为帮助你用
    Swift 编程语言编写代码而设计。


    除了包含 Swift 代码的代码文件外，每个项目还包含一个用户界面，该界面存储在另一个以 `.xib` 或 `.storyboard` 文件扩展名标识的单独文件中。一个简单的程序可能只有一个包含其用户界面的文件，但一个更复杂的程序可能有几个包含用户界面不同部分的文件。Xcode
    中让你设计、创建和修改用户界面的功能称为 Interface Builder。


    在你编写了 Swift 代码并设计了用户界面之后，你需要将项目中的所有文件转换成一个实际可运行的程序。将 Swift 代码翻译成计算机能理解的语言（称为机器码）的过程称为编译，因此
    Xcode 中执行此操作的部分被称为编译器。


    你经常会以不同的顺序使用 Xcode 的这四个主要部分。例如，你可能使用项目管理器功能创建一个项目并修改其文件。然后，你可能使用编辑器编写 Swift 代码，并使用
    Interface Builder 设计用户界面。最后，你将使用编译器测试你的程序。如果出现问题，你可能会多次回到编辑器或 Interface Builder，直到程序正常运行。你甚至可能创建新文件并在项目管理器中重新排列它们。


    归根结底，使用 Xcode 没有唯一的“最佳”或“正确”方式。Xcode 提供了功能供你在需要时使用。


    ## 向 Xcode 下达指令


    与许多程序一样，Xcode 提供多种方式来完成完全相同的任务。例如，要打开一个项目，你可以选择 "文件" ➤ "打开" 或按下 `Command + O`。通常，Xcode
    提供三种方式来执行常见类型的命令：


    -   使用屏幕顶部菜单栏中的下拉菜单。

    -   按下独特的按键组合，如 `Command + O`。

    -   点击代表某个命令的图标。


    下拉菜单有助于你找到特定命令，但使用起来可能较慢且笨拙，因为你需要点击菜单标题拉出菜单，然后点击菜单上出现的命令。


    按键组合更快更便捷，但它们迫使你记忆常用命令的晦涩按键组合。为了帮助你了解哪些命令有按键组合，查看每个下拉菜单，你会看到不同命令右侧显示的按键组合，如图 2-2
    所示。（但并非所有命令都有按键组合。）


    ![A437923_1_En_2_Fig2_HTML.jpg](img/A437923_1_En_2_Fig2_HTML.jpg)


    **图 2-2.** 按键组合显示在下拉菜单中命令的右侧


    按键组合通常包括一个修饰键加一个字母或功能键。四个修饰键包括 Command、Control、Option 和 Shift，如图 2-3 所示。


    ![A437923_1_En_2_Fig3_HTML.jpg](img/A437923_1_En_2_Fig3_HTML.jpg)


    **图 2-3.** 用于表示常见修饰键的符号


    点击图标选择命令可能是所有方法中最快的，但你必须知道每个图标所代表的命令。为了帮助你理解图标的作用，只需将鼠标指针移到图标上并等待几秒钟。会出现一个小窗口，简要描述该图标的用途，见图
    2-4。


    ![A437923_1_En_2_Fig4_HTML.jpg](img/A437923_1_En_2_Fig4_HTML.jpg)


    **图 2-4.** 将鼠标指针悬停在图标上会显示该图标功能的简要描述


    有些人只使用下拉菜单，另一些人更依赖图标和按键快捷方式，还有一些人会混合使用这三种方法。通常，人们从下拉菜单开始，但当他们开始频繁使用相同命令时，会逐渐转向图标和按键快捷方式。


    选择你喜欢的任何方法，但要意识到几乎总是有替代方案。重点是让你通过自己喜欢的方式熟练使用 Xcode，这样你就能花更多时间进行创造性工作，而减少寻找所需命令的时间。

    '
- fmt: '# Modifying the Xcode Window


    Because Xcode offers so many features, the Xcode window can look cluttered at
    times. To simplify the appearance of Xcode, you have several options:


    - Resize the Xcode window to make it larger (or smaller).

    - Close panes to hide parts of Xcode.

    - Open panes to view parts of Xcode.


    Like all Macintosh windows, the most straightforward way to resize the Xcode window
    is to move the mouse pointer over the edge or corner of the Xcode window until
    the mouse pointer turns into a two-way pointing arrow. Then drag the mouse to
    resize the window.


    A second way to resize the Xcode window is to click the green dot in the upper
    left corner of the Xcode window. This expands the Xcode window to take up the
    full screen and hides the Xcode menu bar at the same time. To exit out of full
    screen mode, just move the mouse pointer to the top of the screen to make the
    Xcode menu bar appear again. Then click the green dot in the upper left corner
    of the window once more.


    A third way to resize the Xcode window is to choose `Window ➤ Zoom`. This toggles
    between expanding the Xcode window to fill the screen while still displaying the
    Xcode menu bar or shrinking the Xcode window back to its previous size.


    To reduce the amount of information displayed at any given time, Xcode has three
    panes that you can hide (or open), as shown in Figure [2-5](#A437923_1_En_2_Chapter.html#Fig5):


    ![A437923_1_En_2_Fig5_HTML.jpg](A437923_1_En_2_Fig5_HTML.jpg)


    Figure 2-5. Xcode’s Navigator pane, Debug pane, and Utilities pane


    - The Navigator pane that displays information about your project

    - The Debug area that lets you search for errors or bugs in your program

    - The Utilities pane that lets you customize different items on your user interface


    The Navigator pane displays several icons that let you switch between viewing
    different types of information. The most common use for the Navigator pane is
    to let you select a file to open by displaying the Project Navigator. To toggle
    between hiding and showing the Navigator pane, you have three options:


    - Choose `View ➤ Navigators ➤ Show/Hide Navigator`.

    - Press `Command + 0` (the number zero).

    - Click the Show/Hide Navigator Pane icon in the upper right corner of the Xcode
    window, as shown in Figure [2-6](#A437923_1_En_2_Chapter.html#Fig6).


    ![A437923_1_En_2_Fig6_HTML.jpg](A437923_1_En_2_Fig6_HTML.jpg)


    Figure 2-6. The Show/Hide Navigator Pane icon


    The Debug area is used when you want to check if your program is working correctly.
    While you’re designing your user interface or writing Swift code, you’ll likely
    want to hide this Debug area. To toggle between hiding and showing the Debug area,
    you have three options:


    - Choose `View ➤ Debug Area ➤ Show/Hide Debug Area`.

    - Press `Shift + Command + Y`.

    - Click the Show/Hide Debug Area icon in the upper right corner of the Xcode window,
    as shown in Figure [2-7](#A437923_1_En_2_Chapter.html#Fig7).


    ![A437923_1_En_2_Fig7_HTML.jpg](A437923_1_En_2_Fig7_HTML.jpg)


    Figure 2-7. The Show/Hide Debug Area icon


    The Utilities pane displays several icons that let you switch between showing
    different types of information. The most common use for the Utilities pane is
    to help you design and modify a user interface. To toggle between hiding and showing
    the Utilities pane, you have three options:


    - Choose `View ➤ Utilities ➤ Show/Hide Utilities`.

    - Press `Option + Command + 0` (the number zero).

    - Click the Show/Hide Utilities icon in the upper right corner of the Xcode window,
    as shown in Figure [2-8](#A437923_1_En_2_Chapter.html#Fig8).


    ![A437923_1_En_2_Fig8_HTML.jpg](A437923_1_En_2_Fig8_HTML.jpg)


    Figure 2-8. The Show/Hide Utilities icon


    By selectively showing or hiding the Navigator pane, the Debug area, or the Utilities
    pane, you can make the Xcode window look less cluttered and provide more room
    for the parts of Xcode that you want to see. To quickly open or hide these three
    panes, it’s usually faster to click the Show/Hide Navigator, Debug area, or Utilities
    icons in the upper right corner of the Xcode window.'
  raw: '## Modifying the Xcode Window


    Because Xcode offers so many features, the Xcode window can look cluttered at
    times. To simplify the appearance of Xcode, you have several options:


    *   Resize the Xcode window to make it larger (or smaller).

    *   Close panes to hide parts of Xcode.

    *   Open panes to view parts of Xcode.


    Like all Macintosh windows, the most straightforward way to resize the Xcode window
    is to move the mouse pointer over the edge or corner of the Xcode window until
    the mouse pointer turns into a two-way pointing arrow. Then drag the mouse to
    resize the window.


    A second way to resize the Xcode window is to click the green dot in the upper
    left corner of the Xcode window. This expands the Xcode window to take up the
    full screen and hides the Xcode menu bar at the same time. To exit out of full
    screen mode, just move the mouse pointer to the top of the screen to make the
    Xcode menu bar appear again. Then click the green dot in the upper left corner
    of the window once more.


    A third way to resize the Xcode window is to choose Window ➤ Zoom. This toggles
    between expanding the Xcode window to fill the screen while still displaying the
    Xcode menu bar or shrinking the Xcode window back to its previous size.


    To reduce the amount of information displayed at any given time, Xcode has three
    panes that you can hide (or open), as shown in Figure [2-5](#A437923_1_En_2_Chapter.html#Fig5):


    ![A437923_1_En_2_Fig5_HTML.jpg](A437923_1_En_2_Fig5_HTML.jpg)


    Figure 2-5.


    Xcode’s Navigator pane, Debug pane, and Utilities pane


    *   The Navigator pane that displays information about your project

    *   The Debug area that lets you search for errors or bugs in your program

    *   The Utilities pane that lets you customize different items on your user interface


    The Navigator pane displays several icons that let you switch between viewing
    different types of information. The most common use for the Navigator pane is
    to let you select a file to open by displaying the Project Navigator. To toggle
    between hiding and showing the Navigator pane, you have three options:


    *   Choose View ➤ Navigators ➤ Show/Hide Navigator.

    *   Press Command + 0 (the number zero).

    *   Click the Show/Hide Navigator Pane icon in the upper right corner of the Xcode
    window, as shown in Figure [2-6](#A437923_1_En_2_Chapter.html#Fig6).


    ![A437923_1_En_2_Fig6_HTML.jpg](A437923_1_En_2_Fig6_HTML.jpg)


    Figure 2-6.


    The Show/Hide Navigator Pane icon


    The Debug area is used when you want to check if your program is working correctly.
    While you’re designing your user interface or writing Swift code, you’ll likely
    want to hide this Debug area. To toggle between hiding and showing the Debug area,
    you have three options:


    *   Choose View ➤ Debug Area ➤ Show/Hide Debug Area.

    *   Press Shift + Command + Y.

    *   Click the Show/Hide Debug Area icon in the upper right corner of the Xcode
    window, as shown in Figure [2-7](#A437923_1_En_2_Chapter.html#Fig7).


    ![A437923_1_En_2_Fig7_HTML.jpg](A437923_1_En_2_Fig7_HTML.jpg)


    Figure 2-7.


    The Show/Hide Debug Area icon


    The Utilities pane displays several icons that let you switch between showing
    different types of information. The most common use for the Utilities pane is
    to help you design and modify a user interface. To toggle between hiding and showing
    the Utilities pane, you have three options:


    *   Choose View ➤ Utilities ➤ Show/Hide Utilities.

    *   Press Option + Command + 0 (the number zero).

    *   Click the Show/Hide Utilities icon in the upper right corner of the Xcode
    window, as shown in Figure [2-8](#A437923_1_En_2_Chapter.html#Fig8).


    ![A437923_1_En_2_Fig8_HTML.jpg](A437923_1_En_2_Fig8_HTML.jpg)


    Figure 2-8.


    The Show/Hide Utilities icon


    By selectively showing or hiding the Navigator pane, the Debug area, or the Utilities
    pane, you can make the Xcode window look less cluttered and provide more room
    for the parts of Xcode that you want to see. To quickly open or hide these three
    panes, it’s usually faster to click the Show/Hide Navigator, Debug area, or Utilities
    icons in the upper right corner of the Xcode window.'
  trans: '

    # 修改 Xcode 窗口


    由于 Xcode 提供了众多功能，其窗口有时会显得杂乱。为了简化 Xcode 的外观，你有以下几种选择：


    -   调整 Xcode 窗口大小，使其变大（或变小）。

    -   关闭面板以隐藏 Xcode 的某些部分。

    -   打开面板以查看 Xcode 的某些部分。


    与所有 Macintosh 窗口一样，调整 Xcode 窗口大小最直接的方式是将鼠标指针移到 Xcode 窗口的边缘或角落，直到鼠标指针变为双向箭头。然后拖动鼠标即可调整窗口大小。


    调整 Xcode 窗口大小的第二种方法是点击 Xcode 窗口左上角的绿色圆点。这会将 Xcode 窗口扩展到全屏，同时隐藏 Xcode 菜单栏。要退出全屏模式，只需将鼠标指针移到屏幕顶部，使
    Xcode 菜单栏再次出现，然后再次点击窗口左上角的绿色圆点即可。


    调整 Xcode 窗口大小的第三种方法是选择 `窗口 ➤ 缩放`。这会在将 Xcode 窗口扩展至填满屏幕（同时仍显示 Xcode 菜单栏）和将 Xcode
    窗口缩小回之前大小之间切换。


    为了减少任何时刻显示的信息量，Xcode 提供了三个可以隐藏（或打开）的面板，如图 2-5 所示：


    ![A437923_1_En_2_Fig5_HTML.jpg](img/A437923_1_En_2_Fig5_HTML.jpg)


    图 2-5. Xcode 的导航面板、调试面板和工具面板


    -   **导航面板**：显示关于你项目的信息。

    -   **调试区域**：允许你查找程序中的错误或缺陷。

    -   **工具面板**：允许你自定义用户界面中的不同项目。


    导航面板上显示多个图标，让你可以在不同类型的信息视图之间切换。导航面板最常见的用途是通过显示项目导航器，让你选择要打开的文件。要在隐藏和显示导航面板之间切换，你有三种选择：


    -   选择 `视图 ➤ 导航器 ➤ 显示/隐藏导航器`。

    -   按下 `Command + 0`（数字零）。

    -   点击 Xcode 窗口右上角的“显示/隐藏导航面板”图标，如图 2-6 所示。


    ![A437923_1_En_2_Fig6_HTML.jpg](img/A437923_1_En_2_Fig6_HTML.jpg)


    图 2-6. “显示/隐藏导航面板”图标


    当你想要检查程序是否正常运行时会用到调试区域。当你设计用户界面或编写 Swift 代码时，你可能希望隐藏这个调试区域。要在隐藏和显示调试区域之间切换，你有三种选择：


    -   选择 `视图 ➤ 调试区域 ➤ 显示/隐藏调试区域`。

    -   按下 `Shift + Command + Y`。

    -   点击 Xcode 窗口右上角的“显示/隐藏调试区域”图标，如图 2-7 所示。


    ![A437923_1_En_2_Fig7_HTML.jpg](img/A437923_1_En_2_Fig7_HTML.jpg)


    图 2-7. “显示/隐藏调试区域”图标


    工具面板上显示多个图标，让你可以在显示不同类型的信息之间切换。工具面板最常见的用途是帮助你设计并修改用户界面。要在隐藏和显示工具面板之间切换，你有三种选择：


    -   选择 `视图 ➤ 工具 ➤ 显示/隐藏工具`。

    -   按下 `Option + Command + 0`（数字零）。

    -   点击 Xcode 窗口右上角的“显示/隐藏工具”图标，如图 2-8 所示。


    ![A437923_1_En_2_Fig8_HTML.jpg](img/A437923_1_En_2_Fig8_HTML.jpg)


    图 2-8. “显示/隐藏工具”图标


    通过有选择地显示或隐藏导航面板、调试区域或工具面板，你可以让 Xcode 窗口看起来不那么杂乱，并为你想查看的 Xcode 部分提供更多空间。要快速打开或隐藏这三个面板，点击
    Xcode 窗口右上角的“显示/隐藏导航器”、“调试区域”或“工具”图标通常是最快的方式。

    '
- fmt: '# Creating and Managing Files


    Any time you need to create a project (that represents a brand new program) or
    a file (to add to an existing project), you have two choices:


    - Choose **File** ➤ **New** to display a submenu, as shown in Figure 2-9.


    ![A437923_1_En_2_Fig9_HTML.jpg](A437923_1_En_2_Fig9_HTML.jpg)


    Figure 2-9. The **File** ➤ **New** command displays a submenu that lets you choose
    to create a file or a project


    - Right-click any file displayed in the Navigator pane to display a pop-up menu,
    as shown in Figure 2-10.


    ![A437923_1_En_2_Fig10_HTML.jpg](A437923_1_En_2_Fig10_HTML.jpg)


    Figure 2-10. Right-clicking a file in the Navigator pane displays a pop-up menu
    that lets you choose to create a file


    > **Note**: Right-clicking may be disabled on some Macintosh computers. You can
    simulate a right-click by holding down the `Control` key while clicking. To turn
    on right-clicking, click the Apple menu, choose System Preferences, and click
    the Mouse or Trackpad icon. Then select the “Secondary click” check box to turn
    on right-clicking.


    When you create a new file, you can choose whether to create a file for a macOS
    or iOS, tvOS, or watchOS project. In this book, you’ll always create files for
    macOS.


    Besides choosing to create a file for macOS, you also need to choose what type
    of file to create. The two most common types of files you’ll create will be either
    files that can hold Swift code (organized under the Source category, as shown
    in Figure 2-11) or files that can hold a user interface (organized under the User
    Interface category, as shown in Figure 2-12).


    ![A437923_1_En_2_Fig12_HTML.jpg](A437923_1_En_2_Fig12_HTML.jpg)


    Figure 2-12. A second type of file you can create holds part of your program’s
    user interface


    ![A437923_1_En_2_Fig11_HTML.jpg](A437923_1_En_2_Fig11_HTML.jpg)


    Figure 2-11. One type of file you can create holds Swift code


    When you create a file, that file appears in the Project Navigator. The Navigator
    pane can actually display several different types of information, but the most
    common is the Project Navigator, which lists of all the files that make up your
    project. To open the Project Navigator within the Navigator pane, you have three
    choices:


    - Choose **View** ➤ **Navigators** ➤ **Show Project Navigator**.

    - Press `Command` + `1`.

    - Click the **Show the Project Navigator** icon, as shown in Figure 2-13.


    ![A437923_1_En_2_Fig13_HTML.jpg](A437923_1_En_2_Fig13_HTML.jpg)


    Figure 2-13. The Project Navigator pane lists all the files that make up a project


    The Project Navigator closely resembles the Finder by displaying files and folders.
    To rename a file or folder, just select it and press `Return` to edit its name.


    To move a file or folder, just drag it with the mouse and drop it in a new location.


    To select one or more items, hold down the `Command` key and click a file or folder.


    Just like the Finder, the Project Navigator lets you organize files into folders.
    This lets you group related files together and tuck them out of sight so they
    don’t clutter the Project Navigator. To create a folder, click a file or folder
    in the Project Navigator and then do one of the following actions:


    - Choose **File** ➤ **New** ➤ **Group** (or **Group from Selection** to store
    one or more selected files in a folder).

    - Press `Option` + `Command` + `N`.

    - Right-click any file or folder in the Project Navigator and when a pop-up menu
    appears, choose **New Group** (or **New Group from Selection** to store one or
    more selected files in a folder).


    To delete a file or folder, select a file or folder and then do one of the following:


    - Choose **Edit** ➤ **Delete**.

    - Press the `Delete` key or `Command` + `Backspace`.

    - Right-click any file or folder in the Project Navigator and when a pop-up menu
    appears, choose **Delete**.


    > **Note**: When you delete a file or folder, you have the option of **Remove
    Reference** (which removes a file/folder from a project but does not physically
    delete it from your Macintosh) or **Move to Trash** (which removes a file/folder
    from a project and physically deletes it from your Macintosh).


    Perhaps the most important use for the Project Navigator is to let you edit a
    file in a project. When you click a file in the Project Navigator, the middle
    pane of the Xcode window displays the contents of your selected file, which will
    either hold Swift code or your user interface (see Figure 2-14).


    ![A437923_1_En_2_Fig14_HTML.jpg](A437923_1_En_2_Fig14_HTML.jpg)


    Figure 2-14. Selecting a file in the Navigator pane displays the contents of that
    file'
