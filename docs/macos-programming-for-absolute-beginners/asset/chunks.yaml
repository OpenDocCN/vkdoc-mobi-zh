    \ to commands.\n\nPull-down menus represent a standard way for users to control\
    \ a program. By creating pull-down menus for your own programs, you can create\
    \ a familiar user interface so others can learn and use your program quickly with\
    \ little or no additional training."
  trans: "\n### 创建颜色面板\n\n颜色面板用于显示不同的颜色选项，以便用户选择不同的颜色。颜色面板需要返回用户选择的颜色。颜色面板使用的一些属性包括：\n\
    \n- `activate`：显示颜色面板\n- `action`：定义打开颜色面板时要运行的函数\n- `color`：以 `NSColor` 类的形式存储用户选择的颜色值\n\
    \n要学习如何使用颜色面板，请遵循以下步骤：\n\n1.  在 Xcode 中，选择**文件 ➤ 新建 ➤ 项目**。\n2.  在 **macOS** 类别下，点击**应用程序**。\n\
    3.  点击**Cocoa 应用程序**，然后点击**下一步**按钮。Xcode 会要求你输入产品名称。\n4.  在**产品名称**文本框中点击，然后输入\
    \ `ColorPanelProgram`。\n5.  确保**语言**弹出菜单显示为 **Swift**，并且“使用故事板”复选框已被选中。\n6.  点击**下一步**按钮。Xcode\
    \ 会询问你想在哪里存储项目。\n7.  选择一个文件夹来存储你的项目，然后点击**创建**按钮。\n8.  在项目导航器中点击 `Main.storyboard`\
    \ 文件。你程序的用户界面将会出现。\n9.  选择**视图 ➤ 工具 ➤ 显示对象库**。对象库会出现在 Xcode 窗口的右下角。\n10. 将一个按钮拖拽到用户界面窗口中，并双击它，将其标题更改为**颜色**。\n\
    11. 将一个标签拖拽到用户界面窗口中，并双击它，将其显示的文本更改为**你选择了此颜色**，如图 21-8 所示。\n\n    ![A437923_1_En_21_Fig8_HTML.jpg](img/A437923_1_En_21_Fig8_HTML.jpg)\n\
    \n    **图 21-8.** ColorPanelProgram 的用户界面\n\n12. 选择**视图 ➤ 助理编辑器 ➤ 显示助理编辑器**。`ViewController.swift`\
    \ 文件会出现在你的用户界面旁边。\n13. 将鼠标指针移动到标签上，按住 **Control** 键，然后将鼠标拖拽到 `ViewController.swift`\
    \ 文件中最后一行的 `class ViewController` 代码下方。\n14. 松开 **Control** 键和鼠标按钮。会弹出一个窗口。\n\
    15. 在**名称**文本框中点击，输入 `myLabel`，然后点击**连接**按钮。Xcode 会创建一个 `IBOutlet`，如下所示：\n\n \
    \   ```\n    @IBOutlet weak var myLabel: NSTextField!\n    ```\n\n16. 在此 `IBOutlet`\
    \ 下方，输入以下代码：\n\n    ```\n    let colorPanel = NSColorWell()\n    ```\n\n17. 将鼠标指针移动到按钮上，按住\
    \ **Control** 键，然后将鼠标拖拽到 `ViewController.swift` 文件底部最后一个花括号的上方。\n18. 松开 **Control**\
    \ 键和鼠标按钮。会弹出一个窗口。\n19. 在**连接**弹出菜单中点击，并选择**动作**。\n20. 在**名称**文本框中点击，然后输入 `chooseColor`。\n\
    21. 在**类型**弹出菜单中点击，选择 `NSButton`，然后点击**连接**按钮。Xcode 会创建一个空的 `IBAction` 方法。\n22.\
    \ 修改此 `IBAction` 方法，如下所示：\n\n    ```\n    @IBAction func chooseColor(_ sender:\
    \ NSButton) {\n        colorPanel.activate(true)\n        colorPanel.action =\
    \ #selector(changeColor(_:))\n    }\n    ```\n\n    `activate` 命令用于显示颜色面板，`#selector`\
    \ 命令用于运行 `changeColor` 函数，你需要创建这个函数。\n\n23. 在此 `IBAction` 方法上方，输入以下函数：\n\n   \
    \ ```\n    override func changeColor(_ sender: Any?) {\n        myLabel.textColor\
    \ = colorPanel.color\n    }\n    ```\n\n    这个 `changeColor` 函数的作用是，获取用户在颜色面板中选择的任何颜色，并将其赋值给标签的文本颜色。\n\
    \n24. 选择**产品 ➤ 运行**。用户界面将会出现。\n25. 在你程序的用户界面上点击**颜色**按钮。会显示一个颜色面板，如图 21-9 所示。\n\
    \n    ![A437923_1_En_21_Fig9_HTML.jpg](img/A437923_1_En_21_Fig9_HTML.jpg)\n\n\
    \    **图 21-9.** 颜色面板\n\n26. 点击一种颜色。请注意，每次你点击一种颜色时，标签中文本的颜色都会随之改变。\n27. 选择**ColorPanelProgram\
    \ ➤ 退出 ColorPanelProgram**。\n\n### 总结\n\n在设计标准的 macOS 用户界面时，你不必事事都亲力亲为。通过利用 Cocoa\
    \ 框架，你可以创建外观和行为与其他 macOS 程序相一致的警报和面板，而无需自己编写大量额外的代码。\n\n警报让你可以向用户显示简短的消息，例如警告。你可以使用文本和图形自定义警报，并在警报上放置两个或更多按钮。如果你在警报上放置了两个或更多按钮，则需要编写\
    \ Swift 代码来识别用户点击了哪个按钮。\n\n警报通常显示为一个独立的窗口，但你也可以让它以从窗口标题栏向下弹出的表单形式出现。\n\n面板显示常用的用户界面元素，例如用于选择要打开文件的“打开”面板，以及用于选择保存数据的文件夹和文件名的“保存”面板。“打开”和“保存”面板是\
    \ Cocoa 框架的一部分，但你还需要编写额外的 Swift 代码，才能使“打开”和“保存”面板实际打开文件或将文件保存到硬盘。\n\n颜色面板让用户选择不同的颜色。要获取用户选择的颜色，请使用\
    \ `NSColorWell` 类的 `color` 属性。\n\n警报和面板让你只需编写很少的额外代码就能创建标准的 macOS 用户界面元素。通过使用\
    \ Cocoa 框架的这些特性，你可以创建运行稳定、行为符合用户对 macOS 程序预期的标准 macOS 程序。\n\n# 22. 创建下拉菜单\n\n\
    下拉菜单是与 macOS 程序进行交互的标准方式。虽然你的程序可能会使用按钮来表示命令，但过多的按钮会使屏幕显得杂乱。为了避免在屏幕上塞入过多按钮，你可以将相关的命令分组到多个下拉菜单中。默认情况下，Xcode\
    \ 创建的每个 macOS 项目都包含以下下拉菜单标题：\n\n-   **文件**：显示用于打开、保存、创建和打印的命令。\n-   **编辑**：显示用于复制、剪切、粘贴、撤销和重做命令的命令。\n\
    -   **格式**：显示用于修改文本或图形的命令，例如更改字体。\n-   **视图**：显示用于更改数据在窗口中显示方式的命令，例如放大和缩小，或显示其他用户界面项目（如工具栏）。\n\
    -   **窗口**：显示用于操作文档窗口的命令，例如在多个打开的窗口之间切换。\n-   **帮助**：显示用于获取程序使用帮助的命令。\n\n虽然 Xcode\
    \ 可以为你创建下拉菜单标题，但你还是需要编写 Swift 代码才能让它们真正起作用。除了使用标准的下拉菜单标题，你还可以添加自己的菜单标题或删除现有的标题。为了组织下拉菜单内的命令，你可以使用水平线将相似命令分组，或者将它们存储在子菜单中。为了方便用户，你还可以为命令分配键盘快捷键。\n\
    \n下拉菜单是用户控制程序的标准方式。通过为你自己的程序创建下拉菜单，你可以创建熟悉的用户界面，以便他人可以在几乎不需要额外培训的情况下，快速学习和使用你的程序。\n"
- fmt: "# Editing Pull-Down Menus\n\nEach time you create a Cocoa Application project,\
    \ Xcode creates a default pull-down menu that contains common menu titles and\
    \ commands. Without writing a single line of Swift code, many of these commands\
    \ already work. For example, the Quit command under the application menu (the\
    \ name of your program, such as `MenuProgram`) knows how to quit your program\
    \ and the Zoom and Minimize commands under the Window menu title know how to zoom\
    \ and minimize the user interface window.\n\nIn most cases, you’ll need to customize\
    \ these pull-down menus by editing existing commands, adding new commands, and\
    \ deleting existing commands. To modify a program’s pull-down menus, you have\
    \ two options:\n\n* Edit the pull-down menus directly\n* Open the Document Outline\
    \ and edit the menus\n\nTo edit pull-down menus directly, click the `.xib` or\
    \ `.storyboard` file in the Project Navigator pane and then click directly on\
    \ your program’s pull-down menus, as shown in Figure [22-1](#A437923_1_En_22_Chapter.html#Fig1).\n\
    \n![A437923_1_En_22_Fig1_HTML.jpg](A437923_1_En_22_Fig1_HTML.jpg)\n\nFigure 22-1.\
    \ You can click directly on a program’s pull-down menus to select individual items\n\
    \nA second way to edit pull-down menus is to open the Document Outline by clicking\
    \ the Show Document Outline icon, as shown in Figure [22-2](#A437923_1_En_22_Chapter.html#Fig2).\n\
    \n![A437923_1_En_22_Fig2_HTML.jpg](A437923_1_En_22_Fig2_HTML.jpg)\n\nFigure 22-2.\
    \ The Show Document Outline icon\n\nWith the Document Outline open, you can click\
    \ the disclosure triangles to view the different pull-down menus and their commands,\
    \ as shown in Figure [22-3](#A437923_1_En_22_Chapter.html#Fig3).\n\n![A437923_1_En_22_Fig3_HTML.jpg](A437923_1_En_22_Fig3_HTML.jpg)\n\
    \nFigure 22-3. Viewing menus in the Document Outline pane\n\nTo delete a menu\
    \ item, click it to select it (either by clicking directly on the pull-down menu\
    \ item or on the menu item in the Document Outline pane) and press the Backspace\
    \ or Delete key. This lets you delete individual menu items or entire menu titles,\
    \ such as the File or Edit pull-down menu title.\n\n> **Note:** If you delete\
    \ a menu item or entire pull-down menu title by mistake, just choose Edit ➤ Undo\
    \ or press `Command + Z` to recover it right away.\n\nTo add items to a program’s\
    \ pull-down menus, you have two choices:\n\n* Add a new menu item to an existing\
    \ pull-down menu title, such as File or Edit\n* Add a new pull-down menu title\
    \ that lists its own commands\n\n## Adding New Pull-Down Menu Titles to the Menu\
    \ Bar\n\nYou can add menu items and pull-down menu titles either directly on the\
    \ pull-down menu, or inside the Document Outline.\n\nThe Object Library displays\
    \ the following pull-down menu titles that you can add to a program’s menu bar,\
    \ as shown in Figure [22-4](#A437923_1_En_22_Chapter.html#Fig4):\n\n![A437923_1_En_22_Fig4_HTML.jpg](A437923_1_En_22_Fig4_HTML.jpg)\n\
    \nFigure 22-4. The pull-down menu titles you can add to a program’s menu bar\n\
    \n* Application Menu Item: Contains typical commands found in an application pull-down\
    \ menu title such as About, Preferences, and Services\n* File Menu Item: Contains\
    \ typical commands found in a File pull-down menu title such as Open, New, and\
    \ Save\n* Edit Menu Item: Contains typical commands found in the Edit pull-down\
    \ menu title such as Cut, Copy, and Paste\n* Font Menu Item: Contains typical\
    \ commands found in a Font pull-down menu title such as Bold, Bigger, and Copy\
    \ Style\n* Format Menu Item: Contains typical commands found in a Format pull-down\
    \ menu title such as Font and Text\n* Text Menu Item: Contains typical commands\
    \ found in a Text pull-down menu title such as Center, Writing Direction, and\
    \ Show Ruler\n* Find Menu Item: Contains typical commands found in a Find pull-down\
    \ menu title such as Find, Find and Replace, and Find Next\n* Window Menu Item:\
    \ Contains typical commands found in a Window pull-down menu title such as Minimize,\
    \ Bring to Front, and Zoom\n* Help Menu Item: Contains typical commands found\
    \ in a Help pull-down menu title such as Application Help\n\nTo add a pull-down\
    \ menu title to a program’s menu bar, follow these steps:\n\n1. Click the `.xib`\
    \ or `.storyboard` file in the Project Navigator pane.\n2. Choose View ➤ Utilities\
    \ ➤ Show Object Library to display the Object Library in the bottom right corner\
    \ of the Xcode window.\n3. Drag a pull-down menu item (see Figure [22-4](#A437923_1_En_22_Chapter.html#Fig4))\
    \ from the Object Library and move the mouse over the program’s menu bar until\
    \ a vertical blue line appears to show you where the pull-down menu title will\
    \ appear, as shown in Figure [22-5](#A437923_1_En_22_Chapter.html#Fig5).\n\n \
    \  ![A437923_1_En_22_Fig5_HTML.jpg](A437923_1_En_22_Fig5_HTML.jpg)\n\n   Figure\
    \ 22-5. Adding a new pull-down menu title to a menu bar\n\n   Instead of dragging\
    \ the mouse over the program’s menu bar, you can also drag the mouse in between\
    \ pull-down menu titles in the Document Outline until a horizontal blue line appears\
    \ to show where your menu title will appear, as shown in Figure [22-6](#A437923_1_En_22_Chapter.html#Fig6).\n\
    \n   ![A437923_1_En_22_Fig6_HTML.jpg](A437923_1_En_22_Fig6_HTML.jpg)\n\n   Figure\
    \ 22-6. Adding a new pull-down menu title to a menu bar using the Document Outline\n\
    \n4. Release the mouse. Your new pull-down menu title appears on the menu bar.\n\
    \nTo rearrange the pull-down menu titles, move the mouse pointer over the menu\
    \ title you wish to move (either on the menu bar or in the Document Outline),\
    \ and drag the mouse to move the menu title to a new location.\n\n## Adding New\
    \ Commands to a Pull-Down Menu\n\nYou can always delete, rearrange, and add commands\
    \ on any pull-down menu. To delete a command, simply select it and press the Backspace\
    \ or Delete key. To rearrange a command, drag and drop it to a new location.\n\
    \nTo add a new command to a pull-down menu, you need to use the following three\
    \ items from the Object Library, as shown in Figure [22-7](#A437923_1_En_22_Chapter.html#Fig7):\n\
    \n![A437923_1_En_22_Fig7_HTML.jpg](A437923_1_En_22_Fig7_HTML.jpg)\n\nFigure 22-7.\
    \ Three items for modifying commands on a pull-down menu\n\n* Menu Item: Represents\
    \ a single command\n* Submenu Menu Item: Represents a submenu of additional commands\n\
    * Separate Menu Item: Displays a horizontal line to separate commands on a pull-down\
    \ menu\n\nTo add a new command to a pull-down menu, follow these steps:\n\n1.\
    \ Click the `.xib` or `.storyboard` file in the Project Navigator pane.\n2. Choose\
    \ View ➤ Utilities ➤ Show Object Library to display the Object Library in the\
    \ bottom right corner of the Xcode window.\n3. Click the pull-down menu where\
    \ you want to add a new command. You can either click directly on the pull-down\
    \ menu title on the menu bar or click a disclosure triangle to open a pull-down\
    \ menu title in the Document Outline, as shown in Figure [22-8](#A437923_1_En_22_Chapter.html#Fig8).\n\
    \n   ![A437923_1_En_22_Fig8_HTML.jpg](A437923_1_En_22_Fig8_HTML.jpg)\n\n   Figure\
    \ 22-8. You can add a new command directly on a pull-down menu or through the\
    \ Document Outline\n\n4. Drag a menu item (see Figure [22-7](#A437923_1_En_22_Chapter.html#Fig7))\
    \ from the Object Library and move the mouse in the pull-down menu list until\
    \ a horizontal blue line appears to show you where the command will appear, as\
    \ shown in Figure [22-9](#A437923_1_En_22_Chapter.html#Fig9).\n\n   ![A437923_1_En_22_Fig9_HTML.jpg](A437923_1_En_22_Fig9_HTML.jpg)\n\
    \n   Figure 22-9. Dragging and dropping a new command in a pull-down menu list\n\
    \n5. Release the mouse. Xcode adds your new menu item to the pull-down menu. If\
    \ you added a submenu menu item, you can now edit the commands stored on its submenu."
