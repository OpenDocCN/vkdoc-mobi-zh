    \ to make it easy for other programmers to understand your code later if you’re\
    \ not around to explain how it works.\n\n## Using Panels\n\nPanels represent common\
    \ user interface elements that macOS programs need, such as displaying an Open\
    \ panel to let users select a file to open and a Save panel to let users choose\
    \ a folder to store a file. The Open panel is based on the `NSOpenPanel` class\
    \ while the Save panel is based on the `NSSavePanel` class.\n\n### Creating an\
    \ Open Panel\n\nAn Open panel lets the user select a file to open. The Open panel\
    \ needs to return a file name if the user selected a file. Some properties that\
    \ the Open panel uses include:\n\n*   `canChooseFiles`: Lets the user select a\
    \ file.\n*   `canChooseDirectories`: Lets the user select a folder or directory.\n\
    *   `allowsMultipleSelection`: Lets the user select more than one item.\n*   `urls`:\
    \ Holds the name of the chosen item. If the `allowsMultipleSelection` property\
    \ is set to `true`, then the `urls` property holds an array of items. Otherwise,\
    \ it holds a single item.\n\nTo see how to use an Open panel, follow these steps:\n\
    \n1.  From within Xcode, choose File ➤ New ➤ Project.\n2.  Click Application under\
    \ the macOS category.\n3.  Click Cocoa Application and click the Next button.\
    \ Xcode now asks for a product name.\n4.  Click in the Product Name text field\
    \ and type `PanelProgram`.\n5.  Make sure the Language pop-up menu displays Swift\
    \ and that the “Use Storyboards” check box is selected.\n6.  Click the Next button.\
    \ Xcode asks where you want to store the project.\n7.  Choose a folder to store\
    \ your project and click the Create button.\n8.  Click the `Main.storyboard` file\
    \ in the Project Navigator. Your program’s user interface appears.\n9.  Choose\
    \ View ➤ Utilities ➤ Show Object Library. The Object Library appears in the bottom\
    \ right corner of the Xcode window.\n10.  Drag a push button onto the user interface\
    \ window and double-click it to change its title to `Open`.\n11.  Choose View\
    \ ➤ Assistant Editor ➤ Show Assistant Editor. The `ViewController.swift` file\
    \ appears next to your user interface.\n12.  Move the mouse pointer over the push\
    \ button, hold down the Control key, and drag the mouse above the last curly bracket\
    \ in the bottom of the `ViewController.swift` file.\n13.  Release the Control\
    \ key and the mouse button. A pop-up window appears.\n14.  Click in the Connect\
    \ pop-up menu and choose Action.\n15.  Click in the Name text field and type `openPanel`.\n\
    16.  Click in the Type pop-up menu, choose `NSButton`, and click the Connect button.\
    \ Xcode creates an empty `IBAction` method.\n17.  Modify the `IBAction` method\
    \ as follows:\n\n    ```swift\n    @IBAction func openPanel(_ sender: NSButton)\
    \ {\n        let myOpen = NSOpenPanel()\n        myOpen.canChooseFiles = true\n\
