- fmt: "# Searching the Object Library\n\nTo display your program’s user interface,\
    \ you need to click the `.xib` or `.storyboard` file in the Project Navigator\
    \ pane. Once you’ve selected a user interface file to modify, you can then drag\
    \ items from the Object Library (in the bottom right corner of the Xcode window)\
    \ and place it anywhere on your user interface. To view the Object Library, choose\
    \ View ➤ Utilities ➤ Show Object Library.\n\nThere are two ways to search the\
    \ Object Library. One way is to simply scroll up and down until you find the item\
    \ you want. Since the Object Library lists every possible user interface item\
    \ available, scrolling can be clumsy and slow.\n\nA faster method is to use the\
    \ search field at the bottom of the Object Library pane, as shown in Figure [15-1](#A437923_1_En_15_Chapter.html#Fig1).\
    \ Just type part of the name of the user interface item you want to use and the\
    \ Object Library filters out every item that doesn’t match what you typed.\n\n\
    ![A437923_1_En_15_Fig1_HTML.jpg](A437923_1_En_15_Fig1_HTML.jpg)\n\nFigure 15-1.\
    \ The search field lets you quickly find user interface items in the Object Library\n\
    \nTo learn how to search the Object Library, follow these steps:\n\n1.  From within\
    \ Xcode choose File ➤ New ➤ Project.\n2.  Click Application under the macOS category.\n\
    3.  Click Cocoa Application and click the Next button. Xcode now asks for a product\
    \ name.\n4.  Click in the Product Name text field and type `UIProgram`.\n5.  Make\
    \ sure the Language pop-up menu displays Swift and that no check boxes are selected.\
    \ Notice at this point you could choose to use storyboards by selecting the “Use\
    \ Storyboards” check box, as shown in Figure [15-2](#A437923_1_En_15_Chapter.html#Fig2).\
    \ Keep the “Use Storyboards” check box clear for now.\n\n    ![A437923_1_En_15_Fig2_HTML.jpg](A437923_1_En_15_Fig2_HTML.jpg)\n\
    \n    Figure 15-2. When creating a new project, you have the option of using storyboards\
    \ for your user interface\n6.  Click the Next button. Xcode asks where you want\
    \ to store the project.\n7.  Choose a folder to store your project and click the\
    \ Create button.\n8.  Click the `MainMenu.xib` file in the Project Navigator.\
    \ Your program’s user interface appears.\n9.  Click the Window icon, as shown\
    \ in Figure [15-3](#A437923_1_En_15_Chapter.html#Fig3), to display the window\
    \ of your program’s user interface.\n\n    ![A437923_1_En_15_Fig3_HTML.jpg](A437923_1_En_15_Fig3_HTML.jpg)\n\
    \n    Figure 15-3. The Window icon represents your user interface window\n10.\
    \  Click the Window icon, as shown in Figure [15-3](#A437923_1_En_15_Chapter.html#Fig3),\
    \ to display the window of your program’s user interface.\n11.  Choose View ➤\
    \ Utilities ➤ Show Object Library. The Object Library appears in the bottom right\
    \ corner of the Xcode window.\n12.  Scroll up and down through the Object Library.\
    \ Notice the names and variety of different items you can add to your user interface.\n\
    13.  Click in the search field at the bottom of the Object Library and type `text`.\
    \ Notice that the Object Library now only shows those items that have “text” in\
    \ their names or descriptions, as shown in Figure [15-4](#A437923_1_En_15_Chapter.html#Fig4).\n\
    \n    ![A437923_1_En_15_Fig4_HTML.jpg](A437923_1_En_15_Fig4_HTML.jpg)\n\n    Figure\
    \ 15-4. Searching the Object Library for “text”\n14.  Click in the search field\
    \ at the bottom of the Object Library and click the close icon (the X inside the\
    \ gray circle on the far right of the search field) to clear the search field.\n\
    15.  Type `button`. Notice that the Object Library now only shows those items\
    \ that have “button” in their names or descriptions. If you know all or even part\
    \ of the name or purpose of the item you want, it’s far faster to search for it\
    \ in the Object Library than scrolling through the lengthy list of every user\
    \ interface item available.\n\n## User Interface Items That Display and Accept\
    \ Text\n\nAlthough the Object Library contains a huge number of available items\
    \ you can place on a user interface, most items can be grouped into categories\
    \ by function. Remember, a user interface has three functions:\n\n*   To display\
    \ information to the user\n*   To accept data from the user\n*   To allow the\
    \ user to control the program\n\nThe simplest way to display information on a\
    \ user interface is through a label. In the Cocoa framework, a label is based\
    \ on the `NSTextField` class. Essentially a label is a text field that you can’t\
    \ edit. To identify the class of any item in the Object Library, just click it\
    \ and a pop-up window appears that describes the item’s purpose and the class\
    \ it’s based on (see Figure [15-5](#A437923_1_En_15_Chapter.html#Fig5)).\n\n![A437923_1_En_15_Fig5_HTML.jpg](A437923_1_En_15_Fig5_HTML.jpg)\n\
    \nFigure 15-5. Identifying the class of a user interface item in the Object Library\n\
    \nAny user interface item based on the `NSTextField` can be used to display and\
    \ accept text, although it’s more common to use a label for displaying text and\
    \ any other type of text field for letting the user type in text. The list of\
    \ user interface items based on the `NSTextField` is shown in Figure [15-6](#A437923_1_En_15_Chapter.html#Fig6):\n\
    \n![A437923_1_En_15_Fig6_HTML.jpg](A437923_1_En_15_Fig6_HTML.jpg)\n\nFigure 15-6.\
    \ User interface items based on the `NSTextField` class\n\n*   Label: Displays\
    \ text but does not allow the user to enter or edit text\n*   Text Field: Lets\
    \ the user enter and edit text\n*   Text Field with Number Formatter: Lets the\
    \ user enter and edit formatted numbers easily\n*   Wrapping Label: Displays text\
    \ on multiple lines\n*   Wrapping Text Field: Lets the user enter and edit text\
    \ that appears on multiple lines\n*   Text Field Cell: Lets you display text in\
    \ color in a cell such as in a table\n\n## User Interface Items That Restrict\
    \ Choices\n\nLetting the user enter data in a text field provides maximum flexibility.\
    \ However, this flexibility also means that your program has no idea what type\
    \ of data the user might enter. If a program expects the user to type in a number\
    \ for an age, but the user types in “forty-nine” instead, the program will likely\
    \ crash because it expects a number but received a word instead.\n\nEven worse,\
    \ a program could ask for someone’s age and a user could type a negative number\
    \ or an outrageously high number like 239, which is clearly impossible for someone’s\
    \ age. To insure that users enter in correct data, you can use a variety of different\
    \ user interface items that let the user choose a range of valid options. User\
    \ interface items that display text (including numbers) choices include\n\n* \
    \  Pop-Up Button (`NSPopUpButton`): Displays a menu of valid options\n*   Radio\
    \ Group (`NSButton`): Displays a list of radio buttons where only one can be chosen\
    \ at any given time\n*   Check Box (`NSButton`): Displays one or more check boxes\
    \ to let the user select multiple options\n*   Combo Box (`NSComboBox`): Acts\
    \ like a combination text field and pop-up button where the user can either type\
    \ in text or choose from a list of valid options\n\nUser interface items that\
    \ allow the user to select a range of valid numeric options include\n\n*   Date\
    \ Picker (`NSDatePicker`): Lets the user choose a date including day, month, and\
    \ year\n*   Horizontal/Vertical/Circular Slider (`NSSlider`): Lets the user move\
    \ a slider to select a fixed range of valid numeric values\n*   Stepper (`NSStepper`):\
    \ Increments or decrements a value by a fixed amount\n\nWith text options, you\
    \ need to list all valid options that the user can choose. With numeric options,\
    \ you just need to list a range of all valid options, such as letting the user\
    \ choose a number between 1 and 100."
