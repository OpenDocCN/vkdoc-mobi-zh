    \ bar. Notice that the text field displays “Clicked on = Save…”.  \n34.  Choose\
    \ **File** ➤ **Item** on your StoryMenu menu bar. Notice that the text field now\
    \ displays “Clicked on = Item”.  \n35.  Choose **StoryMenu** ➤ **Quit StoryMenu**.\n\
    \n## Summary\n\nWhen you create a Cocoa Application project, Xcode automatically\
    \ creates pull-down menus for your program. You can add, delete, or rearrange\
    \ menu titles on the menu bar or menu commands on the pull-down menus. For the\
    \ user’s convenience, you can even assign keystroke shortcuts to menu commands.\n\
    \nTo edit a pull-down menu, you can either edit it directly on the pull-down menu\
    \ or open the Document Outline. You can Control-drag from either the pull-down\
    \ menu commands or the Document Outline to connect menu commands to IBAction methods.\n\
    \nWhen working with `.storyboard` files, you typically connect menu commands to\
    \ the **First Responder** icon. Then you can implement the IBAction method in\
    \ the correct Swift file to make that menu command work. When working with `.xib`\
    \ files, you can directly connect menu commands to IBAction methods.\n\nWhen Xcode\
    \ creates pull-down menus for your Cocoa Application, many of those menu commands\
    \ already know how to work, such as **Window** ➤ **Zoom** and **File** ➤ **Close**.\
    \ However, most of the menu commands won’t do anything at all until you write\
    \ Swift code of your own to make them work properly in your particular program.\n\
    \nMenu commands on pull-down menus give you one more way to connect commands to\
    \ IBAction methods. Since most macOS programs rely on pull-down menus, focus first\
    \ on organizing your program commands into pull-down menus, then write the Swift\
    \ code to make each menu command actually work.\n\n# 23. Programming the Touch\
    \ Bar\n\nThe latest input device for Macintosh computers is the **Touch Bar**,\
    \ which appears above the keyboard where the row of function keys used to appear.\
    \ The **Touch Bar** displays contextual shortcuts depending on what you’re doing\
    \ at the time. For example, if you’re typing, the **Touch Bar** might display\
    \ suggested words that you can tap so you don’t have to type the entire word out.\
    \ If you’re editing a video, the **Touch Bar** lets you scroll back and forth\
    \ through the video.\n\nBecause the **Touch Bar** offers a new way to interact\
    \ with a Macintosh, all macOS programs will need to know how to display information\
    \ on the **Touch Bar**. The main key to programming for the **Touch Bar** is to\
    \ realize that not every Macintosh has a **Touch Bar**. This means you cannot\
    \ display any crucial information or commands on the **Touch Bar** that can’t\
    \ also be viewed on the screen at the same time.\n\nA second key feature of the\
    \ **Touch Bar** is to display shortcuts to commands the user will most likely\
    \ need at that particular time. If you’re editing text, the **Touch Bar** should\
    \ display text formatting shortcuts such as **Bold**, **Italic**, and **Underline**\
    \ commands. If you’re editing graphics, the **Touch Bar** should change and display\
    \ graphics editing shortcuts such as a button to choose different colors or change\
    \ the size of a drawing tool.\n\nThe key to the **Touch Bar** is making it adapt\
    \ to the user. When adding **Touch Bar** shortcuts to your own macOS program,\
    \ you need to:\n\n- Add a **Touch Bar** to a window in your program’s user interface\n\
    - Add buttons on your **Touch Bar**\n- Create a Swift file to control the window\
    \ that contains the **Touch Bar**\n- Connect **Touch Bar** buttons to IBAction\
    \ methods in your Swift file to make them do something\n\n**Note:** Even if your\
    \ Macintosh does not come with a **Touch Bar**, you can use the **Touch Bar**\
    \ simulator. To use the **Touch Bar** simulator, you must have Xcode 8.1 and higher\
    \ and macOS Sierra 10.12.1 or higher.\n\n## Adding a Touch Bar\n\nThe **Touch\
    \ Bar** is just another item in the Object Library that you can drag on to your\
    \ window. If you open the Object Library and type **touch** in the search field,\
    \ you can easily find the **Touch Bar** and all of the items you can add to it,\
    \ such as a button or a label (see Figure 23-1).\n\n![A437923_1_En_23_Fig1_HTML.jpg](A437923_1_En_23_Fig1_HTML.jpg)\n\
    \n**Figure 23-1.** The Object Library contains everything you can add to a **Touch\
    \ Bar**\n\nThe first step to adding a **Touch Bar** to your program is to drag\
    \ the **Touch Bar** item over the window controller (not the view controller),\
    \ as shown in Figure 23-2.\n\n![A437923_1_En_23_Fig2_HTML.jpg](A437923_1_En_23_Fig2_HTML.jpg)\n\
    \n**Figure 23-2.** Dragging the **Touch Bar** from the Object Library to a window\
    \ controller\n\nAs soon as you place the **Touch Bar** over the window controller,\
    \ it appears underneath, as shown in Figure 23-3. Now you need to create a Swift\
    \ class file to contain the Swift code to make the **Touch Bar** work.\n\n![A437923_1_En_23_Fig3_HTML.jpg](A437923_1_En_23_Fig3_HTML.jpg)\n\
    \n**Figure 23-3.** The **Touch Bar** as part of the user interface"
