    ### 多态性


    每个对象都由数据（存储在属性中）和操作这些数据的函数（称为方法）组成。通过继承，一个对象可以使用另一个对象中定义的属性和方法。然而，当某个函数（方法）需要执行不同的代码时，继承可能会引发问题。


    假设你正在开发一款电子游戏。你将汽车定义为一个对象，将怪物定义为第二个对象。如果怪物向汽车扔石头，那么石头就是第三个对象。为了让汽车、怪物和石头在屏幕上移动，你创建了一个名为
    `Move` 的方法。


    不幸的是，汽车在屏幕上的移动方式需要与怪物或扔出的石头不同。你可以创建三个函数，分别命名为 `MoveCar`、`MoveMonster` 和 `MoveRock`。然而，一个更简单的解决方案是让这三个函数都使用相同的名称，比如
    `Move`。


    在传统编程中，你绝不能给两个或更多的函数起相同的名称，因为计算机不知道你想运行哪个函数。但在面向对象编程中，由于多态性的存在，你可以使用重复的函数名。


    多态性允许你使用相同的方法名，但用不同的代码来替代它。多态性之所以有效，是因为每个 `Move` 函数（方法）都存储在不同的对象中——一个代表汽车的对象，一个代表怪物的对象，还有一个代表扔出的石头的对象。要运行每个
    `Move` 函数，你需要指明包含你想使用的 `Move` 函数的对象，例如：


    ```

    Car.Move

    Monster.Move

    Rock.Move

    ```


    通过同时指明你想要操作的对象以及你想要使用的函数，面向对象编程能够正确识别应运行哪一组指令，即使一个函数与另一个函数名称完全相同。


    本质上，多态性让你能够创建描述性的函数名，并在使用继承时随意地重复使用这个描述性的名称。


    封装、继承和多态性的结合构成了面向对象编程的基础。封装将程序的某一部分与另一部分隔离开来。继承允许你复用代码。多态性则允许你重用方法名称，但使用不同的代码。


    ## 理解编程语言


    编程语言不过是一种表达思想的特定方式，就像西班牙语、阿拉伯语、中文或英语等人类语言一样。计算机科学家创造编程语言是为了解决特定类型的问题。这意味着一种编程语言可能非常适合解决某一类问题，但在解决另一类问题时可能表现极差。


    最流行的编程语言是 C 语言，它被设计用于对计算机硬件进行底层访问。因此，C 语言非常适合创建操作系统、杀毒程序和硬盘加密程序。任何需要完全控制硬件的任务都是
    C 语言的绝佳应用场景。


    不幸的是，C 语言可能晦涩难懂且功能简练，因为它被设计为追求计算机的最大效率，而不考虑人类阅读、编写或修改 C 程序的效率。为了改进 C 语言，计算机科学家创建了
    C 的面向对象版本，即 C++。不久之后，出现了一个更精致的 C++ 版本，称为 Objective-C，这是苹果公司为 macOS 和 iOS 编程所采用的语言。


    由于 C 语言最初的设计目的是牺牲人类效率来换取计算机效率，因此包括 C++ 和 Objective-C 在内的所有 C 语言变体也可能难以学习、使用和理解。这就是为什么苹果公司创建了
    Swift。Swift 的目的是在提供 Objective-C 强大功能的同时，使其更易于学习、使用和理解。Swift 基本上是 Objective-C 的改进版本，而
    Objective-C 本身又是 C++ 的改进版本，C++ 则是 C 的改进版本。


    计算机编程的每一次演进都建立在先前的编程标准之上。当你用 Swift 编写程序时，你可以使用 Swift 的独特功能，同时结合面向对象编程、事件驱动编程、结构化编程以及编程的三大基本构件（顺序、循环和分支）。


    Swift 与所有计算机编程语言一样，包含一个固定的命令列表，称为关键字。为了告诉计算机做什么，你使用关键字来创建语句，这些语句使计算机执行单个任务。


    你已经见过 `print` 关键字，它用于打印文本，例如：


    ```

    print ("Hello, world!")

    ```


    这个 Swift 关键字是 `print`（意为打印）；然后你必须在括号内告诉关键字你要打印什么。就像学习人类语言需要首先学习用于书写字母的基本符号（如字母表或其他符号）一样，学习编程语言也需要首先学习该特定编程语言的关键字。


    尽管 Swift 包含数十个关键字，但你不必为了用 Swift 编写程序而一次性全部学会。你最初只需要学习少数几个关键字。随着你经验越来越丰富，你会逐渐需要学习更多的
    Swift 关键字。


    为了尽可能简化编程，Swift（像许多编程语言一样）使用看起来像普通英语单词的关键字，例如 `print` 或 `var`（variable 的缩写）。然而，许多编程语言也使用代表不同功能的符号。


    常见的符号是数学符号，如加法（`+`）、减法（`-`）、乘法（`*`）和除法（`/`）。


    为了标识协同工作的命令的起始和结束，Swift（像 C 语言一样）使用花括号将代码括起来，例如：


    ```

    {

    print ("This is a message");

    }

    ```


    与人类语言不同，你可能拼错单词或忘记在句子末尾加句号，而人们仍然能理解你的意思，但编程语言可没那么宽容。对于编程语言，每个关键字都必须拼写正确，每个符号都必须用在需要的地方。拼错一个关键字、用错符号或将正确的符号放在错误的位置，都会导致整个程序无法运行。


    编程语言是精确的。编程的关键在于编写。'
- fmt: '*   As little code as possible

    *   Code that does as much as possible

    *   Code that’s as easy to understand as possible.


    You want to write as little code as possible because the less code you write,
    the easier it will be to make sure that it works correctly.


    You want code that does as much as possible because this makes your program more
    capable of solving bigger problems.


    You want code that’s easy to understand because this makes it easy to fix problems
    and add features.


    Unfortunately, these three criteria are often at odds with one another, as shown
    in Figure [1-5](#A437923_1_En_1_Chapter.html#Fig5).


    ![A437923_1_En_1_Fig5_HTML.jpg](A437923_1_En_1_Fig5_HTML.jpg)


    Figure 1-5.


    The three, often contradictory, goals of programming


    If you write as little code as possible, this usually means your code can’t do
    much. This is why programmers often resort to shortcuts and programming tricks
    to condense the size of their code, but this then increases the complexity of
    their code, making it harder to understand.


    If you write code that does as much as possible, this usually means writing large
    numbers of commands, which makes the code harder to understand.


    If you write code that’s easy to understand, it usually won’t do much. If you
    write more code to make it do more, this makes it harder to understand.


    Ultimately, computer programming is more of an art than a science. In general,
    it’s better to focus on making code as easy to understand as possible because
    this will make it easier to fix problems and add new features. In addition, code
    that’s easy to understand means other programmers can fix and modify your program
    if you can’t do it.


    This is why Apple created `Swift`: to make code easier to understand than `Objective-C`
    without sacrificing the power of `Objective-C`. Despite being more powerful than
    `Objective-C`, `Swift` code can often be shorter than equivalent `Objective-C`
    code. For this reason, the future programming language of Apple will be `Swift`.


    ## The Cocoa Framework


    Keywords (and symbols) let you give instructions to a computer, but no programming
    language can provide every possible command you might need to create all types
    of programs. To provide additional commands, programmers use keywords to create
    functions that perform a specific task.


    When they create a useful function, they often save it in a library of other useful
    functions. When you write a program, you can use the programming language’s keywords
    plus any functions stored in libraries. By reusing functions stored in libraries,
    you can create more powerful and reliable code.


    For example, one library may contain functions for displaying graphics. Another
    library may contain functions for saving data to a disk and retrieving it again.
    Still another library may contain functions for calculating mathematical formulas.
    To make writing macOS and iOS programs easier, Apple has created a library framework
    of useful functions called the `Cocoa` framework.


    There are two reasons for reusing an existing framework. First, reusing a framework
    keeps you from having to write your own instructions to accomplish a task that
    somebody else has already solved. Not only does a framework provide a ready-made
    solution, but a framework has also been tested by others, so you can just use
    the framework and be assured that it will work correctly.


    A second reason to use an existing framework is for consistency. Apple provides
    frameworks for defining the appearance of a program on the screen, known as the
    user interface. This defines how a program should behave from displaying windows
    on the screen to letting you resize or close a window by clicking the mouse.


    It’s perfectly possible to write your own instructions for displaying windows
    on the screen, but chances are good that writing your own instructions will take
    time to create and test, and the end result will be a user interface that may
    not look or behave identically to other macOS or iOS programs.


    However, by reusing an existing framework, you can create your own program quickly
    and insure that your program behaves the same way that other programs behave.
    Although programming might sound complicated, Apple provides hundreds of prewritten
    and tested functions that help you create programs quickly and easily. All you
    have to do is write the custom instructions that make your program solve a specific,
    unique problem.


    To understand how Apple’s `Cocoa` framework works, you need to understand object-oriented
    programming for two reasons. First, `Swift` is an object-oriented programming
    language, so to take full advantage of `Swift`, you need to understand the advantages
    of object-oriented programming.


    Second, Apple’s `Cocoa` framework is based on object-oriented programming. To
    understand how to use the `Cocoa` framework, you need to use objects.


    Note


    The `Cocoa` framework is designed for creating macOS programs. A similar framework
    called `Cocoa Touch` is designed for creating iOS apps. Because the `Cocoa Touch`
    framework (iOS) is based on the `Cocoa` framework (macOS), they work similarly
    but offer different features.


    By relying on the `Cocoa` framework, your programs can gain new features each
    time Apple updates and improves the `Cocoa` framework. For example, spell-checking
    is a built-in feature of the `Cocoa` framework. If you write a program using the
    `Cocoa` framework, your programs automatically get spell-checking capabilities
    without you having to write any additional code whatsoever. When Apple improves
    the spell-checking feature in the `Cocoa` framework, your program automatically
    gets those improvements with no extra effort on your part.


    The `Cocoa` framework is a general term that describes all of Apple’s pre-written
    and tested libraries of code. Some different parts of the `Cocoa` framework can
    give your programs audio playing capabilities, graphics capabilities, contact
    information storage abilities such as names and addresses, and Internet capabilities.


    The `Cocoa` framework creates the foundation of a typical macOS program. All you
    have to do is write `Swift` code that makes your program unique.'
