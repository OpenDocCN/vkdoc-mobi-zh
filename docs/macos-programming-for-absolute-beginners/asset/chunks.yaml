  trans: '

    # 27. 调试你的程序


    在专业的软件开发领域中，你实际上会花费更多时间来修改现有程序，而不是创建新程序。然而，无论是编写新程序还是编辑现有程序，无论你拥有多少经验或受过多少教育，即便是最优秀的程序员也可能会犯错。事实上，你可以预料到，无论你多么小心，都难免会出错。一旦你接受了这个编程中不可避免的事实，你就可以学习如何发现并修复你的错误了。


    在计算机世界里，错误通常被称为“bug”（臭虫），这个名称源于早期使用物理开关工作的计算机的一次事故。有一天计算机出了故障，当技术人员打开计算机时，发现一只飞蛾被压扁在一个开关里，导致开关无法闭合。从那时起，编程错误就被称为
    bug，而修复计算机问题则被称为调试（debugging）。


    三种常见的计算机 bug 类型是：


    *   **语法错误**：当你拼错某些内容，例如关键字、变量名、函数名或类名，或者错误地使用了一个符号时发生。

    *   **逻辑错误**：当你正确使用了命令，但代码的逻辑并未实现你预期的效果时发生。

    *   **运行时错误**：当程序遇到意外情况时发生，例如用户输入了无效数据，或者其他程序意外地干扰了你的程序。


    语法错误最容易发现和修复，因为它们只是你创建的变量名拼写错误，或者是 Xcode 可以帮助你识别的 Swift 命令拼写错误。如果你输入一个 Swift 关键字，例如
    `var` 或 `let`，Xcode 会以粉红色（或你在 Xcode 编辑器中为关键字指定的任何颜色）显示该关键字。


    现在，如果你输入一个 Swift 关键字，但它没有以通常的标识颜色显示，那么你就知道自己可能输入有误。通过给代码着色，Xcode 的编辑器可以帮助你直观地识别常见的拼写错误或笔误。


    除了使用颜色之外，Xcode 编辑器还提供了第二种方法来帮助你在需要输入 Cocoa 框架中定义的方法或类名时避免错误。一旦 Xcode 识别出你可能正在输入
    Cocoa 框架中的内容，它就会弹出一个可能选项的菜单。现在，你无需自己输入整个命令，只需在弹出菜单中点击你的选择，然后按一次或多次 Tab 键，让 Xcode
    正确地输入你选择的命令，如图 27-1 所示。


    ![A437923_1_En_27_Fig1_HTML.jpg](img/A437923_1_En_27_Fig1_HTML.jpg)


    **图 27-1.** Xcode 显示一个你可能想要使用的命令菜单


    语法错误常常会使你的程序完全无法运行。当语法错误阻止程序运行时，Xcode 通常可以识别出程序中拼写错误的命令所在的行（或附近区域），以便你进行修复，如图
    27-2 所示。


    ![A437923_1_En_27_Fig2_HTML.jpg](img/A437923_1_En_27_Fig2_HTML.jpg)


    **图 27-2.** 语法错误通常会使程序无法运行，这使得 Xcode 能够识别出语法错误


    > **注意：** Swift 将大写和小写字母视为完全不同的字符。一个常见的错误是输入小写字母代替大写字母（或反之）。


    逻辑错误比语法错误更难发现和检测。Xcode 可以识别语法错误，因为它能识别拼写正确的 Swift 关键字（例如 `var`）和拼写错误的 Swift 关键字（例如
    `varr`）之间的区别。


    然而，逻辑错误发生在你正确使用了 Swift 代码，但代码并未按你预期的方式运行时。由于你的代码实际上是有效的，Xcode 无法知道它没有按你的预期工作。因此，逻辑错误可能难以调试，因为你认为自己编写的代码是正确的，但（显然）事实并非如此。


    你如何在一个自认为编写正确的代码中发现错误呢？发现错误通常需要从程序的开头开始，一直详查每一行直到结束。（当然，有比逐行搜索整个程序更快的方法，你将在本章后面学习到。）


    最后，最难发现和调试的错误是运行时错误。语法错误通常会使程序无法运行，因此，如果你的程序实际上能运行，你可以假设已经消除了代码中大部分（即使不是全部）语法错误。


    逻辑错误可能更难发现，但它们是可预测的。例如，如果你的程序要求用户输入密码，但即使用户输入了正确的密码，程序却未能授予用户访问权限，你就知道自己遇到了一个逻辑错误。每次运行程序时，你都能可靠地预测逻辑错误何时会发生。


    运行时错误则更加隐蔽，因为它们并非总是可预测地发生。例如，你的程序在你的计算机上可能运行得非常好，但当你将同一程序运行在一台完全相同的计算机上时，程序可能就会出错。这是因为两台不同计算机之间的条件永远不会完全相同。


    因此，同一个程序在一台计算机上运行良好，但在另一台相同类型的计算机上却可能出错。问题在于，意外的外部环境可能会影响程序的行为。例如，你的程序可能一直运行正常，直到用户按下数字小键盘上的数字键，而不是字母数字键区顶部的数字键。


    即使用户输入的是完全相同的数字（例如 5），程序可能会将位于 R 和 T 键上方的 5 键视为与数字小键盘上的 5 键完全不同的键。尽管这可能很细微，但足以导致程序失败或崩溃。


    由于运行时错误并不总能复现，它们可能令人沮丧地难以发现，甚至更难修复，因为你无法总是检查程序在其他计算机上运行时可能面临的每一种情况。有些程序已知可以完美运行，除非用户意外同时按下了两个键。其他程序则运行良好，直到用户恰好在另一个程序试图通过互联网接收电子邮件的那一刻保存了文件。


    通常您可以消除大多数语法错误，并发现和修复大多数逻辑错误。然而，可能无法发现并完全消除程序中的所有运行时错误。避免花费时间寻找 bug 的最佳方法是努力编写良好的代码，并仔细测试，以确保它尽可能没有错误。'
- fmt: "# Simple Debugging Techniques\n\nWhen your program isn’t working, you often\
    \ have no idea what could be wrong. While you could tediously examine your code\
    \ from beginning to end, it’s often faster to simply guess where the mistake might\
    \ be.\n\nOnce you have a rough idea what part of your program might be causing\
    \ the problem, you have two choices. First, you can delete the suspicious code\
    \ and run your program again. If the problem magically goes away, then you’ll\
    \ know that the code you deleted was likely the culprit.\n\nHowever, if your program\
    \ still doesn’t work, you have to retype your deleted code back into your program.\
    \ A simpler solution might be to cut and paste the code out of Xcode and store\
    \ it in a text editor such as the TextEdit program that comes with every Macintosh,\
    \ but this can be tedious.\n\nThat’s why a second solution is to just temporarily\
    \ hide code that you suspect might be causing a problem. Then, if the problem\
    \ persists, you can simply unhide that code and make it visible again. To do this\
    \ in Xcode, you just need to turn your code into comments.\n\nRemember, comments\
    \ are text that Xcode completely ignores. You can create comments in three ways:\n\
    \n- Add the `//` symbols at the beginning of each line that you want to convert\
    \ into a comment. This method lets you convert a single line into a comment.\n\
    - Add the `/*` symbols at the beginning of code and add the `*/` symbols at the\
    \ end of code you want to convert into a comment. This method lets you convert\
    \ one or more lines into a comment.\n- Select the lines of code you want to turn\
    \ into a comment and choose Editor ➤ Structure ➤ Comment Selection (or press Command\
    \ + `/`). This method lets you convert one or more lines into a comment by placing\
    \ the `//` symbols at the beginning of each line of code you selected.\n\n**Note**:\
    \ Xcode color codes comments in green (or whatever color you defined to identify\
    \ comments). After creating a comment, make sure Xcode color codes it properly\
    \ to insure you have created a comment. If Xcode fails to recognize your comments,\
    \ it will treat your text as a valid Swift command, which will likely keep your\
    \ program from running properly.\n\nBy turning code into comments, you essentially\
    \ hide that code from Xcode. Now if you want to turn that comment back into code\
    \ again, you just remove the `//` or `/*` and `*/` symbols that define your commented-out\
    \ code.\n\nIf you commented out code by choosing Editor ➤ Structure ➤ Comment\
    \ Selection (or pressing Command + `/`), just choose Editor ➤ Structure ➤ Uncomment\
    \ Selection (or press Command + `/` again) to convert that commented code back\
    \ to working code once more.\n\nBesides turning your code into comments to temporarily\
    \ hide it, a second simple debugging technique is to use the `print` command.\
    \ The idea is to put the `print` command in your code to print out the values\
    \ of a variable.\n\nBy doing this, you can see what values one or more variables\
    \ may contain. Putting multiple `print` commands throughout your program gives\
    \ you a chance to make sure your program is running correctly.\n\nTo see how using\
    \ the `print` command along with commenting out code can work to help you debug\
    \ a program, follow these steps:\n\n1. From within Xcode choose File ➤ New ➤ Project.\n\
    2. Click Application under the macOS category.\n3. Click Cocoa Application and\
    \ click the Next button. Xcode now asks for a product name.\n4. Click in the Product\
    \ Name text field and type `DebugProgram`.\n5. Make sure the Language pop-up menu\
    \ displays Swift and that the “Use Storyboards” check box is selected.\n6. Click\
    \ the Next button. Xcode asks where you want to store the project.\n7. Choose\
    \ a folder to store your project and click the Create button.\n8. Click the `AppDelegate.swift`\
    \ file in the Project Navigator. The contents of the `AppDelegate.swift` file\
    \ appear.\n9. Edit the `applicationDidFinishLaunching` method as follows:\n\n\
    ```\nfunc applicationDidFinishLaunching(_ aNotification: Notification) {\n   \
    \ var myMessage = \"Temperature in Celsius:\"\n    let temp = 100.0\n    print\
    \ (myMessage + \"\\(temp)\")\n    myMessage = \"Temperature in Fahrenheit:\"\n\
    \    print (myMessage + \"\\(C2F(tempC: temp))\")\n}\n```\n\n10. Directly above\
    \ this function, add the following code:\n\n```\nfunc C2F (tempC : Double) ->\
    \ Double {\n    var tempF : Double\n    tempF = tempC + 32 * 9/5\n    return tempF\n\
    }\n```\n\n11. Choose Product ➤ Run. Your program’s user interface appears (which\
    \ is blank).\n12. Choose DebugProgram ➤ Quit DebugProgram. Xcode appears. If you\
    \ look in the bottom of the Xcode window in the Debug Area, you can see what your\
    \ two `print` commands printed, which is “Temperature in Celsius: 100.0” and “Temperature\
    \ in Fahrenheit: 157.6”, as shown in Figure 27-3.\n\n![A437923_1_En_27_Fig3_HTML.jpg](A437923_1_En_27_Fig3_HTML.jpg)\n\
    \n**Figure 27-3.** The `print` command displays text in the debug area of the\
    \ Xcode window\n\nTo view or hide the debug area, you have three options:\n\n\
    - Click the View/Hide Debug Area icon in the upper right corner of the Xcode window.\n\
    - Choose View ➤ Debug Area ➤ Show/Hide Debug Area.\n- Press Shift + Command +\
    \ Y.\n\nBy peeking in the debug area, you can see what the `print` commands have\
    \ displayed. If you know anything about temperatures in Fahrenheit and Celsius,\
    \ you know that the boiling point in Celsius is 100 degrees and the boiling point\
    \ in Fahrenheit is 212 degrees. Yet your temperature conversion program calculates\
    \ that 100 degrees Celsius is equal to 157.6 degrees in Fahrenheit, which means\
    \ the Fahrenheit temperature should be closer to 212 than 157.6. Obviously something\
    \ is wrong, so let’s use the `print` command and comments to help debug the problem.\n\
    \n1. Make sure the DebugProgram project is loaded in Xcode.\n2. Click the `AppDelegate.swift`\
    \ file in the Project Navigator pane.\n3. Edit the `C2F` function by typing the\
    \ `//` symbols to the left of the `*` symbol (multiplication sign) as follows:\n\
    \n```\nfunc C2F (tempC : Double) -> Double {\n    var tempF : Double\n    tempF\
    \ = tempC + 32 //* 9/5\n    return tempF\n}\n```\n\nThis comment will let you\
    \ check if the `tempC` parameter is properly coming into the `C2F` function and\
    \ getting stored in the `tempF` variable.\n\n4. Add a `print (tempC)` command\
    \ above the `return` statement as follows:\n\n```\nfunc C2F (tempC : Double) ->\
    \ Double {\n    var tempF : Double\n    tempF = tempC + 32 //* 9/5\n    print\
    \ (tempF)\n    return tempF\n}\n```\n\n5. Choose Product ➤ Run. The blank user\
    \ interface of your program appears.\n6. Choose DebugProgram ➤ Quit DebugProgram.\
    \ Xcode appears again, displaying the result in the Debug Area, which prints:\n\
    \n`Temperature in Celsius: 100.0 132.0 Temperature in Fahrenheit: 132.0`\n\nBy\
    \ commenting out the calculation part of the code and using the `print (tempF)`\
    \ command, you can see that the `C2F` function is storing 100.0 correctly in the\
    \ `tempC` variable and adding 32 to this value before storing it in the `tempF`\
    \ variable. Because you commented out the calculation part of the code, you can\
    \ assume that the error must be in your commented-out portion of the code.\n\n\
    Although the formula might look correct, the error occurs because of the way Swift\
    \ (and most programming languages) calculate formulas. First, they start from\
    \ left to right. Second, they calculate certain operations such as multiplication\
    \ before addition. The error occurs because your conversion formula first multiplies\
    \ 32 by 9 (288), and then divides the result (288) by 5 to get 57.6. Finally,\
    \ it adds 57.6 to 100.0 to get the incorrect result of 157.6. What it should really\
    \ be doing is multiplying 9/5 by the temperature in Celsius and then adding 32\
    \ to the result.\n\n7. Modify the `C2F` function as follows:\n\n```\nfunc C2F\
    \ (tempC : Double) -> Double {\n    var tempF : Double\n    tempF = tempC * (9/5)\
    \ + 32\n    print (tempF)\n    return tempF\n}\n```"
  raw: "## Simple Debugging Techniques\n\nWhen your program isn’t working, you often\
    \ have no idea what could be wrong. While you could tediously examine your code\
    \ from beginning to end, it’s often faster to simply guess where the mistake might\
    \ be.\n\nOnce you have a rough idea what part of your program might be causing\
    \ the problem, you have two choices. First, you can delete the suspicious code\
    \ and run your program again. If the problem magically goes away, then you’ll\
    \ know that the code you deleted was likely the culprit.\n\nHowever, if your program\
    \ still doesn’t work, you have to retype your deleted code back into your program.\
    \ A simpler solution might be to cut and paste the code out of Xcode and store\
    \ it in a text editor such as the TextEdit program that comes with every Macintosh,\
    \ but this can be tedious.\n\nThat’s why a second solution is to just temporarily\
    \ hide code that you suspect might be causing a problem. Then, if the problem\
    \ persists, you can simply unhide that code and make it visible again. To do this\
    \ in Xcode, you just need to turn your code into comments.\n\nRemember, comments\
    \ are text that Xcode completely ignores. You can create comments in three ways:\n\
    \n*   Add the // symbols at the beginning of each line that you want to convert\
    \ into a comment. This method lets you convert a single line into a comment.\n\
    *   Add the /* symbols at the beginning of code and add the */ symbols at the\
    \ end of code you want to convert into a comment. This method lets you convert\
    \ one or more lines into a comment.\n*   Select the lines of code you want to\
    \ turn into a comment and choose Editor ➤ Structure ➤ Comment Selection (or press\
    \ Command + /). This method lets you convert one or more lines into a comment\
    \ by placing the // symbols at the beginning of each line of code you selected.\n\
    \nNote\n\nXcode color codes comments in green (or whatever color you defined to\
    \ identify comments). After creating a comment, make sure Xcode color codes it\
    \ properly to insure you have created a comment. If Xcode fails to recognize your\
    \ comments, it will treat your text as a valid Swift command, which will likely\
    \ keep your program from running properly.\n\nBy turning code into comments, you\
    \ essentially hide that code from Xcode. Now if you want to turn that comment\
    \ back into code again, you just remove the // or /* and */ symbols that define\
    \ your commented-out code.\n\nIf you commented out code by choosing Editor ➤ Structure\
    \ ➤ Comment Selection (or pressing Command + /), just choose Editor ➤ Structure\
    \ ➤ Uncomment Selection (or press Command + / again) to convert that commented\
    \ code back to working code once more.\n\nBesides turning your code into comments\
    \ to temporarily hide it, a second simple debugging technique is to use the `print`\
    \ command. The idea is to put the `print` command in your code to print out the\
    \ values of a variable.\n\nBy doing this, you can see what values one or more\
    \ variables may contain. Putting multiple `print` commands throughout your program\
    \ gives you a chance to make sure your program is running correctly.\n\nTo see\
    \ how using the `print` command along with commenting out code can work to help\
    \ you debug a program, follow these steps\n\n1.  From within Xcode choose File\
    \ ➤ New ➤ Project.  \n2.  Click Application under the macOS category.  \n3.  Click\
    \ Cocoa Application and click the Next button. Xcode now asks for a product name.\
    \  \n4.  Click in the Product Name text field and type DebugProgram.  \n5.  Make\
    \ sure the Language pop-up menu displays Swift and that the “Use Storyboards”\
    \ check box is selected.  \n6.  Click the Next button. Xcode asks where you want\
    \ to store the project.  \n7.  Choose a folder to store your project and click\
    \ the Create button.  \n8.  Click the `AppDelegate.swift` file in the Project\
    \ Navigator. The contents of the `AppDelegate.swift` file appear.  \n9.  Edit\
    \ the `applicationDidFinishLaunching` method as follows:\n\n```\n    func applicationDidFinishLaunching(_\
    \ aNotification: Notification) {\n    var myMessage = \"Temperature in Celsius:\"\
    \n    let temp = 100.0\n    print (myMessage + \"\\(temp)\")\n    myMessage =\
    \ \"Temperature in Fahrenheit:\"\n    print (myMessage + \"\\(C2F(tempC: temp))\"\
    )\n    }\n    ```\n\n10.  Directly above this function, add the following code:\n\
    \n```\n    func C2F (tempC : Double) -> Double {\n    var tempF : Double\n   \
    \ tempF = tempC + 32 * 9/5\n    return tempF\n    }\n    ```\n\n11.  Choose Product\
    \ ➤ Run. Your program’s user interface appears (which is blank).  \n12.  Choose\
    \ DebugProgram ➤ Quit DebugProgram. Xcode appears. If you look in the bottom of\
    \ the Xcode window in the Debug Area, you can see what your two `print` commands\
    \ printed, which is “Temperature in Celsius: 100.0” and “Temperature in Fahrenheit:\
    \ 157.6”, as shown in Figure [27-3](#A437923_1_En_27_Chapter.html#Fig3).\n\n![A437923_1_En_27_Fig3_HTML.jpg](A437923_1_En_27_Fig3_HTML.jpg)\n\
    \nFigure 27-3.\n\nThe print command displays text in the debug area of the Xcode\
    \ window\n\nTo view or hide the debug area, you have three options:\n\n*   Click\
    \ the View/Hide Debug Area icon in the upper right corner of the Xcode window.\n\
    *   Choose View ➤ Debug Area ➤ Show/Hide Debug Area.\n*   Press Shift + Command\
    \ + Y.\n\nBy peeking in the debug area, you can see what the `print` commands\
    \ have displayed. If you know anything about temperatures in Fahrenheit and Celsius,\
    \ you know that the boiling point in Celsius is 100 degrees and the boiling point\
    \ in Fahrenheit is 212 degrees. Yet your temperature conversion program calculates\
    \ that 100 degrees Celsius is equal to 157.6 degrees in Fahrenheit, which means\
    \ the Fahrenheit temperature should be closer to 212 than 157.6\\. Obviously something\
    \ is wrong, so let’s use the `print` command and comments to help debug the problem.\n\
    \n1.  Make sure the DebugProgram project is loaded in Xcode.  \n2.  Click the\
