  trans: "\n### 在结构中存储和检索项目\n\n结构体让你能定义要存储的相关数据的类型。然后你需要创建一个变量名来代表该结构体。要使用结构体存储数据，你需要指定用句点分隔的结构体名称和变量名，如下所示：\n\
    \n```\n结构体变量.变量名 = 值\n```\n\n要从结构体中检索数据，你可以将一个变量赋值给结构体的变量，如下所示：\n\n```\nvar 变量名\
    \ = 结构体变量.变量名\n```\n\n要了解如何创建结构体、初始化其属性、以及添加和检索数据，请按照以下步骤创建一个新的 Playground：\n\n\
    1.  确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。\n2.  按如下方式编辑代码：\n\n    ```\n\
    \    import Cocoa\n    struct Pet {\n    var name : String = \"\"\n    var age\
    \ : Int = 0\n    }\n    var dog = Pet()\n    dog.name = \"Fido\"\n    dog.age\
    \ = 4\n    print (dog.name)\n    print (dog.age)\n    struct Person {\n    var\
    \ name : String\n    var email : String\n    var phone : String\n    init (name:\
    \ String, email: String, phone: String) {\n    self.name = name\n    self.email\
    \ = email\n    self.phone = phone\n    }\n    }\n    var workers = Person(name:\
    \ \"Sue\", email: \"sdk@aol.com\", phone: \"555-1234\")\n    let boss = workers.name\n\
    \    print (boss)\n    workers.name = \"Bo\"\n    print (workers.email)\n    print\
    \ (workers.phone)\n    ```\n\n第一个结构体为其属性定义了初始值，因此不需要 `init` 函数。这就是为什么你可以用空括号创建一个变量，如下所示：\n\
    \n```\nvar dog = pet()\n```\n\n第二个结构体没有为其属性定义初始值，因此当你创建一个变量来表示该结构体时，你必须定义初始值：\n\
    \n```\nvar workers = person(name: \"Sue\", email: \"sdk@aol.com\", phone: \"555-1234\"\
    )\n```\n\n要在结构体中存储数据，你需要指定代表该结构体的变量名，后跟属性名，如图 12-2 所示。\n\n![A437923_1_En_12_Fig2_HTML.jpg](img/A437923_1_En_12_Fig2_HTML.jpg)\n\
    \n图 12-2. 创建结构体并检索数据\n\n## 组合数据结构\n\n在最简单的层面上，你可以使用可用的基本数据类型（`Int`、`Float`、`Double`、`String`）。为了获得更大的灵活性，你可以组合数据结构。例如，数组通常包含单一值的列表，如整数或字符串。一种常见的组合是创建一个结构体数组，它可以包含相关的信息列表，如姓名和地址，如图\
    \ 12-3 所示。\n\n![A437923_1_En_12_Fig3_HTML.jpg](img/A437923_1_En_12_Fig3_HTML.jpg)\n\
    \n图 12-3. 结构体数组可以保存相关数据\n\n通过组合不同的数据结构，你可以创建独特的方式来组织数据，例如集合的数组、包含数组的字典，或元组结构体。任何你可以使用\
    \ `Int` 或 `String` 等数据类型的地方，你也可以使用数组、集合或字典等数据结构。\n\n一种常见的组合是包含结构体的数组。单独使用时，结构体只能保存有限数量的数据。而结构体数组则像一个简单的数据库。结构体定义了要存储的关于一个人的信息类型，例如姓名、地址和年龄，而数组则保存了这些数据的多个副本。\n\
    \n为了演示如何创建结构体数组，你将创建一个程序，允许你输入多个姓名、地址和电话号码，并且还能删除数据。\n\n1.  在 Xcode 中选择“文件” ➤\
    \ “新建” ➤ “项目”。\n2.  在 macOS 类别下，点击“应用程序”。\n3.  点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode\
    \ 现在会要求输入产品名称。\n4.  在“产品名称”文本字段中点击，并输入 `StructureProgram`。\n5.  确保“语言”弹出菜单显示 Swift，并且没有勾选任何复选框。\n\
    6.  点击“下一步”按钮。Xcode 会询问你想在哪里存储项目。\n7.  选择一个文件夹来存储你的项目，然后点击“创建”按钮。\n8.  在项目导航器中点击\
    \ `MainMenu.xib` 文件。\n9.  点击 `StructureProgram` 图标，使用户界面窗口显示出来。\n10.  选择“视图” ➤\
    \ “工具” ➤ “显示对象库”，让对象库出现在 Xcode 窗口的右下角。\n11.  将两个按钮、四个标签和四个文本字段拖到用户界面上，然后双击按钮和标签更改其上显示的文本，使其看起来类似于图\
    \ 12-4。\n\n![A437923_1_En_12_Fig4_HTML.jpg](img/A437923_1_En_12_Fig4_HTML.jpg)\n\
    \n图 12-4. `StructureProgram` 的用户界面\n\n在适当的文本字段中输入姓名、地址和电话号码后，“添加”按钮会将此信息存储到一个结构体中，然后将该结构体存储到一个数组中。每次你添加另一个姓名、地址和电话号码时，都会向数组添加另一个结构体，同时“姓名总数”文本字段会持续更新显示数组中存储的结构体总数。\n\
    \n“视图”按钮会从数组中移除最后一项，并在一个警告对话框中显示其内容，以便你验证其内容。然后它会显示数组中新的结构体总数。\n\n每个文本字段都需要一个单独的\
    \ `IBOutlet`，每个按钮都需要一个单独的 `IBAction` 方法。你可以通过从用户界面按住 Control 键拖动每个项目到你的 `AppDelegate.swift`\
    \ 文件中来创建这些。\n"
- fmt: "1.  在你的用户界面仍然显示在 Xcode 窗口中的情况下，选择 View ➤ Assistant Editor ➤ Show Assistant\
    \ Editor。`AppDelegate.swift`文件会出现在用户界面旁边。\n2.  将鼠标移到 Add 按钮上，按住 Control 键，然后向下拖动到`AppDelegate.swift`文件底部最后一个右花括号的正上方。\n\
    3.  松开鼠标和 Control 键。会弹出一个窗口。\n4.  点击 Connection 弹出菜单，然后选择 Action。\n5.  点击 Name\
    \ 文本字段，输入`addData`。\n6.  点击 Type 弹出菜单，然后选择 NSButton。接着点击 Connect 按钮。\n7.  将鼠标移到\
    \ View 按钮上，按住 Control 键，然后向下拖动到`AppDelegate.swift`文件底部最后一个右花括号的正上方。\n8.  松开鼠标和\
    \ Control 键。会弹出一个窗口。\n9.  点击 Connection 弹出菜单，然后选择 Action。\n10. 点击 Name 文本字段，输入`viewButton`。\n\
    11. 点击 Type 弹出菜单，然后选择 NSButton。接着点击 Connect 按钮。`AppDelegate.swift`文件的底部应该看起来像这样：\n\
    \n```\n    @IBAction func addData(_ sender: NSButton) {\n    }\n    @IBAction\
    \ func viewData(_ sender: NSButton) {\n    }\n    ```\n\n12. 将鼠标移到 Add 按钮右侧的 Name\
    \ 文本字段上，按住 Control 键，然后向下拖动到`AppDelegate.swift`文件中`@IBOutlet`行的下方。\n13. 松开鼠标和\
    \ Control 键。会弹出一个窗口。\n14. 点击 Name 文本字段，输入`nameField`，然后点击 Connect 按钮。\n15. 将鼠标移到\
    \ Add 按钮右侧的 Address 文本字段上，按住 Control 键，然后向下拖动到`AppDelegate.swift`文件中`@IBOutlet`行的下方。\n\
    16. 松开鼠标和 Control 键。会弹出一个窗口。\n17. 点击 Name 文本字段，输入`addressField`，然后点击 Connect 按钮。\n\
    18. 将鼠标移到 Delete 按钮右侧的 Phone 文本字段上，按住 Control 键，然后向下拖动到`AppDelegate.swift`文件中`@IBOutlet`行的下方。\n\
    19. 松开鼠标和 Control 键。会弹出一个窗口。\n20. 点击 Name 文本字段，输入`phoneField`，然后点击 Connect 按钮。\n\
    21. 将鼠标移到 Query 按钮右侧的 Total Names 文本字段上，按住 Control 键，然后向下拖动到`AppDelegate.swift`文件中`@IBOutlet`行的下方。\n\
    22. 松开鼠标和 Control 键。会弹出一个窗口。\n23. 点击 Name 文本字段，输入`totalField`，然后点击 Connect 按钮。现在你应该拥有代表用户界面上所有文本字段的以下\
    \ IBOutlets：\n\n```\n    @IBOutlet weak var window: NSWindow!\n    @IBOutlet weak\
    \ var nameField: NSTextField!\n    @IBOutlet weak var addressField: NSTextField!\n\
    \    @IBOutlet weak var phoneField: NSTextField!\n    @IBOutlet weak var totalField:\
    \ NSTextField!\n    ```\n\n至此，你已经将用户界面连接到 Swift 代码，这样你就可以使用 IBOutlets 来检索和显示用户界面上的数据。你还创建了\
    \ IBAction 方法，以便用户界面上的按钮能真正使程序工作。现在你只需要编写 Swift 代码来创建一个初始结构，然后再编写更多 Swift 代码来创建一个包含该结构的数组。\n\
    24. 在`AppDelegate.swift`文件中`@IBOutlet`列表的下方，输入以下内容来创建一个能包含三个字符串（name、address 和\
    \ phone）的结构、一个代表该结构的变量以及一个结构数组：\n\n```\n    struct Person {\n    var name : String\
    \ = \"\"\n    var address : String = \"\"\n    var phone : String = \"\"\n   \
    \ }\n    var employee = Person()\n    var arrayOfStructures = [Person] ()\n  \
    \  ```\n\n25. 修改`addData` IBAction 方法，使其从 Name、Address 和 Phone 文本字段获取值，并将它们存储在`employee`结构中。然后将该结构存储到数组中，在\
    \ Total Names 文本字段中显示数组项的总数，并清空 Name、Address 和 Phone 文本字段：\n\n```\n    @IBAction\
    \ func addData(_ sender: NSButton) {\n    employee.name = nameField.stringValue\n\
    \    employee.address = addressField.stringValue\n    employee.phone = phoneField.stringValue\n\
    \    arrayOfStructures.append(employee)\n    totalField.integerValue = arrayOfStructures.count\n\
    \    nameField.stringValue = \"\"\n    addressField.stringValue = \"\"\n    phoneField.stringValue\
    \ = \"\"\n    }\n    ```\n\n26. 修改`viewData` IBAction 方法，使其从 Key 文本字段获取一个值，并从字典中删除关联的值，如下所示：\n\
    \n```\n    @IBAction func viewData(_ sender: NSButton) {\n    let myAlert = NSAlert()\n\
    \    if arrayOfStructures.isEmpty {\n    myAlert.messageText = \"Array is empty\"\
    \n    myAlert.runModal()\n    } else {\n    var personData = Person()\n    personData\
    \ = (arrayOfStructures.removeLast())\n    totalField.integerValue = arrayOfStructures.count\n\
    \    myAlert.messageText = personData.name + \"\\r\\n\" + personData.address +\
    \ \"\\r\\n\" + personData.phone\n    myAlert.runModal()\n    }\n    }\n    ```\n\
    \n`viewData` IBAction 方法中的代码创建了一个警报对话框。然后它检查数组是否为空。如果是，它会在警报对话框中显示 \"Array is\
    \ empty\"。\n\n如果数组不为空，则移除数组中存储的最后一个结构，在 Total Names 文本字段中显示数组项的新总数，并在警报对话框中显示被移除的结构数据。\n\
    \n`AppDelegate.swift`文件的完整内容应该看起来像这样：\n\n```\nimport Cocoa\n@NSApplicationMain\n\
    class AppDelegate: NSObject, NSApplicationDelegate {\n@IBOutlet weak var window:\
    \ NSWindow!\n@IBOutlet weak var nameField: NSTextField!\n@IBOutlet weak var addressField:\
    \ NSTextField!\n@IBOutlet weak var phoneField: NSTextField!\n@IBOutlet weak var\
    \ totalField: NSTextField!\nstruct Person {\nvar name : String = \"\"\nvar address\
    \ : String = \"\"\nvar phone : String = \"\"\n}\nvar employee = Person()\nvar\
    \ arrayOfStructures = [Person] ()\nfunc applicationDidFinishLaunching(_ aNotification:\
    \ Notification) {\n// Insert code here to initialize your application\n}\nfunc\
    \ applicationWillTerminate(_ aNotification: Notification) {\n// Insert code here\
    \ to tear down your application\n}\n@IBAction func addData (_ sender: NSButton)\
    \ {\nemployee.name = nameField.stringValue\nemployee.address = addressField.stringValue\n\
    employee.phone = phoneField.stringValue\narrayOfStructures.append(employee)\n\
    totalField.integerValue = arrayOfStructures.count\nnameField.stringValue = \"\"\
    \naddressField.stringValue = \"\"\nphoneField.stringValue = \"\"\n}\n@IBAction\
    \ func viewData(_ sender: NSButton) {\nlet myAlert = NSAlert()\nif arrayOfStructures.isEmpty\
    \ {\nmyAlert.messageText = \"Array is empty\"\nmyAlert.runModal()\n} else {\n\
    var personData = Person()\npersonData = (arrayOfStructures.removeLast())\ntotalField.integerValue\
    \ = arrayOfStructures.count\nmyAlert.messageText = personData.name + \"\\r\\n\"\
    \ + personData.address + \"\\r\\n\" + personData.phone\nmyAlert.runModal()\n}\n\
    }\n}\n```\n\n要查看这个程序如何工作，请遵循以下步骤：\n\n1.  选择 Product ➤ Run。Xcode 运行你的 StructureProgram\
    \ 项目。\n2.  点击 Name 文本字段，输入 Bob。\n3.  点击 Address 文本字段，输入 123 Main。\n4.  点击 Phone\
    \ 文本字段，输入 555-1234。\n5.  点击 Add 按钮。程序在 Total Names 文本字段中显示数组中的项目数量（1）。\n6.  重复步骤\
    \ 2–5，但输入名字 Jane、地址 90 Oak Lane 和电话号码 555-9874。Total Names 文本字段中会显示数字 2。\n7. \
    \ 点击 View 按钮。会出现一个警报对话框，显示 Jane、90 Oak Lane 和 555-9874，如图 [12-5](#A437923_1_En_12_Chapter.html#Fig5)\
    \ 所示。"
  raw: "1.  With your user interface still visible in the Xcode window, choose View\
    \ ➤ Assistant Editor ➤ Show Assistant Editor. The `AppDelegate.swift` file appears\
    \ next to the user interface.  \n2.  Move the mouse over the Add button, hold\
    \ down the Control key, and drag just above the last curly bracket at the bottom\
    \ of the `AppDelegate.swift` file.  \n3.  Release the mouse and the Control key.\
    \ A pop-up window appears.  \n4.  Click in the Connection pop-up menu and choose\
    \ Action.  \n5.  Click in the Name text field and type addData.  \n6.  Click in\
    \ the Type pop-up menu and choose NSButton. Then click the Connect button.  \n\
    7.  Move the mouse over the View button, hold down the Control key, and drag just\
    \ above the last curly bracket at the bottom of the `AppDelegate.swift` file.\
    \  \n8.  Release the mouse and the Control key. A pop-up window appears.  \n9.\
    \  Click in the Connection pop-up menu and choose Action.  \n10.  Click in the\
    \ Name text field and type viewButton.  \n11.  Click in the Type pop-up menu and\
    \ choose NSButton. Then click the Connect button. The bottom of the `AppDelegate.swift`\
    \ file should look like this:\n\n```\n    @IBAction func addData(_ sender: NSButton)\
    \ {\n    }\n    @IBAction func viewData(_ sender: NSButton) {\n    }\n    ```\n\
    \n12.  Move the mouse over the Name text field that appears to the right of the\
    \ Add button, hold down the Control key, and drag below the `@IBOutlet` line in\
    \ the `AppDelegate.swift` file.  \n13.  Release the mouse and the Control key.\
    \ A pop-up window appears.  \n14.  Click in the Name text field and type nameField\
    \ and click the Connect button.  \n15.  Move the mouse over the Address text field\
    \ that appears to the right of the Add button, hold down the Control key, and\
    \ drag below the `@IBOutlet` line in the `AppDelegate.swift` file.  \n16.  Release\
    \ the mouse and the Control key. A pop-up window appears.  \n17.  Click in the\
    \ Name text field and type addressField and click the Connect button.  \n18. \
    \ Move the mouse over the Phone text field that appears to the right of the Delete\
    \ button, hold down the Control key, and drag below the `@IBOutlet` line in the\
    \ `AppDelegate.swift` file.  \n19.  Release the mouse and the Control key. A pop-up\
    \ window appears.  \n20.  Click in the Name text field and type phoneField and\
    \ click the Connect button.  \n21.  Move the mouse over the Total Names text field\
    \ that appears to the right of the Query button, hold down the Control key, and\
    \ drag below the `@IBOutlet` line in the `AppDelegate.swift` file.  \n22.  Release\
    \ the mouse and the Control key . A pop-up window appears.  \n23.  Click in the\
    \ Name text field and type totalField and click the Connect button. You should\
    \ now have the following IBOutlets that represent all the text fields on your\
    \ user interface:\n\n```\n    @IBOutlet weak var window: NSWindow!\n    @IBOutlet\
    \ weak var nameField: NSTextField!\n    @IBOutlet weak var addressField: NSTextField!\n\
    \    @IBOutlet weak var phoneField: NSTextField!\n    @IBOutlet weak var totalField:\
    \ NSTextField!\n    ```\n\nAt this point, you’ve connected the user interface\
    \ to your Swift code so you can use the IBOutlets to retrieve and display data\
    \ on the user interface. You've also created the IBAction methods so the push\
    \ buttons on the user interface will make the program actually work. Now you just\
    \ need to write Swift code to create an initial structure and then write more\
    \ Swift code to create an array that holds that structure.  \n24.  Underneath\
    \ the IBOutlet list in the `AppDelegate.swift` file, type the following to create\
    \ a structure that can hold three strings, a name, address, and phone number;\
    \ a variable that represents the structure; and an array of structures:\n\n```\n\
    \    struct Person {\n    var name : String = \"\"\n    var address : String =\
    \ \"\"\n    var phone : String = \"\"\n    }\n    var employee = Person()\n  \
    \  var arrayOfStructures = [Person] ()\n    ```\n\n25.  Modify the `addData` IBAction\
    \ method so it takes a value from the Name, Address, and Phone text fields and\
    \ stores them in the employee structure. Then it stores that structure in an array,\
    \ displays the total number of array items in the Total Names text field, and\
    \ clears the Name, Address, and Phone text fields:\n\n```\n    @IBAction func\
    \ addData(_ sender: NSButton) {\n    employee.name = nameField.stringValue\n \
    \   employee.address = addressField.stringValue\n    employee.phone = phoneField.stringValue\n\
    \    arrayOfStructures.append(employee)\n    totalField.integerValue = arrayOfStructures.count\n\
    \    nameField.stringValue = \"\"\n    addressField.stringValue = \"\"\n    phoneField.stringValue\
    \ = \"\"\n    }\n    ```\n\n26.  Modify the `viewData` IBAction method so it takes\
    \ a value from the Key text field and deletes the associates value from the dictionary\
    \ as follows:\n\n```\n    @IBAction func viewData(_ sender: NSButton) {\n    let\
    \ myAlert = NSAlert()\n    if arrayOfStructures.isEmpty {\n    myAlert.messageText\
    \ = \"Array is empty\"\n    myAlert.runModal()\n    } else {\n    var personData\
    \ = Person()\n    personData = (arrayOfStructures.removeLast())\n    totalField.integerValue\
    \ = arrayOfStructures.count\n    myAlert.messageText = personData.name + \"\\\
    r\\n\" + personData.address + \"\\r\\n\" + personData.phone\n    myAlert.runModal()\n\
    \    }\n    }\n    ```\n\nThe code inside the `viewData` IBAction method creates\
    \ an alert dialog. Then it checks if the array is empty. If so, it displays \"\
    Array is empty\" in the alert dialog.\n\nIf the array is not empty, then it removes\
    \ the last structure stored in the array, displays the new total number of array\
    \ items in the Total Names text field, and displays the removed structure data\
    \ in the alert dialog.\n\nThe complete contents of the `AppDelegate.swift` file\
    \ should look like this:\n\n```\nimport Cocoa\n@NSApplicationMain\nclass AppDelegate:\
    \ NSObject, NSApplicationDelegate {\n@IBOutlet weak var window: NSWindow!\n@IBOutlet\
    \ weak var nameField: NSTextField!\n@IBOutlet weak var addressField: NSTextField!\n\
    @IBOutlet weak var phoneField: NSTextField!\n@IBOutlet weak var totalField: NSTextField!\n\
    struct Person {\nvar name : String = \"\"\nvar address : String = \"\"\nvar phone\
    \ : String = \"\"\n}\nvar employee = Person()\nvar arrayOfStructures = [Person]\
    \ ()\nfunc applicationDidFinishLaunching(_ aNotification: Notification) {\n//\
    \ Insert code here to initialize your application\n}\nfunc applicationWillTerminate(_\
    \ aNotification: Notification) {\n// Insert code here to tear down your application\n\
    }\n@IBAction func addData (_ sender: NSButton) {\nemployee.name = nameField.stringValue\n\
    employee.address = addressField.stringValue\nemployee.phone = phoneField.stringValue\n\
    arrayOfStructures.append(employee)\ntotalField.integerValue = arrayOfStructures.count\n\
    nameField.stringValue = \"\"\naddressField.stringValue = \"\"\nphoneField.stringValue\
    \ = \"\"\n}\n@IBAction func viewData(_ sender: NSButton) {\nlet myAlert = NSAlert()\n\
    if arrayOfStructures.isEmpty {\nmyAlert.messageText = \"Array is empty\"\nmyAlert.runModal()\n\
    } else {\nvar personData = Person()\npersonData = (arrayOfStructures.removeLast())\n\
    totalField.integerValue = arrayOfStructures.count\nmyAlert.messageText = personData.name\
    \ + \"\\r\\n\" + personData.address + \"\\r\\n\" + personData.phone\nmyAlert.runModal()\n\
    }\n}\n}\n```\n\nTo see how this program works, follow these steps:\n\n1.  Choose\
    \ Product ➤ Run. Xcode runs your StructureProgram project.  \n2.  Click in the\
    \ Name text field and type Bob.  \n3.  Click in the Address text field and type\
    \ 123 Main.  \n4.  Click in the Phone text field and type 555-1234.  \n5.  Click\
    \ the Add button. The program shows the number of items in the array (1) in the\
    \ Total Names text field.  \n6.  Repeat steps 2–5 except type the name Jane, the\
    \ address 90 Oak Lane, and the phone number 555-9874\\. The number 2 appears in\
    \ the Total Names text field.  \n7.  Click the View button . An alert dialog appears,\
    \ displaying Jane, 90 Oak Lane, and 555-9874, as shown in Figure [12-5](#A437923_1_En_12_Chapter.html#Fig5)."
