- fmt: "# Looking Up Class Files with the Help Menu\n\nXcode’s menu bar and pull-down\
    \ menus are usually the most straightforward way to find any command. So the first\
    \ step is to open Xcode’s documentation window, as shown in Figure 4-4, in one\
    \ of two ways:\n\n1.  Click in the Search documentation text field at the top\
    \ of the Documentation window, type `NSTextField`, and press Return. The Documentation\
    \ window displays information about the `NSTextField` class, as shown in Figure\
    \ 4-5.\n\n    ![A437923_1_En_4_Fig5_HTML.jpg](A437923_1_En_4_Fig5_HTML.jpg)\n\n\
    \    Figure 4-5. The documentation window displays information about the `NSTextField`\
    \ class\n\n2.  Scroll through the information about the `NSTextField` class. However,\
    \ there’s nothing in the `NSTextField` documentation that explains how it stores\
    \ text. To find that answer, you need to next look in the parent class of `NSTextField`,\
    \ which is `NSControl` under the Overview category.\n3.  Click `NSControl` (it\
    \ appears as a blue hyperlink).\n4.  Scroll down to the Accessing the Control’s\
    \ Value section to view all the different ways to retrieve data from any object\
    \ based on the `NSTextField` class, as shown in Figure 4-6.\n\n    ![A437923_1_En_4_Fig6_HTML.jpg](A437923_1_En_4_Fig6_HTML.jpg)\n\
    \n    Figure 4-6. The Documentation window lists all the properties in `NSTextField`\
    \ that store data\n\n![A437923_1_En_4_Fig4_HTML.jpg](A437923_1_En_4_Fig4_HTML.jpg)\n\
    \nFigure 4-4. The Xcode Documentation window\n\n*   Choose Help ➤ Documentation\
    \ and API Reference.\n*   Press Shift + Command + 0 (the number zero).\n\nOnce\
    \ you know that you can use the `stringValue` property to hold text data from\
    \ any object based on the `NSTextField` class, you know you can access the text\
    \ data of both the label and text field using the `stringValue` property.\n\n\
    ## Looking Up Class Files with Quick Help\n\nUsing the Documentation window to\
    \ look up class files can be handy, but Xcode offers another method called Quick\
    \ Help. To use Quick Help, you move the cursor or mouse pointer over a class file\
    \ name in a file containing Swift code, and then choose one of the following methods:\n\
    \n*   Choose Help ➤ Quick Help for Selected Item.\n*   Press Control + Command\
    \ + Shift + ?.\n*   Hold down the Option key and click a class file name.\n\n\
    Quick Help then displays a pop-up window containing a brief description of the\
    \ selected class file, giving you the option to view the full description in the\
    \ Documentation window if you choose. To see how Quick Help works using the Option\
    \ key and the mouse, follow these steps:\n\n1.  Make sure the MyFirstProgram is\
    \ loaded into Xcode.\n2.  Click the `AppDelegate.swift` file in the Project Navigator.\
    \ Xcode displays the contents of the `AppDelegate.swift` file in the middle pane.\n\
    3.  Hold down the Option key and move the mouse over the `NSTextField` word in\
    \ the IBOutlet. The mouse pointer turns into a question mark, as shown in Figure\
    \ 4-7.\n\n    ![A437923_1_En_4_Fig7_HTML.jpg](A437923_1_En_4_Fig7_HTML.jpg)\n\n\
    \    Figure 4-7. Holding down the Option key turns the mouse pointer into a question\
    \ mark when hovering over a class file name\n\n4.  While holding down the Option\
    \ key with the mouse pointer over `NSTextField`, click the mouse. Xcode displays\
    \ a pop-up window briefly describing the features of the `NSTextField` class,\
    \ as shown in Figure 4-8.\n\n    ![A437923_1_En_4_Fig8_HTML.jpg](A437923_1_En_4_Fig8_HTML.jpg)\n\
    \n    Figure 4-8. Option + clicking on a class file name displays a pop-up window\
    \ describing that class file\n\n5.  Click Class Reference at the bottom of the\
    \ pop-up window next to the Reference label. Xcode displays the Documentation\
    \ window listing the `NSTextField` class file (see Figure 4-5).\n\nOption + clicking\
    \ is just a way to open the Documentation window without going through the Help\
    \ ➤ Documentation and Reference API command and typing a class file name.\n\n\
    # Browsing the Documentation\n\nQuick Help can display information about specific\
    \ class files, but what if you know you need information but don’t know where\
    \ to find it? That’s when you can spend time browsing through the Documentation\
    \ window and skimming through the different help topics until you find what you\
    \ want.\n\nEven if you don’t find what you want, chances are good you’ll stumble\
    \ across some interesting information about Xcode or macOS that could come in\
    \ handy in the future.\n\nIf you find something interesting, you can bookmark\
    \ it so that you can find it quickly again later. You can also send information\
    \ by e-mail or text messaging, so feel free to share useful information with others.\n\
    \nTo browse through the Documentation, follow these steps:\n\n1.  Choose Help\
    \ ➤ Documentation and API Reference. The Documentation window appears.\n2.  Click\
    \ the Browse the API reference documentation icon. The left pane displays a list\
    \ of different frameworks available to use when creating a macOS program, as shown\
    \ in Figure 4-9.\n\n    ![A437923_1_En_4_Fig9_HTML.jpg](A437923_1_En_4_Fig9_HTML.jpg)\n\
    \n    Figure 4-9. Viewing the frameworks available\n\n3.  Click the gray disclosure\
    \ triangle that appears to the left of a category such as the HealthKit or Core\
    \ Data. A list of additional topics (with their own gray disclosure triangles)\
    \ appears. By continuing to click the disclosure triangle of topics, you will\
    \ eventually find lists of topics that you can click to view that information,\
    \ as shown in Figure 4-10.\n\n    ![A437923_1_En_4_Fig10_HTML.jpg](A437923_1_En_4_Fig10_HTML.jpg)\n\
    \n    Figure 4-10. Each category lists several other categories of various topics\n\
    \n4.  Click in the Browse guides and sample code icon. A list of different topics\
    \ appears, as shown in Figure 4-11.\n\n    ![A437923_1_En_4_Fig11_HTML.jpg](A437923_1_En_4_Fig11_HTML.jpg)\n\
    \n    Figure 4-11. The Browse guides and sample code icon display various topics\
    \ for macOS programming\n\n5.  Click the gray disclosure triangle that appears\
    \ to the left of a category, such as the Security or Graphics & Animation. A list\
    \ of additional topics (with their own gray disclosure triangles) appears. By\
    \ continuing to click the disclosure triangle of topics, you will eventually find\
    \ lists of topics that you can click on to view that information, as shown in\
    \ Figure 4-12.\n\n    ![A437923_1_En_4_Fig12_HTML.jpg](A437923_1_En_4_Fig12_HTML.jpg)\n\
    \n    Figure 4-12. Viewing information about specific programming techniques or\
    \ sample code"
