  trans: "\n### 为场景添加控制器文件\n\n每次向故事板添加不同的场景时，实际上都是在为程序的用户界面添加另一个窗口。然而，每个场景也需要其专属的\
    \ Swift 文件来进行控制。这样一来，如果添加了按钮或其他用户界面元素，就可以编写 Swift 代码来在该场景上显示数据，或处理用户可能选择的任何命令（例如点击按钮）。\n\
    \n首先，必须为添加到故事板的每个额外场景创建一个 Swift 文件。其次，必须将这个 Swift 文件链接到该场景，以便场景能够使用它。\n\n要了解如何创建用于控制场景的\
    \ Swift 文件，请遵循以下步骤：\n\n1.  确保你的 `StoryProgram` 项目已在 Xcode 中加载，并在项目导航器窗格中点击 `Main.storyboard`\
    \ 文件。\n2.  选择“文件” ➤ “新建” ➤ “文件”。Xcode 会显示不同的可用模板。\n3.  在“macOS”下选择“源”，然后点击“Cocoa\
    \ Class”图标，如图 16-16 所示。然后点击“下一步”按钮。会出现另一个对话框，要求输入名称和父类。\n\n![A437923_1_En_16_Fig16_HTML.jpg](img/A437923_1_En_16_Fig16_HTML.jpg)\n\
    \n图 16-16. 创建用于存储视图控制器 Swift 代码的 Cocoa 类文件\n\n4.  点击“名称”文本框，为你用来控制场景的类输入一个描述性名称，例如\
    \ `SecondController`。\n5.  点击“父类”弹出菜单，并选择 `NSViewController`。（如果你正在为其他类型的控制器创建\
    \ Swift 文件，例如页面控制器或标签视图控制器，请选择不同的父类，例如 `NSPageController` 或 `NSTabView`。）\n6.\
    \  清除“同时为用户界面创建 XIB 文件”复选框。\n7.  确保“语言”弹出菜单显示为 Swift，如图 16-17 所示。点击“下一步”按钮。Xcode\
    \ 会询问你想将新的 Swift 类保存在何处。\n\n![A437923_1_En_16_Fig17_HTML.jpg](img/A437923_1_En_16_Fig17_HTML.jpg)\n\
    \n图 16-17. 创建用于控制故事板场景的 Swift 类\n\n8.  选择一个文件夹，然后点击“创建”按钮。Xcode 会在项目导航器窗格中显示你的\
    \ Swift 类。此时，Swift 类和场景尚未连接，因此你必须将场景的视图控制器设置为你刚刚创建的 Swift 文件的类。\n9.  点击 `Main.storyboard`\
    \ 文件以显示你的用户界面。\n10. 点击场景上带有“Second scene here”标签的蓝色视图控制器图标。\n11. 选择“视图” ➤ “实用工具”\
    \ ➤ “显示身份检查器”。\n12. 点击“类”弹出菜单，并选择 `SecondController`，即你之前创建的视图控制器，如图 16-18 所示。\n\
    \n![A437923_1_En_16_Fig18_HTML.jpg](img/A437923_1_En_16_Fig18_HTML.jpg)\n\n图 16-18.\
    \ 将场景连接到 Swift 视图控制器文件\n\n13. 将一个按钮拖放到这个第二个场景上。\n14. 选择“视图” ➤ “助理编辑器” ➤ “显示助理编辑器”。助理编辑器会显示你刚刚创建的\
    \ `SecondController.swift` 文件。\n15. 将鼠标指针移到第二个场景的标签上，按住 Control 键，然后将鼠标拖放到 `class\
    \ SecondController` 行下方。会出现一个弹出窗口。\n16. 在“名称”字段中输入 `labelName`，然后点击“连接”按钮。你的代码中应该会出现下面这一行：\n\
    \n```\n@IBOutlet weak var labelName: NSTextField!\n```\n\n17. 将鼠标指针移到第二个场景的按钮上，按住\
    \ Control 键，然后将鼠标拖放到 `SecondController.swift` 文件底部最后一个大括号的上方，如图 16-19 所示。会出现一个弹出窗口。\n\
    \n![A437923_1_En_16_Fig19_HTML.jpg](img/A437923_1_En_16_Fig19_HTML.jpg)\n\n图 16-19.\
    \ 为按钮创建 IBAction 方法\n\n18. 点击“连接”弹出菜单并选择“Action”。\n19. 点击“名称”文本框并输入 `changeLabel`。\n\
    20. 点击“类型”弹出菜单并选择 `NSButton`。然后点击“连接”按钮。Xcode 会显示一个空的 IBAction 方法。\n21. 按如下方式修改\
    \ IBAction 方法：\n\n```\n@IBAction func changeLabel(_ sender: NSButton) {\n    labelName.stringValue\
    \ = \"Button clicked\"\n}\n```\n\n22. 选择“产品” ➤ “运行”。程序的初始场景会随按钮一起出现。\n23. 点击这个第一个场景上的按钮。你的第二个场景会作为另一个窗口出现。\n\
    24. 点击第二个场景上的按钮。第二个场景上的标签会从“Second scene here”变为“Button clicked”。\n25. 选择“StoryProgram”\
    \ ➤ “退出 StoryProgram”。\n\n本练习展示了如何创建一个作为 Cocoa Class 文件的 Swift 文件。然后展示了如何将此 Swift\
    \ 文件链接到第二个视图控制器。一旦将 Swift 文件连接到视图控制器，就可以编写 Swift 代码，使任何用户界面元素实际响应 Swift 代码。\n\n\
    ## 总结\n\n你可以创建用户界面并将其存储在多个 `.xib` 文件或一个包含多个场景的 `.storyboard` 文件中。故事板文件用于创建 iOS\
    \ 应用，因此最好也将故事板文件用于 macOS 程序，因为故事板文件很可能成为创建用户界面的标准方式。\n\n故事板允许你定义构成程序用户界面的场景出现的顺序。当你向故事板添加额外场景时，需要创建控制这些场景的\
    \ Swift 文件。这些 Swift 文件需要属于 `NSViewController` 类，然后必须将你的场景连接到该 Swift 文件。\n\n设计程序的用户界面涉及使用\
    \ `.xib` 或 `.storyboard` 文件，或两者的组合。故事板减少了编写 Swift 代码的需求，但无论使用哪种类型的文件，你仍然需要编写一些\
    \ Swift 代码来让你的用户界面完全工作。\n"
- fmt: "# 17. Choosing Commands with Buttons\n\nEvery program needs to give the user\
    \ a way to control the computer. In the old days, that meant knowing how to type\
    \ the proper commands to make a program work, but with today's graphical user\
    \ interfaces, the easier way to control a program is to choose from a list of\
    \ available commands. The simplest way to give a command to a program is through\
    \ a button.\n\nBy displaying multiple buttons on the screen, a user interface\
    \ offers multiple choices for the user at all times. Instead of memorizing cryptic\
    \ commands, the user just needs to select a command by pointing at it with the\
    \ mouse and clicking to choose it.\n\nXcode provides a variety of different types\
    \ of buttons you can place on a user interface but they all work the same way.\
    \ A button represents a single command and clicking that button runs the Swift\
    \ code stored in an `IBAction` method.\n\nTo use buttons, just place them on a\
    \ user interface (either a `.xib` or `.storyboard` file), modify the label to\
    \ display the command you want the button to represent, and connect your button\
    \ to Swift code through an `IBAction` method.\n\nAll buttons are based on the\
    \ `NSButton` class defined in the Cocoa framework. While most buttons display\
    \ text that can contain the command the button represents, some buttons don't\
    \ display text at all. Despite the differences in appearance, all buttons work\
    \ the same way and can be changed into another button type at any time. The different\
    \ button types available are shown in Figure [17-1](#A437923_1_En_17_Chapter.html#Fig1):\n\
    \n![A437923_1_En_17_Fig1_HTML.jpg](A437923_1_En_17_Fig1_HTML.jpg)\n\nFigure 17-1.\
    \ The different types of buttons you can place on a user interface\n\n- Push Button\n\
    - Textured Rounded Button\n- Gradient Button (does not display text)\n- Pop-Up\
    \ Button\n- Checkbox Button\n- Radio Button\n- Recessed Button\n- Inline Button\n\
    - Rounded Rectangle Button\n- Disclosure Triangle (does not display text)\n- Help\
    \ Button (does not display text)\n- Image Button (does not display text)\n- Disclosure\
    \ Button (does not display text)\n\nButtons without text titles take up less space\
    \ but may appear cryptic because the user has no idea what that button might do.\
    \ The Image button is often used to display icons that represent commands.\n\n\
    ## Modifying Text on a Button\n\nFor those buttons that display text, Xcode gives\
    \ you two ways to modify a button's text:\n\n- Double-click directly on the button's\
    \ text and edit the text.\n- Click a button to select it, choose View ➤ Utilities\
    \ ➤ Show Attributes Inspector, and edit the Title property, as shown in Figure\
    \ [17-2](#A437923_1_En_17_Chapter.html#Fig2).\n\n![A437923_1_En_17_Fig2_HTML.jpg](A437923_1_En_17_Fig2_HTML.jpg)\n\
    \nFigure 17-2. The Show Attributes Inspector pane lets you edit the title of a\
    \ button\n\nThe Attributes Inspector lets you define the text on a button when\
    \ your program runs. However, if you want to change that text later, you’ll need\
    \ to modify a button’s text using Swift code. To do this, you must first create\
    \ an `IBOutlet` that represents your button. Second, you must then modify the\
    \ Title property of that button in Swift using code like this:\n\n```\n@IBOutlet\
    \ weak var myButton: NSButton!\nmyButton.title = \"New Text\"\n```\n\nThe Title\
    \ property defines text that appears on a button, but many buttons also offer\
    \ an Alternate property. The purpose of the Alternate property is to allow a button\
    \ to display text if a button's Type property is set to `toggle` or `switch`,\
    \ as shown in Figure [17-3](#A437923_1_En_17_Chapter.html#Fig3).\n\n![A437923_1_En_17_Fig3_HTML.jpg](A437923_1_En_17_Fig3_HTML.jpg)\n\
    \nFigure 17-3. Changing the Type property of a button\n\nWhen a button's Alternate\
    \ Title text is non-empty and the button's Type property is `toggle` or `switch`,\
    \ clicking a Toggle or Switch button alternates between showing the Title text\
    \ and the Alternate Title text. To see how the Title and Alternate Title properties\
    \ of a button work, follow these steps:\n\n1. From within Xcode choose File ➤\
    \ New ➤ Project.\n2. Click Application under the macOS category.\n3. Click Cocoa\
    \ Application and click the Next button. Xcode now asks for a product name.\n\
    4. Click in the Product Name text field and type `ButtonProgram`.\n5. Make sure\
    \ the Language pop-up menu displays Swift and that the “Use Storyboards” check\
    \ box is selected.\n6. Click the Next button. Xcode asks where you want to store\
    \ the project.\n7. Choose a folder to store your project and click the Create\
    \ button.\n8. Click the `Main.storyboard` file in the Project Navigator. Your\
    \ program's user interface appears.\n9. Choose View ➤ Utilities ➤ Show Object\
    \ Library. The Object Library appears in the bottom right corner of the Xcode\
    \ window.\n10. Drag a push button and a text field on to the view controller window\
    \ and resize both items so they look like Figure [17-4](#A437923_1_En_17_Chapter.html#Fig4).\n\
    \n![A437923_1_En_17_Fig4_HTML.jpg](A437923_1_En_17_Fig4_HTML.jpg)\n\nFigure 17-4.\
    \ The user interface of the ButtonProgram\n\n11. Click the push button and choose\
    \ View ➤ Utilities ➤ Show Attributes Inspector. The Show Attributes Inspector\
    \ pane appears in the upper right corner of the Xcode window.\n12. Click the Type\
    \ pop-up menu and choose Toggle.\n13. Click in the Title text field, type `Change\
    \ Me` and press Enter.\n14. Click in the Alternate text field and type `Alternate\
    \ Text`.\n15. Choose Product ➤ Run. Your user interface appears.\n16. Click the\
    \ `Change Me` button. Notice that the text on the button now displays “Alternate\
    \ Text”.\n17. Click the same button again. Notice that the text alternates between\
    \ `Change Me` and `Alternate Text`.\n18. Choose ButtonProgram ➤ Quit ButtonProgram.\n\
    \nNow let's see how to modify the title of a button by taking text from the text\
    \ field and storing it in the Title property of the button by following these\
    \ steps:\n\n1. Click the `Main.storyboard` file in the Project Navigator pane.\n\
    2. Click the push button that currently displays the text “Change Me”.\n3. Choose\
    \ View ➤ Assistant Editor ➤ Show Assistant Editor. The `ViewController.swift`\
    \ file appears next to the `Main.storyboard` file.\n4. Move the mouse pointer\
    \ over the push button, hold down the Control key, and drag the mouse underneath\
    \ the `@IBOutlet` line in the `ViewController.swift` file.\n5. Release the Control\
    \ key and the mouse. A pop-up menu appears.\n6. Click in the Name text field and\
    \ type `myButton`.\n7. Move the mouse pointer over the text field, hold down the\
    \ Control key, and drag the mouse underneath the `@IBOutlet` line in the `AppDelegate.swift`\
    \ file.\n8. Release the Control key and the mouse. A pop-up menu appears.\n9.\
    \ Click in the Name text field and type `changeText`. You should now have created\
    \ two `IBOutlet`s that look like this:\n\n```\n    @IBOutlet weak var myButton:\
    \ NSButton!\n    @IBOutlet weak var changeText: NSTextField!\n```\n\n10. Move\
    \ the mouse pointer over the push button, hold down the Control key, and drag\
    \ the mouse above the last curly bracket in the bottom of the `AppDelegate.swift`\
    \ file.\n11. Release the Control key and the mouse. A pop-up menu appears.\n12.\
    \ Click in the Connection pop-up menu and choose Action.\n13. Click in the Name\
    \ text field and type `changeTitle`.\n14. Click in the Type pop-up menu and choose\
    \ NSButton and then click the Connect button. Xcode creates an empty `IBAction`\
    \ method.\n15. Modify this `IBAction` method as follows:\n\n```\n    @IBAction\
    \ func changeTitle(_ sender: NSButton) {\n    myButton.title = changeText.stringValue\n\
    \    }\n```\n\nThis Swift code retrieves the text in the text field (the `IBOutlet\
    \ changeText`) and stores it in the Title property of the button (the `IBOutlet\
    \ myButton`).\n16. Choose Product ➤ Run. Your user interface appears.\n17. Click\
    \ in the text field and type `Hello there!`.\n18. Click the `Change Me` button.\
    \ The alternate text appears on the button.\n19. Click the button again. The text\
    \ from the text field now appears.\n20. Choose ButtonProgram ➤ Quit ButtonProgram."
