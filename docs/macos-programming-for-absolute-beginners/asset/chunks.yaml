- fmt: "# Using Check Boxes\n\nYou can use a check box by itself or grouped together\
    \ with other check boxes. A check box is actually based on the `NSButton` class\
    \ although it looks and behaves much differently than a typical button. For a\
    \ check box, the three most important properties are:\n\n* **Title**: The text\
    \ that appears next to a check box that describes an option for the user to choose.\n\
    * **State**: Determines if the check box is selected (1) or clear (0).\n* **Alternate**:\
    \ Text that appears when the check box is clear. (The Title text appears when\
    \ the check box is selected.)\n\nTo see how check boxes work, follow these steps:\n\
    \n1. From within Xcode choose File ➤ New ➤ Project.\n2. Click Application under\
    \ the macOS category.\n3. Click Cocoa Application and click the Next button. Xcode\
    \ now asks for a product name.\n4. Click in the Product Name text field and type\
    \ `CheckProgram`.\n5. Make sure the Language pop-up menu displays Swift and that\
    \ the \"Use Storyboards\" check box is selected.\n6. Click the Next button. Xcode\
    \ asks where you want to store the project.\n7. Choose a folder to store your\
    \ project and click the Create button.\n8. Click the `MainMenu.xib` file in the\
    \ Project Navigator. Your program's user interface appears.\n9. Choose View ➤\
    \ Utilities ➤ Show Object Library. The Object Library appears in the bottom right\
    \ corner of the Xcode window.\n10. Drag a push button, three check boxes, and\
    \ a wrapping text field on to the user interface window. Make sure you resize\
    \ the wrapping text field and all the check box widths so they look like Figure\
    \ 18-2.\n\n![A437923_1_En_18_Fig2_HTML.jpg](A437923_1_En_18_Fig2_HTML.jpg)\n\n\
    Figure 18-2. The user interface of the CheckProgram\n\n11. Choose View ➤ Utilities\
    \ ➤ Show Attributes Inspector. The Show Attributes Inspector pane appears in the\
    \ upper right corner of the Xcode window.\n12. Click the top check box and in\
    \ the Show Attributes Inspector pane, change its title to No dogs and its alternate\
    \ to Dogs.\n13. Click the middle check box and in the Show Attributes Inspector\
    \ pane, change its title to No cats and its alternate to Cats.\n14. Click the\
    \ top check box and in the Show Attributes Inspector pane, change its title to\
    \ No birds and its alternate to Birds.\n15. Double-click the push button and change\
    \ its title to Check.\n16. Choose View ➤ Assistant Editor ➤ Show Assistant Editor.\
    \ Xcode displays the `ViewController.swift` file next to the user interface.\n\
    17. Move the mouse pointer over the Dogs check box, hold down the Control key,\
    \ and drag the mouse under the `IBOutlet` line in the `ViewController.swift` file.\n\
    18. Release the Control key and the mouse. A pop-up window appears.\n19. Click\
    \ in the Name text field, type `dogBox`, and click the Connect button.\n20. Move\
    \ the mouse pointer over the Cats check box, hold down the Control key, and drag\
    \ the mouse under the `IBOutlet` line in the `ViewController.swift` file.\n21.\
    \ Release the Control key and the mouse. A pop-up window appears.\n22. Click in\
    \ the Name text field, type `catBox`, and click the Connect button.\n23. Move\
    \ the mouse pointer over the Birds check box, hold down the Control key, and drag\
    \ the mouse under the `IBOutlet` line in the `ViewController.swift` file.\n24.\
    \ Release the Control key and the mouse. A pop-up window appears.\n25. Click in\
    \ the Name text field, type `birdBox`, and click the Connect button.\n26. Move\
    \ the mouse pointer over the wrapping text field, hold down the Control key, and\
    \ drag the mouse under the `IBOutlet` line in the `ViewController.swift` file.\n\
    27. Release the Control key and the mouse. A pop-up window appears.\n28. Click\
    \ in the Name text field, type `messageBox`, and click the Connect button. You\
    \ should now have four new `IBOutlet`s that look like this:\n\n```\n@IBOutlet\
    \ weak var dogBox: NSButton!\n@IBOutlet weak var catBox: NSButton!\n@IBOutlet\
    \ weak var birdBox: NSButton!\n@IBOutlet weak var messageBox: NSTextField!\n```\n\
    \n29. Move the mouse pointer over the check push button, hold down the Control\
    \ key, and drag the mouse over the last curly bracket in the bottom of the `ViewController.swift`\
    \ file.\n30. Release the Control key and the mouse. A pop-up window appears.\n\
    31. Click in the Connection pop-up menu and choose Action.\n32. Click in the Name\
    \ text field and type `checkBoxes`.\n33. Click in the Type pop-up menu and choose\
    \ `NSButton`.\n34. Click the Connect button. Xcode creates an empty `IBAction`\
    \ method.\n35. Modify this `checkBoxes` `IBAction` method as follows:\n\n```\n\
    @IBAction func checkBoxes(_ sender: NSButton) {\n    let nextLine = \"\\r\\n\"\
    \n    var message : String = \"\"\n    if dogBox.state == 1 {\n        message\
    \ = \"Dog check box selected\" + nextLine\n    } else {\n        message = \"\
    Dog check box NOT selected\" + nextLine\n    }\n    if catBox.state == 1 {\n \
    \       message = message + \"Cat check box selected\" + nextLine\n    } else\
    \ {\n        message = message + \"Cat check box NOT selected\" + nextLine\n \
    \   }\n    if birdBox.state == 1 {\n        message = message + \"Bird check box\
    \ selected\" + nextLine\n    } else {\n        message = message + \"Bird check\
    \ box NOT selected\" + nextLine\n    }\n    messageBox.stringValue = message\n\
    }\n```\n\nThis code creates a constant (`nextLine`) that represents a carriage\
    \ return (`\\r`) and a new line (`\\n`) character. It declares a message variable\
    \ that can hold `String` data types and initially contains `\"\"`, which is an\
    \ empty string. The multiple `if`-`else` statements check the `State` property\
    \ of each check box to determine if it's selected (`state = 1`) or clear (`state\
    \ = 0`). Then it displays the results in the wrapping text field, which is represented\
    \ by an `IBOutlet` variable called `messageBox`.\n\n36. Choose Product ➤ Run.\
    \ Your user interface appears.\n37. Click the different check boxes. Notice that\
    \ each time you select or clear a check box, the title or alternate text appears.\n\
    38. Click the Check push button. The wrapping text field identifies which check\
    \ boxes you selected and which ones are clear.\n39. Choose CheckProgram ➤ Quit\
    \ CheckProgram."
