    \ [19-4](#A437923_1_En_19_Chapter.html#Fig4).\n\n![A437923_1_En_19_Fig4_HTML.jpg](A437923_1_En_19_Fig4_HTML.jpg)\n\
    \nFigure 19-4.\n\nThe user interface of the NumberProgram  \n11.  Double-click\
    \ the pop-up button. Xcode displays a list of three choices labeled Item 1, Item\
    \ 2, and Item 3, as shown in Figure [19-5](#A437923_1_En_19_Chapter.html#Fig5).\n\
    \n![A437923_1_En_19_Fig5_HTML.jpg](A437923_1_En_19_Fig5_HTML.jpg)\n\nFigure 19-5.\n\
    \nModifying a pop-up button  \n12.  Double-click Item 1, and when Xcode highlights\
