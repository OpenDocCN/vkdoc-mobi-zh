    # 摘要


    任何程序的核心都是能够接受数据、操作数据并返回有用结果的能力。操作数值数据最简单的方法是通过常见的数学运算符，例如 `+`（加法）、`-`（减法）、`/`（除法）、`*`（乘法）和
    `%`（取余）。操作字符串的常见方法是通过 `+` 运算符进行拼接，它将两个字符串组合在一起。


    作为快捷方式，你可以使用递增和递减运算符来给变量加 1 或减 1。如果需要增减的值不是 1，你可以改用复合赋值运算符。


    除了这些基本运算符，你还可以通过 Cocoa 框架定义的函数来操作数据。你不需要了解这些函数的工作原理；你只需要知道它们存在，以便在自己的程序中通过调用这些函数名称来使用它们。


    # 7. 使用分支做出决策


    程序接收数据后，需要以某种方式操作这些数据以返回有用的结果。简单的程序以相同的方式操作数据，但更复杂的程序需要就如何操作这些数据做出决策。


    例如，程序可能要求用户输入密码。如果用户输入了有效的密码，那么程序就允许用户访问。如果用户没有输入有效的密码，那么程序必须显示错误消息并阻止访问。


    当程序分析数据并根据数据做出决策时，它会使用布尔值和分支语句。布尔值表示 `true` 或 `false` 值。分支语句让你的程序可以选择执行两个或多个不同的指令集。布尔值与分支语句相结合，使程序能够对不同的数据做出响应。


    ## 理解比较运算符


    之前你了解了常见的数据类型，例如 `Int`、`Double` 和 `String`。Swift 还包含一种布尔数据类型，它可以保存 `true` 或 `false`
    值。你可以通过声明 `Bool` 数据类型来创建布尔变量，例如：


    ```

    var flag : Bool

    ```


    `Bool` 代表布尔数据类型。任何定义为 `Bool` 数据类型的变量只能保存两个值之一，例如：


    ```

    flag = true

    flag = false

    ```


    虽然你可以直接将 `true` 和 `false` 赋值给代表布尔数据类型的变量，但更常见的是使用比较运算符来计算布尔值。表 7-1 展示了一些常见的比较运算符。


    **表 7-1.** Swift 中的常见比较运算符


    | 比较运算符 | 作用         | 示例       | 布尔值  |

    |------------|--------------|------------|---------|

    | `==`       | 等于         | `5 == 14`  | False   |

    | `<`        | 小于         | `5 < 14`   | True    |

    | `>`        | 大于         | `5 > 14`   | False   |

    | `<=`       | 小于或等于   | `5 <= 14`  | True    |

    | `>=`       | 大于或等于   | `5 >= 14`  | False   |

    | `!=`       | 不等于       | `5 != 14`  | True    |


    **注意：** 等于（`==`）比较运算符是唯一也可以比较字符串的比较运算符，例如 `"Joe" == "Fred"`（计算结果为 `false`）或 `"Joe"
    == "Joe"`（计算结果为 `true`）。


    比较运算符比较两个值，例如 `38 == 8` 或 `29.04 > 12`。任何比较的结果总是 `true` 或 `false`。由于使用实际值与比较运算符总是返回相同的
    `true` 或 `false` 值，因此更常见的是使用比较运算符将一个固定值与一个变量进行比较，或者比较两个变量，例如：


    ```

    let myValue = 45

    myValue > 38            // 计算结果为 true

    let yourValue = 39

    myValue < yourValue     // 计算结果为 false

    ```


    当你比较一个或多个变量时，结果会根据这些变量的当前值而变化。但是，在使用等于（`==`）比较运算符时，处理小数值时要小心。这是因为 `45.0` 与 `45.0000001`
    不是同一个数字。在处理小数值时，最好使用大于或小于比较运算符。


    要了解比较运算符如何生成 `true` 或 `false` 值，请按照以下步骤操作：


    1. 在 Xcode 中打开 `IntroductoryPlayground` 文件。

    2. 按如下方式编辑代码：


    ```

    import Cocoa

    4 > 9

    23 >= 12

    3.4 < 8.5

    73 <= 29

    3.0 == 3.01

    3.0 != 3.01

    ```


    注意右边距显示了每个比较运算符的布尔值，如图 7-1 所示。


    ![A437923_1_En_7_Fig1_HTML.jpg](img/A437923_1_En_7_Fig1_HTML.jpg)


    **图 7-1.** 比较运算符总是计算为 true 或 false 布尔值


    ## 理解逻辑运算符


    任何比较运算符，例如 `78 > 9`，都会计算出一个 `true` 或 `false` 值。然而，Swift 提供了专门用于处理两个或多个布尔值的逻辑运算符，如表
    7-2 所示。


    **表 7-2.** Swift 中的常见逻辑运算符


    | 逻辑运算符 | 作用 |

    |------------|------|

    | `&&`       | 与   |

    | `\|\|`       | 或   |

    | `!`        | 非   |


    与（`&&`）和或（`||`）逻辑运算符都接受两个布尔值并将它们转换为单个布尔值。非（`!`）逻辑运算符接受一个布尔值并将其转换为相反的值。表 7-3 展示了非（`!`）逻辑运算符的工作方式。


    **表 7-3.** 非（`!`）逻辑运算符


    | 示例      | 值    |

    |------------|-------|

    | `!true`  | False |

    | `!false` | True  |


    与（`&&`）运算符接受两个布尔值，并根据表 7-4 计算出一个单独的布尔值。


    **表 7-4.** Swift 中的与（`&&`）逻辑运算符


    | 第一个布尔值 | 第二个布尔值 | 结果  |

    |--------------|--------------|-------|

    | True         | `&&` True    | True  |

    | True         | `&&` False   | False |

    | False        | `&&` True    | False |

    | False        | `&&` False   | False |


    或（`||`）运算符接受两个布尔值，并根据表 7-5 计算出一个单独的布尔值。


    **表 7-5.** Swift 中的或（`||`）逻辑运算符


    | 第一个布尔值 | 第二个布尔值 | 结果  |

    |--------------|--------------|-------|

    | True         | `\|\|` True  | True  |

    | True         | `\|\|` False | True  |

    | False        | `\|\|` True  | True  |

    | False        | `\|\|` False | False |


    要了解布尔值如何与比较运算符和逻辑运算符一起工作，请按照以下步骤创建一个新的 playground：


    1. 在 Xcode 中打开 `IntroductoryPlayground` 文件。

    2. 按如下方式编辑代码：


    ```

    import Cocoa

    var x, y, z : Int

    x = 35

    y = 120

    z = -48

    x == y

    x < z

    y != z

    z > -48

    // 与 && 运算符

    (y != z) && (x > z)

    (y != z) && (x == y)

    (x == y) && (x < z)

    (z > -48) && (x == y)

    // 或 || 运算符

    (y != z) || (x > z)

    (y != z) || (x == y)

    (x == y) || (x < z)

    (z > -48) || (x == y)

    ```


    图 7-2 显示了比较运算符如何计算为 `true` 或 `false`，以及逻辑运算符（与和或）如何接受两个布尔值并返回单个 `true` 或 `false`
    值。


    ![A437923_1_En_7_Fig2_HTML.jpg](img/A437923_1_En_7_Fig2_HTML.jpg)


    **图 7-2.** 使用比较运算符和逻辑运算符计算布尔值


    最终，每个布尔值必须是：


    - 一个 `true` 或 `false` 值

    - 一个结果为 `true` 或 `false` 的两个值的比较

    - 使用逻辑运算符组合成的、计算结果为 `true` 或 `false` 的布尔值组合

