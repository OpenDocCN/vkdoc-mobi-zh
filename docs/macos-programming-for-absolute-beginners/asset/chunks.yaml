    \ are called properties.\n\nA structure that stores two chunks of data can look\
    \ like this:\n\n```\nstruct StructureName {\nvar variableName1 : dataType\nvar\
    \ variableName2 : dataType\n}\n```\n\nRemember, the data type of each variable\
    \ can be simple data types like Int, String, or Double, or they can be more complicated\
    \ data types like arrays, tuples, sets, enumerations, or dictionaries.\n\nYou\
    \ can define two or more variables inside a structure where each variable can\
    \ contain different data types, such as a string or an integer. No matter how\
    \ many properties a structure holds, you must initialize the properties before\
    \ you can store data in them.\n\nSwift provides three ways to initialize properties.\
    \ First, you can define an initial value for each property, like this:\n\n```\n\
    struct StructureName {\nvar variableName1 : dataType = initialValue\nvar variableName2\
    \ : dataType = initialValue\n}\n```\n\nTo simplify the property declaration, a\
    \ second way is to omit the data type and let Swift infer the data type, like\
    \ this:\n\n```\nstruct StructureName {\nvar variableName1 = initialValue\nvar\
    \ variableName2 = initialValue\n}\n```\n\nWhen you assign an initial value to\
    \ properties, you can create a variable to represent that structure, like this:\n\
    \n```\nvar variableName = structureName()\n```\n\nA third way to initialize structure\
    \ properties is to create an `init` function. This means you must create a list\
    \ of property names and their data types. Then you assign values to those properties\
    \ when you create a variable to represent that structure.\n\nFor example, suppose\
    \ you want to store information about a person such as their name, e-mail address,\
    \ and phone number. Instead of creating three separate variables, you can create\
    \ a single structure, like this:\n\n```\nstruct Person {\nvar name : String\n\
    var email : String\nvar phone : String\n}\n```\n\nIf you just define the data\
    \ types of each property , you need to create an initializer called `init`, as\
    \ follows:\n\n```\nstruct Person {\nvar name : String\nvar email : String\nvar\
    \ phone : String\ninit (name: String, email: String, phone: String) {\nself.name\
    \ = name\nself.email = email\nself.phone = phone\n}\n}\n```\n\nWhen you create\
    \ a variable based on this structure, you need include initial values, such as\n\
    \n```\nvar workers = person(name: \"Sue\", email: \"sdk@aol.com\", phone: \"555-1234\"\
    )\n```\n\nCreating a structure involves three parts:\n\n*   Create a structure\
    \ with two or more variables (properties).\n*   Initialize all of the structure\
    \ properties either by assigning values to each property or creating an `init`\
    \ function.\n*   Create a variable to represent that structure."
  trans: "\n# 使用枚举\n\nSwift 中基础数据类型的一大问题是，它们告诉你数据包含什么（整数、字符串等），但没有告诉你数据代表什么。`类型别名`\
    \ 有助于为数据类型赋予有意义的名称，但这只是解决方案之一。另一种解决方案就是枚举。\n\n枚举的核心思想在于，让你创建自己的数据类型，并列举该数据类型的可用选项。当你将变量声明为\
    \ `Int` 数据类型时，本质上允许该变量保存众多可能的整数值之一，而这很可能远超你的实际需求。\n\n枚举允许你使用描述性名称定义自己的数据类型，并定义可存储的选项列表。要创建枚举，需要定义一个枚举名称，例如：\n\
    \n```\nenum 枚举名称 {\n// 此处为枚举定义\n}\n```\n\n枚举名称通常首字母大写。创建枚举名称后，需要列出该枚举可以保存的可用选项。你创建的选项列表不必是任何数据类型，可以是任何你想要的描述性名称。\n\
    \n假设你想创建一个代表允许饲养的宠物的数据类型。可以像这样创建一个枚举：\n\n```\nenum 宠物 {\ncase 狗\ncase 猫\ncase\
    \ 鱼\ncase 鸟\n}\n```\n\n这定义了该枚举只保存 `狗`、`猫`、`鱼` 或 `鸟` 这些值。由于你可以任意命名枚举的数据类型，因此可以使这些选项具有描述性和实际意义。\n\
    \n创建枚举后，需要声明一个变量来表示该枚举，例如：\n\n```\nvar 允许的宠物 : 宠物\n```\n\n如果要给这个变量（声明为 `宠物` 数据类型）赋值，需要指定枚举定义的一个选项，例如：\n\
    \n```\n允许的宠物 = 宠物.猫\n```\n\n或者使用快捷方式：\n\n```\n允许的宠物 = .猫\n```\n\n由于 `允许的宠物` 变量已被声明为\
    \ `宠物` 数据类型，因此在赋值允许的选项时，无需再次键入 “宠物”（使用 `.猫` 代替 `宠物.猫`）。\n\n要了解具有参数的函数如何工作，请按照以下步骤操作：\n\
    \n1.  确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。\n2.  按如下方式编辑代码：\n\n    ```\n\
    \    enum 宠物 {\n    case 狗\n    case 猫\n    case 鱼\n    case 鸟\n    }\n    var\
    \ 允许的宠物 : 宠物\n    允许的宠物 = .狗\n    print (\"一只 \\(允许的宠物) 是可接受的宠物\")\n    允许的宠物\
    \ = 宠物.猫\n    print (\"一只 \\(允许的宠物) 是可接受的宠物\")\n    ```\n\n`宠物` 枚举定义了 `宠物` 可以保存\
    \ `狗`、`猫`、`鱼` 或 `鸟` 这些值。\n\n`允许的宠物` 变量被声明为 `宠物` 数据类型，因此它只能保存这四个值（`狗`、`猫`、`鱼` 或\
    \ `鸟`）之一。\n\n给 `允许的宠物` 变量赋值时，既可以列出 `宠物` 枚举名称，也可以省略它。然后 `print` 命令将 `宠物` 数据打印在字符串中，如图\
    \ 12-1 所示。\n\n![A437923_1_En_12_Fig1_HTML.jpg](img/A437923_1_En_12_Fig1_HTML.jpg)\n\
    \n图 12-1.\n使用枚举定义描述性数据\n\n如果给变量赋予枚举未定义的数据会发生什么？Swift 会捕获错误并阻止你的程序运行。因此，如果你尝试\n\
    \n```\n允许的宠物 = .仓鼠\n```\n\n它将无法运行，因为 `仓鼠` 未被定义为 `宠物` 枚举中的可用选项。正如 Swift 不允许你将整数存储到\
    \ `String` 变量中一样，它也不允许你在枚举中存储任何未明确定义的数据。\n\n# 使用结构体\n\n假设你想存储几百人的姓名、街道地址、员工 ID\
    \ 号和年薪金额列表。你将如何存储所有这些数据？\n\n要存储一个人的信息，你可以创建几个变量，例如：\n\n```\nvar 姓名 : String\n\
    var 街道 : String\nvar ID : Int\nvar 薪资 : Double\n```\n\n不幸的是，创建单独的变量并不能明确标识每个人的姓名必须同时包含街道地址、员工\
    \ ID 和薪资。为了解决这个问题，你可以将相关变量分组到称为结构体的同一位置。\n\n结构体将不同类型的数据存储在一个单独的位置。使用传统变量，你一次只能存储一块数据。使用结构体，你可以定义两块或更多数据存储在一个变量中。在结构体内部声明的变量称为属性。\n\
    \n一个存储两块数据的结构体可以如下所示：\n\n```\nstruct 结构体名称 {\nvar 变量名 1 : 数据类型\nvar 变量名 2 : 数据类型\n\
    }\n```\n\n请记住，每个变量的数据类型可以是像 `Int`、`String` 或 `Double` 这样的简单数据类型，也可以是像数组、元组、集合、枚举或字典这样更复杂的数据类型。\n\
    \n你可以在结构体内部定义两个或更多变量，每个变量可以包含不同的数据类型，例如字符串或整数。无论结构体包含多少个属性，在存储数据之前，都必须先初始化这些属性。\n\
    \nSwift 提供了三种初始化属性的方法。首先，你可以为每个属性定义初始值，如下所示：\n\n```\nstruct 结构体名称 {\nvar 变量名 1\
    \ : 数据类型 = 初始值\nvar 变量名 2 : 数据类型 = 初始值\n}\n```\n\n为了简化属性声明，第二种方法是省略数据类型，让 Swift\
    \ 推断数据类型，如下所示：\n\n```\nstruct 结构体名称 {\nvar 变量名 1 = 初始值\nvar 变量名 2 = 初始值\n}\n```\n\
    \n当你为属性分配初始值时，可以创建一个变量来表示该结构体，如下所示：\n\n```\nvar 变量名 = 结构体名称()\n```\n\n初始化结构体属性的第三种方法是创建一个\
    \ `init` 函数。这意味着你必须创建一个属性名称及其数据类型的列表。然后，在创建表示该结构体的变量时，为这些属性赋值。\n\n例如，假设你想存储一个人的信息，如姓名、电子邮件地址和电话号码。你可以创建三个单独的变量，而是创建一个单独的结构体，如下所示：\n\
    \n```\nstruct 人员 {\nvar 姓名 : String\nvar 电子邮件 : String\nvar 电话 : String\n}\n```\n\
    \n如果你只是定义了每个属性的数据类型，则需要创建一个名为 `init` 的初始化器，如下所示：\n\n```\nstruct 人员 {\nvar 姓名 :\
    \ String\nvar 电子邮件 : String\nvar 电话 : String\ninit (姓名: String, 电子邮件: String,\
    \ 电话: String) {\nself.姓名 = 姓名\nself.电子邮件 = 电子邮件\nself.电话 = 电话\n}\n}\n```\n\n当你基于此结构体创建一个变量时，需要包含初始值，例如：\n\
    \n```\nvar 员工 = 人员(姓名: \"苏\", 电子邮件: \"sdk@aol.com\", 电话: \"555-1234\")\n```\n\n\
    创建结构体包含三个部分：\n\n*   创建一个包含两个或更多变量（属性）的结构体。\n*   通过为每个属性赋值或创建 `init` 函数来初始化所有结构体属性。\n\
    *   创建一个表示该结构体的变量。\n"
- fmt: "### Storing and Retrieving Items from a Structure\n\nA structure lets you\
    \ define the type of related data to store. Then you need to create a variable\
    \ name to represent that structure. To store data using a structure, you need\
    \ to specify the structure name and the variable name separated by a period, like\
    \ this:\n\n```\nstructureVariable.variableName = value\n```\n\nTo retrieve data\
    \ from a structure, you can assign a variable to a structure’s variable, like\
    \ this:\n\n```\nvar variableName = structureVariable.variableName\n```\n\nTo see\
    \ how to create a structure, initialize its properties, and add and retrieve data,\
    \ create a new playground by following these steps:\n\n1.  Make sure your `IntroductoryPlayground`\
    \ file is loaded in Xcode.\n2.  Edit the code as follows:\n\n    ```\n    import\
    \ Cocoa\n    struct Pet {\n    var name : String = \"\"\n    var age : Int = 0\n\
    \    }\n    var dog = Pet()\n    dog.name = \"Fido\"\n    dog.age = 4\n    print\
    \ (dog.name)\n    print (dog.age)\n    struct Person {\n    var name : String\n\
    \    var email : String\n    var phone : String\n    init (name: String, email:\
    \ String, phone: String) {\n    self.name = name\n    self.email = email\n   \
    \ self.phone = phone\n    }\n    }\n    var workers = Person(name: \"Sue\", email:\
    \ \"sdk@aol.com\", phone: \"555-1234\")\n    let boss = workers.name\n    print\
    \ (boss)\n    workers.name = \"Bo\"\n    print (workers.email)\n    print (workers.phone)\n\
    \    ```\n\nThe first structure defines initial values for its properties so there's\
    \ no need for an `init` function. This is why you can create a variable with empty\
    \ parentheses like this:\n\n```\nvar dog = pet()\n```\n\nThe second structure\
    \ does not define initial values for its properties, so when you create a variable\
    \ to represent that structure, you must define initial values:\n\n```\nvar workers\
    \ = person(name: \"Sue\", email: \"sdk@aol.com\", phone: \"555-1234\")\n```\n\n\
    To store data in a structure, you need to specify the variable name representing\
    \ the structure followed by the property name, as shown in Figure [12-2](#A437923_1_En_12_Chapter.html#Fig2).\n\
    \n![A437923_1_En_12_Fig2_HTML.jpg](A437923_1_En_12_Fig2_HTML.jpg)\n\nFigure 12-2.\
    \ Creating a structure and retrieving data\n\n## Combining Data Structures\n\n\
    At the simplest level, you can use the basic data types available (`Int`, `Float`,\
    \ `Double`, `String`). For more flexibility, you can combine data structures.\
    \ For example, arrays normally contain a list of single values such as integers\
    \ or strings. One common combination is to create an array of structures that\
    \ can contain a list of related information such as names and addresses, as shown\
    \ in Figure [12-3](#A437923_1_En_12_Chapter.html#Fig3).\n\n![A437923_1_En_12_Fig3_HTML.jpg](A437923_1_En_12_Fig3_HTML.jpg)\n\
    \nFigure 12-3. An array of structures can hold related data\n\nBy combining different\
    \ data structures, you can create unique ways to organize data such as an array\
    \ of sets, a dictionary that contains arrays, or a structure of tuples. Anywhere\
    \ you can use a data type like `Int` or `String`, you can also use a data structure\
    \ like an array, set, or dictionary.\n\nOne common combination are arrays that\
    \ hold structures. By themselves, structures can only hold a limited number of\
    \ data. An array of structures acts like a simple database. The structure defines\
    \ the type of information to store about a person such as name, address, and age,\
    \ and the array holds multiple copies of this data.\n\nTo show you how to create\
    \ an array of structures, you’ll create a program that will let you type in multiple\
    \ names, addresses, and phone numbers, and then delete data as well.\n\n1.  From\
    \ within Xcode choose File ➤ New ➤ Project.\n2.  Click Application under the macOS\
    \ category.\n3.  Click Cocoa Application and click the Next button. Xcode now\
    \ asks for a product name.\n4.  Click in the Product Name text field and type\
    \ `StructureProgram`.\n5.  Make sure the Language pop-up menu displays Swift and\
    \ that no check boxes are selected.\n6.  Click the Next button. Xcode asks where\
    \ you want to store the project.\n7.  Choose a folder to store your project and\
    \ click the Create button.\n8.  Click the `MainMenu.xib` file in the Project Navigator.\n\
    9.  Click the `StructureProgram` icon to make the window of the user interface\
    \ appear.\n10.  Choose View ➤ Utilities ➤ Show Object Library to make the Object\
    \ Library appear in the bottom right corner of the Xcode window.\n11.  Drag two\
    \ push buttons, four labels, and four text fields onto the user interface and\
    \ double-click the push buttons and labels to change the text that appears on\
    \ them so that it looks similar to Figure [12-4](#A437923_1_En_12_Chapter.html#Fig4).\n\
    \n![A437923_1_En_12_Fig4_HTML.jpg](A437923_1_En_12_Fig4_HTML.jpg)\n\nFigure 12-4.\
    \ The user interface of the `StructureProgram`\n\nAfter you type a name, address,\
    \ and phone number in the appropriate text fields, the Add button will store this\
    \ information in a structure, and then store this structure in an array. Each\
    \ time you add another name, address, and phone number, you'll be adding another\
    \ structure to the array while the Total Names text field constantly lists the\
    \ total number of structures stored in the array.\n\nThe View button removes the\
    \ last item from the array and displays its contents in an alert dialog so you\
    \ can verify its contents. Then it displays the new total number of structures\
    \ in the array.\n\nEach text field will need a separate `IBOutlet` and each push\
    \ button will need a separate `IBAction` method, which you create by Control-dragging\
    \ each item from the user interface to your `AppDelegate.swift` file."
