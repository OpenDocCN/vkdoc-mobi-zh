    \ shows how this code works by having a structure adopt two protocols. Notice\
    \ that this code works exactly the same as if the name and age properties were\
    \ defined in the same protocol as the `meow` method. By separating different properties\
    \ and methods in two or more protocols, you don’t have to implement properties\
    \ and/or methods you don’t need.\n\n![A437923_1_En_24_Fig3_HTML.jpg](A437923_1_En_24_Fig3_HTML.jpg)\n\
    \nFigure 24-3.\n\nA structure can adopt two or more protocols\n\nSince you can\
    \ adopt multiple protocols, it’s generally best to keep each protocol as short\
    \ and simple as possible. This makes it easier to use only the protocols you need\
    \ without being forced to implement additional properties and/or methods you may\
    \ not need or want."
  trans: "\n# 理解协议\n\n与类相似，协议可以定义属性（变量）和方法（函数）。主要区别在于，协议无法为属性设置初始值，也无法实现方法本身。协议仅定义属性及其数据类型。在协议中定义属性时，需要明确以下三项内容：\n\
    \n- 属性名称，可以是任意具有描述性的名称\n- 属性的数据类型，例如 `Int`、`Double`、`String` 等\n- 属性是只读 `{ get\
    \ }`，还是可读写 `{ get set }`\n\n**注意：** 可读写 `{ get set }` 属性不能赋值给常量存储属性（使用 `let` 关键字定义）或只读计算属性。只读\
    \ `{ get }` 属性则没有此类限制。\n\n请参考下列协议：\n\n```\nprotocol Cat {\n    var name: String\
    \ { get set }\n    var age: Int { get }\n}\n```\n\n现在你可以基于此协议创建一个结构体，例如：\n\n```\n\
    struct pet : Cat {\n    var name : String\n    // let name : String -- 无效，因为 \"\
    let\" 定义了常量存储属性\n    // var name : String { return \"Fred\" } -- 无效，因为这是只读计算属性\n\
    \    let age : Int\n}\n```\n\n上述代码定义了一个名为 `pet` 的结构体，它遵循 `Cat` 协议。这意味着该结构体需要声明\
    \ `name` 属性为字符串类型，`age` 属性为整数类型。\n\n请注意，由于 `Cat` 协议将 `age` 属性定义为只读 `{ get }`，你可以使用\
    \ `let` 关键字将其实现为常量。你也可通过返回一个值来计算 `age` 属性，例如：\n\n```\nstruct pet : Cat {\n   \
    \ var name : String\n    var age : Int { return 4 }\n}\n```\n\n要了解如何使用含有不同类型属性的协议和结构体，请按以下步骤操作：\n\
    \n1.  在 Xcode 中选择 **File > New > Playground**。Xcode 会要求输入 playground 名称。\n2. \
    \ 点击 **Name** 文本框，输入 `ProtocolPlayground`。\n3.  确保 **Platform** 弹出菜单显示为 `macOS`。\n\
    4.  点击 **Next** 按钮。Xcode 会询问你希望将 playground 存储在何处。\n5.  选择一个文件夹来存储你的项目，然后点击 **Create**\
    \ 按钮。\n6.  按如下方式编辑 playground 代码：\n\n    ```\n    import Cocoa\n    protocol Cat\
    \ {\n        var name: String { get set }\n        var age: Int { get }\n    }\n\
    \    // 使用计算属性\n    struct pet : Cat {\n        var name : String\n        var\
    \ age : Int { return 4 }\n    }\n    var animal = pet(name: \"Taffy\")\n    print\
    \ (animal.name)\n    print (animal.age)\n    // 使用 \"let\" 定义常量存储属性\n    struct\
    \ feral : Cat {\n        var name : String\n        let age : Int\n    }\n   \
    \ var pest = feral (name: \"Stinky\", age: 2)\n    print (pest.name)\n    print\
    \ (pest.age)\n    ```\n\n请注意基于结构体声明变量时的差异。当 age 使用计算属性时，声明变量时无需创建初始值，例如：\n\n```\n\
    // 使用计算属性 { return 4 }\nstruct pet : Cat {\n    var name : String\n    var age\
    \ : Int { return 4 }\n}\nvar animal = pet(name: \"Taffy\")\n```\n\n然而，如果你没有使用计算属性，那么在创建变量时必须显式地初始化它，例如：\n\
    \n```\n// 使用 \"let\" 定义常量存储属性\nstruct feral : Cat {\n    var name : String\n \
    \   let age : Int\n}\nvar pest = feral (name: \"Stinky\", age: 2)\n```\n\n图 24-1\
    \ 展示了如何基于同一个协议定义两个结构体。\n\n![A437923_1_En_24_Fig1_HTML.jpg](img/A437923_1_En_24_Fig1_HTML.jpg)\n\
    \n**图 24-1.** 两个不同的结构体可以遵循同一个协议\n\n## 在协议中使用方法\n\n当协议定义一个方法时，它仅定义方法名称、参数以及返回值的数据类型，但不包含任何实际实现该方法的\
    \ Swift 代码，例如：\n\n```\nprotocol Cat {\n    var name: String { get set }\n    var\
    \ age: Int { get }\n    func meow (sound: String)\n}\n```\n\n如果一个类、结构体或枚举遵循此 `Cat`\
    \ 协议，它不仅需要定义 `name` 和 `age` 属性，还必须使用 Swift 代码实现协议中的方法，例如：\n\n```\nstruct pet :\
    \ Cat {\n    var name : String\n    var age : Int\n    func meow (sound : String)\
    \ {\n        print (sound)\n    }\n}\n```\n\n即使类、结构体或枚举遵循的是完全相同的协议，其方法的实际实现也可能大相径庭。在上述示例中，`pet`\
    \ 结构体使用单个 `print` 语句定义了 `meow` 函数。在下面的示例中，`feral` 结构体使用两个 `print` 语句定义了 `meow`\
    \ 函数：\n\n```\nstruct feral : Cat {\n    var name : String\n    var age : Int\n\
    \    func meow (sound : String) {\n        print (\"听我咆哮\")\n        print (sound.uppercased())\n\
    \    }\n}\n```\n\n要了解如何在协议中定义方法并在不同结构体中实现它们，请按以下步骤操作：\n\n1.  确保 Xcode 中已加载 `ProtocolPlayground`\
    \ 文件。\n2.  按如下方式编辑 playground 代码：\n\n```\nimport Cocoa\nprotocol Cat {\n    var\
    \ name: String { get set }\n    var age: Int { get }\n    func meow (sound : String)\n\
    }\n// 实现 meow 方法的一种方式\nstruct pet : Cat {\n    var name : String\n    var age\
    \ : Int\n    func meow (sound : String) {\n        print (sound)\n    }\n}\nvar\
    \ animal = pet(name: \"Taffy\", age: 16)\nprint (animal.name)\nprint (animal.age)\n\
    animal.meow(sound: \"喂我\")\n// 实现同一个 meow 方法的第二种方式\nstruct feral : Cat {\n   \
    \ var name : String\n    var age : Int\n    func meow (sound : String) {\n   \
    \     print (\"听我咆哮\")\n        print (sound.uppercased())\n    }\n}\nvar pest\
    \ = feral(name: \"Stinky\", age: 2)\nprint (pest.name)\nprint(pest.age)\npest.meow(sound:\
    \ \"低吼\")\n```\n\n图 24-2 展示了同一协议方法的两种不同实现的工作方式。\n\n![A437923_1_En_24_Fig2_HTML.jpg](img/A437923_1_En_24_Fig2_HTML.jpg)\n\
    \n**图 24-2.** 尽管遵循同一协议，方法的实现可以不同\n\n## 遵循多个协议\n\n与面向对象编程相比，协议的一大优势在于单个类、结构体或枚举可以遵循两个或更多的协议。要实现这一点，你只需指定要遵循的每个协议的名称，如下所示：\n\
    \n```\nstruct structureName : protocolName1, protocolName2, protocolNameN {\n\
    ```\n\n通过允许你遵循多个协议，Swift 使编码更加灵活，因为你可以选择和使用所需的协议。要了解如何实现遵循多个协议，请按以下步骤操作：\n\n1.\
    \  确保 Xcode 中已加载 `ProtocolPlayground` 文件。\n2.  按如下方式编辑 playground 代码：\n\n    ```\n\
    \    import Cocoa\n    protocol Cat {\n        var name: String { get }\n    \
    \    var age: Int { get }\n    }\n    protocol CatSounds {\n        func meow\
    \ (sound : String)\n    }\n    struct pet : Cat, CatSounds {\n        var name\
    \ : String\n        var age : Int\n        func meow (sound : String) {\n    \
    \        print (sound)\n        }\n    }\n    var animal = pet(name: \"Fluffy\"\
    , age: 6)\n    print (animal.name)\n    print (animal.age)\n    animal.meow(sound\
    \ : \"起床!\")\n    ```\n\n图 24-3 展示了这段代码如何通过一个结构体遵循两个协议来工作。请注意，这段代码的运行效果与将 `name`\
    \ 和 `age` 属性与 `meow` 方法定义在同一协议中完全相同。通过将不同的属性和方法分离到两个或更多的协议中，你无需实现那些不需要的属性和/或方法。\n\
    \n![A437923_1_En_24_Fig3_HTML.jpg](img/A437923_1_En_24_Fig3_HTML.jpg)\n\n**图 24-3.**\
    \ 一个结构体可以遵循两个或更多协议\n\n由于你可以遵循多个协议，通常最好让每个协议尽可能简短和简单。这样可以更容易地只使用你需要的协议，而无需被迫实现你可能不想要或不必要的额外属性和/或方法。\n"
- fmt: "### Protocol Extensions\n\nIn the world of object-oriented programming, you\
    \ can extend a class through inheritance, which inherits every property and method\
    \ that class may have inherited from other classes. In the world of protocol-oriented\
    \ programming, you can extend a protocol through protocol extensions.\n\nOne purpose\
    \ for protocol extensions is to define default values for properties. You could\
    \ define default values by simply assigning values to one or more properties,\
    \ such as\n\n```\nprotocol Cat {\n    var name: String { get }\n    var age: Int\
    \ { get }\n}\n```\n\nThis code defines a protocol called `Cat`, which defines\
    \ a `name` and `age` property as gettable `{ get }`. Then you can create a structure\
    \ that adopts the `Cat` protocol and assigns an initial value to each property:\n\
    \n```\nstruct pet : Cat {\n    var name : String = \"Frank\"\n    var age : Int\
    \ = 2\n}\n```\n\nNow if you declare a variable based on this structure, the variable\
    \ contains those initial values. Despite having an initial value, you can always\
    \ store new data in those properties. To see how to define initial values for\
    \ protocol properties without using extensions, follow these steps:\n\n1.  Make\
    \ sure the `ProtocolPlayground` file is loaded in Xcode.\n2.  Edit the playground\
    \ code as follows:\n\n```\nimport Cocoa\nprotocol Cat {\n    var name: String\
    \ { get }\n    var age: Int { get }\n}\nstruct pet : Cat {\n    var name : String\
    \ = \"Frank\"\n    var age : Int = 2\n}\nvar animal = pet()\nprint (animal.name)\n\
    print (animal.age)\nanimal.name = \"Joey\"\nanimal.age = 13\nprint (animal.name)\n\
    print (animal.age)\n```\n\nWhen you first create the `animal` variable based on\
    \ the `pet` structure, the initial `name` property value is \"Frank\" and the\
    \ initial `age` property value is 2. At any time, you can store a new value in\
    \ both properties, as shown in Figure 24-4.\n\n![A437923_1_En_24_Fig4_HTML.jpg](A437923_1_En_24_Fig4_HTML.jpg)\n\
    \nFigure 24-4. You can assign initial values to gettable properties defined by\
    \ a protocol\n\nIf you want to set (and keep) an initial value for a property,\
    \ that’s when you can use protocol extensions. Protocol extensions can only work\
    \ for gettable `{ get }` properties. A protocol extension just uses the `extension`\
    \ keyword followed by the name of the protocol you want to extend, such as\n\n\
    ```\nextension Cat {\n    // Set one or more default values for gettable properties\
    \ here\n}\n```\n\nInside the extension you can compute a default value for one\
    \ or more gettable properties by using the `return` keyword, such as\n\n```\n\
    extension Cat {\n    var name : String { return \"Frank\" }\n}\n```\n\nNot only\
    \ does the protocol extension define the `name` property to hold the string \"\
    Frank\" but it also eliminates the need to define the `name` property within a\
    \ class, structure, or enum, such as\n\n```\nextension Cat {\n    var name : String\
    \ { return \"Frank\" }\n}\nstruct pet : Cat {\n    var age : Int = 2\n}\n```\n\
    \nThe above protocol extension and structure is essentially equivalent to this:\n\
    \n```\nstruct pet : Cat {\n    var name : String = \"Frank\"\n    var age : Int\
    \ = 2\n}\n```\n\nThe main difference is that when the `name` property is declared\
    \ inside the structure, you can assign new strings to the `name` property later.\
    \ When the `name` property is declared and set to a value inside a protocol extension,\
    \ you cannot assign a new string to the `name` property later. To see how protocol\
    \ extensions define a default value, follow these steps:\n\n1.  Make sure the\
    \ `ProtocolPlayground` file is loaded in Xcode.\n2.  Edit the playground code\
    \ as follows:\n\n```\nimport Cocoa\nprotocol Cat {\n    var name: String { get\
    \ }\n    var age: Int { get }\n}\nextension Cat {\n    var name : String { return\
    \ \"Frank\" }\n}\nstruct pet : Cat {\n    //var name : String = \"Frank\"\n  \
    \  var age : Int = 2\n}\nvar animal = pet()\nprint (animal.name)\nprint (animal.age)\n\
    //animal.name = \"Joey\"\nanimal.age = 13\nprint (animal.name)\nprint (animal.age)\n\
    ```\n\nIn the above code, the two commented lines show you what the protocol extension\
    \ eliminates. Once you define the `name` property inside the protocol extension,\
    \ you no longer need to declare that `name` property inside the `pet` structure.\
    \ You also can’t assign a new string (such as \"Joey\") to the `name` property\
    \ after it’s been assigned a default value in the protocol extension. Figure 24-5\
    \ shows the results of the above code.\n\n![A437923_1_En_24_Fig5_HTML.jpg](A437923_1_En_24_Fig5_HTML.jpg)\n\
    \nFigure 24-5. Defining a default value with a protocol extension\n\nOne problem\
    \ with defining a default value in a protocol extension is that anything that\
    \ adopts that protocol is forced to also adopt that protocol’s extension. This\
    \ means everything based on that protocol and extension will have the same default\
    \ value that can’t be changed.\n\nIf you want the flexibility of defining default\
    \ values, but only for certain classes, structures, or enums, you can create a\
    \ protocol extension that only applies to any class, structure, or enum that also\
    \ adopts a second protocol:\n\n```\nextension protocol2Extend where Self: protocol2Use\
    \ {\n    // Set one or more default values for gettable properties here\n}\n```\n\
    \nThe above Swift code extends a protocol defined by `protocol2Extend`. However,\
    \ the `where Self:` keywords identify a second protocol defined by `protocol2Use`.\n\
    \nSo if a class, structure, or enum adopts the protocol defined by `protocol2Extend`,\
    \ then the extension only sets a default value if the class, structure, or enum\
    \ also adopts the second protocol defined by `protocol2Use`.\n\nSuppose you created\
    \ the following protocol extension:\n\n```\nextension Cat where Self: CatType\
    \ {\n    var name : String { return \"Frank\" }\n}\n```\n\nThis would define a\
    \ default value of \"Frank\" to the `name` property to any class, structure, or\
    \ enum that adopts the `Cat` protocol and the `CatType` protocol. If a class,\
    \ structure, or enum only adopts the `Cat` protocol, its `name` property won't\
    \ be assigned a default value of \"Frank\".\n\nTo see how this version of a protocol\
    \ extension only works when a class, structure, or enum adopts a specific protocol,\
    \ follow these steps:\n\n1.  Make sure the `ProtocolPlayground` file is loaded\
    \ in Xcode.\n2.  Edit the playground code as follows:\n\n```\nimport Cocoa\nprotocol\
    \ Cat {\n    var name: String { get }\n    var age: Int { get }\n}\nprotocol CatType\
    \ {\n    var species: String { get }\n}\nextension Cat where Self: CatType {\n\
    \    var name : String { return \"Frank\" }\n}\nstruct pet : Cat {\n    var name\
    \ : String = \"Max\"\n    var age : Int = 2\n}\nvar animal = pet()\nprint (animal.name)\n\
    print (animal.age)\nanimal.name = \"Joey\"\nanimal.age = 13\nprint (animal.name)\n\
    print (animal.age)\n// New structure that adopts two protocols\nstruct wild :\
    \ Cat, CatType {\n    var age : Int = 2\n    var species : String = \"Lion\"\n\
    }\nvar beast = wild()\nprint (beast.name)\nprint (beast.age)\nprint (beast.species)\n\
    ```\n\nNotice that `pet` structure adopts the `Cat` protocol but since it doesn’t\
    \ adopt the `CatType` protocol as well, you can assign an initial value of \"\
    Max\" to its `name` property and you can later assign \"Joey\" to that same `name`\
    \ property.\n\nHowever, the `wild` structure adopts both the `Cat` and `CatType`\
    \ protocols, so it also adopts the protocol extension, which assigns \"Frank\"\
    \ as a default value to the `wild` structure’s `name` property, as shown in Figure\
    \ 24-6.\n\n![A437923_1_En_24_Fig6_HTML.jpg](A437923_1_En_24_Fig6_HTML.jpg)\n\n\
    Figure 24-6. Protocol extensions can selectively assign default values to a structure\
    \ that adopts a specific protocol"
