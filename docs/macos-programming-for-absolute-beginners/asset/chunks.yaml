    \ object that controls that car engine. Objects not only help you better understand\
    \ how different parts of a program work together, but also isolate code so you\
    \ can create building blocks to put together larger, more sophisticated programs.\n\
    \nObjects help you visualize your program as separate building blocks that are\
    \ independent from each other. Before object-oriented programming, programmers\
    \ divided programs into functions, which also acted like miniature building blocks.\
    \ The main difference between functions and objects is that functions can access\
    \ data used by other functions. This means that if you modify one function, you\
    \ often inadvertently affect other parts of the program. This makes fixing errors\
    \ or bugs difficult and also makes modifying programs difficult as well.\n\nWith\
    \ objects, the main idea is to create separate, independent building blocks that\
    \ work together without affecting each other’s data. To keep data isolated, objects\
    \ use encapsulation. This means an object has its own variables (called properties)\
    \ and functions (called methods).\n\nThe only way you can modify data in an object\
    \ is to use that object’s methods. This way, if something goes wrong, you can\
    \ isolate the problem to that object’s methods. Without objects, any part of a\
    \ program can interfere with data used by another part of a program, which makes\
    \ finding and fixing problems nearly impossible.\n\nObjects can communicate with\
    \ each other in two ways:\n\n*   By storing new values in another object’s properties\n\
    *   By calling another object’s methods\n\nIdeally, a program should consist of\
