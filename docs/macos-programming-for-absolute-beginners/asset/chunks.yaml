    \    colorIcon.isEnabled = true\n    colorIcon.target = self\n    colorIcon.action\
    \ = #selector(colorPicked)\n}\n```\n\n这段 Swift 代码告诉颜色选择器，在程序运行时将在触控栏上显示。\n\n23.\
    \ 选择 `Product` ➤ `Run`。你的 `TouchProgram` 用户界面会出现。现在你需要让触控栏模拟器也显示出来。\n24. 点击 Dock\
