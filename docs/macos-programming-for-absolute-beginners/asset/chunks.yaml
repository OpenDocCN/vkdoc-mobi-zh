    # 摘要


    Xcode 是你设计、编写和修改自己的 macOS 程序所需的唯一程序。当你想要创建一个 macOS 程序时，只需遵循以下基本步骤：


    - 选择一个项目模板（通常为 **Cocoa Application**）。

    - 设计并自定义用户界面。

    - 将用户界面元素连接到 `IBOutlets` 和 `IBAction` 方法。

    - 编写 Swift 代码使 `IBAction` 方法执行相应操作。

    - 运行并测试你的程序。


    要设计用户界面，你需要从对象库中拖放元素，然后使用属性检查器和尺寸检查器来自定义每个用户界面元素。为帮助你选择用户界面元素，你可以使用文稿大纲。


    设计好用户界面后，你需要通过 `IBOutlets`（用于检索或显示数据）和 `IBAction` 方法（用于让用户界面执行操作），使用助理编辑器将用户界面连接到
    Swift 代码。


    要检查用户界面元素与 Swift 代码之间的连接，你可以使用连接检查器或助理编辑器。


    你已经可以看到 Xcode 的不同部分如何协同工作来帮助你创建程序，而我们尚未探索 Xcode 的许多其他功能。创建 Macintosh 程序时最令人困惑的部分，或许在于编写
    Swift 代码以及使用构成 Cocoa 框架的类文件中存储的方法，因此下一章将对此进行更详细的说明。


    如你所见，只要专注于实际需要的功能并忽略其余部分，使用 Xcode 实际上相当简单。随着每一章的学习，你会逐渐了解更多关于 Xcode 和 Swift 编程的知识。


    你已经学到了如此多关于 Xcode 的知识，而这仅仅是个开始。


    # 4. 获取帮助


    学习任何新技能的最好方法是有人向你展示需要学习的内容。既然这并非总是可行，那么你会高兴地知道，Xcode 自带了很多内置帮助功能，让使用 Xcode 不再那么有压力，而是更加愉快。


    要使用 Xcode 的帮助，你首先需要理解 Swift 程序如何工作，以及它们如何与 Cocoa 框架协同工作。一旦你理解了典型的 macOS 程序如何运作以及它如何依赖
    Cocoa 框架，你就能更好地理解如何获取所需的帮助，以及如何理解你在 Xcode 中找到的帮助信息。


    ## 理解 Cocoa 框架


    使用 Xcode 时，你必须理解你创建的每个程序都基于 Cocoa 框架，该框架包含各种属性和方法的类。通过使用这些现有的类，你可以节省时间，而无需自己编写和测试代码。相反，你可以直接使用
    Cocoa 框架中已有的、已经过测试的代码。这让你能够腾出更多时间专注于编写特定于你程序的独特代码。


    要使用 Cocoa 框架，你必须理解面向对象编程的原理以及对象如何工作。要创建一个对象，你首先必须定义一个类。类包含定义属性（用于保存数据）和方法（用于操作存储在其属性中的数据）的实际代码。定义好类之后，你可以基于该类定义一个或多个对象。


    就像饼干模具定义了饼干的形状，但并非实际的饼干一样，类定义了对象，但并非实际的对象。


    Cocoa 框架由多个类文件组成，其中许多类文件继承自其他类文件的属性和方法。当你创建 macOS 程序时，你通常会基于 Cocoa 框架的类文件创建对象。事实上，你从对象库中创建的每个用户界面元素都基于一个
    Cocoa 框架的类。


    为了查看每个用户界面元素基于哪个类文件，我们来检查你创建的三个用户界面元素：一个标签、一个文本字段和一个按钮。


    1. 在 Xcode 中打开 `MyFirstProgram` 项目。

    2. 点击 `MainMenu.xib` 文件。Xcode 会显示你的用户界面。

    3. 选择 **View** ➤ **Utilities** ➤ **Show Object Library**。对象库会出现在 Xcode 窗口的右下角。

    4. 点击 **Push Button** 元素。会出现一个弹出窗口，如图 4-1 所示。请注意，这个弹出窗口会告诉你类文件（`NSButton`），并描述
    `NSButton` 类文件的功能。


    ![A437923_1_En_4_Fig1_HTML.jpg](img/A437923_1_En_4_Fig1_HTML.jpg)


    图 4-1 查找按钮的类文件


    5. 点击 **Done** 按钮关闭弹出窗口。

    6. 浏览对象库并点击 **Label** 元素。会出现一个弹出窗口，如图 4-2 所示。这个弹出窗口会告诉你类文件（`NSTextField`），描述 `NSTextField`
    类文件的功能，并告诉你 `NSTextField` 类继承自（是...的子类）`NSControl` 类。


    ![A437923_1_En_4_Fig2_HTML.jpg](img/A437923_1_En_4_Fig2_HTML.jpg)


    图 4-2 查找标签的类文件


    7. 浏览对象库并点击 **Text Field** 元素。会出现一个弹出窗口，如图 4-3 所示。如果你到目前还没注意到，可以存储数据的用户界面元素通常继承自
    `NSControl` 类文件的属性和方法。


    ![A437923_1_En_4_Fig3_HTML.jpg](img/A437923_1_En_4_Fig3_HTML.jpg)


    图 4-3 查找文本字段的类文件


    通过使用 Xcode 针对对象库中每个元素提供的简单帮助弹出窗口，你了解了关于用户界面的以下信息：


    - 按钮基于 `NSButton` 类文件。

    - 标签基于 `NSTextField` 类文件。

    - 文本字段也基于 `NSTextField` 类文件。

    - `NSButton` 类和 `NSTextField` 类都继承自（是...的子类）`NSControl` 类。


    任何时候你需要查找某个用户界面元素的类文件，只需在对象库窗口中点击该元素即可。要了解每个用户界面元素可用的属性和方法，你需要查找该特定类的所有属性和方法。例如，如果你想知道文本字段可以使用哪些属性和方法，你必须查找
    `NSTextField` 类定义的属性和方法。


    此外，由于 `NSTextField` 类继承自 `NSControl` 类，你还可以使用 `NSControl` 类定义的任何属性和方法。（如果 `NSControl`
    类又继承自另一个类，你也可以使用那个类中存储的属性和方法。）


    注意


    每个类名称前的 `NS` 前缀代表 **NextStep**，这是最初创建 macOS 和 Cocoa 框架的公司。当 Apple 收购 NextStep
    时，他们只是保留了 `NS` 前缀。


    ## 在类文件中查找属性和方法


    一旦你知道了某个特定用户界面元素基于哪个类，你可以在 Xcode 文档中查找其属性和方法列表。有两种方法可以做到这一点：


    - 选择 **Help** ➤ **Documentation and API Reference**。

    - 按住 Option 键并点击 Swift 代码中的类名。


    还记得你需要查找标签和文本字段中存储文本的属性吗？以下是查找此信息的步骤：


    - 确定每个用户界面元素基于的类文件（`NSTextField`，这是你通过在对象库中点击该元素了解到的）。

    - 在 Xcode 文档中查找关于 `NSTextField` 类文件的信息。

    - 如果在 `NSTextField` 类文件中找不到所需的信息，请查找 `NSControl` 类文件，因为 `NSTextField` 类继承了 `NSControl`
    类的所有属性和方法。

