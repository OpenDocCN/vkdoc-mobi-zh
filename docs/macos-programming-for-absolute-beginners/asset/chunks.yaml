  trans: "\n# `if` 语句\n\n布尔值对于程序做出选择至关重要。如果有人输入密码，程序会检查该密码是否有效。如果为 `true`（密码有效），那么程序就授予访问权限。如果为\
    \ `false`（密码无效），那么程序就阻止访问。\n\n为了决定下一步做什么，每个程序都需要评估一个布尔值。只有这样，它才能基于该布尔值来决定下一步的行动。\n\
    \nSwift 中最简单的分支语句类型是 `if` 语句，它看起来像这样：\n\n```\nif BooleanValue == true {\n}\n```\n\
    \n为了简化这个 `if` 语句，你可以省略 `“== true”` 部分，使 `if` 语句变成这样：\n\n```\nif BooleanValue {\n\
    }\n```\n\n这个简化版本的意思是：“如果 `BooleanValue` 为 `true`，则运行花括号内的代码。如果 `BooleanValue`\
    \ 为 `false`，则跳过花括号内的所有代码，不运行它们。”\n\n要了解布尔值如何与 `if` 语句配合使用，请按照以下步骤操作：\n\n1.  在\
    \ Xcode 中打开 `IntroductoryPlayground` 文件。\n2.  按如下方式编辑代码：\n\n    ```\n    import\
    \ Cocoa\n    var BooleanValue = true\n    if BooleanValue {\n    print (\"The\
    \ BooleanValue is true\")\n    }\n    ```\n\n图 7-3 显示了 `if` 语句运行的结果。将 `BooleanValue`\
    \ 的值改为 `false`，你会看到 `if` 语句不再打印字符串 `“The BooleanValue is true”`。\n\n![A437923_1_En_7_Fig3_HTML.jpg](img/A437923_1_En_7_Fig3_HTML.jpg)\n\
    \n图 7-3. 运行 `if` 语句\n\n# `if-else` 语句\n\n`if` 语句的主要限制是它要么运行代码，要么什么都不运行。如果你希望在一组布尔值为\
    \ `true` 时运行一组代码，在布尔值为 `false` 时运行另一组代码，你可以编写两个独立的 `if` 语句，如下所示：\n\n```\nif BooleanValue\
    \ {\n}\nif !BooleanValue {\n}\n```\n\n第一个 `if` 语句在 `BooleanValue` 为 `true` 时运行。如果不是，则什么都不做。\n\
    \n第二个 `if` 语句在 `BooleanValue` 为 `false` 时运行。如果不是，则什么都不做。\n\n编写两个独立 `if` 语句的问题在于程序的逻辑不够清晰。为了解决这个问题，Swift\
    \ 提供了 `if-else` 语句，如下所示：\n\n```\nif BooleanValue {\n// 第一组代码：布尔值为 true 时运行\n}\
    \ else {\n// 第二组代码：布尔值为 false 时运行\n}\n```\n\n`if-else` 语句正好提供两个不同的分支。如果布尔值为 `true`，则运行第一组代码。如果布尔值为\
    \ `false`，则运行第二组代码。在任何情况下，`if-else` 语句中的两组代码都不可能同时运行。\n\n要了解布尔值如何与 `if-else` 语句配合使用，请按照以下步骤操作：\n\
    \n1.  在 Xcode 中打开 `IntroductoryPlayground` 文件。\n2.  按如下方式编辑代码：\n\n    ```\n  \
    \  import Cocoa\n    var BooleanValue = true\n    if BooleanValue {\n    print\
    \ (\"The BooleanValue is true\")\n    } else {\n    print (\"The BooleanValue\
    \ is false\")\n    }\n    ```\n\n图 7-4 显示了当 `BooleanValue` 为 `true` 时 `if-else`\
    \ 语句的工作方式。将 `BooleanValue` 改为 `false`，看看 `if-else` 语句如何运行第二组代码。\n\n![A437923_1_En_7_Fig4_HTML.jpg](img/A437923_1_En_7_Fig4_HTML.jpg)\n\
    \n图 7-4. 运行 `if-else` 语句\n\n# `if-else-if` 语句\n\n`if` 语句要么运行一组代码，要么什么都不运行。`if-else`\
    \ 语句总是运行一组代码或另一组代码。但是，如果你希望在两组或多组可能的代码之间进行选择怎么办？在这种情况下，你需要使用 `if-else-if` 语句。\n\
    \n与 `if` 语句一样，`if-else-if` 语句可能根本不运行任何代码。最简单的 `if-else-if` 语句如下所示：\n\n```\nif\
    \ BooleanValue {\n// 第一组代码：布尔值为 true 时运行\n} else if BooleanValue2 {\n// 第二组代码：布尔值为\
    \ true 时运行\n}\n```\n\n使用 `if-else-if` 语句，必须有一个布尔值为 `true` 才能运行代码。如果没有布尔值为 `true`，那么可能根本不会运行任何代码。`if-else-if`\
    \ 语句等效于多个 `if` 语句，如下所示：\n\n```\nif BooleanValue {\n// 第一组代码：布尔值为 true 时运行\n}\n\
    if BooleanValue2 {\n// 第二组代码：布尔值为 true 时运行\n}\n```\n\n使用 `if-else-if` 语句，你可以根据需要检查任意数量的布尔值，例如：\n\
    \n```\nif BooleanValue {\n// 第一组代码：布尔值为 true 时运行\n} else if BooleanValue2 {\n\
    // 第二组代码：布尔值为 true 时运行\n} else if BooleanValue3 {\n// 第三组代码：布尔值为 true 时运行\n} else\
    \ if BooleanValue4 {\n// 第四组代码：布尔值为 true 时运行\n} else if BooleanValue5 {\n// 第五组代码：布尔值为\
    \ true 时运行\n}\n```\n\n一旦 `if-else-if` 语句找到一个为 `true` 的布尔值，它就会运行花括号内附带的代码。但是，有可能所有布尔值都不为\
    \ `true`，在这种情况下，`if-else-if` 语句内的所有代码都不会运行。\n\n如果你想确保至少有一组代码会运行，那么你需要在 `if-else-if`\
    \ 语句的末尾添加一个最终的 `else` 子句，例如：\n\n```\nif BooleanValue {\n// 第一组代码：布尔值为 true 时运行\n\
    } else if BooleanValue2 {\n// 第二组代码：布尔值为 true 时运行\n} else if BooleanValue3 {\n\
    // 第三组代码：布尔值为 true 时运行\n} else if BooleanValue4 {\n// 第四组代码：布尔值为 true 时运行\n} else\
    \ if BooleanValue5 {\n// 第五组代码：布尔值为 true 时运行\n} else {\n// 如果其他所有布尔值都为 false，则运行此代码\n\
    }\n```\n\n要了解布尔值如何与 `if-else-if` 语句配合使用，请按照以下步骤操作：\n\n1.  在 Xcode 中打开 `IntroductoryPlayground`\
    \ 文件。\n2.  按如下方式编辑代码：\n\n    ```\n    import Cocoa\n    var BooleanValue = false\n\
    \    var BooleanValue2 = false\n    var BooleanValue3 = false\n    if BooleanValue\
    \ {\n    print (\"BooleanValue is true\")\n    } else if BooleanValue2 {\n   \
    \ print (\"BooleanValue2 is true\")\n    } else if BooleanValue3 {\n    print\
    \ (\"BooleanValue3 is true\")\n    } else {\n    print (\"This prints if everything\
    \ else is false\")\n    }\n    ```\n\n注意，因为每个布尔值都是 `false`，唯一运行的代码发生在 `if-else-if`\
    \ 语句最终的 `else` 部分，如图 7-5 所示。\n\n![A437923_1_En_7_Fig5_HTML.jpg](img/A437923_1_En_7_Fig5_HTML.jpg)\n\
    \n图 7-5. 运行包含多个布尔值的 `if-else-if` 语句\n\n如果你将不同的布尔值更改为 `true`，你可以通过运行不同的代码集来观察 `if-else-if`\
    \ 语句如何表现不同。\n\n关于 `if-else-if` 语句：\n\n*   除非最后一部分只是一个普通的 `else` 语句，否则可能不会运行任何代码。\n\
    *   程序可以在两组或多组代码之间进行选择。\n*   可选选项的数量不限于像 `if-else` 语句那样只有两个选项。\n\n由于 `if-else-if`\
    \ 语句会检查多个布尔值，那么如果两个或更多布尔值为 `true` 会发生什么？在这种情况下，`if-else-if` 语句仅运行与第一个为 `true`\
    \ 的布尔值关联的代码集，并忽略所有其余代码，如图 7-6 所示。\n\n![A437923_1_En_7_Fig6_HTML.jpg](img/A437923_1_En_7_Fig6_HTML.jpg)\n\
    \n图 7-6. 运行包含多个布尔值为 true 的 `if-else-if` 语句\n"
- fmt: "# The `switch` Statement\n\nAn `if-else-if` statement lets you create two\
    \ or more sets of code that can possibly run. Unfortunately, an `if-else-if` statement\
    \ can be hard to understand when there’s too many Boolean values to check. To\
    \ fix this problem, Swift offers a `switch` statement.\n\nA `switch` statement\
    \ works much like an `if-else-if` statement except that it’s easier to read and\
    \ write. The main difference is that instead of checking multiple Boolean values,\
    \ a `switch` statement checks the value of a single variable. Based on the value\
    \ of this single variable, the `switch` statement can choose to run different\
    \ sets of code.\n\nThe simplest `switch` statement checks if a variable is exactly\
    \ equal to different values, such as:\n\n```\nswitch value/variable/expression\
    \ {\ncase value1: // First set of code to run if variable = value1\ncase value2:\
    \ // Second set of code to run if variable = value2\ncase value3: // Third set\
    \ of code to run if variable = value3\ndefault: // Fourth set of code to run if\
    \ nothing else runs\n}\n```\n\nA `switch` statement starts by examining a fixed\
    \ value (such as 38 or \"Bob\"), a variable (which represents data), or an expression\
    \ (such as `3 * age` where `age` is a variable). Ultimately, the `switch` statement\
    \ needs to identify a single value and match that value to the first `case` statement\
    \ it finds. The moment it finds an exact match, it runs one or more lines of code\
    \ associated with that `case` statement.\n\nTo see how Boolean values work with\
    \ a `case` statement, follow these steps:\n\n1. Open the `IntroductoryPlayground`\
    \ file in Xcode.\n2. Edit the code as follows:\n\n```\n    import Cocoa\n    var\
    \ whatNumber = 3\n    switch whatNumber {\n    case 1: print (\"The number is\
    \ 1\")\n    case 2: print (\"The number is 2\")\n    case 3: print (\"The number\
    \ is 3\")\n    print (\"Isn't this amazing?\")\n    case 4: print (\"The number\
    \ is 4\")\n    case 5: print (\"The number is 5\")\n    default: print (\"The\
    \ number is undefined\")\n    }\n```\n\nBecause the value of the `whatNumber`\
    \ variable is 3, the `switch` statement matches it with `case 3:` and then runs\
    \ the Swift code that appears after the colon, as shown in Figure 7-7. Note that\
    \ you can store multiple lines of code after the colon and you do not need to\
    \ enclose the code within curly brackets. Change the value of the `whatNumber`\
    \ variable to see how it affects the behavior of the `switch` statement.\n\n![A437923_1_En_7_Fig7_HTML.jpg](A437923_1_En_7_Fig7_HTML.jpg)\n\
    \nFigure 7-7. Running a `switch` statement to match an exact value\n\nNote: Unlike\
    \ other programming languages like Objective-C, you do not need to use a `break`\
    \ command to separate code stored in different `case` statements of the `switch`\
    \ statement.\n\nThe above `switch` statement is equivalent to:\n\n```\nif whatNumber\
    \ == 1 {\n    print (\"The number is 1\")\n} else if whatNumber == 2 {\n    print\
    \ (\"The number is 2\")\n} else if whatNumber == 3 {\n    print (\"The number\
    \ is 3\")\n    print (\"Isn't this amazing?\")\n} else if whatNumber == 4 {\n\
    \    print (\"The number is 4\")\n} else if whatNumber == 5 {\n    print (\"The\
    \ number is 5\")\n} else {\n    print (\"The number is undefined\")\n}\n```\n\n\
    As you can see, the `switch` statement is cleaner and simpler to read and understand.\n\
    \nWhen creating a `switch` statement, you must handle all possibilities. In the\
    \ above `switch` statement, the `whatNumber` variable can be any integer, so the\
    \ `switch` statement can explicitly handle any value from 1 to 5. If the value\
    \ does not fall within this 1 to 5 range, then the `default` portion of the `switch`\
    \ statement handles any other value. If you fail to include a `default`, then\
    \ Xcode will flag your `switch` statement as a possible error. This is to protect\
    \ your code from possibly crashing if the `switch` statement receives data it\
    \ doesn’t know how to handle.\n\nThis example of a `switch` statement tries to\
    \ match a `value/variable/expression` with exactly one value. However, a `switch`\
    \ statement can try matching more than one value. There are three ways a `switch`\
    \ statement can check a range of values:\n\n- Explicitly list all possible values,\
    \ separated by a comma\n- Define the starting and ending range of numbers separated\
    \ by three dots (`...`)\n- Define the starting number and the ending range with\
    \ two dots and a less-than sign (`..<`)\n\nWhen a `case` statement lists all values\
    \ separated by commas, its code will run only if the switch `value/variable/expression`\
    \ exactly matches one of those values. For example, consider the following `case`\
    \ statement:\n\n```\nswitch whatNumber {\ncase 1, 2, 3: print (\"The number is\
    \ 1, 2, or 3\")\ndefault: print (\"The number is undefined\")\n}\n```\n\nOnly\
    \ if the value of `whatNumber` is 1, 2, or 3 will its code print \"The number\
    \ is 1, 2, or 3\".\n\nExplicitly listing all possible values may be fine for a\
    \ handful of numbers, but for multiple numbers, it can get tedious to write every\
    \ possible number. As a shortcut, Swift lets you specify a range. If you want\
    \ to match a number between 4 and 20, the `case` portion of the `switch` statement\
    \ might look like this:\n\n```\nswitch whatNumber {\ncase 4...20: print (\"The\
    \ number is between 4 and 20\")\ndefault: print (\"The number is undefined\")\n\
    }\n```\n\nIn this case, `whatNumber` could be 4, 20, or any number in between.\
    \ The three dots signify a range that includes the starting and ending number\
    \ of the range (4 and 20).\n\nSwift can also check a half range that consists\
    \ of two dots and a less-than symbol, such as:\n\n```\nswitch whatNumber {\ncase\
    \ 20..<49: print (\"The number is between 20 and 48\")\ndefault: print (\"The\
    \ number is undefined\")\n}\n```\n\nThis `20..<49` half range matches only if\
    \ `whatNumber` is 20, 48, or any number in between. Notice that if `whatNumber`\
    \ is 49, it will not match the half range but if `whatNumber` is 20, then it will\
    \ match.\n\nTo see how all three variations of multiple values works, follow these\
    \ steps:\n\n1. Open the `IntroductoryPlayground` file in Xcode.\n2. Edit the code\
    \ as follows:\n\n```\n    import Cocoa\n    var whatNumber = 49\n    switch whatNumber\
    \ {\n    case 1, 2, 3: print (\"The number is 1\")\n    println (\"Isn't this\
    \ amazing?\")\n    case 4...20: print (\"The number is between 4 and 20\")\n \
    \   case 20..<49: print (\"The number is between 20 and 48\")\n    default: print\
    \ (\"The number is undefined\")\n    }\n```\n\nWhen the value is 49, the `switch`\
    \ statement matches nothing so it uses the `default` portion of the `switch` statement,\
    \ as shown in Figure 7-8.\n\n![A437923_1_En_7_Fig8_HTML.jpg](A437923_1_En_7_Fig8_HTML.jpg)\n\
    \nFigure 7-8. Running a `switch` statement that checks for multiple values\n\n\
    Change the value of the `whatNumber` variable to 2, 12, and 48 to see how the\
    \ `switch` statement matches different values.\n\nIn the previous example, the\
    \ `switch` statement could check for multiple values (1, 2, 3) or a range of values\
    \ (`4...20`) and (`20..<49`). However, sometimes you may want to check if a value\
    \ is less than, less than or equal, greater than, or greater than or equal. To\
    \ check for `<`, `<=`, `>`, or `>=` in a `switch` statement, you have to use the\
    \ following:\n\n```\ncase _ where variableName < value:\n```\n\nThe `_ where`\
    \ code tells Swift to match this `case` if a specific variable is `<`, `<=`, `>`,\
    \ or `>=` to a certain value. To see how to check for `<`, `<=`, `>`, or `>=`\
    \ in a `switch` statement, follow these steps:\n\n1. Open the `IntroductoryPlayground`\
    \ file in Xcode.\n2. Edit the code as follows:\n\n```\n    import Cocoa\n    var\
    \ whatNumber = 49\n    switch whatNumber {\n    case _ where whatNumber = 11 :\
    \ print (\"The number is greater than or equal to 11\")\n    default: print (\"\
    The number is undefined\")\n    }\n```\n\nWhen the value is 49, the `switch` statement\
    \ matches the `>= 11` case statement so it prints \"The number is greater than\
    \ or equal to 11\"; see Figure 7-9.\n\n![A437923_1_En_7_Fig9_HTML.jpg](A437923_1_En_7_Fig9_HTML.jpg)\n\
    \nFigure 7-9. Running a `switch` statement that checks for multiple values"
