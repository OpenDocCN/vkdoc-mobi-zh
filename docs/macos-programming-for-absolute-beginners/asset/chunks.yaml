    To make writing macOS and iOS programs easier, Apple has created a library framework
    of useful functions called the Cocoa framework.


    There are two reasons for reusing an existing framework. First, reusing a framework
    keeps you from having to write your own instructions to accomplish a task that
    somebody else has already solved. Not only does a framework provide a ready-made
    solution, but a framework has also been tested by others, so you can just use
    the framework and be assured that it will work correctly.


    A second reason to use an existing framework is for consistency. Apple provides
    frameworks for defining the appearance of a program on the screen, known as the
    user interface. This defines how a program should behave from displaying windows
    on the screen to letting you resize or close a window by clicking the mouse.


    It’s perfectly possible to write your own instructions for displaying windows
    on the screen, but chances are good that writing your own instructions will take
    time to create and test, and the end result will be a user interface that may
    not look or behave identically to other macOS or iOS programs.


    However, by reusing an existing framework, you can create your own program quickly
    and insure that your program behaves the same way that other programs behave.
    Although programming might sound complicated, Apple provides hundreds of prewritten
    and tested functions that help you create programs quickly and easily. All you
    have to do is write the custom instructions that make your program solve a specific,
    unique problem.


    To understand how Apple’s Cocoa framework works, you need to understand object-oriented
    programming for two reasons. First, Swift is an object-oriented programming language,
    so to take full advantage of Swift, you need to understand the advantages of object-oriented
    programming.


    Second, Apple’s Cocoa framework is based on object-oriented programming. To understand
    how to use the Cocoa framework, you need to use objects.


    Note


    The Cocoa framework is designed for creating macOS programs. A similar framework
    called Cocoa Touch is designed for creating iOS apps. Because the Cocoa Touch
    framework (iOS) is based on the Cocoa framework (macOS), they work similarly but
    offer different features.


    By relying on the Cocoa framework, your programs can gain new features each time
    Apple updates and improves the Cocoa framework. For example, spell-checking is
    a built-in feature of the Cocoa framework. If you write a program using the Cocoa
    framework, your programs automatically get spell-checking capabilities without
    you having to write any additional code whatsoever. When Apple improves the spell-checking
    feature in the Cocoa framework, your program automatically gets those improvements
    with no extra effort on your part.


    The Cocoa framework is a general term that describes all of Apple’s pre-written
    and tested libraries of code. Some different parts of the Cocoa framework can
    give your programs audio playing capabilities, graphics capabilities, contact
    information storage abilities such as names and addresses, and Internet capabilities.


    The Cocoa framework creates the foundation of a typical macOS program. All you
    have to do is write Swift code that makes your program unique.'
  trans: '

    *   尽可能少的代码

    *   功能尽可能强大的代码

    *   尽可能易于理解的代码


    你希望编写尽可能少的代码，因为代码越少，就越容易确保其正确运行。


    你希望代码功能尽可能强大，因为这能让你的程序具备解决更大问题的能力。


    你希望代码易于理解，因为这能让修复问题和添加功能变得容易。


    不幸的是，这三个标准常常相互矛盾，如图 1-5 所示。


    ![A437923_1_En_1_Fig5_HTML.jpg](img/A437923_1_En_1_Fig5_HTML.jpg)


    图 1-5.


    编程中三个常常相互矛盾的目标


    如果你编写的代码尽可能少，这通常意味着你的代码功能有限。这就是程序员经常借助捷径和编程技巧来压缩代码量的原因，但这会增加代码的复杂度，使其更难理解。


    如果你编写的代码功能尽可能强大，这通常意味着要编写大量的命令，这会使代码更难理解。


    如果你编写易于理解的代码，它通常功能有限。如果你编写更多代码来增强功能，这又会降低代码的可读性。


    归根结底，计算机编程更像是一门艺术而非科学。通常，最好专注于让代码尽可能易于理解，因为这会使得修复问题和添加新功能更加容易。此外，易于理解的代码意味着，如果你无法亲自维护，其他程序员也能修复和修改你的程序。


    这正是苹果公司创建 `Swift` 的原因：在不牺牲 `Objective-C` 强大功能的前提下，使代码比 `Objective-C` 更易于理解。尽管
    `Swift` 比 `Objective-C` 更强大，但 `Swift` 代码通常可以比等效的 `Objective-C` 代码更短。因此，苹果未来的编程语言将是
    `Swift`。


    ## Cocoa 框架


    关键字（和符号）让你能够向计算机发出指令，但没有任何一种编程语言能提供创建所有类型程序所需的一切命令。为了提供额外的命令，程序员使用关键字来创建执行特定任务的函数。


    当他们创建了一个有用的函数后，通常会将其保存在一个包含其他有用函数的库中。在编写程序时，你可以使用编程语言的关键字以及库中存储的任何函数。通过复用库中的函数，你可以创建更强大、更可靠的代码。


    例如，一个库可能包含用于显示图形的函数。另一个库可能包含用于将数据保存到磁盘并重新读取数据的函数。还有的库可能包含用于计算数学公式的函数。为简化和 `macOS`
    及 `iOS` 程序的编写，苹果公司创建了一个名为 `Cocoa` 框架的实用函数库。


    复用现有框架有两个原因。首先，复用框架使你不必为完成别人已经解决的问题而编写自己的指令。框架不仅提供了现成的解决方案，而且已经过他人的测试，因此你可以直接使用框架，并确信它能正确运行。


    使用现有框架的第二个原因是为了保持一致性。苹果提供了用于定义程序在屏幕上外观的框架，即用户界面。这定义了程序应如何运行，从在屏幕上显示窗口，到让你通过点击鼠标来调整窗口大小或关闭窗口。


    你完全可以编写自己的指令来在屏幕上显示窗口，但编写自己的指令很可能需要耗费时间来创建和测试，最终得到的用户界面可能看起来或操作起来与其他 `macOS` 或
    `iOS` 程序并不一致。


    然而，通过复用现有框架，你可以快速创建自己的程序，并确保你的程序与其他程序的行为方式一致。虽然编程听起来可能很复杂，但苹果提供了数百个预先编写并经过测试的函数，可以帮助你快速、轻松地创建程序。你只需编写那些能让你的程序解决特定、独特问题的自定义指令即可。


    要理解苹果的 `Cocoa` 框架是如何工作的，你需要了解面向对象编程，这有两个原因。首先，`Swift` 是一种面向对象的编程语言，因此要充分利用 `Swift`
    的优势，你需要理解面向对象编程的好处。


    其次，苹果的 `Cocoa` 框架基于面向对象编程。要理解如何使用 `Cocoa` 框架，你需要使用对象。


    注意


    `Cocoa` 框架是为创建 macOS 程序而设计的。一个名为 `Cocoa Touch` 的类似框架是为创建 iOS 应用而设计的。由于 `Cocoa
    Touch` 框架（iOS）基于 `Cocoa` 框架（macOS），它们的工作方式相似，但提供了不同的功能。


    通过依赖 `Cocoa` 框架，你的程序在苹果每次更新和改进 `Cocoa` 框架时都能获得新功能。例如，拼写检查是 `Cocoa` 框架的一个内置功能。如果你使用
    `Cocoa` 框架编写程序，你的程序会自动获得拼写检查能力，而无需你编写任何额外的代码。当苹果改进 `Cocoa` 框架中的拼写检查功能时，你的程序无需你付出任何额外努力就能自动获得这些改进。


    `Cocoa` 框架是一个总称，描述了苹果所有预先编写并经过测试的代码库。`Cocoa` 框架的不同部分可以为你的程序提供音频播放能力、图形能力、联系人信息（如姓名和地址）存储能力以及互联网能力。


    `Cocoa` 框架构建了典型 macOS 程序的基础。你只需编写使你的程序独一无二的 `Swift` 代码即可。

