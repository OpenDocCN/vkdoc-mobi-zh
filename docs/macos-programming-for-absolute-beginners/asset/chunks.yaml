  trans: "\n# 编辑命令\n\n当你修改了菜单栏上出现的下拉菜单标题，以及每个下拉菜单上出现的命令后，你可能希望使用“检查器”面板进一步编辑每个单独的命令。“检查器”面板可用于修改以下属性：\n\
    \n- **标题**：显示菜单命令的文本\n- **键位等效**：定义命令的键盘快捷键\n\n要编辑命令（或下拉菜单标题），请按照以下步骤操作：\n\n1.\
    \ 在项目导航器面板中点击`.xib`或`.storyboard`文件。\n2. 在“文档大纲”中或直接在下拉菜单上，点击要编辑的下拉菜单命令（或下拉菜单标题）。\n\
    3. 选择“显示”➤“实用工具”➤“显示属性检查器”。此时会出现“显示属性检查器”面板，如图 22-10 所示。\n\n    ![A437923_1_En_22_Fig10_HTML.jpg](img/A437923_1_En_22_Fig10_HTML.jpg)\n\
    \n    图 22-10. 向下拉菜单列表中拖放新命令\n\n4. 点击“检查器”面板中的“标题”文本字段，以编辑命令的文本。\n5. 点击“键位等效”文本字段，然后按下（而非输入）你要分配给该命令的键盘快捷键。确保此键盘快捷键未被其他命令使用（例如“剪切”命令的\
    \ Command + X）。Xcode 将在下拉菜单命令的右侧显示你的键盘快捷键。\n\n# 将菜单命令连接到 Swift 代码\n\n当你修改了下拉菜单标题并用适当的命令填充它们后，最终你需要让这些命令真正执行某些操作。这意味着将你的菜单命令连接到`IBAction`方法，这与将按钮或其他用户界面项目连接到包含\
    \ Swift 代码的文件类似。你可以按住 Control 键，从下拉菜单上的菜单命令或“文档大纲”中显示的菜单命令拖拽。\n\n当你创建一个 Cocoa\
    \ 应用程序项目时，你会发现许多菜单命令已经可以工作，例如“文件”➤“打印”、“窗口”➤“最小化”以及应用程序名称➤“关于”命令。这些功能由 Cocoa 框架中的`NSApplication`、`NSWindow`、`NSView`和`NSResponder`类提供。\n\
    \n如果你点击 Cocoa 应用程序项目中的某个菜单命令，然后选择“显示”➤“实用工具”➤“显示连接检查器”，你将看到 Xcode 窗口右上角的“连接检查器”面板。\n\
    \n“连接检查器”面板允许你查看所选用户界面项目（如下拉菜单上的命令）连接到了什么，如图 22-11 所示。\n\n![A437923_1_En_22_Fig11_HTML.jpg](img/A437923_1_En_22_Fig11_HTML.jpg)\n\
    \n图 22-11. “连接检查器”面板显示了用户界面连接到了哪个`IBAction`方法\n\n在图 22-11 中，“文件”菜单上的“打印”菜单命令连接到了`print:`\
    \ `IBAction`方法，但此`IBAction`方法并不存储在特定文件中。相反，它连接到了一个名为“第一响应者”的对象，该对象由`NSResponder`类定义。\n\
    \n用户界面由多个基于`NSApplication`、`NSWindow`和`NSView`的对象组成，因此“第一响应者”只是指向第一个应响应用户点击用户界面项目（如“文件”菜单上的“打印”命令）的对象。如果这个第一个对象没有`print:`\
    \ `IBAction`方法，它就会在下一个对象中搜索此`IBAction`方法。\n\n因此，如果你在窗口上有一个文本字段并点击“文件”菜单上的“打印”命令，“打印”命令将首先在该文本字段（基于`NSTextField`，而`NSTextField`又基于`NSView`）中查找`print:`\
    \ `IBAction`方法。如果在`NSTextField`类中找不到`print:` `IBAction`方法，它会接着在窗口（基于`NSWindow`）或应用程序本身（基于`NSApplication`）中查找。\n\
    \n如果你点击“第一响应者”图标，然后选择“显示”➤“实用工具”➤“显示连接检查器”，你可以看到“第一响应者”的“连接检查器”面板，该面板标识了所有连接到典型\
    \ Cocoa 应用程序项目默认下拉菜单的`IBAction`方法，如图 22-12 所示。\n\n![A437923_1_En_22_Fig12_HTML.jpg](img/A437923_1_En_22_Fig12_HTML.jpg)\n\
    \n图 22-12. “第一响应者连接检查器”面板列出了所有连接到 Cocoa 应用程序项目默认下拉菜单的`IBAction`方法\n\n> **注意：**\
    \ 另一种查看“连接检查器”的方法是右键点击“第一响应者”图标，如图 22-13 所示。\n\n![A437923_1_En_22_Fig13_HTML.jpg](img/A437923_1_En_22_Fig13_HTML.jpg)\n\
    \n图 22-13. 右键点击“第一响应者”图标会列出所有连接到 Cocoa 应用程序项目默认下拉菜单的`IBAction`方法\n\n尽管 Cocoa 应用程序模板创建了标准下拉菜单和命令，你仍需要编写\
    \ Swift 代码才能使许多命令真正生效。例如，“保存”命令不知道要保存什么或如何保存，“新建”命令不知道要创建哪种类型的文档。\n\n要了解菜单命令如何像其他带有`.xib`文件的用户界面项目一样，与`IBAction`方法协同工作，请按照以下步骤操作：\n"
- fmt: "从 Xcode 中选择 File ➤ New ➤ Project。  \n点击 macOS 类别下的 Application。  \n点击 Cocoa\
    \ Application，然后点击 Next 按钮。Xcode 会要求输入产品名称。  \n在 Product Name 文本字段中点击并输入 `MenuProgram`。\
    \  \n确保 Language 弹出菜单显示 Swift，并且没有选中任何复选框。本项目将使用 `.xib` 文件作为用户界面。  \n点击 Next 按钮。Xcode\
    \ 会询问项目存储位置。  \n选择一个文件夹来存储项目，然后点击 Create 按钮。  \n在项目导航器中点击 `MainMenu.xib` 文件。 \
    \ \n在文档大纲中点击 Window 图标，以显示程序的用户界面。  \n选择 View ➤ Utilities ➤ Show Object Library。Object\
    \ Library 会出现在 Xcode 窗口的右下角。  \n将一个文本字段拖拽到用户界面窗口中。你可能需要加宽该文本字段的宽度。  \n将 Object\
    \ Library 中的一个菜单项拖拽到 File 菜单的底部。你可以将该菜单项拖拽到 File 下拉菜单上，或拖拽到文档大纲中，如图 [22-14](#A437923_1_En_22_Chapter.html#Fig14)\
    \ 所示。\n\n![A437923_1_En_22_Fig14_HTML.jpg](A437923_1_En_22_Fig14_HTML.jpg)\n\n\
    图 22-14.  \n将菜单项拖拽到 File 下拉菜单的底部  \n选择 View ➤ Assistant Editor ➤ Show Assistant\
    \ Editor。`AppDelegate.swift` 文件会出现在用户界面旁边。  \n将鼠标指针移到文本字段上，按住 Control 键，然后将其拖拽到\
    \ `AppDelegate.swift` 文件中的 `IBOutlet` 行下方。  \n松开 Control 键和鼠标按钮。会出现一个弹出窗口。  \n\
    在 Name 文本字段中点击并输入 `textResult`，然后点击 Connect 按钮，使你的 `IBOutlet` 看起来像这样：\n\n```\n\
    \    @IBOutlet weak var textResult: NSTextField!\n```\n\n将鼠标指针移到刚刚添加到 File 下拉菜单底部的菜单项上（无论是在下拉菜单上还是在文档大纲中），按住\
    \ Control 键，然后将其拖拽到 `ViewController.swift` 文件底部最后一个大括号的上方。  \n松开 Control 键和鼠标按钮。会出现一个弹出窗口。\
    \  \n在 Connection 弹出菜单中点击并选择 Action。  \n在 Name 文本字段中点击并输入 `myMenu`。  \n在 Type\
    \ 弹出菜单中点击并选择 `NSMenuItem`，然后点击 Connect 按钮。Xcode 会创建一个空的 `IBAction` 方法。  \n按如下方式修改\
    \ `IBAction` 方法：\n\n```\n    @IBAction func myMenu(_ sender: NSMenuItem) {\n \
    \   textResult.stringValue = \"Clicked on = \" + sender.title\n    }\n```\n\n\
    点击程序 File 下拉菜单中的 Save 命令（不是 Xcode 的 File 菜单）。  \n选择 View ➤ Utilities ➤ Show Connections\
    \ Inspector。Connections Inspector 面板显示 Save 命令已连接到 First Responder 中的 `saveDocument`\
    \ IBAction 方法，如图 [22-15](#A437923_1_En_22_Chapter.html#Fig15) 所示。\n\n![A437923_1_En_22_Fig15_HTML.jpg](A437923_1_En_22_Fig15_HTML.jpg)\n\
    \n图 22-15.  \nFile 下拉菜单中 Save 命令的 Connections Inspector  \n点击 First Responder\
    \ 左侧出现的关闭图标（X）。这会切断 Save 命令与 `saveDocument` IBAction 方法之间的连接。  \n将鼠标指针移到 File\
    \ 下拉菜单中的 Save 命令上，按住 Control 键，然后将其拖拽到步骤 22 中创建的 IBAction 方法的 `myMenu` 函数关键字上。确保\
    \ Xcode 高亮显示整个 IBAction 方法并显示 Connect Action，如图 [22-16](#A437923_1_En_22_Chapter.html#Fig16)\
    \ 所示。\n\n![A437923_1_En_22_Fig16_HTML.jpg](A437923_1_En_22_Fig16_HTML.jpg)\n\n\
    图 22-16.  \n将 Save 命令连接到现有的 IBAction 方法  \n松开 Control 键和鼠标按钮。Xcode 会将 Save 命令连接到\
    \ `myMenu` IBAction 方法。  \n选择 Product ➤ Run。用户界面会出现。  \n点击 File 菜单标题。注意，你的菜单项（标记为\
    \ Item）会出现在 File 下拉菜单的底部。  \n点击 Save 命令。文本字段会显示“Clicked on = Save…”。  \n点击 File\
    \ 菜单标题并点击 Item（即你添加的菜单项）。文本字段会显示“Clicked on = Item”。  \n选择 MenuProgram ➤ Quit\
    \ MenuProgram。\n\n`MenuProgram` 项目展示了如何将菜单命令连接到文本字段，以便文本字段显示用户点击的菜单命令的名称。但是，在使用\
    \ storyboard 时，连接菜单命令的方式略有不同。\n\n主要区别在于，在 storyboard 中，下拉菜单存储在与实际用户界面不同的场景中，如图\
    \ [22-17](#A437923_1_En_22_Chapter.html#Fig17) 所示。\n\n![A437923_1_En_22_Fig17_HTML.jpg](A437923_1_En_22_Fig17_HTML.jpg)\n\
    \n图 22-17.  \n在 storyboard 中，下拉菜单出现在与用户界面分离的场景中\n\n这意味着，当你对下拉菜单命令进行 Control 拖拽时，Xcode\
    \ 会将你的 Swift 代码存储在 `AppDelegate.swift` 文件中；但如果你对用户界面元素（如文本字段）进行 Control 拖拽，Xcode\
    \ 会将你的 Swift 代码存储在 `ViewController.swift` 文件中。\n\n本质上，这意味着如果你为文本字段创建了一个 `IBOutlet`，它会存储在\
    \ `ViewController.swift` 文件中，而你的下拉菜单命令的 `IBAction` 方法则存储在 `AppDelegate.swift`\
    \ 文件中，这意味着 `IBOutlet` 不知道这些 `IBAction` 方法的存在（反之亦然）。\n\n解决这个问题的方法是将你的下拉菜单命令连接到\
    \ First Responder 图标。这意味着你的程序会首先在其 `AppDelegate.swift` 文件中查找 `IBAction` 方法，然后也会在其他文件中查找相同的\
    \ `IBAction` 方法。\n\n因此，技巧是在 `AppDelegate.swift` 文件中创建一个空的 `IBAction` 方法，并在 `ViewController.swift`\
    \ 文件中创建一个相同的 `IBAction` 方法，但你需要用 Swift 代码填充这第二个 `IBAction` 方法，以使其能够检索所选菜单命令的标题。\n\
    \n要了解菜单命令如何与 storyboard 配合工作，请按照以下步骤操作：\n\n从 Xcode 中选择 File ➤ New ➤ Project。 \
    \ \n点击 macOS 类别下的 Application。  \n点击 Cocoa Application，然后点击 Next 按钮。Xcode 会要求输入产品名称。\
    \  \n在 Product Name 文本字段中点击并输入 `StoryMenu`。  \n确保 Language 弹出菜单显示 Swift，并且仅选中“Use\
    \ storyboards”复选框。  \n点击 Next 按钮。Xcode 会询问项目存储位置。  \n选择一个文件夹来存储项目，然后点击 Create\
    \ 按钮。  \n在项目导航器中点击 `Main.storyboard` 文件。程序的用户界面会出现。  \n选择 View ➤ Utilities ➤ Show\
    \ Object Library，然后将一个文本字段拖拽到用户界面（由标题栏中的视图控制器标识）上。你可能需要加宽文本字段的宽度。  \n选择 View ➤\
    \ Assistant Editor ➤ Show Assistant Editor。Xcode 会在用户界面旁边显示 `ViewController.swift`\
    \ 文件。  \n将鼠标指针移到文本字段上，按住 Control 键，然后将其拖拽到 `class ViewController` 行下方。  \n松开 Control\
    \ 键和鼠标。会出现一个弹出窗口。  \n在 Name 文本字段中点击并输入 `textResult`，然后点击 Connect 按钮。Xcode 会创建以下\
    \ `IBOutlet`：\n\n```\n    @IBOutlet weak var textResult: NSTextField!\n```"
  raw: "1.  From within Xcode choose File ➤ New ➤ Project.  \n2.  Click Application\
    \ under the macOS category.  \n3.  Click Cocoa Application and click the Next\
    \ button. Xcode now asks for a product name.  \n4.  Click in the Product Name\
    \ text field and type MenuProgram.  \n5.  Make sure the Language pop-up menu displays\
    \ Swift and that no check boxes are selected. This project will use `.xib` files\
    \ for its user interface.  \n6.  Click the Next button. Xcode asks where you want\
    \ to store the project.  \n7.  Choose a folder to store your project and click\
    \ the Create button.  \n8.  Click the `MainMenu.xib` file in the Project Navigator.\
    \  \n9.  Click the Window icon in the Document Outline to display the program’s\
    \ user interface.  \n10.  Choose View ➤ Utilities ➤ Show Object Library. The Object\
    \ Library appears in the bottom right corner of the Xcode window.  \n11.  Drag\
    \ a text field on to the user interface window. You may want to widen the width\
    \ of the text field.  \n12.  Drag a menu item from the Object Library to the bottom\
    \ of the File menu. You can either drag the menu item on to the File pull-down\
    \ menu or in the Document Outline, as shown in Figure [22-14](#A437923_1_En_22_Chapter.html#Fig14).\n\
    \n![A437923_1_En_22_Fig14_HTML.jpg](A437923_1_En_22_Fig14_HTML.jpg)\n\nFigure\
    \ 22-14.\n\nDrag a menu item to the bottom of the File pull-down menu  \n13. \
    \ Choose View ➤ Assistant Editor ➤ Show Assistant Editor. The `AppDelegate.swift`\
    \ file appears next to your user interface.  \n14.  Move the mouse pointer over\
    \ the text field, hold down the Control key, and drag the mouse under the IBOutlet\
    \ line in the `AppDelegate.swift` file.  \n15.  Release the Control key and the\
    \ mouse button. A pop-up window appears.  \n16.  Click in the Name text field,\
    \ type textResult, and click the Connect button so your IBOutlet looks like this:\n\
    \n```\n    @IBOutlet weak var textResult: NSTextField!\n    ```\n\n17.  Move the\
    \ mouse pointer over the menu item you just added to the bottom of the File pull-down\
    \ menu (either on the pull-down menu or in the Document Outline), hold down the\
    \ Control key, and drag the mouse above the last curly bracket in the bottom of\
    \ the `ViewController.swift` file.  \n18.  Release the Control key and the mouse\
    \ button. A pop-up window appears.  \n19.  Click in the Connection pop-up menu\
    \ and choose Action.  \n20.  Click in the Name text field and type myMenu.  \n\
    21.  Click in the Type pop-up menu, choose NSMenuItem, and click the Connect button.\
    \ Xcode creates an empty IBAction method.  \n22.  Modify the IBAction method as\
    \ follows:\n\n```\n    @IBAction func myMenu(_ sender: NSMenuItem) {\n    textResult.stringValue\
    \ = \"Clicked on = \" + sender.title\n    }\n    ```\n\n23.  Click the Save command\
    \ in the File pull-down menu of your program (not on Xcode’s File menu).  \n24.\
    \  Choose View ➤ Utilities ➤ Show Connections Inspector. The Connections Inspector\
    \ pane shows that the Save command is connected to the `saveDocument` IBAction\
    \ method in the First Responder, as shown in Figure [22-15](#A437923_1_En_22_Chapter.html#Fig15).\n\
    \n![A437923_1_En_22_Fig15_HTML.jpg](A437923_1_En_22_Fig15_HTML.jpg)\n\nFigure\
    \ 22-15.\n\nThe Connections Inspector for the Save command in the File pull-down\
    \ menu  \n25.  Click the close icon (the X) that appears to the left of First\
    \ Responder. This cuts the connection between the Save command and the `saveDocument`\
    \ IBAction method.  \n26.  Move the mouse pointer over the Save command on the\
    \ File pull-down menu, hold down the Control key, and drag the mouse over the\
    \ myMenu `func` keyword in the IBAction method you created in step 22\\. Make\
    \ sure Xcode highlights the entire IBAction method and displays Connect Action,\
    \ as shown in Figure [22-16](#A437923_1_En_22_Chapter.html#Fig16).\n\n![A437923_1_En_22_Fig16_HTML.jpg](A437923_1_En_22_Fig16_HTML.jpg)\n\
    \nFigure 22-16.\n\nConnecting the Save command to an existing IBAction method\
    \  \n27.  Release the Control key and the mouse button. Xcode connects the Save\
    \ command to the myMenu `IBAction` method.  \n28.  Choose Product ➤ Run. The user\
    \ interface appears.  \n29.  Click the File menu title. Notice that your menu\
    \ item (labeled Item) appears at the bottom of the File pull-down menu.  \n30.\
    \  Click the Save command. The text field displays “Clicked on = Save…”  \n31.\
    \  Click the File menu title and click Item, which is the menu item you added.\
    \ The text field displays “Clicked on = Item”.  \n32.  Choose MenuProgram ➤ Quit\
    \ MenuProgram.\n\nThe MenuProgram project shows how to connect a menu command\
    \ to a text field so the text field displays the name of the menu command that\
    \ the user clicked. However, when working with storyboards, connecting menu commands\
    \ works a little differently.\n\nThe main difference is that in a storyboard,\
    \ the pull-down menus are stored in a separate scene from the actual user interface\
    \ , as shown in Figure [22-17](#A437923_1_En_22_Chapter.html#Fig17).\n\n![A437923_1_En_22_Fig17_HTML.jpg](A437923_1_En_22_Fig17_HTML.jpg)\n\
    \nFigure 22-17.\n\nPull-down menus appear in a separate scene from the user interface\
    \ in a storyboard\n\nThis means when you Control-drag on a pull-down menu command,\
    \ Xcode stores your Swift code in the `AppDelegate.swift` file, but if you Control-drag\
    \ on a user interface item such as a text field, Xcode stores your Swift code\
    \ in the `ViewController.swift` file.\n\nEssentially this means if you create\
    \ an IBOutlet for a text field, it’s stored in the `ViewController.swift` file\
    \ while your IBAction methods for your pull-down menu commands are stored in the\
    \ `AppDelegate.swift` file, which means the IBOutlet doesn’t know the IBAction\
    \ methods exist (and vice versa).\n\nThe way around this problem is to connect\
    \ your pull-down menu commands to the First Responder icon. This means that your\
    \ program will first look for an IBAction method in its `AppDelegate.swift` file,\
    \ but then will also look for the same IBAction method in other files as well.\n\
    \nSo the trick is to create an empty IBAction method in the `AppDelegate.swift`\
    \ file and an identical IBAction method in the `ViewController.swift` file, except\
    \ you’ll fill this second IBAction method with Swift code to make it retrieve\
    \ the title of the selected menu command.\n\nTo see how menu commands work with\
    \ storyboards, follow these steps:\n\n1.  From within Xcode choose File ➤ New\
    \ ➤ Project.  \n2.  Click Application under the macOS category.  \n3.  Click Cocoa\
    \ Application and click the Next button. Xcode now asks for a product name.  \n\
    4.  Click in the Product Name text field and type StoryMenu.  \n5.  Make sure\
    \ the Language pop-up menu displays Swift and that only the “Use storyboards”\
    \ check box is selected.  \n6.  Click the Next button. Xcode asks where you want\
    \ to store the project.  \n7.  Choose a folder to store your project and click\
    \ the Create button.  \n8.  Click the `Main.storyboard` file in the Project Navigator.\
    \ Your program’s user interface appears.  \n9.  Choose View ➤ Utilities ➤ Show\
    \ Object Library and drag a text field on to the user interface (identified by\
    \ view controller in its title bar). You may want to widen the text field width.\
    \  \n10.  Choose View ➤ Assistant Editor ➤ Show Assistant Editor. Xcode shows\
    \ the `ViewController.swift` file next to your user interface.  \n11.  Move the\
    \ mouse pointer over the text field, hold down the Control key, and drag the mouse\
    \ under the `class ViewController` line.  \n12.  Release the Control key and the\
    \ mouse. A pop-up window appears.  \n13.  Click in the Name text field, type textResult,\
    \ and then click the Connect button. Xcode creates the following IBOutlet:\n\n\
    ```\n    @IBOutlet weak var textResult: NSTextField!\n    ```"
  trans: "\n从 Xcode 中选择 File ➤ New ➤ Project。  \n点击 macOS 类别下的 Application。  \n点击\
    \ Cocoa Application，然后点击 Next 按钮。Xcode 会要求输入产品名称。  \n在 Product Name 文本字段中点击并输入\
    \ `MenuProgram`。  \n确保 Language 弹出菜单显示 Swift，并且没有选中任何复选框。本项目将使用 `.xib` 文件作为用户界面。\
    \  \n点击 Next 按钮。Xcode 会询问项目存储位置。  \n选择一个文件夹来存储项目，然后点击 Create 按钮。  \n在项目导航器中点击\
    \ `MainMenu.xib` 文件。  \n在文档大纲中点击 Window 图标，以显示程序的用户界面。  \n选择 View ➤ Utilities\
    \ ➤ Show Object Library。Object Library 会出现在 Xcode 窗口的右下角。  \n将一个文本字段拖拽到用户界面窗口中。你可能需要加宽该文本字段的宽度。\
    \  \n将 Object Library 中的一个菜单项拖拽到 File 菜单的底部。你可以将该菜单项拖拽到 File 下拉菜单上，或拖拽到文档大纲中，如图\
    \ 22-14 所示。\n\n![A437923_1_En_22_Fig14_HTML.jpg](img/A437923_1_En_22_Fig14_HTML.jpg)\n\
    \n图 22-14.  \n将菜单项拖拽到 File 下拉菜单的底部  \n选择 View ➤ Assistant Editor ➤ Show Assistant\
    \ Editor。`AppDelegate.swift` 文件会出现在用户界面旁边。  \n将鼠标指针移到文本字段上，按住 Control 键，然后将其拖拽到\
    \ `AppDelegate.swift` 文件中的 `IBOutlet` 行下方。  \n松开 Control 键和鼠标按钮。会出现一个弹出窗口。  \n\
    在 Name 文本字段中点击并输入 `textResult`，然后点击 Connect 按钮，使你的 `IBOutlet` 看起来像这样：\n\n```\n\
    \    @IBOutlet weak var textResult: NSTextField!\n```\n\n将鼠标指针移到刚刚添加到 File 下拉菜单底部的菜单项上（无论是在下拉菜单上还是在文档大纲中），按住\
    \ Control 键，然后将其拖拽到 `ViewController.swift` 文件底部最后一个大括号的上方。  \n松开 Control 键和鼠标按钮。会出现一个弹出窗口。\
    \  \n在 Connection 弹出菜单中点击并选择 Action。  \n在 Name 文本字段中点击并输入 `myMenu`。  \n在 Type\
    \ 弹出菜单中点击并选择 `NSMenuItem`，然后点击 Connect 按钮。Xcode 会创建一个空的 `IBAction` 方法。  \n按如下方式修改\
    \ `IBAction` 方法：\n\n```\n    @IBAction func myMenu(_ sender: NSMenuItem) {\n \
    \   textResult.stringValue = \"Clicked on = \" + sender.title\n    }\n```\n\n\
    点击程序 File 下拉菜单中的 Save 命令（不是 Xcode 的 File 菜单）。  \n选择 View ➤ Utilities ➤ Show Connections\
    \ Inspector。Connections Inspector 面板显示 Save 命令已连接到 First Responder 中的 `saveDocument`\
    \ IBAction 方法，如图 22-15 所示。\n\n![A437923_1_En_22_Fig15_HTML.jpg](img/A437923_1_En_22_Fig15_HTML.jpg)\n\
    \n图 22-15.  \nFile 下拉菜单中 Save 命令的 Connections Inspector  \n点击 First Responder\
    \ 左侧出现的关闭图标（X）。这会切断 Save 命令与 `saveDocument` IBAction 方法之间的连接。  \n将鼠标指针移到 File\
    \ 下拉菜单中的 Save 命令上，按住 Control 键，然后将其拖拽到步骤 22 中创建的 IBAction 方法的 `myMenu` 函数关键字上。确保\
    \ Xcode 高亮显示整个 IBAction 方法并显示 Connect Action，如图 22-16 所示。\n\n![A437923_1_En_22_Fig16_HTML.jpg](img/A437923_1_En_22_Fig16_HTML.jpg)\n\
    \n图 22-16.  \n将 Save 命令连接到现有的 IBAction 方法  \n松开 Control 键和鼠标按钮。Xcode 会将 Save 命令连接到\
    \ `myMenu` IBAction 方法。  \n选择 Product ➤ Run。用户界面会出现。  \n点击 File 菜单标题。注意，你的菜单项（标记为\
    \ Item）会出现在 File 下拉菜单的底部。  \n点击 Save 命令。文本字段会显示“Clicked on = Save…”。  \n点击 File\
    \ 菜单标题并点击 Item（即你添加的菜单项）。文本字段会显示“Clicked on = Item”。  \n选择 MenuProgram ➤ Quit\
    \ MenuProgram。\n\n`MenuProgram` 项目展示了如何将菜单命令连接到文本字段，以便文本字段显示用户点击的菜单命令的名称。但是，在使用\
    \ storyboard 时，连接菜单命令的方式略有不同。\n\n主要区别在于，在 storyboard 中，下拉菜单存储在与实际用户界面不同的场景中，如图\
    \ 22-17 所示。\n\n![A437923_1_En_22_Fig17_HTML.jpg](img/A437923_1_En_22_Fig17_HTML.jpg)\n\
    \n图 22-17.  \n在 storyboard 中，下拉菜单出现在与用户界面分离的场景中\n\n这意味着，当你对下拉菜单命令进行 Control 拖拽时，Xcode\
    \ 会将你的 Swift 代码存储在 `AppDelegate.swift` 文件中；但如果你对用户界面元素（如文本字段）进行 Control 拖拽，Xcode\
    \ 会将你的 Swift 代码存储在 `ViewController.swift` 文件中。\n\n本质上，这意味着如果你为文本字段创建了一个 `IBOutlet`，它会存储在\
    \ `ViewController.swift` 文件中，而你的下拉菜单命令的 `IBAction` 方法则存储在 `AppDelegate.swift`\
    \ 文件中，这意味着 `IBOutlet` 不知道这些 `IBAction` 方法的存在（反之亦然）。\n\n解决这个问题的方法是将你的下拉菜单命令连接到\
    \ First Responder 图标。这意味着你的程序会首先在其 `AppDelegate.swift` 文件中查找 `IBAction` 方法，然后也会在其他文件中查找相同的\
    \ `IBAction` 方法。\n\n因此，技巧是在 `AppDelegate.swift` 文件中创建一个空的 `IBAction` 方法，并在 `ViewController.swift`\
    \ 文件中创建一个相同的 `IBAction` 方法，但你需要用 Swift 代码填充这第二个 `IBAction` 方法，以使其能够检索所选菜单命令的标题。\n\
    \n要了解菜单命令如何与 storyboard 配合工作，请按照以下步骤操作：\n\n从 Xcode 中选择 File ➤ New ➤ Project。 \
    \ \n点击 macOS 类别下的 Application。  \n点击 Cocoa Application，然后点击 Next 按钮。Xcode 会要求输入产品名称。\
    \  \n在 Product Name 文本字段中点击并输入 `StoryMenu`。  \n确保 Language 弹出菜单显示 Swift，并且仅选中“Use\
    \ storyboards”复选框。  \n点击 Next 按钮。Xcode 会询问项目存储位置。  \n选择一个文件夹来存储项目，然后点击 Create\
    \ 按钮。  \n在项目导航器中点击 `Main.storyboard` 文件。程序的用户界面会出现。  \n选择 View ➤ Utilities ➤ Show\
    \ Object Library，然后将一个文本字段拖拽到用户界面（由标题栏中的视图控制器标识）上。你可能需要加宽文本字段的宽度。  \n选择 View ➤\
    \ Assistant Editor ➤ Show Assistant Editor。Xcode 会在用户界面旁边显示 `ViewController.swift`\
    \ 文件。  \n将鼠标指针移到文本字段上，按住 Control 键，然后将其拖拽到 `class ViewController` 行下方。  \n松开 Control\
    \ 键和鼠标。会出现一个弹出窗口。  \n在 Name 文本字段中点击并输入 `textResult`，然后点击 Connect 按钮。Xcode 会创建以下\
    \ `IBOutlet`：\n\n```\n    @IBOutlet weak var textResult: NSTextField!\n```\n"
