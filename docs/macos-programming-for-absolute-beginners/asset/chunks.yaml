    **图 12-5.**  \n一个显示最后添加到数组中的结构的提醒对话框\n\n8.  点击“确定”关闭提醒对话框。\n9.  选择 StructureProgram\
    \ ➤ 退出 StructureProgram。\n\n## 摘要\n\n每个程序都需要存储和操作数据。在最简单的层面，你可以将数据存储在 Swift 的基本数据类型（`Int`、`Double`、`Float`、`String`）之一中。为了让这些基本数据类型更具描述性，你可以使用\
    \ `typealiases`，它能让你选择一个更有意义的名字来表示一个基本数据类型，例如 `String` 或 `Double`。\n\n要创建你自己的数据类型并限制其能保存的值，你可以使用枚举。枚举让你列出该枚举所能包含的所有可能选项，从而可以创建更具描述性的名称。\n\
    \n如果你想将相关的数据分组在一起，无论其数据类型如何，都可以使用结构体。通过将结构体与数组等其他数据结构结合，你可以创建相关数据的列表。组合数据结构可以让你以对程序最高效的方式来组织数据。\n\
    \n# 13. 创建类与对象\n\n使用 Xcode 在 Swift 中编程的核心是面向对象编程。其主要思想是将一个大型程序划分为独立的对象，其中每个对象理想地代表一个物理实体。例如，如果你正在创建一个控制汽车的程序，一个对象可能代表汽车的引擎，第二个对象代表汽车的娱乐系统，第三个对象代表汽车的加热和冷却系统。\n\
    \n现在，如果你想要更新程序中控制汽车引擎的部分，你只需修改或替换控制该引擎的对象。对象不仅帮助你更好地理解程序的不同部分如何协同工作，还能隔离代码，这样你就可以创建构建块，以组合出更大、更复杂的程序。\n\
    \n对象帮助你像看待彼此独立的构建块一样来审视你的程序。在面向对象编程出现之前，程序员将程序划分为函数，这些函数也类似于微型的构建块。函数和对象之间的主要区别在于，函数可以访问其他函数使用的数据。这意味着如果你修改了一个函数，常常会在无意中影响到程序的其他部分。这不仅使得修复错误或缺陷变得困难，也让修改程序变得棘手。\n\
    \n而对于对象，其主要思想是创建独立、自足的构建块，它们协同工作且互不影响彼此的数据。为了保持数据隔离，对象使用了封装。这意味着一个对象拥有自己的变量（称为属性）和函数（称为方法）。\n\
    \n修改对象中数据的唯一方法是使用该对象的方法。这样，如果出现问题，你可以将问题定位到该对象的方法上。没有对象，程序的任何部分都可能干扰另一部分所使用的数据，这使得查找和修复问题几乎不可能。\n\
    \n对象可以通过两种方式相互通信：\n\n*   在另一个对象的属性中存储新值\n*   调用另一个对象的方法\n\n理想情况下，一个程序应由完全独立执行任务的对象组成。这使得通过用一个对象的改进版本来替换它，来修改程序变得简单。\n\
    \n## 创建类\n\n创建对象有两个步骤。首先，你必须创建一个类。其次，基于该类创建一个对象。\n\n一个类的外观和工作方式与结构体非常相似（参见第 12\
    \ 章）。主要区别在于，结构体只包含数据，而类可以包含数据以及操作这些数据的函数。\n\n一旦定义了类，你就可以基于该类创建一个或多个对象。可以把类看作是定义饼干形状的模具，而对象则是你可以根据该类定义的不同类型的面团。\n\
    \n你可以定义的最简单的类如下所示：\n\n```\nclass ClassName {\n}\n```\n\n要从此类创建对象，你只需声明一个变量，但不是定义像\
    \ `Int` 或 `String` 这样的数据类型，而是定义类的名称，例如：\n\n```\nvar myObject = ClassName()\n```\n\
    \n当然，一个不含任何代码的类是无用的，因此你可以在类中包含的两种代码是变量（称为属性）和用于操作数据的函数（称为方法）。在类中创建属性涉及创建一个或多个变量，并定义数据类型和初始值，例如：\n\
    \n```\nclass ClassName {\nvar name : String = \"\"\nvar ID : Int = 0\nvar salary\
    \ : Double = 0\n}\n```\n\n初始值很重要，因为当你在类的基础上创建对象时，你不希望存在未初始化的值，这些值在你尝试使用它们时可能会引发问题。\n\
    \n要定义属性，你需要声明一个变量名、数据类型和初始值。由于 Swift 可以推断数据类型，你可以省略数据类型声明，只分配初始值，像这样：\n\n```\n\
    class ClassName {\nvar name = \"\"\nvar ID  = 0\nvar salary = 0\n}\n```\n\n如果你不确定要存储何种类型的初始值，你可以直接使用可选变量，例如：\n\
    \n```\nclass ClassName {\nvar name : String?\nvar ID : Int?\nvar salary : Double?\n\
    }\n```\n\n可选变量的初始值为 `nil`，因此你最终很可能需要存储实际的值。\n\n无论你是用初始值定义类的属性，还是用可选变量将其定义为 `nil`\
    \ 值，你都可以通过创建一个变量名，将其赋值为类名，并在其后跟一对空括号来从该类创建对象，如下所示：\n\n```\nvar myObject = ClassName()\n\
    ```\n\n以上两种方法都会为类的属性创建相同的初始值。为了更灵活，你可以创建一个名为 `init` 的初始化方法。它允许你在每次从类创建对象时定义初始值。类中的初始化器可能如下所示：\n\
    \n```\nclass SecondClass {\nvar name : String\nvar ID : Int\nvar salary : Double\n\
    init (name: String, ID: Int, salary: Double) {\nself.name = name\nself.ID = ID\n\
    self.salary = salary\n}\n}\n```\n\n这个初始化方法 (`init`) 定义了一个接受三个参数（一个字符串、一个整数和一个双精度浮点值）的参数列表。然后它将这些信息分别存储在\
    \ `name`、`ID` 和 `salary` 属性中。当一个类具有初始化器时，你必须通过包含与初始化器参数列表匹配的正确数量和数据类型来创建该类的对象。\n\
    \n这意味着在括号中包含一个字符串、一个整数和一个双精度浮点值来创建对象，像这样：\n\n```\nvar secondObject = SecondClass\
    \ (name: \"Joe\", ID: 102, salary: 120000)\n```\n\n请注意，当你在参数列表中包含数据时，必须使用初始化器参数列表中定义的变量名来标记每个数据块。在这个例子中，三个参数名是\
    \ `name`、`ID` 和 `salary`，因此创建对象意味着使用相同的这些参数名来标识数据。\n"
- fmt: "### Accessing Properties in an Object\n\nTo access an object’s properties,\
    \ you must specify the object name followed by a period and the property name,\
    \ such as\n\n```\nobjectName.propertyName = data\n```\n\nYou can also assign an\
    \ object’s property values to a variable, like this:\n\n```\nvar person = myObject.name\n\
    ```\n\nTo access properties, you need to specify the object name, a period, and\
    \ the property name that you want to access, such as\n\n```\nprint (person.name)\n\
    ```\n\n**Note**  \nWhen accessing values stored in properties, make sure you specify\
    \ the object name, not the class name. If you create a `person` object from the\
    \ `ClassName` class, you access properties by specifying the object name (`person`)\
    \ and the property name (`name`, `ID`, `salary`) such as `person.name` or `person.ID`.\
    \ You don’t access the property value by using the class name such as `ClassName.name`\
    \ or `className.ID`. If you try this, your code will not work.\n\nJust like ordinary\
    \ variables, an object’s properties can only hold one chunk of data at a time.\
    \ The moment you store new data in a property, it wipes out the previous data.\n\
    \nTo see how to create a class and work with an object’s properties, follow these\
    \ steps:\n\n1.  Make sure the `IntroductoryPlayground` file is loaded in Xcode.\n\
    2.  Edit the code as follows:\n\n```\nimport Cocoa\nclass ClassName {\nvar name\
    \ = \"\"\nvar ID  = 0\nvar salary = 0\n}\nvar worker = ClassName()\nworker.name\
    \ = \"Bob\"\nworker.ID = 102\nworker.salary = 10\nclass SecondClass {\nvar name\
    \ : String\nvar ID : Int\nvar salary : Double\ninit (name: String, ID: Int, salary:\
    \ Double) {\nself.name = name\nself.ID = ID\nself.salary = salary\n}\n}\nvar executive\
    \ = SecondClass (name: \"Joe\", ID: 17, salary: 50000)\nprint (worker.name)\n\
    print (worker.ID)\nprint (worker.salary)\nprint (executive.name)\nprint (executive.ID)\n\
    print (executive.salary)\n```\n\nThe first class initializes its properties when\
    \ they’re declared. Then it creates an object (`worker`) based on the class (`ClassName`).\
    \ To store data in the `worker` object, the code specifies the object name (`worker`)\
    \ and property name and assigns it a value.\n\nThe second class example uses an\
    \ initializer to define the property values. The `init` method accepts three chunks\
    \ of data, a string, an integer, and a decimal (`Double`) value, in that order.\n\
    \nTo create an object (`executive`) from this second class (`SecondClass`), the\
    \ parentheses need to include the right number of data in the right order, along\
    \ with the proper data types, in addition to displaying a label to identify what\
    \ the data means, as shown in Figure [13-1](#A437923_1_En_13_Chapter.html#Fig1).\n\
    \n![A437923_1_En_13_Fig1_HTML.jpg](A437923_1_En_13_Fig1_HTML.jpg)\n\n**Figure\
    \ 13-1.** Creating a class file and accessing properties\n\n### Computed Properties\
    \ in an Object\n\nAs an alternative to defining fixed values for properties, you\
    \ can also use computed properties where one property’s initial value depends\
    \ on the value of another property. The simplest way to create a computed property\
    \ is to define a property name, a data type, and then in curly brackets write\
    \ code that calculates a value. Finally, use the `return` keyword to define the\
    \ value to store in the property.\n\nThis computed property simply takes the value\
    \ stored in the `height` property, multiples it by 2, and stores that result in\
    \ the `width` property. When you create an object based on the `shape` class,\
    \ the initial value of 5 gets stored in the `height` property and the computed\
    \ property multiples the `height` value (5) by 2 to get 10, which it stores in\
    \ the `width` property, as shown in Figure [13-2](#A437923_1_En_13_Chapter.html#Fig2).\n\
    \n![A437923_1_En_13_Fig2_HTML.jpg](A437923_1_En_13_Fig2_HTML.jpg)\n\n**Figure\
    \ 13-2.** Using computed properties to determine a property's initial value\n\n\
    In this example of a computed property, the value of one property (`width`) gets\
    \ the value of another property (`height`) to determine its own value. In technical\
    \ terms, this is known as a getter.\n\n### Setting Other Properties\n\nAnother\
    \ option for storing values in a property is to use what’s called a setter. With\
    \ a setter, defining one property sets the value of another property. Since getters\
    \ and setters are so similar, they’re often used within the same property. This\
    \ way one property uses a getter to calculate its value from another property,\
    \ so if you set that property with a value, it can change another property. Defining\
    \ getters and setters looks like this:\n\n```\nclass Blob {\nvar property1 : dataType\
    \ = value\nvar property2 : dataType {\nget {\nreturn valueHere\n}\nset {\nproperty1\
    \ = valueHere\n}\n}\n}\n```\n\nIn the getter, you always need a `return` keyword\
    \ to return a value to the property that has the getter. In the setter, you must\
    \ assign a property to a value. This value can be a fixed value or a calculation\
    \ that returns a value.\n\n**Note**  \nYou don’t need both a getter and a setter.\
    \ You can just have a getter, which you can shorten by eliminating the `get` keyword\
    \ and just enclose code in curly brackets, as in the class shape example in the\
    \ beginning of this section. You can also have just a setter, but you need to\
    \ use the `set` keyword.\n\nIn the above example, every time `property2` gets\
    \ assigned a new value, it uses its setter to define a new value for `property1`.\n\
    \nA setter can also accept a value and use that value to calculate a new result\
    \ for a different property. To accept a value for a setter, you just need to create\
    \ a variable enclosed in parentheses and use that value to calculate a result\
    \ for another property, such as\n\n```\nclass Blob {\nvar property1 : dataType\
    \ = value\nvar property2 : dataType {\nget {\nreturn valueHere\n}\nset (newValue)\
    \ {\nproperty1 = valueHere based on newValue\n}\n}\n}\n```\n\nTo see how getters\
    \ and setters work, follow these steps:\n\n1.  Make sure your `IntroductoryPlayground`\
    \ file is loaded into Xcode.\n2.  Edit the code as follows:\n\n```\nimport Cocoa\n\
    class Shape {\nvar height : Int = 5\nvar width : Int {\nreturn height * 2\n}\n\
    }\nvar rectangle = Shape()\nprint (rectangle.height)\nprint (rectangle.width)\n\
    rectangle.height = 20\nprint (rectangle.width)\nclass Blob {\nvar height : Int\
    \ = 5\nvar width : Int = 10\nvar area : Int {\nget {\nreturn height * width\n\
    }\nset (newValue) {\nheight = newValue + 10\nwidth = newValue - 5\n}\n}\n}\nvar\
    \ CEO = Blob()\nprint (CEO.area)\nCEO.area = 247\nprint (CEO.height)\nprint (CEO.width)\n\
    ```\n\nYou can think of a getter and setter as functions that change other properties.\
    \ Be careful when using getters and setters, though, since they can cause unexpected\
    \ behavior if you aren’t aware of their existence or how they work. Figure [13-3](#A437923_1_En_13_Chapter.html#Fig3)\
    \ shows the result of the above code so you can see how the getters and setters\
    \ affect properties.\n\n![A437923_1_En_13_Fig3_HTML.jpg](A437923_1_En_13_Fig3_HTML.jpg)\n\
    \n**Figure 13-3.** Using getters and setters to modify properties"
