    \ 窗口底部的调试区。\n28. 来回拖动滑块。调试区会显示“Slider value = ”，后跟一个数值。\n29. 点击触控栏上按钮和滑块之间的颜色选择器图标。触控栏现在会显示一系列颜色，如图\
    \ 23-16 所示。\n\n![A437923_1_En_23_Fig16_HTML.jpg](img/A437923_1_En_23_Fig16_HTML.jpg)\n\
    \n**图 23-16.** 颜色选择器在触控栏上显示可供选择的颜色\n\n30. 点击任意颜色。注意调试区会显示你选择的颜色的名称（参见图 23-17）。\n\
    \n![A437923_1_En_23_Fig17_HTML.jpg](img/A437923_1_En_23_Fig17_HTML.jpg)\n\n**图\
    \ 23-17.** Xcode 的调试区显示来自触控栏的消息\n\n31. 点击触控栏左侧圆圈中的 X，即可再次在触控栏上显示按钮、颜色选择器和滑块。\n\
    32. 选择 `TouchProgram` ➤ `Quit TouchProgram`。\n\n## 总结\n\n在所有 Macintosh 电脑都配备触控栏之前，触控栏将是用户与\
    \ macOS 程序交互的一种可选方式。最终，每台 Macintosh 都将配备触控栏，但在此之前，你需要添加下面这行代码，以确保触控栏程序仅在运行 macOS\
    \ 10.12.2 或更高版本的 Macintosh 上运行：\n\n```swift\n@available(OSX 10.12.2, *)\n```\n\
    \n要创建触控栏，你只需从对象库中将一个触控栏项目拖放到你的窗口控制器（而不是视图控制器）上。然后你需要创建一个 Swift 类文件，用于存放从你放置在触控栏上的任何项目（如按钮、滑块或标签）中关联的\
    \ `IBOutlet` 和 `IBAction` 方法。创建完 Swift 类文件后，你必须通过使用身份检查器将该类文件定义为与你的窗口控制器配合使用。\n\
    \n要让触控栏模拟器在没有触控栏的 Macintosh 上显示，你必须先运行你的程序，然后切换回 Xcode，选择 `Window` > `Show Touch\
    \ Bar`。接着你需要切换回你正在运行的程序，才能看到触控栏实际工作。\n\n触控栏将成为 Macintosh 的标准输入设备，因此可以预见 Apple\
    \ 将添加你可以添加到触控栏上的新项目。随着越来越多的人习惯使用触控栏，可以肯定每个 macOS 程序都需要添加对触控栏的支持。\n\n# 24. 面向协议编程\n\
    \n当 Apple 在 2014 年的全球开发者大会上推出 Swift 时，它被宣传为一种比 Objective-C 更简单、更安全、更快的用于 iOS、macOS、tvOS\
    \ 和 watchOS 开发的编程语言。虽然 Swift 和 Objective-C 都支持面向对象编程，但 Swift 更进一步，还提供了面向协议编程。\n\
    \n纯面向对象编程语言的最大问题之一是，扩展类的功能意味着要创建额外的子类。然后你必须基于这些新子类创建对象。这可能是一种笨拙的解决方案，因为你现在必须跟踪一个或多个子类，其中每个子类都有不同的名称，并且它们之间可能只有细微的差别。\n\
    \n更糟糕的是，Swift（与某些面向对象编程语言不同）只允许单继承。这意味着一个类只能恰好继承自另一个类。如果你真的想从两个不同的类继承属性和方法，这是不可能的。\n\
    \n为了解决继承和多子类的问题，Swift 提供了协议。协议的工作方式与面向对象编程非常相似，但有一些额外的优势：\n\n-   协议可以扩展类、结构体和枚举的功能。继承只能扩展类的功能。\n\
    -   单个类、结构体或枚举可以由一个或多个协议扩展。继承只能扩展单个类。\n\n这意味着协议比类更灵活、更通用，同时为你提供了面向对象编程的优点，而没有其缺点。你可以使用协议（面向协议编程）代替类（面向对象编程），或者混合使用面向对象编程和面向协议编程，以兼得两者的优点。\n"
- fmt: "# Understanding Protocols\n\nLike a class, a protocol can define properties\
    \ (variables) and methods (functions). The main difference is that unlike a class,\
    \ a protocol can’t set an initial value for a property and can’t implement a method.\
    \ A protocol simply defines a property and its data type. When defining a property\
    \ in a protocol, you need to define the following three items:\n\n- The property\
    \ name, which can be any arbitrary, descriptive name\n- The data type of the property\
    \ such as `Int`, `Double`, `String`, etc.\n- Whether a property is gettable `{\
    \ get }` or gettable and settable `{ get set }`\n\n**Note:** A gettable/settable\
    \ `{ get set }` property cannot be assigned to a constant stored property (defined\
    \ with the `let` keyword) or a read-only computed property. A gettable `{ get\
    \ }` property has no such limitations.\n\nConsider the following protocol:\n\n\
    ```\nprotocol Cat {\n    var name: String { get set }\n    var age: Int { get\
    \ }\n}\n```\n\nNow you can create a structure based on this protocol, such as:\n\
    \n```\nstruct pet : Cat {\n    var name : String\n    // let name : String --\
    \ Invalid since \"let\" defines a constant stored property\n    // var name :\
    \ String { return \"Fred\" } -- Invalid since this is a read-only computed property\n\
    \    let age : Int\n}\n```\n\nThe above code defines a structure called `pet`\
    \ that adopts the `Cat` protocol. This means it needs to declare the `name` property\
    \ as a string and the `age` property as an integer.\n\nNotice that because the\
    \ `age` property is defined as gettable `{ get }` by the `Cat` protocol, you can\
    \ implement that property as a constant with the `let` keyword. You could also\
    \ compute the `age` property by returning a value like this:\n\n```\nstruct pet\
    \ : Cat {\n    var name : String\n    var age : Int { return 4 }\n}\n```\n\nTo\
    \ see how to use protocols and structures with different types of properties,\
    \ follow these steps:\n\n1.  From within Xcode choose **File > New > Playground**.\
    \ Xcode now asks for a playground name.\n2.  Click in the **Name** text field\
    \ and type `ProtocolPlayground`.\n3.  Make sure the **Platform** pop-up menu displays\
    \ `macOS`.\n4.  Click the **Next** button. Xcode asks where you want to store\
    \ the playground.\n5.  Choose a folder to store your project and click the **Create**\
    \ button.\n6.  Edit the playground code as follows:\n\n    ```\n    import Cocoa\n\
    \    protocol Cat {\n        var name: String { get set }\n        var age: Int\
    \ { get }\n    }\n    // Using a computed property\n    struct pet : Cat {\n \
    \       var name : String\n        var age : Int { return 4 }\n    }\n    var\
    \ animal = pet(name: \"Taffy\")\n    print (animal.name)\n    print (animal.age)\n\
    \    // Using a constant stored property with \"let\"\n    struct feral : Cat\
    \ {\n        var name : String\n        let age : Int\n    }\n    var pest = feral\
    \ (name: \"Stinky\", age: 2)\n    print (pest.name)\n    print (pest.age)\n  \
    \  ```\n\nNotice the differences when you declare a variable based on a structure.\
    \ With computed properties for age, you don’t need to create an initial value\
    \ when declaring the variable, such as:\n\n```\n// Using a computed property {\
    \ return 4 }\nstruct pet : Cat {\n    var name : String\n    var age : Int { return\
    \ 4 }\n}\nvar animal = pet(name: \"Taffy\")\n```\n\nHowever, if you don’t have\
    \ computed properties, then you must specifically initialize it when creating\
    \ a variable, such as:\n\n```\n// Using a constant stored property with \"let\"\
    \nstruct feral : Cat {\n    var name : String\n    let age : Int\n}\nvar pest\
    \ = feral (name: \"Stinky\", age: 2)\n```\n\nFigure [24-1](#A437923_1_En_24_Chapter.html#Fig1)\
    \ shows how you can define two structures based on the same protocol.\n\n![A437923_1_En_24_Fig1_HTML.jpg](A437923_1_En_24_Fig1_HTML.jpg)\n\
    \n**Figure 24-1.** Two different structures can adopt the same protocol\n\n##\
    \ Using Methods in Protocols\n\nWhen a protocol defines a method, it only defines\
    \ the method name, any parameters, and any data type it returns, but it does not\
    \ include any Swift code that actually implements that method, such as:\n\n```\n\
    protocol Cat {\n    var name: String { get set }\n    var age: Int { get }\n \
    \   func meow (sound: String)\n}\n```\n\nIf a class, struct, or enum adopts this\
    \ `Cat` protocol, it must not only define a `name` and `age` property, but it\
    \ must also implement the protocol method with Swift code such as:\n\n```\nstruct\
    \ pet : Cat {\n    var name : String\n    var age : Int\n    func meow (sound\
    \ : String) {\n        print (sound)\n    }\n}\n```\n\nEven though a class, structure,\
    \ or enum might adopt the exact same protocol, the actual implementation of a\
    \ method can be wildly different. In the above example, the `pet` structure defines\
    \ the `meow` function with a single `print` statement. In the example below, the\
    \ `feral` structure defines the `meow` function with two `print` statements:\n\
    \n```\nstruct feral : Cat {\n    var name : String\n    var age : Int\n    func\
    \ meow (sound : String) {\n        print (\"Hear me roar\")\n        print (sound.uppercased())\n\
    \    }\n}\n```\n\nTo see how to define methods in protocols and implement them\
    \ in different structures, follow these steps:\n\n1.  Make sure the `ProtocolPlayground`\
    \ file is loaded in Xcode.\n2.  Edit the playground code as follows:\n\n```\n\
    import Cocoa\nprotocol Cat {\n    var name: String { get set }\n    var age: Int\
    \ { get }\n    func meow (sound : String)\n}\n// One way to implement the meow\
    \ method\nstruct pet : Cat {\n    var name : String\n    var age : Int\n    func\
    \ meow (sound : String) {\n        print (sound)\n    }\n}\nvar animal = pet(name:\
    \ \"Taffy\", age: 16)\nprint (animal.name)\nprint (animal.age)\nanimal.meow(sound:\
    \ \"Feed me\")\n// A second way to implement the same meow method\nstruct feral\
    \ : Cat {\n    var name : String\n    var age : Int\n    func meow (sound : String)\
    \ {\n        print (\"Hear me roar\")\n        print (sound.uppercased())\n  \
    \  }\n}\nvar pest = feral(name: \"Stinky\", age: 2)\nprint (pest.name)\nprint(pest.age)\n\
    pest.meow(sound: \"Growl\")\n```\n\nFigure [24-2](#A437923_1_En_24_Chapter.html#Fig2)\
    \ shows how the two different implementations of the same protocol method work.\n\
    \n![A437923_1_En_24_Fig2_HTML.jpg](A437923_1_En_24_Fig2_HTML.jpg)\n\n**Figure\
    \ 24-2.** Method implementations can be different despite adopting the same protocol\n\
    \n## Adopting Multiple Protocols\n\nOne huge advantage protocols have over object-oriented\
    \ programming is that a single class, structure, or enum can adopt two or more\
    \ protocols. To do this, you just need to specify the name of each protocol to\
    \ adopt, like so:\n\n```\nstruct structureName : protocolName1, protocolName2,\
    \ protocolNameN {\n```\n\nBy letting you adopt multiple protocols, Swift makes\
    \ coding more flexible since you can pick and choose the protocols you want to\
    \ use. To see how adopting multiple protocols works, follow these steps:\n\n1.\
    \  Make sure the `ProtocolPlayground` file is loaded in Xcode.\n2.  Edit the playground\
    \ code as follows:\n\n    ```\n    import Cocoa\n    protocol Cat {\n        var\
    \ name: String { get }\n        var age: Int { get }\n    }\n    protocol CatSounds\
    \ {\n        func meow (sound : String)\n    }\n    struct pet : Cat, CatSounds\
    \ {\n        var name : String\n        var age : Int\n        func meow (sound\
    \ : String) {\n            print (sound)\n        }\n    }\n    var animal = pet(name:\
    \ \"Fluffy\", age: 6)\n    print (animal.name)\n    print (animal.age)\n    animal.meow(sound\
    \ : \"Wake up!\")\n    ```\n\nFigure [24-3](#A437923_1_En_24_Chapter.html#Fig3)\
    \ shows how this code works by having a structure adopt two protocols. Notice\
    \ that this code works exactly the same as if the `name` and `age` properties\
    \ were defined in the same protocol as the `meow` method. By separating different\
    \ properties and methods in two or more protocols, you don’t have to implement\
    \ properties and/or methods you don’t need.\n\n![A437923_1_En_24_Fig3_HTML.jpg](A437923_1_En_24_Fig3_HTML.jpg)\n\
    \n**Figure 24-3.** A structure can adopt two or more protocols\n\nSince you can\
    \ adopt multiple protocols, it’s generally best to keep each protocol as short\
    \ and simple as possible. This makes it easier to use only the protocols you need\
    \ without being forced to implement additional properties and/or methods you may\
    \ not need or want."
  raw: "## Understanding Protocols\n\nLike a class, a protocol can define properties\
    \ (variables) and methods (functions). The main difference is that unlike a class,\
    \ a protocol can’t set an initial value for a property and can’t implement a method.\
    \ A protocol simply defines a property and its data type. When defining a property\
    \ in a protocol, you need to define the following three items:\n\n*   The property\
    \ name, which can be any arbitrary, descriptive name\n*   The data type of the\
    \ property such as Int, Double, String, etc.\n*   Whether a property is gettable\
    \ { get } or gettable and settable { get set }\n\nNote\n\nA gettable/settable\
    \ { get set } property cannot be assigned to a constant stored property (defined\
    \ with the `let` keyword) or a read-only computed property. A gettable { get }\
    \ property has no such limitations.\n\nConsider the following protocol:\n\n```\n\
    protocol Cat {\nvar name: String { get set }\nvar age: Int { get }\n}\n```\n\n\
    Now you can create a structure based on this protocol, such as\n\n```\nstruct\
    \ pet : Cat {\nvar name : String\n//let name : String -- Invalid since \"let\"\
    \ defines a constant stored property\n//var name : String { return \"Fred\" }\
    \ -- Invalid since this is a read-only computed property\nlet age : Int\n}\n```\n\
    \nThe above code defines a structure called `pet` that adopts the `Cat` protocol.\
    \ This means it needs to declare the `name` property as a string and the `age`\
    \ property as an integer.\n\nNotice that because the `age` property is defined\
    \ as gettable { get } by the `Cat` protocol, you can implement that property as\
    \ a constant with the `let` keyword. You could also compute the `age` property\
    \ by returning a value like this:\n\n```\nstruct pet : Cat {\nvar name : String\n\
    var age : Int { return 4 }\n}\n```\n\nTo see how to use protocols and structures\
    \ with different types of properties , follow these steps:\n\n1.  From within\
    \ Xcode choose File > New > Playground. Xcode now asks for a playground name.\
    \  \n2.  Click in the Name text field and type ProtocolPlayground.  \n3.  Make\
