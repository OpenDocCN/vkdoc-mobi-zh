- fmt: '# Understanding `IBAction` Methods


    If you remember in Chapter [3](#A437923_1_En_3_Chapter.html), you linked a button
    from the user interface to your Swift code to create an `IBAction` method, which
    is nothing more than a function that looks like this:


    ```

    @IBAction func changeCase(_ sender: NSButton) {

    labelText.stringValue = messageText.stringValue.uppercased()

    }

    ```


    Now that you understand how functions work, let’s dissect this line by line. First,
    `@IBAction` identifies a function that only runs when the user does something
    to a user interface item. If you look at the parameter list, you’ll see `(sender:
    NSButton)`, which tells you that when the user clicks on a button, the `changeCase`
    function will run the Swift code enclosed within the curly brackets.


    The Swift code stored in any `IBAction` method typically manipulates data somehow.
    In this case, it converts text from a text field (represented by the `IBOutlet`
    variable `messageText`), converts it to uppercase, and then displays that uppercase
    text in a label (represented by the `IBOutlet` variable `labelText`).


    Since it’s possible for two or more user interface items to connect to the same
    `IBAction` method, the `sender` parameter identifies which button the user clicked.
    Since this `IBAction` method only connects to one button, the `sender` parameter
    is ignored.


    `IBAction` methods are nothing more than special functions linked to items on
    your user interface. Within any program, you’ll likely have multiple `IBAction`
    methods (functions) along with any additional functions you may have defined.


    In addition, you’ll likely use functions defined in the Cocoa framework even if
    you never see the actual code that makes those functions work. When creating any
    program, you’ll use functions in one form or another.


    ## Summary


    Functions are mini-programs that perform a single task. Instead of trying to write
    a large program, you can write multiple smaller programs (functions) and paste
    them together to create a larger program. Functions act like building blocks.


    The simplest function does the same thing over and over again, but more flexible
    functions accept input so they can use that input to calculate results. When a
    function accepts one or more chunks of data, it stores them in a parameter, which
    is like a variable.


    Some functions can not only accept data, but can also return a value. To create
    a function that returns a value, you must specify the data type to return (using
    the `->` symbols) and then use the `return` keyword inside the function to specify
    the exact data to send back.


    If a function returns a single value, you can store that single value in a variable.
    Functions can also return multiple values, which you can store in a tuple.


    When you connect user interface items (such as a button) to Swift code, you create
    special functions called `IBAction` methods. These `IBAction` methods are functions
    that run whenever the user clicks or does something on a user interface item.


    Every time you write a program in Swift, you need to use functions. You can use
    functions stored in the Cocoa framework but chances are good you’ll need to create
    your own functions as well.


    # 12. Defining Custom Data Types


    To store data, Swift provides common data types such as integers (`Int`), decimal
    numbers (`Float` or `Double`), and text (`String`). In addition, Swift also offers
    Boolean data types (`Bool`) for holding `true` or `false` values.


    While nearly every program will need to use one or more of these Swift data types,
    you may find them too limiting. That’s why Swift provides several ways to create
    your own data types based on the basic Swift data types. In addition, Swift offers
    several ways to organize basic data types (`Int`, `String`, `Double`, etc.) in
    unique ways. Defining different ways to organize data types is called a data structure.


    Essentially, programs consist of algorithms and data structures. Algorithms define
    how a program manipulates data, and data structures define how a program stores
    and organizes data.


    How a program stores data can greatly determine both the speed and efficiency
    of a program. If a program organizes data poorly, it may take a long time to find
    the data it needs. There is no right or wrong way to organize data since every
    program has different needs.


    Creating custom data types makes programs easier to understand. Swift provides
    several ways to create custom data types:


    - Typealiases

    - Enumerations

    - Structures

    - Combinations of different data types


    ## Typealiases


    Declaring variables as data types like `Int`, `Double`, or `String` only tells
    you what type of data it can hold, but doesn''t tell you the meaning of that data.
    For example, if you declare two variables as `Int` data types, each can hold integers
    but one variable may represent ages and the other variable may represent employee
    ID numbers.


    To make the purpose of data types clearer, Swift lets you use something called
    typealiases. A typealias lets you give a descriptive name to a generic data type
    name, such as


    ```

    typealias EmployeeID = Int

    ```


    Now instead of declaring a variable as an integer (`Int`) data type, you can declare
    it as an `EmployeeID` data type, such as


    ```

    typealias EmployeeID = Int

    var employee : EmployeeID

    employee = 192

    ```


    This is equivalent to


    ```

    var employee : Int

    employee = 192

    ```'
