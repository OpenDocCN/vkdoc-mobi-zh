    \ on the `NSTextField` class. Essentially a label is a text field that you can’t\
    \ edit. To identify the class of any item in the Object Library, just click it\
    \ and a pop-up window appears that describes the item’s purpose and the class\
    \ it’s based on (see Figure [15-5](#A437923_1_En_15_Chapter.html#Fig5)).\n\n![A437923_1_En_15_Fig5_HTML.jpg](A437923_1_En_15_Fig5_HTML.jpg)\n\
    \nFigure 15-5.\n\nIdentifying the class of a user interface item in the Object\
    \ Library\n\nAny user interface item based on the `NSTextField` can be used to\
    \ display and accept text, although it’s more common to use a label for displaying\
    \ text and any other type of text field for letting the user type in text. The\
    \ list of user interface items based on the NSTextField is shown in Figure [15-6](#A437923_1_En_15_Chapter.html#Fig6):\n\
    \n![A437923_1_En_15_Fig6_HTML.jpg](A437923_1_En_15_Fig6_HTML.jpg)\n\nFigure 15-6.\n\
    \nUser interface items based on the NSTextField class\n\n*   Label: Displays text\
    \ but does not allow the user to enter or edit text\n*   Text Field: Lets the\
    \ user enter and edit text\n*   Text Field with Number Formatter: Lets the user\
    \ enter and edit formatted numbers easily\n*   Wrapping Label: Displays text on\
    \ multiple lines\n*   Wrapping Text Field: Lets the user enter and edit text that\
    \ appears on multiple lines\n*   Text Field Cell: Lets you display text in color\
    \ in a cell such as in a table\n\n### User Interface Items That Restrict Choices\n\
    \nLetting the user enter data in a text field provides maximum flexibility. However,\
    \ this flexibility also means that your program has no idea what type of data\
    \ the user might enter. If a program expects the user to type in a number for\
    \ an age, but the user types in “forty-nine” instead, the program will likely\
    \ crash because it expects a number but received a word instead.\n\nEven worse,\
    \ a program could ask for someone’s age and a user could type a negative number\
    \ or an outrageously high number like 239, which is clearly impossible for someone’s\
    \ age. To insure that users enter in correct data, you can use a variety of different\
    \ user interface items that let the user choose a range of valid options. User\
    \ interface items that display text (including numbers) choices include\n\n* \
    \  Pop-Up Button (`NSPopUpButton`): Displays a menu of valid options\n*   Radio\
    \ Group (`NSButton`): Displays a list of radio buttons where only one can be chosen\
    \ at any given time\n*   Check Box (`NSButton`): Displays one or more check boxes\
    \ to let the user select multiple options\n*   Combo Box (`NSComboBox`): Acts\
    \ like a combination text field and pop-up button where the user can either type\
    \ in text or choose from a list of valid options\n\nUser interface items that\
    \ allow the user to select a range of valid numeric options include\n\n*   Date\
    \ Picker (`NSDatePicker`): Lets the user choose a date including day, month, and\
    \ year\n*   Horizontal/Vertical/Circular Slider (`NSSlider`): Lets the user move\
    \ a slider to select a fixed range of valid numeric values\n*   Stepper (`NSStepper`):\
    \ Increments or decrements a value by a fixed amount\n\nWith text options, you\
    \ need to list all valid options that the user can choose. With numeric options,\
    \ you just need to list a range of all valid options, such as letting the user\
    \ choose a number between 1 and 100."
  trans: "\n# 搜索对象库\n\n要显示程序的用户界面，需要在项目导航窗格中点击 `.xib` 或 `.storyboard` 文件。选定要修改的用户界面文件后，就可以从对象库（位于\
    \ Xcode 窗口右下角）中拖拽项目，并将其放置在用户界面的任意位置。若要查看对象库，请选择“显示”➤“工具”➤“显示对象库”。\n\n搜索对象库有两种方法。一种方法是直接上下滚动，直到找到所需项目。由于对象库列出了所有可用的用户界面项目，滚动浏览可能会显得笨拙且缓慢。\n\
    \n更快的方法是使用对象库窗格底部的搜索字段，如图 15-1 所示。只需输入要使用的用户界面项目名称的一部分，对象库就会过滤掉所有不匹配的项目。\n\n![A437923_1_En_15_Fig1_HTML.jpg](img/A437923_1_En_15_Fig1_HTML.jpg)\n\
    \n图 15-1. 搜索字段让您能快速在对象库中找到用户界面项目\n\n要学习如何搜索对象库，请遵循以下步骤：\n\n1.  在 Xcode 中选择“文件”➤“新建”➤“项目”。\n\
    2.  在 macOS 类别下点击“应用程序”。\n3.  点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 现在会要求输入产品名称。\n\
    4.  点击“产品名称”文本字段，输入 `UIProgram`。\n5.  确保“语言”弹出菜单显示为 Swift，并且没有选中任何复选框。请注意，此时您可以通过选中“使用故事板”复选框来选择使用故事板，如图\
    \ 15-2 所示。暂时保持“使用故事板”复选框为未选中状态。\n\n    ![A437923_1_En_15_Fig2_HTML.jpg](img/A437923_1_En_15_Fig2_HTML.jpg)\n\
    \n    图 15-2. 创建新项目时，您可以选择为界面使用故事板\n6.  点击“下一步”按钮。Xcode 会询问您希望将项目存储在何处。\n7.  选择一个文件夹来存储项目，然后点击“创建”按钮。\n\
    8.  在项目导航器中点击 `MainMenu.xib` 文件。程序的用户界面将会显示出来。\n9.  点击“窗口”图标，如图 15-3 所示，以显示程序用户界面的窗口。\n\
    \n    ![A437923_1_En_15_Fig3_HTML.jpg](img/A437923_1_En_15_Fig3_HTML.jpg)\n\n\
    \    图 15-3. “窗口”图标代表您的用户界面窗口\n10. 点击“窗口”图标，如图 15-3 所示，以显示程序用户界面的窗口。\n11. 选择“显示”➤“工具”➤“显示对象库”。对象库会出现在\
    \ Xcode 窗口的右下角。\n12. 上下滚动浏览对象库。注意您可以添加到用户界面中的不同项目的名称和种类。\n13. 点击对象库底部的搜索字段，输入\
    \ `text`。请注意，对象库现在只显示名称或描述中包含“text”的项目，如图 15-4 所示。\n\n    ![A437923_1_En_15_Fig4_HTML.jpg](img/A437923_1_En_15_Fig4_HTML.jpg)\n\
    \n    图 15-4. 在对象库中搜索“text”\n14. 点击对象库底部的搜索字段，点击关闭图标（搜索字段最右侧灰色圆圈内的 X）以清空搜索字段。\n\
    15. 输入 `button`。请注意，对象库现在只显示名称或描述中包含“button”的项目。如果您知道所需项目的全部或部分名称或用途，那么在对象库中搜索要比在冗长的所有可用用户界面项目列表中滚动浏览快得多。\n\
    \n## 显示和接受文本的用户界面项目\n\n尽管对象库包含大量可放置在用户界面上的可用项目，但大多数项目可以按功能分组归类。请记住，用户界面具有三种功能：\n\
    \n*   向用户显示信息\n*   接收用户输入的数据\n*   允许用户控制程序\n\n在用户界面上显示信息的最简单方法是通过标签。在 Cocoa 框架中，标签基于\
    \ `NSTextField` 类。本质上，标签是一种不可编辑的文本字段。要识别对象库中任何项目的类，只需点击它，就会弹出一个窗口，描述该项目的用途及其基于的类（见图\
    \ 15-5）。\n\n![A437923_1_En_15_Fig5_HTML.jpg](img/A437923_1_En_15_Fig5_HTML.jpg)\n\
    \n图 15-5. 识别对象库中用户界面项目的类\n\n任何基于 `NSTextField` 的用户界面项目都可用于显示和接受文本，尽管更常见的做法是使用标签来显示文本，并使用其他类型的文本字段让用户输入文本。基于\
    \ `NSTextField` 的用户界面项目列表如图 15-6 所示：\n\n![A437923_1_En_15_Fig6_HTML.jpg](img/A437923_1_En_15_Fig6_HTML.jpg)\n\
    \n图 15-6. 基于 `NSTextField` 类的用户界面项目\n\n*   标签：显示文本，但不允许用户输入或编辑文本\n*   文本字段：允许用户输入和编辑文本\n\
    *   带数字格式器的文本字段：允许用户轻松输入和编辑格式化的数字\n*   自动换行标签：在多行上显示文本\n*   自动换行文本字段：允许用户输入和编辑显示在多行上的文本\n\
    *   文本字段单元格：允许您在表格等单元格中以彩色显示文本\n\n## 限制选择的用户界面项目\n\n让用户在文本字段中输入数据提供了最大的灵活性。然而，这种灵活性也意味着您的程序无法知道用户可能输入哪种类型的数据。如果程序期望用户输入年龄的数字，但用户却输入了“forty-nine”，那么程序很可能会崩溃，因为它期望的是数字，但收到的却是单词。\n\
    \n更糟糕的是，程序可能会询问某人的年龄，而用户可能输入一个负数或一个高得离谱的数字（如 239），这显然不可能是某人的年龄。为了确保用户输入正确的数据，您可以使用各种不同的用户界面项目，让用户从一系列有效选项中进行选择。显示文本（包括数字）选项的用户界面项目包括：\n\
    \n*   弹出按钮 (`NSPopUpButton`)：显示一个有效选项的菜单\n*   单选组 (`NSButton`)：显示一组单选按钮，一次只能选择一个\n\
    *   复选框 (`NSButton`)：显示一个或多个复选框，让用户选择多个选项\n*   组合框 (`NSComboBox`)：兼具文本字段和弹出按钮的功能，用户既可以输入文本，也可以从有效选项列表中选择\n\
    \n允许用户选择一系列有效数值选项的用户界面项目包括：\n\n*   日期选取器 (`NSDatePicker`)：让用户选择包含日、月、年的日期\n* \
    \  水平/垂直/圆形滑块 (`NSSlider`)：让用户移动滑块以选择固定范围内的有效数值\n*   步进器 (`NSStepper`)：以固定增量增加或减少数值\n\
    \n对于文本选项，您需要列出用户可以选择的所有有效选项。对于数值选项，您只需列出一个所有有效选项的范围，例如让用户选择 1 到 100 之间的数字。\n"
- fmt: "### User Interface Items That Accept Commands\n\nThe most common user interface\
    \ item is one that accepts commands so the user can control a program. The two\
    \ most common types of user interface items that accept commands are buttons and\
    \ menus. Each button or menu item represents a single command, so when the user\
    \ clicks on a button or menu item, that command tells the program to do something.\n\
    \nBoth buttons and menu items allow the view to communicate back to the controller\
    \ using something called target-action, as shown in Figure [15-7](#A437923_1_En_15_Chapter.html#Fig7).\
    \ The target is a button or menu item, which triggers an action back in the controller,\
    \ such as running an `IBAction` method.\n\n![A437923_1_En_15_Fig7_HTML.jpg](A437923_1_En_15_Fig7_HTML.jpg)\n\
    \nFigure 15-7. Buttons and menu items let a view communicate back to a controller\n\
    \nUser interface buttons are based on the `NSButton` class. Menu items are based\
    \ on the `NSMenuItem` class. The Object Library displays a variety of different\
    \ types of buttons and menu items, but they all work alike where the button or\
    \ menu item represents a command. To make that command work, you need to connect\
    \ the button on the user interface to an `IBAction` method in a Swift file.\n\n\
    ### User Interface Items That Group Items\n\nOne type of user interface item does\
    \ nothing but group and organize other items on the user interface, such as displaying\
    \ a box around related buttons or text. These user interface items are more decorative\
    \ so you likely won’t need to connect them to Swift code using `IBOutlet` or `IBAction`\
    \ methods. Some examples of items that group and organize other user interface\
    \ items include:\n\n- **Table View** (`NSTableView`): Displays data in rows\n\
    - **Collection View** (`NSCollectionView`): Displays data in rows and columns\n\
    - **Box** (`NSBox`): Displays a box that draws a border around related items\n\
    - **Tab View** (`NSTabView`): Displays two or more tabs that can change the data\
    \ that appears inside a box, as shown in Figure [15-8](#A437923_1_En_15_Chapter.html#Fig8)\n\
    \n  ![A437923_1_En_15_Fig8_HTML.jpg](A437923_1_En_15_Fig8_HTML.jpg)\n\n  Figure\
    \ 15-8. A tab view can group two or more groups of related items in the same box.\n\
    \n- **Windows** (`NSWindow`): Displays a window that can hold other user interface\
    \ items\n- **Toolbar** (`NSToolbar`): Displays icons that represent commands\n\
    \nAlthough the Object Library contains many other items, they typically fall into\
    \ one of these four categories:\n\n- Items that display or accept text\n- Items\
    \ that let the user choose from a limited range of valid options\n- Items that\
    \ let the user choose a command to control the program\n- Items that group or\
    \ organize other user interface items\n\n## Using Constraints in Auto Layout\n\
    \nNo matter what type of items you place on a user interface, you need to consider\
    \ what happens if the user resizes the window. A window that’s too big might leave\
    \ too much empty space on the user interface. A window that’s too small might\
    \ cut off items, as shown in Figure [15-9](#A437923_1_En_15_Chapter.html#Fig9).\n\
    \n![A437923_1_En_15_Fig9_HTML.jpg](A437923_1_En_15_Fig9_HTML.jpg)\n\nFigure 15-9.\
    \ A user interface that doesn’t adapt when the user resizes a window risks cutting\
    \ off items\n\nThere are two ways to make sure a user interface remains usable\
    \ when the user resizes a window. First, you can define minimum and maximum sizes\
    \ for a window to keep it from shrinking or expanding too much. Second, you can\
    \ set constraints on individual items that define the distance between neighboring\
    \ items and the edges of the window.\n\nIn most cases, you can use both methods.\
    \ This way you can define a minimum and maximum size for a window, and define\
    \ how items on your user interface should adapt to changes in the window size.\n\
    \n### Defining Window Sizes\n\nA window displays your program’s user interface\
    \ on the screen. Xcode lets you define the following for a window (as shown in\
    \ Figure [15-10](#A437923_1_En_15_Chapter.html#Fig10)):\n\n![A437923_1_En_15_Fig10_HTML.jpg](A437923_1_En_15_Fig10_HTML.jpg)\n\
    \nFigure 15-10. The Size Inspector lets you define the size of a window\n\n- The\
    \ initial size of the window\n- The minimum size of the window\n- The maximum\
    \ size of the window\n- The initial position of the window on the screen\n\nTo\
    \ define the size of a window of a `.xib` file in Xcode, follow these steps:\n\
    \n1. Click the `.xib` file in the Project Navigator pane. Xcode displays the user\
    \ interface stored in the `.xib` file.\n2. If necessary, click the Hide Document\
    \ Outline icon that appears in the bottom left corner, as shown in Figure [15-11](#A437923_1_En_15_Chapter.html#Fig11).\n\
    \n![A437923_1_En_15_Fig11_HTML.jpg](A437923_1_En_15_Fig11_HTML.jpg)\n\nFigure\
    \ 15-11. The Hide Document Outline icon\n\n3. Click the bottom icon that represents\
    \ the window of your user interface, as shown in Figure [15-12](#A437923_1_En_15_Chapter.html#Fig12).\n\
    \n![A437923_1_En_15_Fig12_HTML.jpg](A437923_1_En_15_Fig12_HTML.jpg)\n\nFigure\
    \ 15-12. The bottom icon represents your user interface window\n\n4. Choose View\
    \ ➤ Utilities ➤ Show Size Inspector. The Size Inspector pane appears (see Figure\
    \ [15-10](#A437923_1_En_15_Chapter.html#Fig10)).\n\nWindows stored in `.storyboard`\
    \ files work slightly differently than `.xib` files. When you create a macOS project,\
    \ you have a choice between using `.xib` files or `.storyboard` files. If you\
    \ create a project that uses `.storyboard` files, you can define the size of a\
    \ window of a `.storyboard` file in Xcode by following these steps:\n\n1. Click\
    \ the `.storyboard` file in the Project Navigator pane. Xcode displays the user\
    \ interface stored in the `.storyboard` file.\n2. Click the View Controller of\
    \ the window you want to modify, as shown in Figure [15-13](#A437923_1_En_15_Chapter.html#Fig13).\n\
    \n![A437923_1_En_15_Fig13_HTML.jpg](A437923_1_En_15_Fig13_HTML.jpg)\n\nFigure\
    \ 15-13. The View Controller defines your user interface window\n\n3. Choose View\
    \ ➤ Utilities ➤ Show Size Inspector. The Size Inspector pane appears (see Figure\
    \ [15-10](#A437923_1_En_15_Chapter.html#Fig10)).\n\nWhether you create a user\
    \ interface with `.xib` or `.storyboard` files, Xcode gives you two ways to change\
    \ the size of any window. First, you can drag a side or corner of the window (or\
    \ view controller) using the mouse. Second, you can click in the `Width` and `Height`\
    \ text fields next to the Size label to choose a precise size for your window’s\
    \ width and height, as shown in Figure [15-14](#A437923_1_En_15_Chapter.html#Fig14).\n\
    \n![A437923_1_En_15_Fig14_HTML.jpg](A437923_1_En_15_Fig14_HTML.jpg)\n\nFigure\
    \ 15-14. Defining the width and height of a window\n\nDefining the minimum and/or\
    \ maximum size of a window involves a two-step process. First, you need to select\
    \ the **Minimum Size** and/or **Maximum Size** check box. Second, you need to\
    \ type or choose a width and height to define the minimum or maximum size for\
    \ your window.\n\nFinally, you can define the initial position of a window when\
    \ it first appears. You can do this by either dragging on the window icon on the\
    \ simulated screen or by typing in an X and Y value into the **Initial Position**\
    \ text fields, as shown in Figure [15-15](#A437923_1_En_15_Chapter.html#Fig15).\n\
    \n![A437923_1_En_15_Fig15_HTML.jpg](A437923_1_En_15_Fig15_HTML.jpg)\n\nFigure\
    \ 15-15. Defining the initial position of a window\n\nThe two pop-up menus underneath\
    \ the simulated screen let you define how to determine the initial position of\
    \ a window:\n\n- **Fixed from Left/Right**: Defines a fixed value between the\
    \ window edge and the screen edge\n- **Proportional Horizontal/Vertical**: Defines\
    \ a proportional value between the window edge and the screen edge, based on the\
    \ size of the screen\n- **Center Horizontally/Vertically**: Defines the window\
    \ to appear in the center of the screen"
