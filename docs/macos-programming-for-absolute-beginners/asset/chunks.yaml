  trans: "\n# 向集合中添加和删除元素\n\n使用集合时，你可以随时添加新元素，只要新元素与现有元素的数据类型相同即可。要向集合中添加一个元素，只需指定集合名称、`insert`\
    \ 命令以及要添加的数据（放在括号内），如下所示：\n\n```\nsetName.insert(data)\n```\n\n你必须指定要添加数据的数组名称，并将实际数据放在括号中。确保你添加的数据是适当的数据类型。因此，如果你想向一个当前只包含整数的集合添加数据，你只能向该集合添加另一个整数。\n\
    \n如果你尝试添加集合中已存在的数据，则不会发生任何操作。这意味着如果一个集合包含数字 53，你就无法再向该集合添加另一个 53 的副本。\n\n要从集合中删除数据，只需指定集合名称、`remove`\
    \ 命令以及要删除的数据（放在括号内），如下所示：\n\n```\nsetName.remove(data)\n```\n\n如果你尝试删除集合中不存在的数据，`remove`\
    \ 命令会返回一个 nil 值。但是，如果 `remove` 命令成功地从集合中删除了数据，它会返回一个可选变量。这意味着如果你将删除的数据存储在一个变量中，例如\n\
    \n```\nvar variableName = setName.remove(data)\n```\n\n则可以通过使用感叹号来访问存储在变量中的值，例如\n\
    \n```\nprint(variableName!)\n```\n\n如果你想删除集合中的所有项目，请指定集合名称和 `removeAll` 命令，如下所示：\n\
    \n```\nsetName.removeAll()\n```\n\n要了解如何创建集合以及如何向其中添加和删除数据，请按照以下步骤创建一个新的 playground：\n\
    \n1. 在 Xcode 中打开 `IntroductoryPlayground` 文件。\n2. 输入如下代码：\n\n    ```\n    import\
    \ Cocoa\n    var setOne = Set([2, 45, -9, 8, -34])\n    var setTwo : Set = [34,\
    \ 90, -83]\n    setOne\n    setTwo\n    setOne.insert(65)\n    setTwo.insert(-381)\n\
    \    var temp = setOne.remove(45)\n    print(temp)\n    print(temp!)\n    setOne\n\
    \    setTwo\n    setOne.removeAll()\n    ```\n\n这段 Swift 代码通过直接存储数据并让 Swift 推断数据类型（即整数）来创建一个名为\
    \ `setOne` 的集合。然后它创建第二个名为 `setTwo` 的集合，该集合也只包含整数。\n\n创建 `setTwo` 之后，两个 `insert`\
    \ 命令将不同的整数存储到 `setOne` 和 `setTwo` 中。当代码从 `setOne` 中删除数字 45 时，它会将 45 作为可选变量存储在\
    \ `temp` 变量中。要访问实际值，你必须使用感叹号 (!) 解包可选变量。\n\n最后，`removeAll` 命令清空了 `setOne`，使其不包含任何内容，如图\
    \ 10-2 所示。\n\n![A437923_1_En_10_Fig2_HTML.jpg](img/A437923_1_En_10_Fig2_HTML.jpg)\n\
    \n图 10-2. 创建集合、向集合中插入数据以及从集合中删除数据\n\n请注意，Xcode 会在 `print(temp)` 行的左侧显示一条警告。这是因为\
    \ `temp` 表示一个可选变量，你需要解包（使用 ! 符号）才能获取实际值。\n\n## 查询集合\n\n一旦你拥有一个集合，就可以使用以下命令来获取关于该集合的信息：\n\
    \n* `count`：统计集合中的项目数量\n* `isEmpty`：检查集合是否为空（包含 0 个项目）\n* `isSubset(of:)`：检查一个集合是否完全包含在另一个集合中\n\
    * `isSuperset(of:)`：检查一个集合是否包含另一个集合的所有项目\n* `isDisjoint(with:)`：检查两个集合是否有共同的元素\n\
    \n无论这些命令的结果如何，它们都不会影响集合中存储的数据。\n\n`count` 命令返回一个整数值，只需要指定集合名称和 `count` 命令即可，如下所示：\n\
    \n```\nsetName.count\n```\n\n你也可以将此值赋值给一个变量，例如\n\n```\nvar total = setName.count\n\
    ```\n\n如果集合中项目数为零，`isEmpty` 命令返回布尔值 true，否则返回 false。只需指定集合名称，后跟 `isEmpty` 命令，如下所示：\n\
    \n```\nsetOne.isEmpty\n```\n\n`isSubset(of:)` 命令检查一个集合是否包含第二个集合中也包含的元素。只有当第二个集合包含了第一个集合中的每一个元素时，才认为第一个集合是子集。\n\
    \n`isSuperset(of:)` 命令检查一个集合是否更大，并且包含另一个较小集合中的所有相同元素。只有当第一个集合更大且其所有元素都存储在第二个集合中时，才认为它是超集。\n\
    \n`isDisjoint(with:)` 命令比较两个集合。如果它们没有共同元素，则此命令返回 true，否则返回 false。\n\n要了解如何查询集合，请按照以下步骤操作：\n\
    \n1. 确保在 Xcode 中加载了 `IntroductoryPlayground` 文件。\n2. 按如下方式编辑代码：\n\n    ```\n \
    \   import Cocoa\n    var mySet = Set([\"Fred\", \"Cindy\", \"Jody\", \"Grant\"\
    ])\n    print(mySet.isEmpty)\n    mySet.count\n    mySet.removeAll()\n    print(mySet.isEmpty)\n\
    \    var myNewSet = Set([\"John\", \"Oscar\"])\n    var myOtherSet = Set([\"John\"\
    , \"Oscar\", \"Sally\"])\n    var myThirdSet = Set([\"Rick\", \"Vinny\"])\n  \
    \  myNewSet.isSubset(of: myOtherSet)\n    myOtherSet.isSuperset(of: myNewSet)\n\
    \    myNewSet.isDisjoint(with: myThirdSet)\n    ```\n\n这段代码创建了一个包含四个字符串的集合。它使用\
    \ `isEmpty` 命令检查集合是否为空（结果为 false）。然后它统计集合中的元素数量（有四个元素）。最后，它从集合中删除所有元素，并再次使用 `isEmpty`\
    \ 命令检查集合是否为空（结果为 true）。\n\n下一批代码创建了三个不同的集合，分别命名为 `myNewSet`、`myOtherSet` 和 `myThirdSet`，并用不同的名称填充它们。然后\
    \ `isSubset(of:)` 命令检查 `myNewSet` [\"John\", \"Oscar\"] 中的所有元素是否也都存在于 `myOtherSet`\
    \ [\"John\", \"Oscar\", \"Sally\"] 中，结果为 true。\n\n`isSuperset(of:)` 命令检查 `myOtherSet`\
    \ [\"John\", \"Oscar\", \"Sally\"] 是否包含更多元素并且还包含 `myNewSet` [\"John\", \"Oscar\"\
    ] 中存储的所有元素，结果也为 true。\n\n最后，`isDisjoint(with:)` 命令检查 `myNewSet` [\"John\", \"\
    Oscar\"] 与 `myThirdSet` [\"Rick\", \"Vinny\"] 是否没有共同元素，结果同样为 true，如图 10-3 所示。\n\
    \n![A437923_1_En_10_Fig3_HTML.jpg](img/A437923_1_En_10_Fig3_HTML.jpg)\n\n图 10-3.\
    \ 查询集合\n"
- fmt: "# 11. Storing Code in Functions\n\nEvery program stores data (in variables\
    \ or in data structures such as arrays, sets, or dictionaries) and then manipulates\
    \ that data somehow. Code that manipulates data is called an **algorithm**.\n\n\
    If you want to use an algorithm in more than one place in your program, you can\
    \ copy that code and paste it in a separate location. However, this can cause\
    \ problems if you later want to modify the code. If you made 20 copies of the\
    \ same algorithm, you’d now have to modify all 20 copies throughout your program.\
    \ Not only would this be time-consuming, but it would be error-prone as well.\n\
    \nA better solution is to store algorithms in isolated parts of a program called\
    \ **functions**. Chapter 6 introduced you to mathematical functions but you can\
    \ create your own functions as well. Rather than copy algorithms and store them\
    \ in multiple locations, you just store an algorithm in one place inside a function.\
    \ Functions serve several purposes:\n\n- To reuse code in different parts of a\
    \ program\n- To group related algorithms in one place\n- To make it easy to isolate\
    \ problems in a program\n\nThink of functions as building blocks. Just as it’s\
    \ easier to build a house out of bricks rather than carving it out of a solid\
    \ piece of rock, so you would never try to write a complicated program as a list\
    \ of commands when you can divide a large program into multiple functions instead.\n\
    \nThe Cocoa framework contains numerous functions you can use in your own programs.\
    \ The basic idea behind a function is that you can use it without knowing how\
    \ it works. To make the code inside a function run, you just need to \"call\"\
    \ that function by name.\n\nYou should always strive to use the built-in functions\
    \ of the Cocoa framework as much as possible because this lets you create programs\
    \ by using pre-tested, reliable code. Of course, the Cocoa framework can’t provide\
    \ every possible function that you may need so you’ll eventually need to create\
    \ your own functions.\n\nThe purpose of functions is to simplify code. Functions\
    \ basically replace multiple lines of code with a single line of code known as\
    \ a function call.\n\nThe three types of functions you can create are:\n\n- Functions\
    \ that do the same thing without accepting any data\n- Functions that accept data\n\
    - Functions that return values\n\nRemember, functions that accept data can also\
    \ return values.\n\n## Simple Functions Without Parameters or Return Values\n\n\
    The simplest function just consists of a name, like this:\n\n```\nfunc functionName\
    \ () {\n\n}\n```\n\nBy inserting one or more lines of code in between the curly\
    \ brackets, you can make the function do something, such as:\n\n```\nfunc simpleFunction\
    \ () {\n    print (\"Hello\")\n    print (\"there\")\n}\n```\n\nTo run the code\
    \ inside a function, you just need to call that function by name, such as:\n\n\
    ```\nsimpleFunction()\n```\n\nTo see how this function works, follow these steps:\n\
    \n1. Open the `IntroductoryPlayground` file in Xcode.\n2. Edit the code as follows:\n\
    \n```\nimport Cocoa\nfunc simpleFunction () {\n    print (\"Hello\")\n}\nvar i\
    \ = 1\nwhile i <= 5 {\n    simpleFunction()\n    i = i + 1\n}\n```\n\nThis code\
    \ defines a simple function that does nothing but print \"Hello\" and \"there\"\
    . Then it uses a `while` loop that runs five times and runs or calls the `simpleFunction`\
    \ five times, as shown in Figure 11-1.\n\n![A437923_1_En_11_Fig1_HTML.jpg](A437923_1_En_11_Fig1_HTML.jpg)\n\
    \nFigure 11-1. Defining and calling a simple function\n\n---\n\n## Manipulating\
    \ Sets\n\nWhen you have two or more sets, you can perform operations on both of\
    \ the sets to create a third set. Some common set operations include:\n\n- `union`:\
    \ Combines all items from two sets into a new set\n- `subtracting`: Removes the\
    \ items of a second set from a first set to form a new set\n- `intersection`:\
    \ Finds the common items in both sets and stores them in a new set\n- `symmetricDifference`:\
    \ Finds items contained in one set or another, but not items in both sets\n\n\
    Think of the `union` command as adding two sets together and the `subtract` command\
    \ as subtracting one set from another. The `union` command specifies two set names,\
    \ like this:\n\n```\nfirstSet.union(secondSet)\n```\n\nThink of this as equivalent\
    \ to `firstSet` + `secondSet` where all items from both sets get combined into\
    \ a third set.\n\nThe `subtracting` command specifies two set names, but the order\
    \ makes a difference, such as:\n\n```\nthirdSet.subtracting(firstSet)\nfirstSet.subtracting(thirdSet)\n\
    ```\n\nThese two commands can give different results depending on the contents\
    \ of each set. Suppose `thirdSet` contains `[1, 2, 3, 4, 5]` and `firstSet` contains\
    \ `[1, 3, 5, 7]`. The `thirdSet.subtracting(firstSet)` command works like this:\n\
    \n```\n[1, 2, 3, 4, 5] thirdSet\n[1, 3, 5, 7] firstSet\n```\n\nBoth sets contain\
    \ 1, 3, and 5 so those numbers get eliminated. Take 1, 3, and 5 out of `thirdSet`\
    \ and you’re left with `[2, 4]`.\n\nThe `firstSet.subtracting(thirdSet)` command\
    \ works like this:\n\n```\n[1, 3, 5, 7] firstSet\n[1, 2, 3, 4, 5] thirdSet\n```\n\
    \nBoth sets contain 1, 3, and 5 so those numbers get eliminated. Take 1, 3, and\
    \ 5 out of `firstSet` and you’re left with `{7}`.\n\nThe `intersecting` command\
    \ finds items in common between two sets. The `symmetricDifference` command finds\
    \ items that are not in both sets. Think of the `symmetricDifference` command\
    \ as the opposite of the `intersect` command.\n\nTo see how these four different\
    \ ways to manipulate sets work, follow these steps:\n\n1. Make sure the `IntroductoryPlayground`\
    \ file is loaded in Xcode.\n2. Enter the code as follows:\n\n```\nimport Cocoa\n\
    var firstSet = Set([1, 3, 5, 7])\nvar secondSet = Set([2, 4, 6, 8])\nvar thirdSet\
    \ = Set ([1, 2, 3, 4, 5])\nfirstSet.union(secondSet)\nsecondSet.subtracting(firstSet)\n\
    firstSet.subtracting(secondSet)\nfirstSet.subtracting(thirdSet)\nthirdSet.subtracting(firstSet)\n\
    firstSet.intersection(thirdSet)\nfirstSet.symmetricDifference(thirdSet)\n```\n\
    \nNotice how the `subtracting` command works differently depending on the order\
    \ you list the two sets, as shown in Figure 10-4.\n\n![A437923_1_En_10_Fig4_HTML.jpg](A437923_1_En_10_Fig4_HTML.jpg)\n\
    \nFigure 10-4. Manipulating sets\n\n## Summary\n\nTuples are a way to store different\
    \ data types in a single variable. Like arrays and dictionaries, sets can store\
    \ lists of the same data type. While arrays are best for storing ordered information\
    \ and dictionaries are best for fast retrieval of data, sets are best for checking\
    \ if items belong in a set or not as well as making it easy to manipulate two\
    \ or more sets.\n\nIf you need to store large groups of related data, you can\
    \ use a tuple, but a tuple gets clumsy with large numbers of data. With tuples,\
    \ sets, arrays and dictionaries, you can store data in the most flexible way for\
    \ your particular needs."
