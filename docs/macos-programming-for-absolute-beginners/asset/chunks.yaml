    18.  将鼠标指针移到`Add New Item`按钮上，按住`Control`键，然后将鼠标拖拽到`ViewController.swift`文件底部最后一个花括号的上方。

    19.  松开`Control`键和鼠标。将出现一个弹出窗口。

    20.  单击`Connection`弹出菜单并选择`Action`。

    21.  单击`Name`文本字段并键入`addNewItem`。

    22.  单击`Type`弹出菜单并选择`NSButton`，然后单击`Connect`按钮。Xcode 会创建一个空的`IBAction`方法。

    23.  将鼠标指针移到`Delete First Item`按钮上，按住`Control`键，然后将鼠标拖拽到`ViewController.swift`文件底部最后一个花括号的上方。

    24.  松开`Control`键和鼠标。将出现一个弹出窗口。

    25.  单击`Connection`弹出菜单并选择`Action`。

    26.  单击`Name`文本字段并键入`deleteFirstItem`。

    27.  单击`Type`弹出菜单并选择`NSButton`，然后单击`Connect`按钮。Xcode 会创建一个空的`IBAction`方法。

    28.  将鼠标指针移到`Add New List`按钮上，按住`Control`键，然后将鼠标拖拽到`ViewController.swift`文件底部最后一个花括号的上方。

    29.  松开`Control`键和鼠标。将出现一个弹出窗口。

    30.  单击`Connection`弹出菜单并选择`Action`。

    31.  单击`Name`文本字段并键入`addList`。

    32.  单击`Type`弹出菜单并选择`NSButton`，然后单击`Connect`按钮。Xcode 会创建另一个空的`IBAction`方法。

    33.  按如下所示修改所有三个`IBAction`方法：


    ```

    @IBAction func addNewItem(_ sender: NSButton) {

    myPopUp.addItem(withTitle: newItem.stringValue)

    }

    @IBAction func addList(_ sender: NSButton) {

    myPopUp.removeAllItems()

    myPopUp.addItems(withTitles: ["Cat", "Dog", "Bird", "Fish", "Reptile"])

    }

    @IBAction func deleteFirstItem(_ sender: NSButton) {

    myPopUp.removeItem(at: 0)

    }

    ```


    `addNewItem` `IBAction`方法从文本字段获取文本，并使用`addItem`方法将该文本作为新的菜单项添加到弹出按钮的列表中。`deleteFirstItem`
    `IBAction`方法使用`removeItem`方法删除弹出按钮列表中的第一个菜单项。`addList` `IBAction`方法使用`removeAllItems`方法清除弹出按钮中的当前列表，然后将其替换为一个新的字符串数组。

    34.  选择“产品” ➤ “运行”。你的用户界面将会出现。

    35.  单击弹出按钮。请注意，菜单项列表显示三个项目，分别标记为`Item 1`、`Item 2`和`Item 3`。

    36.  单击弹出按钮以外的区域，使菜单项列表不再显示。

    37.  单击`Delete First Item`按钮。

    38.  单击弹出按钮。请注意，菜单项列表现在只显示两个项目，分别标记为`Item 2`和`Item 3`。

    39.  单击文本字段并输入`My Item`。

    40.  单击`Add New Item`按钮。

    41.  单击弹出按钮。请注意，现在菜单项列表显示三个项目，分别标记为`Item 2`、`Item 3`和`My Item`。

    42.  单击`Add New List`按钮。

    43.  单击弹出按钮。请注意，现在菜单项列表显示在`addList` `IBAction`方法内部定义的字符串数组。

    44.  选择`EditPopProgram` ➤ 退出`EditPopProgram`。


    ## 总结


    按钮代表用户可以单击以选择某个选项的命令。Xcode 提供了几种不同类型的按钮，可以放置在用户界面上，但它们都基于 Cocoa 框架中定义的同一个`NSButton`类。


    并非所有按钮都显示文本，但那些显示文本的按钮使用`Title`属性来保存文本。如果你想在按钮上显示图像，可以使用`Image`属性来定义图像。如果你将按钮的`Type`属性更改为开关或切换按钮，那么你可以让按钮显示存储在`Title`属性中的文本，以及显示在`Alternate
    Text`属性和/或`Alternate Image`属性中的文本。


    如果你需要向用户提供多个选项，在用户界面上放置多个按钮可能会显得杂乱无章。一个更简单的替代方案是使用弹出按钮，它可以显示一个选项列表，你可以通过可视化方式或
    Swift 代码对其进行修改。


    按钮通常连接到单个`IBAction`方法，但你可以将多个按钮链接到同一个`IBAction`方法。当将多个用户界面项连接到一个`IBAction`方法时，你需要使用
    Swift 代码，通过唯一标识每个按钮的`Tag`属性来识别调用该`IBAction`方法的用户界面项。按钮是向用户提供可选择选项最直接的方式。


    ## 18. 使用单选按钮、复选框、日期选择器和滑块做出选择


    用户界面通常不会让用户通过按钮选择特定命令，而是提供选择项供用户挑选。这些选择项允许用户选择一个或多个选项，例如自定义程序的工作方式。当用户界面需要提供多个选项时，最常见的两种提供选项的方式是通过单选按钮和复选框。


    单选按钮的名称来源于汽车收音机，它允许你按下一个按钮来切换到不同的广播电台。由于一次只能收听一个广播电台，因此单选按钮为你提供了多个选项，但限制你只能选择一个按钮。一旦你选择了另一个按钮，你之前的选择就不再被选中。对于单选按钮，你可以选择零个按钮，或者一次只选择一个按钮。


    复选框的工作方式略有不同。与单选按钮类似，复选框也提供多个选择。主要区别在于，对于一组复选框，你可以同时选择零个或多个复选框，因此可以一次选择多个选项。


    当需要将用户限制为零个或一个选择时，请使用单选按钮。当需要让用户选择零个或多个选项时，请使用复选框。图 18-1 显示了 Xcode 偏好设置对话框，该对话框同时使用单选按钮和复选框让用户自定义
    Xcode 的行为。


    ![A437923_1_En_18_Fig1_HTML.jpg](img/A437923_1_En_18_Fig1_HTML.jpg)


    图 18-1.


    Xcode 偏好设置对话框同时使用单选按钮和复选框让用户选择选项。


    虽然单选按钮和复选框通常用于显示以文本形式呈现的选择项，但日期选择器会显示不同类型的日期供用户选择。然后日期选择器会将用户的选择存储为一种特殊的日期格式（而不是表示月份的单独文本或表示日期的数字）。


    通过以特殊格式存储日期，你的程序可以根据用户在其计算机上的设置正确地显示日期。例如，在世界某些地方，他们按 `mm/dd/yyyy` 格式显示日期。而在世界其他地方，他们则按
    `dd/mm/yyyy` 格式显示日期。


    日期选择器使用一种特殊的日期格式，这样计算机就可以根据用户当前的设置正确地显示格式，而无需担心每台用户电脑上的特定日期格式设置。


    与单选按钮和复选框一样，日期选择器为用户提供一组固定但有限的、有效的选项以供选择。这确保了无论用户做出何种选择，该选择对你的程序来说都是可接受的。


    复选框和单选按钮适合为用户提供有限范围的选项，这些选项通常是文本形式。如果要为用户提供一系列数值选项，则可以使用滑块。滑块让用户可以直观地选择有效的数值范围。

