- fmt: '### Editing a Constraint


    Once you create a constraint, you can modify it later. Some ways to modify a constraint
    include:


    *   Changing the length of a constraint: The constraint length can be equal to,
    less than or equal, or greater than or equal a fixed value.

    *   Changing the priority of a constraint: The priority defines which constraints
    are most important.

    *   Changing the multiplier of the constraint: (The default is `1`, which represents
    100% or 1:1.) Multipliers alter the way the constraints resize user interface
    items.


    To modify a constraint, follow these steps:


    1.  Click the user interface item that has the constraints you want to modify.

    2.  Choose `View` ➤ `Utilities` ➤ `Show Size Inspector`. The Size Inspector pane
    appears and displays the constraints on that item (see Figure 20-7).

    3.  Click the `Edit` button that appears to the right of the constraint you want
    to modify. A pop-up window appears, as shown in Figure 20-8.


    ![A437923_1_En_20_Fig8_HTML.jpg](A437923_1_En_20_Fig8_HTML.jpg)


    Figure 20-8. Editing a constraint


    4.  Click in the `Constant` pop-up menu and choose `=`, `≤`, or `≥`, as shown
    in Figure 20-9.


    ![A437923_1_En_20_Fig9_HTML.jpg](A437923_1_En_20_Fig9_HTML.jpg)


    Figure 20-9. Editing a constraint


    5.  Click in the text field to the right of the `Constant:` label and type a value
    or choose `standard value` (Xcode uses recommended values) or `canvas value` (Xcode
    uses the distance of items on the user interface to define a numeric value). In
    most cases, `standard value` is the safest option that will work on different
    types of screens.

    6.  Click in the `Priority` text field and type a value. The higher the value,
    the higher the priority of the constraint. Priorities determine which constraint
    to follow if two or more constraints conflict.

    7.  Click in the `Multiplier` text field and type a value such as `0.5` or `2`.
    The `Multiplier` value defines how a user interface item may stretch or shrink.


    To see how multiple constraints can affect the appearance of user interface items,
    follow these steps:


    1.  Make sure your `ConstraintProgram` is loaded in Xcode.

    2.  Click the `Main.storyboard` file in the Navigator pane. Your program’s user
    interface appears.

    3.  Click the push button. There should be a constraint connecting the button
    to the right edge of the window and a second constraint connecting the button
    to the bottom of the window.

    4.  Move the mouse pointer over the push button, hold down the `Control` key,
    and drag the mouse towards the left edge of the window.

    5.  Release the `Control` key and the left mouse button. A pop-up menu appears,
    as shown in Figure 20-10.


    ![A437923_1_En_20_Fig10_HTML.jpg](A437923_1_En_20_Fig10_HTML.jpg)


    Figure 20-10. Defining a new constraint for the left window edge


    6.  Choose `Leading Space to Container`. Xcode draws a constraint from the push
    button to the left window edge. At this point, you should have three constraints
    to the left, right, and bottom edges of the window, as shown in Figure 20-11.


    ![A437923_1_En_20_Fig11_HTML.jpg](A437923_1_En_20_Fig11_HTML.jpg)


    Figure 20-11. Three constraints on a push button


    7.  Choose `Product` ➤ `Run`. The user interface appears.

    8.  Move the mouse pointer over the right edge of the window and drag the mouse
    to resize the window. Notice that the left constraint keeps the push button’s
    left edge a fixed distance from the left window edge while the right constraint
    keeps the push button’s right edge a fixed distance from the right window edge,
    which forces the button to stretch, as shown in Figure 20-12.


    ![A437923_1_En_20_Fig12_HTML.jpg](A437923_1_En_20_Fig12_HTML.jpg)


    Figure 20-12. Multiple constraints can alter the appearance of items when a window
    resizes


    9.  Choose `ConstraintProgram` ➤ `Quit ConstraintProgram`.


    Because you created two constraints for the left and right sides of the push button,
    the push button expands when the window resizes. That’s because both the left
    and right constraints define a fixed distance between the push button and the
    left and right edges of the window.


    One way to keep the push button from expanding is to modify its left and right
    constraints. Instead of a fixed value, the right constraint can define a greater
    than or equal to value. To see how this works, follow these steps:


    1.  Make sure the `ConstraintProgram` is loaded in Xcode.

    2.  Click the `Main.storyboard` file in the Project Navigator pane.

    3.  Click the push button.

    4.  Choose `View` ➤ `Utilities` ➤ `Show Size Inspector`. The Size Inspector pane
    appears, displaying the constraints on the push button (see Figure 20-7).

    5.  Click the `Edit` button that appears to the right of the `Trailing Space`
    constraint (the right constraint). A pop-up window appears (see Figure 20-8).

    6.  Click in the `Constant` pop-up menu and choose `≥`, as shown in Figure 20-13.


    ![A437923_1_En_20_Fig13_HTML.jpg](A437923_1_En_20_Fig13_HTML.jpg)


    Figure 20-13. Changing a constraint from `=` to `≥`


    7.  Choose `Product` ➤ `Run`. Your user interface appears.

    8.  Move the mouse pointer over the right edge of the window and drag the mouse
    to resize the window. Notice that the left constraint keeps the push button’s
    left edge a fixed distance from the left window edge but the push button no longer
    expands when you widen the window. That’s because the right constraint defines
    that the distance of the push button to the right edge of the window must be equal
    or greater than a fixed value.

    9.  Choose `ConstraintProgram` ➤ `Quit ConstraintProgram`.'
  raw: '### Editing a Constraint


    Once you create a constraint, you can modify it later. Some ways to modify a constraint
    include


    *   Changing the length of a constraint: The constraint length can be equal to,
    less than or equal, or greater than or equal a fixed value.

    *   Changing the priority of a constraint: The priority defines which constraints
    are most important.

    *   Changing the multiplier of the constraint: (The default is 1, which represents
    100% or 1:1.) Multipliers alter the way the constraints resize user interface
    items.


    To modify a constraint, follow these steps:


    1.  Click the user interface item that has the constraints you want to modify.
     

    2.  Choose View ➤ Utilities ➤ Show Size Inspector. The Size Inspector pane appears
    and displays the constraints on that item (see Figure [20-7](#A437923_1_En_20_Chapter.html#Fig7)).
     

    3.  Click the Edit button that appears to the right of the constraint you want
    to modify. A pop-up window appears, as shown in Figure [20-8](#A437923_1_En_20_Chapter.html#Fig8).


    ![A437923_1_En_20_Fig8_HTML.jpg](A437923_1_En_20_Fig8_HTML.jpg)


    Figure 20-8.


    Editing a constraint  

    4.  Click in the Constant pop-up menu and choose =, ≤, or ≥, as shown in Figure
    [20-9](#A437923_1_En_20_Chapter.html#Fig9).


    ![A437923_1_En_20_Fig9_HTML.jpg](A437923_1_En_20_Fig9_HTML.jpg)


    Figure 20-9.


    Editing a constraint  

    5.  Click in the text field to the right of the Constant: label and type a value
    or choose standard value (Xcode uses recommended values) or canvas value (Xcode
    uses the distance of items on the user interface to define a numeric value). In
    most cases, standard value is the safest option that will work on different types
    of screens.  

    6.  Click in the Priority text field and type a value. The higher the value, the
    higher the priority of the constraint. Priorities determine which constraint to
    follow if two or more constraints conflict.  

    7.  Click in the Multiplier text field and type a value such as 0.5 or 2. The
    Multiplier value defines how a user interface item may stretch or shrink.


    To see how multiple constraints can affect the appearance of user interface items,
    follow these steps:


    1.  Make sure your ConstraintProgram is loaded in Xcode.  

    2.  Click the `Main.storyboard` file in the Navigator pane. Your program’s user
    interface appears.  

    3.  Click the push button. There should be a constraint connecting the button
    to the right edge of the window and a second constraint connecting the button
    to the bottom of the window.  

    4.  Move the mouse pointer over the push button, hold down the Control key, and
    drag the mouse towards the left edge of the window.  

    5.  Release the Control key and the left mouse button. A pop-up menu appears,
    as shown in Figure [20-10](#A437923_1_En_20_Chapter.html#Fig10).


    ![A437923_1_En_20_Fig10_HTML.jpg](A437923_1_En_20_Fig10_HTML.jpg)


    Figure 20-10.


    Defining a new constraint for the left window edge  

    6.  Choose Leading Space to Container . Xcode draws a constraint from the push
    button to the left window edge. At this point, you should have three constraints
    to the left, right, and bottom edges of the window, as shown in Figure [20-11](#A437923_1_En_20_Chapter.html#Fig11).


    ![A437923_1_En_20_Fig11_HTML.jpg](A437923_1_En_20_Fig11_HTML.jpg)


    Figure 20-11.


    Three constraints on a push button  

    7.  Choose Product ➤ Run. The user interface appears.  

    8.  Move the mouse pointer over the right edge of the window and drag the mouse
    to resize the window. Notice that the left constraint keeps the push button’s
    left edge a fixed distance from the left window edge while the right constraint
    keeps the push button’s right edge a fixed distance from the right window edge,
    which forces the button to stretch, as shown in Figure [20-12](#A437923_1_En_20_Chapter.html#Fig12).


    ![A437923_1_En_20_Fig12_HTML.jpg](A437923_1_En_20_Fig12_HTML.jpg)


    Figure 20-12.


    Multiple constraints can alter the appearance of items when a window resizes  

    9.  Choose ConstraintProgram ➤ Quit ConstraintProgram.


    Because you created two constraints for the left and right sides of the push button,
    the push button expands when the window resizes. That’s because both the left
    and right constraints define a fixed distance between the push button and the
    left and right edges of the window.


    One way to keep the push button from expanding is to modify its left and right
    constraints. Instead of a fixed value, the right constraint can define a greater
    than or equal to value. To see how this works, follow these steps:


    1.  Make sure the ConstraintProgram is loaded in Xcode.  

    2.  Click the `Main.storyboard` file in the Project Navigator pane.  

    3.  Click the push button.  

    4.  Choose View ➤ Utilities ➤ Show Size Inspector. The Size Inspector pane appears,
    displaying the constraints on the push button (see Figure [20-7](#A437923_1_En_20_Chapter.html#Fig7)).
     

    5.  Click the Edit button that appears to the right of the Trailing Space constraint
    (the right constraint). A pop-up window appears (see Figure [20-8](#A437923_1_En_20_Chapter.html#Fig8)).
     

    6.  Click in the Constant pop-up menu and choose ≥, as shown in Figure [20-13](#A437923_1_En_20_Chapter.html#Fig13).


    ![A437923_1_En_20_Fig13_HTML.jpg](A437923_1_En_20_Fig13_HTML.jpg)


    Figure 20-13.


    Changing a constraint from = to ≥  

    7.  Choose Product ➤ Run. Your user interface appears.  

    8.  Move the mouse pointer over the right edge of the window and drag the mouse
    to resize the window. Notice that the left constraint keeps the push button’s
    left edge a fixed distance from the left window edge but the push button no longer
    expands when you widen the window. That’s because the right constraint defines
    that the distance of the push button to the right edge of the window must be equal
    or greater than a fixed value.  

    9.  Choose ConstraintProgram ➤ Quit ConstraintProgram.'
  trans: '

    ### 编辑约束


    创建约束后，你可以随时修改它。修改约束的几种方式包括：


    *   **更改约束的长度**：约束长度可以等于、小于等于或大于等于某个固定值。

    *   **更改约束的优先级**：优先级用于定义哪些约束最重要。

    *   **更改约束的乘数**：（默认值为 `1`，代表 100%或 1:1。）乘数会改变约束调整用户界面项目大小方式。


    要修改约束，请遵循以下步骤：


    1.  单击包含要修改约束的用户界面项目。

    2.  选择 `View` ➤ `Utilities` ➤ `Show Size Inspector`。此时将出现“大小检查器”面板，并显示该项目上的约束（参见图
    20-7）。

    3.  在要修改的约束右侧，单击出现的 `Edit` 按钮。此时将弹出一个窗口，如图 20-8 所示。


    ![A437923_1_En_20_Fig8_HTML.jpg](img/A437923_1_En_20_Fig8_HTML.jpg)


    图 20-8. 编辑约束


    4.  在 `Constant` 弹出菜单中单击，然后选择 `=`、`≤` 或 `≥`，如图 20-9 所示。


    ![A437923_1_En_20_Fig9_HTML.jpg](img/A437923_1_En_20_Fig9_HTML.jpg)


    图 20-9. 编辑约束


    5.  在 `Constant:` 标签右侧的文本框中单击，输入一个值，或选择 `standard value`（Xcode 使用推荐值）或 `canvas
    value`（Xcode 使用用户界面项目之间的距离来定义一个数值）。在大多数情况下，`standard value` 是最安全的选择，适用于不同类型的屏幕。

    6.  在 `Priority` 文本框中单击并输入一个值。该值越高，约束的优先级就越高。当两个或更多约束冲突时，优先级决定了遵循哪个约束。

    7.  在 `Multiplier` 文本框中单击并输入一个值，例如 `0.5` 或 `2`。`Multiplier` 的值定义了用户界面项目如何拉伸或收缩。


    要了解多个约束如何影响用户界面项目的外观，请遵循以下步骤：


    1.  确保你的 `ConstraintProgram` 已加载到 Xcode 中。

    2.  在导航面板中单击 `Main.storyboard` 文件。程序的用户界面随之出现。

    3.  单击推送按钮。应该有一个约束将该按钮连接到窗口的右边缘，另一个约束将按钮连接到窗口底部。

    4.  将鼠标指针移到推送按钮上，按住 `Control` 键，然后将鼠标拖向窗口的左边缘。

    5.  松开 `Control` 键和鼠标左键。此时将出现一个弹出菜单，如图 20-10 所示。


    ![A437923_1_En_20_Fig10_HTML.jpg](img/A437923_1_En_20_Fig10_HTML.jpg)


    图 20-10. 为窗口左边缘定义新约束


    6.  选择 `Leading Space to Container`。Xcode 会从推送按钮到窗口左边缘绘制一条约束。此时，你应该有了三个约束，分别作用于窗口的左、右和底部边缘，如图
    20-11 所示。


    ![A437923_1_En_20_Fig11_HTML.jpg](img/A437923_1_En_20_Fig11_HTML.jpg)


    图 20-11. 推送按钮上的三个约束


    7.  选择 `Product` ➤ `Run`。用户界面随之出现。

    8.  将鼠标指针移到窗口的右边缘，然后拖动鼠标调整窗口大小。注意，左侧约束使推送按钮的左边缘与窗口左边缘保持固定距离，而右侧约束使推送按钮的右边缘与窗口右边缘保持固定距离，这将强制按钮拉伸，如图
    20-12 所示。


    ![A437923_1_En_20_Fig12_HTML.jpg](img/A437923_1_En_20_Fig12_HTML.jpg)


    图 20-12. 窗口调整大小时，多个约束可以改变项目的外观


    9.  选择 `ConstraintProgram` ➤ `Quit ConstraintProgram`。


    由于你为推送按钮的左侧和右侧创建了两个约束，因此当窗口调整大小时，推送按钮会扩展。这是因为左侧和右侧约束都定义了推送按钮与窗口左右边缘之间的固定距离。


    防止推送按钮扩展的一种方法是修改其左侧和右侧约束。右侧约束可以定义一个大于或等于的值，而不是固定值。要了解其工作原理，请遵循以下步骤：


    1.  确保 `ConstraintProgram` 已加载到 Xcode 中。

    2.  在项目导航面板中单击 `Main.storyboard` 文件。

    3.  单击推送按钮。

    4.  选择 `View` ➤ `Utilities` ➤ `Show Size Inspector`。此时将出现“大小检查器”面板，显示推送按钮上的约束（参见图
    20-7）。

    5.  在 `Trailing Space` 约束（右侧约束）右侧，单击出现的 `Edit` 按钮。此时将弹出一个窗口（参见图 20-8）。

    6.  在 `Constant` 弹出菜单中单击，然后选择 `≥`，如图 20-13 所示。


    ![A437923_1_En_20_Fig13_HTML.jpg](img/A437923_1_En_20_Fig13_HTML.jpg)


    图 20-13. 将约束从 `=` 更改为 `≥`


    7.  选择 `Product` ➤ `Run`。你的用户界面随之出现。

    8.  将鼠标指针移到窗口的右边缘，然后拖动鼠标调整窗口大小。注意，左侧约束使推送按钮的左边缘与窗口左边缘保持固定距离，但当你加宽窗口时，推送按钮不再扩展。这是因为右侧约束定义了推送按钮到窗口右边缘的距离必须大于或等于一个固定值。

    9.  选择 `ConstraintProgram` ➤ `Quit ConstraintProgram`。

