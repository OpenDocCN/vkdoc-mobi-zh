- fmt: '# The View-Model-Controller Design


    It’s possible to write a large program and store all your code in a single file.
    However, this makes finding anything in your program much harder. A better solution
    is to divide a large program into parts and store related parts in separate files.
    This way you can quickly find the part of your program you need to modify and
    make it easy for multiple programmers to work together since one programmer can
    work on one file and a second programmer can work on a second file.


    When you divide a program into separate files, it’s best to stay organized. Just
    as you might store socks in one drawer and t-shirts in a second drawer so you
    can easily find the clothes you need, so should you organize your program into
    multiple files so each file only contains related data. This way you can find
    the file you need to modify quickly and easily.


    The type of data you can store in a file generally falls into one of three categories,
    shown in Figure [1-6](#A437923_1_En_1_Chapter.html#Fig6):


    ![A437923_1_En_1_Fig6_HTML.jpg](A437923_1_En_1_Fig6_HTML.jpg)


    Figure 1-6. Dividing a program into a model-view-controller design


    * Views (user interface)

    * Models

    * Controllers


    The view or user interface is what the user sees. The purpose of every user interface
    is to display information, accept data, and accept commands from the user. In
    the old days, programmers often created user interfaces by writing code. While
    you can still do this in `Swift`, it’s time-consuming, error-prone, and inconsistent
    because one programmer’s user interface may not look and behave exactly like a
    second programmer’s user interface.


    A better option is to design your user interface visually, which is what `Xcode`
    lets you do. Just draw objects on your user interface such as buttons, text fields,
    and menus, and `Xcode` automatically creates an error-free, consistent-looking
    user interface that only takes seconds to create. When you create a user interface
    using `Xcode`, you’re actually using Apple’s `Cocoa` framework to do it.


    By itself, the user interface looks good but does nothing. To make a program do
    something useful, you need to write code that solves a specific problem. For example,
    a lottery-picking program might analyze the latest numbers picked and determine
    the numbers most likely to get picked the coming week. The portion of your code
    that calculates a useful result is called the model.


    The model is actually completely separate from the view (user interface). This
    makes it easy to modify the user interface without affecting the model (and vice
    versa). By keeping different parts of your program as isolated as possible from
    other parts of your program, you reduce the chance of errors occurring when you
    modify a program.


    Since the model is always completely separate from the view, you need a controller.
    When a user chooses a command or types data into the user interface, the controller
    takes that information from the view and passes it to the model.


    The model responds to this data or the commands and calculates a new result. Then
    it sends the calculated result to the controller, which passes it back to the
    view to display for the user to see. At all times, the view and model are completely
    separate.


    With `Xcode`, this means you write and store the bulk of your `Swift` code in
    files that define the model of your program. If you are calculating winning lottery
    numbers, your `Swift` code for performing these calculations is stored in the
    model.


    You also need to write and store `Swift` code in a controller file. In a simple
    program, you might have a single view. In a more complicated program, you might
    have several views. For each view, you typically need a controller file to control
    that view. So the second place you write and store `Swift` code is in the controller
    files.


    In simple programs, it’s common to combine a model with a controller in one file.
    However for larger, more complicated programs, it’s better to create one (or more)
    files for your model and one file for each controller. The number of controller
    files is usually equal to the number of views that make up your user interface.


    Once you’ve clearly separated your program into models, views, and controllers,
    you can easily modify your program quickly and easily by replacing one file with
    a new file. For example, if you want to modify the user interface, you simply
    design a different view, connect it to your controller, and you’re done, without
    touching your model files.


    If you want to modify the model to add new features, you just update your model
    files and connect it to your controller, without touching your view.


    In fact, this is exactly how programmers create programs for both `macOS` and
    `iOS`. Their model remains unchanged. All they do is write one controller and
    view for `macOS` and one controller and view for `iOS`. Then they can create both
    `macOS` and `iOS` apps with the exact same model.'
  raw: '## The View-Model-Controller Design


    It’s possible to write a large program and store all your code in a single file.
    However, this makes finding anything in your program much harder. A better solution
    is to divide a large program into parts and store related parts in separate files.
    This way you can quickly find the part of your program you need to modify and
    make it easy for multiple programmers to work together since one programmer can
    work on one file and a second programmer can work on a second file.


    When you divide a program into separate files, it’s best to stay organized. Just
    as you might store socks in one drawer and t-shirts in a second drawer so you
    can easily find the clothes you need, so should you organize your program into
    multiple files so each file only contains related data. This way you can find
    the file you need to modify quickly and easily.


    The type of data you can store in a file generally falls into one of three categories,
    shown in Figure [1-6](#A437923_1_En_1_Chapter.html#Fig6):


    ![A437923_1_En_1_Fig6_HTML.jpg](A437923_1_En_1_Fig6_HTML.jpg)


    Figure 1-6.


    Dividing a program into a model-view-controller design


    *   Views (user interface)

    *   Models

    *   Controllers


    The view or user interface is what the user sees. The purpose of every user interface
    is to display information, accept data, and accept commands from the user. In
    the old days, programmers often created user interfaces by writing code. While
    you can still do this in Swift, it’s time-consuming, error-prone, and inconsistent
    because one programmer’s user interface may not look and behave exactly like a
    second programmer’s user interface.


    A better option is to design your user interface visually, which is what Xcode
    lets you do. Just draw objects on your user interface such as buttons, text fields,
    and menus, and Xcode automatically creates an error-free, consistent-looking user
    interface that only takes seconds to create. When you create a user interface
    using Xcode, you’re actually using Apple’s Cocoa framework to do it.


    By itself, the user interface looks good but does nothing. To make a program do
    something useful, you need to write code that solves a specific problem. For example,
    a lottery-picking program might analyze the latest numbers picked and determine
    the numbers most likely to get picked the coming week. The portion of your code
    that calculates a useful result is called the model.


    The model is actually completely separate from the view (user interface). This
    makes it easy to modify the user interface without affecting the model (and vice
    versa). By keeping different parts of your program as isolated as possible from
    other parts of your program, you reduce the chance of errors occurring when you
    modify a program.


    Since the model is always completely separate from the view, you need a controller.
    When a user chooses a command or types data into the user interface, the controller
    takes that information from the view and passes it to the model.


    The model responds to this data or the commands and calculates a new result. Then
    it sends the calculated result to the controller, which passes it back to the
    view to display for the user to see. At all times, the view and model are completely
    separate.


    With Xcode, this means you write and store the bulk of your Swift code in files
    that define the model of your program. If you are calculating winning lottery
    numbers, your Swift code for performing these calculations is stored in the model.


    You also need to write and store Swift code in a controller file. In a simple
    program, you might have a single view. In a more complicated program, you might
    have several views. For each view, you typically need a controller file to control
    that view. So the second place you write and store Swift code is in the controller
    files.


    In simple programs, it’s common to combine a model with a controller in one file.
    However for larger, more complicated programs, it’s better to create one (or more)
    files for your model and one file for each controller. The number of controller
    files is usually equal to the number of views that make up your user interface.


    Once you’ve clearly separated your program into models, views, and controllers,
    you can easily modify your program quickly and easily by replacing one file with
    a new file. For example, if you want to modify the user interface, you simply
    design a different view, connect it to your controller, and you’re done, without
    touching your model files.


    If you want to modify the model to add new features, you just update your model
    files and connect it to your controller, without touching your view.


    In fact, this is exactly how programmers create programs for both macOS and iOS.
    Their model remains unchanged. All they do is write one controller and view for
    macOS and one controller and view for iOS. Then they can create both macOS and
    iOS apps with the exact same model.'
  trans: '

    # 视图-模型-控制器设计


    虽然可以编写一个大型程序并将所有代码存储在一个文件中，但这会让查找程序中的任何内容变得困难得多。更好的解决方案是将大型程序划分为多个部分，并将相关的部分存储在单独的文件中。这样，你就能快速找到需要修改的程序部分，并且便于多个程序员协作，因为一个程序员可以处理一个文件，而另一个程序员可以处理另一个文件。


    将程序划分为多个文件时，最好保持条理清晰。就像你可能会把袜子放在一个抽屉里，把 T 恤放在另一个抽屉里，以便轻松找到所需衣物一样，你也应该将程序组织成多个文件，使每个文件只包含相关的数据。这样，你就能快速轻松地找到需要修改的文件。


    文件中存储的数据类型通常归为三类，如图 1-6 所示：


    ![A437923_1_En_1_Fig6_HTML.jpg](img/A437923_1_En_1_Fig6_HTML.jpg)


    图 1-6. 将程序划分为模型-视图-控制器设计


    * 视图（用户界面）

    * 模型

    * 控制器


    视图或用户界面是用户所看到的内容。每个用户界面的目的是显示信息、接收数据以及接受用户的命令。在过去，程序员通常通过编写代码来创建用户界面。虽然在`Swift`中仍可如此操作，但这样做既耗时、又容易出错，并且缺乏一致性，因为一个程序员的用户界面可能在视觉和行为上与另一个程序员的用户界面不完全相同。


    更好的选择是以可视化的方式设计用户界面，而这正是`Xcode`的功能。只需在用户界面上绘制按钮、文本字段和菜单等对象，`Xcode`就会自动创建一个无错误、外观一致的用户界面，仅需几秒钟即可完成。当你使用`Xcode`创建用户界面时，实际上是在使用
    Apple 的`Cocoa`框架来完成。


    用户界面本身看起来不错，但没有任何功能。要使程序执行有用的操作，你需要编写解决特定问题的代码。例如，一个彩票选取程序可能会分析最近选出的号码，并确定下周最有可能被选中的号码。代码中计算有用结果的部分称为模型。


    模型实际上与视图（用户界面）完全分离。这使得修改用户界面而不影响模型（反之亦然）变得容易。通过尽可能地将程序的不同部分相互隔离，可以减少修改程序时出现错误的几率。


    由于模型始终与视图完全分离，因此需要控制器。当用户在用户界面中选择命令或输入数据时，控制器从视图中获取这些信息并将其传递给模型。


    模型响应这些数据或命令，并计算出新的结果。然后，它将计算结果发送给控制器，再由控制器将其传回视图进行显示，供用户查看。视图和模型始终保持完全分离。


    使用`Xcode`，这意味着你将大部分`Swift`代码编写并存储在定义程序模型的文件中。如果你正在计算中奖彩票号码，用于执行这些计算的`Swift`代码将存储在模型中。


    你还需要在控制器文件中编写并存储`Swift`代码。在简单程序中，你可能只有一个视图。在更复杂的程序中，你可能有几个视图。每个视图通常需要一个控制器文件来控制该视图。因此，第二个编写和存储`Swift`代码的地方是控制器文件。


    在简单程序中，常见做法是将模型与控制器合并到一个文件中。然而，对于更大、更复杂的程序，最好为模型创建一个（或多个）文件，并为每个控制器创建一个文件。控制器文件的数量通常等于构成用户界面的视图数量。


    一旦你将程序清晰地划分为模型、视图和控制器，就可以通过用一个新文件替换另一个文件来快速、轻松地修改程序。例如，如果你想修改用户界面，只需设计一个不同的视图，将其连接到你的控制器，就大功告成了，无需触碰模型文件。


    如果你想修改模型以添加新功能，只需更新模型文件并将其连接到控制器，无需触碰视图。


    事实上，这正是程序员为`macOS`和`iOS`创建程序的方式。他们的模型保持不变。他们所做的只是为`macOS`编写一个控制器和视图，并为`iOS`编写一个控制器和视图。然后，他们就可以使用完全相同的模型创建`macOS`和`iOS`应用。

