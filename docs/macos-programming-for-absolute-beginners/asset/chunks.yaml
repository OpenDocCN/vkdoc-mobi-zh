    \ = Politician()\n```\n\n然后，你需要将数据存储到 `Politician` 类的 `name` 属性中。为此，你需要解包可选变量（`Politician`\
    \ 类）以访问其 `name` 属性，如下所示：\n\n```\nperson.candidate!.name = \"Sally\"\n```\n\n请记住，只有当你绝对确定可选变量包含一个值时，才应使用感叹号解包可选变量。在这种情况下，你正在给可选变量赋值（`\"\
    Sally\"`），因此解包可选变量是安全的。\n\n让我们看看如何修改之前的代码以在可选变量属性中存储一个值：\n\n1. 确保 `DefensePlayground`\
    \ 已加载到 Xcode 中。\n2. 将 playground 代码编辑如下：\n\n```\n    import Cocoa\n    class Dreamer\
    \ {\n    var candidate: Politician?\n    }\n    class Politician {\n    var name\
    \ : String = \"\"\n    }\n    let person = Dreamer()\n    if let check = person.candidate?.name\
    \ {\n    print (\"Name = \\(check)\")\n    }\n    else {\n    print (\"Nil value\
    \ here\")\n    }\n    person.candidate = Politician ()\n    person.candidate!.name\
    \ = \"Sally\"\n    if let check = person.candidate?.name {\n    print (\"Name\
    \ = \\(check)\")\n    }\n    else {\n    print (\"Nil value here\")\n    }\n```\n\
    \n请注意，`candidate` 可选变量（`Politician`）在你明确存储一个值之前是未定义的或为 `nil`。一旦你将字符串（`\"Sally\"\
    `）存储到 `name` 属性中，它就不再持有 `nil` 值，如图 25-4 所示。\n\n![A437923_1_En_25_Fig4_HTML.jpg](img/A437923_1_En_25_Fig4_HTML.jpg)\n\
    \n图 25-4. 你需要解包可选变量才能在其中存储一个值\n\n处理可选变量的关键在于确保你正确使用问号和感叹号符号。幸运的是，如果你省略了任一符号，Xcode\
    \ 通常可以提示你选择正确的符号，如图 25-5 所示。\n\n![A437923_1_En_25_Fig5_HTML.jpg](img/A437923_1_En_25_Fig5_HTML.jpg)\n\
    \n图 25-5. Xcode 编辑器可以在你处理可选变量时提示你何时使用 `?` 或 `!` 符号\n\n问号符号用于创建可选变量或安全地访问可选变量。感叹号符号用于解包可选变量，因此要确保那些被解包的可选变量持有非\
    \ nil 的值。\n\n通常，每当你看到可选变量使用了问号，你的代码在处理 `nil` 值时很可能是安全的。然而，每当你看到可选变量使用了感叹号，请确保该可选变量持有一个值，因为如果它持有\
    \ `nil` 值，你的代码可能不安全并可能导致崩溃。\n\n# 错误处理\n\n由于你不可能每次都编写无错误的代码，Swift 提供了一种称为错误处理的功能。错误处理背后的理念是识别并捕获可能的错误，以便你的程序能够优雅地处理它们，而不是让程序崩溃或不可预测地运行。要处理错误，你需要遵循以下几个步骤：\n\
    \n* 定义你想要识别的描述性错误\n* 识别一个或多个函数来检测错误并识别发生的错误类型\n* 处理错误\n\n## 使用枚举定义错误\n\n在过去，程序经常显示充满十六进制数字和奇怪符号的晦涩错误消息。这类错误消息通常对于识别可能发生的问题毫无用处。这就是为什么错误处理的第一步是创建一个描述性错误类型的列表。\n\
    \n你为不同错误指定的名称完全是任意的，但你应该为不同类型的错误消息赋予有意义的名称。要创建一个描述性错误类型的列表，你需要创建一个使用 `ErrorType`\
    \ 协议的 `enum`，如下所示：\n\n```\nenum enumName : Error {\ncase descriptiveError1\ncase\
    \ descriptiveError2\ncase descriptiveError3\n}\n```\n\n将 `enumName` 替换为能够标识你想要识别的错误类型的描述性名称。然后使用\
    \ `case` 关键字输入一个单词形式（不带空格）的描述性错误名称。你的可能错误列表可以少至一个，也可以多到你想要描述的任意数量，因此你不受固定数量的限制。如果你想创建一个列出三种错误类型的\
    \ `enum`，可以使用如下代码：\n\n```\nenum ageError : Error {\ncase negativeAge // 负数\ncase\
    \ unrealAge   // 大于 140 的数\ncase underAge    // 未满 21 岁\n}\n```\n"
- fmt: "### Creating a Function to Identify Errors\n\nOnce you’ve created a list of\
    \ descriptive error types, you now need to create one or more functions where\
    \ you think the error might occur. Normally, you would define a function like\
    \ this:\n\n```\nfunc functionName {\n// Code goes here\n}\n```\n\nTo make a function\
    \ identify errors, you need to insert the `throws` keyword like this:\n\n```\n\
    func functionName throws {\n// Code goes here\n}\n```\n\nThe `throws` keyword\
    \ means that the function “throws” the error for some other part of your code\
    \ to handle. Inside a function with the `throws` keyword you need to use one or\
    \ more `guard` statements.\n\nA `guard` statement identifies what’s allowed and\
    \ works similar to an `if-else` statement. If the `guard` statement’s Boolean\
    \ condition is `true`, then nothing happens. However, if the `guard` statement\
    \ is `false`, then the `guard` statement can use the `throws` keyword to identify\
    \ a specific type of error, like this:\n\n```\nguard Booleancondition else {\n\
    throws enumName.descriptiveError\n}\n```\n\nIf you want to allow only values greater\
    \ than 21, you can create a `guard` statement like this:\n\n```\nguard myAge >\
    \ 21 else {\nthrows ageError.underAge\n}\n```\n\nThis `guard` statement will do\
    \ nothing if the Boolean condition (`myAge > 21`) is `true`. Otherwise, it will\
    \ throw the `ageError.underAge` error where “`ageError`” is the name of the enum\
    \ that lists different errors to identify and “`underAge`” is one of the possible\
    \ errors likely to occur.\n\nThe `guard` statement always defines acceptable behavior\
    \ (`myAge > 21`) or else it identifies an error with the `throws` keyword. A function\
    \ (identified with the `throws` keyword) can have one or more `guard` statements.\n\
    \n### Handling the Error\n\nWhen you’ve identified one or more functions with\
    \ the `throws` keyword where it uses one or more `guard` statements to identify\
    \ possible errors, you finally need a way to handle those errors. In Swift you\
    \ do that using a `do-try-catch` statement like this:\n\n```\ndo {\ntry callFunctionThatThrows\n\
    } catch enumName.descriptiveError {\n// Code to handle the error\n}\n```\n\nThe\
    \ `do-try-catch` statement tries to run a function that can identify errors using\
    \ the `throws` keyword. If the function doesn’t identify any errors with one or\
    \ more `guard` statements, then the `do-try-catch` statement works exactly like\
    \ a normal function call.\n\nHowever, if the function identifies an error, the\
    \ `do-try-catch` statement is where you need to write code to handle that error.\
    \ How you handle this error can be as simple as printing a message to let you\
    \ know of a problem or as complicated as running an entirely new set of code just\
    \ to deal with the problem.\n\nThe point is that if you anticipate possible errors\
    \ and write code to handle those errors, your program will be less likely to crash.\
    \ If your program does crash, simply find out why (which may not be easy), create\
    \ a new descriptive error name to identify it, and then create a new `catch` statement\
    \ to deal with that error.\n\nLet’s see how error handling works:\n\n1.  Make\
    \ sure the `DefensePlayground` is loaded into Xcode.\n2.  Edit the playground\
    \ code as follows:\n\n    ```\n    import Cocoa\n    enum ageError : Error {\n\
    \    case negativeAge // Negative numbers\n    case unrealAge   // Numbers > 140\n\
    \    case underAge    // Under 21\n    }\n    func checkAge(myAge : Int) throws\
    \ {\n    print (myAge)\n    guard myAge > 0 else {\n    throws ageError.negativeAge\n\
    \    }\n    guard myAge  21 else {\n    throws ageError.underAge\n    }\n    }\n\
    \    var oldAge = -9\n    do {\n    try checkAge (myAge: oldAge)\n    } catch\
    \ ageError.negativeAge {\n    print (\"An age can't be a negative number\")\n\
    \    } catch ageError.unrealAge {\n    print (\"An age can't be greater than 140\"\
    )\n    } catch ageError.underAge {\n    print (\"Sorry, you have to be 21 or older\"\
    )\n    }\n    print (oldAge)\n    ```\n\nNotice how a negative number gets identified\
    \ and handled with a simple message, as shown in Figure 25-6.\n\n![A437923_1_En_25_Fig6_HTML.jpg](A437923_1_En_25_Fig6_HTML.jpg)\n\
    \nFigure 25-6.\n\nError handling involves an enum, a function with `guard` statements,\
    \ and a `do-try-catch` statement\n\nChange the value of the `oldAge` variable\
    \ to 250 to see how the `do-try-catch` statement catches that number as higher\
    \ than 140, which makes it unrealistic. Change the value of the `oldAge` variable\
    \ to 15 to see how the `do-try-catch` statement identifies an age under 21.\n\n\
    To use error handling in your programs, you must first identify possible problems,\
    \ and then you need to decide how to handle these problems. Error handling can\
    \ only identify errors you already know about, but it can make your programs less\
    \ fragile when confronted with common types of problems your program may face.\n\
    \n### Summary\n\nNo matter how talented, skilled, or educated you may be as a\
    \ programmer, you will make mistakes occasionally. Sometimes these mistakes will\
    \ be simple errors you can easily correct but sometimes you'll make mistakes that\
    \ cause a variety of subtle problems that will challenge and frustrate you to\
    \ find and fix. That's just the nature of programming.\n\nHowever, any problems\
    \ you accidentally create are also problems you can learn to discover and fix.\
    \ Once you learn how one mistake works, you'll likely remember how to fix those\
    \ types of mistakes in the future if you or someone else makes them again. This\
    \ frees you up to make new mistakes you'll likely never have experience facing\
    \ again.\n\nThe best way to reduce errors in your program is to examine your code\
    \ carefully and assume nothing will go right. Then look for every possible way\
    \ to make sure it can't go wrong. The more you code with a defensive mindset,\
    \ the more likely you'll prevent problems before they occur.\n\nProgramming is\
    \ more of an art than a science, so learn the best ways that work for you to reduce\
    \ introducing errors in your programs. When experimenting with new code, it's\
    \ usually safer to test it out in a Swift playground or in a simple program separate\
    \ from your real program.\n\nThis way you can isolate and test your code safely.\
    \ When it works, then you can copy and paste it into your program.\n\nErrors are\
    \ a way of life in the world of programming. Ideally you want to spend more time\
    \ writing code and less time debugging it.\n\n# Simplifying User Interface Design\n\
    \nDesigning a user interface can be challenging. Not only do you need to design\
    \ a user interface that's easy to use, but you also need to design an adaptive\
    \ user interface that can respond to any changes the user might make to a window's\
    \ size. If the user shrinks a window, your user interface must shrink accordingly\
    \ without cutting any items off. If the user enlarges a window, your user interface\
    \ must expand accordingly to maintain a consistent appearance.\n\nTo help create\
    \ adaptive user interfaces, Xcode provides constraints that fix the edges of various\
    \ user interface items to a window's edge or the edge of other user interface\
    \ items. In this chapter, you'll learn more about constraints and storyboards\
    \ to help make user interface design easier than ever before."
