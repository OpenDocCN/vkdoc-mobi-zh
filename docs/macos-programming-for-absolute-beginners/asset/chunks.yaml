  trans: "\n# `switch` 语句\n\n`if-else-if` 语句可以让你创建两套或多套可能运行的代码。遗憾的是，当需要检查的布尔值过多时，`if-else-if`\
    \ 语句会变得难以理解。为了解决这个问题，Swift 提供了 `switch` 语句。\n\n`switch` 语句的工作方式与 `if-else-if`\
    \ 语句非常相似，但它的可读性和可写性更强。主要区别在于，`switch` 语句不是检查多个布尔值，而是检查单个变量的值。基于这个单一变量的值，`switch`\
    \ 语句可以选择运行不同的代码块。\n\n最简单的 `switch` 语句会检查一个变量是否精确等于不同的值，例如：\n\n```\nswitch 值/变量/表达式\
    \ {\ncase 值 1: // 如果变量等于值 1，则运行的第一套代码\ncase 值 2: // 如果变量等于值 2，则运行的第二套代码\ncase\
    \ 值 3: // 如果变量等于值 3，则运行的第三套代码\ndefault: // 如果其他条件都不匹配，则运行的第四套代码\n}\n```\n\n`switch`\
    \ 语句首先会检查一个固定值（如 38 或 \"Bob\"）、一个变量（代表数据）或一个表达式（如 `3 * age`，其中 `age` 是一个变量）。最终，`switch`\
    \ 语句需要确定一个单一值，并将其与它找到的第一个 `case` 语句进行匹配。一旦找到完全匹配，它就会运行与该 `case` 语句关联的一行或多行代码。\n\
    \n要了解布尔值如何与 `case` 语句配合使用，请按照以下步骤操作：\n\n1. 在 Xcode 中打开 `IntroductoryPlayground`\
    \ 文件。\n2. 按如下所示编辑代码：\n\n```\n    import Cocoa\n    var whatNumber = 3\n    switch\
    \ whatNumber {\n    case 1: print (\"数字是 1\")\n    case 2: print (\"数字是 2\")\n\
    \    case 3: print (\"数字是 3\")\n    print (\"这难道不神奇吗？\")\n    case 4: print (\"\
    数字是 4\")\n    case 5: print (\"数字是 5\")\n    default: print (\"数字未定义\")\n    }\n\
    ```\n\n由于 `whatNumber` 变量的值是 3，`switch` 语句会将其与 `case 3:` 匹配，然后运行冒号后面的 Swift 代码，如图\
    \ 7-7 所示。请注意，你可以在冒号后面存放多行代码，并且无需用花括号将这些代码括起来。改变 `whatNumber` 变量的值，观察它如何影响 `switch`\
    \ 语句的行为。\n\n![A437923_1_En_7_Fig7_HTML.jpg](img/A437923_1_En_7_Fig7_HTML.jpg)\n\
    \n图 7-7. 运行 `switch` 语句以匹配精确值\n\n注意：与 Objective-C 等其他编程语言不同，你不需要使用 `break` 命令来分隔\
    \ `switch` 语句中不同 `case` 里存储的代码。\n\n上述 `switch` 语句等价于：\n\n```\nif whatNumber ==\
    \ 1 {\n    print (\"数字是 1\")\n} else if whatNumber == 2 {\n    print (\"数字是 2\"\
    )\n} else if whatNumber == 3 {\n    print (\"数字是 3\")\n    print (\"这难道不神奇吗？\"\
    )\n} else if whatNumber == 4 {\n    print (\"数字是 4\")\n} else if whatNumber ==\
    \ 5 {\n    print (\"数字是 5\")\n} else {\n    print (\"数字未定义\")\n}\n```\n\n如你所见，`switch`\
    \ 语句更简洁，更易于阅读和理解。\n\n创建 `switch` 语句时，必须处理所有可能性。在上述 `switch` 语句中，`whatNumber` 变量可以是任何整数，因此\
    \ `switch` 语句可以显式处理从 1 到 5 的任何值。如果值不在 1 到 5 的范围内，那么 `switch` 语句的 `default` 部分会处理任何其他值。如果你未能包含\
    \ `default`，Xcode 会将你的 `switch` 语句标记为可能的错误。这是为了保护你的代码，防止因 `switch` 语句接收到它不知道如何处理的数据而崩溃。\n\
    \n这个 `switch` 语句的例子试图将 `值/变量/表达式` 精确匹配一个值。然而，`switch` 语句可以尝试匹配多个值。`switch` 语句有三种方式可以检查值的范围：\n\
    \n- 显式列出所有可能的值，用逗号分隔\n- 用三个点（`...`）定义数字的起始和结束范围\n- 用两个点和一个小于号（`..<`）定义起始数字和结束范围\n\
    \n当一个 `case` 语句列出所有用逗号分隔的值时，只有当 `switch` 的 `值/变量/表达式` 精确匹配这些值之一时，其代码才会运行。例如，考虑以下\
    \ `case` 语句：\n\n```\nswitch whatNumber {\ncase 1, 2, 3: print (\"数字是 1、2 或 3\"\
    )\ndefault: print (\"数字未定义\")\n}\n```\n\n只有当 `whatNumber` 的值是 1、2 或 3 时，其代码才会打印\
    \ \"数字是 1、2 或 3\"。\n\n显式列出所有可能的值对于少量数字来说没问题，但对于多个数字，写出每个可能的数字可能会很繁琐。作为快捷方式，Swift\
    \ 允许你指定一个范围。如果你想匹配 4 到 20 之间的数字，`switch` 语句的 `case` 部分可能如下所示：\n\n```\nswitch whatNumber\
    \ {\ncase 4...20: print (\"数字在 4 到 20 之间\")\ndefault: print (\"数字未定义\")\n}\n```\n\
    \n在这种情况下，`whatNumber` 可以是 4、20 或介于两者之间的任何数字。三个点表示一个包含起始和结束数字（4 和 20）的范围。\n\nSwift\
    \ 还可以检查一个半开范围，由两个点和一个小于号组成，例如：\n\n```\nswitch whatNumber {\ncase 20..<49: print\
    \ (\"数字在 20 到 48 之间\")\ndefault: print (\"数字未定义\")\n}\n```\n\n只有当 `whatNumber`\
    \ 是 20、48 或介于两者之间的任何数字时，这个 `20..<49` 半开范围才会匹配。请注意，如果 `whatNumber` 是 49，它将不会匹配这个半开范围，但如果\
    \ `whatNumber` 是 20，它就会匹配。\n\n要了解这三种多值变体是如何工作的，请按照以下步骤操作：\n\n1. 在 Xcode 中打开 `IntroductoryPlayground`\
    \ 文件。\n2. 按如下所示编辑代码：\n\n```\n    import Cocoa\n    var whatNumber = 49\n    switch\
    \ whatNumber {\n    case 1, 2, 3: print (\"数字是 1\")\n    println (\"这难道不神奇吗？\"\
    )\n    case 4...20: print (\"数字在 4 到 20 之间\")\n    case 20..<49: print (\"数字在\
    \ 20 到 48 之间\")\n    default: print (\"数字未定义\")\n    }\n```\n\n当值为 49 时，`switch`\
    \ 语句没有匹配到任何内容，因此它使用 `switch` 语句的 `default` 部分，如图 7-8 所示。\n\n![A437923_1_En_7_Fig8_HTML.jpg](img/A437923_1_En_7_Fig8_HTML.jpg)\n\
    \n图 7-8. 运行检查多个值的 `switch` 语句\n\n将 `whatNumber` 变量的值改为 2、12 和 48，观察 `switch` 语句如何匹配不同的值。\n\
    \n在前面的例子中，`switch` 语句可以检查多个值（1, 2, 3）或值的范围（`4...20`）和（`20..<49`）。然而，有时你可能想要检查一个值是小于、小于等于、大于还是大于等于。要在\
    \ `switch` 语句中检查 `<`、`<=`、`>` 或 `>=`，你必须使用以下语法：\n\n```\ncase _ where 变量名 < 值:\n\
    ```\n\n`_ where` 代码告诉 Swift，如果特定变量与某个值满足 `<`、`<=`、`>` 或 `>=` 关系，则匹配此 `case`。要了解如何在\
    \ `switch` 语句中检查 `<`、`<=`、`>` 或 `>=`，请按照以下步骤操作：\n\n1. 在 Xcode 中打开 `IntroductoryPlayground`\
    \ 文件。\n2. 按如下所示编辑代码：\n\n```\n    import Cocoa\n    var whatNumber = 49\n    switch\
    \ whatNumber {\n    case _ where whatNumber = 11 : print (\"数字大于或等于 11\")\n  \
    \  default: print (\"数字未定义\")\n    }\n```\n\n当值为 49 时，`switch` 语句匹配了 `>= 11` 这个\
    \ `case` 语句，因此它打印出 \"数字大于或等于 11\"；见图 7-9。\n\n![A437923_1_En_7_Fig9_HTML.jpg](img/A437923_1_En_7_Fig9_HTML.jpg)\n\
    \n图 7-9. 运行检查多个值的 `switch` 语句\n"
- fmt: '# Making Decisions in an macOS Program


    Using playground files to test out `Swift` code can be fun and simple because
    you can focus solely on learning how `Swift` works without the interference of
    other parts of writing a program. However, eventually you’ll need to see how `Swift`
    code works outside of your playground file.


    In this sample program, the user needs to type an employee ID number and password.
    The employee ID number must fall within a range of 100 to 150 to be valid. The
    password must exactly match the string `"password"` (which isn’t a very secure
    password).


    This means you’ll be using two comparison operators to check if the name and password
    are valid. Then you’ll use a logical operator to make sure that both are valid.


    Create a new macOS project by following these steps:


    1. From within `Xcode` choose **File** ➤ **New** ➤ **Project**.

    2. Click **Application** under the `macOS` category.

    3. Click **Cocoa Application** and click the **Next** button. `Xcode` now asks
    for a product name.

    4. Click in the **Product Name** text field and type `BranchingProgram`.

    5. Make sure the **Language** pop-up menu displays `Swift` and that no check boxes
    are selected.

    6. Click the **Next** button. `Xcode` asks where you want to store the project.

    7. Choose a folder to store your project and click the **Create** button.

    8. Click the `MainMenu.xib` file in the **Project Navigator**.

    9. Click the **Window** icon to make the window of the user interface appear,
    as shown in Figure [7-10](#A437923_1_En_7_Chapter.html#Fig10).


    ![A437923_1_En_7_Fig10_HTML.jpg](A437923_1_En_7_Fig10_HTML.jpg)


    Figure 7-10. Making the window of the user interface visible


    10. Choose **View** ➤ **Utilities** ➤ **Show Object Library** to make the Object
    Library appear in the bottom right corner of the `Xcode` window.

    11. Drag two labels, two text fields, and a push button on the user interface
    so it looks similar to Figure [7-11](#A437923_1_En_7_Chapter.html#Fig11).


    ![A437923_1_En_7_Fig11_HTML.jpg](A437923_1_En_7_Fig11_HTML.jpg)


    Figure 7-11. Creating a basic user interface with labels, text fields, and a push
    button


    12. Click the top label to select it. Then choose **View** ➤ **Utilities** ➤ **Show
    Attributes Inspector**. The Attributes Inspector pane appears in the upper right
    corner of the `Xcode` window, as shown in Figure [7-12](#A437923_1_En_7_Chapter.html#Fig12).


    ![A437923_1_En_7_Fig12_HTML.jpg](A437923_1_En_7_Fig12_HTML.jpg)


    Figure 7-12. The Attributes Inspector pane for a label


    13. Click in the **Title** text field and replace `Label` with `ID`. Press **Return**.
    Notice that the top label now displays reads `ID`. When you change a label’s **Title**
    property, you change the text that appears on that label. Let’s see a second and
    faster way to change the text on a label.

    14. Double-click the second label. `Xcode` highlights your chosen label, as shown
    in Figure [7-13](#A437923_1_En_7_Chapter.html#Fig13).


    ![A437923_1_En_7_Fig13_HTML.jpg](A437923_1_En_7_Fig13_HTML.jpg)


    Figure 7-13. Double-clicking on a label lets you change the text without using
    the Attributes Inspector pane


    15. Type `Password` and press **Return**. Notice that the second label now displays
    `Password`. By double-clicking a label, you can change text on that label without
    opening the Attributes Inspector pane.

    16. Click the top text field and choose **View** ➤ **Utilities** ➤ **Show Size
    Inspector**. The Size Inspector pane appears in the upper right corner of the
    `Xcode` window, as shown in Figure [7-14](#A437923_1_En_7_Chapter.html#Fig14).


    ![A437923_1_En_7_Fig14_HTML.jpg](A437923_1_En_7_Fig14_HTML.jpg)


    Figure 7-14. The Size Inspector pane


    17. Click in the **Width** text field and type `250`. Then press **Return**. `Xcode`
    expands with width of the text field.

    18. Click the second text field so handles appear around it. Now drag the far
    right handle to the right until it aligns with the top text field, as shown in
    Figure [7-15](#A437923_1_En_7_Chapter.html#Fig15).


    ![A437923_1_En_7_Fig15_HTML.jpg](A437923_1_En_7_Fig15_HTML.jpg)


    Figure 7-15.'
