  trans: "\n# 在 macOS 程序中使用继承\n\n继承允许你创建在两个类之间底层代码变化时保持相同的方法名。在下面的示例程序中，你将定义一个类，然后为第二个类继承其属性和方法。第二个类还将重写一个方法，并添加代码使该重写方法的行为略有不同。\n\
    \n要创建展示继承工作原理的示例程序，请按以下步骤操作：\n\n1. 在 Xcode 中选择 **文件** ➤ **新建** ➤ **项目**。\n2. 在\
    \ macOS 类别下点击 **应用程序**。\n3. 点击 **Cocoa 应用程序**，然后点击 **下一步** 按钮。Xcode 现在会要求你输入产品名称。\n\
    4. 点击 **产品名称** 文本字段，输入 `InheritProgram`。\n5. 确保 **语言** 弹出菜单显示为 **Swift**，且未选中任何复选框。\n\
    6. 点击 **下一步** 按钮。Xcode 会询问你希望将项目存储在何处。\n7. 选择一个文件夹存储项目，点击 **创建** 按钮。\n8. 在项目导航器中点击\
    \ `MainMenu.xib` 文件。\n9. 点击 **窗口** 图标，使用户界面窗口显示出来。\n10. 选择 **视图** ➤ **工具** ➤ **显示对象库**，使对象库显示在\
    \ Xcode 窗口的右下角。\n11. 在用户界面上拖放一个按钮和两个标签，然后双击按钮和标签以更改上面显示的文本，使其看起来类似于图 14-16。\n\n\
    ![A437923_1_En_14_Fig16_HTML.jpg](img/A437923_1_En_14_Fig16_HTML.jpg)\n\n**图 14-16.**\
    \ `InheritProgram` 的用户界面\n\n该用户界面显示了代表两个不同对象的标签。`Object 1` 只包含一个属性和一个修改该属性的方法。`Object\
    \ 2` 继承自 `Object 1`，包含一个额外的属性，并重写了在 `Object 1` 中定义的方法。\n\n当你点击 **更改** 按钮时，两个标签都会根据每个对象定义的属性和方法更改其外观。要将用户界面连接到\
    \ Swift 代码，请按以下步骤操作：\n\n1. 在 Xcode 窗口中保持用户界面可见，选择 **视图** ➤ **助理编辑器** ➤ **显示助理编辑器**。`AppDelegate.swift`\
    \ 文件会出现在用户界面旁边。\n2. 将鼠标移到 **更改** 按钮上，按住 **Control** 键，拖拽到 `AppDelegate.swift`\
    \ 文件底部最后一个花括号的上方。\n3. 松开鼠标和 **Control** 键。会弹出一个窗口。\n4. 点击 **连接** 弹出菜单，选择 **操作**。\n\
    5. 点击 **名称** 文本字段，输入 `changeButton`。\n6. 点击 **类型** 弹出菜单，选择 `NSButton`。然后点击 **连接**\
    \ 按钮。Xcode 会创建一个名为 `changeButton` 的空 `IBAction` 方法。\n7. 将鼠标移到 `Object 1` 标签上，按住\
    \ **Control** 键，拖拽到 `AppDelegate.swift` 文件中 `@IBOutlet` 行的下方。\n8. 松开鼠标和 **Control**\
    \ 键。会弹出一个窗口。\n9. 点击 **名称** 文本字段，输入 `ObjectOne`，然后点击 **连接** 按钮。\n10. 将鼠标移到 `Object\
    \ 2` 标签上，按住 **Control** 键，拖拽到 `AppDelegate.swift` 文件中 `@IBOutlet` 行的下方。\n11. 松开鼠标和\
    \ **Control** 键。会弹出一个窗口。\n12. 点击 **名称** 文本字段，输入 `ObjectTwo`，然后点击 **连接** 按钮。现在你应该拥有以下表示用户界面上所有标签的\
    \ `IBOutlet`：\n\n```\n@IBOutlet weak var window: NSWindow!\n@IBOutlet weak var\
    \ ObjectOne: NSTextField!\n@IBOutlet weak var ObjectTwo: NSTextField!\n```\n\n\
    13. 直接在 `IBOutlet` 代码行下方输入以下内容：\n\n```\nclass One {\n    var myColor : NSColor\
    \ = NSColor.black\n    func change () {\n        myColor = NSColor.red\n    }\n\
    }\nclass Two : One {\n    var myBackground : NSColor = NSColor.white\n    override\
    \ func change() {\n        myColor = NSColor.blue\n        myBackground = NSColor.green\n\
    \    }\n}\nvar ThingOne = One()\nvar ThingTwo = Two()\n```\n\n14. 按如下方式修改 `IBAction`\
    \ `changeButton` 方法：\n\n```\n@IBAction func changeButton(_ sender: NSButton) {\n\
    \    ThingOne.change()\n    ThingTwo.change()\n    ObjectOne.textColor = ThingOne.myColor\n\
    \    ObjectTwo.textColor = ThingTwo.myColor\n    ObjectTwo.drawsBackground = true\n\
    \    ObjectTwo.backgroundColor = ThingTwo.myBackground\n}\n```\n\n这个 `IBAction`\
    \ 方法对 `ThingOne` 和 `ThingTwo` 对象（分别基于 `One` 和 `Two` 类）都运行了 `change()` 方法。`Two`\
    \ 类继承自 `One` 类，但重写了 `change()` 方法以额外修改一个名为 `myBackground` 的属性。\n\n在 `ThingOne`\
    \ 和 `ThingTwo` 都更改其属性后，第一个标签（由 `ObjectOne` 表示）将其文本颜色设置为 `ThingOne` 对象中的 `myColor`\
    \ 属性。第二个标签（由 `ObjectTwo` 表示）更改了其 `myColor` 和 `myBackground` 属性，因此将这些属性设置到标签上。\n\
    \n`AppDelegate.swift` 文件的完整内容应如下所示：\n\n```\nimport Cocoa\n@NSApplicationMain\n\
    class AppDelegate: NSObject, NSApplicationDelegate {\n    @IBOutlet weak var window:\
    \ NSWindow!\n    @IBOutlet weak var ObjectOne: NSTextField!\n    @IBOutlet weak\
    \ var ObjectTwo: NSTextField!\n    \n    class One {\n        var myColor : NSColor\
    \ = NSColor.black\n        func change () {\n            myColor = NSColor.red\n\
    \        }\n    }\n    class Two : One {\n        var myBackground : NSColor =\
    \ NSColor.white\n        override func change() {\n            myColor = NSColor.blue\n\
    \            myBackground = NSColor.green\n        }\n    }\n    var ThingOne\
    \ = One()\n    var ThingTwo = Two()\n    \n    func applicationDidFinishLaunching(_\
    \ aNotification: Notification) {\n        // 在此处插入代码以初始化应用程序\n    }\n    func\
    \ applicationWillTerminate(_ aNotification: Notification) {\n        // 在此处插入代码以拆除应用程序\n\
    \    }\n    \n    @IBAction func changeButton(_ sender: NSButton) {\n        ThingOne.change()\n\
    \        ThingTwo.change()\n        ObjectOne.textColor = ThingOne.myColor\n \
    \       ObjectTwo.textColor = ThingTwo.myColor\n        ObjectTwo.drawsBackground\
    \ = true\n        ObjectTwo.backgroundColor = ThingTwo.myBackground\n    }\n}\n\
    ```\n\n要查看此程序的工作原理，请按以下步骤操作：\n\n1. 选择 **产品** ➤ **运行**。Xcode 会运行你的 `InheritProgram`\
    \ 项目。注意两个标签看起来完全相同。\n2. 点击 **更改** 按钮。`Object 1` 标签仅更改其文本颜色，因为它代表了一个只有一个属性（`myColor`）的类。`Object\
    \ 2` 标签同时更改其文本颜色和背景颜色，因为它有两个属性（`myColor` 和 `myBackground`），如图 14-17 所示。尽管两个类中的\
    \ `change()` 方法名称完全相同，但它在第二个类中被重写以修改 `myBackground` 属性。\n\n![A437923_1_En_14_Fig17_HTML.jpg](img/A437923_1_En_14_Fig17_HTML.jpg)\n\
    \n**图 14-17.** 点击 **更改** 按钮会使用相同的方法名修改两个不同的对象\n\n3. 选择 **InheritProgram** ➤ **退出\
    \ InheritProgram**。\n"
- fmt: '# Summary


    Classes let you organize related code together where data (properties) and functions
    (methods) that manipulate that data are stored in the same place. The most straightforward
    way to extend the features of a class is through inheritance where you create
    a subclass.


    Inheritance lets you inherit all the properties and methods of another class.
    A class can only inherit from one other class, but it’s possible for that other
    class to inherit from another class as well, creating a daisy-chain effect of
    classes inheriting from other classes. The Cocoa framework is based on this idea
    of inheritance among daisy chains of classes.


    To block inheritance, you can use the `final` keyword. To identify when you’re
    overriding a property or method, you need to use the `override` keyword.


    Beyond inheritance, you can also extend the features of a class through extensions
    and protocols. Protocols are commonly used with the Cocoa framework to extend
    the features of a class. Through inheritance, extensions, and protocols, you can
    extend the features of any class to make it easy to reuse existing code.


    # 15. Creating a User Interface


    While it’s possible to create programs that never interact with a user at all
    (such as a program that controls a traffic light), it’s far more common to create
    programs that display a user interface of some kind. Typically, this means showing
    a window filled with different items such as labels to display text, text fields
    to allow the user to type something in, and buttons or pull-down menus to give
    the user control over the program.


    Creating an effective user interface depends entirely on the purpose of your program.
    A business program typically follows standard conventions with pull-down menus
    and buttons, but a video game may create a custom interface that may not look
    anything like a standard macOS program. Ultimately, a user interface needs to
    meet the needs of the user. Given a choice between following standard user interface
    design conventions or making a user interface easier for the user, focus on the
    user every time.


    To help you better understand user interface design, Apple provides a free document
    called “The macOS Human Interface Guidelines.” This document gives a brief overview
    of what makes a typical macOS user interface work effectively with special emphasis
    on taking advantage of the latest features of macOS. By doing this, your macOS
    program will look modern and up to date. Failure to take advantage of the latest
    macOS features means your program could look dated even if it’s brand new.


    In previous chapters, you designed simple user interfaces using Xcode. In this
    chapter, you’ll dig a little deeper into the different parts of Xcode that focus
    on helping you design user interfaces.


    Remember, there is no “perfect” design for a user interface. The “perfect” user
    interface is one that makes tasks as simple and effortless as possible to the
    point where the user doesn’t even notice interacting with any user interface whatsoever.
    A user interface acts as the middleman or translator between you and the program.
    The goal of any user interface is to make users feel as if they’re communicating
    and manipulating a program directly.


    ## Understanding User Interface Files


    The Cocoa framework defines classes for creating every possible user interface
    item from a button (the `NSButton` class) and a text field (`NSTextField`) to
    a slider (`NSSlider`) or a date picker (`NSDatePicker`). Theoretically, it’s possible
    to create an entire user interface using nothing but Swift code. However, this
    can be tedious because you can’t see how your user interface looks until you actually
    run your program. This can be as clumsy as trying to paint a picture by describing
    exactly where you need to put a paintbrush on a canvas and the specific angle
    and direction to move your hand.


    Rather than force you to write Swift code to define your user interface, Xcode
    offers a feature called Interface Builder. The idea behind Interface Builder is
    that you can design your user interface by dragging and dropping items on to a
    window.


    The advantage of dragging and dropping items to create a user interface means
    you can see how your user interface looks so you can rapidly adjust and modify
    it. In addition, by separating the design of your user interface from your Swift
    code, you can now make changes to your user interface without affecting your Swift
    code and vice versa.


    In the old days when programmers had to write code to create a user interface,
    modifying the user interface code risked affecting the code that made the program
    worked (and vice versa). So modifying a program went slowly because you had to
    constantly test to make sure your changes didn’t affect another part of your program.


    By keeping your user interface isolated from your Swift code, Xcode lets you create
    reliable programs faster than before. Now you can swap out one user interface
    and replace it with another one without affecting your code, or you can modify
    your code without affecting your user interface.


    Xcode gives you two choices for how to store your user interface:


    * In a `.xib` file

    * In a `.storyboard` file


    A `.xib` file (which stands for Xcode Interface Builder) typically contains a
    single window or view of your user interface. A simple program might have one
    `.xib` file for its user interface but a more sophisticated program will likely
    need several `.xib` files to store different windows.


    A `.storyboard` file consists of one or more views and segues where a view typically
    represents a window that appears on the screen and a segue defines the transition
    from one view to the next.


    You can actually combine both `.xib` and `.storyboard` files in a single project
    to create your program’s user interface. Since `.storyboard` files are used to
    create iOS apps, `.storyboard` files are becoming more common for creating macOS
    user interfaces as well. (Chapter [16](#A437923_1_En_16_Chapter.html) explains
    more about storyboards and segues.)


    The basic component of a user interface is a view, which displays information
    on the screen. A view can be an entire window or just a box that can display information,
    such as a table, a scrolling list of text, or a picture. Whether you’re using
    `.xib` or `.storyboard` files, user interfaces always consist of one or more views
    containing other user interface items, such as buttons and text fields.'
  raw: '## Summary


    Classes let you organize related code together where data (properties) and functions
    (methods) that manipulate that data are stored in the same place. The most straightforward
    way to extend the features of a class is through inheritance where you create
    a subclass.


    Inheritance lets you inherit all the properties and methods of another class.
    A class can only inherit from one other class, but it’s possible for that other
    class to inherit from another class as well, creating a daisy-chain effect of
    classes inheriting from other classes. The Cocoa framework is based on this idea
    of inheritance among daisy chains of classes.


    To block inheritance, you can use the `final` keyword. To identify when you’re
    overriding a property or method, you need to use the `override` keyword.


    Beyond inheritance, you can also extend the features of a class through extensions
    and protocols. Protocols are commonly used with the Cocoa framework to extend
    the features of a class. Through inheritance, extensions, and protocols, you can
    extend the features of any class to make it easy to reuse existing code.


    # 15. Creating a User Interface


    While it’s possible to create programs that never interact with a user at all
    (such as a program that controls a traffic light), it’s far more common to create
    programs that display a user interface of some kind. Typically, this means showing
    a window filled with different items such as labels to display text, text fields
    to allow the user to type something in, and buttons or pull-down menus to give
    the user control over the program.


    Creating an effective user interface depends entirely on the purpose of your program.
    A business program typically follows standard conventions with pull-down menus
    and buttons, but a video game may create a custom interface that may not look
    anything like a standard macOS program. Ultimately, a user interface needs to
    meet the needs of the user. Given a choice between following standard user interface
    design conventions or making a user interface easier for the user, focus on the
    user every time.


    To help you better understand user interface design, Apple provides a free document
    called “The macOS Human Interface Guidelines.” This document gives a brief overview
    of what makes a typical macOS user interface work effectively with special emphasis
    on taking advantage of the latest features of macOS. By doing this, your macOS
    program will look modern and up to date. Failure to take advantage of the latest
    macOS features means your program could look dated even if it’s brand new.


    In previous chapters, you designed simple user interfaces using Xcode. In this
    chapter, you’ll dig a little deeper into the different parts of Xcode that focus
    on helping you design user interfaces.


    Remember, there is no “perfect” design for a user interface. The “perfect” user
    interface is one that makes tasks as simple and effortless as possible to the
    point where the user doesn’t even notice interacting with any user interface whatsoever.
    A user interface acts as the middleman or translator between you and the program.
    The goal of any user interface is to make users feel as if they’re communicating
    and manipulating a program directly.


    ## Understanding User Interface Files


    The Cocoa framework defines classes for creating every possible user interface
    item from a button (the `NSButton` class) and a text field (`NSTextField`) to
    a slider (`NSSlider`) or a date picker (`NSDatePicker`). Theoretically, it’s possible
    to create an entire user interface using nothing but Swift code. However, this
    can be tedious because you can’t see how your user interface looks until you actually
    run your program. This can be as clumsy as trying to paint a picture by describing
    exactly where you need to put a paintbrush on a canvas and the specific angle
    and direction to move your hand.


    Rather than force you to write Swift code to define your user interface, Xcode
    offers a feature called Interface Builder. The idea behind Interface Builder is
    that you can design your user interface by dragging and dropping items on to a
    window.


    The advantage of dragging and dropping items to create a user interface means
    you can see how your user interface looks so you can rapidly adjust and modify
    it. In addition, by separating the design of your user interface from your Swift
    code, you can now make changes to your user interface without affecting your Swift
    code and vice versa.


    In the old days when programmers had to write code to create a user interface,
    modifying the user interface code risked affecting the code that made the program
    worked (and vice versa). So modifying a program went slowly because you had to
    constantly test to make sure your changes didn’t affect another part of your program.


    By keeping your user interface isolated from your Swift code, Xcode lets you create
    reliable programs faster than before. Now you can swap out one user interface
    and replace it with another one without affecting your code, or you can modify
    your code without affecting your user interface.


    Xcode gives you two choices for how to store your user interface:


    *   In a `.xib` file

    *   In a `.storyboard` file


    A `.xib` file (which stands for Xcode Interface Builder) typically contains a
    single window or view of your user interface. A simple program might have one
    `.xib` file for its user interface but a more sophisticated program will likely
    need several `.xib` files to store different windows.


    A `.storyboard` file consists of one or more views and segues where a view typically
    represents a window that appears on the screen and a segue defines the transition
    from one view to the next.


    You can actually combine both `.xib` and `.storyboard` files in a single project
    to create your program’s user interface. Since `.storyboard` files are used to
    create iOS apps, `.storyboard` files are becoming more common for creating macOS
    user interfaces as well. (Chapter [16](#A437923_1_En_16_Chapter.html) explains
    more about storyboards and segues.)


    The basic component of a user interface is a view, which displays information
    on the screen. A view can be an entire window or just a box that can display information,
    such as a table, a scrolling list of text, or a picture. Whether you’re using
    `.xib` or `.storyboard` files, user interfaces always consist of one or more views
    containing other user interface items, such as buttons and text fields.'
  trans: '

    # 摘要


    类（Class）让你可以将相关的代码组织在一起，使数据（属性）和操作这些数据的函数（方法）存储在同一个地方。扩展类功能最直接的方式是通过继承（inheritance）来创建子类（subclass）。


    继承允许你继承另一个类的所有属性和方法。一个类只能继承自另一个类，但这个被继承的类也可以继承自其他类，从而形成一个类之间相互继承的链条（daisy-chain）效应。Cocoa
    框架正是基于这种类的链条式继承思想构建的。


    要阻止继承，可以使用 `final` 关键字。当你重写某个属性或方法时，需要使用 `override` 关键字。


    除了继承，你还可以通过扩展（extensions）和协议（protocols）来扩展类的功能。协议在 Cocoa 框架中常被用来扩展类的功能。通过继承、扩展和协议，你可以扩展任何类的功能，从而轻松复用现有代码。


    # 15. 创建用户界面


    虽然可以创建完全不与用户交互的程序（例如控制交通灯的程序），但更常见的是创建显示某种用户界面的程序。通常，这意味着显示一个包含各种不同项目的窗口，例如用于显示文本的标签（label）、允许用户输入内容的文本字段（text
    field），以及让用户控制程序的按钮或下拉菜单（pull-down menu）。


    创建有效的用户界面完全取决于程序的目的。商业程序通常遵循带有下拉菜单和按钮的标准惯例，而视频游戏则可能创建自定义界面，看起来与标准的 macOS 程序完全不同。归根结底，用户界面需要满足用户的需求。如果在遵循标准的用户界面设计惯例和让用户界面更易于使用之间做选择，请始终以用户为中心。


    为了帮助你更好地理解用户界面设计，Apple 提供了一份名为《macOS 人机界面指南》（The macOS Human Interface Guidelines）的免费文档。该文档简要概述了如何让典型的
    macOS 用户界面高效工作，并特别强调了利用 macOS 最新特性。遵循这些指南，你的 macOS 程序将显得现代且与时俱进。如果未能利用 macOS 的最新特性，即使你的程序是全新的，也可能看起来过时。


    在前面的章节中，你使用 Xcode 设计了简单的用户界面。在本章中，你将更深入地了解 Xcode 中专注于帮助你设计用户界面的不同部分。


    请记住，用户界面不存在“完美”的设计。所谓“完美”的用户界面，是能让任务尽量简单、省力，以至于用户甚至没有意识到自己在与任何用户界面进行交互。用户界面充当了你与程序之间的中间人或翻译者。任何用户界面的目标都是让用户感觉他们正在直接与程序进行沟通和操作。


    ## 理解用户界面文件


    Cocoa 框架定义了用于创建各种用户界面项目的类，从按钮（`NSButton` 类）、文本字段（`NSTextField`）到滑块（`NSSlider`）或日期选择器（`NSDatePicker`）。理论上，完全可以使用
    Swift 代码来创建整个用户界面。但这样做可能很繁琐，因为除非实际运行程序，否则无法看到用户界面的样子。这就好比试图通过描述画笔需要精确放在画布的哪个位置，以及手移动的具体角度和方向来画一幅画，显得非常笨拙。


    Xcode 并没有强迫你编写 Swift 代码来定义用户界面，而是提供了一个名为 Interface Builder 的功能。Interface Builder
    的设计理念是，你可以通过将项目拖放到窗口中来设计用户界面。


    通过拖放项目来创建用户界面的优点是，你可以实时看到用户界面的样子，从而快速进行调整和修改。此外，通过将用户界面的设计与 Swift 代码分离，你现在可以在不影响
    Swift 代码的情况下更改用户界面，反之亦然。


    在过去，程序员必须通过编写代码来创建用户界面时，修改用户界面代码可能会影响程序运行的核心代码（反之亦然）。因此，修改程序的速度很慢，因为你需要不断测试以确保你的更改不会影响程序的其他部分。


    通过将用户界面与 Swift 代码隔离，Xcode 让你能够比以前更快地创建可靠的程序。现在，你可以替换一个用户界面并换上另一个，而不影响代码；或者修改代码而不影响用户界面。


    Xcode 为你提供了两种存储用户界面的选择：


    *   存储在 `.xib` 文件中

    *   存储在 `.storyboard` 文件中


    一个 `.xib` 文件（代表 Xcode Interface Builder）通常包含用户界面的单个窗口或视图。一个简单的程序可能只需一个 `.xib`
    文件来存储其用户界面，但更复杂的程序可能需要多个 `.xib` 文件来存储不同的窗口。


    一个 `.storyboard` 文件由一个或多个视图（view）和转场（segue，即视图之间的过渡）组成，其中视图通常代表屏幕上出现的窗口，而转场定义了从一个视图到下一个视图的过渡。


    实际上，你可以将 `.xib` 和 `.storyboard` 文件组合在同一个项目中，来创建程序的用户界面。由于 `.storyboard` 文件常用于创建
    iOS 应用，现在它也越来越多地被用于创建 macOS 用户界面。（第 16 章会进一步介绍故事板（storyboards）和转场（segues）。）


    用户界面的基本组件是视图（view），它在屏幕上显示信息。一个视图可以是一个完整的窗口，也可以只是一个能够显示信息的方框，例如表格、可滚动的文本列表或图片。无论你使用
    `.xib` 文件还是 `.storyboard` 文件，用户界面总是由一个或多个包含其他用户界面项目（如按钮和文本字段）的视图组成。

