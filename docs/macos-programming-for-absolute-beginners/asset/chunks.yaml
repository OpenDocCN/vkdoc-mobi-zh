    \  \n15.  Drag three menu items from the Object Library to the bottom of the pop-up\
    \ button list.  \n16.  Double-click each of these three new menu items and modify\
    \ the name so they displays Percent, Scientific, and Spell Out, as shown in Figure\
    \ [19-6](#A437923_1_En_19_Chapter.html#Fig6).\n\n![A437923_1_En_19_Fig6_HTML.jpg](A437923_1_En_19_Fig6_HTML.jpg)\n\
    \nFigure 19-6.\n\nThe modified pop-up button menu  \n17.  Choose View ➤ Assistant\
    \ Editor ➤ Show Assistant Editor. The `ViewController.swift` file appears next\
    \ to your user interface.  \n18.  Move the mouse pointer over the pop-up button,\
    \ hold down the Control key, and drag underneath the IBOutlet line.  \n19.  Release\
    \ the Control key and the mouse. A pop-up window appears.  \n20.  Click in the\
    \ Name text field, type popUpChoice , and click the Connect button. An IBOutlet\
    \ appears.  \n21.  Move the mouse pointer over the text field, hold down the Control\
    \ key, and drag the mouse under the IBOutlet line.  \n22.  Release the Control\
    \ key and the mouse. A pop-up window appears.  \n23.  Click in the Name text field,\
    \ type textBox, and click the Connect button.  \n24.  Move the mouse pointer over\
    \ the label, hold down the Control key, and drag the mouse under the IBOutlet\
    \ line.  \n25.  Release the Control key and the mouse. A pop-up window appears.\
    \  \n26.  Click in the Name text field, type labelResult , and click the Connect\
    \ button.  \n27.  Click the Show Document Outline icon to reveal the Document\
    \ Outline.  \n28.  Move the mouse pointer over Number Formatter, hold down the\
    \ Control key, and drag the mouse under the IBOutlet line.  \n29.  Release the\
    \ Control key and the mouse. A pop-up window appears.  \n30.  Click in the Name\
    \ text field, type numberFormat, and click the Connect button. You should have\
    \ four IBOutlet lines as follows:\n\n```\n    @IBOutlet weak var popUpChoice:\
    \ NSPopUpButton!\n    @IBOutlet weak var textBox: NSTextField!\n    @IBOutlet\
    \ weak var labelResult: NSTextField!\n    @IBOutlet weak var numberFormat: NumberFormatter!\n\
    \    ```\n\n31.  Click the Hide Document Outline icon to hide the document outline.\
    \  \n32.  Move the mouse pointer over the push button, hold down the Control key,\
    \ and drag the mouse above the last curly bracket in the bottom of the `ViewController.swift`\
    \ file.  \n33.  Release the Control key and the mouse button.A pop-up window appears.\
    \  \n34.  Click in the Connect pop-up menu and choose Action.  \n35.  Click in\
    \ the Name text field and type showResults.  \n36.  Click in the Type pop-up menu,\
    \ choose NSButton, and click the Connect button. Xcode creates an empty IBAction\
    \ method.  \n37.  Modify the IBAction method as follows:\n\n```\n    @IBAction\
    \ func showResults(_ sender: NSButton) {\n    if popUpChoice.titleOfSelectedItem!\
    \ == \"None\" {\n    numberFormat.numberStyle = NumberFormatter.Style.none\n \
    \   } else if popUpChoice.titleOfSelectedItem! == \"Decimal\" {\n    numberFormat.numberStyle\
    \ = NumberFormatter.Style.decimal\n    } else if popUpChoice.titleOfSelectedItem!\
    \ == \"Currency\" {\n    numberFormat.numberStyle = NumberFormatter.Style.currency\n\
    \    } else if popUpChoice.titleOfSelectedItem! == \"Percent\" {\n    numberFormat.numberStyle\
    \ = NumberFormatter.Style.percent\n    } else if popUpChoice.titleOfSelectedItem!\
    \ == \"Scientific\" {\n    numberFormat.numberStyle = NumberFormatter.Style.scientific\n\
    \    } else if popUpChoice.titleOfSelectedItem! == \"Spell Out\" {\n    numberFormat.numberStyle\
    \ = NumberFormatter.Style.spellOut\n    }\n    labelResult.stringValue = String(stringInterpolationSegment:\
    \    textBox.doubleValue)\n    }\n    ```\n\n38.  Choose Product ➤ Run. Your user\
    \ interface appears.  \n39.  Click the pop-up button, choose Decimal, type 2.3\
    \ into the text field, and then click the push button. The label displays 2.3\
    \ in the text field’s number formatter.  \n40.  Click the pop-up button, choose\
    \ Currency, type $4.56 into the text field, and then click the push button. The\
    \ label displays 4.56.  \n41.  Click the pop-up button, choose Percent, type 25%\
    \ into the text field, and then click the push button. The label displays 0.25.\
    \  \n42.  Click the pop-up button, choose Scientific, type 1.2E3 into the text\
    \ field, and then click the push button. The label displays 1200.0.  \n43.  Click\
    \ the pop-up button, choose Spell Out, type forty-five into the text field, and\
    \ then click the push button. The label displays 45.0.  \n44.  Choose NumberProgram\
    \ ➤ Quit NumberProgram.\n\nThe above Swift code in the IBAction method uses the\
    \ `titleOfSelectedItem` property to determine which option the user chose. Then\
    \ it uses multiple if-else if statements to change the number style property of\
    \ the number formatter.\n\nThe pop-up button lets you choose different number\
    \ formatting styles so you can see how they work when you type a formatted number\
    \ into the text field. By choosing different formatting styles, you can see how\
    \ the text field lets you type in differently formatted numbers such as 25% (which\
    \ gets converted into 0.25) or 1.2E3 (which gets converted into 1200.0)."
  trans: "\n1.  在 Xcode 中选择“文件”➤“新建”➤“项目”。\n2.  在 macOS 类别下点击“应用程序”。\n3.  点击“Cocoa\
    \ 应用程序”，然后点击“下一步”按钮。Xcode 现在会要求输入产品名称。\n4.  点击“产品名称”文本字段，输入 `NumberProgram`。\n\
    5.  确保“语言”弹出菜单显示为 Swift，并且“使用 Storyboard”复选框已被选中。\n6.  点击“下一步”按钮。Xcode 会询问你希望将项目存储在何处。\n\
    7.  选择一个文件夹来存储你的项目，然后点击“创建”按钮。\n8.  在项目导航器中点击 `Main.storyboard` 文件。你的程序用户界面将会出现。\n\
    9.  选择“视图”➤“工具”➤“显示对象库”。对象库会出现在 Xcode 窗口的右下角。\n10. 将一个弹出按钮、一个普通按钮以及一个带有数字格式化器的文本字段（它看起来像一个普通的文本字段）拖拽到用户界面窗口上，使其看起来像图\
    \ 19-4 所示。\n\n![A437923_1_En_19_Fig4_HTML.jpg](img/A437923_1_En_19_Fig4_HTML.jpg)\n\
    \n图 19-4. NumberProgram 的用户界面\n\n11. 双击弹出按钮。Xcode 会显示一个包含三个选项的列表，分别标记为“项目 1”、“项目\
    \ 2”和“项目 3”，如图 19-5 所示。\n\n![A437923_1_En_19_Fig5_HTML.jpg](img/A437923_1_En_19_Fig5_HTML.jpg)\n\
    \n图 19-5. 修改弹出按钮\n\n12. 双击“项目 1”，当 Xcode 高亮它时，输入 `None`。\n13. 双击“项目 2”，当 Xcode\
    \ 高亮它时，输入 `Decimal`。\n14. 双击“项目 3”，当 Xcode 高亮它时，输入 `Currency`。\n15. 从对象库中拖拽三个菜单项到弹出按钮列表的底部。\n\
    16. 分别双击这三个新菜单项，并修改其名称，使其显示为 `Percent`、`Scientific` 和 `Spell Out`，如图 19-6 所示。\n\
    \n![A437923_1_En_19_Fig6_HTML.jpg](img/A437923_1_En_19_Fig6_HTML.jpg)\n\n图 19-6.\
    \ 修改后的弹出按钮菜单\n\n17. 选择“视图”➤“助理编辑器”➤“显示助理编辑器”。`ViewController.swift` 文件会出现在用户界面的旁边。\n\
    18. 将鼠标指针移至弹出按钮上，按住 Control 键，然后将鼠标拖拽到 `IBOutlet` 行下方。\n19. 松开 Control 键和鼠标。会弹出一个窗口。\n\
    20. 在“名称”文本字段中点击，输入 `popUpChoice`，然后点击“连接”按钮。一个 IBOutlet 会出现。\n21. 将鼠标指针移至文本字段上，按住\
    \ Control 键，然后将鼠标拖拽到 `IBOutlet` 行下方。\n22. 松开 Control 键和鼠标。会弹出一个窗口。\n23. 在“名称”文本字段中点击，输入\
    \ `textBox`，然后点击“连接”按钮。\n24. 将鼠标指针移至标签上，按住 Control 键，然后将鼠标拖拽到 `IBOutlet` 行下方。\n\
    25. 松开 Control 键和鼠标。会弹出一个窗口。\n26. 在“名称”文本字段中点击，输入 `labelResult`，然后点击“连接”按钮。\n\
    27. 点击“显示文档大纲”图标以显示文档大纲。\n28. 将鼠标指针移至“数字格式化器”上，按住 Control 键，然后将鼠标拖拽到 `IBOutlet`\
    \ 行下方。\n29. 松开 Control 键和鼠标。会弹出一个窗口。\n30. 在“名称”文本字段中点击，输入 `numberFormat`，然后点击“连接”按钮。你应当会看到如下所示的四行\
    \ `IBOutlet`：\n\n```\n@IBOutlet weak var popUpChoice: NSPopUpButton!\n@IBOutlet\
    \ weak var textBox: NSTextField!\n@IBOutlet weak var labelResult: NSTextField!\n\
    @IBOutlet weak var numberFormat: NumberFormatter!\n```\n\n31. 点击“隐藏文档大纲”图标以隐藏文档大纲。\n\
    32. 将鼠标指针移至普通按钮上，按住 Control 键，然后将鼠标拖拽到 `ViewController.swift` 文件底部最后一个大括号的上方。\n\
    33. 松开 Control 键和鼠标按钮。会弹出一个窗口。\n34. 在“连接”弹出菜单中点击，选择“操作”。\n35. 在“名称”文本字段中点击，输入\
    \ `showResults`。\n36. 在“类型”弹出菜单中点击，选择 NSButton，然后点击“连接”按钮。Xcode 会创建一个空的 IBAction\
    \ 方法。\n37. 将 IBAction 方法修改如下：\n\n```\n@IBAction func showResults(_ sender: NSButton)\
    \ {\n    if popUpChoice.titleOfSelectedItem! == \"None\" {\n        numberFormat.numberStyle\
    \ = NumberFormatter.Style.none\n    } else if popUpChoice.titleOfSelectedItem!\
    \ == \"Decimal\" {\n        numberFormat.numberStyle = NumberFormatter.Style.decimal\n\
    \    } else if popUpChoice.titleOfSelectedItem! == \"Currency\" {\n        numberFormat.numberStyle\
    \ = NumberFormatter.Style.currency\n    } else if popUpChoice.titleOfSelectedItem!\
    \ == \"Percent\" {\n        numberFormat.numberStyle = NumberFormatter.Style.percent\n\
    \    } else if popUpChoice.titleOfSelectedItem! == \"Scientific\" {\n        numberFormat.numberStyle\
    \ = NumberFormatter.Style.scientific\n    } else if popUpChoice.titleOfSelectedItem!\
    \ == \"Spell Out\" {\n        numberFormat.numberStyle = NumberFormatter.Style.spellOut\n\
    \    }\n    labelResult.stringValue = String(stringInterpolationSegment: textBox.doubleValue)\n\
    }\n```\n\n38. 选择“产品”➤“运行”。你的用户界面将会出现。\n39. 点击弹出按钮，选择 `Decimal`，在文本字段中输入 `2.3`，然后点击普通按钮。标签会以文本字段的数字格式化器格式显示\
    \ `2.3`。\n40. 点击弹出按钮，选择 `Currency`，在文本字段中输入 `$4.56`，然后点击普通按钮。标签会显示 `4.56`。\n41.\
    \ 点击弹出按钮，选择 `Percent`，在文本字段中输入 `25%`，然后点击普通按钮。标签会显示 `0.25`。\n42. 点击弹出按钮，选择 `Scientific`，在文本字段中输入\
    \ `1.2E3`，然后点击普通按钮。标签会显示 `1200.0`。\n43. 点击弹出按钮，选择 `Spell Out`，在文本字段中输入 `forty-five`，然后点击普通按钮。标签会显示\
    \ `45.0`。\n44. 选择 `NumberProgram` ➤ 退出 `NumberProgram`。\n\n上述 IBAction 方法中的 Swift\
    \ 代码使用 `titleOfSelectedItem` 属性来判断用户选择了哪个选项。然后，它使用多个 `if-else if` 语句来更改数字格式化器的数字样式属性。\n\
    \n弹出按钮让你可以选择不同的数字格式样式，这样当你将格式化后的数字输入文本字段时，就能看到它们的工作效果。通过选择不同的格式样式，你可以看到文本字段如何允许你输入不同格式的数字，例如\
    \ `25%`（会被转换为 `0.25`）或 `1.2E3`（会被转换为 `1200.0`）。\n"
- fmt: "### Using a Secure Text Field, a Search Field, and a Token Field\n\nA secure\
    \ text field simply hides text behind bullets when the user types. This can be\
    \ handy for masking actual text such as passwords, credit card numbers, or other\
    \ sensitive information from view. Beyond masking anything typed in, a secure\
    \ text field works exactly like a regular text field where you can retrieve the\
    \ value typed using the `intValue`, `floatValue`, `doubleValue`, or `stringValue`\
    \ properties.\n\nA search text field looks like a typical search field you might\
    \ find in a browser that displays a magnifying glass icon and close icon that\
    \ can delete the text in the search field with one click. Each time the user types\
    \ something in the search field and presses Return, the search field stores the\
    \ text as a list stored in the `recentSearches` property.\n\nBy accessing this\
    \ `recentSearches` property, you can view a list of everything the user previously\
    \ typed in that search field.\n\nA token field lets you type text and then it\
    \ encloses that text inside a token. Despite the appearance of tokens, you can\
    \ still retrieve the text of a token field by accessing the `stringValue` property.\n\
    \nTo see how to use a secure text field, a search field and a token field, follow\
    \ these steps:\n\n1. From within Xcode choose File ➤ New ➤ Project.\n2. Click\
    \ Application under the macOS category.\n3. Click Cocoa Application and click\
    \ the Next button. Xcode now asks for a product name.\n4. Click in the Product\
    \ Name text field and type `TextProgram`.\n5. Make sure the Language pop-up menu\
    \ displays Swift and that the “Use Storyboards” check box is selected.\n6. Click\
    \ the Next button. Xcode asks where you want to store the project.\n7. Choose\
    \ a folder to store your project and click the Create button.\n8. Click the `Main.storyboard`\
    \ file in the Project Navigator pane.\n9. Click the `TextProgram` icon to make\
    \ the window of the user interface appear.\n10. Drag three push buttons, a search\
    \ field (on top), a token field (in the middle), a secure text field (at the bottom),\
    \ and three labels resized to expand their width on to the user interface, as\
    \ shown in Figure [19-7](#A437923_1_En_19_Chapter.html#Fig7).\n\n![A437923_1_En_19_Fig7_HTML.jpg](A437923_1_En_19_Fig7_HTML.jpg)\n\
    \nFigure 19-7. The user interface of the `TextProgram`\n\n11. Choose View ➤ Assistant\
    \ Editor ➤ Show Assistant Editor. Xcode displays the `ViewController.swift` file\
    \ next to the user interface.\n12. Move the mouse pointer over the search field,\
    \ hold down the Control key, and drag the mouse under the `IBOutlet` line in the\
    \ `ViewController.swift` file.\n13. Release the Control key and the mouse button.\
    \ A pop-up window appears.\n14. Click in the Name text field, type `searchBox`,\
    \ and click the Connect button.\n15. Move the mouse pointer over the label to\
    \ the right of the search field, hold down the Control key, and drag the mouse\
    \ under the `IBOutlet` line.\n16. Release the Control key and the mouse button.\
    \ A pop-up window appears.\n17. Click in the Name text field, type `historyBox`,\
    \ and click the Connect button. You should have two IBOutlets like this:\n\n \
    \   ```\n    @IBOutlet weak var searchBox: NSSearchField!\n    @IBOutlet weak\
    \ var historyBox: NSTextField!\n    ```\n\n18. Move the mouse pointer over the\
    \ Token field, hold down the Control key, and drag the mouse under the `IBOutlet`\
    \ line in the `ViewController.swift` file.\n19. Release the Control key and the\
    \ mouse button. A pop-up window appears.\n20. Click in the Name text field, type\
    \ `tokenBox`, and click the Connect button.\n21. Move the mouse pointer over the\
    \ label to the right of the search field, hold down the Control key, and drag\
    \ the mouse under the `IBOutlet` line.\n22. Release the Control key and the mouse\
    \ button. A pop-up window appears.\n23. Click in the Name text field, type `tokenResult`,\
    \ and click the Connect button. You should have two more IBOutlets like this:\n\
    \n    ```\n    @IBOutlet weak var tokenBox: NSTokenField!\n    @IBOutlet weak\
    \ var tokenResult: NSTextField!\n    ```\n\n24. Move the mouse pointer over the\
    \ secure text field, hold down the Control key, and drag the mouse under the `IBOutlet`\
    \ line in the `ViewController.swift` file.\n25. Release the Control key and the\
    \ mouse button. A pop-up window appears.\n26. Click in the Name text field, type\
    \ `secureBox`, and click the Connect button.\n27. Move the mouse pointer over\
    \ the label to the right of the search field, hold down the Control key, and drag\
    \ the mouse under the `IBOutlet` line.\n28. Release the Control key and the mouse\
    \ button. A pop-up window appears.\n29. Click in the Name text field, type `secureResults`,\
    \ and click the Connect button. You should have two more IBOutlets like this:\n\
    \n    ```\n    @IBOutlet weak var secureBox: NSSecureTextField!\n    @IBOutlet\
    \ weak var secureResults: NSTextField!\n    ```\n\n30. Move the mouse pointer\
    \ over the push button under the search field, hold down the Control key, and\
    \ drag the mouse over the last curly bracket in the bottom of the `ViewController.swift`\
    \ file.\n31. Release the Control key and the mouse. A pop-up window appears.\n\
    32. Click in the Connect pop-up menu and choose Action.\n33. Click in the Name\
    \ text field and type `showHistory`.\n34. Click in the Type pop-up menu and choose\
    \ `NSButton`. Then click the Connect button. Xcode creates an `IBAction` method.\n\
    35. Move the mouse pointer over the push button under the token field, hold down\
    \ the Control key, and drag the mouse over the last curly bracket in the bottom\
    \ of the `ViewController.swift` file.\n36. Release the Control key and the mouse.\
    \ A pop-up window appears.\n37. Click in the Connect pop-up menu and choose Action.\n\
    38. Click in the Name text field and type `showToken`.\n39. Click in the Type\
    \ pop-up menu and choose `NSButton`. Then click the Connect button. Xcode creates\
    \ an `IBAction` method.\n40. Move the mouse pointer over the push button under\
    \ the secure text field, hold down the Control key, and drag the mouse over the\
    \ last curly bracket in the bottom of the `ViewController.swift` file.\n41. Release\
    \ the Control key and the mouse. A pop-up window appears.\n42. Click in the Connect\
    \ pop-up menu and choose Action.\n43. Click in the Name text field and type `showSecret`.\n\
    44. Click in the Type pop-up menu and choose `NSButton`. Then click the Connect\
    \ button. Xcode creates an `IBAction` method.\n45. Modify these `IBAction` methods\
    \ as follows:\n\n    ```\n    @IBAction func showHistory(_ sender: NSButton) {\n\
    \        historyBox.stringValue = String(stringInterpolationSegment: searchBox.recentSearches)\n\
    \    }\n    @IBAction func showToken(_ sender: NSButton) {\n        tokenResult.stringValue\
    \ = tokenBox.stringValue\n    }\n    @IBAction func showSecret(_ sender: NSButton)\
    \ {\n        secureResults.stringValue = secureBox.stringValue\n    }\n    ```\n\
    \n46. Choose Product ➤ Run. Your user interface appears.\n47. Click in the search\
    \ field, type `Yahoo`, and press Return.\n48. Click the close icon (the X in the\
    \ gray circle) to clear the search field, type `Google`, and press Return.\n49.\
    \ Click the push button underneath the search field. Notice that the label to\
    \ the right displays the two search results.\n50. Click in the Token field, type\
    \ `Yahoo`, and press Return. Notice that the token field displays your typed text\
    \ as a token.\n51. Click in the Token field and next to the `Yahoo` token, type\
    \ `Google` and press Return.\n52. Click the push button underneath the Token field.\
    \ Notice that the label to the right displays your two text tokens.\n53. Click\
    \ in the secure text field and type `password`. Notice that the secure text field\
    \ masks the text.\n54. Click the push button underneath the secure text field.\
    \ Notice the label to the right displays the text from the secure text field,\
    \ as shown in Figure [19-8](#A437923_1_En_19_Chapter.html#Fig8).\n\n![A437923_1_En_19_Fig8_HTML.jpg](A437923_1_En_19_Fig8_HTML.jpg)\n\
    \nFigure 19-8. The results of the `TextProgram`\n\n55. Choose TextProgram ➤ Quit\
    \ `TextProgram`."
