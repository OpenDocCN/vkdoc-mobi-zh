    This code checks if the `fish` optional variable is not equal to (!=) nil. If\
    \ an optional variable is not nil, then it must hold a value, so it’s safe to\
    \ retrieve it.\n\nA second way to check if an optional variable has a value or\
    \ not is to assign it to a constant, like this:\n\n```\nif let food = fish {\n\
    print (\"The optional variable has a value\")\nprint (food)\n}\n```\n\nIf the\
    \ optional variable has a value, it stores that value in the constant. Now you\
    \ can access that value through the constant. To see how this works, follow these\
    \ steps:\n\n1.  Make sure your IntroductoryPlayground file is loaded in Xcode.\
    \  \n2.  Modify the code as follows:\n\n```\n    import Cocoa\n    var fish :\
    \ String?\n    fish = \"goldfish\"\n    if fish != nil {\n    print (\"The optional\
    \ variable is not nil\")\n    var str : String\n    str = fish!\n    print (str)\n\
    \    }\n    if let food = fish {\n    print (\"The optional variable has a value\"\
    )\n    print (food)\n    }\n    ```\n\nNotice that you can retrieve the value\
    \ in an optional variable by unwrapping it with an exclamation mark or storing\
    \ it in a constant and then using that constant, as shown in Figure [5-14](#A437923_1_En_5_Chapter.html#Fig14).\n\
    \n![A437923_1_En_5_Fig14_HTML.jpg](A437923_1_En_5_Fig14_HTML.jpg)\n\nFigure 5-14.\n\
    \nTwo ways to access a value stored in an optional variable"
  trans: "\n# 使用可选变量\n\n声明变量时最大的缺陷在于，在向变量中存入数据之前，你无法使用该变量。如果在变量存储任何数据之前就试图使用它，程序将会运行失败并崩溃。为避免此问题，许多程序员会先在变量中存储“占位”数据。不幸的是，这种“占位”数据仍可能被程序使用并导致错误。\n\
    \n为解决此问题，Swift 提供了一种称为“可选变量”的机制。可选变量既可以存储数据，也可以什么也不存储。如果可选变量中不包含任何内容，则被视为持有名为\
    \ `nil` 的值。通过使用可选变量，即使变量不包含数据，你也能避免程序崩溃。\n\n要创建可选变量，只需在声明变量及其数据类型时加上问号，如下所示：\n\
    \n```\nvar fish : String?\n```\n\n问号将变量标识为可选类型。你可以像使用普通变量一样使用可选变量来存储数据，例如：\n\n\
    ```\nfish = \"goldfish\"\n```\n\n虽然向可选变量存储数据与向普通变量存储数据并无不同，但从可选变量中取回数据则需要额外的步骤。首先，你必须检查可选变量中是否包含数据。一旦确认可选变量包含数据，你就需要用感叹号来解包该可选变量以获取实际数据，例如：\n\
    \n```\nprint (fish!)\n```\n\n要了解可选变量如何工作，请尝试以下操作：\n\n1.  确保你的 `IntroductoryPlayground`\
    \ 文件已在 Xcode 中加载。\n2.  按如下方式修改代码：\n\n```\n    import Cocoa\n    var fish : String?\n\
    \    fish = \"goldfish\"\n    print (fish)\n    print (fish!)\n```\n\n请注意，`fish`\
    \ 本身实际上是一个可选变量，但当你使用感叹号解包它时，就能访问到可选变量内部的实际数据，如图 5-13 所示。\n\n![A437923_1_En_5_Fig13_HTML.jpg](img/A437923_1_En_5_Fig13_HTML.jpg)\n\
    \n图 5-13. 查看可选变量与其内部解包后数据的区别\n\n3.  在下方再输入两行代码：\n\n```\n    var str : String\n\
    \    str = fish\n```\n\n请注意，你不能将可选变量 `fish` 赋值给 `str`，因为 `str` 只能持有 `String` 数据类型。相反，你必须解包可选变量\
    \ `fish`，并使用感叹号取出其实际的字符串内容，如下所示：\n\n```\nvar str : String\nstr = fish!\n```\n\n\
    在解包可选变量以获取其数据之前，务必先检查该可选变量包含的是 `nil` 值还是实际变量。如果你在可选变量包含 `nil` 值时尝试使用它，程序可能会崩溃。\n\
    \n要检查可选变量是否持有 `nil` 值，你有两种选择。首先，你可以显式检查 `nil` 值，如下所示：\n\n```\nif fish != nil {\n\
    print (\"该可选变量不是 nil\")\n}\n```\n\n这段代码检查 `fish` 可选变量是否不等于（`!=`）`nil`。如果可选变量不是\
    \ `nil`，那么它一定持有某个值，因此可以安全地取出。\n\n检查可选变量是否有值的第二种方法是将其赋值给一个常量，如下所示：\n\n```\nif let\
    \ food = fish {\nprint (\"该可选变量有值\")\nprint (food)\n}\n```\n\n如果可选变量有值，它会将该值存储在常量中。现在你就通过该常量来访问这个值了。要观察其工作原理，请按以下步骤操作：\n\
    \n1.  确保你的 `IntroductoryPlayground` 文件已在 Xcode 中加载。\n2.  按如下方式修改代码：\n\n```\n \
    \   import Cocoa\n    var fish : String?\n    fish = \"goldfish\"\n    if fish\
    \ != nil {\n    print (\"该可选变量不是 nil\")\n    var str : String\n    str = fish!\n\
    \    print (str)\n    }\n    if let food = fish {\n    print (\"该可选变量有值\")\n \
    \   print (food)\n    }\n```\n\n请注意，你可以通过使用感叹号解包可选变量，或将其存储在常量中再使用该常量，这两种方式来取出可选变量中的值，如图\
    \ 5-14 所示。\n\n![A437923_1_En_5_Fig14_HTML.jpg](img/A437923_1_En_5_Fig14_HTML.jpg)\n\
    \n图 5-14. 访问可选变量中存储的值的两种方式\n"
- fmt: "# Linking Swift Code to a User Interface\n\nEvery program needs to store data,\
    \ and one of the most common ways to store data in a variable is to retrieve data\
    \ from a user interface. To link a user interface item to Swift code, you need\
    \ to create an `IBOutlet` variable.\n\nIf you have a text field connected to an\
    \ `IBOutlet` variable, anything the user types in the text field automatically\
    \ gets stored in the `IBOutlet` variable. Likewise, anything you store in the\
    \ `IBOutlet` variable suddenly appears in the text field. `IBOutlet` variables\
    \ act like a link between your Swift code and your user interface, as shown in\
    \ Figure [5-15](#A437923_1_En_5_Chapter.html#Fig15).\n\n![A437923_1_En_5_Fig15_HTML.jpg](A437923_1_En_5_Fig15_HTML.jpg)\n\
    \nFigure 5-15. `IBOutlet` variables link your user interface items with Swift\
    \ code\n\nSince user interface items like text fields may initially be empty,\
    \ `IBOutlet` variables are defined as implicitly unwrapped optional variables\
    \ defined by an exclamation mark, like this:\n\n```\n@IBOutlet weak var labelText:\
    \ NSTextField!\n```\n\nIf an `IBOutlet` is a regular variable and is connected\
    \ to an empty text field, your program will risk crashing without any data in\
    \ the `IBOutlet` variable.\n\nIf an `IBOutlet` is an optional variable, you can\
    \ define it with a question mark, like this:\n\n```\n@IBOutlet weak var labelText:\
    \ NSTextField?\n```\n\nUnfortunately, every time you want to access the data stored\
    \ in this optional variable, you must type an exclamation mark. If you access\
    \ this `IBOutlet` variable multiple times, each time you must type an exclamation\
    \ mark, which can get annoying and will make your code harder to read.\n\nTo let\
    \ you access an `IBOutlet` variable without typing exclamation marks all the time,\
    \ it’s easier to create an `IBOutlet` variable as an implicitly unwrapped optional\
    \ variable, which means that if it holds a value, you can access it without typing\
    \ the unwrapping exclamation mark.\n\nTo see how Xcode creates `IBOutlet`s as\
    \ implicitly unwrapped optional variables, open the `MyFirstProgram` project that\
    \ you created earlier.\n\n1.  Make sure your `MyFirstProgram` is loaded in Xcode.\n\
    2.  Click the `AppDelegate.swift` file in the Project Navigator. Xcode’s middle\
    \ pane displays the contents of that `.swift` file. Notice that all the `IBOutlet`\
    \ variables are declared with an exclamation mark, meaning they’re implicitly\
    \ unwrapped optional variables:\n\n```\n    @IBOutlet weak var labelText: NSTextField!\n\
    \    @IBOutlet weak var messageText: NSTextField!\n```\n\nAlso notice that the\
    \ `IBAction changeCase` method lets you access the contents of these implicitly\
    \ unwrapped optional variables without using an exclamation mark.\n\n```\n   \
    \ @IBOutlet weak var labelText: NSTextField!\n    @IBOutlet weak var messageText:\
    \ NSTextField!\n    @IBAction func changeCase(_ sender: NSButton) {\n    labelText.stringValue\
    \ = messageText.stringValue.uppercased()\n    let warning = labelText.stringValue\n\
    \    }\n```\n\n3.  Replace the exclamation marks at the end of each `IBOutlet`\
    \ variable with a question mark, like this:\n\n```\n    @IBOutlet weak var labelText:\
    \ NSTextField?\n    @IBOutlet weak var messageText: NSTextField?\n```\n\nNotice\
    \ that Xcode now displays error messages each time you use an `IBOutlet` variable.\
    \ That’s because you need to unwrap each optional variable with an exclamation\
    \ mark, like this:\n\n```\n@IBAction func changeCase(_ sender: NSButton) {\nlabelText!.stringValue\
    \ = messageText!.stringValue.uppercased()\nlet warning = labelText!.stringValue\n\
    }\n```\n\nIf you define your `IBOutlet`s as regular optional variables (defined\
    \ by a question mark), then you must unwrap each optional variable with an exclamation\
    \ mark to access its value.\n\nIf you simply define your `IBOutlet`s as implicitly\
    \ unwrapped optional variables (which Xcode does for you), then you don’t need\
    \ to type an exclamation mark to unwrap the optional variables.\n\nBasically,\
    \ let Xcode create your `IBOutlet`s as implicitly unwrapped variables (with an\
    \ exclamation mark) to make typing Swift code easier.\n\nSo when should you use\
    \ an optional variable (defined by `?`) and when should you use an implicitly\
    \ unwrapped optional variable (defined by `!`)?\n\nIn general, use implicitly\
    \ unwrapped optional variables for `IBOutlet`s to make it easy to write Swift\
    \ code without typing exclamation marks all over. If you use implicitly unwrapped\
    \ optional variables any other time, your variable could contain a `nil` value\
    \ and Xcode won’t catch any potential errors if you try to use it.\n\nTo see the\
    \ danger of using implicitly unwrapped optional variables, follow these steps:\n\
    \n1.  Make sure your `IntroductoryPlayground` file is loaded in Xcode.\n2.  Modify\
    \ the code as follows:\n\n```\n    import Cocoa\n    var safe : Int?  // optional\
    \ variable\n    var danger : Int!// implicitly unwrapped optional variable\n \
    \   print (danger * 2)\n    print (safe * 2)\n```\n\nNotice that neither integer\
    \ variable has a value in it, but Xcode cheerfully lets you perform a calculation\
    \ with a `nil` value in an implicitly unwrapped optional but flags a possible\
    \ error with a regular optional variable, as shown in Figure [5-16](#A437923_1_En_5_Chapter.html#Fig16).\n\
    \n![A437923_1_En_5_Fig16_HTML.jpg](A437923_1_En_5_Fig16_HTML.jpg)\n\nFigure 5-16.\
    \ Xcode can identify possible problems with undefined optional variables but not\
    \ undefined implicitly unwrapped optional variables\n\nBy making you unwrap optional\
    \ variables with an exclamation mark (`!`), Xcode forces you to acknowledge you’re\
    \ using an optional variable so you can remember to check if it has a `nil` value\
    \ or not.\n\nSince implicitly unwrapped optional variables let you type the variable\
    \ name without typing additional symbols, it’s much easier to forget you’re working\
    \ with optional variables and check for a possible `nil` value before trying to\
    \ use it. Optional variables can’t prevent problems, but they can force you to\
    \ remember you’re working with potentially `nil` values.\n\n## Summary\n\nIf you’re\
    \ coming from another programming environment, you’ve already seen numerous ways\
    \ that Swift differs from other languages. Swift’s playground interpreter lets\
    \ you test your code in a safe environment before copying and pasting it into\
    \ an actual program. Playgrounds give you the freedom to experiment freely with\
    \ Swift commands.\n\nThe three most common data types are integers (`Int`), decimal\
    \ numbers (`Float` or `Double`), and text strings (`String`). To avoid mixing\
    \ data types when storing decimal numbers, use `Double` data types unless you\
    \ have a specific reason to use a `Float` data type instead.\n\nTo make variable\
    \ names more flexible, you can use Unicode characters that can represent symbols\
    \ or foreign language characters.\n\nStoring data in a variable can be as simple\
    \ as assigning it to a value. Swift also offers computed properties that let you\
    \ modify a variable or another variable when assigned a new value. Computed properties\
    \ are far more useful when working with classes and object-oriented programming.\n\
    \nEven more important are optional variables that let you handle `nil` values\
    \ without crashing your program. Optional variables are especially important when\
    \ using `IBOutlet`s to connect Swift code to user interface items such as labels\
    \ and text fields.\n\nWhen you create an optional variable (with a question mark),\
    \ you need to unwrap it to access its actual data (using an exclamation mark).\n\
    \nVariables are crucial for storing data temporarily so you’ll use them often.\
    \ When you start learning about classes and object-oriented programming, you’ll\
    \ use variables for defining properties. Essentially, any time you need to store\
    \ one chunk of data, you’ll declare a variable to hold it."
