    \ types such as `String`, `Int`, and `Double`. A protocol extension for extending\
    \ data types looks like this:\n\n```\nextension dataType {\n// New property {\n\
    // return computed value\n}\n}\n```\n\nWhen you extend a common data type with\
    \ a protocol, you must create a variable that represents the data type followed\
    \ by a period and the property name. So if you created an extension for the `Int`\
    \ data type like:\n\n```\nextension Int {\nvar name : String {\nreturn text\n\
    }\n}\n```\n\nyou could store a string value like:\n\n```\nvar status = 25.name\
    \   // represents a String\n```\n\nTo see how to use protocol extensions to extend\
    \ common data types, follow these steps:\n\n1.  Make sure the `ProtocolPlayground`\
    \ file is loaded in Xcode.  \n2.  Edit the playground code as follows:  \n\n```\n\
