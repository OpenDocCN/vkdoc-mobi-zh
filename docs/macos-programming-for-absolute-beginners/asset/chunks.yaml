- fmt: "# Working with Optional Chaining\n\nWhen dealing with optionals, you typically\
    \ declare an optional variable with a question mark, such as `Int?`, `String?`,\
    \ `Float?`, and `Double?`. Besides using common data types, you can declare any\
    \ type as an optional variable, including classes.\n\nTo declare an ordinary data\
    \ type as an optional variable, you just add a question mark to the data type\
    \ name, like this:\n\n```\nvar myNumber : String?\n```\n\nNormally, properties\
    \ in a class hold a common data type like `String`, `Int`, or `Double`. However,\
    \ a class property can also hold another class. If you can declare a class as\
    \ a type, you can also declare a class as an optional variable too, like this:\n\
    \n```\nclass Dreamer {\nvar candidate: Politician?\n}\nclass Politician {\nvar\
    \ name = \"\"\n}\n```\n\nNow if you create an object based on the `Dreamer` class,\
    \ you'll wind up with a `candidate` property that holds an optional variable:\n\
    \n```\nlet person = Dreamer()\n```\n\nThe `person` object is based on the `Dreamer`\
    \ class, which means it also holds a property called `candidate`. However, the\
    \ `candidate` property is also an optional variable object based on the `Politician`\
    \ class. At this point, the `candidate` property has an initial value of `nil`.\n\
    \nTo see how an object can have another object as an optional variable, follow\
    \ these steps:\n\n1. Make sure the `DefensePlayground` is loaded into Xcode.\n\
    2. Edit the playground code as follows:\n\n```\n    import Cocoa\n    class Dreamer\
    \ {\n    var candidate: Politician?\n    }\n    class Politician {\n    var name\
    \ : String = \"\"\n    }\n    let person = Dreamer()\n    if let check = person.candidate?.name\
    \ {\n    print (\"Name = \\(check)\")\n    }\n    else {\n    print (\"Nil value\
    \ here\")\n    }\n```\n\nThis code fails to create an object from the `Politician`\
    \ class, so the `candidate` property is `nil`. Because you declared the `candidate`\
    \ property as an optional variable, you can use what's called optional chaining\
    \ to access its `name` property in the `if-else` statement, as shown in Figure\
    \ 25-3.\n\n![A437923_1_En_25_Fig3_HTML.jpg](A437923_1_En_25_Fig3_HTML.jpg)\n\n\
    Figure 25-3. Optional chaining can access an optional variable property of a class\n\
    \nTo store a value in the `candidate` property, you need to create another object,\
    \ like this:\n\n```\nperson.candidate = Politician()\n```\n\nThen you need to\
    \ store data in the `Politician` class's `name` property. To do this, you need\
    \ to unwrap the optional variable (the `Politician` class) to access its `name`\
    \ property like this:\n\n```\nperson.candidate!.name = \"Sally\"\n```\n\nRemember,\
    \ unwrapping optionals with the exclamation mark should only be done when you're\
    \ absolutely sure the optional variable contains a value. In this case, you're\
    \ assigning a value (`\"Sally\"`) to the optional variable so it's safe to unwrap\
    \ the optional variable.\n\nLet's see how to modify your previous code to store\
    \ a value in an optional variable property:\n\n1. Make sure the `DefensePlayground`\
    \ is loaded into Xcode.\n2. Edit the playground code as follows:\n\n```\n    import\
    \ Cocoa\n    class Dreamer {\n    var candidate: Politician?\n    }\n    class\
    \ Politician {\n    var name : String = \"\"\n    }\n    let person = Dreamer()\n\
    \    if let check = person.candidate?.name {\n    print (\"Name = \\(check)\"\
    )\n    }\n    else {\n    print (\"Nil value here\")\n    }\n    person.candidate\
    \ = Politician ()\n    person.candidate!.name = \"Sally\"\n    if let check =\
    \ person.candidate?.name {\n    print (\"Name = \\(check)\")\n    }\n    else\
    \ {\n    print (\"Nil value here\")\n    }\n```\n\nNotice that the `candidate`\
    \ optional variable (`Politician`) is undefined or `nil` until you specifically\
    \ store a value in it. As soon as you store a string (`\"Sally\"`) into the `name`\
    \ property, it no longer holds a `nil` value, as shown in Figure 25-4.\n\n![A437923_1_En_25_Fig4_HTML.jpg](A437923_1_En_25_Fig4_HTML.jpg)\n\
    \nFigure 25-4. You need to unwrap an optional variable to store a value in it\n\
    \nThe key when working with optional variables is to make sure you use the question\
    \ mark and exclamation mark symbols correctly. Fortunately, if you omit either\
    \ symbol, Xcode can often prompt you to choose the right symbol, as shown in Figure\
    \ 25-5.\n\n![A437923_1_En_25_Fig5_HTML.jpg](A437923_1_En_25_Fig5_HTML.jpg)\n\n\
    Figure 25-5. Xcode's editor can prompt you when to use the `?` or `!` symbols\
    \ when working with optional variables\n\nThe question mark symbol is used to\
    \ create optional variables or safely access optional variables. The exclamation\
    \ mark symbol is used to unwrap optional variables, so make sure those unwrapped\
    \ optional variables hold a non-nil value.\n\nIn general, any time you see a question\
    \ mark used with optional variables, your code is likely safe when dealing with\
    \ `nil` values. However, any time you see an exclamation mark with optional variables,\
    \ make sure the optional variable holds a value because if it holds a `nil` value,\
    \ your code may be unsafe and could crash.\n\n# Error Handling\n\nSince you can't\
    \ expect to write bug-free code every time, Swift offers a feature called error\
    \ handling. The idea behind error handling is to identify and catch likely errors\
    \ so your program handles them gracefully rather than letting the program crash\
    \ or act unpredictably. To handle errors, you need to go through several steps:\n\
    \n* Define descriptive errors that you want to identify\n* Identify one or more\
    \ functions to detect an error and identify the type of error that occurred\n\
    * Handle the error\n\n## Defining Errors with Enumerations\n\nIn the old days,\
    \ programs often displayed cryptic error messages filled with hexadecimal numbers\
    \ and odd symbols. Those types of error messages are generally useless for identifying\
    \ the problem that may have occurred. That's why the first step in handling errors\
    \ is to create a list of descriptive error types.\n\nThe names you give different\
    \ errors is completely arbitrary, but you should give meaningful names to different\
    \ types of error messages. To create a list of descriptive error types, you need\
    \ to create an `enum` that uses the `ErrorType` protocol, like this:\n\n```\n\
    enum enumName : Error {\ncase descriptiveError1\ncase descriptiveError2\ncase\
    \ descriptiveError3\n}\n```\n\nReplace `enumName` with a descriptive name that\
    \ identifies the type of error you want to identify. Then type a descriptive error\
    \ name as one word (without spaces) using the `case` keyword. Your list of possible\
    \ errors can range from one to as many errors as you wish to describe, so you're\
    \ not limited to a fixed number. If you want to create an `enum` that lists three\
    \ error types, you can use code like this:\n\n```\nenum ageError : Error {\ncase\
    \ negativeAge // Negative numbers\ncase unrealAge   // Numbers > 140\ncase underAge\
    \    // Under 21\n}\n```"
