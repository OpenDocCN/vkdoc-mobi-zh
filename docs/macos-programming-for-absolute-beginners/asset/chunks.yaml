    \nFigure 24-2.\n\nMethod implementations can be different despite adopting the\
    \ same protocol\n\n### Adopting Multiple Protocols\n\nOne huge advantage protocols\
    \ have over object-oriented programming is that a single class, structure, or\
    \ enum can adopt two or more protocols. To do this, you just need to specify the\
    \ name of each protocol to adopt, like so:\n\n```\nstruct structureName : protocolName1,\
