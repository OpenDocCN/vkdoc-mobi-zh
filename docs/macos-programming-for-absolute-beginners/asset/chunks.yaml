    \ = tempC + 32 //* 9/5\n    print (tempF)\n    return tempF\n    }\n    ```\n\n\
    5.  Choose Product ➤ Run. The blank user interface of your program appears.  \n\
    6.  Choose DebugProgram ➤ Quit DebugProgram. Xcode appears again, displaying the\
    \ result in the Debug Area, which prints Temperature in Celsius: 100.0 132.0 Temperature\
    \ in Fahrenheit: 132.0 By commenting out the calculation part of the code and\
    \ using the `print (tempF)` command, you can see that the `C2F` function is storing\
    \ 100.0 correctly in the `tempC` variable and adding 32 to this value before storing\
    \ it in the `tempF` variable. Because you commented out the calculation part of\
    \ the code, you can assume that the error must be in your commented-out portion\
    \ of the code. Although the formula might look correct, the error occurs because\
    \ of the way Swift (and most programming languages) calculate formulas. First,\
    \ they start from left to right. Second, they calculate certain operations such\
    \ as multiplication before addition. The error occurs because your conversion\
    \ formula first multiples 32 by 9 (288), and then divides the result (288) by\
    \ 5 to get 57.6\\. Finally, it adds 57.6 to 100.0 to get the incorrect result\
    \ of 157.6\\. What it should really be doing is multiplying 9/5 by the temperature\
    \ in Celsius and then adding 32 to the result.  \n7.  Modify the `C2F` function\
    \ as follows:\n\n```\n    func C2F (tempC : Double) -> Double {\n    var tempF\
    \ : Double\n    tempF = tempC * (9/5) + 32\n    print (tempF)\n    return tempF\n\
    \    }\n    ```"
  trans: "\n# 简易调试技巧\n\n当程序无法正常运行时，你常常对问题所在毫无头绪。虽然可以耐着性子从头到尾检查代码，但通常更快的做法是直接猜测错误可能出在哪里。\n\
    \n一旦大致确定了程序中可能出问题的部分，你有两个选择。第一，删除可疑代码并重新运行程序。如果问题神奇地消失了，那就说明删除的代码很可能就是罪魁祸首。\n\n\
    然而，如果程序依然无法运行，你就得把删除的代码重新输入回去。一个更简便的方法是把代码从 Xcode 中剪切粘贴并存储到文本编辑器（比如每台 Mac 都自带的\
    \ TextEdit 程序）中，但这也可能很繁琐。\n\n因此，第二个解决方案是暂时隐藏你怀疑可能引发问题的代码。这样，如果问题依然存在，你只需取消隐藏，让代码重新可见即可。在\
    \ Xcode 中实现这一操作，只需将你的代码变成注释即可。\n\n记住，注释是 Xcode 完全忽略的文本。你可以通过三种方式创建注释：\n\n- 在要转换为注释的每一行开头添加\
    \ `//` 符号。这种方法允许你将单行代码转换为注释。\n- 在要转换为注释的代码开头添加 `/*` 符号，在代码结尾添加 `*/` 符号。这种方法允许你将一行或多行代码转换为注释。\n\
    - 选中要转换为注释的代码行，然后选择 Editor ➤ Structure ➤ Comment Selection（或按 Command + `/`）。这种方法会在你选中的每一行代码开头添加\
    \ `//` 符号，从而将一行或多行代码转换为注释。\n\n**注意**：Xcode 会用绿色（或你自定义的用于识别注释的颜色）为注释着色。创建注释后，请确保\
    \ Xcode 正确着色，以确认你已经成功创建了注释。如果 Xcode 未能识别你的注释，它会将你的文本视为有效的 Swift 命令，这很可能导致程序无法正常运行。\n\
    \n通过将代码转换为注释，你实际上是将那段代码对 Xcode 隐藏了。现在，如果你想将注释恢复为代码，只需移除定义注释代码的 `//` 或 `/*` 和 `*/`\
    \ 符号即可。\n\n如果你是通过选择 Editor ➤ Structure ➤ Comment Selection（或按 Command + `/`）来注释代码的，那么只需再选择\
    \ Editor ➤ Structure ➤ Uncomment Selection（或再次按 Command + `/`），即可将注释的代码恢复为可工作的代码。\n\
    \n除了将代码变为注释来临时隐藏之外，第二种简单的调试技巧是使用 `print` 命令。其理念是在代码中插入 `print` 命令，以打印出变量的值。\n\n\
    通过这种方式，你可以查看一个或多个变量可能包含的值。在程序中放置多个 `print` 命令，可以让你有机会确保程序运行正确。\n\n要了解如何使用 `print`\
    \ 命令结合代码注释来调试程序，请按以下步骤操作：\n\n1. 在 Xcode 中选择 File ➤ New ➤ Project。\n2. 在 macOS\
    \ 类别下点击 Application。\n3. 点击 Cocoa Application，然后点击 Next 按钮。Xcode 会要求输入产品名称。\n\
    4. 点击 Product Name 文本字段，输入 `DebugProgram`。\n5. 确保 Language 弹出菜单显示为 Swift，并且 \"\
    Use Storyboards\" 复选框已选中。\n6. 点击 Next 按钮。Xcode 会询问你希望将项目存储在哪里。\n7. 选择一个文件夹来存储项目，然后点击\
    \ Create 按钮。\n8. 在项目导航器中点击 `AppDelegate.swift` 文件。`AppDelegate.swift` 文件的内容会显示出来。\n\
    9. 将 `applicationDidFinishLaunching` 方法编辑如下：\n\n```\nfunc applicationDidFinishLaunching(_\
    \ aNotification: Notification) {\n    var myMessage = \"Temperature in Celsius:\"\
    \n    let temp = 100.0\n    print (myMessage + \"\\(temp)\")\n    myMessage =\
    \ \"Temperature in Fahrenheit:\"\n    print (myMessage + \"\\(C2F(tempC: temp))\"\
    )\n}\n```\n\n10. 直接在这个函数上方添加以下代码：\n\n```\nfunc C2F (tempC : Double) -> Double\
    \ {\n    var tempF : Double\n    tempF = tempC + 32 * 9/5\n    return tempF\n\
    }\n```\n\n11. 选择 Product ➤ Run。你的程序用户界面会出现（显示为空白）。\n12. 选择 DebugProgram ➤ Quit\
    \ DebugProgram。Xcode 界面再次出现。如果你查看 Xcode 窗口底部调试区域，可以看到两个 `print` 命令打印的内容，即 \"Temperature\
    \ in Celsius: 100.0\" 和 \"Temperature in Fahrenheit: 157.6\"，如图 27-3 所示。\n\n![A437923_1_En_27_Fig3_HTML.jpg](img/A437923_1_En_27_Fig3_HTML.jpg)\n\
    \n**图 27-3.** `print` 命令在 Xcode 窗口的调试区域显示文本\n\n要显示或隐藏调试区域，你有三个选项：\n\n- 点击 Xcode\
    \ 窗口右上角的显示/隐藏调试区域图标。\n- 选择 View ➤ Debug Area ➤ 显示/隐藏调试区域。\n- 按 Shift + Command\
    \ + Y。\n\n通过查看调试区域，你可以看到 `print` 命令显示的内容。如果你对摄氏度和华氏度有所了解，就会知道摄氏度的沸点是 100 度，而华氏度的沸点是\
    \ 212 度。然而，你的温度转换程序计算得出 100 摄氏度等于 157.6 华氏度，这意味着华氏温度应该接近 212 而不是 157.6。显然有问题，所以我们用\
    \ `print` 命令和注释来帮助调试问题。\n\n1. 确保 DebugProgram 项目已在 Xcode 中加载。\n2. 在项目导航器窗格中点击\
    \ `AppDelegate.swift` 文件。\n3. 编辑 `C2F` 函数，在 `*` 符号（乘号）左侧输入 `//` 符号，如下所示：\n\n```\n\
    func C2F (tempC : Double) -> Double {\n    var tempF : Double\n    tempF = tempC\
    \ + 32 //* 9/5\n    return tempF\n}\n```\n\n这个注释可以让你检查 `tempC` 参数是否正确传递到 `C2F`\
    \ 函数并存储到 `tempF` 变量中。\n\n4. 在 `return` 语句上方添加一个 `print (tempC)` 命令，如下所示：\n\n```\n\
    func C2F (tempC : Double) -> Double {\n    var tempF : Double\n    tempF = tempC\
    \ + 32 //* 9/5\n    print (tempF)\n    return tempF\n}\n```\n\n5. 选择 Product ➤\
    \ Run。程序空白的用户界面会出现。\n6. 选择 DebugProgram ➤ Quit DebugProgram。Xcode 界面再次出现，在调试区域显示结果，打印出：\n\
    \n`Temperature in Celsius: 100.0 132.0 Temperature in Fahrenheit: 132.0`\n\n通过注释掉代码的计算部分并使用\
    \ `print (tempF)` 命令，你可以看到 `C2F` 函数正确地存储了 100.0 到 `tempC` 变量中，并在存储到 `tempF` 变量之前加了\
    \ 32。因为你注释掉了代码的计算部分，可以假设错误一定存在于被你注释掉的代码部分。\n\n虽然公式看起来可能正确，但错误之所以发生，是因为 Swift（以及大多数编程语言）计算公式的方式。首先，它们从左到右计算。其次，它们会先计算乘法等运算，后计算加法。错误的发生是因为你的转换公式先计算\
    \ 32 乘以 9（得到 288），然后将结果（288）除以 5 得到 57.6。最后，它将 57.6 加到 100.0 上，得到错误的结果 157.6。它真正应该做的是将\
    \ 9/5 乘以摄氏温度，然后将结果加上 32。\n\n7. 将 `C2F` 函数修改如下：\n\n```\nfunc C2F (tempC : Double)\
    \ -> Double {\n    var tempF : Double\n    tempF = tempC * (9/5) + 32\n    print\
    \ (tempF)\n    return tempF\n}\n```\n"
- fmt: "8.  Choose **Product** ➤ **Run**. Your program’s blank user interface appears.\
    \  \n9.  Choose **DebugProgram** ➤ **Quit DebugProgram**. Xcode appears again.\
    \  \n10.  Look in the Debug Area and you’ll see that the program now correctly\
    \ converts 100 degrees Celsius to 212 degrees Fahrenheit.\n\nFor simple debugging,\
    \ turning code temporarily into comments and using the `print` command can work,\
    \ but it’s fairly clumsy to keep adding and removing comment symbols and `print`\
    \ commands. A much better solution is to use breakpoints and variable watching,\
    \ which essentially duplicates using comments and `print` commands.\n\n## Using\
    \ the Xcode Debugger\n\nWhile comments and the `print` command can help you isolate\
    \ problems in your code, they can be clumsy to use. The `print` command can be\
    \ especially tedious since you have to type it into your code and then remember\
    \ to remove it later when you’re ready to ship your program.\n\nAlthough leaving\
    \ one or more `print` commands buried in your program won’t likely hurt your program’s\
    \ performance, it is poor programming practice to leave code in your program that\
    \ no longer serves any purpose.\n\nAs an alternative to typing the `print` command\
    \ throughout your program, Xcode offers a more convenient alternative using the\
    \ Xcode debugger. The debugger gives you two ways to hunt out and identify bugs\
    \ in your program:\n\n-   Breakpoints\n-   Variable watching\n\n### Using Breakpoints\n\
    \nBreakpoints let you identify a specific line in your code where you want your\
    \ program to stop. Once your program stops, you can step through your code line\
    \ by line. As you do so, you can also peek at the contents of one or more variables\
    \ to check if the variables are holding the right values.\n\nFor example, if your\
    \ program converts Celsius to Fahrenheit, but somehow converts 100 degrees Celsius\
    \ into -41259 degrees Fahrenheit, you know your code isn’t working right. By inserting\
    \ breakpoints in your code and examining the values of your variables at each\
    \ breakpoint, you can identify where your code calculates its values. The moment\
    \ you spot the line where it miscalculates a value, you know the exact area of\
    \ your program that you need to fix.\n\nYou can set a breakpoint by doing one\
    \ of the following:\n\n-   Clicking to the left of the code where you want to\
    \ set the breakpoint\n-   Moving the cursor to a line where you want to set the\
    \ breakpoint and pressing **Command** + **\\**\n-   Choosing **Debug** ➤ **Breakpoints**\
    \ ➤ **Add Breakpoint at Current Line**\n\n### Stepping Through Code\n\nOnce a\
    \ breakpoint has stopped your program from running, you can step through your\
    \ code line by line using the `step` command. Xcode offers a variety of different\
    \ `step` commands but the three most common are\n\n-   `step over`\n-   `step\
    \ into`\n-   `step out`\n\nThe `step over` command examines the next line of code,\
    \ treating function or method calls as a single line of code.\n\nThe `step into`\
    \ command works exactly like the `step over` command until it highlights a function\
    \ or method call. Then it jumps to the first line of code in that function or\
    \ method.\n\nThe `step out` command is used to prematurely exit out of a function\
    \ or method that you entered using the `step into` command. The `step out` command\
    \ returns to the line of code where a function or method was called.\n\nAll three\
    \ `step` commands are used after a program temporarily stops at a breakpoint.\
    \ By using a `step` command, you can examine your code line by line and see how\
    \ values stored in different variables may change.\n\nSuch variable watching lets\
    \ you examine the contents of one or more variables to verify if it’s holding\
    \ the correct data. The moment you spot a variable holding incorrect data, you\
    \ can zero in on the line of code that’s creating that error.\n\nThe best part\
    \ about breakpoints is that you can easily add and remove them since they don’t\
    \ modify your code at all, unlike comments and multiple `print` commands. Xcode\
    \ can remove all breakpoints for you automatically so you don’t have to hunt through\
    \ your code to remove them one by one.\n\nTo see how to use breakpoints, step\
    \ commands, and variable watching, follow these steps:\n\n1.  Make sure the DebugProgram\
    \ project is loaded in Xcode.  \n2.  Click the `AppDelegate.swift` file in the\
    \ Project Navigator pane.  \n3.  Modify the `C2F` function as follows:\n\n```\n\
    \    func C2F (tempC : Double) -> Double {\n    var tempF : Double\n    tempF\
    \ = tempC + 32 * 9/5\n    return tempF\n    }\n    ```\n\n4.  Move the cursor\
    \ anywhere inside the following line inside the `applicationDidFinishLaunching`\
    \ function:\n\n```\n    var myMessage = \"Temperature in Celsius:\"\n    ```\n\
    \n5.  Choose **Debug** ➤ **Breakpoints** ➤ **Add Breakpoint at Current Line**.\
    \ Xcode displays a breakpoint as a blue arrow, as shown in Figure [27-4](#A437923_1_En_27_Chapter.html#Fig4).\n\
    \n![A437923_1_En_27_Fig4_HTML.jpg](A437923_1_En_27_Fig4_HTML.jpg)\n\nFigure 27-4.\n\
    \nA breakpoint appears to the left of your Swift code  \n6.  Choose **Product**\
    \ ➤ **Run**. Notice that Xcode highlights the line where your breakpoint appears,\
    \ as shown in Figure [27-5](#A437923_1_En_27_Chapter.html#Fig5). Notice that initially\
    \ the value of the `myMessage` variable is not defined.\n\n![A437923_1_En_27_Fig5_HTML.jpg](A437923_1_En_27_Fig5_HTML.jpg)\n\
    \nFigure 27-5.\n\nA breakpoint halts program execution so you can examine its\
    \ current state  \n7.  Choose **Debug** ➤ **Step Over** (or press **F6**). Xcode\
    \ highlights the next line under your breakpoint. The information in the left-hand\
    \ side of the debug area displays the current values that your program is using,\
    \ as shown in Figure [27-6](#A437923_1_En_27_Chapter.html#Fig6). Notice that after\
    \ the breakpoint code runs, the value of the `myMessage` variable is now defined\
    \ as the string “Temperature in Celsius:”.\n\n![A437923_1_En_27_Fig6_HTML.jpg](A437923_1_En_27_Fig6_HTML.jpg)\n\
    \nFigure 27-6.\n\nBy watching how variables change, you can see how each line\
    \ of code affects each variable  \n8.  Choose **Debug** ➤ **Step Over** (or press\
    \ **F6**) several more times until Xcode highlights the following line:\n\n```\n\
    \    print (myMessage + \"\\(C2F(temp))\")\n    ```\n\n9.  Choose **Debug** ➤\
    \ **Step Into** (or press **F7**). Xcode now highlights the first line of code\
    \ in the `C2F` function, as shown in Figure [27-7](#A437923_1_En_27_Chapter.html#Fig7).\n\
    \n![A437923_1_En_27_Fig7_HTML.jpg](A437923_1_En_27_Fig7_HTML.jpg)\n\nFigure 27-7.\n\
    \nThe step into command lets you step through the code stored in a function or\
    \ method  \n10.  Choose **Debug** ➤ **Step Out** (or press **F8**). Xcode now\
    \ highlights the line that called the `C2F` function.  \n11.  Choose **Debug**\
    \ ➤ **Continue** to continue running the program until the next breakpoint. In\
    \ this program, there’s only one breakpoint so the program displays its empty\
    \ user interface.  \n12.  Choose **DebugProgram** ➤ **Quit DebugProgram**. The\
    \ Xcode window appears again.  \n13.  **Debug** ➤ **Deactivate Breakpoints**.\
    \ Xcode dims the breakpoint. Xcode will ignore deactivated breakpoints.  \n14.\
    \  Choose **Product** ➤ **Run**. Notice that because you deactivated the breakpoint,\
    \ Xcode ignores it and runs your program by displaying its empty user interface.\
    \  \n15.  Choose **DebugProgram** ➤ **Quit DebugProgram**. The Xcode window appears\
    \ again."
  raw: "8.  Choose Product ➤ Run. Your program’s blank user interface appears.  \n\
    9.  Choose DebugProgram ➤ Quit DebugProgram. Xcode appears again.  \n10.  Look\
    \ in the Debug Area and you’ll see that the program now correctly converts 100\
    \ degrees Celsius to 212 degrees Fahrenheit.\n\nFor simple debugging, turning\
    \ code temporarily into comments and using the `print` command can work, but it’s\
    \ fairly clumsy to keep adding and removing comment symbols and `print` commands.\
    \ A much better solution is to use breakpoints and variable watching, which essentially\
    \ duplicates using comments and `print` commands.\n\n## Using the Xcode Debugger\n\
    \nWhile comments and the `print` command can help you isolate problems in your\
    \ code, they can be clumsy to use. The `print` command can be especially tedious\
    \ since you have to type it into your code and then remember to remove it later\
    \ when you’re ready to ship your program.\n\nAlthough leaving one or more `print`\
    \ commands buried in your program won’t likely hurt your program’s performance,\
    \ it is poor programming practice to leave code in your program that no longer\
    \ serves any purpose.\n\nAs an alternative to typing the `print` command throughout\
    \ your program, Xcode offers a more convenient alternative using the Xcode debugger\
    \ . The debugger gives you two ways to hunt out and identify bugs in your program:\n\
    \n*   Breakpoints\n*   Variable watching\n\n### Using Breakpoints\n\nBreakpoints\
    \ let you identify a specific line in your code where you want your program to\
    \ stop. Once your program stops, you can step through your code line by line.\
    \ As you do so, you can also peek at the contents of one or more variables to\
    \ check if the variables are holding the right values.\n\nFor example, if your\
    \ program converts Celsius to Fahrenheit, but somehow converts 100 degrees Celsius\
    \ into -41259 degrees Fahrenheit, you know your code isn’t working right. By inserting\
    \ breakpoints in your code and examining the values of your variables at each\
    \ breakpoint, you can identify where your code calculates its values. The moment\
    \ you spot the line where it miscalculates a value, you know the exact area of\
    \ your program that you need to fix.\n\nYou can set a breakpoint by doing one\
    \ of the following:\n\n*   Clicking to the left of the code where you want to\
    \ set the breakpoint\n*   Moving the cursor to a line where you want to set the\
    \ breakpoint and pressing Command + \\\n*   Choosing Debug ➤ Breakpoints ➤ Add\
    \ Breakpoint at Current Line\n\n### Stepping Through Code\n\nOnce a breakpoint\
    \ has stopped your program from running, you can step through your code line by\
    \ line using the `step` command. Xcode offers a variety of different `step` commands\
    \ but the three most common are\n\n*   `step over`\n*   `step into`\n*   `step\
    \ out`\n\nThe `step over` command examines the next line of code, treating function\
    \ or method calls as a single line of code.\n\nThe `step into` command works exactly\
    \ like the `step over` command until it highlights a function or method call.\
    \ Then it jumps to the first line of code in that function or method.\n\nThe `step\
    \ out` command is used to prematurely exit out of a function or method that you\
    \ entered using the `step into` command. The `step out` command returns to the\
    \ line of code where a function or method was called.\n\nAll three `step` commands\
    \ are used after a program temporarily stops at a breakpoint. By using a `step`\
    \ command, you can examine your code line by line and see how values stored in\
    \ different variables may change.\n\nSuch variable watching lets you examine the\
    \ contents of one or more variables to verify if it’s holding the correct data.\
    \ The moment you spot a variable holding incorrect data, you can zero in on the\
    \ line of code that’s creating that error.\n\nThe best part about breakpoints\
    \ is that you can easily add and remove them since they don’t modify your code\
    \ at all, unlike comments and multiple `print` commands. Xcode can remove all\
    \ breakpoints for you automatically so you don’t have to hunt through your code\
    \ to remove them one by one.\n\nTo see how to use breakpoints, step commands,\
    \ and variable watching, follow these steps:\n\n1.  Make sure the DebugProgram\
    \ project is loaded in Xcode.  \n2.  Click the `AppDelegate.swift` file in the\
    \ Project Navigator pane.  \n3.  Modify the `C2F` function as follows:\n\n```\n\
    \    func C2F (tempC : Double) -> Double {\n    var tempF : Double\n    tempF\
    \ = tempC + 32 * 9/5\n    return tempF\n    }\n    ```\n\n4.  Move the cursor\
    \ anywhere inside the following line inside the `applicationDidFinishLaunching`\
    \ function:\n\n```\n    var myMessage = \"Temperature in Celsius:\"\n    ```\n\
    \n5.  Choose Debug ➤ Breakpoints ➤ Add Breakpoint at Current Line. Xcode displays\
    \ a breakpoint as a blue arrow, as shown in Figure [27-4](#A437923_1_En_27_Chapter.html#Fig4).\n\
    \n![A437923_1_En_27_Fig4_HTML.jpg](A437923_1_En_27_Fig4_HTML.jpg)\n\nFigure 27-4.\n\
    \nA breakpoint appears to the left of your Swift code  \n6.  Choose Product ➤\
    \ Run. Notice that Xcode highlights the line where your breakpoint appears, as\
    \ shown in Figure [27-5](#A437923_1_En_27_Chapter.html#Fig5). Notice that initially\
    \ the value of the `myMessage` variable is not defined.\n\n![A437923_1_En_27_Fig5_HTML.jpg](A437923_1_En_27_Fig5_HTML.jpg)\n\
    \nFigure 27-5.\n\nA breakpoint halts program execution so you can examine its\
    \ current state  \n7.  Choose Debug ➤ Step Over (or press F6). Xcode highlights\
    \ the next line under your breakpoint. The information in the left-hand side of\
    \ the debug area displays the current values that your program is using, as shown\
    \ in Figure [27-6](#A437923_1_En_27_Chapter.html#Fig6). Notice that after the\
    \ breakpoint code runs, the value of the `myMessage` variable is now defined as\
    \ the string “Temperature in Celsius:”.\n\n![A437923_1_En_27_Fig6_HTML.jpg](A437923_1_En_27_Fig6_HTML.jpg)\n\
    \nFigure 27-6.\n\nBy watching how variables change, you can see how each line\
    \ of code affects each variable  \n8.  Choose Debug ➤ Step Over (or press F6)\
    \ several more times until Xcode highlights the following line:\n\n```\n    print\
    \ (myMessage + \"\\(C2F(temp))\")\n    ```\n\n9.  Choose Debug ➤ Step Into (or\
    \ press F7). Xcode now highlights the first line of code in the `C2F` function,\
    \ as shown in Figure [27-7](#A437923_1_En_27_Chapter.html#Fig7).\n\n![A437923_1_En_27_Fig7_HTML.jpg](A437923_1_En_27_Fig7_HTML.jpg)\n\
    \nFigure 27-7.\n\nThe step into command lets you step through the code stored\
    \ in a function or method  \n10.  Choose Debug ➤ Step Out (or press F8). Xcode\
    \ now highlights the line that called the `C2F` function.  \n11.  Choose Debug\
    \ ➤ Continue to continue running the program until the next breakpoint. In this\
    \ program, there’s only one breakpoint so the program displays its empty user\
    \ interface.  \n12.  Choose DebugProgram ➤ Quit DebugProgram. The Xcode window\
    \ appears again.  \n13.  Debug ➤ Deactivate Breakpoints. Xcode dims the breakpoint.\
    \ Xcode will ignore deactivated breakpoints.  \n14.  Choose Product ➤ Run. Notice\
    \ that because you deactivated the breakpoint, Xcode ignores it and runs your\
    \ program by displaying its empty user interface.  \n15.  Choose DebugProgram\
    \ ➤ Quit DebugProgram. The Xcode window appears again."
  trans: "\n8.  选择**产品** ➤ **运行**。程序空白的用户界面出现。\n9.  选择**调试程序** ➤ **退出调试程序**。Xcode\
    \ 界面再次出现。\n10. 查看调试区，你会发现程序现在已正确地将 100 摄氏度转换为 212 华氏度。\n\n对于简单的调试，临时将代码注释掉并使用`print`命令可以奏效，但反复添加和移除注释符号及`print`命令相当笨拙。更好的方法是使用断点和变量观察，这本质上等同于使用注释和`print`命令的效果。\n\
    \n## 使用 Xcode 调试器\n\n虽然注释和`print`命令能帮你隔离代码中的问题，但使用起来可能很笨拙。`print`命令尤其繁琐，因为你必须先将其键入代码，然后在准备发布程序时记得将其移除。\n\
    \n虽然在程序中遗留一条或多条`print`命令不太可能损害程序性能，但在代码中保留不再起任何作用的代码是一种糟糕的编程实践。\n\n作为在程序中四处键入`print`命令的替代方案，Xcode\
    \ 提供了使用 Xcode 调试器这一更便捷的方案。调试器提供了两种查找和识别程序中错误的方法：\n\n-   断点\n-   变量观察\n\n### 使用断点\n\
    \n断点允许你在代码中指定想要程序停止运行的具体行。程序停止后，你可以逐行单步执行代码。在此过程中，你还可以查看一个或多个变量的内容，以检查变量是否保存了正确的值。\n\
    \n例如，如果你的程序将摄氏度转换为华氏度，但不知何故将 100 摄氏度转换成了-41259 华氏度，你就知道代码运行不正常了。通过在代码中插入断点并在每个断点处检查变量的值，你可以确定代码是在哪里计算其值的。一旦你发现计算错误的那一行，你就知道程序中需要修复的确切区域了。\n\
    \n你可以通过以下任一方式设置断点：\n\n-   在想要设置断点的代码左侧点击\n-   将光标移动到想要设置断点的行，然后按下**Command** +\
    \ **\\**\n-   选择**调试** ➤ **断点** ➤ **在当前行添加断点**\n\n### 单步执行代码\n\n一旦断点使程序停止运行，你就可以使用`step`命令逐行单步执行代码。Xcode\
    \ 提供了多种不同的`step`命令，但最常用的有三种：\n\n-   `step over`（单步跳过）\n-   `step into`（单步进入）\n\
    -   `step out`（单步跳出）\n\n`step over`命令会检查下一行代码，并将函数或方法调用视为单行代码。\n\n`step into`命令在遇到高亮显示的函数或方法调用之前，其工作方式与`step\
    \ over`命令完全相同。然后它会跳转到该函数或方法的第一行代码。\n\n`step out`命令用于提前退出你使用`step into`命令进入的函数或方法。`step\
    \ out`命令会返回到调用该函数或方法的那一行代码。\n\n所有这三个`step`命令都是在程序在断点处暂时停止后使用的。通过使用`step`命令，你可以逐行检查代码，并观察不同变量中存储的值可能发生的变化。\n\
    \n这种变量观察允许你检查一个或多个变量的内容，以验证其是否保存了正确的数据。一旦你发现某个变量持有错误数据，就能准确定位到产生该错误的那一行代码。\n\n\
    断点最棒的地方在于，你可以轻松地添加和移除它们，因为它们完全不会修改你的代码，这与注释和多个`print`命令不同。Xcode 可以自动为你移除所有断点，这样你就不必在代码中逐个查找并移除了。\n\
    \n要了解如何使用断点、step 命令和变量观察，请遵循以下步骤：\n\n1.  确保 Xcode 中已加载 DebugProgram 项目。\n2.  在项目导航器窗格中点击`AppDelegate.swift`文件。\n\
    3.  按如下方式修改`C2F`函数：\n\n```\n    func C2F (tempC : Double) -> Double {\n    var\
    \ tempF : Double\n    tempF = tempC + 32 * 9/5\n    return tempF\n    }\n    ```\n\
    \n4.  将光标移动到`applicationDidFinishLaunching`函数中以下行内的任意位置：\n\n```\n    var myMessage\
    \ = \"Temperature in Celsius:\"\n    ```\n\n5.  选择**调试** ➤ **断点** ➤ **在当前行添加断点**。Xcode\
    \ 会显示一个蓝色箭头形式的断点，如图 27-4 所示。\n\n![A437923_1_En_27_Fig4_HTML.jpg](img/A437923_1_En_27_Fig4_HTML.jpg)\n\
    \n图 27-4.\n\n断点出现在 Swift 代码的左侧  \n6.  选择**产品** ➤ **运行**。注意 Xcode 会高亮显示断点所在的行，如图\
    \ 27-5 所示。注意，最初`myMessage`变量的值是未定义的。\n\n![A437923_1_En_27_Fig5_HTML.jpg](img/A437923_1_En_27_Fig5_HTML.jpg)\n\
    \n图 27-5.\n\n断点暂停了程序执行，以便你能检查其当前状态  \n7.  选择**调试** ➤ **单步跳过**（或按**F6**）。Xcode\
    \ 会高亮显示断点下方的下一行。调试区左侧的信息会显示程序当前使用的值，如图 27-6 所示。注意，在断点处代码运行后，`myMessage`变量的值现在被定义为字符串“Temperature\
    \ in Celsius:”。\n\n![A437923_1_En_27_Fig6_HTML.jpg](img/A437923_1_En_27_Fig6_HTML.jpg)\n\
    \n图 27-6.\n\n通过观察变量如何变化，你可以看到每行代码如何影响每个变量  \n8.  多次选择**调试** ➤ **单步跳过**（或按**F6**），直到\
    \ Xcode 高亮显示以下行：\n\n```\n    print (myMessage + \"\\(C2F(temp))\")\n    ```\n\n\
    9.  选择**调试** ➤ **单步进入**（或按**F7**）。Xcode 现在会高亮显示`C2F`函数的第一行代码，如图 27-7 所示。\n\n![A437923_1_En_27_Fig7_HTML.jpg](img/A437923_1_En_27_Fig7_HTML.jpg)\n\
    \n图 27-7.\n\n单步进入命令允许你单步执行存储在函数或方法中的代码  \n10. 选择**调试** ➤ **单步跳出**（或按**F8**）。Xcode\
    \ 现在会高亮显示调用了`C2F`函数的那一行。  \n11. 选择**调试** ➤ **继续**以继续运行程序，直到下一个断点。在此程序中只有一个断点，因此程序会显示其空白的用户界面。\
    \  \n12. 选择**调试程序** ➤ **退出调试程序**。Xcode 窗口再次出现。  \n13. **调试** ➤ **停用断点**。Xcode\
    \ 会使断点变暗。Xcode 将忽略已停用的断点。  \n14. 选择**产品** ➤ **运行**。注意，因为你已停用断点，Xcode 会忽略它，并显示空白的用户界面来运行你的程序。\
    \  \n15. 选择**调试程序** ➤ **退出调试程序**。Xcode 窗口再次出现。\n"
- fmt: "### Managing Breakpoints\n\nThere’s no limit to the number of breakpoints\
    \ you can put in a program so feel free to place as many as you need to help you\
    \ track down an error. Of course, if you place breakpoints in a program, you may\
    \ lose track of how many breakpoints you’ve set and where they might be set. To\
    \ help you manage your breakpoints, Xcode offers a Breakpoint Navigator.\n\nYou\
    \ can open the Breakpoint Navigator in one of three ways:\n\n*   Choose View ➤\
    \ Navigators ➤ Show Breakpoint Navigator\n*   Press `Command + 7`\n*   Click the\
    \ Show Breakpoint Navigator icon in the Navigator pane\n\nThe Breakpoint Navigator\
    \ lists all the breakpoints set in your program, identifies the files the breakpoints\
    \ are in, and the line number of each breakpoint, as shown in Figure 27-8.\n\n\
    ![A437923_1_En_27_Fig8_HTML.jpg](A437923_1_En_27_Fig8_HTML.jpg)\n\nFigure 27-8.\
    \ The Breakpoint Navigator identifies all your breakpoints\n\nSince the Breakpoint\
    \ Navigator identifies breakpoints by line number, you might want to display line\
    \ numbers in the Xcode editor (see Figure 27-8). To turn on line numbers, follow\
    \ these steps:\n\n1.  Choose Xcode ➤ Preferences. The Xcode Preferences window\
    \ appears.\n2.  Click the Text Editing icon. The text editing options appear.\n\
    3.  Select the “Line numbers” check box, as shown in Figure 27-9.\n\n    ![A437923_1_En_27_Fig9_HTML.jpg](A437923_1_En_27_Fig9_HTML.jpg)\n\
    \n    Figure 27-9. The Line numbers check box lets you show or hide line numbers\
    \ in the Xcode editor\n4.  Click the close button (the red button) in the upper\
    \ left corner of the Xcode Preferences window. Xcode now displays line numbers\
    \ in the left margin of the editor.\n\nTo learn how to use the Breakpoint Navigator,\
    \ follow these steps:\n\n1.  Make sure the DebugProgram project is loaded in Xcode.\n\
    2.  Turn on line numbers in Xcode.\n3.  Click the `AppDelegate.swift` file in\
    \ the Project Navigator pane.\n4.  Place three breakpoints anywhere in your code\
    \ using whatever method you like best, such as clicking in the left margin of\
    \ the Xcode editor, pressing `Command + \\`, or choosing Debug ➤ Breakpoints ➤\
    \ Add Breakpoint at Current Line. (The exact location doesn’t matter.)\n5.  Click\
    \ the `Main.storyboard` file in the Project Navigator pane. Xcode displays the\
    \ user interface of your program.\n6.  Choose View ➤ Navigators ➤ Show Breakpoint\
    \ Navigator. The Breakpoint Navigator displays your three breakpoints.\n7.  Click\
    \ any breakpoint. Xcode displays the file containing your chosen breakpoint.\n\
    8.  Right-click any breakpoint in the Breakpoint Navigator pane. A pop-up menu\
    \ appears, as shown in Figure 27-10.\n\n    ![A437923_1_En_27_Fig10_HTML.jpg](A437923_1_En_27_Fig10_HTML.jpg)\n\
    \n    Figure 27-10. A pop-up menu lets you modify breakpoints\n9.  Choose Disable\
    \ Breakpoint. Notice that this lets you deactivate or disable breakpoints individually\
    \ instead of deactivating all of them at once through the Debug ➤ Deactivate Breakpoints\
    \ command.\n10.  Right-click any breakpoint in the Breakpoint Navigator pane and\
    \ choose Delete Breakpoint. (Another way to delete a breakpoint is to drag the\
    \ breakpoint away from your code and release the left mouse button.)\n11.  Delete\
    \ all your breakpoints until no more breakpoints are left.\n\n### Using Symbolic\
    \ Breakpoints\n\nWhen you create a breakpoint, you must place it on the line where\
    \ you want your program’s execution to temporarily stop. However, this often means\
    \ guessing where the problem might be and then using the various step commands\
    \ to examine your code line by line.\n\nTo avoid this problem, Xcode offers a\
    \ symbolic breakpoint. A symbolic breakpoint stops program execution only when\
    \ a specific function or method runs. If you don’t want your program’s execution\
    \ to stop every time a particular function or method runs, you can tell Xcode\
    \ to ignore it a certain number of times, such as 10. That means the function\
    \ or method will run up to 10 times and then on the eleventh time it’s called,\
    \ the symbolic breakpoint will temporarily halt execution so you can step through\
    \ your code line by line.\n\nTo create a symbolic breakpoint, you can define the\
    \ following:\n\n*   Symbol: The name of the function or method to halt program\
    \ execution\n*   Module: The file name containing the function or method defined\
    \ by the Symbol text field\n*   Ignore: The number of times from 0 or more that\
    \ you want the function or method to run before temporarily halting program execution\n\
    \nTo see how a symbolic breakpoint works, follow these steps:\n\n1.  Make sure\
    \ the DebugProgram project is loaded in Xcode.\n2.  Choose Debug ➤ Breakpoints\
    \ ➤ Create Symbolic Breakpoint. A Symbolic Breakpoint pop-up window appears, as\
    \ shown in Figure 27-11.\n\n    ![A437923_1_En_27_Fig11_HTML.jpg](A437923_1_En_27_Fig11_HTML.jpg)\n\
    \n    Figure 27-11. The Symbolic Breakpoint pop-up window lets you define a breakpoint\n\
    3.  Click in the Symbol text field and type `C2F`, which is the name of the function\
    \ or method you want to examine.\n4.  (Optional) If the function or method name\
    \ you specified in the Symbol text field is used in other files, click in the\
    \ Module text field and type a file name. This file name will limit the symbolic\
    \ breakpoint only to that function or method in that particular file. Since the\
    \ `C2F` function is only used once, you can leave the Module text field empty.\n\
    5.  (Optional) Click in the Ignore text field and type a number to specify how\
    \ many times to ignore a function or method being called before halting program\
    \ execution. In this case, leave `0` in the Ignore text field.\n6.  Click anywhere\
    \ away from the Symbolic Breakpoint pop-up window to make it disappear.\n7.  Choose\
    \ Product ➤ Run. The `C2F` Symbolic breakpoint causes the program to temporarily\
    \ halt execution on the first line of code in the `C2F` function that calculates\
    \ a result, as shown in Figure 27-12.\n\n    ![A437923_1_En_27_Fig12_HTML.jpg](A437923_1_En_27_Fig12_HTML.jpg)\n\
    \n    Figure 27-12. The symbolic breakpoint halts program execution in the `C2F`\
    \ function defined by the Symbol text field\n8.  Choose Product ➤ Stop to make\
    \ your program stop running.\n9.  Choose View ➤ Navigators ➤ Show Breakpoint Navigator.\
    \ The Breakpoint Navigator pane appears.\n10.  Right-click the `C2F` breakpoint\
    \ in the Breakpoint Navigator pane and when a pop-up menu appears, choose Delete\
    \ Breakpoint. There should be no breakpoints displayed in the Breakpoint Navigator\
    \ pane.\n\nNote\n\nAnother way to set a breakpoint without specifying a specific\
    \ line of code is to create an Exception breakpoint. Normally if your program\
    \ crashes, Xcode displays a bunch of cryptic error messages and you have no idea\
    \ what caused the error. If you set an Exception breakpoint, Xcode can identify\
    \ the line of code that created the crash so you can fix it."
  raw: "### Managing Breakpoints\n\nThere’s no limit to the number of breakpoints\
    \ you can put in a program so feel free to place as many as you need to help you\
    \ track down an error. Of course, if you place breakpoints in a program, you may\
    \ lose track of how many breakpoints you’ve set and where they might be set. To\
    \ help you manage your breakpoints, Xcode offers a Breakpoint Navigator.\n\nYou\
    \ can open the Breakpoint Navigator in one of three ways:\n\n*   Choose View ➤\
    \ Navigators ➤ Show Breakpoint Navigator\n*   Press Command + 7\n*   Click the\
    \ Show Breakpoint Navigator icon in the Navigator pane\n\nThe Breakpoint Navigator\
    \ lists all the breakpoints set in your program, identifies the files the breakpoints\
    \ are in, and the line number of each breakpoint, as shown in Figure [27-8](#A437923_1_En_27_Chapter.html#Fig8).\n\
    \n![A437923_1_En_27_Fig8_HTML.jpg](A437923_1_En_27_Fig8_HTML.jpg)\n\nFigure 27-8.\n\
    \nThe Breakpoint Navigator identifies all your breakpoints\n\nSince the Breakpoint\
    \ Navigator identifies breakpoints by line number, you might want to display line\
    \ numbers in the Xcode editor (see Figure [27-8](#A437923_1_En_27_Chapter.html#Fig8)).\
    \ To turn on line numbers, follow these steps:\n\n1.  Choose Xcode ➤ Preferences.\
    \ The Xcode Preferences window appears.  \n2.  Click the Text Editing icon. The\
    \ text editing options appear.  \n3.  Select the “Line numbers” check box, as\
    \ shown in Figure [27-9](#A437923_1_En_27_Chapter.html#Fig9).\n\n    ![A437923_1_En_27_Fig9_HTML.jpg](A437923_1_En_27_Fig9_HTML.jpg)\n\
    \n    Figure 27-9.\n\n    The Line numbers check box lets you show or hide line\
    \ numbers in the Xcode editor  \n4.  Click the close button (the red button) in\
    \ the upper left corner of the Xcode Preferences window. Xcode now displays line\
    \ numbers in the left margin of the editor.  \n\nTo learn how to use the Breakpoint\
    \ Navigator, follow these steps:\n\n1.  Make sure the DebugProgram project is\
    \ loaded in Xcode.  \n2.  Turn on line numbers in Xcode.  \n3.  Click the `AppDelegate.swift`\
    \ file in the Project Navigator pane.  \n4.  Place three breakpoints anywhere\
    \ in your code using whatever method you like best, such as clicking in the left\
    \ margin of the Xcode editor, pressing Command + \\, or choosing Debug ➤ Breakpoints\
    \ ➤ Add Breakpoint at Current Line. (The exact location doesn’t matter.)  \n5.\
    \  Click the `Main.storyboard` file in the Project Navigator pane. Xcode displays\
    \ the user interface of your program.  \n6.  Choose View ➤ Navigators ➤ Show Breakpoint\
    \ Navigator. The Breakpoint Navigator displays your three breakpoints.  \n7. \
    \ Click any breakpoint. Xcode displays the file containing your chosen breakpoint.\
    \  \n8.  Right-click any breakpoint in the Breakpoint Navigator pane. A pop-up\
    \ menu appears, as shown in Figure [27-10](#A437923_1_En_27_Chapter.html#Fig10).\n\
    \n    ![A437923_1_En_27_Fig10_HTML.jpg](A437923_1_En_27_Fig10_HTML.jpg)\n\n  \
    \  Figure 27-10.\n\n    A pop-up menu lets you modify breakpoints  \n9.  Choose\
    \ Disable Breakpoint. Notice that this lets you deactivate or disable breakpoints\
    \ individually instead of deactivating all of them at once through the Debug ➤\
    \ Deactivate Breakpoints command.  \n10.  Right-click any breakpoint in the Breakpoint\
    \ Navigator pane and choose Delete Breakpoint. (Another way to delete a breakpoint\
    \ is to drag the breakpoint away from your code and release the left mouse button.)\
    \  \n11.  Delete all your breakpoints until no more breakpoints are left.\n\n\
    ### Using Symbolic Breakpoints\n\nWhen you create a breakpoint, you must place\
    \ it on the line where you want your program’s execution to temporarily stop.\
    \ However, this often means guessing where the problem might be and then using\
    \ the various step commands to examine your code line by line.\n\nTo avoid this\
    \ problem, Xcode offers a symbolic breakpoint. A symbolic breakpoint stops program\
    \ execution only when a specific function or method runs. If you don’t want your\
    \ program’s execution to stop every time a particular function or method runs,\
    \ you can tell Xcode to ignore it a certain number of times, such as 10\\. That\
    \ means the function or method will run up to 10 times and then on the eleventh\
    \ time it’s called, the symbolic breakpoint will temporarily halt execution so\
    \ you can step through your code line by line.\n\nTo create a symbolic breakpoint\
    \ , you can define the following:\n\n*   Symbol: The name of the function or method\
    \ to halt program execution\n*   Module: The file name containing the function\
    \ or method defined by the Symbol text field\n*   Ignore: The number of times\
    \ from 0 or more that you want the function or method to run before temporarily\
    \ halting program execution\n\nTo see how a symbolic breakpoint works, follow\
    \ these steps:\n\n1.  Make sure the DebugProgram project is loaded in Xcode.  \n\
    2.  Choose Debug ➤ Breakpoints ➤ Create Symbolic Breakpoint. A Symbolic Breakpoint\
    \ pop-up window appears, as shown in Figure [27-11](#A437923_1_En_27_Chapter.html#Fig11).\n\
    \n    ![A437923_1_En_27_Fig11_HTML.jpg](A437923_1_En_27_Fig11_HTML.jpg)\n\n  \
    \  Figure 27-11.\n\n    The Symbolic Breakpoint pop-up window lets you define\
    \ a breakpoint  \n3.  Click in the Symbol text field and type C2F, which is the\
    \ name of the function or method you want to examine.  \n4.  (Optional) If the\
    \ function or method name you specified in the Symbol text field is used in other\
    \ files, click in the Module text field and type a file name. This file name will\
    \ limit the symbolic breakpoint only to that function or method in that particular\
    \ file. Since the `C2F` function is only used once, you can leave the Module text\
    \ field empty.  \n5.  (Optional) Click in the Ignore text field and type a number\
    \ to specify how many times to ignore a function or method being called before\
    \ halting program execution. In this case, leave 0 in the Ignore text field.  \n\
    6.  Click anywhere away from the Symbolic Breakpoint pop-up window to make it\
    \ disappear.  \n7.  Choose Product ➤ Run. The C2F Symbolic breakpoint causes the\
    \ program to temporarily halt execution on the first line of code in the C2F function\
    \ that calculates a result, as shown in Figure [27-12](#A437923_1_En_27_Chapter.html#Fig12).\n\
    \n    ![A437923_1_En_27_Fig12_HTML.jpg](A437923_1_En_27_Fig12_HTML.jpg)\n\n  \
    \  Figure 27-12.\n\n    The symbolic breakpoint halts program execution in the\
    \ C2F function defined by the Symbol text field  \n8.  Choose Product ➤ Stop to\
    \ make your program stop running.  \n9.  Choose View ➤ Navigators ➤ Show Breakpoint\
    \ Navigator. The Breakpoint Navigator pane appears.  \n10.  Right-click the C2F\
    \ breakpoint in the Breakpoint Navigator pane and when a pop-up menu appears,\
    \ choose Delete Breakpoint. There should be no breakpoints displayed in the Breakpoint\
    \ Navigator pane.  \n\nNote\n\nAnother way to set a breakpoint without specifying\
    \ a specific line of code is to create an Exception breakpoint. Normally if your\
    \ program crashes, Xcode displays a bunch of cryptic error messages and you have\
    \ no idea what caused the error. If you set an Exception breakpoint, Xcode can\
    \ identify the line of code that created the crash so you can fix it."
  trans: "\n### 管理断点\n\n在一个程序中，你可以设置的断点数量没有上限，因此请根据需要随意放置任意数量的断点，以帮助你追踪错误。当然，如果你在程序中放置了断点，你可能会忘记自己设置了多少个断点以及它们被设置在了哪里。为了帮助你管理断点，Xcode\
    \ 提供了断点导航器。\n\n你可以通过以下三种方式之一打开断点导航器：\n\n*   选择“视图”➜“导航器”➜“显示断点导航器”\n*   按下 `Command\
    \ + 7`\n*   点击导航器面板中的“显示断点导航器”图标\n\n断点导航器会列出你在程序中设置的所有断点，并标识这些断点所在的文件以及每个断点的行号，如图\
    \ 27-8 所示。\n\n![A437923_1_En_27_Fig8_HTML.jpg](img/A437923_1_En_27_Fig8_HTML.jpg)\n\
    \n图 27-8. 断点导航器识别你所有的断点\n\n由于断点导航器通过行号来识别断点，你可能希望在 Xcode 编辑器中显示行号（参见图 27-8）。要开启行号显示，请按以下步骤操作：\n\
    \n1.  选择 Xcode ➜ 偏好设置。此时会显示 Xcode 偏好设置窗口。\n2.  点击“文本编辑”图标。文本编辑选项随即出现。\n3.  选中“行号”复选框，如图\
    \ 27-9 所示。\n\n    ![A437923_1_En_27_Fig9_HTML.jpg](img/A437923_1_En_27_Fig9_HTML.jpg)\n\
    \n    图 27-9. “行号”复选框可让你在 Xcode 编辑器中显示或隐藏行号\n4.  点击 Xcode 偏好设置窗口左上角的关闭按钮（红色按钮）。现在，Xcode\
    \ 会在编辑器的左侧边距中显示行号。\n\n要学习如何使用断点导航器，请按以下步骤操作：\n\n1.  确保 DebugProgram 项目已加载到 Xcode\
    \ 中。\n2.  在 Xcode 中开启行号显示。\n3.  在项目导航器面板中点击 `AppDelegate.swift` 文件。\n4.  在你代码中的任意位置放置三个断点，使用你认为最方便的方法，例如点击\
    \ Xcode 编辑器的左侧边距、按下 `Command + \\`，或者选择“调试”➜“断点”➜“在当前行添加断点”。（具体位置无关紧要。）\n5.  在项目导航器面板中点击\
    \ `Main.storyboard` 文件。Xcode 会显示你程序的用户界面。\n6.  选择“视图”➜“导航器”➜“显示断点导航器”。断点导航器会显示你的三个断点。\n\
    7.  点击任意一个断点。Xcode 会显示包含你所选断点的文件。\n8.  在断点导航器面板中右键点击任意一个断点。此时会出现一个弹出菜单，如图 27-10\
    \ 所示。\n\n    ![A437923_1_En_27_Fig10_HTML.jpg](img/A437923_1_En_27_Fig10_HTML.jpg)\n\
    \n    图 27-10. 弹出菜单可让你修改断点\n9.  选择“停用断点”。请注意，这可以让你单独停用或禁用某个断点，而不是通过“调试”➜“停用断点”命令一次性禁用所有断点。\n\
    10. 在断点导航器面板中右键点击任意一个断点，然后选择“删除断点”。（另一种删除断点的方法是将断点从代码中拖开，然后释放鼠标左键。）\n11. 删除所有断点，直到没有剩余的断点为止。\n\
    \n### 使用符号断点\n\n当你创建一个断点时，必须将其放置在希望程序执行时暂时停止的那一行代码上。然而，这通常意味着需要猜测问题可能在哪里，然后再使用各种单步执行命令来逐行检查代码。\n\
    \n为了避免这个问题，Xcode 提供了符号断点。符号断点仅在特定函数或方法运行时才停止程序执行。如果你不希望某个特定函数或方法每次运行时都停止程序执行，你可以告诉\
    \ Xcode 忽略它一定次数，例如 10 次。这意味着该函数或方法最多可以运行 10 次，到第 11 次被调用时，符号断点才会暂时暂停执行，以便你逐行逐步调试代码。\n\
    \n要创建一个符号断点，你可以定义以下内容：\n\n*   符号：要暂停程序执行的函数或方法的名称\n*   模块：包含“符号”文本字段所定义函数或方法的文件名\n\
    *   忽略次数：在程序执行被临时暂停之前，你希望该函数或方法运行的次数（0 或更多）\n\n要了解符号断点是如何工作的，请按以下步骤操作：\n\n1. \
    \ 确保 DebugProgram 项目已加载到 Xcode 中。\n2.  选择“调试”➜“断点”➜“创建符号断点”。此时会出现一个“符号断点”弹出窗口，如图\
    \ 27-11 所示。\n\n    ![A437923_1_En_27_Fig11_HTML.jpg](img/A437923_1_En_27_Fig11_HTML.jpg)\n\
    \n    图 27-11. “符号断点”弹出窗口可让你定义一个断点\n3.  点击“符号”文本字段，并输入 `C2F`，这是你想要检查的函数或方法的名称。\n\
    4.  （可选）如果你在“符号”文本字段中指定的函数或方法名也用于其他文件，请点击“模块”文本字段并输入一个文件名。此文件名会将符号断点限定为仅作用于该特定文件中的那个函数或方法。由于\
    \ `C2F` 函数只使用一次，你可以将“模块”文本字段留空。\n5.  （可选）点击“忽略次数”文本字段，输入一个数字，以指定在暂停程序执行之前，忽略函数或方法被调用的次数。在此例中，将\
    \ `0` 保留在“忽略次数”文本字段即可。\n6.  点击“符号断点”弹出窗口之外的任意位置，使其消失。\n7.  选择“产品”➜“运行”。`C2F` 符号断点会使程序在\
    \ `C2F` 函数中计算结果的代码的第一行处暂停执行，如图 27-12 所示。\n\n    ![A437923_1_En_27_Fig12_HTML.jpg](img/A437923_1_En_27_Fig12_HTML.jpg)\n\
    \n    图 27-12. 符号断点使程序在“符号”文本字段定义的 `C2F` 函数中暂停执行\n8.  选择“产品”➜“停止”来让程序停止运行。\n9.\
    \  选择“视图”➜“导航器”➜“显示断点导航器”。断点导航器面板会显示出来。\n10. 在断点导航器面板中右键点击 `C2F` 断点，当弹出菜单出现时，选择“删除断点”。断点导航器面板中应不再显示任何断点。\n\
    \n注意\n\n另一种无需指定特定代码行来设置断点的方法是创建异常断点。通常情况下，如果你的程序崩溃，Xcode 会显示一堆难以理解的错误信息，而你并不知道错误的原因。如果你设置了一个异常断点，Xcode\
    \ 就能识别出导致崩溃的那行代码，以便你进行修复。\n"
- fmt: "### Using Conditional Breakpoints\n\nBreakpoints normally stop program execution\
    \ at a specific line every time. However, you may want to stop program execution\
    \ on a particular line only if a certain condition holds true, such as if a variable\
    \ exceeds a certain value, which can signal when something has gone wrong.\n\n\
    To see how a conditional breakpoint works, follow these steps:\n\n1. Make sure\
    \ the `DebugProgram` project is loaded in Xcode.\n2. Click the `AppDelegate.swift`\
    \ file in the Project Navigator pane.\n3. Place a breakpoint on the following\
    \ line by clicking in the left margin or moving the cursor in the line and pressing\
    \ Command + \\ or choosing Debug ➤ Breakpoints ➤ Add Breakpoint at Current Line:\n\
    \n    ```\n    print (myMessage + \"\\(C2F(temp))\")\n    ```\n\n4. Choose View\
    \ ➤ Navigators ➤ Show Breakpoint Navigator. The Breakpoint Navigator pane appears,\
    \ showing the breakpoint you just created.\n5. Right-click the breakpoint in the\
    \ Breakpoint Navigator pane and choose Edit Breakpoint. A pop-up window appears,\
    \ as shown in Figure [27-13](#A437923_1_En_27_Chapter.html#Fig13).\n\n    ![A437923_1_En_27_Fig13_HTML.jpg](A437923_1_En_27_Fig13_HTML.jpg)\n\
    \n    Figure 27-13.\n    The symbolic breakpoint halts program execution in the\
    \ `C2F` function defined by the Symbol text field.\n\n6. Click in the Condition\
    \ text field and type `temp ➤ 1` and press Return.\n7. Choose Product ➤ Run. Xcode\
    \ highlights your breakpoint to temporarily stop program execution, which means\
    \ that the condition (`temp ➤ 1`) must be true.\n8. Choose Product ➤ Stop to halt\
    \ and exit out of your program and return back to Xcode.\n9. Choose View ➤ Navigators\
    \ ➤ Show Breakpoint Navigator, right-click the breakpoint you created, and choose\
    \ Edit Breakpoint. The pop-up window appears.\n10. Click in the Condition text\
    \ field and edit the text so it reads (`temp ➤ 500`). Press Return.\n11. Choose\
    \ Product ➤ Run. Notice that this time your breakpoint does not stop program execution\
    \ because its condition (`temp ➤ 500`) is not true. Because the breakpoint didn’t\
    \ stop your program, your program’s blank user interface appears.\n12. Choose\
    \ DebugProgram ➤ Quit DebugProgram.\n13. Drag the breakpoint away from the left\
    \ margin and release the left mouse button to delete the breakpoint. (You can\
    \ also right-click the breakpoint in the Breakpoint Navigator pane and choose\
    \ Delete Breakpoint.)\n\n## Summary\n\nErrors or bugs are unavoidable in any program.\
    \ While syntax errors are easy to find and fix, logic errors can be tougher to\
    \ find because you thought your code would create one type of result but it winds\
    \ up creating a different result. Now you’re left trying to figure out what you\
    \ did wrong when you thought you were doing everything right. More difficult to\
    \ track down are runtime errors, which occur seemingly at random because of unknown\
    \ conditions that affect a program.\n\nTo help you track down and eliminate most\
    \ bugs, you can use the `print` command along with comments, but for more robust\
    \ debugging, you should use Xcode’s built-in debugger. With the debugger you can\
    \ set breakpoints in your code and watch how values get stored in one or more\
    \ variables.\n\nA conditional breakpoint only stops program execution when a certain\
    \ condition occurs. A symbolic breakpoint only stops program execution when a\
    \ specific function or method gets called. Once a breakpoint stops a program,\
    \ you can continue examining your code line by line using various step commands.\
    \ The `step into` command lets you view code stored inside a function or method\
    \ while the `step out` command lets you prematurely exit out of a function or\
    \ method and jump back to the function or method call.\n\nBy using breakpoints\
    \ and step commands, you can exhaustively examine how your program works, line\
    \ by line, to eliminate as many errors as possible. The fewer errors your program\
    \ contains, the happier your users will be.\n\n# 28. Planning a Program Before\
    \ and After Coding\n\nBefore you invest days, weeks, months, or years working\
    \ on a program, make sure the world even wants your program in the first place.\
    \ If you’re writing a program for yourself, then you can ignore what the rest\
    \ of the world thinks. However, if you plan on selling your programs to others,\
    \ make sure your program has a future before you even begin.\n\nHere’s one way\
    \ to determine if there’s a market for your program. Look for competition. Most\
    \ people think it’s better to target a market with no competition, but if there’s\
    \ no competition, this could be a big clue that there’s also no market.\n\nHowever,\
    \ if you look for a market loaded with lots of competitors, this means there’s\
    \ a thriving market for that type of program. Just do a quick search for lottery\
    \ picking software or astrology programs and you’ll find plenty of competition.\
    \ The more competition, the more active the market.\n\nIf only one or two big\
    \ companies dominate a particular market, chances are good that the opportunity\
    \ in that market has already passed. For example, despite the availability of\
    \ macOS and Linux, Windows is still the dominant operating system for PCs. Similarly,\
    \ iOS and Android dominate the mobile computer market so you’ll probably waste\
    \ your time trying to write a rival operating system to compete against Windows,\
    \ Android, or iOS.\n\nLikewise, there are only a handful of major word processors,\
    \ spreadsheets, and presentation programs on the market today, which means trying\
    \ to write another general word processor, spreadsheet, or presentation program\
    \ will likely be an exercise in futility.\n\nLots of competition means an active\
    \ market. Little or no competition means that the market has probably already\
    \ settled on a leader and your program likely will never be able to overthrow\
    \ that leader. Trying to convince people to buy your word processor instead of\
    \ using Microsoft Word or Pages will likely be a waste of time.\n\nSo look for\
