    # 理解 `IBAction` 方法


    如果你还记得第 3 章的内容，当时你将用户界面的按钮连接到了 Swift 代码，创建了一个 `IBAction` 方法，它本质上就是一个看起来像这样的函数：


    ```

    @IBAction func changeCase(_ sender: NSButton) {

    labelText.stringValue = messageText.stringValue.uppercased()

    }

    ```


    既然你已经了解了函数的工作方式，让我们逐行分析这段代码。首先，`@IBAction` 标识了一个函数，该函数仅在用户操作某个界面元素时运行。查看参数列表，你会看到
    `(sender: NSButton)`，这表明当用户点击按钮时，`changeCase` 函数将运行花括号内的 Swift 代码。


    任何 `IBAction` 方法中存储的 Swift 代码通常都会以某种方式处理数据。在目前的例子中，它获取文本字段中的文本（由 `IBOutlet` 变量
    `messageText` 表示），将其转换为大写，然后将大写的文本显示在标签中（由 `IBOutlet` 变量 `labelText` 表示）。


    由于有可能两个或更多界面元素连接到同一个 `IBAction` 方法，因此 `sender` 参数用于标识用户点击的是哪个按钮。由于这个 `IBAction`
    方法只连接到一个按钮，所以 `sender` 参数会被忽略。


    `IBAction` 方法不过是一些与界面元素相关联的特殊函数。在任何程序中，你很可能会有多个 `IBAction` 方法（函数），同时还有许多你自定义的其他函数。


    此外，即使你从未见过那些函数运行的源代码，也可能会用到 Cocoa 框架中定义的函数。在创建任何程序时，你都会以这种或那种形式使用函数。


    ## 小结


    函数是执行单一任务的迷你程序。与其试图编写一个庞大的程序，不如编写多个较小的程序（函数），然后将它们拼接在一起组成一个更大的程序。函数就像构建模块一样。


    最简单的函数会反复执行相同的操作，但更灵活的函数能够接收输入，从而利用这些输入来计算结果。当函数接收一个或多个数据块时，它会将其存储在参数中，参数类似于变量。


    有些函数不仅可以接收数据，还能返回一个值。要创建一个返回值的函数，你必须指定返回的数据类型（使用 `->` 符号），并在函数内部使用 `return` 关键字来指定要返回的具体数据。


    如果函数返回单个值，你可以将该值存储在变量中。函数也可以返回多个值，你可以将这些值存储在元组中。


    当你将界面元素（如按钮）连接到 Swift 代码时，会创建称为 `IBAction` 方法的特殊函数。这些 `IBAction` 方法是在用户点击或操作界面元素时运行的程序。


    每次用 Swift 编写程序时，你都需要使用函数。你可以使用 Cocoa 框架中已有的函数，但你很可能也需要创建自己的函数。


    # 12. 定义自定义数据类型


    为了存储数据，Swift 提供了常见的数据类型，如整数（`Int`）、小数（`Float` 或 `Double`）和文本（`String`）。此外，Swift
    还提供了布尔数据类型（`Bool`）来存储 `true` 或 `false` 值。


    尽管几乎每个程序都需要使用这些 Swift 数据类型中的一种或多种，但你可能会发现它们过于局限。因此，Swift 提供了多种基于基本 Swift 数据类型创建自定义数据类型的方法。此外，Swift
    还提供了几种以独特的方式组织基本数据类型（`Int`、`String`、`Double` 等）的方法。定义不同的数据类型组织方式称为数据结构。


    本质上，程序由算法和数据结构组成。算法定义了程序如何处理数据，而数据结构定义了程序如何存储和组织数据。


    程序存储数据的方式能极大地决定程序的速度和效率。如果程序组织数据的方式不佳，可能就需要很长时间才能找到所需的数据。组织数据没有绝对的正确或错误之分，因为每个程序的需求都不同。


    创建自定义数据类型能使程序更易于理解。Swift 提供了以下几种创建自定义数据类型的方式：


    - 类型别名

    - 枚举

    - 结构体

    - 不同数据类型的组合


    ## 类型别名


    将变量声明为 `Int`、`Double` 或 `String` 等数据类型，只能告诉你该变量可以存储什么类型的数据，但不能说明这些数据的含义。例如，如果你声明两个变量为
    `Int` 数据类型，每个变量都可以存储整数，但一个变量可能表示年龄，而另一个变量可能表示员工 ID 编号。


    为了使数据类型的用途更清晰，Swift 允许你使用一种叫做类型别名的特性。类型别名让你能为泛型数据类型名称赋予一个描述性的名称，例如：


    ```

    typealias EmployeeID = Int

    ```


    现在，你不再需要将变量声明为整数（`Int`）数据类型，而可以将其声明为 `EmployeeID` 数据类型，例如：


    ```

    typealias EmployeeID = Int

    var employee : EmployeeID

    employee = 192

    ```


    这等同于：


    ```

    var employee : Int

    employee = 192

    ```

