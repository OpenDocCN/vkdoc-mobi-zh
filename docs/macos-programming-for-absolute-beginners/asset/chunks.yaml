    \ 再次出现。\n\n如您所见，您几乎没写多少 Swift 代码就创建了一个简单的 Macintosh 程序。您实际编写的 Swift 代码只是单行代码，它获取存储在文本栏中的文本，将其转换为大写，然后将这个大写的文本存储在标签中。\n\
