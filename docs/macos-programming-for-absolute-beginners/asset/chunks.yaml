- fmt: "# Using Enumerations\n\nOne huge problem with the basic data types in Swift\
    \ is that they tell you what the data contains (integers, strings, etc.) but they\
    \ don’t tell you what that data means. `Typealias`es can help give meaningful\
    \ names to data types, but they’re only one solution. A second solution is enumerations.\n\
    \nThe idea behind enumerations is that they let you create your own data types\
    \ and list the choices available for that data type. When you declare a variable\
    \ as an `Int` data type, you’re essentially allowing that variable to hold one\
    \ of many possible integer values, which will likely be far more than you really\
    \ need.\n\nEnumerations let you define your own data type with a descriptive name\
    \ and define the list of possible choices to store. To create an enumeration,\
    \ you have to define an enumeration name, such as\n\n```\nenum EnumerationName\
    \ {\n// enumeration definition goes here\n}\n```\n\nThe enumerations name is typically\
    \ capitalized. Once you’ve created an enumeration name, you need to list the possible\
    \ choices that enumeration can hold. The list of choices you create does not have\
    \ to be any data type at all but can be any descriptive name you want.\n\nSuppose\
    \ you want to create a data type representing acceptable pets. You can create\
    \ an enumeration like this:\n\n```\nenum Pets {\ncase dog\ncase cat\ncase fish\n\
    case bird\n}\n```\n\nThis defines the enumeration to hold only the values `dog`,\
    \ `cat`, `fish`, or `bird`. Because you can name an enumeration’s data types anything\
    \ you want, you can make the choices descriptive and meaningful.\n\nOnce you’ve\
    \ created an enumeration , you need to declare a variable to represent that enumeration,\
    \ such as\n\n```\nvar allowed : Pets\n```\n\nIf you want to assign a value to\
    \ this variable (declared as a `Pets` data type), you need to specify one of the\
    \ choices defined by the enumeration, such as\n\n```\nallowed = Pets.cat\n```\n\
    \nor as a shortcut,\n\n```\nallowed = .cat\n```\n\nSince the `allowed` variable\
    \ is already declared as a `Pets` data type, you don’t need to type “Pets” again\
    \ when assigning an allowed choice (`.cat` instead of `Pets.cat`).\n\nTo see how\
    \ a function with parameters works, follow these steps:\n\n1.  Make sure your\
    \ `IntroductoryPlayground` file is loaded in Xcode.  \n2.  Edit the code as follows:\n\
    \n    ```\n    enum Pets {\n    case dog\n    case cat\n    case fish\n    case\
    \ bird\n    }\n    var allowed : Pets\n    allowed = .dog\n    print (\"A \\(allowed)\
    \ is an acceptable pet\")\n    allowed = Pets.cat\n    print (\"A \\(allowed)\
    \ is an acceptable pet\")\n    ```\n\nThe `Pets` enumeration defines `Pets` to\
    \ hold a value of `dog`, `cat`, `fish`, or `bird`.\n\nThe `allowed` variable is\
    \ declared as a `Pets` data type so it can only hold one of those four values\
    \ (`dog`, `cat`, `fish`, or `bird`).\n\nAssigning a value to the `allowed` variable\
    \ can either list the `Pets` enumeration name or omit it. Then the `print` command\
    \ prints the `Pets` data in a string, as shown in Figure [12-1](#A437923_1_En_12_Chapter.html#Fig1).\n\
    \n![A437923_1_En_12_Fig1_HTML.jpg](A437923_1_En_12_Fig1_HTML.jpg)\n\nFigure 12-1.\
    \  \nUsing enumerations to define descriptive data\n\nWhat happens if you assign\
    \ data to a variable that isn’t defined by the enumeration? Then Swift will catch\
    \ the error and keep your program from running. So if you try\n\n```\nallowed\
    \ = .hamster\n```\n\nit will fail to run because a `hamster` is not defined as\
    \ a possible choice inside the `Pets` enumeration. Just as Swift won’t let you\
    \ store an integer inside a `String` variable, so it won’t let you store any data\
    \ in an enumeration that isn’t specifically defined.\n\n# Using Structures\n\n\
    Suppose you want to store a list of names, street addresses, employee ID numbers,\
    \ and annual salary amounts for several hundred people. How would you store all\
    \ this data?\n\nTo store one person’s information, you could create several variables,\
    \ such as\n\n```\nvar name : String\nvar street : String\nvar ID : Int\nvar salary\
    \ : Double\n```\n\nUnfortunately, creating separate variables doesn’t clearly\
    \ identify that each person’s name must also include a street address, employee\
    \ ID, and salary. To get around this problem, you can group related variables\
    \ in one location known as a structure.\n\nStructures store different types of\
    \ data in a single place. With a traditional variable, you can only store one\
    \ chunk of data at a time. With a structure, you can define two or more chunks\
    \ of data to store in a single variable. Variables declared inside a structure\
    \ are called properties.\n\nA structure that stores two chunks of data can look\
    \ like this:\n\n```\nstruct StructureName {\nvar variableName1 : dataType\nvar\
    \ variableName2 : dataType\n}\n```\n\nRemember, the data type of each variable\
    \ can be simple data types like `Int`, `String`, or `Double`, or they can be more\
    \ complicated data types like arrays, tuples, sets, enumerations, or dictionaries.\n\
    \nYou can define two or more variables inside a structure where each variable\
    \ can contain different data types, such as a string or an integer. No matter\
    \ how many properties a structure holds, you must initialize the properties before\
    \ you can store data in them.\n\nSwift provides three ways to initialize properties.\
    \ First, you can define an initial value for each property, like this:\n\n```\n\
    struct StructureName {\nvar variableName1 : dataType = initialValue\nvar variableName2\
    \ : dataType = initialValue\n}\n```\n\nTo simplify the property declaration, a\
    \ second way is to omit the data type and let Swift infer the data type, like\
    \ this:\n\n```\nstruct StructureName {\nvar variableName1 = initialValue\nvar\
    \ variableName2 = initialValue\n}\n```\n\nWhen you assign an initial value to\
    \ properties, you can create a variable to represent that structure, like this:\n\
    \n```\nvar variableName = structureName()\n```\n\nA third way to initialize structure\
    \ properties is to create an `init` function. This means you must create a list\
    \ of property names and their data types. Then you assign values to those properties\
    \ when you create a variable to represent that structure.\n\nFor example, suppose\
    \ you want to store information about a person such as their name, e-mail address,\
    \ and phone number. Instead of creating three separate variables, you can create\
    \ a single structure, like this:\n\n```\nstruct Person {\nvar name : String\n\
    var email : String\nvar phone : String\n}\n```\n\nIf you just define the data\
    \ types of each property , you need to create an initializer called `init`, as\
    \ follows:\n\n```\nstruct Person {\nvar name : String\nvar email : String\nvar\
    \ phone : String\ninit (name: String, email: String, phone: String) {\nself.name\
    \ = name\nself.email = email\nself.phone = phone\n}\n}\n```\n\nWhen you create\
    \ a variable based on this structure, you need include initial values, such as\n\
    \n```\nvar workers = person(name: \"Sue\", email: \"sdk@aol.com\", phone: \"555-1234\"\
    )\n```\n\nCreating a structure involves three parts:\n\n*   Create a structure\
    \ with two or more variables (properties).\n*   Initialize all of the structure\
    \ properties either by assigning values to each property or creating an `init`\
    \ function.\n*   Create a variable to represent that structure."
