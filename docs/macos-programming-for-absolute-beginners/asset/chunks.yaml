    \ selected in the Show Attributes Inspector pane or set the `usesDataSource` property\
    \ to true using Swift code.\n\nTo see how a data source works to fill a combo\
    \ box with a list of items, follow these steps:\n\n1.  Make sure the ComboProgram\
    \ project is loaded in Xcode.  \n2.  Click the `ViewController.swift` file in\
    \ the Project Navigator pane.  \n3.  Modify the class name in the `AppDelegate.swift`\
    \ file to include the `NSComboBoxDataSource` protocol as follows:\n\n    ```\n\
    \    class ViewController : NSViewController, NSComboBoxDataSource {\n    ```\n\
    \n4.  Underneath the IBOutlet lines, add the following line to create an array\
    \ of strings that will fill the combo box’s item list:\n\n    ```\n    let myArray\
    \ = [\"Sandwich\", \"Chips\", \"Soda\", \"Salad\"]\n    ```\n\n5.  Modify the\
    \ `viewDidLoad` function as follows:\n\n    ```\n    override func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    // Do any additional setup after loading the\
    \ view.\n    self.myCombo.usesDataSource = true\n    self.myCombo.dataSource =\
    \ self\n    }\n    ```\n\n    This Swift code defines the data source for the\
    \ combo box (identified by the `myCombo` IBOutlet) as self, which means the same\
    \ class is also the data source. It makes sure the `usesDataSource` property is\
    \ true to use a data source.  \n6.  Above the IBAction method, add the following\
    \ two function implementations:  \n7.  Above the last curly bracket in the `ViewController.swift`\
    \ file, add the following:\n\n    ```\n    func numberOfItems (in comboBox: NSComboBox)\
    \ -> Int {\n    return myArray.count\n    }\n    func comboBox(_ comboBox: NSComboBox,\
    \ objectValueForItemAt index: Int) -> Any? {\n    return myArray[index]\n    }\n\
    \    ```\n\n    The `numberOfItems` function counts all the items in the myArray\
    \ array and returns that integer. The comboBox function places each array item\
    \ in the combo box’s item list.  \n8.  Choose Product ➤ Run.  \n9.  Click the\
    \ downward-pointing arrow of the combo box. Notice that its item list contains\
    \ the items defined in myArray (“Sandwich”, “Chips”, “Soda”, and “Salad”).  \n\
    10.  Click Sandwich in the combo box to select it and then click the push button.\
    \ Notice that the label underneath displays Sandwich.  \n11.  Choose ComboProgram\
    \ ➤ Quit ComboProgram.  \n\nThis simple program shows how to retrieve a list of\
    \ items from another data source (in this case an array called myArray) to fill\
    \ an item list for a combo box. The complete code for the `ViewController.swift`\
    \ file should look like this:\n\n```\nimport Cocoa\nclass ViewController: NSViewController,\
    \ NSComboBoxDataSource {\n@IBOutlet weak var myCombo: NSComboBox!\n@IBOutlet weak\
    \ var comboResult: NSTextField!\nlet myArray = [\"Sandwich\", \"Chips\", \"Soda\"\
    , \"Salad\"]\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n// Do any additional\
    \ setup after loading the view.\nself.myCombo.usesDataSource = true\nself.myCombo.dataSource\
    \ = self\n}\noverride var representedObject : Any? {\ndidSet {\n// Update the\
    \ view, if already loaded.\n}\n}\n@IBAction func showResult(_ sender: NSButton)\
    \ {\ncomboResult.stringValue = myCombo.stringValue\n}\nfunc numberOfItems(in comboBox:\
    \ NSComboBox) -> Int {\nreturn myArray.count\n}\nfunc comboBox(_ comboBox: NSComboBox,\
    \ objectValueForItemAt index: Int) -> Any? {\nreturn myArray[index]\n}\n}\n```\n\
    \n## Summary\n\nText fields allow the user to type anything such as numbers or\
    \ strings, so a text field offers multiple properties (`intValue`, `floatValue`,\
    \ `doubleValue`, and `stringValue`) to store typed information in the proper data\
    \ type. To restrict numeric information the user may type, you can use a number\
    \ formatter to define minimum and/or maximum values along with defining different\
    \ ways the user can enter numeric data, such as with a percentage sign or a currency\
    \ sign.\n\nBesides ordinary text fields, Xcode offers several variations of text\
    \ fields for specialized purposes. Labels are designed for simply displaying text\
    \ without allowing the user to edit the displayed text. A secure text field masks\
    \ typed-in data to keep it safe from prying eyes. A token field displays typed-in\
    \ data as groups or tokens while a search field offers a property to remember\
    \ previously typed-in data.\n\nCombo boxes combine the features of a text field\
    \ with a pop-up button. A combo box can display a list of valid options that the\
    \ user can click, or the user can type in data. You can define a combo box’s list\
    \ of options in the Show Attributes Inspector pane, or you can retrieve data from\
    \ another source such as from an array.\n\nThe main purpose of text fields and\
    \ combo boxes is to allow the user to type in any type of data. When the user\
    \ types in data, you may need to write Swift code to verify that the entered data\
    \ is valid for your program.\n\n# 20. Designing a User Interface with Constraints\n\
    \nA user interface lets people control a program, give a program data, and receive\
    \ data back again. Since people can only interact with a program through its user\
    \ interface, it’s crucial that the user interface is uncluttered and easy to understand.\n\
    \nWhen designing a program’s user interface, experiment with different designs.\
    \ What may seem intuitive and simple for you to use may seem completely foreign\
    \ and confusing to a novice.\n\nTo help you create and experiment with different\
    \ user interface designs, Xcode makes it easy for you to drag and arrange items\
    \ on a user interface such as buttons, text fields, and check boxes. Once you’ve\
    \ found the best possible user interface design, the next challenge is making\
    \ sure that user interface always looks right.\n\nWith macOS programs , the user\
    \ interface appears in a window that the user can resize. This means the user\
    \ might stretch a window wider (or skinnier), taller (or shorter), or do both\
    \ at the same time, so your user interface must adapt to the different window\
    \ sizes. Even the best user interface will be worthless if the program window\
    \ shrinks and cuts off or hides part of the user interface from view, as shown\
    \ in Figure [20-1](#A437923_1_En_20_Chapter.html#Fig1).\n\n![A437923_1_En_20_Fig1_HTML.jpg](A437923_1_En_20_Fig1_HTML.jpg)\n\
    \nFigure 20-1.\n\nResizing a window may cut off or hide a program’s user interface\n\
    \nTo make sure resizing a window won’t distort a user interface, you need to use\
    \ constraints. Constraints can define one or more of the following:\n\n*   The\
    \ maximum and minimum size a user interface item can expand or shrink\n*   The\
    \ position of a user interface item in relation to the borders of the window\n\
    *   The distance between two user interface items\n\nBy applying constraints to\
    \ all parts of your user interface, you can insure that your user interface will\
    \ always look good no matter how the user may resize the window."
  trans: "\n### 使用数据源\n\n当组合框需要显示可能随时间变化的数据时，使用数据源是最佳选择，例如显示来自数据库的信息列表。要使用数据源，你需要编写\
    \ Swift 代码。首先，你需要在 `ViewController.swift` 文件中遵循 `NSComboBoxDataSource` 协议，如下所示：\n\
    \n```\nclass ViewController: NSViewController, NSComboBoxDataSource {\n```\n\n\
    接下来，你需要编写两个函数。一个函数需要计算要在组合框中显示的项目数量。第二个函数需要检索数据以插入到组合框的项目列表中。\n\n最后，你需要指定一个数据源（包含你想要在组合框中显示的数据的文件），并确保在“显示属性检查器”窗格中选中了组合框的“使用数据源”复选框，或者使用\
    \ Swift 代码将 `usesDataSource` 属性设置为 `true`。\n\n若要查看数据源如何为组合框填充项目列表，请按照以下步骤操作：\n\
    \n1.  确保 ComboProgram 项目已在 Xcode 中加载。  \n2.  点击项目导航窗格中的 `ViewController.swift`\
    \ 文件。  \n3.  修改 `AppDelegate.swift` 文件中的类名，以包含 `NSComboBoxDataSource` 协议，如下所示：\n\
    \n    ```\n    class ViewController : NSViewController, NSComboBoxDataSource {\n\
    \    ```\n\n4.  在 `IBOutlet` 行下方，添加以下行以创建一个字符串数组，用于填充组合框的项目列表：\n\n    ```\n  \
    \  let myArray = [\"Sandwich\", \"Chips\", \"Soda\", \"Salad\"]\n    ```\n\n5.\
    \  按如下方式修改 `viewDidLoad` 函数：\n\n    ```\n    override func viewDidLoad() {\n \
    \   super.viewDidLoad()\n    // 执行视图加载后的任何其他设置。\n    self.myCombo.usesDataSource\
    \ = true\n    self.myCombo.dataSource = self\n    }\n    ```\n\n    这段 Swift 代码将组合框的数据源（由\
    \ `myCombo` IBOutlet 标识）定义为 `self`，这意味着同一个类同时也是数据源。它确保 `usesDataSource` 属性为 `true`，以便使用数据源。\
    \  \n6.  在 `IBAction` 方法上方，添加以下两个函数的实现：  \n7.  在 `ViewController.swift` 文件的最后一个花括号上方，添加以下内容：\n\
    \n    ```\n    func numberOfItems (in comboBox: NSComboBox) -> Int {\n    return\
    \ myArray.count\n    }\n    func comboBox(_ comboBox: NSComboBox, objectValueForItemAt\
    \ index: Int) -> Any? {\n    return myArray[index]\n    }\n    ```\n\n    `numberOfItems`\
    \ 函数计算 `myArray` 数组中所有项目的数量并返回该整数。`comboBox` 函数将每个数组项目放置到组合框的项目列表中。  \n8.  选择“产品”➤“运行”。\
    \  \n9.  点击组合框向下指的箭头。注意，其项目列表包含了在 `myArray` 中定义的项目（“Sandwich”、“Chips”、“Soda”和“Salad”）。\
    \  \n10. 在组合框中点击“Sandwich”将其选中，然后点击“按钮”。注意，下方的标签显示“Sandwich”。  \n11. 选择“ComboProgram”➤“退出\
    \ ComboProgram”。  \n\n这个简单的程序演示了如何从另一个数据源（在本例中是一个名为 `myArray` 的数组）检索项目列表，以填充组合框的项目列表。`ViewController.swift`\
    \ 文件的完整代码应如下所示：\n\n```\nimport Cocoa\nclass ViewController: NSViewController,\
    \ NSComboBoxDataSource {\n@IBOutlet weak var myCombo: NSComboBox!\n@IBOutlet weak\
    \ var comboResult: NSTextField!\nlet myArray = [\"Sandwich\", \"Chips\", \"Soda\"\
    , \"Salad\"]\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n// 执行视图加载后的任何其他设置。\n\
    self.myCombo.usesDataSource = true\nself.myCombo.dataSource = self\n}\noverride\
    \ var representedObject : Any? {\ndidSet {\n// 如果视图已加载，则更新视图。\n}\n}\n@IBAction\
    \ func showResult(_ sender: NSButton) {\ncomboResult.stringValue = myCombo.stringValue\n\
    }\nfunc numberOfItems(in comboBox: NSComboBox) -> Int {\nreturn myArray.count\n\
    }\nfunc comboBox(_ comboBox: NSComboBox, objectValueForItemAt index: Int) -> Any?\
    \ {\nreturn myArray[index]\n}\n}\n```\n\n## 总结\n\n文本字段允许用户输入任何内容，例如数字或字符串，因此文本字段提供了多个属性（`intValue`、`floatValue`、`doubleValue`\
    \ 和 `stringValue`），以将输入的信息存储为适当的数据类型。要限制用户可能输入的数值信息，你可以使用数字格式化器来定义最小值和/或最大值，同时定义用户输入数值数据的不同方式，例如使用百分比符号或货币符号。\n\
    \n除了普通的文本字段之外，Xcode 还提供了几种用于特定用途的文本字段变体。标签旨在简单地显示文本，而不允许用户编辑显示的文本。安全文本字段对输入的数据进行掩码处理，以防被窥视。令牌字段将输入的数据显示为组或令牌，而搜索字段则提供一个属性来记住之前输入的数据。\n\
    \n组合框结合了文本字段和弹出按钮的特性。组合框可以显示一个有效选项列表供用户点击，或者用户可以自行输入数据。你可以在“显示属性检查器”窗格中定义组合框的选项列表，也可以从其他来源（例如数组）检索数据。\n\
    \n文本字段和组合框的主要目的是允许用户输入任何类型的数据。当用户输入数据时，你可能需要编写 Swift 代码来验证输入的数据是否对你的程序有效。\n\n\
    # 20. 使用约束设计用户界面\n\n用户界面让人们能够控制程序、向程序提供数据并接收返回的数据。由于人们只能通过程序界面与之交互，因此确保用户界面简洁明了且易于理解至关重要。\n\
    \n在设计程序的用户界面时，可以尝试不同的设计方案。对你来说可能直观易用的东西，对新手来说可能完全陌生且令人困惑。\n\n为了帮助你创建和尝试不同的用户界面设计，Xcode\
    \ 让你能够轻松地在用户界面上拖放和排列按钮、文本字段、复选框等项目。一旦找到最佳的用户界面设计方案，接下来的挑战就是确保该用户界面在任何情况下都看起来正确。\n\
    \n对于 macOS 程序，用户界面会出现在一个可调整大小的窗口中。这意味着用户可能会将窗口拉伸得更宽（或更窄）、更高（或更矮），或同时进行这两种操作，因此你的用户界面必须适应不同的窗口尺寸。如果程序窗口缩小并切断或隐藏了用户界面的部分内容，即使是最好的用户界面也会变得毫无价值，如图\
    \ 20-1 所示。\n\n![A437923_1_En_20_Fig1_HTML.jpg](img/A437923_1_En_20_Fig1_HTML.jpg)\n\
    \n图 20-1. 调整窗口大小可能会切断或隐藏程序的用户界面\n\n为确保调整窗口大小不会扭曲用户界面，你需要使用约束。约束可以定义以下一项或多项内容：\n\
    \n- 用户界面元素可以扩展或收缩的最大和最小尺寸\n- 用户界面元素相对于窗口边框的位置\n- 两个用户界面元素之间的距离\n\n通过将约束应用于用户界面的所有部分，你可以确保无论用户如何调整窗口大小，用户界面都能始终保持良好外观。\n"
- fmt: '# Constraining a Window Size


    By default, every window of your program can be resized by the user. This means
    the user can shrink or expand a window. When the user shrinks a window, the window
    risks cutting off or hiding part of the user interface. When the user expands
    a window, the window will contain mostly empty space.


    To constrain the maximum and minimum size of a window, follow these steps:


    1. Click the `.xib` or `.storyboard` file that contains your program''s user interface.
    With storyboards, make sure you click the window controller (not the view controller).

    2. Choose View ➤ Utilities ➤ Show Size Inspector. The Size Inspector pane appears,
    as shown in Figure 20-2.


    ![A437923_1_En_20_Fig2_HTML.jpg](A437923_1_En_20_Fig2_HTML.jpg)


    *Figure 20-2. The Size Inspector lets you define a maximum and minimum window
    size*


    3. Click the Minimum Content Size check box under the Content Size category and
    type a value in the Width and Height text fields. The values you define here will
    be the minimum size of the window.

    4. Click the Maximum Content Size check box under the Content Size category and
    type a value in the Width and Height text fields. The values you define here will
    be the maximum size of the window.


    By defining a minimum size, you can insure that shrinking the window won''t cut
    off or hide part of the user interface. By defining a maximum size, you can insure
    that expanding the size of a window won''t create a large empty space.


    ## Constraining User Interface Items to Window Edges


    When the user resizes a window, any items in that window such as buttons, text
    fields, or labels, remain stationary. That''s why shrinking a window can cover
    up or hide part of a user interface while expanding a window can create empty
    space.


    To make a user interface adapt to changing window sizes, you need to place constraints
    between user interface items (buttons, text fields, etc.) to the sides of the
    window. This way, when a user resizes a window, the user interface item remains
    a fixed distance from one of the window edges. This allows a user interface to
    expand or shrink as a window changes its width and/or height.


    To see how to use constraints to pin a user interface item to a window edge, follow
    these steps:


    1. From within Xcode choose File ➤ New ➤ Project.

    2. Click Application under the macOS category.

    3. Click Cocoa Application and click the Next button. Xcode now asks for a product
    name.

    4. Click in the Product Name text field and type `ConstraintProgram`.

    5. Make sure the Language pop-up menu displays Swift and that the "Use Storyboards"
    check box is selected.

    6. Click the Next button. Xcode asks where you want to store the project.

    7. Choose a folder to store your project and click the Create button.

    8. Click the `Main.storyboard` file in the Project Navigator. Your program''s
    user interface appears.

    9. Choose View ➤ Utilities ➤ Show Object Library.

    10. Place a push button anywhere on the scene. (Make sure you place it on the
    view controller and not on the window controller.)

    11. Choose Product ➤ Run. The user interface appears.

    12. Move the mouse pointer over the bottom right corner of the program window
    and drag the mouse to the right and down. Notice that although the window changes
    size, the push button remains in place.

    13. Choose `ConstraintProgram` ➤ Quit `ConstraintProgram`. Xcode appears again.
    The push button remained in place when you resized the window because the button
    had no constraints. By placing a constraint on the button to the right window
    edge, you can make the button move as the right window edge moves as well.

    14. Click the `Main.storyboard` file in the Project Navigator and then click the
    push button to select it.

    15. Move the mouse pointer over the push button, hold down the Control key, and
    drag the mouse to the right towards the right edge of the window. Xcode displays
    a blue line, as shown in Figure 20-3.


    ![A437923_1_En_20_Fig3_HTML.jpg](A437923_1_En_20_Fig3_HTML.jpg)


    *Figure 20-3. Control-dragging the mouse creates a constraint*


    16. Release the Control key and left mouse button in-between the push button and
    the right edge of the window. A pop-up menu appears, as shown in Figure 20-4.


    ![A437923_1_En_20_Fig4_HTML.jpg](A437923_1_En_20_Fig4_HTML.jpg)


    *Figure 20-4. A pop-up menu for choosing constraints*


    17. Choose the "Trailing Space to Container" option. Xcode draws a constraint
    from the push button to the right edge of the window, as shown in Figure 20-5.


    ![A437923_1_En_20_Fig5_HTML.jpg](A437923_1_En_20_Fig5_HTML.jpg)


    *Figure 20-5. A constraint appears as a line*


    18. Choose Product ➤ Run. The user interface appears.

    19. Move the mouse pointer over the bottom right corner of the program window
    and drag the mouse to the right and down. Notice that because the push button
    has a constraint that links it to the right window edge, each time the window
    changes size, the push button moves to remain a fixed distance from the right
    edge of the window.

    20. Choose `ConstraintProgram` ➤ Quit `ConstraintProgram`. Xcode appears again.


    When you place one constraint on the push button, Xcode displays a red border
    around the push button. This red border lets you know that you don''t have enough
    constraints on the user interface item.


    In this case, the constraint defines how the push button reacts when the right
    edge of the window moves. However, the push button lacks constraints that define
    how the push button reacts when the window shrinks or expands in height.


    Ideally, you should place enough constraints on every user interface item so they
    define all possible variations if the window changes width or height. To fix this
    problem for the push button, you need to add another constraint that defines the
    push button''s vertical position to the top or bottom of the window.


    1. Click the push button to select it.

    2. Hold down the Control key and drag the mouse down towards the bottom of the
    window.

    3. Release the Control key and left mouse button in-between the push button and
    the bottom edge of the window. A pop-up menu appears, as shown in Figure 20-6.


    ![A437923_1_En_20_Fig6_HTML.jpg](A437923_1_En_20_Fig6_HTML.jpg)


    *Figure 20-6. Another pop-up menu for applying constraints to the push button*


    4. Choose the "Bottom Space to Container" option. Xcode draws a constraint from
    the push button to the bottom of the window. Notice that Xcode no longer highlights
    the border around the push button in red because you have enough constraints.

    5. Choose Product ➤ Run. The user interface appears.

    6. Move the mouse pointer over the bottom right corner of the program window and
    drag the mouse to the right and down. Notice that because the push button has
    a constraint that links it to the right and bottom window edges, each time the
    window changes size, the push button moves to remain a fixed distance from the
    right and bottom edge of the window.

    7. Choose `ConstraintProgram` ➤ Quit `ConstraintProgram`.


    With each user interface item, you can define a constraint to the top, left, right,
    or bottom of the window:


    - `Trailing Space to Container`: Constrains an item to the right edge of a window.

    - `Leading Space to Container`: Constrains an item to the left edge of a window.

    - `Top Space to Container`: Constrains an item to the top edge of a window.

    - `Bottom Space to Container`: Constrains an item to the bottom edge of a window.


    Once you''ve placed one or more constraints on a user interface item, you can
    see more details about those constraints in the Size Inspector pane, as shown
    in Figure 20-7.


    ![A437923_1_En_20_Fig7_HTML.jpg](A437923_1_En_20_Fig7_HTML.jpg)


    *Figure 20-7. The Size Inspector pane lists details of each constraint*'
