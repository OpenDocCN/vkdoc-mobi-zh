  trans: "\n```swift\nmyAlert.beginSheetModal(for: NSApp.keyWindow!, completionHandler:\
    \ {(choice:NSModalResponse) -> Void in\n    switch choice {\n    case NSAlertFirstButtonReturn:\n\
    \        print (\"用户点击了“忽略”\")\n    case NSAlertSecondButtonReturn:\n        print\
    \ (\"用户点击了“运行”\")\n    case NSAlertThirdButtonReturn:\n        print (\"用户点击了“恐慌”\"\
    )\n    case NSAlertThirdButtonReturn + 1:\n        print (\"用户点击了“不做任何事”\")\n\
    \    default: break\n    }\n    if myAlert.suppressionButton!.state == 1 {\n \
    \       print (\"已勾选\")\n    } else {\n        print (\"未勾选\")\n    }\n})\n```\n\
    \n将闭包直接内联放在方法中可以缩短代码量，但代价是可能降低整体代码的可读性。通过名称分离闭包并按名称调用，可以更方便地在程序其他位置重复使用该闭包，同时也能让代码更清晰，但代价是你需要编写更多代码。\n\
    \n请选择你最喜欢的方式，但正如编程的所有方面一样，保持一致的风格，这样即使日后你不在场解释代码，其他程序员也能轻松理解。\n\n## 使用面板\n\n面板代表\
    \ macOS 程序所需的常见用户界面元素，例如显示“打开”面板，让用户选择要打开的文件；以及“保存”面板，让用户选择存储文件的文件夹。“打开”面板基于 `NSOpenPanel`\
    \ 类，而“保存”面板基于 `NSSavePanel` 类。\n\n### 创建打开面板\n\n“打开”面板让用户选择一个要打开的文件。如果用户选择了文件，该面板需要返回一个文件名。“打开”面板使用的一些属性包括：\n\
    \n*   `canChooseFiles`：允许用户选择文件。\n*   `canChooseDirectories`：允许用户选择文件夹或目录。\n*\
    \   `allowsMultipleSelection`：允许用户选择多个项目。\n*   `urls`：保存所选项目的名称。如果 `allowsMultipleSelection`\
    \ 属性设置为 `true`，那么 `urls` 属性保存一个项目数组；否则，它只保存单个项目。\n\n要了解如何使用“打开”面板，请按照以下步骤操作：\n\
    \n1.  在 Xcode 中，选择“文件” ➤ “新建” ➤ “项目”。\n2.  在 macOS 类别下单击“应用程序”。\n3.  单击“Cocoa\
    \ 应用程序”，然后单击“下一步”按钮。Xcode 会要求输入产品名称。\n4.  在“产品名称”文本字段中单击，然后输入 `PanelProgram`。\n\
    5.  确保“语言”弹出菜单显示 Swift，并且“使用 Storyboard”复选框已勾选。\n6.  单击“下一步”按钮。Xcode 会询问你想将项目存储在哪里。\n\
    7.  选择一个文件夹来存储项目，然后单击“创建”按钮。\n8.  在项目导航器中单击 `Main.storyboard` 文件。程序的用户界面会显示出来。\n\
    9.  选择“视图” ➤ “工具” ➤ “显示对象库”。对象库会出现在 Xcode 窗口的右下角。\n10. 将一个“按钮”拖放到用户界面窗口上，然后双击它，将其标题更改为\
    \ `打开`。\n11. 选择“视图” ➤ “助理编辑器” ➤ “显示助理编辑器”。`ViewController.swift` 文件会出现在用户界面旁边。\n\
    12. 将鼠标指针移到“按钮”上，按住 Control 键，然后将鼠标拖到 `ViewController.swift` 文件底部最后一个花括号的上方。\n\
    13. 释放 Control 键和鼠标按钮。会弹出一个窗口。\n14. 在“连接”弹出菜单中单击，并选择“操作”。\n15. 在“名称”文本字段中单击，然后输入\
    \ `openPanel`。\n16. 在“类型”弹出菜单中单击，选择 `NSButton`，然后单击“连接”按钮。Xcode 会创建一个空的 `IBAction`\
    \ 方法。\n17. 按如下方式修改 `IBAction` 方法：\n\n    ```swift\n    @IBAction func openPanel(_\
    \ sender: NSButton) {\n        let myOpen = NSOpenPanel()\n        myOpen.canChooseFiles\
    \ = true\n        myOpen.canChooseDirectories = true\n        myOpen.allowsMultipleSelection\
    \ = true\n        myOpen.begin { (result) -> Void in\n            if result ==\
    \ NSFileHandlingPanelOKButton {\n                print (myOpen.urls)\n       \
    \     }\n        }\n    }\n    ```\n\n18. 选择“产品” ➤ “运行”。用户界面会显示出来。\n19. 单击该按钮。会出现一个“打开”面板，如图\
    \ 21-5 所示。\n\n    ![A437923_1_En_21_Fig5_HTML.jpg](img/A437923_1_En_21_Fig5_HTML.jpg)\n\
    \n    图 21-5. 打开面板\n\n20. 按住 Command 键，然后点击两个不同的项目，例如两个不同的文件，或者一个文件和一个文件夹。\n21.\
    \ 单击“打开”按钮。\n22. 选择“PanelProgram” ➤ “退出 PanelProgram”。Xcode 会再次出现。在调试区域中，你应该会看到你所选文件/文件夹的列表。\n\
    \n**注意：** “打开”面板只负责选择文件/文件夹，你仍然需要编写 Swift 代码来实际打开用户选择的任何文件。\n\n### 创建保存面板\n\n\
    “保存”面板看起来和“打开”面板类似，但其目的是让用户选择一个文件夹并定义一个文件名来保存文件。如果用户选择了文件，该面板需要返回一个文件名。“保存”面板使用的一些属性包括：\n\
    \n*   `title`：在“保存”面板顶部显示文本。如果未定义，默认显示“保存”。\n*   `prompt`：在默认按钮上显示文本。\n*   `url`：保存用户所选内容的路径名和文件名。\n\
    *   `nameFieldStringValue`：仅保存用户选择的文件名。\n\n要了解如何使用“保存”面板，请按照以下步骤操作：\n\n1.  确保在\
    \ Xcode 中加载了 `PanelProgram` 项目。\n2.  在项目导航器窗格中单击 `Main.storyboard` 文件。\n3.  将一个“按钮”拖放到用户界面上，然后双击它，将其标题更改为\
    \ `保存`。\n4.  选择“视图” ➤ “助理编辑器” ➤ “显示助理编辑器”。Xcode 会在用户界面旁边显示 `ViewController.swift`\
    \ 文件。\n5.  将鼠标指针移到“保存”按钮上，按住 Control 键，然后将鼠标拖到 `ViewController.swift` 文件中 `IBOutlet`\
    \ 行的下方。\n6.  释放 Control 键和鼠标。会弹出一个窗口。\n7.  在“连接”弹出菜单中单击，并选择“操作”。\n8.  在“名称”文本字段中单击，输入\
    \ `savePanel`，然后单击“连接”按钮。\n9.  在“类型”弹出菜单中单击，选择 `NSButton`。然后单击“连接”按钮。Xcode 会创建一个空的\
    \ `IBAction` 方法。\n10. 按如下方式修改这个 `IBAction` 方法：\n\n    ```swift\n    @IBAction\
    \ func savePanel(_ sender: NSButton) {\n        let mySave = NSSavePanel()\n \
    \       mySave.title = \"在此处保存文件\"\n        mySave.prompt = \"保存我\"\n        mySave.begin\
    \ { (result) -> Void in\n            if result == NSFileHandlingPanelOKButton\
    \ {\n                print (mySave.url!)\n                print (mySave.nameFieldStringValue)\n\
    \            }\n        }\n    }\n    ```\n\n11. 选择“产品” ➤ “运行”。用户界面会显示出来。\n12.\
    \ 单击“保存”按钮。会出现一个“保存”面板，如图 21-6 所示。请注意，`title` 属性创建了出现在“保存”面板顶部的文本，而 `prompt` 属性则创建了出现在“保存”面板右下角默认按钮上的文本。\n\
    \n    ![A437923_1_En_21_Fig6_HTML.jpg](img/A437923_1_En_21_Fig6_HTML.jpg)\n\n\
    \    图 21-6. 紧凑型保存面板\n\n13. 单击“另存为”文本字段最右侧出现的“展开”按钮。“保存”面板会展开，如图 21-7 所示。\n\n\
    \    ![A437923_1_En_21_Fig7_HTML.jpg](img/A437923_1_En_21_Fig7_HTML.jpg)\n\n \
    \   图 21-7. 展开后的保存面板\n\n14. 在“另存为”文本字段中单击，然后输入 `TestFile`。\n15. 单击“保存我”按钮。\n16.\
    \ 选择“PanelProgram” ➤ “退出 PanelProgram”。Xcode 窗口会再次出现。在 Xcode 窗口底部的调试区域中，你应该能看到所选文件和文件夹的完整路径名，以及你输入的文件名。\n"
- fmt: "### Creating a Color Panel\n\nA Color panel displays different color options\
    \ so the user can select a different color. The Color panel needs to return a\
    \ color that the user selects. Some properties that the Color panel uses include:\n\
    \n- `activate`: Displays the color panel\n- `action`: Defines the function to\
    \ run when the Color panel is opened\n- `color`: Stores the color value that the\
    \ user chose as part of the `NSColor` class\n\nTo learn how to use a Color panel,\
    \ follow these steps:\n\n1. From within Xcode choose **File ➤ New ➤ Project**.\n\
    2. Click **Application** under the **macOS** category.\n3. Click **Cocoa Application**\
    \ and click the **Next** button. Xcode now asks for a product name.\n4. Click\
    \ in the **Product Name** text field and type `ColorPanelProgram`.\n5. Make sure\
    \ the **Language** pop-up menu displays **Swift** and that the “Use Storyboards”\
    \ check box is selected.\n6. Click the **Next** button. Xcode asks where you want\
    \ to store the project.\n7. Choose a folder to store your project and click the\
    \ **Create** button.\n8. Click the `Main.storyboard` file in the Project Navigator.\
    \ Your program’s user interface appears.\n9. Choose **View ➤ Utilities ➤ Show\
    \ Object Library**. The Object Library appears in the bottom right corner of the\
    \ Xcode window.\n10. Drag a push button onto the user interface window and double-click\
    \ it to change its title to **Color**.\n11. Drag a label onto the user interface\
    \ window and double-click it to change its displayed text to **You chose this\
    \ color**, as shown in Figure [21-8](#A437923_1_En_21_Chapter.html#Fig8).\n\n\
    \    ![A437923_1_En_21_Fig8_HTML.jpg](A437923_1_En_21_Fig8_HTML.jpg)\n\n    **Figure\
    \ 21-8.** The user interface for the ColorPanelProgram\n\n12. Choose **View ➤\
    \ Assistant Editor ➤ Show Assistant Editor**. The `ViewController.swift` file\
    \ appears next to your user interface.\n13. Move the mouse pointer over the label,\
    \ hold down the **Control** key, and drag the mouse underneath the last `class\
    \ ViewController` line in the `ViewController.swift` file.\n14. Release the **Control**\
    \ key and the mouse button. A pop-up window appears.\n15. Click in the **Name**\
    \ text field, type `myLabel`, and click the **Connect** button. Xcode creates\
    \ an `IBOutlet` as follows:\n\n    ```\n    @IBOutlet weak var myLabel: NSTextField!\n\
    \    ```\n\n16. Underneath this `IBOutlet` type the following code:\n\n    ```\n\
    \    let colorPanel = NSColorWell()\n    ```\n\n17. Move the mouse pointer over\
    \ the push button, hold down the **Control** key, and drag the mouse above the\
    \ last curly bracket in the bottom of the `ViewController.swift` file.\n18. Release\
    \ the **Control** key and the mouse button. A pop-up window appears.\n19. Click\
    \ in the **Connect** pop-up menu and choose **Action**.\n20. Click in the **Name**\
    \ text field and type `chooseColor`.\n21. Click in the **Type** pop-up menu, choose\
    \ `NSButton`, and click the **Connect** button. Xcode creates an empty `IBAction`\
    \ method.\n22. Modify the `IBAction` method as follows:\n\n    ```\n    @IBAction\
    \ func chooseColor(_ sender: NSButton) {\n        colorPanel.activate(true)\n\
    \        colorPanel.action = #selector(changeColor(_:))\n    }\n    ```\n\n  \
    \  The `activate` command displays the color panel and the `#selector` command\
    \ runs the `changeColor` function, which you’ll need to create.\n\n23. Above this\
    \ `IBAction` method, type the following function:\n\n    ```\n    override func\
    \ changeColor(_ sender: Any?) {\n        myLabel.textColor = colorPanel.color\n\
    \    }\n    ```\n\n    This `changeColor` function simply takes whatever color\
    \ the user chose in the color panel and assigns it to the text of the label.\n\
    \n24. Choose **Product ➤ Run**. The user interface appears.\n25. Click the **Color**\
    \ button on your program’s user interface. A Color panel appears, as shown in\
    \ Figure [21-9](#A437923_1_En_21_Chapter.html#Fig9).\n\n    ![A437923_1_En_21_Fig9_HTML.jpg](A437923_1_En_21_Fig9_HTML.jpg)\n\
    \n    **Figure 21-9.** The Color panel\n\n26. Click a color. Notice that each\
    \ time you click a color, the color of the text in the label changes.\n27. Choose\
    \ **ColorPanelProgram ➤ Quit ColorPanelProgram**.\n\n### Summary\n\nWhen designing\
    \ a standard macOS user interface, you don’t have to create everything yourself.\
    \ By taking advantage of the Cocoa framework, you can create alerts and panels\
    \ that look and behave like other macOS programs with little extra coding on your\
    \ own part.\n\nAlerts let you display brief messages to the user, such as warnings.\
    \ You can customize an alert with text and graphics, and place two or more buttons\
    \ on the alert. If you place two or more buttons on an alert, you need to write\
    \ Swift code to identify which button the user clicked.\n\nAn alert typically\
    \ appears as a separate window, but you can also make it appear as a sheet that\
    \ drops down from a window’s title.\n\nPanels display commonly used user interface\
    \ items such as an Open panel to select a file to open and a Save panel to select\
    \ a folder and a file name in which to save data. The Open and Save panels are\
    \ part of the Cocoa framework, but you need to write additional Swift code to\
    \ make the Open and Save panels actually open or save a file to a hard disk.\n\
    \nThe Color panel lets the user select a different color. To retrieve the color\
    \ the user chose, use the `color` property of the `NSColorWell` class.\n\nAlerts\
    \ and panels let you create standard macOS user interface elements with little\
    \ additional coding. By using these features of the Cocoa framework, you can create\
    \ standard macOS programs that work reliably and behave like users expect a macOS\
    \ program to look and behave.\n\n# 22. Creating Pull-Down Menus\n\nPull-down menus\
    \ represent the standard way to interact with a macOS program. While your program\
    \ may display buttons to represent commands, too many buttons can clutter the\
    \ screen. To avoid trying to cram multiple buttons on the screen, you can group\
    \ related commands in multiple pull-down menus. By default, Xcode creates every\
    \ macOS project with the following pull-down menu titles:\n\n- **File**: Displays\
    \ commands for opening, saving, creating, and printing\n- **Edit**: Displays commands\
    \ for copying, cutting, pasting, undoing, and redoing commands\n- **Format**:\
    \ Displays commands for modifying text or graphics such as changing fonts\n- **View**:\
    \ Displays commands for changing the way data appears in the window such as zooming\
    \ in and out or displaying other user interface items such as toolbars\n- **Window**:\
    \ Displays commands for manipulating document windows such as switching between\
    \ multiple open windows\n- **Help**: Displays commands for getting help using\
    \ a program\n\nAlthough Xcode can create pull-down menu titles for you, you’ll\
    \ still need to write Swift code to make them actually work. Besides using the\
    \ standard pull-down menu titles, you can add your own or delete the existing\
    \ ones. To organize commands within a pull-down menu, you can use horizontal lines\
    \ to group similar commands together or store them in submenus. For the user’s\
    \ convenience, you can also assign keystroke shortcuts to commands.\n\nPull-down\
    \ menus represent a standard way for users to control a program. By creating pull-down\
    \ menus for your own programs, you can create a familiar user interface so others\
    \ can learn and use your program quickly with little or no additional training."
