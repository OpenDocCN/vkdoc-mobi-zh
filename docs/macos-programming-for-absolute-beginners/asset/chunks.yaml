    ```\n\n注意，`pet` 结构体遵循了 `Cat` 协议，但由于它没有同时遵循 `CatType` 协议，因此你可以为其 `name` 属性分配一个初始值\
    \ \"Max\"，并且之后可以重新分配 \"Joey\" 给同一个 `name` 属性。\n\n然而，`wild` 结构体同时遵循了 `Cat` 和 `CatType`\
