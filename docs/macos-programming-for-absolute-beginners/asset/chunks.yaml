  trans: "\n# 使用单选按钮\n\n与允许用户选择多个选项的复选框不同，单选按钮会显示多个选项，但每次只允许用户选择一个。当用户选择另一个单选按钮时，当前选中的单选按钮会自动取消选中。\n\
    \n要识别用户选择了哪个单选按钮，你需要更改每个单选按钮的 `Tag` 属性。然后，你可以使用 `selectedTag()` 方法来获取选中的单选按钮。\n\
    \n若要了解如何使用单选按钮，请按照以下步骤操作：\n\n1.  在 Xcode 中，选择“文件”>“新建”>“项目”。\n2.  在 macOS 类别下，点击“应用程序”。\n\
    3.  点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 现在会要求输入产品名称。\n4.  点击“产品名称”文本字段，然后输入 `RadioProgram`。\n\
    5.  确保“语言”弹出菜单显示为 Swift，并且勾选了“使用故事板”复选框。\n6.  点击“下一步”按钮。Xcode 会询问你要将项目存储在哪里。\n\
    7.  选择一个文件夹来存储你的项目，然后点击“创建”按钮。\n8.  在项目导航器中点击 `Main.storyboard` 文件。你的程序用户界面会显示出来。\n\
    9.  点击 `RadioProgram` 图标以显示程序用户界面的窗口。\n10. 选择“视图”>“工具”>“显示对象库”。对象库会出现在 Xcode 窗口的右下角。\n\
    11. 将一个按钮和四个单选按钮拖到用户界面窗口上，使其看起来像图 18-3 所示。\n\n![A437923_1_En_18_Fig3_HTML.jpg](img/A437923_1_En_18_Fig3_HTML.jpg)\n\
    \n图 18-3. `RadioProgram` 的用户界面\n\n12. 点击左上角的单选按钮，并确保在“属性检查器”面板的“视图”类别中，其 `Tag`\
    \ 属性设置为 `0`。\n13. 点击右上列的单选按钮，并确保其 `Tag` 属性设置为 `1`。\n14. 点击左下角的单选按钮，并确保其 `Tag`\
    \ 属性设置为 `2`。\n15. 点击右下角的单选按钮，并确保在“显示属性检查器”面板中，其 `Tag` 属性设置为 `3`。\n16. 选择“视图”>“辅助编辑器”>“显示辅助编辑器”。`ViewController.swift`\
    \ 文件会出现在用户界面旁边。\n17. 将鼠标指针移到左上角的单选按钮上，按住 Control 键，然后拖拽到 `IBOutlet` 代码行下方。\n18.\
    \ 松开 Control 键和鼠标。此时会出现一个弹出窗口。\n19. 点击“名称”文本字段，然后输入 `radioZero`。一个 `IBOutlet`\
    \ 出现，如下所示：\n\n```\n@IBOutlet weak var radioZero: NSButton!\n```\n\n20. 选择“视图”>“工具”>“显示属性检查器”。\n\
    21. 向下滚动“属性检查器”面板，确保 `Tab` 属性为 `0`。\n22. 将鼠标指针移到右上角的单选按钮上，按住 Control 键，然后拖拽到 `IBOutlet`\
    \ 代码行下方。\n23. 松开 Control 键和鼠标。此时会出现一个弹出窗口。\n24. 点击“名称”文本字段，然后输入 `radioOne`。\n\
    25. 选择“视图”>“工具”>“显示属性检查器”。\n26. 向下滚动“属性检查器”面板，并将 `Tab` 属性更改为 `1`。\n27. 将鼠标指针移到左下角的单选按钮上，按住\
    \ Control 键，然后拖拽到 `IBOutlet` 代码行下方。\n28. 松开 Control 键和鼠标。此时会出现一个弹出窗口。\n29. 点击“名称”文本字段，然后输入\
    \ `radioTwo`。\n30. 选择“视图”>“工具”>“显示属性检查器”。\n31. 向下滚动“属性检查器”面板，并将 `Tab` 属性更改为 `2`。\n\
    32. 将鼠标指针移到右下角的单选按钮上，按住 Control 键，然后拖拽到 `IBOutlet` 代码行下方。\n33. 松开 Control 键和鼠标。此时会出现一个弹出窗口。\n\
    34. 点击“名称”文本字段，然后输入 `radioThree`。你应该拥有如下四个 `IBOutlet`：\n\n```\n@IBOutlet weak\
    \ var radioZero: NSButton!\n@IBOutlet weak var radioOne: NSButton!\n@IBOutlet\
    \ weak var radioTwo: NSButton!\n@IBOutlet weak var radioThree: NSButton!\n```\n\
    \n35. 选择“视图”>“工具”>“显示属性检查器”。\n36. 向下滚动“属性检查器”面板，并将 `Tab` 属性更改为 `3`。\n37. 在四个 `IBOutlet`\
    \ 下方输入以下内容：\n\n```\nvar radioButtonSelected : String?\n```\n\n38. 将鼠标指针移到按钮上，按住\
    \ Control 键，然后将鼠标拖拽到 `ViewController.swift` 文件底部最后一个大括号上方。\n39. 松开 Control 键和鼠标。此时会出现一个弹出窗口。\n\
    40. 点击“连接”弹出菜单并选择“动作”。\n41. 点击“名称”文本字段，然后输入 `displayButton`。\n42. 点击“类型”弹出菜单并选择\
    \ `NSButton`。\n43. 点击“连接”按钮。Xcode 会创建一个空的 `IBAction` 方法。\n44. 按如下方式修改 `IBAction`\
    \ 方法：\n\n```\n@IBAction func displayButton(_ sender: NSButton) {\n    let myAlert\
    \ = NSAlert()\n    if radioButtonSelected != nil {\n        myAlert.messageText\
    \ = \"你点击了位于 \" + radioButtonSelected! + \" 的单选按钮\"\n    } else {\n        myAlert.messageText\
    \ = \"未选择任何单选按钮\"\n    }\n    myAlert.runModal()\n}\n```\n\n45. 将鼠标指针移到左上角的单选按钮上，按住\
    \ Control 键，然后将鼠标拖拽到 `ViewController.swift` 文件底部最后一个大括号上方。\n46. 松开 Control 键和鼠标。此时会出现一个弹出窗口。\n\
    47. 点击“连接”弹出菜单并选择“动作”。\n48. 点击“名称”文本字段，然后输入 `whichRadioButton`。\n49. 点击“类型”弹出菜单并选择\
    \ `NSButton`。\n50. 点击“连接”按钮。Xcode 会创建一个空的 `IBAction` 方法。\n51. 按如下方式修改 `IBAction`\
    \ 方法：\n\n```\n@IBAction func whichRadioButton(_ sender: NSButton) {\n    switch\
    \ sender.tag {\n    case 0 :\n        radioOne.state = 0\n        radioTwo.state\
    \ = 0\n        radioThree.state = 0\n        radioButtonSelected = \"左上角\"\n \
    \   case 1 :\n        radioZero.state = 0\n        radioTwo.state = 0\n      \
    \  radioThree.state = 0\n        radioButtonSelected = \"右上角\"\n    case 2 :\n\
    \        radioZero.state = 0\n        radioOne.state = 0\n        radioThree.state\
    \ = 0\n        radioButtonSelected = \"左下角\"\n    case 3 :\n        radioZero.state\
    \ = 0\n        radioOne.state = 0\n        radioTwo.state = 0\n        radioButtonSelected\
    \ = \"右下角\"\n    default:\n        radioButtonSelected = \"未选择任何单选按钮\"\n    }\n\
    }\n```\n\n52. 将鼠标指针移到右上角的单选按钮上，按住 Control 键，然后将鼠标拖拽到 `ViewController.swift` 文件中\
    \ `whichRadioButton` 这个 `IBAction` 函数的 `func` 关键字上，直到整个函数高亮显示。\n53. 松开鼠标和 Control\
    \ 键。\n54. 将鼠标指针移到左下角的单选按钮上，按住 Control 键，然后将鼠标拖拽到 `ViewController.swift` 文件中 `whichRadioButton`\
    \ 这个 `IBAction` 函数的 `func` 关键字上，直到整个函数高亮显示。\n55. 松开鼠标和 Control 键。\n56. 将鼠标指针移到右下角的单选按钮上，按住\
    \ Control 键，然后将鼠标拖拽到 `ViewController.swift` 文件中 `whichRadioButton` 这个 `IBAction`\
    \ 函数的 `func` 关键字上，直到整个函数高亮显示。\n57. 松开鼠标和 Control 键。现在所有四个单选按钮都应该连接到 `whichRadioButton`\
    \ 这个 `IBAction` 函数上。\n58. 选择“产品”>“运行”。你的用户界面会出现。\n59. 点击一个单选按钮，然后点击按钮。会出现一个提醒对话框，显示你选择的单选按钮。\n\
    60. 点击“确定”按钮关闭提醒对话框。\n61. 选择 `RadioProgram` > “退出 RadioProgram”。\n"
- fmt: "`radioButtonSelected`变量的目的是保存一个字符串，用于标识用户选择了哪个单选按钮。最初，没有选中任何单选按钮，因此`radioButtonSelected`变量是一个可选变量。\n\
    \n`displayButton` IBAction 函数会创建一个警告对话框，并检查`radioButtonSelected`变量中是否有值。如果有，则显示该值；如果没有，则显示“No\
    \ radio button selected”。\n\n`whichRadioButton` IBAction 函数通过单选按钮的 Tag 属性来识别用户点击了哪个单选按钮。此外，点击任何单选按钮都会取消选择所有其他单选按钮，因此一次只能选中一个单选按钮。\n\
    \n请注意，您已将四个单选按钮全部连接到了 IBAction `whichRadioButton`函数。这意味着无论何时点击其中任何一个单选按钮，`whichRadioButton`函数都会运行。\n\
    \n## 使用日期选择器\n\n日期选择器使用户能够以正确的格式轻松选择日期和/或时间。日期选择器的三种外观类型如图 [18-4](#A437923_1_En_18_Chapter.html#Fig4)\
    \ 所示：\n\n![A437923_1_En_18_Fig4_HTML.jpg](A437923_1_En_18_Fig4_HTML.jpg)\n\n图\
    \ 18-4. 日期选择器的三种变体\n\n*   文本型：在文本字段中显示日期，要求用户键入正确的日期\n*   带步进器的文本型：在文本字段中显示日期，用户可以通过单击步进器来修改当前选中的日期部分\n\
    *   图形型：显示一个日历，用户可以直接点击选择日期\n\n日期选择器中可修改的一些属性如图 [18-5](#A437923_1_En_18_Chapter.html#Fig5)\
    \ 所示：\n\n![A437923_1_En_18_Fig5_HTML.jpg](A437923_1_En_18_Fig5_HTML.jpg)\n\n图\
    \ 18-5. 属性检查器窗格中的日期选择器属性\n\n*   Style：决定日期选择器的外观\n*   Selects：决定用户是选择单个日期还是一个日期范围\n\
    *   Elements：决定显示哪些日期和时间元素，例如月、日、年、时、分和秒\n*   Minimum Date：定义可能的最早日期\n*   Maximum\
    \ Date：定义可能的最晚日期\n*   Date：定义当前显示的日期和/或时间\n\n若要从日期选择器中检索用户选择的日期，您需要访问`dateValue`属性，该属性表示`NSDate`类型。\n\
    \n要了解如何使用日期选择器，请按以下步骤操作：\n\n1.  在 Xcode 中，选择 File ➤ New ➤ Project。\n2.  在 macOS\
    \ 类别下点击 Application。\n3.  点击 Cocoa Application，然后点击 Next 按钮。Xcode 现在会要求输入产品名称。\n\
    4.  点击 Product Name 文本字段，输入`DateProgram`。\n5.  确保 Language 弹出菜单显示为 Swift，并且所有复选框都为清除且未选中状态。\n\
    6.  点击 Next 按钮。Xcode 会询问您要存储项目的位置。\n7.  选择一个文件夹来存储您的项目，然后点击 Create 按钮。\n8.  在项目导航器窗格中点击`Main.storyboard`文件。\n\
    9.  将一个推送按钮和一个日期选择器拖到用户界面上。\n10. 点击日期选择器，然后选择 View ➤ Utilities ➤ Show Attributes\
    \ Inspector。\n11. 点击 Style 弹出菜单，选择 Graphical，使日期选择器看起来像月历，如图 [18-6](#A437923_1_En_18_Chapter.html#Fig6)\
    \ 所示。\n\n![A437923_1_En_18_Fig6_HTML.jpg](A437923_1_En_18_Fig6_HTML.jpg)\n\n图\
    \ 18-6. DateProgram 的用户界面\n12. 选择 View ➤ Assistant Editor ➤ Show Assistant Editor。Xcode\
    \ 会在用户界面旁边显示`ViewController.swift`文件。\n13. 将鼠标指针移到日期选择器上，按住 Control 键，然后将其拖到`ViewController.swift`文件中的`IBOutlet`行下方。\n\
    14. 松开 Control 键和鼠标按钮。此时会出现一个弹出窗口。\n15. 点击 Name 文本字段，输入`chooseDate`，然后点击 Connect\
    \ 按钮。Xcode 会创建一个类似这样的 IBOutlet：\n\n```\n@IBOutlet weak var chooseDate: NSDatePicker!\n\
    ```\n\n16. 将鼠标指针移到推送按钮上，按住 Control 键，然后将其拖到`ViewController.swift`文件底部最后一个花括号上方。\n\
    17. 松开 Control 键和鼠标。此时会出现一个弹出窗口。\n18. 点击 Connect 弹出菜单，选择 Action。\n19. 点击 Name\
    \ 文本字段，输入`showDate`。\n20. 点击 Type 弹出菜单，选择 NSButton。然后点击 Connect 按钮。Xcode 会创建一个\
    \ IBAction 方法。\n21. 按如下方式修改此 IBAction 方法：\n\n```\n@IBAction func showDate(_ sender:\
    \ NSButton) {\n    let myAlert = NSAlert()\n    myAlert.messageText = \"You chose\
    \ this date =  \\(chooseDate.dateValue)\"\n    myAlert.runModal()\n}\n```\n\n\
    22. 选择 Product ➤ Run。您的用户界面会出现。\n23. 在日期选择器上选择一个日期，然后点击推送按钮。会弹出一个警告对话框，显示您选择的日期。\n\
    24. 点击 OK 按钮关闭此警告对话框。\n25. 选择 DateProgram ➤ Quit DateProgram。"
  raw: "The purpose of the `radioButtonSelected` variable is to hold a string that\
    \ identifies which radio button the user chose. Initially, no radio button is\
    \ selected so the `radioButtonSelected` variable is an optional variable.\n\n\
    The `displayButton` IBAction function creates an alert dialog and checks if there’s\
    \ a value in the `radioButtonSelected` variable. If so, then it displays that\
    \ value. If not, then it displays “No radio button selected”.\n\nThe `whichRadioButton`\
    \ IBAction function identifies which radio button the user clicked by the radio\
    \ button’s Tag property. In addition, clicking any radio button deselects all\
    \ the other radio buttons so this way only one radio button can be selected at\
    \ a time.\n\nNotice that you connected all four radio buttons to the IBAction\
    \ `whichRadioButton` function. That means the `whichRadioButton` function runs\
    \ any time you click any of the four radio buttons.\n\n## Using a Date Picker\n\
    \nA date picker makes it easy for users to choose a date and/or time in a proper\
    \ format. The three types of date picker appearances are shown in Figure [18-4](#A437923_1_En_18_Chapter.html#Fig4):\n\
    \n![A437923_1_En_18_Fig4_HTML.jpg](A437923_1_En_18_Fig4_HTML.jpg)\n\nFigure 18-4.\n\
    \nThe three variations of a date picker\n\n*   Textual: Displays a date in a text\
    \ field that requires the user to type in a proper date\n*   Textual with Stepper:\
    \ Displays a date in a text field that the user can change by clicking on a stepper\
    \ to modify the currently selected part of the date\n*   Graphical: Displays a\
    \ calendar so the user can click on a date\n\nSome of the properties to modify\
    \ in a date picker are shown in Figure [18-5](#A437923_1_En_18_Chapter.html#Fig5):\n\
    \n![A437923_1_En_18_Fig5_HTML.jpg](A437923_1_En_18_Fig5_HTML.jpg)\n\nFigure 18-5.\n\
    \nThe date picker properties in the Show Attributes Inspector pane\n\n*   Style:\
    \ Determines the date picker's appearance\n*   Selects: Determines whether the\
    \ user can select a single date or a range of dates\n*   Elements: Determines\
    \ what date and time elements to display such as month, day, year, hour, minute,\
    \ and second\n*   Minimum Date: Defines the earliest date possible\n*   Maximum\
    \ Date: Defines the latest date possible\n*   Date : Defines the currently displayed\
    \ date and/or time\n\nTo retrieve the user's chosen date from a date picker, you\
    \ need to access the dateValue property, which represents an NSDate type.\n\n\
    To learn how to use a date picker, follow these steps:\n\n1.  From within Xcode\
    \ choose File ➤ New ➤ Project.  \n2.  Click Application under the macOS category.\
    \  \n3.  Click Cocoa Application and click the Next button. Xcode now asks for\
    \ a product name.  \n4.  Click in the Product Name text field and type DateProgram\
    \ .  \n5.  Make sure the Language pop-up menu displays Swift and that all check\
    \ boxes are clear and not selected.  \n6.  Click the Next button. Xcode asks where\
    \ you want to store the project.  \n7.  Choose a folder to store your project\
    \ and click the Create button.  \n8.  Click the `Main.storyboard` file in the\
    \ Project Navigator pane.  \n9.  Drag a push button and a date picker onto the\
    \ user interface.  \n10.  Click the date picker and choose View ➤ Utilities ➤\
    \ Show Attributes Inspector.  \n11.  Click in the Style pop-up menu and choose\
    \ Graphical to make the date picker look like a monthly calendar, as shown in\
    \ Figure [18-6](#A437923_1_En_18_Chapter.html#Fig6).\n\n![A437923_1_En_18_Fig6_HTML.jpg](A437923_1_En_18_Fig6_HTML.jpg)\n\
    \nFigure 18-6.\n\nThe user interface of the DateProgram  \n12.  Choose View ➤\
    \ Assistant Editor ➤ Show Assistant Editor. Xcode displays the `ViewController.swift`\
    \ file next to the user interface.  \n13.  Move the mouse pointer over the date\
    \ picker, hold down the Control key, and drag the mouse under the IBOutlet line\
    \ in the `ViewController.swift` file.  \n14.  Release the Control key and the\
    \ mouse button. A pop-up window appears.  \n15.  Click in the Name text field,\
    \ type chooseDate , and click the Connect button. Xcode creates an IBOutlet like\
    \ this:\n\n```\n    @IBOutlet weak var chooseDate: NSDatePicker!\n    ```\n\n\
    16.  Move the mouse pointer over the push button, hold down the Control key, and\
    \ drag the mouse over the last curly bracket in the bottom of the `ViewController.swift`\
    \ file.  \n17.  Release the Control key and the mouse. A pop-up window appears.\
    \  \n18.  Click in the Connect pop-up menu and choose Action.  \n19.  Click in\
    \ the Name text field and type showDate.  \n20.  Click in the Type pop-up menu\
    \ and choose NSButton. Then click the Connect button. Xcode creates an IBAction\
    \ method.  \n21.  Modify this IBAction method as follows:\n\n```\n    @IBAction\
    \ func showDate(_ sender: NSButton) {\n    let myAlert = NSAlert()\n    myAlert.messageText\
    \ = \"You chose this date =  \\(chooseDate.dateValue)\"\n    myAlert.runModal()\n\
    \    }\n    ```\n\n22.  Choose Product ➤ Run. Your user interface appears.  \n\
    23.  Choose a date on the date picker and click the push button. An alert dialog\
    \ appears, displaying the date you chose.  \n24.  Click the OK button to make\
    \ this alert dialog go away.  \n25.  Choose DateProgram ➤ Quit DateProgram."
