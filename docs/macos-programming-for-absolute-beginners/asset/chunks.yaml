    \n图 3-21. 文档大纲\n\n- 选择 编辑器（Editor）➤ 显示/隐藏文档大纲（Show/Hide Document Outline）。\n-\
    \ 单击文档大纲图标。\n\n文档大纲让您可以轻松选择用户界面上的不同项目。在您的 MyFirstProgram 中，只有三个项目（一个标签、一个文本栏和一个按钮），但在更复杂的用户界面中，可能会有更多项目，它们可能隐藏在其它项目后面，或者太小不易看清。\n\
    \n如果您在文档大纲中单击一个项目，Xcode 会在用户界面中选中该项目（反之亦然），如图 3-22 所示。\n\n![A437923_1_En_3_Fig22_HTML.jpg](img/A437923_1_En_3_Fig22_HTML.jpg)\n\
    \n图 3-22. 在文档大纲窗口中单击一个项目会在用户界面上选中该项目\n\n可以将文档大纲视为一种快速查看用户界面的所有部分并仅选择所需项目的方法。\n\
    \n一旦您开始通过 `IBOutlet` 和 `IBAction` 方法将用户界面项目连接到您的 Swift 代码，您可能会想知道哪些项目连接到了哪些 `IBOutlet`\
    \ 和 `IBAction` 方法。要查看 `IBOutlet`/`IBAction` 方法与用户界面项目之间的连接，您有两种选择。\n\n首先，您可以使用连接检查器。其次，您可以使用助理编辑器（Assistant\
    \ Editor）。\n\n要打开连接检查器，首先单击您想要检查的用户界面中的任意项目，然后执行以下操作之一，以显示位于 Xcode 窗口右上角的连接检查器，如图\
    \ 3-23 所示：\n\n![A437923_1_En_3_Fig23_HTML.jpg](img/A437923_1_En_3_Fig23_HTML.jpg)\n\
    \n图 3-23. 连接检查器显示当前所选用户界面项目的所有连接\n\n- 选择 视图（View）➤ 工具（Utilities）➤ 显示连接检查器（Show\
    \ Connections Inspector）。\n- 按下 Option + Command + 6 键。\n- 单击显示连接检查器图标。\n\n连接检查器会显示包含与所选用户界面项目相连的\
    \ `IBOutlet` 或 `IBAction` 方法的 Swift 文件。\n\n注意：如果仔细查看，连接检查器会在链接到当前所选用户界面项目的 Swift\
    \ 文件左侧显示一个 X。如果您单击这个 X，就可以断开用户界面项目与其 `IBOutlet` 或 `IBAction` 方法之间的链接。\n\n查看哪些\
    \ `IBOutlet` 和 `IBAction` 方法连接到用户界面项目的另一种方法是打开用户界面（例如单击 `MainMenu.xib` 文件），然后打开助理编辑器。\n\
    \n在 Swift 文件中每个 `IBOutlet` 和 `IBAction` 方法的左侧，您会看到一个灰色圆圈。当您将鼠标指针移到灰色圆圈上时，Xcode\
    \ 会高亮显示连接到该 `IBOutlet` 或 `IBAction` 方法的用户界面项目，如图 3-24 所示。\n\n![A437923_1_En_3_Fig24_HTML.jpg](img/A437923_1_En_3_Fig24_HTML.jpg)\n\
    \n图 3-24. 助理编辑器允许您查看哪些 `IBOutlet` 和 `IBAction` 方法连接到了用户界面项目\n"
- fmt: '# Summary


    Xcode is the only program you need to design, write, and modify your own macOS
    programs. When you want to create a macOS program, you just follow the same basic
    steps:


    - Pick a project template to use (typically Cocoa Application).

    - Design and customize the user interface.

    - Connect the user interface items to `IBOutlets` and `IBAction` methods.

    - Write Swift code to make `IBAction` methods do something.

    - Run and test your program.


    To design your user interface, you need to drag and drop items from the Object
    Library. Then you need to use the Attributes and Size Inspectors to customize
    each user interface item. To help you select user interface items, you can use
    the Document Outline.


    After designing your user interface, you need to connect your user interface to
    your Swift code through `IBOutlets` (for retrieving or displaying data) and `IBAction`
    methods (to make your user interface do something) using the Assistant Editor.


    To review the connections between your user interface items and your Swift code,
    you can use the Connections Inspector or the Assistant Editor.


    Already you can see how the different parts of Xcode work to help you create a
    program, and we haven’t explored many other Xcode features yet. Perhaps the most
    confusing part about creating a Macintosh program can be writing Swift code and
    using methods stored in the class files that make up the Cocoa framework, so the
    next chapter will explain this in more detail.


    As you can see, using Xcode is actually fairly simple once you focus only on those
    features you actually need and ignore the rest. As you go through each chapter,
    you’ll keep learning a little more about Xcode and Swift programming.


    Already you’ve learned so much about Xcode, and you’ve only just begun.


    # 4. Getting Help


    The best way to learn any new skill is to have someone show you what you need
    to learn. Since that’s not always possible, you’ll be happy to know that Xcode
    comes with plenty of built-in help features to make using Xcode less stressful
    and more enjoyable.


    To use Xcode’s help, you first need to understand how Swift programs work and
    how they work with the Cocoa framework. Once you understand how a typical macOS
    program works and how it relies on the Cocoa framework, you’ll be better able
    to understand how to get the help you need and how you can understand the help
    you do find through Xcode.


    ## Understanding the Cocoa Framework


    When using Xcode, you have to understand that every program you create is based
    on the Cocoa framework, which contains classes that contain various properties
    and methods. By using these existing classes, you can save time by not writing
    and testing your own code. Instead, you can just use the existing code in the
    Cocoa framework that already works. This frees you to spend more time focusing
    on writing the code that’s unique to your particular program.


    To use the Cocoa framework, you must understand the principles of object-oriented
    programming and how objects work. To create an object, you must first define a
    class. A class contains the actual code that defines properties (to hold data)
    and methods (to manipulate data stored in its properties). Once you’ve defined
    a class, you can define one or more objects based on that class.


    Just as a cookie cutter defines the shape of a cookie but isn’t the actual cookie,
    so do classes define an object but aren’t the actual object.


    The Cocoa framework consists of multiple class files where many class files inherit
    properties and methods from other class files. When you create a macOS program,
    you’ll typically create objects based on Cocoa framework class files. In fact,
    every user interface item that you create from the Object Library is based on
    a Cocoa framework class.


    To see what class file each user interface item is based on, let’s examine the
    three user interface items you created: a label, a text field, and a button.


    1. Open the `MyFirstProgram` project in Xcode.

    2. Click the `MainMenu.xib` file. Xcode displays your user interface.

    3. Choose View ➤ Utilities ➤ Show Object Library. The Object Library appears in
    the lower right corner of the Xcode window.

    4. Click the push button item. A pop-up window appears, as shown in Figure [4-1](#A437923_1_En_4_Chapter.html#Fig1).
    Notice that this pop-up window tells you the class file (`NSButton`) and describes
    what the `NSButton` class file does.


    ![A437923_1_En_4_Fig1_HTML.jpg](A437923_1_En_4_Fig1_HTML.jpg)


    Figure 4-1. Finding the class file of a push button


    5. Click the Done button to make the pop-up window go away.

    6. Scroll through the Object Library and click the label item. A pop-up window
    appears, as shown in Figure [4-2](#A437923_1_En_4_Chapter.html#Fig2). This pop-up
    window tells you the class file (`NSTextField`), describes what an `NSTextField`
    class file does, and also tells you that the `NSTextField` class inherits (is
    a subclass) from the `NSControl` class.


    ![A437923_1_En_4_Fig2_HTML.jpg](A437923_1_En_4_Fig2_HTML.jpg)


    Figure 4-2. Finding the class file of a label


    7. Scroll through the Object Library and click the text field item. A pop-up window
    appears, as shown in Figure [4-3](#A437923_1_En_4_Chapter.html#Fig3). In case
    you haven’t noticed by now, user interface items that can store data often inherit
    properties and methods from the `NSControl` class file.


    ![A437923_1_En_4_Fig3_HTML.jpg](A437923_1_En_4_Fig3_HTML.jpg)


    Figure 4-3. Finding the class file of a text field


    By using Xcode’s simple help pop-up windows for each item in the Object Library,
    you’ve learned the following about your user interface:


    - The push button is based on the `NSButton` class file.

    - The label is based on the `NSTextField` class file.

    - The text field is also based on the `NSTextField` class file.

    - Both the `NSButton` class and the `NSTextField` class inherit from (is a subclass
    of) the `NSControl` class.


    Any time you need to find the class file of a user interface item, just click
    that item in the Object Library window. To learn what properties and methods you
    can use for each user interface item, you need to look up all the properties and
    methods for that particular class. For example, if you want to know what properties
    and methods you can use for the text field, you have to look up the properties
    and methods defined by the `NSTextField` class.


    Furthermore, since the `NSTextField` class inherits from the `NSControl` class,
    you can also use any properties and methods defined by the `NSControl` class.
    (If the `NSControl` class inherits from another class, you can use the properties
    and methods stored in that other class as well.)


    Note


    The NS prefix in front of each class name stands for NextStep, which was the company
    that originally created macOS and the Cocoa framework. When Apple acquired NextStep,
    they simply kept the NS prefix.


    ## Looking Up Properties and Methods in a Class File


    Once you know what class a particular user interface item is based on, you can
    look up its list of properties and methods in Xcode’s documentation. There are
    two ways to do this:


    - Choose Help ➤ Documentation and API reference.

    - Option + click on a class name in your Swift code.


    Remember when you needed to find the property that stored text in both a label
    and a text field? Here are the steps to find this information:


    - Identify the class file that each user interface item is based on (`NSTextField`,
    which you learned by clicking that item in the Object Library).

    - Look up Xcode’s documentation about the `NSTextField` class file.

    - If you can’t find the information you need in the `NSTextField` class file,
    look up the `NSControl` class file since the `NSTextField` class inherits all
    properties and methods from the `NSControl` class.'
