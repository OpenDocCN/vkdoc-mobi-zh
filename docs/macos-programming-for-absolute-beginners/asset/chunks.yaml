    This book is dedicated to everyone who dreams of writing a computer program. Anyone
    can learn to program a computer. The problem often boils down to not knowing where
    to start and feeling intimidated by the whole process. So this book is dedicated
    to everyone who has longed for a gentle introduction to computer programming for
    the Macintosh. Welcome to the future where your dreams are only limited by your
    imagination.


    ## Introduction


    If you’re a complete novice looking to get started in programming, or someone
    familiar with programming but curious about learning more, or a seasoned programmer
    comfortable with other programming languages but unfamiliar with Macintosh programming,
    this book is for you. Whatever your skill level, this book will help everyone
    understand how to use Apple’s latest programming language, Swift, to create macOS
    programs for the Macintosh.


    Now you may be wondering, why learn Swift and why program for the Macintosh? The
    answers are simple.


    First, Swift is Apple’s newest programming language and it’s designed to make
    creating macOS and iOS programs faster, easier, and more reliable than before.
    Previously, you had to use `Objective-C` to create macOS and iOS apps. While powerful,
    `Objective-C` is much harder to learn, more complicated to read and write, and
    because of its complexity, more prone to introducing errors or bugs in a program.


    Swift is just as powerful as `Objective-C` (actually, it’s more powerful, as you’ll
    soon see), far easier to learn, much simpler to read and write, and it minimizes
    common programming errors. Swift gives you all the benefits of `Objective-C` with
    none of the drawbacks. Plus, Swift provides features that `Objective-C` doesn’t
    offer, which makes Swift a far better programming language to learn and use today
    and tomorrow. Since Swift is Apple’s official programming language, you can be
    certain that learning Swift will lead to greater opportunities now and long into
    the future.


    But why should you want to learn to create Macintosh programs? The hot trend is
    learning to create iOS apps for the iPhone, iPad, and Apple Watch. If you plan
    on developing software, you definitely want to use Swift to create iOS apps.


    However, learning Swift means understanding the following:


    - The principles of programming, and object-oriented programming in particular

    - The syntax of the Swift programming language

    - Xcode’s features

    - Apple’s software development framework (called Cocoa), which forms the foundation
    of every macOS and iOS program

    - The principles of user interface design


    Does this sound like a lot to learn? Don’t worry. I’ll go through each process
    step by step so you won’t feel lost. The point is that to create macOS programs
    and iOS apps, you need to learn multiple topics, but creating iOS apps poses an
    additional challenge.


    For example, an iOS app needs to respond to touch gestures with one finger, two
    fingers, swipes, shakes, and motion, in addition to adapting to changes when the
    user flips an iPhone or iPad left, right, upside down, or right side up.


    In comparison, a Macintosh program only needs to respond to keyboard and mouse
    input. This means macOS programs are much simpler to create and understand, which
    also means that learning Swift to create macOS programs is far easier than learning
    Swift to create iOS apps.


    Best of all, the principles are exactly the same. What you learn creating macOS
    programs are the exact same skills you need to create iOS apps. The difference
    is that creating macOS programs is far simpler, less confusing, and much less
    intimidating than creating iOS apps.


    Trying to create iOS apps right from the start can be like trying to swim across
    the English Channel before you even know how to hold your breath underwater.


    You don’t want to frustrate yourself unnecessarily. That’s why it’s much easier
    to learn the principles of iOS app programming by first learning macOS programming.
    Once you’re familiar with macOS programming, you’ll find it’s trivial to transfer
    your programming skills to creating iOS apps. By learning to create macOS programs
    in Swift, you’ll learn everything you need to know to eventually create iOS apps
    in Swift, plus you’ll know how to create macOS programs so you can tap into the
    growing Macintosh market as well.'
