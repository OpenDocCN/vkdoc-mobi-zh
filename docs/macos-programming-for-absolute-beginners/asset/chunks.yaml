    由于当今的程序可能变得非常庞大，因此通常将函数存储在单独的文件中。'
  raw: 'In this example, the computer asks for a password, and when the user types
    in a password, the computer checks to see if it matches the word “secret”. If
    so, then the computer grants that person access to the computer. If the user does
    not type “secret”, then the computer denies access.


    Making decisions is what makes programming flexible. If you write a sequential
    series of instructions, the computer will follow these lists of instructions exactly
    the same way, every time. However, if you include decision-making instructions,
    also known as branching instructions, then the computer can respond according
    to what the user does.


    Consider a video game . No video game could be written entirely with instructions
    organized sequentially because then the game would play exactly the same way every
    time. Instead, a video game needs to adapt to the player’s actions at all times.
    If the player moves an object to the left, the video game needs to respond differently
    than if the player moves an object to the right or does nothing at all. Using
    branching instructions gives computers the ability to react differently so the
    program never runs exactly the same way.


    To write a computer program, you need to organize instructions in one of the following
    three ways, as graphically show in Figure [1-1](#A437923_1_En_1_Chapter.html#Fig1).


    ![A437923_1_En_1_Fig1_HTML.jpg](A437923_1_En_1_Fig1_HTML.jpg)


    Figure 1-1.


    The three basic building blocks of programming


    *   Sequentially: The computer follows instructions one after another.

    *   Loop: The computer repetitively follows one or more instructions.

    *   Branching: The computer chooses to follow one or more groups of instructions
    based on outside data.


    While simple programs may only organize instructions sequentially, every large
    program organizes instructions sequentially, in loops, and in branches. What makes
    programming more of an art and less of a science is that there is no single best
    way to write a program. In fact, it’s perfectly possible to write two different
    programs that behave exactly the same.


    Because there is no single “right” way to write a program, there are only guidelines
    to help you write programs easily. Ultimately, what matters is that you write
    a program that works.


    When writing any program, there are two, often mutually exclusive, goals. First,
    programmers strive to write programs that are easy to read, understand, and modify.
    This often means writing multiple instructions that clearly define the steps needed
    to solve a particular problem.


    Second, programmers try to write programs that perform tasks efficiently, making
    the program run as fast as possible. This often means condensing multiple instructions
    as much as possible by using tricks or exploiting little known features that are
    difficult to understand and confusing even to experienced programmers.


    In the beginning, strive towards making your programs as clear, logical, and understandable
    as possible, even if you have to write more instructions or type longer instructions
    to do it. Later, as you gain more experience in programming, you can work on creating
    the smallest, fastest, most efficient programs possible, but remember that your
    ultimate goal is to write programs that just work.


    ## Structured Programming


    Small programs have fewer instructions so they are much easier to read, understand,
    and modify. Unfortunately, small programs can only solve small problems. To solve
    complicated problems, you need to write bigger programs with more instructions.
    The more instructions you type, the greater the chance you’ll make a mistake (called
    a bug ). Even worse is that the larger a program gets, the harder it can be to
    understand how it works so you can modify it later.


    To avoid writing a single, massive program, programmers simply divide a large
    program into smaller parts called subprograms or functions. The idea is that each
    function solves a single task. This makes it easy to write and insure that it
    works correctly.


    Once all of your separate functions work, you can connect them to create a single,
    large program, as shown in Figure [1-2](#A437923_1_En_1_Chapter.html#Fig2). This
    is like building a house out of bricks rather than trying to carve an entire house
    out of one massive rock.


    ![A437923_1_En_1_Fig2_HTML.jpg](A437923_1_En_1_Fig2_HTML.jpg)


    Figure 1-2.


    Dividing a large program into multiple subprograms or functions helps make programming
    more reliable


    Dividing a large program into smaller programs provides several benefits. First,
    writing smaller functions is fast and easy, and small functions make it easy to
    read, understand, and modify the instructions.


    Second, functions act like building blocks that work together, so multiple programmers
    can work on different functions, and then combine the separate functions together
    to create a large program.


    Third, if you want to modify a large program, you just need to yank out, rewrite,
    and replace one or more functions. Without functions, modifying a large program
    means wading through all the instructions stored in a large program and trying
    to find which instructions you need to change.


    A fourth benefit of functions is that if you write a useful function, you can
    plug that function into other programs. By creating a library of tested, useful
    functions, you can create other programs quickly and easily by reusing existing
    code, thereby reducing the need to write everything from scratch.


    When you divide a large program into multiple functions, you have a choice. You
    can store all your programs in a single file or you can store each function in
    a separate file, as shown in Figure [1-3](#A437923_1_En_1_Chapter.html#Fig3).
    By storing functions in separate files, multiple programmers can work on different
    files without affecting anyone else.


    ![A437923_1_En_1_Fig3_HTML.jpg](A437923_1_En_1_Fig3_HTML.jpg)


    Figure 1-3.


    You can store functions in a single file or in multiple files


    Storing all your functions in a single file makes it easy to find and modify any
    part of your program. However, the larger your program, the more instructions
    you’ll need to write, which can make searching through a single large file as
    clumsy as flipping through the pages of a non-alphabetized dictionary looking
    for a specific word.


    In addition, storing all functions in a single file makes it impossible for multiple
    programmers to work on separate parts of your program since each programmer will
    need the same file.


    Storing all of your functions in separate files means that you need to keep track
    of which file contains which function. However, the benefit is that modifying
    a function is much easier because once you open the correct file, you only see
    the instructions for a single function, not for a dozen or more other functions.


    Because today’s programs can get so large, it’s common to store functions in separate
    files.'
