- fmt: "# The `if` Statement\n\nBoolean values are crucial for letting programs make\
    \ choices. If someone types in a password, a program checks to see if the password\
    \ is valid. If `true` (the password is valid), then the program grants access.\
    \ If `false` (the password is not valid), then the program blocks access.\n\n\
    To decide what to do next, every program needs to evaluate a Boolean value. Only\
    \ then can it decide what to do next based on the value of that Boolean value.\n\
    \nThe simplest type of branching statement in Swift is an `if` statement, which\
    \ looks like this:\n\n```\nif BooleanValue == true {\n}\n```\n\nTo simplify this\
    \ `if` statement, you can eliminate the `“== true”` portion so the `if` statement\
    \ looks like this:\n\n```\nif BooleanValue {\n}\n```\n\nThis shortened version\
    \ says, \"If the `BooleanValue` is `true`, then run the code inside the curly\
    \ brackets. If the `BooleanValue` is `false`, then skip all the code inside the\
    \ curly brackets without running it.\"\n\nTo see how Boolean values work with\
    \ an `if` statement, follow these steps:\n\n1.  Open the `IntroductoryPlayground`\
    \ file in Xcode.  \n2.  Edit the code as follows:\n\n    ```\n    import Cocoa\n\
    \    var BooleanValue = true\n    if BooleanValue {\n    print (\"The BooleanValue\
    \ is true\")\n    }\n    ```\n\nFigure [7-3](#A437923_1_En_7_Chapter.html#Fig3)\
    \ shows the results of the `if` statement running. Change the value of `BooleanValue`\
    \ to `false` and you'll see that the `if` statement no longer prints the string\
    \ `“The BooleanValue is true”`.\n\n![A437923_1_En_7_Fig3_HTML.jpg](A437923_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3. Running an `if` statement\n\n# The `if-else` Statement\n\nThe major\
    \ limitation of the `if` statement is that it either runs code or it runs nothing.\
    \ If you want one set of code to run if a Boolean value is `true` and a second\
    \ set of code to run if a Boolean value is `false`, you could write two separate\
    \ `if` statements, as follows:\n\n```\nif BooleanValue {\n}\nif !BooleanValue\
    \ {\n}\n```\n\nThe first `if` statement runs if the `BooleanValue` is `true`.\
    \ If not, then it does nothing.\n\nThe second `if` statement runs if the `BooleanValue`\
    \ is `false`. If not, then it does nothing.\n\nThe problem with writing two separate\
    \ `if` statements is that the logic of your program isn't as clear. To fix this\
    \ problem, Swift offers an `if-else` statement that looks like this:\n\n```\n\
    if BooleanValue {\n// First set of code to run if true\n} else {\n// Second set\
    \ of code to run if false\n}\n```\n\nAn `if-else` statement offers exactly two\
    \ different branches to follow. If a Boolean value is `true`, then the first set\
    \ of code runs. If a Boolean value is `false`, then the second set of code runs.\
    \ At no time is it possible for both sets of code to run in an `if-else` statement.\n\
    \nTo see how Boolean values work with an `if-else` statement, follow these steps:\n\
    \n1.  Open the `IntroductoryPlayground` file in Xcode.  \n2.  Edit the code as\
    \ follows:\n\n    ```\n    import Cocoa\n    var BooleanValue = true\n    if BooleanValue\
    \ {\n    print (\"The BooleanValue is true\")\n    } else {\n    print (\"The\
    \ BooleanValue is false\")\n    }\n    ```\n\nFigure [7-4](#A437923_1_En_7_Chapter.html#Fig4)\
    \ shows how the `if-else` statement works when `BooleanValue` is `true`. Change\
    \ `BooleanValue` to `false` and see how the `if-else` statement now runs the second\
    \ set of code.\n\n![A437923_1_En_7_Fig4_HTML.jpg](A437923_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4. Running an `if-else` statement\n\n# The `if-else-if` Statement\n\
    \nAn `if` statement either runs one set of code or it runs nothing. An `if-else`\
    \ statement always runs one set of code or a second set of code. However, what\
    \ if you want a choice of running two or more possible sets of code? In this case,\
    \ you need to use an `if-else-if` statement.\n\nLike an `if` statement, an `if-else-if`\
    \ statement may not run any code at all. The simplest `if-else-if` statement looks\
    \ like this:\n\n```\nif BooleanValue {\n// First set of code to run if true\n\
    } else if BooleanValue2 {\n// Second set of code to run if true\n}\n```\n\nWith\
    \ an `if-else-if` statement, a Boolean value must be `true` to run code. If no\
    \ Boolean value is `true`, then it's possible that no code will run at all. An\
    \ `if-else-if` statement is equivalent to multiple `if` statements like this:\n\
    \n```\nif BooleanValue {\n// First set of code to run if true\n}\nif BooleanValue2\
    \ {\n// Second set of code to run if true\n}\n```\n\nWith an `if-else-if` statement,\
    \ you can check for as many Boolean values as you want, such as:\n\n```\nif BooleanValue\
    \ {\n// First set of code to run if true\n} else if BooleanValue2 {\n// Second\
    \ set of code to run if true\n} else if BooleanValue3 {\n// Third set of code\
    \ to run if true\n} else if BooleanValue4 {\n// Fourth set of code to run if true\n\
    } else if BooleanValue5 {\n// Fifth set of code to run if true\n}\n```\n\nAs soon\
    \ as the `if-else-if` statement finds one Boolean value is `true`, then it runs\
    \ the accompanying code trapped within curly brackets. However, it's possible\
    \ that no Boolean value will be `true`, in which case no code inside the `if-else-if`\
    \ statement will run.\n\nIf you want to ensure that at least one set of code will\
    \ run, then you need to add a final `else` clause to the end of an `if-else-if`\
    \ statement, such as:\n\n```\nif BooleanValue {\n// First set of code to run if\
    \ true\n} else if BooleanValue2 {\n// Second set of code to run if true\n} else\
    \ if BooleanValue3 {\n// Third set of code to run if true\n} else if BooleanValue4\
    \ {\n// Fourth set of code to run if true\n} else if BooleanValue5 {\n// Fifth\
    \ set of code to run if true\n} else {\n// This code runs if every other Boolean\
    \ value is false\n}\n```\n\nTo see how Boolean values work with an `if-else-if`\
    \ statement, follow these steps:\n\n1.  Open the `IntroductoryPlayground` file\
    \ in Xcode.  \n2.  Edit the code as follows:\n\n    ```\n    import Cocoa\n  \
    \  var BooleanValue = false\n    var BooleanValue2 = false\n    var BooleanValue3\
    \ = false\n    if BooleanValue {\n    print (\"BooleanValue is true\")\n    }\
    \ else if BooleanValue2 {\n    print (\"BooleanValue2 is true\")\n    } else if\
    \ BooleanValue3 {\n    print (\"BooleanValue3 is true\")\n    } else {\n    print\
    \ (\"This prints if everything else is false\")\n    }\n    ```\n\nNotice that\
    \ because every Boolean value is `false`, the only code that runs occurs in the\
    \ final `else` portion of the `if-else-if` statement, as shown in Figure [7-5](#A437923_1_En_7_Chapter.html#Fig5).\n\
    \n![A437923_1_En_7_Fig5_HTML.jpg](A437923_1_En_7_Fig5_HTML.jpg)\n\nFigure 7-5.\
    \ Running an `if-else-if` statement with multiple Boolean values\n\nIf you change\
    \ different Boolean values to `true`, you can see how the `if-else-if` statement\
    \ behaves differently by running a different set of code.\n\nWith an `if-else-if`\
    \ statement:\n\n*   It's possible that no code will run unless the last part is\
    \ just a regular `else` statement.\n*   The program can choose between two or\
    \ more sets of code.\n*   The number of possible options is not limited to just\
    \ two options like an `if-else` statement.\n\nSince an `if-else-if` statement\
    \ checks multiple Boolean values, what happens if two or more Boolean values are\
    \ `true`? In this case, the `if-else-if` statement only runs the set of code associated\
    \ with the first `true` Boolean value and ignores all the rest of the code, as\
    \ shown in Figure [7-6](#A437923_1_En_7_Chapter.html#Fig6).\n\n![A437923_1_En_7_Fig6_HTML.jpg](A437923_1_En_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6. Running an `if-else-if` statement with multiple true Boolean values"
