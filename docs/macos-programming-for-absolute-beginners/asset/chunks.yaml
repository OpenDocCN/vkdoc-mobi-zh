    \ Summary\n\nLoops let you repeat one or more lines of code by running code until\
    \ a Boolean value becomes false. A while loop checks a Boolean value first, which\
    \ means it can run zero or more times. A repeat-while loop checks a Boolean value\
    \ last, which means it can run one or more times.\n\nWhen creating a while or\
    \ repeat-while loop , always make sure the loop has a way to end. If a loop never\
    \ ends, it becomes an endless loop, which will make your program appear to freeze\
    \ and be unresponsive.\n\nA for-in loop lets you specify how many times the loop\
    \ can run based on a starting value and an ending value. To make a for-in loop\
    \ count in increments other than 1, you can use the remainder operator (%) along\
    \ with the `where` command. Besides counting through a range of values, the for-in\
    \ loop can also count items in a list automatically.\n\nEach type of loop has\
    \ its advantages and disadvantages, but you can always make each loop duplicate\
    \ the features of the other loops. If you need to exit out of a loop prematurely,\
    \ you can use the break command along with an if statement.\n\nLoops give your\
    \ program the power to do repetitive tasks without requiring you to write duplicate\
    \ commands. Just make sure that your loops always end eventually and that they\
    \ run the proper number of times before stopping.\n\n# 9. Arrays and Dictionaries\n\
    \nAlmost every program needs to accept data so it can manipulate that data and\
    \ calculate a useful result. The simplest way to store data temporarily is through\
    \ variables that can store numbers or text strings. However, what if you need\
    \ to store multiple chunks of data such as a list of names or a list of product\
    \ numbers? You could create multiple variables like this:\n\n```\nvar employee001,\
    \ employee002, employee003 : String\n```\n\nUnfortunately, creating separate variables\
    \ to store related data can be clumsy. What if you don’t know how many items you\
    \ need to store? Then you may create too many or not enough variables. Even worse,\
    \ storing related data in separate variables means it’s easy to overlook the relationship\
    \ between data.\n\nFor example, if you stored the names of three employees in\
    \ three different variables, how do you know if there isn’t a fourth, fifth, or\
    \ sixth variable containing additional employee names? Unless you keep variables\
    \ together in your code, it’s easy to lose track of related data stored in separate\
    \ variables.\n\nThat’s why Swift offers two additional ways to store data called\
    \ arrays and dictionaries. The main idea behind both data structures is that you\
    \ create a single variable that can hold multiple items. Now you can store related\
    \ data in one location and easily find and retrieve it again.\n\nBoth arrays and\
    \ dictionaries are designed to store multiple copies of similar data such as a\
    \ list of names or a list of numbers. In most cases, you’ll store a list of identical\
    \ data types in an array or dictionary. However, you can also use arrays and dictionaries\
    \ to hold different data types by declaring that the array or dictionary can store\
    \ any type of data (using the “Any” data type) such as an integer and a string.\
    \ Consider the following:\n\n```\nvar mixedArray: [Any] = [1, \"Temp\", 2.6]\n\
    ```\n\nAs a general rule, it’s usually best to store the same type of data in\
    \ an array or dictionary so you always know what type of data to expect.\n\n##\
    \ Using Arrays\n\nYou can think of an array as an endless series of buckets that\
    \ can hold exactly one chunk of data. To help you find data stored in an array,\
    \ each array element (bucket) is identified by a number called an index . The\
    \ first item in an array is defined at index 0, the second item is defined at\
    \ index 1, the third item is defined at index 2, and so on, as shown in Figure\
    \ [9-1](#A437923_1_En_9_Chapter.html#Fig1).\n\n![A437923_1_En_9_Fig1_HTML.jpg](A437923_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1.\n\nThe structure of an array\n\nTo create an array, you can define\
    \ the name of the array and the type of data the array can hold. One way to create\
    \ an array is like this:\n\n```\nvar arrayName : [DataType] = []\n```\n\nOnce\
    \ you’ve created an array and defined the type of data it can hold, you can store\
    \ data to that array like this:\n\n```\nvar arrayName : [Int] = []\narrayName\
    \ = [34, 89, 70, 1, -24]\n```\n\nRather than define an empty array and its data\
    \ type, and then assign data to the array, it’s much simpler to define an array\
    \ name and set it equal to a list of items of the same data type on a single line,\
    \ like this:\n\n```\nvar myArrray = [34, 89, -2, 84]\n```\n\nSwift then infers\
    \ the data type of the array based on the data. Just make sure all data in the\
    \ array are the same data type such as Int, Float, Double, or String.\n\nNote\n\
    \nWhen you declare an array with the `var` keyword, you can add and delete items\
    \ in that array. If you don't want an array to change, declare it with the `let`\
    \ keyword like this: `let arrayName = [34, 89, 70, 1, -24]`. An array declared\
    \ with the `let` keyword can never be modified.\n\nWhen you store data in an array,\
    \ each item in that array appears in a fixed location. In the previous examples\
    \ of arrays that hold integers, the first number (34) is located at index 0, the\
    \ second number (89) is located at index 1, the third number (70) is located at\
    \ index 2, the fourth number (1) is located at index 3, and the fifth number (-24)\
    \ is located at index 4\\. Because Swift arrays count the index numbers starting\
    \ with 0, they are known as zero-based arrays. (Some programming languages count\
    \ the index of arrays starting with 1 so they’re called one-based arrays .)\n\n\
    If you want to retrieve the second item in an array (located at index 1), you\
    \ can retrieve that item and store it in a variable like this:\n\n```\nvar arrayName\
    \ = [4, 5, 9, -3]\nvar number : Int\nnumber = arrayName[1]\n```\n\nThe above Swift\
    \ code creates an array that holds four integers (4, 5, 9, -3) and then creates\
    \ a variable called `number` that can hold integer data types. The third line\
    \ then retrieves the item stored in the 1 index position in `arrayName`. In this\
    \ case, the `number` variable now holds the value 5."
