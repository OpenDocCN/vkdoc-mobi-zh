  trans: "\n# 6. 操作数字和字符串\n\n每个程序都需要将数据临时存储在变量中。然而，要使程序真正有用，它还必须以某种方式操作这些数据，以计算出有用的结果。电子表格可以让你对数字进行加、减、乘、除运算。文字处理器则操作文本以纠正拼写错误并设置文本格式。即使是电子游戏，也会响应摇杆的移动，为玩家的角色（如卡通人物、飞机或汽车）计算新的位置。利用数据计算出新的结果，正是每个程序存在的全部意义。\n\
    \n为了操作数字，Swift 提供了四个基本的数学运算符：加法（`+`）、减法（`-`）、乘法（`*`）、除法（`/`）以及一个取余运算符（`%`）。当你想要将两个字符串合并为一个时，你甚至可以使用加法运算符（`+`）来操作字符串。\n\
    \n尽管 Swift 包含了多种用于操作数字和文本的运算符，但 Cocoa 框架提供了更多强大的函数来操作数字和字符串。如果这些函数都不适用，你始终可以创建自己的函数来操作文本和数字数据。通过创建名为函数的迷你程序，你可以按任意方式操作数据，并可根据需要重复使用你的函数。\n\
    \n## 使用数学运算符\n\n操作数字最简单的方法是执行加法、减法、除法或乘法。在操作数字时，首先确保所有数字都是相同的数据类型，例如全部是整数，或者全部是\
    \ `Float` 或 `Double` 类型的小数。由于将整数与小数混合可能导致计算错误，因此 Swift 会强制你在计算中使用相同的数据类型。如果你的数据并非全是相同的数据类型，则需要转换一个或多个数据类型，例如：\n\
    \n```\nvar cats = 4\nvar dogs = 5.4\ndogs = Double(cats) * dogs\n```\n\n在这个例子中，Swift\
    \ 推断 `cats` 是 `Int` 数据类型，`dogs` 是 `Double` 数据类型。要相乘 `cats` 和 `dogs`，它们必须是相同的数据类型（`Double`），因此你必须先将\
    \ `cats` 的值转换为 `Double` 数据类型，然后计算才能安全地进行。\n\n当使用多个数学运算符时，请使用括号来定义哪些计算应该优先执行。Swift\
    \ 通常从左到右计算数学运算符，但乘法和除法的优先级高于加法和减法。如果你输入以下 Swift 代码，仅因数学计算的顺序不同，就会得到两个不同的结果：\n\n\
    ```\nvar cats, dogs : Double\ndogs = 5 *  9 - 3  /  2 + 4     // 47.5\ncats =\
    \ 5 * (9 - 3) / (2 + 4)    // 5.0\n```\n\n为了清晰起见，始终使用括号对数学运算符进行分组。最常见的数学运算符被称为二元运算符，因为它们需要两个数字才能计算出结果，如表\
    \ 6-1 所示。\n\n**表 6-1.** Swift 中的常见数学运算符\n\n| 数学运算符 | 用途 | 示例 |\n| --- | --- |\
    \ --- |\n| `+` | 加法 | `5 + 9 = 14` |\n| `-` | 减法 | `5 - 4 = 1` |\n| `*` | 乘法 |\
    \ `5 * 9 = 45` |\n| `/` | 除法 | `45 / 9 = 5` |\n| `%` | 取余 | `5 % 9 = 5` |\n\n\
    在所有数学运算符中，取余运算符可能需要额外的解释。本质上，取余运算符是将一个数除以另一个数，然后只返回该除法的余数。所以 5 除以 9 结果是 0 余 5，而\
    \ 26 除以 5 的余数是 1。\n\n### 复合赋值运算符\n\n如果你想给一个变量增加或减少某个数字，你可以使用如下 Swift 代码：\n\n```\n\
    temp = temp + 5\n```\n\n这个命令告诉 Swift 将 5 加到 `temp` 变量中存储的当前值上。虽然这种代码可以工作，但重复键入相同的变量名可能会显得笨拙。\n\
    \n作为一种快捷方式，Swift 提供了看起来像（`+=`）或（`-=`）的复合赋值运算符。要使用复合赋值运算符，你需要指定一个变量、要使用的复合赋值运算符，然后是你要增加或减少的值，例如：\n\
    \n```\ntemp += 5\n```\n\n这相当于：\n\n```\ntemp = temp + 5\n```\n\n要了解复合赋值运算符是如何工作的，请按照以下步骤操作：\n\
    \n1. 在 Xcode 中打开 `IntroductoryPlayground` 文件。\n2. 将代码编辑如下：\n\n    ```\n    import\
    \ Cocoa\n    var temp = 2\n    temp += 57                // 相当于 temp = temp +\
    \ 57\n    print (temp)\n    temp -= 7                 // 相当于 temp = temp - 7\n\
    \    print (temp)\n    ```\n\n如图 6-1 所示，`+=` 复合赋值运算符将 57 加到 `temp` 的当前值上。然后 `-=`\
    \ 复合赋值运算符从 `temp` 的当前值中减去 7。\n\n![A437923_1_En_6_Fig1_HTML.jpg](img/A437923_1_En_6_Fig1_HTML.jpg)\n\
    \n**图 6-1.** 观察复合赋值运算符如何工作\n\n通过组合数学运算符，你可以创建任何类型的计算。然而，如果你需要执行常见的数学运算，例如求一个数的平方根或对数，使用\
    \ Cocoa 框架中内置的数学函数会更简单、更可靠。\n\n## 使用数学函数\n\nCocoa 框架提供了数十个你可以使用的数学函数。一些更常见的数学函数包括：\n\
    \n- 取整函数\n- 计算函数（`sqrt`， `cbrt`， `min`/`max` 等）\n- 三角函数（`sin`，`cos`，`tan` 等）\n\
    - 指数函数\n- 对数函数\n\n### 取整函数\n\n当你处理小数时，可能希望将它们四舍五入到最接近的位。然而，在 Swift 中有多种取整数字的方法，例如：\n\
    \n- `round`：0.5 及以上舍入，0.49 及以下舍去\n- `floor`：向下取整到最接近的整数\n- `ceil`：向上取整到最接近的整数\n\
    - `trunc`：直接舍弃小数部分\n\n要了解这些不同的取整函数如何工作，请按照以下步骤创建一个新的 playground：\n\n1. 确保 `IntroductoryPlayground`\
    \ 文件已在 Xcode 中加载。\n2. 将代码编辑如下：\n\n    ```\n    import Cocoa\n    var testNumber\
    \ : Double\n    testNumber = round(36.98)\n    testNumber = round(-36.98)\n  \
    \  testNumber = round(36.08)\n    testNumber = floor(36.98)\n    testNumber =\
    \ floor(-36.98)\n    testNumber = floor(36.08)\n    testNumber = ceil(36.98)\n\
    \    testNumber = ceil(-36.98)\n    testNumber = ceil(36.08)\n    testNumber =\
    \ trunc(36.98)\n    testNumber = trunc(-36.98)\n    testNumber = trunc(36.08)\n\
    \    ```\n\n图 6-2 展示了每种取整函数在处理负数和正数时的不同之处，以及每个函数是向上取整还是向下取整。\n\n![A437923_1_En_6_Fig2_HTML.jpg](img/A437923_1_En_6_Fig2_HTML.jpg)\n\
    \n**图 6-2.** 观察不同的取整函数如何工作\n"
- fmt: '### Calculation Functions


    You can combine Swift’s four basic mathematical (addition, subtraction, division,
    and multiplication) to create sophisticated calculations of any kind. However,
    the Cocoa framework includes common types of mathematical functions that you can
    use so you don’t have to create them yourself. Some common calculation functions
    include:


    - `fabs`: Calculates the absolute value of a number

    - `sqrt`: Calculates the square root of a positive number

    - `cbrt`: Calculates the cube root of a positive number

    - `hypot`: Calculates the square root of (`x*x + y*y`)

    - `fmax`: Identifies the maximum or largest value of two numbers

    - `fmin`: Identifies the minimum or smallest value of two numbers


    To see how these different calculation functions work, follow these steps:


    1. Make sure your `IntroductoryPlayground` is loaded in Xcode.

    2. Edit the code as follows:


    ```

    import Cocoa

    var testNumber : Double

    testNumber = fabs(52.64)

    testNumber = fabs(-52.64)

    testNumber = sqrt(5)

    testNumber = cbrt(5)

    testNumber = hypot(4, 9)

    testNumber = fmax(34.2, 89.2)

    testNumber = fmin(34.2, 89.2)

    ```


    Figure [6-3](#A437923_1_En_6_Chapter.html#Fig3) shows how each type of calculation
    function works differently.


    ![A437923_1_En_6_Fig3_HTML.jpg](A437923_1_En_6_Fig3_HTML.jpg)


    Figure 6-3. Seeing how different calculation functions work


    ### Trigonometry Functions


    If you remember from school (or even if you don’t), trigonometry is a mathematical
    field involving angles between intersecting lines. Since trigonometry can actually
    be handy in the real world, the Cocoa framework provides plenty of functions for
    calculating cosines, hyperbolic sines, inverse tangents, and inverse hyperbolic
    cosines. Some common trigonometry functions include:


    - `sin`: Calculates the sine of a degree measured in radians

    - `cos`: Calculates the cosine of a degree measured in radians

    - `tan`: Calculates the tangent of a degree measured in radians

    - `sinh`: Calculates the hyperbolic sine of a degree measured in radians

    - `cosh`: Calculates the hyperbolic cosine of a degree measured in radians

    - `tanh`: Calculates the hyperbolic tangent of a degree measured in radians

    - `asin`: Calculates the inverse sine of a degree measured in radians

    - `acos`: Calculates the inverse cosine of a degree measured in radians

    - `atan`: Calculates the inverse tangent of a degree measured in radians

    - `asinh`: Calculates the inverse hyperbolic sine of a degree measured in radians

    - `acosh`: Calculates the inverse hyperbolic cosine of a degree measured in radians

    - `atanh`: Calculates the inverse hyperbolic tangent of a degree measured in radians


    To see how these different trigonometry functions work, follow these steps:


    1. Make sure your `IntroductoryPlayground` is loaded in Xcode.

    2. Edit the code as follows:


    ```

    import Cocoa

    var testNumber : Double

    testNumber = sin(1)

    testNumber = cos(1)

    testNumber = tan(1)

    testNumber = sinh(1)

    testNumber = cosh(1)

    testNumber = tanh(1)

    testNumber = asin(1)

    testNumber = acos(1)

    testNumber = atan(1)

    testNumber = asinh(1)

    testNumber = acosh(1)

    testNumber = atanh(1)

    ```


    Figure [6-4](#A437923_1_En_6_Chapter.html#Fig4) shows how each type of trigonometry
    function works differently.


    ![A437923_1_En_6_Fig4_HTML.jpg](A437923_1_En_6_Fig4_HTML.jpg)


    Figure 6-4. Seeing how different trigonometry functions work


    ### Exponential Functions


    Exponential functions involve multiplication such as multiplying the number 2
    by itself a fixed number of times. Some common exponential functions include:


    - `exp`: Calculates e**x where x is an integer

    - `exp2`: Calculates 2**x where x is an integer

    - `__exp10`: Calculates 10**x where x is an integer

    - `expm1`: Calculates e**x-1 where x is an integer

    - `pow`: Calculates x raised to the power of y


    To see how these different trigonometry functions work, follow these steps:


    1. Make sure your `IntroductoryPlayground` file is loaded in Xcode.

    2. Edit the code as follows:


    ```

    import Cocoa

    var testNumber : Double

    testNumber = exp(3)

    testNumber = exp2(3)

    testNumber = __exp10(3)

    testNumber = expm1(3)

    testNumber = pow(2,4)

    ```


    Figure [6-5](#A437923_1_En_6_Chapter.html#Fig5) shows how each type of trigonometry
    function works differently.


    ![A437923_1_En_6_Fig5_HTML.jpg](A437923_1_En_6_Fig5_HTML.jpg)


    Figure 6-5. Seeing how different exponential functions work


    ### Logarithmic Functions


    Logarithm functions allow multiplication, division, and addition of large numbers
    in calculations similar to exponential functions. Some common logarithmic functions
    include:


    - `log`: Calculates the natural logarithm of number

    - `log2`: Calculates the base-2 logarithm of a number

    - `log10`: Calculates the base-10 logarithm of a number

    - `log1p`: Calculates the natural log of 1 + x


    To see how these different logarithmic functions work, follow these steps:


    1. Make sure your `IntroductoryPlayground` file is loaded in Xcode.

    2. Edit the code as follows:


    ```

    import Cocoa

    var testNumber : Double

    testNumber = log(3)

    testNumber = log2(3)

    testNumber = log10(3)

    testNumber = log1p(3)

    ```


    Figure [6-6](#A437923_1_En_6_Chapter.html#Fig6) shows how each type of logarithmic
    function works differently.


    ![A437923_1_En_6_Fig6_HTML.jpg](A437923_1_En_6_Fig6_HTML.jpg)


    Figure 6-6. Seeing how different logarithmic functions work


    ## Using String Functions


    Just as the Cocoa framework provides dozens of math functions, so does it also
    contain a handful of string manipulation functions. Some common string functions
    include:


    - `+`: Concatenates or combines two strings together such as “Hello ” + “world”,
    which creates the string “Hello world”

    - `characters.count`: Returns the length of a string

    - `capitalized`: Capitalizes the first letter of each word

    - `lowercased()`: Converts an entire string to lowercase letters

    - `uppercased()`: Converts an entire string to uppercase letters

    - `isEmpty`: Checks if a string is empty or has at least one character

    - `hasPrefix`: Checks if certain text appears at the beginning of a string

    - `hasSuffix`: Checks if certain text appears at the end of a string


    When using the `+` operator to append or combine strings, be careful of spaces.
    If you omit spaces, you might get unwanted results. For example, `"Hello" + "world"`
    creates the string `"Helloworld"` without any spaces. That’s why you need to make
    sure you put a space in between words such as `"Hello " + "world"` to create `"Hello
    world"`.


    To see how these different string functions work, follow these steps:


    1. Make sure `IntroductoryPlayground` is loaded in Xcode.

    2. Edit the code as follows:


    ```

    import Cocoa

    var text : String = "Hello everyone!"

    print (text.characters.count)

    print (text.capitalized)

    print (text.lowercased())

    print (text.uppercased())

    print (text.isEmpty)

    print (text.hasPrefix ("Hello"))

    print (text.hasSuffix ("world"))

    ```


    Figure [6-7](#A437923_1_En_6_Chapter.html#Fig7) shows how each type of logarithmic
    function works differently.


    ![A437923_1_En_6_Fig7_HTML.jpg](A437923_1_En_6_Fig7_HTML.jpg)


    Figure 6-7. Seeing how different string functions work'
