    \ that contains the label “Second scene here”, as shown in Figure [16-12](#A437923_1_En_16_Chapter.html#Fig12).\n\
    \n    ![A437923_1_En_16_Fig12_HTML.jpg](A437923_1_En_16_Fig12_HTML.jpg)\n\n  \
    \  Figure 16-12.\n\n    A segue opens a second view.\n\n### Displaying Scenes\
    \ from a Segue\n\nSegues serve two purposes . First, a segue connects one scene\
    \ to another scene. Second, a segue defines how that second scene appears. When\
    \ creating a segue, you have five options:\n\n*   Show: Displays a scene as a\
    \ separate window that can be moved and resized\n*   Custom: Lets you create a\
    \ custom appearance for the scene\n*   Modal: Displays a scene as a dialog that\
    \ won’t let the user do anything else until dismissing this scene\n*   Popover:\
    \ Displays a scene with an arrow pointing to an object, as shown in Figure [16-13](#A437923_1_En_16_Chapter.html#Fig13).\n\
    \n    ![A437923_1_En_16_Fig13_HTML.jpg](A437923_1_En_16_Fig13_HTML.jpg)\n\n  \
    \  Figure 16-13.\n\n    A popover appears pointing at the object the user clicked.\n\
    *   Sheet: Displays a scene as a sheet that drops down from a window’s title bar\
    \ and covers it up, as shown in Figure [16-14](#A437923_1_En_16_Chapter.html#Fig14).\n\
    \n    ![A437923_1_En_16_Fig14_HTML.jpg](A437923_1_En_16_Fig14_HTML.jpg)\n\n  \
    \  Figure 16-14.\n\n    A sheet drops down from a window’s title bar .\n\nWhen\
    \ you first create a segue, you can define how the segue should display the scene.\
    \ However, you can always change this by following these steps:\n\n1.  Make sure\
    \ your StoryProgram project is loaded in Xcode and click the `Main.storyboard`\
    \ file in the Project Navigator pane.  \n2.  Click the segue you want to modify.\
    \ Xcode highlights your chosen segue.  \n3.  Choose View ➤ Utilities ➤ Show Attributes\
    \ Inspector. The Attributes Inspector pane displays the Kind property pop-up menu.\
    \  \n4.  Click the Kind pop-up menu and choose a different style such as modal\
    \ or custom, as shown in Figure [16-15](#A437923_1_En_16_Chapter.html#Fig15).\n\
    \n    ![A437923_1_En_16_Fig15_HTML.jpg](A437923_1_En_16_Fig15_HTML.jpg)\n\n  \
    \  Figure 16-15.\n\n    You can change how a segue displays a scene ."
  trans: "\n### 向故事板添加场景\n\n要向故事板添加场景，必须添加额外的控制器。要了解如何在故事板上创建新场景，请按照以下步骤操作：\n\n1.\
    \  确保你的`StoryProgram`项目已加载到 Xcode 中。\n2.  在项目导航器窗格中点击`Main.storyboard`文件。\n3.\
    \  选择“视图”➤“实用工具”➤“显示对象库”。\n4.  从对象库中拖出一个蓝色窗口控制器（见图 16-4），并将其放置在故事板中现有窗口控制器的旁边。\n\
    5.  拖动窗口控制器及其附带的视图控制器，使其如图 16-7 所示。\n\n    ![A437923_1_En_16_Fig7_HTML.jpg](img/A437923_1_En_16_Fig7_HTML.jpg)\n\
    \n    图 16-7. 在故事板中放置第二个窗口控制器\n\n当你开始向故事板添加更多场景时，这些场景不会显示在屏幕上。要使场景显示，你必须使用**转场**将该场景连接到现有场景，或者将该新场景定义为初始场景。\n\
    \n### 定义故事板中的初始场景\n\n在每个故事板中，必须将一个场景定义为初始场景，即程序运行时所显示的第一个窗口或视图。Xcode 使用一个指向右侧的箭头来标识初始场景。\n\
    \n另一种标识初始场景的方法是，点击控制器顶部中间的蓝色图标，并打开“显示属性检查器”窗格。如果`\"Is Initial Controller\"`复选框被选中，则当前选中的窗口即为初始场景，如图\
    \ 16-8 所示。\n\n![A437923_1_En_16_Fig8_HTML.jpg](img/A437923_1_En_16_Fig8_HTML.jpg)\n\
    \n图 16-8. 初始屏幕由箭头和`\"Is Initial Controller\"`复选框标识。\n\n若要更改初始场景，你可以拖动初始场景箭头，使其指向另一个场景。要使用`\"\
    Is Initial Controller\"`复选框定义初始场景，请按照以下步骤操作：\n\n1.  在项目导航器窗格中点击`.storyboard`文件。\n\
    2.  点击你想要设为初始场景的场景。\n3.  点击场景顶部的蓝色控制器图标，如图 16-9 所示。\n\n    ![A437923_1_En_16_Fig9_HTML.jpg](img/A437923_1_En_16_Fig9_HTML.jpg)\n\
    \n    图 16-9. 选择场景的控制器图标\n\n4.  选择“视图”➤“实用工具”➤“显示属性检查器”。右侧窗格的属性检查器窗口中会出现“窗口控制器”类别（见图\
    \ 16-8）。\n5.  选中`\"Is Initial Controller\"`复选框。\n\n请注意，一次只能有一个初始场景。一旦你为一个场景选中了`\"\
    Is Initial Controller\"`复选框，如果另一个场景也选中了该复选框，Xcode 会自动清除该场景中的`\"Is Initial Controller\"\
    `复选框。\n\n### 使用转场连接场景\n\n当故事板包含两个或更多场景时，如果运行程序，只会显示初始场景。要显示故事板中的其他场景，你需要创建场景之间的转场。转场在两个场景之间建立链接，以便用户能够依次查看场景。\n\
    \n要了解如何在场景之间创建转场，请按照以下步骤操作：\n\n1.  确保你的`StoryProgram`项目已加载到 Xcode 中，并在项目导航器窗格中点击`Main.storyboard`文件。\n\
    2.  从对象库窗口中拖出一个按钮，并将其放置在第一个场景上。\n3.  将鼠标指针移到该按钮上，按住 Control 键，然后从该按钮向第二个场景拖动鼠标。Xcode\
    \ 会高亮显示第二个场景，如图 16-10 所示。\n\n    ![A437923_1_En_16_Fig10_HTML.jpg](img/A437923_1_En_16_Fig10_HTML.jpg)\n\
    \n    图 16-10. 按住 Control 键从按钮拖动到另一个场景可创建转场。\n\n4.  松开 Control 键和鼠标。Xcode 会显示一个弹出菜单，如图\
    \ 16-11 所示。\n\n    ![A437923_1_En_16_Fig11_HTML.jpg](img/A437923_1_En_16_Fig11_HTML.jpg)\n\
    \n    图 16-11. 弹出菜单让你定义如何显示场景。\n\n5.  选择“Show”。Xcode 会在两个场景之间创建一个转场。\n6.  在第二个场景上拖放一个标签，并将其文本更改为“Second\
    \ scene here”。\n7.  选择“产品”➤“运行”。Xcode 运行你的程序，并显示带有按钮的窗口。\n8.  点击按钮。第二个窗口出现，其中包含标签“Second\
    \ scene here”，如图 16-12 所示。\n\n    ![A437923_1_En_16_Fig12_HTML.jpg](img/A437923_1_En_16_Fig12_HTML.jpg)\n\
    \n    图 16-12. 转场打开第二个视图。\n\n### 显示转场中的场景\n\n转场有两个用途。第一，转场将一个场景连接到另一个场景。第二，转场定义了第二个场景的显示方式。创建转场时，你有五种选择：\n\
    \n*   **Show**：将场景显示为一个单独的窗口，该窗口可以移动和调整大小。\n*   **Custom**：允许你为场景创建自定义外观。\n* \
    \  **Modal**：将场景显示为一个对话框，用户在关闭此对话框之前无法执行其他任何操作。\n*   **Popover**：显示一个场景，并带有一个指向某个对象的箭头，如图\
    \ 16-13 所示。\n\n    ![A437923_1_En_16_Fig13_HTML.jpg](img/A437923_1_En_16_Fig13_HTML.jpg)\n\
    \n    图 16-13. 弹出的 Popover 指向用户点击的对象。\n\n*   **Sheet**：将场景显示为一个从窗口标题栏下拉并覆盖窗口的\
    \ Sheet，如图 16-14 所示。\n\n    ![A437923_1_En_16_Fig14_HTML.jpg](img/A437923_1_En_16_Fig14_HTML.jpg)\n\
    \n    图 16-14. 一个 Sheet 从窗口标题栏下拉。\n\n首次创建转场时，你可以定义转场应如何显示场景。但是，你随时可以通过以下步骤更改此设置：\n\
    \n1.  确保你的`StoryProgram`项目已加载到 Xcode 中，并在项目导航器窗格中点击`Main.storyboard`文件。\n2.  点击你想要修改的转场。Xcode\
    \ 会高亮显示你选择的转场。\n3.  选择“视图”➤“实用工具”➤“显示属性检查器”。属性检查器窗格会显示`Kind`属性弹出菜单。\n4.  点击`Kind`弹出菜单，并选择不同的样式，例如`modal`或`custom`，如图\
    \ 16-15 所示。\n\n    ![A437923_1_En_16_Fig15_HTML.jpg](img/A437923_1_En_16_Fig15_HTML.jpg)\n\
    \n    图 16-15. 你可以更改转场显示场景的方式。\n"
- fmt: "### Adding a Controller File to a Scene\n\nEach time you add a different scene\
    \ to a storyboard, you’re essentially adding another window of your program’s\
    \ user interface. However, each scene also needs its own Swift file to control\
    \ it. This way, if you add buttons or other user interface items, you can write\
    \ Swift code to display data on that scene or handle any commands the user might\
    \ choose, such as clicking a button.\n\nFirst, you must create one Swift file\
    \ for each additional scene you add to a storyboard. Second, you must link this\
    \ Swift file to the scene so the scene can use it.\n\nTo learn how to create a\
    \ Swift file to control a scene, follow these steps:\n\n1.  Make sure your `StoryProgram`\
    \ project is loaded in Xcode and click the `Main.storyboard` file in the Project\
    \ Navigator pane.\n2.  Choose File ➤ New ➤ File. Xcode displays different templates\
    \ you can use.\n3.  Choose Source under macOS and click the Cocoa Class icon,\
    \ as shown in Figure [16-16](#A437923_1_En_16_Chapter.html#Fig16). Then click\
    \ the Next button. Another dialog appears, asking for a name and a subclass.\n\
    \n![A437923_1_En_16_Fig16_HTML.jpg](A437923_1_En_16_Fig16_HTML.jpg)\n\nFigure\
    \ 16-16. Creating a Cocoa class file to store Swift code for a view controller\n\
    \n4.  Click in the Name text field and type a descriptive name for your class\
    \ to control your scene, such as `SecondController`.\n5.  Click in the Subclass\
    \ of: pop-up menu and choose `NSViewController`. (If you are creating a Swift\
    \ file for a different type of controller such as a page controller or a tab view\
    \ controller, choose a different subclass, such as `NSPageController` or `NSTabView`.)\n\
    6.  Clear the \"Also create XIB file for user interface\" check box.\n7.  Make\
    \ sure the Language pop-up menu displays Swift, as shown in Figure [16-17](#A437923_1_En_16_Chapter.html#Fig17).\
    \ Click the Next button. Xcode asks where you want to save your new Swift class.\n\
    \n![A437923_1_En_16_Fig17_HTML.jpg](A437923_1_En_16_Fig17_HTML.jpg)\n\nFigure\
    \ 16-17. Creating a Swift class to control a scene in a storyboard\n\n8.  Choose\
    \ a folder and click the Create button. Xcode displays your Swift class in the\
    \ Project Navigator pane. At this point, the Swift class and the scene aren’t\
    \ connected so you must make the scene’s view controller a class of the Swift\
    \ file you just created.\n9.  Click the `Main.storyboard` file to display your\
    \ user interface.\n10.  Click the blue View Controller icon on the scene that\
    \ has the label “Second scene here” on it.\n11.  Choose View ➤ Utilities ➤ Show\
    \ Identity Inspector.\n12.  Click in the Class pop-up menu and choose `SecondController`,\
    \ the view controller you created earlier, as shown in Figure [16-18](#A437923_1_En_16_Chapter.html#Fig18).\n\
    \n![A437923_1_En_16_Fig18_HTML.jpg](A437923_1_En_16_Fig18_HTML.jpg)\n\nFigure\
    \ 16-18. Connecting a scene to a Swift view controller file\n\n13.  Drag a push\
    \ button onto this second scene.\n14.  Choose View ➤ Assistant Editor ➤ Show Assistant\
    \ Editor. The Assistant Editor displays the `SecondController.swift` file you\
    \ just created.\n15.  Move the mouse pointer over the label on this second scene,\
    \ hold down the Control key, and drag the mouse under the `class SecondController`\
    \ line. A pop-up window appears.\n16.  Type `labelName` in the Name field and\
    \ click the Connect button. The following line should appear in your code:\n\n\
    ```\n@IBOutlet weak var labelName: NSTextField!\n```\n\n17.  Move the mouse pointer\
    \ over the push button on this second scene, hold down the Control key, and drag\
    \ the mouse just above the last curly bracket in the bottom of the `SecondController.swift`\
    \ file, as shown in Figure [16-19](#A437923_1_En_16_Chapter.html#Fig19). A pop-up\
    \ window appears.\n\n![A437923_1_En_16_Fig19_HTML.jpg](A437923_1_En_16_Fig19_HTML.jpg)\n\
    \nFigure 16-19. Creating an IBAction method for a button\n\n18.  Click in the\
    \ Connection pop-up menu and choose Action.\n19.  Click in the Name text field\
    \ and type `changeLabel`.\n20.  Click in the Type pop-up menu and choose `NSButton`.\
    \ Then click the Connect button. Xcode displays an empty IBAction method.\n21.\
    \  Modify the IBAction method as follows:\n\n```\n@IBAction func changeLabel(_\
    \ sender: NSButton) {\n    labelName.stringValue = \"Button clicked\"\n}\n```\n\
    \n22.  Choose Product ➤ Run. Your program’s initial scene appears with the button.\n\
    23.  Click the button on this first scene. Your second scene appears as another\
    \ window.\n24.  Click the button on this second scene. The label on the second\
    \ scene changes from “Second scene here” to “Button clicked”.\n25.  Choose StoryProgram\
    \ ➤ Quit StoryProgram.\n\nThis exercise showed how to create a Swift file as a\
    \ Cocoa Class file. Then it showed how to link this Swift file to the second view\
    \ controller. Once you connect a Swift file to a view controller, you can write\
    \ Swift code to make any user interface items actually respond to Swift code.\n\
    \n## Summary\n\nYou can create your user interface and store them in multiple\
    \ `.xib` files or a single `.storyboard` file that contains multiple scenes. Storyboard\
    \ files are used for creating iOS apps so it’s best to use storyboard files for\
    \ macOS programs as well since storyboard files will likely become the standard\
    \ way for creating user interfaces.\n\nStoryboards let you define the order in\
    \ which scenes appear that make up your program’s user interface. When you add\
    \ additional scenes to a storyboard, you need to create Swift files that control\
    \ those scenes. These Swift files need to be of the `NSViewController` class and\
    \ then you must connect your scene to that Swift file.\n\nDesigning your program’s\
    \ user interface involves using `.xib` or `.storyboard` files, or a combination\
    \ of both. Storyboards reduce the need to write Swift code, but with both types\
    \ of files, you still need to write some Swift code to make your user interface\
    \ completely work."
