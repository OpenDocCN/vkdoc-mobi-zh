  trans: "\n# 带参数的简单函数\n\n简单函数无论情况如何变化，都只能重复执行相同的操作。为了让函数更灵活，通常允许函数接收数据作为输入。这些数据被称为参数。\n\
    \n`参数`让函数能够接收数据，并利用这些数据计算出不同的结果。要定义参数，你必须：\n\n*   列出一个描述性的参数名称。\n*   指定一个数据类型，例如\
    \ `Int` 或 `Double`。\n\n一个接受单个参数的函数如下所示：\n\n```\nfunc functionName (parameterName:\
    \ dataType) {\n}\n```\n\n要调用一个定义了参数的函数，你必须指定参数名称，后跟你要赋予或传递给函数的数据，例如：\n\n```\n\
    functionName (parameterName: inputData)\n```\n\n当调用带参数的函数时，你需要确保传递正确数量的参数，列出每个参数的名称，并为每个参数提供正确的数据类型。因此，如果你有一个接受一个字符串参数的函数，比如：\n\
    \n```\nfunc parameterFunction (name : String) {\n}\n```\n\n你可以通过其名称并在括号内传入一个（且仅一个）字符串来调用这个参数，例如：\n\
    \n```\nparameterFunction (name : “Oscar”)\n```\n\n函数调用失败的方式有以下几种：\n\n*   函数名输入错误。\n\
    *   没有包含参数名称。\n*   传递的参数数量不正确。\n*   没有列出或传递正确数据类型的参数。\n\n在这个例子中，`parameterFunction`\
    \ 期望一个必须是 `String` 数据类型的参数。以下是调用此函数可能失败的所有情况：\n\n*   拼写错误函数名（`parameterFunction`）。\n\
    *   未能包含或拼写错误参数名称（`name:`）。\n*   没有传递正确数量的参数（单个 `String` 数据类型）。\n*   没有列出或传递正确数据类型的参数（一个\
    \ `String` 数据类型）。\n\n要了解带参数的函数如何工作，请按照以下步骤操作：\n\n1.  确保你的 `IntroductoryPlayground`\
    \ 文件已在 Xcode 中加载。\n2.  按如下所示编辑代码：\n\n    ```\n    import Cocoa\n    func parameterFunction\
    \ (name : String) {\n        print (\"Hello, \" + name)\n    }\n    parameterFunction(name:\
    \ \"Oscar\")\n    ```\n\n这个 Swift 程序调用了 `parameterFunction` 并向其传递了一个字符串参数（`\"\
    Oscar\"`）。当 `parameterFunction` 接收到这个参数（`\"Oscar\"`）时，它会将其存储在其 `name` 变量中。然后它会打印出\
    \ `\"Hello, Oscar\"`，如图 11-2 所示。\n\n![A437923_1_En_11_Fig2_HTML.jpg](img/A437923_1_En_11_Fig2_HTML.jpg)\n\
    \n**图 11-2.** 向函数传递字符串参数\n\n尽管这个例子只使用了一个参数，但一个函数可以接受的参数数量没有限制。要接受更多参数，你只需要定义额外的变量名称和数据类型，像这样：\n\
    \n```\nfunc functionName (parameter: dataType, parameter2 : dataType) {\n}\n```\n\
    \n每个参数可以接受不同的数据类型，因此你可以向函数传递一个字符串和一个整数，例如：\n\n```\nfunc functionName (parameter:\
    \ String, parameter2 : Int) {\n}\n```\n\n要调用此函数，你需要指定函数名称及其两个具有正确数据类型的参数：\n\n\
    ```\nfunctionName (parameter: \"Hello\", parameter2: 48)\n```\n\n如果你传递参数的顺序错误，函数调用将无法工作：\n\
    \n```\nfunctionName (parameter: 48, parameter2: \"Hello\")\n```\n\n传递参数时，务必确保传递正确数量的参数、每个参数的名称以及正确数据类型，并且顺序也要正确。\n\
    \n# 带参数并返回值的函数\n\n最通用的函数是那些使用参数接收数据，然后基于该数据返回值的函数。一个返回值函数的基本结构如下所示：\n\n```\nfunc\
    \ functionName (parameter: ParameterDataType) -> DataType {\n    return someValue\n\
    }\n```\n\n函数名称可以是任意你想使用的名称。理想情况下，函数名称应能描述其用途。\n\n参数很像声明一个变量，通过指定参数名称及其可以接受的数据类型来实现。参数是可选的，但没有参数的函数通常不大有用，因为它们会重复执行相同的任务。\n\
    \n`->` 符号定义了函数名称所代表的数据类型。\n\n`return` 关键字后面必须跟一个值或计算该值的命令。这个值的数据类型必须与 `->` 符号后面的数据类型一致。任何返回值的函数都可以存储在一个相同数据类型的变量中。\n\
    \n假设你定义了一个如下所示的函数：\n\n```\nfunc salesTax (amount: Double) -> Double {\n    let\
    \ currentTax = 0.075 // 7.5% 销售税\n    return amount * currentTax\n}\n```\n\n这个函数的名称为\
    \ `salesTax`，它接受一个名为 `amount` 的参数，该参数可以存储 `Double` 数据类型。当它计算结果时，该结果也是一个 `Double`\
    \ 数据类型，如 `->` 符号后的 `Double` 所标识。`return` 关键字指明了函数如何计算要返回的值。\n\n由于此函数返回一个 `Double`\
    \ 数据类型，你可以将结果存储在一个同样是 `Double` 数据类型的变量中。\n\n要了解此函数如何工作，请按照以下步骤操作：\n\n1.  确保你的\
    \ `IntroductoryPlayground` 文件已在 Xcode 中加载。\n2.  按如下所示编辑代码：\n\n    ```\n    import\
    \ Cocoa\n    func salesTax (amount: Double) -> Double {\n        let currentTax\
    \ = 0.075\n        return amount * currentTax\n    }\n    let purchasePrice =\
    \ 59.95\n    var total : Double\n    total = purchasePrice + salesTax(amount:purchasePrice)\n\
    \    print (\"包括销售税，您的总金额为 = \\(total)\")\n    ```\n\n请注意，此代码通过将 `purchasePrice`\
    \ 中存储的值传递给 `salesTax` 函数来调用它。当你在 Playground 中输入此代码时，你会在右侧边栏看到显示的结果，如图 11-3 所示。更改\
    \ `purchasePrice` 和 `currentTax` 中存储的值，以查看它如何影响此 Swift 代码计算出的结果。\n\n![A437923_1_En_11_Fig3_HTML.jpg](img/A437923_1_En_11_Fig3_HTML.jpg)\n\
    \n**图 11-3.** 定义和调用函数\n\n当一个函数返回值时，请确保指定：\n\n*   函数所代表的数据类型（`-> dataType`）\n*\
    \   函数名称所代表的值（`return`）\n*   将返回的函数值存储在一个能够容纳该返回数据类型的变量中\n\n在调用一个返回值的函数时，请确保数据类型匹配。在上述示例中，`salesTax`\
    \ 函数返回一个 `Double` 数据类型，因此在 Swift 代码中，这个 `salesTax` 函数的值被存储在 `total` 变量中，该变量也是\
    \ `Double` 数据类型。\n"
- fmt: '# Using Variable Parameters


    When a function accepts parameters, it treats that parameter like a constant.
    This means within the function, Swift code cannot modify that parameter. If you
    want to modify a parameter within a function, then you need to create a variable
    parameter by identifying the parameter with the `var` keyword, as follows:


    ```

    func functionName (parameter: dataType) {

    var parameter = parameter

    }

    ```


    To see how variable parameters work, follow these steps:


    1.  Make sure your `IntroductoryPlayground` file is loaded in Xcode.

    2.  Edit the code as follows:


    ```

    import Cocoa

    func internalChange (name : String) {

    var name = name

    name = name.uppercased()

    print ("Hello " + name)

    }

    internalChange (name : "Tasha")

    ```


    Within the `internalChange` function, the `name` parameter changes because the
    parameter is declared as a variable (`var name = name`). The second line in the
    `internalChange` function changes the `name` parameter into uppercase. However,
    any changes the `internalChange` function makes to the `name` parameter has no
    effect in any other part of your program. All changes stay isolated within the
    `internalChange` function.


    If you want to change a parameter and have those changes take effect outside a
    function, then you need to use `inout` parameters instead.


    # Using Inout Parameters


    There are two ways to pass data to a function. One is to pass a fixed value, such
    as


    ```

    sqrt(5)

    ```


    A second way is to pass a variable that represents a value, such as


    ```

    var z : Double = 45.0

    var answer : Double

    answer = sqrt(z)

    ```


    In this Swift code, the value of `z` is 45.0 and is passed to the `sqrt` function.
    No matter what the `sqrt` function does, the value of `z` still remains 45.0.


    If you want a function to change the value of its parameters, you can create what’s
    called `inout` parameters. This means when you pass a variable to a function,
    that function changes that variable.


    To define a parameter that a function can change, you just have to identify that
    parameter using the `inout` keyword, such as


    ```

    func functionName (parameter: inout dataType) {

    }

    ```


    If a function has two or more parameters, you can designate one or more parameters
    as `inout` parameters. When you identify a parameter as an `inout` parameter,
    then the function must change that `inout` parameter. When you call a function
    and pass it an `inout` parameter, you must use the `&` symbol to identify an `inout`
    parameter, such as


    ```

    functionName (parameter: &variable)

    ```


    To see how `inout` parameters work, follow these steps:


    1.  Make sure your `IntroductoryPlayground` file is loaded in Xcode.

    2.  Edit the code as follows:


    ```

    import Cocoa

    func changeMe (name: inout String, age: Int) {

    print (name + " is \(age) years old")

    name = name.uppercased()

    }

    var animal : String = "Oscar the cat"

    changeMe (name: &animal, age: 2)

    print (animal)

    ```


    The `changeMe` function defines two parameters:


    *   A string parameter called `name` and identified as an `inout` parameter

    *   An integer parameter called `age`


    The `changeMe` function must modify the `inout` parameter somehow, which it does
    by changing the `name` parameter to uppercase, as shown in Figure 11-4.


    ![A437923_1_En_11_Fig4_HTML.jpg](A437923_1_En_11_Fig4_HTML.jpg)


    Figure 11-4. Using inout parameters


    Calling the `changeMe` function sends it a `String` variable called `animal`,
    which holds the string `"Oscar the cat"`. The `changeMe` function expects two
    parameters where the first one is an `inout` parameter. This means calling the
    `changeMe` function must meet the following criteria:


    *   The `changeMe` function expects two parameters: a string and an integer, in
    that order.

    *   Since the string parameter is an `inout` parameter, the first parameter must
    be a variable identified with the `&` symbol.


    Before calling the `changeMe` function, the `animal` variable contains the string
    `"Oscar the cat"`. After calling the `changeMe` function, the `animal` variable
    now contains the string `"OSCAR THE CAT"`. That’s because the `inout` parameter
    in the `changeMe` function modified it.


    # Returning Multiple Values


    To make a function return a value, you must specify two items:


    *   The data type the function returns, identified by the `->` symbols such as
    `-> Double`

    *   The `return` keyword at the end of the function that identifies a single value


    The following function returns an `Int` value:


    ```

    func add2Numbers (first : Int, second : Int) -> Int {

    return first + second

    }

    add2Numbers (first: 5, second: 17)

    ```


    In most cases, you want a function to return just a single value, but functions
    can also return two or more values. If you want a function to return two or more
    values, you need to do the following:


    *   Specify all data types (in parentheses) that you want the function to return
    after the `->` symbol.

    *   Use the `return` keyword and list all data in the correct order and data type
    (in parentheses).

    *   Store the returned multiple values in a tuple.


    Remember, a tuple (Chapter 10) is a variable that can hold two or more values
    where each value can be a different data type, such as


    ```

    var myTuple : (Double, Double, Double)

    ```


    To create a function that returns more than one value, you simply enclose one
    or more data types in parentheses. So if you want a function to return three `Double`
    values, you define a function to return three `Double` values, like this:


    ```

    func currencyConversion (USD : Double) -> (Double, Double, Double) {

    }

    ```


    Inside this function, you need to return three values that are `Double` data types,
    such as


    ```

    return (USD * 0.8975, USD * 0.7988, USD * 6.76)

    ```


    To see how to use functions that return multiple values, follow these steps:


    1.  Make sure your `IntroductoryPlayground` file is loaded in Xcode.

    2.  Edit the code as follows:


    ```

    import Cocoa

    var myTuple : (Double, Double, Double)

    func currencyConversion (USD : Double) -> (Double, Double, Double) {

    return (USD * 0.8975, USD * 0.7988, USD * 6.76)

    }

    myTuple = currencyConversion (USD: 20)

    print (myTuple.0)

    print (myTuple.1)

    print (myTuple.2)

    ```


    To retrieve individual items stored in a tuple, you can use index numbers where
    the first item in a tuple is located at index 0, the second at index 1, and so
    on. Figure 11-5 shows how to create a function that returns multiple values, stores
    the multiple values in a tuple, and accesses each item in the tuple.


    ![A437923_1_En_11_Fig5_HTML.jpg](A437923_1_En_11_Fig5_HTML.jpg)


    Figure 11-5. Returning multiple values from a function and accessing them in a
    tuple'
