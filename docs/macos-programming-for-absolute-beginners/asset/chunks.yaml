    \ [12](#A437923_1_En_12_Chapter.html)). The main difference is that a structure\
    \ only contains data, while a class can contain data and functions to manipulate\
    \ that data.\n\nOnce you’ve defined a class, you can create one or more objects\
    \ based on that class. Think of a class as a cookie cutter that defines the shape\
    \ of cookies, and objects as different types of dough you can define based on\
    \ the class.\n\nThe simplest type of class you can define looks like this:\n\n\
    ```\nclass ClassName {\n}\n```\n\nTo create an object from this class, you just\
    \ declare a variable, but instead of defining a data type like `Int` or `String`,\
    \ you define the class name, such as\n\n```\nvar myObject = ClassName()\n```\n\
    \nOf course, a class that contains no code is useless, so the two types of code\
    \ you can include in a class are variables (known as properties) and functions\
    \ for manipulate data (known as methods). Creating properties in a class involves\
    \ creating one or more variables and defining a data type and an initial value,\
    \ such as\n\n```\nclass ClassName {\nvar name : String = \"\"\nvar ID : Int =\
