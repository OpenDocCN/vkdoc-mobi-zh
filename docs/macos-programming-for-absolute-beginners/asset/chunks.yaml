- fmt: '## Following Lucrative Programming Trends


    The introduction of a new computer platform has always ushered in a lucrative
    period for programmers. In the early 80s, the hottest platform was the Apple II
    computer. If you wanted to make money writing programs, you wrote programs to
    sell to Apple II computer owners, like Dan Bricklin, an MBA graduate student at
    the time, did when he wrote the first spreadsheet program, `VisiCalc`.


    The next big computing platform shift occurred in the mid-80s with the IBM PC
    and `MS-DOS`. People made fortunes off the IBM PC, including Bill Gates and Microsoft,
    which went from a small start-up company to the most dominant computer company
    in the world. The IBM PC made millionaires out of hundreds of people including
    Scott Cook, a former marketing director at Proctor & Gamble, who developed the
    popular money manager program, `Quicken`.


    Microsoft helped usher in the next computer platform when it shifted from `MS-DOS`
    to Windows and put a friendly graphical user interface on IBM PCs. Once again,
    programming for Windows became the number one way that programmers and non-programmers
    alike made fortunes by writing and selling their own Windows programs. Microsoft
    took advantage of the shift to Windows by releasing several Windows-only programs
    that have become fixtures of the business world, such as `Outlook`, `Access`,
    and `Excel`.


    Now the world is shifting towards the new computer platform of Apple products
    running `macOS` and `iOS`. Thousands of people just like you are eager to start
    writing programs to take advantage of the Macintosh’s rising market share along
    with the dominant position of the iPhone and the iPad in the smartphone and tablet
    categories, the Apple Watch in the wearable computer market, and the Apple TV
    in the TV market.


    Likewise, experienced developers, amateurs, hobbyists, and professionals in other
    fields are also interested in writing their own games, utilities, and business
    software specific to their particular niche.


    Many programmers have gone from knowing nothing about programming to earning thousands
    of dollars a day by creating iPhone/iPad apps or Macintosh programs. As the Macintosh,
    iPhone, iPad, Apple Watch, and Apple TV continue to gain market share all over
    the world, more people will use one or more of these products, increasing the
    potential market for you.


    All of this means that it’s a perfect time for you to start learning how to program
    your Macintosh right now, because the sooner you understand the basics of Macintosh
    programming, the sooner you can start creating your own Macintosh programs along
    with iPhone/iPad/Apple Watch/Apple TV apps.


    ## What to Expect From This Book


    Whether you’re a complete novice or a seasoned programmer coming from another
    programming environment, this book will minimize technical jargon and focus on
    helping you understand what to do and why.


    If you just want to get started and learn the basics of programming in Swift,
    this book is for you. If you’re already an experienced Windows programmer and
    want to get started programming the Macintosh, this book can be especially helpful
    in teaching you the basics in a hurry.


    If you’ve never programmed before in your life, or if you’re already familiar
    with programming but not with Macintosh programming, then this book is for you.
    Even if you’re experienced with Macintosh programming, you may still find this
    book handy as a reference to help you achieve certain results without having to
    wade through several books to find an answer.


    You won’t learn everything you need to create your own super-sophisticated programs,
    but you’ll learn just enough to get started, feel comfortable using `Xcode`, and
    be able to tackle other programming books with more confidence and understanding.
    Fair enough? If so, then turn the page and let’s get started.


    ## Acknowledgments


    Thanks go to all the wonderful people at Apress for giving me a chance to write
    about the wonderfully bizarre, yet fascinating, world of personal computing.


    Additional thanks go to Dane Henderson and Elizabeth Lee ( [`www.echoludo.com`](http://www.echoludo.com)
    ), who share the airwaves with me on our radio show called “Notes From the Underground”
    on [KNSJ.​org](http://knsj.org) . More thanks go to Chris Clobber, Diane Jean,
    and Ikaika Patria for letting me share their friendship and lunacy every week
    on another KNSJ radio show called “Laugh In Your Face Radio” ( [`www.laughinyourfaceradio.com`](http://www.laughinyourfaceradio.com)
    ) where we combine comedy with political activism and commentary.


    A special mention goes to Michael Montijo and his indomitable spirit, which has
    had him drive from Phoenix to Los Angeles at least once a month for the past 20
    years to meet with Hollywood executives. One day when you hear about his cartoon
    series “Life of Mikey” and “Pachuko Boy,” you’ll know how they finally appeared
    on television because he never gave up on his dream despite all the obstacles
    in his way.


    Thanks also go to my wife, Cassandra, and my son, Jordan, for putting up with
    a house filled with more gadgets than actual living people. Final thanks go to
    my cats, Oscar and Mayer, for walking over the keyboard, stepping on the trackpad
    and mouse, and chewing on power cords at the most inconvenient times of the day.'
