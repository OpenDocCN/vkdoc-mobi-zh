    \ ➤ `Quit TouchProgram`.\n\n## Summary\n\nUntil all Macintosh computers come with\
    \ a Touch Bar, the Touch Bar will be an optional way for users to interact with\
    \ a macOS program. Eventually, every Macintosh will come with a Touch Bar but\
    \ until then, you’ll need to add the following line of code to make sure Touch\
    \ Bar programs don’t run on any Macintosh unless it’s running macOS 10.12.2 or\
    \ higher:\n\n```swift\n@available(OSX 10.12.2, *)\n```\n\nTo create a Touch Bar,\
    \ you just need to drag a Touch Bar item from the Object Library on to your window\
    \ controller (not the view controller). Then you need to create a Swift class\
    \ file to hold the `IBOutlet`s and `IBAction` methods from any items you place\
    \ on the Touch Bar, such as buttons, sliders, or labels. Once you’ve created a\
    \ Swift class file, you must define that class file to work with your window controller\
    \ by using the Identity Inspector.\n\nTo make the Touch Bar simulator appear on\
    \ a Macintosh without a Touch Bar, you must run your program, switch back to Xcode,\
    \ and then choose `Window` > `Show Touch Bar`. Then you need to switch back to\
    \ your running program to see the Touch Bar actually working.\n\nThe Touch Bar\
    \ will become a standard input device of the Macintosh so expect to see Apple\
    \ add new items you can add to the Touch Bar. As more people get comfortable using\
    \ the Touch Bar, you can be certain every macOS program will need to add Touch\
    \ Bar support.\n\n# 24. Protocol-Oriented Programming\n\nWhen Apple introduced\
    \ Swift during its Worldwide Developer's conference in 2014, it was promoted as\
    \ an easier, safer, and faster programming language for iOS, macOS, tvOS, and\
    \ watchOS development than Objective-C. While both Swift and Objective-C allow\
    \ object-oriented programming, Swift goes one step further and offers protocol-oriented\
    \ programming as well.\n\nOne of the biggest problems with pure object-oriented\
    \ programming languages is that extending the capabilities of a class means creating\
    \ additional subclasses. Then you have to create objects based on those new subclasses.\
    \ This can be a clumsy solution since you now have to keep track of one or more\
    \ subclasses where each subclass has a different name and may only offer only\
    \ minor differences between them.\n\nEven worse, Swift (unlike some object-oriented\
    \ programming languages) only allows single inheritance. This means a class can\
    \ only inherit from exactly one other class. If you'd really like to inherit properties\
    \ and methods from two different classes, you can't.\n\nTo get around this problem\
    \ of inheritance and multiple subclasses, Swift offers protocols. Protocols work\
    \ much like object-oriented programming but with some additional advantages:\n\
    \n- Protocols can extend features of classes, structs, and enums. Inheritance\
    \ can only extend features of classes.\n- A single class, struct, or enum can\
    \ be extended by one or more protocols. Inheritance can only extend a single class.\n\
    \nThis means that protocols are more flexible and versatile than classes, while\
    \ giving you the advantages of object-oriented programming without its disadvantages.\
    \ Instead of using classes (object-oriented programming), you can use protocols\
    \ (protocol-oriented programming), or mix both object-oriented programming and\
    \ protocol-oriented programming to get the best of both worlds."
