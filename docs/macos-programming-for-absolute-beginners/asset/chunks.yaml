    Figure 23-3.\n\nThe Touch Bar as part of the user interface"
  trans: "\n14.  点击你程序中的**文件**下拉菜单（不是 Xcode 的**文件**菜单），显示其完整列表。此时助理编辑器应显示 `AppDelegate.swift`\
    \ 文件。\n15.  从对象库中拖拽一个菜单项，放到**文件**下拉菜单底部**打印**命令下方。\n16.  将鼠标指针移到你刚刚添加到**文件**下拉菜单底部的新菜单项上，按住\
    \ Control 键，然后将鼠标拖到 `AppDelegate.swift` 文件底部最后一个花括号上方。此时会弹出一个窗口。\n17.  点击“连接”弹出菜单，选择**操作**。\n\
    18.  点击“名称”文本字段，输入 `myMenu`。\n19.  点击“类型”弹出菜单，选择 `NSMenuItem`，然后点击**连接**按钮。Xcode\
    \ 会创建一个空的 IBAction 方法。\n20.  选中这个空的 IBAction 方法，然后选择**编辑** ➤ **拷贝**。\n21.  将鼠标指针移到你刚刚添加到**文件**菜单底部的新菜单项上，按住\
    \ Control 键，然后将鼠标拖到**第一响应者**图标上，如图 22-18 所示。\n\n![A437923_1_En_22_Fig18_HTML.jpg](img/A437923_1_En_22_Fig18_HTML.jpg)\n\
    \n**图 22-18.** 将菜单命令连接到第一响应者图标\n\n22.  松开 Control 键和鼠标。此时会弹出一个菜单，如图 22-19 所示。\n\
    \n![A437923_1_En_22_Fig19_HTML.jpg](img/A437923_1_En_22_Fig19_HTML.jpg)\n\n**图\
    \ 22-19.** 将菜单命令连接到第一响应者图标\n\n23.  点击 `myMenu`。\n24.  将鼠标指针移到你程序中**文件**下拉菜单里的**保存**命令上（不是\
    \ Xcode 的**文件**菜单）。\n25.  按住 Control 键，从**保存**命令拖向**第一响应者**图标。\n26.  松开 Control\
    \ 键和鼠标。此时会弹出一个菜单（参见图 22-19）。\n27.  点击 `myMenu`。\n28.  选择**视图** ➤ **标准编辑器** ➤ **查看标准编辑器**，使\
    \ Xcode 窗口中只显示一个文件。\n29.  在项目导航器窗格中点击 `ViewController.swift` 文件。\n30.  将光标移到 `ViewController.swift`\
    \ 文件中最后一个花括号上方，然后选择**编辑** ➤ **粘贴**。Xcode 会将第 20 步中的 IBAction 方法粘贴过来。\n31.  按如下方式修改这个\
    \ IBAction 方法：\n\n```swift\n@IBAction func myMenu(_ sender: NSMenuItem) {\n  \
    \  textResult.stringValue = \"Clicked on = \" + sender.title\n}\n```\n\n32.  选择**产品**\
    \ ➤ **运行**。你的用户界面会出现。\n33.  在你的 StoryMenu 菜单栏上选择**文件** ➤ **保存**。请注意，文本字段会显示“Clicked\
    \ on = Save…”。\n34.  在你的 StoryMenu 菜单栏上选择**文件** ➤ **项目**。请注意，文本字段现在会显示“Clicked\
    \ on = Item”。\n35.  选择**StoryMenu** ➤ **退出 StoryMenu**。\n\n## 总结\n\n当你创建一个 Cocoa\
    \ 应用程序项目时，Xcode 会自动为你的程序创建下拉菜单。你可以添加、删除或重新排列菜单栏上的菜单标题，或者下拉菜单中的菜单命令。为了方便用户，你甚至可以为菜单命令分配快捷键。\n\
    \n要编辑下拉菜单，你可以直接在下拉菜单上编辑，或者打开文档大纲。你可以通过 Control-拖拽的方式，从下拉菜单命令或文档大纲将菜单命令连接到 IBAction\
    \ 方法。\n\n在处理 `.storyboard` 文件时，你通常会将菜单命令连接到**第一响应者**图标。然后，你需要在正确的 Swift 文件中实现\
    \ IBAction 方法，以使该菜单命令生效。在处理 `.xib` 文件时，你可以直接将菜单命令连接到 IBAction 方法。\n\n当 Xcode 为你的\
    \ Cocoa 应用程序创建下拉菜单时，许多菜单命令已经知道如何工作，例如**窗口** ➤ **缩放**和**文件** ➤ **关闭**。然而，大多数菜单命令在你编写自己的\
    \ Swift 代码使其在你的特定程序中正常工作之前，不会执行任何操作。\n\n下拉菜单上的菜单命令为你提供了一种将命令连接到 IBAction 方法的额外方式。由于大多数\
    \ macOS 程序都依赖下拉菜单，因此应首先专注于将程序命令组织到下拉菜单中，然后编写 Swift 代码让每个菜单命令实际生效。\n\n# 23. 触控栏编程\n\
    \nMacintosh 电脑的最新输入设备是**触控栏**，它位于键盘上方，原本那一排功能键所在的位置。**触控栏**会根据你当前正在执行的操作显示上下文相关的快捷方式。例如，如果你正在打字，**触控栏**可能会显示建议输入的单词，你可以点击它们，从而无需完整键入整个单词。如果你正在编辑视频，**触控栏**可以让你在视频中前后滚动。\n\
    \n由于**触控栏**提供了一种与 Macintosh 交互的新方式，所有 macOS 程序都需要知道如何在**触控栏**上显示信息。**触控栏**编程的关键在于认识到并非所有\
    \ Macintosh 都配备**触控栏**。这意味着你不能在**触控栏**上显示任何无法同时在屏幕上查看的关键信息或命令。\n\n**触控栏**的第二个关键特性是显示用户在那个特定时刻最可能需要的命令的快捷方式。如果你在编辑文本，**触控栏**应显示文本格式快捷方式，例如**粗体**、*斜体*和**下划线**命令。如果你在编辑图形，**触控栏**应切换并显示图形编辑快捷方式，例如用于选择不同颜色或更改绘图工具大小的按钮。\n\
    \n**触控栏**的关键在于使其适应用户。当为你自己的 macOS 程序添加**触控栏**快捷方式时，你需要：\n\n-   在你程序用户界面的窗口中添加一个**触控栏**\n\
    -   在你的**触控栏**上添加按钮\n-   创建一个 Swift 文件来控制包含**触控栏**的窗口\n-   将**触控栏**按钮连接到 Swift\
    \ 文件中的 IBAction 方法，使其能够执行操作\n\n**注意：** 即使你的 Macintosh 没有配备**触控栏**，你也可以使用**触控栏**模拟器。要使用**触控栏**模拟器，你必须拥有\
    \ Xcode 8.1 或更高版本以及 macOS Sierra 10.12.1 或更高版本。\n\n## 添加触控栏\n\n**触控栏**只是对象库中的另一个项目，你可以将其拖拽到你的窗口上。如果你打开对象库并在搜索字段中输入**触控**，你可以轻松找到**触控栏**以及你可以添加到其中的所有项目，例如按钮或标签（参见图\
    \ 23-1）。\n\n![A437923_1_En_23_Fig1_HTML.jpg](img/A437923_1_En_23_Fig1_HTML.jpg)\n\
    \n**图 23-1.** 对象库包含可以添加到**触控栏**的所有内容\n\n向你的程序添加**触控栏**的第一步是将**触控栏**项目拖拽到窗口控制器上（不是视图控制器），如图\
    \ 23-2 所示。\n\n![A437923_1_En_23_Fig2_HTML.jpg](img/A437923_1_En_23_Fig2_HTML.jpg)\n\
    \n**图 23-2.** 将**触控栏**从对象库拖拽到窗口控制器\n\n一旦你将**触控栏**放置在窗口控制器上，它就会出现在其下方，如图 23-3 所示。现在你需要创建一个\
    \ Swift 类文件，以包含使**触控栏**工作的 Swift 代码。\n\n![A437923_1_En_23_Fig3_HTML.jpg](img/A437923_1_En_23_Fig3_HTML.jpg)\n\
    \n**图 23-3.** **触控栏**作为用户界面的一部分\n"
- fmt: "# Creating a Swift Class File\n\nAt this point, the Touch Bar is connected\
    \ to the window of your user interface, but you can’t write any Swift code to\
    \ make it work because there is no class file yet defined for the window controller.\n\
    \nTo create a Swift class file, you need to follow these steps:\n\n1.  Choose\
    \ File ➤ New ➤ File. A template window appears, as shown in Figure [23-4](#A437923_1_En_23_Chapter.html#Fig4).\n\
    \n    ![A437923_1_En_23_Fig4_HTML.jpg](A437923_1_En_23_Fig4_HTML.jpg)\n\n    Figure\
    \ 23-4. Choosing a Swift Cocoa Class file  \n\n2.  Click Cocoa Class under the\
    \ Source group in the macOS category.  \n3.  Click the Next button. A dialog appears\
    \ asking for a class name and subclass, as shown in Figure [23-5](#A437923_1_En_23_Chapter.html#Fig5).\n\
    \n    ![A437923_1_En_23_Fig5_HTML.jpg](A437923_1_En_23_Fig5_HTML.jpg)\n\n    Figure\
    \ 23-5. Defining a class  \n\n4.  Click in the Class text field and type a name\
    \ for your class, such as `TouchClass`.  \n5.  Make sure the “Subclass of” field\
    \ displays `NSWindowController`.  \n6.  Clear the “Also create XIB file for user\
    \ interface” check box.  \n7.  Make sure the Language pop-up menu displays Swift.\
    \  \n8.  Click the Next button. A Save dialog appears.  \n9.  Click the Create\
    \ button. The Xcode window appears again.  \n\nOnce you’ve created a class file,\
    \ you need to connect it to the window controller. To connect a class file to\
    \ the window controller, follow these steps:\n\n1.  Click the `.storyboard` file\
    \ that contains the window controller and touch bar.  \n2.  Click the blue Window\
    \ Controller icon in the top, middle of the window.  \n3.  Choose View ➤ Utilities\
    \ ➤ Show Identity Inspector.  \n4.  Click the downward-pointing arrow to the right\
    \ of the Class field. You’ll see a menu of valid class files you can choose, as\
    \ shown in Figure [23-6](#A437923_1_En_23_Chapter.html#Fig6).\n\n    ![A437923_1_En_23_Fig6_HTML.jpg](A437923_1_En_23_Fig6_HTML.jpg)\n\
    \n    Figure 23-6. Choosing a class file for the window controller  \n\n5.  Click\
    \ the class name you created (such as `TouchClass`).  \n\nAt this point, your\
    \ Swift class file is connected to the window controller and the Touch Bar. Now\
    \ you can add items to the Touch Bar and create `IBOutlet` and `IBAction` methods\
    \ for the Touch Bar in the class file you just chose.\n\n### Adding Items to the\
    \ Touch Bar\n\nThe Object Library contains all of the items you can add to the\
    \ Touch Bar. You can only place Touch Bar items on the Touch Bar, not ordinary\
    \ buttons or labels. To place an item on the Touch Bar, just drag and drop any\
    \ Touch Bar item from the Object Library on to the Touch Bar, as shown in Figure\
    \ [23-7](#A437923_1_En_23_Chapter.html#Fig7).\n\n![A437923_1_En_23_Fig7_HTML.jpg](A437923_1_En_23_Fig7_HTML.jpg)\n\
    \nFigure 23-7. Dragging an item from the Object Library to the Touch Bar\n\nSome\
    \ commonly used items to use on the Touch Bar include:\n\n*   Touch Bar Button:\
    \ Displays a single button\n*   Touch Bar Fixed/Flexible Space: Creates space\
    \ between multiple Touch Bar items\n*   Touch Bar Label: Displays text\n*   Touch\
    \ Bar Slider: Displays a horizontal slider\n\n### Connecting Touch Bar Items to\
    \ Swift Code\n\nOnce you’ve placed one or more items on the Touch Bar, you can\
    \ Control-drag from these Touch Bar items to your Swift class file to create `IBOutlet`\
    \ and `IBAction` methods, as shown in Figure [23-8](#A437923_1_En_23_Chapter.html#Fig8).\n\
    \n![A437923_1_En_23_Fig8_HTML.jpg](A437923_1_En_23_Fig8_HTML.jpg)\n\nFigure 23-8.\
    \ Control-dragging from the Touch Bar to a Swift class file\n\nFor many Touch\
    \ Bar items, you may need to write additional Swift code to make them work. If\
    \ your Macintosh does not have a Touch Bar above the keyboard, you can use the\
    \ Xcode Touch Bar simulator. To turn the Touch Bar simulator on, choose Window\
    \ ➤ Show Touch Bar (or press Shift + Command + 5), as shown in Figure [23-9](#A437923_1_En_23_Chapter.html#Fig9).\n\
    \n![A437923_1_En_23_Fig9_HTML.jpg](A437923_1_En_23_Fig9_HTML.jpg)\n\nFigure 23-9.\
    \ The Show Touch Bar command appears on Xcode’s Window menu\n\nIf your Macintosh\
    \ does not have a Touch Bar, you need to run your program, switch to Xcode, choose\
    \ Window ➤ Show Touch Bar, and then switch back to your running program to see\
    \ your program’s simulated Touch Bar on the screen."
