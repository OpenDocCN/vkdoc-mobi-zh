  trans: "\n### 创建识别错误的函数\n\n创建描述性错误类型的列表后，现在需要创建一个或多个你认为可能发生错误的函数。通常，你会像这样定义一个函数：\n\
    \n```\nfunc functionName {\n// 代码写在这里\n}\n```\n\n要让一个函数识别错误，你需要插入 `throws` 关键字，如下所示：\n\
    \n```\nfunc functionName throws {\n// 代码写在这里\n}\n```\n\n`throws` 关键字表示该函数“抛出”错误，由代码的其他部分来处理。在带有\
    \ `throws` 关键字的函数内部，你需要使用一个或多个 `guard` 语句。\n\n`guard` 语句用于识别允许的情况，其工作方式类似于 `if-else`\
    \ 语句。如果 `guard` 语句的布尔条件为 `true`，则不会发生任何事。然而，如果 `guard` 语句为 `false`，则 `guard` 语句可以使用\
    \ `throws` 关键字来识别特定类型的错误，如下所示：\n\n```\nguard 布尔条件 else {\nthrows 枚举名称.描述性错误\n\
    }\n```\n\n如果你只允许大于 21 的值，可以像这样创建一个 `guard` 语句：\n\n```\nguard myAge > 21 else {\n\
    throws ageError.underAge\n}\n```\n\n如果布尔条件（`myAge > 21`）为 `true`，这个 `guard` 语句将不执行任何操作。否则，它将抛出\
    \ `ageError.underAge` 错误，其中“`ageError`”是枚举的名称，列出了要识别的不同错误，而“`underAge`”是可能发生的其中一个错误。\n\
    \n`guard` 语句总是定义可接受的行为（`myAge > 21`），否则它会通过 `throws` 关键字识别一个错误。一个函数（用 `throws`\
    \ 关键字标识）可以包含一个或多个 `guard` 语句。\n\n### 处理错误\n\n当你用一个或多个 `throws` 关键字标识了函数，且这些函数使用一个或多个\
    \ `guard` 语句来识别可能的错误后，你最终需要一种方法来处理这些错误。在 Swift 中，你可以使用 `do-try-catch` 语句来完成，如下所示：\n\
    \n```\ndo {\ntry 调用可能抛出错误的函数\n} catch 枚举名称.描述性错误 {\n// 处理错误的代码\n}\n```\n\n`do-try-catch`\
    \ 语句尝试运行一个可以使用 `throws` 关键字识别错误的函数。如果该函数没有通过任何 `guard` 语句识别出错误，那么 `do-try-catch`\
    \ 语句的执行效果与普通的函数调用完全相同。\n\n然而，如果函数识别出一个错误，你就需要在 `do-try-catch` 语句中编写代码来处理该错误。处理这个错误的方式可以很简单，比如打印一条消息来告知你存在问题，也可以很复杂，比如运行一整套全新的代码来专门处理该问题。\n\
    \n关键在于，如果你预见到可能出现的错误并为处理这些错误编写了代码，那么你的程序崩溃的可能性就会降低。如果你的程序确实崩溃了，只需找出原因（这也许并不容易），创建一个新的描述性错误名称来标识它，然后创建一个新的\
    \ `catch` 语句来处理该错误。\n\n让我们看看错误处理是如何工作的：\n\n1.  确保 `DefensePlayground` 已加载到 Xcode\
    \ 中。\n2.  按如下方式编辑 playground 代码：\n\n    ```\n    import Cocoa\n    enum ageError\
    \ : Error {\n    case negativeAge // 负数\n    case unrealAge   // 大于 140 的数字\n\
    \    case underAge    // 未满 21 岁\n    }\n    func checkAge(myAge : Int) throws\
    \ {\n    print (myAge)\n    guard myAge > 0 else {\n    throws ageError.negativeAge\n\
    \    }\n    guard myAge <= 140 else {\n    throws ageError.unrealAge\n    }\n\
    \    guard myAge >= 21 else {\n    throws ageError.underAge\n    }\n    }\n  \
    \  var oldAge = -9\n    do {\n    try checkAge (myAge: oldAge)\n    } catch ageError.negativeAge\
    \ {\n    print (\"年龄不能是负数\")\n    } catch ageError.unrealAge {\n    print (\"\
    年龄不能大于 140\")\n    } catch ageError.underAge {\n    print (\"抱歉，你必须年满 21 岁\")\n\
    \    }\n    print (oldAge)\n    ```\n\n注意负数是如何被识别并通过一条简单的消息来处理的，如图 25-6 所示。\n\n\
    ![A437923_1_En_25_Fig6_HTML.jpg](img/A437923_1_En_25_Fig6_HTML.jpg)\n\n图 25-6.\n\
    \n错误处理涉及一个枚举、一个包含 `guard` 语句的函数以及一个 `do-try-catch` 语句\n\n将 `oldAge` 变量的值改为 250，看看\
    \ `do-try-catch` 语句如何将该数字识别为大于 140，从而判定为不现实的值。将 `oldAge` 变量的值改为 15，看看 `do-try-catch`\
    \ 语句如何识别出年龄未满 21 岁。\n\n要在程序中使用错误处理，你必须首先识别可能的问题，然后决定如何处理这些问题。错误处理只能识别你已经知道的错误，但它能让你的程序在面对可能遇到的常见问题时不那么脆弱。\n\
    \n### 总结\n\n无论作为程序员的你多么有天赋、有技巧或受过何种教育，偶尔都会犯错误。有时这些错误是你可以轻松修正的小问题，但有时你犯的错误会导致各种难以捉摸的问题，让你在查找和修复时感到挑战重重且沮丧不已。这就是编程的本质。\n\
    \n然而，你无意间造成的任何问题，也都是你可以学会发现并修复的问题。一旦你明白了某个错误是如何产生的，你就很可能记住将来如何修复这类错误——无论是你自己还是别人再次犯下同样的错误。这让你得以解放，去犯那些你可能从未遇到过的新错误。\n\
    \n减少程序中错误的最佳方法是仔细检查你的代码，并假设任何事情都不会顺利运行。然后，寻找一切可能的方式来确保它不会出错。你越是带着防御心态去编码，就越有可能在问题发生之前就预防它们。\n\
    \n编程与其说是一门科学，不如说是一门艺术，因此，学会最适合你自己的方法来减少程序中引入的错误。在尝试新代码时，通常更安全的做法是在 Swift playground\
    \ 或者与你实际程序分离的简单程序中先进行测试。\n\n这样，你可以安全地隔离并测试你的代码。当它正常工作后，你就可以将其复制粘贴到你的程序中。\n\n错误是编程世界的常态。理想情况下，你希望将更多时间花在编写代码上，而减少调试代码的时间。\n\
    \n# 简化用户界面设计\n\n设计用户界面可能颇具挑战。你不仅需要设计一个易于使用的用户界面，还需要设计一个能够响应用户对窗口大小所做任何更改的自适应用户界面。如果用户缩小窗口，你的用户界面必须相应缩小，且不能截断任何元素。如果用户放大窗口，你的用户界面必须相应扩展，以保持外观一致。\n\
    \n为了帮助创建自适应用户界面，Xcode 提供了约束，这些约束可以将各种用户界面元素的边缘固定到窗口边缘或其他用户界面元素的边缘。在本章中，你将了解更多关于约束和故事板的知识，这将帮助用户界面设计变得比以往任何时候都更简单。\n"
- fmt: "## Using Stack View\n\nIf your user interface contains a handful of items\
    \ such as a text field, a button, and a label, it's fairly straightforward to\
    \ place constraints on these items so they stay in the correct place. However,\
    \ if your user interface contains multiple items, then it can get messy to place\
    \ so many constraints on each item. Change one constraint and your entire user\
    \ interface can fail to adapt properly, which often means wasting time trying\
    \ to get your multiple constraints working. Figure [26-1](#A437923_1_En_26_Chapter.html#Fig1)\
    \ shows how messy multiple constraints can look on a crowded user interface.\n\
    \n![A437923_1_En_26_Fig1_HTML.jpg](A437923_1_En_26_Fig1_HTML.jpg)\n\nFigure 26-1.\
    \ Multiple constraints make it hard to correctly lay out a user interface\n\n\
    To solve this problem, Xcode offers a feature called stack view. The idea behind\
    \ the stack view is that groups of user interface items often need to stay together.\
    \ Rather than set constraints for each item individually, you group them together\
    \ in a stack view, then set constraints for that single stack view.\n\nTo learn\
    \ how to create and use a stack view, follow these steps:\n\n1. From within Xcode\
    \ choose File ➤ New ➤ Project.\n2. Click Application under the macOS category.\n\
    3. Click Cocoa Application and click the Next button. Xcode now asks for a product\
    \ name.\n4. Click in the Product Name text field and type `StackViewProgram`.\n\
    5. Make sure the Language pop-up menu displays Swift and that the \"Use Storyboards\"\
    \ check box is selected.\n6. Click the Next button. Xcode asks where you want\
    \ to store the project.\n7. Choose a folder to store your project and click the\
    \ Create button.\n8. Click the `Main.storyboard` file in the Project Navigator.\
    \ Your program's user interface appears.\n9. Choose View ➤ Utilities ➤ Show Object\
    \ Library. The Object Library appears in the bottom right corner of the Xcode\
    \ window.\n10. Drag three check boxes on to the user interface window so they\
    \ appear stacked on top of each other. Notice that unless you precisely align\
    \ each check box, they won't appear organized.\n11. Drag the mouse to select all\
    \ three check boxes, as shown in Figure [26-2](#A437923_1_En_26_Chapter.html#Fig2).\
    \ (Another way to select multiple items is to hold down the Shift key and click\
    \ each item you want to select.)\n\n    ![A437923_1_En_26_Fig2_HTML.jpg](A437923_1_En_26_Fig2_HTML.jpg)\n\
    \n    Figure 26-2. Dragging is a fast way to select multiple items\n\n12. Choose\
    \ Editor ➤ Embed In ➤ Stack View (or click the Embed in Stack icon on the bottom\
    \ right corner of the middle Xcode pane). Xcode groups your selected items inside\
    \ a single stack view.\n13. Move the mouse pointer over the stack view of three\
    \ check boxes, hold down the Control key, and drag the mouse towards the right\
    \ edge of the window.\n14. Release the Control key and the mouse button. A pop-up\
    \ window appears.\n15. Choose the \"Trailing Space to Container\" option. Xcode\
    \ displays the constraint for the entire stack view.\n16. Move the mouse pointer\
    \ over the stack view of the three check boxes, hold down the Control key, and\
    \ drag the mouse towards the bottom edge of the window.\n17. Release the Control\
    \ key and the mouse button. A pop-up window appears.\n18. Choose the \"Bottom\
    \ Space to Container\" option. Xcode displays the constraint for the entire stack\
    \ view.\n19. Choose Product ➤ Run. The program's user interface appears.\n20.\
    \ Drag the bottom right corner of the window to shrink and enlarge the window.\
    \ Notice that as you change the width and height of the window, the stack of three\
    \ check boxes all move together as a group.\n21. Choose StackViewProgram ➤ Quit\
    \ StackViewProgram.\n\n## Fixing Constraint Conflicts\n\nIdeally, constraints\
    \ should keep items a specific distance from the edge of the window or the edge\
    \ of another user interface item. However, if you shrink or expand a window, it's\
    \ possible for constraints to create unexpected problems.\n\nLet's see how setting\
    \ two constraints on a user interface item can create a problem:\n\n1. Make sure\
    \ the `StackViewProgram` project is loaded in Xcode.\n2. Click the `Main.storyboard`\
    \ file in the Project Navigator pane.\n3. Choose Edit ➤ Select All (or press Command\
    \ + A). Xcode selects your stack view that's currently on the user interface window.\n\
    4. Press the Delete key on your keyboard, or choose Edit ➤ Delete to delete all\
    \ user interface items from the window.\n5. Choose View ➤ Utilities ➤ Show Object\
    \ Library.\n6. Drag a single text field in the middle of the user interface window.\
    \ (Don't worry about the exact positioning.)\n7. Move the mouse pointer over the\
    \ text field, hold down the Control key, and drag the mouse to the right edge\
    \ of the window.\n8. Release the Control key and the mouse. A pop-up window appears.\n\
    9. Choose the \"Trailing Space to Container\" option. Xcode creates a constraint\
    \ from the right edge of the text field to the right edge of the window.\n10.\
    \ Move the mouse pointer over the text field, hold down the Control key, and drag\
    \ the mouse to the left edge of the window.\n11. Release the Control key and the\
    \ mouse. A pop-up window appears.\n12. Choose the \"Leading Space to Container\"\
    \ option. Xcode creates a constraint from the left edge of the text field to the\
    \ left edge of the window.\n13. Choose Product ➤ Run. The user interface window\
    \ appears.\n14. Move the mouse pointer over the right edge of the window and expand\
    \ the window width by dragging the mouse to the right. Notice that the text field\
    \ expands to the right.\n15. Move the mouse pointer over the right edge of the\
    \ window and shrink the window width by dragging the mouse to the left. Notice\
    \ that the text field shrinks. If you keep shrinking the window width, the text\
    \ field eventually disappears altogether.\n16. Choose StackViewProgram ➤ Quit\
    \ StackViewProgram.\n\nRight now, you have two constraints that keep the text\
    \ field a fixed distance from the two window edges, but they do nothing to keep\
    \ the text field from disappearing if the window shrinks too much. One way to\
    \ fix this is to create a compression constraint.\n\nA compression constraint\
    \ keeps a user interface item from shrinking or expanding too much. To create\
    \ a compression constraint, you hold down the Control key and drag the mouse within\
    \ the boundaries of that user interface element.\n\n1. Make sure the `StackViewProgram`\
    \ project is loaded in Xcode.\n2. Click the `Main.storyboard` file in the Project\
    \ Navigator pane.\n3. Move the mouse pointer over the text field.\n4. Hold down\
    \ the Control key and drag the mouse to the left or right, keeping the mouse pointer\
    \ within the boundary of the text field.\n5. Release the Control key and the mouse.\
    \ A pop-up menu appears, as shown in Figure [26-3](#A437923_1_En_26_Chapter.html#Fig3).\n\
    \n![A437923_1_En_26_Fig3_HTML.jpg](A437923_1_En_26_Fig3_HTML.jpg)\n\nFigure 26-3.\
    \ Defining a compression constraint\n\n6. Choose Width. Xcode displays a compression\
    \ constraint underneath the text field, as shown in Figure [26-4](#A437923_1_En_26_Chapter.html#Fig4).\n\
    \n![A437923_1_En_26_Fig4_HTML.jpg](A437923_1_En_26_Fig4_HTML.jpg)\n\nFigure 26-4.\
    \ A compression constraint appears underneath a user interface item\n\n7. Choose\
    \ Product ➤ Run. The user interface window appears.\n8. Move the mouse pointer\
    \ over the right edge of the window and try dragging the window to expand or shrink\
    \ its width. Notice that you can't do this because of the compression constraint.\n\
    9. Choose StackViewProgram ➤ Quit StackViewProgram."
