  trans: '```swift

    import Foundation

    class Person {

    var hitPoints = 10

    func shoot () -> Int {

    let odds = 1 + Int(arc4random_uniform(3))

    if odds == 3 {

    // 命中，随机在 1 到 3 之间决定伤害值

    return 1 + Int(arc4random_uniform(3))

    } else {

    return 0 // 未命中

    }

    }

    }

    ```


    这个类定义了一个名为 `hitPoints` 的属性，并将它初始化为 10。它还定义了一个名为 `shoot` 的方法，这个方法不接受任何参数，但返回一个整型值。在
    `shoot` 方法内部，它会计算一个 1 到 3 之间的随机数，并将这个值存储在 `odds` 变量中。


    接下来，它会检查 `odds` 的值是否正好等于 3。如果是，则再计算一个 1 到 3 之间的随机数并返回该值；如果 `odds` 的值不是 3，则方法返回
    0。


    现在你已经在单独的 Swift 文件中定义了一个类，是时候使用这个类来创建对象了。你可以按照以下步骤操作：


    1. 在项目导航面板中点击 `AppDelegate.swift` 文件。Xcode 会显示 `AppDelegate.swift` 文件的内容。

    2. 在 `AppDelegate.swift` 文件的 IBOutlet 列表下方，输入以下代码，基于 `personClass.swift` 文件中定义的
    person 类创建两个对象：


    ```swift

    @IBOutlet weak var window: NSWindow!

    @IBOutlet weak var sheriffHitPoints: NSTextField!

    @IBOutlet weak var outlawHitPoints: NSTextField!

    var sheriff = Person ()

    var outlaw = Person ()

    ```


    3. 修改 `applicationDidFinishLaunching` 方法，使其在用户界面的文本字段中显示警官和罪犯对象的 `hitPoints` 属性的初始值。这两个文本字段分别对应名为
    `sheriffHitPoints` 和 `outlawHitPoints` 的 IBOutlet：


    ```swift

    func applicationDidFinishLaunching(aNotification: NSNotification) {

    // 在此处插入代码以初始化应用

    sheriffHitPoints.integerValue = sheriff.hitPoints

    outlawHitPoints.integerValue = outlaw.hitPoints

    }

    ```


    4. 按如下方式修改 `shootButton` IBAction 方法：


    ```swift

    @IBAction func shootButton(_ sender: NSButton) {

    if sender.tag == 0 {    // 警官射击

    outlaw.hitPoints -= sheriff.shoot()

    } else {    // 罪犯射击

    sheriff.hitPoints -= outlaw.shoot()

    }

    sheriffHitPoints.integerValue = sheriff.hitPoints

    outlawHitPoints.integerValue = outlaw.hitPoints

    if sheriffHitPoints.integerValue <= 0 {

    let myAlert = NSAlert()

    myAlert.messageText = "警官阵亡。"

    myAlert.runModal()

    } else if outlawHitPoints.integerValue <= 0 {

    let myAlert = NSAlert()

    myAlert.messageText = "罪犯阵亡。"

    myAlert.runModal()

    }

    }

    ```


    这段代码会检查 `sender` 变量的 `Tag` 属性，该属性用于判断用户点击了哪个按钮。如果 `Tag` 属性为 0，则表示用户点击了“警官射击”按钮，因此它会执行警官对象的
    `shoot` 方法，并从 `outlaw.hitPoints` 属性中减去其结果（0 到 3 之间的值）。


    如果用户点击了“罪犯射击”按钮，则 `shoot` 方法会执行 `outlaw` 对象中的 `shoot` 方法，并从 `sheriff.hitPoints`
    属性中减去其结果（0 到 3 之间的值）。


    无论结果如何，它都会将警官和罪犯最新的 `hitPoints` 属性值更新显示在用户界面上的两个文本字段中，这两个字段由 `sheriffHitPoints`
    和 `outlawHitPoints` IBOutlet 标识。


    最后，如果警官或罪犯中任意一方的 `hitPoints` 属性降到 0 或以下，则会弹出一个警告对话框，显示警官或罪犯阵亡的消息。`AppDelegate.swift`
    文件的完整内容如下：


    ```swift

    import Cocoa

    @NSApplicationMain

    class AppDelegate: NSObject, NSApplicationDelegate {

    @IBOutlet weak var window: NSWindow!

    @IBOutlet weak var sheriffHitPoints: NSTextField!

    @IBOutlet weak var outlawHitPoints: NSTextField!

    var sheriff = Person ()

    var outlaw = Person ()

    func applicationDidFinishLaunching(_ aNotification: Notification) {

    // 在此处插入代码以初始化应用

    sheriffHitPoints.integerValue = sheriff.hitPoints

    outlawHitPoints.integerValue = outlaw.hitPoints

    }

    func applicationWillTerminate(_ aNotification: Notification) {

    // 在此处插入代码以清理应用

    }

    @IBAction func shootButton(_ sender: NSButton) {

    if sender.tag == 0 {    // 警官射击

    outlaw.hitPoints -= sheriff.shoot()

    } else {    // 罪犯射击

    sheriff.hitPoints -= outlaw.shoot()

    }

    sheriffHitPoints.integerValue = sheriff.hitPoints

    outlawHitPoints.integerValue = outlaw.hitPoints

    if sheriffHitPoints.integerValue <= 0 {

    let myAlert = NSAlert()

    myAlert.messageText = "警官阵亡。"

    myAlert.runModal()

    } else if outlawHitPoints.integerValue <= 0 {

    let myAlert = NSAlert()

    myAlert.messageText = "罪犯阵亡。"

    myAlert.runModal()

    }

    }

    }

    ```


    要查看这个程序的运行效果，请按照以下步骤操作：


    1. 选择“产品” ➤ “运行”。Xcode 会运行你的 ObjectProgram 项目。注意警官和罪犯标签下方的文本字段都显示 10，代表他们的总生命值。每被击中一次，生命值就会下降。生命值降到
    0 或以下的角色即为失败者。

    2. 点击“警官射击”按钮。如果警官击中了罪犯，你会看到罪犯标签下方的数值从 10 降到更小的值，例如 8。如果警官未命中，那么罪犯下方的数字将保持不变。

    3. 点击“罪犯射击”按钮。

    4. 重复步骤 2 和 3，交替点击“警官射击”和“罪犯射击”按钮，直到其中一个角色的生命值降到 0 或以下。此时会弹出一个警告对话框，如图 13-11 所示。


    ![A437923_1_En_13_Fig11_HTML.jpg](img/A437923_1_En_13_Fig11_HTML.jpg)


    图 13-11. 当某个角色的总生命值降到 0 或以下时，会弹出警告对话框


    5. 点击“确定”关闭警告对话框。

    6. 选择“ObjectProgram” ➤ “退出 ObjectProgram”。


    ## 总结


    Swift 编程完全依赖于对象和面向对象编程的原则。要创建对象，必须先定义类。一个类通常包含一个或多个变量（称为属性）以及一个或多个函数（称为方法）。一旦定义了类，就可以创建该类的对象。


    类中的属性始终需要被初始化。你可以在定义属性的同时为每个属性设置初始值，也可以创建一个特殊的初始化方法，通过接收数据来为对象定义初始值。


    属性可以用固定值进行初始化，也可以基于其他属性的值进行计算。一个属性的值可以改变另一个不同属性的值。


    你可以从一个类中创建任意数量的对象。通常最好将类定义放在单独的文件中，以保持代码的组织性。面向对象程序通过对象向其他对象的属性发送数据，或调用其他对象中存储的方法来工作。通过协同工作且保持独立性，对象使得创建可靠且复杂的程序比以往更快更容易。'
- fmt: "# 14. Inheritance, Polymorphism, and Extending Classes\n\nIn Chapter [13](#A437923_1_En_13_Chapter.html),\
    \ you learned how objects were created from classes and how classes define properties\
    \ and methods. To protect its data and methods from other parts of a program,\
    \ an object isolates or encapsulates its code. Encapsulation is one prime advantage\
    \ of object-oriented programming because it creates self-contained code that you\
    \ can easily modify or replace without affecting any other part of a program.\n\
    \nBy keeping code as independent as possible from other parts of a program, objects\
    \ increase reliability. Think of a house built out of playing cards. Remove one\
    \ card and the whole thing collapses, which is the way most software worked before\
    \ object-oriented programming.\n\nObjects are like playing cards that you can\
    \ remove and replace without affecting any other card. Besides encapsulation,\
    \ object-oriented programming also includes two additional features called inheritance\
    \ and polymorphism.\n\nThe idea behind inheritance is to reuse existing code without\
    \ physically making another copy of that code. The idea behind polymorphism is\
    \ that you can replace inherited code without modifying the original code. Through\
    \ both inheritance and polymorphism, you can reuse existing code, even without\
    \ understanding how the original code works.\n\nIn fact, each time you create\
    \ a project in Xcode, look at the top of your Swift files and you should see a\
    \ line that looks like this:\n\n```\nimport Cocoa\n```\n\nThis line tells Xcode\
    \ to use all of the classes that Apple created for you that are stored in the\
    \ Cocoa framework. In the previous example programs, you used the Cocoa framework\
    \ to manipulate arrays, sets, and dictionaries. Without the Cocoa framework, you\
    \ would have to write Swift code to perform these common functions yourself. Not\
    \ only would this be time-consuming, but it would be error-prone as well since\
    \ you would have to write code and then test to make sure it worked.\n\nBy simply\
    \ relying on classes in the Cocoa framework, you can add functionality to your\
    \ program without writing much code at all. As you get more experienced writing\
    \ your own classes, you can create useful libraries of your own that you can easily\
    \ plug into other projects to reuse all your hard work.\n\n## Understanding Inheritance\n\
    \nThe main purpose of inheritance is to make reusing code easy. In the old days,\
    \ people reused code by simply making another copy of that code. But what happens\
    \ if you find an error (bug) in the code? You need to fix that bug in every copy\
    \ of your code. Miss one copy of the faulty code and your program won’t work.\n\
    \nCreating multiple copies of the same code causes two problems. First, it wastes\
    \ space. Second, it makes modifying the code harder, with multiple copies of code\
    \ scattered all over a program. Inheritance fixes both problems.\n\nFirst, inheritance\
    \ never makes a copy of code so it never wastes space. Second, since inheritance\
    \ only keeps one copy of the code, you just need to modify one copy of code to\
    \ have your changes automatically affect every part of your program that relies\
    \ on that code.\n\nInstead of physically copying code, inheritance basically creates\
    \ pointers or references to one copy of code. When you create a class, you can\
    \ simply state its name, like this:\n\n```\nclass ClassName {\n}\n```\n\nTo inherit\
    \ code from another class, name the other class, like this:\n\n```\nclass ClassName\
    \ : SuperClass {\n}\n```\n\nThis code defines a class called `ClassName`, which\
    \ inherits code from another class called `SuperClass`. That means any properties\
    \ and methods defined in `Superclass` automatically work in `ClassName` as well,\
    \ even though the `ClassName` class is completely empty.\n\nIf you peek at any\
    \ of the macOS sample programs you created in earlier chapters, you may see code\
    \ that looks like this:\n\n```\nclass AppDelegate: NSObject, NSApplicationDelegate\
    \ {\n```\n\nThis defines a class called `AppDelegate`, which inherits code from\
    \ another class called `NSObject`. (This code also adds additional code to the\
    \ `AppDelegate` class through another file called `NSApplicationDelegate`, which\
    \ is a file that you’ll learn more about later in this chapter.)\n\nTo see how\
    \ to use inheritance with classes, create a new playground by following these\
    \ steps:\n\n1.  Open the `IntroductoryPlayground` file in Xcode.\n2.  Edit the\
    \ code as follows:\n\n```\n    import Cocoa\n    class FirstClass {\n    var speed\
    \ : Int = 0\n    var locationX : Int = 3\n    var locationY : Int = 5\n    func\
    \ move (X: Int, Y: Int) {\n    locationX += X\n    locationY += Y\n    }\n   \
    \ }\n    class CopyCat : FirstClass {\n    }\n    var kitten = CopyCat ()\n  \
    \  print (kitten.locationX)\n    print (kitten.locationY)\n    kitten.speed =\
    \ 4\n    kitten.move(X: 4, Y: 8)\n    print (kitten.locationX)\n    print (kitten.locationY)\n\
    \    ```\n\nThis Swift code defines two classes. First, it defines a class (called\
    \ `FirstClass`) that has three properties (`speed`, `locationX`, and `locationY`)\
    \ and one method (`move`). Then it defines a second class (called `CopyCat`) that’s\
    \ completely empty, but it inherits all of the code from `FirstClass`.\n\nTo show\
    \ that the `CopyCat` class inherits code from `FirstClass`, the Swift code next\
    \ creates an object called `kitten`, which is based on the `CopyCat` class. The\
    \ `kitten` object can store data in a `speed` property and use the `move` method\
    \ to change its `locationX` and `locationY` properties, yet the `CopyCat` class\
    \ is completely empty. Figure [14-1](#A437923_1_En_14_Chapter.html#Fig1) shows\
    \ the results of running this Swift code in a playground.\n\n![A437923_1_En_14_Fig1_HTML.jpg](A437923_1_En_14_Fig1_HTML.jpg)\n\
    \n**Figure 14-1.** Showing how inheritance works\n\nNote\n\nSome programming languages,\
    \ such as C++, allow one class to inherit from two or more classes, which is known\
    \ as multiple inheritance. However in Swift, a class can only inherit from only\
    \ one other class, which is known as single inheritance.\n\nIn the above example,\
    \ the `CopyCat` class inherits three properties (`speed`, `locationX`, and `locationY`)\
    \ and one method (`move`) from `FirstClass`. Since the `CopyCat` class didn’t\
    \ define any properties or methods of its own, the `CopyCat` class is basically\
    \ identical to `FirstClass`."
  raw: "# 14. Inheritance, Polymorphism, and Extending Classes\n\nIn Chapter [13](#A437923_1_En_13_Chapter.html),\
    \ you learned how objects were created from classes and how classes define properties\
    \ and methods. To protect its data and methods from other parts of a program,\
    \ an object isolates or encapsulates its code. Encapsulation is one prime advantage\
    \ of object-oriented programming because it creates self-contained code that you\
    \ can easily modify or replace without affecting any other part of a program.\n\
    \nBy keeping code as independent as possible from other parts of a program, objects\
    \ increase reliability. Think of a house built out of playing cards. Remove one\
    \ card and the whole thing collapses, which is the way most software worked before\
    \ object-oriented programming.\n\nObjects are like playing cards that you can\
    \ remove and replace without affecting any other card. Besides encapsulation,\
    \ object-oriented programming also includes two additional features called inheritance\
    \ and polymorphism.\n\nThe idea behind inheritance is to reuse existing code without\
    \ physically making another copy of that code. The idea behind polymorphism is\
    \ that you can replace inherited code without modifying the original code. Through\
    \ both inheritance and polymorphism, you can reuse existing code, even without\
    \ understanding how the original code works.\n\nIn fact, each time you create\
    \ a project in Xcode, look at the top of your Swift files and you should see a\
    \ line that looks like this:\n\n```\nimport Cocoa\n```\n\nThis line tells Xcode\
    \ to use all of the classes that Apple created for you that are stored in the\
    \ Cocoa framework. In the previous example programs, you used the Cocoa framework\
    \ to manipulate arrays, sets, and dictionaries. Without the Cocoa framework, you\
    \ would have to write Swift code to perform these common functions yourself. Not\
    \ only would this be time-consuming, but it would be error-prone as well since\
    \ you would have to write code and then test to make sure it worked.\n\nBy simply\
    \ relying on classes in the Cocoa framework, you can add functionality to your\
    \ program without writing much code at all. As you get more experienced writing\
    \ your own classes, you can create useful libraries of your own that you can easily\
    \ plug into other projects to reuse all your hard work.\n\n## Understanding Inheritance\n\
    \nThe main purpose of inheritance is to make reusing code easy. In the old days,\
    \ people reused code by simply making another copy of that code. But what happens\
    \ if you find an error (bug) in the code? You need to fix that bug in every copy\
    \ of your code. Miss one copy of the faulty code and your program won’t work.\n\
    \nCreating multiple copies of the same code causes two problems. First, it wastes\
    \ space. Second, it makes modifying the code harder, with multiple copies of code\
    \ scattered all over a program. Inheritance fixes both problems.\n\nFirst, inheritance\
    \ never makes a copy of code so it never wastes space. Second, since inheritance\
    \ only keeps one copy of the code, you just need to modify one copy of code to\
    \ have your changes automatically affect every part of your program that relies\
    \ on that code.\n\nInstead of physically copying code, inheritance basically creates\
    \ pointers or references to one copy of code. When you create a class, you can\
    \ simply state its name, like this:\n\n```\nclass ClassName {\n}\n```\n\nTo inherit\
    \ code from another class, name the other class, like this:\n\n```\nclass ClassName\
    \ : SuperClass {\n}\n```\n\nThis code defines a class called `ClassName`, which\
    \ inherits code from another class called `SuperClass`. That means any properties\
    \ and methods defined in `Superclass` automatically work in `ClassName` as well,\
    \ even though the `ClassName` class is completely empty.\n\nIf you peek at any\
    \ of the macOS sample programs you created in earlier chapters, you may see code\
    \ that looks like this:\n\n```\nclass AppDelegate: NSObject, NSApplicationDelegate\
    \ {\n```\n\nThis defines a class called `AppDelegate` , which inherits code from\
    \ another class called `NSObject`. (This code also adds additional code to the\
    \ `AppDelegate` class through another file called `NSApplicationDelegate`, which\
    \ is a file that you’ll learn more about later in this chapter.)\n\nTo see how\
    \ to use inheritance with classes, create a new playground by following these\
    \ steps:\n\n1.  Open the IntroductoryPlayground file in Xcode.  \n2.  Edit the\
    \ code as follows:\n\n```\n    import Cocoa\n    class FirstClass {\n    var speed\
    \ : Int = 0\n    var locationX : Int = 3\n    var locationY : Int = 5\n    func\
    \ move (X: Int, Y: Int) {\n    locationX += X\n    locationY += Y\n    }\n   \
    \ }\n    class CopyCat : FirstClass {\n    }\n    var kitten = CopyCat ()\n  \
    \  print (kitten.locationX)\n    print (kitten.locationY)\n    kitten.speed =\
    \ 4\n    kitten.move(X: 4, Y: 8)\n    print (kitten.locationX)\n    print (kitten.locationY)\n\
    \    ```\n\nThis Swift code defines two classes. First, it defines a class (called\
    \ `FirstClass`) that has three properties (`speed`, `locationX`, and `locationY`)\
    \ and one method (`move`). Then it defines a second class (called `CopyCat`) that’s\
    \ completely empty, but it inherits all of the code from `FirstClass`.\n\nTo show\
    \ that the `CopyCat` class inherits code from `FirstClass`, the Swift code next\
    \ creates an object called `kitten`, which is based on the `CopyCat` class. The\
    \ `kitten` object can store data in a `speed` property and use the `move` method\
    \ to change its `locationX` and `locationY` properties, yet the `CopyCat` class\
    \ is completely empty. Figure [14-1](#A437923_1_En_14_Chapter.html#Fig1) shows\
    \ the results of running this Swift code in a playground.\n\n![A437923_1_En_14_Fig1_HTML.jpg](A437923_1_En_14_Fig1_HTML.jpg)\n\
    \nFigure 14-1.\n\nShowing how inheritance works Note\n\nSome programming languages,\
    \ such as C++, allow one class to inherit from two or more classes, which is known\
    \ as multiple inheritance. However in Swift, a class can only inherit from only\
    \ one other class, which is known as single inheritance.\n\nIn the above example,\
    \ the `CopyCat` class inherits three properties (`speed`, `locationX`, and `locationY`)\
    \ and one method (`move`) from `FirstClass`. Since the `CopyCat` class didn’t\
    \ define any properties or methods of its own, the `CopyCat` class is basically\
    \ identical to `FirstClass`."
  trans: "\n# 14. 继承、多态与类的扩展\n\n在第 13 章中，你已经学习了如何通过类创建对象，以及类如何定义属性和方法。为了保护其数据和方法不被程序的其他部分访问，对象会隔离或封装其代码。封装是面向对象编程的一大优势，因为它创建了自包含的代码，你可以轻松修改或替换这些代码，而不会影响程序的任何其他部分。\n\
    \n通过尽可能保持代码独立于程序的其他部分，对象提高了可靠性。想象一下用扑克牌搭建的房子。移除一张牌，整个房子就会倒塌——这正是面向对象编程出现之前大多数软件的运作方式。\n\
    \n对象就像扑克牌一样，你可以移除或替换其中一张，而不会影响其他任何牌。除了封装之外，面向对象编程还包含另外两个特性，称为继承和多态。\n\n继承背后的理念是重用现有代码，而无需实际制作该代码的另一份副本。多态背后的理念是你可以替换继承的代码，而无需修改原始代码。通过继承和多态，即使不了解原始代码的工作原理，你也可以重用现有代码。\n\
    \n事实上，每次你在 Xcode 中创建一个项目时，查看你的 Swift 文件顶部，应该会看到类似这样的一行代码：\n\n```\nimport Cocoa\n\
    ```\n\n这行代码告诉 Xcode 使用 Apple 为你创建并存储在 Cocoa 框架中的所有类。在之前的示例程序中，你使用了 Cocoa 框架来操作数组、集合和字典。如果没有\
    \ Cocoa 框架，你就必须自己编写 Swift 代码来实现这些通用功能。这不仅耗时，而且容易出错，因为你需要编写代码并进行测试以确保其正常工作。\n\n\
    只需依赖 Cocoa 框架中的类，你就可以在不编写大量代码的情况下为程序添加功能。随着你编写自己类的经验越来越丰富，你可以创建自己的实用库，并轻松地将其插入到其他项目中，从而重用你所有的辛勤成果。\n\
    \n## 理解继承\n\n继承的主要目的是让代码重用变得简单。在过去，人们通过简单地复制代码副本来实现代码重用。但是，如果你在代码中发现了一个错误（bug），会发生什么呢？你需要在代码的每个副本中修复这个\
    \ bug。遗漏一个出错代码的副本，你的程序就无法运行。\n\n创建同一代码的多个副本会导致两个问题。首先，它浪费空间。其次，它使修改代码变得更加困难，因为代码的多个副本散布在整个程序中。继承解决了这两个问题。\n\
    \n首先，继承从不制作代码的副本，因此它从不浪费空间。其次，由于继承只保留一份代码副本，你只需修改一份代码，你的修改就会自动影响依赖于该代码的程序的所有部分。\n\
    \n继承本质上不是物理复制代码，而是创建指向一份代码副本的指针或引用。当你创建一个类时，你可以简单地声明它的名称，如下所示：\n\n```\nclass ClassName\
    \ {\n}\n```\n\n要从另一个类继承代码，请命名另一个类，如下所示：\n\n```\nclass ClassName : SuperClass {\n\
    }\n```\n\n这段代码定义了一个名为 `ClassName` 的类，它从另一个名为 `SuperClass` 的类中继承代码。这意味着在 `Superclass`\
    \ 中定义的任何属性和方法都会自动在 `ClassName` 中生效，即使 `ClassName` 类完全是空的。\n\n如果你查看之前章节中创建的任何 macOS\
    \ 示例程序，你可能会看到类似这样的代码：\n\n```\nclass AppDelegate: NSObject, NSApplicationDelegate\
    \ {\n```\n\n这定义了一个名为 `AppDelegate` 的类，它从另一个名为 `NSObject` 的类继承代码。（这段代码还通过另一个名为\
    \ `NSApplicationDelegate` 的文件向 `AppDelegate` 类添加了额外的代码，关于这个文件，你将在本章后面部分了解更多。）\n\
    \n要了解如何对类使用继承，请按照以下步骤创建一个新的 playground：\n\n1.  在 Xcode 中打开 `IntroductoryPlayground`\
    \ 文件。\n2.  按如下方式编辑代码：\n\n```\n    import Cocoa\n    class FirstClass {\n    var\
    \ speed : Int = 0\n    var locationX : Int = 3\n    var locationY : Int = 5\n\
    \    func move (X: Int, Y: Int) {\n    locationX += X\n    locationY += Y\n  \
    \  }\n    }\n    class CopyCat : FirstClass {\n    }\n    var kitten = CopyCat\
    \ ()\n    print (kitten.locationX)\n    print (kitten.locationY)\n    kitten.speed\
    \ = 4\n    kitten.move(X: 4, Y: 8)\n    print (kitten.locationX)\n    print (kitten.locationY)\n\
    \    ```\n\n这段 Swift 代码定义了两个类。首先，它定义了一个类（名为 `FirstClass`），该类具有三个属性（`speed`、`locationX`\
    \ 和 `locationY`）和一个方法（`move`）。然后，它定义了第二个类（名为 `CopyCat`），这个类完全是空的，但它从 `FirstClass`\
    \ 继承了所有代码。\n\n为了证明 `CopyCat` 类从 `FirstClass` 继承了代码，Swift 代码接下来创建了一个名为 `kitten`\
    \ 的对象，该对象基于 `CopyCat` 类。`kitten` 对象可以将数据存储在 `speed` 属性中，并使用 `move` 方法更改其 `locationX`\
    \ 和 `locationY` 属性，尽管 `CopyCat` 类完全是空的。图 14-1 显示了在 playground 中运行这段 Swift 代码的结果。\n\
    \n![A437923_1_En_14_Fig1_HTML.jpg](img/A437923_1_En_14_Fig1_HTML.jpg)\n\n**图 14-1.**\
    \ 展示继承的工作原理\n\n注意\n\n某些编程语言（如 C++）允许一个类从两个或多个类继承，这称为多重继承。然而在 Swift 中，一个类只能从一个其他类继承，这称为单继承。\n\
    \n在上述示例中，`CopyCat` 类从 `FirstClass` 继承了三个属性（`speed`、`locationX` 和 `locationY`）和一个方法（`move`）。由于\
    \ `CopyCat` 类没有定义自己的任何属性或方法，`CopyCat` 类基本上与 `FirstClass` 相同。\n"
- fmt: "In actual use, there’s no reason for a class to inherit from another class\
    \ as an exact duplicate. Instead, it’s more common for one class (known as the\
    \ subclass) to inherit from another class (known as the superclass or parent class)\
    \ and then add additional properties and methods of its own.\n\nIn this way, the\
    \ subclass only needs to include the code for these new properties and methods\
    \ while still having access to all the properties and methods of the superclass.\
    \ For example, consider the following class:\n\n```\nclass CopyDog : CopyCat {\n\
    var name : String = \"\"\n}\n```\n\nThis class inherits all of the code from the\
    \ `CopyCat` class and adds one new property of its own called `name` that can\
    \ hold a string. The above class definition that defines a `name` property and\
    \ inherits code from the `CopyCat` class is equivalent to the following:\n\n```\n\
    class CopyDog {\nvar speed : Int = 0\nvar locationX : Int = 3\nvar locationY :\
    \ Int = 5\nfunc move (X: Int, Y: Int) {\nlocationX += X\nlocationY += Y\n}\nvar\
    \ name : String = \"\"\n}\n```\n\nRemember, the `CopyCat` class inherited everything\
    \ from `FirstClass`, which defined the `speed`, `locationX`, and `locationY` properties\
    \ along with the `move` method. In comparison, the `CopyDog` class that inherits\
    \ code from the `CopyCat` class is much shorter and simpler.\n\nInheritance works\
    \ like a daisy chain. If class A inherits from class B, but class B inherits everything\
    \ from class C, then class A inherits everything from both class B and class C.\
    \ For example, the `CopyDog` class inherits everything from the `CopyCat` class.\
    \ The `CopyCat` class, in turn, inherits everything from `FirstClass`. This means\
    \ the `CopyDog` class ultimately inherits everything from both the `CopyCat` class\
    \ and `FirstClass`, as shown in Figure [14-2](#A437923_1_En_14_Chapter.html#Fig2).\n\
    \n![A437923_1_En_14_Fig2_HTML.jpg](A437923_1_En_14_Fig2_HTML.jpg)\n\nFigure 14-2.\
    \ Classes inherit everything from previous classes\n\nThis daisy chain effect\
    \ of inheritance is how the Cocoa framework is designed. At its simplest level,\
    \ there’s a basic class called `NSObject`. Another class named `NSControl` inherits\
    \ everything from `NSObject` and adds new properties and methods of its own. When\
    \ you create a text field for your user interface, that text field is based on\
    \ a class called `NSTextField`, which inherits everything from `NSControl`. If\
    \ you click a user interface object in the Object Library, Xcode lists which class\
    \ the user interface object is based on, as shown in Figure [14-3](#A437923_1_En_14_Chapter.html#Fig3).\n\
    \n![A437923_1_En_14_Fig3_HTML.jpg](A437923_1_En_14_Fig3_HTML.jpg)\n\nFigure 14-3.\
    \ Clicking an item in the Object Library can identify the parent class for that\
    \ user interface object\n\nTo see how inheritance works between multiple classes,\
    \ follow these steps:\n\n1. Make sure the `IntroductoryPlayground` file is loaded\
    \ in Xcode.\n2. Edit the code as follows:\n\n```\n    import Cocoa\n    class\
    \ Animal {\n    var legs : Int = 0\n    }\n    class PackAnimal : Animal {\n \
    \   var strength : Int = 100\n    }\n    class Biped : PackAnimal {\n    var IQ\
    \ : Int = 75\n    }\n    var snake = Animal()\n    print (snake.legs)\n    var\
    \ mule = PackAnimal()\n    mule.legs = 4\n    mule.strength = 120\n    print (mule.legs)\n\
    \    print (mule.strength)\n    var relative = Biped()\n    relative.legs = 2\n\
    \    relative.strength = 55\n    relative.IQ = 10\n    print (relative.legs)\n\
    \    print (relative.strength)\n    print (relative.IQ)\n```\n\nThis code creates\
    \ three classes: `Animal` (`legs` property), `PackAnimal` (`strength` property),\
    \ and `Biped` (`IQ` property). Then it creates three objects based on these classes.\
    \ The first object, `snake`, is based on the `Animal` class. The second object,\
    \ `mule`, is based on the `PackAnimal` class. The third object, `relative`, is\
    \ based on the `Biped` class.\n\nUltimately, the `relative` object contains properties\
    \ from all three classes, the `mule` object only contains properties from the\
    \ `Animal` and `PackAnimal` class, and the `snake` object only contains properties\
    \ from the `Animal` class, as follows:\n\n| Object | Based on these classes |\
    \ Contains these properties |\n| --- | --- | --- |\n| snake | Animal | legs |\n\
    | mule | PackAnimal, Animal | legs, strength |\n| relative | Biped, PackAnimal,\
    \ Animal | legs, strength, IQ |\n\nThe `snake`, `mule`, and `relative` objects\
    \ contain different properties based on their different classes and the classes\
    \ that they inherit from, as shown in Figure [14-4](#A437923_1_En_14_Chapter.html#Fig4).\n\
    \n![A437923_1_En_14_Fig4_HTML.jpg](A437923_1_En_14_Fig4_HTML.jpg)\n\nFigure 14-4.\
    \ Seeing how inheritance works among properties stored in different classes\n\n\
    ### Understanding Polymorphism\n\nWhen one class (subclass) inherits from another\
    \ class (superclass), it contains all the properties and methods stored in the\
    \ superclass. Although a subclass inherits all properties and methods from a superclass,\
    \ those properties and methods aren’t displayed inside the subclass. The only\
    \ code that appears in each class are properties and methods unique to that class.\n\
    \nProperties inherited from another class retain the same name and data type.\
    \ Methods inherited from another class retain the same method name and code that\
    \ makes it do something useful.\n\nThe problem with inheriting methods is that\
    \ you may want to modify the code in an inherited method. For example, suppose\
    \ you had a video game where you have dogs running on the ground and birds flying\
    \ in the air. You could create a basic class like this:\n\n```\nclass GameObject\
    \ {\nvar speed : Int = 0\nvar locationX : Int = 3\nvar locationY : Int = 3\nfunc\
    \ move (X: Int, Y: Int) {\nlocationX += X + speed\nlocationY += Y + speed\n}\n\
    }\nvar dog = GameObject()\n```\n\nNow the `dog` object, created from the `GameObject`\
    \ class, has three properties (`speed`, `locationX`, and `locationY`) and one\
    \ method (`move`) that changes the `locationX` and `locationY` properties.\n\n\
    A dog can only run on the ground, but a bird can move in two-dimensions, so it\
    \ needs an additional `height` property. To move a flying object, the `move` method\
    \ needs to change the `height` property. This means the `move` method needs to\
    \ be different.\n\nOne clumsy way around this problem is to create a different\
    \ name for the move method such as changing its name from “move” to “fly”:\n\n\
    ```\nclass FlyingObject : GameObject {\nvar height : Int = 0\nfunc fly (X: Int,\
    \ Y: Int) {\nlocationX += X + speed\nlocationY += Y + speed\nheight += (X + Y)\
    \ / 2\n}\n}\nvar bird = FlyingObject()\n```\n\nThe problem with this solution\
    \ is that the `bird` object, created from the `FlyingObject` class, now has two\
    \ methods: the `move` method inherited from `GameObject` and the new `fly` method\
    \ defined in `FlyingObject`.\n\nYou could simply ignore the `move` method and\
    \ use the `fly` method, but this risks creating errors if you accidentally use\
    \ the `move` method to change the position of a bird instead of the correct `fly`\
    \ method that moves a bird in two-dimensions instead of one.\n\nThat’s why polymorphism\
    \ exists. Polymorphism basically lets you reuse a method name (such as `move`)\
    \ but replace it with completely different code to make it work. To identify when\
    \ you’re using polymorphism to reuse a method name but modify its code, you must\
    \ use the `override` keyword in front of the method you’re changing, such as\n\
    \n```\noverride func move (X: Int, Y: Int) {\nlocationX += X + speed\nlocationY\
    \ += Y + speed\nheight += (X + Y) / 2\n}\n```\n\nWhen you override a method (using\
    \ polymorphism), you essentially have two identically named methods, but one version\
    \ is defined in one class and the second version is defined in another class.\
    \ The computer never gets confused because you can only run each method by specifying\
    \ both the object name and the method name. Even though the method names are identical,\
    \ the object names are not.\n\nTo see how polymorphism works, follow these steps:\n\
    \n1. Make sure your `IntroductoryPlayground` file is loaded into Xcode.\n2. Edit\
    \ the code as follows:"
