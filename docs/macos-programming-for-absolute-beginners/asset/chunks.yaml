    \ can delete the text in the search field with one click. Each time the user types\
    \ something in the search field and presses Return, the search field stores the\
    \ text as a list stored in the `recentSearches` property.\n\nBy accessing this\
    \ `recentSearches` property, you can view a list of everything the user previously\
    \ typed in that search field.\n\nA token field lets you type text and then it\
    \ encloses that text inside a token. Despite the appearance of tokens, you can\
    \ still retrieve the text of a token field by accessing the `stringValue` property.\n\
    \nTo see how to use a secure text field , a search field and a token field, follow\
    \ these steps:\n\n1.  From within Xcode choose File ➤ New ➤ Project.  \n2.  Click\
    \ Application under the macOS category.  \n3.  Click Cocoa Application and click\
    \ the Next button. Xcode now asks for a product name.  \n4.  Click in the Product\
    \ Name text field and type TextProgram.  \n5.  Make sure the Language pop-up menu\
    \ displays Swift and that the “Use Storyboards” check box is selected.  \n6. \
    \ Click the Next button. Xcode asks where you want to store the project.  \n7.\
    \  Choose a folder to store your project and click the Create button.  \n8.  Click\
    \ the `Main.storyboard` file in the Project Navigator pane.  \n9.  Click the TextProgram\
    \ icon to make the window of the user interface appear.  \n10.  Drag three push\
    \ buttons, a search field (on top), a token field (in the middle), a secure text\
    \ field (at the bottom), and three labels resized to expand their width on to\
    \ the user interface, as shown in Figure [19-7](#A437923_1_En_19_Chapter.html#Fig7).\n\
    \n![A437923_1_En_19_Fig7_HTML.jpg](A437923_1_En_19_Fig7_HTML.jpg)\n\nFigure 19-7.\n\
    \nThe user interface of the TextProgram  \n11.  Choose View ➤ Assistant Editor\
    \ ➤ Show Assistant Editor. Xcode displays the `ViewController.swift` file next\
    \ to the user interface.  \n12.  Move the mouse pointer over the search field,\
    \ hold down the Control key, and drag the mouse under the IBOutlet line in the\
    \ `ViewController.swift` file.  \n13.  Release the Control key and the mouse button.\
    \ A pop-up window appears.  \n14.  Click in the Name text field, type searchBox,\
    \ and click the Connect button.  \n15.  Move the mouse pointer over the label\
    \ to the right of the search field, hold down the Control key, and drag the mouse\
    \ under the IBOutlet line.  \n16.  Release the Control key and the mouse button.\
    \ A pop-up window appears.  \n17.  Click in the Name text field, type historyBox\
    \ , and click the Connect button. You should have two IBOutlets like this:\n\n\
    ```\n    @IBOutlet weak var searchBox: NSSearchField!\n    @IBOutlet weak var\
    \ historyBox: NSTextField!\n    ```\n\n18.  Move the mouse pointer over the Token\
    \ field, hold down the Control key, and drag the mouse under the IBOutlet line\
    \ in the `ViewController.swift` file.  \n19.  Release the Control key and the\
    \ mouse button. A pop-up window appears.  \n20.  Click in the Name text field,\
    \ type tokenBox, and click the Connect button.  \n21.  Move the mouse pointer\
    \ over the label to the right of the search field, hold down the Control key,\
    \ and drag the mouse under the IBOutlet line.  \n22.  Release the Control key\
    \ and the mouse button. A pop-up window appears.  \n23.  Click in the Name text\
    \ field, type tokenResult, and click the Connect button. You should have two more\
    \ IBOutlets like this:\n\n```\n    @IBOutlet weak var tokenBox: NSTokenField!\n\
    \    @IBOutlet weak var tokenResult: NSTextField!\n    ```\n\n24.  Move the mouse\
    \ pointer over the secure text field, hold down the Control key, and drag the\
    \ mouse under the IBOutlet line in the `ViewController.swift` file.  \n25.  Release\
    \ the Control key and the mouse button. A pop-up window appears.  \n26.  Click\
    \ in the Name text field, type secureBox , and click the Connect button.  \n27.\
    \  Move the mouse pointer over the label to the right of the search field, hold\
    \ down the Control key, and drag the mouse under the IBOutlet line.  \n28.  Release\
    \ the Control key and the mouse button. A pop-up window appears.  \n29.  Click\
    \ in the Name text field, type secureResults, and click the Connect button. You\
    \ should have two more IBOutlets like this:\n\n```\n    @IBOutlet weak var secureBox:\
    \ NSSecureTextField!\n    @IBOutlet weak var secureResults: NSTextField!\n   \
    \ ```\n\n30.  Move the mouse pointer over the push button under the search field,\
    \ hold down the Control key, and drag the mouse over the last curly bracket in\
    \ the bottom of the `ViewController.swift` file.  \n31.  Release the Control key\
    \ and the mouse. A pop-up window appears.  \n32.  Click in the Connect pop-up\
    \ menu and choose Action.  \n33.  Click in the Name text field and type showHistory.\
    \  \n34.  Click in the Type pop-up menu and choose NSButton. Then click the Connect\
    \ button. Xcode creates an IBAction method.  \n35.  Move the mouse pointer over\
    \ the push button under the token field, hold down the Control key, and drag the\
    \ mouse over the last curly bracket in the bottom of the `ViewController.swift`\
    \ file.  \n36.  Release the Control key and the mouse. A pop-up window appears.\
    \  \n37.  Click in the Connect pop-up menu and choose Action.  \n38.  Click in\
    \ the Name text field and type showToken .  \n39.  Click in the Type pop-up menu\
    \ and choose NSButton. Then click the Connect button. Xcode creates an IBAction\
    \ method.  \n40.  Move the mouse pointer over the push button under the secure\
    \ text field, hold down the Control key, and drag the mouse over the last curly\
    \ bracket in the bottom of the `ViewController.swift` file.  \n41.  Release the\
    \ Control key and the mouse. A pop-up window appears.  \n42.  Click in the Connect\
    \ pop-up menu and choose Action.  \n43.  Click in the Name text field and type\
    \ `showSecret`.  \n44.  Click in the Type pop-up menu and choose NSButton. Then\
    \ click the Connect button. Xcode creates an IBAction method.  \n45.  Modify these\
    \ IBAction methods as follows:\n\n```\n    @IBAction func showHistory(_ sender:\
    \ NSButton) {\n    historyBox.stringValue = String(stringInterpolationSegment:\
    \ searchBox.recentSearches)\n    }\n    @IBAction func showToken(_ sender: NSButton)\
    \ {\n    tokenResult.stringValue = tokenBox.stringValue\n    }\n    @IBAction\
    \ func showSecret(_ sender: NSButton) {\n    secureResults.stringValue = secureBox.stringValue\n\
    \    }\n    }\n    ```\n\n46.  Choose Product ➤ Run. Your user interface appears\
    \ .  \n47.  Click in the search field, type Yahoo, and press Return.  \n48.  Click\
    \ the close icon (the X in the gray circle) to clear the search field, type Google,\
    \ and press Return.  \n49.  Click the push button underneath the search field.\
    \ Notice that the label to the right displays the two search results.  \n50. \
    \ Click in the Token field, type Yahoo, and press Return. Notice that the token\
    \ field displays your typed text as a token.  \n51.  Click in the Token field\
    \ and next to the Yahoo token, type Google and press Return.  \n52.  Click the\
    \ push button underneath the Token field. Notice that the label to the right displays\
    \ your two text tokens.  \n53.  Click in the secure text field and type password.\
    \ Notice that the secure text field masks the text.  \n54.  Click the push button\
    \ underneath the secure text field. Notice the label to the right displays the\
    \ text from the secure text field, as shown in Figure [19-8](#A437923_1_En_19_Chapter.html#Fig8).\n\
    \n![A437923_1_En_19_Fig8_HTML.jpg](A437923_1_En_19_Fig8_HTML.jpg)\n\nFigure 19-8.\n\
    \nThe results of the TextProgram  \n55.  Choose TextProgram ➤ Quit TextProgram."
  trans: "\n### 使用安全文本字段、搜索字段和令牌字段\n\n安全文本字段会在用户输入时用圆点符号隐藏文本。这有助于屏蔽密码、信用卡号或其他敏感信息等实际文本，使其不被看到。除了屏蔽输入的文本外，安全文本字段的工作方式与常规文本字段完全相同，你可以使用\
    \ `intValue`、`floatValue`、`doubleValue` 或 `stringValue` 属性检索输入的值。\n\n搜索文本字段看起来像浏览器中常见的典型搜索字段，显示一个放大镜图标和一个关闭图标，点击后可一键删除搜索字段中的文本。每当用户在搜索字段中输入内容并按回车键时，搜索字段会将该文本存储为列表，保存在\
    \ `recentSearches` 属性中。\n\n通过访问此 `recentSearches` 属性，你可以查看用户先前在该搜索字段中输入的所有内容的列表。\n\
    \n令牌字段允许你输入文本，然后将其包围在令牌中。尽管外观是令牌，你仍然可以通过访问 `stringValue` 属性来检索令牌字段的文本。\n\n要了解如何使用安全文本字段、搜索字段和令牌字段，请按以下步骤操作：\n\
    \n1.  在 Xcode 中选择 \"文件\" ➤ \"新建\" ➤ \"项目\"。\n2.  在 macOS 类别下点击 \"应用\"。\n3.  点击\
    \ \"Cocoa 应用\"，然后点击 \"下一步\" 按钮。Xcode 会要求输入产品名称。\n4.  点击 \"产品名称\" 文本字段，输入 `TextProgram`。\n\
    5.  确保 \"语言\" 弹出菜单显示为 \"Swift\"，并且已选中 \"使用故事板\" 复选框。\n6.  点击 \"下一步\" 按钮。Xcode\
    \ 会询问项目存储位置。\n7.  选择一个文件夹来存储项目，然后点击 \"创建\" 按钮。\n8.  在项目导航器窗格中点击 `Main.storyboard`\
    \ 文件。\n9.  点击 `TextProgram` 图标，使用户界面的窗口显示出来。\n10. 将三个按钮、一个搜索字段（顶部）、一个令牌字段（中间）、一个安全文本字段（底部）以及三个调整宽度以扩展显示的标签拖入用户界面，如图\
    \ 19-7 所示。\n\n![A437923_1_En_19_Fig7_HTML.jpg](img/A437923_1_En_19_Fig7_HTML.jpg)\n\
    \n图 19-7. `TextProgram` 的用户界面\n\n11. 选择 \"视图\" ➤ \"助理编辑器\" ➤ \"显示助理编辑器\"。Xcode\
    \ 会在用户界面旁边显示 `ViewController.swift` 文件。\n12. 将鼠标指针移至搜索字段上方，按住 Control 键，然后拖动鼠标至\
    \ `ViewController.swift` 文件中 `IBOutlet` 行下方。\n13. 松开 Control 键和鼠标按钮。会弹出一个窗口。\n\
    14. 点击 \"名称\" 文本字段，输入 `searchBox`，然后点击 \"连接\" 按钮。\n15. 将鼠标指针移至搜索字段右侧的标签上方，按住 Control\
    \ 键，然后拖动鼠标至 `IBOutlet` 行下方。\n16. 松开 Control 键和鼠标按钮。会弹出一个窗口。\n17. 点击 \"名称\" 文本字段，输入\
    \ `historyBox`，然后点击 \"连接\" 按钮。你应该得到两个 IBOutlet，如下所示：\n\n    ```\n    @IBOutlet\
    \ weak var searchBox: NSSearchField!\n    @IBOutlet weak var historyBox: NSTextField!\n\
    \    ```\n\n18. 将鼠标指针移至令牌字段上方，按住 Control 键，然后拖动鼠标至 `ViewController.swift` 文件中\
    \ `IBOutlet` 行下方。\n19. 松开 Control 键和鼠标按钮。会弹出一个窗口。\n20. 点击 \"名称\" 文本字段，输入 `tokenBox`，然后点击\
    \ \"连接\" 按钮。\n21. 将鼠标指针移至搜索字段右侧的标签上方，按住 Control 键，然后拖动鼠标至 `IBOutlet` 行下方。\n22.\
    \ 松开 Control 键和鼠标按钮。会弹出一个窗口。\n23. 点击 \"名称\" 文本字段，输入 `tokenResult`，然后点击 \"连接\"\
    \ 按钮。你应该再得到两个 IBOutlet，如下所示：\n\n    ```\n    @IBOutlet weak var tokenBox: NSTokenField!\n\
    \    @IBOutlet weak var tokenResult: NSTextField!\n    ```\n\n24. 将鼠标指针移至安全文本字段上方，按住\
    \ Control 键，然后拖动鼠标至 `ViewController.swift` 文件中 `IBOutlet` 行下方。\n25. 松开 Control\
    \ 键和鼠标按钮。会弹出一个窗口。\n26. 点击 \"名称\" 文本字段，输入 `secureBox`，然后点击 \"连接\" 按钮。\n27. 将鼠标指针移至搜索字段右侧的标签上方，按住\
    \ Control 键，然后拖动鼠标至 `IBOutlet` 行下方。\n28. 松开 Control 键和鼠标按钮。会弹出一个窗口。\n29. 点击 \"\
    名称\" 文本字段，输入 `secureResults`，然后点击 \"连接\" 按钮。你应该再得到两个 IBOutlet，如下所示：\n\n    ```\n\
    \    @IBOutlet weak var secureBox: NSSecureTextField!\n    @IBOutlet weak var\
    \ secureResults: NSTextField!\n    ```\n\n30. 将鼠标指针移至搜索字段下方的按钮上方，按住 Control 键，然后拖动鼠标至\
    \ `ViewController.swift` 文件底部最后一个大括号上方。\n31. 松开 Control 键和鼠标。会弹出一个窗口。\n32. 点击\
    \ \"连接\" 弹出菜单，选择 \"操作\"。\n33. 点击 \"名称\" 文本字段，输入 `showHistory`。\n34. 点击 \"类型\"\
    \ 弹出菜单，选择 `NSButton`。然后点击 \"连接\" 按钮。Xcode 会创建一个 `IBAction` 方法。\n35. 将鼠标指针移至令牌字段下方的按钮上方，按住\
    \ Control 键，然后拖动鼠标至 `ViewController.swift` 文件底部最后一个大括号上方。\n36. 松开 Control 键和鼠标。会弹出一个窗口。\n\
    37. 点击 \"连接\" 弹出菜单，选择 \"操作\"。\n38. 点击 \"名称\" 文本字段，输入 `showToken`。\n39. 点击 \"类型\"\
    \ 弹出菜单，选择 `NSButton`。然后点击 \"连接\" 按钮。Xcode 会创建一个 `IBAction` 方法。\n40. 将鼠标指针移至安全文本字段下方的按钮上方，按住\
    \ Control 键，然后拖动鼠标至 `ViewController.swift` 文件底部最后一个大括号上方。\n41. 松开 Control 键和鼠标。会弹出一个窗口。\n\
    42. 点击 \"连接\" 弹出菜单，选择 \"操作\"。\n43. 点击 \"名称\" 文本字段，输入 `showSecret`。\n44. 点击 \"\
    类型\" 弹出菜单，选择 `NSButton`。然后点击 \"连接\" 按钮。Xcode 会创建一个 `IBAction` 方法。\n45. 如下所示修改这些\
    \ `IBAction` 方法：\n\n    ```\n    @IBAction func showHistory(_ sender: NSButton)\
    \ {\n        historyBox.stringValue = String(stringInterpolationSegment: searchBox.recentSearches)\n\
    \    }\n    @IBAction func showToken(_ sender: NSButton) {\n        tokenResult.stringValue\
    \ = tokenBox.stringValue\n    }\n    @IBAction func showSecret(_ sender: NSButton)\
    \ {\n        secureResults.stringValue = secureBox.stringValue\n    }\n    ```\n\
    \n46. 选择 \"产品\" ➤ \"运行\"。你的用户界面会出现。\n47. 点击搜索字段，输入 `Yahoo`，然后按回车键。\n48. 点击关闭图标（灰色圆圈中的\
    \ X）清除搜索字段，输入 `Google`，然后按回车键。\n49. 点击搜索字段下方的按钮。注意右侧的标签会显示两次搜索结果。\n50. 点击令牌字段，输入\
    \ `Yahoo`，然后按回车键。注意令牌字段会将输入的文本显示为令牌。\n51. 点击令牌字段，并在 `Yahoo` 令牌旁边输入 `Google`，然后按回车键。\n\
    52. 点击令牌字段下方的按钮。注意右侧的标签会显示你的两个文本令牌。\n53. 点击安全文本字段并输入 `password`。注意安全文本字段会屏蔽文本。\n\
    54. 点击安全文本字段下方的按钮。注意右侧的标签会显示安全文本字段中的文本，如图 19-8 所示。\n\n![A437923_1_En_19_Fig8_HTML.jpg](img/A437923_1_En_19_Fig8_HTML.jpg)\n\
    \n图 19-8. `TextProgram` 的结果\n\n55. 选择 \"TextProgram\" ➤ \"退出 `TextProgram`\"。\n"
- fmt: "虽然搜索字段（`search fields`）、令牌字段（`token fields`）和安全文本字段（`secure text fields`）外观不同，但在访问其中存储的值时，它们的行为与文本字段完全一致。\n\
    \n## 使用组合框\n\n文本字段允许用户输入任意内容，而弹出按钮则显示一组固定的选项。当你希望显示一组固定选项，同时允许用户输入文本时，便可以使用组合框。\n\
    \n组合框基于`NSComboBox`类，而该类又派生自定义所有文本字段的`NSTextField`类。因此，你可以通过`intValue`、`floatValue`、`doubleValue`或`stringValue`属性从组合框中检索值。\n\
    \n使用组合框时，有两种方式可以填充其弹出式选项列表。首先，你可以使用“显示属性检查器”面板创建一个内部列表。其次，你可以使用外部数据源，使组合框从数据库文件或通过网络检索数据。\n\
    \n### 创建内部列表\n\n当你预先确切知道组合框中要存储多少个项目以及哪些项目时（例如国家列表或产品名称列表），内部列表是最佳选择。要创建内部列表，请遵循以下步骤：\n\
    \n1.  在你的程序用户界面上放置一个组合框。\n2.  点击以选中该组合框。\n3.  选择“视图”>“实用工具”>“显示属性检查器”。“项目”列表随即出现，如图[19-9](#A437923_1_En_19_Chapter.html#Fig9)所示。\n\
    \n![A437923_1_En_19_Fig9_HTML.jpg](A437923_1_En_19_Fig9_HTML.jpg)\n\n**图 19-9.**\n\
    \n“项目”列表允许你定义要在组合框中显示的项目\n\n- 要编辑列表中的现有项目，点击该项目将其选中，然后按`Return`键。现在你可以编辑文本了。\n\
    - 要移除现有项目，点击该项目将其选中，然后点击减号图标。\n- 要添加新项目，点击加号图标。然后点击新添加的项目，按`Return`键，并编辑文本。\n\n\
    “可见项目数”文本字段定义了组合框菜单显示的项目数量。\n\n“自动完成”复选框允许组合框显示列表中与用户输入内容相匹配的项目。因此，如果用户键入一个字母，自动完成功能会显示组合框列表中以该字母开头的所有项目。\n\
    \n“使用数据源”复选框确定组合框是使用其内部“项目”列表来显示菜单项，还是从其他来源检索数据。如果选中了“使用数据源”复选框，则需要编写 Swift 代码来向组合框中填充数据。\n\
    \n要了解如何使用内部列表填充组合框，请遵循以下步骤：\n\n1.  在 Xcode 内部，选择“文件”>“新建”>“项目”。\n2.  在 macOS 类别下点击“应用程序”。\n\
    3.  点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 现在会要求输入产品名称。\n4.  点击“产品名称”文本字段，然后输入`ComboProgram`。\n\
    5.  确保“语言”弹出菜单显示为`Swift`，并且“使用故事板”复选框已被选中。\n6.  点击“下一步”按钮。Xcode 会询问你希望将项目存储在哪里。\n\
    7.  选择一个文件夹来存储项目，然后点击“创建”按钮。\n8.  在项目导航器窗格中点击`Main.storyboard`文件。\n9.  将一个组合框、一个推送按钮和一个标签拖放到用户界面上，并加宽标签，使其看起来如图[19-10](#A437923_1_En_19_Chapter.html#Fig10)所示。\n\
    \n![A437923_1_En_19_Fig10_HTML.jpg](A437923_1_En_19_Fig10_HTML.jpg)\n\n**图 19-10.**\n\
    \n`ComboProgram`的用户界面\n10.  选择“视图”>“助理编辑器”>“显示助理编辑器”。Xcode 会在用户界面旁显示`ViewController.swift`文件。\n\
    11.  将鼠标指针移到组合框上，按住`Control`键，然后将鼠标拖到`ViewController.swift`文件中的`IBOutlet`行下方。\n\
    12.  松开`Control`键和鼠标。会弹出一个窗口。\n13.  点击“名称”文本字段，输入`myCombo`，然后点击“连接”按钮。\n14.  将鼠标指针移到标签上，按住`Control`键，然后将鼠标拖到`ViewController.swift`文件中的`IBOutlet`行下方。\n\
    15.  松开`Control`键和鼠标。会弹出一个窗口。\n16.  点击“名称”文本字段，输入`comboResult`，然后点击“连接”按钮。现在你应该有了这两个`IBOutlet`：\n\
    \n```\n    @IBOutlet weak var myCombo: NSComboBox!\n    @IBOutlet weak var comboResult:\
    \ NSTextField!\n```\n\n17.  将鼠标指针移到推送按钮上，按住`Control`键，然后将鼠标拖到`ViewController.swift`文件底部最后一个花括号的上方。\n\
    18.  松开`Control`键和鼠标。会弹出一个窗口。\n19.  点击“连接”弹出菜单，选择“动作”。\n20.  点击“名称”文本字段，输入`showResult`。\n\
    21.  点击“类型”弹出菜单，选择`NSButton`。然后点击“连接”按钮。Xcode 会创建一个空的`IBAction`方法。\n22.  按如下方式修改此`IBAction`方法：\n\
    \n```\n    @IBAction func showResult(sender: NSButton) {\n        comboResult.stringValue\
    \ = myCombo.stringValue\n    }\n```\n\n23.  选择“产品”>“运行”。你的用户界面会出现。\n24.  点击组合框，输入`Hello`。\n\
    25.  点击推送按钮。单词`Hello`会出现在标签中。\n26.  点击组合框右侧边缘向下的箭头，显示其项目列表。由于你没有修改默认列表，因此组合框列表包含三个项目，分别标记为`Item\
    \ 1`、`Item 2`和`Item 3`。\n27.  点击`Item 3`，然后点击推送按钮。下方的标签会显示`Item 3`。\n28.  选择`ComboProgram`>“退出`ComboProgram`”。\n\
    \n此示例使用了组合框的默认项目列表。尝试添加或修改此组合框的项目列表，并选中“自动完成”复选框，以观察这些选项如何改变组合框的行为。"
  raw: "Although search fields, token fields , and secure text fields look differently,\
    \ they behave exactly like a text field when you need to access the values stored\
    \ inside them.\n\n## Using Combo Boxes\n\nA text field lets the user type in anything\
    \ while a pop-up button displays a fixed range of options. When you want to display\
    \ a fixed range of options and let the user type in text, that’s when you can\
    \ use a combo box.\n\nA combo box is based on the `NSComboBox` class , which is\
    \ based on the `NSTextField` class that defines all text fields. As a result,\
    \ you can retrieve values from a combo box using the `intValue`, `floatValue`,\
    \ `doubleValue`, or `stringValue` properties.\n\nWhen using a combo box, you have\
    \ two ways to fill its pop-up list of options. First, you can create an internal\
    \ list using the Show Attributes Inspector pane . Second, you can use an external\
    \ data source so the combo box retrieves data from a database file or over the\
    \ Internet.\n\n### Creating an Internal List\n\nAn internal list is best when\
    \ you know ahead of time exactly how many and which items you want to store in\
    \ a combo box, such as a list of countries or product names. To create an internal\
    \ list, follow these steps:\n\n1.  Place a combo box on your program’s user interface.\
    \  \n2.  Click to select that combo box.  \n3.  Choose View ➤ Utilities ➤ Show\
    \ Attributes Inspector. The Items list appears, as shown in Figure [19-9](#A437923_1_En_19_Chapter.html#Fig9).\n\
    \n![A437923_1_En_19_Fig9_HTML.jpg](A437923_1_En_19_Fig9_HTML.jpg)\n\nFigure 19-9.\n\
    \nThe Items list lets you define items to appear in a combo box\n\nTo edit an\
    \ existing item in the list, click that item to select it and press Return. Now\
    \ you can edit the text.\n\nTo remove an existing item , click that item to select\
    \ it and click the minus sign icon.\n\nTo add a new item, click the plus sign\
    \ icon. Then click the newly added item, press Return, and edit the text.\n\n\
    The Visible Items text field defines how many items the combo box menu displays.\n\
    \nThe Autocompletes check box lets the combo box displays items in its list that\
    \ match what the user started to type in. So if the user types one letter, autocomplete\
    \ displays a list of all items in the combo box list that begins with the same\
    \ letter the user typed.\n\nThe Uses Data Source check box determines if the combo\
    \ box uses its internal Items list to display menu items, or retrieves data from\
    \ another source. If the Uses Data Source check box is selected, then you’ll need\
    \ to write Swift code to fill a combo box with data.\n\nTo see how to fill a combo\
    \ box using an internal list, follow these steps:\n\n1.  From within Xcode choose\
    \ File ➤ New ➤ Project.  \n2.  Click Application under the macOS category.  \n\
    3.  Click Cocoa Application and click the Next button. Xcode now asks for a product\
    \ name.  \n4.  Click in the Product Name text field and type ComboProgram.  \n\
    5.  Make sure the Language pop-up menu displays Swift and that the “Use Storyboards”\
    \ check box is selected.  \n6.  Click the Next button. Xcode asks where you want\
    \ to store the project.  \n7.  Choose a folder to store your project and click\
    \ the Create button.  \n8.  Click the `Main.storyboard` file in the Project Navigator\
    \ pane.  \n9.  Drag a combo box, push button, and a label on to the user interface,\
    \ and widen the label so it looks like Figure [19-10](#A437923_1_En_19_Chapter.html#Fig10).\n\
    \n![A437923_1_En_19_Fig10_HTML.jpg](A437923_1_En_19_Fig10_HTML.jpg)\n\nFigure\
    \ 19-10.\n\nThe user interface of the ComboProgram  \n10.  Choose View ➤ Assistant\
    \ Editor ➤ Show Assistant Editor. Xcode shows the `ViewController.swift` file\
    \ next to the user interface.  \n11.  Move the mouse pointer over the combo box,\
    \ hold down the Control key, and drag the mouse under the IBOutlet line in the\
    \ `ViewController.swift` file.  \n12.  Release the Control key and the mouse.\
    \ A pop-up window appears.  \n13.  Click in the Name text field, type myCombo,\
    \ and click the Connect button.  \n14.  Move the mouse pointer over the label,\
    \ hold down the Control key, and drag the mouse under the IBOutlet line in the\
    \ `ViewController.swift` file.  \n15.  Release the Control key and the mouse.\
    \ A pop-up window appears.  \n16.  Click in the Name text field, type comboResult\
    \ , and click the Connect button. You should now have these two IBOutlets:\n\n\
    ```\n    @IBOutlet weak var myCombo: NSComboBox!\n    @IBOutlet weak var comboResult:\
    \ NSTextField!\n    ```\n\n17.  Move the mouse pointer over the push button, hold\
    \ down the Control key, and drag the mouse just above the last curly bracket at\
    \ the bottom of the `ViewController.swift` file.  \n18.  Release the Control key\
    \ and the mouse. A pop-up window appears.  \n19.  Click in the Connection pop-up\
    \ menu and choose Action.  \n20.  Click in the Name text field and type showResult.\
    \  \n21.  Click in the Type pop-up menu and choose NSButton. Then click the Connect\
    \ button. Xcode creates an empty IBAction method.  \n22.  Modify this IBAction\
    \ method as follows:\n\n```\n    @IBAction func showResult(sender: NSButton) {\n\
    \    comboResult.stringValue = myCombo.stringValue\n    }\n    ```\n\n23.  Choose\
    \ Product ➤ Run. Your user interface appears.  \n24.  Click in the combo box and\
    \ type Hello.  \n25.  Click the push button. The word Hello appears in the label.\
    \  \n26.  Click the downward-pointing arrow on the right edge of the combo box\
    \ to display its list of items. Since you didn’t modify the default list, the\
    \ combo box list contains three items labeled Item 1, Item 2, and Item 3.  \n\
    27.  Click Item 3 and then click the push button. The label underneath displays\
    \ Item 3.  \n28.  Choose ComboProgram ➤ Quit ComboProgram.\n\nThis example used\
    \ the default item list for the combo box. Experiment by adding or modifying this\
    \ combo box item list and select the Autocompletes check box to see how these\
    \ options modify the combo box."
  trans: "\n虽然搜索字段（`search fields`）、令牌字段（`token fields`）和安全文本字段（`secure text fields`）外观不同，但在访问其中存储的值时，它们的行为与文本字段完全一致。\n\
    \n## 使用组合框\n\n文本字段允许用户输入任意内容，而弹出按钮则显示一组固定的选项。当你希望显示一组固定选项，同时允许用户输入文本时，便可以使用组合框。\n\
    \n组合框基于`NSComboBox`类，而该类又派生自定义所有文本字段的`NSTextField`类。因此，你可以通过`intValue`、`floatValue`、`doubleValue`或`stringValue`属性从组合框中检索值。\n\
    \n使用组合框时，有两种方式可以填充其弹出式选项列表。首先，你可以使用“显示属性检查器”面板创建一个内部列表。其次，你可以使用外部数据源，使组合框从数据库文件或通过网络检索数据。\n\
    \n### 创建内部列表\n\n当你预先确切知道组合框中要存储多少个项目以及哪些项目时（例如国家列表或产品名称列表），内部列表是最佳选择。要创建内部列表，请遵循以下步骤：\n\
    \n1.  在你的程序用户界面上放置一个组合框。\n2.  点击以选中该组合框。\n3.  选择“视图”>“实用工具”>“显示属性检查器”。“项目”列表随即出现，如图\
    \ 19-9 所示。\n\n![A437923_1_En_19_Fig9_HTML.jpg](img/A437923_1_En_19_Fig9_HTML.jpg)\n\
    \n**图 19-9.**\n\n“项目”列表允许你定义要在组合框中显示的项目\n\n- 要编辑列表中的现有项目，点击该项目将其选中，然后按`Return`键。现在你可以编辑文本了。\n\
    - 要移除现有项目，点击该项目将其选中，然后点击减号图标。\n- 要添加新项目，点击加号图标。然后点击新添加的项目，按`Return`键，并编辑文本。\n\n\
    “可见项目数”文本字段定义了组合框菜单显示的项目数量。\n\n“自动完成”复选框允许组合框显示列表中与用户输入内容相匹配的项目。因此，如果用户键入一个字母，自动完成功能会显示组合框列表中以该字母开头的所有项目。\n\
    \n“使用数据源”复选框确定组合框是使用其内部“项目”列表来显示菜单项，还是从其他来源检索数据。如果选中了“使用数据源”复选框，则需要编写 Swift 代码来向组合框中填充数据。\n\
    \n要了解如何使用内部列表填充组合框，请遵循以下步骤：\n\n1.  在 Xcode 内部，选择“文件”>“新建”>“项目”。\n2.  在 macOS 类别下点击“应用程序”。\n\
    3.  点击“Cocoa 应用程序”，然后点击“下一步”按钮。Xcode 现在会要求输入产品名称。\n4.  点击“产品名称”文本字段，然后输入`ComboProgram`。\n\
    5.  确保“语言”弹出菜单显示为`Swift`，并且“使用故事板”复选框已被选中。\n6.  点击“下一步”按钮。Xcode 会询问你希望将项目存储在哪里。\n\
    7.  选择一个文件夹来存储项目，然后点击“创建”按钮。\n8.  在项目导航器窗格中点击`Main.storyboard`文件。\n9.  将一个组合框、一个推送按钮和一个标签拖放到用户界面上，并加宽标签，使其看起来如图\
    \ 19-10 所示。\n\n![A437923_1_En_19_Fig10_HTML.jpg](img/A437923_1_En_19_Fig10_HTML.jpg)\n\
    \n**图 19-10.**\n\n`ComboProgram`的用户界面\n10.  选择“视图”>“助理编辑器”>“显示助理编辑器”。Xcode 会在用户界面旁显示`ViewController.swift`文件。\n\
    11.  将鼠标指针移到组合框上，按住`Control`键，然后将鼠标拖到`ViewController.swift`文件中的`IBOutlet`行下方。\n\
    12.  松开`Control`键和鼠标。会弹出一个窗口。\n13.  点击“名称”文本字段，输入`myCombo`，然后点击“连接”按钮。\n14.  将鼠标指针移到标签上，按住`Control`键，然后将鼠标拖到`ViewController.swift`文件中的`IBOutlet`行下方。\n\
    15.  松开`Control`键和鼠标。会弹出一个窗口。\n16.  点击“名称”文本字段，输入`comboResult`，然后点击“连接”按钮。现在你应该有了这两个`IBOutlet`：\n\
    \n```\n    @IBOutlet weak var myCombo: NSComboBox!\n    @IBOutlet weak var comboResult:\
    \ NSTextField!\n```\n\n17.  将鼠标指针移到推送按钮上，按住`Control`键，然后将鼠标拖到`ViewController.swift`文件底部最后一个花括号的上方。\n\
    18.  松开`Control`键和鼠标。会弹出一个窗口。\n19.  点击“连接”弹出菜单，选择“动作”。\n20.  点击“名称”文本字段，输入`showResult`。\n\
    21.  点击“类型”弹出菜单，选择`NSButton`。然后点击“连接”按钮。Xcode 会创建一个空的`IBAction`方法。\n22.  按如下方式修改此`IBAction`方法：\n\
    \n```\n    @IBAction func showResult(sender: NSButton) {\n        comboResult.stringValue\
    \ = myCombo.stringValue\n    }\n```\n\n23.  选择“产品”>“运行”。你的用户界面会出现。\n24.  点击组合框，输入`Hello`。\n\
    25.  点击推送按钮。单词`Hello`会出现在标签中。\n26.  点击组合框右侧边缘向下的箭头，显示其项目列表。由于你没有修改默认列表，因此组合框列表包含三个项目，分别标记为`Item\
    \ 1`、`Item 2`和`Item 3`。\n27.  点击`Item 3`，然后点击推送按钮。下方的标签会显示`Item 3`。\n28.  选择`ComboProgram`>“退出`ComboProgram`”。\n\
    \n此示例使用了组合框的默认项目列表。尝试添加或修改此组合框的项目列表，并选中“自动完成”复选框，以观察这些选项如何改变组合框的行为。\n"
- fmt: "### Using a Data Source\n\nA data source is best when a combo box needs to\
    \ display data that may change over time, such as displaying a list of information\
    \ from a database. To use a data source, you need to write Swift code. First,\
    \ you need to adopt the `NSComboBoxDataSource` protocol in the `ViewController.swift`\
    \ file like this:\n\n```\nclass ViewController: NSViewController, NSComboBoxDataSource\
    \ {\n```\n\nNext, you need to write two functions. One function needs to count\
    \ the number of items to display in the combo box. The second function needs to\
    \ retrieve data to insert in the combo box’s list of items.\n\nFinally, you need\
    \ to specify a data source (the file that contains the data you want to display\
    \ in the combo box) and make sure the combo box’s Uses Data Source check box is\
    \ selected in the Show Attributes Inspector pane or set the `usesDataSource` property\
    \ to `true` using Swift code.\n\nTo see how a data source works to fill a combo\
    \ box with a list of items, follow these steps:\n\n1.  Make sure the ComboProgram\
    \ project is loaded in Xcode.  \n2.  Click the `ViewController.swift` file in\
    \ the Project Navigator pane.  \n3.  Modify the class name in the `AppDelegate.swift`\
    \ file to include the `NSComboBoxDataSource` protocol as follows:\n\n    ```\n\
    \    class ViewController : NSViewController, NSComboBoxDataSource {\n    ```\n\
    \n4.  Underneath the `IBOutlet` lines, add the following line to create an array\
    \ of strings that will fill the combo box’s item list:\n\n    ```\n    let myArray\
    \ = [\"Sandwich\", \"Chips\", \"Soda\", \"Salad\"]\n    ```\n\n5.  Modify the\
    \ `viewDidLoad` function as follows:\n\n    ```\n    override func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    // Do any additional setup after loading the\
    \ view.\n    self.myCombo.usesDataSource = true\n    self.myCombo.dataSource =\
    \ self\n    }\n    ```\n\n    This Swift code defines the data source for the\
    \ combo box (identified by the `myCombo` IBOutlet) as `self`, which means the\
    \ same class is also the data source. It makes sure the `usesDataSource` property\
    \ is `true` to use a data source.  \n6.  Above the `IBAction` method, add the\
    \ following two function implementations:  \n7.  Above the last curly bracket\
    \ in the `ViewController.swift` file, add the following:\n\n    ```\n    func\
    \ numberOfItems (in comboBox: NSComboBox) -> Int {\n    return myArray.count\n\
    \    }\n    func comboBox(_ comboBox: NSComboBox, objectValueForItemAt index:\
    \ Int) -> Any? {\n    return myArray[index]\n    }\n    ```\n\n    The `numberOfItems`\
    \ function counts all the items in the `myArray` array and returns that integer.\
    \ The `comboBox` function places each array item in the combo box’s item list.\
    \  \n8.  Choose Product ➤ Run.  \n9.  Click the downward-pointing arrow of the\
    \ combo box. Notice that its item list contains the items defined in `myArray`\
    \ (“Sandwich”, “Chips”, “Soda”, and “Salad”).  \n10.  Click “Sandwich” in the\
    \ combo box to select it and then click the push button. Notice that the label\
    \ underneath displays “Sandwich”.  \n11.  Choose ComboProgram ➤ Quit ComboProgram.\
    \  \n\nThis simple program shows how to retrieve a list of items from another\
    \ data source (in this case an array called `myArray`) to fill an item list for\
    \ a combo box. The complete code for the `ViewController.swift` file should look\
    \ like this:\n\n```\nimport Cocoa\nclass ViewController: NSViewController, NSComboBoxDataSource\
    \ {\n@IBOutlet weak var myCombo: NSComboBox!\n@IBOutlet weak var comboResult:\
    \ NSTextField!\nlet myArray = [\"Sandwich\", \"Chips\", \"Soda\", \"Salad\"]\n\
    override func viewDidLoad() {\nsuper.viewDidLoad()\n// Do any additional setup\
    \ after loading the view.\nself.myCombo.usesDataSource = true\nself.myCombo.dataSource\
    \ = self\n}\noverride var representedObject : Any? {\ndidSet {\n// Update the\
    \ view, if already loaded.\n}\n}\n@IBAction func showResult(_ sender: NSButton)\
    \ {\ncomboResult.stringValue = myCombo.stringValue\n}\nfunc numberOfItems(in comboBox:\
    \ NSComboBox) -> Int {\nreturn myArray.count\n}\nfunc comboBox(_ comboBox: NSComboBox,\
    \ objectValueForItemAt index: Int) -> Any? {\nreturn myArray[index]\n}\n}\n```\n\
    \n## Summary\n\nText fields allow the user to type anything such as numbers or\
    \ strings, so a text field offers multiple properties (`intValue`, `floatValue`,\
    \ `doubleValue`, and `stringValue`) to store typed information in the proper data\
    \ type. To restrict numeric information the user may type, you can use a number\
    \ formatter to define minimum and/or maximum values along with defining different\
    \ ways the user can enter numeric data, such as with a percentage sign or a currency\
    \ sign.\n\nBesides ordinary text fields, Xcode offers several variations of text\
    \ fields for specialized purposes. Labels are designed for simply displaying text\
    \ without allowing the user to edit the displayed text. A secure text field masks\
    \ typed-in data to keep it safe from prying eyes. A token field displays typed-in\
    \ data as groups or tokens while a search field offers a property to remember\
    \ previously typed-in data.\n\nCombo boxes combine the features of a text field\
    \ with a pop-up button. A combo box can display a list of valid options that the\
    \ user can click, or the user can type in data. You can define a combo box’s list\
    \ of options in the Show Attributes Inspector pane, or you can retrieve data from\
    \ another source such as from an array.\n\nThe main purpose of text fields and\
    \ combo boxes is to allow the user to type in any type of data. When the user\
    \ types in data, you may need to write Swift code to verify that the entered data\
    \ is valid for your program.\n\n# 20. Designing a User Interface with Constraints\n\
    \nA user interface lets people control a program, give a program data, and receive\
    \ data back again. Since people can only interact with a program through its user\
    \ interface, it’s crucial that the user interface is uncluttered and easy to understand.\n\
    \nWhen designing a program’s user interface, experiment with different designs.\
    \ What may seem intuitive and simple for you to use may seem completely foreign\
    \ and confusing to a novice.\n\nTo help you create and experiment with different\
    \ user interface designs, Xcode makes it easy for you to drag and arrange items\
    \ on a user interface such as buttons, text fields, and check boxes. Once you’ve\
    \ found the best possible user interface design, the next challenge is making\
    \ sure that user interface always looks right.\n\nWith macOS programs, the user\
    \ interface appears in a window that the user can resize. This means the user\
    \ might stretch a window wider (or skinnier), taller (or shorter), or do both\
    \ at the same time, so your user interface must adapt to the different window\
    \ sizes. Even the best user interface will be worthless if the program window\
    \ shrinks and cuts off or hides part of the user interface from view, as shown\
    \ in Figure 20-1.\n\n![A437923_1_En_20_Fig1_HTML.jpg](A437923_1_En_20_Fig1_HTML.jpg)\n\
    \nFigure 20-1. Resizing a window may cut off or hide a program’s user interface\n\
    \nTo make sure resizing a window won’t distort a user interface, you need to use\
    \ constraints. Constraints can define one or more of the following:\n\n- The maximum\
    \ and minimum size a user interface item can expand or shrink\n- The position\
    \ of a user interface item in relation to the borders of the window\n- The distance\
    \ between two user interface items\n\nBy applying constraints to all parts of\
    \ your user interface, you can insure that your user interface will always look\
    \ good no matter how the user may resize the window."
