    # 使用扩展


    如果某个类包含你需要的属性和方法，面向对象的方法是继承该类（创建子类）。不断创建子类的问题在于，从略有不同的类文件中创建对象可能会变得很麻烦。


    当你想要扩展属于 Cocoa 框架的类功能时尤其如此。例如，如果你正在处理 `String` 数据类型，你可能不想创建 `String` 数据类型的子类，然后基于这个新的子类创建对象。理想情况下，你希望继续使用
    `String` 数据类型，但同时也增加一些功能。


    这就是 Swift 提供扩展的原因。扩展本质上允许你向现有类添加代码，而无需创建子类。这样你仍然可以使用原始类，同时无需通过继承、多态或子类就能为该类添加新功能。扩展的结构如下所示：


    ```

    extension ClassName {

    }

    ```


    扩展除了可以定义方法，还可以定义包含如下代码的属性：


    - 获取器和设置器

    - 构造器

    - 属性观察器


    虽然扩展无需继承就能向类添加新的属性和方法，但扩展不能覆盖类中已有的方法或属性。扩展也不能创建被赋予初始值的属性，例如：


    ```

    var temperature : Int = 100    // 不能在扩展中使用

    ```


    要了解扩展如何向类添加属性和方法，请按照以下步骤创建一个新的 playground：


    1.  确保你的 `IntroductoryPlayground` 文件已加载到 Xcode 中。

    2.  按如下所示编辑代码：


    ```

    import Cocoa

    class EmptyClass {

    }

    extension EmptyClass {

    var age : Int {

    get {

    return 50

    }

    }

    func retire (testAge : Int) -> String {

    if testAge < 62 {

    return "Keep working"

    } else {

    return "Time to retire"

    }

    }

    }

    var aWorker = EmptyClass ()

    aWorker.retire(testAge: 65)

    aWorker.age

    ```


    这段代码创建了一个完全空的类，然后创建了一个扩展，向这个空类添加了一个 `age` 属性和一个 `retire` 方法。最后，它从这个空类创建了一个对象，调用了
    `retire` 方法（在扩展中定义的），并显示了存储在 `age` 属性中的值，如图 14-7 所示。


    ![A437923_1_En_14_Fig7_HTML.jpg](img/A437923_1_En_14_Fig7_HTML.jpg)


    图 14-7. 使用扩展向空类添加属性和方法


    你可以看到这个类本身什么也没做，但通过扩展，这个类现在拥有了它之前没有的新功能。


    # 使用协议


    在本章的开头，你第一次接触到了出现在 `AppDelegate.swift` 类文件中的内容，这个文件是你为了学习每章基本原理而创建的。这个 `AppDelegate`
    类的声明如下所示：


    ```

    class AppDelegate: NSObject, NSApplicationDelegate {

    ```


    这行代码创建了一个名为 `AppDelegate` 的类，它继承了 Cocoa 框架中 `NSObject` 类的属性和方法。然而，`NSApplicationDelegate`
    是另一个用于扩展类而无需通过继承或子类的文件名。


    `NSApplicationDelegate` 文件是一个协议文件。上面的 Swift 代码创建了一个名为 `AppDelegate` 的类，它继承了 `NSObject`
    类的属性和方法，同时也继承了 `NSApplicationDelegate` 文件中的代码。（你可以通过在 Xcode 文档窗口中查看，来了解关于 `NSApplicationDelegate`
    协议的更多细节。）


    类（例如 `NSObject`）和协议（例如 `NSApplicationDelegate`）之间的主要区别在于，类定义了属性和方法，而协议只定义了属性和方法的名称，没有任何实际实现它们的代码。协议有时被称为空类，因为它从不定义任何实际使功能生效的
    Swift 代码。


    协议定义了一组用于解决特定类型问题的属性和方法名称。现在，由采用或遵循此协议的类来提供实现每个方法或属性声明的实际 Swift 代码。


    协议声明看起来与类或结构体声明相同。唯一的区别是协议声明使用 `protocol` 关键字：


    ```

    protocol ProtocolName {

    }

    ```


    在这个协议声明中，你可以定义属性和方法而不实现任何 Swift 代码，如下所示：


    ```

    protocol ProtocolName {

    var property1 : datatype { get }        // 只读

    var property2 : datatype { get set }    // 读写

    func methodName (parameters) -> datatype

    }

    ```


    当协议定义了属性或方法时，任何采用该协议的类都必须完全按照协议中的定义来实现该属性或方法。在上面的例子中，`property1` 被定义为拥有一个获取器，`property2`
    被定义为拥有一个获取器和一个设置器。


    这意味着当一个类实现这两个属性时，它必须只为 `property1` 定义一个获取器，而为 `property2` 定义获取器和设置器两者。


    类似地，协议中定义的方法在被类文件采用时必须是精确的。这意味着如果方法在协议中定义为带有两个整数参数，那么该方法的实现也必须带有完全相同的两个整数参数。


    协议通常用于处理常见的用户界面元素，这些元素需要特定类型的方法来操作它们，但又不能精确定义如何操作它们，因为数据可能因程序而异。


    例如，表格视图是一种以行列表形式显示数据的用户界面元素。表格视图需要知道要容纳多少行数据以及每行显示什么类型的数据。由于每个表格视图都需要知道这些信息，因此创建标准方法来执行此操作是合理的，但由于每个表格视图需要包含不同的信息，因此避免编写实际的
    Swift 代码来填充表格视图数据也是合理的。


    任何包含表格视图的程序都可以利用存储在协议中的预定义方法名来操作数据。你只需要添加 Swift 代码来用数据填充表格视图。

    '
- fmt: "通过使用协议，你可以用相同的方法名在不同程序中操作表格视图。如果没有表格视图协议，你就只能自己创建用于在表格视图中添加和显示数据的方法名。因此，Cocoa框架通常使用协议来提供一套一致的方法列表，用于执行常见任务。\n\
    \n要了解协议的工作原理，请遵循以下步骤：\n\n1. 确保`IntroductoryPlayground`文件已加载到Xcode中。\n2. 按如下方式编辑代码：\n\
    \n```\nimport Cocoa\nprotocol TestMe {\n    var cash : Int { get }\n    var creditCheck\
    \ : Int { get set }\n    func purchase (price : Int) -> String\n}\nclass WindowShopper\
    \ : TestMe {\n    var tempValue : Int = 0\n    var cash : Int = 0\n    var creditCheck\
    \ : Int {\n        get {\n            return tempValue\n        }\n        set\
    \ (newValue) {\n            tempValue = newValue\n            cash -= 10\n   \
    \     }\n    }\n    func purchase (price : Int) -> String {\n        cash -= price\n\
    \        return \"Bought something!\"\n    }\n}\nvar shopper = WindowShopper ()\n\
    shopper.cash = 450\nshopper.purchase (price: 129)\nshopper.cash\n```\n\n注意，`TestMe`协议定义了两个属性和一个方法。`cash`属性仅定义了getter。`creditCheck`属性同时定义了getter和setter。`purchase`方法仅列出了其参数（`price`为整数）及其返回值（类型为`String`）。请注意，该协议实际上并没有实现任何必要的Swift代码。\n\
    \n当创建`WindowShopper`类时，它采用或遵守了`TestMe`协议。这意味着它必须提供Swift代码来定义`cash`属性的getter，以及`creditCheck`属性的getter和setter。它还需要为`purchase`方法实现Swift代码。\n\
    \n如果你未能为`TestMe`协议中定义的所有属性和方法编写Swift代码，Xcode会报错，提示`WindowShopper`类未能遵守协议。在采用协议时，请确保实现了所有必要的属性和方法。\n\
    \n运行上述代码会显示如图[14-8](#A437923_1_En_14_Chapter.html#Fig8)所示的结果。\n\n![A437923_1_En_14_Fig8_HTML.jpg](A437923_1_En_14_Fig8_HTML.jpg)\n\
    \n图14-8.\n\n遵守协议的类\n\n### 在协议中定义可选方法和属性\n\n当你创建一个协议时，你定义的每个属性和方法都必须被采用该协议的类实现。然而，你也可以将一个或多个属性和方法设为可选，以便它们可以被忽略。要定义可选的属性或方法，你需要使用`@objc`关键字标识该协议，并使用`optional`关键字标识各个属性或方法，例如：\n\
    \n```\n@objc protocol ProtocolName {\n    var requiredProperty : dataType { get\
    \ }\n    @objc optional var optionalProperty : dataType { get }\n    @objc optional\
    \ func optionalMethod ()\n}\n```\n\n要采用或遵守此协议，类只需要实现未被`optional`关键字标识的任何属性或方法。要实现必需的属性或方法，你需要使用`@objc`关键字标识它们，例如：\n\
    \n```\nclass ClassName : ProtocolName {\n    @objc var requiredProperty : dataType\
    \ = initialValue\n}\n```\n\n然而，如果你想要实现一个可选的属性或方法，你可以省略`@objc`关键字，像这样：\n\n```\n\
    class ClassName : ProtocolName {\n    @objc var requiredProperty : dataType =\
    \ initialValue\n    var optionalProperty : dataType = initialValue\n}\n```\n\n\
    要了解如何在协议中创建可选的属性和方法，请遵循以下步骤：\n\n1. 确保`IntroductoryPlayground`文件已加载到Xcode中。\n2.\
    \ 按如下方式编辑代码：\n\n```\nimport Cocoa\n@objc protocol Person {\n    var name : String\
    \ { get }\n    @objc optional var age : Int { get }\n    @objc optional func move\
    \ (X: Int) -> Int\n}\nclass Politician : Person {\n    @objc var name : String\
    \ = \"\"\n}\nvar candidate = Politician ()\ncandidate.name = \"John Doe\"\n```\n\
    \n注意，上面定义的`Person`协议中唯一必需的项目是`name`属性。这就是为什么`Politician`类只需要实现`name`属性，但它必须使用`@objc`关键字标识它。\n\
    \n尝试将不同的属性和方法设为可选，以便观察它们如何影响你在类中的实现方式。\n\n### 将继承与协议一起使用\n\n协议甚至可以从其他协议继承属性和方法。这使得一个协议可以从多个协议继承属性和方法。此时，一个类必须采用或遵守所有协议中定义的所有属性和方法。\n\
    \n要了解如何从多个协议继承属性和方法，请遵循以下步骤：\n\n1. 确保`IntroductoryPlayground`文件已加载到Xcode中。\n2.\
    \ 按如下方式编辑代码：\n\n```\nimport Cocoa\nprotocol First {\n    var name : String { get\
    \ }\n}\nprotocol Second {\n    var ID : Int { get }\n}\nprotocol Third: First,\
    \ Second {\n    var email : String { get }\n}\nclass InheritProtocols : Third\
    \ {\n    var name : String = \"\"\n    var ID : Int = 0\n    var email : String\
    \ = \"\"\n}\nvar friend = InheritProtocols()\nfriend.name = \"Cindy Smith\"\n\
    friend.ID = 12\nfriend.email = cindysmith@isp.com\nprint (friend.name)\nprint\
    \ (friend.ID)\nprint (friend.email)\n```\n\n在这个例子中，`name`、`ID`和`email`属性在三个不同的协议中被定义。第三个协议继承了第一个和第二个协议。\n\
    \n现在，当一个类采用最后一个协议时，它必须实现在所有协议中存储的属性和方法。尽管`name`、`ID`和`email`属性都是在不同的协议中声明的，但`InheritProtocols`类可以访问它们全部，如图[14-9](#A437923_1_En_14_Chapter.html#Fig9)所示。\n\
    \n![A437923_1_En_14_Fig9_HTML.jpg](A437923_1_En_14_Fig9_HTML.jpg)\n\n图14-9.\n\n\
    从多个协议继承属性和方法"
  raw: "By using protocols, you can manipulate table views using identical method\
    \ names from one program to another. Without table view protocols, you’d be forced\
    \ to make up your own method names for adding and displaying data in a table view.\
    \ Thus, protocols are typically used in the Cocoa framework to provide a consistent\
    \ list of methods for performing common tasks.\n\nTo see how protocols work, follow\
    \ these steps:\n\n1.  Make sure the IntroductoryPlayground file is loaded into\
    \ Xcode.  \n2.  Edit the code as follows:\n\n```\n    import Cocoa\n    protocol\
    \ TestMe {\n    var cash : Int { get }\n    var creditCheck : Int { get set }\n\
    \    func purchase (price : Int) -> String\n    }\n    class WindowShopper : TestMe\
    \ {\n    var tempValue : Int = 0\n    var cash : Int = 0\n    var creditCheck\
    \ : Int {\n    get {\n    return tempValue\n    }\n    set (newValue) {\n    tempValue\
    \ = newValue\n    cash -= 10\n    }\n    }\n    func purchase (price : Int) ->\
    \ String {\n    cash -= price\n    return \"Bought something!\"\n    }\n    }\n\
    \    var shopper = WindowShopper ()\n    shopper.cash = 450\n    shopper.purchase\
    \ (price: 129)\n    shopper.cash\n    ```\n\nNotice that the `TestMe` protocol\
    \ defines two properties and a method. The `cash` property is defined only with\
    \ a getter. The `creditCheck` property is defined with both a getter and a setter.\
    \ The `purchase` method only lists its parameters (`price` as an integer) and\
    \ its return value, which is a String. Notice that the protocol doesn’t actually\
    \ implement any of the necessary Swift code.\n\nWhen the `WindowShopper` class\
    \ is created, it adopts or conforms to the `TestMe` protocol. That means it must\
    \ provide Swift code to define the getter for the `cash` property and the getter\
    \ and setter for the `creditCheck` property. It will also need to implement the\
    \ Swift code for the `purchase` method.\n\nIf you fail to write Swift code for\
    \ all the properties and methods defined in the `TestMe` protocol, Xcode will\
    \ give an error saying the `WindowShopper` class failed to conform to the protocol.\
    \ When adopting a protocol, make sure you implement all the necessary properties\
    \ and methods.\n\nRunning the above code displays the results shown in Figure\
    \ [14-8](#A437923_1_En_14_Chapter.html#Fig8).\n\n![A437923_1_En_14_Fig8_HTML.jpg](A437923_1_En_14_Fig8_HTML.jpg)\n\
    \nFigure 14-8.\n\nA class conforming to a protocol\n\n### Defining Optional Methods\
    \ and Properties in Protocols\n\nWhen you create a protocol, every property and\
    \ method you define must be implemented by any class that adopts that protocol.\
    \ However, you can also make one or more properties and methods optional so they\
    \ can be ignored. To define optional properties or methods, you need to identify\
    \ the protocol with the `@objc` keyword and identify individual properties or\
    \ methods with the `optional` keyword as well, such as\n\n```\n@objc protocol\
    \ ProtocolName {\nvar requiredProperty : dataType { get }\noptional var optionalProperty\
    \ : dataType { get }\noptional func optionalMethod ()\n}\n```\n\nTo adopt or conform\
    \ to this protocol, a class only needs to implement any property or method that\
    \ is not identified by the `optional` keyword. To implement required properties\
    \ or methods, you need to identify them with the `@objc` keyword, such as\n\n\
    ```\nclass ClassName : ProtocolName {\n@objc var requiredProperty : dataType =\
    \ initialValue\n}\n```\n\nHowever, if you want to implement an optional property\
    \ or method, you can omit the `@objc` keyword, like this:\n\n```\nclass ClassName\
    \ : ProtocolName {\n@objc var requiredProperty : dataType = initialValue\nvar\
    \ optionalProperty : dataType = initialValue\n}\n```\n\nTo see how to create optional\
    \ properties and methods in a protocol, follow these steps:\n\n1.  Make sure the\
    \ IntroductoryPlayground file is loaded into Xcode.  \n2.  Edit the code as follows:\n\
    \n    ```\n    import Cocoa\n    @objc protocol Person {\n    var name : String\
    \ { get }\n    @objc optional var age : Int { get }\n    @objc optional func move\
    \ (X: Int) -> Int\n    }\n    class Politician : Person {\n    @objc var name\
    \ : String = \"\"\n    }\n    var candidate = Politician ()\n    candidate.name\
    \ = \"John Doe\"\n    ```\n\nNotice that the only required item in the person\
    \ protocol defined above is the property `name`. That’s why the `politician` class\
    \ only needs to implement the `name` property, but it must identify it with the\
    \ `@objc` keyword.\n\nTry experimenting with making different properties and methods\
    \ optional so you can see how they affect how you need to implement them in the\
    \ class.\n\n### Using Inheritance with Protocols\n\nProtocols can even inherit\
    \ properties and methods from other protocols. This lets one protocol inherit\
    \ properties and methods from multiple protocols. Now a class must adopt or conform\
    \ to all the properties and methods defined in all of the protocols.\n\nTo see\
    \ how to inherit properties and methods from multiple protocols, follow these\
    \ steps:\n\n1.  Make sure the IntroductoryPlayground file is loaded into Xcode.\
    \  \n2.  Edit the code as follows:\n\n    ```\n    import Cocoa\n    protocol\
    \ First {\n    var name : String { get }\n    }\n    protocol Second {\n    var\
    \ ID : Int { get }\n    }\n    protocol Third: First, Second {\n    var email\
    \ : String { get }\n    }\n    class InheritProtocols : Third {\n    var name\
    \ : String = \"\"\n    var ID : Int = 0\n    var email : String = \"\"\n    }\n\
    \    var friend = InheritProtocols()\n    friend.name = \"Cindy Smith\"\n    friend.ID\
    \ = 12\n    friend.email = cindysmith@isp.com\n    print (friend.name)\n    print\
    \ (friend.ID)\n    print (friend.email)\n    ```\n\nIn this example, the `name`,\
    \ `ID`, and `email` properties are defined in three different protocols. The third\
    \ protocol inherits from the first and second protocols.\n\nNow when a class adopts\
    \ the last protocol, it must implement the properties and methods stored in all\
    \ the protocols. Even though the `name`, `ID`, and `email` properties were all\
    \ declared in different protocols, the `inheritProtocols` class can access them\
    \ all, as shown in Figure [14-9](#A437923_1_En_14_Chapter.html#Fig9).\n\n![A437923_1_En_14_Fig9_HTML.jpg](A437923_1_En_14_Fig9_HTML.jpg)\n\
    \nFigure 14-9.\n\nInheriting properties and methods from multiple protocols"
