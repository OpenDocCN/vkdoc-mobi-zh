    ## Summary


    Arrays and dictionaries are two ways to store lists of related data in a single
    variable. Arrays make it easy to store data but retrieving data can be cumbersome
    since you have to know the exact index value of the data you want to retrieve.


    Dictionaries force you to store data with a key, but that key makes it easy to
    retrieve that data later without knowing the exact location it may be stored in
    the dictionary.


    In the sample macOS program that you created, you also learned how for-in loops
    can count automatically through a dictionary. By now you should also be getting
    more comfortable creating user interfaces and seeing which items need IBOutlets
    and which items need IBAction methods.


    Designing programs can occur in three distinct steps. First, you create the user
    interface and customize it. Second, you connect your user interface to your Swift
    file. Third, you write Swift code to make your IBAction methods work.


    Think of arrays and dictionaries as super variables that can store multiple data
    in a single variable name. If you only need to save a single value, then use a
    variable. If you need to store lists of related data, then use an array or a dictionary.


    # 10. Tuples and Sets


    Variables are good for storing individual chunks of data, and arrays and dictionaries
    are good for storing lists of related data. For greater flexibility, Swift also
    offers additional data structures called tuples and sets.


    A tuple lets you store related data in one place that may consist of different
    data types such as a string and an integer , which could represent a person’s
    name and an employee ID number. A set is similar to an array or a dictionary in
    letting you store two or more chunks of related data such as strings or integers.


    Perhaps the biggest advantage of both tuples and structures is when you combine
    them with other data structures. Instead of creating an array of integers , you
    can create an array of tuples or an array of structures. This gives you the flexibility
    to store different data types together and store multiple copies of similar data.


    ## Using Tuples


    Suppose you want to store somebody’s name and age. You can create two separate
    variables, like this:


    ```

    var name : String

    var age : Int

    name = "Janice Parker"

    age = 47

    ```


    Creating two or more separate variables to store related data can be troublesome
    because there’s no connection between the two variables to show any relationship.
    To solve this problem, Swift offers a unique data structure called a tuple.


    A tuple can store two or more chunks of data in a single variable where the separate
    chunks of data can even be completely different data types such as a string and
    an integer. Declaring a tuple is just like declaring a variable. The main difference
    is that instead of defining a single data type, you can define multiple data types
    enclosed in parentheses, like this:


    ```

    var tupleName : (DataType1, DataType2)

    ```


    Just like declaring variables, you have to declare a unique name for your tuple.
    Then you have to define how many different chunks of data to hold and their data
    types. Tuples can hold two or more chunks of data but the more data a tuple holds,
    the clumsier it can be to understand and retrieve data.


    One way to create a tuple is to declare a tuple name and the data types it can
    hold. The number of data types listed also defines the number of data chunks the
    tuple can store. So if you want to store a string and an integer in a tuple, you
    can use the following Swift code:


    ```

    var person : (String, Int)

    ```


    Then you can store data in that tuple, like this:


    ```

    person = ("Janice Parker", 47)

    ```


    When assigning data to a tuple, make sure you have both the proper data types
    and the correct number of data chunks. So the following will fail because the
    `person` tuple expects a string first and then an integer, not an integer first
    and then a string:


    ```

    person = (47, "Janice Parker")

    ```


    A second way to define a tuple is to simply give it data and let Swift infer the
    data type, such as


    ```

    var person = ("Janice Parker", 47)

    ```


    If you define a tuple by listing its data types, or if you let Swift infer the
    data types by the type of data you store, it’s not always clear what each chunk
    of data represents. To make it easier to identify the different chunks of data,
    Swift also lets you name your data types, such as


    ```

    var person : (name: String, age: Int)

    ```


    If you want Swift to infer the data types by assigning data directly into the
    tuple, you can do this:


    ```

    var person = (name: "Janice Parker", age: 47)

    ```


    Named tuples help clarify what each data chunk represents. In this case, the string
    represents a name and the integer represents an age.'
