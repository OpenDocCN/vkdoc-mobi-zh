    \ `init`. It lets you define initial values each time you create an object from\
    \ a class. An initializer in a class might look like this:\n\n```\nclass SecondClass\
    \ {\nvar name : String\nvar ID : Int\nvar salary : Double\ninit (name: String,\
    \ ID: Int, salary: Double) {\nself.name = name\nself.ID = ID\nself.salary = salary\n\
