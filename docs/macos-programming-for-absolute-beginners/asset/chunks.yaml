  trans: "\n# 17. 使用按钮选择命令\n\n每个程序都需要为用户提供一种控制计算机的方式。在过去，这意味着要知道如何键入正确的命令来使程序运行，但在如今的图形用户界面时代，更简单的程序控制方式是从可用命令列表中进行选择。向程序下达命令的最简单方法是通过按钮。\n\
    \n通过在屏幕上显示多个按钮，用户界面随时为用户提供多种选择。用户无需记忆晦涩难懂的命令，只需用鼠标指向命令并点击选择即可。\n\nXcode 提供了多种不同类型的按钮，你可以将它们放置在用户界面上，但它们的运作方式都相同。一个按钮代表一个单一命令，点击该按钮会执行存储在\
    \ `IBAction` 方法中的 Swift 代码。\n\n要使用按钮，只需将它们放置在用户界面（无论是 `.xib` 文件还是 `.storyboard`\
    \ 文件）上，修改标签以显示你希望该按钮代表的命令，然后通过 `IBAction` 方法将按钮连接到 Swift 代码。\n\n所有按钮都基于 Cocoa\
    \ 框架中定义的 `NSButton` 类。虽然大多数按钮显示可包含其代表命令的文本，但有些按钮根本不显示文本。尽管外观不同，所有按钮的运作方式都相同，并且可以随时更改成另一种按钮类型。可用的不同按钮类型如图\
    \ 17-1 所示：\n\n![A437923_1_En_17_Fig1_HTML.jpg](img/A437923_1_En_17_Fig1_HTML.jpg)\n\
    \n图 17-1. 可以放置在用户界面上的不同类型按钮\n\n- 推送按钮 (Push Button)\n- 纹理圆角按钮 (Textured Rounded\
    \ Button)\n- 渐变按钮 (Gradient Button)（不显示文本）\n- 弹出按钮 (Pop-Up Button)\n- 复选框按钮 (Checkbox\
    \ Button)\n- 单选按钮 (Radio Button)\n- 凹陷按钮 (Recessed Button)\n- 内嵌按钮 (Inline Button)\n\
    - 圆角矩形按钮 (Rounded Rectangle Button)\n- 展开三角形 (Disclosure Triangle)（不显示文本）\n- 帮助按钮\
    \ (Help Button)（不显示文本）\n- 图像按钮 (Image Button)（不显示文本）\n- 展开按钮 (Disclosure Button)（不显示文本）\n\
    \n没有文本标题的按钮占用的空间更少，但可能看起来晦涩难懂，因为用户不知道那个按钮是做什么的。图像按钮通常用于显示代表命令的图标。\n\n## 修改按钮上的文本\n\
    \n对于显示文本的按钮，Xcode 提供了两种修改按钮文本的方式：\n\n- 直接双击按钮上的文本进行编辑。\n- 点击按钮将其选中，选择“视图”➤“工具”➤“显示属性检查器”，然后编辑“标题\
    \ (Title)”属性，如图 17-2 所示。\n\n![A437923_1_En_17_Fig2_HTML.jpg](img/A437923_1_En_17_Fig2_HTML.jpg)\n\
    \n图 17-2. “显示属性检查器”面板允许你编辑按钮的标题\n\n“属性检查器”允许你在程序运行时定义按钮上的文本。但是，如果你以后想要更改该文本，则需要使用\
    \ Swift 代码修改按钮的文本。为此，你首先必须创建一个代表按钮的 `IBOutlet`。其次，你必须使用类似下面的代码在 Swift 中修改该按钮的“标题\
    \ (Title)”属性：\n\n```\n@IBOutlet weak var myButton: NSButton!\nmyButton.title =\
    \ \"新文本 (New Text)\"\n```\n\n“标题 (Title)”属性定义了显示在按钮上的文本，但许多按钮还提供了“备用标题 (Alternate)”属性。“备用标题”属性的目的是，当一个按钮的“类型\
    \ (Type)”属性设置为 `toggle` 或 `switch` 时，允许该按钮显示文本，如图 17-3 所示。\n\n![A437923_1_En_17_Fig3_HTML.jpg](img/A437923_1_En_17_Fig3_HTML.jpg)\n\
    \n图 17-3. 更改按钮的“类型 (Type)”属性\n\n当一个按钮的“备用标题 (Alternate Title)”文本非空，且该按钮的“类型 (Type)”属性为\
    \ `toggle` 或 `switch` 时，点击这个切换按钮会在显示“标题 (Title)”文本和“备用标题”文本之间交替切换。要了解按钮的“标题 (Title)”和“备用标题\
    \ (Alternate Title)”属性是如何工作的，请按照以下步骤操作：\n\n1. 在 Xcode 中，选择“文件”➤“新建”➤“项目”。\n2.\
    \ 在 macOS 类别下点击“应用程序 (Application)”。\n3. 点击“Cocoa 应用程序 (Cocoa Application)”，然后点击“下一步\
    \ (Next)”按钮。Xcode 现在会询问产品名称。\n4. 点击“产品名称 (Product Name)”文本字段，输入 `ButtonProgram`。\n\
    5. 确保“语言 (Language)”弹出菜单显示 Swift，并且勾选了“使用 Storyboard (Use Storyboards)”复选框。\n\
    6. 点击“下一步 (Next)”按钮。Xcode 会询问你想要在哪里存储项目。\n7. 选择一个文件夹来存储你的项目，然后点击“创建 (Create)”按钮。\n\
    8. 在项目导航器中点击 `Main.storyboard` 文件。你的程序用户界面将会出现。\n9. 选择“视图”➤“工具”➤“显示对象库 (Show Object\
    \ Library)”。对象库会出现在 Xcode 窗口的右下角。\n10. 将一个推送按钮和一个文本字段拖曳到视图控制器窗口上，调整这两个项目的大小，使其看起来像图\
    \ 17-4。\n\n![A437923_1_En_17_Fig4_HTML.jpg](img/A437923_1_En_17_Fig4_HTML.jpg)\n\
    \n图 17-4. ButtonProgram 的用户界面\n\n11. 点击推送按钮，然后选择“视图”➤“工具”➤“显示属性检查器”。“显示属性检查器”面板会出现在\
    \ Xcode 窗口的右上角。\n12. 点击“类型 (Type)”弹出菜单，然后选择“切换 (Toggle)”。\n13. 点击“标题 (Title)”文本字段，输入\
    \ `Change Me` 并按下回车键。\n14. 点击“备用标题 (Alternate)”文本字段，输入 `Alternate Text`。\n15.\
    \ 选择“产品”➤“运行 (Run)”。你的用户界面会出现。\n16. 点击 `Change Me` 按钮。注意，按钮上的文本现在显示为“Alternate\
    \ Text”。\n17. 再次点击同一个按钮。注意，文本会在 `Change Me` 和 `Alternate Text` 之间交替切换。\n18. 选择“ButtonProgram”➤“退出\
    \ ButtonProgram (Quit ButtonProgram)”。\n\n现在让我们看看如何通过从文本字段获取文本并将其存储到按钮的“标题 (Title)”属性中来修改按钮的标题，请按照以下步骤操作：\n\
    \n1. 在项目导航器窗格中点击 `Main.storyboard` 文件。\n2. 点击当前显示文本“Change Me”的推送按钮。\n3. 选择“视图”➤“助理编辑器”➤“显示助理编辑器\
    \ (Show Assistant Editor)”。`ViewController.swift` 文件会出现在 `Main.storyboard` 文件旁边。\n\
    4. 将鼠标指针移到推送按钮上，按住 Control 键，然后拖曳鼠标到 `ViewController.swift` 文件中 `@IBOutlet` 行下方。\n\
    5. 松开 Control 键和鼠标。会弹出一个菜单。\n6. 点击“名称 (Name)”文本字段，输入 `myButton`。\n7. 将鼠标指针移到文本字段上，按住\
    \ Control 键，然后拖曳鼠标到 `AppDelegate.swift` 文件中 `@IBOutlet` 行下方。\n8. 松开 Control 键和鼠标。会弹出一个菜单。\n\
    9. 点击“名称 (Name)”文本字段，输入 `changeText`。你现在应该已经创建了两个 `IBOutlet`，看起来像这样：\n\n```\n\
    \    @IBOutlet weak var myButton: NSButton!\n    @IBOutlet weak var changeText:\
    \ NSTextField!\n```\n\n10. 将鼠标指针移到推送按钮上，按住 Control 键，然后拖曳鼠标到 `AppDelegate.swift`\
    \ 文件底部最后一个花括号的上方。\n11. 松开 Control 键和鼠标。会弹出一个菜单。\n12. 点击“连接 (Connection)”弹出菜单，选择“动作\
    \ (Action)”。\n13. 点击“名称 (Name)”文本字段，输入 `changeTitle`。\n14. 点击“类型 (Type)”弹出菜单，选择\
    \ `NSButton`，然后点击“连接 (Connect)”按钮。Xcode 会创建一个空的 `IBAction` 方法。\n15. 按如下方式修改这个\
    \ `IBAction` 方法：\n\n```\n    @IBAction func changeTitle(_ sender: NSButton) {\n\
    \    myButton.title = changeText.stringValue\n    }\n```\n\n这段 Swift 代码会检索文本字段（`IBOutlet\
    \ changeText`）中的文本，并将其存储到按钮（`IBOutlet myButton`）的“标题 (Title)”属性中。\n16. 选择“产品”➤“运行\
    \ (Run)”。你的用户界面会出现。\n17. 点击文本字段，输入 `Hello there!`。\n18. 点击 `Change Me` 按钮。备用文本会出现在按钮上。\n\
    19. 再次点击按钮。文本字段中的文本现在会出现。\n20. 选择“ButtonProgram”➤“退出 ButtonProgram (Quit ButtonProgram)”。\n"
- fmt: "# 为按钮添加图像和声音\n\n按钮通常显示文本，列出按钮所代表的命令，例如“确定”或“取消”。不过，你也可以在按钮上显示图像。这对于创建工具栏图标非常有用，可以显示描述性图标来表示命令（例如，显示打印机来表示“打印”命令）。图像可以单独显示在按钮上，也可以与描述性文本一起显示。\n\
    \n除了显示图像，按钮还可以播放声音，为用户提供音频反馈。虽然大多数人使用鼠标（或触控板）点击按钮，但有些人更喜欢使用按键快捷键，因此你还可以将按键快捷键分配给连接到特定按钮的`IBAction`方法。\n\
    \n要添加图像到按钮，只需在属性检查器中修改“图像”属性和“图像”属性正下方的“备用”属性，如图17-5所示。\n\n![A437923_1_En_17_Fig5_HTML.jpg](A437923_1_En_17_Fig5_HTML.jpg)\n\
    \n**图17-5**  \n“图像”和“备用”弹出菜单允许你从预定义图像列表中进行选择。\n\n你还可以使用`NSButton`的`Image`和`alternateImage`属性来定义按钮上显示的图像。定义按钮上显示的图像时，你还可以选择该图像相对于按钮上任何文本的位置。\n\
    \n“位置”属性定义了图像与文本的显示方式，其中文本用水平线表示，图像用正方形表示，如图17-6所示。\n\n![A437923_1_En_17_Fig6_HTML.jpg](A437923_1_En_17_Fig6_HTML.jpg)\n\
    \n**图17-6**  \n“位置”属性允许你对齐按钮上的文本和图像。\n\n从左到右的七种不同位置分别是：\n\n*   仅文本\n*   仅图像\n\
    *   图像在左，文本在右\n*   文本在左，图像在右\n*   文本覆盖在图像中间\n*   文本在图像下方\n*   文本在图像上方\n\n要定义用户点击按钮时播放的声音，可以修改“声音”属性，如图17-7所示。（你可能需要调整电脑音量才能听到点击按钮时播放的声音。）\n\
    \n![A437923_1_En_17_Fig7_HTML.jpg](A437923_1_En_17_Fig7_HTML.jpg)\n\n**图17-7**\
    \  \n“声音”属性允许你选择要播放的声音。\n\n要了解如何向按钮添加图像和声音，请确保你的`ButtonProgram`项目已在Xcode中加载，然后按照以下步骤操作：\n\
    \n1.  在项目导航器中点击`Main.storyboard`文件。\n2.  点击用户界面上的按钮以选中它。\n3.  选择“视图”>“工具”>“显示属性检查器”。“显示属性检查器”窗格会出现在Xcode窗口的右上角。\n\
    4.  点击“图像”弹出菜单，选择`NSCaution`。\n5.  点击“备用”弹出菜单，选择`NSComputer`（参见图17-5）。\n6.  点击“位置”属性，选择第三个（从左起）图标，该图标将图像显示在左侧，文本显示在右侧（参见图17-6）。\n\
    7.  点击“声音”弹出菜单，选择一种声音，例如`Frog`。\n8.  选择“产品”>“运行”。你的程序会启动。注意，按钮上会出现警告图标。\n9.  点击文本字段，输入`Hello\
    \ there!`。\n10. 点击该按钮。按钮上的文本会显示备用文本，并播放你选择的声音。每次点击按钮时，它都会在“标题”和“图像”属性与“备用”（文本和图像）属性之间交替显示。\n\
    11. 选择`ButtonProgram`>“退出ButtonProgram”。\n\n# 将多个用户界面项连接到IBAction方法\n\n通常，你会将一个`IBAction`方法链接到一个用户界面项（例如按钮）。但是，也可以将多个项连接到同一个`IBAction`方法。当这样做时，`IBAction`方法需要知道是哪个用户界面项调用了它。\n\
    \n要标识特定的用户界面项，你需要更改链接到同一个`IBAction`方法的每个项的“标签”属性。“标签”属性可以保存一个整数值，因此你可以使用不同的`Tag`值来标识不同的用户界面项。\n\
    \n一旦为每个用户界面项分配了不同的`Tag`值，你就可以正常创建一个`IBAction`方法，方法是从一个用户界面项按住Control键拖拽到你的Swift文件中。然后，使用相同的Control键拖拽方法将其余的用户界面项连接到那个已有的`IBAction`方法。\n\
    \n只要使用`Tag`属性来标识是哪个用户界面项调用了`IBAction`方法，可以链接到同一个`IBAction`方法的项数量就没有限制。\n\n要了解如何将多个项连接到单个`IBAction`方法，请按照以下步骤操作：\n\
    \n1.  在Xcode中，选择“文件”>“新建”>“项目”。\n2.  在macOS类别下点击“应用程序”。\n3.  点击“Cocoa应用”，然后点击“下一步”按钮。Xcode现在要求输入产品名称。\n\
    4.  在“产品名称”文本字段中点击并输入`MultipleButtons`。\n5.  确保“语言”弹出菜单显示为`Swift`，并且“使用故事板”复选框已选中。\n\
    6.  点击“下一步”按钮。Xcode会询问你要将项目存储在何处。\n7.  选择一个文件夹来存储项目，然后点击“创建”按钮。\n8.  在项目导航器中点击`Main.storyboard`文件。\n\
    9.  将一个“按钮”、“凹进按钮”、“内联按钮”和“标签”拖拽到用户界面上，并调整标签的宽度，如图17-8所示。\n\n![A437923_1_En_17_Fig8_HTML.jpg](A437923_1_En_17_Fig8_HTML.jpg)\n\
    \n**图17-8**  \n`MultipleButtons`程序的用户界面\n\n此时，窗口上有三种不同类型的按钮和一个标签。你将创建一个所有三个按钮都可以运行的`IBAction`方法。当你点击一个按钮时，标签将显示该按钮的标题，以显示你刚刚点击了哪个按钮。\n\
    \n首先，你需要修改每个按钮的“标签”属性。顶部按钮的`Tag`值为0，中间按钮的`Tag`值为1，最下面的按钮的`Tag`值为2。\n\n然后，创建一个`IBAction`方法，该方法识别`Tag`属性并在标签中显示按钮的标题。为此，请遵循以下步骤：\n\
    \n1.  在项目导航器中点击`Main.storyboard`文件。\n2.  选择“视图”>“辅助编辑器”>“显示辅助编辑器”。Xcode会在用户界面旁边显示`ViewController.swift`文件。\n\
    3.  将鼠标指针移到标签上，按住Control键，然后拖拽到`AppDelegate.swift`文件中`IBOutlet`行下方。\n4.  松开Control键和鼠标按钮。会弹出一个窗口。\n\
    5.  在“名称”文本字段中点击，输入`displayLabel`，然后点击“连接”按钮。你应该得到一个类似于以下的`IBOutlet`：\n\n```\n\
    \    @IBOutlet weak var displayLabel: NSTextField!\n```"
  raw: "## Adding Images and Sounds to a Button\n\nButtons typically display text\
    \ that lists the command that the button represents, such as OK or Cancel. However,\
    \ you can also display images on a button. This can be useful for creating toolbar\
    \ icons that display a descriptive icon that represents a command (such as showing\
    \ a printer to represent the Print command). Images can appear on a button by\
    \ themselves or with descriptive text.\n\nBesides displaying images, buttons can\
    \ also play sounds to give the user audio feedback. While most people click a\
    \ button using the mouse (or trackpad), some people prefer using keystroke shortcuts,\
    \ so you can also assign keystrokes to run an IBAction method linked to a particular\
    \ button.\n\nTo add images to a button, you just need to modify the Image and/or\
    \ the Alternate property directly underneath the Image property in the Attributes\
    \ Inspector, as shown in Figure [17-5](#A437923_1_En_17_Chapter.html#Fig5).\n\n\
    ![A437923_1_En_17_Fig5_HTML.jpg](A437923_1_En_17_Fig5_HTML.jpg)\n\nFigure 17-5.\n\
    \nThe Image and Alternate pop-up menus let you choose from a list of predefined\
    \ images.\n\nYou can also define an image to display on a button using the Image\
    \ and alternateImage properties of an NSButton. When defining an image to appear\
    \ on a button, you can also choose the position of that image relative to any\
    \ text that also appears on that image.\n\nThe Position property defines how an\
    \ image appears with text where text is represented by a horizontal line and the\
    \ image is represented by a square, as shown in Figure [17-6](#A437923_1_En_17_Chapter.html#Fig6).\n\
    \n![A437923_1_En_17_Fig6_HTML.jpg](A437923_1_En_17_Fig6_HTML.jpg)\n\nFigure 17-6.\n\
    \nThe Position property lets you align text and images on a button.\n\nThe seven\
    \ different positions from left to right are\n\n*   Text only\n*   Image only\n\
    *   Image on the left and text on the right\n*   Text on the left and image on\
    \ the right\n*   Text overlapping the middle of the image\n*   Text underneath\
    \ the image\n*   Text above the image\n\nTo define a sound to play when the user\
    \ clicks a button, you can modify the Sound property, as shown in Figure [17-7](#A437923_1_En_17_Chapter.html#Fig7).\
    \ (You may need to adjust the volume of your computer to hear the sound played\
    \ when you click on a button.)\n\n![A437923_1_En_17_Fig7_HTML.jpg](A437923_1_En_17_Fig7_HTML.jpg)\n\
    \nFigure 17-7.\n\nThe Sound property lets you choose a sound to play.\n\nTo learn\
    \ how to add images and a sound to a button, make sure your ButtonProgram project\
    \ is loaded in Xcode and then follow these steps:\n\n1.  Click in the `Main.storyboard`\
    \ file in the Project Navigator pane.  \n2.  Click the push button on your user\
    \ interface to select it.  \n3.  Choose View ➤ Utilities ➤ Show Attributes Inspector.\
    \ The Show Attributes Inspector pane appears in the upper right corner of the\
    \ Xcode window.  \n4.  Click in the Image pop-up menu and choose NSCaution.  \n\
    5.  Click in the Alternate pop-up menu and choose NSComputer (see Figure [17-5](#A437923_1_En_17_Chapter.html#Fig5)).\
    \  \n6.  Click in the Position property to choose the icon (third from the left)\
    \ that displays the image on the left and the text on the right (see Figure [17-6](#A437923_1_En_17_Chapter.html#Fig6)).\
    \  \n7.  Click in the Sound pop-up menu and choose a sound such as Frog.  \n8.\
    \  Choose Product ➤ Run. Your program appears. Notice that the caution icon appears\
    \ on the button.  \n9.  Click in the text field and type Hello there!  \n10. \
    \ Click the button. The text on the button displays the alternate text and plays\
    \ your chosen sound. Each time you click the button, it alternates between showing\
    \ the Title and Image properties and the Alternate (Text and Image) properties\
    \ .  \n11.  Choose ButtonProgram ➤ Quit ButtonProgram.\n\n## Connecting Multiple\
    \ User Interface Items to IBAction Methods\n\nTypically, you link one IBAction\
    \ method to one user interface item such as a button. However, it's possible to\
    \ connect multiple items to a single IBAction method. When doing this, the IBAction\
    \ method needs to know what user interface item called the IBAction method to\
    \ run.\n\nTo identify a particular user interface item, you need to change the\
    \ Tag property of each item linked to the same IBAction method. The Tag property\
    \ can hold an integer value so you can use distinct Tag values to identify different\
    \ user interface items .\n\nOnce you've given each user interface item a distinct\
    \ Tag value, you can create an IBAction method normally using the Control-drag\
    \ method from one user interface item into your Swift file. Then you use the same\
    \ Control-drag method to connect the remaining user interface items to that existing\
    \ IBAction method.\n\nThere's no limit to the number of items you can link to\
    \ the same IBAction method just as long as you use the Tag property to identify\
    \ which user interface item called the IBAction method.\n\nTo see how to connect\
    \ multiple items to a single IBAction method, follow these steps:\n\n1.  From\
    \ within Xcode choose File ➤ New ➤ Project.  \n2.  Click Application under the\
    \ macOS category.  \n3.  Click Cocoa Application and click the Next button. Xcode\
    \ now asks for a product name.  \n4.  Click in the Product Name text field and\
    \ type MultipleButtons.  \n5.  Make sure the Language pop-up menu displays Swift\
    \ and that the “Use Storyboards” check box is selected.  \n6.  Click the Next\
    \ button. Xcode asks where you want to store the project.  \n7.  Choose a folder\
    \ to store your project and click the Create button.  \n8.  Click the `Main.storyboard`\
    \ file in the Project Navigator pane.  \n9.  Drag a push button, recessed button,\
    \ inline button, and label onto the user interface and resize with width of the\
    \ label , as shown in Figure [17-8](#A437923_1_En_17_Chapter.html#Fig8).\n\n![A437923_1_En_17_Fig8_HTML.jpg](A437923_1_En_17_Fig8_HTML.jpg)\n\
    \nFigure 17-8.\n\nThe user interface of the MultipleButtons program\n\nAt this\
    \ point, you have three different types of buttons on the window and a label.\
    \ You'll create a single IBAction method that all three buttons can run. When\
    \ you click on a button, the label will display the button title to show you which\
    \ button you just clicked.\n\nFirst, you need to modify the Tag property of each\
    \ button. The top button will have a Tag value of 0, the middle button will have\
    \ a Tag value of 1, and the lowest button will have a Tag value of 2.\n\nThen,\
    \ you create an IBAction method that identifies the Tag property and displays\
    \ the button's title in the label. To do this, follow these steps:\n\n1.  Click\
    \ the `Main.storyboard` file in the Project Navigator pane.  \n2.  Choose View\
    \ ➤ Assistant Editor ➤ Show Assistant Editor. Xcode displays the `ViewController.swift`\
    \ file next to the user interface.  \n3.  Move the mouse pointer over the Label,\
    \ hold down the Control key, and drag the mouse under the IBOutlet line in the\
    \ `AppDelegate.swift` file.  \n4.  Release the Control key and the mouse button.\
    \ A pop-up window appears.  \n5.  Click in the Name text filed, type displayLabel,\
    \ and click the Connect button. You should have an IBOutlet as follows:\n\n```\n\
    \    @IBOutlet weak var displayLabel: NSTextField!\n    ```"
  trans: "\n# 为按钮添加图像和声音\n\n按钮通常显示文本，列出按钮所代表的命令，例如“确定”或“取消”。不过，你也可以在按钮上显示图像。这对于创建工具栏图标非常有用，可以显示描述性图标来表示命令（例如，显示打印机来表示“打印”命令）。图像可以单独显示在按钮上，也可以与描述性文本一起显示。\n\
    \n除了显示图像，按钮还可以播放声音，为用户提供音频反馈。虽然大多数人使用鼠标（或触控板）点击按钮，但有些人更喜欢使用按键快捷键，因此你还可以将按键快捷键分配给连接到特定按钮的`IBAction`方法。\n\
    \n要添加图像到按钮，只需在属性检查器中修改“图像”属性和“图像”属性正下方的“备用”属性，如图 17-5 所示。\n\n![A437923_1_En_17_Fig5_HTML.jpg](img/A437923_1_En_17_Fig5_HTML.jpg)\n\
    \n**图 17-5**  \n“图像”和“备用”弹出菜单允许你从预定义图像列表中进行选择。\n\n你还可以使用`NSButton`的`Image`和`alternateImage`属性来定义按钮上显示的图像。定义按钮上显示的图像时，你还可以选择该图像相对于按钮上任何文本的位置。\n\
    \n“位置”属性定义了图像与文本的显示方式，其中文本用水平线表示，图像用正方形表示，如图 17-6 所示。\n\n![A437923_1_En_17_Fig6_HTML.jpg](img/A437923_1_En_17_Fig6_HTML.jpg)\n\
    \n**图 17-6**  \n“位置”属性允许你对齐按钮上的文本和图像。\n\n从左到右的七种不同位置分别是：\n\n*   仅文本\n*   仅图像\n\
    *   图像在左，文本在右\n*   文本在左，图像在右\n*   文本覆盖在图像中间\n*   文本在图像下方\n*   文本在图像上方\n\n要定义用户点击按钮时播放的声音，可以修改“声音”属性，如图\
    \ 17-7 所示。（你可能需要调整电脑音量才能听到点击按钮时播放的声音。）\n\n![A437923_1_En_17_Fig7_HTML.jpg](img/A437923_1_En_17_Fig7_HTML.jpg)\n\
    \n**图 17-7**  \n“声音”属性允许你选择要播放的声音。\n\n要了解如何向按钮添加图像和声音，请确保你的`ButtonProgram`项目已在\
    \ Xcode 中加载，然后按照以下步骤操作：\n\n1.  在项目导航器中点击`Main.storyboard`文件。\n2.  点击用户界面上的按钮以选中它。\n\
    3.  选择“视图”>“工具”>“显示属性检查器”。“显示属性检查器”窗格会出现在 Xcode 窗口的右上角。\n4.  点击“图像”弹出菜单，选择`NSCaution`。\n\
    5.  点击“备用”弹出菜单，选择`NSComputer`（参见图 17-5）。\n6.  点击“位置”属性，选择第三个（从左起）图标，该图标将图像显示在左侧，文本显示在右侧（参见图\
    \ 17-6）。\n7.  点击“声音”弹出菜单，选择一种声音，例如`Frog`。\n8.  选择“产品”>“运行”。你的程序会启动。注意，按钮上会出现警告图标。\n\
    9.  点击文本字段，输入`Hello there!`。\n10. 点击该按钮。按钮上的文本会显示备用文本，并播放你选择的声音。每次点击按钮时，它都会在“标题”和“图像”属性与“备用”（文本和图像）属性之间交替显示。\n\
    11. 选择`ButtonProgram`>“退出 ButtonProgram”。\n\n# 将多个用户界面项连接到 IBAction 方法\n\n通常，你会将一个`IBAction`方法链接到一个用户界面项（例如按钮）。但是，也可以将多个项连接到同一个`IBAction`方法。当这样做时，`IBAction`方法需要知道是哪个用户界面项调用了它。\n\
    \n要标识特定的用户界面项，你需要更改链接到同一个`IBAction`方法的每个项的“标签”属性。“标签”属性可以保存一个整数值，因此你可以使用不同的`Tag`值来标识不同的用户界面项。\n\
    \n一旦为每个用户界面项分配了不同的`Tag`值，你就可以正常创建一个`IBAction`方法，方法是从一个用户界面项按住 Control 键拖拽到你的 Swift\
    \ 文件中。然后，使用相同的 Control 键拖拽方法将其余的用户界面项连接到那个已有的`IBAction`方法。\n\n只要使用`Tag`属性来标识是哪个用户界面项调用了`IBAction`方法，可以链接到同一个`IBAction`方法的项数量就没有限制。\n\
    \n要了解如何将多个项连接到单个`IBAction`方法，请按照以下步骤操作：\n\n1.  在 Xcode 中，选择“文件”>“新建”>“项目”。\n2.\
    \  在 macOS 类别下点击“应用程序”。\n3.  点击“Cocoa 应用”，然后点击“下一步”按钮。Xcode 现在要求输入产品名称。\n4.  在“产品名称”文本字段中点击并输入`MultipleButtons`。\n\
    5.  确保“语言”弹出菜单显示为`Swift`，并且“使用故事板”复选框已选中。\n6.  点击“下一步”按钮。Xcode 会询问你要将项目存储在何处。\n\
    7.  选择一个文件夹来存储项目，然后点击“创建”按钮。\n8.  在项目导航器中点击`Main.storyboard`文件。\n9.  将一个“按钮”、“凹进按钮”、“内联按钮”和“标签”拖拽到用户界面上，并调整标签的宽度，如图\
    \ 17-8 所示。\n\n![A437923_1_En_17_Fig8_HTML.jpg](img/A437923_1_En_17_Fig8_HTML.jpg)\n\
    \n**图 17-8**  \n`MultipleButtons`程序的用户界面\n\n此时，窗口上有三种不同类型的按钮和一个标签。你将创建一个所有三个按钮都可以运行的`IBAction`方法。当你点击一个按钮时，标签将显示该按钮的标题，以显示你刚刚点击了哪个按钮。\n\
    \n首先，你需要修改每个按钮的“标签”属性。顶部按钮的`Tag`值为 0，中间按钮的`Tag`值为 1，最下面的按钮的`Tag`值为 2。\n\n然后，创建一个`IBAction`方法，该方法识别`Tag`属性并在标签中显示按钮的标题。为此，请遵循以下步骤：\n\
    \n1.  在项目导航器中点击`Main.storyboard`文件。\n2.  选择“视图”>“辅助编辑器”>“显示辅助编辑器”。Xcode 会在用户界面旁边显示`ViewController.swift`文件。\n\
    3.  将鼠标指针移到标签上，按住 Control 键，然后拖拽到`AppDelegate.swift`文件中`IBOutlet`行下方。\n4.  松开\
    \ Control 键和鼠标按钮。会弹出一个窗口。\n5.  在“名称”文本字段中点击，输入`displayLabel`，然后点击“连接”按钮。你应该得到一个类似于以下的`IBOutlet`：\n\
    \n```\n    @IBOutlet weak var displayLabel: NSTextField!\n```\n"
- fmt: "6.  将鼠标指针移到按钮上，按住 `Control` 键，将鼠标拖到 `AppDelegate.swift` 文件底部最后一个花括号上方。\n7.\
    \  松开 `Control` 键和鼠标按钮。系统会弹出一个窗口。\n8.  点击“Connection”弹出菜单，选择“Action”。\n9.  点击“Name”文本框，输入`displayButton`。\n\
    10.  确保“Type”弹出菜单显示为`NSButton`，这样其他按钮也能连接到这个`IBAction`方法。\n11.  点击“Connect”按钮。Xcode\
    \ 会显示一个空的`IBAction`方法。\n12.  将鼠标指针移到“Recessed Button”上，按住 `Control` 键，将鼠标拖到`IBAction`方法中的`func`关键字上，直到\
    \ Xcode 高亮显示整个方法，如图 [17-9](#A437923_1_En_17_Chapter.html#Fig9) 所示。\n\n![A437923_1_En_17_Fig9_HTML.jpg](A437923_1_En_17_Fig9_HTML.jpg)\n\
    \n图 17-9. 将现有`IBAction`方法连接到另一个用户界面元素\n\n13.  松开 `Control` 键和鼠标按钮。Xcode 会将`IBAction`方法连接到凹陷按钮。\n\
    14.  将鼠标指针移到内联按钮上，按住 `Control` 键，将鼠标拖到`IBAction`方法中的`func`关键字上，直到 Xcode 高亮显示整个`IBAction`方法。\n\
    15.  松开 `Control` 键和鼠标按钮。Xcode 会将内联按钮连接到`IBAction`方法。\n16.  点击凹陷按钮以选中它，然后选择“View\
    \ ➤ Utilities ➤ Show Attributes Inspector”。“属性检查器”面板会出现在 Xcode 窗口的右上角。\n17.  向下滚动到“View”类别（最初可能隐藏不可见），点击“Tag”文本框并输入`1`。（按钮的默认`Tag`值为`0`，凹陷按钮的`Tag`值为`1`，内联按钮的`Tag`值为`2`。）\n\
    18.  点击内联按钮以选中它。\n19.  向下滚动到“View”类别，点击“Tag”文本框并输入`2`。\n20.  按如下方式修改`IBAction`方法：\n\
    \n```\n    @IBAction func displayButton(_ sender: NSButton) {\n    switch sender.tag\
    \ {\n    case 0:\n    displayLabel.stringValue = \"Clicked Push Button\"\n   \
    \ case 1:\n    displayLabel.stringValue = \"Clicked Recessed Button\"\n    case\
    \ 2:\n    displayLabel.stringValue = \"Clicked Inline Button\"\n    default:\n\
    \    displayLabel.stringValue = \"Unknown\"\n    }\n    }\n```\n\n`sender: NSButton`表示`IBAction`方法可以连接到任何属于`NSButton`类型的用户界面元素。首先，你通过`switch`语句使用`sender`（`NSButton`）的`Tag`属性来判断用户点击了哪个按钮。然后，根据用户点击的按钮，在标签中显示相应的消息。\n\
    \n21.  选择“Product ➤ Run”。你的程序用户界面会显示出来。\n22.  点击三个不同的按钮，观察标签中是否显示正确的消息。\n23. \
    \ 选择“MultipleButtons ➤ Quit MultipleButtons”。\n\n## 使用弹出按钮\n\n按钮可以方便地在屏幕上显示命令，但如果你需要提供多个选项，那么让每个按钮代表一个命令会显得繁琐且拥挤。一种解决方案是将多个选项浓缩到一个弹出按钮中。弹出按钮占用的空间更少，并且可以为用户提供大量选项。\n\
    \n当用户在弹出按钮中选择一个选项时，该选中项会存储在弹出按钮的`titleOfSelectedItem`属性中。\n\n要了解弹出按钮的工作原理，请按照以下步骤操作：\n\
    \n1.  在 Xcode 中选择“File ➤ New ➤ Project”。\n2.  在“macOS”类别下点击“Application”。\n3.\
    \  点击“Cocoa Application”，然后点击“Next”按钮。Xcode 会要求输入产品名称。\n4.  点击“Product Name”文本框，输入`PopupProgram`。\n\
    5.  确保“Language”弹出菜单显示为“Swift”，并且“Use Storyboards”复选框已被选中。\n6.  点击“Next”按钮。Xcode\
    \ 会询问项目存储位置。\n7.  选择一个文件夹来存储项目，然后点击“Create”按钮。\n8.  在项目导航器中点击`Main.storyboard`文件。你的程序用户界面会显示出来。\n\
    9.  选择“View ➤ Utilities ➤ Show Object Library”。对象库会出现在 Xcode 窗口的右下角。\n10.  将一个弹出按钮和一个标签拖到用户界面窗口上，并调整标签的宽度，使其看起来像图\
    \ [17-10](#A437923_1_En_17_Chapter.html#Fig10)。\n\n    ![A437923_1_En_17_Fig10_HTML.jpg](A437923_1_En_17_Fig10_HTML.jpg)\n\
    \n    图 17-10. PopupProgram 的用户界面\n\n11.  选择“View ➤ Assistant Editor ➤ Show Assistant\
    \ Editor”。Xcode 会将`ViewController.swift`文件显示在你的用户界面旁边。\n12.  将鼠标指针移到标签上，按住 `Control`\
    \ 键，将其拖到`ViewController.swift`文件中`IBOutlet`行的下方。\n13.  松开 `Control` 键和鼠标。系统会弹出一个窗口。\n\
    14.  点击“Name”文本框，输入`labelChoice`，然后点击“Connect”按钮。Xcode 会创建一个`IBOutlet`，如下所示：\n\
    \n```\n    @IBOutlet weak var labelChoice: NSTextField!\n```\n\n15.  将鼠标指针移到弹出按钮上，按住\
    \ `Control` 键，将其拖到`AppDelegate.swift`文件底部最后一个花括号的上方。\n16.  松开 `Control` 键和鼠标。系统会弹出一个窗口。\n\
    17.  点击“Connection”弹出菜单，选择“Action”。\n18.  点击“Name”文本框，输入`showChoice`。\n19.  点击“Type”弹出菜单，选择`NSPopUpButton`。然后点击“Connect”按钮。Xcode\
    \ 会显示一个空的`IBAction`方法。\n20.  按如下方式修改`IBAction`方法：\n\n```\n    @IBAction func showChoice(_\
    \ sender: NSPopUpButton) {\n    labelChoice.stringValue =\n    sender.titleOfSelectedItem!\n\
    \    }\n```\n\n21.  选择“Product ➤ Run”。你的用户界面窗口会显示出来。\n22.  点击弹出按钮。请注意，默认情况下，弹出按钮包含三个通用项，分别标记为`Item\
    \ 1`、`Item 2`和`Item 3`。\n23.  点击一个选项。你选择的选项会出现在标签中。\n24.  选择“PopupProgram ➤ Quit\
    \ PopupProgram”。"
  raw: "6.  Move the mouse pointer over the push button, hold down the Control key,\
    \ and drag the mouse above the last curly bracket at the bottom of the `AppDelegate.swift`\
    \ file.  \n7.  Release the Control key and the mouse button. A pop-up window appears.\
    \  \n8.  Click in the Connection pop-up menu and choose Action.  \n9.  Click in\
    \ the Name text field and type displayButton.  \n10.  Make sure the Type pop-up\
    \ menu displays NSButton so that way other buttons can connect to this IBAction\
    \ method.  \n11.  Click the Connect button. Xcode displays an empty IBAction method\
    \ .  \n12.  Move the mouse pointer over the Recessed Button, hold down the Control\
    \ key, and drag the mouse over the `func` keyword in the IBAction method until\
    \ Xcode highlights the entire method, as shown in Figure [17-9](#A437923_1_En_17_Chapter.html#Fig9).\n\
    \n![A437923_1_En_17_Fig9_HTML.jpg](A437923_1_En_17_Fig9_HTML.jpg)\n\nFigure 17-9.\n\
    \nConnecting to an existing IBAction method to another user interface item  \n\
    13.  Release the Control key and the mouse button. Xcode connects the IBAction\
    \ method to the recessed button.  \n14.  Move the mouse pointer over the inline\
    \ button, hold down the Control key, and drag the mouse over the `func` keyword\
    \ in the IBAction method until Xcode highlights the entire IBAction method.  \n\
    15.  Release the Control key and the mouse button. Xcode connects the inline button\
    \ to the IBAction method.  \n16.  Click the recessed button to select it and choose\
    \ View ➤ Utilities ➤ Show Attributes Inspector. The Show Attributes Inspector\
    \ pane appears in the upper right corner of the Xcode window .  \n17.  Scroll\
    \ down to the View category (it may initially be hidden out of sight), click in\
    \ the Tag text field and type 1\\. (The push button has the default Tag value\
    \ of 0, the recessed button will have a Tag value of 1, and the inline button\
    \ will have a Tag value of 2.)  \n18.  Click the inline button to select it.  \n\
    19.  Scroll down to the View category, click in the Tag text field and type 2.\
    \  \n20.  Modify the IBAction method as follows:\n\n```\n    @IBAction func displayButton(_\
    \ sender: NSButton) {\n    switch sender.tag {\n    case 0:\n    displayLabel.stringValue\
    \ = \"Clicked Push Button\"\n    case 1:\n    displayLabel.stringValue = \"Clicked\
    \ Recessed Button\"\n    case 2:\n    displayLabel.stringValue = \"Clicked Inline\
    \ Button\"\n    default:\n    displayLabel.stringValue = \"Unknown\"\n    }\n\
    \    }\n    ```\n\nThe `sender: NSButton` means that the IBAction method can connect\
    \ to any type of user interface item that’s an `NSButton` type. First, you'll\
    \ use the `T`ag property of the sender (`NSButton`) to determine which button\
    \ the user clicked using a switch statement. Second, you'll display the proper\
    \ message in the label depending on which button the user clicked.  \n21.  Choose\
    \ Product ➤ Run. Your program's user interface appears.  \n22.  Click the three\
    \ different buttons to see the proper message appear in the label.  \n23.  Choose\
    \ MultipleButtons ➤ Quit MultipleButtons.\n\n## Working with Pop-up Buttons\n\n\
    Buttons can be handy for displaying commands on the screen, but if you need to\
    \ offer several options, then having each button represent one command can get\
    \ cumbersome and crowded. One option is to condense multiple options into a single\
    \ pop-up button. A pop-up button takes less space and can provide a large number\
    \ of options for the user to select.\n\nWhen the user chooses an option in the\
    \ pop-up button, that selected choice gets stored in the pop-up button’s `titleOfSelectedItem`\
    \ property.\n\nTo see how pop-up buttons work, follow these steps:\n\n1.  From\
    \ within Xcode choose File ➤ New ➤ Project.  \n2.  Click Application under the\
    \ macOS category.  \n3.  Click Cocoa Application and click the Next button. Xcode\
    \ now asks for a product name.  \n4.  Click in the Product Name text field and\
    \ type PopupProgram.  \n5.  Make sure the Language pop-up menu displays Swift\
    \ and that the “Use Storyboards” check box is selected.  \n6.  Click the Next\
    \ button. Xcode asks where you want to store the project.  \n7.  Choose a folder\
    \ to store your project and click the Create button.  \n8.  Click the `Main.storyboard`\
    \ file in the Project Navigator. Your program's user interface appears.  \n9.\
    \  Choose View ➤ Utilities ➤ Show Object Library. The Object Library appears in\
    \ the bottom right corner of the Xcode window.  \n10.  Drag a pop-up button and\
    \ a label on to the user interface window and resize the width of the label so\
    \ it looks like Figure [17-10](#A437923_1_En_17_Chapter.html#Fig10).\n\n    ![A437923_1_En_17_Fig10_HTML.jpg](A437923_1_En_17_Fig10_HTML.jpg)\n\
    \n    Figure 17-10.\n\n    The user interface of the PopupProgram  \n11.  Choose\
    \ View ➤ Assistant Editor ➤ Show Assistant Editor. Xcode displays the `ViewController.swift`\
    \ file next to your user interface .  \n12.  Move the mouse pointer over the label,\
    \ hold down the Control key, and drag underneath the IBOutlet line in the `ViewController.swift`\
    \ file.  \n13.  Release the Control key and the mouse. A pop-up window appears.\
    \  \n14.  Click in the Name text field, type labelChoice, and click the Connect\
    \ button. Xcode creates an IBOutlet as follows:\n\n    ```\n    @IBOutlet weak\
    \ var labelChoice: NSTextField!\n    ```\n\n15.  Move the mouse pointer over the\
    \ pop-up button, hold down the Control key, and drag the mouse above the last\
    \ curly bracket in the bottom of the `AppDelegate.swift` file.  \n16.  Release\
    \ the Control key and the mouse. A pop-up window appears.  \n17.  Click in the\
    \ Connection pop-up menu and choose Action.  \n18.  Click in the Name text field\
    \ and type showChoice.  \n19.  Click in the Type pop-up menu and choose NSPopUpButton.\
    \ Then click the Connect button. Xcode displays an empty IBAction method.  \n\
    20.  Modify the IBAction method as follows:\n\n    ```\n    @IBAction func showChoice(_\
    \ sender: NSPopUpButton) {\n    labelChoice.stringValue =\n    sender.titleOfSelectedItem!\n\
    \    }\n    ```\n\n21.  Choose Product ➤ Run. Your user interface window appears.\
    \  \n22.  Click the pop-up button. Notice that by default, a pop-up button contains\
    \ three generic items labeled Item 1, Item 2, and Item 3.  \n23.  Click an option.\
    \ Notice that your chosen option appears in the label.  \n24.  Choose PopupProgram\
    \ ➤ Quit PopupProgram."
  trans: "\n6.  将鼠标指针移到按钮上，按住 `Control` 键，将鼠标拖到 `AppDelegate.swift` 文件底部最后一个花括号上方。\n\
    7.  松开 `Control` 键和鼠标按钮。系统会弹出一个窗口。\n8.  点击“Connection”弹出菜单，选择“Action”。\n9.  点击“Name”文本框，输入`displayButton`。\n\
    10.  确保“Type”弹出菜单显示为`NSButton`，这样其他按钮也能连接到这个`IBAction`方法。\n11.  点击“Connect”按钮。Xcode\
    \ 会显示一个空的`IBAction`方法。\n12.  将鼠标指针移到“Recessed Button”上，按住 `Control` 键，将鼠标拖到`IBAction`方法中的`func`关键字上，直到\
    \ Xcode 高亮显示整个方法，如图 17-9 所示。\n\n![A437923_1_En_17_Fig9_HTML.jpg](img/A437923_1_En_17_Fig9_HTML.jpg)\n\
    \n图 17-9. 将现有`IBAction`方法连接到另一个用户界面元素\n\n13.  松开 `Control` 键和鼠标按钮。Xcode 会将`IBAction`方法连接到凹陷按钮。\n\
    14.  将鼠标指针移到内联按钮上，按住 `Control` 键，将鼠标拖到`IBAction`方法中的`func`关键字上，直到 Xcode 高亮显示整个`IBAction`方法。\n\
    15.  松开 `Control` 键和鼠标按钮。Xcode 会将内联按钮连接到`IBAction`方法。\n16.  点击凹陷按钮以选中它，然后选择“View\
    \ ➤ Utilities ➤ Show Attributes Inspector”。“属性检查器”面板会出现在 Xcode 窗口的右上角。\n17.  向下滚动到“View”类别（最初可能隐藏不可见），点击“Tag”文本框并输入`1`。（按钮的默认`Tag`值为`0`，凹陷按钮的`Tag`值为`1`，内联按钮的`Tag`值为`2`。）\n\
    18.  点击内联按钮以选中它。\n19.  向下滚动到“View”类别，点击“Tag”文本框并输入`2`。\n20.  按如下方式修改`IBAction`方法：\n\
    \n```\n    @IBAction func displayButton(_ sender: NSButton) {\n    switch sender.tag\
    \ {\n    case 0:\n    displayLabel.stringValue = \"Clicked Push Button\"\n   \
    \ case 1:\n    displayLabel.stringValue = \"Clicked Recessed Button\"\n    case\
    \ 2:\n    displayLabel.stringValue = \"Clicked Inline Button\"\n    default:\n\
    \    displayLabel.stringValue = \"Unknown\"\n    }\n    }\n```\n\n`sender: NSButton`表示`IBAction`方法可以连接到任何属于`NSButton`类型的用户界面元素。首先，你通过`switch`语句使用`sender`（`NSButton`）的`Tag`属性来判断用户点击了哪个按钮。然后，根据用户点击的按钮，在标签中显示相应的消息。\n\
    \n21.  选择“Product ➤ Run”。你的程序用户界面会显示出来。\n22.  点击三个不同的按钮，观察标签中是否显示正确的消息。\n23. \
    \ 选择“MultipleButtons ➤ Quit MultipleButtons”。\n\n## 使用弹出按钮\n\n按钮可以方便地在屏幕上显示命令，但如果你需要提供多个选项，那么让每个按钮代表一个命令会显得繁琐且拥挤。一种解决方案是将多个选项浓缩到一个弹出按钮中。弹出按钮占用的空间更少，并且可以为用户提供大量选项。\n\
    \n当用户在弹出按钮中选择一个选项时，该选中项会存储在弹出按钮的`titleOfSelectedItem`属性中。\n\n要了解弹出按钮的工作原理，请按照以下步骤操作：\n\
    \n1.  在 Xcode 中选择“File ➤ New ➤ Project”。\n2.  在“macOS”类别下点击“Application”。\n3.\
    \  点击“Cocoa Application”，然后点击“Next”按钮。Xcode 会要求输入产品名称。\n4.  点击“Product Name”文本框，输入`PopupProgram`。\n\
    5.  确保“Language”弹出菜单显示为“Swift”，并且“Use Storyboards”复选框已被选中。\n6.  点击“Next”按钮。Xcode\
    \ 会询问项目存储位置。\n7.  选择一个文件夹来存储项目，然后点击“Create”按钮。\n8.  在项目导航器中点击`Main.storyboard`文件。你的程序用户界面会显示出来。\n\
    9.  选择“View ➤ Utilities ➤ Show Object Library”。对象库会出现在 Xcode 窗口的右下角。\n10.  将一个弹出按钮和一个标签拖到用户界面窗口上，并调整标签的宽度，使其看起来像图\
    \ 17-10。\n\n    ![A437923_1_En_17_Fig10_HTML.jpg](img/A437923_1_En_17_Fig10_HTML.jpg)\n\
    \n    图 17-10. PopupProgram 的用户界面\n\n11.  选择“View ➤ Assistant Editor ➤ Show Assistant\
    \ Editor”。Xcode 会将`ViewController.swift`文件显示在你的用户界面旁边。\n12.  将鼠标指针移到标签上，按住 `Control`\
    \ 键，将其拖到`ViewController.swift`文件中`IBOutlet`行的下方。\n13.  松开 `Control` 键和鼠标。系统会弹出一个窗口。\n\
    14.  点击“Name”文本框，输入`labelChoice`，然后点击“Connect”按钮。Xcode 会创建一个`IBOutlet`，如下所示：\n\
    \n```\n    @IBOutlet weak var labelChoice: NSTextField!\n```\n\n15.  将鼠标指针移到弹出按钮上，按住\
    \ `Control` 键，将其拖到`AppDelegate.swift`文件底部最后一个花括号的上方。\n16.  松开 `Control` 键和鼠标。系统会弹出一个窗口。\n\
    17.  点击“Connection”弹出菜单，选择“Action”。\n18.  点击“Name”文本框，输入`showChoice`。\n19.  点击“Type”弹出菜单，选择`NSPopUpButton`。然后点击“Connect”按钮。Xcode\
    \ 会显示一个空的`IBAction`方法。\n20.  按如下方式修改`IBAction`方法：\n\n```\n    @IBAction func showChoice(_\
    \ sender: NSPopUpButton) {\n    labelChoice.stringValue =\n    sender.titleOfSelectedItem!\n\
    \    }\n```\n\n21.  选择“Product ➤ Run”。你的用户界面窗口会显示出来。\n22.  点击弹出按钮。请注意，默认情况下，弹出按钮包含三个通用项，分别标记为`Item\
    \ 1`、`Item 2`和`Item 3`。\n23.  点击一个选项。你选择的选项会出现在标签中。\n24.  选择“PopupProgram ➤ Quit\
    \ PopupProgram”。\n"
- fmt: "### Modifying Popup Menu Items Visually\n\nA pop-up button contains a default\
    \ list of three items. However, you can add, edit, or delete items from that list\
    \ at any time. To edit a pop-up menu list, follow these steps:\n\n1.  Double-click\
    \ the pop-up button on the user interface. The current list of menu items appears,\
    \ as shown in Figure [17-11](#A437923_1_En_17_Chapter.html#Fig11).\n\n    ![A437923_1_En_17_Fig11_HTML.jpg](A437923_1_En_17_Fig11_HTML.jpg)\n\
    \n    Figure 17-11. Double-clicking a pop-up button displays its list of menu\
    \ items\n\n2.  Double-click the menu item you want to edit. Xcode highlights the\
    \ text of your chosen menu item, as shown in Figure [17-12](#A437923_1_En_17_Chapter.html#Fig12).\n\
    \n    ![A437923_1_En_17_Fig12_HTML.jpg](A437923_1_En_17_Fig12_HTML.jpg)\n\n  \
    \  Figure 17-12. Double-clicking a menu item lets you edit the text. Note: You\
    \ can also choose View ➤ Utilities ➤ Show Attributes Inspector and edit the text\
    \ of a menu item by editing the `Title` property of the selected menu item.\n\n\
    3.  Use the arrow keys, `Backspace`, or `Delete` key to edit the text and type\
    \ any new text.\n\n4.  Press `Return`. Xcode saves your edited text for the menu\
    \ item.\n\nTo delete a menu item from a pop-up button, follow these steps:\n\n\
    1.  Double-click the pop-up button on the user interface. The current list of\
    \ menu items appears (see Figure [17-11](#A437923_1_En_17_Chapter.html#Fig11)).\n\
    2.  Click the menu item that you want to delete. Xcode highlights your chosen\
    \ menu item.\n3.  Press the `Backspace` or `Delete` key. Your chosen menu item\
    \ disappears.\n\nNote: If you delete a menu item by mistake, just press `Command\
    \ + Z` or choose Edit ➤ Undo to reverse the delete command.\n\nTo add a menu item\
    \ to a pop-up button, follow these steps:\n\n1.  Double-click the pop-up button\
    \ on the user interface. The current list of menu items appears (see Figure [17-11](#A437923_1_En_17_Chapter.html#Fig11)).\n\
    2.  Choose View ➤ Utilities ➤ Show Object Library. The Object Library appears\
    \ in the bottom right corner of the Xcode window.\n3.  Type `menu item` and press\
    \ `Return` in the search field at the bottom of the Object Library. The Object\
    \ Library displays a list of menu items, as shown in Figure [17-13](#A437923_1_En_17_Chapter.html#Fig13).\n\
    \n    ![A437923_1_En_17_Fig13_HTML.jpg](A437923_1_En_17_Fig13_HTML.jpg)\n\n  \
    \  Figure 17-13. The list of menu items in the Object Library\n\n4.  Drag the\
    \ menu item from the Object Library over the list of menu items stored in the\
    \ pop-up button on the user interface. A horizontal blue line shows where the\
    \ new menu item will appear in the pop-up button’s list.\n5.  Release the mouse\
    \ button. Xcode adds a menu item to the pop-up button list.\n\n### Adding Pop-up\
    \ Menu Items with Swift Code\n\nAs an alternative to modifying menu items in a\
    \ pop-up button visually, you can also use Swift code to add, delete, or change\
    \ a menu item. Pop-up button menu items are based on the `NSMenuItem` class, but\
    \ you can find the methods you need to manipulate a list of pop-up button menu\
    \ items in the `NSMenu` class.\n\nIf you want to add just one new menu item to\
    \ a pop-up button, you can use the `addItemWithTitle` method and specify a string,\
    \ such as\n\n```\nmyPopUp.addItem(withTitle: \"New Item\")\n```\n\nYou can also\
    \ add a list of new menu items by storing them in an array and using the `addItemsWithTitles`\
    \ method, such as\n\n```\nmyPopUp.addItems(withTitles: [\"Cat\", \"Dog\", \"Bird\"\
    , \"Fish\", \"Reptile\"])\n```\n\nYou can remove individual menu items using the\
    \ `removeItem` method that needs an `Int` value to define which item to remove.\
    \ The first item in a pop-up button list is at index 0, the second at index 1,\
    \ and so on. To remove the first item from a pop-up button list, you use an index\
    \ value of 0 like this:\n\n```\nmyPopUp.removeItem(at: 0)\n```\n\nTo remove all\
    \ items in a pop-up button's menu list, just use the `removeAllItems()` method,\
    \ which clears out the entire list no matter how many (or how few) items are currently\
    \ stored in that list.\n\nTo see how to use Swift code to add and delete items\
    \ from a pop-up button menu list, follow these steps:\n\n1.  From within Xcode,\
    \ choose File ➤ New ➤ Project.\n2.  Click Application under the macOS category.\n\
    3.  Click Cocoa Application and click the Next button. Xcode now asks for a product\
    \ name.\n4.  Click in the Product Name text field and type `EditPopProgram`.\n\
    5.  Make sure the Language pop-up menu displays Swift and that the “Use Storyboards”\
    \ check box is selected.\n6.  Click the Next button. Xcode asks where you want\
    \ to store the project.\n7.  Choose a folder to store your project and click the\
    \ Create button.\n8.  Click the `Main.storyboard` file in the Project Navigator.\
    \ Your program's user interface appears.\n9.  Choose View ➤ Utilities ➤ Show Object\
    \ Library. The Object Library appears in the bottom right corner of the Xcode\
    \ window.\n10.  Drag a pop-up button, three push buttons, and a text field on\
    \ to the user interface window and edit the titles on both push buttons so they\
    \ look like Figure [17-14](#A437923_1_En_17_Chapter.html#Fig14).\n\n![A437923_1_En_17_Fig14_HTML.jpg](A437923_1_En_17_Fig14_HTML.jpg)\n\
    \nFigure 17-14. The user interface of the EditPopProgram\n\n11.  Choose View ➤\
    \ Assistant Editor ➤ Show Assistant Editor. Xcode displays the `ViewController.swift`\
    \ file next to your user interface.\n12.  Move the mouse pointer over the pop-up\
    \ button, hold down the Control key, and drag the mouse underneath the `IBOutlet`\
    \ line near the top of the `ViewController.swift` file.\n13.  Release the Control\
    \ key and the mouse. A pop-up window appears.\n14.  Click in the Name text field\
    \ and type `myPopUp`. Then click the Connect button. Xcode creates an `IBOutlet`.\n\
    15.  Move the mouse pointer over the text field, hold down the Control key, and\
    \ drag the mouse underneath the `IBOutlet` line near the top of the `ViewController.swift`\
    \ file.\n16.  Release the Control key and the mouse. A pop-up window appears.\n\
    17.  Click in the Name text field and type `newItem`. Then click the Connect button.\
    \ Xcode creates another `IBOutlet` so you should have two `IBOutlet`s that look\
    \ like this:\n\n```\n@IBOutlet weak var myPopUp: NSPopUpButton!\n@IBOutlet weak\
    \ var newItem: NSTextField!\n```"
