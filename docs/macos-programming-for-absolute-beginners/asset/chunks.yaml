    values into the Size Inspector pane, or you can just drag the mouse to resize
    or move an item. Either way is acceptable but the Size Inspector pane gives you
    precise control over items. Let’s see how to use the Inspector pane to customize
    the generic user interface.


    1.  Click the push button near the bottom of the MyFirstProgram window to select
    it.  

    2.  Choose View ➤ Utilities ➤ Show Attributes Inspector. The Attributes Inspector
    pane appears in the upper right corner of the Xcode window, as shown in Figure
    [3-9](#A437923_1_En_3_Chapter.html#Fig9).


    ![A437923_1_En_3_Fig9_HTML.jpg](A437923_1_En_3_Fig9_HTML.jpg)


    Figure 3-9.


    The Attributes Inspector pane lets you customize the appearance of items  

    3.  Click in the Title text field that currently displays “Button.” Delete any
    existing text in the Title text field, type Change Case, and press Return. The
    text on the push button now displays “Change Case.” However, the button width
    is too narrow.  

    4.  Choose View ➤ Utilities ➤ Show Size Inspector. The Size Inspector pane appears
    in the upper right corner of the Xcode window.  

    5.  Click in the Width text field, change the value to 120 (as shown in Figure
    [3-10](#A437923_1_En_3_Chapter.html#Fig10)), and press Return. Xcode changes the
    width of the push button.


    ![A437923_1_En_3_Fig10_HTML.jpg](A437923_1_En_3_Fig10_HTML.jpg)


    Figure 3-10.


    The Width text field appears in the Size Inspector pane  

    6.  Click the label to select it. To modify the size of the label, you need to
    open the Size Inspector pane, which you can do by choosing View ➤ Utilities ➤
    Show Size Inspector, but there’s a faster method using either keystroke shortcuts
    or icons.  

    7.  Press Option + Command + 5 or just click the Size Inspector icon (it looks
    like a vertical ruler). The Size Inspector pane appears in the upper right corner
    of the Xcode window.  

    8.  Click in the Width text field, type 250, and press Return. Xcode widens the
    width of your label.  

    9.  Click the text field to select it.  

    10.  Press Option + Command + 5 or just click the Size Inspector icon (it looks
    like a vertical ruler). The Size Inspector pane appears in the upper right corner
    of the Xcode window.  

    11.  Click in the Width text field, type 250, and press Return. Xcode widens the
    width of your text field. At this point, all the user interface items appear off
    center.  

    12.  Drag each item until you see a blue guideline showing that you’ve centered
    it in the MyFirstProgram window, as shown in Figure [3-11](#A437923_1_En_3_Chapter.html#Fig11).


    ![A437923_1_En_3_Fig11_HTML.jpg](A437923_1_En_3_Fig11_HTML.jpg)


    Figure 3-11.


    Using blue guidelines to center items on the user interface


    At this point, you’ve customized the appearance of your user interface. If you
    run this program, the user interface will look good but it won’t actually do anything.
    To make a user interface work, you need to finish two more steps:


    *   Write the Swift code.

    *   Connect your user interface to your Swift code.


    You need to write the Swift code to make your program calculate some useful result.
    You need to connect your user interface to your Swift code so you can retrieve
    data from the user interface and display information back on the user interface.


    In this example, you’ll write Swift code that retrieves text from the text field,
    changes it to uppercase, then displays the uppercase text back on to the label
    when the user clicks the Change Case push button.


    So you need to write Swift code that converts text to uppercase. Then you need
    to connect the text field and the label so the Swift code can retrieve data from
    the text field and put new data on the label.


    To send or retrieve data from a user interface item so the Swift code can access
    it, you need to use something called an IBOutlet . An IBOutlet essentially represents
    a user interface item (such as a label or a text field) as a variable that Swift
    code can use.'
  trans: '

    # 设计用户界面


    在设计用户界面时，请牢记任何用户界面都具备的三个目的：


    - 向用户显示信息

    - 从用户处获取数据

    - 让用户向程序下达命令


    当你设计用户界面时，每个元素都必须满足这些标准之一。颜色和线条可能看起来只是装饰性的，但它们可以用来组织用户界面，使用户知道在哪里找到信息、如何输入数据，或如何向程序下达命令。


    要在 Xcode 中创建用户界面，你需要遵循一个两步流程：


    - 使用对象库将项目拖放到你的用户界面上。

    - 使用检查器面板自定义每个用户界面项目。


    为了了解如何使用对象库，让我们向 `MyFirstProgram` 用户界面添加一个标签、一个文本字段和一个按钮。标签将向用户显示文本，文本字段将允许用户输入数据，而按钮将使程序从文本字段中获取文本，将其修改为每个字符都大写，然后将修改后的大写文本放入标签中。


    为此，请按照以下步骤操作：


    1. 确保你的 `MyFirstProgram` 项目已加载到 Xcode 中。

    2. 选择“显示”➤“导航器”➤“显示项目导航器”，或按 Command + 1 查看组成 `MyFirstProgram` 项目的所有文件列表。

    3. 点击 `MainMenu.xib` 文件。Xcode 会显示用户界面。请注意，在点击 `MyFirstProgram` 图标之前，`MyFirstProgram`
    的实际窗口是不可见的。

    4. 点击出现在项目导航器与用户界面之间窗格中的窗口图标。这将显示 `MyFirstProgram` 用户界面的窗口，如图 3-5 所示。


    ![A437923_1_En_3_Fig5_HTML.jpg](img/A437923_1_En_3_Fig5_HTML.jpg)


    图 3-5. 窗口图标显示 `MyFirstProgram` 用户界面


    5. 选择“显示”➤“实用工具”➤“显示对象库”。对象库出现在 Xcode 窗口的右下角。

    6. 从对象库中拖出一个按钮，并将其拖放到 `MyFirstProgram` 窗口的底部附近。请注意，当你将按钮放在窗口中间且靠近底部时，会出现蓝色参考线以帮助你对齐用户界面项目，如图
    3-6 所示。


    ![A437923_1_En_3_Fig6_HTML.jpg](img/A437923_1_En_3_Fig6_HTML.jpg)


    图 3-6. 使用蓝色参考线将按钮放置在 `MyFirstProgram` 窗口底部附近


    7. 在对象库的搜索字段中点击，然后输入 `label`。请注意，对象库现在只显示标签用户界面项目，如图 3-7 所示。


    ![A437923_1_En_3_Fig7_HTML.jpg](img/A437923_1_En_3_Fig7_HTML.jpg)


    图 3-7. 在搜索字段中键入内容可帮助您轻松找到对象库中的项目


    8. 从对象库中拖放一个标签到 `MyFirstProgram` 窗口的中间。

    9. 点击出现在对象库底部搜索字段右侧的清除图标（灰色圆圈中的 X）。对象库现在显示所有可能的用户界面项目。

    10. 滚动对象库，直到找到文本字段项目。

    11. 将文本字段拖放到标签上方，使你的整个用户界面显示如图 3-8 所示。（不必担心每个用户界面项目的精确位置。）


    ![A437923_1_En_3_Fig8_HTML.jpg](img/A437923_1_En_3_Fig8_HTML.jpg)


    图 3-8. `MyFirstProgram` 用户界面上的一个标签、文本字段和按钮


    此时，你已经自定义了通用用户界面。现在你必须使用检查器面板自定义每个用户界面项目。通过检查器面板，你可以为用户界面项目选择不同的选项，例如输入按钮的确切宽度或为文本字段选择背景颜色。


    在调整用户界面上项目的大小或移动项目时，你可以在大小检查器面板中输入精确值，或者直接拖动鼠标来调整大小或移动项目。两种方法都可以接受，但大小检查器面板能让你对项目进行精确控制。让我们看看如何使用检查器面板自定义通用用户界面。


    1. 点击 `MyFirstProgram` 窗口底部附近的按钮以选中它。

    2. 选择“显示”➤“实用工具”➤“显示属性检查器”。属性检查器面板出现在 Xcode 窗口的右上角，如图 3-9 所示。


    ![A437923_1_En_3_Fig9_HTML.jpg](img/A437923_1_En_3_Fig9_HTML.jpg)


    图 3-9. 属性检查器面板允许你自定义项目的外观


    3. 在当前显示“Button”的标题文本字段中点击。删除标题文本字段中的任何现有文本，输入 `Change Case`，然后按回车键。按钮上的文本现在显示“Change
    Case”。但是，按钮的宽度太窄了。

    4. 选择“显示”➤“实用工具”➤“显示大小检查器”。大小检查器面板出现在 Xcode 窗口的右上角。

    5. 在宽度文本字段中点击，将值更改为 `120`（如图 3-10 所示），然后按回车键。Xcode 会更改按钮的宽度。


    ![A437923_1_En_3_Fig10_HTML.jpg](img/A437923_1_En_3_Fig10_HTML.jpg)


    图 3-10. 大小检查器面板中的宽度文本字段


    6. 点击标签以选中它。要修改标签的大小，你需要打开大小检查器面板，这可以通过选择“显示”➤“实用工具”➤“显示大小检查器”来完成，但有一种更快的方法，即使用按键快捷键或图标。

    7. 按 Option + Command + 5，或直接点击“大小检查器”图标（看起来像一把垂直的尺子）。大小检查器面板出现在 Xcode 窗口的右上角。

    8. 在宽度文本字段中点击，输入 `250`，然后按回车键。Xcode 会加宽你的标签的宽度。

    9. 点击文本字段以选中它。

    10. 按 Option + Command + 5，或直接点击“大小检查器”图标（看起来像一把垂直的尺子）。大小检查器面板出现在 Xcode 窗口的右上角。

    11. 在宽度文本字段中点击，输入 `250`，然后按回车键。Xcode 会加宽你的文本字段的宽度。此时，所有用户界面项目都偏离了中心。

    12. 拖动每个项目，直到出现蓝色参考线，表明你已将其在 `MyFirstProgram` 窗口中居中，如图 3-11 所示。


    ![A437923_1_En_3_Fig11_HTML.jpg](img/A437923_1_En_3_Fig11_HTML.jpg)


    图 3-11. 使用蓝色参考线将项目在用户界面上居中


    此时，你已经自定义了用户界面的外观。如果你运行此程序，用户界面看起来会不错，但它实际上不会执行任何操作。要使用户界面正常工作，你还需要完成两个步骤：


    - 编写 Swift 代码。

    - 将你的用户界面连接到你的 Swift 代码。


    你需要编写 Swift 代码使你的程序计算一些有用的结果。你需要将你的用户界面连接到你的 Swift 代码，以便你可以从用户界面检索数据，并将信息显示回用户界面。


    在此示例中，你将编写 Swift 代码，该代码从文本字段中检索文本，将其转换为大写，然后在用户点击 `Change Case` 按钮时，将大写文本显示回标签中。


    因此，你需要编写将文本转换为大写的 Swift 代码。然后你需要连接文本字段和标签，以便 Swift 代码可以从文本字段检索数据并将新数据放入标签中。


    要从用户界面项目发送或检索数据以便 Swift 代码可以访问它，你需要使用一种叫做 `IBOutlet` 的东西。一个 `IBOutlet` 本质上将用户界面项目（例如标签或文本字段）表示为
    Swift 代码可以使用的变量。

