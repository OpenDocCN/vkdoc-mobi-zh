  trans: '

    # 在 macOS 程序中定义约束


    要完全理解约束，你需要了解它们在实际程序中是如何运作的。然后你就能看到每次调整窗口大小时，用户界面是如何随之调整的。在接下来的示例程序中，你将为一个按钮和一个文本字段定义关系约束，同时还会为一个图像定义宽高比约束。


    本章前面你已经创建了一个名为 `UIProgram` 的 macOS 项目，现在我们用它来看看约束是如何工作的：


    1.  确保你的 `UIProgram` 项目已在 Xcode 中加载。

    2.  在项目导航器中点击 `MainMenu.xib` 文件。

    3.  点击 `UIProgram` 图标，使用户界面窗口显示出来。

    4.  选择 View ➤ Utilities ➤ Show Object Library，使对象库显示在 Xcode 窗口的右下角。

    5.  将按钮、文本字段和文本视图各拖一个到用户界面上，使其看起来类似于图 15-22。


    ![A437923_1_En_15_Fig22_HTML.jpg](img/A437923_1_En_15_Fig22_HTML.jpg)


    图 15-22.


    `UIProgram` 的用户界面


    虽然这个用户界面目前看起来还行，但一旦用户调整窗口大小，它就会变得很难看。选择 Product ➤ Run，然后调整窗口大小，看看缩小窗口是如何裁剪或隐藏用户界面上的元素的。现在再放大窗口，注意观察放大后窗口中出现的所有空白区域。通过选择
    UIProgram ➤ Quit `UIProgram` 退出程序。


    首先，我们按照以下步骤来定义窗口的最小尺寸：


    1.  在项目导航器中点击 `Main.xib` 文件。

    2.  点击左侧窗格中的“窗口”图标以选中整个窗口。

    3.  选择 View ➤ Utilities ➤ Show Size Inspector 以显示窗口约束（见图 15-14）。

    4.  点击选中顶部的“最小尺寸”复选框，将当前窗口尺寸定义为其最小尺寸。

    5.  选择 Product ➤ Run。调整用户界面窗口的大小。注意，你只能将窗口缩小到特定尺寸。

    6.  选择 UIProgram ➤ Quit `UIProgram`。


    通过定义最小窗口尺寸，你已防止了用户将窗口缩得过小时用户界面被裁剪或元素消失。现在我们添加约束，使用户界面在窗口放大时也能自适应。


    1.  将鼠标指针移到按钮上，按住 Control 键，向右拖动鼠标，在到达窗口右边缘前停止，如图 15-23 所示。


    ![A437923_1_En_15_Fig23_HTML.jpg](img/A437923_1_En_15_Fig23_HTML.jpg)


    图 15-23.


    调整用户界面窗口的大小

    2.  松开 Control 键和鼠标。此时会弹出一个窗口。

    3.  选择“距容器的尾部间距”。注意，按钮显示为红色，说明你对该按钮的约束还不够。

    4.  将鼠标指针移到按钮上，按住 Control 键，向下拖动鼠标，在到达窗口底部边缘前停止。

    5.  松开 Control 键和鼠标。此时会弹出一个窗口。

    6.  选择“距容器的底部间距”。注意，按钮现在显示为蓝色，说明约束已足够。

    7.  点击文本字段以选中它。

    8.  选择 Editor ➤ Resolve Auto Layout Issues ➤ Add Missing Constraints。Xcode 会自动添加约束，如图
    15-24 所示。


    ![A437923_1_En_15_Fig24_HTML.jpg](img/A437923_1_En_15_Fig24_HTML.jpg)


    图 15-24.


    文本字段上的约束

    9.  选择 Product ➤ Run。

    10.  调整窗口大小。注意观察放大窗口时用户界面元素是如何调整的。如你所见，无论用户如何调整窗口大小，约束都能让用户界面元素保持在适当的位置和尺寸。你可以自由尝试编辑约束，看看它们是如何工作的。

    11.  选择 UIProgram ➤ Quit `UIProgram`。


    ## 总结


    程序中的用户界面决定了用户如何与你的程序交互。每个用户界面都需要显示信息、从用户处获取信息，并允许用户选择命令。理想情况下，用户应更专注于使用你的程序，而不是花心思去弄明白用户界面是如何运作的。


    无论你使用 `.xib` 文件还是 `.storyboard` 文件，对象库都会显示所有可以添加到用户界面的元素。为了帮助你快速找到所需元素，你可以在对象库底部的搜索框中输入完整或部分单词进行搜索。


    约束能帮助你的用户界面在任何窗口大小调整下都保持美观。两种基本的约束类型包括：


    *   **关系约束**：定义相邻元素之间的距离，例如两个按钮之间，或按钮与窗口边缘之间的距离。

    *   **尺寸约束**：定义元素的高度、宽度或宽高比。


    你可以自己定义约束，让 Xcode 自动定义约束，或者两者结合使用。定义约束可能需要反复尝试，直到你的用户界面能完全按照你的期望适应窗口大小的变化。'
- fmt: "# 16. Working with Storyboards\n\nThe most common part of every program’s\
    \ user interface is a window that displays items such as buttons and text fields.\
    \ In Xcode, windows are called views. In all but the simplest programs, a user\
    \ interface will likely consist of two or more windows or views. This means your\
    \ program needs to know how to open additional windows and close them again.\n\
    \nThe two ways to create and store views are in ` .xib` files and ` .storyboard`\
    \ files. A ` .xib` file holds one view so if you need to display multiple views,\
    \ you’ll need to create multiple ` .xib` files. A ` .storyboard` file can hold\
    \ one or more views.\n\nYou can create user interfaces with either ` .xib` or\
    \ ` .storyboard` files, or a combination of both. Originally, you could use either\
    \ ` .xib` or ` .storyboard` files to create iOS apps, but Xcode 8 now only creates\
    \ ` .storyboard` files for iOS apps. For creating macOS programs, you can still\
    \ use either ` .xib` or ` .storyboard` files, but since iOS apps relies primarily\
    \ on ` .storyboard` files, Apple will likely shift macOS programming to ` .storyboard`\
    \ files as well. For this reason, you should learn more about using ` .storyboards`\
    \ for creating user interfaces.\n\nUltimately, whether you use ` .xib` or ` .storyboard`\
    \ files is less important than knowing how to design a good user interface that\
    \ makes performing tasks as easy as possible for the user.\n\nEach time you create\
    \ a new project, Xcode gives you a choice between using storyboards or not, as\
    \ shown in Figure [16-1](#A437923_1_En_16_Chapter.html#Fig1). If you choose not\
    \ to use storyboards, then Xcode will create and store your user interface in\
    \ a ` .xib` file. If you choose to use storyboards, then Xcode will store your\
    \ user interface in a ` .storyboard` file.\n\n![A437923_1_En_16_Fig1_HTML.jpg](A437923_1_En_16_Fig1_HTML.jpg)\n\
    \nFigure 16-1. When creating a macOS project, Xcode gives you a choice of choosing\
    \ storyboards or not\n\nTo experiment with storyboards, you need to create a project\
    \ that uses storyboards by following these steps:\n\n1. From within Xcode choose\
    \ File ➤ New ➤ Project.\n2. Click Application under the macOS category.\n3. Click\
    \ Cocoa Application and click the Next button. Xcode now asks for a product name.\n\
    4. Click in the Product Name text field and type `StoryProgram`.\n5. Make sure\
    \ the Language pop-up menu displays Swift and that only the \"Use Storyboards\"\
    \ check box is selected (see Figure [16-1](#A437923_1_En_16_Chapter.html#Fig1)).\n\
    6. Click the Next button. Xcode asks where you want to store the project.\n7.\
    \ Choose a folder to store your project and click the Create button.\n8. Click\
    \ the `Main.storyboard` file in the Project Navigator pane. The ` .storyboard`\
    \ user interface appears, as shown in Figure [16-2](#A437923_1_En_16_Chapter.html#Fig2).\n\
    \n   ![A437923_1_En_16_Fig2_HTML.jpg](A437923_1_En_16_Fig2_HTML.jpg)\n\n   Figure\
    \ 16-2. A ` .storyboard` file displays a window controller and a view controller.\
    \ Unlike ` .xib` files that display a single window for laying out user interface\
    \ items like buttons, text fields, and labels, ` .storyboard` files display two\
    \ windows. The top window (labeled window controller at the top) defines how the\
    \ window appears on the screen. The bottom window (labeled view controller at\
    \ the top) defines what appears on that window. When you drag user interface items\
    \ from the Object Library, you place them on the view controller (the bottom window).\n\
    \n9. Choose Product ➤ Run. Notice that your program’s user interface appears as\
    \ a single window, exactly like the previous projects created using ` .xib` files.\n\
    10. Choose StoryProgram ➤ Quit StoryProgram to exit out of your program and return\
    \ back to Xcode.\n\n## Using Storyboards\n\nBy themselves, ` .storyboard` files\
    \ are little different from ` .xib` files. The main advantage of ` .storyboard`\
    \ files is that they make it easy to create and link multiple views (windows)\
    \ together. For example, a program might display a login screen asking for the\
    \ user’s name and password. As soon as the user correctly types in this information,\
    \ a second screen might appear.\n\nEach of these screens represents a different\
    \ view or window of your program. The first view displays the login screen and\
    \ the second view displays a different screen. Not only do ` .storyboard` files\
    \ clearly define how different views might be connected, but ` .storyboard` files\
    \ also clearly show the order in which users will see each view.\n\nStoryboards\
    \ consist of two parts, as shown in Figure [16-3](#A437923_1_En_16_Chapter.html#Fig3):\n\
    \n![A437923_1_En_16_Fig3_HTML.jpg](A437923_1_En_16_Fig3_HTML.jpg)\n\nFigure 16-3.\
    \ Storyboards organize a user interface into scenes and seques.\n\n- **Scenes**:\
    \ Displays the windows of your user interface\n- **Segues**: Defines the connections\
    \ between scenes\n\nScenes contain user interface items like buttons and text\
    \ fields. Segues show the order in which users will view the user interface.\n\
    \nWhen you first create a new project using storyboards, Xcode includes a window\
    \ controller that controls a single view where you can place user interface items\
    \ like buttons or text fields. To add additional views to a storyboard, you must\
    \ use the Object Library and add additional controllers.\n\nIn addition to displaying\
    \ user interface items, the Object Library also contains controllers for storyboards,\
    \ as shown in Figure [16-4](#A437923_1_En_16_Chapter.html#Fig4).\n\n![A437923_1_En_16_Fig4_HTML.jpg](A437923_1_En_16_Fig4_HTML.jpg)\n\
    \nFigure 16-4. Controllers in the Object Library that you can add to a storyboard\n\
    \nThe five types of controllers you can place on a storyboard include:\n\n- **View\
    \ Controller**: Controls a ` .xib` file so you can include it with a storyboard\n\
    - **Window Controller**: Controls a single window or view\n- **Page Controller**:\
    \ Defines the animation between views\n- **Vertical/Horizontal Split View Controller**:\
    \ Displays two views side by side or stacked on top of each other\n- **Tab View\
    \ Controller**: Displays a tabbed interface that controls two or more views\n\n\
    A window controller is nothing more than a window that contains a view. The view\
    \ displayed inside the window is identified by an arrow pointing from the window\
    \ controller to the view (see Figure [16-2](#A437923_1_En_16_Chapter.html#Fig2)).\n\
    \nA page controller displays a view that allows multiple pages that can appear\
    \ or disappear, creating an animated effect. This lets you hide user interface\
    \ items on the view so they can appear (and disappear) later.\n\nA vertical/horizontal\
    \ split view controller acts like a window that holds two views either side by\
    \ side or stacked on top of each other, as shown in Figure [16-5](#A437923_1_En_16_Chapter.html#Fig5).\n\
    \n![A437923_1_En_16_Fig5_HTML.jpg](A437923_1_En_16_Fig5_HTML.jpg)\n\nFigure 16-5.\
    \ A split view controller contains two views.\n\nA tab view controller also consists\
    \ of a single window that can contain two or more views. The difference is that\
    \ it can display tabs where each tab represents a different view, as shown in\
    \ Figure [16-6](#A437923_1_En_16_Chapter.html#Fig6). You can also add more than\
    \ two views to a tab view controller.\n\n![A437923_1_En_16_Fig6_HTML.jpg](A437923_1_En_16_Fig6_HTML.jpg)\n\
    \nFigure 16-6. A tab view controller displays two or more views in one window\
    \ identified by tabs."
