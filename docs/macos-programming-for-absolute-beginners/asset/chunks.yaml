    \ Editor。`AppDelegate.swift` 文件会出现在用户界面旁边。\n2.  将鼠标移到 Add 按钮上，按住 Control 键，然后向下拖动到\
    \ `AppDelegate.swift` 文件底部最后一个右花括号的正上方。\n3.  松开鼠标和 Control 键。会弹出一个窗口。\n4.  点击\
    \ Connection 弹出菜单，然后选择 Action。\n5.  点击 Name 文本字段，输入 `addData`。\n6.  点击 Type 弹出菜单，然后选择\
