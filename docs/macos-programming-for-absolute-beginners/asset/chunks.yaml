    in Figure [15-19](#A437923_1_En_15_Chapter.html#Fig19) (or choose Editor ➤ Resolve
    Auto Layout Issues).


    ![A437923_1_En_15_Fig19_HTML.jpg](A437923_1_En_15_Fig19_HTML.jpg)


    Figure 15-19.


    The Resolve Auto Layout Issues pop-up window  

    3.  Choose either the “Add Missing Constraints” or “Reset to Suggested Constraints”
    option.


    If you choose the options in the top half of the window, you’ll affect only the
    selected user interface item. If you choose the options in the bottom half of
    the window, you’ll affect all user interface items whether you selected them or
    not.


    Remember, adding constraints can be a trial-and-error process of defining a constraint
    and seeing how it works before modifying or deleting it altogether. As you add
    constraints, Xcode displays constraint lines around your user interface item.
    If Xcode doesn’t think you have enough constraints, all constraints on that item
    will appear as orange. The moment Xcode thinks you have enough constraints on
    an item, the constraints will appear in blue.'
  trans: '

    ### 为用户界面项添加约束


    为窗口定义最小尺寸可以防止用户将窗口缩得太小，以致于裁剪掉用户界面上显示的项目。但是，如果用户放大了窗口会发生什么？此时，窗口中的项目理想情况下应调整其位置，以适应放大的窗口尺寸。


    约束定义了两个项目之间的距离，例如按钮与窗口边缘之间，或两个按钮之间的距离。Xcode 提供了三种方式来为用户界面项添加约束：


    - 从某个用户界面项按住 Control 键拖动鼠标到另一个项目或窗口边缘

    - 选择 `Editor ➤ Resolve Auto Layout Issues`（编辑器 ➤ 解决自动布局问题）

    - 点击右下角的 `Add New Constraints`（添加新约束）或 `Resolve Auto Layout Issues`（解决自动布局问题）图标，如图
    15-16 所示


    ![A437923_1_En_15_Fig16_HTML.jpg](img/A437923_1_En_15_Fig16_HTML.jpg)


    图 15-16. `Align`（对齐）、`Pin`（固定）和 `Resolve Auto Layout Issues`（解决自动布局问题）图标


    要使用 Control-拖拽方法添加约束，请遵循以下步骤：


    1. 将鼠标指针移动到您想要添加约束的用户界面项上。

    2. 按住 `Control` 键，并将鼠标拖向另一个用户界面项或窗口边缘。

    3. 当鼠标指针出现在另一个用户界面项或窗口边缘附近时，松开 `Control` 键和鼠标按钮。此时会弹出一个窗口，类似于图 15-17 所示。


    ![A437923_1_En_15_Fig17_HTML.jpg](img/A437923_1_En_15_Fig17_HTML.jpg)


    图 15-17. 松开 `Control` 键和鼠标会显示一个弹出窗口


    根据您 `Control`-拖拽鼠标的方向，弹出窗口中会显示不同的选项，如表 15-1 所示。


    表 15-1. 弹出窗口选项


    | 拖拽方向 (至窗口边缘) | 约束选项 |

    | --- | --- |

    | 向上 | `Top space to container`（到容器顶部间距） |

    | 向下 | `Bottom space to container`（到容器底部间距） |

    | 向右 | `Trailing space to container`（到容器尾部间距） |

    | 向左 | `Leading space to container`（到容器首部间距） |


    除了拖拽到窗口边缘，您还可以从一个用户界面项 `Control`-拖拽到另一个用户界面项上。这样做可以定义用户界面上两个项目之间的距离，例如两个按钮之间或一个按钮与一个文本字段之间的距离。


    当您 `Control`-拖拽鼠标到另一个用户界面项上时，会弹出一个窗口。如果您正在定义两个并排项目之间的距离，弹出窗口将显示 `Horizontal Spacing`（水平间距）选项。如果您正在定义两个上下堆叠项目之间的距离，弹出窗口将显示
    `Vertical Spacing`（垂直间距）选项，如表 15-2 所示。


    表 15-2. 间距选项


    | 拖拽方向 (至另一项目) | 约束选项 |

    | --- | --- |

    | 左/右 | `Horizontal spacing`（水平间距） |

    | 上/下 | `Vertical spacing`（垂直间距） |


    `Control`-拖拽方法让您可以直观地约束不同的用户界面项。定义约束的另一种方法是点击您想要约束的用户界面项，然后点击 `Pin`（固定）图标以显示弹出窗口。要通过
    `Pin`（固定）图标定义约束，请遵循以下步骤：


    1. 点击您想要约束的用户界面项。

    2. 点击 `Add New Constraints`（添加新约束）图标。此时会弹出一个窗口，显示四个方向的约束：左、右、上、下。在图 15-18 中，距窗口顶部的距离为
    139，距窗口左侧的距离为 145，距窗口右侧的距离为 239，距窗口底部的距离为 199。


    ![A437923_1_En_15_Fig18_HTML.jpg](img/A437923_1_En_15_Fig18_HTML.jpg)


    图 15-18. `Add New Constraints`（添加新约束）图标显示一个约束弹出窗口


    3. 点击某个约束以将其选中。当您点击一个约束时，它会显示为红色。如果约束显示为虚线，则表示该约束尚未被选中。

    4. 点击任意其他复选框。

    5. 点击弹出窗口底部的 `Add Constraints`（添加约束）按钮来定义一个或多个约束。


    `Add New Constraints`（添加新约束）弹出窗口允许您为所选用户界面项定义其他类型的约束：


    - `Width`（宽度）或 `Height`（高度）：将所选用户界面项的大小保持在固定尺寸

    - `Equal Widths`（等宽）或 `Heights`（等高）：将两个或多个选定的用户界面项保持为相同的固定尺寸

    - `Aspect Ratio`（宽高比）：如果调整大小，则保持所选用户界面项的宽高比适当

    - `Align`（对齐）：将两个或多个选定的用户界面项对齐


    定义约束的第三种方法是让 Xcode 为您选择约束。这可以让您快速添加约束，但风险是 Xcode 可能无法正确定义约束。幸运的是，您之后始终可以编辑约束。


    要让 Xcode 选择约束，请遵循以下步骤：


    1. 点击您想要约束的用户界面项。

    2. 点击 `Resolve Auto Layout Issues`（解决自动布局问题）图标以显示一个弹出窗口，如图 15-19 所示（或选择 `Editor
    ➤ Resolve Auto Layout Issues`（编辑器 ➤ 解决自动布局问题））。


    ![A437923_1_En_15_Fig19_HTML.jpg](img/A437923_1_En_15_Fig19_HTML.jpg)


    图 15-19. `Resolve Auto Layout Issues`（解决自动布局问题）弹出窗口


    3. 选择 `Add Missing Constraints`（添加缺失约束）或 `Reset to Suggested Constraints`（重置为建议约束）选项。


    如果您选择窗口上半部分的选项，则只会影响所选定的用户界面项。如果您选择窗口下半部分的选项，则无论是否选中，都会影响所有用户界面项。


    请记住，添加约束可能是一个反复试验的过程：定义一个约束，观察其效果，然后再修改或完全删除它。在您添加约束时，Xcode 会在您的用户界面项周围显示约束线。如果
    Xcode 认为您的约束不足，该项上的所有约束将显示为橙色。一旦 Xcode 认为您对某个项添加了足够的约束，这些约束将显示为蓝色。

    '
- fmt: '### Editing Constraints


    Once you’ve defined one or more constraints, you can always delete or edit existing
    constraints. To delete a constraint, you have several options:


    - Click the constraint and then press the `Delete` or `Backspace` key

    - Click the user interface item that has the constraint and open the `Size Inspector`
    pane, then click the constraint and press the `Delete` or `Backspace` key


    You can also delete or clear all constraints from a single user interface item
    or from all items on the currently displayed user interface. To do this, you have
    two options:


    - Choose `Editor` ➤ `Resolve Auto Layout Issues`

    - Click the `Resolve Auto Layout Issues` icon in the bottom right corner of the
    window


    With either option, you’ll see a menu divided in a top half and a bottom half
    (see Figure [15-19](#A437923_1_En_15_Chapter.html#Fig19)). Clicking the `Clear
    Constraints` option in the top half clears constraints only from any currently
    selected items. Clicking the `Clear Constraints` option in the bottom half clears
    constraints from all items in the currently displayed user interface whether you
    selected them or not.


    Rather than delete a constraint, you can edit it. Editing lets you modify how
    it behaves. Three values you can modify about a constraint are:


    - `Constant`: A fixed value that defines the value of the constraint

    - `Priority`: A numeric value that determines which constraints must be followed
    first

    - `Modifier`: A numeric value that defines a ratio that affects two values such
    as an item’s height to its width or one item’s width to a second item’s width


    To edit a constraint, follow these steps:


    1. Click the user interface item that contains the constraint you want to edit.

    2. Choose `View` ➤ `Utilities` ➤ `Show Size Inspector`. The `Size Inspector` pane
    lists all defined constraints, as shown in Figure [15-20](#A437923_1_En_15_Chapter.html#Fig20).


    ![A437923_1_En_15_Fig20_HTML.jpg](A437923_1_En_15_Fig20_HTML.jpg)


    Figure 15-20. Viewing a list of defined constraints in the `Size Inspector` pane


    3. Click the `Edit` button on the far right of the constraint you want to modify.
    A pop-up window appears, as shown in Figure [15-21](#A437923_1_En_15_Chapter.html#Fig21).


    ![A437923_1_En_15_Fig21_HTML.jpg](A437923_1_En_15_Fig21_HTML.jpg)


    Figure 15-21. A pop-up window lets you modify a constraint


    Notice that to the right of the `Constant:` label, there’s a pop-up menu showing
    an equal sign (`=`). If you click this pop-up menu, you can select greater than
    or equal to, less than or equal to, or equal to.


    Further to the right of the `Constant` label is a drop-down field that displays
    a number. If you click the downward-pointing arrow, you’ll be able to choose between
    three options:


    - A numeric value that you can type or edit

    - `Use Standard Value`: Lets Xcode decide the best value

    - `Use Canvas Value`: Uses the current distance on the screen to define a fixed
    value


    Keep in mind that a fixed value or a canvas value may behave differently on different
    size monitors. You may need to experiment until you find the right value for your
    particular user interface.


    Priorities are used to resolve conflicts between two or more constraints that
    may contradict each other, such as one constraint keeping a button pinned to the
    right edge of a window and a second constraint keeping the same button pinned
    to the left edge of a window while a third constraint keeps the button a fixed
    width. By modifying priorities, you can make sure your constraints don’t conflict.


    Finding the right combination of constraints can be tedious and frustrating at
    times. To simplify setting constraints, Xcode offers two ways to define constraints
    for you:


    - `Add Missing Constraints`: Keeps any existing constraints you’ve defined and
    adds new ones Xcode thinks you’re missing

    - `Reset to Suggested Constraints`: Deletes all constraints you may have set for
    an item and replaces it with its own constraints


    When you first define constraints, Xcode displays them in red or orange to let
    you know that you don’t have enough constraints to define the position of an item
    on your user interface. Once you’ve defined enough constraints to specify a position,
    Xcode displays constraints in blue.'
