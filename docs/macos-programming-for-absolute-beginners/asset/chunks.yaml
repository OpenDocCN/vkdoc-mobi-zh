- fmt: '# Creating and Customizing a User Interface


    The `Utilities` pane is most often used for creating and customizing your project’s
    user interface. With macOS programs, user interface files may be one of two types:


    - `.xib` files

    - `.storyboard` files


    When you create a project, you can choose which type you want to use. In general,
    `.xib` files are used for single window user interfaces while `.storyboard` files
    are used for multiple windows that are linked to appear in a certain order. It’s
    possible to mix both `.xib` and `.storyboard` files to create a user interface
    or just use `.xib` or `.storyboard` files exclusively.


    Whether you use `.xib` or `.storyboard` files, you need to use the `Utilities`
    pane for two purposes. First, you need to drag and drop items onto your user interface,
    such as buttons, text fields, and pictures. Second, you need to customize those
    user interface items by changing their names, color, or size.


    To design a user interface, you start with the `Object Library`, which appears
    at the bottom of the `Utilities` pane, as shown in Figure [2-15](#A437923_1_En_2_Chapter.html#Fig15).
    To open the `Object Library`, you can do the following:


    ![A437923_1_En_2_Fig15_HTML.jpg](A437923_1_En_2_Fig15_HTML.jpg)


    Figure 2-15. The Object Library contains different user interface items


    - Choose `View` ➤ `Utilities` ➤ `Show Object Library`.

    - Press `Control` + `Option` + `Command` + `3`.

    - Click the `Show Object Library` icon.


    To find a user interface item in the `Object Library`, you can simply scroll up
    and down the list. However, if you know the name of the item you want, a faster
    method is to click in the `Search` field at the bottom of the `Object Library`
    window, type all or part of the name of the item you want, and press `Return`.
    The `Object Library` will then show only those items that match what you typed.
    So if you typed `"Button"`, the `Object Library` would only display different
    buttons you can add to your user interface.


    After you have placed one or more items on your user interface, the second step
    is to customize those items using the `Inspector` pane. The `Inspector` pane can
    display several types of panes but the two most common you’ll use to customize
    user interface items are:


    - The `Attributes Inspector`

    - The `Size Inspector`


    The `Attributes Inspector` lets you modify the appearance of an item. The `Size
    Inspector` lets you modify the size and position of an item on the user interface.


    To open the `Attributes Inspector`, you can do one of the following:


    - Choose `View` ➤ `Utilities` ➤ `Show Attributes Inspector`.

    - Press `Option` + `Command` + `4`.

    - Click the `Show Attributes Inspector` icon, as shown in Figure [2-16](#A437923_1_En_2_Chapter.html#Fig16).


    ![A437923_1_En_2_Fig16_HTML.jpg](A437923_1_En_2_Fig16_HTML.jpg)


    Figure 2-16. The Show Attributes Inspector and Show Size Inspector icons


    To open the `Size Inspector`, you can do one of the following:


    - Choose `View` ➤ `Utilities` ➤ `Show Size Inspector`.

    - Press `Option` + `Command` + `5`.

    - Click the `Show Size Inspector` icon, as shown in Figure [2-16](#A437923_1_En_2_Chapter.html#Fig16).


    After opening the `Attributes` or `Size Inspectors`, you can then click a user
    interface item to modify it (such as a button or text field) and then type or
    choose different options to modify that item’s appearance.


    # The Standard and Assistant Editors


    You’ll spend most of your time using the editor or `Interface Builder`. The editor
    acts like a word processor and lets you type and edit Swift code. `Interface Builder`
    acts like a drawing program and lets you drag and drop, resize, and move items
    on the user interface such as buttons, text fields, and graphics.


    To edit Swift code, just click any file in the `Project Navigator` pane that contains
    the `.swift` file extension. When you click a `.swift` file, the contents of that
    file appears in the middle Xcode pane, as shown in Figure [2-17](#A437923_1_En_2_Chapter.html#Fig17).


    ![A437923_1_En_2_Fig17_HTML.jpg](A437923_1_En_2_Fig17_HTML.jpg)


    Figure 2-17. Clicking a `.swift` file displays the Swift code stored in that file


    To edit your user interface, just click any file in the `Project Navigator` pane
    that contains the `.xib` or `.storyboard` file extension. This displays the contents
    of that user interface in the middle Xcode pane, as shown in Figure [2-18](#A437923_1_En_2_Chapter.html#Fig18).


    ![A437923_1_En_2_Fig18_HTML.jpg](A437923_1_En_2_Fig18_HTML.jpg)


    Figure 2-18. Clicking a `.xib` or `.storyboard` file displays the user interface
    stored in that file


    Each time you click a different file in the `Project Navigator` pane, Xcode displays
    the contents of that new file in the middle pane of the Xcode window.


    When Xcode displays the contents of a single file in its middle pane, that’s called
    the `Standard Editor`. However, it’s often useful to view the contents of two
    files side by side. When Xcode displays two file contents side by side, that second
    file pane is called the `Assistant Editor`.


    The most common reason to open the `Assistant Editor` is when you have the user
    interface displayed in the left pane and a Swift file displayed in the right pane,
    as shown in Figure [2-19](#A437923_1_En_2_Chapter.html#Fig19). The purpose for
    this is to let you link your user interface to your Swift code.


    ![A437923_1_En_2_Fig19_HTML.jpg](A437923_1_En_2_Fig19_HTML.jpg)


    Figure 2-19. The Assistant Editor displays two file contents side by side


    When you create a user interface, it’s completely independent from your Swift
    code (and vice versa). This gives you the freedom to replace your user interface
    with a new user interface without affecting how your Swift code behaves. Likewise,
    this also lets you modify your Swift code without worrying about affecting your
    user interface.


    In the old days, programmers had to create their user interfaces using code, which
    meant changing the code often affected the user interface, increasing the chance
    of errors or bugs in the program. By separating the user interface from the code,
    Xcode eliminates this problem and helps you create more reliable software.


    When you create a user interface initially, it won’t do anything. That’s why you
    need to link some of your user interface items to Swift code that makes the user
    interface actually work. For example, if your user interface displays a button,
    clicking that button won’t do anything. You have to write Swift code to tell that
    button what to do. Then you have to link your button to your Swift code.


    This is the purpose of the `Assistant Editor`. By displaying your user interface
    next to your Swift code file, the `Assistant Editor` makes it easy to drag the
    mouse from your user interface to your Swift code files, creating a link between
    your user interface and your Swift code.


    To open the `Assistant Editor`, you can choose one of the following:


    - Choose `View` ➤ `Assistant Editor` ➤ `Show Assistant Editor`.

    - Press `Option` + `Command` + `Return`.

    - Click the `Assistant Editor` icon, as shown in Figure [2-20](#A437923_1_En_2_Chapter.html#Fig20).


    ![A437923_1_En_2_Fig20_HTML.jpg](A437923_1_En_2_Fig20_HTML.jpg)


    Figure 2-20. The Standard and Assistant Editor icons


    To close the `Assistant Editor`, you have to open the `Standard Editor` in one
    of the following ways.'
