    \n| 对象 | 基于以下类 | 包含这些属性 |\n| --- | --- | --- |\n| snake | Animal | legs |\n| mule\
    \ | PackAnimal、Animal | legs、strength |\n| relative | Biped、PackAnimal、Animal\
    \ | legs、strength、IQ |\n\n`snake`、`mule` 和 `relative` 对象基于它们不同的类以及它们所继承的类，包含不同的属性，如图\
    \ 14-4 所示。\n\n![A437923_1_En_14_Fig4_HTML.jpg](img/A437923_1_En_14_Fig4_HTML.jpg)\n\
    \n图 14-4. 观察继承如何作用于存储在不同类中的属性\n\n### 理解多态\n\n当一个类（子类）继承自另一个类（超类）时，它包含了超类中存储的所有属性和方法。尽管子类继承了超类的所有属性和方法，但这些属性和方法并不会在子类中显示出来。每个类中出现的代码，都是该类的独特属性和方法。\n\
    \n从另一个类继承的属性会保留相同的名称和数据类型。从另一个类继承的方法会保留相同的方法名称以及使其执行有用功能的代码。\n\n继承方法的一个问题是，你可能想要修改继承方法中的代码。例如，假设你有一个视频游戏，其中有狗在地上跑，鸟在天上飞。你可以创建一个像这样的基本类：\n\
    \n```\nclass GameObject {\nvar speed : Int = 0\nvar locationX : Int = 3\nvar locationY\
    \ : Int = 3\nfunc move (X: Int, Y: Int) {\nlocationX += X + speed\nlocationY +=\
    \ Y + speed\n}\n}\nvar dog = GameObject()\n```\n\n现在，从 `GameObject` 类创建的 `dog`\
    \ 对象有三个属性（`speed`、`locationX` 和 `locationY`）和一个方法（`move`），该方法会更改 `locationX` 和\
    \ `locationY` 属性。\n\n狗只能在地上跑，但鸟可以在二维空间中移动，因此它需要一个额外的 `height` 属性。要移动一个飞行对象，`move`\
    \ 方法需要更改 `height` 属性。这意味着 `move` 方法需要有所不同。\n\n解决这个问题的一个笨拙方法是给 move 方法起一个不同的名称，例如将其名称从\
    \ “move” 改为 “fly”：\n\n```\nclass FlyingObject : GameObject {\nvar height : Int\
    \ = 0\nfunc fly (X: Int, Y: Int) {\nlocationX += X + speed\nlocationY += Y + speed\n\
    height += (X + Y) / 2\n}\n}\nvar bird = FlyingObject()\n```\n\n这种解决方案的问题是，从 `FlyingObject`\
    \ 类创建的 `bird` 对象现在有两个方法：从 `GameObject` 继承的 `move` 方法，以及在 `FlyingObject` 中定义的新\
    \ `fly` 方法。\n\n你可以简单地忽略 `move` 方法并使用 `fly` 方法，但这存在风险：如果你不小心使用了 `move` 方法来改变鸟的位置，而不是使用正确的、能在二维空间中移动鸟的\
    \ `fly` 方法，就可能导致错误。\n\n这就是多态存在的原因。多态基本上允许你重用方法名称（例如 `move`），但用完全不同的代码替换它以实现功能。为了标识你正在使用多态来重用方法名称但修改其代码，必须在你要更改的方法前面使用\
    \ `override` 关键字，例如：\n\n```\noverride func move (X: Int, Y: Int) {\nlocationX\
    \ += X + speed\nlocationY += Y + speed\nheight += (X + Y) / 2\n}\n```\n\n当你覆盖一个方法（使用多态）时，你实际上拥有了两个名称相同的方法，但一个版本定义在一个类中，第二个版本定义在另一个类中。计算机永远不会混淆，因为你只能通过指定对象名称和方法名称来运行每个方法。尽管方法名称相同，但对象名称是不同的。\n\
    \n要了解多态如何工作，请按照以下步骤操作：\n\n1. 确保你的 `IntroductoryPlayground` 文件已加载到 Xcode 中。\n2.\
    \ 将代码编辑如下：\n"
- fmt: "```swift\nimport Cocoa\nclass GameObject {\n    var speed : Int = 0\n    var\
    \ locationX : Int = 3\n    var locationY : Int = 3\n    func move (X: Int, Y:\
    \ Int) {\n        locationX += X + speed\n        locationY += Y + speed\n   \
    \ }\n}\nvar dog = GameObject()\nclass FlyingObject : GameObject {\n    var height\
    \ : Int = 0\n    override func move (X: Int, Y: Int) {\n        locationX += X\
    \ + speed\n        locationY += Y + speed\n        height += (X + Y) / 2\n   \
    \ }\n}\nvar bird = FlyingObject()\ndog.speed = 1\ndog.move (X: 4, Y: 7)\nbird.speed\
    \ = 3\nbird.move (X: 4, Y: 7)\nprint (dog.locationX)\nprint (dog.locationY)\n\
    print (dog.speed)\nprint (bird.locationX)\nprint (bird.locationY)\nprint (bird.height)\n\
    print (bird.speed)\n```\n\nTo override a method, the `FlyingObject` class must\
    \ first inherit from another class. In this case, `FlyingObject` inherits from\
    \ `GameObject`. Now the `FlyingObject` class can use the `override` keyword to\
    \ specify that it’s changing the code that makes the `move` method work. In this\
    \ case, the only change was adding code to modify the `height` property, but you\
    \ could have added completely different code inside the overridden `move` method.\n\
    \nNotice that when you run the `move` method for the `dog` object (`dog.move`),\
    \ the `move` method only changes the values of `locationX` and `locationY`, but\
    \ when you run the `move` method for the `bird` object (`bird.move`), the overridden\
    \ method runs and also changes the `height` property, as shown in Figure [14-5](#A437923_1_En_14_Chapter.html#Fig5).\n\
    \n![A437923_1_En_14_Fig5_HTML.jpg](A437923_1_En_14_Fig5_HTML.jpg)\n\n**Figure\
    \ 14-5.** Overridden methods can behave differently\n\nWhen overriding methods,\
    \ you can only change the code inside the method. You cannot change the parameter\
    \ list of the method. For example, consider this class:\n\n```swift\nclass BasicDesign\
    \ {\n    var location : Int = 0\n    func moveMe (X : Int) {\n        location\
    \ += X\n    }\n}\n```\n\nTo override the `moveMe` method, this next class needs\
    \ to inherit from the `BasicDesign` class and change only the code inside the\
    \ overridden method. The following would not work:\n\n```swift\nclass NewDesign\
    \ : BasicDesign {\n    override moveMe (X: Int, Y: Int) { // Does NOT work\n \
    \   }\n}\n```\n\nNotice that the original `moveMe` method only has one parameter\
    \ (`X : Int`) but the `moveMe` method in the `NewDesign` class has two parameters\
    \ (`X: Int`, `Y: Int`). Despite having the same name, this method has a different\
    \ parameter list so it won’t work. When overriding methods, you can only change\
    \ the code, not the parameter list.\n\n## Overriding Properties\n\nBesides overriding\
    \ methods, Swift also lets you override properties. When you override properties,\
    \ you must keep the same property name and data type. What you can change are\
    \ the getters and setters along with the property observers of a variable.\n\n\
    At the simplest level, a getter simply returns a value of a variable. On a more\
    \ sophisticated level, a getter calculates a value. Consider the following:\n\n\
    ```swift\nclass BasicDesign {\n    var location: Int {\n        get {\n      \
    \      return 4\n        }\n    }\n}\n```\n\nThis `BasicDesign` class defines\
    \ a single property called `location` with a getter that returns the value 4 in\
    \ the `location` property. To override this property, you need to retain the variable\
    \ name and data type (`Int`), but you can change the getter code, such as:\n\n\
    ```swift\nclass NewDesign : BasicDesign {\n    override var location: Int {\n\
    \        get {\n            return 7\n        }\n    }\n}\n```\n\nThis `NewDesign`\
    \ class inherits the `location` property from the `BasicDesign` class. However,\
    \ it overrides the `location` property with a new getter that returns a value\
    \ of 7.\n\nTo see how overriding properties work, follow these steps:\n\n1.  Make\
    \ sure your `IntroductoryPlayground` file is loaded into Xcode.\n2.  Edit the\
    \ code as follows:\n\n    ```swift\n    import Cocoa\n    class BasicDesign {\n\
    \        var location: Int {\n            get {\n                return 4\n  \
    \          }\n        }\n    }\n    class NewDesign : BasicDesign {\n        override\
    \ var location: Int {\n            get {\n                return 7\n         \
    \   }\n        }\n    }\n    var ant = BasicDesign()\n    var fly = NewDesign()\n\
    \    ant.location\n    fly.location\n    ```\n\nIn this example, the `ant` object\
    \ is based on the `BasicDesign` class, which defines the `location` property with\
    \ a value of 4. The `fly` object is based on the `NewDesign` class, which inherits\
    \ the `location` property. However, the `NewDesign` class overrides the `location`\
    \ property’s getter code so instead of storing a value of 4 in the `location`\
    \ property, it stores a value of 7 instead, as shown in Figure [14-6](#A437923_1_En_14_Chapter.html#Fig6).\n\
    \n![A437923_1_En_14_Fig6_HTML.jpg](A437923_1_En_14_Fig6_HTML.jpg)\n\n**Figure\
    \ 14-6.** Overriding properties with new getter code\n\nRemember, when overriding\
    \ methods and properties, you can only change:\n\n- Code in the method\n- Code\
    \ in the property’s getter/setter or property observer\n\nYou can never change\
    \ the:\n\n- Method name\n- Method parameter list\n- Property name\n- Property\
    \ data type\n\n## Preventing Polymorphism\n\nIn some cases, you may want to prevent\
    \ a method, property, or even an entire class from being modified through polymorphism.\
    \ To do this, you just need to insert the `final` keyword. If you want to prevent\
    \ an entire class from being inherited, just put the `final` keyword in front\
    \ of the class name, like this:\n\n```swift\nfinal class ClassName {\n    var\
    \ propertyName = initialValue\n    func methodName() {\n    }\n}\n```\n\n> **Note:**\
    \ If you place `final` in front of a class name, it automatically prevents that\
    \ class’s properties and methods from being overridden so you don’t need to place\
    \ `final` in front of each property or method name.\n\nIf you want to prevent\
    \ an individual property or method from being overridden, just place the `final`\
    \ keyword in front of the property or method like this:\n\n```swift\nclass ClassName\
    \ {\n    final var propertyName = initialValue\n    func methodName() {\n    }\n\
    }\n```\n\nThe `final` keyword in the above example prevents the property from\
    \ being overridden while allowing the method to be overridden. If you want to\
    \ prevent the method from being overridden while allowing the property to be overridden,\
    \ you place the `final` keyword in front of the method like this:\n\n```swift\n\
    class ClassName {\n    var propertyName = initialValue\n    final func methodName()\
    \ {\n    }\n}\n```"
