- fmt: "### Accessing Data in a Tuple\n\nOnce you’ve created a tuple and stored data\
    \ in it, you need to retrieve that data eventually. Since a tuple contains two\
    \ or more chunks of data, Swift offers three ways to retrieve the data you want.\n\
    \nFirst, you can create multiple variables to access the tuple data, as follows:\n\
    \n```\nvar petInfo = (\"Rover\", 38, true)\nvar (dog, number, yesValue) = petInfo\n\
    print (dog)\nprint (number)\nprint (yesValue)\n```\n\nIn the first line of code,\
    \ `petInfo` is a tuple that contains three chunks of data: a string (`\"Rover\"\
    `), an integer (`38`), and a Boolean value (`true`).\n\nThe second line of code\
    \ creates three variables (`dog`, `number`, `yesValue`) and assigns their values\
    \ to the corresponding data stored in the `petInfo` tuple. That means `dog` stores\
    \ `\"Rover\"`, `number` stores `38`, and `yesValue` stores `true`. The `print`\
    \ commands simply print this data out to verify that it retrieved information\
    \ from the tuple.\n\nTo access data from a tuple, you must know the order in which\
    \ the tuple stores data. So if you want to retrieve a string from the `petInfo`\
    \ tuple, you must know that the `petInfo` tuple stores names (Strings) as its\
    \ first chunk of data, a number as its second chunk of data, and a Boolean value\
    \ as its third chunk of data.\n\nIf you don’t want retrieve all the values stored\
    \ in a tuple, you can just create a variable to store the data you want and use\
    \ the underscore character (`_`) as an empty placeholder to represent each additional\
    \ value in the tuple that you want to ignore.\n\nThis means you still need to\
    \ know the number of data chunks the tuple holds so you can identify the one chunk\
    \ of data that you want to retrieve. For example, if a tuple contains three items,\
    \ you can retrieve the first item like this:\n\n```\nvar petInfo = (\"Rover\"\
    , 38, true)\nvar (pet,_,_) = petInfo\nprint (pet)\n```\n\nThis will store `\"\
    Rover\"` in the `pet` variable so the `println` command will print `\"Rover\"\
    `.\n\nIf you just want to retrieve the middle value, you can type the following:\n\
    \n```\nvar petInfo = (\"Rover\", 38, true)\nvar (_,aValue,_) = petInfo\nprint\
    \ (aValue)\n```\n\nThis will store the number `38` into the `aValue` variable\
    \ and then the `println` command will print `38`.\n\nThe underscore character\
    \ acts as a placeholder to identify data in a tuple that you want to ignore. If\
    \ you omit the underscore characters, Swift won’t know which particular data you\
    \ want out of a tuple. To retrieve data from a tuple, you must know the number\
    \ and order of the items that the tuple stores.\n\nA second way to retrieve values\
    \ from a tuple is to use index numbers where the first element is assigned index\
    \ number `0`, the second element is assigned index number `1`, and so on. For\
    \ example, you might store data in a tuple like this:\n\n```\nvar petInfo = (\"\
    Rover\", 38, true)\nprint (petInfo.0)\nprint (petInfo.1)\nprint (petInfo.2)\n\
    ```\n\nThe first item in the tuple is assigned index number `0` so the combination\
    \ of the tuple name (such as `petInfo`) followed by the index number lets you\
    \ directly retrieve a specific tuple value. So `petInfo.0` retrieves `\"Rover\"\
    `, `petInfo.1` retrieves `38`, and `petInfo.2` retrieves `true`.\n\nMake sure\
    \ that when you access tuple data by index number, you use a valid index number.\
    \ In the above example, the `petInfo` tuple contains data at index `0`, `1`, and\
    \ `2`, but if you try to access data in a different index such as index number\
    \ `3`, there is no data so your program won’t work.\n\nA third method for accessing\
    \ data in a tuple involves using names. To use this method, you must first assign\
    \ names to each tuple data. For example, the following Swift code defines two\
    \ names called `\"name\"` and `\"age\"`:\n\n```\nvar tupleName = (name: \"Bridget\"\
    , age: 31)\n```\n\nNow you can access the tuple data by referencing the tuple\
    \ name followed by the identifying name for each data like this:\n\n```\nprint\
    \ (tupleName.name)   // Prints \"Bridget\"\nprint (tupleName.age)    // Prints\
    \ 31\n```\n\nAll three methods give you different ways to access data stored in\
    \ tuples so just use the method you like best. For clarity, naming the specific\
    \ elements of a tuple makes your code easier to understand but at the sacrifice\
    \ of forcing you to name your tuple data. The index number method and the multiple\
    \ variable method may be simpler, but can be less clear and requires you to know\
    \ the exact order of the data you want to retrieve.\n\nTo see how to work with\
    \ tuples, create a new playground by following these steps:\n\n1.  Open the IntroductoryPlayground\
    \ file in Xcode.  \n2.  Edit the code as follows:\n\n```\n    import Cocoa\n \
    \   var tupleName = (greeting: \"Happy Birthday\", age: 58, happy: true)\n   \
    \ // Method #1\n    var (message, howOld, mood) = tupleName\n    print (message)\n\
    \    print (howOld)\n    print (mood)\n    var (_,stuff,_) = tupleName\n    print\
    \ (stuff)\n    // Method #2\n    print (tupleName.0)\n    print (tupleName.1)\n\
    \    print (tupleName.2)\n    // Method #3\n    print (tupleName.greeting)\n \
    \   print (tupleName.age)\n    print (tupleName.happy)\n```\n\nWhen you try all\
    \ three methods for accessing values from a tuple, you can see how they all work\
    \ alike. Tuples make it easy to group related data together in a single variable\
    \ so you can easily keep related information organized. Then you can choose to\
    \ retrieve data from a tuple using one of three different methods, as shown in\
    \ Figure [10-1](#A437923_1_En_10_Chapter.html#Fig1).\n\n![A437923_1_En_10_Fig1_HTML.jpg](A437923_1_En_10_Fig1_HTML.jpg)\n\
    \nFigure 10-1.\n\nThree different ways to retrieve data from a tuple\n\n## Using\
    \ Sets\n\nArrays and dictionaries can store lists of the same data types, such\
    \ as a list of strings or a list of integers. The difference between arrays and\
    \ dictionaries is how you retrieve data. Arrays force you to retrieve data by\
    \ location using index values. Dictionaries let you retrieve data using a key,\
    \ but you must define a unique key for each chunk of data you store.\n\nSets represent\
    \ another way to store lists of identical data types such as strings or decimal\
    \ numbers. One speed advantage of a set is determining if something is stored\
    \ or not. If you store data in an array, you must exhaustively search throughout\
    \ the entire array to determine if an array stores a particular item. If you store\
    \ data in a dictionary, you have to know the key stored with that value, or you\
    \ have to exhaustively search through the dictionary’s list of values.\n\nSets\
    \ let you quickly determine the following far faster than arrays or dictionaries:\n\
    \n- If an item is stored in a set or not\n- If a set contains exactly the same\
    \ items as another set\n- If a set is a subset of another set (contains the same\
    \ items as a larger set)\n- If a set is a superset of another set (contains the\
    \ same items and more than a smaller set)\n- If two sets contain the same items\
    \ or not\n\nSets make it easy to compare two different groups of data in ways\
    \ that arrays and dictionaries can’t do as easily.\n\n### Creating a Set\n\nTo\
    \ create a set, you can define an empty set and the type of data it can hold like\
    \ this:\n\n```\nvar setName = Set()\n```\n\nIf you want to create a set and fill\
    \ a set with data at the same time, list the set contents within square brackets\
    \ and let Swift infer the data type where all data must be of the same data type,\
    \ such as:\n\n```\nvar setName = Set([Data1, Data2, Data2 ... DataN])\n```\n\n\
    A third way to create a set is to define a set name, use the `Set` keyword, and\
    \ then list the data in the set, like this:\n\n```\nvar setName: Set = [Data1,\
    \ Data2, Data2 ... DataN]\n```"
