  trans: "\n# 使用字典\n\n数组适用于存储相关数据的列表。当你想要检索特定数据时，数组的最大缺点就暴露出来了。除非你知道数组中某个条目的确切索引号，否则检索数据会十分繁琐。\n\
    \n这正是字典的用途所在。与仅存储数据的数组不同，字典存储两段数据，称为键值对。`值`（value）代表你想要保存的数据，而`键`（key）代表一种快速检索数据的方式。\n\
    \n例如，考虑一个电话号码列表。如果你将电话号码存储在数组中，就必须知道确切的索引值才能检索到特定的电话号码。然而，如果你将电话号码存储在字典中，就可以将每个电话号码（值）与一个姓名（键）一起存储。现在，如果你想检索某个特定的电话号码，只需查找键（该人的姓名）即可。\n\
    \n无论数据在字典中存储于何处，你都可以使用键快速检索到值。这使得从字典中检索数据比从数组中检索类似数据要容易得多。\n\n你可以把字典想象成数组，但它不是存储一段数据，而是存储一对数据（一个键和一个值）。键和值可以是不同的数据类型，但字典中的所有键和所有值必须分别是同一种数据类型。\n\
    \n要创建一个字典，你需要定义字典本身及其键和关联值的数据类型。一种定义字典的方式如下：\n\n```\nvar DictionaryName = [keyDataType:\
    \ valueDatatype]()\n```\n\n这定义了一个空字典，但指定了键和值的数据类型。\n\n第二种定义字典的方式是创建一个键值对列表，如下所示：\n\
    \n```\nvar DictionaryName = [102: \"Fred\", 87: \"Valerie\"]\n```\n\n当你直接赋值键值对时，Swift\
    \ 会推断键和值的数据类型。在这个例子中，键的数据类型是整数（`Int`），值的数据类型是字符串（`String`）。\n\n## 向字典添加条目\n\n\
    无论字典是空的还是已有数据，你都可以通过指定字典名称及其键，然后赋值来向字典添加更多条目，例如：\n\n```\nDictionaryName[key] =\
    \ value\n```\n\n要了解如何创建字典并向其中添加数据，请按照以下步骤创建一个新的 playground：\n\n1. 在 Xcode 中打开\
    \ `IntroductoryPlayground` 文件。\n2. 如下编辑代码：\n\n    ```\n    import Cocoa\n    var\
    \ DictionaryName = [102: \"Fred\", 87: \"Valerie\"]\n    DictionaryName[120] =\
    \ \"John\"\n    DictionaryName[96] = \"Jane\"\n    print(DictionaryName)\n   \
    \ ```\n\n这段 Swift 代码定义了一个键值数据类型为 `Int:String` 的字典，该类型由 Swift 根据字典中初始存储的数据类型推断得出。\n\
    \n接下来的两行定义了一个键（`120`）和一个值（`\"John\"`），该键值对被存入字典。然后另一行定义了一个键（`96`）和一个值（`\"Jane\"\
    `），也同样存入字典。最后的 `print` 命令让你看到字典的变化，如图 9-5 所示。\n\n![A437923_1_En_9_Fig5_HTML.jpg](img/A437923_1_En_9_Fig5_HTML.jpg)\n\
    \n**图 9-5.** 创建一个字典并添加新的键值对数据\n\n## 检索和更新字典中的数据\n\n一旦字典包含键值对，你就可以使用键来检索值。具体做法是指定字典名称和一个键，然后将此值赋给一个变量，例如：\n\
    \n```\nvariable = DictionaryName[key]!\n```\n\n该变量的数据类型必须与字典中存储的值的数据类型相同。同时请注意感叹号，它定义了一个隐式解包变量。这个感叹号确保如果字典中不存在该键，不存在的值不会导致程序崩溃。\n\
    \n下面的示例在字典中定义了两个键值对数据。然后它使用键 `87` 从字典中检索值，即字符串 `\"Valeria\"`，如图 9-6 所示。\n\n![A437923_1_En_9_Fig6_HTML.jpg](img/A437923_1_En_9_Fig6_HTML.jpg)\n\
    \n**图 9-6.** 使用键检索值并使用新数据更新现有键\n\n```\nvar DictionaryName = [102: \"Fred\", 87:\
    \ \"Valerie\"]\nvar name: String\nname = DictionaryName[87]!\nprint(name)\n```\n\
    \n一旦你在字典中存储了一个键值对，就可以使用 `updateValue` 命令为现有键分配新值，如下所示：\n\n```\nDictionaryName.updateValue(value,\
    \ forKey: key)\n```\n\n因此，如果你想更新与键 `87` 关联的值，可以这样做：\n\n```\nDictionaryName.updateValue(\"\
    Sam\", forKey: 87)\n```\n\n要了解如何从字典中使用键检索值，然后更新现有键的值，请遵循以下步骤：\n\n1. 确保 `IntroductoryPlayground`\
    \ 文件已在 Xcode 中加载。\n2. 如下编辑代码：\n\n    ```\n    import Cocoa\n    var DictionaryName\
    \ = [102: \"Fred\", 87: \"Valerie\"]\n    DictionaryName[120] = \"John\"\n   \
    \ DictionaryName[96] = \"Jane\"\n    print(DictionaryName)\n    var name: String\n\
    \    name = DictionaryName[87]!\n    print(name)\n    DictionaryName.updateValue(\"\
    Sam\", forKey: 87)\n    name = DictionaryName[87]!\n    print(name)\n    ```\n\
    \n请注意，第一次字典检索与键 `87` 关联的值时，返回字符串 `\"Valerie\"`。然后 `updateValue` 命令用 `\"Sam\"`\
    \ 替换了 `\"Valerie\"`，所以下次字典检索与键 `87` 关联的值时，将返回字符串 `\"Sam\"`，如图 9-6 所示。\n\n## 删除字典中的数据\n\
    \n一旦字典包含键值对，你可以使用 `removeValue(forKey:key)` 命令删除与特定键关联的值，如下所示：\n\n```\nDictionaryName.removeValue(forKey:\
    \ key)\n```\n\n`removeValue(forKey:key)` 命令会同时移除键及其关联的值。请注意，如果你指定的键在字典中不存在，`removeValue(forKey:key)`\
    \ 命令不会执行任何操作。\n\n如果你想删除字典中的所有键值对，可以直接使用 `removeAll` 命令，如下所示：\n\n```\nDictionaryName.removeAll()\n\
    ```\n"
- fmt: "### Querying a Dictionary\n\nOnce you store key:value pairs in a dictionary,\
    \ you can use the following commands to get information about a dictionary:\n\n\
    - `count`: Counts the number of key:value pairs stored in a dictionary\n- `keys`:\
    \ Retrieves a list of all the keys stored in a dictionary\n- `values`: Retrieves\
    \ a list of all the values stored in a dictionary\n\nThe `count` command only\
    \ needs the dictionary name and returns an integer value that you can assign to\
    \ a variable, such as\n\n```\nvar total = DictionaryName.count\n```\n\nThe `keys`\
    \ and `values` commands need a dictionary name and returns a list of items that\
    \ you can store in an array, such as\n\n```\nlet myKeys = Array(DictionaryName.keys)\n\
    ```\n\nTo see how to count and retrieve keys and values from a dictionary, follow\
    \ these steps:\n\n1.  Make sure the `IntroductoryPlayground` file is loaded in\
    \ Xcode.  \n2.  Edit the code as follows:\n\n    ```\n    import Cocoa\n    var\
    \ myDictionary = [12: \"Joe\", 7: \"Walter\"]\n    myDictionary.removeValue(forKey:\
    \ 7)\n    print (myDictionary)\n    myDictionary.removeAll()\n    print (myDictionary)\n\
    \    myDictionary = [25: \"Stephanie\", 98: \"Nancy\"]\n    print (myDictionary.count)\n\
    \    let myKeys = Array(myDictionary.keys)\n    let myValues = Array(myDictionary.values)\n\
    \    ```\n\nNotice how the `removeValueForKey` command removes an existing key:value\
    \ pair while the `removeAll` command empties the entire dictionary. Also notice\
    \ how the `count` command counts all key:value pairs while the `keys` and `values`\
    \ commands return a list of the keys and values, respectively, as shown in Figure\
    \ [9-7](#A437923_1_En_9_Chapter.html#Fig7).\n\n![A437923_1_En_9_Fig7_HTML.jpg](A437923_1_En_9_Fig7_HTML.jpg)\n\
    \nFigure 9-7.\n\nDeleting dictionary data, counting, and retrieving keys and values\n\
    \n## Using Dictionaries in a macOS Program\n\nIn the following sample program,\
    \ the computer creates a list of data stored in a dictionary. Then through the\
    \ user interface, the user can add new data to the dictionary, delete existing\
    \ data, or get information about the dictionary.\n\nCreate a new macOS project\
    \ by following these steps:\n\n1.  From within Xcode choose File ➤ New ➤ Project.\
    \  \n2.  Click Application under the macOS category.  \n3.  Click Cocoa Application\
    \ and click the Next button. Xcode now asks for a product name.  \n4.  Click in\
    \ the Product Name text field and type `DictionaryProgram`.  \n5.  Make sure the\
    \ Language pop-up menu displays Swift and that no check boxes are selected.  \n\
    6.  Click the Next button. Xcode asks where you want to store the project.  \n\
    7.  Choose a folder to store your project and click the Create button.  \n8. \
    \ Click the `MainMenu.xib` file in the Project Navigator.  \n9.  Click the `DictionaryProgram`\
    \ icon to make the window of the user interface appear.  \n10.  Choose View ➤\
    \ Utilities ➤ Show Object Library to make the Object Library appear in the bottom\
    \ right corner of the Xcode window.  \n11.  Drag three push buttons, six labels,\
    \ and six text fields onto the user interface, and double-click the push buttons\
    \ and labels to change the text that appears on them so they look similar to Figure\
    \ [9-8](#A437923_1_En_9_Chapter.html#Fig8).\n\n![A437923_1_En_9_Fig8_HTML.jpg](A437923_1_En_9_Fig8_HTML.jpg)\n\
    \nFigure 9-8.\n\nThe user interface of the `DictionaryProgram`\n\nThe Add button\
    \ will let you type in a key and value in the text fields on the right. The Delete\
    \ button will let you specify a key to delete its associated value from a dictionary.\
    \ The Query button will display the total number of items along with the list\
    \ of keys and values currently stored in the dictionary.\n\nEach text field will\
    \ need a separate `IBOutlet` and each push button will need a separate `IBAction`\
    \ method, which you create by Control-dragging each item from the user interface\
    \ to your `AppDelegate.swift` file.\n\n1.  With your user interface still visible\
    \ in the Xcode window, choose View ➤ Assistant Editor ➤ Show Assistant Editor.\
    \ The `AppDelegate.swift` file appears next to the user interface.  \n2.  Move\
    \ the mouse over the Add button, hold down the Control key, and drag just above\
    \ the last curly bracket at the bottom of the `AppDelegate.swift` file.  \n3.\
    \  Release the mouse and the Control key. A pop-up window appears.  \n4.  Click\
    \ in the Connection pop-up menu and choose Action.  \n5.  Click in the Name text\
    \ field and type `addButton`.  \n6.  Click in the Type pop-up menu and choose\
    \ `NSButton`. Then click the Connect button.  \n7.  Move the mouse over the Delete\
    \ button, hold down the Control key, and drag just above the last curly bracket\
    \ at the bottom of the `AppDelegate.swift` file.  \n8.  Release the mouse and\
    \ the Control key. A pop-up window appears.  \n9.  Click in the Connection pop-up\
