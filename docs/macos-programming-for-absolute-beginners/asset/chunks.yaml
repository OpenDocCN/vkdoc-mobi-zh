- fmt: "### Adding Items to an Array\n\nWhether an array is empty or already filled\
    \ with data, you can always add more items to an array by using the `append` command,\
    \ like this:\n\n```\narrayName.append(data)\n```\n\nYou must specify the array\
    \ name to add data to and put the actual data in parentheses. Make sure the data\
    \ you add is of the proper data type. So if you want to add data to an array that\
    \ can only hold integers, you can only add another integer to that array.\n\n\
    Instead of using the `append` command, you can use the addition compound assignment\
    \ operator to add items to the end of an array, like this:\n\n```\narrayName3\
    \ += [data1, data2, data3, ... dataN]\n```\n\nThe `+=` compound assignment operator\
    \ can add multiple items to the end of an array while the `append` command only\
    \ adds one item at a time to the end of an array.\n\nThe `append` command always\
    \ adds new items to the end of an array. If you want to add a new item to a specific\
    \ location in an array, you can use the `insert` and `at` commands, like this:\n\
    \n```\narrayName.insert(data, at: index)\n```\n\nWith the `insert` command, you\
    \ must add data that’s the proper data type for that array. Then you must also\
    \ specify the index number. If you choose an index number larger than the array\
    \ size, the `insert` command won’t work.\n\nTo see how to create an array and\
    \ add data to it, follow these steps:\n\n1. Open the IntroductoryPlayground file\
    \ in Xcode.  \n2. Edit the code as follows:\n\n    ```\n    import Cocoa\n   \
    \ var arrayName = Array(arrayLiteral: 34, 89, 70, 1, -24)\n    var arrayName2\
    \ = [Int](arrayLiteral: 34, 89, 70, 1, -24)\n    arrayName.append(2)\n    arrayName2.append(2)\n\
    \    arrayName.insert(-37, at: 2)\n    arrayName2.insert(-37, at: 2)\n    ```\n\
    \nNotice how the `append` command adds data to the end of the array but the `insert`\
    \ command can add data in a specific location in the array, as shown in Figure\
    \ 9-2.\n\n![A437923_1_En_9_Fig2_HTML.jpg](A437923_1_En_9_Fig2_HTML.jpg)\n\nFigure\
    \ 9-2. Two ways to add data to an array\n\n### Deleting Items from an Array\n\n\
    Just as you can add items to an array, so can you also delete items from an array.\
    \ To remove the last item in an array, you can use the `removeLast` command like\
    \ this:\n\n```\narrayName.removeLast()\n```\n\nNot only will this delete the last\
    \ item in an array, but it will also return that value. If you want to save the\
    \ last item of an array in a variable, you can do something like this:\n\n```\n\
    var item = arrayName.removeLast()\n```\n\nIf you want to remove a specific item\
    \ from an array, you can identify the index number of that item with the `remove(at:)`\
    \ command, like this:\n\n```\narrayName.remove(at: number)\n```\n\nSo if you want\
    \ to remove the second item in an array, you specify an index of 1. Like the `removeLast`\
    \ command, the `remove(at:)` command also returns a value that you can store in\
    \ a variable, like this:\n\n```\nvar item = arrayName.remove(at: 1)\n```\n\nIf\
    \ you want to remove all items from an array, you can use the `removeAll` command,\
    \ like this:\n\n```\narrayName.removeAll()\n```\n\nTo see how to delete items\
    \ from an array, follow these steps:\n\n1. Make sure the IntroductoryPlayground\
    \ file is loaded in Xcode.  \n2. Edit the code as follows:\n\n    ```\n    import\
    \ Cocoa\n    var arrayName = [Int](arrayLiteral: 3, 8, 9, 21)\n    var item =\
    \ arrayName.removeLast()\n    print (arrayName)\n    print (item)\n    item =\
    \ arrayName.remove(at: 1)\n    print (arrayName)\n    print (item)\n    arrayName.removeAll()\n\
    \    ```\n\nNotice how the different commands work when deleting items from an\
    \ array as shown in Figure 9-3. When specifying index values, you must make sure\
    \ your index number exists. This means if an array consists of three items, the\
    \ first item is at index 0, the second is at index 1, and the third is at index\
    \ 2. So you can remove an item from this array at index values 0, 1, or 2 but\
    \ any other index number will not work.\n\n![A437923_1_En_9_Fig3_HTML.jpg](A437923_1_En_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3. Deleting items from an array\n\nDeleting items from an array physically\
    \ removes that item from that array. Rather than delete an item from an array,\
    \ you can also replace an existing item with a new value. All you have to do is\
    \ specify the index value of the array item you want to replace and assign new\
    \ data to it, like this:\n\n```\narrayName[index] = newData\n```\n\nSo if you\
    \ want to replace the second item in an array (at index value 1) with new data,\
    \ you can do the following:\n\n```\narrayName[1] = 91\n```\n\nWhatever existing\
    \ value was stored in the array at index value 1 gets replaced with the number\
    \ 91. When replacing data, the new data must be of the same data type as the rest\
    \ of the items in the array, such as integers or strings.\n\n### Querying Arrays\n\
    \nWhen you have an array, you might want to know if the array is empty (has zero\
    \ items stored in it), or if the array does have items, how many items it contains.\
    \ To determine if an array is empty or not, you can use the `isEmpty` command\
    \ that returns a Boolean value, like this:\n\n```\narrayName.isEmpty\n```\n\n\
    If you want to store this Boolean value in a variable, you can do this:\n\n```\n\
    var flag = arrayName.isEmpty\n```\n\nIf you want to know how many items are stored\
    \ in an array, you can use the `count` command, like this:\n\n```\narrayName.count\n\
    ```\n\nIf you want to store this integer value in a variable, you can do this:\n\
    \n```\nvar total = arrayName.count\n```\n\n### Manipulating Arrays\n\nTwo common\
    \ ways to manipulate an array is to reverse the order of all the items or rearrange\
    \ the items in ascending or descending order. This simply reverses the order of\
    \ all items in an array without regard to their actual values, such as:\n\n```\n\
    arrayName.reversed()\n```\n\nWhen you sort an array in ascending order, the lowest\
    \ value gets stored in the first item of the array and the highest value gets\
    \ stored in the last item of the array. When you sort strings, Swift sorts them\
    \ in alphabetical order. To sort an array in ascending order, use this:\n\n```\n\
    myArray.sort { $0 < $1 }\n```\n\nWhen you sort an array in descending order, the\
    \ highest value gets stored in the first item of the array and the lowest value\
    \ gets stored in the last item of the array. When you sort strings, Swift sorts\
    \ them in reverse alphabetical order. To sort an array in descending order, use\
    \ this:\n\n```\nmyArray.sort { $1 < $0 }\n```\n\nTo see how reversing and sorting\
    \ an array works, follow these steps:\n\n1. Make sure the IntroductoryPlayground\
    \ file is loaded in Xcode.  \n2. Edit the code as follows:\n\n    ```\n    import\
    \ Cocoa\n    var myArray = [\"Bob\", \"Fred\", \"Alice\", \"Mary\"]\n    let backwardsArray\
    \ : [String]\n    backwardsArray = myArray.reversed()\n    myArray.sort { $0 <\
    \ $1 }\n    print (myArray)\n    myArray.sort { $1 < $0 }\n    print (myArray)\n\
    \    ```\n\nNotice that reversing an array simply rearranges the items but sorting\
    \ an array actually changes the position of items based on their content, as shown\
    \ in Figure 9-4.\n\n![A437923_1_En_9_Fig4_HTML.jpg](A437923_1_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4. Sorting and reversing an array"
