- fmt: '# Designing the User Interface of a Program


    Besides the structure of your program’s design, the other crucial element of your
    program is the user interface. With `Xcode`, you can design the structure of your
    program (its various objects) in complete isolation from the user interface (and
    vice versa). This gives you the freedom to easily design and modify the structure
    of your program or the user interface without affecting the other part of your
    program.


    The user interface defines how your user sees your program. A poor user interface
    makes a program hard to use. A good user interface makes a program easy to use.
    Even if the underlying structure of a program is poor, a good user interface can
    make that program appear responsive, elegant, and well-designed.


    So what is a good user interface? Ideally a user interface dissolves in the background
    to the point where the user isn''t even aware that it exists. When you pinch two
    fingers on the screen of an iPhone or iPad, you can make an image appear larger
    or smaller.


    From the user''s point of view, the user interface doesn''t even exist because
    the user gets the sensation of directly manipulating an image. In reality, the
    user interface translates the user''s fingertip positions into magnifying an image''s
    appearance. The user interface is still there, but the user doesn''t need to read
    a thick training manual and follow multiple steps to manipulate it. A good user
    interface essentially melts into the background.


    Here''s how a clumsy user interface would accomplish the exact same task. First,
    the user would have to tap a button on the screen to display a menu. Second, the
    user would have to choose a `Zoom` command from that menu. Third, the user would
    have to type in a number that represents the magnification percentage, such as
    50% or 125%. Fourth, the user would have to tap an `OK` button to finally complete
    the task and change the magnification of an image.


    Which user interface would you rather use?


    As a general rule, the more steps needed to accomplish a task, the harder the
    user interface is to use because if the user omits one step or does one step out
    of order, the entire task fails. Often programmers try to fix poor user interface
    designs by simply adding more ways to accomplish the same task through keystroke
    shortcuts or toolbar icons. Unfortunately, if you have a poor user interface,
    adding more ways to accomplish the same task won''t necessarily make your user
    interface easier to use.


    If you have a poor user interface, it may be easier to redesign the whole interface
    rather than try to fix a faulty design.


    ## Design a User Interface with Paper and Pencil


    As a general rule, your first idea for a user interface will rarely be the final
    design. That''s because what you think will work won''t work, and what you may
    not even consider could be vitally important to your users. So rather than design
    your user interface and be forced to change it later, it''s far faster and simpler
    to design your user interface with paper and pencil instead.


    Once you have a rough design on paper, show it to your eventual users to get their
    feedback. Even though looking at static images of crudely drawn user interfaces
    might seem pointless, it can give you feedback on the general design of your user
    interface. When evaluating a preliminary user interface, ask your users the following
    questions:


    - What''s missing? Are there commands or features that need to be displayed but
    aren''t?

    - What''s not needed? Are there commands or features that are currently displayed
    but aren''t necessary?

    - What could be easier? How can the user interface be rearranged or organized
    to make it simpler?

    - What''s confusing? Is there anything that users don''t understand? Help menus
    and descriptive tool tips can never substitute for clean user interface designs.

    - What''s intuitive? What will users expect to do with your user interface? Does
    your user interface support or frustrate user''s expectations?


    Designing user interfaces on paper is quick, fast, and easy. Since you don''t
    have much time invested in any particular user interface design, it''s much easier
    to throw away bad designs rather than try to defend and justify keeping them.


    In addition, paper designs make it easy for you or others to scribble on them
    to redesign them. Because paper user interface designs are so fast and simple
    for anyone to make, feel free to experiment. The more user interface designs you
    can create, the more likely you''ll stumble across one that will work.


    Study existing programs and see what you like best and what you like least. Then
    put both features (the ones you like and the ones you dislike) into different
    user interface designs. The design you may think is best may be the ones others
    like the least, and the design you like the least may be the one others find is
    the best.


    ## Design a User Interface with Software


    Once you''ve experimented with different user interface designs and found one
    or more that seem promising, it''s time to move beyond paper and pencil and create
    a user interface prototype that people can actually see on a computer screen.


    What may look nice on paper may not work on a computer screen. More importantly,
    a computer screen can create a simple form of interaction. When the user clicks
    on a button, a new screen can appear just like the real user interface would work.
    This interactivity is something you can only poorly mimic with paper and pencil
    designs.


    A fast way to create an interactive user interface prototype is to use presentation
    software such as `PowerPoint` or `Keynote`. Presentation software lets you create
    slides where each slide can represent a window of your user interface. You can
    place buttons and graphics to create rough user interface designs, and then create
    links between those buttons and slides to create a limited form of interactivity.


    An interactive user interface prototype lets you test how users expect the user
    interface to respond. For example, users might expect to see a certain window
    after clicking a command. If your interactive prototype shows users a different
    window, then you''ll know what you need to fix.


    Like paper and pencil designs, the goal of a user interface prototype is to find
    out what works and what doesn''t work while spending as little time designing
    your prototype. The less time you spend designing your prototype, the more time
    you can spend coming up with alternate ideas and testing them.


    In addition to creating user interface prototypes using presentation software,
    you can also buy special mockup software that contains common user interface elements
    such as buttons, windows, and check boxes that you can quickly drag and drop to
    create a simulated user interface, as shown in Figure [28-1](#A437923_1_En_28_Chapter.html#Fig1).


    ![A437923_1_En_28_Fig1_HTML.jpg](A437923_1_En_28_Fig1_HTML.jpg)


    Figure 28-1. Balsamiq Mockups is a specialized program for creating user interface
    prototypes


    A software version of your user interface prototype provides interactivity. When
    you''re satisfied with your user interface design as a prototype, the final step
    is to convert your prototype into an actual `Xcode` user interface.


    Remember, `Xcode` lets you create your `Swift` code completely separate from your
    user interface. This means you can create user interfaces in `Xcode` without writing
    a single line of code. When you''re happy with the appearance and design of your
    user interface, you can connect its various items (buttons, menus, etc.) to `IBOutlets`
    and `IBAction` methods to link your user interface to your `Swift` code.'
