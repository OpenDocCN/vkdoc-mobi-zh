- fmt: '# Summary


    The heart of any program is its ability to accept data, manipulate that data,
    and then return a useful result. The simplest way to manipulate numeric data is
    through common mathematical operators such as `+` (addition), `-` (subtraction),
    `/` (division), `*` (multiplication), and `%` (remainder). The common way to manipulate
    strings is through concatenation using the `+` operator, which combines two strings
    together.


    As a shortcut, you can use the increment and decrement operators to add or subtract
    1 from a variable. If you need to add or subtract values other than 1, you can
    use compound assignment operators instead.


    Beyond these basic operators, you can also manipulate data through functions defined
    by the Cocoa framework. You don’t have to know how these functions work; you just
    have to know they exist so you can use them in your own program by calling these
    function names.


    # 7. Making Decisions with Branches


    After a program receives data, it needs to manipulate that data somehow to return
    a useful result. Simple programs manipulate data the same way, but more complicated
    programs need to make decisions on how to manipulate that data.


    For example, a program might ask the user for a password. If the user types in
    a valid password, then the program gives the user access. If the user does not
    type in a valid password, then the program must display an error message and block
    access.


    When a program analyzes data and makes a decision based on that data, it uses
    things called Boolean values and branching statements.


    Boolean values represent either a `true` or `false` value. Branching statements
    give your program the option of choosing between two or more different sets of
    commands to follow. Boolean values combined with branching statements give programs
    the ability to respond to different data.


    ## Understanding Comparison Operators


    Earlier you learned about the common data types such as `Int`, `Double`, and `String`.
    Swift also includes a Boolean data type that can hold either a `true` or `false`
    value. You can create a Boolean variable by declaring a `Bool` data type, such
    as:


    ```

    var flag : Bool

    ```


    `Bool` represents a Boolean data type. Any variable defined as a `Bool` data type
    can only hold one of two values, such as:


    ```

    flag = true

    flag = false

    ```


    While you can directly assign `true` and `false` to variables that represent Boolean
    data types, it’s far more common to calculate Boolean values using comparison
    operators. Some common comparison operators are shown in Table 7-1.


    **Table 7-1.** Common Comparison Operators in Swift


    | Comparison Operator | Purpose            | Example   | Boolean Value |

    |---------------------|--------------------|-----------|---------------|

    | `==`                | Equal              | `5 == 14` | False         |

    | `<`                 | Less than          | `5 < 14`  | True          |

    | `>`                 | Greater than       | `5 > 14`  | False         |

    | `<=`                | Less than or equal | `5 <= 14` | True          |

    | `>=`                | Greater than or equal | `5 >= 14` | False        |

    | `!=`                | Not equal          | `5 != 14` | True          |


    **Note:** The equal (`==`) comparison operator is the only comparison operator
    that can also compare strings such as `"Joe" == "Fred"` (which evaluates to `false`)
    or `"Joe" == "Joe"` (which evaluates to `true`).


    Comparison operators compare two values, such as `38 == 8` or `29.04 > 12`. The
    result of any comparison is always `true` or `false`. Since using actual values
    with comparison operators always returns the same `true` or `false` value, it’s
    far more common to use comparison operators to compare a fixed value with a variable
    or to compare two variables, such as:


    ```

    let myValue = 45

    myValue > 38            // Evaluates to true

    let yourValue = 39

    myValue < yourValue     // Evaluates to false

    ```


    When you compare one or more variables, the results can change depending on the
    current value of those variables. However, when using the equal (`==`) comparison
    operator, be careful when working with decimal values. That’s because `45.0` is
    not the same number as `45.0000001`. When working with decimal values, it’s best
    to use greater than or less than comparison operators.


    To see how comparison operators create either a `true` or `false` value, follow
    these steps:


    1. Open the `IntroductoryPlayground` file in Xcode.

    2. Edit the code as follows:


    ```

    import Cocoa

    4 > 9

    23 >= 12

    3.4 < 8.5

    73 <= 29

    3.0 == 3.01

    3.0 != 3.01

    ```


    Notice that the right margin displays the Boolean value of each comparison operator,
    as shown in Figure 7-1.


    ![A437923_1_En_7_Fig1_HTML.jpg](A437923_1_En_7_Fig1_HTML.jpg)


    **Figure 7-1.** Comparison operators always evaluate to a true or false Boolean
    value


    ## Understanding Logical Operators


    Any comparison operator, such as `78 > 9`, evaluates to a `true` or `false` value.
    However, Swift provides special logical operators just for working with two or
    more Boolean values, as shown in Table 7-2.


    **Table 7-2.** Common Logical Operators in Swift


    | Comparison Operator | Purpose |

    |---------------------|---------|

    | `&&`                | And     |

    | `\|\|`                | Or      |

    | `!`                 | Not     |


    Both the And (`&&`) and Or (`||`) logical operators take two Boolean values and
    convert them into a single Boolean value. The Not (`!`) logical operator takes
    one Boolean value and converts it to its opposite. Table 7-3 shows how the Not
    (`!`) logical operator works.


    **Table 7-3.** The Not (`!`) Logical Operator


    | Example  | Value   |

    |----------|---------|

    | `!true`  | False   |

    | `!false` | True    |


    The And (`&&`) operator takes two Boolean values and calculates a single Boolean
    value based on Table 7-4.


    **Table 7-4.** The And (`&&`) Logical Operator in Swift


    | First Boolean Value | Second Boolean Value | Result |

    |---------------------|----------------------|--------|

    | True                | `&&` True            | True   |

    | True                | `&&` False           | False  |

    | False               | `&&` True            | False  |

    | False               | `&&` False           | False  |


    The Or (`||`) operator takes two Boolean values and calculates a single Boolean
    value based on Table 7-5.


    **Table 7-5.** The Or (`||`) Logical Operator in Swift


    | First Boolean Value | Second Boolean Value | Result |

    |---------------------|----------------------|--------|

    | True                | `\|\|` True          | True   |

    | True                | `\|\|` False         | True   |

    | False               | `\|\|` True          | True   |

    | False               | `\|\|` False         | False  |


    To see how Boolean values work with comparison and logical operators, create a
    new playground by following these steps:


    1. Open the `IntroductoryPlayground` file in Xcode.

    2. Edit the code as follows:


    ```

    import Cocoa

    var x, y, z : Int

    x = 35

    y = 120

    z = -48

    x == y

    x < z

    y != z

    z > -48

    // And && operator

    (y != z) && (x > z)

    (y != z) && (x == y)

    (x == y) && (x < z)

    (z > -48) && (x == y)

    // Or || operator

    (y != z) || (x > z)

    (y != z) || (x == y)

    (x == y) || (x < z)

    (z > -48) || (x == y)

    ```


    Figure 7-2 shows how the comparison operators evaluate to `true` or `false` and
    how the logical operators (And and Or) take two Boolean values and return a single
    `true` or `false` value.


    ![A437923_1_En_7_Fig2_HTML.jpg](A437923_1_En_7_Fig2_HTML.jpg)


    **Figure 7-2.** Evaluating Boolean values with comparison and logical operators


    Ultimately every Boolean value must be:


    - A `true` or `false` value

    - A comparison of two values that is `true` or `false`

    - A combination of Boolean values using logical operators that evaluate to `true`
    or `false`'
