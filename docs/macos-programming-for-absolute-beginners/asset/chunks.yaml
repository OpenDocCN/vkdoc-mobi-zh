    \ can choose, as shown in Figure [23-6](#A437923_1_En_23_Chapter.html#Fig6).\n\
    \n    ![A437923_1_En_23_Fig6_HTML.jpg](A437923_1_En_23_Fig6_HTML.jpg)\n\n    Figure\
    \ 23-6.\n\n    Choosing a class file for the window controller  \n5.  Click the\
    \ class name you created (such as `TouchClass`).  \n\nAt this point, your Swift\
    \ class file is connected to the window controller and the Touch Bar. Now you\
    \ can add items to the Touch Bar and create IBOutlets and IBAction methods for\
    \ the Touch Bar in the class file you just chose.\n\n### Adding Items to the Touch\
    \ Bar\n\nThe Object Library contains all of the items you can add to the Touch\
    \ Bar. You can only place Touch Bar items on the Touch Bar, not ordinary buttons\
    \ or labels. To place an item on the Touch Bar, just drag and drop any Touch Bar\
    \ item from the Object Library on to the Touch Bar, as shown in Figure [23-7](#A437923_1_En_23_Chapter.html#Fig7).\n\
    \n![A437923_1_En_23_Fig7_HTML.jpg](A437923_1_En_23_Fig7_HTML.jpg)\n\nFigure 23-7.\n\
    \nDragging an item from the Object Library to the Touch Bar\n\nSome commonly used\
    \ items to use on the Touch Bar include\n\n*   Touch Bar Button: Displays a single\
    \ button\n*   Touch Bar Fixed/Flexible Space: Creates space between multiple Touch\
    \ Bar items\n*   Touch Bar Label: Displays text\n*   Touch Bar Slider: Displays\
    \ a horizontal slider\n\n### Connecting Touch Bar Items to Swift Code\n\nOnce\
    \ you’ve placed one or more items on the Touch Bar, you can Control-drag from\
    \ these Touch Bar items to your Swift class file to create IBOutlets and IBAction\
    \ methods , as shown in Figure [23-8](#A437923_1_En_23_Chapter.html#Fig8).\n\n\
    ![A437923_1_En_23_Fig8_HTML.jpg](A437923_1_En_23_Fig8_HTML.jpg)\n\nFigure 23-8.\n\
    \nControl-dragging from the Touch Bar to a Swift class file\n\nFor many Touch\
    \ Bar items, you may need to write additional Swift code to make them work. If\
    \ your Macintosh does not have a Touch Bar above the keyboard, you can use the\
    \ Xcode Touch Bar simulator. To turn the Touch Bar simulator on, choose Window\
    \ ➤ Show Touch Bar (or press Shift + Command + 5), as shown in Figure [23-9](#A437923_1_En_23_Chapter.html#Fig9).\n\
    \n![A437923_1_En_23_Fig9_HTML.jpg](A437923_1_En_23_Fig9_HTML.jpg)\n\nFigure 23-9.\n\
    \nThe Show Touch Bar command appears on Xcode’s Window menu\n\nIf your Macintosh\
    \ does not have a Touch Bar, you need to run your program, switch to Xcode, choose\
    \ Window ➤ Show Touch Bar, and then switch back to your running program to see\
    \ your program’s simulated Touch Bar on the screen."
  trans: "\n# 创建 Swift 类文件\n\n此时，Touch Bar 已连接到用户界面的窗口，但你还无法编写任何 Swift 代码使其工作，因为窗口控制器尚未定义对应的类文件。\n\
    \n要创建 Swift 类文件，请遵循以下步骤：\n\n1.  选择“文件”➤“新建”➤“文件”。此时会出现模板窗口，如图 23-4 所示。\n\n   \
    \ ![A437923_1_En_23_Fig4_HTML.jpg](img/A437923_1_En_23_Fig4_HTML.jpg)\n\n    图\
    \ 23-4. 选择 Swift Cocoa 类文件  \n\n2.  在 macOS 类别下的“Source”组中，点击“Cocoa Class”。  \n\
    3.  点击“下一步”按钮。此时会出现一个对话框，要求输入类名和子类，如图 23-5 所示。\n\n    ![A437923_1_En_23_Fig5_HTML.jpg](img/A437923_1_En_23_Fig5_HTML.jpg)\n\
    \n    图 23-5. 定义一个类  \n\n4.  点击“Class”文本字段，并输入你的类名，例如 `TouchClass`。  \n5.  确保“Subclass\
    \ of”字段显示为 `NSWindowController`。  \n6.  取消勾选“Also create XIB file for user interface”复选框。\
    \  \n7.  确保“Language”弹出菜单显示为 Swift。  \n8.  点击“下一步”按钮。此时会出现一个“保存”对话框。  \n9.  点击“创建”按钮。Xcode\
    \ 窗口将再次出现。\n\n创建类文件后，需要将其连接到窗口控制器。要将类文件连接到窗口控制器，请执行以下步骤：\n\n1.  点击包含窗口控制器和 Touch\
    \ Bar 的 `.storyboard` 文件。  \n2.  点击窗口顶部中央的蓝色“Window Controller”图标。  \n3.  选择“视图”➤“实用工具”➤“显示身份检查器”。\
    \  \n4.  点击“Class”字段右侧的向下箭头。你将看到一个可选的有效类文件菜单，如图 23-6 所示。\n\n    ![A437923_1_En_23_Fig6_HTML.jpg](img/A437923_1_En_23_Fig6_HTML.jpg)\n\
    \n    图 23-6. 为窗口控制器选择类文件  \n\n5.  点击你创建的类名（例如 `TouchClass`）。\n\n至此，你的 Swift 类文件已连接到窗口控制器和\
    \ Touch Bar。现在，你可以向 Touch Bar 添加项目，并在刚选择的类文件中为 Touch Bar 创建 `IBOutlet` 和 `IBAction`\
    \ 方法。\n\n### 向 Touch Bar 添加项目\n\n对象库包含了所有可以添加到 Touch Bar 的项目。你只能将 Touch Bar 项目放置在\
    \ Touch Bar 上，而不能放置普通的按钮或标签。要将项目放置在 Touch Bar 上，只需从对象库中拖放任意 Touch Bar 项目到 Touch\
    \ Bar 上即可，如图 23-7 所示。\n\n![A437923_1_En_23_Fig7_HTML.jpg](img/A437923_1_En_23_Fig7_HTML.jpg)\n\
    \n图 23-7. 从对象库将项目拖拽到 Touch Bar 上\n\nTouch Bar 上常用的一些项目包括：\n\n*   Touch Bar 按钮：显示一个单独的按钮\n\
    *   Touch Bar 固定/弹性间距：在多个 Touch Bar 项目之间创建间距\n*   Touch Bar 标签：显示文本\n*   Touch\
    \ Bar 滑块：显示水平滑块\n\n### 将 Touch Bar 项目连接到 Swift 代码\n\n在 Touch Bar 上放置一个或多个项目后，你可以按住\
    \ Control 键从这些 Touch Bar 项目拖拽到你的 Swift 类文件，以创建 `IBOutlet` 和 `IBAction` 方法，如图 23-8\
    \ 所示。\n\n![A437923_1_En_23_Fig8_HTML.jpg](img/A437923_1_En_23_Fig8_HTML.jpg)\n\
    \n图 23-8. 从 Touch Bar 按住 Control 键拖拽到 Swift 类文件\n\n对于许多 Touch Bar 项目，你可能需要编写额外的\
    \ Swift 代码才能让它们工作。如果你的 Macintosh 键盘上方没有 Touch Bar，你可以使用 Xcode 的 Touch Bar 模拟器。要启用\
    \ Touch Bar 模拟器，请选择“窗口”➤“显示 Touch Bar”（或按 Shift + Command + 5），如图 23-9 所示。\n\n\
    ![A437923_1_En_23_Fig9_HTML.jpg](img/A437923_1_En_23_Fig9_HTML.jpg)\n\n图 23-9.\
    \ “显示 Touch Bar”命令出现在 Xcode 的“窗口”菜单中\n\n如果你的 Macintosh 没有 Touch Bar，你需要运行你的程序，切换到\
    \ Xcode，选择“窗口”➤“显示 Touch Bar”，然后再切换回正在运行的程序，即可在屏幕上看到程序的模拟 Touch Bar。\n"
- fmt: "# Creating a Touch Bar Program\n\nTo create a sample Touch Bar program and\
    \ see how the Touch Bar simulator works, follow these steps:\n\n1.  From within\
    \ Xcode choose File ➤ New ➤ Project.\n2.  Click Application under the macOS category.\n\
    3.  Click Cocoa Application and click the Next button. Xcode now asks for a product\
    \ name.\n4.  Click in the Product Name text field and type `TouchProgram`.\n5.\
    \  Make sure the Language pop-up menu displays Swift and that the \"Use Storyboards\"\
    \ check box is selected.\n6.  Click the Next button. Xcode asks where you want\
    \ to store the project.\n7.  Choose a folder to store your project and click the\
    \ Create button.\n8.  Click the `Main.storyboard` file in the Project Navigator.\n\
    9.  Choose View ➤ Utilities ➤ Show Object Library to display the Object Library\
    \ in the bottom right corner of the Xcode window.\n10.  Click in the search field\
    \ at the bottom of the Object Library and type `touch`. The Object Library only\
    \ displays Touch Bar items (see Figure [23-1](#A437923_1_En_23_Chapter.html#Fig1)).\n\
    11.  Drag and drop the Touch Bar item over the window controller (see Figure [23-2](#A437923_1_En_23_Chapter.html#Fig2)).\
    \ The Touch Bar appears underneath the window controller.\n12.  Drag a Touch Bar\
    \ button, Touch Bar color picker, and Touch Bar slider on to the Touch Bar, as\
    \ shown in Figure [23-10](#A437923_1_En_23_Chapter.html#Fig10).\n\n![A437923_1_En_23_Fig10_HTML.jpg](A437923_1_En_23_Fig10_HTML.jpg)\n\
    \nFigure 23-10. The Touch Bar with a button, color picker, and slider\n\n13. \
    \ Choose File ➤ New ➤ File. A template dialog appears (see Figure [23-4](#A437923_1_En_23_Chapter.html#Fig4)).\n\
    14.  Click Cocoa Class in the Source group under the macOS category and click\
    \ the Next button. A dialog appears asking for a class name and subclass (see\
    \ Figure [23-5](#A437923_1_En_23_Chapter.html#Fig5)).\n15.  Click in the Class\
    \ text field and type `TouchClass`.\n16.  Clear the \"Also create XIB file for\
    \ user interface\" check box.\n17.  Make sure the \"Subclass of\" field contains\
    \ `NSWindowController` and the Language pop-up menu displays Swift.\n18.  Click\
    \ the Next button. A Save dialog appears.\n19.  Click the Create button. The Xcode\
    \ window appears again.\n20.  Click the `Main.storyboard` file in the Navigator\
    \ pane.\n21.  Click the blue Window Controller icon in the top, middle of the\
    \ window, as shown in Figure [23-11](#A437923_1_En_23_Chapter.html#Fig11).\n\n\
    ![A437923_1_En_23_Fig11_HTML.jpg](A437923_1_En_23_Fig11_HTML.jpg)\n\nFigure 23-11.\
    \ Clicking the blue Window Controller icon selects that window controller\n\n\
    22.  Choose View ➤ Utilities ➤ Show Identity Inspector.\n23.  Click the downward-pointing\
    \ arrow to the right of the Class field. See the menu of valid class files you\
    \ can choose (see Figure [23-6](#A437923_1_En_23_Chapter.html#Fig6)).\n24.  Choose\
    \ `TouchClass`.\n25.  Choose View ➤ Assistant Editor ➤ Show Assistant Editor.\
    \ The Touch Bar appears in the left half and the `TouchClass.swift` file appears\
    \ in the right half of the middle pane of Xcode.\n26.  Move the mouse pointer\
    \ over the Touch Bar button.\n27.  Hold down the Control key and drag the mouse\
    \ from the Touch Bar button to under the `class TouchClass` line, as shown in\
    \ Figure [23-12](#A437923_1_En_23_Chapter.html#Fig12).\n\n![A437923_1_En_23_Fig12_HTML.jpg](A437923_1_En_23_Fig12_HTML.jpg)\n\
    \nFigure 23-12. Control-dragging from the Touch Bar to the Swift class file\n\n\
    28.  Release the Control key and the left mouse button. A pop-up window appears.\n\
    29.  Click in the Name text field and type `touchButton` and then click the Connect\
    \ button. This creates an `IBOutlet` to the Touch Bar button:\n\n```\n@IBOutlet\
    \ weak var touchButton: NSButton!\n```\n\n30.  Move the mouse pointer over the\
    \ Touch Bar color picker icon.\n31.  Hold down the Control key and drag the mouse\
    \ from the Touch Bar button to under the `class TouchClass` line.\n32.  Click\
    \ in the Name text field and type `colorIcon` and then click the Connect button.\
    \ This creates an `IBOutlet` to the Touch Bar color picker:\n\n```\n@IBOutlet\
    \ weak var colorIcon: NSColorPickerTouchBarItem!\n```\n\n33.  Add the following\
    \ line above the `class TouchClass` line:\n\n```\n@available(OSX 10.12.1, *)\n\
    class TouchClass: NSWindowController {\n```\n\nThis line of Swift code means your\
    \ program can only run on Macintosh computers that have macOS 10.12.1 or greater\
    \ installed.\n\n34.  Move the mouse pointer over the Touch Bar color picker slider.\n\
    35.  Hold down the Control key and drag the mouse from the Touch Bar button to\
    \ under the `class TouchClass` line.\n36.  Click in the Name text field and type\
    \ `touchSlider` and then click the Connect button. This creates an `IBOutlet`\
    \ to the Touch Bar color picker:\n\n```\n@IBOutlet weak var touchSlider: NSSliderAccessory!\n\
    ```\n\n37.  Add the following line above the `class TouchClass` line as shown\
    \ below:\n\n```\n@available(OSX 10.12.2, *)\n```\n\nAt this point, you've created\
    \ a Touch Bar and added items to it. You've also created `IBOutlet`s that represent\
    \ each Touch Bar item. Now the final step is to write Swift code to make each\
    \ of these Touch Bar items work.\n\nTo write Swift code for your Touch Bar items,\
    \ follow these steps:\n\n1.  Move the mouse pointer over the Touch Bar button.\n\
    2.  Hold down the Control key and drag the mouse from the Touch Bar button to\
    \ above the last curly bracket in the `TouchClass.swift` file.\n3.  Release the\
    \ Control key and the left mouse button. A pop-up window appears.\n4.  Click in\
    \ the Connection pop-up menu and choose Action.\n5.  Click in the Name text field\
    \ and type `buttonClicked`.\n6.  Click in the Type pop-up menu and choose `NSButton`.\
    \ Then click the Connect button to create an `IBAction` method.\n7.  Move the\
    \ mouse pointer over the Touch Bar color picker icon.\n8.  Hold down the Control\
    \ key and drag the mouse from the Touch Bar button to above the last curly bracket\
    \ in the `TouchClass.swift` file.\n9.  Release the Control key and the left mouse\
    \ button. A pop-up window appears.\n10.  Click in the Connection pop-up menu and\
    \ choose Action.\n11.  Click in the Name text field and type `colorPicked`.\n\
    12.  Click in the Type pop-up menu and choose `NSColorPickerTouchBarItem`, as\
    \ shown in Figure [23-13](#A437923_1_En_23_Chapter.html#Fig13).\n\n![A437923_1_En_23_Fig13_HTML.jpg](A437923_1_En_23_Fig13_HTML.jpg)\n\
    \nFigure 23-13. Creating an IBAction method for the color picker icon\n\n13. \
    \ Click the Connect button to create an `IBAction` method.\n14.  Click the Show\
    \ Document Outline icon to display all the parts of your user interface. The Document\
    \ Outline makes it easy to select the right Touch Bar item. The Touch Bar slider\
    \ consists of a slider and a horizontal slider. If you click the slider on the\
    \ Touch Bar directly, you may accidentally select the horizontal slider instead\
    \ of the slider.\n15.  Move the mouse pointer over the Slider icon.\n16.  Hold\
    \ down the Control key and drag the mouse from the touch bar button to above the\
    \ last curly bracket in the `TouchClass.swift` file, as shown in Figure [23-14](#A437923_1_En_23_Chapter.html#Fig14).\n\
    \n![A437923_1_En_23_Fig14_HTML.jpg](A437923_1_En_23_Fig14_HTML.jpg)\n\nFigure\
    \ 23-14. Dragging from the Document Outline\n\n17.  Release the Control key and\
    \ the left mouse button. A pop-up window appears.\n18.  Click in the Connection\
    \ pop-up menu and choose Action.\n19.  Click in the Name text field and type `sliderChanged`.\n\
    20.  Click in the Type pop-up menu and choose `NSSliderTouchBarItem`. Then click\
    \ the Connect button.\n21.  Modify the three `IBAction` methods as follows:\n\n\
    ```\n@IBAction func buttonClicked(_ sender: NSButton) {\n    print (\"Message\
    \ from the Touch Bar\")\n}\n@IBAction func colorPicked(_ sender: NSColorPickerTouchBarItem)\
    \ {\n    print (\"\\(colorIcon.color.cgColor)\")\n}\n@IBAction func sliderChanged(_\
    \ sender: NSSliderTouchBarItem) {\n    print (\"Slider value = \\(sender.slider.intValue)\"\
    )\n}\n```\n\n22.  Modify the `windowDidLoad` function by typing `colorIcon.isEnabled\
    \ = true` as follows:"
