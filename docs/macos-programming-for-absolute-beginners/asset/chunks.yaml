- fmt: "# How Programmers Work\n\nIn the early days, a single programmer could get\
    \ an idea and write code to make that program work. Nowadays, programs are far\
    \ more complicated and user expectations are much higher, so you need to design\
    \ your program before writing any code. In fact, most programmers actually don’t\
    \ spend much of their time writing or editing code at all. Instead, programmers\
    \ spend the bulk of their time thinking, planning, organizing, and designing programs.\n\
    \nWhen a programmer has an idea for a program, the first step is to decide if\
    \ that idea is even any good. Programs must solve a specific type of problem.\
    \ For example, word processors make it easy to write, edit, and format text. Spreadsheets\
    \ make it easy to type in numbers and calculate new results from those numbers.\
    \ Presentation programs make it easy to type text and insert graphics to create\
    \ a slideshow. Even video games solve the problem of relieving boredom by offering\
    \ a challenging puzzle or goal for players to achieve.\n\n> **Note**  \n> The\
    \ number one biggest failure of software development is not defining a specific\
    \ problem to solve. The second biggest failure of software development is identifying\
    \ a specific problem to solve but underestimating the complexity of the steps\
    \ needed to solve that problem. You have to know what problem to solve and how\
    \ to solve that problem. If you don’t know either one, you can’t write a useful\
    \ program.\n\nOnce you have an idea for a problem to solve, the next step is defining\
    \ how to solve that problem. Some problems are simply too difficult to solve.\
    \ For example, how would you write a program to write a best-selling novel? You\
    \ may be able to write a program that can help you write a novel, but unless you\
    \ know exactly how to create a best-selling novel predictably, you simply can’t\
    \ write such a program.\n\nKnowing a problem to solve is your target. Once you\
    \ clearly understand your problem, you need to identify all the steps needed to\
    \ solve that problem. If you don’t know how to solve a particular problem, you\
    \ won’t be able to tell a computer how to solve that problem either.\n\nAfter\
    \ defining the steps needed to solve a problem, now you can finally write your\
    \ program. Generally, you write your program in parts and test each part before\
    \ continuing. In this way, you gradually expand the capabilities of your program\
    \ while making sure that each part works correctly.\n\nThe main steps you go through\
    \ while using `Xcode` are:\n\n- Write code and design your user interface\n- Edit\
    \ your code and user interface\n- Run and test your program\n\nWhen your program\
    \ is finally done, guess what? It’s never done. There will always be errors you’ll\
    \ need to fix and new features you’ll want to add. Programmers actually spend\
    \ more time editing and modifying existing programs than they ever do creating\
    \ new programs.\n\nWhen you write and edit code, you use an editor, which is a\
    \ program that resembles a word processor that lets you type and edit text. When\
    \ you design and modify your user interface, you use a feature in `Xcode` called\
    \ `Interface Builder`, which resembles a drawing program that lets you drag, drop,\
    \ and resize objects on the screen. When you run and test your program, you use\
    \ a compiler, which converts (or compiles) your `Swift` code into an actual working\
    \ `macOS` program.\n\nTo create a `macOS` program, you just need a copy of `Xcode`,\
    \ which is Apple’s free programming tool that you can download from the `Mac App\
    \ Store`. With `Xcode` installed on your `Macintosh`, you can create your own\
    \ programs for free just by learning `Xcode` and `Swift`.\n\n## Summary\n\nTo\
    \ learn how to write programs for the `Macintosh`, you need to learn several separate\
    \ skills. First, you need to understand the basic principles of programming. This\
    \ includes organizing instructions in sequences, loops, or branches, and understanding\
    \ structured programming techniques, event-driven programming, and object-oriented\
    \ programming.\n\nSecond, you need to learn a specific programming language. For\
    \ the `Macintosh`, you’ll be learning `Swift`. That means you’ll learn the keywords\
    \ used in `Swift` along with learning how to write and organize your `Swift` code\
    \ in separate files.\n\nThird, you need to know how to use `Xcode`, which is Apple’s\
    \ programming tool for creating `macOS` and `iOS` apps. `Xcode` lets you write\
    \ and edit `Swift` code as well as letting you visually design and modify your\
    \ user interface.\n\nFourth, you need to learn how to use Apple’s `Cocoa` framework\
    \ so you can focus solely on writing instructions that make your program do something\
    \ unique.\n\nWhether you want to write your own software to sell, or sell your\
    \ programming skills to create custom software for others, you’ll find that programming\
    \ is a skill that anyone can learn.\n\nRemember, programming is nothing more than\
    \ problem-solving. By knowing how to solve problems using `Swift` and `Xcode`,\
    \ you can create your own programs for the `Macintosh` much easier and far faster\
    \ than you might think."
  raw: '## How Programmers Work


    In the early days, a single programmer could get an idea and write code to make
    that program work. Nowadays, programs are far more complicated and user expectations
    are much higher, so you need to design your program before writing any code. In
    fact, most programmers actually don’t spend much of their time writing or editing
    code at all. Instead, programmers spend the bulk of their time thinking, planning,
    organizing, and designing programs.


    When a programmer has an idea for a program, the first step is to decide if that
    idea is even any good. Programs must solve a specific type of problem. For example,
    word processors make it easy to write, edit, and format text. Spreadsheets make
    it easy to type in numbers and calculate new results from those numbers. Presentation
    programs make it easy to type text and insert graphics to create a slideshow.
    Even video games solve the problem of relieving boredom by offering a challenging
    puzzle or goal for players to achieve.


    Note


    The number one biggest failure of software development is not defining a specific
    problem to solve. The second biggest failure of software development is identifying
    a specific problem to solve but underestimating the complexity of the steps needed
    to solve that problem. You have to know what problem to solve and how to solve
    that problem. If you don’t know either one, you can’t write a useful program.


    Once you have an idea for a problem to solve, the next step is defining how to
    solve that problem. Some problems are simply too difficult to solve. For example,
    how would you write a program to write a best-selling novel? You may be able to
    write a program that can help you write a novel, but unless you know exactly how
    to create a best-selling novel predictably, you simply can’t write such a program.


    Knowing a problem to solve is your target. Once you clearly understand your problem,
    you need to identify all the steps needed to solve that problem. If you don’t
    know how to solve a particular problem, you won’t be able to tell a computer how
    to solve that problem either.


    After defining the steps needed to solve a problem, now you can finally write
    your program. Generally, you write your program in parts and test each part before
    continuing. In this way, you gradually expand the capabilities of your program
    while making sure that each part works correctly.


    The main steps you go through while using Xcode are


    *   Write code and design your user interface

    *   Edit your code and user interface

    *   Run and test your program


    When your program is finally done, guess what? It’s never done. There will always
    be errors you’ll need to fix and new features you’ll want to add. Programmers
    actually spend more time editing and modifying existing programs than they ever
    do creating new programs.


    When you write and edit code, you use an editor, which is a program that resembles
    a word processor that lets you type and edit text. When you design and modify
    your user interface, you use a feature in Xcode called Interface Builder, which
    resembles a drawing program that lets you drag, drop, and resize objects on the
    screen. When you run and test your program, you use a compiler, which converts
    (or compiles) your Swift code into an actual working macOS program.


    To create a macOS program , you just need a copy of Xcode, which is Apple’s free
    programming tool that you can download from the Mac App Store. With Xcode installed
    on your Macintosh, you can create your own programs for free just by learning
    Xcode and Swift.


    ## Summary


    To learn how to write programs for the Macintosh , you need to learn several separate
    skills. First, you need to understand the basic principles of programming. This
    includes organizing instructions in sequences, loops, or branches, and understanding
    structured programming techniques, event-driven programming, and object-oriented
    programming.


    Second, you need to learn a specific programming language. For the Macintosh,
    you’ll be learning Swift. That means you’ll learn the keywords used in Swift along
    with learning how to write and organize your Swift code in separate files.


    Third, you need to know how to use Xcode, which is Apple’s programming tool for
    creating macOS and iOS apps. Xcode lets you write and edit Swift code as well
    as letting you visually design and modify your user interface.


    Fourth, you need to learn how to use Apple’s Cocoa framework so you can focus
    solely on writing instructions that make your program do something unique.


    Whether you want to write your own software to sell, or sell your programming
    skills to create custom software for others, you’ll find that programming is a
    skill that anyone can learn.


    Remember, programming is nothing more than problem-solving. By knowing how to
    solve problems using Swift and Xcode, you can create your own programs for the
    Macintosh much easier and far faster than you might think.'
  trans: "# 程序员是如何工作的\n\n早期，一名程序员可以产生一个想法，然后直接编写代码让这个程序运行起来。如今，程序要复杂得多，用户期望也高得多，因此在编写任何代码之前，你需要先设计你的程序。事实上，大多数程序员实际上并不会花大量时间编写或编辑代码。相反，程序员的大部分时间都用于思考、规划、组织和设计程序。\n\
    \n当程序员有了一个程序构想时，第一步是判断这个想法是否真的有价值。程序必须解决特定类型的问题。例如，文字处理软件让编写、编辑和格式化文本变得容易。电子表格软件让输入数字并根据这些数字计算结果变得简单。演示文稿软件让输入文本和插入图形来创建幻灯片变得方便。甚至电子游戏也是通过提供具有挑战性的谜题或目标让玩家去达成，来解决缓解无聊的问题。\n\
    \n> **注意**  \n> 软件开发最大的失败是未能定义要解决的具体问题。软件开发第二大的失败是确定了要解决的具体问题，但却低估了解决该问题所需步骤的复杂性。你必须知道要解决什么问题以及如何解决这个问题。如果你两者都不知道，就无法编写出有用的程序。\n\
    \n一旦你有了要解决的问题的想法，下一步就是定义如何解决这个问题。有些问题实在过于困难而无法解决。例如，你怎么写一个程序来写一本畅销小说？你也许可以写一个程序来帮助你写小说，但除非你确切知道如何可预测地创作出一本畅销小说，否则你根本无法写出这样的程序。\n\
    \n知道要解决的问题就是你的目标。一旦你清楚理解了你的问题，你需要找出解决该问题所需的所有步骤。如果你不知道如何解决某个特定问题，那么你也就无法告诉计算机如何解决这个问题。\n\
    \n在定义了解决问题所需的步骤之后，现在你终于可以编写程序了。通常，你会分部分编写程序，并在继续之前测试每个部分。通过这种方式，你逐步扩展程序的功能，同时确保每个部分都能正确工作。\n\
    \n使用 `Xcode` 时，你经历的主要步骤是：\n\n- 编写代码和设计用户界面\n- 编辑代码和用户界面\n- 运行和测试你的程序\n\n当你的程序终于完成时，猜猜看？它永远不会真正完成。总会有需要修复的错误，以及想要添加的新功能。程序员实际上花在编辑和修改现有程序上的时间，比他们创建新程序的时间还要多。\n\
    \n当你编写和编辑代码时，你会使用一个编辑器，这是一个类似于文字处理程序的程序，可以让你输入和编辑文本。当你设计和修改用户界面时，你会使用 `Xcode`\
    \ 中一个名为 `Interface Builder` 的功能，它类似于一个绘图程序，可以让你在屏幕上拖拽、放置和调整对象大小。当你运行和测试程序时，你会使用编译器，它将你的\
    \ `Swift` 代码转换（或编译）成一个实际可运行的 `macOS` 程序。\n\n要创建一个 `macOS` 程序，你只需要一份 `Xcode` 的副本，这是苹果公司提供的免费编程工具，你可以从\
    \ `Mac App Store` 下载。在 `Macintosh` 上安装了 `Xcode` 后，你只需学习 `Xcode` 和 `Swift`，就可以免费创建自己的程序。\n\
    \n## 总结\n\n要学习如何为 `Macintosh` 编写程序，你需要学习几种不同的技能。首先，你需要理解编程的基本原理。这包括将指令组织成顺序、循环或分支结构，并理解结构化编程技术、事件驱动编程和面向对象编程。\n\
    \n其次，你需要学习一门特定的编程语言。对于 `Macintosh`，你将学习 `Swift`。这意味着你将学习 `Swift` 中使用的关键字，并学习如何在不同文件中编写和组织你的\
    \ `Swift` 代码。\n\n第三，你需要知道如何使用 `Xcode`，这是苹果公司用于创建 `macOS` 和 `iOS` 应用的编程工具。`Xcode`\
    \ 让你能够编写和编辑 `Swift` 代码，同时还能让你以可视化方式设计并修改用户界面。\n\n第四，你需要学习如何使用苹果的 `Cocoa` 框架，这样你就可以专注于编写让程序实现独特功能的指令。\n\
    \n无论你是想编写自己的软件进行销售，还是想出售你的编程技能为他人创建定制软件，你都会发现编程是一项任何人都能学会的技能。\n\n请记住，编程无非就是解决问题。通过了解如何使用\
    \ `Swift` 和 `Xcode` 来解决问题，你就能为自己创建 `Macintosh` 程序，而且会比想象中更容易也更快。"
- fmt: '# 2. Getting to Know Xcode 8


    To write programs in Swift for the Macintosh, you need to use Xcode. Apple developed
    Xcode as a professional programming tool that they give away free to encourage
    everyone to write software for macOS and their other operating systems such as
    iOS, tvOS, and watchOS. Despite being a free program, Xcode is a powerful program
    used by major companies including Microsoft, Adobe, Google, and even Apple. With
    Xcode on a Macintosh, you have one of the most powerful programming tools for
    creating macOS programs and iOS, tvOS, and watchOS apps.


    Although Xcode contains dozens of features specifically for professional programmers,
    anyone can learn to use Xcode. Xcode’s sheer number of features may seem confusing
    and intimidating at first glance, but relax. To use Xcode, you don''t need to
    learn every possible feature. Instead, you can just learn the handful of features
    you need and ignore all the rest. As you get more experienced, you can gradually
    learn Xcode''s other features. However, you may never use all of Xcode''s features.


    Xcode lets you create a macOS program or an iOS, tvOS, or watchOS app from start
    to finish without ever needing another program. Within Xcode you can do the following:


    - Create a new project.

    - Write and edit Swift code.

    - Design and modify user interfaces.

    - Manage files that make up a single project.

    - Run and test your project.

    - Debug your Swift code.


    You can download and install Xcode for free through the Mac App Store. On your
    Macintosh, just click the Apple menu and choose App Store. When the App Store
    window appears, click in the Search text field in the upper right corner, type
    `Xcode`, and press Return. Click the button underneath the Xcode icon to download
    it, as shown in Figure 2-1. Since Xcode is a fairly large file, you''ll need a
    fast Internet connection and plenty of disk space to install it on your Macintosh.


    ![A437923_1_En_2_Fig1_HTML.jpg](A437923_1_En_2_Fig1_HTML.jpg)


    Figure 2-1. When you search for Xcode, it will likely appear in the upper left
    corner of the App Store window


    The four most common parts of Xcode you''ll use regularly are:


    - The project manager

    - The editor

    - Interface Builder

    - The compiler


    A project represents a single macOS or iOS, tvOS, or watchOS program. In the old
    days when programs were simple, you could store code in a single file. Now with
    programs being much larger and more complicated, it''s far more common to store
    code in separate files. A collection of files that work together form a single
    project, so the Xcode project manager lets you create, rearrange, and delete files
    within a project.


    Every project contains a code file, identified by the `.swift` file extension.
    Code files are where you store, edit, and type Swift code. By using Xcode’s editor,
    you can open a code file, copy and paste code, delete code, and write new code
    to save in that file. An editor basically acts like a simple word processor designed
    just for helping you write code in the Swift programming language.


    Besides a code file containing Swift code, every project also contains a user
    interface stored in a separate file identified by the `.xib` or `.storyboard`
    file extension. A simple program might only have a single file containing its
    user interface but a more complicated program might have several files containing
    different parts of the user interface. The feature in Xcode that lets you design,
    create, and modify user interfaces is called Interface Builder.


    After you''ve written Swift code and designed your user interface, you''ll need
    to convert all the files in your project into an actual working program. The process
    of translating Swift code into a language that the computer can understand (called
    machine code) is called compiling, so the part of Xcode that does this is called
    a compiler.


    You''ll often use these four main parts of Xcode in different order. For example,
    you may create a project and modify its files using the project manager feature.
    Then you may use the editor to write Swift code and Interface Builder to design
    your user interface. Finally, you''ll test your program using the compiler. If
    problems occur, you''ll likely go back to the editor or Interface Builder as many
    times as necessary until your program works correctly. You may even create new
    files and rearrange them in the project manager.


    Ultimately, there is no single "best" or "right" way to use Xcode. Xcode offers
    features for you to use whenever you need them.


    ## Giving Commands to Xcode


    Like many programs, Xcode offers multiple ways to do the exact same task. For
    example, to open a project, you can choose File ➤ Open or press `Command + O`.
    In general, Xcode typically offers three ways to perform common types of commands:


    - Use the pull-down menus from the menu bar that appears at the top of the screen.

    - Press a unique keystroke combination such as `Command + O`.

    - Click an icon that represents a command.


    Pull-down menus can be convenient to help you find specific commands, but they
    can be slower and clumsier to use because you have to click a menu title to pull
    down a menu, and then you have to click a command that appears on that menu.


    Keystroke combinations are faster and easier, but they force you to memorize cryptic
    keystroke combinations for commonly used commands. To help you learn which commands
    have keystroke combinations, look on each pull-down menu and you''ll see keystroke
    combinations displayed to the right of different commands, as shown in Figure
    2-2. (However, not all commands have keystroke combinations.)


    ![A437923_1_En_2_Fig2_HTML.jpg](A437923_1_En_2_Fig2_HTML.jpg)


    Figure 2-2. Keystroke combinations appear to the right of commands on pull-down
    menus


    Keystroke combinations usually include a modifier key plus a letter or function
    key. The four modifier keys include Command, Control, Option, and Shift, as shown
    in Figure 2-3.


    ![A437923_1_En_2_Fig3_HTML.jpg](A437923_1_En_2_Fig3_HTML.jpg)


    Figure 2-3. Symbols used to represent common modifier keys


    Clicking icons to choose a command may be the fastest method of all, but you have
    to know the command that each icon represents. To help you understand what an
    icon does, just move the mouse pointer over an icon and wait a few seconds. A
    tiny window will appear, briefly describing the purpose of that icon; see Figure
    2-4.


    ![A437923_1_En_2_Fig4_HTML.jpg](A437923_1_En_2_Fig4_HTML.jpg)


    Figure 2-4. Hovering the mouse pointer over an icon displays a brief description
    of that icon’s function


    Some people only use pull-down menus, others rely more on icons and keystroke
    shortcuts, and others use a mix of all three methods. Generally, people begin
    with pull-down menus but when they start using the same commands often, they gradually
    switch to icons and keystroke shortcuts.


    Choose whatever method you like but be aware that you almost always have alternatives.
    The main point is to get comfortable using Xcode via your preferred method so
    you can spend more time being creative and less time trying to find the commands
    you need.'
