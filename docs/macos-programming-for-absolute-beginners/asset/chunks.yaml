  raw: "### Using Conditional Breakpoints\n\nBreakpoints normally stop program execution\
    \ at a specific line every time. However, you may want to stop program execution\
    \ on a particular line only if a certain condition holds true, such as if a variable\
    \ exceeds a certain value, which can signal when something has gone wrong.\n\n\
    To see how a conditional breakpoint works, follow these steps:\n\n1.  Make sure\
    \ the DebugProgram project is loaded in Xcode.  \n2.  Click the `AppDelegate.swift`\
    \ file in the Project Navigator pane.  \n3.  Place a breakpoint on the following\
    \ line by clicking in the left margin or moving the cursor in the line and pressing\
    \ Command + \\ or choosing Debug ➤ Breakpoints ➤ Add Breakpoint at Current Line:\n\
    \n    ```\n    print (myMessage + \"\\(C2F(temp))\")\n    ```\n\n4.  Choose View\
    \ ➤ Navigators ➤ Show Breakpoint Navigator. The Breakpoint Navigator pane appears,\
    \ showing the breakpoint you just created.  \n5.  Right-click the breakpoint in\
    \ the Breakpoint Navigator pane and choose Edit Breakpoint. A pop-up window appears,\
    \ as shown in Figure [27-13](#A437923_1_En_27_Chapter.html#Fig13).\n\n    ![A437923_1_En_27_Fig13_HTML.jpg](A437923_1_En_27_Fig13_HTML.jpg)\n\
    \n    Figure 27-13.\n\n    The symbolic breakpoint halts program execution in\
    \ the C2F function defined by the Symbol text field  \n6.  Click in the Condition\
    \ text field and type temp ➤ 1 and press Return.  \n7.  Choose Product ➤ Run.\
    \ Xcode highlights your breakpoint to temporarily stop program execution, which\
    \ means that the condition (temp ➤ 1) must be true.  \n8.  Choose Product ➤ Stop\
    \ to halt and exit out of your program and return back to Xcode.  \n9.  Choose\
    \ View ➤ Navigators ➤ Show Breakpoint Navigator, right-click the breakpoint you\
    \ created, and choose Edit Breakpoint. The pop-up window appears.  \n10.  Click\
    \ in the Condition text field and edit the text so it reads (temp ➤ 500). Press\
    \ Return.  \n11.  Choose Product ➤ Run. Notice that this time your breakpoint\
    \ does not stop program execution because its condition (temp ➤ 500) is not true.\
    \ Because the breakpoint didn’t stop your program, your program’s blank user interface\
    \ appears.  \n12.  Choose DebugProgram ➤ Quit DebugProgram.  \n13.  Drag the breakpoint\
    \ away from the left margin and release the left mouse button to delete the breakpoint.\
    \ (You can also right-click the breakpoint in the Breakpoint Navigator pane and\
    \ choose Delete Breakpoint.)\n\n## Summary\n\nErrors or bugs are unavoidable in\
    \ any program. While syntax errors are easy to find and fix, logic errors can\
    \ be tougher to find because you thought your code would create one type of result\
    \ but it winds up creating a different result. Now you’re left trying to figure\
    \ out what you did wrong when you thought you were doing everything right. More\
    \ difficult to track down are runtime errors, which occur seemingly at random\
    \ because of unknown conditions that affect a program\n\nTo help you track down\
    \ and eliminate most bugs, you can use the `print` command along with comments,\
    \ but for more robust debugging, you should use Xcode’s built-in debugger. With\
    \ the debugger you can set breakpoints in your code and watch how values get stored\
    \ in one or more variables.\n\nA conditional breakpoint only stops program execution\
    \ when a certain condition occurs. A symbolic breakpoint only stops program execution\
    \ when a specific function or method gets called. Once a breakpoint stops a program,\
    \ you can continue examining your code line by line using various step commands.\
    \ The `step into` command lets you view code stored inside a function or method\
    \ while the `step out` command lets you prematurely exit out of a function or\
    \ method and jump back to the function or method call.\n\nBy using breakpoints\
    \ and step commands, you can exhaustively examine how your program works, line\
    \ by line, to eliminate as many errors as possible. The fewer errors your program\
    \ contains, the happier your users will be.\n\n# 28. Planning a Program Before\
    \ and After Coding\n\nBefore you invest days, weeks, months, or years working\
    \ on a program, make sure the world even wants your program in the first place.\
    \ If you’re writing a program for yourself, then you can ignore what the rest\
    \ of the world thinks. However, if you plan on selling your programs to others,\
    \ make sure your program has a future before you even begin.\n\nHere’s one way\
    \ to determine if there’s a market for your program. Look for competition. Most\
    \ people think it’s better to target a market with no competition, but if there’s\
    \ no competition, this could be a big clue that there’s also no market.\n\nHowever,\
    \ if you look for a market loaded with lots of competitors, this means there’s\
    \ a thriving market for that type of program. Just do a quick search for lottery\
    \ picking software or astrology programs and you’ll find plenty of competition.\
    \ The more competition, the more active the market.\n\nIf only one or two big\
    \ companies dominate a particular market, chances are good that the opportunity\
    \ in that market has already passed. For example, despite the availability of\
    \ macOS and Linux, Windows is still the dominant operating system for PCs. Similarly,\
    \ iOS and Android dominate the mobile computer market so you’ll probably waste\
    \ your time trying to write a rival operating system to compete against Windows,\
    \ Android, or iOS.\n\nLikewise, there are only a handful of major word processors,\
    \ spreadsheets, and presentation programs on the market today, which means trying\
    \ to write another general word processor, spreadsheet, or presentation program\
    \ will likely be an exercise in futility.\n\nLots of competition means an active\
    \ market. Little or no competition means that the market has probably already\
    \ settled on a leader and your program likely will never be able to overthrow\
    \ that leader. Trying to convince people to buy your word processor instead of\
    \ using Microsoft Word or Pages will likely be a waste of time.\n\nSo look for\
    \ niche markets. For example, the word processor market may already be dominated\
    \ by Microsoft Word, but specialized word processors are still in demand. Although\
    \ Microsoft Word can be used to write screenplays and novels, it’s not optimized\
    \ for that purpose. That’s why other companies can successfully sell screenplay-writing\
    \ word processors or novel-writing word processors that help you organize your\
    \ ideas.\n\nSuch specialized niches are too small for big companies to worry about,\
    \ which means you’ll never have to compete directly against any of these big companies.\
    \ Besides targeting niche markets that big companies ignore, a second approach\
    \ is to find out what the big companies are lacking in their software, and then\
    \ write a program that solves that missing need.\n\nFor example, Microsoft Office\
    \ offers a password protection feature to lock files. However, Microsoft’s encryption\
    \ feature is weak and easily broken. As a result, there’s a market for software\
    \ that can encrypt files much better than Microsoft Office while offering a similar\
    \ user interface as Microsoft Office.\n\nMost importantly, write a program because\
    \ you’re interested in that particular field, not because you think it will make\
    \ you a lot of money. There may be money selling real estate management software\
    \ or software for controlling drones, but unless you’re interested in those fields,\
    \ you likely won’t have the passion or long-term interest to spend the long hours\
    \ needed to develop and market a program for those users.\n\nAs a general rule,\
    \ avoid competing directly against a big company. Even Apple couldn’t compete\
    \ against Microsoft Windows for the PC operating system market and a free offering\
    \ like Linux hasn’t succeeded much against Windows either.\n\nInstead of directly\
    \ competing against a big company, look for niche markets that are too small for\
    \ big companies to tackle, or look for ways to supplement a big company’s existing\
    \ programs. Above all, look for a problem in a field that you’re passionately\
    \ committed to solving and this will give you the motivation to create the best\
    \ program possible."
  trans: "\n### 使用条件断点\n\n普通断点通常会在每次执行到特定行时停止程序。然而，你可能希望仅当某个条件成立时才在特定行停止程序执行，例如当某个变量超过特定值时，这可能是程序出现问题的信号。\n\
    \n要了解条件断点的工作原理，请按照以下步骤操作：\n\n1. 确保 `DebugProgram` 项目已在 Xcode 中加载。\n2. 在项目导航器窗格中点击\
    \ `AppDelegate.swift` 文件。\n3. 通过点击左侧页边距，或将光标移至该行并按 Command + \\，或选择“调试”➤“断点”➤“在当前行添加断点”，在下面这行设置一个断点：\n\
    \n    ```\n    print (myMessage + \"\\(C2F(temp))\")\n    ```\n\n4. 选择“视图”➤“导航器”➤“显示断点导航器”。断点导航器窗格出现，显示你刚刚创建的断点。\n\
    5. 在断点导航器窗格中右键点击该断点，并选择“编辑断点”。此时会弹出一个窗口，如图 27-13 所示。\n\n    ![A437923_1_En_27_Fig13_HTML.jpg](img/A437923_1_En_27_Fig13_HTML.jpg)\n\
    \n    图 27-13.\n    该符号断点在由“符号”文本字段定义的 `C2F` 函数中暂停程序执行。\n\n6. 点击“条件”文本字段，输入 `temp\
    \ ➤ 1` 然后按 Return 键。\n7. 选择“产品”➤“运行”。Xcode 会高亮你的断点以临时暂停程序执行，这意味着条件 (`temp ➤ 1`)\
    \ 必须为真。\n8. 选择“产品”➤“停止”以暂停并退出程序，然后返回 Xcode。\n9. 选择“视图”➤“导航器”➤“显示断点导航器”，右键点击你创建的断点，并选择“编辑断点”。弹出窗口出现。\n\
    10. 点击“条件”文本字段，将文本编辑为 (`temp ➤ 500`)。按 Return 键。\n11. 选择“产品”➤“运行”。请注意，这次你的断点没有停止程序执行，因为它的条件\
    \ (`temp ➤ 500`) 不成立。由于断点未停止程序，程序的空白用户界面出现了。\n12. 选择“DebugProgram”➤“退出 DebugProgram”。\n\
    13. 将断点从左侧页边距拖走，松开鼠标左键以删除该断点。（你也可以在断点导航器窗格中右键点击该断点，并选择“删除断点”。）\n\n## 总结\n\n任何程序中都难免出现错误或缺陷。虽然语法错误易于发现和修复，但逻辑错误更难定位，因为你本以为代码会产生某种结果，结果却产生了另一种结果。此时，你需要弄清楚本以为自己一切正确，但究竟哪里做错了。更难以追踪的是运行时错误，它们往往看似随机发生，原因在于那些影响程序的未知条件。\n\
    \n为了帮助你追踪并消除大多数错误，可以使用 `print` 命令配合注释，但对于更健壮的调试，你应该使用 Xcode 内置的调试器。借助调试器，你可以在代码中设置断点，并观察值是如何存储在一个或多个变量中的。\n\
    \n条件断点仅在特定条件发生时停止程序执行。符号断点仅在调用特定函数或方法时停止程序执行。一旦断点停止了程序，你可以使用各种单步执行命令逐行继续检查代码。`step\
    \ into` 命令允许你查看存储在函数或方法内部的代码，而 `step out` 命令则允许你提前退出函数或方法，并跳回到调用该函数或方法的位置。\n\n\
    通过使用断点和单步执行命令，你可以详尽地逐行检查程序的工作原理，从而尽可能多地消除错误。程序包含的错误越少，用户就会越满意。\n\n# 28. 在编码前后规划程序\n\
    \n在你投入数天、数周、数月甚至数年来开发一个程序之前，首先要确保这个世界确实需要你的程序。如果你是为自己编写程序，那么可以忽略其他人的看法。但是，如果你打算将程序出售给他人，请确保你的程序在开始之前就有前景。\n\
    \n以下是判断你的程序是否存在市场的一种方法。寻找竞争对手。大多数人认为瞄准没有竞争的市场更好，但如果没有竞争，这可能是一个重要的线索，表明同样也没有市场。\n\
    \n然而，如果你寻找一个充满众多竞争对手的市场，这意味着该类程序存在着一个活跃的市场。只需快速搜索一下彩票选号软件或占星程序，你就会发现大量的竞争对手。竞争越激烈，市场越活跃。\n\
    \n如果只有一两家大公司主导着某个特定市场，那么这个市场中的机会很可能已经过去了。例如，尽管有 macOS 和 Linux 可用，但 Windows 仍然是个人电脑的主流操作系统。同样，iOS\
    \ 和 Android 主导着移动电脑市场，因此，试图编写一个与 Windows、Android 或 iOS 竞争的操作系统很可能会浪费你的时间。\n\n\
    同样，当今市场上只有少数几个主要的文字处理器、电子表格和演示程序，这意味着尝试编写另一个通用的文字处理器、电子表格或演示程序很可能是徒劳的。\n\n竞争激烈意味着市场活跃。竞争极少或没有竞争意味着市场可能已经选定了一个领导者，你的程序很可能永远无法推翻这个领导者。试图说服人们购买你的文字处理器而不是使用\
    \ Microsoft Word 或 Pages，很可能是浪费时间。\n\n因此，要寻找细分市场。例如，文字处理器市场可能已被 Microsoft Word\
    \ 主导，但专用的文字处理器仍有需求。虽然 Microsoft Word 可以用于编写剧本和小说，但它并非为此目的而优化。这就是为什么其他公司能够成功销售用于编写剧本或小说的专用文字处理器，这些处理器能帮助你组织创意。\n\
    \n这样的细分市场对于大公司来说太小，不值得关注，这意味着你永远不必直接与这些大公司竞争。除了瞄准大公司忽略的细分市场之外，第二种方法是找出大公司软件中缺乏什么，然后编写一个程序来满足这个缺失的需求。\n\
    \n例如，Microsoft Office 提供了密码保护功能来锁定文件。然而，Microsoft 的加密功能很弱，容易被破解。因此，市场上就需要这样一种软件：它能够比\
    \ Microsoft Office 更好地加密文件，同时提供与 Microsoft Office 相似的用户界面。\n\n最重要的是，编写程序是因为你对这个特定领域感兴趣，而不是因为你认为它能让你赚大钱。销售房地产管理软件或无人机控制软件可能有利可图，但除非你对这些领域感兴趣，否则你很可能没有热情或长期的兴趣去投入漫长的时间为这些用户开发和推广程序。\n\
    \n作为一般规则，要避免直接与大公司竞争。即使是苹果，也无法在个人电脑操作系统市场上与 Microsoft Windows 竞争，而像 Linux 这样的免费产品在对抗\
    \ Windows 方面也并未取得太大成功。\n\n与其直接与大公司竞争，不如寻找那些太小以至于大公司无法涉足的细分市场，或者寻找补充大公司现有程序的方法。最重要的是，在你充满热情想要解决的某个领域里发现一个问题，这将为你提供动力去创造最好的程序。"
- fmt: '# Identifying the Purpose of Your Program


    When programmers first get an idea, their natural tendency is to rush to the computer
    and start writing code. However, this is like living in Los Angeles, getting an
    idea to visit New York, and hopping in your car to drive there. You may get there
    eventually, but without a plan, you’ll likely waste time by not planning which
    roads to take or what to bring with to make your trip more enjoyable.


    Just as you should take your time and plan ahead before rushing off to visit another
    city, so should you also take your time and plan ahead when developing a new program.
    If you start writing Swift code in a flurry of inspiration, you’ll likely run
    out of energy and ideas long before you finish your program. This will likely
    create a half-completed, poorly designed program that will need to be heavily
    modified to make it work or, worse, may need to be dumped completely.


    Writing code is actually the most straightforward part of creating any program.
    The hardest part of programming can be deciding what you hope to get out of a
    program when it’s finished.


    For example, if you’re learning and experimenting with Swift, you might want to
    create programs just to learn a specific feature such as how to retrieve data
    from a stock market website or how to create animation for a game. In this case,
    your goal is just to create short, disposable programs that let you understand
    how to use specific programming features.


    If you’re planning to create programs for other people to use, then you need to
    do some additional planning. First of all, why do you want to create a program
    for other people? Perhaps you want to create a custom program for a particular
    person. Maybe you want to create a program that offers features that current programs
    lack. Whatever the reason, every program must ultimately satisfy the user.


    If you’re creating a program for your own use, then you’re the user. However,
    if you’re creating programs for other people, then the user can be a specific
    person and computer (such as one dentist in your neighborhood dental office),
    or a general group of users (any dentist in who needs to manage a dental office).
    Whoever the user might be, identify the single most important task your program
    must solve for that user. Then make sure your program accomplishes that one crucial
    task correctly.


    **Note**


    Between 2000 and 2005, the FBI spent $170 million creating a program called Virtual
    Case File. The government eventually abandoned the entire project because of constantly
    changing specifications for what the program was supposed to do and how it was
    supposed to work. If you don’t know what a program is supposed to do, you won’t
    know how it’s supposed to achieve that result.


    Before writing any program, identify the following:


    - Who is the user of the program?

    - What is the program supposed to do for the user?

    - How will the program achieve that result for the user?


    The user of your program completely determines the design of your program’s user
    interface. Compare the cockpit of a 777 jet airliner to the dashboard of a typical
    car. To the average person, a 777 cockpit may look intimidating, but to an experienced
    pilot, everything is within arm’s reach and is easy to understand. If your program
    caters to specialists, your user interface can rely on the user’s knowledge to
    work. If your program caters to the general public, your user interface may need
    to guide the user more often.


    Every program must create a useful result for the user. Word processors organize
    text into neatly formatted pages, spreadsheets automatically and accurately calculate
    mathematical formulas, and even games provide entertainment. Imagine your program
    giving the user superpowers that the user can’t achieve any other way. What superpower
    will your program give to the user?


    Once you know what your program should do for the user, the final step is to determine
    how it will achieve that result. Programs typically accept input from the user,
    manipulate that input somehow, and provide a new result. As a programmer, you
    need to determine how to achieve that new result step by step. Then you need to
    translate these steps into a programming language like Swift.


    Ultimately, programming is a creative talent that requires clear, specific goals
    and methodical persistence to succeed.


    # Designing the Structure of a Program


    Once you know what your program needs to do and how it can do it, the next step
    is to design how your program will actually work. There’s no single “best” way
    to write a program since you can write the same program a million different ways.
    However, you need to design a program that not only works, but is also easy to
    understand and modify in the future.


    Every program can always be improved. Sometimes that improvement means optimizing
    the program so it runs faster or uses less memory. Other times improvement means
    adding new features to the program. In either case, every program will likely
    go through several modifications during its lifetime, so it’s crucial that you
    design your program from the start so it’s easy to understand and modify.


    In the world of object-oriented programming, the common way to design a program
    is to separate a large program into multiple objects that represent logical features.
    For example, if you are designing a program to control a car, you can divide the
    program into the following objects:


    - Engine object

    - Steering object

    - Stereo object

    - Transmission object


    Now, if you need to improve the program’s steering ability, you can just replace
    the `steering` object with a new `steering` object without the risk that your
    changes will affect the rest of the program.


    How you divide a program into objects is completely arbitrary. You could just
    as well design the same car program into the following objects:


    - Front object

    - Back object

    - Inside object

    - Undercarriage object


    If you design your program well from the start, you’ll make it easy for yourself
    or other programmers to modify it easily in the future.'
