    Figure 12-5.


    An alert dialog showing the last structure added to the array  

    8.  Click OK to make the alert dialog go away.  

    9.  Choose StructureProgram ➤ Quit StructureProgram.


    ## Summary


    Every program needs to store and manipulate data. At the simplest level, you can
    store data in one of Swift’s basic data types (Int, Double, Float, String). To
    make these basic data types more descriptive, you can use typealiases, which lets
    you choose a more meaningful name to represent a basic data type such as a String
    or Double.


    To create your own data type and restrict the values it can hold, you can use
    enumerations. Enumerations let you list all possible choices the enumeration can
    hold so you can create more descriptive names.


    If you want to group related data together, regardless of the data type, you can
    use a structure. By combining structures with another data structure such as arrays,
    you can create a list of related data. Combining data structures lets you organize
    data the most efficient way possible for your program.


    # 13. Creating Classes and Objects


    The heart of programming in Swift using Xcode is object-oriented programming.
    The main idea is to divide a large program into separate objects where each object
    ideally represents a physical entity. For example, if you are creating a program
    to control a car, one object may represent the car’s engine, a second object may
    represent the car’s entertainment system, and a third object may represent the
    car’s heating and cooling system.


    Now if you want to update the part of a program that controls the car’s engine,
    you just have to modify or replace the object that controls that car engine. Objects
    not only help you better understand how different parts of a program work together,
    but also isolate code so you can create building blocks to put together larger,
    more sophisticated programs.


    Objects help you visualize your program as separate building blocks that are independent
    from each other. Before object-oriented programming, programmers divided programs
    into functions, which also acted like miniature building blocks. The main difference
    between functions and objects is that functions can access data used by other
    functions. This means that if you modify one function, you often inadvertently
    affect other parts of the program. This makes fixing errors or bugs difficult
    and also makes modifying programs difficult as well.


    With objects, the main idea is to create separate, independent building blocks
    that work together without affecting each other’s data. To keep data isolated,
    objects use encapsulation. This means an object has its own variables (called
    properties) and functions (called methods).


    The only way you can modify data in an object is to use that object’s methods.
    This way, if something goes wrong, you can isolate the problem to that object’s
    methods. Without objects, any part of a program can interfere with data used by
    another part of a program, which makes finding and fixing problems nearly impossible.


    Objects can communicate with each other in two ways:


    *   By storing new values in another object’s properties

    *   By calling another object’s methods


    Ideally, a program should consist of independent objects that perform tasks completely
    independent from each other. This makes it easy to modify a program by replacing
    one object with an improved version of that object.


    ## Creating Classes


    There are two steps to creating an object. First, you have to create a class.
    Second, you create an object based on that class.


    A class looks and works much like a structure (see Chapter [12](#A437923_1_En_12_Chapter.html)).
    The main difference is that a structure only contains data, while a class can
    contain data and functions to manipulate that data.


    Once you’ve defined a class, you can create one or more objects based on that
    class. Think of a class as a cookie cutter that defines the shape of cookies,
    and objects as different types of dough you can define based on the class.


    The simplest type of class you can define looks like this:


    ```

    class ClassName {

    }

    ```


    To create an object from this class, you just declare a variable, but instead
    of defining a data type like Int or String, you define the class name, such as


    ```

    var myObject = ClassName()

    ```


    Of course, a class that contains no code is useless, so the two types of code
    you can include in a class are variables (known as properties) and functions for
    manipulate data (known as methods). Creating properties in a class involves creating
    one or more variables and defining a data type and an initial value, such as


    ```

    class ClassName {

    var name : String = ""

    var ID : Int = 0

    var salary : Double = 0

    }

    ```


    Initial values are important because when you create an object based on a class,
    you don’t want uninitialized values that could cause problems if you try to use
    them.


    To define a property, you declare a variable name, a data type, and an initial
    value. Since Swift can infer data types, you could omit the data type declaration
    and just assign initial values, like this:


    ```

    class ClassName {

    var name = ""

    var ID  = 0

    var salary = 0

    }

    ```


    If you aren’t sure what type of initial values you want to store, you can just
    use optional variables, such as


    ```

    class ClassName {

    var name : String?

    var ID : Int?

    var salary : Double?

    }

    ```


    Optional variables have an initial value of nil, so you’ll likely want to store
    actual values eventually.


    Whether you define class properties with an initial value or as a nil value with
    optional variables, you can create an object from a class by just creating a variable
    name, setting it equal to the class name, and following it with an empty set of
    parentheses, like this:


    ```

    var myObject = ClassName()

    ```


    Both of the previous methods create the same initial values for the class properties.
    For more flexibility, you can create an initializer method called `init`. It lets
    you define initial values each time you create an object from a class. An initializer
    in a class might look like this:


    ```

    class SecondClass {

    var name : String

    var ID : Int

    var salary : Double

    init (name: String, ID: Int, salary: Double) {

    self.name = name

    self.ID = ID

    self.salary = salary

    }

    }

    ```


    This initializer method (`init`) defines a parameter list that accepts three items:
    a string, an integer, and a double value. Then it stores this information in the
    `name`, `ID`, and `salary` properties, respectively. When a class has an initializer,
    you must create an object from that class by including the proper number and data
    type to match the initializer parameter list.


    This means creating an object that includes a string, an integer, and a double
    value in parentheses, like this:


    ```

    var secondObject = SecondClass (name: "Joe", ID: 102, salary: 120000)

    ```


    Notice that when you include data in the parameter list, you must label each data
    chunk with the variable name defined in the initializer parameter list. In this
    case, the three parameter names are `name`, `ID`, and `salary`, so creating an
    object means identifying the data with those same parameter names.'
