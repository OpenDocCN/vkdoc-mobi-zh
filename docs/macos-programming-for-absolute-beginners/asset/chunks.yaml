- fmt: '### Polymorphism


    Every object consists of data (stored in properties) and functions (called methods)
    for manipulating that data. With inheritance, one object can use the properties
    and methods defined in another object. However, inheritance can create a problem
    when you need a function (method) to use different code.


    Suppose you create a video game. You define a car as one object and a monster
    as a second object. If the monster throws rocks at the car, the rocks are a third
    object. To make the car, monster, and rocks move on the screen, you create a method
    named `Move`.


    Unfortunately, a car needs to move differently on the screen than a monster or
    a thrown rock. You could create three functions and name them `MoveCar`, `MoveMonster`,
    and `MoveRock`. However, a simpler solution is to just give all three functions
    the same name, such as `Move`.


    In traditional programming, you can never give the same name to two or more functions
    since the computer won’t know which function you want to run. However, in object-oriented
    programming, you can use duplicate function names because of polymorphism.


    Polymorphism lets you use the same method name but replace it with different code.
    The reason why polymorphism works is because each `Move` function (method) gets
    stored in a separate object – one object that represents the car, a second object
    that represents the monster, and a third object that represents a thrown rock.
    To run each `Move` function, you identify the object that contains the `Move`
    function you want to use, such as:


    ```

    Car.Move

    Monster.Move

    Rock.Move

    ```


    By identifying both the object that you want to manipulate and the function that
    you want to use, object-oriented programming can correctly identify which set
    of instructions to run even though one function has the identical name as another
    function.


    Essentially, polymorphism lets you create descriptive function names and reuse
    that descriptive name as often as you like when you also use inheritance.


    The combination of encapsulation, inheritance, and polymorphism forms the basis
    of object-oriented programming. Encapsulation isolates one part of a program from
    another. Inheritance lets you reuse code. Polymorphism lets you reuse method names
    but with different code.


    ## Understanding Programming Languages


    A programming language is nothing more than a particular way to express ideas
    much like human languages such as Spanish, Arabic, Chinese, or English. Computer
    scientists create programming languages to solve specific types of problems. That
    means one programming language may be perfect for solving one type of problem
    but horrible at solving a different type of problem.


    The most popular programming language is C, which was designed for low-level access
    to the computer hardware. As a result, the C language is great for creating operating
    systems, anti-virus programs, and hard disk encryption programs. Anything that
    needs to completely control hardware is a perfect task for the C programming language.


    Unfortunately, C can be cryptic and sparse because it was designed for maximum
    efficiency for computers without regard for human efficiency for reading, writing,
    or modifying C programs. To improve C, computer scientists created an object-oriented
    version of C called C++. A more refined version of C++ soon appeared called Objective-C,
    which was the language Apple adopted for macOS and iOS programming.


    Because C was originally designed for computer efficiency at the expense of human
    efficiency, all variants of C including C++ and Objective-C can also be difficult
    to learn, use, and understand. That’s why Apple created Swift. The purpose of
    Swift is to give you the power of Objective-C while being far easier to learn,
    use, and understand. Swift is basically an improved version of Objective-C, which
    itself is an improved version of C++, which is an improved version of C.


    Each evolution of computer programming builds on the previous programming standards.
    When you write programs in Swift, you can use Swift’s unique features along with
    object-oriented programming, event-driven programming, structured programming,
    and the three basic building blocks of programming (sequential, loops, and branching).


    Swift, like all computer programming languages, contains a fixed list of commands
    known as keywords. To tell a computer what to do, you use keywords to create statements
    that cause the computer to perform a single task.


    You’ve already seen the `print` keyword that prints text such as:


    ```

    print ("Hello, world!")

    ```


    This Swift keyword is `print` (which stands for print); then you have to tell
    the keyword what you want to print, enclosed in parentheses. Just as learning
    a human language requires first learning the basic symbols used to write letters
    such as an alphabet or other symbols, so does learning a programming language
    require first learning the keywords of that particular programming language.


    Although Swift contains dozens of keywords, you don’t have to learn all of them
    at once to write programs in Swift. You just have to learn a handful of keywords
    initially. As you get more experienced, you’ll gradually need to learn additional
    Swift keywords.


    To make programming as easy as possible, Swift (like many programming languages)
    uses keywords that look like ordinary English words such as `print` or `var` (short
    for variable). However, many programming languages also use symbols that represent
    different features.


    Common symbols are mathematical symbols for addition (`+`), subtraction (`-`),
    multiplication (`*`), and division (`/`).


    To identify the beginning and end of commands that work together, Swift (like
    C) uses curly brackets to enclose code such as:


    ```

    {

    print ("This is a message");

    }

    ```


    Unlike human languages where you can misspell a word or forget to end a sentence
    with a period and people can still understand what you’re saying, programming
    languages are not so forgiving. With a programming language, every keyword must
    be spelled correctly and every symbol must be used where needed. Misspell a single
    keyword, use the wrong symbol, or put the right symbol in the wrong place and
    your entire program will fail to work.


    Programming languages are precise. The key to programming is to write.'
