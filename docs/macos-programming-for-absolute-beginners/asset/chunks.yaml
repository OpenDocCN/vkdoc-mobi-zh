- fmt: '## Event-Driven Programming


    In the early days of computers, most programs worked by starting with the first
    instruction and then following each instruction line by line until reaching the
    end. Such programs tightly controlled how the computer behaved at any given time.


    All of this changed when computers started displaying graphical user interfaces
    with windows and pull-down menus so users could choose what to do at any given
    time. Suddenly every program had to wait for the user to do something like select
    a menu command or click a button. Now programs had to react to the user.


    Every time the user did something, it was considered an event. If the user clicked
    the left mouse button, it was a completely different event than if the user clicked
    the right mouse button. Instead of dictating what the user could do at any given
    time, programs now had to respond to different events that the user did. Making
    programs responsive to different events is called event-driven programming.


    Event-driven programs divide a large program into multiple functions where each
    function responds to a different event. If the user clicks a menu command, a function
    runs its instructions. If the user clicks a button, a different function runs
    another set of instructions.


    Event-driven programming always waits to respond to the user’s action.


    ## Object-Oriented Programming


    Dividing a large program into multiple functions makes it easy to create and modify
    a program. However, trying to understand how such a large program works is often
    confusing since there is no simple way to determine which functions work together
    or what data they might need from other functions.


    Even worse, functions often modify data that other functions use. This means sometimes
    a function will modify data before another function can use it. Using the wrong
    data will cause the other function to fail, causing the whole program to fail.
    Not only does this situation create less reliable software, but it also makes
    it much harder to determine how and where to fix the problem.


    To solve this situation, computer scientists created object-oriented programming.
    The goal is to divide a large program into smaller functions, but organized related
    functions together into groups known as objects. To make object-oriented programs
    easier to understand, objects also model physical items in the real world.


    Suppose you need to write a program to control a robot. Dividing this problem
    by tasks, you might create one function to move the robot, a second function to
    tell the robot how to see nearby obstacles, and a third function to calculate
    the best path to follow. If there is a problem with the robot’s movement, you
    won’t know if the problem is in the function controlling the movement, the function
    controlling how the robot sees obstacles, or the function calculating the best
    path to follow.


    Dividing this same robot program into objects might create a `Legs` object (for
    moving the robot), an `Eye` object (for seeing nearby obstacles), and a `Brain`
    object (for calculating the best path to avoid obstacles). Now if there is a problem
    with the robot’s movement, you can isolate the problem to the code stored in the
    `Legs` object.


    Besides isolating data within an object, a second idea behind object-oriented
    programming is to make it easy to reuse and modify a large program. Suppose you
    replace a robot’s legs with treads. Now you must modify the function for moving
    the robot since treads behave differently than legs. Next, you must modify the
    function for calculating the best path around obstacles since treads force a robot
    to go around obstacles while legs allow a robot to walk over small obstacles and
    go around larger obstacles.


    If you want to replace a robot’s legs with treads, object-oriented programming
    simply allows you to yank out the `Legs` object and replace it with a new `Treads`
    object, without affecting or needing to modify any additional objects that make
    up the rest of the program.


    Since most programs are constantly modified to fix errors (known as bugs) or add
    new features, object-oriented programming allows you to create a large program
    out of separate building blocks (objects), and modify a program by only modifying
    a single object.


    The key to object-oriented programming is to isolate parts of a program and promote
    reusability through three features known as encapsulation, inheritance, and polymorphism.


    ### Encapsulation


    The main purpose of encapsulation is to protect and isolate one part of a program
    from another part of a program. To do this, encapsulation hides data so it can
    never be changed by another part of a program. In addition, encapsulation also
    holds all functions that manipulate data stored in that object. If any problems
    occur, encapsulation makes it easy to isolate the problem within a particular
    object.


    Every object is meant to be a completely independent of any other part of a program.
    Objects store data in properties. The only way to manipulate these properties
    is to use functions called methods, which are also encapsulated in the same object.
    The combination of properties and methods, isolated within an object, makes it
    easy to create large programs quickly and reliably by using objects as building
    blocks, as shown in Figure [1-4](#A437923_1_En_1_Chapter.html#Fig4).


    ![A437923_1_En_1_Fig4_HTML.jpg](A437923_1_En_1_Fig4_HTML.jpg)


    Figure 1-4. Objects encapsulate related functions and data together, hidden from
    the rest of a program


    ### Inheritance


    Creating a large, complicated program is hard, but what makes that task even harder
    is writing the whole program from scratch. That’s why most programmers reuse parts
    of existing programs for two reasons. First, they don’t have to rewrite the feature
    they need from scratch. This means they can create a large program faster. Second,
    they can use tested code that’s already proven to work correctly. This means they
    can create more reliable software faster by reusing reliable code.


    One huge problem with reusing code is that you never want to make duplicate copies.
    Suppose you copied a function and pasted it into a second location. Now you have
    two copies of the exact same code stored in two separate places in the same program.
    This wastes space, but more importantly, it could cause problems in the future.


    Suppose you found a problem in a function. To fix this problem, you’d need to
    fix this code everywhere you copied and pasted it in other parts of your program.
    If you copied and pasted this code in two other places in your program, you’d
    have to find and fix that code in both places. If you copied and pasted this code
    in a thousand places in your program, you’d have to find and fix that code in
    a thousand different places.


    Not only is this inconvenient and time-consuming, but it also increases the risk
    of overlooking code and leaving a problem in that code. This creates less reliable
    programs.


    To avoid the problem of fixing multiple copies of the same code, object-oriented
    programming uses something called inheritance. The idea is that one object can
    use all the code stored in another object but without physically making a copy
    of that code. Instead, one object inherits code from another object, but only
    one copy of that code ever exists.


    Now you can reuse one copy of code as many times as you want. If you need to fix
    a problem, you only need to fix that code once and those changes automatically
    appear in any object that reuses that code through inheritance.


    Basically, inheritance lets you reuse code without physically making duplicate
    copies of that code. This makes it easy to reuse code and easily modify it in
    the future.'
