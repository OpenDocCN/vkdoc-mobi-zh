  trans: "# 计算属性\n\n到目前为止，声明变量和常量，然后将数据赋值给这些变量或常量，与其他编程语言相比并无太大区别。如果你有一个变量与另一个变量相关，可以这样操作：\n\
    \n```\nvar cats = 4\nvar dogs: Int\ndogs = cats + 2\nprint(dogs)\n```\n\n不幸的是，这样将`dogs`的变量声明与`dogs`变量的实际赋值分开了。为了保持变量声明与其定义代码的关联性，Swift\
    \ 提供了一种称为计算属性的功能。\n\n使用计算属性时，你不会直接将数据存储到变量中。相反，你定义变量可以保存的数据类型，然后使用其他变量或常量来计算一个新值，再存储到该变量中。这种计算称为\
    \ getter（获取器），其代码如下所示：\n\n```\nvar dogs : Int {\nget {\nreturn cats + 2 // 用于计算值的代码\n\
    }\n}\n```\n\n上述代码声明了一个名为`dogs`的变量，该变量只能保存整数（`Int`）数据类型。然后，它将代码包含在由关键字`get`定义的\
    \ getter 花括号中。\n\n实际上，你可以在 getter 的花括号内编写任意数量的 Swift 代码，但此示例只包含了最重要的一行，即使用`return`关键字返回一个值，该值会被存储到`dogs`变量中。\n\
    \n在本例中，它获取`cats`变量中存储的值，将该值加 2，然后将新值存储到`dogs`变量中。更改 getter 中的代码，就会改变存储在`dogs`变量中的计算值。\n\
    \n让我们通过以下步骤来看看这是如何工作的：\n\n1.  确保你的`IntroductoryPlayground`文件已在 Xcode 中加载。\n2.\
    \  将 playground 文件中的代码修改如下：\n\n```\nimport Cocoa\nvar cats = 4\nvar dogs : Int\
    \ {\nget {\nreturn cats + 2 // 用于计算值的代码\n}\n}\nprint(dogs)\n```\n\n请注意，playground\
    \ 窗口的右侧边距显示了`dogs`的值，如图 5-11 所示。\n\n![A437923_1_En_5_Fig11_HTML.jpg](img/A437923_1_En_5_Fig11_HTML.jpg)\n\
    \n图 5-11.\n\nplayground 窗口的右侧边距显示了 getter 部分的工作方式\n\nGetter 使用代码来计算变量的值。第二种类型的计算属性称为\
    \ setter（设置器），它运行用于计算不同变量值的代码。\n\n每当其变量被赋值时，setter 就会运行。要了解 getter 和 setter 是如何工作的，请按照以下步骤操作：\n\
    \n1.  确保你的`IntroductoryPlayground`文件已在 Xcode 中加载。\n2.  将 playground 文件中的代码修改如下：\n\
    \n```\nimport Cocoa\nvar cats = 4\nvar dogs : Int {\nget {\nreturn cats + 2 //\
    \ 用于计算值的代码\n}\nset(newValue) {\ncats = 3 * newValue\n}\n}\nprint(dogs)\nprint(cats)\n\
    dogs = 5\nprint(dogs)\nprint(cats)\n```\n\n注意当你为`dogs`变量赋一个不同的值时，`cats`和`dogs`变量的值是如何变化的，如图\
    \ 5-12 所示。\n\n![A437923_1_En_5_Fig12_HTML.jpg](img/A437923_1_En_5_Fig12_HTML.jpg)\n\
    \n图 5-12.\n\nplayground 窗口的右侧边距显示了 getter 和 setter 代码的工作方式\n\n让我们逐行分析这段代码。首先，数字\
    \ 4 被存储到`cats`变量中。在 getter 中使用`cats`变量（4）返回`cats` + 2，即 4 + 2（6）。所以第一个`print(dogs)`命令打印出\
    \ 6。\n\n第二个`print(cats)`打印`cats`变量的值，该值仍然是 4。\n\n当`dogs`变量被赋值为数字 5 时，setter 会运行。临时变量`newValue`被赋值为数字\
    \ 5，从而为`cats`计算出一个新值：3 * `newValue`，即 3 * 5 或 15。现在`cats`变量的值被设置为 15。\n\n接下来运行`print(dogs)`命令，使用由\
    \ getter 计算出的`dogs`的值。由于`cats`的值是 15，getter 计算出`cats` + 2，即 15 + 2，结果为 17。因此下一个`print(dogs)`命令打印出\
    \ 17，最后一个`print(cats)`命令打印出 15。\n\n**注意**  \n计算属性可以在给变量赋值时运行代码。但是，请谨慎使用计算属性，因为它们可能会使你的代码更难理解。计算属性最常用于面向对象编程中的类属性。例如，如果一个对象代表屏幕上绘制的一个正方形，改变正方形的宽度必须同时改变该正方形的高度（反之亦然）。"
- fmt: "# Using Optional Variables\n\nThe biggest flaw when you declare a variable\
    \ is that you can’t use that variable until you store data in it. If you try using\
    \ a variable before it stores any data, your program will fail and crash. To avoid\
    \ this problem, many programmers initially store “dummy” data in a variable. Unfortunately,\
    \ such “dummy” data can still be used by a program and cause errors.\n\nTo avoid\
    \ this problem, Swift offers something called optional variables. An optional\
    \ variable can store data or nothing at all. If an optional variable contains\
    \ nothing, it’s considered to hold a value called `nil`. By using optional variables,\
    \ you avoid crashing a program if a variable doesn’t contain any data.\n\nTo create\
    \ an optional variable, you just declare a variable and its data type with a question\
    \ mark, like this:\n\n```\nvar fish : String?\n```\n\nThe question mark identifies\
    \ a variable as an optional. You can use optional variables exactly like ordinary\
    \ variables to store data in them, such as\n\n```\nfish = \"goldfish\"\n```\n\n\
    Although storing data in an optional variable is no different than storing data\
    \ in an ordinary variable, retrieving data from an optional variable requires\
    \ extra steps. First, you must check if the optional variable even has data in\
    \ it or not. Once you know that an optional variable contains data, you have to\
    \ unwrap that optional to get to the actual data by using an exclamation mark,\
    \ such as\n\n```\nprint (fish!)\n```\n\nTo see how optional variables work, try\
    \ the following:\n\n1.  Make sure your `IntroductoryPlayground` file is loaded\
    \ in Xcode.  \n2.  Modify the code as follows:\n\n```\n    import Cocoa\n    var\
    \ fish : String?\n    fish = \"goldfish\"\n    print (fish)\n    print (fish!)\n\
    ```\n\nNotice that `fish` by itself is actually an optional variable but when\
    \ you use the exclamation mark to unwrap it, you access the actual data inside\
    \ the optional, as shown in Figure 5-13.\n\n![A437923_1_En_5_Fig13_HTML.jpg](A437923_1_En_5_Fig13_HTML.jpg)\n\
    \nFigure 5-13. Seeing the difference between an optional and the unwrapped data\
    \ inside an optional  \n\n3.  Type two additional lines of code underneath:\n\n\
    ```\n    var str : String\n    str = fish\n```\n\nNotice that you can’t assign\
    \ the optional variable `fish` to `str` because `str` can only hold `String` data\
    \ types. Instead, you must unwrap the optional variable `fish` and retrieve its\
    \ actual string content by using the exclamation mark, like this:\n\n```\nvar\
    \ str : String\nstr = fish!\n```\n\nBefore unwrapping optional variables to get\
    \ to their data, always check to see if the optional variable contains a `nil`\
    \ value or a variable. If you try to use an optional variable when it contains\
    \ a `nil` value, your program could crash.\n\nTo check if an optional variable\
    \ holds a `nil` value or not, you have two options. First, you can explicitly\
    \ check for a `nil` value, like this:\n\n```\nif fish != nil {\nprint (\"The optional\
    \ variable is not nil\")\n}\n```\n\nThis code checks if the `fish` optional variable\
    \ is not equal to (`!=`) `nil`. If an optional variable is not `nil`, then it\
    \ must hold a value, so it’s safe to retrieve it.\n\nA second way to check if\
    \ an optional variable has a value or not is to assign it to a constant, like\
    \ this:\n\n```\nif let food = fish {\nprint (\"The optional variable has a value\"\
    )\nprint (food)\n}\n```\n\nIf the optional variable has a value, it stores that\
    \ value in the constant. Now you can access that value through the constant. To\
    \ see how this works, follow these steps:\n\n1.  Make sure your `IntroductoryPlayground`\
    \ file is loaded in Xcode.  \n2.  Modify the code as follows:\n\n```\n    import\
    \ Cocoa\n    var fish : String?\n    fish = \"goldfish\"\n    if fish != nil {\n\
    \    print (\"The optional variable is not nil\")\n    var str : String\n    str\
    \ = fish!\n    print (str)\n    }\n    if let food = fish {\n    print (\"The\
    \ optional variable has a value\")\n    print (food)\n    }\n```\n\nNotice that\
    \ you can retrieve the value in an optional variable by unwrapping it with an\
    \ exclamation mark or storing it in a constant and then using that constant, as\
    \ shown in Figure 5-14.\n\n![A437923_1_En_5_Fig14_HTML.jpg](A437923_1_En_5_Fig14_HTML.jpg)\n\
    \nFigure 5-14. Two ways to access a value stored in an optional variable"
