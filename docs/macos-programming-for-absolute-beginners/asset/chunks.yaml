  trans: '

    ### 编辑约束


    定义了一个或多个约束后，你随时可以删除或编辑现有约束。要删除约束，有几种方法：


    - 点击该约束，然后按下 `Delete` 或 `Backspace` 键

    - 点击包含该约束的用户界面元素，打开“`大小检查器`”面板，然后点击该约束并按下 `Delete` 或 `Backspace` 键


    你还可以从单个用户界面元素或当前显示的用户界面的所有元素中删除或清除所有约束。为此，你有两种选择：


    - 选择 `Editor` ➤ `Resolve Auto Layout Issues`

    - 点击窗口右下角的 `Resolve Auto Layout Issues` 图标


    选择任一选项后，你都会看到一个分为上半部分和下半部分的菜单（见图 15-20）。点击上半部分的 `Clear Constraints` 选项，只会清除当前选中元素的约束。点击下半部分的
    `Clear Constraints` 选项，则会清除当前显示的用户界面中所有元素的约束，无论你是否选中它们。


    除了删除约束，你还可以编辑它。编辑可以让你修改约束的行为方式。关于约束，你可以修改三个值：


    - `Constant`（常量）：一个固定值，用于定义约束的值

    - `Priority`（优先级）：一个数值，决定哪些约束必须优先遵循

    - `Modifier`（修正符）：一个数值，用于定义影响两个值的比率，例如元素高度与宽度的比率，或一个元素宽度与另一个元素宽度的比率


    要编辑约束，请按以下步骤操作：


    1.  点击包含你想要编辑的约束的用户界面元素。

    2.  选择 `View` ➤ `Utilities` ➤ `Show Size Inspector`。“`大小检查器`”面板会列出所有已定义的约束，如图
    15-21 所示。


    ![A437923_1_En_15_Fig20_HTML.jpg](img/A437923_1_En_15_Fig20_HTML.jpg)


    图 15-20. 在“`大小检查器`”面板中查看已定义约束的列表


    3.  点击你想要修改的约束最右侧的 `Edit` 按钮。此时会出现一个弹出窗口，如图 15-22 所示。


    ![A437923_1_En_15_Fig21_HTML.jpg](img/A437923_1_En_15_Fig21_HTML.jpg)


    图 15-21. 弹出窗口允许你修改约束


    请注意，在 `Constant:` 标签的右侧，有一个显示等号（`=`）的弹出菜单。如果你点击此弹出菜单，可以选择大于或等于、小于或等于，或等于。


    在 `Constant` 标签的更右侧是一个显示数字的下拉字段。如果你点击向下的箭头，你将能够在三个选项中进行选择：


    - 一个可以输入或编辑的数值

    - `Use Standard Value`（使用标准值）：让 Xcode 决定最佳值

    - `Use Canvas Value`（使用画布值）：使用屏幕上的当前距离来定义固定值


    请记住，固定值或画布值在不同尺寸的显示器上表现可能不同。你可能需要反复试验，直到找到适合你特定用户界面的正确值。


    优先级用于解决两个或多个可能相互矛盾的约束之间的冲突，例如，一个约束将按钮固定在窗口的右边缘，第二个约束将同一个按钮固定在窗口的左边缘，而第三个约束则固定按钮的宽度。通过修改优先级，你可以确保约束之间不会冲突。


    找到正确的约束组合有时既繁琐又令人沮丧。为了简化设置约束的过程，Xcode 提供了两种为你定义约束的方法：


    - `Add Missing Constraints`（添加缺失的约束）：保留你已定义的任何现有约束，并添加 Xcode 认为你缺失的新约束

    - `Reset to Suggested Constraints`（重置为建议的约束）：删除你可能为某个元素设置的所有约束，并用其自身的约束替换它们


    当你初次定义约束时，Xcode 会用红色或橙色显示它们，以提示你现有的约束不足以定义用户界面中元素的位置。一旦你定义了足够多的约束来指定位置，Xcode 就会用蓝色显示这些约束。

    '
- fmt: '# Defining Constraints in a macOS Program


    To fully understand constraints, you need to see how they work in an actual program.
    Then you can see how your user interface adjusts each time you resize its window.
    In the following sample program, you’ll define relationships constraints for a
    push button and a text field, and you’ll also define an aspect ratio for an image.


    Earlier in this chapter you created an macOS project called `UIProgram` so let’s
    use it to see how constraints work:


    1.  Make sure your `UIProgram` project is loaded in Xcode.

    2.  Click the `MainMenu.xib` file in the Project Navigator.

    3.  Click the `UIProgram` icon to make the window of the user interface appear.

    4.  Choose View ➤ Utilities ➤ Show Object Library to make the Object Library appear
    in the bottom right corner of the Xcode window.

    5.  Drag one push button, one text field, and one text view on the user interface
    so that it looks similar to Figure [15-22](#A437923_1_En_15_Chapter.html#Fig22).


    ![A437923_1_En_15_Fig22_HTML.jpg](A437923_1_En_15_Fig22_HTML.jpg)


    Figure 15-22.


    The user interface of the `UIProgram`


    While this user interface may look fine right now, it will look awful as soon
    as the user resizes the window. Choose Product ➤ Run and then resize the window
    to see how shrinking the window cuts off or hides items on the user interface.
    Now expand the size of the window and notice all the empty space inside the expanded
    window. Exit out of your program by choosing UIProgram ➤ Quit `UIProgram`.


    First, let’s define the window’s minimum size by following these steps:


    1.  Click the `Main.xib` file in the Project Navigator.

    2.  Click the Window icon in the left pane to select the entire window.

    3.  Choose View ➤ Utilities ➤ Show Size Inspector to display the window constraints
    (see Figure [15-14](#A437923_1_En_15_Chapter.html#Fig14)).

    4.  Click to select the top Minimum Size check box to define the current window
    size as its minimum size.

    5.  Choose Product ➤ Run. Resize the user interface window. Notice that you can
    only shrink the window to a certain size.

    6.  Choose UIProgram ➤ Quit `UIProgram`.


    By defining a minimum window size, you’ve kept your user interface from getting
    cut off or having items disappear if the user shrinks the window too small. Now
    let’s add constraints to make the user interface adapt if the user expands the
    window size.


    1.  Move the mouse pointer over the button, hold down the Control key, and drag
    the mouse to the right and stop right before the window’s right edge, as shown
    in Figure [15-23](#A437923_1_En_15_Chapter.html#Fig23).


    ![A437923_1_En_15_Fig23_HTML.jpg](A437923_1_En_15_Fig23_HTML.jpg)


    Figure 15-23.


    Adjusting the size of the user interface window

    2.  Release the Control key and the mouse. A pop-up window appears.

    3.  Choose Trailing Space to Container. Notice that the button appears in red
    to show that you don’t have enough constraints on the button yet.

    4.  Move the mouse pointer over the button, hold down the Control key, and drag
    the mouse down and stop right before the window’s bottom edge.

    5.  Release the Control key and the mouse. A pop-up window appears.

    6.  Choose Bottom Space to Container. Notice that the button now appears in blue
    to show you have enough constraints.

    7.  Click the text field to select it.

    8.  Choose Editor ➤ Resolve Auto Layout Issues ➤ Add Missing Constraints. Xcode
    adds constraints automatically, as shown in Figure [15-24](#A437923_1_En_15_Chapter.html#Fig24).


    ![A437923_1_En_15_Fig24_HTML.jpg](A437923_1_En_15_Fig24_HTML.jpg)


    Figure 15-24.


    Constraints on the text field

    9.  Choose Product ➤ Run.

    10.  Resize the window. Notice how the user interface items adjust when you expand
    the window size. As you can see, constraints keep user interface items in their
    proper place and size no matter how the user resizes the window. Feel free to
    experiment with editing your constraints to see how they work.

    11.  Choose UIProgram ➤ Quit `UIProgram`.


    ## Summary


    Your program’s user interface determines how people interact with your program.
    Every user interface needs to display information, retrieve information from the
    user, and allow the user to choose commands. Ideally, a user should focus more
    on using your program and less on figuring out how the user interface works.


    The Object Library displays all possible items you can add to your user interface
    whether you use `.xib` or `.storyboard` files. To help you find items in the Object
    Library, you can type all or part of a word in the search field at the bottom
    of the Object Library.


    Constraints help keep your user interface looking good no matter how the user
    resizes your program’s windows. The two basic types of constraints involve the
    following:


    *   Relationship constraints that define the distance between neighboring items,
    such as between two buttons or a button and the edge of a window

    *   Size constraints that define the height, width, or aspect ratio of an item


    You can define constraints on your own, let Xcode define the constraints, or use
    a combination of both. Defining constraints may be a trial-and-error process until
    your user interface adapts to resizing windows exactly the way you want.'
  raw: '## Defining Constraints in a macOS Program


    To fully understand constraints, you need to see how they work in an actual program.
    Then you can see how your user interface adjusts each time you resize its window.
    In the following sample program, you’ll define relationships constraints for a
    push button and a text field, and you’ll also define an aspect ratio for an image.


    Earlier in this chapter you created an macOS project called UIProgram so let’s
    use it to see how constraints work:


    1.  Make sure your UIProgram project is loaded in Xcode.  

    2.  Click the `MainMenu.xib` file in the Project Navigator.  

    3.  Click the UIProgram icon to make the window of the user interface appear.
     

    4.  Choose View ➤ Utilities ➤ Show Object Library to make the Object Library appear
    in the bottom right corner of the Xcode window.  

    5.  Drag one push button, one text field, and one text view on the user interface
    so that it looks similar to Figure [15-22](#A437923_1_En_15_Chapter.html#Fig22).


    ![A437923_1_En_15_Fig22_HTML.jpg](A437923_1_En_15_Fig22_HTML.jpg)


    Figure 15-22.


    The user interface of the UIProgram


    While this user interface may look fine right now, it will look awful as soon
    as the user resizes the window. Choose Product ➤ Run and then resize the window
    to see how shrinking the window cuts off or hides items on the user interface.
    Now expand the size of the window and notice all the empty space inside the expanded
    window. Exit out of your program by choosing UIProgram ➤ Quit UIProgram.


    First, let’s define the window’s minimum size by following these steps:


    1.  Click the `Main.xib` file in the Project Navigator.  

    2.  Click the Window icon in the left pane to select the entire window.  

    3.  Choose View ➤ Utilities ➤ Show Size Inspector to display the window constraints
    (see Figure [15-14](#A437923_1_En_15_Chapter.html#Fig14)).  

    4.  Click to select the top Minimum Size check box to define the current window
    size as its minimum size.  

    5.  Choose Product ➤ Run. Resize the user interface window. Notice that you can
    only shrink the window to a certain size.  

    6.  Choose UIProgram ➤ Quit UIProgram.


    By defining a minimum window size, you’ve kept your user interface from getting
    cut off or having items disappear if the user shrinks the window too small. Now
    let’s add constraints to make the user interface adapt if the user expands the
    window size.


    1.  Move the mouse pointer over the button, hold down the Control key, and drag
    the mouse to the right and stop right before the window’s right edge, as shown
    in Figure [15-23](#A437923_1_En_15_Chapter.html#Fig23).


    ![A437923_1_En_15_Fig23_HTML.jpg](A437923_1_En_15_Fig23_HTML.jpg)


    Figure 15-23.


    Adjusting the size of the user interface window  

    2.  Release the Control key and the mouse. A pop-up window appears.  

    3.  Choose Trailing Space to Container. Notice that the button appears in red
    to show that you don’t have enough constraints on the button yet.  

    4.  Move the mouse pointer over the button, hold down the Control key, and drag
    the mouse down and stop right before the window’s bottom edge.  

    5.  Release the Control key and the mouse. A pop-up window appears.  

    6.  Choose Bottom Space to Container. Notice that the button now appears in blue
    to show you have enough constraints.  

    7.  Click the text field to select it.  

    8.  Choose Editor ➤ Resolve Auto Layout Issues ➤ Add Missing Constraints. Xcode
    adds constraints automatically, as shown in Figure [15-24](#A437923_1_En_15_Chapter.html#Fig24).


    ![A437923_1_En_15_Fig24_HTML.jpg](A437923_1_En_15_Fig24_HTML.jpg)


    Figure 15-24.


    Constraints on the text field  

    9.  Choose Product ➤ Run.  

    10.  Resize the window. Notice how the user interface items adjust when you expand
    the window size. As you can see, constraints keep user interface items in their
    proper place and size no matter how the user resizes the window. Feel free to
    experiment with editing your constraints to see how they work.  

    11.  Choose UIProgram ➤ Quit UIProgram.


    ## Summary


    Your program’s user interface determines how people interact with your program.
