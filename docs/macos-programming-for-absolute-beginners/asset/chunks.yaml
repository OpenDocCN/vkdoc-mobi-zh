- fmt: "为了帮助你创建一个`IBOutlet`，请使用助理编辑器。助理编辑器可以让你在左侧窗格中显示用户界面，在右侧窗格中显示你的 Swift 代码。然后，你可以使用鼠标从用户界面元素拖拽到你的\
    \ Swift 代码中，从而创建一个将标签或文本字段连接到`IBOutlet`的`IBOutlet`。让我们看看它是如何工作的：\n\n1.  确保选中`MainMenu.xib`文件，以便在屏幕上显示\
    \ MyFirstProgram 用户界面窗口。（如果没有选中，请在项目导航器中点击`MainMenu.xib`文件，然后点击 MyFirstProgram\
    \ 图标以显示用户界面窗口。）\n\n2.  选择 View ➤ Assistant Editor ➤ Show Assistant Editor。助理编辑器会在`MainMenu.xib`文件的用户界面旁边显示`AppDelegate.swift`文件中的\
    \ Swift 代码，如图 [3-12](#A437923_1_En_3_Chapter.html#Fig12) 所示。\n\n    ![A437923_1_En_3_Fig12_HTML.jpg](A437923_1_En_3_Fig12_HTML.jpg)\n\
    \n    图 3-12. 助理编辑器让你可以并排查看用户界面和 Swift 代码文件\n\n3.  点击 MyFirstProgram 窗口上的标签。\n\
    \n4.  按住 Control 键，同时将鼠标从标签拖拽到`AppDelegate.swift`文件中`@IBOutlet`行的下方，直到你在 Swift\
    \ 代码文件中看到一条水平线出现，如图 [3-13](#A437923_1_En_3_Chapter.html#Fig13) 所示。\n\n    ![A437923_1_En_3_Fig13_HTML.jpg](A437923_1_En_3_Fig13_HTML.jpg)\n\
    \n    图 3-13. Control-拖拽会在一个用户界面项和你的 Swift 代码之间创建一个连接\n\n5.  松开 Control 键和鼠标。会弹出一个窗口，如图\
    \ [3-14](#A437923_1_En_3_Chapter.html#Fig14) 所示。\n\n    ![A437923_1_En_3_Fig14_HTML.jpg](A437923_1_En_3_Fig14_HTML.jpg)\n\
    \n    图 3-14. 弹出窗口让你为你的`IBOutlet`定义一个名称\n\n6.  点击 Name 文本字段，输入`labelText`，然后点击\
    \ Connect 按钮。（你选择的名称应该具有描述性，但可以是任何你想要的名称。）Xcode 会在你的 Swift 文件中创建一个如下所示的`IBOutlet`：\n\
    \n    ```\n        @IBOutlet weak var labelText: NSTextField!\n    ```\n\n7. \
    \ 点击文本字段以选中它。\n\n8.  按住 Control 键，同时将鼠标从文本字段拖拽到你刚刚创建的`IBOutlet`下方，直到`AppDelegate.swift`文件中出现一条水平线。\n\
    \n9.  松开 Control 键和鼠标。会弹出一个窗口。\n\n10. 点击 Name 文本字段，输入`messageText`，然后点击 Connect\
    \ 按钮。Xcode 会在你的 Swift 文件中创建第二个如下所示的`IBOutlet`：\n\n    ```\n        @IBOutlet weak\
    \ var messageText: NSTextField!\n    ```\n\n我们来回顾一下你刚才的操作。首先，你创建了一个`IBOutlet`来表示标签和文本字段。现在，标签由名称`labelText`表示，文本字段由名称`messageText`表示。当你的\
    \ Swift 代码需要从用户界面上的标签或文本字段存储或检索数据时，它可以直接通过名称`labelText`或`messageText`来引用它们。\n\n\
    其次，你在你的 Swift 代码和用户界面元素之间创建了一个链接。现在，你的 Swift 代码可以向你程序用户界面上的标签和文本字段发送数据，也可从中检索数据。\n\
    \n将你的用户界面连接到 Swift 代码是让用户界面真正工作的重要一步。但是，你需要让 Change Case 按钮在用户点击时执行某些操作。要做到这一点，你需要创建一个称为`IBAction`方法的东西。\n\
    \n`IBOutlet`允许 Swift 代码从用户界面元素发送或检索数据，而`IBAction`方法则允许用户界面元素运行执行某些操作的 Swift 代码。在这个例子中，你希望用户将文本输入到文本字段中。然后，程序将获取该文本，将其转换为大写，并将这个转换后的文本显示回标签中。\n\
    \n为此，你需要知道如何执行以下操作：\n\n- 创建一个`IBAction`方法。\n- 从文本字段检索文本。\n- 将检索到的所有文本转换为大写。\n\
    - 将大写的文本存储在标签中。\n\n从文本字段和标签中存储和检索文本是相似的，因为两者都由`IBOutlet`变量定义。让我们看看这些`IBOutlet`的含义：\n\
    \n```\n@IBOutlet weak var labelText: NSTextField!\n@IBOutlet weak var messageText:\
    \ NSTextField!\n```\n\n对象库中的所有用户界面元素都基于构成 Cocoa 框架的类文件。在这个例子中，你创建了两个名为`labelText`和`messageText`的`IBOutlet`变量，它们都基于`NSTextField`类文件。\n\
    \n如果你在 Xcode 的文档中查找`NSTextField`类文件，你会看到一长串属性列表，任何基于`NSTextField`的对象都可以拥有这些属性。但是，你找不到任何描述用于保存文本的属性的内容。\n\
    \n但是，如果你还记得第 [1](#A437923_1_En_1_Chapter.html) 章的内容，面向对象编程意味着类文件可以继承自其他类文件。在这个例子中，`NSTextField`类继承自另一个名为`NSControl`的类。在\
    \ Xcode 文档中查找`NSControl`（你将在下一章学习如何操作），你可以看到`NSControl`有一个名为`stringValue`的属性用于保存文本，如图\
    \ [3-15](#A437923_1_En_3_Chapter.html#Fig15) 所示。\n\n![A437923_1_En_3_Fig15_HTML.jpg](A437923_1_En_3_Fig15_HTML.jpg)\n\
    \n图 3-15. Xcode 的文档显示了 `NSControl` 用于保存文本的属性\n\n要访问存储在文本字段中的文本，你需要通过名称（`messageText`）及其保存文本的属性（`stringValue`）来标识该文本字段，例如：\n\
    \n```\nmessageText.stringValue\n```\n\n要在标签中显示文本，你需要通过名称（`labelText`）及其保存文本的属性（`stringValue`）来标识该标签，例如：\n\
    \n```\nlabelText.stringValue\n```\n\n下一个问题是，如何将文本转换成大写？Swift 将文本存储在一个名为`String`的数据类型中，它具有一个名为`uppercased`的方法，如图\
    \ [3-16](#A437923_1_En_3_Chapter.html#Fig16) 所示。\n\n![A437923_1_En_3_Fig16_HTML.jpg](A437923_1_En_3_Fig16_HTML.jpg)\n\
    \n图 3-16. Xcode 的文档显示了 `NSString` 类有一个名为 `uppercaseString` 的方法用于将文本转换为大写\n\n要转换存储在文本字段（由名为`messageText`的`IBOutlet`表示）中的文本，你只需在`IBOutlet`的`text`属性上应用`uppercaseString`方法，如下所示：\n\
    \n```\nmessageText.stringValue.uppercased\n```\n\n这个 Swift 代码的意思是：获取`messageText`对象（即用户界面上的文本字段），检索它包含的文本（在`stringValue`属性中），并对该文本应用`uppercased`方法。\n\
    \n现在你已经知道如何从文本字段检索文本、将其转换为大写以及将新文本存储回标签，最后一步是编写一个`IBAction`方法，在其中包含执行所有这些操作的代码。每当用户点击\
    \ Change Case 按钮时，都需要运行这个`IBAction`方法。因此，你需要创建一个`IBAction`方法并将其链接到 Change Case\
    \ 按钮。\n\n1.  确保助理编辑器仍然打开，并且并排显示用户界面和`AppDelegate.swift`文件。\n\n2.  点击 MyFirstProgram\
    \ 用户界面上的 Change Case 按钮以选中它。\n\n3.  按住 Control 键，同时将鼠标拖拽到最后一个花括号上方，直到出现一条水平线，如图\
    \ [3-17](#A437923_1_En_3_Chapter.html#Fig17) 所示。\n\n    ![A437923_1_En_3_Fig17_HTML.jpg](A437923_1_En_3_Fig17_HTML.jpg)\n\
    \n    图 3-17. 从按钮 Control-拖拽到 `AppDelegate.swift` 文件\n\n4.  松开 Control 键和鼠标。会弹出一个窗口。\n\
    \n5.  点击 Connection 弹出菜单，然后选择 Action，如图 [3-18](#A437923_1_En_3_Chapter.html#Fig18)\
    \ 所示。\n\n    ![A437923_1_En_3_Fig18_HTML.jpg](A437923_1_En_3_Fig18_HTML.jpg)\n\
    \n    图 3-18."
  raw: "To help you create an IBOutlet , use the Assistant Editor. The Assistant Editor\
    \ lets you display the user interface in the left pane and your Swift code in\
    \ the right pane. Then you can use the mouse to drag between your user interface\
    \ items to your Swift code to create an IBOutlet that connects the label or text\
    \ field to an IBOutlet. Let’s see how that works:\n\n1.  Make sure the `MainMenu.xib`\
    \ file is selected to display the MyFirstProgram user interface window on the\
    \ screen. (If not, click the `MainMenu.xib` file in the Project Navigator and\
    \ then click the MyFirstProgram icon to display the user interface window.)  \n\
    2.  Choose View ➤ Assistant Editor ➤ Show Assistant Editor. The Assistant Editor\
    \ displays the Swift code in the `AppDelegate.swift` file next to the user interface\
    \ in the `MainMenu.xib` file, as shown in Figure [3-12](#A437923_1_En_3_Chapter.html#Fig12).\n\
    \n![A437923_1_En_3_Fig12_HTML.jpg](A437923_1_En_3_Fig12_HTML.jpg)\n\nFigure 3-12.\n\
    \nThe Assistant Editor lets you view the user interface and the Swift code file\
    \ side by side  \n3.  Click the label on your MyFirstProgram window.  \n4.  Hold\
    \ down the Control key and drag the mouse from the label underneath the @IBOutlet\
    \ line in the `AppDelegate.swift` file until you see a horizontal line appear\
    \ in the Swift code file, as shown in Figure [3-13](#A437923_1_En_3_Chapter.html#Fig13).\n\
    \n![A437923_1_En_3_Fig13_HTML.jpg](A437923_1_En_3_Fig13_HTML.jpg)\n\nFigure 3-13.\n\
    \nControl-dragging creates a connection between a user interface item and your\
    \ Swift code  \n5.  Release the Control key and the mouse. A pop-up window appears,\
    \ as shown in Figure [3-14](#A437923_1_En_3_Chapter.html#Fig14).\n\n![A437923_1_En_3_Fig14_HTML.jpg](A437923_1_En_3_Fig14_HTML.jpg)\n\
    \nFigure 3-14.\n\nA pop-up window lets you define a name for your IBOutlet  \n\
    6.  Click in the Name text field, type labelText, and click the Connect button.\
    \ (The name you choose should be descriptive but can be anything you want.) Xcode\
    \ creates an IBOutlet in your Swift file that looks like this:\n\n```\n    @IBOutlet\
    \ weak var labelText: NSTextField!\n    ```\n\n7.  Click the text field to select\
    \ it.  \n8.  Hold down the Control key and drag the mouse from the text field\
    \ to underneath the IBOutlet you just created until a horizontal line appears\
    \ in the `AppDelegate.swift` file.  \n9.  Release the Control key and the mouse.\
    \ A pop-up window appears.  \n10.  Click in the Name text field, type messageText,\
    \ and click the Connect button. Xcode creates a second IBOutlet in your Swift\
    \ file that looks like this:\n\n```\n    @IBOutlet weak var messageText: NSTextField!\n\
    \    ```\n\nLet’s go over what you just did. First, you created an IBOutlet to\
    \ represent the label and the text field. The label is now represented by the\
    \ name “labelText” and the text field is now represented by the name “messageText.”\
    \ When your Swift code needs to store or retrieve data from the label or text\
    \ field on the user interface, it can just refer to them by the names “labelText”\
    \ or “messageText.”\n\nSecond, you created a link between your Swift code and\
    \ your user interface items. Now your Swift code can send and retrieve data to\
    \ the label and text field on your program’s user interface.\n\nConnecting your\
    \ user interface to your Swift code is a major step towards making your user interface\
    \ actually work. However, you need to make the Change Case button do something\
    \ when the user clicks on it. To do that, you need to create something called\
    \ an IBAction method .\n\nWhere an IBOutlet lets Swift code send or retrieve data\
    \ from a user interface item, an IBAction method lets a user interface item run\
    \ Swift code that does something. In this case, you want the user to type text\
    \ into the text field. Then the program will take that text, capitalize it, and\
    \ display this capitalized text back into the label.\n\nTo do this, you need to\
    \ know how to do the following:\n\n*   Create an IBAction method.\n*   Retrieve\
    \ text from the text field.\n*   Capitalize all the text retrieved from the text\
    \ field.\n*   Store the capitalized text in the label.\n\nStoring and retrieving\
    \ text from a text field and label is similar because both are defined by IBOutlet\
    \ variables. Let’s take a look at what these IBOutlets mean:\n\n```\n@IBOutlet\
    \ weak var labelText: NSTextField!\n@IBOutlet weak var messageText: NSTextField!\n\
    ```\n\nAll user interface items in the Object Library are based on class files,\
    \ which make up the Cocoa framework. In this case, you created two IBOutlet variables\
    \ called `labelText` and `messageText` , which are both based on the `NSTextField`\
    \ class file.\n\nIf you look up the `NSTextField` class file in Xcode’s documentation,\
    \ you’ll see a long list of all the properties that anything based on the `NSTextField`\
    \ can hold. However, you won’t find anything that describes the property that\
    \ holds text.\n\nHowever, if you remember from Chapter [1](#A437923_1_En_1_Chapter.html),\
    \ object-oriented programming means that class files can inherit from other class\
    \ files. In this case, the `NSTextField` class inherits from another class called\
    \ `NSControl` . Looking up `NSControl` in Xcode’s documentation (which you’ll\
    \ learn how to do in the next chapter), you can see that `NSControl` has a property\
    \ that holds text called `stringValue`, as shown in Figure [3-15](#A437923_1_En_3_Chapter.html#Fig15).\n\
    \n![A437923_1_En_3_Fig15_HTML.jpg](A437923_1_En_3_Fig15_HTML.jpg)\n\nFigure 3-15.\n\
    \nXcode’s documentation shows the NSControl property for holding text\n\nTo access\
    \ text stored in the text field, you need to identify the text field by name (`messageText`)\
    \ and its property that holds the text (`stringValue`) such as\n\n```\nmessageText.stringValue\n\
    ```\n\nTo display text in the label, you need to identify the label by name (`labelText`)\
    \ and its property that holds text (`stringValue`) such as\n\n```\nlabelText.stringValue\n\
    ```\n\nThe next question is, how can you capitalize text? Swift stores text in\
    \ a data type called `String` , which has a method called `uppercased`, as shown\
    \ in Figure [3-16](#A437923_1_En_3_Chapter.html#Fig16).\n\n![A437923_1_En_3_Fig16_HTML.jpg](A437923_1_En_3_Fig16_HTML.jpg)\n\
    \nFigure 3-16.\n\nXcode’s documentation shows that the NSString class has a method\
    \ for capitalizing text called uppercaseString\n\nTo capitalize the text stored\
    \ in the text field (represented by the IBOutlet named messageText) , you just\
    \ have to apply the `uppercaseString` method on the IBOutlet’s `text` property\
    \ like this:\n\n```\nmessageText.stringValue.uppercased\n```\n\nThis Swift code\
    \ says take the `messageText` object (which is the text field on the user interface),\
    \ retrieve the text it contains (which is in the `stringValue` property), and\
    \ apply the uppercased method on this text.\n\nNow that you know how to retrieve\
    \ text from the text field, capitalize it, and store new text back into the label,\
    \ the last step is to write the code that does all this inside an IBAction method.\
    \ This IBAction method needs to run each time the user clicks the Change Case\
    \ button. So you need to create an IBAction method and link it to the Change Case\
    \ button.\n\n1.  Make sure the Assistant Editor is still open and displays the\
    \ user interface and `AppDelegate.swift` file side by side.  \n2.  Click the Change\
    \ Case button on your MyFirstProgram user interface to select it.  \n3.  Hold\
    \ down the Control key and drag the mouse above the last curly bracket until a\
    \ horizontal line appears, as shown in Figure [3-17](#A437923_1_En_3_Chapter.html#Fig17).\n\
    \n![A437923_1_En_3_Fig17_HTML.jpg](A437923_1_En_3_Fig17_HTML.jpg)\n\nFigure 3-17.\n\
    \nControl-dragging from the button to the AppDelegate.swift file  \n4.  Release\
    \ the Control key and the mouse. A pop-up window appears.  \n5.  Click in the\
    \ Connection pop-up menu and choose Action, as shown in Figure [3-18](#A437923_1_En_3_Chapter.html#Fig18).\n\
    \n![A437923_1_En_3_Fig18_HTML.jpg](A437923_1_En_3_Fig18_HTML.jpg)\n\nFigure 3-18."
  trans: "\n为了帮助你创建一个`IBOutlet`，请使用助理编辑器。助理编辑器可以让你在左侧窗格中显示用户界面，在右侧窗格中显示你的 Swift 代码。然后，你可以使用鼠标从用户界面元素拖拽到你的\
    \ Swift 代码中，从而创建一个将标签或文本字段连接到`IBOutlet`的`IBOutlet`。让我们看看它是如何工作的：\n\n1.  确保选中`MainMenu.xib`文件，以便在屏幕上显示\
    \ MyFirstProgram 用户界面窗口。（如果没有选中，请在项目导航器中点击`MainMenu.xib`文件，然后点击 MyFirstProgram\
    \ 图标以显示用户界面窗口。）\n\n2.  选择 View ➤ Assistant Editor ➤ Show Assistant Editor。助理编辑器会在`MainMenu.xib`文件的用户界面旁边显示`AppDelegate.swift`文件中的\
    \ Swift 代码，如图 3-12 所示。\n\n    ![A437923_1_En_3_Fig12_HTML.jpg](img/A437923_1_En_3_Fig12_HTML.jpg)\n\
    \n    图 3-12. 助理编辑器让你可以并排查看用户界面和 Swift 代码文件\n\n3.  点击 MyFirstProgram 窗口上的标签。\n\
    \n4.  按住 Control 键，同时将鼠标从标签拖拽到`AppDelegate.swift`文件中`@IBOutlet`行的下方，直到你在 Swift\
    \ 代码文件中看到一条水平线出现，如图 3-13 所示。\n\n    ![A437923_1_En_3_Fig13_HTML.jpg](img/A437923_1_En_3_Fig13_HTML.jpg)\n\
    \n    图 3-13. Control-拖拽会在一个用户界面项和你的 Swift 代码之间创建一个连接\n\n5.  松开 Control 键和鼠标。会弹出一个窗口，如图\
    \ 3-14 所示。\n\n    ![A437923_1_En_3_Fig14_HTML.jpg](img/A437923_1_En_3_Fig14_HTML.jpg)\n\
    \n    图 3-14. 弹出窗口让你为你的`IBOutlet`定义一个名称\n\n6.  点击 Name 文本字段，输入`labelText`，然后点击\
    \ Connect 按钮。（你选择的名称应该具有描述性，但可以是任何你想要的名称。）Xcode 会在你的 Swift 文件中创建一个如下所示的`IBOutlet`：\n\
    \n    ```\n        @IBOutlet weak var labelText: NSTextField!\n    ```\n\n7. \
    \ 点击文本字段以选中它。\n\n8.  按住 Control 键，同时将鼠标从文本字段拖拽到你刚刚创建的`IBOutlet`下方，直到`AppDelegate.swift`文件中出现一条水平线。\n\
    \n9.  松开 Control 键和鼠标。会弹出一个窗口。\n\n10. 点击 Name 文本字段，输入`messageText`，然后点击 Connect\
    \ 按钮。Xcode 会在你的 Swift 文件中创建第二个如下所示的`IBOutlet`：\n\n    ```\n        @IBOutlet weak\
    \ var messageText: NSTextField!\n    ```\n\n我们来回顾一下你刚才的操作。首先，你创建了一个`IBOutlet`来表示标签和文本字段。现在，标签由名称`labelText`表示，文本字段由名称`messageText`表示。当你的\
    \ Swift 代码需要从用户界面上的标签或文本字段存储或检索数据时，它可以直接通过名称`labelText`或`messageText`来引用它们。\n\n\
    其次，你在你的 Swift 代码和用户界面元素之间创建了一个链接。现在，你的 Swift 代码可以向你程序用户界面上的标签和文本字段发送数据，也可从中检索数据。\n\
    \n将你的用户界面连接到 Swift 代码是让用户界面真正工作的重要一步。但是，你需要让 Change Case 按钮在用户点击时执行某些操作。要做到这一点，你需要创建一个称为`IBAction`方法的东西。\n\
    \n`IBOutlet`允许 Swift 代码从用户界面元素发送或检索数据，而`IBAction`方法则允许用户界面元素运行执行某些操作的 Swift 代码。在这个例子中，你希望用户将文本输入到文本字段中。然后，程序将获取该文本，将其转换为大写，并将这个转换后的文本显示回标签中。\n\
    \n为此，你需要知道如何执行以下操作：\n\n- 创建一个`IBAction`方法。\n- 从文本字段检索文本。\n- 将检索到的所有文本转换为大写。\n\
    - 将大写的文本存储在标签中。\n\n从文本字段和标签中存储和检索文本是相似的，因为两者都由`IBOutlet`变量定义。让我们看看这些`IBOutlet`的含义：\n\
    \n```\n@IBOutlet weak var labelText: NSTextField!\n@IBOutlet weak var messageText:\
    \ NSTextField!\n```\n\n对象库中的所有用户界面元素都基于构成 Cocoa 框架的类文件。在这个例子中，你创建了两个名为`labelText`和`messageText`的`IBOutlet`变量，它们都基于`NSTextField`类文件。\n\
    \n如果你在 Xcode 的文档中查找`NSTextField`类文件，你会看到一长串属性列表，任何基于`NSTextField`的对象都可以拥有这些属性。但是，你找不到任何描述用于保存文本的属性的内容。\n\
    \n但是，如果你还记得第 1 章的内容，面向对象编程意味着类文件可以继承自其他类文件。在这个例子中，`NSTextField`类继承自另一个名为`NSControl`的类。在\
    \ Xcode 文档中查找`NSControl`（你将在下一章学习如何操作），你可以看到`NSControl`有一个名为`stringValue`的属性用于保存文本，如图\
    \ 3-15 所示。\n\n![A437923_1_En_3_Fig15_HTML.jpg](img/A437923_1_En_3_Fig15_HTML.jpg)\n\
    \n图 3-15. Xcode 的文档显示了 `NSControl` 用于保存文本的属性\n\n要访问存储在文本字段中的文本，你需要通过名称（`messageText`）及其保存文本的属性（`stringValue`）来标识该文本字段，例如：\n\
    \n```\nmessageText.stringValue\n```\n\n要在标签中显示文本，你需要通过名称（`labelText`）及其保存文本的属性（`stringValue`）来标识该标签，例如：\n\
    \n```\nlabelText.stringValue\n```\n\n下一个问题是，如何将文本转换成大写？Swift 将文本存储在一个名为`String`的数据类型中，它具有一个名为`uppercased`的方法，如图\
    \ 3-16 所示。\n\n![A437923_1_En_3_Fig16_HTML.jpg](img/A437923_1_En_3_Fig16_HTML.jpg)\n\
    \n图 3-16. Xcode 的文档显示了 `NSString` 类有一个名为 `uppercaseString` 的方法用于将文本转换为大写\n\n要转换存储在文本字段（由名为`messageText`的`IBOutlet`表示）中的文本，你只需在`IBOutlet`的`text`属性上应用`uppercaseString`方法，如下所示：\n\
    \n```\nmessageText.stringValue.uppercased\n```\n\n这个 Swift 代码的意思是：获取`messageText`对象（即用户界面上的文本字段），检索它包含的文本（在`stringValue`属性中），并对该文本应用`uppercased`方法。\n\
    \n现在你已经知道如何从文本字段检索文本、将其转换为大写以及将新文本存储回标签，最后一步是编写一个`IBAction`方法，在其中包含执行所有这些操作的代码。每当用户点击\
    \ Change Case 按钮时，都需要运行这个`IBAction`方法。因此，你需要创建一个`IBAction`方法并将其链接到 Change Case\
    \ 按钮。\n\n1.  确保助理编辑器仍然打开，并且并排显示用户界面和`AppDelegate.swift`文件。\n\n2.  点击 MyFirstProgram\
    \ 用户界面上的 Change Case 按钮以选中它。\n\n3.  按住 Control 键，同时将鼠标拖拽到最后一个花括号上方，直到出现一条水平线，如图\
    \ 3-17 所示。\n\n    ![A437923_1_En_3_Fig17_HTML.jpg](img/A437923_1_En_3_Fig17_HTML.jpg)\n\
    \n    图 3-17. 从按钮 Control-拖拽到 `AppDelegate.swift` 文件\n\n4.  松开 Control 键和鼠标。会弹出一个窗口。\n\
    \n5.  点击 Connection 弹出菜单，然后选择 Action，如图 3-18 所示。\n\n    ![A437923_1_En_3_Fig18_HTML.jpg](img/A437923_1_En_3_Fig18_HTML.jpg)\n\
    \n    图 3-18.\n"
- fmt: "# Creating an Action connection\n\n6. Click in the Name text field and type\
    \ `changeCase` (The name you choose should be descriptive but can be anything\
    \ you want.)\n7. Click in the Type pop-up menu and choose `NSButton`, as shown\
    \ in Figure [3-19](#A437923_1_En_3_Chapter.html#Fig19). Then click the Connect\
    \ button. Xcode creates an `IBAction` method that looks like this:\n\n![A437923_1_En_3_Fig19_HTML.jpg](A437923_1_En_3_Fig19_HTML.jpg)\n\
    \nFigure 3-19. Choosing a Type for an `IBAction` method\n\n```\n@IBAction func\
    \ changeCase(_ sender: NSButton) {\n}\n```\n\nAt this point, you’ve created an\
    \ `IBAction` method that runs every time the user clicks the Change Case button.\
    \ Of course, there’s no Swift code inside that `IBAction`, so now you need to\
    \ type Swift code inside those curly brackets that defines the beginning and ending\
    \ of the `IBAction` method.\n\n1. Make sure Xcode still displays your user interface\
    \ and `AppDelegate.swift` file side by side.\n2. Choose View ➤ Standard Editor\
    \ ➤ Show Standard Editor. Xcode now only shows your MyFirstProgram user interface.\n\
    3. Click the `AppDelegate.swift` file in the Project Navigator. Xcode displays\
    \ all the Swift code stored in the `AppDelegate.swift` file.\n4. Edit the `IBAction`\
    \ `changeCase` method as follows:\n\n```\n@IBAction func changeCase(_ sender:\
    \ NSButton) {\n    labelText.stringValue = messageText.stringValue.uppercased()\n\
    }\n```\n\n5. Choose Product ➤ Run. Your MyFirstProgram runs.\n6. Click in the\
    \ text field of your MyFirstProgram user interface and type `hello, world`.\n\
    7. Click the Change Case button. The label displays `HELLO, WORLD`, as shown in\
    \ Figure [3-20](#A437923_1_En_3_Chapter.html#Fig20).\n\n![A437923_1_En_3_Fig20_HTML.jpg](A437923_1_En_3_Fig20_HTML.jpg)\n\
    \nFigure 3-20. Running the MyFirstProgram\n\n8. Choose MyFirstProgram ➤ Quit MyFirstProgram.\
    \ Xcode appears again.\n\nAs you can see, you created a simple Macintosh program\
    \ without writing much Swift code at all. The Swift code you did write was just\
    \ a single line that took the text stored in the text field, changed it to uppercase,\
    \ and then stored this uppercase text in the label.\n\nMuch of the power of Swift\
    \ comes from relying on Apple’s Cocoa framework as much as possible, which displays\
    \ a window that the user can move or resize. In addition, the Cocoa framework\
    \ also creates pull-down menus that you can modify. To understand the Cocoa framework,\
    \ you have to understand object-oriented programming and how classes define properties\
    \ (to store data) and methods (to manipulate data), and use inheritance, which\
    \ you’ll learn more about in the next chapter.\n\nThe main point is to see how\
    \ Xcode creates generic macOS programs so you just need to design and customize\
    \ the user interface and then write Swift code to make it all work.\n\n## Using\
    \ the Document Outline and Connections Inspector\n\nBefore we conclude this short\
    \ introduction to creating your first Macintosh program, let’s look at two other\
    \ items that will prove helpful when working with Xcode in the future: the Document\
    \ Outline and the Connections Inspector.\n\nThe Document Outline lists all the\
    \ items that make up your user interface. To open or hide the Document Outline,\
    \ click the user interface file (the `.xib` or `.storyboard` file in the left\
    \ pane) and then do the following, as shown in Figure [3-21](#A437923_1_En_3_Chapter.html#Fig21):\n\
    \n![A437923_1_En_3_Fig21_HTML.jpg](A437923_1_En_3_Fig21_HTML.jpg)\n\nFigure 3-21.\
    \ The Document Outline\n\n- Choose Editor ➤ Show/Hide Document Outline.\n- Click\
    \ the Document Outline icon.\n\nThe Document Outline makes it easy to select different\
    \ items on your user interface. In your MyFirstProgram, there are only three items\
    \ (a label, text field, and button) but in more complicated user interfaces, you\
    \ could have many more items that could be hidden behind other items or too small\
    \ to see easily.\n\nIf you click an item in the Document Outline, Xcode selects\
    \ that item in the user interface (and vice versa), as shown in Figure [3-22](#A437923_1_En_3_Chapter.html#Fig22).\n\
    \n![A437923_1_En_3_Fig22_HTML.jpg](A437923_1_En_3_Fig22_HTML.jpg)\n\nFigure 3-22.\
    \ Clicking an item in the Document Outline window selects that item on the user\
    \ interface\n\nThink of the Document Outline as a fast way to see all the parts\
    \ of a user interface and select just the items you want.\n\nOnce you start connecting\
    \ user interface items to your Swift code through `IBOutlet` and `IBAction` methods,\
    \ you may wonder what items are connected to which `IBOutlet` and `IBAction` methods.\
    \ To see the connections between `IBOutlet`/`IBAction` methods and user interface\
    \ items, you have two options.\n\nFirst, you can use the Connections Inspector.\
    \ Second, you can use the Assistant Editor.\n\nTo open the Connections Inspector,\
    \ first click any item in the user interface that you want to examine and then\
    \ do one of the following to display the Connections Inspector that appears in\
    \ the upper right corner of the Xcode window, as shown in Figure [3-23](#A437923_1_En_3_Chapter.html#Fig23):\n\
    \n![A437923_1_En_3_Fig23_HTML.jpg](A437923_1_En_3_Fig23_HTML.jpg)\n\nFigure 3-23.\
    \ The Connections Inspector shows all the connections to the currently selected\
    \ user interface item\n\n- Choose View ➤ Utilities ➤ Show Connections Inspector.\n\
    - Press Option + Command + 6.\n- Click the Show Connections Inspector icon.\n\n\
    The Connections Inspector shows the Swift file that holds an `IBOutlet` or the\
    \ `IBAction` method connected to the selected user interface item.\n\nNote: If\
    \ you look carefully, the Connections Inspector displays an X to the left of the\
    \ Swift file that links to the currently selected user interface item. If you\
    \ click this X, you can break the link between a user interface item and its `IBOutlet`\
    \ or `IBAction` method.\n\nAnother way to see which `IBOutlet` and `IBAction`\
    \ methods are connected to user interface items is to open the user interface\
    \ (such as clicking the `MainMenu.xib` file) and then open the Assistant Editor.\n\
    \nTo the left of each `IBOutlet` and `IBAction` method in your Swift file, you’ll\
    \ see a gray circle. When you move the mouse pointer over a gray circle, Xcode\
    \ highlights the user interface item that’s connected to that `IBOutlet` or `IBAction`\
    \ method, as shown in Figure [3-24](#A437923_1_En_3_Chapter.html#Fig24).\n\n![A437923_1_En_3_Fig24_HTML.jpg](A437923_1_En_3_Fig24_HTML.jpg)\n\
    \nFigure 3-24. The Assistant Editor lets you see which `IBOutlet` and `IBAction`\
    \ methods are connected to user interface items"
  raw: "Creating an Action connection  \n6.  Click in the Name text field and type\
    \ changeCase. (The name you choose should be descriptive but can be anything you\
    \ want.)  \n7.  Click in the Type pop-up menu and choose NSButton, as shown in\
    \ Figure [3-19](#A437923_1_En_3_Chapter.html#Fig19). Then click the Connect button.\
    \ Xcode creates an IBAction method that looks like this:\n\n![A437923_1_En_3_Fig19_HTML.jpg](A437923_1_En_3_Fig19_HTML.jpg)\n\
    \nFigure 3-19.\n\nChoosing a Type for an IBAction method\n\n```\n    @IBAction\
    \ func changeCase(_ sender: NSButton) {\n    }\n    ```\n\nAt this point, you’ve\
    \ created an IBAction method that runs every time the user clicks the Change Case\
    \ button. Of course, there’s no Swift code inside that IBAction, so now you need\
    \ to type Swift code inside those curly brackets that defines the beginning and\
    \ ending of the IBAction method.\n\n1.  Make sure Xcode still displays your user\
    \ interface and `AppDelegate.swift` file side by side.  \n2.  Choose View ➤ Standard\
    \ Editor ➤ Show Standard Editor. Xcode now only shows your MyFirstProgram user\
    \ interface.  \n3.  Click the `AppDelegate.swift` file in the Project Navigator.\
    \ Xcode displays all the Swift code stored in the `AppDelegate.swift` file.  \n\
    4.  Edit the IBAction `changeCase` method as follows:\n\n```\n    @IBAction func\
    \ changeCase(_ sender: NSButton) {\n    labelText.stringValue = messageText.stringValue.uppercased()\n\
    \    }\n    ```\n\n5.  Choose Product ➤ Run. Your MyFirstProgram runs.  \n6. \
    \ Click in the text field of your MyFirstProgram user interface and type hello,\
    \ world.  \n7.  Click the Change Case button. The label displays HELLO, WORLD,\
    \ as shown in Figure [3-20](#A437923_1_En_3_Chapter.html#Fig20).\n\n![A437923_1_En_3_Fig20_HTML.jpg](A437923_1_En_3_Fig20_HTML.jpg)\n\
    \nFigure 3-20.\n\nRunning the MyFirstProgram  \n8.  Choose MyFirstProgram ➤ Quit\
    \ MyFirstProgram. Xcode appears again.\n\nAs you can see, you created a simple\
    \ Macintosh program without writing much Swift code at all. The Swift code you\
    \ did write was just a single line that took the text stored in the text field,\
    \ changed it to uppercase, and then stored this uppercase text in the label.\n\
    \nMuch of the power of Swift comes from relying on Apple’s Cocoa framework as\
    \ much as possible, which displays a window that the user can move or resize.\
    \ In addition, the Cocoa framework also creates pull-down menus that you can modify.\
    \ To understand the Cocoa framework, you have to understand object-oriented programming\
    \ and how classes define properties (to store data) and methods (to manipulate\
    \ data), and use inheritance, which you’ll learn more about in the next chapter.\n\
    \nThe main point is to see how Xcode creates generic macOS programs so you just\
    \ need to design and customize the user interface and then write Swift code to\
    \ make it all work.\n\n## Using the Document Outline and Connections Inspector\n\
    \nBefore we conclude this short introduction to creating your first Macintosh\
    \ program, let’s look at two other items that will prove helpful when working\
    \ with Xcode in the future: the Document Outline and the Connections Inspector.\n\
    \nThe Document Outline lists all the items that make up your user interface. To\
    \ open or hide the Document Outline, click the user interface file (the `.xib`\
    \ or `.storyboard` file in the left pane) and then do the following, as shown\
    \ in Figure [3-21](#A437923_1_En_3_Chapter.html#Fig21):\n\n![A437923_1_En_3_Fig21_HTML.jpg](A437923_1_En_3_Fig21_HTML.jpg)\n\
    \nFigure 3-21.\n\nThe Document Outline\n\n*   Choose Editor ➤ Show/Hide Document\
    \ Outline.\n*   Click the Document Outline icon.\n\nThe Document Outline makes\
    \ it easy to select different items on your user interface. In your MyFirstProgram,\
    \ there are only three items (a label, text field, and button) but in more complicated\
    \ user interfaces, you could have many more items that could be hidden behind\
    \ other items or too small to see easily.\n\nIf you click an item in the Document\
    \ Outline, Xcode selects that item in the user interface (and vice versa), as\
    \ shown in Figure [3-22](#A437923_1_En_3_Chapter.html#Fig22).\n\n![A437923_1_En_3_Fig22_HTML.jpg](A437923_1_En_3_Fig22_HTML.jpg)\n\
    \nFigure 3-22.\n\nClicking an item in the Document Outline window selects that\
    \ item on the user interface\n\nThink of the Document Outline as a fast way to\
    \ see all the parts of a user interface and select just the items you want.\n\n\
    Once you start connecting user interface items to your Swift code through IBOutlets\
    \ and IBAction methods, you may wonder what items are connected to which IBOutlets\
    \ and IBAction methods. To see the connections between IBOutlets/IBAction methods\
    \ and user interface items, you have two options.\n\nFirst, you can use the Connections\
    \ Inspector. Second, you can use the Assistant Editor.\n\nTo open the Connections\
    \ Inspector, first click any item in the user interface that you want to examine\
    \ and then do one of the following to display the Connections Inspector that appears\
    \ in the upper right corner of the Xcode window, as shown in Figure [3-23](#A437923_1_En_3_Chapter.html#Fig23):\n\
    \n![A437923_1_En_3_Fig23_HTML.jpg](A437923_1_En_3_Fig23_HTML.jpg)\n\nFigure 3-23.\n\
    \nThe Connections Inspector shows all the connections to the currently selected\
    \ user interface item\n\n*   Choose View ➤ Utilities ➤ Show Connections Inspector.\n\
    *   Press Option + Command + 6.\n*   Click the Show Connections Inspector icon.\n\
    \nThe Connections Inspector shows the Swift file that holds an IBOutlet or the\
    \ IBAction method connected to the selected user interface item.\n\nNote\n\nIf\
    \ you look carefully, the Connections Inspector displays an X to the left of the\
    \ Swift file that links to the currently selected user interface item. If you\
    \ click this X, you can break the link between a user interface item and its IBOutlet\
    \ or IBAction method.\n\nAnother way to see which IBOutlets and IBAction methods\
    \ are connected to user interface items is to open the user interface (such as\
    \ clicking the `MainMenu.xib` file) and then open the Assistant Editor.\n\nTo\
    \ the left of each IBOutlet and IBAction method in your Swift file, you’ll see\
    \ a gray circle. When you move the mouse pointer over a gray circle, Xcode highlights\
    \ the user interface item that’s connected to that IBOutlet or IBAction method,\
    \ as shown in Figure [3-24](#A437923_1_En_3_Chapter.html#Fig24).\n\n![A437923_1_En_3_Fig24_HTML.jpg](A437923_1_En_3_Fig24_HTML.jpg)\n\
    \nFigure 3-24.\n\nThe Assistant Editor lets you see which IBOutlet and IBAction\
    \ methods are connected to user interface items"
