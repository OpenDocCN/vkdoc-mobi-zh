  \ 中的 intent 实现后，我们可以清楚地看到我们的 intent 设置了哪些 action、type 和 extra 参数。那么为什么它们会失败呢？\n\n\
  经过调试并深入分析分享 intent 的启动方式，如下所示：\n\n```java\nstartActivity(Intent.createChooser(\n\
  \    shareIntent,\n    getResources().getText(R.string.share_to)));\n```\n\n我们可以看到，Android\
  \ 的 `Intent.createChooser()` 方法被用来将这个 intent 以自定义标题发送到系统。这个方法将提供的 intent 参数（包含指定的\
  \ action、type 和 extra 参数）包装到另一个具有新 action 的 intent 中，并将我们的 intent 作为其 extra 参数的一部分。图\
