  \ 并运行测试。观察结果。恢复 `GrantPermissionRule` 的删除并再次运行测试。观察结果。\n\n#### 2. 运行 `RuntimePermissionsUiAutomatorTest.kt`\
  \ 类中实现的所有测试\n\n从应用程序 `build.gradle` 文件中移除所有 Android Test Orchestrator 依赖项，并再次运行测试。观察结果。恢复到原始文件。\n\
  \n#### 3. 编写一个测试\n\n编写一个测试，打开 TO-DO 应用程序设置并启用相机权限。然后打开 TO-DO 应用程序并继续创建任务。\n\n##\
  \ 总结\n\n本章展示了如何在运行时更改 Android 模拟器系统语言，并描述了在 UI 测试中处理运行时权限的不同方法。应该清楚的是，多语言支持是现代 Android\
  \ 应用程序的必备功能。这需要彻底的测试，并且使测试环境能够轻松切换模拟器系统语言是此测试基础设施的重要组成部分。\n\n拥有一种简单可靠的方式来设置运行时权限，对最终用户来说是一个至关重要且敏感的话题。它影响用户满意度，应该进行彻底测试。应用程序应正确处理不同的权限流程，且不能出错。当然，选择哪种测试方法最适合您的具体情况，完全取决于您——使用\
  \ `GrantPermissionRule` 或使用 UI Automator 框架完全自动化权限授予。凭借本章的知识，您可以轻松做到这一点。\n\n# 10.\
  \ Android 测试自动化工具\n\n本章包含有关 Android 平台提供的用于测试自动化的工具的信息。我们将讨论为测试自动化设置虚拟或物理设备的相关主题，了解\
  \ Espresso Test Recorder 如何帮助我们编写自动化测试，并学习如何在 Firebase Test Lab 中运行自动化测试。\n\n##\
  \ 为测试自动化设置虚拟或物理设备\n\n正确配置的虚拟或物理设备是获得可靠测试的必备条件。以下是可能影响测试执行并导致测试不稳定的设备属性列表：\n\n* \
  \  系统动画\n*   触摸和长按延迟\n*   虚拟键盘显示\n\n### 系统动画\n\n不幸的是，Espresso 无法处理系统动画，这可能导致不稳定的测试。这是\
  \ Espresso 的主要限制之一。另一方面，动画应该手动测试，在自动化测试中禁用它们对我们没有坏处。Android 操作系统有三种系统动画类型：\n\n*\
  \   **窗口动画缩放** — 设置窗口动画播放速度，以便您可以在不同速度下检查其性能。较低的缩放比例会导致更快的速度。\n*   **过渡动画缩放** —\
  \ 设置过渡动画播放速度，以便您可以在不同速度下检查其性能。较低的缩放比例会导致更快的速度。\n*   **动画时长缩放** — 设置动画的持续时间。\n\n\
  这些动画属性可在“设置” ➤ “系统” ➤ “开发者选项”中的“绘图”部分找到，如图 10-1 所示。\n\n![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig1_HTML.jpg](img/469090_1_En_10_Fig1_HTML.jpg)\n\
  \n**图 10-1** 设备开发者选项中的系统动画属性\n\n当然，我们希望所有动画都能自动禁用。这可以通过两种方式实现。我们可以在测试运行前或设备启动时执行以下\
  \ shell 命令。\n\n*用于设置系统动画属性的 Shell 命令：*\n\n```\nadb shell settings put global animator_duration_scale\
  \ 0.0\nadb shell settings put global transition_animation_scale 0.0\nadb shell settings\
  \ put global window_animation_scale 0.0\n```\n\n第二种选择是执行相同的命令，但使用 `UiDevice` 实例在测试运行前执行。\n\
  \n*在 @BeforeClass 方法中设置系统动画属性：*\n\n```\ncompanion object {\n@BeforeClass\n@JvmStatic\n\
  fun setDevicePreferencies() {\nval uiDevice = UiDevice.getInstance(InstrumentationRegistry.getInstrumentation())\n\
  uiDevice.executeShellCommand(\"settings put global animator_duration_scale 0.0\"\
  )\nuiDevice.executeShellCommand(\"settings put global transition_animation_scale\
  \ 0.0\")\nuiDevice.executeShellCommand(\"settings put global window_animation_scale\
  \ 0.0\")\n}\n}\n```\n\n在此示例中，我们使用 `@BeforeClass` 注解为整个测试类执行一次。\n\n### 触摸和长按延迟\n\n\
  第二个可能导致不稳定的设备属性是**触摸和长按延迟**。您可以在“系统” ➤ “无障碍”部分找到它，如图 10-2 所示。\n\n![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig2_HTML.jpg](img/469090_1_En_10_Fig2_HTML.jpg)\n\
  \n**图 10-2** 触摸和长按延迟无障碍属性\n\n此属性负责设置系统用来区分单击和长按操作的时间。如果单击的触摸时间超过了“触摸和长按延迟”限制，则会被解释为长按。如果您长按工具栏图标以查看其内容描述，就可以看到这一点。在某些真实设备上，当此延迟值较短时，单击可能变为长按，从而导致自动化\
  \ UI 测试失败。为了避免这种情况，我们可以修改“触摸和长按延迟”值。\n第一种方法是执行以下 shell 命令（延迟值以毫秒为单位）：\n\n```\nadb\
  \ shell settings put secure long_press_timeout 1500\n```\n\n第二种方法是从 `@BeforeClass`\
  \ 方法内部运行，如下所示。\n\n*在 @BeforeClass 方法中设置触摸和长按延迟：*\n\n```\ncompanion object {\n@BeforeClass\n\
  @JvmStatic\nfun setDevicePreferencies() {\nval uiDevice = UiDevice.getInstance(InstrumentationRegistry.getInstrumentation())\n\
  uiDevice.executeShellCommand(\"settings put secure long_press_timeout 1500\")\n\
  }\n}\n```\n\n顺便说一下，默认的 `Short` 值设置为 500 毫秒，`Medium` 设置为 1000 毫秒，`Long` 设置为 1500\
  \ 毫秒。\n\n### 虚拟键盘显示\n\n现在让我们讨论最后一个可能导致测试不稳定的设备属性——**虚拟键盘显示**。乍一看，虚拟键盘似乎与测试不稳定性完全无关，但有一点我们必须记住——用于\
  \ Android 的 Espresso 仅在测试上下文中在我们的应用程序内运行，并且不允许与任何第三方应用程序交互。\n\n猜猜怎么着？虚拟键盘不属于我们的应用程序。因此，可能会出现移动设备性能变慢，并且\
  \ `ViewActions.closeSoftKeyboard()` 方法执行不够快的情况。此时，如果测试需要点击隐藏在虚拟键盘后面的 UI 元素（该键盘本应关闭，但仍处于关闭过程中），它们可能会意外点击到键盘。会抛出以下异常：\n\
  \n```\njava.lang.SecurityException: Injecting to another application requires INJECT_EVENTS\
  \ permission\n```\n\n为了避免此问题，我们可以手动禁用虚拟设备上的虚拟键盘显示。不幸的是，除非连接物理键盘，否则在真实设备上没有很好的方法来实现这一点。要禁用虚拟键盘，请导航至“设置”\
  \ ➤ “系统” ➤ “语言与输入法” ➤ “实体键盘”，并禁用“显示虚拟键盘”选项。或者，同样可以通过 shell 来完成：\n\n```\nadb shell\
  \ settings put secure show_ime_with_hard_keyboard 0\n```\n\n您也可以像下面这样从测试内部执行相同的命令。\n\
  \n*在 @BeforeClass 方法中禁用虚拟键盘：*\n\n```\ncompanion object {\n@BeforeClass\n@JvmStatic\n\
  fun setDevicePreferencies() {\nval uiDevice = UiDevice.getInstance(InstrumentationRegistry.getInstrumentation())\n\
  uiDevice.executeShellCommand(\"settings put secure show_ime_with_hard_keyboard 0\"\
  )\n}\n}\n```\n\n\n\n结合上述所有命令后，我们得到以下结果。\n\n*`chapter10.devicesetup.*`* *`DeviceSetupTest.kt`*\n\
  \n```\ncompanion object {\n    @BeforeClass\n    @JvmStatic\n    fun setDevicePreferences()\
  \ {\n        val uiDevice = UiDevice.getInstance(InstrumentationRegistry.getInstrumentation())\n\
  \        uiDevice.executeShellCommand(\"settings put global animator_duration_scale\
  \ 0.0\")\n        uiDevice.executeShellCommand(\"settings put global transition_animation_scale\
  \ 0.0\")\n        uiDevice.executeShellCommand(\"settings put global window_animation_scale\
  \ 0.0\")\n        uiDevice.executeShellCommand(\"settings put secure long_press_timeout\
  \ 1500\")\n        uiDevice.executeShellCommand(\"settings put secure show_ime_with_hard_keyboard\
  \ 0\")\n    }\n}\n```\n\n无论采用哪种方法将测试设备设置为适合测试的状态，它们都一定会使你的自动化测试更可靠、更不易出现不稳定。\n\n\
  ## 练习 23\n\n**配置用于自动化测试的设备**\n\n1.  创建一个 Android 模拟器，并观察辅助功能菜单中系统动画、虚拟键盘和长按延迟的默认值。运行\
  \ `chapter10.DeviceSetupTest.kt` 中实现的测试。待测试运行后，观察相同属性的值并比较结果。\n\n2.  设置默认模拟器或设备的系统动画、虚拟键盘和长按延迟状态。从终端手动执行所有\
  \ Shell 命令。随后观察上述属性的状态。\n\n3.  创建一个包含本节所有 Shell 命令的 Shell 脚本，该脚本用于在已连接的设备上执行这些命令。\n\
  \n## 使用 Espresso 测试录制器工具\n\nEspresso 的作者很可能受到了 Selenium IDE 测试录制器的启发，并决定将相同的功能也添加到\
  \ Espresso 中。Espresso 测试录制器工具允许经验不足的用户以更少的精力创建 Espresso UI 测试。该工具在 Android Studio\
  \ 2.3 版本中开始可用且稳定。\n\n测试录制器工具已集成到 Android Studio IDE 中，可通过 **Run ➤ Record Espresso\
  \ Test** 菜单访问，如图 10-3 所示。\n\n![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig3_HTML.jpg](img/469090_1_En_10_Fig3_HTML.jpg)\n\
  \n**图 10-3** Android Studio “运行”菜单中的 “Record Espresso Test” 选项\n\n在开始之前，你应该已连接了测试设备或预先创建了虚拟设备。触发录制后，系统会要求你选择目标设备。应用程序构建完成后，将被部署到目标设备并以调试模式运行。见图\
  \ 10-4。\n\n![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig4_HTML.jpg](img/469090_1_En_10_Fig4_HTML.jpg)\n\
  \n**图 10-4** 目标设备选择对话框\n\n录制过程中，应用程序的交互操作将被跟踪并显示在录制器视图中。图 10-5 演示了在示例应用程序中添加新待办事项流程的过程。\n\
  \n![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig5_HTML.jpg](img/469090_1_En_10_Fig5_HTML.jpg)\n\
  \n**图 10-5** Espresso 测试录制器窗口\n\n**Add Assertion** 按钮允许你添加以下类型的断言（见图 10-6）：\n\n\
  ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig6_HTML.jpg](img/469090_1_En_10_Fig6_HTML.jpg)\n\
  \n**图 10-6** 向 Espresso 测试录制器添加断言\n\n- **Text is** — 等同于 `check(matches(withText()))`\n\
  - **Exists** — 等同于 `check(matches(isDisplayed()))`\n- **Does not exist** — 等同于 `check(doesNotExist())`\n\
  \n完成录制并点击 **OK** 按钮后，系统会要求你提供测试类的名称，并选择测试类语言（Java 或 Kotlin）。见图 10-7。\n\n![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig7_HTML.jpg](img/469090_1_En_10_Fig7_HTML.jpg)\n\
  \n**图 10-7** 将录制的测试保存到测试类文件中\n\n你不能将录制的测试保存到已存在的测试类中。如果尝试这样做，将显示如图 10-8 所示的错误。\n\
  \n![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig8_HTML.jpg](img/469090_1_En_10_Fig8_HTML.jpg)\n\
  \n**图 10-8** 尝试将录制的测试保存到现有文件时出错\n\n默认情况下，录制的测试存储在 `tasks` 包内，该包会在应用程序包内自动创建。见图 10-9。\n\
  \n![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig9_HTML.jpg](img/469090_1_En_10_Fig9_HTML.jpg)\n\
  \n**图 10-9** 录制的测试的保存路径\n\nEspresso 测试录制器可以在 Android Studio 的首选项中进行调整。你可以观察到，使用默认深度值（最大\
  \ UI 深度 = 3，ScrollView 检测 = 5，断言深度 = 3）时，测试录制器和应用程序相当慢。如果你将它们降低到 1 或 2，它们的响应会快得多。见图\
  \ 10-10。\n\n![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig10_HTML.jpg](img/469090_1_En_10_Fig10_HTML.jpg)\n\
  \n**图 10-10** Espresso 测试录制器首选项\n\n接下来，你可以看到默认深度值下点击 **Add TO-DO** 浮动操作按钮是如何被录制的。\n\
  \n*点击“添加待办事项”按钮，录制器在默认深度值下生成的代码。*\n\n```\nval floatingActionButton = onView(\nallOf(withId(R.id.fab_add_task),\
  \ withContentDescription(\"Add todo\"),\nchildAtPosition(\nallOf(withId(R.id.coordinatorLayout),\n\
  childAtPosition(\nwithClassName(`is`(\"android.widget.LinearLayout\")),\n1)),\n\
  1),\nisDisplayed()))\nfloatingActionButton.perform(click())\n```\n\n以下是同一操作在最大 UI\
  \ 深度设置为 1 时的示例。\n\n*点击“添加待办事项”按钮，录制器在深度值设置为 1 时生成的代码。*\n\n```\nval floatingActionButton\
  \ = onView(\nallOf(withId(R.id.fab_add_task), isDisplayed()))\nfloatingActionButton.perform(click())\n\
  ```\n\n你可以观察并比较在 `chapter10.testrecorder.AddTodoEspressoTestRecorder.kt` 类中使用默认深度值录制，以及在\
  \ `chapter10.testrecorder.AddTodoEspressoTestRecorderLowerDepth.kt` 类中深度值设置为 1 时录制，添加新待办事项测试代码的差异。\n\
  \n熟悉 Espresso 测试录制器后，你会注意到：\n\n- 对于所有 `EditText` 字段，它会添加 `closeSoftKeyboard()` 这个\
  \ `ViewAction`。\n- 当目标视图是 `ScrollView` 布局的一部分时，会在对其执行其他操作之前添加 `scrollTo()` 这个 `ViewAction`。\n\
  - 如果应用程序需要权限，`GrantPermissionRule` 会被添加到测试类中。\n\n总的来说，Espresso 测试录制器可能是开始使用 Espresso\
  \ 本身的一个好方法，但它也有一些缺点：\n\n- 录制时应用程序速度较慢（深度值越高速度越慢，但降低深度值可能导致测试失败）。\n- 生成的代码可能庞大且难以阅读。\n\
  - 断言支持有限。\n- 自动生成的测试通常需要额外的定制。\n- 不支持由网络请求引起的应用程序延迟，因此你需要手动创建并注册一个 `IdlingResource`。\n\
  - 不支持 `WebView` 布局。\n\n## 练习 24\n\n**使用 Espresso 测试录制器**\n\n1.  录制一个包含断言的新建和编辑待办事项的测试。将测试类保存为\
  \ Kotlin 语言。观察生成的代码。运行录制的测试。\n\n2.  打开 **Android Studio Preferences ➤ Espresso Test\
  \ Recorder**，将 **Max UI depth** 和 **Assertion Depth** 降低到 1。录制步骤 1 中描述的测试。观察生成的代码并将其与步骤\
  \ 1 的代码进行比较。运行录制的测试。\n\n\n\n3.  录制一个会触发“相机权限”对话框的测试。观察生成的代码，并运行录制好的测试。\n\n## 从 Android\
  \ Studio 在 Firebase Test Lab 中运行 Espresso 测试\n\n众所周知，Android 平台本质上存在严重的设备碎片化问题。为了应对这一问题，你可能会根据使用统计数据准备多种移动设备，但这考虑到设备维护成本，代价相当高昂。尽管在手动测试中这是必需品，但在测试自动化中，我们更倾向于使用\
  \ Android 模拟器、自定义设备实验室或第三方服务。\n\n第三方服务确实曾为移动开发者提供了这种可能性，但它们缺乏标准化且成本高昂。于是，谷歌决定将其自身的设备测试解决方案引入\
  \ Android 生态系统，即 Firebase Test Lab。它允许开发者在真实设备或模拟器上运行自动化测试，而无需自行维护这些设备。\n\n让我们来看看如何开始使用\
  \ Firebase 及其带来的好处。首先，从 [`https://firebase.google.com/`](https://firebase.google.com/)\
  \ 进入 Firebase 控制台，并使用你的 Google 账户登录（见图 10-11）。\n\n![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig11_HTML.jpg](img/469090_1_En_10_Fig11_HTML.jpg)\n\
