  \ setSwipeDuration(int duration) {\nswipeCustomDuration = duration;\n}\nprivate\
  \ static Swiper.Status sendLinearSwipe(UiController uiController,\nfloat[] startCoordinates,\n\
  float[] endCoordinates,\nfloat[] precision,\nint duration) {\n...\n}\nprivate static\
  \ float[][] interpolate(float[] start, float[] end, int steps) {\n...\nreturn res;\n\
  }\n}\n```\n\n在我们的实现中，我们可以通过 `setSwipeDuration()` 方法设置滑动持续时间来控制滑动时长，该方法会修改静态变量 `swipeCustomDuration`。我们还必须从\
