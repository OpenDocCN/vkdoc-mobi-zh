- "# 2. 为我们的需求定制 Espresso\n\n\n```markdown\n\nEspresso 是一个很好的测试框架，但不可能用预定义的方法和类覆盖所有测试自动化场景。就像\
  \ Android 的基础组件可以在应用程序开发过程中自定义一样，Espresso 使我们能够自定义其组件。工程师可以自由创建自己的操作、匹配器和失败处理程序，并将其插入到测试中。在本章中，我们将学习如何创建自定义视图、滑动和\
  \ RecyclerView 操作；理解如何构建不同类型的匹配器；以自定义方式处理测试失败；以及在失败时截取适当的屏幕截图。\n\n## 编写自定义 ViewAction\n\
  \n`ViewAction` 是 Espresso 最常用的功能之一。Espresso 提供了大量的 `ViewAction`，但由于它们可能不适合我们的特定需求，我们需要更多。根据我的实践经验，大多数情况下，以下视图操作类型需要自定义：\n\
  \n*   滑动操作\n*   RecyclerView 操作\n*   `ViewAction`\n\n我们还将讨论在本章中为特定情况自定义简单点击操作的示例。\n\
  \n## 适配 Espresso 滑动操作\n\n在第 1 章中，我们提到了 Espresso 提供的四种滑动操作——`swipeUp()`、`swipeDown()`、`swipeLeft()`\
  \ 和 `swipeRight()`。这是 `swipeUp()` 操作的实现方式：\n\n```\npublic static ViewAction swipeUp()\
  \ {\nreturn actionWithAssertions(new GeneralSwipeAction(Swipe.FAST,\nGeneralLocation.translate(GeneralLocation.BOTTOM_CENTER,\
  \ 0, -EDGE_FUZZ_FACTOR),\nGeneralLocation.TOP_CENTER, Press.FINGER));\n}\n```\n\n\
  正如你可能猜到的，`GeneralLocation.BOTTOM_CENTER` 和 `GeneralLocation.TOP_CENTER` 代表了我们要滑动的视图内部的\
  \ `from` 和 `to` 坐标。可以用于 `from` 和 `to` 坐标的完整位置列表包括：`TOP_LEFT`、`TOP_CENTER`、`TOP_RIGHT`、`CENTER_LEFT`、`CENTER`、`CENTER_RIGHT`、`BOTTOM_LEFT`、`BOTTOM_CENTER`\
  \ 和 `BOTTOM_RIGHT`。`Swipe.FAST` 表示“快速”滑动应持续的时间长度，以毫秒为单位。目前，`Swipe` 有 `FAST`（100\
  \ 毫秒）和 `SLOW`（1500 毫秒）两种滑动速度。`Press.FINGER` 返回一个大小为 16x16 毫米的触摸目标。其他按压选项包括 `PINPOINT`（1x1\
  \ 毫米）和 `THUMB`（25x25 毫米）按压区域。`-EDGE_FUZZ_FACTOR` 值根据视图长度定义从边缘到滑动操作起始点的距离。当从精确边缘滑动可能导致不良行为（例如打开导航抽屉）时，这很有用。\n\
  \n其他三个滑动操作以类似方式执行，仅在 `from` 和 `to` 坐标上有所不同。\n\n在某些情况下，这四个滑动操作可能不够用。你可能需要缓慢向左或向右滑动，或者从屏幕中间向上或向下滑动。在这种情况下，你可以创建自己的自定义滑动操作。\n\
