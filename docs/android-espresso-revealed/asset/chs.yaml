  \n**图 10-21** Firebase Test Lab 控制台中的详细测试用例概览\n\n## 练习 25\n\n**在 Firebase Test Lab\
  \ 中运行 Espresso 和 UI Automator 测试**\n\n1. 配置您的 Firebase 账户，打开 Firebase 控制台，并设置好项目。\n\
  2. 在 Android Studio IDE 中，添加一个新的 Android Instrumentation 测试配置，并将其连接到步骤 1 中创建的项目。\n\
  3. 运行测试，并在本地以及 Firebase Test Lab 控制台内观察结果。\n\n# Android UI 测试中的屏幕对象设计模式\n\n移动端 UI\
  \ 测试中的屏幕对象设计模式等同于 Web 测试中广为人知的面板对象设计模式，它是一种表示界面的抽象层，允许其用户操作页面元素或验证页面状态。由于面板对象（Page\
  \ Object）的名称来源于网页，因此将移动应用程序中呈现给用户的视图或屏幕（Screen）称为面板（Page）并不合适。本章演示如何使用 Kotlin 将屏幕对象设计模式应用于\
  \ Android UI 测试。您将学习创建一个代表单个 Android 应用程序 Activity 或 Fragment（即一个屏幕）的屏幕对象，然后在代表真实用户流程的测试中使用这些对象或其方法。\n\
  \n## 屏幕对象设计模式在 Android 测试项目中的优缺点\n\n当定义一个屏幕对象时，它包含一组用于测试的方法，这些方法代表了屏幕功能或特定屏幕状态的验证。从测试执行的角度来看，这消除了编写逐步测试指令的需求，转而直接调用这些方法。\n\
  \n### 优点\n\n让我们看看这种方法的好处：\n\n-   逻辑测试步骤分离\n-   更易读的测试\n-   易于构建的用户流程\n-   易于维护的测试\n\
  -   代码复用\n\n#### 逻辑测试步骤分离\n\n一个测试步骤指的是功能性的用户操作，有时可能包含与被测应用的多次测试交互。例如，向示例待办事项应用添加新待办事项包含三个操作：输入标题、输入描述以及点击“完成”按钮。\n\
  \n#### 更易读的测试\n\n基于这些逻辑步骤，在定义了所有屏幕之后，我们将得到一组具有易于理解名称的步骤。因此，即使是经验不足的测试工程师也能轻松理解测试流程的逻辑。\n\
  \n#### 易于构建的用户流程\n\n这里的用户流程是指一组链式测试方法，它们可以代表一个屏幕，或从一个屏幕导航到另一个屏幕，从而模拟最终用户的行为。这对于了解最终用户流程的测试覆盖率非常有用。\n\
  \n#### 易于维护的测试\n\n由于所有屏幕元素的声明都位于同一个类中，当应用进行重构时，这可以减少维护工作量。设想一个场景：登录按钮通过其 ID 进行标识。该按钮在多个测试中被使用，并通过\
  \ Espresso 的 `onView(withId(R.id.loginButton)).perform(click())` 代码进行点击。如果该按钮的 ID\
  \ 发生变化，就需要更新所有使用它的代码行。但如果有一个 `LoginScreen` 类，它包含登录按钮的声明并实现了登录方法，那么更改只需在一个地方进行——`LoginScreen`\
  \ 类。\n\n#### 代码复用\n\n这一点与上一点非常相似，因为视图元素被封装在屏幕或其方法中，并且通常不能被其他屏幕访问。这意味着通过调用包含屏幕元素的屏幕方法，这些元素可以在多个测试流程中被复用。\n\
  \n### 缺点\n\n以下是使用屏幕对象设计模式的一些缺点：\n\n-   没有明确的方法来处理跨不同屏幕使用的视图\n-   相同的操作可能根据导航堆栈打开不同的屏幕\n\
  -   过于细致的屏幕方法会导致测试变得冗长\n\n#### 处理跨屏幕的视图\n\n如前所述，没有明确的方法来处理跨不同屏幕使用的视图或视图组。Android\
  \ 移动应用在多个屏幕间拥有共享和可复用的组件，这影响并挑战了这种测试设计模式。这里我们指的是诸如菜单抽屉或标签栏之类的视图。图 11-1 显示了待办事项应用的两个截图。\n\
  \n![../images/469090_1_En_11_Chapter/469090_1_En_11_Fig1_HTML.jpg](img/469090_1_En_11_Fig1_HTML.jpg)\n\
  \n**图 11-1** 从待办事项列表屏幕（左侧）和统计屏幕（右侧）打开的菜单抽屉\n\n两者都拥有相同的菜单抽屉组件。那么这个菜单抽屉组件应该在哪里声明呢？它是否应该属于每个屏幕，从而导致测试源码重复？我们稍后会看到如何处理这种情况。\n\
  \n#### 相同操作打开不同屏幕\n\n请记住，相同的操作可能会根据导航堆栈打开不同的屏幕。在 Android 应用中，根据 Activity 导航堆栈或应用逻辑，屏幕上的相同操作可能会因为当前应用状态之前的导航流程而产生不同的最终结果。此类情况的一个很好例子是待办事项应用中，从“设置”部分点击“返回”或“向上”按钮的导航。让我们尝试两个流程：\n\
  \n1.  从待办事项列表屏幕打开“设置”部分。在“设置”屏幕中，点击“向上”按钮。\n2.  从统计屏幕打开“设置”部分。在“设置”屏幕中，点击“向上”按钮。\n\
  \n如图 11-2 和 11-3 所示，两种情况下都使用了“向上”按钮，但最终结果不同。在第一种情况下，我们导航回待办事项列表屏幕。在第二种情况下，我们导航回统计屏幕。\n\
  \n![../images/469090_1_En_11_Chapter/469090_1_En_11_Fig2_HTML.jpg](img/469090_1_En_11_Fig2_HTML.jpg)\n\
  \n**图 11-2** 从待办事项列表屏幕打开“设置”并点击“向上”\n\n我们如何处理这种情况？本章稍后将介绍一个可能的解决方案。\n\n![../images/469090_1_En_11_Chapter/469090_1_En_11_Fig3_HTML.jpg](img/469090_1_En_11_Fig3_HTML.jpg)\n\
  \n**图 11-3** 从统计屏幕打开“设置”并点击“向上”\n\n\n\n#### 过于细化的屏幕方法会导致冗长的测试\n\n有时测试工程师在创建屏幕类及其方法时容易过于细致。他们试图将几乎每个单一操作或验证都封装成一个方法，这大大增加了每个测试内部的步骤数量。我们应该始终寻找一个黄金平衡点——既要合理拆分逻辑，又不能把屏幕方法拆解得过于琐碎详细；同时也不能将大量屏幕操作或验证塞进少数几个方法中。\n\
  \n## 应用屏幕对象设计模式\n\n现在该看个实例了。首先，我们将展示单个待办事项应用屏幕的实现方式，包括其视觉呈现。图 11-4 将\"新建待办事项\"屏幕分解为功能模块。\n\
  \n![../images/469090_1_En_11_Chapter/469090_1_En_11_Fig4_HTML.jpg](img/469090_1_En_11_Fig4_HTML.jpg)\n\
  \n**图 11-4** 分解为功能屏幕对象元素的\"新建待办事项\"屏幕\n\n如图 11-4 所示，\"新建待办事项\"屏幕包含六个功能或可操作元素。每个元素对应`AddEditToDoScreen`中的一个方法。例如，`typeToDoTitle`方法将如下所示：\n\
  \n```kotlin\nclass AddEditToDoScreen {\n    private val addToDoTitleEditText = onView(withId(R.id.add_task_title))\n\
  \    fun typeToDoTitle(title: String): AddEditToDoScreen {\n        addToDoTitleEditText.perform(typeText(title),\
  \ closeSoftKeyboard())\n        return this\n    }\n}\n```\n\n对第二、三个元素执行操作时，用户将停留在同一屏幕上；因此这些方法会返回相同的`AddEditToDoScreen`实例。\n\
  \n其他元素的方法也以类似方式创建。剩余的元素会将用户重定向到不同的应用屏幕。这是一个点击\"完成\"浮动操作按钮并返回`ToDoListScreen`实例的方法示例：\n\
  \n```kotlin\nclass AddEditToDoScreen {\n    private val doneFabButton = onView(withId(R.id.fab_edit_task_done))\n\
  \    fun clickDoneFabButton(): ToDoListScreen {\n        doneFabButton.perform(click())\n\
  \        return ToDoListScreen()\n    }\n}\n```\n\n这里，`clickDoneFabButton()`方法根据应用流程返回`ToDoListScreen`实例。我们还应该包含验证方法，用于验证屏幕的特定状态以及系统返回操作。\n\
  \n还有一点——单个屏幕操作对于测试步骤而言可能过于细致，从逻辑上应当归为一组屏幕操作。一个很好的例子是添加新待办事项的流程，它包含三个操作：输入标题、输入描述、点击浮动操作按钮。让我们看看最终的`ToDoListScreen`实现状态。\n\
  \n`chapter11.screens.AddEditToDoScreen.kt`\n\n```kotlin\nclass AddEditToDoScreen\
  \ : BaseScreen() {\n    private val addToDoDescriptionEditText = onView(withId(R.id.add_task_description))\n\
  \    private val addToDoTitleEditText = onView(withId(R.id.add_task_title))\n  \
  \  private val doneFabButton = onView(withId(R.id.fab_edit_task_done))\n    private\
  \ val emptyToDoSnackbar = onView(withText(R.string.empty_task_message))\n    private\
  \ val upButton = onView(allOf(\n        instanceOf(ImageButton::class.java),\n \
  \       withParent(withId(R.id.toolbar))))\n\n    fun typeToDoTitle(title: String):\
  \ AddEditToDoScreen {\n        addToDoTitleEditText.perform(typeText(title), closeSoftKeyboard())\n\
  \        return this\n    }\n\n    fun typeToDoDescription(description: String):\
  \ AddEditToDoScreen {\n        addToDoDescriptionEditText.perform(typeText(description),\
  \ closeSoftKeyboard())\n        return this\n    }\n\n    /**\n     * 表示添加新待办事项的流程\n\
  \     */\n    fun addNewToDo(taskItem: TodoItem): ToDoListScreen {\n        typeToDoTitle(taskItem.title)\n\
  \        typeToDoDescription(taskItem.description)\n        clickDoneFabButton()\n\
  \        return ToDoListScreen()\n    }\n\n    fun addEmptyToDo(): AddEditToDoScreen\
  \ {\n        clickDoneFabButton()\n        return this\n    }\n\n    fun clickDoneFabButton():\
  \ ToDoListScreen {\n        doneFabButton.perform(click())\n        return ToDoListScreen()\n\
  \    }\n\n    fun clickUpButton(): ToDoListScreen {\n        hamburgerUpButton.perform(click())\n\
  \        return ToDoListScreen()\n    }\n\n    fun clickBackButton(): ToDoListScreen\
  \ {\n        Espresso.pressBack()\n        return ToDoListScreen()\n    }\n\n  \
  \  fun verifySnackbarForEmptyToDo(): AddEditToDoScreen {\n        emptyToDoSnackbar.check(matches(withEffectiveVisibility(Visibility.VISIBLE)))\n\
  \        return this\n    }\n}\n```\n\n在这段代码片段中，你可以看到`AddEditToDoScreen`类继承自`BaseScreen`类，后者可以包含通用屏幕元素，比如我们这里的\"\
  返回\"按钮`ViewInteraction`。\n\n其他应用屏幕也可以按同样的方式创建。完成后，我们就可以开始编写 UI 测试了。说实话，现在这变得非常容易——测试步骤基于逻辑功能流程进行链式调用。\n\
  \n`chapter11.tests.AddToDoTest.kt`\n\n```kotlin\n/**\n * 使用屏幕对象模式验证待办事项创建流程。\n */\n\
  class AddToDoTest : BaseTest() {\n\n    @Test\n    fun addsNewTodo() {\n       \
  \ ToDoListScreen()\n            .clickAddFabButton()\n            .addNewToDo(todoItem)\n\
  \            .verifyToDoIsDisplayed(todoItem)\n    }\n\n    @Test\n    fun addsNewTodoWithoutDescription()\
  \ {\n        ToDoListScreen()\n            .clickAddFabButton()\n            .typeToDoTitle(todoItem.title)\n\
  \            .clickDoneFabButton()\n            .verifyToDoIsDisplayed(todoItem)\n\
  \    }\n\n    @Test\n    fun triesToAddEmptyToDo() {\n        ToDoListScreen()\n\
  \            .clickAddFabButton()\n            .addEmptyToDo()\n            .verifySnackbarForEmptyToDo()\n\
  \    }\n\n    companion object {\n        private var todoItem = TodoItem()\n\n\
  \        @Before\n        fun setUp() {\n            todoItem = TodoItem.new\n \
  \       }\n    }\n}\n```\n\n回到屏幕对象设计模式的优点，我们可以看到所有优点都已涵盖：\n\n- **逻辑测试步骤分离**——通过按屏幕拆分操作并创建像`addNewToDo(...)`这样的功能流程来实现。\n\
  - **更易读的测试**——通过当前的实现，测试从哪里开始以及执行了哪些具体操作一目了然。\n- **易于构建用户流程**——拥有返回各自公共结果的一系列屏幕，使得编写测试用例变得简单。\n\
  - **易于维护的测试**——通过将元素声明隔离在屏幕类内部实现。因此，在应用重构后无需在多个位置更新它们。\n- **代码复用**——如你所见，屏幕方法可以被任何测试复用，无需重复编写相同或类似的代码。\n\
  \n我们还涉及了一个缺点：\n\n- **过于细化的屏幕方法会导致冗长的测试**——这个问题应该通过创建功能流程来解决，正如`addNewToDo(...)`方法所示。我们不编写属于同一屏幕的许多步骤，而是将它们组合成一个方法。请记住，功能流程理想情况下应隔离到每个屏幕；否则将难以理解测试步骤或分析测试失败原因。\n\
  \n\n\n现在我们将分析图 11-1 中所示的情况，其中菜单抽屉视图在不同的待办事项应用屏幕（`ToDoListScreen`、`StatisticsScreen`等）中使用。在这种情况下，我们有两个选择——在每个屏幕中复制代码（我们不想这样做），或者创建一个类似于屏幕但代表公共视图的新类。由于它不代表屏幕本身，我们将其称为`MenuDrawerView`。在示例应用程序中，它是在`BaseScreen`类内部实现的。\n\
  \n*chapter11*.* \n*screens.BaseScreen.MenuDrawerView*内部类* \n*.*\n\n```\n/**\n* Base\
  \ screen that shares common functionality for main application settings\n* like\
  \ TO-DO list screen and Statistics screen.\n*/\nopen class BaseScreen {\nprivate\
  \ val hamburgerButton = onView(allOf(\ninstanceOf(ImageButton::class.java),\nwithParent(withId(R.id.toolbar))))\n\
  fun openMenu(): MenuDrawerView {\nhamburgerButton.perform(click())\nreturn MenuDrawerView()\n\
  }\ninner class MenuDrawerView {\nprivate val todoListMenuItem = onView(allOf(\n\
  withId(R.id.design_menu_item_text),\nwithText(R.string.list_title)))\nprivate val\
  \ statisticsMenuItem = onView(allOf(\nwithId(R.id.design_menu_item_text),\nwithText(R.string.statistics_title)))\n\
  private val settingsMenuItem = onView(allOf(\nwithId(R.id.design_menu_item_text),\n\
  withText(R.string.settings_title)))\nprivate val todoMenuLogo = onView(withId(R.id.headerTodoLogo))\n\
  private val todoMenuText = onView(withId(R.id.headerTodoText))\nfun clickTodoListMenuItem():\
  \ ToDoListScreen {\ntodoListMenuItem.perform(click())\nreturn ToDoListScreen()\n\
  }\nfun clickStatisticsMenuItem(): StatisticsScreen {\nstatisticsMenuItem.perform(click())\n\
  return StatisticsScreen()\n}\nfun clickSettingsMenuItem(): SettingsScreen {\nsettingsMenuItem.perform(click())\n\
  return SettingsScreen()\n}\nfun verifyMenuLayout(): MenuDrawerView {\ntodoMenuText.check(matches(allOf(\n\
  isDisplayed(),\nwithText(R.string.navigation_view_header_title))))\nstatisticsMenuItem.check(matches(isDisplayed()))\n\
  todoListMenuItem.check(matches(isDisplayed()))\nreturn this\n}\n}\n}\n```\n\n现在我们来解决之前提到的最后一个问题——根据图\
  \ 11-2 和图 11-3 所示的导航栈，同一操作可能会打开不同的屏幕。这里我们将使用最简单的解决方案，添加多个功能相同的方法。唯一的区别在于返回屏幕的类型。\n\
  \n*chapter11*.* \n*screens.SettingsScreen.kt**.*\n\n```\nclass SettingsScreen {\n\
  private val upButton = onView(allOf(\ninstanceOf(AppCompatImageButton::class.java),\n\
  withParent(withId(R.id.action_bar))))\nfun navigateUpToToDoListScreen(): ToDoListScreen\
  \ {\nupButton.perform(click())\nreturn ToDoListScreen()\n}\nfun navigateUpToStatisticsScreen():\
  \ StatisticsScreen {\nupButton.perform(click())\nreturn StatisticsScreen()\n}\n\
  }\n```\n\n以下是测试用例的实现。\n\n*chapter11*.* \n*tests.SettingsTest.verifiesUpNavigation()**.*\n\
  \n```\n/**\n* Validates TO-DOs application Settings functionality.\n*/\nclass SettingsTest\
  \ : BaseTest() {\n/**\n* Validates application UP button navigation from Settings\
  \ screen.\n*/\n@Test\nfun verifiesUpNavigation() {\nToDoListScreen()\n.openMenu()\n\
  .clickSettingsMenuItem()\n.navigateUpToToDoListScreen()\n.verifyToDoListScreenInitialState()\n\
  .openMenu()\n.clickStatisticsMenuItem()\n.dismissAlertDialog()\n.openMenu()\n.clickSettingsMenuItem()\n\
  .navigateUpToStatisticsScreen()\n.verifyStatisticsScreenInitialState()\n}\n}\n```\n\
  \n## 练习 26\n\n**使用屏幕对象设计模式编写测试**\n\n1.  为所有应用活动和片段创建屏幕类。\n2.  为每个创建的屏幕编写至少一个测试。\n\
  \n# 12. 使用 Espresso 和 Kotlin 测试机器人模式\n\n我们接下来要讨论的测试自动化模式是测试机器人模式，实际上它与屏幕对象模式没有太大区别。其主要思想是相似的——将测试实现与业务逻辑分离。该模式由\
  \ Jake Wharton 创建，并于 2016 年 5 月首次提出。\n\n## 分离“做什么”与“怎么做”\n\n测试机器人模式的概念是将我们测试的内容（真实用户应用交互或流程的高级表示）与测试执行的方式（自动化测试执行的交互的低级实现）分离开来。图\
  \ 12-1 展示了“做什么”和“怎么做”的示例。\n\n![../images/469090_1_En_12_Chapter/469090_1_En_12_Fig1_HTML.jpg](img/469090_1_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1\n测试时分离“做什么”与“怎么做”\n\n其理念是创建一个机器人，其中包含与机器人所代表的屏幕功能一样多的“做什么”方法。让我们从基础示例开始，逐步过渡到最终的\
  \ Espresso 测试机器人实现。首先，我们来看构建器模式（其中每个类方法返回同一个类实例），这与我们在第 11 章中讨论的屏幕对象模式非常相似。这是迈向测试机器人模式的第一步。以下是`BuilderToDoListRobot.kt`类，它代表了应用于待办事项列表屏幕的构建器模式。\n\
  \n*chapter12* *.robots.BuilderToDoListRobot.kt* 代表构建器模式。\n\n```\n/**\n* Builder\
  \ Pattern applied to TO-DO list screen.\n*/\nclass BuilderToDoListRobot {\nfun addToDo()\
  \ {\nonView(withId(R.id.fab_add_task)).perform(click())\n}\nfun showCompleted():\
  \ BuilderToDoListRobot {\nonView(withId(R.id.menu_filter)).perform(click())\nonView(allOf(withId(R.id.title),\
  \ withText(\"Completed\"))).perform(click())\nreturn this\n}\nfun showActive():\
  \ BuilderToDoListRobot {\nonView(withId(R.id.menu_filter)).perform(click())\nonView(allOf(withId(R.id.title),\
  \ withText(\"Active\"))).perform(click())\nreturn this\n}\nfun verifyToDoShown(withTitle:\
  \ String): BuilderToDoListRobot {\nonView(withText(withTitle)).check(matches(isDisplayed()))\n\
  return this\n}\nfun verifyToDoNotShown(withTitle: String): BuilderToDoListRobot\
  \ {\nonView(withText(withTitle)).check(matches(not(isDisplayed())))\nreturn this\n\
  }\nfun markCompleted(toDoTitle: String): BuilderToDoListRobot {\nonView(allOf(withId(R.id.todo_complete),\
  \ hasSibling(withText(toDoTitle)))).perform(click())\nreturn this\n}\nfun checkDefaultLayout():\
  \ BuilderToDoListRobot {\nonView(withId(R.id.noTasksMain)).check(matches(isDisplayed()))\n\
  onView(withId(R.id.noTasksIcon)).check(matches(isDisplayed()))\nreturn this\n}\n\
  }\n```\n\n类似地，`BuilderAddEditToDoRobot.kt`类也已实现。使用构建器模式的测试用例如下所示。\n\n*chapter12*.*\
  \ \n*RobotsTest.robotChecksToDoStateChangeBuilder()* \n*展示了构建器模式。*\n\n```\n@Test\n\
  fun robotChecksToDoStateChangeBuilder() {\nBuilderToDoListRobot()\n.checkDefaultLayout()\n\
  .addToDo()\nBuilderAddEditToDoRobot()\n.title(toDoTitle)\n.description(toDoDescription)\n\
  .done()\nBuilderToDoListRobot()\n.verifyToDoShown(toDoTitle)\n.markCompleted(toDoTitle)\n\
  .showActive()\n.verifyToDoNotShown(toDoTitle)\n.showCompleted()\n.verifyToDoShown(toDoTitle)\n\
  }\n```\n\n你可以看到，`BuilderToDoListRobot.kt`测试类的方法代表了“怎么做”，而测试用例的步骤则向我们展示了“做什么”。注意清晰的屏幕分离——每次我们开始测试或导航到不同屏幕（例如，一个活动或片段）时，我们都会创建一个新的类实例。这种方法可行，但远非最终的机器人模式实现。\n\
  \n下一步是利用 Kotlin 语言的优势来简化构建器模式的实现。要理解这一点，我们需要参考`chapter12.ToDoListRobot.kt`文件，其中声明了`ToDoListRobot`类以及`toDoList()`函数。\n\
  \n*在 chapter12* *.robots.ToDoListRobot.kt 中声明。*\n\n\n\n1.  `toDoList(func: ToDoListRobot.()\
  \ -> Unit)` 是一个扩展函数，它接受`ToDoListRobot`的函数`func`作为参数。根据`Unit`类型，可以推断出`func`函数不返回任何值。\n\
  \n2.  `ToDoListRobot().apply { func() }`表达式中的`apply { func() }`函数会在`apply()`函数块内执行所提供的函数，就好像它们是从`ToDoListRobot`类内部调用的一样。这是得益于`apply()`函数的特性，根据\
  \ Kotlin 文档：\n\n```\n/**\n* Calls the specified function [block] with `this` value\
  \ as its receiver and returns `this` value.\n*/\n```\n\n在当前情况下，`this`指的是`ToDoListRobot`类。\n\
  \n```\n/**\n* Extension function that takes ToDoListRobot class function(s)\n* as\
  \ a parameter, executes this function(s), and returns a\n* ToDoListRobot instance.\n\
  */\nfun toDoList(func: ToDoListRobot.() -> Unit) = ToDoListRobot().apply { func()\
  \ }\n```\n\n以相同的方式，我们为`AddEditToDoRobot`类实现了类似的功能：\n\n```\nfun addEditToDo(func:\
  \ AddEditToDoRobot.() -> Unit) = AddEditToDoRobot().apply { func() }\n```\n\n现在，让我们看看这两个静态函数如何转换之前讨论的测试用例。\n\
  \n*测试用例：使用扩展函数替代机器人构造函数。* *`chapter12.RobotsTest.robotChecksToDoStateChangeRobotsSeparation()`*。\n\
  \n```\n@Test\nfun robotChecksToDoStateChangeRobotsSeparation() {\ntoDoList {\ncheckDefaultLayout()\n\
  addToDo()\n}\naddEditToDo {\ntitle(toDoTitle)\ndescription(toDoDescription)\ndone()\n\
  }\ntoDoList {\nverifyToDoShown(toDoTitle)\nmarkCompleted(toDoTitle)\nshowActive()\n\
  verifyToDoNotShown(toDoTitle)\nshowCompleted()\nverifyToDoShown(toDoTitle)\n}\n\
  }\n```\n\n如你所见，我们不再需要构造函数。相反，我们调用静态函数`toDoList{ }`和`addEditTodo{ }`，它们代表`ToDoListRobot`和`AddEditToDoRobot`类执行操作。\n\
  \n下一步，修改返回新机器人的函数。在我们处理的测试用例中，它是`addToDo()`和`done()`函数。因此，它变得几乎等同于`toDoList{ }`和`addEditTodo{\
  \ }`静态函数：\n\n```\ninfix fun addToDo(func: AddEditToDoRobot.() -> Unit): AddEditToDoRobot\
  \ {\nonView(withId(R.id.fab_add_task)).perform(click())\nreturn AddEditToDoRobot().apply(func)\n\
  }\n```\n\n测试用例更改如下。\n\n*测试用例：机器人转换函数的作用类似于 `toDoList{ }`和`addEditTodo{ }`。* *`chapter12.RobotsTest.robotChecksToDoStateChange()`*。\n\
  \n```\n@Test\nfun robotChecksToDoStateChange() {\ntoDoList {\ncheckDefaultLayout()\n\
  }.addToDo {\ntitle(toDoTitle)\ndescription(toDoDescription)\n}.done {\nverifyToDoShown(toDoTitle)\n\
  markCompleted(toDoTitle)\nshowActive()\nverifyToDoNotShown(toDoTitle)\nshowCompleted()\n\
  verifyToDoShown(toDoTitle)\n}\n}\n```\n\n为使测试机器人模式更完善，最后要做的是对返回新机器人的函数使用 Kotlin\
  \ 的`infix`函数表示法。`infix`表示法允许我们调用函数时无需使用点和括号：\n\n```\ninfix fun addTask(func: AddEditToDoRobot.()\
  \ -> Unit): AddEditToDoRobot {\nonView(withId(R.id.fab_add_task)).perform(click())\n\
  return AddEditToDoRobot().apply(func)\n}\n```\n\n最终的测试用例看起来是这样的。\n\n*测试用例：机器人转换函数的作用类似于\
  \ `toDoList{ }`和`addEditTodo{ }`。* *`chapter12.RobotsTest.robotChecksToDoStateChange()`*。\n\
  \n```\n@Test\nfun robotChecksToDoStateChangeInfix() {\ntoDoList {\ncheckDefaultLayout()\n\
  } addToDo {\ntitle(toDoTitle)\ndescription(toDoDescription)\n} done {\nverifyToDoShown(toDoTitle)\n\
  markCompleted(toDoTitle)\nshowActive()\nverifyToDoNotShown(toDoTitle)\nshowCompleted()\n\
  verifyToDoShown(toDoTitle)\n}\n}\n```\n\n至此，我们对测试内容与测试方式有了清晰的划分。本章中的测试用例代表了应该测试的业务逻辑。这保持了测试结构的简短、逻辑清晰，并且不包含技术实现细节。\n\
  为了进一步改进，我们可以使用 Kotlin 的内部类来表示较小的视图组，例如属于同一机器人的筛选或菜单。看一下图 12-2 所示的示例。\n\n如图 12-2\
  \ 所示，待办事项列表屏幕被分成了三个部分：\n\n![../images/469090_1_En_12_Chapter/469090_1_En_12_Fig2_HTML.jpg](img/469090_1_En_12_Fig2_HTML.jpg)\n\
  \n**图 12-2** 在机器人类中添加内部类\n\n1.  主要功能区域由`ToDoListRobotWithInnerClasses`类表示。\n2. \
  \ 一个名为`ToDoListFilter`的筛选视图组，被声明为内部类。\n3.  一个名为`ToDoListMenu`的菜单视图组，被声明为内部类。\n\n\
  为了方便，我们在内部类的构造函数中添加了用于触发视图组显示的 Espresso 操作。\n\n*`TasksListRobotWithInnerClasses`\
  \ 类中的内部类。*\n\n```\nfun toDoListFilter(func: ToDoListFilter.() -> Unit) = ToDoListFilter().apply\
  \ { func() }\ninner class ToDoListFilter {\ninit {\nonView(withId(R.id.menu_filter)).perform(click())\n\
  }\nfun showAll() {\nonView(allOf(withId(R.id.title), withText(\"All\"))).perform(click())\n\
  }\nfun showCompleted() {\nonView(allOf(withId(R.id.title), withText(\"Completed\"\
  ))).perform(click())\n}\nfun showActive() {\nonView(allOf(withId(R.id.title), withText(\"\
  Active\"))).perform(click())\n}\n}\n```\n\n使用这种内部类方法，我们实际上获得了更多好处：\n\n*   代码可读性\n\
  *   代码重复消除\n\n**代码可读性**\n由于清晰地划分为功能区域或视图组，机器人类的实现和测试代码都变得更加可读且易于维护。\n\n**代码重复消除**\n\
  内部类构造函数可以执行触发功能所需的步骤，例如点击筛选工具栏图标以显示所有可用的筛选选项，然后在选项中导航。\n\n**练习 27**\n\n**使用屏幕测试机器人模式编写测试**\n\
  \n1.  为设置和统计屏幕创建机器人。\n2.  思考菜单抽屉，并实现一个最适合其功能的解决方案。编写一个涉及菜单抽屉导航的测试。\n\n## 13. 使用\
  \ Espresso 和 UI Automator 进行监督式猴子测试\n\n应用稳定性是首要的应用质量指标。稳定性差会导致 Android PlayStore\
  \ 中的用户评分低，进而降低应用的总体评分并减少下载量。为了保持应用稳定，Android 平台提供了一个名为`monkeyrunner`的工具（[`https://developer.android.com/studio/test/monkeyrunner`](https://developer.android.com/studio/test/monkeyrunner)）用于从稳定性方面测试应用。不幸的是，`monkeyrunner`并未集成到\
  \ Espresso 或 UI Automator 框架中，这使得它对于需要用户登录的应用或猴子测试应从特定应用状态开始的情况几乎毫无用处。此外，如果不实现自定义测试，则无法收集有价值的测试结果，这会导致需要进行结果解析。\n\
  考虑到这些信息，很明显，猴子测试必须更加智能且易于控制。本章将解释如何实现你自己的监督式猴子测试。\n\n**Monkeyrunner 的问题与解决方案**\n\
  \n让我们仔细看看是什么让`monkeyrunner`如此不可用：\n\n*   使用`monkeyrunner`，测试不是项目代码库的一部分，也不受 Espresso\
  \ 或 UI Automator 测试框架控制。\n*   它不是`androidx`或`android.support`库的一部分。\n*   它是一个独立的工具，有其自身的问题，并且需要维护。\n\
  \n\n\n- 获取和处理测试结果很困难。\n- 它使用 Python 编程语言编写，这使得与现有 UI 测试的集成更加困难。\n\n`monkeyrunner`\
  \ 的这些缺点迫使我们实现自己的解决方案。幸运的是，我们不需要做太多工作就能将其部署到位。我们的想法是在原生测试框架（如 `Espresso` 或 `UI Automator`，或两者结合）中编写\
  \ monkey 测试。这带来了以下优势：\n\n- Monkey 测试成为 UI 测试代码库的一部分，这意味着它们完全由您拥有和控制。\n- 您可以将 UI\
  \ 测试与 monkey 测试结合使用（例如，您可以使用 UI 测试来登录，然后启动 monkey 测试）。\n- 使用现有的报告基础设施，可以轻松获取和处理测试结果。\n\
  - Monkey 测试可以被监控，这意味着如果 monkey 测试离开了应用程序，您可以识别并重新启动该应用程序。\n- 可以根据需要实现不同的 UI 事件或手势。\n\
  \n## 检测和第三方应用的 Monkey 测试\n\n如前所述，`monkeyrunner` 工具不满足我们对 monkey 测试的要求；因此，在本节中，我们将实现自己的受监控\
  \ monkey 测试。\n\n### 识别 Monkey 测试的操作区域\n\n我们有用于编写 monkey 测试的工具。现在，我们必须思考这些 monkey\
  \ 测试应如何以及在哪里操作的概念。图 13-1 定义了 monkey 测试应执行其操作的区域。\n\n![../images/469090_1_En_13_Chapter/469090_1_En_13_Fig1_HTML.jpg](img/469090_1_En_13_Fig1_HTML.jpg)\n\
  \n**图 13-1** 设备屏幕区域。红色表示应忽略的区域，蓝色表示感兴趣的区域。\n\n根据官方 Android 文档，顶部和底部的栏分别称为导航栏（见图\
  \ 13-2）和状态栏（见图 13-3）。\n\n![../images/469090_1_En_13_Chapter/469090_1_En_13_Fig3_HTML.jpg](img/469090_1_En_13_Fig3_HTML.jpg)\n\
  \n**图 13-3** 状态栏\n\n![../images/469090_1_En_13_Chapter/469090_1_En_13_Fig2_HTML.jpg](img/469090_1_En_13_Fig2_HTML.jpg)\n\
  \n**图 13-2** 导航栏\n\n我们的第一个任务是识别导航栏和状态栏的尺寸，并计算我们希望 monkey 测试操作的区域坐标。`ScreenDimensions`\
  \ 类包含了执行此计算的所有方法。除此之外，它还为我们感兴趣的区域中 monkey 动作生成随机坐标。为了完全理解这些计算是如何执行的，图 13-4 显示了设备屏幕坐标系。\n\
  \n![../images/469090_1_En_13_Chapter/469090_1_En_13_Fig4_HTML.jpg](img/469090_1_En_13_Fig4_HTML.jpg)\n\
  \n**图 13-4** Android 屏幕坐标系\n\n简而言之，元素高度的计算是从顶部向下开始的，从 (0, 0) 坐标开始。现在应该清楚了，要计算所需区域的零坐标，我们需要知道状态栏的高度。右下角也是如此，但在这种情况下，我们还需要知道导航栏的高度。所有这些计算都在\
  \ `ScreenDimensions.kt` 类中完成。\n\n`chapter13.ScreenDimensions.kt` 类保存了所有计算屏幕尺寸和生成随机坐标的函数。\n\
  \n```kotlin\n/**\n* 计算屏幕尺寸、导航栏、状态栏和操作栏的尺寸。\n* 为 monkey 点击生成随机坐标。\n*/\nobject ScreenDimensions\
  \ {\n    private val heightWithoutNavigationBar: Int\n    private var width = 0\n\
  \    private val uiDevice = UiDevice.getInstance(InstrumentationRegistry.getInstrumentation())\n\
  \    private val appContext = InstrumentationRegistry.getInstrumentation().targetContext\n\
  \    private val navBarResourceId =\n        appContext.resources.getIdentifier(\"\
  navigation_bar_height\", \"dimen\", \"android\")\n    private val statusBarResourceId\
  \ =\n        appContext.resources.getIdentifier(\"status_bar_height\", \"dimen\"\
  , \"android\")\n    init {\n        width = uiDevice.displayWidth\n        heightWithoutNavigationBar\
  \ = uiDevice.displayHeight - ScreenDimensions.navigationBarHeight\n    }\n    /**\n\
  \    * 计算导航栏高度。\n    */\n    val navigationBarHeight : Int get() {\n        return\
  \ if (navBarResourceId > 0) {\n            appContext.resources.getDimensionPixelSize(navBarResourceId)\n\
  \        } else {\n            0\n        }\n    }\n    /**\n    * 计算状态栏高度。\n  \
  \  */\n    val statusBarHeight: Int get() {\n        return if (statusBarResourceId\
  \ > 0) {\n            appContext.resources.getDimensionPixelSize(statusBarResourceId)\n\
  \        } else {\n            0\n        }\n    }\n    val randomY: Int\n     \
  \   get()  = (statusBarHeight..heightWithoutNavigationBar).random()\n    val randomX:\
  \ Int\n        get() = (0..width).random()\n    private fun IntRange.random() =\n\
  \        Random().nextInt((endInclusive + 1) - start) +  start\n}\n```\n\n如您所见，我们使用\
  \ `UiDevice` 实例来获取设备屏幕的宽度和高度，并使用应用上下文根据其资源标识符获取导航栏和状态栏的高度。\n\n### 定义 Monkey 测试动作\n\
  \n下一步是定义我们的 monkey 测试将执行的动作：\n\n- **点击动作** — 此动作应在图 13-1 中标出的感兴趣区域内的随机坐标 (`randomX`,\
  \ `randomY`) 上执行点击。将使用 `UiDevice.click(int x, int y)` 动作。\n- **拖拽（或滑动）** — 拖拽和滑动动作应基于随机定义的起始坐标\
  \ (`startX`, `startY`) 和结束坐标 (`endX`, `endY`) 来执行。我们在此使用 `UiDevice.drag(int startX,\
  \ int startY, int endX, int endY, int steps)` 动作。`steps` 参数是滑动动作的步数。每一步的执行被限制为每步\
  \ 5 毫秒，因此对于 100 步，滑动将需要大约 0.5 秒才能完成。\n- **点击系统返回按钮** — 将使用 `UiDevice.pressBack()`\
  \ 动作来模拟短按系统返回按钮。\n- **启动应用程序** — 这里我们将根据被测试的应用程序采用不同的方法来启动应用程序。对于 debug 应用程序，我们需要访问源代码，因此我们将使用来自\
  \ `android.support` 库项目的 `ActivityTestRule` 和来自 `androidx.test` 库的 `ActivityScenario.launch(Activity.class)`\
  \ 函数。对于第三方应用程序，我们有另一种使用包名启动应用程序的方法，稍后将讨论。\n- **在 monkey 测试离开后重新启动应用程序** — 基本上我们重复使用上一点的实现。这允许\
  \ monkey 测试离开应用程序，并使测试更接近地模拟真实用例场景，即移动用户在一段时间后离开应用程序，然后再次启动应用程序。\n\n现在，我们进入所有提及的动作的实现，这些可以在\
  \ `chapter13.Monkey.kt` 文件中看到。\n\n`chapter13.Monkey.kt`\n\n\n```kotlin\n/**\n* 包含\
  \ Monkey 测试逻辑和主要操作的类。\n*/\nobject Monkey {\n    private val uiDevice = UiDevice.getInstance(InstrumentationRegistry.getInstrumentation())\n\
  \    private val appContext = InstrumentationRegistry.getInstrumentation().targetContext\n\
  \    private val toDoAppPackageName = appContext.packageName\n    private const\
  \ val numberOfSteps = 10\n    // 用于取模运算（%）以决定执行哪个操作的随机整数值。\n    private const val\
  \ dragNow = 7\n    private const val pressNowBack = 13\n    // 用于记录操作描述，以供日志记录或异常构造的变量。\n\
  \    private var monkeyAction = \"\"\n    /**\n    * 从起始坐标拖动到结束坐标。\n    *\n    *\
  \ @param startX - 起始 x 坐标\n    * @param startY - 起始 y 坐标\n    * @param endX - 结束\
  \ x 坐标\n    * @param endY - 结束 y 坐标\n    */\n    private fun drag(startX: Int, startY:\
  \ Int, endX: Int, endY: Int) {\n        uiDevice.drag(\n            startX,\n  \
  \          startY,\n            endX,\n            endY,\n            numberOfSteps)\n\
  \    }\n    /**\n    * 对指定的包运行 Monkey 测试。\n    *\n    * @param actionsCount - 在\
  \ Monkey 测试期间要执行的事件数量。\n    * @param packageName - 需要测试的包名。如果未提供，则测试 TO-DO 应用。\n\
  \    */\n    fun run(actionsCount: Int, packageName: String = toDoAppPackageName)\
  \ {\n        loop@ for (i in 0..actionsCount) {\n            if (PackageInfo.shouldRelaunchTheApp(monkeyAction,\
  \ packageName)) {\n                relaunchApp(packageName)\n            }\n   \
  \         val randomX = ScreenDimensions.randomX\n            val randomY = ScreenDimensions.randomY\n\
  \            when {\n                i % dragNow == 0 -> {\n                   \
  \ val randomX2 = ScreenDimensions.randomX\n                    val randomY2 = ScreenDimensions.randomY\n\
  \                    monkeyAction = String.format(\n                        \"从:\
  \ %d - %d 拖动到: %d - %d\", randomX,\n                        randomY, randomX2, randomY2\n\
  \                    )\n                    drag(randomX, randomY, randomX2, randomY2)\n\
  \                    continue@loop\n                }\n                i % pressNowBack\
  \ == 0 -> {\n                    monkeyAction = \"按下系统返回按钮\"\n                 \
  \   uiDevice.pressBack()\n                    continue@loop\n                }\n\
  \                else -> {\n                    monkeyAction = \"点击坐标 x:$randomX\
  \ y:$randomY\"\n                    uiDevice.click(randomX, randomY)\n         \
  \           continue@loop\n                }\n            }\n        }\n    }\n\
  \    /**\n    * 通过包名启动应用程序。\n    * 如果包名与 TO-DO 应用程序包名相同，则使用 ActivityScenario.launch()。\n\
  \    *\n    * @param packageName - 要重新启动的包名\n    */\n    private fun relaunchApp(packageName:\
  \ String) {\n        if (packageName == toDoAppPackageName) {\n            ActivityScenario.launch(TasksActivity::class.java)\n\
  \        } else {\n            PackageInfo.launchPackage(packageName)\n        }\n\
  \    }\n}\n```\n\n这种 Monkey 操作的实现看起来清晰且易于扩展。即使只有这些数量的操作也足以执行良好的 Monkey 测试。但它也很容易扩展，我们只需在\
  \ `when {}` 块内再引入一个操作即可。 `dragNow` 和 `pressNowBack` 常量的定义方式是为了最小化 `actionCount %\
  \ dragNow` 或 `actionCount % pressNowBack` 两个表达式同时返回 0（零）的情况。当然，你也可以将它们改为适合你需要的值。\n\
  \n逻辑在 Monkey 测试中扮演的重要角色之一，是由以下条件语句处理的：\n\n```kotlin\nif (PackageInfo.shouldRelaunchTheApp(monkeyAction,\
  \ packageName)) {\n    relaunchApp(packageName)\n}\n```\n\n简而言之，此条件检查测试是否离开了被测试的应用程序，或者是否发生了崩溃。如果\
  \ Monkey 测试离开了某个应用程序，则会触发重新启动机制。如果发生了错误，则会创建并抛出一个异常。\n\n### 实现依赖于包的功能\n\n这里有三个依赖应用程序包名的\
  \ Monkey 测试功能，我们希望实现它们：\n\n-   在测试第三方应用程序时，启动或重新启动测试应用程序。\n-   检查测试应用程序进程是否处于错误状态。\n\
  -   创建一个用于识别是否需要重新启动测试应用的函数。\n\n所有这些情况都在 `chapter13.PackageInfo.kt` 文件中实现，如下所示。\n\
  \n*chapter13.PackageInfo.kt*\n\n```kotlin\n/**\n* 提供包辅助方法。\n*/\nobject PackageInfo\
  \ {\n    private val uiDevice = UiDevice.getInstance(InstrumentationRegistry.getInstrumentation())\n\
  \    private val testContext = InstrumentationRegistry.getInstrumentation().context\n\
  \    /**\n    * 检查是否需要重新启动应用程序。\n    *\n    * @return 如果被测应用程序未显示给用户，则返回 true。\n\
  \    */\n    fun shouldRelaunchTheApp(monkeyAction: String, packageName: String):\
  \ Boolean {\n        if (!isAppInErrorState(monkeyAction, packageName)\n       \
  \     && uiDevice.currentPackageName != packageName) {\n            return true\n\
  \        }\n        return false\n    }\n    /**\n    * 根据包名启动应用程序。\n    * @param\
  \ packageName - 要启动的包名。\n    */\n    fun launchPackage(packageName: String) {\n\
  \        val intent = testContext\n            .packageManager\n            .getLaunchIntentForPackage(packageName)!!\n\
  \        testContext.startActivity(intent)\n        uiDevice.wait(Until.hasObject(By\n\
  \            .pkg(packageName)),\n            5000)\n    }\n    /**\n    * 检查目标应用程序进程是否处于错误状态，如果出错则抛出异常，否则返回\
  \ true。\n    *\n    * @return 如果应用处于错误状态则返回 false，否则抛出异常并导致测试失败。\n    */\n    private\
  \ fun isAppInErrorState(monkeyAction: String, packageName: String): Boolean {\n\
  \        val manager = testContext.getSystemService(Context.ACTIVITY_SERVICE) as\
  \ ActivityManager\n        var errorDescription = \"\"\n        // 获取处于错误状态的进程，如果列表为空则返回\
  \ false。\n        manager.processesInErrorState?.forEach {\n            val isTargetPackage\
  \ = it.processName.contains(packageName)\n            when {\n                isTargetPackage\
  \ && it.condition == CRASHED ->\n                    errorDescription = \"在 $monkeyAction\
  \ 操作后，应用程序 $packageName 崩溃了\"\n                isTargetPackage && it.condition ==\
  \ NOT_RESPONDING ->\n                    errorDescription = \"在 $monkeyAction 操作后，应用程序\
  \ $packageName 无响应\"\n            }\n            /** 构建并抛出带有适当描述和堆栈跟踪的 Espresso\
  \ PerformException\n            *   测试在此处失败。\n            */\n            throw\
  \ PerformException.Builder()\n                .withActionDescription(errorDescription)\n\
  \                .withCause(Throwable(it.stackTrace))\n                .build()\n\
  \        }\n        return false\n    }\n}\n```\n\n这里，`shouldRelaunchTheApp()` 函数验证了两个条件。首先，它判断测试应用程序是否处于错误状态（`CRASH`\
  \ 或 `ANR`）。如果不是，则检查被测应用程序是否已显示给用户，如果没有则重新启动它。`launchPackage(packageName)` 函数使用测试上下文向系统发送启动\
  \ Activity 的 intent，并借助 `UiDevice` 的等待机制，等待应用程序启动。最后一个名为 `isAppInErrorState(monkeyAction,\
  \ packageName)` 的函数，确保被测应用程序进程当前不处于错误状态。当识别到错误状态时，会创建一个 Espresso 的 `PerformException`\
  \ 函数，其中包含关于刚执行的 Monkey 操作的额外信息以及异常堆栈跟踪。这样，我们就使用了 Espresso 的错误报告机制并使得 Monkey 测试失败。\n\
  \n接下来是针对被测应用和第三方应用的实际 Monkey 测试。`com.google.android.dialer` 包（安卓电话应用）被用作第三方示例。\n\
  \n*chapter13.MonkeyTest.kt*\n\n```kotlin\n/**\n* 演示受监督 Monkey 测试的测试类。\n*/\n@RunWith(AndroidJUnit4::class)\n\
  class MonkeyTest {\n    @get:Rule\n    var grantPermissionRule: GrantPermissionRule\
  \ = GrantPermissionRule.grant(\n        Manifest.permission.CAMERA,\n        Manifest.permission.WRITE_EXTERNAL_STORAGE)\n\
  \    @get:Rule\n    var screenshotWatcher = ScreenshotWatcher()\n    /**\n    *\
  \ Monkey 测试将针对 TO-DO 应用程序执行。\n    */\n    @Test\n    fun testsInstrumentedApp()\
  \ {\n        ActivityScenario.launch(TasksActivity::class.java)\n        Monkey.run(200)\n\
  \    }\n    /**\n    * Monkey 测试将针对提供的应用程序包名执行。\n    * 这是一个如何测试第三方应用程序的示例。\n   \
  \ */\n    @Test\n    fun testsThirdPartyApp() {\n        val packageName = \"com.google.android.dialer\"\
  \n        PackageInfo.launchPackage(packageName)\n        Monkey.run(200, packageName)\n\
  \    }\n}\n```\n\n\n### 运行 Monkey 测试\n\n运行这些测试时，我们可以看到 monkey 操作比 `monkeyrunner`\
  \ 测试稍慢，这是因为需要在每个测试步骤中检查应用程序状态。不过，考虑到使用 Android 原生测试框架实现这些测试所带来的诸多优势，我们可以忽略这个问题。\n\
  \n## 练习 28\n\n### 运行 Monkey 测试\n\n1.  检出 TODO 应用程序项目的 master 分支，并将其迁移至 AndroidX。迁移后，执行\
  \ Build ➤ Clean Project。运行一些测试。如果出现失败，通过更新 `proguard` 规则或更新 `build.gradle` 文件中的依赖项，来分析并修复问题。\n\
  \n2.  实现一个测试类，其中包含一个测试：在 `@Before` 方法中使用 `ActivityScenario.launch(Activity.class)`\
  \ 启动应用 Activity，然后运行测试。\n\n## 小结\n\n遗憾的是，在 Android 平台上，monkey 测试并未受到足够重视。为了满足这一需求，提供的仍是过时的\
  \ `monkeyrunner` Python 工具，而非通过 UI Automator 或 Espresso 等原生 Android 平台测试框架提供更好的支持。即便如此，无需过多投入，我们仍然可以运行有意义的\
  \ monkey 测试，包括：在测试状态下轻松启动和准备合适应用的方法、运行受监督的 monkey 测试，以及使用原生测试框架功能报告测试结果。\n\n# 14.\
  \ AndroidX 测试库\n\n2018 年 5 月的 Google I/O 大会宣布了 AndroidX 开源项目，该项目用于在 Android Jetpack\
  \ 中开发、测试、打包、版本管理和发布库。AndroidX 取代了 Android 支持库。其主要改进之一是：AndroidX 包是独立维护和更新的，因此你可以在项目中独立更新\
  \ AndroidX 库。\n\n由于 Android 测试库是 Android 支持库的一部分，AndroidX 也包含了 AndroidX 测试库。其 beta\
  \ 版本于 2018 年 5 月的 Google I/O 大会上发布。在 2018 年的 Android DevSummit 大会上，谷歌宣布了其稳定版 1.0。AndroidX\
  \ 测试库消除了维护许多不同测试工具的需要，这些工具在不同测试级别上使用的样式和 API 各不相同。\n\n为了方便起见，第二个分支名为 `androidx-espresso-revealed`，其中包含一个已迁移至\
  \ AndroidX 的 TODO 示例应用程序项目。要使用它，只需使用 `git checkout androidx-espresso-revealed` 命令切换分支即可。你可能需要使用\
  \ Android Studio 的 Build ➤ Clean 选项清理项目，甚至使用 File ➤ Invalidate Cashes / Restart…\
  \ 来避免构建问题。\n\n## AndroidX 测试与测试支持库的对比\n\n图 14-1 中的测试金字塔展示了不同测试级别，这些级别曾通过测试技术及所用工具相互隔离。\n\
  \n![../images/469090_1_En_14_Chapter/469090_1_En_14_Fig1_HTML.png](img/469090_1_En_14_Fig1_HTML.png)\n\
  \n**图 14-1** 测试金字塔\n\n过去的问题是，不同级别的测试不可移植；它们与编写所用的测试工具和环境紧密绑定。使用 AndroidX 测试库，这个问题得到了解决。现在，你可以使用一组单一的测试库来编写与不同测试级别相关的测试——单元测试、集成测试和用户界面（或端到端）测试。\n\
  \n由于本书讨论的是 UI 端到端测试，我们将从 UI 测试的角度，重点介绍 AndroidX 测试库相较于 Android 测试支持库的新特性：\n\n* \
  \  `ApplicationProvider` — 提供在测试中检索当前应用程序上下文的能力。\n*   `ActivityScenario` 和 `FragmentScenario`\
  \ — `ActivityScenario` 提供用于启动和驱动 Activity 生命周期状态以进行测试的 API。它适用于任意 Activity，并在不同版本的\
  \ Android 框架中表现一致。`FragmentScenario` 提供用于启动和驱动 Fragment 生命周期状态以进行测试的 API。它适用于任意\
  \ Fragment，并在不同版本的 Android 框架中表现一致。\n*   新的 `Truth` 断言库 — `Truth` 是一个流畅的断言库，可在为测试构建验证步骤时，作为基于\
  \ `JUnit` 或 Hamcrest 断言的替代方案。\n*   将所有其他库和依赖项迁移至 `androidx.test` — 所有来自 `android.test.support`\
  \ 库的依赖项都已迁移至 `androidx.test`。\n\n## 为 AndroidX 测试配置项目\n\n为了在新创建的项目中开始使用 AndroidX\
  \ 测试，你必须遵循与使用 `android.support` 库几乎相同的步骤：\n\n1.  为确保拥有最新的 AndroidX 测试库，在 `build.gradle`\
  \ 文件中添加 Google 的 Maven 仓库，如下所示：\n\n```\nallprojects {\n    repositories {\n    \
  \    jcenter()\n        google()\n    }\n}\n```\n\n2.  在 UI 测试中添加所需的 AndroidX 测试依赖项：\n\
  \n```\n// Espresso UI Testing\nandroidTestImplementation \"androidx.test.espresso:espresso-core:$rootProject.espressoVersion\"\
  \nandroidTestImplementation \"androidx.test.espresso:espresso-contrib:$rootProject.espressoVersion\"\
  \nandroidTestImplementation \"androidx.test.espresso:espresso-intents:$rootProject.espressoVersion\"\
  \nandroidTestImplementation \"androidx.test.espresso.idling:idling-concurrent:$rootProject.espressoVersion\"\
  \nandroidTestImplementation \"androidx.test.espresso:espresso-idling-resource:$rootProject.espressoVersion\"\
  \nandroidTestImplementation \"androidx.test.espresso:espresso-web:$rootProject.espressoVersionAndroidX\"\
  \nandroidTestImplementation \"androidx.test.espresso:espresso-accessibility:$rootProject.espressoVersion\"\
  \n```\n\n3.  添加 AndroidX 测试的 Instrumentation Runner：\n\n```\ntestInstrumentationRunner\
  \ 'androidx.test.runner.AndroidJUnitRunner'\n```\n\n4.  要使用 Android Test Orchestrator，请添加以下行：\n\
  \n```\ntestOptions {\n    execution 'ANDROIDX_TEST_ORCHESTRATOR'\n}\n```\n\n以上步骤就足以开始编写\
  \ UI 测试，正如我们在 TODO 示例应用中所做的那样。\n\n## 迁移至 AndroidX\n\nAndroidX 迁移已集成到 Android Studio\
  \ IDE 中，因此迁移主应用程序和测试应用程序都非常容易。要开始迁移过程，请从 Android Studio 菜单中选择 Refactor ➤ Migrate\
  \ to AndroidX…。你也可以在项目视图中右键单击项目，然后选择这些菜单选项。参见图 14-2。\n\n![../images/469090_1_En_14_Chapter/469090_1_En_14_Fig2_HTML.jpg](img/469090_1_En_14_Fig2_HTML.jpg)\n\
  \n**图 14-2** Android Studio 中的“迁移至 AndroidX”选项\n\n在开始迁移之前，系统会提示你备份项目，以防迁移后出现编译问题。你还会收到警告：需要根据项目依赖项手动修复迁移错误。\n\
  \n几分钟后（取决于项目的复杂性），整个项目将迁移至 AndroidX 库。这非常简单易行。在自动触发后，`gradle sync` 任务看起来一切正常，显示\
  \ `BUILD SUCCESSFUL`。但是（总会有个“但是”），在第一次测试运行时，测试启动后出现了以下问题。\n\n*迁移至 AndroidX 时的 Proguard\
  \ 混淆问题*\n\n\n```\nStarted running tests\njava.lang.NoClassDefFoundError: Failed\
  \ resolution of: Landroidx/test/espresso/IdlingRegistry;\n...\nCaused by: java.lang.ClassNotFoundException:\
  \ Didn't find class \"androidx.test.espresso.IdlingRegistry\" on path: DexPathList[[zip\
  \ file \"/system/framework/android.test.runner.jar\", zip file \"/system/framework/android.test.mock.jar\"\
  , zip file \"/data/app/com.example.android.architecture.blueprints.todoapp.mock.test-U-I7D8dt-qcnzY2buNTPzw==/base.apk\"\
  , zip file \"/data/app/com.example.android.architecture.blueprints.todoapp.mock-JWNE8BTGptjn2ZWTifC78Q==/base.apk\"\
  ],nativeLibraryDirectories=[/data/app/com.example.android.architecture.blueprints.todoapp.mock.test-U-I7D8dt-qcnzY2buNTPzw==/lib/arm64,\
  \ /data/app/com.example.android.architecture.blueprints.todoapp.mock-JWNE8BTGptjn2ZWTifC78Q==/lib/arm64,\
  \ /system/lib64, /vendor/lib64]]\n...\nTests ran to completion .\n```\n\n事实证明，无论好坏，AndroidX\
  \ 迁移都不会处理项目中的 `proguard` 文件。这意味着如果先前为 `android.support` 库定义了一些 `proguard` 规则，这些规则将不会被触及。以下示例代码包含了一个\
  \ TO-DO 应用中 `proguard-rules.pro` 文件里提到的、未迁移的 `android.support` 库类示例。\n\n*迁移至 AndroidX……但不会迁移\
  \ Proguard 文件。*\n\n```\n-keep class android.support.v4.widget.DrawerLayout { *;\
  \ }\n-keep class android.support.test.espresso.IdlingResource { *; }\n-keep class\
  \ android.support.test.espresso.IdlingRegistry { *; }\n```\n\n如前所述，手动修复迁移错误是必要的。\n\
  \n## UI 测试中的 ActivityScenario\n\n`ActivityScenario` 提供了启动并驱动 Activity 生命周期阶段（例如\
  \ `Stage.CREATED`、`Stage.RESUMED`、`Stage.DESTROYED` 等）以进行测试的 API。这些 API 更适合集成测试，可以快速轻松地测试每个\
  \ Activity 状态。对于 UI 测试而言，重要的是它们可以替代 `ActivityTestRule`，在每次测试运行前在测试 Activity 下启动应用。\n\
  \n*chapter14* *.* *ActivityScenarioTest.kt.*\n\n```\n/**\n* Sample of ActivityScenario.launch(Activity.class)\
  \ method usage.\n*/\n@RunWith(AndroidJUnit4::class)\nclass ActivityScenarioTest\
  \ {\n@Before\nfun launchTasksActivity() {\nActivityScenario.launch(TasksActivity::class.java)\n\
  }\n@Test\nfun activityScenarioLaunchSample() {\nopenContextualActionModeOverflowMenu()\n\
  onView(allOf(withId(R.id.title), withText(R.string.refresh))).perform(click())\n\
  }\n}\n```\n\n如您所见，在使用角度上差异不大。但您将不会拥有 `ActivityTestRule` 的实例，因此也就无法访问已启动的 Activity。\n\
  \n## 在 UI 测试中使用 Truth 断言库\n\n虽然 `Truth` 断言库主要是为单元测试和集成测试开发的，但它同样能为 UI 测试带来好处。我们在第\
  \ 8 章中使用了 `JUnit` 断言来断言 UI Automator 测试中屏幕上的元素是否存在。让我们看看基本 `JUnit` 断言和 `Truth` 断言之间的区别。\n\
  \n### 表 14-1 基本 JUnit 和 Truth 断言对比\n\n| JUnit | Truth |\n| --- | --- |\n| `assertEquals(b,\
  \ a)` `assertTrue(c)` `assertTrue(d.contains(a))` | `assertThat(a).isEqualTo(b)`\
  \ `assertThat(c).isTrue()` `assertThat(d).contains(a)` |\n| `assertTrue(d.contains(a)\
  \ && d.contains(b))` `assertTrue(d.contains(a) \\|\\| d.contains(b) \\|\\| d.contains(c))`\
  \ | `assertThat(d).containsAllOf(a, b)` `assertThat(d).containsAnyOf(a, b, c)` |\n\
  \n说实话，`Truth` 的语法更具可读性，更易于编写，并且与我们编写 Espresso 测试时使用的 Hamcrest 库方法类似。现在转到测试失败报告部分。拥有有意义且描述清晰的测试失败堆栈跟踪非常重要，这样故障分析就不需要太多时间和精力。`TruthTest.kt`\
  \ 类中包含两个测试，它们会失败以展示 `JUnit` 和 `Truth` 的失败报告并进行比较。\n\n*chapter14* *.TruthTest.kt.\
  \ 两个测试均会失败以展示 JUnit 与 Truth 断言在堆栈跟踪上的差异。*\n\n```\n@RunWith(AndroidJUnit4::class)\n\
  class TruthTest {\nprivate val uiDevice: UiDevice = UiDevice.getInstance(InstrumentationRegistry.getInstrumentation())\n\
  @Before\nfun launchTasksActivity() {\nActivityScenario.launch(TasksActivity::class.java)\n\
  }\n/**\n* 特意使用 JUnit 断言使测试失败。\n*/\n@Test\nfun generatesJunitAssertionError() {\n\
  val selector = uiDevice.findObject(UiSelector().resourceId(\n\"com.example.android.architecture.blueprints.todoapp.mock:id/fab_add_task\"\
  ))\n// JUnit assertion.\nassertFalse(\n\"Element with selector $selector is present\
  \ on the screen when it should not\",\nselector.exists())\n}\n/**\n* 特意使用 Truth\
  \ 断言使测试失败。\n*/\n@Test\nfun generatesTruthAssertionError() {\nval selector = uiDevice.findObject(UiSelector().resourceId(\n\
  \"com.example.android.architecture.blueprints.todoapp.mock:id/fab_add_task\"))\n\
  // Truth assertion.\nassertThat(selector.exists()).isFalse()\n}\n}\n```\n\n以下是一个来自旧版\
  \ `JUnit assertTrue(MESSAGE, CONDITION)` 方法的错误堆栈跟踪示例，以及由本章 TO-DO 示例中实现的 `TruthTest.generatesJunitAssertionError()`\
  \ 方法生成的错误堆栈跟踪。\n\n*generatesJunitAssertionError() 测试失败时生成的 JUnit 错误堆栈跟踪。*\n```\n\
  \n\n```\njava.lang.AssertionError: Element with selector androidx.test.uiautomator.UiObject@ce91768\
  \ is present on the screen when it should not\nat org.junit.Assert.fail(Assert.java:88)\n\
  at org.junit.Assert.assertTrue(Assert.java:41)\nat org.junit.Assert.assertFalse(Assert.java:64)\n\
  at com.example.android.architecture.blueprints.todoapp.test.chapter14.TruthTest.generatesJunitAssertionError(TruthTest.kt:33)\n\
  at java.lang.reflect.Method.invoke(Native Method)\nat org.junit.runners.model.FrameworkMethod$1.runReflectiveCall(FrameworkMethod.java:50)\n\
  at org.junit.internal.runners.model.ReflectiveCallable.run(ReflectiveCallable.java:12)\n\
  at org.junit.runners.model.FrameworkMethod.invokeExplosively(FrameworkMethod.java:47)\n\
  at org.junit.internal.runners.statements.InvokeMethod.evaluate(InvokeMethod.java:17)\n\
  at androidx.test.internal.runner.junit4.statement.RunBefores.evaluate(RunBefores.java:80)\n\
  at org.junit.runners.ParentRunner.runLeaf(ParentRunner.java:325)\nat org.junit.runners.BlockJUnit4ClassRunner.runChild(BlockJUnit4ClassRunner.java:78)\n\
  at org.junit.runners.BlockJUnit4ClassRunner.runChild(BlockJUnit4ClassRunner.java:57)\n\
  at org.junit.runners.ParentRunner$3.run(ParentRunner.java:290)\nat org.junit.runners.ParentRunner$1.schedule(ParentRunner.java:71)\n\
  at org.junit.runners.ParentRunner.runChildren(ParentRunner.java:288)\nat org.junit.runners.ParentRunner.access$000(ParentRunner.java:58)\n\
  at org.junit.runners.ParentRunner$2.evaluate(ParentRunner.java:268)\nat org.junit.runners.ParentRunner.run(ParentRunner.java:363)\n\
  at androidx.test.ext.junit.runners.AndroidJUnit4.run(AndroidJUnit4.java:104)\nat\
  \ org.junit.runners.Suite.runChild(Suite.java:128)\nat org.junit.runners.Suite.runChild(Suite.java:27)\n\
  at org.junit.runners.ParentRunner$3.run(ParentRunner.java:290)\nat org.junit.runners.ParentRunner$1.schedule(ParentRunner.java:71)\n\
  at org.junit.runners.ParentRunner.runChildren(ParentRunner.java:288)\nat org.junit.runners.ParentRunner.access$000(ParentRunner.java:58)\n\
  at org.junit.runners.ParentRunner$2.evaluate(ParentRunner.java:268)\nat org.junit.runners.ParentRunner.run(ParentRunner.java:363)\n\
  at org.junit.runner.JUnitCore.run(JUnitCore.java:137)\nat org.junit.runner.JUnitCore.run(JUnitCore.java:115)\n\
  at androidx.test.internal.runner.TestExecutor.execute(TestExecutor.java:56)\nat\
  \ androidx.test.runner.AndroidJUnitRunner.onStart(AndroidJUnitRunner.java:388)\n\
  at android.app.Instrumentation$InstrumentationThread.run(Instrumentation.java:2145)\n\
  ```\n\n值得一提的是，`JUnit assertTrue()` 方法会接受堆栈跟踪第一行中的错误描述信息。相比之下，下面是使用 `Truth assertThat(CONDITION).isFalse()`\
  \ 生成的示例错误堆栈跟踪。\n\n*由 `generatesTruthAssertionError()` 测试失败生成的 **Truth** 错误堆栈跟踪。*\n\
  \n```\nexpected to be false\nat com.example.android.architecture.blueprints.todoapp.test.chapter14.TruthTest.generatesTruthAssertionError(TruthTest.kt:41)\n\
  ```\n\n## 练习 29\n\n**迁移到 AndroidX**\n\n1.  检出 TO-DO 应用程序项目的 master 分支，并将其迁移到 AndroidX。迁移完成后，选择\
  \ Build ➤ Clean Project。运行一些测试。如果有失败情况，请通过更新 `proguard` 规则或更新 `build.gradle` 文件中的依赖项进行分析和修复。\n\
  \n2.  实现一个测试类，其中包含一个测试，该测试在 `@Before` 方法中使用 `ActivityScenario.launch(Activity.class)`\
  \ 启动应用程序活动，然后运行测试。\n\n3.  实现一个使用 UI Automator 测试框架的测试，该测试将使用 `JUnit` 断言库来验证测试结果。使测试失败并观察堆栈跟踪。\n\
  \n4.  实现一个使用 UI Automator 测试框架的测试，该测试将使用 `Truth` 断言库来验证测试结果。使测试失败并观察堆栈跟踪。\n\n##\
  \ 总结\n\n总的来说，AndroidX Test 是一个不错的进步。它在测试工具和所使用的依赖项方面，使不同类型的测试之间保持一致。目前主要的缺点是，它主要针对单元测试和集成测试，而对\
  \ UI 测试的改进微乎其微。但随着时间的推移，UI 测试方面肯定会有更多改进，并且希望其改进频率能高于测试支持库。\n\n"
- "# 15. 提升生产力与测试非常规组件\n\n本章包含其他章节未涉及的代码示例，以及一些可能提高日常测试编写效率的 Espresso 测试技巧。\n\n##\
  \ 创建参数化测试\n\n有时我们可能需要编写一个适用于许多类似情况的单一测试。例如，我们可能需要一个测试来验证同一个 `EditText` 字段在提供不同 `String`\
  \ 值作为输入时的表现。在这种情况下，可以使用 `JUnit Parameterized` 自定义运行器。它允许我们在一个参数化类中编写一个测试（[`github.com/junit-team/junit4/wiki/parameterized-tests`](https://github.com/junit-team/junit4/wiki/parameterized-tests)）。下面的示例演示了一个带有单个参数的参数化测试类。\n\
  \n*chapter15.parameterizedtest.ParameterizedTestSingleParameter.kt*\n\n```\n/**\n\
  * 带单个参数的参数化测试。\n*/\n@RunWith(value = Parameterized::class)\nclass ParameterizedTestSingleParameter(private\
  \ val title: String) : BaseTest() {\n@Test\nfun usesSingleParameters() {\n// 添加新的待办事项。\n\
  onView(withId(R.id.fab_add_task)).perform(click())\nonView(withId(R.id.add_task_title))\n\
  .perform(typeText(title), closeSoftKeyboard())\nonView(withId(R.id.fab_edit_task_done)).perform(click())\n\
  // 验证包含该标题的新待办事项已显示在待办事项列表中。\nonView(withText(title)).check(matches(isDisplayed()))\n\
  }\ncompanion object {\n@JvmStatic\n@Parameterized.Parameters\nfun data() = listOf(\n\
  TodoItem().title,\nTodoItem().title,\nTodoItem().title)\n}\n}\n```\n\n在测试运行期间，`ParameterizedTestSingleParameter`\
  \ 类的每个实例都将使用提供的 `title` 参数进行构造。因此，最终我们会有多少个参数，就会运行多少次测试。在这个例子中是三次。\n\n具有多个测试参数的参数化测试类可以类似地创建，如下所示。\n\
  \n*chapter15.parameterizedtest.ParameterizedTestMultipleParameters.kt*\n\n```\n\
  /**\n* 带多个参数的参数化测试。\n*/\n@RunWith(value = Parameterized::class)\nclass ParameterizedTestMultipleParameters(\n\
  private val title: String,\nprivate val description: String) : BaseTest() {\n@Test\n\
  fun usesMultipleParameters() {\n// 添加新的待办事项。\nonView(withId(R.id.fab_add_task)).perform(click())\n\
  onView(withId(R.id.add_task_title))\n.perform(typeText(title), closeSoftKeyboard())\n\
  onView(withId(R.id.add_task_description))\n.perform(typeText(description), closeSoftKeyboard())\n\
  onView(withId(R.id.fab_edit_task_done)).perform(click())\n// 验证包含该标题的新待办事项已显示在待办事项列表中。\n\
  onView(withText(title)).check(matches(isDisplayed()))\n}\ncompanion object {\n@JvmStatic\n\
  @Parameterized.Parameters\nfun data() = arrayOf(\narrayOf(\"item 1\", \"description\
  \ 1\"),\narrayOf(\"item 2\", \"description 2\"),\narrayOf(\"item 3\", \"description\
  \ 3\"))\n}\n}\n```\n\n## 将测试聚合到测试套件中\n\n为了运行可能属于或可能测试特定应用程序功能的一组测试，最好将它们组织成测试套件。`JUnit\
  \ Suite Runner` 可能是一个合适的选择。它允许您手动构建一个包含来自许多测试类的测试的套件。实现方式如下。\n\n*chapter15.testsuite.TestSuiteSample.kt*\n\
  \n```\n/**\n* 将测试类组织成测试套件。\n*/\n@RunWith(Suite::class)\n@Suite.SuiteClasses(\nAddToDoTest::class,\n\
  EditToDoTest::class,\nFilterToDoTest::class)\nclass TestSuiteSample\n```\n\n这样，您可以根据被测试的功能或测试类型（例如冒烟测试、回归测试等）将测试组织成逻辑结构。\n\
  \n\n\n## 在 UI 测试中使用 AndroidStudio 的实时模板\n\n许多现代集成开发环境（IDE）中的代码补全功能极大地提高了我们的编码效率。但得益于\
  \ AndroidStudio，我们拥有一个更强大的工具，可以助力我们更快速地编码——即实时模板。\n\n`实时模板`是预定义的代码片段，通过输入其缩写即可插入到代码中。可以通过`Preferences`\
  \ ➤ `Editor` ➤ `Live Templates`路径将它们添加到 AndroidStudio。这里有一组预定义的`Live Templates`分组，您也可以添加自己的分组或自定义实时模板。为此，请点击`+`按钮，然后选择相应选项。之后，您需要提供缩写名称、模板文本（即稍后将替换缩写而插入的代码片段）、可选的描述信息，以及模板生效的适用上下文。在本例中，我们选择了`Kotlin`和`Java`上下文，如图\
  \ 15-1 所示。\n\n![../images/469090_1_En_15_Chapter/469090_1_En_15_Fig1_HTML.jpg](img/469090_1_En_15_Fig1_HTML.jpg)\n\
  \n**图 15-1** 添加实时模板\n\n在特定上下文中使用时，只需输入模板缩写并按下`Tab`键即可。如图 15-2 所示。\n\n![../images/469090_1_En_15_Chapter/469090_1_En_15_Fig2_HTML.jpg](img/469090_1_En_15_Fig2_HTML.jpg)\n\
  \n**图 15-2** 通过输入缩写并点击`Tab`键使用实时模板\n\n当您更换电脑或想要分享时，导出预定义的实时模板也非常简单。只需打开`File` ➤\
  \ `Export Settings …`菜单，然后选择`Live Templates`即可，如图 15-3 所示。\n\n![../images/469090_1_En_15_Chapter/469090_1_En_15_Fig3_HTML.jpg](img/469090_1_En_15_Fig3_HTML.jpg)\n\
  \n**图 15-3** 导出实时模板\n\n为了方便您使用，一份简短的 Espresso 实时模板列表已创建，并导出为一个`.jar`文件，存放在 TO-DO\
  \ 应用项目的以下路径中：`todoapp/book_assets/livetemplates.jar`。\n\n## Espresso 的 Drawable\
  \ 匹配器\n\n另一种我们必须了解的自定义匹配器类型是`Drawable`匹配器。此匹配器类型可用于比较图标和图像。UI 测试中的这类验证并未得到广泛讨论，而且一般来说，Android\
  \ 快照测试并不流行，只能通过使用第三方库来实现。为了覆盖这一领域，我们将额外的 drawable 验证作为 UI 测试的一部分引入。\n\n那么我们将应用程序的\
  \ drawable 与什么进行比较呢？我们必须记住，测试是作为一个独立的应用程序构建的，它拥有自己的资源、上下文等。因此，解决方案很简单——我们将测试中会用到的应用程序\
  \ drawable 复制到测试应用程序资源中，并在 UI 测试中使用它们。以下是涵盖`TextView`和`ImageView` drawable 的`Drawable`匹配器实现。\n\
  \n`chapter15*.drawablematchers.DrawableMatchers.kt.*`\n\n```\n/**\n * Contains TextView\
  \ and ImageView Drawable matchers.\n */\nclass DrawableMatchers {\n    fun withTextViewDrawable(drawableToMatch:\
  \ Drawable): Matcher {\n        return object : BoundedMatcher(TextView::class.java)\
  \ {\n            override fun describeTo(description: Description) {\n         \
  \       description.appendText(\"Drawable in TextView $drawableToMatch\")\n    \
  \        }\n            override fun matchesSafely(editTextField: TextView): Boolean\
  \ {\n                val drawables = editTextField.compoundDrawables\n         \
  \       val drawable = drawables[2]\n                return isSameBitmap(drawableToMatch,\
  \ drawable)\n            }\n        }\n    }\n    fun withImageViewDrawable(expectedDrawable:\
  \ Drawable?): Matcher {\n        return object : BoundedMatcher(ImageView::class.java)\
  \ {\n            override fun describeTo(description: Description) {\n         \
  \       description.appendText(\"Drawable in ImageView $expectedDrawable\")\n  \
  \          }\n            public override fun matchesSafely(imageView: ImageView)\
  \ =\n                isSameBitmap(imageView.drawable, expectedDrawable)\n      \
  \  }\n    }\n    fun isSameBitmap(drawable: Drawable?, expectedDrawable: Drawable?):\
  \ Boolean {\n        var localDrawable = drawable\n        var localExpectedDrawable\
  \ = expectedDrawable\n        // Return if null.\n        if (localDrawable == null\
  \ || localExpectedDrawable == null) {\n            return false\n        }\n   \
  \     // StateListDrawable lets you assign a number of graphic images to a single\n\
  \        // Drawable and swap out the visible item by a string ID value.\n     \
  \   if (localDrawable is StateListDrawable\n            && localExpectedDrawable\
  \ is StateListDrawable) {\n            localDrawable = localDrawable.current\n \
  \           localExpectedDrawable = localExpectedDrawable.current\n        }\n \
  \       // BitmapDrawable - a Drawable that wraps a bitmap and can be tiled, stretched,\
  \ or\n        // aligned.\n        if (localDrawable is BitmapDrawable) {\n    \
  \        val bitmap = localDrawable.bitmap\n            val otherBitmap = (localExpectedDrawable\
  \ as BitmapDrawable).bitmap\n            return bitmap.sameAs(otherBitmap)\n   \
  \     }\n        return false\n    }\n}\n```\n\n以下是它的用法。\n\n`chapter15.drawablematchers.DrawableMatchersTest.kt`\n\
  \n```\n/**\n * Demonstrates Drawable matchers usage.\n */\nclass DrawableMatchersTest\
  \ : BaseTest() {\n    @Test\n    fun checkDrawableInMenuDrawer() {\n        openDrawer()\n\
  \        onView(withId(R.id.headerTodoLogo))\n            .check(matches(DrawableMatchers()\n\
  \                .withImageViewDrawable(getMenuIconDrawable())))\n    }\n    private\
  \ fun getMenuIconDrawable(): Drawable? {\n        val drawableId = com.example.android.architecture.blueprints.todoapp.mock.test\n\
  \            .R.drawable.test_logo\n        return InstrumentationRegistry.getInstrumentation().context.getDrawable(drawableId)\n\
  \    }\n}\n```\n\n在这个测试中，我们比较了 TO-DO 应用抽屉中显示的图标（主应用 drawable 中名为`logo.png`的图标）与测试应用\
  \ drawable 资源中存储的`test_logo`图标。\n\n> **注意**  \n> 无法同时从主应用和测试应用导入`R.class`文件，因此我们必须显式提供测试应用`R.class`的路径。\n\
  \n## 在 Espresso UI 测试中设置 SeekBar 进度\n\n本节演示了如何使用自定义的 Espresso`ViewAction`来设置`SeekBar`的进度。从第\
  \ 2 章我们知道如何创建自定义`ViewAction`，而`SeekBar`的情况是最简单的之一。\n\n`chapter15*.setseekbarprogress.SeekBarViewActions.kt`\n\
  \n```\n/**\n * ViewActions that operate on SeekBar\n */\nobject SeekBarViewActions\
  \ {\n    /**\n     * Sets progress of a SeekBar.\n     *\n     * @param value -\
  \ the progress value between min and max SeekBar value\n     */\n    fun setProgress(value:\
  \ Int): ViewAction {\n        return object : ViewAction {\n            override\
  \ fun getConstraints(): Matcher {\n                return isAssignableFrom(SeekBar::class.java)\n\
  \            }\n            override fun getDescription(): String {\n          \
  \      return (\"Set slider progress to $value.\")\n            }\n            override\
  \ fun perform(uiController: UiController, view: View) {\n                val seekBar\
  \ = view as SeekBar\n                seekBar.progress = value\n            }\n \
  \       }\n    }\n}\n```\n\n在测试中的用法也很简单，如下所示。\n\n`chapter15*.setseekbarprogress.SetSeekBarProgressTest.kt`\n\
  \n\n\n## 排版后的内容\n\n```\n/**\n* 测试 SeekBar 变化。\n*/\nclass SetSeekBarProgressTest:\
  \ BaseTest() {\n@Test\nfun sliderActionSample() {\nopenDrawer()\nonView(allOf(withId(R.id.design_menu_item_text),\n\
  withText(R.string.statistics_title))).perform(click())\nonView(withId(android.R.id.button1)).perform(click())\n\
  onView(withId(R.id.simpleSeekBar)).perform(setProgress(10))\nonView(withId(R.id.seekBarTextView)).check(matches(withText(\"\
  Progress: 10\")))\n}\n}\n```\n\n"
