- '# 引言


  ## 本书读者对象


  本书是一本指导手册，面向对使用 Espresso for Android（Espresso）进行 Android 测试自动化感兴趣的**质量保证工程师**和**测试自动化工程师**，指导他们如何编写
  Android 用户界面测试。对于参与编写 UI 测试或集成测试的 Android 开发者而言，本书也极具价值。


  本书主要面向具备中高级 Android 测试自动化知识的软件或测试工程师编写；不过，拥有基础开发和测试自动化经验的工程师也将从中受益。


  ## 本书涵盖内容


  目前存在大量优质的官方 Android 测试文档，包括包含源代码的 GitHub 项目，但有时很难找到所需的信息片段，尤其是涉及 Android Espresso
  用户每天都会遇到的纯自动化 UI 端到端测试相关内容。


  我试图涵盖使用 Espresso 测试框架编写功能性 UI 自动化测试的所有主要主题，包括运行自动化测试的不同方式、以易于维护的方式构建测试项目，以及使用能够以更少工作量实现自动化测试的工具。


  ## 源代码与示例项目


  为展示本书中的所有代码示例，我们复刻并修改了 Google 示例的 Android 架构 TODO 应用程序项目（`https://github.com/googlesamples/android-architecture`），以便能够使用
  Espresso for Android 和 UI Automator 测试框架展示大部分 Android UI 测试自动化示例。


  该示例 TODO 应用程序项目包含两个分支，其中一个分支使用 Android 测试支持库依赖项，另一个分支涵盖 AndroidX 测试库的使用。读者可以自由选择自己偏好的分支。


  源代码也可通过位于 `www.apress.com/9781484243145` 的“下载源代码”链接获取。


  ## 章节概述


  ### 第 1 章：Espresso for Android 入门


  本章介绍 Espresso 的基础知识。它定义了用户界面测试的目标和方法，并提供了在 Android Studio IDE 项目中设置测试的示例。本章还解释了如何识别
  Android 应用程序 UI 元素、执行操作和断言，以及如何对其应用匹配器。在本章结束时，你将能够编写简单的测试，并在 Android Studio IDE
  中于设备或模拟器上执行这些测试。本章还包含如何通过 Gradle 或 shell 命令运行测试的示例。


  ### 第 2 章：按需定制 Espresso


  通过更高级的示例，你将学习如何实现自定义的 `ViewAction`，包括点击和滑动操作；以及自定义的 `ViewMatcher`，例如匹配像 `RecyclerView`
  这样的复杂视图。你将学习如何使用自定义操作和匹配器，实现自定义的 `FailureHandler`，并能在测试失败时截取和保存屏幕截图。


  '
- '# 第 3 章：使用 Kotlin 编写 Espresso 测试


  本章概述了在测试中使用 Kotlin 编程语言的优势，并解释了如何将用 Java 编写的测试迁移到 Kotlin。本章还提供了在 Kotlin 中创建 Espresso
  领域特定语言的示例。


  '
- '# 第 4 章：处理网络操作和异步操作


  本章解释了如何借助 `IdlingResource` 接口，在测试执行期间处理应用程序的网络请求和长时间运行的操作。它还提供了使用 `ConditionalWatcher`
  作为 `IdlingResource` 替代方案的示例。


  '
- '# 第 5 章：使用 IntentMatchers 验证和存根 Intent


  本章解释了如何在应用程序内部使用 `IntentMatchers`，以及如何存根外部 Intent 并提供额外数据。外部 Intent 的一个典型例子是从相册中选择一张图片，然后由你正在测试的应用程序使用。


  '
- '# 第 6 章：测试 WebView


  本章涵盖了对应用程序内 `WebViews` 的测试。实现的 `WebViews` 展示了 Espresso-Web API 能够操作的不同 UI 元素。作为本书内容的一部分，你将获得一份
  Espresso-Web 速查表。


  '
- '# 第 7 章：无障碍测试


  本章揭示了如何使用 Espresso for Android 测试应用程序无障碍功能这一主题。它提高了人们对无障碍测试重要性的认识，并概述了可用于测试应用程序无障碍功能的手动工具。


  ### 第 8 章：Espresso 与 UI Automator：完美搭档


  本章解释了 Android 最强大的测试自动化设置之一，它结合了 Espresso 测试框架和 UI Automator 测试工具。示例展示了如何在执行 Espresso
  测试时测试通知或操作第三方应用。


  ### 第 9 章：处理运行时系统操作和权限


  本章解释了处理权限请求对话框等系统操作的不同方法，并描述了以编程方式更改 Android 模拟器系统语言的可行解决方案。


  '
- '# 第 10 章：Android 测试自动化工具


  阅读本章后，你将了解如何使用 Espresso 测试记录器、设置测试设备或模拟器以最大限度地减少测试不稳定性，以及在 Firebase 云端运行测试。


  '
- '# 第 11 章：Android UI 测试中的屏幕对象设计模式


  本章向你展示如何将屏幕对象（等同于页面对象）架构方法应用于测试项目，这允许你减少在应用程序源代码更改后重新修改测试所花费的维护工作量。


  '
- '# 第 12 章：使用 Espresso 和 Kotlin 测试机器人模式


  在本章中，你将学习如何应用一种测试机器人模式，该模式将测试实现与业务逻辑分离到 Espresso UI 测试中。




  ## 第 13 章：使用 Espresso 和 UI Automator 进行有监督的 Monkey 测试


  本章将展示如何利用 Espresso 和 UI Automator 实现有监督的伪 Monkey 测试，这些测试既适用于可访问源代码的应用程序，也适用于第三方应用程序。


  ## 第 14 章：AndroidX Test 库


  本章演示如何将测试代码从 Android 支持库迁移到 AndroidX Test 库。你将了解 AndroidX Test 库中引入的新 API，并学习如何将它们应用于
  UI 测试。


  ## 第 15 章：提高生产力与测试非常规组件


  本章包含其他章节未涉及的代码示例，以及能够提升日常测试编写效率的 Espresso 测试技巧。内容包括创建参数化测试、将测试聚合到测试套件、在 UI 测试中使用
  AndroidStudio 实时模板、在 Espresso UI 测试中设置 `SeekBar` 进度，以及 Espresso `Drawable` 匹配器等相关主题。


  ## 本书未涵盖的内容


  本书旨在创建一份指南，指导如何为 Android 应用程序编写端到端的 UI 自动化测试，而无需模拟或存根应用程序依赖项。在我看来，这是最接近重现终端用户行为的方式。本书不涉及如何模拟应用程序数据和网络连接请求，或绕过应用程序工作流中的某些状态。


  ## 工具要求


  要使用本书，你需要至少具备 Android Studio IDE、Gradle、GitHub 和 shell/bash 等工具和平台的基本操作知识。在大多数情况下，我会说明如何配置你的
  IDE，并指出运行特定脚本时应使用哪些命令。


  ## 法律声明


  本书包含从 Android 开发者页面 [`https://developer.android.com`](https://developer.android.com)
  获取的代码、文档和图片。这些内容受附录 C 中提及的 Apache 2.0 许可证（[`http://www.apache.org/licenses/`](http://www.apache.org/licenses/)）保护。


