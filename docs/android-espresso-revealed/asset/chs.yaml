  \ ID，这是你 Firebase 项目的唯一标识符。参见图 10-13。\n\n![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig13_HTML.jpg](img/469090_1_En_10_Fig13_HTML.jpg)\n\
