  \n```\nprivate fun launchBackToDoApplication() {\n// 创建 Intent 以打开待办事项应用。\nval intent\
  \ = testContext.packageManager.getLaunchIntentForPackage(todoAppPackageName)\nInstrumentationRegistry.getContext().startActivity(intent)\n\
  }\n```\n\n运行 `RuntimePermissionsUiAutomatorTest` 中的测试后，我们在图 9-6 中可以看到运行时间表现良好——三个与第三方应用交互的测试仅用时\
