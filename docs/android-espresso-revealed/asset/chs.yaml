  \ `StubChooserIntentTest.kt` 类中的所有测试。测试应该全部通过。\n```\n\n\n## 使用结果存根化 Intent\n\n在许多情况下，被测应用启动的\
  \ Activity 意图必须以图库图像或设备文件系统中的文件形式返回结果。在 Android 中，这是通过在应用 Activity 或 Fragment 内使用\
  \ `startActivityForResult()` 方法启动一个 Activity 来实现的。启动 Activity 后，用户执行某些操作生成结果，该结果随后会返回给最初发送意图的\
  \ Activity 或 Fragment。Android Activity 类中的 `onActivityResult()` 方法负责接收先前调用 `startActivityForResult()`\
  \ 方法所返回的结果。\n\n示例 TO-DO 应用包含一个使用 `startActivityForResult()` 发送意图的示例，并在 `com.example.android.architecture.blueprints.todoapp.addedittask.AddEditTaskFragment.java`\
  \ 类中实现的 `onActivityResult()` 方法中处理结果。\n\n### 在 `AddEditTaskFragment.java` 中启动和处理图像\
  \ Intent\n\n```java\npublic void onImageButtonClick() {\n    Intent intent = new\
  \ Intent();\n    intent.setType(\"image/*\");\n    intent.setAction(Intent.ACTION_GET_CONTENT);\n\
  \    startActivityForResult(intent, SELECT_PICTURE);\n}\n\npublic void onActivityResult(int\
  \ requestCode, int resultCode, Intent data) {\n    if (resultCode == RESULT_OK)\
  \ {\n        if (requestCode == SELECT_PICTURE) {\n            Uri selectedImageUri\
  \ = data.getData();\n            BitmapDrawable bitmapDrawable =\n             \
  \   ImageUtils.scaleAndSetImage(selectedImageUri, getContext(), 200);\n        \
  \    // 应用缩放后的位图\n            imageView.setImageDrawable(bitmapDrawable);\n    \
  \        // 现在更改 ImageView 的尺寸以匹配缩放后的图像\n            ConstraintLayout.LayoutParams\
  \ params =\n                (ConstraintLayout.LayoutParams) imageView.getLayoutParams();\n\
  \            params.width = imageView.getWidth();\n            params.height = imageView.getHeight();\n\
  \            imageView.setLayoutParams(params);\n        }\n    }\n}\n```\n\n你可以看到\
  \ `onImageButtonClick()` 方法中的 intent 预设了类型和 Action，可以在测试中使用这些信息来匹配该 intent 并进行存根化。\n\
  \n现在应该清楚了启动 Activity 以获取结果的机制。我们最后要做的是创建用于存根化的结果。在前一段中，我们使用了返回结果的机制，但将其设置为 null，主要是因为我们在分享意图的情况下不需要结果：\n\
  \n```kotlin\nintending(not(isInternal()))\n    .respondWith(Instrumentation.ActivityResult(Activity.RESULT_OK,\
  \ null))\n```\n\n现在我们需要自己实现结果。我们将讨论通过 `startActivityForResult()` 方法启动的 Activity\
  \ 获取存根化图像结果的两种方法：\n\n- 使用存储在测试应用 drawable 中的图像文件提供结果。\n- 使用存储在测试应用 assets 文件夹中的图像文件提供结果。\n\
  \n在图 5-7 中，你可以看到分别存储在测试应用 `res/drawable-xxxhdpi` 和 `assets` 文件夹中的 `todo_image_drawable.png`\
  \ 和 `todo_image_assets.png` 文件。\n\n![../images/469090_1_En_5_Chapter/469090_1_En_5_Fig7_HTML.jpg](img/469090_1_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7\n用于 Intent 存根化的 .png 文件位置\n\n为了展示这两种方法的实现，示例应用包含带有测试用例的 `chapter5.StubSelectImageIntentTest.kt`\
  \ 类，以及包含用于生成 Intent 存根化中使用的 Activity 结果方法的 `chapetr5.IntentHelper.kt` 对象。\n\n###\
  \ 在 `StubSelectImageIntentTest.kt` 类中实现的测试方法\n\n```kotlin\n@Test\nfun stubsImageIntentWithDrawable()\
  \ {\n    val toDoImage =\n        com.example.android.architecture.blueprints.todoapp.mock.test.R.drawable.todo_image\n\
  \    Intents.intending(not(isInternal()))\n        .respondWith(IntentHelper.createImageResultFromDrawable(toDoImage))\n\
  \    // 添加新的待办事项。\n    addFab.click()\n    taskTitleField.type(toDoTitle).closeKeyboard()\n\
  \    taskDescriptionField.type(toDoDescription).closeKeyboard()\n    // 点击从图库获取图像按钮。此时返回存根化的图像。\n\
  \    addImageButton.click()\n    editDoneFab.click()\n    viewWithText(toDoTitle).click()\n\
  }\n\n@Test\nfun stubsImageIntentWithAsset() {\n    val imageFromAssets = \"todo_image_assets.png\"\
  \n    Intents.intending(not(isInternal()))\n        .respondWith(IntentHelper.createImageResultFromAssets(imageFromAssets))\n\
  \    // 添加新的待办事项。\n    addFab.click()\n    taskTitleField.type(toDoTitle).closeKeyboard()\n\
  \    taskDescriptionField.type(toDoDescription).closeKeyboard()\n    // 点击从图库获取图像按钮。此时返回存根化的图像。\n\
  \    addImageButton.click()\n    editDoneFab.click()\n    viewWithText(toDoTitle).click()\n\
  }\n```\n\n### `IntentHelper.kt` 对象，提供用于生成 Intent 存根化中使用的 Activity 结果的方法\n\n```kotlin\n\
  object IntentHelper {\n    /**\n     *  从存储在测试应用 drawable 中的图像创建新的 Activity 结果。\n\
  \     *  有关结果的更多信息，请参见 {@link Activity#setResult}。\n     */\n    fun createImageResultFromDrawable(drawable:\
  \ Int): Instrumentation.ActivityResult {\n        val resultIntent = Intent()\n\
  \        val testResources = InstrumentationRegistry.getContext().resources\n  \
  \      // 从 drawable 图像构建存根化的结果。\n        resultIntent.data = Uri.parse(ContentResolver.SCHEME_ANDROID_RESOURCE\n\
  \            + \"://${testResources.getResourcePackageName(drawable)}\"\n      \
  \      + \"/${testResources.getResourceTypeName(drawable)}\"\n            + \"/${testResources.getResourceEntryName(drawable)}\"\
  )\n        return Instrumentation.ActivityResult(Activity.RESULT_OK, resultIntent)\n\
  \    }\n\n    /**\n     *  从存储在测试应用 assets 中的图像创建新的 Activity 结果。\n     *  有关结果的更多信息，请参见\
  \ {@link Activity#setResult}。\n     */\n    fun createImageResultFromAssets(imageName:\
  \ String): Instrumentation.ActivityResult {\n        val resultIntent = Intent()\n\
  \        // 声明测试上下文和应用上下文的变量。\n        val testContext = InstrumentationRegistry.getContext()\n\
  \        val appContext = InstrumentationRegistry.getTargetContext()\n        val\
  \ file = File(\"${appContext.cacheDir}/todo_image_temp.png\")\n        // 从测试 assets\
  \ 读取文件并保存到主应用缓存中的 todo_image_temp.png。\n        if (!file.exists()) {\n        \
  \    try {\n                val inputStream = testContext.assets.open(imageName)\n\
  \                val fileOutputStream = FileOutputStream(file)\n               \
  \ val size = inputStream.available()\n                val buffer = ByteArray(size)\n\
  \                inputStream.read(buffer)\n                inputStream.close()\n\
  \                fileOutputStream.write(buffer)\n                fileOutputStream.close()\n\
  \            } catch (e: Exception) {\n                throw RuntimeException(e)\n\
  \            }\n        }\n        // 从临时文件构建存根化的结果。\n        resultIntent.data\
  \ = Uri.fromFile(file)\n        return Instrumentation.ActivityResult(Activity.RESULT_OK,\
  \ resultIntent)\n    }\n}\n```\n\n`stubsImageIntentWithDrawable()` 测试用例使用位于测试应用\
  \ drawable 中的图像对 intent 结果进行存根化，而 `stubsImageIntentWithAsset()` 则使用存储在测试应用 assets\
  \ 文件夹中的图像进行 intent 存根化。将所有测试图像和文件存储在测试应用中非常方便，因为主应用不需要存储任何不必要的测试数据。同样地，我们可以存储所有可能用于\
  \ intent 存根化的文件类型。\n\n## 练习 15\n\n## 使用结果存根化 Intent\n\n1. 运行当前部分的所有测试并观察它们通过。将 `res/drawable-xxxhdpi`\
  \ 和 assets 文件夹中的图像替换为不同的图像。再次运行测试。\n\n2. 基于在 `AddEditTaskFragment.java` 中实现的图像 intent，更改\
  \ `Intents.intending(not(isInternal()))` 的实现，并将 `not(isInternal())` 部分替换为 `hasAction()\
  \ IntentMatcher`。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n\
  3.  执行与步骤 2 相同的更改，但将 `hasAction()` 替换为 `hasType()` 的 `IntentMatcher`。\n\n## 验证 Intent\n\
  \n到目前为止，我们已经掌握了 Intent 匹配器的知识，并在测试示例中使用了它们。现在，是时候进入验证 Intent 的主题了。\n\n与用于 Intent\
  \ 桩代码的 `Intents.intending()` 机制一样，Espresso 提供了 `Intents.indended()` 用于 Intent 验证。此机制会记录所有试图从被测试应用启动\
  \ Activity 的 Intent。使用 `intended()` 方法，你可以断言已经看到了给定的 Intent。上一节提供了大量关于 Intent 匹配的信息和示例，因此我们将相同的\
  \ Intent 匹配器提供给 `intended()` 方法。\n\n> **注意**  \n> 即使我们为 Intent 设置了桩代码，它们仍然可以使用 `intended()`\
  \ 方法进行进一步验证。\n\n为了演示 `intended()` 的实际使用，让我们修改现有的 `stubsImageIntentWithDrawable()`\
  \ 测试，如下所示。\n\n*chapter5.*  \n*StubSelectImageIntentTest.stubsImageIntentWithAsset()*\
  \  \n*.*\n\n```\n@Test\nfun stubsImageIntentWithAsset() {\nval imageFromAssets =\
  \ \"todo_image_assets.png\"\nIntents.intending(not(isInternal()))\n.respondWith(IntentHelper.createImageResultFromAssets(imageFromAssets))\n\
  // 添加新 TO-DO。\naddFab.click()\ntaskTitleField.type(toDoTitle).closeKeyboard()\n\
  taskDescriptionField.type(toDoDescription).closeKeyboard()\n// 点击从图库获取图片按钮。此时会返回桩代码图片。\n\
  addImageButton.click()\n// 验证发送的 intent action。\nintended(hasAction(Intent.ACTION_GET_CONTENT))\n\
  editDoneFab.click()\nviewWithText(toDoTitle).click()\n}\n```\n\n在当前实现中，测试通过是因为图片\
  \ intent 设置了 `ACTION_GET_CONTENT` 动作。当然，我们可以使用 `allOf()` hamcrest 匹配器来组合不同的 `IntentMatchers`，从而缩小验证范围。\n\
  \n有时你可能看不到 Intent 的实现，但当 `intended()` 验证失败时，仍然可以从 Espresso 失败堆栈跟踪中获取所有 Intent。\n\
  \n*来自失败的 intended(intentMatcher) 验证的 Espresso 堆栈跟踪（部分）。*\n\n```\nIntentMatcher:\
  \ has action: is \"android.intent.action.ANSWER\"\nMatched intents:[]\nRecorded\
  \ intents:\n-Intent { cmp=com.example.android.architecture.blueprints.todoapp.mock/com.example.android.architecture.blueprints.todoapp.addedittask.AddEditTaskActivity\
  \ } handling packages:[[com.example.android.architecture.blueprints.todoapp.mock]])\n\
  -Intent { act=android.intent.action.GET_CONTENT typ=image/* } handling packages:[[com.android.documentsui,\
  \ com.google.android.apps.docs, com.google.android.apps.photos]])\n```\n\n这个堆栈跟踪是在将先前测试方法中的\
  \ Intent 动作设置为错误的值后得到的：\n\n```\nintended(hasAction(Intent.ACTION_ANSWER))\n```\n\
  \n从堆栈跟踪中，我们可以看到在图片 intent 中：\n\n```\n{ act=android.intent.action.GET_CONTENT typ=image/*\
  \ }\n```\n\n还有另一个：\n\n```\n{ cmp=com.example.android.architecture.blueprints.todoapp.mock/com.example.android.architecture.blueprints.todoapp.addedittask.AddEditTaskActivity\
  \ }\n```\n\n为了理解 Intent 是如何出现在堆栈跟踪中的，让我们仔细看看 Espresso 的 `Intents.java` 类。这个类负责验证和桩代码处理被测试应用发出的\
  \ Intent。它包含 `init()` 方法，该方法初始化 Intent 并开始记录它们。必须在触发任何会发送需要验证或设置桩代码的 Intent 的动作之前调用它。正是因为\
  \ `IntentsTestRule` 使用了它，才需要运行 Intent 测试。\n\n有了这些信息，我们可以对 `stubsImageIntentWithAsset()`\
  \ 测试用例进行修改。我们还将验证，在点击添加 TO-DO 浮动操作按钮后，`AddEditTaskActivity` 是否会被启动。\n\n*修改后的 stubsImageIntentWithAsset()\
  \ 测试用例。*\n\n```\n@Test\nfun stubsImageIntentWithAsset() {\nval imageFromAssets =\
  \ \"todo_image_assets.png\"\nIntents.intending(not(isInternal()))\n.respondWith(IntentHelper.createImageResultFromAssets(imageFromAssets))\n\
  // 添加新 TO-DO。\naddFab.click()\n// 验证 AddEditTaskActivity 已被启动。\nintended(hasComponent(AddEditTaskActivity::class.java.name))\n\
  taskTitleField.type(toDoTitle).closeKeyboard()\ntaskDescriptionField.type(toDoDescription).closeKeyboard()\n\
  // 点击从图库获取图片按钮。此时会返回桩代码图片。\naddImageButton.click()\n// 验证发送的 intent action。\nintended(hasAction(Intent.ACTION_GET_CONTENT))\n\
  editDoneFab.click()\nviewWithText(toDoTitle).click()\n}\n```\n\n同样重要的是要注意堆栈跟踪中的\
  \ Intent 细节和调试信息，如图 5-4 和 5-5 所示。这两个来源都包含有关 Intent 的信息，例如其 action、type 或 component。让我们再看一次堆栈跟踪：\n\
  \n```\nRecorded intents:\n-Intent { cmp=com.example.android.architecture.blueprints.todoapp.mock/com.example.android.architecture.blueprints.todoapp.addedittask.AddEditTaskActivity\
  \ } handling packages:[[com.example.android.architecture.blueprints.todoapp.mock]])\n\
  -Intent { act=android.intent.action.GET_CONTENT typ=image/* } handling packages:[[com.android.documentsui,\
  \ com.google.android.apps.docs, com.google.android.apps.photos]])\n```\n\n正如你可能猜到的：\n\
  \n*   `cmp` — 表示组件（component）。适用于 `hasComponent() IntentMatcher`。\n*   `packages`\
  \ — 表示包（package）。适用于 `hasPackage()` 或 `toPackage() IntentMatcher`。\n*   `act` —\
  \ 表示动作（action）。适用于 `hasAction() IntentMatcher`。\n*   `typ` — 表示类型（type）。适用于 `hasType()\
  \ IntentMatcher`。\n\n## 练习 16\n\n**验证 Intent**\n\n1.  修改一个 Intent 测试，使其在使用 `intended()`\
  \ 方法进行 Intent 验证时失败。观察堆栈跟踪。\n2.  实现一个测试，验证“为无结果的 Intent 设置桩代码”部分讨论的分享 Intent 功能。根据\
  \ Intent 类型和动作进行验证。使用 `allOf()` hamcrest 匹配器来验证两者。\n\n## 总结\n\nEspresso-Intents\
  \ 使你可以保持 UI 测试的封闭性，无需与第三方应用程序交互，并允许你验证在待测应用内部或外部发送的 Intent。它是一个强大的机制，可帮助你测试和应用 Intent\
  \ 桩代码。熟悉它之后，它将提升你对整个 Android 系统的理解，因为应用组件、应用和系统之间的大部分通信都是通过 Intent 完成的。\n\n6. 测试\
  \ WebView\n\n如今，我们几乎可以找到针对任何事物的移动应用——游戏、社交网络、银行、音乐等。由单个开发者、小型创业公司或成熟公司开发的如此多样化的应用意味着不同的开发方法。这些方法以原生和混合应用为代表。原生应用是为移动操作系统开发的，遵循平台标准、用户界面和用户体验指南，并可访问移动设备功能，如摄像头、GPS\
  \ 等。混合应用通常使用位于原生包装器或容器中的网站。在 Android 上，这个容器被称为 *WebView*。\n\n然而，存在一个灰色地带。即使开发者选择了原生应用开发，应用中也存在许多地方可能使用集成的\
  \ Android `WebView` 组件。这是有道理的，因为 WebView 代表了那些应能远程控制而无需创建冗余应用发布的功能。`WebView` 组件可能被使用的常见领域如下：\n\
  \n*   网络浏览器应用\n*   使用 Google、Facebook 或 Twitter 账号的注册或登录表单\n*   法律和隐私声明\n*   应用常见问题解答（FAQ）\n\
  \n\n\n# Espresso-Web 测试框架指南\n\n## 支持的联系表单\n\n我们已经知道原生 Android 应用程序可以通过 Espresso\
  \ 进行测试。本章介绍 Espresso-Web，并展示如何使用它来测试集成到移动应用中的 Android `WebView` UI 组件。Espresso 和\
  \ Espresso-Web 可以结合使用，以在应用程序的不同层面进行完整交互。\n\n## Espresso-Web 基础\n\n与 Espresso 的 `onData()`\
  \ 方法类似，`WebView` 交互由多个 *atoms* 组成。`WebView` 交互使用 Java 编程语言和 JavaScript 桥接的组合来完成其工作。由于没有机会通过从\
  \ JavaScript 环境暴露数据来引入竞态条件——Espresso 在基于 Java 端看到的所有内容都是隔离的副本——因此完全支持从 `Web.WebInteraction`\
  \ 对象返回数据，允许您验证从请求返回的所有数据。\n\nWebDriver 框架使用 *atoms* 以编程方式查找和操作 web 元素。Atoms 被 WebDriver\
  \ 用于处理浏览器操作。一个 atom 在概念上类似于 `ViewAction`，它是一个自包含的单元，用于在 UI 中执行操作。您通过一组定义的方法（如 `findElement()`\
  \ 和 `getElement()`）来暴露 atoms，从用户角度驱动浏览器。但是，如果直接使用 WebDriver 框架，atoms 需要被适当地编排，这需要相当冗长的逻辑。\n\
  \n在 Espresso 内部，`Web` 和 `Web.WebInteraction` 类封装了这些样板代码，并提供了类似 Espresso 的交互体验来操作\
  \ `WebView` 对象。因此，在 `WebView` 的上下文中，atoms 被用作传统 Espresso 的 `ViewMatchers` 和 `ViewActions`\
  \ 的替代品。API 看起来相当简单，如下所示。\n\n### Espresso-Web API 使用公式\n\n```\nonWebView()\n.withElement(Atom)\n\
  .perform(Atom)\n.check(WebAssertion)\n```\n\n要将 Espresso-Web 添加到项目中，请将以下代码行插入到应用程序的\
  \ `build.gradle` 文件中。\n\n### Android 支持库中的 Espresso-Web 依赖\n\n```\nandroidTestImplementation\
  \ 'com.android.support.test.espresso:espresso-web:3.0.2'\n```\n\n或者将相同的依赖添加到 AndroidX\
  \ 测试库中。\n\n### AndroidX 测试库中的 Espresso-Web 依赖\n\n```\nandroidTestImplementation\
  \ 'androidx.test.espresso:espresso-web:3.1.0'\n```\n\n## Espresso-Web 构建块\n\nEspresso-Web\
  \ 包含以下 API 组件：\n\n- `WebInteractions`——类似于 Espresso 的 `ViewInteraction` 或 `DataInteraction`。用于执行操作和调用验证方法、定位\
  \ web 元素以及设置 WebView 属性。\n- `DriverAtoms`——来自 WebDriver 项目的 JavaScript atoms 集合。\n\
  - `WebAssertions`——断言给定 atom 的结果被提供的匹配器接受。\n\n### Web 交互\n\n- `reset()`——删除 web\
  \ 交互中的 `Element` 和 `Window` 引用。\n- `forceJavascriptEnabled()`——强制在 WebView 上使用 JavaScript。启用\
  \ JavaScript 可能会重新加载被测试的 WebView。\n- `withNoTimeout()`——禁用此 `WebInteraction` 上的所有超时。\n\
  - `withTimelout()`——为当前 `WebInteraction` 设置定义的超时时间。\n- `inWindow()`——使此 `WebInteraction`\
  \ 在特定的 DOM 窗口中执行 JavaScript 评估。\n- `withElement()`——使此 `WebInteraction` 在评估之前向 atom\
  \ 提供给定的 `ElementReference`。调用此方法后，它会重置任何先前选择的 `ElementReference`。\n- `withContextualElement()`——在所选元素的子视图上评估此\
  \ `WebInteraction`。类似于 Espresso 的 `withChild()` 方法。\n- `perform()`——在当前上下文中执行提供的\
  \ atom。此方法会阻塞，直到 atom 返回。生成一个新的 `WebInteraction` 实例，可用于进一步交互。\n- `check()`——评估给定的\
  \ `WebAssertion`。此方法完成后，atom 评估的结果可通过 `get` 获得。\n- `get()`——返回先前调用 `perform` 或 `check`\
  \ 的结果。\n\n为了便于理解，web 交互可以分成不同的组，每组代表某种功能负载，如图 6-1 所示。\n\n### Driver atoms\n\n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig1_HTML.jpg](img/469090_1_En_6_Fig1_HTML.jpg)\n\
  \n**图 6-1** 按功能负载分组的 WebInteractions\n\n- `webClick()`——模拟 JavaScript 事件以点击特定元素。\n\
  - `clearElement()`——清除可编辑元素的内容。\n- `webKeys()`——模拟发送到某个元素的 JavaScript 按键事件。\n- `findElement()`——使用提供的\
  \ `locatorType` 策略查找元素。\n- `selectActiveElement()`——查找文档中当前活动的元素。\n- `selectFrameByIndex()`——按索引选择当前选中窗口的子框架。\n\
  - `selectFrameByIdOrName()`——按名称或 ID 选择给定窗口的子框架。\n- `getText()`——返回给定 DOM 元素下方的可见文本。\n\
  - `webScrollIntoView()`——如果所需元素在滚动后可见，则返回 true。\n\n`DriverAtoms` 可以按返回类型分组，这决定了特定方法的使用位置。请参见图\
  \ 6-2。\n\n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig2_HTML.jpg](img/469090_1_En_6_Fig2_HTML.jpg)\n\
  \n**图 6-2** 按返回类型分组的 DriverAtoms\n\n### Web 断言\n\n（见图 6-3）\n\n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig3_HTML.jpg](img/469090_1_En_6_Fig3_HTML.jpg)\n\
  \n**图 6-3** WebAssertions 方法\n\n- `webMatches()`——一个 `WebAssertion`，断言给定 atom 的结果被提供的匹配器接受。\n\
  - `webContent()`——一个 `WebAssertion`，断言文档与提供的匹配器匹配。\n\n现在，我们可以用更详细的信息扩展 Espresso-Web\
  \ API 使用公式，如图 6-4 所示。\n\n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig4_HTML.jpg](img/469090_1_En_6_Fig4_HTML.jpg)\n\
  \n**图 6-4** 扩展的 Espresso-Web API 使用公式\n\n您可能想知道为什么图 6-4 中显示的 `onWebView()` 方法将 Espresso\
  \ `ViewMatcher`（在第 1 章中讨论）作为参数。`WebView` UI 元素仍然是 Android 原生组件，可以有自己的 ID、内容描述和其他元素属性。如果应用程序屏幕中有多个\
  \ `WebView` 组件，我们必须指定要操作哪个 `WebView`。\n\n让我们再次查看我们的示例应用程序，其中 Settings 部分包含一个集成了\
  \ `WebView` 组件的 WebView 示例条目。图 6-5 显示了 LayoutInspector 中的布局层次结构。\n\n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig5_HTML.jpg](img/469090_1_En_6_Fig5_HTML.jpg)\n\
  \n**图 6-5** WebView 组件的应用程序设置子节布局\n\n如您所见，`WebView` 组件可以使用基于 ID 属性 `web_view` 的\
  \ Espresso `ViewMatcher` 进行标识。为方便起见，附录 A 中包含了 Espresso-Web 速查表，并作为示例应用程序源代码的补充。\n\
  \n## 练习 17：验证 Intent\n\n1.  启动示例应用程序并导航到 Settings。打开 `WebView` 示例部分，并使用 LayoutInspector\
  \ 工具进行布局转储。观察哪些 `WebView` 属性可用于 UI 测试。\n\n\n2.  类似于步骤 1，使用监控应用程序进行布局转储。观察哪些`WebView`属性可以使用监控工具进行分析，并将其与`LayoutInspector`的结果进行比较。\n\
  \n## 使用 Espresso-Web 编写测试\n\n现在我们可以深入探讨 Espresso 的 Web 测试。为了更好地理解，请在浏览器中打开主应用资源文件夹中的`web_form.html`和`web_form_response.html`文件，打开浏览器开发者工具，然后开始检查网页。假设您对\
  \ HTML 页面结构有基本了解，并能够使用浏览器开发者工具检查网页 UI 元素。\n\n使用 Espresso-Web，可以通过以下定位器类型在布局中定位 UI\
  \ 元素：\n\n*   `CLASS_NAME(\"className\")`\n*   `CSS_SELECTOR(\"css\")`\n*   `ID(\"\
  id\")`\n*   `LINK_TEXT(\"linkText\")`\n*   `NAME(\"name\")`\n*   `PARTIAL_LINK_TEXT(\"\
  partialLinkText\")`\n*   `TAG_NAME(\"tagName\")`\n*   `XPATH(\"xpath\")`\n\n图 6-6\
  \ 展示了`web_form.html`页面在 Chrome 开发者工具视图中的截图。\n\n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig6_HTML.jpg](img/469090_1_En_6_Fig6_HTML.jpg)\n\
  \n**图 6-6** Chrome 浏览器开发者工具视图\n\n该网页的设计旨在展示 Espresso-Web 的大部分功能。打开`chapter6.WebViewTest.kt`类以查看已实现的测试用例。以下是`updatesLabelAndOpensNewPage()`测试用例。\n\
  \n*chapter6.* *`WebViewTest.updatesLabelAndOpensNewPage()`* *.*\n\n```\n@Test\n\
  fun updatesLabelAndOpensNewPage() {\n    openDrawer()\n    onView(allOf(withId(R.id.design_menu_item_text),\n\
  \                 withText(R.string.settings_title))).perform(click())\n    onData(instanceOf(PreferenceActivity.Header::class.java))\n\
  \        .inAdapterView(withId(android.R.id.list))\n        .atPosition(3)\n   \
  \     .perform(click())\n    onWebView()\n        .forceJavascriptEnabled()\n  \
  \      // Find edit text and type text.\n        .withElement(findElement(Locator.ID,\
  \ \"text_input\"))\n        .perform(webKeys(\"Espresso WebView testing\"))\n  \
  \      // Find button by id and click.\n        .withElement(findElement(Locator.ID,\
  \ \"submitBtn\"))\n        .perform(webClick())\n        // Find element by id and\
  \ check its text.\n        .withElement(findElement(Locator.ID, \"response\"))\n\
  \        .check(webMatches(getText(), containsString(\"Espresso+WebView+testing\"\
  )))\n}\n```\n\n这里一切都很简单。导航到设置部分并点击`WebView`示例项后，`WebView`通过 Android `WebViewClient`显示。Espresso-Web\
  \ 会处理网页加载，因此无需实现额外的等待器。此测试用例中的所有元素都通过其 ID 定位，这是最理想的情况。\n\n下一个测试用例展示了如何通过 CSS 属性查找\
  \ Web 元素。这是常见的情况，当元素 ID 是动态生成且无法依赖它们时使用。\n\n*chapter6.* *`WebViewTest.selectsRadioButtonWithCss()`*\
  \ *.*\n\n```\n@Test\nfun selectsRadioButtonWithCss() {\n    openDrawer()\n    onView(allOf(withId(R.id.design_menu_item_text),\n\
  \                 withText(R.string.settings_title))).perform(click())\n    onData(instanceOf(PreferenceActivity.Header::class.java))\n\
  \        .inAdapterView(withId(android.R.id.list))\n        .atPosition(3)\n   \
  \     .perform(click())\n    onWebView()\n        // Find radio button by CSS.\n\
  \        .withElement(findElement(Locator.CSS_SELECTOR, \"input[value=\\\"rb1\\\"\
  ]\"))\n        .perform(webClick())\n}\n```\n\n另一种定位 Web 元素的方式是使用`XPATH`选择器，如下所示。\n\
  \n*chapter6.* *`WebViewTest.findsElementsByXpath()`* *.*\n\n```\n@Test\nfun findsElementsByXpath()\
  \ {\n    openDrawer()\n    onView(allOf(withId(R.id.design_menu_item_text),\n  \
  \               withText(R.string.settings_title))).perform(click())\n    onData(instanceOf(PreferenceActivity.Header::class.java))\n\
  \        .inAdapterView(withId(android.R.id.list))\n        .atPosition(3)\n   \
  \     .perform(click())\n    onWebView()\n        // Find label XPATH and check\
  \ its text.\n        .withElement(findElement(Locator.XPATH, \"//label[@id=\\\"\
  selection_result\\\"]\"))\n        .perform(webScrollIntoView())\n        .check(webMatches(getText(),\
  \ equalTo(\"Select option\")))\n}\n```\n\n**注意：** Web 浏览器开发者工具可以帮助通过`XPATH`或 CSS\
  \ 选择器定位元素。只需使用`CMD+F`或`CTRL+F`快捷键并在搜索框中输入`try`表达式，元素即可在页面布局中高亮显示。\n\n下一个示例测试用例展示了如何操作对话框弹出窗口内的元素。\n\
  \n*chapter6.* *`WebViewTest.opensModal()`* *.*\n\n```\n@Test\nfun opensModal() {\n\
  \    openDrawer()\n    onView(allOf(withId(R.id.design_menu_item_text),\n      \
  \           withText(R.string.settings_title))).perform(click())\n    onData(instanceOf(PreferenceActivity.Header::class.java))\n\
  \        .inAdapterView(withId(android.R.id.list))\n        .atPosition(3)\n   \
  \     .perform(click())\n    onWebView()\n        // Find button and click.\n  \
  \      .withElement(findElement(Locator.ID, \"updateDetails\"))\n        .perform(webClick())\n\
  \        // Find edit text field and input text in the popped up dialog.\n     \
  \   .withElement(findElement(Locator.ID, \"modal_text_input\"))\n        .perform(webKeys(\"\
  Text from modal\"))\n        // Find and click Confirm button.\n        .withElement(findElement(Locator.ID,\
  \ \"confirm\"))\n        .perform(webClick())\n        // Verify text from modal\
  \ is set in label.\n        .withElement(findElement(Locator.ID, \"modal_message\"\
  ))\n        .check(webMatches(getText(), equalTo(\"Text from modal\")))\n}\n```\n\
  \n在当前情况下，对话框属于 HTML 页面，使用相同的`onWebView()`方法即可轻松找到其中的元素，如图 6-7 所示。\n\n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig7_HTML.jpg](img/469090_1_En_6_Fig7_HTML.jpg)\n\
  \n**图 6-7** Android WebView 客户端内显示的 HTML `<dialog>`。\n\n下一个测试用例是关于测试与 HTML `<select>`组件的交互。事实证明这是一个棘手的问题。首先，实现了以下测试用例。\n\
  \n*chapter6.* *`WebViewTest.failsToClickSelectDropDown()`* *.*\n\n```\n@Test\nfun\
  \ failsToClickSelectDropDown() {\n    openDrawer()\n    onView(allOf(withId(R.id.design_menu_item_text),\n\
  \                 withText(R.string.settings_title))).perform(click())\n    onData(instanceOf(PreferenceActivity.Header::class.java))\n\
  \        .inAdapterView(withId(android.R.id.list))\n        .atPosition(3)\n   \
  \     .perform(click())\n    onWebView()\n        // Supposed to click on select.\n\
  \        .withElement(findElement(Locator.ID, \"selection_id\"))\n        .perform(webClick())\n\
  \        // Select list is not shown, so test fails.\n        .check(webMatches(getText(),\
  \ equalTo(\"Item 3\")))\n}\n```\n\n问题在于，这个测试用例仅在最后一项检查上失败，因为 HTML `<select>`组件列表并未显示，尽管`webClick()`已发送到找到的元素。更改定位器类型在这种情况下无济于事，也没有必要，因为元素已经被找到。这导致一个事实：问题出在仅针对\
  \ HTML `<select>`元素的`webClick()`操作上。经过一番研究，发现这是一个已知问题，甚至有一个变通方法可以通过附加按钮使其工作：\n\n\
  *浏览器不允许通过纯 JavaScript 展开`<select>`，该控件只能通过鼠标直接点击来展开。`select.click()`将不起作用。但有一个解决方案。我们通过创建另一个一次显示多个选项的选择框来模拟展开的`<select>`控件，这可以通过设置`size`参数来实现。这个多选选择框将绝对定位在旧的单一选项选择框之上，并且旧的选项将通过样式的`visibility`属性隐藏。这样布局保持不变，新控件无缝显示。新控件看起来只是略有不同，但这不应该成为问题，请自行在下面的截图中查看。*\n\
  \n[`https://code.google.com/archive/p/expandselect/`](https://code.google.com/archive/p/expandselect/)\n\
  \n\n### 正文排版\n\n但有一个来自测试端的变通方法，无需在网页上引入 UI 组件。当停留在显示 WebView 的屏幕上时，我们可以在`<select>`元素获得焦点时，通过发送`ViewActions.pressKey(KeyEvent.KEYCODE_SPACE)`事件来展开它。就像通过浏览器操作一样。要将焦点移动到`<select>`元素，我们发送所需数量的\
  \ Tab 操作以导航到目标 UI 元素——`ViewActions.pressKey(KeyEvent.KEYCODE_TAB)`。不幸的是，测试需要休眠一小段时间，以便发送的操作能在\
  \ WebView 中被应用。以下是在示例应用中的实现方式。\n\n*章节 6* **.** *`WebViewTest.verifiesSelectDropDown()`**.*\n\
  \n```kotlin\n@Test\nfun verifiesSelectDropDown() {\n    openDrawer()\n    onView(allOf(withId(R.id.design_menu_item_text),\n\
  \            withText(R.string.settings_title))).perform(click())\n    onData(instanceOf(PreferenceActivity.Header::class.java))\n\
  \            .inAdapterView(withId(android.R.id.list))\n            .atPosition(3)\n\
  \            .perform(click())\n    // Send TAB keys as many times as needed to\
  \ reach the \"select\".\n    Thread.sleep(300)\n    onView(withId(R.id.web_view)).perform(pressKey(KeyEvent.KEYCODE_TAB))\n\
  \    Thread.sleep(300)\n    onView(withId(R.id.web_view)).perform(pressKey(KeyEvent.KEYCODE_TAB))\n\
  \    Thread.sleep(300)\n    onView(withId(R.id.web_view)).perform(pressKey(KeyEvent.KEYCODE_TAB))\n\
  \    Thread.sleep(300)\n    onView(withId(R.id.web_view)).perform(pressKey(KeyEvent.KEYCODE_TAB))\n\
  \    Thread.sleep(300)\n    onView(withId(R.id.web_view)).perform(pressKey(KeyEvent.KEYCODE_TAB))\n\
  \    Thread.sleep(300)\n    onView(withId(R.id.web_view)).perform(pressKey(KeyEvent.KEYCODE_TAB))\n\
  \    Thread.sleep(300)\n    // Send SPACE key to expand \"select\".\n    onView(withId(R.id.web_view)).perform(pressKey(KeyEvent.KEYCODE_SPACE))\n\
  \    /**\n     * At this point android platform popup is shown.\n     * Use Espresso\
  \ native methods to select item from the list.\n     */\n    onView(withText(\"\
  Item 3\")).click()\n    onWebView()\n    // Check that text from select list is\
  \ set into the label.\n            .withElement(findElement(Locator.ID, \"selection_result\"\
  ))\n            .check(webMatches(getText(), equalTo(\"Item 3\")))\n}\n```\n\n这个测试用例功能完整，但看起来不够优雅。通过为`ViewInteraction`添加一个额外的扩展函数，我们可以清理测试代码。\n\
  \n*测试用例 chapter6* **.** *`WebViewTest.verifiesSelectDropDown()`**.*\n\n```kotlin\n\
  /**\n * Expand function for web view test case.\n * It contains a Thread.sleep()\
  \ each time key event is sent.\n *\n * @param key - keycode from [KeyEvent]\n *\
  \ @param milliseconds - milliseconds to sleep\n * @param count - amount of times\
  \ [KeyEvent] should be executed\n */\nfun ViewInteraction.pressKeyAndSleep(key:\
  \ Int, milliseconds: Long, count: Int = 1): ViewInteraction {\n    for (i in 1..count)\
  \ {\n        /**\n         * Having Thread.sleep() in tests is a bad practice.\n\
  \         * Here we are using it just to solve specific issue and nothing more.\n\
  \         */\n        Thread.sleep(milliseconds)\n        perform(ViewActions.pressKey(key))\n\
  \    }\n    return this\n}\n```\n\n`verifiesSelectDropDown()`测试用例变得更加易读。\n\n*测试用例\
  \ chapter6* **.** *`WebViewTest.verifiesSelectDropDown()`**.*\n\n```kotlin\n@Test\n\
  fun verifiesSelectDropDown() {\n    openDrawer()\n    onView(allOf(withId(R.id.design_menu_item_text),\n\
  \            withText(R.string.settings_title))).perform(click())\n    onData(instanceOf(PreferenceActivity.Header::class.java))\n\
  \            .inAdapterView(withId(android.R.id.list))\n            .atPosition(3)\n\
  \            .perform(click())\n    onView(withId(R.id.web_view))\n            //\
  \ Send TAB keys as many times as needed to reach the \"select\".\n            .pressKeyAndSleep(KeyEvent.KEYCODE_TAB,\
  \ 500, 6)\n            // Send SPACE key to expand \"select\".\n            .perform(ViewActions.pressKey(KeyEvent.KEYCODE_SPACE))\n\
  \    /**\n     * At this point android platform popup is shown.\n     * Use Espresso\
  \ native methods to select item from the list.\n     */\n    onView(withText(\"\
  Item 3\")).click()\n    onWebView()\n            // Check that text from select\
  \ list is set into the label.\n            .withElement(findElement(Locator.ID,\
  \ \"selection_result\"))\n            .check(webMatches(getText(), equalTo(\"Item\
  \ 3\")))\n}\n```\n\n关于`<select>`下拉菜单的一点说明。它以原生平台弹出窗口的形式呈现给用户，可以通过 Espresso 方法与其进行交互，如图\
  \ 6-8 所示。\n\n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig8_HTML.jpg](img/469090_1_En_6_Fig8_HTML.jpg)\n\
  \n**Figure 6-8** HTML `<select>` 下拉选项显示在 Android WebView 客户端内部\n\n`WebViewTest.kt`类中的最后一个测试用例包含了其余`Locator`类型的使用示例。\n\
  \n*测试用例 chapter6* **.** *`WebViewTest.showsOtherLocatorsSample()`**.*\n\n```kotlin\n\
  @Test\nfun showsOtherLocatorsSample() {\n    openDrawer()\n    onView(allOf(withId(R.id.design_menu_item_text),\n\
  \            withText(R.string.settings_title))).perform(click())\n    onData(instanceOf(PreferenceActivity.Header::class.java))\n\
  \            .inAdapterView(withId(android.R.id.list))\n            .atPosition(3)\n\
  \            .perform(click())\n    onWebView()\n            // Find element by\
  \ Locator.NAME\n            .withElement(findElement(Locator.NAME, \"text_input\"\
  ))\n            .perform(webScrollIntoView())\n            // Find element by Locator.LINK_TEXT\n\
  \            .withElement(findElement(Locator.LINK_TEXT, \"Espresso Web.\"))\n \
  \           .perform(webScrollIntoView())\n            // Find element by Locator.PARTIAL_LINK_TEXT\n\
  \            .withElement(findElement(Locator.PARTIAL_LINK_TEXT, \"Espresso\"))\n\
  \            .perform(webScrollIntoView())\n            // Find element by Locator.CLASS_NAME\n\
  \            .withElement(findElement(Locator.CLASS_NAME, \"header\"))\n       \
  \     .check(webMatches(webScrollIntoView(), `is`(true)))\n}\n```\n\n这个测试用例展示了如何将`webScrollIntoView()`动作作为参数传递给`WebAssertion.webMatches()`方法。当找不到我们操作的元素时，这种方法提供了更易读的错误描述。\n\
  \n### 练习 18\n\n**编写 WebView 测试**\n\n1.  在 Web 浏览器中打开`web_form.html`页面并分析页面结构。通过\
  \ XPATH 和 CSS 选择器搜索元素。\n\n2.  更新`selectsRadioButtonWithCss()`测试，使得选中标签为“Option 2”的单选按钮。\n\
  \n3.  编写一个测试，仅通过 XPATH 查找所有元素。\n\n4.  编写一个测试，仅通过 CSS 定位器查找所有元素。\n\n## 总结\n\nEspresso-Web\
  \ 是 Espresso API 的一个很好的补充。它允许你测试包含 WebView 组件的混合应用程序。是的，它并不完美，不能用于纯粹的 Web 应用程序测试，但它以类似\
  \ Espresso 的方式很好地完成了自己的工作。\n\n## 7. 无障碍测试\n\n大多数移动应用程序的开发都基于对用户或用户类型的既定假设。在软件测试中，术语*用户画像*反映了这些用户类型，包括他们可能的使用流程以及应用程序可能如何在日常活动中帮助他们。尽管用户画像在软件开发生命周期的早期阶段就已被创建，但它们可能没有考虑残疾人群体。\n\
  全球约有 3 亿人患有视力障碍，他们借助安装在自己移动设备上的特定无障碍工具来使用移动应用程序。\n\n## Android 无障碍工具\n\nAndroid\
  \ 平台为视力障碍人士提供了三种工具类型：\n\n*   **TalkBack** — 预装的屏幕阅读器应用程序，允许用户在无需视觉访问屏幕的情况下与 Android\
  \ 应用程序进行交互。视障用户可能依赖 TalkBack 来使用你的应用。\n\n*   **BrailleBack** — 一项无障碍服务，帮助视障用户使用盲文设备。与\
  \ TalkBack 应用程序协同工作，提供组合的盲文和语音体验。\n\n*   **Voice Access** — 允许用户通过语音命令控制其 Android\
  \ 设备。Voice Access 适用于运行 Android 5.0（API 级别 21）及更高版本的设备。\n\n\n\n如你所见，`BrailleBack`\
  \ 依赖于 `TalkBack`，后者会向用户读出当前屏幕上每个可用的交互元素。为了让视觉障碍用户能够无障碍地使用 Android 应用，开发者应遵循无障碍指南。其中包括：\n\
  \n- **为 UI 元素添加标签** — 许多屏幕阅读器（如 `TalkBack`）依赖此服务来正确解释特定控件的功能。例如，对于 `ImageView` 和\
  \ `ImageButton` 这类 UI 对象，需设置 `android:contentDescription` 参数来指定其用途。对于 `EditText`\
  \ 对象，则使用 `android:hint`。\n\n- **对内容进行分组** — 正如可视 UI 被分组为易于理解的组件（如包含列表项的列表），屏幕阅读器的内容也应以逻辑方式分组。项目应作为一个整体通告（例如一个包含标题、描述和复选框状态的待办事项项），而不是作为独立元素呈现。\n\
  \n- **创建易于遵循的导航** — 应用应支持键盘导航和导航手势。避免 UI 元素在特定时间后淡出或消失。\n\n- **使触摸目标足够大** — 提供更大的触摸目标，可显著提升用户导航应用的便捷性。通常，根据指南，可聚焦项的触摸区域最小应为\
  \ `48dp x 48dp`。\n\n- **提供充分的颜色对比度** — 视力不佳或使用屏幕亮度较低设备的用户难以读取屏幕信息。通过提高应用中前景与背景颜色的对比度，用户可以更轻松地在屏幕内和屏幕间导航。\n\
  \n## 测试应用无障碍\n\n`Espresso` 测试框架支持编写自动化的无障碍测试，用于评估应用的无障碍性。要开始编写无障碍测试，请将以下依赖项添加到 `build.gradle`\
  \ 文件中。\n\n*在应用模块的 `build.gradle` 文件中添加 Android 测试支持库的无障碍依赖项。*\n\n```\nandroidTestImplementation\
  \ \"com.android.support.test.espresso:espresso-accessibility:3.0.2\"\nandroidTestImplementation\
  \ \"com.google.android.apps.common.testing.accessibility.framework:accessibility-test-framework:2.1\"\
  \n```\n\n*在应用模块的 `build.gradle` 文件中添加 AndroidX 测试库的无障碍依赖项。*\n\n```\nandroidTestImplementation\
  \ 'androidx.test.espresso:espresso-accessibility:3.1.0'\nandroidTestImplementation\
  \ \"com.google.android.apps.common.testing.accessibility.framework:accessibility-test-framework:2.1\"\
  \n```\n\n添加这些依赖项后，你需启用无障碍检查，如下例所示：\n\n```\ncompanion object {\n@BeforeClass\n@JvmStatic\n\
  fun setAccessibilityPrefs() {\nAccessibilityChecks.enable()\n}\n}\n```\n\n注意：每个测试类中\
  \ `AccessibilityChecks` 只能启用一次，否则测试将失败。因此，应在启用检查的方法上使用 `@BeforeClass` 注解。在 Kotlin\
  \ 中，带有 `@BeforeClass` 注解的方法需声明在 `class` 的伴生对象中。\n\n设置了 `AccessibilityChecks.enable()`\
  \ 后，每次在 UI 元素（包括其子元素）上调用 Espresso 的 `ViewAction` 时都会启用检查。此方法将无障碍测试限制为仅涵盖 UI 测试范围。若要在测试运行中覆盖更多\
  \ UI 元素，可设置 `setRunChecksFromRootView(true)`，从而验证整个视图层级。\n\n*`chapter7. AccessibilityTest.kt`\
  \ 类中的伴生对象。*\n\n```\n@BeforeClass\n@JvmStatic\nfun setAccessibilityPrefs() {\nAccessibilityChecks.enable().setRunChecksFromRootView(true)\n\
  }\n```\n\n遗憾的是，无法针对每个测试方法或测试类单独设置无障碍检查，也无法在测试运行后将其禁用。\n\n有时，已知的无障碍问题可能尚未解决。借助 `com.google.android.apps.common.testing.accessibility.framework`\
  \ 中实现的 `AccessibilityValidator`，你可以抑制这些问题：\n\n```\n@BeforeClass\n@JvmStatic\nfun\
  \ setAccessibilityPrefs() {\nAccessibilityChecks.enable()\n.setRunChecksFromRootView(true)\n\
  .setSuppressingResultMatcher(AccessibilityCheckResultUtils.matchesViews(\nhasSibling(withId(R.id.menu_filter))))\n\
  }\n```\n\n类似地，你也可以借助 `anyOf()` 匹配器来抑制多个无障碍问题，如下所示：\n\n```\n@BeforeClass\n@JvmStatic\n\
  fun setAccessibilityPrefs() {\nAccessibilityChecks.enable()\n.setRunChecksFromRootView(true)\n\
  .setSuppressingResultMatcher(AccessibilityCheckResultUtils.matchesViews(anyOf(\n\
  hasSibling(withId(R.id.menu_filter)),\nwithChild(withChild(withId(android.support.design.R.id.snackbar_text))))))\n\
  }\n```\n\n顺便提一下，你可能会注意到原生 Android UI 元素（如 Snackbar）存在无障碍问题。有时抑制它们并非易事。在之前的代码示例中，`withChild()`\
  \ 视图匹配器被使用了两次，以定位 Snackbar 的根布局并抑制其无障碍问题。\n\n你还可以通过向 `setThrowExceptionForErrors()`\
  \ 方法提供 `false` 值，让测试即使在存在无障碍问题时也能继续运行：\n\n```\n@BeforeClass\n@JvmStatic\nfun setAccessibilityPrefs()\
  \ {\nAccessibilityChecks.enable()\n.setRunChecksFromRootView(true)\n.setSuppressingResultMatcher(AccessibilityCheckResultUtils.matchesViews(anyOf(\n\
  hasSibling(withId(R.id.menu_filter)),\nwithChild(withChild(withId(android.support.design.R.id.snackbar_text))))))\n\
  .setThrowExceptionForErrors(false)\n}\n```\n\n在这种情况下，所有问题都将重定向到 `logcat` 日志，其中 `I`\
  \ 级别的日志为信息性日志（显示为黑色），`W` 为警告（显示为蓝色），`E` 为错误（显示为红色）。见图 7-1。\n\n![../images/469090_1_En_7_Chapter/469090_1_En_7_Fig1_HTML.jpg](img/469090_1_En_7_Fig1_HTML.jpg)\n\
  \n**图 7-1** 设置 `setThrowExceptionForErrors(false)` 时的无障碍 `logcat` 日志\n\n以下是测试失败后无障碍问题堆栈跟踪的示例：\n\
  \n```\ncom.google.android.apps.common.testing.accessibility.framework.integrations.AccessibilityViewCheckException:\
  \ There was 1 accessibility error:\nOverflowMenuButton{id=-1, desc=More options,\
  \ visibility=VISIBLE, width=105, height=126, has-focus=false, has-focusable=false,\
  \ has-window-focus=false, is-clickable=true, is-enabled=true, is-focused=false,\
  \ is-focusable=true, is-layout-requested=false, is-selected=false, layout-params=android.support.v7.widget.ActionMenuView$LayoutParams@48cbb74,\
  \ tag=null, root-is-layout-requested=true, has-input-connection=false, x=127.0,\
  \ y=10.0}: View falls below the minimum recommended size for touch targets. Minimum\
  \ touch target width is 48dp. Actual width is 40dp.\nat com.google.android.apps.common.testing.accessibility.framework.integrations.espresso.AccessibilityValidator.processResults(AccessibilityValidator.java:187)...\n\
  ```\n\n你可能注意到，两种情况下的头部部分是完全相同的。除了自动化的无障碍测试，Google 开发者还提供了使用 Accessibility Scanner\
  \ 应用（[`https://play.google.com/store/apps/details?id=com.google.android.apps.accessibility.auditor`](https://play.google.com/store/apps/details%253Fid%253Dcom.google.android.apps.accessibility.auditor)）进行手动测试的可能性。该应用允许你检查无障碍问题的类型，并基于可视化表示更好地理解\
  \ Espresso 无障碍测试报告或 `logcat` 日志中显示的错误。\n\n图 7-2 展示了无障碍扫描器的设置过程。\n\n![../images/469090_1_En_7_Chapter/469090_1_En_7_Fig2_HTML.jpg](img/469090_1_En_7_Fig2_HTML.jpg)\n\
  \n**图 7-2** 开始使用无障碍扫描器流程\n\n\n\n### 图 7-3：创建任务视图中的无障碍问题\n\n图 7-3 展示了示例待办事项应用中存在无障碍问题的几个无障碍分析实例。\n\
  \n![../images/469090_1_En_7_Chapter/469090_1_En_7_Fig3_HTML.jpg](img/469090_1_En_7_Fig3_HTML.jpg)\n\
  \n**图 7-3** 创建任务视图中的无障碍问题\n\n## 练习 19：执行无障碍测试\n\n1. 安装无障碍扫描器应用并启用无障碍检查。启动示例待办事项应用，对整个应用执行无障碍检查。观察问题类型。\n\
  2. 仅使用 `AccessibilityChecks.enable()` 选项，从 `AccessibilityTest.kt` 类中运行测试。观察测试结果。\n\
  3. 使用 `setRunChecksFromRootView(true)` 选项，从 `AccessibilityTest.kt` 类中运行测试。观察测试结果。\n\
  4. 如 `AccessibilityTest.kt` 类的 `setAccessibilityPrefs()` 方法所示，抑制某些无障碍失败问题，然后再次运行测试。观察测试结果。\n\
  5. 添加 `setThrowExceptionForErrors(false)` 参数并运行测试。观察测试结果和设备 `logcat` 日志。\n\n## 总结\n\
  \n遗憾的是，无障碍测试常常被忽视，人们主要关注功能测试。乍一看可能不清晰，但良好的无障碍支持同样重要。其主要目标是使视障人士能够使用应用，但它也有不错的外溢效果——它能让你的应用更易于测试，并帮助你理解不同的应用使用场景。它甚至可能让你的应用在\
  \ Google PlayStore 上获得更高评分，因为 Android 爬行算法可能会从无障碍角度分析应用，并优先推荐那些具有良好无障碍支持的应用。\n\n\
  # 8. Espresso 与 UI Automator：完美组合\n\nEspresso 是一个完美且快速的测试自动化框架，但它有一个重要的限制——我们只允许在测试应用的上下文内进行操作。这意味着无法针对以下使用场景自动化测试：\n\
  \n- 点击应用推送通知\n- 访问系统设置\n- 从另一个应用导航到正在测试的应用，反之亦然\n\n这种限制的原因在于 Android 测试工具（Instrumentation）的特性。由于在\
  \ Espresso 测试运行期间，被测试应用和测试应用进程被生成，我们不允许与移动设备上安装的其他应用进行交互，例如通知栏、相机或系统设置应用。但可以使用 UI\
  \ Automator 来访问它们。UI 测试框架适用于跨应用的功能性 UI 测试。\n\n> **注意**  \n> UI Automator 测试框架支持\
  \ Android 4.3（API 级别 18）及更高版本。\n\n## UI Automator 的主要特性\n\nUI Automator 的主要特性包括以下内容：\n\
  \n- 一个用于检查布局层次结构的 `uiautomatorviewer`。从 Android Studio 2.3 开始，它已被监视器工具取代。\n- 一个用于检索设备状态信息并对其执行操作的\
  \ API。示例包括按下设备主页或返回按钮、更改设备旋转方向、打开通知和截取屏幕截图。\n- 支持跨应用 UI 测试的 API。\n\n我们将稍微关注一下 UI\
  \ Automator 的 API：\n\n- **By**——`By` 是一个实用类，允许以简洁的方式创建 `BySelector`。其主要功能是使用简化的语法提供用于构造\
  \ `BySelector` 的静态工厂方法。例如，你会使用 `findObject(By.text(\"foo\"))` 而不是 `findObject(new\
  \ BySelector().text(\"foo\"))` 来选择文本值为 `\"foo\"` 的 UI 元素。\n- **BySelector**——`BySelector`\
  \ 在调用 `findObject(BySelector)` 期间指定匹配 UI 元素的标准。\n- **Configurator**——允许你设置运行 UI\
  \ Automator 测试的关键参数。新设置会立即生效，并且可以在测试运行期间的任何时间更改。\n- **UiCollection**——用于枚举容器中的 UI\
  \ 元素，以便根据子元素的文本或描述来计数或定位子元素。\n- **UiObject**——`UiObject` 是视图的一种表示形式。它不会以对象引用的方式直接绑定到任何视图。`UiObject`\
  \ 包含有助于在运行时根据其构造函数中指定的 [`UiSelector`](https://developer.android.com/reference/android/support/test/uiautomator/UiSelector.html)\
  \ 属性来定位匹配视图的信息。创建 `UiObject` 的实例后，它可以重新用于匹配选择器标准的不同视图。\n- **UiObject2**——`UiObject2`\
  \ 表示一个 UI 元素。与 `UiObject` 不同，它绑定到特定的视图实例，并且如果底层视图对象被销毁，可能会变得过时。因此，如果 UI 发生显著变化，可能需要调用\
  \ `findObject(BySelector)` 来获取新的 `UiObject2` 实例。\n- **UiScrollable**——`UiScrollable`\
  \ 是一个 [`UiCollection`](https://developer.android.com/reference/android/support/test/uiautomator/UiCollection.html)，并提供对可滚动布局元素中项目搜索的支持。此类可用于水平或垂直可滚动的控件。\n\
  - **UiSelector**——指定测试目标在布局层次结构中的元素，通过文本值、内容描述、类名和状态信息等属性进行过滤。你还可以根据元素在布局层次结构中的位置来定位元素。\n\
  \n除了这个 API 列表之外，我们还应该熟悉以下框架类：\n\n- **Until**——`Until` 类提供了用于构造常见条件的工厂方法。\n\n> **注意**\
  \  \n> UI Automator 测试框架是一个基于 Instrumentation 的 API，并与 `AndroidJUnitRunner` 测试运行器配合使用。这一事实允许我们在同一个测试中将\
  \ Espresso 与 UI Automator 代码一起使用。\n\n## 开始使用 UI Automator\n\n要开始使用 UI Automator，我们首先应在\
  \ `build.gradle` 文件中设置依赖项，如下所示。\n\n**`build.gradle` 文件中的 UI Automator Android 测试支持库依赖项：**\n\
  \n```groovy\nandroidTestImplementation 'com.android.support.test.uiautomator:uiautomator-v18:2.1.3'\n\
  ```\n\n并且还需要设置 AndroidX 测试库依赖项。\n\n**`build.gradle` 文件中的 UI Automator AndroidX 测试库依赖项：**\n\
  \n```groovy\nandroidTestImplementation 'androidx.test.uiautomator:uiautomator:2.2.0'\n\
  ```\n\n让我们从我们已经熟悉的 Espresso 角度来分析 UI Automator，并试图弄清楚它们有多不同。我们还将考虑 UI Automator\
  \ 的优势和劣势：\n\n- **处理应用转场：**\n  - Espresso——自动处理窗口转场。\n  - UI Automator——不支持自动窗口转场，即在活动或片段之间切换。你应该显式地使用等待。\n\
  \n- **定位 UI 元素：**\n  - Espresso——使用核心的 Espresso `onView()` 和 `onData()` 方法，配合视图匹配器或数据匹配器来定位\
  \ UI 元素。\n  - UI Automator——与 Espresso 类似，UI Automator 有自己的核心 `UiDevice` 类。它包含诸如\
  \ `hasObject(BySelector)`、`findObject(BySelector)` 和 `findObjects(BySelector)` 之类的方法，用于搜索元素或检查其在应用\
  \ UI 中的存在情况。\n\n- **等待机制：**\n  - Espresso——`IdlingResource` 和第三方 `ConditionWatcher`\
  \ 类可用作等待机制，包括网络相关等待和元素存在等待。两种等待器都应根据每个具体情况进行实现。\n\n\n\n- **UI Automator**——与 Espresso\
  \ 不同，UI Automator 在 `UiDevice` 类中定义了 `wait()` 和 `performActionAndWait()` 方法。通过提供自定义的\
  \ `SearchCondition` 或 `EventCondition` 参数，可以轻松调整等待逻辑。\n\n- **UI/视图操作**：\n\n  - **Espresso**——支持多种视图操作，并允许定义自定义操作。但它只能与正在测试的应用进行交互。\n\
  \  - **UI Automator**——如前所述，UI Automator 可以与设备上的任何应用进行交互，但可执行的操作范围非常有限。\n\n- **设备控制**：\n\
  \n  - **Espresso**——不支持。\n  - **UI Automator**——提供了大量的设备控制方法，从设备主页键点击到方向控制，一应俱全。\n\
  \n- **报告**：\n\n  - **Espresso**——支持更丰富的测试失败报告，便于分析测试失败原因。\n  - **UI Automator**——失败时通常返回非描述性的堆栈跟踪，需要分析才能了解问题所在。\n\
  \n基于这些差异，可以发现两者结合形成了一套非常强大的功能集，几乎涵盖了 Android 测试自动化的所有需求。\n\n为了更容易理解 UI Automator\
  \ 框架，我们可以用动词来描述其功能：\n\n- `UiDevice().find`——展示 UI Automator 的查找方法。\n\n  ![../images/469090_1_En_8_Chapter/469090_1_En_8_Figa_HTML.jpg](img/469090_1_En_8_Figa_HTML.jpg)\n\
  \n- `UiDevice().act`——整合所有可对设备执行的操作，从按下返回键到执行 shell 命令。\n\n  ![../images/469090_1_En_8_Chapter/469090_1_En_8_Figb_HTML.jpg](img/469090_1_En_8_Figb_HTML.jpg)\n\
  \n- `UiDevice().wait`——等待某个条件满足。\n\n  ![../images/469090_1_En_8_Chapter/469090_1_En_8_Figc_HTML.jpg](img/469090_1_En_8_Figc_HTML.jpg)\n\
  \n- `UiDevice().watch`——表示一组用于创建和控制条件观察器的方法。\n\n  ![../images/469090_1_En_8_Chapter/469090_1_En_8_Figd_HTML.jpg](img/469090_1_En_8_Figd_HTML.jpg)\n\
  \n- `UiDevice().get`——获取设备或应用参数。\n\n  ![../images/469090_1_En_8_Chapter/469090_1_En_8_Fige_HTML.jpg](img/469090_1_En_8_Fige_HTML.jpg)\n\
  \n- `UiDevice().set`——启用或禁用布局层次压缩。\n\n  ![../images/469090_1_En_8_Chapter/469090_1_En_8_Figf_HTML.jpg](img/469090_1_En_8_Figf_HTML.jpg)\n\
  \n在接下来的章节中，我们将看到当 Android 的 Espresso 无法处理问题时，大多数 `UiDevice` 方法是如何被使用的。\n\n## 查找并操作\
  \ UI 元素\n\nUI Automator 的主要功能是定位 UI 元素并对其执行操作。如果讨论 UI Automator 与 Espresso 的结合使用，那么它可以用于在第三方应用或系统应用中导航、截屏，或者执行\
  \ shell 命令等。但当然，UI Automator 也可以作为独立的测试自动化框架使用。\n\n如前所述，UI 元素搜索是通过 `findObject()`\
  \ 和 `findObjects()` 方法完成的。`findObject()` 方法将以下类的实例作为参数，这些参数指定了在层级结构中匹配 UI 元素的条件：\n\
  \n- `UiSelector()`\n- `BySelector()`\n\n它们之间的概念性区别在于每个选择器指定的搜索条件的应用方式不同。为了理解这一点，我们首先来看\
  \ `UiSelector` 的示例测试，这些测试实现在 `UiAutomatorUiSelectorTest.kt` 测试类中。\n\n*chapter8*\
  \ *.UiAutomatorUiSelectorTest.uiSelectorSample()*。\n\n```kotlin\nprivate val instrumentation\
  \ = InstrumentationRegistry.getInstrumentation()\nprivate val uiDevice: UiDevice\
  \ = UiDevice.getInstance(instrumentation)\nprivate val fourSecondsTimeout = 4000L\n\
  \n@get:Rule\nvar activityTestRule = ActivityTestRule(TasksActivity::class.java)\n\
  \n/**\n* 创建两个待办事项，将第一个标记为已完成，并验证其文本。\n*/\n@Test\nfun uiSelectorSample() {\n    //\
  \ 添加第一个待办事项。\n    uiDevice.findObject(\n        UiSelector().resourceId(\n     \
  \       \"com.example.android.architecture.blueprints.todoapp.mock:id/fab_add_task\"\
  ))\n        .click()\n    uiDevice.findObject(UiSelector().resourceId(\n       \
  \ \"com.example.android.architecture.blueprints.todoapp.mock:id/add_task_title\"\
  ))\n        .text = \"item 1\"\n    uiDevice.findObject(UiSelector().resourceId(\n\
  \        \"com.example.android.architecture.blueprints.todoapp.mock:id/fab_edit_task_done\"\
  ))\n        .click()\n    uiDevice.findObject(UiSelector().text(\"TO-DO saved\"\
  )).waitUntilGone(fourSecondsTimeout)\n\n    // 添加第二个待办事项。\n    uiDevice.findObject(UiSelector().resourceId(\n\
  \        \"com.example.android.architecture.blueprints.todoapp.mock:id/fab_add_task\"\
  ))\n        .click()\n    uiDevice.findObject(UiSelector().resourceId(\n       \
  \ \"com.example.android.architecture.blueprints.todoapp.mock:id/add_task_title\"\
  ))\n        .text = \"item 2\"\n    uiDevice.findObject(UiSelector().resourceId(\n\
  \        \"com.example.android.architecture.blueprints.todoapp.mock:id/fab_edit_task_done\"\
  ))\n        .click()\n    uiDevice.findObject(UiSelector().text(\"TO-DO saved\"\
  )).waitUntilGone(fourSecondsTimeout)\n\n    // 将第一个待办事项标记为已完成，点击它并验证文本。\n    uiDevice.findObject(UiSelector().className(RecyclerView::class.java.name)\n\
  \        .childSelector(UiSelector().checkable(true)))\n        .click()\n    uiDevice.findObject(UiSelector().className(RecyclerView::class.java.name)\n\
  \        .childSelector(UiSelector().className(LinearLayout::class.java)).instance(0))\n\
  \        .click()\n\n    val detailViewTitle = uiDevice.findObject(UiSelector().resourceId(\n\
  \        \"com.example.android.architecture.blueprints.todoapp.mock:id/task_detail_title\"\
  ))\n    assertTrue(\"未显示待办事项\\\"item 1\\\"。\", detailViewTitle.exists())\n    assertTrue(\"\
  未显示待办事项\\\"item 1\\\"。\", detailViewTitle.text.equals(\"item 1\"))\n}\n```\n\n如你所见，UI\
  \ Automator 测试包含一个 `ActivityTestRule` 规则来启动应用的主 `TasksActivity`。之后，UI Automator\
  \ 代码接管测试执行并执行 UI 交互。所有 `resourceId` 值都是在转储应用布局后从 `monitor` 工具中获取的。另外请注意，由于每个测试步骤都调用了\
  \ `uiDevice.findObject(UiSelector)` 方法，测试代码的可读性较差。但有一个简单的解决方法——由于 `uiDevice.findObject(UiSelector)`\
  \ 返回一个在运行时定位匹配视图的 `UiObject` 实例，因此可以提前声明它，并在后续步骤中重复用于匹配选择条件的其他视图。简化后的测试方法如下所示。\n\
  \n*chapter8* *. UiAutomatorUiSelectorTest.uiSelectorSampleSimplified()* *。\n\n\n\
  \n```kotlin\n/**\n* 展示了如何通过预先声明 UiObject 元素来简化 interactsWithToDoInRecyclerViewUiSelector()\
  \ 测试。\n*/\n@Test\nfun uiSelectorSampleSimplified() {\n// 声明稍后在测试中会使用的 UiObject 实例。\n\
  val fabAddTask = uiDevice.findObject(UiSelector().resourceId(\n\"com.example.android.architecture.blueprints.todoapp.mock:id/fab_add_task\"\
  ))\nval taskTitle = uiDevice.findObject(UiSelector().resourceId(\n\"com.example.android.architecture.blueprints.todoapp.mock:id/add_task_title\"\
  ))\nval fabDone = uiDevice.findObject(UiSelector().resourceId(\n\"com.example.android.architecture.blueprints.todoapp.mock:id/fab_edit_task_done\"\
  ))\nval todoSavedText = uiDevice.findObject(UiSelector().text(\"TO-DO saved\"))\n\
  val taskDetailsTitle = uiDevice.findObject(UiSelector().resourceId(\n\"com.example.android.architecture.blueprints.todoapp.mock:id/task_detail_title\"\
  ))\nval firstTodoCheckbox = uiDevice.findObject(UiSelector()\n.className(RecyclerView::class.java.name)\n\
  .childSelector(UiSelector().checkable(true)).instance(0))\nval firstTodoItem = uiDevice.findObject(UiSelector().className(RecyclerView::class.java.name)\n\
  .childSelector(UiSelector().className(LinearLayout::class.java)).instance(0))\n\
  // 添加第一个待办事项。\nfabAddTask.click()\ntaskTitle.text = \"item 1\"\nfabDone.click()\n\
  todoSavedText.waitUntilGone(fourSecondsTimeout)\n// 添加第二个待办事项。\nfabAddTask.click()\n\
  taskTitle.text = \"item 2\"\nfabDone.click()\ntodoSavedText.waitUntilGone(fourSecondsTimeout)\n\
  // 将第一个待办事项标记为已完成，点击并验证其文本。\nfirstTodoCheckbox.click()\nfirstTodoItem.click()\n\
  assertTrue(\"未显示待办事项“item 1”。\", taskDetailsTitle.exists())\nassertTrue(\"待办事项“item\
  \ 1”标题错误。\", taskDetailsTitle.text.equals(\"item 1\"))\n}\n```\n\n此测试方法看起来更美观且更具可读性。其附带好处是，你获得了易于维护的代码；因此，当诸如`id`或`class`等元素属性发生更改时，只需在声明中更新一次即可，而无需在整个测试代码中逐一修改。\n\
  \n接下来，我们看看在 `UiAutomatorBySelectorTest.kt` 类中实现的 `BySelector` 测试示例。`bySelectorSample()`\
  \ 测试演示了如何使用 `BySelector` 和 `UiObject2`，来测试在 `UiAutomatorUiSelectorTest.kt` 类中实现自动化测试的同一个场景。\n\
  \n*chapter8* *.UiAutomatorBySelectorTest.bySelectorSample().*\n\n```kotlin\nprivate\
  \ val instrumentation = InstrumentationRegistry.getInstrumentation()\nprivate val\
  \ uiDevice: UiDevice = UiDevice.getInstance(instrumentation)\nprivate val twoSeconds\
  \ = 2000L\nprivate val fourSeconds = 4000L\nprivate val applicationPackage = \"\
  com.example.android.architecture.blueprints.todoapp.mock\"\n@get:Rule\nvar activityTestRule\
  \ = ActivityTestRule(TasksActivity::class.java)\n/**\n* 创建两个待办事项，将第一个标记为已完成，并验证其文本。\n\
  */\n@Test\nfun bySelectorSample() {\n// 添加第一个待办事项。\nuiDevice.wait(\nUntil.findObject(By.res(applicationPackage,\
  \ \"fab_add_task\")), twoSeconds)\n.clickAndWait(Until.newWindow(), twoSeconds)\n\
  uiDevice.findObject(By.res(applicationPackage, \"add_task_title\")).text = \"item\
  \ 1\"\nuiDevice.findObject(By.res(applicationPackage, \"fab_edit_task_done\"))\n\
  .clickAndWait(Until.newWindow(), twoSeconds)\nuiDevice.wait(Until.gone(By.text(\"\
  TO-DO saved\")), fourSeconds)\n// 添加第二个待办事项。\nuiDevice.wait(Until.findObject(By.res(applicationPackage,\
  \ \"fab_add_task\")), twoSeconds)\n.clickAndWait(Until.newWindow(), twoSeconds)\n\
  uiDevice.findObject(By.res(applicationPackage, \"add_task_title\")).text = \"item\
  \ 2\"\nuiDevice.findObject(By.res(applicationPackage, \"fab_edit_task_done\"))\n\
  .clickAndWait(Until.newWindow(), twoSeconds)\nuiDevice.wait(Until.gone(By.text(\"\
  TO-DO saved\")), fourSeconds)\n// 将第一个待办事项标记为已完成，点击并验证其文本。\nval todoList = uiDevice.findObject(By.clazz(RecyclerView::class.java))\n\
  todoList.children[0]\n.findObject(By.checkable(true))\n.click()\ntodoList.children[0]\n\
  .click()\nassertTrue(\"未显示待办事项“item 1”。\", uiDevice.hasObject(By.text(\"item 1\"\
  )))\n}\n```\n\n使用 `BySelector` 的测试代码起初可能看起来更易读，但有一个缺点——`BySelector()` 是在调用 `UiDevice.findObject(BySelector)`\
  \ 时才应用并执行的，这降低了测试代码编写的灵活性。这意味着以下行不能在测试方法开始时声明为变量并在之后复用。\n\n*chapter8* *.UiAutomatorBySelectorTest.bySelectorSample():\
  \ 点击“添加任务”浮动按钮。*\n\n```kotlin\nuiDevice.findObject(By.res(applicationPackage, \"\
  fab_edit_task_done\")).click()\n```\n\n我们仍然可以做的，是像下面这样提取选择器本身。\n\n*chapter8* *.UiAutomatorBySelectorTest.bySelectorSample():\
  \ 查找并点击“完成”浮动按钮。*\n\n```kotlin\nval fabDone = By.res(applicationPackage, \"fab_edit_task_done\"\
  )\nuiDevice.findObject(fabDone).click()\n```\n\n测试方法可能的改进如下代码所示。\n\n*chapter8* *.UiAutomatorBySelectorTest.bySelectorSampleWithFindObjects()*\
  \ *.*\n\n```kotlin\n@Test\nfun bySelectorSampleWithFindObjects() {\nval fabAddTask\
  \ = By.res(applicationPackage, \"fab_add_task\")\nval taskTitle = By.res(applicationPackage,\
  \ \"add_task_title\")\nval fabDone = By.res(applicationPackage, \"fab_edit_task_done\"\
  )\nval todoSavedText = By.text(\"TO-DO saved\")\nval checkBox = By.checkable(true)\n\
  val toDoRecyclerView = By.clazz(RecyclerView::class.java)\n// 添加第一个待办事项。\nuiDevice.waitForWindowUpdate(uiDevice.currentPackageName,\
  \ twoSeconds)\nuiDevice.wait(Until.findObject(fabAddTask), twoSeconds)\n.clickAndWait(Until.newWindow(),\
  \ twoSeconds)\nuiDevice.findObject(taskTitle).text = \"item 1\"\nuiDevice.findObject(fabDone)\n\
  .clickAndWait(Until.newWindow(), twoSeconds)\nuiDevice.wait(Until.gone(todoSavedText),\
  \ fourSeconds)\n// 添加第二个待办事项。\nuiDevice.wait(Until.findObject(fabAddTask), twoSeconds)\n\
  .clickAndWait(Until.newWindow(), twoSeconds)\nuiDevice.findObject(taskTitle).text\
  \ = \"item 2\"\nuiDevice.findObject(fabDone)\n.clickAndWait(Until.newWindow(), twoSeconds)\n\
  uiDevice.wait(Until.gone(todoSavedText), fourSeconds)\n// 将第一个待办事项标记为已完成，点击并验证其文本。演示了\
  \ findObjects() 方法的使用。\nval todoListItems = uiDevice.findObjects(toDoRecyclerView)\n\
  todoListItems[0].findObject(checkBox).click()\ntodoListItems[0].click()\nassertTrue(\"\
  未显示待办事项“item 1”。\", uiDevice.hasObject(By.text(\"item 1\")))\n}\n```\n\n\n## 等待\
  \ UI 元素\n\n最后一种方法也有一个`findObjects(BySelector)`示例。在我们的具体案例中，我们使用此方法获取待办事项列表，然后根据列表中的位置遍历其项目。关于使用\
  \ UI Automator 查找和操作元素，这些内容应该就够了。当然，我们并未涵盖所有可能的搜索条件和操作，但我们讨论的示例应该能为您后续学习奠定良好基础。\n\
  \n在像 UI Automator 这样的测试框架中——自动化测试需要与多个应用交互，且我们无法完全控制网络请求执行、应用切换或动画——拥有合理的等待机制至关重要，这能帮助我们编写更可靠的测试代码。\n\
  \nUI Automator 的等待机制分为三种类型：\n\n-   **等待** `EventCondition`——此条件依赖于某个事件或一系列事件的发生。\n\
  -   **等待** `SearchCondition`——此条件通过搜索 UI 元素来满足。\n-   **等待** `UiObject2Condition`——此条件在`UiObject2`处于特定状态时得到满足。\n\
  \n所有这些条件都在 Android Testing Support 库中的`android.support.test.uiautomator.Until.java`类或\
  \ AndroidX Test 库中的`androidx.test.uiautomator`内实现。前一节包含了一些等待示例，您可能已经注意到了。等待`EventCondition`用于以下代码行，负责查找“添加任务”浮动操作按钮、点击它，然后等待新窗口呈现给用户。\n\
  \n`chapter8.UiAutomatorUiWatcherTest.kt`：实例化`UiWatcher`对象。\n\n```\nuiDevice.wait(\n\
  Until.findObject(By.res(applicationPackage, \"fab_add_task\")), twoSeconds)\n.clickAndWait(Until.newWindow(),\
  \ twoSeconds)\n```\n\n这里，`EventCondition`是从当前窗口切换到新窗口的变化。它仅作为参数用于`clickAndWait(EventCondition,\
  \ Timeout)`方法。以下是`EventConditions`：\n\n-   `newWindow()`——返回一个依赖于新窗口出现的条件。\n-  \
  \ `scrollFinished()`——返回一个条件，该条件依赖于滚动在给定方向到达末尾的情况。\n\n`SearchCondition`负责定位布局中的元素，代表了第二组等待机制：\n\
  \n-   `gone()`——返回一个`SearchCondition`，当找不到与选择器匹配的元素时满足。\n-   `hasObject()`——返回一个`SearchCondition`，当至少找到一个与选择器匹配的元素时满足。\n\
  -   `findObject()`——返回一个`SearchCondition`，当至少找到一个与选择器匹配的元素时满足。该条件将返回第一个匹配的元素。\n\
  -   `findObjects()`——返回一个`SearchCondition`，当至少找到一个与选择器匹配的元素时满足。该条件将返回所有匹配的元素。\n\n\
  在创建待办事项流程中等待包含“TO-DO saved”文本的 Snackbar 消失时，我们已经使用了`gone()`方法，如下所示：\n\n```\nuiDevice.wait(Until.gone(By.text(\"\
  TO-DO saved\"), twoSeconds)\n```\n\n以下是`hasObject()`的一个示例：\n\n```\nuiDevice.wait(Until.hasObject(By.text(\"\
  TO-DO saved\"), twoSeconds)\n```\n\n最后一种是`UiObject2Condition`。它等待特定的 UI 对象状态或属性：\n\
  \n-   `checkable()`——返回一个依赖于`UiObject2`可选状态的**条件**。\n-   `checked()`——返回一个依赖于`UiObject2`选中状态的**条件**。\n\
  -   `clickable()`——返回一个依赖于`UiObject2`可点击状态的**条件**。\n-   `enabled()`——返回一个依赖于`UiObject2`启用状态的**条件**。\n\
  -   `focusable()`——返回一个依赖于`UiObject2`可获得焦点状态的**条件**。\n-   `focused()`——返回一个依赖于`UiObject2`的焦点状态的**条件**。\n\
  -   `longClickable()`——返回一个依赖于`UiObject2`的可长按状态的**条件**。\n-   `scrollable()`——返回一个依赖于`UiObject2`的可滚动状态的**条件**。\n\
  -   `selected()`——返回一个依赖于`UiObject2`的选中状态的**条件**。\n-   `descMatches()`——返回一个条件，当对象的内容描述与给定的正则表达式匹配时满足。\n\
  -   `descEquals()`——返回一个条件，当对象的内容描述与给定的字符串完全匹配时满足。\n-   `descContains()`——返回一个条件，当对象的内容描述包含给定的字符串时满足。\n\
  -   `descStartsWith()`——返回一个条件，当对象的内容描述以给定的字符串开头时满足。\n-   `descEndsWith()`——返回一个条件，当对象的内容描述以给定的字符串结尾时满足。\n\
  -   `textMatches()`——返回一个条件，当对象的文本值匹配给定的正则表达式时满足。\n-   `textNotEquals()`——返回一个条件，当对象的文本值与给定的字符串不匹配时满足。\n\
  -   `textEquals()`——返回一个条件，当对象的文本值与给定的字符串完全匹配时满足。\n-   `textContains()`——返回一个条件，当对象的文本值包含给定的字符串时满足。\n\
  -   `textStartsWith()`——返回一个条件，当对象的文本值以给定的字符串开头时满足。\n-   `textEndsWith()`——返回一个条件，当对象的文本值以给定的字符串结尾时满足。\n\
  \n这个列表足够长，涵盖了大多数常用的元素属性。它们类似于我们已经熟悉的 Espresso 的`ViewMatchers`。等待`UiObject2Condition`可以通过以下代码行演示，该代码在待办事项\
  \ RecyclerView 列表中搜索第一个元素，在其中定位复选框元素，并等待它被选中。\n\n**等待 `UiObject2Condition` 示例：**\n\
  \n```\nuiDevice.findObject(By.clazz(RecyclerView::class.java)).children[0]\n.findObject(By.clickable(true))\n\
  .wait(Until.checked(true), twoSeconds)\n```\n\n考虑到我们目前所涵盖的内容，我们可以承认 UI Automator\
  \ 是一个强大的测试框架，可以作为一个独立的测试自动化工具使用。但是，等等，我们还没有释放它的全部力量。让我们进入下一节，看看它为我们准备了什么。\n\n##\
  \ 监视条件\n\nUI Automator 还有一个不太广为人知的功能，可以为您的自动化测试增值。`UiWatcher`类表示目标被测设备上的条件观察器。它只包含一个方法：\n\
  \n-   `checkForCondition()`——当测试框架无法使用`UiSelector`找到匹配项时自动调用的自定义处理器。\n\n\n\n`checkForCondition()`方法会在\
  \ UI Automator 框架匹配`UiSelector`且无法根据选择器中指定的条件匹配到任何元素时自动调用。此时，回调会在预定时间内重试，等待显示屏更新并显示所需的小部件。当框架处于此状态时，它会调用已注册监视器的`checkForCondition()`。这使已注册的监视器有机会查看屏幕，检查是否存在可处理的识别条件。这样做可以使当前测试继续进行。\n\
  \n`UiWatcher`可能适用的场景包括处理一次性弹窗，例如低电量对话框、应用反馈对话框、广告以及第三方应用的权限授予。这种方法的优点在于，`UiWatcher`不应成为测试方法的一部分，而可以在每个测试类或每个测试包中注册一次，并仅在需要时触发。\n\
  \n为了控制`UiWatcher`的状态，`UiDevice`类中有一系列方法：\n\n*   `registerWatcher()` — 注册一个`UiWatcher`，当测试框架无法通过`UiSelector`找到匹配项时自动运行。\n\
  *   `removeWatcher()` — 移除一个先前注册的`UiWatcher`。\n*   `resetWatcherTriggers()` — 重置已触发的`UiWatcher`。如果`UiWatcher`运行且其`checkForCondition()`调用返回`true`，则该`UiWatcher`被视为已触发。\n\
  *   `runWatchers()` — 此方法强制所有已注册的监视器运行。\n\n例如，待办事项应用的“统计”屏幕会显示一个必须关闭的对话框。打开`UiAutomatorUiWatcherTest.kt`类查看详情。\n\
  \n`chapter8.UiAutomatorUiWatcherTest.kt`\n\n```\n@RunWith(AndroidJUnit4::class)\n\
  class UiAutomatorUiWatcherTest {\n@get:Rule\nvar activityTestRule = ActivityTestRule(TasksActivity::class.java)\n\
  @Before\n// Register dialog watcher.\nfun before() = registerStatisticsDialogWatcher()\n\
  @After\nfun after() = uiDevice.removeWatcher(\"StatisticsDialog\")\n@Test\nfun dismissesStatisticsDialogUsingWatcher()\
  \ {\nval toolbar =\n\"com.example.android.architecture.blueprints.todoapp.mock:id/toolbar\"\
  \nval menuDrawer =\n\"com.example.android.architecture.blueprints.todoapp.mock:id/design_navigation_view\"\
  \n// Open menu drawer.\nuiDevice.findObject(\nUiSelector().resourceId(toolbar))\n\
  .getChild(UiSelector().className(ImageButton::class.java.name))\n.click()\n// Open\
  \ Statistics section.\nuiDevice.findObject(\nUiSelector()\n.resourceId(menuDrawer)\n\
  .childSelector(\nUiSelector()\n.className(LinearLayoutCompat::class.java.name).instance(1)))\n\
  .click()\n/**\n* Locate Statistics label based on the view id.\n* At this moment\
  \ watcher kicks in and dismissed dialog by clicking on OK button.\n*/\nval statistics:\
  \ UiObject = uiDevice.findObject(UiSelector()\n.resourceId(\"com.example.android.architecture.blueprints.todoapp.mock:id/statistics\"\
  ))\n// Assert expected text is shown.\nassertTrue(\"Expected statistics label: \\\
  \"You have no tasks.\\\" but got: ${statistics.text}\",\nstatistics.text == \"You\
  \ have no tasks.\")\n}\n/**\n* Register Statistics dialog watcher that will monitor\
  \ dialog presence.\n* Dialog will be dismissed when appeared by clicking on OK button.\n\
  */\nprivate fun registerStatisticsDialogWatcher() {\nuiDevice.registerWatcher(\"\
  StatisticsDialog\", statisticsDialogWatcher)\n// Run registered watcher.\nuiDevice.runWatchers()\n\
  }\n/**\n* Remove previously registered Statistics dialog.\n*/\nprivate fun removeStatisticsDialogWatcher()\
  \ {\nuiDevice.removeWatcher(\"StatisticsDialog\")\n}\ncompanion object {\nprivate\
  \ val instrumentation = InstrumentationRegistry.getInstrumentation()\nprivate val\
  \ uiDevice: UiDevice = UiDevice.getInstance(instrumentation)\nval statisticsDialogWatcher\
  \ = UiWatcher {\nval okDialogButton = uiDevice.findObject(By.res(\"android:id/button1\"\
  ))\nif (null != okDialogButton) {\nokDialogButton.click()\nreturn@UiWatcher true\n\
  }\nfalse\n}\n}\n}\n```\n\n分解来看，首先创建`UiWatcher`实例。\n\n`chapter8.UiAutomatorUiWatcherTest.kt`：实例化`UiWatcher`对象。\n\
  \n```\ncompanion object {\nprivate val instrumentation = InstrumentationRegistry.getInstrumentation()\n\
  private val uiDevice: UiDevice = UiDevice.getInstance(instrumentation)\nval statisticsDialogWatcher\
  \ = UiWatcher {\nval okButton = uiDevice.findObject(By.res(\"android:id/button1\"\
  ))\nif (null != okButton) {\nokButton.click()\nreturn@UiWatcher true\n}\nfalse\n\
  }\n```\n\n然后，在每次测试运行前执行的`setUp()`方法中，我们调用`registerStatisticsDialogWatcher()`来注册并运行监视器。\n\
  \n`chapter8.UiAutomatorUiWatcherTest.kt`：注册并运行`UiWatcher`。\n\n```\n@Before\n// Register\
  \ dialog watcher.\nfun before() = registerStatisticsDialogWatcher()\n/**\n* Register\
  \ Statistics dialog watcher that will monitor dialog presence.\n* Dialog will be\
  \ dismissed when appeared by clicking on OK button.\n*/\nprivate fun registerStatisticsDialogWatcher()\
  \ {\nuiDevice.registerWatcher(\"StatisticsDialog\", statisticsDialogWatcher)\n//\
  \ Run registered watcher.\nuiDevice.runWatchers()\n}\n```\n\n至此，运行`dismissesStatisticsDialogUsingWatcher()`测试的一切已准备就绪。测试启动应用，打开菜单抽屉，导航到“统计”部分，此时`AlertDialog`弹出。UI\
  \ Automator 框架尝试定位“统计”文本但未成功。`UiWatcher`机制开始检查屏幕上是否有运行中的监视器预期捕获的内容。在我们的案例中，它是`AlertDialog`的“确定”按钮，该按钮在监视器内部被点击。\n\
  总的来说，值得在自动化测试中尝试使用`UiWatcher`，它可以丰富测试自动化工具集，并使测试更具可读性。\n\n\n\n## 在测试中结合使用 Espresso\
  \ 与 UI Automator\n\n至此，你应该已经对如何将 UI Automator 测试框架作为独立的测试自动化工具有了清晰的认识，现在正是揭示在单个测试中同时使用\
  \ Espresso 与 UI Automator 所带来的 Android 测试自动化全部威力的时候。为了演示这一点，我们将自动化一个用例，在该用例中，TO-DO\
  \ 应用会发送一条通知，点击该通知后会向用户打开 `TasksActivity`（即任务列表界面）。测试的第一部分从我们点击通知的那一刻开始使用 Espresso\
  \ 进行自动化，之后将使用 UI Automator。最后，将再次使用 Espresso 代码来验证应用的状态。\n\n让我们来看一下测试本身。\n\n`chapter8.*.EspressoUiAutomatorTest.*clickNotificationOpenMainPage()*.*`\n\
  \n```\nprivate val instrumentation = InstrumentationRegistry.getInstrumentation()\n\
  private val uiDevice: UiDevice = UiDevice.getInstance(instrumentation)\nprivate\
  \ val twoSeconds = 2000L\n@get:Rule\nvar activityTestRule = ActivityTestRule(TasksActivity::class.java)\n\
  /**\n* 点击被测应用触发的通知，并验证 TasksActivity 已显示。\n*/\n@Test\nfun clickNotificationOpensTasksActivity()\
  \ {\nopenDrawer()\nonView(allOf(withId(R.id.design_menu_item_text),\nwithText(R.string.settings_title))).perform(click())\n\
  onData(CoreMatchers.instanceOf(PreferenceActivity.Header::class.java))\n.inAdapterView(withId(android.R.id.list))\n\
  .atPosition(1)\n.onChildView(withId(android.R.id.title))\n.check(matches(withText(\"\
  Notifications\")))\n.perform(click())\n// 点击“发送通知”项\nonData(withKey(\"notifications_send\"\
  ))\n.inAdapterView(allOf(\nwithId(android.R.id.list),\nwithParent(withId(android.R.id.list_container))))\n\
  .check(matches(isDisplayed()))\n.perform(click())\n// 执行 UI Automator 操作。\nuiDevice.openNotification()\n\
  // 通过文本点击通知，并等待应用出现。\nuiDevice.findObject(By.text(\"My notification\"))\n.clickAndWait(Until.newWindow(),\
  \ twoSeconds)\n// 使用 Espresso 验证应用布局\nonView(withId(R.id.noTasksIcon)).check(matches(isDisplayed()))\n\
  }\n```\n\n如果通知有延迟，我们可以使用 `wait()` 方法等待它。同一类中的第二个测试方法涵盖了这种情况。TO-DO 应用在发送通知时会有一个小延迟，测试通过等待通知对象来处理这一点。\n\
  \n`chapter8.*.EspressoUiAutomatorTest*: 通过文本点击延迟通知。`\n\n```\n// 等待并通过文本点击延迟通知。\n\
  uiDevice.findObject(By.res(\"com.android.systemui:id/notification_stack_scroller\"\
  ))\n.wait(Until.findObject(By.text(\"My notification\")), 8000)\n.clickAndWait(Until.newWindow(),\
  \ twoSeconds)\n```\n\n如你所见，借助这两个框架，我们可以覆盖我们所需的大部分用例，从使用 Espresso 测试应用，到更复杂的情况，例如与通知交互、打开系统设置以及使用\
  \ UI Automator 处理其他第三方应用。\n\n## 练习 20\n\n**使用 Espresso 与 UI Automator 实现一个练习测试**\n\
  \n1.  实现一个使用 UI Automator `UiSelector` 的测试，该测试创建一个 TO-DO 项然后对其进行修改。\n\n2.  实现一个使用\
  \ UI Automator `BySelector` 的测试，该测试创建两个 TO-DO 项，标记其中一个为已完成，过滤出活动中的 TO-DO 项，并进行验证。\n\
  \n3.  实现一个测试，该测试打开 TO-DO 列表工具栏中的上下文菜单，然后点击分享按钮。修改现有的 `UiWatcher`，使其等待应用选择器中显示 Gmail\
  \ 应用图标/文本，并在 `UiWatcher` 内部点击它。\n\n4.  实现一个测试，该测试使用 Espresso 和 UI Automator 代码，自动化第\
  \ 3 步中描述的过程。\n\n## 总结\n\n根据其目标，Android UI 测试可能针对不同的应用：被测试应用、第三方应用，或两者兼有。对于第三方或混合应用，测试使用\
  \ UI Automator 框架进行，这是一个强大的测试工具，与纯 Espresso 测试相比，它允许更广泛的测试覆盖率。结合 Espresso 和 UI Automator\
  \ 框架可以创建出功能强大的 UI 测试，足以覆盖我们能想象到的大多数用例。\n\n# 9. 处理运行时系统操作与权限\n\n如今，大多数 Android 应用都支持多种语言环境，并且许多应用会请求不同的系统权限，例如访问设备相机的权限、位置权限以及写入外部存储的权限。\n\
  \n随着 Android 平台的发展，应用权限的处理方式已转向有利于用户隐私。从 API 级别 23 开始，应用权限在应用运行时根据用户请求进行询问。此类权限由系统弹出窗口或系统对话框表示，不属于正在测试的应用的一部分。此外，用户可以随时从应用设置中撤销这些权限。当然，在运行\
  \ UI 测试之前或期间，应妥善处理上述应用状态。\n\n本章解释了处理像权限请求对话框这类系统操作的不同方法，并描述了以编程方式更改 Android 模拟器系统语言的可行解决方案。\n\
  \n## 以编程方式更改模拟器系统语言\n\n直到 API 级别 27，Android 都提供了一种通过 `adb` 命令或直接从测试代码发送 Intent 来设置系统区域设置的可能性。这之所以能够实现，是因为\
  \ `CustomLocale.apk` 预装在模拟器上，并且能够处理发送的 Intent。以下是 `adb shell am` 命令的示例：\n\n```\n\
  adb shell am broadcast -a com.android.intent.action.SET_LOCALE --es \\\ncom.android.intent.extra.LOCALE\
  \ \"en_US\" com.android.customlocale2\n```\n\n然而，从 API 级别 28 开始，`CustomLocale.apk`\
  \ 应用已从模拟器映像中移除，这就需要另一种解决方案。仔细查看 Android 模拟器发布说明后（[`developer.android.com/studio/releases/emulator`](https://developer.android.com/studio/releases/emulator)），解决方案就变得清晰了。从\
  \ Android 模拟器 27.2.9 版本（2018 年 5 月）开始，你可以在不重启模拟器的情况下加载 QuickBoot 快照。模拟器发布说明页面解释了如何借助“设置”部分中的模拟器“扩展控件”窗口手动执行此操作。请参见图\
  \ 9-1。\n\n![../images/469090_1_En_9_Chapter/469090_1_En_9_Fig1_HTML.jpg](img/469090_1_En_9_Fig1_HTML.jpg)\n\
  \n**图 9-1** 模拟器扩展控件\n\n当快照视图出现时，你将设备置于所需状态，然后点击“拍摄快照”按钮。将拍摄一个新的快照，并为其自动生成一个名称，该快照会显示在快照列表中。请参见图\
  \ 9-2。\n\n![../images/469090_1_En_9_Chapter/469090_1_En_9_Fig2_HTML.jpg](img/469090_1_En_9_Fig2_HTML.jpg)\n\
  \n**图 9-2** 拍摄模拟器快照\n\n**注意：** 在模拟器“扩展控件”窗口中重命名快照并不会全局重命名它，而只是创建别名。实际的快照名称将保持不变。\n\
  \n同样的事情也可以通过使用 `telnet` 控制台命令与 Android 模拟器通信来实现（有关模拟器 `telnet` 命令的更多信息，请访问 [`developer.android.com/studio/run/emulator-console`](https://developer.android.com/studio/run/emulator-console)）。在以下代码示例中，你将看到如何与正在运行的模拟器建立\
  \ telnet 会话、列出现有快照、拍摄快照以及在模拟器运行时加载它。\n\n\n\n### 保存和加载模拟器快照的示例脚本\n\n```\ntelnet localhost\
  \ 5554\navd snapshot list\navd snapshot save snap_de\nemulator -avd Pixel2_API_28\
  \ -snapshot snap_de\n```\n\n由于本书的主要主题是测试自动化，以下 Python 脚本会创建到本地主机端口 5554（这是创建 Android\
  \ 模拟器时占用的第一个端口）的 telnet 连接，并加载之前保存的快照。\n\n### 建立模拟器 Telnet 连接并加载模拟器快照的 Python 脚本\n\
  \n```\nimport telnetlib\nHOST = \"localhost\"\nPORT = \"5554\"\ntn = telnetlib.Telnet(HOST,\
  \ PORT)\ntn.write(b\"avd snapshot load name\\n\")\ntn.write(b\"exit\\n\")\n```\n\
  \n或者，你也可以使用 `expect` 脚本工具来实现同样的功能（仅适用于 MacOS 和 UNIX 用户）。\n\n### 建立模拟器 Telnet 连接并加载模拟器快照的\
  \ Expect 工具脚本\n\n```\n#!/usr/bin/expect\nset timeout 15\nspawn telnet localhost\
  \ 5554\nexpect \"OK\"\nsend \"avd snapshot load snap_de\\r\"\nexpect \"OK\"\nsend\
  \ \"exit\\r\"\n```\n\n要在你的电脑上安装 `expect` 工具，请使用以下命令：\n* Mac：`brew install expect`\n\
  * UNIX/Linux：`yum install expect`\n\n总的来说，当前这种快照方法不仅适用于设置模拟器语言，还使我们能够针对许多不同的用例创建不同的快照，你可以自己想出这些用例。\n\
  \n## 练习 21\n\n**使用模拟器快照功能**\n\n1.  启动一个模拟器，并借助模拟器的扩展控制窗口保存几个模拟器快照。手动加载这些快照。\n2.\
  \  使用控制台命令启动一个模拟器。将 telnet 会话连接到该模拟器，并保存几个模拟器快照。从控制台加载这些快照。\n3.  创建一个包含模拟器 telnet\
  \ 命令的 Python 脚本并运行它。观察结果。\n4.  在你的电脑上安装 `expect` 工具，然后创建并执行包含 `expect telnet` 命令的脚本。观察结果。\n\
  \n## 处理运行时权限\n\nAndroid 测试自动化中另一个与系统弹窗相关的热门话题是运行时权限。当 Android 应用需要访问其沙箱之外的资源或信息时，应向系统请求相应的权限。应用在\
  \ `AndroidManifest.xml` 文件中声明权限，然后在运行时（Android 6.0 及以上版本）请求用户批准每个权限。\n\n当用户触发需要额外权限的代码片段时，系统显示的提示描述的是你的应用需要访问的权限组，而不是具体的权限。\n\
  \n为了展示此功能，我们的示例应用在向待办事项添加图片时会请求权限。你可以尝试一下。\n\n### 使用 GrantPermissionRule 启用权限\n\n\
  现在让我们看一下 `RuntimePermissionTest.kt` 类，它包含了 `GrantPermissionRule` 的示例。`GrantPermissionRule`\
  \ 规则用于在 Android M（API 23）及以上版本授予运行时权限。当测试需要运行时权限才能执行其工作时，会使用此规则。当应用于测试类时，此规则会尝试授予所有请求的运行时权限。被请求的权限将在设备上被授予并立即生效。\n\
  \n在示例的待办应用（TO-DO）中点击相机图标，会触发向用户显示相机权限提示。该提示属于一个名为 `com.andriod.packageinstaller`\
  \ 的不同应用包，Espresso 无法与之交互。因此，为了减少外部依赖并保持 Espresso 测试的封闭性，可以使用 `GrantPermissionRule`\
  \ 在测试开始时即授予权限。\n\n#### chapter9. RuntimePermissionsTest.kt\n\n```\n@RunWith(AndroidJUnit4::class)\n\
  class RuntimePermissionsTest {\n/**\n* Manifest.permission.CAMERA 权限将在测试运行前被授予。\n\
  */\n@get:Rule\nvar mRuntimePermissionRule = GrantPermissionRule\n.grant(Manifest.permission.CAMERA)\n\
  /**\n* 提供的 activity 将在每个测试前启动。\n*/\n@get:Rule\nvar activityTestRule = ActivityTestRule(TasksActivity::class.java)\n\
  @Test\nfun takesCameraPicture() {\nval toDoTitle = TestData.getToDoTitle()\nval\
  \ toDoDescription = TestData.getToDoDescription()\n// 添加新的 TO-DO。\nonView(withId(R.id.fab_add_task)).perform(click())\n\
  onView(withId(R.id.add_task_title))\n.perform(typeText(toDoTitle), closeSoftKeyboard())\n\
  onView(withId(R.id.add_task_description))\n.perform(typeText(toDoDescription), closeSoftKeyboard())\n\
  // 点击相机按钮以触发权限对话框。\nonView(withId(R.id.makePhoto)).perform(click())\nonView(withId(R.id.picture)).perform(click())\n\
  waitForElement(onView(withId(R.id.fab_edit_task_done))).perform(click())\n// 验证带有标题的新\
  \ TO-DO 显示在 TO-DO 列表中。\nonView(withText(toDoTitle)).check(matches(isDisplayed()))\n\
  }\n}\n```\n\n当前这种方法效果不错，但有其优缺点。积极的方面是：\n* UI 测试保持封闭，不需要与其他系统服务交互。\n* 测试类中的每个测试用例都会被授予权限。\n\
  \n然而，也存在一些不足之处：\n* 无法测试不同的运行时权限使用场景，例如在被拒绝后获取权限，或者尝试在未授予权限的情况下使用功能。\n* 权限一旦授予，就无法撤销。尝试撤销将导致插桩进程崩溃。\n\
  \n总的来说，使用 `GrantPermissionRule` 是一种很好的方式，可以授予运行时权限，并避免权限对话框出现从而阻塞应用 UI。另一方面，正如所述，这限制了我们在覆盖多种运行时权限请求场景方面的能力，而这些场景也是有待测试的应用程序的一部分。\n\
  \n### 使用 UI Automator 处理运行时权限\n\n另一种处理运行时权限的方法是将 UI Automator 测试框架的功能与 Espresso\
  \ 结合使用。由于它允许我们与任何应用交互，因此我们也能够对权限对话框执行 UI 操作。\n\n首先，让我们考虑可能的用例。总共有至少三种涉及运行时权限对话框的用例：\n\
  * 用户首次看到权限对话框时，授予了相机权限。\n* 用户首次出现时拒绝了相机权限，但随后意识到需要此功能，并在权限对话框再次出现时启用了它。\n* 权限被拒绝了两次。第二次拒绝时勾选了“不再询问”复选框。用户再次尝试使用相机功能，但现在只能从应用权限设置中手动启用。\n\
  \n需要说明的是，所有四种用例背后都有对应的应用代码逻辑，如果使用 `GrantPermissionRule`，这些逻辑将无法被自动化测试覆盖，而需要手动测试。\n\
  \n其次，仅使用 `AndroidJUnitRunner` 进行权限测试可能会遇到一个问题。关键在于，每个测试都需要一个没有授予权限的干净应用状态。因此，应该使用第\
  \ 1 章中描述的 Android Test Orchestrator 选项，并配合使用 `testInstrumentationRunnerArguments\
  \ clearPackageData: 'true'` 参数（更多详情请参见 `app/build.gradle` 文件）。这确保了每个测试都在自己独立的调用中运行，包括清理后的应用权限状态。\n\
  \n第三，我们必须使用 Monitor 工具检查将要导航到的所有区域，进行 UI dump 并收集在已定义用例中使用的元素标识符。\n\n\n\n\n图 9-3\
  \ 展示了创建附带图片的待办事项时弹出的“授予相机权限”对话框。\n\n![../images/469090_1_En_9_Chapter/469090_1_En_9_Fig3_HTML.jpg](img/469090_1_En_9_Fig3_HTML.jpg)\n\
  *图 9-3* 导出带有相机权限对话框的待办事项应用 UI\n\n图 9-4 演示了在系统设置应用中检查待办事项应用设置页面的过程。\n\n![../images/469090_1_En_9_Chapter/469090_1_En_9_Fig4_HTML.jpg](img/469090_1_En_9_Fig4_HTML.jpg)\n\
  *图 9-4* 在设置页面上导出的待办事项应用 UI\n\n图 9-5 展示了在系统设置应用内部检查待办事项应用权限设置页面的过程。\n\n![../images/469090_1_En_9_Chapter/469090_1_En_9_Fig5_HTML.jpg](img/469090_1_En_9_Fig5_HTML.jpg)\n\
  *图 9-5* 在设置应用权限页面中导出的待办事项应用 UI\n\n以下是需要收集的 UI 元素列表，测试将基于这些元素进行操作（参考设备 Nexus 5X，操作系统\
  \ Android 8.1.0）：\n\n* 允许按钮 — `com.android.packageinstaller:id/permission_allow_button`\n\
  * 拒绝按钮 — `com.android.packageinstaller:id/permission_deny_button`\n* 不再询问复选框 — `com.android.packageinstaller:id/do_not_ask_checkbox`\n\
  * 权限列表项 — 循环视图 `com.android.settings:id/list` 中的第四项\n* 相机权限列表项 — 列表视图 `android:id/list`\
  \ 中的第零个元素\n\n最后是我们的测试。请查看 `RuntimePermissionsUiAutomatorTest.kt`。为方便起见，我们声明了一些可复用的实例：\n\
  \n```\nprivate val instrumentation = InstrumentationRegistry.getInstrumentation()\n\
  private val uiDevice: UiDevice = UiDevice.getInstance(instrumentation)\nprivate\
  \ val todoAppPackageName = InstrumentationRegistry.getTargetContext().packageName\n\
  private val testContext = InstrumentationRegistry.getContext()\n```\n\n第一个用例由 `takesCameraPicture()`\
  \ 测试用例代表，用户仅点击一次权限对话框。\n\n*测试方法* `chapter9.RuntimePermissionsUiAutomatorTest.takesCameraPicture()`。\n\
  \n```\n@Test\nfun takesCameraPicture() {\nval toDoTitle = TestData.getToDoTitle()\n\
  // 添加新的待办事项。\nonView(withId(R.id.fab_add_task)).perform(click())\nonView(withId(R.id.add_task_title))\n\
  .perform(typeText(toDoTitle), closeSoftKeyboard())\n// 点击相机按钮以触发权限对话框。\nonView(withId(R.id.makePhoto)).perform(click())\n\
  // UI Automator - 点击权限对话框的“允许”按钮。\nuiDevice.findObject(By.res(\"com.android.packageinstaller:id/permission_allow_button\"\
  )).click()\nonView(withId(R.id.picture)).perform(click())\nwaitForElement(onView(withId(R.id.fab_edit_task_done))).perform(click())\n\
  // 验证带有关键字的待办事项出现在待办事项列表中。\nonView(withText(toDoTitle)).check(matches(isDisplayed()))\n\
  }\n```\n\n第二个用例由 `deniesAndGrantsPermission()` 测试覆盖。\n\n*测试方法* `chapter9.RuntimePermissionsUiAutomatorTest.deniesAndGrantsPermission()`。\n\
  \n```\n@Test\nfun deniesAndGrantsPermission() {\nval toDoTitle = TestData.getToDoTitle()\n\
  onView(withId(R.id.fab_add_task)).perform(click())\nonView(withId(R.id.add_task_title))\n\
  .perform(typeText(toDoTitle), closeSoftKeyboard())\nonView(withId(R.id.makePhoto)).perform(click())\n\
  // UI Automator - 点击权限对话框的“拒绝”按钮。\nuiDevice.findObject(By.res(\"com.android.packageinstaller:id/permission_deny_button\"\
  )).click()\nonView(withId(R.id.makePhoto)).perform(click())\nonView(withId(R.id.snackbar_action)).perform(click())\n\
  uiDevice.findObject(By.res(\"com.android.packageinstaller:id/permission_allow_button\"\
  )).click()\nonView(withId(R.id.picture)).perform(click())\nwaitForElement(onView(withId(R.id.fab_edit_task_done))).perform(click())\n\
  onView(withText(toDoTitle)).check(matches(isDisplayed()))\n}\n```\n\n在第三个用例中，情况稍微复杂一些，因为我们需要与设置应用进行交互。以下是测试代码。\n\
  \n*测试方法* `chapter9.RuntimePermissionsUiAutomatorTest.deniesAndGrantsPermissionFromSettings()`。\n\
  \n```\n@Test\nfun deniesAndGrantsPermissionFromSettings() {\nval toDoTitle = TestData.getToDoTitle()\n\
  onView(withId(R.id.fab_add_task)).perform(click())\nonView(withId(R.id.makePhoto)).perform(click())\n\
  uiDevice\n.findObject(By.res(\"com.android.packageinstaller:id/permission_deny_button\"\
  ))\n.click()\nonView(withId(R.id.makePhoto)).perform(click())\nonView(withId(R.id.snackbar_action)).perform(click())\n\
  // UI Automator - 点击权限对话框的复选框和“拒绝”按钮\nuiDevice\n.findObject(By.res(\"com.android.packageinstaller:id/do_not_ask_checkbox\"\
  ))\n.click()\nuiDevice\n.findObject(By.res(\"com.android.packageinstaller:id/permission_deny_button\"\
  ))\n.click()\n// 点击相机按钮以触发权限对话框。\nonView(withId(R.id.makePhoto)).perform(click())\n\
  onView(withId(R.id.snackbar_text))\n.check(matches(allOf(isDisplayed(), withText(\"\
  相机不可用\"))))\nsendApplicationSettingsIntent()\nenableCameraPermission()\nlaunchBackToDoApplication()\n\
  onView(withId(R.id.fab_add_task)).perform(click())\nonView(withId(R.id.add_task_title))\n\
  .perform(typeText(toDoTitle), closeSoftKeyboard())\nonView(withId(R.id.makePhoto)).perform(click())\n\
  onView(withId(R.id.picture)).perform(click())\nwaitForElement(onView(withId(R.id.fab_edit_task_done))).perform(click())\n\
  onView(withText(toDoTitle)).check(matches(isDisplayed()))\n}\n```\n\n其中，`sendApplicationSettingsIntent()`\
  \ 负责创建并发送一个 Intent 以显示待办事项应用的设置页面。\n\n*发送 Intent 以打开待办事项应用设置* `chapter9.RuntimePermissionsUiAutomatorTest.sendApplicationSettingsIntent()`。\n\
  \n```\nprivate fun sendApplicationSettingsIntent() {\n// 创建 Intent 以打开待办事项应用的设置。\n\
  val intent = Intent()\nintent.action = Settings.ACTION_APPLICATION_DETAILS_SETTINGS\n\
  val uri = Uri.fromParts(\"package\", todoAppPackageName, null)\nintent.data = uri\n\
  intent.addFlags(Intent.FLAG_ACTIVITY_CLEAR_TASK)\ntestContext.startActivity(intent)\n\
  }\n```\n\n然后，`enableCameraPermission()` 包含用于打开应用权限设置并点击相机权限项的代码（参见图 9-4 和 9-5）。\n\
