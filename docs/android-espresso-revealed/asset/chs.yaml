  };\n}\n}\n```\n\n`swipeCustom()` 方法首先设置滑动持续时间，然后使用我们的 `CUSTOM` 滑动类型执行 `GeneralSwipeAction`。同样，我们必须从\
  \ `GeneralSwipeAction` 类内部复制 `translate()` 方法，因为它无法从类外部访问。\n\n## 练习 6\n\n**编写一个使用自定义滑动操作的测试用例**\n\
  \n1.  编写一个测试用例，通过在 ID 为 `R.id.tasks_list` 的 TODO 列表视图上执行 `swipeDown()` 操作来刷新 TODO\
  \ 列表。\n2.  将第一个任务中的 `swipeDown()` 操作替换为 `swipeCustom()` 视图操作。\n\n```\n\n\n## 创建自定义\
  \ RecyclerView 操作\n\n`RecyclerViewActions` 类提供了可在 RecyclerView 或 RecyclerView 项内使用的有限操作。例如，点击待办事项\
  \ RecyclerView 中的整个待办事项项功能很有用，可用于打开项的详细信息。但是，如果我们需要点击复选框来标记待办事项为已完成，该怎么办？\n\n当然，我们可以根据位置来执行此操作。作为掌握测试数据的工程师，我完全控制着每个待办事项的名称，并且可以使所有名称唯一。这使我能够根据名称识别每个待办事项项，然后将焦点缩小到待办事项项内的特定元素。在我们的案例中，我们希望点击复选框。看看此自定义\
  \ RecyclerView 视图操作在 `CustomRecyclerViewActions.java` 类的 `clickTodoCheckBoxWithTitle()`\
  \ 方法中可能是怎样的。\n\n*`chapter2.customactions.CustomRecyclerViewActions.java`*\n\n```\n\
  class ClickTodoCheckBoxWithTitleViewAction implements CustomRecyclerViewActions\
  \ {\nprivate String toDoTitle;\npublic ClickTodoCheckBoxWithTitleViewAction(String\
  \ toDoTitle) {\nthis.toDoTitle = toDoTitle;\n}\npublic static ViewAction clickTodoCheckBoxWithTitle(final\
  \ String toDoTitle) {\nreturn actionWithAssertions(new ClickTodoCheckBoxWithTitleViewAction(toDoTitle));\n\
  }\n@Override\npublic Matcher getConstraints() {\nreturn allOf(isAssignableFrom(RecyclerView.class),\
  \ isDisplayed());\n}\n@Override\npublic String getDescription() {\nreturn \"通过点击其复选框来完成任务。\"\
  ;\n}\n@Override\npublic void perform(UiController uiController, View view) {\ntry\
  \ {\nRecyclerView recyclerView = (RecyclerView) view;\nRecyclerView.Adapter adapter\
  \ = recyclerView.getAdapter();\nif (adapter instanceof TasksFragment.TasksAdapter)\
  \ {\nint itemCount = adapter.getItemCount();\nfor (int i = 0; i < itemCount; i++)\
  \ {\nView taskItemView = recyclerView.getLayoutManager().findViewByPosition(i);\n\
  TextView textView = taskItemView.findViewById(R.id.title);\nif (textView != null\
  \ && textView.getText() != null) {\nif (textView.getText().toString().equals(toDoTitle))\
  \ {\nCheckBox completeCheckBox = taskItemView.findViewById(R.id.todo_complete);\n\
  completeCheckBox.performClick();\n}\n} else {\nthrow new RuntimeException(\n\"无法在位置\
  \ \" + i + \" 的待办事项项的子视图中找到 ID 为 R.id.todo_title 的视图\");\n}\n}\n}\nuiController.loopMainThreadForAtLeast(ViewConfiguration.getTapTimeout());\n\
  } catch (RuntimeException e) {\nthrow new PerformException.Builder().withActionDescription(this.getDescription())\n\
  .withViewDescription(HumanReadables.describe(view)).withCause(e).build();\n}\n}\n\
  }\n```\n\n`clickTodoCheckBoxWithTitle()` 视图操作返回一个新的 `ClickTodoCheckBoxWithTitleViewAction`\
  \ 类，其中 `getConstraints()` 方法过滤掉可分配给 `RecyclerView.class` 且在屏幕上可见的视图：\n\n```\npublic\
  \ Matcher getConstraints() {\nreturn allOf(isAssignableFrom(RecyclerView.class),\
  \ isDisplayed())\n}\n```\n\n`getDescription()` 方法描述我们的 `ViewAction`。如果测试在 Espresso\
  \ 异常跟踪中失败，您将看到此描述。\n\n```\npublic String getDescription() {\nreturn \"通过点击其复选框来完成任务。\"\
  ;\n}\n```\n\n`perform()` 方法在此处执行繁重的工作——我们已经可以依赖我们的视图是 `RecyclerView` 这一事实。然后我们从其中获取适配器，并确保适配器是\
  \ `TasksFragment.TasksAdapter` 类的实例。之后，我们遍历适配器中的每个项，并从 ID 为 `R.id.title` 的 `TextView`\
  \ 中获取项标题。如果项的标题等于 `TaskItem` 中的标题，我们会搜索 ID 为 `R.id.todo_complete` 的 `CheckBox` 元素，并对其调用点击操作。最后，我们让主线程循环一小段时间，以便应用程序处理我们的点击事件。如果列表中不存在具有预期标题的待办事项，它将借助\
  \ Espresso 的 `PerformException` 类抛出异常。\n\n*`chapter2.customactions.CustomRecyclerViewActions.java`*\n\
  \n```\npublic void perform(UiController uiController, View view) {\ntry {\nRecyclerView\
  \ recyclerView = (RecyclerView) view;\nRecyclerView.Adapter adapter = recyclerView.getAdapter();\n\
  if (adapter instanceof TasksFragment.TasksAdapter) {\nint itemCount = adapter.getItemCount();\n\
  for (int i = 0; i < itemCount; i++) {\nView taskItemView = recyclerView.getLayoutManager().findViewByPosition(i);\n\
  TextView textView = taskItemView.findViewById(R.id.title);\nif (textView != null\
  \ && textView.getText() != null) {\nif (textView.getText().toString().equals(toDoTitle))\
  \ {\nCheckBox completeCheckBox = taskItemView.findViewById(R.id.todo_complete);\n\
  completeCheckBox.performClick();\n}\n} else {\nthrow new RuntimeException(\n\"未找到标题为\
  \ \" + toDoTitle + \" 的待办事项项\");\n}\n}\n}\nuiController.loopMainThreadForAtLeast(ViewConfiguration.getTapTimeout());\n\
  } catch (RuntimeException e) {\nthrow new PerformException.Builder().withActionDescription(this.getDescription())\n\
  .withViewDescription(HumanReadables.describe(view)).withCause(e).build();\n}\n}\n\
  ```\n\n`CustomRecyclerViewActions.java` 类中的 `scrollToLastHolder()` 方法展示了 `RecyclerViewAction`\
  \ 的另一个示例，并说明了如何在 `RecyclerView` 上实现滚动操作。由于 `getConstraints()` 和 `getDescription()`\
  \ 方法相同，我们将不再赘述。至于 `perform()` 方法，您可以看到它从 `RecyclerView` 适配器检索项数，并使用 `scrollToPosition()`\
  \ `RecyclerView` 方法滚动到最后一项：\n\n```\npublic void perform(UiController uiController,\
  \ View view) {\nRecyclerView recyclerView = (RecyclerView) view;\nint itemCount\
  \ = recyclerView.getAdapter().getItemCount();\ntry {\nrecyclerView.scrollToPosition(itemCount\
  \ - 1);\nuiController.loopMainThreadUntilIdle();\n} catch (RuntimeException e) {\n\
  throw new PerformException.Builder().withActionDescription(this.getDescription())\n\
  .withViewDescription(HumanReadables.describe(view)).withCause(e).build();\n}\n}\n\
  ```\n\n## 练习 7\n\n**编写一个自定义 RecyclerView 操作**\n\n1. 基于 `clickTodoCheckBoxWithTitle()`\
  \ 操作，实现一个验证待办事项项不在列表中的 `RecyclerView` 操作。提示：在 `perform()` 方法中使用一个 `JUnit assert`\
  \ 方法。最终用法可能如下所示：\n\n```\nonView(withId(R.id.tasks_list)).perform(assertNotInTheListTodoWithTitle(\"\
  title\"))\n```\n\n## 编写自定义匹配器\n\nEspresso 匹配器是强大的工具，有助于在应用程序布局中定位或验证元素。Espresso\
  \ 视图匹配器可能无法完全满足您的用例或需求。在这种情况下，您可以创建自定义匹配器。\n\n### 为简单 UI 元素创建自定义匹配器\n\n我们将从简单的匹配器作为介绍开始。以下用例将用作示例：\n\
  \n* 添加一个没有标题和描述的新待办事项，结果，待办事项标题字段的提示颜色应变为红色。\n\n在这种情况下，`BoundedMatcher` 是理想的选择，因为它返回\
  \ `Matcher<View>` 类型，但仅对 `EditText` 类型的元素执行操作。请参考 `CustomViewMatchers.java` 类，该类包含\
  \ `withHintColor()` 匹配器实现，该实现匹配 `EditText` 提示的颜色。\n\n*`chapter2.custommatchers.CustomViewMatchers.java`*\n\
  \n```\npublic static Matcher withHintColor(final int expectedColor) {\nreturn new\
  \ BoundedMatcher(EditText.class) {\n@Override\nprotected boolean matchesSafely(EditText\
  \ editText) {\nreturn expectedColor == editText.getCurrentHintTextColor();\n}\n\
  @Override\npublic void describeTo(Description description) {\ndescription.appendText(\"\
  待办事项标题: \" + expectedColor);\n}\n};\n}\n```\n\n\n\n此处，`BoundedMatcher` 使我们能够匹配作为\
  \ Android `View` 类型子类型的 `EditText` 视图，并返回 `Matcher<View>` 类型的最终对象。当在屏幕上识别到 `EditText`\
  \ 元素时，其提示颜色会与预期颜色进行比较，返回一个 `true` 或 `false` 值。每当返回 `true` 时，就意味着找到了具有预期提示颜色的 `EditText`。\n\
  \n以下是在真实测试用例中使用 `withHintColor()` 匹配器的方式（详情请参考 `CustomViewMatchers.java` 类）。\n\n\
  *chapter2.custommatchers.CustomViewMatchersTest.java.*\n\n```\n@Test\npublic void\
  \ addsNewToDoError() {\n// 添加新的待办事项\nonView(withId(R.id.fab_add_task)).perform(click());\n\
  onView(withId(R.id.fab_edit_task_done)).perform(click());\nonView(withId(R.id.add_task_title))\n\
  .check(matches(hasErrorText(\"标题不能为空！\")))\n.check(matches(withHintColor(Color.RED)));\n\
  }\n```\n\n### 实现自定义 RecyclerView 匹配器\n\n在我看来，`RecyclerView` 匹配器是 Espresso 中最隐蔽的部分。Android\
  \ 文档并未解释如何实现它们，但根据本书之前的示例，您可能猜到可以使用 `BoundedMatcher` 类来创建它们。\n\n我们将参考示例应用程序，创建一个\
  \ `RecyclerView` 匹配器，用于根据待办事项列表中的标题来匹配待办事项。同样，由于我们可以完全控制测试数据，因此假设标题是唯一的。\n\n*chapter2.custommatchers.RecyclerViewMatchers.java.*\n\
  \n```\npublic static Matcher withTitle(final String taskTitle) {\nChecks.checkNotNull(taskTitle);\n\
  return new BoundedMatcher(\nTasksAdapter.ViewHolder.class) {\n@Override\nprotected\
  \ boolean matchesSafely(TasksAdapter.ViewHolder holder) {\nfinal String holderTaskTitle\
  \ = holder.getHolderTask().getTitle();\nreturn taskTitle.equals(holderTaskTitle);\n\
  }\n@Override\npublic void describeTo(Description description) {\ndescription.appendText(\"\
  任务标题: \" + taskTitle);\n}\n};\n}\n```\n\n这里重要的是理解被测应用程序，并知道使用哪个 `ViewHolder`。在示例中，我们将\
  \ `TasksFragment.TasksAdapter.ViewHolder` 作为第二个参数放入 `BoundedMatcher`。当我们的匹配器在屏幕上识别出具有该类型的元素时，我们会从\
  \ holder 中检索标题，并将其与我们作为匹配器参数提供的标题进行比较。\n\n*chapter2.custommatchers.RecyclerViewMatchers.java.*\n\
  \n```\npublic static Matcher withTask(final TaskItem taskItem) {\nChecks.checkNotNull(taskItem);\n\
  return new BoundedMatcher(\nTasksAdapter.ViewHolder.class) {\n@Override\nprotected\
  \ boolean matchesSafely(TasksAdapter.ViewHolder holder) {\nfinal String holderTaskTitle\
  \ = holder.getHolderTask().getTitle();\nfinal String holderTaskDesc = holder.getHolderTask().getDescription();\n\
  return taskItem.getTitle().equals(holderTaskTitle)\n&& taskItem.getDescription().equals(holderTaskDesc);\n\
  }\n@Override\npublic void describeTo(Description description) {\ndescription.appendText(\"\
  任务标题: \" + taskItem.getTitle()\n+ \" 和描述: \" + taskItem.getDescription());\n}\n\
  };\n}\npublic static Matcher withTaskTitleFromTextView(final String taskTitle) {\n\
  Checks.checkNotNull(taskTitle);\nreturn new BoundedMatcher(\nTasksAdapter.ViewHolder.class)\
  \ {\n@Override\nprotected boolean matchesSafely(TasksAdapter.ViewHolder holder)\
  \ {\nfinal TextView titleTextView = (TextView) holder.itemView.findViewById(R.id.title);\n\
  return taskTitle.equals(titleTextView.getText().toString());\n}\n@Override\npublic\
  \ void describeTo(Description description) {\ndescription.appendText(\"任务标题: \"\
  \ + taskTitle);\n}\n};\n}\n}\n```\n\n## 使用自定义 FailureHandler 处理错误\n\nEspresso 测试框架非常灵活且可定制，错误处理也不例外。Espresso\
  \ 提供了一个名为 `FailureHandler` 的接口，可以在自定义失败处理器中实现该接口，以管理测试执行期间发生的失败。\n\n实现自定义 `FailureHandler`\
  \ 的原因可能是为了减少异常文本，或保存屏幕截图或其他应用程序数据，例如保存设备转储等。例如，示例待办事项应用程序代码库包含一个 `CustomFailureHandler`。\n\
  \n*chapter2.customfailurehandler.CustomFailureHandler.java.*\n\n```\npublic class\
  \ CustomFailureHandler implements FailureHandler{\nprivate final FailureHandler\
  \ delegate;\npublic CustomFailureHandler(Context targetContext) {\ndelegate = new\
  \ DefaultFailureHandler(targetContext);\n}\n@Override\npublic void handle(Throwable\
  \ error, Matcher viewMatcher) {\ntry {\ndelegate.handle(error, viewMatcher);\n}\
  \ catch (NoMatchingViewException e) {\n// 例如保存设备转储、截屏等。\nthrow e;\n}\n}\n}\n```\n\
  \n您可以在 `handle()` 方法中看到 `try...catch` 块。这就是我们捕获错误并可以对其执行任何操作的地方。通常在完成所有必要步骤后，异常会继续向外传播。\n\
  \n为了让 Espresso 使用 `CustomFailureHandler` 拦截每个测试失败，在测试类或基测试类中注册它非常重要，如 `BaseTest.java`\
  \ 类所示：\n\n```\n@Before\npublic void setUp() throws Exception {\nsetFailureHandler(new\
  \ CustomFailureHandler(\nInstrumentationRegistry.getInstrumentation().getTargetContext()));\n\
  }\n```\n\n如果您在基测试类中注册它，请不要忘记在测试类中调用 `super.setUp()`：\n\n```\n@Before\npublic void\
  \ setUp() throws Exception {\nsuper.setUp();\n}\n```\n\n## 练习 8\n\n**将 `CustomFailureHandler`\
  \ 应用于新的测试类**\n\n1.  创建一个新的测试类，其中包含一个每次运行都会失败的测试方法。将 `CustomFailureHandler` 应用于它。\n\
  \n## 测试失败时截取并保存屏幕截图\n\n运行测试很重要，但获得适当且描述性的测试结果同样重要，尤其是当测试失败时，这样才能轻松分析。`AndroidJUnitRunner`\
  \ 使用的 JUnit 报告器以老旧、简单的原始文本格式报告测试结果。工程师随后需要根据自身需求对其进行调整。当然，其中一项需求就是在测试失败时创建屏幕截图。有许多第三方库和工具可以在测试失败时截取屏幕截图。Square\
  \ 的 Spoon 就是一个很好的例子。但在这里，我们将讨论 JUnit 和 Espresso 自带的原生解决方案。\n\n让我们确定在测试运行流程中想要实现的目标：\n\
  \n1.  识别测试失败的时刻。\n\n2.  截取屏幕截图并恰当地命名。\n\n3.  将屏幕截图保存在给定的设备或模拟器上。\n\n从 4.9 版本开始，JUnit\
  \ 库提供了一种 `TestWatcher` 机制，允许我们监控并记录通过的测试和失败的测试。它是一个扩展了 `TestRule` 的抽象类，使我们能够对以下测试状态做出反应：\n\
  \n*   `succeeded(Description description)` — 在测试成功时调用。\n*   `failed(Throwable e,\
  \ Description description)` — 在测试失败时调用。\n*   `skipped(AssumptionViolatedException\
  \ e, Description description)` — 在测试因假设失败而跳过时调用。\n*   `starting(Description description)`\
  \ — 在测试即将开始时调用。\n*   `finished(Description description)` — 在测试方法完成时调用（无论是通过还是失败）。\n\
  \n这里我们对 `failed()` 方法感兴趣，它将覆盖 `BaseTest` 类（不过，其他方法在很多情况下也可能有用）。这解决了我们的第一点（识别测试失败的时刻）。\n\
  \n\n\nAndroid 测试支持库提供了 `Screenshot` 和 `ScreenshotCapture` 类，用于在 Android 设备或模拟器上进行仪表测试期间捕获位图格式的屏幕截图：\n\
  \n```\nprivate void captureScreenshot(final String name) throws IOException {\n\
  \    ScreenCapture capture = Screenshot.capture();\n    capture.setFormat(Bitmap.CompressFormat.PNG);\n\
  \    capture.setName(name);\n    capture.process();\n}\n```\n\n至于截图名称，我们需要借助 JUnit\
  \ 4.7 版本中提供的 `TestName()` JUnit 规则。`TestName` 规则使得当前测试名称在测试内部可用。它通过 `getMethodName()`\
  \ 函数返回当前正在运行的测试方法名称：\n\n```\n@Rule\npublic TestName testName = new TestName();\n\
  ```\n\n第二点也已经解决（截取屏幕截图并为其命名）。\n\n实际上，这几乎已经解决了，因为我们需要授予以下权限，才能让 `Screenshot` 类将截图保存到外部存储位置：\n\
  \n* `android.Manifest.permission.READ_EXTERNAL_STORAGE`\n* `android.Manifest.permission.WRITE_EXTERNAL_STORAGE`\n\
  \n幸运的是，Android 测试支持库提供了 `GrantPermissionRule` 来在运行时执行此操作。唯一的限制是它只能从 Android M（API\
  \ 级别 23）开始使用：\n\n```\n@Rule\npublic GrantPermissionRule mRuntimePermissionRule =\
  \ GrantPermissionRule\n    .grant(android.Manifest.permission.WRITE_EXTERNAL_STORAGE,\n\
  \           android.Manifest.permission.READ_EXTERNAL_STORAGE);\n```\n\n至此，所有三点都已解决（最后一点是将截图保存在给定的设备或模拟器上），这就是它在\
  \ `BaseTest.class` 中的样子。\n\n`com.example.android.architecture.blueprints.todoapp.test.BaseTest.java.`\n\
  \n```\n@RunWith(AndroidJUnit4.class)\npublic class BaseTest {\n    ......\n    @Rule\n\
  \    public GrantPermissionRule mRuntimePermissionRule = GrantPermissionRule\n \
  \       .grant(android.Manifest.permission.WRITE_EXTERNAL_STORAGE,\n           \
  \    android.Manifest.permission.READ_EXTERNAL_STORAGE);\n    @Rule\n    public\
  \ TestName testName = new TestName();\n    public class ScreenshotWatcher extends\
  \ TestWatcher {\n        @Override\n        protected void succeeded(Description\
  \ description) {\n            // 一切正常，通知所有人\n        }\n        @Override\n    \
  \    protected void failed(Throwable e, Description desc) {\n            try {\n\
  \                captureScreenshot(testName.getMethodName());\n            } catch\
  \ (IOException e1) {\n                e1.printStackTrace();\n            }\n   \
  \     }\n        private void captureScreenshot(final String name) throws IOException\
  \ {\n            ScreenCapture capture = Screenshot.capture();\n            capture.setFormat(Bitmap.CompressFormat.PNG);\n\
  \            capture.setName(name);\n            capture.process();\n        }\n\
  \    }\n}\n```\n\n最后一点——截图将保存在 `sdcard/Pictures/screenshots` 目录中。在 Android 模拟器上，路径是\
  \ `/storage/emulated/0/Pictures/screenshots`。\n\n## 练习 9\n\n**使一个测试失败并观察截图**\n\n\
  1.  修改其中一个测试，使其失败。运行测试。测试运行后，借助 `adb` 命令，在设备或模拟器上启动 shell 会话，并导航到包含截图的文件夹。\n2. \
  \ 将从步骤 1 中获取的截图从设备拉到您的硬盘上。\n\n## 总结\n\n如您所见，Android 的 Espresso 是一个灵活且可定制的框架，允许我们创建自定义类和方法来满足特定的测试需求。当然，也存在一些限制，例如缺少\
  \ `RecyclerView` 匹配器。这些限制可以通过使用自定义的 `ViewAction` 来缓解。创建自定义的 `ViewActions`、`ViewMatchers`\
  \ 以及其他方法和类，对于有经验的 Espresso 用户来说是必备知识，有时甚至是必须掌握的技能。除此之外，您还可以完全自定义 UI 错误处理，并在每次测试错误时执行所需操作。\n\
  \n"
- "# 使用 Kotlin 编写 Espresso 测试\n\n2017 年 5 月的 Google I/O 大会宣布了对 Kotlin 的官方支持。从那一刻起，Kotlin\
  \ 在 Android 开发者中的受欢迎程度迅速飙升。考虑到当前的趋势以及 Google 关于将 Android 转向 Kotlin 的公告（这在 Android\
  \ 文档和代码示例中都有体现），我们可以假设在两到三年内，Kotlin 将取代 Java。\n\n图 3-1 显示了 Java 与 Kotlin 的使用预测，表明\
  \ Kotlin 很快将在 Android 开发领域超越 Java。\n\n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig1_HTML.jpg](img/469090_1_En_3_Fig1_HTML.jpg)\n\
  \n**图 3-1** Android 上 Kotlin 与 Java 的使用情况对比（来源：[`https://realm.io/realm-report/`](https://realm.io/realm-report/)）\n\
  \n本章将解释如何将现有的 Espresso Java 测试迁移到 Kotlin，列出用 Kotlin 编写 UI 测试可能带来的好处，并通过实际示例和任务提供创建\
  \ Espresso DSL 的示例。\n\n## 将 Espresso Java 测试迁移到 Kotlin\n\nKotlin 在 Android 上与 Java\
  \ 协同工作，这意味着您可以将 Kotlin 代码添加到现有项目中，并且可以像调用 Kotlin 代码一样从 Kotlin 调用 Java 代码，反之亦然。\n\
  \n第一步是通过将 `kotlin-gradle-plugin` 依赖项添加到项目的 `build.gradle` 文件中，来告知 Android Studio\
  \ IDE 该项目使用了 Kotlin，如下所示：\n\n```\ndependencies {\n    classpath \"com.android.tools.build:gradle:3.1.4\"\
  \n    classpath \"org.jetbrains.kotlin:kotlin-gradle-plugin:1.2.61\"\n    ...\n\
  }\n```\n\n项目同步后，您可以开始将 Java 类转换为 Kotlin。这可以通过选择一个 Java 文件或包，打开 Code 菜单，然后选择 Convert\
  \ Java File to Kotlin File 选项轻松实现。您也可以右键单击文件或包，然后从弹出菜单中选择此选项（见图 3-2）。\n\n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig2_HTML.jpg](img/469090_1_En_3_Fig2_HTML.jpg)\n\
  \n**图 3-2** 将 Java 文件转换为 Kotlin\n\n对于测试类文件来说，事情可能看起来很简单，但对于复杂的 `ViewAction` 或 `ViewMatcher`\
  \ 来说，可能会很复杂。当 IDE 转换器无法处理代码的复杂性时，它将需要开发人员的干预。图 3-3 中的对话框会提醒开发人员注意这一事实。\n\n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig3_HTML.jpg](img/469090_1_En_3_Fig3_HTML.jpg)\n\
  \n**图 3-3** 从 Java 转换为 Kotlin 时的代码更正\n\n您也可以将现有的 Java 代码粘贴到 Kotlin 文件中。在这种情况下，IDE\
  \ 会识别出剪贴板中的代码是从 Java 文件复制的，并会建议将其转换为 Kotlin 代码，如图 3-4 所示。\n\n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig4_HTML.jpg](img/469090_1_En_3_Fig4_HTML.jpg)\n\
  \n**图 3-4** 将剪贴板中的 Java 代码转换为 Kotlin\n\n如果 Kotlin 文件中不存在这些导入，系统将要求您添加它们，如图 3-5 所示。\n\
  \n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig5_HTML.jpg](img/469090_1_En_3_Fig5_HTML.jpg)\n\
  \n**图 3-5** 转换为 Kotlin 后向文件中添加新导入\n\n转换无法处理具有多个导入的方法。这也需要开发人员手动干预（见图 3-6）。\n\n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig6_HTML.jpg](img/469090_1_En_3_Fig6_HTML.jpg)\n\
  \n**图 3-6** 从 Java 转换为 Kotlin 时的多个选择\n\n下面显示了一个 Espresso UI 测试方法从 Java 转换为 Kotlin\
  \ 的示例。您可能会注意到，除了函数声明和行尾的分号之外，几乎没有区别。\n\n*分别在 Java 和 Kotlin 语言中添加一个新的 TO-DO 测试。*\n\
  \n\n\n\n```\n@Test\npublic void addsNewToDo() {\n    // 添加新的待办事项\n    onView(withId(R.id.title)).perform(click());\n\
  \    onView(withId(R.id.add_task_title))\n        .perform(typeText(toDoTitle),\
  \ closeSoftKeyboard());\n    onView(withId(R.id.add_task_description))\n       \
  \ .perform(typeText(toDoDescription), closeSoftKeyboard());\n    onView(withId(R.id.fab_edit_task_done)).perform(click());\n\
  \    // 验证带有该标题的新待办事项已显示在待办事项列表中\n    onView(withText(toDoTitle)).check(matches(isDisplayed()));\n\
  }\n\n@Test\nfun addsNewToDo() {\n    // 添加新的待办事项\n    onView(withId(R.id.title)).perform(click())\n\
  \    onView(withId(R.id.add_task_title))\n        .perform(typeText(toDoTitle),\
  \ closeSoftKeyboard())\n    onView(withId(R.id.add_task_description))\n        .perform(typeText(toDoDescription),\
  \ closeSoftKeyboard())\n    onView(withId(R.id.fab_edit_task_done)).perform(click())\n\
  \    // 验证带有该标题的新待办事项已显示在待办事项列表中\n    onView(withText(toDoTitle)).check(matches(isDisplayed()))\n\
  }\n```\n\n你可以在 `chapter3/testsamples` 包中，基于 `ViewActionsTest.kt`、`RecyclerViewActionsTest.kt`\
  \ 和 `DataInteractionsTest.kt` 类实现的示例，查看更多将 Java 文件转换为 Kotlin 的示例。\n\n## 练习 10\n\n\
  ## 将 Java 代码转换为 Kotlin\n\n1. 将现有的 Java 文件转换为 Kotlin。\n2. 将包含多个 Java 文件的包转换为 Kotlin。\n\
  3. 复制一个 Java 代码示例并粘贴到 Kotlin 文件中。如果只粘贴 Java 方法的一半，会发生什么？转换结果还会正确吗？\n\n## 用 Kotlin\
  \ 编写测试的好处\n\n将 Kotlin 引入测试代码库有许多优势，其中包括：\n\n- 函数作为类型支持\n- 扩展函数\n- 字符串模板\n- 能够导入\
  \ `R.class` 资源\n- 更简洁的代码\n\n### 函数作为类型\n\n这个过程将函数保存到变量中，然后将其用作另一个函数的参数，或通过另一个函数返回一个函数。在下面的示例中，你可以看到\
  \ Espresso 的 `ViewMatchers.withText()` 函数是如何作为 `viewWithText()` 函数的值返回的：\n\n```\n\
  fun viewWithText(text: String): ViewInteraction =\n    Espresso.onView(ViewMatchers.withText(text))\n\
  ```\n\n### 扩展函数\n\n扩展并不会真正修改它们所扩展的类。通过定义扩展，你并没有向类中添加新成员，只是使新函数能够通过点表示法在该类型的实例上调用。借助扩展函数，Espresso\
  \ 的 `perform(ViewAction.typeText())` 函数可以用以下方式表示：\n\n```\nfun ViewInteraction.type(text:\
  \ String): ViewInteraction =\n    perform(ViewActions.typeText(text))\n```\n\n在这个示例中，我们为\
  \ `ViewInteraction` 类扩展了一个额外的 `type()` 方法。\n\n### 字符串模板\n\n字符串可以包含模板表达式，即经过求值并将结果连接到字符串中的代码片段。模板表达式以美元符号（`$`）开头，包含一个简单的名称。请看这个示例：\n\
  \n```\nfun main(args: Array) {\n    val i = 10\n    println(\"i = $i\") // 输出 \"\
  i = 10\"\n}\n```\n\n或者考虑花括号中的任意表达式：\n\n```\nfun main(args: Array) {\n    val s =\
  \ \"abc\"\n    println(\"$s.length is ${s.length}\") // 输出 \"abc.length is 3\"\n\
  }\n```\n\n### 导入 `R.class` 资源\n\nKotlin 与 Kotlin Android Gradle 插件一起，简化了项目资源（包括字符串值、ID\
  \ 和可绘制对象）的访问方式。在下面的清单中，基于 `chapter3/testsamples/ViewActionsKotlinTest.kt` 文件中的 `addsNewToDo()`\
  \ 测试实现，你可以看到 Kotlin 如何允许我们导入应用程序资源。\n\n*chapter3.testsamples.ViewActionsKotlinTest.kt*\n\
  \n```\n... // 其他导入和包声明\nimport com.example.android.architecture.blueprints.todoapp.R.id.*\n\
  \nclass ViewActionsKotlinTest : BaseTest() {\n    private var toDoTitle = \"\"\n\
  \    private var toDoDescription = \"\"\n\n    @Before\n    override fun setUp()\
  \ {\n        super.setUp()\n        toDoTitle = TestData.getToDoTitle()\n      \
  \  toDoDescription = TestData.getToDoDescription()\n    }\n\n    @Test\n    fun\
  \ addsNewToDo() {\n        // 添加新的待办事项\n        onView(withId(fab_add_task)).perform(click())\n\
  \        onView(withId(add_task_title))\n            .perform(typeText(toDoTitle),\
  \ closeSoftKeyboard())\n        onView(withId(add_task_description))\n         \
  \   .perform(typeText(toDoDescription), closeSoftKeyboard())\n        onView(withId(fab_edit_task_done)).perform(click())\n\
  \        // 验证带有该标题的新待办事项已显示在待办事项列表中\n        onView(withText(toDoTitle)).check(matches(isDisplayed()))\n\
  \    }\n}\n```\n\n与导入整个 `R.class` 不同，Android Studio IDE 允许你只导入一个或几个资源（见图 3-7）。\n\
  \n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig7_HTML.jpg](img/469090_1_En_3_Fig7_HTML.jpg)\n\
  \n**图 3-7** 使用 Kotlin 导入 R 类资源\n\n## Kotlin 中的 Espresso 领域特定语言\n\n借助 Kotlin 的扩展函数和函数作为类型支持，我们可以通过实现\
  \ Espresso 领域特定语言（DSL），大幅减少测试代码的样板。我们的 Espresso DSL 的目标是简化测试代码库，使其更易读，最重要的是，让我们的测试易于编写和维护。\n\
  \n首先，我们必须确定在 UI 测试代码库中最常使用的 Espresso 函数或表达式：\n\n- 由 `Espresso.onView()` 和 `Espresso.onData()`\
  \ 方法表示的视图或数据交互——这是每一行 Espresso 测试代码的起点。\n- 不同的视图操作，例如 `ViewActions.click()`、`ViewActions.typeText()`、`ViewActions.swipeDown()`、`ViewActions.closeSoftKeyboard()`\
  \ 等。\n- 大量的视图匹配器，这些是测试代码库中最常用的函数，因为它们不仅用于定位页面上的元素，还用于结合视图断言检查视图属性：`ViewMatchers.withId()`、`ViewMatchers.withText()`、`check(matches(ViewMatchers.isDisplayed()))`\
  \ 等。\n- 聚合的 Hamcrest 匹配器，如 `Matchers.allOf()` 或 `Matchers.anyOf()`。\n- RecyclerView\
  \ 操作，例如 `RecyclerViewActions.scrollToHolder()` 和 `RecyclerViewActions.actionOnItem()`。\n\
  \n当然，这个列表可以根据你的需求进行扩展或缩减。值得强调的是，本段的目的不是将 Espresso DSL 与 Kotlin 标准化，而是提供一个如何实现的示例，以便你可以将其应用到你的测试项目中。\n\
  \n核心的 `Espresso.onView()` 和 `Espresso.onData()` 方法是我们将首先处理的函数。鉴于它们始终接受一个视图匹配器或对象匹配器参数，我们可以将整个表达式转换为一个单一的\
  \ Kotlin 函数，如下所示：\n\n```\nfun viewWithText(text: String): ViewInteraction = Espresso.onView(ViewMatchers.withText(text))\n\
  ```\n\n或者在 `onData()` 的情况下：\n\n```\nfun onAnyData(): DataInteraction = Espresso.onData(CoreMatchers.anything())\n\
  ```\n\n你可能会注意到，返回类型与 `onView()` 和 `onData()` 方法返回的类型相同——分别是 `ViewInteraction` 和\
  \ `DataInteraction`。另一点是，可以将参数传递给扩展函数，并在原始函数内部使用。这些示例使用 Kotlin 局部函数（即函数内部的函数）来简化代码，可以用以下更复杂的函数声明来表示：\n\
  \n```\nfun viewWithText(text: String): ViewInteraction {\n    return Espresso.onView(ViewMatchers.withText(text))\n\
  }\n```\n\n以及\n\n```\nfun onAnyData(): DataInteraction {\n    return Espresso.onData(CoreMatchers.anything())\n\
  }\n```\n\n\n\n\n现在开始对视图操作进行说明。是时候使用 Kotlin 扩展函数了。以下是 Espresso 对带文本的视图执行点击操作的方式：\n\
  \n```\nonView(withText(\"item 1\")).perform(ViewActions.click())\n```\n\n你已经知道，`onView()`方法返回一个`ViewInteraction`类型，该类型包含`perform()`公有方法。现在我们要声明另一个函数，用来替换`perform(ViewActions.click())`。为了保持`ViewInteraction`类的点号表示法，我们将用新函数对其扩展，如下所示：\n\
  \n```\nfun ViewInteraction.click(): ViewInteraction = perform(ViewActions.click())\n\
  ```\n\n这样，我们用简单的`click()`函数表示了`perform(ViewActions.click())`表达式。这个使用带文本视图的示例现在看起来是这样的：\n\
  \n```\nviewWithText(\"item 1\").click()\n```\n\n这里我们同样保持了正确的返回类型`ViewInteraction`。它与原始`perform()`方法返回的类型相同。\n\
  \n同样的扩展函数可以添加到`DataInteraction`类。我们只需要将`ViewInteraction`扩展类替换为`DataInteraction`：\n\
  \n```\nfun DataInteraction.click(): ViewInteraction = perform(ViewActions.click())\n\
  ```\n\n就这样，目前看来还不错。\n\n接下来是视图匹配器和视图断言，它们也使用了同样的扩展函数方法。以下是一个视图显示状态的断言示例：\n\n```\n\
  onView(withText(\"item 1\")).check(matches(isDisplayed()))\n```\n\n表达式的`check`部分可以用这个扩展函数替换：\n\
  \n```\nfun ViewInteraction.checkDisplayed(): ViewInteraction =\ncheck(ViewAssertions.matches(ViewMatchers.isDisplayed()))\n\
  ```\n\n结合`viewWithText()`扩展函数示例，这被转换为以下简化表达式：\n\n```\nviewWithText(\"item 1\").checkIsDisplayed()\n\
  ```\n\n再次说明，将`ViewInteraction`替换为`DataInteraction`类可以为`DataInteraction`添加相同的扩展函数。\n\
  \n```\nfun DataInteraction.checkDisplayed(): ViewInteraction =\ncheck(ViewAssertions.matches(ViewMatchers.isDisplayed()))\n\
  ```\n\n有了`Espresso.onView()`、`ViewActions`和`ViewAssertions`方法的 DSL 示例，我们可以比较一个常用的原始\
  \ Espresso 表达式和一个用 DSL 编写的表达式（同时假设我们已经导入了所有 Espresso 静态方法）：\n\n```\nonView(withText(\"\
  item 1\")).check(matches(isDisplayed())).perform(click())\n```\n\n这是使用 DSL 编写的同一行代码：\n\
  \n```\nviewWithText(\"item 1\").checkIsDisplayed().click()\n```\n\n我们可以将同样的方法应用于聚合的`allOf()`\
  \ Hamcrest 匹配器：\n\n```\ncheck(matches(allOf(withText(), isDisplayed())))\n```\n\n\
  这将变成`allOf()`函数，如下所示：\n\n```\nfun ViewInteraction.allOf(vararg matcher: Matcher):\
  \ ViewInteraction {\nreturn check(ViewAssertions.matches(Matchers.allOf(matcher.asIterable())))\n\
  }\n```\n\n用法如下：\n\n```\nviewWithId(R.id.title).allOf(withText(\"item 1\"), isDisplayed())\n\
  ```\n\n接下来，我们有 RecyclerView 操作。与前面的示例类似，我们可以处理 RecyclerView 操作。以下示例基于`RecyclerViewActions.actionOnItemAtPosition()`，如下所示：\n\
  \n```\nonView(withId(R.id.tasks_list)).perform(actionOnItemAtPosition(10, scrollTo()));\n\
  ```\n\n将此方法应用于 DSL 后，我们得到以下表达式：\n\n```\nfun ViewInteraction.actionAtPosition(position:\
  \ Int, action: ViewAction): ViewInteraction =\nperform(actionOnItemAtPosition(position,\
  \ action))\n```\n\n因此，最终用法是：\n\n```\nviewWithId(R.id.tasks_list)).actionAtPosition(10,\
  \ scrollTo())\n```\n\n这些示例以及更多内容都定义在我们示例项目的`chapter3/EspressoDsl.kt`文件中，供你参考。\n\n\
  现在是时候将我们的领域特定语言应用到测试中，并观察转换后的 Espresso Kotlin 测试与使用 DSL 编写的测试有何不同。首先，我们来看一下`ViewActionsKotlinTest.kt`中实现的`ViewActions`测试示例。\n\
  \n**`checksToDoStateChange()` 测试方法实现于 `chapter3.testsamples.ViewActionsKotlinTest.kt`。**\n\
  \n```\n@Test\nfun checksToDoStateChange() {\n// 添加新的待办事项\nonView(withId(R.id.fab_add_task)).perform(click())\n\
  onView(withId(R.id.add_task_title))\n.perform(typeText(toDoTitle), closeSoftKeyboard())\n\
  onView(withId(R.id.add_task_description))\n.perform(typeText(toDoDescription), closeSoftKeyboard())\n\
  onView(withId(R.id.fab_edit_task_done)).perform(click())\n// 将待办事项标记为已完成\nonView(withId(R.id.todo_complete)).perform(click())\n\
  // 筛选出已完成的待办事项\nonView(withId(R.id.menu_filter)).perform(click())\nonView(allOf(withId(R.id.title),\
  \ withText(\"Active\"))).perform(click())\nonView(withId(R.id.todo_title)).check(matches(not(isDisplayed())))\n\
  onView(withId(R.id.menu_filter)).perform(click())\nonView(allOf(withId(R.id.title),\
  \ withText(\"Completed\"))).perform(click())\nonView(withId(R.id.todo_title))\n\
  .check(matches(allOf(withText(toDoTitle), isDisplayed())))\n}\n```\n\n现在我们可以将其与`ViewActionsKotlinDslTest.kt`中的测试进行比较。\n\
  \n**`checksToDoStateChange()` 测试方法实现于 `chapter3.testsamples.ViewActionsKotlinDslTest.kt`。**\n\
  \n```\n// 测试中使用的视图交互\nprivate val addFab = viewWithId(fab_add_task)\nprivate val\
  \ taskTitleField = viewWithId(add_task_title)\nprivate val taskDescriptionField\
  \ = viewWithId(add_task_description)\nprivate val editDoneFab = viewWithId(fab_edit_task_done)\n\
  private val todoCheckbox = viewWithId(todo_complete)\nprivate val toolbarFilter\
  \ = viewWithId(menu_filter)\nprivate val todoTitle = viewWithId(todo_title)\nprivate\
  \ val allFilterOption = onView(allOf(withId(title), withText(\"All\")))\nprivate\
  \ val activeFilterOption = onView(allOf(withId(title), withText(\"Active\")))\n\
  private val completedFilterOption = onView(allOf(withId(title), withText(\"Completed\"\
  )))\n@Test\nfun checksToDoStateChangeDsl() {\n// 添加新的待办事项\naddFab.click()\ntaskTitleField.type(toDoTitle).closeKeyboard()\n\
  taskDescriptionField.type(toDoDescription).closeKeyboard()\neditDoneFab.click()\n\
  // 将待办事项标记为已完成\ntodoCheckbox.click()\n// 筛选出已完成的待办事项\ntoolbarFilter.click()\nactiveFilterOption.click()\n\
  todoTitle.checkNotDisplayed()\ntoolbarFilter.click()\ncompletedFilterOption.click()\n\
  todoTitle.checkMatches(allOf(withText(toDoTitle), isDisplayed()))\n}\n```\n\n你可能已经注意到，使用\
  \ DSL 实现的测试方法更加清晰易读。为了进一步提高可读性，我们在测试类开头声明了所有使用的视图交互。这使得测试更加流畅。\n\n**练习 11**\n\n\
  **实践 Espresso DSL 用法**\n\n1.  仔细阅读`DataInteractionKotlinDslTest.kt`和`RecyclerViewActionsKotlinDslTest.kt`类中实现的测试，理解\
  \ DSL 是如何应用于这些测试的。\n\n2.  基于`ViewActionsKotlinTest.kt`中的`editsToDo()`测试方法，使用 DSL\
  \ 完成位于`ViewActionsKotlinDslTest.kt`中的`editsToDoDsl()`测试用例的实现。\n\n**总结**\n\n在 Java\
  \ 语言主导 Android 平台多年之后，Kotlin 为其应用和测试开发带来了新鲜且进步的方法。用 Kotlin 编写的测试更易读、更简洁、更易于维护。其扩展函数支持允许开发者轻松创建和测试领域特定语言，这进一步简化了测试代码。从\
  \ Java 迁移到 Kotlin 是无痛且快速的。最终，很明显在某个时间点 Kotlin 将在 Android 应用开发中取代 Java。你应该做好准备，至少迁移到\
  \ Kotlin 并改进你的测试代码。\n\n**4. 处理网络操作和异步操作**\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项，将以下英文文本翻译成中文。\n\
  \n\n## Espresso 框架中的同步机制\n\nEspresso 框架的主要优势之一是其测试的健壮性。这是通过自动化同步大部分测试操作来实现的。当主应用程序\
  \ UI 线程繁忙时，Espresso 会等待它，并在 UI 线程变为空闲后释放测试操作。此外，在进入下一个测试步骤之前，它还会等待 `AsyncTask` 操作完成。在本章中，我们将了解\
  \ Espresso 如何使用 `IdlingResource` 机制处理网络操作，并熟悉作为 `IdlingResource` 替代方案的 `ConditionWatcher`\
  \ 机制。\n\n## IdlingResource 基础\n\n每次您的测试调用 `onView()` 或 `onData()` 时，Espresso 会等待，直到满足以下同步条件后，才执行相应的\
  \ UI 操作或断言：\n\n*   消息队列为空。\n*   当前没有正在执行任务的 `AsyncTask` 实例。\n*   所有开发者定义的空闲资源都处于空闲状态。\n\
  \n通过执行这些检查，Espresso 大大提高了在任何给定时间点只有一个 UI 操作或断言可能发生的可能性。此功能为您提供了更可靠和可信赖的测试结果。\n\n\
  然而，并非在所有情况下都能依赖自动同步，例如，当被测试的应用程序通过 `ThreadPoolExecutor` 执行网络调用时。为了让 Espresso 处理这类长时间运行的异步操作，必须在执行测试之前创建并注册\
  \ `IdlingResource`。当这些操作更新您想要进一步验证的应用程序 UI 时，注册 `IdlingResource` 非常重要。\n\n可以使用 `IdlingResource`\
  \ 的常见用例是当您的应用程序：\n\n*   执行网络调用。\n*   建立数据库连接。\n\n目前，Espresso 提供了以下空闲资源：\n\n*   `CountingIdlingResource`\
  \ — 维护一个活动任务的计数器。当计数器为零时，关联的资源被视为空闲。此功能与信号量非常相似。在大多数情况下，此实现足以管理测试期间应用的异步工作。\n* \
  \  `UriIdlingResource` — 类似于 `CountingIdlingResource`，但计数器需要在一段特定时间内保持为零，资源才被视为空闲。这个额外的等待时间考虑到了连续的网络请求，即线程中的应用可能在收到前一个请求的响应后立即发出一个新请求。\n\
  *   `IdlingThreadPoolExecutor` — 一个自定义的 `ThreadPoolExecutor` 实现，它跟踪所创建线程池中正在运行的任务总数。该类使用\
  \ `CountingIdlingResource` 来维护活动任务的计数器。\n*   `IdlingScheduledThreadPoolExecutor`\
  \ — 一个自定义的 `ScheduledThreadPoolExecutor` 实现。它提供与 `IdlingThreadPoolExecutor` 类相同的功能，但它还可以跟踪计划在未来执行或定期执行的任务。\n\
  \n要在应用程序中开始使用空闲资源机制，必须将以下依赖项添加到应用程序的 `buid.gradle` 文件中（依赖项针对 Android Support 和 AndroidX\
  \ 库列出）。\n\n**Android Support 库中的 IdlingResource 依赖项：**\n\n```\nandroidTestImplementation\
  \ \"com.android.support.test.espresso.idling:idling-concurrent:3.0.1\"\n```\n\n\
  **AndroidX 库中的 IdlingResource 依赖项：**\n\n```\nandroidTestImplementation 'androidx.test.espresso.idling:idling-concurrent:3.1.0'\n\
  ```\n\n这些空闲资源类型在其实现中使用了 `CountingIdlingResource`，因此我们将重点参考 `CountingIdlingResource`。\n\
  \n`IdlingResource` 接口包含三个方法：\n\n*   `getName()` — 返回资源的名称。\n\n    > **注意：** `IdlingResource`\
  \ 名称由 `String` 类表示，并在日志记录以及注册/注销时使用。因此，资源名称应该是唯一的。\n\n*   `isIdleNow()` — 如果资源当前空闲，则返回\
  \ `true`。Espresso 会始终在主线程中调用此方法；因此，它应该是非阻塞的并立即返回。\n\n*   `registerIdleTransitionCallback()`\
  \ — 向空闲资源注册给定的资源回调。然后，在 `isIdleNow()` 方法中使用已注册的回调。\n\n    > **注意：** `IdlingResource`\
  \ 类包含一个 `ResourceCallback` 接口，该接口在 `registerTransitionCallback()` 方法中使用。每当应用程序要从繁忙状态切换到空闲状态时，都应调用\
  \ `callback.onTransitionToIdle()` 方法来通知 Espresso。\n\n`CountingIdlingResource` 是\
  \ `IdlingResource` 的一个实现，它通过维护一个内部计数器来判断空闲状态。当计数器为零时，视为空闲；当计数器非零时，则非空闲。这与 `java.util.concurrent.Semaphore`\
  \ 的行为非常相似。可以从任何线程递增或递减计数器。如果达到非逻辑状态（例如计数器小于零），则会抛出 `IllegalStateException`。然后，此类可用于包装那些在执行过程中会阻止测试访问\
  \ UI 的操作。\n\n## 编写代码\n\n以下是我们应用程序中简单的 `CountingIdlingResource` 的样子（请参阅主应用程序源代码中的\
  \ `util/SimpleCountingIdlingResource.java` 文件）：\n\n```java\npublic final class SimpleCountingIdlingResource\
  \ implements IdlingResource {\n    private final String mResourceName;\n    private\
  \ final AtomicInteger counter = new AtomicInteger(0);\n    // 从主线程写入，从任何线程读取。\n\
  \    private volatile ResourceCallback resourceCallback;\n\n    /**\n     * 创建一个\
  \ SimpleCountingIdlingResource\n     *\n     * @param resourceName 要向 Espresso 报告的资源名称。\n\
  \     */\n    public SimpleCountingIdlingResource(String resourceName) {\n     \
  \   mResourceName = checkNotNull(resourceName);\n    }\n\n    @Override\n    public\
  \ String getName() {\n        return mResourceName;\n    }\n\n    @Override\n  \
  \  public boolean isIdleNow() {\n        return counter.get() == 0;\n    }\n\n \
  \   @Override\n    public void registerIdleTransitionCallback(ResourceCallback resourceCallback)\
  \ {\n        this.resourceCallback = resourceCallback;\n    }\n\n    /**\n     *\
  \ 递增正在监视的资源的进行中事务计数。\n     */\n    public void increment() {\n        counter.getAndIncrement();\n\
  \    }\n\n    /**\n     * 递减正在监视的资源的进行中事务计数。\n     *\n     * 如果此操作导致计数器低于 0 - 则会引发异常。\n\
  \     *\n     * @throws IllegalStateException 如果计数器低于 0。\n     */\n    public void\
  \ decrement() {\n        int counterVal = counter.decrementAndGet();\n        if\
  \ (counterVal == 0) {\n            // 我们已从非零变为零。这意味着我们现在空闲了！告诉 Espresso。\n     \
  \       if (null != resourceCallback) {\n                resourceCallback.onTransitionToIdle();\n\
  \            }\n        }\n        if (counterVal < 0) {\n            throw new\
  \ IllegalArgumentException(\"计数器已损坏！\");\n        }\n    }\n}\n```\n\n`SimpleCountingIdlingResource`\
  \ 类被同一位置中持有其静态引用的 `EspressoIdlingResource` 类所使用（请参阅 `util/EspressoIdlingResource.java`\
  \ 文件），并且它使用其 `increment()` 和 `decrement()` 方法：\n\n```java\npublic class EspressoIdlingResource\
  \ {\n    private static final String RESOURCE = \"GLOBAL\";\n    private static\
  \ SimpleCountingIdlingResource mCountingIdlingResource =\n        new SimpleCountingIdlingResource(RESOURCE);\n\
  \n    public static void increment() {\n        mCountingIdlingResource.increment();\n\
  \    }\n\n    public static void decrement() {\n        mCountingIdlingResource.decrement();\n\
  \    }\n\n    public static IdlingResource getIdlingResource() {\n        return\
  \ mCountingIdlingResource;\n    }\n}\n```\n\n\n\n现在让我们来看一下主应用源代码中`tasks/TasksPresenter.java`类的实现，该类使用了`EspressoIdlingResource`。这个类负责加载待办事项并在待办事项列表中呈现它们。你可以看到，当任务加载过程开始时，会调用`EspressoIdlingResource.increment()`方法来暂停测试。当任务加载完成后，会调用`EspressoIdlingResource.decrement()`来通知\
  \ Espresso 即将进入空闲状态：\n\n```java\nprivate void loadTasks(boolean forceUpdate, final\
  \ boolean showLoadingUI) {\n    if (showLoadingUI) {\n        mTasksView.setLoadingIndicator(true);\n\
  \    }\n    if (forceUpdate) {\n        mTasksRepository.refreshTasks();\n    }\n\
  \    // 网络请求可能在不同的线程中处理，因此请确保 Espresso 知道应用在响应处理完成前处于忙碌状态。\n    EspressoIdlingResource.increment();\
  \ // 应用在进一步通知前保持忙碌\n    mTasksRepository.getTasks(new TasksDataSource.LoadTasksCallback()\
  \ {\n        @Override\n        public void onTasksLoaded(List tasks) {\n      \
  \      List tasksToShow = new ArrayList();\n            // 此回调可能被调用两次：一次用于缓存，一次用于从服务器\
  \ API 加载数据，\n            // 因此我们在递减前进行检查，否则会抛出\"Counter has been corrupted!\"异常。\n\
  \            if (!EspressoIdlingResource.getIdlingResource().isIdleNow()) {\n  \
  \              EspressoIdlingResource.decrement(); // 将应用设为空闲状态。\n            }\n\
  \            ... // 其他代码\n        }\n    }\n}\n```\n\n## 运行第一个测试\n\n为了实际观察`EspressoIdlingResource`的运行情况，我们在`SimpleCountingIdlingResource.java`类的`increment()`和`decrement()`方法中添加一些日志，并运行`addNewToDosChained()`测试：\n\
  \n```java\n@Override\npublic boolean isIdleNow() {\n    Log.d(getName(), \"Counter\
  \ value is \" + counter.get());\n    return counter.get() == 0;\n}\n```\n\n以及：\n\
  \n```java\npublic void decrement() {\n    int counterVal = counter.decrementAndGet();\n\
  \    Log.d(getName(), \"Counter decremented. Value is \" + counterVal);\n    if\
  \ (counterVal == 0) {\n        // 我们从非零变为零。这意味着现在空闲了！通知 Espresso。\n        if (null\
  \ != resourceCallback) {\n            resourceCallback.onTransitionToIdle();\n \
  \       }\n    }\n    if (counterVal < 0) {\n        throw new IllegalArgumentException(\"\
  Counter has been corrupted!\");\n    }\n}\n```\n\n在测试运行期间，观察我们应用程序的 logcat 日志，可以通过`GLOBAL`标签进行过滤。图\
  \ 4-1 展示了你将会看到的内容；每次添加一个待办事项时，待办事项列表会显示给用户，并且计数器会在加载完成后立即递增和递减。\n\n![../images/469090_1_En_4_Chapter/469090_1_En_4_Fig1_HTML.jpg](img/469090_1_En_4_Fig1_HTML.jpg)\n\
  \n**图 4-1** 空闲资源计数器日志记录\n\n`IdlingResource`应在使用前注册。`IdlingRegistry`负责注册和注销`IdlingResource`。\n\
  \n*注册和注销 IdlingResource 实例。*\n\n```kotlin\n@Before\nfun registerResources() {\n\
  \    val idlingRegistry = IdlingRegistry.getInstance()\n    val okHttp3IdlingResource\
  \ = OkHttp3IdlingResource(client)\n    val picassoIdlingResource = PicassoIdlingResource()\n\
  \    idlingRegistry.register(okHttp3IdlingResource)\n    idlingRegistry.register(picassoIdlingResource)\n\
  }\n@After\nfun unregisterResources() {\n    val idlingRegistry = IdlingRegistry.getInstance()\n\
  \    for (idlingResource in idlingRegistry.resources) {\n        if (idlingResource\
  \ == null) {\n            continue\n        }\n        idlingRegistry.unregister(idlingResource)\n\
  \    }\n}\n```\n\n至此，`CountingIdlingResource`机制应该已经清楚了。这个示例描述了我们在测试中处理应用程序长时间运行或异步操作的方法。在使用这类空闲资源时务必小心，不要在测试执行期间将其锁定。\n\
  \n## `OkHttp3IdlingResource`\n\n我们要查看的另一个空闲资源示例是`OkHttp3IdlingResource`。为什么我们要特别关注它？`OkHttp`是最常用的\
  \ HTTP 客户端库之一。它由 Square 开发，并广泛应用于许多 Android 应用程序中。可能正因如此，Square 开发者 Jake Wharton\
  \ 实现并开源了这个资源。请参见：[`github.com/JakeWharton/okhttp-idling-resource`](https://github.com/JakeWharton/okhttp-idling-resource)。以下是它的实现。\n\
  \n*chapter4.idlingresources.OkHttp3IdlingResource.kt。*\n\n```java\npublic final\
  \ class OkHttp3IdlingResource implements IdlingResource {\n    @CheckResult\n  \
  \  @NonNull\n    @SuppressWarnings(\"ConstantConditions\") // 作为库的额外防护。\n    public\
  \ static OkHttp3IdlingResource create(@NonNull String name, @NonNull OkHttpClient\
  \ client) {\n        if (name == null) throw new NullPointerException(\"name ==\
  \ null\");\n        if (client == null) throw new NullPointerException(\"client\
  \ == null\");\n        return new OkHttp3IdlingResource(name, client.dispatcher());\n\
  \    }\n    private final String name;\n    private final Dispatcher dispatcher;\n\
  \    volatile ResourceCallback callback;\n    private OkHttp3IdlingResource(String\
  \ name, Dispatcher dispatcher) {\n        this.name = name;\n        this.dispatcher\
  \ = dispatcher;\n        dispatcher.setIdleCallback(new Runnable() {\n         \
  \   @Override public void run() {\n                ResourceCallback callback = OkHttp3IdlingResource.this.callback;\n\
  \                if (callback != null) {\n                    callback.onTransitionToIdle();\n\
  \                }\n            }\n        });\n    }\n    @Override public String\
  \ getName() {\n        return name;\n    }\n    @Override public boolean isIdleNow()\
  \ {\n        return dispatcher.runningCallsCount() == 0;\n    }\n    @Override public\
  \ void registerIdleTransitionCallback(ResourceCallback callback) {\n        this.callback\
  \ = callback;\n    }\n}\n```\n\n基本上，这个资源开箱即用，几乎所有事情都为我们处理好了。`isIdleNow()`方法中调用的`dispatcher.runningCallsCount()`方法会返回正在运行的同步和异步请求数量，并与零进行比较。当结果为零时，资源处于空闲状态。不过，要使用它，我们仍然需要执行一些步骤：\n\
  \n1.  在`build.gradle`文件中添加依赖：\n    ```\n    androidTestCompile 'com.jakewharton.espresso:okhttp3-idling-resource:1.0.0'\n\
  \    ```\n2.  在你的测试代码中，获取`OkHttpClient`实例并创建一个空闲资源：\n    ```java\n    OkHttpClient\
  \ client = // ... 获取 OkHttpClient 实例\n    IdlingResource resource = OkHttp3IdlingResource.create(\"\
  OkHttp\", client);\n    ```\n3.  在运行任何 Espresso 测试之前，在测试代码中注册空闲资源：\n    ```java\n\
  \    IdlingRegistry.getInstance().register(resource);\n    ```\n\n顺便说一下，不要使用已废弃的`Espresso.registerIdlingResources()`方法；而应使用本节中展示的`IdlingRegistry`实现。\n\
  \n## `PicassoIdlingResource`\n\nPicasso 是 Square 为 Android 开发的一个强大的图片下载和缓存库。Picasso\
  \ 允许在应用程序中轻松加载图片——通常只需一行代码（[`square.github.io/picasso/`](http://square.github.io/picasso/)）：\n\
  \n```java\nPicasso.get().load(\"http://i.imgur.com/DvpvklR.png\").into(imageView);\n\
  ```\n\nPicasso 是 Android 最流行的图片下载库，这意味着它是另一种`IdlingResource`类型的完美候选。当我们希望确保整个应用程序窗口布局连同图形资源一起加载完成时，可以使用图片下载空闲资源。在需要验证测试中的图形资源时，这一点极其重要。以下是在`androidTest/com.squareup.picasso`包中同样实现的`PicassoIdling`资源示例。\n\
  \n*androidTest/com.squareup.picasso.PicassoIdlingResource.java。*\n\n\n```java\n\
  public class PicassoIdlingResource implements IdlingResource, ActivityLifecycleCallback\
  \ {\n    private static final int IDLE_POLL_DELAY_MILLIS = 100;\n    private ResourceCallback\
  \ mCallback;\n    private WeakReference mPicassoWeakReference;\n    private final\
  \ Handler mHandler = new Handler(Looper.getMainLooper());\n\n    @Override\n   \
  \ public String getName() {\n        return \"PicassoIdlingResource\";\n    }\n\n\
  \    @Override\n    public boolean isIdleNow() {\n        if (isIdle()) {\n    \
  \        notifyDone();\n            return true;\n        } else {\n           \
  \ /* 强制在一小段时间后重新检查空闲状态。\n             * 如果 isIdleNow() 返回 false，Espresso 只会每隔几秒轮询一次，这可能会拖慢测试速度。\n\
  \             */\n            mHandler.postDelayed(new Runnable() {\n          \
  \      @Override\n                public void run() {\n                    isIdleNow();\n\
  \                }\n            }, IDLE_POLL_DELAY_MILLIS);\n            return\
  \ false;\n        }\n    }\n\n    public boolean isIdle() {\n        return mPicassoWeakReference\
  \ == null\n                || mPicassoWeakReference.get() == null\n            \
  \    || mPicassoWeakReference.get().targetToAction.isEmpty();\n    }\n\n    @Override\n\
  \    public void registerIdleTransitionCallback(ResourceCallback resourceCallback)\
  \ {\n        mCallback = resourceCallback;\n    }\n\n    void notifyDone() {\n \
  \       if (mCallback != null) {\n            mCallback.onTransitionToIdle();\n\
  \        }\n    }\n\n    @Override\n    public void onActivityLifecycleChanged(Activity\
  \ activity, Stage stage) {\n        switch (stage) {\n            case RESUMED:\n\
  \                mPicassoWeakReference = new WeakReference(Picasso.with(activity));\n\
  \                break;\n            case PAUSED:\n                // 清理引用\n   \
  \             mPicassoWeakReference = null;\n                break;\n          \
  \  default: // 无操作\n        }\n    }\n}\n```\n\n注意：Picasso 的 `IdlingResource` 之所以放在一个单独的包中，是因为\
  \ `Picasso` 类中 `targetToAction` 变量的可见性为包保护级别。\n\n## 作为 `IdlingResource` 替代方案的 `ConditionWatcher`\n\
  \n正如你可能注意到的，`IdlingResource` 的实现并不简单，需要对注册和注销进行持续的控制。此外，在需要特定 Activity 实例才能运行的深度\
  \ UI 测试中，使用 `IdlingResource` 也不方便。\n\n作为替代方案，你可以尝试使用 AzimoLabs 的 `ConditionWatcher`\
  \ 类（`https://github.com/AzimoLabs/ConditionWatcher`）。它是一个简单的类，能使 Android 自动化测试更简单、更快速、更清晰、更直观。它可以将可能出现在任何线程上的操作与测试线程同步。`ConditionWatcher`\
  \ 可以替代 Espresso 的 `IdlingResources`，也可以与它们并行工作。\n\n其工作原理如下：`ConditionWatcher` 接收一个包含逻辑表达式的\
  \ `Instruction` 类实例。测试会暂停，直到条件返回 `true`。之后，测试会立即释放。如果在指定的超时时间内条件未满足，则会抛出异常，测试将失败。\n\
  \n`ConditionWatcher` 在其被请求的同一线程（即测试线程）上执行操作。默认情况下，`ConditionWatcher` 包含三个方法：\n\n\
  - `setWatchInterval()` — 设置周期性检查逻辑表达式的时间间隔。默认设置为 250 毫秒。\n- `setTimeoutLimit()`\
  \ — 设置 `ConditionWatcher` 等待 `checkCondition()` 方法返回真值的超时时间。默认设置为 60 秒。\n- `waitForCondition()`\
  \ — 接收包含逻辑表达式的指令作为参数，并以当前设置的时间间隔调用其 `checkCondition()` 方法，直到该方法返回 `true` 或达到超时时间。在此期间，测试代码将不会执行到下一行。如果达到超时时间，则会抛出\
  \ `Exception`。\n\n另一方面，`Instruction` 类的结构与 `IdlingResource` 非常相似：\n\n- `checkCondition()`\
  \ — 核心方法，相当于 `IdlingResource` 的 `isIdleNow()`。它是一个逻辑表达式，其变化以及被监控的动态资源状态应该在此方法中实现。\n\
  - `getDescription()` — 随超时异常一起返回的字符串。测试作者可以包含对测试崩溃调试过程有帮助的信息。\n- `setDataContainer()`\
  \ 和 `getDataContainer()` — 一个捆绑包，可以添加到 `Instruction` 类中，用于共享原始类型（例如，可以创建一个通用的指令，等待任何类型的视图变为可见，而\
  \ `resId` 可以通过该捆绑包发送）。\n\n为了开始使用 `ConditionWatcher`，需要在 `build.gradle` 文件中添加以下依赖：\n\
  \n```\ndependencies {\n    androidTestCompile 'com.azimolabs.conditionwatcher:conditionwatcher:0.2'\n\
  }\n```\n\n或者直接将 `ConditionWatcher.java` 和 `Instruction.java` 这两个类的源代码复制到你的测试源代码中。\n\
  \n`ConditionWatcher` 最简单的用法示例是等待元素在屏幕上显示的条件：\n\n```\nConditionWatcher.waitForCondition(new\
  \ Instruction() {\n    @Override\n    public String getDescription() {\n       \
  \ return \"waitForElementIsDisplayed\"; // 等待元素显示\n    }\n\n    @Override\n    public\
  \ boolean checkCondition() {\n        try {\n            interaction.check(matches(isDisplayed()));\n\
  \            return true;\n        } catch (NoMatchingViewException ex) {\n    \
  \        return false;\n        }\n    }\n});\n```\n\n我更喜欢将 `ConditionWatcher` 封装到一个方法中，而不是创建一个继承\
  \ `Instruction` 的类。接下来，你将看到来自 `ConditionWatchers.java` 类的 `waitForElementIsDisplayed(final\
  \ ViewInteraction interaction, final int timeout)` 观察器示例：\n\n```\npublic static\
  \ ViewInteraction waitForElementIsDisplayed(\n        final ViewInteraction interaction,\n\
  \        final int timeout) throws Exception {\n    ConditionWatcher.setTimeoutLimit(timeout);\n\
  \    ConditionWatcher.waitForCondition(new Instruction() {\n        @Override\n\
  \        public String getDescription() {\n            return \"waitForElementIsDisplayed\"\
  ; // 等待元素显示\n        }\n\n        @Override\n        public boolean checkCondition()\
  \ {\n            try {\n                interaction.check(matches(isDisplayed()));\n\
  \                return true;\n            } catch (NoMatchingViewException ex)\
  \ {\n                return false;\n            }\n        }\n    });\n    return\
  \ interaction;\n}\n```\n\n通过这种 `waitForElementIsDisplayed()` 的实现，我们获得了一个重要的好处——如果观察器接收\
  \ `ViewInteraction` 作为参数，包装方法可以返回相同的 `ViewInteraction`，这简化了我们的测试源代码：\n\n```\nprivate\
  \ ViewInteraction addTaskFab = onView(withId(R.id.fab_add_task));\n\n@Test\npublic\
  \ void waitForElementCondition() throws Exception {\n    waitForElementIsDisplayed(addTaskFab,\
  \ 4000).perform(click());\n}\n```\n\n现在让我们转向更复杂的例子。在我们的示例应用中，有一个烦人的 snackbar，每次添加新的待办事项时都会弹出。它不允许我们在等待它消失之前添加多个待办事项到列表中。我们的任务是创建一个观察器，等待\
  \ snackbar 视图消失。以下是实现方法。\n\n*chapter4.conditionwatchers.ConditionWatchers.tasksListSnackbarGone().*\n\
  \n```\npublic static void tasksListSnackbarGone() throws Exception {\n    ConditionWatcher.waitForCondition(new\
  \ Instruction() {\n        @Override\n        public String getDescription() {\n\
  \            return \"Condition tasksListSnackbarGone\"; // 条件：任务列表中的 Snackbar 消失\n\
  \        }\n\n        @Override\n        public boolean checkCondition() {\n   \
  \         final FragmentActivity fragmentActivity = getCurrentActivity();\n    \
  \        if (fragmentActivity != null) {\n                Fragment currentFragment\
  \ = fragmentActivity\n                        .getSupportFragmentManager()\n   \
  \                     .findFragmentById(R.id.contentFrame);\n                if\
  \ (currentFragment instanceof TasksFragment) {\n                    View contentView\
  \ =\n                            fragmentActivity.getWindow().getDecorView().findViewById(android.R.id.content);\n\
  \                    if (contentView != null) {\n                        TextView\
  \ snackBarTextView =\n                                contentView.findViewById(android.support.design.R.id.snackbar_text);\n\
  \                        return snackBarTextView == null;\n                    }\n\
  \                }\n            }\n            return false;\n        }\n    });\n\
  }\n```\n\n\n`ConditionWatchers` 在我们需要等待不同视图状态时非常有用，但我们不应过度依赖它们来延长等待时间。当某个视图状态等待时间过长时，可能会引发问题。如果等待时间过长，可能会被误认为是测试应用本身的问题，此时更合理的做法是提交一个\
  \ bug 报告，而不是在测试中处理该问题。理想情况下，在大多数场景中，`IdlingResources` 应处理应用非空闲状态的大部分时间，因此 `ConditionWatchers`\
  \ 仅应作为等待机制的少量补充，并像示例中的 snackbar 那样偶尔使用。\n\n## 练习 12\n\n**在测试中使用 `ConditionWatcher`**\n\
  \n1.  实现一个测试，打开菜单抽屉并导航到另一个界面。在该测试中，添加一个条件监视器，等待菜单抽屉显示或隐藏。对于显示状态，使用 `ViewMatchers.isDisplayed()`；对于隐藏状态，使用\
  \ hamcrest 的 `CoreMatchers.not(ViewMatchers.isDisplayed())`。\n\n2.  实现一个可与 `DataInteraction`\
  \ 类型配合使用的 `waitForElement() ConditionWatcher`。以 `ViewInteraction waitForElement()`\
  \ 函数作为参考。\n\n## 将条件监视器集成到 Espresso Kotlin DSL 中\n\n第 3 章以 Espresso Kotlin DSL 为例，展示了更简洁紧凑的测试代码。你可能已经注意到，在当前实现中，`ConditionWatchers`\
  \ 类中的所有函数尚无法以类似方式使用。问题在于 `ConditionWatchers` 以及其他 Espresso 方法与测试代码在同一位置、同一时间执行，这与\
  \ `IdlingResources` 的使用方式相反 —— `IdlingResources` 需要在测试运行前注册（通常在 `@Before` 方法中）。\n\
  \n因此，理想情况下 `ConditionWatchers` 应成为 Espresso Kotlin DSL 的一部分，并在编写测试代码时作为链式调用之一使用。以下展示了如何将\
  \ `ConditionWatchers` 声明为 DSL 的一部分（实现细节见 `EspressoDsl.kt`）：\n\n- `ConditionWatchers.waitForElement()`：\n\
  - `ConditionWatchers.waitForElementFullyVisible()`：\n\n```kotlin\nfun ViewInteraction.wait():\
  \ ViewInteraction =\nConditionWatchers.waitForElement(this, FOUR_SECONDS)\n```\n\
  \n- `ConditionWatchers.waitForElementIsGone()`：\n\n```kotlin\nfun ViewInteraction.waitFullyVisible():\
  \ ViewInteraction =\nConditionWatchers.waitForElementFullyVisible(this, FOUR_SECONDS)\n\
  ```\n\n```kotlin\nfun ViewInteraction.waitForGone(): ViewInteraction =\nConditionWatchers.waitForElementIsGone(this,\
  \ FOUR_SECONDS)\n```\n\n所有示例均返回 `ViewInteraction` 类型，并可如下所示链式调用到 Espresso 测试代码中。\n\
  \n*`chapter3.testsamples.ViewActionsKotlinDslTest.addsNewToDoWithWaiterDsl()`。*\n\
  \n```kotlin\n@Test\nfun addsNewToDoWithWaiterDsl() {\n// 添加新的待办事项\naddFab.click()\n\
  taskTitleField.wait().type(toDoTitle).closeKeyboard()\ntaskDescriptionField.type(toDoDescription).closeKeyboard()\n\
  editDoneFab.click()\nsnackbar.waitForGone()\n// 验证待办事项列表中显示了包含标题的新待办事项\nviewWithText(toDoTitle).checkDisplayed()\n\
  }\n```\n\n## 练习 13\n\n**`ConditionWatcher` 作为 DSL 的一部分**\n\n1.  实现一个测试，打开菜单抽屉并导航到另一个界面。在该测试中，添加一个条件监视器，等待菜单抽屉显示或隐藏。对于显示状态，使用\
  \ `ViewMatchers.isDisplayed()`；对于隐藏状态，使用 hamcrest 的 `CoreMatchers.not(ViewMatchers.isDisplayed())`。\n\
  \n2.  将上一任务中的 `DataInteraction waitForElement()` 函数作为 DSL 的一部分。\n\n## 总结\n\n正确处理网络操作和异步操作是\
  \ UI 测试中必不可少的环节。应用 `IdlingResource` 或 `ConditionWatcher` 能让你的 UI 测试更加稳定可靠。只要使用过一次，你就会清楚：完全没必要在整个测试中滥用显式的\
  \ `Thread.sleep()` 方法，这种做法既糟糕又容易出错。\n\n"
- "# 5. 使用 IntentMatchers 验证和存根 Intent\n\n在本章中，我们将讨论如何验证和存根应用程序的 Intent。Intent 是一种消息传递对象，可用于请求另一个应用组件执行操作。Intent\
  \ 通过多种方式促进组件之间的通信。根据 Android Intent 和过滤器文档（[`https://developer.android.com/guide/components/intents-filters`](https://developer.android.com/guide/components/intents-filters)），主要有三种基本用例：\n\
  \n- **启动 Activity** —— Activity 代表 Android 应用程序中的单个屏幕。通过向 `Context.startActivity(Intent)`\
  \ 传递 Intent 即可启动 Activity 实例。传递的 Intent 应包含关于将启动哪个 Activity 的信息，并可能包含额外数据。当我们期待从启动的\
  \ Activity 接收结果时，使用 `Context.startActivityForResult(Intent)` 方法。结果以 Intent 对象的形式返回，并可在\
  \ `Activity.onActivityResult()` 回调中处理。\n\n- **启动服务** —— Android 中的服务代表一种在后台执行操作的机制。与\
  \ Activity 类似，通过向 `Context.startService(Intent)` 传递 Intent 来启动服务。提供的 Intent 定义了要启动的服务，并可能包含额外数据。\n\
  \n- **发送广播** —— 广播代表一种可由任何应用或系统发送和接收的消息。系统广播的一个示例是系统启动事件。通过向 `Context.sendBroadcast(Intent)`\
  \ 传递 Intent，可以将广播发送到其他应用。\n\n以下是属于这些 Intent 类型的 Intent 示例：\n\n- **启动 Activity 的\
  \ Intent** —— 通常用于为获取结果而启动 Activity 的 Intent。例如，在 Gmail 中点击附件按钮，会打开文件浏览器，以便查找并将文件附加到邮件中。\n\
  \n- **启动服务的 Intent** —— 用于触发在后台运行的长时间进程，如文件下载或监听某些系统事件（如连接状态变化）。\n\n- **发送广播** ——\
  \ 当需要发送本地 Intent 时使用，这意味着我们希望向与发送方位于同一应用中的接收器广播；或者只是将我们的广播发送给系统中所有能处理它的应用。一个示例是发送短信的广播。\n\
  \n你可能已经知道，Espresso 无法在被测应用之外运行，这在启动 Activity Intent 或发送广播时是常见情况。因此，为了使 Espresso\
  \ 测试独立且封闭，我们需要使用 Espresso-Intents，它是 Espresso 的扩展，用于验证和存根被测应用发出的 Intent。\n\n## 设置依赖项\n\
  \n为了使用 Espresso-Intents，需要在应用模块的 `build.gradle` 文件中添加以下代码行：\n\n**Android Testing\
  \ Support Library Espresso-Intents 依赖项。**\n\n```groovy\nandroidTestImplementation\
  \ 'com.android.support.test.espresso:espresso-intents:3.0.2'\n```\n\n**AndroidX\
  \ Test Library Espresso-Intents 依赖项。**\n\n```groovy\nandroidTestImplementation 'androidx.test.espresso:espresso-intents:3.1.0'\n\
  ```\n\n**注意：** Espresso-Intents 仅兼容 Espresso 2.1+ 和 Testing Support library 0.3+\
  \ 或 AndroidX Test library。\n\n因此，为了满足此兼容性要求，还必须更新以下依赖项。\n\n**Android Testing Support\
  \ Library 依赖项。**\n\n```groovy\nandroidTestImplementation 'com.android.support.test:runner:1.0.2'\n\
  androidTestImplementation 'com.android.support.test:rules:1.0.2'\nandroidTestImplementation\
  \ 'com.android.support.test.espresso:espresso-core:3.0.2'\n```\n\n或者，如果使用 AndroidX\
  \ Test library，则需要以下内容。\n\n**AndroidX Test library 依赖项。**\n\n\n```groovy\nandroidTestImplementation\
  \ 'androidx.test:runner:1.1.0'\nandroidTestImplementation 'androidx.test:rules:1.1.0'\n\
  androidTestImplementation 'androidx.test.espresso:espresso-core:3.1.0'\n```\n\n\
  在第 1 章中，我们讨论了`ActivityTestRule`在 Espresso 测试中的目的和作用。与`ActivityTestRule`类似，Espresso\
  \ 还提供了`IntentsTestRule`，它是`ActivityTestRule`的扩展，必须在需要桩化(stub)或验证意图(intents)时使用。与`ActivityTestRule`的情况一样，`IntentsTestRule`会在每个带有`@Test`注解的测试执行前初始化\
  \ Espresso-Intents，并在每次测试运行后释放 Espresso-Intents。\n\n以下是`IntentsTestRule`的示例：\n\n\
  ```kotlin\n@get:Rule\nvar intentsTestRule = IntentsTestRule(TasksActivity::class.java)\n\
  ```\n\n我们的示例应用包含为待办事项附加图片的功能，这是一个用于获取结果意图(activity for a result intent)的示例，该意图从系统接收图片文件。图\
  \ 5-1 展示了当启动活动意图(start activity intent)发送给第三方应用时的意图流。\n\n![../images/469090_1_En_5_Chapter/469090_1_En_5_Fig1_HTML.jpg](img/469090_1_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1** 活动意图流（图片来源：[`https://developer.android.com/guide/components/intents-filters`](https://developer.android.com/guide/components/intents-filters)）\n\
  \n第 1 步展示了从我们的应用发送启动活动意图，以通知系统需要将某些功能委托给第三方应用。接着，系统会知道在第 1 步中可以发送给哪些应用；如果至少找到一个应用，系统会重新将同一个活动意图传输给它，如第\
  \ 2 步所示。在第 3 步中，被选中的应用接收该意图并启动相应的活动。对于通过`startActivityForResult()`发送的意图，所启动活动的结果（例如，从图库或相册应用中选择的图片链接）会返回给最初创建该意图的应用。现在是时候了解\
  \ Espresso 如何桩化发送到应用上下文之外的第三方应用的意图。\n\n## 桩化活动意图(Stubbing Activity Intents)\n\n\
  如前所述，Espresso 不支持离开测试上下文下的应用，即离开被测试的应用，以便与第三方应用交互。因此，Espresso 通过`Intents`类中的`intending()`方法提供了桩化机制。\n\
  \n该方法允许桩化意图响应，并且在启动意图的活动期望返回数据时特别有用（尤其是当目标活动是外部活动时）。在这种情况下，测试编写者可以调用：\n\n```java\n\
  intending(intentMatcher).thenRespond(myResponse)\n```\n\n并验证启动活动是否正确处理了结果。\n\n>\
  \ **注意：** 在此代码示例中，第三方应用的目标活动将不会被启动。\n\n## 桩化无返回结果的意图\n\n意图桩化的第一个用例可以将我们的应用与任何可能导致启动第三方应用状态的操作隔离开来。为此，Espresso\
  \ 的`intending()`机制支持桩化非内部意图，即不属于我们应用的意图。以下是它在测试类的`@Before`方法中的实现方式。\n\n*chapter5.StubAllIntentsTest.kt*\n\
  \n```kotlin\n@Before\nfun stubAllExternalIntents() {\n    // 默认情况下，Espresso Intents\
  \ 不会桩化任何 Intents。\n    // 桩化需要在每次测试运行前设置。\n    // 在此情况下，所有外部 Intents 都将被阻止。\n  \
  \  intending(not(isInternal()))\n        .respondWith(Instrumentation.ActivityResult(Activity.RESULT_OK,\
  \ null))\n}\n```\n\n> **注意：** 带有`@Before`注解的方法会在每个测试用例运行之前执行。\n\n你可以在该代码示例中看到两个新方法：\n\
  \n* `isInternal()` — 意图匹配器，如果意图的包名与插桩测试的目标包名相同，则匹配该意图。\n* `Instrumentation.ActivityResult(Activity.RESULT_OK,\
  \ null)` — `ActivityResult`类，允许我们创建一个新的`ActivityResult`，该结果将以指定的结果代码传播回原始活动。有关更多详细信息，请参阅\
  \ Android 的`Instrumentation.java`类和`Activity.setResult()`方法。\n\n我们从第 1 章和第 2 章中已经熟悉了\
  \ hamcrest 匹配器。`IntentMatchers`具有类似的功能。除了意图匹配器之外，Espresso 还提供了`BundleMatchers`、`ComponentNameMatchers`和`UriMatchers`，它们与`IntentMatchers`配合使用。以下是所有这些匹配器的简要概述。\n\
  \n**`IntentMatchers`**：\n* `anyIntent()` — 匹配任何意图。\n* `hasAction()` — 通过意图动作匹配意图。最常见的示例是`Intent.ACTION_CALL`用于执行电话呼叫动作，或`Intent.ACTION_SEND`用于发送电子邮件或短信。有关更多动作类型，请参阅\
  \ Android 的`Intent.java`类。\n* `hasCategories()` — 匹配意图类别，它是一个包含有关应处理意图的组件类型的附加信息的字符串。例如，`CATEGORY_LAUNCHER`的字符串值为`android.intent.category.LAUNCHER`，用于指定初始应用活动。\n\
  * `hasComponent()` — 可以通过类名、包名或短类名匹配意图。使用`ComponentNameMatchers`。\n* `hasData()`\
  \ — 匹配具有该意图正在操作的特定数据的意图。通常使用`content:`方案，在内容提供者中指定数据。其他方案可能由特定活动处理，例如`http:`由网络浏览器处理。使用`UriMatchers`。\n\
  * `hasExtraWithKey()` — 匹配具有附加到意图的特定 Bundle 的意图。使用一个接受 Bundle 匹配器作为参数的`hasExtras()`方法。\n\
  * `hasExtra()` — 与`hasExtras()`相同，但针对额外数据。\n* `hasExtras()` — 匹配具有特定扩展数据或额外数据的意图。此数据通过重载的`Intent.putExtra()`方法之一以`<名称,\
  \ 值>`对的形式放入意图中。额外参数的名称必须包含包前缀。例如，应用`com.android.contacts`会使用像`com.android.contacts.ShowAll`这样的名称。\n\
  * `hasType()` — 匹配包含显式 MIME 类型的意图。\n* `hasPackage()` — 匹配仅限于指定应用包名的意图。\n* `toPackage()`\
  \ — 根据可以处理意图的活动的包名来匹配意图。\n* `hasFlag()` — 与`getFlags()`相同。\n* `hasFlags()` — 匹配具有指定标志的意图。标志列表可在[`https://developer.android.com/reference/android/content/Intent#setFlags(int)`](https://developer.android.com/reference/android/content/Intent%2523setFlags%2528int%2529)找到。\n\
  * `isInternal()` — 如果意图的包名与插桩测试的目标包名相同，则匹配该意图。\n\n**`BundleMatchers`** 类表示用于意图 Bundle\
  \ 的 hamcrest 匹配器。Bundle 通常以`<键, 值>`对的形式用于在活动之间传递数据。\n* `hasEntry()` — 基于`<键, 值>`对匹配\
  \ Bundle 对象。\n* `hasKey()` — 基于键匹配 Bundle 对象。\n* `hasValue()` — 基于值匹配 Bundle 对象。\n\
  \n**`ComponentNameMatchers`**：\n* `hasClassName()` — 基于类名匹配组件。\n* `hasPackageName()`\
  \ — 基于提供的包名匹配组件。\n* `hasShortClassName()` — 基于短类名匹配组件。\n\n\n"
- "# 文档排版\n\n## 匹配器说明\n\n- `hasMyPackageName()` — 匹配基于通过 Instrumentation Registry\
  \ 为测试找到的目标包名的组件。\n\n`UriMatchers` 用于基于 URI 对象匹配 Intent。例如，如果动作为 `ACTION_EDIT`，数据应包含要编辑的文档的\
  \ URI。\n\n- `hasHost()` — 基于主机匹配 URI 对象。例如，如果 authority 是 `\"bob@google.com\"`，此方法将尝试基于\
  \ `\"google.com\"` 匹配该对象。\n- `hasParamWithName()` — 基于参数名称匹配 URI 对象。\n- `hasParamWithValue()`\
  \ — 基于参数值匹配 URI 对象。\n- `hasPath()` — 基于路径匹配 URI 对象。例如：`mailto:nobody@google.com`。\n\
  - `hasSchemeSpecificPart()` — 基于特定 scheme 部分匹配 URI 对象。这是 scheme 分隔符 `':'` 和 fragment\
  \ 分隔符 `'#'` 之间的所有内容。如果是相对 URI，此方法返回整个 URI。例如：`\"//www.google.com/search?q=android\"\
  `。\n\n现在让我们回到 `chapter5.StubAllIntentsTest.kt` 类，看看 Intent 桩如何工作。以下是该类的实现。\n\n*chapter5.StubAllIntentsTest.kt*\n\
  \n```kotlin\nclass StubAllIntents {\n    @get:Rule\n    var intentsTestRule = IntentsTestRule(TasksActivity::class.java)\n\
  \    \n    private var toDoTitle = \"\"\n    private var toDoDescription = \"\"\n\
  \    \n    // 测试中使用的 ViewInteractions\n    private val addFab = viewWithId(R.id.fab_add_task)\n\
  \    private val taskTitleField = viewWithId(R.id.add_task_title)\n    private val\
  \ taskDescriptionField = viewWithId(R.id.add_task_description)\n    private val\
  \ editDoneFab = viewWithId(R.id.fab_edit_task_done)\n    private val shareMenuItem\
  \ = onView(allOf(withId(R.id.title), withText(R.string.share)))\n    \n    @Before\n\
  \    fun setUp() {\n        toDoTitle = TestData.getToDoTitle()\n        toDoDescription\
  \ = TestData.getToDoDescription()\n    }\n    \n    @Before\n    fun stubAllExternalIntents()\
  \ {\n        // 默认情况下，Espresso Intents 不会对任何 Intent 进行桩化。桩化需要在每次测试运行前设置。\n     \
  \   // 在这种情况下，所有外部 Intent 将被阻止。\n        intending(not(isInternal()))\n        \
  \    .respondWith(Instrumentation.ActivityResult(Activity.RESULT_OK, null))\n  \
  \  }\n    \n    @Test\n    fun stubsShareIntent() {\n        // 添加新的待办事项\n     \
  \   addFab.click()\n        taskTitleField.type(toDoTitle).closeKeyboard()\n   \
  \     taskDescriptionField.type(toDoDescription).closeKeyboard()\n        editDoneFab.click()\n\
  \        \n        // 验证在待办事项列表中显示了包含标题的新待办事项\n        viewWithText(toDoTitle).checkDisplayed()\n\
  \        openContextualActionModeOverflowMenu()\n        shareMenuItem.click()\n\
  \        //viewWithText(toDoTitle).click()\n    }\n}\n```\n\n我们的类包含一个简单的测试，它添加一个新的待办事项，然后点击操作栏菜单中的分享按钮。如您所见，我们使用了\
  \ `IntentsTestRule` 和 `stubAllExternalIntents()` 方法。`stubsShareIntent()` 测试在列表中添加一个新的待办事项，打开操作栏菜单，然后点击分享选项，该选项会触发分享\
  \ Intent 并将其发送到系统。在实际使用场景中，系统会将此 Intent 重定向到另一个应用程序。如果系统有多个可以处理该 Intent 的应用程序，则会弹出显示选项的弹出窗口。\n\
  \n在我们的案例中，在每个测试方法之前运行的 `stubsAllExternalIntents()` 方法将执行其工作，Intent 不会离开应用程序。尝试运行测试并查看结果。图\
