    \ depth values, but lowering the depth value can lead to failed\n    tests).\n\
    \n*   Generated code can be massive and hard to read.\n\n*   It has limited assertion\
    \ support.\n\n*   Automatically generated tests usually require additional\n \
    \   customization.\n\n*   There is no support for application delays caused by\
    \ network\n    requests, so you should manually create and register an `IdlingResource`.\n\
    \n*   WebView layouts are not supported.\n\nExercise 24\n\n**Using the Espresso\
    \ Test Recorder**\n\n1.  Record a test that adds and edits a new TO-DO with assertions.\
    \ Save\n    the test class in the Kotlin language. Observe the generated code.\
    \ Run\n    the recorded test.\n\n2.  Open Android Studio Preferences ➤ Espresso\
    \ Test Recorder and lower\n    the Max UI depth and Assertion Depth to 1\\. Record\
    \ the test described in\n    Step 1\\. Observe the generated code and compare\
    \ it to the code from Step\n    1\\. Run the recorded test."
