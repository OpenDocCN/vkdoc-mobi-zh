- fmt: 'Espresso 是一个很好的测试框架，但不可能用预定义的方法和类覆盖所有测试自动化场景。就像 Android 的基础组件可以在应用程序开发过程中自定义一样，Espresso
    使我们能够自定义其组件。工程师可以自由创建自己的操作、匹配器和失败处理程序，并将其插入到测试中。在本章中，我们将学习如何创建自定义视图、滑动和 RecyclerView
    操作；理解如何构建不同类型的匹配器；以自定义方式处理测试失败；以及在失败时截取适当的屏幕截图。


    ## 编写自定义 ViewAction


    `ViewAction` 是 Espresso 最常用的功能之一。Espresso 提供了大量的 `ViewAction`，但由于它们可能不适合我们的特定需求，我们需要更多。根据我的实践经验，大多数情况下，以下视图操作类型需要自定义：


    *   滑动操作

    *   RecyclerView 操作

    *   `ViewAction`


    我们还将讨论在本章中为特定情况自定义简单点击操作的示例。


    ## 适配 Espresso 滑动操作


    在第 1 章中，我们提到了 Espresso 提供的四种滑动操作——`swipeUp()`、`swipeDown()`、`swipeLeft()` 和 `swipeRight()`。这是
    `swipeUp()` 操作的实现方式：


    ```

    public static ViewAction swipeUp() {

    return actionWithAssertions(new GeneralSwipeAction(Swipe.FAST,

    GeneralLocation.translate(GeneralLocation.BOTTOM_CENTER, 0, -EDGE_FUZZ_FACTOR),

    GeneralLocation.TOP_CENTER, Press.FINGER));

    }

    ```


    正如你可能猜到的，`GeneralLocation.BOTTOM_CENTER` 和 `GeneralLocation.TOP_CENTER` 代表了我们要滑动的视图内部的
