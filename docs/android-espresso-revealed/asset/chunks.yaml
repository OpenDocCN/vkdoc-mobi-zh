    \ (`ToDoListScreen`, `StatisticsScreen`,\netc.). In this situation, we have two\
    \ options—we can duplicate the code\nin each screen (which we don’t want) or we\
    \ can create the new class\nsimilar to the screen but that will represent the\
    \ common view. Since it\ndoesn’t represent the screen itself, we will call it\
    \ `MenuDrawerView`. In\nthe example application, it is implemented inside the\
