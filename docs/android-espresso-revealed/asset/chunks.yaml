    \ that can handle the intent.\n* `hasFlag()` — Same as `getFlags()`.\n* `hasFlags()`\
    \ — Matches an intent with specified flag(s) associated with it. The list of flags\
    \ can be found at [`https://developer.android.com/reference/android/content/Intent#setFlags(int)`](https://developer.android.com/reference/android/content/Intent%2523setFlags%2528int%2529).\n\
