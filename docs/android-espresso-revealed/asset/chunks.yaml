- fmt: '`ConditionWatchers` can be extremely helpful when we have to wait for the
    different view states, but we should not overuse them in terms of waiting time.
    A problem can occur in cases when we may wait too much for a specific state of
    the view to be reached. When this waiting time becomes too long, it can seem like
    an issue with the application being tested and it is better to raise a bug than
    handle it inside your tests. Ideally, in most situations, `IdlingResources` should
    handle the majority of time the application is not idle, so `ConditionWatchers`
    should be a small addition to the waiting mechanism and be used occasionally,
    like in our snackbar case.


    ## Exercise 12


    **Using a `ConditionWatcher` in a Test**


    1.  Implement a test that opens the menu drawer and navigates to another section.
    In this test, add a condition watcher that waits for a menu drawer to be shown
    or hidden. Use `ViewMatchers.isDisplayed()` for the shown state and hamcrest `CoreMatchers.not(ViewMatchers.isDisplayed())`
    for hidden.


    2.  Implement a `waitForElement() ConditionWatcher` that can be used with the
    `DataInteraction` type. Use the `ViewInteraction waitForElement()` function as
    a reference.


    ## Making Condition Watchers Part of Espresso Kotlin DSL


    Chapter [3](#469090_1_En_3_Chapter.xhtml) explained the Espresso Kotlin DSL as
    an example of much cleaner and compact test code. As you may notice, in the current
    implementation, all the functions from the `ConditionWatchers` class are not yet
    ready to be used in a similar way. The thing is `ConditionWatchers`, as well as
    other Espresso methods, are implemented and executed in the same place and at
    the same time as the test code, which is the opposite to how `IdlingResources`
    are used—by registering them before the test run (usually in the `@Before` method).


    So, `ConditionWatchers` should ideally become part of the Espresso Kotlin DSL
    and be used as one of the chains while writing the test code. This is how our
    `ConditionWatchers` can be declared as part of the DSL (see `EspressoDsl.kt` for
    the implementation details):


    - `ConditionWatchers.waitForElement()`:

    - `ConditionWatchers.waitForElementFullyVisible()`:


    ```kotlin

    fun ViewInteraction.wait(): ViewInteraction =

    ConditionWatchers.waitForElement(this, FOUR_SECONDS)

    ```


    - `ConditionWatchers.waitForElementIsGone()`:


    ```kotlin

    fun ViewInteraction.waitFullyVisible(): ViewInteraction =

    ConditionWatchers.waitForElementFullyVisible(this, FOUR_SECONDS)

    ```


    ```kotlin

    fun ViewInteraction.waitForGone(): ViewInteraction =

    ConditionWatchers.waitForElementIsGone(this, FOUR_SECONDS)

    ```


    All of these examples have the `ViewInteraction` return type and can be chained
    to Espresso test code as follows.


    *`chapter3.testsamples.ViewActionsKotlinDslTest.addsNewToDoWithWaiterDsl()`.*


    ```kotlin

    @Test

    fun addsNewToDoWithWaiterDsl() {

    // adding new TO-DO

    addFab.click()

    taskTitleField.wait().type(toDoTitle).closeKeyboard()

    taskDescriptionField.type(toDoDescription).closeKeyboard()

    editDoneFab.click()

    snackbar.waitForGone()

    // verifying new TO-DO with title is shown in the TO-DO list

    viewWithText(toDoTitle).checkDisplayed()

    }

    ```


    ## Exercise 13


    **`ConditionWatcher` as Part of the DSL**


    1.  Implement a test that opens a menu drawer and navigates to another section.
    In this test, add a condition watcher that waits for the menu drawer to be shown
    or hidden. Use `ViewMatchers.isDisplayed()` for the shown state and hamcrest `CoreMatchers.not(ViewMatchers.isDisplayed())`
    for hidden.


    2.  Make the `DataInteraction waitForElement()` function in the previous task
    part of the DSL.


    ## Summary


    Properly handling network operations and asynchronous actions is a must-have in
    your UI tests. Applying `IdlingResource` or `ConditionWatcher` makes your UI tests
    much more stable and reliable. After using them at least once, it will be clear
    that there is no need to use explicit `Thread.sleep()` methods all over the tests,
    which is a bad practice and error-prone.


    # 5. Verifying and Stubbing Intents with IntentMatchers


    Throughout this chapter, we will discuss how to verify and stub application intents.
    An intent is a messaging object you can use to request an action from another
    app component. Intents facilitate communication between components in several
    ways. According to the Android Intent and Filters documentation ( [`https://developer.android.com/guide/components/intents-filters`](https://developer.android.com/guide/components/intents-filters)
    ), there are three fundamental use cases:


    - **Starting an activity**—An activity represents a single screen in the Android
    application. An activity instance can be launched by passing an intent to `Context.startActivity(Intent)`.
    Passed intents should contain information about which activity will be started
    and may contain extra data. The `Context.startActivityForResult(Intent)` method
    is used when we expect to receive the result from a launched activity. The result
    is returned in the form of an intent object and can be handled in an `Activity.onActivityResult()`
    callback.


    - **Starting a service**—A service in Android represents a mechanism that performs
    operations in the background. Similar to an activity, a service is started by
    passing an intent to `Context.startService(Intent)`. Provided intents define the
    service to start and may contain extra data.


    - **Delivering a broadcast** —A broadcast represents a message that can be sent
    and received by any application or system. An example of a system broadcast can
    be a system bootup event. Broadcasts can be delivered to other apps by passing
    an intent to `Context.sendBroadcast(Intent)`.


    Here are examples of intents that belong to these intent types:


    - **Starting an activity intent**—Usually an intent to start an activity for a
    result. An example can be clicking the attachment button in Gmail, which opens
    the file browser so you can find and attach a file to the email.


    - **Starting a service intent**—Used to trigger long-lasting processes that are
    running in the background, like file downloads or for listening for some system
    events like connectivity state changes.


    - **Delivering a broadcast**—Used when there is a need to send a local intent,
    meaning that we would like to broadcast to receivers that are in the same app
    as the sender. Or just send our broadcast to all apps in the system that can handle
    it. An example is a broadcast to send an SMS.


    As you may already know, Espresso cannot operate outside of the application being
    tested, which is the common case in starting an activity intent or delivering
    a broadcast. Therefore, to make Espresso tests isolated and hermetic, we need
    to use Espresso-Intents, which is an extension to Espresso that enables validation
    and stubbing of intents sent out by the application being tested.


    ## Setting Up Dependencies


    In order to use Espresso-Intents, the following line of code should be added inside
    the `build.gradle` file of your app module:


    **Android Testing Support Library Espresso-Intents Dependency.**


    ```groovy

    androidTestImplementation ''com.android.support.test.espresso:espresso-intents:3.0.2''

    ```


    **AndroidX Test Library Espresso-Intents Dependency.**


    ```groovy

    androidTestImplementation ''androidx.test.espresso:espresso-intents:3.1.0''

    ```


    **Note:** Espresso-Intents is only compatible with Espresso 2.1+ and the Testing
    Support library 0.3+ or AndroidX Test library.


    So, to fulfill this compatibility requirement, the following dependencies must
    be updated as well.


    **Android Testing Support Library Dependencies.**


    ```groovy

    androidTestImplementation ''com.android.support.test:runner:1.0.2''

    androidTestImplementation ''com.android.support.test:rules:1.0.2''

    androidTestImplementation ''com.android.support.test.espresso:espresso-core:3.0.2''

    ```


    Or in case of AndroidX Test library usage, we need the following.


