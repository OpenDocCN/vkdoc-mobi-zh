    \ of the application context.\n\n## Stubbing Activity Intents\n\nAs mentioned,\
    \ Espresso does not support leaving applications under the text context, i.e.,\
    \ leaving the tested application, in order to interact with third-party applications.\
    \ For this reason, Espresso provides the stubbing mechanism `intending()` method\
