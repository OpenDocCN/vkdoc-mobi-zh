    # Writing Custom Matchers


    Espresso matchers are powerful tools that help locate or validate elements in
    the application layout. Espresso view matchers may not fully fit your use cases
    or needs. In that case, you can create custom matchers.


    ## Creating Custom Matchers for Simple UI Elements


    We will start using the simple matchers as an introduction. The following use
    case will be used as an example:


    * Add a new TO-DO without a title and description, and as a result, the TO-DO
    title field''s hint color should become red.


    In this case, `BoundedMatcher` is the perfect candidate since it returns the `Matcher<View>`
    type but will operate only on elements with `EditText` type. Refer to the `CustomViewMatchers.java`
    class, which contains the `withHintColor()` matcher implementation that matches
    the color of the `EditText` hint.


    *`chapter2.custommatchers.CustomViewMatchers.java`*


    ```

    public static Matcher withHintColor(final int expectedColor) {

    return new BoundedMatcher(EditText.class) {

    @Override

    protected boolean matchesSafely(EditText editText) {

    return expectedColor == editText.getCurrentHintTextColor();

    }

    @Override

    public void describeTo(Description description) {

    description.appendText("with TO-DO title: " + expectedColor);

    }

    };

    }

