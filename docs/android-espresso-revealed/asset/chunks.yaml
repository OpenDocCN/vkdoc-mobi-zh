- fmt: "The Android Testing support library provides the `Screenshot` and `ScreenshotCapture`\
    \ classes, which capture the screenshot in bitmap format during instrumentation\
    \ tests on an Android device or an emulator:\n\n```\nprivate void captureScreenshot(final\
    \ String name) throws IOException {\n    ScreenCapture capture = Screenshot.capture();\n\
    \    capture.setFormat(Bitmap.CompressFormat.PNG);\n    capture.setName(name);\n\
    \    capture.process();\n}\n```\n\nAs to the screenshot name, we need help from\
    \ the `TestName()` JUnit rule available from JUnit version 4.7. The `TestName`\
    \ rule makes the current test name available from inside the test. It returns\
    \ the currently-running test method name via the `getMethodName()` function:\n\
    \n```\n@Rule\npublic TestName testName = new TestName();\n```\n\nThe second point\
    \ has also been addressed (take a screenshot and name it appropriately).\n\nActually,\
    \ it's almost solved since we need the following permissions to be granted in\
    \ order to let the `Screenshot` class save screenshots to an external storage\
    \ location:\n\n* `android.Manifest.permission.READ_EXTERNAL_STORAGE`\n* `android.Manifest.permission.WRITE_EXTERNAL_STORAGE`\n\
    \nLuckily, the Android Testing support library provides `GrantPermissionRule`\
    \ to do this at runtime. The only limitation is that it can be used only from\
    \ Android M (API level 23):\n\n```\n@Rule\npublic GrantPermissionRule mRuntimePermissionRule\
    \ = GrantPermissionRule\n    .grant(android.Manifest.permission.WRITE_EXTERNAL_STORAGE,\n\
    \           android.Manifest.permission.READ_EXTERNAL_STORAGE);\n```\n\nAt this\
    \ moment, all three points have been addressed (the final one being to save the\
    \ screenshot on a given device or emulator), and this is how it looks in the `BaseTest.class`.\n\
    \n`com.example.android.architecture.blueprints.todoapp.test.BaseTest.java.`\n\n\
    ```\n@RunWith(AndroidJUnit4.class)\npublic class BaseTest {\n    ......\n    @Rule\n\
    \    public GrantPermissionRule mRuntimePermissionRule = GrantPermissionRule\n\
    \        .grant(android.Manifest.permission.WRITE_EXTERNAL_STORAGE,\n        \
    \       android.Manifest.permission.READ_EXTERNAL_STORAGE);\n    @Rule\n    public\
    \ TestName testName = new TestName();\n    public class ScreenshotWatcher extends\
    \ TestWatcher {\n        @Override\n        protected void succeeded(Description\
    \ description) {\n            // all good, tell everyone\n        }\n        @Override\n\
    \        protected void failed(Throwable e, Description desc) {\n            try\
    \ {\n                captureScreenshot(testName.getMethodName());\n          \
    \  } catch (IOException e1) {\n                e1.printStackTrace();\n       \
    \     }\n        }\n        private void captureScreenshot(final String name)\
    \ throws IOException {\n            ScreenCapture capture = Screenshot.capture();\n\
    \            capture.setFormat(Bitmap.CompressFormat.PNG);\n            capture.setName(name);\n\
    \            capture.process();\n        }\n    }\n}\n```\n\nOne last note—screenshots\
    \ will be saved in the `sdcard/Pictures/screenshots` directory. On Android emulator,\
    \ it is `/storage/emulated/0/Pictures/screenshots`.\n\n## Exercise 9\n\n**Failing\
    \ One of the Tests and Observing the Screenshots**\n\n1.  Modify one of the tests\
    \ so that it will fail. Run the test. After the test runs, with the help of the\
    \ `adb` command, start the shell session on the device or emulator and navigate\
    \ to the folder that contains the screenshot.\n2.  Pull the screenshot taken in\
    \ Step 1 from your device to your hard disk.\n\n## Summary\n\nAs you can see,\
    \ Espresso for Android is a flexible and customizable framework that allows us\
    \ to create custom classes and methods to meet specific testing needs. There are,\
    \ of course, some limitations, such as the missing `RecyclerView` matchers. These\
    \ limitations can be mitigated by using a custom `ViewAction`. Creating custom\
    \ `ViewActions`, `ViewMatchers`, and other methods and classes is essential knowledge,\
    \ sometimes even a must-have for an experienced Espresso user. In addition to\
    \ that, you can fully customize UI error handling and perform desired actions\
    \ on each test error.\n\n# Writing Espresso Tests with Kotlin\n\nThe Google I/O\
    \ event in May 2017 announced official Kotlin support. From that moment, Kotlin\
    \ popularity skyrocketed among Android developers. Keeping in mind the current\
    \ trends and considering Google's announcements about shifting the Android toward\
    \ Kotlin, which is reflected in the Android documentation and the code examples,\
    \ we can assume that in two to three years, Kotlin will displace Java.\n\nFigure\
    \ [3-1](#469090_1_En_3_Chapter.xhtml#Fig1) shows Java vs. Kotlin usage prediction,\
    \ which indicates that Kotlin will soon overtake Java in the Android development\
    \ world.\n\n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig1_HTML.jpg](images/469090_1_En_3_Chapter/469090_1_En_3_Fig1_HTML.jpg)\n\
    \n**Figure 3-1** Kotlin vs. Java usage on Android (source: [`https://realm.io/realm-report/`](https://realm.io/realm-report/))\n\
    \nThis chapter explains how to migrate existing Espresso Java tests to Kotlin,\
    \ lists the possible benefits of writing UI tests in Kotlin, and provides an example\
    \ of creating Espresso DSL with practical examples and tasks.\n\n## Migrating\
    \ Espresso Java Tests to Kotlin\n\nKotlin works side-by-side with Java on Android,\
    \ meaning that you can add Kotlin code to your existing projects and can call\
    \ Java code from Kotlin and vice versa.\n\nThe first step is to tell the Android\
    \ Studio IDE that the project uses Kotlin by adding the `kotlin-gradle-plugin`\
    \ dependency to the project `build.gradle` file, as shown:\n\n```\ndependencies\
    \ {\n    classpath \"com.android.tools.build:gradle:3.1.4\"\n    classpath \"\
    org.jetbrains.kotlin:kotlin-gradle-plugin:1.2.61\"\n    ...\n}\n```\n\nAfter the\
    \ project is synched, you can start converting Java classes to Kotlin. This can\
    \ easily be achieved by selecting a Java file or a package, opening the Code menu,\
    \ and choosing the Convert Java File to Kotlin File option. You can also right-click\
    \ the file or package and select this option from the pop-up menu (see Figure\
    \ [3-2](#469090_1_En_3_Chapter.xhtml#Fig2)).\n\n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig2_HTML.jpg](images/469090_1_En_3_Chapter/469090_1_En_3_Fig2_HTML.jpg)\n\
    \n**Figure 3-2** Converting a Java file to Kotlin\n\nThings can look simple for\
    \ the test classes files, but can be complicated for complex `ViewAction`s or\
    \ `ViewMatcher`s. When the IDE convertor can't handle the code complexity, it\
    \ will require developer interaction. The dialog box in Figure [3-3](#469090_1_En_3_Chapter.xhtml#Fig3)\
    \ alerts the developer to this fact.\n\n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig3_HTML.jpg](images/469090_1_En_3_Chapter/469090_1_En_3_Fig3_HTML.jpg)\n\
    \n**Figure 3-3** Code corrections when converting from Java to Kotlin\n\nYou can\
    \ also paste existing Java code into a Kotlin file. In this case, the IDE will\
    \ identify that the code in the clipboard was copied from a Java file and will\
    \ suggest converting it to Kotlin code, as shown in Figure [3-4](#469090_1_En_3_Chapter.xhtml#Fig4).\n\
    \n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig4_HTML.jpg](images/469090_1_En_3_Chapter/469090_1_En_3_Fig4_HTML.jpg)\n\
    \n**Figure 3-4** Converting Java code from the clipboard to Kotlin\n\nYou will\
    \ be asked to add new imports to the Kotlin file if they are not present, as shown\
    \ in Figure [3-5](#469090_1_En_3_Chapter.xhtml#Fig5).\n\n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig5_HTML.jpg](images/469090_1_En_3_Chapter/469090_1_En_3_Fig5_HTML.jpg)\n\
    \n**Figure 3-5** Adding new imports to a file after conversion to Kotlin\n\nThe\
    \ conversion cannot handle methods with multiple imports. This requires manual\
    \ interaction from the developer as well (see Figure [3-6](#469090_1_En_3_Chapter.xhtml#Fig6)).\n\
    \n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig6_HTML.jpg](images/469090_1_En_3_Chapter/469090_1_En_3_Fig6_HTML.jpg)\n\
    \n**Figure 3-6** Multiple choices when converting from Java to Kotlin\n\nThe following\
    \ shows an example of an Espresso UI test method conversion from Java to Kotlin.\
    \ As you may notice, there is almost no difference except for the function declaration\
    \ and semicolons at the end of the lines.\n\n*Adding a New TO-DO Test in the Java\
    \ and Kotlin Languages, Respectively.*"
  raw: "The Android Testing support library provides the `Screenshot` and `ScreenshotCapture`\n\
    classes, which capture the screenshot in bitmap format during\ninstrumentation\
    \ tests on an Android device or an emulator:\n\n```\nprivate void captureScreenshot(final\
    \ String name) throws IOException {\nScreenCapture capture = Screenshot.capture();\n\
    capture.setFormat(Bitmap.CompressFormat.PNG);\ncapture.setName(name);\ncapture.process();\n\
    }\n```\n\nAs to the screenshot name, we need help from the `TestName()` JUnit\
    \ rule\navailable from JUnit version 4.7\\. The `TestName` rule makes\nthe current\
    \ test name available from inside the test. It returns the\ncurrently-running\
    \ test method name via the `getMethodName()`\nfunction:\n\n```\n@Rule\npublic\
    \ TestName testName = new TestName();\n```\n\nThe second point has also been addressed\
    \ (take a screenshot and name\nit appropriately).\n\nActually, it’s almost solved\
    \ since we need the following permissions to\nbe granted in order to let the `Screenshot`\
    \ class save\nscreenshots to an external storage location:\n\n*   `android.Manifest.permission.READ_EXTERNAL_STORAGE`\n\
    \n*   `android.Manifest.permission.WRITE_EXTERNAL_STORAGE`\n\nLuckily, the Android\
    \ Testing support library provides `GrantPermissionRule`\nto do this at runtime.\
    \ The only limitation is that it can be used only\nfrom Android M (API level 23):\n\
    \n```\n@Rule\npublic GrantPermissionRule mRuntimePermissionRule = GrantPermissionRule\n\
    .grant(android.Manifest.permission.WRITE_EXTERNAL_STORAGE,\nandroid.Manifest.permission.READ_EXTERNAL_STORAGE);\n\
    ```\n\nAt this moment, all three points have been addressed (the final one\nbeing\
    \ to save the screenshot on a given device or emulator), and this is\nhow it looks\
    \ in the `BaseTest.class`.\n\n*com.example.android.architecture.blueprints.todoapp.test.BaseTest.java.*\n\
    \n```\n@RunWith(AndroidJUnit4.class)\npublic class BaseTest {\n......\n@Rule\n\
    public GrantPermissionRule mRuntimePermissionRule = GrantPermissionRule\n.grant(android.Manifest.permission.WRITE_EXTERNAL_STORAGE,\n\
    android.Manifest.permission.READ_EXTERNAL_STORAGE);\n@Rule\npublic TestName testName\
    \ = new TestName();\npublic class ScreenshotWatcher extends TestWatcher {\n@Override\n\
    protected void succeeded(Description description) {\n// all good, tell everyone\n\
    }\n@Override\nprotected void failed(Throwable e, Description desc) {\ntry {\n\
    captureScreenshot(testName.getMethodName());\n} catch (IOException e1) {\ne1.printStackTrace();\n\
    }\n}\nprivate void captureScreenshot(final String name) throws IOException {\n\
    ScreenCapture capture = Screenshot.capture();\ncapture.setFormat(Bitmap.CompressFormat.PNG);\n\
    capture.setName(name);\ncapture.process();\n}\n}\n}\n```\n\nOne last note—screenshots\
    \ will be saved in the `sdcard/Pictures/screenshots`\ndirectory. On Android emulator,\
    \ it is `/storage/emulated/0/Pictures/screenshots`.\n\nExercise 9\n\n**Failing\
    \ One of the Tests and Observing the Screenshots**\n\n1.  Modify one of the tests\
    \ so that it will fail. Run the test. After the\n    test runs, with the help\
    \ of the `adb` command, start\n    the shell session on the device or emulator\
    \ and navigate to the folder\n    that contains the screenshot.\n\n2.  Pull the\
    \ screenshot taken in Step 1 from your device to your hard\n    disk.\n\nSummary\n\
    As you can see, Espresso for Android is a flexible and customizable\nframework\
    \ that allows us to create custom classes and methods to meet\nspecific testing\
    \ needs. There are, of course, some limitations, such as\nthe missing `RecyclerView`\n\
    matchers. These limitations can be mitigated by using a custom `ViewAction`. Creating\n\
    custom `ViewActions`, `ViewMatchers`, and\nother methods and classes is essential\
    \ knowledge, sometimes even a\nmust-have for an experienced Espresso user. In\
    \ addition to that, you can\nfully customize UI error handling and perform desired\
    \ actions on each\ntest error.\n\n3. Writing Espresso Tests with\nKotlin\n\nThe\
    \ Google I/O event in May 2017 announced official Kotlin support.\nFrom that moment,\
    \ Kotlin popularity skyrocketed among Android\ndevelopers. Keeping in mind the\
    \ current trends and considering Google’s\nannouncements about shifting the Android\
    \ toward Kotlin, which is\nreflected in the Android documentation and the code\
    \ examples, we can\nassume that in two to three years, Kotlin will displace Java.\n\
    \nFigure [3-1](#469090_1_En_3_Chapter.xhtml#Fig1) shows Java vs.\nKotlin usage\
    \ prediction, which indicates that Kotlin will soon overtake\nJava in the Android\
    \ development world.\n\n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig1_HTML.jpg](images/469090_1_En_3_Chapter/469090_1_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1\nKotlin vs. Java\nusage on Android (source: [`https://realm.io/realm-report/`](https://realm.io/realm-report/)\
    \ )\n\nThis chapter explains how to migrate existing Espresso Java tests to\n\
    Kotlin, lists the possible benefits of writing UI tests in Kotlin, and\nprovides\
    \ an example of creating Espresso DSL with practical examples and\ntasks.\n\n\
    Migrating Espresso Java Tests to Kotlin\nKotlin works side-by-side with Java on\
    \ Android, meaning that you can\nadd Kotlin code to\nyour existing projects and\
    \ can call Java code from Kotlin and vice\nversa.\n\nThe first step is to tell\
    \ the Android Studio IDE that the project uses\nKotlin by adding the `kotlin-gradle-plugin`\n\
    dependency to the project `build.gradle` file, as\nshown:\n\n```\ndependencies\
    \ {\nclasspath \"com.android.tools.build:gradle:3.1.4\"\nclasspath \"org.jetbrains.kotlin:kotlin-gradle-plugin:1.2.61\"\
    \n...\n}\n```\n\nAfter the project is synched, you can start converting Java classes\
    \ to\nKotlin. This can easily be achieved by selecting a Java file or a\npackage,\
    \ opening the Code menu, and choosing the Convert Java File to\nKotlin File option.\
    \ You can also right-click the file or package and\nselect this option from the\
    \ pop-up menu (see Figure [3-2](#469090_1_En_3_Chapter.xhtml#Fig2)).\n\n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig2_HTML.jpg](images/469090_1_En_3_Chapter/469090_1_En_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2\nConverting a Java file to Kotlin\n\nThings can look simple for the\
    \ test classes files, but can be\ncomplicated for complex `ViewAction`s or `ViewMatcher`s.\
    \ When\nthe IDE convertor can’t handle the code complexity, it will require\n\
    developer interaction. The dialog box in Figure [3-3](#469090_1_En_3_Chapter.xhtml#Fig3)\
    \ alerts the\ndeveloper to this fact.\n\n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig3_HTML.jpg](images/469090_1_En_3_Chapter/469090_1_En_3_Fig3_HTML.jpg)\n\
    \nFigure 3-3\nCode corrections when converting from Java to Kotlin\n\nYou can\
    \ also paste existing Java code into a Kotlin file. In this case,\nthe IDE will\
    \ identify that the code in the clipboard was copied from a\nJava file and will\
    \ suggest converting it to Kotlin code, as shown in\nFigure [3-4](#469090_1_En_3_Chapter.xhtml#Fig4).\n\
    \n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig4_HTML.jpg](images/469090_1_En_3_Chapter/469090_1_En_3_Fig4_HTML.jpg)\n\
    \nFigure 3-4\nConverting Java code from the clipboard to Kotlin\n\nYou will be\
    \ asked to add new imports to the Kotlin file if they are not\npresent, as shown\
    \ in Figure [3-5](#469090_1_En_3_Chapter.xhtml#Fig5).\n\n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig5_HTML.jpg](images/469090_1_En_3_Chapter/469090_1_En_3_Fig5_HTML.jpg)\n\
    \nFigure 3-5\nAdding new imports to a file after conversion to Kotlin\n\nThe conversion\
    \ cannot handle methods with multiple imports. This\nrequires manual interaction\
    \ from the developer as well (see Figure [3-6](#469090_1_En_3_Chapter.xhtml#Fig6)).\n\
    \n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig6_HTML.jpg](images/469090_1_En_3_Chapter/469090_1_En_3_Fig6_HTML.jpg)\n\
    \nFigure 3-6\nMultiple choices when converting from Java to Kotlin\n\nThe following\
    \ shows an example of an Espresso UI test method\nconversion from Java to Kotlin.\
    \ As you may notice, there is almost no\ndifference except for the function declaration\
    \ and semicolons at the end\nof the lines.\n\n*Adding a New TO-DO Test in the\
    \ Java and Kotlin Languages,\nRespectively.*"
  trans: "\nAndroid 测试支持库提供了 `Screenshot` 和 `ScreenshotCapture` 类，用于在 Android 设备或模拟器上进行仪表测试期间捕获位图格式的屏幕截图：\n\
    \n```\nprivate void captureScreenshot(final String name) throws IOException {\n\
    \    ScreenCapture capture = Screenshot.capture();\n    capture.setFormat(Bitmap.CompressFormat.PNG);\n\
    \    capture.setName(name);\n    capture.process();\n}\n```\n\n至于截图名称，我们需要借助 JUnit\
    \ 4.7 版本中提供的 `TestName()` JUnit 规则。`TestName` 规则使得当前测试名称在测试内部可用。它通过 `getMethodName()`\
    \ 函数返回当前正在运行的测试方法名称：\n\n```\n@Rule\npublic TestName testName = new TestName();\n\
    ```\n\n第二点也已经解决（截取屏幕截图并为其命名）。\n\n实际上，这几乎已经解决了，因为我们需要授予以下权限，才能让 `Screenshot` 类将截图保存到外部存储位置：\n\
    \n* `android.Manifest.permission.READ_EXTERNAL_STORAGE`\n* `android.Manifest.permission.WRITE_EXTERNAL_STORAGE`\n\
    \n幸运的是，Android 测试支持库提供了 `GrantPermissionRule` 来在运行时执行此操作。唯一的限制是它只能从 Android M（API\
    \ 级别 23）开始使用：\n\n```\n@Rule\npublic GrantPermissionRule mRuntimePermissionRule\
    \ = GrantPermissionRule\n    .grant(android.Manifest.permission.WRITE_EXTERNAL_STORAGE,\n\
    \           android.Manifest.permission.READ_EXTERNAL_STORAGE);\n```\n\n至此，所有三点都已解决（最后一点是将截图保存在给定的设备或模拟器上），这就是它在\
    \ `BaseTest.class` 中的样子。\n\n`com.example.android.architecture.blueprints.todoapp.test.BaseTest.java.`\n\
    \n```\n@RunWith(AndroidJUnit4.class)\npublic class BaseTest {\n    ......\n  \
    \  @Rule\n    public GrantPermissionRule mRuntimePermissionRule = GrantPermissionRule\n\
    \        .grant(android.Manifest.permission.WRITE_EXTERNAL_STORAGE,\n        \
    \       android.Manifest.permission.READ_EXTERNAL_STORAGE);\n    @Rule\n    public\
    \ TestName testName = new TestName();\n    public class ScreenshotWatcher extends\
    \ TestWatcher {\n        @Override\n        protected void succeeded(Description\
    \ description) {\n            // 一切正常，通知所有人\n        }\n        @Override\n  \
    \      protected void failed(Throwable e, Description desc) {\n            try\
    \ {\n                captureScreenshot(testName.getMethodName());\n          \
    \  } catch (IOException e1) {\n                e1.printStackTrace();\n       \
    \     }\n        }\n        private void captureScreenshot(final String name)\
    \ throws IOException {\n            ScreenCapture capture = Screenshot.capture();\n\
    \            capture.setFormat(Bitmap.CompressFormat.PNG);\n            capture.setName(name);\n\
    \            capture.process();\n        }\n    }\n}\n```\n\n最后一点——截图将保存在 `sdcard/Pictures/screenshots`\
    \ 目录中。在 Android 模拟器上，路径是 `/storage/emulated/0/Pictures/screenshots`。\n\n## 练习\
    \ 9\n\n**使一个测试失败并观察截图**\n\n1.  修改其中一个测试，使其失败。运行测试。测试运行后，借助 `adb` 命令，在设备或模拟器上启动\
    \ shell 会话，并导航到包含截图的文件夹。\n2.  将从步骤 1 中获取的截图从设备拉到您的硬盘上。\n\n## 总结\n\n如您所见，Android\
    \ 的 Espresso 是一个灵活且可定制的框架，允许我们创建自定义类和方法来满足特定的测试需求。当然，也存在一些限制，例如缺少 `RecyclerView`\
    \ 匹配器。这些限制可以通过使用自定义的 `ViewAction` 来缓解。创建自定义的 `ViewActions`、`ViewMatchers` 以及其他方法和类，对于有经验的\
    \ Espresso 用户来说是必备知识，有时甚至是必须掌握的技能。除此之外，您还可以完全自定义 UI 错误处理，并在每次测试错误时执行所需操作。\n\n\
    # 使用 Kotlin 编写 Espresso 测试\n\n2017 年 5 月的 Google I/O 大会宣布了对 Kotlin 的官方支持。从那一刻起，Kotlin\
    \ 在 Android 开发者中的受欢迎程度迅速飙升。考虑到当前的趋势以及 Google 关于将 Android 转向 Kotlin 的公告（这在 Android\
    \ 文档和代码示例中都有体现），我们可以假设在两到三年内，Kotlin 将取代 Java。\n\n图 3-1 显示了 Java 与 Kotlin 的使用预测，表明\
    \ Kotlin 很快将在 Android 开发领域超越 Java。\n\n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig1_HTML.jpg](img/469090_1_En_3_Fig1_HTML.jpg)\n\
    \n**图 3-1** Android 上 Kotlin 与 Java 的使用情况对比（来源：[`https://realm.io/realm-report/`](https://realm.io/realm-report/)）\n\
    \n本章将解释如何将现有的 Espresso Java 测试迁移到 Kotlin，列出用 Kotlin 编写 UI 测试可能带来的好处，并通过实际示例和任务提供创建\
    \ Espresso DSL 的示例。\n\n## 将 Espresso Java 测试迁移到 Kotlin\n\nKotlin 在 Android 上与\
    \ Java 协同工作，这意味着您可以将 Kotlin 代码添加到现有项目中，并且可以像调用 Kotlin 代码一样从 Kotlin 调用 Java 代码，反之亦然。\n\
    \n第一步是通过将 `kotlin-gradle-plugin` 依赖项添加到项目的 `build.gradle` 文件中，来告知 Android Studio\
    \ IDE 该项目使用了 Kotlin，如下所示：\n\n```\ndependencies {\n    classpath \"com.android.tools.build:gradle:3.1.4\"\
    \n    classpath \"org.jetbrains.kotlin:kotlin-gradle-plugin:1.2.61\"\n    ...\n\
    }\n```\n\n项目同步后，您可以开始将 Java 类转换为 Kotlin。这可以通过选择一个 Java 文件或包，打开 Code 菜单，然后选择 Convert\
    \ Java File to Kotlin File 选项轻松实现。您也可以右键单击文件或包，然后从弹出菜单中选择此选项（见图 3-2）。\n\n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig2_HTML.jpg](img/469090_1_En_3_Fig2_HTML.jpg)\n\
    \n**图 3-2** 将 Java 文件转换为 Kotlin\n\n对于测试类文件来说，事情可能看起来很简单，但对于复杂的 `ViewAction` 或\
    \ `ViewMatcher` 来说，可能会很复杂。当 IDE 转换器无法处理代码的复杂性时，它将需要开发人员的干预。图 3-3 中的对话框会提醒开发人员注意这一事实。\n\
    \n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig3_HTML.jpg](img/469090_1_En_3_Fig3_HTML.jpg)\n\
    \n**图 3-3** 从 Java 转换为 Kotlin 时的代码更正\n\n您也可以将现有的 Java 代码粘贴到 Kotlin 文件中。在这种情况下，IDE\
    \ 会识别出剪贴板中的代码是从 Java 文件复制的，并会建议将其转换为 Kotlin 代码，如图 3-4 所示。\n\n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig4_HTML.jpg](img/469090_1_En_3_Fig4_HTML.jpg)\n\
    \n**图 3-4** 将剪贴板中的 Java 代码转换为 Kotlin\n\n如果 Kotlin 文件中不存在这些导入，系统将要求您添加它们，如图 3-5\
    \ 所示。\n\n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig5_HTML.jpg](img/469090_1_En_3_Fig5_HTML.jpg)\n\
    \n**图 3-5** 转换为 Kotlin 后向文件中添加新导入\n\n转换无法处理具有多个导入的方法。这也需要开发人员手动干预（见图 3-6）。\n\n\
    ![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig6_HTML.jpg](img/469090_1_En_3_Fig6_HTML.jpg)\n\
    \n**图 3-6** 从 Java 转换为 Kotlin 时的多个选择\n\n下面显示了一个 Espresso UI 测试方法从 Java 转换为 Kotlin\
    \ 的示例。您可能会注意到，除了函数声明和行尾的分号之外，几乎没有区别。\n\n*分别在 Java 和 Kotlin 语言中添加一个新的 TO-DO 测试。*\n"
- fmt: "\n```\n@Test\npublic void addsNewToDo() {\n    // adding new TO-DO\n    onView(withId(R.id.title)).perform(click());\n\
    \    onView(withId(R.id.add_task_title))\n        .perform(typeText(toDoTitle),\
    \ closeSoftKeyboard());\n    onView(withId(R.id.add_task_description))\n     \
    \   .perform(typeText(toDoDescription), closeSoftKeyboard());\n    onView(withId(R.id.fab_edit_task_done)).perform(click());\n\
    \    // verifying new TO-DO with title is shown in the TO-DO list\n    onView(withText(toDoTitle)).check(matches(isDisplayed()));\n\
    }\n\n@Test\nfun addsNewToDo() {\n    // adding new TO-DO\n    onView(withId(R.id.title)).perform(click())\n\
    \    onView(withId(R.id.add_task_title))\n        .perform(typeText(toDoTitle),\
    \ closeSoftKeyboard())\n    onView(withId(R.id.add_task_description))\n      \
    \  .perform(typeText(toDoDescription), closeSoftKeyboard())\n    onView(withId(R.id.fab_edit_task_done)).perform(click())\n\
    \    // verifying new TO-DO with title is shown in the TO-DO list\n    onView(withText(toDoTitle)).check(matches(isDisplayed()))\n\
    }\n```\n\nYou can see more examples of converting Java files to Kotlin—based on\
    \ the examples implemented in the `ViewActionsTest.kt`, `RecyclerViewActionsTest.kt`,\
    \ and `DataInteractionsTest.kt` classes—in the `chapter3/testsamples` package.\n\
    \n# Exercise 10\n\n# Converting Java Code to Kotlin\n\n1. Convert an existing\
    \ Java file to Kotlin.\n2. Convert a package containing multiple Java files to\
    \ Kotlin.\n3. Copy a Java code sample and paste it into a Kotlin file. See what\
    \ happens if you paste only half of the Java method. Will the conversion be correct?\n\
    \n# Benefits of Writing Tests in Kotlin\n\nBringing Kotlin into your test codebase\
    \ has many advantages. Among them are these:\n\n- Function as a type support\n\
    - Extension functions\n- String templates\n- Ability to import `R.class` resources\n\
    - Much cleaner code\n\n## Function as a Type\n\nThis process saves a function\
    \ in a variable and then uses it as another function argument or returns a function\
    \ by another function. In the following example, you can see how the Espresso\
    \ `ViewMatchers.withText()` function is returned as a value of the `viewWithText()`\
    \ function:\n\n```\nfun viewWithText(text: String): ViewInteraction =\n    Espresso.onView(ViewMatchers.withText(text))\n\
    ```\n\n## Extension Functions\n\nExtensions do not actually modify the classes\
    \ they extend. By defining an extension, you do not add new members into a class,\
    \ but only make new functions callable with the dot-notation on instances of this\
    \ type. With the help of extension functions, the Espresso `perform(ViewAction.typeText())`\
    \ function can be represented in the following way:\n\n```\nfun ViewInteraction.type(text:\
    \ String): ViewInteraction =\n    perform(ViewActions.typeText(text))\n```\n\n\
    In this example, we extended the `ViewInteraction` class with an additional `type()`\
    \ method.\n\n## String Templates\n\nStrings may contain template expressions,\
    \ i.e. pieces of code that are evaluated and whose results are concatenated into\
    \ the string. A template expression starts with a dollar sign (`$`) and contains\
    \ a simple name. Take a look at this example:\n\n```\nfun main(args: Array) {\n\
    \    val i = 10\n    println(\"i = $i\") // prints \"i = 10\"\n}\n```\n\nOr consider\
    \ an arbitrary expression in curly braces:\n\n```\nfun main(args: Array) {\n \
    \   val s = \"abc\"\n    println(\"$s.length is ${s.length}\") // prints \"abc.length\
    \ is 3\"\n}\n```\n\n## Import `R.class` Resources\n\nKotlin—together with the\
    \ Kotlin Android Gradle plugin—simplifies the way that project resources (including\
    \ string values, IDs, and drawables) can be accessed. In the following listing,\
    \ based on the `addsNewToDo()` test implementation from the `chapter3/testsamples/ViewActionsKotlinTest.kt`\
    \ file, you can see how Kotlin allows us to import application resources.\n\n\
    *chapter3.testsamples.ViewActionsKotlinTest.kt*\n\n```\n... // other imports and\
    \ package\nimport com.example.android.architecture.blueprints.todoapp.R.id.*\n\
    \nclass ViewActionsKotlinTest : BaseTest() {\n    private var toDoTitle = \"\"\
    \n    private var toDoDescription = \"\"\n\n    @Before\n    override fun setUp()\
    \ {\n        super.setUp()\n        toDoTitle = TestData.getToDoTitle()\n    \
    \    toDoDescription = TestData.getToDoDescription()\n    }\n\n    @Test\n   \
    \ fun addsNewToDo() {\n        // adding new TO-DO\n        onView(withId(fab_add_task)).perform(click())\n\
    \        onView(withId(add_task_title))\n            .perform(typeText(toDoTitle),\
    \ closeSoftKeyboard())\n        onView(withId(add_task_description))\n       \
    \     .perform(typeText(toDoDescription), closeSoftKeyboard())\n        onView(withId(fab_edit_task_done)).perform(click())\n\
    \        // verifying new TO-DO with title is shown in the TO-DO list\n      \
    \  onView(withText(toDoTitle)).check(matches(isDisplayed()))\n    }\n}\n```\n\n\
    Instead of the whole `R.class`, Android Studio IDE allows you to import only one\
    \ or several resources (see Figure [3-7](#469090_1_En_3_Chapter.xhtml#Fig7)).\n\
    \n![../images/469090_1_En_3_Chapter/469090_1_En_3_Fig7_HTML.jpg](images/469090_1_En_3_Chapter/469090_1_En_3_Fig7_HTML.jpg)\n\
    \n**Figure 3-7**  Importing R class resources with Kotlin\n\n# Espresso Domain-Specific\
    \ Language in Kotlin\n\nWith the help of the Kotlin extension functions and function\
    \ as a type support, we can drastically reduce the boilerplate of the test code\
    \ by implementing Espresso domain-specific language (DSL). The goal of our Espresso\
    \ DSL is to simplify our test codebase, make it more legible and, most importantly,\
    \ make our tests easy to write and maintain.\n\nFirst, we must determine which\
    \ Espresso functions or expressions we use the most in our UI test codebase:\n\
    \n- View or data interactions represented by the `Espresso.onView()` and `Espresso.onData()`\
    \ methods—The starting point of every line of Espresso test code.\n- Different\
    \ view actions, like `ViewActions.click()`, `ViewActions.typeText()`, `ViewActions.swipeDown()`,\
    \ `ViewActions.closeSoftKeyboard()`, etc.\n- Plenty of view matchers, which are\
    \ the most used functions inside the test codebase, since they are used not only\
    \ to locate elements on the page but also in combination with view assertions\
    \ check view properties: `ViewMatchers.withId()`, `ViewMatchers.withText()`, `check(matches(ViewMatchers.isDisplayed()))`,\
    \ and so on.\n- Aggregated Hamcrest matchers like `Matchers.allOf()` or `Matchers.anyOf()`.\n\
    - Recycler view actions such as `RecyclerViewActions.scrollToHolder()` and `RecyclerViewActions.actionOnItem()`.\n\
    \nOf course, this list can be extended or reduced based on your needs. It is worth\
    \ it to highlight that the aim of this paragraph is not to standardize the Espresso\
    \ DSL with Kotlin, but to provide an example of how it can be done, so that you\
    \ can apply it to your test projects.\n\nThe core `Espresso.onView()` and `Espresso.onData()`\
    \ methods are the first functions we going to work with. Seeing that they always\
    \ take a parameter view matcher or object matcher, we can convert the whole expression\
    \ into one single Kotlin function, as follows:\n\n```\nfun viewWithText(text:\
    \ String): ViewInteraction = Espresso.onView(ViewMatchers.withText(text))\n```\n\
    \nOr in case of `onData()`:\n\n```\nfun onAnyData(): DataInteraction = Espresso.onData(CoreMatchers.anything())\n\
    ```\n\nYou may notice that the returning types are identical to those returned\
    \ by the `onView()` and `onData()` methods—`ViewInteraction` and `DataInteraction`,\
    \ respectively. Another thing is that it is possible to pass a parameter into\
    \ the extension function that’s used inside the original one. These examples are\
    \ using Kotlin local functions (i.e., a function inside another function) to simplify\
    \ the code and can be represented by the following more complex function declarations:\n\
    \n```\nfun viewWithText(text: String): ViewInteraction {\n    return Espresso.onView(ViewMatchers.withText(text))\n\
    }\n```\n\nand\n\n```\nfun onAnyData(): DataInteraction {\n    return Espresso.onData(CoreMatchers.anything())\n\
    }\n```\n"
