- fmt: "# Espresso 框架中的同步机制\n\nOne of the key benefits of the Espresso framework is\
    \ its test robustness. It is achieved through automatic synchronization of most\
    \ of the test actions. Espresso waits for the main application UI thread while\
    \ it is busy and releases test actions after the UI thread becomes idle. Moreover,\
    \ it also waits for `AsyncTask` operations to complete before it moves to the\
    \ next test step. In this chapter, we will see how Espresso can handle network\
    \ operations using the `IdlingResource` mechanism and become familiar with the\
    \ `ConditionWatcher` mechanism as an alternative to `IdlingResource`.\n\n## IdlingResource\
    \ 基础\n\nEach time your test invokes `onView()` or `onData()`, Espresso waits to\
    \ perform the corresponding UI action or assertion until the following synchronization\
    \ conditions are met:\n\n*   The message queue is empty.\n*   There are no instances\
    \ of `AsyncTask` currently executing a task.\n*   All developer-defined idling\
    \ resources are idle.\n\nBy performing these checks, Espresso substantially increases\
    \ the likelihood that only one UI action or assertion can occur at any given time.\
    \ This capability gives you more reliable and dependable test results.\n\nHowever,\
    \ it is not possible in every case to rely on automatic synchronization, for instance\
    \ when the application being tested executes network calls via `ThreadPoolExecutor`.\
    \ In order to let Espresso handle these kinds of long-lasting asynchronous operations,\
    \ the `IdlingResource` must be created and registered before the test is executed.\
    \ It is important to register `IdlingResource` when these operations update the\
    \ application UI you would like to further validate.\n\nThe common use cases in\
    \ which `IdlingResource` can be used are when your app is:\n\n*   Performing network\
    \ calls.\n*   Establishing database connections.\n\nAt the moment, Espresso provides\
    \ the following idling resources:\n\n*   `CountingIdlingResource` — Maintains\
    \ a counter of active tasks. When the counter is zero, the associated resource\
    \ is considered idle. This functionality closely resembles that of a semaphore.\
    \ In most cases, this implementation is sufficient for managing your app’s asynchronous\
    \ work during testing.\n*   `UriIdlingResource` — Similar to `CountingIdlingResource`,\
    \ but the counter needs to be zero for a specific period of time before the resource\
    \ is considered idle. This additional waiting period takes consecutive network\
    \ requests into account, where an app in your thread might make a new request\
    \ immediately after receiving a response to a previous request.\n*   `IdlingThreadPoolExecutor`\
    \ — A custom implementation of `ThreadPoolExecutor` that keeps track of the total\
    \ number of running tasks within the created thread pools. This class uses a `CountingIdlingResource`\
    \ to maintain the counter of active tasks.\n*   `IdlingScheduledThreadPoolExecutor`\
    \ — A custom implementation of `ScheduledThreadPoolExecutor`. It provides the\
    \ same functionality and capabilities as the `IdlingThreadPoolExecutor` class,\
    \ but it can also keep track of tasks that are scheduled for the future or are\
    \ scheduled to execute periodically.\n\nTo start using an idling resource mechanism\
    \ in an application, the following dependency must be added to the application\
    \ `buid.gradle` file (dependencies are mentioned for the Android Support and AndroidX\
    \ Libraries).\n\n**IdlingResource Dependency in the Android Support Library:**\n\
    \n```\nandroidTestImplementation \"com.android.support.test.espresso.idling:idling-concurrent:3.0.1\"\
    \n```\n\n**IdlingResource Dependency in the AndroidX Library:**\n\n```\nandroidTestImplementation\
    \ 'androidx.test.espresso.idling:idling-concurrent:3.1.0'\n```\n\nThese idling\
    \ resource types use `CountingIdlingResource` in their implementation, so we will\
    \ focus on `CountingIdlingResource` as a reference.\n\nThe `IdlingResource` interface\
    \ contains three methods:\n\n*   `getName()` — Returns the name of the resources.\n\
    \n    > **Note:** The `IdlingResource` name is represented by a `String` class\
    \ and is used when logging, and for registration/unregistration purposes. Therefore,\
    \ the name of the resource should be unique.\n\n*   `isIdleNow()` — Returns `true`\
    \ if the resource is currently idle. Espresso will always call this method from\
    \ the main thread; therefore, it should be non-blocking and return immediately.\n\
    \n*   `registerIdleTransitionCallback()` — Registers the given resource callback\
    \ with the idling resource. The registered callback is then used in the `isIdleNow()`\
    \ method.\n\n    > **Note:** The `IdlingResource` class contains a `ResourceCallback`\
    \ interface that is used in the `registerTransitionCallback()` method. Whenever\
    \ the application is going to switch states from busy to idle, the `callback.onTransitionToIdle()`\
    \ method should be called to notify Espresso about it.\n\n`CountingIdlingResource`\
    \ is an implementation of `IdlingResource` that determines idleness by maintaining\
    \ an internal counter. When the counter is zero, it is considered to be idle;\
    \ when it is non-zero, it is not idle. This is very similar to the way a `java.util.concurrent.Semaphore`\
    \ behaves. The counter may be incremented or decremented from any thread. If it\
    \ reaches an illogical state (like a counter that’s less than zero), it will throw\
    \ an `IllegalStateException`. This class can then be used to wrap operations that,\
    \ while in progress, block tests from accessing the UI.\n\n## 编写代码\n\nThis is\
    \ how the simple `CountingIdlingResource` looks in our application (see the `util/SimpleCountingIdlingResource.java`\
    \ file from the main application source code):\n\n```java\npublic final class\
    \ SimpleCountingIdlingResource implements IdlingResource {\n    private final\
    \ String mResourceName;\n    private final AtomicInteger counter = new AtomicInteger(0);\n\
    \    // written from main thread, read from any thread.\n    private volatile\
    \ ResourceCallback resourceCallback;\n\n    /**\n     * Creates a SimpleCountingIdlingResource\n\
    \     *\n     * @param resourceName the name of the resource to report to Espresso.\n\
    \     */\n    public SimpleCountingIdlingResource(String resourceName) {\n   \
    \     mResourceName = checkNotNull(resourceName);\n    }\n\n    @Override\n  \
    \  public String getName() {\n        return mResourceName;\n    }\n\n    @Override\n\
    \    public boolean isIdleNow() {\n        return counter.get() == 0;\n    }\n\
    \n    @Override\n    public void registerIdleTransitionCallback(ResourceCallback\
    \ resourceCallback) {\n        this.resourceCallback = resourceCallback;\n   \
    \ }\n\n    /**\n     * Increments the count of in-flight transactions to the resource\
    \ being monitored.\n     */\n    public void increment() {\n        counter.getAndIncrement();\n\
    \    }\n\n    /**\n     * Decrements the count of in-flight transactions to the\
    \ resource being monitored.\n     *\n     * If this operation results in the counter\
    \ falling below 0 - an exception is raised.\n     *\n     * @throws IllegalStateException\
    \ if the counter is below 0.\n     */\n    public void decrement() {\n       \
    \ int counterVal = counter.decrementAndGet();\n        if (counterVal == 0) {\n\
    \            // we've gone from non-zero to zero. That means we're idle now! Tell\
    \ espresso.\n            if (null != resourceCallback) {\n                resourceCallback.onTransitionToIdle();\n\
    \            }\n        }\n        if (counterVal < 0) {\n            throw new\
    \ IllegalArgumentException(\"Counter has been corrupted!\");\n        }\n    }\n\
    }\n```\n\nThe `SimpleCountingIdlingResource` class is used by the `EspressoIdlingResource`\
    \ class in the same location that contains a static reference to it (see the `util/EspressoIdlingResource.java`\
    \ file) and it uses its `increment()` and `decrement()` methods:\n\n```java\n\
    public class EspressoIdlingResource {\n    private static final String RESOURCE\
    \ = \"GLOBAL\";\n    private static SimpleCountingIdlingResource mCountingIdlingResource\
    \ =\n        new SimpleCountingIdlingResource(RESOURCE);\n\n    public static\
    \ void increment() {\n        mCountingIdlingResource.increment();\n    }\n\n\
    \    public static void decrement() {\n        mCountingIdlingResource.decrement();\n\
    \    }\n\n    public static IdlingResource getIdlingResource() {\n        return\
    \ mCountingIdlingResource;\n    }\n}\n```"
