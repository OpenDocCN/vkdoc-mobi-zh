    \n# 引言\n\n## 本书读者对象\n\n本书是一本指导手册，面向对使用 Espresso for Android（Espresso）进行 Android\
    \ 测试自动化感兴趣的**质量保证工程师**和**测试自动化工程师**，指导他们如何编写 Android 用户界面测试。对于参与编写 UI 测试或集成测试的\
    \ Android 开发者而言，本书也极具价值。\n\n本书主要面向具备中高级 Android 测试自动化知识的软件或测试工程师编写；不过，拥有基础开发和测试自动化经验的工程师也将从中受益。\n\
    \n## 本书涵盖内容\n\n目前存在大量优质的官方 Android 测试文档，包括包含源代码的 GitHub 项目，但有时很难找到所需的信息片段，尤其是涉及\
    \ Android Espresso 用户每天都会遇到的纯自动化 UI 端到端测试相关内容。\n\n我试图涵盖使用 Espresso 测试框架编写功能性 UI\
    \ 自动化测试的所有主要主题，包括运行自动化测试的不同方式、以易于维护的方式构建测试项目，以及使用能够以更少工作量实现自动化测试的工具。\n\n## 源代码与示例项目\n\
    \n为展示本书中的所有代码示例，我们复刻并修改了 Google 示例的 Android 架构 TODO 应用程序项目（`https://github.com/googlesamples/android-architecture`），以便能够使用\
    \ Espresso for Android 和 UI Automator 测试框架展示大部分 Android UI 测试自动化示例。\n\n该示例 TODO\
    \ 应用程序项目包含两个分支，其中一个分支使用 Android 测试支持库依赖项，另一个分支涵盖 AndroidX 测试库的使用。读者可以自由选择自己偏好的分支。\n\
    \n源代码也可通过位于 `www.apress.com/9781484243145` 的“下载源代码”链接获取。\n\n## 章节概述\n\n### 第 1\
    \ 章：Espresso for Android 入门\n\n本章介绍 Espresso 的基础知识。它定义了用户界面测试的目标和方法，并提供了在 Android\
    \ Studio IDE 项目中设置测试的示例。本章还解释了如何识别 Android 应用程序 UI 元素、执行操作和断言，以及如何对其应用匹配器。在本章结束时，你将能够编写简单的测试，并在\
    \ Android Studio IDE 中于设备或模拟器上执行这些测试。本章还包含如何通过 Gradle 或 shell 命令运行测试的示例。\n\n###\
    \ 第 2 章：按需定制 Espresso\n\n通过更高级的示例，你将学习如何实现自定义的 `ViewAction`，包括点击和滑动操作；以及自定义的 `ViewMatcher`，例如匹配像\
    \ `RecyclerView` 这样的复杂视图。你将学习如何使用自定义操作和匹配器，实现自定义的 `FailureHandler`，并能在测试失败时截取和保存屏幕截图。\n\
    \n### 第 3 章：使用 Kotlin 编写 Espresso 测试\n\n本章概述了在测试中使用 Kotlin 编程语言的优势，并解释了如何将用 Java\
    \ 编写的测试迁移到 Kotlin。本章还提供了在 Kotlin 中创建 Espresso 领域特定语言的示例。\n\n### 第 4 章：处理网络操作和异步操作\n\
    \n本章解释了如何借助 `IdlingResource` 接口，在测试执行期间处理应用程序的网络请求和长时间运行的操作。它还提供了使用 `ConditionalWatcher`\
    \ 作为 `IdlingResource` 替代方案的示例。\n\n### 第 5 章：使用 IntentMatchers 验证和存根 Intent\n\n\
    本章解释了如何在应用程序内部使用 `IntentMatchers`，以及如何存根外部 Intent 并提供额外数据。外部 Intent 的一个典型例子是从相册中选择一张图片，然后由你正在测试的应用程序使用。\n\
    \n### 第 6 章：测试 WebView\n\n本章涵盖了对应用程序内 `WebViews` 的测试。实现的 `WebViews` 展示了 Espresso-Web\
    \ API 能够操作的不同 UI 元素。作为本书内容的一部分，你将获得一份 Espresso-Web 速查表。\n\n### 第 7 章：无障碍测试\n\n\
    本章揭示了如何使用 Espresso for Android 测试应用程序无障碍功能这一主题。它提高了人们对无障碍测试重要性的认识，并概述了可用于测试应用程序无障碍功能的手动工具。\n\
    \n### 第 8 章：Espresso 与 UI Automator：完美搭档\n\n本章解释了 Android 最强大的测试自动化设置之一，它结合了 Espresso\
    \ 测试框架和 UI Automator 测试工具。示例展示了如何在执行 Espresso 测试时测试通知或操作第三方应用。\n\n### 第 9 章：处理运行时系统操作和权限\n\
    \n本章解释了处理权限请求对话框等系统操作的不同方法，并描述了以编程方式更改 Android 模拟器系统语言的可行解决方案。\n\n### 第 10 章：Android\
    \ 测试自动化工具\n\n阅读本章后，你将了解如何使用 Espresso 测试记录器、设置测试设备或模拟器以最大限度地减少测试不稳定性，以及在 Firebase\
    \ 云端运行测试。\n\n### 第 11 章：Android UI 测试中的屏幕对象设计模式\n\n本章向你展示如何将屏幕对象（等同于页面对象）架构方法应用于测试项目，这允许你减少在应用程序源代码更改后重新修改测试所花费的维护工作量。\n\
    \n### 第 12 章：使用 Espresso 和 Kotlin 测试机器人模式\n\n在本章中，你将学习如何应用一种测试机器人模式，该模式将测试实现与业务逻辑分离到\
    \ Espresso UI 测试中。\n"
- fmt: '# Chapter 13: Supervised Monkey Tests with Espresso and UI Automator


    This chapter shows how to implement supervised pseudo-monkey tests using Espresso
    and UI Automator, which can be applicable to applications whose source code you
    have access to as well as to third-party applications.


    # Chapter 14: AndroidX Test Library


    This chapter demonstrates how to migrate test code from Android support to the
    AndroidX Test library. You will find information about new APIs introduced in
    the AndroidX Test library and see how they can be applied to UI tests.


    # Chapter 15: Improving Productivity and Testing Unusual Components


    This chapter contains code samples that were not covered in the other chapters
    and Espresso testing tips that may increase your daily test writing productivity.
    This includes creating parameterized tests, aggregating tests into test suites,
    using AndroidStudio Live templates in UI tests, setting `SeekBar` progress in
    Espresso UI tests, and Espresso `Drawable` matchers topics.


    ## What This Book Doesn’t Cover


    The goal of the book is to create a guide for how to write end-to-end UI automated
    tests for Android applications without mocking or stubbing application dependencies.
    From my point of view, this is the closest way to reproduce end user behavior.
    The book does not explain how to mock application data and network connection
    requests or bypass some states in the application workflow.


    ## Tools Requirements


    To be able to work with this book, you need to have at least a basic knowledge
    in working with such tools and platforms as Android Studio IDE, Gradle, GitHub,
    and shell/bash. In most cases, I explain how to configure your IDE and note which
    commands should be used to run the specific scripts.


    ## Legal Notice


    This book contains code, documentation, and images taken from the Android developers
    page at [`https://developer.android.com`](https://developer.android.com). They
    are covered by the Apache 2.0 License ([`http://www.apache.org/licenses/`](http://www.apache.org/licenses/))
    mentioned in Appendix C.


    ### About the Author and About the Technical Reviewer


    ### About the Author


    ### About the Technical Reviewer


    # 1. Getting Started with Espresso for Android


    Espresso for Android is a lightweight, fast, and customizable Android testing
    framework, designed to provide concise and reliable automated UI tests. At the
    end of October 2013, Espresso was open sourced by Google after it was announced
    at the Google Test Automation Conference. From that moment it has been gaining
    popularity across Android software and test engineers. Now it is the most popular
    testing framework for the Android platform because its features and development
    are driven by Google and the Android Open Source community.


    This chapter describes Espresso’s basics—the core components of the Espresso testing
    framework that are used in test automation to replicate the end user behavior.
    This includes locating application UI elements on the screen and operating on
    them.


    Espresso includes the following packages:


    - `espresso-core` — Contains core and basic view matchers, actions, and assertions.

    - `espresso-contrib` — External contributions that contain `DatePicker`, `RecyclerView`,
    and `Drawer` actions, accessibility checks, and the `CountingIdlingResource`.

    - `espresso-intents` — Extensions to validate and stub intents for hermetic testing.

    - `espresso-idling-resource` — Espresso’s mechanism for synchronizing background
    jobs.

    - `espresso-remote` — Location of Espresso’s multi-process functionality.

    - `espresso-web` — Contains resources for `WebView` support.


    ## User Interface Testing: Goals and Approach


    As mentioned, this book focuses on writing functional end-to-end UI tests, which
    is the closest way to replicate end user behavior and catch potential issues before
    a product goes live. Despite the fact that such tests can be much slower than
    unit or integration tests, they usually discover issues that were not caught during
    the unit and integration testing stages.


    I would like to emphasize the fact that all the test examples in the book do not
    contain any conditional logic. Conditional logic in test automation is a bad practice
    because the same test can be executed in different ways, which eliminates easy
    ways of bug reproduction, reduces the trust in the tests, and increases the test
    maintenance effort.


    Tests should be written in a simple and plain way, so everyone who looks at them
    will understand what step led to the issue.'
  raw: '### Chapter [13](#469090_1_En_13_Chapter.xhtml) : Supervised Monkey Tests
    with Espresso and UI Automator


    This chapter shows how to implement supervised pseudo-monkey tests using Espresso
    and UI Automator, which can be applicable to applications whose source code you
    have access to as well as to third-party applications.


    ### Chapter [14](#469090_1_En_14_Chapter.xhtml) : AndroidX Test Library


    This chapter demonstrates how to migrate test code from Android support to the
    AndroidX Test library. You will find information about new APIs introduced in
    the AndroidX Test library and see how they can be applied to UI tests.


    ### Chapter [15](#469090_1_En_15_Chapter.xhtml) : Improving Productivity and Testing
    Unusual Components


    This chapter contains code samples that were not covered in the other chapters
    and Espresso testing tips that may increase your daily test writing productivity.
    This includes creating parameterized tests, aggregating tests into test suites,
    using AndroidStudio Live templates in UI tests, setting `SeekBar` progress in
    Espresso UI tests, and Espresso `Drawable` matchers topics.


    ## What This Book Doesn’t Cover


    The goal of the book is to create a guide for how to write end-to-end UI automated
    tests for Android applications without mocking or stubbing application dependencies.
    From my point of view, this is the closest way to reproduce end user behavior.
    The book does not explain how to mock application data and network connection
    requests or bypass some states in the application workflow.


    ## Tools Requirements


    To be able to work with this book, you need to have at least a basic knowledge
    in working with such tools and platforms as Android Studio IDE, Gradle, GitHub,
    and shell/bash. In most cases, I explain how to configure your IDE and note which
    commands should be used to run the specific scripts.


    ## Legal Notice


    This book contains code, documentation, and images taken from the Android developers
    page at [`https://developer.android.com`](https://developer.android.com) . They
    are covered by the Apache 2.0 License ( [`http://www.apache.org/licenses/`](http://www.apache.org/licenses/)
    ) mentioned in Appendix C.


    ### About the Author and About the Technical Reviewer


    ### About the Author


    ### About the Technical Reviewer


    # 1. Getting Started with Espresso for Android


    Espresso for Android is a lightweight, fast, and customizable Android testing
    framework, designed to provide concise and reliable automated UI tests. At the
    end of October 2013, Espresso was open sourced by Google after it was announced
    at the Google Test Automation Conference. From that moment it has been gaining
    popularity across Android software and test engineers. Now it is the most popular
    testing framework for the Android platform because its features and development
    are driven by Google and the Android Open Source community.


    This chapter describes Espresso’s basics—the core components of the Espresso testing
    framework that are used in test automation to replicate the end user behavior.
    This includes locating application UI elements on the screen and operating on
    them.


    Espresso includes the following packages:


    *   `espresso-core`—Contains core and basic view matchers, actions, and assertions.


    *   `espresso-contrib`—External contributions that contain DatePicker, RecyclerView,
    and Drawer actions, accessibility checks, and the `CountingIdlingResource`.


    *   `espresso-intents`—Extensions to validate and stub intents for hermetic testing.


    *   `espresso-idling-resource`—Espresso’s mechanism for synchronizing background
    jobs.


    *   `espresso-remote`—Location of Espresso’s multi-process functionality.


    *   `espresso-web`—Contains resources for WebView support.


    ## User Interface Testing: Goals and Approach


    As mentioned, this book focuses on writing functional end-to-end UI tests, which
    is the closest way to replicate end user behavior and catch potential issues before
    a product goes live. Despite the fact that such tests can be much slower than
    unit or integration tests, they usually discover issues that were not caught during
    the unit and integration testing stages.


    I would like to emphasize the fact that all the test examples in the book do not
    contain any conditional logic. Conditional logic in test automation is a bad practice
    because the same test can be executed in different ways, which eliminates easy
    ways of bug reproduction, reduces the trust in the tests, and increases the test
    maintenance effort.


    Tests should be written in a simple and plain way, so everyone who looks at them
    will understand what step led to the issue.'
