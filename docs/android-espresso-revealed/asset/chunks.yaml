    ## 在 UI 测试中使用 Truth 断言库


    虽然 `Truth` 断言库主要是为单元测试和集成测试开发的，但它同样能为 UI 测试带来好处。我们在第 8 章中使用了 `JUnit` 断言来断言 UI
    Automator 测试中屏幕上的元素是否存在。让我们看看基本 `JUnit` 断言和 `Truth` 断言之间的区别。


    ### 表 14-1 基本 JUnit 和 Truth 断言对比


    | JUnit | Truth |

    | --- | --- |

    | `assertEquals(b, a)` `assertTrue(c)` `assertTrue(d.contains(a))` | `assertThat(a).isEqualTo(b)`
    `assertThat(c).isTrue()` `assertThat(d).contains(a)` |

    | `assertTrue(d.contains(a) && d.contains(b))` `assertTrue(d.contains(a) \|\|
    d.contains(b) \|\| d.contains(c))` | `assertThat(d).containsAllOf(a, b)` `assertThat(d).containsAnyOf(a,
    b, c)` |


    说实话，`Truth` 的语法更具可读性，更易于编写，并且与我们编写 Espresso 测试时使用的 Hamcrest 库方法类似。现在转到测试失败报告部分。拥有有意义且描述清晰的测试失败堆栈跟踪非常重要，这样故障分析就不需要太多时间和精力。`TruthTest.kt`
    类中包含两个测试，它们会失败以展示 `JUnit` 和 `Truth` 的失败报告并进行比较。


    *chapter14* *.TruthTest.kt. 两个测试均会失败以展示 JUnit 与 Truth 断言在堆栈跟踪上的差异。*


