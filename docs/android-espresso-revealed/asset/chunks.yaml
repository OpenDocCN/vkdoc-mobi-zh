    .findObject(By.clickable(true))\n.wait(Until.checked(true), twoSeconds)\n```\n\
    \nConsidering what we’ve covered so far, we can admit that UI Automator\nis a\
    \ powerful test framework that can be used as a standalone test\nautomation tool.\
