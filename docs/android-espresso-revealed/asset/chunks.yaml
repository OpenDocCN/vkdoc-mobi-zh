    \ 'androidx.test:rules:1.1.0'\nandroidTestImplementation 'androidx.test.espresso:espresso-core:3.1.0'\n\
    ```\n\n在第 1 章中，我们讨论了`ActivityTestRule`在 Espresso 测试中的目的和作用。与`ActivityTestRule`类似，Espresso\
    \ 还提供了`IntentsTestRule`，它是`ActivityTestRule`的扩展，必须在需要桩化(stub)或验证意图(intents)时使用。与`ActivityTestRule`的情况一样，`IntentsTestRule`会在每个带有`@Test`注解的测试执行前初始化\
    \ Espresso-Intents，并在每次测试运行后释放 Espresso-Intents。\n\n以下是`IntentsTestRule`的示例：\n\
    \n```kotlin\n@get:Rule\nvar intentsTestRule = IntentsTestRule(TasksActivity::class.java)\n\
    ```\n\n我们的示例应用包含为待办事项附加图片的功能，这是一个用于获取结果意图(activity for a result intent)的示例，该意图从系统接收图片文件。图\
    \ 5-1 展示了当启动活动意图(start activity intent)发送给第三方应用时的意图流。\n\n![../images/469090_1_En_5_Chapter/469090_1_En_5_Fig1_HTML.jpg](img/469090_1_En_5_Fig1_HTML.jpg)\n\
    \n**图 5-1** 活动意图流（图片来源：[`https://developer.android.com/guide/components/intents-filters`](https://developer.android.com/guide/components/intents-filters)）\n\
    \n第 1 步展示了从我们的应用发送启动活动意图，以通知系统需要将某些功能委托给第三方应用。接着，系统会知道在第 1 步中可以发送给哪些应用；如果至少找到一个应用，系统会重新将同一个活动意图传输给它，如第\
    \ 2 步所示。在第 3 步中，被选中的应用接收该意图并启动相应的活动。对于通过`startActivityForResult()`发送的意图，所启动活动的结果（例如，从图库或相册应用中选择的图片链接）会返回给最初创建该意图的应用。现在是时候了解\
    \ Espresso 如何桩化发送到应用上下文之外的第三方应用的意图。\n\n## 桩化活动意图(Stubbing Activity Intents)\n\n\
    如前所述，Espresso 不支持离开测试上下文下的应用，即离开被测试的应用，以便与第三方应用交互。因此，Espresso 通过`Intents`类中的`intending()`方法提供了桩化机制。\n\
    \n该方法允许桩化意图响应，并且在启动意图的活动期望返回数据时特别有用（尤其是当目标活动是外部活动时）。在这种情况下，测试编写者可以调用：\n\n```java\n\
    intending(intentMatcher).thenRespond(myResponse)\n```\n\n并验证启动活动是否正确处理了结果。\n\n\
    > **注意：** 在此代码示例中，第三方应用的目标活动将不会被启动。\n\n## 桩化无返回结果的意图\n\n意图桩化的第一个用例可以将我们的应用与任何可能导致启动第三方应用状态的操作隔离开来。为此，Espresso\
    \ 的`intending()`机制支持桩化非内部意图，即不属于我们应用的意图。以下是它在测试类的`@Before`方法中的实现方式。\n\n*chapter5.StubAllIntentsTest.kt*\n\
    \n```kotlin\n@Before\nfun stubAllExternalIntents() {\n    // 默认情况下，Espresso Intents\
    \ 不会桩化任何 Intents。\n    // 桩化需要在每次测试运行前设置。\n    // 在此情况下，所有外部 Intents 都将被阻止。\n\
    \    intending(not(isInternal()))\n        .respondWith(Instrumentation.ActivityResult(Activity.RESULT_OK,\
    \ null))\n}\n```\n\n> **注意：** 带有`@Before`注解的方法会在每个测试用例运行之前执行。\n\n你可以在该代码示例中看到两个新方法：\n\
    \n* `isInternal()` — 意图匹配器，如果意图的包名与插桩测试的目标包名相同，则匹配该意图。\n* `Instrumentation.ActivityResult(Activity.RESULT_OK,\
    \ null)` — `ActivityResult`类，允许我们创建一个新的`ActivityResult`，该结果将以指定的结果代码传播回原始活动。有关更多详细信息，请参阅\
    \ Android 的`Instrumentation.java`类和`Activity.setResult()`方法。\n\n我们从第 1 章和第 2 章中已经熟悉了\
    \ hamcrest 匹配器。`IntentMatchers`具有类似的功能。除了意图匹配器之外，Espresso 还提供了`BundleMatchers`、`ComponentNameMatchers`和`UriMatchers`，它们与`IntentMatchers`配合使用。以下是所有这些匹配器的简要概述。\n\
    \n**`IntentMatchers`**：\n* `anyIntent()` — 匹配任何意图。\n* `hasAction()` — 通过意图动作匹配意图。最常见的示例是`Intent.ACTION_CALL`用于执行电话呼叫动作，或`Intent.ACTION_SEND`用于发送电子邮件或短信。有关更多动作类型，请参阅\
    \ Android 的`Intent.java`类。\n* `hasCategories()` — 匹配意图类别，它是一个包含有关应处理意图的组件类型的附加信息的字符串。例如，`CATEGORY_LAUNCHER`的字符串值为`android.intent.category.LAUNCHER`，用于指定初始应用活动。\n\
    * `hasComponent()` — 可以通过类名、包名或短类名匹配意图。使用`ComponentNameMatchers`。\n* `hasData()`\
    \ — 匹配具有该意图正在操作的特定数据的意图。通常使用`content:`方案，在内容提供者中指定数据。其他方案可能由特定活动处理，例如`http:`由网络浏览器处理。使用`UriMatchers`。\n\
    * `hasExtraWithKey()` — 匹配具有附加到意图的特定 Bundle 的意图。使用一个接受 Bundle 匹配器作为参数的`hasExtras()`方法。\n\
    * `hasExtra()` — 与`hasExtras()`相同，但针对额外数据。\n* `hasExtras()` — 匹配具有特定扩展数据或额外数据的意图。此数据通过重载的`Intent.putExtra()`方法之一以`<名称,\
    \ 值>`对的形式放入意图中。额外参数的名称必须包含包前缀。例如，应用`com.android.contacts`会使用像`com.android.contacts.ShowAll`这样的名称。\n\
    * `hasType()` — 匹配包含显式 MIME 类型的意图。\n* `hasPackage()` — 匹配仅限于指定应用包名的意图。\n* `toPackage()`\
    \ — 根据可以处理意图的活动的包名来匹配意图。\n* `hasFlag()` — 与`getFlags()`相同。\n* `hasFlags()` — 匹配具有指定标志的意图。标志列表可在[`https://developer.android.com/reference/android/content/Intent#setFlags(int)`](https://developer.android.com/reference/android/content/Intent%2523setFlags%2528int%2529)找到。\n\
    * `isInternal()` — 如果意图的包名与插桩测试的目标包名相同，则匹配该意图。\n\n**`BundleMatchers`** 类表示用于意图\
    \ Bundle 的 hamcrest 匹配器。Bundle 通常以`<键, 值>`对的形式用于在活动之间传递数据。\n* `hasEntry()` — 基于`<键,\
    \ 值>`对匹配 Bundle 对象。\n* `hasKey()` — 基于键匹配 Bundle 对象。\n* `hasValue()` — 基于值匹配 Bundle\
    \ 对象。\n\n**`ComponentNameMatchers`**：\n* `hasClassName()` — 基于类名匹配组件。\n* `hasPackageName()`\
    \ — 基于提供的包名匹配组件。\n* `hasShortClassName()` — 基于短类名匹配组件。"
- fmt: "# 文档排版\n\n## 匹配器说明\n\n- `hasMyPackageName()` — 匹配基于通过 Instrumentation Registry\
    \ 为测试找到的目标包名的组件。\n\n`UriMatchers` 用于基于 URI 对象匹配 Intent。例如，如果动作为 `ACTION_EDIT`，数据应包含要编辑的文档的\
    \ URI。\n\n- `hasHost()` — 基于主机匹配 URI 对象。例如，如果 authority 是 `\"bob@google.com\"\
    `，此方法将尝试基于 `\"google.com\"` 匹配该对象。\n- `hasParamWithName()` — 基于参数名称匹配 URI 对象。\n\
    - `hasParamWithValue()` — 基于参数值匹配 URI 对象。\n- `hasPath()` — 基于路径匹配 URI 对象。例如：`mailto:nobody@google.com`。\n\
    - `hasSchemeSpecificPart()` — 基于特定 scheme 部分匹配 URI 对象。这是 scheme 分隔符 `':'` 和 fragment\
    \ 分隔符 `'#'` 之间的所有内容。如果是相对 URI，此方法返回整个 URI。例如：`\"//www.google.com/search?q=android\"\
    `。\n\n现在让我们回到 `chapter5.StubAllIntentsTest.kt` 类，看看 Intent 桩如何工作。以下是该类的实现。\n\n\
    *chapter5.StubAllIntentsTest.kt*\n\n```kotlin\nclass StubAllIntents {\n    @get:Rule\n\
    \    var intentsTestRule = IntentsTestRule(TasksActivity::class.java)\n    \n\
    \    private var toDoTitle = \"\"\n    private var toDoDescription = \"\"\n  \
    \  \n    // ViewInteractions used in tests\n    private val addFab = viewWithId(R.id.fab_add_task)\n\
    \    private val taskTitleField = viewWithId(R.id.add_task_title)\n    private\
    \ val taskDescriptionField = viewWithId(R.id.add_task_description)\n    private\
    \ val editDoneFab = viewWithId(R.id.fab_edit_task_done)\n    private val shareMenuItem\
    \ = onView(allOf(withId(R.id.title), withText(R.string.share)))\n    \n    @Before\n\
    \    fun setUp() {\n        toDoTitle = TestData.getToDoTitle()\n        toDoDescription\
    \ = TestData.getToDoDescription()\n    }\n    \n    @Before\n    fun stubAllExternalIntents()\
    \ {\n        // By default Espresso Intents does not stub any Intents. Stubbing\
    \ needs to be setup before\n        // every test run. In this case all external\
    \ Intents will be blocked.\n        intending(not(isInternal()))\n           \
    \ .respondWith(Instrumentation.ActivityResult(Activity.RESULT_OK, null))\n   \
    \ }\n    \n    @Test\n    fun stubsShareIntent() {\n        // adding new TO-DO\n\
    \        addFab.click()\n        taskTitleField.type(toDoTitle).closeKeyboard()\n\
    \        taskDescriptionField.type(toDoDescription).closeKeyboard()\n        editDoneFab.click()\n\
    \        \n        // verifying new TO-DO with title is shown in the TO-DO list\n\
    \        viewWithText(toDoTitle).checkDisplayed()\n        openContextualActionModeOverflowMenu()\n\
    \        shareMenuItem.click()\n        //viewWithText(toDoTitle).click()\n  \
    \  }\n}\n```\n\n我们的类包含一个简单的测试，它添加一个新的待办事项，然后点击操作栏菜单中的分享按钮。如您所见，我们使用了 `IntentsTestRule`\
    \ 和 `stubAllExternalIntents()` 方法。`stubsShareIntent()` 测试在列表中添加一个新的待办事项，打开操作栏菜单，然后点击分享选项，该选项会触发分享\
    \ Intent 并将其发送到系统。在实际使用场景中，系统会将此 Intent 重定向到另一个应用程序。如果系统有多个可以处理该 Intent 的应用程序，则会弹出显示选项的弹出窗口。\n\
    \n在我们的案例中，在每个测试方法之前运行的 `stubsAllExternalIntents()` 方法将执行其工作，Intent 不会离开应用程序。尝试运行测试并查看结果。图\
    \ 5-2 显示了最后一个测试方法步骤后应用程序的最终状态。\n\n![../images/469090_1_En_5_Chapter/469090_1_En_5_Fig2_HTML.jpg](images/469090_1_En_5_Chapter/469090_1_En_5_Fig2_HTML.jpg)\n\
    \n图 5-2 带有外部 Intent 桩的 `stubsShareIntent()` 测试的最终状态\n\n让我们看看当外部 Intent 桩不存在时会发生什么——只需注释掉\
    \ `stubAllExternalIntents()` 方法并再次运行测试。图 5-3 显示了最终应用程序状态。\n\n![../images/469090_1_En_5_Chapter/469090_1_En_5_Fig3_HTML.jpg](images/469090_1_En_5_Chapter/469090_1_En_5_Fig3_HTML.jpg)\n\
    \n图 5-3 没有外部 Intent 桩的 `stubsShareIntent()` 测试的最终状态\n\n您可以看到差异，并证明 Intent 桩有效。问题是，在两种情况下，测试都能通过。但在第二种情况下，它通过只是因为我们在发送\
    \ Intent 后没有任何额外的步骤。如果您注释掉 Intent 被桩化后的这行代码：\n\n```kotlin\n//viewWithText(toDoTitle).click()\n\
    ```\n\n并再次运行测试，您将看到测试失败。取消注释 `stubAllExternalIntents()` 方法将使测试再次通过。\n\n## 为单个\
    \ Intent 设置桩\n\n我们刚刚看到了如何对所有的外部应用程序 Intent 进行桩化，但如果只想对单个 Intent 进行桩化呢？那么，我们唯一需要做的就是用特定的\
    \ Intent 匹配器替换以下表达式中的 `intentMatcher`：\n\n```kotlin\nintending(intentMatcher).thenRespond(myResponse)\n\
    ```\n\n分享待办事项的 Intent 实现如下所示。\n\n*来自 `com.example.android.architecture.blueprints.todoapp.tasks.TasksFragment.java`\
    \ 类的分享 Intent Java 实现*\n\n```java\nString email = PreferenceManager\n    .getDefaultSharedPreferences(getContext())\n\
    \    .getString(\"email_text\", \"\");\nIntent shareIntent = new Intent();\nshareIntent.setAction(Intent.ACTION_SEND);\n\
    shareIntent.setType(\"text/plain\");\nshareIntent.putExtra(Intent.EXTRA_TEXT,\
    \ getTaskListAsArray());\nshareIntent.putExtra(Intent.EXTRA_EMAIL, email);\nstartActivity(Intent.createChooser(shareIntent,\n\
    \    getResources().getText(R.string.share_to)));\n```\n\n首先，我们将分解 Intent 实现，看看哪些\
    \ Intent 匹配器可以应用于它：\n\n- `shareIntent.setAction(Intent.ACTION_SEND)` — 此 Intent\
    \ 属性可以通过 `hasAction()` Intent 匹配器匹配。\n- `shareIntent.setType(\"text/plain\")`\
    \ — 可以通过 `hasType()` Intent 匹配器匹配。\n- `shareIntent.putExtra(Intent.EXTRA_TEXT,\
    \ getTaskListAsArray())` 和 `shareIntent.putExtra(Intent.EXTRA_EMAIL, email)` —\
    \ 可以通过 `hasExtra()` 或 `hasExtras()` Intent 匹配器匹配。\n\n看起来简单明了，为了展示如何为每种情况实现 Intent\
    \ 匹配器，请打开 `chapter5.StubIntentTest.kt` 类。其实现与 `chapter5.StubAllIntentsTest.kt`\
    \ 类类似，但不是为每个测试方法应用外部 Intent 桩，而是在方法级别应用，并在此应用特定的 Intent 匹配器。\n\n*`chapter5.StubIntentTest.kt`\
    \ 类展示了如何使用不同的 Intent 匹配器对 Intent 进行桩化。*"
  raw: "*   ***hasMyPackageName()***⎯Matches a component\n    based on the target\
    \ package name found through the Instrumentation\n    Registry for the test.\n\
    \n`UriMatchers`\n ⎯used for\nmatching intents based on the URI object. For example,\
    \ if the action is\n`ACTION_EDIT`,\nthe data should contain the URI of the document\
    \ to edit.\n\n*   `hasHost()`⎯Matches the\n    URI object based on the host. For\
    \ example, if the authority is `\"`bob@google.com`\"`, this method will\n    try\
    \ to match the object based on `\"` [`google.com`](http://google.com) `\"`.\n\n\
    *   `hasParamWithName()`⎯Matches\n    the URI object based on the parameter name.\n\
    \n*   `hasParamWithValue()`⎯Matches\n    the URI object based on the parameter\
    \ value.\n\n*   `hasPath()`⎯Matches the\n    URI object based on the path. Like\
    \ mailto:nobody@google.com.\n\n*   `hasSchemeSpecificPart()`⎯Matches\n    the\
    \ URI object based on the specific scheme part. This is everything\n    between\
    \ the scheme separator `':'` and the fragment\n    separator `'#'`.\n    If this\
    \ is a relative URI, this method returns the entire URI. For\n    example, `\"\
    //` [`www.google.com/search?q=android`](http://www.google.com/search%253Fq%253Dandroid)\
    \ `\"`.\n\nNow let’s return to the `chapter5.StubAllIntentsTest.kt`\nclass and\
    \ see how intent stubbing works. Here is the class\nimplementation.\n\n*chapter5.StubAllIntentsTest.kt.*\n\
    \n```\nclass StubAllIntents {\n@get:Rule\nvar intentsTestRule = IntentsTestRule(TasksActivity::class.java)\n\
    private var toDoTitle = \"\"\nprivate var toDoDescription = \"\"\n// ViewInteractions\
    \ used in tests\nprivate val addFab = viewWithId(R.id.fab_add_task)\nprivate val\
    \ taskTitleField = viewWithId(R.id.add_task_title)\nprivate val taskDescriptionField\
    \ = viewWithId(R.id.add_task_description)\nprivate val editDoneFab = viewWithId(R.id.fab_edit_task_done)\n\
    private val shareMenuItem =\nonView(allOf(withId(R.id.title), withText(R.string.share)))\n\
    @Before\nfun setUp() {\ntoDoTitle = TestData.getToDoTitle()\ntoDoDescription =\
    \ TestData.getToDoDescription()\n}\n@Before\nfun stubAllExternalIntents() {\n\
    // By default Espresso Intents does not stub any Intents. Stubbing needs to be\
    \ setup before\n// every test run. In this case all external Intents will be blocked.\n\
    intending(not(isInternal()))\n.respondWith(Instrumentation.ActivityResult(Activity.RESULT_OK,\
    \ null))\n}\n@Test\nfun stubsShareIntent() {\n// adding new TO-DO\naddFab.click()\n\
    taskTitleField.type(toDoTitle).closeKeyboard()\ntaskDescriptionField.type(toDoDescription).closeKeyboard()\n\
    editDoneFab.click()\n// verifying new TO-DO with title is shown in the TO-DO list\n\
    viewWithText(toDoTitle).checkDisplayed()\nopenContextualActionModeOverflowMenu()\n\
    shareMenuItem.click()\n//viewWithText(toDoTitle).click()\n}\n}\n```\n\nOur class\
    \ contains a simple test that adds a new TO-DO item and then\nclicks on the share\
    \ button from the action bar menu. As you can see, we\nuse the `IntentsTestRule`\
    \ and\n`stubAllExternalIntents()`\nmethod  .\nThe `stubsShareIntent()`\ntest \
    \ adds a new\nTO-DO item in the list, opens the action bar menu, and clicks on\
    \ the\nShare option, which from its side, triggers the share intent to send it\n\
    to the system. In a real use case, the system will redirect this intent\nto another\
    \ application. If the system has more than one application that\ncan handle the\
    \ intent, a popup window showing the options will\nappear.\n\nIn our case, the\
    \ `stubsAllExternalIntents()`\nmethod  that is\nrun before each test method will\
    \ do its job and the intent will not go\nout of the application. Try to run the\
    \ test and see the result. Figure\n[5-2](#469090_1_En_5_Chapter.xhtml#Fig2) shows\
    \ the end\nstate of the application after the last test method step.\n\n![../images/469090_1_En_5_Chapter/469090_1_En_5_Fig2_HTML.jpg](images/469090_1_En_5_Chapter/469090_1_En_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2\nThe final state of the stubsShareIntent() test\nwith stubbed external\
    \ intents\n\nLet’s see what happens when external intent stubbing is not in\n\
    place⎯just comment out the `stubAllExternalIntents()`\nmethod  and run\nthe test\
    \ again. Figure [5-3](#469090_1_En_5_Chapter.xhtml#Fig3) shows the final\napplication\
    \ state.\n\n![../images/469090_1_En_5_Chapter/469090_1_En_5_Fig3_HTML.jpg](images/469090_1_En_5_Chapter/469090_1_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3\nThe final state of the stubsShareIntent() test\nwithout stubbed\
    \ external intents\n\nYou see the difference and proof that intent stubbing works.\
    \ The thing\nis that in both cases, the test passes. But in the second case, it\n\
    passes just because we don’t have any additional steps after the intent\nis sent.\
    \ If you comment out this line of code, which follows the moment\nthe intent is\
    \ stubbed:\n\n```\n//viewWithText(toDoTitle).click()\n```\n\nand run the test\
    \ again, you will see that the test fails.\nUncommenting the `stubAllExternalIntents()`\n\
    method  will make\nthe test green again.\n\nStubbing a Single Intent\n\nWe just\
    \ saw how all external application intents are stubbed, but what\nif we want to\
    \ stub just one intent? Then the only thing we have to do is\nreplace the  `intentMatcher`\
    \ \nfrom the following expression with a specific one using the intent\nmatchers:\n\
    \n```\nintending(intentMatcher).thenRespond(myResponse)\n```\n\nThe share TO-DOs\n\
    intent implementation looks the following way.\n\n*Share Intent Java Implementation\
    \ from the\ncom.example.android.architecture.blueprints.todoapp.tasks.TasksFragment.java\n\
    Class.*\n\n```\nString email = PreferenceManager\n.getDefaultSharedPreferences(getContext())\n\
    .getString(\"email_text\", \"\");\nIntent shareIntent = new Intent();\nshareIntent.setAction(Intent.ACTION_SEND);\n\
    shareIntent.setType(\"text/plain\");\nshareIntent.putExtra(Intent.EXTRA_TEXT,\
    \ getTaskListAsArray());\nshareIntent.putExtra(Intent.EXTRA_EMAIL, email);\nstartActivity(Intent.createChooser(shareIntent,\n\
    getResources().getText(R.string.share_to)));\n```\n\nFirst, we will brake down\
    \ the intent implementation and see what intent\nmatchers can be applied to it:\n\
    \n*   `shareIntent.setAction(Intent.ACTION_SEND)`⎯This\n    intent property can\
    \ be matched by an `hasAction()` intent\n    matcher.\n\n*   `shareIntent.setType(\"\
    text/plain\")`⎯Can\n    be matched by the `hasType()` intent\n    matcher.\n\n\
    *   `shareIntent.putExtra(Intent.EXTRA_TEXT, getTaskListAsArray())` and `shareIntent.putExtra(Intent.EXTRA_EMAIL,\
    \ email)`⎯Can be matched by the `hasExtra()` or `hasExtras()` intent\n    matchers.\n\
    \nIt looks simple and clear, so to show how intent matchers can be\nimplemented\
    \ for each case, open the `chapter5.StubIntentTest.kt`\nclass. Its implementation\
    \ is similar to the `chapter5.StubAllIntentsTest.kt`\nclass, but instead of applying\
    \ external intents stubbing for each test\nmethod, we apply them on the method\
    \ level, where specific intent\nmatchers are applied.\n\n*chapter5.StubIntentTest.kt* \
    \ *Class*   *Shows How to Stub\nIntents Using Different Intent Matchers.*"
  trans: "\n# 文档排版\n\n## 匹配器说明\n\n- `hasMyPackageName()` — 匹配基于通过 Instrumentation\
    \ Registry 为测试找到的目标包名的组件。\n\n`UriMatchers` 用于基于 URI 对象匹配 Intent。例如，如果动作为 `ACTION_EDIT`，数据应包含要编辑的文档的\
    \ URI。\n\n- `hasHost()` — 基于主机匹配 URI 对象。例如，如果 authority 是 `\"bob@google.com\"\
