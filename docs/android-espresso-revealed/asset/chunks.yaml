- fmt: '# Sample Script to Save and Load the Emulator Snapshot


    ```

    telnet localhost 5554

    avd snapshot list

    avd snapshot save snap_de

    emulator -avd Pixel2_API_28 -snapshot snap_de

    ```


    Since the main topic of this book is test automation, the following Python script
    creates the telnet connection to the localhost port 5554 (which is the first port
    the Android emulator takes when it is created) and loads the previously saved
    snapshot.


    # Python Script to Establish the Emulator Telnet Connection and Load the Emulator
    Snapshot


    ```

    import telnetlib

    HOST = "localhost"

    PORT = "5554"

    tn = telnetlib.Telnet(HOST, PORT)

    tn.write(b"avd snapshot load name\n")

    tn.write(b"exit\n")

    ```


    Alternatively, you can do the same thing using the `expect` scripting utility
    (for MacOS and UNIX users only).


    # Expect Utility Script to Establish the Emulator Telnet Connection and Load the
    Emulator Snapshot


    ```

    #!/usr/bin/expect

    set timeout 15

    spawn telnet localhost 5554

    expect "OK"

    send "avd snapshot load snap_de\r"

    expect "OK"

    send "exit\r"

    ```


    To install the `expect` utility on your computer, use these commands:

    * Mac: `brew install expect`

    * UNIX/Linux: `yum install expect`


    In general, the current snapshot approach works not only for setting emulator
    language but also gives us the ability to have different snapshots for many use
    cases, which you can come up with by your own.


    ## Exercise 21


    **Using the Emulator Snapshot Functionality**


    1. Launch an emulator and save a couple of emulator snapshots with the help of
    emulator Extended Controls window. Load the snapshots manually.

    2. Launch an emulator using the console commands. Connect the telnet session to
    the emulator and save a couple of emulator snapshots. Load the snapshots from
    the console.

    3. Create a Python script with emulator telnet commands and run it. Observe the
    result.

    4. Install the `expect` utility on your computer, and then create and execute
    the script with the `expect telnet` commands. Observe the results.


    # Handling Runtime Permissions


    Another burning topic in Android test automation related to system popups are
    runtime permissions. Appropriate permission should be requested by the Android
    application when it requires resources or information outside of its sandbox.
    The application declares permissions in the `AndroidManifest.xml` file and then
    requests that the user approve each permission at runtime (on Android 6.0 and
    higher).


    When the user triggers a piece of code that requires additional permissions, the
    prompt shown by the system describes the permission group your app needs access
    to, not the specific permission.


    In order to showcase this functionality, our sample application requests permission
    when we are adding an image to the TO-DO item. Try it out.


    ## Enabling Permissions Using the GrantPermissionRule


    Now let’s take a look at the `RuntimePermissionTest.kt` class, which contains
    the `GrantPermissionRule` sample. The `GrantPermissionRule` rule grants runtime
    permissions on Android M (API 23) and above. This rule is used when a test requires
    a runtime permission to do its work. When applied to a test class, this rule attempts
    to grant all requested runtime permissions. The requested permissions will then
    be granted on the device and will take immediate effect.


    Clicking on the camera icon in the sample TO-DO application triggers the Camera
    permission prompt to be shown to the user. The prompt belongs to the different
    application package, called `com.andriod.packageinstaller`, which Espresso cannot
    interact with. So, in order to reduce external dependencies and keep our Espresso
    tests hermetic, `GrantPermissionRule` can be used to start the test with the already
    granted permission.


    ### chapter9. RuntimePermissionsTest.kt


    ```

    @RunWith(AndroidJUnit4::class)

    class RuntimePermissionsTest {

    /**

    * Manifest.permission.CAMERA permission will be granted before the test run.

    */

    @get:Rule

    var mRuntimePermissionRule = GrantPermissionRule

    .grant(Manifest.permission.CAMERA)

    /**

    * Provided activity will be launched before each test.

    */

    @get:Rule

    var activityTestRule = ActivityTestRule(TasksActivity::class.java)

    @Test

    fun takesCameraPicture() {

    val toDoTitle = TestData.getToDoTitle()

    val toDoDescription = TestData.getToDoDescription()

    // Adding new TO-DO.

    onView(withId(R.id.fab_add_task)).perform(click())

    onView(withId(R.id.add_task_title))

    .perform(typeText(toDoTitle), closeSoftKeyboard())

    onView(withId(R.id.add_task_description))

    .perform(typeText(toDoDescription), closeSoftKeyboard())

    // Clicking on camera button to trigger the permission dialog.

    onView(withId(R.id.makePhoto)).perform(click())

    onView(withId(R.id.picture)).perform(click())

    waitForElement(onView(withId(R.id.fab_edit_task_done))).perform(click())

    // verifying new TO-DO with title is shown in the TO-DO list.

    onView(withText(toDoTitle)).check(matches(isDisplayed()))

    }

    }

    ```


    This current approach works well, but it has its pros and cons. The positive aspects
    are:

    * UI tests remain hermetic and do not require interactions with other system services.

    * Permission is granted for each test case inside the test class.


    However, there are also some negative moments:

    * It is not possible to test different runtime permission use cases like getting
    permission after denial or trying to use the feature without permission granted.

    * There is no way to revoke a permission after it is granted. Attempting to do
    so will crash the instrumentation process.


    In general, using `GrantPermissionRule` is a nice way to grant runtime permissions
    and avoid permission dialogs from showing up and blocking the application UI.
    From the other side, as was stated, it limits us in terms of covering multiple
    runtime permission requests use cases that are also part of the application that
    should be tested.


    ## Handling Runtime Permissions Using UI Automator


    Another way to handle runtime permissions is to use the UI Automator test framework
    functionality together with Espresso. Since it allows us to interact with any
    application, we are able to perform UI actions on permission dialogs as well.


    First, let’s consider the possible use cases. In total, there can be at least
    three use cases where the runtime permission dialog is involved:

    * Camera permissions granted the first time the permission dialog is shown to
    the user.

    * Camera permission denied by the user during the first occurrence, but then the
    user realizes that she needs such functionality and enables it when the permission
    dialog is presented a second time.

    * Permission is denied two times. The second denial was made with the Don’t Ask
    Again checkbox checked. The user tries to use the Camera feature again, but now
    she must manually enable it from the application permission settings.


    And just to be clear, there is an application code-behind all four use cases,
    which in the case of using `GrantPermissionRule`, are not covered by automated
    tests and require manual testing.


    Second, we may face an issue using only `AndroidJUnitRunner` for permission tests.
    The thing is that each test requires a clean application state without granted
    permissions. Therefore, the option with the Android Test Orchestrator described
    in Chapter [1](#469090_1_En_1_Chapter.xhtml) should be used with `testInstrumentationRunnerArguments
    clearPackageData: ''true'' parameter (see app/build.gradle file for more details)`.
    It ensures that each test will be run within its own invocation, including the
    cleaned application permissions state.


    Third, we have to inspect all areas we will navigate to with the Monitor tool,
    making the UI dump and collect identifiers from elements used in defined use cases.'
