    \ within the currently displayed region of this\n    view.\n\nNote\nThere exist\
    \ views (such as `ScrollViews`) whose\nheight and width are larger than the physical\
    \ device screen by design.\nSuch views will never be completely displayed.\n\n\
    *   `isDisplayingAtLeast()`\n    ⎯Returns a matcher that accepts a view so long\
    \ as a given\n    percentage of that view’s area is not obscured by any parent\
    \ view and is\n    thus visible to the user.\n\n*   `isEnabled()`\n    ⎯Returns\
    \ a matcher that matches view(s) that are enabled.\n    Commonly used.\n\n*  \
    \ `isFocusable()`\n    ⎯Returns a matcher that matches view(s) that are\n    focusable.\n\
    \n*   `hasFocus()`\n    ⎯Returns a matcher that matches view(s) that currently\
    \ have\n    focus.\n\n*   `isSelected()`\n    ⎯Returns a matcher that matches\
    \ view(s) that are\n    selected."
  trans: "\n# Espresso 基础知识\n\n每款移动应用都包含某种形式的用户界面（UI）。在 Android 世界中，这是通过使用 `View`\
    \ 和 `ViewGroup` 对象来实现的。它们用于在 Android 设备屏幕上绘制 UI 元素。从测试的角度来看，我们关注这些 UI 元素，以便进一步对它们执行操作或验证。我们需要做的第一步就是在应用\
    \ UI 中定位这些视图。\n\n## 识别应用 UI 元素\n\n在深入探讨 Espresso 主题之前，让我们从最终用户的角度来思考移动应用。用户在使用应用时会做什么？他们会：\n\
    \n1.  在屏幕上查找 UI 元素（按钮、列表、编辑文本字段、图标等）。\n2.  对 UI 元素执行操作（点击、双击、滑动、输入等）。\n3.  检查结果（文本已输入、点击后达到预期结果、列表已滚动等）。\n\
    \n因此，当我们开始编写自动化测试时，第一项任务就是在应用中找到我们想要对其执行操作的 UI 元素。借助一些工具可以轻松定位它们。第一种可能性是使用 Android\
    \ Device Monitor。\n\n要启动独立的 Device Monitor 应用，请在 `android-sdk/tools/` 目录下的命令行中输入以下内容：\n\
    \n```\nmonitor\n```\n\nAndroid Device Monitor 启动后，连接设备。在 Devices 选项卡中点击设备名称将其选中，打开您想要检查的屏幕，然后点击电话\
    \ ![../images/469090_1_En_1_Chapter/469090_1_En_1_Figb_HTML.jpg](img/469090_1_En_1_Figb_HTML.jpg)\
    \ 图标（见图 1-3）。完成这些步骤后，您只需点击 Android Device Monitor 中可用的元素，即可检查应用 UI。元素的详细信息会显示在右侧，包括资源\
    \ ID、文本、内容描述等。这些信息非常重要，因为它们将成为在应用 UI 内识别视图的基础。\n\n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig3_HTML.jpg](img/469090_1_En_1_Fig3_HTML.jpg)\n\
    \n**图 1-3** 通过点击来识别 UI 元素\n\n第二种选择是使用**布局检查器**，它可以从 AndroidStudio 的“工具” ➤ “布局检查器”菜单中获取。选择所需的活动或片段，然后开始检查应用布局（见图\
    \ 1-4 和 1-5）。\n\n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig5_HTML.jpg](img/469090_1_En_1_Fig5_HTML.jpg)\n\
    \n**图 1-5** 从布局检查器分析应用布局\n\n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig4_HTML.jpg](img/469090_1_En_1_Fig4_HTML.jpg)\n\
    \n**图 1-4** 从布局检查器中选择正在运行的进程\n\n如图 1-5 所示，布局检查器视图更详细。与 Android Device Monitor\
    \ 相比，它为我们提供了更多数据，为视图识别和验证提供了更多可能性。布局检查器的另一个好处是，它可以将布局转储文件保存在 `/captures` 文件夹中，无需启动其他工具即可轻松访问。这些文件可以提交到源代码控制系统，并由多个团队成员使用。\n\
    \n## 练习 1：检查应用布局\n\n现在是时候进行第一个练习了——在模拟器或真实设备上构建并安装示例 TODO 应用，启动它，然后使用 Monitor\
    \ 和 Layout Inspector 工具在不同应用部分创建布局转储文件。然后您可以分析布局，了解这些工具的工作原理，并最终决定哪种工具更适合您。\n\n\
    1.  在“所有待办事项”列表中进行布局转储，并研究其层级结构。\n2.  在“所有待办事项”列表中打开上下文菜单工具栏，并创建一个布局转储文件。研究其层级结构。\n\
    \n## Espresso\n\n至此，借助这些工具或基于源代码，我们已经识别出 UI 元素，现在可以使用 Espresso 开始对它们进行操作。核心的 `Espresso`\
    \ 类是 Espresso 框架的入口点，Espresso 核心方法都在这里。可以通过使用某个 `on` 方法（例如 `onView()`）或执行顶层用户操作（例如\
    \ `pressBack()`）来启动测试。\n\n*   `onView()` — 针对给定视图的 `ViewInteraction`。接收 Hamcrest\
    \ `ViewMatcher` 实例作为参数。您可以将一个或多个这些匹配器传递给 `onView()` 方法，以便根据视图属性在当前视图层次结构中定位视图。\n\
    \n> **注意**  \n> 该视图必须是视图层次结构的一部分。如果它是作为 `AdapterView`（例如 `ListView`）的一部分渲染的，则可能并非如此。如果是这种情况，请先使用\
    \ `Espresso.onData` 加载该视图。\n\n*   `onData()` — 针对数据对象（例如 `ListView`）的 `DataInteraction`。接收一个匹配列表中单个项目所表示的数据对象的\
    \ Hamcrest 匹配器作为参数。\n\n*   `pressBack()` — 按下返回键。如果当前显示的活动是根活动，则抛出 `PerformException`，因为按下返回键会导致应用关闭。\n\
    \n*   `closeSoftKeyboard()` — 如果软键盘是打开的，则将其关闭。\n\n*   `openContextualActionModeOverflowMenu()`\
    \ — 打开在 `ActionMode` 的上下文选项中显示的溢出菜单。\n\n*   `openActionBarOverflowOrOptionsMenu()`\
    \ — 打开在 ActionBar 中显示的溢出菜单。\n\n我们将从基本的 Espresso 功能开始。首先，我们将看到如何使用 `onView()` 方法对单个视图进行操作。它接收一个\
    \ Hamcrest 匹配器作为参数，用于匹配应用 UI 中的视图。我们将在下一节中详细了解视图匹配器。\n\n## Espresso 视图匹配器\n\n\
    视图匹配器构成了一个用于匹配视图的 Hamcrest Java 匹配器集合。Espresso 视图匹配器如下所示（我根据自己的经验标注了最常用的那些）：\n\
    \n*   `isAssignableFrom()` — 基于提供的类的实例或子类来匹配视图。通常与其他 ViewMatcher 结合使用。常用。\n\n\
    *   `withClassName()` — 返回一个匹配器，用于匹配类名与给定匹配器匹配的视图。\n\n*   `isDisplayed()` — 返回一个匹配器，用于匹配当前显示在用户屏幕上的视图。常用。\n\
    \n> **注意**  \n> `isDisplayed()` 会选择部分显示的视图（例如，视图的完整高度/宽度大于可见矩形的高度/宽度）。如果您想确保整个矩形都显示，请使用\
    \ `isCompletelyDisplayed()`。\n\n*   `isCompletelyDisplayed()` — 返回一个只接受高度和宽度完美适配当前显示区域的视图的匹配器。\n\
    \n> **注意**  \n> 存在某些视图（例如 `ScrollViews`），其高度和宽度在设计上就大于物理设备屏幕。此类视图永远不会被完全显示。\n\n\
    *   `isDisplayingAtLeast()` — 返回一个可接受视图的匹配器，只要该视图的给定百分比区域未被任何父视图遮挡，从而对用户可见。\n\n\
    *   `isEnabled()` — 返回一个匹配器，用于匹配已启用的视图。常用。\n\n*   `isFocusable()` — 返回一个匹配器，用于匹配可聚焦的视图。\n\
    \n*   `hasFocus()` — 返回一个匹配器，用于匹配当前具有焦点的视图。\n\n*   `isSelected()` — 返回一个匹配器，用于匹配已选中的视图。\n"
- fmt: "*   `hasSibling()` — Returns a matcher that matches view(s) based on their\
    \ siblings. This may be particularly useful when a view cannot be uniquely selected\
    \ on properties such as text or view ID. For example, a call button is repeated\
    \ several times in a contact layout and the only way to differentiate the call\
    \ button view is by what appears next to it (e.g., the unique name of the contact).\n\
    *   `withContentDescription()` — Returns a matcher that matches view(s) based\
    \ on the content description property value. Commonly used.\n*   `withId()` —\
    \ Returns a matcher that matches view(s) based on content description’s id. Commonly\
    \ used.\n\n> **Note**\n> Android resource IDs are not guaranteed to be unique.\
    \ You may have to pair this matcher with another one to guarantee a unique view\
    \ selection.\n\n*   `withResourceName()` — Returns a matcher that matches view(s)\
    \ based on resource ID names, (for instance, `channel_avatar`).\n*   `withTagKey()`\
    \ — Returns a matcher that matches view(s) based on tag keys.\n*   `withTagValue()`\
    \ — Returns a matcher that matches view(s) based on tag property values.\n*  \
    \ `withText()` — Returns a matcher that matches view(s) based on its text property\
    \ value.\n*   `withHint()` — Returns a matcher that matches view(s) based on its\
    \ hint property value.\n*   `isChecked()` — Returns a matcher that accepts it\
    \ only if the view is a `CompoundButton` (or a subtype of) and is in checked state.\
    \ Commonly used.\n*   `isNotChecked()` — Returns a matcher that accepts it only\
    \ if the view is a `CompoundButton` (or subtype of) and is not in the checked\
    \ state. Commonly used.\n*   `hasContentDescription()` — Returns a matcher that\
    \ matches view(s) with any content description.\n*   `hasDescendant()` — Returns\
    \ a matcher that matches view(s) based on the presence of a descendant in its\
    \ view hierarchy.\n*   `isClickable()` — Returns a matcher that matches view(s)\
    \ that are clickable.\n*   `isDescendantOfA()` — Returns a matcher that matches\
    \ view(s) based on the given ancestor type.\n*   `withEffectiveVisibility()` —\
    \ Returns a matcher that matches view(s) that have “effective” visibility set\
    \ to the given value.\n*   `withAlpha()` — Matches view(s) with the specified\
    \ alpha value. Alpha is a view property value from 0 to 1, where 0 means the view\
    \ is completely transparent and 1 means the view is completely opaque.\n*   `withParent()`\
    \ — A matcher that accepts a view only if the view’s parent is accepted by the\
    \ provided matcher.\n*   `withChild()` — Matches view(s) whose child is accepted\
    \ by the provided matcher.\n*   `hasChildCount()` — Matches a `ViewGroup` (e.g.,\
    \ a `ListView`) if it has exactly the specified number of children.\n*   `hasMinimumChildCount()`\
    \ — Matches a `ViewGroup` (e.g., a `ListView`) if it has at least the specified\
    \ number of children.\n*   `isRoot()` — Returns a matcher that matches the root\
    \ view.\n*   `hasImeAction()` — Returns a matcher that matches views that support\
    \ input methods.\n*   `hasLinks()` — Returns a matcher that matches `TextView`(s)\
    \ that have links.\n*   `withSpinnerText()` — Returns a matcher that matches a\
    \ descendant of a spinner that is displaying the string of the selected item associated\
    \ with the given resource ID.\n*   `isJavascriptEnabled()` — Returns a matcher\
    \ that matches web view(s) if they are evaluating JavaScript.\n*   `hasErrorText()`\
    \ — Returns a matcher that matches `EditText` based on the edit text error string\
    \ value.\n*   `withInputType()` — Returns a matcher that matches `android.text.InputType`.\n\
    *   `withParentIndex()` — Returns a matcher that matches the child index inside\
    \ the `ViewParent`.\n\nAs an example, here is the `withText()` ViewMatcher that\
    \ is passed to the `onView()` method to match the view, shown in Figure [1-6](#469090_1_En_1_Chapter.xhtml#Fig6),\
    \ based on its text:\n\n```java\nonView(withText(\"item 1\"));    // locating\
    \ view with todo \"item 1\"\n```\n\nA similar approach is used to locate the filter\
    \ view in Figure [1-3](#469090_1_En_1_Chapter.xhtml#Fig3) based on the view ID\
    \ and using the `withId()` ViewMatcher. You probably know that all Android application\
    \ assets, from views to strings, are stored in dynamically created `R.java` files.\
    \ Therefore, if the target view has an ID value defined by a developer, we are\
    \ able to locate it by referencing the ID value from the `R.java` class — `R.id.view_id`:\n\
    \n```java\nonView(withId(R.id.menu_filter));    //locating the filter menu item\n\
    ```\n\nIt is time to look at the official Espresso cheat sheet, available from\
    \ the following link — [https://developer.android.com/training/testing/espresso/cheat-sheet](https://developer.android.com/training/testing/espresso/cheat-sheet).\
    \ (See Figure [1-6](#469090_1_En_1_Chapter.xhtml#Fig6)) At this moment we are\
    \ interested in ViewMatchers section. You can see that ViewMatchers are grouped\
    \ into the following focus areas:\n\n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig6_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig6_HTML.jpg)\n\
    \n**Figure 1-6** Espresso cheat sheet 2.1 — ViewMatchers (source [https://developer.android.com/training/testing/espresso/cheat-sheet](https://developer.android.com/training/testing/espresso/cheat-sheet))\n\
    \n*   User properties\n*   UI properties\n*   Object matchers\n*   Hierarchy\n\
    *   Input\n*   Class\n*   Root matchers\n\nLet’s look at some examples of how\
    \ these ViewMatchers can be used with our sample application. Open the `ViewMatchersExampleTest.java`\
    \ class and look at the test methods. All of them are listed in Figure [1-7](#469090_1_En_1_Chapter.xhtml#Fig7).\n\
    \n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig7_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig7_HTML.jpg)\n\
    \n**Figure 1-7** List of TO-DOs in the TO-DO application\n\n```java\n@Test\npublic\
    \ void userProperties() {\n    onView(withId(R.id.fab_add_task));\n    onView(withText(\"\
    All TO-DOs\"));\n    onView(withContentDescription(R.string.menu_filter));\n \
    \   onView(hasContentDescription());\n    onView(withHint(R.string.name_hint));\n\
    }\n```\n\nIn the test case, you can see that we identify views on the screen shown\
    \ in Figure [1-7](#469090_1_En_1_Chapter.xhtml#Fig7). The floating action button\
    \ is identified by its ID — `onView(withId(R.id.fab_add_task))`. The TO-DO items\
    \ list title is identified based on its text — `onView(withText(\"All TO-DOs\"\
    ))`. The filter icon in the toolbar is located by the content description text\
    \ — `onView(withContentDescription(R.string.menu_filter))`. The presence of the\
    \ content description is in a view or based on a view hint.\n\n```java\n@Test\n\
    public void uiProperties() {\n    onView(isDisplayed());\n    onView(isEnabled());\n\
    \    onView(isChecked());\n}\n```\n\nIn this test case, there are examples of\
    \ identifying views by their UI appearance. Based on the screen in Figure [1-7](#469090_1_En_1_Chapter.xhtml#Fig7),\
    \ we see that most of the views are displayed and enabled. That means `onView(isDisplayed())`\
    \ or `onView(isEnabled())` can’t be used without additional matchers, because\
    \ the tests will fail with ambiguous matching exceptions. In the following test\
    \ case, you can see how two matchers are combined into a sequence of matchers\
    \ with the help of the `allOf()` hamcrest logical matcher. It will return the\
    \ matched object only when all the matchers inside it successfully execute. See\
    \ Figures [1-8](#469090_1_En_1_Chapter.xhtml#Fig8) through [1-10](#469090_1_En_1_Chapter.xhtml#Fig10).\
    \ In a later section, you will learn more about the hamcrest matchers.\n\n```java\n\
    @Test\npublic void objectMatcher() {\n    onView(not(isChecked()));\n    onView(allOf(withText(\"\
    item 1\"), isChecked()));\n}\n\n@Test\npublic void hierarchy() {\n    onView(withParent(withId(R.id.todo_item)));\n\
    \    onView(withChild(withText(\"item 2\")));\n    onView(isDescendantOfA(withId(R.id.todo_item)));\n\
    \    onView(hasDescendant(isChecked()));\n    onView(hasSibling(withContentDescription(R.string.menu_filter)));\n\
    }\n```"
