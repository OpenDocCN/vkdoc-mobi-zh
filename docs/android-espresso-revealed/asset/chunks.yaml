    \ = String.format(\n                        \"从: %d - %d 拖动到: %d - %d\", randomX,\n\
    \                        randomY, randomX2, randomY2\n                    )\n\
    \                    drag(randomX, randomY, randomX2, randomY2)\n            \
    \        continue@loop\n                }\n                i % pressNowBack ==\
    \ 0 -> {\n                    monkeyAction = \"按下系统返回按钮\"\n                  \
    \  uiDevice.pressBack()\n                    continue@loop\n                }\n\
    \                else -> {\n                    monkeyAction = \"点击坐标 x:$randomX\
    \ y:$randomY\"\n                    uiDevice.click(randomX, randomY)\n       \
    \             continue@loop\n                }\n            }\n        }\n   \
    \ }\n    /**\n    * 通过包名启动应用程序。\n    * 如果包名与 TO-DO 应用程序包名相同，则使用 ActivityScenario.launch()。\n\
    \    *\n    * @param packageName - 要重新启动的包名\n    */\n    private fun relaunchApp(packageName:\
    \ String) {\n        if (packageName == toDoAppPackageName) {\n            ActivityScenario.launch(TasksActivity::class.java)\n\
    \        } else {\n            PackageInfo.launchPackage(packageName)\n      \
    \  }\n    }\n}\n```\n\n这种 Monkey 操作的实现看起来清晰且易于扩展。即使只有这些数量的操作也足以执行良好的 Monkey 测试。但它也很容易扩展，我们只需在\
    \ `when {}` 块内再引入一个操作即可。 `dragNow` 和 `pressNowBack` 常量的定义方式是为了最小化 `actionCount\
    \ % dragNow` 或 `actionCount % pressNowBack` 两个表达式同时返回 0（零）的情况。当然，你也可以将它们改为适合你需要的值。\n\
    \n逻辑在 Monkey 测试中扮演的重要角色之一，是由以下条件语句处理的：\n\n```kotlin\nif (PackageInfo.shouldRelaunchTheApp(monkeyAction,\
    \ packageName)) {\n    relaunchApp(packageName)\n}\n```\n\n简而言之，此条件检查测试是否离开了被测试的应用程序，或者是否发生了崩溃。如果\
    \ Monkey 测试离开了某个应用程序，则会触发重新启动机制。如果发生了错误，则会创建并抛出一个异常。\n\n### 实现依赖于包的功能\n\n这里有三个依赖应用程序包名的\
    \ Monkey 测试功能，我们希望实现它们：\n\n-   在测试第三方应用程序时，启动或重新启动测试应用程序。\n-   检查测试应用程序进程是否处于错误状态。\n\
    -   创建一个用于识别是否需要重新启动测试应用的函数。\n\n所有这些情况都在 `chapter13.PackageInfo.kt` 文件中实现，如下所示。\n\
    \n*chapter13.PackageInfo.kt*\n\n```kotlin\n/**\n* 提供包辅助方法。\n*/\nobject PackageInfo\
    \ {\n    private val uiDevice = UiDevice.getInstance(InstrumentationRegistry.getInstrumentation())\n\
    \    private val testContext = InstrumentationRegistry.getInstrumentation().context\n\
    \    /**\n    * 检查是否需要重新启动应用程序。\n    *\n    * @return 如果被测应用程序未显示给用户，则返回 true。\n\
    \    */\n    fun shouldRelaunchTheApp(monkeyAction: String, packageName: String):\
    \ Boolean {\n        if (!isAppInErrorState(monkeyAction, packageName)\n     \
    \       && uiDevice.currentPackageName != packageName) {\n            return true\n\
    \        }\n        return false\n    }\n    /**\n    * 根据包名启动应用程序。\n    * @param\
    \ packageName - 要启动的包名。\n    */\n    fun launchPackage(packageName: String) {\n\
    \        val intent = testContext\n            .packageManager\n            .getLaunchIntentForPackage(packageName)!!\n\
    \        testContext.startActivity(intent)\n        uiDevice.wait(Until.hasObject(By\n\
    \            .pkg(packageName)),\n            5000)\n    }\n    /**\n    * 检查目标应用程序进程是否处于错误状态，如果出错则抛出异常，否则返回\
    \ true。\n    *\n    * @return 如果应用处于错误状态则返回 false，否则抛出异常并导致测试失败。\n    */\n   \
    \ private fun isAppInErrorState(monkeyAction: String, packageName: String): Boolean\
    \ {\n        val manager = testContext.getSystemService(Context.ACTIVITY_SERVICE)\
    \ as ActivityManager\n        var errorDescription = \"\"\n        // 获取处于错误状态的进程，如果列表为空则返回\
    \ false。\n        manager.processesInErrorState?.forEach {\n            val isTargetPackage\
    \ = it.processName.contains(packageName)\n            when {\n               \
    \ isTargetPackage && it.condition == CRASHED ->\n                    errorDescription\
    \ = \"在 $monkeyAction 操作后，应用程序 $packageName 崩溃了\"\n                isTargetPackage\
    \ && it.condition == NOT_RESPONDING ->\n                    errorDescription =\
    \ \"在 $monkeyAction 操作后，应用程序 $packageName 无响应\"\n            }\n            /**\
    \ 构建并抛出带有适当描述和堆栈跟踪的 Espresso PerformException\n            *   测试在此处失败。\n    \
    \        */\n            throw PerformException.Builder()\n                .withActionDescription(errorDescription)\n\
    \                .withCause(Throwable(it.stackTrace))\n                .build()\n\
    \        }\n        return false\n    }\n}\n```\n\n这里，`shouldRelaunchTheApp()`\
    \ 函数验证了两个条件。首先，它判断测试应用程序是否处于错误状态（`CRASH` 或 `ANR`）。如果不是，则检查被测应用程序是否已显示给用户，如果没有则重新启动它。`launchPackage(packageName)`\
    \ 函数使用测试上下文向系统发送启动 Activity 的 intent，并借助 `UiDevice` 的等待机制，等待应用程序启动。最后一个名为 `isAppInErrorState(monkeyAction,\
    \ packageName)` 的函数，确保被测应用程序进程当前不处于错误状态。当识别到错误状态时，会创建一个 Espresso 的 `PerformException`\
    \ 函数，其中包含关于刚执行的 Monkey 操作的额外信息以及异常堆栈跟踪。这样，我们就使用了 Espresso 的错误报告机制并使得 Monkey 测试失败。\n\
    \n接下来是针对被测应用和第三方应用的实际 Monkey 测试。`com.google.android.dialer` 包（安卓电话应用）被用作第三方示例。\n\
    \n*chapter13.MonkeyTest.kt*\n\n```kotlin\n/**\n* 演示受监督 Monkey 测试的测试类。\n*/\n@RunWith(AndroidJUnit4::class)\n\
    class MonkeyTest {\n    @get:Rule\n    var grantPermissionRule: GrantPermissionRule\
    \ = GrantPermissionRule.grant(\n        Manifest.permission.CAMERA,\n        Manifest.permission.WRITE_EXTERNAL_STORAGE)\n\
    \    @get:Rule\n    var screenshotWatcher = ScreenshotWatcher()\n    /**\n   \
    \ * Monkey 测试将针对 TO-DO 应用程序执行。\n    */\n    @Test\n    fun testsInstrumentedApp()\
    \ {\n        ActivityScenario.launch(TasksActivity::class.java)\n        Monkey.run(200)\n\
    \    }\n    /**\n    * Monkey 测试将针对提供的应用程序包名执行。\n    * 这是一个如何测试第三方应用程序的示例。\n \
    \   */\n    @Test\n    fun testsThirdPartyApp() {\n        val packageName = \"\
    com.google.android.dialer\"\n        PackageInfo.launchPackage(packageName)\n\
    \        Monkey.run(200, packageName)\n    }\n}\n```"
- fmt: "# While Running Monkey Tests\n\nWhile running these tests, we can see that\
    \ the monkey actions are a bit slower than the `monkeyrunner` tests because of\
    \ the need to check the application state during each test step. But we can neglect\
    \ this issue, keeping in mind all the pros of having them implemented using Android\
    \ native testing frameworks.\n\n## Exercise 28\n\n### Running Monkey Tests\n\n\
    1.  Check out the master branch of the TO-DO application project and migrate it\
    \ to AndroidX. After migration, execute Build ➤ Clean project. Run some tests.\
    \ If there are failures, analyze and fix them by updating the `proguard` rules\
    \ or updating dependences in the `build.gradle` file.\n\n2.  Implement a test\
    \ class with a test that launches application activity using `ActivityScenario.launch(Activity.class)`\
    \ in the `@Before` method and then runs the test.\n\n## Summary\n\nUnfortunately,\
    \ on the Android platform, monkey tests are not treated very important. The outdated\
    \ `monkeyrunner` Python tool is supplied for this need instead of providing better\
    \ support via native Android platform testing frameworks like UI Automator or\
    \ Espresso. But even so, without too much effort, it is possible to run meaningful\
    \ monkey tests that include easy ways to start and prepare the proper application\
    \ under a test state, run supervised monkey tests, and report test results using\
    \ the native testing frameworks functionality.\n\n# 14. AndroidX Test Library\n\
    \nA May 2018 Google I/O event announced the AndroidX open source project, which\
    \ is used to develop, test, package, version, and release libraries within Android\
    \ Jetpack. AndroidX replaces the Android Support Library. One of its major improvements\
    \ is the fact that AndroidX packages are separately maintained and updated, so\
    \ you can update AndroidX Libraries in your project independently.\n\nSince Android\
    \ Test Libraries are part of the Android Support Library, AndroidX also contains\
    \ the AndroidX Test Library. Its beta version was announced at the Google I/O\
    \ event in May 2018. During the Android DevSummit 2018 event, Google announced\
    \ its stable 1.0 version. The AndroidX Test Library eliminates the need to maintain\
    \ many different testing tools, with styles and APIs that are used on different\
    \ test levels.\n\nFor your convenience, the second branch is called `androidx-espresso-revealed`\
    \ with a TO-DO sample application project that was migrated to AndroidX. In order\
    \ to use it, just switch the branch using the `git checkout androidx-espresso-revealed`\
    \ command. You may need to clean the project using the Android Studio Build ➤\
    \ Clean option or even use File ➤ Invalidate Cashes / Restart… to avoid build\
    \ issues.\n\n## AndroidX Test Compared to the Testing Support Library\n\nThe test\
    \ pyramid in Figure [14-1](#469090_1_En_14_Chapter.xhtml#Fig1) shows different\
    \ test levels that were isolated from each other by the technology and the tools\
    \ used to test them.\n\n![../images/469090_1_En_14_Chapter/469090_1_En_14_Fig1_HTML.png](images/469090_1_En_14_Chapter/469090_1_En_14_Fig1_HTML.png)\n\
    \n**Figure 14-1** Testing pyramid\n\nThe problem was that tests from different\
    \ levels were not portable; they were tied to the testing tools and the environment\
    \ they were written on. With the AndroidX Test Library, this problem is resolved.\
    \ Now you can use a single set of test libraries to write tests related to different\
    \ test levels—unit, integration, and user interface (or end-to-end) tests.\n\n\
    As we are talking about UI end-to-end tests in this book, we will focus on the\
    \ new features in the AndroidX Test Library compared to the Android Testing Support\
    \ Library from the UI test perspective:\n\n*   `ApplicationProvider` — Provides\
    \ the ability to retrieve the current application context in tests.\n*   `ActivityScenario`\
    \ and `FragmentScenario` — `ActivityScenario` provides APIs to start and drive\
    \ an activity’s lifecycle state for testing. It works with arbitrary activities\
    \ and works consistently across different versions of the Android framework. `FragmentScenario`\
    \ provides an API to start and drive a fragment’s lifecycle state for testing.\
    \ It works with arbitrary fragments and works consistently across different versions\
    \ of the Android framework.\n*   The new `Truth` Assertion Library — `Truth` is\
    \ a fluent assertions library that can be used as an alternative to `JUnit`- or\
    \ Hamcrest-based assertions when constructing the validation step for your tests.\n\
    *   Migrated all other libraries and dependencies to `androidx.test` — All the\
    \ dependencies from the `android.test.support` library were migrated to `androidx.test`.\n\
    \n## Configuring Projects for AndroidX Test\n\nIn order to start using AndroidX\
    \ Test in a newly created project, you have to follow nearly the same steps as\
    \ with the `android.support` library:\n\n1.  To ensure you will have most recent\
    \ AndroidX Test Libraries, add Google’s Maven repository inside the `build.gradle`\
    \ file as the following:\n\n```\nallprojects {\n    repositories {\n        jcenter()\n\
    \        google()\n    }\n}\n```\n\n2.  Add the AndroidX Test dependencies you\
    \ need in the UI tests:\n\n```\n// Espresso UI Testing\nandroidTestImplementation\
    \ \"androidx.test.espresso:espresso-core:$rootProject.espressoVersion\"\nandroidTestImplementation\
    \ \"androidx.test.espresso:espresso-contrib:$rootProject.espressoVersion\"\nandroidTestImplementation\
    \ \"androidx.test.espresso:espresso-intents:$rootProject.espressoVersion\"\nandroidTestImplementation\
    \ \"androidx.test.espresso.idling:idling-concurrent:$rootProject.espressoVersion\"\
    \nandroidTestImplementation \"androidx.test.espresso:espresso-idling-resource:$rootProject.espressoVersion\"\
    \nandroidTestImplementation \"androidx.test.espresso:espresso-web:$rootProject.espressoVersionAndroidX\"\
    \nandroidTestImplementation \"androidx.test.espresso:espresso-accessibility:$rootProject.espressoVersion\"\
    \n```\n\n3.  Add the AndroidX Test instrumentation runner:\n\n```\ntestInstrumentationRunner\
    \ 'androidx.test.runner.AndroidJUnitRunner'\n```\n\n4.  To use the Android Test\
    \ Orchestrator, add this line:\n\n```\ntestOptions {\n    execution 'ANDROIDX_TEST_ORCHESTRATOR'\n\
    }\n```\n\nThis is enough to start writing UI tests, as we do in the sample TO-DO\
    \ application.\n\n## Migrating to AndroidX\n\nAndroidX migration is integrated\
    \ into Android Studio IDE, so it is quite easy to migrate both main and test applications.\
    \ To start the migration process, choose Refactor ➤ Migrate to AndroidX… from\
    \ Android Studio menu. You can also right-click on the project inside the project\
    \ view and select these menu options. See Figure [14-2](#469090_1_En_14_Chapter.xhtml#Fig2).\n\
    \n![../images/469090_1_En_14_Chapter/469090_1_En_14_Fig2_HTML.jpg](images/469090_1_En_14_Chapter/469090_1_En_14_Fig2_HTML.jpg)\n\
    \n**Figure 14-2** The Migrate to AndroidX option in Android Studio\n\nBefore the\
    \ migration is initiated, you will be asked to back up your project just in case\
    \ you have compile issues after the migration. You will be also warned about fixing\
    \ migration errors manually depending on your project dependencies.\n\nIn a couple\
    \ of minutes (depending on the project’s complexity), the whole project will be\
    \ migrated to the AndroidX Library. It’s really simple and easy. After it’s automatically\
    \ triggered, the `gradle sync` task all seems to be good, as it shows `BUILD SUCCESSFUL`.\
    \ But (there is always a but), during the first test run, the following issue\
    \ occurred just after the test started.\n\n*Proguard Obfuscation Issue When Migrating\
    \ to AndroidX*"
