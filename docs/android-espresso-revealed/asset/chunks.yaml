- fmt: "```java\n@Test\npublic void input() {\n    onView(supportsInputMethods());\n\
    \    onView(hasImeAction(EditorInfo.IME_ACTION_SEND));\n}\n\n@Test\npublic void\
    \ classMatchers() {\n    onView(isAssignableFrom(CheckBox.class));\n    onView(withClassName(is(FloatingActionButton.class.getCanonicalName())));\n\
    }\n\n@Test\npublic void rootMatchers() {\n    onView(isFocusable());\n    onView(withText(R.string.name_hint)).inRoot(isTouchable());\n\
    \    onView(withText(R.string.name_hint)).inRoot(isDialog());\n    onView(withText(R.string.name_hint)).inRoot(isPlatformPopup());\n\
    }\n```\n\n```java\n@Test\npublic void preferenceMatchers() {\n    onData(withSummaryText(\"\
    3 days\"));\n    onData(withTitle(\"Send notification\"));\n    onData(withKey(\"\
    example_switch\"));\n    onView(isEnabled());\n}\n```\n\n![Figure 1-10 The TO-DO\
    \ task detail view](../images/469090_1_En_1_Chapter/469090_1_En_1_Fig10_HTML.jpg)\n\
    \n![Figure 1-9 General preferences section in the application settings](../images/469090_1_En_1_Chapter/469090_1_En_1_Fig9_HTML.jpg)\n\
    \n![Figure 1-8 EditText example from the General preferences in the application\
    \ settings](../images/469090_1_En_1_Chapter/469090_1_En_1_Fig8_HTML.jpg)\n\n```java\n\
    @Test\npublic void layoutMatchers() {\n    onView(hasEllipsizedText());\n    onView(hasMultilineText());\n\
    }\n```\n\nWe will not discuss the cursor matchers shown in the `ViewMatchers`\
    \ section of the Espresso spreadsheet, because their goal is to operate at a database\
    \ level, which is used in unit and integration tests and is therefore out of this\
    \ book’s scope.\n\nNow let’s take a step aside from our sample application and\
    \ look at some examples of hamcrest string matchers. For simplicity, the string\
    \ `\"XXYYZZ\"` will be used as an expected text pattern. The Espresso `ViewMatcher`\
    \ class implements two string-matcher methods— `withText()` and `withContentDescription()`.\
    \ They match a view with text that’s equal to the expected text or the expected\
    \ content description:\n\n```java\nonView(withText(\"XXYYZZ\")).perform(click());\n\
    onView(withContentDescription(\"XXYYZZ\")).perform(click());\n```\n\nUsing Hamcrest\
    \ string matchers, we can create more flexible matcher combinations. We can match\
    \ a view with text that starts with the `\"XXYY\"` pattern:\n\n```java\nonView(withText(startsWith(\"\
    XXYY\"))).perform(click());\n```\n\nWe can match a view with text that ends with\
    \ a `\"YYZZ\"` pattern:\n\n```java\nonView(withText(endsWith(\"YYZZ\"))).perform(click());\n\
    ```\n\nWe can assert that the text of a particular view with specified `R.id`\
    \ has a content description that contains the `\"YYZZ\"` string anywhere:\n\n\
    ```java\nonView(withId(R.id.viewId)).check(matches(withContentDescription(containsString(\"\
    YYZZ\"))));\n```\n\nWe can match a view with text that’s equal to the specified\
    \ string, ignoring case:\n\n```java\nonView(withText(equalToIgnoringCase(\"xxYY\"\
    ))).perform(click());\n```\n\nWe can match a view with text that’s equal to the\
    \ specified text when whitespace differences are (mostly) ignored:\n\n```java\n\
    onView(withText(equalToIgnoringWhiteSpace(\"XX YY ZZ\"))).perform(click());\n\
    ```\n\nWe can assert that the text of a particular view with specified `R.id`\
    \ does not contain the `\"YYZZ\"` string:\n\n```java\nonView(withId(R.id.viewId)).check(matches(withText(not(containsString(\"\
    YYZZ\")))));\n```\n\nAdding the `allOf()` or `anyOf()` hamcrest core matchers\
    \ gives us even more power. We can assert that the text of a particular view with\
    \ a specified `R.id` doesn’t start with the `\"ZZ\"` string and contains the `\"\
    YYZZ\"` string anywhere:\n\n```java\nonView(withId(R.id.viewId))\n    .check(matches(allOf(withText(not(startsWith(\"\
    ZZ\"))),\n                         withText(containsString(\"YYZZ\")))));\n```\n\
    \nWe can also assert that the text of a particular view with a specified `R.id`\
    \ ends with the `\"ZZ\"` string or contains the `\"YYZZ\"` string anywhere:\n\n\
    ```java\nonView(withId(R.id.viewId))\n    .check(matches(anyOf(withText(endsWith(\"\
    ZZ\")),\n                         withText(containsString(\"YYZZ\")))));\n```\n\
    \nTo get a full overview of the hamcrest matchers, refer to their official documentation\
    \ at [`http://hamcrest.org/JavaHamcrest`](http://hamcrest.org/JavaHamcrest). So,\
    \ now we have an understanding of `ViewMatchers`. We also understand that they\
    \ play one of the most important roles in the Espresso testing framework. Their\
    \ task is to locate the matched view inside the application layout or fail if\
    \ the match did not happen.\n\n## Espresso’s `ViewInteraction` Class\n\nIn the\
    \ previous examples, we were doing new `perform()` and `check()` operations on\
    \ the views. These methods are representatives of the `ViewInteraction` class.\
    \ Interactions act like glue between the `ViewMatcher` and the `ViewAssertion`\
    \ or `ViewAction`.\n\nEach interaction is tied to the view that was previously\
    \ located by the `ViewMatcher`. You probably guessed based on the method names\
    \ that the `perform()` method takes an action and the `check()` method asserts\
    \ some condition provided as a parameter. There is one more `ViewInteraction`\
    \ we haven’t used yet—`inRoot()`.\n\n- `perform()`—Receives a view action or a\
    \ set of view actions as a parameter and performs them on the view selected by\
    \ the current `ViewMatcher`.\n- `check()`—Receives a view action or a set of view\
    \ actions as a parameter and checks it on the the view selected by the current\
    \ `ViewMatcher`.\n\nSo, what about the `inRoot()` method then? With this view\
    \ interaction, we are targeting the multi-window states in our application. For\
    \ example, the `AutoComplete` window layout that is drawn over the test application.\
    \ In this case, we should explicitly indicate which window Espresso should operate\
    \ on by matching the proper window with the `RootMatcher`.\n\n- `inRoot()`—Receives\
    \ a root matcher as a parameter and sets the scope of the view interaction to\
    \ the root view, identified by the root matcher.\n\n**Note**  \nEspresso performs\
    \ all the actions on the UI thread, which means that it will first wait for the\
    \ application UI to render and only after that perform the required steps. This\
    \ ensures that the application UI elements are fully loaded and displayed on the\
    \ screen, which increases test reliability and robustness. It will also eliminate\
    \ the need of having waits and sleeps in the tests.\n\nIn the following section,\
    \ you will see examples of how `perform()` and `check()` view interactions can\
    \ be used.\n\n## Espresso’s `ViewActions` Class\n\nAs you may guess, a `ViewAction`\
    \ is responsible for performing actions on a required view. The target is to replicate\
    \ the end user behavior by interacting with the UI elements on the screen. Here\
    \ are examples of the type of actions we can perform (see Figure [1-11](#469090_1_En_1_Chapter.xhtml#Fig11)):\n\
    \n- `clearText()`—Returns an action that clears text on the view. The view must\
    \ be displayed on the screen.\n- `click()`—Returns an action that clicks the view.\
    \ At least 90% of the view must be displayed on the screen.\n- `swipeLeft()`—Returns\
    \ an action that performs a swipe right-to-left across the vertical center of\
    \ the view. The swipe doesn’t start at the very edge of the view, but is a bit\
    \ offset, since swiping from the exact edge may cause unexpected behavior (e.g.,\
    \ it may open a navigation drawer). Other swipe actions defined by Espresso are\
    \ `swipeRight()`, `swipeDown()`, and `swipeUp()`. For all the swipe actions, at\
    \ least 90% of the views must be displayed onscreen.\n- `closeSoftKeyboard()`—Returns\
    \ an action that closes the soft keyboard. If the keyboard is already closed,\
    \ it is non-operational.\n- `pressImeActionButton()`—Returns an action that presses\
    \ the current action button (Next, Done, Search, etc.) on the IME (Input Method\
    \ Editor).\n- `pressBack()`—Returns an action that clicks the hardware back button.\n\
    - `pressMenuKey()`—Returns an action that presses the hardware menu key. Most\
    \ modern devices on the market no longer support the hardware menu key, so this\
    \ method is rarely used."
