    \ or inside the `logcat` logs  based on the visual\nrepresentation.\n\nFigure\
    \ [7-2](#469090_1_En_7_Chapter.xhtml#Fig2) shows the\naccessibility scanner setup\
    \ process.\n\n![../images/469090_1_En_7_Chapter/469090_1_En_7_Fig2_HTML.jpg](images/469090_1_En_7_Chapter/469090_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2\nStart using the Accessibility scanner\nflow"
