    ## Using the Espresso Test Recorder Tool


    The Espresso authors were probably inspired by the Selenium IDE test recorder
    and decided to add this same capability into Espresso as well. The Espresso Test
    Recorder tool allows inexperienced users to create Espresso UI tests with less
    effort. It became available and stable in Android Studio version 2.3.


    The Test Recorder tool is integrated into Android Studio IDE and available from
    the **Run ➤ Record Espresso Test** menu, as shown in Figure [10-3](#469090_1_En_10_Chapter.xhtml#Fig3).


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig3_HTML.jpg](images/469090_1_En_10_Chapter/469090_1_En_10_Fig3_HTML.jpg)


    **Figure 10-3** Record Espresso Test option in the Android Studio Run menu


    Before starting, you should have a test device connected or a virtual device created
    in advance. After recording is triggered, you are asked to select a target device.
    After the application is built, it will be deployed to the target device and will
    run in debug mode. See Figure [10-4](#469090_1_En_10_Chapter.xhtml#Fig4).


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig4_HTML.jpg](images/469090_1_En_10_Chapter/469090_1_En_10_Fig4_HTML.jpg)


    **Figure 10-4** Target device selection dialog


    While recording is ongoing, application interactions will be tracked and shown
    inside recorder view. Figure [10-5](#469090_1_En_10_Chapter.xhtml#Fig5) demonstrates
    adding a new TO-DO flow in the sample application.


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig5_HTML.jpg](images/469090_1_En_10_Chapter/469090_1_En_10_Fig5_HTML.jpg)


    **Figure 10-5** Espresso Test Recorder window


    The **Add Assertion** button allows you to add an assertion of the following types
    (see Figure [10-6](#469090_1_En_10_Chapter.xhtml#Fig6)):


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig6_HTML.jpg](images/469090_1_En_10_Chapter/469090_1_En_10_Fig6_HTML.jpg)


    **Figure 10-6** Adding assertions to the Espresso Test Recorder


    - **Text is**—Equivalent to `check(matches(withText()))`

    - **Exists**—Equivalent to `check(matches(isDisplayed()))`

    - **Does not exist**—Equivalent to `check(doesNotExist())`


    After you are done with the recording and you click the **OK** button, you will
    be asked to provide the name of the test class and select the test class language
    (Java or Kotlin). See Figure [10-7](#469090_1_En_10_Chapter.xhtml#Fig7).


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig7_HTML.jpg](images/469090_1_En_10_Chapter/469090_1_En_10_Fig7_HTML.jpg)


    **Figure 10-7** Saving the recorded test in a test class file


    You can’t save a recorded test in a test class that already exists. If you try
    to do this, the error in Figure [10-8](#469090_1_En_10_Chapter.xhtml#Fig8) will
    be shown.


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig8_HTML.jpg](images/469090_1_En_10_Chapter/469090_1_En_10_Fig8_HTML.jpg)


    **Figure 10-8** Error when trying to save a recorded test into an existing file


    By default, recorded tests are stored inside the `tasks` package, which is automatically
    created inside the application’s package. See Figure [10-9](#469090_1_En_10_Chapter.xhtml#Fig9).


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig9_HTML.jpg](images/469090_1_En_10_Chapter/469090_1_En_10_Fig9_HTML.jpg)


    **Figure 10-9** Path where recorded tests are saved


    The Espresso Test Recorder can be tweaked from inside Android Studio preferences.
    You can observe that with the default depth values (Max UI depth = 3, ScrollView
    detection = 5, and Assertion depth = 3), the test recorder and the application
    are quite slow. If you lower them to 1 or 2, they become much more responsive.
    See Figure [10-10](#469090_1_En_10_Chapter.xhtml#Fig10).


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig10_HTML.jpg](images/469090_1_En_10_Chapter/469090_1_En_10_Fig10_HTML.jpg)


    **Figure 10-10** Espresso Test Recorder preferences


    Next, you can see how clicking on the **Add TO-DO** floating action button is
    recorded with the default depth values.


    *Click Add TO-DO Button Code Generated by Recorder with Default Depth Values.*


    ```

    val floatingActionButton = onView(

    allOf(withId(R.id.fab_add_task), withContentDescription("Add todo"),

    childAtPosition(

    allOf(withId(R.id.coordinatorLayout),

    childAtPosition(

    withClassName(`is`("android.widget.LinearLayout")),

    1)),

    1),

    isDisplayed()))

    floatingActionButton.perform(click())

    ```


    Here is an example of the same action, but with the Max UI depth set to 1.


    *Click Add TO-DO Button Code Generated by Recorder with Depth Values set to 1.*


    ```

    val floatingActionButton = onView(

    allOf(withId(R.id.fab_add_task), isDisplayed()))

    floatingActionButton.perform(click())

    ```


    You can observe and compare how the add new TO-DO test code looks when recording
    it with the default depth values in the `chapter10.testrecorder.AddTodoEspressoTestRecorder.kt`
    class and with the depth values set to 1 in the `chapter10.testrecorder.AddTodoEspressoTestRecorderLowerDepth.kt`
    class.


    After getting familiar with the Espresso Test Recorder, you’ll notice that:


    - For all the `EditText` fields, it adds the `closeSoftKeyboard()` `ViewAction`.

    - When the target view is part of the `ScrollView` layout, the `scrollTo()` `ViewAction`
    is added before another action has been done on it.

    - If the application requires a permission, `GrantPermissionRule` is added to
    the test class.


    In general, the Espresso Test Recorder may be a good way to start with Espresso
    itself, but it has some drawbacks as well:


    - Application speed while recording is slow (even slower with higher depth values,
    but lowering the depth value can lead to failed tests).

    - Generated code can be massive and hard to read.

    - It has limited assertion support.

    - Automatically generated tests usually require additional customization.

    - There is no support for application delays caused by network requests, so you
    should manually create and register an `IdlingResource`.

    - `WebView` layouts are not supported.


