    ## Running Espresso Tests in the Firebase Test Lab from Android Studio


    It is widely known that the Android platform, by its nature, has significant device
    fragmentation. To deal with this, you may have a wide range of mobile devices
    based on the usage statistics. But this is quite costly, taking into account the
    fact that you have to maintain it. Even if this is a must-have in manual testing,
    in test automation we tend to use Android emulators, custom device labs, or third-party
    services.


    Third-party services did provide such a possibility for mobile developers but
    they were not standardized and were costly. Then Google decided to bring its own
    device-testing solution into the Android ecosystem. It’s called the Firebase Test
    Lab. It allows developers to run automated tests on real devices or emulators
    without the need to maintain them.


    Let’s look at how to start using Firebase and what benefits it brings. First,
    starting from [`https://firebase.google.com/`](https://firebase.google.com/),
    you should navigate to the Firebase console and log in with your Google account
    (see Figure [10-11](#469090_1_En_10_Chapter.xhtml#Fig11)).


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig11_HTML.jpg](images/469090_1_En_10_Chapter/469090_1_En_10_Fig11_HTML.jpg)


    Figure 10-11

    The Firebase toolbar


    There you will notice that you will already have a couple of sample projects to
    play with and the possibility to add your own by clicking on `Add Project`. See
    Figure [10-12](#469090_1_En_10_Chapter.xhtml#Fig12).


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig12_HTML.jpg](images/469090_1_En_10_Chapter/469090_1_En_10_Fig12_HTML.jpg)


    Figure 10-12

    The Firebase welcome desktop


    After clicking `Add Project`, you will be asked to provide the project name and
    select other parameters related to the service location. When the project name
    is provided, the project will automatically receive its project ID, which is a
    unique identifier for your Firebase project. See Figure [10-13](#469090_1_En_10_Chapter.xhtml#Fig13).


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig13_HTML.jpg](images/469090_1_En_10_Chapter/469090_1_En_10_Fig13_HTML.jpg)


    Figure 10-13

    Firebase, Add a Project


    After you are done with it, you will land on the `Project Overview` screen. From
    there, you can navigate to the Test Lab, as shown in Figure [10-14](#469090_1_En_10_Chapter.xhtml#Fig14).


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig14_HTML.jpg](images/469090_1_En_10_Chapter/469090_1_En_10_Fig14_HTML.jpg)


    Figure 10-14

    The Firebase Test Lab initial state


    It is now all set and ready to be used by our automated tests. Since we want to
    run them via Android Studio, we have to set up the proper test configuration from
    there. To do this, we open the `Run` ➤ `Edit Configurations…` menu, select `Android
    Instrumentation Tests`, and add a new one by clicking on the `+` button, as shown
    in Figure [10-15](#469090_1_En_10_Chapter.xhtml#Fig15).


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig15_HTML.jpg](images/469090_1_En_10_Chapter/469090_1_En_10_Fig15_HTML.jpg)


    Figure 10-15

    Adding the Firebase Test Lab instrumentation test configuration


    In the `Deployment Target options`, we should set the `Firebase Test Lab Device
    Matrix` option as a target and then sign in with the same Google account into
    the Firebase, as shown in Figure [10-16](#469090_1_En_10_Chapter.xhtml#Fig16).


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig16_HTML.jpg](images/469090_1_En_10_Chapter/469090_1_En_10_Fig16_HTML.jpg)


    Figure 10-16

    Logging in to the Firebase Test Lab


    After that you can select your project and configure the device matrix, as shown
    in Figure [10-17](#469090_1_En_10_Chapter.xhtml#Fig17).


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig17_HTML.jpg](images/469090_1_En_10_Chapter/469090_1_En_10_Fig17_HTML.jpg)


    Figure 10-17

    Selecting the Firebase Test Lab project'
