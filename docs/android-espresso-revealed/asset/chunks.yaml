- fmt: "# Using AndroidStudio Live Templates in UI Tests\n\nThe code completion feature\
    \ in many modern integrated development environments (IDEs) increased our code\
    \ writing productivity quite a lot. But thanks to AndroidStudio, we have an even\
    \ more powerful tool that can help us code even faster—live templates.\n\n`Live\
    \ templates` are predefined code snippets that can be inserted into code by typing\
    \ their abbreviations. They can be added to AndroidStudio via `Preferences` ➤\
    \ `Editor` ➤ `Live Templates`. There are a set of predefined `Live Templates`\
    \ groups and you can add your own group or your own live template. To do this,\
    \ click the `+` button and select the proper option. After that, you provide an\
    \ abbreviation name, template text (the code snippet that will be later inserted\
    \ instead of the abbreviation), an optional description, and the proper context\
    \ where your template will be available. In our case, the `Kotlin` and `Java`\
    \ contexts were selected, as shown in Figure [15-1](#469090_1_En_15_Chapter.xhtml#Fig1).\n\
    \n![../images/469090_1_En_15_Chapter/469090_1_En_15_Fig1_HTML.jpg](images/469090_1_En_15_Chapter/469090_1_En_15_Fig1_HTML.jpg)\n\
    \n**Figure 15-1** Adding a live template\n\nThe created templates can be used\
    \ in specified contexts, by just typing the template abbreviation and clicking\
    \ the `Tab` button, as shown in Figure [15-2](#469090_1_En_15_Chapter.xhtml#Fig2).\n\
    \n![../images/469090_1_En_15_Chapter/469090_1_En_15_Fig2_HTML.jpg](images/469090_1_En_15_Chapter/469090_1_En_15_Fig2_HTML.jpg)\n\
    \n**Figure 15-2** Using a live template by typing the abbreviation and clicking\
    \ `Tab`\n\nIt is also easy to export predefined live templates when you switch\
    \ your computer or want to share them. To do this, just open the `File` ➤ `Export\
    \ Settings …` menu and select `Live Templates`, as shown in Figure [15-3](#469090_1_En_15_Chapter.xhtml#Fig3).\n\
    \n![../images/469090_1_En_15_Chapter/469090_1_En_15_Fig3_HTML.jpg](images/469090_1_En_15_Chapter/469090_1_En_15_Fig3_HTML.jpg)\n\
    \n**Figure 15-3** Exporting live templates\n\nFor your convenience, a small list\
    \ of Espresso live templates was created and exported as a `.jar` file into the\
    \ TO-DO application project in the following path: `todoapp/book_assets/livetemplates.jar`.\n\
    \n## Espresso Drawable Matchers\n\nAnother custom matcher type that we must know\
    \ about are the `Drawable` matchers. This matcher type can be used to compare\
    \ icons and images. These types of validation in UI tests are not widely discussed\
    \ and, in general, Android snapshot tests are not popular and can be done only\
    \ by using third-party libraries. To cover this area, we introduce additional\
    \ drawables validation as part of the UI tests.\n\nSo what do we compare the application\
    \ drawables to? We must remember that a test is built as a separate application\
    \ and has its own resources, context, etc. So, the solution is simple—we just\
    \ copy the application’s drawables that will be used in tests into a test application\
    \ resource and use them in UI tests. Here is the `Drawable` matchers implementation\
    \ that covers the `TextView` and `ImageView` drawables.\n\n`chapter15*.drawablematchers.DrawableMatchers.kt.*`\n\
    \n```\n/**\n * Contains TextView and ImageView Drawable matchers.\n */\nclass\
    \ DrawableMatchers {\n    fun withTextViewDrawable(drawableToMatch: Drawable):\
    \ Matcher {\n        return object : BoundedMatcher(TextView::class.java) {\n\
    \            override fun describeTo(description: Description) {\n           \
    \     description.appendText(\"Drawable in TextView $drawableToMatch\")\n    \
    \        }\n            override fun matchesSafely(editTextField: TextView): Boolean\
    \ {\n                val drawables = editTextField.compoundDrawables\n       \
    \         val drawable = drawables[2]\n                return isSameBitmap(drawableToMatch,\
    \ drawable)\n            }\n        }\n    }\n    fun withImageViewDrawable(expectedDrawable:\
    \ Drawable?): Matcher {\n        return object : BoundedMatcher(ImageView::class.java)\
    \ {\n            override fun describeTo(description: Description) {\n       \
    \         description.appendText(\"Drawable in ImageView $expectedDrawable\")\n\
    \            }\n            public override fun matchesSafely(imageView: ImageView)\
    \ =\n                isSameBitmap(imageView.drawable, expectedDrawable)\n    \
    \    }\n    }\n    fun isSameBitmap(drawable: Drawable?, expectedDrawable: Drawable?):\
    \ Boolean {\n        var localDrawable = drawable\n        var localExpectedDrawable\
    \ = expectedDrawable\n        // Return if null.\n        if (localDrawable ==\
    \ null || localExpectedDrawable == null) {\n            return false\n       \
    \ }\n        // StateListDrawable lets you assign a number of graphic images to\
    \ a single\n        // Drawable and swap out the visible item by a string ID value.\n\
    \        if (localDrawable is StateListDrawable\n            && localExpectedDrawable\
    \ is StateListDrawable) {\n            localDrawable = localDrawable.current\n\
    \            localExpectedDrawable = localExpectedDrawable.current\n        }\n\
    \        // BitmapDrawable - a Drawable that wraps a bitmap and can be tiled,\
    \ stretched, or\n        // aligned.\n        if (localDrawable is BitmapDrawable)\
    \ {\n            val bitmap = localDrawable.bitmap\n            val otherBitmap\
    \ = (localExpectedDrawable as BitmapDrawable).bitmap\n            return bitmap.sameAs(otherBitmap)\n\
    \        }\n        return false\n    }\n}\n```\n\nHere is its usage.\n\n`chapter15.drawablematchers.DrawableMatchersTest.kt`\n\
    \n```\n/**\n * Demonstrates Drawable matchers usage.\n */\nclass DrawableMatchersTest\
    \ : BaseTest() {\n    @Test\n    fun checkDrawableInMenuDrawer() {\n        openDrawer()\n\
    \        onView(withId(R.id.headerTodoLogo))\n            .check(matches(DrawableMatchers()\n\
    \                .withImageViewDrawable(getMenuIconDrawable())))\n    }\n    private\
    \ fun getMenuIconDrawable(): Drawable? {\n        val drawableId = com.example.android.architecture.blueprints.todoapp.mock.test\n\
    \            .R.drawable.test_logo\n        return InstrumentationRegistry.getInstrumentation().context.getDrawable(drawableId)\n\
    \    }\n}\n```\n\nIn this test, we are comparing the icon shown inside the TO-DO\
    \ application drawer called `logo.png` name in main application drawables with\
    \ the one stored in the test application drawable resources called `test_logo`.\n\
    \n> **Note**  \n> It is not possible to import the `R.class` file from the main\
    \ and test applications, so we have to explicitly provide the path to test the\
    \ application `R.class`.\n\n## Setting SeekBar Progress in Espresso UI Tests\n\
    \nThis section demonstrates how to set the `SeekBar` progress with a custom Espresso\
    \ `ViewAction`. We know from Chapter [2](#469090_1_En_2_Chapter.xhtml) how to\
    \ create a custom `ViewAction` and the `SeekBar` case is one of the simplest.\n\
    \n`chapter15*.setseekbarprogress.SeekBarViewActions.kt`\n\n```\n/**\n * ViewActions\
    \ that operate on SeekBar\n */\nobject SeekBarViewActions {\n    /**\n     * Sets\
    \ progress of a SeekBar.\n     *\n     * @param value - the progress value between\
    \ min and max SeekBar value\n     */\n    fun setProgress(value: Int): ViewAction\
    \ {\n        return object : ViewAction {\n            override fun getConstraints():\
    \ Matcher {\n                return isAssignableFrom(SeekBar::class.java)\n  \
    \          }\n            override fun getDescription(): String {\n          \
    \      return (\"Set slider progress to $value.\")\n            }\n          \
    \  override fun perform(uiController: UiController, view: View) {\n          \
    \      val seekBar = view as SeekBar\n                seekBar.progress = value\n\
    \            }\n        }\n    }\n}\n```\n\nThe usage in the test also looks simple,\
    \ as follows.\n\n`chapter15*.setseekbarprogress.SetSeekBarProgressTest.kt`"
