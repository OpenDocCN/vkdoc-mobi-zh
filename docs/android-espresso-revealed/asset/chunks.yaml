  trans: "\n# 运行 Monkey 测试\n\n运行这些测试时，我们可以看到 monkey 操作比 `monkeyrunner` 测试稍慢，这是因为需要在每个测试步骤中检查应用程序状态。不过，考虑到使用\
    \ Android 原生测试框架实现这些测试所带来的诸多优势，我们可以忽略这个问题。\n\n## 练习 28\n\n### 运行 Monkey 测试\n\n\
    1.  检出 TODO 应用程序项目的 master 分支，并将其迁移至 AndroidX。迁移后，执行 Build ➤ Clean Project。运行一些测试。如果出现失败，通过更新\
    \ `proguard` 规则或更新 `build.gradle` 文件中的依赖项，来分析并修复问题。\n\n2.  实现一个测试类，其中包含一个测试：在\
    \ `@Before` 方法中使用 `ActivityScenario.launch(Activity.class)` 启动应用 Activity，然后运行测试。\n\
    \n## 小结\n\n遗憾的是，在 Android 平台上，monkey 测试并未受到足够重视。为了满足这一需求，提供的仍是过时的 `monkeyrunner`\
    \ Python 工具，而非通过 UI Automator 或 Espresso 等原生 Android 平台测试框架提供更好的支持。即便如此，无需过多投入，我们仍然可以运行有意义的\
    \ monkey 测试，包括：在测试状态下轻松启动和准备合适应用的方法、运行受监督的 monkey 测试，以及使用原生测试框架功能报告测试结果。\n\n#\
