    \ 测试，如下所示。\n\n*chapter5.*  \n*StubSelectImageIntentTest.stubsImageIntentWithAsset()*\
    \  \n*.*\n\n```\n@Test\nfun stubsImageIntentWithAsset() {\nval imageFromAssets\
    \ = \"todo_image_assets.png\"\nIntents.intending(not(isInternal()))\n.respondWith(IntentHelper.createImageResultFromAssets(imageFromAssets))\n\
    // 添加新 TO-DO。\naddFab.click()\ntaskTitleField.type(toDoTitle).closeKeyboard()\n\
    taskDescriptionField.type(toDoDescription).closeKeyboard()\n// 点击从图库获取图片按钮。此时会返回桩代码图片。\n\
    addImageButton.click()\n// 验证发送的 intent action。\nintended(hasAction(Intent.ACTION_GET_CONTENT))\n\
    editDoneFab.click()\nviewWithText(toDoTitle).click()\n}\n```\n\n在当前实现中，测试通过是因为图片\
    \ intent 设置了 `ACTION_GET_CONTENT` 动作。当然，我们可以使用 `allOf()` hamcrest 匹配器来组合不同的 `IntentMatchers`，从而缩小验证范围。\n\
    \n有时你可能看不到 Intent 的实现，但当 `intended()` 验证失败时，仍然可以从 Espresso 失败堆栈跟踪中获取所有 Intent。\n\
    \n*来自失败的 intended(intentMatcher) 验证的 Espresso 堆栈跟踪（部分）。*\n\n```\nIntentMatcher:\
    \ has action: is \"android.intent.action.ANSWER\"\nMatched intents:[]\nRecorded\
    \ intents:\n-Intent { cmp=com.example.android.architecture.blueprints.todoapp.mock/com.example.android.architecture.blueprints.todoapp.addedittask.AddEditTaskActivity\
    \ } handling packages:[[com.example.android.architecture.blueprints.todoapp.mock]])\n\
    -Intent { act=android.intent.action.GET_CONTENT typ=image/* } handling packages:[[com.android.documentsui,\
    \ com.google.android.apps.docs, com.google.android.apps.photos]])\n```\n\n这个堆栈跟踪是在将先前测试方法中的\
    \ Intent 动作设置为错误的值后得到的：\n\n```\nintended(hasAction(Intent.ACTION_ANSWER))\n```\n\
    \n从堆栈跟踪中，我们可以看到在图片 intent 中：\n\n```\n{ act=android.intent.action.GET_CONTENT typ=image/*\
    \ }\n```\n\n还有另一个：\n\n```\n{ cmp=com.example.android.architecture.blueprints.todoapp.mock/com.example.android.architecture.blueprints.todoapp.addedittask.AddEditTaskActivity\
    \ }\n```\n\n为了理解 Intent 是如何出现在堆栈跟踪中的，让我们仔细看看 Espresso 的 `Intents.java` 类。这个类负责验证和桩代码处理被测试应用发出的\
    \ Intent。它包含 `init()` 方法，该方法初始化 Intent 并开始记录它们。必须在触发任何会发送需要验证或设置桩代码的 Intent 的动作之前调用它。正是因为\
    \ `IntentsTestRule` 使用了它，才需要运行 Intent 测试。\n\n有了这些信息，我们可以对 `stubsImageIntentWithAsset()`\
    \ 测试用例进行修改。我们还将验证，在点击添加 TO-DO 浮动操作按钮后，`AddEditTaskActivity` 是否会被启动。\n\n*修改后的 stubsImageIntentWithAsset()\
    \ 测试用例。*\n\n```\n@Test\nfun stubsImageIntentWithAsset() {\nval imageFromAssets\
    \ = \"todo_image_assets.png\"\nIntents.intending(not(isInternal()))\n.respondWith(IntentHelper.createImageResultFromAssets(imageFromAssets))\n\
    // 添加新 TO-DO。\naddFab.click()\n// 验证 AddEditTaskActivity 已被启动。\nintended(hasComponent(AddEditTaskActivity::class.java.name))\n\
    taskTitleField.type(toDoTitle).closeKeyboard()\ntaskDescriptionField.type(toDoDescription).closeKeyboard()\n\
    // 点击从图库获取图片按钮。此时会返回桩代码图片。\naddImageButton.click()\n// 验证发送的 intent action。\n\
    intended(hasAction(Intent.ACTION_GET_CONTENT))\neditDoneFab.click()\nviewWithText(toDoTitle).click()\n\
    }\n```\n\n同样重要的是要注意堆栈跟踪中的 Intent 细节和调试信息，如图 5-4 和 5-5 所示。这两个来源都包含有关 Intent 的信息，例如其\
    \ action、type 或 component。让我们再看一次堆栈跟踪：\n\n```\nRecorded intents:\n-Intent { cmp=com.example.android.architecture.blueprints.todoapp.mock/com.example.android.architecture.blueprints.todoapp.addedittask.AddEditTaskActivity\
    \ } handling packages:[[com.example.android.architecture.blueprints.todoapp.mock]])\n\
    -Intent { act=android.intent.action.GET_CONTENT typ=image/* } handling packages:[[com.android.documentsui,\
    \ com.google.android.apps.docs, com.google.android.apps.photos]])\n```\n\n正如你可能猜到的：\n\
    \n*   `cmp` — 表示组件（component）。适用于 `hasComponent() IntentMatcher`。\n*   `packages`\
    \ — 表示包（package）。适用于 `hasPackage()` 或 `toPackage() IntentMatcher`。\n*   `act`\
    \ — 表示动作（action）。适用于 `hasAction() IntentMatcher`。\n*   `typ` — 表示类型（type）。适用于\
    \ `hasType() IntentMatcher`。\n\n## 练习 16\n\n**验证 Intent**\n\n1.  修改一个 Intent 测试，使其在使用\
    \ `intended()` 方法进行 Intent 验证时失败。观察堆栈跟踪。\n2.  实现一个测试，验证“为无结果的 Intent 设置桩代码”部分讨论的分享\
    \ Intent 功能。根据 Intent 类型和动作进行验证。使用 `allOf()` hamcrest 匹配器来验证两者。\n\n## 总结\n\nEspresso-Intents\
    \ 使你可以保持 UI 测试的封闭性，无需与第三方应用程序交互，并允许你验证在待测应用内部或外部发送的 Intent。它是一个强大的机制，可帮助你测试和应用\
    \ Intent 桩代码。熟悉它之后，它将提升你对整个 Android 系统的理解，因为应用组件、应用和系统之间的大部分通信都是通过 Intent 完成的。\n\
    \n6. 测试 WebView\n\n如今，我们几乎可以找到针对任何事物的移动应用——游戏、社交网络、银行、音乐等。由单个开发者、小型创业公司或成熟公司开发的如此多样化的应用意味着不同的开发方法。这些方法以原生和混合应用为代表。原生应用是为移动操作系统开发的，遵循平台标准、用户界面和用户体验指南，并可访问移动设备功能，如摄像头、GPS\
    \ 等。混合应用通常使用位于原生包装器或容器中的网站。在 Android 上，这个容器被称为 *WebView*。\n\n然而，存在一个灰色地带。即使开发者选择了原生应用开发，应用中也存在许多地方可能使用集成的\
    \ Android `WebView` 组件。这是有道理的，因为 WebView 代表了那些应能远程控制而无需创建冗余应用发布的功能。`WebView` 组件可能被使用的常见领域如下：\n\
    \n*   网络浏览器应用\n*   使用 Google、Facebook 或 Twitter 账号的注册或登录表单\n*   法律和隐私声明\n*   应用常见问题解答（FAQ）\n"
- fmt: '# Espresso-Web 测试框架指南


    ## 支持的联系表单


    我们已经知道原生 Android 应用程序可以通过 Espresso 进行测试。本章介绍 Espresso-Web，并展示如何使用它来测试集成到移动应用中的
    Android `WebView` UI 组件。Espresso 和 Espresso-Web 可以结合使用，以在应用程序的不同层面进行完整交互。


    ## Espresso-Web 基础


    与 Espresso 的 `onData()` 方法类似，`WebView` 交互由多个 *atoms* 组成。`WebView` 交互使用 Java 编程语言和
    JavaScript 桥接的组合来完成其工作。由于没有机会通过从 JavaScript 环境暴露数据来引入竞态条件——Espresso 在基于 Java 端看到的所有内容都是隔离的副本——因此完全支持从
    `Web.WebInteraction` 对象返回数据，允许您验证从请求返回的所有数据。


    WebDriver 框架使用 *atoms* 以编程方式查找和操作 web 元素。Atoms 被 WebDriver 用于处理浏览器操作。一个 atom 在概念上类似于
    `ViewAction`，它是一个自包含的单元，用于在 UI 中执行操作。您通过一组定义的方法（如 `findElement()` 和 `getElement()`）来暴露
    atoms，从用户角度驱动浏览器。但是，如果直接使用 WebDriver 框架，atoms 需要被适当地编排，这需要相当冗长的逻辑。


    在 Espresso 内部，`Web` 和 `Web.WebInteraction` 类封装了这些样板代码，并提供了类似 Espresso 的交互体验来操作
    `WebView` 对象。因此，在 `WebView` 的上下文中，atoms 被用作传统 Espresso 的 `ViewMatchers` 和 `ViewActions`
    的替代品。API 看起来相当简单，如下所示。


    ### Espresso-Web API 使用公式


    ```

    onWebView()

    .withElement(Atom)

    .perform(Atom)

    .check(WebAssertion)

    ```


    要将 Espresso-Web 添加到项目中，请将以下代码行插入到应用程序的 `build.gradle` 文件中。


    ### Android 支持库中的 Espresso-Web 依赖


    ```

    androidTestImplementation ''com.android.support.test.espresso:espresso-web:3.0.2''

    ```


    或者将相同的依赖添加到 AndroidX 测试库中。


    ### AndroidX 测试库中的 Espresso-Web 依赖


    ```

    androidTestImplementation ''androidx.test.espresso:espresso-web:3.1.0''

    ```


    ## Espresso-Web 构建块


    Espresso-Web 包含以下 API 组件：


    - `WebInteractions`——类似于 Espresso 的 `ViewInteraction` 或 `DataInteraction`。用于执行操作和调用验证方法、定位
    web 元素以及设置 WebView 属性。

    - `DriverAtoms`——来自 WebDriver 项目的 JavaScript atoms 集合。

    - `WebAssertions`——断言给定 atom 的结果被提供的匹配器接受。


    ### Web 交互


    - `reset()`——删除 web 交互中的 `Element` 和 `Window` 引用。

    - `forceJavascriptEnabled()`——强制在 WebView 上使用 JavaScript。启用 JavaScript 可能会重新加载被测试的
    WebView。

    - `withNoTimeout()`——禁用此 `WebInteraction` 上的所有超时。

    - `withTimelout()`——为当前 `WebInteraction` 设置定义的超时时间。

    - `inWindow()`——使此 `WebInteraction` 在特定的 DOM 窗口中执行 JavaScript 评估。

    - `withElement()`——使此 `WebInteraction` 在评估之前向 atom 提供给定的 `ElementReference`。调用此方法后，它会重置任何先前选择的
    `ElementReference`。

    - `withContextualElement()`——在所选元素的子视图上评估此 `WebInteraction`。类似于 Espresso 的 `withChild()`
    方法。

    - `perform()`——在当前上下文中执行提供的 atom。此方法会阻塞，直到 atom 返回。生成一个新的 `WebInteraction` 实例，可用于进一步交互。

    - `check()`——评估给定的 `WebAssertion`。此方法完成后，atom 评估的结果可通过 `get` 获得。

    - `get()`——返回先前调用 `perform` 或 `check` 的结果。


    为了便于理解，web 交互可以分成不同的组，每组代表某种功能负载，如图 6-1 所示。


    ### Driver atoms


    ![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig1_HTML.jpg](images/469090_1_En_6_Chapter/469090_1_En_6_Fig1_HTML.jpg)


    **图 6-1** 按功能负载分组的 WebInteractions


    - `webClick()`——模拟 JavaScript 事件以点击特定元素。

    - `clearElement()`——清除可编辑元素的内容。

    - `webKeys()`——模拟发送到某个元素的 JavaScript 按键事件。

    - `findElement()`——使用提供的 `locatorType` 策略查找元素。

    - `selectActiveElement()`——查找文档中当前活动的元素。

    - `selectFrameByIndex()`——按索引选择当前选中窗口的子框架。

    - `selectFrameByIdOrName()`——按名称或 ID 选择给定窗口的子框架。

    - `getText()`——返回给定 DOM 元素下方的可见文本。

    - `webScrollIntoView()`——如果所需元素在滚动后可见，则返回 true。


    `DriverAtoms` 可以按返回类型分组，这决定了特定方法的使用位置。请参见图 6-2。


    ![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig2_HTML.jpg](images/469090_1_En_6_Chapter/469090_1_En_6_Fig2_HTML.jpg)


    **图 6-2** 按返回类型分组的 DriverAtoms


    ### Web 断言


    （见图 6-3）


    ![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig3_HTML.jpg](images/469090_1_En_6_Chapter/469090_1_En_6_Fig3_HTML.jpg)


    **图 6-3** WebAssertions 方法


    - `webMatches()`——一个 `WebAssertion`，断言给定 atom 的结果被提供的匹配器接受。

    - `webContent()`——一个 `WebAssertion`，断言文档与提供的匹配器匹配。


    现在，我们可以用更详细的信息扩展 Espresso-Web API 使用公式，如图 6-4 所示。


    ![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig4_HTML.jpg](images/469090_1_En_6_Chapter/469090_1_En_6_Fig4_HTML.jpg)


    **图 6-4** 扩展的 Espresso-Web API 使用公式


    您可能想知道为什么图 6-4 中显示的 `onWebView()` 方法将 Espresso `ViewMatcher`（在第 1 章中讨论）作为参数。`WebView`
    UI 元素仍然是 Android 原生组件，可以有自己的 ID、内容描述和其他元素属性。如果应用程序屏幕中有多个 `WebView` 组件，我们必须指定要操作哪个
    `WebView`。


    让我们再次查看我们的示例应用程序，其中 Settings 部分包含一个集成了 `WebView` 组件的 WebView 示例条目。图 6-5 显示了 LayoutInspector
    中的布局层次结构。


    ![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig5_HTML.jpg](images/469090_1_En_6_Chapter/469090_1_En_6_Fig5_HTML.jpg)


    **图 6-5** WebView 组件的应用程序设置子节布局


    如您所见，`WebView` 组件可以使用基于 ID 属性 `web_view` 的 Espresso `ViewMatcher` 进行标识。为方便起见，附录
    A 中包含了 Espresso-Web 速查表，并作为示例应用程序源代码的补充。


    ## 练习 17：验证 Intent


    1.  启动示例应用程序并导航到 Settings。打开 `WebView` 示例部分，并使用 LayoutInspector 工具进行布局转储。观察哪些
    `WebView` 属性可用于 UI 测试。'
  raw: "*   Support contact forms\n\nWe already know that native Android applications\
    \ can be tested by\nEspresso. This\nchapter presents Espresso-Web and shows\n\
    how it can be used to test Android `WebView` UI components\nintegrated into mobile\
    \ applications. Both Espresso and Espresso-Web can\nbe used in combination to\
    \ fully interact with an application on its\ndifferent levels.\n\nEspresso-Web\
    \ Basics\nSimilar to Espresso’s `onData()` method, a\n`WebView`\ninteraction is\
    \ comprised of several *atoms*. `WebView` interactions\nuse a combination of the\
    \ Java programming language and a JavaScript\nbridge to do their work. Because\
    \ there is no chance of introducing race\nconditions by\nexposing data from the\
    \ JavaScript environment—everything Espresso sees\non the Java-based side is an\
    \ isolated copy—returning data from `Web.WebInteraction`\nobjects is fully supported,\
    \ allowing you to verify all the data that’s\nreturned from a request.\nThe WebDriver\
    \ framework uses *atoms* to find and manipulate\nweb elements programmatically.\
    \ Atoms are used by WebDriver to\naccommodate browser manipulation. An atom is\
    \ conceptually similar to a\n`ViewAction`.\nIt’s a self-contained unit that performs\
    \ an action in your UI. You\nexpose atoms using a list of defined methods, such\
    \ as `findElement()` and\n`getElement()`,\nto drive the browser from the user’s\
    \ point of view. However, if you use\nthe WebDriver framework directly, atoms\
    \ need to be properly\norchestrated, requiring logic that is quite verbose.\n\
    Within Espresso, the `Web` and `Web.WebInteraction`\nclasses wrap this boilerplate\
    \ and give an Espresso-like feel to\ninteracting with `WebView` objects. So,\n\
    in the context of a `WebView`, atoms are\nused as a substitution to traditional\
    \ Espresso `ViewMatchers` and\n`ViewActions`.\nThe API then looks quite simple,\
    \ as follows.\n\n*Espresso-Web API Usage Formula.*\n\n```\nonWebView()\n.withElement(Atom)\n\
    .perform(Atom)\n.check(WebAssertion)\n```\n\nTo add Espresso-Web to a project,\
    \ insert the following line of code\ninto the application `build.gradle`\nfile.\n\
    \n*Espresso-Web Dependency in the Android Support Library.*\n\n```\nandroidTestImplementation\
    \ 'com.android.support.test.espresso:espresso-web:3.0.2'\n```\n\nOr add the same\
    \ dependency to the AndroidX Test Library.\n\n*Espresso-Web Dependency*   *in\
    \ the AndroidX\nTest Library.*\n\n```\nandroidTestImplementation 'androidx.test.espresso:espresso-web:3.1.0'\n\
    ```\n\nEspresso-Web Building Blocks\n\nEspresso-Web contains the following API\
    \ components:\n\n*   `WebInteractions`—An\n    analogue to Espresso’s `ViewInteraction`\
    \ or\n    `DataInteraction`. Used\n    to perform actions and call validation\
    \ methods, locate web elements, and\n    set WebView properties.\n\n*   `DriverAtoms`—A\n\
    \    collection of JavaScript atoms from the WebDriver project.\n\n*   `WebAssertions`—Asserts\n\
    \    that the given atom’s result is accepted by the provided\n    matcher.\n\n\
    Web interactions:\n\n*   `reset(`)—Deletes the\n    `Element` and\n    `Window`\n\
    \    references from the web interaction.\n\n*   `forceJavascriptEnabled()`—Forces\n\
    \    JavaScript usage on a WebView. Enabling JavaScript may reload the\n    WebView\
    \ under test.\n\n*   `withNoTimeout()`—Disables\n    all timeouts on this `WebInteraction`.\n\
    \n*   `withTimelout()`—Sets a\n    defined timeout for current `WebInteraction`.\n\
    \n*   `inWindow()`—Causes\n    this `WebInteraction` to\n    perform JavaScript\
    \ evaluation in a specific DOM window.\n\n*   `withElement()`—Causes\n    this\
    \ `WebInteraction` to\n    supply the given `ElementReference` to\n    the atom\
    \ prior to evaluation. After calling this method, it resets any\n    previously\
    \ selected `ElementReference`.\n\n*   `withContextualElement()`—Evaluates\n  \
    \  this `WebInteraction` on the\n    subview of the selected element. Similar\
    \ to the Espresso `withChild()`\n    method.\n\n*   `perform()`—Executes\n   \
    \ the provided atom within the current context. This method blocks until\n   \
    \ the atom returns. Produces a new instance of `WebInteraction` that\n    can\
    \ be used in further interactions.\n\n*   `check()`—Evaluates the\n    given `WebAssertion`.\
    \ After\n    this method completes, the result of the atom’s evaluation is available\n\
    \    via get.\n\n*   `get()`—Returns the\n    result of a previous call to perform\
    \ or check.\n\nFor better understanding, web interactions can be\nsplit into different\
    \ groups where each group represents some functional\nload, as shown in Figure\
    \ [6-1](#469090_1_En_6_Chapter.xhtml#Fig1).\n\nDriver atoms:\n\n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig1_HTML.jpg](images/469090_1_En_6_Chapter/469090_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1\nWebInteractions\n grouped by functional load\n\n*   `webClick()`—Simulates\n\
    \    the JavaScript events to click on a particular element.\n\n*   `clearElement()`—Clears\n\
    \    content from an editable element.\n\n*   `webKeys()`—Simulates\n    JavaScript\
    \ key events sent to a certain element.\n\n*   `findElement()`—Finds\n    an element\
    \ using the provided `locatorType`\n    strategy.\n\n*   `selectActiveElement()`—Finds\n\
    \    the currently active element in the document.\n\n*   `selectFrameByIndex()`—Selects\n\
    \    a subframe of the currently selected window by its index.\n\n*   `selectFrameByIdOrName()`—Selects\n\
    \    a subframe of the given window by its name or ID.\n\n*   `getText()`—Returns\
    \ the\n    visible text beneath a given DOM element.\n\n*   `webScrollIntoView()`—Returns\n\
    \    true if the desired element is in view after scrolling.\n\nDriverAtoms  can\n\
    be grouped by the return type, which determines where a specific method\nwill\
    \ be used. See Figure [6-2](#469090_1_En_6_Chapter.xhtml#Fig2).\n\n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig2_HTML.jpg](images/469090_1_En_6_Chapter/469090_1_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2\nDriverAtoms \ngrouped by the return type\n\nWeb assertions\n(see\
    \ Figure [6-3](#469090_1_En_6_Chapter.xhtml#Fig3)):\n\n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig3_HTML.jpg](images/469090_1_En_6_Chapter/469090_1_En_6_Fig3_HTML.jpg)\n\
    \nFigure 6-3\nWebAssertions methods\n\n*   `webMatches()`—A `WebAssertion` that\n\
    \    asserts that the given atom’s result is accepted by the provided\n    matcher.\n\
    \n*   `webContent()`—A `WebAssertion` that\n    asserts that the document is matched\
    \ by the provided matcher.\n\nNow we can extend the Espresso-Web API usage formula\
    \ with\nmore detailed information, as shown in Figure [6-4](#469090_1_En_6_Chapter.xhtml#Fig4).\n\
    \n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig4_HTML.jpg](images/469090_1_En_6_Chapter/469090_1_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4\nExtended Espresso-Web API usage formula\n\nYou might wonder why\
    \ the `onWebView()`\nmethod  shown in\nFigure [6-4](#469090_1_En_6_Chapter.xhtml#Fig4)\
    \ takes the\nEspresso `ViewMatcher`\n(discussed in Chapter [1](#469090_1_En_1_Chapter.xhtml))\
    \ as a parameter. The `WebView` UI element is\nstill an Android native component\
    \ and can have its own ID, content\ndescription, and other element properties.\
