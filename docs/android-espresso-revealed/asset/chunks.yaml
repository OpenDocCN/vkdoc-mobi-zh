    ## Summary


    In general, AndroidX Test is a nice step forward. It brings alignment among different
    test types in terms of testing tools and dependencies used. The main weakness
    so far is that it targets unit and integration tests with only tiny improvements
    on UI tests. But more will certainly come for UI tests in time and hopefully with
    higher frequency than with the testing support library.


    # 15. Improving Productivity and Testing Unusual Components


    This chapter contains code samples that were not covered in other chapters and
    Espresso testing tips that may increase your daily test writing productivity.


    ## Creating Parameterized Tests


    Sometimes we may have a need to write a single test that is applicable to many
    similar cases. For example, we might need a test that validates how the same `EditText`
    field behaves with different `String` values provided as input. In this case,
    the `JUnit Parameterized` custom runner can be used. It allows us to have one
    test inside a parameterized class ([https://github.com/junit-team/junit4/wiki/parameterized-tests](https://github.com/junit-team/junit4/wiki/parameterized-tests)).
    The following example demonstrates a parameterized test class with a single parameter.


    *chapter15.parameterizedtest.ParameterizedTestSingleParameter.kt*


    ```

    /**

    * Parameterized test with single parameter.

    */

    @RunWith(value = Parameterized::class)

    class ParameterizedTestSingleParameter(private val title: String) : BaseTest()
    {

    @Test

    fun usesSingleParameters() {

    // Add new TO-DO.

    onView(withId(R.id.fab_add_task)).perform(click())

    onView(withId(R.id.add_task_title))

    .perform(typeText(title), closeSoftKeyboard())

    onView(withId(R.id.fab_edit_task_done)).perform(click())

    // Verify new TO-DO with title is shown in the TO-DO list.

    onView(withText(title)).check(matches(isDisplayed()))

    }

    companion object {

    @JvmStatic

    @Parameterized.Parameters

    fun data() = listOf(

    TodoItem().title,

    TodoItem().title,

    TodoItem().title)

    }

    }

    ```


    During the test run, each instance of the `ParameterizedTestSingleParameter` class
    will be constructed using the provided `title` argument. So, in the end, we will
    have as many test runs as the number of parameters provided. In this case, it
    is three.


    A parameterized test class with multiple test parameters can be created in a similar
    way, as follows.


    *chapter15.parameterizedtest.ParameterizedTestMultipleParameters.kt*


    ```

    /**

    * Parameterized test with multiple parameters.

    */

    @RunWith(value = Parameterized::class)

    class ParameterizedTestMultipleParameters(

    private val title: String,

    private val description: String) : BaseTest() {

    @Test

    fun usesMultipleParameters() {

    // Add new TO-DO.

    onView(withId(R.id.fab_add_task)).perform(click())

    onView(withId(R.id.add_task_title))

    .perform(typeText(title), closeSoftKeyboard())

    onView(withId(R.id.add_task_description))

    .perform(typeText(description), closeSoftKeyboard())

    onView(withId(R.id.fab_edit_task_done)).perform(click())

    // Verify new TO-DO with title is shown in the TO-DO list.

    onView(withText(title)).check(matches(isDisplayed()))

    }

    companion object {

    @JvmStatic

    @Parameterized.Parameters

    fun data() = arrayOf(

    arrayOf("item 1", "description 1"),

    arrayOf("item 2", "description 2"),

    arrayOf("item 3", "description 3"))

    }

    }

    ```


    ## Aggregating Tests into Test Suites


    In order to run a set of tests that may belong or may test for a particular application
    functionality, they are best organized into test suites. The `JUnit Suite Runner`
    can be the right choice here. It allows you to manually build a suite containing
    tests from many test classes. Here is how it looks.


    *chapter15.testsuite.TestSuiteSample.kt*


    ```

    /**

    * Organizing test classes into a test suite.

    */

    @RunWith(Suite::class)

    @Suite.SuiteClasses(

    AddToDoTest::class,

    EditToDoTest::class,

    FilterToDoTest::class)

    class TestSuiteSample

    ```


    This way, you can organize tests into a logical structure depending on the tested
    functionality or on the test types, such as Smoke, Regression, etc.'
