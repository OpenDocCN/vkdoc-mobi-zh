  trans: "好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项，将以下英文文本翻译成中文。\n\n\n# Espresso 框架中的同步机制\n\n\
    Espresso 框架的主要优势之一是其测试的健壮性。这是通过自动化同步大部分测试操作来实现的。当主应用程序 UI 线程繁忙时，Espresso 会等待它，并在\
    \ UI 线程变为空闲后释放测试操作。此外，在进入下一个测试步骤之前，它还会等待 `AsyncTask` 操作完成。在本章中，我们将了解 Espresso\
    \ 如何使用 `IdlingResource` 机制处理网络操作，并熟悉作为 `IdlingResource` 替代方案的 `ConditionWatcher`\
    \ 机制。\n\n## IdlingResource 基础\n\n每次您的测试调用 `onView()` 或 `onData()` 时，Espresso 会等待，直到满足以下同步条件后，才执行相应的\
    \ UI 操作或断言：\n\n*   消息队列为空。\n*   当前没有正在执行任务的 `AsyncTask` 实例。\n*   所有开发者定义的空闲资源都处于空闲状态。\n\
    \n通过执行这些检查，Espresso 大大提高了在任何给定时间点只有一个 UI 操作或断言可能发生的可能性。此功能为您提供了更可靠和可信赖的测试结果。\n\
    \n然而，并非在所有情况下都能依赖自动同步，例如，当被测试的应用程序通过 `ThreadPoolExecutor` 执行网络调用时。为了让 Espresso\
    \ 处理这类长时间运行的异步操作，必须在执行测试之前创建并注册 `IdlingResource`。当这些操作更新您想要进一步验证的应用程序 UI 时，注册\
    \ `IdlingResource` 非常重要。\n\n可以使用 `IdlingResource` 的常见用例是当您的应用程序：\n\n*   执行网络调用。\n\
    *   建立数据库连接。\n\n目前，Espresso 提供了以下空闲资源：\n\n*   `CountingIdlingResource` — 维护一个活动任务的计数器。当计数器为零时，关联的资源被视为空闲。此功能与信号量非常相似。在大多数情况下，此实现足以管理测试期间应用的异步工作。\n\
    *   `UriIdlingResource` — 类似于 `CountingIdlingResource`，但计数器需要在一段特定时间内保持为零，资源才被视为空闲。这个额外的等待时间考虑到了连续的网络请求，即线程中的应用可能在收到前一个请求的响应后立即发出一个新请求。\n\
    *   `IdlingThreadPoolExecutor` — 一个自定义的 `ThreadPoolExecutor` 实现，它跟踪所创建线程池中正在运行的任务总数。该类使用\
    \ `CountingIdlingResource` 来维护活动任务的计数器。\n*   `IdlingScheduledThreadPoolExecutor`\
    \ — 一个自定义的 `ScheduledThreadPoolExecutor` 实现。它提供与 `IdlingThreadPoolExecutor` 类相同的功能，但它还可以跟踪计划在未来执行或定期执行的任务。\n\
    \n要在应用程序中开始使用空闲资源机制，必须将以下依赖项添加到应用程序的 `buid.gradle` 文件中（依赖项针对 Android Support 和\
    \ AndroidX 库列出）。\n\n**Android Support 库中的 IdlingResource 依赖项：**\n\n```\nandroidTestImplementation\
    \ \"com.android.support.test.espresso.idling:idling-concurrent:3.0.1\"\n```\n\n\
    **AndroidX 库中的 IdlingResource 依赖项：**\n\n```\nandroidTestImplementation 'androidx.test.espresso.idling:idling-concurrent:3.1.0'\n\
    ```\n\n这些空闲资源类型在其实现中使用了 `CountingIdlingResource`，因此我们将重点参考 `CountingIdlingResource`。\n\
    \n`IdlingResource` 接口包含三个方法：\n\n*   `getName()` — 返回资源的名称。\n\n    > **注意：** `IdlingResource`\
    \ 名称由 `String` 类表示，并在日志记录以及注册/注销时使用。因此，资源名称应该是唯一的。\n\n*   `isIdleNow()` — 如果资源当前空闲，则返回\
    \ `true`。Espresso 会始终在主线程中调用此方法；因此，它应该是非阻塞的并立即返回。\n\n*   `registerIdleTransitionCallback()`\
    \ — 向空闲资源注册给定的资源回调。然后，在 `isIdleNow()` 方法中使用已注册的回调。\n\n    > **注意：** `IdlingResource`\
    \ 类包含一个 `ResourceCallback` 接口，该接口在 `registerTransitionCallback()` 方法中使用。每当应用程序要从繁忙状态切换到空闲状态时，都应调用\
    \ `callback.onTransitionToIdle()` 方法来通知 Espresso。\n\n`CountingIdlingResource`\
    \ 是 `IdlingResource` 的一个实现，它通过维护一个内部计数器来判断空闲状态。当计数器为零时，视为空闲；当计数器非零时，则非空闲。这与 `java.util.concurrent.Semaphore`\
    \ 的行为非常相似。可以从任何线程递增或递减计数器。如果达到非逻辑状态（例如计数器小于零），则会抛出 `IllegalStateException`。然后，此类可用于包装那些在执行过程中会阻止测试访问\
    \ UI 的操作。\n\n## 编写代码\n\n以下是我们应用程序中简单的 `CountingIdlingResource` 的样子（请参阅主应用程序源代码中的\
    \ `util/SimpleCountingIdlingResource.java` 文件）：\n\n```java\npublic final class\
    \ SimpleCountingIdlingResource implements IdlingResource {\n    private final\
    \ String mResourceName;\n    private final AtomicInteger counter = new AtomicInteger(0);\n\
    \    // 从主线程写入，从任何线程读取。\n    private volatile ResourceCallback resourceCallback;\n\
    \n    /**\n     * 创建一个 SimpleCountingIdlingResource\n     *\n     * @param resourceName\
    \ 要向 Espresso 报告的资源名称。\n     */\n    public SimpleCountingIdlingResource(String\
    \ resourceName) {\n        mResourceName = checkNotNull(resourceName);\n    }\n\
    \n    @Override\n    public String getName() {\n        return mResourceName;\n\
    \    }\n\n    @Override\n    public boolean isIdleNow() {\n        return counter.get()\
    \ == 0;\n    }\n\n    @Override\n    public void registerIdleTransitionCallback(ResourceCallback\
    \ resourceCallback) {\n        this.resourceCallback = resourceCallback;\n   \
    \ }\n\n    /**\n     * 递增正在监视的资源的进行中事务计数。\n     */\n    public void increment()\
    \ {\n        counter.getAndIncrement();\n    }\n\n    /**\n     * 递减正在监视的资源的进行中事务计数。\n\
    \     *\n     * 如果此操作导致计数器低于 0 - 则会引发异常。\n     *\n     * @throws IllegalStateException\
    \ 如果计数器低于 0。\n     */\n    public void decrement() {\n        int counterVal =\
    \ counter.decrementAndGet();\n        if (counterVal == 0) {\n            // 我们已从非零变为零。这意味着我们现在空闲了！告诉\
    \ Espresso。\n            if (null != resourceCallback) {\n                resourceCallback.onTransitionToIdle();\n\
    \            }\n        }\n        if (counterVal < 0) {\n            throw new\
    \ IllegalArgumentException(\"计数器已损坏！\");\n        }\n    }\n}\n```\n\n`SimpleCountingIdlingResource`\
    \ 类被同一位置中持有其静态引用的 `EspressoIdlingResource` 类所使用（请参阅 `util/EspressoIdlingResource.java`\
    \ 文件），并且它使用其 `increment()` 和 `decrement()` 方法：\n\n```java\npublic class EspressoIdlingResource\
    \ {\n    private static final String RESOURCE = \"GLOBAL\";\n    private static\
    \ SimpleCountingIdlingResource mCountingIdlingResource =\n        new SimpleCountingIdlingResource(RESOURCE);\n\
    \n    public static void increment() {\n        mCountingIdlingResource.increment();\n\
    \    }\n\n    public static void decrement() {\n        mCountingIdlingResource.decrement();\n\
    \    }\n\n    public static IdlingResource getIdlingResource() {\n        return\
    \ mCountingIdlingResource;\n    }\n}\n```\n"
- fmt: "现在让我们来看一下主应用源代码中`tasks/TasksPresenter.java`类的实现，该类使用了`EspressoIdlingResource`。这个类负责加载待办事项并在待办事项列表中呈现它们。你可以看到，当任务加载过程开始时，会调用`EspressoIdlingResource.increment()`方法来暂停测试。当任务加载完成后，会调用`EspressoIdlingResource.decrement()`来通知Espresso即将进入空闲状态：\n\
    \n```java\nprivate void loadTasks(boolean forceUpdate, final boolean showLoadingUI)\
    \ {\n    if (showLoadingUI) {\n        mTasksView.setLoadingIndicator(true);\n\
    \    }\n    if (forceUpdate) {\n        mTasksRepository.refreshTasks();\n   \
    \ }\n    // 网络请求可能在不同的线程中处理，因此请确保Espresso知道应用在响应处理完成前处于忙碌状态。\n    EspressoIdlingResource.increment();\
    \ // 应用在进一步通知前保持忙碌\n    mTasksRepository.getTasks(new TasksDataSource.LoadTasksCallback()\
    \ {\n        @Override\n        public void onTasksLoaded(List tasks) {\n    \
    \        List tasksToShow = new ArrayList();\n            // 此回调可能被调用两次：一次用于缓存，一次用于从服务器API加载数据，\n\
    \            // 因此我们在递减前进行检查，否则会抛出\"Counter has been corrupted!\"异常。\n       \
    \     if (!EspressoIdlingResource.getIdlingResource().isIdleNow()) {\n       \
    \         EspressoIdlingResource.decrement(); // 将应用设为空闲状态。\n            }\n \
    \           ... // 其他代码\n        }\n    }\n}\n```\n\n## 运行第一个测试\n\n为了实际观察`EspressoIdlingResource`的运行情况，我们在`SimpleCountingIdlingResource.java`类的`increment()`和`decrement()`方法中添加一些日志，并运行`addNewToDosChained()`测试：\n\
    \n```java\n@Override\npublic boolean isIdleNow() {\n    Log.d(getName(), \"Counter\
    \ value is \" + counter.get());\n    return counter.get() == 0;\n}\n```\n\n以及：\n\
    \n```java\npublic void decrement() {\n    int counterVal = counter.decrementAndGet();\n\
    \    Log.d(getName(), \"Counter decremented. Value is \" + counterVal);\n    if\
    \ (counterVal == 0) {\n        // 我们从非零变为零。这意味着现在空闲了！通知Espresso。\n        if (null\
    \ != resourceCallback) {\n            resourceCallback.onTransitionToIdle();\n\
    \        }\n    }\n    if (counterVal < 0) {\n        throw new IllegalArgumentException(\"\
    Counter has been corrupted!\");\n    }\n}\n```\n\n在测试运行期间，观察我们应用程序的logcat日志，可以通过`GLOBAL`标签进行过滤。图[4-1](#469090_1_En_4_Chapter.xhtml#Fig1)展示了你将会看到的内容；每次添加一个待办事项时，待办事项列表会显示给用户，并且计数器会在加载完成后立即递增和递减。\n\
    \n![../images/469090_1_En_4_Chapter/469090_1_En_4_Fig1_HTML.jpg](images/469090_1_En_4_Chapter/469090_1_En_4_Fig1_HTML.jpg)\n\
    \n**图4-1** 空闲资源计数器日志记录\n\n`IdlingResource`应在使用前注册。`IdlingRegistry`负责注册和注销`IdlingResource`。\n\
    \n*注册和注销IdlingResource实例。*\n\n```kotlin\n@Before\nfun registerResources() {\n\
    \    val idlingRegistry = IdlingRegistry.getInstance()\n    val okHttp3IdlingResource\
    \ = OkHttp3IdlingResource(client)\n    val picassoIdlingResource = PicassoIdlingResource()\n\
    \    idlingRegistry.register(okHttp3IdlingResource)\n    idlingRegistry.register(picassoIdlingResource)\n\
    }\n@After\nfun unregisterResources() {\n    val idlingRegistry = IdlingRegistry.getInstance()\n\
    \    for (idlingResource in idlingRegistry.resources) {\n        if (idlingResource\
    \ == null) {\n            continue\n        }\n        idlingRegistry.unregister(idlingResource)\n\
    \    }\n}\n```\n\n至此，`CountingIdlingResource`机制应该已经清楚了。这个示例描述了我们在测试中处理应用程序长时间运行或异步操作的方法。在使用这类空闲资源时务必小心，不要在测试执行期间将其锁定。\n\
    \n## `OkHttp3IdlingResource`\n\n我们要查看的另一个空闲资源示例是`OkHttp3IdlingResource`。为什么我们要特别关注它？`OkHttp`是最常用的HTTP客户端库之一。它由Square开发，并广泛应用于许多Android应用程序中。可能正因如此，Square开发者Jake\
    \ Wharton实现并开源了这个资源。请参见：[https://github.com/JakeWharton/okhttp-idling-resource](https://github.com/JakeWharton/okhttp-idling-resource)。以下是它的实现。\n\
    \n*chapter4.idlingresources.OkHttp3IdlingResource.kt。*\n\n```java\npublic final\
    \ class OkHttp3IdlingResource implements IdlingResource {\n    @CheckResult\n\
    \    @NonNull\n    @SuppressWarnings(\"ConstantConditions\") // 作为库的额外防护。\n  \
    \  public static OkHttp3IdlingResource create(@NonNull String name, @NonNull OkHttpClient\
    \ client) {\n        if (name == null) throw new NullPointerException(\"name ==\
    \ null\");\n        if (client == null) throw new NullPointerException(\"client\
    \ == null\");\n        return new OkHttp3IdlingResource(name, client.dispatcher());\n\
    \    }\n    private final String name;\n    private final Dispatcher dispatcher;\n\
    \    volatile ResourceCallback callback;\n    private OkHttp3IdlingResource(String\
    \ name, Dispatcher dispatcher) {\n        this.name = name;\n        this.dispatcher\
    \ = dispatcher;\n        dispatcher.setIdleCallback(new Runnable() {\n       \
    \     @Override public void run() {\n                ResourceCallback callback\
    \ = OkHttp3IdlingResource.this.callback;\n                if (callback != null)\
    \ {\n                    callback.onTransitionToIdle();\n                }\n \
    \           }\n        });\n    }\n    @Override public String getName() {\n \
    \       return name;\n    }\n    @Override public boolean isIdleNow() {\n    \
    \    return dispatcher.runningCallsCount() == 0;\n    }\n    @Override public\
    \ void registerIdleTransitionCallback(ResourceCallback callback) {\n        this.callback\
    \ = callback;\n    }\n}\n```\n\n基本上，这个资源开箱即用，几乎所有事情都为我们处理好了。`isIdleNow()`方法中调用的`dispatcher.runningCallsCount()`方法会返回正在运行的同步和异步请求数量，并与零进行比较。当结果为零时，资源处于空闲状态。不过，要使用它，我们仍然需要执行一些步骤：\n\
    \n1.  在`build.gradle`文件中添加依赖：\n    ```\n    androidTestCompile 'com.jakewharton.espresso:okhttp3-idling-resource:1.0.0'\n\
    \    ```\n2.  在你的测试代码中，获取`OkHttpClient`实例并创建一个空闲资源：\n    ```java\n    OkHttpClient\
    \ client = // ... 获取 OkHttpClient 实例\n    IdlingResource resource = OkHttp3IdlingResource.create(\"\
    OkHttp\", client);\n    ```\n3.  在运行任何Espresso测试之前，在测试代码中注册空闲资源：\n    ```java\n\
    \    IdlingRegistry.getInstance().register(resource);\n    ```\n\n顺便说一下，不要使用已废弃的`Espresso.registerIdlingResources()`方法；而应使用本节中展示的`IdlingRegistry`实现。\n\
    \n## `PicassoIdlingResource`\n\nPicasso是Square为Android开发的一个强大的图片下载和缓存库。Picasso允许在应用程序中轻松加载图片——通常只需一行代码（[http://square.github.io/picasso/](http://square.github.io/picasso/)）：\n\
    \n```java\nPicasso.get().load(\"http://i.imgur.com/DvpvklR.png\").into(imageView);\n\
    ```\n\nPicasso是Android最流行的图片下载库，这意味着它是另一种`IdlingResource`类型的完美候选。当我们希望确保整个应用程序窗口布局连同图形资源一起加载完成时，可以使用图片下载空闲资源。在需要验证测试中的图形资源时，这一点极其重要。以下是在`androidTest/com.squareup.picasso`包中同样实现的`PicassoIdling`资源示例。\n\
    \n*androidTest/com.squareup.picasso.PicassoIdlingResource.java。*"
  raw: "Now let’s take a look at the `tasks/TasksPresenter.java`\nclass from the main\
    \ application source code where `EspressoIdlingResource`\nis used. This class\
    \ is responsible for loading TO-DOs and presenting\nthem in the TO-DO list. You\
    \ can see how the `EspressoIdlingResource.increment()`\nmethod is called when\
    \ the task load process starts to pause the tests.\nWhen the task is loaded, `EspressoIdlingResource.decrement()`\n\
    is called to notify Espresso about the upcoming idling state:\n\n```\nprivate\
    \ void loadTasks(boolean forceUpdate, final boolean showLoadingUI) {\nif (showLoadingUI)\
    \ {\nmTasksView.setLoadingIndicator(true);\n}\nif (forceUpdate) {\nmTasksRepository.refreshTasks();\n\
    }\n// The network request might be handled in a different thread so make sure\
    \ Espresso\n// knows that the app is busy until the response is handled.\nEspressoIdlingResource.increment();\
    \ // App is busy until further notice\nmTasksRepository.getTasks(new TasksDataSource.LoadTasksCallback()\
    \ {\n@Override\npublic void onTasksLoaded(List tasks) {\nList tasksToShow = new\
    \ ArrayList();\n// This callback may be called twice, once for the cache and once\
    \ for loading\n// the data from the server API, so we check before decrementing,\
    \ otherwise\n// it throws \"Counter has been corrupted!\" exception.\nif (!EspressoIdlingResource.getIdlingResource().isIdleNow())\
    \ {\nEspressoIdlingResource.decrement(); // Set app as idle.\n}\n... // other\
    \ code here\n}\n}\n}\n```\n\nRunning the First Test\n\nTo see `EspressoIdlingResource`\
    \  in action, we add some\nlogging to the `increment()` and `decrement()` methods\n\
    in the `SimpleCountingIdlingResource.java`\nclass and run the `addNewToDosChained()`\n\
    test:\n\n```\n@Override\npublic boolean isIdleNow() {\nLog.d(getName(), \"Counter\
    \ value is \" + counter.get());\nreturn counter.get() == 0;\n}\n```\n\nand\n\n\
    ```\npublic void decrement() {\nint counterVal = counter.decrementAndGet();\n\
    Log.d(getName(), \"Counter decremented. Value is \" + counterVal);\nif (counterVal\
    \ == 0) {\n// we've gone from non-zero to zero. That means we're idle now! Tell\
    \ espresso.\nif (null != resourceCallback) {\nresourceCallback.onTransitionToIdle();\n\
    }\n}\nif (counterVal < 0) {\nthrow new IllegalArgumentException(\"Counter has\
    \ been corrupted!\");\n}\n}\n```\n\nDuring the test run, observe the logcat logs\
    \ of our application, which\ncan be filtered out by the `GLOBAL` tag. Figure\n\
    [4-1](#469090_1_En_4_Chapter.xhtml#Fig1) shows what you\nwill see; each time a\
    \ TO-DO is added, a TO-DO list is displayed to the\nuser and the counter is incremented\
    \ and decremented just after the load\nis done.\n\n![../images/469090_1_En_4_Chapter/469090_1_En_4_Fig1_HTML.jpg](images/469090_1_En_4_Chapter/469090_1_En_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1\nIdling resource counter logging\n\n`IdlingResource` should\nbe registered\
    \ before usage. `IdlingRegistry`\nhandles registering and unregistering `IdlingResource`.\n\
    \n*Registering and Unregistering IdlingResource Instances.*\n\n```\n@Before\n\
    fun registerResources() {\nval idlingRegistry = IdlingRegistry.getInstance()\n\
    val okHttp3IdlingResource = OkHttp3IdlingResource(client)\nval picassoIdlingResource\
    \ = PicassoIdlingResource()\nidlingRegistry.register(okHttp3IdlingResource)\n\
    idlingRegistry.register(picassoIdlingResource)\n}\n@After\nfun unregisterResources()\
    \ {\nval idlingRegistry = IdlingRegistry.getInstance()\nfor (idlingResource in\
    \ idlingRegistry.resources) {\nif (idlingResource == null) {\ncontinue\n}\nidlingRegistry.unregister(idlingResource)\n\
    }\n}\n```\n\nSo, at this moment the `CountingIdlingResource`\nmechanism should\
    \ be clear. This example described the way that we handle\nlong-lasting or asynchronous\
    \ actions of the application being tested. It\nis important to be careful with\
    \ such idling resources and not to lock\nthem during the test execution.\n\nOkHttp3IdlingResource\n\
    Another idling resource sample that we look at is the  `OkHttp3IdlingResource`\n\
    . Why we should specifically look at it? `OkHttp` is one of the\nmost used HTTP\
    \ client libraries. It was developed by Square and used in\na lot of Android applications.\
    \ Probably because of this one, Square\ndeveloper Jake Wharton implemented and\
    \ open sourced this resource. See\n [`https://github.com/JakeWharton/okhttp-idling-resource`](https://github.com/JakeWharton/okhttp-idling-resource)\
    \ . Here is how it looks.\n\n*chapter4.idlingresources.OkHttp3IdlingResource.kt.*\n\
    \n```\npublic final class OkHttp3IdlingResource implements IdlingResource {\n\
    @CheckResult\n@NonNull\n@SuppressWarnings(\"ConstantConditions\") // Extra guards\
    \ as a library.\npublic static OkHttp3IdlingResource create(@NonNull String name,\
    \ @NonNull OkHttpClient client) {\nif (name == null) throw new NullPointerException(\"\
    name == null\");\nif (client == null) throw new NullPointerException(\"client\
    \ == null\");\nreturn new OkHttp3IdlingResource(name, client.dispatcher());\n\
    }\nprivate final String name;\nprivate final Dispatcher dispatcher;\nvolatile\
    \ ResourceCallback callback;\nprivate OkHttp3IdlingResource(String name, Dispatcher\
    \ dispatcher) {\nthis.name = name;\nthis.dispatcher = dispatcher;\ndispatcher.setIdleCallback(new\
    \ Runnable() {\n@Override public void run() {\nResourceCallback callback = OkHttp3IdlingResource.this.callback;\n\
    if (callback != null) {\ncallback.onTransitionToIdle();\n}\n}\n});\n}\n@Override\
    \ public String getName() {\nreturn name;\n}\n@Override public boolean isIdleNow()\
    \ {\nreturn dispatcher.runningCallsCount() == 0;\n}\n@Override public void registerIdleTransitionCallback(ResourceCallback\
    \ callback) {\nthis.callback = callback;\n}\n}\n```\n\nBasically, this resource\
    \ works out-of-the-box and almost everything is\ndone for us here. The `dispatcher.runningCallsCount()`\n\
    method  call from\nthe `iSIdleNow()`\nmethod  returns\nboth running synchronous\
    \ and asynchronous requests counts, which are\ncompared to zero. When the result\
    \ is true, the resource is idle. There\nare, however, some steps we still have\
    \ to take in order to use it:\n\n1.  Add a dependency in the `build.gradle`\n\
    \    file:\n\n1.  In your test code, obtain the `OkHttpClient` instance\n    and\
    \ create an idling resource:\n\n```\nandroidTestCompile 'com.jakewharton.espresso:okhttp3-idling-resource:1.0.0'\n\
    ```\n\n1.  Register the idling resource in the test code before running any\n\
    \    Espresso tests:\n\n```\nOkHttpClient client = // ... get OkHttpClient instance\n\
    IdlingResource resource = OkHttp3IdlingResource.create(\"OkHttp\", client);\n\
    ```\n\n```\nIdlingRegistry.getInstance().register(resource);\n```\n\nBy the way,\
    \ don’t use the deprecated `Espresso.registerIdlingResources()`\nmethod ; instead\n\
    use the `IdlingRegistry`\nimplementation shown in this section.\n\nPicasso IdlingResource\n\
    \nPicasso is a powerful image-downloading and\ncaching library for Android from\
    \ Square. Picasso allows for hassle-free\nimage loading in your application—often\
    \ in one line of code ( [`http://square.github.io/picasso/`](http://square.github.io/picasso/)\
    \ ):\n\n```\nPicasso.get().load(\"http://i.imgur.com/DvpvklR.png\").into(imageView);\n\
    ```\n\nPicasso is the most popular image-downloading library for Android,\nwhich\
    \ means it is a perfect candidate for another type of `IdlingResource`. The\n\
    image-download idling resource can be used when we want to ensure that\nthe whole\
    \ application window layout is loaded together with the\ngraphics. This can be\
    \ extremely important in cases where graphical\nresources should be verified in\
    \ tests. Here is the example of the `PicassoIdling`\nresource that’s also implemented\
    \ in the `androidTest/com.squareup.picasso`\npackage.\n\n*androidTest/com.squareup.picasso.PicassoIdlingResource.java.*"
