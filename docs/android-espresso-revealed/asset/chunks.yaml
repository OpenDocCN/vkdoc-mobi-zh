    \ data this intent is operating on. Often it uses the `content:` scheme, specifying\
    \ data in a content provider. Other schemes may be handled by specific activities,\
    \ such as `http:` by the web browser. Uses `UriMatchers`.\n* `hasExtraWithKey()`\
    \ — Matches an intent that has specific bundle attached to the intent. Uses a\
