    ## ActivityScenario in UI Tests


    `ActivityScenario` provides APIs to start and drive the activity’s lifecycle stage
    (for example, `Stage.CREATED`, `Stage.RESUMED`, `Stage.DESTROYED`, etc.) for testing.
    These APIs are more suitable to integration tests when each activity state can
    be tested quickly and easily. What is important for UI tests is the fact that
    they can be used instead of `ActivityTestRule` to launch the application under
    the test activity before each test run.


    *chapter14* *.* *ActivityScenarioTest.kt.*


    ```

    /**

    * Sample of ActivityScenario.launch(Activity.class) method usage.

    */

    @RunWith(AndroidJUnit4::class)

    class ActivityScenarioTest {

    @Before

    fun launchTasksActivity() {

    ActivityScenario.launch(TasksActivity::class.java)

    }

    @Test

    fun activityScenarioLaunchSample() {

    openContextualActionModeOverflowMenu()

    onView(allOf(withId(R.id.title), withText(R.string.refresh))).perform(click())

    }

    }

    ```


    As you can see, it doesn’t differ much from a usage perspective. But you will
    not have an instance of `ActivityTestRule` and, as a result, cannot access the
    launched activity.


    ## Using Truth Assertion Library in UI Tests


    Although it was developed mostly for unit and integration tests, the `Truth` Assertion
    Library can provide benefits to UI tests as well. We used `JUnit` assertions in
    Chapter [8](#469090_1_En_8_Chapter.xhtml) to assert element presence on the screen
    in the UI automator tests. Let’s take a look at the difference between basic `JUnit`
    and `Truth` assertions.


    ### Table 14-1 Basic JUnit and Truth Assertions Comparison


    | JUnit | Truth |

    | --- | --- |

    | `assertEquals(b, a)` `assertTrue(c)` `assertTrue(d.contains(a))` | `assertThat(a).isEqualTo(b)`
    `assertThat(c).isTrue()` `assertThat(d).contains(a)` |

    | `assertTrue(d.contains(a) && d.contains(b))` `assertTrue(d.contains(a) \|\|
    d.contains(b) \|\| d.contains(c))` | `assertThat(d).containsAllOf(a, b)` `assertThat(d).containsAnyOf(a,
    b, c)` |


    To tell the truth, the `Truth` syntax is more readable, easier to write, and is
    similar to Hamcrest library methods, which we used while writing Espresso tests.
