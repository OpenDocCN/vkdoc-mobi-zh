    \        shareMenuItem.click()\n        viewWithText(toDoTitle).click()\n    }\n\
    }\n```\n\n运行完所有这些测试后，你可能会惊讶地发现它们都失败了。在开始分析 `com.example.android.architecture.blueprints.todoapp.tasks.TasksFragment.java`\
    \ 中的 intent 实现后，我们可以清楚地看到我们的 intent 设置了哪些 action、type 和 extra 参数。那么为什么它们会失败呢？\n\
    \n经过调试并深入分析分享 intent 的启动方式，如下所示：\n\n```java\nstartActivity(Intent.createChooser(\n\
    \    shareIntent,\n    getResources().getText(R.string.share_to)));\n```\n\n我们可以看到，Android\
    \ 的 `Intent.createChooser()` 方法被用来将这个 intent 以自定义标题发送到系统。这个方法将提供的 intent 参数（包含指定的\
    \ action、type 和 extra 参数）包装到另一个具有新 action 的 intent 中，并将我们的 intent 作为其 extra 参数的一部分。图\
    \ 5-4 展示了调试时发生的情况。\n\n![../images/469090_1_En_5_Chapter/469090_1_En_5_Fig4_HTML.jpg](img/469090_1_En_5_Fig4_HTML.jpg)\n\
    \n**图 5-4** 在 `com.example.android.architecture.blueprints.todoapp.tasks.TasksFragment.java`\
    \ 类中实现的 ShareIntent 实例\n\n初始 intent 看起来与我们的预期一致，具有正确的 action（参见高亮的 `mAction` 变量）和正确的\
    \ extra 参数（参见高亮的 `mExtras` 变量）。但是，如果我们将调试断点设置在 `IntentMatchers.hasExtras()` 匹配器中\
    \ intent 比较的位置，我们可以看到图 5-5。\n\n![../images/469090_1_En_5_Chapter/469090_1_En_5_Fig5_HTML.jpg](img/469090_1_En_5_Fig5_HTML.jpg)\n\
    \n**图 5-5** 在测试执行期间点击\"分享\"菜单项时命中断点\n\n此时，很明显初始 intent 已被添加为新的 intent 内部的 extra\
    \ 参数（参见高亮的 `mExtras` 变量），并且 action 也已修改（参见高亮的 `mAction` 变量）。现在，为了使 `stubsShareIntentByAction()`\
    \ 测试通过，我们可以将 action 更改为 `ACTION_CHOOSER`。\n\n*chapter5.StubChooserIntentTest.kt*\
    \ - 类\n\n```kotlin\n@Test\nfun stubsShareIntentByAction() {\n    Intents.intending(hasAction(equalTo(Intent.ACTION_CHOOSER)))\n\
    \        .respondWith(Instrumentation.ActivityResult(Activity.RESULT_OK, null))\n\
    \n    // 添加新的待办事项\n    addFab.click()\n    taskTitleField.type(toDoTitle).closeKeyboard()\n\
    \    taskDescriptionField.type(toDoDescription).closeKeyboard()\n    editDoneFab.click()\n\
    \n    // 验证待办事项列表中显示了包含标题的新待办事项\n    viewWithText(toDoTitle).checkDisplayed()\n\
    \n    // 打开菜单并点击\"分享\"项\n    openContextualActionModeOverflowMenu()\n    shareMenuItem.click()\n\
    \    viewWithText(toDoTitle).click()\n}\n```\n\n以下是使用 `Intent.createChooser()`\
    \ 方法启动在 `chapter5.StubChooserIntentTest.kt` 类中实现的 intent 时，可用的 intent 匹配器示例。\n\
    \n* 基于初始 intent 的 action：\n\n```kotlin\nIntents.intending(hasAction(equalTo(Intent.ACTION_CHOOSER)))\n\
    \    .respondWith(Instrumentation.ActivityResult(Activity.RESULT_OK, null))\n\
    ```\n\n* 基于初始 intent 的 type：\n\n```kotlin\nIntents.intending(hasExtras(hasEntry(Intent.EXTRA_INTENT,\
    \ hasType(\"text/plain\"))))\n    .respondWith(Instrumentation.ActivityResult(Activity.RESULT_OK,\
    \ null))\n```\n\n* 基于 `EXTRA_TITLE` 参数：\n\n```kotlin\nIntents.intending(hasExtras(hasEntry(Intent.EXTRA_TITLE,\
    \ \"Share to\")))\n    .respondWith(Instrumentation.ActivityResult(Activity.RESULT_OK,\
    \ null))\n```\n\n最后，为了使 `chapter5.StubIntentTest.kt` 类中的测试通过，我们通过替换 `com.example.android.architecture.blueprints.todoapp.tasks.TasksFragment.java`\
    \ 类中的第 192 行来更改分享待办事项 intent 的启动方式：\n\n```java\nstartActivity(Intent.createChooser(shareIntent,\
    \ getResources().getText(R.string.share_to)));\n```\n\n替换为：\n\n```java\nstartActivity(shareIntent);\n\
    ```\n\n这样，intent 不会被修改，我们完全依赖系统向用户显示弹出窗口（见图 5-6）。\n\n![../images/469090_1_En_5_Chapter/469090_1_En_5_Fig6_HTML.jpg](img/469090_1_En_5_Fig6_HTML.jpg)\n\
    \n**图 5-6** 使用 `Intent.createChooser()`（左）和不使用 `Intent.createChooser()` 方法（右）发送分享待办事项\
    \ intent\n\n## 练习 14\n**Stubbing 意图**\n\n1.  如图 5-4 所示，在 `TaskFragment.java` 文件的第\
    \ 191 行设置断点，并如图 5-5 所示，在 `IntentMatchers.java` 文件的第 204 行设置断点。以调试模式运行 `StubIntentTest.kt`\
    \ 文件中的测试。当到达断点时，观察 `shareIntent` 和 `intent` 变量。\n\n2.  运行 `StubIntentTest.kt`\
    \ 类中的所有测试并检查结果。测试应该会失败。在 `TaskFragment.java` 文件中，注释掉第 191 行并取消注释第 192 行。再次运行测试并验证它们是否通过。\n\
    \n3.  撤销第 2 步中所做的更改，然后运行 `StubChooserIntentTest.kt` 类中的所有测试。测试应该全部通过。\n```"
- fmt: "# Stubbing Intents with the Result\n\nIn many cases, activity intents started\
    \ by the application being tested have to return the results in the form of the\
    \ image from a gallery or in form of a file from the device’s filesystem. In Android,\
    \ this is achieved by starting an activity using the `startActivityForResult()`\
    \ method from inside the application’s activity or fragment. When an activity\
    \ is started, the user takes some action that generates the result and this result\
    \ is returned to the activity or fragment that initially sent the intent. The\
    \ `onActivityResult()` method from the Android activity class is responsible for\
    \ receiving the result from a previous call to the `startActivityForResult()`\
    \ method.\n\nThe sample TO-DO application contains an example of sending an intent\
    \ with `startActivityForResult()` and handles the result in the `onActivityResult()`\
    \ method implemented in the `com.example.android.architecture.blueprints.todoapp.addedittask.AddEditTaskFragment.java`\
    \ class.\n\n## Starting and Handling Image Intents in `AddEditTaskFragment.java`\n\
    \n```java\npublic void onImageButtonClick() {\n    Intent intent = new Intent();\n\
    \    intent.setType(\"image/*\");\n    intent.setAction(Intent.ACTION_GET_CONTENT);\n\
    \    startActivityForResult(intent, SELECT_PICTURE);\n}\n\npublic void onActivityResult(int\
    \ requestCode, int resultCode, Intent data) {\n    if (resultCode == RESULT_OK)\
    \ {\n        if (requestCode == SELECT_PICTURE) {\n            Uri selectedImageUri\
    \ = data.getData();\n            BitmapDrawable bitmapDrawable =\n           \
    \     ImageUtils.scaleAndSetImage(selectedImageUri, getContext(), 200);\n    \
    \        // Apply the scaled bitmap\n            imageView.setImageDrawable(bitmapDrawable);\n\
    \            // Now change ImageView's dimensions to match the scaled image\n\
    \            ConstraintLayout.LayoutParams params =\n                (ConstraintLayout.LayoutParams)\
    \ imageView.getLayoutParams();\n            params.width = imageView.getWidth();\n\
    \            params.height = imageView.getHeight();\n            imageView.setLayoutParams(params);\n\
    \        }\n    }\n}\n```\n\nYou can observe that the intent from the `onImageButtonClick()`\
    \ method has a preset type and action, which can be used in tests to match the\
    \ intent and stub it.\n\nThe mechanism of starting an activity for a result should\
    \ be clear now. The last thing we have to do is create the result used for stubbing.\
    \ In the previous paragraph, we used the mechanism of returning the result, but\
    \ we were setting it to null mainly because we were not expecting a result in\
    \ the share intent case:\n\n```kotlin\nintending(not(isInternal()))\n    .respondWith(Instrumentation.ActivityResult(Activity.RESULT_OK,\
    \ null))\n```\n\nNow we need to implement the result on our own. We will discuss\
    \ two ways of getting the result with stubbed images from an activity launched\
    \ by the `startActivityForResult()` method:\n\n- Providing the result with the\
    \ image file stored in the test application drawables.\n- Providing the result\
    \ with the image file stored in the test application assets folder.\n\nIn Figure\
    \ [5-7](#469090_1_En_5_Chapter.xhtml#Fig7), you can observe the `todo_image_drawable.png`\
    \ and `todo_image_assets.png` files stored in the test application `res/drawable-xxxhdpi`\
    \ and `assets` folders, respectively.\n\n![../images/469090_1_En_5_Chapter/469090_1_En_5_Fig7_HTML.jpg](images/469090_1_En_5_Chapter/469090_1_En_5_Fig7_HTML.jpg)\n\
    \nFigure 5-7\nThe location of the .png files used in intents stubbing\n\nTo showcase\
    \ the implementation of both approaches, the sample application contains the `chapter5.StubSelectImageIntentTest.kt`\
    \ class with test cases and the `chapetr5.IntentHelper.kt` object that holds methods\
    \ responsible for generating the activity results used in intents stubbing.\n\n\
    ## Test Methods Implemented in the `StubSelectImageIntentTest.kt` Class\n\n```kotlin\n\
    @Test\nfun stubsImageIntentWithDrawable() {\n    val toDoImage =\n        com.example.android.architecture.blueprints.todoapp.mock.test.R.drawable.todo_image\n\
    \    Intents.intending(not(isInternal()))\n        .respondWith(IntentHelper.createImageResultFromDrawable(toDoImage))\n\
    \    // Adding new TO-DO.\n    addFab.click()\n    taskTitleField.type(toDoTitle).closeKeyboard()\n\
    \    taskDescriptionField.type(toDoDescription).closeKeyboard()\n    // Click\
    \ on Get image from gallery button. At this point stubbed image is returned.\n\
    \    addImageButton.click()\n    editDoneFab.click()\n    viewWithText(toDoTitle).click()\n\
    }\n\n@Test\nfun stubsImageIntentWithAsset() {\n    val imageFromAssets = \"todo_image_assets.png\"\
    \n    Intents.intending(not(isInternal()))\n        .respondWith(IntentHelper.createImageResultFromAssets(imageFromAssets))\n\
    \    // Adding new TO-DO.\n    addFab.click()\n    taskTitleField.type(toDoTitle).closeKeyboard()\n\
    \    taskDescriptionField.type(toDoDescription).closeKeyboard()\n    // Click\
    \ on Get image from gallery button. At this point stubbed image is returned.\n\
    \    addImageButton.click()\n    editDoneFab.click()\n    viewWithText(toDoTitle).click()\n\
    }\n```\n\n## `IntentHelper.kt` Objects That Provides Methods Responsible for Generating\
    \ the Activity Results Used in Intents Stubbing\n\n```kotlin\nobject IntentHelper\
    \ {\n    /**\n     *  Creates new activity result from an image stored in test\
    \ application drawable.\n     *  See {@link Activity#setResult} for more information\
    \ about the result.\n     */\n    fun createImageResultFromDrawable(drawable:\
    \ Int): Instrumentation.ActivityResult {\n        val resultIntent = Intent()\n\
    \        val testResources = InstrumentationRegistry.getContext().resources\n\
    \        // Build a stubbed result from drawable image.\n        resultIntent.data\
    \ = Uri.parse(ContentResolver.SCHEME_ANDROID_RESOURCE\n            + \"://${testResources.getResourcePackageName(drawable)}\"\
    \n            + \"/${testResources.getResourceTypeName(drawable)}\"\n        \
    \    + \"/${testResources.getResourceEntryName(drawable)}\")\n        return Instrumentation.ActivityResult(Activity.RESULT_OK,\
    \ resultIntent)\n    }\n\n    /**\n     *  Creates new activity result from an\
    \ image stored in test application assets.\n     *  See {@link Activity#setResult}\
    \ for more information about the result.\n     */\n    fun createImageResultFromAssets(imageName:\
    \ String): Instrumentation.ActivityResult {\n        val resultIntent = Intent()\n\
    \        // Declare variables for test and application context.\n        val testContext\
    \ = InstrumentationRegistry.getContext()\n        val appContext = InstrumentationRegistry.getTargetContext()\n\
    \        val file = File(\"${appContext.cacheDir}/todo_image_temp.png\")\n   \
    \     // Read file from test assets and save it into main application cache todo_image_temp.png.\n\
    \        if (!file.exists()) {\n            try {\n                val inputStream\
    \ = testContext.assets.open(imageName)\n                val fileOutputStream =\
    \ FileOutputStream(file)\n                val size = inputStream.available()\n\
    \                val buffer = ByteArray(size)\n                inputStream.read(buffer)\n\
    \                inputStream.close()\n                fileOutputStream.write(buffer)\n\
    \                fileOutputStream.close()\n            } catch (e: Exception)\
    \ {\n                throw RuntimeException(e)\n            }\n        }\n   \
    \     // Build a stubbed result from temp file.\n        resultIntent.data = Uri.fromFile(file)\n\
    \        return Instrumentation.ActivityResult(Activity.RESULT_OK, resultIntent)\n\
    \    }\n}\n```\n\nThe `stubsImageIntentWithDrawable()` test case stubs the intent\
    \ result with an image located in the test application drawables and `stubsImageIntentWithAsset()`\
    \ does the intent stubbing with an image stored in the test application assets\
    \ folder. Storing all the test images and files inside the test application is\
    \ really convenient because the main application does not store any unnecessary\
    \ test data. In this same way, we can store all the file types that may be used\
    \ in intents stubbing.\n\n# Exercise 15\n\n## Stubbing Intents with the Result\n\
    \n1. Run all the tests from the current section and observe them passing. Replace\
    \ the images in the `res/drawable-xxxhdpi` and assets folders with different ones.\
    \ Run the tests again.\n\n2. Based on the image intent implemented in `AddEditTaskFragment.java`,\
    \ change the `Intents.intending(not(isInternal()))` implementation and replace\
    \ the `not(isInternal())` part with a `hasAction() IntentMatcher`."
