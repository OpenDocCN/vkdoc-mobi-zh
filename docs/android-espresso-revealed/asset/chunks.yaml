    \n## 使用Espresso-Web编写测试\n\n现在我们可以深入探讨Espresso的Web测试。为了更好地理解，请在浏览器中打开主应用资源文件夹中的`web_form.html`和`web_form_response.html`文件，打开浏览器开发者工具，然后开始检查网页。假设您对HTML页面结构有基本了解，并能够使用浏览器开发者工具检查网页UI元素。\n\
    \n使用Espresso-Web，可以通过以下定位器类型在布局中定位UI元素：\n\n*   `CLASS_NAME(\"className\")`\n*\
    \   `CSS_SELECTOR(\"css\")`\n*   `ID(\"id\")`\n*   `LINK_TEXT(\"linkText\")`\n\
    *   `NAME(\"name\")`\n*   `PARTIAL_LINK_TEXT(\"partialLinkText\")`\n*   `TAG_NAME(\"\
    tagName\")`\n*   `XPATH(\"xpath\")`\n\n图[6-6](#469090_1_En_6_Chapter.xhtml#Fig6)展示了`web_form.html`页面在Chrome开发者工具视图中的截图。\n\
    \n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig6_HTML.jpg](images/469090_1_En_6_Chapter/469090_1_En_6_Fig6_HTML.jpg)\n\
    \n**图6-6** Chrome浏览器开发者工具视图\n\n该网页的设计旨在展示Espresso-Web的大部分功能。打开`chapter6.WebViewTest.kt`类以查看已实现的测试用例。以下是`updatesLabelAndOpensNewPage()`测试用例。\n\
    \n*chapter6.* *`WebViewTest.updatesLabelAndOpensNewPage()`* *.*\n\n```\n@Test\n\
    fun updatesLabelAndOpensNewPage() {\n    openDrawer()\n    onView(allOf(withId(R.id.design_menu_item_text),\n\
    \                 withText(R.string.settings_title))).perform(click())\n    onData(instanceOf(PreferenceActivity.Header::class.java))\n\
    \        .inAdapterView(withId(android.R.id.list))\n        .atPosition(3)\n \
    \       .perform(click())\n    onWebView()\n        .forceJavascriptEnabled()\n\
    \        // Find edit text and type text.\n        .withElement(findElement(Locator.ID,\
    \ \"text_input\"))\n        .perform(webKeys(\"Espresso WebView testing\"))\n\
    \        // Find button by id and click.\n        .withElement(findElement(Locator.ID,\
    \ \"submitBtn\"))\n        .perform(webClick())\n        // Find element by id\
    \ and check its text.\n        .withElement(findElement(Locator.ID, \"response\"\
    ))\n        .check(webMatches(getText(), containsString(\"Espresso+WebView+testing\"\
    )))\n}\n```\n\n这里一切都很简单。导航到设置部分并点击`WebView`示例项后，`WebView`通过Android `WebViewClient`显示。Espresso-Web会处理网页加载，因此无需实现额外的等待器。此测试用例中的所有元素都通过其ID定位，这是最理想的情况。\n\
    \n下一个测试用例展示了如何通过CSS属性查找Web元素。这是常见的情况，当元素ID是动态生成且无法依赖它们时使用。\n\n*chapter6.* *`WebViewTest.selectsRadioButtonWithCss()`*\
    \ *.*\n\n```\n@Test\nfun selectsRadioButtonWithCss() {\n    openDrawer()\n   \
