    # The Screen Object Design Pattern in Android UI Tests


    The Screen Object Design Pattern in mobile UI tests is equivalent to the well
    known Page Object Design Pattern in web tests, which is the abstraction layer
    representing an interface that allows its users to operate page elements or validate
    the page state. Since Page Object takes its name from the web page, it is hard
    to name a mobile application View or Screen, which is represented to the users
    as a page. This chapter demonstrates how the Screen Object Design Pattern can
    be applied to Android UI tests using Kotlin. You will learn to create a screen
    object that represents a single Android application activity or fragment (i.e.,
    a screen) and then use these objects or their methods in tests that represent
    real user flows.


    ## Pros and Cons of the Screen Object Design Pattern in Android Test Projects


    When a screen object is defined, it contains a set of methods that are used in
    tests and represent the screen functionality or specific screen state validation.
    From the test execution side, this eliminates the need to write step-by-step test
    instructions in favor of calling those methods.


    ### Pros


    Let’s look at the benefits to this approach:


    - Logical test steps separation

    - More readable tests

    - Easy-to-build user flows

    - Easily maintainable tests

    - Code reuse


    #### Logical Test Steps Separation


    A test step refers to the functional user action that sometimes may consist of
    multiple test interactions with the application being tested. For example, adding
    new TO-DO to the sample TO-DO application consists of three actions: typing title,
    typing a description, and clicking the Done button.


    #### More Readable Tests


    Based on these logical steps, after all the screens are defined, we will end up
    having a set of these steps that have easy-to-understand names. So, even inexperienced
    test engineers can easily understand the test flow’s logic.


    #### Easy-to-Build User Flows


    The user flow here is the set of chained test methods that can represent one screen
    or navigate from one screen to another, thereby replicating the end user behavior.
    They are super useful to understand the end user flow’s test coverage.


    #### Easily Maintainable Tests


    Since all the screen elements declarations are located in one class, it reduces
    the amount of maintenance effort when there is application refactoring. Imagine
    a situation in which the login button is identified by its ID. This button is
    used in multiple tests and is clicked by the Espresso `onView(withId(R.id.loginButton)).perform(click())`
    code. Then the ID of the button changes, which leads to updating all the code
    lines where it is used. Having, let’s say, a `LoginScreen` class that contains
    a Login button declaration and implements the login method makes the change done
    only in one place—the `LoginScreen`.


    #### Code Reuse


    This point is very similar to the previous one, because of the fact that view
    elements are encapsulated in the screen or their methods and usually are not accessible
    by other screens. That means they can be reused in multiple test flows by calling
    screen methods that contain screen elements.


    ### Cons


    Here are some cons to using the Screen Object Design Pattern:


    - There is no clear way to handle views used across different screens

    - The same action may open different screens depending on the navigation stack

    - Too detailed screen methods lead to long tests


    #### Handling Views Across Different Screens


    As mentioned, there is no clear way to handle views or view groups used across
    different screens. Android mobile applications have shared and reusable components
    across many application screens and this impacts and challenges this test design
    pattern. Here we are talking about such views as menu drawers or tab bars. Figure
    11-1 shows two of the TO-DO application screenshots.


    ![../images/469090_1_En_11_Chapter/469090_1_En_11_Fig1_HTML.jpg](images/469090_1_En_11_Chapter/469090_1_En_11_Fig1_HTML.jpg)


    **Figure 11-1** Menu drawer opened from the TO-DOs list screen (left side) and
    from the Statistics screen (right side)


    Both of them have the same menu drawer component. Now where should this menu drawer
    component be declared? Should it belong to each screen duplicating the test source
    code? We will see later how this case can be handled.


    #### Same Action Opening Different Screens


    Recall that the same action may open different screens depending on the navigation
    stack. In Android applications, depending on the activity navigation stack or
    on the application logic, the same action on one screen may have a different end
    result based on the navigation flow prior to the current application state. A
    good example of such a case is the TO-DO application Back or Up button click navigation
    from the Settings section. Let’s try two flows:


    1. Open the Settings section from the TO-DO list screen. From the Settings screen,
    click the Up button.

    2. Open the Settings section from the Statistics screen. From the Settings screen,
    click the Up button.


    As you can see in Figures 11-2 and 11-3, the Up button is used in both cases,
    but the end result is different. In the first case, we navigate back to the TO-DO
    list screen. In the second case, we navigate back to the Statistics screen.


    ![../images/469090_1_En_11_Chapter/469090_1_En_11_Fig2_HTML.jpg](images/469090_1_En_11_Chapter/469090_1_En_11_Fig2_HTML.jpg)


    **Figure 11-2** Open Settings and click Up from TO-DO list screen


    How do we deal with such a case? We will see later in the chapter one possible
    solution.


    ![../images/469090_1_En_11_Chapter/469090_1_En_11_Fig3_HTML.jpg](images/469090_1_En_11_Chapter/469090_1_En_11_Fig3_HTML.jpg)


    **Figure 11-3** Open Settings and click Up from the Statistics screen'
