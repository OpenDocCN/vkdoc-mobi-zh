- fmt: '# Creating Custom RecyclerView Actions


    The `RecyclerViewActions` class provides a limited amount of actions that can
    be used inside a recycler view or recycler view item. For example, clicking on
    the whole TO-DO item in the TO-DO recycler view is useful and can be used to open
    item details. But what if we need to click on the checkbox to mark a TO-DO item
    as done?


    Of course, we can do this based on position. As an engineer who owns the test
    data, I have the full control over each TO-DO name and I can make all the names
    unique. This enables me to identify each TO-DO item based on its name and then
    narrow down the focus to the specific element inside the TO-DO item. In our case,
    we want to click on the checkbox. Take a look at how this custom recycler view
    action may look on the `clickTodoCheckBoxWithTitle()` method from the `CustomRecyclerViewActions.java`
    class.


    *`chapter2.customactions.CustomRecyclerViewActions.java`*


    ```

    class ClickTodoCheckBoxWithTitleViewAction implements CustomRecyclerViewActions
    {

    private String toDoTitle;

    public ClickTodoCheckBoxWithTitleViewAction(String toDoTitle) {

    this.toDoTitle = toDoTitle;

    }

    public static ViewAction clickTodoCheckBoxWithTitle(final String toDoTitle) {

    return actionWithAssertions(new ClickTodoCheckBoxWithTitleViewAction(toDoTitle));

    }

    @Override

    public Matcher getConstraints() {

    return allOf(isAssignableFrom(RecyclerView.class), isDisplayed());

    }

    @Override

    public String getDescription() {

    return "Completes the task by clicking its checkbox.";

    }

    @Override

    public void perform(UiController uiController, View view) {

    try {

    RecyclerView recyclerView = (RecyclerView) view;

    RecyclerView.Adapter adapter = recyclerView.getAdapter();

    if (adapter instanceof TasksFragment.TasksAdapter) {

    int itemCount = adapter.getItemCount();

    for (int i = 0; i < itemCount; i++) {

    View taskItemView = recyclerView.getLayoutManager().findViewByPosition(i);

    TextView textView = taskItemView.findViewById(R.id.title);

    if (textView != null && textView.getText() != null) {

    if (textView.getText().toString().equals(toDoTitle)) {

    CheckBox completeCheckBox = taskItemView.findViewById(R.id.todo_complete);

    completeCheckBox.performClick();

    }

    } else {

    throw new RuntimeException(

    "Unable to find view with ID R.id.todo_title as child of TO-DO item at position
    " + i);

    }

    }

    }

    uiController.loopMainThreadForAtLeast(ViewConfiguration.getTapTimeout());

    } catch (RuntimeException e) {

    throw new PerformException.Builder().withActionDescription(this.getDescription())

    .withViewDescription(HumanReadables.describe(view)).withCause(e).build();

    }

    }

    }

    ```


    The `clickTodoCheckBoxWithTitle()` view action returns a new `ClickTodoCheckBoxWithTitleViewAction`
    class where the `getConstraints()` method filters out views that are assignable
    from the `RecyclerView.class` and are visible on the screen:


    ```

    public Matcher getConstraints() {

    return allOf(isAssignableFrom(RecyclerView.class), isDisplayed())

    }

    ```


    The `getDescription()` method describes our `ViewAction`. This is what you will
    see if the test fails in the Espresso exception trace.


    ```

    public String getDescription() {

    return "Completes the task by clicking its checkbox.";

    }

    ```


    The `perform()` method is doing the heavy work here—we already can rely on the
    fact that our view is `RecyclerView`. Then we get the adapter from it and ensure
    that the adapter is an instance of the `TasksFragment.TasksAdapter` class. After
    that, we iterate through each item inside the adapter and fetch an item title
    from `TextView` with an ID of `R.id.title`. If the item''s title is equal to the
    title from `TaskItem`, we search for the `CheckBox` element with a `R.id.todo_complete`
    ID and call a click action on it. In the end, we loop the main thread for a short
    period of time to let the application handle our tap event. If a TO-DO with the
    expected title doesn''t exist in the list, it will throw an exception with the
    help of Espresso''s `PerformException` class.


    *`chapter2.customactions.CustomRecyclerViewActions.java`*


    ```

    public void perform(UiController uiController, View view) {

    try {

    RecyclerView recyclerView = (RecyclerView) view;

    RecyclerView.Adapter adapter = recyclerView.getAdapter();

    if (adapter instanceof TasksFragment.TasksAdapter) {

    int itemCount = adapter.getItemCount();

    for (int i = 0; i < itemCount; i++) {

    View taskItemView = recyclerView.getLayoutManager().findViewByPosition(i);

    TextView textView = taskItemView.findViewById(R.id.title);

    if (textView != null && textView.getText() != null) {

    if (textView.getText().toString().equals(toDoTitle)) {

    CheckBox completeCheckBox = taskItemView.findViewById(R.id.todo_complete);

    completeCheckBox.performClick();

    }

    } else {

    throw new RuntimeException(

    "Unable to find TO-DO item with title " + toDoTitle);

    }

    }

    }

    uiController.loopMainThreadForAtLeast(ViewConfiguration.getTapTimeout());

    } catch (RuntimeException e) {

    throw new PerformException.Builder().withActionDescription(this.getDescription())

    .withViewDescription(HumanReadables.describe(view)).withCause(e).build();

    }

    }

