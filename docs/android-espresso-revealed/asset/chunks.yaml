    \ view with specified `R.id` has a content\ndescription that contains the `\"\
    YYZZ\"` string\nanywhere:\n\n```\nonView(withId(R.id.viewId)).check(matches(withContentDescription(containsString(\"\
    YYZZ\"))));\n```\n\nWe can match a view with text that’s equal to the specified\
    \ string,\nignoring case:\n\n```\nonView(withText(equalToIgnoringCase(\"xxYY\"\
    ))).perform(click());\n```\n\nWe can match a view with text that’s equal to the\
    \ specified text when\nwhitespace differences are (mostly) ignored:\n\n```\nonView(withText(equalToIgnoringWhiteSpace(\"\
    XX YY ZZ\"))).perform(click());\n```\n\nWe can assert that the text of a particular\
    \ view with specified `R.id` does not contain\nthe `\"YYZZ\"`\nstring:\n\n```\n\
    onView(withId(R.id.viewId)).check(matches(withText(not(containsString(\"YYZZ\"\
    )))));\n```\n\nAdding the `allOf()` or `anyOf()` hamcrest core\nmatchers gives\
    \ us\neven more power. We can assert that the text of a particular view with a\n\
    specified `R.id`\ndoesn’t start with the `\"ZZ\"` string and\ncontains the `\"\
    YYZZ\"` string\nanywhere:\n\n```\nonView(withId(R.id.viewId))\n.check(matches(allOf(withText(not(startsWith(\"\
    ZZ\"))),\nwithText(containsString(\"YYZZ\")))));\n```\n\nWe can also assert that\
    \ the text of a particular view with a specified\n`R.id` ends with\nthe `\"ZZ\"\
    ` string\nor contains the `\"YYZZ\"` string\nanywhere:\n\n```\nonView(withId(R.id.viewId))\n\
    .check(matches(anyOf(withText(endsWith(\"ZZ\")),\nwithText(containsString(\"YYZZ\"\
    )))));\n```\n\nTo get a full overview of the hamcrest matchers, refer to their\n\
    official documentation at [`http://hamcrest.org/JavaHamcrest`](http://hamcrest.org/JavaHamcrest)\
    \ .\nSo, now we have an understanding of ViewMatchers. We also understand\nthat\
    \ they play one of the most important roles in the Espresso testing\nframework.\
    \ Their task is to locate the matched view inside the\napplication layout or fail\
    \ if the match did not happen.\n\nEspresso’s ViewInteraction Class\nIn the previous\
    \ examples, we were doing new `perform()` and `check()` operations on\nthe views.\
    \ These methods are representatives of the `ViewInteraction`\nclass .\nInteractions\
    \ act like glue between the ViewMatcher and the ViewAssertion\nor ViewAction.\n\
    \nEach interaction is tied to the view that was previously located by the\nViewMatcher.\
    \ You probably guessed based on the method names that the\n`perform()`\nmethod\
    \  takes an\naction and the `check()` method  asserts some condition\nprovided\
    \ as a parameter. There is one more ViewInteraction we haven’t\nused yet⎯`inRoot()`.\n\
    \n*   `perform()`⎯Receives a\n    view action or a set of view actions as a parameter\
    \ and performs them on\n    the view selected by the current ViewMatcher.\n\n\
    *   `check()`⎯Receives a\n    view action or a set of view actions as a parameter\
    \ and checks it on the\n    the view selected by the current ViewMatcher.\n\n\
    So, what about the `inRoot()` method  then? With this view\ninteraction, we are\
    \ targeting the multi-window states in our\napplication. For example, the AutoComplete\
    \ window layout that is drawn\nover the test application. In this case, we should\
    \ explicitly indicate\nwhich window Espresso should operate on by matching the\
    \ proper window\nwith the `RootMatcher`.\n\n*   `inRoot()`⎯Receives a\n    root\
    \ matcher as a parameter and sets the scope of the view interaction\n    to the\
    \ root view, identified by the root matcher.\n\nNote\nEspresso performs all the\
    \ actions on the UI thread, which means that\nit will first wait for the application\
    \ UI to render and only after that\nperform the required steps. This ensures that\
    \ the application UI\nelements are fully loaded and displayed on the screen, which\
    \ increases\ntest reliability and robustness. It will also eliminate the need\
    \ of\nhaving waits and sleeps in the tests.\n\nIn the following section, you will\
    \ see\nexamples of how `perform()` and `check()` view\ninteractions can be used.\n\
    \nEspresso’s ViewActions Class\n\nAs you may guess, a ViewAction is\nresponsible\
    \ for performing actions on a required view. The target is to\nreplicate the end\
    \ user behavior by interacting with the UI elements on\nthe screen. Here are examples\
    \ of the type of actions we can perform (see\nFigure [1-11](#469090_1_En_1_Chapter.xhtml#Fig11)):\n\
    \n*   `clearText()`\n    ⎯Returns an action that clears text on the view. The\
    \ view must be\n    displayed on the screen.\n\n*   `click()`⎯Returns an\n   \
    \ action that clicks the view. At least 90% of the view must be displayed\n  \
    \  on the screen.\n\n*   `swipeLeft()`\n    ⎯Returns an action that performs a\
    \ swipe right-to-left across the\n    vertical center of the view. The swipe doesn’t\
    \ start at the very edge of\n    the view, but is a bit offset, since swiping\
    \ from the exact edge may\n    cause unexpected behavior (e.g., it may open a\
    \ navigation drawer). Other\n    swipe actions defined by Espresso are `swipeRight()`,\
    \ `swipeDown()`, and\n    `swipeUp()`. For\n    all the swipe actions, at least\
    \ 90% of the views must be displayed\n    onscreen.\n\n*   `closeSoftKeyboard()`\n\
    \    ⎯Returns an action that closes the soft keyboard. If the keyboard\n    is\
    \ already closed, it is non-operational.\n\n*   `pressImeActionButton()`\n   \
    \ ⎯Returns an action that presses the current action button (Next,\n    Done,\
    \ Search, etc.) on the IME (Input Method Editor).\n\n*   `pressBack()`\n    ⎯Returns\
    \ an action that clicks the hardware back button.\n\n*   `pressMenuKey()`\n  \
    \  ⎯Returns an action that presses the hardware menu key. Most\n    modern devices\
    \ on the market no longer support the hardware menu key, so\n    this method is\
    \ rarely used."
