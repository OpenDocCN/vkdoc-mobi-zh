    \ is particularly useful when the activity launching the intent expects data to\
    \ be returned (and especially when the destination activity is external). In this\
    \ case, the test author can call:\n\n```java\nintending(intentMatcher).thenRespond(myResponse)\n\
    ```\n\nand validate that the launching activity handles the result correctly.\n\
    \n> **Note:** The third-party application destination activity will not be launched\
    \ in this code sample.\n\n## Stubbing Intents Without a Result\n\nThe first use\
    \ case with intent stubbing can isolate our application from any action that can\
    \ lead to the state when a third-party application is launched. To achieve this,\
    \ the Espresso `intending()` mechanism enables stubbing intents that are not internal,\
    \ i.e., that do not belong to our application. Here is how it can be implemented\
    \ in the test class `@Before` method.\n\n*chapter5.StubAllIntentsTest.kt*\n\n\
    ```kotlin\n@Before\nfun stubAllExternalIntents() {\n    // By default Espresso\
    \ Intents does not stub any Intents. Stubbing needs to be setup before\n    //\
    \ every test run. In this case all external Intents will be blocked.\n    intending(not(isInternal()))\n\
    \        .respondWith(Instrumentation.ActivityResult(Activity.RESULT_OK, null))\n\
    }\n```\n\n> **Note:** The method annotated with the `@Before` annotation will\
    \ be executed for every test case before it’s run.\n\nYou can observe two new\
    \ methods in this code example:\n\n* `isInternal()` — Intent matcher that matches\
    \ an intent if its package is the same as the target package for the instrumentation\
    \ test.\n* `Instrumentation.ActivityResult(Activity.RESULT_OK, null)` — The `ActivityResult`\
    \ class that allows us to create a new `ActivityResult`, which will be propagated\
    \ back to the original activity with the specified result code. See the Android\
    \ `Instrumentation.java` class and the `Activity.setResult()` method for more\
    \ details.\n\nWe are already familiar with hamcrest matchers from Chapters [1](#469090_1_En_1_Chapter.xhtml)\
    \ and [2](#469090_1_En_2_Chapter.xhtml). `IntentMatchers` have a similar functionality.\
    \ Along with intent matchers, Espresso provides `BundleMatchers`, `ComponentNameMatchers`,\
    \ and `UriMatchers`, which are used together with `IntentMatchers`. Here is a\
    \ brief overview of all of them.\n\n**`IntentMatchers`**:\n* `anyIntent()` — Matches\
    \ any intent.\n* `hasAction()` — Matches an intent by intent action. The most\
    \ common example is `Intent.ACTION_CALL` to perform the phone call action or `Intent.ACTION_SEND`\
    \ to send an email or SMS. For more action types, refer to the Android `Intent.java`\
    \ class.\n* `hasCategories()` — Matches an intent category, which is the string\
    \ containing additional information about the kind of component that should handle\
    \ the intent. For example, the string value for `CATEGORY_LAUNCHER` is `android.intent.category.LAUNCHER`\
    \ and is used to specify the initial application activity.\n* `hasComponent()`\
    \ — Can match an intent by class name, package name, or short class name. Uses\
