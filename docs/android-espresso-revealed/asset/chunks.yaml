    # 编写自定义匹配器


    Espresso 匹配器是强大的工具，有助于在应用程序布局中定位或验证元素。Espresso 视图匹配器可能无法完全满足您的用例或需求。在这种情况下，您可以创建自定义匹配器。


    ## 为简单 UI 元素创建自定义匹配器


    我们将从简单的匹配器作为介绍开始。以下用例将用作示例：


    * 添加一个没有标题和描述的新待办事项，结果，待办事项标题字段的提示颜色应变为红色。


    在这种情况下，`BoundedMatcher` 是理想的选择，因为它返回 `Matcher<View>` 类型，但仅对 `EditText` 类型的元素执行操作。请参考
    `CustomViewMatchers.java` 类，该类包含 `withHintColor()` 匹配器实现，该实现匹配 `EditText` 提示的颜色。


    *`chapter2.custommatchers.CustomViewMatchers.java`*


    ```

    public static Matcher withHintColor(final int expectedColor) {

    return new BoundedMatcher(EditText.class) {

    @Override

    protected boolean matchesSafely(EditText editText) {

    return expectedColor == editText.getCurrentHintTextColor();

    }

    @Override

    public void describeTo(Description description) {

    description.appendText("待办事项标题: " + expectedColor);

    }

    };

    }

    ```

    '
- fmt: 'Here, `BoundedMatcher` enables us to match the `EditText` view that''s the
    subtype of the Android `View` type and return to the end object of the `Matcher<View>`
    type. When the `EditText` element is identified on the screen, its hint color
    is compared to the expected color, returning a `true` or `false` value. Whenever
    a `true` value is returned, it means that `EditText` with the expected hint color
    was found.


    Here is how the usage of the `withHintColor()` matcher looks in a real test case
    (refer to the `CustomViewMatchers.java` class for more details).


    *chapter2.custommatchers.CustomViewMatchersTest.java.*


    ```

    @Test

    public void addsNewToDoError() {

    // adding new TO-DO

    onView(withId(R.id.fab_add_task)).perform(click());

    onView(withId(R.id.fab_edit_task_done)).perform(click());

    onView(withId(R.id.add_task_title))

    .check(matches(hasErrorText("Title cannot be empty!")))

    .check(matches(withHintColor(Color.RED)));

    }

    ```


    ## Implementing Custom RecyclerView Matchers


    From my point of view, the `RecyclerView` matchers are the most hidden part in
    Espresso. The Android documentation does not explain how to implement them but,
    based on the past examples from this book, you may guess that the `BoundedMatcher`
    class can be used to create them.


    We will refer to our sample application and create the `RecyclerView` matcher
    that matches the TO-DO item in the TO-DO list based on its title. Again, the title
    is assumed to be unique since we have the full control over the test data.


    *chapter2.custommatchers.RecyclerViewMatchers.java.*


    ```

    public static Matcher withTitle(final String taskTitle) {

    Checks.checkNotNull(taskTitle);

    return new BoundedMatcher(

    TasksAdapter.ViewHolder.class) {

    @Override

    protected boolean matchesSafely(TasksAdapter.ViewHolder holder) {

    final String holderTaskTitle = holder.getHolderTask().getTitle();

    return taskTitle.equals(holderTaskTitle);

    }

    @Override

    public void describeTo(Description description) {

    description.appendText("with task title: " + taskTitle);

    }

    };

    }

    ```


    Here it is important to understand the application under test and know which `ViewHolder`
    to use. In the sample, we put `TasksFragment.TasksAdapter.ViewHolder` as the second
    parameter into `BoundedMatcher`. Whenever our matcher identifies elements on the
    screen with the type, we retrieve the title from the holder and compare it to
    the title we provided as a matcher parameter.


    *chapter2.custommatchers.RecyclerViewMatchers.java.*


    ```

    public static Matcher withTask(final TaskItem taskItem) {

    Checks.checkNotNull(taskItem);

    return new BoundedMatcher(

    TasksAdapter.ViewHolder.class) {

    @Override

    protected boolean matchesSafely(TasksAdapter.ViewHolder holder) {

    final String holderTaskTitle = holder.getHolderTask().getTitle();

    final String holderTaskDesc = holder.getHolderTask().getDescription();

    return taskItem.getTitle().equals(holderTaskTitle)

    && taskItem.getDescription().equals(holderTaskDesc);

    }

    @Override

    public void describeTo(Description description) {

    description.appendText("task with title: " + taskItem.getTitle()

    + " and description: " + taskItem.getDescription());

    }

    };

    }

    public static Matcher withTaskTitleFromTextView(final String taskTitle) {

    Checks.checkNotNull(taskTitle);

    return new BoundedMatcher(

    TasksAdapter.ViewHolder.class) {

    @Override

    protected boolean matchesSafely(TasksAdapter.ViewHolder holder) {

    final TextView titleTextView = (TextView) holder.itemView.findViewById(R.id.title);

    return taskTitle.equals(titleTextView.getText().toString());

    }

    @Override

    public void describeTo(Description description) {

    description.appendText("with task title: " + taskTitle);

    }

    };

    }

    }

    ```


    ## Handling Errors with a Custom FailureHandler


    The Espresso testing framework is very flexible and customizable, and error handling
    is no exception. Espresso provides an interface called `FailureHandler` that can
    be implemented in a custom failure handler to manage failures that happen during
    test execution.


    The reason to implement a custom `FailureHandler` may be to reduce the exception
    text or to save on screenshots or other application data, such as saving device
    dumps, etc. As an example, the sample TO-DO application codebase contains a `CustomFailureHandler`.


    *chapter2.customfailurehandler.CustomFailureHandler.java.*


    ```

    public class CustomFailureHandler implements FailureHandler{

    private final FailureHandler delegate;

    public CustomFailureHandler(Context targetContext) {

    delegate = new DefaultFailureHandler(targetContext);

    }

    @Override

    public void handle(Throwable error, Matcher viewMatcher) {

    try {

    delegate.handle(error, viewMatcher);

    } catch (NoMatchingViewException e) {

    // For example save device dump, take screenshot, etc.

    throw e;

    }

    }

    }

    ```


    You can see the `try...catch` block in the `handle()` method. That''s where we
    catch the error and can do whatever we want with it. Usually the exception is
    propagated further after all needed steps are complete.


    To let Espresso intercept each test failure with a `CustomFailureHandler`, it
    is important to register it inside the test class or inside the base test class,
    as shown in the `BaseTest.java` class:


    ```

    @Before

    public void setUp() throws Exception {

    setFailureHandler(new CustomFailureHandler(

    InstrumentationRegistry.getInstrumentation().getTargetContext()));

    }

    ```


    If you register it in a base test class, don''t forget to call `super.setUp()`
    from inside your test class:


    ```

    @Before

    public void setUp() throws Exception {

    super.setUp();

    }

    ```


