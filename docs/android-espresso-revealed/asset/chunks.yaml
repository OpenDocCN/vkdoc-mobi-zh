    和 `BOTTOM_RIGHT`。`Swipe.FAST` 表示“快速”滑动应持续的时间长度，以毫秒为单位。目前，`Swipe` 有 `FAST`（100
    毫秒）和 `SLOW`（1500 毫秒）两种滑动速度。`Press.FINGER` 返回一个大小为 16x16 毫米的触摸目标。其他按压选项包括 `PINPOINT`（1x1
    毫米）和 `THUMB`（25x25 毫米）按压区域。`-EDGE_FUZZ_FACTOR` 值根据视图长度定义从边缘到滑动操作起始点的距离。当从精确边缘滑动可能导致不良行为（例如打开导航抽屉）时，这很有用。


    其他三个滑动操作以类似方式执行，仅在 `from` 和 `to` 坐标上有所不同。


    在某些情况下，这四个滑动操作可能不够用。你可能需要缓慢向左或向右滑动，或者从屏幕中间向上或向下滑动。在这种情况下，你可以创建自己的自定义滑动操作。


    为了实现我们自己的操作，我们将遵循 Espresso 滑动操作（如 `swipeDown()`）的实现方式。首先，我们添加自己的 `CustomSwipe`
