- fmt: "# Detailed Screen Methods Lead to Long Tests\n\nSometimes test engineers tend\
    \ to be too detailed when creating screen classes and their methods. They try\
    \ to wrap almost each single action or verification into a method, dramatically\
    \ increasing the number of steps inside each test. We should try to always find\
    \ a golden middle—on the one side having the proper logical split without making\
    \ screen methods too small and detailed; and on the another side we should not\
    \ put a lot of screen actions or verifications into a small number of methods.\n\
    \n## Applying the Screen Object Design Pattern\n\nIt is a time to switch to the\
    \ example. First, we will look at how a single TO-DO application screen can be\
    \ implemented, including its visual representation. Figure [11-4](#469090_1_En_11_Chapter.xhtml#Fig4)\
    \ breaks down the New TO-DO screen into functional sections.\n\n![../images/469090_1_En_11_Chapter/469090_1_En_11_Fig4_HTML.jpg](images/469090_1_En_11_Chapter/469090_1_En_11_Fig4_HTML.jpg)\n\
    \n**Figure 11-4** The New TO-DO screen broken into functional screen object elements\n\
    \nAs Figure [11-4](#469090_1_En_11_Chapter.xhtml#Fig4) shows, the New TO-DO screen\
    \ contains six functional or actionable elements. Each of these elements represents\
    \ a single method in the `AddEditToDoScreen`. For example, the `typeToDoTitle`\
    \ method will look the following way:\n\n```kotlin\nclass AddEditToDoScreen {\n\
    \    private val addToDoTitleEditText = onView(withId(R.id.add_task_title))\n\
    \    fun typeToDoTitle(title: String): AddEditToDoScreen {\n        addToDoTitleEditText.perform(typeText(title),\
    \ closeSoftKeyboard())\n        return this\n    }\n}\n```\n\nPerforming an action\
    \ on elements two and three will keep users on the same screen; therefore, their\
    \ methods will return the same `AddEditToDoScreen` instance.\n\nIn a similar way,\
    \ methods for other elements are created. The rest of them redirect the user to\
    \ different application screens. This is the example of a method that clicks the\
    \ Done floating action button that returns a `ToDoListScreen` instance:\n\n```kotlin\n\
    class AddEditToDoScreen {\n    private val doneFabButton = onView(withId(R.id.fab_edit_task_done))\n\
    \    fun clickDoneFabButton(): ToDoListScreen {\n        doneFabButton.perform(click())\n\
    \        return ToDoListScreen()\n    }\n}\n```\n\nHere, the `clickDoneFabButton()`\
    \ method returns an instance of `ToDoListScreen` according to the application\
    \ flow. We should also include verification methods that validate the screen in\
    \ a specific state and system back action.\n\nAnd one more thing—single screen\
    \ actions may be too detailed for the test step and logically may be grouped into\
    \ a set of screen actions. A good example is when adding new TO-DO flows that\
    \ consist of three actions: typing a title, typing a description, and clicking\
    \ a floating action button. Let’s look at the final `ToDoListScreen` implementation\
    \ state.\n\n`chapter11.screens.AddEditToDoScreen.kt`\n\n```kotlin\nclass AddEditToDoScreen\
    \ : BaseScreen() {\n    private val addToDoDescriptionEditText = onView(withId(R.id.add_task_description))\n\
    \    private val addToDoTitleEditText = onView(withId(R.id.add_task_title))\n\
    \    private val doneFabButton = onView(withId(R.id.fab_edit_task_done))\n   \
    \ private val emptyToDoSnackbar = onView(withText(R.string.empty_task_message))\n\
    \    private val upButton = onView(allOf(\n        instanceOf(ImageButton::class.java),\n\
    \        withParent(withId(R.id.toolbar))))\n\n    fun typeToDoTitle(title: String):\
    \ AddEditToDoScreen {\n        addToDoTitleEditText.perform(typeText(title), closeSoftKeyboard())\n\
    \        return this\n    }\n\n    fun typeToDoDescription(description: String):\
    \ AddEditToDoScreen {\n        addToDoDescriptionEditText.perform(typeText(description),\
    \ closeSoftKeyboard())\n        return this\n    }\n\n    /**\n     * Represents\
    \ adding new to-do flow\n     */\n    fun addNewToDo(taskItem: TodoItem): ToDoListScreen\
    \ {\n        typeToDoTitle(taskItem.title)\n        typeToDoDescription(taskItem.description)\n\
    \        clickDoneFabButton()\n        return ToDoListScreen()\n    }\n\n    fun\
    \ addEmptyToDo(): AddEditToDoScreen {\n        clickDoneFabButton()\n        return\
    \ this\n    }\n\n    fun clickDoneFabButton(): ToDoListScreen {\n        doneFabButton.perform(click())\n\
    \        return ToDoListScreen()\n    }\n\n    fun clickUpButton(): ToDoListScreen\
    \ {\n        hamburgerUpButton.perform(click())\n        return ToDoListScreen()\n\
    \    }\n\n    fun clickBackButton(): ToDoListScreen {\n        Espresso.pressBack()\n\
    \        return ToDoListScreen()\n    }\n\n    fun verifySnackbarForEmptyToDo():\
    \ AddEditToDoScreen {\n        emptyToDoSnackbar.check(matches(withEffectiveVisibility(Visibility.VISIBLE)))\n\
    \        return this\n    }\n}\n```\n\nIn this code snippet, you can see that\
    \ the `AddEditToDoScreen` class extends the `BaseScreen` class, which can contain\
    \ common screen elements like the Up button `ViewInteraction` in our case.\n\n\
    In this same way, other applications screens can be created. When this is done,\
    \ we can start writing UI tests. To tell the truth, it now becomes really easy—test\
    \ steps are chained based on the logical functional flows.\n\n`chapter11.tests.AddToDoTest.kt`\n\
    \n```kotlin\n/**\n * Validates TO-DOs creation flows using Screen Object Pattern.\n\
    \ */\nclass AddToDoTest : BaseTest() {\n\n    @Test\n    fun addsNewTodo() {\n\
    \        ToDoListScreen()\n            .clickAddFabButton()\n            .addNewToDo(todoItem)\n\
    \            .verifyToDoIsDisplayed(todoItem)\n    }\n\n    @Test\n    fun addsNewTodoWithoutDescription()\
    \ {\n        ToDoListScreen()\n            .clickAddFabButton()\n            .typeToDoTitle(todoItem.title)\n\
    \            .clickDoneFabButton()\n            .verifyToDoIsDisplayed(todoItem)\n\
    \    }\n\n    @Test\n    fun triesToAddEmptyToDo() {\n        ToDoListScreen()\n\
    \            .clickAddFabButton()\n            .addEmptyToDo()\n            .verifySnackbarForEmptyToDo()\n\
    \    }\n\n    companion object {\n        private var todoItem = TodoItem()\n\n\
    \        @Before\n        fun setUp() {\n            todoItem = TodoItem.new\n\
    \        }\n    }\n}\n```\n\nReturning to the advantages of the Screen Object\
    \ Design Pattern, we can see that all of them are covered:\n\n- **Logical test\
    \ steps separation**—Achieved by splitting actions per screen and creating functional\
    \ flows like the `addNewToDo(...)` method.\n- **More readable tests**—With the\
    \ current implementation, it is clear from the test where we start and what exact\
    \ actions are performed.\n- **Easy-to-build user flows**—Having a set of screens\
    \ returning their public results makes writing test cases easy.\n- **Easily maintainable\
    \ tests**—Achieved by isolating element declaration inside the screen class. So,\
    \ there is no need to update them in multiple places after the application is\
    \ refactored.\n- **Code reuse**—As you can see, the screen methods can be reused\
    \ by any test without the need to replicate the same or similar code.\n\nWe also\
    \ covered one negative point:\n\n- **Too detailed screen methods lead to long\
    \ tests**—This issue should be solved by creating functional flows as was shown\
    \ by the `addNewToDo(...)` method. Instead of writing many steps belonging to\
    \ the same screen, we group them into one method. Keep in mind that functional\
    \ flows ideally should be isolated per screen; otherwise, it will be hard to understand\
    \ test steps or analyze test failures."
