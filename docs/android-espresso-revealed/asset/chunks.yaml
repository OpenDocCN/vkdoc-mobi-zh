    \ different purposes. For example, later in the book, we will\n    talk about\
    \ activity or `TestWatcher`\n    rules.\n\nRefer to the `BaseTest.java`\nclass\
    \  to see how\nsome of the described annotations are used:\n\n```\n@RunWith(AndroidJUnit4.class)\n\
    public class BaseTest {\n@Before\npublic void setUp() throws Exception {\nsetFailureHandler(new\
    \ CustomFailureHandler(\nInstrumentationRegistry.getInstrumentation().getTargetContext()));\n\
    }\n@Rule\npublic ActivityTestRule menuActivityTestRule =\nnew ActivityTestRule(TasksActivity.class);\n\
    }\n```"
