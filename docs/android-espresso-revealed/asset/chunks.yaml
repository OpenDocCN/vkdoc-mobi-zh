- fmt: '# Combining Espresso and UI Automator in Tests


    At this point it should be clear enough how to use the UI Automator test framework
    as a standalone test automation tool and it is a time to reveal the full power
    of Android test automation using both Espresso and UI Automator inside a single
    test. To demonstrate this, we will automate the use case where the TO-DO application
    sends the notification, which, after clicked, opens `TasksActivity` (i.e., tasks
    list screen) to the user. The first part of the test is automated using Espresso,
    starting from the moment when we click Notification, the UI Automator will be
    used. At the end, the Espresso code will be used again to verify the state of
    the application.


    Let’s take a look at the test itself.


    `chapter8.*.EspressoUiAutomatorTest.*clickNotificationOpenMainPage()*.*`


    ```

    private val instrumentation = InstrumentationRegistry.getInstrumentation()

    private val uiDevice: UiDevice = UiDevice.getInstance(instrumentation)

    private val twoSeconds = 2000L

    @get:Rule

    var activityTestRule = ActivityTestRule(TasksActivity::class.java)

    /**

    * Clicks notification triggered by application under test and

    * verifies that TasksActivity is shown.

    */

    @Test

    fun clickNotificationOpensTasksActivity() {

    openDrawer()

    onView(allOf(withId(R.id.design_menu_item_text),

    withText(R.string.settings_title))).perform(click())

    onData(CoreMatchers.instanceOf(PreferenceActivity.Header::class.java))

    .inAdapterView(withId(android.R.id.list))

    .atPosition(1)

    .onChildView(withId(android.R.id.title))

    .check(matches(withText("Notifications")))

    .perform(click())

    // Click on Send notification item

    onData(withKey("notifications_send"))

    .inAdapterView(allOf(

    withId(android.R.id.list),

    withParent(withId(android.R.id.list_container))))

    .check(matches(isDisplayed()))

    .perform(click())

    // Perform UI Automator actions.

    uiDevice.openNotification()

    // Click notification by text and wait for application to appear.

    uiDevice.findObject(By.text("My notification"))

    .clickAndWait(Until.newWindow(), twoSeconds)

    // Verify application layout with Espresso

    onView(withId(R.id.noTasksIcon)).check(matches(isDisplayed()))

    }

    ```


    If the notification is delayed, we can wait for it using the `wait()` method.
    This case is covered by the second test method in the same class. The TO-DO application
    sends a notification with a small delay and the test handles it by waiting for
    the notification object.


    `chapter8.*.EspressoUiAutomatorTest*: Clicking on Delayed Notification By Its
    Text.`


    ```

    // Wait and click delayed notification by text.

    uiDevice.findObject(By.res("com.android.systemui:id/notification_stack_scroller"))

    .wait(Until.findObject(By.text("My notification")), 8000)

    .clickAndWait(Until.newWindow(), twoSeconds)

    ```


    As you can see, with both frameworks, we can cover most of the use cases we need,
    starting from testing an application using Espresso to more complicated cases
    like interacting with notifications, opening system settings, and dealing with
    other third-party applications using UI Automator.


    ## Exercise 20


    **Implementing a Practice Test Using Espresso and UI Automator**


    1.  Implement a test using the UI Automator `UiSelector` that creates and then
    modifies the TO-DO item.


    2.  Implement a test using the UI Automator `BySelector` that creates two TO-DO
    items, marks one as done, filters out the active TO-DO item, and verifies it.


    3.  Implement a test that opens a contextual menu in the TO-DO list toolbar and
    clicks on the share button. Modify the existing `UiWatcher` to wait for Gmail
    application icon/text shown in the application chooser and click on it from inside
    the `UiWatcher`.


    4.  Implement a test that uses Espresso and the UI Automator code and automates
    the process described in Step 3.


    ## Summary


    Depending on its goal, an Android UI test may target different applications: instrumented
    applications, third-party applications, or both. In the case of third-party or
    mixed applications, the testing is performed using the UI Automator framework,
    which is a powerful testing tool that allows wider test coverage compared to pure
    Espresso tests. Combining Espresso and the UI Automator framework creates UI tests
    that are powerful enough to cover most of the use cases we can imagine.


    # 9. Dealing with Runtime System Actions and Permissions


    Nowadays, most Android applications support multiple locales, and many request
    different system permissions, for example permission to access the device camera,
    location permissions, and permission to write to external storage.


    With the evolution of the Android platform, the approach to application permissions
    has changed in favor of user privacy. Starting from API level 23, application
    permissions are asked during application runtime and upon user requests. Such
    permissions are represented by a system popup or system dialog and are not the
    part of the application being tested. Moreover, these permissions can be revoked
    by the users any time from the application settings. Of course, the mentioned
    application states should be handled properly before or during UI tests are run.


    This chapter explains the different ways we can deal with system actions like
    permission request dialogs and describes the possible solutions for changing the
    Android emulator system language programmatically.


    ## Changing the Emulator System Language Programmatically


    Up to API level 27, Android provided a possibility to set the system locale by
    sending the intent via an `adb` command or directly from the test code. This could
    be achieved because `CustomLocale.apk` was preinstalled on emulators and was able
    to handle the sent intent. An example of `adb shell am` command is the following:


    ```

    adb shell am broadcast -a com.android.intent.action.SET_LOCALE --es \

    com.android.intent.extra.LOCALE "en_US" com.android.customlocale2

    ```


    However, starting with API level 28, the `CustomLocale.apk` application was removed
    from the emulator image, which required another solution. After a closer look
    at the Android emulator release notes ([https://developer.android.com/studio/releases/emulator](https://developer.android.com/studio/releases/emulator)),
    the solution was clear. Starting with Android emulator version 27.2.9 (from May
    2018), you can load a QuickBoot snapshot without restarting the emulator. The
    emulator release notes page explains how to do this manually with the help of
    the emulator Extended Controls window inside the Settings section. See Figure
    9-1.


    ![../images/469090_1_En_9_Chapter/469090_1_En_9_Fig1_HTML.jpg](images/469090_1_En_9_Chapter/469090_1_En_9_Fig1_HTML.jpg)


    **Figure 9-1** Emulator extended controls


    When the snapshot view appears, you put the device into the desired state and
    click the TAKE SNAPSHOT button. The new snapshot with an automatically generated
    name is taken and shown in the snapshot list. See Figure 9-2.


    ![../images/469090_1_En_9_Chapter/469090_1_En_9_Fig2_HTML.jpg](images/469090_1_En_9_Chapter/469090_1_En_9_Fig2_HTML.jpg)


    **Figure 9-2** Taking emulator snapshots


    **Note:** Renaming the snapshot in the emulator Extended Controls window will
    not rename it globally, but just creates the alias. The actual snapshot name will
    remain unchanged.


    The same can be done by communicating with the Android emulator via the `telnet`
    console command (more information about the emulator `telnet` command can be found
    at [https://developer.android.com/studio/run/emulator-console](https://developer.android.com/studio/run/emulator-console)).
    In the following code examples, you can see how to establish the telnet session
    with a running emulator, list existing snapshots, take the snapshot, and load
    it during emulator runtime.'
