    1. 基于 `clickTodoCheckBoxWithTitle()` 操作，实现一个验证待办事项项不在列表中的 `RecyclerView` 操作。提示：在
    `perform()` 方法中使用一个 `JUnit assert` 方法。最终用法可能如下所示：


