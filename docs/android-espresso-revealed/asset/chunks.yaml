    - `hasParamWithValue()` — 基于参数值匹配 URI 对象。\n- `hasPath()` — 基于路径匹配 URI 对象。例如：`mailto:nobody@google.com`。\n\
    - `hasSchemeSpecificPart()` — 基于特定 scheme 部分匹配 URI 对象。这是 scheme 分隔符 `':'` 和 fragment\
