    # 第 13 章：使用 Espresso 和 UI Automator 进行有监督的 Monkey 测试


    本章将展示如何利用 Espresso 和 UI Automator 实现有监督的伪 Monkey 测试，这些测试既适用于可访问源代码的应用程序，也适用于第三方应用程序。


    # 第 14 章：AndroidX Test 库


    本章演示如何将测试代码从 Android 支持库迁移到 AndroidX Test 库。你将了解 AndroidX Test 库中引入的新 API，并学习如何将它们应用于
    UI 测试。


    # 第 15 章：提高生产力与测试非常规组件


    本章包含其他章节未涉及的代码示例，以及能够提升日常测试编写效率的 Espresso 测试技巧。内容包括创建参数化测试、将测试聚合到测试套件、在 UI 测试中使用
    AndroidStudio 实时模板、在 Espresso UI 测试中设置 `SeekBar` 进度，以及 Espresso `Drawable` 匹配器等相关主题。


    ## 本书未涵盖的内容


    本书旨在创建一份指南，指导如何为 Android 应用程序编写端到端的 UI 自动化测试，而无需模拟或存根应用程序依赖项。在我看来，这是最接近重现终端用户行为的方式。本书不涉及如何模拟应用程序数据和网络连接请求，或绕过应用程序工作流中的某些状态。


    ## 工具要求


    要使用本书，你需要至少具备 Android Studio IDE、Gradle、GitHub 和 shell/bash 等工具和平台的基本操作知识。在大多数情况下，我会说明如何配置你的
    IDE，并指出运行特定脚本时应使用哪些命令。


    ## 法律声明


    本书包含从 Android 开发者页面 [`https://developer.android.com`](https://developer.android.com)
    获取的代码、文档和图片。这些内容受附录 C 中提及的 Apache 2.0 许可证（[`http://www.apache.org/licenses/`](http://www.apache.org/licenses/)）保护。


    ### 关于作者与技术审校


    ### 关于作者


    ### 关于技术审校


    # 1. Espresso for Android 入门指南


    Espresso for Android 是一个轻量级、快速且可定制的 Android 测试框架，旨在提供简洁可靠的自动化 UI 测试。2013 年 10
    月底，Espresso 在 Google 测试自动化大会上被宣布后，由 Google 开源。从那时起，它在 Android 软件和测试工程师中日益流行。如今，它已成为
    Android 平台上最受欢迎的测试框架，因为其特性和发展由 Google 和 Android 开源社区共同推动。


    本章介绍 Espresso 的基础知识——Espresso 测试框架的核心组件，这些组件在测试自动化中用于模拟终端用户行为。这包括在屏幕上定位应用程序 UI
    元素并对其进行操作。


    Espresso 包含以下包：


    - `espresso-core` —— 包含核心和基本的视图匹配器、操作及断言。

    - `espresso-contrib` —— 外部贡献，包含 `DatePicker`、`RecyclerView` 和 `Drawer` 操作、可访问性检查以及
    `CountingIdlingResource`。

    - `espresso-intents` —— 用于验证和存根 Intent 的扩展，以进行隔离测试。

    - `espresso-idling-resource` —— Espresso 用于同步后台任务的机制。

    - `espresso-remote` —— Espresso 多进程功能的所在地。

    - `espresso-web` —— 包含支持 `WebView` 的资源。


    ## 用户界面测试：目标与方法


    如前所述，本书专注于编写功能性的端到端 UI 测试，这是最接近重现终端用户行为并在产品上线前捕获潜在问题的方式。尽管这类测试可能比单元测试或集成测试慢得多，但它们通常能发现单元测试和集成测试阶段未能捕获的问题。


    我想强调一个事实：本书中的所有测试示例都不包含任何条件逻辑。在测试自动化中使用条件逻辑是一种不良实践，因为同一个测试可以以不同方式执行，这不仅消除了简化 Bug
    复现的途径，降低了测试的可信度，还增加了测试维护的工作量。


    测试应以简单明了的方式编写，这样任何查看测试的人都能理解是哪个步骤导致了问题。

    '
- fmt: '# Setting Up the Sample Project


    The Espresso for Android testing framework supports devices running Android 2.3.3
    (API level 10) and higher. It was developed for writing UI tests within a single
    target application. In this book, all the examples were developed and tested with
    the following environment:


    * Device—Nexus 5X, Android 8.1.0 (API level 27)

    * IDE—AndroidStudio 3.2.1


    Let’s start setting up our sample project. It is a simple TO-DO application forked
    from the `googlesamples/android-architecture` GitHub repository (https://github.com/googlesamples/android-architecture)
    and modified in a way to show you most of the Espresso use cases.


    Here is the link to the GitHub page where you can download the source code or
    check out the project directly in your AndroidStudio IDE—https://github.com/Apress/android-espresso-revealed.
    The sample application allows us to add, edit, and delete TO-DO tasks. It contains
    different types of UI elements without functional load but the variety of the
    components used there allows us to see Espresso in action.


    After the repository is pulled into the AndroidStudio IDE, you will see a `todoapp`
    project with one `app` module. This sample project already contains a test package.
    Espresso dependencies are added to the `build.gradle` file. See Figure [1-1](#469090_1_En_1_Chapter.xhtml#Fig1).
    In general, for every test project where Espresso is used, the following steps
    should be done (this example is based on the TO-DO application):


    1. Add an `androidTest` package inside the application module.

    2. Set up the Espresso dependencies in the `todoapp/app/build.gradle` file inside
    the application module. Put them in the `dependencies{...}` section.


    ![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig1_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig1_HTML.jpg)


    Figure 1-1 – Sample project structure


    3. Put the Espresso dependency versions inside the root project `todoapp/build.gradle`
    file (see Figure [1-2](#469090_1_En_1_Chapter.xhtml#Fig2)). This is not mandatory
    but is good practice in case there’s a multi-module application structure. Later,
    instead of updating dependency versions in multiple gradle files, we would only
    need to update them in one place.


    ![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig2_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig2_HTML.jpg)


    Figure 1-2 – `todoapp/build.gradle`: keeping dependency versions in one place


    In most cases, after dependencies have been added, changed, or deleted, we must
    synchronize the project in AndroidStudio by clicking on the Gradle Sync icon ![../images/469090_1_En_1_Chapter/469090_1_En_1_Figa_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Figa_HTML.jpg).
    You need an Internet connection to download any changed dependencies.


    ```

    // Android Testing Support Library''s runner and rules

    androidTestImplementation "com.android.support.test:runner:$rootProject.ext.runnerVersion"

    androidTestImplementation "com.android.support.test:rules:$rootProject.ext.rulesVersion"

    androidTestImplementation "android.arch.persistence.room:testing:$rootProject.roomVersion"

    // Espresso UI Testing

    androidTestImplementation "com.android.support.test.espresso:espresso-core:$rootProject.espressoVersion"

    androidTestImplementation "com.android.support.test.espresso:espresso-contrib:$rootProject.espressoVersion"

    androidTestImplementation "com.android.support.test.espresso:espresso-intents:$rootProject.espressoVersion"

    androidTestImplementation "com.android.support.test.espresso.idling:idling-concurrent:$rootProject.espressoVersion"

    androidTestImplementation "com.android.support.test.espresso:espresso-idling-resource:$rootProject.espressoVersion"

    androidTestImplementation "com.android.support.test.espresso:espresso-web:$rootProject.espressoVersion"

    androidTestImplementation "com.android.support.test.espresso:espresso-accessibility:$rootProject.espressoVersion"

    ```


    4. Add a test package inside the `todoapp/app/src/androidTest/java` directory.
    Usually the test package will have the same name as the application being tested,
    but with a `.test` postfix.


    Starting from this moment, you can add your first test class and begin writing
    tests.


    # Understanding Android Instrumentation


    On Android UI tests, we use the instrumentation mechanism to execute tests. Unlike
    unit tests, which can run on the JVM directly, instrumented tests run on a real
    device or emulator. Such tests have access to the Instrumentation API, which enables
    us to control the test application from our test code, provides access to the
    context of the application, and allows us to replicate user behavior through different
    UI actions, like click, swipe, etc. This is achieved because the instrumented
    test application runs in the same process as the application being tested. Instrumentation
    will be instantiated before any of the application code, allowing it to monitor
    the interactions that the system has with the application.


    Instrumentation is usually declared in test application Android manifest file
    using the `instrumentation` XML tag. Here is the example of instrumentation declaration
    with the `AndroidJUnitRunner` from the Android Support library:


    ```

    Here is the same sample for the AndroidX Test library:

    ```


    This also can be achieved by declaring it in the application module `build.gradle`
    file:


    ```

    android {

    ...

    defaultConfig {

    ...

    applicationId "com.example.android.architecture.blueprints.todoapp"

    testInstrumentationRunner ''android.support.test.runner.AndroidJUnitRunner''

    }

    ...

    }

    android {

    ...

    defaultConfig {

    ...

    applicationId "com.example.android.architecture.blueprints.todoapp"

    testInstrumentationRunner ''androidx.test.runner.AndroidJUnitRunner''

    }

    ...

    }

    ```


    In both cases, we provide the instrumentation test runner name and the target
    application package, which is the test application package. In the `build.gradle`
    file, it is called `applicationId`. `AndroidJUnitRunner` is the default Android
    JUnit test runner, starting from API level 8 (Android 2.2). It allows us to run
    JUnit3 or JUnit4 based tests. The test runner handles loading your test package
    and the test app to a device, running your tests, and reporting the test results.
    To access the information about the current test, we run the `InstrumentationRegistry`
    class. It holds a reference to the instrumentation object running in the process
    as well as to the target application context object, the test application context
    object, and the command-line arguments passed into your test.


    A couple of words about annotations used with Espresso:


    * Whenever we create a test class, it or its superclass should be annotated with
    a `@RunWith(AndroidJUnit4.class)` annotation. Otherwise, the default JUnit runner
    will take over the running process and the tests will fail.

    * To execute code once before or after any test method inside the class, the `@BeforeClass`
    or `@AfterClass` JUnit annotations can be used.

    * To execute code before or after each test method inside the class, the `@Before`
    or `@After` JUnit annotations can be used. This can be useful when several tests
    need similar objects created or deleted before/after they can run.

    * The `@Rule` annotates fields that reference rules or methods that return a rule.
    Rules can be used for different purposes. For example, later in the book, we will
    talk about activity or `TestWatcher` rules.


    Refer to the `BaseTest.java` class to see how some of the described annotations
    are used:


    ```

    @RunWith(AndroidJUnit4.class)

    public class BaseTest {

    @Before

    public void setUp() throws Exception {

    setFailureHandler(new CustomFailureHandler(

    InstrumentationRegistry.getInstrumentation().getTargetContext()));

    }

    @Rule

    public ActivityTestRule menuActivityTestRule =

    new ActivityTestRule(TasksActivity.class);

    }

    ```'
