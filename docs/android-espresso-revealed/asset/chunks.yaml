- fmt: "# Espresso Basics\n\nEvery mobile application has some form of user interface\
    \ (UI). In the Android world, this is accomplished through the use of `View` and\
    \ `ViewGroup` objects. They are used for drawing UI elements on the Android device\
    \ screen. From a testing point of view, we are interested in these UI elements\
    \ to further perform actions or verifications on them. The first step we have\
    \ to do is locate these views in the application UI.\n\n## Identifying Application\
    \ UI Elements\n\nBefore jumping into the Espresso topic, let’s think about the\
    \ mobile application from the end user perspective. What do users do when they\
    \ use the application? They:\n\n1. Search for UI elements on the screen (buttons,\
    \ lists, edit text fields, icons, etc.).\n2. Perform actions on UI elements (click,\
    \ double-click, swipe, type, etc.).\n3. Check the result (text is typed, click\
    \ led to expected result, list is scrolled, etc.).\n\nSo, our first task when\
    \ we start writing automated tests is to find the UI elements in the application\
    \ we would like to perform actions on. They can be easily located with the help\
    \ of a couple of tools. The first possibility is to use Android Device Monitor.\n\
    \nTo start the standalone Device Monitor application, enter the following on the\
    \ command line inside the `android-sdk/tools/` directory:\n\n```\nmonitor\n```\n\
    \nAfter the Android Device Monitor starts, connect the device. Select it by tapping\
    \ on the device name inside the Devices tab, open the screen you want to inspect,\
    \ and click the Phone ![../images/469090_1_En_1_Chapter/469090_1_En_1_Figb_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Figb_HTML.jpg)\
    \ icon (see Figure [1-3](#469090_1_En_1_Chapter.xhtml#Fig3)). After following\
    \ these steps, you will be able to inspect the application UI by just clicking\
    \ on the available elements inside the Android Device Monitor. The details of\
    \ the element are shown on the right side, including resource ID, text, content\
    \ description, etc. This information is very important because it will become\
    \ the base for views identification inside the application UI.\n\n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig3_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig3_HTML.jpg)\n\
    \n**Figure 1-3** Identifying UI elements by clicking on them\n\nThe second option\
    \ is to use Layout Inspector, which is available from the AndroidStudio Tools\
    \ ➤ Layout Inspector menu. Select the needed activity or fragment and start to\
    \ investigate the application layout (see Figures [1-4](#469090_1_En_1_Chapter.xhtml#Fig4)\
    \ and [1-5](#469090_1_En_1_Chapter.xhtml#Fig5)).\n\n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig5_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig5_HTML.jpg)\n\
    \n**Figure 1-5** Analyzing the application layout from the Layout Inspector\n\n\
    ![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig4_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig4_HTML.jpg)\n\
    \n**Figure 1-4** Selecting a running process from the Layout Inspector\n\nAs you\
    \ can see in Figure [1-5](#469090_1_En_1_Chapter.xhtml#Fig5), the Layout Inspector\
    \ view is more detailed. It provides us with more data compared to the Android\
    \ Device Monitor, which provides more possibilities for view identification and\
    \ verification. Another benefit of the Layout Inspector is that it saves the layout\
    \ dumps inside the `/captures` folder, which can be easily accessed without the\
    \ need to start another tool. They can be committed into the source control system\
    \ and used by multiple team members.\n\n## Exercise 1: Inspecting the Application\
    \ Layout\n\nNow it is time for the first exercise—to build and install the sample\
    \ TO-DO application on an emulator or real device, launch it, and then make layout\
    \ dumps with the Monitor and Layout Inspector tools in different application sections.\
    \ You can then analyze the layouts and understand how these tools work and finally\
    \ decide which one is better for you.\n\n1. Make the layout dump in the All TO-DOs\
    \ list and study the hierarchy structure.\n2. Open a contextual menu toolbar in\
    \ the All TO-DOs list and create a layout dump. Study the hierarchy structure.\n\
    \n## Espresso\n\nAt this moment, the UI elements are identified with the help\
    \ of the tools or based on the source code and we can use Espresso to start operating\
    \ on them. The main `Espresso` class is the entry point to the Espresso framework\
    \ and is where core Espresso methods live. Testing can be initiated by using one\
    \ of the `on` methods (e.g., `onView()`) or by performing top-level user actions\
    \ (e.g., `pressBack()`).\n\n* `onView()` — A `ViewInteraction` for a given view.\
    \ Takes the hamcrest ViewMatchers instance(s) as a parameter. You can pass one\
    \ or more of these to the `onView()` method to locate a view, based on view properties,\
    \ within the current view hierarchy.\n\n> **Note**  \n> The view has to be part\
    \ of the view hierarchy. This may not be the case if it is rendered as part of\
    \ an `AdapterView` (e.g., a `ListView`). If this is the case, use `Espresso.onData`\
    \ to load the view first.\n\n* `onData()` — A `DataInteraction` for a data object\
    \ (e.g., a `ListView`). Takes as a parameter a hamcrest matcher that matches the\
    \ data object represented by the single item in the list.\n\n* `pressBack()` —\
    \ A press on the back button. Throws `PerformException` if the currently displayed\
    \ activity is a root activity, since pressing the back button would result in\
    \ the application closing.\n\n* `closeSoftKeyboard()` — Closes the soft keyboard\
    \ if it’s open.\n\n* `openContextualActionModeOverflowMenu()` — Opens the overflow\
    \ menu displayed in the contextual options of an `ActionMode`.\n\n* `openActionBarOverflowOrOptionsMenu()`\
    \ — Opens the overflow menu displayed within an ActionBar.\n\nWe will start with\
    \ the basic Espresso functionality. First we will see how operations on single\
    \ views work with the `onView()` method. As a parameter, it takes a hamcrest matcher\
    \ to match a view in the application UI. We will learn more about view matchers\
    \ in the next section.\n\n## Espresso ViewMatchers\n\nView matchers form a collection\
    \ of hamcrest Java matchers that match views. The Espresso ViewMatchers are as\
    \ follows (I have noted the most frequently used ones based on my experience):\n\
    \n* `isAssignableFrom()` — Matches a view based on an instance or subclass of\
    \ the provided class. Normally used in combination with other ViewMatchers. Commonly\
    \ used.\n\n* `withClassName()` — Returns a matcher that matches views with class\
    \ name matching the given matcher.\n\n* `isDisplayed()` — Returns a matcher that\
    \ matches views that are currently displayed on the screen to the user. Commonly\
    \ used.\n\n> **Note**  \n> `isDisplayed()` will select views that are partially\
    \ displayed (e.g., the full height/width of the view is greater than the height/width\
    \ of the visible rectangle). If you want to ensure the entire rectangle is displayed,\
    \ use `isCompletelyDisplayed()`.\n\n* `isCompletelyDisplayed()` — Returns a matcher\
    \ that only accepts a view whose height and width fit perfectly within the currently\
    \ displayed region of this view.\n\n> **Note**  \n> There exist views (such as\
    \ `ScrollViews`) whose height and width are larger than the physical device screen\
    \ by design. Such views will never be completely displayed.\n\n* `isDisplayingAtLeast()`\
    \ — Returns a matcher that accepts a view so long as a given percentage of that\
    \ view’s area is not obscured by any parent view and is thus visible to the user.\n\
    \n* `isEnabled()` — Returns a matcher that matches view(s) that are enabled. Commonly\
    \ used.\n\n* `isFocusable()` — Returns a matcher that matches view(s) that are\
    \ focusable.\n\n* `hasFocus()` — Returns a matcher that matches view(s) that currently\
    \ have focus.\n\n* `isSelected()` — Returns a matcher that matches view(s) that\
    \ are selected."
