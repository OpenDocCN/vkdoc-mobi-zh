    \           }\n        });\n    }\n    @Override public String getName() {\n \
    \       return name;\n    }\n    @Override public boolean isIdleNow() {\n    \
    \    return dispatcher.runningCallsCount() == 0;\n    }\n    @Override public\
    \ void registerIdleTransitionCallback(ResourceCallback callback) {\n        this.callback\
    \ = callback;\n    }\n}\n```\n\n基本上，这个资源开箱即用，几乎所有事情都为我们处理好了。`isIdleNow()`方法中调用的`dispatcher.runningCallsCount()`方法会返回正在运行的同步和异步请求数量，并与零进行比较。当结果为零时，资源处于空闲状态。不过，要使用它，我们仍然需要执行一些步骤：\n\
    \n1.  在`build.gradle`文件中添加依赖：\n    ```\n    androidTestCompile 'com.jakewharton.espresso:okhttp3-idling-resource:1.0.0'\n\
    \    ```\n2.  在你的测试代码中，获取`OkHttpClient`实例并创建一个空闲资源：\n    ```java\n    OkHttpClient\
    \ client = // ... 获取 OkHttpClient 实例\n    IdlingResource resource = OkHttp3IdlingResource.create(\"\
    OkHttp\", client);\n    ```\n3.  在运行任何 Espresso 测试之前，在测试代码中注册空闲资源：\n    ```java\n\
    \    IdlingRegistry.getInstance().register(resource);\n    ```\n\n顺便说一下，不要使用已废弃的`Espresso.registerIdlingResources()`方法；而应使用本节中展示的`IdlingRegistry`实现。\n\
    \n## `PicassoIdlingResource`\n\nPicasso 是 Square 为 Android 开发的一个强大的图片下载和缓存库。Picasso\
    \ 允许在应用程序中轻松加载图片——通常只需一行代码（[`square.github.io/picasso/`](http://square.github.io/picasso/)）：\n\
    \n```java\nPicasso.get().load(\"http://i.imgur.com/DvpvklR.png\").into(imageView);\n\
    ```\n\nPicasso 是 Android 最流行的图片下载库，这意味着它是另一种`IdlingResource`类型的完美候选。当我们希望确保整个应用程序窗口布局连同图形资源一起加载完成时，可以使用图片下载空闲资源。在需要验证测试中的图形资源时，这一点极其重要。以下是在`androidTest/com.squareup.picasso`包中同样实现的`PicassoIdling`资源示例。\n\
    \n*androidTest/com.squareup.picasso.PicassoIdlingResource.java。*\n"
- fmt: "```java\npublic class PicassoIdlingResource implements IdlingResource, ActivityLifecycleCallback\
    \ {\n    private static final int IDLE_POLL_DELAY_MILLIS = 100;\n    private ResourceCallback\
    \ mCallback;\n    private WeakReference mPicassoWeakReference;\n    private final\
    \ Handler mHandler = new Handler(Looper.getMainLooper());\n\n    @Override\n \
    \   public String getName() {\n        return \"PicassoIdlingResource\";\n   \
    \ }\n\n    @Override\n    public boolean isIdleNow() {\n        if (isIdle())\
    \ {\n            notifyDone();\n            return true;\n        } else {\n \
    \           /* Force a re-check of the idle state in a little while.\n       \
    \      * If isIdleNow() returns false, Espresso only polls it every few seconds\
    \ which can slow down our tests.\n             */\n            mHandler.postDelayed(new\
    \ Runnable() {\n                @Override\n                public void run() {\n\
    \                    isIdleNow();\n                }\n            }, IDLE_POLL_DELAY_MILLIS);\n\
    \            return false;\n        }\n    }\n\n    public boolean isIdle() {\n\
    \        return mPicassoWeakReference == null\n                || mPicassoWeakReference.get()\
    \ == null\n                || mPicassoWeakReference.get().targetToAction.isEmpty();\n\
    \    }\n\n    @Override\n    public void registerIdleTransitionCallback(ResourceCallback\
    \ resourceCallback) {\n        mCallback = resourceCallback;\n    }\n\n    void\
    \ notifyDone() {\n        if (mCallback != null) {\n            mCallback.onTransitionToIdle();\n\
    \        }\n    }\n\n    @Override\n    public void onActivityLifecycleChanged(Activity\
    \ activity, Stage stage) {\n        switch (stage) {\n            case RESUMED:\n\
    \                mPicassoWeakReference = new WeakReference(Picasso.with(activity));\n\
    \                break;\n            case PAUSED:\n                // Clean up\
    \ reference\n                mPicassoWeakReference = null;\n                break;\n\
    \            default: // NOP\n        }\n    }\n}\n```\n\nNote: The reason that\
    \ the Picasso `IdlingResource` is in a separate package is because of the visibility\
    \ of the `targetToAction` variable in the `Picasso` class, which is package protected.\n\
    \n## ConditionWatcher as an Alternative to IdlingResource\n\nAs you may notice,\
    \ the `IdlingResource` implementation is not trivial and requires continuous control\
    \ over registering and unregistering. It is also not convenient to use `IdlingResource`\
    \ in deep UI tests when a specific activity instance is needed to make it work.\n\
    \nAs an alternative, you can try the `ConditionWatcher` class from AzimoLabs (`https://github.com/AzimoLabs/ConditionWatcher`).\
    \ It is a simple class that makes Android automation testing easier, faster, cleaner,\
    \ and more intuitive. It synchronizes operations that might occur on any thread,\
    \ with the test thread. `ConditionWatcher` can be used as a replacement to Espresso's\
    \ `IdlingResources` or it can work in parallel with them.\n\nThis is how it works:\
    \ `ConditionWatcher` receives an instance of the `Instruction` class that contains\
    \ a logical expression. Tests are paused until the moment the condition returns\
    \ `true`. After that, the tests are immediately released. If the condition is\
    \ not met within a specified timeout, the exception will be thrown and the test\
    \ will fail.\n\n`ConditionWatcher` acts on the same thread it is requested, which\
    \ is the test thread. By default, `ConditionWatcher` includes three methods:\n\
    \n- `setWatchInterval()` — Sets the interval for periodic check of the logical\
    \ expression. By default, it is set to 250 milliseconds.\n- `setTimeoutLimit()`\
    \ — Sets the timeout for the `ConditionWatcher` to wait for a true value from\
    \ the `checkCondition()` method. By default, it is set to 60 seconds.\n- `waitForCondition()`\
    \ — Takes instructions containing a logical expression as a parameter and calls\
    \ its `checkCondition()` method with the currently set interval, until it returns\
    \ value `true` or until the timeout is reached. During that time, the test code\
    \ won't proceed to the next line. If timeout is reached, an `Exception` is thrown.\n\
    \nFrom the other side, the `Instruction` class happens to have a very similar\
    \ structure to `IdlingResource`:\n\n- `checkCondition()` — A core method that's\
    \ equivalent to `isIdleNow()` of `IdlingResource`. It's a logical expression and\
    \ its changes, along with the monitored dynamic resource status, should be implemented\
    \ there.\n- `getDescription()` — A string returned along with the timeout exception.\
    \ The test author can include helpful information for the test crash debugging\
    \ process.\n- `setDataContainer()` and `getDataContainer()` — A bundle that can\
    \ be added to the `Instruction` class to share primitive types (e.g., a universal\
    \ instruction that waits for any kind of view to become visible can be created,\
    \ and `resId` could be sent via the bundle).\n\nThe following dependency should\
    \ be added to the `build.gradle` file in order to start using `ConditionWatcher`:\n\
    \n```\ndependencies {\n    androidTestCompile 'com.azimolabs.conditionwatcher:conditionwatcher:0.2'\n\
    }\n```\n\nOr just copy the source code of the two classes `ConditionWatcher.java`\
    \ and `Instruction.java` into your test source code.\n\nThe simplest example of\
    \ `ConditionWatcher` usage is a condition to wait for an element be displayed\
    \ on the screen:\n\n```\nConditionWatcher.waitForCondition(new Instruction() {\n\
    \    @Override\n    public String getDescription() {\n        return \"waitForElementIsDisplayed\"\
    ;\n    }\n\n    @Override\n    public boolean checkCondition() {\n        try\
    \ {\n            interaction.check(matches(isDisplayed()));\n            return\
    \ true;\n        } catch (NoMatchingViewException ex) {\n            return false;\n\
    \        }\n    }\n});\n```\n\nI prefer to wrap the `ConditionWatcher` into a\
    \ method instead of creating a class that extends the `Instruction` class. Next,\
    \ you see an example of the `waitForElementIsDisplayed(final ViewInteraction interaction,\
    \ final int timeout)` watcher from the `ConditionWatchers.java` class:\n\n```\n\
    public static ViewInteraction waitForElementIsDisplayed(\n        final ViewInteraction\
    \ interaction,\n        final int timeout) throws Exception {\n    ConditionWatcher.setTimeoutLimit(timeout);\n\
    \    ConditionWatcher.waitForCondition(new Instruction() {\n        @Override\n\
    \        public String getDescription() {\n            return \"waitForElementIsDisplayed\"\
    ;\n        }\n\n        @Override\n        public boolean checkCondition() {\n\
    \            try {\n                interaction.check(matches(isDisplayed()));\n\
    \                return true;\n            } catch (NoMatchingViewException ex)\
    \ {\n                return false;\n            }\n        }\n    });\n    return\
    \ interaction;\n}\n```\n\nWith this implementation of `waitForElementIsDisplayed()`,\
    \ we receive one important benefit—if the watcher receives `ViewInteraction` as\
    \ a parameter, the wrapper method can return the same `ViewInteraction`, which\
    \ simplifies our test source code:\n\n```\nprivate ViewInteraction addTaskFab\
    \ = onView(withId(R.id.fab_add_task));\n\n@Test\npublic void waitForElementCondition()\
    \ throws Exception {\n    waitForElementIsDisplayed(addTaskFab, 4000).perform(click());\n\
    }\n```\n\nNow let's move to more complicated examples. In our sample application,\
    \ we have a nasty snackbar that pops up every time a new TO-DO is added. It doesn't\
    \ allow us to add multiple TO-DOs to our list without waiting until it disappears.\
    \ Our task is to create a watcher that will wait for the snackbar view to be gone.\
    \ This is how it can be done.\n\n*chapter4.conditionwatchers.ConditionWatchers.tasksListSnackbarGone().*\n\
    \n```\npublic static void tasksListSnackbarGone() throws Exception {\n    ConditionWatcher.waitForCondition(new\
    \ Instruction() {\n        @Override\n        public String getDescription() {\n\
    \            return \"Condition tasksListSnackbarGone\";\n        }\n\n      \
    \  @Override\n        public boolean checkCondition() {\n            final FragmentActivity\
    \ fragmentActivity = getCurrentActivity();\n            if (fragmentActivity !=\
    \ null) {\n                Fragment currentFragment = fragmentActivity\n     \
    \                   .getSupportFragmentManager()\n                        .findFragmentById(R.id.contentFrame);\n\
    \                if (currentFragment instanceof TasksFragment) {\n           \
    \         View contentView =\n                            fragmentActivity.getWindow().getDecorView().findViewById(android.R.id.content);\n\
    \                    if (contentView != null) {\n                        TextView\
    \ snackBarTextView =\n                                contentView.findViewById(android.support.design.R.id.snackbar_text);\n\
    \                        return snackBarTextView == null;\n                  \
    \  }\n                }\n            }\n            return false;\n        }\n\
    \    });\n}\n```"
