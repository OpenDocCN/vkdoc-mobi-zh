    \n在当前情况下，对话框属于HTML页面，使用相同的`onWebView()`方法即可轻松找到其中的元素，如图[6-7](#469090_1_En_6_Chapter.xhtml#Fig7)所示。\n\
    \n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig7_HTML.jpg](images/469090_1_En_6_Chapter/469090_1_En_6_Fig7_HTML.jpg)\n\
    \n**图6-7** Android WebView客户端内显示的HTML `<dialog>`。\n\n下一个测试用例是关于测试与HTML `<select>`组件的交互。事实证明这是一个棘手的问题。首先，实现了以下测试用例。\n\
    \n*chapter6.* *`WebViewTest.failsToClickSelectDropDown()`* *.*\n\n```\n@Test\n\
    fun failsToClickSelectDropDown() {\n    openDrawer()\n    onView(allOf(withId(R.id.design_menu_item_text),\n\
    \                 withText(R.string.settings_title))).perform(click())\n    onData(instanceOf(PreferenceActivity.Header::class.java))\n\
    \        .inAdapterView(withId(android.R.id.list))\n        .atPosition(3)\n \
    \       .perform(click())\n    onWebView()\n        // Supposed to click on select.\n\
    \        .withElement(findElement(Locator.ID, \"selection_id\"))\n        .perform(webClick())\n\
    \        // Select list is not shown, so test fails.\n        .check(webMatches(getText(),\
    \ equalTo(\"Item 3\")))\n}\n```\n\n问题在于，这个测试用例仅在最后一项检查上失败，因为HTML `<select>`组件列表并未显示，尽管`webClick()`已发送到找到的元素。更改定位器类型在这种情况下无济于事，也没有必要，因为元素已经被找到。这导致一个事实：问题出在仅针对HTML\
    \ `<select>`元素的`webClick()`操作上。经过一番研究，发现这是一个已知问题，甚至有一个变通方法可以通过附加按钮使其工作：\n\n*浏览器不允许通过纯JavaScript展开`<select>`，该控件只能通过鼠标直接点击来展开。`select.click()`将不起作用。但有一个解决方案。我们通过创建另一个一次显示多个选项的选择框来模拟展开的`<select>`控件，这可以通过设置`size`参数来实现。这个多选选择框将绝对定位在旧的单一选项选择框之上，并且旧的选项将通过样式的`visibility`属性隐藏。这样布局保持不变，新控件无缝显示。新控件看起来只是略有不同，但这不应该成为问题，请自行在下面的截图中查看。*\n\
