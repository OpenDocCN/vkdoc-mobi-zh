- fmt: "# Figure 7-3: Accessibility Issues in the Create Task View\n\nFigure [7-3](#469090_1_En_7_Chapter.xhtml#Fig3)\
    \ shows a couple of accessibility analysis examples with accessibility issues\
    \ in the sample TO-DO application.\n\n![../images/469090_1_En_7_Chapter/469090_1_En_7_Fig3_HTML.jpg](images/469090_1_En_7_Chapter/469090_1_En_7_Fig3_HTML.jpg)\n\
    \n**Figure 7-3** Accessibility issues in the Create Task view\n\n## Exercise 19:\
    \ Executing Accessibility Tests\n\n1. Install the Accessibility Scanner application\
    \ and enable accessibility checks. Launch the sample TO-DO application and perform\
    \ the accessibility checks across the application. Observe the issue types.\n\
    2. Run tests from the `AccessibilityTest.kt` class with the `AccessibilityChecks.enable()`\
    \ option only. Observe the test results.\n3. Run tests from the `AccessibilityTest.kt`\
    \ class with the `setRunChecksFromRootView(true)` option. Observe the test results.\n\
    4. Suppress some accessibility failures, as shown in the `AccessibilityTest.kt`\
    \ class’s `setAccessibilityPrefs()` method, and run the tests again. Observe the\
    \ test results.\n5. Add the `setThrowExceptionForErrors(false)` parameter and\
    \ run the tests. Observe the test results and device `logcat` logs.\n\n## Summary\n\
    \nUnfortunately, accessibility testing is frequently ignored, with the focus mostly\
    \ on functional testing. It may be not clear from the first look, but good accessibility\
    \ support is important too. Its main goal is to make applications accessible to\
    \ people with visual impairments, but it also has nice side effects—it makes your\
    \ applications more testable and helps you understand different application use\
    \ cases. It may even result in your application getting a higher Google PlayStore\
    \ rating, since Android-crawling algorithms may analyze the application from the\
    \ accessibility side and give preference to those with proper accessibility support.\n\
    \n# 8. Espresso and UI Automator: the Perfect Tandem\n\nEspresso is a perfect\
    \ and fast test automation framework, but it has one important limitation—we are\
    \ allowed to operate only inside our test application context. This means that\
    \ it is not possible to automate tests for the following use cases:\n\n- Clicking\
    \ application push notifications\n- Accessing system settings\n- Navigating from\
    \ another app to the app being tested and vice versa\n\nThe reason for such a\
    \ limitation lies in the nature of the Android Test instrumentation. Since during\
    \ an Espresso test run, the application being tested and the test application\
    \ processes are spawned, we are not allowed to interact with other applications\
    \ installed on the mobile device, like the notification bar, camera, or system\
    \ settings applications. But it is possible to access them using the UI Automator.\
    \ The UI testing framework is suitable for cross-app functional UI testing.\n\n\
    > **Note**  \n> The UI Automator test framework supports Android 4.3 (API level\
    \ 18) and higher.\n\n## Key Features of UI Automator\n\nThe key features of the\
    \ UI Automator include the following:\n\n- A `uiautomatorviewer` to inspect the\
    \ layout hierarchy. Starting with Android Studio 2.3, this was replaced by a monitor\
    \ tool.\n- An API to retrieve device state information and perform operations\
    \ on it. The examples are pressing the device home or back button, changing device\
    \ rotation, opening notifications, and taking a screenshot.\n- APIs that support\
    \ cross-application UI testing.\n\nWe will focus a bit on the UI Automator APIs:\n\
    \n- **By**—`By` is a utility class that enables the creation of `BySelector`s\
    \ in a concise manner. Its primary function is to provide static factory methods\
    \ for constructing `BySelector`s using a shortened syntax. For example, you would\
    \ use `findObject(By.text(\"foo\"))` rather than `findObject(new BySelector().text(\"\
    foo\"))` to select UI elements with the text value `\"foo\"`.\n- **BySelector**—A\
    \ `BySelector` specifies criteria for matching UI elements during a call to `findObject(BySelector)`.\n\
    - **Configurator**—Allows you to set key parameters for running UI Automator tests.\
    \ The new settings take effect immediately and can be changed any time during\
    \ the test run.\n- **UiCollection**—Used to enumerate a container’s UI elements\
    \ for the purpose of counting or targeting a subelement by a child’s text or description.\n\
    - **UiObject**—A `UiObject` is a representation of a view. It is not in any way\
    \ directly bound to a view as an object reference. A `UiObject` contains information\
    \ to help it locate a matching view at runtime based on the [`UiSelector`](https://developer.android.com/reference/android/support/test/uiautomator/UiSelector.html)\
    \ properties specified in its constructor. Once you create an instance of a `UiObject`,\
    \ it can be reused for different views that match the selector criteria.\n- **UiObject2**—A\
    \ `UiObject2` represents a UI element. Unlike `UiObject`, it is bound to a particular\
    \ view instance and can become stale if the underlying view object is destroyed.\
    \ As a result, it may be necessary to call `findObject(BySelector)` to obtain\
    \ a new `UiObject2` instance if the UI changes significantly.\n- **UiScrollable**—`UiScrollable`\
    \ is a [`UiCollection`](https://developer.android.com/reference/android/support/test/uiautomator/UiCollection.html)\
    \ and provides support for searching for items in scrollable layout elements.\
    \ This class can be used with horizontally or vertically scrollable controls.\n\
    - **UiSelector**—Specifies the elements in the layout hierarchy for tests to target,\
    \ filtered by properties such as text value, content-description, class name,\
    \ and state information. You can also target an element by its location in a layout\
    \ hierarchy.\n\nIn addition to this list of APIs, we should be familiar with the\
    \ following framework class:\n\n- **Until**—The `Until` class provides factory\
    \ methods for constructing common conditions.\n\n> **Note**  \n> The UI Automator\
    \ testing framework is an instrumentation-based API and works with the `AndroidJUnitRunner`\
    \ test runner. This fact allows us to use Espresso together with UI Automator\
    \ code in the same test.\n\n## Starting with UI Automator\n\nTo start using UI\
    \ Automator, we should first set the dependency in the `build.gradle` file, as\
    \ follows.\n\n**UI Automator Android Testing Support Library Dependency in the\
    \ `build.gradle` File:**\n\n```groovy\nandroidTestImplementation 'com.android.support.test.uiautomator:uiautomator-v18:2.1.3'\n\
    ```\n\nAnd set the AndroidX Test library dependency as well.\n\n**UI Automator\
    \ AndroidX Test Library Dependency in the `build.gradle` File:**\n\n```groovy\n\
    androidTestImplementation 'androidx.test.uiautomator:uiautomator:2.2.0'\n```\n\
    \nLet’s analyze the UI Automator from an Espresso perspective, which we are already\
    \ familiar with, and try to figure out how different they are. We will also consider\
    \ the UI Automator’s strengths and weaknesses:\n\n- **Handling application transitions:**\n\
    \  - Espresso—Handles window transitions automatically.\n  - UI Automator—Doesn’t\
    \ support automatic window transitions, i.e., switching between activities or\
    \ fragments. You should explicitly use waitings.\n\n- **Locating UI elements:**\n\
    \  - Espresso—Core Espresso `onView()` and `onData()` methods together with view\
    \ matchers or data matchers are used to locate the UI element.\n  - UI Automator—Similar\
    \ to Espresso, UI Automator has its own core `UiDevice` class. It contains such\
    \ methods as `hasObject(BySelector)`, `findObject(BySelector)`, and `findObjects(BySelector)`\
    \ that are used to search for an element or check its presence in the application\
    \ UI.\n\n- **Waitings:**\n  - Espresso—The `IdlingResource` and third-party `ConditionWatcher`\
    \ classes can be used as waiting mechanisms, including both network-related and\
    \ element presence waitings. Both waiters should be implemented for each specific\
    \ case."
  raw: "Figure [7-3](#469090_1_En_7_Chapter.xhtml#Fig3) shows a couple\nof accessibility\
    \ analysis examples with accessibility issues in the\nsample TO-DO application.\n\
    \n![../images/469090_1_En_7_Chapter/469090_1_En_7_Fig3_HTML.jpg](images/469090_1_En_7_Chapter/469090_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3\nAccessibility issues in the Create Task view\n\nExercise 19\n\n\
    **Executing Accessibility Tests**\n\n1.  Install the Accessibility Scanner application\
    \ and enable\n    accessibility checks. Launch the sample TO-DO application and\
    \ perform\n    the accessibility checks across the application. Observe the issue\n\
    \    types.\n\n2.  Run tests from the `AccessibilityTest.kt`\n    class with the\
    \ `AccessibilityChecks.enable()`\n    option only. Observe the test results.\n\
    \n3.  Run tests from the `AccessibilityTest.kt`\n    class with the `setRunChecksFromRootView(true)`\n\
    \    option. Observe the test results.\n\n4.  Suppress some accessibility failures,\
    \ as shown in the `AccessibilityTest.kt`\n    class’s `setAccessibilityPrefs()`\n\
    \    method, and run the tests again. Observe the test results.\n\n5.  Add the\
    \ `setThrowExceptionForErrors(false)`\n    parameter and run the tests. Observe\
    \ the test results and device `logcat` logs.\n\nSummary\nUnfortunately, accessibility\
    \ testing is frequently ignored, with the\nfocus mostly on functional testing.\
    \ It may be not clear from the first\nlook, but good accessibility support is\
    \ important too. Its main goal is\nto make applications accessible to people with\
    \ visual impairments, but\nit also has nice side effects—it makes your applications\
    \ more testable\nand helps you understand different application use cases. It\
    \ maybe even\nresult in your application getting a higher Google PlayStore rating,\n\
    since Android-crawling algorithms may analyze the application from the\naccessibility\
    \ side and give preference to those with proper\naccessibility support.\n\n8. Espresso\
    \ and UI Automator: the\nPerfect Tandem\n\nEspresso is a perfect and fast test\
    \ automation framework, but it has one\nimportant limitation—we are allowed to\
    \ operate only inside our test\napplication context. This means that it is not\
    \ possible to automate\ntests for the following use cases:\n\n*   Clicking application\
    \ push notifications\n\n*   Accessing system settings\n\n*   Navigating from another\
    \ app to the app being tested and vice\n    versa\n\nThe reason for such a limitation\
    \ lies in the nature of the Android\nTest instrumentation. Since during an Espresso\
    \ test run, the application\nbeing tested and the test application processes are\
    \ spawned, we are not\nallowed to interact with other applications installed on\
    \ the mobile\ndevice, like the notification bar, camera, or system settings\n\
    applications. But it is possible to access them using the UI Automator.\nThe UI\
    \ testing framework is suitable for cross-app functional UI\ntesting.\n\nNote\n\
    The UI Automator test framework supports Android 4.3 (API level 18)\nand higher.\n\
    \nThe key features of\nthe UI Automator include the following:\n\n*   A `uiautomatorviewer`\
    \ to\n    inspect the layout hierarchy. Starting with Android Studio 2.3, this\
    \ was\n    replaced by a monitor tool.\n\n*   An API to retrieve device state\
    \ information and perform\n    operations on it. The examples are pressing the\
    \ device home or back\n    button, changing device rotation, opening notifications,\
    \ and taking a\n    screenshot.\n\n*   APIs that support cross-application UI\
    \ testing.\n\nWe will focus a bit on the UI Automator APIs:\n\n*   *By*—By is\
    \ a utility class that enables the creation of\n    BySelectors in a concise manner.\
    \ Its primary function is to provide\n    static factory methods for constructing\
    \ BySelectors using a shortened\n    syntax. For example, you would use `findObject(By.text(\"\
    foo\"))`\n    rather than `findObject(new BySelector().text(\"foo\"))` to select\
    \ UI elements with the text\n    value `\"foo\"`.\n\n*   *BySelector*—A BySelector\
    \ specifies criteria for matching\n    UI elements during a call to `findObject(BySelector)`.\n\
    \n*   *Configurator*—Allows you to set key parameters for\n    running UI Automator\
    \ tests. The new settings take effect immediately and\n    can be changed any\
    \ time during the test run.\n\n*   *UiCollection*—Used to enumerate a container’s\
    \ UI elements\n    for the purpose of counting or targeting a subelement by a\
    \ child’s text\n    or description.\n\n*   *UiObject*—A `UiObject` is a\n    representation\
    \ of a view. It is not in any way directly bound to a view\n    as an object reference.\
    \ A `UiObject` contains\n    information to help it locate a matching view at\
    \ runtime based on the\n     [`UiSelector`](https://developer.android.com/reference/android/support/test/uiautomator/UiSelector.html)\
    \ properties specified in its constructor. Once you\n    create an instance of\
    \ a `UiObject`, it can be\n    reused for different views that match the selector\
    \ criteria.\n\n*   *UiObject2*—A `UiObject2` represents\n    a UI element. Unlike\
    \ `UiObject`, it is bound\n    to a particular view instance and can become stale\
    \ if the underlying\n    view object is destroyed. As a result, it may be necessary\
    \ to call `findObject(BySelector`)\n    to obtain a new `UiObject2` instance if\n\
    \    the UI changes significantly.\n\n*   *UiScrollable*—`UiScrollable` is a\n\
    \     [`UiCollection`](https://developer.android.com/reference/android/support/test/uiautomator/UiCollection.html)\
    \ and provides support for searching for items in\n    scrollable layout elements.\
    \ This class can be used with horizontally or\n    vertically scrollable controls.\n\
    \n*   *UiSelector*—Specifies the elements in the layout\n    hierarchy for tests\
    \ to target, filtered by properties such as text\n    value, content-description,\
    \ class name, and state information. You can\n    also target an element by its\
    \ location in a layout hierarchy.\n\nIn addition to this list of APIs, we should\
    \ be\nfamiliar with the following framework class:\n\n*   ***Until***—The `Until`\
    \ class provides\n    factory methods for constructing common conditions.\n\n\
    Note\nThe UI Automator testing framework is an instrumentation-based API\nand\
    \ works with the `AndroidJUnitRunner``test` runner. This\nfact allows us to use\
    \ Espresso together with UI Automator code in the\nsame test.\n\nStarting with\
    \ UI Automator\nTo start using UI Automator, we should first set the dependency\
    \ in\nthe `build.gradle`\nfile , as\nfollows.\n\n*UI Automator Android Testing\
    \ Support Library Dependency in the\nbuild.gradle File.*\n\n```\nandroidTestImplementation\
    \ 'com.android.support.test.uiautomator:uiautomator-v18:2.1.3'\n```\n\nAnd set\
    \ the AndroidX Test library dependency as well.\n\n*UI Automator AndroidX Test\
    \ Library Dependency in the build.gradle\nFile.*\n\n```\nandroidTestImplementation\
    \ 'androidx.test.uiautomator:uiautomator:2.2.0'\n```\n\nLet’s analyze the UI Automator\
    \ from an Espresso perspective, which we\nare already familiar with, and try to\
    \ figure out how different they are.\nWe will also consider the UI Automator’s\
    \ strengths and weakness:\n\n*   Handling application\n    transitions:\n\n* \
    \  Espresso—Handles window transitions automatically.\n\n*   UI Automator—Doesn’t\
    \ support automatic window transitions, i.e.,\n        switching between activities\
    \ or fragments. You should explicitly use\n        waitings.\n\n*   Locating UI\n\
    \    elements:\n\n*   Espresso—Core Espresso `onView()` and `onData()` methods\n\
    \        together with view matchers or data matchers are used to locate the UI\n\
    \        element.\n\n*   UI Automator—Similar to Espresso, UI Automator has its\
    \ own core\n        `UiDevice` class.\n        It contains such methods as `hasObject(BySelector),\
    \ findObject(BySelector)`, and `findObjects(BySelector)`\n        that are used\
    \ to search for an element or check its presence in the\n        application UI.\n\
    \n*   Waitings:\n\n*   Espresso—The `IdlingResource` and\n        third-party\
    \ `ConditionWatcher`\n        classes can be used as waiting mechanisms, including\
    \ both networks\n        related and element presence waitings. Both waiters should\
    \ be\n        implemented for each specific case."
  trans: "\n# 图 7-3：创建任务视图中的无障碍问题\n\n图 7-3 展示了示例待办事项应用中存在无障碍问题的几个无障碍分析实例。\n\n![../images/469090_1_En_7_Chapter/469090_1_En_7_Fig3_HTML.jpg](img/469090_1_En_7_Fig3_HTML.jpg)\n\
    \n**图 7-3** 创建任务视图中的无障碍问题\n\n## 练习 19：执行无障碍测试\n\n1. 安装无障碍扫描器应用并启用无障碍检查。启动示例待办事项应用，对整个应用执行无障碍检查。观察问题类型。\n\
    2. 仅使用 `AccessibilityChecks.enable()` 选项，从 `AccessibilityTest.kt` 类中运行测试。观察测试结果。\n\
    3. 使用 `setRunChecksFromRootView(true)` 选项，从 `AccessibilityTest.kt` 类中运行测试。观察测试结果。\n\
    4. 如 `AccessibilityTest.kt` 类的 `setAccessibilityPrefs()` 方法所示，抑制某些无障碍失败问题，然后再次运行测试。观察测试结果。\n\
    5. 添加 `setThrowExceptionForErrors(false)` 参数并运行测试。观察测试结果和设备 `logcat` 日志。\n\n##\
    \ 总结\n\n遗憾的是，无障碍测试常常被忽视，人们主要关注功能测试。乍一看可能不清晰，但良好的无障碍支持同样重要。其主要目标是使视障人士能够使用应用，但它也有不错的外溢效果——它能让你的应用更易于测试，并帮助你理解不同的应用使用场景。它甚至可能让你的应用在\
    \ Google PlayStore 上获得更高评分，因为 Android 爬行算法可能会从无障碍角度分析应用，并优先推荐那些具有良好无障碍支持的应用。\n\
    \n# 8. Espresso 与 UI Automator：完美组合\n\nEspresso 是一个完美且快速的测试自动化框架，但它有一个重要的限制——我们只允许在测试应用的上下文内进行操作。这意味着无法针对以下使用场景自动化测试：\n\
    \n- 点击应用推送通知\n- 访问系统设置\n- 从另一个应用导航到正在测试的应用，反之亦然\n\n这种限制的原因在于 Android 测试工具（Instrumentation）的特性。由于在\
    \ Espresso 测试运行期间，被测试应用和测试应用进程被生成，我们不允许与移动设备上安装的其他应用进行交互，例如通知栏、相机或系统设置应用。但可以使用\
    \ UI Automator 来访问它们。UI 测试框架适用于跨应用的功能性 UI 测试。\n\n> **注意**  \n> UI Automator 测试框架支持\
    \ Android 4.3（API 级别 18）及更高版本。\n\n## UI Automator 的主要特性\n\nUI Automator 的主要特性包括以下内容：\n\
    \n- 一个用于检查布局层次结构的 `uiautomatorviewer`。从 Android Studio 2.3 开始，它已被监视器工具取代。\n- 一个用于检索设备状态信息并对其执行操作的\
    \ API。示例包括按下设备主页或返回按钮、更改设备旋转方向、打开通知和截取屏幕截图。\n- 支持跨应用 UI 测试的 API。\n\n我们将稍微关注一下\
    \ UI Automator 的 API：\n\n- **By**——`By` 是一个实用类，允许以简洁的方式创建 `BySelector`。其主要功能是使用简化的语法提供用于构造\
    \ `BySelector` 的静态工厂方法。例如，你会使用 `findObject(By.text(\"foo\"))` 而不是 `findObject(new\
    \ BySelector().text(\"foo\"))` 来选择文本值为 `\"foo\"` 的 UI 元素。\n- **BySelector**——`BySelector`\
    \ 在调用 `findObject(BySelector)` 期间指定匹配 UI 元素的标准。\n- **Configurator**——允许你设置运行 UI\
    \ Automator 测试的关键参数。新设置会立即生效，并且可以在测试运行期间的任何时间更改。\n- **UiCollection**——用于枚举容器中的\
    \ UI 元素，以便根据子元素的文本或描述来计数或定位子元素。\n- **UiObject**——`UiObject` 是视图的一种表示形式。它不会以对象引用的方式直接绑定到任何视图。`UiObject`\
    \ 包含有助于在运行时根据其构造函数中指定的 [`UiSelector`](https://developer.android.com/reference/android/support/test/uiautomator/UiSelector.html)\
    \ 属性来定位匹配视图的信息。创建 `UiObject` 的实例后，它可以重新用于匹配选择器标准的不同视图。\n- **UiObject2**——`UiObject2`\
    \ 表示一个 UI 元素。与 `UiObject` 不同，它绑定到特定的视图实例，并且如果底层视图对象被销毁，可能会变得过时。因此，如果 UI 发生显著变化，可能需要调用\
    \ `findObject(BySelector)` 来获取新的 `UiObject2` 实例。\n- **UiScrollable**——`UiScrollable`\
    \ 是一个 [`UiCollection`](https://developer.android.com/reference/android/support/test/uiautomator/UiCollection.html)，并提供对可滚动布局元素中项目搜索的支持。此类可用于水平或垂直可滚动的控件。\n\
    - **UiSelector**——指定测试目标在布局层次结构中的元素，通过文本值、内容描述、类名和状态信息等属性进行过滤。你还可以根据元素在布局层次结构中的位置来定位元素。\n\
    \n除了这个 API 列表之外，我们还应该熟悉以下框架类：\n\n- **Until**——`Until` 类提供了用于构造常见条件的工厂方法。\n\n>\
    \ **注意**  \n> UI Automator 测试框架是一个基于 Instrumentation 的 API，并与 `AndroidJUnitRunner`\
    \ 测试运行器配合使用。这一事实允许我们在同一个测试中将 Espresso 与 UI Automator 代码一起使用。\n\n## 开始使用 UI Automator\n\
    \n要开始使用 UI Automator，我们首先应在 `build.gradle` 文件中设置依赖项，如下所示。\n\n**`build.gradle`\
    \ 文件中的 UI Automator Android 测试支持库依赖项：**\n\n```groovy\nandroidTestImplementation\
    \ 'com.android.support.test.uiautomator:uiautomator-v18:2.1.3'\n```\n\n并且还需要设置\
    \ AndroidX 测试库依赖项。\n\n**`build.gradle` 文件中的 UI Automator AndroidX 测试库依赖项：**\n\n\
    ```groovy\nandroidTestImplementation 'androidx.test.uiautomator:uiautomator:2.2.0'\n\
    ```\n\n让我们从我们已经熟悉的 Espresso 角度来分析 UI Automator，并试图弄清楚它们有多不同。我们还将考虑 UI Automator\
    \ 的优势和劣势：\n\n- **处理应用转场：**\n  - Espresso——自动处理窗口转场。\n  - UI Automator——不支持自动窗口转场，即在活动或片段之间切换。你应该显式地使用等待。\n\
    \n- **定位 UI 元素：**\n  - Espresso——使用核心的 Espresso `onView()` 和 `onData()` 方法，配合视图匹配器或数据匹配器来定位\
    \ UI 元素。\n  - UI Automator——与 Espresso 类似，UI Automator 有自己的核心 `UiDevice` 类。它包含诸如\
    \ `hasObject(BySelector)`、`findObject(BySelector)` 和 `findObjects(BySelector)`\
    \ 之类的方法，用于搜索元素或检查其在应用 UI 中的存在情况。\n\n- **等待机制：**\n  - Espresso——`IdlingResource`\
    \ 和第三方 `ConditionWatcher` 类可用作等待机制，包括网络相关等待和元素存在等待。两种等待器都应根据每个具体情况进行实现。\n"
- fmt: "- **UI Automator**—Unlike Espresso, UI Automator has defined `wait()` and\
    \ `performActionAndWait()` methods in the `UiDevice` class. Waitings can be easily\
    \ tweaked by providing custom `SearchCondition` or `EventCondition` parameters.\n\
    \n- **UI/view actions**:\n\n  - **Espresso**—Supports a wide range of view actions\
    \ with the possibility to define your own. It’s able to interact only with the\
    \ application being tested.\n  - **UI Automator**—As mentioned, the UI Automator\
    \ can interact with any application on the device. But the degree of action is\
    \ very limited.\n\n- **Device controls**:\n\n  - **Espresso**—No support.\n  -\
    \ **UI Automator**—Provides a long list of device control methods starting from\
    \ the device home button click to orientation control.\n\n- **Reporting**:\n\n\
    \  - **Espresso**—Supports much richer test failure reports and makes it easy\
    \ to analyze test failures.\n  - **UI Automator**—Usually returns nondescriptive\
    \ stacktraces upon failure, which should be analyzed to realize what went wrong.\n\
    \nBased on these differences, you can see that in combination, these two form\
    \ a very powerful feature set that covers almost all the needs in the Android\
    \ test automation.\n\nTo more easily understand the UI Automator framework, we\
    \ can describe its features using verbs:\n\n- `UiDevice().find`—Shows UI Automator\
    \ find methods.\n\n  ![../images/469090_1_En_8_Chapter/469090_1_En_8_Figa_HTML.jpg](images/469090_1_En_8_Chapter/469090_1_En_8_Figa_HTML.jpg)\n\
    \n- `UiDevice().act`—Consolidates all actions that can be done with the device,\
    \ from pressing the back device button to a shell command execution.\n\n  ![../images/469090_1_En_8_Chapter/469090_1_En_8_Figb_HTML.jpg](images/469090_1_En_8_Chapter/469090_1_En_8_Figb_HTML.jpg)\n\
    \n- `UiDevice().wait`—Waits for a certain condition to be fulfilled.\n\n  ![../images/469090_1_En_8_Chapter/469090_1_En_8_Figc_HTML.jpg](images/469090_1_En_8_Chapter/469090_1_En_8_Figc_HTML.jpg)\n\
    \n- `UiDevice().watch`—Represents a group of methods used to create and control\
    \ condition watchers.\n\n  ![../images/469090_1_En_8_Chapter/469090_1_En_8_Figd_HTML.jpg](images/469090_1_En_8_Chapter/469090_1_En_8_Figd_HTML.jpg)\n\
    \n- `UiDevice().get`—Retrieves device or application parameters.\n\n  ![../images/469090_1_En_8_Chapter/469090_1_En_8_Fige_HTML.jpg](images/469090_1_En_8_Chapter/469090_1_En_8_Fige_HTML.jpg)\n\
    \n- `UiDevice().set`—Enables or disables layout hierarchy compression.\n\n  ![../images/469090_1_En_8_Chapter/469090_1_En_8_Figf_HTML.jpg](images/469090_1_En_8_Chapter/469090_1_En_8_Figf_HTML.jpg)\n\
    \nIn the following sections, we will see how most of these `UiDevice` methods\
    \ can be used when Espresso for Android cannot handle the issue.\n\n## Finding\
    \ and Acting on UI Elements\n\nThe main UI Automator functionality is locating\
    \ UI elements and performing actions on them. If we talk about UI Automator usage\
    \ in combination with Espresso, then it can be used to navigate through third-party\
    \ or system applications, take screenshots or, for example, execute shell commands.\
    \ But, of course, the UI Automator can act as a standalone test automation framework.\n\
    \nAs was described, the UI element search is done by the `findObject()` and `findObjects()`\
    \ methods. The `findObject()` method takes instances of the following classes\
    \ as parameters that specify criteria for matching UI elements in the hierarchy:\n\
    \n- `UiSelector()`\n- `BySelector()`\n\nThe conceptual difference between them\
    \ is in the way that search criteria specified by each selector is applied. To\
    \ understand this, we will first look at the `UiSelector` sample tests implemented\
    \ in the `UiAutomatorUiSelectorTest.kt` test class.\n\n*chapter8* *.UiAutomatorUiSelectorTest.uiSelectorSample().*\n\
    \n```kotlin\nprivate val instrumentation = InstrumentationRegistry.getInstrumentation()\n\
    private val uiDevice: UiDevice = UiDevice.getInstance(instrumentation)\nprivate\
    \ val fourSecondsTimeout = 4000L\n\n@get:Rule\nvar activityTestRule = ActivityTestRule(TasksActivity::class.java)\n\
    \n/**\n* Creates two TO-DO items, marks first as done and verifies its text.\n\
    */\n@Test\nfun uiSelectorSample() {\n    // Add first To-Do item.\n    uiDevice.findObject(\n\
    \        UiSelector().resourceId(\n            \"com.example.android.architecture.blueprints.todoapp.mock:id/fab_add_task\"\
    ))\n        .click()\n    uiDevice.findObject(UiSelector().resourceId(\n     \
    \   \"com.example.android.architecture.blueprints.todoapp.mock:id/add_task_title\"\
    ))\n        .text = \"item 1\"\n    uiDevice.findObject(UiSelector().resourceId(\n\
    \        \"com.example.android.architecture.blueprints.todoapp.mock:id/fab_edit_task_done\"\
    ))\n        .click()\n    uiDevice.findObject(UiSelector().text(\"TO-DO saved\"\
    )).waitUntilGone(fourSecondsTimeout)\n\n    // Add second To-Do item.\n    uiDevice.findObject(UiSelector().resourceId(\n\
    \        \"com.example.android.architecture.blueprints.todoapp.mock:id/fab_add_task\"\
    ))\n        .click()\n    uiDevice.findObject(UiSelector().resourceId(\n     \
    \   \"com.example.android.architecture.blueprints.todoapp.mock:id/add_task_title\"\
    ))\n        .text = \"item 2\"\n    uiDevice.findObject(UiSelector().resourceId(\n\
    \        \"com.example.android.architecture.blueprints.todoapp.mock:id/fab_edit_task_done\"\
    ))\n        .click()\n    uiDevice.findObject(UiSelector().text(\"TO-DO saved\"\
    )).waitUntilGone(fourSecondsTimeout)\n\n    // Mark first To-Do item as done,\
    \ click on it and validate text.\n    uiDevice.findObject(UiSelector().className(RecyclerView::class.java.name)\n\
    \        .childSelector(UiSelector().checkable(true)))\n        .click()\n   \
    \ uiDevice.findObject(UiSelector().className(RecyclerView::class.java.name)\n\
    \        .childSelector(UiSelector().className(LinearLayout::class.java)).instance(0))\n\
    \        .click()\n\n    val detailViewTitle = uiDevice.findObject(UiSelector().resourceId(\n\
    \        \"com.example.android.architecture.blueprints.todoapp.mock:id/task_detail_title\"\
    ))\n    assertTrue(\"To-Do \\\"item 1\\\" is not shown.\", detailViewTitle.exists())\n\
    \    assertTrue(\"To-Do \\\"item 1\\\" is not shown.\", detailViewTitle.text.equals(\"\
