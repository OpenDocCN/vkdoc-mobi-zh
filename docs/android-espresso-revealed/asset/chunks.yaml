    \ \"//label[@id=\\\"selection_result\\\"]\"))\n.perform(webScrollIntoView())\n\
    .check(webMatches(getText(), equalTo(\"Select option\")))\n}\n```\n\nNote\nWeb\
    \ browser developer tools can help locate elements by XPATH or CSS\nselectors.\
    \ It is enough to use the CMD+F or CTRL+F shortcut and `try` expression on the\n\
    search field. Elements are highlighted in the page layout.\n\nThe next sample\
    \ test case shows how to operate on elements inside the\ndialog popup.\n\n*chapter6*\
    \ *.* \n*WebViewTest.opensModal()*  *.*\n\n```\n@Test\nfun opensModal() {\nopenDrawer()\n\
    onView(allOf(withId(R.id.design_menu_item_text),\nwithText(R.string.settings_title))).perform(click())\n\
    onData(instanceOf(PreferenceActivity.Header::class.java))\n.inAdapterView(withId(android.R.id.list))\n\
    .atPosition(3)\n.perform(click())\nonWebView()\n// Find button and click.\n.withElement(findElement(Locator.ID,\
    \ \"updateDetails\"))\n.perform(webClick())\n// Find edit text field and input\
    \ text in the popped up dialog.\n.withElement(findElement(Locator.ID, \"modal_text_input\"\
    ))\n.perform(webKeys(\"Text from modal\"))\n// Find and click Confirm button.\n\
    .withElement(findElement(Locator.ID, \"confirm\"))\n.perform(webClick())\n// Verify\
    \ text from modal is set in label.\n.withElement(findElement(Locator.ID, \"modal_message\"\
    ))\n.check(webMatches(getText(), equalTo(\"Text from modal\")))\n}\n```\n\nIn\
    \ the current case, the dialog belongs to the HTML page and the\nelements inside\
    \ can be easily found using the same `onWebView()`\nmethod , as shown\nin Figure\
    \ [6-7](#469090_1_En_6_Chapter.xhtml#Fig7).\n\n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig7_HTML.jpg](images/469090_1_En_6_Chapter/469090_1_En_6_Fig7_HTML.jpg)\n\
    \nFigure 6-7\nThe HTML <dialog> shown inside the Android web view client\n\nThe\
    \ next test case is about testing the interaction with the HTML\n`<select>`\n\
    component. This turns out to be a problematic topic. To begin, the\nfollowing\
    \ test case was implemented.\n\n*chapter6* *.* \n*WebViewTest.failsToClickSelectDropDown()*\
    \  *.*\n\n```\n@Test\nfun failsToClickSelectDropDown() {\nopenDrawer()\nonView(allOf(withId(R.id.design_menu_item_text),\n\
    withText(R.string.settings_title))).perform(click())\nonData(instanceOf(PreferenceActivity.Header::class.java))\n\
    .inAdapterView(withId(android.R.id.list))\n.atPosition(3)\n.perform(click())\n\
    onWebView()\n// Supposed to click on select.\n.withElement(findElement(Locator.ID,\
    \ \"selection_id\"))\n.perform(webClick())\n// Select list is not shown, so test\
    \ fails.\n.check(webMatches(getText(), equalTo(\"Item 3\")))\n}\n```\n\nThe thing\
    \ is that this test case fails on the last check only because\nthe HTML `<select>`\n\
    component list is not shown, even though `webClick()` was sent\nto the found element.\
    \ Changing the locator type doesn’t help in this\ncase and it is not needed because\
    \ the element was found. This leads to\nthe fact that something is wrong with\
    \ the `webClick()` action\nonly for the HTML `<select>`\nelement. And after a\
    \ bit of research, it turned out to be a known\nproblem and there is even a workaround\
    \ to make it work with the\nadditional button:\n\n*Browsers do not allow expanding\
    \ <select> in pure\nJavaScript, that control can be expanded only by directly\
    \ clicking on it\nusing the mouse. The “select.click()” won't work. But there\
    \ is a\nsolution. We imitate expanded <select> control by creating another\nselect\
    \ with multiple options being displayed at once, this can be done\nby setting\
    \ the “size” parameter. That multiselect will be positioned\nabsolutely over the\
    \ old single-option select control, and the old one\nwill be hidden using style’s\
    \ visibility. That way the layout is kept the\nsame, and the new control is displayed\
    \ seamlessly. The new control looks\nonly little differently, but that shouldn't\
    \ be a problem, see it for\nyourself in screenshots below.*\n\n[`https://code.google.com/archive/p/expandselect/`](https://code.google.com/archive/p/expandselect/)"
  trans: "2.  类似于步骤 1，使用监控应用程序进行布局转储。观察哪些`WebView`属性可以使用监控工具进行分析，并将其与`LayoutInspector`的结果进行比较。\n\
    \n## 使用 Espresso-Web 编写测试\n\n现在我们可以深入探讨 Espresso 的 Web 测试。为了更好地理解，请在浏览器中打开主应用资源文件夹中的`web_form.html`和`web_form_response.html`文件，打开浏览器开发者工具，然后开始检查网页。假设您对\
    \ HTML 页面结构有基本了解，并能够使用浏览器开发者工具检查网页 UI 元素。\n\n使用 Espresso-Web，可以通过以下定位器类型在布局中定位\
    \ UI 元素：\n\n*   `CLASS_NAME(\"className\")`\n*   `CSS_SELECTOR(\"css\")`\n*  \
    \ `ID(\"id\")`\n*   `LINK_TEXT(\"linkText\")`\n*   `NAME(\"name\")`\n*   `PARTIAL_LINK_TEXT(\"\
    partialLinkText\")`\n*   `TAG_NAME(\"tagName\")`\n*   `XPATH(\"xpath\")`\n\n图\
    \ 6-6 展示了`web_form.html`页面在 Chrome 开发者工具视图中的截图。\n\n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig6_HTML.jpg](img/469090_1_En_6_Fig6_HTML.jpg)\n\
    \n**图 6-6** Chrome 浏览器开发者工具视图\n\n该网页的设计旨在展示 Espresso-Web 的大部分功能。打开`chapter6.WebViewTest.kt`类以查看已实现的测试用例。以下是`updatesLabelAndOpensNewPage()`测试用例。\n\
    \n*chapter6.* *`WebViewTest.updatesLabelAndOpensNewPage()`* *.*\n\n```\n@Test\n\
    fun updatesLabelAndOpensNewPage() {\n    openDrawer()\n    onView(allOf(withId(R.id.design_menu_item_text),\n\
    \                 withText(R.string.settings_title))).perform(click())\n    onData(instanceOf(PreferenceActivity.Header::class.java))\n\
    \        .inAdapterView(withId(android.R.id.list))\n        .atPosition(3)\n \
    \       .perform(click())\n    onWebView()\n        .forceJavascriptEnabled()\n\
    \        // Find edit text and type text.\n        .withElement(findElement(Locator.ID,\
    \ \"text_input\"))\n        .perform(webKeys(\"Espresso WebView testing\"))\n\
    \        // Find button by id and click.\n        .withElement(findElement(Locator.ID,\
    \ \"submitBtn\"))\n        .perform(webClick())\n        // Find element by id\
    \ and check its text.\n        .withElement(findElement(Locator.ID, \"response\"\
    ))\n        .check(webMatches(getText(), containsString(\"Espresso+WebView+testing\"\
    )))\n}\n```\n\n这里一切都很简单。导航到设置部分并点击`WebView`示例项后，`WebView`通过 Android `WebViewClient`显示。Espresso-Web\
    \ 会处理网页加载，因此无需实现额外的等待器。此测试用例中的所有元素都通过其 ID 定位，这是最理想的情况。\n\n下一个测试用例展示了如何通过 CSS 属性查找\
    \ Web 元素。这是常见的情况，当元素 ID 是动态生成且无法依赖它们时使用。\n\n*chapter6.* *`WebViewTest.selectsRadioButtonWithCss()`*\
    \ *.*\n\n```\n@Test\nfun selectsRadioButtonWithCss() {\n    openDrawer()\n   \
    \ onView(allOf(withId(R.id.design_menu_item_text),\n                 withText(R.string.settings_title))).perform(click())\n\
    \    onData(instanceOf(PreferenceActivity.Header::class.java))\n        .inAdapterView(withId(android.R.id.list))\n\
    \        .atPosition(3)\n        .perform(click())\n    onWebView()\n        //\
    \ Find radio button by CSS.\n        .withElement(findElement(Locator.CSS_SELECTOR,\
    \ \"input[value=\\\"rb1\\\"]\"))\n        .perform(webClick())\n}\n```\n\n另一种定位\
    \ Web 元素的方式是使用`XPATH`选择器，如下所示。\n\n*chapter6.* *`WebViewTest.findsElementsByXpath()`*\
    \ *.*\n\n```\n@Test\nfun findsElementsByXpath() {\n    openDrawer()\n    onView(allOf(withId(R.id.design_menu_item_text),\n\
    \                 withText(R.string.settings_title))).perform(click())\n    onData(instanceOf(PreferenceActivity.Header::class.java))\n\
    \        .inAdapterView(withId(android.R.id.list))\n        .atPosition(3)\n \
    \       .perform(click())\n    onWebView()\n        // Find label XPATH and check\
    \ its text.\n        .withElement(findElement(Locator.XPATH, \"//label[@id=\\\"\
    selection_result\\\"]\"))\n        .perform(webScrollIntoView())\n        .check(webMatches(getText(),\
    \ equalTo(\"Select option\")))\n}\n```\n\n**注意：** Web 浏览器开发者工具可以帮助通过`XPATH`或 CSS\
    \ 选择器定位元素。只需使用`CMD+F`或`CTRL+F`快捷键并在搜索框中输入`try`表达式，元素即可在页面布局中高亮显示。\n\n下一个示例测试用例展示了如何操作对话框弹出窗口内的元素。\n\
    \n*chapter6.* *`WebViewTest.opensModal()`* *.*\n\n```\n@Test\nfun opensModal()\
    \ {\n    openDrawer()\n    onView(allOf(withId(R.id.design_menu_item_text),\n\
    \                 withText(R.string.settings_title))).perform(click())\n    onData(instanceOf(PreferenceActivity.Header::class.java))\n\
    \        .inAdapterView(withId(android.R.id.list))\n        .atPosition(3)\n \
    \       .perform(click())\n    onWebView()\n        // Find button and click.\n\
    \        .withElement(findElement(Locator.ID, \"updateDetails\"))\n        .perform(webClick())\n\
    \        // Find edit text field and input text in the popped up dialog.\n   \
    \     .withElement(findElement(Locator.ID, \"modal_text_input\"))\n        .perform(webKeys(\"\
    Text from modal\"))\n        // Find and click Confirm button.\n        .withElement(findElement(Locator.ID,\
    \ \"confirm\"))\n        .perform(webClick())\n        // Verify text from modal\
    \ is set in label.\n        .withElement(findElement(Locator.ID, \"modal_message\"\
    ))\n        .check(webMatches(getText(), equalTo(\"Text from modal\")))\n}\n```\n\
    \n在当前情况下，对话框属于 HTML 页面，使用相同的`onWebView()`方法即可轻松找到其中的元素，如图 6-7 所示。\n\n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig7_HTML.jpg](img/469090_1_En_6_Fig7_HTML.jpg)\n\
    \n**图 6-7** Android WebView 客户端内显示的 HTML `<dialog>`。\n\n下一个测试用例是关于测试与 HTML `<select>`组件的交互。事实证明这是一个棘手的问题。首先，实现了以下测试用例。\n\
    \n*chapter6.* *`WebViewTest.failsToClickSelectDropDown()`* *.*\n\n```\n@Test\n\
    fun failsToClickSelectDropDown() {\n    openDrawer()\n    onView(allOf(withId(R.id.design_menu_item_text),\n\
    \                 withText(R.string.settings_title))).perform(click())\n    onData(instanceOf(PreferenceActivity.Header::class.java))\n\
    \        .inAdapterView(withId(android.R.id.list))\n        .atPosition(3)\n \
    \       .perform(click())\n    onWebView()\n        // Supposed to click on select.\n\
    \        .withElement(findElement(Locator.ID, \"selection_id\"))\n        .perform(webClick())\n\
    \        // Select list is not shown, so test fails.\n        .check(webMatches(getText(),\
    \ equalTo(\"Item 3\")))\n}\n```\n\n问题在于，这个测试用例仅在最后一项检查上失败，因为 HTML `<select>`组件列表并未显示，尽管`webClick()`已发送到找到的元素。更改定位器类型在这种情况下无济于事，也没有必要，因为元素已经被找到。这导致一个事实：问题出在仅针对\
    \ HTML `<select>`元素的`webClick()`操作上。经过一番研究，发现这是一个已知问题，甚至有一个变通方法可以通过附加按钮使其工作：\n\
    \n*浏览器不允许通过纯 JavaScript 展开`<select>`，该控件只能通过鼠标直接点击来展开。`select.click()`将不起作用。但有一个解决方案。我们通过创建另一个一次显示多个选项的选择框来模拟展开的`<select>`控件，这可以通过设置`size`参数来实现。这个多选选择框将绝对定位在旧的单一选项选择框之上，并且旧的选项将通过样式的`visibility`属性隐藏。这样布局保持不变，新控件无缝显示。新控件看起来只是略有不同，但这不应该成为问题，请自行在下面的截图中查看。*\n\
    \n[`https://code.google.com/archive/p/expandselect/`](https://code.google.com/archive/p/expandselect/)"
- fmt: "### 正文排版\n\n但有一个来自测试端的变通方法，无需在网页上引入 UI 组件。当停留在显示 WebView 的屏幕上时，我们可以在`<select>`元素获得焦点时，通过发送`ViewActions.pressKey(KeyEvent.KEYCODE_SPACE)`事件来展开它。就像通过浏览器操作一样。要将焦点移动到`<select>`元素，我们发送所需数量的\
    \ Tab 操作以导航到目标 UI 元素——`ViewActions.pressKey(KeyEvent.KEYCODE_TAB)`。不幸的是，测试需要休眠一小段时间，以便发送的操作能在\
    \ WebView 中被应用。以下是在示例应用中的实现方式。\n\n*章节 6* **.** *`WebViewTest.verifiesSelectDropDown()`**.*\n\
    \n```kotlin\n@Test\nfun verifiesSelectDropDown() {\n    openDrawer()\n    onView(allOf(withId(R.id.design_menu_item_text),\n\
    \            withText(R.string.settings_title))).perform(click())\n    onData(instanceOf(PreferenceActivity.Header::class.java))\n\
    \            .inAdapterView(withId(android.R.id.list))\n            .atPosition(3)\n\
    \            .perform(click())\n    // Send TAB keys as many times as needed to\
    \ reach the \"select\".\n    Thread.sleep(300)\n    onView(withId(R.id.web_view)).perform(pressKey(KeyEvent.KEYCODE_TAB))\n\
    \    Thread.sleep(300)\n    onView(withId(R.id.web_view)).perform(pressKey(KeyEvent.KEYCODE_TAB))\n\
    \    Thread.sleep(300)\n    onView(withId(R.id.web_view)).perform(pressKey(KeyEvent.KEYCODE_TAB))\n\
    \    Thread.sleep(300)\n    onView(withId(R.id.web_view)).perform(pressKey(KeyEvent.KEYCODE_TAB))\n\
    \    Thread.sleep(300)\n    onView(withId(R.id.web_view)).perform(pressKey(KeyEvent.KEYCODE_TAB))\n\
    \    Thread.sleep(300)\n    onView(withId(R.id.web_view)).perform(pressKey(KeyEvent.KEYCODE_TAB))\n\
    \    Thread.sleep(300)\n    // Send SPACE key to expand \"select\".\n    onView(withId(R.id.web_view)).perform(pressKey(KeyEvent.KEYCODE_SPACE))\n\
    \    /**\n     * At this point android platform popup is shown.\n     * Use Espresso\
    \ native methods to select item from the list.\n     */\n    onView(withText(\"\
    Item 3\")).click()\n    onWebView()\n    // Check that text from select list is\
    \ set into the label.\n            .withElement(findElement(Locator.ID, \"selection_result\"\
    ))\n            .check(webMatches(getText(), equalTo(\"Item 3\")))\n}\n```\n\n\
    这个测试用例功能完整，但看起来不够优雅。通过为`ViewInteraction`添加一个额外的扩展函数，我们可以清理测试代码。\n\n*测试用例 chapter6*\
    \ **.** *`WebViewTest.verifiesSelectDropDown()`**.*\n\n```kotlin\n/**\n * Expand\
    \ function for web view test case.\n * It contains a Thread.sleep() each time\
    \ key event is sent.\n *\n * @param key - keycode from [KeyEvent]\n * @param milliseconds\
    \ - milliseconds to sleep\n * @param count - amount of times [KeyEvent] should\
    \ be executed\n */\nfun ViewInteraction.pressKeyAndSleep(key: Int, milliseconds:\
    \ Long, count: Int = 1): ViewInteraction {\n    for (i in 1..count) {\n      \
    \  /**\n         * Having Thread.sleep() in tests is a bad practice.\n       \
    \  * Here we are using it just to solve specific issue and nothing more.\n   \
    \      */\n        Thread.sleep(milliseconds)\n        perform(ViewActions.pressKey(key))\n\
    \    }\n    return this\n}\n```\n\n`verifiesSelectDropDown()`测试用例变得更加易读。\n\n*测试用例\
    \ chapter6* **.** *`WebViewTest.verifiesSelectDropDown()`**.*\n\n```kotlin\n@Test\n\
    fun verifiesSelectDropDown() {\n    openDrawer()\n    onView(allOf(withId(R.id.design_menu_item_text),\n\
    \            withText(R.string.settings_title))).perform(click())\n    onData(instanceOf(PreferenceActivity.Header::class.java))\n\
    \            .inAdapterView(withId(android.R.id.list))\n            .atPosition(3)\n\
    \            .perform(click())\n    onView(withId(R.id.web_view))\n          \
    \  // Send TAB keys as many times as needed to reach the \"select\".\n       \
    \     .pressKeyAndSleep(KeyEvent.KEYCODE_TAB, 500, 6)\n            // Send SPACE\
    \ key to expand \"select\".\n            .perform(ViewActions.pressKey(KeyEvent.KEYCODE_SPACE))\n\
    \    /**\n     * At this point android platform popup is shown.\n     * Use Espresso\
    \ native methods to select item from the list.\n     */\n    onView(withText(\"\
    Item 3\")).click()\n    onWebView()\n            // Check that text from select\
    \ list is set into the label.\n            .withElement(findElement(Locator.ID,\
    \ \"selection_result\"))\n            .check(webMatches(getText(), equalTo(\"\
    Item 3\")))\n}\n```\n\n关于`<select>`下拉菜单的一点说明。它以原生平台弹出窗口的形式呈现给用户，可以通过 Espresso\
    \ 方法与其进行交互，如图 [6-8](#469090_1_En_6_Chapter.xhtml#Fig8) 所示。\n\n![../images/469090_1_En_6_Chapter/469090_1_En_6_Fig8_HTML.jpg](images/469090_1_En_6_Chapter/469090_1_En_6_Fig8_HTML.jpg)\n\
    \n**Figure 6-8** HTML `<select>` 下拉选项显示在 Android WebView 客户端内部\n\n`WebViewTest.kt`类中的最后一个测试用例包含了其余`Locator`类型的使用示例。\n\
    \n*测试用例 chapter6* **.** *`WebViewTest.showsOtherLocatorsSample()`**.*\n\n```kotlin\n\
    @Test\nfun showsOtherLocatorsSample() {\n    openDrawer()\n    onView(allOf(withId(R.id.design_menu_item_text),\n\
    \            withText(R.string.settings_title))).perform(click())\n    onData(instanceOf(PreferenceActivity.Header::class.java))\n\
    \            .inAdapterView(withId(android.R.id.list))\n            .atPosition(3)\n\
    \            .perform(click())\n    onWebView()\n            // Find element by\
    \ Locator.NAME\n            .withElement(findElement(Locator.NAME, \"text_input\"\
    ))\n            .perform(webScrollIntoView())\n            // Find element by\
    \ Locator.LINK_TEXT\n            .withElement(findElement(Locator.LINK_TEXT, \"\
    Espresso Web.\"))\n            .perform(webScrollIntoView())\n            // Find\
    \ element by Locator.PARTIAL_LINK_TEXT\n            .withElement(findElement(Locator.PARTIAL_LINK_TEXT,\
    \ \"Espresso\"))\n            .perform(webScrollIntoView())\n            // Find\
    \ element by Locator.CLASS_NAME\n            .withElement(findElement(Locator.CLASS_NAME,\
    \ \"header\"))\n            .check(webMatches(webScrollIntoView(), `is`(true)))\n\
    }\n```\n\n这个测试用例展示了如何将`webScrollIntoView()`动作作为参数传递给`WebAssertion.webMatches()`方法。当找不到我们操作的元素时，这种方法提供了更易读的错误描述。\n\
    \n### 练习 18\n\n**编写 WebView 测试**\n\n1.  在 Web 浏览器中打开`web_form.html`页面并分析页面结构。通过\
    \ XPATH 和 CSS 选择器搜索元素。\n\n2.  更新`selectsRadioButtonWithCss()`测试，使得选中标签为“Option\
    \ 2”的单选按钮。\n\n3.  编写一个测试，仅通过 XPATH 查找所有元素。\n\n4.  编写一个测试，仅通过 CSS 定位器查找所有元素。\n\n\
    ### 总结\n\nEspresso-Web 是 Espresso API 的一个很好的补充。它允许你测试包含 WebView 组件的混合应用程序。是的，它并不完美，不能用于纯粹的\
    \ Web 应用程序测试，但它以类似 Espresso 的方式很好地完成了自己的工作。\n\n## 7. 无障碍测试\n\n大多数移动应用程序的开发都基于对用户或用户类型的既定假设。在软件测试中，术语*用户画像*反映了这些用户类型，包括他们可能的使用流程以及应用程序可能如何在日常活动中帮助他们。尽管用户画像在软件开发生命周期的早期阶段就已被创建，但它们可能没有考虑残疾人群体。\n\
    全球约有 3 亿人患有视力障碍，他们借助安装在自己移动设备上的特定无障碍工具来使用移动应用程序。\n\n### Android 无障碍工具\n\nAndroid\
    \ 平台为视力障碍人士提供了三种工具类型：\n\n*   **TalkBack** — 预装的屏幕阅读器应用程序，允许用户在无需视觉访问屏幕的情况下与 Android\
    \ 应用程序进行交互。视障用户可能依赖 TalkBack 来使用你的应用。\n\n*   **BrailleBack** — 一项无障碍服务，帮助视障用户使用盲文设备。与\
    \ TalkBack 应用程序协同工作，提供组合的盲文和语音体验。\n\n*   **Voice Access** — 允许用户通过语音命令控制其 Android\
    \ 设备。Voice Access 适用于运行 Android 5.0（API 级别 21）及更高版本的设备。"
  raw: "But there is a workaround from the testing side, without introducing\nUI components\
    \ on the web page. Being on the screen with the web view\nshown, we can expand\
    \ `<select>` by\nsending a `ViewActions.pressKey(KeyEvent.KEYCODE_SPACE)`\nevent\
    \ when it is focused. Just as if you do it via the browser. To move\nfocus to\
    \ the `<select>`\nelement, we send as many tab actions as needed to navigate to\
    \ the desired\nUI element—`ViewActions.pressKey(KeyEvent.KEYCODE_TAB)`.\nUnfortunately,\
    \ tests should sleep for a short amount of time, so the\nsent action can be applied\
