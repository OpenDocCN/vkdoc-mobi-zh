    # 在测试中结合使用 Espresso 与 UI Automator


    至此，你应该已经对如何将 UI Automator 测试框架作为独立的测试自动化工具有了清晰的认识，现在正是揭示在单个测试中同时使用 Espresso 与
    UI Automator 所带来的 Android 测试自动化全部威力的时候。为了演示这一点，我们将自动化一个用例，在该用例中，TO-DO 应用会发送一条通知，点击该通知后会向用户打开
    `TasksActivity`（即任务列表界面）。测试的第一部分从我们点击通知的那一刻开始使用 Espresso 进行自动化，之后将使用 UI Automator。最后，将再次使用
    Espresso 代码来验证应用的状态。


    让我们来看一下测试本身。


    `chapter8.*.EspressoUiAutomatorTest.*clickNotificationOpenMainPage()*.*`


    ```

    private val instrumentation = InstrumentationRegistry.getInstrumentation()

    private val uiDevice: UiDevice = UiDevice.getInstance(instrumentation)

    private val twoSeconds = 2000L

    @get:Rule

    var activityTestRule = ActivityTestRule(TasksActivity::class.java)

    /**

    * 点击被测应用触发的通知，并验证 TasksActivity 已显示。

    */

    @Test

    fun clickNotificationOpensTasksActivity() {

    openDrawer()

    onView(allOf(withId(R.id.design_menu_item_text),

    withText(R.string.settings_title))).perform(click())

    onData(CoreMatchers.instanceOf(PreferenceActivity.Header::class.java))

    .inAdapterView(withId(android.R.id.list))

    .atPosition(1)

    .onChildView(withId(android.R.id.title))

    .check(matches(withText("Notifications")))

    .perform(click())

    // 点击“发送通知”项

    onData(withKey("notifications_send"))

    .inAdapterView(allOf(

    withId(android.R.id.list),

    withParent(withId(android.R.id.list_container))))

    .check(matches(isDisplayed()))

    .perform(click())

    // 执行 UI Automator 操作。

    uiDevice.openNotification()

    // 通过文本点击通知，并等待应用出现。

    uiDevice.findObject(By.text("My notification"))

    .clickAndWait(Until.newWindow(), twoSeconds)

    // 使用 Espresso 验证应用布局

    onView(withId(R.id.noTasksIcon)).check(matches(isDisplayed()))

    }

    ```


    如果通知有延迟，我们可以使用 `wait()` 方法等待它。同一类中的第二个测试方法涵盖了这种情况。TO-DO 应用在发送通知时会有一个小延迟，测试通过等待通知对象来处理这一点。


    `chapter8.*.EspressoUiAutomatorTest*: 通过文本点击延迟通知。`


    ```

    // 等待并通过文本点击延迟通知。

    uiDevice.findObject(By.res("com.android.systemui:id/notification_stack_scroller"))

    .wait(Until.findObject(By.text("My notification")), 8000)

    .clickAndWait(Until.newWindow(), twoSeconds)

    ```


    如你所见，借助这两个框架，我们可以覆盖我们所需的大部分用例，从使用 Espresso 测试应用，到更复杂的情况，例如与通知交互、打开系统设置以及使用 UI
    Automator 处理其他第三方应用。


    ## 练习 20


    **使用 Espresso 与 UI Automator 实现一个练习测试**


    1.  实现一个使用 UI Automator `UiSelector` 的测试，该测试创建一个 TO-DO 项然后对其进行修改。


    2.  实现一个使用 UI Automator `BySelector` 的测试，该测试创建两个 TO-DO 项，标记其中一个为已完成，过滤出活动中的 TO-DO
    项，并进行验证。


    3.  实现一个测试，该测试打开 TO-DO 列表工具栏中的上下文菜单，然后点击分享按钮。修改现有的 `UiWatcher`，使其等待应用选择器中显示 Gmail
    应用图标/文本，并在 `UiWatcher` 内部点击它。


    4.  实现一个测试，该测试使用 Espresso 和 UI Automator 代码，自动化第 3 步中描述的过程。


    ## 总结


    根据其目标，Android UI 测试可能针对不同的应用：被测试应用、第三方应用，或两者兼有。对于第三方或混合应用，测试使用 UI Automator 框架进行，这是一个强大的测试工具，与纯
    Espresso 测试相比，它允许更广泛的测试覆盖率。结合 Espresso 和 UI Automator 框架可以创建出功能强大的 UI 测试，足以覆盖我们能想象到的大多数用例。


    # 9. 处理运行时系统操作与权限


    如今，大多数 Android 应用都支持多种语言环境，并且许多应用会请求不同的系统权限，例如访问设备相机的权限、位置权限以及写入外部存储的权限。


    随着 Android 平台的发展，应用权限的处理方式已转向有利于用户隐私。从 API 级别 23 开始，应用权限在应用运行时根据用户请求进行询问。此类权限由系统弹出窗口或系统对话框表示，不属于正在测试的应用的一部分。此外，用户可以随时从应用设置中撤销这些权限。当然，在运行
    UI 测试之前或期间，应妥善处理上述应用状态。


    本章解释了处理像权限请求对话框这类系统操作的不同方法，并描述了以编程方式更改 Android 模拟器系统语言的可行解决方案。


    ## 以编程方式更改模拟器系统语言


    直到 API 级别 27，Android 都提供了一种通过 `adb` 命令或直接从测试代码发送 Intent 来设置系统区域设置的可能性。这之所以能够实现，是因为
    `CustomLocale.apk` 预装在模拟器上，并且能够处理发送的 Intent。以下是 `adb shell am` 命令的示例：


    ```

    adb shell am broadcast -a com.android.intent.action.SET_LOCALE --es \

    com.android.intent.extra.LOCALE "en_US" com.android.customlocale2

    ```


    然而，从 API 级别 28 开始，`CustomLocale.apk` 应用已从模拟器映像中移除，这就需要另一种解决方案。仔细查看 Android 模拟器发布说明后（[`developer.android.com/studio/releases/emulator`](https://developer.android.com/studio/releases/emulator)），解决方案就变得清晰了。从
    Android 模拟器 27.2.9 版本（2018 年 5 月）开始，你可以在不重启模拟器的情况下加载 QuickBoot 快照。模拟器发布说明页面解释了如何借助“设置”部分中的模拟器“扩展控件”窗口手动执行此操作。请参见图
    9-1。


    ![../images/469090_1_En_9_Chapter/469090_1_En_9_Fig1_HTML.jpg](img/469090_1_En_9_Fig1_HTML.jpg)


    **图 9-1** 模拟器扩展控件


    当快照视图出现时，你将设备置于所需状态，然后点击“拍摄快照”按钮。将拍摄一个新的快照，并为其自动生成一个名称，该快照会显示在快照列表中。请参见图 9-2。


    ![../images/469090_1_En_9_Chapter/469090_1_En_9_Fig2_HTML.jpg](img/469090_1_En_9_Fig2_HTML.jpg)


    **图 9-2** 拍摄模拟器快照


    **注意：** 在模拟器“扩展控件”窗口中重命名快照并不会全局重命名它，而只是创建别名。实际的快照名称将保持不变。


    同样的事情也可以通过使用 `telnet` 控制台命令与 Android 模拟器通信来实现（有关模拟器 `telnet` 命令的更多信息，请访问 [`developer.android.com/studio/run/emulator-console`](https://developer.android.com/studio/run/emulator-console)）。在以下代码示例中，你将看到如何与正在运行的模拟器建立
    telnet 会话、列出现有快照、拍摄快照以及在模拟器运行时加载它。

