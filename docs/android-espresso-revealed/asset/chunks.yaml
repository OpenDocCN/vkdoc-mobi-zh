    \n**Espresso 的 `DataInteraction` 类**\n如在“了解 Android 仪器化”部分所述，Android 应用程序通过 `View`\
    \ 或 `ViewGroup` 来表示其元素。单个 UI 元素绘制在 `View` 内部。`ViewGroup` 用于表示一组视图或另一个视图组。可以将 `ViewGroup`\
    \ 视为 UI 元素的容器。要在 Android 中表示对象列表，可以使用一个名为 `AdapterView` 的类，它扩展了 `ViewGroup` 类，其子视图由\
    \ `Adapter` 决定。表示对象列表的另一种可能性是使用 `RecyclerView`，但我们将在后续章节中讨论它。\n\n因此，`Adapter`\
    \ 负责将来自外部源的数据转换为绑定到 `AdapterView` 的 `View`。最终，`AdapterView` 包含许多由 `Adapter` 生成数据的视图，并形成一个项目列表，这称为\
    \ `ListView`（见图 [1-12](#469090_1_En_1_Chapter.xhtml#Fig12)）。\n\n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig12_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig12_HTML.jpg)"
  raw: "*   `pressKey()`\n    ⎯Returns an action that presses the key specified by\
    \ the key code\n    (e.g., `KeyEvent.KEYCODE_BACK`).\n    There is a huge list\
    \ of all possible key codes declared in the `andrid.view.KeyEvent.java`\n    class.\n\
    \n*   `doubleClick()`\n    ⎯Similar to the `click()` action, this\n    returns\
    \ an action that double-clicks the view. At least 90% of the view\n    must be\
    \ displayed onscreen.\n\n*   `longClick()`\n    ⎯Returns an action that long-clicks\
    \ the view. At least 90% of the\n    view must be displayed onscreen.\n\n*   `scrollTo()`⎯Returns\
    \ an\n    action that scrolls to the view. Based on the current implementation,\n\
    \    the view we would like to scroll to must be a descendant of one of the\n\
    \    following classes: `ScrollView.class, HorizontalScrollView.class, ListView.class.`\
    \ At least 90% of the\n    view must be displayed onscreen.\n\nNote\nThe `scrollTo()`\n\
    action  will have\nno effect if the view is already displayed.\n\n*   `typeText()`⎯Returns\
    \ an\n    action that selects the view (by clicking on it) and types the provided\n\
    \    string into the view. Appending an `'\\n'` to the end of\n    the string\
    \ translates to a Enter key event. The view must be displayed\n    onscreen and\
    \ must support input methods.\n\nNote\nThe `typeText()`\nmethod  performs a\n\
    tap on the view before typing to force the view into focus. If the view\nalready\
    \ contains text, this tap may place the cursor at an arbitrary\nposition within\
    \ the text.\n\n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig11_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig11_HTML.jpg)\n\
    \nFigure 1-11\nEspresso cheat sheet 2.1—ViewActions (source [`https://developer.android.com/training/testing/espresso/cheat-sheet`](https://developer.android.com/training/testing/espresso/cheat-sheet)\
    \ )\n\n*   `replaceText()`\n    ⎯Returns an action that updates the text attribute\
    \ of a\n    view.\n\n*   `openLink()`\n    ⎯Returns an action that opens a link\
    \ matching the given link text\n    and URI matchers. The action is performed\
    \ by invoking the link’s `onClick` method (as\n    opposed to actually issuing\
    \ a click on the screen).\n\nThe Espresso cheat sheet in Figure [1-11](#469090_1_En_1_Chapter.xhtml#Fig11)\
    \ shows that all\nthe actions are split into three categories:\n\n*   Click/Press\
    \ actions\n\n*   Gestures\n\n*   Text-related actions\n\nFrom my point of view,\
    \ we can add one more type here, which will\nprobably come in the next cheat sheet\
    \ version:\n\n*   Conditional actions\n\nThese types of actions are represented\
    \ by one method at this\ntime— `repeatedlyUntil()`\n. It enables performing a\
    \ given action on a view until it reaches\nthe desired state matched by the given\
    \ ViewMatcher. This action is\nuseful when you’re performing the action repeatedly\
    \ on a view and then\nit changes its state at runtime. A good use case to automate\
    \ with this\nview action is going through the walkthrough or on-boarding screens\
    \ from\nthe beginning until the end.\n\nAs you can see, Espresso provides almost\
    \ all the actions needed to cover\nthe end user behavior, but still lacks some.\
    \ The examples may be:\n\n*   Drag and drop actions\n\n*   Multi-gesture actions\
    \ like pinch to zoom\n\nHaving in our hands the Espresso core methods—`ViewInteractions`,\n\
    `ViewMatchers`,\nand `ViewActions`—we can\nstart to automate simple use cases\
    \ of our example TO-DO application.\nLet’s come up with some:\n\n*   Add a new\
    \ TO-DO that provides the title and description. Verify\n    it is shown in the\
    \ TO-DO list.\n\n*   Add a new TO-DO, mark it completed, and verify it is in the\
    \ list\n    of completed TO-DOs.\n\n*   Add a new TO-DO, edit it, and verify the\
    \ changes.\n\nRefer to the  `ViewActionsTest`\n to see the example code. The first,\
    \ second, and third use cases\nare shown in the  `addsNewToDo()`\n,  `checksToDoStateChange()`\n\
    , and `editsToDo()` test\ncases, respectively. We will drill down into one of\
    \ them to see some\ndetails:\n\n```\n@Test\npublic void checksToDoStateChange()\
    \ {\n// adding new TO-DO\nonView(withId(R.id.fab_add_task)).perform(click());\n\
    onView(withId(R.id.add_task_title))\n.perform(typeText(toDoTitle), closeSoftKeyboard());\n\
    onView(withId(R.id.add_task_description))\n.perform(typeText(toDoDescription),\
    \ closeSoftKeyboard());\nonView(withId(R.id.fab_edit_task_done)).perform(click());\n\
    // marking our TO-DO as completed\nonView(withId(R.id.todo_complete)).perform(click());\n\
    // filtering out the completed TO-DO\nonView(withId(R.id.menu_filter)).perform(click());\n\
    onView(allOf(withId(android.R.id.title), withText(R.string.nav_completed)))\n\
    .perform(click());\nonView(withId(R.id.todo_title))\n.check(matches(allOf(withText(toDoTitle),\
    \ isDisplayed())));\n}\n```\n\nNote that we introduced the `TestData` class to\n\
    keep all the methods that generate input data. This helps reduce the\ntest method\
    \ boilerplate code. You may notice that we add a unique\ntimestamp in milliseconds\
    \ to each TO-DO item title and description. This\nkeeps our test data unique,\
    \ which simplifies a lot of view\nidentification and validation inside the application\
    \ layout.\n\nNow, regarding the Espresso test code. Note the single combination\
    \ of\n`ViewInteraction`,\n`ViewMatcher`,\nand `ViewAction`,\nvisible in the following\
    \ line of code:\n\n```\nonView(withId(R.id.fab_add_task)).perform(click());\n\
    ```\n\nThere are also examples of taking multiple view actions as parameters by\n\
    the `perform()`\nview interaction:\n\n```\nonView(withId(R.id.add_task_title))\n\
    .perform(typeText(toDoTitle), closeSoftKeyboard());\n```\n\nThere are also examples\
    \ of how multiple `ViewMatchers` can be\ncombined to give us a stronger combination\
    \ of conditions to match the\ndesired view or validate its state, or to avoid\
    \ extra lines of code. The\nmaximum number of matchers that can be provided to\
    \ the `allOf()` matcher is\nsix:\n\n```\nonView(allOf(withId(android.R.id.title),\
    \ withText(R.string.nav_completed)))\n.perform(click());\nonView(withId(R.id.todo_title))\n\
    .check(matches(allOf(withText(toDoTitle), isDisplayed())));\n```\n\nNotice how\
    \ the Espresso notation is flexible—`allOf()` matcher can\nbe used both inside\
    \ the `onView()` method and\ninside the `check(matches())` view\ninteraction.\n\
    \nExercise 2\n**Writing Your First Espresso Test Cases**\n\nBased on the examples\
    \ in `ViewActionsTest`,\nwrite test cases for the following application functionality:\n\
    \n1.  Add a TO-DO and mark it as completed. Verify that the checkbox of the\n\
    \    completed TO-DO is checked.\n\n2.  Add a new TO-DO, open the TO-DO details\
    \ by clicking on it (hint: use\n    `withText()`\n    matcher), and delete it\
    \ by clicking the Delete Task button. Verify the\n    the All TO-DOs list is empty\
    \ (i.e., verify that the text “You have no\n    TO-DOs!” and that the ID `R.id.noTasksIcon`\
    \ are\n    displayed onscreen).\n\nEspresso’s DataInteraction Class\nAs mentioned\
    \ in the “Understanding Android Instrumentation” section,\nthe Android application\
    \ represents its elements via the `View` or `ViewGroup`. Single UI\nelements are\
    \ drawn inside the `View`. The `ViewGroup` is used to\nrepresent a set of views\
    \ or another view group. Think about `ViewGroup` as a\ncontainer of UI elements.\
    \ To represent a list of objects in Android, you\ncan use a class called `AdapterView`,\
    \ which\nextends the `ViewGroup` class and\nwhose child views are determined by\
    \ the `Adapter`. Another\npossibility to represent a list of objects is to use\
    \ the `RecyclerView`, but we\ndiscuss it in later chapters.\n\nThus, `Adapter`\n\
    is responsible for transforming the data from an external source into\nthe `View`\
    \ that’s\nbound to  `AdapterView` .\nIn the end, `AdapterView` contains\nmany\
    \ of views with the data produced by `Adapter` and forms a\nlist of items, which\
    \ is called the `ListView` (see Figure\n[1-12](#469090_1_En_1_Chapter.xhtml#Fig12)).\n\
    \n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig12_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig12_HTML.jpg)"
  trans: "\n*   `pressKey()` ⎯ 返回一个按下指定键码（例如 `KeyEvent.KEYCODE_BACK`）的操作。在 `android.view.KeyEvent.java`\
    \ 类中声明了所有可能的键码的庞大列表。\n\n*   `doubleClick()` ⎯ 与 `click()` 操作类似，此操作返回一个双击视图的操作。视图的至少\
    \ 90% 必须在屏幕上显示。\n\n*   `longClick()` ⎯ 返回一个长按视图的操作。视图的至少 90% 必须在屏幕上显示。\n\n*  \
    \ `scrollTo()` ⎯ 返回一个滚动到视图的操作。基于当前实现，我们想要滚到的视图必须是以下类之一的子代：`ScrollView.class`、`HorizontalScrollView.class`、`ListView.class`。视图的至少\
    \ 90% 必须在屏幕上显示。\n\n    **注意**\n    如果视图已经显示，`scrollTo()` 操作将无效。\n\n*   `typeText()`\
    \ ⎯ 返回一个选择视图（通过点击它）并将提供的字符串键入视图的操作。在字符串末尾附加 `'\\n'` 将转换为 Enter 键事件。视图必须在屏幕上显示并且必须支持输入法。\n\
    \n    **注意**\n    `typeText()` 方法在键入之前会执行一次视图点击以强制其获得焦点。如果视图已包含文本，此点击可能会将光标放置在文本内的任意位置。\n\
    \n    ![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig11_HTML.jpg](img/469090_1_En_1_Fig11_HTML.jpg)\n\
    \n    图 1-11 Espresso 速查表 2.1——`ViewActions`（来源：[`https://developer.android.com/training/testing/espresso/cheat-sheet`](https://developer.android.com/training/testing/espresso/cheat-sheet)）\n\
    \n*   `replaceText()` ⎯ 返回一个更新视图文本属性的操作。\n\n*   `openLink()` ⎯ 返回一个打开与给定链接文本和\
    \ URI 匹配器匹配的链接的操作。该操作通过调用链接的 `onClick` 方法来执行（而不是在实际屏幕上发起点击）。\n\n图 1-11 中的 Espresso\
    \ 速查表显示所有操作被分为三类：\n\n*   点击/按压操作\n*   手势\n*   文本相关操作\n\n在我看来，我们可以在下一个速查表版本中增加一种类型：\n\
    \n*   条件操作\n\n目前，这类操作由一个方法表示——`repeatedlyUntil()`。它允许对某个视图执行给定操作，直到其达到由给定 `ViewMatcher`\
    \ 匹配的期望状态。当您重复对某个视图执行操作，并且该视图在运行时改变其状态时，此操作非常有用。使用此视图操作自动化的一个好用例是从头到尾浏览引导或入门屏幕。\n\
    \n如您所见，Espresso 提供了覆盖最终用户行为所需的几乎所有操作，但仍然缺少一些操作。例如：\n\n*   拖放操作\n*   多点手势操作，例如捏合缩放\n\
    \n现在我们已经掌握了 Espresso 的核心方法——`ViewInteractions`、`ViewMatchers` 和 `ViewActions`——我们可以开始自动化示例\
    \ TO-DO 应用程序的简单用例了。让我们提出一些用例：\n\n*   添加一个提供标题和描述的新 TO-DO。验证它显示在 TO-DO 列表中。\n*\
    \   添加一个新的 TO-DO，将其标记为已完成，并验证它出现在已完成 TO-DO 列表中。\n*   添加一个新的 TO-DO，编辑它，并验证更改。\n\
    \n请参考 `ViewActionsTest` 查看示例代码。第一个、第二个和第三个用例分别显示在 `addsNewToDo()`、`checksToDoStateChange()`\
    \ 和 `editsToDo()` 测试用例中。我们将深入其中一个来查看一些细节：\n\n```\n@Test\npublic void checksToDoStateChange()\
    \ {\n    // adding new TO-DO\n    onView(withId(R.id.fab_add_task)).perform(click());\n\
    \    onView(withId(R.id.add_task_title))\n        .perform(typeText(toDoTitle),\
    \ closeSoftKeyboard());\n    onView(withId(R.id.add_task_description))\n     \
    \   .perform(typeText(toDoDescription), closeSoftKeyboard());\n    onView(withId(R.id.fab_edit_task_done)).perform(click());\n\
    \    // marking our TO-DO as completed\n    onView(withId(R.id.todo_complete)).perform(click());\n\
    \    // filtering out the completed TO-DO\n    onView(withId(R.id.menu_filter)).perform(click());\n\
    \    onView(allOf(withId(android.R.id.title), withText(R.string.nav_completed)))\n\
    \        .perform(click());\n    onView(withId(R.id.todo_title))\n        .check(matches(allOf(withText(toDoTitle),\
    \ isDisplayed())));\n}\n```\n\n注意，我们引入了 `TestData` 类来保存所有生成输入数据的方法。这有助于减少测试方法中的样板代码。您可能会注意到，我们为每个\
    \ TO-DO 项目的标题和描述添加了唯一的毫秒级时间戳。这使我们的测试数据保持唯一，极大地简化了应用程序布局内的视图识别和验证。\n\n现在，关于 Espresso\
    \ 测试代码。注意 `ViewInteraction`、`ViewMatcher` 和 `ViewAction` 的单一组合，体现在以下代码行中：\n\n\
    ```\nonView(withId(R.id.fab_add_task)).perform(click());\n```\n\n同时，也有将多个视图操作作为参数传递给\
    \ `perform()` 视图交互的示例：\n\n```\nonView(withId(R.id.add_task_title))\n    .perform(typeText(toDoTitle),\
    \ closeSoftKeyboard());\n```\n\n还有示例展示了如何组合多个 `ViewMatchers`，为我们提供更强的条件组合以匹配所需视图或验证其状态，或避免多余的代码行。可提供给\
    \ `allOf()` 匹配器的最大匹配器数量是六个：\n\n```\nonView(allOf(withId(android.R.id.title), withText(R.string.nav_completed)))\n\
    \    .perform(click());\nonView(withId(R.id.todo_title))\n    .check(matches(allOf(withText(toDoTitle),\
    \ isDisplayed())));\n```\n\n请注意 Espresso 表示法的灵活性——`allOf()` 匹配器既可以在 `onView()`\
    \ 方法内部使用，也可以在 `check(matches())` 视图交互内部使用。\n\n**练习 2：编写您的第一个 Espresso 测试用例**\n\
    \n基于 `ViewActionsTest` 中的示例，为以下应用程序功能编写测试用例：\n\n1.  添加一个 TO-DO 并标记为已完成。验证已完成 TO-DO\
    \ 的复选框已被选中。\n2.  添加一个新的 TO-DO，通过点击它打开 TO-DO 详情（提示：使用 `withText()` 匹配器），然后通过点击“删除任务”按钮删除它。验证所有\
    \ TO-DOs 列表为空（即，验证文本“You have no TO-DOs!”和 ID 为 `R.id.noTasksIcon` 的视图显示在屏幕上）。\n\
    \n**Espresso 的 `DataInteraction` 类**\n如在“了解 Android 仪器化”部分所述，Android 应用程序通过 `View`\
    \ 或 `ViewGroup` 来表示其元素。单个 UI 元素绘制在 `View` 内部。`ViewGroup` 用于表示一组视图或另一个视图组。可以将 `ViewGroup`\
    \ 视为 UI 元素的容器。要在 Android 中表示对象列表，可以使用一个名为 `AdapterView` 的类，它扩展了 `ViewGroup` 类，其子视图由\
    \ `Adapter` 决定。表示对象列表的另一种可能性是使用 `RecyclerView`，但我们将在后续章节中讨论它。\n\n因此，`Adapter`\
    \ 负责将来自外部源的数据转换为绑定到 `AdapterView` 的 `View`。最终，`AdapterView` 包含许多由 `Adapter` 生成数据的视图，并形成一个项目列表，这称为\
    \ `ListView`（见图 1-12）。\n\n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig12_HTML.jpg](img/469090_1_En_1_Fig12_HTML.jpg)\n"
- fmt: "### Figure 1-12  \n`ListView` visualization (source [`https://developer.android.com/guide/topics/ui/layout/listview`](https://developer.android.com/guide/topics/ui/layout/listview))\n\
    \nTo operate on such lists, Espresso provides the `DataInteraction` interface,\
    \ which allows us to interact with elements displayed inside `AdapterViews`. Let’s\
    \ briefly go through the commonly used `DataInteraction` methods:\n\n- `atPosition(Integer\
    \ atPosition)` — Selects the view that matches the nth position on the adapter\
    \ based on the data matcher.\n- `inAdapterView(Matcher<View> adapterMatcher)`\
    \ — Points to a specific adapter view on the screen to operate on. Should be used\
    \ when we have two or more `AdapterViews` in one layout. An example may be the\
    \ layout with a list view and a menu drawer list view.\n- `inRoot(Matcher<Root>\
    \ rootMatcher)` — Causes the data interaction to work within the root window specified\
    \ by the given root matcher. May be useful when we have an `AutoComplete` list\
    \ view popping up over the application window.\n- `onChildView(Matcher<View> childMatcher)`\
    \ — Redirects perform and check actions to the view inside the adapter item returned\
    \ by `Adapter.getView()`.\n\nNow, let’s see how `DataInteraction` methods are\
    \ used in a test case written for one of the setting functionalities. The Settings\
    \ application was implemented using the Android Preference component — the UI\
    \ building block displayed by a `PreferenceActivity` in the form of a `ListView`.\
    \ This class provides the view to be displayed in the activity and associates\
    \ with a `SharedPreferences` to store/retrieve the preference data. When specifying\
    \ a preference hierarchy in XML, each element can point to a subclass of `Preference`,\
    \ similar to the view hierarchy and layouts. This class contains a key that will\
    \ be used as the key into the `SharedPreferences`.\n\nAs you can see in Figure\
    \ 1-13, the main Settings section contains a list with four preference headers\
    \ (General, Notifications, Data & Sync and WebView sample), where each header\
    \ contains subsections with lists of preferences.\n\n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig13_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig13_HTML.jpg)\n\
    \n### Figure 1-13  \nThe `dataInteraction()` test case flow, starting from the\
    \ Settings section\n\nOpen the `DataInteractionsTest` class to see the code examples.\n\
    \n```\n@Test\npublic void dataInteraction() {\n    openDrawer();\n    onView(allOf(withId(R.id.design_menu_item_text),\n\
    \            withText(R.string.settings_title))).perform(click());\n    // start\
    \ of the flow as shown in Figure 1-13\n    onData(instanceOf(PreferenceActivity.Header.class))\n\
    \        .inAdapterView(withId(android.R.id.list))\n        .atPosition(0)\n \
    \       .onChildView(withId(android.R.id.title))\n        .check(matches(withText(\"\
    General\")))\n        .perform(click());\n    onData(withKey(\"email_edit_text\"\
    ))\n        /*we have to point explicitly to the parent of the General prefs list\n\
    \          because there are two {@ListView}s with id android.R.id.list in the\
    \ hierarchy*/\n        .inAdapterView(allOf(withId(android.R.id.list), withParent(withId(android.R.id.list_container))))\n\
    \        .check(matches(isDisplayed()))\n        .perform(click());\n    onView(withId(android.R.id.edit)).perform(replaceText(\"\
    sample@ema.il\"));\n    onView(withId(android.R.id.button1)).perform(click());\n\
    \    onData(withKey(\"email_edit_text\"))\n        .inAdapterView(allOf(withId(android.R.id.list),\
    \ withParent(withId(android.R.id.list_container))))\n        .onChildView(withId(android.R.id.summary))\n\
    \        .check(matches(withText(\"sample@ema.il\")));\n}\n```\n\nTo understand\
    \ better how `DataInteraction` methods work, we will split our test case into\
    \ two parts. The first part operates on the main Settings sections with the four\
    \ headers:\n\n```\nonData(instanceOf(PreferenceActivity.Header.class))\n    .inAdapterView(withId(android.R.id.list))\n\
    \    .atPosition(0)\n    .onChildView(withId(android.R.id.title))\n    .check(matches(withText(\"\
    General\")))\n    .perform(click());\n```\n\nFirst, we explicitly point out that\
    \ the object we should operate on is its instance of `PreferenceActivity.Header.class`:\n\
    \n```\ninstanceOf(PreferenceActivity.Header.class)\n```\n\nSecond, we point out\
    \ which adapter contains our object. Inside an adapter of the Android default\
    \ `ListView` component, with an ID of `android.R.id.list`, at position “0”. This\
    \ is the first row in our list:\n\n```\ninAdapterView(withId(android.R.id.list)).atPosition(0)\n\
    ```\n\nThird, we point out that we would like to operate on the child view of\
    \ our list item with ID `android.R.id.title` that matches the text `\"General\"\
    ` and perform a click on it:\n\n```\nonChildView(withId(android.R.id.title)).check(matches(withText(\"\
    General\"))).perform(click())\n```\n\nMoving on to the second part of our test\
    \ case, which operates on the subsection of the General Settings section:\n\n\
    ```\nonData(withKey(\"email_edit_text\"))\n    .inAdapterView(allOf(withId(android.R.id.list),\
    \ withParent(withId(android.R.id.list_container))))\n    .check(matches(isDisplayed()))\n\
    \    .perform(click());\nonView(withId(android.R.id.edit)).perform(replaceText(\"\
    sample@ema.il\"));\nonView(withId(android.R.id.button1)).perform(click());\nonData(withKey(\"\
    email_edit_text\"))\n    .inAdapterView(allOf(withId(android.R.id.list), withParent(withId(android.R.id.list_container))))\n\
    \    .onChildView(withId(android.R.id.summary))\n    .check(matches(withText(\"\
    sample@ema.il\")));\n```\n\nHere, you may observe the preference matcher `withKey(\"\
    email_edit_text\")` pointing to the `EditTextPreference` component by its key,\
    \ which is set in the `pref_general.xml` file:\n\n```\nwithKey(\"email_edit_text\"\
    )\n```\n\nWe again point to the ID of the adapter view our entry belongs to, combining\
    \ it with additional matcher to avoid multiple view matching. We check that such\
    \ an object is displayed on the screen and click on it:\n\n```\n.inAdapterView(allOf(\n\
    \    withId(android.R.id.list),\n    withParent(withId(android.R.id.list_container))))\n\
    .check(matches(isDisplayed()))\n.perform(click())\n```\n\nAt the very end, after\
    \ the email is typed into the edit text field, we validate that the summary of\
    \ the list item matches the email we provided:\n\n```\n.inAdapterView(allOf(\n\
    \    withId(android.R.id.list),\n    withParent(withId(android.R.id.list_container))))\n\
    .onChildView(withId(android.R.id.summary))\n.check(matches(withText(\"sample@ema.il\"\
    )))\n```\n\nLet’s summarize what we have learned about `DataInteractions` with\
    \ the help of the Espresso cheat sheet shown in Figure 1-14. The Espresso `onData()`\
    \ method is used to operate on the object inside the list view. The list view\
    \ item is identified by one or by a combination of data options. After an object\
    \ is identified and located, we can perform actions or do assertions on it.\n\n\
    ![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig14_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig14_HTML.jpg)\n\
    \n### Figure 1-14  \nEspresso cheat sheet — `DataInteraction` (source [`https://developer.android.com/training/testing/espresso/cheat-sheet`](https://developer.android.com/training/testing/espresso/cheat-sheet))\n\
    \n## Exercise 3 — Writing a Test Case that Operates on a `ListView`\n\nBased on\
    \ examples in the `DataInteractionsTest`:\n\n1. Write a test case that navigates\
    \ to the Notifications Settings section and clicks the Enable Notifications toggle\
    \ by text or by ID. Use the Layout Inspector tool to analyze the Notifications\
    \ Section layout.\n\n2. Expand the case from Step 1 and verify that after Enable\
    \ Notification toggle is switched on, the other notification settings are displayed\
    \ on the screen."
  raw: "Figure 1-12\nListView visualization (source [`https://developer.android.com/guide/topics/ui/layout/listview`](https://developer.android.com/guide/topics/ui/layout/listview)\
    \ )\n\nTo operate on the such lists, Espresso provides the `DataInteraction`\n\
    interface , which\nallows us to interact with elements displayed inside `AdapterViews`.\
    \ Let’s\nbriefly go through the commonly used `DataInteraction`\nmethods :\n\n\
    *   `atPosition(Integer atPosition)`⎯Selects the view that matches the nth position\
    \ on the\n    adapter based on the data matcher.\n\n*   `inAdapterView(Matcher<View>\
    \ adapterMatcher)`⎯Points to a specific adapter view on the screen\n    to operate\
    \ on. Should be used when we have two or more AdapterViews in\n    one layout.\
    \ An example may be the layout with a list view and a menu\n    drawer list view.\n\
    \n*   `inRoot(Matcher<Root> rootMatcher)`⎯Causes the data interaction to work\
    \ within the root\n    window specified by the given root matcher. May be useful\
    \ when we have\n    an AutoComplete list view popping up over the application\n\
    \    window.\n\n*   `onChildView(Matcher<View> childMatcher)`⎯Redirects perform\
    \ and check actions to the view\n    inside the adapter item returned by `Adapter.getView()`.\n\
    \nNow, let’s see how `DataInteraction`\nmethods  are used\nin a test case written\
    \ for one of the setting functionalities. The\nSettings application was implemented\
    \ using the Android Preference\ncomponent—the UI building block displayed by a\
    \  `PreferenceActivity`\n in the form of a `ListView`. This class\nprovides the\
    \ view to be displayed in the activity and associates with a\nSharedPreferences\
    \ to store/retrieve the preference data. When specifying\na preference hierarchy\
    \ in XML, each element can point to a subclass of\nPreference, similar to the\
    \ view hierarchy and layouts. This class\ncontains a key that will be used as\
    \ the key into the\nSharedPreferences.\n\nAs you can see in Figure [1-13](#469090_1_En_1_Chapter.xhtml#Fig13),\
    \ the main\nSettings section contains a list with four preference headers (General,\n\
    Notifications, Data&Sync and WebView sample), where each header\ncontains subsections\
    \ with lists of preferences.\n\n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig13_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig13_HTML.jpg)\n\
    \nFigure 1-13\nThe dataInteraction()\ntest case flow, starting from the Settings\
    \ section\n\nOpen the `DataInteractionsTest`\nclass  to see the\ncode examples.\n\
    \n```\n@Test\npublic void dataInteraction() {\nopenDrawer();\nonView(allOf(withId(R.id.design_menu_item_text),\n\
    withText(R.string.settings_title))).perform(click());\n// start of the flow as\
    \ shown in Figure 1-13\nonData(instanceOf(PreferenceActivity.Header.class))\n\
    .inAdapterView(withId(android.R.id.list))\n.atPosition(0)\n.onChildView(withId(android.R.id.title))\n\
    .check(matches(withText(\"General\")))\n.perform(click());\nonData(withKey(\"\
    email_edit_text\"))\n/*we have to point explicitly to the parent of the General\
    \ prefs list\nbecause there are two {@ListView}s with id android.R.id.list in\
    \ the hierarchy*/\n.inAdapterView(allOf(withId(android.R.id.list), withParent(withId(android.R.id.list_container))))\n\
    .check(matches(isDisplayed()))\n.perform(click());\nonView(withId(android.R.id.edit)).perform(replaceText(\"\
    sample@ema.il\"));\nonView(withId(android.R.id.button1)).perform(click());\nonData(withKey(\"\
    email_edit_text\"))\n.inAdapterView(allOf(withId(android.R.id.list), withParent(withId(android.R.id.list_container))))\n\
    .onChildView(withId(android.R.id.summary))\n.check(matches(withText(\"sample@ema.il\"\
    )));\n}\n```\n\nTo understand better how `DataInteraction`\nmethods  work, we\n\
    will split our test case into two parts. The first part operates on the\nmain\
    \ Settings sections with the four headers:\n\n```\nonData(instanceOf(PreferenceActivity.Header.class))\n\
    .inAdapterView(withId(android.R.id.list))\n.atPosition(0)\n.onChildView(withId(android.R.id.title))\n\
    .check(matches(withText(\"General\")))\n.perform(click());\n```\n\nFirst, we explicitly\
    \ point out that the\nobject we should operate on is its instance of `PreferenceActivity.Header.class`:\n\
    \n```\ninstanceOf(PreferenceActivity.Header.class)\n```\n\nSecond, we point out\
    \ which adapter contains our object. Inside an\nadapter of the Android default\
    \ `ListView` component,\nwith an ID of `android.R.id.list`, at\nposition “0”.\
    \ This is the first row in our list:\n\n```\ninAdapterView(withId(android.R.id.list)).atPosition(0)\n\
    ```\n\nThird, we point out that we would like to operate on the child view of\n\
    our list item with ID `android.R.id.title`\nthat matches the text `\"General\"\
    ` and perform\na click on it:\n\n```\nonChildView(withId(android.R.id.title)).check(matches(withText(\"\
    General\"))).perform(click())\n```\n\nMoving on to the second part of our test\
    \ case, which operates on the\nsubsection of the General Settings section:\n\n\
    ```\nonData(withKey(\"email_edit_text\"))\n.inAdapterView(allOf(withId(android.R.id.list),\
    \ withParent(withId(android.R.id.list_container))))\n.check(matches(isDisplayed()))\n\
    .perform(click());\nonView(withId(android.R.id.edit)).perform(replaceText(\"sample@ema.il\"\
    ));\nonView(withId(android.R.id.button1)).perform(click());\nonData(withKey(\"\
    email_edit_text\"))\n.inAdapterView(allOf(withId(android.R.id.list), withParent(withId(android.R.id.list_container))))\n\
    .onChildView(withId(android.R.id.summary))\n.check(matches(withText(\"sample@ema.il\"\
    )));\n```\n\nHere, you may observe the preference matcher `withKey(\"email_edit_text\"\
    )`\npointing to the `EditTextPreference`\ncomponent by its key, which is set in\
    \ the `pref_general.xml`\nfile:\n\n```\nwithKey(\"email_edit_text\")\n```\n\n\
    We again point to the ID of the adapter view our entry belongs to,\ncombining\
    \ it with additional matcher to avoid multiple view matching. We\ncheck that such\
    \ an object is displayed on the screen and click on it:\n\n```\n.inAdapterView(allOf(\n\
    withId(android.R.id.list),\nwithParent(withId(android.R.id.list_container))))\n\
    .check(matches(isDisplayed()))\n.perform(click())\n```\n\nAt the very end, after\
    \ the email is typed into the edit text field, we\nvalidate that the summary of\
    \ the list item matches the email we\nprovided:\n\n```\n.inAdapterView(allOf(\n\
    withId(android.R.id.list),\nwithParent(withId(android.R.id.list_container))))\n\
    .onChildView(withId(android.R.id.summary))\n.check(matches(withText(\"sample@ema.il\"\
    )))\n```\n\nLet’s summarize what we have learned about DataInteractions with the\n\
    help of the Espresso cheat sheet shown in Figure [1-14](#469090_1_En_1_Chapter.xhtml#Fig14).\
    \ The Espresso\n`onData()`\nmethod  is used\nto operate on the object inside the\
    \ list view. The list view item is\nidentified by one or by a combination of data\
    \ options. After an object\nis identified and located, we can perform actions\
    \ or do assertions on\nit.\n\n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig14_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig14_HTML.jpg)\n\
    \nFigure 1-14\nEspresso cheat sheet—DataInteraction (source [`https://developer.android.com/training/testing/espresso/cheat-sheet`](https://developer.android.com/training/testing/espresso/cheat-sheet)\
    \ )\n\nExercise 3\n**Writing a Test Case that Operates on a ListView**\n\nBased\
    \ on examples in the  `DataInteractionsTest`\n:\n\n1.  Write a test case that\
    \ navigates to the Notifications Settings\n    section and clicks the Enable Notifications\
    \ toggle by text or by ID. Use\n    the Layout Inspector tool to analyze the Notifications\
    \ Section\n    layout\n\n2.  Expand the case from Step 1 and verify that after\
    \ Enable Notification\n    toggle is switched on, the other notification settings\
    \ are displayed on\n    the screen."
  trans: "\n### 图 1-12  \n`ListView` 可视化效果（来源 [`https://developer.android.com/guide/topics/ui/layout/listview`](https://developer.android.com/guide/topics/ui/layout/listview)）\n\
    \n为了操作此类列表，Espresso 提供了 `DataInteraction` 接口，它允许我们与 `AdapterViews` 中显示的元素进行交互。下面简要介绍常用的\
    \ `DataInteraction` 方法：\n\n- `atPosition(Integer atPosition)` — 根据数据匹配器选择适配器中第\
    \ n 个位置的视图。\n- `inAdapterView(Matcher<View> adapterMatcher)` — 指向屏幕上要操作的特定适配器视图。当布局中有两个或更多\
    \ `AdapterViews` 时使用。例如，同时包含列表视图和菜单抽屉列表视图的布局。\n- `inRoot(Matcher<Root> rootMatcher)`\
    \ — 使数据交互在由给定根匹配器指定的根窗口内工作。当有 `AutoComplete` 列表视图在应用窗口上方弹出时，此方法可能会很有用。\n- `onChildView(Matcher<View>\
    \ childMatcher)` — 将执行操作和检查操作重定向到由 `Adapter.getView()` 返回的适配器项目内的视图。\n\n现在，让我们看看如何在一个为某项设置功能编写的测试用例中使用\
    \ `DataInteraction` 方法。设置应用程序是使用 Android 首选项组件实现的——该 UI 构建块由 `PreferenceActivity`\
    \ 以 `ListView` 的形式显示。该类提供了要在活动中显示的视图，并与 `SharedPreferences` 关联以存储/检索首选项数据。在 XML\
    \ 中指定首选项层次结构时，每个元素都可以指向 `Preference` 的子类，类似于视图层次结构和布局。此类包含一个键，该键将用作 `SharedPreferences`\
    \ 中的键。\n\n如图 1-13 所示，主设置部分包含一个包含四个首选项标题（通用、通知、数据与同步以及 WebView 示例）的列表，其中每个标题都包含带有首选项列表的子部分。\n\
    \n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig13_HTML.jpg](img/469090_1_En_1_Fig13_HTML.jpg)\n\
    \n### 图 1-13  \n`dataInteraction()` 测试用例流程，从设置部分开始\n\n打开 `DataInteractionsTest`\
    \ 类查看代码示例。\n\n```\n@Test\npublic void dataInteraction() {\n    openDrawer();\n\
    \    onView(allOf(withId(R.id.design_menu_item_text),\n            withText(R.string.settings_title))).perform(click());\n\
    \    // 如图 1-13 所示的流程开始\n    onData(instanceOf(PreferenceActivity.Header.class))\n\
    \        .inAdapterView(withId(android.R.id.list))\n        .atPosition(0)\n \
    \       .onChildView(withId(android.R.id.title))\n        .check(matches(withText(\"\
    General\")))\n        .perform(click());\n    onData(withKey(\"email_edit_text\"\
    ))\n        /*我们必须明确指向通用首选项列表的父级，\n          因为层次结构中有两个 {@ListView}s 的 id 为 android.R.id.list*/\n\
    \        .inAdapterView(allOf(withId(android.R.id.list), withParent(withId(android.R.id.list_container))))\n\
    \        .check(matches(isDisplayed()))\n        .perform(click());\n    onView(withId(android.R.id.edit)).perform(replaceText(\"\
    sample@ema.il\"));\n    onView(withId(android.R.id.button1)).perform(click());\n\
    \    onData(withKey(\"email_edit_text\"))\n        .inAdapterView(allOf(withId(android.R.id.list),\
    \ withParent(withId(android.R.id.list_container))))\n        .onChildView(withId(android.R.id.summary))\n\
    \        .check(matches(withText(\"sample@ema.il\")));\n}\n```\n\n为了更好地理解 `DataInteraction`\
    \ 方法的工作原理，我们将测试用例分为两部分。第一部分操作包含四个标题的主要设置部分：\n\n```\nonData(instanceOf(PreferenceActivity.Header.class))\n\
    \    .inAdapterView(withId(android.R.id.list))\n    .atPosition(0)\n    .onChildView(withId(android.R.id.title))\n\
    \    .check(matches(withText(\"General\")))\n    .perform(click());\n```\n\n首先，我们明确指出要操作的对象是\
    \ `PreferenceActivity.Header.class` 的实例：\n\n```\ninstanceOf(PreferenceActivity.Header.class)\n\
    ```\n\n其次，我们指出包含我们对象的适配器。在 Android 默认 `ListView` 组件的适配器内部，其 ID 为 `android.R.id.list`，位于位置“0”。这是列表中的第一行：\n\
    \n```\ninAdapterView(withId(android.R.id.list)).atPosition(0)\n```\n\n第三，我们指出要操作列表项中\
    \ ID 为 `android.R.id.title` 且文本匹配 `\"General\"` 的子视图，并对其执行点击操作：\n\n```\nonChildView(withId(android.R.id.title)).check(matches(withText(\"\
    General\"))).perform(click())\n```\n\n接下来是测试用例的第二部分，它操作通用设置部分的子部分：\n\n```\nonData(withKey(\"\
    email_edit_text\"))\n    .inAdapterView(allOf(withId(android.R.id.list), withParent(withId(android.R.id.list_container))))\n\
    \    .check(matches(isDisplayed()))\n    .perform(click());\nonView(withId(android.R.id.edit)).perform(replaceText(\"\
    sample@ema.il\"));\nonView(withId(android.R.id.button1)).perform(click());\nonData(withKey(\"\
    email_edit_text\"))\n    .inAdapterView(allOf(withId(android.R.id.list), withParent(withId(android.R.id.list_container))))\n\
    \    .onChildView(withId(android.R.id.summary))\n    .check(matches(withText(\"\
    sample@ema.il\")));\n```\n\n在这里，您可能会看到首选项匹配器 `withKey(\"email_edit_text\")` 通过其键指向\
    \ `EditTextPreference` 组件，该键在 `pref_general.xml` 文件中设置：\n\n```\nwithKey(\"email_edit_text\"\
    )\n```\n\n我们再次指向条目所属的适配器视图的 ID，并将其与额外的匹配器组合以避免多个视图匹配。我们检查此类对象是否显示在屏幕上并点击它：\n\n\
    ```\n.inAdapterView(allOf(\n    withId(android.R.id.list),\n    withParent(withId(android.R.id.list_container))))\n\
    .check(matches(isDisplayed()))\n.perform(click())\n```\n\n最后，在编辑文本字段中输入电子邮件后，我们验证列表项的摘要是否与提供的电子邮件匹配：\n\
    \n```\n.inAdapterView(allOf(\n    withId(android.R.id.list),\n    withParent(withId(android.R.id.list_container))))\n\
    .onChildView(withId(android.R.id.summary))\n.check(matches(withText(\"sample@ema.il\"\
    )))\n```\n\n让我们借助图 1-14 所示的 Espresso 速查表总结一下关于 `DataInteractions` 的内容。Espresso\
    \ 的 `onData()` 方法用于操作列表视图中的对象。列表视图项由一个或多个数据选项的组合标识。在对象被识别和定位后，我们可以对其执行操作或进行断言。\n\
    \n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig14_HTML.jpg](img/469090_1_En_1_Fig14_HTML.jpg)\n\
    \n### 图 1-14  \nEspresso 速查表 — `DataInteraction`（来源 [`https://developer.android.com/training/testing/espresso/cheat-sheet`](https://developer.android.com/training/testing/espresso/cheat-sheet)）\n\
    \n## 练习 3 — 编写一个操作 `ListView` 的测试用例\n\n基于 `DataInteractionsTest` 中的示例：\n\n1. 编写一个测试用例，导航到通知设置部分并通过文本或\
    \ ID 点击启用通知开关。使用布局检查器工具分析通知部分布局。\n\n2. 扩展步骤 1 中的用例，并验证在启用通知开关打开后，其他通知设置是否显示在屏幕上。\n"
- fmt: "# Operating on RecyclerView Using Espresso\n\n`RecyclerView` is one of the\
    \ most commonly used views in Android development. It is a more advanced version\
    \ of the `ListView`. Whether your application is an image gallery, a news app,\
    \ or a messenger, a `RecyclerView` is usually the best tool to implement it. That\
    \ is why understanding how to properly write automated tests for this component\
    \ is so important.\n\nSimilar to the simple view, Espresso has a `RecyclerViewActions`\
    \ class that contains all the actions you can perform on a `RecyclerView`, but\
    \ unfortunately Espresso doesn’t provide `RecyclerView` matchers. For now, we\
    \ will look at the `RecyclerViewActions` examples and in Chapter [2](#469090_1_En_2_Chapter.xhtml)\
    \ you will see how to create your own `RecyclerView` matchers.\n\nWe will again\
    \ refer to our sample TO-DO application, where a list of TO-DOs is represented\
    \ by a `RecyclerView` component.\n\n## `RecyclerViewActions`\n\nThe current class\
    \ represents view actions that can interact on a `RecyclerView`. At first look,\
    \ you may think that we can apply the `onData()` method here because a `RecyclerView`\
    \ is used to display the list of items, but in fact a `RecyclerView` is not an\
    \ `AdapterView`, hence it cannot be used with it. So, to operate on a `RecyclerView`,\
    \ we use `onView()` with a `RecyclerView` matcher to match the item or its child\
    \ inside the `RecyclerView` list. Then we have to perform a `RecyclerViewAction`\
    \ or a simple `ViewAction` on it.\n\n- `actionOnItem(final Matcher<View> itemViewMatcher,\
    \ final ViewAction viewAction)` — Returns a `ViewAction` that scrolls a `RecyclerView`\
    \ to the view matched by `viewHolderMatcher`.\n\n- `actionOnHolderItem(final Matcher<VH>\
    \ viewHolderMatcher, final ViewAction viewAction)` — Performs a `ViewAction` on\
    \ a view matched by `viewHolderMatcher`. First it scrolls a `RecyclerView` to\
    \ the view matched by `itemViewMatcher` and then performs an action on the matched\
    \ view.\n\n- `actionOnItemAtPosition(final int position, final ViewAction viewAction)`\
    \ — First it scrolls a `RecyclerView` to the view matched by `itemViewMatcher`\
    \ and then performs an action on the view at position.\n\n- `scrollToHolder(final\
    \ Matcher<VH> viewHolderMatcher)` — Returns a `ViewAction` that scrolls a `RecyclerView`\
    \ to the view matched by `viewHolderMatcher`.\n\n- `scrollTo(final Matcher<View>\
    \ itemViewMatcher)` — `ViewAction` that scrolls a `RecyclerView` to the view matched\
    \ by `itemViewMatcher`.\n\n- `scrollToPosition(final int position)` — `ViewAction`\
    \ that scrolls a `RecyclerView` to a given position. The view we operate on must\
    \ be assignable from a `RecyclerView` class and should be displayed on the screen.\n\
    \nThe following code shows how `RecyclerViewActions` are used in real tests (the\
    \ same test case is present in the `RecyclerViewActionsTest.java` class):\n\n\
    ```java\n@Test\npublic void addNewToDos() throws Exception {\n    generateToDos(12);\n\
    \    onView(withId(R.id.tasks_list))\n        .perform(actionOnItemAtPosition(10,\
    \ scrollTo()));\n    onView(withId(R.id.tasks_list))\n        .perform(scrollToPosition(1));\n\
    \    onView(withId(R.id.tasks_list))\n        .perform(scrollToPosition(12));\n\
    \    onView(withId(R.id.tasks_list))\n        .perform(actionOnItemAtPosition(12,\
    \ click()));\n    Espresso.pressBack();\n    onView(withId(R.id.tasks_list))\n\
    \        .perform(scrollToPosition(2));\n}\n```\n\nYou can omit for now the `generateToDos()`\
    \ method and methods that take view holder matchers as parameters (like `scrollToHolder()`\
    \ and `actionOnHolderItem()`). They will be discussed in Chapter [2](#469090_1_En_2_Chapter.xhtml).\
    \ These tests add 12 TO-DOs, so that some of them are not visible on the device\
    \ screen. The important information here is that `RecyclerView` adapter knows\
    \ about all the 12 TO-DO items, but `ViewActions` can be performed only on items\
    \ that are displayed to the user. Here, the `scrollToPosition()` view holder `ViewAction`\
    \ helps us do the scrolling and make the needed TO-DO item visible on the screen.\
    \ Then, the view action can be performed without issues.\n\nYou may notice that\
    \ both cases can perform the same actions and they are both valid:\n\n```java\n\
    onView(withId(R.id.tasks_list))\n    .perform(actionOnItemAtPosition(12, scrollTo()));\n\
    ```\n\nand\n\n```java\nonView(withId(R.id.tasks_list))\n    .perform(scrollToPosition(12));\n\
    ```\n\nAs a side note, the current test case is a good example of how can we chain\
    \ `perform()` actions if the same view is used in the `onView()` method — `R.id.tasks_list`.\
    \ This test case may look like this:\n\n```java\n@Test\npublic void addNewToDosChained()\
    \ throws Exception {\n    generateToDos(12);\n    onView(withId(R.id.tasks_list))\n\
    \        .perform(actionOnItemAtPosition(10, scrollTo()))\n        .perform(scrollToPosition(1))\n\
    \        .perform(scrollToPosition(12))\n        .perform(actionOnItemAtPosition(12,\
    \ click()))\n        .perform(pressBack())\n        .perform(scrollToPosition(2));\n\
    }\n```\n\nThe chained test case required only one change — the `ViewActions.pressBack()`\
    \ method was used instead of `Espresso.pressBack()`.\n\n## Exercise 4\n\n**Experimenting\
    \ with RecyclerView Actions**\n\n1. Based on the examples here, experiment with\
    \ actions in a `RecyclerView`. Try to perform actions on the non-visible TO-DO\
    \ items without scrolling to them and observe the results.\n\n# Running Espresso\
    \ Tests from AndroidStudio\n\nAt this moment, we have a basic understanding on\
    \ how to write automated tests with Espresso. Let’s see how our Espresso tests\
    \ can be run. This is achievable in two ways — via AndroidStudio or from the command\
    \ line.\n\nBefore jumping into running tests, we should understand the concept\
    \ of the Gradle BuildVariant in AndroidStudio. The BuildVariant represents the\
    \ process that converts the project into an Android Application Package (APK).\
    \ The Android build process is very flexible and enables you to create a custom\
    \ build configuration without modifying the application source code. The flexibility\
    \ is achieved by BuildVariants, which are the combined product of build type and\
    \ product flavor.\n\nBuild types define certain properties that Gradle uses when\
    \ building and packaging your application and are typically configured for different\
    \ stages of your development lifecycle. For example, the *debug* build type enables\
    \ debug options and signs the APK with the debug key, while the *release* build\
    \ type may shrink, obfuscate, and sign your APK with a release key for distribution.\
    \ The *product flavor* represents different versions of your app that you may\
    \ release to users, such as free and paid versions of your app. You can customize\
    \ product flavors to use different code and resources, while sharing and reusing\
    \ the parts that are common to all versions of your app.\n\nFigure [1-15](#469090_1_En_1_Chapter.xhtml#Fig15)\
    \ shows the Android build process.\n\n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig15_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig15_HTML.jpg)\n\
    \n**Figure 1-15** Android build process (source [`https://developer.android.com/studio/build`](https://developer.android.com/studio/build))\n\
    \nIn short, unlike the release APK, the debug APK will contain debug or test dependencies\
    \ (such as Espresso dependencies) and test resources needed for our UI tests to\
    \ run. Therefore, it is important first to have the debug build type, as shown\
    \ in the following `build.gradle` file:\n\n```gradle\nbuildTypes {\n    debug\
    \ {\n        minifyEnabled true\n        useProguard false\n        proguardFiles\
    \ getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'\n     \
    \   testProguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguardTest-rules.pro'\n\
    \    }\n    release {\n        minifyEnabled true\n        useProguard true\n\
    \        proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'\n\
    \        testProguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguardTest-rules.pro'\n\
    \    }\n}\n```\n\nSecond, we must select the proper BuildVariant for our application\
    \ module in AndroidStudio, as shown in Figure [1-16](#469090_1_En_1_Chapter.xhtml#Fig16).\n\
    \n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig16_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig16_HTML.jpg)\n\
    \n**Figure 1-16** Select a BuildVariant in AndroidStudio"
  raw: "Operating on RecyclerView Using Espresso\nRecyclerView\nis one of the most\
    \ commonly used views in Android development. It is a\nmore advanced version of\
    \ the ListView. Whether your application is an\nimage gallery, a news app, or\
    \ a messenger, a RecyclerView is usually the\nbest tool to implement it. That\
    \ is why understanding how to properly\nwrite automated tests for this component\
    \ is so important.\nSimilar to the simple view, Espresso has a `RecyclerViewActions`\n\
    class  that\ncontains all the actions you can perform on a RecyclerView, but\n\
    unfortunately Espresso doesn’t provide RecyclerView matchers. For now,\nwe will\
    \ look at the `RecyclerViewActions`\nexamples and in Chapter [2](#469090_1_En_2_Chapter.xhtml)\
    \ you will see how to create your\nown RecyclerView matchers.\nWe will again refer\
    \ to our sample TO-DO application, where a list of\nTO-DOs is represented by a\
    \  `RecyclerView` \ncomponent.\n\nRecyclerViewActions\n\nThe current class represents\
    \ view actions that can interact on a\nRecyclerView. At first look, you may think\
    \ that we can apply the `onData()` method  here because a\nRecyclerView is used\
    \ to display the list of items, but in fact a\nRecyclerView is not an AdapterView,\
    \ hence it cannot be used with it. So,\nto operate on a RecyclerView, we use `onView()`\
    \ with a\nRecyclerView matcher to match the item or its child inside the\nRecyclerView\
    \ list. Then we have to perform a  `RecyclerViewAction`\n or a simple `ViewAction`\
    \ on it.\n\n*   `actionOnItem(final Matcher<View> itemViewMatcher, final ViewAction\
    \ viewAction)`⎯Returns a ViewAction that scrolls a RecyclerView to\n    the view\
    \ matched by `viewHolderMatcher`.\n\n*   `actionOnHolderItem(final Matcher<VH>\
    \ viewHolderMatcher, final ViewAction viewAction)`⎯Performs a ViewAction on a\
    \ view matched by `viewHolderMatcher`.\n    First it scrolls a RecyclerView to\
    \ the view matched by `itemViewMatcher` and\n    then performs an action on the\
    \ matched view.\n\n*   `actionOnItemAtPosition(final int position, final ViewAction\
    \ viewAction)`⎯First it scrolls a\n    RecyclerView to the view matched by `itemViewMatcher`\
    \ and\n    then performs an action on the view at position.\n\n*   `scrollToHolder(final\
    \ Matcher<VH> viewHolderMatcher)`⎯Returns a ViewAction that\n    scrolls a RecyclerView\
    \ to the view matched by `viewHolderMatcher`.\n\n*   `scrollTo(final Matcher<View>\
    \ itemViewMatcher)`⎯ViewAction that scrolls a\n    RecyclerView to the view matched\
    \ by `itemViewMatcher`.\n\n*   `scrollToPosition(final int position)`⎯ViewAction\
    \ that scrolls a RecyclerView to a given\n    position. The view we operate on\
    \ must be assignable from a RecyclerView\n    class and should be displayed on\
    \ the screen.\n\nThe following code shows how  `RecyclerViewActions`\n are used\
    \ in real tests (the same test case is present in the\n`RecyclerViewActionsTest.java`\n\
    class):\n\n```\n@Test\npublic void addNewToDos() throws Exception {\ngenerateToDos(12);\n\
    onView(withId(R.id.tasks_list))\n.perform(actionOnItemAtPosition(10, scrollTo()));\n\
    onView(withId(R.id.tasks_list))\n.perform(scrollToPosition(1));\nonView(withId(R.id.tasks_list))\n\
    .perform(scrollToPosition(12));\nonView(withId(R.id.tasks_list))\n.perform(actionOnItemAtPosition(12,\
    \ click()));\nEspresso.pressBack();\nonView(withId(R.id.tasks_list))\n.perform(scrollToPosition(2));\n\
    }\n```\n\nYou can omit for now the `generateToDos()`\nmethod  and\nmethods that\
    \ take view holder matchers as parameters (like  `scrollToHolder()`\n and  `actionOnHolderItem()`\n\
    ). They will be discussed in Chapter [2](#469090_1_En_2_Chapter.xhtml). These\
    \ tests add 12 TO-DOs, so\nthat some of them are not visible on the device screen.\
    \ The important\ninformation here is that RecyclerView adapter knows about all\
    \ the 12\nTO-DO items, but `ViewActions`  can be performed only\non items that\
    \ are displayed to the user. Here, the  `scrollToPosition()`\n view holder `ViewAction`\
    \ helps us\ndo the scrolling and make the needed TO-DO item visible on the screen.\n\
    Then, the view action can be performed without issues.\n\nYou may notice that\
    \ both cases can perform the same actions and they are\nboth valid:\n\n```\nonView(withId(R.id.tasks_list))\n\
    .perform(actionOnItemAtPosition(12, scrollTo()));\n```\n\nand\n\n```\nonView(withId(R.id.tasks_list))\n\
    .perform(scrollToPosition(12));\n```\n\nAs a side note, the current test case\
    \ is a good example of how can we\nchain `perform()`\nactions if the same view\
    \ is used in the `onView()` method ⎯`R.id.tasks_list`. This\ntest case may look\
    \ like this:\n\n```\n@Test\npublic void addNewToDosChained() throws Exception\
    \ {\ngenerateToDos(12);\nonView(withId(R.id.tasks_list))\n.perform(actionOnItemAtPosition(10,\
    \ scrollTo()))\n.perform(scrollToPosition(1))\n.perform(scrollToPosition(12))\n\
    .perform(actionOnItemAtPosition(12, click()))\n.perform(pressBack())\n.perform(scrollToPosition(2));\n\
    }\n```\n\nThe chained test case required only one change—the `ViewActions.pressBack()`\n\
    method  was used\ninstead of  `Espresso.pressBack()`\n .\n\nExercise 4\n\n**Experimenting\
    \ with RecyclerView Actions**\n\n1.  Based on the examples here, experiment with\
    \ actions in a\n    RecyclerView. Try to perform actions on the non-visible TO-DO\
    \ items\n    without scrolling to them and observe the results.\n\nRunning Espresso\
    \ Tests from AndroidStudio\nAt this moment, we have a basic understanding on how\
    \ to write\nautomated tests with Espresso. Let’s see how our Espresso tests can\
    \ be\nrun. This is achievable in two ways⎯via AndroidStudio or from the\ncommand\
    \ line.\nBefore jumping into running tests, we should understand the concept\n\
    of the Gradle\nBuildVariant in AndroidStudio. The BuildVariant represents the\n\
    process that converts the project into an Android Application Package\n(APK).\
    \ The Android build process is very flexible and enables you\nto create a custom\
    \ build configuration without modifying the application\nsource code. The flexibility\
    \ is achieved by BuildVariants, which are the\nthe combined product of build type\
    \ and product flavor.\nBuild types define certain properties that Gradle uses\
    \ when building\nand packaging your application and are typically configured for\n\
    different stages of your development lifecycle. For example, the\n*debug* build\
    \ type enables debug options and signs the APK with\nthe debug key, while the\
    \ *release* build type may shrink,\nobfuscate, and sign your APK with a release\
    \ key for distribution.\nThe *product flavor* represents different versions of\
    \ your app\nthat you may release to users, such as free and paid versions of your\n\
    app. You can customize product flavors to use different code and\nresources, while\
    \ sharing and reusing the parts that are common to all\nversions of your app.\n\
    \nFigure [1-15](#469090_1_En_1_Chapter.xhtml#Fig15) shows the\nAndroid build\n\
    process.\n\n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig15_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig15_HTML.jpg)\n\
    \nFigure 1-15\nAndroid build process (source [`https://developer.android.com/studio/build`](https://developer.android.com/studio/build)\
    \ )\n\nIn short, unlike the release APK, the debug APK will contain debug or\n\
    test dependencies (such as Espresso dependencies) and test resources\nneeded for\
    \ our UI tests to run. Therefore, it is important first to have\nthe debug build\
    \ type, as shown in the following `build.gradle`\nfile :\n\n```\nbuildTypes {\n\
    debug {\nminifyEnabled true\nuseProguard false\nproguardFiles getDefaultProguardFile('proguard-android.txt'),\
    \ 'proguard-rules.pro'\ntestProguardFiles getDefaultProguardFile('proguard-android.txt'),\
    \ 'proguardTest-rules.pro'\n}\nrelease {\nminifyEnabled true\nuseProguard true\n\
    proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'\n\
    testProguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguardTest-rules.pro'\n\
    }\n}\n```\n\nSecond, we must select the proper BuildVariant for our application\n\
    module in AndroidStudio, as shown in Figure [1-16](#469090_1_En_1_Chapter.xhtml#Fig16).\n\
    \n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig16_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig16_HTML.jpg)\n\
    \nFigure 1-16\nSelect a BuildVariant in\nAndroidStudio"
  trans: "\n# 使用 Espresso 操控 RecyclerView\n\n`RecyclerView` 是 Android 开发中最常用的视图之一，它是\
    \ `ListView` 的进阶版本。无论你的应用是图片画廊、新闻客户端还是即时通讯软件，`RecyclerView` 通常都是实现这些功能的最佳工具。正因如此，理解如何为该组件编写正确的自动化测试显得尤为重要。\n\
    \n与简单视图类似，Espresso 提供了 `RecyclerViewActions` 类，其中包含可在 `RecyclerView` 上执行的所有操作，但遗憾的是\
    \ Espresso 并未提供 `RecyclerView` 匹配器。目前，我们先来看 `RecyclerViewActions` 的示例，在第二章 #469090_1_En_2_Chapter.xhtml\
    \ 中，你将学习如何创建自己的 `RecyclerView` 匹配器。\n\n我们将再次引用待办事项（TO-DO）示例应用，其中待办事项列表由 `RecyclerView`\
    \ 组件呈现。\n\n## `RecyclerViewActions`\n\n该类表示可与 `RecyclerView` 进行交互的视图操作。乍看之下，你可能会认为可以在此处使用\
    \ `onData()` 方法，因为 `RecyclerView` 用于显示列表项；但实际上，`RecyclerView` 并非 `AdapterView`，因此无法与之配合使用。因此，要操作\
    \ `RecyclerView`，我们需结合 `RecyclerView` 匹配器使用 `onView()`，以匹配 `RecyclerView` 列表中的项或其子项。随后，需对其执行\
    \ `RecyclerViewAction` 或简单的 `ViewAction`。\n\n- `actionOnItem(final Matcher<View>\
    \ itemViewMatcher, final ViewAction viewAction)` — 返回一个 `ViewAction`，将 `RecyclerView`\
    \ 滚动至与 `viewHolderMatcher` 匹配的视图。\n\n- `actionOnHolderItem(final Matcher<VH> viewHolderMatcher,\
    \ final ViewAction viewAction)` — 在与 `viewHolderMatcher` 匹配的视图上执行 `ViewAction`。它首先将\
    \ `RecyclerView` 滚动至与 `itemViewMatcher` 匹配的视图，然后对该匹配视图执行操作。\n\n- `actionOnItemAtPosition(final\
    \ int position, final ViewAction viewAction)` — 首先将 `RecyclerView` 滚动至与 `itemViewMatcher`\
    \ 匹配的视图，然后对指定位置的视图执行操作。\n\n- `scrollToHolder(final Matcher<VH> viewHolderMatcher)`\
    \ — 返回一个 `ViewAction`，将 `RecyclerView` 滚动至与 `viewHolderMatcher` 匹配的视图。\n\n- `scrollTo(final\
    \ Matcher<View> itemViewMatcher)` — 一个 `ViewAction`，将 `RecyclerView` 滚动至与 `itemViewMatcher`\
    \ 匹配的视图。\n\n- `scrollToPosition(final int position)` — 一个 `ViewAction`，将 `RecyclerView`\
    \ 滚动至指定位置。我们操作的视图必须可赋值给 `RecyclerView` 类，并且应在屏幕上显示。\n\n以下代码展示了 `RecyclerViewActions`\
    \ 在实际测试中的用法（相同的测试用例位于 `RecyclerViewActionsTest.java` 类中）：\n\n```java\n@Test\n\
    public void addNewToDos() throws Exception {\n    generateToDos(12);\n    onView(withId(R.id.tasks_list))\n\
    \        .perform(actionOnItemAtPosition(10, scrollTo()));\n    onView(withId(R.id.tasks_list))\n\
    \        .perform(scrollToPosition(1));\n    onView(withId(R.id.tasks_list))\n\
    \        .perform(scrollToPosition(12));\n    onView(withId(R.id.tasks_list))\n\
    \        .perform(actionOnItemAtPosition(12, click()));\n    Espresso.pressBack();\n\
    \    onView(withId(R.id.tasks_list))\n        .perform(scrollToPosition(2));\n\
    }\n```\n\n你可以暂时忽略 `generateToDos()` 方法以及那些将视图持有者匹配器作为参数的方法（如 `scrollToHolder()`\
    \ 和 `actionOnHolderItem()`）。这些内容将在第二章 #469090_1_En_2_Chapter.xhtml 中讨论。这些测试添加了\
    \ 12 个待办事项，因此部分项目在设备屏幕上不可见。这里的关键信息是：`RecyclerView` 适配器知道所有 12 个待办事项，但 `ViewActions`\
    \ 只能对用户可见的项目执行。在此，`scrollToPosition()` 这个视图持有者 `ViewAction` 帮助我们进行滚动，使所需的待办事项在屏幕上可见。随后，视图操作即可顺利执行。\n\
    \n你可能注意到，两种方式都能执行相同的操作，且均有效：\n\n```java\nonView(withId(R.id.tasks_list))\n   \
    \ .perform(actionOnItemAtPosition(12, scrollTo()));\n```\n\n和\n\n```java\nonView(withId(R.id.tasks_list))\n\
    \    .perform(scrollToPosition(12));\n```\n\n顺便提一下，当前测试用例很好地展示了当 `onView()` 方法中使用相同视图（即\
    \ `R.id.tasks_list`）时，如何链式调用 `perform()` 操作。该测试用例可以写成如下形式：\n\n```java\n@Test\n\
    public void addNewToDosChained() throws Exception {\n    generateToDos(12);\n\
    \    onView(withId(R.id.tasks_list))\n        .perform(actionOnItemAtPosition(10,\
    \ scrollTo()))\n        .perform(scrollToPosition(1))\n        .perform(scrollToPosition(12))\n\
    \        .perform(actionOnItemAtPosition(12, click()))\n        .perform(pressBack())\n\
    \        .perform(scrollToPosition(2));\n}\n```\n\n链式测试用例只需一处更改——用 `ViewActions.pressBack()`\
    \ 方法替代了 `Espresso.pressBack()`。\n\n## 练习 4\n\n**探索 RecyclerView 操作**\n\n1. 基于本文的示例，尝试在\
    \ `RecyclerView` 中使用各种操作。试着在不滚动到不可见待办事项的情况下对其执行操作，并观察结果。\n\n# 从 AndroidStudio\
    \ 运行 Espresso 测试\n\n截至目前，我们已经基本了解了如何使用 Espresso 编写自动化测试。现在我们来看看如何运行 Espresso 测试。实现方式有两种：通过\
    \ AndroidStudio 或命令行。\n\n在开始运行测试之前，我们需要理解 AndroidStudio 中 Gradle 构建变体（BuildVariant）的概念。构建变体代表将项目转换为\
    \ Android 应用程序包（APK）的流程。Android 构建过程非常灵活，允许在不修改应用源代码的情况下创建自定义构建配置。这种灵活性是通过构建变体实现的，而构建变体是构建类型和产品风味的组合结果。\n\
    \n构建类型定义了 Gradle 在构建和打包应用时使用的某些属性，通常针对开发生命周期的不同阶段进行配置。例如，*调试*构建类型会启用调试选项，并使用调试密钥签署\
    \ APK；而*发布*构建类型可能会对 APK 进行压缩、混淆，并使用发布密钥签署，以便分发。*产品风味*代表你可能向用户发布的应用程序的不同版本，例如应用的免费版和付费版。你可以自定义产品风味，使其使用不同的代码和资源，同时共享和重用所有应用版本通用的部分。\n\
    \n图 1-15 展示了 Android 构建过程。\n\n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig15_HTML.jpg](img/469090_1_En_1_Fig15_HTML.jpg)\n\
    \n**图 1-15** Android 构建过程（来源 [`https://developer.android.com/studio/build`](https://developer.android.com/studio/build)）\n\
    \n简而言之，与发布版 APK 不同，调试版 APK 会包含运行 UI 测试所需的调试或测试依赖项（如 Espresso 依赖项）和测试资源。因此，首先需要确保拥有调试构建类型，如下面的\
    \ `build.gradle` 文件所示：\n\n```gradle\nbuildTypes {\n    debug {\n        minifyEnabled\
    \ true\n        useProguard false\n        proguardFiles getDefaultProguardFile('proguard-android.txt'),\
    \ 'proguard-rules.pro'\n        testProguardFiles getDefaultProguardFile('proguard-android.txt'),\
    \ 'proguardTest-rules.pro'\n    }\n    release {\n        minifyEnabled true\n\
    \        useProguard true\n        proguardFiles getDefaultProguardFile('proguard-android.txt'),\
    \ 'proguard-rules.pro'\n        testProguardFiles getDefaultProguardFile('proguard-android.txt'),\
    \ 'proguardTest-rules.pro'\n    }\n}\n```\n\n其次，我们必须在 AndroidStudio 中为应用模块选择正确的\
    \ BuildVariant，如图 1-16 所示。\n\n![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig16_HTML.jpg](img/469090_1_En_1_Fig16_HTML.jpg)\n\
    \n**图 1-16** 在 AndroidStudio 中选择 BuildVariant\n"
- fmt: '选择正确的构建类型后，我们可以右键点击测试类或测试方法，为 UI 测试创建运行配置，如图 [1-17](#469090_1_En_1_Chapter.xhtml#Fig17)
    所示。


    ![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig17_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig17_HTML.jpg)


    Figure 1-7

    Creating an instrumentation test configuration


    然后从弹出菜单中选择“Create”并用“OK”按钮确认。见图 [1-18](#469090_1_En_1_Chapter.xhtml#Fig18)。


    ![../images/469090_1_En_1_Chapter/469090_1_En_1_Fig18_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Fig18_HTML.jpg)


    Figure 1-18

    Creating an instrumentation test run configuration


    完成这些步骤后，我们就可以运行选定的测试了。通过点击 AndroidStudio 工具栏中的箭头按钮![../images/469090_1_En_1_Chapter/469090_1_En_1_Figc_HTML.jpg](images/469090_1_En_1_Chapter/469090_1_En_1_Figc_HTML.jpg)来运行测试。


    ## 从终端运行 Espresso 测试


    有多种方法可以从终端运行 Espresso 和 Android Instrumentation 测试。其中包括：


    *   使用 shell 命令运行 Instrumentation 测试

    *   使用 Gradle 命令运行 Instrumentation 测试


    ### 使用 Shell 命令运行 Instrumentation 测试


    以下`shell`命令可用于运行位于`app`模块中的测试。


    *使用 Android Testing Support Library 运行 App 模块测试。*

    ```

