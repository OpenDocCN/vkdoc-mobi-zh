    \ Web 应用程序测试，但它以类似 Espresso 的方式很好地完成了自己的工作。\n\n## 7. 无障碍测试\n\n大多数移动应用程序的开发都基于对用户或用户类型的既定假设。在软件测试中，术语*用户画像*反映了这些用户类型，包括他们可能的使用流程以及应用程序可能如何在日常活动中帮助他们。尽管用户画像在软件开发生命周期的早期阶段就已被创建，但它们可能没有考虑残疾人群体。\n\
    全球约有 3 亿人患有视力障碍，他们借助安装在自己移动设备上的特定无障碍工具来使用移动应用程序。\n\n### Android 无障碍工具\n\nAndroid\
    \ 平台为视力障碍人士提供了三种工具类型：\n\n*   **TalkBack** — 预装的屏幕阅读器应用程序，允许用户在无需视觉访问屏幕的情况下与 Android\
    \ 应用程序进行交互。视障用户可能依赖 TalkBack 来使用你的应用。\n\n*   **BrailleBack** — 一项无障碍服务，帮助视障用户使用盲文设备。与\
    \ TalkBack 应用程序协同工作，提供组合的盲文和语音体验。\n\n*   **Voice Access** — 允许用户通过语音命令控制其 Android\
    \ 设备。Voice Access 适用于运行 Android 5.0（API 级别 21）及更高版本的设备。\n"
- fmt: 'As you can see, `BrailleBack` relies on `TalkBack`, which reads back each
    interactive element available on the active screen to the user. In order to make
    Android applications accessible to users with visual impairments, developers should
    follow accessibility guidelines. Among them:


    - **Label UI elements** — Many screen readers, such as `TalkBack`, rely on this
    service to properly explain the function of a particular control. For example,
    for UI objects such as `ImageView` and `ImageButton` objects, the `android:contentDescription`
    parameter is set to specify its purpose. For `EditText` objects, `android:hint`
    is used.


    - **Group content** — Just as the visual UI is grouped into understandable components
    like lists with list items, so the screen reader content should also be grouped
    in a logical way. Instead of being presented as separate elements, items should
    be read back as a single announcement—a TO-DO item with a title, a description,
    and a checkbox state.


    - **Create an easy-to-follow navigation** — Applications should support keyboards
    navigation and navigation gestures. Avoid having UI elements fade out or disappear
    after a certain amount of time.


    - **Make touch targets large** — By providing larger touch targets, you make it
    substantially easier for users to navigate your app. In general, according to
    the guidelines, the touchable area of focusable item should be a minimum of 48dpx48dp.


    - **Provide adequate color contrast** — People with poor vision or those who use
    devices with dimmed displays have difficulty reading information on the screen.
    By providing increased contrast ratios between the foreground and background colors
    in your app, you make it easier for users to navigate within and between screens.


    ## Testing Application Accessibility


    The `Espresso` testing framework supports writing automated accessibility tests
    that evaluate the accessibility of your application. In order to start writing
    accessibility tests, add the following dependencies to the `build.gradle` file.


    *Android Testing Support Library Accessibility Dependencies in the `build.gradle`
    File Inside the App Module.*


    ```

    androidTestImplementation "com.android.support.test.espresso:espresso-accessibility:3.0.2"

    androidTestImplementation "com.google.android.apps.common.testing.accessibility.framework:accessibility-test-framework:2.1"

    ```


    *AndroidX Test library Accessibility Dependencies in the `build.gradle` file Inside
    the App Module.*


    ```

    androidTestImplementation ''androidx.test.espresso:espresso-accessibility:3.1.0''

    androidTestImplementation "com.google.android.apps.common.testing.accessibility.framework:accessibility-test-framework:2.1"

    ```


    After adding these dependencies, you have to enable accessibility checks, as shown
    in this sample:


    ```

    companion object {

    @BeforeClass

    @JvmStatic

    fun setAccessibilityPrefs() {

    AccessibilityChecks.enable()

    }

    }

    ```


    Note: `AccessibilityChecks` should be enabled only once per test class, otherwise,
    the test will fail. Therefore, the `@BeforeClass` annotation should be used with
    methods in which checks are enabled. In Kotlin, the method annotated with the
    `@BeforeClass` annotation should be declared in the `class` companion object.


    With `AccessibilityChecks.enable()` set, checks are enabled each time the Espresso
    `ViewAction` is called on the UI element, including its descendants. Such approach
    limits accessibility testing to UI test coverage. To cover more UI elements within
    the test run, set `setRunChecksFromRootView(true)`, which enables you to validate
    the entire view hierarchy.


    *Companion Object in chapter7. `AccessibilityTest.kt` Class.*


    ```

    @BeforeClass

    @JvmStatic

    fun setAccessibilityPrefs() {

    AccessibilityChecks.enable().setRunChecksFromRootView(true)

    }

    ```


    Unfortunately, it is not possible to set accessibility checks on each test method
    or test class, or to disable it after a test run.


    There can be cases when an accessibility issue is known but has not been resolved.
    With the help of `AccessibilityValidator` implemented in `com.google.android.apps.common.testing.accessibility.framework`,
    you can suppress it:


    ```

    @BeforeClass

    @JvmStatic

    fun setAccessibilityPrefs() {

    AccessibilityChecks.enable()

    .setRunChecksFromRootView(true)

    .setSuppressingResultMatcher(AccessibilityCheckResultUtils.matchesViews(

    hasSibling(withId(R.id.menu_filter))))

    }

    ```


    In a similar way, you can suppress multiple accessibility issues with the help
    of the `anyOf()` matcher, as shown here:


    ```

    @BeforeClass

    @JvmStatic

    fun setAccessibilityPrefs() {

    AccessibilityChecks.enable()

    .setRunChecksFromRootView(true)

    .setSuppressingResultMatcher(AccessibilityCheckResultUtils.matchesViews(anyOf(

    hasSibling(withId(R.id.menu_filter)),

    withChild(withChild(withId(android.support.design.R.id.snackbar_text))))))

    }

    ```


    By the way, you may notice accessibility issues with the native Android UI elements
    like snackbar. Suppressing them sometimes is not an easy task. In the previous
    code sample, the `withChild()` view matcher was used twice to locate the snackbar
    root layout and suppress the accessibility issue for it.


    You can also keep tests running even with accessibility issues, by providing a
    `false` value to the `setThrowExceptionForErrors()` method:


    ```

    @BeforeClass

    @JvmStatic

    fun setAccessibilityPrefs() {

    AccessibilityChecks.enable()

    .setRunChecksFromRootView(true)

    .setSuppressingResultMatcher(AccessibilityCheckResultUtils.matchesViews(anyOf(

    hasSibling(withId(R.id.menu_filter)),

    withChild(withChild(withId(android.support.design.R.id.snackbar_text))))))

    .setThrowExceptionForErrors(false)

    }

    ```


    In this case, all the issues will be redirected to the `logcat` log, where logs
    with `I` are informative and shown in black, `W` are warnings and are in blue,
    and `E` are errors and are in red. See Figure [7-1](#469090_1_En_7_Chapter.xhtml#Fig1).


    ![../images/469090_1_En_7_Chapter/469090_1_En_7_Fig1_HTML.jpg](images/469090_1_En_7_Chapter/469090_1_En_7_Fig1_HTML.jpg)


    **Figure 7-1** Accessibility `logcat` logs when `setThrowExceptionForErrors(false)`
    is set


    This is how the accessibility issue stacktrace looks like after a test fails:


    ```

    com.google.android.apps.common.testing.accessibility.framework.integrations.AccessibilityViewCheckException:
    There was 1 accessibility error:

    OverflowMenuButton{id=-1, desc=More options, visibility=VISIBLE, width=105, height=126,
    has-focus=false, has-focusable=false, has-window-focus=false, is-clickable=true,
    is-enabled=true, is-focused=false, is-focusable=true, is-layout-requested=false,
    is-selected=false, layout-params=android.support.v7.widget.ActionMenuView$LayoutParams@48cbb74,
    tag=null, root-is-layout-requested=true, has-input-connection=false, x=127.0,
    y=10.0}: View falls below the minimum recommended size for touch targets. Minimum
    touch target width is 48dp. Actual width is 40dp.

    at com.google.android.apps.common.testing.accessibility.framework.integrations.espresso.AccessibilityValidator.processResults(AccessibilityValidator.java:187)...

    ```


    You may notice that the header parts in both cases are identical. In addition
    to automated accessibility testing, Google developers also provide a possibility
    to test manually using the Accessibility Scanner application ([`https://play.google.com/store/apps/details?id=com.google.android.apps.accessibility.auditor`](https://play.google.com/store/apps/details%253Fid%253Dcom.google.android.apps.accessibility.auditor)).
    This application allows you to check for accessibility issues types and better
    understand errors shown in your Espresso accessibility test reports or inside
    the `logcat` logs based on the visual representation.


    Figure [7-2](#469090_1_En_7_Chapter.xhtml#Fig2) shows the accessibility scanner
    setup process.


    ![../images/469090_1_En_7_Chapter/469090_1_En_7_Fig2_HTML.jpg](images/469090_1_En_7_Chapter/469090_1_En_7_Fig2_HTML.jpg)


    **Figure 7-2** Start using the Accessibility scanner flow'
  raw: "As you can see, BrailleBack relies on TalkBack, which reads back each\ninteractive\
    \ element available on the active screen to the user. In order\nto make Android\
    \ applications accessible to users with visual\nimpairments, developers should\
    \ follow accessibility guidelines. Among them:\n\n*   *Label UI\n    elements*\
    \ —Many screen readers, such as TalkBack, rely on\n    this service to properly\
    \ explain the function of a particular control.\n    For example, for UI objects\
    \ such as `ImageView` and `ImageButton` objects,\n    the `android:contentDescription`\n\
    \    parameter is set to specify its purpose. For `EditText` objects,\n    `android:hint`\
    \ is\n    used.\n\n*   *Group\n    content* —Just as the visual UI is grouped\
    \ into\n    understandable components like lists with list items, so the screen\n\
    \    reader content should also be grouped in a logical way. Instead of being\n\
    \    presented as separate elements, items should be read back as a single\n \
    \   announcement—a TO-DO item with a title, a description, and a checkbox\n  \
    \  state.\n\n*   *Create an\n    easy-to-follow navigation* —Applications should\
    \ support\n    keyboards navigation and navigation gestures. Avoid having UI elements\n\
    \    fade out or disappear after a certain amount of time.\n\n*   *Make touch\n\
    \    targets large* —By providing larger touch targets, you make\n    it substantially\
    \ easier for users to navigate your app. In general,\n    according to the guidelines,\
    \ the touchable area of focusable item should\n    be a minimum of 48dpx48dp.\n\
    \n*   *Provide\n    adequate color contrast* —People with poor vision or those\n\
    \    who use devices with dimmed displays have difficulty reading information\n\
    \    on the screen. By providing increased contrast ratios between the\n    foreground\
    \ and background colors in your app, you make it easier for\n    users to navigate\
    \ within and between screens.\n\nTesting Application Accessibility\nThe Espresso\
    \ testing framework supports writing automated\naccessibility tests that evaluate\
    \ the accessibility of your application. In order to\nstart writing accessibility\
    \ tests, add the following dependencies to the\n`build.gradle`\nfile.\n\n*Android\
    \ Testing Support Library Accessibility Dependencies in the\nbuild.gradle File\
    \ Inside the App Module.*\n\n```\nandroidTestImplementation \"com.android.support.test.espresso:espresso-accessibility:3.0.2\"\
    \nandroidTestImplementation \"com.google.android.apps.common.testing.accessibility.framework:accessibility-test-framework:2.1\"\
    \n```\n\n*AndroidX Test library Accessibility Dependencies in the build.gradle\n\
    file Inside the App Module*   *.*\n\n```\nandroidTestImplementation 'androidx.test.espresso:espresso-accessibility:3.1.0'\n\
    androidTestImplementation \"com.google.android.apps.common.testing.accessibility.framework:accessibility-test-framework:2.1\"\
    \n```\n\nAfter adding these dependencies, you have to enable accessibility\nchecks,\
    \ as shown in this sample:\n\n```\ncompanion object {\n@BeforeClass\n@JvmStatic\n\
    fun setAccessibilityPrefs() {\nAccessibilityChecks.enable()\n}\n}\n```\n\nNote\n\
    `AccessibilityChecks`\nshould be enabled only once per test class, otherwise,\
    \ the test will\nfail. Therefore, the `@BeforeClass`\nannotation should be used\
    \ with methods in which checks are enabled. In\nKotlin, the method annotated with\
    \ the `@BeforeClass`\nannotation should be declared in the `class` companion\n\
    object.\n\nWith `AccessibilityChecks.enable()`  set, checks are\nenabled each\
    \ time the Espresso `ViewAction` is called\non the UI element, including its descendants.\
    \ Such approach limits\naccessibility testing to UI test coverage.\nTo cover more\
    \ UI\nelements within the test run, set `setRunChecksFromRootView(true)`,\nwhich\
    \ enables you to validate the entire view hierarchy.\n\n*Companion Object in chapter7*\
    \ *.*  *AccessibilityTest.kt\nClass*  *.*\n\n```\n@BeforeClass\n@JvmStatic\nfun\
    \ setAccessibilityPrefs() {\nAccessibilityChecks.enable().setRunChecksFromRootView(true)\n\
    }\n```\n\nUnfortunately, it is not possible to set accessibility checks on each\n\
    test method or test class, or to disable it after a test run.\n\nThere can be\
    \ cases when an accessibility issue is known but has not been\nresolved. With\
    \ the help of `AccessibilityValidator`\nimplemented in `com.google.android.apps.common.testing.accessibility.framework`,\n\
    you can suppress it:\n\n```\n@BeforeClass\n@JvmStatic\nfun setAccessibilityPrefs()\
    \ {\nAccessibilityChecks.enable()\n.setRunChecksFromRootView(true)\n.setSuppressingResultMatcher(AccessibilityCheckResultUtils.matchesViews(\n\
    hasSibling(withId(R.id.menu_filter))))\n}\n```\n\nIn a similar way, you can suppress\
    \ multiple accessibility issues with\nthe help of the `anyOf()` matcher , as shown\
    \ here:\n\n```\n@BeforeClass\n@JvmStatic\nfun setAccessibilityPrefs() {\nAccessibilityChecks.enable()\n\
    .setRunChecksFromRootView(true)\n.setSuppressingResultMatcher(AccessibilityCheckResultUtils.matchesViews(anyOf(\n\
    hasSibling(withId(R.id.menu_filter)),\nwithChild(withChild(withId(android.support.design.R.id.snackbar_text))))))\n\
    }\n```\n\nBy the way, you may notice accessibility issues with the native\nAndroid\
    \ UI\nelements like snackbar. Suppressing them sometimes is not an easy\ntask.\
    \ In the previous code sample, the `withChild()` view\nmatcher was used twice\
    \ to locate the snackbar root layout and suppress\nthe accessibility issue for\
    \ it.\n\nYou can also keep tests running even with accessibility issues, by\n\
    providing a `false` value to the\n`setThrowExceptionForErrors()`\nmethod :\n\n\
    ```\n@BeforeClass\n@JvmStatic\nfun setAccessibilityPrefs() {\nAccessibilityChecks.enable()\n\
    .setRunChecksFromRootView(true)\n.setSuppressingResultMatcher(AccessibilityCheckResultUtils.matchesViews(anyOf(\n\
    hasSibling(withId(R.id.menu_filter)),\nwithChild(withChild(withId(android.support.design.R.id.snackbar_text))))))\n\
    .setThrowExceptionForErrors(false)\n}\n```\n\nIn this case, all the issues will\
    \ be redirected to the `logcat` log , where logs with `I` are informative and\n\
    shown in black, `W` are warnings and\nare in blue, and `E` are errors and are\n\
    in red. See Figure [7-1](#469090_1_En_7_Chapter.xhtml#Fig1).\n\n![../images/469090_1_En_7_Chapter/469090_1_En_7_Fig1_HTML.jpg](images/469090_1_En_7_Chapter/469090_1_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1\nAccessibility logcat\nlogs when setThrowExceptionForErrors(false)\
    \ is set\n\nThis is how the accessibility issue stacktrace looks like after a\
    \ test\nfails:\n\n```\ncom.google.android.apps.common.testing.accessibility.framework.integrations.AccessibilityViewCheckException:\
    \ There was 1 accessibility error:\nOverflowMenuButton{id=-1, desc=More options,\
    \ visibility=VISIBLE, width=105, height=126, has-focus=false, has-focusable=false,\
    \ has-window-focus=false, is-clickable=true, is-enabled=true, is-focused=false,\
    \ is-focusable=true, is-layout-requested=false, is-selected=false, layout-params=android.support.v7.widget.ActionMenuView$LayoutParams@48cbb74,\
    \ tag=null, root-is-layout-requested=true, has-input-connection=false, x=127.0,\
    \ y=10.0}: View falls below the minimum recommended size for touch targets. Minimum\
    \ touch target width is 48dp. Actual width is 40dp.\nat com.google.android.apps.common.testing.accessibility.framework.integrations.espresso.AccessibilityValidator.processResults(AccessibilityValidator.java:187)...\n\
    ```\n\nYou may notice that the header parts in both cases are identical.\nIn addition\
    \ to automated accessibility testing, Google developers\nalso provide a possibility\
    \ to test manually using the Accessibility\nScanner application ( [`https://play.google.com/store/apps/details?id=com.google.android.apps.accessibility.auditor`](https://play.google.com/store/apps/details%253Fid%253Dcom.google.android.apps.accessibility.auditor)\
    \ ).\nThis application allows you to check for accessibility issues types\nand\
