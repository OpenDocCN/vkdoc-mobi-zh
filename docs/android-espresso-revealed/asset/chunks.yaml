- fmt: "- 获取和处理测试结果很困难。\n- 它使用 Python 编程语言编写，这使得与现有 UI 测试的集成更加困难。\n\n`monkeyrunner`\
    \ 的这些缺点迫使我们实现自己的解决方案。幸运的是，我们不需要做太多工作就能将其部署到位。我们的想法是在原生测试框架（如 `Espresso` 或 `UI\
    \ Automator`，或两者结合）中编写 monkey 测试。这带来了以下优势：\n\n- Monkey 测试成为 UI 测试代码库的一部分，这意味着它们完全由您拥有和控制。\n\
    - 您可以将 UI 测试与 monkey 测试结合使用（例如，您可以使用 UI 测试来登录，然后启动 monkey 测试）。\n- 使用现有的报告基础设施，可以轻松获取和处理测试结果。\n\
    - Monkey 测试可以被监控，这意味着如果 monkey 测试离开了应用程序，您可以识别并重新启动该应用程序。\n- 可以根据需要实现不同的 UI 事件或手势。\n\
    \n## 检测和第三方应用的 Monkey 测试\n\n如前所述，`monkeyrunner` 工具不满足我们对 monkey 测试的要求；因此，在本节中，我们将实现自己的受监控\
    \ monkey 测试。\n\n### 识别 Monkey 测试的操作区域\n\n我们有用于编写 monkey 测试的工具。现在，我们必须思考这些 monkey\
    \ 测试应如何以及在哪里操作的概念。图 [13-1](#469090_1_En_13_Chapter.xhtml#Fig1) 定义了 monkey 测试应执行其操作的区域。\n\
    \n![../images/469090_1_En_13_Chapter/469090_1_En_13_Fig1_HTML.jpg](images/469090_1_En_13_Chapter/469090_1_En_13_Fig1_HTML.jpg)\n\
    \n**图 13-1** 设备屏幕区域。红色表示应忽略的区域，蓝色表示感兴趣的区域。\n\n根据官方 Android 文档，顶部和底部的栏分别称为导航栏（见图\
    \ [13-2](#469090_1_En_13_Chapter.xhtml#Fig2)）和状态栏（见图 [13-3](#469090_1_En_13_Chapter.xhtml#Fig3)）。\n\
    \n![../images/469090_1_En_13_Chapter/469090_1_En_13_Fig3_HTML.jpg](images/469090_1_En_13_Chapter/469090_1_En_13_Fig3_HTML.jpg)\n\
    \n**图 13-3** 状态栏\n\n![../images/469090_1_En_13_Chapter/469090_1_En_13_Fig2_HTML.jpg](images/469090_1_En_13_Chapter/469090_1_En_13_Fig2_HTML.jpg)\n\
    \n**图 13-2** 导航栏\n\n我们的第一个任务是识别导航栏和状态栏的尺寸，并计算我们希望 monkey 测试操作的区域坐标。`ScreenDimensions`\
    \ 类包含了执行此计算的所有方法。除此之外，它还为我们感兴趣的区域中 monkey 动作生成随机坐标。为了完全理解这些计算是如何执行的，图 [13-4](#469090_1_En_13_Chapter.xhtml#Fig4)\
    \ 显示了设备屏幕坐标系。\n\n![../images/469090_1_En_13_Chapter/469090_1_En_13_Fig4_HTML.jpg](images/469090_1_En_13_Chapter/469090_1_En_13_Fig4_HTML.jpg)\n\
    \n**图 13-4** Android 屏幕坐标系\n\n简而言之，元素高度的计算是从顶部向下开始的，从 (0, 0) 坐标开始。现在应该清楚了，要计算所需区域的零坐标，我们需要知道状态栏的高度。右下角也是如此，但在这种情况下，我们还需要知道导航栏的高度。所有这些计算都在\
    \ `ScreenDimensions.kt` 类中完成。\n\n`chapter13.ScreenDimensions.kt` 类保存了所有计算屏幕尺寸和生成随机坐标的函数。\n\
    \n```kotlin\n/**\n* Calculates screen dimensions, navigation, status and action\
    \ bars dimensions.\n* Generates random coordinates for monkey clicks.\n*/\nobject\
    \ ScreenDimensions {\n    private val heightWithoutNavigationBar: Int\n    private\
    \ var width = 0\n    private val uiDevice = UiDevice.getInstance(InstrumentationRegistry.getInstrumentation())\n\
    \    private val appContext = InstrumentationRegistry.getInstrumentation().targetContext\n\
    \    private val navBarResourceId =\n        appContext.resources.getIdentifier(\"\
    navigation_bar_height\", \"dimen\", \"android\")\n    private val statusBarResourceId\
    \ =\n        appContext.resources.getIdentifier(\"status_bar_height\", \"dimen\"\
    , \"android\")\n    init {\n        width = uiDevice.displayWidth\n        heightWithoutNavigationBar\
    \ = uiDevice.displayHeight - ScreenDimensions.navigationBarHeight\n    }\n   \
    \ /**\n    * Calculate navigation bar height.\n    */\n    val navigationBarHeight\
    \ : Int get() {\n        return if (navBarResourceId > 0) {\n            appContext.resources.getDimensionPixelSize(navBarResourceId)\n\
    \        } else {\n            0\n        }\n    }\n    /**\n    * Calculate status\
    \ bar height.\n    */\n    val statusBarHeight: Int get() {\n        return if\
    \ (statusBarResourceId > 0) {\n            appContext.resources.getDimensionPixelSize(statusBarResourceId)\n\
    \        } else {\n            0\n        }\n    }\n    val randomY: Int\n   \
    \     get()  = (statusBarHeight..heightWithoutNavigationBar).random()\n    val\
    \ randomX: Int\n        get() = (0..width).random()\n    private fun IntRange.random()\
    \ =\n        Random().nextInt((endInclusive + 1) - start) +  start\n}\n```\n\n\
    如您所见，我们使用 `UiDevice` 实例来获取设备屏幕的宽度和高度，并使用应用上下文根据其资源标识符获取导航栏和状态栏的高度。\n\n### 定义 Monkey\
    \ 测试动作\n\n下一步是定义我们的 monkey 测试将执行的动作：\n\n- **点击动作** — 此动作应在图 [13-1](#469090_1_En_13_Chapter.xhtml#Fig1)\
    \ 中标出的感兴趣区域内的随机坐标 (`randomX`, `randomY`) 上执行点击。将使用 `UiDevice.click(int x, int\
    \ y)` 动作。\n- **拖拽（或滑动）** — 拖拽和滑动动作应基于随机定义的起始坐标 (`startX`, `startY`) 和结束坐标 (`endX`,\
    \ `endY`) 来执行。我们在此使用 `UiDevice.drag(int startX, int startY, int endX, int endY,\
    \ int steps)` 动作。`steps` 参数是滑动动作的步数。每一步的执行被限制为每步 5 毫秒，因此对于 100 步，滑动将需要大约 0.5 秒才能完成。\n\
    - **点击系统返回按钮** — 将使用 `UiDevice.pressBack()` 动作来模拟短按系统返回按钮。\n- **启动应用程序** — 这里我们将根据被测试的应用程序采用不同的方法来启动应用程序。对于\
    \ debug 应用程序，我们需要访问源代码，因此我们将使用来自 `android.support` 库项目的 `ActivityTestRule` 和来自\
    \ `androidx.test` 库的 `ActivityScenario.launch(Activity.class)` 函数。对于第三方应用程序，我们有另一种使用包名启动应用程序的方法，稍后将讨论。\n\
    - **在 monkey 测试离开后重新启动应用程序** — 基本上我们重复使用上一点的实现。这允许 monkey 测试离开应用程序，并使测试更接近地模拟真实用例场景，即移动用户在一段时间后离开应用程序，然后再次启动应用程序。\n\
    \n现在，我们进入所有提及的动作的实现，这些可以在 `chapter13.Monkey.kt` 文件中看到。\n\n`chapter13.Monkey.kt`"
  raw: "*   It is hard to fetch and process test results.\n\n*   It was written in\
    \ the Python programming language, which makes it\n    harder to integrate with\
    \ existing UI tests.\n\nThis list of  `monkeyrunner` \ncons forces us to implement\
    \ our own solution. Luckily, we don’t need to\ndo much to have it in place. The\
    \ idea is to write monkey tests in a\nnative test framework like Espresso or UI\
    \ Automator, or both. This\nintroduces the following advantages:\n\n*   Monkey\
    \ tests become part of the UI tests’ codebase, which means\n    they are fully\
    \ owned and controlled by you.\n\n*   You can use UI tests in combination with\
    \ monkey tests (for\n    example, you can use a UI test to log in and afterward\
    \ start the monkey\n    tests).\n\n*   It’s easy to fetch and process test results,\
    \ using the existing\n    reporting infrastructure.\n\n*   Monkey tests can be\
    \ supervised, which means if you leave the\n    application, you can identify\
    \ it and launch the application.\n\n*   Different UI events or gestures can be\
    \ implemented when\n    needed.\n\nMonkey Tests for Instrumented and Third-Party\n\
    Applications\nAs mentioned, the `monkeyrunner` tool\ndoes not satisfy our requirements\
    \ for monkey tests; therefore, in this\nsection, we will implement our own supervised\
    \ monkey tests.\n\nIdentifying Monkey Tests Operational Area\n\nWe have tools\
    \ that we will use to write monkey tests. Now we have to\nthink about the concept\
    \ of how and where these monkey tests should\noperate. Figure [13-1](#469090_1_En_13_Chapter.xhtml#Fig1)\
    \ defines the\nareas where the monkey test should perform its actions.\n\n![../images/469090_1_En_13_Chapter/469090_1_En_13_Fig1_HTML.jpg](images/469090_1_En_13_Chapter/469090_1_En_13_Fig1_HTML.jpg)\n\
    \nFigure 13-1\nDevice screen\nareas. Red represents areas that should be ignored\
    \ and blue shows\nthe areas of interest.\n\nAccording to the official Android\
    \ documentation, the top and the bottom\nbars are called the navigation bar (see\
    \ Figure [13-2](#469090_1_En_13_Chapter.xhtml#Fig2)) and status\nbar (see Figure\
    \ [13-3](#469090_1_En_13_Chapter.xhtml#Fig3)).\n\n![../images/469090_1_En_13_Chapter/469090_1_En_13_Fig3_HTML.jpg](images/469090_1_En_13_Chapter/469090_1_En_13_Fig3_HTML.jpg)\n\
    \nFigure 13-3\nStatus bar\n\n![../images/469090_1_En_13_Chapter/469090_1_En_13_Fig2_HTML.jpg](images/469090_1_En_13_Chapter/469090_1_En_13_Fig2_HTML.jpg)\n\
    \nFigure 13-2\nNavigation\nbar\n\nOur first task is to identify the dimensions\
    \ of the navigation and\nstatus bar and calculate the coordinates of the area\
    \ we want our monkey\ntests to operate on. The `ScreenDimensions`\nclass  contains\n\
    all the methods that perform this calculation. On top of this, it also\ngenerates\
    \ random coordinates for monkey actions in our areas of\ninterest. To fully understand\
    \ how these calculations are performed,\nFigure [13-4](#469090_1_En_13_Chapter.xhtml#Fig4)\
    \ shows the\ndevice screen coordinates system.\n\n![../images/469090_1_En_13_Chapter/469090_1_En_13_Fig4_HTML.jpg](images/469090_1_En_13_Chapter/469090_1_En_13_Fig4_HTML.jpg)\n\
    \nFigure 13-4\nAndroid screen\ncoordinates system\n\nIn short, the elements height\
    \ calculation is determined from the top\ndown, starting from the (0, 0) coordinate.\
    \ Now it should be clear that\nto calculate the zero coordinate of the desired\
    \ area, we need to know\nthe height of the status bar. The same goes for the bottom-right\
    \ corner,\nbut in this case, we also need the height of the navigation bar. All\
    \ of\nthese calculations are done in the `ScreenDimensions.kt`\nclass .\n\n*chapter13*\
    \ *.ScreenDimensions.kt Class Keeps All the\nFunctions That Calculate Screen Dimensions\
    \ and Generates Random\nCoordinates.*\n\n```\n/**\n* Calculates screen dimensions,\
    \ navigation, status and action bars dimensions.\n* Generates random coordinates\
    \ for monkey clicks.\n*/\nobject ScreenDimensions {\nprivate val heightWithoutNavigationBar:\
    \ Int\nprivate var width = 0\nprivate val uiDevice = UiDevice.getInstance(InstrumentationRegistry.getInstrumentation())\n\
    private val appContext = InstrumentationRegistry.getInstrumentation().targetContext\n\
    private val navBarResourceId =\nappContext.resources.getIdentifier(\"navigation_bar_height\"\
    , \"dimen\", \"android\")\nprivate val statusBarResourceId =\nappContext.resources.getIdentifier(\"\
    status_bar_height\", \"dimen\", \"android\")\ninit {\nwidth = uiDevice.displayWidth\n\
    heightWithoutNavigationBar = uiDevice.displayHeight - ScreenDimensions.navigationBarHeight\n\
    }\n/**\n* Calculate navigation bar height.\n*/\nval navigationBarHeight : Int\
    \ get() {\nreturn if (navBarResourceId > 0) {\nappContext.resources.getDimensionPixelSize(navBarResourceId)\n\
    } else {\n\n}\n}\n/**\n* Calculate status bar height.\n*/\nval statusBarHeight:\
    \ Int get() {\nreturn if (statusBarResourceId > 0) {\nappContext.resources.getDimensionPixelSize(statusBarResourceId)\n\
    } else {\n\n}\n}\nval randomY: Int\nget()  = (statusBarHeight..heightWithoutNavigationBar).random()\n\
    val randomX: Int\nget() = (0..width).random()\nprivate fun IntRange.random() =\n\
    Random().nextInt((endInclusive + 1) - start) +  start\n}\n```\n\nAs you can see,\
    \ we are using the `UiDevice`\ninstance  to get\nthe device screen’s width and\
    \ height and using the application context\nto get the navigation bar and status\
    \ bar height based on their resource\nidentifiers.\n\nDefining the Monkey Test\
    \ Actions\n\nThe next step is to define the actions that our monkey\ntests will\
    \ perform:\n\n*   *Click action*—This action should indicate a click on\n    random\
    \ coordinates (randomX, randomY) inside the area of interest marked\n    off in\
    \ Figure [13-1](#469090_1_En_13_Chapter.xhtml#Fig1). The `UiDevice.click(int x,\
    \ int y)` action will be used for this purpose.\n\n*   *Drag (or swipe)*—Drag\
    \ and swipe actions should be\n    executed based on randomly defined start (`startX`,\
    \ `startY`) and end\n    (`endX`, `endY`) coordinates. We\n    use the `UiDevice.drag(int\
    \ startX, int startY, int endX, int endY, int steps)` action here. The `steps`\
    \ parameter is\n    the number of steps for the swipe action. Each step execution\
    \ is\n    throttled to five milliseconds per step, so for 100 steps, the swipe\n\
    \    will take around 0.5 seconds to complete.\n\n*   *Click system back button*—The\
    \ `UiDevice.pressBack()`\n    action will be used to simulate a short press on\
    \ the system’s back\n    button.\n\n*   *Launch application*—Here we will have\
    \ different\n    approaches to launching an application based on the application\
    \ being\n    tested. For a debug application, we need access to the source code,\
    \ so\n    we will use `ActivityTestRule` from\n    the `android.support`\n   \
    \ library project and the `ActivityScenario.launch(Activity.class)`\n    function\
    \ from the `androidx.test`\n    library. For third-party applications, we have\
    \ another way of launching\n    applications using the package name, which will\
    \ be discussed\n    later.\n\n*   *Relaunch application in case monkey tests left\n\
    \    it*—Basically we reuse the implementation from the previous point. This allows\
    \ the\n    monkey tests to leave the application and will make the tests more\n\
    \    closely emulate real use case scenarios, when mobile users leave an\n   \
    \ application after a certain amount of time and then launch the\n    application\
    \ again.\n\nNow we move to the implementation of all the mentioned actions, which\n\
    can be seen in the `chapter13.Monkey.kt`\nfile.\n\n*chapter13* *.Monkey.kt*  \
    \ *.*"
