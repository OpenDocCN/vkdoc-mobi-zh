  trans: "\n# 使用结果存根化 Intent\n\n在许多情况下，被测应用启动的 Activity 意图必须以图库图像或设备文件系统中的文件形式返回结果。在\
    \ Android 中，这是通过在应用 Activity 或 Fragment 内使用 `startActivityForResult()` 方法启动一个\
    \ Activity 来实现的。启动 Activity 后，用户执行某些操作生成结果，该结果随后会返回给最初发送意图的 Activity 或 Fragment。Android\
    \ Activity 类中的 `onActivityResult()` 方法负责接收先前调用 `startActivityForResult()` 方法所返回的结果。\n\
    \n示例 TO-DO 应用包含一个使用 `startActivityForResult()` 发送意图的示例，并在 `com.example.android.architecture.blueprints.todoapp.addedittask.AddEditTaskFragment.java`\
    \ 类中实现的 `onActivityResult()` 方法中处理结果。\n\n## 在 `AddEditTaskFragment.java` 中启动和处理图像\
    \ Intent\n\n```java\npublic void onImageButtonClick() {\n    Intent intent = new\
    \ Intent();\n    intent.setType(\"image/*\");\n    intent.setAction(Intent.ACTION_GET_CONTENT);\n\
    \    startActivityForResult(intent, SELECT_PICTURE);\n}\n\npublic void onActivityResult(int\
    \ requestCode, int resultCode, Intent data) {\n    if (resultCode == RESULT_OK)\
    \ {\n        if (requestCode == SELECT_PICTURE) {\n            Uri selectedImageUri\
    \ = data.getData();\n            BitmapDrawable bitmapDrawable =\n           \
    \     ImageUtils.scaleAndSetImage(selectedImageUri, getContext(), 200);\n    \
    \        // 应用缩放后的位图\n            imageView.setImageDrawable(bitmapDrawable);\n\
    \            // 现在更改 ImageView 的尺寸以匹配缩放后的图像\n            ConstraintLayout.LayoutParams\
    \ params =\n                (ConstraintLayout.LayoutParams) imageView.getLayoutParams();\n\
    \            params.width = imageView.getWidth();\n            params.height =\
    \ imageView.getHeight();\n            imageView.setLayoutParams(params);\n   \
    \     }\n    }\n}\n```\n\n你可以看到 `onImageButtonClick()` 方法中的 intent 预设了类型和 Action，可以在测试中使用这些信息来匹配该\
    \ intent 并进行存根化。\n\n现在应该清楚了启动 Activity 以获取结果的机制。我们最后要做的是创建用于存根化的结果。在前一段中，我们使用了返回结果的机制，但将其设置为\
    \ null，主要是因为我们在分享意图的情况下不需要结果：\n\n```kotlin\nintending(not(isInternal()))\n   \
    \ .respondWith(Instrumentation.ActivityResult(Activity.RESULT_OK, null))\n```\n\
    \n现在我们需要自己实现结果。我们将讨论通过 `startActivityForResult()` 方法启动的 Activity 获取存根化图像结果的两种方法：\n\
    \n- 使用存储在测试应用 drawable 中的图像文件提供结果。\n- 使用存储在测试应用 assets 文件夹中的图像文件提供结果。\n\n在图 5-7\
    \ 中，你可以看到分别存储在测试应用 `res/drawable-xxxhdpi` 和 `assets` 文件夹中的 `todo_image_drawable.png`\
    \ 和 `todo_image_assets.png` 文件。\n\n![../images/469090_1_En_5_Chapter/469090_1_En_5_Fig7_HTML.jpg](img/469090_1_En_5_Fig7_HTML.jpg)\n\
    \n图 5-7\n用于 Intent 存根化的 .png 文件位置\n\n为了展示这两种方法的实现，示例应用包含带有测试用例的 `chapter5.StubSelectImageIntentTest.kt`\
    \ 类，以及包含用于生成 Intent 存根化中使用的 Activity 结果方法的 `chapetr5.IntentHelper.kt` 对象。\n\n\
    ## 在 `StubSelectImageIntentTest.kt` 类中实现的测试方法\n\n```kotlin\n@Test\nfun stubsImageIntentWithDrawable()\
    \ {\n    val toDoImage =\n        com.example.android.architecture.blueprints.todoapp.mock.test.R.drawable.todo_image\n\
    \    Intents.intending(not(isInternal()))\n        .respondWith(IntentHelper.createImageResultFromDrawable(toDoImage))\n\
    \    // 添加新的待办事项。\n    addFab.click()\n    taskTitleField.type(toDoTitle).closeKeyboard()\n\
    \    taskDescriptionField.type(toDoDescription).closeKeyboard()\n    // 点击从图库获取图像按钮。此时返回存根化的图像。\n\
    \    addImageButton.click()\n    editDoneFab.click()\n    viewWithText(toDoTitle).click()\n\
    }\n\n@Test\nfun stubsImageIntentWithAsset() {\n    val imageFromAssets = \"todo_image_assets.png\"\
    \n    Intents.intending(not(isInternal()))\n        .respondWith(IntentHelper.createImageResultFromAssets(imageFromAssets))\n\
    \    // 添加新的待办事项。\n    addFab.click()\n    taskTitleField.type(toDoTitle).closeKeyboard()\n\
    \    taskDescriptionField.type(toDoDescription).closeKeyboard()\n    // 点击从图库获取图像按钮。此时返回存根化的图像。\n\
    \    addImageButton.click()\n    editDoneFab.click()\n    viewWithText(toDoTitle).click()\n\
    }\n```\n\n## `IntentHelper.kt` 对象，提供用于生成 Intent 存根化中使用的 Activity 结果的方法\n\n```kotlin\n\
    object IntentHelper {\n    /**\n     *  从存储在测试应用 drawable 中的图像创建新的 Activity 结果。\n\
    \     *  有关结果的更多信息，请参见 {@link Activity#setResult}。\n     */\n    fun createImageResultFromDrawable(drawable:\
    \ Int): Instrumentation.ActivityResult {\n        val resultIntent = Intent()\n\
    \        val testResources = InstrumentationRegistry.getContext().resources\n\
    \        // 从 drawable 图像构建存根化的结果。\n        resultIntent.data = Uri.parse(ContentResolver.SCHEME_ANDROID_RESOURCE\n\
    \            + \"://${testResources.getResourcePackageName(drawable)}\"\n    \
    \        + \"/${testResources.getResourceTypeName(drawable)}\"\n            +\
    \ \"/${testResources.getResourceEntryName(drawable)}\")\n        return Instrumentation.ActivityResult(Activity.RESULT_OK,\
    \ resultIntent)\n    }\n\n    /**\n     *  从存储在测试应用 assets 中的图像创建新的 Activity 结果。\n\
    \     *  有关结果的更多信息，请参见 {@link Activity#setResult}。\n     */\n    fun createImageResultFromAssets(imageName:\
    \ String): Instrumentation.ActivityResult {\n        val resultIntent = Intent()\n\
    \        // 声明测试上下文和应用上下文的变量。\n        val testContext = InstrumentationRegistry.getContext()\n\
    \        val appContext = InstrumentationRegistry.getTargetContext()\n       \
    \ val file = File(\"${appContext.cacheDir}/todo_image_temp.png\")\n        //\
    \ 从测试 assets 读取文件并保存到主应用缓存中的 todo_image_temp.png。\n        if (!file.exists())\
    \ {\n            try {\n                val inputStream = testContext.assets.open(imageName)\n\
    \                val fileOutputStream = FileOutputStream(file)\n             \
    \   val size = inputStream.available()\n                val buffer = ByteArray(size)\n\
    \                inputStream.read(buffer)\n                inputStream.close()\n\
    \                fileOutputStream.write(buffer)\n                fileOutputStream.close()\n\
    \            } catch (e: Exception) {\n                throw RuntimeException(e)\n\
    \            }\n        }\n        // 从临时文件构建存根化的结果。\n        resultIntent.data\
    \ = Uri.fromFile(file)\n        return Instrumentation.ActivityResult(Activity.RESULT_OK,\
    \ resultIntent)\n    }\n}\n```\n\n`stubsImageIntentWithDrawable()` 测试用例使用位于测试应用\
    \ drawable 中的图像对 intent 结果进行存根化，而 `stubsImageIntentWithAsset()` 则使用存储在测试应用 assets\
    \ 文件夹中的图像进行 intent 存根化。将所有测试图像和文件存储在测试应用中非常方便，因为主应用不需要存储任何不必要的测试数据。同样地，我们可以存储所有可能用于\
    \ intent 存根化的文件类型。\n\n# 练习 15\n\n## 使用结果存根化 Intent\n\n1. 运行当前部分的所有测试并观察它们通过。将\
    \ `res/drawable-xxxhdpi` 和 assets 文件夹中的图像替换为不同的图像。再次运行测试。\n\n2. 基于在 `AddEditTaskFragment.java`\
    \ 中实现的图像 intent，更改 `Intents.intending(not(isInternal()))` 的实现，并将 `not(isInternal())`\
    \ 部分替换为 `hasAction() IntentMatcher`。\n"
- fmt: "3.  Do the same change as in Step 2, but instead of `hasAction()`, use a `hasType()\
    \ IntentMatcher`.\n\n## Verifying Intents\n\nAs of now, we are armed with the\
    \ knowledge of intent matchers and have used them in test examples. It is time\
    \ to move to the topic of verifying intents.\n\nAlong with the `Intents.intending()`\
    \ mechanism for intent stubbing, Espresso provides `Intents.indended()` for intent\
    \ validation. This mechanism records all intents that attempt to launch activities\
    \ from the application being tested. Using the `intended()` method, you can assert\
    \ that a given intent has been seen. A lot of information and examples about intents\
    \ matching was provided in previous section, so we provide the same intent matchers\
    \ to the `intended()` method.\n\n> **Note**  \n> Even if we stub intents, they\
    \ can be further validated using the `intended()` method.\n\nTo see `intended()`\
    \ in action, let’s modify the existing `stubsImageIntentWithDrawable()` test as\
    \ follows.\n\n*chapter5.*  \n*StubSelectImageIntentTest.stubsImageIntentWithAsset()*\
    \  \n*.*\n\n```\n@Test\nfun stubsImageIntentWithAsset() {\nval imageFromAssets\
    \ = \"todo_image_assets.png\"\nIntents.intending(not(isInternal()))\n.respondWith(IntentHelper.createImageResultFromAssets(imageFromAssets))\n\
    // Adding new TO-DO.\naddFab.click()\ntaskTitleField.type(toDoTitle).closeKeyboard()\n\
    taskDescriptionField.type(toDoDescription).closeKeyboard()\n// Click on Get image\
    \ from gallery button. At this point stubbed image is returned.\naddImageButton.click()\n\
    // Validate sent intent action.\nintended(hasAction(Intent.ACTION_GET_CONTENT))\n\
    editDoneFab.click()\nviewWithText(toDoTitle).click()\n}\n```\n\nIn the current\
    \ implementation, the tests pass because the image intent has set the `ACTION_GET_CONTENT`\
    \ action. Of course, we can use the `allOf()` hamcrest matcher to combine different\
    \ `IntentMatchers` and narrow down our validation.\n\nSometimes you may not see\
    \ the intent implementation, but there is still a way to get all intents inside\
    \ the Espresso failure stacktrace when the `intended()` validation fails.\n\n\
    *Part of Espresso Stacktrace from a Failed intended(intentMatcher) Validation.*\n\
    \n```\nIntentMatcher: has action: is \"android.intent.action.ANSWER\"\nMatched\
    \ intents:[]\nRecorded intents:\n-Intent { cmp=com.example.android.architecture.blueprints.todoapp.mock/com.example.android.architecture.blueprints.todoapp.addedittask.AddEditTaskActivity\
    \ } handling packages:[[com.example.android.architecture.blueprints.todoapp.mock]])\n\
    -Intent { act=android.intent.action.GET_CONTENT typ=image/* } handling packages:[[com.android.documentsui,\
    \ com.google.android.apps.docs, com.google.android.apps.photos]])\n```\n\nThis\
    \ stacktrace was received after setting the wrong intent action in the previous\
    \ test method to:\n\n```\nintended(hasAction(Intent.ACTION_ANSWER))\n```\n\nFrom\
    \ the stacktrace, we can see that among the image intents:\n\n```\n{ act=android.intent.action.GET_CONTENT\
    \ typ=image/* }\n```\n\nThere is another one:\n\n```\n{ cmp=com.example.android.architecture.blueprints.todoapp.mock/com.example.android.architecture.blueprints.todoapp.addedittask.AddEditTaskActivity\
    \ }\n```\n\nTo understand how intents appear in the stacktrace, let’s take a closer\
    \ look at the Espresso `Intents.java` class. This class is responsible for validating\
    \ and stubbing intents sent out by the application being tested. It contains the\
    \ `init()` method, which initializes intents and begins recording them. It must\
    \ be called prior to triggering any actions that send out intents that need to\
    \ be verified or stubbed. And it is because it is used by the `IntentsTestRule`\
    \ that it’s required to run intent tests.\n\nHaving this information, we can add\
    \ modifications to the `stubsImageIntentWithAsset()` test case. We will also verify\
    \ that after clicking the Add TO-DO floating action button, the `AddEditTaskActivity`\
    \ is launched.\n\n*Modified stubsImageIntentWithAsset() Test Case.*\n\n```\n@Test\n\
    fun stubsImageIntentWithAsset() {\nval imageFromAssets = \"todo_image_assets.png\"\
    \nIntents.intending(not(isInternal()))\n.respondWith(IntentHelper.createImageResultFromAssets(imageFromAssets))\n\
    // Adding new TO-DO.\naddFab.click()\n// Validate that AddEditTaskActivity was\
    \ launched.\nintended(hasComponent(AddEditTaskActivity::class.java.name))\ntaskTitleField.type(toDoTitle).closeKeyboard()\n\
    taskDescriptionField.type(toDoDescription).closeKeyboard()\n// Click on Get image\
    \ from gallery button. At this point stubbed image is returned.\naddImageButton.click()\n\
    // Validate sent intent action.\nintended(hasAction(Intent.ACTION_GET_CONTENT))\n\
    editDoneFab.click()\nviewWithText(toDoTitle).click()\n}\n```\n\nIt is also important\
    \ to pay attention to the stacktrace intent details and debug information, as\
    \ shown in Figures [5-4](#469090_1_En_5_Chapter.xhtml#Fig4) and [5-5](#469090_1_En_5_Chapter.xhtml#Fig5).\
    \ Both of these sources contain information about intents, like its action, type,\
    \ or component. Let’s take one more look at the stacktrace:\n\n```\nRecorded intents:\n\
    -Intent { cmp=com.example.android.architecture.blueprints.todoapp.mock/com.example.android.architecture.blueprints.todoapp.addedittask.AddEditTaskActivity\
    \ } handling packages:[[com.example.android.architecture.blueprints.todoapp.mock]])\n\
    -Intent { act=android.intent.action.GET_CONTENT typ=image/* } handling packages:[[com.android.documentsui,\
    \ com.google.android.apps.docs, com.google.android.apps.photos]])\n```\n\nAs you\
    \ may guess:\n\n*   `cmp` — Stands for component. Applies `hasComponent() IntentMatcher`.\n\
    *   `packages` — Stands for package. Applies `hasPackage()` or `toPackage() IntentMatcher`.\n\
    *   `act` — Stands for action. Applies `hasAction() IntentMatcher`.\n*   `typ`\
    \ — Stands for type. Applies `hasType() IntentMatcher`.\n\n## Exercise 16\n\n\
    **Verifying Intents**\n\n1.  Modify one of the intent tests and make it fail at\
    \ the moment of intent validation with the `intended()` method. Observe the stacktrace.\n\
    2.  Implement a test that verifies the share intent functionality discussed in\
    \ the “Stubbing Intents Without Result” section. Make the verification based on\
    \ the intent type and action. Use the `allOf()` hamcrest matcher to validate both\
    \ of them.\n\n## Summary\n\nEspresso-Intents enables you to keep your UI tests\
    \ hermetic, without the need to interact with third-party applications, and allows\
    \ you to validate intents sent within or outside of the application being tested.\
    \ It is a powerful mechanism that helps you test and stub application intents.\
    \ After you get familiar with it, it will improve your overall Android system\
    \ knowledge since the majority of communication among application components,\
    \ applications, and the system is done through intents.\n\n6. Testing Web Views\n\
    \nToday we can find mobile applications for almost everything—gaming, social networking,\
    \ banking, music, etc. Such a variety of applications developed by a single developer,\
    \ small startup, or solid company means different development approaches. These\
    \ approaches are represented by native and hybrid applications. Native applications\
    \ are developed for a mobile operating system following platform standards, user\
    \ interface, and user experience guidelines and access mobile device capabilities\
    \ like the camera, GPS, etc. Hybrid applications typically use websites that are\
    \ in a native wrapper or container. On Android, this container is called the *WebView*.\n\
    \nHowever, there is a gray area. Even when a developer selects the native application\
    \ development, there are many places in an application that may use the integrated\
    \ Android `WebView` component. This makes sense, because web views represent features\
    \ that should be controlled remotely without the need to create redundant application\
    \ releases. The common areas where `WebView` components can be used are as follows:\n\
    \n*   Web browser applications\n*   Registration or login forms with Google, Facebook,\
    \ or Twitter accounts\n*   Legal and privacy disclaimers\n*   Application FAQs"
