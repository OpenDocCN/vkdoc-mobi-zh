    \n# Introduction\n\n## Who This Book Is For\n\nThis book is a guideline on how\
    \ to write Android user interface tests for quality assurance engineers and test\
    \ automation engineers who are interested in Android test automation using Espresso\
    \ for Android (Espresso). It can also be valuable to Android developers involved\
    \ in writing UI or integration tests.\n\nThis book was written mostly for software\
    \ or test engineers with medium to advanced knowledge in Android test automation;\
    \ however, engineers with basic development and test automation experience will\
    \ benefit from it as well.\n\n## What This Book Covers\n\nThere is a lot of good\
    \ official Android testing documentation out there, including GitHub projects\
    \ with source code, but it is sometimes hard to find the needed portion of information,\
    \ especially when it comes to plain automated UI end-to-end testing, which Android\
    \ Espresso users face on a daily basis.\n\nI tried to cover all the major topics\
    \ of writing functional UI automated tests using the Espresso testing framework,\
    \ including different ways of running automated tests, architecting test projects\
    \ in easy and maintainable ways, and using tools that help to implement automated\
    \ tests with the less effort.\n\n## Source Code and Sample Project\n\nTo demonstrate\
    \ all the code examples throughout the book, the Google samples Android architecture\
    \ TO-DO application project (`https://github.com/googlesamples/android-architecture`)\
    \ was forked and modified so it was possible to showcase the majority of the Android\
    \ UI test automation samples using the Espresso for Android and UI Automator testing\
    \ frameworks.\n\nThe sample TO-DO application project contains two branches, where\
    \ one uses Android Testing Support library dependencies and the other covers AndroidX\
    \ Test library usage. Readers are free to select the one they prefer.\n\nThe source\
    \ code is also accessible via the Download Source Code link located at `www.apress.com/9781484243145`.\n\
    \n## Chapter Overview\n\n### Chapter 1: Getting Started with Espresso for Android\n\
    \nThis chapter describes the basics of Espresso. It defines goals and approaches\
    \ of user interface testing and provides examples for setting up tests inside\
    \ the Android Studio IDE project. It also explains how to identify Android application\
    \ UI elements, perform actions and assertions, and apply matchers to them. At\
    \ the end of this chapter, you will be able to write simple tests and execute\
    \ them from inside the Android Studio IDE on the device or emulator. It also includes\
    \ examples for how to run tests using Gradle or shell commands.\n\n### Chapter\
    \ 2: Customizing Espresso for Our Needs\n\nWith more advanced examples, you will\
    \ learn how to implement a custom `ViewAction`, including clicks and swiping actions;\
    \ and a `ViewMatcher`, such as matching complex views as `RecyclerView` matchers.\
    \ You will learn how to use custom actions and matchers, implement a custom `FailureHandler`\
    \ with the possibility to take and save screenshots upon failure.\n\n### Chapter\
    \ 3: Writing Espresso Tests with Kotlin\n\nThis chapter gives an overview of the\
    \ benefits of using the Kotlin programming language in tests and explains how\
    \ to migrate tests written in Java to Kotlin. It also provides an example of creating\
    \ an Espresso domain specific language in Kotlin.\n\n### Chapter 4: Handling Network\
    \ Operations and Asynchronous Actions\n\nThis chapter explains how to handle application\
    \ network requests and long-lasting operations during test execution with the\
    \ help of the `IdlingResource` interface. It provides an example of using `ConditionalWatcher`\
    \ as an alternative to `IdlingResource`.\n\n### Chapter 5: Verifying and Stubbing\
    \ Intents with IntentMatchers\n\nThis chapter explains using `IntentMatchers`\
    \ inside an application as well as how to stub external intents and provide extras.\
    \ A good example of an external intent is selecting an image from the photo gallery,\
    \ which then can be used by the application you’re testing.\n\n### Chapter 6:\
    \ Testing Web Views\n\nThis chapter covers testing `WebViews` inside an application.\
    \ Implemented `WebViews` showcase different UI elements that the Espresso-Web\
    \ API is able to operate on. You will be provided an Espresso-Web cheat sheet\
    \ as part of the book’s content.\n\n### Chapter 7: Accessibility Testing\n\nThis\
    \ chapter unleashes the topic of how to test application accessibility using Espresso\
    \ for Android. It raises awareness about the importance of accessibility testing\
    \ and provides an overview of manual tools that can be used to test application\
    \ accessibility.\n\n### Chapter 8: Espresso and UI Automator: The Perfect Tandem\n\
    \nThis chapter explains one of the most powerful test automation setups for Android,\
    \ which combines the Espresso test framework with the UI Automator testing tool.\
    \ Examples show how to test notifications or operate on third-party apps during\
    \ Espresso tests execution.\n\n### Chapter 9: Dealing with Runtime System Actions\
    \ and Permissions\n\nThis chapter explains different ways that you can deal with\
    \ system actions like permission request dialogs and describes possible solutions\
    \ for changing the Android emulator system language programmatically.\n\n### Chapter\
    \ 10: Android Test Automation Tooling\n\nAfter reading this chapter, you will\
    \ understand how to use the Espresso test recorder, set up a test device or emulator\
    \ to minimize test flakiness, and run tests in the Firebase cloud.\n\n### Chapter\
    \ 11: Screen Object Design Pattern in Android UI Tests\n\nThis chapter shows you\
    \ how to apply the screen object (the same as page object) architecture approach\
    \ to the test project, which allows you to reduce the maintenance effort spent\
    \ on reworking tests after changes in the application’s source code.\n\n### Chapter\
    \ 12: Testing the Robot Pattern with Espresso and Kotlin\n\nIn this chapter, you\
    \ learn how to apply a testing robot pattern that splits the test implementation\
    \ from the business logic to the Espresso UI tests."
