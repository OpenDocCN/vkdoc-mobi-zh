    `ConditionWatchers` 在我们需要等待不同视图状态时非常有用，但我们不应过度依赖它们来延长等待时间。当某个视图状态等待时间过长时，可能会引发问题。如果等待时间过长，可能会被误认为是测试应用本身的问题，此时更合理的做法是提交一个
    bug 报告，而不是在测试中处理该问题。理想情况下，在大多数场景中，`IdlingResources` 应处理应用非空闲状态的大部分时间，因此 `ConditionWatchers`
    仅应作为等待机制的少量补充，并像示例中的 snackbar 那样偶尔使用。


    ## 练习 12


    **在测试中使用 `ConditionWatcher`**


    1.  实现一个测试，打开菜单抽屉并导航到另一个界面。在该测试中，添加一个条件监视器，等待菜单抽屉显示或隐藏。对于显示状态，使用 `ViewMatchers.isDisplayed()`；对于隐藏状态，使用
    hamcrest 的 `CoreMatchers.not(ViewMatchers.isDisplayed())`。


    2.  实现一个可与 `DataInteraction` 类型配合使用的 `waitForElement() ConditionWatcher`。以 `ViewInteraction
    waitForElement()` 函数作为参考。


    ## 将条件监视器集成到 Espresso Kotlin DSL 中


    第 3 章以 Espresso Kotlin DSL 为例，展示了更简洁紧凑的测试代码。你可能已经注意到，在当前实现中，`ConditionWatchers`
    类中的所有函数尚无法以类似方式使用。问题在于 `ConditionWatchers` 以及其他 Espresso 方法与测试代码在同一位置、同一时间执行，这与
    `IdlingResources` 的使用方式相反 —— `IdlingResources` 需要在测试运行前注册（通常在 `@Before` 方法中）。


    因此，理想情况下 `ConditionWatchers` 应成为 Espresso Kotlin DSL 的一部分，并在编写测试代码时作为链式调用之一使用。以下展示了如何将
    `ConditionWatchers` 声明为 DSL 的一部分（实现细节见 `EspressoDsl.kt`）：


    - `ConditionWatchers.waitForElement()`：

    - `ConditionWatchers.waitForElementFullyVisible()`：


    ```kotlin

    fun ViewInteraction.wait(): ViewInteraction =

    ConditionWatchers.waitForElement(this, FOUR_SECONDS)

    ```


    - `ConditionWatchers.waitForElementIsGone()`：


    ```kotlin

    fun ViewInteraction.waitFullyVisible(): ViewInteraction =

    ConditionWatchers.waitForElementFullyVisible(this, FOUR_SECONDS)

    ```


    ```kotlin

    fun ViewInteraction.waitForGone(): ViewInteraction =

    ConditionWatchers.waitForElementIsGone(this, FOUR_SECONDS)

    ```


    所有示例均返回 `ViewInteraction` 类型，并可如下所示链式调用到 Espresso 测试代码中。


    *`chapter3.testsamples.ViewActionsKotlinDslTest.addsNewToDoWithWaiterDsl()`。*


    ```kotlin

    @Test

    fun addsNewToDoWithWaiterDsl() {

    // 添加新的待办事项

    addFab.click()

    taskTitleField.wait().type(toDoTitle).closeKeyboard()

    taskDescriptionField.type(toDoDescription).closeKeyboard()

    editDoneFab.click()

    snackbar.waitForGone()

    // 验证待办事项列表中显示了包含标题的新待办事项

    viewWithText(toDoTitle).checkDisplayed()

    }

    ```


    ## 练习 13


    **`ConditionWatcher` 作为 DSL 的一部分**


    1.  实现一个测试，打开菜单抽屉并导航到另一个界面。在该测试中，添加一个条件监视器，等待菜单抽屉显示或隐藏。对于显示状态，使用 `ViewMatchers.isDisplayed()`；对于隐藏状态，使用
    hamcrest 的 `CoreMatchers.not(ViewMatchers.isDisplayed())`。


    2.  将上一任务中的 `DataInteraction waitForElement()` 函数作为 DSL 的一部分。


    ## 总结


    正确处理网络操作和异步操作是 UI 测试中必不可少的环节。应用 `IdlingResource` 或 `ConditionWatcher` 能让你的 UI
    测试更加稳定可靠。只要使用过一次，你就会清楚：完全没必要在整个测试中滥用显式的 `Thread.sleep()` 方法，这种做法既糟糕又容易出错。


    # 5. 使用 IntentMatchers 验证和存根 Intent


    在本章中，我们将讨论如何验证和存根应用程序的 Intent。Intent 是一种消息传递对象，可用于请求另一个应用组件执行操作。Intent 通过多种方式促进组件之间的通信。根据
    Android Intent 和过滤器文档（[`https://developer.android.com/guide/components/intents-filters`](https://developer.android.com/guide/components/intents-filters)），主要有三种基本用例：


    - **启动 Activity** —— Activity 代表 Android 应用程序中的单个屏幕。通过向 `Context.startActivity(Intent)`
    传递 Intent 即可启动 Activity 实例。传递的 Intent 应包含关于将启动哪个 Activity 的信息，并可能包含额外数据。当我们期待从启动的
    Activity 接收结果时，使用 `Context.startActivityForResult(Intent)` 方法。结果以 Intent 对象的形式返回，并可在
    `Activity.onActivityResult()` 回调中处理。


    - **启动服务** —— Android 中的服务代表一种在后台执行操作的机制。与 Activity 类似，通过向 `Context.startService(Intent)`
    传递 Intent 来启动服务。提供的 Intent 定义了要启动的服务，并可能包含额外数据。


    - **发送广播** —— 广播代表一种可由任何应用或系统发送和接收的消息。系统广播的一个示例是系统启动事件。通过向 `Context.sendBroadcast(Intent)`
    传递 Intent，可以将广播发送到其他应用。


    以下是属于这些 Intent 类型的 Intent 示例：


    - **启动 Activity 的 Intent** —— 通常用于为获取结果而启动 Activity 的 Intent。例如，在 Gmail 中点击附件按钮，会打开文件浏览器，以便查找并将文件附加到邮件中。


    - **启动服务的 Intent** —— 用于触发在后台运行的长时间进程，如文件下载或监听某些系统事件（如连接状态变化）。


    - **发送广播** —— 当需要发送本地 Intent 时使用，这意味着我们希望向与发送方位于同一应用中的接收器广播；或者只是将我们的广播发送给系统中所有能处理它的应用。一个示例是发送短信的广播。


    你可能已经知道，Espresso 无法在被测应用之外运行，这在启动 Activity Intent 或发送广播时是常见情况。因此，为了使 Espresso
    测试独立且封闭，我们需要使用 Espresso-Intents，它是 Espresso 的扩展，用于验证和存根被测应用发出的 Intent。


    ## 设置依赖项


    为了使用 Espresso-Intents，需要在应用模块的 `build.gradle` 文件中添加以下代码行：


    **Android Testing Support Library Espresso-Intents 依赖项。**


    ```groovy

    androidTestImplementation ''com.android.support.test.espresso:espresso-intents:3.0.2''

    ```


    **AndroidX Test Library Espresso-Intents 依赖项。**


    ```groovy

    androidTestImplementation ''androidx.test.espresso:espresso-intents:3.1.0''

    ```


    **注意：** Espresso-Intents 仅兼容 Espresso 2.1+ 和 Testing Support library 0.3+ 或 AndroidX
    Test library。


    因此，为了满足此兼容性要求，还必须更新以下依赖项。


    **Android Testing Support Library 依赖项。**


    ```groovy

    androidTestImplementation ''com.android.support.test:runner:1.0.2''

    androidTestImplementation ''com.android.support.test:rules:1.0.2''

    androidTestImplementation ''com.android.support.test.espresso:espresso-core:3.0.2''

    ```


    或者，如果使用 AndroidX Test library，则需要以下内容。


    **AndroidX Test library 依赖项。**

    '
