    ## 总结


    本章展示了如何在运行时更改 Android 模拟器系统语言，并描述了在 UI 测试中处理运行时权限的不同方法。应该清楚的是，多语言支持是现代 Android
    应用程序的必备功能。这需要彻底的测试，并且使测试环境能够轻松切换模拟器系统语言是此测试基础设施的重要组成部分。


    拥有一种简单可靠的方式来设置运行时权限，对最终用户来说是一个至关重要且敏感的话题。它影响用户满意度，应该进行彻底测试。应用程序应正确处理不同的权限流程，且不能出错。当然，选择哪种测试方法最适合您的具体情况，完全取决于您——使用`GrantPermissionRule`或使用
    UI Automator 框架完全自动化权限授予。凭借本章的知识，您可以轻松做到这一点。


    # 10. Android 测试自动化工具


    本章包含有关 Android 平台提供的用于测试自动化的工具的信息。我们将讨论为测试自动化设置虚拟或物理设备的相关主题，了解 Espresso Test Recorder
    如何帮助我们编写自动化测试，并学习如何在 Firebase Test Lab 中运行自动化测试。


    ## 为测试自动化设置虚拟或物理设备


    正确配置的虚拟或物理设备是获得可靠测试的必备条件。以下是可能影响测试执行并导致测试不稳定的设备属性列表：


    *   系统动画

    *   触摸和长按延迟

    *   虚拟键盘显示


    ### 系统动画


    不幸的是，Espresso 无法处理系统动画，这可能导致不稳定的测试。这是 Espresso 的主要限制之一。另一方面，动画应该手动测试，在自动化测试中禁用它们对我们没有坏处。Android
    操作系统有三种系统动画类型：


    *   **窗口动画缩放** — 设置窗口动画播放速度，以便您可以在不同速度下检查其性能。较低的缩放比例会导致更快的速度。

    *   **过渡动画缩放** — 设置过渡动画播放速度，以便您可以在不同速度下检查其性能。较低的缩放比例会导致更快的速度。

    *   **动画时长缩放** — 设置动画的持续时间。


    这些动画属性可在“设置” ➤ “系统” ➤ “开发者选项”中的“绘图”部分找到，如图 10-1 所示。


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig1_HTML.jpg](images/469090_1_En_10_Chapter/469090_1_En_10_Fig1_HTML.jpg)


    **图 10-1** 设备开发者选项中的系统动画属性


    当然，我们希望所有动画都能自动禁用。这可以通过两种方式实现。我们可以在测试运行前或设备启动时执行以下 shell 命令。


    *用于设置系统动画属性的 Shell 命令：*


    ```

    adb shell settings put global animator_duration_scale 0.0

    adb shell settings put global transition_animation_scale 0.0

    adb shell settings put global window_animation_scale 0.0

    ```


    第二种选择是执行相同的命令，但使用`UiDevice`实例在测试运行前执行。


    *在 @BeforeClass 方法中设置系统动画属性：*


    ```

    companion object {

    @BeforeClass

    @JvmStatic

    fun setDevicePreferencies() {

    val uiDevice = UiDevice.getInstance(InstrumentationRegistry.getInstrumentation())

    uiDevice.executeShellCommand("settings put global animator_duration_scale 0.0")

    uiDevice.executeShellCommand("settings put global transition_animation_scale 0.0")

    uiDevice.executeShellCommand("settings put global window_animation_scale 0.0")

    }

    }

    ```


    在此示例中，我们使用`@BeforeClass`注解为整个测试类执行一次。


    ### 触摸和长按延迟


    第二个可能导致不稳定的设备属性是**触摸和长按延迟**。您可以在“系统” ➤ “无障碍”部分找到它，如图 10-2 所示。


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig2_HTML.jpg](images/469090_1_En_10_Chapter/469090_1_En_10_Fig2_HTML.jpg)


    **图 10-2** 触摸和长按延迟无障碍属性


    此属性负责设置系统用来区分单击和长按操作的时间。如果单击的触摸时间超过了“触摸和长按延迟”限制，则会被解释为长按。如果您长按工具栏图标以查看其内容描述，就可以看到这一点。在某些真实设备上，当此延迟值较短时，单击可能变为长按，从而导致自动化
    UI 测试失败。为了避免这种情况，我们可以修改“触摸和长按延迟”值。

    第一种方法是执行以下 shell 命令（延迟值以毫秒为单位）：


    ```

    adb shell settings put secure long_press_timeout 1500

    ```


    第二种方法是从`@BeforeClass`方法内部运行，如下所示。


    *在 @BeforeClass 方法中设置触摸和长按延迟：*


    ```

    companion object {

    @BeforeClass

    @JvmStatic

    fun setDevicePreferencies() {

    val uiDevice = UiDevice.getInstance(InstrumentationRegistry.getInstrumentation())

    uiDevice.executeShellCommand("settings put secure long_press_timeout 1500")

    }

    }

    ```


    顺便说一下，默认的`Short`值设置为 500 毫秒，`Medium`设置为 1000 毫秒，`Long`设置为 1500 毫秒。


    ### 虚拟键盘显示


    现在让我们讨论最后一个可能导致测试不稳定的设备属性——**虚拟键盘显示**。乍一看，虚拟键盘似乎与测试不稳定性完全无关，但有一点我们必须记住——用于 Android
    的 Espresso 仅在测试上下文中在我们的应用程序内运行，并且不允许与任何第三方应用程序交互。


    猜猜怎么着？虚拟键盘不属于我们的应用程序。因此，可能会出现移动设备性能变慢，并且`ViewActions.closeSoftKeyboard()`方法执行不够快的情况。此时，如果测试需要点击隐藏在虚拟键盘后面的
    UI 元素（该键盘本应关闭，但仍处于关闭过程中），它们可能会意外点击到键盘。会抛出以下异常：


    ```

    java.lang.SecurityException: Injecting to another application requires INJECT_EVENTS
    permission

    ```


    为了避免此问题，我们可以手动禁用虚拟设备上的虚拟键盘显示。不幸的是，除非连接物理键盘，否则在真实设备上没有很好的方法来实现这一点。要禁用虚拟键盘，请导航至“设置”
    ➤ “系统” ➤ “语言与输入法” ➤ “实体键盘”，并禁用“显示虚拟键盘”选项。或者，同样可以通过 shell 来完成：


    ```

    adb shell settings put secure show_ime_with_hard_keyboard 0

    ```


    您也可以像下面这样从测试内部执行相同的命令。


    *在 @BeforeClass 方法中禁用虚拟键盘：*


    ```

    companion object {

    @BeforeClass

    @JvmStatic

    fun setDevicePreferencies() {

    val uiDevice = UiDevice.getInstance(InstrumentationRegistry.getInstrumentation())

    uiDevice.executeShellCommand("settings put secure show_ime_with_hard_keyboard
    0")

    }

    }

    ```'
