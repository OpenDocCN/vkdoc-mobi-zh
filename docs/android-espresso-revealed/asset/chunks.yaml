    \ hamcrest matchers for intent bundles. Bundles are used for passing data between\
    \ activities, usually in form of a `<key, value>` pair.\n* `hasEntry()` — Matches\
    \ a bundle object based on a `<key, value>` pair.\n* `hasKey()` — Matches a bundle\
    \ object based on a key.\n* `hasValue()` — Matches a bundle object based on a\
    \ value.\n\n**`ComponentNameMatchers`**:\n* `hasClassName()` — Matches a component\
    \ based on a class name.\n* `hasPackageName()` — Matches a component based on\
    \ a provided package name.\n* `hasShortClassName()` — Matches a component based\
    \ on the short class name."
