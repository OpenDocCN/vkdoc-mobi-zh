    ## Taking and Saving Screenshots Upon Test Failure


    Running tests is important, but it is also important to get proper and descriptive
    test results, especially when you have a test failure, so they can be easily analyzed.
    The JUnit reporter that is used by `AndroidJUnitRunner` reports test results in
    old, simple raw text format. Engineers then have to adapt it to their needs. Of
    course, one of those needs is to create a screenshot when a test fails. There
    are many third-party libraries and tools that can take screenshots upon test failure.
    A good example is Spoon from Square. But here we will talk about the native solution
    that comes with JUnit and Espresso.


    Let''s identify what we want to achieve in the test run flow:


    1.  Identify the moment when the test fails.


    2.  Take a screenshot and name it appropriately.


    3.  Save the screenshot on the given device or emulator.


    The JUnit Library starting with version 4.9 provides a `TestWatcher` mechanism
    that allows us to monitor and log passing and failing tests. It is an abstract
    class that extends `TestRule` and enables us to react to the following test states:


    *   `succeeded(Description description)`—Invoked when a test succeeds.

    *   `failed(Throwable e, Description description)`—Invoked when a test fails.

    *   `skipped(AssumptionViolatedException e, Description description)`—Invoked
    when a test is skipped due to a failed assumption.

    *   `starting(Description description)`—Invoked when a test is about to start.

    *   `finished(Description description)`—Invoked when a test method finishes (whether
    passing or failing).


    Here we are interested in the `failed()` method, which we will override the `BaseTest`
    class (however, other methods can be also helpful in many cases). This addresses
    our first point (identify the moment when the test fails).'
