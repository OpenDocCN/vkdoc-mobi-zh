    如你所见，`BrailleBack` 依赖于 `TalkBack`，后者会向用户读出当前屏幕上每个可用的交互元素。为了让视觉障碍用户能够无障碍地使用 Android
    应用，开发者应遵循无障碍指南。其中包括：


    - **为 UI 元素添加标签** — 许多屏幕阅读器（如 `TalkBack`）依赖此服务来正确解释特定控件的功能。例如，对于 `ImageView` 和
    `ImageButton` 这类 UI 对象，需设置 `android:contentDescription` 参数来指定其用途。对于 `EditText`
    对象，则使用 `android:hint`。


    - **对内容进行分组** — 正如可视 UI 被分组为易于理解的组件（如包含列表项的列表），屏幕阅读器的内容也应以逻辑方式分组。项目应作为一个整体通告（例如一个包含标题、描述和复选框状态的待办事项项），而不是作为独立元素呈现。


    - **创建易于遵循的导航** — 应用应支持键盘导航和导航手势。避免 UI 元素在特定时间后淡出或消失。


    - **使触摸目标足够大** — 提供更大的触摸目标，可显著提升用户导航应用的便捷性。通常，根据指南，可聚焦项的触摸区域最小应为 `48dp x 48dp`。


    - **提供充分的颜色对比度** — 视力不佳或使用屏幕亮度较低设备的用户难以读取屏幕信息。通过提高应用中前景与背景颜色的对比度，用户可以更轻松地在屏幕内和屏幕间导航。


    ## 测试应用无障碍


    `Espresso` 测试框架支持编写自动化的无障碍测试，用于评估应用的无障碍性。要开始编写无障碍测试，请将以下依赖项添加到 `build.gradle`
    文件中。


    *在应用模块的 `build.gradle` 文件中添加 Android 测试支持库的无障碍依赖项。*


    ```

    androidTestImplementation "com.android.support.test.espresso:espresso-accessibility:3.0.2"

    androidTestImplementation "com.google.android.apps.common.testing.accessibility.framework:accessibility-test-framework:2.1"

    ```


    *在应用模块的 `build.gradle` 文件中添加 AndroidX 测试库的无障碍依赖项。*


    ```

    androidTestImplementation ''androidx.test.espresso:espresso-accessibility:3.1.0''

    androidTestImplementation "com.google.android.apps.common.testing.accessibility.framework:accessibility-test-framework:2.1"

    ```


    添加这些依赖项后，你需启用无障碍检查，如下例所示：


    ```

    companion object {

    @BeforeClass

    @JvmStatic

    fun setAccessibilityPrefs() {

    AccessibilityChecks.enable()

    }

    }

    ```


    注意：每个测试类中 `AccessibilityChecks` 只能启用一次，否则测试将失败。因此，应在启用检查的方法上使用 `@BeforeClass`
    注解。在 Kotlin 中，带有 `@BeforeClass` 注解的方法需声明在 `class` 的伴生对象中。


    设置了 `AccessibilityChecks.enable()` 后，每次在 UI 元素（包括其子元素）上调用 Espresso 的 `ViewAction`
    时都会启用检查。此方法将无障碍测试限制为仅涵盖 UI 测试范围。若要在测试运行中覆盖更多 UI 元素，可设置 `setRunChecksFromRootView(true)`，从而验证整个视图层级。


    *`chapter7. AccessibilityTest.kt` 类中的伴生对象。*


    ```

    @BeforeClass

    @JvmStatic

    fun setAccessibilityPrefs() {

    AccessibilityChecks.enable().setRunChecksFromRootView(true)

    }

    ```


    遗憾的是，无法针对每个测试方法或测试类单独设置无障碍检查，也无法在测试运行后将其禁用。


    有时，已知的无障碍问题可能尚未解决。借助 `com.google.android.apps.common.testing.accessibility.framework`
    中实现的 `AccessibilityValidator`，你可以抑制这些问题：


    ```

    @BeforeClass

    @JvmStatic

    fun setAccessibilityPrefs() {

    AccessibilityChecks.enable()

    .setRunChecksFromRootView(true)

    .setSuppressingResultMatcher(AccessibilityCheckResultUtils.matchesViews(

    hasSibling(withId(R.id.menu_filter))))

    }

    ```


    类似地，你也可以借助 `anyOf()` 匹配器来抑制多个无障碍问题，如下所示：


    ```

    @BeforeClass

    @JvmStatic

    fun setAccessibilityPrefs() {

    AccessibilityChecks.enable()

    .setRunChecksFromRootView(true)

    .setSuppressingResultMatcher(AccessibilityCheckResultUtils.matchesViews(anyOf(

    hasSibling(withId(R.id.menu_filter)),

    withChild(withChild(withId(android.support.design.R.id.snackbar_text))))))

    }

    ```


    顺便提一下，你可能会注意到原生 Android UI 元素（如 Snackbar）存在无障碍问题。有时抑制它们并非易事。在之前的代码示例中，`withChild()`
    视图匹配器被使用了两次，以定位 Snackbar 的根布局并抑制其无障碍问题。


    你还可以通过向 `setThrowExceptionForErrors()` 方法提供 `false` 值，让测试即使在存在无障碍问题时也能继续运行：


    ```

    @BeforeClass

    @JvmStatic

    fun setAccessibilityPrefs() {

    AccessibilityChecks.enable()

    .setRunChecksFromRootView(true)

    .setSuppressingResultMatcher(AccessibilityCheckResultUtils.matchesViews(anyOf(

    hasSibling(withId(R.id.menu_filter)),

    withChild(withChild(withId(android.support.design.R.id.snackbar_text))))))

    .setThrowExceptionForErrors(false)

    }

    ```


    在这种情况下，所有问题都将重定向到 `logcat` 日志，其中 `I` 级别的日志为信息性日志（显示为黑色），`W` 为警告（显示为蓝色），`E` 为错误（显示为红色）。见图
    7-1。


    ![../images/469090_1_En_7_Chapter/469090_1_En_7_Fig1_HTML.jpg](img/469090_1_En_7_Fig1_HTML.jpg)


    **图 7-1** 设置 `setThrowExceptionForErrors(false)` 时的无障碍 `logcat` 日志


    以下是测试失败后无障碍问题堆栈跟踪的示例：


    ```

    com.google.android.apps.common.testing.accessibility.framework.integrations.AccessibilityViewCheckException:
    There was 1 accessibility error:

    OverflowMenuButton{id=-1, desc=More options, visibility=VISIBLE, width=105, height=126,
    has-focus=false, has-focusable=false, has-window-focus=false, is-clickable=true,
    is-enabled=true, is-focused=false, is-focusable=true, is-layout-requested=false,
    is-selected=false, layout-params=android.support.v7.widget.ActionMenuView$LayoutParams@48cbb74,
    tag=null, root-is-layout-requested=true, has-input-connection=false, x=127.0,
    y=10.0}: View falls below the minimum recommended size for touch targets. Minimum
    touch target width is 48dp. Actual width is 40dp.

    at com.google.android.apps.common.testing.accessibility.framework.integrations.espresso.AccessibilityValidator.processResults(AccessibilityValidator.java:187)...

    ```


    你可能注意到，两种情况下的头部部分是完全相同的。除了自动化的无障碍测试，Google 开发者还提供了使用 Accessibility Scanner 应用（[`https://play.google.com/store/apps/details?id=com.google.android.apps.accessibility.auditor`](https://play.google.com/store/apps/details%253Fid%253Dcom.google.android.apps.accessibility.auditor)）进行手动测试的可能性。该应用允许你检查无障碍问题的类型，并基于可视化表示更好地理解
    Espresso 无障碍测试报告或 `logcat` 日志中显示的错误。


    图 7-2 展示了无障碍扫描器的设置过程。


    ![../images/469090_1_En_7_Chapter/469090_1_En_7_Fig2_HTML.jpg](img/469090_1_En_7_Fig2_HTML.jpg)


    **图 7-2** 开始使用无障碍扫描器流程

