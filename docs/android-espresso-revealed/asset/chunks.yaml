- fmt: '# Waiting for UI Elements


    The last method also has a `findObjects(BySelector)` sample. In our specific case,
    we use this method to get the list of TO-DO items and then navigate through its
    items based on the position in the list. This should be it about finding and acting
    on elements using the UI Automator. Of course, we haven’t covered all the possible
    search criteria and actions, but the examples we discuss should be a good basis
    for you to move forward.


    In such test frameworks like UI Automator—where automated tests interact with
    multiple applications and where we don’t have much control over network requests
    execution, application transitions, or animations—it is important to have proper
    waiting mechanisms that will allow us to write more reliable test code.


    UI Automator waitings are presented by three types:


    - **Waiting for** `EventCondition`—A condition that depends on an event or series
    of events having occurred.

    - **Waiting for** `SearchCondition`—A condition that is satisfied by searching
    for UI elements.

    - **Waiting for** `UiObject2Condition`—A condition that is satisfied when a `UiObject2`
    is in a particular state.


    All the conditions are implemented in the `android.support.test.uiautomator.Until.java`
    class in the Android Testing Support library or in `androidx.test.uiautomator`
    inside the AndroidX Test library. The previous section contains some waiting examples
    and you probably noticed them. Waiting for an `EventCondition` was used in the
    following line and is responsible for finding the Add Task floating action button,
    clicking it, and then waiting for a new window to be presented to the user.


    `chapter8.UiAutomatorUiWatcherTest.kt`: Instantiating `UiWatcher` Object.


    ```

    uiDevice.wait(

    Until.findObject(By.res(applicationPackage, "fab_add_task")), twoSeconds)

    .clickAndWait(Until.newWindow(), twoSeconds)

    ```


    Here, `EventCondition` is a change from the current window to a new one. It is
    used only as a parameter to the `clickAndWait(EventCondition, Timeout)` method.
    Here are the `EventConditions`:


    - `newWindow()`—Returns a condition that depends on a new window having appeared.

    - `scrollFinished()`—Returns a condition that depends on a scroll having reached
    the end in the given direction.


    `SearchCondition` is responsible for locating elements in the layout and represents
    the second waitings group:


    - `gone()`—Returns a `SearchCondition` that is satisfied when no elements matching
    the selector can be found.

    - `hasObject()`—Returns a `SearchCondition` that is satisfied when at least one
    element matching the selector can be found.

    - `findObject()`—Returns a `SearchCondition` that is satisfied when at least one
    element matching the selector can be found. The condition will return the first
    matching element.

    - `findObjects()`—Returns a `SearchCondition` that is satisfied when at least
    one element matching the selector can be found. The condition will return all
    matching elements.


    We already used the `gone()` method while waiting for snackbar with the `TO-DO
    saved` text gone in the create TO-DO flow, as shown here:


    ```

    uiDevice.wait(Until.gone(By.text("TO-DO saved"), twoSeconds)

    ```


    Here is an example of `hasObject()`:


    ```

    uiDevice.wait(Until.hasObject(By.text("TO-DO saved"), twoSeconds)

    ```


    And the last type is `UiObject2Condition`. It waits for the specific UI object
    state or property:


    - `checkable()`—Returns a condition that depends on a `UiObject2` checkable state.

    - `checked()`—Returns a condition that depends on a `UiObject2` checked state.

    - `clickable()`—Returns a condition that depends on a `UiObject2` clickable state.

    - `enabled()`—Returns a condition that depends on a `UiObject2` enabled state.

    - `focusable()`—Returns a condition that depends on a `UiObject2` focusable state.

    - `focused()`—Returns a condition that depends on a `UiObject2`’s focused state.

    - `longClickable()`—Returns a condition that depends on a `UiObject2`’s long clickable
    state.

    - `scrollable()`—Returns a condition that depends on a `UiObject2`’s scrollable
    state.

    - `selected()`—Returns a condition that depends on a `UiObject2`’s selected state.

    - `descMatches()`—Returns a condition that is satisfied when the object’s content
    description matches the given regex.

    - `descEquals()`—Returns a condition that is satisfied when the object’s content
    description exactly matches the given string.

    - `descContains()`—Returns a condition that is satisfied when the object’s content
    description contains the given string.

    - `descStartsWith()`—Returns a condition that is satisfied when the object’s content
    description starts with the given string.

    - `descEndsWith()`—Returns a condition that is satisfied when the object’s content
    description ends with the given string.

    - `textMatches()`—Returns a condition that is satisfied when the object’s text
    value matches the given regex.

    - `textNotEquals()`—Returns a condition that is satisfied when the object’s text
    value does not match the given string.

    - `textEquals()`—Returns a condition that is satisfied when the object’s text
    value exactly matches the given string.

    - `textContains()`—Returns a condition that is satisfied when the object’s text
    value contains the given string.

    - `textStartsWith()`—Returns a condition that is satisfied when the object’s text
    value starts with the given string.

    - `textEndsWith()`—Returns a condition that is satisfied when the object’s text
    value ends with the given string.


    The list is big enough and covers most used elements properties. They are similar
    to Espresso’s `ViewMatchers`, which we are already familiar with. Waiting for
    `UiObject2Condition` can be demonstrated by the following line of code, which
    searches for the first element inside the TO-DO recycler view list, locates the
    checkbox element in it, and waits until it is checked.


    **Waiting for `UiObject2Condition` Sample:**


    ```

    uiDevice.findObject(By.clazz(RecyclerView::class.java)).children[0]

    .findObject(By.clickable(true))

    .wait(Until.checked(true), twoSeconds)

    ```


    Considering what we’ve covered so far, we can admit that UI Automator is a powerful
    test framework that can be used as a standalone test automation tool. But wait,
    we haven’t yet unleashed its full power. Let’s move to the next section and see
    what it prepared for us.


    # Watching for Conditions


    There is one not widely known UI Automator feature that can add big value to your
    automated tests. The `UiWatcher` class represents a conditional watcher on the
    target device being tested. It contains only one method:


    - `checkForCondition()`—Custom handler that is automatically called when the testing
    framework is unable to find a match using the `UiSelector`.'
