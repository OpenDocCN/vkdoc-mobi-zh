    ## 从 Android Studio 在 Firebase Test Lab 中运行 Espresso 测试


    众所周知，Android 平台本质上存在严重的设备碎片化问题。为了应对这一问题，你可能会根据使用统计数据准备多种移动设备，但这考虑到设备维护成本，代价相当高昂。尽管在手动测试中这是必需品，但在测试自动化中，我们更倾向于使用
    Android 模拟器、自定义设备实验室或第三方服务。


    第三方服务确实曾为移动开发者提供了这种可能性，但它们缺乏标准化且成本高昂。于是，谷歌决定将其自身的设备测试解决方案引入 Android 生态系统，即 Firebase
    Test Lab。它允许开发者在真实设备或模拟器上运行自动化测试，而无需自行维护这些设备。


    让我们来看看如何开始使用 Firebase 及其带来的好处。首先，从 [`https://firebase.google.com/`](https://firebase.google.com/)
    进入 Firebase 控制台，并使用你的 Google 账户登录（见图 10-11）。


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig11_HTML.jpg](img/469090_1_En_10_Fig11_HTML.jpg)


    图 10-11

    Firebase 工具栏


    你会注意到，这里已经有一些可供试用的示例项目，并且你可以通过点击 `Add Project` 来添加自己的项目。参见图 10-12。


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig12_HTML.jpg](img/469090_1_En_10_Fig12_HTML.jpg)


    图 10-12

    Firebase 欢迎界面


    点击 `Add Project` 后，系统会要求你提供项目名称，并选择与服务地点相关的其他参数。一旦提供项目名称，项目将自动获得其项目 ID，这是你 Firebase
    项目的唯一标识符。参见图 10-13。


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig13_HTML.jpg](img/469090_1_En_10_Fig13_HTML.jpg)


    图 10-13

    Firebase：添加项目


    完成这些操作后，你将进入“项目概览”页面。在此页面中，你可以导航至 Test Lab，如图 10-14 所示。


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig14_HTML.jpg](img/469090_1_En_10_Fig14_HTML.jpg)


    图 10-14

    Firebase Test Lab 初始状态


    现在一切就绪，可以供我们的自动化测试使用了。由于我们想要通过 Android Studio 运行测试，因此需要在此处设置正确的测试配置。为此，我们打开 `Run`
    ➤ `Edit Configurations…` 菜单，选择 `Android Instrumentation Tests`，然后点击 `+` 按钮添加一个新的配置，如图
    10-15 所示。


    ![../images/469090_1_En_10_Chapter/469090_1_En_10_Fig15_HTML.jpg](img/469090_1_En_10_Fig15_HTML.jpg)


    图 10-15

    添加 Firebase Test Lab 插桩测试配置


