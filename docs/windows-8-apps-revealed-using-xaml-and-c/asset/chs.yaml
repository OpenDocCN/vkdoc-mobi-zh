  \n图 5-3 在清单中启用功能\n\n## 控制后台任务\n\n所有基础工作就绪后，我可以转向后台任务的管理以及与生命周期事件的集成——毕竟这些才是本例的核心。清单\
  \ 5-6 展示了我对`App.xaml.cs`文件所做的更改。\n\n![image](img/sq.jpg) **注意** 再次强调，这是一个高级示例。如果你不熟悉\
  \ .NET 并行编程模型，请跳转到下一节，我将演示如何在应用中实现 Windows 协定。\n\n**清单 5-6 为后台任务更新 App.xaml.cs 文件**\n\
  \n```csharp\nusing GrocerApp.Data;\nusing System;\nusing System.Threading;\nusing\
  \ System.Threading.Tasks;\nusing Windows.ApplicationModel;\nusing Windows.ApplicationModel.Activation;\n\
  using Windows.UI.Core;\nusing Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\n\
  \nnamespace GrocerApp {\n\n    sealed partial class App : Application {\n      \
  \  private ViewModel viewModel;\n        private Task locationTask;\n        private\
  \ CancellationTokenSource locationTokenSource;\n\n        public App() {\n     \
  \       this.InitializeComponent();\n\n            viewModel = new ViewModel();\n\
  \n            // ...为简洁起见，删除了测试数据...\n\n            this.Suspending += OnSuspending;\n\
  \            this.Resuming += OnResuming;\n        }\n\n        protected override\
  \ void OnLaunched(LaunchActivatedEventArgs args) {\n            Frame rootFrame\
  \ = Window.Current.Content as Frame;\n\n            if (rootFrame == null) {\n \
  \               rootFrame = new Frame();\n                Window.Current.Content\
  \ = rootFrame;\n            }\n\n            if (rootFrame.Content == null) {\n\n\
  \                if (!rootFrame.Navigate(typeof(Pages.MainPage), viewModel)) {\n\
  \                    throw new Exception(\"创建初始页面失败\");\n                }\n   \
  \         }\n            Window.Current.Activate();\n            StartLocationTracking(rootFrame);\n\
  \        }\n\n        private void OnResuming(object sender, object e) {\n     \
  \       viewModel.Location = \"Unknown\";\n            StartLocationTracking(Window.Current.Content\
  \ as Frame);\n        }\n\n        private void OnSuspending(object sender, SuspendingEventArgs\
  \ e) {\n            StopLocationTracking();\n            SuspendingDeferral deferral\
  \ = e.SuspendingOperation.GetDeferral();\n            locationTask.Wait();\n   \
  \         deferral.Complete();\n        }\n\n        private void StartLocationTracking(Frame\
  \ frame) {\n            locationTokenSource = new CancellationTokenSource();\n \
  \           CancellationToken token = locationTokenSource.Token;\n\n           \
  \ locationTask = new Task(async () => {\n                while (!token.IsCancellationRequested)\
  \ {\n                    await frame.Dispatcher.RunAsync(CoreDispatcherPriority.\n\
  \                    Normal,\n                        async () => {\n          \
  \                  viewModel.Location = await Location.\n                      \
  \      TrackLocation();\n                        });\n                    token.WaitHandle.WaitOne(5000);\n\
  \                }\n            });\n            locationTask.Start();\n       \
  \ }\n\n        private void StopLocationTracking() {\n            locationTokenSource.Cancel();\n\
  \        }\n    }\n}\n```\n\n对此类的更改代表了两种不同的活动。第一种是以后台任务的形式追踪用户位置，包含在`StartLocationTracking`和`StopLocationTracking`方法中。我希望你将这两个方法视为黑盒，因为我无法深入探讨我所依赖的\
  \ TPL 概念和特性。关键信息是：`StartLocationTracking`方法启动一个后台活动，每五秒报告一次位置；而`StopLocationTracking`方法则取消该任务。\n\
  \n我*真正*想讨论的是如何将这个后台任务与生命周期事件集成。响应应用启动或`Resuming`事件很简单；只需调用`StartLocationTracking`方法即可。\n\
  \n对于`Suspending`事件，我希望确保后台任务在应用挂起前已完成。如果不采取这一步，我就面临两种风险：要么在应用恢复时显示过期数据，要么因尝试读取网络请求（该请求可能已在应用挂起期间被服务器关闭）而导致错误。\n\
  \n\n# 为了解决这个问题，`SuspendingEventArgs.SuspendingOperation.GetDeferral` 方法会告知 Windows\
  \ 运行时：我尚未准备好让应用被挂起，还需要一些额外时间。这为我提供了一个短暂的时间窗口来完成任务的等待。`GetDeferral` 方法返回一个 `SuspendingDeferral`\
  \ 对象，当应用准备好被挂起时，我会调用它的 `Complete` 方法。\n\n请求延迟执行可以为准备挂起状态争取额外的五秒钟时间。这听起来似乎不多，但考虑到\
  \ Windows 可能正承受巨大压力，需要让您的应用让出系统资源，这已经显得相当慷慨了。\n\n## 分发 UI 更新\n\n清单 5-6 中另一个值得注意的方面是：\n\
  \n```\n. . .\nawait frame.Dispatcher.RunAsync(CoreDispatcherPriority.Normal,\n    async\
  \ () => {\n        viewModel.Location = await Location.TrackLocation();\n});\n.\
  \ . .\n```\n\nWindows 只允许通过指定的线程来更新 UI 控件；该线程正是用于实例化应用的线程。如果我在后台任务中更新视图模型，由此触发的事件最终会导致错误的线程尝试更新数据绑定并向用户显示位置信息。这将会引发一个异常，并显示如下详细消息：\n\
  \n```\nThe application called an interface that was marshalled for a different thread\n\
  ```\n\n我需要确保使用 `Dispatcher` 在正确的线程上推送更新。然而，我的 `App` 类所派生的 `Application` 类中并没有可用的\
  \ `Dispatcher` 属性。为了解决这个问题，我使用了在 `OnLaunched` 方法中创建的 `Frame` 控件中的 `Dispatcher`。\n\
  \n## 测试后台任务\n\n剩下的工作就是测试后台任务是否与生命周期事件正确配合。最简单的方法是使用模拟器，它支持模拟位置数据。\n\n首先，在模拟器中定义一个位置（模拟器窗口右侧的某个按钮可以打开“设置位置”对话框，您可以在其中输入位置）。\n\
  \n指定位置后，启动应用，请务必在不使用调试器的情况下启动。几秒钟后，您将看到应用窗口顶部显示的位置信息，如图 5-4 所示。\n\n![image](img/sq.jpg)\
  \ **提示** 我在本示例中使用了帝国大厦的坐标。如果您也想这样做，请使用“设置位置”对话框，指定纬度值 40.748 和经度值 -73.98。\n\n![9781430250340_Fig05-04.jpg](img/9781430250340_Fig05-04.jpg)\n\
  \n图 5-4. 向用户显示位置信息\n\n切换到桌面，使用任务管理器监控应用，直到其被挂起。在应用挂起期间，使用模拟器的“设置位置”对话框更改位置。\n\n\
  恢复示例应用。`Resuming` 事件将重新启动后台任务，确保显示最新数据。\n\n![image](img/sq.jpg) **提示** 您可能需要授予模拟器和应用访问您位置数据的权限。系统会自动检查所需设置并提示您对系统配置进行必要的更改。\n\
  \n## 实现协定\n\n`Suspending` 和 `Resuming` 并非唯一的生命周期事件。还有其他事件，这些事件被 Windows 用作*协定*体系的一部分，这些协定能让您的应用与操作系统的其他部分更紧密地集成。在本节中，我将演示*搜索*协定，它告诉\
  \ Windows 我的应用愿意并且能够使用平台范围的搜索功能。\n\n### 声明对协定的支持\n\n实现协定的第一步是更新清单文件。打开 `Package.appxmanifest`\
  \ 文件并切换到“声明”选项卡。如果打开“可用声明”菜单，您将看到可以声明支持的协定列表。选择“搜索”并点击“添加”按钮。“搜索”协定将出现在“支持的声明”列表中，如图\
  \ 5-5 所示。\n\n![9781430250340_Fig05-05.jpg](img/9781430250340_Fig05-05.jpg)\n\n图\
  \ 5-5. 声明对搜索协定的支持\n\n忽略该协定中的 `Properties` 部分；这些设置允许您将搜索协定下的义务委托给另一个应用，不过我不会这么做。\n\
  \n### 实现搜索功能\n\n搜索协定的目的是将操作系统搜索系统与您应用中的某种搜索功能连接起来。以我的示例应用为例，我将通过遍历购物清单上的项目，并选择第一个包含用户正在搜索的字符串的项目来处理搜索请求。这不会是最复杂的搜索实现，但它能让我专注于协定本身，而不会被创建大量新代码来处理搜索所困扰。我在\
  \ `ViewModel` 类中添加了一个名为 `SearchAndSelect` 的方法，如清单 5-7 所示。\n\n***清单 5-7.** 向视图模型添加搜索支持*\n\
  \n```\nusing System.Collections.Generic;\nusing System.Collections.ObjectModel;\n\
  using System.ComponentModel;\n\nnamespace GrocerApp.Data {\n    public class ViewModel\
  \ : INotifyPropertyChanged {\n        private ObservableCollection<GroceryItem>\
  \ groceryList;\n        private List<string> storeList;\n        private int selectedItemIndex;\n\
          private string homeZipCode;\n        private string location;\n\npublic\
  \ ViewModel() {\n            groceryList = new ObservableCollection<GroceryItem>();\n\
              storeList = new List<string>();\n            selectedItemIndex = -1;\n\
              homeZipCode = \"NY 10118\";\n            location = \"Unknown\";\n        }\n\
  \npublic void SearchAndSelect(string searchTerm) {\n            int selIndex = -1;\n\
              for (int i = 0; i < GroceryList.Count; i++) {\n                if (GroceryList[i].Name.ToLower().Contains(searchTerm.\n\
                  ToLower())) {\n                    selIndex = i;\n                    break;\n\
                  }\n            }\n            SelectedItemIndex = selIndex;\n        }\n\
  \n// ...为简洁起见，省略了属性...\n\npublic event PropertyChangedEventHandler PropertyChanged;\n\
          private void NotifyPropertyChanged(string propName) {\n            if (PropertyChanged\
  \ != null) {\n                 PropertyChanged(this, new PropertyChangedEventArgs(propName));\n\
              }\n        }\n    }\n}\n```\n\n此方法将接收用户正在搜索的字符串。它会查找购物清单中的项目，并将选中项设置为找到的第一个匹配项，如果未找到匹配项，则设置为\
  \ `-1`。由于 `SelectedItemIndex` 属性是可观察的，这意味着搜索某个项目将选中它，并在应用布局中显示其详细信息。\n\n我希望 `ListPage`\
  \ 中的 `ListView` 控件能够选中匹配的项目，因此我对 `ListPage.xaml.cs` 代码隐藏类做了一个小改动，如清单 5-8 所示。\n\n\
  ***清单 5-8.** 确保正确显示选中项*\n\n```\n. . .\nprotected override void OnNavigatedTo(NavigationEventArgs\
  \ e) {\n\nviewModel = (ViewModel)e.Parameter;\n```\n\n\n\n`ItemDetailFrame.Navigate(typeof(NoItemSelected));<br>    viewModel.PropertyChanged\
  \ += (sender, args) => {<br>        if (args.PropertyName == \"SelectedItemIndex\"\
  ) {<br>            groceryList.SelectedIndex = viewModel.SelectedItemIndex;<br>            if\
  \ (viewModel.SelectedItemIndex == -1) {<br>                ItemDetailFrame.Navigate(typeof(NoItemSelected));<br>                AppBarDoneButton.IsEnabled\
  \ = false;<br>            } else {<br>                ItemDetailFrame.Navigate(typeof(ItemDetail),\
  \ viewModel);<br>                AppBarDoneButton.IsEnabled = true;<br>            }<br>        }<br>    };<br>}`\n\
  \n## 响应搜索生命周期事件\n\n`Application` 类通过为每个协定提供可重写的方法，使得实现协定变得非常容易。清单 5-9 展示了我对 `OnSearchActivated`\
  \ 方法的实现，当用户通过搜索指定我的应用作为目标时，就会调用该方法。\n\n***清单 5-9.** 响应搜索*\n\n```\nusing GrocerApp.Data;\n\
