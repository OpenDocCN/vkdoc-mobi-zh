- '# 应用生命周期与合约




  '
- "# 本章内容\n\n作为本书的最后一章，我将向你展示如何通过响应关键的 Windows 事件来控制应用生命周期。我将向你展示如何修复 Visual Studio\
  \ 添加到项目中的代码，如何正确处理应用的挂起与恢复，以及如何实现契约，让你的应用融入 Windows 8 提供的更广泛用户体验中。在此过程中，我将演示地理位置功能的使用，并展示如何设置和管理重复执行的异步任务。表\
  \ 5-1 提供了本章的总结。\n\n表 5-1. 本章总结\n\n| 问题 | 解决方案 | 清单编号 |\n| --- | --- | --- |\n| 确保你的应用接收生命周期事件。\
  \ | 处理 `Application` 类中定义的 `Suspending` 和 `Resuming` 事件。 | 1–2 |\n| 确保应用挂起时后台任务能够干净地终止。\
  \ | 请求延迟，并利用这五秒的宽限期为挂起做准备。 | 3-6 |\n| 实现一个契约。 | 在你的代码中添加功能实现，并重写 `Application` 方法，以便在契约被调用时接收生命周期事件。\
  \ | 7–9 |\n\n## 处理应用生命周期\n\n在第 1 章中，我向你展示了 Visual Studio 放置在 `App.xaml.cs` 文件中的骨架代码，以便快速启动我的示例项目。这段代码处理\
  \ Windows 应用生命周期事件，确保我能够对操作系统发送给我的信号做出适当的响应。Windows 应用的生命周期有三个关键阶段。\n\n第一阶段是**激活**，发生在你的应用启动时。Windows\
  \ 运行时将加载并处理你的内容，并在一切准备就绪时发出信号。例如，正是在激活阶段，我生成了示例应用的动态内容。\n\n用户通常不会关闭 Windows 应用；他们只是切换到另一个应用，让\
  \ Windows 来处理后续事宜。这就是为什么 Windows 应用的用户界面上没有关闭按钮或菜单栏。一个不再需要的应用会被转入第二阶段，即**挂起**。当应用挂起时，不会执行任何代码，也不会与用户发生任何交互。\n\
  \n如果用户切换回一个已挂起的应用，那么第三阶段就会发生：**恢复**应用。应用会显示给用户，并且应用代码的执行会恢复。挂起的应用并不总是会被恢复；例如，如果设备内存不足，Windows\
  \ 可能直接终止一个挂起的应用。\n\n## 修正 Visual Studio 事件代码\n\n我需要做的第一个更改是从 `MainPage.xaml.cs`\
  \ 代码隐藏文件中移除视图模型。一直以来，我逐步移动视图模型，以展示它在 Windows 应用中的核心作用。在本章中，我将向你展示一些功能，这些功能要求视图模型作为生命周期的一部分被创建。你可以在清单\
  \ 5-1 中看到简化后的 `MainPage.xaml.cs` 文件。\n\n**清单 5-1.** 从 `MainPage.xaml.cs` 文件中移除视图模型实例化\n\
  \n```\nusing GrocerApp.Data;\nusing System;\nusing Windows.Data.Xml.Dom;\nusing\
  \ Windows.UI.Notifications;\nusing Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\n\
  using Windows.UI.Xaml.Navigation;\n\nnamespace GrocerApp.Pages {\n\npublic sealed\
  \ partial class MainPage : Page {\n        private ViewModel viewModel;\n\npublic\
  \ MainPage() {\n            this.InitializeComponent();\n        }\n\nprivate void\
  \ UpdateBadge() {\n            // . . .为简洁起见，省略了语句。. . .\n        }\n\nprivate void\
  \ UpdateTile() {\n            // . . .为简洁起见，省略了语句。. . .\n        }\n\nprotected\
  \ override void OnNavigatedTo(NavigationEventArgs e) {\n            viewModel =\
  \ (ViewModel)e.Parameter;\n            this.DataContext = viewModel;\n\nMainFrame.Navigate(typeof(ListPage),\
  \ viewModel);\n\nviewModel.GroceryList.CollectionChanged += (sender, args) => {\n\
  \                UpdateTile();\n                UpdateBadge();\n            };\n\
  \nUpdateTile();\n            UpdateBadge();\n        }\n\nprivate void NavBarButtonPress(object\
  \ sender, RoutedEventArgs e) {\n            Boolean isListView = (Button)sender\
  \ == ListViewButton;\n            MainFrame.Navigate(isListView ? typeof(ListPage)\n\
  \                : typeof(DetailPage), viewModel);\n\n}\n    }\n}\n```\n\n现在，我可以转向\
  \ `App.xaml.cs` 文件，并在模板代码的基础上构建，以响应应用生命周期的变化。不幸的是，Visual Studio 添加到项目中的用于处理生命周期事件的代码并不奏效。它可以很好地处理激活和挂起，但无法在应用被恢复时通知应用。幸运的是，解决方案非常简单，你可以在清单\
  \ 5-2 中看到需要对 `App.xaml.cs` 进行的更改。\n\n**清单 5-2.** 处理生命周期通知事件\n\n```\nusing GrocerApp.Data;\n\
  using System;\nusing Windows.ApplicationModel;\nusing Windows.ApplicationModel.Activation;\n\
  using Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\n\nnamespace GrocerApp {\n\
  \nsealed partial class App : Application {\n        private ViewModel viewModel;\n\
  \npublic App() {\n            this.InitializeComponent();\n\nviewModel = new ViewModel();\n\
  \nviewModel.StoreList.Add(\"Whole Foods\");\n            viewModel.StoreList.Add(\"\
  Kroger\");\n            viewModel.StoreList.Add(\"Costco\");\n            viewModel.StoreList.Add(\"\
  Walmart\");\n\nviewModel.GroceryList.Add(new GroceryItem {\n                Name\
  \ = \"Apples\",\n                Quantity = 4, Store = \"Whole Foods\"\n       \
  \     });\n            viewModel.GroceryList.Add(new GroceryItem {\n           \
  \     Name = \"Hotdogs\",\n                Quantity = 12, Store = \"Costco\"\n \
  \           });\n            viewModel.GroceryList.Add(new GroceryItem {\n     \
  \           Name = \"Soda\",\n                Quantity = 2, Store = \"Costco\"\n\
  \            });\n            viewModel.GroceryList.Add(new GroceryItem {\n    \
  \            Name = \"Eggs\",\n                Quantity = 12, Store = \"Kroger\"\
  \n            });\n\nthis.Suspending += OnSuspending;\n            this.Resuming\
  \ += OnResuming;\n        }\n\nprotected override void OnLaunched(LaunchActivatedEventArgs\
  \ args) {\n            Frame rootFrame = Window.Current.Content as Frame;\n\nif\
  \ (rootFrame == null) {\n                rootFrame = new Frame();\n            \
  \    if (args.PreviousExecutionState == ApplicationExecutionState.\n           \
  \      Terminated)\n                {\n                    //TODO: 从先前挂起的应用程序加载状态\n\
  \                }\n                Window.Current.Content = rootFrame;\n      \
  \      }\n\nif (rootFrame.Content == null) {\n\nif (!rootFrame.Navigate(typeof(Pages.MainPage),\
  \ viewModel)) {\n                    throw new Exception(\"无法创建初始页面\");\n      \
  \          }\n            }\n            Window.Current.Activate();\n        }\n\
  \nprivate void OnResuming(object sender, object e) {\n            viewModel.GroceryList[1].Name\
  \ = \"Resume\";\n        }\n\nprivate void OnSuspending(object sender, SuspendingEventArgs\
  \ e) {\n            var deferral = e.SuspendingOperation.GetDeferral();\n      \
  \      viewModel.GroceryList[0].Name = \"Suspend\";\n            deferral.Complete();\n\
  \        }\n    }\n}\n```\n\n我已高亮显示最重要的更改，即注册 `Suspending` 和 `Resuming` 事件，并向这些事件的处理方法中添加了语句。Visual\
  \ Studio 在创建类时包含了一个用于处理 `Suspending` 事件的处理程序，但我必须添加 `Resuming` 处理程序才能收到事件通知。我移除了\
  \ `OnLaunched` 方法中的代码，这些代码试图（但未能）判断应用何时被恢复。\n\n\n\n"
- "# 我的应用目前没有执行任何会受到应用挂起和恢复影响的任务，但我想向您展示如何测试这些事件\n\n为此，我通过更改视图模型中 `GroceryList` 集合前两个项目的\
  \ `Name` 属性来响应 `Suspending` 和 `Resuming` 事件，以指示何时收到这些事件。\n\n## 模拟生命周期事件\n\n模拟生命周期事件最简单的方法是使用\
  \ Visual Studio。当您使用调试器启动应用时，Visual Studio 会在工具栏上显示一个菜单，允许您将生命周期事件发送到应用，我在图 5-1\
  \ 中高亮显示了该菜单。\n\n![9781430250340_Fig05-01.jpg](img/9781430250340_Fig05-01.jpg)\n\n\
  图 5-1。向应用发送生命周期事件的 Visual Studio 按钮\n\n如果您选择菜单项来挂起然后恢复应用，您将看到视图模型数据的变化，如图 5-2 所示。（直到您恢复应用后，您才会看到这些变化；一旦应用被挂起，将不再处理任何\
  \ UI 更新。）\n\n![9781430250340_Fig05-02.jpg](img/9781430250340_Fig05-02.jpg)\n\n图\
  \ 5-2。指示已收到生命周期事件\n\n## 测试生命周期事件\n\n模拟生命周期事件的问题在于，您得到的结果与事件自然发生时并不完全相同。要模拟实际情况，您需要在不使用调试器的情况下启动应用，这正是通过视图模型指示已收到事件非常有用的原因。创建触发事件的条件需要一些特定操作，我将在以下部分逐步说明。\n\
  \n### 激活应用\n\n要触发 `activated` 事件，请从 Visual Studio 的 **调试** 菜单中选择 **启动但不调试** 来启动应用。您也可以从\
  \ **开始** 屏幕启动应用，无论是在模拟器中还是在本地机器上。关键点在于不要使用调试器启动应用。\n\n### 挂起应用\n\n挂起应用最简单的方法是按下\
  \ `Win+D` 切换到桌面。打开 **任务管理器**，右键单击您的应用对应的项目，然后从弹出菜单中选择 **转到详细信息**。**任务管理器** 将切换到\
  \ **详细信息** 选项卡，并选中 `WWAHost.exe` 进程，该进程负责运行应用。几秒钟后，**状态** 列中显示的值将从 **正在运行** 变为 **已挂起**，这告诉您\
  \ Windows 已挂起该应用。应用将已收到 `Suspending` 事件（但在应用恢复之前，您不会看到相关证据）。\n\n### 恢复应用\n\n切换回应用将恢复它。您将看到视图模型项目显示已收到事件。恢复后的应用状态与挂起时的状态完全相同。您的布局、数据、事件处理程序以及其他所有内容都将保持不变。\n\
  \n您的应用可能已被挂起较长时间，尤其是当设备进入低功耗状态（如睡眠状态）时。网络连接将被您之前通信的任何服务器关闭（因此，当您收到 `Suspending`\
  \ 事件时，应显式关闭它们），并且在应用恢复时必须重新打开。您还需要刷新可能已过时的数据；这包括位置数据，因为在应用挂起期间设备可能已被移动。\n\n> **提示**\
  \ Windows 允许用户通过按下 `Alt+F4` 终止应用。没有有用的警告事件让您有机会整理您的数据和操作。相反，Windows 只会终止您的应用进程。\n\
  \n## 添加后台活动\n\n既然我已确认我的应用能够接收并响应 `Resuming` 和 `Suspending` 事件，我可以添加一些需要定期后台任务的功能。在本例中，我将使用地理定位服务来报告当前设备位置。首先，我在\
  \ `Data` 项目文件夹中创建了一个名为 `Location.cs` 的新类文件。该文件的内容如清单 5-3 所示。\n\n**清单 5-3.** `Location.cs`\
  \ 文件\n\n```\nusing System;\nusing System.Net.Http;\nusing System.Threading.Tasks;\n\
  using Windows.Data.Json;\nusing Windows.Devices.Geolocation;\n\nnamespace GrocerApp.Data\
  \ {\n    class Location {\n\n        public static async Task<string> TrackLocation()\
  \ {\n            Geolocator geoloc = new Geolocator();\n            Geoposition\
  \ position = await geoloc.GetGeopositionAsync();\n\n            HttpClient httpClient\
  \ = new HttpClient();\n            httpClient.BaseAddress = new Uri(\"http://nominatim.openstreetmap.org\"\
  );\n            HttpResponseMessage httpResult = await httpClient.GetAsync(\n  \
  \              String.Format(\"reverse?format=json&lat={0}&lon={1}\",\n        \
  \        position.Coordinate.Latitude, position.Coordinate.Longitude));\n\n    \
  \        JsonObject jsonObject = JsonObject\n                .Parse(await httpResult.Content.ReadAsStringAsync());\n\
  \n            return jsonObject.GetNamedObject(\"address\")\n                .GetNamedString(\"\
  road\") + DateTime.Now.ToString(\"' ('HH:mm:ss')'\");\n        }\n    }\n}\n```\n\
  \n此类使用 Windows 8 的地理定位功能来获取设备位置。此功能通过 `Windows.Devices.Geolocation` 命名空间中的 `Geolocator`\
  \ 类公开，`GetGeopositionAsync` 方法获取位置的单个快照（而非通过事件提供位置更新，这是 `Geolocator` 类支持的另一种方法）。\n\
  \n> **注意** 新的 C# `await` 关键字表明我已进入并行/异步编程领域。这是一个高级示例，使用任务并行库 (TPL) 来创建和管理后台任务。我不会在这本小书中深入介绍\
  \ TPL 和 .NET 并行编程的细节。如果您想了解更详细信息，我建议您参考我的 *Pro .NET 4 Parallel Programming in C#*\
  \ 一书，其中提供了完整的详细信息。`await` 关键字是 C# 4.5 的新增功能，意思是“等待此异步任务完成。”\n\n一旦获取了设备位置，我会向反向地理编码服务发出\
  \ HTTP 请求，这使我能够将地理定位服务中的纬度和经度信息转换为街道地址。地理编码服务返回一个 JSON 字符串，我将其解析为 C# 对象，以便读取街道信息。`TrackLocation`\
  \ 方法的结果是一个字符串，其中列出了设备所在街道的名称以及指示位置更新时间的时间戳。\n\n> **提示** 我使用了 `OpenStreetMap` 地理编码服务，因为它不需要唯一的帐户令牌。这意味着您无需创建\
  \ Google Maps 或 Bing Maps 开发人员帐户即可运行此示例。\n\n## 扩展视图模型\n\n我将扩展视图模型，使其能够跟踪 `TrackLocation`\
  \ 方法生成的位置数据。这将使我能够使用数据绑定向用户显示数据。清单 5-4 显示了我对 `ViewModel` 类所做的添加。\n\n**清单 5-4.**\
