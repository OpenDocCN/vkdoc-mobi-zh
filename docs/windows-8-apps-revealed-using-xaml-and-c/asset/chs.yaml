  这是一个非常简单的页面，简单到你通常不需要创建这样的页面，因为它只显示一些静态文本。但它有助于演示一个重要的应用程序功能，使我能够将应用程序分解为可管理的部分。将页面添加到我的主应用程序布局的关键是`Frame`控件，我已将其添加到`ListPage.xaml`布局中，如清单\
  \ 2-9 所示。\n\n***清单 2-9.** 向应用程序布局添加`Frame`控件*\n\n```\n<Page\n    x:Class = \"GrocerApp.Pages.ListPage\"\
  \n    xmlns = \"http://schemas.microsoft.com/winfx/2006/xaml/presentation\"\n    xmlns:x\
  \ = \"http://schemas.microsoft.com/winfx/2006/xaml\"\n    xmlns:local = \"using:GrocerApp.Pages\"\
  \n    xmlns:d = \"http://schemas.microsoft.com/expression/blend/2008\"\n    xmlns:mc\
  \ = \"http://schemas.openxmlformats.org/markup-compatibility/2006\"\n    mc:Ignorable\
  \ = \"d\">\n    <Grid Background = \"{StaticResource AppBackgroundColor}\">\n        <Grid.RowDefinitions>\n\
              <RowDefinition/>\n            <RowDefinition/>\n        </Grid.RowDefinitions>\n\
          <Grid.ColumnDefinitions>\n            <ColumnDefinition/>\n            <ColumnDefinition/>\n\
          </Grid.ColumnDefinitions>\n        <StackPanel Grid.RowSpan = \"2\">\n            <TextBlock\
  \ Style = \"{StaticResource HeaderTextStyle}\" Margin = \"10\"\n                      \
  \ Text = \"Grocery List\"/>\n            <ListView x:Name = \"groceryList\" Grid.RowSpan\
  \ = \"2\"\n                ItemsSource = \"{Binding GroceryList}\"\n                ItemTemplate\
  \ = \"{StaticResource GroceryListItemTemplate}\"\n                SelectionChanged\
  \ = \"ListSelectionChanged\" />\n        </StackPanel>\n        <StackPanel Orientation\
  \ = \"Vertical\" Grid.Column = \"1\">\n            <TextBlock Style = \"{StaticResource\
  \ HeaderTextStyle}\" Margin = \"10\"\n                       Text = \"Item Detail\"\
  />\n            <Frame x:Name = \"ItemDetailFrame\"/>\n        </StackPanel>\n        <StackPanel\
  \ Orientation = \"Vertical\" Grid.Column = \"1\" Grid.Row = \"1\">\n            <TextBlock\
  \ Style = \"{StaticResource HeaderTextStyle}\" Margin = \"10\"\n                      \
  \ Text = \"Store Detail\"/>\n        </StackPanel>\n    </Grid>\n</Page>\n```\n\n\
  `Frame`是`Page`的占位符，我在`ListPage.xaml.cs`代码隐藏文件中使用`Navigate`方法告诉`Frame`我希望它显示哪个页面，如清单\
  \ 2-10 所示。\n\n***清单 2-10.** 在`ListPage.xaml.cs`文件中指定`Frame`显示的页面*\n\n```\nusing\
  \ GrocerApp.Data;\nusing Windows.UI.Xaml.Controls;\nusing Windows.UI.Xaml.Navigation;\n\
  namespace GrocerApp.Pages {\n    public sealed partial class ListPage : Page {\n\
          ViewModel viewModel;\n        public ListPage() {\n            viewModel\
  \ = new ViewModel();\n            // ... test data removed for brevity\n            this.InitializeComponent();\n\
              this.DataContext = viewModel;\n            ItemDetailFrame.Navigate(typeof(NoItemSelected));\n\
          }\n        protected override void OnNavigatedTo(NavigationEventArgs e)\
  \ {\n        }\n        private void ListSelectionChanged(object sender,            \
  \ SelectionChangedEventArgs e) {\n            viewModel.SelectedItemIndex = groceryList.SelectedIndex;\n\
          }\n    }\n}\n```\n\n`Navigate`方法的参数是一个`System.Type`，表示你想要加载的`Page`类，获取`System.Type`最简单的方法是使用`typeof`关键字。`Navigate`方法实例化`Page`对象（请记住，XAML\
  \ 和代码隐藏文件被组合起来以创建`Page`的单个子类），结果被插入到布局中，如图 2-3 所示。\n\n![9781430250340_Fig02-03.jpg](img/9781430250340_Fig02-03.jpg)\n\
  \n图 2-3. 将另一个页面插入布局\n\n## 动态地将页面插入布局\n\n你还可以使用`Frame`根据应用程序的状态动态地将不同的页面插入布局。为了演示这一点，我在`Pages`文件夹中创建了一个名为`ItemDetail.xaml`的新`Blank\
