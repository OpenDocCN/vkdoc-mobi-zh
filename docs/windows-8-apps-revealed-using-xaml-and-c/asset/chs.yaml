  Top\"/>\n        <Setter Property = \"Margin\" Value = \"10\"/>\n    </Style>\n\
  </ResourceDictionary>\n```\n\n## 在页面之间切换\n\n现在我有两个页面，可以根据应用状态的变化在它们之间切换。当用户未从 `ListView`\
  \ 中选择项目时，我将显示 `NoItemSelected` 页面；当用户做出选择时，则显示 `ItemDetail` 页面。清单 2-13 展示了 `ListPage.xaml.cs`\
  \ 文件中实现此功能的添加内容。\n\n***清单 2-13.** 根据应用状态显示页面*\n\n```\n...\npublic ListPage() {\n\
      viewModel = new ViewModel();\n    // ...为简洁起见，删除了测试数据\n    this.InitializeComponent();\n\
      this.DataContext = viewModel;\n    ItemDetailFrame.Navigate(typeof(NoItemSelected));\n\
  \nviewModel.PropertyChanged + = (sender, args) = >{\n        if (args.PropertyName\
  \ == \"SelectedItemIndex\") {\n            if (viewModel.SelectedItemIndex == -1)\
  \ {\n                ItemDetailFrame.Navigate(typeof(NoItemSelected));\n            }\
  \ else {\n                ItemDetailFrame.Navigate(typeof(ItemDetail), viewModel);\n\
              }\n        }\n    };\n}\n...\n```\n\n我仍然默认显示 `NoItemSelected` 页面，因为这反映了应用的初始状态。应用首次启动时，用户尚未做出选择。\n\
  \n添加的代码为视图模型定义的 `PropertyChanged` 事件注册了一个处理程序。这与 XAML 控件数据绑定功能使用的事件相同，通过直接注册处理程序，我能够在代码隐藏文件中响应视图模型中的属性更改。处理此事件时接收到的事件参数通过\
  \ `PropertyName` 属性告知我哪个属性发生了更改。如果 `SelectedItemIndex` 属性发生了更改，则使用 `Frame.Navigate`\
  \ 方法显示 `NoItemSelected` 或 `ItemDetail` 页面。\n\n请注意，在显示 `ItemDetail` 页面时，我将视图模型对象作为参数传递给\
  \ `Navigate` 方法：\n\n```\nItemDetailFrame.Navigate(typeof(ItemDetail), viewModel);\n\
  ```\n\n此参数是将上下文传递给正在显示的页面的方式。我将在下一节中展示如何使用此对象。\n\n## 实现嵌入页面\n\n当然，仅为 `ItemDetail`\
  \ 页面定义 XAML 是不够的。我还需要编写代码来显示所选项目的详细信息，并允许用户进行更改。清单 2-14 展示了 `ItemDetail.xaml.cs`\
  \ 代码隐藏文件，这正是实现此功能的代码。\n\n***清单 2-14.** ItemDetail.xaml.cs 代码隐藏文件*\n\n```\nusing\
  \ GrocerApp.Data;\nusing System;\nusing Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\n\
  using Windows.UI.Xaml.Navigation;\nnamespace GrocerApp.Pages {\n    public sealed\
  \ partial class ItemDetail : Page {\n        private ViewModel viewModel;\n        public\
  \ ItemDetail() {\n            this.InitializeComponent();\n        }\n        protected\
  \ override void OnNavigatedTo(NavigationEventArgs e) {\n\nviewModel=e.Parameter\
  \ as ViewModel;\n            this.DataContext=viewModel;\n```\n\n\n\n```csharp\n\
  viewModel.PropertyChanged += (sender, eventArgs) =>\n{\n    if (eventArgs.PropertyName\
  \ == \"SelectedItemIndex\")\n    {\n        if (viewModel.SelectedItemIndex == -1)\n\
  \        {\n            SetItemDetail(null);\n        }\n        else\n        {\n\
  \            SetItemDetail(viewModel.GroceryList[viewModel.SelectedItemIndex]);\n\
  \        }\n    }\n};\nSetItemDetail(viewModel.GroceryList[viewModel.SelectedItemIndex]);\n\
  \nprivate void SetItemDetail(GroceryItem item)\n{\n    ItemDetailName.Text = (item\
  \ == null) ? \"\" : item.Name;\n    ItemDetailQuantity.Text = (item == null) ? \"\
  \" : item.Quantity.ToString();\n    if (item != null)\n    {\n        ItemDetailStore.SelectedItem\
  \ = item.Store;\n    }\n    else\n    {\n        ItemDetailStore.SelectedIndex =\
  \ -1;\n    }\n}\n\nprivate void HandleItemChange(object sender, RoutedEventArgs\
  \ e)\n{\n    if (viewModel.SelectedItemIndex > -1)\n    {\n        GroceryItem selectedItem\
  \ = viewModel.GroceryList[viewModel.SelectedItemIndex];\n        if (sender == ItemDetailName)\n\
  \        {\n            selectedItem.Name = ItemDetailName.Text;\n        }\n  \
  \      else if (sender == ItemDetailQuantity)\n        {\n            int intVal;\n\
  \            bool parsed = Int32.TryParse(ItemDetailQuantity.Text, out intVal);\n\
  \            if (parsed)\n            {\n                selectedItem.Quantity =\
  \ intVal;\n            }\n        }\n        else if (sender == ItemDetailStore)\n\
  \        {\n            string store = (String)((ComboBox)sender).SelectedItem;\n\
  \            if (store != null)\n            {\n                viewModel.GroceryList[viewModel.SelectedItemIndex].Store\
  \ = store;\n            }\n        }\n    }\n}\n```\n\n`SetItemDetail` 方法用于设置 UI\
  \ 控件的内容，以显示所选购物清单项目的详细信息；而 `HandleItemChange` 方法则在用户更改某个控件内容时更新该项目。\n\n该代码段中值得关注的部分是\
  \ `OnNavigatedTo` 方法（已在代码段中加粗标记）。当显示 `ItemDetail` 页面时，调用此方法，通过事件参数的 `Parameter`\
  \ 属性可以获取传递给 `Frame.Navigate` 方法的对象。您可以在图 2-4 的布局中看到 `ItemDetail` 页面。\n\n![9781430250340_Fig02-04.jpg](img/9781430250340_Fig02-04.jpg)\n\
  \n图 2-4 显示 ItemDetail 页面\n\n通过这种方式传递视图模型对象，我能够确保所有页面使用相同的数据，同时将应用分解为可管理的部分。\n\n\
  ## 总结\n\n在本章中，我向您展示了如何在 Windows 应用中创建视图模型并使其可观察，以便使用数据绑定使应用布局与视图模型数据保持同步。这是创建健壮且易于维护的应用的基本技术。我还展示了如何通过创建页面将应用分解为可管理的块，以及如何使用\
  \ `Frame` 将这些页面作为主布局的一部分显示。在下一章中，我将向您展示如何创建 Windows 应用最重要的控件：AppBar、NavBar 和浮出控件。\n\
  \n"
- "# 第三章\n\n![image](img/frontdot.jpg)\n\n## AppBars、浮出控件和导航\n\n在本章中，我将向您展示如何创建和使用\
  \ Windows 应用用户体验中必不可少的用户交互。应用程序栏（AppBar）和导航栏（NavBar）提供了用户与内容和功能交互以及在应用内导航的方式。我还将展示如何创建浮出控件，这些弹出窗口通常用于响应用户与\
  \ AppBar 的交互来捕获用户信息。表 3-1 提供了本章的总结。\n\n表 3-1 章节总结\n\n| 问题 | 解决方案 | 代码清单 |\n| ---\
  \ | --- | --- |\n| 添加 AppBar | 在 XAML 的 `Page.BottomAppBar` 属性中声明一个 `AppBar` 控件\
  \ | 1 |\n| 向 AppBar 添加按钮 | 使用预定义样式或自定义样式格式化的 `Button` 控件 | 2-5 |\n| 添加浮出控件 | 声明一个\
  \ `Popup` 控件，并将 `IsLightDismissEnabled` 属性设置为 `True` | 6, 8 |\n| 显示浮出控件 | 将 `Popup`\
  \ 相对于导致其显示的 AppBar `Button` 进行定位 | 9-11 |\n| 轻松访问浮出控件的视图模型 | 使用 `DataContext` 属性\
  \ | 12-15 |\n| 添加 NavBar | 创建一个包装器 `Page`，在 XAML 的 `Page.TopAppBar` 属性中声明一个 `AppBar`\
  \ 元素 | 16, 18 |\n| 在应用内导航 | 在包装器 `Page` 中添加一个 `Frame` 控件，并在点击 NavBar 按钮时使用 `Navigate`\
  \ 方法显示其他 `Page` 控件 | 19 |\n\n## 添加上下文菜单（AppBar）\n\n*AppBar* 出现在屏幕底部，当用户向上滑动或右键单击鼠标时显示。Windows\
  \ 8 应用 UI 的重点是主布局中尽量少用多余的控件，而依赖 AppBar 作为交互机制，这些交互不是关于立即可用的功能，而是与当前显示的布局*相关*的。在本节中，我将向您展示如何定义和填充\
  \ AppBar。\n\n![image](img/sq.jpg) **提示** 屏幕顶部有一个类似的控件，称为导航栏（NavBar），用于在应用的不同部分之间导航。我将在本章后面向您展示如何创建和使用\
  \ NavBar。\n\n### 声明 AppBar\n\n创建 AppBar 最简单的方法是在 XAML 文件中声明它。代码清单 3-1 展示了示例项目中 `ListPage.xaml`\
  \ 文件的添加内容。\n\n***代码清单 3-1** 定义 AppBar*\n\n```xml\n<Page\n    x:Class=\"GrocerApp.Pages.ListPage\"\
  \n    xmlns=\"http://schemas.microsoft.com/winfx/2006/xaml/presentation\"\n    xmlns:x=\"\
  http://schemas.microsoft.com/winfx/2006/xaml\"\n    xmlns:local=\"using:GrocerApp.Pages\"\
  \n    xmlns:d=\"http://schemas.microsoft.com/expression/blend/2008\"\n    xmlns:mc=\"\
  http://schemas.openxmlformats.org/markup-compatibility/2006\"\n    mc:Ignorable=\"\
  d\">\n\n    <Grid Background=\"{StaticResource AppBackgroundColor}\">\n\n      \
  \  <Grid.RowDefinitions>\n            <RowDefinition/>\n            <RowDefinition/>\n\
  \        </Grid.RowDefinitions>\n        <Grid.ColumnDefinitions>\n            <ColumnDefinition/>\n\
  \            <ColumnDefinition/>\n        </Grid.ColumnDefinitions>\n\n        <StackPanel\
  \ Grid.RowSpan=\"2\">\n\n            <TextBlock Style=\"{StaticResource HeaderTextStyle}\"\
  \ Margin=\"10\"\n                       Text=\"Grocery List\"/>\n            <ListView\
  \ x:Name=\"groceryList\" Grid.RowSpan=\"2\"\n                ItemsSource=\"{Binding\
  \ GroceryList}\"\n                ItemTemplate=\"{StaticResource GroceryListItemTemplate}\"\
  \n                SelectionChanged=\"ListSelectionChanged\" />\n        </StackPanel>\n\
  \n        <StackPanel Orientation=\"Vertical\" Grid.Column=\"1\">\n            <TextBlock\
  \ Style=\"{StaticResource HeaderTextStyle}\" Margin=\"10\"\n                   \
  \    Text=\"Item Detail\"/>\n            <Frame x:Name=\"ItemDetailFrame\"/>\n \
  \       </StackPanel>\n```\n\n\n\n<StackPanel Orientation=\"Vertical\" Grid.Column=\"\
  1\" Grid.Row=\"1\">\n    <TextBlock Style=\"{StaticResource HeaderTextStyle}\" Margin=\"\
  10\"\n               Text=\"商店详情\"/>\n</StackPanel>\n\n<Page.BottomAppBar>\n   \
  \ <AppBar>\n        <Grid>\n            <Grid.ColumnDefinitions>\n             \
  \   <ColumnDefinition />\n                <ColumnDefinition />\n            </Grid.ColumnDefinitions>\n\
  \n            <StackPanel Orientation=\"Horizontal\" Grid.Column=\"0\"\n       \
  \                 HorizontalAlignment=\"Left\">\n                <Button x:Name=\"\
  AppBarDoneButton\"\n                        Style=\"{StaticResource DoneAppBarButtonStyle}\"\
  \n                        IsEnabled=\"false\"\n                        Click=\"\
  AppBarButtonClick\"/>\n            </StackPanel>\n\n            <StackPanel Orientation=\"\
  Horizontal\" Grid.Column=\"1\"\n                        HorizontalAlignment=\"Right\"\
  >\n                <Button x:Name=\"AppBarAddButton\"\n                        Style=\"\
  {StaticResource AddAppBarButtonStyle}\"\n                        AutomationProperties.Name=\"\
  新建项目\"\n                        Click=\"AppBarButtonClick\"/>\n                <Button\
  \ x:Name=\"AppBarStoresButton\"\n                        Style=\"{StaticResource\
  \ StoresAppBarButton}\"\n                        Click=\"AppBarButtonClick\"/>\n\
  \                <Button x:Name=\"AppBarZipButton\"\n                        Style=\"\
  {StaticResource HomeAppBarButtonStyle}\"\n                        AutomationProperties.Name=\"\
  邮政编码\"\n                        Click=\"AppBarButtonClick\"/>\n            </StackPanel>\n\
  \        </Grid>\n    </AppBar>\n</Page.BottomAppBar>\n\n要创建 `AppBar`，我必须在 `Page.BottomAppBar`\
  \ 属性中声明一个 `AppBar` 控件，如清单所示。这样便会创建 `AppBar` 及其内容，并将它们分配给包含页面的 `BottomAppBar` 属性。\n\
  \n![image](img/sq.jpg) **提示** 可以通过在 `Page.TopAppBar` 属性中声明一个 `AppBar` 控件来创建导航栏。\n\
  \n`AppBar` 控件包含按钮，按照惯例，与当前选中项相关的按钮显示在 `AppBar` 左侧，而应用全局按钮显示在右侧。为遵循此惯例，我在 `AppBar`\
  \ 控件中添加了一个 `Grid`。该 `Grid` 有一行两列，每列包含一个 `StackPanel`。\n\n向 `AppBar` 添加按钮有两种方式：可以选择并调整\
  \ `StandardStyles.xaml` 中已定义的按钮，也可以创建自己的按钮。清单中同时使用了这两种方法，我将在后续章节中进行说明。\n\n## 调整预定义的\
  \ AppBar 按钮\n\n`/Common/StandardStyles.xaml` 文件中的大部分内容是 `AppBar` 中 `Button` 控件的样式，该文件会在创建\
  \ Visual Studio 项目时自动添加，如清单 3-2 所示。\n\n![image](img/sq.jpg) **注意** `StandardStyles.xaml`\
  \ 文件中包含大量此类按钮样式，并且默认情况下它们被注释掉了。这意味着你需要取消注释需要使用的样式。在本章中，你需要搜索 `HomeAppBarButtonStyle`\
  \ 和 `AddAppBarButtonStyle` 并取消注释；否则，在示例应用中将无法使用它们。\n\n**清单 3-2.** *添加 AppBar 按钮的样式*\n\
  \n```\n<Style x:Key=\"AddAppBarButtonStyle\" TargetType=\"ButtonBase\"\n       \
  \ BasedOn=\"{StaticResource AppBarButtonStyle}\">\n    <Setter Property=\"AutomationProperties.AutomationId\"\
  \ Value=\"AddAppBarButton\"/>\n    <Setter Property=\"AutomationProperties.Name\"\
  \ Value=\"Add\"/>\n    <Setter Property=\"Content\" Value=\"\"/>\n</Style>\n```\n\
  \n所有预定义的 `Button` 样式都派生自 `AppBarButtonStyle`，该样式定义了 `AppBar` 按钮的基本特征。在下一节创建自己的按钮时，我将使用此样式。\n\
  \n区分各个按钮的两个属性是 `AutomationProperties.Name` 和 `Content`。`AutomationProperties.Name`\
  \ 属性指定按钮下方显示的文本，而 `Content` 属性指定将使用的图标。此属性的值是 Segoe UI Symbol 字体中的字符代码。你可以使用 Windows\
  \ 8 附带的字符映射表工具查看此字体定义的图标；值 `E109` 对应一个加号。\n\n清单中显示的样式并不完全符合我的需求。我喜欢这个图标，但我想更改文本。为了在\
  \ `ListPage.xaml` 文件中调整按钮以满足我的需求，我只需使用预定义样式并覆盖我想要更改的部分，如清单 3-3 所示。\n\n**清单 3-3.**\
  \ *在 ListPage.xaml 文件中调整预定义的 AppBar 按钮*\n\n```\n<Button x:Name=\"AppBarAddButton\"\
  \n    Style=\"{StaticResource AddAppBarButtonStyle}\"\n    AutomationProperties.Name=\"\
  新建项目\"\n    Click=\"AppBarButtonClick\"/>\n```\n\n## 创建自定义 AppBar 按钮样式\n\n另一种方法是为你的\
  \ `AppBar` 按钮定义自己的样式。清单 3-4 展示了我为此目的添加到资源文件 `/Resources/GrocerResourceDictionary.xaml`\
  \ 中的一个样式。\n\n**清单 3-4.** *定义自定义 AppBar 按钮样式*\n\n```\n<Style x:Key=\"StoresAppBarButton\"\
  \ TargetType=\"Button\"\n        BasedOn=\"{StaticResource AppBarButtonStyle}\"\
  >\n    <Setter Property=\"AutomationProperties.Name\" Value=\"商店\"/>\n    <Setter\
  \ Property=\"Content\" Value=\"\"/>\n</Style>\n\n<Style x:Key=\"DoneAppBarButtonStyle\"\
  \ TargetType=\"Button\"\n        BasedOn=\"{StaticResource AppBarButtonStyle}\"\
  >\n    <Setter Property=\"AutomationProperties.Name\" Value=\"完成\"/>\n    <Setter\
  \ Property=\"Content\" Value=\"\"/>\n</Style>\n```\n\n我基于 `AppBarButtonStyle` 创建了这些样式，因此获得了\
  \ `AppBar` 按钮的基本外观和感觉，并设置了 `AutomationProperties.Name` 和 `Content` 属性的值。你可以更进一步，重新定义底层样式的某些核心特征，但这可能会偏离用户期望的标准\
  \ Windows 8 应用外观和体验。\n\n## 实现 AppBar 按钮操作\n\n目前，`AppBar` 上的 `Button` 控件不执行任何操作。为了解决这个问题，我将实现“完成”按钮，以便你了解其实现方式。\n\
  \n当用户从杂货项目列表中进行选择时，我将激活此 `Button`。当用户单击该按钮时，我将从列表中移除当前选中的项目，从而允许用户指示他们已购买了某个项目。清单\
  \ 3-5 显示了 `ListPage.xaml.cs` 代码后置文件中的更改。\n\n**清单 3-5.** *实现“完成”AppBar 按钮*\n\n```\n\
  using GrocerApp.Data;\nusing Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\n\
  using Windows.UI.Xaml.Navigation;\n\nnamespace GrocerApp.Pages {\n\npublic sealed\
  \ partial class ListPage : Page {\n    ViewModel viewModel;\n\n    public ListPage()\
  \ {\n        viewModel = new ViewModel();\n\n        // ...测试数据已删除以保持简洁\n\n    \
  \    this.InitializeComponent();\n        this.DataContext = viewModel;\n\n    \
  \    ItemDetailFrame.Navigate(typeof(NoItemSelected));\n\n        viewModel.PropertyChanged\
  \ += (sender, args) => {\n            if (args.PropertyName == \"SelectedItemIndex\"\
  ) {\n                if (viewModel.SelectedItemIndex == -1) {\n                \
  \    ItemDetailFrame.Navigate(typeof(NoItemSelected));\n                    AppBarDoneButton.IsEnabled\
  \ = false;\n                } else {\n                    ItemDetailFrame.Navigate(typeof(ItemDetail),\
  \ viewModel);\n                    AppBarDoneButton.IsEnabled = true;\n        \
  \        }\n            }\n        };\n    }\n\n    protected override void OnNavigatedTo(NavigationEventArgs\
  \ e) {\n    }\n}\n```\n\n\n\n```csharp\nprivate void ListSelectionChanged(object\
  \ sender, SelectionChangedEventArgs e) {\n    viewModel.SelectedItemIndex = groceryList.SelectedIndex;\n\
  }\n\nprivate void AppBarButtonClick(object sender, RoutedEventArgs e) {\n    if\
  \ (e.OriginalSource == AppBarDoneButton\n            && viewModel.SelectedItemIndex\
  \ > -1) {\n        viewModel.GroceryList.RemoveAt(viewModel.SelectedItemIndex);\n\
  \        viewModel.SelectedItemIndex = -1;\n    }\n}\n```\n\n此清单中有两点值得注意。第一点在于，对于简单任务而言，为`AppBar`上的`Button`实现操作只需响应`Click`事件即可。\n\
  \n第二点是，你可以开始看到视图模型在代码中显现的优势。我在`AppBarButtonClick`方法中的代码无需将`Frame`的内容切换到`NoItemSelected`页面，也无需在项目完成时禁用“完成”按钮。我只需更新视图模型，应用的其他部分便会自动适应这些变化，为用户呈现正确的布局和整体体验。\n\
  \n你可以在图 3-1 中看到添加`AppBar`及其`Button`控件后的效果。如果想亲自体验`AppBar`，可以启动示例应用，从屏幕顶部或底部滑动，或者使用鼠标右键单击。该图展示了“完成”按钮的两种状态，你可以通过从列表中选择一个项目来重现这些状态。\n\
  \n![9781430250340_Fig03-01.jpg](img/9781430250340_Fig03-01.jpg)\n\n图 3-1 向示例应用添加`AppBar`\n\
  \n## 创建 Flyout\n\n“完成”`AppBar`按钮关联了一个简单操作，该操作可直接在与`Click`事件关联的事件处理代码中执行。然而，大多数`AppBar`按钮需要某种额外的用户交互，这通常通过使用*flyout*来实现。\n\
  \nFlyout 是一个弹出窗口，显示在被点击的`AppBar`按钮附近，当用户点击或触摸屏幕上的其他位置时，它会自动关闭。针对 JavaScript 版 Windows\
  \ 8 应用，有现成的`Flyout`控件，但若要用 XAML 和 C# 实现相同的效果，则需要使用`Popup`并编写精心的定位代码。\n\n### 创建用户控件\n\
  \nXAML 文件可能会变得冗长且难以管理。我喜欢将 flyout 定义为*用户控件*，它们类似于 XAML 元素的片段加一个代码隐藏文件。（此处我跳过了一些\
  \ XAML 细节，但当你阅读本章节时就会明白我的意思。）我在示例项目中创建了一个名为`Flyouts`的文件夹，并使用`UserControl`模板创建了一个名为`HomeZipCodeFlyout.xaml`的新项，其内容见清单\
  \ 3-6。\n\n**清单 3-6** `HomeZipCodeFlyout.xaml`文件\n\n```\n<UserControl\n    x:Class=\"\
  GrocerApp.Flyouts.HomeZipCodeFlyout\"\n    xmlns=\"http://schemas.microsoft.com/winfx/2006/xaml/presentation\"\
  \n    xmlns:x=\"http://schemas.microsoft.com/winfx/2006/xaml\"\n    xmlns:local=\"\
  using:GrocerApp.Flyouts\"\n    xmlns:d=\"http://schemas.microsoft.com/expression/blend/2008\"\
  \n    xmlns:mc=\"http://schemas.openxmlformats.org/markup-compatibility/2006\"\n\
  \    mc:Ignorable=\"d\"\n    d:DesignHeight=\"300\"\n    d:DesignWidth=\"400\">\n\
  \n    <Popup x:Name=\"HomeZipCodePopup\"\n           IsLightDismissEnabled=\"True\"\
  \ Width=\"350\" Height=\"130\">\n        <StackPanel Background=\"Black\">\n   \
  \         <Border Background=\"#85C54C\" BorderThickness=\"4\">\n              \
  \  <StackPanel>\n                    <StackPanel Orientation=\"Horizontal\" Margin=\"\
  10\">\n                        <TextBlock Style=\"{StaticResource PopupTextStyle}\"\
  \n                                   Text=\"家庭邮编：\"\n                          \
  \         VerticalAlignment=\"Center\"\n                                   Margin=\"\
  0,0,10,0\" />\n                        <TextBox Height=\"40\" Width=\"150\" FontSize=\"\
  20\"\n                                 Text=\"{Binding Path=HomeZipCode,\n     \
  \                                 Mode=TwoWay}\" />\n                    </StackPanel>\n\
  \                    <Button Click=\"OKButtonClick\"\n                         \
  \   HorizontalAlignment=\"Center\"\n                            Margin=\"10\">确定</Button>\n\
  \                </StackPanel>\n            </Border>\n        </StackPanel>\n \
  \   </Popup>\n</UserControl>\n```\n\n文件名已经指明，这个 flyout 将允许用户更改视图模型中`HomeZipCode`属性的值。在本示例中，该属性除了提供一些有用的示例机会外，本身不执行任何操作。\n\
  \n用户控件的工作方式类似于模板。在`UserControl`元素内部，你定义代表你想要创建的控件的 XAML 元素。创建 flyout 时必须使用`Popup`控件，但其中放置的内容则由你自行决定。清单中我的布局包含一个`TextBox`，用于收集用户输入的新值；一个`Button`，以便用户告知已输入新值；以及一些用于提供上下文和结构的周围元素。\n\
  \n你必须为`Popup`元素设置三个重要属性，我在清单中均以粗体标出。`IsLightDismissEnabled`属性指定当用户点击或触摸`Popup`之外的任何位置时，弹出窗口是否会被关闭；当将`Popup`用作\
  \ flyout 时，必须将此属性设置为`True`，因为这是 flyout 用户体验的关键部分。\n\n必须设置`Width`和`Height`属性，使`Popup`的大小恰好能容纳其内容。在定位`Popup`时，我需要这些属性的显式值，稍后将进行演示。\n\
