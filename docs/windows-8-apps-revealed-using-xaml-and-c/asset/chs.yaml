  FontSize\" Value=\"22\"/>\n</Style>\n\n</ResourceDictionary>\n\n## 编写用户控件代码\n\n\
  尽管用户控件呈现的是 XAML 片段，但它们仍然包含代码隐藏文件。清单 3-8 展示了 `HomeZipCodeFlyout.xaml.cs` 文件的内容。\n\
  \n**清单 3-8. `HomeZipCodeFlyout.xaml.cs` 文件**\n\n```\nusing Windows.UI.Xaml;\nusing\
  \ Windows.UI.Xaml.Controls;\n\nnamespace GrocerApp.Flyouts {\n    public sealed\
  \ partial class HomeZipCodeFlyout : UserControl {\n\n        public HomeZipCodeFlyout()\
  \ {\n            this.InitializeComponent();\n        }\n\n        public void Show(Page\
  \ page, AppBar appbar, Button button) {\n            HomeZipCodePopup.IsOpen = true;\n\
  \            FlyoutHelper.ShowRelativeToAppBar(HomeZipCodePopup, page, appbar, button);\n\
  \        }\n\n        private void OKButtonClick(object sender, RoutedEventArgs\
  \ e) {\n            HomeZipCodePopup.IsOpen = false;\n        }\n    }\n}\n```\n\
  \n我需要为弹出窗口解决的主要问题是定位 `Popup`。对于响应 `AppBar` 按钮而出现的弹出窗口，其惯例是将 `Popup` 显示在点击的 `Button`\
  \ 元素的正上方。\n\n## 定位 Popup 控件\n\nWindows 应用控件没有提供简单的方法来计算布局中元素的相对位置，因此需要使用一些间接技术。清单\
  \ 3-9 展示了 `FlyoutHelper` 类的内容，该类定义了静态的 `ShowRelativeToAppBar` 方法，我将其添加到了 `Flyouts`\
  \ 文件夹中。此方法负责将 `Popup` 正确定位到 `AppBar` 按钮的相对位置，但要做到这一点，它需要 `Popup` 控件、包含 `AppBar`\
  \ 的 `Page`、`AppBar` 控件以及被点击的 `Button`。这并非理想方案，但这是我所找到的能够可靠定位弹出窗口的唯一方法。\n\n**清单 3-9.\
  \ 将 `Popup` 控件相对于 `AppBar` 按钮进行定位**\n\n```\nusing System;\nusing Windows.Foundation;\n\
  using Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\nusing Windows.UI.Xaml.Controls.Primitives;\n\
  \nnamespace GrocerApp.Flyouts {\n    class FlyoutHelper {\n\n        public static\
  \ void ShowRelativeToAppBar(Popup popup, Page page,\n                AppBar appbar,\
  \ Button button) {\n\n            Func<UIElement, UIElement, Point> getOffset =\n\
  \                delegate(UIElement control1, UIElement control2) {\n          \
  \          return control1.TransformToVisual(control2)\n                       \
  \ .TransformPoint(new Point(0, 0));\n                };\n\n            Point popupOffset\
  \ = getOffset(popup, page);\n\n            Point buttonOffset = getOffset(button,\
  \ page);\n            popup.HorizontalOffset = buttonOffset.X - popupOffset.X\n\
  \                - (popup.ActualWidth / 2) + (button.ActualWidth / 2);\n       \
  \     popup.VerticalOffset = getOffset(appbar, page).Y\n                - popupOffset.Y\
  \ - popup.ActualHeight;\n\n            if (popupOffset.X + popup.HorizontalOffset\n\
  \                    + popup.ActualWidth > page.ActualWidth) {\n\n             \
  \   popup.HorizontalOffset = page.ActualWidth\n                    - popupOffset.X\
  \ - popup.ActualWidth;\n            }\n            else if (popup.HorizontalOffset\
  \ + popupOffset.X < 0) {\n                popup.HorizontalOffset = -popupOffset.X;\n\
  \            }\n        }\n\n    }\n}\n```\n\n这段代码将 `Popup` 定位在它所关联的 `AppBar` 按钮的正上方，并且如果这会导致\
  \ `Popup` 消失在屏幕的左边缘或右边缘之外，则会重新定位。我不会深入探讨这段代码的细节，因为它相当复杂。相反，我建议你直接使用这段代码，仅在遇到问题时才深入研究。如果你遇到问题，最可能的原因是你没有为\
  \ `Popup` 设置 `Width` 和 `Height` 属性。\n\n## 显示和隐藏 Popup 控件\n\n我的 `HomeZipCodeFlyout`\
  \ 类负责的另一项功能是显示和隐藏 `Popup`。为了让代码更简洁，我的弹出窗口工作方式采用了一些技巧。如果你回头查看清单 3-6 中的 XAML，你会看到我为数据绑定指定了一个\
  \ `Mode`，如下所示：\n\n```\n...\n<TextBox Height=\"40\" Width=\"150\" Text=\" {Binding\
  \ Path=HomeZipCode,\n    Mode=TwoWay} \" />\n...\n```\n\n数据绑定默认是单向的，这意味着视图模型中的更改会更新控件。我指定了双向绑定，这意味着，除此之外，用户在\
  \ `TextBox` 控件中输入的值将用于更新相应的视图模型属性。\n\n**提示** 请注意，我无需设置 `DataContext` 即可使绑定生效。用户控件将被添加到主\
  \ XAML 布局中，这意味着它会从顶层的 `Page` 对象继承 `DataContext` 的值。\n\n这使我能够通过简单地隐藏 `Popup` 来处理\
  \ OK 按钮的点击事件；我无需担心从 `TextBox` 获取值并显式更新视图模型。这种方法的缺点是，在弹出窗口被关闭之前，视图模型可能会被更新多次，如果你的应用在其他地方监听受影响属性的更改，这可能会引发问题。对于\
  \ `HomeZipCode` 属性来说这不是问题，并且我想向你展示这种技术，它可以是一种非常简洁的处理用户输入的方法。\n\n## 向应用添加 Flyout\n\
  \n我费心创建用户控件的原因是，我希望尽可能保持主布局 XAML 的专注性。不过，我仍然需要将用户控件添加到 XAML 中。你可以在清单 3-10 中看到我是如何做到这一点的，该清单展示了我对\
