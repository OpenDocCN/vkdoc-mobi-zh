          <Grid.ColumnDefinitions>\n            <ColumnDefinition Width = \"Auto\"\
  />\n            <ColumnDefinition Width = \"*\"/>\n        </Grid.ColumnDefinitions>\n\
  \n<TextBlock Text = \"名称：\" Style = \"{StaticResource ItemDetailText}\" />\n        <TextBlock\
  \ Text = \"数量：\" Style = \"{StaticResource ItemDetailText}\"\n                  \
  \ Grid.Row = \"1\"/>\n        <TextBlock Text = \"商店：\" Style = \"{StaticResource\
  \ ItemDetailText}\"\n                   Grid.Row = \"2\"/>\n\n<TextBox x:Name =\
