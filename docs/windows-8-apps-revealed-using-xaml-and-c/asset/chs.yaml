  \ 4 in C# 2010 4th Edition*\n- *Applied ASP.NET 4 in Context* — *Pro ASP.NET 4 in\
  \ VB 2010 3rd Edition*\n- *Pro ASP.NET MVC 3 Framework 3rd Edition* — *Pro LINQ*\n\
  - *Pro jQuery* — *Pro .NET 4 Parallel Programming in C#*\n- *Introducing Visual\
  \ C# 2010* — *Visual C# 2010 Recipes*\n\n## 关于技术审校\n\n**法比奥·克劳迪奥·费拉基亚蒂** 是一位资深顾问和高级分析师/开发者，专注于微软技术。他就职于\
  \ Brain Force（`www.brainforce.com`）的意大利分公司（`www.brainforce.it`）。他是微软认证解决方案开发专家（.NET）、微软认证应用程序开发专家（.NET）、微软认证专家，同时也是多产的技术作者和审校者。在过去十年中，他为意大利及国际杂志撰稿，并合著了十多本关于各种计算机主题的书籍。\n\
  \n## 致谢\n\n我要感谢 Apress 出版社的每一位成员，感谢他们为本书的出版付出的辛勤努力。特别感谢 Mark Powers 让我保持正轨，以及 Ewan\
  \ Buckingham 对本书的委托和编辑。我还要感谢我的技术审校法比奥，他的努力使本书比原本好了很多。\n\n### 第 1 章：入门\n\n![image](img/frontdot.jpg)\n\
  \nWindows 应用商店应用是 Microsoft Windows 8 的重要补充，为桌面、平板电脑和智能手机提供了一个统一且一致的编程和交互模型基石。应用的用户体验与以往各代\
  \ Windows 应用截然不同：Windows 应用商店应用采用全屏显示，并推崇一种简洁、直接、无干扰的风格。\n\nWindows 应用商店应用完全不同于以往版本的\
  \ Windows。它拥有全新的 API、新的交互控件，以及管理应用生命周期的截然不同的方法。\n\nWindows 应用商店应用可以使用多种语言进行开发，包括\
  \ JavaScript、Visual Basic、C++，以及本书主题 —— C#。Windows 8 在现有基础之上，让开发者能够利用他们已有的 C# 和\
  \ XAML 经验来构建丰富的应用，并集成到更广泛的 Windows 平台中。本书将为您开启 Windows 应用商店应用世界的关键入门之旅；阅读本书后，您将理解如何使用定义核心\
  \ Windows 应用商店应用体验的控件和功能。\n\n![image](img/sq.jpg) **注意** —— 微软使用了 *Windows Store\
  \ App* 这个术语，我觉得它有些别扭，因此无法在整本书中使用它。取而代之，我将使用 *Windows 应用*，并且经常简称为 *应用*。我会让您自行在脑海中根据需要插入官方的微软名称。\n\
  \n## 关于本书\n\n本书面向希望抢先一步为 Windows 8 创建应用的资深 C# 开发者。我将解释您需要快速上手并提升应用开发技术和知识所需的概念和技巧。\n\
  \n## 阅读本书前需要了解什么？\n\n您需要对 C# 有良好的理解，并且理想情况下，还需要了解 XAML。如果您曾从事 WPF 或 Silverlight\
  \ 项目，那么您将拥有足够的 XAML 知识来构建 Windows 应用。如果您之前没有接触过 XAML，也不必担心；您可以边学边用，并且我将在本章稍后部分提供一个非常简短的概述帮助您入门。在用到主要\
  \ XAML 概念时，我会进行说明。\n\n## 阅读本书需要什么软件？\n\n开发 Windows 应用需要两样东西：一台运行 Windows 8 的 PC\
  \ 和 Visual Studio 2012。如果您认真对待 Windows 应用开发，则需要购买一份 Windows 8 副本；但如果您只是出于好奇，可以从微软获得\
  \ 90 天试用版，地址为 `http://msdn.microsoft.com/en-us/evalcenter`。点击“Windows 与平台开发”部分中的“发布”链接，即可找到所需内容。\n\
  \n您需要创建一个微软账户才能获取评估版，但无论如何，您都需要一个账户才能注册为开发者。微软账户是免费创建的，如果您还没有账户，请按照相关说明进行操作。\n\n\
  ![image](img/sq.jpg) **提示** —— 您可以在虚拟机中运行 Windows 8，但为了获得最佳效果，我建议将操作系统直接安装到 PC 上。\n\
  \nVisual Studio 2012 是微软的开发环境。好消息是，微软免费提供一款基础版本的 Visual Studio，我在本书中使用的正是这个版本。它有一个朗朗上口的名字：Visual\
  \ Studio 2012 Express for Windows 8，您可以从 `www.microsoft.com/visualstudio/11/en-us/products/express`\
  \ 下载安装程序。提供了多种版本，每种版本可用于开发特定类型的应用程序。对于应用开发，您需要 Visual Studio Express 2012 for Windows\
  \ 8。不同版本的名称非常相似，容易混淆，请务必下载正确的版本。\n\n免费版本不具备某些付费版本 Visual Studio 中包含的所有测试和集成功能，但您不需要这些功能来创建\
  \ Windows 应用。在其他方面，免费版本的 Visual Studio 功能齐全，能满足您的所有需求。\n\n![image](img/sq.jpg) **提示**\
  \ —— 如果您拥有付费版本的 Visual Studio 2012，不用担心。您不会用到该版本的所有功能，但本书中的所有说明和示例都能毫无问题地运行，也无需修改。\n\
  \n\n\n### 安装 Visual Studio\n\n像安装其他任何应用程序一样安装 `Visual Studio`。虽然该软件是免费的，但您需要激活它，这需要用到您之前创建的\
  \ `Microsoft` 账户。完成激活流程后，您会得到一个可用于激活 `Visual Studio` 的代码。您还需要一个开发者许可证，这也是免费的。首次启动\
  \ `Visual Studio 2012` 时，系统会提示您获取许可证；这个过程只需一秒钟，并且同样需要您之前创建的 `Microsoft` 账户。\n\n\
  ![image](img/sq.jpg) **注意**  尽管 `Visual Studio` 和 `Microsoft` 账户是免费的，但如果您想将应用发布到\
  \ `Windows Store`，则需要付费。`Microsoft` 目前对个人用户每年收费 49 美元，对公司用户每年收费 99 美元，但如果您订阅了 `MSDN`\
  \ 等 `Microsoft` 软件包，或许可以免费发布。\n\n## 本书结构是怎样的？\n\n我专注于构建 `Windows` 应用的关键技术和特性。您已经知道如何编写\
  \ `C#`，我不会浪费时间教您已经掌握的内容。本书旨在将您的 `C#` 和 `XAML` 开发经验迁移到 `Windows` 应用世界，这意味着要专注于那些使\
  \ `Windows` 应用与众不同且特别的部分。\n\n我采用了一种较为宽松的方式来混合各个主题。除了每章的主题之外，您还会找到一些必要的背景信息，用以解释某些功能为何重要以及为何应该实现它们。阅读完本书后，您将了解如何构建一个能正确集成到\
  \ `Windows 8` 中，并且能呈现出与使用其他语言（如 `C++` 或 `JavaScript`）编写的应用相一致的用户体验的 `Windows` 应用。\n\
  \n这是一本让您开始为 `Windows 8` 开发应用的入门书。它并非全面的教程；因此，我将重点放在了构成应用主要构建模块的那些主题上。还有很多信息我无法塞进这本薄薄的书里。如果您想更全面地了解\
  \ `Windows` 应用开发，`Apress` 已经出版了 Jesse Liberty 的 *Pro Windows 8 Development with\
  \ XAML and C#*。此外，如果您想使用更多面向 Web 的技术来构建应用，`Apress` 将会出版我的 *Pro Windows 8 Development\
  \ with HTML5* 和 `JavaScript` 两本书。\n\n以下各节总结了本书的章节内容。\n\n### 第 1 章：入门\n\n也就是本章。除了介绍本书之外，我还向您展示如何为本书通篇使用的示例应用创建\
  \ `Visual Studio` 项目。我简要概述了 `XAML`，带您鸟瞰了应用开发项目中的重要文件，向您展示了如何在 `Visual Studio` 模拟器中运行应用，并解释了如何使用调试器。\n\
  \n"
- "# 第 2 章：数据、绑定和页面\n\n数据是任何 `Windows` 应用的核心，在本章中，我将向您展示如何定义视图模型以及如何使用数据绑定将数据引入您的应用布局。这些技术对于构建易于扩展、易于测试和易于维护的应用至关重要。在此过程中，我将向您展示如何使用页面将您的应用分解成可管理的\
  \ `XAML` 和 `C#` 代码块。\n\n### 第 3 章：应用栏、浮出控件和导航栏\n\n某些用户界面控件是所有 `Windows` 应用共有的，无论使用哪种语言创建它们。在本章中，我将向您展示如何创建和配置\
  \ `AppBars`（应用栏）、`Flyouts`（浮出控件）和 `NavBars`（导航栏），它们是这些通用控件中最重要的；它们共同构成了与用户交互的骨干。\n\
  \n### 第 4 章：布局和磁贴\n\n`Windows` 应用的功能延伸到了 `Windows 8` 开始屏幕，它提供了多种方式向用户呈现附加信息。在本章中，我将向您展示如何创建和更新动态开始磁贴，以及如何为这些磁贴应用*徽章*。\n\
  \n我还将向您展示如何处理*贴靠*和*填充*布局，这些布局允许 `Windows 8` 用户并排使用两个 `Windows` 应用。您可以使用纯 `C#` 代码或代码与\
  \ `XAML` 混合的方式来适应这些布局。我将向您展示这两种方法。\n\n### 第 5 章：应用生命周期和协定\n\n`Windows` 对应用应用了一个非常特定的生命周期模型。在本章中，我将解释该模型的工作原理，向您展示如何接收和响应大多数生命周期事件，并解释如何管理*挂起*和*运行中*应用之间的转换。我将演示如何创建和管理异步任务，以及当您的应用被挂起时如何控制它们。最后，我将向您展示如何支持协定，这允许您的应用无缝集成到更广泛的\
  \ `Windows 8` 体验中。\n\n## 关于示例 Windows 应用的更多信息\n\n本书的示例应用是一个简单的购物清单管理器，名为 `GrocerApp`。作为一个独立的应用，`GrocerApp`\
  \ 相当乏味，但它是演示最重要应用功能的绝佳平台。在图 1-1 中，您可以看到本书结束时应用的外观。\n\n![9781430250340_Fig01-01.jpg](img/9781430250340_Fig01-01.jpg)\n\
  \n图 1-1。 示例应用\n\n这是一本关于编程而非设计的书。`GrocerApp` 不是一个漂亮的应用程序，我甚至没有实现它的所有功能。它纯粹是一个演示编码技术的工具。\n\
  \n## 本书代码多吗？\n\n是的。事实上，代码非常多，如果不做删减，我无法将它们全部放入书中。因此，当我介绍一个新主题或进行大量更改时，我会向您展示一个完整的\
  \ `C#` 或 `XAML` 文件。当我进行小的更改或想强调几行关键代码或标记时，我会向您展示一个代码片段并突出显示重要的更改。您可以在代码清单 1-1 中看到它的样子，该代码摘自第\
  \ 5 章。\n\n***代码清单 1-1.***  一个代码片段\n\n```\n...\nprotected override void OnNavigatedTo(NavigationEventArgs\
  \ e) {\n    viewModel = (ViewModel)e.Parameter;\n\n    ItemDetailFrame.Navigate(typeof(NoItemSelected));\n\
  \    viewModel.PropertyChanged += (sender, args) => {\n        if (args.PropertyName\
  \ == \"SelectedItemIndex\") {\n            groceryList.SelectedIndex = viewModel.SelectedItemIndex;\n\
  \            if (viewModel.SelectedItemIndex == −1) {\n                ItemDetailFrame.Navigate(typeof(NoItemSelected));\n\
  \                AppBarDoneButton.IsEnabled = false;\n            } else {\n   \
  \             ItemDetailFrame.Navigate(typeof(ItemDetail), viewModel);\n       \
  \         AppBarDoneButton.IsEnabled = true;\n            }\n        }\n    };\n\
  }\n...\n```\n\n这些片段让我能够将更多代码塞进这本薄薄的书里，但它们使得在 `Visual Studio` 中跟随示例变得更加困难。如果您确实想跟随示例，最好的方法是从\
  \ `Apress.com` 下载本书的源代码。这些代码是免费提供的，并且包含本书每一章的完整 `Visual Studio` 项目。\n\n## 启动与运行\n\
