  \n## 探索 `Package.appxmanifest` 文件\n\n最后一个值得一提的文件是*清单*，名为 `Package.appxmanifest`。这是一个\
  \ XML 文件，用于向 Windows 提供有关您的应用的信息。您可以将其作为原始 XML 文件进行编辑，但 Visual Studio 提供了一个更好的基于属性的编辑器。我将在后面的章节中再次回到这个文件，以配置一些应用设置。\n\
  \n## 极简 XAML 概述\n\n如果您以前从未使用过 XAML，请不要担心。创建 Windows 应用的学习曲线会稍陡一些，但您也有优势，即不会期待其他\
  \ XAML 应用程序类型中那些在 Windows 应用开发中不存在的功能。\n\n其核心在于，XAML 以声明方式创建用户界面，而不是通过代码。因此，如果我想要向项目添加几个按钮控件，我会在\
  \ XAML 文件中添加一些标记，如代码清单 1-7 所示。\n\n***代码清单 1-7.*** 向 XAML 文档添加控件\n\n```\n<Page\n\
  \    x:Class=\"GrocerApp.MainPage\"\n    xmlns=\" http://schemas.microsoft.com/winfx/2006/xaml/presentation\
  \  \"\n    xmlns:x=\" http://schemas.microsoft.com/winfx/2006/xaml \"\n    xmlns:local=\"\
  using:GrocerApp\"\n    xmlns:d=\" http://schemas.microsoft.com/expression/blend/2008\
  \  \"\n    xmlns:mc=\" http://schemas.openxmlformats.org/markup-compatibility/2006\
  \  \"\n    mc:Ignorable=\"d\">\n\n<Grid Background=\"{StaticResource ApplicationPageBackgroundThemeBrush}\"\
  >\n        <StackPanel HorizontalAlignment=\"Center\" VerticalAlignment=\"Center\"\
  >\n            <Button x:Name=\"FirstButton\" HorizontalAlignment=\"Center\"\n \
  \                   Click=\"ButtonClick\">Click Me!</Button>\n            <Button\
  \ Style=\"{StaticResource TextButtonStyle}\"\n                    HorizontalAlignment=\"\
  Center\"\n                    Click=\"ButtonClick\">Or Click Me!</Button>\n    \
  \    </StackPanel>\n    </Grid>\n</Page>\n```\n\nXAML 元素中的标记名称指定将添加到布局中的控件。我向项目中添加了一个\
  \ `StackPanel` 和两个 `Button` 控件。`StackPanel` 是一个简单的容器，有助于为布局增加结构；它将其子控件沿水平或垂直线（即*堆叠*）定位。`Button`\
  \ 控件正是您所期望的那样：一个在用户点击时触发事件的按钮。\n\nXML 的层次结构性质被转化为 UI 控件的层次结构。通过将 `Button` 元素放置在\
  \ `StackPanel` 内部，我指定了 `StackPanel` 负责 `Button` 元素的布局。\n\n## 使用 Visual Studio 设计图面\n\
  \n您可以在 Windows 应用项目中完全使用 C# 完成所有操作，而完全不使用 XAML。但采用 XAML 有一些令人信服的理由。主要优势在于 Visual\
  \ Studio 中对 XAML 的设计支持相当不错，并且在大多数情况下，会实时向您展示 XAML 文件更改的效果。如图 1-4 所示，Visual Studio\
  \ 在其 XAML 设计图面上反映了 `StackPanel` 和 `Button` 元素的添加。这与运行应用并不完全相同，但它是一个大致忠实的表示，并且此功能对于在\
  \ C# 中创建的界面是不可用的。（按钮非常小，所以我在图中放大了它们以便于查看）。\n\n![9781430250340_Fig01-04.jpg](img/9781430250340_Fig01-04.jpg)\n\
  \n图 1-4。Visual Studio 在其设计图面上反映 XAML 文件的内容\n\n尽管 XAML 往往比较冗长，但 Visual Studio 做了大量工作来简化其创建和编辑；它具有一些出色的自动补全功能，可为标记名称、属性和值提供建议。您还可以通过将控件从工具箱直接拖放到设计图面上，并使用“属性”窗口进行配置来设计界面。如果这两种方法都不适合您，还有支持在\
  \ Blend for Visual Studio 中为应用创建 XAML 的功能，该工具已作为 Visual Studio 设置的一部分安装在您的机器上。我倾向于直接在代码编辑器中编写\
  \ XAML，但话说回来，我是一个顽固的老派程序员，一直不太信任可视化设计工具，尽管近年来它们已经变得相当不错。您可能没那么抗拒变化，应该尝试不同的 UI 开发风格，看看哪种适合您。出于本书的目的，我将直接向您展示对\
  \ XAML 的更改。\n\n## 在 XAML 中配置控件\n\n您通过设置相应 XAML 元素的属性来配置 Windows 应用 UI 控件。例如，我希望\
  \ `StackPanel` 居中其子控件。为此，我设置了 `HorizontalAlignment` 和 `VerticalAlignment` 属性的值，如下所示：\n\
  \n```\n...\n<StackPanel HorizontalAlignment=\"Center\" VerticalAlignment=\"Center\"\
  \ >\n...\n```\n\n## 应用样式\n\n属性也用于将样式应用于 UI 控件。例如，我应用了微软在 `StandardStyles.xaml` 文件中定义的\
  \ `TextButtonStyle`：\n\n```\n...\n<Button Style=\"{StaticResource TextButtonStyle}\"\
  \ HorizontalAlignment=\"Center\"\nClick=\"ButtonClick\">Or Click Me!</Button>\n\
  ...\n```\n\n在 XAML 中定义和引用样式有不同的方法。我使用了 `StaticResource` 来指定我想要的样式，但也有从各种来源获取样式信息的选项。在本书中，我将保持简单，尽可能坚持基础，重点关注特定于\
  \ Windows 应用的功能。\n\n## 指定事件处理程序\n\n要为事件指定处理方法，您只需使用与所需事件对应的元素属性即可，如下所示：\n\n```\n\
  ...\n<Button x:Name=\"FirstButton\" HorizontalAlignment=\"Center\"\n    Click=\"\
  ButtonClick\" >Click Me!</Button>\n...\n```\n\n我已经指定 `click` 事件（在用户点击按钮时触发）将由 `ButtonClick`\
  \ 方法处理。当您应用事件属性时，Visual Studio 会为您创建一个事件处理方法；我将在下一节向您展示此关系的另一面。\n\n## 在代码中配置控件\n\
  \nXAML 依赖于一些巧妙的编译器技巧和一个称为*分部*类的 C# 功能。XAML 文件中的标记被转换并与代码隐藏文件合并，以创建一个单独的 .NET 类。这乍一看可能有点奇怪，但它确实允许一种良好的混合模型，您可以在\
  \ XAML、代码隐藏 C# 类或两者中定义和配置控件。\n\n\n\n\n展示这种关系的最简单方法是向你展示我在 XAML 文件中为 `Button` 元素指定的事件处理程序的实现。\n\
  \n清单 1-8 展示了 `MainPage.xaml.cs` 文件，即 `MainPage.xaml` 的后台代码文件。\n\n**清单 1-8.**  MainPage.xaml.cs\
  \ 文件\n\n```\nusing System;\nusing System.Collections.Generic;\nusing System.IO;\n\
  using System.Linq;\nusing Windows.Foundation;\nusing Windows.Foundation.Collections;\n\
  using Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\nusing Windows.UI.Xaml.Controls.Primitives;\n\
  using Windows.UI.Xaml.Data;\nusing Windows.UI.Xaml.Input;\nusing Windows.UI.Xaml.Media;\n\
  using Windows.UI.Xaml.Navigation;\n\nnamespace GrocerApp {\n    public sealed partial\
  \ class MainPage : Page {\n        public MainPage() {\n            this.InitializeComponent();\n\
  \        }\n\nprotected override void OnNavigatedTo(NavigationEventArgs e) {\n \
  \       }\n\nprivate void ButtonClick(object sender, RoutedEventArgs e) {\n    \
  \        System.Diagnostics.Debug.WriteLine(\"Button Clicked: \"\n             \
  \   + ((Button)e.OriginalSource).Content);\n        }\n    }\n}\n```\n\n我可以在 XAML\
  \ 文件中不加任何限定地引用 `ButtonClick` 方法，这是因为由 XAML 文件生成的代码与后台代码文件中的 C# 代码合并，形成了一个单独的类。结果是，当应用程序布局中的某个\
  \ `Button` 元素被点击时，我的 C# `ButtonClick` 方法将被调用。\n\n![image](img/sq.jpg) **提示**   Windows\
  \ 应用程序没有可用的控制台，因此如果你想输出消息来帮助了解应用程序中发生了什么，请使用静态的 `System.Diagnostcs.Debug.WriteLine`\
  \ 方法。这些消息会显示在 Visual Studio 的输出窗口中，但前提是你需要从 Visual Studio 调试菜单中选择“启动调试”来启动应用程序。\n\
  \n这种关系是双向的。请注意，XAML 文件中的某些元素具有 `x:Name` 属性，如下所示：\n\n```\n...\n<Button x:Name=\"\
  FirstButton\" HorizontalAlignment=\"Center\"\n    Click=\"ButtonClick\">Click Me!</Button>\n\
  ...\n```\n\n当你为此属性指定一个值时，编译器会创建一个变量，其值是由 XAML 元素创建的 UI 控件。这意味着你可以通过 C# 代码来补充控件的\
  \ XAML 配置，或者以编程方式更改元素的配置。清单 1-9 展示了如何在 `MainPage.xaml.cs` 后台代码文件中定义的 `ButtonClick`\
  \ 方法中，更改名为 `FirstButton` 的按钮的配置。\n\n**清单 1-9.**  在 MainPage.xaml.cs 文件中响应事件时以代码方式配置控件\n\
  \n```\n...\nprivate void ButtonClick(object sender, RoutedEventArgs e) {\n\nFirstButton.Content\
  \ = \"Pressed\";\n    FirstButton.FontSize = 50;\n\nSystem.Diagnostics.Debug.WriteLine(\"\
  Button Clicked: \"\n        + ((Button)e.OriginalSource).Content);\n}\n...\n```\n\
  \n我不需要以任何方式限定控件名称。在这个示例中，我更改了按钮的内容和字体大小。由于这些新语句位于 `Click` 事件处理函数中，点击任一按钮都会导致 `FirstButton`\
  \ 的配置发生变化。这就是目前你需要了解的关于 XAML 的全部内容。总结如下：\n\n-   XAML 被转换为代码，并与后台代码文件的内容合并，形成一个单独的\
  \ .NET 类。\n-   你可以在 XAML 中或在代码中配置 UI 控件。\n-   使用 XAML 可以让你利用 Visual Studio 的设计工具，这些工具非常出色。\n\
  \n一开始，XAML 可能会让你觉得冗长且难以阅读，但你很快就会习惯它。我发现使用 XAML 比单纯使用 C# 代码要容易得多，尽管我承认，在决定如此之前，我也花了相当长的时间来学习\
  \ XAML。\n\n## 运行和调试 Windows 应用程序\n\n现在，我们已经有了一个非常简单的 Windows 应用程序，是时候专注于如何运行和调试它了。Visual\
  \ Studio 提供了三种运行应用程序的方式：在本地计算机上、在模拟器上或在远程计算机上。\n\n本地计算机的问题是，开发 PC 的配置很少与用户设备相同。除非你的应用程序针对的是拥有类似规格平台的用户，否则在本地计算机上进行测试并不能让你对应用程序的表现有一个代表性的了解。\n\
  \n在远程计算机上进行测试是最好的方法，但前提是你有一系列具有不同能力的机器来进行测试。我有一台便宜的 Dell Duo 笔记本电脑，它带有触摸屏和一些硬件传感器，对测试很有用，但建立一个稳定的、合适的测试机器集群很快就会变得昂贵。\n\
  \n最佳的折衷方案是 Visual Studio 模拟器，它能真实地呈现 Windows 应用程序的体验，并允许你更改所模拟设备的能力（包括更改屏幕尺寸）、模拟触摸事件以及生成合成的地理位置数据。\n\
  \n要选择模拟器，请找到 Visual Studio 工具栏上当前显示“本地计算机”的按钮，然后单击其右侧的小向下箭头。从弹出菜单中选择“模拟器”，如图 1-5\
  \ 所示。\n\n![9781430250340_Fig01-05.jpg](img/9781430250340_Fig01-05.jpg)\n\n图 1-5.\
  \  选择 Visual Studio 模拟器来测试应用程序\n\n### 在模拟器中运行 Windows 应用程序\n\n要启动示例应用程序，请单击工具栏按钮（此时将显示“模拟器”），或从调试菜单中选择“启动调试”。Visual\
  \ Studio 将启动模拟器，并生成和部署应用程序，如图 1-6 所示。\n\n![9781430250340_Fig01-06.jpg](img/9781430250340_Fig01-06.jpg)\n\
  \n图 1-6.  使用 Visual Studio 模拟器\n\n你可以使用模拟器右侧的按钮来更改屏幕尺寸和方向、在鼠标和触摸输入之间切换，以及合成地理位置数据。目前查看的内容不多，因为示例应用程序非常简单。\n\
  \n点击应用程序布局上的任意一个按钮，以触发事件处理程序方法并更改按钮的配置。图 1-7 显示了结果。\n\n![9781430250340_Fig01-07.jpg](img/9781430250340_Fig01-07.jpg)\n\
  \n图 1-7.  在示例应用程序中点击任一按钮的结果\n\n你还会在输出窗口中看到一条消息，类似于下面这样：\n\n| `Button Clicked: Pressed`\
  \ |\n\n默认情况下，输出窗口可能不会显示。你可以通过在 Visual Studio 中选择“调试” ![image](img/arrow.jpg) “窗口”菜单中的“输出”项来打开它。\n\
  \n由于应用程序正在调试器中运行，任何异常都会导致调试器中断，从而允许你像常规 C# 项目一样单步执行代码。你可以通过在源代码中设置断点来强制调试器中断；除了使用模拟器之外，运行和调试\
  \ Windows 应用程序都使用标准的 Visual Studio 功能。\n\n## 总结\n\n在本章中，我概述了本书，并介绍了使用 XAML 和 C#\
  \ 编写的 Windows 应用程序的基础知识。我提供了一个关于 XAML 非常基础的概述，并向你展示了如何应用它来创建一个简单的示例应用程序。在下一章中，我将开始构建应用程序，以添加主要的结构组件，从视图模型开始。\n\
  \n## 第 2 章\n\n![image](img/frontdot.jpg)\n\n## 数据、绑定和页面\n\n在本章中，我将向你展示如何定义和使用构成\
  \ Windows 应用程序核心的数据。为此，我将大致遵循*视图模型*模式，该模式允许我清晰地将数据与负责显示这些数据和处理用户交互的应用程序部分分离开来。\n\
  \n\n\n\n### 添加 View Model\n\n你可能已经从模型-视图-控制器（MVC）和模型-视图-视图控制器（MVVC）等设计模式中熟悉了`view\
  \ model`。我不打算在这本书中详细讨论这些模式的细节。关于 MVC 和 MVVC 有很多好的资料，可以从维基百科开始，那里有一些平衡且深刻的描述。\n\n\
  我发现使用`view model`的好处是巨大的，对于除了最简单的应用项目之外的所有项目，都非常值得考虑，并且我强烈建议你认真考虑遵循同样的路径。我不是一个模式狂热者，我坚信应该采纳那些能解决实际问题的模式和技术部分，并使其适应特定的项目。为此，你会发现我对`view\
  \ model`应该如何使用的看法是开放的。\n\n本章重点介绍应用中的幕后管道，创建一个基础，我可以在其上构建来演示不同的特性。我循序渐进地开始，定义一个简单的`view\
  \ model`，并演示不同的技术，通过数据绑定将数据从`view model`带入应用显示。然后，我将向你展示如何将应用分解为多个页面，并将这些页面引入主布局，更改所使用的页面以反映应用的状态。表\
  \ 2-1 提供了本章的总结。\n\n表 2-1. 章节总结\n\n| 问题 | 解决方案 | 列表 |\n| --- | --- | --- |\n| 创建一个可观察类。\
  \ | 实现`INotifyPropertyChanged`接口。 | 1 |\n| 创建一个可观察集合。 | 使用`ObservableCollection`类。\
  \ | 2 |\n| 更改应用启动时加载的页面。 | 更改`App.xaml.cs`中`OnLaunched`方法指定的类型。 | 3 |\n| 设置数据绑定值的源。\
  \ | 使用`DataContext`属性。 | 4 |\n| 创建可重用的样式和模板。 | 创建一个资源字典。 | 5, 6 |\n| 将 UI 控件绑定到\
  \ view model。 | 使用`Binding`关键字。 | 7 |\n| 向应用布局添加另一个页面。 | 向主布局添加一个`Frame`，并使用`Navigate`方法指定要显示的页面。\
  \ | 8–10 |\n| 动态地将页面插入应用布局。 | 使用`Frame.Navigate`方法，可以选择将上下文对象传递给嵌入的页面。 | 11–14 |\n\
  \n### 添加 View Model\n\n一个好的 Windows 应用的核心是*view model*，使用它可以使应用数据与呈现给用户的方式保持分离。`View\
  \ model`是创建易于随时间增强和维护的应用的基本基础。将特定 UI 控件中包含的数据视为权威数据可能很诱人，但很快你就会达到无法管理数据位置和更新方式的地步。\n\
  \n首先，我在 Visual Studio 项目中创建了一个名为`Data`的新文件夹，并创建了两个新的类文件。第一个定义了`GroceryItem`类，它表示购物清单上的单个项目。你可以在列表\
  \ 2-1 中看到`GroceryItem.cs`的内容。\n\n***列表 2-1.** `GroceryItem`类*\n\n```\nusing System.ComponentModel;\n\
  \nnamespace GrocerApp.Data {\n\npublic class GroceryItem : INotifyPropertyChanged\
  \ {\n        private string name, store;\n        private int quantity;\n\npublic\
  \ string Name {\n            get { return name; }\n            set { name = value;\
  \ NotifyPropertyChanged(\"Name\"); }\n        }\n\npublic int Quantity {\n     \
  \       get { return quantity; }\n            set { quantity = value; NotifyPropertyChanged(\"\
  Quantity\"); }\n        }\n\npublic string Store {\n            get { return store;\
  \ }\n            set { store = value; NotifyPropertyChanged(\"Store\"); }\n    \
  \    }\n\npublic event PropertyChangedEventHandler PropertyChanged;\n        private\
  \ void NotifyPropertyChanged(string propName) {\n            if (PropertyChanged\
  \ != null) {\n                PropertyChanged(this, new PropertyChangedEventArgs(propName));\n\
  \            }\n        }\n    }\n}\n```\n\n这个类定义了要购买物品的名称、数量以及应从哪个商店购买的属性。这个类唯一值得注意的方面是它是*可观察的*。Windows\
  \ 应用 UI 控件的一个不错特性是它们支持数据绑定，这意味着当它们正在显示的可观察数据发生更改时，它们会自动更新。\n\n你实现`System.ComponentModel.INotifyPropertyChanged`接口以使类可观察，并在任何可观察属性被修改时触发由接口指定的`PropertyChangedEventHandler`。\n\
  \n我在`Data`命名空间中添加的另一个类是`ViewModel`，它包含在`ViewModel.cs`中。这个类包含用户数据和应用状态，你可以在列表 2-2\
  \ 中看到该类的定义。\n\n***列表 2-2.** `ViewModel`类*\n\n```\nusing System.Collections.Generic;\n\
  using System.Collections.ObjectModel;\nusing System.ComponentModel;\n\nnamespace\
  \ GrocerApp.Data {\n\npublic class ViewModel : INotifyPropertyChanged {\n      \
  \  private ObservableCollection <GroceryItem> groceryList;\n        private List\
  \ <string> storeList;\n        private int selectedItemIndex;\n        private string\
  \ homeZipCode;\n\npublic ViewModel() {\n            groceryList = new ObservableCollection\
  \ <GroceryItem> ();\n            storeList = new List <string> ();\n           \
  \ selectedItemIndex = -1;\n            homeZipCode = \"NY 10118\";\n        }\n\n\
  public string HomeZipCode {\n            get { return homeZipCode; }\n         \
  \   set { homeZipCode = value; NotifyPropertyChanged(\"HomeZipCode\"); }\n     \
  \   }\n\npublic int SelectedItemIndex {\n            get { return selectedItemIndex;\
  \ }\n            set {\n                selectedItemIndex = value;             \
  \    NotifyPropertyChanged(\"SelectedItemIndex\");\n            }\n        }\n\n\
  public ObservableCollection <GroceryItem> GroceryList {\n            get {\n   \
  \             return groceryList;\n            }\n        }\n\npublic List <string>\
  \ StoreList {\n            get {\n                return storeList;\n          \
  \  }\n        }\n\npublic event PropertyChangedEventHandler PropertyChanged;\n \
  \       private void NotifyPropertyChanged(string propName) {\n            if (PropertyChanged\
  \ != null) {\n                PropertyChanged(this, new PropertyChangedEventArgs(propName));\n\
  \            }\n        }\n    }\n}\n```\n\n这个简单`view model`最重要的部分是代表购物清单的`GroceryItem`对象集合。我希望该列表是可观察的，这样对列表的更改会自动更新到应用\
  \ UI 中。为此，我使用了来自`System.Collections.ObjectModel`命名空间的`ObservableCollection`。这个类实现了集合的基本功能，并在列表项被添加、移除或替换时发出事件。`ObservableCollection`类在其包含的某个对象的数据值被修改时不会发出事件，但是通过创建可观察的`GroceryList`对象的可观察集合，我确保对购物清单的*任何*更改都会导致\
  \ UI 中的更新。\n\n`ViewModel`类也实现了`INotifyPropertyChanged`，因为 view model 中有两个可观察属性。第一个是`HomeZipCode`，它是用户数据，我将在第\
  \ 3 章演示如何创建*flyouts*时使用它。第二个可观察属性`SelectedItemIndex`是应用状态的一部分，用于跟踪用户选择了购物清单中的哪个项目（如果有的话）。\n\
  \n\n\n这是一个非常简单的视图模型，正如我所提到的，我在项目中构建视图模型时采取了灵活的方式。尽管如此，它包含了演示如何使用数据绑定自动更新应用程序 UI\
  \ 控件所需的所有要素。\n\n### 添加主布局\n\n现在我已经定义了视图模型，就可以开始构建 UI 了。第一步是添加应用程序的主页面。我理解为什么 Visual\
  \ Studio 会生成一个名为`MainPage`的页面，但我想向你展示我通常如何构建项目，因此我将向项目添加一个新页面。\n\n![image](img/sq.jpg)\
  \ **提示** 我不会再使用`MainPage.xaml`，你可以将其从项目中删除。\n\n我喜欢使用大量的项目结构，因此我向项目添加了一个名为`Pages`的新文件夹。我通过右键单击`Pages`文件夹，从弹出菜单中选择添加![image](img/arrow.jpg)新项，并选择空白页面模板，添加了一个名为`ListPage.xaml`的新空白页面。Visual\
  \ Studio 会创建 XAML 文件和代码后置文件`ListPage.xaml.cs`。\n\n![image](img/sq.jpg) **提示** 如果你是使用\
  \ XAML 构建应用程序的新手，那么重要的是要理解，你通常不会按照我描述示例应用程序的顺序来工作。相反，XAML 方法支持一种更迭代的风格，你可以在其中使用\
  \ XAML 声明一些控件，添加一些代码来支持它们，并可能定义一些样式来减少标记中的重复。这比我在这里展示的要自然得多，但在书中很难捕捉到基于 XAML 的开发中来回反复的特性。\n\
  \n我希望将`ListPage.xaml`设置为应用程序启动时加载的页面，这需要更新`App.xaml.cs`，如下面的列表 2-3 所示。\n\n***列表\
  \ 2-3.** 更新`App.xaml.cs`以使用`ListPage`*\n\n```csharp\nusing System;\nusing Windows.ApplicationModel;\n\
  using Windows.ApplicationModel.Activation;\nusing Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\n\
  \nnamespace GrocerApp {\n\n    sealed partial class App : Application {\n\n    \
  \    public App() {\n            this.InitializeComponent();\n            this.Suspendin\
  \ += OnSuspending;\n        }\n\n        protected override void OnLaunched(LaunchActivatedEventArgs\
  \ args) {\n            Frame rootFrame = Window.Current.Content as Frame;\n\n  \
  \          if (rootFrame == null) {\n                rootFrame = new Frame();\n\n\
  \                if (args.PreviousExecutionState == ApplicationExecutionState.Terminated)\
  \ {\n                    //TODO: 从先前挂起的应用程序加载状态\n                }\n\n         \
  \       // 将框架放置在当前窗口中\n                Window.Current.Content = rootFrame;\n  \
  \          }\n\n            if (rootFrame.Content == null) {\n\n               \
  \ if (!rootFrame.Navigate(typeof(Pages.ListPage), args.Arguments)) {\n         \
  \           throw new Exception(\"创建初始页面失败\");\n                }\n            }\n\
  \            // 确保当前窗口处于活动状态\n            Window.Current.Activate();\n        }\n\
  \n        private void OnSuspending(object sender, SuspendingEventArgs e) {\n  \
  \          var deferral = e.SuspendingOperation.GetDeferral();\n            //TODO:\
  \ 保存应用程序状态并停止任何后台活动\n            deferral.Complete();\n        }\n    }\n}\n```\n\
  \n暂时不用担心这个类的其余部分。我将在第 5 章中解释如何响应 Windows 应用程序的生命周期时再回到这个话题。\n\n## 编写代码\n\n对我来说，解释如何创建示例应用程序最简单的方式是，以与你在项目中通常创建顺序相反的顺序来呈现内容。为此，我将从`ListPage.xaml.cs`代码后置文件开始。你可以在下面的列表\
  \ 2-4 中看到此文件的内容，包括我对 Visual Studio 默认内容所做的添加。\n\n***列表 2-4.** `ListPage.xaml.cs`文件*\n\
  \n\n\n```csharp\nusing GrocerApp.Data;\nusing Windows.UI.Xaml.Controls;\nusing Windows.UI.Xaml.Navigation;\n\
  \nnamespace GrocerApp.Pages {\n\npublic sealed partial class ListPage : Page {\n\
  \        ViewModel viewModel;\n\npublic ListPage() {\n\nviewModel=new ViewModel();\n\
  \nviewModel.StoreList.Add(\"Whole Foods\");\n            viewModel.StoreList.Add(\"\
  Kroger\");\n            viewModel.StoreList.Add(\"Costco\");\n            viewModel.StoreList.Add(\"\
  Walmart\");\n\nviewModel.GroceryList.Add(new GroceryItem {\n                Name=\"\
  Apples\",\n                Quantity=4, Store=\"Whole Foods\"\n            });\n\
  \            viewModel.GroceryList.Add(new GroceryItem {\n                Name=\"\
  Hotdogs\",\n                Quantity=12, Store=\"Costco\"\n            });\n   \
  \         viewModel.GroceryList.Add(new GroceryItem {\n                Name=\"Soda\"\
  ,\n                Quantity=2, Store=\"Costco\"\n            });\n            viewModel.GroceryList.Add(new\
  \ GroceryItem {\n                Name=\"Eggs\",\n                Quantity=12, Store=\"\
  Kroger\"\n            });\n\nthis.InitializeComponent();\n\nthis.DataContext=viewModel;\n\
  \        }\n\nprotected override void OnNavigatedTo(NavigationEventArgs e) {\n \
  \       }\n\nprivate void ListSelectionChanged(object sender,             SelectionChangedEventArgs\
  \ e) {\n            viewModel.SelectedItemIndex=groceryList.SelectedIndex;\n   \
  \     }\n    }\n}\n```\n\n![image](img/sq.jpg) **注意**   如果在此时编译应用，将会出现错误，因为我引用了尚未添加的`groceryList`控件。请等到“运行应用”部分；届时所有内容才会就位。\n\
  \n`ListPage`类的构造函数会创建一个新的`ViewModel`对象，并用一些示例数据填充它。该类中最有趣的语句如下：\n\n```\nthis.DataContext\
  \ = viewModel;\n```\n\nWindows 应用 UI 控件的核心是支持*数据绑定*，通过它我可以将视图模型中的内容显示在 UI 控件中。为此，我必须指定数据的来源。`DataContext`属性指定了\
  \ UI 控件及其所有子控件的绑定数据来源。我可以使用`this`关键字为整个布局设置`DataContext`，因为`ListPage`类由代码隐藏文件的内容与\
  \ XAML 内容合并而成，这意味着`this`指向包含所有 XAML 声明的控件的`Page`对象。\n\n我做的最后一项添加是定义一个方法，用于处理`ListView`控件的`SelectionChanged`事件。这种控件将用于显示购物清单中的项目。当我定义\
  \ XAML 时，我会安排当用户选择其中某一项时调用此方法。该方法根据`ListView`控件的`SelectedIndex`属性，在视图模型中设置`SelectedItemIndex`属性。由于`SelectedItemIndex`属性是可观察的，当用户进行选择时，应用的其他部分可以收到通知。\n\
  \n### 添加资源字典\n\n在第 1 章中，我解释了 Visual Studio 创建的`StandardStyles.xaml`文件定义了一些 Windows\
  \ 应用中使用的 XAML 样式和模板。像这样定义样式是个好主意，因为这意味着你可以在一个地方应用更改，而不必追踪所有直接对 UI 控件应用颜色或字体设置的地方。我的示例项目需要一些标准样式和模板。为此，我创建了一个名为`Resources`的新文件夹，并使用资源字典项模板创建了一个名为`GrocerResourceDictionary.xaml`的新文件。你可以在清单\
  \ 2-5 中看到此文件的内容。\n\n![image](img/sq.jpg) **提示**   正如我在第 1 章中解释的，Microsoft 禁止向`StandardStyles.xaml`添加样式。如果你想创建自定义样式，必须创建自己的资源字典。\n\
  \n***清单 2-5.**  定义资源字典*\n\n```\n<ResourceDictionary\n    xmlns = \"http://schemas.microsoft.com/winfx/2006/xaml/presentation\"\
  \n    xmlns:x = \"http://schemas.microsoft.com/winfx/2006/xaml\"\n    xmlns:local\
  \ = \"using:GrocerApp.Resources\">\n    <ResourceDictionary.MergedDictionaries>\n\
  \        <ResourceDictionary Source = \"/Common/StandardStyles.xaml\" />\n    </ResourceDictionary.MergedDictionaries>\n\
  \n<SolidColorBrush x:Key = \"AppBackgroundColor\" Color = \"#3E790A\"/>\n\n<Style\
  \ x:Key = \"GroceryListItem\" TargetType = \"TextBlock\"\n           BasedOn = \"\
  {StaticResource BasicTextStyle}\" >\n        <Setter Property = \"FontSize\" Value\
  \ = \"45\"/>\n        <Setter Property = \"FontWeight\" Value = \"Light\"/>\n  \
  \      <Setter Property = \"Margin\" Value = \"10, 0\"/>\n        <Setter Property\
  \ = \"VerticalAlignment\" Value = \"Center\"/>\n    </Style>\n\n<DataTemplate x:Key\
  \ = \"GroceryListItemTemplate\">\n        <StackPanel Orientation = \"Horizontal\"\
  >\n            <TextBlock Text = \"{Binding Quantity}\"\n                      \
  \ Style = \"{StaticResource GroceryListItem}\" Width = \"50\"/>\n            <TextBlock\
  \ Text = \"{Binding Name}\"\n                       Style = \"{StaticResource GroceryListItem}\"\
  \  Width = \"200\"/>\n            <TextBlock Text = \"{Binding Store}\"\n      \
  \                 Style = \"{StaticResource GroceryListItem}\"  Width = \"300\"\
  />\n        </StackPanel>\n    </DataTemplate>\n</ResourceDictionary>\n```\n\n本书不会深入探讨样式和模板的细节，但我会解释这个文件中的内容，以便为后续的清单提供一些上下文。最简单的声明如下：\n\
  \n```\n...\n<SolidColorBrush x:Key = \"AppBackgroundColor\" Color = \"#3E790A\"\
  />\n...\n```\n\n应用默认的配色方案是白底黑字，我想进行更改。更改的第一步是定义一种不同的颜色，这正是此元素所做的，它将一种绿色与键`AppBackgroundColor`关联起来。稍后当我创建\
  \ XAML 布局时，你将看到我使用此键来应用该颜色。\n\n下一个声明是关于样式的，它包含多个属性的值：\n\n```\n...\n<Style x:Key\
  \ = \"GroceryListItem\" TargetType = \"TextBlock\"\n    BasedOn = \"{StaticResource\
  \ BasicTextStyle}\" >\n    <Setter Property = \"FontSize\" Value = \"45\"/>\n  \
  \  <Setter Property = \"FontWeight\" Value = \"Light\"/>\n    <Setter Property =\
  \ \"Margin\" Value = \"10, 0\"/>\n    <Setter Property = \"VerticalAlignment\" Value\
  \ = \"Center\"/>\n</Style>\n...\n```\n\n这个名为`GroceryListItem`的样式定义了多个属性的值：`FontSize`、`FontWeight`等。但请注意，在声明样式时，我使用了`BasedOn`属性。这允许我继承另一个样式中定义的所有值。在此例中，我继承了\
  \ Microsoft 在`StandardStyles.xaml`文件中定义的`BasicTextStyle`样式。在派生此类新样式之前，我必须先将其他资源字典文件纳入作用域，这通过以下声明实现：\n\
  \n```\n<ResourceDictionary.MergedDictionaries>\n    <ResourceDictionary Source =\
  \ \" /Common/StandardStyles.xaml \" />\n</ResourceDictionary.MergedDictionaries>\n\
  ```\n\n你可以通过这种方式导入任意数量的文件，但导入操作必须在从文件内容派生样式之前进行。\n\n最后一个声明是关于数据模板的，通过它我可以定义一个元素层次结构，该层次结构将用于表示数据源中的每个项。如你所猜，我的数据来源将是视图模型中的杂货项目集合。集合中的每个项都将由一个包含三个`TextBlock`控件的`StackPanel`表示。请注意标记为粗体的两个属性：\n\
  \n\n\n```\n...\n<DataTemplate x:Key = \"GroceryListItemTemplate\">\n    <StackPanel\
  \ Orientation = \"Horizontal\">\n        <TextBlock Text = \"{Binding Quantity}\"\
  \n            Style = \"{StaticResource GroceryListItem}\" Width = \"50\"/>\n        <TextBlock\
  \ Text = \"{Binding Name}\"\n            Style = \"{StaticResource GroceryListItem}\"\
  \  Width = \"200\"/>\n        <TextBlock Text = \"{Binding Store}\"\n            Style\
  \ = \"{StaticResource GroceryListItem}\"  Width = \"300\"/>\n    </StackPanel>\n\
  </DataTemplate>\n...\n```\n\n`Text` 属性的值很重要。`Binding` 关键字告知运行时，我希望从控件的 `DataContext`\
  \ 中获取 `Text` 属性的值。在上一节中，我已将视图模型指定为此数据的来源，而指定 `Quantity` 则告知运行时，我希望使用模板正在显示的对象中的\
  \ `Quantity` 属性。通过在代码隐藏文件中设置 `DataContext` 属性，我定义了宏观方向（“使用我的视图模型作为绑定数据的源”），而 `Binding`\
  \ 关键字则让我指定具体细节（“显示这个特定属性的值”）。稍后，在主 XAML 文件中，我将能够将两者连接起来，使运行时知道应使用视图模型的哪部分来获取各个属性的值。\n\
  \n我标注的另一个属性虽然不太引人注目，但同样有用。对于 `Style` 属性，我指定了一个名为 `GroceryList` 项的 `StaticResource`。`StaticResource`\
  \ 关键字告知运行时，我正在查找的资源已经定义完毕。我使用了刚才指定的 `GroceryListItem` 样式。这样做的好处是，我可以在一处更改三个 `TextBlock`\
  \ 控件的外观，并且可以轻松地为那些希望具有相似外观的控件派生新的样式。最后一步是将自定义资源字典添加到 `App.xaml` 中，使其在应用中可用，具体操作如清单\
  \ 2-6 所示。\n\n**清单 2-6.** 将自定义资源字典添加到 `App.xaml` 文件\n\n```\n<Application\n    x:Class\
  \ = \"GrocerApp.App\"\n    xmlns = \" http://schemas.microsoft.com/winfx/2006/xaml/presentation\
  \ \"\n    xmlns:x = \" http://schemas.microsoft.com/winfx/2006/xaml \"\n    xmlns:local\
  \ = \"using:GrocerApp\">\n    <Application.Resources>\n        <ResourceDictionary>\n\
              <ResourceDictionary.MergedDictionaries>\n               <!--\n                    定义平台外观和感受通用方面的样式\n\
                      Visual Studio 项目和项模板所需\n                -->\n                <ResourceDictionary\
  \ Source = \"Common/StandardStyles.xaml\"/>\n                <ResourceDictionary\
  \ Source = \"Resources/GrocerResourceDictionary.xaml\"/>\n            </ResourceDictionary.MergedDictionaries>\n\
          </ResourceDictionary>\n    </Application.Resources>\n</Application>\n```\n\
  \n## 编写 XAML\n\n现在，代码隐藏文件和资源字典都已就位，我可以转向 XAML 来声明构成应用布局的控件。清单 2-7 显示了 `ListPage.xaml`\
  \ 文件的内容。\n\n**清单 2-7.** `ListPage.xaml` 文件\n\n```\n<Page\n    x:Class = \"GrocerApp.Pages.ListPage\"\
  \n    xmlns = \"http://schemas.microsoft.com/winfx/2006/xaml/presentation\"\n    xmlns:x\
  \ = \"http://schemas.microsoft.com/winfx/2006/xaml\"\n    xmlns:local = \"using:GrocerApp.Pages\"\
  \n    xmlns:d = \"http://schemas.microsoft.com/expression/blend/2008\"\n    xmlns:mc\
  \ = \"http://schemas.openxmlformats.org/markup-compatibility/2006\"\n    mc:Ignorable\
  \ = \"d\">\n    <Grid Background = \"{StaticResourceAppBackgroundColor}\">\n        <Grid.RowDefinitions>\n\
              <RowDefinition/>\n            <RowDefinition/>\n        </Grid.RowDefinitions>\n\
          <Grid.ColumnDefinitions>\n            <ColumnDefinition/>\n            <ColumnDefinition/>\n\
          </Grid.ColumnDefinitions>\n        <StackPanel Grid.RowSpan = \"2\">\n            <TextBlock\
  \ Style = \"{StaticResource HeaderTextStyle}\" Margin = \"10\"\n                      \
  \ Text = \"购物清单\"/>\n            <ListView x:Name = \"groceryList\" Grid.RowSpan\
  \ = \"2\"\n                ItemsSource = \"{Binding GroceryList}\"\n                ItemTemplate\
  \ = \"{StaticResource GroceryListItemTemplate}\"\n                SelectionChanged\
  \ = \"ListSelectionChanged\" />\n        </StackPanel>\n        <StackPanel Orientation\
  \ = \"Vertical\" Grid.Column = \"1\">\n            <TextBlock Style = \"{StaticResource\
  \ HeaderTextStyle}\" Margin = \"10\"\n                       Text = \"商品详情\"/>\n\
          </StackPanel>\n        <StackPanel Orientation = \"Vertical\" Grid.Column\
  \ = \"1\" Grid.Row = \"1\">\n            <TextBlock Style = \"{StaticResource HeaderTextStyle}\"\
  \ Margin = \"10\"\n                       Text = \"店铺详情\"/>\n        </StackPanel>\n\
      </Grid>\n</Page>\n```\n\n可以看到，我将 `Grid` 控件的 `Background` 属性设置为了资源字典中指定的颜色。此外，我还配置了\
  \ Visual Studio 定义的 `Grid` 控件，并使用 `Grid.RowDefinitions` 和 `Grid.ColumnDefinitions`\
  \ 元素将其划分为两个等宽的列，每列各有两行等高。\n\n对于布局的左侧，我添加了一个 `StackPanel`，并将其配置为跨两行并填充布局的左半部分：\n\n\
  ```\n...\n<StackPanel Grid.RowSpan = \"2\" >\n...\n```\n\n此 `StackPanel` 包含一个用于显示标题的\
  \ `TextBlock`，以及一个稍后我将详细说明的 `ListView`。对于屏幕的右侧，我添加了两个 `StackPanel`，每行一个。我通过 `Grid.Row`\
  \ 和 `Grid.Column` 属性指定了每个控件所属的行和列。这些属性使用从零开始的索引，而未设置这些属性的控件则默认放在第一行第一列。在图 2-1 中，你可以看到该布局在\
  \ Visual Studio 设计图面上的显示效果。\n\n![9781430250340_Fig02-01.jpg](img/9781430250340_Fig02-01.jpg)\n\
  \n**图 2-1.** 显示在 Visual Studio 设计图面上的 XAML 布局静态部分\n\n设计图面无法显示动态生成的内容，这就是图中看不到视图模型数据的原因。动态内容将在\
  \ `ListView` 控件中显示。顾名思义，`ListView` 以列表形式显示一组项。有三个 XAML 属性规定了具体实现方式：\n\n```\n...\n\
  <ListView x:Name = \"groceryList\" Grid.RowSpan = \"2\"\n    ItemsSource = \"{Binding\
  \ GroceryList}\"\n    ItemTemplate = \"{StaticResource GroceryListItemTemplate}\"\
  \n    SelectionChanged = \"ListSelectionChanged\"/>\n...\n```\n\n我使用这些属性来弥合宏观层面的\
  \ `DataContext` 属性与模板中微观层面的属性之间的差距。`ItemSource` 属性告知 `ListView` 控件应从何处获取其必须显示的项集。值为\
  \ `GroceryList` 的 `Binding` 关键字告知 `ListView`，它应显示我在代码隐藏文件中设置的 `DataContext` 对象的\
  \ `GroceryList` 属性的内容。\n\n\n\n`ItemTemplate`属性告诉`ListView`如何显示`ItemSource`中的每个项目。关键字`StaticResource`和值`GroceryListItemTemplate`意味着将使用我在资源字典中指定的数据模板，这会为`ViewModel.GroceryList`集合中的每个项目生成一个包含三个`TextBlock`元素的新`StackPanel`。\n\
  \n最后一个属性与我在代码隐藏文件中定义的事件处理方法相关联，该方法处理`ListView`控件发出的`SelectionChanged`事件。\n\n![image](img/sq.jpg)\
  \ **提示** 你可以通过 Visual Studio 属性窗口或查阅 Microsoft API 文档来获取控件定义的事件列表。创建具有正确参数的处理方法的最简单方法是让\
  \ XAML 编辑器在自动完成过程中为你创建它们。\n\n## 运行应用程序\n\nVisual Studio 设计图面只能显示布局中静态的部分。查看动态内容的唯一方法是运行应用程序。因此，要想看到\
  \ XAML 和 C#如何协同工作，请从 Visual Studio 的调试菜单中选择“开始调试”。Visual Studio 将生成项目并将应用程序推送到模拟器。你可以在图\
  \ 2-2 中看到结果。\n\n![9781430250340_Fig02-02.jpg](img/9781430250340_Fig02-02.jpg)\n\n\
  图 2-2. 在模拟器中运行示例应用程序\n\n你可以看到数据绑定如何将视图模型中的项目添加到`ListView`控件，以及我如何在资源字典中定义的模板被用来格式化它们。\n\
  \nWindows 应用 UI 控件有很多内置行为。例如，当鼠标移动到项目上时，项目会以较浅的阴影显示（你可以在图 2-2 中看到），当用户单击选择项目时，则会以不同的阴影显示。控件使用的所有样式都可以更改，但为简单起见，我将坚持使用默认设置。\n\
  \n## 将其他页面插入布局\n\n你不必将所有控件和代码放在一个 XAML 文件及其代码隐藏文件中。为了使项目更易于管理，你可以创建多个页面并将它们整合到你的应用程序中。作为简单的演示，我在`Pages`项目文件夹中创建了一个名为`NoItemSelected.xaml`的新`Blank\
  \ Page`。清单 2-8 显示了此文件的内容，我对默认内容的添加部分以粗体显示。\n\n![image](img/sq.jpg) **提示** 在 Visual\
  \ Studio 允许你向项目添加新项之前，你必须先停止调试器。\n\n***清单 2-8.** `NoItemSelected.xaml`文件*\n\n```\n\
  <Page\n    x:Class = \"GrocerApp.Pages.NoItemSelected\"\n    xmlns = \"http://schemas.microsoft.com/winfx/2006/xaml/presentation\"\
