- fmt: "![image](images/sq.jpg) **Tip** You can also replace the splash screen that\
    \ is shown to the user when the app is loading. There is a Splash Screen section\
    \ at the bottom of the Application UI tab in which you can specify the image and\
    \ the background color it should be displayed with. The image used for the splash\
    \ screen must be 630 pixels by 300 pixels.\n\n## Creating Live Tiles\n\nLive tiles\
    \ provide information about your app to your user. For my example app, I am going\
    \ to display the first few items from the grocery list. Tile updates are based\
    \ on preconfigured templates, which contain a mix of graphics and text and which\
    \ are designed for either standard or wide tiles. The first thing you must do\
    \ is pick the template you want. The easiest way to do this is to look at the\
    \ API documentation for the `Windows.UI.Notifications.TileTemplateType` enumeration,\
    \ which is available at [http://msdn.microsoft.com/en-us/library/windows/apps/windows.ui.notifications.tiletemplatetype.aspx](http://msdn.microsoft.com/en-us/library/windows/apps/windows.ui.notifications.tiletemplatetype.aspx).\
    \ The template system is based on XML fragments, and you can see the XML structure\
    \ for each template in the API documentation. I have chosen the `TileSquareText03`\
    \ template. This is for a square tile and has four lines of nonwrapping text,\
    \ without any images. You can see the XML fragment that represents the tile in\
    \ [Listing 4-8](#9781430250340_Ch04.xhtml#list8).\n\n**Listing 4-8.** The XML\
    \ Fragment for the TileSquareText03 Tile Template\n\n```\n<tile>\n  <visual lang=\"\
    en-US\">\n    <binding template=\"TileSquareText03\">\n      <text id=\"1\">Text\
    \ Field 1</text>\n      <text id=\"2\">Text Field 2</text>\n      <text id=\"\
    3\">Text Field 3</text>\n      <text id=\"4\">Text Field 4</text>\n    </binding>\n\
    \  </visual>\n</tile>\n```\n\nThe idea is to populate the `text` elements with\
    \ information from the app and pass the result to the Windows notifications system.\
    \ I want to set up my tile updates in the `MainPage` class, but doing this means\
    \ refactoring my app so that the `ViewModel` object is created there, rather than\
    \ in the `ListPage` class. [Listing 4-9](#9781430250340_Ch04.xhtml#list9) shows\
    \ the changes required in the `MainPage` class to support the view model and to\
    \ update the tiles.\n\n**Listing 4-9.** Refactoring the MainPage Class\n\n```\n\
    using GrocerApp.Data;\nusing System;\nusing Windows.Data.Xml.Dom;\nusing Windows.UI.Notifications;\n\
    using Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\nusing Windows.UI.Xaml.Navigation;\n\
    \nnamespace GrocerApp.Pages {\n\npublic sealed partial class MainPage : Page {\n\
    \        private ViewModel viewModel;\n\npublic MainPage() {\n            this.InitializeComponent();\n\
    \nviewModel = new ViewModel();\n\n// ...test data removed for brevity...\n\nthis.DataContext\
    \ = viewModel;\n\nMainFrame.Navigate(typeof(ListPage), viewModel);\n\nviewModel.GroceryList.CollectionChanged\
    \ += (sender, args) => {\n                UpdateTile();\n            };\n\nUpdateTile();\n\
    \        }\n\nprivate void UpdateTile() {\n\nXmlDocument tileXml = TileUpdateManager.\n\
    \                GetTemplateContent(TileTemplateType.TileSquareText03);\n\nXmlNodeList\
    \ textNodes =\n                tileXml.GetElementsByTagName(\"text\");\n\nfor\
    \ (int i = 0; i < textNodes.Length &&\n                    i < viewModel.GroceryList.Count;\
    \ i++) {\n                textNodes[i].InnerText = viewModel.GroceryList[i].Name;\n\
    \            }\n\nfor (int i = 0; i < 5; i++) {\n                TileUpdateManager.CreateTileUpdaterForApplication()\n\
    \                    .Update(new TileNotification(tileXml));\n            }\n\
    \        }\n\nprotected override void OnNavigatedTo(NavigationEventArgs e) {\n\
    \        }\n\nprivate void NavBarButtonPress(object sender, RoutedEventArgs e)\
    \ {\n            Boolean isListView = (Button)sender == ListViewButton;\n    \
    \        MainFrame.Navigate(isListView ? typeof(ListPage)\n                : typeof(DetailPage),\
    \ viewModel);\n\n}\n    }\n} \n```\n\nI also need to update the `ListPage.xaml.cs`\
    \ file so that the view model object that is passed from the `MainPage` class\
    \ is used, as shown in [Listing 4-10](#9781430250340_Ch04.xhtml#list10).\n\n**Listing\
    \ 4-10.** Updating the ListPage Class in the ListPage.xaml.cs File\n\n```\nusing\
    \ GrocerApp.Data;\nusing Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\nusing\
    \ Windows.UI.Xaml.Navigation;\n\nnamespace GrocerApp.Pages {\n\npublic sealed\
    \ partial class ListPage : Page {\n        ViewModel viewModel;\n\npublic ListPage()\
    \ {\n            this.InitializeComponent();\n        }\n\nprotected override\
    \ void OnNavigatedTo(NavigationEventArgs e) {\n            viewModel = (ViewModel)e.Parameter;\n\
    \nItemDetailFrame.Navigate(typeof(NoItemSelected));\n            viewModel.PropertyChanged\
    \ += (sender, args) => {\n                if (args.PropertyName == \"SelectedItemIndex\"\
    ) {\n                    if (viewModel.SelectedItemIndex == -1) {\n          \
    \              ItemDetailFrame.Navigate(typeof(NoItemSelected));\n           \
    \             AppBarDoneButton.IsEnabled = false;\n                    } else\
    \ {\n                        ItemDetailFrame.Navigate(typeof(ItemDetail),    \
    \                    viewModel);\n                        AppBarDoneButton.IsEnabled\
    \ = true;\n                    }\n                }\n            };\n        }\n\
    \nprivate void ListSelectionChanged(object sender,                SelectionChangedEventArgs\
    \ e) {\n            viewModel.SelectedItemIndex = groceryList.SelectedIndex;\n\
    \        }\n\nprivate void AppBarButtonClick(object sender, RoutedEventArgs e)\
    \ {\n            if (e.OriginalSource == AppBarDoneButton\n                  \
    \  && viewModel.SelectedItemIndex > -1) {\n\nviewModel.GroceryList.RemoveAt(viewModel.SelectedItemIndex);\n\
    \                viewModel.SelectedItemIndex = -1;\n\n} else if (e.OriginalSource\
    \ == AppBarZipButton) {\n                    HomeZipFlyout.Show(this, this.BottomAppBar,\
    \                     (Button)e.OriginalSource);\n            } else if (e.OriginalSource\
    \ == AppBarAddButton) {\n                AddItemFlyout.Show(this, this.BottomAppBar,\
    \                     (Button)e.OriginalSource);\n            }\n\n}\n    }\n\
    }\n```\n\nThere is a lot going on in just a few lines of code, so I’ll break things\
    \ down in the sections that follow.\n\n## Populating the XML Template\n\nTo get\
    \ the template XML fragment, I call the `TileUpdateManager.GetTemplateContent`\
    \ method specifying the template I want with a value from the `TileTemplateType`\
    \ enumeration. This gives me a `Windows.Data.Xml.Dom.XmlDocument` object to which\
    \ I can apply standard DOM methods to set the value of the `text` elements in\
    \ the template. Well, sort of—because the `XmlDocument` object’s implementation\
    \ of `GetElementById` doesn’t work, I have to use the `GetElementsByTagName` method\
    \ to get an array containing all of the `text` elements in the XML:\n\n```\n...\n\
    XmlNodeList textNodes = tileXml.GetElementsByTagName(\"text\");\n...\n```\n\n\
    The `text` nodes are returned in the order they are defined in the XML fragment,\
    \ which means that I can iterate through them and set the `innerText` property\
    \ of each element to one of my grocery list items:\n\n```\n...\nfor (int i = 0;\
    \ i < textNodes.Length && i < viewModel.GroceryList.Count; i++) {\n    textNodes[i].InnerText\
    \ = viewModel.GroceryList[i].Name;\n}\n...\n```\n\n![image](images/sq.jpg) **Tip**\
    \ Only three of the four text elements defined by the XML template will be visible\
    \ by the user on the Start screen. The last element is obscured by the app name\
    \ or icon. This is true for many of the tile templates.\n\n## Applying the Tile\
    \ Update\n\nOnce I have set the content of the XML document, I use it to create\
    \ the update for the app tile. I need to create a `TileNotification` object from\
    \ the XML and then pass this to the `Update` method of the `TileUpdater` object\
    \ that is returned from the static `TileUpdateManager.CreateTileUpdaterForApplication`\
    \ method."
