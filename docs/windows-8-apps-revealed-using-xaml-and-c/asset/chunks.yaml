    Adding a Resource Dictionary


    In [Chapter 1](#9781430250340_Ch01.xhtml), I explained that the `StandardStyles.xaml`
    file created by Visual Studio defines some XAML styles and templates that are
    used in Windows apps. Defining styles like this is a good idea because it means
    you can apply changes in a single place, rather than having to track down all
    of the places you applied a color or font setting directly to UI controls. I need
    a few standard styles and templates for my example project. To this end, I created
    a new folder called `Resources` and a new file called `GrocerResourceDictionary.xaml`
    using the Resource Dictionary item template. You can see the contents of this
    file in [Listing 2-5](#9781430250340_Ch02.xhtml#list5).


    ![image](images/sq.jpg) **Tip**   As I explained in [Chapter 1](#9781430250340_Ch01.xhtml),
    Microsoft prohibits adding styles to `StandardStyles.xaml`. You must create your
    own resource dictionary if you want to create custom styles.


    ***[Listing 2-5](#9781430250340_Ch02.xhtml#_list5).** Defining a Resource Dictionary*


    ```

    <ResourceDictionary

        xmlns = "http://schemas.microsoft.com/winfx/2006/xaml/presentation"

        xmlns:x = "http://schemas.microsoft.com/winfx/2006/xaml"

        xmlns:local = "using:GrocerApp.Resources">

        <ResourceDictionary.MergedDictionaries>

            <ResourceDictionary Source = "/Common/StandardStyles.xaml" />

        </ResourceDictionary.MergedDictionaries>


    <SolidColorBrush x:Key = "AppBackgroundColor" Color = "#3E790A"/>


    <Style x:Key = "GroceryListItem" TargetType = "TextBlock"

               BasedOn = "{StaticResource BasicTextStyle}" >

            <Setter Property = "FontSize" Value = "45"/>

            <Setter Property = "FontWeight" Value = "Light"/>

            <Setter Property = "Margin" Value = "10, 0"/>

            <Setter Property = "VerticalAlignment" Value = "Center"/>

        </Style>


    <DataTemplate x:Key = "GroceryListItemTemplate">

            <StackPanel Orientation = "Horizontal">

                <TextBlock Text = "{Binding Quantity}"

                           Style = "{StaticResource GroceryListItem}" Width = "50"/>

                <TextBlock Text = "{Binding Name}"

                           Style = "{StaticResource GroceryListItem}"  Width = "200"/>

                <TextBlock Text = "{Binding Store}"

                           Style = "{StaticResource GroceryListItem}"  Width = "300"/>

            </StackPanel>

        </DataTemplate>

    </ResourceDictionary>

    ```


    I don’t get into the detail of styles and templates in this book, but I will explain
    what I have done in this file since it will provide some context for later listings.
    The simplest declaration is this one:


    ```

    ...

    <SolidColorBrush x:Key = "AppBackgroundColor" Color = "#3E790A"/>

    ...

    ```


    The default color scheme for apps is white on black, which I want to change. The
    first step in changing this is to define a different color, which is what this
    element does, associating a shade of green with the key `AppBackgroundColor`.
    You will see me apply this color using its key when I create the XAML layout in
    a moment.


    The next declaration is for a style, which consists of values for multiple properties:


    ```

    ...

    <Style x:Key = "GroceryListItem" TargetType = "TextBlock"

        BasedOn = "{StaticResource BasicTextStyle}" >

        <Setter Property = "FontSize" Value = "45"/>

        <Setter Property = "FontWeight" Value = "Light"/>

        <Setter Property = "Margin" Value = "10, 0"/>

        <Setter Property = "VerticalAlignment" Value = "Center"/>

    </Style>

    ...

    ```


    This style, which is called `GroceryListItem`, defines values for several properties:
    `FontSize`, `FontWeight`, and so on. But notice that I have used the `BasedOn`
    attribute when declaring the style. This allows me to inherit all of the values
    defined in another style. In this case, I inherit from the `BasicTextStyle` style
    that Microsoft defined in the `StandardStyles.xaml` file. I must bring other resource
    dictionary files into scope before I can derive new styles like this, which I
    do using this declaration:


    ```

    <ResourceDictionary.MergedDictionaries>

        <ResourceDictionary Source = " /Common/StandardStyles.xaml " />

    </ResourceDictionary.MergedDictionaries>

    ```


    You can import as many files as you like in this manner, but the import must happen
    before you derive styles from the files’ content.


