    \n![9781430250340_Fig05-02.jpg](images/9781430250340_Fig05-02.jpg)\n\n[Figure\
    \ 5-2](#9781430250340_Ch05.xhtml#_Fig00052). Indicating that the life-cycle events\
    \ have been received\n\n## Testing the Life-Cycle Events\n\nThe problem with simulating\
    \ the life-cycle events is that you don’t get quite the same result as when they\
    \ arise naturally. To do this, you need to start the app without the debugger,\
    \ which is why indicating that the events have been received via the view model\
    \ is so useful. Creating the circumstances in which the events are sent requires\
    \ some specific actions, which I describe step-by-step in the following sections.\n\
    \n### Activate the App\n\nTo trigger the `activated` event, start the app by selecting\
    \ **Start Without Debugging** from the Visual Studio **Debug** menu. You can also\
    \ start the app from the **Start** screen, either in the simulator or on your\
    \ local machine. The important thing is not to start the app with the debugger.\n\
    \n### Suspend the App\n\nThe easiest way to suspend the app is to switch to the\
    \ desktop by pressing `Win+D`. Open the **Task Manager**, right-click the item\
    \ for your app, and select **Go to Details** from the pop-up menu. The **Task\
    \ Manager** will switch to the **Details** tab and select the `WWAHost.exe` process,\
    \ which is responsible for running the app. After a few seconds, the value shown\
    \ in the **Status** column will change from **Running** to **Suspended**, which\
    \ tells you that Windows has suspended the app. The app will have been sent the\
    \ `Suspending` event (but you won’t see the evidence of this until the app is\
    \ resumed).\n\n### Resuming the App\n\nSwitching back to the app will resume it.\
    \ You will see that the view model items show that the events have been received.\
    \ The state of a resumed app is exactly as it was at the moment it was suspended.\
    \ Your layout, data, event handlers, and everything else will be just as it was.\n\
    \nYour app could have been suspended for a long time, especially if the device\
    \ was put into a low-power state (such as sleeping). Network connections will\
    \ have been closed by any servers you were talking to (so you should close them\
