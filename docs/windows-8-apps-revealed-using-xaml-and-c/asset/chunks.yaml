    \                    throw new Exception(\"无法创建初始页面\");\n                }\n \
    \           }\n            Window.Current.Activate();\n            StartLocationTracking(rootFrame);\n\
    \        }\n\nprotected override void OnSearchActivated(SearchActivatedEventArgs\
    \ args) {\n            viewModel.SearchAndSelect(args.QueryText);\n        }\n\
    \nprivate void OnResuming(object sender, object e) {\n            // ...为简洁起见，省略语句...\n\
    \        }\n\nprivate void OnSuspending(object sender, SuspendingEventArgs e)\
    \ {\n            // ...为简洁起见，省略语句...\n        }\n\nprivate void StartLocationTracking(Frame\
    \ frame) {\n            // ...为简洁起见，省略语句...\n        }\n\nprivate void StopLocationTracking()\
    \ {\n            locationTokenSource.Cancel();\n        }\n    }\n}\n```\n\n这便满足了搜索协定的全部要求；通过重写\
    \ `OnSearchActivated` 方法，我使 Windows 能够代表用户搜索我的应用。\n\n### 测试搜索协定\n\n要测试该协定，请启动示例应用。无论是否使用调试器启动都可以。调出超级按钮栏并选择搜索图标。示例应用将自动被选为搜索目标。要开始搜索，只需开始输入。\n\
    \n当您点击文本框右侧的搜索按钮时，Windows 将调用搜索协定并将查询字符串传递给示例应用。您需要搜索能够匹配的内容，因此请输入 `hot`（这样您的搜索将匹配购物清单中的热狗项目）并点击按钮。您将看到类似图\
    \ 5-6 的内容。\n\n![9781430250340_Fig05-06.jpg](img/9781430250340_Fig05-06.jpg)\n\n\
    图 5-6。使用协定搜索应用\n\n我确实很喜欢这种协定方式。这是一个非常简单的搜索协定实现，但您可以看到仅用几行代码就能如此轻松地集成到 Windows\
    \ 中。您可以在我所做的基础上更进一步，完全自定义应用处理和响应搜索的方式。\n\n## 总结\n\n在本章中，我向您展示了如何使用生命周期事件来响应 Windows\
    \ 管理应用的方式。我描述了关键事件，并向您展示了如何响应这些事件，以确保您的应用能够正确接收和处理它们。\n\n当应用被挂起时，必须特别注意干净利落地结束后台任务，我向您展示了如何通过请求挂起推迟来控制此过程，从而争取额外的几秒钟时间，以最大程度地降低应用恢复时出现潜在错误或陈旧数据的风险。\n\
    \n最后，我向您展示了生命周期事件如何使您能够履行将应用绑定到更广泛的 Windows 平台的协定，以及满足这些协定指定的要求是多么容易。我向您展示了搜索协定，但还有其他几个协定，我建议您花时间全面探索它们。您实现的协定越多，您的应用与\
    \ Windows 的其他部分以及其他集成应用的集成度就越高。\n\n在这本书中，我旨在向您展示能够加速您应用开发的核心系统功能。我向您展示了如何使用数据绑定、如何使用主要的结构控件、如何处理贴靠和填充布局、如何自定义应用磁贴，以及在本章中，如何控制应用生命周期。以这些技能为基础，您将能够创建丰富且富有表现力的应用，并在\
    \ Windows 8 开发中抢占先机。祝您在应用开发项目中取得圆满成功。\n\n## 索引\n\n![images](img/square1.jpg) A\n\
