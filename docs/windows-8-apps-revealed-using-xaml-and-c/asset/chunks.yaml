                <TextBlock Style = "{StaticResource HeaderTextStyle}" Margin = "10"

                           Text = "购物清单"/>

                <ListView x:Name = "groceryList" Grid.RowSpan = "2"

                    ItemsSource = "{Binding GroceryList}"

                    ItemTemplate = "{StaticResource GroceryListItemTemplate}"

                    SelectionChanged = "ListSelectionChanged" />

            </StackPanel>

            <StackPanel Orientation = "Vertical" Grid.Column = "1">

                <TextBlock Style = "{StaticResource HeaderTextStyle}" Margin = "10"

                           Text = "商品详情"/>

            </StackPanel>

            <StackPanel Orientation = "Vertical" Grid.Column = "1" Grid.Row = "1">

                <TextBlock Style = "{StaticResource HeaderTextStyle}" Margin = "10"

                           Text = "店铺详情"/>

            </StackPanel>

        </Grid>

    </Page>

    ```


    可以看到，我将 `Grid` 控件的 `Background` 属性设置为了资源字典中指定的颜色。此外，我还配置了 Visual Studio 定义的 `Grid`
    控件，并使用 `Grid.RowDefinitions` 和 `Grid.ColumnDefinitions` 元素将其划分为两个等宽的列，每列各有两行等高。


    对于布局的左侧，我添加了一个 `StackPanel`，并将其配置为跨两行并填充布局的左半部分：


    ```

    ...

    <StackPanel Grid.RowSpan = "2" >

    ...

    ```


    此 `StackPanel` 包含一个用于显示标题的 `TextBlock`，以及一个稍后我将详细说明的 `ListView`。对于屏幕的右侧，我添加了两个
    `StackPanel`，每行一个。我通过 `Grid.Row` 和 `Grid.Column` 属性指定了每个控件所属的行和列。这些属性使用从零开始的索引，而未设置这些属性的控件则默认放在第一行第一列。在图
    2-1 中，你可以看到该布局在 Visual Studio 设计图面上的显示效果。


    ![9781430250340_Fig02-01.jpg](img/9781430250340_Fig02-01.jpg)


    **图 2-1.** 显示在 Visual Studio 设计图面上的 XAML 布局静态部分


    设计图面无法显示动态生成的内容，这就是图中看不到视图模型数据的原因。动态内容将在 `ListView` 控件中显示。顾名思义，`ListView` 以列表形式显示一组项。有三个
    XAML 属性规定了具体实现方式：


    ```

    ...

    <ListView x:Name = "groceryList" Grid.RowSpan = "2"

        ItemsSource = "{Binding GroceryList}"

        ItemTemplate = "{StaticResource GroceryListItemTemplate}"

        SelectionChanged = "ListSelectionChanged"/>

    ...

    ```


    我使用这些属性来弥合宏观层面的 `DataContext` 属性与模板中微观层面的属性之间的差距。`ItemSource` 属性告知 `ListView`
    控件应从何处获取其必须显示的项集。值为 `GroceryList` 的 `Binding` 关键字告知 `ListView`，它应显示我在代码隐藏文件中设置的
    `DataContext` 对象的 `GroceryList` 属性的内容。

    '
- fmt: '`ItemTemplate`属性告诉`ListView`如何显示`ItemSource`中的每个项目。关键字`StaticResource`和值`GroceryListItemTemplate`意味着将使用我在资源字典中指定的数据模板，这会为`ViewModel.GroceryList`集合中的每个项目生成一个包含三个`TextBlock`元素的新`StackPanel`。


    最后一个属性与我在代码隐藏文件中定义的事件处理方法相关联，该方法处理`ListView`控件发出的`SelectionChanged`事件。


    ![image](images/sq.jpg) **提示** 你可以通过Visual Studio属性窗口或查阅Microsoft API文档来获取控件定义的事件列表。创建具有正确参数的处理方法的最简单方法是让XAML编辑器在自动完成过程中为你创建它们。


    ## 运行应用程序


    Visual Studio设计图面只能显示布局中静态的部分。查看动态内容的唯一方法是运行应用程序。因此，要想看到XAML和C#如何协同工作，请从Visual
    Studio的调试菜单中选择“开始调试”。Visual Studio将生成项目并将应用程序推送到模拟器。你可以在[图2-2](#9781430250340_Ch02.xhtml#Fig2)中看到结果。


    ![9781430250340_Fig02-02.jpg](images/9781430250340_Fig02-02.jpg)


    [图2-2](#9781430250340_Ch02.xhtml#_Fig2). 在模拟器中运行示例应用程序


    你可以看到数据绑定如何将视图模型中的项目添加到`ListView`控件，以及我如何在资源字典中定义的模板被用来格式化它们。


    Windows应用UI控件有很多内置行为。例如，当鼠标移动到项目上时，项目会以较浅的阴影显示（你可以在[图2-2](#9781430250340_Ch02.xhtml#Fig2)中看到），当用户单击选择项目时，则会以不同的阴影显示。控件使用的所有样式都可以更改，但为简单起见，我将坚持使用默认设置。


    ## 将其他页面插入布局


    你不必将所有控件和代码放在一个XAML文件及其代码隐藏文件中。为了使项目更易于管理，你可以创建多个页面并将它们整合到你的应用程序中。作为简单的演示，我在`Pages`项目文件夹中创建了一个名为`NoItemSelected.xaml`的新`Blank
    Page`。[清单2-8](#9781430250340_Ch02.xhtml#list8)显示了此文件的内容，我对默认内容的添加部分以粗体显示。


    ![image](images/sq.jpg) **提示** 在Visual Studio允许你向项目添加新项之前，你必须先停止调试器。


    ***[清单2-8](#9781430250340_Ch02.xhtml#_list8).** `NoItemSelected.xaml`文件*


    ```

    <Page

        x:Class = "GrocerApp.Pages.NoItemSelected"

        xmlns = "http://schemas.microsoft.com/winfx/2006/xaml/presentation"

        xmlns:x = "http://schemas.microsoft.com/winfx/2006/xaml"

        xmlns:local = "using:GrocerApp.Pages"

        xmlns:d = "http://schemas.microsoft.com/expression/blend/2008"

        xmlns:mc = "http://schemas.openxmlformats.org/markup-compatibility/2006"

        mc:Ignorable = "d">

        <Grid Background = "{StaticResourceAppBackgroundColor}">

            <TextBlock Style = "{StaticResource HeaderTextStyle}"

                       FontSize = "30" Text = "No Item Selected"/>

        </Grid>

    </Page>

    ```


    这是一个非常简单的页面，简单到你通常不需要创建这样的页面，因为它只显示一些静态文本。但它有助于演示一个重要的应用程序功能，使我能够将应用程序分解为可管理的部分。将页面添加到我的主应用程序布局的关键是`Frame`控件，我已将其添加到`ListPage.xaml`布局中，如[清单2-9](#9781430250340_Ch02.xhtml#list9)所示。


    ***[清单2-9](#9781430250340_Ch02.xhtml#_list9).** 向应用程序布局添加`Frame`控件*


    ```

    <Page

        x:Class = "GrocerApp.Pages.ListPage"

        xmlns = "http://schemas.microsoft.com/winfx/2006/xaml/presentation"

        xmlns:x = "http://schemas.microsoft.com/winfx/2006/xaml"

        xmlns:local = "using:GrocerApp.Pages"

        xmlns:d = "http://schemas.microsoft.com/expression/blend/2008"

        xmlns:mc = "http://schemas.openxmlformats.org/markup-compatibility/2006"

        mc:Ignorable = "d">

        <Grid Background = "{StaticResource AppBackgroundColor}">

            <Grid.RowDefinitions>

                <RowDefinition/>

                <RowDefinition/>

            </Grid.RowDefinitions>

            <Grid.ColumnDefinitions>

                <ColumnDefinition/>

                <ColumnDefinition/>

            </Grid.ColumnDefinitions>

            <StackPanel Grid.RowSpan = "2">

                <TextBlock Style = "{StaticResource HeaderTextStyle}" Margin = "10"

                           Text = "Grocery List"/>

                <ListView x:Name = "groceryList" Grid.RowSpan = "2"

                    ItemsSource = "{Binding GroceryList}"

                    ItemTemplate = "{StaticResource GroceryListItemTemplate}"

                    SelectionChanged = "ListSelectionChanged" />

            </StackPanel>

            <StackPanel Orientation = "Vertical" Grid.Column = "1">

                <TextBlock Style = "{StaticResource HeaderTextStyle}" Margin = "10"

                           Text = "Item Detail"/>

                <Frame x:Name = "ItemDetailFrame"/>

            </StackPanel>

            <StackPanel Orientation = "Vertical" Grid.Column = "1" Grid.Row = "1">

                <TextBlock Style = "{StaticResource HeaderTextStyle}" Margin = "10"

                           Text = "Store Detail"/>

            </StackPanel>

        </Grid>

    </Page>

    ```


    `Frame`是`Page`的占位符，我在`ListPage.xaml.cs`代码隐藏文件中使用`Navigate`方法告诉`Frame`我希望它显示哪个页面，如[清单2-10](#9781430250340_Ch02.xhtml#list10)所示。


    ***[清单2-10](#9781430250340_Ch02.xhtml#_list10).** 在`ListPage.xaml.cs`文件中指定`Frame`显示的页面*


    ```

    using GrocerApp.Data;

    using Windows.UI.Xaml.Controls;

    using Windows.UI.Xaml.Navigation;

    namespace GrocerApp.Pages {

        public sealed partial class ListPage : Page {

            ViewModel viewModel;

            public ListPage() {

                viewModel = new ViewModel();

                // ... test data removed for brevity

                this.InitializeComponent();

                this.DataContext = viewModel;

                ItemDetailFrame.Navigate(typeof(NoItemSelected));

            }

            protected override void OnNavigatedTo(NavigationEventArgs e) {

            }

            private void ListSelectionChanged(object sender,             SelectionChangedEventArgs
    e) {

                viewModel.SelectedItemIndex = groceryList.SelectedIndex;

            }

        }

    }

    ```


    `Navigate`方法的参数是一个`System.Type`，表示你想要加载的`Page`类，获取`System.Type`最简单的方法是使用`typeof`关键字。`Navigate`方法实例化`Page`对象（请记住，XAML和代码隐藏文件被组合起来以创建`Page`的单个子类），结果被插入到布局中，如[图2-3](#9781430250340_Ch02.xhtml#Fig3)所示。


    ![9781430250340_Fig02-03.jpg](images/9781430250340_Fig02-03.jpg)


    [图2-3](#9781430250340_Ch02.xhtml#_Fig3). 将另一个页面插入布局


    ## 动态地将页面插入布局


    你还可以使用`Frame`根据应用程序的状态动态地将不同的页面插入布局。为了演示这一点，我在`Pages`文件夹中创建了一个名为`ItemDetail.xaml`的新`Blank
    Page`，其内容如[清单2-11](#9781430250340_Ch02.xhtml#list11)所示。（此文件依赖于我自定义字典中的样式；你可以在本章的源代码下载中查看我是如何定义它们的。）


