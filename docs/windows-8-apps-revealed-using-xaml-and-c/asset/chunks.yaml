    Summary


    In this chapter, I showed you how to create a view model in a Windows app and
    make it observable so that you can use data binding to keep the layout of your
    app synchronized with the view model data. This is an essential technique for
    creating robust and easily maintained apps. I also showed you how you can break
    down your app into manageable chunks by creating pages and how you can use a `Frame`
    to display those pages as part of your main layout. In the next chapter, I’ll
    show you how to create some of the most important controls for a Windows app:
    the AppBar, the NavBar, and flyouts.


    CHAPTER 3


    ![image](images/frontdot.jpg)


    AppBars, Flyouts, and Navigation


    In this chapter, I show you how to create and use some of the user interactions
    that are essential parts of the Windows app user experience. The Application Bar
    (AppBar) and Navigation Bar (NavBar) provide the means by which the user can interact
    with your content and features and navigate within your app. I also show you how
    to create flyouts, which are pop-ups used to capture information from the user,
    usually in response to an interaction with the AppBar. [Table 3-1](#9781430250340_Ch03.xhtml#Tab00031)
    provides the summary for this chapter.


    [Table 3-1.](#9781430250340_Ch03.xhtml#_Tab00031) Chapter Summary


    | Problem | Solution | Listing |

    | --- | --- | --- |

    | Add an AppBar. | Declare an `AppBar` control within the XAML `Page.BottomAppBar`
    property. | 1 |

    | Add buttons to an AppBar. | Use `Button` controls, formatted either with predefined
    or with custom styles. | 2–5 |

    | Add a flyout. | Declare a `Popup` control with the `IsLightDismissEnabled` property
    set to `True`. | 6, 8 |

    | Display a flyout. | Position the `Popup` relative to the AppBar `Button` that
    caused it to be displayed. | 9–11 |

    | Easily obtain access to the view model for a flyout. | Use the `DataContext`
    property. | 12–15 |

    | Add a NavBar. | Create a wrapper `Page` that declares an `AppBar` element within
    the XAML `Page.TopAppBar` property. | 16, 18 |

    | Navigate within an App. | Add a `Frame` control to the wrapper `Page` and use
    the `Navigate` method to show other `Page` controls when the NavBar buttons are
    clicked. | 19 |


    Adding an AppBar


    The *AppBar* appears at the bottom of the screen when the user makes an upward-swiping
    gesture or right-clicks with the mouse. The emphasis in the Windows 8 app UI is
    to have few extraneous controls in the main layout and to rely on the AppBar as
    the mechanism for any interaction that is not about the immediately available
    functionality but that *does* pertain to the currently displayed layout. In this
    section, I’ll show you how to define and populate an AppBar.


    ![image](images/sq.jpg) **Tip**   There is a similar control at the top of the
    screen, called the Navigation Bar (NavBar), which is used to navigate between
    different parts of an app. I show you how to create and use the NavBar later in
    this chapter.


    Declaring the AppBar


    The simplest way to create an AppBar is to declare it in your XAML file. [Listing
    3-1](#9781430250340_Ch03.xhtml#list1) shows the additions to the `ListPage.xaml`
    file from the example project.


