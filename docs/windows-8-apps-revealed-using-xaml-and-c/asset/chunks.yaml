- fmt: "Set the name of the project to `GrocerApp`, and click the OK button to create\
    \ the project. Visual Studio will create and populate the project with some initial\
    \ files.\n\n![image](images/sq.jpg) **Tip** Visual Studio includes some basic\
    \ templates for C# Windows apps. I don’t like them, and I think they strike an\
    \ odd balance between XAML and C# code. For this reason, I will be working with\
    \ the Blank App template, which creates a project with the bare essentials for\
    \ app development.\n\n[Figure 1-3](#9781430250340_Ch01.xhtml#Fig3) shows the contents\
    \ of the new project as displayed by the Visual Studio Solution Explorer. In the\
    \ sections that follow, I’ll describe the most important files in the project.\n\
    \n![9781430250340_Fig01-03.jpg](images/9781430250340_Fig01-03.jpg)\n\n[Figure\
    \ 1-3](#9781430250340_Ch01.xhtml#_Fig3). The contents of a Visual Studio project\
    \ created using the Blank App template\n\n![image](images/sq.jpg) **Tip** Don’t\
    \ worry if the purpose or content of these files isn’t immediately obvious. I’ll\
    \ explain everything you need to know as I build the example app. At this stage,\
    \ I just want you to get a feel for how a Visual Studio app project fits together\
    \ and what the important files are.\n\nWindows apps use a slimmed-down version\
    \ of the .NET Framework library. You can see which namespaces are available by\
    \ double-clicking the `.Net for Windows Store apps` item in the `References` section\
    \ of the Solution Explorer.\n\n## Exploring the App.xaml File\n\nThe `App.xaml`\
    \ file and its code-behind file, `App.xaml.cs`, are used to start the Windows\
    \ app. The main use for the XAML file is to associate `StandardStyles.xaml` from\
    \ the `Common` folder with the app, as shown in [Listing 1-2](#9781430250340_Ch01.xhtml#list2).\n\
    \n[***Listing 1-2.***](#9781430250340_Ch01.xhtml#_list2) The App.xaml File\n\n\
    ```xml\n<Application\n    x:Class=\"GrocerApp.App\"\n    xmlns=\"http://schemas.microsoft.com/winfx/2006/xaml/presentation\"\
    \n    xmlns:x=\" http://schemas.microsoft.com/winfx/2006/xaml\"\n    xmlns:local=\"\
    using:GrocerApp\">\n\n<Application.Resources>\n        <ResourceDictionary>\n\
    \            <ResourceDictionary.MergedDictionaries>\n\n<!--\n               \
    \     Styles that define common aspects of the platform look\n               \
    \         and feel\n                    Required by Visual Studio project and\
    \ item templates\n                 -->\n                <ResourceDictionary Source=\"\
    Common/StandardStyles.xaml\"/>\n            </ResourceDictionary.MergedDictionaries>\n\
    \n</ResourceDictionary>\n    </Application.Resources>\n</Application>\n```\n\n\
    I’ll discuss the `StandardStyles.xaml` file shortly, and, later in this chapter,\
    \ I’ll update `App.xaml` to reference my own resource dictionary. The code-behind\
    \ file is much more interesting and is shown in [Listing 1-3](#9781430250340_Ch01.xhtml#list3).\
    \ (For brevity, I have removed some of the comments that Visual Studio adds to\
    \ this file.)\n\n[***Listing 1-3.***](#9781430250340_Ch01.xhtml#_list3) The App.xaml.cs\
    \ File\n\n```csharp\nusing System;\nusing System.Collections.Generic;\nusing System.IO;\n\
    using System.Linq;\nusing Windows.ApplicationModel;\nusing Windows.ApplicationModel.Activation;\n\
    using Windows.Foundation;\nusing Windows.Foundation.Collections;\nusing Windows.UI.Xaml;\n\
    using Windows.UI.Xaml.Controls;\nusing Windows.UI.Xaml.Controls.Primitives;\n\
    using Windows.UI.Xaml.Data;\nusing Windows.UI.Xaml.Input;\nusing Windows.UI.Xaml.Media;\n\
    using Windows.UI.Xaml.Navigation;\n\nnamespace GrocerApp {\n\nsealed partial class\
    \ App : Application {\n\npublic App() {\n            this.InitializeComponent();\n\
    \            this.Suspending += OnSuspending;\n        }\n\nprotected override\
    \ void OnLaunched(LaunchActivatedEventArgs args) {\n            Frame rootFrame\
    \ = Window.Current.Content as Frame;\n\nif (rootFrame == null) {\n           \
    \     // Create a Frame to act as the navigation context\n                // and\
    \ navigate to the first page\n                rootFrame = new Frame();\n     \
    \           if (args.PreviousExecutionState ==\n                    ApplicationExecutionState.Terminated)\n\
    {\n                    //TODO: Load state from previously suspended application\n\
    \                }\n\n// Place the frame in the current Window\n             \
    \   Window.Current.Content = rootFrame;\n            }\n\nif (rootFrame.Content\
    \ == null) {\n\nif (!rootFrame.Navigate(typeof(MainPage), args.Arguments)) {\n\
    \                    throw new Exception(\"Failed to create initial page\");\n\
    \                }\n            }\n            // Ensure the current window is\
    \ active\n            Window.Current.Activate();\n        }\n\nprivate void OnSuspending(object\
    \ sender, SuspendingEventArgs e) {\n            var deferral = e.SuspendingOperation.GetDeferral();\n\
    \            //TODO: Save application state and stop any background activity\n\
    \            deferral.Complete();\n        }\n    }\n}\n```\n\nWindows apps have\
    \ a very specific life-cycle model, which is expressed through the `App.xaml.cs`\
    \ file. It is essential to understand and embrace this model, which I explain\
    \ in [Chapter 5](#9781430250340_Ch05.xhtml). For the moment, you need to know\
    \ only that the `OnLaunched` method is called when the app is started and that\
    \ a new instance of the `MainPage` class is loaded and used as the main interface\
    \ for the app.\n\n![image](images/sq.jpg) **Tip** For brevity, I have removed\
    \ most of the comments from these files and removed the namespace references that\
    \ are not used by the code in the class.\n\n## Exploring the MainPage.xaml File\n\
    \nPages are the basic building blocks for a Windows app. When you create a project\
    \ using the Blank App template, Visual Studio creates a blank page, which it names\
    \ `MainPage.xaml`. [Listing 1-4](#9781430250340_Ch01.xhtml#list4) shows the content\
    \ of the `MainPage.xaml` file, which contains just enough XAML to display . .\
    \ . well, a blank page.\n\n[***Listing 1-4.***](#9781430250340_Ch01.xhtml#_list4)\
    \ The Contents of the MainPage.xaml File\n\n```xml\n<Page\n    x:Class=\"GrocerApp.MainPage\"\
    \n    xmlns=\" http://schemas.microsoft.com/winfx/2006/xaml/presentation  \"\n\
    \    xmlns:x=\" http://schemas.microsoft.com/winfx/2006/xaml  \"\n    xmlns:local=\"\
    using:GrocerApp\"\n    xmlns:d=\" http://schemas.microsoft.com/expression/blend/2008\
    \  \"\n    xmlns:mc=\" http://schemas.openxmlformats.org/markup-compatibility/2006\
    \  \"\n    mc:Ignorable=\"d\">\n\n<Grid Background=\"{StaticResource ApplicationPageBackgroundThemeBrush}\"\
    >\n\n</Grid>\n</Page>\n```\n\nIf you have used XAML before, you will recognize\
    \ the `Grid` control. Windows app UI controls work in generally the same way as\
    \ those from WPF or Silverlight, but there are fewer of them, and some of the\
    \ advanced layout and data binding features are not available. I’ll create a more\
    \ useful `Page` layout in [Chapter 2](#9781430250340_Ch02.xhtml) when I start\
    \ to build the example project. The code-behind file for `MainPage.xaml` will\
    \ also be familiar if you have XAML experience, as shown in [Listing 1-5](#9781430250340_Ch01.xhtml#list5).\n\
    \n![image](images/sq.jpg) **Tip** Don’t worry about the XAML and code-behind files\
    \ for the moment; I provide a quick overview later in this chapter.\n\n[***Listing\
    \ 1-5.***](#9781430250340_Ch01.xhtml#_list5) The Contents of the MainPage.xaml.cs\
    \ File\n\n```csharp\nusing System;\nusing System.Collections.Generic;\nusing System.IO;\n\
    using System.Linq;\nusing Windows.Foundation;\nusing Windows.Foundation.Collections;\n\
    using Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\nusing Windows.UI.Xaml.Controls.Primitives;\n\
    using Windows.UI.Xaml.Data;\nusing Windows.UI.Xaml.Input;\nusing Windows.UI.Xaml.Media;\n\
    using Windows.UI.Xaml.Navigation;\n\nnamespace GrocerApp {\n    public sealed\
    \ partial class MainPage : Page {\n        public MainPage() {\n            this.InitializeComponent();\n\
    \        }\n\nprotected override void OnNavigatedTo(NavigationEventArgs e) {\n\
    \        }\n    }\n}\n```"
