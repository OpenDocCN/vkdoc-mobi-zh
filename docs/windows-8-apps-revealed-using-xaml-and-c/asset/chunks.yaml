    \n## 添加后台活动\n\n既然我已确认我的应用能够接收并响应 `Resuming` 和 `Suspending` 事件，我可以添加一些需要定期后台任务的功能。在本例中，我将使用地理定位服务来报告当前设备位置。首先，我在\
    \ `Data` 项目文件夹中创建了一个名为 `Location.cs` 的新类文件。该文件的内容如清单 5-3 所示。\n\n**清单 5-3.** `Location.cs`\
    \ 文件\n\n```\nusing System;\nusing System.Net.Http;\nusing System.Threading.Tasks;\n\
    using Windows.Data.Json;\nusing Windows.Devices.Geolocation;\n\nnamespace GrocerApp.Data\
    \ {\n    class Location {\n\n        public static async Task<string> TrackLocation()\
    \ {\n            Geolocator geoloc = new Geolocator();\n            Geoposition\
    \ position = await geoloc.GetGeopositionAsync();\n\n            HttpClient httpClient\
    \ = new HttpClient();\n            httpClient.BaseAddress = new Uri(\"http://nominatim.openstreetmap.org\"\
    );\n            HttpResponseMessage httpResult = await httpClient.GetAsync(\n\
    \                String.Format(\"reverse?format=json&lat={0}&lon={1}\",\n    \
    \            position.Coordinate.Latitude, position.Coordinate.Longitude));\n\n\
    \            JsonObject jsonObject = JsonObject\n                .Parse(await\
    \ httpResult.Content.ReadAsStringAsync());\n\n            return jsonObject.GetNamedObject(\"\
    address\")\n                .GetNamedString(\"road\") + DateTime.Now.ToString(\"\
    ' ('HH:mm:ss')'\");\n        }\n    }\n}\n```\n\n此类使用 Windows 8 的地理定位功能来获取设备位置。此功能通过\
    \ `Windows.Devices.Geolocation` 命名空间中的 `Geolocator` 类公开，`GetGeopositionAsync`\
    \ 方法获取位置的单个快照（而非通过事件提供位置更新，这是 `Geolocator` 类支持的另一种方法）。\n\n> **注意** 新的 C# `await`\
    \ 关键字表明我已进入并行/异步编程领域。这是一个高级示例，使用任务并行库 (TPL) 来创建和管理后台任务。我不会在这本小书中深入介绍 TPL 和 .NET\
    \ 并行编程的细节。如果您想了解更详细信息，我建议您参考我的 *Pro .NET 4 Parallel Programming in C#* 一书，其中提供了完整的详细信息。`await`\
    \ 关键字是 C# 4.5 的新增功能，意思是“等待此异步任务完成。”\n\n一旦获取了设备位置，我会向反向地理编码服务发出 HTTP 请求，这使我能够将地理定位服务中的纬度和经度信息转换为街道地址。地理编码服务返回一个\
    \ JSON 字符串，我将其解析为 C# 对象，以便读取街道信息。`TrackLocation` 方法的结果是一个字符串，其中列出了设备所在街道的名称以及指示位置更新时间的时间戳。\n\
    \n> **提示** 我使用了 `OpenStreetMap` 地理编码服务，因为它不需要唯一的帐户令牌。这意味着您无需创建 Google Maps 或 Bing\
