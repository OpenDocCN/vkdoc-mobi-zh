    \ the latitude and longitude information from the geolocation service into a street\
    \ address. The geocoding service returns a JSON string, which I parse into a C#\
    \ object so that I read the street information. The result from the `TrackLocation`\
    \ method is a string listing the name of the street the device is on and a timestamp\
