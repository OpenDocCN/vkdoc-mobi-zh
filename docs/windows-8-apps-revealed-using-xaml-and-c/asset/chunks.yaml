    剩下的工作就是挂接浮出控件，以便用户在点击`AppBar`按钮时显示它。[清单 3-11](#9781430250340_Ch03.xhtml#list11)
    展示了为`ListPage.xaml.cs`文件添加的代码，以实现此功能。


    ***[清单 3-11](#9781430250340_Ch03.xhtml#_list11)。** 响应 `AppBar` 按钮点击事件显示浮出控件*


    ```

    ...

    private void AppBarButtonClick(object sender, RoutedEventArgs e) {

        if (e.OriginalSource == AppBarDoneButton

                && viewModel.SelectedItemIndex > -1) {


    viewModel.GroceryList.RemoveAt(viewModel.SelectedItemIndex);

            viewModel.SelectedItemIndex = -1;


    } else if (e.OriginalSource == AppBarZipButton) {

            HomeZipFlyout.Show(this, this.BottomAppBar, (Button)e.OriginalSource);

        }

    }

    ...

    ```


    我调用了在用户控件中定义的`Show`方法，并传入需要正确定位`Popup`的控件集合。您可以在[图 3-2](#9781430250340_Ch03.xhtml#Fig00032)
    中看到结果。


    ![9781430250340_Fig03-02.jpg](images/9781430250340_Fig03-02.jpg)


    [图 3-2](#9781430250340_Ch03.xhtml#_Fig00032)。在相关的 `AppBar` 按钮旁边显示一个浮出控件


    **创建更复杂的浮出控件**


    现在我已经演示了基础知识，可以构建一个允许用户向购物清单添加新项目的浮出控件了。此浮出控件的不同之处在于，它不能依赖双向绑定技巧来处理视图模型。这并非特别复杂的技术；我只是想向您展示这两种方法，以便您可以根据项目需求选择合适的一种。我向您展示的浮出控件示例越多，您在创建自己的浮出控件时就会感到越轻松。


    首先，我使用`UserControl`模板在`Flyouts`项目文件夹中创建了`AddItemFlyout.xaml`文件。然后，我遵循相同的基本方法，在`Popup`中布局内容，如[清单
    3-12](#9781430250340_Ch03.xhtml#list12) 所示。


    ***[清单 3-12](#9781430250340_Ch03.xhtml#_list12)。** 添加项目浮出控件的 XAML*


    ```

    <UserControl

        x:Class="GrocerApp.Flyouts.AddItemFlyout"

        xmlns=" http://schemas.microsoft.com/winfx/2006/xaml/presentation "

        xmlns:x=" http://schemas.microsoft.com/winfx/2006/xaml "

        xmlns:local="using:GrocerApp.Flyouts"

        xmlns:d=" http://schemas.microsoft.com/expression/blend/2008 "

        xmlns:mc=" http://schemas.openxmlformats.org/markup-compatibility/2006 "

        mc:Ignorable="d"

        d:DesignHeight="300"

        d:DesignWidth="400">


    <Popup x:Name="AddItemPopup" IsLightDismissEnabled="True" Width="435" Height="265"
    >

            <StackPanel Background="Black">

                <Border Background="#85C54C" BorderThickness="4">

                    <Grid Margin="10">

                        <Grid.RowDefinitions>

                            <RowDefinition/>

                            <RowDefinition/>

                            <RowDefinition/>

                            <RowDefinition/>

                        </Grid.RowDefinitions>

                        <Grid.ColumnDefinitions>

                            <ColumnDefinition Width="Auto"/>

                            <ColumnDefinition Width="300"/>

                        </Grid.ColumnDefinitions>


    <TextBlock Text="Name:" Style="{StaticResource AddItemText}"  />

                        <TextBlock Text="Quantity:" Grid.Row="1"

                                   Style="{StaticResource AddItemText}" />

                        <TextBlock Text="Store:" Grid.Row="2"

                                   Style="{StaticResource AddItemText}" />


    <TextBox x:Name="ItemName" Grid.Column="1"

                                 Style="{StaticResource AddItemTextBox}" />

                        <TextBox x:Name="ItemQuantity" Grid.Row="1" Grid.

                                 Column="1"

                                 Style="{StaticResource AddItemTextBox}" />

                        <ComboBox x:Name="ItemStore" Grid.Column="1" Grid.

                                 Row="2"

                                  Style="{StaticResource AddItemStore}"

                                  ItemsSource="{Binding StoreList}"

                                  DisplayMemberPath="" />

                        <StackPanel Orientation="Horizontal" Grid.Row="3"

                                    HorizontalAlignment="Center"

                                    Grid.ColumnSpan="2">

                            <Button Click="AddButtonClick">Add Item</Button>

                        </StackPanel>

                    </Grid>

                </Border>

            </StackPanel>

        </Popup>

    </UserControl>

    ```


    `Popup`的布局与我在[第 2 章](#9781430250340_Ch02.xhtml)中创建的`ItemDetail`页面的布局非常相似。可以将`Frame`控件（以及`Page`）嵌入到浮出控件的`Popup`中，但调整样式和修改代码隐藏行为所需的工作量，往往使得简单地复制元素更具吸引力。对于简单的项目，我很乐意这样做，尽管我隐约觉得将来某个时候会重新审视这个项目，以消除重复并正确地实现它。


    **编写代码**


    我希望您关注此浮出控件的代码部分，如[清单 3-13](#9781430250340_Ch03.xhtml#list13) 所示。


    ***[清单 3-13](#9781430250340_Ch03.xhtml#_list13)。** `AddItemFlyout.xaml.cs` 文件*


    ```

    using System;

    using GrocerApp.Data;

    using Windows.UI.Xaml;

    using Windows.UI.Xaml.Controls;


    namespace GrocerApp.Flyouts {

        public sealed partial class AddItemFlyout : UserControl {


    public AddItemFlyout() {

                this.InitializeComponent();

            }


    public void Show(Page page, AppBar appbar, Button button) {

                AddItemPopup.IsOpen = true;

                FlyoutHelper.ShowRelativeToAppBar(AddItemPopup, page, appbar, button);

            }


    private void AddButtonClick(object sender, RoutedEventArgs e) {


    ((ViewModel)DataContext) .GroceryList.Add(new GroceryItem {

                    Name = ItemName.Text,

                    Quantity = Int32.Parse(ItemQuantity.Text),

                    Store = ItemStore.SelectedItem.ToString()

                });


    AddItemPopup.IsOpen = false;

            }

        }

    }

    ```


    我需要获取视图模型对象，以便向其中添加新项目。有几种方法可以实现，但最简单的方法是读取`DataContext`属性的值，如清单所示。需要特别注意，因为我假定此属性的值将是我的`ViewModel`对象，该对象是在`ListPage`类（在`ListPage.xaml.cs`文件中）的构造函数中设置的。正如我之前提到的，`DataContext`属性是继承的，这意味着为`Page`对象设置的对象可以从我的`UserControl`中检索到，但前提是布局层次结构中的中间控件没有被分配另一个对象到其`DataContext`属性。


    一旦我有了`ViewModel`对象，向`GroceryList`集合添加一个新的`GroceryItem`就是一个简单的操作。由于该集合是可观察的，添加操作将自动反映在应用的其他部分。


    **向应用添加浮出控件**


    剩下的工作就是按照与前一个浮出控件相同的模式，将新的浮出控件添加到`ListPage`布局和代码中。[清单 3-14](#9781430250340_Ch03.xhtml#list14)
    展示了浮出控件的 XAML 声明。


    ***[清单 3-14](#9781430250340_Ch03.xhtml#_list14)。** 在 XAML 中声明添加项目浮出控件*


    ```

    ...

    <flyouts:HomeZipCodeFlyout x:Name="HomeZipFlyout"/>

    <flyouts:AddItemFlyout x:Name="AddItemFlyout"/>

    ...

    ```'
  raw: 'Notice that the declaration for the flyout goes *inside* the `Grid`; even
    though it is not immediately displayed, the flyout user control must be declared
    as part of the main app layout, and `Page` controls can have only regular child
    elements (which is why the `AppBar` control has to be declared inside the `Page.BottomAppBar`
    property).


    Showing the Flyout


    All that remains is to hook up my flyout so it is displayed when the user clicks
    the AppBar button. [Listing 3-11](#9781430250340_Ch03.xhtml#list11) shows the
    addition to the `ListPage.xaml.cs` file that makes this happen.


    ***[Listing 3-11](#9781430250340_Ch03.xhtml#_list11).** Showing the Flyout in
    Response to the AppBar Button Being Clicked*


    ```

    ...

    private void AppBarButtonClick(object sender, RoutedEventArgs e) {

        if (e.OriginalSource == AppBarDoneButton

                && viewModel.SelectedItemIndex > -1) {


    viewModel.GroceryList.RemoveAt(viewModel.SelectedItemIndex);

            viewModel.SelectedItemIndex = -1;


    } else if (e.OriginalSource == AppBarZipButton) {

            HomeZipFlyout.Show(this, this.BottomAppBar, (Button)e.OriginalSource);

        }

    }

    ...

    ```


    I call the `Show` method I defined in my user control, passing in the set of controls
    that I need to correctly position the `Popup`. You can see the result in [Figure
    3-2](#9781430250340_Ch03.xhtml#Fig00032).


    ![9781430250340_Fig03-02.jpg](images/9781430250340_Fig03-02.jpg)


    [Figure 3-2](#9781430250340_Ch03.xhtml#_Fig00032).  Displaying a flyout next to
    the AppBar button it relates to


    Creating a More Complex Flyout


    Now that I have demonstrated the basics, I can build a flyout that will allow
    the user to add new items to the grocery list. The difference in this flyout is
    that it won’t be able to rely on the two-way binding trick for dealing with the
    view model. This isn’t an especially complex technique; I just want to show you
    both approaches so you can pick the one that works for your projects. The more
    flyout examples I can show you, the easier you will find it when you come to create
    your own.


    To start, I used the `UserControl` template to create the `AddItemFlyout.xaml`
    file in the `Flyouts` project folder. I then followed the same basic approach
    of laying out my content in a `Popup`, as shown in [Listing 3-12](#9781430250340_Ch03.xhtml#list12).


    ***[Listing 3-12](#9781430250340_Ch03.xhtml#_list12).** The XAML for the AddItem
    Flyout*


    ```

    <UserControl

        x:Class="GrocerApp.Flyouts.AddItemFlyout"

        xmlns=" http://schemas.microsoft.com/winfx/2006/xaml/presentation "

        xmlns:x=" http://schemas.microsoft.com/winfx/2006/xaml "

        xmlns:local="using:GrocerApp.Flyouts"

        xmlns:d=" http://schemas.microsoft.com/expression/blend/2008 "

        xmlns:mc=" http://schemas.openxmlformats.org/markup-compatibility/2006 "

        mc:Ignorable="d"

        d:DesignHeight="300"

        d:DesignWidth="400">


    <Popup x:Name="AddItemPopup" IsLightDismissEnabled="True" Width="435" Height="265"
    >

            <StackPanel Background="Black">

                <Border Background="#85C54C" BorderThickness="4">

                    <Grid Margin="10">

                        <Grid.RowDefinitions>

                            <RowDefinition/>

                            <RowDefinition/>

                            <RowDefinition/>

                            <RowDefinition/>

                        </Grid.RowDefinitions>

                        <Grid.ColumnDefinitions>

                            <ColumnDefinition Width="Auto"/>

                            <ColumnDefinition Width="300"/>

                        </Grid.ColumnDefinitions>


    <TextBlock Text="Name:" Style="{StaticResource AddItemText}"  />

                        <TextBlock Text="Quantity:" Grid.Row="1"

                                   Style="{StaticResource AddItemText}" />

                        <TextBlock Text="Store:" Grid.Row="2"

                                   Style="{StaticResource AddItemText}" />


    <TextBox x:Name="ItemName" Grid.Column="1"

                                 Style="{StaticResource AddItemTextBox}" />

                        <TextBox x:Name="ItemQuantity" Grid.Row="1" Grid.

                                 Column="1"

                                 Style="{StaticResource AddItemTextBox}" />

                        <ComboBox x:Name="ItemStore" Grid.Column="1" Grid.

                                 Row="2"

                                  Style="{StaticResource AddItemStore}"

                                  ItemsSource="{Binding StoreList}"

                                  DisplayMemberPath="" />

                        <StackPanel Orientation="Horizontal" Grid.Row="3"

                                    HorizontalAlignment="Center"

                                    Grid.ColumnSpan="2">

                            <Button Click="AddButtonClick">Add Item</Button>

                        </StackPanel>

                    </Grid>

                </Border>

            </StackPanel>

        </Popup>

    </UserControl>

    ```


    The layout of the `Popup` is very similar to the layout of the `ItemDetail` page
    that I created in [Chapter 2](#9781430250340_Ch02.xhtml). It is possible to embed
    `Frame` controls (and therefore `Page`s) into `Popup`s for flyouts, but the effort
    required to adjust the styling and change the code-behind behavior often makes
    it more attractive to simply duplicate the elements. I am happy to do this for
    simple projects, even though I have a nagging feeling that I will be revisiting
    the project at some point to remove the duplication and do it properly.


    Writing the Code


    The part of this flyout that I want you to see is in the code, which is shown
    in [Listing 3-13](#9781430250340_Ch03.xhtml#list13).


    ***[Listing 3-13](#9781430250340_Ch03.xhtml#_list13).** The* *AddItemFlyout.xaml.cs
    File*


    ```

    using System;

    using GrocerApp.Data;

    using Windows.UI.Xaml;

    using Windows.UI.Xaml.Controls;


    namespace GrocerApp.Flyouts {

        public sealed partial class AddItemFlyout : UserControl {


    public AddItemFlyout() {

                this.InitializeComponent();

            }


    public void Show(Page page, AppBar appbar, Button button) {

                AddItemPopup.IsOpen = true;

                FlyoutHelper.ShowRelativeToAppBar(AddItemPopup, page, appbar, button);

            }


    private void AddButtonClick(object sender, RoutedEventArgs e) {


    ((ViewModel)DataContext) .GroceryList.Add(new GroceryItem {

                    Name = ItemName.Text,

                    Quantity = Int32.Parse(ItemQuantity.Text),

                    Store = ItemStore.SelectedItem.ToString()

                });


    AddItemPopup.IsOpen = false;

            }

        }

    }

    ```


    I need to get my view model object so I can add the new item to it. There are
    several ways of doing this, but the simplest is to read the value of the `DataContext`
    property, as shown in the listing. Some care is required, because I am making
    the assumption that the value of this property will be my `ViewModel` object,
    which I set in the constructor of the `ListPage` class (in the `ListPage.xaml.cs`
    file). As I mentioned at the time, the `DataContext` property is inherited, which
    means that the object I set for the `Page` object can be retrieved from my `UserControl`,
    but only if another object hasn’t been assigned to the `DataContext` property
    of one of the intermediate controls in the layout hierarchy.


    Once I have the `ViewModel` object, it is a simple matter to add a new `GroceryItem`
    to the `GroceryList` collection. Since the collection is observable, the addition
    will automatically be reflected in the rest of the app.


    Adding the Flyout to the App


    All that remains is to add my new flyout to the `ListPage` layout and code, which
    I do following the same pattern as for the previous flyout. [Listing 3-14](#9781430250340_Ch03.xhtml#list14)
    shows the XAML declaration for the flyout.


