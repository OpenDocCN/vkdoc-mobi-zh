    \ an `AppBar` control within the `Page.TopAppBar` property.\n\n`AppBar` controls\
    \ contain buttons, and the convention is to have buttons that are specified to\
    \ the currently selected item shown on the left side of the `AppBar` and app-wide\
    \ buttons shown on the right. To follow this convention, I have added a `Grid`\
    \ to my `AppBar` control. The `Grid` has one row and two columns, and each column\
    \ contains a `StackPanel`.\n\nThere are two ways to add buttons to an `AppBar`:\
    \ you can select and adapt ones that are already defined in `StandardStyles.xaml`,\
    \ or you can create your own. The listing uses both approaches, which I explain\
    \ in the following sections.\n\n## Adapting Predefined AppBar Buttons\n\nMost\
    \ of the `/Common/StandardStyles.xaml` file, which is added to Visual Studio projects\
    \ automatically when they are created, contains styles for `Button` controls that\
    \ are part of an `AppBar`, like the one shown in [Listing 3-2](#9781430250340_Ch03.xhtml#list2).\n\
    \n![image](images/sq.jpg) **Note** There are a lot of these button styles in the\
    \ `StandardStyles.xaml` file, and, by default, they are commented out. This means\
    \ you have to uncomment the ones you want to use. For this chapter, you will need\
    \ to search for `HomeAppBarButtonStyle` and `AddAppBarButtonStyle` and uncomment\
    \ them; otherwise, they won’t be available for use in the example app.\n\n**[Listing\
    \ 3-2](#9781430250340_Ch03.xhtml#_list2).** *The Style for the Add AppBar Button*\n\
    \n```\n<Style x:Key=\"AddAppBarButtonStyle\" TargetType=\"ButtonBase\"\n     \
    \   BasedOn=\"{StaticResource AppBarButtonStyle}\">\n    <Setter Property=\"AutomationProperties.AutomationId\"\
    \ Value=\"AddAppBarButton\"/>\n    <Setter Property=\"AutomationProperties.Name\"\
    \ Value=\"Add\"/>\n    <Setter Property=\"Content\" Value=\"\"/>\n</Style>\n\
    ```\n\nAll of the predefined `Button` styles are derived from the `AppBarButtonStyle`,\
    \ which defines the basic characteristics of an `AppBar` button. I'll use this\
    \ style when I create my own button in the next section.\n\nThe two properties\
    \ that differentiate individual buttons are `AutomationProperties.Name` and `Content`.\
    \ The `AutomationProperties.Name` property specifies the text shown under the\
    \ button, and the `Content` property specifies the icon that will be used. The\
    \ value for this property is a character code from the Segoe UI Symbol font. You\
    \ can see the icons defined by this font using the Character Map tool that is\
    \ included in Windows 8; the value `E109` corresponds to a plus sign.\n\nThe style\
    \ shown in the listing doesn't quite meet my needs. I like the icon, but I want\
    \ to change the text. To adapt the button to my needs in the `ListPage.xaml` file,\
    \ I simply use the predefined style and override the parts I want to change, as\
    \ shown in [Listing 3-3](#9781430250340_Ch03.xhtml#list3).\n\n**[Listing 3-3](#9781430250340_Ch03.xhtml#_list3).**\
    \ *Adapting a Predefined AppBar Button in the ListPage.xaml File*\n\n```\n<Button\
    \ x:Name=\"AppBarAddButton\"\n    Style=\"{StaticResource AddAppBarButtonStyle}\"\
    \n    AutomationProperties.Name=\"New Item\"\n    Click=\"AppBarButtonClick\"\
    />\n```\n\n## Creating Custom AppBar Button Styles\n\nAn alternative approach\
    \ is to define your own styles for your `AppBar` buttons. [Listing 3-4](#9781430250340_Ch03.xhtml#list4)\
    \ shows a style I added to my resource `/Resources/GrocerResourceDictionary.xaml`\
    \ file for this purpose.\n\n**[Listing 3-4](#9781430250340_Ch03.xhtml#_list4).**\
    \ *Defining Custom AppBar Button Styles*\n\n```\n<Style x:Key=\"StoresAppBarButton\"\
    \ TargetType=\"Button\"\n        BasedOn=\"{StaticResource AppBarButtonStyle}\"\
    >\n    <Setter Property=\"AutomationProperties.Name\" Value=\"Stores\"/>\n   \
    \ <Setter Property=\"Content\" Value=\"\"/>\n</Style>\n\n<Style x:Key=\"DoneAppBarButtonStyle\"\
    \ TargetType=\"Button\"\n        BasedOn=\"{StaticResource AppBarButtonStyle}\"\
    >\n    <Setter Property=\"AutomationProperties.Name\" Value=\"Done\"/>\n    <Setter\
    \ Property=\"Content\" Value=\"\"/>\n</Style>\n```\n\nI have based these styles\
    \ on `AppBarButtonStyle`, so I get the basic look and feel for an `AppBar` button,\
    \ and I have set values for the `AutomationProperties.Name` and `Content` properties.\
    \ You can go further and redefine some of the core characteristics of the underlying\
    \ style, but you run the risk of departing from the standard Windows 8 app appearance\
    \ and experience that your users will expect.\n\n## Implementing AppBar Button\
    \ Actions\n\nThe `Button` controls on the `AppBar` don't do anything at the moment.\
    \ To address this, I am going to implement the Done button, just so you can see\
    \ how it is done.\n\nI will activate this `Button` when the user makes a selection\
    \ from the grocery item list. When the user clicks the button, I will remove the\
    \ currently selected item from the list, allowing the user to indicate when they\
    \ have purchased an item. [Listing 3-5](#9781430250340_Ch03.xhtml#list5) shows\
    \ the changes to the `ListPage.xaml.cs` code-behind file.\n\n**[Listing 3-5](#9781430250340_Ch03.xhtml#_list5).**\
    \ *Implementing the Done AppBar Button*\n\n```\nusing GrocerApp.Data;\nusing Windows.UI.Xaml;\n\
    using Windows.UI.Xaml.Controls;\nusing Windows.UI.Xaml.Navigation;\n\nnamespace\
    \ GrocerApp.Pages {\n\npublic sealed partial class ListPage : Page {\n    ViewModel\
    \ viewModel;\n\n    public ListPage() {\n        viewModel = new ViewModel();\n\
    \n        // ...test data removed for brevity\n\n        this.InitializeComponent();\n\
    \        this.DataContext = viewModel;\n\n        ItemDetailFrame.Navigate(typeof(NoItemSelected));\n\
    \n        viewModel.PropertyChanged += (sender, args) => {\n            if (args.PropertyName\
    \ == \"SelectedItemIndex\") {\n                if (viewModel.SelectedItemIndex\
    \ == -1) {\n                    ItemDetailFrame.Navigate(typeof(NoItemSelected));\n\
    \                    AppBarDoneButton.IsEnabled = false;\n                } else\
    \ {\n                    ItemDetailFrame.Navigate(typeof(ItemDetail), viewModel);\n\
    \                    AppBarDoneButton.IsEnabled = true;\n                }\n \
    \           }\n        };\n    }\n\n    protected override void OnNavigatedTo(NavigationEventArgs\
    \ e) {\n    }\n}\n```"
