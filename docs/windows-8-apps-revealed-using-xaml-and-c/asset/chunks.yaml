  trans: "\n您可以通过 `Page.SizeChanged` 事件来监视视图中发生的变化。通过处理此事件，您可以利用 `Windows.UI.ViewManagement.ApplicationView.Value`\
    \ 属性确定当前视图，并根据需要重新配置您的应用。清单 4-3 展示了 `DetailPage` 页面的代码，其中添加了处理此事件的相关代码。\n\n**清单\
    \ 4-3.** *在 `DetailPage` 的代码隐藏类中控制视图*\n\n```\nusing Windows.UI.ViewManagement;\n\
    using Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\nusing Windows.UI.Xaml.Navigation;\n\
    \nnamespace GrocerApp.Pages {\n    public sealed partial class DetailPage : Page\
    \ {\n\n        public DetailPage() {\n            this.InitializeComponent();\n\
    \            SizeChanged += DetailPage_SizeChanged;\n        }\n\n        void\
    \ DetailPage_SizeChanged(object sender, SizeChangedEventArgs e) {\n          \
    \  if (ApplicationView.Value == ApplicationViewState.Snapped) {\n            \
    \    GridLayout.ColumnDefinitions[0].Width\n                    = new GridLength(0);\n\
    \            } else {\n                GridLayout.ColumnDefinitions[0].Width\n\
    \                    = new GridLength(1, GridUnitType.Star);\n            }  \
    \           \n        }\n\n        protected override void OnNavigatedTo(NavigationEventArgs\
    \ e) {\n        }\n    }\n}\n```\n\n`ApplicationView.Value` 属性从 `ApplicationViewState`\
    \ 枚举中返回一个值，用于描述当前视图。此枚举包含的值有 `Snapped`、`Filled`、`FullScreenPortrait` 和 `FullScreenLandscape`；最后两个值允许您在应用全屏显示时区分横向和纵向模式。\n\
    \n在我的示例中，`DetailPage_SizeChanged` 方法判断当前正在使用的视图类型，并相应地调整应用布局。如果应用以贴靠视图显示，那么我将网格中第一列的宽度设为零。当应用恢复到全屏视图时，您的应用状态不会被自动重置，因此您还必须定义代码来处理其他事件状态。在这种情况下，对于除贴靠视图外的任何其他视图，我都会重置该列的宽度。（处理列的语法有些笨拙，但您应该能明白其意。）您可以在图\
    \ 4-2 中看到贴靠视图下的变化。\n\n![9781430250340_Fig04-02.jpg](img/9781430250340_Fig04-02.jpg)\n\
    \n**图 4-2.** *适应贴靠视图的限制*\n\n我没有将所有内容都塞进一个小窗口，而是仅显示了应用的一部分。对于贴靠应用能够使用的相对较小的屏幕空间，最明智的处理方式是展示精简后的功能。您会惊讶于能在这么小的空间里塞进多少内容，但这与拥有完整的全屏访问权限毕竟不同。\n\
    \n## 在 XAML 中响应视图更改\n\n您可以使用 XAML 来规划要对应用进行的更改。XAML 中用于此操作的语法冗长、难以阅读且处理起来更困难——以至于我强烈建议您坚持使用代码方式。但为完整起见，清单\
    \ 4-4 展示了如何使用 XAML 指定我想要的更改。\n\n![image](img/sq.jpg) **注意** 此 XAML 所使用的 `VisualStateManager`\
    \ 功能是标准的 WPF 和 Silverlight 功能。它具有许多特性，我无法在本书中对其予以充分关注。我的建议是采用基于代码的方法，但如果您是真正的\
    \ XAML 爱好者，可以查阅 WPF 或 Silverlight 文档，以了解有关可用元素的更多详细信息。\n\n**清单 4-4.** *在 XAML\
    \ 中定义视图更改*\n\n```\n<Page\n    x:Class=\"GrocerApp.Pages.DetailPage\"\n    xmlns=\"\
    \ http://schemas.microsoft.com/winfx/2006/xaml/presentation \"\n    xmlns:x=\"\
    \ http://schemas.microsoft.com/winfx/2006/xaml \"\n    xmlns:local=\"using:GrocerApp.Pages\"\
    \n    xmlns:d=\" http://schemas.microsoft.com/expression/blend/2008 \"\n    xmlns:mc=\"\
    \ http://schemas.openxmlformats.org/markup-compatibility/2006 \"\n    mc:Ignorable=\"\
    d\">\n\n    <Grid x:Name=\"GridLayout\" Background=\"#71C524\">\n\n        <VisualStateManager.VisualStateGroups>\n\
    \            <VisualStateGroup x:Name=\"OrientationStates\">\n               \
    \ <VisualState x:Name=\"Snapped\">\n                    <Storyboard>\n       \
    \                 <ObjectAnimationUsingKeyFrames\n                           \
    \     Storyboard.TargetProperty=\"Grid.\n                                ColumnDefinitions[0].Width\"\
    \n                                Storyboard.TargetName=\"GridLayout\">\n    \
    \                        <DiscreteObjectKeyFrame KeyTime=\"0\">\n            \
    \                    <DiscreteObjectKeyFrame.Value>\n                        \
    \            <GridLength>0</GridLength>\n                                </DiscreteObjectKeyFrame.Value>\n\
    \                            </DiscreteObjectKeyFrame>\n                     \
    \   </ObjectAnimationUsingKeyFrames>\n                    </Storyboard>\n    \
    \            </VisualState>\n\n                <VisualState x:Name=\"Others\"\
    >\n                    <Storyboard>\n                        <ObjectAnimationUsingKeyFrames\n\
    \                                Storyboard.TargetProperty=\"Grid.\n         \
    \                       ColumnDefinitions[0].Width\"\n                       \
    \         Storyboard.TargetName=\"GridLayout\">\n                            <DiscreteObjectKeyFrame\
