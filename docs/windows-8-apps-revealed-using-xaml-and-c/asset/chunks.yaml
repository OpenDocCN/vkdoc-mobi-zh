- fmt: "# Exploring the `StandardStyles.xaml` File\n\nThe `Common` folder contains\
    \ files that are used by Visual Studio project templates. The only file in this\
    \ folder when the Blank App template is used is `StandardStyles.xaml`, which is\
    \ the resource dictionary file referred to in the `App.xaml` file (as shown in\
    \ [Listing 1-2](#9781430250340_Ch01.xhtml#list2)). The `StandardStyles.xaml` file\
    \ contains some the styles and templates that make it easier to create an app\
    \ that has an appearance that is consistent with the broader Windows app look\
    \ and feel. I am not going to list the complete file because it contains a lot\
    \ of content, but [Listing 1-6](#9781430250340_Ch01.xhtml#list6) shows an example\
    \ of a text-related style.\n\n[***Listing 1-6.***](#9781430250340_Ch01.xhtml#_list6)\
    \ A Style from the `StandardStyles.xaml` File\n\n```\n...\n<Style x:Key=\"HeaderTextStyle\"\
    \ TargetType=\"TextBlock\"\n        BasedOn=\"{StaticResource BaselineTextStyle}\"\
    >\n    <Setter Property=\"FontSize\" Value=\"56\"/>\n    <Setter Property=\"FontWeight\"\
    \ Value=\"Light\"/>\n    <Setter Property=\"LineHeight\" Value=\"40\"/>\n    <Setter\
    \ Property=\"RenderTransform\">\n        <Setter.Value>\n            <TranslateTransform\
    \ X=\"-2\" Y=\"8\"/>\n        </Setter.Value>\n    </Setter>\n</Style>\n...\n\
    ```\n\n![image](images/sq.jpg) **Caution** Don’t edit the files in the `Common`\
    \ folder. I’ll show you how to create and reference a custom resource dictionary\
    \ in [Chapter 2](#9781430250340_Ch02.xhtml).\n\n# Exploring the `Package.appxmanifest`\
    \ File\n\nThe final file worth mentioning is the *manifest*, called `Package.appxmanifest`.\
    \ This is an XML file that provides information about your app to Windows. You\
    \ can edit this file as raw XML, but Visual Studio provides a nice properties-based\
    \ editor to use instead. I’ll return to this file in later chapters to configure\
    \ some of the app settings.\n\n# An Incredibly Brief XAML Overview\n\nDon’t worry\
    \ if you haven’t used XAML before. The learning curve for creating Windows apps\
    \ will be steeper, but you have the advantage of not expecting features from other\
    \ XAML application types that are not available in Windows app development.\n\n\
    At its heart, XAML creates user interfaces declaratively, rather than in code.\
    \ So, if I wanted to add a couple of button controls to my project, I add some\
    \ markup to my XAML file, as shown in [Listing 1-7](#9781430250340_Ch01.xhtml#list7).\n\
    \n[***Listing 1-7.***](#9781430250340_Ch01.xhtml#_list7) Adding Controls to the\
    \ XAML Document\n\n```\n<Page\n    x:Class=\"GrocerApp.MainPage\"\n    xmlns=\"\
    \ http://schemas.microsoft.com/winfx/2006/xaml/presentation  \"\n    xmlns:x=\"\
    \ http://schemas.microsoft.com/winfx/2006/xaml \"\n    xmlns:local=\"using:GrocerApp\"\
    \n    xmlns:d=\" http://schemas.microsoft.com/expression/blend/2008  \"\n    xmlns:mc=\"\
    \ http://schemas.openxmlformats.org/markup-compatibility/2006  \"\n    mc:Ignorable=\"\
    d\">\n\n<Grid Background=\"{StaticResource ApplicationPageBackgroundThemeBrush}\"\
    >\n        <StackPanel HorizontalAlignment=\"Center\" VerticalAlignment=\"Center\"\
    >\n            <Button x:Name=\"FirstButton\" HorizontalAlignment=\"Center\"\n\
    \                    Click=\"ButtonClick\">Click Me!</Button>\n            <Button\
    \ Style=\"{StaticResource TextButtonStyle}\"\n                    HorizontalAlignment=\"\
    Center\"\n                    Click=\"ButtonClick\">Or Click Me!</Button>\n  \
    \      </StackPanel>\n    </Grid>\n</Page>\n```\n\nThe tag name in a XAML element\
    \ specifies the control that will be added to the layout. I have added one `StackPanel`\
    \ and two `Button` controls to my project. The `StackPanel` is a simple container\
    \ that helps add structure to the layout; it positions its child controls in either\
    \ a horizontal or vertical line (a *stack*). The `Button` controls are just what\
