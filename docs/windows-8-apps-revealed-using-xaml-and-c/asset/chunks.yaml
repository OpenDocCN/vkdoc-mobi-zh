    ```


    This is a very simple page—so simple that you wouldn’t usually need to create
    a page like this because it just displays some static text. But it is helpful
    to demonstrate an important app feature, allowing me to break up my app into manageable
    pieces. The key to adding pages to my main app layout is the `Frame` control,
    which I have added to the `ListPage.xaml` layout, as shown in [Listing 2-9](#9781430250340_Ch02.xhtml#list9).


