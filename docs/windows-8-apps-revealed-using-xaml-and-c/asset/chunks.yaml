    the context of my square document. The arguments to the `ImportNode` method are
    the element I want to import and a `bool` value indicating whether I want child
    nodes to be imported as well (which, of course, I do). Once I have created this
    new element, I insert it into the square XML using the `AppendChild` element:


    ```

    narrowTileXml.GetElementsByTagName("visual")[0]. AppendChild (importedNode);

    ```


    The result is the combined document I showed you in [Listing 4-11](#9781430250340_Ch04.xhtml#list11).
    You can see the appearance of the wide tile size in [Figure 4-7](#9781430250340_Ch04.xhtml#Fig00047).
    (You can toggle between the square and wide versions by selecting the tile and
    using the Start screen AppBar.)


    ![9781430250340_Fig04-07.jpg](images/9781430250340_Fig04-07.jpg)


    [Figure 4-7](#9781430250340_Ch04.xhtml#_Fig00047).  Updating a wide tile


    Applying Badges


    Windows 8 manages to pack a lot of features into tiles, including support for
    *badges*, which are small icon or numeric overlays for a tile. The latter fall
    into the tile-as-an-ad category because there are very few situations in which
    a numeric representation does anything other than invite the user to start the
    app.


    ![image](images/sq.jpg) **Tip**   Although I show tiles and badges being used
    together, you can apply badges directly to static tiles.


    To demonstrate badges, I am going to show a simple indicator based on the number
    of items in the grocery list. [Listing 4-13](#9781430250340_Ch04.xhtml#list13)
    shows the additions to the `MainPage` class.


    ***[Listing 4-13](#9781430250340_Ch04.xhtml#_list13).** Adding Support for Tile
    Badges*


    ```

    using GrocerApp.Data;

    using System;

    using Windows.Data.Xml.Dom;

    using Windows.UI.Notifications;

    using Windows.UI.Xaml;

    using Windows.UI.Xaml.Controls;

    using Windows.UI.Xaml.Navigation;

    using System.Collections.Generic;


    namespace GrocerApp.Pages {


    public sealed partial class MainPage : Page {

            private ViewModel viewModel;


    public MainPage() {

                this.InitializeComponent();


    viewModel = new ViewModel();


    // ...test data removed for brevity...


    this.DataContext = viewModel;


    MainFrame.Navigate(typeof(ListPage), viewModel);


    viewModel.GroceryList.CollectionChanged += (sender, args) => {

                    UpdateTile();

                    UpdateBadge();

                };


    UpdateTile();

                UpdateBadge();

            }


    private void UpdateBadge() {


    int itemCount = viewModel.GroceryList.Count;


    BadgeTemplateType templateType = itemCount > 3

                    ? BadgeTemplateType.BadgeGlyph : BadgeTemplateType.                BadgeNumber;


    XmlDocument badgeXml = BadgeUpdateManager.GetTemplateContent(te                mplateType);

                ((XmlElement)badgeXml.GetElementsByTagName("badge")[0]).                SetAttribute("value",

                    (itemCount > 3) ? "alert" : itemCount.ToString());


    for (int i = 0; i < 5; i++) {

                    BadgeUpdateManager.CreateBadgeUpdaterForApplication()

                        .Update(new BadgeNotification(badgeXml));

                }

            }


    private void UpdateTile() {

                // ...code removed for brevity...

            }


    protected override void OnNavigatedTo(NavigationEventArgs e) {

            }


    private void NavBarButtonPress(object sender, RoutedEventArgs e) {

                Boolean isListView = (Button)sender == ListViewButton;

                MainFrame.Navigate(isListView ? typeof(ListPage)

                    : typeof(DetailPage), viewModel);


    }

        }

    }

    ```


    Badges work in a similar way to tile notifications. You obtain an XML template,
    populate the content, and use it to present some information to the user via the
    Start screen. Two types of badge template are available; the first, the numeric
    template, will display a numeric value between 1 and 99, and the second, the glyph
    template, will display a small image from a limited range defined by Windows.


    The numeric and glyph templates are the same and, as [Listing 4-14](#9781430250340_Ch04.xhtml#list14)
    shows, are much simpler than the ones I used for tiles.


    ***[Listing 4-14](#9781430250340_Ch04.xhtml#_list14).** The Template for Numeric
    and Image Badges*


    ```

    <badge value=""/>

    ```


    The objective is to set the `value` attribute to either a numeric value or the
    name of a glyph. I display a numeric badge if there are three or fewer items on
    the grocery list. If there are more than three items, then I use an icon to indicate
    that the user should be concerned about the extent of their shopping obligations.


    The process for creating a badge begins with selecting a template. The two template
    types are `Windows.UI.Notifications.BadgeTemplateType`; for numeric badges, you
    use the `BadgeNumber` template, and the `BadgeGlyph` template is used for icons.
    You could use the same template in both situations because they return the same
    XML. This may change in later releases, so it is prudent to select the right template,
    even though the content is the same.


    The next step is to locate the `value` attribute in the XML and assign it either
    a numeric value or the name of an icon. The numeric range for badges is very specific;
    it is from 1 to 99\. If you set the value less than 1, the badge won’t be displayed
    at all. Any value greater than 99 results in a badge showing 99.


    The list of icons is equally prescriptive. You cannot use your own icons and must
    choose from a list of ten that Windows supports. You can see a list of the icons
    at `goo.gl/YoYee`. For this example, I have chosen the `alert` icon, which looks
    like an asterisk. Once the XML is populated, you create a new `BadgeNotification`
    object and use it to post the update. As with tiles, I find that not all badges
    updates are processed, so I repeat the update five times to make sure it gets
    through:


    ```

    . . .

    for (int i = 0; i < 5; i++) {

        BadgeUpdateManager.CreateBadgeUpdaterForApplication()

            .Update(new BadgeNotification(badgeXml));

    }

    . . .

    ```


    All that remains is to ensure that my badge updates are created. To do this, I
    have changed the event handler for the grocery list events so that the tile and
    the badge are updated together. You can see the four different badge/tile configurations
    in [Figure 4-8](#9781430250340_Ch04.xhtml#Fig00048): wide and square tiles, with
    number and icon badges.


    ![9781430250340_Fig04-08.jpg](images/9781430250340_Fig04-08.jpg)


    [Figure 4-8](#9781430250340_Ch04.xhtml#_Fig00048).  Displaying a badge on a tile


    Summary


    In this chapter, I showed you how to adapt to snapped and filled views and how
    to use tiles to provide your users with enticements to run your app or the data
    they require to avoid doing so. These features are essential in delivering an
    app that is integrated into the broader Windows 8 experience.


    You may feel that the amount of space available in a snapped layout is too limited
    to offer any serious functionality, but with some careful consideration, it is
    possible to focus on the essence of the service that you offer and omit everything
    else. If all else fails, you can present an information-only summary of your app
    and explicitly break out of the layout.


    Careful consideration is also required to get the most from tiles and badges.
    Well-thought-out badges can significantly improve the attractiveness or utility
    of your app, but ill-considered tiles are annoying or just plain useless.


