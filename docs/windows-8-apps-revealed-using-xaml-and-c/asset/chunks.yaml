    Responding to the Search Life-Cycle Event


    The `Application` class makes it very easy to implement contracts by providing
    methods you can override for each of them. [Listing 5-9](#9781430250340_Ch05.xhtml#list9)
    shows my implementation of the `OnSearchActivated` method, which is the one called
    when the user targets my app with a search.


    ***[Listing 5-9](#9781430250340_Ch05.xhtml#_list9).** Responding to Searches*


    ```

    using GrocerApp.Data;

    using System;

    using System.Threading;

    using System.Threading.Tasks;

    using Windows.ApplicationModel;

    using Windows.ApplicationModel.Activation;

    using Windows.UI.Core;

    using Windows.UI.Xaml;

    using Windows.UI.Xaml.Controls;


    namespace GrocerApp {


    sealed partial class App : Application {

            private ViewModel viewModel;

            private Task locationTask;

            private CancellationTokenSource locationTokenSource;


    public App() {

                this.InitializeComponent();


    viewModel = new ViewModel();


    // ...test data omitted for brevity...

                this.Suspending += OnSuspending;

                this.Resuming += OnResuming;

            }


    protected override void OnLaunched(LaunchActivatedEventArgs args) {

                Frame rootFrame = Window.Current.Content as Frame;


    if (rootFrame == null) {

                    rootFrame = new Frame();

                    Window.Current.Content = rootFrame;

                }


    if (rootFrame.Content == null) {


    if (!rootFrame.Navigate(typeof(Pages.MainPage), viewModel)) {

                        throw new Exception("Failed to create initial page");

                    }

                }

                Window.Current.Activate();

                StartLocationTracking(rootFrame);

            }


    protected override void OnSearchActivated(SearchActivatedEventArgs args) {

                viewModel.SearchAndSelect(args.QueryText);

            }


    private void OnResuming(object sender, object e) {

                // ...statements omitted for brevity...

            }


    private void OnSuspending(object sender, SuspendingEventArgs e) {

                // ...statements omitted for brevity...

            }


    private void StartLocationTracking(Frame frame) {

                // ...statements omitted for brevity...

            }


    private void StopLocationTracking() {

                locationTokenSource.Cancel();

            }

        }

    }

    ```


    That is all that is required to satisfy the obligations of the search contract;
    by overriding the `OnSearchActivated` method, I have added the ability for Windows
    to search my app on behalf of the user.


    Testing the Search Contract


    To test the contract, start the example app. It doesn’t matter if you start it
    with or without the debugger. Bring up the charms bar and select the search icon.
    The example app will be selected as the target of the search automatically. To
    begin a search, just start typing.


    When you press the search button to the right of the textbox, Windows will invoke
    the search contract and pass the query string to the example app. You want to
    search for something that will make a match, so type **hot** (so that your search
    will match against the hot dogs item in the grocery list) and click the button.
    You will see something similar to [Figure 5-6](#9781430250340_Ch05.xhtml#Fig00056).


    ![9781430250340_Fig05-06.jpg](images/9781430250340_Fig05-06.jpg)


    [Figure 5-6](#9781430250340_Ch05.xhtml#_Fig00056).  Searching the app with a contract


    I really like the contract approach. This is a very simple implementation of the
    search contract, but you can see how easy it is to integrate into Windows with
    just a few lines of code. You can go well beyond what I have done here and completely
    customize the way that your app deals with and responds to search.


    Summary


    In this chapter, I have shown you how to use the life-cycle events to respond
    to the way in which Windows manages apps. I described the key events and showed
    you how to respond to them to ensure that you app is receiving and processing
    them correctly.


    Particular care must be taken to cleanly wrap up background tasks when an app
    is being suspended, and I showed you how to get control of this process by requesting
    a suspension deferral, allowing an extra few seconds to minimize the risk of potential
    errors or stale data when the app is resumed.


    Finally, I showed you how life-cycle events allow you to fulfill the contracts
    that bind an app to the wider Windows platform and how easy it is to meet the
    obligations those contracts specify. I showed you the search contract, but there
    are several others, and I recommend you take the time to explore them fully. The
    more contracts you implement, the more integrated your app becomes with the rest
    of Windows and with other integrated apps.


    In this book, I set out to show you the core system features that will jump start
    your app development. I have shown you how to use data bindings, how to use the
    major structural controls, how to deal with snapped and filled layouts, how to
    customize your app’s tile, and, in this chapter, how to take control of the app
    life cycle. With these skills as your foundation, you will be able to create rich
    and expressive apps and get a head start on Windows 8 development. I wish you
    every success in your app development projects.


