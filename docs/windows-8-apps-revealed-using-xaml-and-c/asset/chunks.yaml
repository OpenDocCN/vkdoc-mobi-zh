    \ source code download for this book, which you can get from Apress.com.\n\n![9781430250340_Fig04-01.jpg](images/9781430250340_Fig04-01.jpg)\n\
    \n[Figure 4-1](#9781430250340_Ch04.xhtml#_Fig00041). The example app shown in\
    \ the filled and snapped views\n\n![image](images/sq.jpg) **Note:** Apps can be\
    \ snapped only in the landscape view, and Windows 8 supports snapping only if\
    \ the horizontal resolution of the display is 1366 pixels or greater. You must\
    \ ensure that you have selected the correct orientation and resolution in the\
    \ simulator if you want to experiment with snapping.\n\nThe loss of 320 pixels\
    \ to make room for the snapped app doesn’t cause a lot of disruption for most\
    \ apps. The problems start to appear when your app is moved from the filled to\
