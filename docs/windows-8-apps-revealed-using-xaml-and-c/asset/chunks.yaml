    # About the Technical Reviewer


    **Fabio Claudio Ferracchiati** is a senior consultant and a senior analyst/developer
    using Microsoft technologies. He works for Brain Force (`www.brainforce.com`)
    in its Italian branch (`www.brainforce.it`). He is a Microsoft Certified Solution
