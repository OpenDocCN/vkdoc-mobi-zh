    ***[Listing 2-10](#9781430250340_Ch02.xhtml#_list10).** Specifying the Page Shown
    by a Frame in the ListPage.xaml.cs File*


    ```

    using GrocerApp.Data;

    using Windows.UI.Xaml.Controls;

    using Windows.UI.Xaml.Navigation;

    namespace GrocerApp.Pages {

        public sealed partial class ListPage : Page {

            ViewModel viewModel;

            public ListPage() {

                viewModel = new ViewModel();

                // ... test data removed for brevity

                this.InitializeComponent();

                this.DataContext = viewModel;

                ItemDetailFrame.Navigate(typeof(NoItemSelected));

            }

            protected override void OnNavigatedTo(NavigationEventArgs e) {

            }

            private void ListSelectionChanged(object sender,             SelectionChangedEventArgs
    e) {

                viewModel.SelectedItemIndex = groceryList.SelectedIndex;

            }

        }

    }

    ```


    The argument to the `Navigate` method is a `System.Type` representing the `Page`
    class you want to load, and the easiest way to get a `System.Type` is with the
    `typeof` keyword. The `Navigate` method instantiates the `Page` object (remember
    that XAML and the code-behind file are combined to create a single subclass of
    `Page`), and the result is inserted into the layout, as shown in [Figure 2-3](#9781430250340_Ch02.xhtml#Fig3).


    ![9781430250340_Fig02-03.jpg](images/9781430250340_Fig02-03.jpg)


