    \ 中看到浮出控件的外观。与 AppBar 关联的浮出控件`Popup`所采用的“轻触关闭”样式，意味着同一时间只会显示一个浮出控件。\n\n![9781430250340_Fig03-03.jpg](img/9781430250340_Fig03-03.jpg)\n\
    \n图 3-3. “添加项目”浮出控件\n\n## 在 Windows 应用内导航\n\n如果你的应用包含多个不同的功能部分，那么你需要提供一个导航栏（`NavBar`），以便用户能够在这些部分之间轻松切换。提供一致导航的最简单方法是重构应用，使功能区域呈现在一个包装页面的`Frame`控件中。\n\
    \n### 创建包装器\n\n我在`Pages`文件夹中创建了`MainPage.xaml`文件作为包装器。你可以从清单 3-16 中看到这个文件的内容，它是使用`Blank\
    \ Page`模板创建的。\n\n**清单 3-16.** `MainPage.xaml`文件\n\n```\n<Page\n    x:Class=\"\
    GrocerApp.Pages.MainPage\"\n    xmlns=\" http://schemas.microsoft.com/winfx/2006/xaml/presentation\
    \ \"\n    xmlns:x=\" http://schemas.microsoft.com/winfx/2006/xaml \"\n    xmlns:local=\"\
    using:GrocerApp.Pages\"\n    xmlns:d=\" http://schemas.microsoft.com/expression/blend/2008\
    \ \"\n    xmlns:mc=\" http://schemas.openxmlformats.org/markup-compatibility/2006\
    \ \"\n    mc:Ignorable=\"d\">\n\n<Page.TopAppBar>\n        <AppBar>\n        \
    \    <StackPanel Orientation=\"Horizontal\"             HorizontalAlignment=\"\
    Center\">\n                <Button x:Name=\"ListViewButton\"\n               \
    \     Style=\"{StaticResource AppBarButtonStyle}\"\n                    AutomationProperties.Name=\"\
    List View\"\n                    Content=\"\" Click=\"NavBarButtonPress\"/>\n\
    \n<Button x:Name=\"DetailViewButton\"\n                    Style=\"{StaticResource\
    \ AppBarButtonStyle}\"\n                    AutomationProperties.Name=\"Detail\
    \ View\"\n                    Content=\"\" Click=\"NavBarButtonPress\"/>\n  \
    \          </StackPanel>\n        </AppBar>\n    </Page.TopAppBar>\n\n<Grid Background=\"\
    {StaticResource ApplicationPageBackgroundThemeBrush}\">\n        <Frame x:Name=\"\
    MainFrame\" />\n    </Grid>\n</Page> \n```\n\n为了添加导航栏，我在`Page.TopAppBar`属性中声明了一个`AppBar`控件。导航栏的机制与（底部）AppBar\
    \ 相同，并且我添加了两个`Button`控件来支持在应用包含的两个视图之间导航。\n\n除了导航栏之外，`MainPage`的布局还包含一个`Frame`，我将用它来显示不同的视图。\n\
    \n支持此布局的代码非常简单，如清单 3-17 所示。我通过导航到相应的`Page`并更改按钮的`IsChecked`属性来响应任一`Button`控件的点击。另外，我在此类中创建了`ViewModel`对象，以便在整个应用中只有一个实例。该对象通过`Frame.Navigate`方法传递给各个页面。\n\
