- fmt: '我调用静态方法`VisualStateManager.GoToState`在XAML定义的状态之间切换。该方法的参数是当前`Page`对象、要进入的状态名称以及是否显示中间状态。最后一个参数应设置为`true`，因为Windows提供了视图切换动画。


    **脱离贴靠视图**


    如果你在贴靠视图中向用户提供精简功能，当用户以特定方式与你的应用交互时，你可能需要恢复到更宽的视图。为了演示这一点，我在`DetailPage`页面的布局中添加了一个`Button`，如[清单4-6](#9781430250340_Ch04.xhtml#list6)所示。


    ***[清单4-6](#9781430250340_Ch04.xhtml#_list6)。** 向布局中添加按钮*


    ```

    . . .

    <StackPanel x:Name="TopRight" Background="#70a524" Grid.Column="1"

         Grid.Row="0">

        <TextBlock x:Name="TopRightText"

                    Style="{StaticResource DetailViewLabelStyle}"

                    Text="Top-Right"/>

        <Button Click="HandleButtonClick">Unsnap</Button>

    </StackPanel>

    . . .

    ```


    [清单4-7](#9781430250340_Ch04.xhtml#list7)显示了`Click`事件的处理程序，该处理程序使用`TryUnsnap`方法取消应用的贴靠状态。


    ***[清单4-7](#9781430250340_Ch04.xhtml#_list7)。** 取消应用贴靠*


    ```

    using Windows.UI.ViewManagement;

    using Windows.UI.Xaml;

    using Windows.UI.Xaml.Controls;

    using Windows.UI.Xaml.Navigation;


    namespace GrocerApp.Pages {

        public sealed partial class DetailPage : Page {


    public DetailPage() {

                this.InitializeComponent();


    SizeChanged += DetailPage_SizeChanged;

            }


    void DetailPage_SizeChanged(object sender, SizeChangedEventArgs e) {

                //if (ApplicationView.Value == ApplicationViewState.Snapped) {

                //    GridLayout.ColumnDefinitions[0].Width

                //        = new GridLength(0);

                //} else {

                //    GridLayout.ColumnDefinitions[0].Width

                //        = new GridLength(1, GridUnitType.Star);

                //}


    string stateName = ApplicationView.Value ==

                    ApplicationViewState.Snapped ? "Snapped" : "Others";

                VisualStateManager.GoToState(this, stateName, false);


    }


    private void HandleButtonClick(object sender, RoutedEventArgs e) {

                Windows.UI.ViewManagement.ApplicationView.TryUnsnap();

            }


    protected override void OnNavigatedTo(NavigationEventArgs e) {

            }

        }

    }

    ```


    `TryUnsnap`方法将更改视图，但仅响应于用户交互。例如，如果应用处于后台，则无法更改视图。


    **使用磁贴和徽章**


    磁贴是应用在“开始”屏幕上的表示。最简单的形式是，磁贴是启动应用的静态图标。然而，只需稍加努力，你就可以利用磁贴向用户呈现应用状态的有用摘要，并吸引他们注意可能想要执行的操作。


    在接下来的小节中，我将演示如何通过示例应用的磁贴呈现信息。在创建动态磁贴时，存在两个可能相互冲突的目标：要么是鼓励用户运行你的应用，要么是劝阻他们不要运行它。如果你试图吸引用户，那么你的磁贴就成为你对体验、洞察或内容的一个广告。这适用于娱乐应用或呈现外部内容（如新闻）的应用。


    劝阻用户运行应用可能看起来像是一个奇怪的目标，但它可以显著改善用户体验。以生产力应用为例。我简直不敢想象为了查看下一个约会或最紧急的任务，我浪费了多少时间等待日历或待办事项应用加载。你可以通过在应用磁贴中显示用户需要的信息，来减少用户在使用应用时遇到的摩擦和挫败感，并创造更令人愉悦和即时的体验。


    这两个目标都需要仔细思考。整个Windows 8的体验是扁平、简单且柔和的。如果你将磁贴用作广告，Windows的这种柔和特性使得创建脱颖而出的磁贴变得容易。然而，如果做得太过分，你会创造出不协调、刺眼的东西，与其说是吸引力，不如说是视觉污染。


    如果你的目标是减少用户需要运行应用的次数，那么你需要在正确的时间呈现正确的信息。这需要充分理解是什么驱动用户采用你的应用，并且具备定制所呈现数据的能力。适应性至关重要；例如，在周六早上向我显示任务列表中最紧急的工作事项是毫无意义的。每次你向用户呈现错误的信息时，都会迫使他们运行应用来获取他们真正需要的东西。


    ![image](images/sq.jpg) **提示** 应用只能在运行时更新其磁贴。在[第5章](#9781430250340_Ch05.xhtml)中，我将详细介绍应用生命周期，你会了解到当用户切换到另一个应用时，应用会进入挂起状态。这意味着你无法在后台提供更新。Windows
    8支持一种推送模型，可以从云端发送XML更新，但这需要设置服务器基础架构来支持你的应用。


    **改进静态磁贴**


    改善应用在“开始”屏幕外观的最简单方法是更改用于应用磁贴的图像。即使你不使用任何其他磁贴功能，也应该为应用自定义图像。


    为此，你将需要一组三个特定尺寸的图像：30×30像素、150×150像素和310×150像素。这些图像应包含你想要显示的徽标或文本，但其他部分应为透明。我为示例应用使用了条形码主题，创建了名为`tile30.png`、`tile150.png`和`tile310.png`的图像，并将它们放置在Visual
    Studio项目的`Assets`文件夹中。


    要应用新图像，请从“解决方案资源管理器”中打开`Package.appxmanifest`文件。在“应用程序 UI”选项卡上有一个“磁贴”部分，其中包含设置徽标、宽徽标和小徽标的选项。有提示说明每个选项所需的尺寸。你还必须设置将用于磁贴的背景颜色；我将其设置为与应用背景相同的颜色（十六进制RGB值`#3E790A`），如[图4-3](#9781430250340_Ch04.xhtml#Fig00043)所示。


    ![9781430250340_Fig04-03.jpg](images/9781430250340_Fig04-03.jpg)


    [图4-3](#9781430250340_Ch04.xhtml#_Fig00043)。 在应用清单中应用图像


    ![image](images/sq.jpg) **提示** 在清单中设置背景颜色很重要，而不是在图像中包含背景。当你更新磁贴时（我将在下一节中演示），图像将被替换为基于清单中指定颜色背景的动态信息。


    你可能需要从“开始”屏幕卸载应用，磁贴图像才能生效。下次从Visual Studio启动应用时，你应该会看到新的静态磁贴；你可以通过选择磁贴、右键单击并从应用栏中选择“更大”或“更小”按钮，在标准和宽视图之间切换。你可以在[图4-4](#9781430250340_Ch04.xhtml#Fig00044)中看到示例应用的方形和宽磁贴格式。


    ![9781430250340_Fig04-04.jpg](images/9781430250340_Fig04-04.jpg)


    [图4-4](#9781430250340_Ch04.xhtml#_Fig00044)。 更新后的静态宽磁贴


    请注意，单词`GrocerApp`显示在磁贴底部。此文本被指定为“应用程序 UI”选项卡中“短名称”选项的值。“显示名称”的“所有徽标”选项意味着它同时应用于常规磁贴和宽磁贴。'
