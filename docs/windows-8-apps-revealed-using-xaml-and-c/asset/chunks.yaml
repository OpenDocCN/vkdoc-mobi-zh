  raw: 'Exploring the StandardStyles.xaml File


    The `Common` folder contains files that are used by Visual Studio project templates.
    The only file in this folder when the Blank App template is used is `StandardStyles.xaml`,
    which is the resource dictionary file referred to in the `App.xaml` file (as shown
    in [Listing 1-2](#9781430250340_Ch01.xhtml#list2)). The `StandardStyles.xaml`
    file contains some the styles and templates that make it easier to create an app
    that has an appearance that is consistent with the broader Windows app look and
    feel. I am not going to list the complete file because it contains a lot of content,
    but [Listing 1-6](#9781430250340_Ch01.xhtml#list6) shows an example of a text-related
    style.


    [***Listing 1-6.***](#9781430250340_Ch01.xhtml#_list6)  A Style from the StandardStyles.xaml
    File


    ```

    ...

    <Style x:Key="HeaderTextStyle" TargetType="TextBlock"

            BasedOn="{StaticResource BaselineTextStyle}">

        <Setter Property="FontSize" Value="56"/>

        <Setter Property="FontWeight" Value="Light"/>

        <Setter Property="LineHeight" Value="40"/>

        <Setter Property="RenderTransform">

            <Setter.Value>

                <TranslateTransform X="-2" Y="8"/>

            </Setter.Value>

        </Setter>

    </Style>

    ...

    ```


    ![image](images/sq.jpg) **Caution**   Don’t edit the files in the `Common` folder.
    I’ll show you how to create and reference a custom resource dictionary in [Chapter
    2](#9781430250340_Ch02.xhtml).


    Exploring the Package.appxmanifest File


    The final file worth mentioning is the *manifest*, called `Package.appxmanifest`.
    This is an XML file that provides information about your app to Windows. You can
    edit this file as raw XML, but Visual Studio provides a nice properties-based
    editor to use instead. I’ll return to this file in later chapters to configure
    some of the app settings.


    An Incredibly Brief XAML Overview


    Don’t worry if you haven’t used XAML before. The learning curve for creating Windows
    apps will be steeper, but you have the advantage of not expecting features from
    other XAML application types that are not available in Windows app development.


    At its heart, XAML creates user interfaces declaratively, rather than in code.
    So, if I wanted to add a couple of button controls to my project, I add some markup
    to my XAML file, as shown in [Listing 1-7](#9781430250340_Ch01.xhtml#list7).


    [***Listing 1-7.***](#9781430250340_Ch01.xhtml#_list7)  Adding Controls to the
    XAML Document


    ```

    <Page

        x:Class="GrocerApp.MainPage"

        xmlns=" http://schemas.microsoft.com/winfx/2006/xaml/presentation  "

        xmlns:x=" http://schemas.microsoft.com/winfx/2006/xaml "

        xmlns:local="using:GrocerApp"

        xmlns:d=" http://schemas.microsoft.com/expression/blend/2008  "

        xmlns:mc=" http://schemas.openxmlformats.org/markup-compatibility/2006  "

        mc:Ignorable="d">


    <Grid Background="{StaticResource ApplicationPageBackgroundThemeBrush}">

            <StackPanel HorizontalAlignment="Center" VerticalAlignment="Center">

                <Button x:Name="FirstButton" HorizontalAlignment="Center"

                        Click="ButtonClick">Click Me!</Button>

                <Button Style="{StaticResource TextButtonStyle}"

                        HorizontalAlignment="Center"

                        Click="ButtonClick">Or Click Me!</Button>

            </StackPanel>

        </Grid>

    </Page>

    ```


    The tag name in a XAML element specifies the control that will be added to the
    layout. I have added one `StackPanel` and two `Button` controls to my project.
    The `StackPanel` is a simple container that helps add structure to the layout;
    it positions its child controls in either a horizontal or vertical line (a *stack*).
    The `Button` controls are just what you’d expect: a button that emits an event
    when the user clicks it.


    The hierarchical nature of the XML is translated into the hierarchy of UI controls.
    By placing the `Button` elements inside the `StackPanel`, I have specified that
    the `StackPanel` is responsible for the layout of the `Button` elements.


    Using the Visual Studio Design Surface


    You can do everything in C# in a Windows app project and not use XAML at all.
    But there some compelling reasons to adopt XAML. The main advantage is that the
    design support for XAML in Visual Studio is pretty good and will, for the most
    part, show you the effect of changes to your XAML files in real time. As [Figure
    1-4](#9781430250340_Ch01.xhtml#Fig4) shows, Visual Studio reflected the addition
    of the `StackPanel` and `Button` elements on its XAML design surface. This isn’t
    the same as running the app, but it is a broadly faithful representation, and
    this feature isn’t available for interfaces created in C#. (The buttons are quite
    small, so I have magnified them in the figure to make them easier to see).


    ![9781430250340_Fig01-04.jpg](images/9781430250340_Fig01-04.jpg)


    [Figure 1-4](#9781430250340_Ch01.xhtml#_Fig4).  Visual Studio reflecting the contents
    of a XAML file on its design surface


    Although XAML tends to be verbose, Visual Studio does a lot to make creating and
    editing it easier; it has some excellent autocomplete features that offer suggestions
    for tag names, attributes, and values. You can also design an interface by dragging
    controls from the Toolbox directly onto the design surface and configuring them
    using the Properties window. If neither of those approaches suits you, there is
    support for creating the XAML for apps in Blend for Visual Studio, which was installed
    on your machine as part of the Visual Studio setup. I favor writing the XAML directly
    in the code editor, but then I am crusty old-school programmer who has never really
    trusted visual design tools, even though they have become pretty good in recent
    years. You may not be quite as resistant to change, and you should try the different
    styles of UI development to see which suits you. For the purposes of this book,
    I’ll show you changes to the XAML directly.


    Configuring Controls in XAML


    You configure Windows app UI controls by setting attributes on the corresponding
    XAML element. So, for example, I wanted the `StackPanel` to center its child controls.
    To do this, I set values for the `HorizontalAlignment` and `VerticalAlignment`
    attributes, like this:


    ```

    ...

    <StackPanel HorizontalAlignment="Center" VerticalAlignment="Center" >

    ...

    ```


    Applying Styles


    Attributes are also used to apply styles to UI controls. As an example, I applied
    the `TextButtonStyle` that is defined by Microsoft in the `StandardStyles.xaml`
    file:


    ```

    ...

    <Button Style="{StaticResource TextButtonStyle}" HorizontalAlignment="Center"

    Click="ButtonClick">Or Click Me!</Button>

    ...

    ```


    There are different ways to define and reference styles in XAML. I have used `StaticResource`
    to specify the style I want, but there are options for getting the style information
    from all sorts of sources. I am going to keep things simple in this book and stick
    to the basics wherever possible, focusing on the features that are specific to
    Windows apps.


    Specifying Event Handlers


    To specify a handler method for an event, you simply use the element attribute
    that corresponds to the event you require, like this:


    ```

    ...

    <Button x:Name="FirstButton" HorizontalAlignment="Center"

        Click="ButtonClick" >Click Me!</Button>

    ...

    ```


    I have specified that the `click` event (which is triggered when the user clicks
    the button) will be handled by the `ButtonClick` method. Visual Studio will offer
    to create an event handler method for you when you apply an event attribute; I’ll
    show you the other side of this relationship in in the next section.


    Configuring Controls in Code


    XAML relies on some clever compiler tricks and a C# feature known as *partial*
    classes. The markup in a XAML file is converted and combined with the code-behind
    file to create a single .NET class. This can seem a bit odd at first, but it does
    allow for a nice hybrid model where you can define and configure controls in XAML,
    the code-behind C# class, or both.'
  trans: "\n# 探索 `StandardStyles.xaml` 文件\n\n`Common` 文件夹包含 Visual Studio 项目模板使用的文件。当使用空白应用模板时，该文件夹中唯一的文件是\
    \ `StandardStyles.xaml`，即 `App.xaml` 文件中引用的资源字典文件（如代码清单 1-2 所示）。`StandardStyles.xaml`\
    \ 文件包含一些样式和模板，可帮助您更轻松地创建外观与更广泛的 Windows 应用外观和感觉保持一致的应用。我不会列出完整的文件，因为它包含大量内容，但代码清单\
    \ 1-6 显示了一个与文本相关的样式示例。\n\n***代码清单 1-6.*** 来自 `StandardStyles.xaml` 文件的一个样式\n\n\
    ```\n...\n<Style x:Key=\"HeaderTextStyle\" TargetType=\"TextBlock\"\n        BasedOn=\"\
    {StaticResource BaselineTextStyle}\">\n    <Setter Property=\"FontSize\" Value=\"\
    56\"/>\n    <Setter Property=\"FontWeight\" Value=\"Light\"/>\n    <Setter Property=\"\
    LineHeight\" Value=\"40\"/>\n    <Setter Property=\"RenderTransform\">\n     \
    \   <Setter.Value>\n            <TranslateTransform X=\"-2\" Y=\"8\"/>\n     \
    \   </Setter.Value>\n    </Setter>\n</Style>\n...\n```\n\n![image](img/sq.jpg)\
    \ **警告**：不要编辑 `Common` 文件夹中的文件。我将在第 2 章中向您展示如何创建和引用自定义资源字典。\n\n# 探索 `Package.appxmanifest`\
    \ 文件\n\n最后一个值得一提的文件是*清单*，名为 `Package.appxmanifest`。这是一个 XML 文件，用于向 Windows 提供有关您的应用的信息。您可以将其作为原始\
    \ XML 文件进行编辑，但 Visual Studio 提供了一个更好的基于属性的编辑器。我将在后面的章节中再次回到这个文件，以配置一些应用设置。\n\n\
    # 极简 XAML 概述\n\n如果您以前从未使用过 XAML，请不要担心。创建 Windows 应用的学习曲线会稍陡一些，但您也有优势，即不会期待其他 XAML\
    \ 应用程序类型中那些在 Windows 应用开发中不存在的功能。\n\n其核心在于，XAML 以声明方式创建用户界面，而不是通过代码。因此，如果我想要向项目添加几个按钮控件，我会在\
    \ XAML 文件中添加一些标记，如代码清单 1-7 所示。\n\n***代码清单 1-7.*** 向 XAML 文档添加控件\n\n```\n<Page\n\
    \    x:Class=\"GrocerApp.MainPage\"\n    xmlns=\" http://schemas.microsoft.com/winfx/2006/xaml/presentation\
    \  \"\n    xmlns:x=\" http://schemas.microsoft.com/winfx/2006/xaml \"\n    xmlns:local=\"\
    using:GrocerApp\"\n    xmlns:d=\" http://schemas.microsoft.com/expression/blend/2008\
    \  \"\n    xmlns:mc=\" http://schemas.openxmlformats.org/markup-compatibility/2006\
    \  \"\n    mc:Ignorable=\"d\">\n\n<Grid Background=\"{StaticResource ApplicationPageBackgroundThemeBrush}\"\
    >\n        <StackPanel HorizontalAlignment=\"Center\" VerticalAlignment=\"Center\"\
    >\n            <Button x:Name=\"FirstButton\" HorizontalAlignment=\"Center\"\n\
    \                    Click=\"ButtonClick\">Click Me!</Button>\n            <Button\
    \ Style=\"{StaticResource TextButtonStyle}\"\n                    HorizontalAlignment=\"\
    Center\"\n                    Click=\"ButtonClick\">Or Click Me!</Button>\n  \
    \      </StackPanel>\n    </Grid>\n</Page>\n```\n\nXAML 元素中的标记名称指定将添加到布局中的控件。我向项目中添加了一个\
    \ `StackPanel` 和两个 `Button` 控件。`StackPanel` 是一个简单的容器，有助于为布局增加结构；它将其子控件沿水平或垂直线（即*堆叠*）定位。`Button`\
    \ 控件正是您所期望的那样：一个在用户点击时触发事件的按钮。\n\nXML 的层次结构性质被转化为 UI 控件的层次结构。通过将 `Button` 元素放置在\
    \ `StackPanel` 内部，我指定了 `StackPanel` 负责 `Button` 元素的布局。\n\n# 使用 Visual Studio 设计图面\n\
    \n您可以在 Windows 应用项目中完全使用 C# 完成所有操作，而完全不使用 XAML。但采用 XAML 有一些令人信服的理由。主要优势在于 Visual\
    \ Studio 中对 XAML 的设计支持相当不错，并且在大多数情况下，会实时向您展示 XAML 文件更改的效果。如图 1-4 所示，Visual Studio\
    \ 在其 XAML 设计图面上反映了 `StackPanel` 和 `Button` 元素的添加。这与运行应用并不完全相同，但它是一个大致忠实的表示，并且此功能对于在\
    \ C# 中创建的界面是不可用的。（按钮非常小，所以我在图中放大了它们以便于查看）。\n\n![9781430250340_Fig01-04.jpg](img/9781430250340_Fig01-04.jpg)\n\
    \n图 1-4。Visual Studio 在其设计图面上反映 XAML 文件的内容\n\n尽管 XAML 往往比较冗长，但 Visual Studio 做了大量工作来简化其创建和编辑；它具有一些出色的自动补全功能，可为标记名称、属性和值提供建议。您还可以通过将控件从工具箱直接拖放到设计图面上，并使用“属性”窗口进行配置来设计界面。如果这两种方法都不适合您，还有支持在\
    \ Blend for Visual Studio 中为应用创建 XAML 的功能，该工具已作为 Visual Studio 设置的一部分安装在您的机器上。我倾向于直接在代码编辑器中编写\
    \ XAML，但话说回来，我是一个顽固的老派程序员，一直不太信任可视化设计工具，尽管近年来它们已经变得相当不错。您可能没那么抗拒变化，应该尝试不同的 UI\
    \ 开发风格，看看哪种适合您。出于本书的目的，我将直接向您展示对 XAML 的更改。\n\n# 在 XAML 中配置控件\n\n您通过设置相应 XAML 元素的属性来配置\
    \ Windows 应用 UI 控件。例如，我希望 `StackPanel` 居中其子控件。为此，我设置了 `HorizontalAlignment` 和\
    \ `VerticalAlignment` 属性的值，如下所示：\n\n```\n...\n<StackPanel HorizontalAlignment=\"\
    Center\" VerticalAlignment=\"Center\" >\n...\n```\n\n# 应用样式\n\n属性也用于将样式应用于 UI\
    \ 控件。例如，我应用了微软在 `StandardStyles.xaml` 文件中定义的 `TextButtonStyle`：\n\n```\n...\n\
    <Button Style=\"{StaticResource TextButtonStyle}\" HorizontalAlignment=\"Center\"\
    \nClick=\"ButtonClick\">Or Click Me!</Button>\n...\n```\n\n在 XAML 中定义和引用样式有不同的方法。我使用了\
    \ `StaticResource` 来指定我想要的样式，但也有从各种来源获取样式信息的选项。在本书中，我将保持简单，尽可能坚持基础，重点关注特定于 Windows\
    \ 应用的功能。\n\n# 指定事件处理程序\n\n要为事件指定处理方法，您只需使用与所需事件对应的元素属性即可，如下所示：\n\n```\n...\n<Button\
    \ x:Name=\"FirstButton\" HorizontalAlignment=\"Center\"\n    Click=\"ButtonClick\"\
    \ >Click Me!</Button>\n...\n```\n\n我已经指定 `click` 事件（在用户点击按钮时触发）将由 `ButtonClick`\
    \ 方法处理。当您应用事件属性时，Visual Studio 会为您创建一个事件处理方法；我将在下一节向您展示此关系的另一面。\n\n# 在代码中配置控件\n\
    \nXAML 依赖于一些巧妙的编译器技巧和一个称为*分部*类的 C# 功能。XAML 文件中的标记被转换并与代码隐藏文件合并，以创建一个单独的 .NET 类。这乍一看可能有点奇怪，但它确实允许一种良好的混合模型，您可以在\
    \ XAML、代码隐藏 C# 类或两者中定义和配置控件。\n"
- fmt: "\nThe simplest way of demonstrating this relationship is to show you the implementation\
    \ of the event handler that I specified for the `Button` elements in the XAML\
    \ file.\n\n[Listing 1-8](#9781430250340_Ch01.xhtml#list8) shows the `MainPage.xaml.cs`\
    \ file, which is the code-behind file for `MainPage.xaml`.\n\n**[Listing 1-8](#9781430250340_Ch01.xhtml#_list8).**\
    \  The MainPage.xaml.cs File\n\n```\nusing System;\nusing System.Collections.Generic;\n\
    using System.IO;\nusing System.Linq;\nusing Windows.Foundation;\nusing Windows.Foundation.Collections;\n\
    using Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\nusing Windows.UI.Xaml.Controls.Primitives;\n\
    using Windows.UI.Xaml.Data;\nusing Windows.UI.Xaml.Input;\nusing Windows.UI.Xaml.Media;\n\
    using Windows.UI.Xaml.Navigation;\n\nnamespace GrocerApp {\n    public sealed\
    \ partial class MainPage : Page {\n        public MainPage() {\n            this.InitializeComponent();\n\
    \        }\n\nprotected override void OnNavigatedTo(NavigationEventArgs e) {\n\
    \        }\n\nprivate void ButtonClick(object sender, RoutedEventArgs e) {\n \
    \           System.Diagnostics.Debug.WriteLine(\"Button Clicked: \"\n        \
    \        + ((Button)e.OriginalSource).Content);\n        }\n    }\n}\n```\n\n\
    I am able to refer to the `ButtonClick` method without any qualification in the\
    \ XAML file because the code generated from the XAML file is merged with the C#\
    \ code in the code-behind file to create a single class. The result is that when\
    \ one of the `Button` elements in the app layout is clicked, my C# `ButtonClick`\
    \ method is invoked.\n\n![image](images/sq.jpg) **Tip**   No console is available\
    \ for Windows apps, so use the static `System.Diagnostcs.Debug.WriteLine` method\
    \ if you want to write out messages to help figure out what’s going on in your\
    \ app. These are shown in the Visual Studio Output window, but only if you start\
    \ your app using Start With Debugging from the Visual Studio Debug menu.\n\nThis\
    \ relationship goes both ways. Notice that some of the elements in the XAML file\
    \ have an `x:Name` attribute, like this:\n\n```\n...\n<Button x:Name=\"FirstButton\"\
    \ HorizontalAlignment=\"Center\"\n    Click=\"ButtonClick\">Click Me!</Button>\n\
    ...\n```\n\nWhen you specify a value for this attribute, the compiler creates\
    \ a variable whose value is the UI control that was created from the XAML element.\
    \ This means you can supplement the XAML configuration of your controls with C#\
    \ code or change the configuration of elements programmatically. [Listing 1-9](#9781430250340_Ch01.xhtml#list9)\
    \ shows how I change the configuration of the button whose name is `FirstButton`\
    \ in the `ButtonClick` method defined in the `MainPage.xaml.cs` code-behind file.\n\
    \n**[Listing 1-9](#9781430250340_Ch01.xhtml#_list9).**  Configuring a Control\
    \ in Code in Response to an Event in the MainPage.xaml.cs File\n\n```\n...\nprivate\
    \ void ButtonClick(object sender, RoutedEventArgs e) {\n\nFirstButton.Content\
    \ = \"Pressed\";\n    FirstButton.FontSize = 50;\n\nSystem.Diagnostics.Debug.WriteLine(\"\
    Button Clicked: \"\n        + ((Button)e.OriginalSource).Content);\n}\n...\n```\n\
    \nI don’t have to qualify the control name in any way. In this example, I change\
    \ the contents of the button and the size of the font. Since these new statements\
    \ are in the `Click` event handler function, clicking either button will cause\
    \ the configuration of the `FirstButton` to change. That’s all you need to know\
    \ about XAML for the moment. To summarize:\n\n-   XAML is converted into code\
    \ and merged with the contents of the code-behind file to create a single .NET\
    \ class.\n-   You can configure UI controls in XAML or in code.\n-   Using XAML\
    \ lets you use the Visual Studio design tools, which are pretty good.\n\nXAML\
    \ may strike you as verbose and hard to read at first, but you will soon get used\
    \ to it. I find that it is a lot easier to work with XAML than using just C# code,\
    \ although I admit it took me quite some time with XAML before I decided that\
    \ was the case.\n\n## Running and Debugging a Windows App\n\nNow that I have a\
    \ very simple Windows app, it is time to focus on how to run and debug it. Visual\
    \ Studio provides three ways to run an app: on the local machine, on the simulator,\
    \ or on a remote machine.\n\nThe problem with the local machine is that development\
    \ PCs are rarely configured the way that user devices are. Unless you are targeting\
    \ your app at people with similar spec platforms, then testing on the local machine\
    \ doesn’t give you a representative view of how your app will behave.\n\nTesting\
