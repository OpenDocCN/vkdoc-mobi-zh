    \ in making your app consistent with the broader user experience, and I recommend\
    \ you take the time to ensure that the controls you display are always relevant\
    \ to the content and view the user is presented with. In the next chapter, I’ll\
    \ show you some features that allow your app to integrate into Windows: *tiles*\
    \ and *badges*.\n\n# CHAPTER 4\n\n![image](images/frontdot.jpg)\n\n## Views and\
    \ Tiles\n\nIn this chapter, I describe two of the features that allow an app to\
    \ fit into the wider user experience presented by Windows 8\\. The first of these\
    \ features is the way that apps can be *snapped* and *filled* so that two apps\
    \ can be viewed side by side. I show you how to adapt when your app is placed\
    \ into one of these layouts and how to change the layout when your interactions\
    \ don’t fit inside the view constraints.\n\nThe second feature is the *tile* model.\
    \ Tiles are at the heart of the Windows 8 replacement for the Start menu. At their\
    \ simplest, they are static buttons that can be used to launch your app, but with\
    \ a little work, they can present the user with an invaluable snapshot of the\
    \ state of your app, allowing the user to get an overview without having to run\
    \ the app itself. In this chapter, I show you how to create dynamic tiles by applying\
    \ updates and by using a related feature, *badges.* [Table 4-1](#9781430250340_Ch04.xhtml#Tab00041)\
    \ provides the summary for this chapter.\n\n[Table 4-1](#9781430250340_Ch04.xhtml#_Tab00041)\
    \ . Chapter Summary\n\n| Problem | Solution | Listing |\n| --- | --- | --- |\n\
    | Adapt an app’s layout when it has been placed into a snapped or filled view.\
    \ | Handle the `ViewStateChanged` event by modifying the layout of your controls.\
    \ | 1–3 |\n| Declare the adaptions required for view changes using XAML. | Use\
    \ the `VisualStateManage`. | 4, 5 |\n| Break out of the snapped view. | Use the\
    \ `TryUnsnap` method. | 6, 7 |\n| Create a live tile for an app. | Modify the\
    \ content of an XML template and use the classes in the `Windows.UI.Notification`\
    \ namespace. | 8–10 |\n| Update square and wide tiles. | Prepare updates for two\
    \ templates and merge them together. | 11, 12 |\n| Apply a badge to a tile | Populate\
    \ and apply an XML badge template | 13, 14 |\n\n## Supporting Views\n\nSo far,\
    \ my app has assumed that it has full and exclusive use of the display screen.\
    \ However, apps can be arranged by the number so that they are *snapped* or *filled*.\
    \ A snapped app occupies a 320-pixel strip at the left or right edge of the screen.\
    \ A filled app is displayed alongside a snapped app and occupies the entire screen\
    \ except for the 320-pixel strip. To demonstrate the different views, I have added\
    \ some content to the `DetailPage.xaml` file, as shown in [Listing 4-1](#9781430250340_Ch04.xhtml#list1).\
    \ (This is the file I added in the previous chapter to demonstrate navigation,\
    \ but it didn’t contain any functionality other than a simple message.)\n\n**[Listing\
    \ 4-1](#9781430250340_Ch04.xhtml#_list1).** Adding Content to the `DetailPage.xaml`\
    \ File\n\n```\n<Page\n    x:Class=\"GrocerApp.Pages.DetailPage\"\n    xmlns=\"\
    http://schemas.microsoft.com/winfx/2006/xaml/presentation\"\n    xmlns:x=\"http://schemas.microsoft.com/winfx/2006/xaml\"\
    \n    xmlns:local=\"using:GrocerApp.Pages\"\n    xmlns:d=\"http://schemas.microsoft.com/expression/blend/2008\"\
    \n    xmlns:mc=\"http://schemas.openxmlformats.org/markup-compatibility/2006\"\
    \n    mc:Ignorable=\"d\">\n\n<Grid x:Name=\"GridLayout\" Background=\"#71C524\"\
    >\n        <Grid.RowDefinitions>\n            <RowDefinition/>\n            <RowDefinition/>\n\
    \        </Grid.RowDefinitions>\n        <Grid.ColumnDefinitions>\n          \
    \  <ColumnDefinition/>\n            <ColumnDefinition/>\n        </Grid.ColumnDefinitions>\n\
    \n<StackPanel x:Name=\"TopLeft\" Background=\"#3E790A\">\n            <TextBlock\
    \ x:Name=\"TopLeftText\"\n                       Style=\"{StaticResource DetailViewLabelStyle}\"\
    \n                       Text=\"Top-Left\"/>\n        </StackPanel>\n\n<StackPanel\
    \ x:Name=\"TopRight\" Background=\"#70a524\" Grid.Column=\"1\"\n             \
    \       Grid.Row=\"0\">\n            <TextBlock x:Name=\"TopRightText\"\n    \
    \                   Style=\"{StaticResource DetailViewLabelStyle}\"\n        \
    \               Text=\"Top-Right\"/>\n        </StackPanel>\n\n<StackPanel x:Name=\"\
    BottomLeft\" Background=\"#1E3905\" Grid.Row=\"1\">\n            <TextBlock x:Name=\"\
    BottomLeftText\"\n                       Style=\"{StaticResource DetailViewLabelStyle}\"\
    \n                       Text=\"Bottom-Left\"/>\n        </StackPanel>\n\n<StackPanel\
    \ x:Name=\"BottomRight\" Background=\"#45860B\" Grid.\n                    Column=\"\
    1\" Grid.Row=\"1\">\n            <TextBlock x:Name=\"BottomRightText\"\n     \
    \                  Style=\"{StaticResource DetailViewLabelStyle}\"\n         \
    \              Text=\"Bottom-Right\"/>\n        </StackPanel>\n    </Grid>\n</Page>\n\
    ```\n\nI have defined a new style called `DetailViewLabelStyle` for this page\
    \ in the `/Resources/GrocerResourceDictionary.xaml` file, as shown in [Listing\
    \ 4-2.](#9781430250340_Ch04.xhtml#list2)\n\n**[Listing 4-2](#9781430250340_Ch04.xhtml#_list2).**\
    \ Adding the `DetailViewLabelStyle` Style\n\n```\n. . .\n<Style x:Key=\"DetailViewLabelStyle\"\
    \ TargetType=\"TextBlock\"\n        BasedOn=\"{StaticResource HeaderTextStyle}\"\
    >\n    <Setter Property=\"FontSize\" Value=\"50\"/>\n    <Setter Property=\"Margin\"\
