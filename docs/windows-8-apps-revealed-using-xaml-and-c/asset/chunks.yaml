  raw: 'To help work around this problem, the `SuspendingEventArgs.SuspendingOperation.GetDeferral`
    method tells the Windows runtime that I am not quite ready for my app to be suspended
    and that I need a little more time. This gives me a short window in which to wait
    for my task to complete. The `GetDeferral` method returns a `SuspendingDeferral`
    object, and I call its `Complete` method when I am ready for my app to be suspended.


    Asking for a deferral grants an extra five seconds to prepare for suspension.
    This may not sound like a lot, but it is pretty generous given that Window may
    be under a lot of pressure to get your app out of the way to make system resources
    available.


    Dispatching the UI Update


    One other aspect of [Listing 5-6](#9781430250340_Ch05.xhtml#list6) that is worth
    noting is this:


    ```

    . . .

    await frame.Dispatcher.RunAsync(CoreDispatcherPriority.Normal,

        async () => {

            viewModel.Location = await Location.TrackLocation();

    });

    . . .

    ```


    Windows will allow updates to UI controls to be made only from a designated thread;
    this is the thread that was used to instantiate my app. If I update my view model
    from my background task, the events that are emitted because of the update ultimately
    result in the wrong thread attempting to update the data binding and display the
    location to the user. This results in an exception that will be reported with
    this kind of detailed message:


    ```

    The application called an interface that was marshalled for a different thread

    ```


    I need to make sure that I use a `Dispatcher` to push my updates on the correct
    thread. However, there isn’t a `Dispatcher` available within the `Application`
    class that my `App` class is derived from. To solve this problem, I use the `Dispatcher`
    from the `Frame` control that is created in the `OnLaunched` method.


