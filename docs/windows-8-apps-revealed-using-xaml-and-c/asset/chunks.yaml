    \n## Summary\n\nIn this chapter, I have shown you how to use the life-cycle events\
    \ to respond to the way in which Windows manages apps. I described the key events\
    \ and showed you how to respond to them to ensure that you app is receiving and\
    \ processing them correctly.\n\nParticular care must be taken to cleanly wrap\
    \ up background tasks when an app is being suspended, and I showed you how to\
    \ get control of this process by requesting a suspension deferral, allowing an\
    \ extra few seconds to minimize the risk of potential errors or stale data when\
    \ the app is resumed.\n\nFinally, I showed you how life-cycle events allow you\
    \ to fulfill the contracts that bind an app to the wider Windows platform and\
    \ how easy it is to meet the obligations those contracts specify. I showed you\
    \ the search contract, but there are several others, and I recommend you take\
    \ the time to explore them fully. The more contracts you implement, the more integrated\
    \ your app becomes with the rest of Windows and with other integrated apps.\n\n\
    In this book, I set out to show you the core system features that will jump start\
    \ your app development. I have shown you how to use data bindings, how to use\
    \ the major structural controls, how to deal with snapped and filled layouts,\
    \ how to customize your app’s tile, and, in this chapter, how to take control\
    \ of the app life cycle. With these skills as your foundation, you will be able\
    \ to create rich and expressive apps and get a head start on Windows 8 development.\
