  trans: "\n图 3-4. 页面特定的`NavBar`与`AppBar`一同显示\n\n点击`NavBar`中的`Detail View`按钮，你将看到另一种视图，如图\
    \ 3-5 所示。\n\n![9781430250340_Fig03-05.jpg](img/9781430250340_Fig03-05.jpg)\n\n\
    图 3-5. 在应用中显示另一个内容视图\n\n这是一个很棒的功能，页面特定的`AppBar`与全应用范围的导航控件无缝集成。你可以通过在包装页面中声明一个`AppBar`，为整个应用实现统一的`AppBar`。如果这样做，你就需要负责确保根据需要从`AppBar`中添加或移除按钮。\n\
    \n## 本章小结\n\n在本章中，我向你展示了如何创建`AppBar`、`NavBar`和浮出控件，它们是构成 Windows 8 应用用户体验的关键部分。实现这些交互对于让你的应用与更广泛的用户体验保持一致非常重要，我建议你花些时间确保所显示的控件始终与用户当前面对的内容和视图相关。在下一章中，我将介绍一些让你的应用能够集成到\
    \ Windows 系统中的功能：*磁贴*和*徽章*。\n\n# 第 4 章\n\n![image](img/frontdot.jpg)\n\n## 视图与磁贴\n\
    \n在本章中，我将介绍两种让应用能够融入 Windows 8 所提供的更广泛用户体验的功能。第一个功能是应用可以*贴靠*和*填充*，从而让两个应用并排显示。我将展示当你的应用被置于这些布局之一时如何进行调整，以及当你的交互操作不适合视图限制时如何更改布局。\n\
    \n第二个功能是*磁贴*模型。磁贴是 Windows 8 取代“开始”菜单的核心。简单来说，它们是用于启动应用的静态按钮，但稍加处理，它们就能为用户提供应用状态的宝贵快照，让用户无需运行应用即可大致了解情况。在本章中，我将展示如何通过应用更新以及使用相关功能*徽章*来创建动态磁贴。表\
    \ 4-1 提供了本章的总结。\n\n表 4-1. 本章总结\n\n| 问题 | 解决方案 | 代码清单 |\n| --- | --- | --- |\n\
    | 当应用被置于贴靠或填充视图时，调整其布局。 | 通过修改控件的布局来处理`ViewStateChanged`事件。 | 1–3 |\n| 使用 XAML\
    \ 声明视图变化所需的调整。 | 使用`VisualStateManage`。 | 4, 5 |\n| 退出贴靠视图。 | 使用`TryUnsnap`方法。\
    \ | 6, 7 |\n| 为应用创建动态磁贴。 | 修改 XML 模板的内容，并使用`Windows.UI.Notification`命名空间中的类。 |\
    \ 8–10 |\n| 更新方形和宽形磁贴。 | 为两个模板准备更新并将它们合并在一起。 | 11, 12 |\n| 为磁贴应用徽章 | 填充并应用一个 XML\
    \ 徽章模板 | 13, 14 |\n\n## 支持视图\n\n到目前为止，我的应用一直假设它可以独占整个显示屏。然而，应用可以通过鼠标手势进行排列，使其处于*贴靠*或*填充*状态。贴靠的应用会占据屏幕左边缘或右边缘一个\
    \ 320 像素的条带。填充的应用则与贴靠的应用并排显示，占据除 320 像素条带之外的整个屏幕。为了演示不同的视图，我在`DetailPage.xaml`文件中添加了一些内容，如代码清单\
    \ 4-1 所示。（这是我在上一章中添加的用于演示导航的文件，但之前除了显示一条简单消息外，它没有任何其他功能。）\n\n**代码清单 4-1.** 向`DetailPage.xaml`文件添加内容\n\
    \n```\n<Page\n    x:Class=\"GrocerApp.Pages.DetailPage\"\n    xmlns=\"http://schemas.microsoft.com/winfx/2006/xaml/presentation\"\
    \n    xmlns:x=\"http://schemas.microsoft.com/winfx/2006/xaml\"\n    xmlns:local=\"\
    using:GrocerApp.Pages\"\n    xmlns:d=\"http://schemas.microsoft.com/expression/blend/2008\"\
    \n    xmlns:mc=\"http://schemas.openxmlformats.org/markup-compatibility/2006\"\
    \n    mc:Ignorable=\"d\">\n\n<Grid x:Name=\"GridLayout\" Background=\"#71C524\"\
    >\n        <Grid.RowDefinitions>\n            <RowDefinition/>\n            <RowDefinition/>\n\
    \        </Grid.RowDefinitions>\n        <Grid.ColumnDefinitions>\n          \
    \  <ColumnDefinition/>\n            <ColumnDefinition/>\n        </Grid.ColumnDefinitions>\n\
    \n<StackPanel x:Name=\"TopLeft\" Background=\"#3E790A\">\n            <TextBlock\
    \ x:Name=\"TopLeftText\"\n                       Style=\"{StaticResource DetailViewLabelStyle}\"\
    \n                       Text=\"左上\"/>\n        </StackPanel>\n\n<StackPanel x:Name=\"\
    TopRight\" Background=\"#70a524\" Grid.Column=\"1\"\n                    Grid.Row=\"\
    0\">\n            <TextBlock x:Name=\"TopRightText\"\n                       Style=\"\
    {StaticResource DetailViewLabelStyle}\"\n                       Text=\"右上\"/>\n\
    \        </StackPanel>\n\n<StackPanel x:Name=\"BottomLeft\" Background=\"#1E3905\"\
    \ Grid.Row=\"1\">\n            <TextBlock x:Name=\"BottomLeftText\"\n        \
    \               Style=\"{StaticResource DetailViewLabelStyle}\"\n            \
    \           Text=\"左下\"/>\n        </StackPanel>\n\n<StackPanel x:Name=\"BottomRight\"\
    \ Background=\"#45860B\" Grid.\n                    Column=\"1\" Grid.Row=\"1\"\
    >\n            <TextBlock x:Name=\"BottomRightText\"\n                       Style=\"\
    {StaticResource DetailViewLabelStyle}\"\n                       Text=\"右下\"/>\n\
    \        </StackPanel>\n    </Grid>\n</Page>\n```\n\n我在`/Resources/GrocerResourceDictionary.xaml`文件中为这个页面定义了一个名为`DetailViewLabelStyle`的新样式，如代码清单\
    \ 4-2 所示。\n\n**代码清单 4-2.** 添加`DetailViewLabelStyle`样式\n\n```\n. . .\n<Style x:Key=\"\
    DetailViewLabelStyle\" TargetType=\"TextBlock\"\n        BasedOn=\"{StaticResource\
    \ HeaderTextStyle}\">\n    <Setter Property=\"FontSize\" Value=\"50\"/>\n    <Setter\
    \ Property=\"Margin\" Value=\"10\"/>\n    <Setter Property=\"HorizontalAlignment\"\
    \ Value=\"Left\"/>\n</Style>\n. . .\n```\n\n这个布局创建了一个简单的彩色网格。你可以通过启动应用，并使用我在上一章中添加的`NavBar`，点击`Detail\
    \ View`按钮进行导航，来查看这个新内容。\n\n图 4-1 显示了应用处于填充和贴靠视图下的状态。剩余空间部分是一个用于报告其自身视图的简单应用。我将其用于测试，并已包含在本书的源代码下载包中，你可以从\
    \ Apress.com 获取。\n\n![9781430250340_Fig04-01.jpg](img/9781430250340_Fig04-01.jpg)\n\
    \n图 4-1. 示例应用在填充视图和贴靠视图下的显示\n\n![image](img/sq.jpg) **注意：** 应用仅在横向视图下才能贴靠，并且只有当显示屏的水平分辨率为\
    \ 1366 像素或更高时，Windows 8 才支持贴靠功能。如果你想尝试贴靠操作，必须确保在模拟器中选择了正确的方向和分辨率。\n\n为容纳贴靠应用而损失\
    \ 320 像素，对大多数应用来说不会造成太大干扰。问题开始出现是当你的应用从填充视图移动到贴靠视图时，你可以在图的右侧看到这一点。显然，应用需要适应新的视图，在接下来的章节中，我将向你展示可用于实现这一点的不同机制。\n\
    \n![image](img/sq.jpg) **提示：** 你可以按`Win+.`（Windows 键和句点键）来切换应用的不同视图。每次按下这些键，应用将循环进入一个新视图。\n\
    \n### 在代码中响应视图变化\n"
- fmt: "You monitor changes in the view through the `Page.SizeChanged` event. By handling\
    \ this event, you can determine the current view through the `Windows.UI.ViewManagement.ApplicationView.Value`\
    \ property and reconfigure your app as required. [Listing 4-3](#9781430250340_Ch04.xhtml#list3)\
    \ shows the code for the `DetailPage` page, with additions to handle this event.\n\
    \n**[Listing 4-3](#9781430250340_Ch04.xhtml#_list3).** *Controlling the View in\
    \ the `DetailPage` Code-Behind Class*\n\n```\nusing Windows.UI.ViewManagement;\n\
    using Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\nusing Windows.UI.Xaml.Navigation;\n\
    \nnamespace GrocerApp.Pages {\n    public sealed partial class DetailPage : Page\
    \ {\n\n        public DetailPage() {\n            this.InitializeComponent();\n\
    \            SizeChanged += DetailPage_SizeChanged;\n        }\n\n        void\
    \ DetailPage_SizeChanged(object sender, SizeChangedEventArgs e) {\n          \
    \  if (ApplicationView.Value == ApplicationViewState.Snapped) {\n            \
    \    GridLayout.ColumnDefinitions[0].Width\n                    = new GridLength(0);\n\
    \            } else {\n                GridLayout.ColumnDefinitions[0].Width\n\
    \                    = new GridLength(1, GridUnitType.Star);\n            }  \
    \           \n        }\n\n        protected override void OnNavigatedTo(NavigationEventArgs\
    \ e) {\n        }\n    }\n}\n```\n\nThe `ApplicationView.Value` property returns\
    \ a value from the `ApplicationViewState` enumeration, describing the current\
    \ view. The values in this enumeration are `Snapped`, `Filled`, `FullScreenPortrait`,\
    \ and `FullScreenLandscape`; these last two allow you to differentiate between\
    \ the landscape and portrait modes when the app is shown full-screen.\n\nIn my\
    \ example, the `DetailPage_SizeChanged` method determines the kind of view being\
    \ used and adapts the app layout accordingly. If the app is being shown in the\
    \ snapped view, then I set the width of the first column in my grid to zero. Your\
    \ app state isn’t reset automatically when the app is restored to the full-screen\
    \ view, so you must also define code to handle the other event states. In this\
    \ case, for any other view but snapped, I reset the width of the column. (The\
    \ syntax for working with columns is awkward, but you get the idea.) You can see\
    \ the change in the snapped view in [Figure 4-2](#9781430250340_Ch04.xhtml#Fig00042).\n\
    \n![9781430250340_Fig04-02.jpg](images/9781430250340_Fig04-02.jpg)\n\n**[Figure\
    \ 4-2](#9781430250340_Ch04.xhtml#_Fig00042).** *Adapting to the restrictions of\
    \ the snapped view*\n\nRather than squishing everything into a tiny window, I\
    \ have shown only part of my app. Showing reduced functionality is the most sensible\
    \ way of dealing with the relatively small amount of screen space that a snapped\
    \ app has access to. You will be surprised just how much you can pack into this\
    \ space, but it just isn’t the same as having access to the full screen.\n\n##\
    \ Responding to View Changes in XAML\n\nYou can set out the changes you want to\
    \ make to your app using XAML. The XAML syntax for this is verbose, hard to read,\
    \ and more difficult to work with—so much so that I recommend you stick with the\
    \ code approach. But for completeness, [Listing 4-4](#9781430250340_Ch04.xhtml#list4)\
    \ shows how I can specify the changes I want using XAML.\n\n![image](images/sq.jpg)\
    \ **Note**  The `VisualStateManager` feature, which is what this XAML uses, is\
    \ a standard WPF and Silverlight feature. It has a lot of features, and I am unable\
    \ to give it full attention in this book. My advice is to use the code-based approach,\
    \ but if you are a true XAML fan, then you can see the WPF or Silverlight documentation\
    \ for further details of the elements you can use.\n\n**[Listing 4-4](#9781430250340_Ch04.xhtml#_list4).**\
    \ *Defining View Changes in XAML*\n\n```\n<Page\n    x:Class=\"GrocerApp.Pages.DetailPage\"\
    \n    xmlns=\" http://schemas.microsoft.com/winfx/2006/xaml/presentation \"\n\
    \    xmlns:x=\" http://schemas.microsoft.com/winfx/2006/xaml \"\n    xmlns:local=\"\
    using:GrocerApp.Pages\"\n    xmlns:d=\" http://schemas.microsoft.com/expression/blend/2008\
    \ \"\n    xmlns:mc=\" http://schemas.openxmlformats.org/markup-compatibility/2006\
    \ \"\n    mc:Ignorable=\"d\">\n\n    <Grid x:Name=\"GridLayout\" Background=\"\
    #71C524\">\n\n        <VisualStateManager.VisualStateGroups>\n            <VisualStateGroup\
    \ x:Name=\"OrientationStates\">\n                <VisualState x:Name=\"Snapped\"\
    >\n                    <Storyboard>\n                        <ObjectAnimationUsingKeyFrames\n\
    \                                Storyboard.TargetProperty=\"Grid.\n         \
    \                       ColumnDefinitions[0].Width\"\n                       \
    \         Storyboard.TargetName=\"GridLayout\">\n                            <DiscreteObjectKeyFrame\
    \ KeyTime=\"0\">\n                                <DiscreteObjectKeyFrame.Value>\n\
    \                                    <GridLength>0</GridLength>\n            \
    \                    </DiscreteObjectKeyFrame.Value>\n                       \
    \     </DiscreteObjectKeyFrame>\n                        </ObjectAnimationUsingKeyFrames>\n\
    \                    </Storyboard>\n                </VisualState>\n\n       \
    \         <VisualState x:Name=\"Others\">\n                    <Storyboard>\n\
    \                        <ObjectAnimationUsingKeyFrames\n                    \
    \            Storyboard.TargetProperty=\"Grid.\n                             \
    \   ColumnDefinitions[0].Width\"\n                                Storyboard.TargetName=\"\
    GridLayout\">\n                            <DiscreteObjectKeyFrame KeyTime=\"\
    0\">\n                                <DiscreteObjectKeyFrame.Value>\n       \
    \                             <GridLength>*</GridLength>\n                   \
    \             </DiscreteObjectKeyFrame.Value>\n                            </DiscreteObjectKeyFrame>\n\
    \                        </ObjectAnimationUsingKeyFrames>\n                  \
    \  </Storyboard>\n                </VisualState>\n            </VisualStateGroup>\n\
    \        </VisualStateManager.VisualStateGroups>\n\n        <Grid.RowDefinitions>\n\
    \            <RowDefinition/>\n            <RowDefinition/>\n        </Grid.RowDefinitions>\n\
    \        <Grid.ColumnDefinitions>\n            <ColumnDefinition/>\n         \
    \   <ColumnDefinition/>\n        </Grid.ColumnDefinitions>\n\n        // ...StackPanel\
    \ elements removed for brevity...\n    </Grid>\n</Page>\n```\n\nIn this listing,\
    \ I have declared two `VisualState` elements. The first, `Snapped`, sets the width\
    \ of the first column to zero pixels. This is the state I will enter when the\
    \ app is snapped. The second is called `Others`, and it restores the width. This\
    \ is the state that I will enter when the app is not snapped. You can see what\
    \ I mean about verbosity; it takes me 31 lines of XAML to replace 8 lines of code.\n\
    \nAnd, I still have to handle the `SizeChanged` event so that I can enter the\
    \ XAML states I defined. [Listing 4-5](#9781430250340_Ch04.xhtml#list5) shows\
    \ the changes required to the code-behind file.\n\n**[Listing 4-5](#9781430250340_Ch04.xhtml#_list5).**\
    \ *Invoking the `VisualStateManager` in Response to the `SizeChanged` Event*\n\
    \n```\nusing Windows.UI.ViewManagement;\nusing Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\n\
    using Windows.UI.Xaml.Navigation;\n\nnamespace GrocerApp.Pages {\n    public sealed\
    \ partial class DetailPage : Page {\n\n        public DetailPage() {\n       \
    \     this.InitializeComponent();\n            SizeChanged += DetailPage_SizeChanged;\n\
    \        }\n\n        void DetailPage_SizeChanged(object sender, SizeChangedEventArgs\
    \ e) {\n            //if (ApplicationView.Value == ApplicationViewState.Snapped)\
    \ {\n            //    GridLayout.ColumnDefinitions[0].Width\n            // \
    \       = new GridLength(0);\n            //} else {\n            //    GridLayout.ColumnDefinitions[0].Width\n\
    \            //        = new GridLength(1, GridUnitType.Star);\n            //}\n\
    \n            string stateName = ApplicationView.Value ==\n                ApplicationViewState.Snapped\
    \ ? \"Snapped\" : \"Others\";\n            VisualStateManager.GoToState(this,\
    \ stateName, false);\n        }\n\n        protected override void OnNavigatedTo(NavigationEventArgs\
    \ e) {\n        }\n    }\n}\n```"
