  trans: "\n# 我的应用目前没有执行任何会受到应用挂起和恢复影响的任务，但我想向您展示如何测试这些事件\n\n为此，我通过更改视图模型中 `GroceryList`\
    \ 集合前两个项目的 `Name` 属性来响应 `Suspending` 和 `Resuming` 事件，以指示何时收到这些事件。\n\n## 模拟生命周期事件\n\
    \n模拟生命周期事件最简单的方法是使用 Visual Studio。当您使用调试器启动应用时，Visual Studio 会在工具栏上显示一个菜单，允许您将生命周期事件发送到应用，我在图\
    \ 5-1 中高亮显示了该菜单。\n\n![9781430250340_Fig05-01.jpg](img/9781430250340_Fig05-01.jpg)\n\
    \n图 5-1。向应用发送生命周期事件的 Visual Studio 按钮\n\n如果您选择菜单项来挂起然后恢复应用，您将看到视图模型数据的变化，如图 5-2\
    \ 所示。（直到您恢复应用后，您才会看到这些变化；一旦应用被挂起，将不再处理任何 UI 更新。）\n\n![9781430250340_Fig05-02.jpg](img/9781430250340_Fig05-02.jpg)\n\
    \n图 5-2。指示已收到生命周期事件\n\n## 测试生命周期事件\n\n模拟生命周期事件的问题在于，您得到的结果与事件自然发生时并不完全相同。要模拟实际情况，您需要在不使用调试器的情况下启动应用，这正是通过视图模型指示已收到事件非常有用的原因。创建触发事件的条件需要一些特定操作，我将在以下部分逐步说明。\n\
    \n### 激活应用\n\n要触发 `activated` 事件，请从 Visual Studio 的 **调试** 菜单中选择 **启动但不调试** 来启动应用。您也可以从\
    \ **开始** 屏幕启动应用，无论是在模拟器中还是在本地机器上。关键点在于不要使用调试器启动应用。\n\n### 挂起应用\n\n挂起应用最简单的方法是按下\
    \ `Win+D` 切换到桌面。打开 **任务管理器**，右键单击您的应用对应的项目，然后从弹出菜单中选择 **转到详细信息**。**任务管理器** 将切换到\
