    \n[Figure 3-1](#9781430250340_Ch03.xhtml#_Fig00031). Adding an `AppBar` to the\
    \ example app\n\n## Creating Flyouts\n\nThe Done `AppBar` button has a simple\
    \ action associated with it, which can be performed directly in the event handler\
    \ code associated with the `Click` event. Most `AppBar` buttons, however, require\
    \ some kind of additional user interaction, and this is performed using a *flyout*.\n\
    \nA flyout is a pop-up window that is displayed near the `AppBar` button that\
    \ has been clicked and that is dismissed automatically when the user clicks or\
    \ touches elsewhere on the screen. There is a `Flyout` control for JavaScript\
    \ Windows 8 apps, but getting the same effect with XAML and C# requires the use\
    \ of a `Popup` and some careful positioning code.\n\n### Creating the User Control\n\
    \nXAML files can quickly become long and difficult to manage. I like to define\
    \ my flyouts as *user controls*, which are like snippets of XAML elements and\
    \ a code-behind file. (I am skipping some XAML details here, but you’ll see what\
    \ I mean as you read this section of the chapter.) I have created a folder in\
    \ my example project called `Flyouts` and used the `UserControl` template to create\
    \ a new item called `HomeZipCodeFlyout.xaml`, the contents of which you can see\
    \ in [Listing 3-6](#9781430250340_Ch03.xhtml#list6).\n\n**[Listing 3-6](#9781430250340_Ch03.xhtml#_list6).**\
    \ The `HomeZipCodeFlyout.xaml` File\n\n```\n<UserControl\n    x:Class=\"GrocerApp.Flyouts.HomeZipCodeFlyout\"\
    \n    xmlns=\"http://schemas.microsoft.com/winfx/2006/xaml/presentation\"\n  \
    \  xmlns:x=\"http://schemas.microsoft.com/winfx/2006/xaml\"\n    xmlns:local=\"\
    using:GrocerApp.Flyouts\"\n    xmlns:d=\"http://schemas.microsoft.com/expression/blend/2008\"\
    \n    xmlns:mc=\"http://schemas.openxmlformats.org/markup-compatibility/2006\"\
    \n    mc:Ignorable=\"d\"\n    d:DesignHeight=\"300\"\n    d:DesignWidth=\"400\"\
    >\n\n    <Popup x:Name=\"HomeZipCodePopup\"\n           IsLightDismissEnabled=\"\
    True\" Width=\"350\" Height=\"130\">\n        <StackPanel Background=\"Black\"\
    >\n            <Border Background=\"#85C54C\" BorderThickness=\"4\">\n       \
    \         <StackPanel>\n                    <StackPanel Orientation=\"Horizontal\"\
    \ Margin=\"10\">\n                        <TextBlock Style=\"{StaticResource PopupTextStyle}\"\
    \n                                   Text=\"Home Zip Code:\"\n               \
    \                    VerticalAlignment=\"Center\"\n                          \
    \         Margin=\"0,0,10,0\" />\n                        <TextBox Height=\"40\"\
    \ Width=\"150\" FontSize=\"20\"\n                                 Text=\"{Binding\
    \ Path=HomeZipCode,\n                                      Mode=TwoWay}\" />\n\
    \                    </StackPanel>\n                    <Button Click=\"OKButtonClick\"\
    \n                            HorizontalAlignment=\"Center\"\n               \
    \             Margin=\"10\">OK</Button>\n                </StackPanel>\n     \
    \       </Border>\n        </StackPanel>\n    </Popup>\n</UserControl>\n```\n\n\
    As the file name suggests, this flyout will allow the user to change the value\
    \ of the `HomeZipCode` property in the view model. This property doesn’t do anything\
    \ in the example, other than provide an opportunity for some useful examples.\n\
    \nUser controls work like templates. Within the `UserControl` element, you define\
    \ the XAML elements that represent the controls you want to create. You must use\
    \ a `Popup` control when creating flyouts, but the content that you put inside\
    \ the `Popup` is up to you. My layout in the listing consists of a `TextBox` to\
    \ collect the new value from the user, a `Button` so that the user can indicate\
    \ when they have entered the new value, and some surrounding elements to provide\
    \ context and structure.\n\nThere are three important attributes that you must\
    \ set for your `Popup` element, each of which I have marked in bold in the listing.\
    \ The `IsLightDismissEnabled` attribute specifies whether the pop-up will be dismissed\
    \ if the user clicks or touches anywhere outside of the `Popup`; this must be\
