    # 关于技术审校


    **法比奥·克劳迪奥·费拉基亚蒂** 是一位资深顾问和高级分析师/开发者，专注于微软技术。他就职于 Brain Force（`www.brainforce.com`）的意大利分公司（`www.brainforce.it`）。他是微软认证解决方案开发专家（.NET）、微软认证应用程序开发专家（.NET）、微软认证专家，同时也是多产的技术作者和审校者。在过去十年中，他为意大利及国际杂志撰稿，并合著了十多本关于各种计算机主题的书籍。


    # 致谢


    我要感谢 Apress 出版社的每一位成员，感谢他们为本书的出版付出的辛勤努力。特别感谢 Mark Powers 让我保持正轨，以及 Ewan Buckingham
    对本书的委托和编辑。我还要感谢我的技术审校法比奥，他的努力使本书比原本好了很多。


    # 第 1 章：入门


    ![image](img/frontdot.jpg)


    Windows 应用商店应用是 Microsoft Windows 8 的重要补充，为桌面、平板电脑和智能手机提供了一个统一且一致的编程和交互模型基石。应用的用户体验与以往各代
    Windows 应用截然不同：Windows 应用商店应用采用全屏显示，并推崇一种简洁、直接、无干扰的风格。


    Windows 应用商店应用完全不同于以往版本的 Windows。它拥有全新的 API、新的交互控件，以及管理应用生命周期的截然不同的方法。


    Windows 应用商店应用可以使用多种语言进行开发，包括 JavaScript、Visual Basic、C++，以及本书主题 —— C#。Windows
    8 在现有基础之上，让开发者能够利用他们已有的 C# 和 XAML 经验来构建丰富的应用，并集成到更广泛的 Windows 平台中。本书将为您开启 Windows
    应用商店应用世界的关键入门之旅；阅读本书后，您将理解如何使用定义核心 Windows 应用商店应用体验的控件和功能。


    ![image](img/sq.jpg) **注意** —— 微软使用了 *Windows Store App* 这个术语，我觉得它有些别扭，因此无法在整本书中使用它。取而代之，我将使用
    *Windows 应用*，并且经常简称为 *应用*。我会让您自行在脑海中根据需要插入官方的微软名称。


    ## 关于本书


    本书面向希望抢先一步为 Windows 8 创建应用的资深 C# 开发者。我将解释您需要快速上手并提升应用开发技术和知识所需的概念和技巧。


    ## 阅读本书前需要了解什么？


    您需要对 C# 有良好的理解，并且理想情况下，还需要了解 XAML。如果您曾从事 WPF 或 Silverlight 项目，那么您将拥有足够的 XAML 知识来构建
    Windows 应用。如果您之前没有接触过 XAML，也不必担心；您可以边学边用，并且我将在本章稍后部分提供一个非常简短的概述帮助您入门。在用到主要 XAML
    概念时，我会进行说明。


    ## 阅读本书需要什么软件？


    开发 Windows 应用需要两样东西：一台运行 Windows 8 的 PC 和 Visual Studio 2012。如果您认真对待 Windows 应用开发，则需要购买一份
    Windows 8 副本；但如果您只是出于好奇，可以从微软获得 90 天试用版，地址为 `http://msdn.microsoft.com/en-us/evalcenter`。点击“Windows
    与平台开发”部分中的“发布”链接，即可找到所需内容。


    您需要创建一个微软账户才能获取评估版，但无论如何，您都需要一个账户才能注册为开发者。微软账户是免费创建的，如果您还没有账户，请按照相关说明进行操作。


    ![image](img/sq.jpg) **提示** —— 您可以在虚拟机中运行 Windows 8，但为了获得最佳效果，我建议将操作系统直接安装到 PC
    上。


    Visual Studio 2012 是微软的开发环境。好消息是，微软免费提供一款基础版本的 Visual Studio，我在本书中使用的正是这个版本。它有一个朗朗上口的名字：Visual
    Studio 2012 Express for Windows 8，您可以从 `www.microsoft.com/visualstudio/11/en-us/products/express`
    下载安装程序。提供了多种版本，每种版本可用于开发特定类型的应用程序。对于应用开发，您需要 Visual Studio Express 2012 for Windows
    8。不同版本的名称非常相似，容易混淆，请务必下载正确的版本。


    免费版本不具备某些付费版本 Visual Studio 中包含的所有测试和集成功能，但您不需要这些功能来创建 Windows 应用。在其他方面，免费版本的
    Visual Studio 功能齐全，能满足您的所有需求。


    ![image](img/sq.jpg) **提示** —— 如果您拥有付费版本的 Visual Studio 2012，不用担心。您不会用到该版本的所有功能，但本书中的所有说明和示例都能毫无问题地运行，也无需修改。

