    ***清单 3-14。** 在 XAML 中声明添加项目浮出控件*


    ```

    ...

    <flyouts:HomeZipCodeFlyout x:Name="HomeZipFlyout"/>

    <flyouts:AddItemFlyout x:Name="AddItemFlyout"/>

    ...

