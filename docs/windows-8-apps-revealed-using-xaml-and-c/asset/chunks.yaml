    \ = Window.Current.Content as Frame;\n\n            if (rootFrame == null) {\n\
    \                rootFrame = new Frame();\n                Window.Current.Content\
    \ = rootFrame;\n            }\n\n            if (rootFrame.Content == null) {\n\
    \n                if (!rootFrame.Navigate(typeof(Pages.MainPage), viewModel))\
    \ {\n                    throw new Exception(\"创建初始页面失败\");\n                }\n\
    \            }\n            Window.Current.Activate();\n            StartLocationTracking(rootFrame);\n\
    \        }\n\n        private void OnResuming(object sender, object e) {\n   \
    \         viewModel.Location = \"Unknown\";\n            StartLocationTracking(Window.Current.Content\
    \ as Frame);\n        }\n\n        private void OnSuspending(object sender, SuspendingEventArgs\
    \ e) {\n            StopLocationTracking();\n            SuspendingDeferral deferral\
    \ = e.SuspendingOperation.GetDeferral();\n            locationTask.Wait();\n \
    \           deferral.Complete();\n        }\n\n        private void StartLocationTracking(Frame\
    \ frame) {\n            locationTokenSource = new CancellationTokenSource();\n\
    \            CancellationToken token = locationTokenSource.Token;\n\n        \
    \    locationTask = new Task(async () => {\n                while (!token.IsCancellationRequested)\
    \ {\n                    await frame.Dispatcher.RunAsync(CoreDispatcherPriority.\n\
    \                    Normal,\n                        async () => {\n        \
    \                    viewModel.Location = await Location.\n                  \
    \          TrackLocation();\n                        });\n                   \
    \ token.WaitHandle.WaitOne(5000);\n                }\n            });\n      \
    \      locationTask.Start();\n        }\n\n        private void StopLocationTracking()\
    \ {\n            locationTokenSource.Cancel();\n        }\n    }\n}\n```\n\n对此类的更改代表了两种不同的活动。第一种是以后台任务的形式追踪用户位置，包含在`StartLocationTracking`和`StopLocationTracking`方法中。我希望你将这两个方法视为黑盒，因为我无法深入探讨我所依赖的\
    \ TPL 概念和特性。关键信息是：`StartLocationTracking`方法启动一个后台活动，每五秒报告一次位置；而`StopLocationTracking`方法则取消该任务。\n\
    \n我*真正*想讨论的是如何将这个后台任务与生命周期事件集成。响应应用启动或`Resuming`事件很简单；只需调用`StartLocationTracking`方法即可。\n\
    \n对于`Suspending`事件，我希望确保后台任务在应用挂起前已完成。如果不采取这一步，我就面临两种风险：要么在应用恢复时显示过期数据，要么因尝试读取网络请求（该请求可能已在应用挂起期间被服务器关闭）而导致错误。"
- fmt: '# To help work around this problem, the `SuspendingEventArgs.SuspendingOperation.GetDeferral`
    method tells the Windows runtime that I am not quite ready for my app to be suspended
    and that I need a little more time. This gives me a short window in which to wait
    for my task to complete. The `GetDeferral` method returns a `SuspendingDeferral`
    object, and I call its `Complete` method when I am ready for my app to be suspended.


    Asking for a deferral grants an extra five seconds to prepare for suspension.
    This may not sound like a lot, but it is pretty generous given that Window may
    be under a lot of pressure to get your app out of the way to make system resources
    available.


    ## Dispatching the UI Update


    One other aspect of [Listing 5-6](#9781430250340_Ch05.xhtml#list6) that is worth
    noting is this:


    ```

    . . .

    await frame.Dispatcher.RunAsync(CoreDispatcherPriority.Normal,

        async () => {

            viewModel.Location = await Location.TrackLocation();

    });

    . . .

    ```


    Windows will allow updates to UI controls to be made only from a designated thread;
    this is the thread that was used to instantiate my app. If I update my view model
    from my background task, the events that are emitted because of the update ultimately
    result in the wrong thread attempting to update the data binding and display the
    location to the user. This results in an exception that will be reported with
    this kind of detailed message:


    ```

    The application called an interface that was marshalled for a different thread

    ```


    I need to make sure that I use a `Dispatcher` to push my updates on the correct
    thread. However, there isn’t a `Dispatcher` available within the `Application`
    class that my `App` class is derived from. To solve this problem, I use the `Dispatcher`
    from the `Frame` control that is created in the `OnLaunched` method.


    ## Testing the Background Task


    All that remains is to test that the background task is meshing properly with
    the life-cycle events. The easiest way to do this is with the simulator, which
    supports simulated location data.


    Start by defining a location in the simulator (one of the buttons on the right
    side of the simulator window opens the Set Location dialog box into which you
    can enter a location).


    Once you have specified a location, start the app, remembering to do so without
    using the debugger. After a few seconds, you will see the location information
    displayed at the top of the app window, as shown in [Figure 5-4](#9781430250340_Ch05.xhtml#Fig00054).


    ![image](images/sq.jpg) **Tip** I have used the coordinates of the Empire State
    Building for this example. If you want to do the same, then use the Set Location
    dialog to specify a latitude value of 40.748 and a longitude of -73.98.


    ![9781430250340_Fig05-04.jpg](images/9781430250340_Fig05-04.jpg)


    [Figure 5-4](#9781430250340_Ch05.xhtml#_Fig00054). Displaying the location information
    to the user


    Switch to the desktop and use the Task Manager to monitor the app until it is
    suspended. While the app is suspended, use the simulator’s Set Location dialog
    to change the location.


    Resume the example app. The `Resuming` event will restart the background task,
    ensuring that fresh data is displayed.


    ![image](images/sq.jpg) **Tip** You may have to grant permission for the simulator
    and the app to access your location data. There is an automated process that checks
    the required settings and prompts you to make the required changes to your system
    configuration.


    ## Implementing a Contract


    `Suspending` and `Resuming` are not the only life-cycle events. There are others,
