    \ (args.PreviousExecutionState ==\n                    ApplicationExecutionState.Terminated)\n\
    {\n                    //TODO: Load state from previously suspended application\n\
                    }\n\n// Place the frame in the current Window\n                Window.Current.Content\
    \ = rootFrame;\n            }\n\nif (rootFrame.Content == null) {\n\nif (!rootFrame.Navigate(typeof(MainPage),\
    \ args.Arguments)) {\n                    throw new Exception(\"Failed to create\
    \ initial page\");\n                }\n            }\n            // Ensure the\
    \ current window is active\n            Window.Current.Activate();\n        }\n\
    \nprivate void OnSuspending(object sender, SuspendingEventArgs e) {\n            var\
    \ deferral = e.SuspendingOperation.GetDeferral();\n            //TODO: Save application\
    \ state and stop any background activity\n            deferral.Complete();\n        }\n\
        }\n} \n```\n\nWindows apps have a very specific life-cycle model, which is\
