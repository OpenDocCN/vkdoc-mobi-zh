    \n### 第 4 章：布局和磁贴\n\n`Windows` 应用的功能延伸到了 `Windows 8` 开始屏幕，它提供了多种方式向用户呈现附加信息。在本章中，我将向您展示如何创建和更新动态开始磁贴，以及如何为这些磁贴应用*徽章*。\n\
    \n我还将向您展示如何处理*贴靠*和*填充*布局，这些布局允许 `Windows 8` 用户并排使用两个 `Windows` 应用。您可以使用纯 `C#`\
    \ 代码或代码与 `XAML` 混合的方式来适应这些布局。我将向您展示这两种方法。\n\n### 第 5 章：应用生命周期和协定\n\n`Windows`\
    \ 对应用应用了一个非常特定的生命周期模型。在本章中，我将解释该模型的工作原理，向您展示如何接收和响应大多数生命周期事件，并解释如何管理*挂起*和*运行中*应用之间的转换。我将演示如何创建和管理异步任务，以及当您的应用被挂起时如何控制它们。最后，我将向您展示如何支持协定，这允许您的应用无缝集成到更广泛的\
    \ `Windows 8` 体验中。\n\n## 关于示例 Windows 应用的更多信息\n\n本书的示例应用是一个简单的购物清单管理器，名为 `GrocerApp`。作为一个独立的应用，`GrocerApp`\
