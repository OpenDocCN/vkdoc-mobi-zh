    The `TryUnsnap` method will change the view, but only in response to user interaction.
    You can’t change the view if the app is in the background, for example.


    Using Tiles and Badges


    Tiles are the representation of your app on the Start screen. At their simplest,
    tiles are static icons for starting your app. However, with a little effort, you
    can use your tile to present the user with a useful summary of your app’s state
    and to draw their attention to activities they may want to perform.


    In the sections that follow, I demonstrate how to present information through
    the tile of my example app. There are two possible, and conflicting, goals when
    you create a dynamic tile; you are either trying to encourage the user to run
    your app or dissuading them from running it. If you are trying to attract the
    user, then your tile becomes an advert for the experience, insights, or content
    that you offer. This is appropriate for entertainment apps or those that present
    external content such as news.


    Dissuading the user from running an app may seem like a strange goal, but it can
    significantly improve the user experience. Consider productivity apps as an example.
    I dread to think of the hours I have lost waiting for calendar or to-do apps to
    load just so I can check where my next appointment is or what my most urgent actions
    requires. You can reduce the friction and frustration that your users experience
    when using your app and create a more pleasing and immediate experience by displaying
    the information that the user needs in your app tile.


    Both goals require careful thought. The overall Windows 8 experience is flat,
    simple, and subdued. If you are using your tile as an ad, then the muted nature
    of Windows makes it easy to create tiles that stand out. If you go too far, though,
    you will create something that is discordant and jarring and is more of an eyesore
    than an attraction.


    If your goal is to reduce the number of times the user needs to run your app,
    then you need to present the right information at the right time. This requires
    a good understanding of what drives your users to adopt your app and the ability
    to customize the data that is presented. Adaptability is essential; there is no
    point showing me the most urgent work action on my task list on a Saturday morning,
    for example. Every time you present the user with the wrong information, you force
    them to run your app to get what they do need.


    ![image](images/sq.jpg) **Tip**   An app can update its tile only when it is running.
    In [Chapter 5](#9781430250340_Ch05.xhtml), I detail the app life cycle, and you
    will learn that apps are put into a suspended state when the user switches to
    another app. This means you can’t provide updates in the background. Windows 8
    supports a push model where you can send XML updates from the cloud, but this
    requires setting up server infrastructure to support your app.


    Improving Static Tiles


    The simplest way to improve the appearance of your app in the Start screen is
    to change the images used for your app’s tile. You should customize the images
    for your app, even if you don’t use any other tile features.


    To do this, you will need a set of three images of specific sizes: 30 by 30 pixels,
    150 by 150 pixels, and 310 by 150 pixels. These images should contain the logo
    or text you want to display but be otherwise transparent. I used a barcode motif
    for my example app, creating images called `tile30.png`, `tile150.png`, and `tile310.png`
    and placing them in the `Assets` folder of my Visual Studio project.


    To apply the new images, open the `Package.appxmanifest` file from the Solution
    Explorer. There is a Tile section on Application UI tab that has options to set
    the logo, wide logo, and small logo. There are hints to explain which size is
    required for each option. You will also have to set the background color that
    will be used for the tile; I set mine to the same color I use for the background
    of my app (the hex RGB value `#3E790A`), as shown in [Figure 4-3](#9781430250340_Ch04.xhtml#Fig00043).


    ![9781430250340_Fig04-03.jpg](images/9781430250340_Fig04-03.jpg)


    [Figure 4-3](#9781430250340_Ch04.xhtml#_Fig00043).  Applying images in the app
    manifest


    ![image](images/sq.jpg) **Tip**   It is important to set the background color
    in the manifest, rather than include a background in the images. When you update
    a tile, which I demonstrate in the next section, the image is replaced with dynamic
    information on a backdrop of the color specified in the manifest.


    You may have to uninstall your app from the start screen for the tile images to
    take effect. The next time you start your app from Visual Studio, you should see
    the new static tile; you can toggle between the standard and wide views by selecting
    the tile, right-clicking, and picking the Larger or Smaller buttons from the AppBar.
    You can see the square and wide tile formats for the example app in [Figure 4-4](#9781430250340_Ch04.xhtml#Fig00044).


    ![9781430250340_Fig04-04.jpg](images/9781430250340_Fig04-04.jpg)


    [Figure 4-4](#9781430250340_Ch04.xhtml#_Fig00044).  The updated static wide tile


    Notice that the word `GrocerApp` is displayed at the bottom of the tile. This
    text is specified as the value for the Short Name option in the Application UI
    tab. The All Logos option for Show Name means that it is applied to both the regular
    and wide tiles.'
