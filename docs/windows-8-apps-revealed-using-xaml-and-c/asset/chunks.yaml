    # 关于作者


    ![image](img/9781430250340_unFig-01.jpg)


    **亚当·弗里曼**是一位经验丰富的 IT 专业人士，曾在多家公司担任高级职务，最近一次是在一家全球银行担任首席技术官和首席运营官。现已退休，他致力于写作和跑步。


    **他即将出版的其他著作包括：**


    - Pro Windows 8 Development in HTML5 and JavaScript

    - Pro ASP.NET MVC 4


    **他的其他著作包括：**


