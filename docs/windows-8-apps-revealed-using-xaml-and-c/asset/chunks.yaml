    ## Switching Between Pages


    Now that I have two pages, I can switch between them as the state of my app changes.
    I am going to display the `NoItemSelected` page when the user hasn’t selected
    an item from the `ListView` and the `ItemDetail` page when the user has made a
    selection. [Listing 2-13](#9781430250340_Ch02.xhtml#list13) shows the additions
    to the `ListPage.xaml.cs` file that make this happen.


    ***[Listing 2-13](#9781430250340_Ch02.xhtml#_list13).** Showing Pages Based on
    App State*


    ```

    ...

    public ListPage() {

        viewModel = new ViewModel();

        // ...test data removed for brevity

        this.InitializeComponent();

        this.DataContext = viewModel;

        ItemDetailFrame.Navigate(typeof(NoItemSelected));


    viewModel.PropertyChanged + = (sender, args) = >{

            if (args.PropertyName == "SelectedItemIndex") {

                if (viewModel.SelectedItemIndex == -1) {

                    ItemDetailFrame.Navigate(typeof(NoItemSelected));

                } else {

                    ItemDetailFrame.Navigate(typeof(ItemDetail), viewModel);

                }

            }

        };

    }

    ...

    ```


    I still display the `NoItemSelected` page by default, because that reflects the
    initial state of my app. The user won’t have made a selection when the app first
    starts.


    The additional code adds a handler for the `PropertyChanged` event defined by
    the view model. This is the same event that is used by the XAML controls data
    binding feature, and by registering a handler directly, I am able to respond to
    property changes in the view model in my code-behind file. The event arguments
    I receive when I handle this event tell me which property has changed through
    the `PropertyName` property. If the `SelectedItemIndex` property has changed,
    then I use the `Frame.Navigate` method to show either the `NoItemSelected` or
    `ItemDetail` page.


    Notice that I pass the view model object as an argument to the `Navigate` method
    when I display the `ItemDetail` page:


    ```

    ItemDetailFrame.Navigate(typeof(ItemDetail), viewModel);

    ```


    This argument is the means by which you can pass context to the page that is being
    displayed. I’ll show you how to use this object in the next section.


