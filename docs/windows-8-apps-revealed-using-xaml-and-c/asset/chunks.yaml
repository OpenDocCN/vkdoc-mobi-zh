  raw: 'My app doesn’t currently perform any tasks that are affected by the app being
    suspended and resumed at the moment, but I want to show you how to test for the
    events. To that end, I respond to the `Suspending` and `Resuming` events by changing
    the `Name` property of the first two items in the `GroceryList` collection in
    the view model to signal when these events have been received.


    Simulating the Life-Cycle Events


    The easiest way to simulate the life-cycle events is to use Visual Studio. When
    you start an app with the debugger, Visual Studio displays a menu to the toolbar
    that allows you to send the life-cycle events to the app, which I have highlighted
    in [Figure 5-1](#9781430250340_Ch05.xhtml#Fig00051).


    ![9781430250340_Fig05-01.jpg](images/9781430250340_Fig05-01.jpg)


    [Figure 5-1](#9781430250340_Ch05.xhtml#_Fig00051).  The Visual Studio button to
    send life-cycle events to an app


    If you select the menu items to suspend and then resume the app, you will see
    the changes in the view model data shown in [Figure 5-2](#9781430250340_Ch05.xhtml#Fig00052).
    (You won’t see the changes until you resume the app; once the app has been suspended,
    no UI updates are processed.)


    ![9781430250340_Fig05-02.jpg](images/9781430250340_Fig05-02.jpg)


    [Figure 5-2](#9781430250340_Ch05.xhtml#_Fig00052).  Indicating that the life-cycle
    events have been receiveds


    Testing the Life-Cycle Events


    The problem with simulating the life-cycle events is that you don’t get quite
    the same result as when they arise naturally. To do this, you need to start the
    app without the debugger, which is why indicating that the events have been received
    via the view model is so useful. Creating the circumstances in which the events
    are sent requires some specific actions, which I describe step-by-step in the
    following sections.


    Activate the App


    To trigger the `activated` event, start the app by selecting Start Without Debugging
    from the Visual Studio Debug menu. You can also start the app from the Start screen,
    either in the simulator or on your local machine. The important thing is not to
    start the app with the debugger.


    Suspend the App


    The easiest way to suspend the app is to switch to the desktop by pressing Win+D.
    Open the Task Manager, right-click the item for your app, and select Go to Details
    from the pop-up menu. The Task Manager will switch to the Details tab and select
    the `WWAHost.exe` process, which is responsible for running the app. After a few
    seconds, the value shown in the Status column will change from Running to Suspended,
    which tells you that Windows has suspended the app. The app will have been sent
    the Suspending event (but you won’t see the evidence of this until the app is
    resumed).


    Resuming the App


    Switching back to the app will resume it. You will see that the view model items
    show that the events have been received. The state of a resumed app is exactly
    as it was at the moment it was suspended. Your layout, data, event handlers, and
    everything else will be just as it was.


    Your app could have been suspended for a long time, especially if the device was
    put into a low-power state (such as sleeping). Network connections will have been
    closed by any servers you were talking to (so you should close them explicitly
    when you get the `Suspending` event) and will have to be reopened when your app
    is resumed. You will also have to refresh data that may have become stale; this
    includes location data, since the device may have been moved during the period
    your app was suspended.


    ![image](images/sq.jpg) **Tip**   Windows allows users to terminate apps by pressing
    Alt+F4\. There is no helpful warning event that gives you the opportunity to tidy
    up your data and operations. Instead, Windows just terminates your app’s process.


    Adding a Background Activity


    Now that I have confirmed that my app can get and respond to the `Resuming` and
    `Suspending` events, I can add some functionality that requires a recurring background
    task. For this example, I am going to use the geolocation service to report on
    the current device location. To start, I have created a new class file called
    `Location.cs` in the `Data` project folder. The contents of this file are shown
    in [Listing 5-3](#9781430250340_Ch05.xhtml#list3).


    ***[Listing 5-3](#9781430250340_Ch05.xhtml#_list3).** The* *Location.cs File*


    ```

    using System;

    using System.Net.Http;

    using System.Threading.Tasks;

    using Windows.Data.Json;

    using Windows.Devices.Geolocation;


    namespace GrocerApp.Data {

        class Location {


    public static async Task<string> TrackLocation() {

                Geolocator geoloc = new Geolocator();

                Geoposition position = await geoloc.GetGeopositionAsync();


    HttpClient httpClient = new HttpClient();

                httpClient.BaseAddress = new Uri(" http://nominatim.openstreetmap.org
    ");

                HttpResponseMessage httpResult = await httpClient.GetAsync(

                    String.Format("reverse?format=json&lat={0}&lon={1}",

                    position.Coordinate.Latitude, position.Coordinate.

                    Longitude));


    JsonObject jsonObject = JsonObject

                    .Parse(await httpResult.Content.ReadAsStringAsync());


    return jsonObject.GetNamedObject("address")

                    .GetNamedString("road") + DateTime.Now.ToString

                    ("'' (''HH:mm:ss'')''");

            }

        }

    }

    ```


    This class uses the Windows 8 geolocation feature to get the location of the device.
    This feature is exposed through the `Geolocator` class in the `Windows.Devices.Geolocation`
    namespace, and the `GetGeopositionAsync` method gets a single snapshot of the
    location (as opposed to providing location updates via events, which is the other
    approach supported by the `Geolocator` class).


    ![image](images/sq.jpg) **Caution**   The new C# `await` keyword signals that
    I have entered realms of parallel/asynchronous programming. This is an advanced
    example that uses the Task Parallel Library (TPL) to create and manage background
    tasks. I won’t go into the details of TPL and .NET parallel programming in this
    short book. If you want more information, then I suggest my *Pro .NET 4 Parallel
    Programming in C#* book, which provides full details. The `await` keyword is a
    new addition to C# 4.5, which means “wait for this asynchronous task to complete.”


    Once I get the position of the device, I make an HTTP request to a reverse geocoding
    service, which allows me to translate the latitude and longitude information from
    the geolocation service into a street address. The geocoding service returns a
    JSON string, which I parse into a C# object so that I read the street information.
    The result from the `TrackLocation` method is a string listing the name of the
    street the device is on and a timestamp indicating the time of the location update.


    ![image](images/sq.jpg) **Tip**   I have used the `OpenStreetMap` geocoding service
    because it doesn’t require a unique account token. This means you can run the
    example without having to create a Google Maps or Bing Maps developer account.


    Extending the View Model


    I am going to extend the view model so that it keeps track of the location data
    generated by the `TrackLocation` method. This will allow me to use data binding
    to display the data to the user. [Listing 5-4](#9781430250340_Ch05.xhtml#list4)
    shows the additions I have made to the `ViewModel` class.


    ***[Listing 5-4](#9781430250340_Ch05.xhtml#_list4).** Updating the View Model
    to Capture the Location Data*


    ```

    using System.Collections.Generic;

    using System.Collections.ObjectModel;

