- fmt: "# Install Visual Studio\n\nInstall `Visual Studio` as you would any other\
    \ app. Although the software is free, you will need to activate it, which requires\
    \ the `Microsoft` account you created earlier. After you have gone through the\
    \ process, you’ll end up with a code that you can use to activate `Visual Studio`.\
    \ You will also need a developer license, which is free as well. When you first\
    \ start `Visual Studio 2012`, you will be prompted to obtain a license; it takes\
    \ only a second, and, once again, it requires the `Microsoft` account you created\
    \ earlier.\n\n![image](images/sq.jpg) **Note**   Although `Visual Studio` and\
    \ the `Microsoft` account are free, you will have to pay if you want to publish\
    \ apps to the `Windows Store`. `Microsoft` currently charges $49 per year for\
    \ individuals and $99 per year for companies, but you may be entitled to free\
    \ publishing if you subscribe to `Microsoft` packages such as `MSDN`.\n\n## What\
    \ Is the Structure of This Book?\n\nI focus on the key techniques and features\
    \ that make a `Windows` app. You already know how to write `C#`, and I am not\
    \ going to waste your time teaching you what you already know. This book is about\
    \ translating your `C#` and `XAML` development experience into the `Windows` app\
    \ world, and that means focusing on what makes a `Windows` app different and special.\n\
    \nI have taken a relaxed approach to mixing topics. Aside from the main theme\
    \ in each chapter, you’ll find some essential context to explain why features\
    \ are important and why you should implement them. By the end of this book, you\
    \ will understand how to build a `Windows` app that integrates properly into `Windows\
    \ 8` and presents a user experience that is consistent with apps written using\
    \ other languages, such as `C++` or `JavaScript`.\n\nThis is a primer to get you\
    \ started on app development for `Windows 8`. It isn’t a comprehensive tutorial;\
    \ as a consequence, I have focused on those topics that are the major building\
    \ blocks for an app. There is a lot of information that I just couldn’t fit into\
    \ such a slim volume. If you do want more comprehensive coverage of `Windows`\
    \ app development, then `Apress` has published Jesse Liberty’s *Pro Windows 8\
    \ Development with XAML and C#*. In addition, `Apress` will publish my *Pro Windows\
    \ 8 Development with HTML5* and `JavaScript` book if you want to use more web-oriented\
    \ technologies to build your apps.\n\nThe following sections summarize the chapters\
    \ in this book.\n\n### Chapter 1: Getting Started\n\nThis chapter. Aside from\
    \ introducing this book, I show you how to create the `Visual Studio` project\
    \ for the example app that I use throughout this book. I give you a brief overview\
    \ of `XAML`, take you on a tour of the important files in an app development project,\
    \ show you how to run your apps in the `Visual Studio` simulator, and explain\
    \ how to use the debugger.\n\n### Chapter 2: Data, Bindings, and Pages\n\nData\
    \ is at the heart of any `Windows` app, and in this chapter I show you how to\
    \ define a view model and how to use data bindings to bring that data into your\
    \ app layouts. These techniques are essential to building apps that are easy to\
    \ extend, easy to test, and easy to maintain. Along the way, I’ll show you how\
    \ to use pages to break your app into manageable chunks of `XAML` and `C#` code.\n\
    \n### Chapter 3: AppBars, Flyouts, and NavBars\n\nSome user interface controls\
    \ are common to all `Windows` apps, regardless of which language is used to create\
    \ them. In this chapter, I show you how to create and configure `AppBars`, `Flyouts`,\
    \ and `NavBars`, which are the most important of these common controls; together\
    \ they form the backbone of your interaction with the user.\n\n### Chapter 4:\
    \ Layouts and Tiles\n\nThe functionality of a `Windows` app extends to the `Windows\
    \ 8` Start menu, which offers a number of ways to present the user with additional\
    \ information. In this chapter, I show you how to create and update dynamic Start\
    \ tiles and how to apply *badges* to those tiles.\n\nI also show you how to deal\
    \ with the *snapped* and *filled* layouts, which allow a `Windows 8` user to use\
    \ two `Windows` apps side by side. You can adapt to these layouts using just `C#`\
    \ code or a mix of code and `XAML`. I show you both approaches.\n\n### Chapter\
    \ 5: App Life Cycle and Contracts\n\n`Windows` applies a very specific life-cycle\
