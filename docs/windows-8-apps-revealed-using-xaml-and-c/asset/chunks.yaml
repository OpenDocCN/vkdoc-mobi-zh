  raw: 'In this, the final chapter in this book, I show you how to take control of
    the app life cycle by responding to key Windows events. I show you how to fix
    the code that Visual Studio adds to projects, how to properly deal with your app
    being suspended and resumed, and how to implement contracts that tie your app
    into the wider user experience that Windows 8 offers. Along the way, I’ll demonstrate
    the use of the geolocation feature and show you how to set up and manage a recurring
    asynchronous task. [Table 5-1](#9781430250340_Ch05.xhtml#Tab00051) provides the
    summary for this chapter.


    [Table 5-1.](#9781430250340_Ch05.xhtml#_Tab00051) Chapter Summary


    | Problem | Solution | Listing |

    | --- | --- | --- |

    | Ensure that your app receives the life-cycle events. | Handle the `Suspending`
    and `Resuming` events defined in the `Application` class. | 1–2 |

    | Ensure the clean termination of a background task when the app is suspended.
    | Request a deferral and use the five-second grace period that this provides to
    prepare for suspension. | 3-6 |

    | Implement a contract. | Add the feature implementation in your code and override
    the `Application` method so you receive the life-cycle event when the contract
    is invoked. | 7–9 |


    Dealing with the App Life Cycle


    In [Chapter 1](#9781430250340_Ch01.xhtml), I showed you the skeletal code that
    Visual Studio placed into the `App.xaml.cs` file to give me a jump start with
    my example project. This code handles the Windows app *life-cycle events*, ensuring
    that I can respond appropriately to the signals that the operating system is sending
    me. There are three key stages in the life of a Windows app.


    The first stage, *activation*, occurs when your app is started. The Windows runtime
    will load and process your content and signal when everything is ready. It is
    during activation that I generate the dynamic content for my example app, for
    example.


    Users don’t typically close Windows apps; they just move to another app and leave
    the Windows to sort things out. This is why there are no close buttons or menu
    bars on a Windows app UI. An app that is no longer required is moved into the
    second stage and is *suspended*. While suspended, no execution of the app code
    takes place, and there is no interaction with the user.


    If the user switches back to a suspended app, then the third stage occurs: the
    app is *restored*. The app is displayed to the user, and execution of the app
    resumes. Suspended apps are not always restored; if the device is low on memory,
    for example, Windows may simply terminate a suspended app.


    Correcting the Visual Studio Event Code


    The first change I need to make is to remove the view model from the `MainPage.xaml.cs`
    code-behind file. I have been moving the view model gradually to demonstrate the
    central role that it plays in a Windows app, and in this chapter, there are features
    I am going to show you that require the view model to be created as part of the
    life cycle. You can see the simplified `MainPage.xaml.cs` file in [Listing 5-1](#9781430250340_Ch05.xhtml#list1).


    ***[Listing 5-1](#9781430250340_Ch05.xhtml#_list1).** Removing the View Model
    Instantiation from the MainPage.xaml.cs File*


    ```

    using GrocerApp.Data;

    using System;

    using Windows.Data.Xml.Dom;

    using Windows.UI.Notifications;

    using Windows.UI.Xaml;

    using Windows.UI.Xaml.Controls;

    using Windows.UI.Xaml.Navigation;


    namespace GrocerApp.Pages {


    public sealed partial class MainPage : Page {

            private ViewModel viewModel;


    public MainPage() {

                this.InitializeComponent();

            }


    private void UpdateBadge() {

                // . . .statements omitted for brevity. . .

            }


    private void UpdateTile() {

                // . . .statements omitted for brevity. . .

            }


    protected override void OnNavigatedTo(NavigationEventArgs e) {

                viewModel = (ViewModel)e.Parameter;

                this.DataContext = viewModel;


    MainFrame.Navigate(typeof(ListPage), viewModel);


    viewModel.GroceryList.CollectionChanged += (sender, args) => {

                    UpdateTile();

                    UpdateBadge();

                };


    UpdateTile();

                UpdateBadge();

            }


    private void NavBarButtonPress(object sender, RoutedEventArgs e) {

                Boolean isListView = (Button)sender == ListViewButton;

                MainFrame.Navigate(isListView ? typeof(ListPage)

                    : typeof(DetailPage), viewModel);


    }

        }

    }

    ```


    I can now turn to the `App.xaml.cs` file and build on the template code to respond
    to changes in the app life cycle. Unfortunately, the code for handling the life-cycle
    events that Visual Studio adds to a project doesn’t work. It deals with activation
    and suspension quite happily, but it prevents the app from being notified when
    it is being restored. Fortunately, the solution to this is pretty simple, and
    you can see the changes required to `App.xaml.cs` in [Listing 5-2](#9781430250340_Ch05.xhtml#list2).


    ***[Listing 5-2](#9781430250340_Ch05.xhtml#_list2).** Handling the Life-Cycle
    Notification Events*


    ```

    using GrocerApp.Data;

    using System;

    using Windows.ApplicationModel;

    using Windows.ApplicationModel.Activation;

    using Windows.UI.Xaml;

    using Windows.UI.Xaml.Controls;


    namespace GrocerApp {


    sealed partial class App : Application {

            private ViewModel viewModel;


    public App() {

                this.InitializeComponent();


    viewModel = new ViewModel();


    viewModel.StoreList.Add("Whole Foods");

                viewModel.StoreList.Add("Kroger");

                viewModel.StoreList.Add("Costco");

                viewModel.StoreList.Add("Walmart");


    viewModel.GroceryList.Add(new GroceryItem {

                    Name = "Apples",

                    Quantity = 4, Store = "Whole Foods"

                });

                viewModel.GroceryList.Add(new GroceryItem {

                    Name = "Hotdogs",

                    Quantity = 12, Store = "Costco"

                });

                viewModel.GroceryList.Add(new GroceryItem {

                    Name = "Soda",

                    Quantity = 2, Store = "Costco"

                });

                viewModel.GroceryList.Add(new GroceryItem {

                    Name = "Eggs",

                    Quantity = 12, Store = "Kroger"

                });


    this.Suspending += OnSuspending;

                this.Resuming += OnResuming;

            }


    protected override void OnLaunched(LaunchActivatedEventArgs args) {

                Frame rootFrame = Window.Current.Content as Frame;


    if (rootFrame == null) {

                    rootFrame = new Frame();

                    if (args.PreviousExecutionState == ApplicationExecutionState.

                     Terminated)

                    {

                        //TODO: Load state from previously suspended application

                    }

                    Window.Current.Content = rootFrame;

                }


    if (rootFrame.Content == null) {


    if (!rootFrame.Navigate(typeof(Pages.MainPage), viewModel)) {

                        throw new Exception("Failed to create initial page");

                    }

                }

                Window.Current.Activate();

            }


    private void OnResuming(object sender, object e) {

                viewModel.GroceryList[1].Name = "Resume";

            }


    private void OnSuspending(object sender, SuspendingEventArgs e) {

                var deferral = e.SuspendingOperation.GetDeferral();

                viewModel.GroceryList[0].Name = "Suspend";

                deferral.Complete();

            }

        }

    }

    ```


    I have highlighted the most important change, which is to register for the `Suspending`
    and `Resuming` events, and added statements to the handler methods for those event.
    Visual Studio includes a handler for the `Suspending` event when it created the
    class, but I had to add the `Resuming` handler to get the event notification.
    I removed the code in the `OnLaunched` method, which tried (and failed) to work
    out when the app was being resumed.'
  trans: "\n# 本章内容\n\n作为本书的最后一章，我将向你展示如何通过响应关键的 Windows 事件来控制应用生命周期。我将向你展示如何修复 Visual\
    \ Studio 添加到项目中的代码，如何正确处理应用的挂起与恢复，以及如何实现契约，让你的应用融入 Windows 8 提供的更广泛用户体验中。在此过程中，我将演示地理位置功能的使用，并展示如何设置和管理重复执行的异步任务。表\
    \ 5-1 提供了本章的总结。\n\n表 5-1. 本章总结\n\n| 问题 | 解决方案 | 清单编号 |\n| --- | --- | --- |\n\
    | 确保你的应用接收生命周期事件。 | 处理 `Application` 类中定义的 `Suspending` 和 `Resuming` 事件。 | 1–2\
    \ |\n| 确保应用挂起时后台任务能够干净地终止。 | 请求延迟，并利用这五秒的宽限期为挂起做准备。 | 3-6 |\n| 实现一个契约。 | 在你的代码中添加功能实现，并重写\
    \ `Application` 方法，以便在契约被调用时接收生命周期事件。 | 7–9 |\n\n# 处理应用生命周期\n\n在第 1 章中，我向你展示了\
    \ Visual Studio 放置在 `App.xaml.cs` 文件中的骨架代码，以便快速启动我的示例项目。这段代码处理 Windows 应用生命周期事件，确保我能够对操作系统发送给我的信号做出适当的响应。Windows\
    \ 应用的生命周期有三个关键阶段。\n\n第一阶段是**激活**，发生在你的应用启动时。Windows 运行时将加载并处理你的内容，并在一切准备就绪时发出信号。例如，正是在激活阶段，我生成了示例应用的动态内容。\n\
    \n用户通常不会关闭 Windows 应用；他们只是切换到另一个应用，让 Windows 来处理后续事宜。这就是为什么 Windows 应用的用户界面上没有关闭按钮或菜单栏。一个不再需要的应用会被转入第二阶段，即**挂起**。当应用挂起时，不会执行任何代码，也不会与用户发生任何交互。\n\
    \n如果用户切换回一个已挂起的应用，那么第三阶段就会发生：**恢复**应用。应用会显示给用户，并且应用代码的执行会恢复。挂起的应用并不总是会被恢复；例如，如果设备内存不足，Windows\
    \ 可能直接终止一个挂起的应用。\n\n# 修正 Visual Studio 事件代码\n\n我需要做的第一个更改是从 `MainPage.xaml.cs`\
    \ 代码隐藏文件中移除视图模型。一直以来，我逐步移动视图模型，以展示它在 Windows 应用中的核心作用。在本章中，我将向你展示一些功能，这些功能要求视图模型作为生命周期的一部分被创建。你可以在清单\
    \ 5-1 中看到简化后的 `MainPage.xaml.cs` 文件。\n\n**清单 5-1.** 从 `MainPage.xaml.cs` 文件中移除视图模型实例化\n\
    \n```\nusing GrocerApp.Data;\nusing System;\nusing Windows.Data.Xml.Dom;\nusing\
    \ Windows.UI.Notifications;\nusing Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\n\
    using Windows.UI.Xaml.Navigation;\n\nnamespace GrocerApp.Pages {\n\npublic sealed\
    \ partial class MainPage : Page {\n        private ViewModel viewModel;\n\npublic\
    \ MainPage() {\n            this.InitializeComponent();\n        }\n\nprivate\
    \ void UpdateBadge() {\n            // . . .为简洁起见，省略了语句。. . .\n        }\n\nprivate\
    \ void UpdateTile() {\n            // . . .为简洁起见，省略了语句。. . .\n        }\n\nprotected\
    \ override void OnNavigatedTo(NavigationEventArgs e) {\n            viewModel\
    \ = (ViewModel)e.Parameter;\n            this.DataContext = viewModel;\n\nMainFrame.Navigate(typeof(ListPage),\
    \ viewModel);\n\nviewModel.GroceryList.CollectionChanged += (sender, args) =>\
    \ {\n                UpdateTile();\n                UpdateBadge();\n         \
    \   };\n\nUpdateTile();\n            UpdateBadge();\n        }\n\nprivate void\
    \ NavBarButtonPress(object sender, RoutedEventArgs e) {\n            Boolean isListView\
    \ = (Button)sender == ListViewButton;\n            MainFrame.Navigate(isListView\
    \ ? typeof(ListPage)\n                : typeof(DetailPage), viewModel);\n\n}\n\
    \    }\n}\n```\n\n现在，我可以转向 `App.xaml.cs` 文件，并在模板代码的基础上构建，以响应应用生命周期的变化。不幸的是，Visual\
    \ Studio 添加到项目中的用于处理生命周期事件的代码并不奏效。它可以很好地处理激活和挂起，但无法在应用被恢复时通知应用。幸运的是，解决方案非常简单，你可以在清单\
    \ 5-2 中看到需要对 `App.xaml.cs` 进行的更改。\n\n**清单 5-2.** 处理生命周期通知事件\n\n```\nusing GrocerApp.Data;\n\
    using System;\nusing Windows.ApplicationModel;\nusing Windows.ApplicationModel.Activation;\n\
    using Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\n\nnamespace GrocerApp\
    \ {\n\nsealed partial class App : Application {\n        private ViewModel viewModel;\n\
    \npublic App() {\n            this.InitializeComponent();\n\nviewModel = new ViewModel();\n\
    \nviewModel.StoreList.Add(\"Whole Foods\");\n            viewModel.StoreList.Add(\"\
    Kroger\");\n            viewModel.StoreList.Add(\"Costco\");\n            viewModel.StoreList.Add(\"\
    Walmart\");\n\nviewModel.GroceryList.Add(new GroceryItem {\n                Name\
    \ = \"Apples\",\n                Quantity = 4, Store = \"Whole Foods\"\n     \
    \       });\n            viewModel.GroceryList.Add(new GroceryItem {\n       \
    \         Name = \"Hotdogs\",\n                Quantity = 12, Store = \"Costco\"\
    \n            });\n            viewModel.GroceryList.Add(new GroceryItem {\n \
    \               Name = \"Soda\",\n                Quantity = 2, Store = \"Costco\"\
    \n            });\n            viewModel.GroceryList.Add(new GroceryItem {\n \
    \               Name = \"Eggs\",\n                Quantity = 12, Store = \"Kroger\"\
    \n            });\n\nthis.Suspending += OnSuspending;\n            this.Resuming\
    \ += OnResuming;\n        }\n\nprotected override void OnLaunched(LaunchActivatedEventArgs\
    \ args) {\n            Frame rootFrame = Window.Current.Content as Frame;\n\n\
    if (rootFrame == null) {\n                rootFrame = new Frame();\n         \
    \       if (args.PreviousExecutionState == ApplicationExecutionState.\n      \
    \           Terminated)\n                {\n                    //TODO: 从先前挂起的应用程序加载状态\n\
    \                }\n                Window.Current.Content = rootFrame;\n    \
    \        }\n\nif (rootFrame.Content == null) {\n\nif (!rootFrame.Navigate(typeof(Pages.MainPage),\
    \ viewModel)) {\n                    throw new Exception(\"无法创建初始页面\");\n    \
    \            }\n            }\n            Window.Current.Activate();\n      \
    \  }\n\nprivate void OnResuming(object sender, object e) {\n            viewModel.GroceryList[1].Name\
    \ = \"Resume\";\n        }\n\nprivate void OnSuspending(object sender, SuspendingEventArgs\
    \ e) {\n            var deferral = e.SuspendingOperation.GetDeferral();\n    \
    \        viewModel.GroceryList[0].Name = \"Suspend\";\n            deferral.Complete();\n\
    \        }\n    }\n}\n```\n\n我已高亮显示最重要的更改，即注册 `Suspending` 和 `Resuming` 事件，并向这些事件的处理方法中添加了语句。Visual\
    \ Studio 在创建类时包含了一个用于处理 `Suspending` 事件的处理程序，但我必须添加 `Resuming` 处理程序才能收到事件通知。我移除了\
    \ `OnLaunched` 方法中的代码，这些代码试图（但未能）判断应用何时被恢复。\n"
- fmt: "# My app doesn’t currently perform any tasks that are affected by the app\
    \ being suspended and resumed at the moment, but I want to show you how to test\
    \ for the events\n\nTo that end, I respond to the `Suspending` and `Resuming`\
    \ events by changing the `Name` property of the first two items in the `GroceryList`\
    \ collection in the view model to signal when these events have been received.\n\
    \n## Simulating the Life-Cycle Events\n\nThe easiest way to simulate the life-cycle\
    \ events is to use Visual Studio. When you start an app with the debugger, Visual\
    \ Studio displays a menu to the toolbar that allows you to send the life-cycle\
    \ events to the app, which I have highlighted in [Figure 5-1](#9781430250340_Ch05.xhtml#Fig00051).\n\
    \n![9781430250340_Fig05-01.jpg](images/9781430250340_Fig05-01.jpg)\n\n[Figure\
    \ 5-1](#9781430250340_Ch05.xhtml#_Fig00051). The Visual Studio button to send\
