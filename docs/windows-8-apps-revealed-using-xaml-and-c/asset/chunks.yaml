    \ Me!</Button>\n...\n```\n\n当你为此属性指定一个值时，编译器会创建一个变量，其值是由 XAML 元素创建的 UI 控件。这意味着你可以通过\
    \ C# 代码来补充控件的 XAML 配置，或者以编程方式更改元素的配置。清单 1-9 展示了如何在 `MainPage.xaml.cs` 后台代码文件中定义的\
