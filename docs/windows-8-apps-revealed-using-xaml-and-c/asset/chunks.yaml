    ## 实现协定


    `Suspending` 和 `Resuming` 并非唯一的生命周期事件。还有其他事件，这些事件被 Windows 用作*协定*体系的一部分，这些协定能让您的应用与操作系统的其他部分更紧密地集成。在本节中，我将演示*搜索*协定，它告诉
    Windows 我的应用愿意并且能够使用平台范围的搜索功能。


