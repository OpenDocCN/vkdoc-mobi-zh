            wideTextNodes[i].InnerText = String.Format("{0} ({1})", item.Name,            
    item.Store);

        }


    wideTextNodes[4].InnerText = storeCount.ToString();

        wideTextNodes[5].InnerText = "Stores";


    var wideBindingElement = wideTileXml.GetElementsByTagName("binding")[0];

