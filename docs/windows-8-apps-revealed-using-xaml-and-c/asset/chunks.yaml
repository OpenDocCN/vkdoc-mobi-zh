  raw: 'The `ItemTemplate` attribute tells the `ListView` how each item from the `ItemSource`
    should be displayed. The `StaticResource` keyword and the `GroceryListItemTemplate`
    value mean that the data template I specified in the resource dictionary will
    be used, meaning that a new `StackPanel` containing three `TextBlock` elements
    will be generated for each item in the `ViewModel.GroceryList` collection.


    The final attribute is associated with the event handler method I defined in the
    code-behind file with the `SelectionChanged` event emitted by the `ListView` control.


    ![image](images/sq.jpg) **Tip**   You can get a list of the events that the controls
    define using the Visual Studio Properties window or by consulting the Microsoft
    API documentation. The easiest way to create handler methods with the right arguments
    is to let the XAML editor create them for you as part of the autocomplete process.


    Running the App


    The Visual Studio design surface can display only the parts of the layout that
    are static. The only way to see the dynamic content is to run the app. So, to
    see the way that the XAML and the C# come together, select Start Debugging from
    the Visual Studio Debug menu. Visual Studio will build the project and push the
    app to the simulator. You can see the result in [Figure 2-2](#9781430250340_Ch02.xhtml#Fig2).


    ![9781430250340_Fig02-02.jpg](images/9781430250340_Fig02-02.jpg)


    [Figure 2-2](#9781430250340_Ch02.xhtml#_Fig2).  Running the example app in the
    simulator


    You can see how the data binding adds items from the view model to the `ListView`
    control and how the template I defined in the resource dictionary has been used
    to format them.


    There is a lot of built-in behavior with the Windows app UI controls. For example,
    items are shown in a lighter shade when the mouse moves over them (which you can
    see in [Figure 2-2](#9781430250340_Ch02.xhtml#Fig2)) and in a different shade
    when the user clicks to select an item. All of the styles used by a control can
    be changed, but I am going to stick with the default settings for simplicity.


    Inserting Other Pages into the Layout


    You don’t have to put all of your controls and code in a single XAML file and
    its code-behind file. To make a project easier to manage, you can create multiple
    pages and bring them together in your app. As a simple demonstration, I have created
    a new `Blank Page` called `NoItemSelected.xaml` in my `Pages` project folder.
    [Listing 2-8](#9781430250340_Ch02.xhtml#list8) shows the content of this file
    with my additions to the default content shown in bold.


    ![image](images/sq.jpg) **Tip**   You will have to stop the debugger before Visual
    Studio will let you add new items to the project.


    ***[Listing 2-8](#9781430250340_Ch02.xhtml#_list8).** The NoItemSelected.xaml
    File*


    ```

    <Page

        x:Class = "GrocerApp.Pages.NoItemSelected"

        xmlns = "http://schemas.microsoft.com/winfx/2006/xaml/presentation"

        xmlns:x = "http://schemas.microsoft.com/winfx/2006/xaml"

