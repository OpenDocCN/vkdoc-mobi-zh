  raw: '*The simplest way of demonstrating this relationship is to show you the implementation
    of the event handler that I specified for the* *Button* *elements in the XAML
    file.*


    *[Listing 1-8](#9781430250340_Ch01.xhtml#list8) shows the* *MainPage.xaml.cs*
    *file, which is the code-behind file for MainPage.xaml.*


    [***Listing 1-8.***](#9781430250340_Ch01.xhtml#_list8)  The MainPage.xaml.cs File


    ```

    using System;

    using System.Collections.Generic;

    using System.IO;

    using System.Linq;

    using Windows.Foundation;

    using Windows.Foundation.Collections;

    using Windows.UI.Xaml;

    using Windows.UI.Xaml.Controls;

    using Windows.UI.Xaml.Controls.Primitives;

    using Windows.UI.Xaml.Data;

    using Windows.UI.Xaml.Input;

    using Windows.UI.Xaml.Media;

    using Windows.UI.Xaml.Navigation;


    namespace GrocerApp {

        public sealed partial class MainPage : Page {

            public MainPage() {

                this.InitializeComponent();

            }


    protected override void OnNavigatedTo(NavigationEventArgs e) {

            }


    private void ButtonClick(object sender, RoutedEventArgs e) {

                System.Diagnostics.Debug.WriteLine("Button Clicked: "

                    + ((Button)e.OriginalSource).Content);

            }

        }

    }

    ```


    I am able to refer to the `ButtonClick` method without any qualification in the
    XAML file because the code generated from the XAML file is merged with the C#
    code in the code-behind file to create a single class. The result is that when
    one of the `Button` elements in the app layout is clicked, my C# `ButtonClick`
    method is invoked.


    ![image](images/sq.jpg) **Tip**   No console is available for Windows apps, so
    use the static `System.Diagnostcs.Debug.WriteLine` method if you want to write
    out messages to help figure out what’s going on in your app. These are shown in
    the Visual Studio Output window, but only if you start your app using Start With
    Debugging from the Visual Studio Debug menu.


    This relationship goes both ways. Notice that some of the elements in the XAML
    file have an `x:Name` attribute, like this:


    ```

    ...

    <Button x:Name="FirstButton" HorizontalAlignment="Center"

        Click="ButtonClick">Click Me!</Button>

    ...

    ```


    When you specify a value for this attribute, the compiler creates a variable whose
    value is the UI control that was created from the XAML element. This means you
    can supplement the XAML configuration of your controls with C# code or change
    the configuration of elements programmatically. [Listing 1-9](#9781430250340_Ch01.xhtml#list9)
    shows how I change the configuration of the button whose name is `FirstButton`
    in the `ButtonClick` method defined in the `MainPage.xaml.cs` code-behind file.


    ***[Listing 1-9](#9781430250340_Ch01.xhtml#_list9).*** *Configuring a Control
    in Code in Response to an Event in the MainPage.xaml.cs File*


    ```

    ...

    private void ButtonClick(object sender, RoutedEventArgs e) {


    FirstButton.Content = "Pressed";

        FirstButton.FontSize = 50;


    System.Diagnostics.Debug.WriteLine("Button Clicked: "

            + ((Button)e.OriginalSource).Content);

    }

    ...

    ```


    I don’t have to qualify the control name in any way. In this example, I change
    the contents of the button and the size of the font. Since these new statements
    are in the `Click` event handler function, clicking either button will cause the
    configuration of the `FirstButton` to change. That’s all you need to know about
    XAML for the moment. To summarize:


    *   XAML is converted into code and merged with the contents of the code-behind
    file to create a single .NET class.

    *   You can configure UI controls in XAML or in code.

    *   Using XAML lets you use the Visual Studio design tools, which are pretty good.


    XAML may strike you as verbose and hard to read at first, but you will soon get
    used to it. I find that it is a lot easier to work with XAML than using just C#
    code, although I admit it took me quite some time with XAML before I decided that
    was the case.


    Running and Debugging a Windows App


    Now that I have a very simple Windows app, it is time to focus on how to run and
    debug it. Visual Studio provides three ways to run an app: on the local machine,
    on the simulator, or on a remote machine.


    The problem with the local machine is that development PCs are rarely configured
    the way that user devices are. Unless you are targeting your app at people with
    similar spec platforms, then testing on the local machine doesn’t give you a representative
    view of how your app will behave.


    Testing on a remote machine is the best approach, but only if you have a range
    of machines with different capabilities to test with. I have a cheap Dell Duo
    laptop that has a touchscreen and some hardware sensors that make it useful for
    testing, but it can quickly become expensive to build a stable of suitable test
    machines.


    The best compromise is the Visual Studio simulator, which provides a faithful
    representation of the Windows app experience and lets you change the capabilities
    of the device you are simulating (including changing the screen size), simulate
    touch events, and generate synthetic geolocation data.


    To select the simulator, locate the button on the Visual Studio toolbar that currently
    says Local Machine, and click the small downward arrow just to the right of it.
    Select Simulator from the pop-up menu, as shown in [Figure 1-5](#9781430250340_Ch01.xhtml#Fig5).


    ![9781430250340_Fig01-05.jpg](images/9781430250340_Fig01-05.jpg)


    [Figure 1-5](#9781430250340_Ch01.xhtml#_Fig5).  Selecting the Visual Studio simulator
    to test apps


    Running a Windows App in the Simulator


    To start the example app, click the toolbar button (which will now say Simulator),
    or select Start with Debug from the Debug menu. Visual Studio will start the simulator
    and build and deploy the app, as shown in [Figure 1-6](#9781430250340_Ch01.xhtml#Fig6).


    ![9781430250340_Fig01-06.jpg](images/9781430250340_Fig01-06.jpg)


    [Figure 1-6](#9781430250340_Ch01.xhtml#_Fig6).  Using the Visual Studio simulator


    You can use the buttons on the right side of the simulator to change the screen
    size and orientation, switch between mouse and touch input, and synthesize geolocation
    data. There isn’t much to see because the example app is very simple at the moment.


    Click either of the buttons on the app layout to trigger the event handler method
    and change the configuration of the button. [Figure 1-7](#9781430250340_Ch01.xhtml#Fig7)
    shows the result.


    ![9781430250340_Fig01-07.jpg](images/9781430250340_Fig01-07.jpg)


    [Figure 1-7](#9781430250340_Ch01.xhtml#_Fig7).  The result of clicking either
    of the buttons in the example app


    You will also see a message in the Output window, similar to the following:


    | `Button Clicked: Pressed` |


    The Output window may not be shown by default. You can open it by selecting the
    Output item from the Debug ![image](images/arrow.jpg) Windows menu in Visual Studio.


    Since the app is running in the debugger, any exceptions will cause the debugger
    to break, allowing you to step through the code just as you would a regular C#
    project. You can force the debugger to break by setting breakpoints in the source
    code; aside from the use of the simulator, running and debugging a Windows app
    uses the standard Visual Studio facilities.


    Summary


    In this chapter, I provided an overview of this book and introduced the basics
    of a Windows app written using XAML and C#. I provided a very basic overview of
    XAML and showed you how it can be applied to create a simple example app. In the
    next chapter, I’ll start to build the app to add the major structural components,
    starting with a view model.


    CHAPTER 2


    ![image](images/frontdot.jpg)


    Data, Binding, and Pages


    In this chapter, I show you how to define and use the data that forms the core
    of a Windows app. To do this, I will be loosely following the *view model* pattern,
    which allows me to cleanly separate the data from the parts of the app responsible
    for displaying that data and handling user interactions.'
  trans: "\n\n展示这种关系的最简单方法是向你展示我在 XAML 文件中为 `Button` 元素指定的事件处理程序的实现。\n\n清单 1-8 展示了\
    \ `MainPage.xaml.cs` 文件，即 `MainPage.xaml` 的后台代码文件。\n\n**清单 1-8.**  MainPage.xaml.cs\
