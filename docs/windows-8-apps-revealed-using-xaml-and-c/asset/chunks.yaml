    \ If neither of those approaches suits you, there is support for creating the\
    \ XAML for apps in Blend for Visual Studio, which was installed on your machine\
    \ as part of the Visual Studio setup. I favor writing the XAML directly in the\
    \ code editor, but then I am crusty old-school programmer who has never really\
    \ trusted visual design tools, even though they have become pretty good in recent\
    \ years. You may not be quite as resistant to change, and you should try the different\
    \ styles of UI development to see which suits you. For the purposes of this book,\
    \ I’ll show you changes to the XAML directly.\n\n# Configuring Controls in XAML\n\
    \nYou configure Windows app UI controls by setting attributes on the corresponding\
