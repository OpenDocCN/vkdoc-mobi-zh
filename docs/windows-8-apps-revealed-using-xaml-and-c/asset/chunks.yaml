    states I defined in XAML. The arguments for this method are the current `Page`
    object, the name of the state to enter, and whether intermediate states should
    be displayed. This last argument should be true, since Windows provides the animations
    for transition between views.


    Breaking Out of the Snapped View


    If you are presenting the user with reduced functionality in the snapped view,
    you may to revert to a wider view when the user interacts with your app in certain
    ways. To demonstrate this, I have added a `Button` to the layout for the `DetailPage`
    page, as shown in [Listing 4-6](#9781430250340_Ch04.xhtml#list6).


    ***[Listing 4-6](#9781430250340_Ch04.xhtml#_list6).** Adding a Button to the Layout*


