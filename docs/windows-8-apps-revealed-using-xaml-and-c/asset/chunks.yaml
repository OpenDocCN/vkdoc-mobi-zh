    view in the app


    This is a nice feature where the page-specific AppBars are seamlessly integrated
    with the app-wide navigation controls. You can implement a single AppBar for the
    app by declaring it in the wrapper page. If you do this, you become responsible
    for ensuring that buttons are added and removed from the AppBar as needed.


    Summary


    In this chapter, I showed you how to create AppBars, NavBars, and flyouts, which,
    between them, provide essential parts of the Windows 8 app user experience. Implementing
    these interactions is important in making your app consistent with the broader
    user experience, and I recommend you take the time to ensure that the controls
    you display are always relevant to the content and view the user is presented
    with. In the next chapter, I’ll show you some features that allow your app to
    integrate into Windows: *tiles* and *badges*.


    CHAPTER 4


    ![image](images/frontdot.jpg)


    Views and Tiles


    In this chapter, I describe two of the features that allow an app to fit into
    the wider user experience presented by Windows 8\. The first of these features
    is the way that apps can be *snapped* and *filled* so that two apps can be viewed
    side by side. I show you how to adapt when your app is placed into one of these
    layouts and how to change the layout when your interactions don’t fit inside the
    view constraints.


    The second feature is the *tile* model. Tiles are at the heart of the Windows
    8 replacement for the Start menu. At their simplest, they are static buttons that
    can be used to launch your app, but with a little work, they can present the user
    with an invaluable snapshot of the state of your app, allowing the user to get
    an overview without having to run the app itself. In this chapter, I show you
    how to create dynamic tiles by applying updates and by using a related feature,
    *badges.* [Table 4-1](#9781430250340_Ch04.xhtml#Tab00041) provides the summary
    for this chapter.


    [Table 4-1](#9781430250340_Ch04.xhtml#_Tab00041) . Chapter Summary


    | Problem | Solution | Listing |

    | --- | --- | --- |

    | Adapt an app’s layout when it has been placed into a snapped or filled view.
    | Handle the `ViewStateChanged` event by modifying the layout of your controls.
    | 1–3 |

    | Declare the adaptions required for view changes using XAML. | Use the `VisualStateManage`.
    | 4, 5 |

    | Break out of the snapped view. | Use the `TryUnsnap` method. | 6, 7 |

    | Create a live tile for an app. | Modify the content of an XML template and use
    the classes in the `Windows.UI.Notification` namespace. | 8–10 |

    | Update square and wide tiles. | Prepare updates for two templates and merge
    them together. | 11, 12 |

    | Apply a badge to a tile | Populate and apply an XML badge template | 13, 14
    |


    Supporting Views


    So far, my app has assumed that it has full and exclusive use of the display screen.
    However, apps can be arranged by the number so that they are *snapped* or *filled*.
    A snapped app occupies a 320-pixel strip at the left or right edge of the screen.
    A filled app is displayed alongside a snapped app and occupies the entire screen
    except for the 320-pixel strip. To demonstrate the different views, I have added
    some content to the `DetailPage.xaml` file, as shown in [Listing 4-1](#9781430250340_Ch04.xhtml#list1).
    (This is the file I added in the previous chapter to demonstrate navigation, but
    it didn’t contain any functionality other than a simple message.)


    ***[Listing 4-1](#9781430250340_Ch04.xhtml#_list1).** Adding Content to the DetailPage.xaml
    File*


    ```

    <Page

        x:Class="GrocerApp.Pages.DetailPage"

        xmlns=" http://schemas.microsoft.com/winfx/2006/xaml/presentation "

        xmlns:x=" http://schemas.microsoft.com/winfx/2006/xaml "

        xmlns:local="using:GrocerApp.Pages"

        xmlns:d=" http://schemas.microsoft.com/expression/blend/2008 "

        xmlns:mc=" http://schemas.openxmlformats.org/markup-compatibility/2006 "

        mc:Ignorable="d">


    <Grid x:Name="GridLayout" Background="#71C524">

            <Grid.RowDefinitions>

                <RowDefinition/>

                <RowDefinition/>

            </Grid.RowDefinitions>

            <Grid.ColumnDefinitions>

                <ColumnDefinition/>

                <ColumnDefinition/>

            </Grid.ColumnDefinitions>


    <StackPanel x:Name="TopLeft" Background="#3E790A">

                <TextBlock x:Name="TopLeftText"

                           Style="{StaticResource DetailViewLabelStyle}"

                           Text="Top-Left"/>

            </StackPanel>


    <StackPanel x:Name="TopRight" Background="#70a524" Grid.Column="1"

                        Grid.Row="0">

                <TextBlock x:Name="TopRightText"

                           Style="{StaticResource DetailViewLabelStyle}"

                           Text="Top-Right"/>

            </StackPanel>


    <StackPanel x:Name="BottomLeft" Background="#1E3905" Grid.Row="1">

                <TextBlock x:Name="BottomLeftText"

                           Style="{StaticResource DetailViewLabelStyle}"

                           Text="Bottom-Left"/>

            </StackPanel>


    <StackPanel x:Name="BottomRight" Background="#45860B" Grid.

                        Column="1" Grid.Row="1">

                <TextBlock x:Name="BottomRightText"

                           Style="{StaticResource DetailViewLabelStyle}"

                           Text="Bottom-Right"/>

            </StackPanel>

        </Grid>

    </Page>

    ```


    I have defined a new style called `DetailViewLabelStyle` for this page in the
    `/Resources/GrocerResourceDictionary.xaml` file, as shown in [Listing 4-2.](#9781430250340_Ch04.xhtml#list2)


    ***[Listing 4-2](#9781430250340_Ch04.xhtml#_list2).** Adding the DetailViewLabelStyle
    Style*


    ```

    . . .

    <Style x:Key="DetailViewLabelStyle" TargetType="TextBlock"

            BasedOn="{StaticResource HeaderTextStyle}">

        <Setter Property="FontSize" Value="50"/>

        <Setter Property="Margin" Value="10"/>

        <Setter Property="HorizontalAlignment" Value="Left"/>

    </Style>

    . . .

    ```


    This layout creates a simple colored grid. You can see this new content by starting
    the app and using the NavBar I added in the previous chapter to navigate using
    the Detail View button.


    [Figure 4-1](#9781430250340_Ch04.xhtml#Fig00041) shows the app in its filled and
    snapped views. The remaining space is a simple app that reports its view. I use
    this for testing and have included it in the source code download for this book,
    which you can get from Apress.com.


    ![9781430250340_Fig04-01.jpg](images/9781430250340_Fig04-01.jpg)


    [Figure 4-1](#9781430250340_Ch04.xhtml#_Fig00041).  The example app shown in the
    filled and snapped views


    ![image](images/sq.jpg) **Note**   Apps can be snapped only in the landscape view,
    and Windows 8 supports snapping only if the horizontal resolution of the display
    is 1366 pixels or greater. You must ensure that you have selected the correct
    orientation and resolution in the simulator if you want to experiment with snapping.


    The loss of 320 pixels to make room for the snapped app doesn’t cause a lot of
    disruption for most apps. The problems start to appear when your app is moved
    from the filled to the snapped view, which you can see on the right of the figure.
    Clearly, the app needs to adapt to the new view, and in the sections that follow,
    I’ll show you the different mechanisms available for doing just that.


    ![image](images/sq.jpg) **Tip**   You can move through the different views for
    an app by pressing Win+. (the Windows and period keys). Each time you press these
    keys, the app will cycle into a new view.


