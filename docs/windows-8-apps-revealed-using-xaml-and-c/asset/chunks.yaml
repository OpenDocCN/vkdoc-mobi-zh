    \ e) {\n    viewModel.SelectedItemIndex = groceryList.SelectedIndex;\n}\n\nprivate\
    \ void AppBarButtonClick(object sender, RoutedEventArgs e) {\n    if (e.OriginalSource\
    \ == AppBarDoneButton\n            && viewModel.SelectedItemIndex > -1) {\n  \
    \      viewModel.GroceryList.RemoveAt(viewModel.SelectedItemIndex);\n        viewModel.SelectedItemIndex\
    \ = -1;\n    }\n}\n```\n\nThere are two points to note in this listing. The first\
    \ is that for simple tasks, implementing the action for a `Button` on the `AppBar`\
    \ is just a matter of responding to the `Click` event.\n\nThe second point is\
