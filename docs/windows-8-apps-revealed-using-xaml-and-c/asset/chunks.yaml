    **改进静态磁贴**


    改善应用在“开始”屏幕外观的最简单方法是更改用于应用磁贴的图像。即使你不使用任何其他磁贴功能，也应该为应用自定义图像。


    为此，你将需要一组三个特定尺寸的图像：30×30 像素、150×150 像素和 310×150 像素。这些图像应包含你想要显示的徽标或文本，但其他部分应为透明。我为示例应用使用了条形码主题，创建了名为`tile30.png`、`tile150.png`和`tile310.png`的图像，并将它们放置在
    Visual Studio 项目的`Assets`文件夹中。


    要应用新图像，请从“解决方案资源管理器”中打开`Package.appxmanifest`文件。在“应用程序 UI”选项卡上有一个“磁贴”部分，其中包含设置徽标、宽徽标和小徽标的选项。有提示说明每个选项所需的尺寸。你还必须设置将用于磁贴的背景颜色；我将其设置为与应用背景相同的颜色（十六进制
    RGB 值`#3E790A`），如图 4-3 所示。


    ![9781430250340_Fig04-03.jpg](img/9781430250340_Fig04-03.jpg)


    图 4-3。 在应用清单中应用图像


    ![image](img/sq.jpg) **提示** 在清单中设置背景颜色很重要，而不是在图像中包含背景。当你更新磁贴时（我将在下一节中演示），图像将被替换为基于清单中指定颜色背景的动态信息。


    你可能需要从“开始”屏幕卸载应用，磁贴图像才能生效。下次从 Visual Studio 启动应用时，你应该会看到新的静态磁贴；你可以通过选择磁贴、右键单击并从应用栏中选择“更大”或“更小”按钮，在标准和宽视图之间切换。你可以在图
    4-4 中看到示例应用的方形和宽磁贴格式。


    ![9781430250340_Fig04-04.jpg](img/9781430250340_Fig04-04.jpg)


    图 4-4。 更新后的静态宽磁贴


    请注意，单词`GrocerApp`显示在磁贴底部。此文本被指定为“应用程序 UI”选项卡中“短名称”选项的值。“显示名称”的“所有徽标”选项意味着它同时应用于常规磁贴和宽磁贴。

