    \nSystem.Diagnostics.Debug.WriteLine(\"Button Clicked: \"\n        + ((Button)e.OriginalSource).Content);\n\
    }\n...\n```\n\n我不需要以任何方式限定控件名称。在这个示例中，我更改了按钮的内容和字体大小。由于这些新语句位于 `Click` 事件处理函数中，点击任一按钮都会导致\
    \ `FirstButton` 的配置发生变化。这就是目前你需要了解的关于 XAML 的全部内容。总结如下：\n\n-   XAML 被转换为代码，并与后台代码文件的内容合并，形成一个单独的\
    \ .NET 类。\n-   你可以在 XAML 中或在代码中配置 UI 控件。\n-   使用 XAML 可以让你利用 Visual Studio 的设计工具，这些工具非常出色。\n\
    \n一开始，XAML 可能会让你觉得冗长且难以阅读，但你很快就会习惯它。我发现使用 XAML 比单纯使用 C# 代码要容易得多，尽管我承认，在决定如此之前，我也花了相当长的时间来学习\
    \ XAML。\n\n## 运行和调试 Windows 应用程序\n\n现在，我们已经有了一个非常简单的 Windows 应用程序，是时候专注于如何运行和调试它了。Visual\
    \ Studio 提供了三种运行应用程序的方式：在本地计算机上、在模拟器上或在远程计算机上。\n\n本地计算机的问题是，开发 PC 的配置很少与用户设备相同。除非你的应用程序针对的是拥有类似规格平台的用户，否则在本地计算机上进行测试并不能让你对应用程序的表现有一个代表性的了解。\n\
    \n在远程计算机上进行测试是最好的方法，但前提是你有一系列具有不同能力的机器来进行测试。我有一台便宜的 Dell Duo 笔记本电脑，它带有触摸屏和一些硬件传感器，对测试很有用，但建立一个稳定的、合适的测试机器集群很快就会变得昂贵。\n\
    \n最佳的折衷方案是 Visual Studio 模拟器，它能真实地呈现 Windows 应用程序的体验，并允许你更改所模拟设备的能力（包括更改屏幕尺寸）、模拟触摸事件以及生成合成的地理位置数据。\n\
    \n要选择模拟器，请找到 Visual Studio 工具栏上当前显示“本地计算机”的按钮，然后单击其右侧的小向下箭头。从弹出菜单中选择“模拟器”，如图 1-5\
    \ 所示。\n\n![9781430250340_Fig01-05.jpg](img/9781430250340_Fig01-05.jpg)\n\n图 1-5.\
    \  选择 Visual Studio 模拟器来测试应用程序\n\n### 在模拟器中运行 Windows 应用程序\n\n要启动示例应用程序，请单击工具栏按钮（此时将显示“模拟器”），或从调试菜单中选择“启动调试”。Visual\
    \ Studio 将启动模拟器，并生成和部署应用程序，如图 1-6 所示。\n\n![9781430250340_Fig01-06.jpg](img/9781430250340_Fig01-06.jpg)\n\
    \n图 1-6.  使用 Visual Studio 模拟器\n\n你可以使用模拟器右侧的按钮来更改屏幕尺寸和方向、在鼠标和触摸输入之间切换，以及合成地理位置数据。目前查看的内容不多，因为示例应用程序非常简单。\n\
    \n点击应用程序布局上的任意一个按钮，以触发事件处理程序方法并更改按钮的配置。图 1-7 显示了结果。\n\n![9781430250340_Fig01-07.jpg](img/9781430250340_Fig01-07.jpg)\n\
    \n图 1-7.  在示例应用程序中点击任一按钮的结果\n\n你还会在输出窗口中看到一条消息，类似于下面这样：\n\n| `Button Clicked:\
    \ Pressed` |\n\n默认情况下，输出窗口可能不会显示。你可以通过在 Visual Studio 中选择“调试” ![image](img/arrow.jpg)\
    \ “窗口”菜单中的“输出”项来打开它。\n\n由于应用程序正在调试器中运行，任何异常都会导致调试器中断，从而允许你像常规 C# 项目一样单步执行代码。你可以通过在源代码中设置断点来强制调试器中断；除了使用模拟器之外，运行和调试\
    \ Windows 应用程序都使用标准的 Visual Studio 功能。\n\n## 总结\n\n在本章中，我概述了本书，并介绍了使用 XAML 和 C#\
    \ 编写的 Windows 应用程序的基础知识。我提供了一个关于 XAML 非常基础的概述，并向你展示了如何应用它来创建一个简单的示例应用程序。在下一章中，我将开始构建应用程序，以添加主要的结构组件，从视图模型开始。\n\
    \n## 第 2 章\n\n![image](img/frontdot.jpg)\n\n## 数据、绑定和页面\n\n在本章中，我将向你展示如何定义和使用构成\
    \ Windows 应用程序核心的数据。为此，我将大致遵循*视图模型*模式，该模式允许我清晰地将数据与负责显示这些数据和处理用户交互的应用程序部分分离开来。\n\
    \n"
- fmt: "### 添加 View Model\n\n你可能已经从模型-视图-控制器（MVC）和模型-视图-视图控制器（MVVC）等设计模式中熟悉了`view\
    \ model`。我不打算在这本书中详细讨论这些模式的细节。关于MVC和MVVC有很多好的资料，可以从维基百科开始，那里有一些平衡且深刻的描述。\n\n我发现使用`view\
    \ model`的好处是巨大的，对于除了最简单的应用项目之外的所有项目，都非常值得考虑，并且我强烈建议你认真考虑遵循同样的路径。我不是一个模式狂热者，我坚信应该采纳那些能解决实际问题的模式和技术部分，并使其适应特定的项目。为此，你会发现我对`view\
    \ model`应该如何使用的看法是开放的。\n\n本章重点介绍应用中的幕后管道，创建一个基础，我可以在其上构建来演示不同的特性。我循序渐进地开始，定义一个简单的`view\
    \ model`，并演示不同的技术，通过数据绑定将数据从`view model`带入应用显示。然后，我将向你展示如何将应用分解为多个页面，并将这些页面引入主布局，更改所使用的页面以反映应用的状态。[表2-1](#9781430250340_Ch02.xhtml#Tab1)提供了本章的总结。\n\
    \n[表2-1](#9781430250340_Ch02.xhtml#_Tab1). 章节总结\n\n| 问题 | 解决方案 | 列表 |\n| --- |\
    \ --- | --- |\n| 创建一个可观察类。 | 实现`INotifyPropertyChanged`接口。 | 1 |\n| 创建一个可观察集合。\
    \ | 使用`ObservableCollection`类。 | 2 |\n| 更改应用启动时加载的页面。 | 更改`App.xaml.cs`中`OnLaunched`方法指定的类型。\
    \ | 3 |\n| 设置数据绑定值的源。 | 使用`DataContext`属性。 | 4 |\n| 创建可重用的样式和模板。 | 创建一个资源字典。 |\
    \ 5, 6 |\n| 将UI控件绑定到view model。 | 使用`Binding`关键字。 | 7 |\n| 向应用布局添加另一个页面。 | 向主布局添加一个`Frame`，并使用`Navigate`方法指定要显示的页面。\
    \ | 8–10 |\n| 动态地将页面插入应用布局。 | 使用`Frame.Navigate`方法，可以选择将上下文对象传递给嵌入的页面。 | 11–14\
    \ |\n\n### 添加 View Model\n\n一个好的 Windows 应用的核心是*view model*，使用它可以使应用数据与呈现给用户的方式保持分离。`View\
    \ model`是创建易于随时间增强和维护的应用的基本基础。将特定UI控件中包含的数据视为权威数据可能很诱人，但很快你就会达到无法管理数据位置和更新方式的地步。\n\
    \n首先，我在Visual Studio项目中创建了一个名为`Data`的新文件夹，并创建了两个新的类文件。第一个定义了`GroceryItem`类，它表示购物清单上的单个项目。你可以在[列表2-1](#9781430250340_Ch02.xhtml#list1)中看到`GroceryItem.cs`的内容。\n\
    \n***[列表2-1](#9781430250340_Ch02.xhtml#_list1).** `GroceryItem`类*\n\n```\nusing\
    \ System.ComponentModel;\n\nnamespace GrocerApp.Data {\n\npublic class GroceryItem\
    \ : INotifyPropertyChanged {\n        private string name, store;\n        private\
    \ int quantity;\n\npublic string Name {\n            get { return name; }\n  \
    \          set { name = value; NotifyPropertyChanged(\"Name\"); }\n        }\n\
    \npublic int Quantity {\n            get { return quantity; }\n            set\
    \ { quantity = value; NotifyPropertyChanged(\"Quantity\"); }\n        }\n\npublic\
    \ string Store {\n            get { return store; }\n            set { store =\
    \ value; NotifyPropertyChanged(\"Store\"); }\n        }\n\npublic event PropertyChangedEventHandler\
    \ PropertyChanged;\n        private void NotifyPropertyChanged(string propName)\
    \ {\n            if (PropertyChanged != null) {\n                PropertyChanged(this,\
    \ new PropertyChangedEventArgs(propName));\n            }\n        }\n    }\n\
    }\n```\n\n这个类定义了要购买物品的名称、数量以及应从哪个商店购买的属性。这个类唯一值得注意的方面是它是*可观察的*。Windows 应用 UI 控件的一个不错特性是它们支持数据绑定，这意味着当它们正在显示的可观察数据发生更改时，它们会自动更新。\n\
    \n你实现`System.ComponentModel.INotifyPropertyChanged`接口以使类可观察，并在任何可观察属性被修改时触发由接口指定的`PropertyChangedEventHandler`。\n\
    \n我在`Data`命名空间中添加的另一个类是`ViewModel`，它包含在`ViewModel.cs`中。这个类包含用户数据和应用状态，你可以在[列表2-2](#9781430250340_Ch02.xhtml#list2)中看到该类的定义。\n\
    \n***[列表2-2](#9781430250340_Ch02.xhtml#_list2).** `ViewModel`类*\n\n```\nusing\
    \ System.Collections.Generic;\nusing System.Collections.ObjectModel;\nusing System.ComponentModel;\n\
    \nnamespace GrocerApp.Data {\n\npublic class ViewModel : INotifyPropertyChanged\
    \ {\n        private ObservableCollection <GroceryItem> groceryList;\n       \
    \ private List <string> storeList;\n        private int selectedItemIndex;\n \
    \       private string homeZipCode;\n\npublic ViewModel() {\n            groceryList\
    \ = new ObservableCollection <GroceryItem> ();\n            storeList = new List\
    \ <string> ();\n            selectedItemIndex = -1;\n            homeZipCode =\
    \ \"NY 10118\";\n        }\n\npublic string HomeZipCode {\n            get { return\
    \ homeZipCode; }\n            set { homeZipCode = value; NotifyPropertyChanged(\"\
    HomeZipCode\"); }\n        }\n\npublic int SelectedItemIndex {\n            get\
    \ { return selectedItemIndex; }\n            set {\n                selectedItemIndex\
    \ = value;                 NotifyPropertyChanged(\"SelectedItemIndex\");\n   \
    \         }\n        }\n\npublic ObservableCollection <GroceryItem> GroceryList\
    \ {\n            get {\n                return groceryList;\n            }\n \
    \       }\n\npublic List <string> StoreList {\n            get {\n           \
    \     return storeList;\n            }\n        }\n\npublic event PropertyChangedEventHandler\
    \ PropertyChanged;\n        private void NotifyPropertyChanged(string propName)\
    \ {\n            if (PropertyChanged != null) {\n                PropertyChanged(this,\
    \ new PropertyChangedEventArgs(propName));\n            }\n        }\n    }\n\
    }\n```\n\n这个简单`view model`最重要的部分是代表购物清单的`GroceryItem`对象集合。我希望该列表是可观察的，这样对列表的更改会自动更新到应用\
    \ UI 中。为此，我使用了来自`System.Collections.ObjectModel`命名空间的`ObservableCollection`。这个类实现了集合的基本功能，并在列表项被添加、移除或替换时发出事件。`ObservableCollection`类在其包含的某个对象的数据值被修改时不会发出事件，但是通过创建可观察的`GroceryList`对象的可观察集合，我确保对购物清单的*任何*更改都会导致\
    \ UI 中的更新。\n\n`ViewModel`类也实现了`INotifyPropertyChanged`，因为 view model 中有两个可观察属性。第一个是`HomeZipCode`，它是用户数据，我将在[第3章](#9781430250340_Ch03.xhtml)演示如何创建*flyouts*时使用它。第二个可观察属性`SelectedItemIndex`是应用状态的一部分，用于跟踪用户选择了购物清单中的哪个项目（如果有的话）。"
  raw: 'You may already be familiar with view models from design patterns such as
    Model-View-Controller (MVC) and Model-View-View Controller (MVVC). I am not going
    to get into the details of these patterns in this book. There is a lot of good
    information about MVC and MVVC available, starting with Wikipedia, which has some
    balanced and insightful descriptions.


    I find the benefits of using a view model to be enormous and well worth considering
    for all but the simplest app projects, and I recommend you seriously consider
    following the same path. I am not a pattern zealot, and I firmly believe in taking
    the parts of patterns and techniques that solve real problems and adapting them
    to work in specific projects. To that end, you will find that I take a liberal
    view of how a view model should be used.


    This chapter focuses on the behind-the-scenes plumbing in an app, creating a foundation
    that I can build to demonstrate different features. I start slowly, defining a
    simple view model, and demonstrate different techniques for bringing the data
    from the view model into the app display using data binding. I then show you how
    you can break down your app into multiple pages and bring those pages into the
    main layout, changing which pages are used to reflect the state of your app. [Table
    2-1](#9781430250340_Ch02.xhtml#Tab1) provides the summary for this chapter.


    [Table 2-1](#9781430250340_Ch02.xhtml#_Tab1). Chapter Summary


    | Problem | Solution | Listing |

    | --- | --- | --- |

    | Create an observable class. | Implement the INotifyPropertyChanged interface.
    | 1 |

    | Create an observable collection. | Use the ObservableCollection class. | 2 |

    | Change the Page loaded when an app starts. | Change the type specified in the
    OnLaunched method in App.xaml.cs. | 3 |

    | Set the source for data binding values. | Use the DataContext property. | 4
    |

    | Create reusable styles and templates. | Create a resource dictionary. | 5, 6
    |

    | Bind UI controls to the view model. | Use the Binding keyword. | 7 |

    | Add another Page to the app layout. | Add a Frame to the main layout and use
    the Navigate method to specify the Page to display. | 8–10 |

    | Dynamically insert pages into the app layout. | Use the Frame.Navigate method,
    optionally passing a context object to the embedded Page. | 11–14 |


    Adding a View Model


    At the heart of a good Windows app is a *view model*, the use of which lets me
    keep my app data separate from the way it is presented to the user. View models
    are an essential foundation for creating apps that are easy to enhance and maintain
    over time. It can be tempting to treat the data contained in a particular UI control
    as being authoritative, but you will soon reach a point where figuring out where
    your data is and how it should be updated is unmanageable.


    To begin, I have created a new folder in the Visual Studio project called `Data`
    and have created a two new class files. The first defines the `GroceryItem` class,
    which represents a single item on the grocery list. You can see the contents of
    `GroceryItem.cs` in [Listing 2-1](#9781430250340_Ch02.xhtml#list1).


    ***[Listing 2-1](#9781430250340_Ch02.xhtml#_list1).** The**GroceryItem Class*


    ```

    using System.ComponentModel;


    namespace GrocerApp.Data {


    public class GroceryItem : INotifyPropertyChanged {

            private string name, store;

            private int quantity;


    public string Name {

                get { return name; }

                set { name = value; NotifyPropertyChanged("Name"); }

            }


    public int Quantity {

                get { return quantity; }

                set { quantity = value; NotifyPropertyChanged("Quantity"); }

            }


    public string Store {

                get { return store; }

                set { store = value; NotifyPropertyChanged("Store"); }

            }


    public event PropertyChangedEventHandler PropertyChanged;

            private void NotifyPropertyChanged(string propName) {

                if (PropertyChanged != null) {

                    PropertyChanged(this, new PropertyChangedEventArgs(propName));

                }

            }

        }

    }

    ```


    This class defines properties for the name and quantity of the item to be purchased
    and which store it should be bought from. The only noteworthy aspect of this class
    is that it is *observable*. One of the nice features about the Windows App UI
    controls is that they support data binding, which means they automatically update
    when the observable data they are displaying is changed.


    You implement the `System.ComponentModel.INotifyPropertyChanged` interface to
    make classes observable and trigger the `PropertyChangedEventHandler` specified
    by the interface when any of the observable properties is modified.


    The other class I added in the `Data` namespace is `ViewModel`, which is contained
    in `ViewModel.cs`. This class contains the user data and the app state, and you
    can see the definition of the class in [Listing 2-2](#9781430250340_Ch02.xhtml#list2).


    ***[Listing 2-2](#9781430250340_Ch02.xhtml#_list2).** The ViewModel Class*


    ```

    using System.Collections.Generic;

    using System.Collections.ObjectModel;

    using System.ComponentModel;


    namespace GrocerApp.Data {


    public class ViewModel : INotifyPropertyChanged {

            private ObservableCollection <GroceryItem> groceryList;

            private List <string> storeList;

            private int selectedItemIndex;

            private string homeZipCode;


    public ViewModel() {

                groceryList = new ObservableCollection <GroceryItem> ();

                storeList = new List <string> ();

                selectedItemIndex = -1;

                homeZipCode = "NY 10118";

            }


    public string HomeZipCode {

                get { return homeZipCode; }

                set { homeZipCode = value; NotifyPropertyChanged("HomeZipCode"); }

            }


    public int SelectedItemIndex {

                get { return selectedItemIndex; }

                set {

                    selectedItemIndex = value;                 NotifyPropertyChanged("SelectedItemIndex");

                }

            }


    public ObservableCollection <GroceryItem> GroceryList {

                get {

                    return groceryList;

                }

            }


    public List <string> StoreList {

                get {

                    return storeList;

                }

            }


    public event PropertyChangedEventHandler PropertyChanged;

            private void NotifyPropertyChanged(string propName) {

                if (PropertyChanged != null) {

                    PropertyChanged(this, new PropertyChangedEventArgs(propName));

                }

            }

        }

    }

    ```


    The most important part of this simple view model is the collection of `GroceryItem`
    objects that represent the grocery list. I want the list to be observable so that
    changes to the list are automatically updated in the app UI. To do this, I use
    an `ObservableCollection` from the `System.Collections.ObjectModel` namespace.
    This class implements the basic features of a collection and emits events when
    list items are added, removed, or replaced. The `ObservableCollection` class doesn’t
    emit an event when the data values of one of the objects it contains are modified,
    but by creating an observable collection of observable `GroceryList` objects,
    I make sure that *any* change to the grocery list will result in an update in
    the UI.


    The `ViewModel` class implements the `INotifyPropertyChanged` as well, because
    there are two observable properties in the view model. The first, `HomeZipCode`,
    is user data, and I’ll use that in [Chapter 3](#9781430250340_Ch03.xhtml) when
    I demonstrate how to create *flyouts*. The second observable property, `SelectedItemIndex`,
    is part of the app state and keeps track of which item in the grocery list the
    user has selected, if any.'
  trans: "\n### 添加 View Model\n\n你可能已经从模型-视图-控制器（MVC）和模型-视图-视图控制器（MVVC）等设计模式中熟悉了`view\
    \ model`。我不打算在这本书中详细讨论这些模式的细节。关于 MVC 和 MVVC 有很多好的资料，可以从维基百科开始，那里有一些平衡且深刻的描述。\n\
    \n我发现使用`view model`的好处是巨大的，对于除了最简单的应用项目之外的所有项目，都非常值得考虑，并且我强烈建议你认真考虑遵循同样的路径。我不是一个模式狂热者，我坚信应该采纳那些能解决实际问题的模式和技术部分，并使其适应特定的项目。为此，你会发现我对`view\
    \ model`应该如何使用的看法是开放的。\n\n本章重点介绍应用中的幕后管道，创建一个基础，我可以在其上构建来演示不同的特性。我循序渐进地开始，定义一个简单的`view\
    \ model`，并演示不同的技术，通过数据绑定将数据从`view model`带入应用显示。然后，我将向你展示如何将应用分解为多个页面，并将这些页面引入主布局，更改所使用的页面以反映应用的状态。表\
    \ 2-1 提供了本章的总结。\n\n表 2-1. 章节总结\n\n| 问题 | 解决方案 | 列表 |\n| --- | --- | --- |\n| 创建一个可观察类。\
    \ | 实现`INotifyPropertyChanged`接口。 | 1 |\n| 创建一个可观察集合。 | 使用`ObservableCollection`类。\
    \ | 2 |\n| 更改应用启动时加载的页面。 | 更改`App.xaml.cs`中`OnLaunched`方法指定的类型。 | 3 |\n| 设置数据绑定值的源。\
    \ | 使用`DataContext`属性。 | 4 |\n| 创建可重用的样式和模板。 | 创建一个资源字典。 | 5, 6 |\n| 将 UI 控件绑定到\
    \ view model。 | 使用`Binding`关键字。 | 7 |\n| 向应用布局添加另一个页面。 | 向主布局添加一个`Frame`，并使用`Navigate`方法指定要显示的页面。\
    \ | 8–10 |\n| 动态地将页面插入应用布局。 | 使用`Frame.Navigate`方法，可以选择将上下文对象传递给嵌入的页面。 | 11–14\
    \ |\n\n### 添加 View Model\n\n一个好的 Windows 应用的核心是*view model*，使用它可以使应用数据与呈现给用户的方式保持分离。`View\
    \ model`是创建易于随时间增强和维护的应用的基本基础。将特定 UI 控件中包含的数据视为权威数据可能很诱人，但很快你就会达到无法管理数据位置和更新方式的地步。\n\
    \n首先，我在 Visual Studio 项目中创建了一个名为`Data`的新文件夹，并创建了两个新的类文件。第一个定义了`GroceryItem`类，它表示购物清单上的单个项目。你可以在列表\
    \ 2-1 中看到`GroceryItem.cs`的内容。\n\n***列表 2-1.** `GroceryItem`类*\n\n```\nusing System.ComponentModel;\n\
    \nnamespace GrocerApp.Data {\n\npublic class GroceryItem : INotifyPropertyChanged\
    \ {\n        private string name, store;\n        private int quantity;\n\npublic\
    \ string Name {\n            get { return name; }\n            set { name = value;\
    \ NotifyPropertyChanged(\"Name\"); }\n        }\n\npublic int Quantity {\n   \
    \         get { return quantity; }\n            set { quantity = value; NotifyPropertyChanged(\"\
    Quantity\"); }\n        }\n\npublic string Store {\n            get { return store;\
    \ }\n            set { store = value; NotifyPropertyChanged(\"Store\"); }\n  \
    \      }\n\npublic event PropertyChangedEventHandler PropertyChanged;\n      \
    \  private void NotifyPropertyChanged(string propName) {\n            if (PropertyChanged\
    \ != null) {\n                PropertyChanged(this, new PropertyChangedEventArgs(propName));\n\
    \            }\n        }\n    }\n}\n```\n\n这个类定义了要购买物品的名称、数量以及应从哪个商店购买的属性。这个类唯一值得注意的方面是它是*可观察的*。Windows\
    \ 应用 UI 控件的一个不错特性是它们支持数据绑定，这意味着当它们正在显示的可观察数据发生更改时，它们会自动更新。\n\n你实现`System.ComponentModel.INotifyPropertyChanged`接口以使类可观察，并在任何可观察属性被修改时触发由接口指定的`PropertyChangedEventHandler`。\n\
    \n我在`Data`命名空间中添加的另一个类是`ViewModel`，它包含在`ViewModel.cs`中。这个类包含用户数据和应用状态，你可以在列表 2-2\
    \ 中看到该类的定义。\n\n***列表 2-2.** `ViewModel`类*\n\n```\nusing System.Collections.Generic;\n\
    using System.Collections.ObjectModel;\nusing System.ComponentModel;\n\nnamespace\
    \ GrocerApp.Data {\n\npublic class ViewModel : INotifyPropertyChanged {\n    \
    \    private ObservableCollection <GroceryItem> groceryList;\n        private\
    \ List <string> storeList;\n        private int selectedItemIndex;\n        private\
    \ string homeZipCode;\n\npublic ViewModel() {\n            groceryList = new ObservableCollection\
    \ <GroceryItem> ();\n            storeList = new List <string> ();\n         \
    \   selectedItemIndex = -1;\n            homeZipCode = \"NY 10118\";\n       \
    \ }\n\npublic string HomeZipCode {\n            get { return homeZipCode; }\n\
    \            set { homeZipCode = value; NotifyPropertyChanged(\"HomeZipCode\"\
    ); }\n        }\n\npublic int SelectedItemIndex {\n            get { return selectedItemIndex;\
    \ }\n            set {\n                selectedItemIndex = value;           \
    \      NotifyPropertyChanged(\"SelectedItemIndex\");\n            }\n        }\n\
    \npublic ObservableCollection <GroceryItem> GroceryList {\n            get {\n\
    \                return groceryList;\n            }\n        }\n\npublic List\
    \ <string> StoreList {\n            get {\n                return storeList;\n\
    \            }\n        }\n\npublic event PropertyChangedEventHandler PropertyChanged;\n\
    \        private void NotifyPropertyChanged(string propName) {\n            if\
    \ (PropertyChanged != null) {\n                PropertyChanged(this, new PropertyChangedEventArgs(propName));\n\
    \            }\n        }\n    }\n}\n```\n\n这个简单`view model`最重要的部分是代表购物清单的`GroceryItem`对象集合。我希望该列表是可观察的，这样对列表的更改会自动更新到应用\
    \ UI 中。为此，我使用了来自`System.Collections.ObjectModel`命名空间的`ObservableCollection`。这个类实现了集合的基本功能，并在列表项被添加、移除或替换时发出事件。`ObservableCollection`类在其包含的某个对象的数据值被修改时不会发出事件，但是通过创建可观察的`GroceryList`对象的可观察集合，我确保对购物清单的*任何*更改都会导致\
    \ UI 中的更新。\n\n`ViewModel`类也实现了`INotifyPropertyChanged`，因为 view model 中有两个可观察属性。第一个是`HomeZipCode`，它是用户数据，我将在第\
    \ 3 章演示如何创建*flyouts*时使用它。第二个可观察属性`SelectedItemIndex`是应用状态的一部分，用于跟踪用户选择了购物清单中的哪个项目（如果有的话）。\n"
- fmt: "这是一个非常简单的视图模型，正如我所提到的，我在项目中构建视图模型时采取了灵活的方式。尽管如此，它包含了演示如何使用数据绑定自动更新应用程序UI控件所需的所有要素。\n\
    \n## 添加主布局\n\n现在我已经定义了视图模型，就可以开始构建UI了。第一步是添加应用程序的主页面。我理解为什么Visual Studio会生成一个名为`MainPage`的页面，但我想向你展示我通常如何构建项目，因此我将向项目添加一个新页面。\n\
    \n![image](images/sq.jpg) **提示** 我不会再使用`MainPage.xaml`，你可以将其从项目中删除。\n\n我喜欢使用大量的项目结构，因此我向项目添加了一个名为`Pages`的新文件夹。我通过右键单击`Pages`文件夹，从弹出菜单中选择添加![image](images/arrow.jpg)新项，并选择空白页面模板，添加了一个名为`ListPage.xaml`的新空白页面。Visual\
    \ Studio会创建XAML文件和代码后置文件`ListPage.xaml.cs`。\n\n![image](images/sq.jpg) **提示**\
    \ 如果你是使用XAML构建应用程序的新手，那么重要的是要理解，你通常不会按照我描述示例应用程序的顺序来工作。相反，XAML方法支持一种更迭代的风格，你可以在其中使用XAML声明一些控件，添加一些代码来支持它们，并可能定义一些样式来减少标记中的重复。这比我在这里展示的要自然得多，但在书中很难捕捉到基于XAML的开发中来回反复的特性。\n\
    \n我希望将`ListPage.xaml`设置为应用程序启动时加载的页面，这需要更新`App.xaml.cs`，如下面的[列表2-3](#9781430250340_Ch02.xhtml#list3)所示。\n\
    \n***[列表2-3](#9781430250340_Ch02.xhtml#_list3).** 更新`App.xaml.cs`以使用`ListPage`*\n\
    \n```csharp\nusing System;\nusing Windows.ApplicationModel;\nusing Windows.ApplicationModel.Activation;\n\
    using Windows.UI.Xaml;\nusing Windows.UI.Xaml.Controls;\n\nnamespace GrocerApp\
    \ {\n\n    sealed partial class App : Application {\n\n        public App() {\n\
    \            this.InitializeComponent();\n            this.Suspendin += OnSuspending;\n\
    \        }\n\n        protected override void OnLaunched(LaunchActivatedEventArgs\
    \ args) {\n            Frame rootFrame = Window.Current.Content as Frame;\n\n\
    \            if (rootFrame == null) {\n                rootFrame = new Frame();\n\
    \n                if (args.PreviousExecutionState == ApplicationExecutionState.Terminated)\
    \ {\n                    //TODO: Load state from previously suspended application\n\
    \                }\n\n                // Place the frame in the current Window\n\
    \                Window.Current.Content = rootFrame;\n            }\n\n      \
    \      if (rootFrame.Content == null) {\n\n                if (!rootFrame.Navigate(typeof(Pages.ListPage),\
    \ args.Arguments)) {\n                    throw new Exception(\"Failed to create\
    \ initial page\");\n                }\n            }\n            // Ensure the\
    \ current window is active\n            Window.Current.Activate();\n        }\n\
    \n        private void OnSuspending(object sender, SuspendingEventArgs e) {\n\
    \            var deferral = e.SuspendingOperation.GetDeferral();\n           \
    \ //TODO: Save application state and stop any background activity\n          \
    \  deferral.Complete();\n        }\n    }\n}\n```\n\n暂时不用担心这个类的其余部分。我将在[第5章](#9781430250340_Ch05.xhtml)中解释如何响应Windows应用程序的生命周期时再回到这个话题。\n\
    \n## 编写代码\n\n对我来说，解释如何创建示例应用程序最简单的方式是，以与你在项目中通常创建顺序相反的顺序来呈现内容。为此，我将从`ListPage.xaml.cs`代码后置文件开始。你可以在下面的[列表2-4](#9781430250340_Ch02.xhtml#list4)中看到此文件的内容，包括我对Visual\
    \ Studio默认内容所做的添加。\n\n***[列表2-4](#9781430250340_Ch02.xhtml#_list4).** `ListPage.xaml.cs`文件*"
  raw: "This is a very simple view model, and as I mentioned, I take a liberal view\
    \ of how I structure view models in my projects. That said, it contains all of\
    \ the ingredients I need to demonstrate how to use data binding to keep my app\
    \ UI controls automatically updated.\n\nAdding the Main Layout\n\nNow that I have\
    \ defined the view model, I can start to put together the UI. The first step is\
    \ to add the main page for the app. I understand why Visual Studio generates a\
    \ page called `MainPage`, but I want to show you how I tend to structure my projects,\
    \ so I am going to add a new page to the project.\n\n![image](images/sq.jpg) **Tip**  \
    \ I won’t be using `MainPage.xaml` again, so you can delete it from your project.\n\
    \nI like to work with a lot of project structure, so I have added a new folder\
    \ to the project called `Pages`. I added a new `Blank Page` called `ListPage.xaml`\
    \ by right-clicking the `Pages` folder, selecting Add ![image](images/arrow.jpg)\
    \ New Item from the pop-up menu, and selecting the Blank Page template. Visual\
    \ Studio creates the XAML file and the code-behind file, `ListPage.xaml.cs`.\n\
    \n![image](images/sq.jpg) **Tip**   If you are new to building apps using XAML,\
    \ then it is important to understand that you wouldn’t usually work in the order\
    \ in which I described the example app. Instead, the XAML approach supports a\
    \ more iterative style where you declare some controls using XAML, add some code\
    \ to support them, and perhaps define some styles to reduce duplication in the\
    \ markup. It is a much more natural process than I have made it appear here, but\
