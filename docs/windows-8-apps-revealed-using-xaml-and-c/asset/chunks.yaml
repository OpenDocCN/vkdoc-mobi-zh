    我可以在 XAML 文件中不加任何限定地引用 `ButtonClick` 方法，这是因为由 XAML 文件生成的代码与后台代码文件中的 C# 代码合并，形成了一个单独的类。结果是，当应用程序布局中的某个\
    \ `Button` 元素被点击时，我的 C# `ButtonClick` 方法将被调用。\n\n![image](img/sq.jpg) **提示** \
