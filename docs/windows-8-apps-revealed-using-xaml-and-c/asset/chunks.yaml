    \ XAML 内容合并而成，这意味着`this`指向包含所有 XAML 声明的控件的`Page`对象。\n\n我做的最后一项添加是定义一个方法，用于处理`ListView`控件的`SelectionChanged`事件。这种控件将用于显示购物清单中的项目。当我定义\
    \ XAML 时，我会安排当用户选择其中某一项时调用此方法。该方法根据`ListView`控件的`SelectedIndex`属性，在视图模型中设置`SelectedItemIndex`属性。由于`SelectedItemIndex`属性是可观察的，当用户进行选择时，应用的其他部分可以收到通知。\n\
    \n# 添加资源字典\n\n在第 1 章中，我解释了 Visual Studio 创建的`StandardStyles.xaml`文件定义了一些 Windows\
    \ 应用中使用的 XAML 样式和模板。像这样定义样式是个好主意，因为这意味着你可以在一个地方应用更改，而不必追踪所有直接对 UI 控件应用颜色或字体设置的地方。我的示例项目需要一些标准样式和模板。为此，我创建了一个名为`Resources`的新文件夹，并使用资源字典项模板创建了一个名为`GrocerResourceDictionary.xaml`的新文件。你可以在清单\
    \ 2-5 中看到此文件的内容。\n\n![image](img/sq.jpg) **提示**   正如我在第 1 章中解释的，Microsoft 禁止向`StandardStyles.xaml`添加样式。如果你想创建自定义样式，必须创建自己的资源字典。\n\
    \n***清单 2-5.**  定义资源字典*\n\n```\n<ResourceDictionary\n    xmlns = \"http://schemas.microsoft.com/winfx/2006/xaml/presentation\"\
    \n    xmlns:x = \"http://schemas.microsoft.com/winfx/2006/xaml\"\n    xmlns:local\
    \ = \"using:GrocerApp.Resources\">\n    <ResourceDictionary.MergedDictionaries>\n\
    \        <ResourceDictionary Source = \"/Common/StandardStyles.xaml\" />\n   \
    \ </ResourceDictionary.MergedDictionaries>\n\n<SolidColorBrush x:Key = \"AppBackgroundColor\"\
    \ Color = \"#3E790A\"/>\n\n<Style x:Key = \"GroceryListItem\" TargetType = \"\
    TextBlock\"\n           BasedOn = \"{StaticResource BasicTextStyle}\" >\n    \
    \    <Setter Property = \"FontSize\" Value = \"45\"/>\n        <Setter Property\
    \ = \"FontWeight\" Value = \"Light\"/>\n        <Setter Property = \"Margin\"\
    \ Value = \"10, 0\"/>\n        <Setter Property = \"VerticalAlignment\" Value\
    \ = \"Center\"/>\n    </Style>\n\n<DataTemplate x:Key = \"GroceryListItemTemplate\"\
    >\n        <StackPanel Orientation = \"Horizontal\">\n            <TextBlock Text\
    \ = \"{Binding Quantity}\"\n                       Style = \"{StaticResource GroceryListItem}\"\
    \ Width = \"50\"/>\n            <TextBlock Text = \"{Binding Name}\"\n       \
    \                Style = \"{StaticResource GroceryListItem}\"  Width = \"200\"\
    />\n            <TextBlock Text = \"{Binding Store}\"\n                      \
    \ Style = \"{StaticResource GroceryListItem}\"  Width = \"300\"/>\n        </StackPanel>\n\
    \    </DataTemplate>\n</ResourceDictionary>\n```\n\n本书不会深入探讨样式和模板的细节，但我会解释这个文件中的内容，以便为后续的清单提供一些上下文。最简单的声明如下：\n\
    \n```\n...\n<SolidColorBrush x:Key = \"AppBackgroundColor\" Color = \"#3E790A\"\
    />\n...\n```\n\n应用默认的配色方案是白底黑字，我想进行更改。更改的第一步是定义一种不同的颜色，这正是此元素所做的，它将一种绿色与键`AppBackgroundColor`关联起来。稍后当我创建\
    \ XAML 布局时，你将看到我使用此键来应用该颜色。\n\n下一个声明是关于样式的，它包含多个属性的值：\n\n```\n...\n<Style x:Key\
    \ = \"GroceryListItem\" TargetType = \"TextBlock\"\n    BasedOn = \"{StaticResource\
    \ BasicTextStyle}\" >\n    <Setter Property = \"FontSize\" Value = \"45\"/>\n\
    \    <Setter Property = \"FontWeight\" Value = \"Light\"/>\n    <Setter Property\
    \ = \"Margin\" Value = \"10, 0\"/>\n    <Setter Property = \"VerticalAlignment\"\
    \ Value = \"Center\"/>\n</Style>\n...\n```\n\n这个名为`GroceryListItem`的样式定义了多个属性的值：`FontSize`、`FontWeight`等。但请注意，在声明样式时，我使用了`BasedOn`属性。这允许我继承另一个样式中定义的所有值。在此例中，我继承了\
    \ Microsoft 在`StandardStyles.xaml`文件中定义的`BasicTextStyle`样式。在派生此类新样式之前，我必须先将其他资源字典文件纳入作用域，这通过以下声明实现：\n\
    \n```\n<ResourceDictionary.MergedDictionaries>\n    <ResourceDictionary Source\
    \ = \" /Common/StandardStyles.xaml \" />\n</ResourceDictionary.MergedDictionaries>\n\
    ```\n\n你可以通过这种方式导入任意数量的文件，但导入操作必须在从文件内容派生样式之前进行。\n\n最后一个声明是关于数据模板的，通过它我可以定义一个元素层次结构，该层次结构将用于表示数据源中的每个项。如你所猜，我的数据来源将是视图模型中的杂货项目集合。集合中的每个项都将由一个包含三个`TextBlock`控件的`StackPanel`表示。请注意标记为粗体的两个属性：\n"
- fmt: '```

    ...

    <DataTemplate x:Key = "GroceryListItemTemplate">

        <StackPanel Orientation = "Horizontal">

            <TextBlock Text = "{Binding Quantity}"

                Style = "{StaticResource GroceryListItem}" Width = "50"/>

            <TextBlock Text = "{Binding Name}"

                Style = "{StaticResource GroceryListItem}"  Width = "200"/>

            <TextBlock Text = "{Binding Store}"

                Style = "{StaticResource GroceryListItem}"  Width = "300"/>

        </StackPanel>

    </DataTemplate>

    ...

    ```


    The value of the `Text` attribute is important. The `Binding` keyword tells the
    runtime that I want the value of the `Text` attribute to be obtained from the
    `DataContext` for the control. In the previous section, I specified the view model
    as the source for this data, and specifying `Quantity` tells the runtime I want
    to use the `Quantity` property of the object that template is being used to display.
    By setting the `DataContext` property in the code-behind file, I specify the big
    picture (“use my view model of the source of binding data”), and the `Binding`
    keyword lets me specify the fine detail (“display the value of this particular
    property”). When I come to the main XAML file, I’ll be able to connect the two
    so that the runtime knows which part of the view model should be used to get individual
    property values.


    The other attribute I marked is less interesting but still useful. For the `Style`
    attribute, I have specified that I want a `StaticResource` called the `GroceryList`
    item. The `StaticResource` keyword tells the runtime that the resource I am looking
    for has already been defined. I have used the `GroceryListItem` style I specified
    a moment ago. The benefit here is that I can change the appearance of my three
    `TextBlock` controls in one place and that I can easily derive new styles for
    controls that I want to have a similar appearance. The last step is to add the
    custom resource dictionary to `App.xaml` so that it becomes available in the app,
    which I do in [Listing 2-6](#9781430250340_Ch02.xhtml#list6).


    **[Listing 2-6](#9781430250340_Ch02.xhtml#_list6).** Adding the Custom Resource
    Dictionary to the `App.xaml` File


    ```

    <Application

        x:Class = "GrocerApp.App"

        xmlns = " http://schemas.microsoft.com/winfx/2006/xaml/presentation "

        xmlns:x = " http://schemas.microsoft.com/winfx/2006/xaml "

        xmlns:local = "using:GrocerApp">

        <Application.Resources>

            <ResourceDictionary>

                <ResourceDictionary.MergedDictionaries>

                   <!--

                        Styles that define common aspects of the platform look and
    feel

                        Required by Visual Studio project and item templates

                    -->

                    <ResourceDictionary Source = "Common/StandardStyles.xaml"/>

                    <ResourceDictionary Source = "Resources/GrocerResourceDictionary.xaml"/>

                </ResourceDictionary.MergedDictionaries>

            </ResourceDictionary>

        </Application.Resources>

    </Application>

    ```


    ## Writing the XAML


    Now that I have the code-behind file and the resource dictionary in place, I can
    turn to the XAML to declare the controls that will form the app layout. [Listing
    2-7](#9781430250340_Ch02.xhtml#list7) shows the content of the `ListPage.xaml`
    file.


    **[Listing 2-7](#9781430250340_Ch02.xhtml#_list7).** The `ListPage.xaml` File


    ```

    <Page

        x:Class = "GrocerApp.Pages.ListPage"

        xmlns = "http://schemas.microsoft.com/winfx/2006/xaml/presentation"

        xmlns:x = "http://schemas.microsoft.com/winfx/2006/xaml"

        xmlns:local = "using:GrocerApp.Pages"

        xmlns:d = "http://schemas.microsoft.com/expression/blend/2008"

        xmlns:mc = "http://schemas.openxmlformats.org/markup-compatibility/2006"

        mc:Ignorable = "d">

        <Grid Background = "{StaticResourceAppBackgroundColor}">

            <Grid.RowDefinitions>

                <RowDefinition/>

                <RowDefinition/>

            </Grid.RowDefinitions>

            <Grid.ColumnDefinitions>

                <ColumnDefinition/>

                <ColumnDefinition/>

            </Grid.ColumnDefinitions>

            <StackPanel Grid.RowSpan = "2">

                <TextBlock Style = "{StaticResource HeaderTextStyle}" Margin = "10"

                           Text = "Grocery List"/>

                <ListView x:Name = "groceryList" Grid.RowSpan = "2"

                    ItemsSource = "{Binding GroceryList}"

                    ItemTemplate = "{StaticResource GroceryListItemTemplate}"

                    SelectionChanged = "ListSelectionChanged" />

            </StackPanel>

            <StackPanel Orientation = "Vertical" Grid.Column = "1">

                <TextBlock Style = "{StaticResource HeaderTextStyle}" Margin = "10"

                           Text = "Item Detail"/>

            </StackPanel>

            <StackPanel Orientation = "Vertical" Grid.Column = "1" Grid.Row = "1">

                <TextBlock Style = "{StaticResource HeaderTextStyle}" Margin = "10"

                           Text = "Store Detail"/>

            </StackPanel>

        </Grid>

    </Page>

    ```


    You can see that I have set the `Background` attribute for the `Grid` control
    to the color I specified in the resource dictionary. In addition, I configured
    the `Grid` control that was defined by Visual Studio and divided it into two equal-sized
    columns, each of which has two equal-sized rows using the `Grid.RowDefinitions`
    and `Grid.ColumnDefinitions` elements.


    For the left side of the layout, I have added a `StackPanel` that I have configured
    so that it spans two rows and fills the left half of the layout:


    ```

    ...

    <StackPanel Grid.RowSpan = "2" >

    ...

    ```


    This `StackPanel` contains a `TextBlock`, which I use to display a header, and
    a `ListView`, which I’ll come back to shortly. For the right side of the screen,
    I have added a pair of `StackPanel`s, one in each row. I have specified which
    row and column each belongs in using the `Grid.Row` and `Grid.Column` attributes.
    These attributes use a zero-based index, and controls that don’t have these attributes
    are put in the first row and column. You can see how the layout appears on the
    Visual Studio design surface in [Figure 2-1](#9781430250340_Ch02.xhtml#Fig1).


    ![9781430250340_Fig02-01.jpg](images/9781430250340_Fig02-01.jpg)


    [Figure 2-1](#9781430250340_Ch02.xhtml#_Fig1). The static parts of the XAML layout
    displayed on the Visual Studio design surface


    The design surface isn’t able to display content that is generated dynamically,
    which is why you can’t see the view model data in the figure. The dynamic content
    will be displayed in a `ListView` control. As its name suggests, `ListView` displays
    a set of items in a list. There are three XAML attributes that set out how this
    will be done:


    ```

    ...

    <ListView x:Name = "groceryList" Grid.RowSpan = "2"

        ItemsSource = "{Binding GroceryList}"

        ItemTemplate = "{StaticResource GroceryListItemTemplate}"

        SelectionChanged = "ListSelectionChanged"/>

    ...

    ```


    I use these properties to close the gap between the macro-level `DataContext`
    property and the micro-level properties in the template. The `ItemSource` attribute
    tells the `ListView` control where it should get the set of items it must display.
    The `Binding` keyword with a value of `GroceryList` tells the `ListView` that
    it should display the contents of the `GroceryList` property of the `DataContext`
    object I set in the code-behind file.'
