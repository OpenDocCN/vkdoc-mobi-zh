    \ when your app is resumed. You will also have to refresh data that may have become\
    \ stale; this includes location data, since the device may have been moved during\
    \ the period your app was suspended.\n\n> **Tip** Windows allows users to terminate\
    \ apps by pressing `Alt+F4`. There is no helpful warning event that gives you\
    \ the opportunity to tidy up your data and operations. Instead, Windows just terminates\
    \ your app’s process.\n\n## Adding a Background Activity\n\nNow that I have confirmed\
    \ that my app can get and respond to the `Resuming` and `Suspending` events, I\
    \ can add some functionality that requires a recurring background task. For this\
    \ example, I am going to use the geolocation service to report on the current\
    \ device location. To start, I have created a new class file called `Location.cs`\
    \ in the `Data` project folder. The contents of this file are shown in [Listing\
    \ 5-3](#9781430250340_Ch05.xhtml#list3).\n\n**[Listing 5-3](#9781430250340_Ch05.xhtml#_list3).**\
    \ The `Location.cs` File\n\n```\nusing System;\nusing System.Net.Http;\nusing\
    \ System.Threading.Tasks;\nusing Windows.Data.Json;\nusing Windows.Devices.Geolocation;\n\
    \nnamespace GrocerApp.Data {\n    class Location {\n\n        public static async\
    \ Task<string> TrackLocation() {\n            Geolocator geoloc = new Geolocator();\n\
    \            Geoposition position = await geoloc.GetGeopositionAsync();\n\n  \
    \          HttpClient httpClient = new HttpClient();\n            httpClient.BaseAddress\
    \ = new Uri(\"http://nominatim.openstreetmap.org\");\n            HttpResponseMessage\
    \ httpResult = await httpClient.GetAsync(\n                String.Format(\"reverse?format=json&lat={0}&lon={1}\"\
    ,\n                position.Coordinate.Latitude, position.Coordinate.Longitude));\n\
    \n            JsonObject jsonObject = JsonObject\n                .Parse(await\
    \ httpResult.Content.ReadAsStringAsync());\n\n            return jsonObject.GetNamedObject(\"\
    address\")\n                .GetNamedString(\"road\") + DateTime.Now.ToString(\"\
    ' ('HH:mm:ss')'\");\n        }\n    }\n}\n```\n\nThis class uses the Windows 8\
    \ geolocation feature to get the location of the device. This feature is exposed\
    \ through the `Geolocator` class in the `Windows.Devices.Geolocation` namespace,\
    \ and the `GetGeopositionAsync` method gets a single snapshot of the location\
    \ (as opposed to providing location updates via events, which is the other approach\
    \ supported by the `Geolocator` class).\n\n> **Caution** The new C# `await` keyword\
    \ signals that I have entered realms of parallel/asynchronous programming. This\
    \ is an advanced example that uses the Task Parallel Library (TPL) to create and\
