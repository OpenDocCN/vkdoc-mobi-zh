    \ 1-3 所示。（为简洁起见，我删除了 Visual Studio 添加到该文件中的一些注释。）\n\n***清单 1-3.*** App.xaml.cs\
    \ 文件\n\n```csharp\nusing System;\nusing System.Collections.Generic;\nusing System.IO;\n\
