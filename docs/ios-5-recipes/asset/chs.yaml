  \n![Image](img/9781430240051_Fig01-20.jpg)\n\n**图 1-20.** *将一个分支与当前分支合并*\n\n这个提交更改窗口与您之前看到的非常相似，但有一个小的变化：在代码审阅窗格的底部，您会看到四个图标。如果每个分支都包含一个在两个分支中都被修改过的文件，这些图标将允许您决定哪个优先。这些图标从左到右依次是：“先合并左侧文件，再合并右侧文件”、“仅保留左侧文件更改”、“仅保留右侧文件更改”和“先合并右侧文件，再合并左侧文件”。这些图标显示在图\
  \ 1-21 中。这对于解决两人对同一文件进行了更改或文件在两个分支中都被修改时的冲突非常有用。\n\n![Image](img/9781430240051_Fig01-21.jpg)\n\
  \n**图 1-21.** *指定合并时的更改优先级*\n\n单击“合并”按钮将把 MainMenu 分支合并到 master 分支中。如果您在 Organizer\
  \ 视图（![Image](img/U002.jpg)![Image](img/U003.jpg)2）中查看 master 分支的提交历史，您将看到来自 MainMenu\
  \ 分支的提交已与 master 分支的提交合并在一起。\n\n\n\n### 远程仓库\n\n到目前为止，你一直在使用本地仓库。在 Xcode 4.2 中，增加了对远程仓库的支持。这使你能够将代码存储到线上，从而可以从任何计算机访问，并允许多个用户访问你的代码。远程仓库的另一个好处是，可以将源代码异地存储，以防设备突然故障或更糟的情况。\n\
  \n要添加远程仓库，请前往 `Organizer` 视图（![Image](img/U002.jpg)![Image](img/U003.jpg)2）中的 `Repositories`\
  \ 标签页，选择你想要添加远程选项的仓库。点击项目仓库下的 `Remotes` 文件夹，然后点击底部的 `Add Remote`。这将弹出一个类似于 图 1-22\
  \ 的视图。为你的远程仓库输入一个名称和位置，然后点击 `Create`。\n\n![Image](img/9781430240051_Fig01-22.jpg)\n\
  \n**图 1-22.** *添加远程仓库*\n\n现在你已经有了一个远程仓库，你可以从远程仓库推送(`push`)和拉取(`pull`)代码，以保持代码更新。这与提交(`commit`)不同。提交或合并只会影响你的本地副本。你需要将代码推送到远程仓库来更新它。\n\
  \n### GitHub\n\n一个非常流行的 Git 项目在线仓库是 GitHub，地址为 [`www.github.com`](http://www.github.com)。GitHub\
  \ 提供将代码远程存储在公共或私有仓库中的能力。这允许小型开发团队协同处理一个项目，或单个开发者远程存储其代码仓库。在此之前，你必须使用第三方软件或 Git 命令行版本来将更改推送到远程仓库。Xcode\
  \ 包含了远程仓库功能后，可以轻松地与 GitHub 协作并远程存储你的源代码。\n\n在将项目添加到 Xcode 之前，你应该先在 GitHub 上创建一个仓库。你需要一个\
  \ GitHub 账户来完成此操作；请按照非常详细的说明设置你的账户。在 GitHub 上创建仓库后，复制 `Source` 标签页上的整个 HTTP 访问路径，如\
  \ 图 1-23 所示。这将是你的远程仓库位置。\n\n![Image](img/9781430240051_Fig01-23.jpg)\n\n**图 1-23.**\
  \ *查找仓库的 HTTP 访问路径*\n\n在 Xcode 中设置 GitHub 与设置任何远程仓库非常相似。前往 `Organizer` 视图（![Image](img/U002.jpg)![Image](img/U003.jpg)2）中的\
  \ `Repositories` 标签页，选择你想要添加到 GitHub 仓库的仓库下方的 `Remotes` 文件夹。现在点击窗口底部的 `Add Remote`，将\
  \ HTTP 位置粘贴到位置字段中（如 图 1-24 所示），添加一个名称，然后点击 `Create`。\n\n![Image](img/9781430240051_Fig01-24.jpg)\n\
  \n**图 1-24.** *配置 Git 仓库*\n\n点击 `Create` 后，你将在 `Organizer` 窗口底部看到一个输入 GitHub 凭据的位置。你的用户名应该已经填好，因此你只需输入密码。现在返回你的主\
  \ Xcode 窗口，使用 `File` ![Image](img/U001.jpg) `Source Control` ![Image](img/U001.jpg)\
  \ `Push`。在一个反映 图 1-25 的窗口中，系统将提示你选择要推送代码的远程仓库。选择 GitHub 仓库，然后点击 `Push`。Xcode 现在会将你的代码发送到你的\
  \ GitHub 项目仓库。使用 GitHub 的 Web 界面，验证你的更改和变更日志是否已正确上传。现在其他开发者可以使用他们自己的 GitHub 账户和\
  \ `File` ![Image](img/U001.jpg) `Source Control` ![Image](img/U001.jpg) `Pull...`\
  \ 菜单选项来签出此代码。\n\n![Image](img/9781430240051_Fig01-25.jpg)\n\n**图 1-25.** *指定 GitHub\
  \ 仓库*\n\n### 源代码管理最佳实践\n\n以下是一些使用源代码管理仓库的技巧：\n\n1.  尽量不要直接在 `master` 分支上工作。相反，在单独的分支上工作，准备就绪后再合并回\
  \ `master` 分支。\n2.  使用远程分支时，在开始编码之前，始终对你的工作分支执行 `pull` 操作。这将确保你在最新的代码修订版上工作。\n3.\
  \  尽量不要将无法编译的代码推送到远程仓库。虽然你需要经常检入以确保可用性，但最好在推送到远程仓库之前，确保你的代码至少没有错误地构建成功。\n4.  使用描述你所做更改的提交消息。这不仅有助于你管理代码，还可以轻松查看你添加了哪些功能，并在提交应用以供审核时列出它们。\n\
  \n### Steve 和 ARC\n\nXcode 4.2 引入了自动引用计数（`ARC`），作为一种帮助开发者专注于编写优秀应用、减少内存管理时间的方式。对于任何刚接触\
  \ Objective-C 的开发者，以及一些已经接触了一段时间的开发者来说，你很可能会在内存管理概念上遇到困难。`Retain` 这个，`release` 那个，`autorelease`\
  \ 什么？如果这三个方法让你感到困惑，那么别担心，Xcode 4.2 就是为你准备的！即使你熟悉内存管理，你也会看到将代码迁移到使用 `ARC` 的好处。\n\n\
  `ARC` 是一种编译时的内存管理方法。它不会为正在运行的应用增加性能开销，因为它是在构建之前编译到代码中的。这与垃圾回收（`Garbage Collection`）概念不同，后者是\
  \ Java 开发者熟悉的一种内存管理方法。使用 `ARC`，编译器（LLVM 版本 3.0）通过分析你的对象并确定对象何时不再被引用，来自动添加 `retain`\
  \ 和 `release` 调用。只要存在指向对象的指针，该对象就会存在。在它系统地添加了内存管理方法之后，它会编译用于运行和部署的二进制文件。\n\n如果没有\
  \ `ARC`，以下代码将产生内存泄漏，因为返回值没有被自动释放（`autorelease`）：\n\n```\n-(NSString *) cityStateZip\
  \ {\n    return [[NSString alloc] initWithFormat:@”%@, %@ %@”, self.city, self.state,\
  \ self.zip];\n}\n```\n\n在不对代码进行任何更改的情况下，`ARC` 将编译此方法，并在编译时添加 `autorelease` 以修复内存泄漏。\n\
  \n#### ARC 规则\n\n以下是使用启用了 `ARC` 的项目时需要遵循的一些规则：\n\n1.  你不能在代码中调用 `retain`、`release`\
  \ 或 `autorelease`。你也不能覆盖或实现这些方法。\n2.  由于不再需要 `release` 语句，你不能再在你的类中实现 `dealloc`\
  \ 方法。\n3.  你不能再创建 `structs`。相反，你必须使用自定义的 Objective-C 子类。\n4.  你不能使用诸如以下的随意类型转换：\n\
  \n    ```\n    NSString *B = (NSString *)A;\n    ```\n\n    解决方案是使用 `__bridge` 指令：\n\
  \n    ```\n    NSString *B = (__bridge NSString *)b;\n    ```\n\n5.  你不能使用 `NSAutoreleasePool`；相反，你可以使用\
  \ `@autoreleasepool`。\n\n#### 使用 ARC\n\nXcode 4.2 中的每个新项目模板默认使用 `ARC` 和 LLVM v3.0\
  \ 编译器。你不需要做任何特殊的事情。启用了 `ARC` 的项目也与 iOS 4 兼容。\n\n\n\n#### 将旧项目转换到 ARC\n\n终有一天，回首望去，我们甚至不会记得曾写过带有\
  \ `retain`、`release` 和 `autorelease` 调用的代码。但在那一天到来之前，我们仍需处理现有项目，并将其迁移到 ARC 内存管理方法，以使它们保持最新，并充分利用性能提升。苹果强烈建议所有项目都迁移到\
  \ LLVM 3.0 和 ARC。他们提供了一种方法，可以将你的旧项目转换到使用 ARC。\n\n打开你的旧项目，在进行任何更改之前，确保它能正确构建。\n\n\
  **注意：** 这也正是将你的更改提交到 Git 仓库，并将更改推送到远程仓库以妥善保存的好时机。\n\n接下来，转到 `Edit` ![图片](img/U001.jpg)\
  \ `Refactor` ![图片](img/U001.jpg) `Convert to Objective-C ARC`。![图片](img/U001.jpg)\
  \ Xcode 会询问你要转换哪些目标。选择你的目标，然后点击 Precheck。图 1–26 显示了一个目标选择示例。\n\n**注意：** 请确保你设置为构建设备，而非模拟器。\n\
  \n![图片](img/9781430240051_Fig01-26.jpg)\n\n**图 1–26.** *选择要转换到 ARC 的目标*\n\n预检查将开始，并分析你的代码，以查看在开始转换之前需要对项目进行哪些更改。如果存在问题，将显示一条通知，如图\
  \ 1–27 所示；你可以在导航窗格的构建结果下看到它们，图 1–28 展示了一个示例。\n\n![图片](img/9781430240051_Fig01-27.jpg)\n\
  \n**图 1–27.** *必须纠正 ARC 转换问题。*\n\n![图片](img/9781430240051_Fig01-28.jpg)\n\n**图 1–28.**\
  \ *ARC 转换问题列表*\n\n在继续转换之前，你需要纠正所有问题。一旦问题得到纠正，系统将提示你开始转换。图 1–29 显示了一个详细说明转换过程的窗口。第一步是为你的应用程序源代码拍摄快照，以便你可以还原。下一个窗口将显示将要对你的代码进行的任何更改。这与你在向源代码控制仓库提交更改时看到的窗口相同。最常见的更改包括移除\
  \ `dealloc` 方法以及 `autorelease` 和 `retain` 语句。属性也被指定为 `strong` 或 `weak`。`Strong`\
  \ 对应之前的 `retain` 语句，而 `weak` 则会导致一旦没有其他强指针引用对象，该对象就会立即被释放。\n\n![图片](img/9781430240051_Fig01-29.jpg)\n\
  \n**图 1–29.** *转换到 ARC*\n\n审查更改后，你可以点击 Accept，Xcode 将进行必要的更改。构建你的项目，并确保更改后项目能正确构建。\n\
  \n你可以通过检查目标编译器设置来验证你的项目是否正在使用 LLVM 3.0 编译器，如图 1–30 所示。\n\n![图片](img/9781430240051_Fig01-30.jpg)\n\
  \n**图 1–30.** *验证 LLVM 3.0 编译器*\n\n要验证你在项目中是否正在使用 ARC，请导航到你的目标 Build Settings，然后转到\
  \ `Apple LLVM compiler 3.0 – Language` 部分。你现在应该看到 `Objective-C Automatic Reference\
  \ Counting` 设置等于 `Yes`。图 1–31 演示了此验证过程。\n\n![图片](img/9781430240051_Fig01-31.jpg)\n\
  \n**图 1–31.** *验证 ARC*\n\n### 快速技巧\n\nXcode 内置了许多复杂功能，可以极大地改善你的开发体验。本节列出了一些快捷方式，旨在加速常见任务，并使应用程序构建过程更简单。\n\
  \n#### 注释\n\n要快速注释掉一段代码，请用鼠标选中代码，然后按下键盘上的 ![图片](img/U003.jpg)`/`；每一行都会被注释掉。需要取消注释吗？只需重复该操作，这些行就会被取消注释。\n\
  \n#### 自动完成\n\nXcode 4 在之前的自动完成功能基础上有了很大改进，它会在你输入时工作。这非常有助于让你了解哪些方法可用，并提高编码效率。如果没有显示自动完成，或者你想知道某个对象有哪些可用方法，请按\
  \ `Esc` 键调出可用方法列表。\n\n#### 快速缩进/取消缩进\n\nXcode 4 在管理缩进方面做得相当不错，但如果你发现自己需要一些自定义缩进或管理自己的缩进，请使用\
  \ ![图片](img/U003.jpg)`` 来取消缩进，使用 ![图片`]` 来手动缩进。这对于代码块也同样有效；只需用鼠标选中代码块，然后使用键盘快捷键即可。\n\
  \n#### 在头文件和实现文件之间快速切换\n\n你刚刚向类的头文件添加了一个新的属性或对象，现在想切换到实现文件开始为该对象编写代码。按 `^`![图片](img/U003.jpg)`+上/下方向键`\
  \ 可以在两个文件之间切换。图 1–32 展示了助理编辑器的一个常见用途。\n\nXcode 4 还提供了一个新的拆分窗格视图，用于显示相关文件，称为助理视图。要启用此视图，你可以点击屏幕顶部的助理视图图标，或按\
  \ `⌥`![图片](img/U003.jpg)`+,`（option+command+逗号）来加载助理视图。\n\n**注意：** 如果你正在查看实现文件，键盘快捷键效果最佳；执行命令，它会自动在右侧窗格中加载头文件。\n\
  \n![图片](img/9781430240051_Fig01-32.jpg)\n\n**图 1–32.** *选择助理编辑器*\n\n#### 类文档\n\n\
  记不起一个类的所有属性或方法了？你可以通过 `^`-点击一个对象类型来获取提示，会弹出一个包含对象描述的弹出窗口，如图 1–33 所示。在此弹出窗口中，你还可以查看对象的文档或头文件。\n\
  \n![图片](img/9781430240051_Fig01-33.jpg)\n\n**图 1–33.** *访问类文档*\n\n一个类似的快捷方式是 `⌘`-点击任何对象或类，以跳转到其定义。\n\
  \n#### 在助理编辑器中打开文件\n\n你可以 `⌥`-点击导航窗格中的任何文件，以在助理编辑器中打开它。你也可以 `⌘⌥`-点击任何文件，会弹出一个类似\
  \ Xcode 界面的示意图，如图 1–34 所示。在示意图中选择一个区域，即可在 Xcode 中对应的窗格中打开该文件。\n\n![图片](img/9781430240051_Fig01-34.jpg)\n\
  \n**图 1–34.** *配置助理编辑器*\n\n\n\n### 行为\n\nXcode 4 在编辑界面中引入了行为功能。通过这些行为，你可以在 Xcode\
  \ 中执行操作时运行自定义命令或脚本。访问行为的方式是进入 `Xcode` ![Image](img/U001.jpg) `Behaviors` ![Image](img/U001.jpg)\
  \ `Edit Behaviors`。 图 1–35 展示了打开后的窗口。\n\n你可以自定义左侧窗格中可用的操作，这些操作对应右侧窗格中的行为。例如，我喜欢使用的一个行为是打开一个包含构建错误的独立标签页。这样可以保留我的编辑标签页，让我能够在构建成功或失败（通常是后者）后，从上次中断的地方继续工作。图\
  \ 1–35 中的行为将会创建或显示名为“Build Results”的标签页，显示问题导航器，显示调试器窗格，并导航到找到的第一个问题（如果有）。\n\n![Image](img/9781430240051_Fig01-35.jpg)\n\
  \n**图 1–35.** *配置行为*\n\n你也可以添加通过快捷键触发的自定义行为。点击行为窗格底部的 `+`，为你的自定义行为设置一个名称。现在，点击该行末尾的命令键符号（![Image](img/U003.jpg)）来设置你的键盘快捷键。\n\
  \n### 总结\n\nApple 通过 Xcode 4 为 iOS 开发者提供了一个更新的应用开发环境。虽然它并非完美无缺，但确实相比之前的版本带来了许多改进，值得称赞。从\
  \ Xcode 3 过渡到 Xcode 4 可能会很困难且耗时，但一旦你适应了，你将能够在新的界面中更高效、更轻松地编写代码。\n\n新的增强功能，例如支持远程仓库的源代码控制，将使你的团队项目开发更加无缝，并为独立开发者提供远程存储源代码以确保安全的能力。\n\
  \n## 第 2 章：Interface Builder 简介\n\nXcode 4 引入的众多变化之一是将 Interface Builder 整合到主 Xcode\
  \ 应用程序中。Interface Builder 成为了 Xcode 的一个核心组件，并且能够与 Xcode 在相同的窗口和标签页中运行。这一变化不仅仅是简单地将一个应用程序嵌入到另一个中。正如你将在本章中看到的，Interface\
  \ Builder 与源代码交互的方式使其更像是与 Xcode 进行了深思熟虑的集成。\n\n### Interface Builder 入门\n\n当你在 Xcode\
  \ 的导航器窗格中点击一个 `.xib`（用户界面）文件时，Interface Builder 将无缝加载到编辑器窗格中。通常，在处理 `.xib` 文件时，我会关闭导航器窗格并显示右侧的实用工具区域。这为我提供了最大的屏幕空间来直观地创建界面，如图\
  \ 2–1 所示。\n\n![Image](img/9781430240051_Fig02-01.jpg)\n\n**图 2–1.** *使用中的 Interface\
  \ Builder*\n\n通过点击左侧大纲视图停靠栏中的对象，你可以在右侧的检查器窗格中查看该对象的属性和设置。对于任何之前使用过 Interface Builder\
  \ 的人来说，检查器窗格应该非常熟悉。对象浏览器也已集成到检查器窗格下方的库窗格中。这为你的 `.xib` 设计需求提供了“一站式”服务。\n\n### 我们的力量合而为一……\n\
  \n随着 Interface Builder 集成到 Xcode 中，这不仅仅是两个工具合二为一那么简单。就像在动画片《战神金刚》中，独立的机器老虎组合成强大的银河卫士一样，Interface\
  \ Builder 与助理编辑器视图的结合为源代码创造了一个超级工具。图 2–2 展示了这一强大组合的绝佳示例。\n\n![Image](img/9781430240051_Fig02-02.jpg)\n\
  \n**图 2–2.** *将 Interface Builder 与助理编辑器结合使用*\n\n当助理编辑器可见并且你选择了左侧 `.xib` 文件对象浏览器中的一个对象时，相关的视图控制器的任何现有头文件都会被加载。起初这看起来用处不大。你可以同时看到你的代码和\
  \ `.xib` 文件。真正的魔力在于，当你 `^`-点击并拖拽其中一个对象到接口（`.h`）文件时，如图 2–3 所示，一条蓝线会延伸到代码中。当你在助理编辑器的右侧窗格中释放鼠标时，系统会提示你创建一个输出口。\n\
  \n![Image](img/9781430240051_Fig02-03.jpg)\n\n**图 2–3.** *自动连接输出口*\n\n当你释放鼠标按钮时，Xcode\
  \ 会提示你输入此输出口连接的名称，如图 2–4 所示。指定名称并点击“Connect”后，Xcode 将创建所有必要的代码，将 `.xib` 文件中的对象连接到你的接口（`.h`）文件和实现（`.m`）文件。\n\
  \n![Image](img/9781430240051_Fig02-04.jpg)\n\n**图 2–4.** *配置输出口的创建*\n\n现在头文件看起来像这样：\n\
  \n```\n//\n//  sample1ViewController.h\n#import <UIKit/UIKit.h>\n@interface sample1ViewController\
  \ : UIViewController {\n    UILabel *labelHelloWorld;\n}\n\n@property (strong, nonatomic)\
  \ IBOutlet UILabel *labelHelloWorld;\n\n@end\n```\n\n而实现（`.m`）文件中的相关代码现在看起来像这样：\n\
  \n```\n//\n//  sample1ViewController.m\n#import \"sample1ViewController.h\"\n\n\
  @implementation sample1ViewController\n@synthesize labelHelloWorld;\n\n- (void)viewDidUnload\n\
  {\n    [self setLabelHelloWorld:nil];\n    [super viewDidUnload];\n    // Release\
  \ any retained subviews of the main view.\n    // e.g. self.myOutlet = nil;\n}\n\
  \n@end\n```\n\n你可以使用相同的步骤为按钮和其他对象创建 `IBAction`。从 `.xib` 文件中的按钮或类似对象 `^`-点击并拖拽到实现（`.h`）文件，然后释放。这一次，将\
  \ Connection 下拉菜单从 Outlet 改为 Action。如果此选项没有出现，说明选中的对象类型错误。图 2–5 和 2–6 详细展示了以这种方式配置操作的流程。\n\
  \n![Image](img/9781430240051_Fig02-05.jpg)\n\n**图 2–5.** *创建操作*\n\n![Image](img/9781430240051_Fig02-06.jpg)\n\
  \n**图 2–6.** *配置操作*\n\n你可以指定操作的名称、类型、触发操作的事件以及要发送的参数。与输出口连接一样，代码将更新为包含支持你新操作的占位符。\n\
  \n接口（`.h`）文件现在包含了 `IBAction` 声明：\n\n```\n//\n//  sample1ViewController.h\n#import\
  \ <UIKit/UIKit.h>\n\n@interface sample1ViewController : UIViewController {\n   \
  \ UILabel *labelHelloWorld;\n}\n\n@property (strong, nonatomic) IBOutlet UILabel\
  \ *labelHelloWorld;\n- (IBAction)tickleTheLabel:(id)sender;\n\n@end\n```\n\n并且实现（`.m`）文件包含了一个供你完成的方法占位符：\n\
  \n```\n- (IBAction)tickleTheLabel:(id)sender {\n}\n```\n\n我打算用以下代码来完成 `tickleTheLabel`\
  \ 方法：\n\n```\n- (IBAction)tickleTheLabel:(id)sender {\n    self.labelHelloWorld.text=@\"\
  That tickled\";\n}\n```\n\n图 2–7 和 2–8 显示，现在当应用程序运行并且按钮被触摸时，`labelHelloWorld` 会更新。\n\
  \n![Image](img/9781430240051_Fig02-07.jpg)\n\n**图 2–7.** *原始视图*\n\n![Image](img/9781430240051_Fig02-08.jpg)\n\
  \n**图 2–8.** *执行操作后的视图*\n\n\n\n### 触控手势\n\nInterface Builder 新增的功能之一是能直接在界面生成器中为对象分配触摸手势识别器。Xcode\
  \ 右下角区域提供了各种手势，其面板类似于图 2-9 所示。\n\n![Image](img/9781430240051_Fig02-09.jpg)\n\n**图\
  \ 2-9.** *可用的手势识别器*\n\n要为`.xib`文件中的对象添加手势识别器，只需从对象浏览器中将手势识别器拖放到目标对象上，操作方式与图 2-10\
  \ 所示类似。这会将该手势识别器添加到`.xib`项目文件的对象列表中，如图 2-11 所示。\n\n![Image](img/9781430240051_Fig02-10.jpg)\n\
  \n**图 2-10.** *为元素添加手势识别器*\n\n![Image](img/9781430240051_Fig02-11.jpg)\n\n**图 2-11.**\
  \ *大纲视图中生成的手势识别器*\n\n继续操作前，务必确保目标对象已启用用户交互。在本例中，你将其附加到了“Hello World”标签上。点击该标签并转到属性检查器选项卡，即可将用户交互设置为`true`。在“视图”选项中，勾选“已启用用户交互”旁边的复选框，如图\
  \ 2-12 所示。这将确保对象能响应手势识别器。\n\n![Image](img/9781430240051_Fig02-12.jpg)\n\n**图 2-12.**\
  \ *属性检查器*\n\n通过在`.xib`文件的停靠栏大纲视图中点击手势识别器，你可以在属性检查器面板中为其进行设置。图 2-13 展示了可应用于该识别器的各种配置。\n\
  \n![Image](img/9781430240051_Fig02-13.jpg)\n\n**图 2-13.** *调整手势识别器的属性*\n\n设置完成后，你可以按照与之前相同的方法，从手势识别器对象按住\
  \ ^ 键拖拽到助理编辑器面板中的接口（`.h`）文件，从而将该手势连接到一个`IBAction`。在弹出的类似于图 2-14 的窗口中，指定名称并点击“连接”。该操作的占位符将像之前一样被添加到你的代码中。\n\
  \n![Image](img/9781430240051_Fig02-14.jpg)\n\n**图 2-14.** *将操作连接到标签*\n\n现在，你的接口文件看起来像这样：\n\
  \n```\n//\n//  sample1ViewController.h\n#import <UIKit/UIKit.h>\n\n@interface sample1ViewController\
  \ : UIViewController {\n    UILabel *labelHelloWorld;\n    UITapGestureRecognizer\
  \ *tapTheLabel;\n}\n\n@property (strong, nonatomic) IBOutlet UILabel *labelHelloWorld;\n\
  - (IBAction)tickleTheLabel:(id)sender;\n- (IBAction)tapTheLabel:(id)sender;\n\n\
  @end\n```\n\n我已经在实现（`.m`）文件中创建了新的`tapTheLabel`操作，如下所示：\n\n```\n- (IBAction)tapTheLabel:(id)sender\
  \ {\n    self.labelHelloWorld.text=@\"Tap Tap Tap\";\n}\n```\n\n现在，当应用运行并点击标签时，你将看到图\
  \ 2-15 和图 2-16 中展示的这两个界面。\n\n![Image](img/9781430240051_Fig02-15.jpg)\n\n**图 2-15.**\
  \ *应用的初始视图*\n\n![Image](img/9781430240051_Fig02-16.jpg)\n\n**图 2-16.** *标签点击后的视图*\n\
  \n### 调整色调\n\n如果你想通过自定义导航栏或工具栏来赋予应用不同的外观和感觉，过去必须创建自己的自定义类；但在 Xcode 4.2 中，你现在可以通过新增的色调属性来自定义某些设计元素。`UINavigationBar`、`UIToolBar`、`UISearchBar`和`UISegmentedControl`都会响应此设置，并且这些设置可在\
  \ Interface Builder 中使用。其他控件也能响应色调设置，但该属性在 Xcode 中不可用，必须通过代码更改。要更新色调，请在`.xib`文件中选择一个支持色调属性的对象，然后在检查器面板中你应该能看到色调控件，如图\
  \ 2-18 所示。图 2-17 展示了一个对多个元素进行了大幅度色调调整的视图。\n\n![Image](img/9781430240051_Fig02-17.jpg)\n\
  \n**图 2-17.** *应用了色调的视图*\n\n![Image](img/9781430240051_Fig02-18.jpg)\n\n**图 2-18.**\
  \ *在属性检查器中调整色调*\n\n**注意：** `UISegmentedControl`仅在条形或斜面风格时支持在 Xcode 中设置色调。\n\n###\
  \ 使用故事板进行快速应用开发\n\n还记得过去你必须用纸和笔来勾画应用的设计流程吗？后来有了流程图软件，你可以用数字方式记录工作流程和过程，但将这些工作流程转换为源代码仍需手动操作。苹果提供了一种名为故事板的新工具，它可以直观地展示应用的工作流，并能为你的应用生成一个可运行的框架。\n\
  \n#### 那么什么是故事板？\n\n故事板是一系列`.xib`文件的集合，其中包含关于视图及其相互关系的元数据。这实现了自模型-视图-控制器（MVC）编程早期以来就广为流传的视图与模型、控制器的彻底分离。故事板有两个主要组成部分：场景和转场。\n\
  \n##### 场景\n\n场景是任何填满设备屏幕的视图。它们包含 UI 对象，并由视图控制器（或视图控制器的子类）控制。这几乎与你熟悉并在 Interface\
  \ Builder 中编辑的`.xib`文件完全相同。图 2-19 展示了你即将构建的故事板中的三个不同场景。\n\n![Image](img/9781430240051_Fig02-19.jpg)\n\
  \n**图 2-19.** *编辑场景*\n\n##### 转场\n\n转场是在故事板中呈现后续视图的过渡方式。转场可以以推入、模态视图、弹出视图或自定义过渡的方式呈现视图。转场属于`UIStoryboardSegue`类，并包含三个属性：`sourceViewController`、`destinationViewController`和`identifier`。`identifier`是一个`NSString`，可用于验证转场是否是你期望的那个。\n\
  \n你通常根据用户的某个操作来启动转场。这可以是点击按钮或表格视图单元格，也可以是手势识别器的结果。转场在故事板上由连接两个场景的线条表示，如图 2-20 所示。\n\
  \n![Image](img/9781430240051_Fig02-20.jpg)\n\n**图 2-20.** *连接两个场景的转场*\n\n\n\n###\
  \ 讲述故事\n\n在 Xcode 4.2 中，除了空项目模板外，所有应用程序模板都提供了 Storyboard。创建新项目时，只需在设置新项目选项时选择“Use\
  \ storyboard”即可。在本例中，您将把项目命名为 `\"aboutUs\"`，如图 2–21 所示。\n\n![Image](img/9781430240051_Fig02-21.jpg)\n\
  \n**图 2–21.** *配置 Storyboard 的使用*\n\n项目创建后，您会看到 Storyboard 选项已填充在目标摘要（Summary）选项卡中，并且信息（Info）选项卡中增加了一个字段（如图\
  \ 2–22 和 2–23 所示），即“主 Storyboard 文件基本名称（Main storyboard file base name）”。\n\n![Image](img/9781430240051_Fig02-22.jpg)\n\
  \n**图 2–22.** *主 Storyboard 信息*\n\n![Image](img/9781430240051_Fig02-23.jpg)\n\n\
  **图 2–23.** *Storyboard 目标设置*\n\n最后，在项目导航窗格中，您会看到 `MainStoryboard.storyboard` 文件，如图\
  \ 2–24 所示。点击此文件将其加载到 Interface Builder 中，然后开始构建您的 Storyboard。\n\n![Image](img/9781430240051_Fig02-24.jpg)\n\
  \n**图 2–24.** *Storyboard 文件*\n\n在本示例中，您将构建一个简单的项目来显示您公司的信息。Storyboard 从一个视图开始，该视图由作为项目一部分创建的\
  \ `aboutUsViewController` 控制。我将向该视图中添加一些对象（`UILabel`、`UITextView` 和两个 `UIButton`），使其对用户更具信息性。请参考图\
  \ 2–25 了解要构建的视图。\n\n![Image](img/9781430240051_Fig02-25.jpg)\n\n**图 2–25.** *`aboutUsViewController`\
  \ 视图*\n\n现在，我想将此视图嵌入到导航控制器中，而 Xcode 4.2 使这项任务变得简单。如图 2–26 所示，选中该视图，然后转到菜单选项 **Editor**\
  \ ![Image](img/U001.jpg) **Embed In** ![Image](img/U001.jpg) **Navigation Controller**。这将创建一个导航控制器，将其添加到您的\
  \ Storyboard 中，并在导航视图和您的 `aboutUsView` 之间创建一个 Segue。生成的 Segue 将用一个箭头表示，如图 2–27 所示。\n\
  \n![Image](img/9781430240051_Fig02-26.jpg)\n\n**图 2–26.** *在控制器中嵌入视图*\n\n![Image](img/9781430240051_Fig02-27.jpg)\n\
  \n**图 2–27.** *生成的嵌入视图显示*\n\n现在，我即将向 Storyboard 中添加一个新的 `UIViewController` 对象，您可以在其中放置您的联系信息。这就像从对象库中拖拽一个\
  \ `UIViewController` 对象以及一个 `UIView` 到 Storyboard 中一样简单。我通过添加一个 `UILabel` 作为标题，然后再添加几个\
  \ `UILabel` 用于联系信息来设置视图。图 2–28 显示了这些添加的结果。\n\n![Image](img/9781430240051_Fig02-28.jpg)\n\
  \n**图 2–28.** *配置好的场景*\n\n为了将新的联系信息视图连接到“关于我们”视图，您需要点击“关于我们”视图上的“联系我们”`UIButton`，然后\
  \ `^-click-drag`（按住 Command 键并点击拖拽）到联系信息视图。此操作与用于连接 Outlet 和 Action 的操作相同，而您接下来要做的正是如此。您要将“联系我们”按钮连接到\
  \ `performSegueWithIdentifier` 这个 Action。松开鼠标按钮时，会弹出一个对话框，询问您要连接到哪个 Action，您可以选择\
  \ `performSegueWithIdentifier:sender`。这些步骤以及生成的 Segue 如图 2–29 和 2–30 所示。\n\n![Image](img/9781430240051_Fig02-29.jpg)\n\
  \n**图 2–29.** *配置 Segue Action*\n\n![Image](img/9781430240051_Fig02-30.jpg)\n\n\
  **图 2–30.** *执行 Segue 弹出对话框*\n\n连接建立后，`UINavigationBar` 会自动添加到视图中。如果您为每个视图指定了标题，结果将类似于图\
  \ 2–31。\n\n![Image](img/9781430240051_Fig02-31.jpg)\n\n**图 2–31.** *通过 Segue 连接好的场景*\n\
  \n一个好的习惯是为您的 Segue 提供一个标识符（identifier）。如果您最终将多个 Segue 连接到同一个视图，这将有助于使您的应用程序经得起未来考验。您可以检查调用\
  \ Segue 的标识符，以了解用户到达该视图所走的路径并做出相应响应。您可以通过在 Storyboard 中选择 Segue 并检查其检查器窗格中的属性来设置\
  \ Segue 的标识符，如图 2–32 所示。\n\n![Image](img/9781430240051_Fig02-32.jpg)\n\n**图 2–32.**\
  \ *设置 Segue 标识符*\n\n如果您现在运行这个应用程序，图 2–33 和 2–34 会向您展示，“联系我们”按钮将正常工作并加载联系信息视图，而无需编写任何代码。\n\
  \n![Image](img/9781430240051_Fig02-33.jpg)\n\n**图 2–33.** *主模拟视图*\n\n![Image](img/9781430240051_Fig02-34.jpg)\n\
  \n**图 2–34.** *已执行的 Segue 结果*\n\n那另一个按钮“我们的应用”呢？您想创建一个新视图来列出您的其他应用，以便进行一些交叉推广。当我听到“列表”这个词时，我首先想到的是\
  \ `UITableViewController`。而 Storyboarding 将 `UITableViewController` 的便捷性提升到了一个全新的水平。\n\
  \n我将拖拽一个 `UITableViewController` 到 Storyboard 中，创建一个“应用表格”视图。您首先会注意到，这看起来与 Interface\
  \ Builder 中提供的常规 `UITableViewController` 略有不同。顶部有一些名为“原型单元格（Prototype Cells）”的东西，如图\
  \ 2–35 所示。使用 Storyboards，您可以通过称为“原型（prototype）”的方式自定义 `UITableViewCell` 的布局和对象。我们稍后会进一步探讨这个问题。\n\
  \n![Image](img/9781430240051_Fig02-35.jpg)\n\n**图 2–35.** *将 `UITableView` 插入到场景中*\n\
  \n选中表格视图，然后在属性检查器中，将 Content 从“动态原型（Dynamic Prototypes）”更改为“静态单元格（Static Cells）”。我还将样式改为“分组（Grouped）”，因为我喜欢单元格圆角边框的外观。图\
  \ 2–36 和 2–37 展示了这些步骤及其结果。\n\n![Image](img/9781430240051_Fig02-36.jpg)\n\n**图 2–36.**\
  \ *静态单元格配置*\n\n![Image](img/9781430240051_Fig02-37.jpg)\n\n**图 2–37.** *分组单元格*\n\
  \n由于每个单元格都将具有相同的布局，我将删除底部两个单元格，以便能够快速复制顶部单元格。现在，我将使用一个 `UIImageView`（用于存放应用图标）和两个\
  \ `UILabel`（用于应用名称和描述）来自定义剩余的单元格，如图 2–38 所示。\n\n![Image](img/9781430240051_Fig02-38.jpg)\n\
  \n**图 2–38.** *自定义单元格*\n\n现在，选中已按您规格设计好的剩余单元格，然后按住 ![Image](img/U004.jpg) 键并 `-click-drag`（点击拖拽）以在其下方复制。重复此操作，为\
  \ `UITableView` 添加第三行，如图 2–39 所示。\n\n![Image](img/9781430240051_Fig02-39.jpg)\n\n\
  **图 2–39.** *复制单元格*\n\n现在，您可以自定义 `UITableView` 中的每个图像和标签，以列出您将展示的三个应用，最终得到类似于图 2–40\
  \ 的视图。\n\n![Image](img/9781430240051_Fig02-40.jpg)\n\n**图 2–40.** *自定义复制的单元格*\n\n\
  剩下的就是将“关于我们”视图中的按钮连接到这个新视图。选中“关于我们”视图中的按钮，然后 `^-click-drag`（按住 Command 键并点击拖拽）到您刚刚创建的\
  \ `UITableView`。现在，您的 Storyboard 看起来类似于图 2–41 所示。\n\n![Image](img/9781430240051_Fig02-41.jpg)\n\
  \n**图 2–41.** *新连接的表格控制器*\n\n\n\n当您运行应用程序时，“关于我们”视图上的两个按钮现在都能正常工作，如图 2–42 所示。无需编写任何代码，您就可以加载这些页面。\n\
  \n![Image](img/9781430240051_Fig02-42.jpg)\n\n**图 2–42.** *应用程序的三个结果视图*\n\n### 在场景间传递数据\n\
  \n前面的应用部分无需任何代码就能很好地工作，但只需在后台添加少量代码，您就能在极短的时间内创建出功能更强大的界面。\n\n当您看到`UITableView`时，几乎会本能地知道，当您触摸其中一个单元格时，很可能关联着一个详细视图。现在我们来添加这个详细视图。将名为`AppDetailsViewController`的新`UIViewController`对象拖放到故事板上，并向其中添加一个`UIImage`、一个`UILabel`、一个`UITextView`和两个`UIButton`，类似于图\
  \ 2–43 所示。\n\n![Image](img/9781430240051_Fig02-43.jpg)\n\n**图 2–43.** *详细视图的用户界面*\n\
  \n您希望每个`UITableViewCell`在被触摸时都能跳转到这个 App 详细视图，因此按住 ^ 键并点击拖动，从`UITableViewCell`拖到详细视图。和之前一样，会弹出一个菜单显示可用的操作，您应该选择“`performSegueWithIdentifier:selector:`”，如图\
  \ 2–44 和图 2–45 所示。\n\n![Image](img/9781430240051_Fig02-44.jpg)\n\n**图 2–44.** *将单元格连接到详细视图*\n\
  \n![Image](img/9781430240051_Fig02-45.jpg)\n\n**图 2–45.** *选择跳转动作*\n\n您将看到一条跳转线连接表格和\
  \ App 详细视图控制器。正如图 2–46 所示，选中该跳转线，并在属性检查器中为其输入一个标识符。\n\n![Image](img/9781430240051_Fig02-46.jpg)\n\
  \n**图 2–46.** *配置详细视图跳转标识符*\n\n对另外两个`UITableViewCell`重复此过程，并为每个连接使用相同的跳转标识符，因为您将对每个跳转执行相同的代码。现在您应该看到三条跳转线连接这两个视图，类似于图\
  \ 2–47 所示。\n\n![Image](img/9781430240051_Fig02-47.jpg)\n\n**图 2–47.** *连接`UITableView`到视图控制器的多个跳转线*\n\
  \n到目前为止，您没有使用任何代码就完成了这些工作，但这种便利即将结束。您需要在 App 详细视图控制器上生成一些动态内容，因此需要深入编写一些代码。\n\n\
  首先，您将创建一个自定义类来保存应用的相关信息。由于目前应用的列表是静态的，我将创建一个`NSObject`的非常基础的子类来保存数据。使用菜单项 **文件**![Image](img/U001.jpg)\
  \ **新建** ![Image](img/U001.jpg) **新建文件…**，并从 Cocoa Touch 模板中选择“Objective-C class”，如图\
  \ 2–48 所示。\n\n![Image](img/9781430240051_Fig02-48.jpg)\n\n**图 2–48.** *选择“Objective-C\
  \ class”模板来创建一个新的基础类*\n\n现在，如图 2–49 所示，如果“Subclass of”下拉菜单中尚未指定，请从其中选择`NSObject`。\n\
  \n![Image](img/9781430240051_Fig02-49.jpg)\n\n**图 2–49.** *确保“Subclass of”字段指定为`NSObject`，以创建一个`Object`子类*\n\
  \n最后，将类名设置为`MyAppClass`。如图 2–50 所示，但与之前一样，较新版本的 Xcode 可能会将此步骤与之前指定“Subclass of”字段的步骤合并。\n\
  \n![Image](img/9781430240051_Fig02-50.jpg)\n\n**图 2–50.** *指定类名——在较新版本的 Xcode 中，此步骤可能已包含在前一个屏幕中。*\n\
  \n您希望这个类具有以下接口（`.h`）：\n\n```\n//  MyAppClass.h\n#import <Foundation/Foundation.h>\n\
  \n@interface MyAppClass : NSObject\n\n@property(strong, nonatomic) NSString *appName;\n\
  @property(strong, nonatomic) UIImage *iconImage;\n@property(strong, nonatomic) NSString\
  \ *appDescription;\n@property(strong, nonatomic) NSURL *appStoreURL;\n@property(strong,\
  \ nonatomic) NSURL *webSiteURL;\n\n+(MyAppClass *)appWithAppID:(int)appID;\n\n@end\n\
  ```\n\n\n\n实现文件（`.m`）应如下所示：\n\n```objc\n#import \"MyAppClass.h\"\n\n@implementation\
  \ MyAppClass\n\n@synthesize appName;\n@synthesize iconImage;\n@synthesize appDescription;\n\
  @synthesize appStoreURL;\n@synthesize webSiteURL;\n\n+ (MyAppClass *)appWithAppID:(int)appID\
  \ {\n    MyAppClass *newApp = [[MyAppClass alloc] init];\n    newApp.appName = [NSString\
  \ stringWithFormat:@\"App %i Name\", appID];\n    newApp.iconImage = [UIImage imageNamed:[NSString\
  \ stringWithFormat:@\"app%iicon.png\", appID]];\n    newApp.appDescription = [NSString\
  \ stringWithFormat:@\"This is the description for App %i\", appID];\n    newApp.appStoreURL\
  \ = [NSURL URLWithString:[NSString stringWithFormat:@\"itms-apps://itunes.com/apps/%iappName\"\
  , appID]];\n    newApp.webSiteURL = [NSURL URLWithString:[NSString stringWithFormat:@\"\
  http://www.shawnsbits.com/apps/%iappName\", appID]];\n    return newApp;\n}\n\n\
  - (id)init {\n    self = [super init];\n    if (self) {\n        // Initialization\
  \ code here.\n    }\n    return self;\n}\n\n@end\n```\n\n**注意：** 如果你想知道内存管理去了哪里，请参阅第\
  \ 1 章中关于自动引用计数的部分，即“Steve and the ARC”。\n\n这样就设置好了数据对象，但现在你需要编写详情视图控制器来显示`MyAppClass`对象的属性。你需要一个自定义视图控制器类来控制视图。通过\
  \ **File** > **New** > **New File…** 创建一个新文件，并从 Cocoa Touch 模板中选择“`UIViewController`\
  \ subclass”，如图 2-51 所示。\n\n![Image](img/9781430240051_Fig02-51.jpg)\n\n**图 2-51.**\
  \ *选择“`UIViewController` subclass”模板，创建预配置了重要`UIViewController`方法的文件*\n\n现在，如图 2-52\
  \ 所示，将其设置为`UIViewController`的子类（如果默认未指定），并确保**不**选中“With XIB for user interface”复选框。你将使用故事板来代替\
  \ XIB。\n\n![Image](img/9781430240051_Fig02-52.jpg)\n\n**图 2-52.** *配置`UIViewController`的子类*\n\
  \n将新类命名为`AppDetailsViewController`，并使用以下接口（`.h`）文件定义：\n\n```objc\n//  AppDetailsViewController.h\n\
  \n#import <UIKit/UIKit.h>\n#import \"MyAppClass.h\"\n\n@interface AppDetailsViewController\
  \ : UIViewController\n\n@property (strong, nonatomic) MyAppClass *selectedApp;\n\
  @property (strong, nonatomic) IBOutlet UILabel *labelAppName;\n@property (strong,\
  \ nonatomic) IBOutlet UIImageView *imageAppIcon;\n@property (strong, nonatomic)\
  \ IBOutlet UITextView *textViewAppDescription;\n@property (strong, nonatomic) IBOutlet\
  \ UIButton *buttonAppStore;\n@property (strong, nonatomic) IBOutlet IButton *buttonWebSite;\n\
  \n- (IBAction) loadAppStore:(id)sender;\n- (IBAction) loadWebSite:(id)sender;\n\n\
  @end\n```\n\n这个接口文件将创建视图所需的输出口，以及将分配给`UIButton`的两个`IBAction`。实现文件（`.m`）如下：\n\n```objc\n\
  //  AppDetailsViewController.m\n\n#import \"AppDetailsViewController.h\"\n\n@implementation\
  \ AppDetailsViewController\n\n@synthesize selectedApp;\n@synthesize labelAppName;\n\
  @synthesize imageAppIcon;\n@synthesize textViewAppDescription;\n@synthesize buttonAppStore;\n\
  @synthesize buttonWebSite;\n\n- (IBAction) loadAppStore:(id)sender{\n    [[UIApplication\
  \ sharedApplication] openURL:self.selectedApp.appStoreURL];\n}\n\n- (IBAction) loadWebSite:(id)sender{\n\
  \    [[UIApplication sharedApplication] openURL:self.selectedApp.webSiteURL];\n\
  }\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    self.labelAppName.text\
  \ = selectedApp.appName;\n    self.imageAppIcon.image = selectedApp.iconImage;\n\
  \    self.textViewAppDescription.text = selectedApp.appDescription;\n}\n\n- (id)initWithNibName:(NSString\
  \ *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil {\n    self = [super initWithNibName:nibNameOrNil\
  \ bundle:nibBundleOrNil];\n    if (self) {\n        // Custom initialization\n \
  \   }\n    return self;\n}\n\n- (void)didReceiveMemoryWarning {\n    // Releases\
  \ the view if it doesn't have a superview.\n    [super didReceiveMemoryWarning];\n\
  \    // Release any cached data, images, etc. that aren't in use.\n}\n\n- (void)viewDidUnload\
  \ {\n    [super viewDidUnload];\n    self.labelAppName = nil;\n    self.imageAppIcon\
  \ = nil;\n    self.textViewAppDescription = nil;\n    self.buttonAppStore = nil;\n\
  \    self.buttonWebSite = nil;\n}\n\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\
  \ {\n    // Return YES for supported orientations\n    return (interfaceOrientation\
  \ == UIInterfaceOrientationPortrait);\n}\n\n@end\n```\n\n这个控制器类将使用`MyAppClass`对象“`selectedApp`”的属性填充视图。现在你需要将这个视图控制器附加到视图上，并连接输出口和`IBAction`。返回故事板编辑器，选择\
  \ App Details 视图底部的视图控制器对象，如图 2-53 所示。\n\n![Image](img/9781430240051_Fig02-53.jpg)\n\
  \n**图 2-53.** *选择视图控制器*\n\n现在，你可以在检查器选项卡中选择身份检查器，并将类设置为自定义的`AppDetailsViewController`类。图\
  \ 2-54 演示了如何执行此操作。\n\n![Image](img/9781430240051_Fig02-54.jpg)\n\n**图 2-54.** *指定视图控制器*\n\
  \n按照图 2-55，将所有对象连接到对应的输出口。\n\n![Image](img/9781430240051_Fig02-55.jpg)\n\n**图 2-55.**\
  \ *配置元素与属性*\n\n要连接动作，你需要反向操作。从`UIButton`拖拽到视图或视图控制器对象，然后从弹出菜单中选择对应的`IBAction`，如图\
  \ 2-56 所示。\n\n![Image](img/9781430240051_Fig02-56.jpg)\n\n**图 2-56.** *连接动作*\n\n\
  现在你可以接收一个`MyAppClass`对象并在 App Details 视图上正确显示它，但接下来你需要在加载此视图时发送该对象。为此，你将配置上一个视图（Apps\
  \ Table View 列表），使其在执行跳转时发送该对象。事实证明，有一个专门的方法：`- (void)prepareForSegue:(UIStoryboardSegue\
  \ *)segue sender:(id)sender;`。你可以在自定义的`UITableViewController`中重写此方法，以发送选中的对象。\n\n\
  首先，你需要一个新的自定义`UITableViewController`类。通过 **File** > **New** > **New File…** 创建一个新文件，并从\
  \ Cocoa Touch 模板中选择“`UIViewController` class”，如图 2-57 所示。\n\n![Image](img/9781430240051_Fig02-57.jpg)\n\
  \n**图 2-57.** *指定`UIViewController`子类文件*\n\n这次，你希望它成为`UITableViewController`的子类，并且同样确保不为新类创建\
  \ XIB，如图 2-58 所示。\n\n![Image](img/9781430240051_Fig02-58.jpg)\n\n**图 2-58.** *配置`UITableViewController`的子类*\n\
  \n将类命名为“`AppListTableViewController`”。接口文件（`.h`）无需更改，因此直接跳转到实现文件（`.m`）。你要做的第一件事是清除`tableView`数据源和`tableView`委托的方法，因为你在故事板中使用了静态定义的`UITableViewCell`。因此，请删除或注释掉以下方法：\n\
  \n\n\n`- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView`  \n`-\
  \ (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`\
  \  \n`- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath`  \n`- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath`\n\n在实现文件的顶部，导入你创建的两个自定义类：\n\n`#import \"AppDetailsViewController.h\"\
  `  \n`#import \"MyAppClass.h\"`\n\n现在使用以下代码覆盖 `prepareForSegue` 方法：\n\n`- (void)prepareForSegue:(UIStoryboardSegue\
  \ *)segue sender:(id)sender {`  \n`    if ([segue.identifier isEqualToString:@\"\
  AppDetailsLoadFromTableViewCell\"]) {`  \n`        AppDetailsViewController *appDetailsVC\
  \ = segue.destinationViewController;`  \n`        appDetailsVC.selectedApp = [MyAppClass\
  \ appWithAppID:[[self.tableView indexPathForSelectedRow] row] + 1];`  \n`    }`\
  \  \n`}`\n\n这段代码用于检查你正在响应的 segue 是否正确，以防将来添加额外的 segue。之后，它会获取 `tableView` 当前选中的行，并将其加\
  \ 1（因为你的应用从 1 开始编号，而行计数从 0 开始）。接着，它会使用该 appID 和你创建的便捷方法 `appWithAppID:` 创建一个 `MyAppClass`\
  \ 对象。这个新对象被赋值给 `destinationViewController`（一个 `AppDetailsViewController` 实例）的 `selectedApp`\
  \ 属性。\n\n在继续测试该应用之前，请确保 `AppListTableViewController` 已被设置为 App List 表格视图控制器的类。\n\
  \n如果你现在运行应用，你会看到每个 `UITableViewCell` 都会将不同的应用详情加载到 `detailsViewController` 中。图 2–59\
  \ 展示了该应用的模拟运行结果。\n\n![Image](img/9781430240051_Fig02-59.jpg)\n\n**图 2–59.** *模拟应用中显示的详情视图*\n\
  \n### UITableViewCell 原型\n\n到目前为止，应用按预期运行，但如果你向库存中添加新应用会怎样？在当前的应用布局下，这意味着必须为每个新应用项更新\
  \ `UITableView` 并添加新的单元格。如果动态加载 `UITableView`，这样每次有新应用时就不必更新故事板 XIB，岂不是更简单？\n\n\
  首先，你将创建一个自定义的 `UITableViewCell` 类，该类包含映射现有 `UITableViewCell` 的插座。使用菜单选项 **File**\
  \ ![Image](img/U001.jpg) **New** ![Image](img/U001.jpg) **New File…**，并从 Cocoa Touch\
  \ 模板中选择 \"Objective-C class\"。创建一个 `UITableViewCell` 的子类，并将其命名为 `AppUITableViewCellClass`，如图\
  \ 2–60 所示。\n\n![Image](img/9781430240051_Fig02-60.jpg)\n\n**图 2–60.** *配置 `UITableViewCell`\
  \ 子类*\n\n在接口文件（`.h`）中，创建两个 `UILabel` 插座属性和一个 `UIImage` 插座属性。代码应如下所示：\n\n```\n//\
  \  AppUITableViewCellClass.h\n\n#import <UIKit/UIKit.h>\n\n@interface AppUITableViewCellClass\
  \ : UITableViewCell\n\n@property (strong, nonatomic) IBOutlet UILabel *labelAppName;\n\
  @property (strong, nonatomic) IBOutlet UIImageView *imageAppIcon;\n@property (strong,\
  \ nonatomic) IBOutlet UILabel *labelAppDescription;\n\n@end\n```\n\n接下来要做的就是在实现文件（`.m`）中合成这些属性：\n\
  \n```\n//  AppUITableViewCellClass.m\n\n#import \"AppUITableViewCellClass.h\"\n\n\
  @implementation AppUITableViewCellClass\n\n@synthesize labelAppName;\n@synthesize\
  \ imageAppIcon;\n@synthesize labelAppDescription;\n\n@end\n```\n\n切换回你的故事板视图，并使用属性检查器将\
  \ `UITableView` 的内容模式改为动态原型，如图 2–61 所示。\n\n![Image](img/9781430240051_Fig02-61.jpg)\n\
  \n**图 2–61.** *重新选择动态原型*\n\n你的表格视图现在应该看起来像图 2–62。你会注意到之前创建到 App 详情视图的 Segue 以及静态单元格布局都已经消失了。\n\
  \n![Image](img/9781430240051_Fig02-62.jpg)\n\n**图 2–62.** *新的表格视图*\n\n将 `UIImageView`\
  \ 和 `UILabel` 对象拖拽到 `UITableViewCell` 原型上，并设置其内容为 \"App Name Label\" 和 \"App Description\"\
  ，如图 2–63 所示。然后，在身份检查器窗格中将 `UITableViewCell` 的类设置为你的自定义类 `AppUITableViewCellClass`。\n\
  \n![Image](img/9781430240051_Fig02-63.jpg)\n\n**图 2–63.** *将单元格配置为 `UITableViewCell`\
  \ 的自定义子类*\n\n现在，按住 ^ 键并从 `UITableViewCell` 点击拖拽到 App Name 标签，当松开鼠标按钮时，会显示一个包含插座列表的弹出窗口。选择\
  \ `labelAppName` 插座。连接 `UITableViewCell` 中的其他对象。图 2–64 演示了这些步骤中的第一步。\n\n![Image](img/9781430240051_Fig02-64.jpg)\n\
  \n**图 2–64.** *连接单元格元素到插座*\n\n你还需要在属性检查器中设置表格视图单元格标识符字段，如图 2–65 所示。\n\n![Image](img/9781430240051_Fig02-65.jpg)\n\
  \n**图 2–65.** *设置单元格标识符*\n\n现在，按住 ^ 键并从 `UITableViewCell` 点击拖拽到 App Detail 视图控制器以创建\
  \ Segue，如图 2–66 所示。\n\n![Image](img/9781430240051_Fig02-66.jpg)\n\n**图 2–66.** *重新配置详情视图\
  \ Segue*\n\n然后，通过选中 Segue 并在属性检查器中设置来为其设置标识符，如图 2–67 所示。\n\n![Image](img/9781430240051_Fig02-67.jpg)\n\
  \n**图 2–67.** *设置新的 Segue 标识符*\n\n现在你需要将 `AppUITableViewCellClass` 和数据源方法添加到 `AppListTableViewController`\
  \ 的实现文件（`.m`）中。\n\n```\n//  AppListTableViewController.m\n```\n\n\n\n```objc\n#import\
  \ \"AppListTableViewController.h\"\n#import \"AppDetailsViewController.h\"\n#import\
  \ \"MyAppClass.h\"\n#import \"AppUITableViewCellClass.h\"\n\n@implementation AppListTableViewController\n\
  \n- (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender{\n    if([segue.identifier\
  \ isEqualToString:@\"AppDetailsLoadFromTableViewCell\"]){\n        AppDetailsViewController\
  \ *appDetailsVC = segue.destinationViewController;\n        appDetailsVC.selectedApp=[MyAppClass\
  \ appWithAppID:[[self.tableView indexPathForSelectedRow] row]+1];\n    }\n}\n\n\
  #pragma mark - 表格视图数据源\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n\
  {\n    return 1;\n}\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
  {\n    return 3;\n}\n\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    //设置你在故事板中指定的 CellIdentifier\n    static NSString *CellIdentifier\
  \ = @\"appCell\";\n\n    AppUITableViewCellClass *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
  \    if (cell == nil) {\n        cell = [[AppUITableViewCellClass alloc] initWithStyle:UITableViewCellStyleDefault\
  \ reuseIdentifier:CellIdentifier];\n    }\n\n    //配置单元格\n    MyAppClass *appForCell=[MyAppClass\
  \ appWithAppID:indexPath.row+1];\n    cell.labelAppName.text=appForCell.appName;\n\
  \    cell.labelAppDescription.text=appForCell.appDescription;\n    cell.imageAppIcon.image=appForCell.iconImage;\n\
  \n    return cell;\n}\n```\n\n现在运行应用时，`UITableView` 会像之前一样，使用那个原型单元格和数据源来加载。图 2–68\
  \ 显示了应用最新更新后的模拟结果。在此例中，你仍在使用 `MyAppClass` 的静态数据，但该应用可以轻松扩展，使用 Core Data 对象模型，甚至从服务器上的远程\
  \ XML 文件中拉取应用列表，从而实现真正的动态效果。这些功能将在第 10 章（数据存储方案）和第 11 章（Core Data 方案）中进一步介绍。\n\n\
  ![图像](img/9781430240051_Fig02-68.jpg)\n\n**图 2–68.** *最新更改后的新应用视图*\n\n### 向现有项目添加故事板\n\
  \n你已经创建了一个“关于我们”应用，它运行良好，但独立来看并不出彩。它的目的是被包含在你的其他应用中，以便你能够轻松地在任何应用中展示公司信息，并方便地交叉推广你的应用库。\n\
  \n苹果为故事板提供了 API，使它们可以轻松地集成到尚未使用故事板的现有应用中。`UIStoryboard` 类提供了方法 `+storyboardWithName:bundle:`，用于加载指定名称的故事板。然后，你可以通过方法\
  \ `– instantiateInitialViewController` 加载故事板中的初始视图控制器。\n\n现在，我们创建一个不使用故事板的新项目，命名为“Chapter2Project”。使用菜单选项\
  \ **文件** ![图像](img/U001.jpg) **新建** ![图像](img/U001.jpg) **新建项目…** 来创建一个新的单视图应用程序。执行此操作的窗口将类似于图\
  \ 2–69。\n\n![图像](img/9781430240051_Fig02-69.jpg)\n\n**图 2–69.** *选择单视图应用程序*\n\n\
  这次，你将项目命名为“Chapter2Project”，并确保未选中“使用故事板”，就像图 2–70 所示。如果你的 Xcode 版本包含该选项，也请确保勾选“使用自动引用计数”复选框。如果你的版本还包含“类前缀”字段，请将其设置为\
  \ Chapter2Project。\n\n![图像](img/9781430240051_Fig02-70.jpg)\n\n**图 2–70.** *配置不使用故事板的新项目*\n\
  \n使用该新项目的导航窗格，在项目下创建一个名为“AboutUsStoryBoard”的新分组，结果如图 2–71 所示。\n\n![图像](img/9781430240051_Fig02-71.jpg)\n\
  \n**图 2–71.** *向项目添加子分组*\n\n现在，选择 `Chapter2ProjectViewController.xib`，并添加一个 `UIButton`，在触摸它时启动“关于我们”视图。你的视图应类似于图\
  \ 2–72 所示。\n\n![图像](img/9781430240051_Fig02-72.jpg)\n\n**图 2–72.** *已配置的视图控制器界面*\n\
  \n接下来，让我们通过使用助理编辑器并进行 `control-点击-拖拽` 操作，从 `UIButton` 到 `Chapter2ProjectViewController`\
  \ 接口文件（`.h`），将该“关于我们”按钮连接到一个 `IBAction`。将连接类型更改为“动作”，并在“名称”字段输入 **showAboutUsView**，如图\
  \ 2–73 所示。\n\n![图像](img/9781430240051_Fig02-73.jpg)\n\n**图 2–73.** *配置 `UIButton`\
  \ 的动作*\n\n在完成那个方法占位符之前，你需要将“关于我们”文件复制到此项目中。切换到“关于我们”项目，为了避免将“关于我们”故事板与你未来可能添加到项目中的任何其他故事板混淆，你应该重命名故事板。在项目导航窗格中，将\
  \ `MainStoryboard.storyboard` 的名称更改为 `AboutUs.storyboard`。如果你选择创建的是通用应用，它最初可能被命名为\
  \ `MainStoryboard_iPhone.storyboard`。在图 2–74 中，你可以看到故事板文件已被重命名为新名称。\n\n![图像](img/9781430240051_Fig02-74.jpg)\n\
  \n**图 2–74.** *为新建项目重命名故事板文件*\n\n现在，选择 AboutUs 组中除 `aboutUsAppDelegate.h`/`.m` 文件之外的所有文件，并将它们复制到你之前创建的\
  \ Chapter2Project 项目的 AboutUs 组中。如果通过“拖放”移动这些文件，请确保在出现的传输窗口中勾选“将项目复制到目标组的文件夹中”复选框。图\
  \ 2–75 显示了从先前项目中复制文件后的导航窗格。\n\n![图像](img/9781430240051_Fig02-75.jpg)\n\n**图 2–75.**\
  \ *将故事板文件复制到你的新项目中*\n\n\n\n现在你可以在 `Chapter2ProjectViewController` 的实现文件（`.m`）中补全你之前创建的\
  \ `IBAction` 了。在项目导航面板中选择 `Chapter2ProjectViewController.m`，并导入 `aboutUsViewController.h`\
  \ 头文件。然后向下滚动到代码底部 `IBAction` 方法占位符所在位置，补全该方法，使文件内容如下所示：\n\n```\n//  Chapter2ProjectViewController.m\n\
  \n#import \"Chapter2ProjectViewController.h\"\n#import \"aboutUsViewController.h\"\
  \n\n@implementation Chapter2ProjectViewController\n…\n- (IBAction)showAboutUsView:(id)sender\
  \ {\n    UIStoryboard *aboutUsStoryboard=[UIStoryboard storyboardWithName:@\"AboutUs\"\
  \nbundle:nil];\n    aboutUsViewController *aboutUsVC=[aboutUsStoryboard\ninstantiateInitialViewController];\n\
  \    [self presentViewController:aboutUsVC animated:YES completion:nil];\n}\n@end\n\
  ```\n\n当项目运行并点击按钮时，你的故事板将会加载，所有后续视图也会随之加载，最终呈现的视图将类似于图 2–76 所示。\n\n![Image](img/9781430240051_Fig02-76.jpg)\n\
  \n**图 2–76.** *加载故事板后的应用结果*\n\n但存在一个问题。当你查看完“关于我们”视图控制器后，无法将其关闭。最简单的解决办法是在故事板中的该视图上添加一个“返回”按钮来关闭视图。\n\
  \n首先，在 `aboutUsViewController` 的接口文件（`.h`）中定义“返回”按钮将要触发的 `IBAction`：\n\n```\n//\
  \  aboutUsViewController.h\n\n#import <UIKit/UIKit.h>\n\n@interface aboutUsViewController\
  \ : UIViewController\n\n-(IBAction)closeAboutUs:(id)sender;\n\n@end\n```\n\n然后在\
  \ `aboutUsViewController` 的实现文件（`.m`）中实现该方法：\n\n```\n//  aboutUsViewController.m\n\
  \n#import \"aboutUsViewController.h\"\n\n@implementation aboutUsViewController\n\
  \n-(IBAction)closeAboutUs:(id)sender{\n    [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n}\n```\n\n打开 `AboutUs.storyboard`，在“关于我们”视图的 `UINavigationBar`\
  \ 中添加一个标题为“返回”的 `UIBarButtonItem` 对象。然后通过按住 ^ 键并点击拖拽，从 `UIBarButtonItem` 连接到视图控制器的状态栏，并在弹出的菜单中选中\
  \ `closeAboutUs` 事件，从而将此 `UIBarButtonItem` 连接到 `IBAction closeAboutUs`。这些步骤在图 2–77\
  \ 中进行了演示。\n\n![Image](img/9781430240051_Fig02-77.jpg)\n\n**图 2–77.** *将栏按钮连接到跳转动作*\n\
  \n现在，当你运行应用程序时，你将能够启动“关于我们”故事板，并返回到你的主应用。不要忘记，你应该将这个 `UIBarButtonItem` 和方法添加到主“关于我们”项目中，这样当你将其复制到未来的项目时，就不会遇到同样的问题了。\n\
  \n### 总结\n\n你在 Xcode 4 中首先会注意到的是，Interface Builder 不再是一个独立的应用程序。然而，这些变化远不止于此，它带来了一种真正集成的体验。Interface\
  \ Builder 将拖放式界面构建的便捷性扩展到了与 Assistant Editor 视图结合时的代码生成中。\n\n故事板工具将你的界面构建推向了更高层次，使你能够快速构建应用程序的工作原型。你的故事板图表在编码开始时不再被丢弃，而是成为应用程序开发过程中不可或缺的一部分，并且可以被控制器所利用。这一新特性将“模型-视图-控制器”从一种抽象的最佳实践转变为切实的应用程序开发流程。\n\
  \n## 第 3 章\n\n## 应用程序设计元素\n\n每个行业都有其特定的一套材料、工具和方法，而一个人对这些设备的掌握程度和理解深度几乎决定了他在该领域能否取得成功。在\
  \ iOS 开发中，你拥有大量可用于组装应用程序的组件和功能。对这些工具有充分且实用的理解，能够让任何开发者显著提升其参与工作的质量。\n\n在本章中，你将系统地了解\
  \ iOS 开发者最初可以使用的设计元素，讨论它们的目的、用途、实现方式、功能，以及如何从每个元素中获得最佳效果的一般指南。通过这种方式，你可以更好地理解如何充分利用这些工具，创建出更高质量的应用程序。\n\
  \n### Cocoa Touch 控件\n\nCocoa Touch 包含了一系列被称为“控件”的丰富元素，这些是应用程序用来与用户交互的主要对象。所有这些元素（其中一些是\
  \ iOS 5.0 全新引入的）让你能够构建一个更先进、更简单的用户界面来操作你的应用程序。\n\n\n\n### `UILabel`\n\n`UILabel`\
  \ 类可谓是最基本、最基础的空间之一，你可以用它来向用户显示信息。许多其他元素都使用了`UILabel`，使其成为几乎所有用户界面的基础。图 3-1 是`UILabel`最简单的示例。\n\
  \n![Image](img/9781430240051_Fig03-01.jpg)\n\n**图 3-1.** 一个简单的`UILabel`\n\n处理`UILabel`的主要方法是通过`-setText:`方法或更简单的`text`属性来设置其文本。然而，该类还提供了许多其他属性供你自定义显示效果，包括：\n\
  \n*   `font`\n*   `textColor`\n*   `textAlignment`\n*   `enabled`：通过此属性可以轻松地使标签变暗或取消变暗，因为禁用的`UILabel`会以变暗效果显示。\n\
  \n若要对文本显示进行更精确的控制，你还可以使用`shadowColor`和`shadowOffset`属性创建阴影。`shadowOffset`属性的类型是`CGSize`，你可以使用`CGSizeMake()`函数来创建。此函数接受两个参数，即宽度和高度，用于指定阴影相对于标签的位置。例如，如果使用以下代码配置阴影，则生成的`UILabel`将类似于图\
  \ 3-2。\n\n```\nmyLabel.shadowColor = [UIColor blackColor];\nmyLabel.shadowOffset\
  \ = CGSizeMake(2.0, 2.0);\n```\n\n![Image](img/9781430240051_Fig03-02.jpg)\n\n**图\
  \ 3-2.** 带有深阴影的文本\n\n将此与没有阴影的`UILabel`进行比较，如图 3-3 所示。\n\n![Image](img/9781430240051_Fig03-03.jpg)\n\
  \n**图 3-3.** 没有阴影的标签\n\n如你所见，将`shadowOffset`的宽度指定为 2.0，高度指定为 2.0，标签的阴影将相对于原始文本向右偏移\
  \ 2 点并向下偏移 2 点。可以想象，这些值为负数将导致阴影分别向左和向上移动。\n\n利用`UILabel`的阴影通常有助于应用程序的图形设计，但通常很难确定理想的规格。一般来说，可以说“少即是多”，一个非常细微的改变，例如使用偏移量为(1.0,\
  \ 1.0)的灰色阴影，将有助于提升应用程序的视觉效果。图 3-4 展示了一个没有阴影的`UILabel`与一个具有灰色阴影且偏移量为(1.0, 1.0)的`UILabel`的对比，以展示视觉效果上的差异。\n\
  \n![Image](img/9781430240051_Fig03-04.jpg)\n\n**图 3-4.** 一个没有阴影的标签与一个具有一个平方点阴影的标签的比较\n\
  \n`UILabel`还有属性`highlightedTextColor`（你可以指定）和`highlighted`（允许你专门高亮标签）。但是，除非使用`highlightedTextColor`属性指定了高亮颜色，否则不会应用任何高亮颜色。\n\
  \n与许多其他元素一样，`UILabel`有一个名为`userInteractionEnabled`的属性。必须将此属性设置为`YES`才能使任何手势（例如点击）对`UILabel`产生影响。\n\
  \n### `UIButton`\n\n作为双向用户交互的基石，`UIButton`允许你在应用程序中为用户提供明确的选择。\n\n有多种预定义的`UIButton`类型可供使用。你可以通过类方法`+buttonWithType:`设置按钮的类型，该方法接受以下可能的预定义值：\n\
  \n*   `UIButtonTypeCustom`\n*   `UIButtonTypeRoundedRect`\n*   `UIButtonTypeDetailDisclosure`\n\
  *   `UIButtonTypeInfoLight`\n*   `UIButtonTypeInfoDark`\n*   `UIButtonTypeContactAdd`\n\
  \n如果没有为该属性指定值，则默认为自定义类型，让你在自定义按钮视图方面拥有最大的自由度。\n\n一般而言，如果你只是想创建一个简单的带文本的按钮，可能会使用`UIButtonTypeRoundedRect`按钮；但如果需要一个更复杂的按钮（包括基于图像的按钮），则可能会使用`UIButtonTypeCustom`选项。这样，你可以更轻松地控制按钮的背景设置，确保视觉主题保持一致。\n\
  \n每当处理`UIButton`时，你必须始终考虑按钮可能处于的“状态”（即当前是否被选中）。因此，大多数`UIButton`方法都包含一个`UIControlState`参数。例如，要设置`UIButton`的文本，而不是访问`titleLabel`属性，你应该使用`-setTitle:forState:`方法。例如，你可以像这样配置一个`UIButton`：\n\
  \n```\nUIButton *button = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n[button\
  \ setTitle:@\"Test\" forState:UIControlStateNormal];\n[button setTitle:@\"Selected\"\
  \ forState:UIControlStateHighlighted];\n```\n\n请记住，当你以编程方式创建视图元素时，应设置其`frame`以指定位置，然后将其添加为相应视图的子视图。\n\
  \n```\n[button setFrame:CGRectMake(10, 10, 100, 44)];\n[self.view addSubview:button];\n\
  ```\n\n`UIButton`上的按钮标题本质上是一个`UILabel`，因此你可以使用`titleColorForState:`和`titleShadowColorForState:`等非常方法轻松自定义字体和阴影。\n\
  \n`UIButton`还允许在内部放置两种不同的图像：背景图像和前景图像。你可以使用`-setBackgroundImage:forState:`和`setImage:forState:`方法轻松设置这些图像。\n\
  \n为了以编程方式为`UIButton`添加操作，请使用`-addTarget:action:forControlEvents:`方法。\n\n```\n[button\
  \ addTarget:self action:@selector(buttonPressed:)\nforControlEvents:UIControlEventTouchUpInside];\n\
  ```\n\n然后，你可以定义`-buttonPressed:`方法来执行任何你喜欢的操作。如果以这种方式实现操作，对`UIButton`的引用将作为第一个参数传递给该方法。这使你能够通过检查“发送者”元素的属性并相应地采取相应操作，从而以单个方法响应大量不同事件。作为一个简单的例子，以下实现将在日志中显示被按下的按钮的文本。\n\
  \n```\n-(void)buttonPressed:(UIButton *)sender\n{\n    NSLog(@\"%@\", sender.titleLabel.text);\n\
  }\n```\n\n\n\n### `UISegmentedControl`\n\n`UISegmentedControl`类本质上是`UIButton`的扩展。它不仅允许你进行选择，还能无限期地保留这些选择，直到做出另一个选择。它专为那些始终需要从多个选项中选择一个的场景而设计，比如在地图应用中选择显示类型，或者在游戏中配置设置。\n\
  \n`UISegmentedControl`元素由多个“分段”（segments）组成，每个分段内可以包含一个字符串或一张图片，如图 3–5 所示。\n\n![Image](img/9781430240051_Fig03-05.jpg)\n\
  \n**图 3–5.** *一个简单的`UISegmentedControl`*\n\n每个分段都有一个与之对应的索引，第一个分段的索引为 0。\n\n与`UIButton`类似，你可以为`UISegmentedControl`添加动作，以便在选中的分段发生改变时执行。使用`-addTarget:action:forControlEvents:`方法即可，示例如下：\n\
  \n`[self.segCon addTarget:self action:@selector(segmentChanged:) forControlEvents:UIControlEventValueChanged];`\n\
  \n当构建`UISegmentedControl`实例时，你可以在分配对象后，使用`-initWithItems:`方法指定一组初始显示项。之后，你可以使用`-insertSegmentWithImage:atIndex:animated:`和`-insertSegmentWithTitle:atIndex:animated:`方法来添加分段，并使用`-removeSegmentAtIndex:animated:`或`-removeAllSegments:`方法来移除分段。\n\
  \n在任何时候，你都可以通过`numberOfSegments`属性获取控件中当前项目的总数，并通过`selectedSegmentIndex`访问当前选中的索引。\n\
  \n一旦你有了想要访问的特定索引，可以使用`-setImage:forSegmentAtIndex:`、`imageForSegmentAtIndex:`、`setTitle:forSegmentAtIndex:`和`titleForSegmentAtIndex:`来根据需要修改或利用你的`UISegmentedControl`。以下是`UISegmentedControl`的一个动作示例，它将新选中分段的文本替换为其先前值的平方。\n\
  \n```\n-(void)segmentChanged:(UISegmentedControl *)sender\n{\n    int index = sender.selectedSegmentIndex;\n\
  \    NSString *title = [sender titleForSegmentAtIndex:index];\n    int x = [title\
  \ intValue]*[title intValue];\n    NSString *newTitle = [[NSNumber numberWithInt:x]\
  \ stringValue];\n    [sender setTitle:newTitle forSegmentAtIndex:index];\n}\n```\n\
  \n### `UITextField`\n\n`UITextField`是最易于定制的用户输入形式，也是使用最频繁的，因为它允许你轻松地获取用户输入并进行处理。你甚至可以对用户输入应用自动更正功能，但应谨慎使用，以避免不必要的更正。\n\
  \n如果你想在视图中添加一个`UITextField`，最简单的方法是在 XIB 文件中将其放置在视图中，如图 3–6 所示。然后，你可以将其作为属性连接到头文件，并在`-viewDidLoad`方法中进行配置。\n\
  \n无论何时处理`UITextField`（或之后你会遇到的其他基于文本的输入），最需要记住的一点是，键盘有时会遮挡屏幕的一半。作为设计者，你需要为此做好规划，确保你的`UITextField`位于屏幕的上半部分，或者在键盘出现时自动移动到上半部分。你可以通过注册以下通知，设置在键盘出现或消失时要执行的动作：\n\
  \n*   `UIKeyboardWillShowNotification`\n*   `UIKeyboardDidShowNotification`\n* \
  \  `UIKeyboardWillHideNotification`\n*   `UIKeyboardDidHideNotification`\n\n![Image](img/9781430240051_Fig03-06.jpg)\n\
  \n**图 3–6.** *在 XIB 界面中添加`UITextView`*\n\n在 Interface Builder 中，你还可以轻松地对`UITextField`进行一些配置。你也可以通过`UITextField`的属性以编程方式实现所有这些更改，但\
  \ Interface Builder 能使其变得更容易，尤其是键盘设置，如自动大写和自动更正。图 3–7 是包含这些设置的属性检查器视图。如图所示，“更正”类型默认为“默认”，这会导致你在输入消息时常见的一般响应。\n\
  \n![Image](img/9781430240051_Fig03-07.jpg)\n\n**图 3–7.** *在实用工具面板中配置`UITextField`*\n\
  \n通过使用`leftView`、`rightView`、`inputView`和`inputAccessoryView`属性，以编程方式自定义`UITextField`的视图也非常容易。\n\
  \n`UITextField`最重要的属性之一是`delegate`属性，它接收与`UITextField`动作相关的各种方法调用。被设置为`delegate`的对象（通常是显示`UITextField`的视图控制器）必须遵循`UITextFieldDelegate`协议。\n\
  \n`UITextFieldDelegate`协议指定了多种方法来管理`UITextField`的编辑。你可以使用`-textFieldShouldBeginEditing:`和`-textFieldShouldEndEditing:`方法来启用或禁用编辑的开始或结束。（在这两个方法中返回`NO`可禁用相应的动作。）\n\
  \n你还可以使用`-textFieldDidBeginEditing:`和`-textFieldDidEndEditing:`来移动周围的元素，确保键盘不会遮挡你的`UITextField`。\n\
  \n在编辑`UITextField`的文本方面，`UITextFieldDelegate`提供了一些方法来帮助你自定义文本字段的行为。`-textField:shouldChangeCharactersInRange:replacementString:`在主动解析输入的文本时非常有用。`-textFieldShouldClear:`方法也允许你决定是否清除`UITextField`的内容。\n\
  \n`UITextFieldDelegate`协议中最有用的方法可能是`-textFieldShouldReturn:`方法，它通常是实现关闭键盘的主要方法。大多数用户习惯于按回车键结束对`UITextField`的编辑，因此你可以像下面这样简单地实现这个方法：\n\
  \n```\n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n{\n    [textField\
  \ resignFirstResponder];\n    return YES;\n}\n```\n\n通过使用`-resignFirstResponder`方法，你的`UITextField`放弃了作为当前关键元素的角色，从而关闭了键盘。如图\
  \ 3–8 所示，模拟运行的应用将允许你通过按回车键来关闭键盘。\n\n![Image](img/9781430240051_Fig03-08.jpg)\n\n\
  **图 3–8.** *一个启用了关闭键盘功能的应用*\n\n\n\n"
- '# UISlider


  `UISlider` 提供了一个非常精美且简单的 UI 元素，用于让用户平滑地调整数值，如图 3-9 所示。


  ![Image](img/9781430240051_Fig03-09.jpg)


  **图 3-9.** *一个简单的 `UISlider`*


  这些滑块相当容易设置和配置。你可以使用 Interface Builder 完成大部分数值设置，也可以通过编程方式设置数值。需要配置的最重要的属性是 `minimumValue`、`maximumValue`
  和初始值。你可以在设置 XIB 文件时设置初始值，也可以在代码中通过 `-viewDidLoad` 中直接设置滑块的 value 属性来实现。


  除了这些基本属性，你还可以极大地自定义滑块的外观，包括指定自定义的轨道图像和滑块按钮图像。你还可以指定放置在 `UISlider` 两端的图像，通过 `minimumValueImage`
  和 `maximumValueImage` 属性来帮助表示最大值和最小值。例如，如果你的 `UISlider` 用于调节音频播放器的音量，那么最小值图像可以是一个扬声器的图片，而最大值图像可以是同一个扬声器，但带有从它发出的声波。


  你可以通过两种方法，为 `UISlider` 的值变化创建要执行的操作：


  1.  在头文件中声明一个返回类型为（`IBAction`）的方法，然后在 XIB 文件中按住 ![Image](img/U003.jpg) 并从滑块拖拽到该方法头，将
  `UISlider` 连接到这个方法。

  2.  使用 `-addTarget:action:forControlEvents:` 方法，如下所示：`[self.mySlider addTarget:self
  action:@selector(valueChanged:) forControlEvents:UIControlEventValueChanged]`。


  `UISlider` 还有一个名为 `continuous` 的属性，它决定是否连续报告值的变化。如果不是，那么与滑块关联的操作只会在用户完成值调整时被调用，而不是在用户移动滑块按钮时反复调用。


  如果你希望以编程方式（可能是由于其他某些事件）改变滑块的值，而不是让用户调整，你应该使用 `-setValue:animated:` 方法，而不是直接设置 `value`
  属性，以便为用户提供更平滑的过渡。


  '
- '# UISwitch


  `UISwitch` 的工作方式与 `UISlider` 非常相似，但它只允许用户选择布尔值，即“开”（如图 3-10 所示）或“关”。这些开关通常用在应用的“设置”区域，允许用户轻松定制自己的偏好。


  ![Image](img/9781430240051_Fig03-10.jpg)


  **图 3-10.** *一个启用的 `UISwitch`*


  在添加要在值变化时执行的操作方面，`UISwitch` 的工作方式与 `UISlider` 完全相同，但由于开关的布尔值特性，它要简单得多。与之前一样，使用 `-addTarget:action:forControlEvents:`
  将一个方法连接到开关。你也可以通过 `on` 属性访问开关的值，并使用 `-setOn:animated:` 方法动画地改变其值。


  '
- '# UIActivityIndicatorView


  通常，应用程序可能正在执行一个不会立即完成的任务。这可能是从服务器下载文件的过程，或者仅仅是处理大量数据、需要相当长的时间才能完成的任务。作为开发者，你应该始终努力让用户了解这类活动的状态。为此，你可以使用
  `UIActivityIndicatorView`，如图 3-11 所示。


  `UIActivityIndicatorView` 是一个简单的元素，用于显示后台是否有活动正在进行。然而，它只允许两种状态：正在进行和未进行。要在两者之间切换，你可以使用
  `-startAnimating` 和 `-stopAnimating` 方法。你也可以通过 `-isAnimating` 方法访问指示器当前是否正在动画。如果你在任务完成后不再需要使用指示器，可以使用
  `hidesWhenStopped` 属性。


  ![Image](img/9781430240051_Fig03-11.jpg)


  **图 3-11.** *一个 `UIActivityIndicatorView` 元素*


  对于这个元素，你的自定义选项相当有限，只能调整颜色和大小。首先，你有 `activityIndicatorViewStyle` 属性，它有三个可选值：


  * `UIActivityIndicatorViewStyleWhiteLarge`

  * `UIActivityIndicatorViewStyleWhite`

  * `UIActivityIndicatorViewStyleGray`


  这三个值仅在大小和颜色上有所不同，应从中选择以最大化视觉显示质量。


  如果上述任何一种样式都不太符合你的应用设计，你还可以通过 `UIColor` 类，使用 `color` 属性指定不同的颜色。


  '
- "# UIProgressView\n\n沿着 `UIActivityIndicatorView` 的思路，你还有 `UIProgressView`。它的作用与\
  \ `UISlider` 非常相似，都能显示一个值（尽管限制在 0 到 1 之间缩放），但不允许任何用户输入。这个元素最常用于显示任务完成的进度，如图 3-12\
  \ 所示，作为简单地使用 `UIActivityIndicatorView` 来显示“正在处理”的一种替代方案。\n\n![Image](img/9781430240051_Fig03-12.jpg)\n\
  \n**图 3-12.** *使用中的 `UIProgressView`*\n\n与 `UIActivityIndicatorView` 一样，`UIProgressView`\
  \ 可以带样式创建，通过 `progressViewStyle` 属性访问，该属性有以下可能的值：\n\n* `UIProgressViewStyleDefault`：`UIProgressView`\
  \ 的标准样式\n* `UIProgressViewStyleBar`：常用于工具栏内部的样式\n\n自然，`UIProgressView` 最重要的属性是进度值。这个值介于\
  \ 0.0 和 1.0 之间，可以通过 `progress` 属性访问。你也可以使用 `-setProgress:animated:` 方法来设置这个属性，以提升应用界面的视觉效果。\n\
  \n除了 `progressViewStyle`，`UIProgressView` 还允许对已显示的进度条及其底部的轨道的着色颜色和图像进行相当不错的外观自定义。这些分别通过\
  \ `progressTintColor`、`progressImage`、`trackTintColor` 和 `trackImage` 属性来访问。\n\n\
  \n\n### UIPageControl\n\n在处理具有“分页”功能的应用程序时，`UIPageControl`是一个非常有用的微型 UI 元素，如图 3-13\
  \ 所示。该组件主要作为指示器向用户显示当前处于哪一页，尽管它也可以用于直接操作应用程序（通常是通过更改当前页面）。关于此实用性的一个绝佳示例，请查看设备上“天气”应用的底部。\n\
  \n![Image](img/9781430240051_Fig03-13.jpg)\n\n**图 3-13.** `UIPageControl`\n\n使用`UIPageControl`时，你可以通过`currentPage`和`numberOfPages`等属性轻松访问与其关联的多个值。如果你的应用程序在某些时候可能只有一个页面，你还可以使用`hidesForSinglePage`属性。\n\
  \n与`UISlider`和`UISwitch`一样，你可以使用`-addTarget:selector:forControlEvents:`方法结合`UIControlEventValueChanged`事件，向`UIPageControl`添加在`currentPage`值发生变化时要执行的操作。此方法理想情况下应处理应用程序显示的实际更改，以显示新选择的页面。\n\
  \n如果在`currentPage`发生变化时，你决定由于某些原因不希望`UIPageControl`的显示立即更新，可以将`defersCurrentPageDisplay`属性设置为`YES`，使其等待调用`-updateCurrentPageDisplay`方法后才调整显示。否则，此属性默认为`NO`。\n\
  \n不幸的是，在自定义`UIPageControl`的外观方面，你受到的限制非常大。不过，你可以使用一个非常有用的方法`-sizeForNumberOfPages:`，它能让你轻松找到显示任意指定页面数量的`UIPageControl`所需的最小尺寸。\n\
  \n任何时候使用`UIPageControl`元素，都要确保该指示器在视觉上不会干扰其所管理的页面。因此，根据苹果的界面指南，该元素应居中位于“页面”底部和屏幕底部之间。\n\
  \n### UIStepper\n\n`UIStepper`是 iOS 5.0 中全新引入的元素，旨在简化应用程序对增量值的使用。它为用户配备了“+”和“-”按钮，但本身并不显示其关联的值，如图\
  \ 3-14 所示。此任务留给开发者根据每个应用程序的具体情况来实现。\n\n![Image](img/9781430240051_Fig03-14.jpg)\n\
  \n**图 3-14.** 全新的`UIStepper`\n\n`UIStepper`的主要属性是它的`value`属性，你可以通过访问该属性来相应地更新显示。这个值可以通过多种属性轻松配置：\n\
  \n- `minimumValue`：`value`可以达到的最小数值\n- `maximumValue`：`value`的最大值\n- `stepValue`：使用步进按钮时`value`递增的量\n\
  - `wraps`：如果此属性设置为`YES`，你的最小值和最大值将循环衔接。因此，如果`value`递增超过`maximumValue`，它将回绕到`minimumValue`，反之亦然。\n\
  - `autorepeat`：此属性允许长按`UIStepper`按钮以重复递增`value`，而无需反复点击该元素。\n- `continuous`：指定值更改事件是在`value`属性每次更改时发送，还是仅在用户完成更改值后才发送（与`autorepeat`属性配合使用）。\n\
  \n和之前一样，你可以使用`-addTarget:selector:forControlEvents:`方法配合`UIControlEventValueChanged`事件，为`value`属性的更改分配要执行的操作。\n\
  \n一旦你的`UIStepper`配置完毕，在设计应用程序时唯一需要记住的概念是，确保用户界面清晰地告知用户某个`UIStepper`更改的是哪个值。\n\n\
  ### 数据视图\n\n在 iOS 中，你可以访问各种`UIView`的子类，统称为“数据视图”，它们允许你根据应用程序的类型，以非常特定的方式轻松地在应用程序中放置内容。\n\
  \n#### UIImageView\n\nCocoa Touch 中最直观且重要的数据视图之一是`UIImageView`类。这个视图元素及其属性和方法经过优化，可帮助开发者在应用程序中显示和管理图像。\n\
  \n`UIImageView`的核心属性是其`image`和`highlightedImage`属性。这两个属性都是`UIImage`类的实例，其中`highlightedImage`仅在图像被选中时显示。你可以通过使用指定的初始化方法`-initWithImage:`或`-initWithImage:highlightedImage:`以编程方式创建并指定这些图像，或者直接单独设置这些属性。示例如下：\n\
  \n```objectivec\nself.myImageView = [[UIImageView alloc] initWithImage:[UIImage\
  \ imageNamed:@\"myImage.png\"]];\n```\n\n如果你使用`+imageNamed:`方法来创建`UIImage`，则需要确保你的实际图像文件已导入到项目中。你可以通过将文件从\
  \ Finder 拖入 Xcode 来实现。拖入时，会弹出一个对话框，你需要确保选中“将项目复制到目标组的文件夹（如果需要）”选项，如图 3-15 所示。\n\n\
  ![Image](img/9781430240051_Fig03-15.jpg)\n\n**图 3-15.** 向项目添加文件时的弹出对话框\n\n`UIImageView`类还内置了通过使用以下属性来动画显示多个图像的功能：\n\
  \n- `animationImages`：此属性是一个包含`UIImage`对象的`NSArray`，指定了要动画显示的实际图像。\n- `highlightedAnimationImages`：此属性作用与`animationImages`属性相同，但在`UIImageView`处于高亮状态时生效。\n\
  - `animationDuration`：此值作为`NSTimeInterval`创建，表示`animationImages`中所有图像完成一个循环所需的总时间。如果未指定，该值默认为图像数量乘以\
  \ 1/30 秒。\n- `animationRepeatCount`：简而言之，此值指定图像循环的重复次数。如果设置为 0（默认值），动画将无限重复。\n\n\
  配置好`UIImageView`的动画属性后，你可以使用`-startAnimating`、`-stopAnimating`和`isAnimating`方法来管理实际的动画。\n\
  \n在处理`UIImageView`时，需要牢记的最重要属性之一是`contentMode`属性。虽然这实际上是继承自`UIView`，但在处理图像时它变得非常重要。`contentMode`属性主要指定视图如何响应其内容宽高比与视图本身不匹配的情况，例如一个方形`UIImageView`显示一张矩形图像。此属性有多种选项，苹果文档中都有完整记录，但大多数时候你可能倾向于选择`UIViewContentModeScaleAspectFill`。此选项可能会裁剪掉图像的一部分，但会确保填满展示视图的整个空间，从而提高设计质量。如果由于任何原因，你要求图像不被裁剪并且更希望保留空白区域，可以使用`UIViewContentModeScaleAspectFit`值。\n\
  \n\n\n### UITextView\n\n`UITextView`类与`UITextField`非常相似，都允许用户输入文本。然而，它的视觉设计允许容纳更大量的文本，如图\
  \ 3-16 所示。\n\n![Image](img/9781430240051_Fig03-16.jpg)\n\n**图 3-16.** *在 XIB 中使用`UITextView`*\n\
  \n`UITextView`的大多数属性与`UITextField`非常相似，例如`text`、`font`和`textColor`。其他用于配置文本的有用属性包括`editable`（指定文本是否可编辑）以及`textAlignment`。你甚至可以使用`dataDetectorTypes`值来指定文本视图可以检测的数据类型，例如电话号码或电子邮件地址。\n\
  \n与`UITextField`一样，`UITextView`有一个`delegate`属性，该属性根据`UITextView`中发生的事件接收多个操作。此属性必须遵循`UITextViewDelegate`协议。\n\
  \n`UITextViewDelegate`中的大多数方法与之前讨论的`UITextFieldDelegate`协议中的方法完全相同。然而，`UITextViewDelegate`没有任何方法指示何时按下回车键，这使得使用`-resignFirstResponder`方法判断何时应该关闭键盘变得更加困难。相反，你可以实现`-textView:shouldChangeTextInRange:replacementText:`方法。\n\
  \n```\n- (BOOL)textView:(UITextView *)textView shouldChangeTextInRange:(NSRange)range\n\
  \ replacementText:(NSString *)text\n{\n    if ([text isEqualToString:@\"\\n\"])\n\
  \    {\n        [textView resignFirstResponder];\n        return FALSE;\n    }\n\
  \    return TRUE;\n}\n```\n\n对于`UITextView`，按下回车键会导致文本“\\n”被添加到当前文本中，因此你可以简单地让这个方法等待这样的输入，并相应地关闭键盘。在你的应用程序中，你可能希望允许用户在文本视图中换行，因此这个实现可能不是最理想的。\n\
  \n在自定义方面，你可以通过上述属性轻松自定义文本视图的文本属性，但你对视图本身也有一定程度的自定义能力。你可以使用`inputView`属性以及`inputAccessoryView`来访问实际的输入视图。当`UITextView`正在编辑时，如果此附件视图不为`nil`，它将显示在键盘上方，允许你在需要时将自定义工具栏附加到键盘上。\n\
  \n任何类也可以通过成为以下任一通知的观察者，来接收关于`UITextView`状态的通知：\n\n- `UITextViewTextDidBeginEditingNotification`\n\
  - `UITextViewTextDidChangeNotification`\n- `UITextViewTextDidEndEditingNotification`\n\
  \n与`UITextField`一样，`UITextView`最重要的设计方面之一是，要记住在任意给定时刻，一个巨大的键盘可能会占据屏幕的一半。作为开发者，你应该确保你的`UITextView`要么位于不会被键盘遮挡的区域，要么在键盘出现时移动到这样的区域。关于如何接收键盘出现和消失的通知的更多解释，请参见前面的“UITextField”部分。\n\
  \n### UIScrollView\n\n`UIScrollView`类对于处理无法放入单个视图但都属于同一页的大量内容非常有用。这可以是待显示的图片列表，或者只是一个你想要能够缩放和滚动的非常大的图像。\n\
  \n`UIScrollView`的内容被定义为其内部的所有子视图，因此你可以简单地使用`-addSubview:`方法向`UIScrollView`添加内容。\n\
  \n任何时候使用`UIScrollView`，都必须设置`contentSize`属性。这向`UIScrollView`指定了在任何方向上允许滚动多少。通常，这将是你内容的大小，所以如果你的内容是一个尺寸为\
  \ 800x640 的`UIImage`的`UIImageView`，你会希望内容大小相同。或者，如果你不希望`UIScrollView`能够在一个方向上滚动，你可以使该方向的`contentSize`更小。\n\
  \n你还可以调整`contentInset`和`contentOffset`，以进一步自定义内容的显示。后者甚至可以使用`-setContentOffset:animated:`方法进行动画。\n\
  \n`UIScrollView`的滚动属性在 XIB 文件中和通过编程方式都非常容易配置。其中最重要的属性如下：\n\n- `scrollEnabled`：指定`UIScrollView`是否可以滚动；你可以使用此属性来“锁定”视图。\n\
  - `directionalLockEnabled`：此属性如果启用，会限制`UIScrollView`在任意给定时间内只能在一个方向上滚动（垂直或水平）。\n\
  - `scrollsToTop`：启用或禁用用户点击屏幕顶部状态栏以将`UIScrollView`滚动到其内容顶部的功能。\n- `pagingEnabled`：如果启用此属性，滚动会吸附到视图边界的倍数位置，而不是允许在内容中持续滚动。结合`UIPageController`使用，对于使用`UIScrollView`显示多页内容非常有用。\n\
  \n`UIScrollView`最有用的方法之一是`-scrollRectToVisible:animated:`，它允许你根据应用程序的需要，滚动到内容的任意特定区域。\n\
  \n在许多其他属性中，也存在一些用于管理当用户将滚动视图轻拂过其边界时“弹跳”效果的属性，例如`bounces`、`alwaysBounceVertical`和`alwaysBounceHorizontal`属性。\n\
  \n开发者还可以控制“滚动指示器”，即底部或侧面的细条，显示视图滚动了多远。你可以使用`indicatorStyle`、`scrollIndicatorInsets`、`showsHorizontalScrollIndicator`和`showsVerticalScrollIndicator`属性来调整它们。你甚至可以使用`-flashScrollIndicators`方法手动闪烁指示器。\n\
  \n除了滚动和平移之外，`UIScrollView`还内置了缩放功能。为了实现此功能，你只需将`maximumZoomScale`和/或`minimumZoomScale`属性更改为\
  \ 1.0 以外的值。\n\n`UIScrollView`也有一个`delegate`属性，用于响应在`UIScrollView`内发生的各种事件。这个对象必须遵循`UIScrollViewDelegate`协议，它有多种方法来响应任何滚动、轻拂或缩放事件的开始和结束。有关所有这些方法的详细信息，请参考\
  \ Apple 文档。\n\n### UIWebView\n\n`UIWebView`类是一个用于“包装”某种 Web 应用程序的应用程序中的数据展示类。\n\n\
  你可以非常轻松地在视图控制器的 XIB 文件中创建一个`UIWebView`，这也允许你在属性检查器中轻松编辑`UIWebView`的大部分属性。这些属性，例如`dataDetectorTypes`（类似于`UITextView`中使用的那些），也可以通过编程方式访问。\n\
  \n`UIWebView`可以通过多种方式从网络加载数据，具体取决于你需要管理的内容类型。内容的加载通过多种方法管理，包括`-loadData:MIMEType:textEncodingName:baseURL:`、`-loadHTMLString:baseURL:`和`-loadRequest:`。其中最简单的`-loadRequest:`方法接受一个`NSURLRequest`类型的参数。这个类本质上是一个包装了`NSURL`的类，并带有专门用于访问在线内容的额外属性，例如`timeoutInterval`或`cachePolicy`。一旦你的内容开始加载，你也可以根据需要调用`-stopLoading`或`-reload`方法。\n\
  \n\n\n#### `MKMapView`\n\n`MKMapView`是一个数据展示类，专门与 MapKit 框架配合使用，向用户呈现地图。有关此框架的更多信息（包括该视图的详细用法），请参阅第\
  \ 5 章“MapKit 食谱”。\n\n#### `UITableView`\n\n`UITableView`是一个极其强大的数据展示类，其设计理念是基于相似格式呈现大量数据。我们在第\
  \ 9 章“`UITableView`食谱”中详细介绍了该类的通用用法，并全面阐述了开发基于表格的应用程序的细微差别。\n\n#### `UIPickerView`\n\
  \n`UIPickerView`与`UITableView`类似，但没那么复杂且可定制性稍低。它允许向用户展示多种格式相似的选项，并让用户通过旋转选择特定选项，如图\
  \ 3–17 所示。\n\n![Image](img/9781430240051_Fig03-17.jpg)\n\n**图 3–17.** 默认的`UIPickerView`\n\
  \n`UIPickerView`的设置方式与`UITableView`类似，都通过使用`dataSource`属性和`delegate`属性来实现。这些属性必须分别遵循`UIPickerViewDataSource`和`UIPickerViewDelegate`协议，并且通常设置为将呈现该`UIPickerView`的`UIViewController`。\n\
  \n`UIPickerViewDataSource`协议仅要求实现两个方法，它们根据“行”和“列”来定义`UIPickerView`的物理配置。列是视图被分成的垂直部分，允许你同时轻松选择多个值。行包含每个列中用户可选择的具体选项。\n\
  \n你可以通过数据源方法`-numberOfComponentsInPickerView:`和`-pickerView:numberOfRowsInComponent:`来配置列的数量以及每个列的行数。\n\
  \n`UIPickerView`的视觉设置通过多个委托方法处理：\n\n*   `pickerView:rowHeightForComponent:`：指定给定列中每行的高度。\n\
  *   `pickerView:widthForComponent:`：指定每个列的宽度；列不会自动适应`UIPickerView`的宽度，因此请确保所有列的总宽度不超过`UIPickerView`的宽度。\n\
  *   `pickerView:titleForRow:forComponent:`：使用此方法为每行提供要显示的简单文本。\n*   `pickerView:viewForRow:forComponent:reusingView:`：如果你希望在某行中显示不止简单文本，可以使用此方法。尽量利用`reusingView:`参数以提高性能。\n\
  *   `pickerView:didSelectRow:inComponent:`：每次列停止旋转并落在某一行时，都会调用此方法，使你的应用程序能在其他位置正确更新。\n\
  \n以下是一个示例配置：\n\n```\n#pragma mark - Data Source methods\n-(NSInteger)numberOfComponentsInPickerView:(UIPickerView\
  \ *)pickerView\n{\nreturn 3;\n}\n-(NSInteger)pickerView:(UIPickerView *)pickerView\n\
  numberOfRowsInComponent:(NSInteger)component\n{\nreturn 3;\n}\n#pragma mark - Delegate\
  \ methods\n-(CGFloat)pickerView:(UIPickerView *)pickerView\nrowHeightForComponent:(NSInteger)component\n\
  {\nreturn 30;\n}\n-(CGFloat)pickerView:(UIPickerView *)pickerView widthForComponent:(NSInteger)component\n\
  {\nreturn 100;\n}\n-(void)pickerView:(UIPickerView *)pickerView didSelectRow:(NSInteger)row\
  \ inComponent:(NSInteger)component\n{\nNSLog(@\"Selected. Row:%i, Component:%i\"\
  , row, component);\n}\n-(NSString *)pickerView:(UIPickerView *)pickerView titleForRow:(NSInteger)row\
  \ forComponent:(NSInteger)component\n{\nreturn [NSString stringWithFormat:@\"R:%i,\
  \ C:%i\", row, component];\n}\n```\n\n这将配置图 3–18 所示的`UIPickerView`，并记录每个列中所选的行。\n\
  \n![Image](img/9781430240051_Fig03-18.jpg)\n\n**图 3–18.** 按行和列配置的`UIPickerView`\n\
  \n一旦`UIPickerView`配置完成，你可以使用`-selectedRowInComponent:`方法访问每个列中选中的行。\n\n此外，你还可以通过`showsSelectionIndicator`属性来切换表示所选行的中心栏的显示与隐藏。\n\
  \n#### `UIDatePickerView`\n\n`UIDatePickerView`是`UIPickerView`的一个特化版本，专门用于处理时间、日期或倒计时的选择，如图\
  \ 3–19 所示。该类实际上并非`UIPickerView`的子类，而是将一个定制化的`UIPickerView`作为其子视图。\n\n![Image](img/9781430240051_Fig03-19.jpg)\n\
  \n**图 3–19.** 特化的`UIDatePickerView`\n\n此类有一个名为`datePickerMode`的属性，允许你从多个代表不同选择器类型的值中进行选择，以适配你的具体场景。\n\
  \n*   `UIDatePickerModeTime`：选择时间\n*   `UIDatePickerModeDate`：选择日期\n*   `UIDatePickerModeDateAndTime`：在一个选择器中同时选择日期和时间\n\
  *   `UIDatePickerModeCountDownTimer`：选择要设置的倒计时定时器\n\n为了获知选中行的变化，请将某个方法添加为`UIDatePickerView`的动作，以便在`UIControlEventValueChanged`事件发生时被调用，这与前面讨论的多个元素类似。\n\
  \n你可以通过`maximumDate`、`minimumDate`、`minuteInterval`和`countDownDuration`等属性来配置`UIDatePickerView`的不同模式。\n\
  \n如果你希望以编程方式更改`UIDatePickerView`显示的日期，可以设置`date`属性，但这不会产生动画效果。如果`UIPickerView`是可见的，建议使用`-setDate:animated:`方法来进行此类更改。\n\
  \n\n\n#### 手势识别器\n\n在 iOS 中，你可以通过向 `UIView` 的实例或子类添加“手势识别器”来增强应用的功能。“手势”指的是用户驱动的基于触摸的事件，例如点击、滑动或捏合。这些元素可以在应用中执行操作，从而扩展常规功能。虽然你可以创建自己的\
  \ `UIGestureRecognizer` 子类，但本文将重点介绍 iOS 5.0 中已集成的手势识别器。\n\n使用 `UIGestureRecognizer`\
  \ 时，务必记住大部分用户不会主动寻找你能实现的手势。因此，你应该仅在为了加快可经由其他途径执行的任务时，才实现一个 `UIGestureRecognizer`。除非明确告知用户，否则不应将关键功能构建在其中。\n\
  \n`UIGestureRecognizer` 类本身是一个抽象类，定义了多个子类的行为，每个子类代表不同的手势。但无论使用哪个子类，手势识别器都是通过 `-addGestureRecognizer:`\
  \ 方法添加到任意 `UIView` 上的。例如，要将一个名为 `tapGesture` 的 `UITapGestureRecognizer` 实例添加到整个视图控制器的视图上，你可以编写如下代码：\n\
  \n`[self.view addGestureRecognizer:tapGesture];`\n\n**提示：** `UIGestureRecognizer`\
  \ 的任何子类均可被添加到 `UIView` 的任意实例或子类上，因此你可以轻松地为几乎任何元素构建自定义手势功能，从而打造出非常灵活的应用。\n\n某些元素（例如\
  \ `UILabel`）不会响应任何 `UIGestureRecognizer`，除非其 `userInteractionEnabled` 属性被设置为 `YES`。\n\
  \n`UIGestureRecognizer` 的 `state` 属性允许你评估任何特定子类在手势被识别时的当前状态。它拥有多个不同的可能值，每个值代表手势识别过程中的一个阶段：\n\
  \n1. `UIGestureRecognizerStatePossible`：表示某个手势可能正在执行中，但尚未满足其识别条件。\n2. `UIGestureRecognizerStateBegan`：表示一个持续手势已被识别并正在进行。\n\
  3. `UIGestureRecognizerStateChanged`：表示一个已开始的持续手势发生了变化。\n4. `UIGestureRecognizerStateEnded`：表示手势已完成。\n\
  5. `UIGestureRecognizerStateCancelled`：手势识别器接收到触摸事件以取消一个持续手势。\n6. `UIGestureRecognizerStateRecognized`：等同于\
  \ `UIGestureRecognizerStateEnded`。\n\n特别是在处理持续手势时，你可能会遇到多个状态导致 `UIGestureRecognizer`\
  \ 执行其动作的问题，从而不必要地重复调用某个方法。通过检查 `state` 属性中的特定状态，你可以避免这种情况。\n\n理想情况下，你可以设置单个方法供所有\
  \ `UIGestureRecognizer` 子类的实例调用，并在方法内部简单地区分它们。你可以利用 `+isKindOfClass` 方法、每个子类的多个属性，甚至手势被识别的视图，来识别多个\
  \ `UIGestureRecognizer` 对象中哪一个执行了你的操作。该操作将包含如下处理器：\n\n`-(void)handleGesture:(UIGestureRecognizer\
  \ *)gestureRecognizer;`\n\n另一个所有 `UIGestureRecognizer` 子类继承的有用功能是，能够通过 `-locationInView:`\
  \ 和 `-locationOfTouch:inView:` 方法确定手势在视图中的确切位置。通过使用这些值，你可以根据触摸在单个视图内的具体位置轻松调整应用的行为。其中一个示例是在用户触摸点进行绘制，从而让用户本质上能在屏幕上涂鸦。\n\
  \n所有 `UIGestureRecognizer` 的子类都继承了 `delegate` 属性，该属性可以被设置为包含该识别器视图的视图控制器。这个属性遵循\
  \ `UIGestureRecognizerDelegate` 协议，允许视图控制器在响应手势时获得额外的控制权。\n\n多个 `UIGestureRecognizer`\
  \ 的子类支持需要多点触摸才能被识别的手势。在处理这些手势时，务必记住每台设备能处理的最大触摸数量。在编写本文时，iPhone 最多可处理五根手指的触摸，而 iPad\
  \ 最多可处理十一根。\n\n## UITapGestureRecognizer\n\n正如你所猜测的，`UITapGestureRecognizer` 能识别用户在其分配视图上的点击操作。\n\
  \n你可以通过调整 `numberOfTapsRequired` 和 `numberOfTouchesRequired` 来创建非常具体的手势功能。例如，将两个属性都设置为\
  \ 2，你可以专门检测用户用两根手指双击屏幕的事件。配置方式如下：\n\n```\nUITapGestureRecognizer *tapGesture = [[UITapGestureRecognizer\
  \ alloc] initWithTarget:self\naction:@selector(handleGesture:)];\n\ntapGesture.numberOfTapsRequired\
  \ = 2;\ntapGesture.numberOfTouchesRequired = 2;\n[self.view addGestureRecognizer:tapGesture];\n\
  ```\n\n实现 `handleGesture:` 时，你应确保针对任何 `UITapGestureRecognizer` 检测 `UIGestureRecognizerStateEnded`\
  \ 状态。\n\n## UISwipeGestureRecognizer\n\n`UISwipeGestureRecognizer` 能识别用户用一根或多根手指在屏幕上滑动的操作。滑动是一个离散手势，因此其动作只会被调用一次。\n\
  \n`UISwipeGestureRecognizer` 类具有 `direction` 属性，该属性指定了滑动必须发生的方向才能被识别。可能的值包括 `UISwipeGestureRecognizerDirectionRight`、`UISwipeGestureRecognizerDirectionLeft`、`UISwipeGestureRecognizerDirectionUp`\
  \ 和 `UISwipeGestureRecognizerDirectionDown`。\n\n该类还有一个 `numberOfTouchesRequired`\
  \ 属性，允许你在应用中指定多点触摸的滑动手势。\n\n## UIPanGestureRecognizer\n\n`UIPanGestureRecognizer`\
  \ 类能识别“平移”手势，这是一种持续手势。因此，你通常会在响应 `UIGestureRecognizerStateChanged` 或 `UIGestureRecognizerStateEnded`\
  \ 状态时通过它们执行操作。\n\n平移手势可以通过设置最小和最大触摸数量来配置，从而允许你创建一系列可接受的触摸数值。使用 `maximumNumberOfTouches`\
  \ 和 `minimumNumberOfTouches` 属性来实现此功能。\n\n通过 `UIPanGestureRecognizer`，你可以使用 `-translationInView:`\
  \ 和 `-velocityInView:` 方法获取移动的距离以及手势的速度。\n\n在大多数使用 `UIPanGestureRecognizer` 的情况下，获取并使用平移手势的平移量和/或速度值后，将其重置是很重要的。如果不重置，这些值会累积，导致数值迅速变得异常巨大。\n\
  \n以下是一个示例实现，摘自你的 `-handleGesture:` 方法，用于拖放识别到平移手势的视图。\n\n```\nif ([gestureRecognizer\
  \ isKindOfClass:[UIPanGestureRecognizer class]])\n    {\nUIPanGestureRecognizer\
  \ *pan = (UIPanGestureRecognizer *)gestureRecognizer;\nif (pan.state == UIGestureRecognizerStateChanged\
  \ || pan.state == UIGestureRecognizerStateEnded)\n        {\nCGPoint movement =\
  \ [pan translationInView:pan.view];\n            [pan.view setCenter:CGPointMake(pan.view.center.x\
  \ + movement.x, pan.view.center.y + movement.y)];\n            [pan setTranslation:CGPointZero\
  \ inView:pan.view];\n        }\n    }\n```\n\n如果在移动视图后没有将平移量重置为零，你的平移值会迅速累积，猛地把视图扔出屏幕。\n\
  \n如果使用 `CGPointZero` 值时遇到链接器错误，请将 `CoreGraphics.framework` 库添加到你的项目中。\n\n\n\n"
- '# UILongPressGestureRecognizer


  `UILongPressGestureRecognizer`用于识别“长按”手势，即用户将一根或多根手指保持在相同位置超过正常轻触时长的操作。


  与之前介绍的几种手势识别器类似，你可以通过`numberOfTapsRequired`和`numberOfTouchesRequired`属性指定所需的点击次数以及使用的手指/触摸数量。


  这个`UIGestureRecognizer`的子类拥有额外属性来配置“长按”的性质。`minimumPressDuration`指定触摸必须保持多长时间，识别器的`state`才会转为`UIGestureRecognizerStateBegan`。`allowableMovement`属性接受一个浮点数，指定用户在长按手势失败前可以有多大的“活动余地”。该值应设置得足够大，使正常人能轻松保持触摸，但又不能大到允许可能跨越多个元素的显著移动。


  `UILongPressGestureRecognizer`会在手势开始和结束时触发其动作，这可能导致不期望的行为。通常，你只需要响应`UIGestureRecognizerStateBegan`状态，以便用户能轻松获知手势已被识别。


  '
- '# UIPinchGestureRecognizer


  这个`UIGestureRecognizer`的子类用于识别捏合手势，即用户将两个触摸点相互靠近或远离。此类是连续型的，意味着只要捏合动作持续，它就保持活跃状态，但其值会不断变化。


  你可以从每个捏合手势中访问两个属性：


  1.  `scale`：由捏合产生的缩放因子

  2.  `velocity`：给定捏合手势的速度


  根据你的用途，你需要关注`state`的不同值。


  '
- "# UIRotationGestureRecognizer\n\n此类识别一种相对不常见的手势：旋转。该手势由用户以圆周运动移动两根手指构成。\n\n关于所执行手势的信息可以通过`rotation`和`velocity`属性访问，与`UIPinchGestureRecognizer`类似。\n\
  \n### 视图控制器\n\n在设计 iOS 应用时，你通常会根据应用中数据的流向，以相当一致的方式组织视图控制器。Cocoa Touch 内置了多个`UIViewController`类的特殊子类，允许你根据应用类型轻松组织、定制和呈现数据。通过组合这些控制器，你可以为应用创建复杂的组织方案，以最优化的方式向用户展示信息。\n\
  \n### UINavigationController\n\n`UINavigationController`无疑是工作流设计和视图呈现中最常用的类之一。它不仅有助于组织从一个视图到另一个视图的过渡，还在每个视图顶部提供了一个高度可定制的工具栏，以帮助呈现和管理应用的不同部分。这些类随后可以被放入其他组织控制器中，允许你创建从应用一个层级到另一个层级的嵌套信息流。\n\
  \n`UINavigationController`以一个“根视图控制器”开始，如果没有其他视图控制器被添加，则此视图控制器将是可见的。然后，其他视图控制器可以被“推入”控制器堆栈，或通过各种方法被“弹出”。`UINavigationController`堆栈中的视图从上到下显示，因此推入一个新的视图控制器会指示`UINavigationController`显示它。同样，当弹出当前视图控制器时，它会从视图中移除，露出堆栈中的下一个控制器。\n\
  \n创建`UINavigationController`就像创建其他任何类一样简单。你可以使用一个便捷的指定初始化方法`-initWithRootViewController:`来设置根视图，或者可以在分配后直接调用`-init`方法，然后使用`-pushViewController:animated:`方法推入根视图。\n\
  \nFigure 3–20 展示了一个配置了多个元素的`UINavigationController`。\n\n![Image](img/9781430240051_Fig03-20.jpg)\n\
  \n**Figure 3–20.** 一个`UINavigationController`，带有左右按钮和一个工具栏\n\n在`UINavigationController`中呈现的此视图顶部边缘，设有导航栏。此区域旨在通过三个特性引导用户在整个应用中进行导航：\n\
  \n- **标题**：导航栏中央显示所呈现视图控制器的标题。这可以通过在每个`-viewDidLoad`方法中更改继承自`UIViewController`类的`title`属性轻松设置（例如，`self.title\
  \ = @\"More Info\"`）。你也可以创建自定义标题视图。\n- **返回按钮**：如果当前未显示根视图控制器，导航栏左侧会自动包含一个带箭头的按钮，默认情况下会显示先前视图控制器的标题，以帮助用户导航返回。\n\
  - **右侧栏项目**：导航栏右侧默认是空的，但可以使用`rightBarButtonItem`或`rightBarButtonItems`属性进行配置（后者用于添加多个项目）。在\
  \ iPhone 上，此位置通常不会放置超过一两个小按钮，但 iPad 有空间容纳更多数量。此位置的按钮通常提供操作或处理当前视图控制器中显示信息的选项，例如`UITableView`的编辑按钮或打开打印界面的按钮。上述属性通过导航项访问，即`self.navigationItem.rightBarButtonItem`。\n\
  \nFigure 3–20 中视图的底部边缘包含导航工具栏，该工具栏内置于`UINavigationController`中。此工具栏默认是隐藏的，但可以通过将`UINavigationController`上的`toolbarHidden`属性设置为`NO`，或使用`-setToolbarHidden:animated:`方法（以动画方式改变）轻松显示。然而，执行此操作时需谨慎，因为工具栏的状态（无论是隐藏还是显示）在视图控制器的推入和弹出过程中保持不变，直到再次设置该属性。这意味着你可能需要在每个视图控制器中使用`-viewWillAppear:animated:`和`-viewWillDisappear:animated:`方法来适当地显示或隐藏工具栏。\n\
  \n`UIToolbar`的内容不是由`UINavigationController`设置的，而是由堆栈顶部的`UIViewController`设置的。通过在`-viewDidLoad`方法中为每个视图控制器调用`-setToolbarItems:`，你可以轻松地实现每个视图控制器中配置不同的工具栏。以下示例取自一个视图控制器的`-viewDidLoad`，展示了如何轻松构建单个控制器的工具栏。\n\
  \n```\n[self setToolbarItems:[NSArray arrayWithObject:[[UIBarButtonItem alloc]\n\
  initWithTitle:@\"Toolbar Button \"style:UIBarButtonItemStyleBordered target:nil\n\
  action:NULL]] animated:NO];\n```\n\n只需将`target`和`action`改为实际的值和选择器，你就可以轻松地在工具栏按钮中实现功能。\n\
  \n`UINavigationController`还有一个遵循`UINavigationControllerDelegate`协议的委托属性。利用此属性可以获得对视图控制器被推入或弹出堆栈前后执行操作的额外控制。\n\
  \n\n\n#### `UITabBarController`\n\n另一个特殊视图控制器，其使用频率几乎与`UINavigationController`一样普遍，那就是`UITabBarController`。该类专门设计用于处理包含多个分区或“标签页”的应用程序，每个标签页都有自己的信息流。Twitter\
  \ 应用程序是这种实现的一个绝佳示例。每个标签页都可以包含其他控制器，包括`UINavigationController`对象，从而允许构建更复杂的视图控制器网络。然而，`UITabBarController`不应被放置在任何其他控制器内部，因为\
  \ iOS API 不支持这样做。\n\n在`UITabBarController`中，每个视图控制器都有一个标签页，默认情况下，该标签页会填充视图控制器的标题，并且没有图像。创建一个新的`UITabBarItem`实例并将其设置为视图控制器的`tabBarItem`属性将覆盖此默认行为，允许您添加图像并稍微自定义标签页。\n\
  \n每个视图控制器的`-viewDidLoad`方法实际上直到包含该视图控制器的特定标签页被选中时才会被调用，这意味着在此方法中进行的任何配置（例如设置标题）都不会立即生效，从而导致标签页在选中之前显示为无标签状态。当声明视图控制器时设置其标题可以轻松解决此问题，但将标题配置添加到视图控制器的指定初始化方法中也同样有效。\n\
  \n图 3–21 展示了一个简单的`UITabBarController`的屏幕截图，该控制器包含三个标签页，每个标签页都配置了标题和基于系统的图像，以及用于创建它的示例代码。\n\
  \n![Image](img/9781430240051_Fig03-21.jpg)\n\n**Figure 3–21.** *一个配置了三个标签页的`UITabBarController`*\n\
  \n这使用了以下配置代码，取自`-application:didFinishLaunchingWithOptions:`方法，假设已经创建了两个`UIViewController`子类（`MainViewController`和`SecondViewController`）并将其导入到应用程序委托文件中。\n\
  \n```\nself.viewController = [[MainViewController alloc] initWithNibName:@\"MainViewController\"\
  \nbundle:nil];\nself.viewController.title = @\"First\";\nself.viewController.tabBarItem\
  \ = [[UITabBarItem alloc]\ninitWithTabBarSystemItem:UITabBarSystemItemFeatured tag:0];\n\
  \n__strong SecondViewController *second = [[SecondViewController alloc] init];\n\
  second.title = @\"Second\";\nsecond.tabBarItem = [[UITabBarItem alloc]\ninitWithTabBarSystemItem:UITabBarSystemItemDownloads\
  \ tag:1];\n\n__strong SecondViewController *third = [[SecondViewController alloc]\
  \ init];\nthird.title = @\"third\";\nthird.tabBarItem = [[UITabBarItem alloc]\n\
  initWithTabBarSystemItem:UITabBarSystemItemRecents tag:2];\n\n__strong UITabBarController\
  \ *tabcon = [[UITabBarController alloc] init];\n[tabcon setViewControllers:[NSArray\
  \ arrayWithObjects:self.viewController, second, third,\nnil]];\n\nself.window.rootViewController\
  \ = tabcon;\n```\n\n#### `UISplitViewController`\n\n`UISplitViewController`是另一个用于帮助组织其他视图控制器的元素。但是，此类仅在进行\
  \ iPad 开发时可用，因为它需要大量的屏幕空间才能发挥效用。它包含两个`UIViewController`：一个“主面板”和一个“详情面板”。主面板显示在屏幕左侧较窄的视图中，剩余空间由详情面板占据，如图\
  \ 3–22 所示。通常，这种设置用于从主面板中选择一个项目，然后在详情面板中显示该项目的详细信息。\n\n![Image](img/9781430240051_Fig03-22.jpg)\n\
  \n**Figure 3–22.** *适用于 iPad 的`UISplitViewController`*\n\n图 3–22 展示了一个基于`UISplitViewController`的预配置应用程序，该程序是使用“Master-Detail\
  \ Application”模板创建的。如果您希望使用此控制器构建应用程序，此模板可以帮助您快速上手。此选项可以在创建新项目时出现的第一个菜单中找到，如图 3–23\
  \ 所示。与 Empty Application 模板一样，它也提供了包含 Core Data 框架和自动设置的选项。\n\n![Image](img/9781430240051_Fig03-23.jpg)\n\
  \n**Figure 3–23.** *使用 Master-Detail Application 模板创建预配置的`UISplitViewController`*\n\
  \n`UISplitViewController`类有两个属性：`viewControllers`和`delegate`。前者是一个`NSArray`，必须恰好包含两个控制器：首先是主面板控制器，然后是详情面板控制器。\n\
  \n默认情况下，如果 iPad 处于竖屏方向，主面板将不会显示。您可以通过`UISplitViewControllerDelegate`协议方法`-splitViewController:shouldHideViewController:inOrientation:`来调整此行为。通常，`UISplitViewController`的`delegate`属性会被设置为您的详情面板视图控制器，因为它包含应用程序的相关信息。\n\
  \n在使用`UISplitViewController`时，请务必确保视图的所有部分在其相关操作和控制器方面都清晰明了。避免在两个面板中都放置工具栏，以免它们看起来是相连的。同时，请确保您在主面板中所做的任何选择都可见地持续存在，以便用户始终能够判断当前视图显示的是哪个项目。\n\
  \n\n\n### UIPopoverController\n\n`UIPopoverController`类是一个仅适用于 iPad 的 UI 元素。它用于在当前视图之上呈现信息，通常是为了向用户提供如何继续操作的选项。`UIPopoverController`的实现非常方便，因为其位置可以轻松指定到任意位置，从而改善应用的视觉流程。\n\
  \n图 3–24 来自第 13 章（数据传输配方），配方 13-2，涉及邮件和打印材料，其中你从一个`UIBarButtonItem`呈现了一个`UIPopoverController`，用于选择要显示的已保存图像。\n\
  \n![图片](img/9781430240051_Fig03-24.jpg)\n\n**图 3–24** *来自第 13 章（数据传输配方）的`UIPopoverController`示例*\n\
  \n`UIPopoverController`可以轻松地通过指定初始化方法`-initWithContentViewController:`来包含内容视图，并且可以通过`-setPopoverContentSize:animated:`来配置内容大小。如果你希望在`UIPopoverController`当前可见时更改其内容视图，可以使用`-setContentViewController:animated:`方法。\n\
  \n`UIPopoverController`类有一个包含`-popoverControllerShouldDismissPopover:`和`-popoverControllerDidDismissPopover:`方法的`delegate`协议。这些方法可以轻松用于确保在弹出视图被关闭之前保存所有用户数据。\n\
  \n在呈现弹出视图时，你可以使用`-presentPopoverFromRect:inView:permittedArrowDirections:animated:`方法或`-presentPopoverFromBarButtonItem:permittedArrowDirections:animated:`方法。前者通常用于从主视图中的任意元素呈现，而后者用于从工具栏中的任意项目呈现弹出视图。在正确的情境下使用这些方法将显著提高应用的视觉组织质量。\n\
  \n在设计使用`UIPopoverController`的 iPad 应用时，始终要考虑视图的整体视觉质量。确保你的弹出视图不会覆盖整个屏幕，并且其箭头指向触发它出现的元素。\n\
  \n通常，你应避免在`UIPopoverController`的内容视图中放置任何“关闭”按钮，因为用户只需点击弹出视图外部即可将其关闭。\n\n如果你可以选择从单个视图中显示多个弹出控制器，请尽量将应用设计为打开一个弹出视图时关闭其他任何打开的弹出视图，以避免遮挡整个视图。\n\
  \n### UIPageViewController\n\n`UIPageViewController`是 iOS 5.0 中新增的控制器，专门用于组织处理多个“页面”内容且在相同信息层级上排列的应用。\n\
  \n`UIPageViewController`的实例通过`-setViewControllers:direction:animated:completion:`来设置其内容视图。\n\
  \n`spineLocation`属性用于自定义页面翻页的视觉动画效果。你可以将应用想象成一本书，`spineLocation`指的是翻页的枢轴点。\n\n该类还有两个属性，`delegate`和`dataSource`，用于配置页面视图控制器。`dataSource`遵循`UIPageViewControllerDataSource`协议，允许你通过`-pageViewController:viewControllerBeforeViewController:`和`-pageViewController:viewControllerAfterViewController:`方法特殊配置视图控制器的顺序。`delegate`属性则更多涉及控制器的视觉设置，通过`UIPageViewControllerDelegate`协议方法`-pageViewController:spineLocationForInterfaceOrientation:`实现。\n\
  \n#### 模态控制器\n\n模态视图控制器是以“模态”方式呈现的任何视图控制器，意味着它要么显示在呈现它的控制器之上，要么取而代之。这些可以是普通的`UIViewController`子类，也可以是特定的视图元素。模态视图控制器的一般用途是向用户提供或请求特定信息，因此你通常不希望模态呈现实现应用主要功能的控制器。\n\
  \n模态视图控制器由其他视图控制器通过`-presentModalViewController:animated:`方法呈现。更改从`UIViewController`继承的`modalTransitionStyle`属性可以设置动画样式。该属性接受以下可能的值，其名称本身就能很好地描述其样式：\n\
  \n* `UIModalTransitionStyleCoverVertical`\n* `UIModalTransitionStyleFlipHorizontal`\n\
  * `UIModalTransitionStyleCrossDissolve`\n* `UIModalTransitionStylePartialCurl`\n\
  \n这些选项之间的差异通常只是外观上的，尤其是在 iPhone 上实现模态呈现时，尽管`UIModalTransitionStylePartialCurl`样式不会覆盖整个视图，而只会在模态视图控制器中显示底部区域。这对于提供少量信息（例如你的开发者信息）而不必填充整个视图非常有用。\n\
  \n如果你使用`UIModalTransitionStylePartialCurl`过渡样式，请避免在模态控制器中放置任何`UITextField`或`UITextView`元素，因为键盘最终会覆盖整个模态控制器，使用户无法看到他们正在输入的内容。\n\
  \n在 iPhone 上开发时，模态视图控制器始终需要占据整个屏幕。然而，在 iPad 上，你可以自定义控制器在视图中的外观。`modalPresentationStyle`属性定义了视图控制器在\
  \ iPad 上的呈现方式，接受以下可能的值：\n\n* `UIModalPresentationFullScreen`：模态控制器覆盖整个设备屏幕\n* `UIModalPresentationPageSheet`：控制器宽度设置为设备的竖屏宽度，呈现控制器在两侧可见；背景随后变暗以将焦点带到呈现的控制器上。\n\
  * `UIModalPresentationFormSheet`：模态控制器在 iPad 屏幕上居中，显示尺寸小于呈现控制器；如果键盘可见，视图会上移以保持可见，所有未覆盖区域变暗。\n\
  * `UIModalPresentationCurrentContext`：视图完全按照其呈现控制器的方式呈现。这在处理分屏控制器或其他不填充整个屏幕的视图时特别有用。\n\
  \n每当实现模态视图控制器时，你需要能够以编程方式将其关闭。关闭可以通过从模态控制器或呈现控制器调用`-dismissModalViewControllerAnimated:`方法来实现。如果你希望从呈现控制器中关闭视图，则需要为模态控制器定义一个委托方法，以便在准备好关闭时调用它。此方法还可用于将从模态控制器收集的信息传递回其父控制器。\n\
  \n### 临时用户界面元素\n\n许多应用在处理需要用户输入的情境时，这种输入只在应用的某个特定点需要。对于这些情况，将元素直接作为永久元素嵌入视图中会浪费宝贵的空间。相反，你可以使用某些元素，这些元素在需要输入或输出时显示，并在之后被关闭。\n\
  \n\n\n#### `UIAlertView`\n\n`UIAlertView` 是一个极其简单但有效的类。大多数情况下，它用于呈现信息，不过也可以配置为允许文本输入。\n\
  \n`UIAlertView` 有一个 `alertViewStyle` 属性，它指定了所呈现警报的类型，可选值包括：\n\n- `UIAlertViewStyleDefault`\n\
  - `UIAlertViewStyleSecureTextInput`\n- `UIAlertViewStylePlainTextInput`\n- `UIAlertViewStyleLoginAndPasswordInput`\n\
  \n默认样式指的是一个呈现信息的简单警报，而其余三种样式都允许文本输入。它们的名称直接表明了其具体用途。\n\n配置默认样式的 `UIAlertView` 最简单的方式是通过其指定的初始化方法\
  \ `-initWithTitle:message:delegate:cancelButtonTitle:otherButtonTitles:`。下一个示例演示了这些配置属性的用途。\n\
  \n以下代码将配置如图 3–25 所示的 `UIAlertView`。\n\n```\nUIAlertView *alert = [[UIAlertView alloc]\
  \ initWithTitle:@\"Title\" message:@\"This is our\"\nmessage delegate:self cancelButtonTitle:@\"\
  Ok\" otherButtonTitles:@\"Other Button\", nil];\n```\n\n![Image](img/9781430240051_Fig03-25.jpg)\n\
  \n**图 3–25.** 呈现的 `UIAlertView`\n\n一旦你的 `UIAlertView` 配置完成，只需调用 `-show` 方法即可非常简单地呈现它。\n\
  \n```\n[alert show];\n```\n\n`UIAlertView` 还有一个 `delegate` 属性，正如你在初始化方法中设置的那样，在此示例中你将其设置为你的视图控制器。该属性遵循\
  \ `UIAlertViewDelegate` 协议。它包含多个方法，这些方法在呈现、取消或关闭 `UIAlertView` 时被调用。但更重要的是它的 `-alertView:clickedButtonAtIndex:`\
  \ 方法，该方法允许你的应用程序对每个不同按钮的按下做出特定响应。\n\n如果你希望手动关闭 `UIAlertView`，例如由于某些外部事件或在特定时间之后，你可以调用\
  \ `-dismissWithClickedButtonIndex:animated:` 方法。\n\n通常，`UIAlertView` 用于响应特定事件来呈现或请求信息，例如影响应用程序的外部条件变化，或某些服务不可用。\n\
  \n#### `UIActionSheet`\n\n`UIActionSheet` 类通常用于向用户提供多个选项以供选择，以便应用程序知道如何继续。它由一系列大型带标签的按钮组成，这些按钮可以根据其对应用程序影响的性质显示特定颜色，如图\
  \ 3–26 所示。\n\n![Image](img/9781430240051_Fig03-26.jpg)\n\n**图 3–26.** 配置了多个按钮的简单\
  \ `UIActionSheet`\n\n`UIActionSheet` 有一个 `actionSheetStyle` 属性。与 `UIAlertView` 中的类似属性不同，这仅决定操作表的外观样式，可选值包括：\n\
  \n- `UIActionSheetStyleAutomatic`\n- `UIActionSheetStyleDefault`\n- `UIActionSheetStyleBlackTranslucent`\n\
  - `UIActionSheetStyleBlackOpaque`\n\n如果指定了自动样式，它会模仿底部栏的视觉样式。否则，它将恢复为 `UIActionSheetStyleDefault`\
  \ 值。\n\n设置 `UIActionSheet` 最简单的方式是通过其指定的初始化方法 `initWithTitle:delegate:cancelButtonTitle:destructiveButtonTitle:otherButtonTitles:`。例如，以下代码行将重现图\
  \ 3–26 中显示的 `UIActionSheet`。\n\n```\nUIActionSheet *actionSheet = [[UIActionSheet\
  \ alloc] initWithTitle:@\"Title\" delegate:self\ncancelButtonTitle:@\"Cancel\" destructiveButtonTitle:@\"\
  Delete\" otherButtonTitles:@\"Other\nButton 1\", @\"Other Button 2\", nil];\n```\n\
  \n如你所见，“取消”按钮通常是较深的颜色以指示其结果，因为它最常用于实现某些行为的取消。而“破坏性”按钮是亮红色，以指示它通常实现某种会永久删除用户数据的方法。\n\
  \n在呈现 `UIActionSheet` 时，你必须考虑所使用的设备。由于 iPhone 的屏幕比 iPad 小，`UIActionSheet` 只能从视图底部呈现。然而，在\
  \ iPad 上，可以使用多种方法从任何指定的点、栏按钮项、工具栏、标签栏或视图呈现操作表。\n\n所使用的设备也会带来关于按钮使用的某些考量。在 iPhone\
  \ 上，点击 `UIActionSheet` 外部不会产生任何效果，因此“取消”按钮是绝对必要的。然而，在 iPad 上，用户通常可以通过点击操作表外部来关闭它。除非操作表是在\
  \ `UIPopoverController` 内部呈现的，否则“取消”按钮相当不必要，甚至可能造成困惑。\n\n与 `UIAlertView` 一样，你可以使用\
  \ `-dismissWithClickedButtonIndex:animated:` 手动关闭 `UIActionSheet`。\n\n最后，你的 `UIActionSheet`\
  \ 的 `delegate` 属性（遵循 `UIActionSheetDelegate` 协议）允许你对操作表的呈现、取消和关闭以及每个按钮的选择做出响应。通过实现\
  \ `-actionSheet:clickedButtonAtIndex:` 方法，你可以根据每个选项的选择实现特定功能。\n\n### 总结\n\n至此，你应该对\
  \ iOS 设计和开发的各种元素有了极好的理解。我们已经回顾了最常用的设计对象及其通用指南，以及它们最常见的实现和使用中的细微差别。一旦你深入理解开发者在创建应用程序时所拥有的众多选项，设计和创建有用、设计精良且视觉上吸引人的产品就会变得轻而易举。\n\
  \n## Chapter 4\n\n## 位置相关实践方案\n\nCore Location 框架提供了一种向应用程序提供与设备地理定位相关信息的新方式。借助该框架的功能，你的应用程序可以精确地确定设备的位置，甚至知道它面向的方向。已有多种应用程序成功抓住了利用位置感知信息的机会，例如\
  \ Facebook 和 Foursquare。iOS 5 继续改进可用的可能性，并提供了将人类可读位置转换为地理位置的新功能。\n\n在本章中，我们将处理三个主要能力：定位服务、GPS\
  \ 和磁力计。定位服务是允许你的应用程序访问用户位置的基本功能。在此基础上，通过使用辅助 GPS，你可以极大地提高位置精度（但通常以牺牲电池寿命为代价）。某些较新设备包含磁力计，它允许应用程序访问设备的航向和方位。\n\
  \n### 支持的设备\n\n当你计划将基于位置的服务整合到应用程序中时，首先需要考虑的是哪些设备将支持这些服务。并非所有 Apple 设备都生而平等，或者说并非所有设备都具备支持定位服务的能力。具体来说，所有\
  \ iPod Touch 都不包含 GPS，它们只能基于 WiFi 连接（如果可用且已连接）来提供设备位置。请参考表 4–1，查看当前 Apple 设备所支持的定位能力。\n\
  \n![Image](img/9781430240051_tab04-01.jpg)\n\n\n\n### 要求定位服务\n\n如果你的应用完全依赖于定位服务，你可能希望阻止它加载到不支持定位服务的设备上。你可以要求设备具备\
  \ GPS、磁力计或常规定位服务。请仅在应用功能绝对需要这些能力时，才添加这些要求。要配置这些要求，请在导航窗格中点击项目，然后在编辑器窗口中选择项目目标。\n\
  \n如果你希望向现有项目添加这些要求，请选择“信息”标签，并在“自定义 iOS 目标属性”列表中添加一行。你可以通过点击键名右侧或任何现有行名称右侧的小“+”图标来添加一行。你要添加的键是“Required\
  \ device capabilities”或`UIRequiredDeviceCapabilities`。这两个名称没有区别，因为后者会自动被前者替换。该键包含一个值数组，这些值引用了设备运行应用所需的设备能力。展开该键，并将所需能力作为该键中的项目添加，如图\
  \ 4-1 中突出显示的那样。\n\n![图像](img/9781430240051_Fig04-01.jpg)\n\n**图 4-1.** *指定应用的所需设备能力*\n\
  \n如果你只需要定位服务（即仅了解用户的大致位置，无需方向或 GPS 精度），则只需添加定位服务这一项即可。但如果你的应用需要 GPS 精度，那么你可能需要添加\
  \ GPS 要求。如果你包含了 GPS 项，也应该包含定位服务项。最后，如果你的设备需要了解设备的朝向，你可以将磁力计作为一个必需能力包含在内。\n\n###\
  \ 如何知道我在哪里？\n\n查找设备位置主要有两种方法：标准定位服务和重大位置变化服务。使用哪种方法取决于你所需信息的精度以及你希望多频繁地收到设备位置变化的通知。\n\
  \n标准定位服务提供更精确的位置信息，如果所请求的精度需要，它将调用 GPS。这种更高的精度是以获取精确位置用时更长以及电池消耗增加为代价的。如果你打算使用标准定位服务，应当精确使用，并且只在必要时使用。我们将在本章后面讨论一些使用此服务的最佳实践和技术。\n\
  \n重大位置变化服务提供了一定的灵活性，推荐给大多数不需要高精度位置信息的应用使用。例如，如果你只需要知道某人所在的城镇或城市，重大位置变化服务就完全可以接受。你将获得快速响应，而不会消耗太多电量，因为它使用蜂窝信号来确定设备位置。重大位置变化服务的另一个好处是它能够在设备后台运行。你的应用不必在前台运行就能接收来自此服务的位置更新。\n\
  \n这两种服务的工作方式非常相似。它们都需要实例化一个`CLLocationManager`对象，该对象负责设置定位服务并指定其使用方式。`CLLocationManager`对象还定义了一个委托。该委托应至少响应两个方法：\n\
  \n```\n- locationManager:didUpdateToLocation:fromLocation:\n- locationManager:didFailWithError:\n\
  ```\n\n每种服务这些方法的实现将在随后的方案中讨论。\n\n### 方案 4-1：获取设备位置信息\n\n为了获取设备最精确的位置信息，你将使用标准定位服务。我们首先创建一个名为\
  \ Chapter4SampleProject 的新单视图应用来实现此功能。如果你的 Xcode 版本允许你指定类前缀，请再次输入`Chapter4SampleProject`。\n\
  \n在向应用添加定位服务时，首先要做的是将 Core Location 框架库添加到应用中。从 Xcode 3 到 Xcode 4，框架的位置略有变化。现在，当你在导航窗格中选择项目并选择项目目标时，就能找到它们。切换到“构建阶段”标签，展开“将二进制文件与库链接”区域以查看包含的框架，如图\
  \ 4-2 所示。点击“+”按钮将允许你向项目添加 Core Location 框架，如图 4-3 所示。\n\n![图像](img/9781430240051_Fig04-02.jpg)\n\
  \n**图 4-2.** *点击“+”按钮添加框架*\n\n![图像](img/9781430240051_Fig04-03.jpg)\n\n**图 4-3.**\
  \ *选择`CoreLocation.framework`并将其添加到项目*\n\n现在，你将设置 XIB 以显示位置信息。在导航窗格中点击`Chapter4SampleProject.xib`文件，Interface\
  \ Builder 将被加载。你将把一个`UILabel`和一个`UISwitch`对象拖到 XIB 上。`UILabel`将用于显示位置信息，`UISwitch`将用于打开和关闭定位服务。你将在工具窗格的“属性检查器”标签中将`UISwitch`的初始状态设置为关闭。现在你的\
  \ XIB 如图 4-4 所示。\n\n![图像](img/9781430240051_Fig04-04.jpg)\n\n**图 4-4.** *用于显示简单位置信息的用户界面*\n\
  \n现在创建一些输出属性和操作。打开助理编辑器，并在 XIB 中选择`UIView`。按住^键并点击；从`UILabel`拖拽到接口文件（`.h`）以创建一个输出。在出现的弹出窗口中，将`UILabel`命名为“labelLocation”，如图\
  \ 4-5 所示。\n\n![图像](img/9781430240051_Fig04-05.jpg)\n\n**图 4-5.** *将`UILabel`连接到输出口*\n\
  \n对`UISwitch`重复相同过程，但这次将连接类型更改为“操作”，并将操作命名为“toggleLocationServices”，参考图 4-6。\n\n\
  ![图像](img/9781430240051_Fig04-06.jpg)\n\n**图 4-6.** *创建由开关执行的操作*\n\n通过将以下行放在接口文件的顶部，将\
  \ Core Location 框架导入到`Chapter4SampleProjectViewController`接口文件（`.h`）中：\n\n```\n\
  #import <CoreLocation/CoreLocation.h>\n```\n\n此时，你还应定义一个`CLLocationManager`对象，为了方便起见，你将视图控制器也设置为`CLLocationManagerDelegate`。该对象将作为你处理所有基于位置服务的“行动中枢”。你的接口文件现在应如下所示：\n\
  \n```\n//  Chapter4SampleProjectViewController.h\n\n#import <UIKit/UIKit.h>\n#import\
  \ <CoreLocation/CoreLocation.h>\n\n@interface Chapter4SampleProjectViewController\
  \ : UIViewController\n<CLLocationManagerDelegate> {\n    UILabel *labelLocation;\n\
  \    CLLocationManager *_locationManager;\n}\n\n@property (strong, nonatomic) IBOutlet\
  \ UILabel *labelLocation;\n\n- (IBAction)toggleLocationServices:(id)sender;\n@end\n\
  ```\n\n现在接口已定义完毕，你可以转到实现文件（`.m`）并开始实现这些方法和对象。你首先要处理的是`toggleLocationServices:sender:`操作。当用户触摸此控件时，你需要检查定位服务是否可用。如果不可用，将显示一个警告视图，说明必须启用定位服务才能继续。\n\
  \n\n```objc\nif(![CLLocationManager locationServicesEnabled]){\n    UIAlertView\
  \ *alertLocation = [[UIAlertView alloc] initWithTitle:@\"Location\nError\" message:@\"\
  Location services must be enabled for this feature to work\"\ndelegate:nil cancelButtonTitle:@\"\
  OK\" otherButtonTitles:nil];\n    [alertLocation show];\n    return;\n}\n```\n\n\
  如果位置服务可用，您需要检查控件的状态。如果其状态已设置为“开”，您需要检查`CLLocationManager`对象是否已被实例化。如果没有，您将需要实例化它并设置其属性和委托。对于标准的位置服务，您应当始终设置`CLLocationManager`对象的`desiredAccuracy`和`distanceFilter`属性。\n\
  \n`desiredAccuracy`属性告知 Core Location 框架您希望位置信息的精确程度（以米为单位）。然而，精确度不被保证，设备将尽力使用可用资源，尽可能接近您期望的精确度获取信息。Apple\
  \ 建议对此设置尽可能保守。如果您不需要知道当前设备的街道地址，请使用更高的精确度设置。有许多常量可供您方便使用：\n\n`kCLLocationAccuracyBestForNavigation`\n\
  `kCLLocationAccuracyBest`\n`kCLLocationAccuracyNearestTenMeters`\n`kCLLocationAccuracyHundredMeters`\n\
  `kCLLocationAccuracyKilometer`\n`kCLLocationAccuracyThreeKilometers`\n\n如您所见，这些指定距离的常量限于公制单位。如果您对这些距离单位不太熟悉，1\
  \ 米比 1 码稍长，1 公里则略超半英里（6/10 英里）。\n\n`distanceFilter`属性指定设备需要移动多远（同样以米为单位），以便您通过委托被通知其新位置。为此属性提供的唯一常量是`kCLDistanceFilterNone`，它将向委托报告所有位置变化。\n\
  \n使用定位服务时，您还应始终设置的另一个属性是`purpose`属性。当提示用户允许您的应用程序访问其位置时，`purpose`属性中的字符串会被显示，告知用户您计划如何使用设备的位置信息。\n\
  \n一旦您设置了属性和委托，可以通过调用`CLLocationManager`上的`startUpdatingLocation`方法来启动定位服务。\n\n停止定位服务只需在`CLLocationManager`对象上调用`stopUpdatingLocation`。如果用户将`UISwitch`拨到关闭状态，您就需要这样做。在添加了启动和停止`CLLocationManager`的代码后，您的操作方法应如下所示：\n\
  \n```objc\n- (IBAction)toggleLocationServices:(id)sender {\n    // Display an UIAlertView\
  \ if locationServices are not enabled and return\n    if(![CLLocationManager locationServicesEnabled]){\n\
  \        UIAlertView *alertLocation = [[UIAlertView alloc] initWithTitle:@\"Location\n\
  Error\" message:@\"Location services must be enabled for this feature to work\"\n\
  delegate:nil cancelButtonTitle:@\"OK\" otherButtonTitles:nil];\n        [alertLocation\
  \ show];\n        return;\n    }\n\n    // Future Proof: Make sure it's a UISwitch\
  \ calling this action\n    if([sender isKindOfClass:[UISwitch class]]){\n      \
  \  UISwitch *locationSwitch=(UISwitch *)sender;\n        // Check if switch is \"\
  on\"\n        if(locationSwitch.on){\n            // Check if _locationManager has\
  \ been instantiated yet\n            if(_locationManager==nil){\n              \
  \  // Instantiate _locationManager\n                _locationManager = [[CLLocationManager\
  \ alloc] init];\n                _locationManager.desiredAccuracy=kCLLocationAccuracyBest;\n\
  \                _locationManager.distanceFilter=1;\n_locationManager.purpose=@\"\
  We will only use your location information to display your\npresent location.  We\
  \ will not send it or record it.\";\n_locationManager.delegate=self;\n         \
  \   }\n            // Start updating location\n            [_locationManager startUpdatingLocation];\n\
  \        }else{\n            // Check if _locationManager has been instantiated\
  \ yet\n            if(_locationManager!=nil){\n                // Stop updating\
  \ location\n                [_locationManager stopUpdatingLocation];\n         \
  \   }\n        }\n    }\n}\n```\n\n接下来需要设置委托方法。当接收到位置更新或获取位置出现错误时，会调用这些方法。您将首先处理错误委托方法。最常见的错误来源是当提示用户允许您的应用程序使用定位服务，而用户拒绝授权时。如果发生这种情况，您应通过调用`stopUpdatingLocation`方法停止请求位置更新：\n\
  \n```objc\n-(void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError\
  \ *)error{\n    if(error.code == kCLErrorDenied){\n[manager stopUpdatingLocation];\n\
  \    }\n}\n```\n\n处理位置更新的委托方法稍微复杂一些。方法`- locationManager:didUpdateToLocation:fromLocation:`会传递三个对象：发起位置更新请求的`CLLocationManager`，`newLocation`，以及`oldLocation`。这两个位置对象属于`CLLocation`类。该对象包含大量有价值的信息，包括位置坐标、精确度信息以及位置更新的时间戳。您将按如下方式实现此方法：\n\
  \n```objc\n-(void)locationManager:(CLLocationManager *)manager didUpdateToLocation:(CLLocation\n\
  *)newLocation fromLocation:(CLLocation *)oldLocation{\n    // Check to make sure\
  \ this is a recent location event\n    NSDate *eventDate=newLocation.timestamp;\n\
  \    NSTimeInterval eventInterval=[eventDate timeIntervalSinceNow];\n    if(abs(eventInterval)<30.0){\n\
  \        // Check to make sure the event is accurate\n        if(newLocation.horizontalAccuracy>=0\
  \ && newLocation.horizontalAccuracy<20){\n            self.labelLocation.text=newLocation.description;\n\
  \        }\n    }\n}\n```\n\n在您的应用程序处理`CLLocation`对象之前，您应检查该位置对象的时间戳是否是最新的。Core\
  \ Location 有一种习惯，在锁定新位置之前，会首先将上一次已知位置作为第一次调用传递给委托方法。当您需要知道设备当前的位置时，无需处理一个代表设备历史上某个时间点位置的对象。为此，您可以使用类似以下的代码，只处理当前时间\
  \ 20 秒内发生的位置事件：\n\n```objc\n    // Check to make sure this is a recent location\
  \ event\n    NSDate *eventDate=newLocation.timestamp;\n    NSTimeInterval eventInterval=[eventDate\
  \ timeIntervalSinceNow];\n    if(abs(eventInterval)<30.0){\n        // …process\
  \ event\n    }\n```\n\n\n在处理事件之前，你需要检查的另一个属性是其准确性。同样，如果事件的准确性不在你期望的范围内，就没有必要处理它。与其向用户提供错误信息，不如等待设备获取更准确的读数。`CLLocation`对象包含两个准确性属性：`horizontalAccuracy`和`verticalAccuracy`。\n\
  \n`horizontalAccuracy`属性表示位置可能位于的圆的半径（以米为单位）。在显示你的位置时，可以在内置的“地图”应用中看到这个圆。负值表示坐标无效。\n\
  \n`verticalAccuracy`属性表示设备海拔可能偏差的范围（以米为单位，正负值）。同样，负值表示海拔读数无效。如果设备没有 GPS，`verticalAccuracy`属性将始终为负，因为需要\
  \ GPS 才能确定设备的海拔。\n\n以下是一些处理`horizontalAccuracy`的示例代码：\n\n```\nif(newLocation.horizontalAccuracy>=0\
  \ && newLocation.horizontalAccuracy<20){\n    //…处理事件\n}\n```\n\n我想讨论的另一个属性是`description`属性。`description`属性以`NSString`格式返回`CLLocation`对象的位置信息。这是一种查看设备返回的位置信息的简便方法。我不建议直接向最终用户显示此字符串，因为它包含大量信息，因此格式不适合向用户展示，但对于调试和验证位置信息是否正在更新且正确/准确来说，它可能很有用。在本项目中，你将`labelLocation`文本设置为`newLocation.description`的值，从而完成了之前的委托方法。\n\
  \n借助 Xcode 4.2，你现在可以在 iOS 模拟器中模拟位置信息。在这个出色的功能出现之前，你需要将应用程序加载到测试设备上，然后跑到室外测试定位功能。大多数情况下，你可能会漏掉某些内容，不得不反复操作。然而，这无疑是一种让开发者离开椅子、走到阳光下的好方法。\n\
  \n在 iOS 模拟器中启动`Chapter4SampleProject`。当你将`UISwitch`触摸到“On”时，系统将提示你允许此应用程序访问设备的位置。你会在\
  \ Figure 4–7 中注意到，显示的是你在`CLLocationManager`的`purpose`属性中设置的字符串。点击“OK”继续。\n\n![Image](img/9781430240051_Fig04-07.jpg)\n\
  \n**Figure 4–7.** 你的应用程序请求位置权限\n\n点击“OK”后，你会注意到即使`UISwitch`处于打开状态，`labelLocation`也没有更新，如\
  \ Figure 4–8 所示。\n\n![Image](img/9781430240051_Fig04-08.jpg)\n\n**Figure 4–8.**\
  \ 没有任何位置数据的模拟应用程序\n\n这是因为你还没有开始任何位置模拟。在 iOS 模拟器中，进入菜单 **Debug** ![Image](img/U001.jpg)\
  \ **Location** ![Image](img/U001.jpg) **Freeway Drive**，`labelLocation`应该开始更新，显示\
  \ Apple 提供的预录行驶信息。Figure 4–9 显示了模拟行驶传递的信息示例。\n\n![Image](img/9781430240051_Fig04-09.jpg)\n\
  \n**Figure 4–9.** 显示模拟的位置信息\n\n### Recipe 4–2: 重大位置变化\n\n重大位置变化服务提供了两个重要优势：速度快，并且可以在后台运行。两种定位服务使用的大量代码是相同的，设置也几乎相同，但我将指出不同之处。让我们新建一个名为`Chapter4SignificantLocationTracker`的单视图项目，如果你的\
  \ Xcode 版本允许，类前缀也使用相同的名称。\n\n首先，将 Core Location 框架添加到项目中。如果你需要关于如何添加此框架的提示，请返回上一节查看步骤。\n\
  \n要启用后台定位服务，你需要在`Info.plist`中添加一个键。在导航器窗格中选择项目，然后选择项目的目标。切换到“Info”选项卡，并在“Custom\
  \ iOS Target Properties”列表中添加一行。你要添加的键是“Required background modes”或`UIBackgroundModes`。现在，将“App\
  \ registers for location updates”添加到 Item 0。你的结果应该类似于 Figure 4–10。\n\n![Image](img/9781430240051_Fig04-10.jpg)\n\
  \n**Figure 4–10.** 将位置变化指定为必需的后台模式\n\n你将像上一节一样设置`.xib`文件，如 Figure 4–11 所示。\n\n![Image](img/9781430240051_Fig04-11.jpg)\n\
  \n**Figure 4–11.** 熟悉的用户界面\n\n将位置标签连接到名为`labelLocation`的出口，并将`UISwitch`连接到名为`toggleLocationServices`的操作，如\
  \ Figures 4–12 和 4–13 所示。\n\n![Image](img/9781430240051_Fig04-12.jpg)\n\n**Figure\
  \ 4–12.** 将最新的`UILabel`连接到出口\n\n![Image](img/9781430240051_Fig04-13.jpg)\n\n**Figure\
  \ 4–13.** 创建切换操作\n\n你的接口文件（`.h`）的设置将完全相同：\n\n```\n//  Chapter4SignificantLocationTrackerViewController.h\n\
  \n#import <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\n@interface Chapter4SignificantLocationTrackerViewController\
  \ : UIViewController\n<CLLocationManagerDelegate>{\n    CLLocationManager *_locationManager;\n\
  \    UILabel *labelLocation;\n}\n@property (strong, nonatomic) IBOutlet UILabel\
  \ *labelLocation;\n- (IBAction)toggleLocationServices:(id)sender;\n\n@end\n```\n\
  \n现在切换到你的实现文件（`.m`）并滚动到`- (IBAction)toggleLocationServices:(id)sender`方法。你将首先检查定位服务是否已启用，如果未启用，则显示`UIAlertView`：\n\
  \n```\n    //检查定位服务是否已启用\n    if(![CLLocationManager locationServicesEnabled]){\n\
  \        UIAlertView *alertLocation = [[UIAlertView alloc] initWithTitle:@\"需要定位服务\"\
  \ message:@\"需要定位服务才能使此应用正常工作\" delegate:nil cancelButtonTitle:@\"确定\" otherButtonTitles:\
  \ nil];\n        [alertLocation show];\n        return;\n    }\n```\n\n其余代码与你之前所做的非常相似，但有一些例外。首先，你不需要指定`desiredAccuracy`和`distanceFilter`属性。你仍然应该指定`purpose`属性，以便用户知道你将如何使用他们的位置。\n\
  \n```\nif([sender isKindOfClass:[UISwitch class]]){\n        UISwitch *locationSwitch=(UISwitch\
  \ *)sender;\n        if(locationSwitch.on){\n            //检查 _locationManager 是否已实例化\n\
  \            if(_locationManager==nil){\n                //实例化 _locationManager\n\
  \                _locationManager = [[CLLocationManager alloc] init];\n        \
  \        _locationManager.purpose=@\"我们仅会在本地使用您的位置信息。我们不会记录或将其发送给任何人\";\n      \
  \          _locationManager.delegate=self;\n            }\n….\n```\n\n\n\n另一个重大变化是：当准备好开始接收位置更新时，你需要在\
  \ `location manager` 上调用 `startMonitoringSignificantLocationChanges` 方法。现在，你的操作代码如下：\n\
  \n```\n- (IBAction)toggleLocationServices:(id)sender {\n    //Check if location\
  \ services are enabled\n    if(![CLLocationManager locationServicesEnabled]){\n\
  \        UIAlertView *alertLocation = [[UIAlertView alloc] initWithTitle:@\"Location\
  \ Services Needed\" message:@\"Location services are needed to make this app functional\"\
  \ delegate:nil cancelButtonTitle:@\"OK\" otherButtonTitles: nil];\n        [alertLocation\
  \ show];\n        return;\n    }\n\n    //Future proof, make sure sender is UISwitch\n\
  \    if([sender isKindOfClass:[UISwitch class]]){\n        UISwitch *locationSwitch=(UISwitch\
  \ *)sender;\n        if(locationSwitch.on){\n            //Check if _locationManager\
  \ has been instantiated\n            if(_locationManager==nil){\n              \
  \  //Instantiate _locationManager\n                _locationManager = [[CLLocationManager\
  \ alloc] init];\n                _locationManager.purpose=@\"We will only use your\
  \ location locally.  We will not record it or send it to anyone\";\n           \
  \     _locationManager.delegate=self;\n            }\n            //Start updating\
  \ location changes\n            [_locationManager startMonitoringSignificantLocationChanges];\n\
  \        }else{\n            if(_locationManager!=nil){\n                //Stop\
  \ monitoring for location changes\n                [_locationManager stopMonitoringSignificantLocationChanges];\n\
  \            }\n        }\n    }\n}\n```\n\n现在你需要设置委托方法。最简单的是定义 `- (void)locationManager:(CLLocationManager\
  \ *)manager didFailWithError:(NSError *)error` 方法：\n\n```\n- (void)locationManager:(CLLocationManager\
  \ *)manager didFailWithError:(NSError *)error{\n    if(error.code==kCLErrorDenied){\n\
  \        [manager stopMonitoringSignificantLocationChanges];\n    }\n}\n```\n\n\
  对于 `- (void)locationManager:(CLLocationManager *)manager didUpdateToLocation:(CLLocation\
  \ *)newLocation fromLocation:(CLLocation *)oldLocation` 方法，你会做一些不同的处理。除了更新位置标签外，你还会生成一个本地通知，以便在应用未运行时也能看到位置更新。\n\
  \n首先，你需要进行检查，确保 `newLocation` 的时间戳是最近的，并且其 `horizontalAccuracy` 为正数，以验证其有效性：\n\n\
  ```\n    NSDate *eventDate=newLocation.timestamp;\n    NSTimeInterval eventInterval\
  \ = [eventDate timeIntervalSinceNow];\n    if(abs(eventInterval)<30.0){\n      \
  \  if(newLocation.horizontalAccuracy>=0){\n        …\n```\n\n如果应用正在运行，除非在应用委托中实现了\
  \ `application:didReceiveLocalNotification:` 委托方法，否则你不会看到 `UILocalNotification`。现在不这样做，而是在应用打开时直接用\
  \ `self.labelLocation.text = newLocation.description;` 更新位置标签，显示新的位置描述。\n\n要创建 `UILocalNotification`，请使用以下代码：\n\
  \n```\n            UILocalNotification *locationNotification = [[UILocalNotification\
  \ alloc] init];\n            locationNotification.alertBody=[NSString stringWithFormat:@\"\
  New Location: %.3f, %.3f\", newLocation.coordinate.latitude, newLocation.coordinate.longitude];\n\
  \            locationNotification.alertAction=@\"Ok\";\n            locationNotification.soundName\
  \ = UILocalNotificationDefaultSoundName;\n            //Increment the applicationIconBadgeNumber\n\
  \            locationNotification.applicationIconBadgeNumber=[[UIApplication sharedApplication]\
  \ applicationIconBadgeNumber]+1;\n            [[UIApplication sharedApplication]\
  \ presentLocalNotificationNow:locationNotification];\n```\n\n你的委托方法的完整代码如下：\n\n\
  ```\n- (void)locationManager:(CLLocationManager *)manager didUpdateToLocation:(CLLocation\
  \ *)newLocation fromLocation:(CLLocation *)oldLocation{\n    NSDate *eventDate=newLocation.timestamp;\n\
  \    NSTimeInterval eventInterval = [eventDate timeIntervalSinceNow];\n    NSLog(@\"\
  Event Interval: %f\", eventInterval);\n    NSLog(@\"Accuracy: %f\", newLocation.horizontalAccuracy);\n\
  \    if(abs(eventInterval)<30.0){\n        if(newLocation.horizontalAccuracy>=0){\n\
  \            self.labelLocation.text = newLocation.description;\n            UILocalNotification\
  \ *locationNotification = [[UILocalNotification alloc] init];\n            locationNotification.alertBody=[NSString\
  \ stringWithFormat:@\"New Location: %.3f, %.3f\", newLocation.coordinate.latitude,\
  \ newLocation.coordinate.longitude];\n            locationNotification.alertAction=@\"\
  Ok\";\n            locationNotification.soundName = UILocalNotificationDefaultSoundName;\n\
  \            //Increment the applicationIconBadgeNumber\n            locationNotification.applicationIconBadgeNumber=[[UIApplication\
  \ sharedApplication] applicationIconBadgeNumber]+1;\n            [[UIApplication\
  \ sharedApplication] presentLocalNotificationNow:locationNotification];\n      \
  \  }\n    }\n}\n```\n\n在这个新应用中，即使应用不在前台，你也能为每一次显著的位置变化接收到本地通知。这些变化会反映在应用图标的通知角标以及正常的设备通知上。\n\
  \n\n\n### 配方 4–3：确定磁方位角\n\n现代 iPhone 和 iPad 2 现已内置磁力计硬件，可用于判断设备握持的方向。其测量基于设备相对于地球磁北极的位置。磁极与地球的地理极点并不相同。磁北极位于加拿大北部，并随着地核变化以每年约\
  \ 55–60 公里的速度向西缓慢移动。\n\n实现航向跟踪与我们目前讨论过的任何位置跟踪服务非常相似。你需要在项目中加入 Core Location 框架，创建一个\
  \ `CLLocationManager` 对象，并定义其委托及委托方法。\n\n默认情况下，设备航向的测量假设设备以竖屏模式握持，且设备顶部远离用户。你可以通过设置\
  \ `CLLocationManager` 对象的 `headingOrientation` 属性来更改此设置。该属性的可选值如下：\n\n`CLDeviceOrientationPortrait（默认）`\n\
  `CLDeviceOrientationPortraitUpsideDown`\n`CLDeviceOrientationLandscapeLeft`\n`CLDeviceOrientationLandscapeRight`\n\
  \n让我们先创建一个名为 `Chapter4HeadingTracking` 的单视图应用程序项目。如果你的 Xcode 版本允许指定类前缀，请再次填写“Chapter4HeadingTracking”。首先，通过在导航器窗格中选择项目并选择项目的目标，将\
  \ Core Location 框架加入你的项目中。按照本章开头的方法，将 Core Location 框架添加到项目中。\n\n接下来，你可以设置 XIB 文件以显示航向。在导航器窗格中点击\
  \ `Chapter4HeadingTrackingViewController.xib` 文件，Interface Builder 将加载。与之前的配方类似，你将拖拽一个\
  \ `UILabel` 和一个 `UISwitch` 对象到 XIB 上。`UILabel` 用于显示航向信息，而 `UISwitch` 用于开启或关闭航向跟踪服务。你将在属性检查器窗格中将\
  \ `UISwitch` 的初始状态设置为“关”。此时你的 XIB 应如图 Figure 4–14 所示。\n\n![图片](img/9781430240051_Fig04-14.jpg)\n\
  \n**图 4–14.** *你依然熟悉的用户界面设置*\n\n布局完 `.xib` 文件后，让我们创建一些输出口属性和操作。打开助理编辑器，并在 XIB 中选择\
  \ `UIView`。按住 ^-点击并从 `UILabel` 拖拽到接口文件（`.h`）以创建一个输出口。在弹出的对话框中，将 `UILabel` 命名为“labelHeading”。这些步骤应如图\
  \ Figure 4–15 和 4–16 所示。\n\n![图片](img/9781430240051_Fig04-15.jpg)\n\n**图 4–15.**\
  \ *连接 `UILabel` 输出口*\n\n![图片](img/9781430240051_Fig04-16.jpg)\n\n**图 4–16.** *配置标签的输出口*\n\
  \n对 `UISwitch` 重复相同过程，但这次将连接类型更改为“操作”，并将操作命名为“switchHeadingServices”，如图 Figure 4–17\
  \ 所示。\n\n![图片](img/9781430240051_Fig04-17.jpg)\n\n**图 4–17.** *创建开关的操作*\n\n在 `Chapter4HeadingTrackingViewController`\
  \ 的接口文件（`.h`）中，导入 Core Location 框架并设置视图控制器遵循 `CLLocationManagerDelegate` 协议。然后定义一个\
  \ `CLLocationManager` 实例变量。接口文件现在应如下所示：\n\n```\n//  Chapter4HeadingTrackingViewController.h\n\
  \n#import <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\n@interface Chapter4HeadingTrackingViewController\
  \ : UIViewController <CLLocationManagerDelegate>{\n    CLLocationManager *_locationManager;\n\
  \    UILabel *labelHeading;\n}\n\n@property (strong, nonatomic) IBOutlet UILabel\
  \ *labelHeading;\n- (IBAction)switchHeadingServices:(id)sender;\n@end\n```\n\n切换到实现文件（`.m`），滚动到底部开始定义\
  \ `switchHeadingService` 方法。与位置服务类似，你将首先通过检查 `[CLLocationManager headingAvailable]`\
  \ 的返回值来确认航向服务是否可用。然后验证发送者是否为 `UISwitch`：\n\n```\nif([CLLocationManager headingAvailable]){\n\
  \        if([sender isKindOfClass:[UISwitch class]]){\n            UISwitch *headingSwitch=(UISwitch\
  \ *)sender;\n        …\n```\n\n如果 `headingSwitch` 处于“开”状态，你将检查实例变量 `_locationManager`\
  \ 是否已实例化，如果未实例化则进行实例化。当创建用于跟踪航向变化的 `CLLocationManager` 实例时，应指定 `headingFilter` 属性。该属性指定航向变化多少度（以度为单位）后才会调用委托方法。然后，与其他位置跟踪服务一样，你需要指定\
  \ `purpose` 属性以告知用户你打算如何使用位置信息，最后指定 `CLLocationManager` 的 `delegate`。实例变量实例化后，你可以调用\
  \ `startUpdatingHeading` 来启动航向跟踪服务，同时更新标签以便查看进度：\n\n```\nif(headingSwitch.on){\n\
  \                if(_locationManager==nil){\n                    _locationManager=[[CLLocationManager\
  \ alloc] init];\n                    _locationManager.headingFilter=5;\n       \
  \             _locationManager.purpose=@\"我们将使用您的位置来告诉您前进的方向\";\n              \
  \      _locationManager.delegate=self;\n                }\n                [_locationManager\
  \ startUpdatingHeading];\n                self.labelHeading.text=@\"正在开始航向跟踪…\"\
  ;\n}else{\n       ….\n```\n\n接下来，如果开关被拨到“关”位置，你将关闭航向跟踪服务。因此完整的方法如下所示：\n\n```\n-\
  \ (IBAction)switchHeadingServices:(id)sender {\n    if([CLLocationManager headingAvailable]){\n\
  \        if([sender isKindOfClass:[UISwitch class]]){\n            UISwitch *headingSwitch=(UISwitch\
  \ *)sender;\n            if(headingSwitch.on){\n                if(_locationManager==nil){\n\
  \                    _locationManager=[[CLLocationManager alloc] init];\n      \
  \              _locationManager.headingFilter=5;\n                    _locationManager.purpose=@\"\
  我们将使用您的位置来告诉您前进的方向\";\n                    _locationManager.delegate=self;\n   \
  \             }\n                [_locationManager startUpdatingHeading];\n    \
  \            self.labelHeading.text=@\"正在开始航向跟踪…\";\n            }else{\n      \
  \          self.labelHeading.text=@\"已关闭航向跟踪\";\n                if(_locationManager!=nil){\n\
  \                    [_locationManager stopUpdatingHeading];\n                }\n\
  \            }\n        }\n    }else{\n        self.labelHeading.text=@\"航向服务不可用\"\
  ;\n    }\n}\n```\n\n接下来需要定义委托方法。对于航向跟踪服务，需要定义三个委托方法：\n\n- `locationManager:didFailWithError:`\n\
  - `locationManager:didUpdateHeading:`\n- `locationManagerShouldDisplayHeadingCalibration:`\n\
  \n第一个方法 `didFailWithError` 与你之前实现位置跟踪服务中的委托方法相同。如果出现错误（很可能是因为用户未授权访问其位置服务），你需要关闭航向跟踪服务：\n\
  \n```\n- (void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError\
  \ *)error{\n    if(error.code==kCLErrorDenied){\n        [manager stopUpdatingHeading];\n\
  \        self.labelHeading.text=@\"错误：航向跟踪被拒绝\";\n    }\n}\n```\n\n\n\n`didUpdateHeading`方法处理设备朝向变化超过`headingFilter`属性设定的阈值时的逻辑。在此实例中，将检查时间戳以确保是最近读数，然后确保`headingAccuracy`属性为正值。若朝向无效，`headingAccuracy`属性将为负值。最后，将使用`magneticHeading`读数更新`labelHeading`。\n\
  \n```\n- (void)locationManager:(CLLocationManager *)manager didUpdateHeading:(CLHeading\
  \ *)newHeading{\n    NSDate *headingDate=newHeading.timestamp;\n    NSTimeInterval\
  \ headingInterval=[headingDate timeIntervalSinceNow];\n    if(abs(headingInterval)<30){\n\
  \        if(newHeading.headingAccuracy<0)\n            return;\n        self.labelHeading.text=[NSString\
  \ stringWithFormat:@\"Your new heading is: %.1f°\", newHeading.magneticHeading];\n\
  \    }\n}\n```\n\n**注意：** 使用 ![Image](img/U004.jpg)+![Image](img/U005.jpg)+8 (Option+Shift+8)\
  \ 插入度（°）符号。\n\n需要实现的最后一个委托方法是`locationManagerShouldDisplayHeadingCalibration`。该方法决定是否应显示朝向校准界面。该场景会提示用户以“8”字形移动设备，以便校准磁力计。目前尚未遇到不希望显示此界面的情况，因此始终返回`YES`：\n\
  \n```\n-(BOOL)locationManagerShouldDisplayHeadingCalibration:(CLLocationManager\
  \ *)manager{\n    return YES;\n}\n```\n\n图 4–18 展示了设备无法轻松校准时的校准界面。测试此应用时，可能不会看到此界面，但作为预防措施，启用它是一个重要环节。\n\
  \n![Image](img/9781430240051_Fig04-18.jpg)\n\n**图 4–18.** *朝向校准界面*\n\n这是一个无法在模拟器中运行的应用，必须将其加载到实际设备上进行测试。\n\
  \n### Recipe 4–4：指定真方位\n\n已经了解了如何获取磁北朝向，那么真北呢？磁北与真北之间的差异称为磁偏角。磁偏角随地球位置不同而变化很大，但如果知道所在位置，就可以计算磁偏角。对于\
  \ iPhone 或 iPad 2，如果设备知道自己的位置，它会为您计算并返回`CLHeading`对象的`trueHeading`属性。\n\n明确来说，如果将位置跟踪服务与朝向跟踪服务结合使用，就能找到设备相对于真北的方向。只需在`CLLocationManager`上调用`startUpdatingLocation`方法即可获取真北朝向。\n\
  \n可以新建一个项目，或在上一个 Recipe 的基础上扩展。选择`Chapter4HeadingTrackingViewController.xib`文件，为真方位添加第二个标签，如图\
  \ 4–19 所示。\n\n![Image](img/9781430240051_Fig04-19.jpg)\n\n**图 4–19.** *新增标签后的用户界面*\n\
  \n通过显示 Assistant Editor 面板，并从标签 ^-点击拖拽到接口文件（`.h`），将此新标签连接到名为`labelTrueHeading`的出口，如图\
  \ 4–20 所示。\n\n![Image](img/9781430240051_Fig04-20.jpg)\n\n**图 4–20.** *配置额外标签的出口*\n\
  \n接口文件（`.h`）现在应类似以下代码块。如果 Xcode 版本未在属性之外自动生成`UILabel`实例变量，无需担心，这些是可选的。\n\n```\n\
