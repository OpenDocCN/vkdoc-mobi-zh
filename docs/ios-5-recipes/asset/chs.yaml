  \ *)manager{`  \n`    return YES;`  \n`}`  \n\n测试该应用程序后，您将能够获得设备方向的简单读数，该读数同时基于磁方向和真方向。与本章中其他使用磁力计的操作方法一样，此功能仅在物理设备上有效，在模拟器上无效。\n\
  \n## 操作指南 4–5：区域监测\n\nCore Location 提供了一种监测设备进入或离开圆形区域的方法。应用程序可以利用此功能，在设备进入某个特定位置附近时触发提醒，例如，当您接近杂货店时提醒购买牛奶。您也可以利用它，在您离开公司时向家人发送通知，告知他们您正在回家的路上。只要发挥一点想象力，就会发现这种功能有众多应用可能性。\n\
  \n#### 关于区域的一些要点\n\n区域由中心坐标和以米为单位的半径（同样，一米略多于三英尺或一码）来定义。监测方法仅在您跨越区域边界时触发事件。如果设备在监测启动时已位于区域内，则不会触发事件。只有在设备进入或离开区域时才会触发事件。\n\
  \n一旦创建了`CLLocationManager`对象，您就可以使用`startMonitoringForRegion:desiredAccuracy:`方法注册多个需要监测的区域。您注册用于监测的区域在应用程序的多次启动之间是持久存在的。如果当边界事件发生时您的应用程序没有运行，则应用程序会在后台自动重新启动，以便处理该事件。您之前设置的所有区域都将通过`CLLocationManager`对象的`monitoredRegions`属性获取。\n\
  \n区域是系统全局共享的，并且在任何给定时间可以监测的区域数量有限。您应始终限制当前正监测的区域数量，以免消耗系统资源。您应该移除那些不在设备当前位置附近区域的监测。例如，如果设备在西海岸，就无需监测马里兰州的区域。当您尝试注册新区域进行监测而空间不足时，会向`locationManager:monitoringDidFailForRegion:withError:`委托方法返回错误`kCLErrorRegionMonitoringFailure`。\n\
  \n\n\n#### 欢迎来到巴尔的摩！\n\n在本项目中，你将创建一个针对马里兰州巴尔的摩市的区域，并在游客进入该区域时向他们表示欢迎。首先创建一个名为 `Chapter4RegionMonitoring`\
  \ 的新单视图应用程序。如果你的 Xcode 版本允许设置类前缀，请使用相同的名称 `Chapter4RegionMonitoring`。首先要做的是在项目中包含\
  \ Core Location 框架，方法是在导航窗格中选择项目，然后选择项目的目标。转到 Build Phases 选项卡，展开 Link Binary With\
  \ Libraries 区域以查看已包含的框架，并像之前章节中那样添加该框架。\n\n添加库后，你可以创建 `.xib` 文件。在导航窗格中选择 `Chapter4RegionMonitoringViewController.xib`\
  \ 以打开 Interface Builder。添加一个 `UILabel` 和一个 `UISwitch`。将 `UISwitch` 的初始状态设置为 `Off`。它应类似于图\
  \ 4-21。\n\n![图片](img/9781430240051_Fig04-21.jpg)\n\n**图 4-21.** *你非常熟悉的用户界面*\n\n\
  使用助理编辑器，通过从 `.xib` 文件到接口文件（`.h`）执行 `^-单击-拖拽` 来连接输出口和操作。按照图 4-22、图 4-23、图 4-24 和图\
  \ 4-25 的步骤，创建一个名为 `labelRegionInfo` 的 `UILabel` 输出口，以及一个名为 `regionMonitoringToggle`\
  \ 的 `UISwitch` 的 `IBAction`。\n\n![图片](img/9781430240051_Fig04-22.jpg)\n\n**图 4-22.**\
  \ *将 `UILabel` 连接到输出口*\n\n![图片](img/9781430240051_Fig04-23.jpg)\n\n**图 4-23.** *配置\
  \ `UILabel` 输出口*\n\n![图片](img/9781430240051_Fig04-24.jpg)\n\n**图 4-24.** *连接 `UISwitch`\
  \ 的操作*\n\n![图片](img/9781430240051_Fig04-25.jpg)\n\n**图 4-25.** *配置切换操作*\n\n你需要将\
  \ Core Location 框架导入到接口文件（`.h`）中，并创建一个 `CLLocationManager` 实例变量。然后将你的视图控制器声明为遵循\
  \ `CLLocationManagerDelegate` 协议。现在，你的视图控制器的接口文件（`.h`）如下所示：\n\n```\n//  Chapter4RegionMonitoringViewController.h\n\
  #import <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\n@interface Chapter4RegionMonitoringViewController\
  \ : UIViewController\n<CLLocationManagerDelegate>{\n    CLLocationManager *_locationManager;\n\
  \    UILabel *labelRegionInfo;\n}\n\n@property (strong, nonatomic) IBOutlet UILabel\
  \ *labelRegionInfo;\n- (IBAction)regionMonitoringToggle:(id)sender;\n\n@end\n```\n\
  \n切换到实现文件（`.m`），你可以实现区域跟踪方法。首先要确保区域监控可用且已启用。滚动到 `Chapter4RegionMonitoringViewController.m`\
  \ 的底部，并将以下内容添加到 `- (IBAction)regionMonitoringToggle:(id)sender` 方法中：\n\n```\n//检查区域监控是否可用\n\
  if([CLLocationManager regionMonitoringAvailable] && [CLLocationManager\nregionMonitoringEnabled]){\n\
  \n        ….\n}else{\n        self.labelRegionInfo.text=@\"此设备不支持区域监控\";\n}\n```\n\
  \n在同一方法中，如果 `CLLocationManager` 实例变量尚未创建，你需要实例化它，并确保是你的 `UISwitch` 调用了该方法：\n\n```\n\
  \    //检查区域监控是否可用\n    if([CLLocationManager regionMonitoringAvailable] && [CLLocationManager\n\
  regionMonitoringEnabled]){\n        //确保发送者是 UISwitch\n        if([sender isKindOfClass:[UISwitch\
  \ class]]){\n            UISwitch *regionSwitch=(UISwitch *) sender;\n         \
  \   //如果 UISwitch 处于打开状态\n            if(regionSwitch.on){\n                if(_locationManager==nil){\n\
  \                    _locationManager=[[CLLocationManager alloc] init];\n      \
  \              _locationManager.purpose=@\"欢迎来到巴尔的摩\";\n                    _locationManager.delegate=self;\n\
  \                }\n…\n```\n\n你需要定义要监控的区域中心坐标和半径。指定半径时要小心，因为如果半径太大，监控将会失败。你可以通过将半径与\
  \ `CLLocationManager` 对象的 `maximumRegionMonitoringDistance` 属性进行比较，来确保半径在边界范围内。一旦有了中心坐标和半径，就可以创建\
  \ `CLRegion` 对象，并为其提供一个标识符以便将来引用：\n\n```\nCLLocationCoordinate2D baltimoreCoordinate=CLLocationCoordinate2DMake(39.2963,\
  \ -76.613);\nint regionRadius=3000;\nif(regionRadius>_locationManager.maximumRegionMonitoringDistance){\n\
  regionRadius=_locationManager.maximumRegionMonitoringDistance;\n}\nCLRegion *baltimoreRegion=[[CLRegion\
  \ alloc]\ninitCircularRegionWithCenter:baltimoreCoordinate\n        radius:regionRadius\n\
  \        identifier:@\"baltimoreRegion\"];\n```\n\n创建区域后，你可以通过将区域告知 `CLLocationManager`\
  \ 实例对象并设置监控事件的精度，来开始监控该区域的边界事件：\n\n```\n[_locationManager startMonitoringForRegion:baltimoreRegion\n\
  \        desiredAccuracy:kCLLocationAccuracyHundredMeters];\n```\n\n最后要做的一件事是，如果用户将\
  \ `UISwitch` 滑动到 `Off` 位置，则关闭区域监控。为此，你将访问 `CLLocationManager` 实例变量的 `monitoredRegions`\
  \ 属性，并为所有当前监控的区域关闭区域监控。你也可以选择利用 `CLRegion` 的 `identifier` 属性，有选择地关闭特定区域。\n\n```\n\
  }else{\n                //如果 UISwitch 处于关闭状态\n                if(_locationManager!=nil){\n\
  \                    for (CLRegion *monitoredRegion in [_locationManager\nmonitoredRegions])\
  \ {\n                        [_locationManager stopMonitoringForRegion:monitoredRegion];\n\
  \                        self.labelRegionInfo.text=[NSString stringWithFormat:@\"\
  已关闭区域监控：%@\", monitoredRegion.identifier];\n                    }\n            \
  \    }\n}\n```\n\n还需要定义代理方法。有两个用于处理边界事件的代理方法和一个用于处理错误的代理方法：\n\n`locationManager:didEnterRegion:`\n\
  `locationManager:didExitRegion:`\n`locationManager:monitoringDidFailForRegion:withError:`\n\
  \n有两个与区域监控相关的主要错误代码。一个是 `kCLErrorRegionMonitoringDenied`，当设备用户明确拒绝访问区域监控时使用它。另一个是\
  \ `kCLErrorRegionMonitoringFailure`，当监控特定区域失败时使用它，通常是因为系统没有更多的区域资源可供应用程序使用。\n\n\n\
  \n`-(void)locationManager:(CLLocationManager *)manager monitoringDidFailForRegion:(CLRegion\
  \ *)region withError:(NSError *)error {\n    switch (error.code) {\n        case\
  \ kCLErrorRegionMonitoringDenied:\n        {\n            self.labelRegionInfo.text\
  \ = @\"此设备上禁止区域监控\";\n            break;\n        }\n        case kCLErrorRegionMonitoringFailure:\n\
  \        {\n            self.labelRegionInfo.text = [NSString stringWithFormat:@\"\
  区域监控失败，区域：%@\", region.identifier];\n            break;\n        }\n        default:\n\
  \        {\n            self.labelRegionInfo.text = [NSString stringWithFormat:@\"\
  发生未处理的错误：%@\", error.description];\n            break;\n        }\n    }\n}\n```\n\
  \n`didEnter` 和 `didExit` 可以执行你想要的任何功能。由于边界事件发生时应用程序可能处于后台，除了更新标签外，你还需要使用本地通知来让用户知道事件的发生：\n\
  \n```objc\n-(void)locationManager:(CLLocationManager *)manager didEnterRegion:(CLRegion\
  \ *)region {\n    self.labelRegionInfo.text = @\"欢迎来到巴尔的摩！\";\n    UILocalNotification\
  \ *locationNotification = [[UILocalNotification alloc] init];\n    locationNotification.alertBody\
  \ = @\"欢迎来到巴尔的摩！\";\n    locationNotification.alertAction = @\"确定\";\n    locationNotification.soundName\
  \ = UILocalNotificationDefaultSoundName;\n    [[UIApplication sharedApplication]\
  \ presentLocalNotificationNow:locationNotification];\n}\n\n-(void)locationManager:(CLLocationManager\
  \ *)manager didExitRegion:(CLRegion *)region {\n    self.labelRegionInfo.text =\
  \ @\"感谢访问巴尔的摩！欢迎再来！\";\n    UILocalNotification *locationNotification = [[UILocalNotification\
  \ alloc] init];\n    locationNotification.alertBody = @\"感谢访问巴尔的摩！欢迎再来！\";\n   \
  \ locationNotification.alertAction = @\"确定\";\n    locationNotification.soundName\
  \ = UILocalNotificationDefaultSoundName;\n    [[UIApplication sharedApplication]\
  \ presentLocalNotificationNow:locationNotification];\n}\n```\n\n为了使用 iOS 模拟器测试此功能，你必须能够输入自定义坐标进行模拟。就像之前食谱中的高速公路模拟一样，你可以通过导航到\
  \ `Debug` ![Image](img/U001.jpg) `Location` ![Image](img/U001.jpg) `Custom Location…`\
  \ 来输入自定义坐标，然后在此处输入你自己的坐标进行测试。\n\n## 食谱 4–6：反向地理编码与正向地理编码\n\n位置坐标对应用程序很有用，但对人类来说并不友好。你上一次用经纬度坐标写地址是什么时候？这实在不便于人类理解。人类的位置通常用国家、州、城市等名称来表示。因此，当设备用户询问“我在哪里？”时，用户并不想知道\
  \ GPS 坐标，而是想知道自己所在的城镇或城市。\n\n幸运的是，Apple 提供了一种将位置坐标转换为人类可读格式的方法。这种方法称为反向地理编码，iOS\
  \ 5 中的 `Core Location` 框架提供了这一功能。在 iOS 5 之前的版本中，`Map Kit` 框架提供了此功能。\n\n以下是使用反向地理编码时需要注意的一些最佳实践：\n\
  \n-   一次只应发送一个地理编码请求。\n-   如果用户执行的操作会导致对同一位置进行地理编码，应重用结果，而不是多次请求同一位置。\n-   每分钟发送的地理编码请求不应超过一个。在发起下一个地理编码请求之前，应检查用户是否移动了足够远的距离。\n\
  -   如果用户看不到结果（例如，你的应用程序在后台运行），请不要执行地理编码请求。\n-   设备必须具有网络访问权限才能执行地理编码请求。\n\n地理编码使用\
  \ `CLGeocoder` 类执行。你实例化一个 `CLGeocoder` 对象，然后向其传递一个坐标和一个代码块，该代码块在地理编码完成后执行。这与目前讨论的其他使用委托方法的位置食谱略有不同。\n\
  \n让我们创建一个名为“Chapter4Geocoder”的新单视图应用程序，它将告诉我们所在的位置。如果你可以指定类前缀，请使用相同的名称“Chapter4Geocoder”。通过在导航器窗格中选择项目并选择目标，将\
  \ `Core Location` 框架添加到应用程序中。现在单击 `Build Settings` 选项卡，展开标记为 `Link Binary With Libraries`\
  \ 的区域，然后像之前食谱中那样添加 `Core Location` 框架。\n\n选择 `Chapter4GeocoderViewController.xib`\
  \ 文件以加载 Interface Builder，并向 XIB 添加一个 `UILabel` 和一个圆角 `UIButton`，如图 4–26 所示。\n\n\
  ![Image](img/9781430240051_Fig04-26.jpg)\n\n**图 4–26.** *地理编码用户界面*\n\n使用助理编辑器，按住\
  \ `^` 键将 `UILabel` 拖拽到接口文件（`.h`）中，以创建一个名为 `labelGeocodeInfo` 的插座变量。对 `UIButton`\
  \ 重复此过程，创建一个名为 `actionWhereAmI` 的操作。图 4–27、4–28 和 4–29 展示了这些步骤。\n\n![Image](img/9781430240051_Fig04-27.jpg)\n\
  \n**图 4–27.** *连接你的 `UILabel` 的插座变量*\n\n![Image](img/9781430240051_Fig04-28.jpg)\n\
  \n**图 4–28.** *连接 `UISwitch` 的操作*\n\n![Image](img/9781430240051_Fig04-29.jpg)\n\n\
  **图 4–29.** *配置操作的创建*\n\n将 `Core Location` 库导入 `Chapter4GeocoderViewController`\
  \ 接口文件（`.h`），并将视图控制器定义为遵循 `CLLocationManagerDelegate` 协议。这仅用于获取设备的当前位置，对于地理编码并非必需。\n\
  \n你还需要创建一个 `CLLocationManager` 类的实例变量来获取设备的当前位置，以及一个 `CLGeocoder` 的实例来执行地理编码。完成后，接口文件应如下所示：\n\
  \n```objc\n//  Chapter4GeocoderViewController.h\n\n#import <UIKit/UIKit.h>\n#import\
  \ <CoreLocation/CoreLocation.h>\n\n@interface Chapter4GeocoderViewController : UIViewController\n\
  <CLLocationManagerDelegate> {\n    CLLocationManager *_locationManager;\n    CLGeocoder\
  \ *_geoCoder;\n    UILabel *labelGeocodeInfo;\n}\n```\n\n\n\n`@property (strong,\
  \ nonatomic) IBOutlet UILabel *labelGeocodeInfo;`\n`- (IBAction)actionWhereAmI:(id)sender;`\n\
  `@end`\n\n切换到 `Chapter4GeocoderViewController` 的实现文件 (`.m`)，滚动到底部以实现 `actionWhereAmI`\
  \ 方法。由于本章之前的文章中已经介绍过这部分内容，在此不再赘述，不过我会重点强调一些关键点。你应该遵循地理编码的最佳实践，不要对距离已编码位置过近或时间过近的位置进行地理编码。因此，你需要在\
  \ `CLLocationManager` 对象上将其 `distanceFilter` 属性设置为 500 米。同时，将期望精度设置为常量 `kCLLocationAccuracyHundredMeters`，以便从位置跟踪服务中获得更快的响应，并限制电池消耗。\n\
  \n```objc\n- (IBAction)actionWhereAmI:(id)sender {\n    if([CLLocationManager locationServicesEnabled]){\n\
  \        if([sender isKindOfClass:[UIButton class]]){\n            if(_locationManager==nil){\n\
  \                _locationManager=[[CLLocationManager alloc] init];\n          \
  \      _locationManager.purpose=@\"为你提供当前位置信息\";\n                _locationManager.delegate=self;\n\
  \                _locationManager.distanceFilter=500;\n                _locationManager.desiredAccuracy=kCLLocationAccuracyHundredMeters;\n\
  \            }\n            [_locationManager startUpdatingLocation];\n        \
  \    self.labelGeocodeInfo.text=@\"获取位置中…\";\n        }\n    }else{\n        self.labelGeocodeInfo.text=@\"\
  位置服务不可用\";\n    }\n}\n```\n\n现在，你需要为 `CLLocationManager` 对象添加代理方法。第一个是 `didFailWithError`\
  \ 方法：\n\n```objc\n-(void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError\
  \ *)error{\n    if(error.code==kCLErrorDenied){\n        self.labelGeocodeInfo.text=@\"\
  位置信息访问被拒绝\";\n    }\n}\n```\n\n接下来是待定义的 `didUpdateToLocation` 代理方法。首先进行标准检查，确保 `newLocation`\
  \ 的时间戳属性是最近且精确的：\n\n```objc\n-(void)locationManager:(CLLocationManager *)manager\
  \ didUpdateToLocation:(CLLocation *)newLocation fromLocation:(CLLocation *)oldLocation{\n\
  \    NSDate *locationDate=newLocation.timestamp;\n    NSTimeInterval locationInterval=[locationDate\
  \ timeIntervalSinceNow];\n    if(abs(locationInterval)<30){\n        if(newLocation.horizontalAccuracy<0)\n\
  \            return;\n```\n\n你需要检查 `_geoCoder` 实例变量是否已实例化，如果没有，则创建它。然后，在执行新的地理编码之前，确保停止任何现有的地理编码服务：\n\
  \n```objc\n//如果尚未实例化，则实例化 _geoCoder\nif(_geoCoder==nil)\n_geoCoder=[[CLGeocoder\
  \ alloc] init];\n\n//每个操作只允许一个地理编码实例\n//因此，在开始新的地理编码操作前，先停止之前的操作\nif([_geoCoder\
  \ isGeocoding])\n[_geoCoder cancelGeocode];\n```\n\n最后，启动反向地理编码过程并定义完成处理程序。完成处理程序接收两个对象：一个名为\
  \ `placemarks` 的 `NSArray`（包含 `CLPlacemarks` 对象）和一个 `NSError`。如果数组中包含一个或多个对象，则表示反向地理编码成功。如果没有，则可以检查错误码以获取详细信息。最终的\
  \ `didUpdateToLocation` 方法如下：\n\n```objc\n-(void)locationManager:(CLLocationManager\
  \ *)manager didUpdateToLocation:(CLLocation *)newLocation fromLocation:(CLLocation\
  \ *)oldLocation{\n    NSDate *locationDate=newLocation.timestamp;\n    NSTimeInterval\
  \ locationInterval=[locationDate timeIntervalSinceNow];\n    if(abs(locationInterval)<30){\n\
  \        if(newLocation.horizontalAccuracy<0)\n            return;\n\n        //如果尚未实例化，则实例化\
  \ _geoCoder\n        if(_geoCoder==nil)\n            _geoCoder=[[CLGeocoder alloc]\
  \ init];\n\n        //每个操作只允许一个地理编码实例！\n        //因此，在开始新的地理编码操作前，先停止之前的操作\n   \
  \     if([_geoCoder isGeocoding])\n            [_geoCoder cancelGeocode];\n\n  \
  \      [_geoCoder reverseGeocodeLocation:newLocation\n                        completionHandler:^(NSArray*\
  \ placemarks, NSError* error){\n                            if([placemarks count]>0){\n\
  \                                CLPlacemark *foundPlacemark=[placemarks objectAtIndex:0];\n\
  \                                self.labelGeocodeInfo.text=[NSString stringWithFormat:@\"\
  你\n当前位于: %@\", foundPlacemark.description];\n                            }else if(error.code==kCLErrorGeocodeCanceled){\n\
  \                                NSLog(@\"地理编码已取消\");\n                        \
  \    }else if(error.code==kCLErrorGeocodeFoundNoResult){\n                     \
  \           self.labelGeocodeInfo.text=@\"未找到地理编码结果\";\n                       \
  \     }else if(error.code==kCLErrorGeocodeFoundPartialResult){\n               \
  \                 self.labelGeocodeInfo.text=@\"部分地理编码结果\";\n                  \
  \          }else{\n                                self.labelGeocodeInfo.text=[NSString\n\
  stringWithFormat:@\"未知错误: %@\", error.description];\n                          \
  \  }\n                        }];\n\n        //停止更新位置，直到用户再次点击按钮\n        [manager\
  \ stopUpdatingLocation];\n    }\n}\n```\n\n测试此应用后，你应该能够接收到设备的位置信息，包括街道名称、城市、国家以及其他有价值的信息。当然，这可以在物理设备上测试，也可以在模拟器中使用之前使用过的相同位置模拟功能进行测试。\n\
  \n### 根据地名获取坐标\n\niOS 5 也引入了正向地理编码功能。这意味着你可以向 `CLGeocoder` 对象传递一个地址，并接收该地址的坐标作为结果。`CLGeocoder`\
  \ 将地址字符串作为参数进行处理，你提供的地址信息越详细，得到的正向地理编码结果就越精确。如果地理编码过程识别出多个可能匹配的坐标，这些坐标将通过 `completionHandler`\
  \ 的 `NSArray` 的 `placemarks` 返回。一个示例实现如下：\n\n```objc\nCLGeocoder *_geoCoder=[[CLGeocoder\
  \ alloc] init];\n[_geoCoder geocodeAddressString:@\"2400 Boston Street, Baltimore,\
  \ MD, USA\"\n        completionHandler:^(NSArray* placemarks, NSError* error){\n\
  \                        for (CLPlacemark* aPlacemark in placemarks)\n         \
  \               {\n                                // 处理 placemark。\n          \
  \              }\n}];\n```\n\n### 总结\n\nCore Location 框架是一个强大的框架，可以被许多应用功能所使用。正如本章所示，你可以确定设备的位置、设备面朝的方向，以及设备进入或离开特定区域的时间。除了这些强大的功能之外，你还可以对地理坐标执行查询，以确定人类可读的位置信息，呈现给你的最终用户，并提供补充服务来执行反向操作。\n\
  \n苹果公司在为开发者提供强大功能的同时，也尊重用户的隐私并注意设备的电池消耗，这之间取得了很好的平衡。作为开发者，我们在开发应用、提供令人兴奋的特性和功能时，也应当对用户保持同样的尊重。在\
  \ `CLLocationManager` 对象上使用 `purpose` 属性以及审慎地使用位置服务，正是朝着正确方向迈出的步骤。\n\n# 第 5 章\n\n\
  \n\n# 地图套件使用指南\n\nMap Kit 框架是一套极其强大且实用的工具集，它为设备提供的位置服务增添了丰富的功能。该框架的核心在于能在应用程序中放置用户可交互的地图，并通过无数其他扩展功能实现近乎完全可定制的地图界面。iOS\
  \ 5 继续提升了 Map Kit 的能力，增强了开发者的开发能力，使基于地图的应用更加动态且实用。\n\n与本书其他章节相同，本章所有项目都应确保已启用 ARC（自动引用计数）。\n\
  \n## 配方 5–1：在地图上显示设备位置\n\n任何 Map Kit 应用的基础核心都是世界地图的实际显示。在本节中，你将了解如何创建一个 Map Kit\
  \ 应用、显示地图，并让地图显示用户的位置。\n\n首先，使用**单视图应用**模板创建一个新项目，如图 图 5–1 所示。\n\n![图片](img/9781430240051_Fig05-01.jpg)\n\
  \n**图 5–1.** *选择单视图应用*\n\n图 5–2 显示了此项目将使用的配置设置。你的 Xcode 版本可能还包含“使用自动引用计数”复选框，请确保始终勾选该复选框。你可以将项目命名为\
  \ `Chapter5Recipe1`。\n\n![图片](img/9781430240051_Fig05-02.jpg)\n\n**图 5–2.** *配置项目*\n\
  \n首先，你需要将 Map Kit 框架和 Core Location 框架添加到项目中。在导航窗格中，选择 `Chapter5Recipe1` 项目文件，然后在编辑器视图中确保已选中\
  \ `Chapter5Recipe1` 目标（如果未选中）。点击`构建阶段`标签，展开`将二进制文件与库链接`部分。点击`+`按钮将框架添加到列表中，如图 图\
  \ 5–3 中高亮所示，并使用弹出的窗口（类似图 5–4）添加所需框架。\n\n![图片](img/9781430240051_Fig05-03.jpg)\n\n\
  **图 5–3.** *点击 + 按钮添加框架*\n\n![图片](img/9781430240051_Fig05-04.jpg)\n\n**图 5–4.**\
  \ *选择 Core Location 和 Map Kit 框架*\n\n添加框架后，可以开始构建界面。从导航窗格中选择视图控制器的 `.xib` 文件，并从对象浏览器中拖拽一个\
  \ `MKMapView` 到工作区，使其填满视图。\n\n接下来，在 `MKMapView` 顶部添加一个 `UILabel`，用于显示设备的纬度和经度。图\
  \ 5–5 展示了用户界面的示例样式。\n\n![图片](img/9781430240051_Fig05-05.jpg)\n\n**图 5–5.** *包含 `MKMapView`\
  \ 和 `UILabel` 的 `.xib` 文件*\n\n使用助理编辑器，通过从 `MKMapView` 按住 ^-键拖拽到 `SBViewController`\
  \ 文件的方式，将 `MKMapView` 连接到 `SBViewController` 接口文件（`.h`），如 图 5–6 和 图 5–7 所示。\n\n\
  **注意：** 如果接口文件未显示在助理编辑器的第二个窗格中，请确保你在工作区中点击了视图控制器。\n\n![图片](img/9781430240051_Fig05-06.jpg)\n\
  \n**图 5–6.** *将 `MKMapView` 连接到 Outlet*\n\n将 `MKMapView` 的 Outlet 命名为 `mapViewUserMap`。\n\
  \n![图片](img/9781430240051_Fig05-07.jpg)\n\n**图 5–7.** *配置地图视图 Outlet*\n\n对 `UILabel`\
  \ 重复相同步骤，并将 Outlet 命名为 `labelUserLocation`。\n\n至此，用户界面已完全设置好，你可以直接专注于接口文件（`.h`）的编写。在导航窗格中选择\
  \ `SBViewController.h` 文件。在进入实现文件之前，需要对此类接口进行两处补充。首先，通过导入语句将 `MapKit/MapKit.h` 框架库添加到类中；其次，将类定义为遵循\
  \ `MKMapViewDelegate` 协议。苹果建议，当你使用 `MapView` 时，应为其指定一个委托对象。完整的接口文件（`.h`）如下所示：\n\n\
  ```\n//  SBViewController.h\n//  Chapter5Recipe1\n#import <UIKit/UIKit.h>\n#import\
  \ <MapKit/MapKit.h>\n\n@interface SBViewController : UIViewController <MKMapViewDelegate>\
  \ {\n    MKMapView *mapViewUserMap;\n    UILabel *labelUserLocation;\n}\n\n@property\
  \ (strong, nonatomic) IBOutlet MKMapView *mapViewUserMap;\n@property (strong, nonatomic)\
  \ IBOutlet UILabel *labelUserLocation;\n\n@end\n```\n\n\n\n切换到实现文件`SBViewController.m`，让我们开始在`viewDidLoad`方法中设置`MKMapView`。每当你使用`MKMapView`对象时，都应设置其委托（delegate）和区域（region）。\n\
  \n区域是当前显示的地图部分，由一个中心坐标以及围绕中心坐标的纬度和经度距离构成。如果你和大多数人一样不习惯用经纬度来思考距离，可以使用`MKCoordinateRegionMakeWithDistance`方法，通过中心坐标和围绕该坐标的米数来创建区域。如果你对公制单位不熟悉，1\
  \ 米比 1 码稍长一点。\n\n在本示例中，我选择将地图初始平移到显示我的家乡马里兰州巴尔的摩。我为该位置定义了一个坐标，然后定义一个包含该中心坐标周围 10\
  \ 公里×10 公里区域的区域。\n\n```\n// 设置 MKMapView 委托\nself.mapViewUserMap.delegate=self;\n\
  \n// 设置 MKMapView 起始区域\nCLLocationCoordinate2D coordinateBaltimore = CLLocationCoordinate2DMake(39.303,\
  \ -76.612);\nself.mapViewUserMap.region=\n    MKCoordinateRegionMakeWithDistance(coordinateBaltimore,\n\
  \                                       10000,\n                               \
  \        10000);\n```\n\n两个可选属性值得一提：`.zoomEnabled`和`.scrollEnabled`。这两个属性分别控制用户与地图的交互，可以防止用户缩放或平移地图。\n\
  \n```\n// 可选控制\n//    self.mapViewUserMap.zoomEnabled=NO;\n//    self.mapViewUserMap.scrollEnabled=NO;\n\
  ```\n\n最后，你需要将地图设置为显示用户位置。这可以通过`.showUserLocation`属性轻松完成。将此属性设置为`YES`将启动核心位置跟踪方法，并提示用户授权该应用程序进行位置跟踪。\n\
  \n**注意：**仅仅因为`showUserLocation`被设置为`YES`，用户的位置不会自动在地图上可见。要判断该位置是否在当前地图区域内可见，请使用`userLocationVisible`属性。\n\
  \n告知地图要显示用户位置后，你还可以通过设置`.userTrackingMode`属性或使用`setUserTrackingMode:animated:`方法告知地图跟踪用户位置。该属性接受三个可能的值：\n\
  \n* `MKUserTrackingModeNone`：不跟踪用户位置；地图可以移动到不包含用户位置的区域。\n* `MKUserTrackingModeFollow`：地图将平移以保持用户位置在中心。地图顶部始终指向北方。如果用户手动平移地图，跟踪将停止。\n\
  * `MKUserTrackingModeFollowWithHeading`：地图将平移以保持用户位置在中心，并且地图会旋转，使得用户朝向位于地图顶部。如果用户手动平移地图，跟踪将停止。\n\
  \n最初，你将`userTrackingMode`设置为`MKUserTrackingModeFollow`，但稍后我将展示如何让用户自行控制跟踪模式。下面的`if`语句将确认设备上已启用位置服务。\n\
  \n```\n// 控制地图上的用户位置\nif ([CLLocationManager locationServicesEnabled])\n{\n    mapViewUserMap.showsUserLocation\
  \ = YES;\n    [mapViewUserMap setUserTrackingMode:MKUserTrackingModeFollow animated:YES];\n\
  }\n```\n\n完整的`viewDidLoad`方法如下所示：\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \n    // 设置 MKMapView 委托\n    self.mapViewUserMap.delegate=self;\n\n    // 设置 MKMapView\
  \ 起始区域\n    CLLocationCoordinate2D coordinateBaltimore = CLLocationCoordinate2DMake(39.303,\
  \ -76.612);\n    self.mapViewUserMap.region=\n        MKCoordinateRegionMakeWithDistance(coordinateBaltimore,\n\
  \                                           10000,\n                           \
  \                10000);\n\n    // 可选控制\n    //    self.mapViewUserMap.zoomEnabled=NO;\n\
  \    //    self.mapViewUserMap.scrollEnabled=NO;\n\n    // 控制地图上的用户位置\n    if ([CLLocationManager\
  \ locationServicesEnabled])\n    {\n        mapViewUserMap.showsUserLocation = YES;\n\
  \        [mapViewUserMap setUserTrackingMode:MKUserTrackingModeFollow animated:YES];\n\
  \    }\n}\n```\n\n下一个重要的事情是`viewDidUnload`方法。每当你为一个对象设置委托时，应该在释放该对象之前将委托设为`nil`，以避免任何内存问题。因此，你需要在`viewDidUnload`中添加一行，将`self.mapViewUserMap`的委托设为`nil`：\n\
  \n```\n- (void)viewDidUnload\n{\n    self.mapViewUserMap.delegate=nil;\n    [self\
  \ setMapViewUserMap:nil];\n    [self setLabelUserLocation:nil];\n    [super viewDidUnload];\n\
  }\n```\n\n最后要做的事情是设置一个`mapView`委托方法，以更新显示用户当前位置的标签。你将使用`-mapView:didUpdateUserLocation:`委托方法。你的方法实现如下：\n\
  \n```\n-(void)mapView:(MKMapView *)mapView didUpdateUserLocation:(MKUserLocation\
  \ *)userLocation{\n    self.labelUserLocation.text=\n        [NSString\n       \
  \     stringWithFormat:@\"Current Location: %.5f°, %.5f°\",\n                userLocation.coordinate.latitude,\n\
  \                userLocation.coordinate.longitude];\n}\n```\n\n你已经有了足够的起点，现在可以在模拟器上运行你的应用。你可以使用键盘快捷键`⌘R`来运行应用。当应用在模拟器上启动时，系统将提示用户允许该应用访问其位置。图\
  \ 5–8 显示了你的应用程序展示这个确切的提示信息。\n\n![Image](img/9781430240051_Fig05-08.jpg)\n\n**图 5–8.**\
  \ *应用程序访问位置的提示*\n\n如果你点击“OK”，并且在你的设备上看到巴尔的摩市（但地图上没有你的位置标记），那么你可能需要启动位置调试服务。在模拟器上，前往菜单选项**Debug**\
  \ ![Image](img/U001.jpg) **Location** ![Image](img/U001.jpg) **Freeway Drive**，这将启动模拟器上的位置模拟服务。地图应平移到新位置（在加利福尼亚州记录的一段驾驶路线）并更新位置标签。\n\
  \n用户在本示例中会遇到的其中一个问题是：如果他们尝试手动平移地图，用户位置跟踪就会停止。Apple 提供了一个新的`UIBarButtonItem`类，名为`MKUserTrackingBarButtonItem`。此按钮可以添加到任何`UIToolBar`或`UINavigationBar`中，并会在指定的地图视图上切换用户跟踪模式。\n\
  \n你可以通过使用`initWithMapView:`方法，将你想要控制的`MKMapView`传递给`MKUserTrackingBarButtonItem`来进行初始化。\n\
  \n为此，你需要在 Interface Builder 中向你的`.xib`文件添加一个`UIToolbar`，并为其创建一个名为`toolbarMapTools`的插座。你可以删除工具栏默认添加的`BarButtonItem`，否则你的`viewDidLoad`方法会覆盖它。如果你从`.xib`文件中删除它，你的用户界面将类似于图\
  \ 5–9。\n\n![Image](img/9781430240051_Fig05-09.jpg)\n\n**图 5–9.** *向`.xib`底部添加工具栏*\n\
  \n现在你将通过代码添加`MKUserTrackingBarButtonItem`。切换到视图控制器实现文件`SBViewController.m`，并滚动到`viewDidLoad`方法。在`viewDidLoad`底部添加以下代码：\n\
  \n\n\n// 为用户位置追踪控件创建 BarButtonItem\n`MKUserTrackingBarButtonItem *trackingBarButton\
  \ = [[MKUserTrackingBarButtonItem alloc] initWithMapView:self.mapViewUserMap];`\n\
  \n// 将 UserTrackingBarButtonItem 添加到 UIToolbar\n`[self.toolbarMapTools setItems:[NSArray\
  \ arrayWithObject:trackingBarButton] animated:YES];`\n\n借助这个新增的控件，用户可以手动平移地图，然后只需按下这个新的工具栏按钮，即可重新追踪自己的位置。图\
  \ 5–10 演示了你已实现的用户追踪功能。\n\n![Image](img/9781430240051_Fig05-10.jpg)\n\n**图 5–10.**\
  \ *支持平移和用户追踪的模拟应用*\n\n**注意：** `MKUserLocationFollowWithHeading` 在 iOS 模拟器中无法正常工作。\n\
  \n## 范例 5–2：使用大头针标记位置\n\n通常，地图最实用的功能之一，不仅在于能看到用户所在位置，还能看到用户正在寻找的目标位置。为此，你需要在地图上添加标注。本范例将基于前面的范例进行构建。\n\
  \n首先，你需要通过创建 `NSObject` 的子类来定义标注。为此，前往 **文件** ![Image](img/U001.jpg) **新建** ![Image](img/U001.jpg)\
  \ **新建文件**，在 Cocoa Touch 类别下，选择 \"Objective-C class\"，如图 图 5–11 所示。\n\n![Image](img/9781430240051_Fig05-11.jpg)\n\
  \n**图 5–11.** *创建一个充当标注的 Objective-C 类*\n\n为你的类指定一个清晰的名称，比如 \"MyAnnotation\"，并确保它是\
  \ `NSObject` 的子类，如 图 5–10 所示。\n\n![Image](img/9781430240051_Fig05-12.jpg)\n\n**图\
  \ 5–12.** *配置你的 `NSObject` 子类*\n\n点击下一步，然后点击创建，将该类添加到你的项目中。\n\n接下来要做的是让你的 `MyAnnotation`\
  \ 遵循 `MKAnnotation` 协议。这需要在你的头文件中导入 `<MapKit/MapKit.h>`，并添加一个必需的 `coordinate` 属性。你还需要实现可选的\
  \ `title` 和 `subtitle` 属性，并创建一个 `initWithCoordinate` 方法。实现代码如下：\n\n```\n#import\
  \ <Foundation/Foundation.h>\n#import <MapKit/MapKit.h>\n\n@interface MyAnnotation\
  \ : NSObject <MKAnnotation>\n{\n    NSString *title;\n    NSString *subtitle;\n\
  }\n\n@property (nonatomic) CLLocationCoordinate2D coordinate;\n@property (nonatomic,\
  \ copy) NSString *title;\n@property (nonatomic, copy) NSString *subtitle;\n\n-(id)\
  \ initWithCoordinate:(CLLocationCoordinate2D) aCoordinate;\n\n@end\n```\n\n确保在你的\
  \ `MyAnnotation.m` 实现文件中合成这三个属性。该文件内容如下：\n\n```\n#import \"MyAnnotation.h\"\n\n\
  @implementation MyAnnotation\n\n@synthesize coordinate, title, subtitle;\n\n-(id)\
  \ initWithCoordinate:(CLLocationCoordinate2D) aCoordinate\n{\n    self=[super init];\n\
  \     if (self){\n        coordinate = aCoordinate;\n    }\n    return self;\n}\n\
  \n@end\n```\n\n现在你需要在你的视图控制器实现文件中，定义你的 `MKMapView` 如何处理标注。为此，你需要实现以下 `- mapView:viewForAnnotation:`\
  \ 方法。此方法与用于创建 `TableView` 单元格视图的方法非常相似。请确保将 `MyAnnotation.h` 导入到你的视图控制器中，否则代码将无法编译。\n\
  \n```\n- (MKAnnotationView *)mapView:(MKMapView *)mapView\nviewForAnnotation:(id<MKAnnotation>)annotation\n\
  {\n    if ([annotation isKindOfClass:[MyAnnotation class]]) //确保不影响用户的位置。\n    {\n\
  \        static NSString *annotationIdentifier=@\"annotationIdentifier\";\n    \
  \    //尝试获取一个未使用的标注，类似于 uitableviewcells\n        MKAnnotationView *annotationView=[self.mapViewUserMap\n\
  dequeueReusableAnnotationViewWithIdentifier:annotationIdentifier];\n        annotationView.annotation\
  \ = annotation;\n        //如果没有可复用的，则创建一个新的\n        if(!annotationView)\n     \
  \   {\n            annotationView=[[MKPinAnnotationView alloc] initWithAnnotation:annotation\n\
  reuseIdentifier:annotationIdentifier];\n        }\n\n        //可选的属性修改\n       \
  \ annotationView.canShowCallout = YES;\n        annotationView.rightCalloutAccessoryView\
  \ = [UIButton\nbuttonWithType:UIButtonTypeDetailDisclosure]; //在标注气泡右侧创建按钮\n   \
  \     return annotationView;\n    }\n    return nil;\n}\n```\n\n你的两个可选属性 `canShowCallout`\
  \ 和 `rightCalloutAccessoryView` 对于制作交互式地图非常有用。第一个属性使得按下大头针时弹出一个小标注气泡，第二个属性则改变标注气泡右侧的外观。默认情况下，标注气泡中的文本是标注的标题和副标题，这意味着如果你打算显示标注气泡，你的标注应该至少包含一个标题。\n\
  \n最后，最后一步是创建带有信息的标注并将其添加到地图中。你创建一个可变数组来存储你的标注，然后将标注数组添加到你的 `mapView` 中，代码如下。这段代码应放在你的\
  \ `viewDidLoad` 方法中。\n\n```\n//创建并添加标注\n    NSMutableArray *annotations = [[NSMutableArray\
  \ alloc] initWithCapacity:2];    \n    MyAnnotation *ann1 = [[MyAnnotation alloc]\n\
  initWithCoordinate:CLLocationCoordinate2DMake(25.802, -80.132)];\n    ann1.title\
  \ = @\"迈阿密\";\n    ann1.subtitle = @\"标注 1\";\n    MyAnnotation *ann2 = [[MyAnnotation\
  \ alloc]\ninitWithCoordinate:CLLocationCoordinate2DMake(39.733, -105.018)];\n  \
  \  ann2.title = @\"丹佛\";\n    ann2.subtitle = @\"标注 2\";    \n    [annotations addObject:ann1];\n\
  \    [annotations addObject:ann2];\n\n    [self.mapViewUserMap addAnnotations:annotations];\n\
  ```\n\n我选择让大头针落在迈阿密和丹佛，但任何坐标都能正常工作。如果你现在运行这个应用，你应该能看到常规的地图，不过上面插了几根大头针，如 图 5–13\
  \ 所示。你可能需要缩小地图才能看到它们；在模拟器中，可以通过按住 ![Image](img/U004.jpg) 模拟捏合手势并拖动来实现缩放。\n\n![Image](img/9781430240051_Fig05-13.jpg)\n\
  \n**图 5–13.** *带有地图和大头针的应用*\n\n很多时候，让应用的地图标注可以通过在地图上拖拽来移动，这可能非常有用。实现这一功能极其简单，只需在你的\
  \ `-viewForAnnotation:` 委托方法中添加一行代码即可：\n\n`annotationView.draggable = YES;`\n\n\
  只要你合成了标注的 `coordinate` 属性，你的大头针（或你决定使用的任何其他 `AnnotationView`）就变得可拖拽了。\n\n\n\n###\
  \ 食谱 5–3：创建自定义标注\n\n虽然大多数情况下，默认的 `MKPinAnnotationView` 对象非常有用，但有时你可能希望在地图上使用不同的图像来代替图钉来表示标注。这可以是代表朋友家乡的朋友头像，也可以是代表公司位置的公司\
  \ Logo。为了创建自定义标注视图，你需要继承 `MKAnnotationView` 类。你还将自定义标注弹窗，使其显示不仅仅是标题和副标题。\n\n首先，你需要像本章前面那样创建项目，将其命名为\
  \ `customAnnotationViews`，并添加 Map Kit 和 Core Location 框架。然后，将 Map Kit 添加到视图控制器中，确保使用\
  \ `#import` 语句导入 `<MapKit/MapKit.h>` 和 `<CoreLocation/CoreLocation.h>`，并将视图控制器设置为遵循\
  \ `MKMapViewDelegate` 协议（有关如何执行这些任务，请参阅本章开头）。你还需要通过修改`-viewDidLoad`方法来设置 `MapView`\
  \ 的委托为你的视图控制器，具体如下：\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n \
  \   self.mapViewUserMap.delegate = self;\n}\n```\n\n在进一步操作之前，你需要将要用作图钉替代图像的图片导入到项目中。为此，我选择了一个名为\
  \ `avatar.png` 的小图片，如下面的图 5–14 所示。\n\n![Image](img/9781430240051_Fig05-14.jpg)\n\
  \n**图 5–14.** *自定义标注图像*\n\n显然，这张图片对于地图来说太大了，所以你稍后会将其缩小。\n\n导入文件的最佳方式是直接将文件从 Finder\
  \ 拖拽到你的导航窗格中。我倾向于将此类文件放在 Supporting Files 组下。在出现的对话框中，确保勾选“将项目复制到目标组的文件夹中（如果需要）”选项。图\
  \ 5–15 应该类似于显示此选项的窗口，该特定复选框位于顶部。\n\n![Image](img/9781430240051_Fig05-15.jpg)\n\n\
  **图 5–15.** *添加文件时确保勾选“复制项目”复选框*\n\n接下来，你将创建标注类。选择**File** ![Image](img/U001.jpg)\
  \ **New** ![Image](img/U001.jpg) **New File**…，然后在“Cocoa Touch”下选择“Objective-C class”。在下一个屏幕中，将类命名为\
  \ `MyAnnotation`，并确保它是 `NSObject` 的子类。图 5–16 显示了此配置。\n\n![Image](img/9781430240051_Fig05-16.jpg)\n\
  \n**图 5–16.** *继承 `NSObject` 以创建标注*\n\n单击 Next 然后 Create 后，你将开始编辑此类。\n\n首先需要做的，是用以下行引入框架：\n\
  \n```\n#import <CoreLocation/CoreLocation.h>\n#import <MapKit/MapKit.h>\n```\n\n\
  接下来，你需要确保你的类遵循 `MKAnnotation` 协议。为此，在类的头部添加 `<MKAnnotation>`，并声明三个属性：`coordinate`、`title`\
  \ 和 `subtitle`。你还将声明一个指定的初始化方法，以便通过坐标创建标注。完成所有这些更改后，你的头文件将如下所示：\n\n```\n#import\
  \ <Foundation/Foundation.h>\n#import <CoreLocation/CoreLocation.h>\n#import <MapKit/MapKit.h>\n\
  \n@interface MyAnnotation : NSObject <MKAnnotation>\n\n@property (nonatomic) CLLocationCoordinate2D\
  \ coordinate;\n@property (nonatomic, copy) NSString *title;\n@property (nonatomic,\
  \ copy) NSString *subtitle;\n\n-(id)initWithCoordinate:(CLLocationCoordinate2D)coord;\n\
  @end\n```\n\n现在，你只需构建实现文件。由于你通过这些标注所做的操作并不复杂，仅仅涉及它们的视图，所以你的 `MyAnnotation.m` 文件将如下所示：\n\
  \n```\n#import \"MyAnnotation.h\"\n\n@implementation MyAnnotation\n\n@synthesize\
  \ coordinate, title, subtitle;\n-(id)initWithCoordinate:(CLLocationCoordinate2D)coord\n\
  {\n    self = [super init];\n    if (self)\n    {\n        self.coordinate = coord;\n\
  \    }\n    return self;\n}\n@end\n```\n\n现在，你可以继续创建 `MKAnnotationView` 的子类了。首先，依次进入\
  \ **File** ![Image](img/U001.jpg) **New** ![Image](img/U001.jpg) **New File**…，然后在“Cocoa\
  \ Touch”下选择“Objective-C class”，与之前一样。在下一个屏幕中，将类命名为 `CustomAnnotationView`。这里的关键是确保正确设置父对象。在“Subclass\
  \ of”下，将 `NSObject` 替换为 `MKAnnotationView`，如图 5–17 所示。\n\n![Image](img/9781430240051_Fig05-17.jpg)\n\
  \n**图 5–17.** *继承 `MKAnnotationView`*\n\n单击 Next 然后 Create 继续。\n\n在 `CustomAnnotationView`\
  \ 的头文件中，你只需要声明一个方法来初始化你的类，因此你的头文件将如下所示：\n\n```\n#import <MapKit/MapKit.h>\n\n@interface\
  \ CustomAnnotationView : MKAnnotationView\n-(id)initWithAnnotation:(id <MKAnnotation>)\
  \ annotation reuseIdentifier:(NSString\n*)annotationIdentifier;\n@end\n```\n\n你可能会注意到，这与\
  \ `MKAnnotationView` 的指定初始化器名称完全相同。这是有意为之，目的是让你的子类化过程尽可能简单。在实现文件中，你将通过调用父类的指定初始化器来启动此方法，就像初始化一个普通的\
  \ `MKAnnotationView` 一样：\n\n```\n-(id)initWithAnnotation:(id <MKAnnotation>) annotation\
  \ reuseIdentifier:(NSString\n*)annotationIdentifier\n{\n    self = [super initWithAnnotation:annotation\
  \ reuseIdentifier:annotationIdentifier];\n    return self;\n}\n```\n\n现在，你可以向这个\
  \ `initWithAnnotation:reuseIdentifier:` 方法中添加代码来定制你的视图。首先，创建将用作视图图像以替代图钉的 `UIImage`，并将其设置为你的图像。\n\
  \n```\nUIImage *myImage = [UIImage imageNamed:@\"avatar.png\"];\nself.image = myImage;\n\
  ```\n\n你使用的图像尺寸很可能不适合在地图上使用。为了解决这个问题，你可以通过设置视图的 frame 来标准化这些自定义视图的大小，并更改内容缩放模式以达到最佳的图像缩放效果。\n\
  \n```\nself.frame = CGRectMake(0, 0, 40, 40);\nself.contentMode = UIViewContentModeScaleAspectFill;\n\
  ```\n\n如果需要，你还可以使用 `centerOffset` 属性来调整图像相对于坐标的位置。如果你使用的图像有一个特定的点（例如图钉或箭头）需要精确位于坐标上，这个属性尤其有用。`centerOffset`\
  \ 属性接受一个 `CGPoint` 值，创建该值最简单的方式是通过 `CGPointMake()` 函数。\n\n```\nself.centerOffset\
  \ = CGPointMake(1, 1);\n```\n\n总的来说，你完整的方法，加上一个快速检查以确保标注被正确初始化，将如下所示：\n\n```\n-(id)initWithAnnotation:(id\
  \ <MKAnnotation>) annotation reuseIdentifier:(NSString\n*)annotationIdentifier\n\
  {\n    self = [super initWithAnnotation:annotation reuseIdentifier:annotationIdentifier];\n\
  \    if (self)\n    {\n        //创建要使用的 UIImage。\n        UIImage *myImage = [UIImage\
  \ imageNamed:@\"avatar.png\"];\n        //设置视图的图像\n        self.image = myImage;\n\
  \        //标准化 AnnotationView 的尺寸。\n        self.frame = CGRectMake(0, 0, 40, 40);\n\
  \        //使用 contentMode 确保最佳的图像缩放\n        self.contentMode = UIViewContentModeScaleAspectFill;\n\
  \        //使用 centerOffset 调整图像位置\n        self.centerOffset = CGPointMake(1, 1);\n\
  \n    }\n    return self;\n}\n```\n\n\n**注意：** 所有自定义点都应放置在 `if (self){}` 代码块中，以确保视图已正确初始化。这并非绝对必要，但属于良好的编程实践。如果\
  \ `self` 未正确初始化，该条件将判断为假，导致方法直接返回 `nil`。\n\n现在自定义类已全部设置完成，您可以返回视图控制器来实现地图的代理方法。其实现方式与常规实现几乎完全相同，但需要将\
  \ `MKPinAnnotationView` 创建 `MKAnnotationView` 的类型改为您的 `CustomAnnotationView`。请记住，如果未导入\
  \ `MyAnnotation.h` 和 `CustomAnnotationView.h` 文件，应用程序将无法运行。\n\n```\n- (MKAnnotationView\
  \ *)mapView:(MKMapView *)mapView\nviewForAnnotation:(id<MKAnnotation>)annotation\n\
  {\n    if ([annotation isKindOfClass:[MyAnnotation class]])\n    {\n        static\
  \ NSString *annotationIdentifier=@\"annotationIdentifier\";\n        MKAnnotationView\
  \ *annotationView=[self.mapViewUserMap\ndequeueReusableAnnotationViewWithIdentifier:annotationIdentifier];\n\
          annotationView.annotation = annotation;\n        if(!annotationView)\n        {\n\
              annotationView=[[CustomAnnotationView alloc] initWithAnnotation:annotation\n\
  reuseIdentifier:annotationIdentifier];\n        }\n\n        annotationView.canShowCallout\
  \ = YES;\n        return annotationView;\n    }\n    return nil;\n}\n```\n\n最后，您只需要一些测试数据即可运行。在\
  \ `-viewDidLoad` 方法中，添加以下代码来创建几个标注并将其添加到地图中。为了测试，您还需要为每个标注提供标题和副标题。\n\n```\nMyAnnotation\
  \ *test1 = [[MyAnnotation alloc]\ninitWithCoordinate:CLLocationCoordinate2DMake(37.68,\
  \ -97.33)];\ntest1.title = @\"test1\";\ntest1.subtitle = @\"subtitle\";\nMyAnnotation\
  \ *test2 = [[MyAnnotation alloc]\ninitWithCoordinate:CLLocationCoordinate2DMake(41.500,\
  \ -81.695)];\ntest2.title = @\"test2\";\ntest2.subtitle = @\"subtitle2\";\n[self.mapViewUserMap\
  \ addAnnotation:test1];\n[self.mapViewUserMap addAnnotation:test2];\n```\n\n**注意：**\
  \ 即使 `MKAnnotationView` 的 `canShowCallout` 属性设置为 YES，如果视图的标注未设置标题，信息框也不会显示。副标题是可选的。\n\
  \n此时，运行应用程序，您应该会看到两个标注出现在地图上，并带有您的图片（已缩小到合理尺寸），分别位于堪萨斯州威奇托和俄亥俄州克利夫兰。图 5–18 是该应用的模拟效果。\n\
  \n![图片](img/9781430240051_Fig05-18.jpg)\n\n**图 5–18.** *带地图和自定义标注的应用程序*\n\n现在，您将添加几行额外的代码来定制信息框。\n\
  \n首先，在标注标题和副标题的左侧放置一张图片。这通过使用 `annotationView` 的 `leftCalloutAccessoryView` 属性实现。您的\
  \ `CustomAnnotationView` 类从 `MKAnnotationView` 继承了该属性的 getter 方法，因此我们将重写此方法，使所有自定义视图显示特定图片。您需要在\
  \ `CustomAnnotationView.m` 文件中添加以下方法。\n\n```\n-(UIView *)leftCalloutAccessoryView\n\
  {\n    UIImageView *imageView = [[UIImageView alloc] initWithImage:[UIImage\nimageNamed:@\"\
  avatar.png\"]];\n    imageView.frame = CGRectMake(0, 0, 20, 20);\n    imageView.contentMode\
  \ = UIViewContentModeScaleAspectFill;\n    return imageView;\n}\n```\n\n这与您为标注视图设置图片的方式非常相似，但多了一个步骤：需要创建一个\
  \ `UIImageView` 来承载 `avatar.png` 图片。您再次将其缩小（这次更小），然后返回它。由于 `UIImageView` 是 `UIView`\
  \ 的子类，这完全可行。\n\n正如您可以编辑 `leftCalloutAccessoryView` 一样，您也可以在信息框的右侧做同样的事情。这里，您只需放置一个小的展开按钮，该按钮可用于执行进一步的功能。\n\
  \n```\n-(UIView *)rightCalloutAccessoryView\n{\n    return [UIButton buttonWithType:UIButtonTypeDetailDisclosure];\n\
  }\n```\n\n添加此功能后，您的标注信息框将类似于图 5–19 所示。\n\n![图片](img/9781430240051_Fig05-19.jpg)\n\
  \n**图 5–19.** *带自定义标注和信息框的地图*\n\n至此，您的信息框在视觉上已全部设置完成，但信息框内的按钮还蕴含着巨大的潜力，您尚未充分利用。大多数基于地图的应用会在信息框上使用按钮，通常用于将另一个视图控制器推送到屏幕上。以显示特定商业地点在地图上位置的应用为例，它可能允许用户查看特定地点的所有详细信息或图片。\n\
  \n为了增加功能，您将实现地图的另一个代理方法 `-mapView:annotationView:calloutAccessoryControlTapped:`，并让它呈现一个模态视图控制器。出于演示目的，我们将让它只显示您特定标注的标题和副标题，但很容易看出它的应用远不止于此。\n\
  \n首先，创建一个新的视图控制器，用于模态呈现。转到 **文件** ![图片](img/U001.jpg) **新建** ![图片](img/U001.jpg)\
  \ **新建文件…**。在“Cocoa Touch”下，选择“UIViewController subclass”。将文件命名为“DetailViewController”，确保“Targeted\
  \ for iPad”复选框未选中（除非您正在为 iPad 开发），并且“With XIB for User Interface”复选框已选中，如图 5–20\
  \ 所示。\n\n![图片](img/9781430240051_Fig05-20.jpg)\n\n**图 5–20.** *配置详情视图控制器*\n\n接下来，进入\
  \ `DetailViewController` 的 `.xib` 文件，添加标签。从对象库中拖拽两个 `UILabel` 到视图中。将它们分别命名为“title”和“subtitle”。您的用户界面将如图\
  \ 5–21 所示。\n\n![图片](img/9781430240051_Fig05-21.jpg)\n\n**图 5–21.** *`DetailViewController`\
  \ 的 `.xib` 视图*\n\n现在，将这两个标签连接到 `DetailViewController` 的头文件。就像处理 `MKMapView` 一样，按住\
  \ ^ 键并将标签拖拽到头文件中。将它们的属性分别命名为 `titleLabel` 和 `subtitleLabel`。\n\n接下来，在 `DetailViewController`\
  \ 的其余部分中，您需要几个 `NSString` 变量来存储标题和副标题，因此只需将它们声明为实例变量。您还需要声明一个指定的初始化方法，该方法接受两个 `NSString`\
  \ 参数，用于设置标签的文本。您的头文件现在将如下所示：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface DetailViewController\
  \ : UIViewController {\n    UILabel *titleLabel;\n    UILabel *subtitleLabel;\n\
      NSString *myTitle;\n    NSString *mySubtitle;\n}\n\n@property (strong, nonatomic)\
  \ IBOutlet UILabel *titleLabel;\n@property (strong, nonatomic) IBOutlet UILabel\
  \ *subtitleLabel;\n\n-(id)initWithTitle:(NSString *)title subtitle:(NSString *)subtitle;\n\
  @end\n```\n\n指定初始化方法的实现将如下所示：\n\n```\n-(id)initWithTitle:(NSString *)title subtitle:(NSString\
  \ *)subtitle\n{\n    self = [super init];\n    if (self)\n    {\n        myTitle\
  \ = title;\n        mySubtitle = subtitle;\n    }\n    return self;\n}\n```\n\n\
  最后，您需要在 `-viewDidLoad` 方法中添加以下两行代码，以便在视图加载后设置标签的文本。\n\n```\nself.titleLabel.text\
  \ = myTitle;\nself.subtitleLabel.text = mySubtitle;\n```\n\n\n\n最后，你准备在主导航视图控制器中实现地图的委托方法。在这个方法中，你将创建\
  \ `DetailViewController` 并为其提供必要的文本，将其设置为仅执行部分卷曲过渡，然后展示它。使用 `#import \"DetailViewController.h\"\
  ` 正确导入头文件后，你的方法实现将如下所示：\n\n```\n-(void)mapView:(MKMapView *)mapView annotationView:(MKAnnotationView\
  \ *)view\ncalloutAccessoryControlTapped:(UIControl *)control\n{\n    MyAnnotation\
  \ *ann = view.annotation;\n    DetailViewController *dvc = [[DetailViewController\
  \ alloc] initWithTitle:ann.title\nsubtitle:ann.subtitle];\n    dvc.modalTransitionStyle\
  \ = UIModalTransitionStylePartialCurl;\n    [self presentViewController:dvc animated:YES\
  \ completion:^{}];\n}\n```\n\n**注意：** 必须将变量 `ann` 声明为 `MyAnnotation` 的实例，以确保编译器知道你正在获取的标注将具有你请求的\
  \ `.title` 和 `.subtitle` 属性。\n\n添加此代码后，当点击详情披露按钮时，你的应用程序应类似于图 5–22。\n\n![Image](img/9781430240051_Fig05-22.jpg)\n\
  \n**图 5–22.** *应用程序响应点击标注气泡*\n\n### 食谱 5–4：向地图添加覆盖层\n\n标注并非唯一能添加到地图上的内容。本食谱将介绍如何向地图添加覆盖层，这些覆盖层可以呈现多种形状，从圆形到多边形再到线条。本食谱将基于本章的第一个食谱进行扩展。\n\
  \n你将为你的 `MapView` 添加两种类型的覆盖层：多边形覆盖层和线条覆盖层。添加这些覆盖层的过程与添加标注非常相似，但你不必像处理标注那样为覆盖层创建单独的类。\n\
  \n首先，你将实现 `MapView` 的委托方法，以告诉你的 `MapView` 如何处理覆盖层。你将设置方法，通过使用 `class` 方法来检查覆盖层的类型，从而处理多边形和线条。\n\
  \n```\n-(MKOverlayView *)mapView:(MKMapView *)mapView viewForOverlay:(id )overlay{\n\
  \    if([overlay isKindOfClass:[MKPolygon class]]){\n        MKPolygonView *view\
  \ = [[MKPolygonView alloc] initWithOverlay:overlay];\n\n        //显示设置\n       \
  \ view.lineWidth=1;\n        view.strokeColor=[UIColor blueColor];\n        view.fillColor=[[UIColor\
  \ blueColor] colorWithAlphaComponent:0.5];\n        return view;\n    }\n    else\
  \ if ([overlay isKindOfClass:[MKPolyline class]])\n    {\n        MKPolylineView\
  \ *view = [[MKPolylineView alloc] initWithOverlay:overlay];\n\n        //显示设置\n\
  \        view.lineWidth = 3;\n        view.strokeColor = [UIColor blueColor];\n\
  \        return view;\n    }\n    return nil;\n}\n```\n\n现在，你只需创建覆盖层并将它们添加到 `MapView`\
  \ 中，通过将以下代码添加到 `-viewDidLoad` 中。\n\n```\n//创建并添加覆盖层\n    NSMutableArray *overlays\
  \ = [[NSMutableArray alloc] initWithCapacity:2];\n    CLLocationCoordinate2D polyCoords[5]={\n\
  \        CLLocationCoordinate2DMake(39.9, -76.6),\n        CLLocationCoordinate2DMake(36.7,\
  \ -84.0),\n        CLLocationCoordinate2DMake(33.1, -89.4),\n        CLLocationCoordinate2DMake(27.3,\
  \ -80.8),\n        CLLocationCoordinate2DMake(39.9, -76.6)\n    };\n    MKPolygon\
  \ *Poly = [MKPolygon polygonWithCoordinates:polyCoords count:5];\n    [overlays\
  \ addObject:Poly];\n    CLLocationCoordinate2D pathCoords[2] = {\n        CLLocationCoordinate2DMake(46.8,\
  \ -100.8),\n        CLLocationCoordinate2DMake(43.7, -70.4)\n    };\n    MKPolyline\
  \ *pathLine = [MKPolyline polylineWithCoordinates:pathCoords count:2];\n    [overlays\
  \ addObject:pathLine];\n    [self.mapViewUserMap addOverlays:overlays];\n```\n\n\
  **警告：** 在创建 `MKPolygon` 时，你的最后一个坐标点应与第一个坐标点相同。否则，你将无法获得正确的形状。\n\n现在运行应用程序，当你缩小地图时，应该会看到图\
  \ 5–23 中的画面。你还会注意到，我们设置的多边形和线条在形状和位置上相当奇怪，因为这仅仅是为了演示你在 `MapView` 上可以使用覆盖层做些什么。\n\
  \n![Image](img/9781430240051_Fig05-23.jpg)\n\n**图 5–23.** *带有几何图形和路径覆盖层的地图*\n\n\
  覆盖层在 Map Kit 应用中非常有用，而且也非常容易自定义。大多数属性（例如颜色或线宽）都可以更改，从而允许你完全自定义应用的外观和行为。覆盖层也可以通过圆形以及其他用户定义的形状来创建。有关如何使用这些其他功能的详细信息，请参考\
  \ Apple 文档。\n\n\n\n#### 方案 5-5：按位置对标注进行分组\n\n在地图视图上使用标注时，一个常见问题是大量标注可能彼此非常接近，导致屏幕杂乱，使应用难以使用。解决方案是基于位置和可见地图的大小对标注进行分组。你将使用一个简单的算法，每次可见区域发生变化时都会比较位置坐标。\n\
  \n首先，你需要创建项目，将其命名为“HotspotMap”，类前缀为“CSD”，添加`Map Kit`和`Core Location`框架，并确保在类中导入它们。有关具体操作步骤，请参考本章的方案\
  \ 5-1。\n\n如同向地图添加标注时所必需的（参见方案 5-2），你需要创建一个遵守`MKAnnotation`协议的`NSObject`子类。通过创建新文件，选择“Objective-C\
  \ class”，并确保它是`NSObject`的子类来创建该类。你将把这个类命名为“`Hotspot`”，如图 5-24 所示。\n\n![Image](img/9781430240051_Fig05-24.jpg)\n\
  \n**图 5-24.** *配置`Hotspot`类*\n\n你将用几个不同的属性来定义你的类。由于它遵守`MKAnnotation`协议，你将需要一个`coordinate`属性，以及两个`NSString`属性：`title`和`subtitle`。你还需要一个指定初始化方法来创建带有坐标的标注。你将在头文件中定义这些内容，如下所示：\n\
  \n```objc\n#import <Foundation/Foundation.h>\n#import <MapKit/MapKit.h>\n#import\
  \ <CoreLocation/CoreLocation.h>\n\n@interface Hotspot : NSObject <MKAnnotation>\n\
  \n@property (nonatomic) CLLocationCoordinate2D coordinate;\n@property (nonatomic,\
  \ copy) NSString *title;\n@property (nonatomic, copy) NSString *subtitle;\n-(id)initWithCoordinate:(CLLocationCoordinate2D)\
  \ c;\n\n@end\n```\n\n**注意：** 请密切关注此代码中的导入语句，以及接口头文件中的协议指令`<MKAnnotation>`。没有这些，你的应用将无法正常运行。\n\
  \n现在，你只需在你的`.m`文件中综合这些属性并实现你的初始化方法，如下所示：\n\n```objc\n@synthesize coordinate, title,\
  \ subtitle;\n-(id)initWithCoordinate:(CLLocationCoordinate2D) c\n{\n    self=[super\
  \ init];\n    if(self){\n        coordinate = c;\n    }\n    return self;\n}\n```\n\
  \n接下来，你将转到视图控制器。首先要做的是使用 Interface Builder 放入你的`MapView`，并将其链接到你的头文件。在这个示例中，我将你的`MKMapView`命名为“mapViewUserMap”。（如何操作请参考本章的方案\
  \ 5-1。）同时，确保在`-viewDidLoad`方法中将你的`MapView`的委托设置为视图控制器，使用如下代码行：\n\n```objc\nself.mapViewUserMap.delegate\
  \ = self;\n```\n\n在整个程序中，你还需要一些辅助变量。首先，你需要一个`CLLocationDegrees`类型的变量，用于跟踪当前的缩放级别。其次，你需要一个可变数组属性，用于存储所有的热点。你的头文件将如下所示：\n\
  \n```objc\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n\n#import \"Hotspot.h\"\
  \n\n@interface CSDViewController : UIViewController <MKMapViewDelegate>\n{\n   \
  \ MKMapView *mapViewUserMap;\n    CLLocationDegrees zoom;\n}\n\n@property (strong,\
  \ nonatomic) IBOutlet MKMapView *mapViewUserMap;\n@property (strong, nonatomic)\
  \ NSMutableArray *places;\n@end\n```\n\n接下来，在你的实现文件中，在综合了`places`属性之后，你将定义一些常量来设置起始坐标和分组参数。这些常量还将用于帮助生成一些随机位置以便演示。将以下语句放在`.m`文件中你的导入语句之前。\n\
  \n```objc\n#define centerLat  39.2953\n#define centerLong -76.614\n#define spanDeltaLat\
  \    4.9\n#define spanDeltaLong   5.8\n#define scaleLat   9.0\n#define scaleLong\
  \   11.0\n```\n\n在继续之前，你需要记住处理作为属性的`NSArray`时一个非常重要的方面：它们不会在综合的访问器方法中自动分配或初始化自己。你需要定义自己的访问器方法，以便实现数组的惰性实例化。由于你很快将创建\
  \ 1,000 个测试位置，你将给数组一个初始容量为 1,000，如下所示：\n\n```objc\n-(NSMutableArray *)places\n{\n\
  \    if (!places)\n    {\n        places = [[NSMutableArray alloc] initWithCapacity:1000];\n\
  \    }\n    return places;\n}\n```\n\n接下来，你需要一些测试数据。以下两个方法将为你生成 1,000 个可用的热点，它们彼此之间距离相当接近，这样你就可以看到你正在处理的是何种问题。\n\
  \n```objc\n-(float)RandomFloatStart:(float)a end:(float)b\n{\n    float random =\
  \ ((float) rand()) / (float) RAND_MAX;\n    float diff = b - a;\n    float r = random\
  \ * diff;\n    return a + r;\n}\n-(void)loadDummyPlaces\n{\n    srand((unsigned)time(0));\n\
  \n    for (int i=0; i<1000; i++)\n    {\n        Hotspot *place=[[Hotspot alloc]\n\
  initWithCoordinate:CLLocationCoordinate2DMake([self RandomFloatStart:37.0\nend:42.0],[self\
  \ RandomFloatStart:-72.0 end:-79.0])];\n        place.title = [NSString stringWithFormat:@\"\
  Place %d title\",i];\n        place.subtitle = [NSString stringWithFormat:@\"Place\
  \ %d subtitle\",i];\n        [self.places addObject:place];\n    }\n}\n```\n\n现在你有了测试数据，你将确保你的`-viewDidLoad`方法已完全设置好以完成所需工作。它应该如下所示：\n\
  \n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.mapViewUserMap.delegate\
  \ = self;\n    [self loadDummyPlaces];\n    [self.mapViewUserMap addAnnotations:self.places];\
  \ //仅用于设置目的。实现分组后，这行代码将不再需要。\n    CLLocationCoordinate2D centerPoint = {centerLat,\
  \ centerLong};\n        MKCoordinateSpan coordinateSpan = MKCoordinateSpanMake(spanDeltaLat,\n\
  spanDeltaLong);\n        MKCoordinateRegion coordinateRegion = MKCoordinateRegionMake(centerPoint,\n\
  coordinateSpan);\n\n        [self.mapViewUserMap setRegion:coordinateRegion];\n\
  \        [self.mapViewUserMap regionThatFits:coordinateRegion];\n}\n```\n\n在完成初始设置之前，你将跳转到`-viewDidUnload`方法，并添加几行代码以保持内存清洁。如果你以后想在更大的应用中使用此类，以下两行代码将有助于回收内存。\n\
  \n```objc\n[self.places removeAllObjects];\nself.places = nil;\n```\n\n最后，你需要实现你的地图的`viewForAnnotation`方法，以便正确显示大头针。这与之前的方案非常相似，如下所示：\n\
  \n```objc\n- (MKAnnotationView *)mapView:(MKMapView *)mV viewForAnnotation:(id\n\
  <MKAnnotation>)annotation{\n\n    // 如果它是用户位置，则返回 nil。\n    if ([annotation isKindOfClass:[MKUserLocation\
  \ class]]){\n        return nil;\n    }\n        else{\n        static NSString\
  \ *StartPinIdentifier = @\"PinIdentifier\";\n        MKPinAnnotationView *startPin\
  \ = (id)[mV\ndequeueReusableAnnotationViewWithIdentifier:StartPinIdentifier];\n\
  \                if (startPin == nil) {\n            startPin = [[MKPinAnnotationView\
  \ alloc] initWithAnnotation:annotation\nreuseIdentifier:StartPinIdentifier];\n \
  \       }\n        startPin.canShowCallout = YES;\n        return startPin;\n  \
  \      }\n}\n```\n\n此时，如果你运行应用程序，应该会看到一个类似于图 5-25 的视图，它完美地说明了你要解决的问题。现在你已经设置好了测试数据，接下来将着手实现解决方案。\n\
  \n![Image](img/9781430240051_Fig05-25.jpg)\n\n\n\n**图 5–25.** *一张注释过多的地图*\n\n为了正确地遍历你的注释并将它们分组，你需要遍历每个热点并确定其放置方式。如果某个热点靠近已经放置的其他图钉，它就会被视为“已找到”，并从地图上移除。否则，你将把它添加到地图上已有的图钉列表中，并将其作为注释添加到地图本身。以下方法提供了一个高效的实现，应放在视图控制器的\
  \ `.m` 文件中。\n\n```\n-(void)group:(NSArray *)hotspots{\n    float latDelta=self.mapViewUserMap.region.span.latitudeDelta/scaleLat;\n\
  \    float longDelta=self.mapViewUserMap.region.span.longitudeDelta/scaleLong;\n\
  \    NSMutableArray *visibleHotspots=[[NSMutableArray alloc] initWithCapacity:0];\n\
  \n    for (Hotspot *current in hotspots) {\n        CLLocationDegrees lat = current.coordinate.latitude;\n\
  \        CLLocationDegrees longi = current.coordinate.longitude;\n\n        bool\
  \ found=FALSE;\n        for (Hotspot *tempHotspot in visibleHotspots) {\n      \
  \      if(fabs(tempHotspot.coordinate.latitude-lat) < latDelta &&\nfabs(tempHotspot.coordinate.longitude-longi)<longDelta\
  \ ){\n                [self.mapViewUserMap removeAnnotation:current];\n        \
  \        found=TRUE;\n                break;\n            }\n        }\n       \
  \ if (!found) {\n            [visibleHotspots addObject:current];\n            [self.mapViewUserMap\
  \ addAnnotation:current];\n        }\n    }\n}\n```\n\n**注意：** 在此方法中，你使用了 `fabs`\
  \ 函数。这与 `abs` 函数不同，因为它专门用于浮点数。在这里使用 `abs` 函数将导致仅在整数级别的坐标上进行分组，从而导致你的应用无法正常工作。\n\n\
  接下来，你需要处理每当地图可视区域发生变化时，应用重新对点进行分组的问题。通过实现以下委托方法，可以很容易地做到这一点：\n\n```\n-(void)mapView:(MKMapView\
  \ *)mapView regionDidChangeAnimated:(BOOL)animated{\n    if (zoom!=mapView.region.span.longitudeDelta)\
  \ {\n        [self group:places];\n        zoom=mapView.region.span.longitudeDelta;\n\
  \    }\n}\n```\n\n**注意：** 在实现这些方法时，请确保任何使用了 `-group:` 方法的方法都放在其后面实现，否则编译器会报错。解决此问题的另一种方法是在头文件中简单地声明\
  \ `-(void)group(NSArray *)hotspots;`。\n\n此方法将检查用户是否进行了缩放操作，如果是，则相应地重新分组注释。现在，你只需要对\
  \ `-viewDidLoad` 方法做一处修改。你可以移除下面这一行，因为它的功能将由你的 `group:` 方法执行。\n\n`[self.mapViewUserMap\
  \ addAnnotations:self.places];`\n\n实际上，你不应该在 `viewDidLoad` 方法的末尾调用 `[self group:self.places];`，因为当地图首次显示时，你的委托方法\
  \ `-mapView: regionDidChangeAnimated:` 会被调用，并且会自动完成初始分组。\n\n现在运行应用，你会看到地图上的注释显著减少，它们之间保持着一个相对规则的距离，如图\
  \ 图 5–26 所示。当你缩放地图时，注释会随着地图的变化而相应地出现或消失。\n\n![Image](img/9781430240051_Fig05-26.jpg)\n\
  \n**图 5–26.** *按位置分组后的注释*\n\n既然你已成功对注释进行了分组，你可以选择在添加图钉时添加动画效果使其落下，这样分组转换看起来会更加平滑。这可以通过在你的\
  \ `viewForAnnotation:` 方法中，在 “`startPin.canShowCallout = YES;`” 这行代码之后，简单地添加 “`startPin.animatesDrop\
  \ = YES;`” 来实现。\n\n虽然此时你的注释能够正确分组，但出现了一个新问题：你很难区分某个单独的注释代表一个单一热点，还是包含了多个热点。为了解决这个问题，你将增加一种功能，使得热点能够记录它代表的其它热点的数量。\n\
  \n首先，你需要进入 `Hotspot` 类，添加一个 `NSMutableArray` 属性 “`places`”。你还需要添加一些方法定义，稍后将用于管理这个数组。需要将以下几行代码添加到\
  \ “`Hotspot.h`” 中。\n\n```\n@property (nonatomic, strong) NSMutableArray *places;\n\
  -(void)addPlace:(Hotspot *)hotspot;\n-(int)placesCount;\n```\n\n你不仅需要实现这些方法，还需要修改\
  \ `-initWithCoordinate:` 方法，以确保能正确创建你的 `places` 数组。你还需要实现你自己的 `title` 属性的 getter\
  \ 方法，这样标注的标题将显示所代表的热点数量。你的实现文件现在看起来像这样：\n\n```\n#import \"Hotspot.h\"\n@implementation\
  \ Hotspot\n@synthesize coordinate, title, subtitle;\n@synthesize places;\n-(id)initWithCoordinate:(CLLocationCoordinate2D)\
  \ c\n{\n    self=[super init];\n    if(self){\n        coordinate = c;\n       \
  \ self.places = [[NSMutableArray alloc] initWithCapacity:0];\n    }\n    return\
  \ self;\n}\n-(NSString *)title\n{\n    if ([self placesCount] == 1)\n    {\n   \
  \     return title;\n    }\n    else\n        return [NSString stringWithFormat:@\"\
  %i Places\", [self.places count]];\n}\n-(void)addPlace:(Hotspot *)hotspot\n{\n \
  \   [self.places addObject:hotspot];\n}\n-(int)placesCount{\n    return [self.places\
  \ count];\n}\n-(void)cleanPlaces{\n    [self.places removeAllObjects];\n    [self.places\
  \ addObject:self];\n}\n@end\n```\n\n上述 `-placesCount` 方法并非必需，它只是让访问单个热点所代表的地点数量变得稍微简单一些。你的\
  \ `-cleanPlaces` 方法将用于在重新分组注释时重置 places 数组。现在你所要做的就是确保你的 `-group:` 方法正确调用了 `-cleanPlaces`，只需在适当位置添加以下两行代码，你将在后面完整的方法实现中看到它们的位置。\n\
  \n`[hotspots makeObjectsPerformSelector:@selector(cleanPlaces)];`\n`[tempHotspot\
  \ addPlace:current];`\n\n你完整的 `-group:` 方法现在应该如下所示：\n\n```\n-(void)group:(NSArray\
  \ *)hotspots{\n    float latDelta=self.mapViewUserMap.region.span.latitudeDelta/scaleLat;\n\
  \    float longDelta=self.mapViewUserMap.region.span.longitudeDelta/scaleLong;\n\
  \    //新增代码行：\n    [hotspots makeObjectsPerformSelector:@selector(cleanPlaces)];\n\
  \    //新增代码行结束。\n    NSMutableArray *visibleHotspots=[[NSMutableArray alloc] initWithCapacity:0];\n\
  \n    for (Hotspot *current in hotspots) {\n        CLLocationDegrees lat = current.coordinate.latitude;\n\
  \        CLLocationDegrees longi = current.coordinate.longitude;\n        bool found=FALSE;\n\
  \        for (Hotspot *tempHotspot in visibleHotspots) {\n            if(fabs(tempHotspot.coordinate.latitude-lat)\
  \ < latDelta &&\nfabs(tempHotspot.coordinate.longitude-longi)<longDelta ){\n   \
  \             [self.mapViewUserMap removeAnnotation:current];\n                found=TRUE;\n\
  \                //新增代码行：\n                [tempHotspot addPlace:current];\n   \
  \             //新增代码行结束。\n                break;\n            }\n        }\n   \
  \     if (!found) {\n            [visibleHotspots addObject:current];\n        \
  \    [self.mapViewUserMap addAnnotation:current];\n        }\n    }\n}\n```\n\n\n\
  \n现在，你已经有了一种相当简单的方法，通过选中特定热点来判断某个热点是否代表其他热点。但如果你能轻松看出哪些热点是集合，哪些是单个个体，那就更好了。为此，你需要为每个热点提供一个指向自身`MKPinAnnotationView`的指针。这样一来，你就可以根据它们所代表地点的数量来控制其颜色。\n\
  \n首先，在你的热点文件中添加以下属性。不要忘记在`.m`文件中使用`@synthesize`进行合成！\n\n```\n@property (nonatomic,\
  \ strong) MKPinAnnotationView *annotationView;\n```\n\n接下来，你需要告诉地图的委托如何正确显示图钉，如下面`-viewForAnnotation:`方法的新版本所示。\n\
  \n```\n- (MKAnnotationView *)mapView:(MKMapView *)mV viewForAnnotation:(id\n<MKAnnotation>)annotation{\n\
  \n    // 如果是用户位置，直接返回 nil。\n    if ([annotation isKindOfClass:[MKUserLocation class]]){\n\
          return nil;\n    }\n        else{\n        static NSString *StartPinIdentifier\
  \ = @\"PinIdentifier\";\n        MKPinAnnotationView *startPin = (id)[mV\ndequeueReusableAnnotationViewWithIdentifier:StartPinIdentifier];\n\
                  if (startPin == nil) {\n            startPin = [[MKPinAnnotationView\
  \ alloc] initWithAnnotation:annotation\nreuseIdentifier:StartPinIdentifier];      \n\
          }\n        startPin.canShowCallout = YES;\n        startPin.animatesDrop\
  \ = YES;\n        // 新增代码\n        Hotspot *place = annotation;\n        place.annotationView\
  \ = startPin;\n        if ([place placesCount] > 1)\n        {\n            startPin.pinColor\
  \ = MKPinAnnotationColorGreen;\n        }\n        else if ([place placesCount]\
  \ == 1)\n        {\n            startPin.pinColor = MKPinAnnotationColorRed;\n        }\n\
          // 新增代码结束\n        return startPin;\n        }\n}\n```\n\n这将使你的所有标注根据它们是集合还是单个个体，正确地显示为绿色或红色。但是，如果你放大一个绿色的标注，它并不会在从集合变为单个个体时正确地改变颜色。作为最后一步，为了修正这个问题，你需要在`-mapView:regionDidChangeAnimated:`方法中添加代码，根据代表地点的数量来改变图钉颜色，如下所示。\n\
  \n```\n-(void)mapView:(MKMapView *)mapView regionDidChangeAnimated:(BOOL)animated{\n\
      if (zoom!=mapView.region.span.longitudeDelta) {     \n        [self group:places];\n\
          zoom=mapView.region.span.longitudeDelta;\n        // 新增代码\n        NSSet\
  \ *visibleAnnotations = [mapView\nannotationsInMapRect:mapView.visibleMapRect];\n\
          for (Hotspot *place in visibleAnnotations)\n        {\n            if ([place\
  \ placesCount] > 1)\n                place.annotationView.pinColor = MKPinAnnotationColorGreen;\n\
              else\n                place.annotationView.pinColor = MKPinAnnotationColorRed;\n\
          }\n        // 新增代码结束\n    }\n}\n```\n\n现在，任何代表热点集合的图钉都将显示为绿色，而单个热点的图钉则为红色，如图\
  \ 5–27 所示。\n\n![Image](img/9781430240051_Fig05-27.jpg)\n\n**图 5–27.** *带有数量特定颜色的分组标注*\n\
  \n### 总结\n\nMap Kit 框架可能是最常用的框架之一，这纯粹是因为它强大且极其灵活的能力，能够提供一个完全可定制而又简单的地图界面。在本章中，你讨论了\
  \ Map Kit 的主要功能，从定位用户，到添加标注和覆盖层，甚至包括标注分组这一重要问题。然而，你仅仅是触及了 Map Kit 功能的皮毛，特别是在基于地图的问题解决领域。快速浏览\
  \ Map Kit 文档，你会发现各种其他命令、方法和属性，这些内容并未涉及，涵盖范围从隔离地图的特定部分到完全自定义地图如何处理触摸事件。这些无数功能的效力，仅受限于开发者的想象力。\n\
  \n# 第 6 章\n\n# 相机秘籍\n\n有大量移动应用需要与设备相机交互，包括拍摄图像、录制视频，以及提供叠加层（例如增强现实应用）等任务。iOS 开发者在与任何给定设备硬件的交互方式上拥有极大的控制权。在本章中，你将介绍访问和使用这些功能的多种方式，从简单的预定义界面到极其灵活的自定义实现。\n\
  \n**注意：** iOS 模拟器不支持相机硬件。要测试本章中的大多数秘籍，必须在物理设备上运行。\n\n\n\n### 食谱 6-1：拍照\n\niOS 内置了极其便捷且简单易用的界面，通过相当标准的预定义设置，即可使用设备的摄像头。利用这些功能，你可以创建基本的拍照应用，让用户从应用内部拍照和录像。接下来，你将学习启动相机界面以捕捉静态图像的基础知识。\n\
  \n同样，你需要先使用\"单视图应用\"模板创建一个新项目，如图 6-1 所示。\n\n![图片](img/9781430240051_Fig06-01.jpg)\n\
  \n**图 6-1.** *创建单视图应用*\n\n将项目命名为\"Chapter6Recipe1\"。将类前缀设置为`Capture`，如图 6-2 所示，并且如果你的\
  \ Xcode 版本包含该选项，请确保启用\"使用自动引用计数\"。\n\n![图片](img/9781430240051_Fig06-02.jpg)\n\n\
  **图 6-2.** *指定项目设置*\n\n点击\"下一步\"，然后点击\"创建\"以启动项目。\n\n为了通过你将要使用的预定义方式访问摄像头，你不需要向项目中导入任何额外的框架，因此可以直接构建用户界面。\n\
  \n你将创建一个简单的项目，允许你调出摄像头拍照，然后在屏幕上显示最近拍摄的照片。\n\n首先，需要切换到视图控制器的`.xib`文件，如果你使用了与图 6-3\
  \ 相同的命名，该文件将被称为`CaptureViewController.xib`。从屏幕右侧的对象库中，将一个`UIImageView`拖拽到你的视图中，并调整其大小以填充整个视图。接下来，将一个`UIButton`拖入视图，该按钮将用于访问摄像头，因此你需要双击按钮的文本，将其设置为\"\
  Change Image\"。\n\n![图片](img/9781430240051_Fig06-03.jpg)\n\n**图 6-3.** *`CaptureViewControlle`的用户界面*\n\
  \n接下来，通过选择屏幕右上角区域中间的\"编辑\"按钮（如图 6-4 所示），确保你处于\"助理编辑器\"模式。这将允许你同时查看界面文件和头文件，并在它们之间同步工作。\n\
  \n![图片](img/9781430240051_Fig06-04.jpg)\n\n**图 6-4.** *选择助理编辑器*\n\n进入助理编辑器模式后，为你的`UIImageView`创建一个名为`imageViewRecent`的输出口。重复此过程，为你的`UIButton`创建输出口，并命名为`cameraButton`。图\
  \ 6-5 显示了这些操作的结果窗口。\n\n![图片](img/9781430240051_Fig06-05.jpg)\n\n**图 6-5.** *完成连接了输出口和操作的用户界面*\n\
  \n在完成此设置之前，你将通过向头文件中添加方法声明，然后将`UIButton`连接到该方法，来为按钮声明一个按下时执行的操作，命名为`cameraButtonPressed:`。连接时，按住\
  \ ^ (Ctrl) 键，点击按钮，将蓝线拖拽到头文件中的方法名上，然后释放。这样操作时，方法声明会高亮显示，并出现一个显示\"连接操作\"的小消息框。你的方法声明如下所示：\n\
  \n```\n- (IBAction)cameraButtonPressed:(id)sender;\n```\n\n现在界面文件已经组合完成，你可以切换到`CaptureViewController.m`文件进行查看。\n\
  \n为了简单美观，你首先要将`UIImageView`的背景颜色改为灰色，这样当没有设置背景图片时，可以更容易地与`UIButton`区分开。为此，请将以下代码行放入`viewDidLoad`方法中。\n\
  \n```\nself.imageViewRecent.backgroundColor = [UIColor lightGrayColor];\n```\n\n\
  接下来，你将处理应用在按下\"Change Image\"按钮时的行为。由于按钮已经连接到`cameraButtonPressed:`方法，你只需要实现该方法即可。你将使用`UIImagePickerController`类的实例来访问摄像头。\n\
  \n在处理 iOS 上的摄像头硬件时，作为开发者，必须包含一个功能，让应用检查硬件是否可用。这是通过静态的`UIImagePickerController`方法`isSourceTypeAvailable:`实现的，该方法接受几个预定义的常量作为参数。该方法的选项如下：\n\
  \n```\nUIImagePickerControllerSourceTypeCamera\nUIImagePickerControllerSourceTypePhotoLibrary\n\
  UIImagePickerControllerSourceTypeSavedPhotosAlbum\n```\n\n你将在这里使用第一个选项`UIImagePickerControllerSourceTypeCamera`。`UIImagePickerControllerPhotoLibrary`用于访问设备上存储的所有照片，而`UIImagePickerControllerSavedPhotosAlbum`仅用于访问\"\
  相机胶卷\"相册。\n\n对于你的应用，你将在`viewDidLoad`方法中使用以下代码检查相机源类型是否可用，如果不可用，则显示一个`UIAlertView`提示。\n\
  \n```\nif ([UIImagePickerController\nisSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera]\
  \ == NO)\n    {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
  Error\"\nmessage:@\"Camera Unavailable\" delegate:self cancelButtonTitle:@\"Cancel\"\
  \notherButtonTitles:nil, nil];\n        [alert show];\n        return;\n    }\n\
  ```\n\n如果你在模拟器中运行此应用，会注意到此条件始终为真，导致出现错误信息，如图 6-6 所示。如前所述，模拟器没有摄像头功能，因此要全面测试此应用，你需要在物理设备上进行测试。\n\
  \n![图片](img/9781430240051_Fig06-06.jpg)\n\n**图 6-6.** *应用模拟，不支持相机使用*\n\n现在，你可以处理实际期望的情况，即摄像头可用时。首先，创建一个`UIImagePickerController`实例，命名为`imagePicker`。\n\
  \n```\n    UIImagePickerController *imagePicker = [[UIImagePickerController alloc]\
  \ init];\n```\n\n接下来，将`imagePicker`的委托和源类型分别设置为你的视图控制器和`UIImagePickerControllerSourceTypeCamera`。\n\
  \n```\nimagePicker.delegate = self;\n    imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;\n\
  ```\n\n最后，以模态方式呈现你的`UIImagePickerController`。\n\n```\n[self presentModalViewController:imagePicker\
  \ animated:YES];\n```\n\n完整的按钮按下处理方法现在应如下所示：\n\n```\n-(IBAction)cameraButtonPressed:(id)sender\n\
  {\n    if ([UIImagePickerController isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera]\
  \ == NO)\n    {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
  Error\"\nmessage:@\"Camera Unavailable\" delegate:self cancelButtonTitle:@\"Cancel\"\
  \notherButtonTitles:nil, nil];\n        [alert show];\n        return;\n    }\n\
      UIImagePickerController *imagePicker = [[UIImagePickerController alloc] init];\n\
      imagePicker.delegate = self;\n    imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;\n\
      [self presentModalViewController:imagePicker animated:YES];\n}\n```\n\n由于将视图控制器设置为`UIImagePickerController`的委托，你需要确保视图控制器遵循几个协议，特别是`UIImagePickerController`和`UINavigationController`协议。你将这些协议添加到类的头文件中，使其现在看起来如下所示：\n\
  \n\n\n`#import <UIKit/UIKit.h>`\n`@interface CaptureViewController : UIViewController\
  \ <UIImagePickerControllerDelegate, UINavigationControllerDelegate>`\n`{`\n`    UIImageView\
  \ *imageViewRecent;`\n`    UIButton *cameraButton;`\n`}`\n\n`@property (strong,\
  \ nonatomic) IBOutlet UIImageView *imageViewRecent;`\n`@property (strong, nonatomic)\
  \ IBOutlet UIButton *cameraButton;`\n`-(IBAction)cameraButtonPressed:(id)sender;`\n\
  `@end`\n\n现在你已经将视图控制器设置为成功展示`UIImagePickerController`，你需要处理视图控制器如何响应`UIImagePickerController`选择完成后的事件，即拍摄并选定一张图片以供使用时。你将通过委托方法`-imagePickerController:didFinishPickingMediaWithInfo:`来实现这一点。该方法向委托对象提供了一个名为`info`的`NSDictionary`实例，其中的键指向被选中的媒体。\n\
  \n首先，你创建一个`UIImage`实例来指向被选中的图片。\n\n```\nUIImage *originalImage = (UIImage *) [info\n\
  objectForKey:UIImagePickerControllerOriginalImage];\n```\n\n接下来，你将这张图片保存到设备的相册中，以便该图片可以在应用之外使用。或者，如果你不希望应用在测试过程中保存多张图片，可以注释掉这行代码：\n\
  \n```\nUIImageWriteToSavedPhotosAlbum (originalImage, nil, nil , nil);\n```\n\n\
  现在，你将`UIImageView`的图片设置为选中的图片，并同时更改`UIImageView`的内容模式。\n\n```\nself.imageViewRecent.image\
  \ = originalImage;\nself.imageViewRecent.contentMode = UIViewContentModeScaleAspectFill;\n\
  ```\n\n**注意：** `UIImagePickerController`类不支持横屏拍摄照片。你可以通过将`UIImageView`的`contentMode`更改为`UIViewContentModeScaleAspectFill`来补偿这一点，从而使图片填满屏幕。或者，也可以使用`UIViewContentModeScaleAspectFit`将整个横屏图片适配到屏幕上，但不会填满视图。\n\
  \n最后，你将关闭`UIImagePickerController`。\n\n```\n[self dismissModalViewControllerAnimated:YES];\n\
  ```\n\n整体来看，你的委托方法实现如下所示：\n\n```\n- (void) imagePickerController: (UIImagePickerController\
  \ *) picker\n didFinishPickingMediaWithInfo: (NSDictionary *) info\n{\n    UIImage\
  \ *originalImage = (UIImage *) [info objectForKey:\n        UIImagePickerControllerOriginalImage];\n\
      UIImageWriteToSavedPhotosAlbum (originalImage, nil, nil , nil);\n    self.imageViewRecent.image\
  \ = originalImage;\n    self.imageViewRecent.contentMode = UIViewContentModeScaleAspectFill;\n\
      [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n你还需要实现另一个`UIImagePickerController`委托方法，来处理取消图片选择的情况：\n\
  \n```\n- (void) imagePickerControllerDidCancel: (UIImagePickerController *) picker\n\
  {\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n作为可选设置，你还可以让相机界面支持编辑，允许用户裁剪或调整拍摄的图片。为此，你只需将`UIImagePickerController`的`allowsEditing`属性设置为`YES`；为了获取编辑后的图片，你需要将之前`-imagePickerController:didFinishPickingMediaWithInfo:`方法中的前三行代码替换为以下内容：\n\
  \n```\nUIImage *editedImage = (UIImage *)[info\nobjectForKey:UIImagePickerControllerEditedImage];\n\
  UIImageWriteToSavedPhotosAlbum (editedImage, nil, nil , nil);\nself.imageViewRecent.image\
  \ = editedImage;\n```\n\n假设你能够在物理设备上运行此应用，那么你的应用现在应该能够正确访问设备的相机、选择图片并将其设置为背景，如图\
  \ 6-7 所示。\n\n![Image](img/9781430240051_Fig06-07.jpg)\n\n**图 6-7.** *已设置照片为背景的应用*\n\
  \n### 菜谱 6-2：录制视频\n\n实际上，`UIImagePickerController` 的用途远比目前所介绍的更加灵活，尤其是此前你几乎只将其用于静态图片。接下来，你将学习如何设置\
  \ `UIImagePickerController` 以同时处理静态图片和视频。\n\n对于本菜谱，你将基于上一个菜谱中已经搭建好的代码进行开发，因为它已经包含了所需的所有基础设置。你的应用将新增录制和保存视频的功能。\n\
  \n首先，你需要编辑 `UIImagePickerController` 的属性，通过使用 `UIImagePickerController` 的类方法 `+availableMediaTypesForSourceType:`\
  \ 来指定允许的媒体类型，这样你的 `-cameraButtonPressed:` 方法将如下所示：\n\n```\n-(IBAction)cameraButtonPressed:(id)sender\n\
  {\n    if ([UIImagePickerController isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera]\
  \ == NO)\n    {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
  Error\"\nmessage:@\"Camera Unavailable\" delegate:self cancelButtonTitle:@\"Cancel\"\
  \notherButtonTitles:nil, nil];\n        [alert show];\n        return;\n    }\n\
      UIImagePickerController *imagePicker = [[UIImagePickerController alloc] init];\n\
      imagePicker.delegate = self;\n    imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;\n\
      imagePicker.mediaTypes = [UIImagePickerController\navailableMediaTypesForSourceType:UIImagePickerControllerSourceTypeCamera];\n\
      [self presentModalViewController:imagePicker animated:YES];\n}\n```\n\n接下来，你需要指示你的应用如何处理用户录制和使用视频的情况。你将在\
  \ `UIImagePickerController` 的委托方法中添加以下代码：\n\n```\nNSString *mediaType = [info objectForKey:\
  \ UIImagePickerControllerMediaType];\n\n    if (CFStringCompare ((__bridge CFStringRef)\
  \ mediaType, kUTTypeMovie, 0)\n        == kCFCompareEqualTo) {\n\n        NSString\
  \ *moviePath = [[info objectForKey: UIImagePickerControllerMediaURL] path];\n\n\
          if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum (moviePath))\n        {\n\
              UISaveVideoAtPathToSavedPhotosAlbum (moviePath, nil, nil, nil);\n        }\n\
      }\n```\n\n你可能首先会注意到 `kUTTypeMovie` 处出现了一个错误，提示它未定义。要修复此问题，你需要将 Mobile Core Services\
  \ 框架添加到项目中，然后在视图控制器的头文件中添加以下导入语句。如果你不熟悉此过程，菜谱 6-4 的开头部分详细演示了如何向项目添加框架。\n\n```\n\
  #import <MobileCoreServices/MobileCoreServices.h>\n```\n\n本质上，你在这里所做的只是比较保存文件的媒体类型。主要问题在于，你试图将类型为\
  \ `NSString` 的 `mediaType` 与类型为 `CFStringRef` 的 `kUTTypeMovie` 进行比较。你可以通过将 `NSString`\
  \ 向下转型为 `CFStringRef` 来实现这一点。iOS 5 引入了自动引用计数（ARC），这使该过程变得稍微复杂一些，因为 ARC 处理的是 Objective-C\
  \ 对象类型（如 `NSString`），而不是 C 类型（如 `CFStringRef`）。你需要在 `CFStringRef` 前面加上 `__bridge`\
  \ 来创建桥接转换，如上所示，以指示 ARC 不再管理这个对象。\n\n如果一切顺利，你的应用现在应该能够录制视频了！\n\n\n\n### 技巧 6–3：编辑视频\n\
  \n尽管您的 `UIImagePickerController` 提供了一种极其便捷的方式来录制和保存视频文件，但它并不能让您对视频进行编辑。幸运的是，iOS\
  \ 内置了另一个名为 `UIVideoEditorController` 的控制器，您将使用它来让录制的视频能够被编辑。\n\n您将基于第二个项目来构建这个相当简单的技巧，在该项目中您已经为\
  \ `UIImagePickerController` 添加了视频功能。\n\n首先，您需要在视图控制器的界面文件中创建第二个按钮，将其标题设为“Edit Video”，并命名为\
  \ `editButton`。同时，您需要将其连接到名为 `-editButtonPressed:` 的操作上，如图 Figure 6–8 所示。\n\n![Image](img/9781430240051_Fig06-08.jpg)\n\
  \n**图 6–8.** *添加了编辑按钮的新用户界面*\n\n接下来，您需要定义一个 `NSString` 属性来存储最近选择/编辑的视频路径，如图 Figure\
  \ 6–8 右侧所示。请记得使用 `@synthesize` 合成该属性，并在 `-viewDidUnload` 方法中将其设置为 `nil`：\n\n`@property\
  \ (nonatomic, strong) NSString *recentMovie;`\n\n您需要在 `UIImagePickerController`\
  \ 的委托方法中添加一条语句，用于存储最近创建的视频路径，具体方法是添加以下代码行：\n\n`self.recentMovie = moviePath;`\n\n\
  现在，您的委托方法看起来是这样的：\n\n```\n- (void) imagePickerController: (UIImagePickerController\
  \ *) picker\n didFinishPickingMediaWithInfo: (NSDictionary *) info\n{\n    NSString\
  \ *mediaType = [info objectForKey: UIImagePickerControllerMediaType];\n\n    if\
  \ (CFStringCompare ((__bridge CFStringRef) mediaType, kUTTypeMovie, 0)\n       \
  \ == kCFCompareEqualTo) {\n\n        NSString *moviePath = [[info objectForKey:\
  \ UIImagePickerControllerMediaURL]\npath];\n        self.recentMovie = moviePath;\n\
  \n        if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum (moviePath))\n     \
  \   {\n            UISaveVideoAtPathToSavedPhotosAlbum (moviePath, nil, nil, nil);\n\
  \        }\n    }\n\n    else\n    {\n    UIImage *originalImage = (UIImage *) [info\
  \ objectForKey:\n        UIImagePickerControllerOriginalImage];\n\n    UIImageWriteToSavedPhotosAlbum\
  \ (originalImage, nil, nil , nil);\n    self.imageViewRecent.image = originalImage;\n\
  \    }\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n现在您将实现 `-editButtonPressed:`\
  \ 操作，以便在有视频时显示一个可编辑的视频，否则显示一个提示用户错误的警告视图。\n\n```\n-(void)editButtonPressed:(id)sender\n\
  {\n    if (self.recentMovie)\n    {\n        UIVideoEditorController *editor = [[UIVideoEditorController\
  \ alloc] init];\n        editor.videoPath = self.recentMovie;\n        editor.delegate\
  \ = self;\n        [self presentModalViewController:editor animated:YES];\n    }\n\
  \    else\n    {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
  错误\" message:@\"尚未录制视频\" delegate:self cancelButtonTitle:@\"取消\" otherButtonTitles:nil,\
  \ nil];\n        [alert show];\n    }\n}\n```\n\n请记住，此时您需要确保在头文件中将您的视图控制器声明为遵循 `UIVideoEditorControllerDelegate`\
  \ 和 `UINavigationControllerDelegate` 协议。\n\n最后，您只需要为 `UIVideoEditorController` 实现几个委托方法。首先，是一个处理成功编辑/修剪视频的委托方法：\n\
  \n```\n-(void)videoEditorController:(UIVideoEditorController *)editor\ndidSaveEditedVideoToPath:(NSString\
  \ *)editedVideoPath\n{\n    self.recentMovie = editedVideoPath;\n    if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum\
  \ (editedVideoPath))\n    {\n        UISaveVideoAtPathToSavedPhotosAlbum (editedVideoPath,\
  \ nil, nil, nil);\n    }\n    [self dismissModalViewControllerAnimated:YES];\n}\n\
