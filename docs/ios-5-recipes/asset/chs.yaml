  \ 1-16 所示，您需要在此输入关于所做更改的消息，然后再提交。您的提交消息应该是对代码所做更改的描述性摘要，例如“添加了某某功能”。\n\n![Image](img/9781430240051_Fig01-16.jpg)\n\
  \n**图 1-16.** *提交消息*\n\n### 分支与合并\n\n分支是您项目的副本，您可以在其上工作而不会干扰主分支（也称为 master 分支）。它们允许您在不影响主版本的情况下添加功能和修复。\n\
  \n要管理您的仓库，您可以转到 `Window` `Organizer` 或按 ![Image](img/U005.jpg)![Image](img/U003.jpg)2，然后单击“仓库”标签页。在此视图中，您将看到\
