  \ [self.motionManager isGyroActive])\n    {\n        [self.motionManager stopGyroUpdates];\n\
  \    }\nif ([self.motionManager isMagnetometerAvailable] && [self.motionManager\
  \ isMagnetometerActive])\n    {\n        [self.motionManager stopMagnetometerUpdates];\n\
