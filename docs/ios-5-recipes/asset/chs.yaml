  \n**图 12-9.** *用于显示姿态的新界面*\n\n\n\n#### 姿态属性\n\n在使用 `CMAttitude` 类时，你可以从中获取三个最简单的值来判断设备方向。\n\
  \n1. `roll`：表示绕 y 轴旋转的位置\n2. `pitch`：表示绕 x 轴旋转的位置\n3. `yaw`：表示绕 z 轴旋转的位置\n\n这三个值均以弧度为单位测量，这意味着你显示的值范围将从\
  \ 0 到大约 3.14 或 -3.14（即 π 弧度的旋转，相当于 180 度）。\n\n现在你可以再次更新 `-toggleUpdates:` 方法，将新的显示值包含进来。\n\
