  \n![images](img/square.jpg)索引\n\n## 关于作者\n\n![Image](img/shawn_grimes.jpg) 2010\
  \ 年，肖恩·格莱姆斯自学了`Objective-C`和 iOS 开发，并编写了他的第一个适用于 iPad 的 iOS 应用。来自马里兰州巴尔的摩的肖恩，曾就读于马里兰州劳雷尔的国会技术学院，并于\
  \ 2003 年获得软件与互联网应用学士学位。他创立了 Shawn's Bits, LLC，以创建更多应用并为其他有抱负的 iOS 开发者举办研讨会。为了帮助当地开发者，他与克里斯·斯通共同运营着巴尔的摩移动开发者小组。肖恩和妻子斯蒂芬妮共同经营\
  \ Campfire Apps, LLC，这是一家专注于儿童应用开发的移动应用公司。\n\n![Image](img/colin_francis.jpg) 科林·弗朗西斯是一位来自马里兰州盖瑟斯堡的\
  \ iOS 开发者。在深入学习计算机科学后，他自学了 iOS 开发，并与肖恩·格莱姆斯在巴尔的摩共事。如今他居住在迈阿密，独立开发 iOS 应用，专注方向为实用工具和音频软件应用。\n\
  \n## 关于技术审校\n\n![Image](img/anselm_bradford.jpg) 安塞尔姆·布拉德福德是新西兰奥克兰理工大学（AUT）数字媒体专业的讲师，研究方向包括交互媒体、网络媒体和视觉传达。他与互联网相关的开发经验可以追溯到\
  \ 1996 年，当时他手工编写了他的第一个网站。在 Twitter 上可以通过`@anselmbradford`找到他，偶尔他也会在 [AnselmBradford.com](http://AnselmBradford.com)\
  \ 上写博客。\n\n## 引言\n\n一旦你对用于 iOS 开发的`Objective-C`编程语法结构有了理解，创建应用最重要的部分就是学习如何使用 Apple\
  \ 提供的各种工具和框架。为了全面开发 iPhone 和 iPad 应用，你不仅要详细了解开发环境，还必须深入了解你能够使用的各种元素和功能。无论你的应用是用来播放音乐、拍照、打印文档还是过滤图像，本书都将指导你完成功能的设置与构建。\n\
  \n\n\n### 本书阅读指南\n\n本书前几章将帮助你掌握开发环境的基本知识。你将学习在`Xcode`和`Interface Builder`中工作的多种方式，以及可用于构建应用的各种标准用户界面元素。其余\
  \ 13 章则聚焦于不同应用的具体案例（即“秘诀”），以演示如何从头到尾实现每一项功能。\n\n### 本书组织结构\n\n本书基于案例的章节之间并无严格依赖关系，你可以直接跳转至任何感兴趣的章节，开始构建特定类型的应用。但强烈建议你（如果尚未阅读）先通读前三章，以扎实掌握`Xcode`和`Interface\
  \ Builder`的操作。早期章节中使用的一些方法（例如创建属性的技术）会在全书中被反复引用，需确保充分理解。\n\n本书假定读者使用的是撰写时的最新版本：iOS\
  \ 5.0 和 Xcode 4.2。这意味着书中的所有秘诀都默认使用 ARC（自动引用计数），因此不会涉及大量内存管理内容。同时，由于你阅读时软件版本可能已更新，实际界面或许略有差异，但基本功能应保持一致。\n\
  \n本书的许多秘诀无法在 iOS 模拟器中完整测试，因此需要一台 Apple 设备和一份配置文件（可通过订阅 Apple iOS 开发者计划获取）。每个无法在模拟器中测试的秘诀都会特别说明。\n\
  \n### 源代码与勘误\n\n本书所有源代码均可从[`www.apress.com`](http://www.apress.com)在线免费下载，且允许用于任何商业或个人应用。虽然多人已尽力确保代码完美无缺，但大量使用后仍可能发现少量笔误或错误。文本或代码的任何修正均可在本书的“勘误”部分找到，该部分同样位于[`www.apress.com`](http://www.apress.com)。\n\
  \n### 联系方式\n\n如果您对本书或其源代码有任何疑问或建议，我们很乐意提供帮助。您可联系两位作者：\n\n> Colin Francis:\n> 邮箱：`cmfrancis24@gmail.com`\n\
  > \n> Shawn Grimes:\n> 邮箱：`shawn@shawnsbits.com`\n> 网址：[`www.shawnsbits.com`](http://www.shawnsbits.com)\n\
  \n## 第 1 章\n\n## Xcode 4 技巧与提示\n\n`Xcode 4` 对`Xcode`的外观和功能都带来了诸多变化。与任何颠覆性变革一样，它收获了褒贬不一的评价和一些抱怨。本章将避开`Xcode\
  \ 4`的缺点，专注于其优势与改进——而它们不胜枚举。\n\n### Xcode 4 简介\n\n你首先会注意到`Xcode 4`的统一界面窗口。所有功能都整合到了一个窗口中，新界面引入了标签页这一通用元素，取代了之前的多个窗口。\n\
  \n图 1-1 展示了`Xcode`用户界面的示例，包含各种显示面板。这些面板帮助你导航、构建和调试应用。你可以通过右上角的“视图”按钮轻松调整它们的可见性，从而为编辑器腾出更多空间。\n\
  \n![图](img/9781430240051_Fig01-01.jpg)\n\n**图 1-1.** *Xcode 界面*\n\n就连`Interface\
  \ Builder`也已被整合到`Xcode 4`的单一窗口界面中。通过引入`Interface Builder`，Apple 构建了强大的功能，帮助你从可视化界面过渡到可运行的代码。图\
  \ 1-2 展示了使用`Interface Builder`构建应用用户界面的场景，第 2 章将对此进行更详细的介绍。\n\n![图](img/9781430240051_Fig01-02.jpg)\n\
  \n**图 1-2.** *Interface Builder*\n\n借助助理编辑器，你可以轻松并排查看两个相关文件。这在处理类头文件和实现文件时非常有用，因为你可以在一个视图中同时修改两个文件。通过使用每个面板顶部的导航区域，你可以选择要同时显示的特定文件，或指定“对应文件”来自动显示相关的头文件或实现文件，如图\
  \ 1-3 所示。\n\n![图](img/9781430240051_Fig01-03.jpg)\n\n**图 1-3.** *助理编辑器*\n\n`Xcode\
  \ 4` 中一个一定能为你节省时间的功能是“Fix-It”。该功能会尝试检测常见编程错误，并给出修复建议。它在你编写代码时即时生效，而无需等待构建命令执行，从而为修复常见错误节省了大量时间。\n\
  \n`Xcode 4` 还改进了与 Git 的源代码控制集成。每次创建新项目时，你都可以选择创建一个本地 Git 仓库，修改过的文件会在导航面板中清晰标记。时间线编辑器视图甚至能显示自上次签入以来的更改，或将当前文件与仓库中的任何历史版本进行对比。这种回溯视图与\
  \ Snow Leopard 中的 Time Machine 备份界面非常相似，如图 1-4 所示。\n\n![图](img/9781430240051_Fig01-04.jpg)\n\
  \n**图 1-4.** *显示最近修订的时间线编辑器*\n\n\n\n### 在同一个 Xcode 项目中同时构建精简版和完整版\n\n为你的应用提供一个精简版，是让客户在购买前有机会尝试应用的绝佳方式。然而，随着你不断为应用添加新功能，维护两个代码库会变得相当繁琐且难以控制。虽然在\
  \ Xcode 3 中已经可以维护两个构建目标，但 Xcode 4 让这一过程变得更加简单。\n\n在导航器区域选择你的项目文件，然后选择项目的构建目标。现在按下\
  \ ![Image](img/U003.jpg)`D` 键来复制该目标。系统会提示你选择“仅复制”或“复制并过渡到 iPad”。点击“仅复制”创建一个用于精简版构建的新目标，如\
  \ 图 1-5 所示。这样会生成一个独立的构建目标，你可以用它来实现第二个版本。\n\n![Image](img/9781430240051_Fig01-05.jpg)\n\
  \n**图 1-5.** *项目复制选项*\n\n将新目标重命名，追加“Lite”字样。你还需要进入“构建设置”选项卡，在“打包”标题下找到“产品名称”属性，以便在应用名称后追加“Lite”。现在构建名称已设置好，你需要一种方法在源代码中区分这两个构建。为此，向下滚动找到“预处理宏”，并添加一个名为\
  \ `LITE_VERSION` 的新宏。确保为 Debug 和 Release 构建设置都添加这个新宏。图 1-6 展示了这些更改的示例。\n\n![Image](img/9781430240051_Fig01-06.jpg)\n\
  \n**图 1-6.** *“精简版”应用配置*\n\n如果现在构建并运行，你的设备上会出现第二个应用，标题名为“SampleApp Lite”，但它运行的代码与普通版本相同，如\
  \ 图 1-7 所示。请记住，这两个目标必须拥有独立的捆绑标识符，才能作为独立的应用显示。这是默认设置，但在进行更改时要小心。\n\n![Image](img/9781430240051_Fig01-07.jpg)\n\
  \n**图 1-7.** *同一应用的两个版本*\n\n要为你的应用构建不同的功能，你需要利用你创建的那个预处理宏。在你代码中任何需要为精简版和完整版指定不同代码的地方，请使用以下\
  \ `#ifdef` 指令：\n\n```\n#ifdef LITE_VERSION\n//精简版的内容\nSelf.labelAppName.text=@\"\
  Sample App Lite\";\n#else\n//完整版的内容\nSelf.labelAppName.text=@\"Sample App Full\"\
  ;\n#endif\n```\n\n在模拟器上构建并编译这两个应用，你会看到应用会根据预处理宏以及 `#ifdef` 指令的强大功能，改变它们所编译和运行的代码。图\
  \ 1-8 展示了这种配置的结果。\n\n![Image](img/9781430240051_Fig01-08.jpg)\n\n**图 1-8.** *完整版和“精简版”应用*\n\
  \n**注意：** 你还可以控制每个构建中包含哪些文件。例如，你可能不需要在精简版中包含完整版的素材。点击你的精简版项目目标，进入“构建阶段”选项卡。然后展开“复制捆绑资源”列表，移除或添加任何特定于精简版的文件。\n\
  \n### 僵尸猎人\n\n有时，你会遇到一个仅描述为“`EXC_BAD_ACCESS`”的错误，不幸的是，它不会告诉你错误访问发生在哪一行。当你释放了一个变量，然后试图访问那个已释放的对象时，就会导致这个错误。当一个对象不再存在而你又试图访问它时，这个术语叫做僵尸对象。这时候就要用到僵尸猎人——`NSZombieEnabled`\
  \ 标志。这在 Xcode 4 中并非新功能，但在 Xcode 4 中设置该标志的位置可能很难找到。前往“产品”菜单，选择“编辑方案…”。现在选择“运行”步骤，点击“参数”选项卡。在“环境变量”部分，添加\
  \ `NSZombieEnabled` 并将其值设置为 `YES`，如 图 1-9 所示。\n\n![Image](img/9781430240051_Fig01-09.jpg)\n\
  \n**图 1-9.** *启用 `NSZombieEnabled`*\n\n下次你运行代码时，僵尸将在调试窗口中被识别出来。图 1-10 展示了一个被 Xcode\
  \ 捕获的僵尸示例。\n\n![Image](img/9781430240051_Fig01-10.jpg)\n\n**图 1-10.** *识别出的一个僵尸*\n\
  \n### 使用 Xcode 4 进行版本控制\n\n版本控制对于新开发者来说可能是一个令人生畏的概念，但它是值得学习的东西。一旦你开始使用版本控制，你会想不通没有它以前是怎么过来的。它对于开发团队的好处显而易见。团队成员可以各自处理应用的不同部分，而不会相互干扰代码。\n\
  \n个人开发者也能从版本控制中受益。通过多个分支，你可以在不干扰先前发布版本的情况下，为应用添加新功能。如果你在发布版本中发现了一个 bug，你可以切换分支并修复该\
  \ bug，而不会影响应用的未来版本。然后你可以合并两个版本，得到一个同时包含 bug 修复和新功能的新版本。自始至终，你都可以回溯到任何时间点，查看对代码所做的更改。\n\
  \nXcode 4 将版本控制引入了 Xcode 环境。最初，它只支持本地 Git 仓库，但 Xcode 4.2 已将远程仓库引入了该环境。如果你是开发团队的一员，或者在多台机器上工作，这无疑是个好消息。远程仓库也为你的代码提供了一个安全的存储位置，以防电脑故障或丢失。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将根据您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 创建本地仓库\n\n每当您在 Xcode\
  \ 4 中开始一个新项目时，您都可以选择创建一个本地 Git 仓库，如图 1-11 所示。如果您选中此框，Xcode 将创建本地仓库并自动添加其认为必要的项目文件。\n\
  \n![Image](img/9781430240051_Fig01-11.jpg)\n\n**图 1-11.** *创建一个 Git 仓库*\n\n当您更改项目及其文件时，其源代码控制状态将显示在导航器窗口中。“A”\
  \ 表示文件已添加到项目中，“M” 表示自上次签入以来已修改。图 1-12 显示了一个导航窗格，其中包含多个具有这些状态的文件。\n\n![Image](img/9781430240051_Fig01-12.jpg)\n\
  \n**图 1-12.** *已修改和已添加的项目文件*\n\n您可以通过单击导航器窗格底部中间的图标来过滤导航器内容，以便仅查看源代码控制仓库中待更改的文件，如图\
  \ 1-13 所示。\n\n![Image](img/9781430240051_Fig01-13.jpg)\n\n**图 1-13.** *已过滤的已修改文件*\n\
  \n要将您的更改提交回本地仓库，请转到 `File`![Image](img/U001.jpg)`Source Control` ![Image](img/U001.jpg)`Commit`\
  \ 或按 ![Image](img/U004.jpg)![Image](img/U003.jpg)`C`。将出现“提交”窗口。通过单击已修改的文件，您将在左侧窗格中看到您编辑后的版本，在右侧窗格中看到仓库中的当前版本。您的所有更改都将被高亮显示，以便您可以轻松地看到两个文件之间的差异。图\
  \ 1-14 显示了这样一个窗口，其中包含高亮显示的更改。\n\n![Image](img/9781430240051_Fig01-14.jpg)\n\n**图\
  \ 1-14.** *查看待提交的文件更改*\n\n值得一提的是，左侧窗格是一个实时编辑器，因此如果您发现某些不应该提交的内容，例如一条 `NSLog` 语句，这是您将其注释掉或进行必要更改的机会。\n\
  \nXcode 在建议应提交哪些文件方面做得很好。您不希望将工作区文件（`*.xcworkspace`）或用户数据目录（`xcuserdata`）纳入版本控制。通常\
  \ Xcode 不会检入这些文件，您会注意到文件旁边有“?”标记图标。这意味着它们当前不受版本控制，也不应受版本控制。图 1-15 显示了这些不受版本控制的文件/目录。\n\
