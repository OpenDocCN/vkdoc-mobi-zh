  \ = [NSString stringWithFormat:@\"%f\", magData.magneticField.y];\nself.zMagLabel.text\
  \ = [NSString stringWithFormat:@\"%f\", magData.magneticField.z];\n         }];\n\
  \    }\nelse if ([self.motionManager isMagnetometerActive])\n    {\n        [self.motionManager\
  \ stopMagnetometerUpdates];\nself.xMagLabel.text = @\"...\";\nself.yMagLabel.text\
  \ = @\"...\";\nself.zMagLabel.text = @\"...\";\n    }\n}\n```\n\n为了增加一点趣味，您将继续实现让切换基于设备的摇晃，因此您将修改`-shakeDetected:`方法。\n\
  \n```\n-(void)shakeDetected:(NSNotification *)paramNotification\n{\nif ([self.statusLabel.text\
  \ isEqualToString:@\"Updating\"])\n    {\nself.statusLabel.text = @\"Stopped\";\n\
  \        [self toggleUpdates];\n    }\nelse\n    {\nself.statusLabel.text = @\"\
  Updating\";\n        [self toggleUpdates];\n    }\n}\n```\n\n每当您处理`CMMotionManager`时，应始终确保在应用程序结束时停止所有更新，因此您将设置`-viewDidUnload:`方法如下：\n\
  \n```\n- (void)viewDidUnload\n{\nif ([self.motionManager isAccelerometerAvailable]\
  \ && [self.motionManager isAccelerometerActive])\n    {\n        [self.motionManager\
