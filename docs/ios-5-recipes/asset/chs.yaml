  \n和之前一样，你必须使用`__bridge`命令来将你的`NSString`变量移出 ARC。\n\n你有两种选择来实现设备上新联系人的创建。一种非常用户友好的方法是像之前一样加载`ABNewPersonViewController`，但这次将已创建的`ABPersonRef`传递给它以供其填充。你可以通过设置控制器的`displayedPerson`属性来实现，添加如下代码行。\n\
