  \ if (displayImage)\n        {\n            UIImage *thumbnailImage = [MainDetailViewController\
  \ scaleImageThumbnail:displayImage toSize:thumbnailSize];\n            cell.imageView.image\
  \ = thumbnailImage;\n        }\n    }\n    /////缩略图代码结束\n\n    if (indexPath.row\
  \ == 0)\n        cell.textLabel.text = NSLocalizedString(@\"Selected Image\", @\"\
  Detail\");\n    else if (indexPath.row == 1)\n        cell.textLabel.text = NSLocalizedString(@\"\
  Hue Adjust\", @\"Detail\");\n    else if (indexPath.row == 2)\n        cell.textLabel.text\
