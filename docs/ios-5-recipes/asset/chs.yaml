  \n**图 6–10.** *相机上的自定义覆盖层视图*\n```\n\n\n### 食谱 6–5：AV 框架与采集会话\n\n尽管 `UIImagePickerController`\
  \ 和 `UIVideoEditorController` 接口非常实用，但它们的可定制性显然不够。使用 AV 框架，你可以创建可定制性更强的相机接口。在此，你将创建本质上属于自己的相机版本，但通过一种称为\
  \ `AVCaptureSession` 的不同方法，后续定制将变得极其简便。\n\n首先，你将创建一个名为 \"Chapter6Recipe5\" 的新项目，并使用\
  \ \"CustomCamera\" 作为类前缀。\n\n你需要将多种不同的框架链接到项目中。导航到项目的主设置，在 Targets 下选择 `CustomCamera`，然后切换到\
  \ Build Phases 标签页，如图 Figure 6–11 所示。\n\n![Image](img/9781430240051_Fig06-11.jpg)\n\
  \n**图 6–11.** *准备向项目中添加框架*\n\n在 \"Link Binary With Libraries\" 选项下，使用 `+` 按钮添加其他几个框架。搜索并添加以下框架：\n\
  \n- AV Foundation\n- Core Graphics\n- Core Video\n- Core Media\n\n实际上，除了 AV Foundation\
  \ 框架外，你无需为其他框架编写任何 import 语句。继续，将以下 import 行添加到主视图控制器的头文件中。\n\n```\n#import <AVFoundation/AVFoundation.h>\n\
  #import <AVFoundation/AVCaptureInput.h>\n```\n\n接下来，切换到视图控制器的 `.xib` 文件进行一些快速设置。在这里，你只需要将一个\
  \ `UIButton` 拖到视图中，然后将其连接到头文件，并命名为 `startButton`。你需要为该按钮创建一个动作，因此声明以下方法头，并将 `startButton`\
  \ 连接到它。\n\n```\n-(IBAction)startPressed:(id)sender;\n```\n\n完成这些更改后，用户界面和代码在 Assistant\
  \ Editor 中应类似于 Figure 6–12。\n\n![Image](img/9781430240051_Fig06-12.jpg)\n\n**图 6–12.**\
  \ *已配置 Outlet 和 Action 的用户界面*\n\n接下来，从 XIB/头文件组合切换到视图控制器的头和实现文件，为视图控制器定义一种新的属性，如下所示。\n\
  \n```\n@property (strong, nonatomic) AVCaptureSession *captureSession;\n```\n\n\
  务必记得在实现文件中 `@synthesize captureSession;`，并在 `-viewDidUnload` 中设置 `self.captureSession\
  \ = nil`。\n\n接下来，你将编写 `-viewDidLoad` 方法，用于准备视图、创建 `AVCaptureSession` 并按需设置。在调用 `[super\
  \ viewDidLoad];` 之后，向方法中添加以下几组代码。\n\n首先，必须创建 `AVCaptureSession` 并为其指定一个分辨率预设，如下所示：\n\
  \n```\nself.captureSession = [[AVCaptureSession alloc] init];\nself.captureSession.sessionPreset\
  \ = AVCaptureSessionPresetMedium;\n```\n\n接着，创建 `AVCaptureDevice` 的实例，用于指定输入设备。在此例中，输入设备将是设备的后置摄像头（假设可访问）。通过使用\
  \ `AVCaptureDevice` 类方法 `+defaultDeviceWithMediaType:` 来指定，该方法可根据所需媒体类型接收多种不同参数，其中最常用的是\
  \ `AVMediaTypeVideo` 和 `AVMediaTypeAudio`。\n\n```\nAVCaptureDevice *device = [AVCaptureDevice\
  \ defaultDeviceWithMediaType:AVMediaTypeVideo];\n```\n\n然后，创建 `AVCaptureDeviceInput`\
  \ 的实例，以将所选设备指定为采集会话的输入。你还需要进行检查，确保输入已正确创建，然后再将其添加到会话中。\n\n```\nNSError *error =\
  \ nil;\nAVCaptureDeviceInput *input = [AVCaptureDeviceInput deviceInputWithDevice:device\n\
  \                                                                    error:&error];\n\
  if (!input) {\n    NSLog(@\"Input Error\");\n} else {\n    [self.captureSession\
  \ addInput:input];\n}\n```\n\n接下来，为采集会话设置一个输出，如下所示：\n\n```\nAVCaptureVideoDataOutput\
  \ *output = [[AVCaptureVideoDataOutput alloc] init];\n[self.captureSession addOutput:output];\n\
  output.videoSettings =\n    [NSDictionary dictionaryWithObject:[NSNumber numberWithInt:kCVPixelFormatType_32BGRA]\n\
  \                                forKey:(id)kCVPixelBufferPixelFormatTypeKey];\n\
  \ndispatch_queue_t queue = dispatch_queue_create(\"MyQueue\", NULL);\n[output setSampleBufferDelegate:self\
  \ queue:queue];\ndispatch_release(queue);\n```\n\n在这里，你创建了一个 `AVCaptureVideoDataOutput`。当开发者的目标是逐帧处理原始视频输入，而非简单地将视频整体保存时，常会使用此类型。其他类型的\
  \ `AVCaptureOutput` 包括：\n\n- `AVCaptureMovieFileOutput`：用于保存整个视频文件\n- `AVCaptureAudioDataOutput`：用于处理音频数据\n\
  - `AVCaptureStillImageOutput`：用于从会话中提取特定的静态图像（此输出类型也可用于实现当前目标）\n\n你还分发了一个额外的队列来处理稍后将会看到的帧数据。\n\
  \n`-viewDidLoad` 的最后一部分是创建 `AVCaptureVideoPreviewLayer`，通过它你可以在应用中实时看到相机拍摄的内容。将预览层设置为主视图的图层，但高度稍作调整，以免遮挡按钮。\n\
  \n```\nAVCaptureVideoPreviewLayer *previewLayer = [AVCaptureVideoPreviewLayer\n\
  \    layerWithSession:self.captureSession];\nUIView *aView = self.view;\npreviewLayer.frame\
  \ = CGRectMake(0, 0, self.view.frame.size.width,\n                             \
  \   self.view.frame.size.height-70);\n[aView.layer addSublayer:previewLayer];\n\
  ```\n\n\n\n#### 关于 `AVCaptureVideoPreviewLayer` 的说明\n\n`AVCaptureVideoPreviewLayer`\
  \ 概念中最关键的部分并非其视觉输出，而是其可被操作的强大能力。与任何其他 `CALayer` 一样，它可以被重新定位、旋转和调整大小。此时，你不再像使用 `UIImagePicker`\
  \ 那样受限于使用整个屏幕来录制视频，这意味着你可以将预览层放在屏幕的一个区域，而将其他信息显示在另一个区域。与 iOS 开发的几乎所有部分一样，其用途的可能性仅受开发者想象力的限制。\n\
  \n由于你将当前视图控制器设置为 `AVCaptureVideoDataOutput` 的代理，因此你需要实现 `AVCaptureVideoDataOutputSampleBufferDelegate`\
  \ 协议。你的头文件现在应如下所示：\n\n```\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\
  #import <AVFoundation/AVCaptureInput.h>\n\n@interface CustomCameraViewController\
  \ : UIViewController\n<AVCaptureVideoDataOutputSampleBufferDelegate>{\n    UIImageView\
  \ *imageViewDisplay;\n    UIButton *startButton;\n    BOOL capture;\n}\n\n@property\
  \ (strong, nonatomic) IBOutlet UIButton *startButton;\n@property (strong, nonatomic)\
  \ AVCaptureSession *captureSession;\n-(IBAction)startPressed:(id)sender;\n@end\n\
  ```\n\n请确保注意还新增了 `BOOL` 类型的实例变量 `capture`。你将使用它来跟踪会话的帧是否会被处理。\n\n接下来，你将实现 `AVCaptureVideoDataOutputSampleBuffer`\
  \ 的代理方法，如下所示：\n\n```\n- (void)captureOutput:(AVCaptureOutput *)captureOutput\ndidOutputSampleBuffer:(CMSampleBufferRef)sampleBuffer\n\
         fromConnection:(AVCaptureConnection *)connection {\n\n    if (capture)\n\
      {\n        UIImage *chosenImage = [self imageFromSampleBuffer:sampleBuffer];\n\
          UIImageWriteToSavedPhotosAlbum (chosenImage, nil, nil , nil);\n        capture\
  \ = NO;\n    }\n}\n```\n\n如你所见，你只需检查 `capture` 这个 `BOOL` 值是否为\"YES\"，如果是，则获取给定视频帧的图像，然后将其保存到设备的相册中。通过立即将\
  \ `capture` 设置为\"NO\"，你限制了应用每次按下按钮仅捕获一帧。很容易看出如何扩展此功能以包含任意数量的帧。\n\n你还必须像下面这样定义刚刚使用过的\
  \ `-imageFromSampleBuffer:` 方法，并确保它定义在你的代理方法之上。\n\n```\n- (UIImage *) imageFromSampleBuffer:(CMSampleBufferRef)\
  \ sampleBuffer\n{\n    // 获取 CMSampleBuffer 的核心视频图像缓冲区，用于媒体数据\n    CVImageBufferRef\
  \ imageBuffer = CMSampleBufferGetImageBuffer(sampleBuffer);\n    // 锁定像素缓冲区的基地址\n\
      CVPixelBufferLockBaseAddress(imageBuffer, 0);\n\n    // 获取像素缓冲区的每行字节数\n    void\
  \ *baseAddress = CVPixelBufferGetBaseAddress(imageBuffer);\n\n    // 获取像素缓冲区的每行字节数\n\
      size_t bytesPerRow = CVPixelBufferGetBytesPerRow(imageBuffer);\n    // 获取像素缓冲区的宽度和高度\n\
      size_t width = CVPixelBufferGetWidth(imageBuffer);\n    size_t height = CVPixelBufferGetHeight(imageBuffer);\n\
  \n    // 创建设备相关的 RGB 色彩空间\n    CGColorSpaceRef colorSpace = CGColorSpaceCreateDeviceRGB();\n\
  \n    // 使用样本缓冲区数据创建位图图形上下文\n    CGContextRef context = CGBitmapContextCreate(baseAddress,\
  \ width, height, 8,\n                                                 bytesPerRow,\
  \ colorSpace,\nkCGBitmapByteOrder32Little | kCGImageAlphaPremultipliedFirst);\n\
      // 从位图图形上下文中的像素数据创建 Quartz 图像\n    CGImageRef quartzImage = CGBitmapContextCreateImage(context);\n\
      // 解锁像素缓冲区\n    CVPixelBufferUnlockBaseAddress(imageBuffer,0);\n\n    // 释放上下文和色彩空间\n\
      CGContextRelease(context);\n    CGColorSpaceRelease(colorSpace);\n\n    // 从\
  \ Quartz 图像创建图像对象\n    UIImage *image = [UIImage imageWithCGImage:quartzImage];\n\
  \n    // 释放 Quartz 图像\n    CGImageRelease(quartzImage);\n\n    return (image);\n\
  }\n```\n\n现在，你将实现一个相当简单的捕获切换方法，以处理你的按钮按下事件。\n\n```\n-(void)startPressed:(id)sender\n\
  {\n    if (!capture)\n    {\n        capture = YES;\n    }\n    else\n    {\n        capture\
  \ = NO;\n    }\n}\n```\n\n要记住的最重要的步骤之一是实际“启动”和“停止”你的 `AVCaptureSession`。由于你希望摄像头显示在应用打开的任何时候都可见，你将在\
  \ `-viewWillAppear` 方法中启动会话，并在 `-viewWillDisappear` 方法中停止会话，这两个方法现在看起来像这样：\n\n```\n\
  - (void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
      [self.captureSession startRunning];\n}\n- (void)viewWillDisappear:(BOOL)animated\n\
  {\n    [super viewWillDisappear:animated];\n    [self.captureSession stopRunning];\n\
  }\n```\n\n如果现在在你的设备上运行此应用，你可能会注意到所有拍摄的已保存图像看起来像是在横屏模式下拍摄的，然后旋转以适应竖屏，显然不再填满整个屏幕。你可以通过更改会话输出连接的视频方向来解决此问题，将你的\
  \ `-viewWillAppear:` 方法修改如下：\n\n```\n- (void)viewWillAppear:(BOOL)animated\n{\n\
      [super viewWillAppear:animated];\n    [self.captureSession startRunning];\n\n\
      NSArray *array = [[self.captureSession.outputs objectAtIndex:0] connections];\n\
      for (AVCaptureConnection *connection in array)\n    {\n        connection.videoOrientation\
  \ = AVCaptureVideoOrientationPortrait;\n    }\n}\n```\n\n如果现在在你的设备上运行该应用，你将能够看到摄像头正在录制的内容的预览，并且每当你按下按钮时，当前帧将保存到你的照片库中，如图\
  \ 6–13 所示。虽然你还没有添加任何花哨的动画使其看起来像相机，但就基本相机而言，这已经非常有用，特别是考虑到你现在能够完全自定义其行为——无论是逐帧处理还是作为整个视频（如果你添加第二个输出）。\n\
  \n![Image](img/9781430240051_Fig06-13.jpg)\n\n**图 6–13.** *你的应用显示摄像头视图的预览*\n\n\n\
  \n### 食谱 6–6：通过编程录制视频\n\n现在你已经了解了使用 `AVFoundation` 的一些基础知识，接下来将实现一个稍微复杂的项目。这次，你的应用程序将录制完整的视频，而不仅仅是捕获特定的帧。你还需要添加一个音频输入设备，以便视频中包含声音。\n\
  \n首先，你必须创建一个新项目，这次命名为“Chapter6Recipe6”，类前缀为“CustomVideo”。\n\n像往常一样，首先要做的是通过项目 `Build\
  \ Phases` 选项卡中的 `Link Binary With Libraries` 部分获取以下必要的框架。\n\n*   *AV Foundation*：你将使用它来处理摄像头和麦克风。\n\
  *   *Assets Library*：用于将录制好的视频保存到你的设备上。\n\n在 Interface Builder 中，向视图控制器的视图底部中央添加一个\
  \ `UIButton`，就像上一个食谱一样，将其默认标签设置为“Record”。当你将其连接到头文件时，请为这个 `UIButton` 命名为 `button`。确保还要为此按钮创建一个名为\
  \ `-recordPressed:` 的操作（有关如何执行此操作，请参阅之前的食谱）。\n\n与上一个食谱类似，你将构建 `AVCaptureSession`\
  \ 来管理摄像头的输入和视频的输出，因此你需要先在视图控制器的头文件中添加一些变量、属性和协议。\n\n*   首先，你需要一个 `BOOL` 类型的实例变量\
  \ `recording`，它用于跟踪视频是否正在录制。\n*   其次，你需要创建两个属性，用于存储指向 `AVCaptureSession` 会话和 `AVCaptureMovieFileOutput`\
  \ 输出的指针，后者将是你的 `AVCaptureOutput` 设备。\n*   第三，你需要在头文件中包含 `AV Foundation` 框架的导入语句。\n\
  *   最后，你需要告诉编译器你的视图控制器遵循 `AVCaptureFileOutputRecordingDelegate` 协议。\n\n完成所有这些更改后，你的视图控制器的头文件将如下所示：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n#import <AssetsLibrary/AssetsLibrary.h>\n\
  \n@interface CustomVideoViewController : UIViewController\n<AVCaptureFileOutputRecordingDelegate>{\n\
  \    UIButton *button;\n    BOOL recording;\n}\n\n@property (strong, nonatomic)\
  \ IBOutlet UIButton *button;\n\n@property (strong, nonatomic) AVCaptureSession *session;\n\
  @property (strong, nonatomic) AVCaptureMovieFileOutput *output;\n\n-(IBAction)recordPressed:(id)sender;\n\
  @end\n```\n\n现在，头文件已经全部设置好，接下来切换到实现文件。\n\n首先，由于你设置了自己的两个属性 `session` 和 `output`，你绝对必须记住在实现文件的顶部对它们进行\
  \ `@synthesize`。你还应该记住在 `-viewDidUnload` 方法中将它们都设置为 `nil`。\n\n接下来，与上一个食谱一样，你将开始构建\
  \ `-viewDidLoad` 方法。\n\n首先，你必须像这样分配你的 `AVCaptureSession`：\n\n```\nself.session =\
  \ [[AVCaptureSession alloc] init];\nself.session.sessionPreset = AVCaptureSessionPresetMedium;\n\
  ```\n\n接下来，你将创建两个 `AVCaptureDevice` 实例，一个用于后置摄像头，一个用于麦克风，然后为它们中的每一个创建 `AVCaptureDeviceInput`，并将它们添加到你的会话中。\n\
  \n```\nAVCaptureDevice *device = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
  \nNSError *error = nil;\nAVCaptureDeviceInput *input = [AVCaptureDeviceInput deviceInputWithDevice:device\n\
  error:&error];\n\nNSArray *devices = [AVCaptureDevice devicesWithMediaType:AVMediaTypeAudio];\n\
  AVCaptureDeviceInput *mic = [[AVCaptureDeviceInput alloc] initWithDevice:[devices\n\
  objectAtIndex:0] error:nil];\nif (!input || !mic)\n    {\n        NSLog(@\"Input\
  \ Error\");\n    }\n    else\n    {\n        [self.session addInput:input];\n  \
  \      [self.session addInput:mic];\n    }\n```\n\n现在，你创建 `AVCaptureOutput` 并将其添加到会话中。你将确保输出的任何连接都正确设置了视频方向。\n\
  \n```\nself.output = [[AVCaptureMovieFileOutput alloc] init];\n\n    NSArray *connections\
  \ = self.output.connections;\n    for (AVCaptureConnection *connection in connections)\n\
  \    {\n        if ([connection isVideoOrientationSupported])\n             connection.videoOrientation\
  \ = AVCaptureVideoOrientationPortrait;\n    }\n    if ([self.session canAddOutput:self.output])\n\
  \        [self.session addOutput:self.output];\n```\n\n你需要能够看到摄像头的视图，因此你将设置一个 `AVCaptureVideoPreviewLayer`\
  \ 实例。\n\n```\nAVCaptureVideoPreviewLayer *previewLayer = [AVCaptureVideoPreviewLayer\n\
  layerWithSession:self.session];\nUIView *aView = self.view;\npreviewLayer.frame\
  \ = CGRectMake(0, 0, self.view.frame.size.width,\nself.view.frame.size.height-70);\n\
  [aView.layer addSublayer:previewLayer];\n```\n\n最后，你只需启动 `AVCaptureSession`。你还需要将\
  \ `recording` 实例设置为 `NO`，以确保它具有正确的起始值。\n\n```\n[self.session startRunning];\n  \
  \  recording = NO;\n```\n\n完整的 `-viewDidLoad` 方法现在看起来是这样的：\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n\n    self.session = [[AVCaptureSession alloc] init];\n\
  \    self.session.sessionPreset = AVCaptureSessionPresetMedium;\n    AVCaptureDevice\
  \ *device = [AVCaptureDevice\ndefaultDeviceWithMediaType:AVMediaTypeVideo];\n\n\
  \    NSError *error = nil;\n    AVCaptureDeviceInput *input = [AVCaptureDeviceInput\
  \ deviceInputWithDevice:device\nerror:&error];\n\n    NSArray *devices = [AVCaptureDevice\
  \ devicesWithMediaType:AVMediaTypeAudio];\n\n    AVCaptureDeviceInput *mic = [[AVCaptureDeviceInput\
  \ alloc] initWithDevice:[devices\nobjectAtIndex:0] error:nil];\n\n    if (!input\
  \ || !mic)\n    {\n        NSLog(@\"Input Error\");\n    }\n    else\n    {\n  \
  \      [self.session addInput:input];\n        [self.session addInput:mic];\n  \
  \  }\n\n    self.output = [[AVCaptureMovieFileOutput alloc] init];\n\n    NSArray\
  \ *connections = self.output.connections;\n    for (AVCaptureConnection *connection\
  \ in connections)\n    {\n        if ([connection isVideoOrientationSupported])\n\
  \             connection.videoOrientation = AVCaptureVideoOrientationPortrait;\n\
  \    }\n    if ([self.session canAddOutput:self.output])\n        [self.session\
  \ addOutput:self.output];\n\n    AVCaptureVideoPreviewLayer *previewLayer = [AVCaptureVideoPreviewLayer\n\
  layerWithSession:self.session];\n    UIView *aView = self.view;\n    previewLayer.frame\
  \ = CGRectMake(0, 0, self.view.frame.size.width,\nself.view.frame.size.height-70);\n\
  \    [aView.layer addSublayer:previewLayer];\n\n    [self.session startRunning];\n\
  \    recording = NO;\n}\n```\n\n**提示：** 使用这种方法为视频添加声音并不复杂！所需要做的只是将音频输入设备添加到你的会话中，其余的\
  \ `AVCaptureSession` 会替你完成。\n\n你当然需要定义你的应用程序如何处理用户按下 `UIButton` 的情况。这将是一个相当简单的切换函数，用于启动和停止你的\
  \ `AVCaptureOutput`。\n\n```\n-(IBAction)recordPressed:(id)sender\n{\n    if (!recording)\n\
  \    {\n        [self.button setTitle:@\"Stop\" forState:UIControlStateNormal];\n\
  \        recording = YES;\n        NSURL *fileURL = [self\ntempFileURL];\n     \
  \   [self.output startRecordingToOutputFileURL:fileURL recordingDelegate:self];\n\
  \    }\n    else\n    {\n        [self.button setTitle:@\"Record\" forState:UIControlStateNormal];\n\
  \        [self.output stopRecording];\n        recording = NO;\n    }\n}\n```\n\n\
  \n\n你很可能已经注意到，你在早期调用了`-tempFileURL`方法来设置`AVCaptureOutput`。简单来说，这个方法会返回一个路径，用于在你的设备上临时保存录制的视频。如果该位置已经存在一个文件，它将会删除该文件。（这样，你永远不会使用超过一个视频所需的磁盘空间。）\n\
  \n```\n- (NSURL *) tempFileURL\n{\n    NSString *outputPath = [[NSString alloc]\
  \ initWithFormat:@\"%@%@\",\nNSTemporaryDirectory(), @\"output.mov\"];\n    NSURL\
  \ *outputURL = [[NSURL alloc] initFileURLWithPath:outputPath];\n    NSFileManager\
  \ *manager = [[NSFileManager alloc] init];\n    if ([manager fileExistsAtPath:outputPath])\n\
  \    {\n        [manager removeItemAtPath:outputPath error:nil];\n    }\n    return\
  \ outputURL;\n}\n```\n\n设置视频的最后一步是设置`AVCaptureMovieFileOutput`的代理。它会检查将视频录制到文件时是否有任何错误，然后将你的视频文件保存到资产管理库中。\n\
  \n```\n- (void)captureOutput:(AVCaptureFileOutput *)captureOutput\ndidFinishRecordingToOutputFileAtURL:(NSURL\
  \ *)outputFileURL\n      fromConnections:(NSArray *)connections\n              \
  \  error:(NSError *)error {\n\n    BOOL recordedSuccessfully = YES;\n    if ([error\
  \ code] != noErr) {\n        // A problem occurred: Find out if the recording was\
  \ successful.\n        id value = [[error userInfo] objectForKey:AVErrorRecordingSuccessfullyFinishedKey];\n\
  \        if (value) {\n            recordedSuccessfully = [value boolValue];\n \
  \       }\n    }\n    ALAssetsLibrary *library = [[ALAssetsLibrary alloc] init];\n\
  \n    [library writeVideoAtPathToSavedPhotosAlbum:outputFileURL\n            completionBlock:^(NSURL\
  \ *assetURL, NSError *error)\n    {\n        if (error)\n           {\n        \
  \       NSLog(@\"Error writing\") ;\n\n           }\n    }];\n}\n```\n\n最后，为了提升应用设计的功能性，你将让`-viewWillAppear:`和`-viewWillDisappear:`参与会话的开始和停止，这样就不会出现会话在后台运行或在你可见时未运行的情况。\n\
  \n```\n- (void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \    if (![self.session isRunning])\n    {\n        [self.session startRunning];\n\
  \    }\n}\n- (void)viewWillDisappear:(BOOL)animated\n{\n        [super viewWillDisappear:animated];\n\
  \    if ([self.session isRunning])\n    {\n        [self.session stopRunning];\n\
  \    }\n}\n```\n\n这个应用看起来与之前示例中的应用几乎一样，主要区别在于保存的媒体类型。在之前的示例中，你是将单个帧作为图像保存到图库，而此处你将保存带有声音的录制视频。\n\
  \n### Recipe 6–7: Capturing Video Frames\n\n对于大量使用视频的应用，缩略图通常被用来“代表”给定的视频。在之前示例的基础上，你将添加一项功能，即基于视频中的特定时间点创建缩略图。你将实现两种不同的方法来完成此操作，一种基于`AVCaptureSession`，另一种基于你保存的视频。\n\
  \n首先，你将使用一种不同类型的`AVCaptureOutput`（称为`AVCaptureStillImageOutput`）从`AVCaptureSession`中捕获静态图像。\n\
  \n**提示：** 这种图像捕获方法还有一个额外功能，即在拍摄图像时自动播放快门声。\n\n首先，你需要在视图控制器的 XIB 文件中添加几个`UIImageView`，用于显示你捕获的静态图像。像往常一样，将它们连接到头文件，并命名为`imageViewThumb`和`imageViewThumb2`。如果需要，你可以将其背景色设置为默认颜色以外的其他颜色，以便在图像放入之前与视图区分。Figure\
  \ 6–14 显示了最终的 XIB 文件。\n\n![Image](img/9781430240051_Fig06-14.jpg)\n\n**Figure 6–14.**\
  \ *为缩略图设置用户界面*\n\n接下来，你需要一个属性来跟踪你的`AVCaptureStillImageOutput`，你将在视图控制器中将其声明并综合为`stillImageOutput`，并确保在`-viewDidUnload`中将其设置为`nil`。\n\
  \n第三步，在`-viewDidLoad`方法中将此输出添加到`AVCaptureSession`中，现在该方法如下所示：\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n\n    self.imageViewThumb.backgroundColor = [UIColor\
  \ whiteColor];\n\n    self.session = [[AVCaptureSession alloc] init];\n    self.session.sessionPreset\
  \ = AVCaptureSessionPresetMedium;\n\n    AVCaptureDevice *device = [AVCaptureDevice\
  \ defaultDeviceWithMediaType:AVMediaTypeVideo];\n\n    NSError *error = nil;\n \
  \   AVCaptureDeviceInput *input = [AVCaptureDeviceInput deviceInputWithDevice:device\n\
  error:&error];\n\n    NSArray *devices = [AVCaptureDevice devicesWithMediaType:AVMediaTypeAudio];\n\
  \    AVCaptureDeviceInput *mic = [[AVCaptureDeviceInput alloc] initWithDevice:[devices\n\
  objectAtIndex:0] error:nil];\n\n    if (!input || !mic)\n    {\n        NSLog(@\"\
  Input Error\");\n    }\n    else\n    {\n        [self.session addInput:input];\n\
  \        [self.session addInput:mic];\n    }\n\n    self.output = [[AVCaptureMovieFileOutput\
  \ alloc] init];\n\n    NSArray *connections = self.output.connections;\n    for\
  \ (AVCaptureConnection *connection in connections)\n    {\n        if ([connection\
  \ isVideoOrientationSupported])\n            connection.videoOrientation = AVCaptureVideoOrientationPortrait;\n\
  \    }\n    if ([self.session canAddOutput:self.output])\n        [self.session\
  \ addOutput:self.output];\n\n    /////////NEW STILL IMAGE OUTPUT CODE\n    self.stillImageOutput\
  \ = [[AVCaptureStillImageOutput alloc] init];\n    NSDictionary *outputSettings\
  \ = [[NSDictionary alloc] initWithObjectsAndKeys:\n                            \
  \        AVVideoCodecJPEG, AVVideoCodecKey, nil];\n    [self.stillImageOutput setOutputSettings:outputSettings];\n\
  \n    if ([self.session canAddOutput:stillImageOutput])\n    {\n        [self.session\
  \ addOutput:stillImageOutput];\n    }\n    else\n    {\n        NSLog(@\"Unable\
  \ to add still image output\");\n    }\n    /////////END OF NEW STILL IMAGE OUTPUT\
  \ CODE\n    AVCaptureVideoPreviewLayer *previewLayer = [AVCaptureVideoPreviewLayer\n\
  layerWithSession:self.session];\n    UIView *aView = self.view;\n    previewLayer.frame\
  \ = CGRectMake(0, 0, self.view.frame.size.width,\nself.view.frame.size.height-70);\n\
  \    [aView.layer addSublayer:previewLayer];\n\n    [self.session startRunning];\n\
  \    recording = NO;\n        // Do any additional setup after loading the view,\
  \ typically from a nib.\n}\n```\n\n\n\n接下来，你将定义实际捕获图像并将其保存到设备的方法。\n\n```\n- (void)\
  \ captureStillImage\n{\n    AVCaptureConnection *stillImageConnection = [self.stillImageOutput.connections\n\
  objectAtIndex:0];\n    if ([stillImageConnection isVideoOrientationSupported])\n\
  \        [stillImageConnection setVideoOrientation:AVCaptureVideoOrientationPortrait];\n\
  \n    [[self\nstillImageOutput]\ncaptureStillImageAsynchronouslyFromConnection:stillImageConnection\n\
  \ncompletionHandler:^(CMSampleBufferRef imageDataSampleBuffer, NSError *error)\n\
  \     {\n         ALAssetsLibraryWriteImageCompletionBlock completionBlock = ^(NSURL\
  \ *assetURL,\nNSError *error)\n         {};\n\n        if (imageDataSampleBuffer\
  \ != NULL)\n        {\n            NSData *imageData = [AVCaptureStillImageOutput\
  \ jpegStillImageNSDataRepresentation:imageDataSampleBuffer];\n            ALAssetsLibrary\
  \ *library = [[ALAssetsLibrary alloc] init];\n\n            UIImage *image = [[UIImage\
  \ alloc] initWithData:imageData];\n            self.imageViewThumb.image = image;\n\
  \            [library writeImageToSavedPhotosAlbum:[image CGImage]\n           \
  \      orientation:(ALAssetOrientation)[image imageOrientation]\n              \
  \   completionBlock:completionBlock];\n        }\n        else\n            completionBlock(nil,\
  \ error);\n\n        }];\n}\n```\n\n最后，你只需告诉应用程序何时执行`-captureStillImage`，方法是在`recordPressed:`方法中调用它。我选择让它在录制开始时拍照，当然也可以放在结束时。你的方法现在如下所示：\n\
  \n```\n-(IBAction)recordPressed:(id)sender\n{\n    if (!recording)\n    {\n    \
  \    [self.button setTitle:@\"Stop\" forState:UIControlStateNormal];\n        recording\
  \ = YES;\n        NSURL *fileURL = [self tempFileURL];\n        [self.output startRecordingToOutputFileURL:fileURL\
  \ recordingDelegate:self];\n\n        //////CAPTURE IMAGE\n        [self captureStillImage];\n\
  \    }\n    else\n    {\n        [self.button setTitle:@\"Record\" forState:UIControlStateNormal];\n\
  \        [self.output stopRecording];\n        recording = NO;\n    }\n}\n```\n\n\
  此时，如果在设备上运行，你的应用将成功录制视频，并在录制开始时（或结束时，取决于你的选择）拍摄一张静态图像。虽然这非常有用，但它还没有达到你可能期望的完全自定义程度。接下来，你将实现`AVAssetImageGenerator`类的一个用法，该类不仅可以从单个视频生成多个图像，还可以在视频中指定的不同时间点创建它们。\n\
  \n首先，你需要将二进制文件与`Core Media`框架链接起来。像链接其他所有框架一样进行操作。你不需要为此框架添加任何导入语句。它只会作为编译器的引用。\n\
  \n接下来，你需要在类中添加一个`AVAssetImageGenerator`类型的属性，确保合成属性，并在之后正确将其设置为`nil`。将此属性命名为`imageGenerator`。\n\
  \n你已经定义了委托方法来处理视频成功保存到 URL 的情况，因此你需要在`-captureOutput:didFinishRecordingToOutputFileAtURL:fromConnections:error:`方法中添加代码，以便访问\
  \ URL 并从中生成图像。你的方法现在应如下所示，并通过注释标识新添加的行：\n\n```\n- (void)captureOutput:(AVCaptureFileOutput\
  \ *)captureOutput\ndidFinishRecordingToOutputFileAtURL:(NSURL *)outputFileURL\n\
  \      fromConnections:(NSArray *)connections\n                error:(NSError *)error\
  \ {\n\n    BOOL recordedSuccessfully = YES;\n    if ([error code] != noErr) {\n\
  \        // A problem occurred: Find out if the recording was successful.\n    \
  \    id value = [[error userInfo]\nobjectForKey:AVErrorRecordingSuccessfullyFinishedKey];\n\
  \        if (value) {\n            recordedSuccessfully = [value boolValue];\n \
  \       }\n    }\n    ALAssetsLibrary *library = [[ALAssetsLibrary alloc] init];\n\
  \    [library writeVideoAtPathToSavedPhotosAlbum:outputFileURL\n               \
  \                 completionBlock:^(NSURL *assetURL, NSError *error)\n     {\n \
  \        if (error)\n         {\n             NSLog(@\"Error writing\") ;\n    \
  \     }\n\n     }];\n\n    ////////////START OF NEW STILL IMAGE CODE\n    AVURLAsset\
  \ *myAsset = [[AVURLAsset alloc] initWithURL:outputFileURL\noptions:[NSDictionary\
  \ dictionaryWithObject:@\"YES\"\nforKey:AVURLAssetPreferPreciseDurationAndTimingKey]];\n\
  \n    self.imageGenerator = [AVAssetImageGenerator assetImageGeneratorWithAsset:myAsset];\n\
  \    self.imageGenerator.appliesPreferredTrackTransform = YES; //Makes sure images\
  \ are correctly rotated.\n\n    Float64 durationSeconds = CMTimeGetSeconds([myAsset\
  \ duration]);\n    CMTime half = CMTimeMakeWithSeconds(durationSeconds/2.0, 600);\n\
  \    NSArray *times = [NSArray arrayWithObjects: [NSValue valueWithCMTime:half],\
  \ nil];\n    [self.imageGenerator generateCGImagesAsynchronouslyForTimes:times\n\
  \                    completionHandler:^(CMTime requestedTime, CGImageRef image,\
  \ CMTime\nactualTime,AVAssetImageGeneratorResult result, NSError *error)\n    {\n\
  \        NSString *requestedTimeString = (__bridge NSString *)CMTimeCopyDescription(NULL,\n\
  requestedTime);\n        NSString *actualTimeString = (__bridge NSString *)CMTimeCopyDescription(NULL,\n\
  actualTime);\n        NSLog(@\"Requested: %@; actual %@\", requestedTimeString,\
  \ actualTimeString);\n\n        if (result == AVAssetImageGeneratorSucceeded)\n\
  \            {\n                self.imageViewThumb2.image = [UIImage imageWithCGImage:image];\n\
  \            }\n\n        if (result == AVAssetImageGeneratorFailed)\n         \
  \   {\n                NSLog(@\"Failed with error: %@\", [error localizedDescription]);\n\
  \            }\n        if (result == AVAssetImageGeneratorCancelled)\n        \
  \    {\n                NSLog(@\"Canceled\");\n            }\n    }];\n    ///////END\
  \ OF STILL IMAGE CODE\n}\n```\n\n现在，你的应用可以通过两种不同的方式正确从视频中捕获静态图像，并且你应该能够在设备上清楚地看到每种方法的效果，如图\
  \ 6–15 所示。\n\n![Image](img/9781430240051_Fig06-15.jpg)\n\n**图 6–15.** *具有两个不同缩略图的录制应用程序*\n\
  \n**注意：** 你可能注意到，使用第二种方法创建图像所需的时间明显长于第一种。这可能是一种更适合在用户无法看到正在创建的图像时使用的方法，直到图像成功创建。\n\
  \n### 总结\n\n作为开发者，在处理设备摄像头时你有大量选择。预定义的接口（如`UIImagePickerController`和`UIVideoEditorController`）非常有用且设计精良，但苹果对`AV\
  \ Foundation`框架的实现提供了无限多的可能性。从处理视频、音频到静态图像，一切皆有可能。即使快速浏览完整文档，也会发现这里未涉及的无数其他功能，包括从设备能力（如视频摄像头的\
  \ LED 手电筒）到实现自定义的“触摸对焦”功能。我们生活在一个图像、音频和视频在几秒钟内环游世界的时代，作为开发者，我们必须能够设计和创造适合我们基于媒体的社区的创新解决方案。\n\
  \n## 第 7 章\n\n\n\n# 多媒体食谱\n\n阿尔道斯·赫胥黎曾言：“除却静默，最能表达难以言传之意的便是音乐。”我们生活在一个被声音和音乐包围的世界里。从广告中最微妙的背景曲调，到摇滚音乐会上电吉他的巨大轰鸣，声音以其千变万化的形式在我们的世界中扮演着不可或缺的角色。在开发过程中忽视这一事实，无论对用户体验还是开发者社区都将是莫大的损失。音乐和音频对我们的生活有着巨大影响，作为开发者，我们有责任将这种力量融入我们的应用，从而为用户带来最完整、最理想的体验——即便他们自己都未曾察觉。\n\
  \n本章的多个食谱将涉及访问应用运行设备上的 iPod 资料库。为了充分测试这些内容，请确保你的设备音乐资料库中至少存有几首歌曲。\n\n## 食谱 7–1：播放音频\n\
  \n如果你随机问一个人，听到“iPhone”和“音频”这两个词时会想到什么，他们很可能联想到自己的 iPod 和下载的数千首歌曲。然而，尽管背景音频和音效极其重要，却往往被大多数用户所忽视。这些音效片段和曲调在日常使用中可能完全不被用户注意，但就应用的功能和设计而言，它们能极大地提升应用品质。可能是拍照时那声细微的“快门咔嗒声”，也可能是游戏里玩得太久而萦绕脑海的背景音乐——无论用户是否察觉，它们都能带来天壤之别。iOS\
  \ 的“AV Foundation”框架提供了一种极其简单的方式来访问、播放和操作声音文件，即 `AVAudioPlayer`。接下来，你将创建一个示例项目，既能播放音频文件，也允许用户操控音轨的播放。\n\
  \n首先，创建一个新项目，命名为“Chapter7Recipe1”。此处，我使用了类前缀“Player”。与之前大部分食谱一样，你可以使用“单视图应用”模板来创建项目。确保“使用故事板”复选框未选中，而“使用自动引用计数”复选框已选中，这样你的配置就如图\
  \ 7–1 所示。\n\n![图片](img/9781430240051_Fig07-01.jpg)\n\n**图 7–1.** *配置项目设置*\n\n你需要做的第一件事是将项目与将要用于播放声音的几个框架进行链接。在导航窗格中选择你的项目，然后导航至\
  \ **Targets** ![图片](img/U001.jpg) **SoundCheck**。选择“构建阶段”标签页，展开“Link Binary With\
  \ Libraries”部分，如图 7–2 所示。\n\n![图片](img/9781430240051_Fig07-02.jpg)\n\n**图 7–2.**\
  \ *添加框架前的项目*\n\n接下来，点击 + 按钮，添加以下两个框架：\n\n1.  *AV Foundation*：包含 `AVAudioPlayer`\
  \ 类，你将用它来播放音频。\n2.  *Audio Toolbox*：你将使用此框架实现一个按钮，用于在设备上播放“震动”音效。\n\n接着，切换到视图控制器的头文件。你需要通过添加以下导入语句来导入框架的头文件：\n\
  \n```\n#import <AVFoundation/AVFoundation.h>\n#import <AudioToolbox/AudioToolbox.h>\n\
  ```\n\n现在，你将在视图控制器的 XIB 文件中构建视图。你将创建的视图包含用于控制音频播放器 `pan`、`volume` 和 `rate` 属性的滑块，以及播放和暂停的按钮，还有一个用于播放设备“震动”系统声音的按钮。你还将通过视图顶部的标签来监控音频播放器的声道电平。请将你的视图设置成如图\
  \ 7–3 所示。\n\n![图片](img/9781430240051_Fig07-03.jpg)\n\n**图 7–3.** *设置了默认值的视图控制器 XIB\
  \ 文件*\n\n你需要确保滑块的值与其控制的属性可能的值相匹配。使用属性检查器，将“rate”滑块的最小值和最大值分别调整为 0.5 和 2.0（对应半速和\
  \ 2 倍速），并将“pan”滑块的最小值和最大值分别调整为 -1 和 1（对应左声道和右声道）。“volume”滑块的默认值应该没问题，因为音量属性的范围是\
  \ 0 到 1。\n\n\n\n如同你在之前的代码中做过的那样，你需要按住 ^（Ctrl）键，将视图像素从元素拖拽到视图控制器的头文件中，从而将一些视图对象连接到头文件。根据情况将\
  \ `UISlider` 命名为 `sliderRate`、`sliderPan` 和 `sliderVolume`。你的 `UIButton` 将命名为 `vibrateButton`、`playButton`\
  \ 和 `pauseButton`。顶部的两个用于电平监测的 `UILabel`（目前我已为其设置了默认值 \"0.0\"）将命名为 `averageLabel`\
  \ 和 `peakLabel`。你需要在头文件中定义三个方法（类型为 `IBAction`，而非 `void`），分别对应三个按钮，并通过按住 ⌃ 键从按钮拖拽到方法定义处，将它们与按钮连接起来。你还需要再定义三个方法，用于连接你的\
  \ `UISlider`。现在，你的头文件应如下所示：\n\n```objc\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\
  #import <AudioToolbox/AudioToolbox.h>\n\n@interface PlayerViewController : UIViewController\n\
  @property (strong, nonatomic) IBOutlet UIButton *vibrateButton;\n@property (strong,\
  \ nonatomic) IBOutlet UIButton *playButton;\n@property (strong, nonatomic) IBOutlet\
  \ UIButton *pauseButton;\n@property (strong, nonatomic) IBOutlet UISlider *sliderVolume;\n\
  @property (strong, nonatomic) IBOutlet UISlider *sliderPan;\n@property (strong,\
  \ nonatomic) IBOutlet UISlider *sliderRate;\n@property (strong, nonatomic) IBOutlet\
  \ UILabel *averageLabel;\n@property (strong, nonatomic) IBOutlet UILabel *peakLabel;\n\
  -(IBAction)vibratePressed:(id)sender;\n-(IBAction)playPressed:(id)sender;\n-(IBAction)pausePressed:(id)sender;\n\
  \n-(IBAction)volumeSliderChanged:(UISlider *)sender;\n-(IBAction)panSliderChanged:(UISlider\
  \ *)sender;\n-(IBAction)rateSliderChanged:(UISlider *)sender;\n\n@end\n```\n\n你还需要在头文件中添加一个属性来跟踪你的\
  \ `AVAudioPlayer`，具体写法如下：\n\n```objc\n@property (nonatomic, strong) AVAudioPlayer\
  \ *player;\n```\n\n在实现文件中合成这个新属性，并将以下代码行添加到你的 `-viewDidUnload` 方法中，以确保你的应用程序在内存使用上尽可能高效。\n\
  \n```objc\nself.player.delegate = nil;\n[self setPlayer:nil];\n```\n\n头文件中的最后一步是让你的视图控制器遵循\
  \ `AVAudioPlayerDelegate` 协议。\n\n```objc\n@interface PlayerViewController : UIViewController\
  \ <AVAudioPlayerDelegate>\n```\n\n在继续之前，你需要选择并导入你的应用程序将要播放的声音文件。我使用的文件名为 `systemCheck.mp3`，以下代码将反映这个文件名。你需要根据自己选择的文件更改文件名或文件类型。你应该查阅\
  \ Apple 的文档，了解哪些文件类型是合适的，但可以相当安全地假设，大多数常用文件类型（如 `.wav` 或 `.mp3`）都能正常工作。\n\n为了捕获播放文件时可能出现的任何错误，你可以实现\
  \ `AVAudioPlayerDelegate` 协议中的一个方法：\n\n```objc\n-(void)audioPlayerDecodeErrorDidOccur:(AVAudioPlayer\
  \ *)player error:(NSError *)error\n{\n    NSLog(@\"播放文件时出错：%@\", [error localizedDescription]);\n\
  }\n```\n\n在访达中找到你的音频片段，然后点击并将其拖拽到 Xcode 的项目中。我个人倾向于将此类文件放在 Supporting Files 组中，但这完全是可选的。随后会弹出一个对话框，提示你选择添加文件的选项。你可能唯一需要修改的是，确保“将项目复制到目标组的文件夹中（如果需要）”旁边的复选框已勾选，如图\
  \ 7-4 所示。\n\n![图片](img/9781430240051_Fig07-04.jpg)\n\n**图 7-4.** *导入文件的弹出对话框——确保第一个复选框已勾选。*\n\
  \n现在你有了声音文件，就可以实现 `-viewDidLoad` 方法来设置你的 `AVAudioPlayer` 了。\n\n```objc\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    NSString *fileName = @\"systemCheck\";\n    NSString\
  \ *fileType = @\"mp3\";\n    NSString *soundFilePath = [[NSBundle mainBundle] pathForResource:fileName\
  \ ofType:fileType];\n    NSURL *soundFileURL = [NSURL fileURLWithPath:soundFilePath];\n\
  \n    NSError *error;\n    self.player = [[AVAudioPlayer alloc] initWithContentsOfURL:soundFileURL\
  \ error:&error];\n    self.player.enableRate = YES; // 允许我们改变播放速率\n    self.player.meteringEnabled\
  \ = YES; // 允许我们监测电平\n    self.player.delegate = self;\n    self.sliderVolume.value\
  \ = self.player.volume;\n    self.sliderRate.value = self.player.rate;\n    self.sliderPan.value\
  \ = self.player.pan;\n\n    [self.player prepareToPlay]; // 预加载音频以减少延迟\n\n    NSTimer\
  \ *timer = [NSTimer scheduledTimerWithTimeInterval:0.1 target:self\n    selector:@selector(updateLabels)\
  \ userInfo:nil repeats:YES];\n\n    [timer fire];\n}\n```\n\n如你所见，你已获取了声音文件的 URL，并用它创建了\
  \ `AVAudioPlayer`。你设置了 `enableRate` 属性以允许更改播放速率，并设置了 `meteringEnabled` 属性以允许监测播放器的电平。你调用了播放器上的可选方法\
  \ `-prepareToPlay` 来预加载声音文件，这有望让你的应用程序运行得更快一些。最后，你创建了一个定时器，它会以每秒十次的频率执行你的 `-updateLabels`\
  \ 方法。这样，你就能让标签以近乎恒定的速率更新了。\n\n现在，我们来为 `-updateLabels` 方法提供一个简单的实现。\n\n```objc\n\
  -(void)updateLabels\n{\n    [self.player updateMeters];\n    self.averageLabel.text\
  \ = [NSString stringWithFormat:@\"%f\", [self.player\n    averagePowerForChannel:0]];\n\
  \    self.peakLabel.text = [NSString stringWithFormat:@\"%f\", [self.player\n  \
  \  peakPowerForChannel:0]];\n}\n```\n\n任何时候使用 `-averagePowerForChannel` 或 `-peakPowerForChannel`\
  \ 方法时，你都需要调用 `-updateMeters`，才能获取最新的信息，因为这些值不会自动刷新。这两个方法都接受一个 `NSUInteger` 类型的参数，用于指定要检索信息的声道。传入值\
  \ 0 表示指定立体声轨道的左声道，或单声道轨道的唯一声道。鉴于你只是对该功能进行基本使用，声道 0 是一个很好的默认值。\n\n接下来，你将实现你的 `UISlider`\
  \ 的操作方法，这些方法会在滑块值每次改变时执行。\n\n```objc\n-(void)volumeSliderChanged:(UISlider *)sender\n\
  {\n    self.player.volume = sender.value;\n}\n-(void)panSliderChanged:(UISlider\
  \ *)sender\n{\n    self.player.pan = sender.value;\n}\n-(void)rateSliderChanged:(UISlider\
  \ *)sender\n{\n    self.player.rate = sender.value;\n}\n```\n\n现在，你将实现你的按钮操作方法，这些方法也同样简单。\n\
  \n```objc\n-(void)vibratePressed:(id)sender\n{\n    AudioServicesPlaySystemSound(kSystemSoundID_Vibrate);\n\
  }\n-(void)playPressed:(id)sender\n{\n    [self.player play];\n}\n-(void)pausePressed:(id)sender\n\
  {\n    [self.player pause];\n}\n```\n\n`AudioServicesPlaySystemSound()` 是 Audio\
  \ Toolbox 中定义的一个函数，用于播放预定义的系统声音，例如刚刚演示的让手机振动的声音。你也可以使用某些文件类型注册自己的系统声音。\n\n**注意：**\
  \ 虽然当前使用的大部分 AV Foundation 功能可以在模拟器上通过电脑的麦克风和扬声器正常工作，但上述的振动声音则不行。你需要使用实体设备来测试此功能。\n\
  \n至此，你的应用程序应该能够成功播放和暂停音乐，并且你可以调整播放速率、声像和音量，以及监测你的输出电平。\n\n\n\n每当处理包含声音或音乐的应用程序时，总会担心应用被电话或短信中断。您应该始终包含处理这些问题的功能。这可以通过`AVAudioPlayer`委托方法来实现。由于您已将视图控制器设置为`AVAudioPlayer`的委托，只需实现这些方法，即可在中断开始或结束时分别暂停和播放声音片段。\n\
  \n```\n-(void)audioPlayerBeginInterruption:(AVAudioPlayer *)player\n{\n    [self.player\
  \ pause];\n}\n-(void)audioPlayerEndInterruption:(AVAudioPlayer *)player\n{\n   \
  \ [self.player play];\n}\n```\n\n这是这些委托方法的一个极其简单的实现。对于您的应用，您可能选择添加更多功能，例如在应用被中断前保存数据或执行其他必要任务。\n\
  \n现在您应该能够看到使用`AVAudioPlayer`的灵活性，尽管它使用简单。通过使用多个`AVAudioPlayer`实例，您可以实现使用多个声音同时播放的复杂音频设计。例如，可以在一个`AVAudioPlayer`中运行背景音乐曲目，并使用另外一到两个来处理基于事件的声音效果。`AVAudioPlayer`类的强大、简洁和灵活性使其在\
  \ iOS 开发者中广受欢迎。\n\n## 食谱 7–2：录制音频\n\n既然您已经处理了播放音频的关键概念，接下来可以处理相反的操作：录制音频。这个过程在结构和实现上与播放音频非常相似。您将使用`AVAudioRecorder`类进行录音，并结合另一个`AVAudioPlayer`来处理录制的回放。\n\
  \n创建一个新项目，命名为“Chapter7Recipe2”，类前缀为“Recording”，使用单视图应用程序模板。\n\n您需要再次将 AV Foundation\
  \ 框架导入到项目中。请参考之前的食谱了解如何操作。与之前的食谱不同，本项目中不需要 Audio Toolbox 框架，因为您不会包含设备震动功能。确保在视图控制器的头文件中添加以下导入语句：\n\
  \n```\n#import <AVFoundation/AVFoundation.h>\n```\n\n接下来，在控制器的 XIB 文件中设置视图，使其看起来如图\
  \ 7-5 所示。\n\n![Image](img/9781430240051_Fig07-05.jpg)\n\n**图 7–5.** 录制和播放音频的用户界面\n\
  \n接下来，将两个按钮以及两个监控标签连接到头文件。切换到助理编辑器。按住^（Ctrl）并从视图元素拖到头文件，将按钮和标签连接到头文件。在本项目中，我将按钮命名为`recordButton`、`playButton`，标签命名为`averageLevel`和`peakLevel`。\n\
  \n您还需要为按钮定义两个操作方法，分别命名为`recordPressed:`和`playPressed:`，并将按钮连接到它们。为此，再次按住^（Ctrl），从\
  \ XIB 文件中的每个按钮拖到其对应的头文件操作。\n\n在进入实现文件之前，需要在头文件中添加一个名为`url`的实例变量，类型为`NSURL`，用于跟踪录制保存的位置。最后，需要添加两个属性，一个用于`AVAudioPlayer`，命名为`player`，另一个用于`AVAudioRecorder`，命名为`audioRecorder`。确保在实现文件中正确合成它们，并在`viewDidUnload`方法中将它们（以及它们的委托）设置为`nil`。此时，您的头文件应如下所示：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\n@interface\
  \ RecordingViewController : UIViewController {\n    NSURL *url;\n}\n\n@property\
  \ (strong, nonatomic) IBOutlet UIButton *recordButton;\n@property (strong, nonatomic)\
  \ IBOutlet UIButton *playButton;\n@property (strong, nonatomic) IBOutlet UILabel\
  \ *averageLevel;\n@property (strong, nonatomic) IBOutlet UILabel *peakLevel;\n\n\
  @property (strong, nonatomic) AVAudioRecorder *audioRecorder;\n@property (strong,\
  \ nonatomic) AVAudioPlayer *player;\n\n-(IBAction)recordPressed:(id)sender;\n-(IBAction)playPressed:(id)sender;\n\
  \n@end\n```\n\n现在，编写`viewDidLoad`方法，它与上一个食谱中的方法非常相似。\n\n```\n-(void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    url = [self tempFileURL];\n    self.audioRecorder\
  \ = [[AVAudioRecorder alloc] initWithURL:url settings:nil error:nil];\n    self.audioRecorder.meteringEnabled\
  \ = YES;\n\n    NSTimer *timer = [NSTimer scheduledTimerWithTimeInterval:0.01 target:self\n\
  \    selector:@selector(updateLabels) userInfo:nil repeats:YES];\n    [timer fire];\n\
  \n    [self.audioRecorder prepareToRecord];\n}\n```\n\n与上一个食谱一样，您向`AVAudioRecorder`发送`prepareToRecord`操作，以帮助提高应用的运行速度。您还设置了一个定时器来重复更新电平监控标签。\n\
  \n上述实现使用了`tempFileURL`方法来获取 URL，该方法的实现如下。为了避免编译器警告，请确保在`viewDidLoad`方法之前包含此方法，或者简单地在头文件中声明其处理程序`-(NSURL\
  \ *)tempFileURL:`。\n\n\n\n`- (NSURL *)tempFileURL`\n```\n{\n    NSString *outputPath\
  \ = [[NSString alloc] initWithFormat:@\"%@%@\", NSTemporaryDirectory(), @\"recording.wav\"\
  ];\n    NSURL *outputURL = [[NSURL alloc] initFileURLWithPath:outputPath];\n   \
  \ NSFileManager *manager = [[NSFileManager alloc] init];\n    if ([manager fileExistsAtPath:outputPath])\n\
  \    {\n        [manager removeItemAtPath:outputPath error:nil];\n    }\n    return\
  \ outputURL;\n}\n```\n\n你的 `-updateLabels` 方法再次实现如下：\n\n```\n-(void)updateLabels\n\
  {\n    [self.audioRecorder updateMeters];\n    self.averageLevel.text = [NSString\
  \ stringWithFormat:@\"%f\", [self.audioRecorder\naveragePowerForChannel:0]];\n \
  \   self.peakLevel.text = [NSString stringWithFormat:@\"%f\", [self.audioRecorder\n\
  peakPowerForChannel:0]];\n}\n```\n\n最后，你只需要实现按钮的动作。\n\n```\n-(void)recordPressed:(id)sender\n\
  {\n    if ([self.audioRecorder isRecording])\n    {\n        [self.audioRecorder\
  \ stop];\n        [self.recordButton setTitle:@\"Record\" forState:UIControlStateNormal];\n\
  \    }\n    else\n    {\n        [self.audioRecorder record];\n        [self.recordButton\
  \ setTitle:@\"Stop\" forState:UIControlStateNormal];\n    }\n}\n```\n```\n-(void)playPressed:(id)sender\n\
  {\n    NSFileManager *manager = [[NSFileManager alloc] init];\n    NSString *outputPath\
  \ = [[NSString alloc] initWithFormat:@\"%@%@\", NSTemporaryDirectory(), @\"recording.wav\"\
  ];\n    if (![self.player isPlaying])\n    {\n        if ([manager fileExistsAtPath:outputPath])\n\
  \        {\n            self.player = [[AVAudioPlayer alloc] initWithContentsOfURL:url\
  \ error:nil];\n            [self.player play];\n            [self.playButton setTitle:@\"\
  Pause\" forState:UIControlStateNormal];\n        }\n    }\n    else\n    {\n   \
  \     [self.player pause];\n        [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n\
  \    }\n}\n```\n\n**注意：** 在上述实现中，包含一个检查以确认给定路径下文件是否存在的步骤极其重要，以防用户在尚未录制任何声音时按下“播放”按钮。使用没有文件的\
  \ URL 初始化 `AVAudioPlayer` 会导致应用程序抛出异常。\n\n至此，你的应用程序将能成功录制和播放声音。在完成之前，你需要实现一个 `AVAudioPlayerDelegate`\
  \ 方法来处理播放结束。首先，你需要确保视图控制器遵循 `AVAudioPlayerDelegate` 协议，因此视图控制器头文件的顶部现在看起来像这样：\n\n\
  `@interface RecordingViewController : UIViewController <AVAudioPlayerDelegate>`\n\
  \n现在，你需要在 `-playPressed:` 方法中创建 `player` 后，通过以下代码行将其委托设置为你的视图控制器。\n\n`self.player.delegate\
  \ = self;`\n\n最后，你可以实现委托方法。\n\n```\n-(void)audioPlayerDidFinishPlaying:(AVAudioPlayer\
  \ *)player successfully:(BOOL)flag\n{\n    [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n\
  }\n```\n\n与之前的示例一样，你可以为你的 `AVAudioRecorder` 和 `AVAudioPlayer` 实现委托方法，通过暂停和重新开始录制或播放来处理诸如电话或短信之类的中断。\n\
  \n你在此处未实现的 `AVAudioRecorder` 的其他有用方法包括 `-pause` 方法（它会暂停录制，但允许再次调用 `-play` 方法以继续录制到同一文件），以及\
  \ `-recordForDuration` 方法（它允许你指定录制时间的限制）。\n\n如你所见，`AVAudioRecorder` 和 `AVAudioPlayer`\
  \ 可以出色地协同工作，为用户提供一个完整而简单的音频接口。\n\n### 菜谱 7–3：访问 iPod 资料库\n\n到目前为止，你已经能够处理播放和操作项目中包含的声音文件，但有一种简单的方法可以访问数量多得多的声音文件：访问用户的音乐资料库。\n\
  \n这里你将创建另一个新项目，这次命名为“MusicPick”。首先，你需要将项目与 Media Player 框架链接，并像往常一样在视图控制器中添加它的导入语句。\n\
  \n你将把视图设置为一个基本的音乐播放器，因此它看起来像图 7–6。\n\n![Image](img/9781430240051_Fig07-06.jpg)\n\
  \n**图 7–6.** *用于从 iPod 资料库排队播放音乐的用户界面*\n\n确保连接所有四个按钮，并将它们命名为 `playButton`、`prevButton`、`nextButton`\
  \ 和 `queueButton`。你的滑块将命名为 `sliderVolume`，而你的“信息”`UILabel` 将命名为 `infoLabel`。\n\n\
  你还需要为你的元素定义五个动作，分别是 `-playPressed:`、`-prevPressed:`、`-nextPressed:`、`-queuePressed:`\
  \ 和 `-volumeChanged:`。确保将每个元素连接到其对应的动作。\n\n你还需要在头文件中定义两个属性，一个类型为 `MPMusicPlayerController`，名为\
  \ `player`，用于播放音乐；另一个类型为 `MPMediaItemCollection`，名为 `myCollection`，用于帮助你追踪所选的要播放的曲目。最后，你将通过遵循\
  \ `MPMediaPickerControllerDelegate` 协议，使视图控制器成为名为 `MPMediaPickerController` 的类的委托，从而允许用户选择要播放的音乐。总体而言，你的头文件现在应该如下所示：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <MediaPlayer/MediaPlayer.h>\n\n@interface\
  \ MainViewController : UIViewController <MPMediaPickerControllerDelegate>\n\n@property\
  \ (strong, nonatomic) IBOutlet UIButton *queueButton;\n@property (strong, nonatomic)\
  \ IBOutlet UIButton *prevButton;\n@property (strong, nonatomic) IBOutlet UIButton\
  \ *playButton;\n@property (strong, nonatomic) IBOutlet UIButton *nextButton;\n@property\
  \ (strong, nonatomic) IBOutlet UISlider *sliderVolume;\n@property (strong, nonatomic)\
  \ IBOutlet UILabel *infoLabel;\n\n@property (strong, nonatomic) MPMediaItemCollection\
  \ *myCollection;\n@property (strong, nonatomic) MPMusicPlayerController *player;\n\
  \n-(IBAction)queuePressed:(id)sender;\n-(IBAction)prevPressed:(id)sender;\n-(IBAction)playPressed:(id)sender;\n\
  -(IBAction)nextPressed:(id)sender;\n\n-(IBAction)volumeChanged:(id)sender;\n@end\n\
  ```\n\n确保同时合成 `player` 和 `myCollection`，并像往常一样在 `-viewDidUnload` 中妥善处理它们。\n\n现在，你可以设置你的\
  \ `-viewDidLoad` 方法。\n\n```\n-(void)viewDidLoad\n{\n    [super viewDidLoad];\n\n\
  \    self.infoLabel.text = @\"...\";\n\n    self.player = [MPMusicPlayerController\
  \ applicationMusicPlayer];\n\n    [self setNotifications];\n\n    [self.player beginGeneratingPlaybackNotifications];\n\
  \n    [self.player setShuffleMode:MPMusicShuffleModeOff];\n    self.player.repeatMode\
  \ = MPMusicRepeatModeNone;\n\n    self.sliderVolume.value = self.player.volume;\n\
  }\n```\n\n`MPMusicPlayerController` 类有两个重要的类方法，可以让你访问该类的实例。你之前使用的 `+applicationMusicPlayer`\
  \ 返回一个特定于应用程序的音乐播放器。这个选项对于将你的音乐与设备的实际 iPod 分开管理很有用，但缺点是应用程序进入后台后无法播放。或者，你可以使用 `+iPodMusicPlayer`，它允许即使在后台也能持续播放。然而，在这种情况下要记住的主要一点是，你的\
  \ `player` 可能已经有一个来自实际 iPod 的 `nowPlayingItem`，你应该能够处理它。\n\n\n\n每当你使用 `MPMusicPlayerController`\
  \ 实例时，建议注册通知，以监听播放状态的变化或当前播放歌曲的变化。你可以在 `setNotifications` 方法中实现，如下所示：\n\n```\n-(void)setNotifications\n\
  {\n    NSNotificationCenter *notificationCenter = [NSNotificationCenter defaultCenter];\n\
  \    [notificationCenter\n     addObserver: self\n     selector:    @selector (handle_NowPlayingItemChanged:)\n\
  \     name:        MPMusicPlayerControllerNowPlayingItemDidChangeNotification\n\
  \     object:      self.player];\n\n    [notificationCenter\n     addObserver: self\n\
  \     selector:    @selector (handle_PlaybackStateChanged:)\n     name:        MPMusicPlayerControllerPlaybackStateDidChangeNotification\n\
  \     object:      self.player];\n\n    [notificationCenter addObserver:self\n \
  \                          selector:@selector(volumeChangedHardware:)\nname:@\"\
  AVSystemController_SystemVolumeDidChangeNotification\"\n                       \
  \      object:nil];\n}\n```\n\n此外，你还添加了第三个通知注册，以确保能感知用户通过设备侧边按钮调整设备音量的任何操作。这样，你的应用程序就能像普通音乐播放器一样被使用。\n\
  \n每个通知都会触发一个选择器方法，这些方法定义如下：\n\n```\n-(void)volumeChangedHardware:(id)sender\n{\n\
  \    [self.sliderVolume setValue:self.player.volume animated:YES];\n}\n- (void)\
  \ handle_PlaybackStateChanged: (id) notification\n{\n    MPMusicPlaybackState playbackState\
  \ = [self.player playbackState];\n\n    if (playbackState == MPMusicPlaybackStateStopped)\n\
  \    {\n        [self.playButton setTitle:@\"播放\" forState:UIControlStateNormal];\n\
  \        self.infoLabel.text = @\"...\";\n        [self.player stop];\n    }\n \
  \   else if (playbackState == MPMusicPlaybackStatePaused)\n    {\n        [self.playButton\
  \ setTitle:@\"播放\" forState:UIControlStateNormal];\n    }\n    else if (playbackState\
  \ == MPMusicPlaybackStatePlaying)\n    {\n        [self.playButton setTitle:@\"\
  暂停\" forState:UIControlStateNormal];\n    }\n}\n- (void) handle_NowPlayingItemChanged:\
  \ (id) notification\n{\n    MPMediaItem *currentItemPlaying = [self.player nowPlayingItem];\n\
  \    if (currentItemPlaying)\n    {\n        NSString *info = [NSString stringWithFormat:@\"\
  %@ - %@\", [currentItemPlaying valueForProperty:MPMediaItemPropertyTitle], [currentItemPlaying\
  \ valueForProperty:MPMediaItemPropertyArtist]];\n        self.infoLabel.text = info;\n\
  \    }\n    else\n    {\n        self.infoLabel.text = @\"...\";\n    }\n    if\
  \ (self.player.playbackState == MPMusicPlaybackStatePlaying)\n    {\n        [self.playButton\
  \ setTitle:@\"暂停\" forState:UIControlStateNormal];\n    }\n}\n```\n\n如你所见，当设备音量改变时，你只需通过动画将滑块调整到新值。当设备播放状态改变时，你只需根据新状态调整视图。每当当前播放的歌曲发生变化时，你都会更新用户界面，以显示当前播放媒体项的基本信息。\n\
  \n接下来，你将定义 `MPMediaPickerController` 的两个委托方法，以处理取消和成功选择媒体项的情况：\n\n```\n-(void)mediaPickerDidCancel:(MPMediaPickerController\
  \ *)mediaPicker\n{\n    [self dismissModalViewControllerAnimated:YES];\n}\n-(void)mediaPicker:(MPMediaPickerController\
  \ *)mediaPicker didPickMediaItems:(MPMediaItemCollection *)mediaItemCollection\n\
  {\n    [self updateQueueWithMediaItemCollection:mediaItemCollection];\n    [self\
  \ dismissModalViewControllerAnimated:YES];\n}\n```\n\n`MPMediaItemCollection` 是所选媒体项的集合，你可以将其排入\
  \ `MPMusicPlayerController` 的队列，并迭代播放。你需要通过定义 `updateQueueWithMediaItemCollection:`\
  \ 方法来更新 `player` 的队列：\n\n```\n-(void)updateQueueWithMediaItemCollection:(MPMediaItemCollection\
  \ *)collection\n{\n    if (collection)\n    {\n        if (self.myCollection ==\
  \ nil)\n        {\n            self.myCollection = collection;\n            [self.player\
  \ setQueueWithItemCollection: self.myCollection];\n            [self.player play];\n\
  \        }\n        else\n        {\n            BOOL wasPlaying = NO;\n       \
  \     if (self.player.playbackState == MPMusicPlaybackStatePlaying) {\n        \
  \        wasPlaying = YES;\n            }\n\n            MPMediaItem *nowPlayingItem\
  \        = self.player.nowPlayingItem;\n            NSTimeInterval currentPlaybackTime\
  \ = self.player.currentPlaybackTime;\n\n            NSMutableArray *combinedMediaItems\
  \ =\n            [[self.myCollection items] mutableCopy];\n            NSArray *newMediaItems\
  \ = [collection items];\n            [combinedMediaItems addObjectsFromArray: newMediaItems];\n\
  \n            [self setMyCollection:\n             [MPMediaItemCollection collectionWithItems:\n\
  \              (NSArray *) combinedMediaItems]];\n\n            [self.player setQueueWithItemCollection:self.myCollection];\n\
  \n            self.player.nowPlayingItem      = nowPlayingItem;\n            self.player.currentPlaybackTime\
  \ = currentPlaybackTime;\n\n            if (wasPlaying)\n            {\n       \
  \         [self.player play];\n            }\n        }\n    }\n}\n```\n\n这个方法看起来可能有些复杂，但实际上逻辑相当线性。首先，在确认集合不为\
  \ `nil` 后，检查是否已有先前的队列设置。如果没有，就将 `player` 的队列设置为此集合。如果有，则将两个集合合并，将 `player` 的队列设置为合并结果，然后将播放状态恢复到之前的位置。\n\
  \n**提示：** 如果在 `MPMusicPlayerController` 正在播放时更新队列，你可能会注意到播放过程中出现短暂的中断。可以通过使用 `BOOL`\
  \ 标志位，仅在歌曲之间更新队列来规避此问题。\n\n你可以相当简单地定义由按钮和滑块执行的所有方法，以执行各自的命令：\n\n```\n-(void)queuePressed:(id)sender\n\
  {\n    MPMediaPickerController *picker = [[MPMediaPickerController alloc] initWithMediaTypes:MPMediaTypeMusic];\n\
  \    picker.delegate = self;\n    picker.allowsPickingMultipleItems = YES;\n   \
  \ picker.prompt =\n    NSLocalizedString (@\"添加要播放的歌曲\",\n                     \
  \  \"媒体项选择器中的提示\");\n    [self presentModalViewController:picker animated:YES];\n\
  }\n-(void)prevPressed:(id)sender\n{\nif ([self.player currentPlaybackTime] > 5.0)\n\
  \    {\n        [self.player skipToBeginning];   \n    }\n    else\n    {\n    \
  \    [self.player skipToPreviousItem];\n    }\n}\n-(void)volumeChanged:(id)sender\n\
  {\n    if (self.player.volume != self.sliderVolume.value)\n    {\n        self.player.volume\
  \ = self.sliderVolume.value;\n    }\n}\n-(void)playPressed:(id)sender\n{\n    if\
  \ ((myCollection != nil) && (self.player.playbackState != MPMusicPlaybackStatePlaying))\n\
  \    {\n        [self.player play];\n        [self.playButton setTitle:@\"暂停\" forState:UIControlStateNormal];\n\
  \    }\n    else if (self.player.playbackState == MPMusicPlaybackStatePlaying)\n\
  \    {\n        [self.player pause];\n        [self.playButton setTitle:@\"播放\"\
  \ forState:UIControlStateNormal];\n    }\n}\n-(void)nextPressed:(id)sender\n{\n\
  \        [self.player skipToNextItem];\n}\n```\n\n如你所见，你为用户提供了一个五秒钟的时间窗口，在此期间按下“上一首”按钮会跳转到上一首歌曲，超出此时间窗口则会先跳转到当前歌曲的开头。\n\
  \n\n\n你的最后一步是完整实现 `-viewDidUnload` 方法，以正确处理 `player` 的设置。由于你在应用启动时注册为三种不同通知的观察者，你需要将视图控制器移除为这些值的观察者。同时，你还要确保\
  \ `-stop` 你的 `MPMusicPlayerController`，并将其队列设置为 `nil`。完整的方法如下所示：\n\n```\n- (void)viewDidUnload`\n\
  `{\n    [self.player stop];\n    [self.player setQueueWithItemCollection:nil];\n\
  \    [[NSNotificationCenter defaultCenter]\n     removeObserver: self\n     name:\
  \           MPMusicPlayerControllerNowPlayingItemDidChangeNotification\n     object:\
  \         self.player];\n\n    [[NSNotificationCenter defaultCenter]\nremoveObserver:\
  \ self\n     name:           MPMusicPlayerControllerPlaybackStateDidChangeNotification\n\
  \     object:         self.player];\n\n    [[NSNotificationCenter defaultCenter]\
  \ removeObserver:self name:@\"AVSystemController_SystemVolumeDidChangeNotification\"\
  \  object:nil];\n\n    [self.player endGeneratingPlaybackNotifications];\n    self.myCollection\
  \ = nil;\n    self.player = nil;\n    [self setQueueButton:nil];\n    [self setPrevButton:nil];\n\
  \    [self setPlayButton:nil];\n    [self setNextButton:nil];\n    [self setSliderVolume:nil];\n\
  \    [self setInfoLabel:nil];\n    [super viewDidUnload];\n}\n```\n\n运行此应用时需要注意一点：在开始播放音乐之前，你将无法通过外部音量按钮调整\
  \ `AVAudioPlayer` 的音量，因为这些按钮仍会控制铃声音量，而非播放音量。一旦你选择一首歌曲播放，这些按钮就会完全控制播放音量。\n\n你可能已经看到这个框架为开发者提供的强大功能。通过访问用户自己的媒体库，你可以为用户的应用打开一个全新的音频定制层级，可能性包括选择闹钟音乐，或为游戏指定背景音乐。通过赋予用户选择和个性化的能力，你的应用的市场竞争力和功能性将显著提升。\n\
  \n#### 查询媒体\n\n现在你已经了解了让用户选择音乐的简单方法，接下来可以实现更强大的方法来查询、过滤和排序用户媒体库中的音乐。\n\n此处你只需在前一个配方的基础上添加功能，具体地，允许用户输入艺术家名称，然后查询媒体库中该艺术家的音乐。\n\
  \n首先，在前一个配方剩余的 XIB 中添加一个 `UIButton` 和一个 `UITextField`，使视图看起来像图 7-7。\n\n![Image](img/9781430240051_Fig07-07.jpg)\n\
  \n**图 7-7.** *用于查询音乐的用户界面*\n\n确保正确将此按钮连接到名为 `-queryPressed:` 的操作，并将文本字段连接到名为 `textFieldArtist`\
  \ 的属性。\n\n你首先要对新添加的 `UITextField` 设置其代理为你的视图控制器，在 `-viewDidLoad` 中添加以下代码：\n\n```\n\
  self.textFieldArtist.delegate = self;\nself.textFieldArtist.enablesReturnKeyAutomatically\
  \ = YES;\n```\n\n确保调整你的头文件，声明视图控制器遵循 `UITextFieldDelegate` 协议。\n\n接下来，你需要实现以下 `UITextField`\
  \ 代理方法，以便在按下返回键时正确关闭键盘：\n\n```\n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n\
  {\n    [textField resignFirstResponder];\n    return NO;\n}\n```\n\n你也可以选择在 `-textFieldShouldReturn:`\
  \ 方法中包含对 `-queryPressed:`（稍后实现）的调用，这样当按下返回键时自动执行查询。我选择不这样做，以防用户希望在当前歌曲播放完后才执行查询。\n\
  \n接下来实现 `-queryPressed:` 方法：\n\n```\n-(void)queryPressed:(id)sender\n{\n    NSString\
  \ *artist = self.textFieldArtist.text;\n    if (artist != nil && artist != @\"\"\
  )\n    {\n        MPMediaPropertyPredicate *artistPredicate = [MPMediaPropertyPredicate\
  \ predicateWithValue:artist forProperty:MPMediaItemPropertyArtist comparisonType:MPMediaPredicateComparisonContains];\n\
  \        MPMediaQuery *query = [[MPMediaQuery alloc] init];\n        [query addFilterPredicate:artistPredicate];\n\
  \n        NSArray *result = [query items];\nif ([result count] > 0)\n        {\n\
  \            [self updateQueueWithMediaItemCollection:[MPMediaItemCollection collectionWithItems:result]];\n\
  \        }\n        else\n            self.infoLabel.text = @\"Artist Not Found.\"\
  ;\n    }\n}\n```\n\n可以看到，查询媒体库是一个相当简单的过程，其最低要求仅需要一个 `MPMediaQuery` 类的实例。然后你可以向查询添加\
  \ `MPMediaPropertyPredicates` 以使其更具体。\n\n使用 `MPMediaPropertyPredicates` 需要对不同的 `MPMediaItemProperties`\
  \ 有充分的了解，以便准确知道可以获取哪些信息。并非所有 `MPMediaItemProperties` 都是可过滤的，而且如果你处理的是播客，可过滤的属性也不同。你应该查阅关于\
  \ `MPMediaItem` 的 Apple 文档以获取完整属性列表，但以下是常用属性列表：\n\n*   `MPMediaItemPropertyMediaType`\n\
  *   `MPMediaItemPropertyTitle`\n*   `MPMediaItemPropertyAlbumTitle`\n*   `MPMediaItemPropertyArtist`\n\
  *   `MPMediaItemPropertyArtwork`\n\n**提示：** 使用 `MPMediaItemPropertyArtwork` 时，可以使用\
  \ `MPMediaItemPropertyArtwork` 中定义的 `-imageWithSize:` 方法来创建 `UIImage`。\n\n\n\n####\
  \ `MPMediaPropertyPredicates` 的几点说明：\n\n**3.**  当向查询添加多个指定不同属性的筛选谓词时，这些谓词会使用“与”（AND）运算符进行求值。这意味着，如果你指定了艺术家姓名和专辑名称，你将只会收到该艺术家**并且**来自该特定专辑的歌曲。\n\
  \n**4.**  不要向一个查询添加两个针对同一属性的筛选谓词，因为其行为结果是未定义的。如果你想针对同一属性的多个特定值查询数据库，例如筛选来自两位不同艺术家的所有歌曲，更好的方法是简单地创建两个查询，然后将它们的结果合并起来。\n\
  \n**5.**  `MPMediaPropertyPredicate` 的 `comparisonType` 属性有助于指定你的谓词匹配的精确程度。值为 `MPMediaPredicateComparisonEqualTo`\
  \ 时，仅返回字符串与给定字符串完全匹配的项目；而值为 `MPMediaPredicateComparisonContains` 时（如前所示），则返回包含给定字符串的项目，这通常意味着搜索精度较低。\n\
  \n作为一项附加功能，`MPMediaQuery` 还可以被赋予一个“分组属性”，以便其自动对结果进行分组。例如，你可以按特定艺术家筛选查询，但根据专辑名称进行分组。通过这种方式，你可以检索特定艺术家的所有歌曲，但像按专辑分组那样进行迭代处理，如下列代码所示。你可以将这些代码添加到你的\
  \ `-queryPressed:` 方法中，在该方法中创建了以下 `query` 对象。\n\n```\n[query setGroupingType: MPMediaGroupingAlbum];\n\
  \        NSArray *albums = [query collections];\n        for (MPMediaItemCollection\
  \ *album in albums)\n        {\n            MPMediaItem *representativeItem = [album\
  \ representativeItem];\n            NSString *albumName = [representativeItem valueForProperty:\
  \ MPMediaItemPropertyAlbumTitle];\n            NSLog (@\"%@\", albumName);\n   \
  \     }\n```\n\n你也可以通过使用类方法来设置分组类型，例如 `MPMediaQuery` 的 `+albumsQuery`，这将会为你创建一个预先设置了分组属性的\
  \ `query` 实例。\n\n### 技巧 7–4：后台播放与正在播放信息\n\n到目前为止，你已经了解了在 iOS 中处理音频的多种技术：从播放单个音效，到访问媒体库，再到使用\
  \ iPod 播放器。每种技术根据你应用的目标，都各有其优缺点和特定用途。\n\n然而，当所有这些功能结合使用时，你应用的潜力将变得几乎是无限的。在这里，你将结合使用\
  \ `AVFoundation`、`MPMediaQuery`、`MPMediaPickerController` 和 `MPNowPlayingInfoCenter`（iOS\
  \ 5.0 的新特性！），来创建你自己版本的 iPod 用户界面（尽管不如原版美观），以便即使你的应用在后台运行，音乐也能继续播放。\n\n使用“单视图应用程序”（Single\
  \ View Application）模板创建一个新项目，将其命名为“Chapter7Recipe3”，类前缀为“Main”。\n\n接下来，你需要确保所有必需的框架都已导入。继续将以下框架链接到你的项目中，操作方式与你本章中之前的所有技巧完全相同。\n\
  \n- `AVFoundation.framework`：你将使用此框架来播放音频文件。\n- `MediaPlayer.framework`：此框架将允许你访问媒体库和媒体文件。\n\
  - `CoreMedia.framework`：你不会使用此框架中的任何类，但你需要用到一些 `CMTime` 函数来帮助你处理音频播放器。\n\n在你的视图控制器头文件中添加以下导入语句。在这个项目中，你不需要为\
  \ Core Media 框架添加导入语句。\n\n```\n#import <MediaPlayer/MediaPlayer.h>\n#import <AVFoundation/AVFoundation.h>\n\
  ```\n\n你的视图控制器最终还将成为多个对象的代理，因此请为以下协议在你的头文件中添加协议声明：\n\n- `UITextFieldDelegate`\n\
  - `AVAudioSessionDelegate`\n- `MPMediaPickerControllerDelegate`\n\n接下来，你将设置你的应用，使其在进入设备后台后能够继续播放音乐。你需要做的第一件事是声明一个类型为\
  \ `AVAudioSession` 的属性，命名为 `session`。确保使用 `@synthesize` 合成它，然后像往常一样，在你的 `-viewDidUnload`\
  \ 方法中将其设置为 `nil`。\n\n```\n@property (nonatomic, strong) AVAudioSession *session;\n\
  ```\n\n然后，在你的 `-viewDidLoad` 方法中添加以下代码：\n\n```\nself.session = [AVAudioSession sharedInstance];\n\
  self.session.delegate = self;\n[self.session setCategory:AVAudioSessionCategoryPlayback\
  \ error:nil];\n[self.session setActive:YES error:nil];\n```\n\n通过将你的 `session` 的类别指定为\
  \ `AVAudioSessionCategoryPlayback`，你是在告知设备你的应用主要功能是播放音乐，因此应允许应用在后台时继续播放音频。\n\n你还需要确保在完成使用后停用你的会话，因此请在\
  \ `-viewDidUnload` 方法中添加以下代码行。\n\n```\n[self.session setActive:NO error:nil];\n\
  ```\n\n现在你已经配置好了 `AVAudioSession`，你需要编辑应用的 `.plist` 文件，以指定你的应用在后台时必须允许运行音频。你通常可以在项目的“支持文件”（Supporting\
  \ Files）组中找到这个文件。如果找不到，你可以在项目的文件夹中找到它，如图 7–8 所示。\n\n![图片](img/9781430240051_Fig07-08.jpg)\n\
  \n**图 7–8.** *查找 `.plist` 文件*\n\n默认情况下，该文件应在 Xcode 中打开，类似于图 7–9。\n\n![图片](img/9781430240051_Fig07-09.jpg)\n\
  \n**图 7–9**. *编辑 `.plist` 文件*\n\n在“编辑器”（Editor）菜单下，选择**添加项目（Add Item）**。应该会出现一个新项目，看起来像图\
  \ 7–10。\n\n![图片](img/9781430240051_Fig07-10.jpg)\n\n**图 7–10.** *设置应用类别*\n\n对于“应用类别”（Application\
  \ Category）项目，点击箭头对打开下拉菜单，然后选择“所需的后台模式”（Required Background modes）。\n\n\n\n点击该项目新项的左侧箭头，展开值列表。您将编辑“Item\
  \ 0”的值。点击右侧下拉菜单，选择“App plays audio”，如图 7–11 所示。或者，您也可以在值字段中键入`audio`，按下回车键后，Xcode\
  \ 将自动更正该值。\n\n![Image](img/9781430240051_Fig07-11.jpg)\n\n**图 7–11.** *指定后台音频功能*\n\
  \n现在，您的应用程序已准备好支持在后台状态下播放音频！\n\n接下来，您将在 XIB 文件中构建用户界面。设置您的视图，使其外观如图 7–12 所示。\n\n\
  ![Image](img/9781430240051_Fig07-12.jpg)\n\n**图 7–12.** *自定义音乐播放器的用户界面*\n\n在本项目中，将为显示的视图元素分配以下变量名，请按所示名称将每个元素连接到您的头文件中：\n\
  \n*   `infoLabel`：视图顶部的`UILabel`，用于显示当前歌曲信息。\n*   `textFieldSong`：您的`UITextField`，为其设置了占位符文本“Song”。\n\
  *   `queryButton`：标题为“Query”的上方`UIButton`。\n*   `artworkImageView`：您的`UIImageView`，用于显示歌曲的专辑封面。\n\
  *   `libraryButton`：大的“Library”`UIButton`。\n*   `playButton`：中间的“Play”`UIButton`。\n\
  *   `nextButton`：右侧的“Next”`UIButton`。\n*   `prevButton`：左侧的“Prev”`UIButton`。\n\n\
  为您将使用的五个按钮定义操作，并将每个按钮连接到其对应的方法。您的方法声明应如下所示：\n\n```\n-(IBAction)queryPressed:(id)sender;\n\
  -(IBAction)nextPressed:(id)sender;\n-(IBAction)prevPressed:(id)sender;\n-(IBAction)playPressed:(id)sender;\n\
  -(IBAction)libraryPressed:(id)sender;\n```\n\n接下来，您将声明运行应用程序所需的其他属性对象。对于以下每个属性，请确保对其进行合成，并在应用程序结束时将其正确设置为`nil`。首先，您将使用`AVQueuePlayer`类的实例来播放和排队声音文件，因此将其声明为一个属性：\n\
  \n```\n@property (nonatomic, strong) AVQueuePlayer *player;\n```\n\n为了管理您的`player`，您需要两个`NSMutableArray`类型的副本来管理其播放列表。一个数组包含所有已排队的原始`MPMediaItem`类项（您可以从中访问媒体信息），另一个数组包含它们全部转换为`AVPlayerItem`实例后的项（您可以通过`AVQueuePlayer`播放它们）。您还需要一个`NSUInteger`类型的属性来帮助跟踪当前播放的项。这些属性将按如下方式声明，确保正确合成并将每个属性设为`nil`：\n\
  \n```\n@property (nonatomic, strong) NSMutableArray *playlist;\n@property (nonatomic,\
  \ strong) NSMutableArray *myCollection;\n@property (nonatomic) NSUInteger currentIndex;\n\
  ```\n\n现在，您要在实现文件中完成的第一件事是编写`-viewDidLoad`方法，使其如下所示：\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    self.session = [AVAudioSession sharedInstance];\n\
  \    self.session.delegate = self;\n    [self.session setCategory:AVAudioSessionCategoryPlayback\
  \ error:nil];\n    [self.session setActive:YES error:nil];\n\n    self.textFieldSong.delegate\
  \ = self;\n    [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n\
  }\n```\n\n这里新增的代码只是确认`playButton`的标题设置正确，并将您的视图控制器设置为`UITextField`的代理。实现`UITextFieldDelegate`方法来处理键盘的关闭，如下所示：\n\
  \n```\n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n{\n    [textField\
  \ resignFirstResponder];\n    return NO;\n}\n```\n\n您还需要重写`playlist`的 getter 方法，以确保其正确初始化。\n\
  \n```\n-(NSMutableArray *)playlist\n{\n    if (!playlist)\n    {\n        playlist\
  \ = [[NSMutableArray alloc] initWithCapacity:5];\n    }\n    return playlist;\n\
  }\n```\n\n您还需要重写`currentIndex`的 getter 方法，使其始终返回当前播放项的正确索引。\n\n```\n-(NSUInteger)currentIndex\n\
  {\n    currentIndex = [self.playlist indexOfObject:self.player.currentItem];\n \
  \   return currentIndex;\n}\n```\n\n接下来，您将实现一个方法，该方法会在每次歌曲切换时更新用户界面。\n\n```\n-(void)updateNowPlaying\n\
  {\n    if (self.player.currentItem != nil)\n    {\n        MPMediaItem *nowPlaying\
  \ = [self.myCollection objectAtIndex:self.currentIndex];\n//        NSLog(@\"%@\"\
  , [nowPlaying valueForProperty:MPMediaItemPropertyTitle]);\n\n        self.infoLabel.text\
  \ = [NSString stringWithFormat:@\"%@ - %@\", [nowPlaying valueForProperty:MPMediaItemPropertyTitle],\
  \  [nowPlaying valueForProperty:MPMediaItemPropertyArtist]];\n\n        UIImage\
  \ *artwork = [[nowPlaying valueForProperty:MPMediaItemPropertyArtwork] imageWithSize:self.artworkImageView.frame.size];\n\
  \        if (artwork)\n        {\n            self.artworkImageView.image = artwork;\n\
  \        }\n        else\n        {\n            self.artworkImageView.image = nil;\n\
  \        }\n        if ([MPNowPlayingInfoCenter class])  \n        {\n         \
  \   NSString *title = [nowPlaying valueForProperty:MPMediaItemPropertyTitle];\n\
  \            NSString *artist = [nowPlaying valueForProperty:MPMediaItemPropertyArtist];\n\
  \            NSDictionary *currentlyPlayingTrackInfo = [NSDictionary\ndictionaryWithObjects:[NSArray\
  \ arrayWithObjects:title, artist, nil] forKeys:[NSArray\narrayWithObjects:MPMediaItemPropertyTitle,\
  \ MPMediaItemPropertyArtist, nil]];\n            [MPNowPlayingInfoCenter defaultCenter].nowPlayingInfo\
  \ =\ncurrentlyPlayingTrackInfo;\n        }\n    }\n    else\n    {\n        self.infoLabel.text\
  \ = @\"...\";\n        [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n\
  \        self.artworkImageView.image = nil;\n    }\n}\n```\n\n刚才展示的方法除了更新用户界面以显示当前歌曲信息外，还利用了\
  \ iOS 5 的一个新功能，即`MPNowPlayingInfoCenter`！这个类允许开发者将信息放置在设备的锁屏上，或者当应用程序通过 AirPlay\
  \ 显示信息时放置在其他设备上。您可以通过将`+defaultCenter`的`nowPlayingInfo`属性设置为您创建的字典值来向其传递信息。\n\n\
  要利用上述的`MPNowPlayingInfoCenter`实现，您必须在代码中进行一些特定的添加。具体来说，如果您的应用程序无法处理远程控制事件，所有这些功能都将无法工作。为此，首先实现处理远程事件的`-remoteControlReceivedWithEvent:`方法。\n\
  \n```\n- (void) remoteControlReceivedWithEvent: (UIEvent *) receivedEvent {\n  \
  \  if (receivedEvent.type == UIEventTypeRemoteControl) {\n\n        switch (receivedEvent.subtype)\
  \ {\n\n            case UIEventSubtypeRemoteControlTogglePlayPause:\n          \
  \      [self playPressed:nil];\n                break;\n\n            case UIEventSubtypeRemoteControlPreviousTrack:\n\
  \                [self prevPressed:nil];\n                break;\n\n           \
  \ case UIEventSubtypeRemoteControlNextTrack:\n                [self nextPressed:nil];\n\
  \                break;\n\n            default:\n                break;\n      \
  \  }\n    }\n}\n```\n\n当用户在锁屏或多任务屏幕上点击暂停、上一首和下一首按钮时，将调用上述方法。您只需让它们调用您稍后将实现的播放、前进和后退方法即可。\n\
  \n\n\n接下来，为了接收这些远程控制事件，你需要修改 `-viewDidAppear:animated:` 和 `-viewWillDisappear:animated:`\
  \ 方法。\n\n```\n- (void)viewDidAppear:(BOOL)animated\n{\n    [super viewDidAppear:animated];\n\
  \    [[UIApplication sharedApplication] beginReceivingRemoteControlEvents];\n  \
  \  [self becomeFirstResponder];\n}\n- (void)viewWillDisappear:(BOOL)animated\n{\n\
  \    [[UIApplication sharedApplication] endReceivingRemoteControlEvents];\n    [self\
  \ resignFirstResponder];\n    [super viewWillDisappear:animated];\n}\n```\n\n最后，为了使上述两个方法正常工作并让你的视图控制器成为第一响应者，你需要像这样重写\
  \ `-canBecomeFirstResponder` 方法：\n\n```\n-(BOOL)canBecomeFirstResponder\n{\n   \
  \ return YES;\n}\n```\n\n如果未遵循这些额外步骤，你的应用程序将无法在锁屏或多任务栏中使用任何“Now Playing”信息。\n\n\
  为了帮助保持你的两个 `NSMutableArray` 同步，你需要定义一个方法，该方法接收一个 `MPMediaItem` 的 `NSArray`，并返回一个包含相同项目但已转换为\
  \ `AVPlayerItem` 的 `NSArray`。\n\n```\n-(NSArray *)AVPlayerItemsFromArray:(NSArray\
  \ *)items\n{\n    NSMutableArray *array = [[NSMutableArray alloc] initWithCapacity:[items\
  \ count]];\n    NSURL *url;\n    for (MPMediaItem *current in items)\n    {\n  \
  \      url = [current valueForProperty:MPMediaItemPropertyAssetURL];\n        AVPlayerItem\
  \ *playerItem = [AVPlayerItem playerItemWithURL:url];\n\n        [[NSNotificationCenter\
  \ defaultCenter]\n         addObserver:self\n         selector:@selector(playerItemDidReachEnd:)\n\
  \         name:AVPlayerItemDidPlayToEndTimeNotification\n         object:playerItem];\n\
  \n        if (playerItem != nil)\n            [array addObject:playerItem];\n  \
  \  }\n    return array;\n}\n```\n\n为了后续能够判断歌曲何时播放完毕并做出相应处理，你需要像前面展示的那样，将视图控制器添加为观察者。在这个方法中包含\
  \ `-addObserver` 调用相当方便，因为你可以轻松访问即将使用的所有 `AVPlayerItem`。\n\n在处理 `NSNotificationCenter`\
  \ 时，请确保刚刚添加的所有观察者都能被正确移除。将以下代码添加到你的 `-viewDidUnload` 方法中。\n\n```\nfor (AVPlayerItem\
  \ *playerItem in self.playlist)\n    {\n        [[NSNotificationCenter defaultCenter]\
  \ removeObserver:self name:AVPlayerItemDidPlayToEndTimeNotification object:playerItem];\n\
  \    }\n```\n\n你指定在歌曲播放结束时执行的 `-playerItemDidReachEnd:` 方法的实现非常简单，如下所示。\n\n```\n\
  - (void)playerItemDidReachEnd:(NSNotification *)notification\n{\n    [self performSelector:@selector(updateNowPlaying)\
  \ withObject:nil afterDelay:\n0.5];\n}\n```\n\n我在这里加入了半秒延迟，以确保在 `AVQueuePlayer`\
  \ 完全切换到播放下一项目之后，`-updateNowPlaying` 调用才会执行。\n\n接下来，你将实现两个方法，每当需要更新或添加播放列表时都会用到它们。\n\
  \n```\n-(void)updatePlaylistWithArray:(NSArray *)collection\n{\nif (([self.playlist\
  \ count] == 0) || (self.player.currentItem == nil))\n    {\n        [self.myCollection\
  \ removeAllObjects];\n        self.playlist = [NSMutableArray arrayWithArray:collection];\n\
  \        self.player = [[AVQueuePlayer alloc] initWithItems:self.playlist];\n  \
  \      [self.player play];\n    }\n    else\n    {\n        AVPlayerItem *currentItem\
  \ = [self.playlist lastObject];\n        for (AVPlayerItem *item in collection)\n\
  \        {\n            if ([self.player canInsertItem:item afterItem:currentItem])\n\
  \            {\n                [self.player insertItem:item afterItem:currentItem];\n\
  \                currentItem = item;\n            }\n        }\n        [self.playlist\
  \ addObjectsFromArray:collection];\n    }\n}\n```\n\n```\n-(void)updateMyCollectionWithArray:(NSArray\
  \ *)mediaItems\n{\nif ([self.myCollection count] == 0)\n    {\n        self.myCollection\
  \ = [NSMutableArray arrayWithArray:mediaItems];\n    }\n    else\n    {\n      \
  \  [self.myCollection addObjectsFromArray:mediaItems];\n    }\n}\n```\n\n你的 `-playPressed:`\
  \ 和 `-nextPressed:` 方法实现非常简单，因为 `AVQueuePlayer` 继承自 `AVPlayer` 类，并且拥有一个方便的小方法用于前进到队列中的下一项目。\n\
  \n```\n-(void)playPressed:(id)sender\n{\nif (self.playlist.count > 0)\n    {\n \
  \       if ([[self.playButton titleForState:UIControlStateNormal] isEqualToString:@\"\
  Play\"])\n        {\n            [self.player play];\n            [self.playButton\
  \ setTitle:@\"Pause\" forState:UIControlStateNormal];\n        }\n        else\n\
  \        {\n            [self.player pause];\n            // 回退半秒，以便用户在恢复播放时有一点引导时间\n\
  \            [self.player seekToTime:CMTimeSubtract(self.player.currentTime, CMTimeMakeWithSeconds(0.5,\
  \ 1.0)) completionHandler:^(BOOL finished)\n             {\n                 [self.playButton\
  \ setTitle:@\"Play\" forState:UIControlStateNormal];\n             }];\n       \
  \ }\n     [self updateNowPlaying];\n    }\n}\n-(void)nextPressed:(id)sender\n{\n\
  \    [self.player advanceToNextItem];\n    if (self.player.currentItem == nil)\n\
  \    {\n        [self.playlist removeAllObjects];\n        [self.myCollection removeAllObjects];\n\
  \    }\n    [self updateNowPlaying];\n}\n```\n\n遗憾的是，`AVQueuePlayer` 没有提供任何简单的方法来在队列中向后移动，因此你的\
  \ `-prevPressed:` 方法实现稍显复杂，只是涉及一些 `AVPlayerItem` 的交换操作。\n\n```\n-(void)prevPressed:(id)sender\n\
  {\n    if (CMTimeCompare(self.player.currentTime, CMTimeMake(5.0, 1)) > 0)\n   \
  \ {\n        [self.player seekToTime:kCMTimeZero];\n    }\n    else\n    {\n   \
  \     [self.player pause];\n\n        AVPlayerItem *current = self.player.currentItem;\n\
  \        if (current != [self.playlist objectAtIndex:0])\n        {\n          \
  \  AVPlayerItem *previous = [self.playlist objectAtIndex:[self.playlist indexOfObject:current]-1];\n\
  \            if ([self.player canInsertItem:previous afterItem:current])\n     \
  \       {\n                [current seekToTime:kCMTimeZero];\n                [previous\
  \ seekToTime:kCMTimeZero];\n\n                [self.player insertItem:previous afterItem:current];\n\
  \                [self.player advanceToNextItem];\n                [self.player\
  \ removeItem:current];\n                [self.player insertItem:current afterItem:previous];\n\
  \            }\n            else\n            {\n                NSLog(@\"Error:\
  \ Could not insert\");\n            }\n        }\n        else\n        {\n    \
  \        [self.player seekToTime:kCMTimeZero];\n        }\n\n        [self.player\
  \ play];\n    }\n    [self updateNowPlaying];\n}\n```\n\n你刚刚使用的 `CMTimeMake()` 函数是一个非常灵活的函数，它接受两个输入参数。第一个参数代表你想要的时间单位数量，第二个参数代表时间刻度，其中\
  \ 1 表示一秒，2 表示半秒，依此类推。调用 `CMTimeMake(100, 10)` 将创建 100 个 (1/10) 秒的单位，总共为 10 秒。\n\n\
  你的查询按钮的功能将是使用 `MPMediaQuery` 来检索库中包含 `UITextField` 中单词或短语的任何歌曲。一旦你记得之后要更新你的两个 `NSMutableArray`，这个实现就相当直接了当。\n\
  \n\n\n`-(void)queryPressed:(id)sender`\n{\n    MPMediaQuery *query = [[MPMediaQuery\
  \ alloc] init];\n    NSString *title = self.textFieldSong.text;\n    MPMediaPropertyPredicate\
  \ *songPredicate = [MPMediaPropertyPredicate predicateWithValue:title forProperty:MPMediaItemPropertyTitle\
  \ comparisonType:MPMediaPredicateComparisonContains];\n    [query addFilterPredicate:songPredicate];\n\
  \n    [self updatePlaylistWithArray:[self AVPlayerItemsFromArray:[query items]]];\n\
  \    [self updateMyCollectionWithArray:[query items]];\n\n    [self.playButton setTitle:@\"\
  Pause\" forState:UIControlStateNormal];\n\n    [self updateNowPlaying];\n    if\
  \ ([self.textFieldSong isFirstResponder])\n        [self.textFieldSong resignFirstResponder];\n\
  }\n\n最后，你可以设置你的 `-libraryPressed:` 方法，该方法将会弹出一个 `MPMediaPickerController`，允许你选择多首歌曲进行排队。\n\
  \n`-(void)libraryPressed:(id)sender`\n{\n    MPMediaPickerController *picker = [[MPMediaPickerController\
  \ alloc] initWithMediaTypes:MPMediaTypeMusic];\n    picker.delegate = self;\n  \
  \  picker.allowsPickingMultipleItems = YES;\n    picker.prompt = @\"Choose Some\
  \ Music!\";\n    [self presentModalViewController:picker animated:YES];\n}\n\n你需要实现两个代理方法才能正确处理\
  \ `MPMediaPickerController`。首先，这是处理取消操作的代理方法：\n\n`-(void)mediaPickerDidCancel:(MPMediaPickerController\
  \ *)mediaPicker`\n{\n    [self dismissModalViewControllerAnimated:YES];\n}\n\n其次，你还需要处理成功选择媒体后的代理方法，它看起来与\
  \ `-queryPressed:` 方法非常相似。\n\n`-(void)mediaPicker:(MPMediaPickerController *)mediaPicker\
  \ didPickMediaItems:(MPMediaItemCollection *)mediaItemCollection`\n{\n    [self\
  \ updatePlaylistWithArray:[self AVPlayerItemsFromArray:[mediaItemCollection items]]];\n\
  \    [self updateMyCollectionWithArray:[mediaItemCollection items]];\n    [self.playButton\
  \ setTitle:@\"Pause\" forState:UIControlStateNormal];\n    [self updateNowPlaying];\n\
  \n    [self dismissModalViewControllerAnimated:YES];\n}\n\n在测试这个应用时，你可能会注意到一个细微的问题：你还没有提供一种方法来清空队列并重置应用，除非播放或跳过直到队列末尾。如果你的队列只有几首歌，这不算什么问题，但如果你排队了更多歌曲，你很可能希望加入某种方法，通过重置你的\
  \ `NSMutableArray` 并移除 `player` 队列中的所有项目来清空队列。不过，出于测试目的，只需双击设备的 Home 键，长按应用图标，然后关闭即可。\n\
  \n现在，你的音乐排队播放器应该已经功能完整了！当你测试这个应用时，即使应用进入设备的后台，它也应该继续播放音乐！图 7–13 展示了你的应用正在播放一首歌，以及它的“正在播放”功能和接收远程控制事件的能力。\n\
  \n![Image](img/9781430240051_Fig07-13.jpg)\n\n**图 7–13.** *你的应用正在播放歌曲，同时在多任务栏中显示“正在播放”信息*\n\
  \n### 总结\n\n完整的多媒体体验不仅仅是用户能否听音乐这么简单。作为一种产品，声音更多地关乎那些能让其变得稍微更好一些的微小细节，无论是暂停时的快速淡出，还是更快速地找到歌曲。从录制音乐到过滤媒体项目，再到创建音量渐变，作为开发者，你用心在应用中加入的每一个额外细节，最终都会让你的用户享受到一个更加强大的工具。在\
  \ iOS 开发中，Apple 提供了一套极其强大的基于多媒体的功能供我们使用，正如在 iTunes App Store 中快速搜索所显示的那样，开发社区已经超越了本职要求，充分利用这些功能为我们的用户打造了一个超乎想象的多媒体环境。\n\
  \n## 第 8 章\n\n## 用户数据秘籍\n\n没有两个人是相同的，同样地，没有两台 iOS 设备是相同的，因为一台设备存储的信息极度依赖于使用它的人。我们将自己的生活填满设备，包括照片、日历、备忘录、联系人和音乐。作为开发者，能够访问所有这些信息（无论设备类型如何）至关重要，这样我们才能将这些信息整合到应用中，并提供更独特、更个性化的用户界面。在本章中，我们将介绍多种处理用户数据的方法，首先处理日历，然后处理通讯录。\n\
  \n\n### 配方 8-1：使用 `NSCalendar` 和 `NSDate`\n\n许多不同的应用常常用于基于时间和日期的计算。这可能涉及从日历转换、待办事项列表排序，到告知用户闹钟响起前还剩多少时间等各种场景。为了使用更复杂的基于事件的用户界面，你必须扎实掌握更基础的\
  \ `NSDate` 相关 API。在这里，你将通过实现一个简单的应用程序，演示如何利用 `NSDate`、`NSCalendar` 和 `NSDateComponents`\
  \ 类，将流行的公历日期转换为希伯来历日期。\n\n创建一个名为 `Chapter8Recipe1` 的新项目，类前缀设为 `Main`，并使用“单视图应用”模板。你不需要使用任何额外的框架。切换到你的视图控制器的\
  \ XIB 文件。将 XIB 文件设置为类似于图 8-1 所示的样子。\n\n![图片](img/9781430240051_Fig08-01.jpg)\n\n\
  **图 8-1.** *日历转换的用户界面*\n\n你需要设置代表每个 `UITextField` 的属性。视图设置完成后，使用如下适当的属性名将每个 `UITextField`\
  \ 连接到你的头文件。\n\n- `textFieldGMonth`\n- `textFieldGDay`\n- `textFieldGYear`\n- `textFieldHMonth`\n\
  - `textFieldHDay`\n- `textFieldHYear`\n\n这些属性名中的 `G` 和 `H` 分别指代给定的 `UITextField`\
  \ 位于应用的公历侧还是希伯来历侧。\n\n你不需要将 `UIButton` 连接到输出口，但请确保它们分别连接到对应的操作 `-convertToHebrew:`\
  \ 和 `-convertToGregorian:`。\n\n请始终牢记，当你处理接受用户输入的应用（例如这里的 `UITextField`）时，键盘总有可能弹出并覆盖屏幕的下半部分。因此，请将布局规划好，将所有\
  \ `UITextField` 放置在视图的上半部分！\n\n为了更好地控制所有这些 `UITextField`，你需要让你的视图控制器成为它们的代理。首先，将\
  \ `<UITextFieldDelegate>` 添加到控制器的头文件行中，使其现在看起来像这样：\n\n```\n@interface MainViewController\
  \ : UIViewController <UITextFieldDelegate>\n```\n\n接下来，通过将以下代码添加到你的 `-viewDidLoad`\
  \ 方法中，将所有 `UITextField` 的代理设置为你的视图控制器：\n\n```\nfor (UITextField *field in self.view.subviews)\n\
  {\n    if ([field respondsToSelector:@selector(setDelegate:)])\n    {\n        field.delegate\
  \ = self;\n    }\n}\n```\n\n在这个 `for` 循环中，调用 `-respondsToSelector:` 方法是必要的，否则你的应用会抛出一个\
  \ `NSException`。通常，当你处理数组中可能出现多种类型对象的情况时，这是一个相当不错的方法。\n\n接下来，定义 `UITextFieldDelegate`\
  \ 方法 `-textFieldShouldReturn:`，以便正常关闭键盘。\n\n```\n-(BOOL)textFieldShouldReturn:(UITextField\
  \ *)textField\n{\n    [textField resignFirstResponder];\n    return NO;\n}\n```\n\
  \n你将在这里看到的第一个新类是 `NSCalendar`。它主要用于为你稍后引用的日期设定一个标准。`NSCalendar` 方法还允许你执行几个处理日历的有用功能，例如更改一周从哪一天开始，或更改使用的时区。`NSCalendar`\
  \ 类也充当了你稍后将看到的 `NSDate` 和 `NSDateComponents` 类之间的桥梁。\n\n你将使用 `NSCalendar` 类的两个实例来将日期从公历转换为希伯来历。你将把它们设为类的属性。\n\
  \n```\n@property (nonatomic, strong) NSCalendar *gregorianCalendar;\n@property (nonatomic,\
  \ strong) NSCalendar *hebrewCalendar;\n```\n\n像处理其他属性一样，继续为这两个属性添加 `@synthesize`。不过，你需要为每个属性的\
  \ getter 方法提供自定义实现。\n\n```\n-(NSCalendar *)gregorianCalendar\n{\n    if (!gregorianCalendar)\n\
  \    {\n        gregorianCalendar = [[NSCalendar alloc]\ninitWithCalendarIdentifier:NSGregorianCalendar];\n\
  \    }\n    return gregorianCalendar;\n}\n\n-(NSCalendar *)hebrewCalendar\n{\n \
  \   if (!hebrewCalendar)\n    {\n        hebrewCalendar = [[NSCalendar alloc]\n\
  initWithCalendarIdentifier:NSHebrewCalendar];\n    }\n    return hebrewCalendar;\n\
  }\n```\n\n这些方法重写是必要的，以确保你的日历以其正确的日历类型进行初始化。或者，你也可以简单地在 `-viewDidLoad` 方法中初始化你的日历，使其在应用启动时创建。\n\
  \n有大量不同的日历类型可供使用，包括但不限于以下几种：\n\n- `NSBuddhistCalendar`\n- `NSIslamicCalendar`\n\
  - `NSJapaneseCalendar`\n\n鉴于当今技术世界巨大的多元文化特性，你可能会发现非常有必要使用其中一些日历！请查阅 Apple 文档以获取所有可能的日历类型的完整列表。\n\
  \n现在，设置工作已经完成，你可以开始实现转换方法了，首先从公历到希伯来历的转换开始。\n\n```\n-(void)convertToGregorian:(id)sender\n\
  {\n    NSDateComponents *hComponents = [[NSDateComponents alloc] init];\n    [hComponents\
  \ setDay:[self.textFieldHDay.text integerValue]];\n    [hComponents setMonth:[self.textFieldHMonth.text\
  \ integerValue]];\n\n    [hComponents setYear:[self.textFieldHYear.text integerValue]];\n\
  \n    NSDate *hebrewDate = [self.hebrewCalendar dateFromComponents:hComponents];\n\
  \n    NSUInteger unitFlags = NSDayCalendarUnit | NSMonthCalendarUnit |\n    NSYearCalendarUnit;\n\
  \n    NSDateComponents *hebrewDateComponents = [self.gregorianCalendar\ncomponents:unitFlags\
  \ fromDate:hebrewDate];\n\n    self.textFieldGDay.text = [[NSNumber numberWithInteger:hebrewDateComponents.day]\n\
  stringValue];\n    self.textFieldGMonth.text = [[NSNumber numberWithInteger:hebrewDateComponents.month]\n\
  stringValue];\n    self.textFieldGYear.text = [[NSNumber numberWithInteger:hebrewDateComponents.year]\n\
  stringValue];\n}\n```\n\n如你所见，你结合使用了 `NSDateComponents`、`NSDate` 和 `NSCalendar`\
  \ 来执行此转换。\n\n`NSDateComponents` 类用于定义构成 `NSDate` 的详细信息，例如日、月、年、时间等。这里只指定了月、日和年。\n\
  \n如前所述，你使用 `NSCalendar` 的一个实例，根据已定义的组件来创建 `NSDate` 的一个实例。\n\n此方法中较为令人困惑的部分之一是使用\
  \ `NSUInteger` `unitFlags`，其格式非常特殊。每当你指定基于一个 `NSDate` 创建 `NSDateComponents` 实例时，都需要精确指定要从该日期中包含哪些组件。你可以像示例所示，通过\
  \ `NSUInteger` 来指定这些标志，这些标志被称为 `NSCalendarUnit`。\n\n其他类型的 `NSCalendarUnit` 包括以下内容（以及许多其他内容）：\n\
  \n- `NSSecondCalendarUnit`\n- `NSWeekOfYearCalendarUnit`\n- `NSEraCalendarUnit`\n\
  - `NSTimeZoneCalendarUnit`\n\n如你所见，创建 `NSDate` 实例时的具体程度具有高度可定制性，这使你能够执行独特的计算和比较。有关\
  \ `NSCalendarUnit` 值的完整列表，请参阅 Apple 开发者 API 中的 `NSCalendar` 类参考。\n\n由于 `NSDateComponents`\
  \ 的值是 `NSInteger` 类型，在将它们设置到文本字段之前，必须先将它们转换为 `NSNumber` 实例，然后获取它们的 `-stringValue`。\n\
  \n一旦你定义了一个日历到另一个日历的转换，反向转换就非常简单了，你只需要更改所使用的文本字段和日历即可。\n\n\n\n# 排版后\n\n```objc\n\
  - (void)convertToHebrew:(id)sender\n{\n    NSDateComponents *gComponents = [[NSDateComponents\
  \ alloc] init];\n    [gComponents setDay:[self.textFieldGDay.text integerValue]];\n\
  \    [gComponents setMonth:[self.textFieldGMonth.text integerValue]];\n    [gComponents\
  \ setYear:[self.textFieldGYear.text integerValue]];\n\n    NSDate *gregorianDate\
  \ = [self.gregorianCalendar dateFromComponents:gComponents];\n\n    NSUInteger unitFlags\
  \ = NSDayCalendarUnit | NSMonthCalendarUnit |\n    NSYearCalendarUnit;\n\n    NSDateComponents\
  \ *hebrewDateComponents = [self.hebrewCalendar components:unitFlags\n          \
  \                                                        fromDate:gregorianDate];\n\
  \n    self.textFieldHDay.text = [[NSNumber numberWithInteger:hebrewDateComponents.day]\n\
  \                               stringValue];\n    self.textFieldHMonth.text = [[NSNumber\
  \ numberWithInteger:hebrewDateComponents.month]\n                              \
  \   stringValue];\n    self.textFieldHYear.text = [[NSNumber numberWithInteger:hebrewDateComponents.year]\n\
  \                                stringValue];\n}\n```\n\n现在，你的应用应该能够正确地跨历法转换 `NSDate`\
  \ 实例，正如图 8–2 展示的那样！尝试使用不同的日期甚至不同历法进行试验，探索强大的日期转换功能。\n\n![图像](img/9781430240051_Fig08-02.jpg)\n\
  \n**图 8–2.** *应用成功转换日历日期*\n\n### 食谱 8–2：获取事件\n\n既然你已经了解了如何处理基本的日期转换和计算，接下来可以更深入地研究如何具体处理事件和日历，包括与用户自己的事件和日程进行交互。接下来的几个食谱将逐步结合，最终完整地使用\
  \ Event Kit 框架。\n\n首先，使用“单视图应用”模板创建一个新项目。我将其命名为“Chapter8Recipe2”，类前缀为“Main”。\n\n\
  接下来，你需要将 Event Kit 框架导入到项目中。关于具体操作方法，请参考之前的食谱。\n\n为了使用 Event Kit 框架，你需要将以下代码添加到主视图控制器的头文件中：\n\
  \n```objc\n#import <EventKit/EventKit.h>\n```\n\n在本食谱中，你只需要访问并记录设备上已安排的事件，因此完全不涉及视图控制器的\
  \ XIB 文件。\n\n每当处理 Event Kit 框架时，你最常使用的主要元素是 `EKEventStore`。这个类将是一个非常强大的工具，可以让你访问、删除和保存日历中的事件。你需要在头文件中声明一个该类型的属性，如下所示：\n\
  \n```objc\n@property (strong, nonatomic) EKEventStore *eventStore;\n```\n\n确保对该属性进行\
  \ `@synthesize`，并在 `-viewDidUnload` 方法中将其设置为 `nil`。\n\n这个用于记录事件的第一个食谱的实现非常简单。你只需要修改\
  \ `-viewDidLoad` 方法。在初始化 `eventStore` 属性后，你需要创建一个特定版本的 `NSPredicate` 类，以便查询事件。具体来说，你要查询设备日历中未来\
  \ *48 小时* 内的所有日期。你的方法如下所示：\n\n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    self.eventStore = [[EKEventStore alloc] init];\n    NSDate *now = [NSDate date];\n\
  \    NSDate *tomorrow = [NSDate dateWithTimeIntervalSinceNow:(2*24.0*60*60)];\n\
  \    NSPredicate *predicate = [self.eventStore predicateForEventsWithStartDate:now\n\
  \                                                                     endDate:tomorrow\n\
  \                                                                   calendars:nil];\n\
  \    NSArray *events = [self.eventStore eventsMatchingPredicate:predicate];\n  \
  \  for (EKEvent *event in events)\n    {\n        NSLog(@\"%@\", event.title);\n\
  \    }\n}\n```\n\n`+date` 方法是一种非常便捷的方式，能轻松地以 `NSDate` 形式获取当前日期和时间。`+dateWithTimeIntervalSinceNow:`\
  \ 方法接受一个浮点值作为参数，表示你要包含的时间间隔（以秒为单位）。快速计算一下 2*24*60*60 秒，就能得到一个两天的查询范围。\n\n你使用 `EKEventStore`\
  \ 类的 `-predicateForEventsWithStartDate:endDate:calendars:` 方法来创建谓词。通过将 `calendars`\
  \ 参数设为 `nil`，你指定该谓词应用于所有日历。\n\n最后，要获取 `EKEvents` 数组，你只需调用 `EKEventStore` 的 `-eventsMatchingPredicate:`\
  \ 方法，如前面的代码片段所示。然后你就可以遍历事件并根据需要处理。\n\n你需要在一台物理设备上测试此应用，以便它访问你的日历并打印有效信息。请确保你的设备上确实已安排了一些事件作为测试数据。由于此处只输出日志，你还需要通过\
  \ Xcode 在设备上运行此应用，以便捕获输出。\n\n\n\n### 技巧 8–3：在 `UITableView` 中显示事件\n\n现在你已经能够访问事件了，接下来将创建一个更好的界面来处理它们。你将实现一个分组的\
  \ `UITableView` 来显示事件。\n\n首先，你需要在 XIB 文件中添加 `UITableView`。从组件库中拖拽一个 `UITableView`\
  \ 元素，并让它占据整个视图。在属性检查器中，确保表格视图的“样式”设置为“分组”，如图 8–3 所示。\n\n![Image](img/9781430240051_Fig08-03.jpg)\n\
  \n**图 8–3.** *配置分组的 `UITableView`*\n\n接下来，将你的 `UITableView` 连接到视图控制器的头文件。这里使用的属性将命名为\
  \ `tableViewEvents`。\n\n在切换到实现文件之前，你还需要定义两个将要使用的属性。首先，一个名为 `calendars` 的 `NSArray`\
  \ 将用于保存对 `EKEventStore` 中所有日历的引用。其次，一个 `NSMutableDictionary` 实例将用于存储所有事件，并根据它们所属的日历进行归类。确保正确合成这些属性，并在\
  \ `-viewDidUnload` 方法中将其设置为 `nil`。\n\n```\n@property (nonatomic, strong) NSMutableDictionary\
  \ *events;\n@property (nonatomic, strong) NSArray *calendars;\n```\n\n你要做的第一件事是设置一个更新版本的\
  \ `-viewDidLoad` 方法，以正确填充数组和字典，同时确保 `UITableView` 已正确设置。\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n\n    self.tableViewEvents.delegate = self;\n    self.tableViewEvents.dataSource\
  \ = self;\n\n    self.eventStore = [[EKEventStore alloc] init];\n    self.calendars\
  \ = [self.eventStore calendars];\n\n    [self fetchEvents];\n}\n```\n\n新的 `-fetchEvents`\
  \ 方法将包含实际查询 `eventStore` 以获取事件的代码。由于你将按事件所属的日历进行排序，因此需要为每个日历执行不同的查询，而不是对所有事件执行一次查询。\n\
  \n```\n-(void)fetchEvents\n{\n    self.events = nil;\n    self.events = [[NSMutableDictionary\
  \ alloc] initWithCapacity:[self.calendars count]];\n\n    for (EKCalendar *cal in\
  \ self.calendars)\n    {\n        NSPredicate *calPredicate = [self.eventStore\n\
  predicateForEventsWithStartDate:[NSDate date] endDate:[NSDate\ndateWithTimeIntervalSinceNow:(2*24.0*60*60)]\
  \ calendars:[NSArray arrayWithObject:cal]];\n        //将日历参数设为 nil 表示搜索所有日历。\n\n\
  \        NSArray *eventsInThisCalendar = [self.eventStore eventsMatchingPredicate:calPredicate];\n\
  \        if (eventsInThisCalendar != nil)\n        {\n            [self.events setObject:eventsInThisCalendar\
  \ forKey:cal.title];\n        }\n    }\n}\n```\n\n如你所见，你将使用日历的标题作为键，将事件存储在 `NSMutableDictionary`\
  \ 中，对应的值则是属于该特定日历的事件数组。\n\n在继续之前，你需要指定视图控制器遵循某些协议，以便编译器允许将其设置为视图控制器的委托和数据源。添加 `UITableViewDelegate`\
  \ 和 `UITableViewDataSource` 协议后，你的头文件应类似于如下内容：\n\n```\n#import <UIKit/UIKit.h>\n\
  #import <EventKit/EventKit.h>\n\n@interface MainViewController : UIViewController\
  \ <UITableViewDelegate,\nUITableViewDataSource>{\n    UITableView *tableViewEvents;\n\
  }\n\n@property (nonatomic, strong) EKEventStore *eventStore;\n@property (strong,\
  \ nonatomic) IBOutlet UITableView *tableViewEvents;\n\n@property (nonatomic, strong)\
  \ NSMutableDictionary *events;\n@property (nonatomic, strong) NSArray *calendars;\n\
  @end\n```\n\n为了正确实现分组的 `UITableView`，你需要实现一个方法来指定所需的分区数量。由于每个日历对应一个分区，这个方法既简单又方便。\n\
  \n```\n-(NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n   \
  \ return [self.calendars count];\n}\n```\n\n同样，你还可以实现一个方法来指定分区的标题，操作同样简单。\n\n```\n\
  -(NSString *)tableView:(UITableView *)tableView\ntitleForHeaderInSection:(NSInteger)section\n\
  {\n    return [[self.calendars objectAtIndex:section] title];\n}\n```\n\n你还需要实现一个方法来确定每个分组中的行数，该数值由字典中对应分区的数组计数给出。\n\
  \n```\n-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection: (NSInteger)section\n\
  {\n    NSString *title = [[self.calendars objectAtIndex:section] title];\n    NSArray\
  \ *eventsInThisCalendar = [self.events objectForKey:title];\n    return [eventsInThisCalendar\
  \ count];\n}\n```\n\n最后，你可以构建处理 `UITableView` 时最重要的方法，该方法将定义表格单元格的创建方式。\n\n```\n\
  - (UITableViewCell *)tableView:(UITableView *)tableView\ncellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell\
  \ *cell = [tableView\ndequeueReusableCellWithIdentifier:CellIdentifier];\n    if\
  \ (cell == nil)\n    {\n         cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleValue1\n\
  reuseIdentifier:CellIdentifier];\n    }\n\n    cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n\
  \    cell.textLabel.backgroundColor = [UIColor clearColor];\n    cell.textLabel.font\
  \ = [UIFont systemFontOfSize:19.0];\n\n    cell.textLabel.text = [[[self.events\
  \ objectForKey:[[self.calendars\nobjectAtIndex:indexPath.section] title]] objectAtIndex:indexPath.row]\
  \ title];\n\n    return cell;\n}\n```\n\n如你所见，除了对单元格视图进行相当通用的设置外，你所做的只是通过对数组和字典的一次简短（尽管略显复杂）调用来指定任何给定行的标题。\n\
  \n现在，你的应用应该能够很好地显示当前日历中的所有事件了！\n\n\n\n### 配方 8–4：查看、编辑和删除事件\n\n接下来，你可以了解如何允许用户通过\
  \ Event Kit UI 框架中的预定义类来查看、编辑和删除事件。\n\n延续之前的配方，你需要做的第一件事是为项目添加另一个框架。这次，添加 `EventKitUI.framework`。使用\
  \ import 语句将框架的头文件导入到你的类中。\n\n```\n#import <EventKitUI/EventKitUI.h>\n```\n\n在本配方中，你将把你的视图控制器设置为其他几个视图控制器的委托，因此需要将它们的协议添加到头文件中。以下是你视图控制器现在应包含的完整协议列表：\n\
  \n- `UITableViewDelegate`\n- `UITableViewDataSource`\n- `EKEventViewDelegate`\n\
  - `EKEventEditViewDelegate`\n\n首先，你将实现当用户在 `UITableView` 中选择特定行时的行为。你将使用 `EKEventViewController`\
  \ 的实例来显示所选事件的信息。为此，你需要使用 `UITableView` 的数据源方法 `-tableView:DidSelectRowAtIndexPath:`。\n\
  \n```\n-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\n\
  *)indexPath\n{\n    EKEventViewController *eventVC = [[EKEventViewController alloc]\
  \ init];\n    eventVC.event = [[self.events objectForKey:[[self.calendars\nobjectAtIndex:indexPath.section]\
  \ title]] objectAtIndex:indexPath.row];\n    eventVC.delegate = self;\n    eventVC.allowsEditing\
  \ = YES;\n    UINavigationController *navcon = [[UINavigationController alloc]\n\
  initWithRootViewController:eventVC];\n    [self presentModalViewController:navcon\
  \ animated:YES];\n    [tableView deselectRowAtIndexPath:indexPath animated:YES];\n\
  }\n```\n\n你需要实现 `EKEventViewController` 的委托方法 `-eventViewController:didCompleteWithAction:`，以便正确处理事件详情的使用结束。这里有一个相当简单的实现，它根据给定的操作在事件存储中保存或删除事件。\n\
  \n```\n-(void)eventViewController:(EKEventViewController *)controller\ndidCompleteWithAction:(EKEventViewAction)action\n\
  {\n    EKEvent *event = controller.event;\n    if (action == EKEventViewActionDeleted)\n\
  \        {\n            [self.eventStore removeEvent:event span:EKSpanThisEvent\
  \ error:nil];\n        }\n    else\n    {\n        [self.eventStore saveEvent:event\
  \ span:EKSpanFutureEvents error:nil];\n    }\n    [self fetchEvents];\n    [self.tableViewEvents\
  \ reloadData];\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n你为保存和删除方法的\
  \ `span:` 参数使用的值仅限于此处已使用的两个值之一。正如你可能猜到的，它们指定保存或删除操作是仅应用于特定事件，还是同时应用于该事件的所有重复事件。\n\
  \n请记住，用户在 `EKEventViewController` 中删除事件并不意味着该事件已从 `eventStore` 中移除。你需要手动删除它，然后调用\
  \ `-fetchEvents` 方法以及表格的 `-reloadData` 方法来更新 `UITableView`。\n\n作为额外功能，你还将让单元格的详情披露按钮允许用户通过\
  \ `EKEventEditViewController` 直接进入编辑事件信息的流程。首先，你将实现一个方法来处理披露按钮的按下。\n\n```\n-(void)tableView:(UITableView\
  \ *)tableView\naccessoryButtonTappedForRowWithIndexPath:(NSIndexPath *)indexPath\n\
  {\n    EKEventEditViewController *eventEditVC = [[EKEventEditViewController alloc]\
  \ init];\n    eventEditVC.event = [[self.events objectForKey:[[self.calendars\n\
  objectAtIndex:indexPath.section] title]] objectAtIndex:indexPath.row];\n    eventEditVC.eventStore\
  \ = self.eventStore;\n    eventEditVC.editViewDelegate = self;\n    [self presentModalViewController:eventEditVC\
  \ animated:YES];\n}\n```\n\n与 `EKEventViewController` 类似，你需要为 `EKEventEditViewController`\
  \ 定义一个委托方法。\n\n```\n-(void)eventEditViewController:(EKEventEditViewController *)controller\n\
  didCompleteWithAction:(EKEventEditViewAction)action\n{\n    if (action == EKEventEditViewActionDeleted)\n\
  \    {\n        [self.eventStore removeEvent:controller.event span:EKSpanThisEvent\
  \ error:nil];\n    }\n    else if (action == EKEventEditViewActionSaved)\n    {\n\
  \        [self.eventStore saveEvent:controller.event span:EKSpanThisEvent error:nil];\n\
  \    }\n    [self fetchEvents];\n    [self.tableViewEvents reloadData];\n    [self\
  \ dismissModalViewControllerAnimated:YES];\n}\n```\n\n最后，你需要额外定义一个方法才能使用 `EKEventEditViewController`，该方法允许你指定一个日历用于创建新事件。在此实现中，你将简单地返回设备已使用的默认日历来执行此任务。\n\
  \n```\n-(EKCalendar\n*)eventEditViewControllerDefaultCalendarForNewEvents:(EKEventEditViewController\n\
  *)controller\n{\n    return [self.eventStore defaultCalendarForNewEvents];\n}\n\
  ```\n\n为了确保视图始终显示最新信息，你将在 `-viewWillAppear:` 方法中添加内容，以便持续刷新当前数据以及 `UITableView`。方法现在应如下所示：\n\
  \n```\n- (void)viewWillAppear:(BOOL)animated\n{\n    [self fetchEvents];\n    [self.tableViewEvents\
  \ reloadData];\n    [super viewWillAppear:animated];\n}\n```\n\n至此，你的应用程序已成功允许用户通过\
  \ `EKEventViewController`（图 8-4）或 `EKEventEditViewController`（图 8-5）以两种不同方式查看和编辑事件详情。\n\
  \n![Image](img/9781430240051_Fig08-04.jpg)\n\n**图 8-4.** *`EKEventViewController`*\n\
  \n![Image](img/9781430240051_Fig08-05.jpg)\n\n**图 8-5.** *`EKEventEditViewController`*\n\
  \n\n\n### 食谱 8–5：创建简单事件\n\n虽然允许用户自行创建事件相当简单，但作为开发者，我们应始终尝试简化用户的操作。用户需要自行完成的操作越少，他们对最终产品的满意度通常就越高。为此，能够通过编程方式创建和编辑事件至关重要，这样用户甚至无需看到\
  \ `EKEventEditViewController`。\n\n同样，基于上一个食谱，你首先需要进入视图控制器的 XIB 文件。\n\n在视图顶部添加一个\
  \ `UIToolbar` 元素。你需要将 `UITableView` 的顶部向下移动工具栏的高度，默认为 44 点。请继续删除工具栏中默认包含的 `UIBarButtonItem`；你将通过编程方式实现工具栏内的项目。\n\
  \n使用属性名称 `toolBarTop` 将你的 `UIToolbar` 连接到视图控制器的头文件。\n\n你将向 `toolBarTop` 添加一个按钮，以便创建新的\
  \ `EKEvent`，因此你需要预先定义用于执行此任务的方法的头文件。\n\n`-(void)addPressed:(UIButton *)sender;`\n\
  \n接下来，你将编辑 `-viewDidLoad` 方法以适配你的最新功能。\n\n```\n- (void)viewDidLoad\n{\n    [super\
  \ viewDidLoad];\n\n    ///////////////新代码开始\n    UIBarButtonItem *addButton = [[UIBarButtonItem\
  \ alloc]\ninitWithBarButtonSystemItem:UIBarButtonSystemItemAdd target:self\naction:@selector(addPressed:)];\n\
  \    UIBarButtonItem *fixedSpace = [[UIBarButtonItem alloc]\ninitWithBarButtonSystemItem:UIBarButtonSystemItemFixedSpace\
  \ target:nil action:NULL];\n    fixedSpace.width = 265;\n    [self.toolBarTop setItems:[NSArray\
  \ arrayWithObjects:fixedSpace, addButton, nil]];\n    ///////////////新代码结束\n\n \
  \   self.tableViewEvents.delegate = self;\n    self.tableViewEvents.dataSource =\
  \ self;\n\n    self.eventStore = [[EKEventStore alloc] init];\n    self.calendars\
  \ = [self.eventStore calendars];\n\n    [self fetchEvents];\n}\n```\n\n当按下 `addButton`\
  \ 时，你的应用程序将呈现一个模态视图控制器，以便获取用户输入的要创建的新事件的名称。为此，你需要从头开始创建另一个视图控制器。\n\n前往 **File**\
  \ ![Image](img/U001.jpg) **New File…**，并确保选择“UIViewController subclass”选项，如图 8–6\
  \ 所示。\n\n![Image](img/9781430240051_Fig08-06.jpg)\n\n**图 8–6.** *子类化 `UIViewController`*\n\
  \n将你的子类命名为“EventAddViewController”，确保它会同时创建一个 XIB 文件，如图 8–7 所示。\n\n![Image](img/9781430240051_Fig08-07.jpg)\n\
  \n**图 8–7.** *配置你的新视图控制器*\n\n将新视图控制器的 XIB 文件设置为类似于图 8–8 中的样式。\n\n![Image](img/9781430240051_Fig08-08.jpg)\n\
  \n**图 8–8.** *用于创建事件的用户界面*\n\n请记住，这里你使用了 `UITextField`，这意味着视图的下半部分在某个时刻会被键盘占据，因此你必须注意不要让任何内容被键盘不必要地遮挡。\n\
  \n将你的 `UITextField` 和 `UIButton` 分别使用属性名称 `textFieldTitle` 和 `doneButton` 连接到视图控制器的头文件。同时，定义一个名为\
  \ `-donePressed:` 的操作的头文件，如下所示，并将 `doneButton` 连接到该操作。\n\n`-(IBAction)donePressed:(id)sender;`\n\
  \n与其让这个类处理 Event Kit 的具体工作，不如简单地让它将提交的字符串返回给委托视图控制器。为此，你首先必须声明一个供委托遵循的协议，方法是在头文件顶部添加以下协议声明：\n\
  \n```\n@protocol EventAddViewControllerDelegate <NSObject>\n\n-(void)EventAddViewController:(EventAddViewController\
  \ *)controller\ndidSubmitTitle:(NSString *)title;\n\n@end\n```\n\n你的编译器会报错，因为在对类进行声明之前就出现了对自身的循环引用，因此请在协议声明上方添加这行额外的代码，以确保编译器知道\
  \ `EventAddViewController` 实际上已经被声明。\n\n`@class EventAddViewController;`\n\n如前所述，由于你使用了\
  \ `UITextField`，你应该让新视图控制器遵循 `UITextFieldDelegate` 协议。请实现这一点。\n\n最后，为这个视图控制器声明一个类型为\
  \ `id` 且遵循你的协议的属性，命名为 `delegate`。请像往常一样，确保在实现文件中正确合成并处理它。\n\n`@property (strong,\
  \ nonatomic) id <EventAddViewControllerDelegate> delegate;`\n\n完整来说，你的头文件现在应如下所示：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@class EventAddViewController;\n\n@protocol EventAddViewControllerDelegate\
  \ <NSObject>\n-(void)EventAddViewController:(EventAddViewController *)controller\n\
  didSubmitTitle:(NSString *)title;\n@end\n\n@interface EventAddViewController : UIViewController\
  \ <UITextFieldDelegate>\n\n@property (strong, nonatomic) IBOutlet UITextField *textFieldTitle;\n\
  @property (strong, nonatomic) IBOutlet UIButton *doneButton;\n@property (strong,\
  \ nonatomic) id <EventAddViewControllerDelegate> delegate;\n-(IBAction)donePressed:(id)sender;\n\
  \n@end\n```\n\n这个视图控制器的实现将非常简单，因为其功能将完全由一个委托方法提供。\n\n首先，你必须修改 `-viewDidLoad` 方法来设置你的\
  \ `UITextField` 的委托。\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    self.textFieldTitle.delegate = self;\n}\n```\n\n其次，你实现一个非常简单的 `UITextField`\
  \ 委托方法来处理“return”按钮的按下。\n\n```\n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n\
  {\n    [textField resignFirstResponder];\n    return NO;\n}\n```\n\n最后，你实现 `-donePressed:`\
  \ 方法来调用视图控制器的委托方法。\n\n```\n-(void)donePressed:(id)sender\n{\n    [self.delegate\
  \ EventAddViewController:self didSubmitTitle:self.textFieldTitle.text];\n}\n```\n\
  \n现在你可以切换回 `MainViewController`。首先要记住的是，将新创建的协议添加到你的视图控制器中，这样，在最终阶段，你的头文件应如下所示：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <EventKit/EventKit.h>\n#import <EventKitUI/EventKitUI.h>\n\
  #import \"EventAddViewController.h\"\n\n@interface MainViewController : UIViewController\
  \ <UITableViewDelegate,\nUITableViewDataSource, EKEventViewDelegate, EKEventEditViewDelegate,\n\
  EventAddViewControllerDelegate>\n\n@property (strong, nonatomic) IBOutlet UIToolbar\
  \ *toolBarTop;\n\n@property (nonatomic, strong) EKEventStore *eventStore;\n@property\
  \ (strong, nonatomic) IBOutlet UITableView *tableViewEvents;\n\n@property (nonatomic,\
  \ strong) NSMutableDictionary *events;\n@property (nonatomic, strong) NSArray *calendars;\n\
  -(void)addPressed:(UIButton *)sender;\n@end\n```\n\n现在你可以实现之前暗示过的 `-addPressed:`\
  \ 方法来显示你的新视图控制器。\n\n```\n-(void)addPressed:(UIButton *)sender\n{\n    EventAddViewController\
  \ *addVC = [[EventAddViewController alloc] init];\n    addVC.delegate = self;\n\
  \    [self presentModalViewController:addVC animated:YES];\n}\n```\n\n最后，你可以创建你的\
  \ `EventAddViewController` 的委托方法，该方法将获取提交的字符串，并用它创建一个新事件。\n\n\n```objc\n- (void)EventAddViewController:(EventAddViewController\
  \ *)controller\ndidSubmitTitle:(NSString *)title\n{\n    EKEvent *event = [EKEvent\
  \ eventWithEventStore:self.eventStore];\n    event.title = title;\n    event.calendar\
  \ = [self.eventStore defaultCalendarForNewEvents];\n    event.startDate = [NSDate\
  \ dateWithTimeIntervalSinceNow:60*60*24.0];\n    event.endDate = [NSDate dateWithTimeInterval:60*60.0\
  \ sinceDate:event.startDate];\n    [self.eventStore saveEvent:event span:EKSpanThisEvent\
  \ error:nil];\n    [self fetchEvents];\n    [self.tableViewEvents reloadData];\n\
  \    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n为了演示，我选择了一种极其简单的方法来创建这些新事件。正如你所见，这种方法只是让所有以此方式创建的事件都提前一天，且仅持续一小时。在您的实际应用中，很可能需要选择更复杂的或基于用户输入的方法来创建\
  \ `EKEvent`。\n\n**注意：** 我们在此处使用的代码可能会在 Xcode 中生成一条 \"Could not load source: 6\"\
  \ 日志。无需为此担心，因为它不会妨碍你的应用正常运行。\n\n## 秘籍 8–6：重复事件\n\nEvent Kit 框架为开发者提供了一个极其强大的 API，使其能够以编程方式处理重复事件。接下来，你将在前面秘籍的基础上进行扩展，让应用也能在你的日历中添加一个重复事件。\n\
  \n在你之前创建的 `-EventAddViewController:didSubmitTitle:` 方法中，你需要添加额外的代码，基于与普通事件相同的标题，来创建一个重复的\
  \ `EKEvent`。首先添加以下代码来配置这个新的 `EKEvent`。\n\n```objc\nEKEvent *recurringEvent = [EKEvent\
  \ eventWithEventStore:self.eventStore];\n    recurringEvent.title = [NSString stringWithFormat:@\"\
  Recurring %@\", title];\n    recurringEvent.calendar = [self.eventStore defaultCalendarForNewEvents];\n\
  \    recurringEvent.startDate = [NSDate dateWithTimeIntervalSinceNow:60*60*24.0];\n\
  \    recurringEvent.endDate = [NSDate dateWithTimeInterval:60*60.0\nsinceDate:event.startDate];\n\
  ```\n\n接下来，你必须创建一个 `EKRecurrenceRule` 类的实例，并将其提供给你的事件。由于重复组合的可能性极为多样，这个类提供了一种极为灵活的方法来以编程方式实现重复事件。仅通过一个方法，开发者就能创建出几乎任何能想到的重复组合。我们将在此处定义一个稍微复杂一点的规则：\n\
  \n```objc\nEKRecurrenceRule *rule = [[EKRecurrenceRule alloc]\n                \
  \              initRecurrenceWithFrequency:EKRecurrenceFrequencyDaily\n        \
  \                      interval:2\n                              daysOfTheWeek:[NSArray\n\
  arrayWithObjects:[EKRecurrenceDayOfWeek dayOfWeek:2], [EKRecurrenceDayOfWeek\ndayOfWeek:3],\
  \ nil]\n                              daysOfTheMonth:nil\n                     \
  \         monthsOfTheYear:nil\n                              weeksOfTheYear:nil\n\
  \                              daysOfTheYear:nil\n                             \
  \ setPositions:nil\n                              end:[EKRecurrenceEnd\nrecurrenceEndWithOccurrenceCount:20]];\n\
  ```\n\n然后，你可以通过下面这行代码将此规则添加到你的事件中。使用的 `recurrenceRules` 属性是从 iOS 5.0 开始从 `EKCalendarItem`\
  \ 类继承而来的。\n\n```objc\nrecurringEvent.recurrenceRules = [NSArray arrayWithObject:rule];\n\
  ```\n\n此方法每个参数的功能如下所述。对于任何参数，传入 `nil` 都表示不加以限制。\n\n- `InitRecurrenceWithFrequency`：指定事件重复的基本频率，可以是每天、每周、每月或每年重复。\n\
  - `Interval`：根据频率指定重复的时间间隔。一个频率为每周、间隔为 3 的重复事件将每隔三周重复一次。\n- `DaysOfTheWeek`：此属性接受一个\
  \ `NSArray` 对象数组，这些对象必须通过 `EKRecurrenceDayOfWeek` 的 `+dayOfWeek` 方法来获取。该方法接受一个代表星期几的整数参数，其中\
  \ 1 表示星期日。通过设置此参数，开发者可以创建一个事件每隔几天重复一次，但仅当事件落在指定星期几时才会发生。\n- `MonthsOfTheYear`：类似于\
  \ `DaysOfTheWeek`，此参数用于指定将重复事件限制在哪些月份。它仅对频率为年的事件有效。\n- `WeeksOfTheYear`：与 `MonthsOfTheYear`\
  \ 一样，此参数也仅适用于频率为年的事件，但限制的是具体的周数，而非月份。\n- `DaysOfTheYear`：另一个仅限于每年重复事件的参数，它允许你仅指定某些天数（从年初或年末开始计算）来过滤特定事件。\n\
  - `SetPositions`：此参数是最终的过滤器，允许你将创建的事件完全限制在一年中的特定日期。例如，一个每天重复的事件可以通过此参数被限制为仅在某年的第\
  \ 28 天、第 102 天和第 364 天发生，具体取决于开发者的选择。\n- `End`：此参数需要对 `EKRecurrenceEnd` 类进行一次类调用，并指定你的事件何时停止重复。可供选择的两个类方法如下：\n\
  \  - `+recurrenceEndWithEndDate`：允许开发者指定一个日期，在此日期之后事件将不再重复。\n  - `+recurrenceEndWithOccurenceCount`：将事件的重复次数限制为有限的次数。\n\
  \n基于以上所有信息，你可以看到，我们为演示而创建的重复事件将每两天重复一次，但仅限于周一或周二，总共重复 20 次。\n\n根据你所实现的不同功能，你应该能清楚地看到，使用\
  \ Event Kit 框架与用户的日程和事件进行交互是多么充满可能。无论你是希望允许用户与其日程进行交互，还是更喜欢通过编程在后台处理，实现目标所需的工具都唾手可得，而且尽管功能极其灵活，使用起来却异常简单。\n\
  \n\n### 食谱 8–7：基本通讯录访问\n\n在任何现代设备中，最基本的功能之一就是存储联系人信息的能力，因此，你应该注意开发能够利用这些重要数据的应用。在本食谱中，你将学习访问和处理设备通讯录列表的三项基本功能。\n\
  \n首先，创建一个名为“Chapter8Recipe7”的新项目，类前缀设为“Main”，并使用“单视图应用程序”模板。\n\n为本食谱，你需要在项目中添加两个额外的框架：`AddressBook.framework`\
  \ 和 `AddressBookUI.framework`。\n\n接下来，切换到视图控制器的 XIB 文件，创建一个与图 8–9 类似的视图。\n\n![图片](img/9781430240051_Fig08-09.jpg)\n\
  \n**图 8–9.** *用于访问联系人信息的 XIB 文件*\n\n使用以下属性名称将这些元素连接到你的头文件：\n\n* `firstLabel`\n*\
  \ `lastLabel`\n* `phoneLabel`\n* `cityLabel`\n* `stateLabel`\n\n你不需要为 `UIButton`\
  \ 创建属性，因为在本食谱中无需对其进行任何修改。\n\n在你的头文件中为按钮定义一个名为 `-findPressed:` 的动作，如下所示：\n\n`-(IBAction)findPressed:(id)sender;`\n\
  \n现在接口已设置完毕，你需要确保头文件编写正确。首先，添加以下两个导入语句，以确保你可以使用通讯录和通讯录 UI 框架。\n\n`#import <AddressBook/AddressBook.h>`\n\
  `#import <AddressBookUI/AddressBookUI.h>`\n\n你将使用 `ABPeoplePickerNavigationController`\
  \ 类的一个实例，并将其 `peoplePickerDelegate` 属性设置为你的视图控制器，因此需要在头文件中添加协议实现。让你的视图控制器遵循 `ABPeoplePickerNavigationControllerDelegate`\
  \ 协议。现在，你的头文件完整内容应如下所示：\n\n`#import <UIKit/UIKit.h>`\n`#import <AddressBook/AddressBook.h>`\n\
  `#import <AddressBookUI/AddressBookUI.h>`\n\n`@interface MainViewController : UIViewController`\n\
  `<ABPeoplePickerNavigationControllerDelegate>`\n\n`@property (strong, nonatomic)\
  \ IBOutlet UILabel *firstLabel;`\n`@property (strong, nonatomic) IBOutlet UILabel\
  \ *lastLabel;`\n`@property (strong, nonatomic) IBOutlet UILabel *phoneLabel;`\n\
  `@property (strong, nonatomic) IBOutlet UILabel *stateLabel;`\n`@property (strong,\
  \ nonatomic) IBOutlet UILabel *cityLabel;`\n`-(IBAction)findPressed:(id)sender;`\n\
  `@end`\n\n切换到你的实现文件，实现一个简单的 `-viewDidLoad` 方法，用于重置 `UILabel` 上的文本。\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    self.firstLabel.text = @\"...\";\n    self.lastLabel.text\
  \ = @\"...\";\n    self.phoneLabel.text = @\"...\";\n    self.cityLabel.text = @\"\
  ...\";\n    self.stateLabel.text = @\"...\";\n}\n```\n\n你将实现之前定义的 `-findPressed:`\
  \ 方法，用于创建 `ABPeoplePickerNavigationController` 的实例，设置其委托，然后以模态方式呈现它。\n\n```\n-(void)findPressed:(id)sender\n\
  {\n    ABPeoplePickerNavigationController *picker =[[ABPeoplePickerNavigationController\
  \ alloc] init];\n    picker.peoplePickerDelegate = self;\n    [self presentModalViewController:picker\
  \ animated:YES];\n}\n```\n\n现在你只需要创建委托方法，其中需要实现三个方法。第一个也是最简单的方法，用于处理选择器控制器被取消的情况。\n\
  \n```\n-(void)peoplePickerNavigationControllerDidCancel:(ABPeoplePickerNavigationController\
  \ *)peoplePicker\n{\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\
  \n接下来，你将定义主要的委托方法，用于处理联系人的选择。我们将逐步讲解该方法实现的每个部分。\n\n首先，你的方法头如下所示：\n\n`-(BOOL)peoplePickerNavigationController:(ABPeoplePickerNavigationController\
  \ *)peoplePicker shouldContinueAfterSelectingPerson:(ABRecordRef)person`\n\n关于这个方法头，你可能注意到的第一件奇怪的事情是变量\
  \ `person` 的类型是 `ABRecordRef`，它后面没有“*”。这基本上意味着 `person` 不是一个指针，因此不会用于调用方法。相反，你将使用预定义的函数来利用和访问它。正如你将看到的，通讯录框架的许多部分都采用了这种更“基于\
  \ C 语言”的风格。\n\n在方法体内部，你将首先执行最简单的访问，即所选联系人的名字和姓氏。\n\n```\nself.firstLabel.text =\
  \ (__bridge_transfer NSString *)ABRecordCopyValue(person, kABPersonFirstNameProperty);\n\
  self.lastLabel.text = (__bridge_transfer NSString *)ABRecordCopyValue(person, kABPersonLastNameProperty);\n\
  ```\n\n在本节中，`ABRecordCopyValue()` 函数将是用于任何类型数据访问的首选调用。它接受两个参数，第一个参数是你想要访问的 `ABRecordRef`，第二个参数是一个预定义的\
  \ `PropertyID`，用于指示函数检索哪一部分数据。\n\n该函数可以处理两种类型的值：单值和多值。对于前两次调用，你只处理单值，`ABRecordCopyValue()`\
  \ 函数返回的类型是 `CFStringRef`。你可以在值前面添加 `(__bridge_transfer NSString *)` 代码，将其转换为 `NSString`。\n\
  \n`__bridge_transfer` 命令是 iOS 5 中配合自动引用计数（ARC）引入的新命令，它简单地指定 ARC 现在将处理被“桥接”的值。\n\n\
  接下来你可以访问的是联系人的电话号码，这是一个多值。多值通常用于可以给出多个条目的联系人属性，例如地址、电话号码或电子邮件。当你复制它时，你将收到一个类型为 `ABMultiValueRef`\
  \ 的变量，然后你可以使用它来访问特定的值。\n\n```\nABMultiValueRef multi = ABRecordCopyValue(person,\
  \ kABPersonPhoneProperty);\nCFStringRef phoneNumber = ABMultiValueCopyValueAtIndex(multi,\
  \ 0);\nself.phoneLabel.text = (__bridge_transfer NSString *)phoneNumber;\nCFRelease(phoneNumber);\n\
  ```\n\n通过使用 `ABMultiValueCopyValueAtIndex(multi, 0);` 调用，你指定了要获取给定用户存储的第一个电话号码。然后，你可以像之前一样设置标签的文本。\n\
  \n由于你创建了一个新的 `CFStringRef` `phoneNumber` 来指向你的值，你应该使用 `CFRelease()` 命令来释放它，如前面的代码片段所示。\n\
  \n接下来要处理的多值是所选联系人的主地址。处理地址时，需要额外一步，因为地址是作为 `CFDictionary` 存储的。你将再次使用 `ABMultiValueCopyValueAtIndex()`\
  \ 函数检索这个字典，然后查询其值：\n\n```\nABMultiValueRef address = ABRecordCopyValue(person, kABPersonAddressProperty);\n\
  \    if (ABMultiValueGetCount(address) > 0)\n    {\n        CFDictionaryRef dictionary\
  \ = ABMultiValueCopyValueAtIndex(address, 0);\n        CFStringRef cityKey = kABPersonAddressCityKey;\n\
  \        CFStringRef stateKey = kABPersonAddressStateKey;\n        self.cityLabel.text\
  \ = (__bridge_transfer NSString *)CFDictionaryGetValue(dictionary, (void *)cityKey);\n\
  \        self.stateLabel.text = (__bridge_transfer NSString *)CFDictionaryGetValue(dictionary,\
  \ (void *)stateKey);\n\n        CFRelease(dictionary);\n        CFRelease(cityKey);\n\
  \        CFRelease(stateKey);\n    }\n    else\n    {\n        self.cityLabel.text\
  \ = @\"...\";\n        self.stateLabel.text = @\"...\";\n    }\n```\n\n最后，你可以关闭你的模态视图控制器，并为该方法添加返回值。整体来看，你的方法应如下所示：\n\
  \n\n\n`-(BOOL)peoplePickerNavigationController:(ABPeoplePickerNavigationController\
  \ *)peoplePicker shouldContinueAfterSelectingPerson:(ABRecordRef)person\n{\n   \
