  * `textFieldCity`\n* `textFieldState`\n* `textFieldZip`\n\n\n现在，你可以实现代码来创建新联系人。为此，必须通过`ABPersonCreate()`函数获取`ABRecordRef`，然后设置其值。整体代码如下所示，可将其添加到`-newContactPressed:`方法中。\n\
