  \ = [NSString stringWithFormat:@\"%f\", motion.rotationRate.x];\n            self.yGyroLabel.text\
  \ = [NSString stringWithFormat:@\"%f\", motion.rotationRate.y];\n            self.zGyroLabel.text\
  \ = [NSString stringWithFormat:@\"%f\", motion.rotationRate.z];\n\n            self.xMagLabel.text\
  \ = [NSString stringWithFormat:@\"%f\", motion.magneticField.field.x];\n       \
  \     self.yMagLabel.text = [NSString stringWithFormat:@\"%f\", motion.magneticField.field.y];\n\
  \            self.zMagLabel.text = [NSString stringWithFormat:@\"%f\", motion.magneticField.field.z];\n\
  \         }];\n    }\n    else if ([self.motionManager isDeviceMotionActive])\n\
  \    {\n        [self.motionManager stopDeviceMotionUpdates];\n\n        self.xAccLabel.text\
  \ = @\"...\";\n        self.yAccLabel.text = @\"...\";\n        self.zAccLabel.text\
  \ = @\"...\";\n        self.xGyroLabel.text = @\"...\";\n        self.yGyroLabel.text\
  \ = @\"...\";\n        self.zGyroLabel.text = @\"...\";\n        self.xMagLabel.text\
  \ = @\"...\";\n        self.yMagLabel.text = @\"...\";\n        self.zMagLabel.text\
  \ = @\"...\";\n    }\n}\n```\n\n你还需要按如下方式更改你的`viewDidUnload`方法：\n\n```\n- (void)viewDidUnload\n\
