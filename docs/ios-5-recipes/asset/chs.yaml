  \n## 秘方 15–5：检测特征\n\n除了极其灵活的滤镜运用能力，Core Image 框架还为 iOS 5.0 带来了特征检测的功能，让你能有效“搜索”图像中的关键元素，比如人脸。\n\
  \n我们将新建一个较小的项目来实现这个面部检测应用，而不是继续沿用之前的秘方。为 iPhone 设备系列创建一个新项目，使用“单视图应用”模板，如图 15–21\
  \ 所示。\n\n![Image](img/9781430240051_Fig15-21.jpg)\n\n**图 15–21.** *创建单视图应用*\n\n\
  项目创建后，像之前的秘方一样，将 Core Image 框架添加到项目中。\n\n在视图中添加两个 `UIImageView` 实例和一个 `UIButton`，布局应类似于图\
  \ 15–22。\n\n![Image](img/9781430240051_Fig15-22.jpg)\n\n**图 15–22.** *视图控制器的 XIB\
  \ 设置*\n\n将每个元素连接到你的视图控制器。`UIButton` 的属性名应为 `findFaceButton`，并执行动作 `-findFacePressed:`。将上方的\
  \ `UIImageView` 命名为 `imageViewMain`，下方的命名为 `imageViewAlt`。\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@interface MainViewController : UIViewController\n\n@property (strong, nonatomic)\
  \ IBOutlet UIImageView *imageViewMain;\n@property (strong, nonatomic) IBOutlet UIImageView\
  \ *imageViewAlt;\n@property (strong, nonatomic) IBOutlet UIButton *findFaceButton;\n\
  - (IBAction)findFacePressed:(id)sender;\n\n@end\n```\n\n接下来，找一张要在应用中显示的图片，并添加到项目中。你可以通过将文件从\
  \ Finder 拖拽到项目的导航面板来实现。当添加文件的对话框出现时，确保选中“将项目复制到目标组的文件夹（如果需要）”复选框，如图 15–23 所示。为了正确测试此应用，尽量找一张人脸清晰可见的图片。\n\
  \n![Image](img/9781430240051_Fig15-23.jpg)\n\n**图 15–23.** *向项目中添加文件时的弹出对话框*\n\n\
  现在，你可以构建 `-viewDidLoad` 方法来配置 `UIImageView` 元素，并将初始图像设置到主图像视图中。请务必将图像名称（以下代码中的 `\"\
  testImage.JPG\"`）替换为你自己的文件名。\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \n    self.imageViewMain.backgroundColor = [UIColor blackColor];\n    self.imageViewMain.contentMode\
  \ = UIViewContentModeScaleAspectFit;\n    self.imageViewAlt.backgroundColor = [UIColor\
  \ blackColor];\n    self.imageViewAlt.contentMode = UIViewContentModeScaleAspectFit;\n\
  \n    UIImage *image = [UIImage imageNamed:@\"testImage.JPG\"];\n    if (image !=\
  \ nil)\n    {\n        self.imageViewMain.image = image;\n    }\n    else\n    {\n\
  \        [self.findFaceButton setTitle:@\"No Image\" forState:UIControlStateNormal];\n\
  \        self.findFaceButton.enabled = NO;\n        self.findFaceButton.alpha =\
  \ 0.6;\n    }\n}\n```\n\n最后，你可以实现 `-findFacePressed:` 方法来进行特征检测。该方法将确定给定图像中人脸的位置，从找到的最后一张人脸创建\
  \ `UIImage`，然后将其显示在备用的图像视图中。\n\n```\n-(IBAction)findFacePressed:(id)sender\n{\n\
  \    UIImage *image = self.imageViewMain.image;\n    CIImage *coreImage = [[CIImage\
  \ alloc] initWithImage:image];\n    CIContext *context = [CIContext contextWithOptions:nil];\n\
  \    CIDetector *detector = [CIDetector detectorOfType:@\"CIDetectorTypeFace\"context:context\n\
  \        options:[NSDictionary dictionaryWithObjectsAndKeys:@\"CIDetectorAccuracyHigh\"\
  ,\n        @\"CIDetectorAccuracy\", nil]];\n    NSArray *features = [detector featuresInImage:coreImage];\n\
  \n    if ([features count] >0)\n    {\n        CIImage *faceImage = [coreImage imageByCroppingToRect:[[features\
  \ lastObject] bounds]];\n        UIImage *face = [UIImage imageWithCGImage:[context\
  \ createCGImage:faceImage fromRect:faceImage.extent]];\n        self.imageViewAlt.image\
  \ = face;\n    }\n}\n```\n\n\n```objc\n[self.findFaceButton setTitle:[NSString stringWithFormat:@\"\
  %i Face(s) Found\", [features count]] forState:UIControlStateNormal];\nself.findFaceButton.enabled\
  \ = NO;\nself.findFaceButton.alpha = 0.6;\n}\nelse\n{\n[self.findFaceButton setTitle:@\"\
  No Faces Found\" forState:UIControlStateNormal];\nself.findFaceButton.enabled =\
  \ NO;\nself.findFaceButton.alpha = 0.6;\n}\n```\n\n该方法包含以下步骤：\n\n1.  从初始的 `UIImage`\
  \ 对象中获取一个 `CIImage` 对象。\n2.  创建一个用于分析图像的 `CIContext`。\n3.  使用类型和选项参数创建一个 `CIDetector`\
  \ 实例。\n    1.  `type` 参数用于指定要识别的特定特征。目前，该参数唯一可能的值是 `CIDetectorTypeFace`，它允许你专门寻找人脸。\n\
  \    2.  `options` 参数允许你指定寻找特征的精确度。低精确度会更快，但高精确度会更精确。\n4.  创建一个包含图像中所有被找到特征的数组。由于你指定了\
  \ `CIDetectorTypeFace` 类型，这些对象都将是 `CIFaceFeature` 类的实例。\n5.  使用 `-imageByCroppingToRect:`\
  \ 方法，配合原始图像以及由图像中最后找到的 `CIFaceFeature` 指定的边界，创建一个 `CIImage`。这些边界指定了人脸所在的 `CGRect`。\n\
  6.  从你的 `CIImage` 创建一个 `UIImage`（操作方式与上一个技巧完全相同），然后将其显示在你的 `UIImageView` 中。\n\n\
  运行你的应用程序后，你将能够检测到图像中的任何人脸，这些人脸会显示在下方的 `UIImageView` 中，如图 15–24 所示。\n\n![Image](img/9781430240051_Fig15-24.jpg)\n\
  \n**图 15–24。** *你的应用程序从图像中检测并裁剪出人脸*\n\n### 总结\n\n图像构筑了我们的世界。从孩子们喜爱的最简单的图画书，到通过 Twitter、电子邮件、Facebook、Tumblr\
  \ 以及其他所有网络服务在互联网上传输的海量视觉数据，图片和图像无疑已成为现代文化的关键基石之一。因此，通过学习在应用程序中创建、处理、操作和显示图像，你能够与用户建立更深入的联系，传达更强烈的情感反应，并以比以往更灵活、更具掌控力的方式进行交互。从构建彩色形状到显示照片，再到最新的\
  \ iOS 5.0 中新增的图像处理功能，你能够创建出更具趣味性和实用性的应用程序。Core Image 框架更是通过添加图像滤镜（可创造风格迥异的图像）和人脸检测软件（可从你的应用中提供更深入的信息）进一步增强了这种能力。就目前的技术发展水平而言，“一图胜千言”这种说法可以说是一种极大的保守说法。\n\
  \n## 第 16 章\n\n## Game Kit 技巧\n\n在本章中，你将使用一个简单的 Hangman 游戏，并将其与 Game Center 集成。Game\
  \ Center 允许你通过提供简便的方法来实现社交功能，例如高分、游戏成就和多人游戏玩法，从而增强你的游戏。添加这些功能不仅能为你的游戏带来更多价值，还能延长游戏的“重复游玩性”。\n\
  \n你将从添加高分和成就开始，最终让你的游戏支持多人模式。你可以在此处找到该项目的起点：[`https://github.com/shawngrimes/HangmanMP`](https://github.com/shawngrimes/HangmanMP)。\n\
  \n### 技巧 16–1：从 Game Center 开始\n\n在开始使用 Game Center 之前，你需要使用 iTunes Connect。如果你已经向\
  \ iTunes App Store 提交过应用程序或游戏，那么你已经知道 iTunes Connect 是什么了。对于那些尚未提交的人来说，iTunes Connect\
  \ 是你管理所发布应用程序的地方。你将输入应用程序的元数据（描述、关键词、支持 URL 等），以及它将要使用的由 Apple 提供的任何功能，例如 iAd、应用内购买，或者（在此例中）Game\
  \ Center。\n\n为了使用 Game Center，你需要向 iTunes Connect 告知你的游戏信息，以便开始使用 Game Center 沙盒。Game\
  \ Center 沙盒是一个开发环境，开发者可以在其中测试其 Game Center 集成，而不会影响正式环境下的分数或成就。\n\n##### iTunes\
  \ Connect 设置\n\n启用 Game Center 集成的第一步是，如果你尚未为你的应用创建 bundle identifier，则在 iOS Provisioning\
  \ Portal 中创建一个。Bundle identifier 用于标识一个应用的所有相关数据。例如，如果你的游戏有免费版和付费版，并且你希望它们使用同一个高分排行榜，那么你可以为它们赋予相同的\
  \ bundle identifier。\n\n访问 `developer.apple.com` 上的 iOS Provisioning Portal，然后点击\
  \ “App IDs”。创建你的新 bundle identifier。图 16–1 中显示的信息就是你在本游戏中将使用的应用信息。\n\n![Image](img/9781430240051_Fig16-01.jpg)\n\
  \n**图 16–1.** *配置你的 App ID*\n\n现在，前往 `itunesconnect.apple.com`，点击 “Manage Your Applications”。如果你尚未提交应用以供审核，请点击\
  \ “Add New App” 按钮，此时会显示一个类似于图 16–2 的页面。输入你新应用的信息，然后点击 “Continue”。\n\n![Image](img/9781430240051_Fig16-02.jpg)\n\
  \n**图 16–2.** *输入你的应用信息*\n\n一旦你输入了有关应用的所有元数据，包括截图和应用图标，你就可以启用 Game Center 了。点击图\
  \ 16–3 中所示的 “Manage Game Center” 按钮，然后点击 “Enable”。\n\n![Image](img/9781430240051_Fig16-03.jpg)\n\
  \n**图 16–3.** *访问 Game Center 管理页面*\n\n启用后，你就可以配置排行榜和成就了（后续会有更多介绍）。\n\n\n##### 项目设置\n\
  \n现在为你的游戏代码配置好 Game Center。在 Xcode 中打开你的项目（或本章提供的项目）。\n\nXcode 打开后，在项目导航器中点击你的项目名称，并选择所需的目标。转到\
  \ **Build Phases** 选项卡，展开 **Link Binaries With Libraries** 区域。你需要添加 Game Kit 框架，因此点击\
  \ 图 16-4 中高亮显示的 `+` 按钮。\n\n![Image](img/9781430240051_Fig16-04.jpg)\n\n**图 16-4.**\
  \ *用于添加框架的 Build Phases 选项卡*\n\n在弹出的对话框（类似 图 16-5）中，搜索 **Game Kit** 并点击 **Add**。\n\
  \n![Image](img/9781430240051_Fig16-05.jpg)\n\n**图 16-5.** *向项目添加 Game Kit 框架*\n\n\
  如果你的游戏在没有 Game Center 的情况下也能运行，那么你可能希望将此框架设为可选，而非必需。在这种情况下，你的框架列表将类似于 图 16-6。\n\n\
  ![Image](img/9781430240051_Fig16-06.jpg)\n\n**图 16-6.** *将 Game Kit 框架配置为可选*\n\n\
  如果你需要强制要求 Game Center，那么可以将其保留为必需，但你需要额外一步来强制要求 Game Center。打开目标的 **Info** 选项卡，将\
  \ `gamekit` 添加到必需的设备功能列表中，如 图 16-7 所示。\n\n![Image](img/9781430240051_Fig16-07.jpg)\n\
  \n**图 16-7.** *添加 \"gamekit\" 作为必需的设备功能*\n\n在编辑 **Info** 选项卡时，请确保你的 Bundle Identifier\
  \ 与你在 iTunes Connect 中设置的保持一致，如 图 16-8 所示。\n\n![Image](img/9781430240051_Fig16-08.jpg)\n\
  \n**图 16-8.** *确认应用中的 Bundle Identifier 与 iTunes Connect 中使用的一致*\n\n现在，你可以通过在代码中添加语句\
  \ `#import <GameKit/GameKit.h>` 来包含 Game Center 功能。首先确认 Game Center 在此设备上可用。\n\n\
  #### 检查 Game Center 支持\n\n首先，创建一个检查 Game Center 支持的方法。我将把它添加到应用委托中，这样你可以在游戏中的任何时刻检查状态。首先将\
  \ Game Kit 导入实现文件（`.m`）中，并创建一个检查 Game Center 可用性的方法：\n\n```\n#import \"HMAppDelegate.h\"\
  \n#import <GameKit/GameKit.h>\n\n@implementation HMAppDelegate\n@synthesize window\
  \ = _window;\n\n+(BOOL) isGameCenterAvailable\n{\n    // 检查 GKLocalPlayer 类是否存在\n\
      BOOL localPlayerClassAvailable = (NSClassFromString(@\"GKLocalPlayer\")) !=\
  \ nil;\n\n    // 设备必须运行 iOS 4.1 或更高版本\n    NSString *reqSysVer = @\"4.1\";\n    NSString\
  \ *currSysVer = [[UIDevice currentDevice] systemVersion];\n    BOOL osVersionSupported\
  \ = ([currSysVer compare:reqSysVer\n                                           options:NSNumericSearch]\
  \ !=\nNSOrderedAscending);\n\n    return (localPlayerClassAvailable && osVersionSupported);\n\
  }\n```\n\n在你的接口文件（`.h`）中，为 `isGameCenterAvailable` 添加声明，以便其他类可以使用它，并且自动补全功能能够识别：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface HMAppDelegate : UIResponder <UIApplicationDelegate>\n\
  \n@property (strong, nonatomic) UIWindow *window;\n\n+(BOOL) isGameCenterAvailable;\n\
  \n@end\n```\n\n#### 玩家认证\n\n你需要尽快完成玩家认证。最好在游戏启动完成后立即进行，因此你将向应用委托的 `didFinishLaunchingWithOptions:`\
  \ 方法中添加认证逻辑。不过，首先切换到你的接口文件，并为本地玩家添加一个属性到应用委托，以便在需要时可以随时访问。\n\n由于你已将 `GameKit.h`\
  \ 导入实现文件，因此需要告知接口文件存在一个名为 `GKLocalPlayer` 的类。你可以通过在接口文件中的 import 语句下方添加如下代码来实现：\n\
  \n`@class GKLocalPlayer;`\n\n然后为 `GKLocalPlayer` 添加一个属性：\n\n`@property(strong, nonatomic)\
  \ GKLocalPlayer *localPlayer;`\n\n最终的应用委托接口文件如下所示：\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@class GKLocalPlayer;\n\n@interface HMAppDelegate : UIResponder <UIApplicationDelegate>\n\
  \n@property (strong, nonatomic) UIWindow *window;\n@property(strong, nonatomic)\
  \ GKLocalPlayer *localPlayer;\n\n+(BOOL) isGameCenterAvailable;\n\n@end\n```\n\n\
  切换回实现文件并合成你的新属性：\n\n`@synthesize localPlayer;`\n\n将你的 `didFinishLaunchingWithOptions:`\
  \ 方法修改为如下代码。这将认证玩家并将 `localPlayer` 属性设置为本地玩家：\n\n```\n- (BOOL)application:(UIApplication\
  \ *)application\ndidFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n\
      // 应用启动后的自定义覆盖点\n    if([HMAppDelegate isGameCenterAvailable]){\n        //\
  \ 如果 GameCenter 可用，让我们认证用户\n        GKLocalPlayer *_localPlayer=[GKLocalPlayer localPlayer];\n\
          [_localPlayer authenticateWithCompletionHandler:^(NSError *error) {\n            if(localPlayer.isAuthenticated){\n\
                  self.localPlayer=localPlayer;\n            }\n        }];\n    }\n\
      return YES;\n}\n```\n\n关于此代码的一些说明：你应该始终检查 `isAuthenticated` 属性，而不是检查是否存在错误。即使出现错误，Game\
  \ Kit 也可能利用缓存数据成功认证用户。你不应该向用户显示这些错误——Game Center 会替你做这些。错误信息主要用于调试。\n\n玩家认证的大致流程就是这样。当你运行应用时，它会提示你登录或创建新账户，如\
  \ 图 16-9 所示。已认证的用户可以在不同应用间传递，因此如果你或用户已在其他应用中完成了 Game Center 认证，该认证信息可以传递到你的应用，而无需再次提示登录。\n\
  \n![Image](img/9781430240051_Fig16-09.jpg)\n\n**图 16-9.** *你的应用提示输入 Game Center\
  \ 账户*\n\n### 技巧 16-2：排行榜\n\n现在你已经能够认证用户了。让我们开始存储一些最高分。排行榜，也即最高分列表，是提升游戏重复可玩性并鼓励朋友间竞争的绝佳方式。你首先需要在\
  \ iTunes Connect 中创建一个排行榜，因此请访问 `itunesconnect.apple.com`。\n\n\n\n#### 设置 iTunes\
  \ Connect\n\n点击“管理你的应用”，然后点击你启用了 Game Center 的应用。在“应用信息”页面，点击“管理 Game Center”，如图\
  \ 16-10 所示。\n\n![Image](img/9781430240051_Fig16-10.jpg)\n\n**图 16-10.** *进入“管理 Game\
  \ Center”界面*\n\n在“排行榜”标题下，点击“设置”，如图 16-11 所示。\n\n![Image](img/9781430240051_Fig16-11.jpg)\n\
  \n**图 16-11.** *Game Center 界面，你可以在其中设置排行榜*\n\n一旦应用的排行榜上线，便无法删除，因此在创建时需谨慎考虑。每个应用最多可拥有\
  \ 25 个排行榜。这允许你为不同难度创建多个排行榜，甚至可以为游戏的每个关卡创建一个，以最适合你的需求。在你的简单应用中，只需创建一个排行榜。\n\n点击“添加排行榜”按钮，如图\
  \ 16-12 所示，开始创建。\n\n![Image](img/9781430240051_Fig16-12.jpg)\n\n**图 16-12.** *你应用的待添加排行榜列表*\n\
  \n在“单个排行榜”下点击“选择”按钮，如图 16-13 所示，继续创建一个独立的排行榜。\n\n![Image](img/9781430240051_Fig16-13.jpg)\n\
  \n**图 16-13.** *选择排行榜类型*\n\n为排行榜填写名称和标识符。名称是用于跟踪的内部名称，不会向玩家显示。（显示名称将在下一步添加语言时配置。）接下来选择分数格式类型；这里我将使用简单的整数，但你也可以使用基于时间、浮点数和货币的格式。选择排行榜的排序顺序。如果你希望高分排在最前面（通常如此），则选择“从高到低”排序；如果你希望低分排在最前面（例如在高尔夫游戏中），则选择“从低到高”排序。\n\
  \n你需要为排行榜设置至少一种语言。为此，点击“添加语言”按钮，如图 16-14 所示。\n\n![Image](img/9781430240051_Fig16-14.jpg)\n\
  \n**图 16-14.** *配置排行榜*\n\n现在，按照图 16-15 所示，为该分数配置本地化语言。选择语言，然后为排行榜输入显示名称；这是游戏中玩家将看到的名称。你可以设置分数的格式以及分数的单位（单数和复数）；在此例中，单位是“point”和“points”。\n\
  \n![Image](img/9781430240051_Fig16-15.jpg)\n\n**图 16-15.** *排行榜的语言显示设置*\n\n完成后，点击“保存”，然后也在排行榜页面上点击“保存”。\n\
  \n现在，让我们深入一些代码。\n\n#### 设置你的代码\n\n打开 HangmanMP 项目，进入 `GameScene.m` 文件。在文件顶部添加导入语句：`#import\
  \ <GameKit/GameKit.h>`。\n\n让我们在 `@synthesize` 和实例变量下方添加一个用于报告分数的方法：\n\n```\n- (void)\
  \ reportScore: (int64_t) score forCategory: (NSString*) category\n{\n    GKScore\
  \ *scoreReporter = [[GKScore alloc] initWithCategory:category];\n    scoreReporter.value\
  \ = score;\n    [scoreReporter reportScoreWithCompletionHandler:^(NSError *error)\
  \ {\n\n        NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
  NSUserDomainMask, YES);\n        NSString *scoreFilePath = [NSString stringWithFormat:@\"\
  %@/scores.plist\",[paths\nobjectAtIndex:0]];\n        NSMutableDictionary *scoreDictionary=[NSMutableDictionary\n\
  dictionaryWithContentsOfFile:scoreFilePath];\n\n        if (error != nil)\n    \
  \    {\n            //出现错误，需要将分数保存在本地并稍后重新提交\n            NSLog(@\"保存分数以供后续处理\"\
  );\n            [scoreDictionary setValue:scoreReporter forKey:[NSDate date]];\n\
  \            [scoreDictionary writeToFile:scoreFilePath atomically:YES];\n     \
  \   }\n    }];\n}\n```\n\n此方法会尝试报告分数，但如果失败，它会将分数保存到一个字典中，并将该字典写入文件，以便你之后可以加载这些分数。你可以在任何想要向\
  \ Game Center 报告分数的地方调用此方法，调用方式类似于：\n\n```\n[self reportScore:playerScore forCategory:@\"\
  default_high_scores\"];\n```\n\n你还应该在应用启动时尝试报告已保存的分数，因此请切换到你的应用委托实现文件（`.m`）。\n\n\
  在 `didFinishLaunchingWithOptions` 方法的末尾，在读取到“return YES;”那一行之前，添加以下代码。\n\n```\n\
  NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\nNSUserDomainMask,\
  \ YES);\n    NSString *scoreFilePath = [NSString stringWithFormat:@\"%@/scores.plist\"\
  ,[paths\nobjectAtIndex:0]];\n    NSMutableDictionary *scoreDictionary=[NSMutableDictionary\n\
  dictionaryWithContentsOfFile:scoreFilePath];\n\n    for (NSDate *dateID in [scoreDictionary\
  \ allKeys]) {\n        NSLog(@\"报告旧分数: %@\", dateID);\n        GKScore *scoreToReport=(GKScore\
  \ *)[scoreDictionary objectForKey:dateID];\n        [scoreToReport reportScoreWithCompletionHandler:^(NSError\
  \ *error) {\n            NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
  NSUserDomainMask, YES);\n            NSString *scoreFilePath = [NSString\nstringWithFormat:@\"\
  %@/scores.plist\",[paths objectAtIndex:0]];\n            NSMutableDictionary *scoreDictionary=[NSMutableDictionary\n\
  dictionaryWithContentsOfFile:scoreFilePath];\n\n            if (error != nil)\n\
  \            {\n                //出现错误，需要将分数保存在本地并稍后重新提交\n                [scoreDictionary\
  \ setValue:scoreToReport forKey:scoreToReport.playerID];\n                [scoreDictionary\
  \ writeToFile:scoreFilePath atomically:YES];\n            }\n        }];\n\n   \
  \ }\n```\n\n这段代码会检查写入文件的旧分数，并尝试将它们发送到 Game Center。\n\n#### 显示高分\n\n如果没人看到，高分就没有意义。你的用户可以在\
  \ Game Center 应用内看到游戏的高分，但你也可以非常轻松地为他们提供一个直接链接到高分榜的入口。切换到 `MainMenuScene.h` 文件。\n\
  \n你需要导入 `GameKit.h`，并将 `MainMenuScene` 设置为 `GKLeaderboardViewControllerDelegate`\
  \ 代理。\n\n```\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface\
  \ MainMenuScene : UIViewController <GKLeaderboardViewControllerDelegate>\n\n@end\n\
  ```\n\n现在，转到实现文件（`.m`），并在顶部添加两个新方法。第一个方法将在点击“完成”时关闭 `GKLeaderboardViewController`：\n\
  \n```\n- (void)leaderboardViewControllerDidFinish:(GKLeaderboardViewController*)viewController\n\
  {\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n你需要添加的另一个方法将显示实际的\
  \ `GKLeaderboardViewController` 视图：\n\n```\n- (void) showLeaderboard\n{\n    GKLeaderboardViewController\
  \ *leaderboardController = [[GKLeaderboardViewController\nalloc] init];\n    if\
  \ (leaderboardController != nil)\n    {\n        leaderboardController.leaderboardDelegate\
  \ = self;\n        [self presentModalViewController: leaderboardController animated:\
  \ YES];\n    }\n}\n```\n\n现在，你可以在主菜单场景上创建一个 `UIButton`，并将其连接到 `showLeaderboard`\
  \ 方法，以显示游戏的排行榜。你可以在 `-viewDidLoad` 方法中创建这个按钮：\n\n```\n- (void)viewDidLoad\n{\n \
  \   [super viewDidLoad];\n    UIButton *buttonShowHighScores=[UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
  \    [buttonShowHighScores addTarget:self action:@selector(showLeaderboard)\nforControlEvents:UIControlEventTouchUpInside];\n\
  \    buttonShowHighScores.frame=CGRectMake(104, 302, 112, 44);\n    [buttonShowHighScores\
  \ setTitle:@\"高分榜\" forState:UIControlStateNormal];\n\n    [self.view addSubview:buttonShowHighScores];\n\
  }\n```\n\n\n\n### 配方 16-3：成就系统\n\n游戏中的成就类似于其他应用和游戏中的徽章及可解锁内容。当玩家达到特定里程碑时，您需要为他们提供通知。在`HangmanMP`游戏中，一个很好的成就设定可以是：玩家完美猜中某个单词的全部字母（不犯任何错误）。让我们来看看如何实现这个功能。\n\
  \n#### 配置 iTunes Connect\n\n与 Game Center 的其他功能一样，所有操作都从 iTunes Connect 开始。请访问 `itunesconnect.apple.com`，点击\"\
  管理你的应用\"，然后选择已配置 Game Center 的应用，接着点击\"管理 Game Center\"。\n\n在 Game Center 管理页面中，点击\"\
  成就\"下的\"设置\"，如图 16-16 所示。\n\n![图片](img/9781430240051_Fig16-16.jpg)\n\n**图 16-16.**\
  \ *从 Game Center 界面进入成就设置区*\n\n每个游戏最多可设置 1000 个成就点。您可以根据需要将这些点数分配给不同的成就，但每个成就最多只能获得\
  \ 100 成就点。\n\n现在我们将创建一个 50 点成就，请继续点击\"添加新成就\"，如图 16-17 所示。\n\n![图片](img/9781430240051_Fig16-17.jpg)\n\
  \n**图 16-17.** *为你的应用添加新成就*\n\n该成就的条件是：在猜短单词（6 个字母或更少）时，全部猜对且不犯任何错误。具体配置如图 16-18\
  \ 所示。\n\n![图片](img/9781430240051_Fig16-18.jpg)\n\n**图 16-18.** *配置成就详情*\n\n在添加至少一种语言之前无法保存成就，请立即点击\"\
  添加语言\"。生成的界面将如图 16-19 所示。在此处您可以设置成就标题和\"达成前\"描述。达成前描述应详细说明如何获得该成就。此外还有\"已达成\"描述，即获得成就后显示的描述。最后，您需要一张代表成就的图片，应为\
  \ 512×512 像素、72 ppi 的`.png`文件。\n\n![图片](img/9781430240051_Fig16-19.jpg)\n\n**图 16-19.**\
  \ *在特定语言中配置成就详情*\n\n点击\"保存\"，然后在成就信息页面上再次点击\"保存\"。接下来让我们编写代码...\n\n#### 配置代码\n\n\
  这与配置排行榜非常相似。打开`GameScene.m`，添加以下方法：\n\n```\n- (void) reportAchievementIdentifier:(NSString*)identifier\
  \ percentComplete:(float)percent\n{\n    GKAchievement *achievement = [[GKAchievement\
  \ alloc] initWithIdentifier:identifier];\n    if (achievement)\n    {\n        achievement.percentComplete\
  \ = percent;\n        [achievement reportAchievementWithCompletionHandler:^(NSError\
  \ *error)\n        {\n            if (error != nil)\n            {\n           \
  \     //出现错误，需在本地保存成就稍后重新提交\n                NSLog(@\"Saving achievement for later\"\
  );\n                NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
  \ NSUserDomainMask, YES);\n                NSString *achievementFilePath = [NSString\
  \ stringWithFormat:@\"%@/achievements.plist\",[paths objectAtIndex:0]];\n      \
  \          NSMutableDictionary *achievementDictionary=[NSMutableDictionary dictionaryWithContentsOfFile:achievementFilePath];\n\
  \n                [achievementDictionary setValue:achievement forKey:achievement.identifier];\n\
  \                [achievementDictionary writeToFile:achievementFilePath atomically:YES];\n\
  \            }\n        }];\n    }\n}\n```\n\n现在只需用您的成就和完成百分比调用此方法即可。由于在此场景中要么获得成就要么不获得，完成百分比仅为\
  \ 100 或 0，但您可以使用此代码片段报告任何成就的完成情况。请在`processGuess`方法中报告分数后添加这段代码：\n\n```\nif(unfoundLetters.location==NSNotFound){\n\
  \            [self reportScore:playerScore forCategory:@\"default_high_scores\"\
  ];\n            if(self.badGuessCount==0 && self.stringHiddenWord.length<=6){\n\
  \                NSLog(@\"Reporting achievement\");\n                [self reportAchievementIdentifier:@\"\
  no_mistakes_small_word\" percentComplete:100];\n            }\n….\n```\n\n与应用委托中保存分数的方式类似，您也应该对成就做同样处理。转到`HMAppDelegate.m`，修改`didFinishLaunchingWithOptions`方法，在返回语句前添加以下代码：\n\
  \n```\n    //Report saved achievements\n    NSString *achievementFilePath = [NSString\
  \ stringWithFormat:@\"%@/achievements.plist\",[paths objectAtIndex:0]];\n    NSMutableDictionary\
  \ *achievementDictionary=[NSMutableDictionary dictionaryWithContentsOfFile:achievementFilePath];\n\
  \    for (id achievement in [achievementDictionary allKeys]){\n        GKAchievement\
  \ *achievementToReport=(GKAchievement *)[achievementDictionary objectForKey:achievement];\n\
  \        [achievementToReport reportAchievementWithCompletionHandler:^(NSError *error)\n\
  \         {\n             if (error != nil)\n             {\n                 //出现错误，需在本地保存成就稍后重新提交\n\
  \                 NSLog(@\"Saving achievement for later\");\n                 NSArray\
  \ *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask,\
  \ YES);\n                 NSString *achievementFilePath = [NSString stringWithFormat:@\"\
  %@/achievements.plist\",[paths objectAtIndex:0]];\n                 NSMutableDictionary\
  \ *achievementDictionary=[NSMutableDictionary dictionaryWithContentsOfFile:achievementFilePath];\n\
  \n                 [achievementDictionary setValue:achievementToReport forKey:achievement];\n\
  \                 [achievementDictionary writeToFile:achievementFilePath atomically:YES];\n\
  \             }else{\n                 NSLog(@\"Achievement reported\");\n     \
  \        }\n         }];\n    }\n```\n\n#### 显示成就\n\n如果您已阅读过\"排行榜\"部分，这部分内容会让人感觉似曾相识。您希望向玩家展示他们在游戏中获得的成就，最简单的方法是将应用中的按钮与`GKAchievementsViewController`关联。前往`MainMenuScene.m`，添加以下方法：\n\
  \n```\n-(void)achievementViewControllerDidFinish:(GKAchievementViewController *)viewController{\n\
  \    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n这将关闭您的`GKAchievementViewController`。为了显示它，请在`MainMenuScene.m`中添加以下函数：\n\
  \n```\n- (void) showAchievements\n{\n    GKAchievementViewController *achievements\
  \ = [[GKAchievementViewController alloc] init];\n    if (achievements != nil)\n\
  \    {\n        achievements.achievementDelegate = self;\n        [self presentModalViewController:achievements\
  \ animated: YES];\n    }\n}\n```\n\n将`UIButton`的操作调用连接到该方法，然后别忘了在`MainMenuScene.h`文件中添加`GKAchievementViewControllerDelegate`协议：\n\
  \n```\n//\n//  MainMenuScene.h\n//  HangmanMP\n\n#import <UIKit/UIKit.h>\n#import\
  \ <GameKit/GameKit.h>\n\n@interface MainMenuScene : UIViewController <GKLeaderboardViewControllerDelegate\
  \ GKAchievementViewControllerDelegate>\n\n- (IBAction)actionShowHighScores:(id)sender;\n\
  \n@end\n```\n\n现在在模拟器中启动应用进行测试。您将能够查看新创建的成就，如图 16-20 所示。\n\n![图片](img/9781430240051_Fig16-20.jpg)\n\
  \n**图 16-20.** *您的应用显示已获得的成就*\n\n\n\n### 配方 16–4：多人游戏\n\n为游戏添加多人游戏选项可极大提升其重玩价值，因为玩家现在可以突破电脑的限制，在互联网上与真实玩家对战。\n\
  \n**注意：** 您无法在模拟器中测试多人游戏，而需要两台设备进行测试，因此可以借用朋友的设备或找一台旧 iPod touch。\n\n#### 设置代码\n\
  \n在本配方中，您可以跳过 iTunes Connect 部分，因为如果您已启用 Game Center，只要游戏支持，多人游戏功能就会自动开放。那么，我们直接进入代码部分。\n\
  \n首先，您需要更新 `MainMenuScene.h` 文件。将其设置为 `GKMatchmakerViewControllerDelegate`，并添加一个用于主持多人游戏的新操作。文件内容应如下所示：\n\
  \n```\n//  MainMenuScene.h\n//  HangmanMP\n//\n#import <UIKit/UIKit.h>\n#import\
  \ <GameKit/GameKit.h>\n\n@interface MainMenuScene : UIViewController <GKLeaderboardViewControllerDelegate,\n\
  GKAchievementViewControllerDelegate,GKMatchmakerViewControllerDelegate>\n\n- (IBAction)actionShowHighScores:(id)sender;\n\
  - (IBAction)actionShowAchievements:(id)sender;\n- (IBAction)actionHostMatch:(id)sender;\n\
  \n@end\n```\n\n现在切换到 `MainMenuScene.m` 文件。您需要创建 `GKMatchmakerViewControllerDelegate`\
  \ 协议要求的两个标准方法：`matchmakerViewControllerWasCancelled` 和 `matchmakerViewController:didFailWithError`：\n\
  \n```\n- (void)matchmakerViewControllerWasCancelled:(GKMatchmakerViewController*)viewController\n\
  {\n    [self dismissModalViewControllerAnimated:YES];\n}\n\n- (void)matchmakerViewController:(GKMatchmakerViewController\
  \ *)viewController\n                didFailWithError:(NSError *)error\n{\n    [self\
  \ dismissModalViewControllerAnimated:YES];\n    [[[UIAlertView alloc] initWithTitle:@\"\
  Error\" message:error.description delegate:nil\ncancelButtonTitle:@\"OK\" otherButtonTitles:nil]\
  \ show];\n}\n```\n\n您还需要添加最后一个委托协议方法 `matchmakerViewController:didFindMatch:`，这是开始加载多人游戏的关键步骤。\n\
  \n```\n- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController\n\
  \                    didFindMatch:(GKMatch *)match\n{\n    [self dismissModalViewControllerAnimated:YES];\n\
  //从故事板设置游戏场景\n    GameScene *gameSceneVC=[self.storyboard\ninstantiateViewControllerWithIdentifier:@\"\
  GameScene\"];\n//将 GameScene 的 match 属性设置为 matchmaker 的匹配结果\n    gameSceneVC.match=match;\n\
  //将 match 的委托设置为 GameScene，更多内容稍后说明…\n    match.delegate = gameSceneVC;\n[self.navigationController\
  \ pushViewController:gameSceneVC animated:YES];\n}\n```\n\n现在，您将创建使用 `matchmakerViewController`\
  \ 实际开始寻找匹配的操作：\n\n```\n- (IBAction)actionHostMatch:(id)sender {\n    if([GKLocalPlayer\
  \ localPlayer].isAuthenticated){\n        GKMatchRequest *request = [[GKMatchRequest\
  \ alloc] init] ;\n        request.minPlayers = 2;\n        request.maxPlayers =\
  \ 2;\n        GKMatchmakerViewController *mmvc = [[GKMatchmakerViewController alloc]\n\
  initWithMatchRequest:request];\n        mmvc.matchmakerDelegate = self;\n      \
  \  [self presentModalViewController:mmvc animated:YES];\n    }\n}\n```\n\n这会让我们开始寻找匹配，但如果您希望能响应邀请，则需要添加邀请处理程序。这应该在玩家通过身份验证后立即添加，以便尽快处理邀请请求。这段代码将处理您发送的邀请以及您收到的邀请。将以下代码添加到\
  \ `MainMenuScene.m` 的 `-viewDidLoad` 方法中：\n\n```\n- (void)viewDidLoad\n{\n    [super\
  \ viewDidLoad];\n    [GKMatchmaker sharedMatchmaker].inviteHandler = ^(GKInvite\
  \ *acceptedInvite,\n                                                      NSArray\
  \ *playersToInvite) {\n        // 在此处插入特定于应用程序的代码，清理正在进行的游戏。\n        if (acceptedInvite)\n\
  \        {\n            GKMatchmakerViewController *mmvc = [[GKMatchmakerViewController\
  \ alloc]\ninitWithInvite:acceptedInvite];\n            mmvc.matchmakerDelegate =\
  \ self;\n            [self presentModalViewController:mmvc animated:YES];\n    \
  \    }\n        else if (playersToInvite)\n        {\n            GKMatchRequest\
  \ *request = [[GKMatchRequest alloc] init];\n            request.minPlayers = 2;\n\
  \            request.maxPlayers = 2;\n            request.playersToInvite = playersToInvite;\n\
  \            GKMatchmakerViewController *mmvc = [[GKMatchmakerViewController alloc]\n\
  initWithMatchRequest:request];\n            mmvc.matchmakerDelegate = self;\n  \
  \          [self presentModalViewController:mmvc animated:YES];\n        }\n   \
  \ };\n}\n```\n\n现在，您需要在 `GameScene` 中实现多人游戏控制。打开 `GameScene.h`，将其设置为 `GKMatchDelegate`。也可以将其设置为\
  \ `UIAlertViewDelegate`（供稍后使用）。最后，添加两个新属性：`GKMatch *match` 和 `BOOL matchStarted`。`GameScene.h`\
  \ 现在的样式如下：\n\n```\n//  GameScene.h\n//  HangmanMP\n\n#import <UIKit/UIKit.h>\n#import\
  \ <GameKit/GameKit.h>\n\n@interface GameScene : UIViewController <UITextFieldDelegate,\
  \ GKMatchDelegate, UIAlertViewDelegate>\n\n@property (weak, nonatomic) IBOutlet\
  \ UITextField *textFieldGuess;\n@property (weak, nonatomic) IBOutlet UITextView\
  \ *textViewGuesses;\n@property (weak, nonatomic) IBOutlet UILabel *labelGuessedLetters;\n\
  @property (weak, nonatomic) IBOutlet UIImageView *imageViewHanger;\n@property (weak,\
  \ nonatomic) IBOutlet UILabel *labelLettersInWord;\n@property (weak, nonatomic)\
  \ IBOutlet UIScrollView *scrollViewContent;\n@property (weak, nonatomic) IBOutlet\
  \ UIActivityIndicatorView *activityIndicator;\n\n@property(strong, nonatomic) NSMutableArray\
  \ *arrayGuesses;\n@property(strong, nonatomic) NSString *stringDifficulty;\n@property(strong,\
  \ nonatomic) NSString *stringHiddenWord;\n@property(nonatomic) int badGuessCount;\n\
  @property(strong, nonatomic) GKMatch *match;\n@property(nonatomic) BOOL matchStarted;\n\
  \n-(NSString *) getMagicWord;\n\n@end\n```\n\n切换到 `GameScene.m`，您还需要进行几处修改，以确保游戏能处理多人会话。首先，需要合成您创建的两个新属性，因此在\
  \ `@synthesize` 列表底部添加以下内容：\n\n```\n@synthesize match;\n@synthesize matchStarted;\n\
  ```\n\n现在，在 `GameScene.m` 中创建一个方法，用于向游戏中的所有用户发送数据。这是一个通用函数，用于编码 `NSDictionary` 并以\
  \ `NSData` 对象形式发送。\n\n```\n- (void) sendData:(NSDictionary *)dictionaryToSend\n\
  {\n    NSError *error;\n\n    NSMutableData *dataToSend = [[NSMutableData alloc]\
  \ init];\n        NSKeyedArchiver *archiver = [[NSKeyedArchiver alloc]\ninitForWritingWithMutableData:dataToSend];\n\
  \        [archiver encodeObject:dictionaryToSend forKey:@\"DataDictionary\"];\n\
  \        [archiver finishEncoding];\n\n    [match sendDataToAllPlayers:dataToSend\
  \ withDataMode:GKMatchSendDataReliable\nerror:&error];\n    if (error != nil)\n\
  \    {\n        NSLog(@\"Error sending data: %@\", error.description);\n    }\n\
  }\n```\n\n注意这一行：\n\n`[match sendDataToAllPlayers:dataToSend withDataMode:GKMatchSendDataReliable\
  \ error:&error];`\n\n\n\n如果你不需要了解玩家的每一帧更新（例如，当玩家在屏幕上移动时，你只需知道当前位置，而非其历史轨迹），也可以用\
  \ `withDataMode:GKMatchSendDataUnreliable` 发送数据。在这种情况下，你依然需要确保玩家能收到你的数据（即他们正在猜测的单词），因此你应该使用\
  \ `GKMatchSendDataReliable` 发送。\n\n在展示如何接收数据之前，我们先来看看如何配置比赛。添加以下委托方法，以便在玩家状态改变时通知你的游戏。当所有玩家都加入游戏后，`expectedPlayerCount`\
  \ 将变为 0，此时即可开始游戏。你需要确定哪位玩家先手，因此让每位玩家用 `arc4random()` 生成一个 0 到 999 之间的随机数，然后通过你之前的\
  \ `sendData` 方法发送这个随机数。\n\n```\n- (void)match:(GKMatch *)match player:(NSString\
  \ *)playerID\ndidChangeState:(GKPlayerConnectionState)state\n{\n    switch (state)\n\
  \    {\n        case GKPlayerStateConnected:\n            // 处理新玩家连接。\n        \
  \    break;\n        case GKPlayerStateDisconnected:\n            [[[UIAlertView\
  \ alloc] initWithTitle:@\"警告\" message:@\"对手离开了游戏\" delegate:nil cancelButtonTitle:@\"\
  确定\" otherButtonTitles:nil] show];\n            break;\n    }\n    if (!self.matchStarted\
  \ && match.expectedPlayerCount == 0)\n    {\n        self.matchStarted = YES;\n\
  \        // 处理初始比赛协商。\n        randomPlayerStartKey=arc4random() % 1000;\n     \
  \   NSDictionary *dictionaryRandomStart=[NSDictionary\n                        \
  \                     dictionaryWithObject:[NSNumber\nnumberWithInt:randomPlayerStartKey]\n\
  \                                             forKey:@\"randomStartKey\"];\n   \
  \     [self sendData:dictionaryRandomStart];\n\n    }\n}\n```\n\n现在，你收到了第一条数据——即刚才生成的随机数。你首先需要将接收到的\
  \ `NSData` 解码为字典。然后检查键 `randomStartKey`；如果存在，则比较该值与你自己生成的随机数。若你的数字更大，则将弹出一个输入框，由你输入一个单词并发送给对手猜测。为了完善实现，还需要添加几个其他处理器：`WordToGuess`、`gameWon`\
  \ 和 `gameLost`。\n\n```\n- (void)match:(GKMatch *)match didReceiveData:(NSData *)data\
  \ fromPlayer:(NSString\n*)playerID\n{\n    NSKeyedUnarchiver *unarchiver = [[NSKeyedUnarchiver\
  \ alloc]\ninitForReadingWithData:data];\n    NSDictionary *myDictionary = [unarchiver\
  \ decodeObjectForKey:@\"DataDictionary\"];\n    [unarchiver finishDecoding];\n \
  \   NSLog(@\"收到字典: %@\", myDictionary);\n\n    if([myDictionary valueForKey:@\"\
  randomStartKey\"]!=nil){\n        NSNumber *otherRandomStartKey=[myDictionary valueForKey:@\"\
  randomStartKey\"];\n        if([otherRandomStartKey integerValue]>randomPlayerStartKey){\n\
  \            // 如果对方的随机数更大，则由对方发送单词\n        }else{\n            // 我的随机数更大，因此由我发送单词\n\
  \            UIAlertView *wordPrompt=[[UIAlertView alloc] initWithTitle:@\"输入单词：\"\
  \nmessage:@\"请输入对手需要解码的单词\" delegate:self cancelButtonTitle:@\"取消\"\notherButtonTitles:@\"\
  确定\", nil];\n            wordPrompt.alertViewStyle=UIAlertViewStylePlainTextInput;\n\
  \            [wordPrompt show];\n        }\n    }else if([myDictionary valueForKey:@\"\
  WordToGuess\"]!=nil){\n// 如果对方发送了待猜测的单词\n        [self setWord:[myDictionary valueForKey:@\"\
  WordToGuess\"]];\n        [self.activityIndicator stopAnimating];\n    }else if([myDictionary\
  \ valueForKey:@\"gameWon\"]!=nil){\n// 如果对方赢了游戏\n        int guessCount=[[myDictionary\
  \ valueForKey:@\"gameWon\"] integerValue];\n        [[[UIAlertView alloc] initWithTitle:@\"\
  你的对手获胜！\" message:[NSString\nstringWithFormat:@\"下次好运。错误猜测次数：%i\", guessCount] delegate:nil\n\
  cancelButtonTitle:@\"确定\" otherButtonTitles:nil] show];\n    }else if([myDictionary\
  \ valueForKey:@\"gameLost\"]!=nil){\n        [[[UIAlertView alloc] initWithTitle:@\"\
  你赢了！\" message:@\"他们没能猜出你的单词\" delegate:nil cancelButtonTitle:@\"确定\" otherButtonTitles:nil]\
  \ show];\n    }\n}\n```\n\n由于你需要提示输入要发送的单词，因此应该检查字典并确保其为合法单词。由于你已将类设置为 `.h` 文件中的\
  \ `UIAlertViewDelegate`，并将提示框的委托设置为 self，因此可以添加以下方法，在将提交的单词发送给对手之前对其进行处理：\n\n```\n\
  - (void)alertView:(UIAlertView *)alertView\ndidDismissWithButtonIndex:(NSInteger)buttonIndex{\n\
  \    if(buttonIndex==1){\n        NSLog(@\"提示框文本: %@\", [alertView textFieldAtIndex:0].text);\n\
  \        NSString *potentialWord=[alertView textFieldAtIndex:0].text;\n\n      \
  \  NSString *path = [[NSBundle mainBundle] pathForResource:@\"wordlist\"\n     \
  \                                                    ofType:@\"txt\"];\n       \
  \ NSString *content = [NSString stringWithContentsOfFile:path\n                \
  \                                      encoding:NSUTF8StringEncoding\n         \
  \                                                error:NULL];\n\n        NSArray\
  \ *lines = [content componentsSeparatedByString:@\"\\n\"];\n\n        BOOL wordMatch=NO;\n\
  \        while(wordMatch==NO){\n            for (NSString *word in lines) {\n  \
  \              if([word isEqualToString:potentialWord]){\n                    NSDictionary\
  \ *myDictionary = [NSDictionary\ndictionaryWithObject:[alertView textFieldAtIndex:0].text\
  \ forKey:@\"WordToGuess\"];\n                    [self sendData:myDictionary];\n\
  \                    wordMatch=YES;\n                    break;\n              \
  \  }\n            }\n            if(wordMatch==NO){\n                UIAlertView\
  \ *wordPrompt=[[UIAlertView alloc] initWithTitle:@\"未找到单词\"\nmessage:@\"字典中未找到您的单词，请为对手输入一个新单词进行解码：\"\
  \ delegate:self cancelButtonTitle:@\"取消\"\notherButtonTitles:@\"确定\", nil];\n  \
  \              wordPrompt.alertViewStyle=UIAlertViewStylePlainTextInput;\n     \
  \           [wordPrompt show];\n            }\n        }\n    }\n}\n```\n\n现在你已经实现了数据的双向发送，可以使用\
  \ `sendData` 方法发送游戏通知（例如胜负结果），但首先需要确认是否处于比赛状态。以下示例代码展示了如何检查是否在比赛中：\n\n```\nif(self.match){\n\
  \n                NSDictionary *dictionaryGameWon=[NSDictionary\n              \
  \                                       dictionaryWithObject:[NSNumber\nnumberWithInt:self.badGuessCount]\n\
  \                                                     forKey:@\"gameWon\"];\n  \
  \              [self sendData:dictionaryGameWon];\n\n            }\n```\n\n上述代码应放置在\
  \ `GameScene.m` 的 `-processGuess` 方法末尾附近。\n\n\n\n`-(void) processGuess:(NSString\
  \ *)guessedLetter{`\n`…`\n`        if(unfoundLetters.location==NSNotFound){`\n`\
  \            [self reportScore:playerScore forCategory:@\"default_high_scores\"\
  ];`\n`            if(self.badGuessCount==0 && self.stringHiddenWord.length<=6){`\n\
  `                NSLog(@\"Reporting achievement\");`\n`                [self reportAchievementIdentifier:@\"\
  no_mistakes_small_word\"`\n`percentComplete:100];`\n`            }`\n\n`       \
  \     [[[UIAlertView alloc] initWithTitle:@\"WINNER!\" message:[NSString`\n`stringWithFormat:@\"\
  You Win!\\nScore:%i\", playerScore] delegate:nil`\n`cancelButtonTitle:@\"OK\" otherButtonTitles:nil]\
  \ show];`\n`            if(self.match){`\n\n`                NSDictionary *dictionaryGameWon=[NSDictionary`\n\
  `                                                     dictionaryWithObject:[NSNumber`\n\
  `numberWithInt:self.badGuessCount]`\n`                                         \
  \            forKey:@\"gameWon\"];`\n`                [self sendData:dictionaryGameWon];`\n\
  \n`            }`\n`        }`\n`    }`\n`}`\n\n这是多人游戏的开端，展示了玩家信息、移动操作以及其他数据的来回发送。如果你对上述代码有任何疑问，可以在\
  \ [`github.com/shawngrimes/HangmanMP-Complete`](https://github.com/shawngrimes/HangmanMP-Complete)\
  \ 找到完整的项目。\n\n### 总结\n\n在本章中，你已学习了如何使用 Game Center 和 Game Kit 扩展你的游戏。你应该能够在游戏中加入**高分榜**，以此激励玩家之间的竞争并建立炫耀资本。你还应该能够实现**成就系统**，让玩家在漫长的关卡中获得成就感，甚至轻松地在游戏中嵌入**小游戏**。最后，你在游戏中实现了基本的**多人游戏**功能，以鼓励与真人对手进行更具社交性的游戏。\n\
  \n开发 iOS 应用程序是一个多方面的过程：它需要将视觉设计与程序功能相结合，这不仅要求多才多艺的技能组合，还需要极大的奉献精神。幸运的是，Apple 提供了优秀的开发工具集和编程语言，两者都在不断更新和改进。借助如此灵活的语言，从组织海量数据存储，到处理复杂的网络请求，再到图像滤镜，这些任务都可以被简化、设计并实现于我们这一代最广泛使用、最强大的设备上。无论你将本书作为简单的参考书还是完整的指南，我们都希望你能利用这些**现成方案**构建更强健的应用程序，为\
  \ iOS 技术世界做出贡献并助其进步。\n\n## 索引\n\n### ![图片](img/square.jpg) A\n\n- `actionSheet:clickedButtonAtIndex:`\
