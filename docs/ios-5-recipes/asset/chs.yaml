  \n![Image](img/9781430240051_Fig08-15.jpg)\n\n**图 8–15.** *左侧为你的应用指定新联系人信息，右侧为创建的联系人结果*\n\
  \n第二个选项是放弃使用`ABNewPersonViewController`，直接以编程方式创建联系人，从而省去用户批准联系的额外步骤。由于你已经拥有`ABPersonRef`，实际上只需几行代码即可完成，这些代码将替换设置和显示`ABNewPersonViewController`的代码。\n\
  \n```\nABAddressBookRef addressBook = ABAddressBookCreate();\nABAddressBookAddRecord(addressBook,\
  \ aRecord, nil);\nABAddressBookSave(addressBook, nil);\n```\n\n`ABAddressBookCreate()`函数非常简单，它返回设备通讯录的`ABAddressBookRef`。使用`ABAddressBookAddRecord()`添加记录后，只需保存更改即可。\n\
  \n无论选择哪个选项，你仍然需要在方法结束前释放两个变量，如下所示：\n\n```\nCFRelease(aRecord);\nCFRelease(address);\n\
  ```\n\n\n# 配方 8–9：查看联系人\n\n在介绍了如何访问和设置值之后，下一步非常简单的操作是讨论如何设置一个视图控制器来查看联系人的详细信息。\n\
  \n在一个名为 `Chapter8Recipe9` 的新项目中，使用类前缀 `MainViewController`，在导入 Address Book 和 Address\
  \ Book UI 框架并为每个框架添加相应的 `#import` 语句后，向你的视图控制器添加一个 `UITableView`。使用属性名 `tableViewContacts`\
  \ 将其连接到你的头文件。同时让你的视图控制器遵循 `UITableViewDelegate`、`UITableViewDataSource` 和 `ABPersonViewControllerDelegate`\
  \ 协议。\n\n创建一个类型为 `(NSArray *)` 的属性，名为 `contacts`，用于存储你的联系人列表。\n\n总体而言，你的头文件应该如下所示：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <AddressBook/AddressBook.h>\n#import <AddressBookUI/AddressBookUI.h>\n\
  \n@interface MainViewController : UIViewController <UITableViewDelegate, UITableViewDataSource,\
  \ ABPersonViewControllerDelegate>\n\n@property (strong, nonatomic) IBOutlet UITableView\
  \ *tableViewContacts;\n@property (strong, nonatomic) NSArray *contacts;\n@end\n\
  ```\n\n在继续之前，你需要将你的主视图控制器放入一个 `UINavigationController` 中。切换到你的应用委托的实现文件，并将你的 `-application:DidFinishLaunchingWithOptions:`\
  \ 方法修改为如下所示：\n\n```\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    // 应用启动后的自定义覆盖点。\n    self.viewController = [[MainViewController\
  \ alloc]\ninitWithNibName:@\"MainViewController\" bundle:nil];\n    UINavigationController\
  \ *navcon = [[UINavigationController alloc]\ninitWithRootViewController:self.viewController];\n\
  \    self.window.rootViewController = navcon;\n    [self.window makeKeyAndVisible];\n\
  \    return YES;\n}\n```\n\n现在，回到视图控制器的实现文件，创建一个更新联系人数组的方法，如下所示：\n\n```\n-(void)updateContacts\n\
  {\n    ABAddressBookRef addressBook = ABAddressBookCreate();\n    CFArrayRef people\
  \ = ABAddressBookCopyArrayOfAllPeople(addressBook);\n    self.contacts = (__bridge\
  \ NSArray *)people;\n    CFRelease(people);\n}\n```\n\n这将使你的 `-viewDidLoad` 方法实现起来非常简单。\n\
  \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    self.tableViewContacts.delegate\
  \ = self;\n    self.tableViewContacts.dataSource = self;\n    self.title = @\"联系人表格\"\
  ;\n    [self updateContacts];\n}\n```\n\n你还应该修改你的 `-viewWillAppear:` 方法，以便在应用程序外部发生任何更改时刷新你的表格。\n\
  \n```\n- (void)viewWillAppear:(BOOL)animated\n{\n    [self updateContacts];\n  \
  \  [self.tableViewContacts reloadData];\n    [super viewWillAppear:animated];\n\
  }\n```\n\n现在实现你的 `UITableView` 数据源方法。你需要一个方法来指定你拥有的行数：\n\n```\n-(NSInteger)tableView:(UITableView\
  \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    return [[NSNumber\
  \ numberWithInt:[self.contacts count]] intValue];\n}\n```\n\n基于你在之前配方中使用的访问代码，你将有一个相当简单的方法来创建你的单元格。\n\
  \n```\n-(UITableViewCell *)tableView:(UITableView *)tableView\ncellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell\
  \ *cell = [tableView\ndequeueReusableCellWithIdentifier:CellIdentifier];\n    if\
  \ (cell == nil)\n    {\n         cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleValue1\n\
  reuseIdentifier:CellIdentifier];\n    }\n\n    cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n\
  \    cell.textLabel.backgroundColor = [UIColor clearColor];\n    cell.textLabel.font\
  \ = [UIFont systemFontOfSize:19.0];\n\n    ABRecordRef current = (__bridge ABRecordRef)[self.contacts\n\
  objectAtIndex:indexPath.row];\n\n    NSString *firstName = (__bridge_transfer NSString\
  \ *)ABRecordCopyValue(current,\nkABPersonFirstNameProperty);\n    NSString *lastName\
  \ = (__bridge_transfer NSString *)ABRecordCopyValue(current,\nkABPersonLastNameProperty);\n\
  \n    cell.textLabel.text = [NSString stringWithFormat:@\"%@ %@\", firstName, lastName];\n\
  \n    return cell;\n}\n```\n\n你需要实现的第三个数据源方法用于单元格的选中，这将显示一个包含所选联系人信息的 `ABPersonViewController`\
  \ 实例。\n\n```\n-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\n\
  *)indexPath\n{\n    ABRecordRef chosen = (__bridge ABRecordRef)[self.contacts\n\
  objectAtIndex:indexPath.row];\n\n    ABPersonViewController *view = [[ABPersonViewController\
  \ alloc] init];\n    view.personViewDelegate = self;\n    view.displayedPerson =\
  \ chosen;\n    view.allowsEditing = NO;\n\n    [self.navigationController pushViewController:view\
  \ animated:YES];\n    [tableView deselectRowAtIndexPath:indexPath animated:NO];\n\
  }\n```\n\n最后，你只需要实现 `ABPersonViewController` 的代理方法，处理属性的选中。该方法可以简单地返回一个 BOOL 值，该值将决定用户是否能够从你的应用程序中拨打或发送短信给一个电话号码，或执行任何其他值的默认属性操作。\n\
  \n```\n-(BOOL)personViewController:(ABPersonViewController *)personViewController\n\
  shouldPerformDefaultActionForPerson:(ABRecordRef)person property:(ABPropertyID)property\n\
  identifier:(ABMultiValueIdentifier)identifier\n{\n    return YES;\n}\n```\n\n假设你的联系人列表中只列出了个人，而没有群组，你的应用程序应该有一个非常基本的表格视图，显示手机上所有联系人的姓名。图\
  \ 8–16 展示了在你自定义的联系人列表中选择一条记录后的结果视图。当处理一个你不确定是 `ABPersonRef` 还是 `ABGroupRef` 的 `ABRecordRef`\
  \ 时，你应该始终包含代码来检查每种情况并相应处理。\n\n![图片](img/9781430240051_Fig08-16.jpg)\n\n**图 8–16.**\
  \ *在表格中选择一行后显示的联系人信息*\n\n### 总结\n\n如你所见，与任何特定用户的个人数据进行交互有着种类繁多的方法和功能。从重复事件，到多个日历，再到大多数用户拥有的海量联系人和电话号码，所有这些信息都可以用来为每个客户个性化应用，同时为所有客户进行通用开发。在用户体验方面，能够访问、显示和编辑所有这些信息，使我们作为开发者能够创建更强大、更独特、更有用的应用程序，最终将转化为更满意的客户和更高质量的产品。\n\
  \n## 第 9 章\n\n## UITableView 配方\n\n每一天，每时每刻，我们都在接收信息。无论是视频、广播、音乐、电子邮件、140 个字符的消息，甚至是视觉和声音，总有新的数据需要获取和处理。作为开发者，我们通过数据组织和展示，致力于在信息和最终用户之间创建并管理媒介。我们必须能够获取可用的海量信息流，并将其处理成简洁明了、符合特定受众兴趣的内容。除此之外，我们还必须让数据在视觉上具有吸引力，同时保持效率和条理性。在\
  \ iOS 开发中，实现这一目标最强大的工具之一就是 `UITableView`：一种极其灵活但又简单的界面，旨在为开发者和客户提供易用性。在本章中，我们将重点介绍创建、实现和定制这些实用工具的分步方法。\n\
  \n\n\n### 配方 9-1：创建无分组表格\n\n在 iOS 中，你可以使用两种 `UITableView`：**分组表格**和**无分组表格**。具体使用哪一种取决于具体的应用程序需求，但我们将从无分组表格入手，因为它更容易实现。\n\
  \n为了构建一个功能完整且可定制的基于 `UITableView` 的应用程序，你将从一个空应用程序开始，逐步构建出一个能够显示各国信息的实用表格。新建一个项目，选择**空应用程序**模板，如图\
  \ 9-1 所示。这样你只会得到一个应用程序委托，你可以在此基础上构建所有视图控制器。\n\n![图片](img/9781430240051_Fig09-01.jpg)\n\
  \n**图 9-1.** 选择空应用程序以从头开始\n\n你将在本章中全程使用同一个项目，因此不必按照配方名称来命名项目，而是根据你的喜好命名（我选择了 \"\
  Countries\"，因为该应用程序将专注于显示不同国家的信息），然后创建项目。我使用了类前缀 \"Main\"，它仅会应用于你的应用程序委托文件，因为你使用的是空应用程序。\n\
  \n由于你使用了空应用程序，你需要从创建主视图控制器开始，该控制器将包含你的 `UITableView`。\n\n新建一个文件，选择 **UIViewController\
  \ Subclass** 模板。\n\n在下一个屏幕上，为你的视图控制器输入一个名称，并确保该类是 `UIViewController` 的子类。将其命名为 `MainTableViewController`。\n\
  \n**注意：** 有些人可能认为创建 `UITableViewController` 的子类更方便，因为你会立即获得一个 `UITableView` 以及使用它所需的一些方法。这种方法的缺点是，控制器\
  \ XIB 文件中提供的 `UITableView` 更难配置和调整框架。因此，你将使用 `UIViewController` 的子类，并自行添加 `UITableView`\
  \ 及其方法。\n\n由于你将专注于应用程序中表格的概念，首先从库中拖拽一个 `UITableView` 到你的视图中。为了让表格不占满整个视图，你可以将其稍微缩小，并在四周保留\
  \ 20 点的边距。切换到主视图，将背景颜色改为浅灰色，以便与 `UITableView` 区分开。最终显示效果将如图 9-2 所示。\n\n![图片](img/9781430240051_Fig09-02.jpg)\n\
  \n**图 9-2.** 在 XIB 文件中配置 `UITableView`\n\n使用属性名 `tableViewCountries` 将你的 `UITableView`\
  \ 连接到头文件中的属性。\n\n接下来，切换到视图控制器的头文件。你需要让你的视图控制器遵循几个协议，以便完全实现你的 `UITableView`。添加 `UITableViewDelegate`\
  \ 和 `UITableViewDataSource` 协议，这样你的头文件现在看起来如下：\n\n```\n@interface MainTableViewController\
  \ : UIViewController <UITableViewDelegate, UITableViewDataSource>\n```\n\n接着，你需要一个类型为\
  \ `NSArray` 的属性，用于存储显示表格信息所需的数据，命名为 `countries`。确保正确合成该数组，并在 `-viewDidUnload` 方法中将其指针设为\
  \ `nil`。\n\n```\n@property (strong, nonatomic) NSMutableArray *countries;\n```\n\
  \n在继续实现你的视图控制器之前，你需要设置好模型来存储数据。\n\n像之前一样新建一个文件，但选择 \"Objective-C class\" 模板。将你的类命名为\
  \ `Country`，并确保它是 `NSObject` 的子类，如图 9-3 所示。\n\n![图片](img/9781430240051_Fig09-03.jpg)\n\
  \n**图 9-3.** 创建 `Country` 类作为 `NSObject` 的子类\n\n对于你的应用程序，你将让 `Country` 对象拥有四个属性：三个\
  \ `NSString` 分别表示国家名称、首都和格言，以及一个包含该国国旗的 `UIImage`。在 `Country.h` 头文件中按如下方式定义这些属性：\n\
  \n```\n@property (nonatomic, strong) NSString *name;\n@property (nonatomic, strong)\
  \ NSString *capital;\n@property (nonatomic, strong) NSString *motto;\n@property\
  \ (nonatomic, strong) UIImage *flag;\n```\n\n与你的视图控制器一样，你需要在实现文件中合成所有这些属性。但与视图控制器不同的是，你无需在任何方法中将它们设为\
  \ `nil`，因为没有 `-viewDidUnload` 方法。\n\n```\n@synthesize name, capital, motto, flag;\n\
  ```\n\n现在模型已设置好，你可以返回视图控制器了。编译器需要能够访问你刚刚创建的 `Country` 类的方法，因此在视图控制器的头文件中添加以下导入语句。\n\
  \n```\n#import \"Country.h\"\n```\n\n现在，你可以设置要在 `UITableView` 中使用的数据了。在继续之前，请确保你已下载了要添加的国家所使用的国旗图片文件。这里，我将使用美国、英格兰（而非英国）、苏格兰、法国和西班牙的国旗。我使用了一些来自维基百科的公共领域国旗图片，更多图片可在\
  \ [`http://en.wikipedia.org/wiki/Gallery_of_country_flags`](http://en.wikipedia.org/wiki/Gallery_of_country_flags)\
  \ 找到。\n\n**注意：** 在处理图片时，请务必留意所有版权问题。公共领域图片（例如此处来自维基百科的图片）可以免费使用，且容易找到。\n\n将所有文件下载到\
  \ Finder 中后，选中它们并全部拖入 Xcode 项目中 \"Supporting Files\" 文件夹下。将出现一个对话框，提供将文件添加到项目的选项。确保勾选了\
  \ \"Copy items into destination group's folder (if needed)\" 选项，如图 9-4 所示。\n\n![图片](img/9781430240051_Fig09-04.jpg)\n\
  \n**图 9-4.** 添加文件的对话框；确保第一个复选框已勾选。\n\n在你的 `-viewDidLoad` 方法中，通过添加以下代码，用我之前提到的五个国家创建测试数据：\n\
  \n```\nCountry *usa = [[Country alloc] init];\nusa.name = @\"United States of America\"\
  ;\nusa.motto = @\"E Pluribus Unum\";\nusa.capital = @\"Washington, D.C.\";\nusa.flag\
  \ = [UIImage imageNamed:@\"usa.png\"];\n\nCountry *france = [[Country alloc] init];\n\
  france.name = @\"French Republic\";\nfrance.motto = @\"Liberté, Égalité, Fraternité\"\
  ;\nfrance.capital = @\"Paris\";\nfrance.flag = [UIImage imageNamed:@\"france.png\"\
  ];\n\nCountry *england = [[Country alloc] init];\nengland.name = @\"England\";\n\
  england.motto = @\"Dieu et mon droit\";\nengland.capital = @\"London\";\nengland.flag\
  \ = [UIImage imageNamed:@\"england.png\"];\n\nCountry *scotland = [[Country alloc]\
  \ init];\nscotland.name = @\"Scotland\";\nscotland.motto = @\"In My Defens God Me\
  \ Defend\";\nscotland.capital = @\"Edinburgh\";\nscotland.flag = [UIImage imageNamed:@\"\
  scotland.png\"];\n\nCountry *spain = [[Country alloc] init];\nspain.name = @\"Kingdom\
  \ of Spain\";\nspain.motto = @\"Plus Ultra\";\nspain.capital = @\"Madrid\";\nspain.flag\
  \ = [UIImage imageNamed:@\"spain.png\"];\n```\n\n确保使用以下代码行将所有 `Country` 对象添加到你的数组中：\n\
  \n```\nself.countries = [NSMutableArray arrayWithObjects:usa, france, england, scotland,\
  \ spain, nil];\n```\n\n现在测试数据已全部设置完毕，接下来你将专注于通过使用 `delegate` 和 `data source` 方法来构建你的\
  \ `UITableView`。首先，在 `-viewDidLoad` 中使用以下代码行将这两个属性设置为你的视图控制器。\n\n\n\n`self.tableViewCountries.delegate\
  \ = self;`  \n`self.tableViewCountries.dataSource = self;`\n\n你也可以通过一条简单的命令为视图控制器设置标题，该标题将显示在导航栏顶部。\n\
  \n`self.title = @\"Countries\";`\n\n为了便于组织，`UITableView` 可以调用的所有方法分为两组：`delegate`\
  \ 方法和 `data source` 方法。`Delegate` 方法用于处理 `UITableView` 的任何视觉元素，例如单元格的行高。而 `data\
  \ source` 方法则处理 `UITableView` 中显示的信息，例如任意给定单元格信息的配置。\n\n为了正确创建一个无分组的 `UITableView`，你必须正确实现两个主要方法。\n\
  \n首先，你需要通过 `-tableView:numberOfRowsInSection:` 方法指定 `UITableView` 中要显示的行数。\n\n```\n\
  -(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
  {\n    return [self.countries count];\n}\n```\n\n由于你的表格是无分组的，只有一个分区，因此这个方法非常简单易用。\n\
  \n其次，你必须创建一个方法，通过 `-tableView:cellForRowAtIndexPath:` 方法指定 `UITableView` 的单元格如何配置。以下是该方法的通用实现，你可以根据数据进行修改。\n\
  \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if\
  \ (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\
  \ reuseIdentifier:CellIdentifier];\n        cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n\
  \        cell.textLabel.font = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font\
  \ = [UIFont systemFontOfSize:12];\n    }\n\n    cell.textLabel.text=[NSString stringWithFormat:@\"\
  Cell %i\", indexPath.row];\n\n    return cell;\n}\n```\n\n每当你处理 `UITableView` 时，“复用”单元格几乎总是一个好主意。由于大多数情况下，`UITableView`\
  \ 中并非所有单元格都同时显示在用户视野中，你可以通过 `UITableView` 方法 `-dequeueReusableCellWithIdentifier:`\
  \ 复用当前未显示的单元格，从而节省内存和时间，因为你只需在初始创建单元格时执行任何通用设置（如字体大小、背景颜色等）。\n\n在上面的示例中，你可以看到首先尝试出列一个可复用的单元格。如果没有可用的（即\
  \ `cell` 为 `nil`），则创建一个新单元格并为其进行通用设置，这些设置可以用于所有单元格。然后，无论单元格是出列还是新建的，你都将文本更新为适当的值。\n\
  \n你甚至可以通过 `CellIdentifier` 设置多个配置不同的单元格，并指定使用或复用哪一个。\n\n要让程序运行起来，最后需要做的是确保应用程序委托在程序启动时呈现你的视图控制器。Xcode\
  \ 没有自动完成这一步，因为你选择了空模板。\n\n在你的应用程序委托实现中，导入视图控制器的头文件，这样编译器就不会报错。\n\n```\n#import \"\
  MainTableViewController.h\"\n```\n\n你需要在应用程序委托的头文件中设置属性，以存储你的 `UINavigationController`\
  \ 和主视图控制器。请按如下方式创建：\n\n```\n@property (nonatomic, strong) UINavigationController\
  \ *navcon;\n@property (nonatomic, strong) MainTableViewController *tableVC;\n```\n\
  \n确保在应用程序委托的实现文件中使用以下代码对两者进行合成。\n\n```\n@synthesize navcon, tableVC;\n```\n\n\n\n\
  现在你只需要创建你的 `UINavigationController` 来显示和管理视图控制器，并将其视图添加为应用窗口的子视图。总的来说，你的 `-application:didFinishLaunchingWithOptions:`\
  \ 方法应该如下所示：\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    self.tableVC = [[MainTableViewController alloc] init];\n\
  \    self.navcon = [[UINavigationController alloc] initWithRootViewController:tableVC];\n\
  \    [self.window addSubview:navcon.view];\n    [self.window makeKeyAndVisible];\n\
  \    return YES;\n}\n```\n\n在模拟器中运行该项目时，你将看到一个包含一些通用信息的 `UITableView` 基本视图，如图 图\
  \ 9–5 所示。\n\n![图片](img/9781430240051_Fig09-05.jpg)\n\n**图 9–5.** *包含 `UITableView`\
  \ 的基本应用*\n\n现在你的应用已经启动并运行，并且显示了一些信息，你可以进行具体的实现了。\n\n要配置你的 `-tableView:cellForRowAtIndexPath:`\
  \ 方法，使其正确适配你的数据，首先需要更改行的显示样式。修改方法中的分配/初始化行，使其如下所示：\n\n```\ncell = [[UITableViewCell\
  \ alloc] initWithStyle:UITableViewCellStyleSubtitle\nreuseIdentifier:CellIdentifier];\n\
  ```\n\n有四种不同的 `UITableViewCell` 样式可供使用，每种样式的显示略有不同：\n\n* `UITableViewCellStyleDefault`：仅有一个标签，如图\
  \ 图 9–5 所示\n* `UITableViewCellStyleSubtitle`：与 Default 样式类似，但在主文本下方多了一个副标题行\n* `UITableViewCellStyleValue1`：两行文本，主文本位于单元格左侧，次要详细文本标签位于右侧\n\
  * `UITableViewCellStyleValue2`：两行文本，重点在详细文本标签上\n\n在这四种样式中，只有 `UITableViewCellStyleDefault`\
  \ 样式只有一行文本。\n\n接下来，你可以将单元格的文本标签设置为国家名称，而不是简单的单元格计数。将方法中最后设置 `cell.textLabel.text`\
  \ 属性的部分调整为以下内容：\n\n```\n    cell.textLabel.text = [(Country *)[self.countries objectAtIndex:indexPath.row]\n\
  name];\n```\n\n这里你只需要获取对应的 `Country` 对象，并调用其通过属性合成生成的 `-name` 方法即可。\n\n你可以使用单元格的\
  \ `detailTextLabel` 属性，以非常类似的方式设置副标题。\n\n```\n    cell.detailTextLabel.text = [(Country\
  \ *)[self.countries objectAtIndex:indexPath.row]\ncapital];\n```\n\n`UITableViewCell`\
  \ 类还有一个名为 `imageView` 的属性，当为其设置图片时，该图片会显示在标题标签的左侧。通过在单元格配置中添加以下代码行来实现：\n\n```\n\
  \    cell.imageView.image = [(Country *)[self.countries objectAtIndex:indexPath.row]\n\
  flag];\n```\n\n你可能会注意到，如果现在运行程序，所有旗帜都会显示，但宽高比差异很大，这会让视图看起来不够专业。设置单元格 `imageView`\
  \ 的 frame 无法解决这个问题，这里提供一个快速的解决方案。\n\n首先，定义一个方法，将 `UIImage` 重绘为指定大小，如下所示：\n\n```\n\
  + (UIImage *)scale:(UIImage *)image toSize:(CGSize)size\n{\n    UIGraphicsBeginImageContext(size);\n\
  \    [image drawInRect:CGRectMake(0, 0, size.width, size.height)];\n    UIImage\
  \ *scaledImage = UIGraphicsGetImageFromCurrentImageContext();\n    UIGraphicsEndImageContext();\n\
  \    return scaledImage;\n}\n```\n\n将该方法的声明放入头文件中，以避免潜在的编译器问题。该声明编写如下：\n\n```\n\
  + (UIImage *)scale:(UIImage *)image toSize:(CGSize)size;\n```\n\n然后，你可以调整设置 `image`\
  \ 的代码行来使用该方法。\n\n```\nUIImage *flag = [(Country *)[self.countries objectAtIndex:indexPath.row]\
  \ flag];\ncell.imageView.image = [MainTableViewController scale:flag toSize:CGSizeMake(115,\
  \ 75)];\n```\n\n完成所有这些配置后，你新配置的 `-tableView:cellForRowAtIndexPath:` 方法应如下所示：\n\n\
  ```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if\
  \ (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\
  \ reuseIdentifier:CellIdentifier];\n        cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n\
  \        cell.textLabel.font = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font\
  \ = [UIFont systemFontOfSize:12];\n    }\n\n    cell.textLabel.text = [(Country\
  \ *)[self.countries objectAtIndex:indexPath.row] name];\n    cell.detailTextLabel.text\
  \ = [(Country *)[self.countries objectAtIndex:indexPath.row] capital];\n\n    UIImage\
  \ *flag = [(Country *)[self.countries objectAtIndex:indexPath.row] flag];\n    cell.imageView.image\
  \ = [MainTableViewController scale:flag toSize:CGSizeMake(115, 75)];\n\n    return\
  \ cell;\n}\n```\n\n如果运行你的最终应用，它应该看起来像 图 9–6，展示着国家信息和旗帜图片！\n\n![图片](img/9781430240051_Fig09-06.jpg)\n\
  \n**图 9–6.** *填充了国家信息的表格*\n\n\n\n#### 关于圆角的小提示\n\n每当你查看任何制作精良的 iOS 应用时，很可能会注意到几乎每个元素都有圆角。这是大多数人不会注意到的细节之一，但它能显著提升应用的视觉质量，而且通过两步操作就能相当简单地实现。\n\
  \n首先，将下面这行导入语句添加到视图控制器的头文件中：\n\n```\n#import <QuartzCore/QuartzCore.h>\n```\n\n\
  完成之后，你就可以访问任何继承自 `UIView` 的类的 `layer` 属性，该属性有一个可设置的 `cornerRadius`。下面我们将通过在你的 `-viewDidLoad`\
  \ 方法中添加以下这行代码，来为 `UITableView` 设置圆角，使你的应用看起来如同图 9–7 所示。\n\n```\nself.tableViewCountries.layer.cornerRadius\
  \ = 8.0;\n```\n![图片](img/9781430240051_Fig09-07.jpg)\n\n**图 9–7.** *你的已设置新圆角的 `UITableView`*\n\
  \n现在你已经建立了一个包含五个国家、外观漂亮的表格，可以进一步扩展 `UITableView` 的基本功能了。首先，我们将专注于 `UITableView`\
  \ 最直接的功能：响应特定行的选中操作。\n\n为了完成本教程的目标，你将这样构建应用：当选中某一行时，会显示一个独立的视图控制器，展示所选国家的所有已知信息。\n\
  \n首先，创建一个新文件，和之前一样选择“UIViewController subclass”模板，并将其命名为“CountryInfoViewController”。\n\
  \n通过组合使用 `UILabel`、`UITextField` 和 `UIImageView`，在该控制器的 XIB 文件中构建一个如图 9–8 所示的视图。我通过属性检查器为“Country\
  \ Title”的 `UILabel` 添加了细微的阴影，如图 9–8 所示。虽然这不是必须的，但它显著提升了布局的视觉设计效果。\n\n![图片](img/9781430240051_Fig09-08.jpg)\n\
  \n**图 9–8.** *`CountryInfoViewController` 的 XIB 文件与配置*\n\n将每个 `UITextField`、`UIImageView`\
  \ 以及顶部的“Country Name”`UILabel` 分别连接到你的视图控制器，对应的属性名称如下：\n\n- `nameLabel`\n- `textFieldCapital`\n\
  - `textFieldMotto`\n- `imageViewFlag`\n\n切换到新视图控制器的头文件后，添加 `UITextFieldDelegate`\
  \ 协议，因为你需要能够控制 `UITextField` 的行为。\n\n为了使视图控制器尽可能通用，你需要为其添加一个 `Country` 类的属性，用于保存当前显示的数据。这样，你可以简单地用必要的数据填充视图，如果需要，甚至可以轻松更换不同的数据而无需更改视图。添加导入\
  \ `Country` 类的语句。\n\n```\n#import \"Country.h\"\n```\n\n按如下方式创建 `Country` 属性，然后确保在实现文件中使用\
  \ `@synthesize` 并在 `-viewDidUnload` 中将其设置为 `nil`。\n\n```\n@property (strong, nonatomic)\
  \ Country *currentCountry;\n```\n\n稍后你将为这个 `CountryInfoViewController` 实现一个可调用的委托方法，因此在头文件声明之前添加以下类和协议声明来创建一个协议。\n\
  \n```\n@class CountryInfoViewController;\n\n@protocol CountryInfoDelegate <NSObject>\n\
  -(void)countryInfoViewControllerDidFinish:(CountryInfoViewController *)countryVC;\n\
  @end\n```\n\n现在，为你的 `CountryInfoViewController` 添加一个 `delegate` 属性，并确保它必须遵循你刚创建的协议。和其他属性一样，别忘了使用\
  \ `@synthesize` 并在卸载时将其置空。\n\n```\n@property (strong, nonatomic) id <CountryInfoDelegate>\
  \ delegate;\n```\n\n完整来看，你的头文件应该类似于以下代码。\n\n\n\n```objc\n#import <UIKit/UIKit.h>\n\
  #import \"Country.h\"\n\n@class CountryInfoViewController;\n@protocol CountryInfoDelegate\
  \ <NSObject>\n\n-(void)countryInfoViewControllerDidFinish:(CountryInfoViewController\
  \ *)countryVC;\n\n@end\n\n@interface CountryInfoViewController : UIViewController\
  \ <UITextFieldDelegate>\n\n@property (strong, nonatomic) IBOutlet UILabel *nameLabel;\n\
  @property (strong, nonatomic) IBOutlet UIImageView *imageViewFlag;\n@property (strong,\
  \ nonatomic) IBOutlet UITextField *textFieldCapital;\n@property (strong, nonatomic)\
  \ IBOutlet UITextField *textFieldMotto;\n\n@property (strong, nonatomic) Country\
  \ *currentCountry;\n@property (strong, nonatomic) id <CountryInfoDelegate> delegate;\n\
  \n@end\n```\n\n现在，在`CountryInfoViewController`的实现文件中，创建一个填充视图的方法。\n\n```objc\n-(void)populateViewWithCountry:(Country\
  \ *)country\n{\n    self.currentCountry = country;\n\n    self.imageViewFlag.image\
  \ = country.flag;\n    self.nameLabel.text = country.name;\n    self.textFieldCapital.text\
  \ = country.capital;\n    self.textFieldMotto.text = country.motto;\n}\n```\n\n\
  你希望这个方法在视图加载之后、显示之前被调用，因此需要像这样实现`-viewWillAppear:animated:`方法：\n\n```objc\n-(void)viewWillAppear:(BOOL)animated\n\
  {\n    [self populateViewWithCountry:self.currentCountry];\n}\n```\n\n为了能在编辑`UITextField`后关闭键盘，你需要实现`-textFieldShouldReturn:`委托方法。\n\
  \n```objc\n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n{\n    [textField\
  \ resignFirstResponder];\n    return NO;\n}\n```\n\n在`-viewDidLoad`方法中，通过将两个`UITextField`的委托设置为视图控制器，来配置它们。\n\
  \n```objc\nself.textFieldMotto.delegate = self;\nself.textFieldCapital.delegate\
  \ = self;\n```\n\n由于允许用户修改数据，你应该添加一个“Revert”（还原）按钮，以便在数据被覆盖前恢复到原始数据。通过在`-viewDidLoad`方法中添加以下代码，可以将该按钮添加到导航栏右侧。\n\
  \n```objc\nUIBarButtonItem *revertButton = [[UIBarButtonItem alloc] initWithTitle:@\"\
  Revert\"\nstyle:UIBarButtonItemStyleBordered target:self action:@selector(revert)];\n\
  \nself.navigationItem.rightBarButtonItems = [NSArray arrayWithObject:revertButton];\n\
  ```\n\n> **注意：** `UINavigationItem`类的`rightBarButtonItems`属性是 iOS 5 中新增的功能。它允许用户在`UINavigationBar`右侧设置多个对象。这在之前的\
  \ iOS 版本中也可以实现，但稍微困难一些，因为它需要一个由`UIToolbar`包含所需项目所构成的、自定义视图的`UIBarButtonItem`。\n\n\
  你完整的`-viewDidLoad`方法应该如下所示：\n\n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \n    self.textFieldMotto.delegate = self;\n    self.textFieldCapital.delegate =\
  \ self;\n\n    UIBarButtonItem *revertButton = [[UIBarButtonItem alloc] initWithTitle:@\"\
  Revert\"\nstyle:UIBarButtonItemStyleBordered target:self action:@selector(revert)];\n\
  \    self.navigationItem.rightBarButtonItems = [NSArray arrayWithObject:revertButton];\n\
  }\n```\n\n你为`revertButton`指定的选择器“revert”很容易实现：\n\n```objc\n-(void)revert\n{\n  \
  \  [self populateViewWithCountry:self.currentCountry];\n}\n```\n\n最后需要做的是，在返回`MainTableViewController`时，实现对给定`Country`对象所做的任何更改进行保存的功能。你将通过实现`-viewWillDisappear:animated:`方法来完成此操作。\n\
  \n```objc\n-(void)viewWillDisappear:(BOOL)animated\n{\n    self.currentCountry.capital\
  \ = self.textFieldCapital.text;\n    self.currentCountry.motto = self.textFieldMotto.text;\n\
  \    [self.delegate countryInfoViewControllerDidFinish:self];\n}\n```\n\n切换回`MainTableViewController`的头文件，并将你创建的`CountryInfoDelegate`协议添加到头文件中。你需要先导入你创建的类。\n\
  \n```objc\n#import \"CountryInfoViewController.h\"\n```\n\n为了更方便地实现`CountryInfoViewController`的委托方法，你需要创建一个实例变量来引用所选行的索引路径，这样只需刷新那一行即可节省处理资源。添加类型为`NSIndexPath`、名为`selectedIndexPath`的变量后，你的头文件现在应该如下所示：\n\
  \n```objc\n#import <UIKit/UIKit.h>\n#import <QuartzCore/QuartzCore.h>\n#import \"\
  Country.h\"\n#import \"CountryInfoViewController.h\"\n\n@interface MainTableViewController\
  \ : UIViewController <UITableViewDelegate, UITableViewDataSource, CountryInfoDelegate>{\n\
  \    NSIndexPath *selectedIndexPath;\n}\n\n@property (strong, nonatomic) IBOutlet\
  \ UITableView *tableViewCountries;\n@property (strong, nonatomic) NSMutableArray\
  \ *countries;\n\n@end\n```\n\n现在你可以像这样实现`CountryInfoViewController`的委托方法：\n\n```objc\n\
  -(void)countryInfoViewControllerDidFinish:(CountryInfoViewController *)countryVC\n\
  {\n    if (selectedIndexPath)\n    {\n        [tableViewCountries beginUpdates];\n\
  \        [self.tableViewCountries reloadRowsAtIndexPaths:[NSArray arrayWithObject:selectedIndexPath]\
  \ withRowAnimation:UITableViewRowAnimationNone];\n        [tableViewCountries endUpdates];\n\
  \    }\n    selectedIndexPath = nil;\n}\n```\n\n`-beginUpdates`和`-endUpdates`方法虽然在此处并非必要，但在`UITableView`中重新加载数据时非常有用，因为它们指定了其间对重新加载数据的任何调用都应带有动画效果。由于你的所有数据重新加载都发生在`UITableView`处于屏幕外时，所以这不是必需的，但也不会对应用程序造成损害。\n\
  \n最后，为了实际响应`UITableView`中某一行的选中操作，你只需要实现`UITableView`的委托方法`-tableView:didSelectRowAtIndexPath:`即可。\n\
  \n```objc\n-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    [tableView deselectRowAtIndexPath:indexPath animated:YES];\n\
  \n    selectedIndexPath = indexPath;\n\n    Country *chosenCountry = [self.countries\
  \ objectAtIndex:indexPath.row];\n    CountryInfoViewController *infoVC = [[CountryInfoViewController\
  \ alloc] init];\n    infoVC.delegate = self;\n    infoVC.currentCountry = chosenCountry;\n\
  \n    [self.navigationController pushViewController:infoVC animated:YES];\n}\n```\n\
  \n`UITableView`类还有其他多个用于处理选中或取消选中行的方法，包括`-tableView:willSelectRowAtIndexPath:`（在其对应的`-tableView:didSelectRowAtIndexPath:`之前调用），以及`-tableView:willDeselectRowAtIndexPath:`和`-tableView:didDeselectRowAtIndexPath:`。通过使用这四个委托方法，你可以完全自定义`UITableView`的行为以适配任何应用程序。\n\
  \n现在运行此项目，你将能够查看和编辑国家信息，如图 9–9 所示。\n\n![Image](img/9781430240051_Fig09-09.jpg)\n\
  \n**图 9–9.** *`CountryInfoViewController`的最终显示效果*\n\n\n\n#### 增强的用户交互\n\n当你处理以 `UITableView`\
  \ 为核心的应用程序时，通常可能希望允许用户从同一个表格中访问多个不同的视图。例如，iPhone 上的“电话”应用有一个“语音留言”标签页，其中显示一个包含各种语音留言的\
  \ `UITableView`。用户既可以通过选择表格中的某一行来播放语音留言，也可以通过选择行右侧的一个较小的蓝色按钮，来查看原始呼叫者的联系信息。你可以通过实现另一个\
  \ `UITableView` 委托方法来实现类似的行为。\n\n首先，你必须更改 `UITableView` 中单元格的“附件”类型。这指的是任何给定行最右侧显示的图标。在你的\
  \ `-tableView:cellForRowAtIndexPath:` 方法中，找到下面这行代码：\n\n```\n        cell.accessoryType\
  \ = UITableViewCellAccessoryDisclosureIndicator;\n```\n\n将此值更改为 `UITableViewCellAccessoryDetailDisclosureButton`。这将为我们提供那个漂亮的、可以响应触摸的小蓝色按钮。此属性可能的四个值如下所示：\n\
  \n- `UITableViewCellAccessoryNone`：表示没有附件\n- `UITableViewCellAccessoryDisclosureIndicator`：在行的右侧添加一个灰色箭头，就像你一直使用的那样\n\
  - `UITableViewCellAccessoryDetailDisclosureButton`：你刚刚选择的值，指定了一个可交互的按钮\n- `UITableViewCellAccessoryCheckmark`：在特定行添加一个勾选标记；这在结合\
  \ `-tableView:didSelectRowAtIndexPath:` 方法、根据需要从列表中添加或移除勾选标记时特别有用\n\n**注意：** 虽然这四种可用的附件类型非常有用，并且几乎可以覆盖所有通用场景，但肯定很容易想到需要在你行的右侧放置完全不同内容的情况。你可以通过\
  \ `accessoryView` 属性轻松地将 `UITableViewCell` 的附件自定义为任何其他 `UIView` 的子类。\n\n现在你已经将附件变成了一个按钮，实际上，实现一个处理此交互的动作非常容易。你只需实现另一个\
  \ `UITableView` 委托方法：`-tableView:accessoryButtonTappedForRowWithIndexPath:`。为了测试目的，我们将让这个动作与行选择动作完全相同，只是额外添加一个\
  \ `NSLog()`，不过你应该很容易看到如何实现不同的行为。\n\n```\n-(void)tableView:(UITableView *)tableView\
  \ accessoryButtonTappedForRowWithIndexPath:(NSIndexPath *)indexPath\n{\n    [tableView\
  \ deselectRowAtIndexPath:indexPath animated:YES];\n\n    selectedIndexPath = indexPath;\n\
  \n    Country *chosenCountry = [self.countries objectAtIndex:indexPath.row];\n \
  \   CountryInfoViewController *infoVC = [[CountryInfoViewController alloc] init];\n\
  \    infoVC.delegate = self;\n    infoVC.currentCountry = chosenCountry;\n\n   \
  \ NSLog(@\"Accessory Button Tapped\");\n    [self.navigationController pushViewController:infoVC\
  \ animated:YES];\n}\n```\n\n当你运行此应用时，点击附件按钮即可运行你的最新功能，如图 9–10 所示。\n\n![图片](img/9781430240051_Fig09-10.jpg)\n\
  \n**图 9–10.** *你的带有详细信息公开按钮的 `UITableView` 响应事件*\n\n#### 关于单元格视图自定义的说明\n\n与附件视图一样，`UITableViewCell`\
  \ 的其它几个部分也可以通过其视图进行自定义。`UITableViewCell` 类包含几个你可以编辑的其他视图的属性，包括以下内容：\n\n- `imageView`：单元格中位于\
  \ `textLabel` 左侧的 `UIImageView`，如之前示例中的国旗所示；如果没有给此视图提供图像，单元格将表现得像 `UIImageView`\
  \ 不存在一样（而不是一个占用空间的空白 `UIImageView`）。\n- `contentView`：`UITableViewCell` 的主要 `UIView`，包含所有文本；你可能希望自定义此视图以实现功能更强大或更通用的\
  \ `UITableViewCell`。\n- `backgroundView`：在平铺风格表格中设置为 `nil` 的 `UIView`（就像你目前使用的那样），而在分组表格中则不然；此视图将出现在表格中所有其他视图的背后，因此非常适合专门自定义单元格的视觉显示。\n\
  - `selectedBackgroundView`：当单元格被选中时，此 `UIView` 会插入到 `backgroundView` 之上、但位于所有其他视图之下。它也可以借助\
  \ `-setSelected:animated:` 操作轻松实现 alpha 动画（淡入或淡出）。\n- `multipleSelectionBackgroundView`：此\
  \ `UIView` 的行为与 `selectedBackgroundView` 类似，但在 `UITableView` 允许选择多行时使用。\n- `accessoryView`：如前所述，这允许你为行的附件创建完全不同的视图，因此你可以在预设值之外实现自己的自定义显示和行为。\n\
  - `editingAccessoryView`：这与 `accessoryView` 属性类似，但专门用于 `UITableView` 处于“编辑”模式时，你很快会详细看到这一点。\n\
  \n虽然大多数开发者坚持使用相当通用的 `UITableView`，因为它与 iOS 设计主题非常契合，但如果你留意一下，可以找到一些非常有创意的自定义视图实现。所有这些额外的自定义可能会为你的项目增加大量开发时间，但一个高质量、自定义的\
  \ `UITableView` 肯定会因其独特性而在应用中脱颖而出。\n\n\n\n### 技巧 9–2：编辑 `UITableView`\n\n如果你观察一下常用应用（比如设备上的音乐播放器）中的任何一个\
  \ `UITableView`，你很可能会发现可以以某种方式编辑表格。在音乐应用中，你可以滑动某一行来显示删除按钮，然后从表格中移除条目。在邮件应用中，你可以点击右上角的编辑按钮，以便选择多条消息进行删除、移动或其他操作。这两种功能都基于“编辑”`UITableView`\
  \ 的概念。\n\n首先要考虑的是将 `UITableView` 置于“编辑”模式，因为用户需要使用你的编辑功能，就必须能够访问它。你可以在视图的右上角添加一个编辑按钮来实现这一点。令人惊讶的是，这非常简单，只需在\
  \ `-viewDidLoad` 方法中添加以下代码行即可。\n\n`self.navigationItem.rightBarButtonItem = self.editButtonItem;`\n\
  \n这个 `editButtonItem` 属性实际上并不是你需要定义的属性，因为它对每个 `UIViewController` 子类都是预置的。这个按钮特别棒的地方在于，它不仅已经编程为会自动调用一个特定方法，还能在“编辑”和“完成”之间切换文本。\n\
  \n默认情况下，`editButtonItem` 被设置为调用 `-setEditing:animated:` 方法，你可以为其创建一个简单的实现：\n\n```\n\
  -(void)setEditing:(BOOL)editing animated:(BOOL)animated\n{\n    [super setEditing:editing\
  \ animated:animated];\n    [self.tableViewCountries setEditing:editing animated:animated];\n\
  }\n```\n\n这个方法的主要思路很简单：首先调用 `super` 方法，它会处理按钮文本的切换，然后根据给定的参数设置 `UITableView` 的编辑模式。\n\
  \n此时，应用中的编辑按钮将触发 `UITableView` 的编辑模式，从而允许显示任意行的删除按钮。但是，由于你实际上还没有为这些按钮实现任何行为，因此你还无法从表格中删除任何行。为此，你必须先实现另一个委托方法\
  \ `-tableView:commitEditingStyle:forRowAtIndexPath:`。\n\n以下是你将采用的此方法的一个基本实现：\n\n\
  ```\n-(void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\
  \ forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
  \    {\n        Country *deletedCountry = [self.countries objectAtIndex:indexPath.row];\n\
  \        [self.countries removeObject:deletedCountry];\n\n        [tableViewCountries\
  \ deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath] withRowAnimation:UITableViewRowAnimationAutomatic];\n\
  \    }\n}\n```\n\n在这个方法中，*非常*重要的是，在从 `UITableView` 中删除行之前，务必先从模型中删除实际的数据元素，就像之前的示例中先删除数组中的国家，然后再删除其行一样。否则，你的应用将抛出异常。\n\
  \n现在运行你的应用，你可以点击编辑按钮将 `UITableView` 置于编辑模式，如图所示图 9–11。\n\n![图片](img/9781430240051_Fig09-11.jpg)\n\
  \n**图 9–11.** *处于编辑模式并具备删除行功能的 `UITableView`*\n\n#### `UITableView` 行动画\n\n在你刚刚添加的方法中，你指定了一种特定的动画类型，用于在删除行时执行，即\
  \ `UITableViewRowAnimationAutomatic`。接受此值的参数还有其他各种预置值，你可以用它们自定义行的视觉行为，包括：\n\n* \
  \  `UITableViewRowAnimationBottom`\n*   `UITableViewRowAnimationFade`\n*   `UITableViewRowAnimationLeft`\n\
  *   `UITableViewRowAnimationMiddle`\n*   `UITableViewRowAnimationNone`\n*   `UITableViewRowAnimationRight`\n\
  *   `UITableViewRowAnimationTop`\n\n你选择的动画类型不会对应用性能产生显著影响，但确实可以改变应用在最终用户眼中的外观和体验。最好多尝试这些动画，看看哪种在你的应用中看起来效果最佳。\n\
  \n此时，你的方法应该已经能够处理从表格中删除行的操作了！由于你编写的程序会在每次应用运行时重新创建数据，因此测试这一点应该相当容易。当你即将从表格中删除一行时，你的表格将如图所示图\
  \ 9–12。\n\n![图片](img/9781430240051_Fig09-12.jpg)\n\n**图 9–12.** *从表格中删除一行*\n\n\n\
  \n#### 但等等，还有更多！\n\n删除并不是`UITableView`中唯一可进行的编辑操作。尽管使用频率没那么高，但 iOS 包含了与删除相同的方法来创建和插入行的功能。\n\
  \n`UITableView`中任何一行的默认编辑样式是`UITableViewCellEditingStyleDelete`，因此要实现行的插入，你需要修改这一设置。为了增加趣味性，你可以通过实现`-tableView:editingStyleForRowAtIndexPath:`方法，让每隔一行拥有“插入”编辑样式。\n\
  \n```\n-(UITableViewCellEditingStyle)tableView:(UITableView *)tableView editingStyleForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    if ((indexPath.row % 2) == 1)\n    {\n        return UITableViewCellEditingStyleInsert;\n\
  \    }\n    return UITableViewCellEditingStyleDelete;\n}\n```\n\n和之前一样，你需要指定点击插入按钮时的行为。你将在`-tableView:commitEditingStyle:forRowAtIndexPath:`方法中添加一个分支，现在该方法看起来是这样的：\n\
  \n```\n-(void)tableView:(UITableView *)tableView\ncommitEditingStyle:(UITableViewCellEditingStyle)editingStyle\n\
  forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
  \    {\n        Country *deletedCountry = [self.countries objectAtIndex:indexPath.row];\n\
  \        [self.countries removeObject:deletedCountry];\n\n        [tableViewCountries\
  \ deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\nwithRowAnimation:UITableViewRowAnimationAutomatic];\n\
  \    }\n    else if (editingStyle == UITableViewCellEditingStyleInsert)\n    {\n\
  \        Country *copiedCountry = [self.countries objectAtIndex:indexPath.row];\n\
  \        Country *newCountry = [[Country alloc] init];\n        newCountry.name\
  \ = copiedCountry.name;\n        newCountry.flag = copiedCountry.flag;\n       \
  \ newCountry.capital = copiedCountry.capital;\n        newCountry.motto = copiedCountry.motto;\n\
  \n        [self.countries insertObject:newCountry atIndex:indexPath.row+1];\n\n\
  \        [self.tableViewCountries insertRowsAtIndexPaths:[NSArray arrayWithObject:[NSIndexPath\
  \ indexPathForRow:indexPath.row+1 inSection:indexPath.section]] withRowAnimation:UITableViewRowAnimationRight];\n\
  \    }\n}\n```\n\n你可以看到，我们采用了一种相当简单的插入实现方式，即只是复制了所选行。需要注意的是，通过修改此方法中的索引值，你可以轻松地将对象插入到表格中的几乎任何行；并非必须只插入到紧随其后的行。\n\
  \n与删除操作一样，你必须确保在更新表格视图之前先更新数据模型，因此在向`UITableView`插入新行之前，你已将新的`Country`对象添加到了数组中。\n\
  \n运行应用并编辑表格时，你将能够同时看到删除和插入按钮，如图 9-13 所示。\n\n![Image](img/9781430240051_Fig09-13.jpg)\n\
  \n**图 9-13.** *编辑带有插入或删除功能的`UITableView`*\n\n另外还有两个`UITableView`的委托方法可以与编辑功能结合使用，以进一步自定义应用的行为。\n\
  \n- `-tableView:willBeginEditingRowAtIndexPath:` 方法允许你“预览”被选中进行编辑的行，并据此采取相应操作。\n\
  - `-tableView:didEndEditingRowAtIndexPath:` 方法可以作为完成块使用，你可以在其中指定任何你认为必要的、在行编辑完成后需要执行的操作。\n\
  \n### 食谱 9–3：对 UITableView 进行重新排序\n\n现在我们已经讨论了行的删除和插入，表格功能的下一步逻辑自然就是让行能够移动。鉴于我们已经设置好了应用，实现这一功能其实相当简单。\n\
  \n首先，你必须使用`-tableView:canMoveRowAtIndexPath:` 方法精确指定哪些行允许移动。\n\n```\n-(BOOL)tableView:(UITableView\
  \ *)tableView canMoveRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    return YES;\n\
  }\n```\n\n我选择了最简单的方式，即让所有行都可移动，但你可以根据应用需求轻松更改这一设置。\n\n现在，你只需要实现一个委托，在行成功移动后更新数据模型。\n\
  \n```\n-(void)tableView:(UITableView *)tableView moveRowAtIndexPath:(NSIndexPath\
  \ *)sourceIndexPath toIndexPath:(NSIndexPath *)destinationIndexPath\n{\n    [self.countries\
  \ exchangeObjectAtIndex:sourceIndexPath.row withObjectAtIndex:destinationIndexPath.row];\n\
  \    [self.tableViewCountries reloadData];\n}\n```\n\n与插入操作一样，你必须确保更新数组以匹配重新排序，而`UITableView`会自动处理行的实际交换。\n\
  \n为了对表格的重新排序进行额外控制，你可以实现一个额外的方法，名为`-tableView:targetIndexPathForMoveFromRowAtIndexPath:`。每当一个单元格被拖到另一个单元格上方作为可能的移动目标时，就会调用这个委托方法，其常规用途是“重新定位”目标行。通过这种方式，你可以检查建议的目标位置，并确认或拒绝建议的移动，然后返回一个不同的目标位置。\n\
  \n尽管你尚未实现确认或拒绝建议移动的功能，但你的应用现在除了之前具备的删除和复制功能外，已经能够成功移动和重新排序行，如图 9-14 所示。\n\n![Image](img/9781430240051_Fig09-14.jpg)\n\
  \n**图 9-14.** *你的表格进行了一些单元格的重新排序*\n\n\n\n### 技巧 9–4：创建分组 UITableView\n\n现在你几乎已经完全掌握了使用未分组\
  \ `UITableView` 的所有基础知识，接下来可以调整应用程序，采用“分组”方式。你在未分组表格中实现的所有功能同样适用于分组表格，因此你无需进行大量修改即可实现这一目标。\n\
  \n要使用分组表格，首先需要将 `UITableView` 的“样式”从“Plain”切换为“Grouped”。最简单的方法是在视图控制器的 XIB 文件中选中\
  \ `UITableView`，然后在属性检查器中更改样式，结果将显示为类似图 9–15 的效果。\n\n![Image](img/9781430240051_Fig09-15.jpg)\n\
  \n**图 9–15.** *配置“分组”`UITableView`*\n\n你所需的具体选项位于属性检查器顶部，在“Table View”的“Style”下，如下方图\
  \ 9–16 所示。\n\n![Image](img/9781430240051_Fig09-16.jpg)\n\n**图 9–16.** *修改表格的“Style”以创建分组\
  \ `UITableView`*\n\n虽然这是更改表格样式的唯一必要操作，但问题在于到目前为止，你的数据模型是为未分组样式设计的，甚至根本没有对数据进行分组。为了解决这个问题，你需要改变数据的存储组织方式。\n\
  \n你不再使用一个包含全部五个国家的数组，而是将国家分为若干组，每组作为一个 `NSMutableArray`，然后将这些数组放入一个更大的 `NSMutableArray`\
  \ 中。（虽然更好的做法是使用不可变数组，但我选择了可变版本，以便从表格中编辑数据模型时更简单。）\n\n对于你的应用程序，你将把五个 `Country` 对象分为两类：一类是英国（United\
  \ Kingdom）的国家，另一类是其他所有国家。\n\n首先，你需要创建两个额外的 `NSMutableArray` 作为子数组，因此添加这两个属性，并确保在实现文件中正确处理它们（使用\
  \ `@synthesize`！）。最终你将拥有三个 `NSMutableArray` 属性。\n\n```\n@property (strong, nonatomic)\
  \ NSMutableArray *countries;\n@property (strong, nonatomic) NSMutableArray *unitedKingdomCountries;\n\
  @property (strong, nonatomic) NSMutableArray *nonUKCountries;\n```\n\n现在，你需要修改 `-viewDidLoad`\
  \ 方法以适应这一变化。从该方法中删除以下代码行：\n\n```\n    self.countries = [NSMutableArray arrayWithObjects:usa,\
  \ france, england, scotland, spain, nil];\n```\n\n然后将该行替换为以下代码，以正确组织你的国家：\n\n```\n\
      self.unitedKingdomCountries = [NSMutableArray arrayWithObjects:england, scotland,\
  \ nil];\n    self.nonUKCountries = [NSMutableArray arrayWithObjects:usa, france,\
  \ spain, nil];\n    self.countries = [NSMutableArray arrayWithObjects:unitedKingdomCountries,\
  \ nonUKCountries, nil];\n```\n\n现在进入稍微棘手的部分：你需要确保所有数据源和委托方法都调整为新格式。在每个方法中，你必须先获取分组的数组，然后再从中获取特定的国家。首先，修改\
  \ `-tableView:cellForRowAtIndexPath:`。修改后应如下所示：\n\n```\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n\nstatic NSString\
  \ *CellIdentifier = @\"Cell\";\n\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
      if (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\
  \ reuseIdentifier:CellIdentifier];\n        cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n\
  cell.textLabel.font = [UIFont systemFontOfSize: 19.0];\ncell.detailTextLabel.font\
  \ = [UIFont systemFontOfSize: 12];\n    }\n\n    NSArray *group = [self.countries\
  \ objectAtIndex:indexPath.section];\n    Country *country = [group objectAtIndex:indexPath.row];\n\
      cell.textLabel.text = country.name;\n    cell.detailTextLabel.text = country.capital;\n\
      UIImage *flag = country.flag;\ncell.imageView.image = [MainTableViewController\
  \ scale:flag toSize:CGSizeMake( 115, 75)];\n\n    return cell;\n}\n```\n\n接下来是 `-tableView:numberOfRowsInSection:`：\n\
  \n```\n-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
  {\n    NSArray *group = [self.countries objectAtIndex:section];\n    return [group\
  \ count];\n}\n```\n\n以下是 `-tableView:didSelectRowAtIndexPath:`：\n\n```\n-(void)tableView:(UITableView\
  \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    [tableView\
  \ deselectRowAtIndexPath:indexPath animated:YES];\n\n    selectedIndexPath = indexPath;\n\
      /////BEGIN MODIFIED CODE FOR GROUPED TABLE\n    NSArray *group = [self.countries\
  \ objectAtIndex:indexPath.section];\n    Country *chosenCountry = [group objectAtIndex:indexPath.row];\n\
      /////END OF MODIFIED CODE\n    CountryInfoViewController *infoVC = [[CountryInfoViewController\
  \ alloc] init];\n    infoVC.delegate = self;\n    infoVC.currentCountry = chosenCountry;\n\
  \n    [self.navigationController pushViewController:infoVC animated:YES];\n}\n```\n\
  \n以下是 `-tableView:accessoryButtonTappedForRowWithIndexPath:`：\n\n```\n-(void)tableView:(UITableView\
  \ *)tableView\naccessoryButtonTappedForRowWithIndexPath:(NSIndexPath *)indexPath\n\
  {\n    [tableView deselectRowAtIndexPath:indexPath animated:YES];\n\n    selectedIndexPath\
  \ = indexPath;\n    ////BEGIN MODIFIED CODE FOR GROUPED TABLE\n    NSArray *group\
  \ = [self.countries objectAtIndex:indexPath.section];\n    Country *chosenCountry\
  \ = [group objectAtIndex:indexPath.row];\n    ////END MODIFIED CODE FOR GROUPED\
  \ TABLE\n    CountryInfoViewController *infoVC = [[CountryInfoViewController alloc]\
  \ init];\n    infoVC.delegate = self;\n    infoVC.currentCountry = chosenCountry;\n\
  \n    NSLog(@\"Accessory Button Tapped\");\n    [self.navigationController pushViewController:infoVC\
  \ animated:YES];\n}\n```\n\n对于 `-tableView:moveRowAtIndexPath:toIndexPath:` 方法，为了简化编码，我们假设只移动同一分区内的行。稍后运行应用程序时你会发现，在当前实现中，`UITableView`\
  \ 不允许 `Country` 切换分组，这正好符合该特定应用的需求。对于可能需要让对象更改分组的应用，你应确保包含相应的代码。\n\n```\n-(void)tableView:(UITableView\
  \ *)tableView moveRowAtIndexPath:(NSIndexPath *)sourceIndexPath toIndexPath:(NSIndexPath\
  \ *)destinationIndexPath\n{\n    NSMutableArray *group = [self.countries objectAtIndex:sourceIndexPath.section];\
  \ //Assume same Section\n    if (destinationIndexPath.row < [group count])\n    {\n\
          [group exchangeObjectAtIndex:sourceIndexPath.row withObjectAtIndex:destinationIndexPath.row];\n\
      }\n    [self.tableViewCountries reloadData];\n}\n```\n\n最后一个需要修复的方法是 `-tableView:commitEditingStyle:forRowAtIndexPath:`，修改后如下所示：\n\
  \n```\n-(void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\
  \ forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
      {\n        //////Changed code\n        NSMutableArray *group = [self.countries\
  \ objectAtIndex:indexPath.section];\n        Country *deletedCountry = [group objectAtIndex:indexPath.row];\n\
          [group removeObject:deletedCountry];\n        //////End of changed code\n\
  ```\n\n\n```objectivec\n[tableViewCountries deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\
  \ withRowAnimation:UITableViewRowAnimationAutomatic];\n}\nelse if (editingStyle\
  \ == UITableViewCellEditingStyleInsert)\n{\n    //////更多修改的代码！\n    NSMutableArray\
  \ *group = [self.countries objectAtIndex:indexPath.section];\n    Country *copiedCountry\
  \ = [group objectAtIndex:indexPath.row];\n    Country *newCountry = [[Country alloc]\
  \ init];\n    newCountry.name = copiedCountry.name;\n    newCountry.flag = copiedCountry.flag;\n\
  \    newCountry.capital = copiedCountry.capital;\n    newCountry.motto = copiedCountry.motto;\n\
  \n    [group insertObject:newCountry atIndex:indexPath.row+1];\n    //////修改代码结束\n\
  \n    [self.tableViewCountries insertRowsAtIndexPaths:[NSArray arrayWithObject:[NSIndexPath\
  \ indexPathForRow:indexPath.row+1 inSection:indexPath.section]] withRowAnimation:UITableViewRowAnimationRight];\n\
  }\n```\n\n最后，由于你已将 `UITableView` 切换为“分组”样式，你需要额外实现两个方法，以确保功能正确。\n\n首先，你需要通过以下方法精确指定\
  \ `UITableView` 共有多少个分区：\n\n```objectivec\n-(NSInteger)numberOfSectionsInTableView:(UITableView\
  \ *)tableView\n{\n    return [self.countries count];\n}\n```\n\n其次，你需要为每个分区指定“标题”，这些标题将是各个组的名称。既然你已经清楚数据的格式，这一步很容易做到。\n\
  \n```objectivec\n-(NSString *)tableView:(UITableView *)tableView titleForHeaderInSection:(NSInteger)section\n\
  {\n    if (section == 0)\n    {\n        return @\"英国国家\";\n    }\n    return @\"\
  非英国国家\";\n}\n```\n\n如果你的数据模型更复杂，你可能希望将组的名称与组本身一起存储。使用 `NSDictionary` 是一种特别好的方式，可以将标题（作为字符串）设置为\
  \ `NSArray` 组对象的键。\n\n`UITableViewDelegate` 协议还包含一个方法，允许开发者在编辑 `UITableView` 时自定义删除按钮中显示的文本。该方法完全可选，其使用方式将根据具体应用的需求而有所不同。\n\
  \n```objectivec\n-(NSString *)tableView:(UITableView *)tableView titleForDeleteConfirmationButtonForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    return NSLocalizedString(@\"移除\", @\"删除\");\n}\n```\n\n完成所有这些修改后，运行你的应用，视图应类似于图\
  \ 9–17 所示。\n\n![图片](img/9781430240051_Fig09-17.jpg)\n\n**图 9–17.** *包含分组项和分区标题的应用界面*\n\
  \n作为表格的最后一个补充，你还可以为分区添加“页脚”。它们的工作原理与标题类似，但正如你可能猜到的，它们会出现在分组的底部。以下是一个快速方法，用于为你的 `UITableView`\
  \ 添加一些（略显滑稽的）页脚。\n\n```objectivec\n-(NSString *)tableView:(UITableView *)tableView\
  \ titleForFooterInSection:(NSInteger)section\n{\n    if (section == 0)\n       \
  \ return @\"我是一个页脚！\";\n    return @\"我想我也是……\";\n}\n```\n\n与 `UITableView` 其他高度可定制的部分一样，这些标题和页脚也极其容易定制，远不止使用简单的\
  \ `NSString`。如果使用 `-tableView:viewForHeaderInSection:` 和 `-tableView:viewForFooterInSection:`\
  \ 方法，你可以通过编程方式创建自己的子视图，用作标题或页脚，从而完全控制 `UITableView` 的显示。\n\n至此，你已经拥有了一个功能完备的分组 `UITableView`，其能力与未分组的表格完全相同！图\
  \ 9–18 展示了设置的最终结果。\n\n![图片](img/9781430240051_Fig09-18.jpg)\n\n**图 9–18.** *完成后的分组\
  \ `UITableView`，同时带有标题和页脚*\n\n### 摘要\n\n在本章中，你逐步学习了如何以编程方式创建 `UITableView`，并了解了两种样式：“普通”和“分组”。你还初步了解了开发者对\
  \ `UITableView` 视图和显示所拥有的广泛定制控制权，尽管 Apple 的完整文档对此主题还有更多内容。你甚至为你的 `UITableView` 添加了大量功能，使其拥有最强大的用户界面。然而，`UITableView`\
  \ 的关键不在于它如何工作，而在于它所展示的数据。作为开发者，你需要找到用户想要或需要的信息，并以最高效、最灵活的方式呈现给他们。`UITableView` 是一个出色的工具，但其服务的目的更为重要，这最终将是你交付给客户的最终产品。\n\
  \n## 第 10 章\n\n## 数据存储方案\n\n在处理 iOS 开发时，最重要的主题之一就是理解数据持久化的概念、使用和实现。这个术语指的是信息在应用关闭或重启时能够被保存和检索，即“持久化”。就像几千年前书籍中的页面至今仍可阅读一样，我们可以利用\
  \ iOS 中的关键概念，让我们的信息——从最简单的数值到最复杂的数据结构——在设备中无限期地保存。本章将介绍多种持久化方法，它们各有优缺点、通用用途和复杂程度，以便我们全面理解在任何特定情况下最佳的存储方法。\n\
  \n\n### 配方 10-1：使用 `NSUserDefaults`\n\n开发应用时，我们经常会遇到需要存储简单值（如字符串、数字或布尔值）的场景。虽然存储数据的方式有很多种，但最简单的方式就是使用专为此类需求而设计的\
  \ `NSUserDefaults`。\n\n`NSUserDefaults` 类是一个简单的实现，用于存储 `NSString`、`NSNumber`、BOOL\
  \ 等实例这类基础值。它也可以用来存储更复杂的数据结构，比如 `NSArray` 或 `NSDictionary`，只要它们不包含大量数据即可。任何类型的图片都不应使用\
  \ `NSUserDefaults` 来存储。因此，它非常适合存储应用中的各种偏好设置或选项。\n\n首先，创建一个名为“Stubborn”（因为你希望你的信息能够持久保留）的新项目。\n\
  \n选择单视图应用模板来创建一个简单的应用供你配置。输入你的名称并确保设备设置为 iPhone 系列后，就像图 10-1 所示那样，点击下一步直到完成项目创建。\n\
  \n![Image](img/9781430240051_Fig10-01.jpg)\n\n**图 10-1.** *配置你的 Stubborn 项目*\n\n\
  现在，在你新创建的视图控制器的 XIB 文件中，你将开始设置基本的用户界面。拖放三个 `UILabel`、两个 `UITextField`、一个 `UISwitch`\
  \ 和一个 `UIActivityIndicatorView`，以创建如图 10-2 所示的视图。\n\n![Image](img/9781430240051_Fig10-02.jpg)\n\
  \n**图 10-2.** *用于存储值的视图控制器 XIB*\n\n你大概能猜到，我们将简单地使用文本字段来设置标签的文本，并使用开关来控制活动指示器视图是否在动画。\n\
  \n接下来，按住 ^ (Ctrl) 键并从 XIB 文件中的每个元素拖拽到视图控制器的头文件中，连接每个元素到对应的属性。这将自动创建属性，合成它，并在应用的\
  \ `-viewDidUnload` 方法中添加一条将其置空的语句。下面的头文件摘录展示了你将用于管理每个元素的属性名称。\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@interface MainViewController : UIViewController\n\n@property (strong, nonatomic)\
  \ IBOutlet UILabel *firstLabel;\n@property (strong, nonatomic) IBOutlet UILabel\
  \ *secondLabel;\n@property (strong, nonatomic) IBOutlet UILabel *animateLabel;\n\
  @property (strong, nonatomic) IBOutlet UITextField *firstNameTextField;\n@property\
  \ (strong, nonatomic) IBOutlet UITextField *lastNameTextField;\n@property (strong,\
  \ nonatomic) IBOutlet UISwitch *animateSwitch;\n@property (strong, nonatomic) IBOutlet\
  \ UIActivityIndicatorView *activityIndicator;\n\n@end\n```\n\n接下来，你需要让你的视图控制器遵循\
  \ `UITextFieldDelegate` 协议，以便更好地控制每个 `UITextField` 的操作。你视图控制器头文件中的头行（前述代码中的第二行）现在看起来像这样：\n\
  \n```\n@interface MainViewController : UIViewController<UITextFieldDelegate>\n```\n\
  \n然后，更新视图控制器接口文件中的 `-viewDidLoad` 方法，以设置两个文本字段的委托。\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\nself.firstNameTextField.delegate = self;\nself.lastNameTextField.delegate\
  \ = self;\n}\n```\n\n现在，你可以编写一个方法来访问 `NSUserDefaults` 类并保存视图所需的数值。\n\n```\n(void)updateDefaults\n\
  {\n// 获取值\nNSString *first = self.firstNameTextField.text;\nNSString *last = self.lastNameTextField.text;\n\
  BOOL animating = self.activityIndicator.isAnimating;\n\n// 获取共享实例\nNSUserDefaults\
  \ *userDefaults = [NSUserDefaults standardUserDefaults];\n\n// 设置需要持久化的对象/值\n  \
  \  [userDefaults setObject:first forKey:@\"firstName\"];\n    [userDefaults setObject:last\
  \ forKey:@\"lastName\"];\n    [userDefaults setBool:animating forKey:@\"animating\"\
  ];\n\n// 保存更改\n    [userDefaults synchronize];\n}\n```\n\n如该方法所示，在对 `NSUserDefaults`\
  \ 对象完成更改后，务必记得调用 `-synchronize` 方法以保存数据。\n\n除了用于获取 `NSUserDefaults` 类共享实例的 `+standardUserDefaults`\
  \ 方法外，该类还有一个类方法 `+resetStandardUserDefaults`，用于完全清除应用的所有已保存存储值。\n\n现在，你可以实现你的 `UITextFieldDelegate`\
  \ 协议方法来处理数据的输入，以自动保存新输入的文本。\n\n```\n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n\
  {\n    [textField resignFirstResponder];\nreturn NO;\n}\n\n-(void)textFieldDidEndEditing:(UITextField\
  \ *)textField\n{\nif (textField == self.firstNameTextField)\n    {\nself.firstLabel.text\
  \ = textField.text;\n    }\nelse if (textField == self.lastNameTextField)\n    {\n\
  self.secondLabel.text = textField.text;\n    }\n    [self updateDefaults];\n}\n\
  ```\n\n对于你的 `UISwitch`，你还需要创建一个方法来处理其值的变化。\n\n```\n-(void)switchValueChanged:(UISwitch\
  \ *)sender\n{\nif (sender.on)\n    {\n        [self.activityIndicator startAnimating];\n\
  self.animateLabel.text = @\"Animating\";\n    }\nelse\n    {\n        [self.activityIndicator\
  \ stopAnimating];\nself.animateLabel.text = @\"Stopped\";\n    }\n    [self updateDefaults];\n\
  }\n```\n\n为了将此方法分配给 `UISwitch` 调用，你需要再次修改 `-viewDidLoad`。\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\nself.firstNameTextField.delegate = self;\nself.lastNameTextField.delegate\
  \ = self;\n\n    [self.animateSwitch addTarget:self action:@selector(switchValueChanged:)\n\
  forControlEvents:UIControlEventValueChanged];\n}\n```\n\n至此，你的应用应该能够轻松保存你输入的值，但你还需要包含在应用关闭时重新加载这些值的功能。你将创建一个单独的方法，再次访问\
  \ `NSUserDefaults` 类，检查是否有任何存储的值，并相应地显示它们。\n\n```\n-(void)setValuesFromDefaults\n\
  {\n// 获取共享实例\nNSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];\n\
  \n// 获取值\nNSString *first = [userDefaults objectForKey:@\"firstName\"];\nNSString\
  \ *last = [userDefaults objectForKey:@\"lastName\"];\nBOOL animating = [userDefaults\
  \ boolForKey:@\"animating\"];\n\n// 相应地显示值\nif (first != nil)\n    {\nself.firstNameTextField.text\
  \ = first;\nself.firstLabel.text = first;\n    }\nif (last != nil)\n    {\nself.lastNameTextField.text\
  \ = last;\nself.secondLabel.text = last;\n    }\nif (animating)\n    {\nself.animateLabel.text\
  \ = @\"Animating\";\nif (self.activityIndicator.isAnimating == NO)\n        {\n\
  \            [self.activityIndicator startAnimating];\n        }\n    }\nelse\n\
  \    {\nself.animateLabel.text = @\"Stopped\";\nif (self.activityIndicator.isAnimating\
  \ == YES)\n        {\n            [self.activityIndicator stopAnimating];\n    \
  \    }\n    }\n    [self.animateSwitch setOn:animating animated:NO];\n}\n```\n\n\
  最后，你只需要再次调整 `-viewDidLoad` 方法，以便在应用运行时加载已保存的偏好设置。\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\nself.firstNameTextField.delegate = self;\nself.lastNameTextField.delegate\
  \ = self;\n\n    [self.animateSwitch addTarget:self action:@selector(switchValueChanged:)\n\
  forControlEvents:UIControlEventValueChanged];\n\n    [self setValuesFromDefaults];\n\
  }\n```\n\n\n```markdown\n\n此时，你的应用已经能够成功保存数据了！如果你在 iOS 模拟器或设备上运行应用，修改数据后关闭并重新打开，数据应该会保持原样。请注意，在较新设备上完全关闭应用的方法是：双击主屏幕按钮，按住出现的应用图标，然后点击目标应用上的“-”标记。另外需注意，如果通过\
  \ Xcode 运行项目，通过此方式关闭应用可能会导致崩溃，此时应使用 Xcode 中的“停止”按钮来关闭应用。虽然无法直观看到，但图 10-3 展示了一个多次关闭并重新打开后数据仍然保留的应用示例！\n\
  \n![Image](img/9781430240051_Fig10-03.jpg)\n\n**图 10-3.** 应用持久化数据\n\n> **注意：** 尽管在本简短示例中你并未使用多种类型的值通过\
  \ `NSUserDefaults` 存储数据，但实际上存在多种方法可以存储几乎所有类型的轻量数据，包括 `Bool`、`Float`、`Integer`、`Double`\
  \ 和 `URL`。对于更复杂的对象（如 `NSString`、`NSArray` 或 `NSDictionary`），需要使用通用的 `-setObject:forKey:`\
  \ 方法。\n\n### 方案 10-2：管理文件\n\n虽然 `NSUserDefaults` 类对于快速持久化轻量数据特别有用，但在处理视频、音乐或图像等大型对象时效率并不高。对于这些更复杂的项目，你可以利用\
  \ iOS 的文件管理系统。\n\n你将创建一个新应用，用于显示“热点”（Hotspots）表格，并能够编辑、添加内容，同时持久化所有数据。虽然这些对象本身较轻量，理论上可以存储在\
  \ `NSUserDefaults` 中，但出于演示目的，你将使用文件管理系统。\n\n首先，你将构建应用的用户界面，暂不考虑数据持久化。使用“单视图应用”模板创建一个新项目，步骤与上一个方案完全相同。\n\
  \n首先，创建 `Hotspot` 类。新建文件，确保在对话框中选择“Objective-C class”模板，如图 10-4 所示。\n\n![Image](img/9781430240051_Fig10-04.jpg)\n\
  \n**图 10-4.** 创建 `NSObject` 子类\n\n在下一个界面中，将文件名设为“Hotspot”，并确保“Subclass of”字段设置为“NSObject”。点击完成创建文件。\n\
  \n在 `Hotspot` 类的头文件 `Hotspot.h` 中，定义一系列 `NSString` 属性来表示该对象的数据。\n\n```objc\n#import\
  \ <Foundation/Foundation.h>\n\n@interface Hotspot : NSObject\n\n@property (nonatomic,\
  \ strong) NSString *name;\n@property (nonatomic, strong) NSString *address;\n@property\
  \ (nonatomic, strong) NSString *city;\n@property (nonatomic, strong) NSString *state;\n\
  \n@end\n```\n\n在实现文件 `Hotspot.m` 中，为这四个属性添加一条 `@synthesize` 指令。\n\n```objc\n@synthesize\
  \ name, city, state, address;\n```\n\n接下来，你将创建另一个视图控制器，用于管理用户创建和编辑 `Hotspot` 对象。新建文件，选择“UIViewController\
  \ subclass”模板。将类名设为“HotspotInfoViewController”，并确保“Subclass of”字段设置为 `UIViewController`，如图\
  \ 10-5 所示。同时确保勾选“With XIB for user interface”复选框。\n\n![Image](img/9781430240051_Fig10-05.jpg)\n\
  \n**图 10-5.** 配置新的视图控制器\n\n在新创建的控制器的 XIB 文件 `HotspotInfoViewController.xib` 中，按照图\
  \ 10-6 所示构建用户界面。\n\n![Image](img/9781430240051_Fig10-06.jpg)\n\n**图 10-6.** 配置 `HotspotInfoViewController.xib`\
  \ 文件\n\n将每个 `UITextField` 元素连接到视图控制器的头文件，分别使用属性标识符 `textFieldName`、`textFieldAddress`、`textFieldCity`\
  \ 和 `textFieldState`。你无需为 `UIButton` 定义属性，但需要将其连接到一个 `IBAction` 方法 `-saveButtonPressed:`。这些修改应在头文件中添加以下属性和方法声明。\n\
  \n```objc\n@property (strong, nonatomic) IBOutlet UITextField *textFieldName;\n\
  @property (strong, nonatomic) IBOutlet UITextField *textFieldAddress;\n@property\
  \ (strong, nonatomic) IBOutlet UITextField *textFieldCity;\n@property (strong, nonatomic)\
  \ IBOutlet UITextField *textFieldState;\n- (IBAction)saveButtonPressed:(id)sender;\n\
  ```\n\n此类需要一个 `Hotspot` 属性来引用当前正在查看的 `Hotspot` 对象。添加 `Hotspot` 类的导入语句。\n\n```objc\n\
  #import \"Hotspot.h\"\n```\n\n声明 `Hotspot` 属性。\n\n```objc\n@property (strong, nonatomic)\
  \ IBOutlet Hotspot *hotspot;\n```\n\n你还将创建一个 `delegate` 属性，用于处理此类使用完成后的回调。通过在头文件的\
  \ `@interface` 部分上方添加以下代码，定义协议 `HotspotInfoDelegate`。\n```\n\n```objc\n@class HotspotInfoViewController;\n\
  @protocol HotspotInfoDelegate <NSObject>\n-(void)HotspotInfoViewController:(HotspotInfoViewController\
  \ *)hotspotInfoVC\ndidReturnHotspot:(Hotspot *)hotspot isNew:(BOOL)isNew;\n@end\n\
  ```\n\n现在，你可以像这样声明 `delegate` 属性：\n\n```objc\n@property (strong, nonatomic) id<HotspotInfoDelegate>\
  \ delegate;\n```\n\n请确保 `delegate` 和 `hotspot` 属性都已正确合成，并且在控制器的 `-viewDidUnload`\
  \ 方法中均被设置为 `nil`。\n\n最后，你将让这个视图控制器成为所添加的四个 `UITextField` 元素的委托。因此，请在接口行中添加 `<UITextFieldDelegate>`\
  \ 代码，以确保该类遵循 `UITextFieldDelegate` 协议。\n\n现在，你的 `HotspotInfoViewController.h` 文件整体上应该如下所示：\n\
  \n```objc\n#import <UIKit/UIKit.h>\n#import \"Hotspot.h\"\n\n@class HotspotInfoViewController;\n\
  \n@protocol HotspotInfoDelegate <NSObject>\n-(void)HotspotInfoViewController:(HotspotInfoViewController\
  \ *)hotspotInfoVC\ndidReturnHotspot:(Hotspot *)hotspot isNew:(BOOL)isNew;\n@end\n\
  \n@interface HotspotInfoViewController : UIViewController<UITextFieldDelegate>\n\
  \n@property (strong, nonatomic) IBOutlet UITextField *textFieldName;\n@property\
  \ (strong, nonatomic) IBOutlet UITextField *textFieldAddress;\n@property (strong,\
  \ nonatomic) IBOutlet UITextField *textFieldCity;\n@property (strong, nonatomic)\
  \ IBOutlet UITextField *textFieldState;\n- (IBAction)saveButtonPressed:(id)sender;\n\
  \n@property (strong, nonatomic) Hotspot *hotspot;\n\n@property (strong, nonatomic)\
  \ id<HotspotInfoDelegate> delegate;\n\n@end\n```\n\n在 `HotspotInfoViewController`\
  \ 的实现文件中，你需要添加一个方法，用给定的 `Hotspot` 信息填充视图。\n\n```objc\n-(void)populateWithHotspot\n\
  {\n    self.textFieldName.text = hotspot.name;\n    self.textFieldAddress.text =\
  \ hotspot.address;\n    self.textFieldCity.text = hotspot.city;\n    self.textFieldState.text\
  \ = hotspot.state;\n}\n```\n\n此方法将在 `-viewDidLoad` 方法中被调用，该方法还会配置你的用户界面。\n\n```objc\n\
  - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.textFieldName.placeholder\
  \ = @\"名称\";\n    self.textFieldAddress.placeholder = @\"地址\";\n    self.textFieldCity.placeholder\
  \ = @\"城市\";\n    self.textFieldState.placeholder = @\"州/省\";\n\n    self.textFieldName.delegate\
  \ = self;\n    self.textFieldAddress.delegate = self;\n    self.textFieldCity.delegate\
  \ = self;\n    self.textFieldState.delegate = self;\n\n    if (self.hotspot != nil)\n\
  \    {\n        [self populateWithHotspot];\n    }\n}\n```\n\n如果你没有将 `-populateWithHotspot`\
  \ 方法的代码放在 `-viewDidLoad` 方法之前，那么你需要在头文件中为前者添加一个方法签名。\n\n包含一个简单的方法，当用户完成对 `UITextField`\
  \ 的编辑时，用于关闭键盘：\n\n```objc\n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n\
  {\n    [textField resignFirstResponder];\n    return NO;\n}\n```\n\n最后，`-saveButtonPressed:`\
  \ 方法将根据情况，保存当前的 `Hotspot`（如果已提供）或创建一个新的。然后，该对象将通过 `-HotspotInfoViewController:didReturnHotspot:isNew:`\
  \ 方法传递回你的 `delegate` 属性，以便妥善处理。\n\n```objc\n- (IBAction)saveButtonPressed:(id)sender\n\
  {\n    BOOL isNew;\n    if (self.hotspot != nil)\n    {\n        self.hotspot.name\
  \ = self.textFieldName.text;\n        self.hotspot.address = self.textFieldAddress.text;\n\
  \        self.hotspot.city = self.textFieldCity.text;\n        self.hotspot.state\
  \ = self.textFieldState.text;\n        isNew = NO;\n    }\n    else\n    {\n   \
  \     Hotspot *newHotspot = [[Hotspot alloc] init];\n        newHotspot.name = self.textFieldName.text;\n\
  \        newHotspot.address = self.textFieldAddress.text;\n        newHotspot.city\
  \ = self.textFieldCity.text;\n        newHotspot.state = self.textFieldState.text;\n\
  \        self.hotspot = newHotspot;\n        isNew = YES;\n    }\n    [self.delegate\
  \ HotspotInfoViewController:self didReturnHotspot:self.hotspot isNew:isNew];\n}\n\
  ```\n\n__________\n\n现在，你将构建主视图控制器。在这个类的 XIB 文件中，添加一个 `UITableView` 来填充整个视图，如图 10–7\
  \ 所示。\n\n![图片](img/9781430240051_Fig10-07.jpg)\n\n**图 10–7.** *向主视图控制器添加 `UITableView`*\n\
  \n使用属性名 `tableViewHotspots` 将此 `UITableView` 连接到你的头文件。\n\n在主视图控制器的头文件中创建一个 `NSMutableArray`\
  \ 属性，用于存放 `Hotspot` 对象。\n\n```objc\n@property (strong, nonatomic) NSMutableArray\
  \ *hotspots;\n```\n\n在此头文件中添加以下两条 import 语句。\n\n```objc\n#import \"HotspotInfoViewController.h\"\
  \n#import \"Hotspot.h\"\n```\n\n最后，确保告知此控制器遵循 `UITableViewDelegate` 和 `UITableViewDataSource`\
  \ 协议，以及你创建的 `HotspotsInfoDelegate` 协议。\n\n完成所有这些更改后，你的头文件应如下所示：\n\n```objc\n#import\
  \ <UIKit/UIKit.h>\n#import \"HotspotInfoViewController.h\"\n#import \"Hotspot.h\"\
  \n\n@interface MainViewController : UIViewController<UITableViewDelegate,\nUITableViewDataSource,\
  \ HotspotInfoDelegate>\n\n@property (strong, nonatomic) IBOutlet UITableView *tableViewHotspots;\n\
  @property (strong, nonatomic) NSMutableArray *hotspots;\n\n@end\n```\n\n在该类的实现文件中，在合成\
  \ `hotspots` 属性之后，你需要声明一个自定义的 getter 方法，以确保数组被正确创建。\n\n```objc\n-(NSMutableArray\
  \ *)hotspots\n{\n    if (!hotspots)\n    {\n        hotspots = [[NSMutableArray\
  \ alloc] initWithCapacity:10];\n    }\n    return hotspots;\n}\n```\n\n你将编写 `-viewDidLoad`\
  \ 方法来设置 `UITableView` 的 `delegate` 和 `dataSource` 属性，并配置用户界面以在 `UINavigationController`\
  \ 中工作。\n\n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.title\
  \ = @\"热点\";\n\n    self.tableViewHotspots.delegate = self;\n    self.tableViewHotspots.dataSource\
  \ = self;\n\n    UIBarButtonItem *addButton = [[UIBarButtonItem alloc]\n       \
  \                           initWithBarButtonSystemItem:UIBarButtonSystemItemAdd\
  \ target:self\n                                  action:@selector(newHotspot:)];\n\
  \    self.navigationItem.rightBarButtonItem = self.editButtonItem;\n    self.navigationItem.leftBarButtonItem\
  \ = addButton;\n}\n```\n\n所使用的 `-newHotspot:` 选择器将很容易实现，以显示一个未预设 `hotspot` 的 `HotspotInfoViewController`\
  \ 实例。\n\n```objc\n-(void)newHotspot:(id)sender\n{\n    HotspotInfoViewController\
  \ *hotspotVC = [[HotspotInfoViewController alloc] init];\n    hotspotVC.delegate\
  \ = self;\n    [self.navigationController pushViewController:hotspotVC animated:YES];\n\
  }\n```\n\n为了响应 `HotspotInfoViewController` 完成使用的情况，你应该实现之前指定的 `HotspotInfoDelegate`\
  \ 方法。\n\n```objc\n-(void)HotspotInfoViewController:(HotspotInfoViewController *)hotspotInfoVC\n\
  didReturnHotspot:(Hotspot *)hotspot isNew:(BOOL)isNew\n{\n    if (isNew)\n    {\n\
  \        [self.hotspots addObject:hotspot];\n    }\n    [self.tableViewHotspots\
  \ reloadData];\n\n    [self.navigationController popViewControllerAnimated:YES];\n\
  }\n```\n\n您将需要调整视图控制器的行为，以处理视图的消失和重新出现，方法是重写以下两个方法。\n\n```\n- (void)viewWillAppear:(BOOL)animated\n\
  {\n    self.title = @\"Hotspots\";\n    [super viewWillAppear:animated];\n}\n\n\
  - (void)viewDidDisappear:(BOOL)animated\n{\n    self.title = @\"Cancel\";\n    [super\
  \ viewDidDisappear:animated];\n}\n```\n\n现在，要配置`UITableView`，您必须指定要显示的行数，该行数将基于`hotspots`数组的计数。\n\
  \n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
  {\n    return [self.hotspots count];\n}\n```\n\n您将配置表格单元格的显示，以简单地显示每个`Hotspot`对象的`name`和`address`。\n\
  \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath*)indexPath\n\
  {\n    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell *cell\
  \ = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell\
  \ == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\n\
  \                                       reuseIdentifier:CellIdentifier];\n     \
  \   cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n    }\n\n\
  \    Hotspot *currentHotspot = [self.hotspots objectAtIndex:indexPath.row];\n\n\
  \    cell.textLabel.text = currentHotspot.name;\n    cell.detailTextLabel.text =\
  \ currentHotspot.address;\n\n    return cell;\n}\n```\n\n您将实现表格，使得选择某一行会显示一个`HotspotInfoViewController`，其中包含该行的信息，以便用户可以轻松编辑任何给定的对象。\n\
  \n```\n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath*)indexPath\n\
  {\n    [self.tableViewHotspots deselectRowAtIndexPath:indexPath animated:YES];\n\
  \n    HotspotInfoViewController *hotspotVC = [[HotspotInfoViewController alloc]\
  \ init];\n    hotspotVC.delegate = self;\n    hotspotVC.hotspot = [self.hotspots\
  \ objectAtIndex:indexPath.row];\n    [self.navigationController pushViewController:hotspotVC\
  \ animated:YES];\n}\n```\n\n最后，您还需要使`UITableView`支持对象的重新排列和删除。要允许编辑和删除，您需要实现以下两个方法。\n\
  \n```\n- (BOOL)tableView:(UITableView *)tableView canEditRowAtIndexPath:(NSIndexPath*)indexPath\n\
  {\n    return YES;\n}\n\n- (void)tableView:(UITableView *)tableView\n    commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\n\
  \     forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
  \    {\n        [self.hotspots removeObjectAtIndex:indexPath.row];\n        [tableView\
  \ deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\n                 \
  \        withRowAnimation:UITableViewRowAnimationFade];\n    }\n}\n```\n\n您还必须重写`-setEditing:animated:`方法，以正确地将`UITableView`和编辑按钮结合起来。\n\
  \n```\n-(void)setEditing:(BOOL)editing animated:(BOOL)animated\n{\n    [super setEditing:editing\
  \ animated:animated];\n    [self.tableViewHotspots setEditing:editing animated:animated];\n\
  }\n```\n\n为了允许重新排列单元格，还将添加以下两个方法。\n\n```\n- (BOOL)tableView:(UITableView *)tableView\
  \ canMoveRowAtIndexPath:(NSIndexPath*)indexPath\n{\n    return YES;\n}\n\n- (void)tableView:(UITableView\
  \ *)tableView\n    moveRowAtIndexPath:(NSIndexPath*)fromIndexPath\n           toIndexPath:(NSIndexPath\
  \ *)toIndexPath\n{\n    Hotspot *movingHotspot = [self.hotspots objectAtIndex:fromIndexPath.row];\n\
  \    [self.hotspots removeObject:movingHotspot];\n    [self.hotspots insertObject:movingHotspot\
  \ atIndex:toIndexPath.row];\n    [self.tableViewHotspots reloadData];\n}\n```\n\n\
  最后，在测试应用之前，您需要修改应用程序委托的实现文件，将视图控制器放入`UINavigationController`中。调整`-application:didFinishLaunchingWithOptions:`方法如下所示。\n\
  \n```\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    self.viewController = [[MainViewController alloc]\n\
  \                            initWithNibName:@\"MainViewController\"\n         \
  \                            bundle:nil];\n    __strong UINavigationController *navcon\
  \ = [[UINavigationController alloc]\n                                          \
  \      initWithRootViewController:self.viewController];\n    self.window.rootViewController\
  \ = navcon;\n    [self.window makeKeyAndVisible];\n    return YES;\n}\n```\n\n您的用户界面现已完全设置，允许您创建要在`UITableView`中显示、编辑或删除的`Hotspot`对象，如在图\
  \ 10-8 中创建一些示例数据后所示。\n\n![Image](img/9781430240051_Fig10-08.jpg)\n\n**Figure 10–8.**\
  \ *您的应用带有示例数据的`UITableView`*\n\n现在，使用此应用程序唯一剩下的任务就是能够保存数据，使其在应用间持久化。\n\n为了实现应用程序中的持久化，您将使用文件系统以及“归档”和“解档”对象的概念。\n\
  \n要归档（即“编码”）任何给定的对象，它及其内部存储的所有属性都必须被明确告知如何编码。对于任何预制的 iOS 对象，例如`NSArray`或`NSDictionary`，这已经完成。但是，为了编码您的`Hotspot`对象，您需要添加一些关于如何处理它们的具体指令。\n\
  \n在`Hotspot.h`类中，通过将`@interface`行更改为以下内容，指定您的类将遵守`NSCoding`协议：\n\n```\n@interface\
  \ Hotspot : NSObject<NSCoding>\n```\n\n现在，您必须实现`-encodeWithCoder:`方法，以指定如何编码`Hotspot`对象以进行保存。\n\
  \n```\n- (void) encodeWithCoder:(NSCoder *)encoder\n{\n    [encoder encodeObject:self.name\
  \ forKey:@\"name\"];\n    [encoder encodeObject:self.address forKey:@\"address\"\
  ];\n    [encoder encodeObject:self.city forKey:@\"city\"];\n    [encoder encodeObject:self.state\
  \ forKey:@\"state\"];\n}\n```\n\n在加载数据的反向过程中，您必须实现`-initWithCoder:`方法，以使用归档数据创建`Hotspot`类的实例。通过使用与前一个方法相同的键，您可以轻松提取所需的`NSString`对象。\n\
  \n```\n- (id)initWithCoder:(NSCoder *)decoder\n{\n    self = [super init];\n   \
  \ if (self)\n    {\n        self.name = [decoder decodeObjectForKey:@\"name\"];\n\
  \        self.address = [decoder decodeObjectForKey:@\"address\"];\n        self.city\
  \ = [decoder decodeObjectForKey:@\"city\"];\n        self.state = [decoder decodeObjectForKey:@\"\
  state\"];\n    }\n    return self;\n}\n```\n\n现在，回到您的主视图控制器，您可以创建一个方法，将数据保存到特定文件。\n\
  \n```\n-(void)saveData\n{\n    NSString *rootPath = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
  \                                    NSUserDomainMask, YES) objectAtIndex:0];\n\
  \    NSString *savePath = [rootPath stringByAppendingPathComponent:@\"hotspotsData\"\
  ];\n    NSFileManager *fileManager = [NSFileManager defaultManager];\n    NSMutableData\
  \ *saveData = [[NSMutableData alloc] init];\n\n    NSKeyedArchiver *archiver = [[NSKeyedArchiver\
  \ alloc] initForWritingWithMutableData:saveData];\n    [archiver encodeObject:self.hotspots\
  \ forKey:@\"DataArray\"];\n    [archiver finishEncoding];\n\n    [fileManager createFileAtPath:savePath\
  \ contents:saveData attributes:nil];\n}\n```\n\n此方法包含以下步骤：\n\n\n1. 获取用于保存数据的根目录路径。您已经指定了“Documents\
  \ Directory”，但根据应用程序的需求，还有其他可能的目录可供使用。\n2. 将文件名`hotspotsData`附加到根路径上，以创建数据文件的路径。\n\
  3. 获取`NSFileManager`类的共享实例。\n4. 获取一个空的`NSMutableData`实例。\n5. 使用`NSKeyedArchiver`类，通过键“DataArray”编码您的`hotspots\
  \ NSArray`。生成的编码数据将保存在您获取的`NSMutableData saveData`对象中。\n    1.  尽管您无法看到其实际代码，但`-encodeObject:forKey:`调用将使用您在`Hotspot.m`文件中定义的`-encodeWithCoder:`方法来归档数组中的所有`Hotspot`对象。\n\
  6. 使用`NSFileManager`，在指定路径使用编码数据创建文件。如果该路径已存在文件，它将被覆盖，这对您的应用程序非常适用。\n\n现在，要执行反向过程，您可以创建一个`-loadData`方法，如下所示：\n\
  \n```\n-(void)loadData\n{\nNSString *rootPath = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
  NSUserDomainMask, YES) objectAtIndex:0];\nNSString *savePath = [rootPath stringByAppendingPathComponent:@\"\
  hotspotsData\"];\nNSFileManager *fileManager = [NSFileManager defaultManager];\n\
  if ([fileManager fileExistsAtPath:savePath])\n    {\nNSData *data = [fileManager\
  \ contentsAtPath:savePath];\nNSKeyedUnarchiver *unarchiver = [[NSKeyedUnarchiver\
  \ alloc] initForReadingWithData:data];\nself.hotspots = [unarchiver decodeObjectForKey:@\"\
  DataArray\"];\n    }\n}\n```\n\n此方法与之前的反向方法几乎相同，它从特定文件路径获取`NSData`，解档它，然后从解码后的数据重新创建`NSArray`。正如`encodeObject:forKey:`方法使用了您的`-encodeWithCoder:`，`decodeObjectForKey:`方法将为其解码对象中的所有对象（包括`NSArray`及其包含的所有`Hotspot`）使用`-initWithCoder:`方法。\n\
  \n现在，您只需将对这两个新方法的调用放在正确的位置。在您的`-viewDidLoad`方法中添加对`-loadData`的调用。\n\n```\n[self\
  \ loadData];\n```\n\n将`-saveData`和`-loadData`方法的方法签名添加到视图控制器的头文件中，以避免任何编译器问题。\n\n\
  每次数组被修改时，您都需要添加对`-saveData`方法的调用，包括在以下方法中：\n\n```\n-(void)HotspotInfoViewController:(HotspotInfoViewController\
  \ *)hotspotInfoVC\ndidReturnHotspot:(Hotspot *)hotspot isNew:(BOOL)isNew\n{\n  \
  \  if (isNew)\n    {\n        [self.hotspots addObject:hotspot];\n    }\n    [self.tableViewHotspots\
  \ reloadData];\n    //New call to save data\n    [self saveData];\n\n    [self.navigationController\
  \ popViewControllerAnimated:YES];\n}\n- (void)tableView:(UITableView *)tableView\n\
  commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\nforRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n \
  \   {\n        [self.hotspots removeObjectAtIndex:indexPath.row];\n        [tableView\
  \ deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\nwithRowAnimation:UITableViewRowAnimationFade];\n\
  \        //New call to save data\n        [self saveData];\n    }\n}\n- (void)tableView:(UITableView\
  \ *)tableView moveRowAtIndexPath:(NSIndexPath\n*)fromIndexPath toIndexPath:(NSIndexPath\
  \ *)toIndexPath\n{\n    Hotspot *movingHotspot = [self.hotspots objectAtIndex:fromIndexPath.row];\n\
  \    [self.hotspots removeObject:movingHotspot];\n    [self.hotspots insertObject:movingHotspot\
  \ atIndex:toIndexPath.row];\n    [self.tableViewHotspots reloadData];\n    //New\
  \ call to save data\n    [self saveData];\n}\n```\n\n一旦添加了这些调用，您的应用程序将能够自动将对数据的任何新更改保存到外部文件，以便在重新打开应用程序时读取！\n\
  \n在您的演示应用程序中，您没有实现将图像保存到文件，尽管这是 iOS 文件管理系统最有效和最常见的用途之一。这个过程甚至比前面的实现更简单。要保存图像，请获取表示图像的`NSData`对象，然后使用`NSFileManager`方法`-createFileAtPath:contents:attributes`写出数据。或者，您也可以使用`NSData`方法`-writeToFile:atomically:`执行相同的任务。\n\
  \n要获取表示`UIImage`的数据，您可以使用`UIImagePNGRepresentation()`或`UIImageJPEGRepresentation()`函数，这两个函数都返回`NSData`。要使用从文件读取的`NSData`重新构建`UIImage`，请使用`+imageWithData:`或`-initWithData:`方法。\n\
  \n### Core Data\n\n到目前为止，您已经接触了用于轻量级值的`NSUserDefaults`的快速实现，以及用于更复杂或更大量数据的文件管理系统。尽管使用文件管理系统存储数据非常强大，但在处理交织类的复杂数据模型时，它很容易变得相当笨重。对于由轻量级对象组成的复杂数据模型，持久化的最佳选择是`Core\
  \ Data`。这个基于 MySQL 表系统的框架，允许轻松创建、操作和持久化复杂的类交互和属性。这个类的使用相当复杂，因此将在下一章中详细介绍。\n\n\n\n\
  ### 方案 10–3：利用 iCloud 实现数据持久化\n\niOS 5.0 发布时带来的最重大的扩展之一，便是能够创建访问全新 iCloud 服务的应用程序。通过运用与上一方案中文件管理系统类似的概念，你不仅能在本地设备上保存、持久化存储和加载数据，还能在使用同一应用的多个设备之间实现数据同步。\n\
  \n在本节的所有方案中，你都需要拥有 iOS 开发计划的访问权限，以及一台实体 iOS 设备。\n\n为了配置应用以使用 iCloud，必须首先完成一系列配置任务。首先，像之前一样，使用\
  \ `Single View Application` 模板创建一个新项目。请确保你的项目名称为 `iCloudTest`，类前缀为 `iCloudStore`。虽然这些值通常对你的应用影响不大，但如果你按照本方案中的名称来命名，将有助于简化本次演示。你的项目配置应类似于图\
  \ 10–9。\n\n![图片](img/9781430240051_Fig10-09.jpg)\n\n**图 10–9.** *配置应用以配合 iCloud\
  \ 工作*\n\n首先，你必须配置项目以启用“授权”。在你的新项目中，导航到项目的 Target 设置，向下滚动到名为“Entitlements”的底部区域。勾选标记为“Enable\
  \ Entitlements”的复选框，如图 10–10 底部所示，让 Xcode 自动生成你的授权文件。\n\n![图片](img/9781430240051_Fig10-10.jpg)\n\
  \n**图 10–10.** *启用授权以允许与 iCloud 通信*\n\n接下来，你需要为此应用生成一个特殊的“App ID”。在浏览器中，登录 iOS 开发者会员中心：[`http://developer.apple.com/membercenter/`](http://developer.apple.com/membercenter/)。导航到\
  \ iOS 预置描述文件门户，然后进入 App IDs 部分。点击标有“New App ID”的按钮。\n\n接下来你会看到一个屏幕，提示你输入描述以及包标识符。将描述设置为\
  \ `iCloudTest`。对于包标识符，你需要输入与 Xcode 分配给应用的完全相同的标识符。这可以在项目 Target 设置的顶部、Entitlements\
  \ 部分上方找到，如图 10–11 所示。其格式很可能类似于 `com.domainName.iCloudTest`。将“Identifier”下显示的文本复制到浏览器的包标识符行中。\n\
  \n![图片](img/9781430240051_Fig10-11.jpg)\n\n**图 10–11.** *查找应用标识符以进行配置*\n\n在图 10–11\
  \ 中，我的标识符是 `com.ColinFrancis.iCloudTest`，因此我将把它作为包标识符复制到浏览器中，如图 10–12 所示。\n\n![图片](img/9781430240051_Fig10-12.jpg)\n\
  \n**图 10–12.** *将项目的标识符复制到包标识符字段中*\n\n创建这个新的 App ID 后，你会返回到已创建的 App ID 列表中。找到刚创建的那个，点击\
  \ `Configure` 链接。\n\n在此屏幕中，你只需要勾选标记为“Enable for iCloud”的复选框，如图 10–13 所示。如果有对话框弹出，警告你需要手动重新生成预置描述文件，只需点击\
  \ OK 即可。\n\n![图片](img/9781430240051_Fig10-13.jpg)\n\n**图 10–13.** *为你的证书启用 iCloud*\n\
  \n点击 **Done** 完成 App ID 的配置。\n\n接下来，向下移动到屏幕左侧 App IDs 选项卡下方的 `Provisioning` 选项卡。点击\
  \ `New Profile` 按钮开始创建新的预置描述文件。\n\n将此新预置描述文件命名为 `iCloudProfile`。选择你作为 iOS 开发者应已拥有的证书。将\
  \ App ID 字段设置为你刚刚创建的 `iCloudTest` App ID，并确保勾选你希望在其上测试此应用的设备旁边的复选框。图 10–14 显示了我的配置屏幕，你的屏幕应与之类似，只是使用你自己的信息。\n\
  \n![图片](img/9781430240051_Fig10-14.jpg)\n\n**图 10–14.** *为你的 iCloud 应用创建新的预置描述文件*\n\
  \n点击 **Submit** 返回预置描述文件列表。你应该会看到新列出的预置描述文件。如果其状态显示为“Pending”，只需刷新页面直至显示为“Active”。\n\
  \n接下来，点击你新创建的预置描述文件旁边的 **Download** 按钮，将其下载到你的电脑。\n\n文件下载完成后（应该不会花很长时间），将文件从 Finder\
  \ 拖拽到 Dock 中的 Xcode 图标上，以将其导入 Xcode。这也会打开 `Organizer` 窗口，其中会列出你所有的预置描述文件。\n\n最后，在\
  \ `Organizer` 中，当你的设备已连接到电脑时，将新预置描述文件从显示的列表中拖拽到你设备下的 `Provisioning Profiles` 部分，如图\
  \ 10–15 所示。\n\n![图片](img/9781430240051_Fig10-15.jpg)\n\n**图 10–15.** *将新预置描述文件复制到设备的预置描述文件部分*\n\
  \n此时，你的设备已完全配置好，可以运行你创建的项目了。\n\n你必须在项目中执行最后一步，才能使应用真正能够使用 iCloud 服务。你需要在视图控制器中定义一个包含“通用容器\
  \ URL”的常量。这个 `NSString` 本质上就是你的开发者帐户 ID 加上你的包标识符作为前缀。例如，如果你的包标识符是 `com.domainName.iCloudTest`，帐户\
  \ ID 是 `12345ABCDE`，那么 URL 将是 `12345ABCDE.com.domainName.iCloudTest`。如果不确定你的帐户 ID，可以再次导航到\
  \ `Member Center` 并进入 **Your Account** 选项卡来查找。如果你使用的是个人帐户，它将在你的姓名旁边显示为 **Individual\
  \ ID**。\n\n在整个项目中，你将使用示例 URL `12345ABCDE.com.domainName.iCloudTest`。请确保根据你自己的帐户\
  \ ID 和域名进行修改。\n\n将以下定义添加到你的 `iCloudStoreViewController.m` 文件顶部，以便稍后引用。\n\n```\n\
  #define UBIQUITY_CONTAINER_URL @\"12345ABCDE.com.domainName.iCloudTest\"\n```\n\n\
  为了使你的应用正常工作，你还必须确保你的授权文件已使用相同的 URL 正确配置。导航到你的授权文件，确保 `com.apple.developer.ubiquity-container-identifiers`（第\
  \ 0 项）和 `com.apple.developer.ubiquity-kvstore-identifier` 的值都设置为此值。Xcode 应该会自动设置这些值，但最好总是确认一下。如果没有，请按图\
  \ 10–16 所示进行设置。\n\n![图片](img/9781430240051_Fig10-16.jpg)\n\n**图 10–16.** *确认授权文件的正确配置*\n\
  \n现在，你的应用和设备已配置好以配合 iCloud 工作，你可以继续构建实际的应用了。\n\n为了构建一个简单的程序来将文本文档保存到 iCloud，你需要使用\
  \ `UIDocument` 抽象类。你的子类将包含将所有文本信息编码成可在线保存的文件所需的全部信息。创建一个新文件，并选择“Objective-C class”模板。配置此文件最简单的方法是先将\
  \ `NSObject` 类命名为父类。稍后你将更改实际的父类。将文件命名为 `MyDocument`。\n\n\n\n创建好类后，修改 `MyDocument.h`\
  \ 文件的 `@interface` 行，将其指定为 `UIDocument` 的子类，代码如下：\n\n```\n@interface MyDocument\
  \ : UIDocument\n```\n\n你将只给这个类一个属性，即类型为 `NSString` 的 `userText`，用于存储待编码和解码的文本。请确保在实现文件中合成（synthesize）该属性。你的\
  \ `MyDocument.h` 文件应如下所示：\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
  \ MyDocument : UIDocument\n\n@property (strong, nonatomic) NSString *userText;\n\
  \n@end\n```\n\n现在，你至少必须实现两个方法才能正确继承 `UIDocument` 的子类：`-contentsForType:error:` 和\
  \ `-loadFromContents:ofType:error:`。这两个方法将分别充当你的编码和解码方法，类似于之前的示例。\n\n第一个方法将返回一个\
  \ `NSData` 对象，表示你的 `userText` 属性。\n\n```\n-(id)contentsForType:(NSString *)typeName\
  \ error:(NSError *__autoreleasing *)outError\n{\nreturn [NSData dataWithBytes:[self.userText\
  \ UTF8String] length:[self.userText length]];\n}\n```\n\n第二个方法则执行反向操作，从原始数据构建一个\
  \ `NSString` 并将其赋值给属性。\n\n```\n-(BOOL) loadFromContents:(id)contents ofType:(NSString\
  \ *)typeName error:(NSError\n*__autoreleasing *)outError\n{\nif ([contents length]\
  \ >0)\n    {\nself.userText = [[NSString alloc] initWithBytes:[contents bytes] length:[contents\n\
  length] encoding:NSUTF8StringEncoding];\n    }\nelse\n    {\nself.userText = @\"\
  \";\n    }\nreturn YES;\n}\n```\n\n现在你的数据模型已配置完成（没错，就是这么简单！），就可以开始构建用户界面了。切换到 `iCloudStoreViewController.xib`\
  \ 文件，使用 `UITextView` 和 `UIButton`，设置如图 10–17 所示的视图。\n\n![Image](img/9781430240051_Fig10-17.jpg)\n\
  \n**图 10–17.** *一个用于保存文本的简单用户界面*\n\n请确保视图的下半部分完全留空，因为用于编辑 `UITextView` 的键盘会覆盖这个区域。\n\
  \n你或许还想更改主 `UIView` 和 `UITextView` 的部分背景颜色，以便清晰区分它们。我将它们设为不同的灰色阴影，如后文图 10–19 所示。\n\
  \n使用 `textViewDisplay` 属性将 `UITextView` 连接到视图控制器的头文件。请确保像往常一样合成并妥善处理该属性。将 `UIButton`\
  \ 连接到处理程序为 `-savePressed:` 的 `IBAction`。\n\n你还需要几个其他属性来帮助执行 iCloud 操作。为 `MyDocument.h`\
  \ 文件添加一个导入语句。\n\n```\n#import \"MyDocument.h\"\n```\n\n同时添加以下三个属性，确保像往常一样合成每个属性，并在\
  \ `-viewDidUnload` 中将它们设为 `nil`。\n\n```\n@property (strong, nonatomic) MyDocument\
  \ *document;\n@property (strong, nonatomic) NSURL *ubiquityURL;\n@property (strong,\
  \ nonatomic) NSMetadataQuery *metadataQuery;\n```\n\n接下来，实现 `-viewDidLoad` 方法，通过使用\
  \ `NSFileManager` 和 `NSMetadataQuery` 类创建查询，让 iCloud 搜索文档的任何已保存版本。\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n\nNSFileManager *filemgr = [NSFileManager defaultManager];\n\
  \nself.ubiquityURL = [[filemgr URLForUbiquityContainerIdentifier:UBIQUITY_CONTAINER_URL]\n\
  URLByAppendingPathComponent:@\"Documents\"];\n\nif (self.ubiquityURL != nil)\n \
  \   {\nif ([filemgr fileExistsAtPath:[self.ubiquityURLpath]] == NO)\n          \
  \  [filemgr createDirectoryAtURL:self.ubiquityURL\nwithIntermediateDirectories:YES\n\
  attributes:nil\nerror:nil];\n\nself.ubiquityURL = [self.ubiquityURL URLByAppendingPathComponent:@\"\
  document.doc\"];\n\nself.metadataQuery = [[NSMetadataQuery alloc] init];\n     \
  \   [self.metadataQuery setPredicate:[NSPredicate\npredicateWithFormat:@\"%K like\
  \ 'document.doc'\",\nNSMetadataItemFSNameKey]];\n        [self.metadataQuery setSearchScopes:[NSArray\n\
  arrayWithObjects:NSMetadataQueryUbiquitousDocumentsScope,nil]];\n\n        [[NSNotificationCenter\
  \ defaultCenter]\naddObserver:self\nselector:@selector(metadataQueryDidFinishGathering:)\n\
  name: NSMetadataQueryDidFinishGatheringNotification\nobject:metadataQuery];\n  \
  \      [self.metadataQuery startQuery];\n    }\n}\n```\n\n该方法包含以下步骤，用于创建查询以查找任何已保存的数据：\n\
  \n1.  使用 `-URLForUbiquityContainerIdentifier:` 方法获取 `ubiquityURL`。此调用使用了你之前根据账户\
  \ ID 和域名定义的标识符。如果该值不为 `nil`，则说明你的设备和应用已正确配置，可以将文档存储到 iCloud 中。\n2.  使用 `-createDirectoryAtURL:withIntermediateDirectories:attributes:error:`\
  \ 方法确保目标 URL 处存在必要的属性目录。\n3.  将文件名 `\"document.doc\"` 附加到完整 URL 上。\n4.  创建一个 `NSMetadataQuery`\
  \ 实例，设置用于文件名的谓词以及用于通用文档的搜索范围。\n5.  将视图控制器添加为查询完成的通知观察者。\n6.  启动查询。\n\n调用该方法后，你的应用将开始尝试查找存储在\
  \ iCloud 中的任何信息。为了响应查询结果，你必须实现先前在通知注册中提到的 `-metadataQueryDidFinishGathering:` 选择器。\n\
  \n```\n- (void)metadataQueryDidFinishGathering: (NSNotification *)notification\n\
  {\nNSMetadataQuery *query = [notification object];\n    [query disableUpdates];\n\
  \n    [[NSNotificationCenter defaultCenter]\nremoveObserver:self\nname:NSMetadataQueryDidFinishGatheringNotification\n\
  object:query];\n\n    [query stopQuery];\nNSArray *results = [[NSArray alloc] initWithArray:[query\
  \ results]];\n\nif ([results count] == 1)\n    {\nself.ubiquityURL = [[results lastObject]\
  \ valueForAttribute:NSMetadataItemURLKey];\nself.document = [[MyDocument alloc]\
  \ initWithFileURL:ubiquityURL];\n\n        [self.document openWithCompletionHandler:^(BOOL\
  \ success)\n        {\nif (success)\n             {\nNSLog(@\"已打开 iCloud 文档\");\n\
  self.textViewDisplay.text = self.document.userText;\n             }\nelse {\nNSLog(@\"\
  无法打开 iCloud 文档\");\n   }\n         }];\n    }\nelse\n    {\nself.document = [[MyDocument\
  \ alloc] initWithFileURL:self.ubiquityURL];\n        [self.document saveToURL:self.ubiquityURL\
  \ forSaveOperation:\nUIDocumentSaveForCreating completionHandler:^(BOOL success)\n\
  \        {\nif (success)\n              {\nNSLog(@\"文件已创建并保存到 iCloud\");\n     \
  \         }\nelse\n              {\nNSLog(@\"错误，无法将文件保存到 iCloud\");\n          \
  \    }\n        }];\n    }\n}\n```\n\n该方法通过执行以下步骤完成对 iCloud 中先前存储信息的搜索：\n\n1.  获取原始的\
  \ `NSMetadataQuery` 对象，以禁用任何进一步更新，移除视图控制器的观察者身份，并停止查询。\n2.  使用 `NSMetadataQuery`\
  \ 的 `results` 属性创建一个包含找到的文档的 `NSArray`。\n3.  获取该数组中的最后一个（也是唯一一个）对象，然后使用其键值 URL 创建一个\
  \ `UIDocument`。\n4.  打开文档，完成后向用户显示文档中的文本。\n\n该方法还包含了未找到文档（或找到多个文档）时的处理代码。在这种情况下，程序会尝试将一个空文件直接保存到\
  \ iCloud，以便该文件将来存在。\n\n此时，你的应用将能够从 iCloud 加载任何先前存储的文本，因此你只需实现保存功能，就可以有信息可以检索了！保存数据的过程比检索它要简单得多。\n\
  \n```objc\n- (void)savePressed:(id)sender\n{\n    self.document.userText = self.textViewDisplay.text;\n\
  \    [self.document saveToURL:self.ubiquityURL\n           forSaveOperation:UIDocumentSaveForOverwriting\n\
  \          completionHandler:^(BOOL success) {\n              if (success) {\n \
  \                 NSLog(@\"已写入 iCloud\");\n              } else {\n            \
  \      NSLog(@\"写入 iCloud 时出错\");\n              }\n          }];\n}\n```\n\n在继续测试应用程序之前，你需确保测试设备已正确配置以便与\
  \ iCloud 协同工作。在设备的“设置”应用中，导航至 iCloud 部分。为了让该应用正常存储数据，你的 iCloud 账户必须正确配置并已验证。这将要求你验证电子邮件地址并将其注册为\
  \ Apple ID。标记为 `Documents & Data` 的选项也应设为 `On`，如图 Figure 10–18 所示。当然，一旦账户通过验证，你可以轻松配置该选项。\n\
  \n![图片](img/9781430240051_Fig10-18.jpg)\n\n**图 10–18.** *必须启用“文档与数据”才能在 iCloud 中存储信息。*\n\
  \n假设你的设备已正确配置，简单的应用程序应能使用用户的 iCloud 账户正确地存储文档，从而使你能够轻松地在多台设备、应用关闭甚至系统重置后持久化数据，如\
  \ Figure 10–19 所示，其中背景颜色如前所述略有调整。\n\n![图片](img/9781430240051_Fig10-19.jpg)\n\n**图\
  \ 10–19.** *你的应用程序通过 iCloud 保存和加载文本*\n\n### 配方 10–4：在 iCloud 中存储键值数据\n\n正如你在本章开头能够使用\
  \ `NSUserDefaults` 类轻松持久化各种轻量级对象一样，你也可以通过 iCloud 服务实现同类型的存储。你将通过记录文本被保存的次数，将此功能添加到应用程序中。虽然这看似微不足道，但能在多台设备上的同一应用中保持如此简单的值同步，将开启一个全新的开发潜能世界。\n\
  \n所有与 iCloud 的键值数据处理都是通过 `NSUbiquitousKeyValueStore` 类完成的。你将把一个实例作为属性添加到 `iCloudStoreViewController`\
  \ 文件中，并确保进行合成并适当地将其设为 `nil`。\n\n```objc\n@property (strong, nonatomic) NSUbiquitousKeyValueStore\
  \ *keyStore;\n```\n\n接下来，你将稍微调整用户界面，加入两个 `UILabel`，其中一个将显示保存次数。此时你的视图将类似于 Figure\
  \ 10–20。\n\n![图片](img/9781430240051_Fig10-20.jpg)\n\n**图 10–20.** *通过两个新的 `UILabel`\
  \ 重新排列 XIB 文件*\n\n将右侧的 `UILabel`（在 Figure 10–20 中显示文本 `N`）通过属性 `countLabel` 连接到你的头文件。\n\
  \n```objc\n@property (strong, nonatomic) IBOutlet UILabel *countLabel;\n```\n\n\
  你可以通过将以下代码添加到 `-viewDidLoad` 方法的末尾，来配置应用程序在加载时立即检查任何计数。\n\n```objc\nself.keyStore\
  \ = [[NSUbiquitousKeyValueStore alloc] init];\ndouble count = [self.keyStore doubleForKey:@\"\
  count\"];\nself.countLabel.text = [NSString stringWithFormat:@\"%f\", count];\n\
  ```\n\n在上述代码之后添加以下行，将使你能够在 `NSUbiquitousKeyValueStore` 中的任何值发生更改时收到通知，从而让你在多台设备上保持信息更新。\n\
  \n```objc\n[[NSNotificationCenter defaultCenter] addObserver:self selector:\n  \
  \  @selector(countChangeExternally:) name:\n    NSUbiquitousKeyValueStoreDidChangeExternallyNotification\
  \ object:self.keyStore];\n```\n\n你可以非常简单地实现 `-countChangeExternally:` 方法来设置 `UILabel`\
  \ 的文本。\n\n```objc\n-(void)countChangeExternally:(id)sender\n{\n    double count\
  \ = [self.keyStore doubleForKey:@\"count\"];\n    self.countLabel.text = [NSString\
  \ stringWithFormat:@\"%f\", count];\n}\n```\n\n最后，你需要指示 `savePressed:` 方法正确更新该值。你仅在文本成功保存时才执行此操作，因此更新后的方法如下所示:\n\
  \n```objc\n- (void)savePressed:(id)sender\n{\n    self.document.userText = self.textViewDisplay.text;\n\
  \    [self.document saveToURL:self.ubiquityURL\n           forSaveOperation:UIDocumentSaveForOverwriting\n\
  \          completionHandler:^(BOOL success) {\n              if (success) {\n \
  \                 NSLog(@\"已写入 iCloud\");\n                  double count = [self.countLabel.text\
  \ doubleValue];\n                  count += 1;\n                  self.countLabel.text\
  \ = [NSString stringWithFormat:@\"%f\", count];\n                  [self.keyStore\
  \ setDouble:count forKey:@\"count\"];\n                  [self.keyStore synchronize];\n\
  \              } else {\n                  NSLog(@\"写入 iCloud 时出错\");\n        \
  \      }\n          }];\n}\n```\n\n现在，你的应用程序应能轻松存储轻量级的 double 值，以记录保存次数，如图 Figure\
  \ 10–21 所示！\n\n![图片](img/9781430240051_Fig10-21.jpg)\n\n**图 10–21.** *通过 iCloud\
  \ 同时存储文本和键值信息的应用*\n\n### 总结\n\n数据持久性几乎始终是开发应用程序时最重要的考虑因素之一。开发者必须考虑他们想要存储的数据类型、数据量、数据间如何关联，以及他们的应用程序是否可能跨越多个设备。在此基础上，必须选择存储数据的方法，无论是简单的\
  \ `NSUserDefaults` 方法、强大的文件管理系统，还是复杂的 Core Data 框架（如下一章所述）。在 iOS 5.0 中，新增的 iCloud\
  \ 服务访问彻底改变了应用程序存储数据的方式，允许在运行同一应用的多个设备之间近乎实时地持久化数据。随着内存、存储和移动应用在技术世界中的规模、重要性和相关性不断增长，这些主题将变得更加重要。通过深入理解\
  \ iOS 中数据持久化的最新概念，你能够始终以最快、最高效、最强大的方法让用户的数据保持最新。\n\n## 第 11 章\n\n## Core Data 配方\n\
  \n开发者面临的最常见问题之一是持久化概念，或更简单地说，是存储数据。对于很大比例的应用程序而言，简单地在变量中存储信息是不够的，因为一旦应用程序关闭，所有内容都将丢失。虽然前一章涵盖了在多次使用之间存储数据的多种选项，但没有一个能比得上\
  \ Core Data 的多功能性、强大性和简洁性。\n\n有大量的资源，包括整本书（我强烈推荐 Michael Privat 和 Robert Warner\
  \ 所著的 *Pro Core Data for iOS*），它们仅专注于 Core Data 这一主题。指望在一章中涵盖如此多面化概念的每个部分是不现实的。因此，你不是从头开始构建\
  \ Core Data 接口，而是使用预构建的 Xcode 模板，以便提供对 Core Data 概念的最简单演示。这样，作为开发者的你可以更轻松地掌握 Core\
  \ Data 应用，然后通过其他更专门的来源，专注于该主题更具体、更复杂的要点。\n\n\n### 什么是 Core Data？\n\n`Core Data`\
  \ 是一种持久化方案。它不仅是一种持久化方案，而且是目前在 iOS 中实现持久化最佳的方法之一。\n\n简而言之，`Core Data` 与 `Xcode` 相结合，允许开发者执行三项主要任务：\n\
  \n1.  创建数据模型\n2.  持久化信息\n3.  访问数据\n\n首先，准确理解什么是数据模型非常重要。这个术语本质上指的是任何给定应用程序数据所围绕构建的结构。在简单的应用程序中，它可以是像\
  \ `NSString` 或 `NSArray` 这样简单的东西，一直到复杂、相互连接的对象类型系统，每种类型都有其自身的属性、方法和指向其他对象的指针。\n\n\
  其次，当您需要创建、保存和检索信息时，您应该对 `Core Data` 中涉及的各种对象和类有一个基本的了解，以及如何使用它们。\n\n1.  `NSManagedObjectModel`：这是一个不常见的类，因为如果您使用模板，在编写代码时几乎不会直接处理它。这是\
  \ iOS 引用您数据模型（稍后将创建）的方式。当您为第一个示例创建项目时，您会在应用程序委托中看到此类型的实例，并在一些预生成的方法中看到它的使用，但除此之外，您没有理由以编程方式处理这个类。\n\
  2.  `NSPersistentStoreCoordinator`：这是一个您很少需要处理的类。它主要在应用程序的后台工作，用于“协调”您的应用程序与底层数据库或“持久化存储”之间的交互，但您无需向其发送任何操作。关于这个类，您需要了解的最重要部分是所使用的持久化存储的“类型”。持久化存储有三种类型：\n\
  \    1.  `NSSQLiteStoreType`\n    2.  `NSBinaryStoreType`\n    3.  `NSInMemoryStoreType`\n\
  \n    默认值是第一种，`NSSQLiteStoreType`，指定您正在使用基于 `SQLite` 基础的持久化存储。您将在应用程序中继续使用此类型。\n\
  \n    根据您的应用程序，您可能还会发现 `NSInMemoryStoreType` 很有用，尽管它实际上不会在应用程序使用之间持久化数据。这可能更适合于缓存来自远程源信息的应用程序，因此需要一个基于\
  \ `Core Data` 构建的数据模型，但实际不需要存储信息，因为它可以从远程源重新检索。\n\n3.  `NSManagedObjectContext`：与前两个不同，这个类是您会经常处理的类。简单来说，这个类充当了您信息的“工作区”。任何时候您需要检索或存储信息，都需要一个指向此类的指针来执行操作。因此，在基于\
  \ `Core Data` 的应用程序中，一个非常常见的做法是通过为每个视图控制器提供一个 `NSManagedObjectContext` 属性，在应用程序的各个部分之间“传递”一个指向此类的指针。\n\
  4.  `NSFetchedResultsController`：这是真正通过 `NSManagedObjectContext` “获取”结果的主要类。它不仅非常强大，而且非常易于使用，特别是与\
  \ `UITableView` 结合使用时。您将在本章中看到大量使用此类的示例。\n\n在本章中，您还将使用各种其他特定于 `Core Data` 的类，但一旦您完成了数据模型的创建，这些类会更容易解释。\n\
  \n### 示例 11-1：创建数据模型\n\n在本章中，您将创建一个名为“MusicSchool”的新项目。请确保选择“Empty Application”（空应用程序）模板，如图\
  \ 11-1 所示。\n\n![图片](img/9781430240051_Fig11-01.jpg)\n\n**图 11-1.** *从头开始创建一个空应用程序*\n\
  \n在下一个屏幕上，当您输入项目名称“MusicSchool”时，请务必选中标记为“Use Core Data”（使用 Core Data）的复选框。这是获得一个方便的\
  \ `Core Data` 模板的最简单方法，它可以大大简化您的工作，并预生成大量必要的代码。将类前缀设置为“Main”，并确保也勾选了“Use Automatic\
  \ Reference Counting”（使用自动引用计数）复选框，如图 11-2 所示。“Company Identifier”（公司标识符）应更改为您自己的名称或公司名称。\n\
  \n![图片](img/9781430240051_Fig11-02.jpg)\n\n**图 11-2.** *配置项目以使用 Core Data*\n\n在下一个屏幕上点击“Create”（创建），像往常一样完成项目的创建。\n\
  \n既然您已设置好项目以使用 `Core Data` 模板，那么使用 `Core Data` 框架所需的大量工作实际上已经为您完成了，因此您可以直接进入构建数据模型的阶段。\n\
  \n您可能已经猜到，您的数据模型将用于表示音乐学校的概念，特别关注教师和学生。在您开始在 `Xcode` 中做任何事之前，您需要精确规划您的模型将如何工作。\n\
  \n在处理数据模型时，您首先要创建的一种项目是“实体”。实体本质上等同于 `Core Data` 中的对象，并以完全相同的方式表示一个对象。\n\n就像对象（或\
  \ Objective-C 中的 `NSObject`）具有属性一样，实体具有“属性”。这些是与任何给定实体相关的较简单的数据片段，例如姓名、年龄或生日，它们不需要指向任何其他实体的指针。\n\
  \n每当您希望一个实体拥有指向另一个实体的指针时，您就使用“关系”。关系可以是“对一”或“对多”，指的是一个实体是指向另一个实体的一个实例还是多个实例。当处理“对多”关系时，您会注意到该实体将拥有一个指向多个其他实体集合的指针。实体可以很容易地拥有指向自身的关系，例如，一个\
  \ `Person` 实体可能以配偶的形式拥有与另一个 `Person` 的关系。您还可以设置“反向关系”，它充当实体之间的往返路径。例如，一个 `Teacher`\
  \ 实体可能有一个名为“students”的对 `Student` 实体的“对多”关系，而 `Student` 对 `Teacher` 的关系（称为“teachers”）将是它的反向关系。这样，您就可以非常轻松地访问任何\
  \ `Teacher` 的 `Student` 列表以及它们各自的 `Teacher` 列表。\n\n因此，对于您的数据模型，您将拥有三个实体及其各自的属性和关系，如下所示：\n\
  \n1.  `Teacher`（教师）\n    1.  属性：姓名、年龄、主要语言和教学年限\n    2.  关系：Students（对多）和 Instruments（对多）\n\
  2.  `Student`（学生）\n    1.  属性：姓名、年龄、主要语言和技能水平\n    2.  关系：Teacher（对一）和 Instrument（对一）\n\
  3.  `Instrument`（乐器）\n    *   属性：名称和类别\n    *   关系：Students（对多）和 Teachers（对多）\n\n\
  虽然这些在对象之间来回定义的关系看起来可能有点复杂，但这实际上将允许您创建一个非常定义明确的数据模型，您可以从中查询几乎任何您需要的、来自另一个对象的信息。例如，您也许可以轻松地找到所有会弹钢琴的教师，然后访问他们各自的名字。\n\
  \n\n\n现在你已经规划好数据模型，可以在 Xcode 中进行构建。切换到你的数据模型文件，如果你使用了“MusicSchool”项目名称，该文件通常名为 `MusicSchool.xcdatamodeld`。你的视图应类似于\
  \ Figure 11-3。\n\n![Image](img/9781430240051_Fig11-03.jpg)\n\n**图 11–3.** *你的空白数据模型*\n\
  \n如果窗口看起来像 Figure 11-4，你应切换为 Xcode 窗口右下角两个选项中的第一种编辑器样式。在本教程中，你只会使用第一种编辑器样式来实际配置数据模型。\n\
  \n![Image](img/9781430240051_Fig11-04.jpg)\n\n**图 11–4.** *图形编辑器样式*\n\n你可以通过屏幕右下角的选项轻松更改数据模型的编辑器样式。选择两个选项中的左侧那个（即前两幅图中的第一个），使选择器看起来像\
  \ Figure 11-5。\n\n![Image](img/9781430240051_Fig11-05.jpg)\n\n**图 11–5.** *确保为本食谱选择第一种编辑器样式。*\n\
  \n接下来，你将添加三个实体。你可以从“Editor”菜单中执行此操作，也可以使用视图中央下方的“Add Entity”按钮，该按钮如 Figure 11-6\
  \ 所示。\n\n![Image](img/9781430240051_Fig11-06.jpg)\n\n**图 11–6.** *使用此按钮创建新实体。*\n\
  \n你将立即可以更改实体的名称，将其重命名为“Teacher”并按回车。\n\n重复此操作两次以创建“Student”和“Instrument”实体。先创建所有实体再逐个配置会更容易，因为你需要它们来构建关系。之后，如果你选择“Teacher”实体，其实体列表应类似于\
  \ Figure 11-7。\n\n![Image](img/9781430240051_Fig11-07.jpg)\n\n**图 11–7.** *将实体重命名以匹配你的数据计划。*\n\
  \n你将从配置“Teacher”实体开始，请确保选中此实体。\n\n接下来，在“Teacher”实体的“Attributes”区域下，单击“+”按钮四次，为你的每个属性添加一次。根据你的计划命名每个属性（“name”、“age”、“language”和“years”即可）。对于每个属性，你还必须选择“Type”。对“name”和“language”属性使用“String”类型，对其他属性使用“Integer\
  \ 16”类型，如 Figure 11-8 所示。\n\n**注意：** 不同类型的整数（如 Integer 16、32、64）指的是用于存储每个值的位数。这些数字限制了你可使用的最大值，16\
  \ 位值只能存储到 65,535。32 位值可存储到 4,294,967,295，而 64 位值可存储 10¹⁸ 量级的巨大数值。由于你的数字相当小，直接使用“Integer\
  \ 16”类型即可。\n\n![Image](img/9781430240051_Fig11-08.jpg)\n\n**图 11–8.** *配置 Teacher\
  \ 实体的属性*\n\n现在，在“Relationships”区域下，使用“+”按钮添加两个关系。将它们命名为“students”和“instruments”，并确保它们的\
  \ destination 值设置正确，如 Figure 11-9 所示（“students”关系对应“Student”，以此类推）。在你在其他实体中创建更多关系之前，你还无法设置“Inverse”关系。\n\
  \n![Image](img/9781430240051_Fig11-09.jpg)\n\n**图 11–9.** *配置 Teacher 实体的关系*\n\n\
  像为 XIB 文件中的任何视图元素调出“Attributes inspector”一样，调出“Data Model inspector”。选择创建的关系之一后，在检查器中勾选“To-Many\
  \ Relationship”复选框，如 Figure 11-10 所示。请确保对 Teacher 的两个关系都执行此操作，因为根据你的计划，它们都是“to-many”关系。\n\
  \n![Image](img/9781430240051_Fig11-10.jpg)\n\n**图 11–10.** *将关系配置为“To-Many”*\n\n\
  尽管你可能不需要担心此检查器中的大多数其他值（至少从你的目的来看），但一个较重要的值是“Delete Rule”下拉菜单，如 Figure 11-10 所示。该值指定了当给定实体的实例从\
  \ `NSManagedObjectContext` 中删除时，此关系将如何处理。它有四个可能的值：\n\n1.  *No Action*：这可能是最危险的值，因为它只是允许相关对象继续尝试访问已删除的对象，如果不小心处理，很容易导致访问问题。\n\
  2.  *Nullify*：默认值，指定关系在删除时将被空值化，因此会返回 `nil` 值。\n3.  *Cascade*：使用此值可能有些危险，因为它指定如果某个对象被删除，所有通过此\
  \ Delete Rule 与之关联的对象也会被删除，以避免产生 `nil` 值。如果不小心使用，可能会意外删除大量数据，但它也非常适合保持数据清洁。例如，在包含多个对象的“文件夹”场景中可以使用此规则。当删除文件夹时，你通常也希望删除其中所有包含的对象。\n\
  4.  *Deny*：只要关系未指向 `nil`，此规则将阻止对象被删除。\n\n在本教程中，你将 Delete Rule 保留为“Nullify”。\n\n\
  现在，选择你将进行配置的“Student”实体，添加你的四个属性（“age”、“language”、“name”和“skill”），并为它们指定适当的类型，如\
  \ Figure 11-11 所示（除了 `age` 再次使用“Integer 16”外，其余均使用“String”）。\n\n![Image](img/9781430240051_Fig11-11.jpg)\n\
  \n**图 11–11.** *配置 Student 实体的属性*\n\n再创建两个关系“instrument”和“teacher”，并设置它们各自的 destination。你现在还可以将“teacher”关系的“Inverse”设置为“students”，如\
  \ Figure 11-12 所示。Teacher 实体中的“students”关系将自动将你刚创建的“teacher”关系设置为其 inverse。\n\n\
  **注意：** 逆关系并非总是必需的，但它们往往能让应用的组织和流程变得更好，使你能够更轻松地从任意数据访问所需的任何其他数据。\n\n回顾你最初的数据模型计划，你会看到\
  \ Student 的两个关系不应是“to-many”，因此你无需进行此更改。\n\n![Image](img/9781430240051_Fig11-12.jpg)\n\
  \n**图 11–12.** *配置 Student 实体的关系*\n\n现在，你将配置第三个实体“Instrument”。它将拥有两个“String”类型的属性，分别名为“name”和“family”，如\
  \ Figure 11-13 所示。\n\n![Image](img/9781430240051_Fig11-13.jpg)\n\n**图 11-13.** *配置\
  \ Instrument 实体的属性*\n\n你将创建两个关系“teachers”和“students”，并指定它们各自的 destination。你应该能为这两个关系设置\
  \ inverse，如 Figure 11-14 所示。\n\n![Image](img/9781430240051_Fig11-14.jpg)\n\n**图\
  \ 11-14.** *配置 Instrument 实体的关系*\n\n最后，请确保在“Data Model inspector”中将这两个关系都指定为“to-many”，与之前操作相同。\n\
  \n\n\n实际上，这就是创建数据模型所需的全部操作！如果切换到第二种 `Editor` 样式，你甚至可以看到实体间相互关联、属性及关系的一幅精美小型关系图，其中单箭头表示“对一”关系，双箭头表示“对多”关系。这些块最初可能全部堆叠在一起，但如果你将它们拖开，显示效果应该类似于图\
  \ 11-15。\n\n![Image](img/9781430240051_Fig11-15.jpg)\n\n**图 11-15.** *完成数据模型后的最终图形视图*\n\
  \n### 食谱 11-2：使用 NSManagedObjects\n\n现在你已经设置好了数据模型，可以开始构建应用程序的实际用户界面了。\n\n你将以这种方式构建应用程序：能够查看三个不同的标签页，每个标签页都包含一个\
  \ `UITableView`，显示数据中某个实体的所有内容，并且每个标签页显示不同的实体。与其构建三个具有几乎完全相同设置的视图控制器，不如只构建一个，然后自定义显示的信息。\n\
  \n在你的项目中，创建一个名为“MainTableViewControlle”的新的 `UIViewController` 子类文件。在 XIB 文件中，向视图添加一个\
  \ `UITableView`，并使用属性名称 `tableViewMain` 将其连接到视图控制器的头文件。有关具体操作方法，请参考第 8 章。\n\n你可以直接让这个\
  \ `UITableView` 填满整个视图，并将其保留为“Plain”样式，如图 11-16 所示。\n\n![Image](img/9781430240051_Fig11-16.jpg)\n\
  \n**图 11-16.** *设置你的 `UITableView`*\n\n接下来，在 `-viewDidLoad` 方法中使用以下两行代码为表格设置委托和数据源：\n\
  \n```\nself.tableViewMain.delegate = self;\nself.tableViewMain.dataSource = self;\n\
  ```\n\n当然，你还需要将 `UITableViewDelegate` 和 `UITableViewDataSource` 协议添加到视图控制器的头文件中。\n\
  \n此外，在 `-viewDidLoad` 方法中添加以下代码行，以便在导航栏中创建一个“添加”按钮。稍后你将实现其触发的操作。\n\n```\nself.navigationItem.rightBarButtonItem\
  \ = [[UIBarButtonItem alloc]\ninitWithBarButtonSystemItem:UIBarButtonSystemItemAdd\
  \ target:self action:@selector(add)];\n```\n\n你需要为视图控制器添加更多属性，以跟踪 Core Data 对象。添加以下三个属性，并确保正确合成和处理它们。\n\
  \n```\n@property (nonatomic, strong) NSEntityDescription *entityDescription;\n@property\
  \ (nonatomic, strong) NSFetchedResultsController *fetchedResultsController;\n@property\
  \ (nonatomic, strong) NSManagedObjectContext *managedObjectContext;\n```\n\n`NSEntityDescription`\
  \ 类的一个实例，用通俗的话说，就是一个实体的描述。在其最简单的使用方式中，你只需给它一个 `name`。然后，当你通过 `NSManagedObjectContext`\
  \ 使用这个 `NSEntityDescription` 查询数据库时，它会专门获取指定实体的实例。\n\n你的 `entityDescription` 属性将帮助你轻松跟踪某个视图控制器正在获取的是教师、学生还是乐器数据。`fetchedResultsController`\
  \ 将跟踪你获取的数据，而 `managedObjectContext` 属性则允许你进行任何必要的数据请求。\n\n接下来，你需要为你的 `UITableView`\
  \ 实现必需的委托和数据源方法。首先，是指定行数的方法：\n\n```\n-(NSInteger)tableView:(UITableView *)tableView\
  \ numberOfRowsInSection:(NSInteger)section\n{\n     return [[self.fetchedResultsController\
  \ fetchedObjects] count];\n}\n```\n\n如上所示，`NSFetchedResultsController` 类包含一个方法 `-fetchedObjects`，该方法返回一个\
  \ `NSArray`，其中包含查询到的对象。\n\n以下是配置 `UITableView` 单元格的方法：\n\n```\n-(UITableViewCell\
  \ *)tableView:(UITableView *)tableView\ncellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
  {\n    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell *cell\
  \ = [tableView\ndequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell\
  \ == nil)\n{\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\
  \ reuseIdentifier:CellIdentifier];\n        cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n\
  \        cell.textLabel.font = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font\
  \ = [UIFont systemFontOfSize:12];\n    }\n```\n\n\n\n```\nNSManagedObject *object\
  \ = [self.fetchedResultsController\nobjectAtIndexPath:indexPath];\ncell.textLabel.text\
  \ = [object valueForKey:@\"name\"];\n\nif ([object.entity.name isEqualToString:@\"\
  Instrument\"])\n{\n    cell.detailTextLabel.text = [object valueForKey:@\"family\"\
  ];\n}\nelse\n{\n    cell.detailTextLabel.text = [[object valueForKey:@\"age\"] stringValue];\n\
  }\nreturn cell;\n```\n\n如您所见，您可以通过使用 `NSManagedObject` 类指向实体实例，然后使用 `-valueForKey:`\
  \ 方法查询特定属性，从而访问实体的属性。稍后您将看到更简单、更自然的实现方式，但理解 `NSManagedObject` 作为一个可以代表任何实体的类的概念非常重要。\n\
  \n您可能还会注意到，无需访问 `indexPath` 的 `row` 值来传递给 `NSFetchedResultsController`。这是使用 Core\
  \ Data 的好处之一，即获取请求的结果可以非常容易地集成到 `UITableView` 中。\n\n现在您的 `UITableView` 已经设置好，您只需确保视图控制器能够获取其需要显示的信息即可。为此，您将设置一个单独的方法，如下所示：\n\
  \n```\n-(void)fetchResults\n{\n    NSFetchRequest *fetchRequest = [NSFetchRequest\n\
  fetchRequestWithEntityName:self.entityDescription.name];\n    NSString *cacheName\
  \ = [self.entityDescription.name\nstringByAppendingString:@\"Cache\"];\n\n    NSSortDescriptor\
  \ *sortDescriptor = [NSSortDescriptor sortDescriptorWithKey:@\"name\"\nascending:YES];\n\
  \    [fetchRequest setSortDescriptors:[NSArray arrayWithObject:sortDescriptor]];\n\
  \n    self.fetchedResultsController = [[NSFetchedResultsController alloc]\ninitWithFetchRequest:fetchRequest\
  \ managedObjectContext:self.managedObjectContext\nsectionNameKeyPath:nil cacheName:cacheName];\n\
  \    BOOL success;\n    NSError *error;\n    success = [self.fetchedResultsController\
  \ performFetch:&error];\n    if (!success)\n    {\n        NSLog(@\"%@\", [error\
  \ localizedDescription]);\n    }\n}\n```\n\n如有必要，请将此方法的处理程序添加到您的头文件中，以避免任何编译器警告（例如，如果您在\
  \ `-viewDidLoad` 之后实现此方法）。\n\n考虑到前述方法的重要性，理解执行数据“获取”所需的确切步骤至关重要。\n\n1.  获取所需的第一件事是\
  \ `NSFetchRequest` 类的一个实例。这里，您使用了一个指定初始化器来指定一个 `NSEntityDescription`，不过您也可以稍后使用\
  \ `-setEntity:` 方法添加它。\n2.  虽然不是必须的，但您为获取请求设置了一个“缓存名称”，每个实体使用不同的缓存。如果您频繁进行获取请求，这可以稍微提升应用程序的速度，因为首先会检查本地缓存是否已经执行过该请求。\n\
  3.  每个 `NSFetchRequest` 实例必须至少关联一个 `NSSortDescriptor`。这里，您为每个实体的 `name` 属性指定了一个非常简单的字母排序。创建好所有\
  \ `NSSortDescriptor` 后，必须使用 `-setSortDescriptors:` 方法将它们附加到 `NSFetchRequest` 上。\n\
  4.  一旦您的 `NSFetchRequest` 完全配置好，您就可以使用 `NSFetchRequest` 和 `NSManagedObjectContext`\
  \ 来完全初始化您的 `NSFetchedResultsController`。最后两个参数都是可选的，不过您为了优化而指定了一个 `cacheName`。如果您希望忽略它们，可以将两者都设置为\
  \ `nil`。\n5.  最后，您必须使用 `performFetch:` 方法实际完成您的获取请求并检索存储的数据。使用此方法，您可以传递一个指向 `NSError`\
  \ 的指针（如前所示），以跟踪并记录获取过程中发生的任何错误。\n\n最后，您将在 `-viewDidLoad` 方法中添加一行代码来调用此方法。\n\n`[self\
  \ fetchResults];`\n\n总的来说，您的 `-viewDidLoad` 方法应如下所示：\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n\n    self.tableViewMain.delegate = self;\n    self.tableViewMain.dataSource\
  \ = self;\n\n    self.navigationItem.rightBarButtonItem = [[UIBarButtonItem alloc]\n\
  initWithBarButtonSystemItem:UIBarButtonSystemItemAdd target:self action:@selector(add)];\n\
  \n    [self fetchResults];\n}\n```\n\n现在您已完成视图控制器的配置，需要返回应用委托并设置基本的导航系统来使用它。\n\n\
  首先，在您的应用委托头文件中，为视图控制器的头文件添加一条导入语句，以安抚编译器。\n\n`#import \"MainTableViewController.h\"\
  `\n\n现在，您将把所有视图控制器声明为应用委托的属性。您还将把每个视图控制器放在一个 `UINavigationController` 中，并将这三个导航控制器都放在一个\
  \ `UITabBarController` 中，以确保信息流顺畅。将所有以下属性添加到您的应用委托中，并确保一如既往地合成它们。\n\n```\n@property\
  \ (strong, nonatomic) MainTableViewController *teacherTable;\n@property (strong,\
  \ nonatomic) MainTableViewController *studentTable;\n@property (strong, nonatomic)\
  \ MainTableViewController *instrumentTable;\n@property (strong, nonatomic) UINavigationController\
  \ *teacherNavcon;\n@property (strong, nonatomic) UINavigationController *studentNavcon;\n\
  @property (strong, nonatomic) UINavigationController *instrumentNavcon;\n\n@property\
  \ (strong, nonatomic) UITabBarController *tabBarController;\n```\n\n现在，您需要修改 `Application`\
  \ `Delegate` 类中的 `-application:didFinishLaunchingWithOptions:` 方法，以正确配置所有视图控制器。整体上，它将如下所示：\n\
  \n```\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    self.window.backgroundColor = [UIColor whiteColor];\n\
  \n    self.teacherTable = [[MainTableViewController alloc] init];\n    self.teacherTable.entityDescription\
  \ = [NSEntityDescription entityForName:@\"Teacher\"\ninManagedObjectContext:self.managedObjectContext];\n\
  \    self.teacherTable.managedObjectContext = self.managedObjectContext;\n    self.teacherTable.title\
  \ = @\"Teachers\";\n\n    self.studentTable = [[MainTableViewController alloc] init];\n\
  \    self.studentTable.entityDescription = [NSEntityDescription entityForName:@\"\
  Student\"\ninManagedObjectContext:self.managedObjectContext];\n    self.studentTable.managedObjectContext\
  \ = self.managedObjectContext;\n    self.studentTable.title = @\"Students\";\n\n\
  \    self.instrumentTable = [[MainTableViewController alloc] init];\n    self.instrumentTable.entityDescription\
  \ = [NSEntityDescription entityForName:@\"Instrument\" inManagedObjectContext:self.managedObjectContext];\n\
  \    self.instrumentTable.managedObjectContext = self.managedObjectContext;\n  \
  \  self.instrumentTable.title = @\"Instruments\";\n\n    self.teacherNavcon = [[UINavigationController\
  \ alloc]\ninitWithRootViewController:self.teacherTable];\n    self.studentNavcon\
  \ = [[UINavigationController alloc]\ninitWithRootViewController:self.studentTable];\n\
  \    self.instrumentNavcon = [[UINavigationController alloc]\ninitWithRootViewController:self.instrumentTable];\n\
  \n    self.tabBarController = [[UITabBarController alloc] init];\n    [self.tabBarController\
  \ setViewControllers:[NSArray\narrayWithObjects:self.teacherNavcon, self.studentNavcon,\
  \ self.instrumentNavcon, nil]];\n\n    [self.window addSubview:self.tabBarController.view];\n\
  \    [self.window makeKeyAndVisible];\n    return YES;\n}\n```\n\n\n```markdown\n\
  \n每个`MainTableViewController`的配置都相当简单，只需设置一个`NSEntityDescription`，为其提供一个指向`NSManagedObjectContext`的指针，然后给它一个在`UITabBarController`中显示的标题。\n\
  \n此时，如果运行应用程序，你只会看到几个空表格（如图 11-17 所示），这是有原因的——你还没有任何数据！不幸的是，你还没有构建`-add`方法，所以在完成之前不要按那个\
  \ + 按钮，否则应用程序会崩溃。\n\n![Image](img/9781430240051_Fig11-17.jpg)\n\n**Figure 11-17.**\
  \ *三个空的`UITableView`*\n\n对于初步的尝试，你可以先从在每个视图控制器中以编程方式创建一个新对象开始，以便显示数据。将以下代码添加到`MainViewController`的`-viewDidLoad`方法中，并确保它位于对`-fetchResults`的调用之前。\n\
  \n```\nNSManagedObject *add = [[NSManagedObject alloc] initWithEntity:self.entityDescription\n\
  insertIntoManagedObjectContext:self.managedObjectContext];\n    if (![self.entityDescription.name\
  \ isEqualToString:@\"Instrument\"])\n    {\n        [add setValue:@\"Jim\" forKey:@\"\
  name\"];\n        [add setValue:[NSNumber numberWithInt:42] forKey:@\"age\"];\n\
  \    }\n    else\n    {\n        [add setValue:@\"Trumpet\" forKey:@\"name\"];\n\
  \        [add setValue:@\"Brass\" forKey:@\"family\"];\n    }\n```\n\n现在，当你运行应用程序时，会显示一些临时数据，如图\
  \ 11-18 所示。\n\n![Image](img/9781430240051_Fig11-18.jpg)\n\n**Figure 11–18.** *半填充的`UITableView`*\n\
  \n虽然你已经在`NSManagedObjectContext`中为每个实体创建了一个新实例，但你可能会注意到，每次运行应用程序时，这些对象并不会持久保存——你不会看到每次运行都会增加一个列表。这是因为你没有保存对`NSManagedObjectContext`所做的更改。你可以通过在之前的添加代码之后（但在对`-fetchRequest`的调用之前）添加以下代码来实现保存。\n\
  \n```\nNSError *error;\n    BOOL success = [self.managedObjectContext save:&error];\n\
  \    if (!success)\n    {\n        NSLog(@\"%@\", [error localizedDescription]);\n\
  \    }\n```\n\n你会注意到，这与你在`-fetchResults`中使用的`-performFetch:`方法非常相似：你向它发送一个指向`NSError`实例的指针，以便记录任何问题。与之前一样，这完全是可选的，你可以传递`nil`作为此参数，但为了最佳实践，包含日志记录更为安全。\n\
  \n如果你多次运行应用程序并更改名称，可以累积一些不同的数据来显示。图 11-19 显示了应用程序在运行几次以收集一些数据后的情况。\n\n![Image](img/9781430240051_Fig11-19.jpg)\n\
  \n**Figure 11–19.** *应用程序保存并创建新数据*\n\n为了让程序运行得更好，你可以继续实现`-add`方法，以便从应用程序内部创建新数据。通常，你会希望创建单独的视图控制器，允许用户输入新对象的信息，但就本教程而言，关键概念仅仅是能够添加对象。\n\
  \n```\n-(void)add\n{\n    NSManagedObject *add = [[NSManagedObject alloc]\ninitWithEntity:self.entityDescription\n\
  insertIntoManagedObjectContext:self.managedObjectContext];\n    if (![self.entityDescription.name\
  \ isEqualToString:@\"Instrument\"])\n    {\n        [add setValue:@\"Peter\" forKey:@\"\
  name\"];\n        [add setValue:[NSNumber numberWithInt:35] forKey:@\"age\"];\n\
  \    }\n    else\n    {\n        [add setValue:@\"Guitar\" forKey:@\"name\"];\n\
  \        [add setValue:@\"Strings\" forKey:@\"family\"];\n    }\n\n    NSError *error;\n\
  \    BOOL success = [self.managedObjectContext save:&error];\n    if (!success)\n\
  \    {\n        NSLog(@\"%@\", [error localizedDescription]);\n    }\n\n    [self\
  \ fetchResults];\n\n    [self.tableViewMain reloadData];\n}\n```\n\n在上述方法中，你必须确保在创建新对象后、重新加载`UITableView`的数据之前调用`-fetchResults`方法，以确保你的`NSFetchedResultsController`包含最新的更改。\n\
  \n正如 Core Data 使得`UITableView`的填充变得非常容易一样，结合 Core Data 类实现从`UITableView`中删除项目也非常简单。你可以像这样实现`UITableView`的`-tableView:commitEditingStyle:forRowAtIndexPath:`方法：\n\
  \n```\n-(void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\
  \ forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
  \    {\n        NSManagedObject *deleted = [self.fetchedResultsController\nobjectAtIndexPath:indexPath];\n\
  \        [self.managedObjectContext deleteObject:deleted];\n        NSError *error;\n\
  \        BOOL success = [self.managedObjectContext save:&error];\n        if (!success)\n\
  \        {\n            NSLog(@\"%@\", [error localizedDescription]);\n        }\n\
  \        [self fetchResults];\n        [self.tableViewMain deleteRowsAtIndexPaths:[NSArray\
  \ arrayWithObject:indexPath]\nwithRowAnimation:UITableViewRowAnimationRight];\n\
  \    }\n}\n```\n\n虽然允许用户通过滑动行来删除肯定是可行的，但通常最好也提供一个编辑按钮，以防用户不熟悉滑动功能。为此，你首先需要对`-viewDidLoad`方法进行简单的调整，以创建该按钮，调整后的方法如下：\n\
  \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    self.tableViewMain.delegate\
  \ = self;\n    self.tableViewMain.dataSource = self;\n\n    /////Adjusted code to\
  \ add Edit button\n    UIBarButtonItem *addButton = [[UIBarButtonItem alloc]\ninitWithBarButtonSystemItem:UIBarButtonSystemItemAdd\
  \ target:self action:@selector(add)];\n    UIBarButtonItem *editButton = self.editButtonItem;\n\
  \    self.navigationItem.rightBarButtonItems = [NSArray arrayWithObjects:addButton,\n\
  editButton, nil];\n    /////End of adjusted code\n\n    [self fetchResults];\n}\n\
  ```\n\n现在，你只需要快速实现`-setEditing:animated:`方法，就能获得漂亮的动画效果。\n\n```\n-(void)setEditing:(BOOL)editing\
  \ animated:(BOOL)animated\n{\n    [super setEditing:editing animated:animated];\n\
  \    [self.tableViewMain setEditing:editing animated:animated];\n}\n```\n\n现在运行你的应用程序，你会注意到不仅可以添加，还可以从表格中删除信息，如图\
  \ 11-20 所示。\n\n![Image](img/9781430240051_Fig11-20.jpg)\n\n**Figure 11-20.** *应用程序，添加和删除数据*\n\
  \n```\n\n\n### 技巧 11-3：创建 `NSManagedObject` 的子类\n\n现在你已经设置好基础的 `UITableView` 来显示通过\
  \ Core Data 存储的信息，是时候进一步优化你的程序设计了。首先，有一项能极大节省时间的方法，能让 Core Data 编程变得简单得多：为创建的每个实体创建\
  \ `NSManagedObject` 的子类。不过，与大多数子类化操作不同，这种设置极其简单。\n\n首先，切换回 `MusicSchool.xcdatamodeld`\
  \ 文件，查看你创建的实体。\n\n下一步可以单独操作，但这里我们将一次性创建三个子类。按住 \"Command\" 键并点击每个实体，将它们全部选中，这样三个实体都会被高亮显示。你还会注意到，它们所有的属性和关系也会一并显示，如图\
  \ Figure 11-21 所示。\n\n你将使用的 `NSManagedObject` 子类化技术会基于所选实体创建子类，因此务必确保所有需要创建子类的实体都被选中。\n\
  \n![图片](img/9781430240051_Fig11-21.jpg)\n\n**图 11–21.** *选中全部三个实体，准备生成 `NSManagedObject`\
  \ 子类*\n\n接下来，在 \"File\" 菜单下，选择 `New` ![图片](img/U001.jpg)`New File...`，打开新建文件对话框。导航到\
  \ iOS 部分的 Core Data 栏目，选择 \"NSManagedObject subclass\" 选项，如图 Figure 11-22 所示。\n\n\
  ![图片](img/9781430240051_Fig11-22.jpg)\n\n**图 11-22.** *选择 \"NSManagedObject subclass\"\
  \ 模板，自动为你的实体生成类*\n\n点击继续，然后点击 \"Create\"，让 Xcode 为你创建三个 `NSManagedObject` 子类。\n\n\
  通过子类化 `NSManagedObject`，你实际上已将实体转化为可以正常使用和操作的类，尤其是在访问其属性时。现在，无需再使用 `-setValue:forKey:`\
  \ 和 `-valueForKey:` 方法，只需调用 setter 和 getter 方法，或者更简单地说，直接使用与属性同名的属性即可。这还能让你更轻松地指定任意\
  \ `NSManagedObject` 实例关联的具体实体，从而让编译器帮你验证该实体的属性和方法访问是否正确。\n\n为了演示这些功能，你可以重写 `-tableView:cellForRowAtIndexPath:`\
  \ 方法，先将 `NSManagedObject` 向下转型为对应的子类，再使用子类属性填充单元格内容。\n\n首先，确保在视图控制器中导入新创建的头文件。\n\
  \n```\n#import \"Instrument.h\"\n#import \"Student.h\"\n#import \"Teacher.h\"\n\
  ```\n\n完成这一步后，就可以实现简化后的方法了。\n\n```\n-(UITableViewCell *)tableView:(UITableView *)tableView\
  \ cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    static NSString *CellIdentifier\
  \ = @\"Cell\";\n\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
  \    if (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\
  \ reuseIdentifier:CellIdentifier];\n        cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n\
  \        cell.textLabel.font = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font\
  \ = [UIFont systemFontOfSize:12];\n    }\n\n    NSManagedObject *object = [self.fetchedResultsController\
  \ objectAtIndexPath:indexPath];\n\n    if ([object.entity.name isEqualToString:@\"\
  Instrument\"])\n    {\n        Instrument *instrument = (Instrument *)object;\n\
  \        cell.textLabel.text = instrument.name;\n        cell.detailTextLabel.text\
  \ = instrument.family;\n    }\n    else if ([object.entity.name isEqualToString:@\"\
  Student\"])\n    {\n        Student *student = (Student *)object;\n        cell.textLabel.text\
  \ = student.name;\n        cell.detailTextLabel.text = [student.age stringValue];\n\
  \    }\n    else\n    {\n        Teacher *teacher = (Teacher *)object;\n       \
  \ cell.textLabel.text = teacher.name;\n        cell.detailTextLabel.text = [teacher.age\
  \ stringValue];\n    }\n\n    return cell;\n}\n```\n\n你还可以像这样简化创建测试数据的 `-add` 方法。\n\
  \n```\n-(void)add\n{\n    NSManagedObject *add = [[NSManagedObject alloc]\ninitWithEntity:self.entityDescription\n\
  insertIntoManagedObjectContext:self.managedObjectContext];\n    if ([self.entityDescription.name\
  \ isEqualToString:@\"Teacher\"])\n    {\n        Teacher *teacher = (Teacher *)add;\n\
  \        teacher.name = @\"Peter\";\n        teacher.age = [NSNumber numberWithInt:36];\n\
  \    }\n    else if ([self.entityDescription.name isEqualToString:@\"Instrument\"\
  ])\n    {\n        Instrument *instrument = (Instrument *)add;\n        instrument.name\
  \ = @\"Guitar\";\n        instrument.family = @\"Strings\";\n    }\nelse\n    {\n\
  \        Student *student = (Student *)add;\n        student.name = @\"Andrew\"\
  ;\n        student.age = [NSNumber numberWithInt:18];\n    }\n\n    NSError *error;\n\
  \    BOOL success = [self.managedObjectContext save:&error];\n    if (!success)\n\
  \    {\n        NSLog(@\"%@\", [error localizedDescription]);\n    }\n\n    [self\
  \ fetchResults];\n\n    [self.tableViewMain reloadData];\n}\n```\n\n再次强调，这并不会真正影响应用的运行方式，但它能大大简化你的编码和调试工作。\n\
  \n通过使用这种子类化技术，你在使用 Core Data 时遇到的运行时错误将大幅减少，因为编译器现在能够确认你是否为某个子类访问了正确的属性。\n\n就像你可以访问和编辑子类化\
  \ `NSManagedObject` 的属性一样，你也能对实体之间的关系进行同样的操作。接下来，我们将修改程序：当选中一个教师时，会显示已录入的乐器列表；当选中其中一个乐器时，该乐器会被添加到该教师的\
  \ `instruments` 集合中。你可能还会注意到，由于设置了逆关系，单向设置的关系也会自动反向设置。在这个例子中，当你把乐器添加到教师的 `instruments`\
  \ 集合时，该教师也会被添加到该乐器的 `teachers` 集合中。\n\n为演示起见，我们只在教师和乐器之间实现这一行为，但你应该能很容易地看出如何在这三个实体之间完全实现类似功能，从而允许用户将任意教师与其学生和乐器关联起来。\n\
  \n首先，在 `MainTableViewController` 的头文件中声明一个类型为 Teacher 的实例变量，用于跟踪选中的教师。\n\n```\n\
  __strong Teacher *selectedTeacher;\n```\n\n接下来，你需要声明一个与类类型相同的新属性 `delegate`，用于连接多个视图控制器。请确保适当地合成并将此属性置为\
  \ nil。\n\n```\n@property (nonatomic, strong) MainTableViewController *delegate;\n\
  ```\n\n同时，为 `delegate` 属性声明一个方法头，如下所示：\n\n```\n-(void)MainTableViewController:(MainTableViewController\
  \ *)mainTableVC\ndidSelectInstrument:(Instrument *)instrument;\n```\n\n你的头文件（`MainTableViewController.h`）现在应如下所示：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import \"Instrument.h\"\n#import \"Student.h\"\n\
  #import \"Teacher.h\"\n```\n\n\n\n#### `@interface MainTableViewController : UIViewController\
  \ <UITableViewDelegate, UITableViewDataSource>`\n\n```\n{\n    __strong Teacher\
  \ *selectedTeacher;\n}\n```\n\n`@property (strong, nonatomic) IBOutlet UITableView\
  \ *tableViewMain;`\n\n`@property (nonatomic, strong) NSEntityDescription *entityDescription;`\n\
  \n`@property (nonatomic, strong) NSFetchedResultsController *fetchedResultsController;`\n\
  \n`@property (nonatomic, strong) NSManagedObjectContext *managedObjectContext;`\n\
  \n`@property (nonatomic, strong) MainTableViewController *delegate;`\n\n`-(void)MainTableViewController:(MainTableViewController\
  \ *)mainTableVC didSelectInstrument:(Instrument *)instrument;`\n\n`@end`\n\n接下来，你将结合使用\
  \ `delegate` 属性和 `UITableView` 的行选择方法，来构建你的新功能——尽管是选择性的功能。\n\n`-(void)tableView:(UITableView\
  \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath`\n```\n{\n    [self.tableViewMain\
  \ deselectRowAtIndexPath:indexPath animated:YES];\n    if ([self.entityDescription.name\
  \ isEqualToString:@\"Teacher\"])\n    {\n        selectedTeacher = [self.fetchedResultsController\
  \ objectAtIndexPath:indexPath];\n        MainTableViewController *selectInstrument\
  \ = [[MainTableViewController alloc] init];\n        selectInstrument.entityDescription\
  \ = [NSEntityDescription entityForName:@\"Instrument\" inManagedObjectContext:self.managedObjectContext];\n\
  \        selectInstrument.managedObjectContext = self.managedObjectContext;\n  \
  \      selectInstrument.delegate = self;\n        [self.navigationController pushViewController:selectInstrument\
  \ animated:YES];\n    }\n    else if ([self.entityDescription.name isEqualToString:@\"\
  Instrument\"] && (self.delegate != nil))\n    {\n        [self.delegate MainTableViewController:self\
  \ didSelectInstrument:[self.fetchedResultsController objectAtIndexPath:indexPath]];\n\
  \        [self.navigationController popViewControllerAnimated:YES];\n    }\n}\n\
  ```\n\n现在，你可以实现刚才声明的 `delegate` 方法，将选中的 Instrument 添加到 `selectedTeacher` 中，然后将更改保存到\
  \ `NSManagedObjectContext`。\n\n`-(void)MainTableViewController:(MainTableViewController\
  \ *)mainTableVC didSelectInstrument:(NSManagedObject *)instrument`\n```\n{\n   \
  \ [selectedTeacher addInstrumentsObject:instrument];\n    NSError *saveError;\n\
  \    BOOL success = [self.managedObjectContext save:&saveError];\n    if (!success)\n\
  \    {\n        NSLog(@\"%@\", [saveError localizedFailureReason]);\n    }\n}\n\
  ```\n\n由于你尚未为用户构建一个完整的自定义数据创建系统，你需要多次调整 `-add` 方法，每次运行应用程序，以创建一些不同的数据，从而充分测试此功能。\n\
  \n## 技巧 11–4：过滤你的提取请求\n\n当你使用 `NSFetchRequest` 实例从 `NSManagedObjectContext` 中获取信息时，你绝不局限于仅请求某个特定实体的全部数据。通过使用\
  \ `NSPredicate` 类，你可以根据应用需求轻松地将结果精确到几乎任何子集。\n\n对于你的应用，你将实现过滤行为，使其在点击 `UITableView`\
  \ 中的附件按钮时生效，并根据所点击的 `NSManagedObject` 类型执行不同的操作。\n\n*   如果在教师表中点击了附件按钮，你将显示另一个 `UITableView`，其中包含所选教师关联的所有乐器。\n\
  *   在学生表中点击附件按钮，将显示一个表格，列出与所选学生同龄的所有其他学生。\n*   在乐器表中，你将过滤数据，以显示与所选乐器具有相同 `family`\
  \ 的所有其他乐器。\n\n所有这些行为都将通过为你的 `NSFetchRequest` 设置一个 `NSPredicate` 并指定谓词来实现。\n\n首先，你将向\
  \ `MainTableViewController` 中添加一个属性来跟踪这个 `NSPredicate`，以便能够轻松创建并使用它来执行提取请求。\n\n\
  `@property (nonatomic, strong) NSPredicate *predicate;`\n\n你可以像这样实现 `UITableView`\
  \ 的委托方法：\n\n`-(void)tableView:(UITableView *)tableView accessoryButtonTappedForRowWithIndexPath:(NSIndexPath\
  \ *)indexPath`\n```\n{\n    if (![self.title isEqualToString:@\"Filtered\"])\n \
  \   {\n        MainTableViewController *filtered = [[MainTableViewController alloc]\
  \ init];\n        filtered.title = @\"Filtered\";\n        filtered.managedObjectContext\
  \ = self.managedObjectContext;\n\n        if ([self.entityDescription.name isEqualToString:@\"\
  Teacher\"])\n        {\n            filtered.entityDescription = [NSEntityDescription\
  \ entityForName:@\"Instrument\" inManagedObjectContext:self.managedObjectContext];\n\
  \            NSSet *instruments = [(Teacher *)[self.fetchedResultsController objectAtIndexPath:indexPath]\
  \ instruments];\n            filtered.predicate = [NSPredicate predicateWithFormat:@\"\
  self IN %@\", instruments];\n        }\n        else if ([self.entityDescription.name\
  \ isEqualToString:@\"Student\"])\n        {\n            filtered.entityDescription\
  \ = self.entityDescription;\n            filtered.predicate = [NSPredicate predicateWithFormat:@\"\
  age=%i\", [[(Student *)[self.fetchedResultsController objectAtIndexPath: indexPath]\
  \ age] intValue]];\n        }\n        else\n        {\n            filtered.entityDescription\
  \ = self.entityDescription;\n            filtered.predicate = [NSPredicate predicateWithFormat:@\"\
  family=%@\", [(Instrument *)[self.fetchedResultsController objectAtIndexPath:indexPath]family]];\n\
  \        }\n\n        [self.navigationController pushViewController:filtered animated:YES];\n\
  \    }\n}\n```\n\n正如你所见，你在实现中使用了两种不同风格的谓词。一种是简单的比较谓词，将 `family` 属性与一个值进行比较；另一种是检查集合中是否包含某个对象的谓词，用于教师。\n\
  \n无论何时需要在谓词中指定某个值，你都可以使用 `\"%@”`，然后传入该值，如前面代码块所示。如果你对这些称为“格式说明符”的值不太熟悉，一些常见的格式说明符包括：\n\
  \n*   `%@`：可以用来表示 `NSString` 值，或者简单地对一个对象的引用，就像你之前使用的那样。\n*   `%i`：表示一个整数。\n*  \
  \ `%f`：表示一个浮点数。\n*   `%d`：表示一个双精度浮点值。\n\n\n\n这些说明符源自 C 语言的格式化字符串打印功能，通常与 `NSLog()`\
  \ 命令一起使用，或在向用户显示信息时使用。例如，你可能有一段用于测试的代码来记录一个简单的计数器，如下所示：\n\n```\nfor (int n=0; n\
  \ < 100; n++)\n{\n    NSLog(@\"%i\", n);\n}\n```\n\n当你引用通过谓词求值的对象时，使用关键字 `self`，如第一个\
  \ `NSPredicate` 所示。\n\n有大量关于使用不同格式和方法创建 `NSPredicate` 的文档，这使得开发者能够在为结果创建过滤器时拥有强大的能力。有关创建更复杂谓词的更多信息，请参阅\
  \ Apple 文档。\n\n在即将完成此设置之前，你还需要修改 `-fetchResults` 方法，使其考虑 `NSPredicate`。新方法如下所示：\n\
  \n```\n-(void)fetchResults\n{\n    NSFetchRequest *fetchRequest = [NSFetchRequest\
  \ fetchRequestWithEntityName:self.entityDescription.name];\n    NSString *cacheName\
  \ = [self.entityDescription.name stringByAppendingString:@\"Cache\"];\n\n    ////////////New\
  \ Predicate code\n    if (self.predicate != nil)\n    {\n        [fetchRequest setPredicate:self.predicate];\n\
  \    }\n    ////////////End of new code\n\n    NSSortDescriptor *sortDescriptor\
  \ = [NSSortDescriptor sortDescriptorWithKey:@\"name\" ascending:YES];\n    [fetchRequest\
  \ setSortDescriptors:[NSArray arrayWithObject:sortDescriptor]];\n\n    self.fetchedResultsController\
  \ = [[NSFetchedResultsController alloc] initWithFetchRequest:fetchRequest managedObjectContext:self.managedObjectContext\
  \ sectionNameKeyPath:nil cacheName:cacheName];\n\n    BOOL success;\n    NSError\
  \ *error;\n    success = [self.fetchedResultsController performFetch:&error];\n\
  \    if (!success)\n    {\n        NSLog(@\"%@\", [error localizedDescription]);\n\
  \    }\n}\n```\n\n此时，如果你运行应用程序，可以看到一些过滤结果的示例，例如按系列过滤 Instruments，如图 Figure 11-23\
  \ 所示。\n\n![Image](img/9781430240051_Fig11-23.jpg)\n\n**Figure 11-23.** *你的应用程序显示过滤后的结果*\n\
  \n### Recipe 11–5: 版本控制\n\n对于几乎任何应用程序，你很可能需要在某个时候对 Core Data 模型进行更改。Xcode 提供了一种非常简单的方法来做到这一点，通过一个称为“版本控制”的过程，你可以轻松保留所有旧模型，以防出现问题。\n\
  \n第一步是创建数据模型的新版本，可以基于现有版本创建。首先，在左侧导航器窗格中选择 `MusicSchool.xcdatamodeld` 文件。\n\n在 Editor\
  \ 菜单中，选择 `Add Model Version…`。将出现一个简单的对话框，允许你指定新版本的名称，以及新版本所基于的模型。由于目前只有一个模型，它将是唯一的选择。将新模型命名为\
  \ `MusicSchool2`，如图 Figure 11-24 所示。\n\n![Image](img/9781430240051_Fig11-24.jpg)\n\
  \n**Figure 11-24.** *创建新版本*\n\n点击 Finish，新模型将被创建。\n\n现在，你可以对数据模型进行一些更改。就本应用程序而言，你只会进行相当简单的更改，以便稍后处理的迁移是一个简单的过程。为了保持轻量级迁移，你应该只遵循以下可能的更改：\n\
  \n*   添加或删除实体、属性或关系\n*   重命名属性或实体\n*   更改属性是否为可选\n\n对于新数据模型，你只需添加两个属性：首先，在 Instrument\
  \ 实体中添加一个名为 `size` 的 `NSString`，然后在 Instrument 实体中添加另一个名为 `range` 的 `NSString`。结果属性表将类似于\
  \ Figure 11-25。\n\n![Image](img/9781430240051_Fig11-25.jpg)\n\n**Figure 11-25.**\
  \ *向 Instrument 实体添加新属性*\n\n接下来，你需要指定这个最新模型版本为应用程序实际使用的版本。首先，选择 `.xcdatamodel` 文件的顶层，该文件将显示为文件类型\
  \ `xcdatamodeld`，并带有两个实际数据模型文件的下拉菜单，如图 Figure 11-26 所示。（这指定了实际选择的是哪个文件。）\n\n![Image](img/9781430240051_Fig11-26.jpg)\n\
  \n**Figure 11-26.** *查看项目的数据模型；当前使用的模型被列为主文件。*\n\n接下来，你需要调出 File inspector。可以通过在\
  \ View 菜单中导航到 `Utilities` ![Image](img/U001.jpg) `Show File Inspector`，或者调出屏幕右侧的\
  \ Utilities 面板，然后选择第一个选项卡来实现，如图 Figure 11-27 所示。\n\n**注意：** Xcode 当前不允许你从项目中删除数据模型文件。创建新版本时要小心，因为一旦创建，你将无法轻松删除它们。在图\
  \ Figure 11-27 中，你可以看到多个不需要或未使用的数据模型文件堆积在一起。\n\n![Image](img/9781430240051_Fig11-27.jpg)\n\
  \n**Figure 11-27.** *使用 File inspector 设置当前版本*\n\n在 Versioned Core Data Model 部分，你需要将当前模型更改为新的\
  \ `MusicSchool2`，具体如图 Figure 11-28 所示。\n\n![Image](img/9781430240051_Fig11-28.jpg)\n\
  \n**Figure 11-28.** *选择不同的当前版本*\n\n此时，你会注意到新模型版本旁边出现了一个小的绿色勾号，表示它现在是当前版本，如图 Figure\
  \ 11-29 所示。\n\n![Image](img/9781430240051_Fig11-29.jpg)\n\n**Figure 11-29.** *新的模型文件被设置为当前版本*\n\
  \n如果你立即尝试运行此应用程序，根据更改的复杂程度，应用程序可能会在运行时崩溃，并出现一个非常奇怪的原因：“The model used to open the\
  \ store is incompatible with the one used to create the store”。这 essentially 意味着你正在尝试将数据从旧模型迁移到新模型，但系统不知道如何处理。幸运的是，对于这些轻量级迁移，这很容易修复。\n\
  \n导航到你的应用程序委托实现文件，找到 `-persistentStoreCoordinator` 方法。查找以下行：\n\n```\nif (![__persistentStoreCoordinator\
  \ addPersistentStoreWithType:NSSQLiteStoreType configuration:nil URL:storeURL options:nil\
  \ error:&error])\n```\n\n你需要指定一个 `NSDictionary` 实例作为此方法的 `options` 参数。在之前的 `if`\
  \ 语句之前添加以下代码：\n\n```\nNSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber\
  \ numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, [NSNumber numberWithBool:YES],\
  \ NSInferMappingModelAutomaticallyOption, nil];\n```\n\n确保将此字典设置为实际参数，以便 `if` 语句现在读作：\n\
  \n```\nif (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
  \ configuration:nil URL:storeURL options:options error:&error])\n```\n\n现在，所有轻量级迁移将自动进行，极大地简化了你的工作。\n\
  \n如果你的应用程序在没有此更改的情况下运行完全正常，那么你无需担心此步骤，但要知道你可能在某个时候必须这样做。\n\n\n\n### 令人恼火的错误\n\n\
  有时在处理版本控制时，你可能会遇到一个由方法抛出的错误，提示无法找到持久化存储。一个简单但令人沮丧的解决方案是，在出现错误时，通过在前面提到的 `if` 语句中添加以下代码行，使用以下命令删除你的持久化存储。\n\
  \n```\n[[NSFileManager defaultManager] removeItemAtURL:storeURL error:nil];\n```\n\
  \n在这种情况下，你的 `if` 语句将类似以下代码。请记住，除非你遇到这个特定问题，否则你完全不需要也不应该添加这段代码。\n\n```\nif (![__persistentStoreCoordinator\
  \ addPersistentStoreWithType:NSSQLiteStoreType configuration:nil URL:storeURL options:options\
  \ error:&error])\n{\n    NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
  \    [[NSFileManager defaultManager] removeItemAtURL:storeURL error:nil];\n    abort();\n\
  }\n```\n\n在运行此应用程序一次后，你的持久化存储将被重置，因此一旦你的应用程序恢复正常工作，你应从方法中移除这行代码。这样，你的应用就不会在你未明确预期的情况下重置你的数据。\n\
  \n虽然这应该能解决问题，但不幸的是，你会丢失所有已保存的数据，因此通常最好避免这种极端的措施。\n\n此时，你的应用程序将再次正常工作，你可以添加代码以利用更新的模型版本。然而，由于你尚未更新你的\
  \ `NSManagedObject` 子类，你将无法使用 `-valueForKey:` 方法之外的方式访问任何新属性。因为你只对 Instrument 实体进行了更改，所以只需刷新你的\
  \ Instrument 子类。\n\n首先，删除 Instrument 子类文件。你可以选择完全删除文件，而不仅仅是移除其引用，因为你不再需要这个版本，并且如果必要，你始终可以从数据模型重新创建它。执行此操作的对话框将类似于图\
  \ 11-30。\n\n![图片](img/9781430240051_Fig11-30.jpg)\n\n**图 11-30.** *删除你的 Instrument\
  \ 子类文件；使用“删除”选项，因为你将重新创建它们。*\n\n现在，你可以按照与之前完全相同的步骤来创建你的子类。\n\n在你的数据模型文件中，选择 Instrument\
  \ 实体，然后导航到 `File` ![图片](img/U001.jpg) `New` ![图片](img/U001.jpg) `New File...`。\n\
  \n在“iOS 的 Core Data”下，选择“NSManagedObject subclass”模板（如图 11-31 所示），然后点击完成以创建你的新子类。\n\
  \n![图片](img/9781430240051_Fig11-31.jpg)\n\n**图 11-31.** *为你最新的版本重新创建 `NSManagedObject`\
  \ 子类*\n\n现在你将看到，你的 `Instrument` 类包含了所有必要的属性和方法，来处理新版版本化数据模型中新增的属性！\n\n### 总结\n\n\
  在本章中，我们介绍了 Core Data 的基础知识。由于其强大功能和在使用数据建模、持久化和访问时的简易性，它是 iOS 开发中最核心的部分之一。然而，我们绝没有详细描述\
  \ Core Data 框架的每一个方面，甚至没有触及与之相关的每一个主题。你可以轻松找到专门讨论 Core Data 的整本书，而且你可能确实应该这么做，以便更全面地了解你在控制数据存储方面究竟拥有多大的能力。这里的概述演示了该框架的基本用法，并解释了开始使用\
  \ Core Data 所需的关键概念，以便你能够在应用程序中实现简单的持久化，而无需担心更复杂的细节。\n\n## 第 12 章\n\n## Core Motion\
  \ 实例\n\n前两章花了大量篇幅讨论存储在设备内存中并持久化的信息。现在，我们将处理一个完全相反的主题：来自外部世界的数据——不是指用户提供的数据，而是设备在任何特定时刻关于其所处宇宙收集到的数据。通过获取外部世界的信息，开发者可以根据用户的物理情境，专门构建专注于增强用户体验的应用程序。这可以是从简单地检测设备方向，到将旋转整合到赛车游戏的转向系统中，再到使用加速度计测量过山车的加速度等任何功能。通过使用\
  \ Core Motion 框架，我们能够轻松访问 iOS 设备中内置的各种硬件，从而获取关于设备特定情境的独特信息，包括磁场、重力以及其他加速度、旋转速率等。\n\
  \n除本章的第一个实例外，你需要一台物理设备来测试功能，因为你将处理由设备的物理存在所生成的信息。\n\n\n\n### 配方 12–1：注册摇晃事件\n\n\
  在深入探讨 Core Motion 框架之前，我们可以先处理一个相关主题：设备的摇晃。大量应用以各种方式利用此功能，其效果从随机播放歌曲到刷新信息不一而足。虽然此实现不一定依赖\
  \ Core Motion 框架，但其能够检测设备物理变化这一关键概念使其成为一项需要理解的重要功能。\n\n我们将创建一个非常简单的应用来检测并记录设备的摇晃。在此基础上，我们将开始构建一个能够读取并显示运动信息的应用。\n\
  \n首先创建一个名为 `Measurements` 的新项目，该项目的成果将贯穿本章使用。对于这个简单应用，我们会使用单视图应用模板，如图 12-1 所示，这样能省去一些组装应用委托的工作。\n\
  \n选择模板后，输入项目名称，确保类前缀设置为 `Main`，并且仅勾选了“使用自动引用计数” (Use Automatic Reference Counting)\
  \ 复选框，然后点击下一步创建项目。\n\n![图片](img/9781430240051_Fig12-01.jpg)\n\n**图 12-1.** 配置你的\
  \ `UIWindow` 子类\n\n配置摇晃功能的第一项任务是，你需要指示你的应用在设备被摇晃（而非搅动）时发布一条通知。为此，你需要继承 `UIWindow`\
  \ 类。创建一个新文件，使用 iOS Cocoa Touch 部分下的 `Objective-C 类` 模板，如图 12-2 所示。\n\n![图片](img/9781430240051_Fig12-02.jpg)\n\
  \n**图 12-2.** 通过创建 Objective-C 类来继承 `UIWindow`\n\n继续操作，将类命名为 `MainWindow`，并确保在“继承自”\
  \ (Subclass of) 字段中输入 `UIWindow`，如图 12-3 所示。\n\n![图片](img/9781430240051_Fig12-03.jpg)\n\
  \n**图 12-3.** 配置你的 `UIWindow` 子类\n\n点击创建该子类，然后切换到它的实现文件 `MainWindow.m`。\n\n在这个类中，我们将重写\
  \ `-motionEnded:withEvent:` 方法，以便正确处理设备摇晃。每当设备被摇晃时，此方法会被自动调用。我们将编写代码让它发布一条通知，以便在其他类中跟踪该通知。\n\
  \n```\n-(void)motionEnded:(UIEventSubtype)motion withEvent:(UIEvent *)event\n{\n\
  \    if (motion == UIEventSubtypeMotionShake)\n    {\n        [[NSNotificationCenter\
  \ defaultCenter] postNotificationName:@\"NOTIFICATION_SHAKE\" object:event];\n \
  \   }\n}\n```\n\n如果你对 `NSNotificationCenter` 和发布通知的概念不太熟悉，你很快就会明白它们其实非常简单。任何给定的类都可以向\
  \ `NSNotificationCenter` 发布通知。任何“观察”着通知中心、寻找具有相同“名称”通知的类都会被通知到，并可以据此做出相应动作。这是一种根据实时事件在类之间传递信息的绝佳方式，通常用于处理用户输入的外部变化，例如调整设备音量或使用遥控器控制音乐应用。\n\
  \n接下来，你需要指定你的应用使用这个新的 `UIWindow` 子类。切换到你的应用委托，你会发现它已经有一个用于显示所有视图的 `UIWindow` 属性。\n\
  \n首先，在你的应用委托头文件中添加一条导入语句，以包含 `MainWindow` 类。\n\n```\n#import \"MainWindow.h\"\n\
  ```\n\n现在，在应用委托的实现文件中，将 `-application:DidFinishLaunchingWithOptions:` 方法修改如下：\n\n\
  ```\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    //////////唯一改变的行！\n    self.window = [[MainWindow alloc]\
  \ initWithFrame:[[UIScreen mainScreen] bounds]];\n    //////////只需更改上一行。\n\n   \
  \ self.viewController = [[MainViewController alloc] initWithNibName:@\"MainViewController\"\
  \ bundle:nil];\n    self.window.rootViewController = self.viewController;\n    [self.window\
  \ makeKeyAndVisible];\n    return YES;\n}\n```\n\n通过将分配并初始化 `window` 属性的类从 `UIWindow`\
  \ 修改为 `MainWindow`，你在代码中巧妙运用了多态：`window` 属性的类型是 `UIWindow`，但其行为却像一个 `MainWindow`。由于\
  \ `MainWindow` 是 `UIWindow` 的子类，这不会给你带来任何问题，也省去了你同时更改属性类型的麻烦。\n\n现在，你可以切换到主视图控制器，通过修改\
  \ `-viewDidLoad` 方法来注册 `NOTIFICATION_SHAKE` 通知。\n\n```\n- (void)viewDidLoad\n{\n\
  \    [super viewDidLoad];\n\n    [[NSNotificationCenter defaultCenter] addObserver:self\n\
  \    selector:@selector(shakeDetected:) name:@\"NOTIFICATION_SHAKE\" object:nil];\n\
  \n}\n```\n\n由于你在上一步中将 `shakeDetected:` 选择器指定为这些通知的动作，你需要实现这个方法以避免任何运行时异常。现在，它的实现会非常简单，但你稍后会在其基础上添加更多功能。\n\
  \n```\n-(void)shakeDetected:(NSNotification *)paramNotification\n{\n    NSLog(@\"\
  小心别把设备掉地上！\");\n}\n```\n\n虽然看起来可能有点奇怪，但实际你并不需要物理设备来测试这项功能。iOS 模拟器包含一个模拟设备摇晃动作的功能，以便你查看应用是否正确响应。\n\
  \n在查看模拟器时，在“硬件” (Hardware) 菜单中导航到“摇动手势” (Shake Gesture) (`Ctrl+![图片](img/U003.jpg)Z`)\
  \ 选项，如图 12-4 所示。\n\n![图片](img/9781430240051_Fig12-04.jpg)\n\n**图 12-4.** 模拟摇动手势\n\
  \n你不会在模拟器中看到任何摇晃动画，但它应该会正确响应并记录下你简单的日志。图 12-5 展示了在“摇晃”模拟器几次后应用的输出结果。\n\n![图片](img/9781430240051_Fig12-05.jpg)\n\
  \n**图 12-5.** “摇晃”模拟器后的输出结果\n\n如果你将 iOS 设备连接到 Xcode 并运行，一旦你轻轻摇晃设备，你将得到相同的结果！\n\n\
  \n\n# 配方 12–2：访问原始 Core Motion 数据\n\n现在你的应用已经具备了一些基本的摇动检测功能，你可以开始集成 Core Motion\
  \ 框架，它将允许你访问加速度计、陀螺仪和磁力计的信息。\n\n首先，选择你的项目，然后导航到 **Build Phases** 选项卡。在 **Link Binary\
  \ With Libraries** 下，点击 **+** 按钮，选择名为 `CoreMotion.framework` 的项，如图 12–6 所示。\n\n\
  ![图片](img/9781430240051_Fig12-06.jpg)\n\n**图 12–6.** *添加 CoreMotion 框架*\n\n现在回到你的主视图控制器的头文件中，添加以下导入语句，以便你可以访问\
  \ Core Motion API。\n\n```\n#import <CoreMotion/CoreMotion.h>\n```\n\nCore Motion\
  \ 框架非常依赖一个名为 `CMMotionManager` 的单一类。这个类作为一个中心枢纽，通过它可以访问任何给定设备上所有可用的硬件。你将在视图控制器中创建一个该类的实例作为属性，以便持续跟踪它。\n\
  \n```\n@property (nonatomic, strong) CMMotionManager *motionManager;\n```\n\n在你的视图控制器中，确保合成了这个属性，并按照标准做法，在\
  \ `-viewDidUnload` 方法中将其设置为 `nil`。\n\n不幸的是，仅仅合成一个 `CMMotionManager` 对象并不足以确保其初始化（就像\
  \ `NSArray` 一样），因此你将创建一个修改过的 getter 方法来解决这个问题。幸运的是，这样做不需要任何复杂的配置。\n\n```\n-(CMMotionManager\
  \ *)motionManager\n{\n    if (motionManager == nil)\n    {\n        motionManager\
  \ = [[CMMotionManager alloc] init];\n    }\n    return motionManager;\n}\n```\n\n\
  接下来，你将开始设置用户界面。首先，测量三种不同仪器的输出：加速度计、陀螺仪和磁力计。稍后你会更详细地了解这些仪器的用途，但现在你必须知道，每种仪器都会提供三个不同的值供你查看。因此，你将按照图\
  \ 12–7 所示设置你的视图。\n\n![图片](img/9781430240051_Fig12-07.jpg)\n\n**图 12–7.** *你的视图控制器的\
  \ XIB 设置*\n\n请确保将所需的 `UILabel` 作为属性连接到你的视图控制器，以便你可以更改它们的文本！你可以保留所有设备名称标签以及 `X`、`Y`\
  \ 和 `Z` 标签不动，因此你只需连接那些将显示数值的 `UILabel`（它们当前显示为 `0.0`），以及底部的 **Status** 标签。你将在代码中使用以下按行组织的属性名称：\n\
  \n*   `xAccLabel`, `yAccLabel`, `zAccLabel`\n*   `xGyroLabel`, `yGyroLabel`, `zGyroLabel`\n\
  *   `xMagLabel`, `yMagLabel`, `zMagLabel`\n*   `statusLabel`\n\n你还需要在头文件中定义一个方法来切换当前是否正在获取硬件更新，因此添加以下方法声明。\n\
  \n```\n-(void)toggleUpdates;\n```\n\n完成后，你的用户界面应该已经为初始应用完全设置好了，你的视图控制器的头文件整体应该如下所示：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <CoreMotion/CoreMotion.h>\n\n@interface\
  \ MainViewController : UIViewController\n@property (nonatomic, strong) CMMotionManager\
  \ *motionManager;\n@property (strong, nonatomic) IBOutlet UILabel *xAccLabel;\n\
  @property (strong, nonatomic) IBOutlet UILabel *yAccLabel;\n@property (strong, nonatomic)\
  \ IBOutlet UILabel *zAccLabel;\n\n@property (strong, nonatomic) IBOutlet UILabel\
  \ *xGyroLabel;\n@property (strong, nonatomic) IBOutlet UILabel *yGyroLabel;\n@property\
  \ (strong, nonatomic) IBOutlet UILabel *zGyroLabel;\n\n@property (strong, nonatomic)\
  \ IBOutlet UILabel *xMagLabel;\n@property (strong, nonatomic) IBOutlet UILabel *yMagLabel;\n\
  @property (strong, nonatomic) IBOutlet UILabel *zMagLabel;\n\n@property (strong,\
  \ nonatomic) IBOutlet UILabel *statusLabel;\n\n-(void)toggleUpdates;\n@end\n```\n\
  \n### Core Motion 详解\n\n在 Core Motion 中，假设设备足够新并配备了相关硬件，你可以访问设备上的三种不同硬件。\n\n1. \
  \ *加速度计*：该硬件测量设备的加速度（由重力或用户加速度引起），以提供关于设备当前方向以及用户沿特定方向施加的加速度的信息。这对于检测设备是否倾斜（并可能因此旋转视图）特别有用。\n\
  \    加速度计的数据以 `CMAccelerometerData` 对象的形式呈现。该对象只有一个属性 `acceleration`，包含 `x`、`y`、`z`\
  \ 三个值，分别表示沿任何给定轴的方向或加速度。\n2.  *陀螺仪*：陀螺仪测量设备沿多个轴的旋转速率。\n    来自陀螺仪的信息封装在 `CMGyroData`\
  \ 实例中。该类具有属性 `rotationRate`，包含 `x`、`y`、`z` 三个值，分别表示围绕特定轴的旋转速率。\n3.  *磁力计*：该设备提供关于穿过设备的磁场数据，通常基于地球磁场以及附近的其他任何磁场。请记住，在测试此功能时要小心，因为将任何类型的强磁铁靠近设备可能会对其造成损害。\n\
  \    当从磁力计接收信息时，你访问 `CMMagnetometerData` 类，该类有一个属性 `magneticField`，包含 `x`、`y`、`z`\
  \ 三个值，用于表示沿每个轴穿过设备的磁场。\n\n对于所有三个设备，所有轴都是相同的。如果你手持设备面向自己，底部朝下，那么 x 轴水平穿过设备，y 轴从上到下运行，z\
  \ 轴穿过设备中心指向你。\n\n你将首先实现视图控制器以显示每个硬件的原始数据。\n\n每当处理任何内部硬件时，开发者都有责任包含某种方式来确认所访问的硬件在实际运行应用的任何给定设备上是否可用。因此，每次访问\
  \ Core Motion 硬件时，你都需要使用以下方法：\n\n*   `-isAccelerometerAvailable`\n*   `-isGyroAvailable`\n\
  *   `-isMagnetometerAvailable`\n\n这三个方法都简单地返回一个 `BOOL` 值，其中 `YES` 表示该硬件确实可访问。\n\n\
  你还会使用另外三个方法来检查任何给定硬件当前是否已经处于活动状态，以便正确切换更新。\n\n*   `-isAccelerometerActive`\n*  \
  \ `-isGyroActive`\n*   `-isMagnetometerActive`\n\n每当你想要从特定硬件获取更新时，必须设置一个“更新间隔”，以指定你接收更新的频率，如下例所示：\n\
  \n```\n[self.motionManager setAccelerometerUpdateInterval:1.0/2.0]; // 每秒更新两次\n\
  ```\n\n有两种不同的方法可以接收来自特定硬件组件的更新。首先，你可以简单地告诉 `CMMotionManager` 使用 `-startAccelerometerUpdates`、`-startGyroUpdates`\
  \ 和 `-startMagnetometerUpdates` 开始从某个设备接收更新，然后通过 `accelerometerData`、`gyroData`\
  \ 和 `magnetometerData` 属性查询信息。如果你不打算每次刷新都使用更新数据，这种方法很有用。\n\n第二种方法更适合希望始终使用最新可用数据的用户，就像你在此实现的那样。你可以使用三种不同的方法，这些方法不仅启动更新，还指定了更新时要执行的代码处理块，以及执行该处理块的队列。它们列举如下：\n\
  \n\n\n\n-   `startAccelerometerUpdatesToQueue:withHandler:`\n-   `startGyroUpdatesToQueue:withHandler:`\n\
  -   `startMagnetometerUpdatesToQueue:withHandler:`\n\n对于简单使用，您将使用主队列来执行处理程序。\n\n\
  综合所有讨论的方法，您可以构建一段简单的代码，如果运行，它将开始从加速度计更新数据。这段代码将用于构建`-toggleUpdates`方法。\n\n```\n\
  if ([self.motionManager isAccelerometerAvailable] && ![self.motionManager isAccelerometerActive])\n\
  \    {\n        [self.motionManager setAccelerometerUpdateInterval:1.0/2.0]; //Update\
  \ twice per second\n        [self.motionManager startAccelerometerUpdatesToQueue:[NSOperationQueue\
  \ mainQueue] withHandler:^(CMAccelerometerData *accelerometerData, NSError *error)\n\
  \         {\nself.xAccLabel.text = [NSString stringWithFormat:@\"%f\", accelerometerData.acceleration.x];\n\
  self.yAccLabel.text = [NSString stringWithFormat:@\"%f\", accelerometerData.acceleration.y];\n\
  self.zAccLabel.text = [NSString stringWithFormat:@\"%f\", accelerometerData.acceleration.z];\n\
  \         }];\n    }\n```\n\n如前所述，您首先检查硬件是否可用且未激活。接下来，您设置更新间隔，然后开始请求更新。您指定的简单处理程序将更新视图的信息，以包含您收到的原始数据。\n\
  \n由于您实际上是在构建一个方法来切换这些更新的开启和关闭，您可以添加以下条件来关闭您的更新。\n\n```\nelse if ([self.motionManager\
  \ isAccelerometerActive])\n    {\n        [self.motionManager stopAccelerometerUpdates];\n\
  self.xAccLabel.text = @\"...\";\nself.yAccLabel.text = @\"...\";\nself.zAccLabel.text\
  \ = @\"...\";\n    }\n```\n\n另外两个仪器的工作原理完全相同。总体而言，您的`-toggleUpdates`方法将编写如下：\n\n\
  ```\n-(void)toggleUpdates\n{\nif ([self.motionManager isAccelerometerAvailable]\
  \ && ![self.motionManagerisAccelerometerActive])\n    {\n        [self.motionManager\
  \ setAccelerometerUpdateInterval:1.0/2.0]; //Update twice per second\n        [self.motionManager\
  \ startAccelerometerUpdatesToQueue:[NSOperationQueue mainQueue] withHandler:^(CMAccelerometerData\
  \ *accelerometerData, NSError *error)\n         {\nself.xAccLabel.text = [NSString\
  \ stringWithFormat:@\"%f\", accelerometerData.acceleration.x];\nself.yAccLabel.text\
  \ = [NSString stringWithFormat:@\"%f\", accelerometerData.acceleration.y];\nself.zAccLabel.text\
  \ = [NSString stringWithFormat:@\"%f\", accelerometerData.acceleration.z];\n   \
  \      }];\n    }\nelse if ([self.motionManager isAccelerometerActive])\n    {\n\
  \        [self.motionManager stopAccelerometerUpdates];\nself.xAccLabel.text = @\"\
  ...\";\nself.yAccLabel.text = @\"...\";\nself.zAccLabel.text = @\"...\";\n    }\n\
  \nif ([self.motionManager isGyroAvailable] && ![self.motionManager isGyroActive])\n\
  \    {\n        [self.motionManage rsetGyroUpdateInterval:1.0/2.0];\n        [self.motionManager\
  \ startGyroUpdatesToQueue:[NSOperationQueue mainQueue] withHandler:^(CMGyroData\
  \ *gyroData, NSError *error)\n         {\nself.xGyroLabel.text = [NSString stringWithFormat:@\"\
  %f\", gyroData.rotationRate.x];\nself.yGyroLabel.text = [NSString stringWithFormat:@\"\
  %f\", gyroData.rotationRate.y];\nself.zGyroLabel.text = [NSString stringWithFormat:@\"\
  %f\", gyroData.rotationRate.z];\n         }];\n    }\nelse if ([self.motionManager\
  \ isGyroActive])\n    {\n        [self.motionManager stopGyroUpdates];\nself.xGyroLabel.text\
  \ = @\"...\";\nself.yGyroLabel.text = @\"...\";\nself.zGyroLabel.text = @\"...\"\
  ;\n    }\n\nif ([self.motionManager isMagnetometerAvailable] && ![self.motionManager\
  \ isMagnetometerActive])\n    {\n        [self.motionManager setMagnetometerUpdateInterval:1.0/2.0];\n\
  \        [self.motionManager startMagnetometerUpdatesToQueue:[NSOperationQueue mainQueue]\
  \ withHandler:^(CMMagnetometerData *magData, NSError *error)\n         {\nself.xMagLabel.text\
