  \    self.labelHeading.text=@\"Starting heading tracking…\";\n}else{\n    self.labelHeading.text=@\"\
  Turned heading tracking off\";\n    if(_locationManager!=nil){\n        [_locationManager\
  \ stopUpdatingHeading];\n        [_locationManager stopUpdatingLocation];\n    }\n\
  }\n```\n\n现在，在`didUpdateHeading`方法中，添加一条新语句来检查`trueHeading`值。如果`trueHeading`为负值，则无效，因此仅在`trueHeading`大于或等于\
  \ 0 时使用该属性：\n\n```\nif(newHeading.headingAccuracy<0)\n    return;\n\nif(newHeading.trueHeading>=0){\n\
  \    self.labelTrueHeading.text=[NSString stringWithFormat:@\"Your true heading\
  \ is: %.1f°\", newHeading.trueHeading];\n}\n\nself.labelHeading.text=[NSString stringWithFormat:@\"\
  Your magnetic heading is: %.1f°\", newHeading.magneticHeading];\n```\n\n实现文件（`.m`）中的自定义方法如下所示：\n\
  \n```\n//\n//  Chapter4HeadingTrackingViewController.m\n\n#import \"Chapter4HeadingTrackingViewController.h\"\
  \n```\n\n\n\n`@implementation Chapter4HeadingTrackingViewController`  \n`@synthesize\
  \ labelHeading;`  \n`@synthesize labelTrueHeading;`  \n`- (IBAction)switchHeadingServices:(id)sender\
  \ {`  \n`    if([CLLocationManager headingAvailable]){`  \n`        if([sender isKindOfClass:[UISwitch\
  \ class]]){`  \n`            UISwitch *headingSwitch=(UISwitch *)sender;`  \n` \
  \           if(headingSwitch.on){`  \n`                if(_locationManager==nil){`\
  \  \n`                    _locationManager=[[CLLocationManager alloc] init];`  \n\
  `                    _locationManager.headingFilter=5;`  \n`                   \
  \ _locationManager.purpose=@\"We will use your location to tell you where you are\
  \ headed\";`  \n`                    _locationManager.delegate=self;`  \n`     \
  \           }`  \n`                [_locationManager startUpdatingHeading];`  \n\
  `                [_locationManager startUpdatingLocation];`  \n`               \
  \ self.labelHeading.text=@\"正在开始方向追踪…\";`  \n`            }else{`  \n`         \
  \       self.labelHeading.text=@\"已关闭方向追踪\";`  \n`                if(_locationManager!=nil){`\
  \  \n`                    [_locationManager stopUpdatingHeading];`  \n`        \
  \            [_locationManager stopUpdatingLocation];`  \n`                }`  \n\
  `            }`  \n`        }`  \n`    }else{`  \n`        self.labelHeading.text=@\"\
  方向服务不可用\";`  \n`    }`  \n`}`  \n`-(void)locationManager:(CLLocationManager *)manager\
  \ didFailWithError:(NSError *)error{`  \n`    if(error.code==kCLErrorDenied){` \
  \ \n`        [manager stopUpdatingHeading];`  \n`        self.labelHeading.text=@\"\
  错误：方向追踪被拒绝\";`  \n`    }`  \n`}`  \n`-(void)locationManager:(CLLocationManager *)manager\
  \ didUpdateHeading:(CLHeading *)newHeading{`  \n`    NSDate *headingDate=newHeading.timestamp;`\
  \  \n`    NSTimeInterval headingInterval=[headingDate timeIntervalSinceNow];`  \n\
  `    if(abs(headingInterval)<30){`  \n`        if(newHeading.headingAccuracy<0)`\
  \  \n`            return;`  \n`        if(newHeading.trueHeading>=0){`  \n`    \
  \        self.labelTrueHeading.text=[NSString stringWithFormat:@\"您的真北方向为：%.1f°\"\
  , newHeading.trueHeading];`  \n`        }`  \n`        self.labelHeading.text=[NSString\
  \ stringWithFormat:@\"您的磁北方向为：%.1f°\", newHeading.magneticHeading];`  \n`    }`\
