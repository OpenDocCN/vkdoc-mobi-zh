  self.rollLabel.text = [NSString stringWithFormat:@\"%f\", motion.attitude.roll];\n\
  self.pitchLabel.text = [NSString stringWithFormat:@\"%f\", motion.attitude.pitch];\n\
  self.yawLabel.text = [NSString stringWithFormat:@\"%f\", motion.attitude.yaw];\n\
  //////新代码结束\n         }];\n    }\nelse if ([self.motionManager isDeviceMotionActive])\n\
  \    {\n        [self.motionManager stopDeviceMotionUpdates];\n\nself.xAccLabel.text\
  \ = @\"...\";\nself.yAccLabel.text = @\"...\";\nself.zAccLabel.text = @\"...\";\n\
  self.xGyroLabel.text = @\"...\";\nself.yGyroLabel.text = @\"...\";\nself.zGyroLabel.text\
  \ = @\"...\";\nself.xMagLabel.text = @\"...\";\nself.yMagLabel.text = @\"...\";\n\
  self.zMagLabel.text = @\"...\";\n\n//////新的姿态代码\nself.rollLabel.text = @\"...\"\
  ;\nself.pitchLabel.text = @\"...\";\nself.yawLabel.text = @\"...\";\n//////新代码结束\n\
  \    }\n}\n```\n\n虽然不是必须的，但你最好还是为你的 `attitude` 指定一个参考坐标系，以便了解设备与什么进行比较。可以使用 `-startDeviceMotionUpdatesUsingReferenceFrame:toQueue:withHandler:`\
  \ 方法来实现。从 iOS 5.0 开始，该方法的参考坐标系参数接受四个可选值。\n\n* `CMAttitudeReferenceFrameXArbitraryZVertical`：指定一个参考坐标系，其\
  \ z 轴沿垂直方向，x 轴沿任意方向；更简单地说，设备平放且屏幕朝上。\n* `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical`：与上一个值相同，但使用了磁力计来提供更好的精度。该选项会增加\
  \ CPU 使用率，并且要求磁力计可用且已校准。\n* `CMAttitudeReferenceFrameXMagneticNorthZVertical`：该参考坐标系的\
  \ z 轴仍然垂直，但 x 轴指向“磁北”方向。此选项要求磁力计可用且已校准，这意味着在应用程序中获取读数之前，你可能需要拿着设备画八字形晃动。\n* `CMAttitudeReferenceFrameXTrueNorthZVertical`：该参考坐标系与上一个类似，但\
  \ x 轴指向“真北”方向，而非“磁北”。设备必须能够获取自身位置，才能计算两者之间的差异。\n\n**注意：** 在使用磁力计时，务必理解“磁北”和“真北”的区别。磁北是地球的磁北极，是指南针所指的方向。然而，由于地核的变化，这个点并非固定不变，每年会移动超过\
  \ 30 英里。真北指的是指向地球实际北极的方向，这个方向是固定不变的。\n\n在应用程序中，你将选择第三个选项 `CMAttitudeReferenceFrameXMagneticNorthZVertical`。将对\
  \ `-startDeviceMotionUpdatesToQueue:withHandler:` 方法的调用修改为以下内容：\n\n```\n[self.motionManager\
  \ startDeviceMotionUpdatesUsingReferenceFrame:CMAttitudeReferenceFrameXMagneticNorthZVertical\
  \ toQueue:[NSOperationQueue mainQueue] withHandler:^(CMDeviceMotion *motion, NSError\
  \ *error)\n         {\nself.xAccLabel.text = [NSString stringWithFormat:@\"%f\"\
  , motion.gravity.x];\nself.yAccLabel.text = [NSString stringWithFormat:@\"%f\",\
  \ motion.gravity.y];\nself.zAccLabel.text = [NSString stringWithFormat:@\"%f\",\
  \ motion.gravity.z];\n\nself.xGyroLabel.text = [NSString stringWithFormat:@\"%f\"\
  , motion.rotationRate.x];\nself.yGyroLabel.text = [NSString stringWithFormat:@\"\
  %f\", motion.rotationRate.y];\nself.zGyroLabel.text = [NSString stringWithFormat:@\"\
  %f\", motion.rotationRate.z];\n\nself.xMagLabel.text = [NSString stringWithFormat:@\"\
  %f\", motion.magneticField.field.x];\nself.yMagLabel.text = [NSString stringWithFormat:@\"\
  %f\", motion.magneticField.field.y];\nself.zMagLabel.text = [NSString stringWithFormat:@\"\
  %f\", motion.magneticField.field.z];\n\nself.rollLabel.text = [NSString stringWithFormat:@\"\
  %f\", motion.attitude.roll];\nself.pitchLabel.text = [NSString stringWithFormat:@\"\
  %f\", motion.attitude.pitch];\nself.yawLabel.text = [NSString stringWithFormat:@\"\
  %f\", motion.attitude.yaw];\n         }];\n```\n\n现在运行应用程序时，你可能会看到所有值都显示为“0.0”。如果你以画八字形的方式移动设备来校准磁力计，这些值应该会很快开始更新。你应该会注意到，如果你将设备平放在一个水平面上，然后绕\
  \ z 轴旋转设备，当 x 轴与地球磁场对齐时，你的 `yaw` 值应非常接近零，如图 12–10 所示。\n\n![图片](img/9781430240051_Fig12-10.jpg)\n\
  \n**图 12–10.** *你的应用程序正在接收校准后的设备信息*\n\n\n\n### 食谱 12–3：使用加速计移动 `UILabel`\n\n既然我们已经详细探讨了如何访问\
  \ Core Motion 提供的所有数据，那么你可以创建一个简单的实现，来实际演示其超越单纯数值访问的用途。你将直接修改现有应用，因此在继续之前，请务必保存一份项目的新副本。\n\
  \n你将修改应用，利用之前访问过的 `gravity` 属性，在视图中移动一个 `UILabel`。为此，你需要为设备运动信息设置一个非常小的更新间隔，因此需要尽量减少实际显示的数据量。你将移除视图中除\
  \ `statusLabel` 之外的所有内容，这样你的用户界面将如图 12–11 所示。为了匹配新功能的说明，我也修改了 `UILabel`。\n\n当你从视图中移除所有其他\
  \ `UILabel` 时，如果你愿意，可以保留上一食谱中在头文件中设置的所有属性。虽然保留它们会占用少量内存，但这对于你的目的来说微不足道。\n\n![Image](img/9781430240051_Fig12-11.jpg)\n\
  \n**图 12–11.** *用于移动 `UILabel` 的重新简化的用户界面*\n\n接下来，你可以删除（或注释掉）`–toggleUpdates` 方法中类似于下面这行设置\
  \ `CMMotionManager` 更新间隔的代码。\n\n`[self.motionManager setDeviceMotionUpdateInterval:1.0/2.0];`\n\
  \n如果你选择不设置更新间隔，设备将默认为一个极小的值，这意味着你的信息将更新得非常频繁。\n\n你还需要将姿态的参考系改为不需要磁力计校准的值，以提高性能速度。具体来说，你将使用\
  \ `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical` 值。\n\n最后，你可以添加代码来获取重力值，然后基于这些值调整你的\
  \ `UILabel` 的框架。总体而言，你的 `–toggleUpdates` 方法将如下所示：\n\n```\n-(void)toggleUpdates\n\
  {\n    if ([self.motionManager isDeviceMotionAvailable] && ![self.motionManager\
  \ isDeviceMotionActive])\n    {\n        [self.motionManager setDeviceMotionUpdateInterval:1.0/2.0];\n\
  \        [self.motionManager startDeviceMotionUpdatesUsingReferenceFrame:CMAttitudeReferenceFrameXArbitraryCorrectedZVertical\
  \ toQueue:[NSOperationQueue mainQueue] withHandler:^(CMDeviceMotion *motion, NSError\
  \ *error)\n         {\n            int scale = 5.0;\n            CGRect labelRect\
  \ = self.statusLabel.frame;\n            labelRect.origin.x += motion.gravity.x\
  \ * scale;\n            if (!CGRectContainsRect(self.view.bounds, labelRect))\n\
  \            {\n                labelRect.origin.x = self.statusLabel.frame.origin.x;\n\
  \            }\n            labelRect.origin.y -= motion.gravity.y *scale;\n   \
  \         if (!CGRectContainsRect(self.view.bounds, labelRect))\n            {\n\
  \                labelRect.origin.y = self.statusLabel.frame.origin.y;\n       \
  \     }\n            [self.statusLabel setFrame:labelRect];\n         }];\n    }\n\
  \    else if ([self.motionManager isDeviceMotionActive])\n    {\n        [self.motionManager\
  \ stopDeviceMotionUpdates];\n    }\n}\n```\n\n你还可以更新 `-shakeDetected:` 方法，使其文本更有意义：\n\
  \n```\n-(void)shakeDetected:(NSNotification *)paramNotification\n{\n    if ([self.statusLabel.text\
  \ isEqualToString:@\"Unlocked\"])\n    {\n        self.statusLabel.text = @\"Locked\"\
  ;\n        [self toggleUpdates];\n    }\n    else\n    {\n        self.statusLabel.text\
  \ = @\"Unlocked\";\n        [self toggleUpdates];\n    }\n}\n```\n\n如果你的应用默认没有链接到\
  \ CoreGraphics 框架，你将会遇到链接器错误，因此请确保在运行应用之前完成此操作。操作步骤与你之前为 CoreMotion 框架所做的相同，但你不需要使用任何实际的\
  \ `#import` 语句。\n\n现在，你的最新应用应该会提供一个不错的小 `UILabel`，你可以通过倾斜设备来移动它，其截图如图 12–12 所示。\n\
  \n![Image](img/9781430240051_Fig12-12.jpg)\n\n**图 12–12.** *你的应用中根据设备方向移动的 `UILabel`*\n\
  \n### 总结\n\n我们非常详细地探讨了如何访问 Core Motion 框架提供的多种不同数值和信息。我们从原始数据入手，逐步获取到经过校准的函数值，并将这些值转化为一个有点用处（尽管可能略带娱乐性）的应用。然而，Core\
  \ Motion 并非一个可以独立构成完整应用的框架。你可以用它来获取设备的数据，但必须发挥创造力来加以利用。从测量人体旋转速度的简单应用，到将磁力计集成到增强现实应用中，Core\
  \ Motion 提供了一个用于访问信息的基本框架，而这些信息可以转化为 iOS 中最强大的软件组件。\n\n## 第 13 章\n\n## 数据传输食谱\n\n\
  随着时间推移和技术发展，最明显的趋势之一就是用户生成内容的增长。由于设计技术、互联网连接速度和网络可用性的提升，每年产生的电子数据量以近乎难以置信的速度增长。这一问题的核心在于让用户能够轻松地接收并重新分发信息。你可以通过多种内置类将同样的概念融入开发中，以提升应用的功能和实用性。\n\
  \n在本章中，你将仅需一台实体设备来实现短信功能，这将在你的第一个食谱中构建。所有其他功能都可以进行模拟。\n\n\n\n### 配方 13-1：撰写短信\n\n\
  短信是目前个人间传输数据最为流行的方式之一，它快速、简便且强大，几乎覆盖所有年龄段的人群。在 iOS 中，你可以将短信功能整合到自己的应用中，轻松为用户提供跨应用的简单功能，从而显著提升应用的整体质量。\n\
  \n首先，创建一个名为`\"SendItOut\"`的新项目（本章将全程使用此项目），类前缀设为`\"Main\"`。选择\"单视图应用\"模板来创建简单项目，如图\
  \ 13-1 所示。\n\n![图](img/9781430240051_Fig13-01.jpg)\n\n**图 13-1.** *创建单视图应用*\n\n\
  为了充分演示本主题的部分功能，你将专门为 iPad 而非 iPhone 开发应用。在输入项目名称后的下一个界面中，确保\"设备家族\"已相应设置。由于部分测试功能需要物理设备才能完全实现，你也可以将此应用设为\
  \ iPhone 版本，只需根据需求调整视图元素即可。将项目配置为名称`\"SendItOut\"`、类前缀`\"Main\"`，并确保勾选\"使用自动引用计数\"\
  复选框，如图 13-2 所示。\n\n![图](img/9781430240051_Fig13-02.jpg)\n\n**图 13-2.** *配置项目设置*\n\
  \n点击创建项目后，切换到视图控制器的 XIB 文件。在工具面板中，将方向（位于\"模拟指标\"部分）设置为横向，并确保背景色设为灰色。\n\n首先，在视图上半部分添加一个`UITextView`（使用默认的\
  \ Lorem Ipsum 文本），并在下半部分添加一个标有`\"Text Message\"`的`UIButton`。将这些控件连接到视图控制器，分别使用属性名称`textViewInput`和`textButton`，并将按钮连接到`IBAction`方法`-textPressed:`。\n\
  \n在继续之前，我们先为`UITextView`的边角添加圆角效果，以提升应用的视觉质量。在视图控制器的头文件中添加以下导入语句：\n\n```\n#import\
  \ <QuartzCore/QuartzCore.h>\n```\n\n然后在`-viewDidLoad`方法的末尾添加以下代码行：\n\n```\nself.textViewInput.layer.cornerRadius\
  \ = 15.0;\n}\n\n旋转模拟器后，你的视图应如图 13-3 所示。可通过 iOS 模拟器\"硬件\"菜单中的\"向左旋转\"（![图](img/U003.jpg)+左箭头）或\"\
  向右旋转\"（![图](img/U003.jpg)+右箭头）命令完成此操作。\n\n![图](img/9781430240051_Fig13-03.jpg)\n\
  \n**图 13-3.** *用户界面的模拟视图*\n\n接下来，将视图控制器配置为`UITextView`的委托。在`-viewDidLoad`方法中添加以下代码行：\n\
  \n```\nself.textViewInput.delegate = self;\n```\n\n然后，向项目添加 MessageUI 框架。像往常一样在项目的\"\
  构建阶段\"标签下完成此操作，并在视图控制器的头文件中添加所需的导入语句：\n\n```\n#import <MessageUI/MessageUI.h>\n\
  ```\n\n你需要指示视图控制器遵循特定协议。调整头文件，使其同时遵循`UITextViewDelegate`、`MFMessageComposeViewControllerDelegate`和`UINavigationControllerDelegate`协议。\n\
  \n此时，完整设置后的头文件内容如下：\n\n```\n#import <UIKit/UIKit.h>\n#import <QuartzCore/QuartzCore.h>\n\
  #import <MessageUI/MessageUI.h>\n\n@interface MainViewController : UIViewController\
  \ <UITextViewDelegate, MFMessageComposeViewControllerDelegate, UINavigationControllerDelegate>\n\
  \n@property (strong, nonatomic) IBOutlet UITextView *textViewInput;\n@property (strong,\
  \ nonatomic) IBOutlet UIButton *textButton;\n-(IBAction)textPressed:(id)sender;\n\
  \n@end\n```\n\n现在，你将实现`UITextView`的一个委托方法，以确保用户在点击回车键时键盘能正确收起。\n\n```\n- (BOOL)textView:(UITextView\
  \ *)textView shouldChangeTextInRange:(NSRange)range\n replacementText:(NSString\
  \ *)text\n{\n    if ([text isEqualToString:@\"\\n\"])\n    {\n        [textView\
  \ resignFirstResponder];\n        return FALSE;\n    }\n    return TRUE;\n}\n```\n\
  \n接下来，实现`-textPressed:`方法，将`UITextView`中的文本转为短信内容。只需将收件人设置为一个虚拟号码即可。\n\n```\n-(void)textPressed:(id)sender\n\
  {\n    if ([MFMessageComposeViewController canSendText])\n    {\n        MFMessageComposeViewController\
  \ *messageVC = [[MFMessageComposeViewController alloc] init];\n        messageVC.messageComposeDelegate\
  \ = self;\n        messageVC.recipients = [NSArray arrayWithObject:@\"3015555309\"\
  ];\n        messageVC.body = self.textViewInput.text;\n        [self presentModalViewController:messageVC\
  \ animated:YES];\n    }\n    else\n    {\n        NSLog(@\"错误，短信功能不可用\");\n    }\n\
  }\n```\n\n此方法的实现相当直观。在使用`+canSendText`方法检查短信可用性后，创建了一个`MFMessageComposeViewController`类的实例，并配置了虚拟收件人以及要发送的文本。最后，以模态方式呈现该控制器，让用户在发送前检查短信内容。\n\
  \n`MFMessageComposeViewController`及其后文会提到的对应类`MFMailComposeViewController`，都允许你设置初始条件并呈现它们，但一旦显示后，你便无法控制该类。这是为了确保用户对短信或邮件的发送拥有最终决定权，而不是应用在未告知用户的情况下擅自发送。\n\
  \n你可以实现`MFMessageComposeViewController`的`messageComposeDelegate`方法来处理短信发送完成后的操作，示例如下：\n\
  \n```\n-(void)messageComposeViewController:(MFMessageComposeViewController *)controller\
  \ didFinishWithResult:(MessageComposeResult)result\n{\n    if (result == MessageComposeResultSent)\n\
  \    {\n        self.textViewInput.text = @\"短信已发送。\";\n    }\n    else if (result\
  \ == MessageComposeResultFailed)\n    {\n        NSLog(@\"短信发送失败！\");\n    }\n \
  \   [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n除了上述代码中演示的两种`MessageComposeResults`值外，还有第三种结果：`MessageComposeResultCancelled`，表示用户取消了短信发送。\n\
  \niOS 5.0 新增的一项功能是接收有关短信可用性变化的通知。你可以通过在`-viewDidLoad`方法中添加以下代码行来注册此类通知：\n\n```\n\
  [[NSNotificationCenter defaultCenter] addObserver:self\n                       \
  \                  selector:@selector(availabilityChange:)\n                   \
  \                          name:@\"MFMessageComposeViewControllerTextMessageAvailabilityDidChangeNotification\"\
  \n                                           object:nil];\n```\n\n此处指定的选择器可以轻松定义为仅通知你变化情况。在完整应用中，你可能还会使用`UIAlert`来通知用户这一变化，但出于演示目的，此处将省略此过程。\n\
  \n```\n-(void)availabilityChange:(id)sender\n{\n    if ([MFMessageComposeViewController\
  \ canSendText])\n    {\n        NSLog(@\"短信功能可用\");\n    }\n    else\n    {\n  \
  \      NSLog(@\"短信功能不可用\");\n    }\n}\n```\n\n\n\n现在，你的应用程序可以将 `UITextView` 的正文复制到短信中，发送给你的模拟收件人！但如果你测试这一功能时，请记住\
  \ iOS 模拟器无法使用短信功能。你需要在支持 3G 的真实设备上进行测试。要像这样精确测试该应用，你需要一台支持 3G 的 iPad，不过你也可以修改项目，使其转而适用于\
  \ iPhone。\n\n## 秘籍 13–2：编写电子邮件\n\n就像你能够创建并配置从应用中发送的短信一样，你也可以使用上一秘籍中处理过的 `MessageUI`\
  \ 框架，通过 `MFMessageComposeViewController` 类的对应类——`MFMailComposeViewController`——来配置邮件消息。\n\
  \n在现有应用的基础上，你将添加一个标签为“Mail”（邮件）的按钮。使用属性名称 `mailButton`，并为其分配一个名为 `-mailPressed:`\
  \ 的动作。\n\n你的 `-mailPressed:` 方法的设置与之前的 `-textPressed:` 方法非常相似。你将创建撰写视图控制器，配置它，然后呈现它。\n\
  \n```\n-(void)mailPressed:(id)sender\n{\n    if ([MFMailComposeViewController canSendMail])\n\
  \    {\n        MFMailComposeViewController *mailVC = [[MFMailComposeViewController\
  \ alloc] init];\n        [mailVC setSubject:@\"SendItOut\"];\n        [mailVC setToRecipients:[NSArray\
  \ arrayWithObject:@\"test@example.com\"]];\n        [mailVC setMessageBody:self.textViewInput.text\
  \ isHTML:NO];\n        mailVC.mailComposeDelegate = self;\n        [self presentModalViewController:mailVC\
  \ animated:YES];\n    }\n    else\n    {\n        NSLog(@\"Error: Mail Unavailable\"\
  );\n    }\n}\n```\n\n如你所见，与 `MFMessageComposeViewController` 相比，`MFMailComposeViewController`\
  \ 拥有更多属性，用于专门配置更复杂的电子邮件。\n\n由于你将 `mailComposeDelegate` 属性设置为了你的视图控制器，你需要指定它除了已经遵循的协议之外，还需遵循\
  \ `MFMailComposeViewControllerDelegate` 协议，因此请将其添加到你的头文件中。\n\n`MFMailComposeViewControllerDelegate`\
  \ 协议只定义了一个方法，你需要实现它，以便正确处理用户完成视图控制器使用后的操作。你将为其提供一个简单的实现来记录结果。\n\n```\n-(void)mailComposeController:(MFMailComposeViewController\
  \ *)controller\ndidFinishWithResult:(MFMailComposeResult)result error:(NSError *)error\n\
  {\n    if (result == MFMailComposeResultSent)\n        NSLog(@\"Mail Successfully\
  \ Sent\");\n    else if (result == MFMailComposeResultCancelled)\n        NSLog(@\"\
  Mail Cancelled\");\n    else if (result == MFMailComposeResultFailed)\n        NSLog(@\"\
  Error, Mail Send Failed\");\n    else if (result == MFMailComposeResultSaved)\n\
  \        NSLog(@\"Mail Saved\");\n    [self dismissModalViewControllerAnimated:YES];\n\
  }\n```\n\n现在，你的新应用将能够呈现一个用于发送邮件的视图控制器，如图 13–4 所示。不过与 `MFMessageViewController` 不同，你实际上可以在\
  \ iOS 模拟器中测试这一功能。\n\n![图片](img/9781430240051_Fig13-04.jpg)\n\n**图 13–4.** *你的应用正在撰写电子邮件*\n\
  \n非常方便的是，你可以使用模拟器轻松测试 `MFMailComposeViewController` 的所有功能，而无需担心会向任何真实或虚假地址发送多封电子邮件。模拟器不会真正通过网络发送你的测试消息，因此你可以轻松测试\
  \ `mailComposeDelegate` 方法对 `MailComposeResults` 的处理。\n\n使用 `MFMailComposeViewController`\
  \ 时可能遇到的另一个额外问题是，如果你允许根据用户输入设置收件人。用户很可能会错误地格式化邮件地址。这不会导致你的应用抛出异常，但可能会导致收件人被 `MFMailComposeViewController`\
  \ 忽略。你可以格式化用户输入以尝试避免这种情况，或者简单地设置一个正则表达式来验证给定的地址是否符合要求的格式。\n\n\n\n#### 将数据附加到邮件\n\
  \n`MFMailComposeViewController` 提供了功能，让你能够通过使用 `-addAttachmentData:mimeType:fileName:`\
  \ 方法，从你的应用程序中将数据附加到电子邮件。该方法接受三个参数：\n\n1.  `attachment`：此 `NSData` 实例指的是你想要发送的对象的实际数据。这意味着对于任何你想要附加的对象，你都需要获取它的\
  \ `NSData`。\n2.  `mimeType`：此属性是一个 `NSString`，用于向控制器定义附件的数据类型。这些值并非 iOS 本地所有，因此未在\
  \ Apple 文档中定义。不过，你可以轻松地在网上找到它们。维基百科在 `http://en.wikipedia.org/wiki/Internet_media_type`\
  \ 提供了一篇关于所有可能值的非常清晰的文章。例如，JPEG 图像的 MIME 类型是 `\"image/jpeg\"`。\n3.  `fileName`：使用此\
  \ `NSString` 属性来为邮件中发送的文件设置首选名称。\n\n你将向你的应用程序添加功能，以访问用户的图像库、选择一张图像，然后使用该图像附加到你的电子邮件中。\n\
  \n首先，在你的 `UITextView` 下方添加一个 `UIImageView`，并在其下方添加一个标签为“获取图像”的 `UIButton`。你的视图现在将类似于\
  \ 图 13-5 中模拟的样子。\n\n![Image](img/9781430240051_Fig13-05.jpg)\n\n**图 13-5.** *具备选择图像能力的新用户界面*\n\
  \n你将为这些内容添加属性 `imageViewContent` 和 `getImageButton`，以及方法 `-getImagePressed:`。你将通过你的\
  \ `getImageButton` 呈现一个 `UIPopoverController`，因此请确保此方法的 `sender` 类型设置为 `UIButton*`\
  \ 而不是 `id`。继续，再创建一个名为 `selectedImage` 的 `UIImage` 属性，用于存储对所选图像的引用，并确保正确综合（synthesize）它。\n\
  \n每当你想要访问 iPad 的照片库时，都需要使用一个设置在 `UIPopoverController` 内部的 `UIImagePickerController`。你需要创建一个名为\
  \ `pop` 的 `UIPopoverController` 属性，并确保也综合它。\n\n在继续之前，指示你的视图控制器遵守 `UIImagePickerControllerDelegate`\
  \ 和 `UIPopoverControllerDelegate` 协议。总的来说，你的头文件现在应该类似于以下内容：\n\n```\n#import <UIKit/UIKit.h>\n\
  #import <QuartzCore/QuartzCore.h>\n#import <MessageUI/MessageUI.h>\n\n@interface\
  \ MainViewController : UIViewController <UITextViewDelegate,\nMFMessageComposeViewControllerDelegate,\
  \ UINavigationControllerDelegate,\nMFMailComposeViewControllerDelegate, UIImagePickerControllerDelegate,\n\
  UIPopoverControllerDelegate>\n\n@property (strong, nonatomic) IBOutlet UITextView\
  \ *textViewInput;\n@property (strong, nonatomic) IBOutlet UIButton *textButton;\n\
  @property (strong, nonatomic) IBOutlet UIButton *mailButton;\n@property (strong,\
  \ nonatomic) IBOutlet UIImageView *imageViewContent;\n@property (strong, nonatomic)\
  \ IBOutlet UIButton *getImageButton;\n@property (strong, nonatomic) UIImage *selectedImage;\n\
  @property (strong, nonatomic) UIPopoverController *pop;\n\n-(IBAction)textPressed:(id)sender;\n\
  -(IBAction)mailPressed:(id)sender;\n-(IBAction)getImagePressed:(UIButton *)sender;\n\
  ///请特别注意上面的 (UIButton *) 参数类型。\n\n@end\n```\n\n如果你到目前为止已正确处理了所有新属性，那么你的 `-viewDidUnload:`\
  \ 方法应类似于以下内容：\n\n```\n- (void)viewDidUnload\n{\n    [self setPop:nil];\n    [self\
  \ setSelectedImage:nil];\n    [self setTextViewInput:nil];\n    [self setTextButton:nil];\n\
      [self setMailButton:nil];\n    [self setImageViewContent:nil];\n    [self setGetImageButton:nil];\n\
      [super viewDidUnload];\n}\n```\n\n现在，你可以编写你的 `-getImagePressed:` 方法来呈现你的弹出控制器，以便访问照片库。\n\
  \n```\n-(void)getImagePressed:(UIButton *)sender\n{\nUIImagePickerController *picker\
  \ = [[UIImagePickerController alloc] init];\nif ([UIImagePickerController\nisSourceTypeAvailable:UIImagePickerControllerSourceTypePhotoLibrary])\n\
      {\n        picker.sourceType = UIImagePickerControllerSourceTypePhotoLibrary;\n\
          picker.delegate = self;\n\nself.pop = [[UIPopoverController alloc] initWithContentViewController:picker];\n\
  pop.delegate = self;\n        [pop presentPopoverFromRect:sender.frame inView:self.view\n\
  permittedArrowDirections:UIPopoverArrowDirectionAny animated:YES];\n    }\n}\n```\n\
  \n现在你只需实现你的 `UIImagePickerControllerDelegate` 协议方法。\n\n```\n-(void)imagePickerControllerDidCancel:(UIImagePickerController\
  \ *)picker\n{\n    [self.pop dismissPopoverAnimated:YES];\n}\n\n-(void)imagePickerController:(UIImagePickerController\
  \ *)picker\ndidFinishPickingMediaWithInfo:(NSDictionary *)info\n{\nUIImage *image\
  \ = [info valueForKey:@\"UIImagePickerControllerOriginalImage\"];\nself.selectedImage\
  \ = image;\nself.imageViewContent.image = image;\nself.imageViewContent.contentMode\
  \ = UIViewContentModeScaleAspectFill;\n\n    [self.pop dismissPopoverAnimated:YES];\n\
  }\n```\n\n至此，你的应用程序可以选择一张图像并将其设置在你的 `UIImageView` 中。如果你在模拟器中测试此应用程序，你将需要至少获取一张图像放入模拟器的照片库中。你可以通过访问模拟器上的\
  \ Safari 应用程序、在网上找到一张图像，然后点击并按住该图像将其保存到库中来实现。在 图 13-6 中，你的应用程序显示已选择了一张图像，并且“获取图像”按钮再次被按下。\n\
  \n![Image](img/9781430240051_Fig13-06.jpg)\n\n**图 13-6.** *运行你的应用程序并选择要显示的图像*\n\n\
  现在，你可以继续将选定的图像添加到你的电子邮件中。你将修改你的 `-mailPressed:` 方法，以在已选择图像时包含附加图像的功能。\n\n```\n-(void)mailPressed:(id)sender\n\
  {\nif ([MFMailComposeViewController canSendMail])\n    {\nMFMailComposeViewController\
  \ *mailVC = [[MFMailComposeViewController alloc] init];\n        [mailVC setSubject:@\"\
  SendItOut\"];\n        [mailVC setToRecipients:[NSArray arrayWithObject:@\"test@senditout.test\"\
  ]];\n        [mailVC setMessageBody:self.textViewInput.text isHTML:NO];\n        mailVC.mailComposeDelegate\
  \ = self;\n\n/////新增图像代码\nif (self.selectedImage != nil)\n        {\nNSData *imageData\
  \ = UIImageJPEGRepresentation(self.selectedImage, 1.0);\n            [mailVC addAttachmentData:imageData\
  \ mimeType:@\"image/jpeg\" fileName:@\"SelectedImage\"];\n        }\n/////结束新增代码\n\
  \n        [self presentModalViewController:mailVC animated:YES];\n    }\nelse\n\
      {\nNSLog(@\"错误：邮件不可用\");\n    }\n}\n```\n\n最后，你可以修改 `MFMailComposeViewController`\
  \ 的委托方法，以便正确重置你的应用程序。\n\n```\n-(void)messageComposeViewController:(MFMessageComposeViewController\
  \ *)controller\ndidFinishWithResult:(MessageComposeResult)result\n{\nif (result\
  \ == MessageComposeResultSent)\n    {\nself.textViewInput.text = @\"消息已发送。\";\n\
  self.selectedImage = nil;\nself.imageViewContent.image = nil;\n    }\nelse if (result\
  \ == MessageComposeResultFailed)\n    {\nNSLog(@\"消息发送失败！\");\n    }\n    [self\
  \ dismissModalViewControllerAnimated:YES];\n}\n```\n\n如果你现在在模拟器中测试应用程序，并且在选择图像后尝试发送电子邮件，你应该会看到选定的图像被放置在你的消息中，如\
  \ 图 13-7 所示。\n\n![Image](img/9781430240051_Fig13-07.jpg)\n\n**图 13-7.** *你的应用程序正在编写带有附件的电子邮件*\n\
  \n\n\n"
- "# 方案 13–3：打印图像\n\n现在你的应用程序已设置好，既能访问文本也能访问图像，你可以通过添加打印功能来进一步增强其可用性。\n\n在具体处理打印功能之前，你需要稍微重新配置应用程序的用户界面，将你的视图控制器嵌入\
  \ `UINavigationController` 中，以便在顶部获得一个漂亮的工具栏。为此，请调整你的应用程序委托中的 `-application:didFinishLaunchingWithOptions`\
  \ 方法，如下所示：\n\n```\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    // 覆盖点：应用程序启动后的自定义点。\n    self.viewController = [[MainViewController\
  \ alloc] initWithNibName:@\"MainViewController\"\n                             \
  \                                 bundle:nil];\n    /////修改的代码\n    __strong UINavigationController\
  \ *navcon = [[UINavigationController alloc]\n                                  \
  \             initWithRootViewController:self.viewController];\n    self.window.rootViewController\
  \ = navcon;\n    /////修改结束\n\n    [self.window makeKeyAndVisible];\n    return YES;\n\
  }\n```\n\n你可能还需要稍微向上移动视图下方的按钮，以确保它们不会被导航栏推出屏幕。\n\n在 `-viewDidLoad` 方法的末尾添加以下几行代码，以配置你的导航栏。\n\
  \n```\nself.title = @\"发送出去！\";\n\nif ([UIPrintInteractionController isPrintingAvailable])\n\
  {\n    UIBarButtonItem *printButton = [[UIBarButtonItem alloc]\n               \
  \                     initWithTitle:@\"打印\"\n                                  \
  \  style:UIBarButtonItemStyleBordered\n                                    target:self\n\
  \                                    action:@selector(printPressed:)];\n\n    self.navigationItem.rightBarButtonItem\
  \ = printButton;\n}\n```\n\n这个条件判断会在显示打印按钮之前，确认你运行应用的设备是否支持打印功能。\n\n现在，你可以继续实现 `-printPressed:`\
  \ 方法，以添加打印功能，主要通过使用 `UIPrintInteractionController` 类来实现。在配置打印任务时，这个类将成为你的活动“枢纽”。在查看完整方法之前，我们将逐步讨论如何设置这个类。\n\
  \n当你想要访问 `UIPrintInteractionController` 的实例时，只需通过 `+sharedPrintController` 类方法获取共享实例的引用。\n\
  \n```\nUIPrintInteractionController *pic = [UIPrintInteractionController sharedPrintController];\n\
  ```\n\n接下来，你必须配置控制器的 `printInfo` 属性，该属性指定了打印任务的设置。\n\n```\nUIPrintInfo *printInfo\
  \ = [UIPrintInfo printInfo];\nprintInfo.outputType = UIPrintInfoOutputPhoto;\nprintInfo.jobName\
  \ = self.title;\nprintInfo.duplex = UIPrintInfoDuplexLongEdge;\n```\n\n如你所见，你将 `outputType`\
  \ 设置为指定图像。此属性的三个可能值如下：\n\n- `UIPrintInfoOutputPhoto`：专门用于打印照片\n- `UIPrintInfoOutputGrayscale`：仅处理黑色文本时使用，以提高性能\n\
  - `UIPrintInfoOutputGeneral`：用于图形和文本的任何混合，无论是否包含颜色\n\n你尚未将这个 `printInfo` 对象设置为控制器的\
  \ `printInfo`，因为你稍后会对其进行更多配置。\n\n接下来，你需要为你的 `UIPrintInteractionController` 做一个有趣的指定操作。我说有趣，是因为你必须从四个可能任务中选择一个，且只能选择一个：\n\
  \n1. 设置要打印的单个项目。\n2. 设置要打印的多个项目。\n3. 向控制器指定一个 `UIPrintFormatter` 实例，以配置页面布局。\n4.\
  \ 指定一个 `UIPrintPageRenderer` 实例，然后可以将多个 `UIPrintFormatter` 实例分配给它，以实现跨多页内容布局的完全自定义。\n\
  \n我们将从最简单的选项开始——设置单个要打印的项目。使用这些更简单的选项时，该项目必须是图像或 PDF 文件，因此你将选择直接打印你的 `selectedImage`。\n\
  \n```\nUIImage *image = self.selectedImage;\npic.printingItem = image;\n```\n\n\
  现在你知道了要打印的内容，可以检查图像的方向并相应地配置你的 `printInfo`。\n\n```\nif (!pic.printingItem && image.size.width\
  \ > image.size.height)\n    printInfo.orientation = UIPrintInfoOrientationLandscape;\n\
  \npic.printInfo = printInfo;\npic.showsPageRange = YES;\n```\n\n最后，你只需展示你的 `UIPrintInteractionController`。根据你的具体实现，这个类提供了三种不同的自展示方法。\n\
  \n- `-presentFromBarButtonItem:animated:completionHandler:`：如果你是为 iPad 编写，此方法适用于应用程序的“打印”按钮放置在工具栏中的情况（例如你的情况）。\n\
  - `-presentFromRect:inView:animated:completionHandler:`：此方法也仅适用于 iPad，但允许你从视图的任何部分展示控制器。通常，指定的\
  \ `rect` 是你“打印”按钮的 `frame`，无论它位于何处。\n- `-presentAnimated:completionHandler:`：由于屏幕较小，在\
  \ iPhone 上实现打印时应使用此方法。\n\n通过这最后的调用，你的 `-printPressed:` 方法的完整代码如下所示：\n\n```\n-(void)printPressed:(id)sender\n\
  {\n    if ([UIPrintInteractionController isPrintingAvailable] && (self.selectedImage\
  \ != nil))\n    {\n        UIPrintInteractionController *pic = [UIPrintInteractionController\
  \ sharedPrintController];\n\n        UIPrintInfo *printInfo = [UIPrintInfo printInfo];\n\
  \        printInfo.outputType = UIPrintInfoOutputPhoto;\n        printInfo.jobName\
  \ = self.title;\n        printInfo.duplex = UIPrintInfoDuplexLongEdge;\n\n     \
  \   UIImage *image = self.selectedImage;\n        pic.printingItem = image;\n\n\
  \        if (!pic.printingItem && image.size.width > image.size.height)\n      \
  \      printInfo.orientation = UIPrintInfoOrientationLandscape;\n\n        pic.printInfo\
  \ = printInfo;\n        pic.showsPageRange = YES;\n\n        [pic presentFromBarButtonItem:sender\
  \ animated:YES\n                    completionHandler:^(UIPrintInteractionController\
  \ *printInteractionController, BOOL completed, NSError *error)\n         {\n   \
  \          if (!completed && (error != nil))\n             {\n                 NSLog(@\"\
  错误原因：域：%@，代码：%@\", error.domain, error.code);\n             }\n             else\n\
  \             {\n                 NSLog(@\"打印已取消\");\n             }\n         }];\n\
  \    }\n}\n```\n\n现在当你运行应用程序并选择图像后，点击打印按钮时，会出现一个小控制器，你可以从中选择打印机并进一步配置具体的打印任务！但遗憾的是，如果你在模拟器中测试，或者没有设置任何无线打印机，你将看不到任何可用的打印机，如图\
  \ 13–8 所示。\n\n![图片](img/9781430240051_Fig13-08.jpg)\n\n**图 13–8.** *你的应用程序带有新的“打印”按钮，但无法找到任何\
  \ AirPrint 打印机*\n\n幸运的是，当你安装最新版本的 Xcode 时，还获得了一个名为“打印机模拟器”（Printer Simulator）的出色应用程序。借助这个程序，你将能够从你的应用程序中完全模拟打印任务。它甚至会为你提供一份模拟输出的\
  \ PDF 文件，这样你就能确切地看到图像的打印效果，而无需浪费纸张！\n\n你可以通过 Spotlight 轻松打开这个程序。\n\n运行“打印机模拟器”应用程序后，系统会自动注册多种打印机类型供使用。界面将类似于图\
  \ 13–9。\n\n![图片](img/9781430240051_Fig13-09.jpg)\n\n**图 13–9.** *打印机模拟器注册多种打印机类型以进行模拟*\n\
  \n\n\n现在，在测试您的应用程序时，您应该会看到多种不同类型的模拟打印机，可用于测试您的应用程序。您可以选择不同类型，查看打印输出如何受打印机样式影响，如图\
  \ 13–10 所示。\n\n![Image](img/9781430240051_Fig13-10.jpg)\n\n**图 13–10.** *从您的应用中选择一台模拟打印机*\n\
  \n选择打印机后，您可以打印多份副本，并在打印前更改纸张类型。此时，您应该会看到您的打印机模拟器开始活动，随后，将打开一个 PDF 文件，其中包含您的最终打印输出，类似于图\
  \ 13–11 所示。\n\n![Image](img/9781430240051_Fig13-11.jpg)\n\n**图 13–11.** *从模拟打印机打印图像的输出*\n\
  \n### 方案 13-4：打印纯文本\n\n在前一个方案的基础上，您将添加功能，利用打印格式化器来打印简单的文本。\n\n首先，您将修改`-viewDidLoad`方法，添加一个额外的按钮来打印`UITextView`中的文本。将您已有的方法中的条件语句修改为如下所示：\n\
  \n```\nif ([UIPrintInteractionController isPrintingAvailable])\n    {\nUIBarButtonItem\
  \ *printButton = [[UIBarButtonItemalloc] initWithTitle:@\"Print Image\"\nstyle:UIBarButtonItemStyleBordered\
  \ target:self action:@selector(printPressed:)];\n\nUIBarButtonItem *printTextButton\
  \ = [[UIBarButtonItem alloc] initWithTitle:@\"Print Text\"\nstyle:UIBarButtonItemStyleBordered\
  \ target:self action:@selector(printTextPressed:)];\n\nself.navigationItem.rightBarButtonItems\
  \ = [NSArray arrayWithObjects:printButton,\nprintTextButton, nil];\n    }\n```\n\
  \n然后，用于打印文本的新选择器将按如下方式实现：\n\n```\n-(void)printTextPressed:(id)sender\n{\nif ([UIPrintInteractionController\
  \ isPrintingAvailable])\n    {\nUIPrintInteractionController *pic = [UIPrintInteractionController\n\
  sharedPrintController];\n\nUIPrintInfo *printInfo = [UIPrintInfo printInfo];\n \
  \       printInfo.outputType = UIPrintInfoOutputGeneral;\n        printInfo.jobName\
  \ = self.title;\n        printInfo.duplex = UIPrintInfoDuplexLongEdge;\n       \
  \ pic.printInfo = printInfo;\n\nUISimpleTextPrintFormatter *simpleTextPF = [[UISimpleTextPrintFormatter\
  \ alloc]\ninitWithText:self.textViewInput.text];\n        simpleTextPF.startPage\
  \ = 0;\n        simpleTextPF.contentInsets = UIEdgeInsetsMake(72.0, 72.0, 72.0,\
  \ 72.0);\n        simpleTextPF.maximumContentWidth = 6*72.0;\n\n        pic.printFormatter\
  \ = simpleTextPF;\n\n        pic.showsPageRange = YES;\n\n        [pic presentFromBarButtonItem:sender\
  \ animated:YES\ncompletionHandler:^(UIPrintInteractionController *printInteractionController,\
  \ BOOL\ncompleted, NSError *error)\n         {\nif (!completed && (error != nil))\n\
  \             {\nNSLog(@\"Error due to Domain: %@, Code: %@\", error.domain, error.code);\n\
  \             }\nelse\n             {\nNSLog(@\"Printing Cancelled\");\n       \
  \      }\n         }];\n    }\n}\n```\n\n此方法与其前身相比有两个主要区别：\n\n1.  `UIPrintInfo`中的`outputType`属性被修改为`UIPrintInfoOutputGeneral`值，因为您不再打印照片。\n\
  2.  您没有将`UIImage`设置给`printingItem`属性，而是将`UISimpleTextPrintFormatter`的一个实例设置给了`printFormatter`属性。该对象使用所需文本进行初始化，然后通过其属性进行配置。\n\
  \    *   值为 72.0 的边距相当于 1 英寸，因此您为输出设置了 1 英寸的边距，并为内容指定了 6 英寸的宽度。\n    *   `startPage`属性将在后续有更多用途，但它允许您指定作业中应用格式化器的页面。\n\
  \n打印简单文本时，也很容易将上述方法应用于打印 HTML 格式的文本。要做到这一点，只需使用`UIMarkupTextPrintFormatter`代替`UISimpleTextPrintFormatter`即可。\n\
  \n与之前一样，通过使用打印机模拟器，您可以生成测试输出。由于您将文本视图的文本设置为打印格式化器的内容，您将简单地得到一个包含一些 Lorem Ipsum 文本的文档，如图\
  \ 13–12 所示。\n\n![Image](img/9781430240051_Fig13-12.jpg)\n\n**图 13–12.** *模拟打印简单文本页面的输出*\n\
  \n### 方案 13-5：打印视图\n\n就像您可以使用`UISimpleTextPrintFormatter`打印文本一样，您也可以轻松地使用`UIPrintFormatter`的另一个子类`UIViewPrintFormatter`来打印视图的内容。\n\
  \n首先修改您的`-viewDidLoad`的条件设置，使其现在看起来像这样：\n\n```\nif ([UIPrintInteractionController\
  \ isPrintingAvailable])\n    {\nUIBarButtonItem *printButton = [[UIBarButtonItem\
  \ alloc] initWithTitle:@\"Print Image\"\nstyle:UIBarButtonItemStyleBorderedtarget:self\
  \ action:@selector(printPressed:)];\n\nUIBarButtonItem *printTextButton = [[UIBarButtonItem\
  \ alloc] initWithTitle:@\"Print Text\"\nstyle:UIBarButtonItemStyleBordered target:self\
  \ action:@selector(printTextPressed:)];\n\nUIBarButtonItem *printViewButton = [[UIBarButtonItem\
  \ alloc] initWithTitle:@\"Print View\"\nstyle:UIBarButtonItemStyleBordered target:self\
  \ action:@selector(printViewPressed:)];\n\nself.navigationItem.rightBarButtonItems\
  \ = [NSArray arrayWithObjects:printButton,\nprintTextButton, printViewButton, nil];\n\
  \    }\n```\n\n您最新的打印方法`-printViewPressed:`将与上一个方法非常相似，关键变化在于使用了`UIViewPrintFormatter`。\n\
  \n```\n-(void)printViewPressed:(id)sender\n{\nif ([UIPrintInteractionController\
  \ isPrintingAvailable])\n    {\nUIPrintInteractionController *pic = [UIPrintInteractionController\n\
  sharedPrintController];\n\nUIPrintInfo *printInfo = [UIPrintInfo printInfo];\n \
  \       printInfo.outputType = UIPrintInfoOutputGeneral;\n        printInfo.jobName\
  \ = self.title;\n        printInfo.duplex = UIPrintInfoDuplexLongEdge;\n       \
  \ printInfo.orientation = UIPrintInfoOrientationLandscape;\n        pic.printInfo\
  \ = printInfo;\n\nUIViewPrintFormatter *viewPF = [self.textViewInput viewPrintFormatter];\n\
  \n        pic.printFormatter = viewPF;\n        pic.showsPageRange = YES;\n\n  \
  \      [pic presentFromBarButtonItem:sender animated:YES\ncompletionHandler:^(UIPrintInteractionController\
  \ *printInteractionController, BOOL\ncompleted, NSError *error)\n         {\nif\
  \ (!completed && (error != nil))\n             {\nNSLog(@\"Error due to Domain:\
  \ %@, Code: %@\", error.domain, error.code);\n             }\nelse\n           \
  \  {\nNSLog(@\"Printing Cancelled\");\n             }\n         }];\n    }\n}\n\
  ```\n\n不幸的是，`UIViewPrintFormatter`目前仅配置为提供三种系统视图的打印视图：`UITextView`、`UIWebView`和`MKMapView`（来自\
  \ MapKit 框架，如第 4 章所述）。由于您的应用程序只使用了其中一种，您只需让它打印您的`UITextView`视图，结果输出如图 13–13 所示。\n\
  \n![Image](img/9781430240051_Fig13-13.jpg)\n\n**图 13–13.** *模拟打印输出，具体为`UITextView`的输出*\n\
  \n尽管`UIViewPrintFormatter`有局限性，但它可以是一种极其简单的方式，用于轻松打印任何文本、地图或网页的内容。\n\n\n\n### 技巧\
  \ 13–6：使用页面渲染器进行格式化打印\n\n页面渲染器本质上允许您完全自定义任何打印作业的内容。您不仅可以使用不同的打印格式化器格式化多个页面，还可以在任何页面的页眉、主体和页脚中绘制自定义内容。\n\
  \n要使用页面渲染器，您必须创建 `UIPrintPageRenderer` 类的自定义子类，并覆写其中的方法来自定义打印作业的内容。\n\n使用 Objective-C\
  \ 类模板创建一个新文件。当您输入文件名 `SendItOutPageRenderer` 时，请确保该文件是 `UIPrintPageRenderer` 的子类，如图\
  \ 图 13–14 所示。\n\n![图像](img/9781430240051_Fig13-14.jpg)\n\n**图 13–14.** *创建一个 `UIPrintPageRenderer`\
  \ 子类*\n\n点击以创建您的新文件。\n\n接下来，定义两个 `NSString` 属性 `title` 和 `author`，它们将被打印在渲染器的页眉中。\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface SendItOutPageRenderer : UIPrintPageRenderer\n\
  \n@property (nonatomic, strong) NSString *title;\n@property (nonatomic, strong)\
  \ NSString *author;\n\n@end\n```\n\n为了自定义特定页面渲染器的布局，您可以覆写从 `UIPrintPageRenderer`\
  \ 类继承的方法。该类的设置方式是，`-drawPageAtIndex:inRect:` 方法会调用其他四个方法：\n\n*   `-drawHeaderForPageAtIndex:inRect:`：用于指定页眉内容；如果渲染器的\
  \ `headerHeight` 属性为零，则不会调用此方法。\n*   `-drawContentForPageAtIndex:inRect:`：在页面的内容矩形内绘制自定义内容。\n\
  *   `-drawFooterForPageAtIndex:inRect:`：指定页脚内容；如果渲染器的 `footerHeight` 属性为零，也不会调用此方法。\n\
  *   `-drawPrintFormatter:forPageAtIndex:`：使用打印格式化器和自定义内容的组合来覆盖或填充视图。\n\n您可以覆写这五个方法中的任意一个（包括\
  \ `-drawPageAtIndex:inRect:`）来自定义打印内容。在本例中，您将覆写页眉、页脚和打印格式化器的方法。\n\n您将让页眉在左侧打印文档的作者，在右侧打印标题。您的方法如下所示：\n\
  \n```\n- (void)drawHeaderForPageAtIndex:(NSInteger)pageIndex  inRect:(CGRect)headerRect\n\
  {\n    if (pageIndex != 0)\n    {\n        UIFont *font = [UIFont fontWithName:@\"\
  Helvetica\" size:12.0];\n        CGSize titleSize = [self.title sizeWithFont:font];\n\
  \n        CGFloat drawXTitle = CGRectGetMaxX(headerRect) - titleSize.width;\n  \
  \      CGFloat drawXAuthor = CGRectGetMinX(headerRect);\n        CGFloat drawY =\
  \ CGRectGetMinY(headerRect);\n        CGPoint drawPointAuthor = CGPointMake(drawXAuthor,\
  \ drawY);\n        CGPoint drawPointTitle = CGPointMake(drawXTitle, drawY);\n\n\
  \        [self.title drawAtPoint:drawPointTitle withFont:font];\n        [self.author\
  \ drawAtPoint:drawPointAuthor withFont:font];\n    }\n}\n```\n\n您的页脚实现方法看起来类似，将打印出一个居中的页码。由于页索引从\
  \ 0 开始，您必须记得将所有值加 1。\n\n```\n- (void)drawFooterForPageAtIndex:(NSInteger)pageIndex\
  \ inRect:(CGRect)footerRect\n{\n    UIFont *font = [UIFont fontWithName:@\"Helvetica\"\
  \ size:12.0];\n    NSString *pageNumber = [NSString stringWithFormat:@\"%d.\", pageIndex+1];\n\
  \n    CGSize pageNumSize = [pageNumber sizeWithFont:font];\n    CGFloat drawX =\
  \ CGRectGetMaxX(footerRect)/2.0 - pageNumSize.width - 1.0;\n    CGFloat drawY =\
  \ CGRectGetMaxY(footerRect) - pageNumSize.height;\n    CGPoint drawPoint = CGPointMake(drawX,\
  \ drawY);\n    [pageNumber drawAtPoint:drawPoint withFont:font];\n}\n```\n\n最后，为了处理交错的打印格式化器，您将实现\
  \ `-drawPrintFormatter:forPageAtIndex:` 方法，在视图上叠加一个简单的文本。在更针对性的应用中，这可以轻松用于在图像或文档上放置某种“专有内容”标签。\n\
  \n\n\n`-(void)drawPrintFormatter:(UIPrintFormatter *)printFormatter`\n`forPageAtIndex:(NSInteger)pageIndex`\n\
  `{`\n`CGRect contentRect = CGRectMake(self.printableRect.origin.x,`\n`self.printableRect.origin.y+self.headerHeight,\
  \ self.printableRect.size.width,`\n`self.printableRect.size.height-self.headerHeight-self.footerHeight);`\n\
  `    [printFormatter drawInRect:contentRect forPageAtIndex:pageIndex];`\n\n`NSString\
  \ *overlayText = @\"覆盖文本\";`\n`UIFont *font = [UIFont fontWithName:@\"Helvetica\"\
  size:26.0];`\n`CGSize overlaySize = [overlayText sizeWithFont:font];`\n\n`CGFloat\
  \ xCenter = CGRectGetMaxX(self.printableRect)/2.0 - overlaySize.width/2.0;`\n`CGFloat\
  \ yCenter = CGRectGetMaxY(self.printableRect)/2.0 - overlaySize.height/2.0;`\n`CGPoint\
  \ overlayPoint = CGPointMake(xCenter, yCenter);`\n\n`    [overlayText drawAtPoint:overlayPoint\
  \ withFont:font];`\n`}`\n\n在此方法中，需要注意的是，你必须使用其自身的 `-drawInRect:forPageAtIndex:`\
  \ 方法手动绘制每个 `printFormatter` 的内容。为了避免覆盖页眉或页脚，你指定了一个由 `headerHeight` 和 `footerHeight`\
  \ 限制的绘制区域。\n\n现在，回到你的主视图控制器中，确保导入新创建的 `SendItOutPageRenderer.h` 文件。\n\n`#import\
  \ \"SendItOutPageRenderer.h\"`\n\n添加一个额外的 `UIBarButtonItem`，向用户提供“自定义打印”选项。结合之前所有方法中的功能，你的\
  \ `-viewDidLoad` 方法现在应如下所示：\n\n`- (void)viewDidLoad`\n`{`\n`    [super viewDidLoad];`\n\
  \n`    [[NSNotificationCenter defaultCenter] addObserver:self`\n`selector:@selector(availabilityChange:)`\n\
  `name:@\"MFMessageComposeViewControllerTextMessageAvailabilityDidChangeNotification\"\
  `\n`object:nil];`\n\n`self.textViewInput.layer.cornerRadius = 15.0;`\n`self.textViewInput.delegate\
  \ = self;`\n\n`self.title = @\"发送出去！\";`\n\n`if ([UIPrintInteractionController isPrintingAvailable])`\n\
  `    {`\n`UIBarButtonItem *printButton = [[UIBarButtonItem alloc] initWithTitle:@\"\
  打印图片\"`\n`style:UIBarButtonItemStyleBordered target:self action:@selector(printPressed:)];`\n\
  \n`UIBarButtonItem *printTextButton = [[UIBarButtonItem alloc] initWithTitle:@\"\
  打印文本\"`\n`style:UIBarButtonItemStyleBordered target:self action:@selector(printTextPressed:)];`\n\
  \n`UIBarButtonItem *printViewButton = [[UIBarButtonItem alloc] initWithTitle:@\"\
  打印视图\"`\n`style:UIBarButtonItemStyleBordered target:self action:@selector(printViewPressed:)];`\n\
  \n`UIBarButtonItem *printCustomButton = [[UIBarButtonItem alloc] initWithTitle:@\"\
  打印自定义\"`\n`style:UIBarButtonItemStyleBordered target:self`\n`action:@selector(printCustomPressed:)];`\n\
  \n`self.navigationItem.rightBarButtonItems = [NSArray arrayWithObjects:printButton,`\n\
  `printTextButton, printViewButton, printCustomButton, nil];`\n`    }`\n`}`\n\n最后，你可以实现\
  \ `-printCustomPressed:` 操作。\n\n`-(void)printCustomPressed:(id)sender`\n`{`\n`if\
  \ ([UIPrintInteractionControllerisPrintingAvailable])`\n`    {`\n`UIPrintInteractionController\
  \ *pic = [UIPrintInteractionController`\n`sharedPrintController];`\n\n`UIPrintInfo\
  \ *printInfo = [UIPrintInfoprintInfo];`\n`        printInfo.outputType = UIPrintInfoOutputGeneral;`\n\
  `        printInfo.jobName = self.title;`\n`        printInfo.duplex = UIPrintInfoDuplexLongEdge;`\n\
  `        printInfo.orientation = UIPrintInfoOrientationPortrait;`\n`        pic.printInfo\
  \ = printInfo;`\n\n`UISimpleTextPrintFormatter *simplePF = [[UISimpleTextPrintFormatter\
  \ alloc]`\n`initWithText:[self.textViewInput.text stringByAppendingString:@\"这段文本是我的第一页\"\
  ]];`\n`UIViewPrintFormatter *viewPF = [self.textViewInputview PrintFormatter];`\n\
  \n`SendItOutPageRenderer *sendPR = [[SendItOutPageRendereralloc] init];`\n`    \
  \    sendPR.title = @\"我的打印任务标题\";`\n`        sendPR.author = @\"文档作者\";`\n`   \
  \     sendPR.headerHeight = 72.0/2;`\n`        sendPR.footerHeight = 72.0/2;`\n\
  `        [sendPR addPrintFormatter:simplePF startingAtPageAtIndex:0];`\n`      \
  \  [sendPR addPrintFormatter:viewPF startingAtPageAtIndex:1];`\n\n`        pic.printPageRenderer\
  \ = sendPR;`\n\n`        pic.showsPageRange = YES;`\n\n`        [pic presentFromBarButtonItem:sender\
  \ animated:YES`\n`completionHandler:^(UIPrintInteractionController *printInteractionController,\
  \ BOOL`\n`completed, NSError *error)`\n`         {`\n`if (!completed && (error !=\
  \ nil))`\n`             {`\n`NSLog(@\"错误来自域: %@, 代码: %@\", error.domain, error.code);`\n\
  `             }`\n`else`\n`             {`\n`NSLog(@\"打印已取消\");`\n`            \
  \ }`\n`         }];`\n`    }`\n`}`\n\n此方法在你之前方法的基础上增加了以下额外步骤：\n\n1.  创建多个打印格式化器以分配给不同页面。由于此应用中未使用\
  \ `UIWebView` 或 `MKMapView`，你仅选择了打印 `UITextView` 的文本及其整体视图。\n2.  创建 `SendItOutPageRenderer`\
  \ 类的实例，并使用 `title`、`author`、`headerHeight` 和 `footerHeight` 对其进行配置。如果未指定后两个属性，你的页眉和页脚自定义方法将不会被调用。\n\
  3.  将你的打印格式化器添加到页面渲染器，并将此渲染器分配给 `UIPrintInteractionController`。\n\n在测试此新功能后，你的输出将是一个两页的文本文档，包含简单的页眉、页脚，甚至还有一个文本覆盖层，如图\
  \ 13–15 所示。\n\n![图片](img/9781430240051_Fig13-15.jpg)\n\n**图 13–15.** *使用页面渲染器和多个打印格式化器的模拟打印输出*\n\
  \n由于应用的简单性，图 13–15 中的截图可能看起来并不起眼，但考虑到你对自定义页眉、页脚、覆盖内容以及页面格式化器的应用，它实际上很好地展示了在追求理想自定义打印时，利用页面渲染器进行打印的强大功能。\n\
  \n### 总结\n\n在创建应用时，你有责任始终为用户着想。应用的每一个方面都应设计为允许并帮助用户完成某个目标，并且每个方面都应进行优化以加快实现这些目标。在开发过程中，发送短信、构建电子邮件或创建打印输出等数据传输功能往往被错误地视为不必要而忽略。开发者必须始终从用户的角度思考，并想象用户可能如何使用任一功能。仅仅是能够打印内容以备后用，或者能轻松将有趣的图片通过邮件发送给朋友，这种简单的可能性，就可能成为用户选择你的应用而非其他应用的关键分界线。通过理解并利用这些“额外”功能，你可以显著提升应用的功能性，从而更好地服务最终用户。\n\
  \n"
- "# 第 14 章\n\n## Twitter 范例\n\n自诞生以来，Twitter 服务作为一种沟通、广告甚至组织工具迅速扩张。其应用已广泛应用于现代科技和娱乐领域，实现了前所未有的海量大众传播。随着\
  \ iOS 5.0 的发布，Twitter 框架的加入使开发者能够更高效地利用这一不可思议的接口进行工作和编程。这开启了应用开发的整个新类别，从发送简单推文到分析热门话题，再到向用户推荐文章无所不包。通过在我们的应用中利用这一框架，我们能够融入多种功能，使应用能够与\
  \ Twitter 服务进行通信，让用户为这个不断发展的全球通信网络做出更多贡献。\n\n\n\n### 配方 14–1：编写简单的推文\n\nTwitter\
  \ 服务的核心基础是发送“推文”这一概念。推文由简短的信息片段组成，限制在 140 个字符以内，有时会附带一张图片或外部链接。在 Twitter 框架中，你可以使用一个预配置的类来轻松发送这些消息。\n\
  \n在使用 Twitter 框架时，你构建的任何围绕访问特定 Twitter 账号以发送或检索信息的功能，实际上都无法在 iOS 模拟器上运行，因为你无法将其连接到\
  \ Twitter 账号。因此，你将选择在物理设备上测试所有基于 Twitter 的配方。\n\n为了测试那些需要在设备上拥有账号的功能，你需要确保设备至少配置了一个\
  \ Twitter 账号。你可以通过 Twitter 网站或 Twitter iOS 应用创建账号。一旦拥有账号，你必须向设备提供登录信息。此配置可以通过设备上的“设置”应用访问，效果类似于图\
  \ 14-1。\n\n![图片](img/9781430240051_Fig14-01.jpg)\n\n**图 14-1.** *在设备上配置你的 Twitter\
  \ 账号*\n\n通过在设备上配置一个 Twitter 账号，你将能够全面测试所创建的所有功能。\n\n接下来，你将开始在 Xcode 中创建一个名为“Tweeter”的新项目。选择“SingleView\
  \ Application”模板，然后点击创建项目。如果你运行的是最新版本的 Xcode，请确保勾选标记为“自动引用计数”的复选框，如图 14-2 所示。\n\n\
  ![图片](img/9781430240051_Fig14-02.jpg)\n\n**图 14-2.** *配置项目设置*\n\n对于本章中的所有配方，你需要将\
  \ Twitter 框架包含到项目中。\n\n选择你的项目后，导航到“Build Phases”选项卡，在标记为“Link Binary With Libraries”的部分中，点击\
  \ + 按钮。找到名为 `Twitter.framework` 的项目，并将其添加进去，如图 14-3 所示。\n\n![图片](img/9781430240051_Fig14-03.jpg)\n\
  \n**图 14-3.** *添加 Twitter 框架*\n\n稍后你还需要 Accounts 框架，因此重复此过程，添加名为 `Accounts.framework`\
  \ 的项目。\n\n将导入语句添加到视图控制器的头文件中，以便编译器允许你使用添加的框架。\n\n```\n#import <Twitter/Twitter.h>\n\
  #import <Accounts/Accounts.h>\n```\n\n接下来，你将设置初始用户界面。向视图中添加一个 `UIButton`，并使用属性名\
  \ `simpleTweetButton` 将其连接到控制器。将其连接到一个名为 `-simpleTweetPressed:` 的 `IBAction` 方法，如图\
  \ 14-4 所示。\n\n![图片](img/9781430240051_Fig14-04.jpg)\n\n**图 14-4.** *设置简单的用户界面*\n\
  \n让我们创建一个便捷方法，用于检查应用程序在任意时刻是否可以发送推文。如果不行，你将禁用并使 `UIButton` 变暗。\n\n```\n-(BOOL)checkCanTweet\n\
  {\n    if ([TWTweetComposeViewController canSendTweet])\n    {\n        self.simpleTweetButton.enabled\
  \ = YES;\n        self.simpleTweetButton.alpha = 1.0;\n        return YES;\n   \
  \ }\n    else\n    {\n        self.simpleTweetButton.enabled = NO;\n        self.simpleTweetButton.alpha\
  \ = 0.6;\n        return NO;\n    }\n}\n```\n\n这个方法使用了 `TWTweetComposeViewController`\
  \ 的 `+canSendTweet` 类方法。你很快将使用这个类来创建简单的推文。\n\n为了确保视图控制器能正确重新检查功能，你会在 `-viewDidLoad`\
  \ 和 `-viewWillAppear:animated:` 两个方法中调用此函数。\n\n```\n[self checkCanTweet];\n```\n\
  \n你的应用程序所在的设备随时可能配置一个 Twitter 账号，因此你也可以注册通知，以便在账号信息发生变化时接收通知。将以下行添加到你的 `-viewDidLoad`\
  \ 方法中。\n\n```\n[[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(checkCanTweet)\n\
  \        name:ACAccountStoreDidChangeNotification object:nil];\n```\n\n现在，你将实现 `-simpleTweetPressed:`\
  \ 方法来配置并发送一条简单的推文。\n\n```\n-(void)simpleTweetPressed:(id)sender\n{\n    if ([self\
  \ checkCanTweet])\n    {\n        TWTweetComposeViewController *tweet = [[TWTweetComposeViewController\
  \ alloc] init];\n        [tweet setInitialText:@\"Posting a simple Tweet from my\
  \ app!\"];\n        [tweet setCompletionHandler:^(TWTweetComposeViewControllerResult\
  \ result)\n        {\n            if (result == TWTweetComposeViewControllerResultDone)\n\
  \            {\n                NSLog(@\"Tweet Successfully Sent\");\n         \
  \   }\n            else\n            {\n                NSLog(@\"Tweet Cancelled\"\
  );\n            }\n            [self dismissModalViewControllerAnimated:YES];\n\
  \        }];\n        [self presentModalViewController:tweet animated:YES];\n  \
  \  }\n}\n```\n\n如上所示，你可以为推文创建初始文本，并设置一个完成处理程序，在 `TWTweetComposeViewController` 被取消或完成后调用。\n\
  \n除了初始文本之外，你还可以使用 `-addImage:` 和 `addURL:` 方法向推文附加图片和链接。图 14-5 展示了你的当前配置，并附加了一个链接。\n\
  \n![图片](img/9781430240051_Fig14-05.jpg)\n\n**图 14-5.** *你的视图展示了一个 `TWTweetComposeViewController`*\n\
  \n用于向推文添加内容的三个方法 `-setInitialText:`、`-addImage:` 和 `-addURL:` 都返回 BOOL 值，指示内容是否成功添加。如果内容不适合推文，或者控制器已经展示，这些值将为\
  \ `NO`。\n\n为了确保用户始终对从此控制器发送的推文内容拥有最终决定权，开发者不允许在控制器展示后设置或添加任何内容。\n\n如果你希望在展示前从控制器中移除内容，可以使用\
  \ `-removeAllImages` 和 `-removeAllURLs` 方法。\n\n### 配方 14–2：创建简单的 TWRequest\n\n除了\
  \ `TWTweetComposeViewController` 之外，Twitter 框架中唯一的另一个类是 `TWRequest` 类。这个类非常通用，并利用\
  \ Twitter 的特定 API 来发送和请求信息。通过使用它，你可以模仿 `TWTweetComposeViewController` 的基本功能，并执行几乎所有你想在应用程序中集成的、与\
  \ Twitter 服务相关的命令。\n\n重要的是要记住，Twitter API 的变化与 iOS API 不同，因此本节中任何特定于 Twitter 的代码可能需要更新到最新版本。\n\
  \n\n\n#### 通过 `TWRequest` 发送推文\n\n你需要在视图中添加另一个 `UIButton` 以实现更复杂的功能，该按钮标签为“发布推文”，属性名为\
  \ `postTweetButton`，操作处理器为 `-postTweetPressed:`。将其放置在第一个按钮下方，如图 14-6 所示。\n\n![图片](img/9781430240051_Fig14-06.jpg)\n\
  \n**图 14-6.** *在界面中添加另一个按钮*\n\n接下来你将实现 `-postTweetPressed:` 方法。该方法将包含以下步骤：\n\n1.\
  \  访问设备的帐户存储，该存储可访问设备上注册的所有帐户。\n2.  创建 `ACAccountType` 实例，用于在请求中指定所有已存储的 Twitter\
  \ 帐户。\n3.  请求访问指定类型的所有帐户。`-requestAccessToAccountsWithType:withCompletionHandler:`\
  \ 方法将提示用户是否允许应用程序访问这些帐户。如果应用程序之前已获得权限，则不会再次提示用户。\n4.  从帐户存储中获取一个 `ACAccount` 对象数组，该数组引用设备上所有已注册的\
  \ Twitter 帐户。\n5.  访问一个用于发布推文的特定帐户。\n6.  初始化 `TWRequest` 实例。该类会接收关于所构建的特定请求的指令。\n\
  7.  将你选择的 `ACAccount` 设置给 `TWRequest`。\n8.  执行请求，并利用完成处理器分析结果。\n\n```\n-(IBAction)postTweetPressed:(id)sender\n\
  {\n    ACAccountStore *accountStore = [[ACAccountStore alloc] init];\n\n    ACAccountType\
  \ *accountType = [accountStore\n        accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];\n\
  \n    [accountStore requestAccessToAccountsWithType:accountType\n        withCompletionHandler:^(BOOL\
  \ granted, NSError *error)\n    {\n        if (granted)\n        {\n           \
  \ NSArray *accountsArray = [accountStore accountsWithAccountType:accountType];\n\
  \n            if ([accountsArray count] >0)\n            {\n                ACAccount\
  \ *twitterAccount = [accountsArray objectAtIndex:0];\n\n                TWRequest\
  \ *postRequest = [[TWRequest alloc] initWithURL:[NSURLURL\n                    WithString:@\"\
  http://api.twitter.com/1/statuses/update.json\"]\n                    parameters:[NSDictionary\n\
  \                    dictionaryWithObject:@\"Posted with a TWRequest!\" forKey:@\"\
  status\"]\n                    requestMethod:TWRequestMethodPOST];\n\n         \
  \       [postRequest setAccount:twitterAccount];\n\n                [postRequest\
  \ performRequestWithHandler:^(NSData *responseData,\n                    NSHTTPURLResponse\
  \ *urlResponse, NSError *error)\n                {\n                    if ([urlResponse\
  \ statusCode] == 200)\n                    {\n                        NSLog(@\"\
  Tweet Posted\");\n                    }\n                    else\n            \
  \        {\n                        NSLog(@\"Error Posting Tweet\");\n         \
  \           }\n                }];\n            }\n        }\n    }];\n}\n```\n\n\
  该方法的关键部分当然是 `TWRequest` 的初始化。这里你精心使用了 Twitter API，通过三个属性配置推文发布：\n\n* **URL**：用于构建\
  \ URL 的字符串 `http://api.twitter.com/1/statuses/update.json`，专门用于告知 Twitter 服务你正在发起状态更新。\n\
  * **参数**：你指定了一个 `NSDictionary` 实例，其中包含一个键“status”，并为其分配一个包含推文实际文本的 `NSString`。\n\
  * **请求方法**：此参数指定你正在发出的请求类型。由于你在发布推文，因此使用 `TWRequestMethodPOST` 值。\n\n使用此方法发布推文的一个有趣之处在于，用户在推文发送前实际上无法预览。事实上，在这种情况下，用户收到的唯一提示是请求访问\
  \ Twitter 帐户。在发送此类推文时，务必牢记用户的最佳利益，以免发布未经用户希望的更新。\n\n**注意：** 如上述方法所示，你可以通过检查 `urlResponse`\
  \ 的 `statusCode` 来评估 `TWRequest` 的结果。如果此值为 200，则表示请求已成功完成。否则，存在某种错误。请参阅 Twitter\
  \ API `https://dev.twitter.com/docs/error-codes-responses` 了解各种错误代码的具体细节。\n\n在测试此应用时，你将能够在获得权限后，无需使用\
  \ `TWTweetComposeViewController`，即可从设备已注册的帐户发送推文。\n\n\n\n### 方案 14-3：检索推文\n\n既然你已经掌握了两种在\
  \ Twitter 上发布更新的方法，接下来可以运用上一个方案中围绕 `TWRequest` 类所学的概念，构建一个能够获取并显示推文的应用程序。\n\n你将构建一个用于显示多组不同推文的应用程序，因此需要使用\
  \ `UITabBarController` 来分隔不同的内容组。新建一个项目，首先选择标签栏应用程序模板，如图 14-7 所示。\n\n![图片](img/9781430240051_Fig14-07.jpg)\n\
  \n**图 14-7.** *创建标签栏应用程序*\n\n在下一个界面中，输入你的项目名称。由于你将显示来自不同来源的推文组，请将项目命名为 `\"PulseOfTheWorld\"\
  `，类前缀设为 `\"Main\"`。确保应用程序配置为 iPhone 设备系列，并启用自动引用计数，这样你的项目设置就与上一个方案相同。点击继续创建项目。\n\
  \n模板应用程序将与模拟界面相似。幸运的是，这个布局恰好也是你应用程序的起始布局，如图 14-8 所示，因此你可以直接显示从 Twitter 获取的原始数据。\n\
  \n![图片](img/9781430240051_Fig14-08.jpg)\n\n**图 14-8.** *你的通用标签栏应用程序*\n\n**注意：**\
  \ 由于你创建的模板应用程序包含两个格式相似的视图控制器，以下配置将同时对这两个控制器进行修改。请仔细按照步骤，对每个视图控制器进行所有必要的更改。\n\n首先，你需要将用户界面配置为可通过编程方式进行编辑。因此，先进入两个预置视图控制器的\
  \ XIB 文件，将 `UILabel` 和 `UITextView` 连接到头文件中的属性。在第一个视图控制器中使用属性名 `publicLabel` 和 `publicTextView`，在第二个视图控制器中使用\
  \ `homeLabel` 和 `homeTextView`。\n\n你可以修改视图元素的初始文本，使其更符合应用程序的需求。在第一个视图控制器的 `-viewDidLoad`\
  \ 方法中添加以下代码：\n\n```\nself.publicLabel.text = @\"公共时间线\";\nself.publicTextView.text\
  \ = @\"尚未获取公共时间线数据。\";\n```\n\n在第二个视图控制器中添加等效代码：\n\n```\nself.homeLabel.text = @\"\
  主页时间线\";\nself.homeTextView.text = @\"尚未获取主页时间线数据。\";\n```\n\n同时，为每个视图控制器添加一个 `UIButton`，用于触发数据检索操作。根据功能分别将按钮命名为\
  \ `\"获取公共时间线\"` 或 `\"获取主页时间线\"`，并将其连接到 `IBAction` 方法（处理程序分别为 `-publicPressed:` 和\
  \ `-homePressed:`）以及属性 `publicButton` 和 `homeButton`。\n\n在继续之前，请确保在项目中引入了 Twitter\
  \ 和 Accounts 框架。按照之前方案中讨论的步骤添加这两个框架，并确保在两个视图控制器中添加了正确的导入语句：\n\n```\n#import <Twitter/Twitter.h>\n\
  #import <Accounts/Accounts.h>\n```\n\n回到 XIB 文件，你需要对 `UITextView` 进行一些微调，以确保其与应用程序正常工作。确保每个\
  \ `UITextView` 的“用户交互已启用”复选框已勾选（如图 14-9 所示），以便视图能够滚动。\n\n![图片](img/9781430240051_Fig14-09.jpg)\n\
  \n**图 14-9.** *为你的 `UITextView` 启用用户交互*\n\n接下来，将每个 `UITextView` 的文本对齐方式设置为左对齐，使原始数据更易读。我还增加了这些视图的尺寸，以便一次性显示更多信息。\n\
  \n此时，你的视图应类似于图 14-10，每个控制器显示不同但适当的文本。\n\n![图片](img/9781430240051_Fig14-10.jpg)\n\
  \n**图 14-10.** *配置好的用户界面*\n\n以下是第一个视图控制器的头文件代码，你的程序应与此类似。第二个视图控制器的头文件除了属性名和动作名不同外，其余应完全一致。\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <Twitter/Twitter.h>\n#import <Accounts/Accounts.h>\n\
  \n@interface MainFirstViewController : UIViewController\n@property (strong, nonatomic)\
  \ IBOutlet UILabel *publicLabel;\n@property (strong, nonatomic) IBOutlet UITextView\
  \ *publicTextView;\n@property (strong, nonatomic) IBOutlet UIButton *publicButton;\n\
  -(IBAction)publicPressed:(id)sender;\n@end\n```\n\n按照之前方案的思路，你将创建一个方法来检查 Twitter\
  \ 是否可用，并相应调整视图。这个方法只需要在第二个视图控制器中使用，具体如下：\n\n```\n-(BOOL)checkCanTweet\n{\n    if\
  \ ([TWTweetComposeViewController canSendTweet])\n    {\n        self.homeButton.enabled\
  \ = YES;\n        self.homeButton.alpha = 1.0;\n        return YES;\n    }\n   \
  \ else\n    {\n        self.homeButton.enabled = NO;\n        self.homeButton.alpha\
  \ = 0.6;\n        return NO;\n    }\n}\n```\n\n和之前一样，确保在 `-viewDidLoad` 和 `-viewWillAppear:animated:`\
  \ 方法中都调用了 `-checkCanTweet` 方法。\n\n现在，你可以着手实现请求推文的方法了。你可能已经猜到，首先需要在第一个视图控制器中从公共时间线获取数据，在第二个视图控制器中从主页时间线获取数据。此处的主页时间线指的是当前用户及其关注用户的帖子，而公共时间线仅显示公开推文。由于主页时间线是用户特定的，你需要再次使用\
  \ Accounts 框架来访问设备上注册的 Twitter 账户。\n\n首先，在第一个视图控制器中实现 `-publicPressed:` 方法，用以下代码检索公共推文：\n\
  \n```\n- (IBAction)publicPressed:(id)sender\n{\n    TWRequest *postRequest = [[TWRequest\
  \ alloc] initWithURL:[NSURL\n    URLWithString:@\"http://api.twitter.com/1/statuses/public_timeline.json\"\
  ]\n    parameters:nilrequestMethod:TWRequestMethodGET];\n\n    [postRequest performRequestWithHandler:^(NSData\
  \ *responseData, NSHTTPURLResponse\n    *urlResponse, NSError * error)\n    {\n\
  \        NSString *output;\n        if ([urlResponse statusCode] == 200)\n     \
  \   {\n            NSError *jsonParsingError;\n            NSArray *publicTimeline\
  \ = [NSJSONSerialization JSONObjectWithData:responseData\n            options:0error:&jsonParsingError];\n\
  \n            output = [NSString stringWithFormat:@\"公共时间线：\\n%@\",\n          \
  \  publicTimeline];\n        }\n        else\n        {\n            output = [NSString\
  \ stringWithFormat:@\"HTTP 响应状态：%i\\n\",\n            [urlResponse statusCode]];\n\
  \        }\n        [self.publicTextView performSelectorOnMainThread:@selector(setText:)\n\
  \        withObject:output waitUntilDone:NO];\n    }];\n}\n```\n\n此方法可分解为以下几个要点：\n\
  \n**1.** 由于公共时间线是公开可访问的，你不需要访问特定的 Twitter 账户来获取数据，因此可以直接配置你的 `TWRequest`。\n\n**2.**\
  \ 与上一个方案类似，创建 `TWRequest` 时，你使用了 Twitter 特定的 URL 来访问所需服务。此处使用的 URL `http://api.twitter.com/1/statuses/public_timeline.json`\
  \ 旨在从公共时间线获取数据，并以 JSON 格式返回（由 `\"json\"` 后缀指定）。\n\n\n\n**3.** 此外，在配置 `TWRequest`\
  \ 时，必须指定“请求方法”值为 `TWRequestMethodGET`，而非之前的 `TWRequestMethodPOST`。最直观的理解是：使用“GET”值来获取信息，使用“POST”值来发送信息。\n\
  \n**4.** 确认收到成功响应后，需要将接收到的数据转换为 iOS 可用的格式。由于已指定数据使用 JSON 格式，因此可以调用 `NSJSONSerialization`\
  \ 类方法 `+JSONObjectWithData:options:error:`。该方法会根据数据格式将接收到的 JSON 数据转换为 `NSDictionary`\
  \ 或 `NSArray`。在本例中，您会收到一个 `NSArray`，随后将其内容放入 `NSStringoutput` 中。\n\n**5.** 所有用户界面的更改都必须在主线程中执行，因此需要使用\
  \ `-performSelectorMainThread:withObject:waitUntilDone:` 方法，用给定的输出来更新用户界面。\n\n同样重要的是，您可以通过指定参数进一步自定义\
  \ `TWRequest`，这些参数决定了您能获得哪些类型的结果。每种请求都有其专属的可选参数集，因此请参考 Twitter API 以获取关于特定选项的更多信息，这些选项将在\
  \ `NSDictionary` 中设置。\n\n现在，在第二个视图控制器中，您可以实现类似的解决方案来获取用户的“主页时间轴”数据。\n\n```\n- (IBAction)homePressed:(id)sender\n\
  {\nif ([self checkCanTweet])\n    {\nACAccountStore *accountStore = [[ACAccountStore\
  \ alloc] init];\nACAccountType *accountType = [accountStore\naccountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];\n\
  \n        [accountStore requestAccessToAccountsWithType:accountType\nwithCompletionHandler:^(BOOL\
  \ granted, NSError *error)\n        {\nif (granted)\n            {\nNSArray *accountsArray\
  \ = [accountStore accountsWithAccountType:accountType];\nif ([accountsArray count]\
  \ >0)\n                {\nACAccount *twitterAccount = [accountsArray objectAtIndex:0];\n\
  \nTWRequest *postRequest = [[TWRequest alloc] initWithURL:[NSURL\nURLWithString:@\"\
  http://api.twitter.com/1/statuses/home_timeline.json\"] parameters:nil\nrequestMethod:TWRequestMethodGET];\n\
  \n                    [postRequest setAccount:twitterAccount];\n\n             \
  \       [postRequest performRequestWithHandler:^(NSData *responseData,\nNSHTTPURLResponse\
  \ *urlResponse, NSError *error)\n                     {\n                      \
  \   NSString *output;\n\nif ([urlResponse statusCode] == 200)\n                \
  \         {\n                             NSError *jsonParsingError;\nNSArray *homeTimeline\
  \ = [NSJSONSerialization JSONObjectWithData:responseData options:0\nerror:&jsonParsingError];\n\
  \n                             output = [NSString stringWithFormat:@\"Home timeline:\\\
  n%@\",\nhomeTimeline];\n                         }\nelse\n                     \
  \    {\n                             output = [NSString stringWithFormat:@\"HTTP\
  \ response status:\n%i\\n\", [urlResponse statusCode]];\n                      \
  \   }\n                         [self.homeTextView\nperformSelectorOnMainThread:@selector(setText:)\
  \ withObject:output waitUntilDone:NO];\n                     }];\n             \
  \   }\n            }\nelse\n            {\nself.homeTextView.text = @\"Error, Twitter\
  \ account access not granted.\";\n            }\n        }];\n    }\n}\n```\n\n\
  该方法遵循与上一个方法相同的路径，但有以下区别：\n\n**6.** 您快速调用了 `-checkCanTweet` 方法，以确保您的设备已正确配置了 Twitter\
  \ 账户。\n\n**7.** 由于要访问特定用户的时间轴，您加入了代码来访问设备上已注册的 Twitter 账户，选择第一个账户，并将其包含在 `TWRequest`\
  \ 中。\n\n**8.** 这次使用了略有不同的 URL：`http://api.twitter.com/1/statuses/home_timeline.json`，用于请求“主页时间轴”，而不是“公共时间轴”。\n\
  \n此时，如果在设备上运行应用程序，您应该能够获取大约 20 条推文数据到手机上，并查看其原始数据。图 14-11 显示了撰写本文时“公共时间轴”数据的开头部分。\n\
  \n![图片](img/9781430240051_Fig14-11.jpg)\n\n**图 14-11.** *示例公共时间轴数据*\n\n当您滚动浏览这大量数据时，可以大致了解所接收推文数据的格式。您会得到一个包含一组推文的\
  \ `NSArray`，每条推文都存储为一个 `NSDictionary`。图 14-11 中显示的值代表键（左侧）及其相关的对象（右侧）。这些对象格式为 `NSString`、`NSNumber`、`NSNull`\
  \ 实例，甚至是更复杂的 `NSArray` 或 `NSDictionary` 实例。例如，要访问推文发布者的名称，您必须访问数组中的嵌套字典。首先在数组中找到该推文，然后通过“user”键访问包含用户信息的\
  \ `NSDictionary`，最后通过“name”键获取姓名。利用这些信息，您可以开始构建一个更完整的应用程序来显示推文。\n\n首先，您将创建一个简单的数据模型，将推文数据封装到自定义对象中。使用“Objective-C\
  \ class”模板创建一个新文件。将类命名为“Post”，并确保子类字段设置为“NSObject”，如图 14-12 所示。\n\n![图片](img/9781430240051_Fig14-12.jpg)\n\
  \n**图 14-12.** *配置名为“Post”的 `NSObject` 子类*\n\n接下来，您可以为 Post 对象定义属性。您将为推文中最常用的一些属性指定属性，例如文本、用户名和转发计数。您还将设置属性来保存实际的\
  \ `NSDictionaries` 数据，以便稍后简化对任何附加值的访问。\n\n为了创建 Post 对象，您将使用一个指定的初始化方法，该方法接受您之前看到的\
  \ `NSDictionary` 对象作为参数。定义这些属性和方法后，您的 `Post.h` 文件内容如下：\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface Post : NSObject\n\n@property (nonatomic, strong) NSDictionary *postData;\n\
  @property (nonatomic, strong) NSDictionary *user;\n@property (nonatomic, strong)\
  \ NSString *text;\n@property (nonatomic, strong) NSString *screenName;\n@property\
  \ (nonatomic, strong) NSString *name;\n@property (nonatomic, strong) NSString *userDescription;\n\
  @property (nonatomic, strong) id retweetCount; //可能是 NSString (100+) 或 NSNumber\n\
  @property (nonatomic, strong) UIImage *userImage;\n-(Post *)initWithDictionary:(NSDictionary\
  \ *)dictionary;\n\n@end\n```\n\n如注释所示，您将属性 `retweetCount` 设置为“id”类型，因为它可能有两种不同类型的值。如果您之前浏览过原始数据，可能会注意到有些推文的“retweet_count”值是数字（如\
  \ 0、10 等），而另一些则是字符串“100+”。通过将属性设为通用类型，您可以稍后检查每条推文的具体值。\n\n您可以在 `Post.m` 文件中用一行代码合成所有这些属性。\n\
  \n```\n@synthesize name, text, user, postData, screenName, retweetCount, userDescription,\n\
  userImage;\n```\n\n您的初始化方法设置起来相当简单，只需使用各种键从字典中查询即可。\n\n\n\n#### 代码示例：自定义初始化方法\n\n\
  ```objc\n- (Post *)initWithDictionary:(NSDictionary *)dictionary\n{\n    self =\
  \ [super init];\n    if (self)\n    {\n        self.postData = dictionary;\n   \
  \     self.user = [dictionary objectForKey:@\"user\"];\n        self.text = [dictionary\
  \ objectForKey:@\"text\"];\n        self.retweetCount = [dictionary objectForKey:@\"\
  retweet_count\"];\n        self.name = [self.user objectForKey:@\"name\"];\n   \
  \     self.screenName = [self.user objectForKey:@\"screen_name\"];\n        self.userDescription\
  \ = [self.user objectForKey:@\"description\"];\n        NSString *imageURLString\
  \ = [self.user objectForKey:@\"profile_image_url\"];\n        NSURL *imageURL =\
  \ [NSURL URLWithString:imageURLString];\n        NSData *imageData = [NSData dataWithContentsOfURL:imageURL];\n\
  \        self.userImage = [UIImage imageWithData:imageData];\n    }\n    return\
  \ self;\n}\n```\n\n在这个方法中，你可能会注意到没有选择为每个帖子分配一个备用线程来检索图像数据。这可能会阻塞主线程一两秒钟，但由于在检索到图像内容之前无需显示帖子，你可以暂时接受这个延迟。\n\
  \n现在文件已配置完成，你需要在两个视图控制器中使用它。在每个头文件中添加导入语句：\n\n```objc\n#import \"Post.h\"\n```\n\
  \n接下来，在每个视图控制器中，添加一个`NSArray`属性来存储检索到的帖子：\n\n```objc\n@property (strong, nonatomic)\
  \ NSMutableArray *retrievedTweets;\n```\n\n合成该属性后，创建一个自定义的 getter 方法以确保数组被正确初始化：\n\
  \n```objc\n- (NSMutableArray *)retrievedTweets\n{\n    if (retrievedTweets == nil)\n\
  \    {\n        retrievedTweets = [NSMutableArray arrayWithCapacity:20];\n    }\n\
  \    return retrievedTweets;\n}\n```\n\n现在，你需要重新调整用户界面。不再简单地使用`UITextView`输出，而是将信息组织到`UITableView`中。从每个视图控制器的\
  \ XIB 文件中移除之前创建的`UIButton`、`UILabel`和`UITextView`，并替换为`UITableView`，如图 Figure 14-13\
  \ 所示。将其连接到每个视图控制器中的`tableViewPosts`属性。同时，我还移除了之前使用的属性（尽管这是可选的），这需要从实现文件中删除几行有问题的代码。\n\
  \n![Image](img/9781430240051_Fig14-13.jpg)\n\n**Figure 14-13.** *向用户界面添加`UITableView`*\n\
  \n你需要返回并修改`-viewDidLoad`方法，以设置表视图的代理和数据源。由于已经构建了数据检索方法，你也可以将其包含在内。\n\n```objc\n\
  - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    [self publicPressed:nil];\n\
  \    self.tableViewPosts.delegate = self;\n    self.tableViewPosts.dataSource =\
  \ self;\n}\n```\n\n第二个视图控制器的`-viewDidLoad`方法看起来类似，但会调用`-homePressed:`。\n\n同时，确保视图控制器遵循`UITableViewDelegate`和`UITableViewDataSource`协议。\n\
  \n现在，第一个视图控制器中更新后的`-publicPressed:`方法如下所示：\n\n```objc\n- (IBAction)publicPressed:(id)sender\n\
  {\n    [self.retrievedTweets removeAllObjects];\n\n    TWRequest *postRequest =\
  \ [[TWRequest alloc] initWithURL:[NSURL\n        URLWithString:@\"http://api.twitter.com/1/statuses/public_timeline.json\"\
  ] parameters:nil\n        requestMethod:TWRequestMethodGET];\n\n    [postRequest\
  \ performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse\n        *urlResponse,\
  \ NSError *error)\n    {\n        if ([urlResponse statusCode] == 200)\n       \
  \ {\n            NSError *jsonParsingError;\n            NSArray *publicTimeline\
  \ = [NSJSONSerialization JSONObjectWithData:responseData options:0\n           \
  \     error:&jsonParsingError];\n            for (NSDictionary *dict in publicTimeline)\n\
  \            {\n                Post *current = [[Post alloc] initWithDictionary:dict];\n\
  \                [self.retrievedTweets addObject:current];\n            }\n    \
  \    }\n        else\n        {\n            NSLog(@\"%@\", [NSString stringWithFormat:@\"\
  HTTP response status: %i\\n\",\n                [urlResponse statusCode]]);\n  \
  \      }\n        [self.tableViewPosts reloadData];\n    }];\n}\n```\n\n类似地，`-homePressed:`方法将如下所示：\n\
  \n```objc\n- (IBAction)homePressed:(id)sender\n{\n    if ([self checkCanTweet])\n\
  \    {\n        ACAccountStore *accountStore = [[ACAccountStore alloc] init];\n\
  \        ACAccountType *accountType = [accountStore\n            accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];\n\
  \n        [accountStore requestAccessToAccountsWithType:accountType\n          \
  \  withCompletionHandler:^(BOOL granted, NSError *error)\n        {\n          \
  \  if (granted)\n            {\n                NSArray *accountsArray = [accountStore\
  \ accountsWithAccountType:accountType];\n                if ([accountsArray count]\
  \ > 0)\n                {\n                    [self.retrievedTweets removeAllObjects];\n\
  \n                    ACAccount *twitterAccount = [accountsArray objectAtIndex:0];\n\
  \n                    TWRequest *postRequest = [[TWRequest alloc] initWithURL:[NSURL\n\
  \                        URLWithString:@\"http://api.twitter.com/1/statuses/home_timeline.json\"\
  ] parameters:nil\n                        requestMethod:TWRequestMethodGET];\n \
  \                   [postRequest setAccount:twitterAccount];\n\n               \
  \     [postRequest performRequestWithHandler:^(NSData *responseData,\n         \
  \               NSHTTPURLResponse *urlResponse, NSError *error)\n              \
  \      {\n                        if ([urlResponse statusCode] == 200)\n       \
  \                 {\n                            NSError *jsonParsingError;\n  \
  \                          NSArray *homeTimeline = [NSJSONSerialization JSONObjectWithData:responseData\
  \ options:0 error:&jsonParsingError];\n                            for (NSDictionary\
  \ *dict in homeTimeline)\n                            {\n                      \
  \          Post *current = [[Post alloc] initWithDictionary:dict];\n           \
  \                     [self.retrievedTweets addObject:current];\n              \
  \              }\n                        }\n                        else\n    \
  \                    {\n                            NSLog(@\"%@\", [NSString stringWithFormat:@\"\
  HTTP response status: %i\\n\", [urlResponse statusCode]]);\n                   \
  \     }\n                        [self.tableViewPosts reloadData];\n           \
  \         }];\n                }\n            }\n            else\n            {\n\
  \                NSLog(@\"Error, Twitter account access not granted.\");\n     \
  \       }\n        }];\n    }\n}\n```\n\n在上述两个方法中，你需要调用`-reloadData`方法，以确保所有数据完全检索后表格正确更新。否则，在数据尚未获取之前，表格将显示为空。\n\
  \n现在，你只需要实现代理和数据源方法来配置`UITableView`。\n\n```objc\n- (NSInteger)tableView:(UITableView\
  \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    return [self.retrievedTweets\
  \ count];\n}\n\n- (UITableViewCell *)tableView:(UITableView *)tableView\n      \
  \   cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    static NSString *CellIdentifier\
  \ = @\"Cell\";\n\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
  \    if (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\n\
  \            reuseIdentifier:CellIdentifier];\n        cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n\
  \    }\n```\n\n\n\n`Post *current = [self.retrievedTweets objectAtIndex:indexPath.row];`\
  \  \n`    cell.textLabel.text = current.text;`  \n`    cell.detailTextLabel.text\
  \ = current.screenName;`  \n`    cell.imageView.image = current.userImage;`  \n\n\
  `return cell;`  \n`}`  \n\n这两个方法可以直接复制到两个视图控制器中，无需任何修改。  \n\n现在运行你的应用程序，你将能够在两个不同的表格中查看\
  \ Twitter 动态，其中包含文本、用户名和用户图片！每个表格的加载时间取决于你设备的连接速度，可能需要几秒钟。  \n\n如果在测试应用程序时，你希望表格能够更新，可以从\
  \ `-viewDidLoad` 方法中移除 `-publicPressed:` 或 `-homePressed:` 调用，并将它们移动到 `-viewWillAppear:animated:`\
  \ 方法中。  \n\n## 方案 14–4：过滤推文  \n\n除了已经实现的获取推文功能外，你还可以根据多种条件对接收到的帖子进行特定过滤。  \n\n基于之前的方案，在项目中添加一个新的视图控制器，命名为“MainSearchViewController”。\
  \  \n\n你将构建这个控制器的用户界面，使其与第一个视图控制器类似，不同之处在于会添加一个 `UISearchBar` 用于指定搜索参数，如图 Figure\
  \ 14-14 所示。请确保此搜索栏的“纠正”功能已关闭，以免自动更正打扰用户。  \n\n![图片](img/9781430240051_Fig14-14.jpg)\
  \  \n\n**图 14-14.** *在 `MainSearchViewController.xib` 文件中添加 `UISearchBar`*  \n\n\
  将 `UISearchBar` 的出口名称设置为 `searchBarPosts`。  \n\n确保正确导入框架和 `Post.h` 文件到新的视图控制器，并设置需要遵循的协议后，你可以从第一个视图控制器复制\
  \ `UITableView` 的委托/数据源方法。同时，务必设置 `NSMutableArray` 属性 `retrievedTweets`，并复制其自定义的\
  \ getter 方法。  \n\n为了配置 `UISearchBar`，你还需要让视图控制器遵循 `UISearchBarDelegate` 协议。  \n\n\
  按如下方式设置 `-viewDidLoad` 方法：  \n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \nself.tableViewPosts.delegate = self;\nself.tableViewPosts.dataSource = self;\n\
  self.searchBarPosts.delegate = self;\n}\n```\n\n在应用程序委托的实现文件中，导入新控制器的头文件。  \n\n\
  ```\n#import \"MainSearchViewController.h\"\n```\n\n现在，你需要更新 `-application:didFinishLaunchingWithOptions:`\
  \ 方法，以包含最新的视图控制器。  \n\n```\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\nself.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen]\
  \ bounds]];\n// 应用启动后的自定义覆盖点\nUIViewController *viewController1 = [[MainFirstViewController\
  \ alloc]\ninitWithNibName:@\"MainFirstViewController\" bundle:nil];\nUIViewController\
  \ *viewController2 = [[MainSecondViewController alloc]\ninitWithNibName:@\"MainSecondViewController\"\
  \ bundle:nil];\nUIViewController *viewController3 = [[MainSearchViewController alloc]\n\
  initWithNibName:@\"MainSearchViewController\" bundle:nil];\nself.tabBarController\
  \ = [[UITabBarController alloc] init];\nself.tabBarController.viewControllers =\
  \ [NSArray arrayWithObjects:viewController1,\nviewController2, viewController3,\
  \ nil];\nself.window.rootViewController = self.tabBarController;\n    [self.window\
  \ makeKeyAndVisible];\nreturn YES;\n}\n```\n\n你还可以在 `MainSearchViewController.m`\
  \ 文件中添加一个稍作修改的指定初始化方法，以正确设置新的视图控制器：  \n\n```\n- (id)initWithNibName:(NSString *)nibNameOrNil\
  \ bundle:(NSBundle *)nibBundleOrNil\n{\nself = [super initWithNibName:nibNameOrNil\
  \ bundle:nibBundleOrNil];\nif (self) {\nself.title = NSLocalizedString(@\"过滤后的帖子\"\
  , @\"First\");\nself.tabBarItem.image = [UIImage imageNamed:@\"first\"];\n    }\n\
  return self;\n}\n```\n\n为了完全配置 `UISearchBar`，你可以创建委托方法 `-shouldChangeTextInRange:replacementText:`，如下所示，假设该控制器中的数据检索方法名为\
  \ `-searchPressed:`。  \n\n```\n-(BOOL)searchBar:(UISearchBar *)searchBar shouldChangeTextInRange:(NSRange)range\n\
  replacementText:(NSString *)text\n{\nif ([text isEqualToString:@\"\\n\"])\n    {\n\
  \        [searchBar resignFirstResponder];\n        [self searchPressed:searchBar.text];\n\
  return NO;\n    }\nreturn YES;\n}\n```\n\n\n\n现在，你必须考虑向 Twitter 发起请求的实际格式。根据 Twitter\
  \ API，获取特定搜索 URL 的最佳方式是在 Twitter 网站上输入搜索词，然后修改重定向后得到的 URL。举个简单的例子，搜索单词“test”会将你重定向到\
  \ URL `http://twitter.com/#!/search/test`。然后，你将除了后缀搜索词以外的部分修改为 `http://search.twitter.com/search.json?q=test`。为了处理简单的搜索查询，你必须正确处理任何空格、井号（`#`）、`@`\
  \ 符号和引号。在你的代码中，你将需要操作搜索词来实现此行为。\n\n首先，你可以在一行代码中完成大部分字符替换。\n\n```objc\nsearchText\
  \ = [searchText stringByAddingPercentEscapesUsingEncoding:\nNSUTF8StringEncoding];\n\
  ```\n\n此方法会正确转换除 `@` 符号之外的所有上述符号，你可以像这样手动替换 `@` 符号：\n\n```objc\nNSMutableString\
  \ *mutableText = [[NSMutableString alloc] initWithString:searchText];\n[mutableText\
  \ replaceOccurrencesOfString:@\"@\" withString:[NSString\nstringWithFormat:@\"%%40\"\
  ] options:NSLiteralSearch range:NSMakeRange(0, [mutableText\nlength])];\n```\n\n\
  现在，你可以将此结果附加到通用搜索 URL 的末尾，从而完整组装你的 URL。\n\n```objc\nNSString *searchString = @\"\
  http://search.twitter.com/search.json?q=\";\nsearchString = [searchString stringByAppendingString:mutableText];\n\
  NSURL *searchURL = [NSURL URLWithString:searchString];\n```\n\n将此功能添加到类似于 `-publicPressed:`\
  \ 的方法中后，你最终得到的整体方法编写如下：\n\n```objc\n- (IBAction)searchPressed:(NSString *)searchText\n\
  {\n    [self.retrievedTweets removeAllObjects];\n\n    searchText = [searchText\
  \ stringByAddingPercentEscapesUsingEncoding:\nNSUTF8StringEncoding];\n\n    NSMutableString\
  \ *mutableText = [[NSMutableString alloc] initWithString:searchText];\n    [mutableText\
  \ replaceOccurrencesOfString:@\"@\"\nwithString:[NSStringstringWithFormat:@\"%%40\"\
  ] options:NSLiteralSearch\nrange:NSMakeRange(0, [mutableText length])];\n\n//  \
  \  NSLog(@\"Searching: %@\", mutableText);\n\n    NSString *searchString = @\"http://search.twitter.com/search.json?q=\"\
  ;\n    searchString = [searchString stringByAppendingString:mutableText];\n    NSURL\
  \ *searchURL = [NSURLURLWithString:searchString];\n\n    TWRequest *postRequest\
  \ = [[TWRequest alloc] initWithURL:searchURL parameters:nil\nrequestMethod:TWRequestMethodGET];\n\
  \n    [postRequest performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse\n\
  *urlResponse, NSError *error)\n     {\nif ([urlResponse statusCode] == 200)\n  \
  \       {\n             NSError *jsonParsingError;\nNSDictionary *searchTimeline\
  \ = [NSJSONSerialization JSONObjectWithData:responseData\noptions:0 error:&jsonParsingError];\n\
  NSArray *searchResults = [searchTimeline objectForKey:@\"results\"];\nfor (NSDictionary\
  \ *dict in searchResults)\n             {\nPost *current = [[Post alloc] initWithSearchDictionary:dict];\n\
  \                 [self.retrievedTweets addObject:current];\n             }\n//\
  \             NSLog(@\"Data Retrieved: HTTP response code %i\", [urlResponse\nstatusCode]);\n\
  \         }\nelse\n         {\nNSLog(@\"%@\", [NSString stringWithFormat:@\"HTTP\
  \ response status: %i\\n\", [urlResponse\nstatusCode]]);\n         }\n         [self.tableViewPosts\
  \ reloadData];\n         [self.tableViewPosts reloadInputViews];\n     }];\n}\n\
  ```\n\n请注意，在这种情况下，将 JSON 格式数据转换为 Objective-C 对象后，初始结果并不在 `NSArray` 中。这一次，它们位于 `NSDictionary`\
  \ 中，以便提供有关查询的额外信息。然后，你可以通过访问“results”键来获取你常用的 `NSArray`，如下所示。\n\n当你以这种方式从搜索中检索帖子时，数据格式与之前使用的键不同。为了弥补这一点，你将为你\
  \ Post 对象创建第二个指定初始化器 `-initWithSearchDictionary:`，如前面方法中所使用的。这种格式在默认设置下不会提供太多关于用户的信息，因此你只能访问你能获取到的信息。确保同时将此方法的处理程序添加到你的\
  \ `Post.h` 文件中。\n\n```objc\n-(Post *)initWithSearchDictionary:(NSDictionary *)dictionary\n\
  {\nself = [super init];\nif (self)\n    {\nself.postData = dictionary;\nself.screenName\
  \ = [dictionary objectForKey:@\"from_user\"];\nself.text = [dictionary objectForKey:@\"\
  text\"];\nNSString *imageURLString = [dictionary objectForKey:@\"profile_image_url\"\
  ];\nNSURL *imageURL = [NSURL URLWithString:imageURLString];\nNSData *imageData =\
  \ [NSData dataWithContentsOfURL:imageURL];\nself.userImage = [UIImage imageWithData:imageData];\n\
  \    }\nreturn self;\n}\n```\n\n至此，你的应用程序现在应该能够搜索帖子中包含的特定文本、话题标签和用户了！你已经包含了涵盖最常用搜索词的基本功能，但\
  \ Twitter API 允许进行更复杂的查询。有关各种搜索格式的完整列表，请参阅 `https://dev.twitter.com/docs/using-search`\
  \ 上的 Twitter API。\n\n现在运行你的应用程序，你应该能够搜索不同的话题标签、短语和用户名。尝试搜索 `#miami` 并查看得到的结果！\n\n\
  **注意：** 如果在任何时候你不确定从 Twitter 检索到的 JSON 数据的格式，你可以直接使用发起请求的 URL 并在 Web 浏览器中打开它。你将看到与通过代码获取的完全相同的数据的文本视图。由于缺少空格格式，它可能有点难以阅读，但你可以从中找出构建应用程序所需的内容层次。\n\
  \n### 总结\n\n在本章中，我们介绍了大量使用 Twitter 框架的示例代码，内容涵盖从发送推文的预定义用户界面，到自定义格式请求以直接从 Twitter\
  \ 获取特定筛选数据。我们的基本实现可以轻松作为更复杂应用程序的基础。与 Twitter 服务的集成不仅限于发布和显示推文，还可以轻松增强几乎任何应用程序的功能和威力。考虑到\
  \ Twitter 本身的流行度和持续增长，可以肯定 iOS 的集成只会变得更加深入，让开发者能够更简单地访问这个现代世界中最强大的网络服务之一。\n\n##\
  \ 第 15 章\n\n## 图像秘诀\n\n开发者常常面临一个普遍问题：要显示的信息太多，而可用空间却不够。为此，你需要借助图像。图片和图形让你能够传达远超纯文本的各种信息，结合了情感、信息和风格。在\
  \ iOS 中，你有多种不同的方法来创建、使用、操作和显示图像。iOS 5.0 甚至新增了为图像应用滤镜的能力，允许用非常少的代码对显示效果进行大幅修改。通过理解\
  \ iOS 中的这些固有功能和技术，你能够更轻松地实现更强大、信息更丰富的应用程序。\n\n\n\n### 菜谱 15-1：绘制简单形状\n\n从幼年起，每个人都会被教导最基础的图像知识，涉及形状、颜色和图画。在\
  \ iOS 中，你也可以从在视图中绘制简单形状的基础开始。这些初始实现中涉及的许多概念最终会以更复杂的基于图像的功能中再次出现。\n\n首先，创建一个名为 \"\
  ShapesAndSizes\" 的新项目。选择 **单视图应用程序** 模板，如 图 15-1 所示，以构建最简单、可直接运行的预配置应用程序，并确保设备系列设置为\
  \ \"iPhone\"。同时勾选 \"使用自动引用计数\" 选项。图 15-1。\n\n![图片](img/9781430240051_Fig15-01.jpg)\n\
  \n**图 15-1.** *创建一个单视图应用程序*\n\n接下来，在构建用户界面之前，你将在 `UIView` 的子类中实现自定义绘图代码。\n\n首先，通过导航到项目的\
  \ Target 设置，将 `QuartzCore.framework` 和 `CoreGraphics.framework` 添加到项目中。在 \"构建阶段\"\
  \ 选项卡下的 \"与库链接二进制文件\" 部分，点击 + 按钮。在类似 图 15-2 的窗口中找到 Quartz Core 和 Core Graphics 框架，并分别添加它们。\n\
  \n![图片](img/9781430240051_Fig15-02.jpg)\n\n**图 15-2.** *添加 Core Graphics 和 Quartz\
  \ Core 框架*\n\n接下来，使用 \"Objective-C 类\" 模板创建一个名为 \"MyView\" 的新文件。输入名称时，确保 \"子类为\"\
  \ 字段设置为 \"UIView\"。\n\n在这个新类的头文件中，为额外的框架添加两个所需的导入语句。\n\n```\n#import <QuartzCore/QuartzCore.h>\n\
  #import <CoreGraphics/CoreGraphics.h>\n```\n\n现在，为了提供一个显示绘制矩形和正方形的简单视图，你将实现 `-drawRect:`\
  \ 方法，如下所示：\n\n```\n- (void)drawRect:(CGRect)rect\n{\n    CGContextRef context =\
  \ UIGraphicsGetCurrentContext();\n    \n    CGRect drawingRect = CGRectMake(0.0,\
  \ 20.0f, 100.0f, 180.0f);\n    const CGFloat *rectColorComponents = CGColorGetComponents([[UIColor\
  \ greenColor] CGColor]);\n    CGContextSetFillColor(context, rectColorComponents);\n\
  \    CGContextFillRect(context, drawingRect);\n    \n    CGRect ellipseRect = CGRectMake(140.0f,\
  \ 200.0f, 75.0f, 50.0f);\n    const CGFloat *ellipseColorComponenets = CGColorGetComponents([[UIColor\
  \ blueColor] CGColor]);\n    CGContextSetFillColor(context, ellipseColorComponenets);\n\
  \    CGContextFillEllipseInRect(context, ellipseRect);\n}\n```\n\n此方法使用以下步骤绘制基本形状：\n\
  \n1.  获取当前 \"上下文\" 的引用，由 `CGContextRef` 表示。\n2.  定义一个用于绘制的 `CGRect`。\n3.  获取用于填充每个形状所需颜色的颜色分量。\n\
  4.  设置填充颜色。\n5.  使用 `CGContextFillRect()` 和 `CGContextFillEllipseInRect()` 函数填充指定的形状。\n\
  \n为了在预配置的视图中实际显示，你必须在用户界面中添加此类的一个实例。这可以通过编程方式或通过 Interface Builder（后者将在此演示）完成。\n\
  \n在视图控制器的 XIB 文件中，从实用工具面板拖出一个 `UIView` 到你的视图中，将其放置在每个边缘有 20 点边距的位置，如 图 15-3 所示。\n\
  \n![图片](img/9781430240051_Fig15-03.jpg)\n\n**图 15-3.** *使用 `UIView` 构建你的 XIB 文件*\n\
  \n选中你的 `UIView` 后，导航到右侧面板的第三个选项卡。在 \"自定义类\" 部分，确保将 \"类\" 字段从 \"UIView\" 更改为 \"MyView\"\
  ，以指定要使用的自定义 `UIView` 子类，如 图 15-4 所示。\n\n![图片](img/9781430240051_Fig15-04.jpg)\n\n\
  **图 15-4.** *将你的 `UIView` 类配置为 `MyView`*\n\n运行此应用程序时，你将看到绘图命令的输出转换为可视化显示，最终在你的模拟视图中呈现\
  \ 图 15-5 所示的结果。\n\n![图片](img/9781430240051_Fig15-05.jpg)\n\n**图 15-5.** *你的简单应用程序绘制了一个矩形和一个椭圆*\n\
  \n值得庆幸的是，你绝不仅限于绘制矩形和椭圆！你可以使用其他一些函数通过创建 \"路径\" 来绘制自定义对象。这些路径由点之间的移动组成，通过线条连接，以绘制自定义形状。将以下代码添加到你的\
  \ `-drawRect:` 方法中，以绘制一个灰色平行四边形。\n\n```\nCGContextBeginPatsh(context);\nCGContextMoveToPoint(context,\
  \ 0.0f, 0.0f);\nCGContextAddLineToPoint(context, 100.0f, 0.0f);\nCGContextAddLineToPoint(context,\
  \ 140.0f, 100.0f);\nCGContextAddLineToPoint(context, 40.0f, 100.0f);\nCGContextClosePath(context);\n\
  CGContextSetGrayFillColor(context, 0.4f, 0.85f);\nCGContextSetGrayStrokeColor(context,\
  \ 0.0, 0.0);\nCGContextFillPath(context);\n```\n\n需要注意的是，创建这些路径时，不必添加一条最终线回到起点。通过调用\
  \ `CGContextClosePath()` 函数，你的形状将自动在其终点和起点之间闭合。\n\n现在运行你的应用程序，你将看到视图中包含一个由路径创建的新平行四边形，如\
  \ 图 15-6 所示。\n\n![图片](img/9781430240051_Fig15-06.jpg)\n\n**图 15-6.** *你的应用程序中有一个由自定义路径创建的形状*\n\
  \n### 编程截图\n\n正如你能够将内容放入 `CGContext` 一样，你也可以很容易地将它们取出。通过使用 `UIGraphicsGetImageFromCurrentImageContext()`\
  \ 函数，你可以从当前绘制的任何内容中提取图像。\n\n在 `MyView` 类中，添加一个 `UIImage` 属性，确保对其进行合成。\n\n```\n@property\
  \ (nonatomic, strong) UIImage *image;\n```\n\n现在，在你的 `-drawRect:` 方法末尾，添加以下代码，以便在图像非\
  \ `nil` 时绘制它。\n\n```\nif (self.image)\n    {\n        CGRect imageRect = CGRectMake(200.0f,\
  \ 50.0f, 100.0f, 300.0f);\n        [image drawInRect:imageRect];\n    }\n```\n\n\
  将与前文相同的两个导入语句添加到你的视图控制器中，并添加第三个用于你的 `MyView` 类。\n\n```\n#import <QuartzCore/QuartzCore.h>\n\
  #import <CoreGraphics/CoreGraphics.h>\n#import \"MyView.h\"\n```\n\n你还需要引用你的 `MyView`\
  \ 对象，因此将已添加到用户界面的对象连接到视图控制器的头文件，并使用属性 `customView`。\n\n```\n@property (strong, nonatomic)\
  \ IBOutlet MyView *customView;\n```\n\n在用户界面底部添加一个标记为 \"快照\" 的 `UIButton`。将其连接到一个名为\
  \ `-snapShotPressed:` 的 `IBAction` 方法。\n\n```\n- (IBAction)snapshotPressed:(id)sender;\n\
  ```\n\n此方法将按如下方式实现：\n\n```\n-(IBAction)snapshotPressed:(id)sender\n{\n    //获取当前层的图像\n\
  \    UIGraphicsBeginImageContext(self.view.bounds.size);\n    CGContextRef context\
  \ = UIGraphicsGetCurrentContext();\n    [self.view.layer renderInContext:context];\n\
  \    UIImage *image = UIGraphicsGetImageFromCurrentImageContext();\n    UIGraphicsEndImageContext();\n\
  \n    self.customView.image = image;\n    [self.customView setNeedsDisplay];\n}\n\
  ```\n\n此方法利用 `UIView` 类中的 `-setNeedsDisplay` 方法，指示 `UIView` 重新调用其 `-drawRect` 方法，以合并任何最近的更改。\n\
  \n现在，再次测试应用程序后，按下 \"快照\" 按钮，你应该会在视图右侧看到自己屏幕的较小截图，如 图 15-7 所示。\n\n![图片](img/9781430240051_Fig15-07.jpg)\n\
  \n**图 15-7.** *你的应用程序拍摄了屏幕截图，然后将其缩放到视图中*\n\n虽然你在本应用程序中构建的大多数功能都比较基础，但你会看到其中许多功能将以更复杂的形式出现在后续更复杂的图像菜谱中。\n\
  \n\n\n### 食谱 15–2：使用 UIImageView\n\n在你的应用中显示图像的最简单方法，就是使用 `UIImageView` 类。你将首先创建一个简单的应用来显示用户选择的图像，然后在其基础上进行扩展，以充分利用\
  \ iOS 的图像处理能力。\n\n为了增强应用的功能，你将专门为 iPad 设计它，并使用 `UISplitViewController`。创建一个新项目，选择“主-从应用程序模板”。在下一个界面中，输入项目名称“ImageRecipes”后，确保应用的设备族设置为“iPad”，并勾选“使用自动引用计数”复选框。其他复选框均不应勾选，使你的对话框与图\
  \ 15–8 一致。\n\n![Image](img/9781430240051_Fig15-08.jpg)\n\n**图 15–8.** *配置项目设置*\n\
  \n创建应用后，你将得到一个配置完善的项目，其中已设置了一个包含主视图控制器和详细视图控制器的 `UISplitViewController`。如果你的模拟器或设备处于竖屏模式，你将只能看到详细视图控制器的视图；但如果旋转到横屏，你将看到两个视图的完美混合。在\
  \ Interface Builder 中工作时，你不会同时看到两个视图，但如果你模拟运行应用，通用视图将类似于图 15–9。\n\n![Image](img/9781430240051_Fig15-09.jpg)\n\
  \n**图 15–9.** *一个空的 `UISplitViewController`*\n\n现在，你将配置详细视图控制器，使其包含更多内容。在你的 XIB\
  \ 界面中添加一个 `UIImageView` 以及两个 `UIButton`，以便你的模拟应用看起来像图 15–10。\n\n![Image](img/9781430240051_Fig15-10.jpg)\n\
  \n**图 15–10.** *你配置的用户界面的模拟视图*\n\n为了确保你的按钮和图像视图在最终显示中正确居中，首先像往常一样将它们设置在 XIB 视图的中心。然后，为每个元素设置“自动调整大小”选项。打开屏幕右侧的实用工具面板，导航到第五个标签页，你可以在其中设置元素的框架，如图\
  \ 15–11 所示。\n\n![Image](img/9781430240051_Fig15-11.jpg)\n\n**图 15–11.** *配置自动调整大小以自定义缩放行为*\n\
  \n确保每个元素的“自动调整大小”框（带有各种红色线条和箭头）都严格按照图 15–11 所示进行配置。这将指定每个元素在视图变化时，保持其相对于视图顶部的相对位置，并水平拉伸以保持其大致位置。\n\
  \n使用属性名称 `selectImageButton`、`clearImageButton` 和 `imageViewContent` 将每个元素连接到你的头文件。每个\
  \ `UIButton` 都将有各自的操作方法 `-selectImagePressed:` 和 `-clearImagePressed:`。\n\n你将配置应用以显示一个包含\
  \ `UIImagePickerController` 的 `UIPopoverController`，以便允许用户从手机中选择图像。为此，你需要让详细视图控制器遵循几个额外的协议：`UIImagePickerControllerDelegate`、`UINavigationControllerDelegate`\
  \ 和 `UIPopoverControllerDelegate`。\n\n```\n@interface MainDetailViewController :\
  \ UIViewController<UISplitViewControllerDelegate,\nUIImagePickerControllerDelegate,\
  \ UINavigationControllerDelegate,\nUIPopoverControllerDelegate>\n```\n\n你还需要创建两个额外的属性，用于存储你选择的图像，以及一个你将使用的\
  \ `UIPopoverController` 的引用。确保这两个属性都已正确合成，并且已在 `-viewDidUnload` 方法中正确置空。\n\n```\n\
  @property (strong, nonatomic) UIPopoverController *pop;\n@property (strong, nonatomic)\
  \ UIImage *selectedImage;\n```\n\n此时，在配置好基本用户界面后，你的详细视图控制器的完整头文件应类似于下面这样。\n\n```\n\
  #import <UIKit/UIKit.h>\n\n@interface MainDetailViewController : UIViewController<UISplitViewControllerDelegate,\n\
  UIImagePickerControllerDelegate, UIPopoverControllerDelegate,\nUINavigationControllerDelegate>\n\
  \n@property (strong, nonatomic) id detailItem;\n\n@property (strong, nonatomic)\
  \ IBOutlet UILabel *detailDescriptionLabel;\n@property (strong, nonatomic) IBOutlet\
  \ UIButton *selectImageButton;\n@property (strong, nonatomic) IBOutlet UIButton\
  \ *clearImageButton;\n@property (strong, nonatomic) IBOutlet UIImageView *imageViewContent;\n\
  -(IBAction)selectImagePressed:(id)sender;\n-(IBAction)clearImagePressed:(id)sender;\n\
  \n@property (strong, nonatomic) UIPopoverController *pop;\n@property (strong, nonatomic)\
  \ UIImage *selectedImage;\n\n@end\n```\n\n现在你可以实现 `-selectImagePressed:` 方法，以显示一个用于选择已保存图像进行显示的界面。\n\
  \n```\n-(void)selectImagePressed:(UIButton *)sender\n{\n    UIImagePickerController\
  \ *picker = [[UIImagePickerController alloc] init];\n    if ([UIImagePickerController\
  \ isSourceTypeAvailable:UIImagePickerControllerSourceTypePhotoLibrary])\n    {\n\
  \        picker.sourceType = UIImagePickerControllerSourceTypePhotoLibrary;\n  \
  \      picker.delegate = self;\n\n        self.pop = [[UIPopoverController alloc]\
  \ initWithContentViewController:picker];\n        pop.delegate = self;\n       \
  \ [pop presentPopoverFromRect:sender.frame inView:self.view permittedArrowDirections:UIPopoverArrowDirectionAny\
  \ animated:YES];\n    }\n}\n```\n\n然后，你可以实现 `UIImagePickerControllerDelegate` 协议方法，以正确处理图像的选择或取消操作。\n\
  \n```\n-(void)imagePickerControllerDidCancel:(UIImagePickerController *)picker\n\
  {\n    [self.pop dismissPopoverAnimated:YES];\n}\n-(void)imagePickerController:(UIImagePickerController\
  \ *)picker didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    UIImage *image\
  \ = [info valueForKey:@\"UIImagePickerControllerOriginalImage\"];\n    self.selectedImage\
  \ = image;\n    self.imageViewContent.image = image;\n    self.imageViewContent.contentMode\
  \ = UIViewContentModeScaleAspectFill;   \n\n    [self.pop dismissPopoverAnimated:YES];\n\
  }\n```\n\n如你所见，你通过使用 `image` 属性将选定的图像配置为在 `UIImageView` 中显示。你还将 `contentMode` 属性设置为\
  \ `UIViewContentModeScaleAspectFill`，以确保 `UIImageView` 的边界始终至少被图像的大部分内容填满。\n\n最后，你可以为\
  \ `-clearImagePressed:` 实现一个简单的方法，以允许重置你的视图：\n\n```\n- (IBAction)clearImagePressed:(id)sender\n\
  {\n    self.selectedImage = nil;\n    self.imageViewContent.image = nil;\n}\n```\n\
  \n此时，你可以运行你的应用，选择一张图像，并在 `UIImageView` 中显示它，如图 15–12 所示！\n\n![Image](img/9781430240051_Fig15-12.jpg)\n\
  \n**图 15–12.** *你的应用在 `UIImageView` 中显示图像*\n\n如果你在 iOS 模拟器上测试此应用，你需要实际保存一些图像以供显示。将图像保存到模拟器照片库的最简单方法是：在模拟器上使用\
  \ Safari 应用，导航到你想要的图像，然后按住鼠标左键点击该图像。你将看到一个保存图像的选项，执行此操作后，你就可以在你的应用中使用它了。\n\n\n\n\
  ### 食谱 15–3：缩放图像\n\n通常，你的应用需要处理的图像可能来自多种来源，而且往往无法完美适配特定视图的显示。为了解决这个问题，你可以实现图像缩放和调整大小的方法。\n\
  \n你需要配置应用，使第一个明细视图控制器（detail view controller）整体上只选中一张图像。当在主视图控制器（master view controller）的表格中选择不同的行时，你将在明细视图控制器中切换显示不同的图像。目前，你将配置视图，使图像以不同的大小比例显示。\n\
  \n首先，你需要创建一个方法来全面调整明细视图控制器的内容。将以下处理程序添加到明细视图控制器的头文件中：\n\n`-(void)configureDetailsWithImage:(UIImage\
  \ *)image label:(NSString *)label showsButtons:(BOOL)showButton;`\n\n你需要按如下方式实现此方法：\n\
  \n```\n-(void)configureDetailsWithImage:(UIImage *)image label:(NSString *)label\
  \ showsButtons:(BOOL)showsButton\n{\n    self.selectedImage = image;\n    self.imageViewContent.image\
  \ = image;\n    self.detailDescriptionLabel.text = label;\n    if (showsButton ==\
  \ NO)\n    {\n        self.selectImageButton.enabled = NO;\n        self.selectImageButton.hidden\
  \ = YES;\n        self.clearImageButton.enabled = NO;\n        self.clearImageButton.hidden\
  \ = YES;\n    }\n    else if (showsButton == YES)\n    {\n        self.selectImageButton.enabled\
  \ = YES;\n        self.selectImageButton.hidden = NO;\n        self.clearImageButton.enabled\
  \ = YES;\n        self.clearImageButton.hidden = NO;\n    }\n}\n```\n\n你需要向明细视图控制器添加一个对主视图控制器的引用，以便将选中的图像传回。添加以下导入语句（或使用你的主视图控制器类名）：\n\
  \n`#import \"MainMasterViewController.h\"`\n\n添加主视图控制器属性，并确保对其进行合成。\n\n`@property\
  \ (strong, nonatomic) MainMasterViewController *masterViewController;`\n\n将以下代码行添加到你的\
  \ `-viewDidUnload` 方法中：\n\n`[self setMasterViewController:nil];`\n\n接下来，你需要在主视图控制器类中添加一个属性来存储选中的图像。请像平常一样正确合成并处理该属性。\n\
  \n`@property (strong, nonatomic) UIImage *mainImage;`\n\n回到明细视图控制器，你需要更新 `-imagePickerController:didFinishPickingMediaWithInfo:`\
  \ 方法，使其同时将选中的图像传回主视图控制器。\n\n```\n-(void)imagePickerController:(UIImagePickerController\
  \ *)picker didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    UIImage *image\
  \ = [info valueForKey:@\"UIImagePickerControllerOriginalImage\"];\n    self.selectedImage\
  \ = image;\n\n    //新增加的行\n    self.masterViewController.mainImage = image;\n\n\
  \    self.imageViewContent.image = image;\n    self.imageViewContent.contentMode\
  \ = UIViewContentModeScaleAspectFill;   \n\n    [self.pop dismissPopoverAnimated:YES];\n\
  }\n```\n\n你还需要相应调整 `-clearImagePressed:` 方法的实现。\n\n```\n- (IBAction)clearImagePressed:(id)sender\n\
  {\n    self.selectedImage = nil;\n    self.imageViewContent.image = nil;\n    self.masterViewController.mainImage\
  \ = nil;\n}\n}\n\n稍后，你将在主视图控制器中实现代码，以便在表格中使用这些图像。为此，你需要为 `mainImage` 属性实现一个自定义设置方法，用于重新加载\
  \ `UITableView` 的数据。\n\n```\n-(void)setMainImage:(UIImage *)image\n{\n    mainImage\
  \ = image;\n    NSIndexPath *currentIndexPath = self.tableView.indexPathForSelectedRow;\n\
  \    [self.tableView reloadData];\n    [self.tableView selectRowAtIndexPath:currentIndexPath\
  \ animated:YES scrollPosition:UITableViewScrollPositionTop];\n}\n```\n\n接下来，你将创建两个不同的方法来调整图像大小。将以下两个处理程序添加到明细视图控制器的头文件中。\n\
  \n`+ (UIImage *)scaleImage:(UIImage *)image toSize:(CGSize)size;`\n`+ (UIImage *)aspectScaleImage:(UIImage\
  \ *)image toSize:(CGSize)size;`\n\n\n```markdown\n\n第一种方法会在指定尺寸内简单地重新创建图像，完全忽略图像的宽高比。\n\
  \n```\n+ (UIImage *)scaleImage:(UIImage *)image toSize:(CGSize)size\n{\n    UIGraphicsBeginImageContext(size);\n\
  \    [image drawInRect:CGRectMake(0, 0, size.width, size.height)];\n    UIImage\
  \ *scaledImage = UIGraphicsGetImageFromCurrentImageContext();\n    UIGraphicsEndImageContext();\n\
  \    return scaledImage;\n}\n```\n\n第二种方法会通过少量计算，确定最佳的图像缩放方式，以同时保留宽高比并适应给定的尺寸。\n\
  \n```\n+ (UIImage *)aspectScaleImage:(UIImage *)image toSize:(CGSize)size\n{\n \
  \   UIGraphicsBeginImageContext(size);\n    if (image.size.height < image.size.width)\n\
  \    {\n        float ratio = size.height/image.size.height;\n        [image drawInRect:CGRectMake(0,\
  \ 0, image.size.width*ratio, size.height)];\n    }\n    else\n    {\n        float\
  \ ratio = size.width/image.size.width;\n        [image drawInRect:CGRectMake(0,\
  \ 0, size.width, image.size.height*ratio)];\n    }\n    UIImage *aspectScaledImage\
  \ = UIGraphicsGetImageFromCurrentImageContext();\n    UIGraphicsEndImageContext();\n\
  \    return aspectScaledImage;\n}\n```\n\n为确保视图控制器正确交互，请在应用程序委托的`-application:didFinishLaunchingWithOptions:`方法中，在两个视图控制器创建完成后添加以下两行代码：\n\
  \n```\ndetailViewController.masterViewController = masterViewController;\nmasterViewController.detailViewController\
  \ = detailViewController;\n```\n\n现在，要完成主视图控制器行为的配置，请修改以下委托方法：\n\n```\n- (NSInteger)tableView:(UITableView\
  \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    if (self.mainImage\
  \ == nil)\n    {\n        return 1;\n    }\n    else\n    {\n        return 3;\n\
  \    }\n}\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if\
  \ (cell == nil) {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\
  \ reuseIdentifier:CellIdentifier];\n    }\n\n    if (indexPath.row == 0)\n     \
  \   cell.textLabel.text = NSLocalizedString(@\"Selected Image\", @\"Detail\");\n\
  \    else if (indexPath.row == 1)\n        cell.textLabel.text = NSLocalizedString(@\"\
  Resized Image\", @\"Detail\");\n    else if (indexPath.row == 2)\n        cell.textLabel.text\
  \ = NSLocalizedString(@\"Scaled Image\", @\"Detail\");\n    return cell;\n}\n- (void)tableView:(UITableView\
  \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (self.mainImage\
  \ != nil)\n    {\n        UIImage *image;\n        NSString *label;\n        BOOL\
  \ showsButtons;\n        if (indexPath.row == 0)\n        {\n            image =\
  \ self.mainImage;\n            label = @\"Select an Image to Display\";\n      \
  \      showsButtons = YES;\n        }\n        else if (indexPath.row == 1)\n  \
  \      {\n            image = [MainDetailViewController scaleImage:self.mainImage\
  \ toSize:self.detailViewController.imageViewContent.frame.size];\n            label\
  \ = @\"Chosen Image Resized\";\n            showsButtons = NO;\n        }\n    \
  \    else if (indexPath.row == 2)\n        {\n            image = [MainDetailViewController\
  \ aspectScaleImage:self.mainImage toSize:self.detailViewController.imageViewContent.frame.size];\n\
  \            label = @\"Chosen Image Scaled\";\n            showsButtons = NO;\n\
  \        }\n        [self.detailViewController configureDetailsWithImage:image label:label\
  \ showsButtons:showsButtons];\n    }\n}\n```\n\n如前所示，原始图像为了保持宽高比，最终会扩展到`UIImageView`的框架之外。由于这可能会导致遮挡其他元素的问题，因此你可能更倾向于使用缩放后的图像。运行此应用程序时，你可以看到在展示不同尺寸图像时各选项的巨大差异。\n\
  \nFigure 15–13 展示了同一图像的示例，但已将其简单缩放以适应图像视图的框架。\n\n![Image](img/9781430240051_Fig15-13.jpg)\n\
  \n**Figure 15–13.** *你的应用程序展示未经缩放而调整大小的图像*\n\n如你所见，你已经成功将整个图像放入一个更小的空间中，确保图像不会遮挡其他视图元素。然而，此选项的问题在于图像的尺寸发生了变化，导致图像略微变形。对于此特定图像，这或许不太明显，但在处理人物图像时，物理特征的扭曲将变得非常明显且不美观。为解决此问题，你可以使用“aspect-scaled”图像，如\
  \ Figure 15–14 所示。\n\n![Image](img/9781430240051_Fig15-14.jpg)\n\n**Figure 15–14.**\
  \ *一种替代的缩放方法以消除失真，但会导致裁剪*\n\n与之前的图像和原始图像相比，你可以看到此图像明显质量更高，因为它不存在任何尺寸变形。不幸的是，由于你选择让图像“填满”`UIImageView`，最终得到的图像是从原始图像裁剪而来的。如果你需要从较大的图像创建小缩略图，这种缩放方式效果极佳，因为随着尺寸变小，图像裁剪的问题会变得微不足道。\n\
  \n显然，如果你处理的不是缩略图，而是需要展示大图，那么上述裁剪效果则远非理想。你可以优化图像缩放方法，让图像“适应”图像视图，并为视图的其余部分提供黑色背景。进行此更改后，你之前的“缩略图创建方法”将不再有效，因此如果你想保留之前的设置，请务必保存项目的新副本。\n\
  \n首先，将配置方法调整为以下代码，以更改`UIImageView`的`contentMode`属性。\n\n```\n- (void)configureDetailsWithImage:(UIImage\
  \ *)image label:(NSString *)label showsButtons:(BOOL)showsButton\n{\n    self.selectedImage\
  \ = image;\n    self.imageViewContent.image = image;\n    self.detailDescriptionLabel.text\
  \ = label;\n    /////BEGIN NEW CODE\n    if ([label isEqualToString:@\"Chosen Image\
  \ Scaled\"])\n    {\n        self.imageViewContent.contentMode = UIViewContentModeScaleAspectFit;\n\
  \        self.imageViewContent.backgroundColor = [UIColor blackColor];\n    }\n\
  \    else\n    {\n        self.imageViewContent.contentMode = UIViewContentModeScaleAspectFill;\n\
  \    }\n    /////END NEW CODE\n    if (showsButton == NO)\n    {\n        self.selectImageButton.enabled\
  \ = NO;\n        self.selectImageButton.hidden = YES;\n        self.clearImageButton.enabled\
  \ = NO;\n        self.clearImageButton.hidden = YES;\n    }\n    else if (showsButton\
  \ == YES)\n    {\n        self.selectImageButton.enabled = YES;\n        self.selectImageButton.hidden\
  \ = NO;\n        self.clearImageButton.enabled = YES;\n        self.clearImageButton.hidden\
  \ = NO;\n    }\n}\n```\n\n你的图像缩放方法将需要略微不同的计算方式，才能以这种方式正确缩放图像。以下代码展示了新的实现。请特别注意，你已经更改了用于创建图像上下文的`CGSize`。\n\
  \n```\n+ (UIImage *)aspectScaleImage:(UIImage *)image toSize:(CGSize)size\n{\n \
  \   if (image.size.height < image.size.width)\n    {\n        float ratio = size.height/image.size.height;\n\
  \        CGSize newSize = CGSizeMake(image.size.width*ratio, size.height);\n\n \
  \       UIGraphicsBeginImageContext(newSize);\n        [image drawInRect:CGRectMake(0,\
  \ 0, newSize.width, newSize.height)];\n    }\n    else\n    {\n        float ratio\
  \ = size.width/image.size.width;\n        CGSize newSize = CGSizeMake(size.width,\
  \ image.size.height*ratio);\n```\n\n```\n\n\n`UIGraphicsBeginImageContext(newSize);`\n\
  `[image drawInRect:CGRectMake(0, 0, newSize.width, newSize.height)];`\n`UIImage\
  \ *aspectScaledImage = UIGraphicsGetImageFromCurrentImageContext();`\n`UIGraphicsEndImageContext();`\n\
  `return aspectScaledImage;`\n\n凭借最新的改动，你的图片如今可以按比例缩小尺寸且不会被裁剪！通过在 `UIImageView` 中添加黑色背景，你为图片提供了一个简单的背景板，从而实现一种通用且全面的功能，用于展示调整尺寸后的图片，如图\
  \ Figure 15–15 所示。\n\n![Image](img/9781430240051_Fig15-15.jpg)\n\n**图 15–15.** *将缩放后的图片适配进视图有助于避免裁剪，但会带来\
  \ `UIImageView` 背景可见的问题。*\n\n#### 回顾总结\n\n你已了解了三种简单但各不相同的调整 `UIImage` 尺寸的方法，每种方法都有自己的优点和问题。\n\
  \n1. 第一种方法直接忽略宽高比，将图片调整到指定尺寸。虽然这能避免图片遮挡其他元素，但会导致明显的形变。\n2. 通过一些简单的数学计算，你手动维持宽高比，将图片缩小到合适尺寸。这种方法的缺点在于，为了填满给定空间，它往往会裁剪掉图片的部分内容。如果你需要创建一起展示的小尺寸缩略图，这是一个不错的实现方式。\n\
  3. 重新配置了宽高比调整方法后，你能够展示一个锁定宽高比且尺寸更小的图片，使其完全适配 `UIImageView`。当然，这会在图片周围留下空白区域，于是你应用了黑色背景。当在一个无法控制原始图片尺寸的应用程序中展示大图时，这是一种特别实用的技术。它能让任意图片舒适地适配给定空间，同时无论何种情况都能维持美观的黑色背景。\n\
  \n### 配方 15–4：使用滤镜处理图片\n\nCore Image 框架是 iOS 5.0 中全新引入的一组类，它允许你创造性地将多种不同类型的“滤镜”应用于图片。\n\
  \n首先，将 `CoreImage.framework` 库导入你的项目。进入应用程序的 Build Phases 标签页，点击 Link Binary With\
  \ Libraries 区域下方的 + 按钮。在弹出的对话框（如图 Figure 15–16 所示）中，找到 Core Image framework 并添加它。\n\
  \n![Image](img/9781430240051_Fig15-16.jpg)\n\n**图 15–16.** *将 Core Image 框架添加到项目中*\n\
  \n为主视图控制器的头文件添加对该框架的导入语句。\n\n`#import <CoreImage/CoreImage.h>`\n\n接下来，在同一个控制器中添加一个\
  \ `NSMutableArray` 属性，用于存储将要展示的过滤后的图片。记得照常正确合成（synthesize）并处理该属性。\n\n`@property\
  \ (strong, nonatomic) NSMutableArray *images;`\n\n此外，需要为该属性编写一个自定义的 getter 方法，以确保它能正确初始化。\n\
  \n```\n-(NSMutableArray *)images\n{\n    if (!images)\n    {\n        images = [[NSMutableArray\
  \ alloc] initWithCapacity:3];\n    }\n    return images;\n}\n```\n\n现在，你将再次修改 `-setMainImage:`\
  \ 方法，加入对该数组的正确处理。\n\n```\n-(void)setMainImage:(UIImage *)image\n{\n    [self.images\
  \ removeAllObjects];\n    if (image != nil)\n    {\n        [self.images addObject:image];\n\
  \        [self populateImagesWithImage:image];\n    }\n\n    mainImage = image;\n\
  \    NSIndexPath *currentIndexPath = self.tableView.indexPathForSelectedRow;\n \
  \   [self.tableView reloadData];\n    [self.tableView selectRowAtIndexPath:currentIndexPath\
  \ animated:YES scrollPosition:UITableViewScrollPositionTop];\n}\n```\n\n包含大部分 Core\
  \ Image 代码的方法 `-populateImagesWithImage:` 将按如下方式实现。记得也要将方法声明放在你的头文件中。\n\n```\n-(void)populateImagesWithImage:(UIImage\
  \ *)image\n{\n    CIImage *main = [[CIImage alloc] initWithImage:image];\n\n   \
  \ CIFilter *hueAdjust = [CIFilter filterWithName:@\"CIHueAdjust\"];\n    [hueAdjust\
  \ setDefaults];\n    [hueAdjust setValue:main forKey:@\"inputImage\"];\n    [hueAdjust\
  \ setValue:[NSNumber numberWithFloat: 3.14/2.0f]\n                forKey:@\"inputAngle\"\
  ];\n    CIImage *outputHueAdjust = [hueAdjust valueForKey:@\"outputImage\"];\n \
  \   CIContext *context = [CIContext contextWithOptions:nil];\n    UIImage *outputImage1\
  \ = [UIImage imageWithCGImage:[context createCGImage:outputHueAdjust\n         \
  \                                                           fromRect:outputHueAdjust.extent]];\n\
  \    [self.images addObject:outputImage1];\n\n    CIFilter *strFilter = [CIFilter\
  \ filterWithName:@\"CIStraightenFilter\"];\n    [strFilter setDefaults];\n    [strFilter\
  \ setValue:main forKey:@\"inputImage\"];\n    [strFilter setValue:[NSNumber numberWithFloat:3.14f]\
  \ forKey:@\"inputAngle\"];\n    CIImage *outputStr = [strFilter valueForKey:@\"\
  outputImage\"];\n    UIImage *outputImage2 = [UIImage imageWithCGImage:[context\
  \ createCGImage:outputStr fromRect:outputStr.extent]];\n    [self.images addObject:outputImage2];\n\
  }\n```\n\n正如你从这个方法中看到的，创建 `CIImage` 需要以下步骤：\n\n1. 获取目标输入图片的 `CIImage` 对象。\n2. 使用特定的名称键创建一个滤镜。名称决定了将应用哪种滤镜以及可以使用哪些参数。\n\
  3. 为了确保无误，将滤镜的所有参数重置为默认值。\n4. 使用 `\"inputImage\"` 键将输入图片设置到滤镜中。\n5. 设置与滤镜相关的任何额外值以自定义输出效果。\n\
  6. 使用 `\"outputImage\"` 键获取输出的 `CIImage`。\n7. 通过 `CIContext` 从 `CIImage` 创建一个 `UIImage`。\n\
  \n在这里，你选择了应用两种不同的滤镜：“色相调整”（Hue Adjustment）和“纠直滤镜”（Straighten Filter）。前者会改变图片的色相，而后者用于旋转图片以将其摆正。\n\
  \n\n```markdown\n\n**注意：**可应用于图像的滤镜数量极其庞大，每个滤镜都有其特定的参数和键。要查找特定滤镜的详细信息，请使用 Apple\
  \ 文档：[`http://developer.apple.com/library/ios/#DOCUMENTATION/GraphicsImaging/Reference/CoreImageFilterReference/Reference/reference.html`](http://developer.apple.com/library/ios/#DOCUMENTATION/GraphicsImaging/Reference/CoreImageFilterReference/Reference/reference.html)。\n\
  \n现在，你可以通过再次修改`-tableView:didSelectRowAtIndexPath:`方法，将这些新创建的滤镜图像指定给你的视图控制器。\n\n\
  ```\n(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\n\
  *)indexPath\n{\n    if (self.mainImage != nil)\n    {\n        UIImage *image;\n\
  \        NSString *label;\n        BOOL showsButtons;\n        if (indexPath.row\
