  \ 8 字形运动移动，以校准磁力计，直到这些数值开始更新。\n\n现在你已经切换到使用`DeviceMotion`，你还需要添加字段来显示来自`attitude`属性的`pitch`、`yaw`和`roll`值。请更新你的视图，使其类似于图\
