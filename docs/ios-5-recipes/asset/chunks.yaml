            if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum (moviePath))

            {

                UISaveVideoAtPathToSavedPhotosAlbum (moviePath, nil, nil, nil);

            }

        }

    ```


    你可能首先会注意到 `kUTTypeMovie` 处出现了一个错误，提示它未定义。要修复此问题，你需要将 Mobile Core Services 框架添加到项目中，然后在视图控制器的头文件中添加以下导入语句。如果你不熟悉此过程，菜谱
    6-4 的开头部分详细演示了如何向项目添加框架。


    ```

    #import <MobileCoreServices/MobileCoreServices.h>

    ```


    本质上，你在这里所做的只是比较保存文件的媒体类型。主要问题在于，你试图将类型为 `NSString` 的 `mediaType` 与类型为 `CFStringRef`
    的 `kUTTypeMovie` 进行比较。你可以通过将 `NSString` 向下转型为 `CFStringRef` 来实现这一点。iOS 5 引入了自动引用计数（ARC），这使该过程变得稍微复杂一些，因为
    ARC 处理的是 Objective-C 对象类型（如 `NSString`），而不是 C 类型（如 `CFStringRef`）。你需要在 `CFStringRef`
    前面加上 `__bridge` 来创建桥接转换，如上所示，以指示 ARC 不再管理这个对象。


    如果一切顺利，你的应用现在应该能够录制视频了！

    '
- fmt: "### Recipe 6–3: Editing Videos\n\nWhile your `UIImagePickerController` offers\
    \ an extremely convenient way to record and save video files, it does nothing\
    \ to allow you to edit them. Luckily, iOS has another built-in controller called\
    \ `UIVideoEditorController`, which you will use to allow your recorded videos\
    \ to be edited.\n\nYou will build this fairly simple recipe off of your second\
    \ project, in which you added video functionality to your `UIImagePickerController`.\n\
    \nFirst, you will make a second button in your view controller's interface file,\
    \ giving it the title “Edit Video”, and the name `editButton`. You will also hook\
    \ it up to an action, `-editButtonPressed:`, as shown in [Figure 6–8](#Chapter06.html#fig_6_8).\n\
    \n![Image](images/9781430240051_Fig06-08.jpg)\n\n**Figure 6–8.** *New user interface\
    \ with editing button*\n\nNext, you define an `NSString` property to store the\
    \ path to your most recently selected/edited video, as shown on the right in [Figure\
    \ 6–8](#Chapter06.html#fig_6_8), keeping care to `@synthesize` it and then setting\
    \ it to `nil` in `-viewDidUnload`:\n\n`@property (nonatomic, strong) NSString\
    \ *recentMovie;`\n\nYou will need to add to your `UIImagePickerController`'s delegate\
    \ method a statement to store your recently created video's path by adding the\
    \ following line:\n\n`self.recentMovie = moviePath;`\n\nYour delegate method now\
    \ looks like so:\n\n```\n- (void) imagePickerController: (UIImagePickerController\
    \ *) picker\n didFinishPickingMediaWithInfo: (NSDictionary *) info\n{\n    NSString\
    \ *mediaType = [info objectForKey: UIImagePickerControllerMediaType];\n\n    if\
    \ (CFStringCompare ((__bridge CFStringRef) mediaType, kUTTypeMovie, 0)\n     \
    \   == kCFCompareEqualTo) {\n\n        NSString *moviePath = [[info objectForKey:\
    \ UIImagePickerControllerMediaURL]\npath];\n        self.recentMovie = moviePath;\n\
    \n        if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum (moviePath))\n   \
    \     {\n            UISaveVideoAtPathToSavedPhotosAlbum (moviePath, nil, nil,\
    \ nil);\n        }\n    }\n\n    else\n    {\n    UIImage *originalImage = (UIImage\
    \ *) [info objectForKey:\n        UIImagePickerControllerOriginalImage];\n\n \
    \   UIImageWriteToSavedPhotosAlbum (originalImage, nil, nil , nil);\n    self.imageViewRecent.image\
    \ = originalImage;\n    }\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\nYou will implement your `-editButtonPressed:` action now in order to\
    \ display a video to be edited if one exists, or to otherwise display an alert\
    \ view telling you of your user's error.\n\n```\n-(void)editButtonPressed:(id)sender\n\
    {\n    if (self.recentMovie)\n    {\n        UIVideoEditorController *editor =\
    \ [[UIVideoEditorController alloc] init];\n        editor.videoPath = self.recentMovie;\n\
    \        editor.delegate = self;\n        [self presentModalViewController:editor\
    \ animated:YES];\n    }\n    else\n    {\n        UIAlertView *alert = [[UIAlertView\
    \ alloc] initWithTitle:@\"Error\" message:@\"No\nVideo Recorded Yet\" delegate:self\
    \ cancelButtonTitle:@\"Cancel\" otherButtonTitles:nil,\nnil];\n        [alert\
    \ show];    }\n}\n```\n\nKeep in mind that at this point you will need to make\
    \ sure your view controller is listed as conforming to the `UIVideoEditorControllerDelegate`\
    \ and `UINavigationControllerDelegate` protocols in your header file.\n\nFinally,\
    \ you only need to implement a few delegate methods for your `UIVideoEditorController`.\
    \ First, here is a delegate method to handle a successful editing/trimming of\
    \ the video:\n\n```\n-(void)videoEditorController:(UIVideoEditorController *)editor\n\
    didSaveEditedVideoToPath:(NSString *)editedVideoPath\n{\n    self.recentMovie\
    \ = editedVideoPath;\n    if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum (editedVideoPath))\n\
    \    {\n        UISaveVideoAtPathToSavedPhotosAlbum (editedVideoPath, nil, nil,\
    \ nil);\n    }\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n\
    As you can see, your application will set the newly edited video as your next\
    \ video to be edited, so that you can create increasingly trimmed clips. It will\
    \ also save each edited version to your photo album as well if possible.\n\nLastly,\
    \ you need one more delegate method to handle the cancellation of your `UIVideoEditorController`.\n\
    \n```\n-(void)videoEditorControllerDidCancel:(UIVideoEditorController *)editor\n\
    {\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\nUpon testing\
    \ on a physical device, your application should now successfully allow you to\
    \ edit your videos! [Figure 6–9](#Chapter06.html#fig_6_9) shows a view of your\
    \ application giving you the option to edit a recorded video.\n\n![Image](images/9781430240051_Fig06-09.jpg)\n\
    \n**Figure 6–9.** *View seen while recording video*"
