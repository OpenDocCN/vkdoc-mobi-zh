  trans: "\n### 本书阅读指南\n\n本书前几章将帮助你掌握开发环境的基本知识。你将学习在`Xcode`和`Interface Builder`中工作的多种方式，以及可用于构建应用的各种标准用户界面元素。其余\
    \ 13 章则聚焦于不同应用的具体案例（即“秘诀”），以演示如何从头到尾实现每一项功能。\n\n### 本书组织结构\n\n本书基于案例的章节之间并无严格依赖关系，你可以直接跳转至任何感兴趣的章节，开始构建特定类型的应用。但强烈建议你（如果尚未阅读）先通读前三章，以扎实掌握`Xcode`和`Interface\
    \ Builder`的操作。早期章节中使用的一些方法（例如创建属性的技术）会在全书中被反复引用，需确保充分理解。\n\n本书假定读者使用的是撰写时的最新版本：iOS\
    \ 5.0 和 Xcode 4.2。这意味着书中的所有秘诀都默认使用 ARC（自动引用计数），因此不会涉及大量内存管理内容。同时，由于你阅读时软件版本可能已更新，实际界面或许略有差异，但基本功能应保持一致。\n\
    \n本书的许多秘诀无法在 iOS 模拟器中完整测试，因此需要一台 Apple 设备和一份配置文件（可通过订阅 Apple iOS 开发者计划获取）。每个无法在模拟器中测试的秘诀都会特别说明。\n\
    \n### 源代码与勘误\n\n本书所有源代码均可从[`www.apress.com`](http://www.apress.com)在线免费下载，且允许用于任何商业或个人应用。虽然多人已尽力确保代码完美无缺，但大量使用后仍可能发现少量笔误或错误。文本或代码的任何修正均可在本书的“勘误”部分找到，该部分同样位于[`www.apress.com`](http://www.apress.com)。\n\
    \n### 联系方式\n\n如果您对本书或其源代码有任何疑问或建议，我们很乐意提供帮助。您可联系两位作者：\n\n> Colin Francis:\n> 邮箱：`cmfrancis24@gmail.com`\n\
    > \n> Shawn Grimes:\n> 邮箱：`shawn@shawnsbits.com`\n> 网址：[`www.shawnsbits.com`](http://www.shawnsbits.com)\n\
    \n## 第 1 章\n\n## Xcode 4 技巧与提示\n\n`Xcode 4` 对`Xcode`的外观和功能都带来了诸多变化。与任何颠覆性变革一样，它收获了褒贬不一的评价和一些抱怨。本章将避开`Xcode\
    \ 4`的缺点，专注于其优势与改进——而它们不胜枚举。\n\n### Xcode 4 简介\n\n你首先会注意到`Xcode 4`的统一界面窗口。所有功能都整合到了一个窗口中，新界面引入了标签页这一通用元素，取代了之前的多个窗口。\n\
    \n图 1-1 展示了`Xcode`用户界面的示例，包含各种显示面板。这些面板帮助你导航、构建和调试应用。你可以通过右上角的“视图”按钮轻松调整它们的可见性，从而为编辑器腾出更多空间。\n\
    \n![图](img/9781430240051_Fig01-01.jpg)\n\n**图 1-1.** *Xcode 界面*\n\n就连`Interface\
    \ Builder`也已被整合到`Xcode 4`的单一窗口界面中。通过引入`Interface Builder`，Apple 构建了强大的功能，帮助你从可视化界面过渡到可运行的代码。图\
    \ 1-2 展示了使用`Interface Builder`构建应用用户界面的场景，第 2 章将对此进行更详细的介绍。\n\n![图](img/9781430240051_Fig01-02.jpg)\n\
    \n**图 1-2.** *Interface Builder*\n\n借助助理编辑器，你可以轻松并排查看两个相关文件。这在处理类头文件和实现文件时非常有用，因为你可以在一个视图中同时修改两个文件。通过使用每个面板顶部的导航区域，你可以选择要同时显示的特定文件，或指定“对应文件”来自动显示相关的头文件或实现文件，如图\
    \ 1-3 所示。\n\n![图](img/9781430240051_Fig01-03.jpg)\n\n**图 1-3.** *助理编辑器*\n\n`Xcode\
    \ 4` 中一个一定能为你节省时间的功能是“Fix-It”。该功能会尝试检测常见编程错误，并给出修复建议。它在你编写代码时即时生效，而无需等待构建命令执行，从而为修复常见错误节省了大量时间。\n\
    \n`Xcode 4` 还改进了与 Git 的源代码控制集成。每次创建新项目时，你都可以选择创建一个本地 Git 仓库，修改过的文件会在导航面板中清晰标记。时间线编辑器视图甚至能显示自上次签入以来的更改，或将当前文件与仓库中的任何历史版本进行对比。这种回溯视图与\
    \ Snow Leopard 中的 Time Machine 备份界面非常相似，如图 1-4 所示。\n\n![图](img/9781430240051_Fig01-04.jpg)\n\
    \n**图 1-4.** *显示最近修订的时间线编辑器*\n"
- fmt: '### Build a Lite and Full Version in One Xcode Project


    Offering a lite version of your app is a great way to give customers a chance
    to try your app before buying it. Maintaining two code bases, however, can be
    quite tiresome and get out of hand as you implement new features into your app.
    While the ability to maintain two build targets was available in Xcode 3, Xcode
    4 has made it even easier.


    Select your project file in the Navigator area, and then select the build target
    for your project. Now press ![Image](images/U003.jpg)`D` to duplicate the target.
    You will be prompted to “Duplicate Only” or “Duplicate and Transition to iPad.”
    Click Duplicate Only to create a new target that will be used for your Lite build,
    as shown in [Figure 1–5](#Chapter01.html#fig_1_5). This will result in a separate
    build target with which you can implement a second version.


    ![Image](images/9781430240051_Fig01-05.jpg)


    **Figure 1–5.** *Project duplication options*


    Rename the new target with an appending “Lite”. You will also want to go to the
    Build Settings tab and find the Product Name attribute under the Packaging heading
    in order to append “Lite” to the app name. Now that the build name is set, you
    need a way to differentiate between the two builds in your source code. For that,
    scroll down and find the Preprocessor Macros, and add a new macro named `LITE_VERSION`.
    Make sure to add the new macro for the Debug and Release build settings. [Figure
    1–6](#Chapter01.html#fig_1_6) shows an example of these changes.


    ![Image](images/9781430240051_Fig01-06.jpg)


    **Figure 1–6.** *“Lite” application configuration*


    If you build and run that now, you will end up with a second app on your device
    with the name “SampleApp Lite” as the title, but it runs the same code as the
    regular version of the app, as demonstrated in [Figure 1–7](#Chapter01.html#fig_1_7).
    Keep in mind that the two targets must have separate bundle identifiers in order
    to show up as separate apps. This is the default setting, but be careful when
    making changes.


    ![Image](images/9781430240051_Fig01-07.jpg)


    **Figure 1–7.** *Two versions of the same application*


    To build different features into your app, you will need to utilize that preprocessor
    macro you created. Anywhere in your code that you want to specify different code
    for your lite version vs. the full version, use the following `#ifdef` directive:


    ```

    #ifdef LITE_VERSION

    //Stuff for Lite version

    Self.labelAppName.text=@"Sample App Lite";

    #else

    //Stuff for Full version

    Self.labelAppName.text=@"Sample App Full";

    #endif

    ```


    Build and compile the two apps on the simulator, and you will see that the apps
    change the code they compile and run based on the preprocessor macro and the power
    of the `#ifdef` directive. [Figure 1–8](#Chapter01.html#fig_1_8) demonstrates
    the result of this configuration.


    ![Image](images/9781430240051_Fig01-08.jpg)


    **Figure 1–8.** *Full and “lite” applications*


    **NOTE:** You can also control what files are included in each build. For instance,
    you may not need to include the full version artwork in the lite version. Click
    your Lite project target and go to the Build Phases tab. Now expand the Copy Bundle
    Resources ribbon, and remove or add any files that are specific to the lite version.


    ### Zombie Hunter


    Occasionally, you will run into an error described only as “`EXC_BAD_ACCESS`,”
    and unfortunately, it doesn''t tell you in which line the bad access is occurring.
    This is caused when you have released a variable and then tried to access that
    freed object. When an object is no longer there and you try to access it, the
    term is a zombie object. Enter the zombie hunter, the `NSZombieEnabled` flag.
    This is not new to Xcode 4, but where you set the flag can be difficult to find
    in Xcode 4. Go to the Product menu and select “Edit Scheme…”. Now select the Run
    step and click the Arguments tab. Under the Environment Variables section, add
    `NSZombieEnabled` and set the value equal to `YES`, as shown in [Figure 1–9](#Chapter01.html#fig_1_9).


    ![Image](images/9781430240051_Fig01-09.jpg)


    **Figure 1–9.** *Enabling `NSZombieEnabled`*


    The next time you run your code, the zombies will be identified in the Debug window.
    [Figure 1–10](#Chapter01.html#fig_1_10) displays an example of a zombie caught
    by Xcode.


    ![Image](images/9781430240051_Fig01-10.jpg)


    **Figure 1–10.** *A zombie identified*


    ### Version Control with Xcode 4


    Version control can be a daunting concept to new developers, but it is something
    worth learning. Once you have started using version control, you will wonder how
    you ever got along without it. Its benefits for teams of developers are fairly
    obvious. Individual team members can work on different parts of an app without
    stepping on each other''s code.


    Single developers can benefit from version control as well. With multiple branches,
    you can add features to your app without disturbing the previous released version.
    If a bug is discovered in your released version, you can switch branches and fix
    the bug without impacting the future version of your app. Then you can merge the
    two versions and have a new version that contains the bug fixes and the new features.
    All the while, you can reach back to any point in time and see changes that were
    made to your code.


    Xcode 4 introduced version control into the Xcode environment. Initially, it supported
    only local Git repositories, but Xcode 4.2 has brought remote repositories to
    the environment. This is great news if you are part of a development team or if
    you work on multiple machines. Remote repositories also provide a safe place for
    your code in case of computer failure or loss.'
