    \ isMagnetometerActive])\n    {\n        [self.motionManager stopMagnetometerUpdates];\n\
    \    }\n\nself.motionManager = nil;\n    [self setXAccLabel:nil];\n    [self setYAccLabel:nil];\n\
    \    [self setZAccLabel:nil];\n    [self setXGyroLabel:nil];\n    [self setYGyroLabel:nil];\n\
    \    [self setZGyroLabel:nil];\n    [self setStatusLabel:nil];\n    [self setXMagLabel:nil];\n\
    \    [self setYMagLabel:nil];\n    [self setZMagLabel:nil];\n    [superview DidUnload];\n\
    }\n```\n\n您还应该确保应用程序在进入后台时停止更新，因此切换到您的应用程序委托并实现`-applicationDidEnterBackground:`。\n\
    \n```\n- (void)applicationDidEnterBackground:(UIApplication *)application\n{\n\
    if ([self.viewController.motionManager isAccelerometerAvailable] && [self.viewController.motionManager\
    \ isAccelerometerActive])\n    {\n[self.viewController.motionManager stopAccelerometerUpdates];\n\
    \    }\nif ([self.viewController.motionManager isGyroAvailable] && [self.viewController.motionManager\
    \ isGyroActive])\n    {\n        [self.viewController.motionManager stopGyroUpdates];\n\
    \    }\nif ([self.viewController.motionManager isMagnetometerAvailable] && [self.viewController.motionManager\
    \ isMagnetometerActive])\n    {\n        [self.viewController.motionManager stopMagnetometerUpdates];\n\
    \    }\n}\n```\n\n如果您现在运行应用程序，快速摇晃将开始更新所有值，结果视图类似于图 12-8。\n\n![Image](img/9781430240051_Fig12-08.jpg)\n\
    \n**图 12-8.** *您的应用程序正在接收原始设备信息*\n\n您可能会注意到，此设置的主要问题是数据没有太大意义。它是原始的、有偏差的数据，不太容易使用。接下来，您将更改实现，以更好地利用可以从`CMMotionManager`访问的第四组值：`CMDeviceMotion`。\n\
    \n"
- fmt: "Just like the accelerometer, gyroscope, and magnetometer, you can access `CMDeviceMotion`\
    \ by starting and stopping updates using very similar methods: `startDeviceMotionUpdates`\
    \ and `startDeviceMotionUpdatesToQueue:withHandler:`. However, you also have two\
    \ extra methods on top of these that allow you to specify a “reference frame,”\
    \ `startDeviceMotionUpdatesUsingReferenceFrame:` and `startDeviceMotionUpdatesUsingReferenceFrame:toQueue:WithHandler:`.\
    \ We will go over the idea of the reference frame shortly.\n\nWhen retrieving\
    \ data using an instance of `CMDeviceMotion` (through the `deviceMotion` property\
    \ in your `CMMotionManager`), you can access five different properties.\n\n1.\
    \ `attitude`: This property is an instance of the `CMAttitude` class, which gives\
    \ you an incredibly detailed insight into the device’s orientation at a given\
    \ time as compared to a reference frame. In this class, you can access properties\
    \ such as `roll`, `pitch`, and `yaw`. These values, measured in radians, allow\
    \ you an incredibly accurate measurement of your device’s orientation.\n2. `rotationRate`:\
    \ This value, measured in radians per second, is just like the previous `rotationRate`,\
    \ but gives a more accurate reading by reducing device bias that causes a still\
    \ device to have nonzero rotation values.\n3. `gravity`: Represents the acceleration\
    \ caused solely by gravity on the device\n4. `userAcceleration`: Represents the\
    \ physical acceleration imparted on a device by the user outside of gravitational\
    \ acceleration\n5. `magneticField`: This value is similar to the one you used\
    \ before; however, it removes any device bias, resulting in a significantly more\
    \ accurate reading than you had before.\n\n**NOTE:** If you are unfamiliar with\
    \ them, radians are a different way of measuring rotation from the more commonly\
    \ used degrees. They are based around the value pi (3.14…). A radian value of\
    \ pi or roughly 3.14 is equivalent to a 180-degree rotation, so any radian value\
    \ can be converted to degrees by dividing by pi, and then multiplying by 180.\n\
    \nYou will go through your code and update it to use data only from the `deviceMotion`\
    \ property.\n\nSince you now have two different acceleration-based properties\
    \ you can access, you’ll go specifically with the `gravity` property. I’ve changed\
    \ the top `UILabel` in the view from “Accelerometer” to “Gravity”, but this is,\
    \ of course, optional.\n\nNow, your `toggleUpdates` method will look like so:\n\
    \n```\n-(void)toggleUpdates\n{\n    if ([self.motionManager isDeviceMotionAvailable]\
    \ && ![self.motionManager isDeviceMotionActive])\n    {\n        [self.motionManager\
    \ setDeviceMotionUpdateInterval:1.0/2.0];\n        [self.motionManager startDeviceMotionUpdatesToQueue:[NSOperationQueue\
    \ mainQueue] withHandler:^(CMDeviceMotion *motion, NSError *error)\n         {\n\
    \            self.xAccLabel.text = [NSString stringWithFormat:@\"%f\", motion.gravity.x];\n\
    \            self.yAccLabel.text = [NSString stringWithFormat:@\"%f\", motion.gravity.y];\n\
    \            self.zAccLabel.text = [NSString stringWithFormat:@\"%f\", motion.gravity.z];\n\
    \n            self.xGyroLabel.text = [NSString stringWithFormat:@\"%f\", motion.rotationRate.x];\n\
    \            self.yGyroLabel.text = [NSString stringWithFormat:@\"%f\", motion.rotationRate.y];\n\
    \            self.zGyroLabel.text = [NSString stringWithFormat:@\"%f\", motion.rotationRate.z];\n\
    \n            self.xMagLabel.text = [NSString stringWithFormat:@\"%f\", motion.magneticField.field.x];\n\
    \            self.yMagLabel.text = [NSString stringWithFormat:@\"%f\", motion.magneticField.field.y];\n\
    \            self.zMagLabel.text = [NSString stringWithFormat:@\"%f\", motion.magneticField.field.z];\n\
    \         }];\n    }\n    else if ([self.motionManager isDeviceMotionActive])\n\
    \    {\n        [self.motionManager stopDeviceMotionUpdates];\n\n        self.xAccLabel.text\
    \ = @\"...\";\n        self.yAccLabel.text = @\"...\";\n        self.zAccLabel.text\
    \ = @\"...\";\n        self.xGyroLabel.text = @\"...\";\n        self.yGyroLabel.text\
    \ = @\"...\";\n        self.zGyroLabel.text = @\"...\";\n        self.xMagLabel.text\
    \ = @\"...\";\n        self.yMagLabel.text = @\"...\";\n        self.zMagLabel.text\
    \ = @\"...\";\n    }\n}\n```\n\nYou need to also change your `viewDidUnload` method\
    \ like so:\n\n```\n- (void)viewDidUnload\n{\n    if ([self.motionManager isDeviceMotionAvailable]\
    \ && [self.motionManager isDeviceMotionActive])\n    {\n        [self.motionManager\
    \ stopDeviceMotionUpdates];\n    }\n\n    self.motionManager = nil;\n    [self\
    \ setXAccLabel:nil];\n    [self setYAccLabel:nil];\n    [self setZAccLabel:nil];\n\
    \    [self setXGyroLabel:nil];\n    [self setYGyroLabel:nil];\n    [self setZGyroLabel:nil];\n\
    \    [self setStatusLabel:nil];\n    [self setXMagLabel:nil];\n    [self setYMagLabel:nil];\n\
    \    [self setZMagLabel:nil];\n    [superview DidUnload];\n}\n```\n\nIn your application\
    \ delegate, you will also update your `applicationDidEnterBackground:` method.\n\
    \n```\n- (void)applicationDidEnterBackground:(UIApplication *)application\n{\n\
    \    if ([self.viewController.motionManager isDeviceMotionAvailable] && [self.viewController.motionManager\
    \ isDeviceMotionActive])\n    {\n        [self.viewController.motionManager stopDeviceMotionUpdates];\n\
    \    }\n}\n```\n\nSo now if you run this application, you will probably notice\
    \ that most of your values are quite a bit more stable. You may also see all zeros\
    \ for your magnetometer readings. Move your device in a figure-eight motion to\
    \ calibrate your magnetometer until these values start updating.\n\nNow that you\
    \ have switched over to using the `DeviceMotion`, you will also add in fields\
    \ to show your pitch, yaw, and roll from your `attitude` property. Update your\
    \ view to resemble [Figure 12–9](#Chapter12.html#fig_12_9), with your new value\
    \ `UILabel` properties named `rollLabel`, `pitchLabel`, and `yawLabel`.\n\n![Image](images/9781430240051_Fig12-09.jpg)\n\
    \n**Figure 12–9.** *Your new interface for displaying attitude*"
  raw: 'Just like the accelerometer, gyroscope, and magnetometer, you can access `CMDeviceMotion`
    by starting and stopping updates using very similar methods: `-``startDeviceMotionUpdates`
    and `-startDeviceMotionUpdatesToQueue:withHandler:`. However, you also have two
