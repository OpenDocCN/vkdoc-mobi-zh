    for taking pictures. You compensate for this by changing the `contentMode` of
    your `UIImageView` to `UIViewContentModeScaleAspectFill` so that your image fills
    the screen. Alternatively, `UIViewContentModeScaleAspectFit` could also be used
    to fit the entire landscape image on the screen, though it will not fill the view.


    Finally, you will dismiss your `UIImagePickerController`.


    `[self dismissModalViewControllerAnimated:YES];`


