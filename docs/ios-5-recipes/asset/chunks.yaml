    `@end`\n\nSwitch to the `Chapter4GeocoderViewController` implementation file (`.m`),\
    \ and scroll to the bottom to implement the method `actionWhereAmI`. Since this\
    \ has been covered in previous recipes in this chapter, I'm not going to go into\
    \ detail about this, but I will cover some highlights. You want to follow the\
    \ best practices of geocoding and not geocode a location that is too near to one\
    \ you have already geocoded or that is too recent, so you're going to set your\
    \ `distanceFilter` property on your `CLLocationManager` object to 500 meters.\
    \ You are also going to set your desired accuracy to the constant `kCLLocationAccuracyHundredMeters`\
    \ so that you get a faster response from the location tracking services and limit\
    \ the drain on the battery.\n\n```objc\n- (IBAction)actionWhereAmI:(id)sender\
    \ {\n    if([CLLocationManager locationServicesEnabled]){\n        if([sender\
    \ isKindOfClass:[UIButton class]]){\n            if(_locationManager==nil){\n\
    \                _locationManager=[[CLLocationManager alloc] init];\n        \
    \        _locationManager.purpose=@\"To tell you where you are\";\n          \
    \      _locationManager.delegate=self;\n                _locationManager.distanceFilter=500;\n\
    \                _locationManager.desiredAccuracy=kCLLocationAccuracyHundredMeters;\n\
    \            }\n            [_locationManager startUpdatingLocation];\n      \
    \      self.labelGeocodeInfo.text=@\"Getting location…\";\n        }\n    }else{\n\
    \        self.labelGeocodeInfo.text=@\"Location services are unavailable\";\n\
    \    }\n}\n```\n\nNow you will add your delegate methods for the `CLLocationManager`\
    \ object. The first is the `didFailWithError` method:\n\n```objc\n-(void)locationManager:(CLLocationManager\
    \ *)manager didFailWithError:(NSError *)error{\n    if(error.code==kCLErrorDenied){\n\
    \        self.labelGeocodeInfo.text=@\"Location information denied\";\n    }\n\
    }\n```\n\nNext is the `didUpdateToLocation` delegate method to be defined. You\
    \ will start with the standard checks to make sure the `newLocation` timestamp\
    \ property is recent and that it is accurate:\n\n```objc\n-(void)locationManager:(CLLocationManager\
    \ *)manager didUpdateToLocation:(CLLocation *)newLocation fromLocation:(CLLocation\
    \ *)oldLocation{\n    NSDate *locationDate=newLocation.timestamp;\n    NSTimeInterval\
    \ locationInterval=[locationDate timeIntervalSinceNow];\n    if(abs(locationInterval)<30){\n\
    \        if(newLocation.horizontalAccuracy<0)\n            return;\n```\n\nYou\
    \ will check if the `_geoCoder` instance variable has been instantiated, and if\
    \ not, you will create it. Then you will also make sure that you stop any existing\
    \ geocoding services before performing a new one:\n\n```objc\n//Instantiate _geoCoder\
    \ if it has not been already\nif(_geoCoder==nil)\n_geoCoder=[[CLGeocoder alloc]\
    \ init];\n\n//Only one geocoding instance per action\n//so stop any previous geocoding\
    \ actions before starting this one\nif([_geoCoder isGeocoding])\n[_geoCoder cancelGeocode];\n\
    ```\n\nFinally, you will start your reverse geocoding process and define the completion\
    \ handler. The completion handler receives two objects, an `NSArray` of `CLPlacemarks`\
    \ named `placemarks` and an `NSError`. If the array contains one or more objects,\
    \ then the reverse geocode was successful. If not, then you can check the error\
    \ code for details. The resulting `didUpdateToLocation` method is as follows:\n\
    \n```objc\n-(void)locationManager:(CLLocationManager *)manager didUpdateToLocation:(CLLocation\
    \ *)newLocation fromLocation:(CLLocation *)oldLocation{\n    NSDate *locationDate=newLocation.timestamp;\n\
    \    NSTimeInterval locationInterval=[locationDate timeIntervalSinceNow];\n  \
    \  if(abs(locationInterval)<30){\n        if(newLocation.horizontalAccuracy<0)\n\
    \            return;\n\n        //Instantiate _geoCoder if it has not been already\n\
    \        if(_geoCoder==nil)\n            _geoCoder=[[CLGeocoder alloc] init];\n\
    \n        //Only one geocoding instance per action!\n        //so stop any previous\
    \ geocoding actions before starting this one\n        if([_geoCoder isGeocoding])\n\
    \            [_geoCoder cancelGeocode];\n\n        [_geoCoder reverseGeocodeLocation:newLocation\n\
    \                        completionHandler:^(NSArray* placemarks, NSError* error){\n\
    \                            if([placemarks count]>0){\n                     \
    \           CLPlacemark *foundPlacemark=[placemarks objectAtIndex:0];\n      \
    \                          self.labelGeocodeInfo.text=[NSString stringWithFormat:@\"\
    You\nare in: %@\", foundPlacemark.description];\n                            }else\
    \ if(error.code==kCLErrorGeocodeCanceled){\n                                NSLog(@\"\
    Geocoding cancelled\");\n                            }else if(error.code==kCLErrorGeocodeFoundNoResult){\n\
    \                                self.labelGeocodeInfo.text=@\"No geocode result\
    \ found\";\n                            }else if(error.code==kCLErrorGeocodeFoundPartialResult){\n\
    \                                self.labelGeocodeInfo.text=@\"Partial geocode\
    \ result\";\n                            }else{\n                            \
    \    self.labelGeocodeInfo.text=[NSString\nstringWithFormat:@\"Unknown error:\
    \ %@\", error.description];\n                            }\n                 \
    \       }];\n\n        //Stop updating location until they click the button again\n\
    \        [manager stopUpdatingLocation];\n    }\n}\n```\n\nUpon testing this application,\
    \ you should be able to receive the location, including street name, city, country,\
    \ and other valuable information of the given device. This can of course be tested\
    \ on a physical device, or in the simulator using the same location-simulating\
    \ functions you have used previously.\n\n## Getting Coordinates from Place Names\n\
    \niOS 5 has introduced forward geocoding as well. This means that you can pass\
    \ a `CLGeocoder` object an address and receive the coordinates for that address\
    \ as a result. The `CLGeocoder` processes address strings as a parameter, and\
    \ the more information you can provide about an address, the more accurate the\
    \ resulting forward geocode will be. If the geocode process results in multiple\
    \ coordinates being identified as possible matches, these coordinates will be\
    \ returned in the `NSArray` placemarks of the `completionHandler`. A sample implementation\
    \ of this could be as follows:\n\n```objc\nCLGeocoder *_geoCoder=[[CLGeocoder\
    \ alloc] init];\n[_geoCoder geocodeAddressString:@\"2400 Boston Street, Baltimore,\
    \ MD, USA\"\n        completionHandler:^(NSArray* placemarks, NSError* error){\n\
    \                        for (CLPlacemark* aPlacemark in placemarks)\n       \
    \                 {\n                                // Process the placemark.\n\
    \                        }\n}];\n```\n\n## Summary\n\nThe Core Location framework\
    \ is a powerful framework that can be utilized by any number of application features.\
    \ As demonstrated in this chapter, you can determine where a device is located,\
