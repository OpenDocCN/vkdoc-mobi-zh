    This method follows the same track as the previous one, with the following differences:


    **6.** You included a quick check to `-checkCanTweet` in order to ensure that
    your device is properly configured with a Twitter account.


    **7.** Since you are accessing a specific user''s timeline, you include code to
    access the device''s registered Twitter accounts, pick the first, and include
    it in the `TWRequest`.


    **8.** A slightly different URL, this time `http://api.twitter.com/1/statuses/home_timeline.json`,
    is used to request a Home Timeline, as opposed to the Public Timeline.


    If you run your application on a device at this point, you should be able to retrieve
    a good 20 tweets worth of data to your phone and view their raw data. [Figure
    14-11](#Chapter14.html#fig_14_11) shows the beginning of the Public Timeline data
    at the moment of this writing.


    ![Image](images/9781430240051_Fig14-11.jpg)


    **Figure 14-11.** *Sample public timeline data*


    As you scroll through this massive amount of data, you can get a general sense
    of the format of the tweet data that you''ve received. You have an `NSArray` of
    a group of tweets, with each one stored as an `NSDictionary`. The values you see
    in [Figure 14-11](#Chapter14.html#fig_14_11) represent the keys (on the left)
    and their related objects (on the right). These objects are formatted as instances
    of`NSString`, `NSNumber`, `NSNull`, or even more complex instances of `NSArray`
    or `NSDictionary`. For example, to access the name of a tweet''s poster, you must
    access a nested dictionary within your array. You first find the tweet in your
    array, then access the `NSDictionary` containing user information through the
    “user” key, and then retrieve the name with the “name” key. Using this information,
    you can begin to build a more complete application to display your tweets.


    First, you will create a simple data model to encapsulate your post data into
    custom objects. Create a new file using the “Objective-C class” template. Name
    your class “Post”, and make sure the subclass field is set to “NSObject”, as in
    [Figure 14-12](#Chapter14.html#fig_14_12).


    ![Image](images/9781430240051_Fig14-12.jpg)


    **Figure 14-12.** *Configuring your `NSObject` subclass called “Post”*


    Next you can define properties for your Post object to have. You will specify
    properties for some of the most commonly used properties of a tweet, such as the
    text, user''s name, and retweet count. You will also have properties to keep track
    of your actual `NSDictionaries` of data in order to simplify accessing any additional
    values later.


    In order to create your Post objects, you will use a designated initializer that
    will accept the `NSDictionary` objects that you saw earlier as a parameter. Define
    these properties and method so that your `Post.h` file reads like so:


    `#import <Foundation/Foundation.h>`


    `@interface Post : NSObject`


    `@property (nonatomic, strong) NSDictionary *postData;`

    `@property (nonatomic, strong) NSDictionary *user;`

    `@property (nonatomic, strong) NSString *text;`

    `@property (nonatomic, strong) NSString *screenName;`

    `@property (nonatomic, strong) NSString *name;`

    `@property (nonatomic, strong) NSString *userDescription;`

    `@property (nonatomic, strong) id retweetCount; //Could be NSString (100+) or
    NSNumber`

    `@property (nonatomic, strong) UIImage *userImage;`

    `-(Post *)initWithDictionary:(NSDictionary *)dictionary;`


    `@end`


    As commented here, you have made the property `retweetCount` of type “id”, due
    to the possibility of it having two different types of values. If you looked through
    your earlier raw data, you might have noticed some posts with “retweet_count”
    values of numbers (i.e., 0, 10, etc.), and others with the string “100+”. By making
    your property a general type, you can later check to see which value you ended
    up with for any given post.


    You can synthesize all these properties in a single line in the `Post.m` file.


    `@synthesize name, text, user, postData, screenName, retweetCount, userDescription,`

    `userImage;`


    Your initializer is fairly easy to set up, and just involves you querying your
    dictionaries with the various keys you will use.'
