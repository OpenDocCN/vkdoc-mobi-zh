    \ configureDetailsWithImage:image label:label showsButtons:showsButtons];\n  \
    \  }\n}\n```\n\n如你所见，你已经更新了所有显示内容，现在显示的是应用了不同滤镜的原始图像，而不是同一图像的不同尺寸示例。你已经采用了第三种图像缩放方法，以便显示所有这些图像。\n\
    \n你还需要更新`-tableView:cellForRowAtIndexPath:`方法，以包含最新的实现。\n\n```\n-(UITableViewCell\
