    \                    NSDictionary *myDictionary = [NSDictionary\ndictionaryWithObject:[alertView\
    \ textFieldAtIndex:0].text forKey:@\"WordToGuess\"];\n                    [self\
    \ sendData:myDictionary];\n                    wordMatch=YES;\n              \
    \      break;\n                }\n            }\n            if(wordMatch==NO){\n\
    \                UIAlertView *wordPrompt=[[UIAlertView alloc] initWithTitle:@\"\
    Word Not\nFound\" message:@\"Your word was not found in the dictionary, please\
    \ enter a new word for\nyour opponent to decode:\" delegate:self cancelButtonTitle:@\"\
    Cancel\"\notherButtonTitles:@\"OK\", nil];\n                wordPrompt.alertViewStyle=UIAlertViewStylePlainTextInput;\n\
    \                [wordPrompt show];\n            }\n        }\n    }\n}\n```\n\
    \nNow that you have data going back and forth, you can send the game notifications\
    \ (e.g., winning and losing) using the `sendData` method, but you should first\
