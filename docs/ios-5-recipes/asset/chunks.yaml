    \ *向主视图控制器添加 `UITableView`*\n\n使用属性名 `tableViewHotspots` 将此 `UITableView` 连接到你的头文件。\n\
    \n在主视图控制器的头文件中创建一个 `NSMutableArray` 属性，用于存放 `Hotspot` 对象。\n\n```objc\n@property\
    \ (strong, nonatomic) NSMutableArray *hotspots;\n```\n\n在此头文件中添加以下两条 import 语句。\n\
    \n```objc\n#import \"HotspotInfoViewController.h\"\n#import \"Hotspot.h\"\n```\n\
    \n最后，确保告知此控制器遵循 `UITableViewDelegate` 和 `UITableViewDataSource` 协议，以及你创建的 `HotspotsInfoDelegate`\
    \ 协议。\n\n完成所有这些更改后，你的头文件应如下所示：\n\n```objc\n#import <UIKit/UIKit.h>\n#import \"\
    HotspotInfoViewController.h\"\n#import \"Hotspot.h\"\n\n@interface MainViewController\
    \ : UIViewController<UITableViewDelegate,\nUITableViewDataSource, HotspotInfoDelegate>\n\
    \n@property (strong, nonatomic) IBOutlet UITableView *tableViewHotspots;\n@property\
    \ (strong, nonatomic) NSMutableArray *hotspots;\n\n@end\n```\n\n在该类的实现文件中，在合成\
    \ `hotspots` 属性之后，你需要声明一个自定义的 getter 方法，以确保数组被正确创建。\n\n```objc\n-(NSMutableArray\
    \ *)hotspots\n{\n    if (!hotspots)\n    {\n        hotspots = [[NSMutableArray\
    \ alloc] initWithCapacity:10];\n    }\n    return hotspots;\n}\n```\n\n你将编写 `-viewDidLoad`\
    \ 方法来设置 `UITableView` 的 `delegate` 和 `dataSource` 属性，并配置用户界面以在 `UINavigationController`\
    \ 中工作。\n\n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.title\
    \ = @\"热点\";\n\n    self.tableViewHotspots.delegate = self;\n    self.tableViewHotspots.dataSource\
    \ = self;\n\n    UIBarButtonItem *addButton = [[UIBarButtonItem alloc]\n     \
    \                             initWithBarButtonSystemItem:UIBarButtonSystemItemAdd\
    \ target:self\n                                  action:@selector(newHotspot:)];\n\
    \    self.navigationItem.rightBarButtonItem = self.editButtonItem;\n    self.navigationItem.leftBarButtonItem\
    \ = addButton;\n}\n```\n\n所使用的 `-newHotspot:` 选择器将很容易实现，以显示一个未预设 `hotspot` 的 `HotspotInfoViewController`\
    \ 实例。\n\n```objc\n-(void)newHotspot:(id)sender\n{\n    HotspotInfoViewController\
    \ *hotspotVC = [[HotspotInfoViewController alloc] init];\n    hotspotVC.delegate\
    \ = self;\n    [self.navigationController pushViewController:hotspotVC animated:YES];\n\
    }\n```\n\n为了响应 `HotspotInfoViewController` 完成使用的情况，你应该实现之前指定的 `HotspotInfoDelegate`\
    \ 方法。\n\n```objc\n-(void)HotspotInfoViewController:(HotspotInfoViewController\
    \ *)hotspotInfoVC\ndidReturnHotspot:(Hotspot *)hotspot isNew:(BOOL)isNew\n{\n\
    \    if (isNew)\n    {\n        [self.hotspots addObject:hotspot];\n    }\n  \
    \  [self.tableViewHotspots reloadData];\n\n    [self.navigationController popViewControllerAnimated:YES];\n\
    }\n```"
- fmt: "您将需要调整视图控制器的行为，以处理视图的消失和重新出现，方法是重写以下两个方法。\n\n```\n- (void)viewWillAppear:(BOOL)animated\n\
    {\n    self.title = @\"Hotspots\";\n    [super viewWillAppear:animated];\n}\n\n\
    - (void)viewDidDisappear:(BOOL)animated\n{\n    self.title = @\"Cancel\";\n  \
    \  [super viewDidDisappear:animated];\n}\n```\n\n现在，要配置`UITableView`，您必须指定要显示的行数，该行数将基于`hotspots`数组的计数。\n\
    \n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return [self.hotspots count];\n}\n```\n\n您将配置表格单元格的显示，以简单地显示每个`Hotspot`对象的`name`和`address`。\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath*)indexPath\n\
    {\n    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell *cell\
    \ = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell\
    \ == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\n\
    \                                       reuseIdentifier:CellIdentifier];\n   \
    \     cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n    }\n\
    \n    Hotspot *currentHotspot = [self.hotspots objectAtIndex:indexPath.row];\n\
    \n    cell.textLabel.text = currentHotspot.name;\n    cell.detailTextLabel.text\
    \ = currentHotspot.address;\n\n    return cell;\n}\n```\n\n您将实现表格，使得选择某一行会显示一个`HotspotInfoViewController`，其中包含该行的信息，以便用户可以轻松编辑任何给定的对象。\n\
    \n```\n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath*)indexPath\n\
    {\n    [self.tableViewHotspots deselectRowAtIndexPath:indexPath animated:YES];\n\
    \n    HotspotInfoViewController *hotspotVC = [[HotspotInfoViewController alloc]\
    \ init];\n    hotspotVC.delegate = self;\n    hotspotVC.hotspot = [self.hotspots\
    \ objectAtIndex:indexPath.row];\n    [self.navigationController pushViewController:hotspotVC\
    \ animated:YES];\n}\n```\n\n最后，您还需要使`UITableView`支持对象的重新排列和删除。要允许编辑和删除，您需要实现以下两个方法。\n\
    \n```\n- (BOOL)tableView:(UITableView *)tableView canEditRowAtIndexPath:(NSIndexPath*)indexPath\n\
    {\n    return YES;\n}\n\n- (void)tableView:(UITableView *)tableView\n    commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\n\
    \     forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
    \    {\n        [self.hotspots removeObjectAtIndex:indexPath.row];\n        [tableView\
    \ deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\n               \
    \          withRowAnimation:UITableViewRowAnimationFade];\n    }\n}\n```\n\n您还必须重写`-setEditing:animated:`方法，以正确地将`UITableView`和编辑按钮结合起来。\n\
    \n```\n-(void)setEditing:(BOOL)editing animated:(BOOL)animated\n{\n    [super\
    \ setEditing:editing animated:animated];\n    [self.tableViewHotspots setEditing:editing\
    \ animated:animated];\n}\n```\n\n为了允许重新排列单元格，还将添加以下两个方法。\n\n```\n- (BOOL)tableView:(UITableView\
    \ *)tableView canMoveRowAtIndexPath:(NSIndexPath*)indexPath\n{\n    return YES;\n\
    }\n\n- (void)tableView:(UITableView *)tableView\n    moveRowAtIndexPath:(NSIndexPath*)fromIndexPath\n\
    \           toIndexPath:(NSIndexPath *)toIndexPath\n{\n    Hotspot *movingHotspot\
    \ = [self.hotspots objectAtIndex:fromIndexPath.row];\n    [self.hotspots removeObject:movingHotspot];\n\
    \    [self.hotspots insertObject:movingHotspot atIndex:toIndexPath.row];\n   \
    \ [self.tableViewHotspots reloadData];\n}\n```\n\n最后，在测试应用之前，您需要修改应用程序委托的实现文件，将视图控制器放入`UINavigationController`中。调整`-application:didFinishLaunchingWithOptions:`方法如下所示。\n\
    \n```\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    self.viewController = [[MainViewController alloc]\n\
    \                            initWithNibName:@\"MainViewController\"\n       \
    \                              bundle:nil];\n    __strong UINavigationController\
    \ *navcon = [[UINavigationController alloc]\n                                \
    \                initWithRootViewController:self.viewController];\n    self.window.rootViewController\
    \ = navcon;\n    [self.window makeKeyAndVisible];\n    return YES;\n}\n```\n\n\
    您的用户界面现已完全设置，允许您创建要在`UITableView`中显示、编辑或删除的`Hotspot`对象，如在[图10-8](#Chapter10.html#fig_10_8)中创建一些示例数据后所示。\n\
    \n![Image](images/9781430240051_Fig10-08.jpg)\n\n**Figure 10–8.** *您的应用带有示例数据的`UITableView`*\n\
    \n现在，使用此应用程序唯一剩下的任务就是能够保存数据，使其在应用间持久化。\n\n为了实现应用程序中的持久化，您将使用文件系统以及“归档”和“解档”对象的概念。\n\
    \n要归档（即“编码”）任何给定的对象，它及其内部存储的所有属性都必须被明确告知如何编码。对于任何预制的iOS对象，例如`NSArray`或`NSDictionary`，这已经完成。但是，为了编码您的`Hotspot`对象，您需要添加一些关于如何处理它们的具体指令。\n\
    \n在`Hotspot.h`类中，通过将`@interface`行更改为以下内容，指定您的类将遵守`NSCoding`协议：\n\n```\n@interface\
    \ Hotspot : NSObject<NSCoding>\n```\n\n现在，您必须实现`-encodeWithCoder:`方法，以指定如何编码`Hotspot`对象以进行保存。\n\
    \n```\n- (void) encodeWithCoder:(NSCoder *)encoder\n{\n    [encoder encodeObject:self.name\
    \ forKey:@\"name\"];\n    [encoder encodeObject:self.address forKey:@\"address\"\
    ];\n    [encoder encodeObject:self.city forKey:@\"city\"];\n    [encoder encodeObject:self.state\
    \ forKey:@\"state\"];\n}\n```\n\n在加载数据的反向过程中，您必须实现`-initWithCoder:`方法，以使用归档数据创建`Hotspot`类的实例。通过使用与前一个方法相同的键，您可以轻松提取所需的`NSString`对象。\n\
    \n```\n- (id)initWithCoder:(NSCoder *)decoder\n{\n    self = [super init];\n \
    \   if (self)\n    {\n        self.name = [decoder decodeObjectForKey:@\"name\"\
    ];\n        self.address = [decoder decodeObjectForKey:@\"address\"];\n      \
    \  self.city = [decoder decodeObjectForKey:@\"city\"];\n        self.state = [decoder\
    \ decodeObjectForKey:@\"state\"];\n    }\n    return self;\n}\n```\n\n现在，回到您的主视图控制器，您可以创建一个方法，将数据保存到特定文件。\n\
    \n```\n-(void)saveData\n{\n    NSString *rootPath = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    \                                    NSUserDomainMask, YES) objectAtIndex:0];\n\
    \    NSString *savePath = [rootPath stringByAppendingPathComponent:@\"hotspotsData\"\
    ];\n    NSFileManager *fileManager = [NSFileManager defaultManager];\n    NSMutableData\
    \ *saveData = [[NSMutableData alloc] init];\n\n    NSKeyedArchiver *archiver =\
    \ [[NSKeyedArchiver alloc] initForWritingWithMutableData:saveData];\n    [archiver\
    \ encodeObject:self.hotspots forKey:@\"DataArray\"];\n    [archiver finishEncoding];\n\
    \n    [fileManager createFileAtPath:savePath contents:saveData attributes:nil];\n\
    }\n```\n\n此方法包含以下步骤："
