    ### Summary


    Throughout this entire chapter, you have seen how to programmatically create a
    `UITableView`, step-by-step, for two kinds of styles: “plain” and “grouped.” You
    have also been given a glimpse at the amount of customization control the developer
    has over the view and display of a `UITableView`, though the full Apple documentation
    has a great deal more to say on the subject. You have even included a great deal
    of functionality into your `UITableView`s to provide them with the most powerful
    user interface. However, the key to `UITableView`s is not how they work, but the
    data that they present. It is up to you as a developer to find the information
    that users want or need, and present it to them in the most efficient, flexible
    way possible. A `UITableView` is a fantastic tool, but the purpose it serves is
    by far more important, and this is what will ultimately be the final product that
    you deliver to your customers.


    ## Chapter 10


    ## Data Storage Recipes


    When working in iOS, one of the most important topics to understand is the concept,
    use, and implementation of persistence. This term refers to the idea of having
    information be saved and retrieved, or “persist,” through the closing or restarting
    of an application. Just as pages from books written thousands of years ago can
    still be read, we are able to make use of certain key concepts in iOS to allow
    our information, from the simplest of values to the most complex of data structures,
    to stay stored in our device for indefinite periods of time. We will cover a variety
    of methods of persistence throughout this chapter with different advantages, disadvantages,
    general uses, and complexities, so that we can develop a full understanding of
    the best method of storage for any given situation.'
