  trans: "```objc\n- (void)EventAddViewController:(EventAddViewController *)controller\n\
    didSubmitTitle:(NSString *)title\n{\n    EKEvent *event = [EKEvent eventWithEventStore:self.eventStore];\n\
    \    event.title = title;\n    event.calendar = [self.eventStore defaultCalendarForNewEvents];\n\
    \    event.startDate = [NSDate dateWithTimeIntervalSinceNow:60*60*24.0];\n   \
    \ event.endDate = [NSDate dateWithTimeInterval:60*60.0 sinceDate:event.startDate];\n\
    \    [self.eventStore saveEvent:event span:EKSpanThisEvent error:nil];\n    [self\
    \ fetchEvents];\n    [self.tableViewEvents reloadData];\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\n为了演示，我选择了一种极其简单的方法来创建这些新事件。正如你所见，这种方法只是让所有以此方式创建的事件都提前一天，且仅持续一小时。在您的实际应用中，很可能需要选择更复杂的或基于用户输入的方法来创建\
    \ `EKEvent`。\n\n**注意：** 我们在此处使用的代码可能会在 Xcode 中生成一条 \"Could not load source: 6\"\
    \ 日志。无需为此担心，因为它不会妨碍你的应用正常运行。\n\n## 秘籍 8–6：重复事件\n\nEvent Kit 框架为开发者提供了一个极其强大的 API，使其能够以编程方式处理重复事件。接下来，你将在前面秘籍的基础上进行扩展，让应用也能在你的日历中添加一个重复事件。\n\
    \n在你之前创建的 `-EventAddViewController:didSubmitTitle:` 方法中，你需要添加额外的代码，基于与普通事件相同的标题，来创建一个重复的\
    \ `EKEvent`。首先添加以下代码来配置这个新的 `EKEvent`。\n\n```objc\nEKEvent *recurringEvent = [EKEvent\
    \ eventWithEventStore:self.eventStore];\n    recurringEvent.title = [NSString\
    \ stringWithFormat:@\"Recurring %@\", title];\n    recurringEvent.calendar = [self.eventStore\
    \ defaultCalendarForNewEvents];\n    recurringEvent.startDate = [NSDate dateWithTimeIntervalSinceNow:60*60*24.0];\n\
    \    recurringEvent.endDate = [NSDate dateWithTimeInterval:60*60.0\nsinceDate:event.startDate];\n\
    ```\n\n接下来，你必须创建一个 `EKRecurrenceRule` 类的实例，并将其提供给你的事件。由于重复组合的可能性极为多样，这个类提供了一种极为灵活的方法来以编程方式实现重复事件。仅通过一个方法，开发者就能创建出几乎任何能想到的重复组合。我们将在此处定义一个稍微复杂一点的规则：\n\
    \n```objc\nEKRecurrenceRule *rule = [[EKRecurrenceRule alloc]\n              \
    \                initRecurrenceWithFrequency:EKRecurrenceFrequencyDaily\n    \
    \                          interval:2\n                              daysOfTheWeek:[NSArray\n\
    arrayWithObjects:[EKRecurrenceDayOfWeek dayOfWeek:2], [EKRecurrenceDayOfWeek\n\
    dayOfWeek:3], nil]\n                              daysOfTheMonth:nil\n       \
    \                       monthsOfTheYear:nil\n                              weeksOfTheYear:nil\n\
    \                              daysOfTheYear:nil\n                           \
    \   setPositions:nil\n                              end:[EKRecurrenceEnd\nrecurrenceEndWithOccurrenceCount:20]];\n\
    ```\n\n然后，你可以通过下面这行代码将此规则添加到你的事件中。使用的 `recurrenceRules` 属性是从 iOS 5.0 开始从 `EKCalendarItem`\
    \ 类继承而来的。\n\n```objc\nrecurringEvent.recurrenceRules = [NSArray arrayWithObject:rule];\n\
    ```\n\n此方法每个参数的功能如下所述。对于任何参数，传入 `nil` 都表示不加以限制。\n\n- `InitRecurrenceWithFrequency`：指定事件重复的基本频率，可以是每天、每周、每月或每年重复。\n\
    - `Interval`：根据频率指定重复的时间间隔。一个频率为每周、间隔为 3 的重复事件将每隔三周重复一次。\n- `DaysOfTheWeek`：此属性接受一个\
    \ `NSArray` 对象数组，这些对象必须通过 `EKRecurrenceDayOfWeek` 的 `+dayOfWeek` 方法来获取。该方法接受一个代表星期几的整数参数，其中\
    \ 1 表示星期日。通过设置此参数，开发者可以创建一个事件每隔几天重复一次，但仅当事件落在指定星期几时才会发生。\n- `MonthsOfTheYear`：类似于\
    \ `DaysOfTheWeek`，此参数用于指定将重复事件限制在哪些月份。它仅对频率为年的事件有效。\n- `WeeksOfTheYear`：与 `MonthsOfTheYear`\
    \ 一样，此参数也仅适用于频率为年的事件，但限制的是具体的周数，而非月份。\n- `DaysOfTheYear`：另一个仅限于每年重复事件的参数，它允许你仅指定某些天数（从年初或年末开始计算）来过滤特定事件。\n\
    - `SetPositions`：此参数是最终的过滤器，允许你将创建的事件完全限制在一年中的特定日期。例如，一个每天重复的事件可以通过此参数被限制为仅在某年的第\
    \ 28 天、第 102 天和第 364 天发生，具体取决于开发者的选择。\n- `End`：此参数需要对 `EKRecurrenceEnd` 类进行一次类调用，并指定你的事件何时停止重复。可供选择的两个类方法如下：\n\
    \  - `+recurrenceEndWithEndDate`：允许开发者指定一个日期，在此日期之后事件将不再重复。\n  - `+recurrenceEndWithOccurenceCount`：将事件的重复次数限制为有限的次数。\n\
    \n基于以上所有信息，你可以看到，我们为演示而创建的重复事件将每两天重复一次，但仅限于周一或周二，总共重复 20 次。\n\n根据你所实现的不同功能，你应该能清楚地看到，使用\
    \ Event Kit 框架与用户的日程和事件进行交互是多么充满可能。无论你是希望允许用户与其日程进行交互，还是更喜欢通过编程在后台处理，实现目标所需的工具都唾手可得，而且尽管功能极其灵活，使用起来却异常简单。"
- fmt: "### Recipe 8–7: Basic Address Book Access\n\nOne of the absolutely most imperative\
    \ functionalities in any modern device is the ability to store contact information,\
    \ and, as such, you should take care to develop applications that can take advantage\
    \ of this important data. In this recipe, you will cover three basic functionalities\
    \ for accessing and dealing with a device's contacts list.\n\nFirst, make a new\
    \ project called “Chapter8Recipe7”, with class prefix “Main”, using the Single\
    \ View Application template.\n\nYou will need to add in two extra frameworks to\
    \ your project for this recipe: `AddressBook.framework`, and `AddressBookUI.framework`.\n\
    \nNext, switch over to your view controller's XIB file, and make a view that resembles\
    \ the one in [Figure 8–9](#Chapter08.html#fig_8_9).\n\n![Image](images/9781430240051_Fig08-09.jpg)\n\
    \n**Figure 8–9.** *XIB file for accessing contact info*\n\nConnect these elements\
    \ to your header file using the following property names:\n\n* `firstLabel`\n\
    * `lastLabel`\n* `phoneLabel`\n* `cityLabel`\n* `stateLabel`\n\nYou will not need\
    \ a property for the `UIButton`, as you will not need to make any changes to it\
    \ for this recipe.\n\nDefine an action in your header file for your button to\
    \ perform called `-findPressed:`, like so:\n\n`-(IBAction)findPressed:(id)sender;`\n\
    \nNow that your interface is set up, you will make sure that your header file\
    \ is correctly written. First, add the following two import statements to make\
    \ sure that you can use your Address Book and Address Book UI frameworks.\n\n\
    `#import <AddressBook/AddressBook.h>`\n`#import <AddressBookUI/AddressBookUI.h>`\n\
    \nYou will be using an instance of the class `ABPeoplePickerNavigationController`,\
    \ and setting its `peoplePickerDelegate` property to your view controller, so\
    \ you need to add a protocol implementation to your header file. Make your view\
    \ controller conform to the `ABPeoplePickerNavigationControllerDelegate` protocol.\
    \ Your header file, in its entirety, should now look like so:\n\n`#import <UIKit/UIKit.h>`\n\
    `#import <AddressBook/AddressBook.h>`\n`#import <AddressBookUI/AddressBookUI.h>`\n\
    \n`@interface MainViewController : UIViewController`\n`<ABPeoplePickerNavigationControllerDelegate>`\n\
    \n`@property (strong, nonatomic) IBOutlet UILabel *firstLabel;`\n`@property (strong,\
    \ nonatomic) IBOutlet UILabel *lastLabel;`\n`@property (strong, nonatomic) IBOutlet\
    \ UILabel *phoneLabel;`\n`@property (strong, nonatomic) IBOutlet UILabel *stateLabel;`\n\
    `@property (strong, nonatomic) IBOutlet UILabel *cityLabel;`\n`-(IBAction)findPressed:(id)sender;`\n\
    `@end`\n\nSwitch over to your implementation file, and implement a simple `-viewDidLoad`\
    \ method to reset the text on your `UILabel`s.\n\n```\n- (void)viewDidLoad\n{\n\
    \    [super viewDidLoad];\n    self.firstLabel.text = @\"...\";\n    self.lastLabel.text\
    \ = @\"...\";\n    self.phoneLabel.text = @\"...\";\n    self.cityLabel.text =\
    \ @\"...\";\n    self.stateLabel.text = @\"...\";\n}\n```\n\nYou will implement\
    \ the `-findPressed:` method you defined earlier to create an instance of `ABPeoplePickerNavigationController`,\
    \ set its delegate, and then present it modally.\n\n```\n-(void)findPressed:(id)sender\n\
    {\n    ABPeoplePickerNavigationController *picker =[[ABPeoplePickerNavigationController\
    \ alloc] init];\n    picker.peoplePickerDelegate = self;\n    [self presentModalViewController:picker\
    \ animated:YES];\n}\n```\n\nNow you just need to create your delegate methods,\
    \ of which there are three you are required to implement. The first, and simplest,\
    \ is for when the picker controller is canceled.\n\n```\n-(void)peoplePickerNavigationControllerDidCancel:(ABPeoplePickerNavigationController\
    \ *)peoplePicker\n{\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\
    \nNext, you will define your main delegate method to handle the selection of a\
    \ contact. You will go through this method implementation step-by-step to discuss\
    \ each part.\n\nFirst, your method header looks like so:\n\n`-(BOOL)peoplePickerNavigationController:(ABPeoplePickerNavigationController\
    \ *)peoplePicker shouldContinueAfterSelectingPerson:(ABRecordRef)person`\n\nThe\
    \ first odd thing you may notice about this header is that the variable `person`\
    \ is of type `ABRecordRef`, which does not have a “*” after it. This essentially\
    \ means that `person` is not a pointer, and thus will not be used to call methods.\
    \ Instead, you will use pre-defined functions that utilize and access it. As you\
    \ will see, many parts of the Address Book framework utilize this more “C-based”\
    \ style.\n\nInside the method body, you will first perform your easiest accesses,\
    \ which will be for the first and last names of the chosen contact.\n\n```\nself.firstLabel.text\
    \ = (__bridge_transfer NSString *)ABRecordCopyValue(person, kABPersonFirstNameProperty);\n\
    self.lastLabel.text = (__bridge_transfer NSString *)ABRecordCopyValue(person,\
    \ kABPersonLastNameProperty);\n```\n\nThe `ABRecordCopyValue()` function will\
    \ be your go-to call for any kind of accessing data in this section. It takes\
    \ two parameters, the first being the `ABRecordRef` that you want to access, and\
    \ the second being a pre-defined `PropertyID` that instructs the function on which\
    \ piece of data to retrieve.\n\nThere are two types of values that can be dealt\
    \ with by this function: single values and multi-values. For these first two calls,\
    \ you are dealing only with single values, for which the `ABRecordCopyValue()`\
    \ function returns a type of `CFStringRef`. You can cast this up to an `NSString`\
    \ by adding the `(__bridge_transfer NSString *)` code in front of the value.\n\
    \nThe `__bridge_transfer` command is new to iOS 5 with Automatic Reference Counting\
    \ (ARC), and simply specifies that ARC will now handle the value being “bridged.”\n\
    \nThe next value you can access is the person's phone number, which is a multi-value.\
    \ Multi-values are usually used for the properties of a person for which multiple\
    \ entries can be given, such as the address, phone number, or e-mail. When you\
    \ copy this, you will receive a variable of type `ABMultiValueRef`, which you\
    \ can then use to access a specific value.\n\n```\nABMultiValueRef multi = ABRecordCopyValue(person,\
    \ kABPersonPhoneProperty);\nCFStringRef phoneNumber = ABMultiValueCopyValueAtIndex(multi,\
    \ 0);\nself.phoneLabel.text = (__bridge_transfer NSString *)phoneNumber;\nCFRelease(phoneNumber);\n\
    ```\n\nBy using the call `ABMultiValueCopyValueAtIndex(multi, 0);`, you have specified\
    \ that you want the first phone number stored for the given user. From there,\
    \ you can set your label's text just as you did before.\n\nSince you created a\
    \ new `CFStringRef` `phoneNumber` to point to your value, you should release it\
    \ with the `CFRelease()` command, as shown in the previous snippet.\n\nThe next\
    \ multi-value you will deal with will be the main address of the chosen contact.\
    \ When dealing with the address, an extra step is required, as an address is stored\
    \ as a `CFDictionary`. You will retrieve this dictionary using the `ABMultiValueCopyValueAtIndex()`\
    \ function again, and then query its values:\n\n```\nABMultiValueRef address =\
    \ ABRecordCopyValue(person, kABPersonAddressProperty);\n    if (ABMultiValueGetCount(address)\
    \ > 0)\n    {\n        CFDictionaryRef dictionary = ABMultiValueCopyValueAtIndex(address,\
    \ 0);\n        CFStringRef cityKey = kABPersonAddressCityKey;\n        CFStringRef\
    \ stateKey = kABPersonAddressStateKey;\n        self.cityLabel.text = (__bridge_transfer\
    \ NSString *)CFDictionaryGetValue(dictionary, (void *)cityKey);\n        self.stateLabel.text\
    \ = (__bridge_transfer NSString *)CFDictionaryGetValue(dictionary, (void *)stateKey);\n\
    \n        CFRelease(dictionary);\n        CFRelease(cityKey);\n        CFRelease(stateKey);\n\
    \    }\n    else\n    {\n        self.cityLabel.text = @\"...\";\n        self.stateLabel.text\
    \ = @\"...\";\n    }\n```\n\nFinally, you can dismiss your modal view controller,\
    \ as well as add your return value for this method. As a whole, your method should\
    \ look like so:"
  raw: '### Recipe 8–7: Basic Address Book Access


