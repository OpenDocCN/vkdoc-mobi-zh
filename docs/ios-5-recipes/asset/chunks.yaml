  raw: '#### Attaching Data to Mail


    The `MFMailComposeViewController` includes functionality for you to attach data
    to your e-mail from your application through the use of the `-addAttachmentData:mimeType:fileName:`
    method. This method takes three parameters:


    1.  `attachment`:This instance of `NSData` refers to the actual data of the object
    that you want to send. This means for any object you want to attach, you will
    need to acquire the `NSData` for it.

    2.  `mimeType`: This property is an `NSString`that defines to the controller the
    data type of the attachment. These values are not local to iOS, and so are not
    defined in the Apple documentation. They can, however, be easily found online.
    Wikipedia offers a very distinct article on all the possible values at`http://en.wikipedia.org/wiki/Internet_media_type`.
    The MIME type of a JPEG image, for example, is “image/jpeg”.

    3.  `fileName`: Use this `NSString` property to set the preferred name for the
    file sent in the e-mail.


    You will add functionality to your application to access the user''s image library,
    select an image, and then use that image to attach to your e-mail.


