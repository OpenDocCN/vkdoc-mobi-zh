    Before your app processes a `CLLocation` object, you want to check that the timestamp
    of the location object is recent. Core Location has a habit of presenting the
    last known location as the first call to the delegate method before it has a lock
    on the new location. There is no need to process a location object that represents
    the device''s location at some point in history when you need to know where it
    is now. To do this, you can use code similar to the following to process only
