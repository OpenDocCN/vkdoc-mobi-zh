    \n#import \"MyAppClass.h\"\n#import \"AppUITableViewCellClass.h\"\n\n@implementation\
    \ AppListTableViewController\n\n- (void)prepareForSegue:(UIStoryboardSegue *)segue\
    \ sender:(id)sender{\n    if([segue.identifier isEqualToString:@\"AppDetailsLoadFromTableViewCell\"\
    ]){\n        AppDetailsViewController *appDetailsVC = segue.destinationViewController;\n\
    \        appDetailsVC.selectedApp=[MyAppClass appWithAppID:[[self.tableView indexPathForSelectedRow]\
    \ row]+1];\n    }\n}\n\n#pragma mark - Table view data source\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView\n{\n    return 1;\n}\n- (NSInteger)tableView:(UITableView *)tableView\
    \ numberOfRowsInSection:(NSInteger)section\n{\n    return 3;\n}\n\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    //Set the CellIdentifier that you set in the storyboard\n    static NSString\
    \ *CellIdentifier = @\"appCell\";\n\n    AppUITableViewCellClass *cell = [tableView\
    \ dequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell == nil) {\n\
    \        cell = [[AppUITableViewCellClass alloc] initWithStyle:UITableViewCellStyleDefault\
    \ reuseIdentifier:CellIdentifier];\n    }\n\n    //Configure the cell\n    MyAppClass\
    \ *appForCell=[MyAppClass appWithAppID:indexPath.row+1];\n    cell.labelAppName.text=appForCell.appName;\n\
    \    cell.labelAppDescription.text=appForCell.appDescription;\n    cell.imageAppIcon.image=appForCell.iconImage;\n\
    \n    return cell;\n}\n```\n\nNow when you run the app, the app `UITableView`\
