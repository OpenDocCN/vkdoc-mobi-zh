    \n![Image](images/9781430240051_Fig05-13.jpg)\n\n**Figure 5–13.** *Application\
    \ with map and pins*\n\nOftentimes it may be useful to have an application in\
    \ which a map's annotations are moveable by dragging them across the map. Implementing\
