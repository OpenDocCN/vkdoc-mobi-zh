    Be careful to notice that in this case, the initial results you get after converting
    your JSON formatted data to an Objective-C object are not in an `NSArray`. This
    time, they are in an `NSDictionary` in order to provide extra information on the
    query. You can then access your usual `NSArray` by accessing the “results” key,
