  trans: "\n# 配方 16-3：成就系统\n\n游戏中的成就类似于其他应用和游戏中的徽章及可解锁内容。当玩家达到特定里程碑时，您需要为他们提供通知。在`HangmanMP`游戏中，一个很好的成就设定可以是：玩家完美猜中某个单词的全部字母（不犯任何错误）。让我们来看看如何实现这个功能。\n\
    \n## 配置 iTunes Connect\n\n与 Game Center 的其他功能一样，所有操作都从 iTunes Connect 开始。请访问 `itunesconnect.apple.com`，点击\"\
    管理你的应用\"，然后选择已配置 Game Center 的应用，接着点击\"管理 Game Center\"。\n\n在 Game Center 管理页面中，点击\"\
    成就\"下的\"设置\"，如图 16-16 所示。\n\n![图片](img/9781430240051_Fig16-16.jpg)\n\n**图 16-16.**\
    \ *从 Game Center 界面进入成就设置区*\n\n每个游戏最多可设置 1000 个成就点。您可以根据需要将这些点数分配给不同的成就，但每个成就最多只能获得\
    \ 100 成就点。\n\n现在我们将创建一个 50 点成就，请继续点击\"添加新成就\"，如图 16-17 所示。\n\n![图片](img/9781430240051_Fig16-17.jpg)\n\
    \n**图 16-17.** *为你的应用添加新成就*\n\n该成就的条件是：在猜短单词（6 个字母或更少）时，全部猜对且不犯任何错误。具体配置如图 16-18\
    \ 所示。\n\n![图片](img/9781430240051_Fig16-18.jpg)\n\n**图 16-18.** *配置成就详情*\n\n在添加至少一种语言之前无法保存成就，请立即点击\"\
    添加语言\"。生成的界面将如图 16-19 所示。在此处您可以设置成就标题和\"达成前\"描述。达成前描述应详细说明如何获得该成就。此外还有\"已达成\"\
    描述，即获得成就后显示的描述。最后，您需要一张代表成就的图片，应为 512×512 像素、72 ppi 的`.png`文件。\n\n![图片](img/9781430240051_Fig16-19.jpg)\n\
    \n**图 16-19.** *在特定语言中配置成就详情*\n\n点击\"保存\"，然后在成就信息页面上再次点击\"保存\"。接下来让我们编写代码...\n\
    \n## 配置代码\n\n这与配置排行榜非常相似。打开`GameScene.m`，添加以下方法：\n\n```\n- (void) reportAchievementIdentifier:(NSString*)identifier\
    \ percentComplete:(float)percent\n{\n    GKAchievement *achievement = [[GKAchievement\
    \ alloc] initWithIdentifier:identifier];\n    if (achievement)\n    {\n      \
    \  achievement.percentComplete = percent;\n        [achievement reportAchievementWithCompletionHandler:^(NSError\
    \ *error)\n        {\n            if (error != nil)\n            {\n         \
    \       //出现错误，需在本地保存成就稍后重新提交\n                NSLog(@\"Saving achievement for\
    \ later\");\n                NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES);\n                NSString *achievementFilePath = [NSString\
    \ stringWithFormat:@\"%@/achievements.plist\",[paths objectAtIndex:0]];\n    \
    \            NSMutableDictionary *achievementDictionary=[NSMutableDictionary dictionaryWithContentsOfFile:achievementFilePath];\n\
    \n                [achievementDictionary setValue:achievement forKey:achievement.identifier];\n\
    \                [achievementDictionary writeToFile:achievementFilePath atomically:YES];\n\
    \            }\n        }];\n    }\n}\n```\n\n现在只需用您的成就和完成百分比调用此方法即可。由于在此场景中要么获得成就要么不获得，完成百分比仅为\
    \ 100 或 0，但您可以使用此代码片段报告任何成就的完成情况。请在`processGuess`方法中报告分数后添加这段代码：\n\n```\nif(unfoundLetters.location==NSNotFound){\n\
    \            [self reportScore:playerScore forCategory:@\"default_high_scores\"\
    ];\n            if(self.badGuessCount==0 && self.stringHiddenWord.length<=6){\n\
    \                NSLog(@\"Reporting achievement\");\n                [self reportAchievementIdentifier:@\"\
    no_mistakes_small_word\" percentComplete:100];\n            }\n….\n```\n\n与应用委托中保存分数的方式类似，您也应该对成就做同样处理。转到`HMAppDelegate.m`，修改`didFinishLaunchingWithOptions`方法，在返回语句前添加以下代码：\n\
    \n```\n    //Report saved achievements\n    NSString *achievementFilePath = [NSString\
    \ stringWithFormat:@\"%@/achievements.plist\",[paths objectAtIndex:0]];\n    NSMutableDictionary\
    \ *achievementDictionary=[NSMutableDictionary dictionaryWithContentsOfFile:achievementFilePath];\n\
    \    for (id achievement in [achievementDictionary allKeys]){\n        GKAchievement\
    \ *achievementToReport=(GKAchievement *)[achievementDictionary objectForKey:achievement];\n\
    \        [achievementToReport reportAchievementWithCompletionHandler:^(NSError\
    \ *error)\n         {\n             if (error != nil)\n             {\n      \
    \           //出现错误，需在本地保存成就稍后重新提交\n                 NSLog(@\"Saving achievement\
    \ for later\");\n                 NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES);\n                 NSString *achievementFilePath = [NSString\
    \ stringWithFormat:@\"%@/achievements.plist\",[paths objectAtIndex:0]];\n    \
    \             NSMutableDictionary *achievementDictionary=[NSMutableDictionary\
    \ dictionaryWithContentsOfFile:achievementFilePath];\n\n                 [achievementDictionary\
    \ setValue:achievementToReport forKey:achievement];\n                 [achievementDictionary\
    \ writeToFile:achievementFilePath atomically:YES];\n             }else{\n    \
    \             NSLog(@\"Achievement reported\");\n             }\n         }];\n\
    \    }\n```\n\n## 显示成就\n\n如果您已阅读过\"排行榜\"部分，这部分内容会让人感觉似曾相识。您希望向玩家展示他们在游戏中获得的成就，最简单的方法是将应用中的按钮与`GKAchievementsViewController`关联。前往`MainMenuScene.m`，添加以下方法：\n\
    \n```\n-(void)achievementViewControllerDidFinish:(GKAchievementViewController\
    \ *)viewController{\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\
    \n这将关闭您的`GKAchievementViewController`。为了显示它，请在`MainMenuScene.m`中添加以下函数：\n\n```\n\
    - (void) showAchievements\n{\n    GKAchievementViewController *achievements =\
    \ [[GKAchievementViewController alloc] init];\n    if (achievements != nil)\n\
    \    {\n        achievements.achievementDelegate = self;\n        [self presentModalViewController:achievements\
    \ animated: YES];\n    }\n}\n```\n\n将`UIButton`的操作调用连接到该方法，然后别忘了在`MainMenuScene.h`文件中添加`GKAchievementViewControllerDelegate`协议：\n\
    \n```\n//\n//  MainMenuScene.h\n//  HangmanMP\n\n#import <UIKit/UIKit.h>\n#import\
    \ <GameKit/GameKit.h>\n\n@interface MainMenuScene : UIViewController <GKLeaderboardViewControllerDelegate\
    \ GKAchievementViewControllerDelegate>\n\n- (IBAction)actionShowHighScores:(id)sender;\n\
    \n@end\n```\n\n现在在模拟器中启动应用进行测试。您将能够查看新创建的成就，如图 16-20 所示。\n\n![图片](img/9781430240051_Fig16-20.jpg)\n\
    \n**图 16-20.** *您的应用显示已获得的成就*\n"
- fmt: "### Recipe 16–4: Multiplayer\n\nAdding a multiplayer option to your game greatly\
    \ increases the replay factor of your game because now the player can go outside\
    \ the bounds of the computer and play against real-life players on the Internet.\n\
    \n**NOTE:** You can't test multiplayer in the simulator. Instead you'll need two\
    \ devices to test with, so borrow a friend's or pick up an old iPod touch somewhere.\n\
    \n#### Setting Up Your Code\n\nFor this recipe, you can skip right over the iTunes\
    \ Connect portion because if you've enabled Game Center, multiplayer is automatically\
    \ made available as long as your game supports it. So let's jump right into some\
    \ code.\n\nThe first thing you are going to do is update your `MainMenuScene.h`\
    \ file. You'll need to set it as a `GKMatchmakerViewControllerDelegate` and also\
    \ add a new action to host a multiplayer game. It should look like this:\n\n```\n\
    //  MainMenuScene.h\n//  HangmanMP\n//\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\
    \n@interface MainMenuScene : UIViewController <GKLeaderboardViewControllerDelegate,\n\
    GKAchievementViewControllerDelegate,GKMatchmakerViewControllerDelegate>\n\n- (IBAction)actionShowHighScores:(id)sender;\n\
    - (IBAction)actionShowAchievements:(id)sender;\n- (IBAction)actionHostMatch:(id)sender;\n\
    \n@end\n```\n\nNow switch over to the `MainMenuScene.m` file. You'll create two\
    \ standard methods required by the `GKMatchmakerViewControllerDelegate` protocol,\
    \ `matchmakerViewControllerWasCancelled` and `matchmakerViewController:didFailWithError`:\n\
    \n```\n- (void)matchmakerViewControllerWasCancelled:(GKMatchmakerViewController*)viewController\n\
    {\n    [self dismissModalViewControllerAnimated:YES];\n}\n\n- (void)matchmakerViewController:(GKMatchmakerViewController\
    \ *)viewController\n                didFailWithError:(NSError *)error\n{\n   \
    \ [self dismissModalViewControllerAnimated:YES];\n    [[[UIAlertView alloc] initWithTitle:@\"\
    Error\" message:error.description delegate:nil\ncancelButtonTitle:@\"OK\" otherButtonTitles:nil]\
    \ show];\n}\n```\n\nOne final delegate protocol method you'll need to add is `matchmakerViewController:didFindMatch:`,\
    \ and this is how you start to load a multiplayer game.\n\n```\n- (void)matchmakerViewController:(GKMatchmakerViewController\
    \ *)viewController\n                    didFindMatch:(GKMatch *)match\n{\n   \
    \ [self dismissModalViewControllerAnimated:YES];\n//Set up our game scene from\
    \ the story board\n    GameScene *gameSceneVC=[self.storyboard\ninstantiateViewControllerWithIdentifier:@\"\
    GameScene\"];\n//Set the match property on GameScene to the matchmaker match\n\
    \    gameSceneVC.match=match;\n//Set the delegate of the match to GameScene, more\
    \ on this to come…\n    match.delegate = gameSceneVC;\n[self.navigationController\
    \ pushViewController:gameSceneVC animated:YES];\n}\n```\n\nNow you will create\
    \ the action to actually start looking for matches with the `matchmakerViewController`:\n\
    \n```\n- (IBAction)actionHostMatch:(id)sender {\n    if([GKLocalPlayer localPlayer].isAuthenticated){\n\
    \        GKMatchRequest *request = [[GKMatchRequest alloc] init] ;\n        request.minPlayers\
    \ = 2;\n        request.maxPlayers = 2;\n        GKMatchmakerViewController *mmvc\
    \ = [[GKMatchmakerViewController alloc]\ninitWithMatchRequest:request];\n    \
    \    mmvc.matchmakerDelegate = self;\n        [self presentModalViewController:mmvc\
    \ animated:YES];\n    }\n}\n```\n\nThis will get us to start looking for matches,\
    \ but if you want to be able to respond to invitations, you'll need to add an\
    \ invitation handler. This should be added as soon as the player is authenticated\
    \ so that it can handle invitation requests as soon as possible. This block of\
    \ code will handle invites you send out and invites that you receive. Add the\
    \ following code in the `-viewDidLoad` method of `MainMenuScene.m`:\n\n```\n-\
    \ (void)viewDidLoad\n{\n    [super viewDidLoad];\n    [GKMatchmaker sharedMatchmaker].inviteHandler\
    \ = ^(GKInvite *acceptedInvite,\n                                            \
    \          NSArray *playersToInvite) {\n        // Insert application-specific\
    \ code here to clean up any games in progress.\n        if (acceptedInvite)\n\
    \        {\n            GKMatchmakerViewController *mmvc = [[GKMatchmakerViewController\
    \ alloc]\ninitWithInvite:acceptedInvite];\n            mmvc.matchmakerDelegate\
    \ = self;\n            [self presentModalViewController:mmvc animated:YES];\n\
    \        }\n        else if (playersToInvite)\n        {\n            GKMatchRequest\
    \ *request = [[GKMatchRequest alloc] init];\n            request.minPlayers =\
    \ 2;\n            request.maxPlayers = 2;\n            request.playersToInvite\
    \ = playersToInvite;\n            GKMatchmakerViewController *mmvc = [[GKMatchmakerViewController\
    \ alloc]\ninitWithMatchRequest:request];\n            mmvc.matchmakerDelegate\
    \ = self;\n            [self presentModalViewController:mmvc animated:YES];\n\
    \        }\n    };\n}\n```\n\nNow you'll want to implement multiplayer game controls\
    \ into your `GameScene`. Open `GameScene.h`, and set it as a `GKMatchDelegate`.\
    \ You can also set it as a `UIAlertViewDelegate` (for later). Finally, you will\
    \ add two new properties, `GKMatch *match` and `BOOL matchStarted`. `GameScene.h`\
    \ should now look like this:\n\n```\n//  GameScene.h\n//  HangmanMP\n\n#import\
    \ <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface GameScene : UIViewController\
    \ <UITextFieldDelegate, GKMatchDelegate, UIAlertViewDelegate>\n\n@property (weak,\
    \ nonatomic) IBOutlet UITextField *textFieldGuess;\n@property (weak, nonatomic)\
    \ IBOutlet UITextView *textViewGuesses;\n@property (weak, nonatomic) IBOutlet\
    \ UILabel *labelGuessedLetters;\n@property (weak, nonatomic) IBOutlet UIImageView\
    \ *imageViewHanger;\n@property (weak, nonatomic) IBOutlet UILabel *labelLettersInWord;\n\
    @property (weak, nonatomic) IBOutlet UIScrollView *scrollViewContent;\n@property\
    \ (weak, nonatomic) IBOutlet UIActivityIndicatorView *activityIndicator;\n\n@property(strong,\
    \ nonatomic) NSMutableArray *arrayGuesses;\n@property(strong, nonatomic) NSString\
    \ *stringDifficulty;\n@property(strong, nonatomic) NSString *stringHiddenWord;\n\
    @property(nonatomic) int badGuessCount;\n@property(strong, nonatomic) GKMatch\
    \ *match;\n@property(nonatomic) BOOL matchStarted;\n\n-(NSString *) getMagicWord;\n\
    \n@end\n```\n\nSwitch to `GameScene.m`, and you have a few more changes to make\
    \ to ensure that your game can handle multiplayer sessions. First, you need to\
    \ synthesize the two new properties you created, so at the bottom of the `@synthesize`\
    \ list, add this:\n\n```\n@synthesize match;\n@synthesize matchStarted;\n```\n\
    \nNow, you'll create a method in `GameScene.m` for sending data to all users in\
    \ your game. This is just a generic function that will encode an `NSDictionary`\
    \ and send it as an `NSData` object.\n\n```\n- (void) sendData:(NSDictionary *)dictionaryToSend\n\
    {\n    NSError *error;\n\n    NSMutableData *dataToSend = [[NSMutableData alloc]\
    \ init];\n        NSKeyedArchiver *archiver = [[NSKeyedArchiver alloc]\ninitForWritingWithMutableData:dataToSend];\n\
    \        [archiver encodeObject:dictionaryToSend forKey:@\"DataDictionary\"];\n\
    \        [archiver finishEncoding];\n\n    [match sendDataToAllPlayers:dataToSend\
    \ withDataMode:GKMatchSendDataReliable\nerror:&error];\n    if (error != nil)\n\
    \    {\n        NSLog(@\"Error sending data: %@\", error.description);\n    }\n\
    }\n```\n\nNote this line:\n\n`[match sendDataToAllPlayers:dataToSend withDataMode:GKMatchSendDataReliable\
    \ error:&error];`"
  raw: '### Recipe 16–4: Multiplayer


    Adding a multiplayer option to your game greatly increases the replay factor of
    your game because now the player can go outside the bounds of the computer and
    play against real-life players on the Internet.


    **NOTE:** You can''t test multiplayer in the simulator. Instead you''ll need two
    devices to test with, so borrow a friend''s or pick up an old iPod touch somewhere.


    #### Setting Up Your Code


    For this recipe, you can skip right over the iTunes Connect portion because if
    you''ve enabled Game Center, multiplayer is automatically made available as long
    as your game supports it. So let''s jump right into some code.


