    }\n\n最后，你可以设置你的 `-libraryPressed:` 方法，该方法将会弹出一个 `MPMediaPickerController`，允许你选择多首歌曲进行排队。\n\
    \n`-(void)libraryPressed:(id)sender`\n{\n    MPMediaPickerController *picker =\
    \ [[MPMediaPickerController alloc] initWithMediaTypes:MPMediaTypeMusic];\n   \
    \ picker.delegate = self;\n    picker.allowsPickingMultipleItems = YES;\n    picker.prompt\
    \ = @\"Choose Some Music!\";\n    [self presentModalViewController:picker animated:YES];\n\
    }\n\n你需要实现两个代理方法才能正确处理 `MPMediaPickerController`。首先，这是处理取消操作的代理方法：\n\n`-(void)mediaPickerDidCancel:(MPMediaPickerController\
    \ *)mediaPicker`\n{\n    [self dismissModalViewControllerAnimated:YES];\n}\n\n\
    其次，你还需要处理成功选择媒体后的代理方法，它看起来与 `-queryPressed:` 方法非常相似。\n\n`-(void)mediaPicker:(MPMediaPickerController\
    \ *)mediaPicker didPickMediaItems:(MPMediaItemCollection *)mediaItemCollection`\n\
    {\n    [self updatePlaylistWithArray:[self AVPlayerItemsFromArray:[mediaItemCollection\
    \ items]]];\n    [self updateMyCollectionWithArray:[mediaItemCollection items]];\n\
    \    [self.playButton setTitle:@\"Pause\" forState:UIControlStateNormal];\n  \
    \  [self updateNowPlaying];\n\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n\n在测试这个应用时，你可能会注意到一个细微的问题：你还没有提供一种方法来清空队列并重置应用，除非播放或跳过直到队列末尾。如果你的队列只有几首歌，这不算什么问题，但如果你排队了更多歌曲，你很可能希望加入某种方法，通过重置你的\
    \ `NSMutableArray` 并移除 `player` 队列中的所有项目来清空队列。不过，出于测试目的，只需双击设备的 Home 键，长按应用图标，然后关闭即可。\n\
    \n现在，你的音乐排队播放器应该已经功能完整了！当你测试这个应用时，即使应用进入设备的后台，它也应该继续播放音乐！图 7–13 展示了你的应用正在播放一首歌，以及它的“正在播放”功能和接收远程控制事件的能力。\n\
    \n![Image](img/9781430240051_Fig07-13.jpg)\n\n**图 7–13.** *你的应用正在播放歌曲，同时在多任务栏中显示“正在播放”信息*\n\
    \n### 总结\n\n完整的多媒体体验不仅仅是用户能否听音乐这么简单。作为一种产品，声音更多地关乎那些能让其变得稍微更好一些的微小细节，无论是暂停时的快速淡出，还是更快速地找到歌曲。从录制音乐到过滤媒体项目，再到创建音量渐变，作为开发者，你用心在应用中加入的每一个额外细节，最终都会让你的用户享受到一个更加强大的工具。在\
    \ iOS 开发中，Apple 提供了一套极其强大的基于多媒体的功能供我们使用，正如在 iTunes App Store 中快速搜索所显示的那样，开发社区已经超越了本职要求，充分利用这些功能为我们的用户打造了一个超乎想象的多媒体环境。\n\
    \n## 第 8 章\n\n## 用户数据秘籍\n\n没有两个人是相同的，同样地，没有两台 iOS 设备是相同的，因为一台设备存储的信息极度依赖于使用它的人。我们将自己的生活填满设备，包括照片、日历、备忘录、联系人和音乐。作为开发者，能够访问所有这些信息（无论设备类型如何）至关重要，这样我们才能将这些信息整合到应用中，并提供更独特、更个性化的用户界面。在本章中，我们将介绍多种处理用户数据的方法，首先处理日历，然后处理通讯录。"
- fmt: "### Recipe 8–1: Working with `NSCalendar` and `NSDate`\n\nMany different applications\
    \ are often used for time- and date-based calculations. This could be anything\
    \ from converting calendars, to sorting to-do lists, to telling the user how much\
    \ time remains before an alarm will go off. In order to use the more intricate\
    \ event-based user interface, you must have a solid understanding of the simpler\
    \ `NSDate`-focused APIs. Here, you will implement a simple application to illustrate\
    \ the use of the `NSDate`, `NSCalendar`, and `NSDateComponents` classes by converting\
    \ dates from the popular Gregorian calendar to the Hebrew calendar.\n\nCreate\
    \ a new project called `Chapter8Recipe1`, with the class prefix `Main`, using\
    \ the Single View Application template. You will not need to utilize any extra\
    \ frameworks. Switch over to your view controller's XIB file. Set up your XIB\
    \ file to resemble the one shown in [Figure 8–1](#Chapter08.html#fig_8_1).\n\n\
    ![Image](images/9781430240051_Fig08-01.jpg)\n\n**Figure 8–1.** *User interface\
    \ for calendar conversion*\n\nYou will need to set up properties to represent\
    \ each `UITextField`. Once your view is set up, connect each `UITextField` to\
    \ your header file with the following property names as appropriate.\n\n- `textFieldGMonth`\n\
    - `textFieldGDay`\n- `textFieldGYear`\n- `textFieldHMonth`\n- `textFieldHDay`\n\
    - `textFieldHYear`\n\nThe `G` and `H` in these property names refer to whether\
    \ the given `UITextField` is on the Gregorian or Hebrew side of the application.\n\
    \nYou do not need to connect the `UIButton`s to outlets, but make sure they are\
    \ connected to respective actions `-convertToHebrew:` and `-convertToGregorian:`.\n\
    \nAlways keep in mind that whenever you are dealing with an application that takes\
    \ user input, such as the `UITextField`s here, there is always a possibility of\
    \ a keyboard popping up and covering the bottom half of your screen. Plan your\
    \ design accordingly by placing all `UITextField`s in the upper half of the view!\n\
    \nIn order to better control all these `UITextField`s, you will need to make your\
    \ view controller the delegate for them all. First, add `<UITextFieldDelegate>`\
    \ to your controller's header line, so that it now looks like so:\n\n```\n@interface\
    \ MainViewController : UIViewController <UITextFieldDelegate>\n```\n\nNext, you\
    \ will set all the `UITextField` delegates to your view controller by adding the\
    \ following code to your `-viewDidLoad` method:\n\n```\nfor (UITextField *field\
    \ in self.view.subviews)\n{\n    if ([field respondsToSelector:@selector(setDelegate:)])\n\
    \    {\n        field.delegate = self;\n    }\n}\n```\n\nIn this `for` loop, the\
    \ `-respondsToSelector:` method call is necessary, otherwise your application\
    \ will throw an `NSException`. In general, this is a fairly good method to use\
    \ whenever you are dealing with the possibility of multiple types of objects in\
    \ an array.\n\nNext, define the `UITextFieldDelegate` method `-textFieldShouldReturn:`\
    \ to properly dismiss the keyboard.\n\n```\n-(BOOL)textFieldShouldReturn:(UITextField\
    \ *)textField\n{\n    [textField resignFirstResponder];\n    return NO;\n}\n```\n\
    \nThe first new class that you will see here is the `NSCalendar` class. This is\
    \ essentially used to set a standard for the dates that you will later refer to.\
    \ The `NSCalendar` method also allows you to perform several useful functions\
    \ dealing with a calendar, such as changing which day a week starts on, or changing\
    \ the time zone used. The `NSCalendar` class also acts as a bridge between the\
    \ `NSDate` and `NSDateComponents` classes that you will see later.\n\nYou will\
    \ be using two instances of the `NSCalendar` class in order to translate dates\
    \ from the Gregorian calendar to the Hebrew calendar. You will make these properties\
    \ of your class.\n\n```\n@property (nonatomic, strong) NSCalendar *gregorianCalendar;\n\
    @property (nonatomic, strong) NSCalendar *hebrewCalendar;\n```\n\nGo ahead and\
    \ synthesize these two properties as you would any other property. You will, however,\
    \ need to implement custom implementations of the getter methods for each of these\
    \ properties.\n\n```\n-(NSCalendar *)gregorianCalendar\n{\n    if (!gregorianCalendar)\n\
    \    {\n        gregorianCalendar = [[NSCalendar alloc]\ninitWithCalendarIdentifier:NSGregorianCalendar];\n\
    \    }\n    return gregorianCalendar;\n}\n\n-(NSCalendar *)hebrewCalendar\n{\n\
    \    if (!hebrewCalendar)\n    {\n        hebrewCalendar = [[NSCalendar alloc]\n\
    initWithCalendarIdentifier:NSHebrewCalendar];\n    }\n    return hebrewCalendar;\n\
    }\n```\n\nThese method overrides are necessary in order to make sure that your\
    \ calendars are initialized with their correct calendar types. Alternatively,\
    \ you could simply initialize your calendars in your `-viewDidLoad` method to\
    \ be created when the app launches.\n\nThere are a large variety of different\
    \ calendar types that are available for use, including but not limited to the\
    \ following:\n\n- `NSBuddhistCalendar`\n- `NSIslamicCalendar`\n- `NSJapaneseCalendar`\n\
    \nGiven the immense multicultural nature of today's technological world, you may\
    \ find it quite necessary to make use of some of these calendars! Consult the\
    \ Apple documentation for a full list of possible calendar types.\n\nNow that\
    \ your setup is done, you can implement your conversion method, starting with\
    \ the conversion from Gregorian to Hebrew.\n\n```\n-(void)convertToGregorian:(id)sender\n\
    {\n    NSDateComponents *hComponents = [[NSDateComponents alloc] init];\n    [hComponents\
    \ setDay:[self.textFieldHDay.text integerValue]];\n    [hComponents setMonth:[self.textFieldHMonth.text\
    \ integerValue]];\n\n    [hComponents setYear:[self.textFieldHYear.text integerValue]];\n\
    \n    NSDate *hebrewDate = [self.hebrewCalendar dateFromComponents:hComponents];\n\
    \n    NSUInteger unitFlags = NSDayCalendarUnit | NSMonthCalendarUnit |\n    NSYearCalendarUnit;\n\
    \n    NSDateComponents *hebrewDateComponents = [self.gregorianCalendar\ncomponents:unitFlags\
    \ fromDate:hebrewDate];\n\n    self.textFieldGDay.text = [[NSNumber numberWithInteger:hebrewDateComponents.day]\n\
    stringValue];\n    self.textFieldGMonth.text = [[NSNumber numberWithInteger:hebrewDateComponents.month]\n\
    stringValue];\n    self.textFieldGYear.text = [[NSNumber numberWithInteger:hebrewDateComponents.year]\n\
    stringValue];\n}\n```\n\nAs you can see, you are using a combination of `NSDateComponents`,\
    \ `NSDate`, and `NSCalendar` to perform this conversion.\n\nThe `NSDateComponents`\
    \ class is used to define the details that make up an `NSDate`, such as the day,\
    \ month, year, time, etc. Here, only the month, day, and year are being specified.\n\
    \nAs mentioned earlier, you use an instance of the `NSCalendar` to create an instance\
    \ of `NSDate` out of the components that you have defined.\n\nOne of the more\
    \ confusing parts of this method is the use of the `NSUInteger` `unitFlags`, which\
    \ is formatted quite unusually. Whenever you specify creating an instance of `NSDateComponents`\
    \ out of an `NSDate`, you need to specify exactly which components to include\
    \ from the date. You can specify these flags, called `NSCalendarUnit`s, through\
    \ the use of the `NSUInteger`, as shown.\n\nOther types of `NSCalendarUnit`s include\
    \ the following, among many others:\n\n- `NSSecondCalendarUnit`\n- `NSWeekOfYearCalendarUnit`\n\
    - `NSEraCalendarUnit`\n- `NSTimeZoneCalendarUnit`\n\nAs you can see, the specificity\
    \ with which you can create instances of `NSDate` is highly customizable, allowing\
    \ you to perform unique calculations and comparisons. For a full list of `NSCalendarUnit`\
    \ values, refer to the `NSCalendar` class reference in Apple's developer API.\n\
    \nSince the values of `NSDateComponents` are of type `NSInteger`, you must first\
    \ convert them to instances of `NSNumber`, and then take their `-stringValue`\
    \ before you set them into your text fields.\n\nOnce you have defined your conversion\
    \ from one calendar to the other, the reverse is incredibly simple, as you just\
    \ need to change which text fields and calendar you use."
  raw: '### Recipe 8–1: Working with NSCalendar and NSDate


    Many different applications are often used for time- and date-based calculations.
    This could be anything from converting calendars, to sorting to-do lists, to telling
    the user how much time remains before an alarm will go off. In order to use the
    more intricate event-based user interface, you must have a solid understanding
    of the simpler `NSDate`-focused APIs. Here, you will implement a simple application
    to illustrate the use of the `NSDate`, `NSCalendar`, and `NSDateComponents` classes
    by converting dates from the popular Gregorian calendar to the Hebrew calendar.


    Create a new project called “Chapter8Recipe1”, with the class prefix “Main,” using
    the Single View Application template. You will not need to utilize any extra frameworks.
    Switch over to your view controller''s XIB file. Set up your XIB file to resemble
    the one shown in [Figure 8–1](#Chapter08.html#fig_8_1).


    ![Image](images/9781430240051_Fig08-01.jpg)


    **Figure 8–1.** *User interface for calendar conversion*


    You will need to set up properties to represent each `UITextField`. Once your
    view is set up, connect each `UITextField` to your header file with the following
    property names as appropriate.


    *   `textFieldGMonth`

    *   `textFieldGDay`

    *   `textFieldGYear`

    *   `textFieldHMonth`

    *   `textFieldHDay`

    *   `textFieldHYear`


    The “G” and “H” in these property names refer to whether the given `UITextField`
    is on the Gregorian or Hebrew side of the application.


    You do not need to connect the `UIButton`s to outlets, but make sure they are
    connected to respective actions `-convertToHebrew:` and `-convertToGregorian:`.


    Always keep in mind that whenever you are dealing with an application that takes
    user input, such as the `UITextField`s here, there is always a possibility of
    a keyboard popping up and covering the bottom half of your screen. Plan your design
    accordingly by placing all `UITextField`s in the upper half of the view!


    In order to better control all these `UITextField`s, you will need to make your
    view controller the delegate for them all. First, add `<UITextFieldDelegate>`
    to your controller''s header line, so that it now looks like so:


    `@interface MainViewController : UIViewController <UITextFieldDelegate>`


    Next, you will set all the `UITextField` delegates to your view controller by
    adding the following code to your `-viewDidLoad` method:


    `for (UITextField *field in self.view.subviews)`

    `    {`

    `        if ([field respondsToSelector:@selector(setDelegate:)])`

    `        {`

    `            field.delegate = self;`

    `        }`

    `    }`


    In this `for` loop, the `-respondsToSelector:` method call is necessary, otherwise
    your application will throw an `NSException`. In general, this is a fairly good
    method to use whenever you are dealing with the possibility of multiple types
    of objects in an array.


    Next, define the `UITextFieldDelegate` method `-textFieldShouldReturn:` to properly
    dismiss the keyboard.


    `-(BOOL)textFieldShouldReturn:(UITextField *)textField`

    `{`

    `    [textField resignFirstResponder];`

    `    return NO;`

    `}`


    The first new class that you will see here is the `NSCalendar` class. This is
    essentially used to set a standard for the dates that you will later refer to.
    The `NSCalendar` method also allows you to perform several useful functions dealing
    with a calendar, such as changing which day a week starts on, or changing the
    time zone used. The `NSCalendar` class also acts as a bridge between the `NSDate`
    and `NSDateComponents` classes that you will see later.


    You will be using two instances of the `NSCalendar` class in order to translate
    dates from the Gregorian calendar to the Hebrew calendar. You will make these
    properties of your class.


    `@property (nonatomic, strong) NSCalendar *gregorianCalendar;`

    `@property (nonatomic, strong) NSCalendar *hebrewCalendar;`


    Go ahead and synthesize these two properties as you would any other property.
    You will, however, need to implement custom implementations of the getter methods
    for each of these properties.


    `-(NSCalendar *)gregorianCalendar`

    `{`

    `    if (!gregorianCalendar)`

    `    {`

    `        gregorianCalendar = [[NSCalendar alloc]`

    `initWithCalendarIdentifier:NSGregorianCalendar];`

    `    }`

    `    return gregorianCalendar;`

    `}`


    `-(NSCalendar *)hebrewCalendar`

    `{`

    `    if (!hebrewCalendar)`

    `    {`

    `        hebrewCalendar = [[NSCalendar alloc]`

    `initWithCalendarIdentifier:NSHebrewCalendar];`

    `    }`

    `    return hebrewCalendar;`

    `}`


    These method overrides are necessary in order to make sure that your calendars
    are initialized with their correct calendar types. Alternatively, you could simply
    initialize your calendars in your `-viewDidLoad` method to be created when the
    app launches.


    There are a large variety of different calendar types that are available for use,
    including but not limited to the following:


    *   `NSBuddhistCalendar`

    *   `NSIslamicCalendar`

    *   `NSJapaneseCalendar`


    Given the immense multicultural nature of today''s technological world, you may
    find it quite necessary to make use of some of these calendars! Consult the Apple
    documentation for a full list of possible calendar types.


    Now that your setup is done, you can implement your conversion method, starting
    with the conversion from Gregorian to Hebrew.


    `-(void)convertToGregorian:(id)sender`

    `{`

    `    NSDateComponents *hComponents = [[NSDateComponents alloc] init];`

    `    [hComponents setDay:[self.textFieldHDay.text integerValue]];`

    `    [hComponents setMonth:[self.textFieldHMonth.text integerValue]];`


    `    [hComponents setYear:[self.textFieldHYear.text integerValue]];`


    `    NSDate *hebrewDate = [self.hebrewCalendar dateFromComponents:hComponents];`


    `    NSUInteger unitFlags = NSDayCalendarUnit | NSMonthCalendarUnit |`

    `    NSYearCalendarUnit;`


    `    NSDateComponents *hebrewDateComponents = [self.gregorianCalendar`

    `components:unitFlags fromDate:hebrewDate];`


    `    self.textFieldGDay.text = [[NSNumber numberWithInteger:hebrewDateComponents.day]`

    `stringValue];`

    `    self.textFieldGMonth.text = [[NSNumber numberWithInteger:hebrewDateComponents.month]`

    `stringValue];`

    `    self.textFieldGYear.text = [[NSNumber numberWithInteger:hebrewDateComponents.year]`

    `stringValue];`

    `}`


    As you can see, you are using a combination of `NSDateComponents`, `NSDate`, and
    `NSCalendar` to perform this conversion.


    The `NSDateComponents` class is used to define the details that make up an `NSDate`,
    such as the day, month, year, time, etc. Here, only the month, day, and year are
    being specified.


    As mentioned earlier, you use an instance of the `NSCalendar` to create an instance
    of `NSDate` out of the components that you have defined.


    One of the more confusing parts of this method is the use of the `NSUInteger`
    `unitFlags`, which is formatted quite unusually. Whenever you specify creating
    an instance of `NSDateComponents` out of an `NSDate`, you need to specify exactly
    which components to include from the date. You can specify these flags, called
    `NSCalendarUnit`s, through the use of the `NSUInteger`, as shown.


    Other types of `NSCalendarUnit`s include the following, among many others:


    *   `NSSecondCalendarUnit`

    *   `NSWeekOfYearCalendarUnit`

    *   `NSEraCalendarUnit`

    *   `NSTimeZoneCalendarUnit`


    As you can see, the specificity with which you can create instances of `NSDate`
    is highly customizable, allowing you to perform unique calculations and comparisons.
    For a full list of `NSCalendarUnit` values, refer to the `NSCalendar` class reference
    in Apple''s developer API.


    Since the values of `NSDateComponents` are of type `NSInteger`, you must first
    convert them to instances of `NSNumber`, and then take their `-stringValue` before
    you set them into your text fields.


    Once you have defined your conversion from one calendar to the other, the reverse
    is incredibly simple, as you just need to change which text fields and calendar
    you use.'
  trans: "\n### 配方 8-1：使用 `NSCalendar` 和 `NSDate`\n\n许多不同的应用常常用于基于时间和日期的计算。这可能涉及从日历转换、待办事项列表排序，到告知用户闹钟响起前还剩多少时间等各种场景。为了使用更复杂的基于事件的用户界面，你必须扎实掌握更基础的\
    \ `NSDate` 相关 API。在这里，你将通过实现一个简单的应用程序，演示如何利用 `NSDate`、`NSCalendar` 和 `NSDateComponents`\
    \ 类，将流行的公历日期转换为希伯来历日期。\n\n创建一个名为 `Chapter8Recipe1` 的新项目，类前缀设为 `Main`，并使用“单视图应用”模板。你不需要使用任何额外的框架。切换到你的视图控制器的\
    \ XIB 文件。将 XIB 文件设置为类似于图 8-1 所示的样子。\n\n![图片](img/9781430240051_Fig08-01.jpg)\n\
    \n**图 8-1.** *日历转换的用户界面*\n\n你需要设置代表每个 `UITextField` 的属性。视图设置完成后，使用如下适当的属性名将每个\
    \ `UITextField` 连接到你的头文件。\n\n- `textFieldGMonth`\n- `textFieldGDay`\n- `textFieldGYear`\n\
    - `textFieldHMonth`\n- `textFieldHDay`\n- `textFieldHYear`\n\n这些属性名中的 `G` 和 `H`\
    \ 分别指代给定的 `UITextField` 位于应用的公历侧还是希伯来历侧。\n\n你不需要将 `UIButton` 连接到输出口，但请确保它们分别连接到对应的操作\
    \ `-convertToHebrew:` 和 `-convertToGregorian:`。\n\n请始终牢记，当你处理接受用户输入的应用（例如这里的 `UITextField`）时，键盘总有可能弹出并覆盖屏幕的下半部分。因此，请将布局规划好，将所有\
    \ `UITextField` 放置在视图的上半部分！\n\n为了更好地控制所有这些 `UITextField`，你需要让你的视图控制器成为它们的代理。首先，将\
    \ `<UITextFieldDelegate>` 添加到控制器的头文件行中，使其现在看起来像这样：\n\n```\n@interface MainViewController\
    \ : UIViewController <UITextFieldDelegate>\n```\n\n接下来，通过将以下代码添加到你的 `-viewDidLoad`\
    \ 方法中，将所有 `UITextField` 的代理设置为你的视图控制器：\n\n```\nfor (UITextField *field in self.view.subviews)\n\
    {\n    if ([field respondsToSelector:@selector(setDelegate:)])\n    {\n      \
    \  field.delegate = self;\n    }\n}\n```\n\n在这个 `for` 循环中，调用 `-respondsToSelector:`\
    \ 方法是必要的，否则你的应用会抛出一个 `NSException`。通常，当你处理数组中可能出现多种类型对象的情况时，这是一个相当不错的方法。\n\n接下来，定义\
    \ `UITextFieldDelegate` 方法 `-textFieldShouldReturn:`，以便正常关闭键盘。\n\n```\n-(BOOL)textFieldShouldReturn:(UITextField\
    \ *)textField\n{\n    [textField resignFirstResponder];\n    return NO;\n}\n```\n\
    \n你将在这里看到的第一个新类是 `NSCalendar`。它主要用于为你稍后引用的日期设定一个标准。`NSCalendar` 方法还允许你执行几个处理日历的有用功能，例如更改一周从哪一天开始，或更改使用的时区。`NSCalendar`\
    \ 类也充当了你稍后将看到的 `NSDate` 和 `NSDateComponents` 类之间的桥梁。\n\n你将使用 `NSCalendar` 类的两个实例来将日期从公历转换为希伯来历。你将把它们设为类的属性。\n\
    \n```\n@property (nonatomic, strong) NSCalendar *gregorianCalendar;\n@property\
    \ (nonatomic, strong) NSCalendar *hebrewCalendar;\n```\n\n像处理其他属性一样，继续为这两个属性添加\
    \ `@synthesize`。不过，你需要为每个属性的 getter 方法提供自定义实现。\n\n```\n-(NSCalendar *)gregorianCalendar\n\
    {\n    if (!gregorianCalendar)\n    {\n        gregorianCalendar = [[NSCalendar\
    \ alloc]\ninitWithCalendarIdentifier:NSGregorianCalendar];\n    }\n    return\
    \ gregorianCalendar;\n}\n\n-(NSCalendar *)hebrewCalendar\n{\n    if (!hebrewCalendar)\n\
    \    {\n        hebrewCalendar = [[NSCalendar alloc]\ninitWithCalendarIdentifier:NSHebrewCalendar];\n\
    \    }\n    return hebrewCalendar;\n}\n```\n\n这些方法重写是必要的，以确保你的日历以其正确的日历类型进行初始化。或者，你也可以简单地在\
    \ `-viewDidLoad` 方法中初始化你的日历，使其在应用启动时创建。\n\n有大量不同的日历类型可供使用，包括但不限于以下几种：\n\n- `NSBuddhistCalendar`\n\
    - `NSIslamicCalendar`\n- `NSJapaneseCalendar`\n\n鉴于当今技术世界巨大的多元文化特性，你可能会发现非常有必要使用其中一些日历！请查阅\
    \ Apple 文档以获取所有可能的日历类型的完整列表。\n\n现在，设置工作已经完成，你可以开始实现转换方法了，首先从公历到希伯来历的转换开始。\n\n\
    ```\n-(void)convertToGregorian:(id)sender\n{\n    NSDateComponents *hComponents\
    \ = [[NSDateComponents alloc] init];\n    [hComponents setDay:[self.textFieldHDay.text\
    \ integerValue]];\n    [hComponents setMonth:[self.textFieldHMonth.text integerValue]];\n\
    \n    [hComponents setYear:[self.textFieldHYear.text integerValue]];\n\n    NSDate\
    \ *hebrewDate = [self.hebrewCalendar dateFromComponents:hComponents];\n\n    NSUInteger\
    \ unitFlags = NSDayCalendarUnit | NSMonthCalendarUnit |\n    NSYearCalendarUnit;\n\
    \n    NSDateComponents *hebrewDateComponents = [self.gregorianCalendar\ncomponents:unitFlags\
    \ fromDate:hebrewDate];\n\n    self.textFieldGDay.text = [[NSNumber numberWithInteger:hebrewDateComponents.day]\n\
    stringValue];\n    self.textFieldGMonth.text = [[NSNumber numberWithInteger:hebrewDateComponents.month]\n\
    stringValue];\n    self.textFieldGYear.text = [[NSNumber numberWithInteger:hebrewDateComponents.year]\n\
    stringValue];\n}\n```\n\n如你所见，你结合使用了 `NSDateComponents`、`NSDate` 和 `NSCalendar`\
    \ 来执行此转换。\n\n`NSDateComponents` 类用于定义构成 `NSDate` 的详细信息，例如日、月、年、时间等。这里只指定了月、日和年。\n\
    \n如前所述，你使用 `NSCalendar` 的一个实例，根据已定义的组件来创建 `NSDate` 的一个实例。\n\n此方法中较为令人困惑的部分之一是使用\
    \ `NSUInteger` `unitFlags`，其格式非常特殊。每当你指定基于一个 `NSDate` 创建 `NSDateComponents` 实例时，都需要精确指定要从该日期中包含哪些组件。你可以像示例所示，通过\
    \ `NSUInteger` 来指定这些标志，这些标志被称为 `NSCalendarUnit`。\n\n其他类型的 `NSCalendarUnit` 包括以下内容（以及许多其他内容）：\n\
    \n- `NSSecondCalendarUnit`\n- `NSWeekOfYearCalendarUnit`\n- `NSEraCalendarUnit`\n\
    - `NSTimeZoneCalendarUnit`\n\n如你所见，创建 `NSDate` 实例时的具体程度具有高度可定制性，这使你能够执行独特的计算和比较。有关\
    \ `NSCalendarUnit` 值的完整列表，请参阅 Apple 开发者 API 中的 `NSCalendar` 类参考。\n\n由于 `NSDateComponents`\
    \ 的值是 `NSInteger` 类型，在将它们设置到文本字段之前，必须先将它们转换为 `NSNumber` 实例，然后获取它们的 `-stringValue`。\n\
    \n一旦你定义了一个日历到另一个日历的转换，反向转换就非常简单了，你只需要更改所使用的文本字段和日历即可。\n"
