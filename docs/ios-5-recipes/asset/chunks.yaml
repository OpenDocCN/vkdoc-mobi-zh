    \ Storage Recipes) and 11 (Core Data Recipes).\n\n![Image](images/9781430240051_Fig02-68.jpg)\n\
    \n**Figure 2–68.** *New application’s views after the latest changes*\n\n### Adding\
    \ a Storyboard to an Existing Project\n\nYou’ve created this “About Us” app, which\
    \ works well, but it is pretty unimpressive on its own. It is meant to be included\
    \ in your other apps so that you can easily show information about your company\
    \ in any of your apps and also cross-promote your app library easily.\n\nApple\
    \ has provided an API for storyboards so that they can easily be included in existing\
    \ apps that may not leverage storyboards yet. The `UIStoryboard` class provides\
    \ the method `+storyboardWithName:bundle:` that will load a storyboard with the\
    \ given name. You can then load the initial view controller in the storyboard\
    \ with the method `– instantiateInitialViewController`.\n\nLet’s create a new\
    \ project called “Chapter2Project” without storyboards. Use the menu option **File**\
    \ ![Image](images/U001.jpg) **New** ![Image](images/U001.jpg) **New Project…**\
    \ to create a new single view application. The window in which you do this will\
    \ resemble [Figure 2–69](#Chapter02.html#fig_2_69).\n\n![Image](images/9781430240051_Fig02-69.jpg)\n\
    \n**Figure 2–69.** *Selecting a single view application*\n\nAnd this time, you\
    \ will call the project “Chapter2Project” and make sure that Use Storyboard is\
    \ not selected, just as in [Figure 2–70](#Chapter02.html#fig_2_70). If your version\
    \ of Xcode includes it, make sure the Use Automatic Reference Counting box is\
    \ checked as well. If your version also includes a field for Class Prefix, set\
    \ this to Chapter2Project.\n\n![Image](images/9781430240051_Fig02-70.jpg)\n\n\
    **Figure 2–70.** *Configuring a new project without storyboards*\n\nUsing the\
    \ navigation pane of this new project, create a new group under the project named\
    \ “AboutUsStoryBoard”, the result of which is shown in [Figure 2–71](#Chapter02.html#fig_2_71).\n\
    \n![Image](images/9781430240051_Fig02-71.jpg)\n\n**Figure 2–71.** *Adding a subgroup\
    \ to the project*\n\nNow select `Chapter2ProjectViewController.xib`, and add a\
    \ `UIButton` that will launch your About Us view when you touch it. Your view\
    \ should resemble that shown in [Figure 2–72](#Chapter02.html#fig_2_72).\n\n![Image](images/9781430240051_Fig02-72.jpg)\n\
    \n**Figure 2–72.** *Configured view controller’s interface*\n\nLet’s go ahead\
    \ and connect that About Us button to an `IBAction` by using the Assistant Editor\
    \ and doing a ^-click-drag from the `UIButton` to the `Chapter2ProjectViewController`\
    \ interface file (`.h`). Change the connection type to Action, and enter **showAboutUsView**\
    \ for the Name, as shown in [Figure 2–73](#Chapter02.html#fig_2_73).\n\n![Image](images/9781430240051_Fig02-73.jpg)\n\
    \n**Figure 2–73.** *Configuring the `UIButton`’s action*\n\nBefore you can complete\
    \ that method placeholder, you need to copy your About Us files to this project.\
    \ Switch to the About Us project, and, so you don’t get the About Us storyboard\
    \ confused with any future storyboards you might add to projects, you should rename\
    \ the storyboard. In the project navigator pane, change the name of `MainStoryboard.storyboard`\
