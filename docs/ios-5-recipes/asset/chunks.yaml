  trans: '

    ### 讲述故事


    在 Xcode 4.2 中，除了空项目模板外，所有应用程序模板都提供了 Storyboard。创建新项目时，只需在设置新项目选项时选择“Use storyboard”即可。在本例中，您将把项目命名为
    `"aboutUs"`，如图 2–21 所示。


    ![Image](img/9781430240051_Fig02-21.jpg)


    **图 2–21.** *配置 Storyboard 的使用*


    项目创建后，您会看到 Storyboard 选项已填充在目标摘要（Summary）选项卡中，并且信息（Info）选项卡中增加了一个字段（如图 2–22 和
    2–23 所示），即“主 Storyboard 文件基本名称（Main storyboard file base name）”。


    ![Image](img/9781430240051_Fig02-22.jpg)


    **图 2–22.** *主 Storyboard 信息*


    ![Image](img/9781430240051_Fig02-23.jpg)


    **图 2–23.** *Storyboard 目标设置*


    最后，在项目导航窗格中，您会看到 `MainStoryboard.storyboard` 文件，如图 2–24 所示。点击此文件将其加载到 Interface
    Builder 中，然后开始构建您的 Storyboard。


    ![Image](img/9781430240051_Fig02-24.jpg)


    **图 2–24.** *Storyboard 文件*


    在本示例中，您将构建一个简单的项目来显示您公司的信息。Storyboard 从一个视图开始，该视图由作为项目一部分创建的 `aboutUsViewController`
    控制。我将向该视图中添加一些对象（`UILabel`、`UITextView` 和两个 `UIButton`），使其对用户更具信息性。请参考图 2–25 了解要构建的视图。


    ![Image](img/9781430240051_Fig02-25.jpg)


    **图 2–25.** *`aboutUsViewController` 视图*


    现在，我想将此视图嵌入到导航控制器中，而 Xcode 4.2 使这项任务变得简单。如图 2–26 所示，选中该视图，然后转到菜单选项 **Editor**
    ![Image](img/U001.jpg) **Embed In** ![Image](img/U001.jpg) **Navigation Controller**。这将创建一个导航控制器，将其添加到您的
    Storyboard 中，并在导航视图和您的 `aboutUsView` 之间创建一个 Segue。生成的 Segue 将用一个箭头表示，如图 2–27 所示。


    ![Image](img/9781430240051_Fig02-26.jpg)


    **图 2–26.** *在控制器中嵌入视图*


    ![Image](img/9781430240051_Fig02-27.jpg)


    **图 2–27.** *生成的嵌入视图显示*


    现在，我即将向 Storyboard 中添加一个新的 `UIViewController` 对象，您可以在其中放置您的联系信息。这就像从对象库中拖拽一个 `UIViewController`
    对象以及一个 `UIView` 到 Storyboard 中一样简单。我通过添加一个 `UILabel` 作为标题，然后再添加几个 `UILabel` 用于联系信息来设置视图。图
    2–28 显示了这些添加的结果。


    ![Image](img/9781430240051_Fig02-28.jpg)


    **图 2–28.** *配置好的场景*


    为了将新的联系信息视图连接到“关于我们”视图，您需要点击“关于我们”视图上的“联系我们”`UIButton`，然后 `^-click-drag`（按住 Command
    键并点击拖拽）到联系信息视图。此操作与用于连接 Outlet 和 Action 的操作相同，而您接下来要做的正是如此。您要将“联系我们”按钮连接到 `performSegueWithIdentifier`
    这个 Action。松开鼠标按钮时，会弹出一个对话框，询问您要连接到哪个 Action，您可以选择 `performSegueWithIdentifier:sender`。这些步骤以及生成的
    Segue 如图 2–29 和 2–30 所示。


    ![Image](img/9781430240051_Fig02-29.jpg)


    **图 2–29.** *配置 Segue Action*


    ![Image](img/9781430240051_Fig02-30.jpg)


    **图 2–30.** *执行 Segue 弹出对话框*


    连接建立后，`UINavigationBar` 会自动添加到视图中。如果您为每个视图指定了标题，结果将类似于图 2–31。


    ![Image](img/9781430240051_Fig02-31.jpg)


    **图 2–31.** *通过 Segue 连接好的场景*


    一个好的习惯是为您的 Segue 提供一个标识符（identifier）。如果您最终将多个 Segue 连接到同一个视图，这将有助于使您的应用程序经得起未来考验。您可以检查调用
    Segue 的标识符，以了解用户到达该视图所走的路径并做出相应响应。您可以通过在 Storyboard 中选择 Segue 并检查其检查器窗格中的属性来设置
    Segue 的标识符，如图 2–32 所示。


    ![Image](img/9781430240051_Fig02-32.jpg)


    **图 2–32.** *设置 Segue 标识符*


    如果您现在运行这个应用程序，图 2–33 和 2–34 会向您展示，“联系我们”按钮将正常工作并加载联系信息视图，而无需编写任何代码。


    ![Image](img/9781430240051_Fig02-33.jpg)


    **图 2–33.** *主模拟视图*


    ![Image](img/9781430240051_Fig02-34.jpg)


    **图 2–34.** *已执行的 Segue 结果*


    那另一个按钮“我们的应用”呢？您想创建一个新视图来列出您的其他应用，以便进行一些交叉推广。当我听到“列表”这个词时，我首先想到的是 `UITableViewController`。而
    Storyboarding 将 `UITableViewController` 的便捷性提升到了一个全新的水平。


    我将拖拽一个 `UITableViewController` 到 Storyboard 中，创建一个“应用表格”视图。您首先会注意到，这看起来与 Interface
    Builder 中提供的常规 `UITableViewController` 略有不同。顶部有一些名为“原型单元格（Prototype Cells）”的东西，如图
    2–35 所示。使用 Storyboards，您可以通过称为“原型（prototype）”的方式自定义 `UITableViewCell` 的布局和对象。我们稍后会进一步探讨这个问题。


    ![Image](img/9781430240051_Fig02-35.jpg)


    **图 2–35.** *将 `UITableView` 插入到场景中*


    选中表格视图，然后在属性检查器中，将 Content 从“动态原型（Dynamic Prototypes）”更改为“静态单元格（Static Cells）”。我还将样式改为“分组（Grouped）”，因为我喜欢单元格圆角边框的外观。图
    2–36 和 2–37 展示了这些步骤及其结果。


    ![Image](img/9781430240051_Fig02-36.jpg)


    **图 2–36.** *静态单元格配置*


    ![Image](img/9781430240051_Fig02-37.jpg)


    **图 2–37.** *分组单元格*


    由于每个单元格都将具有相同的布局，我将删除底部两个单元格，以便能够快速复制顶部单元格。现在，我将使用一个 `UIImageView`（用于存放应用图标）和两个
    `UILabel`（用于应用名称和描述）来自定义剩余的单元格，如图 2–38 所示。


    ![Image](img/9781430240051_Fig02-38.jpg)


    **图 2–38.** *自定义单元格*


    现在，选中已按您规格设计好的剩余单元格，然后按住 ![Image](img/U004.jpg) 键并 `-click-drag`（点击拖拽）以在其下方复制。重复此操作，为
    `UITableView` 添加第三行，如图 2–39 所示。


    ![Image](img/9781430240051_Fig02-39.jpg)


    **图 2–39.** *复制单元格*


    现在，您可以自定义 `UITableView` 中的每个图像和标签，以列出您将展示的三个应用，最终得到类似于图 2–40 的视图。


    ![Image](img/9781430240051_Fig02-40.jpg)


    **图 2–40.** *自定义复制的单元格*


    剩下的就是将“关于我们”视图中的按钮连接到这个新视图。选中“关于我们”视图中的按钮，然后 `^-click-drag`（按住 Command 键并点击拖拽）到您刚刚创建的
    `UITableView`。现在，您的 Storyboard 看起来类似于图 2–41 所示。


    ![Image](img/9781430240051_Fig02-41.jpg)


    **图 2–41.** *新连接的表格控制器*

