    If the location service is available, you will need to check the status of the
    control. If it has been set to “on”, you''ll want to check if your `CLLocationManager`
    object has been instantiated. If it hasn''t, you will want to instantiate it and
    set its properties and delegate. For the standard location service, you should
    always set the `desiredAccuracy` and `distanceFilter` properties of the `CLLocationManager`
    object.


    The `desiredAccuracy` property tells the Core Location framework how accurate
    (in meters) you want your location information to be. The accuracy, however, is
    not guaranteed, and the device will try to use the resources available to it to
    get information as close to your desired accuracy as possible. Apple recommends
    being as conservative as possible with this setting. If you don''t need to know
    the street address of the current device, use a higher accuracy setting. There
    are a number of constants available to use for your convenience:


    `kCLLocationAccuracyBestForNavigation`

    `kCLLocationAccuracyBest`

    `kCLLocationAccuracyNearestTenMeters`

    `kCLLocationAccuracyHundredMeters`

    `kCLLocationAccuracyKilometer`

    `kCLLocationAccuracyThreeKilometers`


    As you can see, those constants that specify distances are restricted to the metric
    system. If you are not quite familiar with these distance units, a meter is slightly
    longer than a yard, and a kilometer is just over half (6/10) of a mile.


    The `distanceFilter` property is how far a device has to move (again in meters)
    before you want to be notified (via your delegate) of its new position. The only
    constant provided for this property is `kCLDistanceFilterNone,` which will report
    all changes in location to your delegate.


    One other property that you should always set when using location services is
    the `purpose` property. When the user is prompted to allow your application access
    to his or her location, the string in the `purpose` property is displayed, telling
    the user what you plan to do with his or her device''s location information.


    Once you''ve set the properties and the delegate, you can start the location services
    by calling the `startUpdatingLocation` method on your `CLLocationManager`.


    Stopping the location services is a matter of calling `stopUpdatingLocation` on
    the `CLLocationManager` object. You will want to do this if they flip the `UISwitch`
    to off. After adding code to start and stop your `CLLocationManager`, your action
    method should look like this:


