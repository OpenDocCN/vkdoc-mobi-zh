    ### Recipe 5–4: Adding Overlays to a Map


    Annotations are not the only thing that can be added to a map. Here, you will
    go over how to add overlays to a map, which can take on a variety of shapes, from
    circles to polygons to lines. This recipe will build off of the first recipe in
    this chapter.


    You will be adding two kinds of overlays to your `MapView`, both polygon overlays
    and line overlays. The process to add these is very similar to that of adding
    annotations, but you do not have to create a separate class for the overlays like
    you did with the annotations.


    First, you will implement the `MapView` delegate method to tell your `MapView`
    how to deal with overlays. You will be setting up your method to handle both polygons
    and lines by using the `class` methods to check the type of overlay.


    `-(MKOverlayView *)mapView:(MKMapView *)mapView viewForOverlay:(id )overlay{`

    `    if([overlay isKindOfClass:[MKPolygon class]]){`

    `        MKPolygonView *view = [[MKPolygonView alloc] initWithOverlay:overlay];`


    `        //Display settings`

    `        view.lineWidth=1;`

    `        view.strokeColor=[UIColor blueColor];`

    `        view.fillColor=[[UIColor blueColor] colorWithAlphaComponent:0.5];`

    `        return view;`

    `    }`

    `    else if ([overlay isKindOfClass:[MKPolyline class]])`

    `    {`

    `        MKPolylineView *view = [[MKPolylineView alloc] initWithOverlay:overlay];`


    `        //Display settings`

    `        view.lineWidth = 3;`

    `        view.strokeColor = [UIColor blueColor];`

    `        return view;`

    `    }`

    `    return nil;`

    `}`


    Now you just need to create your overlays and add them to the `MapView` by adding
    the following code to `-viewDidLoad`.


    `//Create and Add Overlays`

    `    NSMutableArray *overlays = [[NSMutableArray alloc] initWithCapacity:2];`

    `    CLLocationCoordinate2D polyCoords[5]={`

    `        CLLocationCoordinate2DMake(39.9, -76.6),`

    `        CLLocationCoordinate2DMake(36.7, -84.0),`

    `        CLLocationCoordinate2DMake(33.1, -89.4),`

    `        CLLocationCoordinate2DMake(27.3, -80.8),`

    `        CLLocationCoordinate2DMake(39.9, -76.6)`

    `    };`

    `    MKPolygon *Poly = [MKPolygon polygonWithCoordinates:polyCoords count:5];`

    `    [overlays addObject:Poly];`

    `    CLLocationCoordinate2D pathCoords[2] = {`

    `        CLLocationCoordinate2DMake(46.8, -100.8),`

    `        CLLocationCoordinate2DMake(43.7, -70.4)`

    `    };`

    `    MKPolyline *pathLine = [MKPolyline polylineWithCoordinates:pathCoords count:2];`

    `    [overlays addObject:pathLine];`

    `    [self.mapViewUserMap addOverlays:overlays];`


    **CAUTION:** When making `MKPolygon`s, your last coordinate point should be the
    same as your first one. If not, you will have issues getting the correct shapes.


    When you run the app now, you should see the screen in [Figure 5–23](#Chapter05.html#fig_5_23)
    when you zoom out on the map. You will also notice the polygon and line that we''ve
    set up are rather strange in shape and location, as they are simply meant to demonstrate
    what you can do with overlays on a `MapView`.


    ![Image](images/9781430240051_Fig05-23.jpg)


    **Figure 5–23.** *Map with geometric and path overlays*


    Overlays are incredibly useful in Map Kit apps, and can also be very easily customized.
    Most of the properties such as color or line width can be changed, allowing you
    to fully customize how your app looks and acts. Overlays can also be created from
    circles, as well as other user-defined shapes. Refer to the Apple documentation
    for details on how to use any of these other functions.'
  trans: "\n最后，你准备在主导航视图控制器中实现地图的委托方法。在这个方法中，你将创建 `DetailViewController` 并为其提供必要的文本，将其设置为仅执行部分卷曲过渡，然后展示它。使用\
    \ `#import \"DetailViewController.h\"` 正确导入头文件后，你的方法实现将如下所示：\n\n```\n-(void)mapView:(MKMapView\
    \ *)mapView annotationView:(MKAnnotationView *)view\ncalloutAccessoryControlTapped:(UIControl\
    \ *)control\n{\n    MyAnnotation *ann = view.annotation;\n    DetailViewController\
    \ *dvc = [[DetailViewController alloc] initWithTitle:ann.title\nsubtitle:ann.subtitle];\n\
    \    dvc.modalTransitionStyle = UIModalTransitionStylePartialCurl;\n    [self\
    \ presentViewController:dvc animated:YES completion:^{}];\n}\n```\n\n**注意：** 必须将变量\
    \ `ann` 声明为 `MyAnnotation` 的实例，以确保编译器知道你正在获取的标注将具有你请求的 `.title` 和 `.subtitle`\
    \ 属性。\n\n添加此代码后，当点击详情披露按钮时，你的应用程序应类似于图 5–22。\n\n![Image](img/9781430240051_Fig05-22.jpg)\n\
    \n**图 5–22.** *应用程序响应点击标注气泡*\n\n### 食谱 5–4：向地图添加覆盖层\n\n标注并非唯一能添加到地图上的内容。本食谱将介绍如何向地图添加覆盖层，这些覆盖层可以呈现多种形状，从圆形到多边形再到线条。本食谱将基于本章的第一个食谱进行扩展。\n\
    \n你将为你的 `MapView` 添加两种类型的覆盖层：多边形覆盖层和线条覆盖层。添加这些覆盖层的过程与添加标注非常相似，但你不必像处理标注那样为覆盖层创建单独的类。\n\
    \n首先，你将实现 `MapView` 的委托方法，以告诉你的 `MapView` 如何处理覆盖层。你将设置方法，通过使用 `class` 方法来检查覆盖层的类型，从而处理多边形和线条。\n\
    \n```\n-(MKOverlayView *)mapView:(MKMapView *)mapView viewForOverlay:(id )overlay{\n\
    \    if([overlay isKindOfClass:[MKPolygon class]]){\n        MKPolygonView *view\
    \ = [[MKPolygonView alloc] initWithOverlay:overlay];\n\n        //显示设置\n     \
    \   view.lineWidth=1;\n        view.strokeColor=[UIColor blueColor];\n       \
    \ view.fillColor=[[UIColor blueColor] colorWithAlphaComponent:0.5];\n        return\
    \ view;\n    }\n    else if ([overlay isKindOfClass:[MKPolyline class]])\n   \
    \ {\n        MKPolylineView *view = [[MKPolylineView alloc] initWithOverlay:overlay];\n\
    \n        //显示设置\n        view.lineWidth = 3;\n        view.strokeColor = [UIColor\
    \ blueColor];\n        return view;\n    }\n    return nil;\n}\n```\n\n现在，你只需创建覆盖层并将它们添加到\
    \ `MapView` 中，通过将以下代码添加到 `-viewDidLoad` 中。\n\n```\n//创建并添加覆盖层\n    NSMutableArray\
    \ *overlays = [[NSMutableArray alloc] initWithCapacity:2];\n    CLLocationCoordinate2D\
    \ polyCoords[5]={\n        CLLocationCoordinate2DMake(39.9, -76.6),\n        CLLocationCoordinate2DMake(36.7,\
    \ -84.0),\n        CLLocationCoordinate2DMake(33.1, -89.4),\n        CLLocationCoordinate2DMake(27.3,\
    \ -80.8),\n        CLLocationCoordinate2DMake(39.9, -76.6)\n    };\n    MKPolygon\
    \ *Poly = [MKPolygon polygonWithCoordinates:polyCoords count:5];\n    [overlays\
    \ addObject:Poly];\n    CLLocationCoordinate2D pathCoords[2] = {\n        CLLocationCoordinate2DMake(46.8,\
    \ -100.8),\n        CLLocationCoordinate2DMake(43.7, -70.4)\n    };\n    MKPolyline\
    \ *pathLine = [MKPolyline polylineWithCoordinates:pathCoords count:2];\n    [overlays\
    \ addObject:pathLine];\n    [self.mapViewUserMap addOverlays:overlays];\n```\n\
    \n**警告：** 在创建 `MKPolygon` 时，你的最后一个坐标点应与第一个坐标点相同。否则，你将无法获得正确的形状。\n\n现在运行应用程序，当你缩小地图时，应该会看到图\
    \ 5–23 中的画面。你还会注意到，我们设置的多边形和线条在形状和位置上相当奇怪，因为这仅仅是为了演示你在 `MapView` 上可以使用覆盖层做些什么。\n\
    \n![Image](img/9781430240051_Fig05-23.jpg)\n\n**图 5–23.** *带有几何图形和路径覆盖层的地图*\n\n\
    覆盖层在 Map Kit 应用中非常有用，而且也非常容易自定义。大多数属性（例如颜色或线宽）都可以更改，从而允许你完全自定义应用的外观和行为。覆盖层也可以通过圆形以及其他用户定义的形状来创建。有关如何使用这些其他功能的详细信息，请参考\
    \ Apple 文档。\n"
- fmt: "### Recipe 5–5: Grouping Annotations by Location\n\nA common issue when using\
    \ annotations on a map view is the possibility of having very large numbers of\
    \ annotations very close to each other, cluttering up the screen and making the\
    \ application difficult to use. The solution is to group annotations together\
    \ based on location and the size of the visible map. You will use a simple algorithm\
    \ that compares location coordinates every time the visible region changes.\n\n\
    First, you need to create your project, naming it “HotspotMap”, with a class prefix\
    \ of “CSD”, add the `Map Kit` and `Core Location`, and be sure to import them\
    \ into your classes. Refer to Recipe 5–1 in this chapter for details on how to\
    \ do this.\n\nAs is necessary when adding annotations to a map (see Recipe 5–2),\
    \ you need to create a subclass of `NSObject` that conforms to the `MKAnnotation`\
    \ protocol. Create the class by making a new file, choosing “Objective-C class”,\
    \ and making sure it is a subclass of `NSObject`. You will call your class “`Hotspot`”,\
    \ as shown in [Figure 5–24](#Chapter05.html#fig_5_24).\n\n![Image](images/9781430240051_Fig05-24.jpg)\n\
    \n**Figure 5–24.** *Configuring the `Hotspot` class*\n\nYou will define your class\
    \ with a few different properties. Since it conforms to the `MKAnnotation` protocol,\
    \ you will need a `coordinate`, as well as two `NSString`s, a `title`, and a `subtitle`.\
    \ You will also need a designated initialization method in order to create your\
    \ annotations with coordinates. You will define these in your header file, like\
    \ so:\n\n```objc\n#import <Foundation/Foundation.h>\n#import <MapKit/MapKit.h>\n\
    #import <CoreLocation/CoreLocation.h>\n\n@interface Hotspot : NSObject <MKAnnotation>\n\
    \n@property (nonatomic) CLLocationCoordinate2D coordinate;\n@property (nonatomic,\
    \ copy) NSString *title;\n@property (nonatomic, copy) NSString *subtitle;\n-(id)initWithCoordinate:(CLLocationCoordinate2D)\
    \ c;\n\n@end\n```\n\n**NOTE:** Pay close attention to the import statements in\
    \ this code, as well as the protocol directive `<MKAnnotation>` in the interface\
    \ header. Without these, your app will not run correctly.\n\nNow you simply need\
    \ to synthesize these properties and implement your initialization method in your\
    \ `.m` file, like so:\n\n```objc\n@synthesize coordinate, title, subtitle;\n-(id)initWithCoordinate:(CLLocationCoordinate2D)\
    \ c\n{\n    self=[super init];\n    if(self){\n        coordinate = c;\n    }\n\
    \    return self;\n}\n```\n\nNext, you will move over to your view controller.\
    \ The first thing to do is put your `MapView` in using Interface Builder, and\
    \ link it over to your header file. In this example, I have named your `MKMapView`\
    \ “mapViewUserMap”. (Refer to Recipe 5–1 in this chapter on how to do this.) Also\
    \ be sure to set your `MapView`'s delegate to your view controller in `-viewDidLoad`,\
    \ with the following line of code:\n\n```objc\nself.mapViewUserMap.delegate =\
    \ self;\n```\n\nYou will also need a few helper variables throughout your program.\
    \ First, you need a variable of type `CLLocationDegrees`, with which you will\
    \ keep track of your current zoom level. Second, you will need a mutable array\
    \ property, which you will use to hold all of your hotspots. Your header file\
    \ will look something like this:\n\n```objc\n#import <UIKit/UIKit.h>\n#import\
    \ <MapKit/MapKit.h>\n\n#import \"Hotspot.h\"\n\n@interface CSDViewController :\
    \ UIViewController <MKMapViewDelegate>\n{\n    MKMapView *mapViewUserMap;\n  \
    \  CLLocationDegrees zoom;\n}\n\n@property (strong, nonatomic) IBOutlet MKMapView\
    \ *mapViewUserMap;\n@property (strong, nonatomic) NSMutableArray *places;\n@end\n\
    ```\n\nNext, in your implementation file, after synthesizing your `places` property,\
    \ you'll define a few constants that will set up your starting coordinates and\
    \ grouping parameters. These will also be used to help generate some random locations\
    \ for demonstration purposes. Place the following statements before your import\
    \ statements in the `.m` file.\n\n```objc\n#define centerLat  39.2953\n#define\
    \ centerLong -76.614\n#define spanDeltaLat    4.9\n#define spanDeltaLong   5.8\n\
    #define scaleLat   9.0\n#define scaleLong   11.0\n```\n\nBefore you get any further,\
    \ you need to remember a very important aspect of dealing with `NSArray`s as properties,\
    \ in that they do not automatically allocate or initialize themselves in their\
    \ synthesized accessor method. You will need to define your own accessor method\
    \ in order to lazily instantiate the array. Since you will be making 1,000 testing\
    \ locations soon, you will give the array an initial capacity of 1,000, like so:\n\
    \n```objc\n-(NSMutableArray *)places\n{\n    if (!places)\n    {\n        places\
    \ = [[NSMutableArray alloc] initWithCapacity:1000];\n    }\n    return places;\n\
    }\n```\n\nNext, you will need some testing data. The following two methods will\
    \ generate a good 1,000 hotspots for you to use, all within fairly close proximity\
    \ to each other, so that you can see what kind of issue you are working with.\n\
    \n```objc\n-(float)RandomFloatStart:(float)a end:(float)b\n{\n    float random\
    \ = ((float) rand()) / (float) RAND_MAX;\n    float diff = b - a;\n    float r\
    \ = random * diff;\n    return a + r;\n}\n-(void)loadDummyPlaces\n{\n    srand((unsigned)time(0));\n\
    \n    for (int i=0; i<1000; i++)\n    {\n        Hotspot *place=[[Hotspot alloc]\n\
    initWithCoordinate:CLLocationCoordinate2DMake([self RandomFloatStart:37.0\nend:42.0],[self\
    \ RandomFloatStart:-72.0 end:-79.0])];\n        place.title = [NSString stringWithFormat:@\"\
    Place %d title\",i];\n        place.subtitle = [NSString stringWithFormat:@\"\
    Place %d subtitle\",i];\n        [self.places addObject:place];\n    }\n}\n```\n\
    \nNow that you have your testing data, you'll make sure your `-viewDidLoad` method\
    \ is all set up to do what you need. It should look like so:\n\n```objc\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    self.mapViewUserMap.delegate = self;\n    [self\
    \ loadDummyPlaces];\n    [self.mapViewUserMap addAnnotations:self.places]; //For\
    \ setup purposes only. This\nline will be unnecessary        when grouping is\
    \ implemented.\n    CLLocationCoordinate2D centerPoint = {centerLat, centerLong};\n\
    \        MKCoordinateSpan coordinateSpan = MKCoordinateSpanMake(spanDeltaLat,\n\
    spanDeltaLong);\n        MKCoordinateRegion coordinateRegion = MKCoordinateRegionMake(centerPoint,\n\
    coordinateSpan);\n\n        [self.mapViewUserMap setRegion:coordinateRegion];\n\
    \        [self.mapViewUserMap regionThatFits:coordinateRegion];\n}\n```\n\nBefore\
    \ you finish up your initial setup, you'll jump down to your `-viewDidUnload`\
    \ method and add in a few lines to keep your memory clean. The following two lines\
    \ will help recycle memory if you ever want to use this class in a larger application\
    \ later.\n\n```objc\n[self.places removeAllObjects];\nself.places = nil;\n```\n\
    \nFinally, you will need to implement your map's `viewForAnnotation` method so\
    \ that you can correctly display your pins. This is very similar to your previous\
    \ recipe, as shown here:\n\n```objc\n- (MKAnnotationView *)mapView:(MKMapView\
    \ *)mV viewForAnnotation:(id\n<MKAnnotation>)annotation{\n\n    // if it's the\
    \ user location, just return nil.\n    if ([annotation isKindOfClass:[MKUserLocation\
    \ class]]){\n        return nil;\n    }\n        else{\n        static NSString\
    \ *StartPinIdentifier = @\"PinIdentifier\";\n        MKPinAnnotationView *startPin\
    \ = (id)[mV\ndequeueReusableAnnotationViewWithIdentifier:StartPinIdentifier];\n\
    \                if (startPin == nil) {\n            startPin = [[MKPinAnnotationView\
    \ alloc] initWithAnnotation:annotation\nreuseIdentifier:StartPinIdentifier];\n\
    \        }\n        startPin.canShowCallout = YES;\n        return startPin;\n\
    \        }\n}\n```\n\nAt this point, if you run the application, you should see\
    \ a view resembling [Figure 5–25](#Chapter05.html#fig_5_25), a perfect illustration\
    \ of the problem you are trying to solve. Now that you have your test data set\
    \ up, you will work on implementing the solution.\n\n![Image](images/9781430240051_Fig05-25.jpg)"
  raw: '### Recipe 5–5: Grouping Annotations by Location


    A common issue when it comes to using annotations on a map view is the possibility
    of having very large numbers of annotations very close to each other, cluttering
    up the screen and making the application difficult to use. The solution is to
    group annotations together based on location and the size of the visible map.
    You will use a simple algorithm that compares location coordinates every time
    the visible region changes.


    First, you need to create your project, naming it “HotspotMap”, with a class prefix
    of “CSD”, add the Map Kit and Core Location, and be sure to import them into your
    classes. Refer to Recipe 5–1 in this chapter for details on how to do this.


    As is necessary when adding annotations to a map (see Recipe 5–2), you need to
    create a subclass of `NSObject` that conforms to the `MKAnnotation` protocol.
    Create the class by making a new file, choosing “Objective-C class”, and making
    sure it is a subclass of `NSObject`. You will call your class “`Hotspot`”, as
    shown in [Figure 5–24](#Chapter05.html#fig_5_24).


    ![Image](images/9781430240051_Fig05-24.jpg)


    **Figure 5–24.** *Configuring the `Hotspot` class*


    You will define your class with a few different properties. Since it is conforming
    to the `MKAnnotation` protocol, you will need a `coordinate`, as well as two `NSString`s,
    a `title`, and a `subtitle`**.** You will also need a designated initialization
    method in order to create your annotations with coordinates. You will define these
    in your header file, like so:


    `#import <Foundation/Foundation.h>`

    `#import <MapKit/MapKit.h>`

    `#import <CoreLocation/CoreLocation.h>`


    `@interface Hotspot : NSObject <MKAnnotation>`


    `@property (nonatomic) CLLocationCoordinate2D coordinate;`

    `@property (nonatomic, copy) NSString *title;`

    `@property (nonatomic, copy) NSString *subtitle;`

    `-(id)initWithCoordinate:(CLLocationCoordinate2D) c;`


    `@end`


    **NOTE:** Pay close attention to the import statements in this code, as well as
    the protocol directive `<MKAnnotation>` in the interface header. Without these,
    your app will not run correctly.


    Now you simply need to synthesize these properties and implement your initialization
    method in your `.m` file, like so:


    `@synthesize coordinate, title, subtitle;`

    `-(id)initWithCoordinate:(CLLocationCoordinate2D) c`

    `{`

    `    self=[super init];`

    `    if(self){`

    `        coordinate = c;`

    `    }`

    `    return self;`

    `}`


    Next, you will move over to your view controller. The first thing to do is put
    your `MapView` in using Interface Builder, and link it over to your header file.
    In this example, I have named your `MKMapView` “mapViewUserMap”. (Refer to Recipe
    5–1 in this chapter on how to do this.) Also be sure to set your `MapView`''s
    delegate to your view controller in `-viewDidLoad`, with the following line of
    code:


    `self.mapViewUserMap.delegate = self;`


    You will also need a few helper variables throughout your program. First, you
    need a variable of type `CLLocationDegrees`, with which you will keep track of
    your current zoom level. Second, you will need a mutable array property, which
    you will use to hold all of your hotspots. Your header file will look something
    like this:


    `#import <UIKit/UIKit.h>`

    `#import <MapKit/MapKit.h>`


    `#import "Hotspot.h"`


    `@interface CSDViewController : UIViewController <MKMapViewDelegate>`

    `{`

    `    MKMapView *mapViewUserMap;`

    `    CLLocationDegrees zoom;`

    `}`


    `@property (strong, nonatomic) IBOutlet MKMapView *mapViewUserMap;`

    `@property (strong, nonatomic) NSMutableArray *places;`

    `@end`


    Next, in your implementation file, after synthesizing your `places` property,
    you''ll define a few constants that will set up your starting coordinates and
    grouping parameters. These will also be used to help generate some random locations
    for demonstration purposes. Place the following statements before your import
    statements in the `.m` file.


    `#define centerLat  39.2953`

    `#define centerLong -76.614`

    `#define spanDeltaLat    4.9`

    `#define spanDeltaLong   5.8`

    `#define scaleLat   9.0`

    `#define scaleLong   11.0`


    Before you get any further, you need to remember a very important aspect of dealing
    with `NSArray`s as properties, in that they do not automatically allocate or initialize
    themselves in their synthesized accessor method. You will need to define your
    own accessor method in order to lazily instantiate the array. Since you will be
    making 1,000 testing locations soon, you will give the array an initial capacity
    of 1,000, like so:


    `-(NSMutableArray *)places`

    `{`

    `    if (!places)`

    `    {`

    `        places = [[NSMutableArray alloc] initWithCapacity:1000];`

    `    }`

    `    return places;`

    `}`


    Next, you will need some testing data. The following two methods will generate
    a good 1,000 hotspots for you to use, all within fairly close proximity to each
    other, so that you can see what kind of issue you are working with.


    `-(float)RandomFloatStart:(float)a end:(float)b`

    `{`

    `    float random = ((float) rand()) / (float) RAND_MAX;`

    `    float diff = b - a;`

    `    float r = random * diff;`

    `    return a + r;`

    `}`

    `-(void)loadDummyPlaces`

    `{`

    `    srand((unsigned)time(0));`


    `    for (int i=0; i<1000; i++)`

    `    {`

    `        Hotspot *place=[[Hotspot alloc]`

    `initWithCoordinate:CLLocationCoordinate2DMake([self RandomFloatStart:37.0`

    `end:42.0],[self RandomFloatStart:-72.0 end:-79.0])];`

    `        place.title = [NSString stringWithFormat:@"Place %d title",i];`

    `        place.subtitle = [NSString stringWithFormat:@"Place %d subtitle",i];`

    `        [self.places addObject:place];`

    `    }`

    `}`


    Now that you have your testing data, you''ll make sure your `-viewDidLoad` method
    is all set up to do what you need. It should look like so:


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `    self.mapViewUserMap.delegate = self;`

    `    [self loadDummyPlaces];`

    `    [self.mapViewUserMap addAnnotations:self.places]; //For setup purposes only.
    This`

    `line will be unnecessary        when grouping is implemented.`

    `    CLLocationCoordinate2D centerPoint = {centerLat, centerLong};`

    `        MKCoordinateSpan coordinateSpan = MKCoordinateSpanMake(spanDeltaLat,`

    `spanDeltaLong);`

    `        MKCoordinateRegion coordinateRegion = MKCoordinateRegionMake(centerPoint,`

    `coordinateSpan);`


    `        [self.mapViewUserMap setRegion:coordinateRegion];`

    `        [self.mapViewUserMap regionThatFits:coordinateRegion];`

    `}`


    Before you finish up your initial setup, you''ll jump down to your `-viewDidUnload`
    method and add in a few lines to keep your memory clean. The following two lines
    will help recycle memory if you ever want to use this class in a larger application
    later.


    `[self.places removeAllObjects];`

    `self.places = nil;`


    Finally, you will need to implement your map''s `viewForAnnotation` method so
    that you can correctly display your pins. This is very similar to your previous
    recipe, as shown here:


    `- (MKAnnotationView *)mapView:(MKMapView *)mV viewForAnnotation:(id`

    `<MKAnnotation>)annotation{`


    `    // if it''s the user location, just return nil.`

    `    if ([annotation isKindOfClass:[MKUserLocation class]]){`

    `        return nil;`

    `    }`

    `        else{`

    `        static NSString *StartPinIdentifier = @"PinIdentifier";`

    `        MKPinAnnotationView *startPin = (id)[mV`

    `dequeueReusableAnnotationViewWithIdentifier:StartPinIdentifier];`

    `                if (startPin == nil) {`

    `            startPin = [[MKPinAnnotationView alloc] initWithAnnotation:annotation`

    `reuseIdentifier:StartPinIdentifier];`

    `        }`

    `        startPin.canShowCallout = YES;`

    `        return startPin;`

    `        }`

    `}`


    At this point, if you run the application, you should see a view resembling [Figure
    5–25](#Chapter05.html#fig_5_25), a perfect illustration of the problem you are
    trying to solve. Now that you have your test data set up, you will work on implementing
    the solution.


    ![Image](images/9781430240051_Fig05-25.jpg)'
  trans: "\n### 方案 5-5：按位置对标注进行分组\n\n在地图视图上使用标注时，一个常见问题是大量标注可能彼此非常接近，导致屏幕杂乱，使应用难以使用。解决方案是基于位置和可见地图的大小对标注进行分组。你将使用一个简单的算法，每次可见区域发生变化时都会比较位置坐标。\n\
    \n首先，你需要创建项目，将其命名为“HotspotMap”，类前缀为“CSD”，添加`Map Kit`和`Core Location`框架，并确保在类中导入它们。有关具体操作步骤，请参考本章的方案\
    \ 5-1。\n\n如同向地图添加标注时所必需的（参见方案 5-2），你需要创建一个遵守`MKAnnotation`协议的`NSObject`子类。通过创建新文件，选择“Objective-C\
    \ class”，并确保它是`NSObject`的子类来创建该类。你将把这个类命名为“`Hotspot`”，如图 5-24 所示。\n\n![Image](img/9781430240051_Fig05-24.jpg)\n\
    \n**图 5-24.** *配置`Hotspot`类*\n\n你将用几个不同的属性来定义你的类。由于它遵守`MKAnnotation`协议，你将需要一个`coordinate`属性，以及两个`NSString`属性：`title`和`subtitle`。你还需要一个指定初始化方法来创建带有坐标的标注。你将在头文件中定义这些内容，如下所示：\n\
    \n```objc\n#import <Foundation/Foundation.h>\n#import <MapKit/MapKit.h>\n#import\
    \ <CoreLocation/CoreLocation.h>\n\n@interface Hotspot : NSObject <MKAnnotation>\n\
    \n@property (nonatomic) CLLocationCoordinate2D coordinate;\n@property (nonatomic,\
    \ copy) NSString *title;\n@property (nonatomic, copy) NSString *subtitle;\n-(id)initWithCoordinate:(CLLocationCoordinate2D)\
    \ c;\n\n@end\n```\n\n**注意：** 请密切关注此代码中的导入语句，以及接口头文件中的协议指令`<MKAnnotation>`。没有这些，你的应用将无法正常运行。\n\
    \n现在，你只需在你的`.m`文件中综合这些属性并实现你的初始化方法，如下所示：\n\n```objc\n@synthesize coordinate, title,\
    \ subtitle;\n-(id)initWithCoordinate:(CLLocationCoordinate2D) c\n{\n    self=[super\
    \ init];\n    if(self){\n        coordinate = c;\n    }\n    return self;\n}\n\
    ```\n\n接下来，你将转到视图控制器。首先要做的是使用 Interface Builder 放入你的`MapView`，并将其链接到你的头文件。在这个示例中，我将你的`MKMapView`命名为“mapViewUserMap”。（如何操作请参考本章的方案\
    \ 5-1。）同时，确保在`-viewDidLoad`方法中将你的`MapView`的委托设置为视图控制器，使用如下代码行：\n\n```objc\nself.mapViewUserMap.delegate\
    \ = self;\n```\n\n在整个程序中，你还需要一些辅助变量。首先，你需要一个`CLLocationDegrees`类型的变量，用于跟踪当前的缩放级别。其次，你需要一个可变数组属性，用于存储所有的热点。你的头文件将如下所示：\n\
    \n```objc\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n\n#import \"Hotspot.h\"\
    \n\n@interface CSDViewController : UIViewController <MKMapViewDelegate>\n{\n \
    \   MKMapView *mapViewUserMap;\n    CLLocationDegrees zoom;\n}\n\n@property (strong,\
    \ nonatomic) IBOutlet MKMapView *mapViewUserMap;\n@property (strong, nonatomic)\
    \ NSMutableArray *places;\n@end\n```\n\n接下来，在你的实现文件中，在综合了`places`属性之后，你将定义一些常量来设置起始坐标和分组参数。这些常量还将用于帮助生成一些随机位置以便演示。将以下语句放在`.m`文件中你的导入语句之前。\n\
    \n```objc\n#define centerLat  39.2953\n#define centerLong -76.614\n#define spanDeltaLat\
    \    4.9\n#define spanDeltaLong   5.8\n#define scaleLat   9.0\n#define scaleLong\
    \   11.0\n```\n\n在继续之前，你需要记住处理作为属性的`NSArray`时一个非常重要的方面：它们不会在综合的访问器方法中自动分配或初始化自己。你需要定义自己的访问器方法，以便实现数组的惰性实例化。由于你很快将创建\
    \ 1,000 个测试位置，你将给数组一个初始容量为 1,000，如下所示：\n\n```objc\n-(NSMutableArray *)places\n\
    {\n    if (!places)\n    {\n        places = [[NSMutableArray alloc] initWithCapacity:1000];\n\
    \    }\n    return places;\n}\n```\n\n接下来，你需要一些测试数据。以下两个方法将为你生成 1,000 个可用的热点，它们彼此之间距离相当接近，这样你就可以看到你正在处理的是何种问题。\n\
    \n```objc\n-(float)RandomFloatStart:(float)a end:(float)b\n{\n    float random\
    \ = ((float) rand()) / (float) RAND_MAX;\n    float diff = b - a;\n    float r\
    \ = random * diff;\n    return a + r;\n}\n-(void)loadDummyPlaces\n{\n    srand((unsigned)time(0));\n\
    \n    for (int i=0; i<1000; i++)\n    {\n        Hotspot *place=[[Hotspot alloc]\n\
    initWithCoordinate:CLLocationCoordinate2DMake([self RandomFloatStart:37.0\nend:42.0],[self\
    \ RandomFloatStart:-72.0 end:-79.0])];\n        place.title = [NSString stringWithFormat:@\"\
    Place %d title\",i];\n        place.subtitle = [NSString stringWithFormat:@\"\
    Place %d subtitle\",i];\n        [self.places addObject:place];\n    }\n}\n```\n\
    \n现在你有了测试数据，你将确保你的`-viewDidLoad`方法已完全设置好以完成所需工作。它应该如下所示：\n\n```objc\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    self.mapViewUserMap.delegate = self;\n    [self\
    \ loadDummyPlaces];\n    [self.mapViewUserMap addAnnotations:self.places]; //仅用于设置目的。实现分组后，这行代码将不再需要。\n\
    \    CLLocationCoordinate2D centerPoint = {centerLat, centerLong};\n        MKCoordinateSpan\
    \ coordinateSpan = MKCoordinateSpanMake(spanDeltaLat,\nspanDeltaLong);\n     \
    \   MKCoordinateRegion coordinateRegion = MKCoordinateRegionMake(centerPoint,\n\
    coordinateSpan);\n\n        [self.mapViewUserMap setRegion:coordinateRegion];\n\
    \        [self.mapViewUserMap regionThatFits:coordinateRegion];\n}\n```\n\n在完成初始设置之前，你将跳转到`-viewDidUnload`方法，并添加几行代码以保持内存清洁。如果你以后想在更大的应用中使用此类，以下两行代码将有助于回收内存。\n\
    \n```objc\n[self.places removeAllObjects];\nself.places = nil;\n```\n\n最后，你需要实现你的地图的`viewForAnnotation`方法，以便正确显示大头针。这与之前的方案非常相似，如下所示：\n\
    \n```objc\n- (MKAnnotationView *)mapView:(MKMapView *)mV viewForAnnotation:(id\n\
    <MKAnnotation>)annotation{\n\n    // 如果它是用户位置，则返回 nil。\n    if ([annotation isKindOfClass:[MKUserLocation\
    \ class]]){\n        return nil;\n    }\n        else{\n        static NSString\
    \ *StartPinIdentifier = @\"PinIdentifier\";\n        MKPinAnnotationView *startPin\
    \ = (id)[mV\ndequeueReusableAnnotationViewWithIdentifier:StartPinIdentifier];\n\
    \                if (startPin == nil) {\n            startPin = [[MKPinAnnotationView\
    \ alloc] initWithAnnotation:annotation\nreuseIdentifier:StartPinIdentifier];\n\
    \        }\n        startPin.canShowCallout = YES;\n        return startPin;\n\
    \        }\n}\n```\n\n此时，如果你运行应用程序，应该会看到一个类似于图 5-25 的视图，它完美地说明了你要解决的问题。现在你已经设置好了测试数据，接下来将着手实现解决方案。\n\
    \n![Image](img/9781430240051_Fig05-25.jpg)\n"
- fmt: "**Figure 5–25.** *A map with far too many annotations*\n\nIn order to properly\
    \ iterate through your annotations and group them, you will be going through each\
    \ hotspot and determining how it should be placed. If it is close to another pin\
    \ that has already been dropped, it will be considered “found,” and will be removed\
    \ from the map. If not, you will add it to the list of those already in the map,\
    \ and add it to the map itself as an annotation. The following method provides\
    \ an efficient implementation, and should be placed in your view controller’s\
    \ `.m` file.\n\n```\n-(void)group:(NSArray *)hotspots{\n    float latDelta=self.mapViewUserMap.region.span.latitudeDelta/scaleLat;\n\
    \    float longDelta=self.mapViewUserMap.region.span.longitudeDelta/scaleLong;\n\
    \    NSMutableArray *visibleHotspots=[[NSMutableArray alloc] initWithCapacity:0];\n\
    \n    for (Hotspot *current in hotspots) {\n        CLLocationDegrees lat = current.coordinate.latitude;\n\
    \        CLLocationDegrees longi = current.coordinate.longitude;\n\n        bool\
    \ found=FALSE;\n        for (Hotspot *tempHotspot in visibleHotspots) {\n    \
    \        if(fabs(tempHotspot.coordinate.latitude-lat) < latDelta &&\nfabs(tempHotspot.coordinate.longitude-longi)<longDelta\
    \ ){\n                [self.mapViewUserMap removeAnnotation:current];\n      \
    \          found=TRUE;\n                break;\n            }\n        }\n   \
    \     if (!found) {\n            [visibleHotspots addObject:current];\n      \
    \      [self.mapViewUserMap addAnnotation:current];\n        }\n    }\n}\n```\n\
    \n**NOTE:** In this method, you use the `fabs` function. This is different from\
    \ the `abs` function in that it is specifically used for floats. Using the `abs`\
    \ function here would result in grouping only at the integer level of coordinates,\
    \ and your app would not work correctly.\n\nNext, you need to deal with your application\
    \ re-grouping the points every time the visible section of the map is changed.\
    \ This is fairly easy to do by implementing the following delegate method:\n\n\
    ```\n-(void)mapView:(MKMapView *)mapView regionDidChangeAnimated:(BOOL)animated{\n\
    \    if (zoom!=mapView.region.span.longitudeDelta) {\n        [self group:places];\n\
    \        zoom=mapView.region.span.longitudeDelta;\n    }\n}\n```\n\n**NOTE:**\
    \ When implementing these methods, make sure that any methods that use the `-group:`\
    \ method are implemented after it, otherwise the compiler will complain. Another\
    \ way to solve this problem is to simply define `-(void)group(NSArray *)hotspots;`\
    \ in your header file.\n\nThis method will check to see if the user has zoomed\
    \ in or out, and if so, re-group the annotations accordingly. Now you just need\
    \ to make one change to your `-viewDidLoad` method. You can remove the following\
    \ line, as its function will be performed by your `group:` method.\n\n`[self.mapViewUserMap\
    \ addAnnotations:self.places];`\n\nYou actually should not need to call `[self\
    \ group:self.places];` at the end of your `viewDidLoad` method, because when the\
    \ map is first displayed, your delegate method `-mapView: regionDidChangeAnimated:`\
    \ will be called, and will do the initial grouping automatically.\n\nUpon running\
    \ the app now, you should see your map populated with significantly fewer annotations,\
    \ with a somewhat regular distance in between them, as in [Figure 5–26](#Chapter05.html#fig_5_26).\
    \ Upon zooming in or out, you can see annotations appear or disappear respectively\
    \ as the map changes.\n\n![Image](images/9781430240051_Fig05-26.jpg)\n\n**Figure\
    \ 5–26.** *Grouped annotations by location*\n\nNow that you have successfully\
    \ grouped your annotations, you may choose to animate your pins as they are added\
    \ to drop down, so that your ungrouping transition looks smoother. This can be\
    \ done with a simple “`startPin.animatesDrop = YES;`” in your `viewForAnnotation:`\
    \ method, directly after the “`startPin.canShowCallout = YES;`” line.\n\nWhile\
    \ your annotations are correctly grouping at this point, you have a new issue,\
    \ in that you cannot easily tell whether a single annotation is standing on its\
    \ own, or if it is encapsulating multiple hotspots. In order to correct this,\
    \ you will add in functionality to allow hotspots to keep track of the number\
    \ of other hotspots they represent.\n\nFirst, you will need to go to your `Hotspot`\
    \ class, and add in an `NSMutableArray` property, “`places`”. You will also add\
    \ a few method definitions that you will use shortly to help manage this array.\
    \ The following lines need to be added to “`Hotspot.h`”.\n\n```\n@property (nonatomic,\
    \ strong) NSMutableArray *places;\n-(void)addPlace:(Hotspot *)hotspot;\n-(int)placesCount;\n\
    ```\n\nNot only do you need to implement these methods, but you also need to change\
    \ your `-initWithCoordinate:` method in order to ensure that your `places` array\
    \ is correctly created. You will also have to implement your own version of your\
    \ `title` property’s getter, so that the callout title will show the number of\
    \ hotspots represented. Your implementation file now looks like so:\n\n```\n#import\
    \ \"Hotspot.h\"\n@implementation Hotspot\n@synthesize coordinate, title, subtitle;\n\
    @synthesize places;\n-(id)initWithCoordinate:(CLLocationCoordinate2D) c\n{\n \
    \   self=[super init];\n    if(self){\n        coordinate = c;\n        self.places\
    \ = [[NSMutableArray alloc] initWithCapacity:0];\n    }\n    return self;\n}\n\
    -(NSString *)title\n{\n    if ([self placesCount] == 1)\n    {\n        return\
    \ title;\n    }\n    else\n        return [NSString stringWithFormat:@\"%i Places\"\
    , [self.places count]];\n}\n-(void)addPlace:(Hotspot *)hotspot\n{\n    [self.places\
    \ addObject:hotspot];\n}\n-(int)placesCount{\n    return [self.places count];\n\
    }\n-(void)cleanPlaces{\n    [self.places removeAllObjects];\n    [self.places\
    \ addObject:self];\n}\n@end\n```\n\nThe foregoing `-placesCount` method is not\
    \ necessary; it just makes accessing the number of places represented by a single\
    \ hotspot slightly easier. Your `-cleanPlaces` method will be used simply to reset\
    \ the places array whenever you re-group your annotations. All you have to do\
    \ now is make sure your `-group:` method correctly calls `-cleanPlaces` by adding\
    \ the following two lines in their appropriate places, which you will see in the\
    \ full method implementation that follows.\n\n`[hotspots makeObjectsPerformSelector:@selector(cleanPlaces)];`\n\
    `[tempHotspot addPlace:current];`\n\nYour full `-group:` method should now look\
    \ like so:\n\n```\n-(void)group:(NSArray *)hotspots{\n    float latDelta=self.mapViewUserMap.region.span.latitudeDelta/scaleLat;\n\
    \    float longDelta=self.mapViewUserMap.region.span.longitudeDelta/scaleLong;\n\
    \    //New lines:\n    [hotspots makeObjectsPerformSelector:@selector(cleanPlaces)];\n\
    \    //End of new lines.\n    NSMutableArray *visibleHotspots=[[NSMutableArray\
    \ alloc] initWithCapacity:0];\n\n    for (Hotspot *current in hotspots) {\n  \
    \      CLLocationDegrees lat = current.coordinate.latitude;\n        CLLocationDegrees\
