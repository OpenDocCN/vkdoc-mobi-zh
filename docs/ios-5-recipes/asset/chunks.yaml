  trans: "\n### 设置 iTunes Connect\n\n点击“管理你的应用”，然后点击你启用了 Game Center 的应用。在“应用信息”页面，点击“管理\
    \ Game Center”，如图 16-10 所示。\n\n![Image](img/9781430240051_Fig16-10.jpg)\n\n**图\
    \ 16-10.** *进入“管理 Game Center”界面*\n\n在“排行榜”标题下，点击“设置”，如图 16-11 所示。\n\n![Image](img/9781430240051_Fig16-11.jpg)\n\
    \n**图 16-11.** *Game Center 界面，你可以在其中设置排行榜*\n\n一旦应用的排行榜上线，便无法删除，因此在创建时需谨慎考虑。每个应用最多可拥有\
    \ 25 个排行榜。这允许你为不同难度创建多个排行榜，甚至可以为游戏的每个关卡创建一个，以最适合你的需求。在你的简单应用中，只需创建一个排行榜。\n\n点击“添加排行榜”按钮，如图\
    \ 16-12 所示，开始创建。\n\n![Image](img/9781430240051_Fig16-12.jpg)\n\n**图 16-12.** *你应用的待添加排行榜列表*\n\
    \n在“单个排行榜”下点击“选择”按钮，如图 16-13 所示，继续创建一个独立的排行榜。\n\n![Image](img/9781430240051_Fig16-13.jpg)\n\
    \n**图 16-13.** *选择排行榜类型*\n\n为排行榜填写名称和标识符。名称是用于跟踪的内部名称，不会向玩家显示。（显示名称将在下一步添加语言时配置。）接下来选择分数格式类型；这里我将使用简单的整数，但你也可以使用基于时间、浮点数和货币的格式。选择排行榜的排序顺序。如果你希望高分排在最前面（通常如此），则选择“从高到低”排序；如果你希望低分排在最前面（例如在高尔夫游戏中），则选择“从低到高”排序。\n\
    \n你需要为排行榜设置至少一种语言。为此，点击“添加语言”按钮，如图 16-14 所示。\n\n![Image](img/9781430240051_Fig16-14.jpg)\n\
    \n**图 16-14.** *配置排行榜*\n\n现在，按照图 16-15 所示，为该分数配置本地化语言。选择语言，然后为排行榜输入显示名称；这是游戏中玩家将看到的名称。你可以设置分数的格式以及分数的单位（单数和复数）；在此例中，单位是“point”和“points”。\n\
    \n![Image](img/9781430240051_Fig16-15.jpg)\n\n**图 16-15.** *排行榜的语言显示设置*\n\n完成后，点击“保存”，然后也在排行榜页面上点击“保存”。\n\
    \n现在，让我们深入一些代码。\n\n### 设置你的代码\n\n打开 HangmanMP 项目，进入 `GameScene.m` 文件。在文件顶部添加导入语句：`#import\
    \ <GameKit/GameKit.h>`。\n\n让我们在 `@synthesize` 和实例变量下方添加一个用于报告分数的方法：\n\n```\n-\
    \ (void) reportScore: (int64_t) score forCategory: (NSString*) category\n{\n \
    \   GKScore *scoreReporter = [[GKScore alloc] initWithCategory:category];\n  \
    \  scoreReporter.value = score;\n    [scoreReporter reportScoreWithCompletionHandler:^(NSError\
    \ *error) {\n\n        NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    NSUserDomainMask, YES);\n        NSString *scoreFilePath = [NSString stringWithFormat:@\"\
    %@/scores.plist\",[paths\nobjectAtIndex:0]];\n        NSMutableDictionary *scoreDictionary=[NSMutableDictionary\n\
    dictionaryWithContentsOfFile:scoreFilePath];\n\n        if (error != nil)\n  \
    \      {\n            //出现错误，需要将分数保存在本地并稍后重新提交\n            NSLog(@\"保存分数以供后续处理\"\
    );\n            [scoreDictionary setValue:scoreReporter forKey:[NSDate date]];\n\
    \            [scoreDictionary writeToFile:scoreFilePath atomically:YES];\n   \
    \     }\n    }];\n}\n```\n\n此方法会尝试报告分数，但如果失败，它会将分数保存到一个字典中，并将该字典写入文件，以便你之后可以加载这些分数。你可以在任何想要向\
    \ Game Center 报告分数的地方调用此方法，调用方式类似于：\n\n```\n[self reportScore:playerScore forCategory:@\"\
    default_high_scores\"];\n```\n\n你还应该在应用启动时尝试报告已保存的分数，因此请切换到你的应用委托实现文件（`.m`）。\n\
    \n在 `didFinishLaunchingWithOptions` 方法的末尾，在读取到“return YES;”那一行之前，添加以下代码。\n\n```\n\
    NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\nNSUserDomainMask,\
    \ YES);\n    NSString *scoreFilePath = [NSString stringWithFormat:@\"%@/scores.plist\"\
    ,[paths\nobjectAtIndex:0]];\n    NSMutableDictionary *scoreDictionary=[NSMutableDictionary\n\
    dictionaryWithContentsOfFile:scoreFilePath];\n\n    for (NSDate *dateID in [scoreDictionary\
    \ allKeys]) {\n        NSLog(@\"报告旧分数: %@\", dateID);\n        GKScore *scoreToReport=(GKScore\
    \ *)[scoreDictionary objectForKey:dateID];\n        [scoreToReport reportScoreWithCompletionHandler:^(NSError\
    \ *error) {\n            NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    NSUserDomainMask, YES);\n            NSString *scoreFilePath = [NSString\nstringWithFormat:@\"\
    %@/scores.plist\",[paths objectAtIndex:0]];\n            NSMutableDictionary *scoreDictionary=[NSMutableDictionary\n\
    dictionaryWithContentsOfFile:scoreFilePath];\n\n            if (error != nil)\n\
    \            {\n                //出现错误，需要将分数保存在本地并稍后重新提交\n                [scoreDictionary\
    \ setValue:scoreToReport forKey:scoreToReport.playerID];\n                [scoreDictionary\
    \ writeToFile:scoreFilePath atomically:YES];\n            }\n        }];\n\n \
    \   }\n```\n\n这段代码会检查写入文件的旧分数，并尝试将它们发送到 Game Center。\n\n### 显示高分\n\n如果没人看到，高分就没有意义。你的用户可以在\
    \ Game Center 应用内看到游戏的高分，但你也可以非常轻松地为他们提供一个直接链接到高分榜的入口。切换到 `MainMenuScene.h` 文件。\n\
    \n你需要导入 `GameKit.h`，并将 `MainMenuScene` 设置为 `GKLeaderboardViewControllerDelegate`\
    \ 代理。\n\n```\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface\
    \ MainMenuScene : UIViewController <GKLeaderboardViewControllerDelegate>\n\n@end\n\
    ```\n\n现在，转到实现文件（`.m`），并在顶部添加两个新方法。第一个方法将在点击“完成”时关闭 `GKLeaderboardViewController`：\n\
    \n```\n- (void)leaderboardViewControllerDidFinish:(GKLeaderboardViewController*)viewController\n\
    {\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n你需要添加的另一个方法将显示实际的\
    \ `GKLeaderboardViewController` 视图：\n\n```\n- (void) showLeaderboard\n{\n    GKLeaderboardViewController\
    \ *leaderboardController = [[GKLeaderboardViewController\nalloc] init];\n    if\
    \ (leaderboardController != nil)\n    {\n        leaderboardController.leaderboardDelegate\
    \ = self;\n        [self presentModalViewController: leaderboardController animated:\
    \ YES];\n    }\n}\n```\n\n现在，你可以在主菜单场景上创建一个 `UIButton`，并将其连接到 `showLeaderboard`\
    \ 方法，以显示游戏的排行榜。你可以在 `-viewDidLoad` 方法中创建这个按钮：\n\n```\n- (void)viewDidLoad\n{\n\
    \    [super viewDidLoad];\n    UIButton *buttonShowHighScores=[UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
    \    [buttonShowHighScores addTarget:self action:@selector(showLeaderboard)\n\
    forControlEvents:UIControlEventTouchUpInside];\n    buttonShowHighScores.frame=CGRectMake(104,\
    \ 302, 112, 44);\n    [buttonShowHighScores setTitle:@\"高分榜\" forState:UIControlStateNormal];\n\
    \n    [self.view addSubview:buttonShowHighScores];\n}\n```\n"
- fmt: "# Recipe 16–3: Achievements\n\nAchievements in games are similar to badges\
    \ and other unlockables in other apps and games. You provide your players with\
    \ a notification when they reach certain milestones. In the `HangmanMP` game,\
    \ a good achievement might be if they get all the letters right in a word without\
    \ any mistakes. Let's take a look at how you would implement that.\n\n## Setting\
    \ Up iTunes Connect\n\nAs with other things you've done with Game Center, it all\
    \ starts in iTunes Connect, so head over there: `itunesconnect.apple.com`. Click\
    \ Manage Your Applications, and then click the app you have set up for Game Center.\
    \ Now click Manage Game Center.\n\nIn the Game Center management page, click Set\
    \ Up under Achievements, shown in Figure 16–16.\n\n![Image](images/9781430240051_Fig16-16.jpg)\n\
    \n**Figure 16–16.** *Accessing the Achievements section from the Game Center screen*\n\
    \nEach game can have up to 1,000 achievement points. These points can be assigned\
    \ to different achievements as you see fit, but each achievement can have a max\
    \ of only 100 achievement points.\n\nFor now you are going to create a 50-point\
    \ achievement, so go ahead and click Add New Achievement, as in Figure 16–17.\n\
    \n![Image](images/9781430240051_Fig16-17.jpg)\n\n**Figure 16–17.** *Adding a new\
    \ achievement for your app*\n\nThis achievement will be for getting all the letters\
    \ and no mistakes in a small word (six letters or less). Your configuration is\
    \ shown in Figure 16–18.\n\n![Image](images/9781430240051_Fig16-18.jpg)\n\n**Figure\
    \ 16–18.** *Configuring an achievement's details*\n\nYou can't save an achievement\
    \ until you add at least one language to it, so click Add Language now. The resulting\
    \ view will resemble Figure 16–19. Here, you can set the achievement title as\
    \ well as the “pre-earned” description. The pre-earned description should detail\
    \ how the achievement is earned. There is also an earned description, which is\
    \ the description shown after the achievement is earned. Finally, you will need\
    \ an image to represent the achievement. This should be a 512×512 72 ppi `.png`\
    \ file.\n\n![Image](images/9781430240051_Fig16-19.jpg)\n\n**Figure 16–19.** *Configuring\
    \ achievement details in a specific language*\n\nClick Save and then Save again\
    \ on the Achievement info page. And let's write some code…\n\n## Setting Up Your\
    \ Code\n\nThis is going to be very similar to setting up leaderboards. Open up\
    \ `GameScene.m`, and add the following method:\n\n```\n- (void) reportAchievementIdentifier:(NSString*)identifier\
    \ percentComplete:(float)percent\n{\n    GKAchievement *achievement = [[GKAchievement\
    \ alloc] initWithIdentifier:identifier];\n    if (achievement)\n    {\n      \
    \  achievement.percentComplete = percent;\n        [achievement reportAchievementWithCompletionHandler:^(NSError\
    \ *error)\n        {\n            if (error != nil)\n            {\n         \
    \       //There was an error so we need to save the achievement locally and resubmit\
    \ later\n                NSLog(@\"Saving achievement for later\");\n         \
    \       NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES);\n                NSString *achievementFilePath = [NSString\
    \ stringWithFormat:@\"%@/achievements.plist\",[paths objectAtIndex:0]];\n    \
    \            NSMutableDictionary *achievementDictionary=[NSMutableDictionary dictionaryWithContentsOfFile:achievementFilePath];\n\
    \n                [achievementDictionary setValue:achievement forKey:achievement.identifier];\n\
    \                [achievementDictionary writeToFile:achievementFilePath atomically:YES];\n\
    \            }\n        }];\n    }\n}\n```\n\nNow you just need to call this method\
    \ with your achievement and the percentage complete. Since in this case, you either\
    \ have the achievement or you don't, the percentage complete will be 100 or 0,\
    \ but you can use this snippet to report on the completion of any achievement.\
    \ This bit of code goes just after you report the score in the `processGuess`\
    \ method.\n\n```\nif(unfoundLetters.location==NSNotFound){\n            [self\
    \ reportScore:playerScore forCategory:@\"default_high_scores\"];\n           \
    \ if(self.badGuessCount==0 && self.stringHiddenWord.length<=6){\n            \
    \    NSLog(@\"Reporting achievement\");\n                [self reportAchievementIdentifier:@\"\
    no_mistakes_small_word\" percentComplete:100];\n            }\n….\n```\n\nSimilar\
    \ to how you reported saved scores in the app delegate, you should do the same\
    \ with achievements. So go to `HMAppDelegate.m`, modify your friend the `didFinishLaunchingWithOptions`\
    \ method, and add the following code before your return statement.\n\n```\n  \
    \  //Report saved achievements\n    NSString *achievementFilePath = [NSString\
    \ stringWithFormat:@\"%@/achievements.plist\",[paths objectAtIndex:0]];\n    NSMutableDictionary\
    \ *achievementDictionary=[NSMutableDictionary dictionaryWithContentsOfFile:achievementFilePath];\n\
    \    for (id achievement in [achievementDictionary allKeys]){\n        GKAchievement\
    \ *achievementToReport=(GKAchievement *)[achievementDictionary objectForKey:achievement];\n\
    \        [achievementToReport reportAchievementWithCompletionHandler:^(NSError\
    \ *error)\n         {\n             if (error != nil)\n             {\n      \
    \           //There was an error so we need to save the achievement locally and\
    \ resubmit later\n                 NSLog(@\"Saving achievement for later\");\n\
    \                 NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES);\n                 NSString *achievementFilePath = [NSString\
    \ stringWithFormat:@\"%@/achievements.plist\",[paths objectAtIndex:0]];\n    \
    \             NSMutableDictionary *achievementDictionary=[NSMutableDictionary\
    \ dictionaryWithContentsOfFile:achievementFilePath];\n\n                 [achievementDictionary\
    \ setValue:achievementToReport forKey:achievement];\n                 [achievementDictionary\
    \ writeToFile:achievementFilePath atomically:YES];\n             }else{\n    \
    \             NSLog(@\"Achievement reported\");\n             }\n         }];\n\
    \    }\n```\n\n## Showing Achievements\n\nThis section is going to seem like déjà\
    \ vu if you followed the “Leaderboard” section. You'll want to show players the\
    \ achievements they've earned in your game, and the easiest way to do that is\
    \ to tie a button in your app to the `GKAchievementsViewController`. Head over\
    \ to `MainMenuScene.m`, and add the following method:\n\n```\n-(void)achievementViewControllerDidFinish:(GKAchievementViewController\
    \ *)viewController{\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\
    \nThis will dismiss your `GKAchievementViewController`. To display it, you'll\
    \ add the following function into `MainMenuScene.m`:\n\n```\n- (void) showAchievements\n\
    {\n    GKAchievementViewController *achievements = [[GKAchievementViewController\
    \ alloc] init];\n    if (achievements != nil)\n    {\n        achievements.achievementDelegate\
    \ = self;\n        [self presentModalViewController:achievements animated: YES];\n\
    \    }\n}\n```\n\nConnect a `UIButton` action call to that method, and then don't\
    \ forget to add `GKAchievementViewControllerDelegate` to the `MainMenuScene.h`\
    \ file:\n\n```\n//\n//  MainMenuScene.h\n//  HangmanMP\n\n#import <UIKit/UIKit.h>\n\
    #import <GameKit/GameKit.h>\n\n@interface MainMenuScene : UIViewController <GKLeaderboardViewControllerDelegate\
    \ GKAchievementViewControllerDelegate>\n\n- (IBAction)actionShowHighScores:(id)sender;\n\
    \n@end\n```\n\nNow test the application by launching it in the simulator. You\
    \ will be able to view your newly created achievement, as in Figure 16–20.\n\n\
    ![Image](images/9781430240051_Fig16-20.jpg)\n\n**Figure 16–20.** *Your application\
    \ displaying your earned achievement*"
