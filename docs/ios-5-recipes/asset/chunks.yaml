  trans: "\n# 配方 12–2：访问原始 Core Motion 数据\n\n现在你的应用已经具备了一些基本的摇动检测功能，你可以开始集成 Core Motion\
    \ 框架，它将允许你访问加速度计、陀螺仪和磁力计的信息。\n\n首先，选择你的项目，然后导航到 **Build Phases** 选项卡。在 **Link\
    \ Binary With Libraries** 下，点击 **+** 按钮，选择名为 `CoreMotion.framework` 的项，如图 12–6\
    \ 所示。\n\n![图片](img/9781430240051_Fig12-06.jpg)\n\n**图 12–6.** *添加 CoreMotion 框架*\n\
    \n现在回到你的主视图控制器的头文件中，添加以下导入语句，以便你可以访问 Core Motion API。\n\n```\n#import <CoreMotion/CoreMotion.h>\n\
    ```\n\nCore Motion 框架非常依赖一个名为 `CMMotionManager` 的单一类。这个类作为一个中心枢纽，通过它可以访问任何给定设备上所有可用的硬件。你将在视图控制器中创建一个该类的实例作为属性，以便持续跟踪它。\n\
    \n```\n@property (nonatomic, strong) CMMotionManager *motionManager;\n```\n\n\
    在你的视图控制器中，确保合成了这个属性，并按照标准做法，在 `-viewDidUnload` 方法中将其设置为 `nil`。\n\n不幸的是，仅仅合成一个\
    \ `CMMotionManager` 对象并不足以确保其初始化（就像 `NSArray` 一样），因此你将创建一个修改过的 getter 方法来解决这个问题。幸运的是，这样做不需要任何复杂的配置。\n\
    \n```\n-(CMMotionManager *)motionManager\n{\n    if (motionManager == nil)\n \
    \   {\n        motionManager = [[CMMotionManager alloc] init];\n    }\n    return\
    \ motionManager;\n}\n```\n\n接下来，你将开始设置用户界面。首先，测量三种不同仪器的输出：加速度计、陀螺仪和磁力计。稍后你会更详细地了解这些仪器的用途，但现在你必须知道，每种仪器都会提供三个不同的值供你查看。因此，你将按照图\
    \ 12–7 所示设置你的视图。\n\n![图片](img/9781430240051_Fig12-07.jpg)\n\n**图 12–7.** *你的视图控制器的\
    \ XIB 设置*\n\n请确保将所需的 `UILabel` 作为属性连接到你的视图控制器，以便你可以更改它们的文本！你可以保留所有设备名称标签以及 `X`、`Y`\
    \ 和 `Z` 标签不动，因此你只需连接那些将显示数值的 `UILabel`（它们当前显示为 `0.0`），以及底部的 **Status** 标签。你将在代码中使用以下按行组织的属性名称：\n\
    \n*   `xAccLabel`, `yAccLabel`, `zAccLabel`\n*   `xGyroLabel`, `yGyroLabel`, `zGyroLabel`\n\
    *   `xMagLabel`, `yMagLabel`, `zMagLabel`\n*   `statusLabel`\n\n你还需要在头文件中定义一个方法来切换当前是否正在获取硬件更新，因此添加以下方法声明。\n\
    \n```\n-(void)toggleUpdates;\n```\n\n完成后，你的用户界面应该已经为初始应用完全设置好了，你的视图控制器的头文件整体应该如下所示：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <CoreMotion/CoreMotion.h>\n\n@interface\
    \ MainViewController : UIViewController\n@property (nonatomic, strong) CMMotionManager\
    \ *motionManager;\n@property (strong, nonatomic) IBOutlet UILabel *xAccLabel;\n\
    @property (strong, nonatomic) IBOutlet UILabel *yAccLabel;\n@property (strong,\
    \ nonatomic) IBOutlet UILabel *zAccLabel;\n\n@property (strong, nonatomic) IBOutlet\
    \ UILabel *xGyroLabel;\n@property (strong, nonatomic) IBOutlet UILabel *yGyroLabel;\n\
    @property (strong, nonatomic) IBOutlet UILabel *zGyroLabel;\n\n@property (strong,\
    \ nonatomic) IBOutlet UILabel *xMagLabel;\n@property (strong, nonatomic) IBOutlet\
    \ UILabel *yMagLabel;\n@property (strong, nonatomic) IBOutlet UILabel *zMagLabel;\n\
    \n@property (strong, nonatomic) IBOutlet UILabel *statusLabel;\n\n-(void)toggleUpdates;\n\
    @end\n```\n\n## Core Motion 详解\n\n在 Core Motion 中，假设设备足够新并配备了相关硬件，你可以访问设备上的三种不同硬件。\n\
    \n1.  *加速度计*：该硬件测量设备的加速度（由重力或用户加速度引起），以提供关于设备当前方向以及用户沿特定方向施加的加速度的信息。这对于检测设备是否倾斜（并可能因此旋转视图）特别有用。\n\
    \    加速度计的数据以 `CMAccelerometerData` 对象的形式呈现。该对象只有一个属性 `acceleration`，包含 `x`、`y`、`z`\
    \ 三个值，分别表示沿任何给定轴的方向或加速度。\n2.  *陀螺仪*：陀螺仪测量设备沿多个轴的旋转速率。\n    来自陀螺仪的信息封装在 `CMGyroData`\
    \ 实例中。该类具有属性 `rotationRate`，包含 `x`、`y`、`z` 三个值，分别表示围绕特定轴的旋转速率。\n3.  *磁力计*：该设备提供关于穿过设备的磁场数据，通常基于地球磁场以及附近的其他任何磁场。请记住，在测试此功能时要小心，因为将任何类型的强磁铁靠近设备可能会对其造成损害。\n\
    \    当从磁力计接收信息时，你访问 `CMMagnetometerData` 类，该类有一个属性 `magneticField`，包含 `x`、`y`、`z`\
    \ 三个值，用于表示沿每个轴穿过设备的磁场。\n\n对于所有三个设备，所有轴都是相同的。如果你手持设备面向自己，底部朝下，那么 x 轴水平穿过设备，y 轴从上到下运行，z\
    \ 轴穿过设备中心指向你。\n\n你将首先实现视图控制器以显示每个硬件的原始数据。\n\n每当处理任何内部硬件时，开发者都有责任包含某种方式来确认所访问的硬件在实际运行应用的任何给定设备上是否可用。因此，每次访问\
    \ Core Motion 硬件时，你都需要使用以下方法：\n\n*   `-isAccelerometerAvailable`\n*   `-isGyroAvailable`\n\
    *   `-isMagnetometerAvailable`\n\n这三个方法都简单地返回一个 `BOOL` 值，其中 `YES` 表示该硬件确实可访问。\n\
    \n你还会使用另外三个方法来检查任何给定硬件当前是否已经处于活动状态，以便正确切换更新。\n\n*   `-isAccelerometerActive`\n\
    *   `-isGyroActive`\n*   `-isMagnetometerActive`\n\n每当你想要从特定硬件获取更新时，必须设置一个“更新间隔”，以指定你接收更新的频率，如下例所示：\n\
    \n```\n[self.motionManager setAccelerometerUpdateInterval:1.0/2.0]; // 每秒更新两次\n\
    ```\n\n有两种不同的方法可以接收来自特定硬件组件的更新。首先，你可以简单地告诉 `CMMotionManager` 使用 `-startAccelerometerUpdates`、`-startGyroUpdates`\
    \ 和 `-startMagnetometerUpdates` 开始从某个设备接收更新，然后通过 `accelerometerData`、`gyroData`\
    \ 和 `magnetometerData` 属性查询信息。如果你不打算每次刷新都使用更新数据，这种方法很有用。\n\n第二种方法更适合希望始终使用最新可用数据的用户，就像你在此实现的那样。你可以使用三种不同的方法，这些方法不仅启动更新，还指定了更新时要执行的代码处理块，以及执行该处理块的队列。它们列举如下：\n"
- fmt: "- `startAccelerometerUpdatesToQueue:withHandler:`\n- `startGyroUpdatesToQueue:withHandler:`\n\
    - `startMagnetometerUpdatesToQueue:withHandler:`\n\n对于简单使用，您将使用主队列来执行处理程序。\n\n\
    综合所有讨论的方法，您可以构建一段简单的代码，如果运行，它将开始从加速度计更新数据。这段代码将用于构建`-toggleUpdates`方法。\n\n```\n\
    if ([self.motionManager isAccelerometerAvailable] && ![self.motionManager isAccelerometerActive])\n\
    \    {\n        [self.motionManager setAccelerometerUpdateInterval:1.0/2.0]; //Update\
    \ twice per second\n        [self.motionManager startAccelerometerUpdatesToQueue:[NSOperationQueue\
    \ mainQueue] withHandler:^(CMAccelerometerData *accelerometerData, NSError *error)\n\
    \         {\nself.xAccLabel.text = [NSString stringWithFormat:@\"%f\", accelerometerData.acceleration.x];\n\
    self.yAccLabel.text = [NSString stringWithFormat:@\"%f\", accelerometerData.acceleration.y];\n\
    self.zAccLabel.text = [NSString stringWithFormat:@\"%f\", accelerometerData.acceleration.z];\n\
    \         }];\n    }\n```\n\n如前所述，您首先检查硬件是否可用且未激活。接下来，您设置更新间隔，然后开始请求更新。您指定的简单处理程序将更新视图的信息，以包含您收到的原始数据。\n\
    \n由于您实际上是在构建一个方法来切换这些更新的开启和关闭，您可以添加以下条件来关闭您的更新。\n\n```\nelse if ([self.motionManager\
    \ isAccelerometerActive])\n    {\n        [self.motionManager stopAccelerometerUpdates];\n\
    self.xAccLabel.text = @\"...\";\nself.yAccLabel.text = @\"...\";\nself.zAccLabel.text\
    \ = @\"...\";\n    }\n```\n\n另外两个仪器的工作原理完全相同。总体而言，您的`-toggleUpdates`方法将编写如下：\n\
    \n```\n-(void)toggleUpdates\n{\nif ([self.motionManager isAccelerometerAvailable]\
    \ && ![self.motionManagerisAccelerometerActive])\n    {\n        [self.motionManager\
    \ setAccelerometerUpdateInterval:1.0/2.0]; //Update twice per second\n       \
    \ [self.motionManager startAccelerometerUpdatesToQueue:[NSOperationQueue mainQueue]\
    \ withHandler:^(CMAccelerometerData *accelerometerData, NSError *error)\n    \
    \     {\nself.xAccLabel.text = [NSString stringWithFormat:@\"%f\", accelerometerData.acceleration.x];\n\
    self.yAccLabel.text = [NSString stringWithFormat:@\"%f\", accelerometerData.acceleration.y];\n\
    self.zAccLabel.text = [NSString stringWithFormat:@\"%f\", accelerometerData.acceleration.z];\n\
    \         }];\n    }\nelse if ([self.motionManager isAccelerometerActive])\n \
    \   {\n        [self.motionManager stopAccelerometerUpdates];\nself.xAccLabel.text\
    \ = @\"...\";\nself.yAccLabel.text = @\"...\";\nself.zAccLabel.text = @\"...\"\
    ;\n    }\n\nif ([self.motionManager isGyroAvailable] && ![self.motionManager isGyroActive])\n\
    \    {\n        [self.motionManage rsetGyroUpdateInterval:1.0/2.0];\n        [self.motionManager\
    \ startGyroUpdatesToQueue:[NSOperationQueue mainQueue] withHandler:^(CMGyroData\
    \ *gyroData, NSError *error)\n         {\nself.xGyroLabel.text = [NSString stringWithFormat:@\"\
    %f\", gyroData.rotationRate.x];\nself.yGyroLabel.text = [NSString stringWithFormat:@\"\
    %f\", gyroData.rotationRate.y];\nself.zGyroLabel.text = [NSString stringWithFormat:@\"\
    %f\", gyroData.rotationRate.z];\n         }];\n    }\nelse if ([self.motionManager\
    \ isGyroActive])\n    {\n        [self.motionManager stopGyroUpdates];\nself.xGyroLabel.text\
    \ = @\"...\";\nself.yGyroLabel.text = @\"...\";\nself.zGyroLabel.text = @\"...\"\
    ;\n    }\n\nif ([self.motionManager isMagnetometerAvailable] && ![self.motionManager\
    \ isMagnetometerActive])\n    {\n        [self.motionManager setMagnetometerUpdateInterval:1.0/2.0];\n\
    \        [self.motionManager startMagnetometerUpdatesToQueue:[NSOperationQueue\
    \ mainQueue] withHandler:^(CMMagnetometerData *magData, NSError *error)\n    \
    \     {\nself.xMagLabel.text = [NSString stringWithFormat:@\"%f\", magData.magneticField.x];\n\
    self.yMagLabel.text = [NSString stringWithFormat:@\"%f\", magData.magneticField.y];\n\
    self.zMagLabel.text = [NSString stringWithFormat:@\"%f\", magData.magneticField.z];\n\
    \         }];\n    }\nelse if ([self.motionManager isMagnetometerActive])\n  \
    \  {\n        [self.motionManager stopMagnetometerUpdates];\nself.xMagLabel.text\
    \ = @\"...\";\nself.yMagLabel.text = @\"...\";\nself.zMagLabel.text = @\"...\"\
    ;\n    }\n}\n```\n\n为了增加一点趣味，您将继续实现让切换基于设备的摇晃，因此您将修改`-shakeDetected:`方法。\n\n```\n\
    -(void)shakeDetected:(NSNotification *)paramNotification\n{\nif ([self.statusLabel.text\
    \ isEqualToString:@\"Updating\"])\n    {\nself.statusLabel.text = @\"Stopped\"\
    ;\n        [self toggleUpdates];\n    }\nelse\n    {\nself.statusLabel.text =\
    \ @\"Updating\";\n        [self toggleUpdates];\n    }\n}\n```\n\n每当您处理`CMMotionManager`时，应始终确保在应用程序结束时停止所有更新，因此您将设置`-viewDidUnload:`方法如下：\n\
    \n```\n- (void)viewDidUnload\n{\nif ([self.motionManager isAccelerometerAvailable]\
    \ && [self.motionManager isAccelerometerActive])\n    {\n        [self.motionManager\
    \ stopAccelerometerUpdates];\n    }\nif ([self.motionManager isGyroAvailable]\
    \ && [self.motionManager isGyroActive])\n    {\n        [self.motionManager stopGyroUpdates];\n\
    \    }\nif ([self.motionManager isMagnetometerAvailable] && [self.motionManager\
    \ isMagnetometerActive])\n    {\n        [self.motionManager stopMagnetometerUpdates];\n\
    \    }\n\nself.motionManager = nil;\n    [self setXAccLabel:nil];\n    [self setYAccLabel:nil];\n\
    \    [self setZAccLabel:nil];\n    [self setXGyroLabel:nil];\n    [self setYGyroLabel:nil];\n\
    \    [self setZGyroLabel:nil];\n    [self setStatusLabel:nil];\n    [self setXMagLabel:nil];\n\
    \    [self setYMagLabel:nil];\n    [self setZMagLabel:nil];\n    [superview DidUnload];\n\
    }\n```\n\n您还应该确保应用程序在进入后台时停止更新，因此切换到您的应用程序委托并实现`-applicationDidEnterBackground:`。\n\
    \n```\n- (void)applicationDidEnterBackground:(UIApplication *)application\n{\n\
    if ([self.viewController.motionManager isAccelerometerAvailable] && [self.viewController.motionManager\
    \ isAccelerometerActive])\n    {\n[self.viewController.motionManager stopAccelerometerUpdates];\n\
    \    }\nif ([self.viewController.motionManager isGyroAvailable] && [self.viewController.motionManager\
    \ isGyroActive])\n    {\n        [self.viewController.motionManager stopGyroUpdates];\n\
    \    }\nif ([self.viewController.motionManager isMagnetometerAvailable] && [self.viewController.motionManager\
    \ isMagnetometerActive])\n    {\n        [self.viewController.motionManager stopMagnetometerUpdates];\n\
    \    }\n}\n```\n\n如果您现在运行应用程序，快速摇晃将开始更新所有值，结果视图类似于[图12-8](#Chapter12.html#fig_12_8)。\n\
    \n![Image](images/9781430240051_Fig12-08.jpg)\n\n**图12-8.** *您的应用程序正在接收原始设备信息*\n\
    \n您可能会注意到，此设置的主要问题是数据没有太大意义。它是原始的、有偏差的数据，不太容易使用。接下来，您将更改实现，以更好地利用可以从`CMMotionManager`访问的第四组值：`CMDeviceMotion`。"
