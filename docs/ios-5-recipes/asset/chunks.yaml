    ### 技巧 9–4：创建分组 UITableView


    现在你几乎已经完全掌握了使用未分组 `UITableView` 的所有基础知识，接下来可以调整应用程序，采用“分组”方式。你在未分组表格中实现的所有功能同样适用于分组表格，因此你无需进行大量修改即可实现这一目标。


    要使用分组表格，首先需要将 `UITableView` 的“样式”从“Plain”切换为“Grouped”。最简单的方法是在视图控制器的 XIB 文件中选中
    `UITableView`，然后在属性检查器中更改样式，结果将显示为类似图 9–15 的效果。


    ![Image](img/9781430240051_Fig09-15.jpg)


    **图 9–15.** *配置“分组”`UITableView`*


    你所需的具体选项位于属性检查器顶部，在“Table View”的“Style”下，如下方图 9–16 所示。


    ![Image](img/9781430240051_Fig09-16.jpg)


    **图 9–16.** *修改表格的“Style”以创建分组 `UITableView`*


    虽然这是更改表格样式的唯一必要操作，但问题在于到目前为止，你的数据模型是为未分组样式设计的，甚至根本没有对数据进行分组。为了解决这个问题，你需要改变数据的存储组织方式。


    你不再使用一个包含全部五个国家的数组，而是将国家分为若干组，每组作为一个 `NSMutableArray`，然后将这些数组放入一个更大的 `NSMutableArray`
    中。（虽然更好的做法是使用不可变数组，但我选择了可变版本，以便从表格中编辑数据模型时更简单。）


    对于你的应用程序，你将把五个 `Country` 对象分为两类：一类是英国（United Kingdom）的国家，另一类是其他所有国家。


    首先，你需要创建两个额外的 `NSMutableArray` 作为子数组，因此添加这两个属性，并确保在实现文件中正确处理它们（使用 `@synthesize`！）。最终你将拥有三个
    `NSMutableArray` 属性。


    ```

    @property (strong, nonatomic) NSMutableArray *countries;

    @property (strong, nonatomic) NSMutableArray *unitedKingdomCountries;

    @property (strong, nonatomic) NSMutableArray *nonUKCountries;

    ```


    现在，你需要修改 `-viewDidLoad` 方法以适应这一变化。从该方法中删除以下代码行：


    ```

        self.countries = [NSMutableArray arrayWithObjects:usa, france, england, scotland,
    spain, nil];

    ```


    然后将该行替换为以下代码，以正确组织你的国家：


    ```

        self.unitedKingdomCountries = [NSMutableArray arrayWithObjects:england, scotland,
    nil];

        self.nonUKCountries = [NSMutableArray arrayWithObjects:usa, france, spain,
    nil];

        self.countries = [NSMutableArray arrayWithObjects:unitedKingdomCountries,
    nonUKCountries, nil];

    ```


    现在进入稍微棘手的部分：你需要确保所有数据源和委托方法都调整为新格式。在每个方法中，你必须先获取分组的数组，然后再从中获取特定的国家。首先，修改 `-tableView:cellForRowAtIndexPath:`。修改后应如下所示：


    ```

    - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath {


    static NSString *CellIdentifier = @"Cell";


        UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];

        if (cell == nil)

        {

            cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle
    reuseIdentifier:CellIdentifier];

            cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;

    cell.textLabel.font = [UIFont systemFontOfSize: 19.0];

    cell.detailTextLabel.font = [UIFont systemFontOfSize: 12];

        }


        NSArray *group = [self.countries objectAtIndex:indexPath.section];

        Country *country = [group objectAtIndex:indexPath.row];

        cell.textLabel.text = country.name;

        cell.detailTextLabel.text = country.capital;

        UIImage *flag = country.flag;

    cell.imageView.image = [MainTableViewController scale:flag toSize:CGSizeMake(
    115, 75)];


        return cell;

    }

    ```


    接下来是 `-tableView:numberOfRowsInSection:`：


    ```

    -(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section

    {

        NSArray *group = [self.countries objectAtIndex:section];

        return [group count];

    }

    ```


    以下是 `-tableView:didSelectRowAtIndexPath:`：


    ```

    -(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath

    {

        [tableView deselectRowAtIndexPath:indexPath animated:YES];


        selectedIndexPath = indexPath;

        /////BEGIN MODIFIED CODE FOR GROUPED TABLE

        NSArray *group = [self.countries objectAtIndex:indexPath.section];

        Country *chosenCountry = [group objectAtIndex:indexPath.row];

        /////END OF MODIFIED CODE

        CountryInfoViewController *infoVC = [[CountryInfoViewController alloc] init];

        infoVC.delegate = self;

        infoVC.currentCountry = chosenCountry;


        [self.navigationController pushViewController:infoVC animated:YES];

    }

    ```


    以下是 `-tableView:accessoryButtonTappedForRowWithIndexPath:`：


    ```

    -(void)tableView:(UITableView *)tableView

    accessoryButtonTappedForRowWithIndexPath:(NSIndexPath *)indexPath

    {

        [tableView deselectRowAtIndexPath:indexPath animated:YES];


        selectedIndexPath = indexPath;

        ////BEGIN MODIFIED CODE FOR GROUPED TABLE

        NSArray *group = [self.countries objectAtIndex:indexPath.section];

        Country *chosenCountry = [group objectAtIndex:indexPath.row];

        ////END MODIFIED CODE FOR GROUPED TABLE

        CountryInfoViewController *infoVC = [[CountryInfoViewController alloc] init];

        infoVC.delegate = self;

        infoVC.currentCountry = chosenCountry;


        NSLog(@"Accessory Button Tapped");

        [self.navigationController pushViewController:infoVC animated:YES];

    }

    ```


    对于 `-tableView:moveRowAtIndexPath:toIndexPath:` 方法，为了简化编码，我们假设只移动同一分区内的行。稍后运行应用程序时你会发现，在当前实现中，`UITableView`
    不允许 `Country` 切换分组，这正好符合该特定应用的需求。对于可能需要让对象更改分组的应用，你应确保包含相应的代码。


    ```

    -(void)tableView:(UITableView *)tableView moveRowAtIndexPath:(NSIndexPath *)sourceIndexPath
    toIndexPath:(NSIndexPath *)destinationIndexPath

    {

        NSMutableArray *group = [self.countries objectAtIndex:sourceIndexPath.section];
    //Assume same Section

        if (destinationIndexPath.row < [group count])

        {

            [group exchangeObjectAtIndex:sourceIndexPath.row withObjectAtIndex:destinationIndexPath.row];

        }

        [self.tableViewCountries reloadData];

    }

    ```


    最后一个需要修复的方法是 `-tableView:commitEditingStyle:forRowAtIndexPath:`，修改后如下所示：


    ```

    -(void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle
    forRowAtIndexPath:(NSIndexPath *)indexPath

    {

        if (editingStyle == UITableViewCellEditingStyleDelete)

        {

            //////Changed code

            NSMutableArray *group = [self.countries objectAtIndex:indexPath.section];

            Country *deletedCountry = [group objectAtIndex:indexPath.row];

            [group removeObject:deletedCountry];

            //////End of changed code

    ```

    '
- fmt: "```objectivec\n[tableViewCountries deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\
    \ withRowAnimation:UITableViewRowAnimationAutomatic];\n}\nelse if (editingStyle\
    \ == UITableViewCellEditingStyleInsert)\n{\n    //////More changed code!\n   \
    \ NSMutableArray *group = [self.countries objectAtIndex:indexPath.section];\n\
    \    Country *copiedCountry = [group objectAtIndex:indexPath.row];\n    Country\
    \ *newCountry = [[Country alloc] init];\n    newCountry.name = copiedCountry.name;\n\
    \    newCountry.flag = copiedCountry.flag;\n    newCountry.capital = copiedCountry.capital;\n\
    \    newCountry.motto = copiedCountry.motto;\n\n    [group insertObject:newCountry\
    \ atIndex:indexPath.row+1];\n    //////End of changed code\n\n    [self.tableViewCountries\
    \ insertRowsAtIndexPaths:[NSArray arrayWithObject:[NSIndexPath indexPathForRow:indexPath.row+1\
    \ inSection:indexPath.section]] withRowAnimation:UITableViewRowAnimationRight];\n\
    }\n```\n\nFinally, since you did switch your `UITableView` over to a “grouped”\
    \ style, you need to implement just two extra methods to ensure correct functionality.\n\
    \nFirst, you need to specify exactly how many sections your `UITableView` will\
    \ have with the following method:\n\n```objectivec\n-(NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView\n{\n    return [self.countries count];\n}\n```\n\nSecond, you should\
    \ specify “headers” for each section, which will basically be the titles for your\
    \ groups. Since you already know how your data is formatted, this is pretty easy\
    \ to do.\n\n```objectivec\n-(NSString *)tableView:(UITableView *)tableView titleForHeaderInSection:(NSInteger)section\n\
    {\n    if (section == 0)\n    {\n        return @\"United Kingdom Countries\"\
    ;\n    }\n    return @\"Non-United Kingdom Countries\";\n}\n```\n\nIf your data\
    \ model was more complicated, you would probably want to have the names of your\
    \ groups stored somewhere with the groups themselves. Using an `NSDictionary`\
    \ would be a particularly good way to use this by making the headers, as strings,\
    \ the keys for your `NSArray` group objects.\n\nThe `UITableViewDelegate` protocol\
    \ also includes a method that allows the developer to customize the text displayed\
    \ in a Delete button when editing a `UITableView`. This method is entirely optional,\
    \ and will vary in its use based on the needs of any given application.\n\n```objectivec\n\
    -(NSString *)tableView:(UITableView *)tableView titleForDeleteConfirmationButtonForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    return NSLocalizedString(@\"Remove\", @\"Delete\");\n}\n\
    ```\n\nAfter all these changes, running your app should result in a view similar\
    \ to that in [Figure 9–17](#Chapter09.html#fig_9_17).\n\n![Image](images/9781430240051_Fig09-17.jpg)\n\
    \n**Figure 9–17.** *Your application with grouped items and section headers*\n\
    \nAs one final addition that you can make for your table, you can also add “footers”\
    \ to your sections. These work just like headers, but, as you might guess, appear\
    \ on the bottom of your groups. Here’s a quick method to add some (slightly silly)\
    \ footers to your `UITableView`.\n\n```objectivec\n-(NSString *)tableView:(UITableView\
    \ *)tableView titleForFooterInSection:(NSInteger)section\n{\n    if (section ==\
    \ 0)\n        return @\"I'm a footer!\";\n    return @\"Me too, I guess...\";\n\
    }\n```\n\nIn keeping with all the other vastly customizable parts of a `UITableView`,\
    \ these headers and footers are also incredibly easy to customize beyond a simple\
    \ `NSString`. If you use the methods `-tableView:viewForHeaderInSection:` and\
    \ `-tableView:viewForFooterInSection:`, you can programmatically create your own\
    \ subview to be used as a header or footer, allowing for full control over your\
    \ `UITableView`’s display.\n\nAt this point, you now have a fully functional grouped\
    \ `UITableView`, complete with all the same abilities as your ungrouped one! [Figure\
    \ 9–18](#Chapter09.html#fig_9_18) shows the final result of your setup.\n\n![Image](images/9781430240051_Fig09-18.jpg)\n\
    \n**Figure 9–18.** *Your completed grouped `UITableView` with both headers and\
    \ footers*\n\n### Summary\n\nThroughout this entire chapter, you have seen how\
    \ to programmatically create a `UITableView`, step-by-step, for two kinds of styles:\
    \ “plain” and “grouped.” You have also been given a glimpse at the amount of customization\
    \ control the developer has over the view and display of a `UITableView`, though\
    \ the full Apple documentation has a great deal more to say on the subject. You\
    \ have even included a great deal of functionality into your `UITableView`s to\
    \ provide them with the most powerful user interface. However, the key to `UITableView`s\
