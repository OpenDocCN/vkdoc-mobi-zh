    `NSLog(@"Written to iCloud");`

    `        }`

    `else`

    `        {`

    `NSLog(@"Error writing to iCloud");`

    `        }`

    `    }];`

    `}`


    Before you continue on to test your application, you must make sure that your
    test device is properly configured to work with iCloud. In the Settings app on
    your device, navigate to the iCloud section. In order for this application to
    properly store data, your iCloud account must be properly configured and verified.
    This will require you to have verified your e-mail address and registered it as
    your Apple ID. The item marked “Documents & Data” should also be set to “On”,
    as in [Figure 10–18](#Chapter10.html#fig_10_18). You can, of course, easily configure
    this once your account is verified.


    ![Image](images/9781430240051_Fig10-18.jpg)


    **Figure 10–18.** *Documents and Data must be enabled to store information in
    iCloud.*


    Assuming your device is correctly configured, your simple application should be
    able to correctly store documents using the user’s iCloud account, allowing you
    to easily persist data across multiple devices, application shutdowns, and even
    through system resets, as shown by [Figure 10–19](#Chapter10.html#fig_10_19) with
    a few slightly altered background colors, as mentioned earlier.


    ![Image](images/9781430240051_Fig10-19.jpg)


    **Figure 10–19.** *Your application with text saved and loaded from iCloud*


    ### Recipe 10–4: Storing Key-Value Data in iCloud


    Just as you were able to easily persist a variety of lightweight objects locally
    using the `NSUserDefaults` class at the beginning of this chapter, you are able
    to implement the same type of storage using the iCloud service. You will add this
    functionality to your application by keeping a count of the number of times that
    the text has been saved. While this may not seem like much, the ability to have
    such simple values remain synchronized in the same application across multiple
    devices opens up a whole world of development power.


    All key-value data handling with iCloud is done through the `NSUbiquitousKeyValueStore`
    class. You will add an instance of this class as a property to your `iCloudStoreViewController`
    file, making sure to synthesize and `nil` it as appropriate.


    `@property (strong, nonatomic) NSUbiquitousKeyValueStore *keyStore;`


    Next, you will do a slight rearrangement of your user interface to include two
    `UILabel`s, of which one will display your save count. Your view will now resemble
    [Figure 10–20](#Chapter10.html#fig_10_20).


    ![Image](images/9781430240051_Fig10-20.jpg)


    **Figure 10–20.** *Rearranging your XIB file with two new `UILabel`s*


    Connect the right `UILabel` (displaying the text “N” in [Figure 10–20](#Chapter10.html#fig_10_20))
    to your header using the property `countLabel`.


    `@property (strong, nonatomic) IBOutlet UILabel *countLabel;`


    You can configure your application to immediately check for any count upon loading
    by adding the following code to the end of your `-viewDidLoad` method.


    `self.keyStore = [[NSUbiquitousKeyValueStore alloc] init];`

    `double count = [self.keyStore doubleForKey:@"count"];`

    `self.countLabel.text = [NSString stringWithFormat:@"%f", count];`


    The following line, added after the foregoing ones, will allow you to receive
    notifications upon the changing of any values in your `NSUbiquitousKeyValueStore`,
    allowing you to keep your information updated across multiple devices.


    `[[NSNotificationCenter defaultCenter] addObserver:self selector:`

    `@selector(countChangeExternally:) name:`

    `NSUbiquitousKeyValueStoreDidChangeExternallyNotification object:self.keyStore];`


    You can implement the `-countChangeExternally:` method quite simply to set your
    `UILabel`’s text.


    `-(void)countChangeExternally:(id)sender`

    `{`

    `double count = [self.keyStore doubleForKey:@"count"];`

    `self.countLabel.text = [NSString stringWithFormat:@"%f", count];`

    `}`


    Finally, you need to instruct your `savePressed:` method to correctly update this
    value. You will do this only if your text is successfully saved, so your updated
    method will look like so:


    `- (void)savePressed:(id)sender`

    `{`

    `self.document.userText = self.textViewDisplay.text;`

    `    [self.document saveToURL:self.ubiquityURL`

    `forSaveOperation:UIDocumentSaveForOverwriting completionHandler:^(BOOL success)`

    `    {`

    `if (success)`

    `        {`

    `NSLog(@"Written to iCloud");`

    `double count = [self.countLabel.text doubleValue];`

    `            count += 1;`

    `self.countLabel.text = [NSString stringWithFormat:@"%f", count];`

    `            [self.keyStore setDouble:count forKey:@"count"];`

    `            [self.keyStore synchronize];`

    `        }`

    `else`

    `        {`

    `NSLog(@"Error writing to iCloud");`

    `        }`

    `    }];`

    `}`


    Your application should now be able to easily store your lightweight double value
    to keep track of your save count, as shown in [Figure 10–21](#Chapter10.html#fig_10_21)!


    ![Image](images/9781430240051_Fig10-21.jpg)


    **Figure 10–21.** *The app with both text and key-value information stored through
    iCloud*


    ### Summary


    Data persistence is almost always one of the most important considerations in
    developing an application. Developers must consider the type of data they wish
    to store, how much of it, how it connects, and whether their application might
    even stretch across multiple devices. From there, the choice must be made to decide
    which approach to use to storing data, whether it is the simple `NSUserDefaults`
    method, the powerful file management system, or the intricate Core Data framework
    (as discussed in the next chapter). In iOS 5.0, the new addition of access to
    the iCloud service has revolutionized the way that applications can store data,
    allowing persistence of data in near real time across devices running the same
    application. As memory, storage, and mobile applications continue to grow in size,
    importance, and relevance in the technological world, these topics will become
    even significantly more relevant. By firmly understanding the most up-to-date
    concepts of data persistence in iOS, you are able to always keep your users updated
    with the fastest, most efficient, and most powerful methods of storing data possible.


    ## Chapter 11


    ## Core Data Recipes


    One of the most common problems that developers face is the concept of persistence,
    or more simply, storing data. For certainly a very high percentage of applications,
    it is not enough to simply store information in your variables, as everything
    will be lost as soon as the application is closed. While the previous chapter
    covered a wide variety of options for storing data between uses, none of them
    can quite compare to the versatility, power, and simplicity of Core Data.


    There are a great many resources, including entire books (I highly recommend *Pro
    Core Data for iOS*, by Michael Privat and Robert Warner) that focus simply on
    the topic of Core Data. It would be ridiculous to assume that you could cover
    every part of such a multi-faceted concept in one chapter. For this reason, you
    will, instead of building your Core Data interface from the ground up, use pre-built
    Xcode templates in order to provide the easiest demonstration of the Core Data
    concepts. This way, you, as a developer, can more easily acquire a grasp of Core
    Data applications, and later focus on more targeted, complex points of the subject
    through other, more dedicated sources.'
