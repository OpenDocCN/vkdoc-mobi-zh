    \ `gameWon`, and `gameLost`.\n\n```\n- (void)match:(GKMatch *)match didReceiveData:(NSData\
    \ *)data fromPlayer:(NSString\n*)playerID\n{\n    NSKeyedUnarchiver *unarchiver\
    \ = [[NSKeyedUnarchiver alloc]\ninitForReadingWithData:data];\n    NSDictionary\
    \ *myDictionary = [unarchiver decodeObjectForKey:@\"DataDictionary\"];\n    [unarchiver\
    \ finishDecoding];\n    NSLog(@\"Received Dict: %@\", myDictionary);\n\n    if([myDictionary\
    \ valueForKey:@\"randomStartKey\"]!=nil){\n        NSNumber *otherRandomStartKey=[myDictionary\
    \ valueForKey:@\"randomStartKey\"];\n        if([otherRandomStartKey integerValue]>randomPlayerStartKey){\n\
    \            //If their random key is larger than mine, then they will send the\
    \ word\n\n        }else{\n            //My random key is larger so I will send\
    \ the word\n            UIAlertView *wordPrompt=[[UIAlertView alloc] initWithTitle:@\"\
    Enter Word:\"\nmessage:@\"Type the word they must decode\" delegate:self cancelButtonTitle:@\"\
    Cancel\"\notherButtonTitles:@\"OK\", nil];\n            wordPrompt.alertViewStyle=UIAlertViewStylePlainTextInput;\n\
    \            [wordPrompt show];\n        }\n    }else if([myDictionary valueForKey:@\"\
    WordToGuess\"]!=nil){\n//if they sent the word to guess\n        [self setWord:[myDictionary\
    \ valueForKey:@\"WordToGuess\"]];\n        [self.activityIndicator stopAnimating];\n\
    \    }else if([myDictionary valueForKey:@\"gameWon\"]!=nil){\n//if they won the\
    \ game\n        int guessCount=[[myDictionary valueForKey:@\"gameWon\"] integerValue];\n\
    \        [[[UIAlertView alloc] initWithTitle:@\"Your Opponent Won!\" message:[NSString\n\
    stringWithFormat:@\"Better luck next time.  %i bad guesses\", guessCount] delegate:nil\n\
    cancelButtonTitle:@\"OK\" otherButtonTitles:nil] show];\n    }else if([myDictionary\
    \ valueForKey:@\"gameLost\"]!=nil){\n        [[[UIAlertView alloc] initWithTitle:@\"\
    You Win!\" message:@\"They didn't guess your\nword\" delegate:nil cancelButtonTitle:@\"\
    OK\" otherButtonTitles:nil] show];\n    }\n}\n```\n\nSince you prompt for the\
    \ word to send, you should check your dictionary and make sure it is a legitimate\
    \ word. Since you set your class as a `UIAlertViewDelegate` in the `.h` file and\
    \ you set the delegate of the alert view prompt to self, you can add the following\
