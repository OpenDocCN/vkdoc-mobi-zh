    \ *)sender;\n        // Check if switch is \"on\"\n        if(locationSwitch.on){\n\
    \            // Check if _locationManager has been instantiated yet\n        \
    \    if(_locationManager==nil){\n                // Instantiate _locationManager\n\
    \                _locationManager = [[CLLocationManager alloc] init];\n      \
    \          _locationManager.desiredAccuracy=kCLLocationAccuracyBest;\n       \
    \         _locationManager.distanceFilter=1;\n_locationManager.purpose=@\"We will\
    \ only use your location information to display your\npresent location.  We will\
    \ not send it or record it.\";\n_locationManager.delegate=self;\n            }\n\
    \            // Start updating location\n            [_locationManager startUpdatingLocation];\n\
    \        }else{\n            // Check if _locationManager has been instantiated\
    \ yet\n            if(_locationManager!=nil){\n                // Stop updating\
    \ location\n                [_locationManager stopUpdatingLocation];\n       \
    \     }\n        }\n    }\n}\n```\n\n接下来需要设置委托方法。当接收到位置更新或获取位置出现错误时，会调用这些方法。您将首先处理错误委托方法。最常见的错误来源是当提示用户允许您的应用程序使用定位服务，而用户拒绝授权时。如果发生这种情况，您应通过调用`stopUpdatingLocation`方法停止请求位置更新：\n\
    \n```objc\n-(void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError\
    \ *)error{\n    if(error.code == kCLErrorDenied){\n[manager stopUpdatingLocation];\n\
    \    }\n}\n```\n\n处理位置更新的委托方法稍微复杂一些。方法`- locationManager:didUpdateToLocation:fromLocation:`会传递三个对象：发起位置更新请求的`CLLocationManager`，`newLocation`，以及`oldLocation`。这两个位置对象属于`CLLocation`类。该对象包含大量有价值的信息，包括位置坐标、精确度信息以及位置更新的时间戳。您将按如下方式实现此方法：\n\
    \n```objc\n-(void)locationManager:(CLLocationManager *)manager didUpdateToLocation:(CLLocation\n\
    *)newLocation fromLocation:(CLLocation *)oldLocation{\n    // Check to make sure\
    \ this is a recent location event\n    NSDate *eventDate=newLocation.timestamp;\n\
    \    NSTimeInterval eventInterval=[eventDate timeIntervalSinceNow];\n    if(abs(eventInterval)<30.0){\n\
    \        // Check to make sure the event is accurate\n        if(newLocation.horizontalAccuracy>=0\
    \ && newLocation.horizontalAccuracy<20){\n            self.labelLocation.text=newLocation.description;\n\
    \        }\n    }\n}\n```\n\n在您的应用程序处理`CLLocation`对象之前，您应检查该位置对象的时间戳是否是最新的。Core\
    \ Location 有一种习惯，在锁定新位置之前，会首先将上一次已知位置作为第一次调用传递给委托方法。当您需要知道设备当前的位置时，无需处理一个代表设备历史上某个时间点位置的对象。为此，您可以使用类似以下的代码，只处理当前时间\
    \ 20 秒内发生的位置事件：\n\n```objc\n    // Check to make sure this is a recent location\
    \ event\n    NSDate *eventDate=newLocation.timestamp;\n    NSTimeInterval eventInterval=[eventDate\
    \ timeIntervalSinceNow];\n    if(abs(eventInterval)<30.0){\n        // …process\
    \ event\n    }\n```"
- fmt: "在处理事件之前，你需要检查的另一个属性是其准确性。同样，如果事件的准确性不在你期望的范围内，就没有必要处理它。与其向用户提供错误信息，不如等待设备获取更准确的读数。`CLLocation`对象包含两个准确性属性：`horizontalAccuracy`和`verticalAccuracy`。\n\
    \n`horizontalAccuracy`属性表示位置可能位于的圆的半径（以米为单位）。在显示你的位置时，可以在内置的“地图”应用中看到这个圆。负值表示坐标无效。\n\
    \n`verticalAccuracy`属性表示设备海拔可能偏差的范围（以米为单位，正负值）。同样，负值表示海拔读数无效。如果设备没有GPS，`verticalAccuracy`属性将始终为负，因为需要GPS才能确定设备的海拔。\n\
    \n以下是一些处理`horizontalAccuracy`的示例代码：\n\n```\nif(newLocation.horizontalAccuracy>=0\
    \ && newLocation.horizontalAccuracy<20){\n    //…process event\n}\n```\n\n我想讨论的另一个属性是`description`属性。`description`属性以`NSString`格式返回`CLLocation`对象的位置信息。这是一种查看设备返回的位置信息的简便方法。我不建议直接向最终用户显示此字符串，因为它包含大量信息，因此格式不适合向用户展示，但对于调试和验证位置信息是否正在更新且正确/准确来说，它可能很有用。在本项目中，你将`labelLocation`文本设置为`newLocation.description`的值，从而完成了之前的委托方法。\n\
    \n借助Xcode 4.2，你现在可以在iOS模拟器中模拟位置信息。在这个出色的功能出现之前，你需要将应用程序加载到测试设备上，然后跑到室外测试定位功能。大多数情况下，你可能会漏掉某些内容，不得不反复操作。然而，这无疑是一种让开发者离开椅子、走到阳光下的好方法。\n\
    \n在iOS模拟器中启动`Chapter4SampleProject`。当你将`UISwitch`触摸到“On”时，系统将提示你允许此应用程序访问设备的位置。你会在[Figure\
    \ 4–7](#Chapter04.html#fig_4_7)中注意到，显示的是你在`CLLocationManager`的`purpose`属性中设置的字符串。点击“OK”继续。\n\
    \n![Image](images/9781430240051_Fig04-07.jpg)\n\n**Figure 4–7.** 你的应用程序请求位置权限\n\
    \n点击“OK”后，你会注意到即使`UISwitch`处于打开状态，`labelLocation`也没有更新，如[Figure 4–8](#Chapter04.html#fig_4_8)所示。\n\
    \n![Image](images/9781430240051_Fig04-08.jpg)\n\n**Figure 4–8.** 没有任何位置数据的模拟应用程序\n\
    \n这是因为你还没有开始任何位置模拟。在iOS模拟器中，进入菜单 **Debug** ![Image](images/U001.jpg) **Location**\
    \ ![Image](images/U001.jpg) **Freeway Drive**，`labelLocation`应该开始更新，显示Apple提供的预录行驶信息。[Figure\
    \ 4–9](#Chapter04.html#fig_4_9)显示了模拟行驶传递的信息示例。\n\n![Image](images/9781430240051_Fig04-09.jpg)\n\
    \n**Figure 4–9.** 显示模拟的位置信息\n\n### Recipe 4–2: 重大位置变化\n\n重大位置变化服务提供了两个重要优势：速度快，并且可以在后台运行。两种定位服务使用的大量代码是相同的，设置也几乎相同，但我将指出不同之处。让我们新建一个名为`Chapter4SignificantLocationTracker`的单视图项目，如果你的Xcode版本允许，类前缀也使用相同的名称。\n\
    \n首先，将Core Location框架添加到项目中。如果你需要关于如何添加此框架的提示，请返回上一节查看步骤。\n\n要启用后台定位服务，你需要在`Info.plist`中添加一个键。在导航器窗格中选择项目，然后选择项目的目标。切换到“Info”选项卡，并在“Custom\
    \ iOS Target Properties”列表中添加一行。你要添加的键是“Required background modes”或`UIBackgroundModes`。现在，将“App\
    \ registers for location updates”添加到Item 0。你的结果应该类似于[Figure 4–10](#Chapter04.html#fig_4_10)。\n\
    \n![Image](images/9781430240051_Fig04-10.jpg)\n\n**Figure 4–10.** 将位置变化指定为必需的后台模式\n\
    \n你将像上一节一样设置`.xib`文件，如[Figure 4–11](#Chapter04.html#fig_4_11)所示。\n\n![Image](images/9781430240051_Fig04-11.jpg)\n\
    \n**Figure 4–11.** 熟悉的用户界面\n\n将位置标签连接到名为`labelLocation`的出口，并将`UISwitch`连接到名为`toggleLocationServices`的操作，如[Figures\
    \ 4–12](#Chapter04.html#fig_4_12)和[4–13](#Chapter04.html#fig_4_13)所示。\n\n![Image](images/9781430240051_Fig04-12.jpg)\n\
    \n**Figure 4–12.** 将最新的`UILabel`连接到出口\n\n![Image](images/9781430240051_Fig04-13.jpg)\n\
    \n**Figure 4–13.** 创建切换操作\n\n你的接口文件（`.h`）的设置将完全相同：\n\n```\n//  Chapter4SignificantLocationTrackerViewController.h\n\
    \n#import <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\n@interface\
    \ Chapter4SignificantLocationTrackerViewController : UIViewController\n<CLLocationManagerDelegate>{\n\
    \    CLLocationManager *_locationManager;\n    UILabel *labelLocation;\n}\n@property\
    \ (strong, nonatomic) IBOutlet UILabel *labelLocation;\n- (IBAction)toggleLocationServices:(id)sender;\n\
    \n@end\n```\n\n现在切换到你的实现文件（`.m`）并滚动到`- (IBAction)toggleLocationServices:(id)sender`方法。你将首先检查定位服务是否已启用，如果未启用，则显示`UIAlertView`：\n\
    \n```\n    //Check if location services are enabled\n    if(![CLLocationManager\
    \ locationServicesEnabled]){\n        UIAlertView *alertLocation = [[UIAlertView\
    \ alloc] initWithTitle:@\"Location\nServices Needed\" message:@\"Location services\
    \ are needed to make this app functional\"\ndelegate:nil cancelButtonTitle:@\"\
    OK\" otherButtonTitles: nil];\n        [alertLocation show];\n        return;\n\
    \    }\n```\n\n其余代码与你之前所做的非常相似，但有一些例外。首先，你不需要指定`desiredAccuracy`和`distanceFilter`属性。你仍然应该指定`purpose`属性，以便用户知道你将如何使用他们的位置。\n\
    \n```\nif([sender isKindOfClass:[UISwitch class]]){\n        UISwitch *locationSwitch=(UISwitch\
    \ *)sender;\n        if(locationSwitch.on){\n            //Check if _locationManager\
    \ has been instantiated\n            if(_locationManager==nil){\n            \
    \    //Instantiate _locationManager\n                _locationManager = [[CLLocationManager\
    \ alloc] init];\n                _locationManager.purpose=@\"We will only use\
    \ your location locally.  We\nwill not record it or send it to anyone\";\n   \
    \             _locationManager.delegate=self;\n            }\n….\n```"
  raw: 'The other property you need to check before you process an event is its accuracy.
    Again, there is no need to process an event if it is not within the accuracy bounds
    that you are expecting. It might be better to wait for the device to obtain a
    more accurate reading than to present bad information to the user. The `CLLocation`
    object contains two accuracy properties: `horizontalAccuracy` and `verticalAccuracy`.


    The `horizontalAccuracy` property represents the radius of the circle, in meters,
    that the location could be located within. You can see this circle in the built-in
    Maps application when you are showing your location. A negative value indicates
    that the coordinate is invalid.


    The `verticalAccuracy` property is how far, plus or minus in meters, the altitude
    of the device could be off. Again, a negative value indicates an invalid altitude
    reading. If the device does not have a GPS, the `verticalAccuracy` property will
    always be negative because a GPS is needed to determine the device''s altitude.


    Here is some sample code to handle `horizontalAccuracy`:


    `        if(newLocation.horizontalAccuracy>=0 && newLocation.horizontalAccuracy<20){`

    `            //…process event`

    `        }`


    One more property that I want to discuss is the `description` property. The `description`
    property returns the location information of a `CLLocation` object in an `NSString`
    format. It is a very easy method for seeing what location information is being
    returned by the device. I don''t recommend showing this string to the end user
    directly, as it contains a great deal of information, and thus is not well formatted
    for display to the user, but it could be useful for debugging and verifying that
    location information is being updated and is correct/accurate. For this project,
    you have set your `labelLocation` text to the `newLocation.description` value,
    resulting in the previous completed delegate method.


    With Xcode 4.2, you can now simulate location information in the iOS simulator.
    Prior to this fantastic feature, you would load up your application onto your
    test device and then go running outside to test out the location features. Most
    of the time you would misssomething and have to do this over and over again. However,
    it certainly was a great way to get developers out of their chairs and into the
    sunlight.


    Launch the Chapter4SampleProject on the iOS simulator. When you touch the `UISwitch`
    to “On”, you will be prompted to allow this application access to your device''s
    location. You will notice in [Figure 4–7](#Chapter04.html#fig_4_7) that the string
    you set in the `purpose` property of your `CLLocationManager` is displayed. Click
    OK to continue.


    ![Image](images/9781430240051_Fig04-07.jpg)


    **Figure 4–7.** *Your application requesting location permissions*


    After clicking OK, you will notice that your `labelLocation` is not updating even
    though the `UISwitch` is on, as in [Figure 4–8](#Chapter04.html#fig_4_8).


    ![Image](images/9781430240051_Fig04-08.jpg)


    **Figure 4–8.** *Simulated application without any location data*


    This is because you haven''t started any location simulations yet. In the iOS
    simulator, go to the menu **Debug** ![Image](images/U001.jpg) **Location** ![Image](images/U001.jpg)
    **Freeway Drive**, and the `labelLocation` should start to update with information
    about the pre-recorded drive that Apple has provided. [Figure 4–9](#Chapter04.html#fig_4_9)
    shows a sample of information delivered by the simulated drive.


    ![Image](images/9781430240051_Fig04-09.jpg)


    **Figure 4–9.** *Displaying simulated location information*


    ### Recipe 4–2: Significant Location Changes


    The significant location change service provides two significant benefits: it
    is fast and it can run in the background. A lot of the code used between the two
    location services is the same, and the setup is virtually identical, but I will
    point out the differences. Let''s start a new single view project named Chapter4SignificantLocationTracker,
    with an identically named class prefix if your version of Xcode allows.


    Start by adding the Core Location framework to the project. If you need a reminder
    of how to add this framework, go back to the previous section to see the steps.


    To enable background location services, you need to add a key to the `Info.plist`.
    Select the project in the navigator pane, and select your project''s target. Switch
    over to the Info tab, and add a row to the Custom iOS Target Properties listing.
    The key you want to add is “Required background modes” or `UIBackgroundModes`.
    Now add the “App registers for location updates” to Item 0\. Your result should
    resemble [Figure 4–10](#Chapter04.html#fig_4_10).


    ![Image](images/9781430240051_Fig04-10.jpg)


    **Figure 4–10.** *Specifying location changes as a required background mode*


    You are going to set up the `.xib` file exactly as you did in the previous section,
    as shown by [Figure 4–11](#Chapter04.html#fig_4_11).


    ![Image](images/9781430240051_Fig04-11.jpg)


    **Figure 4–11.** *Your familiar user interface*


    Connect the location label to an outlet named `labelLocation`, and connect the
    `UISwitch` to an action named `toggleLocationServices`, as shown in [Figures 4–12](#Chapter04.html#fig_4_12)
    and [4–13](#Chapter04.html#fig_4_13).


    ![Image](images/9781430240051_Fig04-12.jpg)


    **Figure 4–12.** *Connecting your newest `UILabel` to an outlet*


    ![Image](images/9781430240051_Fig04-13.jpg)


    **Figure 4–13.** *Creating your toggling action*


    Your interface file (`.h`) is going to be set up exactly the same:


    `//  Chapter4SignificantLocationTrackerViewController.h`


    `#import <UIKit/UIKit.h>`

    `#import <CoreLocation/CoreLocation.h>`


    `@interface Chapter4SignificantLocationTrackerViewController : UIViewController`

    `<CLLocationManagerDelegate>{`

    `    CLLocationManager *_locationManager;`

    `    UILabel *labelLocation;`

    `}`

    `@property (strong, nonatomic) IBOutlet UILabel *labelLocation;`

    `- (IBAction)toggleLocationServices:(id)sender;`


    `@end`


    Now switch to your implementation file (`.m`) and scroll down to the `- (IBAction)toggleLocationServices:(id)sender`
    method. You''ll start by checking that location services are enabled and presenting
    a `UIAlertView` if they are not:


    `    //Check if location services are enabled`

    `    if(![CLLocationManager locationServicesEnabled]){`

    `        UIAlertView *alertLocation = [[UIAlertView alloc] initWithTitle:@"Location`

    `Services Needed" message:@"Location services are needed to make this app functional"`

    `delegate:nil cancelButtonTitle:@"OK" otherButtonTitles: nil];`

    `        [alertLocation show];`

    `        return;`

    `    }`


    The rest of the code will be very similar to what you have done before, with a
    few exceptions. The first is that you do not need to specify the `desiredAccuracy`
    and `distanceFilter` properties. You should still specify the `purpose` property
    so users will know what you are going to do with their location.


    `if([sender isKindOfClass:[UISwitch class]]){`

    `        UISwitch *locationSwitch=(UISwitch *)sender;`

    `        if(locationSwitch.on){`

    `            //Check if _locationManager has been instantiated`

    `            if(_locationManager==nil){`

    `                //Instantiate _locationManager`

    `                _locationManager = [[CLLocationManager alloc] init];`

    `                _locationManager.purpose=@"We will only use your location locally.  We`

    `will not record it or send it to anyone";`

    `                _locationManager.delegate=self;`

    `            }`

