    #### Adding a Storyboard to an Existing Project


    You’ve created this “About Us” app, which works well, but it is pretty unimpressive
    on its own. It is meant to be included in your other apps so that you can easily
    show information about your company in any of your apps and also cross-promote
    your app library easily.


    Apple has provided an API for storyboards so that they can easily be included
    in existing apps that may not leverage storyboards yet. The `UIStoryboard` class
    provides the method `+storyboardWithName:bundle:` that will load a storyboard
    with the given name. You can then load the initial view controller in the storyboard
    with the method `– instantiateInitialViewController.`


    Let’s create a new project called “Chapter2Project” without storyboards. Use the
    menu option **File** ![Image](images/U001.jpg) **New** ![Image](images/U001.jpg)
    **New Project…** to create a new single view application. The window in which
    you do this will resemble [Figure 2–69](#Chapter02.html#fig_2_69).


    ![Image](images/9781430240051_Fig02-69.jpg)


    **Figure 2–69.** *Selecting a single view application*


    And this time, you will call the project “Chapter2Project” and make sure that
    Use Storyboard is not selected, just as in [Figure 2–70](#Chapter02.html#fig_2_70).
    If your version of Xcode includes it, make sure the Use Automatic Reference Counting
    box is checked as well. If your version also includes a field for Class Prefix,
    set this to Chapter2Project.


    ![Image](images/9781430240051_Fig02-70.jpg)


    **Figure 2–70.** *Configuring a new project without storyboards*


    Using the navigation pane of this new project, create a new group under the project
    named “AboutUsStoryBoard”, the result of which is shown in [Figure 2–71](#Chapter02.html#fig_2_71).


    ![Image](images/9781430240051_Fig02-71.jpg)


    **Figure 2–71.** *Adding a subgroup to the project*


    Now select `Chapter2ProjectViewController.xib`, and add a `UIButton` that will
    launch your About Us view when you touch it. Your view should resemble that shown
    in [Figure 2–72](#Chapter02.html#fig_2_72).


    ![Image](images/9781430240051_Fig02-72.jpg)


    **Figure 2–72.** *Configured view controller’s interface*


    Let’s go ahead and connect that About Us button to an `IBAction` by using the
    Assistant Editor and doing a ^-click-drag from the `UIButton` to the `Chapter2ProjectViewController`
    interface file (`.h`). Change the connection type to Action, and enter **showAboutUsView**
    for the Name, as shown in [Figure 2–73](#Chapter02.html#fig_2_73).


    ![Image](images/9781430240051_Fig02-73.jpg)


    **Figure 2–73.** *Configuring the `UIButton`’s action*


    Before you can complete that method placeholder, you need to copy your About Us
    files to this project. Switch to the About Us project, and, so you don’t get the
    About Us storyboard confused with any future storyboards you might add to projects,
    you should rename the storyboard. In the project navigator pane, change the name
    of `MainStoryboard.storyboard` to `AboutUs.storyboard`. If you have opted to create
    a universal app, this will initially be called `MainStoryboard_iPhone.storyboard`
    instead. In [Figure 2–74](#Chapter02.html#fig_2_74), you can see the storyboard
    file renamed to the new name.


    ![Image](images/9781430240051_Fig02-74.jpg)


    **Figure 2–74.** *Renaming the storyboard file for the new project*


    Now select all the files in the AboutUs group except the `aboutUsAppDelegate.h`/`.m`
    files, and copy them to the Chapter2Project project in the AboutUs group you created
    previously. If you move these files via “drag and drop,” make sure that the box
    marked “Copy items into destination group’s folder” is checked in the resulting
    transfer window. [Figure 2–75](#Chapter02.html#fig_2_75) shows the resulting navigator
    pane with your files copied from your previous project.


