    `{`

    `    self.player.volume = sender.value;`

    `}`

    `-(void)panSliderChanged:(UISlider *)sender`

    `{`

    `    self.player.pan = sender.value;`

    `}`

    `-(void)rateSliderChanged:(UISlider *)sender`

    `{`

    `    self.player.rate = sender.value;`

    `}`


    Now, you will implement your button action methods, which are also quite simple.


    `-(void)vibratePressed:(id)sender`

    `{`

    `    AudioServicesPlaySystemSound(kSystemSoundID_Vibrate);`

    `}`

    `-(void)playPressed:(id)sender`

    `{`

    `    [self.player play];`

    `}`

    `-(void)pausePressed:(id)sender`

    `{`

    `    [self.player pause];`

    `}`


    The `AudioServicesPlaySystemSound()` is a function defined in the Audio Toolbox
    that plays pre-defined system sounds, such as the one just shown, which causes
    the phone to vibrate. You can also register your own sound systems with certain
    file types.


    **NOTE:** While most of the AV Foundation functionalities that you are currently
    working with will work on the simulator using your computer''s microphone and
    speakers, the foregoing vibrate sound will not. You will need a physical device
    to test this functionality.


    At this point, your app should be able to successfully play and pause your music,
    and you can adjust your playback rate, pan, and volume, and monitor your output
    levels.'
  trans: "\n如同你在之前的代码中做过的那样，你需要按住 ^（Ctrl）键，将视图像素从元素拖拽到视图控制器的头文件中，从而将一些视图对象连接到头文件。根据情况将\
    \ `UISlider` 命名为 `sliderRate`、`sliderPan` 和 `sliderVolume`。你的 `UIButton` 将命名为\
    \ `vibrateButton`、`playButton` 和 `pauseButton`。顶部的两个用于电平监测的 `UILabel`（目前我已为其设置了默认值\
    \ \"0.0\"）将命名为 `averageLabel` 和 `peakLabel`。你需要在头文件中定义三个方法（类型为 `IBAction`，而非 `void`），分别对应三个按钮，并通过按住\
    \ ⌃ 键从按钮拖拽到方法定义处，将它们与按钮连接起来。你还需要再定义三个方法，用于连接你的 `UISlider`。现在，你的头文件应如下所示：\n\n```objc\n\
    #import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n#import <AudioToolbox/AudioToolbox.h>\n\
    \n@interface PlayerViewController : UIViewController\n@property (strong, nonatomic)\
    \ IBOutlet UIButton *vibrateButton;\n@property (strong, nonatomic) IBOutlet UIButton\
    \ *playButton;\n@property (strong, nonatomic) IBOutlet UIButton *pauseButton;\n\
    @property (strong, nonatomic) IBOutlet UISlider *sliderVolume;\n@property (strong,\
    \ nonatomic) IBOutlet UISlider *sliderPan;\n@property (strong, nonatomic) IBOutlet\
    \ UISlider *sliderRate;\n@property (strong, nonatomic) IBOutlet UILabel *averageLabel;\n\
    @property (strong, nonatomic) IBOutlet UILabel *peakLabel;\n-(IBAction)vibratePressed:(id)sender;\n\
    -(IBAction)playPressed:(id)sender;\n-(IBAction)pausePressed:(id)sender;\n\n-(IBAction)volumeSliderChanged:(UISlider\
    \ *)sender;\n-(IBAction)panSliderChanged:(UISlider *)sender;\n-(IBAction)rateSliderChanged:(UISlider\
    \ *)sender;\n\n@end\n```\n\n你还需要在头文件中添加一个属性来跟踪你的 `AVAudioPlayer`，具体写法如下：\n\n```objc\n\
    @property (nonatomic, strong) AVAudioPlayer *player;\n```\n\n在实现文件中合成这个新属性，并将以下代码行添加到你的\
    \ `-viewDidUnload` 方法中，以确保你的应用程序在内存使用上尽可能高效。\n\n```objc\nself.player.delegate\
    \ = nil;\n[self setPlayer:nil];\n```\n\n头文件中的最后一步是让你的视图控制器遵循 `AVAudioPlayerDelegate`\
    \ 协议。\n\n```objc\n@interface PlayerViewController : UIViewController <AVAudioPlayerDelegate>\n\
    ```\n\n在继续之前，你需要选择并导入你的应用程序将要播放的声音文件。我使用的文件名为 `systemCheck.mp3`，以下代码将反映这个文件名。你需要根据自己选择的文件更改文件名或文件类型。你应该查阅\
    \ Apple 的文档，了解哪些文件类型是合适的，但可以相当安全地假设，大多数常用文件类型（如 `.wav` 或 `.mp3`）都能正常工作。\n\n为了捕获播放文件时可能出现的任何错误，你可以实现\
    \ `AVAudioPlayerDelegate` 协议中的一个方法：\n\n```objc\n-(void)audioPlayerDecodeErrorDidOccur:(AVAudioPlayer\
    \ *)player error:(NSError *)error\n{\n    NSLog(@\"播放文件时出错：%@\", [error localizedDescription]);\n\
    }\n```\n\n在访达中找到你的音频片段，然后点击并将其拖拽到 Xcode 的项目中。我个人倾向于将此类文件放在 Supporting Files 组中，但这完全是可选的。随后会弹出一个对话框，提示你选择添加文件的选项。你可能唯一需要修改的是，确保“将项目复制到目标组的文件夹中（如果需要）”旁边的复选框已勾选，如图\
    \ 7-4 所示。\n\n![图片](img/9781430240051_Fig07-04.jpg)\n\n**图 7-4.** *导入文件的弹出对话框——确保第一个复选框已勾选。*\n\
    \n现在你有了声音文件，就可以实现 `-viewDidLoad` 方法来设置你的 `AVAudioPlayer` 了。\n\n```objc\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    NSString *fileName = @\"systemCheck\";\n    NSString\
    \ *fileType = @\"mp3\";\n    NSString *soundFilePath = [[NSBundle mainBundle]\
    \ pathForResource:fileName ofType:fileType];\n    NSURL *soundFileURL = [NSURL\
    \ fileURLWithPath:soundFilePath];\n\n    NSError *error;\n    self.player = [[AVAudioPlayer\
    \ alloc] initWithContentsOfURL:soundFileURL error:&error];\n    self.player.enableRate\
    \ = YES; // 允许我们改变播放速率\n    self.player.meteringEnabled = YES; // 允许我们监测电平\n \
    \   self.player.delegate = self;\n    self.sliderVolume.value = self.player.volume;\n\
    \    self.sliderRate.value = self.player.rate;\n    self.sliderPan.value = self.player.pan;\n\
    \n    [self.player prepareToPlay]; // 预加载音频以减少延迟\n\n    NSTimer *timer = [NSTimer\
    \ scheduledTimerWithTimeInterval:0.1 target:self\n    selector:@selector(updateLabels)\
    \ userInfo:nil repeats:YES];\n\n    [timer fire];\n}\n```\n\n如你所见，你已获取了声音文件的 URL，并用它创建了\
    \ `AVAudioPlayer`。你设置了 `enableRate` 属性以允许更改播放速率，并设置了 `meteringEnabled` 属性以允许监测播放器的电平。你调用了播放器上的可选方法\
    \ `-prepareToPlay` 来预加载声音文件，这有望让你的应用程序运行得更快一些。最后，你创建了一个定时器，它会以每秒十次的频率执行你的 `-updateLabels`\
    \ 方法。这样，你就能让标签以近乎恒定的速率更新了。\n\n现在，我们来为 `-updateLabels` 方法提供一个简单的实现。\n\n```objc\n\
    -(void)updateLabels\n{\n    [self.player updateMeters];\n    self.averageLabel.text\
    \ = [NSString stringWithFormat:@\"%f\", [self.player\n    averagePowerForChannel:0]];\n\
    \    self.peakLabel.text = [NSString stringWithFormat:@\"%f\", [self.player\n\
    \    peakPowerForChannel:0]];\n}\n```\n\n任何时候使用 `-averagePowerForChannel` 或 `-peakPowerForChannel`\
    \ 方法时，你都需要调用 `-updateMeters`，才能获取最新的信息，因为这些值不会自动刷新。这两个方法都接受一个 `NSUInteger` 类型的参数，用于指定要检索信息的声道。传入值\
    \ 0 表示指定立体声轨道的左声道，或单声道轨道的唯一声道。鉴于你只是对该功能进行基本使用，声道 0 是一个很好的默认值。\n\n接下来，你将实现你的 `UISlider`\
    \ 的操作方法，这些方法会在滑块值每次改变时执行。\n\n```objc\n-(void)volumeSliderChanged:(UISlider *)sender\n\
    {\n    self.player.volume = sender.value;\n}\n-(void)panSliderChanged:(UISlider\
    \ *)sender\n{\n    self.player.pan = sender.value;\n}\n-(void)rateSliderChanged:(UISlider\
    \ *)sender\n{\n    self.player.rate = sender.value;\n}\n```\n\n现在，你将实现你的按钮操作方法，这些方法也同样简单。\n\
    \n```objc\n-(void)vibratePressed:(id)sender\n{\n    AudioServicesPlaySystemSound(kSystemSoundID_Vibrate);\n\
    }\n-(void)playPressed:(id)sender\n{\n    [self.player play];\n}\n-(void)pausePressed:(id)sender\n\
    {\n    [self.player pause];\n}\n```\n\n`AudioServicesPlaySystemSound()` 是 Audio\
    \ Toolbox 中定义的一个函数，用于播放预定义的系统声音，例如刚刚演示的让手机振动的声音。你也可以使用某些文件类型注册自己的系统声音。\n\n**注意：**\
    \ 虽然当前使用的大部分 AV Foundation 功能可以在模拟器上通过电脑的麦克风和扬声器正常工作，但上述的振动声音则不行。你需要使用实体设备来测试此功能。\n\
    \n至此，你的应用程序应该能够成功播放和暂停音乐，并且你可以调整播放速率、声像和音量，以及监测你的输出电平。\n"
- fmt: "每当处理包含声音或音乐的应用程序时，总会担心应用被电话或短信中断。您应该始终包含处理这些问题的功能。这可以通过`AVAudioPlayer`委托方法来实现。由于您已将视图控制器设置为`AVAudioPlayer`的委托，只需实现这些方法，即可在中断开始或结束时分别暂停和播放声音片段。\n\
    \n```\n-(void)audioPlayerBeginInterruption:(AVAudioPlayer *)player\n{\n    [self.player\
    \ pause];\n}\n-(void)audioPlayerEndInterruption:(AVAudioPlayer *)player\n{\n \
    \   [self.player play];\n}\n```\n\n这是这些委托方法的一个极其简单的实现。对于您的应用，您可能选择添加更多功能，例如在应用被中断前保存数据或执行其他必要任务。\n\
    \n现在您应该能够看到使用`AVAudioPlayer`的灵活性，尽管它使用简单。通过使用多个`AVAudioPlayer`实例，您可以实现使用多个声音同时播放的复杂音频设计。例如，可以在一个`AVAudioPlayer`中运行背景音乐曲目，并使用另外一到两个来处理基于事件的声音效果。`AVAudioPlayer`类的强大、简洁和灵活性使其在iOS开发者中广受欢迎。\n\
    \n## Recipe 7–2: Recording Audio\n\n既然您已经处理了播放音频的关键概念，接下来可以处理相反的操作：录制音频。这个过程在结构和实现上与播放音频非常相似。您将使用`AVAudioRecorder`类进行录音，并结合另一个`AVAudioPlayer`来处理录制的回放。\n\
    \n创建一个新项目，命名为“Chapter7Recipe2”，类前缀为“Recording”，使用单视图应用程序模板。\n\n您需要再次将AV Foundation框架导入到项目中。请参考之前的食谱了解如何操作。与之前的食谱不同，本项目中不需要Audio\
    \ Toolbox框架，因为您不会包含设备震动功能。确保在视图控制器的头文件中添加以下导入语句：\n\n```\n#import <AVFoundation/AVFoundation.h>\n\
    ```\n\n接下来，在控制器的XIB文件中设置视图，使其看起来如图7-5所示。\n\n![Image](images/9781430240051_Fig07-05.jpg)\n\
    \n**Figure 7–5.** 录制和播放音频的用户界面\n\n接下来，将两个按钮以及两个监控标签连接到头文件。切换到助理编辑器。按住^（Ctrl）并从视图元素拖到头文件，将按钮和标签连接到头文件。在本项目中，我将按钮命名为`recordButton`、`playButton`，标签命名为`averageLevel`和`peakLevel`。\n\
    \n您还需要为按钮定义两个操作方法，分别命名为`recordPressed:`和`playPressed:`，并将按钮连接到它们。为此，再次按住^（Ctrl），从XIB文件中的每个按钮拖到其对应的头文件操作。\n\
    \n在进入实现文件之前，需要在头文件中添加一个名为`url`的实例变量，类型为`NSURL`，用于跟踪录制保存的位置。最后，需要添加两个属性，一个用于`AVAudioPlayer`，命名为`player`，另一个用于`AVAudioRecorder`，命名为`audioRecorder`。确保在实现文件中正确合成它们，并在`viewDidUnload`方法中将它们（以及它们的委托）设置为`nil`。此时，您的头文件应如下所示：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\n@interface\
    \ RecordingViewController : UIViewController {\n    NSURL *url;\n}\n\n@property\
    \ (strong, nonatomic) IBOutlet UIButton *recordButton;\n@property (strong, nonatomic)\
    \ IBOutlet UIButton *playButton;\n@property (strong, nonatomic) IBOutlet UILabel\
    \ *averageLevel;\n@property (strong, nonatomic) IBOutlet UILabel *peakLevel;\n\
    \n@property (strong, nonatomic) AVAudioRecorder *audioRecorder;\n@property (strong,\
    \ nonatomic) AVAudioPlayer *player;\n\n-(IBAction)recordPressed:(id)sender;\n\
    -(IBAction)playPressed:(id)sender;\n\n@end\n```\n\n现在，编写`viewDidLoad`方法，它与上一个食谱中的方法非常相似。\n\
    \n```\n-(void)viewDidLoad\n{\n    [super viewDidLoad];\n    url = [self tempFileURL];\n\
    \    self.audioRecorder = [[AVAudioRecorder alloc] initWithURL:url settings:nil\
    \ error:nil];\n    self.audioRecorder.meteringEnabled = YES;\n\n    NSTimer *timer\
    \ = [NSTimer scheduledTimerWithTimeInterval:0.01 target:self\n    selector:@selector(updateLabels)\
    \ userInfo:nil repeats:YES];\n    [timer fire];\n\n    [self.audioRecorder prepareToRecord];\n\
    }\n```\n\n与上一个食谱一样，您向`AVAudioRecorder`发送`prepareToRecord`操作，以帮助提高应用的运行速度。您还设置了一个定时器来重复更新电平监控标签。\n\
    \n上述实现使用了`tempFileURL`方法来获取URL，该方法的实现如下。为了避免编译器警告，请确保在`viewDidLoad`方法之前包含此方法，或者简单地在头文件中声明其处理程序`-(NSURL\
    \ *)tempFileURL:`。"
  raw: 'Whenever you are dealing with an app that has sound or music involved, there
    is always a concern that your app may be interrupted by a phone call or text,
    and you should always include functionality to deal with these concerns. This
    is done through the `AVAudioPlayer` delegate methods. Since you have already set
    your view controller as your `AVAudioPlayer`''s delegate, you simply need to implement
    these methods to pause and play your sound clip when an interruption begins or
    ends, respectively.


    `-(void)audioPlayerBeginInterruption:(AVAudioPlayer *)player`

    `{`

    `    [self.player pause];`

    `}`

    `-(void)audioPlayerEndInterruption:(AVAudioPlayer *)player`

    `{`

    `    [self.player play];`

    `}`


    This is an incredibly simple implementation of these delegate methods. For your
    app, you may choose to add in further functionality to possibly save data or any
    other tasks that might need to be done before an application is interrupted.


    You should now be able to see the flexibility with which you can use the `AVAudioPlayer`,
    despite its simplistic use. By using multiple instances of `AVAudioPlayer`, you
    can implement complex audio designs using multiple sounds at the same time. One
    could possibly have a background music track running in one `AVAudioPlayer`, and
    have one or two others to handle event-based sound effects. The power, simplicity,
    and flexibility of the `AVAudioPlayer` class are what make it so popularly used
    among iOS developers.


    ### Recipe 7–2: Recording Audio


    Now that you have dealt with the key concept of playing audio, you can deal with
    the reverse: recording audio. This process is very similar in both structure and
    implementation to playing audio. You will use the `AVAudioRecorder` class to do
    your recording in conjunction with another `AVAudioPlayer` to handle the playback
    of your recording.


    Make a new project, titling it “Chapter7Recipe2”, with a class prefix “Recording”,
    using the Single View Application template.


    You will need to import the AV Foundation framework into your project again. See
    the previous recipe on how to do this. Unlike the previous recipe, you will not
    need the Audio Toolbox framework, as you will not include the device vibrate function
    in this project. Make sure to add the following import statement to your view
    controller''s header file.


    `#import <AVFoundation/AVFoundation.h>`


    Next, you will set up your view in your controller''s XIB file, so that it looks
    like [Figure 7–5](#Chapter07.html#fig_7_5).


    ![Image](images/9781430240051_Fig07-05.jpg)


    **Figure 7–5.** *User interface for recording and playing audio*


    Next, you will connect your two buttons, as well as your two monitoring labels,
    over to your header file. Switch over to the Assistant Editor. By holding ^ (Ctrl)
    and dragging from your view elements to your header file, connect your buttons
    and labels to your header file. For this project, I have named the buttons `recordButton`,
    `playButton`, `averageLevel`, and `peakLevel`.


    You will also define two action methods for your buttons to perform, named `-recordPressed:`
    and `-playPressed:`, and connect your buttons to them. To do this, hold ^ (Ctrl)
    again, and drag from each button in the XIB file to its respective action in your
    header file.


    Before you proceed to your implementation file, you will add an instance variable,
    named `url`, of type NSURL, to your header file, to keep track of your recording''s
    saved locations. Finally, you need to add in two more properties, one for your
    `AVAudioPlayer`, named `player`, and one for your `AVAudioRecorder`, named `audioRecorder`.
    Make sure to properly handle these by synthesizing them in your implementation
    file, and setting them to `nil` (as well as their delegates) in your `-viewDidUnload`
    method. At this point, your header file should look like so:


    `#import <UIKit/UIKit.h>`

    `#import <AVFoundation/AVFoundation.h>`


    `@interface RecordingViewController : UIViewController {`

    `    NSURL *url;`

    `}`


    `@property (strong, nonatomic) IBOutlet UIButton *recordButton;`

    `@property (strong, nonatomic) IBOutlet UIButton *playButton;`

    `@property (strong, nonatomic) IBOutlet UILabel *averageLevel;`

    `@property (strong, nonatomic) IBOutlet UILabel *peakLevel;`


    `@property (strong, nonatomic) AVAudioRecorder *audioRecorder;`

    `@property (strong, nonatomic) AVAudioPlayer *player;`


    `-(IBAction)recordPressed:(id)sender;`

    `-(IBAction)playPressed:(id)sender;`


    `@end`


    Now, you will write your `-viewDidLoad` method, which is quite similar to that
    in the previous recipe.


    `-(void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `    url = [self tempFileURL];`

    `    self.audioRecorder = [[AVAudioRecorder alloc] initWithURL:url settings:nil
    error:nil];`

    `    self.audioRecorder.meteringEnabled = YES;`


    `    NSTimer *timer = [NSTimer scheduledTimerWithTimeInterval:``0.01` `target:self`

    `selector:@selector(updateLabels) userInfo:nil repeats:YES];`

    `    [timer fire];`


    `    [self.audioRecorder prepareToRecord];`

    `}`


    Just as in the previous recipe, you are sending your `AVAudioRecorder` the `-prepareToRecord`
    action in order to help improve your application''s running speed. You have again
    set up a timer to repeatedly update your level-monitoring labels.


    The foregoing implementation uses the method `-tempFileURL` to retrieve your URL,
    which is implemented as follows. In order to avoid a compiler warning, make sure
    to include this method before the `-viewDidLoad` method, or simply place its handler
    of `-(NSURL *)tempFileURL:` in the header file.'
  trans: "\n每当处理包含声音或音乐的应用程序时，总会担心应用被电话或短信中断。您应该始终包含处理这些问题的功能。这可以通过`AVAudioPlayer`委托方法来实现。由于您已将视图控制器设置为`AVAudioPlayer`的委托，只需实现这些方法，即可在中断开始或结束时分别暂停和播放声音片段。\n\
    \n```\n-(void)audioPlayerBeginInterruption:(AVAudioPlayer *)player\n{\n    [self.player\
    \ pause];\n}\n-(void)audioPlayerEndInterruption:(AVAudioPlayer *)player\n{\n \
    \   [self.player play];\n}\n```\n\n这是这些委托方法的一个极其简单的实现。对于您的应用，您可能选择添加更多功能，例如在应用被中断前保存数据或执行其他必要任务。\n\
    \n现在您应该能够看到使用`AVAudioPlayer`的灵活性，尽管它使用简单。通过使用多个`AVAudioPlayer`实例，您可以实现使用多个声音同时播放的复杂音频设计。例如，可以在一个`AVAudioPlayer`中运行背景音乐曲目，并使用另外一到两个来处理基于事件的声音效果。`AVAudioPlayer`类的强大、简洁和灵活性使其在\
    \ iOS 开发者中广受欢迎。\n\n## 食谱 7–2：录制音频\n\n既然您已经处理了播放音频的关键概念，接下来可以处理相反的操作：录制音频。这个过程在结构和实现上与播放音频非常相似。您将使用`AVAudioRecorder`类进行录音，并结合另一个`AVAudioPlayer`来处理录制的回放。\n\
    \n创建一个新项目，命名为“Chapter7Recipe2”，类前缀为“Recording”，使用单视图应用程序模板。\n\n您需要再次将 AV Foundation\
    \ 框架导入到项目中。请参考之前的食谱了解如何操作。与之前的食谱不同，本项目中不需要 Audio Toolbox 框架，因为您不会包含设备震动功能。确保在视图控制器的头文件中添加以下导入语句：\n\
