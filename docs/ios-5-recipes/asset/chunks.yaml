    \ alloc] initWithAnnotation:annotation\nreuseIdentifier:annotationIdentifier];\n\
    \        }\n\n        //Optional properties to change\n        annotationView.canShowCallout\
    \ = YES;\n        annotationView.rightCalloutAccessoryView = [UIButton\nbuttonWithType:UIButtonTypeDetailDisclosure];\
    \ //Creates button on right of callout\n        return annotationView;\n    }\n\
    \    return nil;\n}\n```\n\nYour two optional properties, `canShowCallout` and\
