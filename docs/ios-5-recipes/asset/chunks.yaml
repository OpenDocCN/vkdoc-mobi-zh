- fmt: "### Recipe 11–3: Subclassing `NSManagedObject`\n\nNow that you have your basic\
    \ `UITableView` set up to display the information you can store with Core Data,\
    \ it's time to improve a bit on your program design. The first thing you can do\
    \ is an incredible time saver that will make programming with Core Data significantly\
    \ easier. You will be subclassing the `NSManagedObject` class for each of the\
    \ entities that you created. Unlike most subclassing, however, this is incredibly\
    \ easy to set up.\n\nFirst, switch back to view your `MusicSchool.xcdatamodeld`\
    \ file in which you created your entities.\n\nThe next step can be done individually,\
    \ but you will create your three subclasses all at once. Select each entity from\
    \ the view by holding the “command” key and clicking each one, so that all three\
    \ become highlighted. You will also notice that all of their combined attributes\
    \ and relationships will be visible as well, as shown in [Figure 11-21](#Chapter11.html#fig_11_21).\n\
    \nThe `NSManagedObject` subclassing technique that you will be using creates a\
    \ subclass based on which entity or entities are selected, so it is important\
    \ to make sure that all the entities you want subclasses for are selected.\n\n\
    ![Image](images/9781430240051_Fig11-21.jpg)\n\n**Figure 11–21.** *Selecting all\
    \ three entities to be turned into `NSManagedObject` subclasses*\n\nNext, under\
    \ the File menu, select `New` ![Image](images/U001.jpg)`New File...` to bring\
    \ up the New File dialog. Navigate to the Core Data section under iOS, and select\
    \ the “NSManagedObject subclass” option, as shown in [Figure 11-22](#Chapter11.html#fig_11_22).\n\
    \n![Image](images/9781430240051_Fig11-22.jpg)\n\n**Figure 11-22.** *Selecting\
    \ the “NSManagedObject subclass” template to automatically generate classes for\
    \ your entities*\n\nClick through, and hit Create to have Xcode create your three\
    \ `NSManagedObject` subclasses.\n\nBy subclassing the `NSManagedObject` class,\
    \ you have effectively turned your entities into classes that you can use and\
    \ manipulate normally, especially when it comes to accessing their attributes.\
    \ Now, rather than having to use the `-setValue:forKey:` and `-valueForKey:` methods,\
    \ you can simply use the setter and getter methods, or, more simply, the properties\
    \ created with the same names as your attributes. This also allows you to more\
    \ easily specify exactly which entity any given instance of `NSManagedObject`\
    \ is associated with, so that your compiler can assist you in accessing properties\
    \ and methods for that entity.\n\nTo demonstrate these abilities, you can rewrite\
    \ your `-tableView:cellForRowAtIndexPath:` method to first cast your `NSManagedObject`\
    \ down to its appropriate subclass, and then populate your cell’s content using\
    \ the subclass properties.\n\nFirst, make sure to import the newly created header\
    \ files into your view controller.\n\n```\n#import \"Instrument.h\"\n#import \"\
    Student.h\"\n#import \"Teacher.h\"\n```\n\nOnce this is taken care of, you can\
    \ implement your simplified method.\n\n```\n-(UITableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    static NSString\
    \ *CellIdentifier = @\"Cell\";\n\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \    if (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\
    \ reuseIdentifier:CellIdentifier];\n        cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n\
    \        cell.textLabel.font = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font\
    \ = [UIFont systemFontOfSize:12];\n    }\n\n    NSManagedObject *object = [self.fetchedResultsController\
    \ objectAtIndexPath:indexPath];\n\n    if ([object.entity.name isEqualToString:@\"\
    Instrument\"])\n    {\n        Instrument *instrument = (Instrument *)object;\n\
    \        cell.textLabel.text = instrument.name;\n        cell.detailTextLabel.text\
    \ = instrument.family;\n    }\n    else if ([object.entity.name isEqualToString:@\"\
    Student\"])\n    {\n        Student *student = (Student *)object;\n        cell.textLabel.text\
    \ = student.name;\n        cell.detailTextLabel.text = [student.age stringValue];\n\
    \    }\n    else\n    {\n        Teacher *teacher = (Teacher *)object;\n     \
    \   cell.textLabel.text = teacher.name;\n        cell.detailTextLabel.text = [teacher.age\
    \ stringValue];\n    }\n\n    return cell;\n}\n```\n\nYou can also simplify your\
    \ `-add` method that creates your test data like so.\n\n```\n-(void)add\n{\n \
    \   NSManagedObject *add = [[NSManagedObject alloc]\ninitWithEntity:self.entityDescription\n\
    insertIntoManagedObjectContext:self.managedObjectContext];\n    if ([self.entityDescription.name\
    \ isEqualToString:@\"Teacher\"])\n    {\n        Teacher *teacher = (Teacher *)add;\n\
    \        teacher.name = @\"Peter\";\n        teacher.age = [NSNumber numberWithInt:36];\n\
    \    }\n    else if ([self.entityDescription.name isEqualToString:@\"Instrument\"\
    ])\n    {\n        Instrument *instrument = (Instrument *)add;\n        instrument.name\
    \ = @\"Guitar\";\n        instrument.family = @\"Strings\";\n    }\nelse\n   \
    \ {\n        Student *student = (Student *)add;\n        student.name = @\"Andrew\"\
    ;\n        student.age = [NSNumber numberWithInt:18];\n    }\n\n    NSError *error;\n\
    \    BOOL success = [self.managedObjectContext save:&error];\n    if (!success)\n\
    \    {\n        NSLog(@\"%@\", [error localizedDescription]);\n    }\n\n    [self\
    \ fetchResults];\n\n    [self.tableViewMain reloadData];\n}\n```\n\nAgain, this\
    \ doesn’t really affect how your application runs, but it makes your life a great\
    \ deal easier in terms of coding and debugging.\n\nBy using this subclassing technique,\
    \ you will probably find yourself having fewer issues with runtime errors when\
