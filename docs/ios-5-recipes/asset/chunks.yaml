- fmt: "# Recipe 13–3: Printing an Image\n\nNow that you have your application set\
    \ up to be able to access both text and images, you can continue to enhance your\
    \ functionality by adding the ability to print.\n\nBefore you specifically work\
    \ on printing, you will reconfigure your application’s user interface a bit to\
    \ include your view controller inside of a `UINavigationController` so that you\
    \ can get a nice toolbar across the top. To do this, adjust your application delegate’s\
    \ `-application:didFinishLaunchingWithOptions` method like so:\n\n```\n- (BOOL)application:(UIApplication\
    \ *)application\ndidFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
    {\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
    \    // Override point for customization after application launch.\n    self.viewController\
    \ = [[MainViewController alloc] initWithNibName:@\"MainViewController\"\n    \
    \                                                          bundle:nil];\n    /////CHANGED\
    \ CODE\n    __strong UINavigationController *navcon = [[UINavigationController\
    \ alloc]\n                                               initWithRootViewController:self.viewController];\n\
    \    self.window.rootViewController = navcon;\n    /////END OF CHANGED CODE\n\n\
    \    [self.window makeKeyAndVisible];\n    return YES;\n}\n```\n\nYou may also\
    \ have to move up the lower buttons in your view a bit in order to make sure they\
    \ aren’t pushed off-screen by the navigation bar.\n\nAdd the following lines to\
    \ the end of your `-viewDidLoad` method to configure your navigation bar.\n\n\
    ```\nself.title = @\"Send It Out!\";\n\nif ([UIPrintInteractionController isPrintingAvailable])\n\
    {\n    UIBarButtonItem *printButton = [[UIBarButtonItem alloc]\n             \
    \                       initWithTitle:@\"Print\"\n                           \
    \         style:UIBarButtonItemStyleBordered\n                               \
    \     target:self\n                                    action:@selector(printPressed:)];\n\
    \n    self.navigationItem.rightBarButtonItem = printButton;\n}\n```\n\nThis condition\
    \ will confirm to you that printing is possible on whichever device you run your\
    \ application on before allowing the print button to be shown.\n\nNow, you can\
    \ continue on to implement your `-printPressed:` method in order to add your printing\
    \ functionality, primarily through the use of the `UIPrintInteractionController`\
    \ class. This class will be your “hub” of activity when it comes to configuring\
    \ print jobs. You will go through and discuss the steps to setup this class individually\
    \ before seeing the method as a whole.\n\nWhenever you want to access an instance\
    \ of a `UIPrintInteractionController`, you simply call for a reference to the\
    \ shared instance through the `+sharedPrintController` class method.\n\n```\n\
    UIPrintInteractionController *pic = [UIPrintInteractionController sharedPrintController];\n\
    ```\n\nUp next, you must configure the `printInfo` property of your controller,\
    \ which specifies the settings for the print job.\n\n```\nUIPrintInfo *printInfo\
    \ = [UIPrintInfo printInfo];\nprintInfo.outputType = UIPrintInfoOutputPhoto;\n\
    printInfo.jobName = self.title;\nprintInfo.duplex = UIPrintInfoDuplexLongEdge;\n\
    ```\n\nAs you can see, you have set the `outputType` to specify an image. The\
    \ three possible values for this property are as follows:\n\n- `UIPrintInfoOutputPhoto`:\
    \ Used specifically for photos to be printed\n- `UIPrintInfoOutputGrayscale`:\
    \ Used when dealing only with black text so as to improve performance\n- `UIPrintInfoOutputGeneral`:\
    \ Used for any mix of graphics and text, with or without color\n\nYou did not\
    \ yet set this `printInfo` object as the `printInfo` of your controller because\
    \ you will do a little bit more configuration of it shortly.\n\nNext, you have\
    \ to do an interesting specification for your `UIPrintInteractionController`.\
    \ I say interesting because you absolutely have to do one, and only one, of four\
    \ possible tasks:\n\n1. Set a single item to be printed.\n2. Set multiple items\
    \ to be printed.\n3. Specify an instance of `UIPrintFormatter` to the controller\
    \ to configure the layout of your page.\n4. Specify an instance of `UIPrintPageRenderer`,\
    \ which can then have multiple instances of `UIPrintFormatter` assigned to it\
    \ to gain full customization of your content layout over multiple pages.\n\nYou\
    \ will start off with the simplest option of setting a single item to be printed.\
    \ This item must be either an image or a PDF file to use these simpler options,\
    \ so you will choose to simply print out your `selectedImage`.\n\n```\nUIImage\
    \ *image = self.selectedImage;\npic.printingItem = image;\n```\n\nNow that you\
    \ know what you want to print, you can check the orientation of the image and\
    \ configure your `printInfo` accordingly.\n\n```\nif (!pic.printingItem && image.size.width\
    \ > image.size.height)\n    printInfo.orientation = UIPrintInfoOrientationLandscape;\n\
    \npic.printInfo = printInfo;\npic.showsPageRange = YES;\n```\n\nFinally, you must\
    \ simply present your `UIPrintInteractionController`. This class is equipped with\
    \ three different methods for presenting itself, depending on your specific implementation.\n\
    \n- `-presentFromBarButtonItem:animated:completionHandler:`: If you are writing\
    \ for an iPad, this method is designed for use when the application’s Print button\
    \ is placed in a toolbar, such as yours.\n- `-presentFromRect:inView:animated:completionHandler:`:\
    \ This method is also only for use with the iPad, but allows you to present the\
    \ controller from any part of the view. Usually, the `rect` specified will be\
    \ the `frame` of your Print button, wherever it is located.\n- `-presentAnimated:completionHandler:`:\
    \ This method should be used whenever implementing printing on an iPhone due to\
    \ the smaller screen.\n\nWith this final method call, your `-printPressed:` method\
    \ in its entirety will look like so:\n\n```\n-(void)printPressed:(id)sender\n\
    {\n    if ([UIPrintInteractionController isPrintingAvailable] && (self.selectedImage\
    \ != nil))\n    {\n        UIPrintInteractionController *pic = [UIPrintInteractionController\
    \ sharedPrintController];\n\n        UIPrintInfo *printInfo = [UIPrintInfo printInfo];\n\
    \        printInfo.outputType = UIPrintInfoOutputPhoto;\n        printInfo.jobName\
    \ = self.title;\n        printInfo.duplex = UIPrintInfoDuplexLongEdge;\n\n   \
    \     UIImage *image = self.selectedImage;\n        pic.printingItem = image;\n\
    \n        if (!pic.printingItem && image.size.width > image.size.height)\n   \
    \         printInfo.orientation = UIPrintInfoOrientationLandscape;\n\n       \
    \ pic.printInfo = printInfo;\n        pic.showsPageRange = YES;\n\n        [pic\
    \ presentFromBarButtonItem:sender animated:YES\n                    completionHandler:^(UIPrintInteractionController\
    \ *printInteractionController, BOOL completed, NSError *error)\n         {\n \
    \            if (!completed && (error != nil))\n             {\n             \
    \    NSLog(@\"Error due to Domain: %@, Code: %@\", error.domain, error.code);\n\
    \             }\n             else\n             {\n                 NSLog(@\"\
    Printing Cancelled\");\n             }\n         }];\n    }\n}\n```\n\nNow when\
    \ you run your application, after selecting your image, a small controller will\
    \ appear once you press the print button, from which you can select a printer\
    \ and further configure your specific print job! Unfortunately, if you’re testing\
    \ this in your simulator or don’t have any wireless printers set up, you won’t\
    \ see any available printers to use, as shown in [Figure 13–8](#Chapter13.html#fig_13_8).\n\
    \n![Image](images/9781430240051_Fig13-08.jpg)\n\n**Figure 13–8.** *Your app with\
    \ a new Print button, unable to find any AirPrint Printers*\n\nLuckily, when you\
    \ installed the most recent version of Xcode, you were also given a fantastic\
    \ application called Printer Simulator. With this program, you will be able to\
    \ fully simulate print jobs from your application. It even gives you a PDF file\
    \ of your simulated output, so you can see exactly how your image would have turned\
    \ out without wasting any paper!\n\nYou can easily open this program by searching\
    \ for it in Spotlight.\n\nUpon running the Printer Simulator application, a variety\
    \ of printer types will be automatically registered for use. It will look similar\
    \ to [Figure 13–9](#Chapter13.html#fig_13_9).\n\n![Image](images/9781430240051_Fig13-09.jpg)\n\
    \n**Figure 13–9.** *Printer Simulator registering multiple types of printers to\
    \ simulate*"
  raw: '### Recipe 13–3: Printing an Image


    Now that you have your application set up to be able to access both text and images,
    you can continue to enhance your functionality by adding the ability to print.


    Before you specifically work on printing, you will reconfigure your application''s
    user interface a bit to include your view controller inside of a `UINavigationController`
    so that you can get a nice toolbar across the top. To do this, adjust your application
    delegate''s `-application:didFinishLaunchingWithOptions` method like so:


    `- (BOOL)application:(UIApplication *)application`

    `didFinishLaunchingWithOptions:(NSDictionary *)launchOptions`

    `{`

    `self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];`

    `// Override point for customization after application launch.`

    `self.viewController = [[MainViewController alloc] initWithNibName:@"MainViewController"`

    `bundle:nil];`


    `/////CHANGED CODE`

    `__strong UINavigationController *navcon = [[UINavigationController alloc]`

    `initWithRootViewController:self.viewController];`

    `self.window.rootViewController = navcon;`

    `/////END OF CHANGED CODE`


    `    [self.window makeKeyAndVisible];`

    `return YES;`

    `}`


    You may also have to move up the lower buttons in your view a bit in order to
    make sure they aren''t pushed off-screen by the navigation bar.


    Add the following lines to the end of your `-viewDidLoad` method to configure
    your navigation bar.


    `self.title = @"Send It Out!";`


    `if ([UIPrintInteractionController isPrintingAvailable])`

    `{`

    `UIBarButtonItem *printButton = [[UIBarButtonItem alloc]`

    `initWithTitle:@"Print"style:UIBarButtonItemStyleBorderedtarget:self`

    `action:@selector(printPressed:)];`


    `self.navigationItem.rightBarButtonItem = printButton;`

    `}`


    This condition will confirm to you that printing is possible on whichever device
    you run your application on before allowing the print button to be shown.


    Now, you can continue on to implement your `-printPressed:` method in order to
    add your printing functionality, primarily through the use of the `UIPrintInteractionController`
    class. This class will be your “hub” of activity when it comes to configuring
    print jobs. You will go through and discuss the steps to setup this class individually
    before seeing the method as a whole.


    Whenever you want to access an instance of a `UIPrintInteractionController`, you
    simply call for a reference to the shared instance through the `+sharedPrintController`
    class method.


    `UIPrintInteractionController *pic = [UIPrintInteractionController`

    `sharedPrintController];`


    Up next, you must configure the `printInfo` property of your controller, which
    specifies the settings for the print job.


    `UIPrintInfo *printInfo = [UIPrintInfo printInfo];`

    `printInfo.outputType = UIPrintInfoOutputPhoto;`

    `printInfo.jobName = self.title;`

    `printInfo.duplex = UIPrintInfoDuplexLongEdge;`


    As you can see, you have set the `outputType` to specify an image. The three possible
    values for this property are as follows:


    *   `UIPrintInfoOutputPhoto`: Used specifically for photos to be printed

    *   `UIPrintInfoOutputGrayscale`: Used when dealing only with black text so as
    to improve performance

    *   `UIPrintInfoOutputGeneral`: Used for any mix of graphics and text, with or
    without color


    You did not yet set this `printInfo` object as the `printInfo` of your controller
    because you will do a little bit more configuration of it shortly.


    Next, you have to do an interesting specification for your `UIPrintInteractionController`.
    I say interesting because you absolutely have to do one, and only one, of four
    possible tasks:


    1.  Set a single item to be printed.

    2.  Set multiple items to be printed.

    3.  Specify an instance of `UIPrintFormatter` to the controller to configure the
    layout of your page.

    4.  Specify an instance of `UIPrintPageRenderer`, which can then have multiple
    instances of `UIPrintFormatter` assigned to it to gain full customization of your
    content layout over multiple pages.


    You will start off with the simplest option of setting a single item to be printed.
    This item must be either an image or a PDF file to use these simpler options,
    so you will choose to simply print out your `selectedImage`.


    `UIImage *image = self.selectedImage;`

    `pic.printingItem = image;`


    Now that you know what you want to print, you can check the orientation of the
    image and configure your `printInfo` accordingly.


    `if (!pic.printingItem&& image.size.width> image.size.height)`

    `      printInfo.orientation = UIPrintInfoOrientationLandscape;`


    `pic.printInfo = printInfo;`

    `pic.showsPageRange = YES;`


    Finally, you must simply present your `UIPrintInteractionController`. This class
    is equipped with three different methods for presenting itself, depending on your
    specific implementation.


    *   `-presentFromBarButtonItem:animated:completionHandler:`: If you are writing
    for an iPad, this method is designed for use when theapplication''s Print button
    is placed in a toolbar, such as yours.

    *   `-presentFromRect:inView:animated:completionHandler:`: This method is also
    only for use with the iPad, but allows you to present the controller from any
    part of the view. Usually, the `rect` specified will be the `frame` of your Print
    button, wherever it is located.

    *   `-presentAnimated:completionHandler:`: This method should be used whenever
    implementing printing on an iPhone due to the smaller screen.


    With this final method call, your `-printPressed:`method in its entirety will
    look like so:


    `-(void)printPressed:(id)sender`

    `{`

    `if ([UIPrintInteractionController isPrintingAvailable] && (self.selectedImage
    != nil))`

    `    {`

    `UIPrintInteractionController *pic = [UIPrintInteractionController`

    `sharedPrintController];`


    `UIPrintInfo *printInfo = [UIPrintInfo printInfo];`

    `        printInfo.outputType = UIPrintInfoOutputPhoto;`

    `        printInfo.jobName = self.title;`

    `        printInfo.duplex = UIPrintInfoDuplexLongEdge;`


    `UIImage *image = self.selectedImage;`

    `        pic.printingItem = image;`


    `if (!pic.printingItem&& image.size.width> image.size.height)`

    `            printInfo.orientation = UIPrintInfoOrientationLandscape;`


    `        pic.printInfo = printInfo;`

    `        pic.showsPageRange = YES;`


    `        [pic presentFromBarButtonItem:sender animated:YES`

    `completionHandler:^(UIPrintInteractionController *printInteractionController,
    BOOL`

    `completed, NSError *error)`

    `         {`

    `if (!completed && (error != nil))`

    `             {`

    `NSLog(@"Error due to Domain: %@, Code: %@", error.domain, error.code);`

    `             }`

    `else`

    `             {`

    `NSLog(@"Printing Cancelled");`

    `             }`

    `         }];`

    `    }`

    `}`


    Now when you run your application, after selecting your image, a small controller
    will appear once you press the print button, from which you can select a printer
    and further configure your specific print job! Unfortunately, if you''re testing
    this in your simulator or don''t have any wireless printers set up, you won''t
    see any available printers to use, as shown in [Figure 13–8](#Chapter13.html#fig_13_8).


    ![Image](images/9781430240051_Fig13-08.jpg)


    **Figure 13–8.** *Your app with a new Print button, unable to find any AirPrint
    Printers*


    Luckily, when you installed the most recent version of Xcode, you were also given
    a fantastic application called Printer Simulator. With this program, you will
    be able to fully simulate print jobs from your application. It even gives you
    a PDF file of your simulated output, so you can see exactly how your image would
    have turned out without wasting any paper!


    You can easily open this program by searching for it in Spotlight.


    Upon running the Printer Simulator application, a variety of printer types will
    be automatically registered for use. It will look similar to [Figure 13–9](#Chapter13.html#fig_13_9).


    ![Image](images/9781430240051_Fig13-09.jpg)


    **Figure 13–9.** *Printer Simulator registering multiple types of printers to
    simulate*'
  trans: "\n# 方案 13–3：打印图像\n\n现在你的应用程序已设置好，既能访问文本也能访问图像，你可以通过添加打印功能来进一步增强其可用性。\n\n\
    在具体处理打印功能之前，你需要稍微重新配置应用程序的用户界面，将你的视图控制器嵌入 `UINavigationController` 中，以便在顶部获得一个漂亮的工具栏。为此，请调整你的应用程序委托中的\
    \ `-application:didFinishLaunchingWithOptions` 方法，如下所示：\n\n```\n- (BOOL)application:(UIApplication\
    \ *)application\ndidFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
    {\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
    \    // 覆盖点：应用程序启动后的自定义点。\n    self.viewController = [[MainViewController alloc]\
    \ initWithNibName:@\"MainViewController\"\n                                  \
    \                            bundle:nil];\n    /////修改的代码\n    __strong UINavigationController\
    \ *navcon = [[UINavigationController alloc]\n                                \
    \               initWithRootViewController:self.viewController];\n    self.window.rootViewController\
    \ = navcon;\n    /////修改结束\n\n    [self.window makeKeyAndVisible];\n    return\
    \ YES;\n}\n```\n\n你可能还需要稍微向上移动视图下方的按钮，以确保它们不会被导航栏推出屏幕。\n\n在 `-viewDidLoad` 方法的末尾添加以下几行代码，以配置你的导航栏。\n\
    \n```\nself.title = @\"发送出去！\";\n\nif ([UIPrintInteractionController isPrintingAvailable])\n\
    {\n    UIBarButtonItem *printButton = [[UIBarButtonItem alloc]\n             \
    \                       initWithTitle:@\"打印\"\n                              \
    \      style:UIBarButtonItemStyleBordered\n                                  \
    \  target:self\n                                    action:@selector(printPressed:)];\n\
    \n    self.navigationItem.rightBarButtonItem = printButton;\n}\n```\n\n这个条件判断会在显示打印按钮之前，确认你运行应用的设备是否支持打印功能。\n\
    \n现在，你可以继续实现 `-printPressed:` 方法，以添加打印功能，主要通过使用 `UIPrintInteractionController`\
    \ 类来实现。在配置打印任务时，这个类将成为你的活动“枢纽”。在查看完整方法之前，我们将逐步讨论如何设置这个类。\n\n当你想要访问 `UIPrintInteractionController`\
    \ 的实例时，只需通过 `+sharedPrintController` 类方法获取共享实例的引用。\n\n```\nUIPrintInteractionController\
    \ *pic = [UIPrintInteractionController sharedPrintController];\n```\n\n接下来，你必须配置控制器的\
    \ `printInfo` 属性，该属性指定了打印任务的设置。\n\n```\nUIPrintInfo *printInfo = [UIPrintInfo\
    \ printInfo];\nprintInfo.outputType = UIPrintInfoOutputPhoto;\nprintInfo.jobName\
    \ = self.title;\nprintInfo.duplex = UIPrintInfoDuplexLongEdge;\n```\n\n如你所见，你将\
    \ `outputType` 设置为指定图像。此属性的三个可能值如下：\n\n- `UIPrintInfoOutputPhoto`：专门用于打印照片\n-\
    \ `UIPrintInfoOutputGrayscale`：仅处理黑色文本时使用，以提高性能\n- `UIPrintInfoOutputGeneral`：用于图形和文本的任何混合，无论是否包含颜色\n\
    \n你尚未将这个 `printInfo` 对象设置为控制器的 `printInfo`，因为你稍后会对其进行更多配置。\n\n接下来，你需要为你的 `UIPrintInteractionController`\
    \ 做一个有趣的指定操作。我说有趣，是因为你必须从四个可能任务中选择一个，且只能选择一个：\n\n1. 设置要打印的单个项目。\n2. 设置要打印的多个项目。\n\
    3. 向控制器指定一个 `UIPrintFormatter` 实例，以配置页面布局。\n4. 指定一个 `UIPrintPageRenderer` 实例，然后可以将多个\
    \ `UIPrintFormatter` 实例分配给它，以实现跨多页内容布局的完全自定义。\n\n我们将从最简单的选项开始——设置单个要打印的项目。使用这些更简单的选项时，该项目必须是图像或\
    \ PDF 文件，因此你将选择直接打印你的 `selectedImage`。\n\n```\nUIImage *image = self.selectedImage;\n\
    pic.printingItem = image;\n```\n\n现在你知道了要打印的内容，可以检查图像的方向并相应地配置你的 `printInfo`。\n\
    \n```\nif (!pic.printingItem && image.size.width > image.size.height)\n    printInfo.orientation\
    \ = UIPrintInfoOrientationLandscape;\n\npic.printInfo = printInfo;\npic.showsPageRange\
    \ = YES;\n```\n\n最后，你只需展示你的 `UIPrintInteractionController`。根据你的具体实现，这个类提供了三种不同的自展示方法。\n\
    \n- `-presentFromBarButtonItem:animated:completionHandler:`：如果你是为 iPad 编写，此方法适用于应用程序的“打印”按钮放置在工具栏中的情况（例如你的情况）。\n\
    - `-presentFromRect:inView:animated:completionHandler:`：此方法也仅适用于 iPad，但允许你从视图的任何部分展示控制器。通常，指定的\
    \ `rect` 是你“打印”按钮的 `frame`，无论它位于何处。\n- `-presentAnimated:completionHandler:`：由于屏幕较小，在\
    \ iPhone 上实现打印时应使用此方法。\n\n通过这最后的调用，你的 `-printPressed:` 方法的完整代码如下所示：\n\n```\n-(void)printPressed:(id)sender\n\
    {\n    if ([UIPrintInteractionController isPrintingAvailable] && (self.selectedImage\
    \ != nil))\n    {\n        UIPrintInteractionController *pic = [UIPrintInteractionController\
    \ sharedPrintController];\n\n        UIPrintInfo *printInfo = [UIPrintInfo printInfo];\n\
    \        printInfo.outputType = UIPrintInfoOutputPhoto;\n        printInfo.jobName\
    \ = self.title;\n        printInfo.duplex = UIPrintInfoDuplexLongEdge;\n\n   \
    \     UIImage *image = self.selectedImage;\n        pic.printingItem = image;\n\
    \n        if (!pic.printingItem && image.size.width > image.size.height)\n   \
    \         printInfo.orientation = UIPrintInfoOrientationLandscape;\n\n       \
    \ pic.printInfo = printInfo;\n        pic.showsPageRange = YES;\n\n        [pic\
    \ presentFromBarButtonItem:sender animated:YES\n                    completionHandler:^(UIPrintInteractionController\
    \ *printInteractionController, BOOL completed, NSError *error)\n         {\n \
    \            if (!completed && (error != nil))\n             {\n             \
    \    NSLog(@\"错误原因：域：%@，代码：%@\", error.domain, error.code);\n             }\n\
    \             else\n             {\n                 NSLog(@\"打印已取消\");\n    \
    \         }\n         }];\n    }\n}\n```\n\n现在当你运行应用程序并选择图像后，点击打印按钮时，会出现一个小控制器，你可以从中选择打印机并进一步配置具体的打印任务！但遗憾的是，如果你在模拟器中测试，或者没有设置任何无线打印机，你将看不到任何可用的打印机，如图\
    \ 13–8 所示。\n\n![图片](img/9781430240051_Fig13-08.jpg)\n\n**图 13–8.** *你的应用程序带有新的“打印”按钮，但无法找到任何\
    \ AirPrint 打印机*\n\n幸运的是，当你安装最新版本的 Xcode 时，还获得了一个名为“打印机模拟器”（Printer Simulator）的出色应用程序。借助这个程序，你将能够从你的应用程序中完全模拟打印任务。它甚至会为你提供一份模拟输出的\
    \ PDF 文件，这样你就能确切地看到图像的打印效果，而无需浪费纸张！\n\n你可以通过 Spotlight 轻松打开这个程序。\n\n运行“打印机模拟器”应用程序后，系统会自动注册多种打印机类型供使用。界面将类似于图\
    \ 13–9。\n\n![图片](img/9781430240051_Fig13-09.jpg)\n\n**图 13–9.** *打印机模拟器注册多种打印机类型以进行模拟*\n"
- fmt: "Now, upon testing your application, you should see multiple different types\
    \ of simulated printers with which to test your application. You can choose different\
    \ types to see how your printout is affected by the style of printer, as in [Figure\
    \ 13–10](#Chapter13.html#fig_13_10).\n\n![Image](images/9781430240051_Fig13-10.jpg)\n\
    \n**Figure 13–10.** *Selecting a simulated printer from your app*\n\nOnce you\
    \ have selected a printer, you have the option to print multiple copies as well\
    \ as change the paper type before you print. At this point, you should start seeing\
    \ activity in your Printer Simulator, and shortly afterward, a PDF file will be\
    \ opened with your final printout, resembling that shown in [Figure 13–11](#Chapter13.html#fig_13_11).\n\
    \n![Image](images/9781430240051_Fig13-11.jpg)\n\n**Figure 13–11.** *Output of\
    \ printing an image from a simulated printer*\n\n### Recipe 13–4: Printing Plain\
    \ Text\n\nExpanding on your previous recipe, you will add functionality to make\
    \ use of a print formatter to allow you to print simple text.\n\nFirst, you will\
    \ modify your `-viewDidLoad` method to add an extra button to print the text in\
    \ your `UITextView`. Change the condition statement in the method that you've\
    \ already made to look like so:\n\n```\nif ([UIPrintInteractionController isPrintingAvailable])\n\
    \    {\nUIBarButtonItem *printButton = [[UIBarButtonItemalloc] initWithTitle:@\"\
    Print Image\"\nstyle:UIBarButtonItemStyleBordered target:self action:@selector(printPressed:)];\n\
    \nUIBarButtonItem *printTextButton = [[UIBarButtonItem alloc] initWithTitle:@\"\
    Print Text\"\nstyle:UIBarButtonItemStyleBordered target:self action:@selector(printTextPressed:)];\n\
    \nself.navigationItem.rightBarButtonItems = [NSArray arrayWithObjects:printButton,\n\
    printTextButton, nil];\n    }\n```\n\nThe new selector to print your text will\
    \ then be implemented as follows:\n\n```\n-(void)printTextPressed:(id)sender\n\
    {\nif ([UIPrintInteractionController isPrintingAvailable])\n    {\nUIPrintInteractionController\
    \ *pic = [UIPrintInteractionController\nsharedPrintController];\n\nUIPrintInfo\
    \ *printInfo = [UIPrintInfo printInfo];\n        printInfo.outputType = UIPrintInfoOutputGeneral;\n\
    \        printInfo.jobName = self.title;\n        printInfo.duplex = UIPrintInfoDuplexLongEdge;\n\
    \        pic.printInfo = printInfo;\n\nUISimpleTextPrintFormatter *simpleTextPF\
    \ = [[UISimpleTextPrintFormatter alloc]\ninitWithText:self.textViewInput.text];\n\
    \        simpleTextPF.startPage = 0;\n        simpleTextPF.contentInsets = UIEdgeInsetsMake(72.0,\
    \ 72.0, 72.0, 72.0);\n        simpleTextPF.maximumContentWidth = 6*72.0;\n\n \
    \       pic.printFormatter = simpleTextPF;\n\n        pic.showsPageRange = YES;\n\
    \n        [pic presentFromBarButtonItem:sender animated:YES\ncompletionHandler:^(UIPrintInteractionController\
    \ *printInteractionController, BOOL\ncompleted, NSError *error)\n         {\n\
    if (!completed && (error != nil))\n             {\nNSLog(@\"Error due to Domain:\
    \ %@, Code: %@\", error.domain, error.code);\n             }\nelse\n         \
    \    {\nNSLog(@\"Printing Cancelled\");\n             }\n         }];\n    }\n\
    }\n```\n\nThere are two main differences between this method and its predecessor:\n\
    \n1.  The `outputType` property in your `UIPrintInfo` is modified to the `UIPrintInfoOutputGeneral`\
    \ value, since you are no longer printing photos.\n2.  Instead of setting a `UIImage`\
    \ to the `printingItem` property, you set an instance of `UISimpleTextPrintFormatter`\
    \ to the `printFormatter` property. This object is initialized with the desired\
    \ text, and then configured through its properties.\n    *   Values of 72.0 as\
    \ insets translate to 1 inch, so you have given your output 1-inch insets, and\
    \ specified a 6-inch width for your content.\n    *   The `startPage` property\
    \ will be used more at a later point, but allows you to specify the page in your\
    \ job for your formatter to be applied to.\n\nWhen printing simple text, it is\
    \ also quite easy to apply the preceding method to printing out HTML-formatted\
    \ text. To do this, simply make use of a `UIMarkupTextPrintFormatter` instead\
    \ of a `UISimpleTextPrintFormatter`.\n\nJust as before, by using the Printer Simulator,\
    \ you can generate your test output. Since you set your text view's text as the\
    \ content of your print formatter, you will simply get a document with some Lorem\
    \ Ipsum text in it, as in [Figure 13–12](#Chapter13.html#fig_13_12).\n\n![Image](images/9781430240051_Fig13-12.jpg)\n\
    \n**Figure 13–12.** *Output of the simulated printing of a simple text page*\n\
    \n### Recipe 13–5: Printing a View\n\nJust as you can print text using a `UISimpleTextPrintFormatter`,\
    \ you are easily able to print the contents of a view using another subclass of\
    \ `UIPrintFormatter`: `UIViewPrintFormatter`.\n\nStart by modifying your `-viewDidLoad`'s\
    \ conditional setup to now appear like so:\n\n```\nif ([UIPrintInteractionController\
    \ isPrintingAvailable])\n    {\nUIBarButtonItem *printButton = [[UIBarButtonItem\
    \ alloc] initWithTitle:@\"Print Image\"\nstyle:UIBarButtonItemStyleBorderedtarget:self\
    \ action:@selector(printPressed:)];\n\nUIBarButtonItem *printTextButton = [[UIBarButtonItem\
    \ alloc] initWithTitle:@\"Print Text\"\nstyle:UIBarButtonItemStyleBordered target:self\
    \ action:@selector(printTextPressed:)];\n\nUIBarButtonItem *printViewButton =\
    \ [[UIBarButtonItem alloc] initWithTitle:@\"Print View\"\nstyle:UIBarButtonItemStyleBordered\
    \ target:self action:@selector(printViewPressed:)];\n\nself.navigationItem.rightBarButtonItems\
    \ = [NSArray arrayWithObjects:printButton,\nprintTextButton, printViewButton,\
    \ nil];\n    }\n```\n\nYour newest printing method, `-printViewPressed:`, will\
    \ closely resemble your previous one, with the key change of using a `UIViewPrintFormatter`.\n\
    \n```\n-(void)printViewPressed:(id)sender\n{\nif ([UIPrintInteractionController\
    \ isPrintingAvailable])\n    {\nUIPrintInteractionController *pic = [UIPrintInteractionController\n\
    sharedPrintController];\n\nUIPrintInfo *printInfo = [UIPrintInfo printInfo];\n\
    \        printInfo.outputType = UIPrintInfoOutputGeneral;\n        printInfo.jobName\
    \ = self.title;\n        printInfo.duplex = UIPrintInfoDuplexLongEdge;\n     \
    \   printInfo.orientation = UIPrintInfoOrientationLandscape;\n        pic.printInfo\
    \ = printInfo;\n\nUIViewPrintFormatter *viewPF = [self.textViewInput viewPrintFormatter];\n\
    \n        pic.printFormatter = viewPF;\n        pic.showsPageRange = YES;\n\n\
    \        [pic presentFromBarButtonItem:sender animated:YES\ncompletionHandler:^(UIPrintInteractionController\
    \ *printInteractionController, BOOL\ncompleted, NSError *error)\n         {\n\
    if (!completed && (error != nil))\n             {\nNSLog(@\"Error due to Domain:\
    \ %@, Code: %@\", error.domain, error.code);\n             }\nelse\n         \
    \    {\nNSLog(@\"Printing Cancelled\");\n             }\n         }];\n    }\n\
    }\n```\n\nUnfortunately, the `UIViewPrintFormatter` is, at the moment, currently\
    \ configured only to provide printing views of three system views: `UITextView`,\
    \ `UIWebView`, and `MKMapView` (from the MapKit framework as discussed in [Chapter\
    \ 4](#Chapter04.html#ch4)). Since your application makes use of only one of these,\
    \ you will simply have it print your `UITextView`'s view, resulting in an output\
    \ like that in [Figure 13–13](#Chapter13.html#fig_13_13).\n\n![Image](images/9781430240051_Fig13-13.jpg)\n\
    \n**Figure 13–13.** *Simulated printing output, specifically of a `UITextView`*\n\
    \nDespite the `UIViewPrintFormatter`'s limitations, it can be an incredibly easy\
    \ way to easily print out the contents of any text, map, or web page."
