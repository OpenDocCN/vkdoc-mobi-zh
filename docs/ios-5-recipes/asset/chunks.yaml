- fmt: "实现文件（`.m`）应如下所示：\n\n```objc\n#import \"MyAppClass.h\"\n\n@implementation MyAppClass\n\
    \n@synthesize appName;\n@synthesize iconImage;\n@synthesize appDescription;\n\
    @synthesize appStoreURL;\n@synthesize webSiteURL;\n\n+ (MyAppClass *)appWithAppID:(int)appID\
    \ {\n    MyAppClass *newApp = [[MyAppClass alloc] init];\n    newApp.appName =\
    \ [NSString stringWithFormat:@\"App %i Name\", appID];\n    newApp.iconImage =\
    \ [UIImage imageNamed:[NSString stringWithFormat:@\"app%iicon.png\", appID]];\n\
    \    newApp.appDescription = [NSString stringWithFormat:@\"This is the description\
    \ for App %i\", appID];\n    newApp.appStoreURL = [NSURL URLWithString:[NSString\
    \ stringWithFormat:@\"itms-apps://itunes.com/apps/%iappName\", appID]];\n    newApp.webSiteURL\
    \ = [NSURL URLWithString:[NSString stringWithFormat:@\"http://www.shawnsbits.com/apps/%iappName\"\
    , appID]];\n    return newApp;\n}\n\n- (id)init {\n    self = [super init];\n\
    \    if (self) {\n        // Initialization code here.\n    }\n    return self;\n\
    }\n\n@end\n```\n\n**注意：** 如果你想知道内存管理去了哪里，请参阅第1章中关于自动引用计数的部分，即“Steve and the ARC”。\n\
