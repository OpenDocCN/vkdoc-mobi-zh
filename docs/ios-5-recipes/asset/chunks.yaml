    You will not need a property for the `UIButton`, as you will not need to make
    any changes to it for this recipe.


    Define an action in your header file for your button to perform called `-findPressed:`,
    like so:


    `-(IBAction)findPressed:(id)sender;`


    Now that your interface is set up, you will make sure that your header file is
    correctly written. First, add the following two import statements to make sure
    that you can use your Address Book and Address Book UI frameworks.


    `#import <AddressBook/AddressBook.h>`

    `#import <AddressBookUI/AddressBookUI.h>`


    You will be using an instance of the class `ABPeoplePickerNavigationController`,
    and setting its `peoplePickerDelegate` property to your view controller, so you
    need to add a protocol implementation to your header file. Make your view controller
    conform to the `ABPeoplePickerNavigationControllerDelegate` protocol. Your header
    file, in its entirety, should now look like so:


    `#import <UIKit/UIKit.h>`

    `#import <AddressBook/AddressBook.h>`

    `#import <AddressBookUI/AddressBookUI.h>`


    `@interface MainViewController : UIViewController`

    `<ABPeoplePickerNavigationControllerDelegate>`


    `@property (strong, nonatomic) IBOutlet UILabel *firstLabel;`

    `@property (strong, nonatomic) IBOutlet UILabel *lastLabel;`

    `@property (strong, nonatomic) IBOutlet UILabel *phoneLabel;`

    `@property (strong, nonatomic) IBOutlet UILabel *stateLabel;`

    `@property (strong, nonatomic) IBOutlet UILabel *cityLabel;`

    `-(IBAction)findPressed:(id)sender;`

    `@end`


    Switch over to your implementation file, and implement a simple `-viewDidLoad`
    method to reset the text on your `UILabel`s.


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `    self.firstLabel.text = @"...";`

    `    self.lastLabel.text = @"...";`

    `    self.phoneLabel.text = @"...";`

    `    self.cityLabel.text = @"...";`

    `    self.stateLabel.text = @"...";`

    `}`


    You will implement the `-findPressed:` method you defined earlier to create an
    instance of `ABPeoplePickerNavigationController`, set its delegate, and then present
    it modally.


    `-(void)findPressed:(id)sender`

    `{`

    `    ABPeoplePickerNavigationController *picker =[[ABPeoplePickerNavigationController`

    `alloc] init];`

    `    picker.peoplePickerDelegate = self;`

    `    [self presentModalViewController:picker animated:YES];`

    `}`


    Now you just need to create your delegate methods, of which there are three you
    are required to implement. The first, and simplest, is for when the picker controller
    is canceled.


    `-(void)peoplePickerNavigationControllerDidCancel:(ABPeoplePickerNavigationController`

    `*)peoplePicker`

    `{`

    `    [self dismissModalViewControllerAnimated:YES];`

    `}`


    Next, you will define your main delegate method to handle the selection of a contact.
    You will go through this method implementation step-by-step to discuss each part.


    First, your method header looks like so:


    `-(BOOL)peoplePickerNavigationController:(ABPeoplePickerNavigationController`

    `*)peoplePicker shouldContinueAfterSelectingPerson:(ABRecordRef)person`


    The first odd thing you may notice about this header is that the variable `person`
    is of type `ABRecordRef`, which does not have a “*” after it. This essentially
    means that `person` is not a pointer, and thus will not be used to call methods.
    Instead, you will use pre-defined functions that utilize and access it. As you
    will see, many parts of the Address Book framework utilize this more “C-based”
