    \ sender:(id)sender{\n    if([segue.identifier isEqualToString:@\"AppDetailsLoadFromTableViewCell\"\
    ]){\n        AppDetailsViewController *appDetailsVC = segue.destinationViewController;\n\
    \        appDetailsVC.selectedApp=[MyAppClass appWithAppID:[[self.tableView indexPathForSelectedRow]\
    \ row]+1];\n    }\n}\n\n#pragma mark - 表格视图数据源\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView\n{\n    return 1;\n}\n- (NSInteger)tableView:(UITableView *)tableView\
    \ numberOfRowsInSection:(NSInteger)section\n{\n    return 3;\n}\n\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    //设置你在故事板中指定的 CellIdentifier\n    static NSString *CellIdentifier = @\"\
    appCell\";\n\n    AppUITableViewCellClass *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \    if (cell == nil) {\n        cell = [[AppUITableViewCellClass alloc] initWithStyle:UITableViewCellStyleDefault\
    \ reuseIdentifier:CellIdentifier];\n    }\n\n    //配置单元格\n    MyAppClass *appForCell=[MyAppClass\
    \ appWithAppID:indexPath.row+1];\n    cell.labelAppName.text=appForCell.appName;\n\
    \    cell.labelAppDescription.text=appForCell.appDescription;\n    cell.imageAppIcon.image=appForCell.iconImage;\n\
    \n    return cell;\n}\n```\n\n现在运行应用时，`UITableView` 会像之前一样，使用那个原型单元格和数据源来加载。图\
    \ 2–68 显示了应用最新更新后的模拟结果。在此例中，你仍在使用 `MyAppClass` 的静态数据，但该应用可以轻松扩展，使用 Core Data 对象模型，甚至从服务器上的远程\
    \ XML 文件中拉取应用列表，从而实现真正的动态效果。这些功能将在第 10 章（数据存储方案）和第 11 章（Core Data 方案）中进一步介绍。\n\
    \n![图像](img/9781430240051_Fig02-68.jpg)\n\n**图 2–68.** *最新更改后的新应用视图*\n\n### 向现有项目添加故事板\n\
    \n你已经创建了一个“关于我们”应用，它运行良好，但独立来看并不出彩。它的目的是被包含在你的其他应用中，以便你能够轻松地在任何应用中展示公司信息，并方便地交叉推广你的应用库。\n\
    \n苹果为故事板提供了 API，使它们可以轻松地集成到尚未使用故事板的现有应用中。`UIStoryboard` 类提供了方法 `+storyboardWithName:bundle:`，用于加载指定名称的故事板。然后，你可以通过方法\
    \ `– instantiateInitialViewController` 加载故事板中的初始视图控制器。\n\n现在，我们创建一个不使用故事板的新项目，命名为“Chapter2Project”。使用菜单选项\
    \ **文件** ![图像](img/U001.jpg) **新建** ![图像](img/U001.jpg) **新建项目…** 来创建一个新的单视图应用程序。执行此操作的窗口将类似于图\
    \ 2–69。\n\n![图像](img/9781430240051_Fig02-69.jpg)\n\n**图 2–69.** *选择单视图应用程序*\n\n\
    这次，你将项目命名为“Chapter2Project”，并确保未选中“使用故事板”，就像图 2–70 所示。如果你的 Xcode 版本包含该选项，也请确保勾选“使用自动引用计数”复选框。如果你的版本还包含“类前缀”字段，请将其设置为\
    \ Chapter2Project。\n\n![图像](img/9781430240051_Fig02-70.jpg)\n\n**图 2–70.** *配置不使用故事板的新项目*\n\
    \n使用该新项目的导航窗格，在项目下创建一个名为“AboutUsStoryBoard”的新分组，结果如图 2–71 所示。\n\n![图像](img/9781430240051_Fig02-71.jpg)\n\
    \n**图 2–71.** *向项目添加子分组*\n\n现在，选择 `Chapter2ProjectViewController.xib`，并添加一个 `UIButton`，在触摸它时启动“关于我们”视图。你的视图应类似于图\
    \ 2–72 所示。\n\n![图像](img/9781430240051_Fig02-72.jpg)\n\n**图 2–72.** *已配置的视图控制器界面*\n\
    \n接下来，让我们通过使用助理编辑器并进行 `control-点击-拖拽` 操作，从 `UIButton` 到 `Chapter2ProjectViewController`\
    \ 接口文件（`.h`），将该“关于我们”按钮连接到一个 `IBAction`。将连接类型更改为“动作”，并在“名称”字段输入 **showAboutUsView**，如图\
    \ 2–73 所示。\n\n![图像](img/9781430240051_Fig02-73.jpg)\n\n**图 2–73.** *配置 `UIButton`\
    \ 的动作*\n\n在完成那个方法占位符之前，你需要将“关于我们”文件复制到此项目中。切换到“关于我们”项目，为了避免将“关于我们”故事板与你未来可能添加到项目中的任何其他故事板混淆，你应该重命名故事板。在项目导航窗格中，将\
    \ `MainStoryboard.storyboard` 的名称更改为 `AboutUs.storyboard`。如果你选择创建的是通用应用，它最初可能被命名为\
    \ `MainStoryboard_iPhone.storyboard`。在图 2–74 中，你可以看到故事板文件已被重命名为新名称。\n\n![图像](img/9781430240051_Fig02-74.jpg)\n\
    \n**图 2–74.** *为新建项目重命名故事板文件*\n\n现在，选择 AboutUs 组中除 `aboutUsAppDelegate.h`/`.m`\
    \ 文件之外的所有文件，并将它们复制到你之前创建的 Chapter2Project 项目的 AboutUs 组中。如果通过“拖放”移动这些文件，请确保在出现的传输窗口中勾选“将项目复制到目标组的文件夹中”复选框。图\
    \ 2–75 显示了从先前项目中复制文件后的导航窗格。\n\n![图像](img/9781430240051_Fig02-75.jpg)\n\n**图 2–75.**\
    \ *将故事板文件复制到你的新项目中*\n"
- fmt: "Now you can complete that `IBAction` you created in the `Chapter2ProjectViewController`\
    \ implementation file (`.m`). Select `Chapter2ProjectViewController.m` in the\
    \ project navigator pane, and import the `aboutUsViewController.h` header file.\
    \ Then scroll down to the bottom of the code where the `IBAction` method placeholder\
    \ is, and complete it so the file looks like this:\n\n```\n//  Chapter2ProjectViewController.m\n\
    \n#import \"Chapter2ProjectViewController.h\"\n#import \"aboutUsViewController.h\"\
    \n\n@implementation Chapter2ProjectViewController\n…\n- (IBAction)showAboutUsView:(id)sender\
    \ {\n    UIStoryboard *aboutUsStoryboard=[UIStoryboard storyboardWithName:@\"\
    AboutUs\"\nbundle:nil];\n    aboutUsViewController *aboutUsVC=[aboutUsStoryboard\n\
    instantiateInitialViewController];\n    [self presentViewController:aboutUsVC\
    \ animated:YES completion:nil];\n}\n@end\n```\n\nWhen the project is run and the\
    \ button is touched, your storyboard will load and all the subsequent views will\
    \ load, resulting in a view resembling those shown in [Figure 2–76](#Chapter02.html#fig_2_76).\n\
    \n![Image](images/9781430240051_Fig02-76.jpg)\n\n**Figure 2–76.** *Resulting application\
    \ with storyboard loaded*\n\nBut there is a problem. There is no way to close\
    \ your About Us view controller when you are done. The easiest method would be\
    \ to add a Back button to the view in your storyboard that dismisses the view.\n\
    \nFirst you define the `IBAction` that your Back button is going to trigger in\
    \ your `aboutUsViewController` interface file (`.h`):\n\n```\n//  aboutUsViewController.h\n\
    \n#import <UIKit/UIKit.h>\n\n@interface aboutUsViewController : UIViewController\n\
    \n-(IBAction)closeAboutUs:(id)sender;\n\n@end\n```\n\nThen implement the method\
    \ in the `aboutUsViewController` implementation file (`.m`):\n\n```\n//  aboutUsViewController.m\n\
    \n#import \"aboutUsViewController.h\"\n\n@implementation aboutUsViewController\n\
    \n-(IBAction)closeAboutUs:(id)sender{\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n}\n```\n\nOpen `AboutUs.storyboard`, and add a `UIBarButtonItem`\
    \ object with a title of “Back” to the `UINavigationBar` in the About Us view.\
    \ Then connect this `UIBarButtonItem` to the `IBAction closeAboutUs` by doing\
    \ a ^-click-drag from the `UIBarButtonItem` to the View Controller status bar\
    \ and then selecting the `closeAboutUs` event from the pop-up. These steps are\
    \ demonstrated in [Figure 2–77](#Chapter02.html#fig_2_77).\n\n![Image](images/9781430240051_Fig02-77.jpg)\n\
    \n**Figure 2–77.** *Connecting the bar button to a segue action*\n\nNow when you\
    \ run the application, you will be able to launch the About Us story board and\
    \ get back to your main app. Don’t forget that you should add this `UIBarButtonItem`\
    \ and method to the main About Us project so that when you copy it to future projects,\
    \ you don’t run into the same issue.\n\n### Summary\n\nThe first thing you will\
    \ notice in Xcode 4 is that Interface Builder is no longer a separate application.\
    \ The changes, however, go much deeper and represent a truly integrated experience.\
    \ Interface Builder has extended the ease of drag-and-drop interface building\
    \ into code generation when combined with the Assistant Editor view.\n\nThe Storyboards\
    \ tool takes your interface building even further and allows you to rapidly build\
    \ working prototypes of your applications. Your storyboard diagrams are no longer\
    \ thrown away when the coding starts but are an integral part of the application\
    \ development process and can be utilized by controllers. This new feature takes\
    \ the Model-View-Controller from an abstract best practice and makes it a tangible\
    \ application development process.\n\n## Chapter 3\n\n## Application Design Elements\n\
    \nEvery occupation has its own specific set of materials, tools, and methods,\
    \ and a person’s skill and understanding of this equipment are almost always what\
    \ define his or her success in the given field. In iOS development, you are given\
    \ a great many components and functionalities from which you can assemble your\
    \ applications. Having a full and practical understanding of these tools allows\
    \ any developer to considerably improve the quality of any work he or she contributes\
    \ to.\n\nIn this chapter, you will systematically go through the design elements\
    \ that iOS developers are initially given, discussing their purpose, use, implementation,\
    \ functionality, and general guidelines for acquiring the best possible result\
    \ from each item. Through this approach, you can acquire a better understanding\
    \ of how best to utilize the tools given to you to create higher-quality applications.\n\
    \n### Cocoa Touch Controls\n\nCocoa Touch includes a nice variety of items known\
    \ as “controls,” which are the main objects used by an application to interact\
    \ with the user. All of these elements, some of which are entirely new to iOS\
    \ 5.0, allow you to build a more advanced yet simpler user interface with which\
    \ to operate your applications."
  raw: 'Now you can complete that `IBAction` you created in the `Chapter2ProjectViewController`
    implementation file (`.m`). Select `Chapter2ProjectViewController.m` in the project
    navigator pane, and import the `aboutUsViewController.h` header file. Then scroll
    down to the bottom of the code where the `IBAction` method placeholder is, and
    complete it so the file looks like this:


    `//  Chapter2ProjectViewController.m`


    `#import "Chapter2ProjectViewController.h"`

    `#import "aboutUsViewController.h"`


    `@implementation Chapter2ProjectViewController`

    `…`

    `- (IBAction)showAboutUsView:(id)sender {`

    `    UIStoryboard *aboutUsStoryboard=[UIStoryboard storyboardWithName:@"AboutUs"`

    `bundle:nil];`

    `    aboutUsViewController *aboutUsVC=[aboutUsStoryboard`

    `instantiateInitialViewController];`

    `    [self presentViewController:aboutUsVC animated:YES completion:nil];`

    `}`

    `@end`


    When the project is run and the button is touched, your storyboard will load and
    all the subsequent views will load, resulting in a view resembling those shown
    in [Figure 2–76](#Chapter02.html#fig_2_76).


    ![Image](images/9781430240051_Fig02-76.jpg)


    **Figure 2–76.** *Resulting application with storyboard loaded*


    But there is a problem. There is no way to close your About Us view controller
    when you are done. The easiest method would be to add a Back button to the view
    in your storyboard that dismisses the view.


    First you define the `IBAction` that your Back button is going to trigger in your
    `aboutUsViewController` interface file (`.h`):


    `//  aboutUsViewController.h`


    `#import <UIKit/UIKit.h>`


    `@interface aboutUsViewController : UIViewController`


    `-(IBAction)closeAboutUs:(id)sender;`


    `@end`


    Then implement the method in the `aboutUsViewController` implementation file (`.m`):


    `//  aboutUsViewController.m`


    `#import "aboutUsViewController.h"`


    `@implementation aboutUsViewController`


    `-(IBAction)closeAboutUs:(id)sender{`

    `    [self dismissViewControllerAnimated:YES completion:nil];`

    `}`


    Open `AboutUs.storyboard`, and add a `UIBarButtonItem` object with a title of
    “Back” to the `UINavigationBar` in the About Us view. Then connect this `UIBarButtonItem`
    to the `IBAction closeAboutUs` by doing a ^-click-drag from the `UIBarButtonItem`
    to the View Controller status bar and then selecting the `closeAboutUs` event
    from the pop-up. These steps are demonstrated in [Figure 2–77](#Chapter02.html#fig_2_77).


    ![Image](images/9781430240051_Fig02-77.jpg)


    **Figure 2–77.** *Connecting the bar button to a segue action*


    Now when you run the application, you will be able to launch the About Us story
    board and get back to your main app. Don’t forget that you should add this `UIBarButtonItem`
    and method to the main About Us project so that when you copy it to future projects,
    you don’t run into the same issue.


    ### Summary


    The first thing you will notice in Xcode 4 is that Interface Builder is no longer
    a separate application. The changes, however, go much deeper and represent a truly
    integrated experience. Interface Builder has extended the ease of drag-and-drop
    interface building into code generation when combined with the Assistant Editor
    view.


    The Storyboards tool takes your interface building even further and allows you
    to rapidly build working prototypes of your applications. Your storyboard diagrams
    are no longer thrown away when the coding starts but are an integral part of the
    application development process and can be utilized by controllers. This new feature
    takes the Model-View-Controller from an abstract best practice and makes it a
    tangible application development process.


    ## Chapter 3


    ## Application Design Elements


    Every occupation has its own specific set of materials, tools, and methods, and
    aperson’s skill and understanding of this equipment arealmost always what definehis
    or hersuccess in the given field. In iOS development, you are given a great many
    components and functionalities from which you can assemble your applications.
    Having a full and practical understanding of these tools allows any developer
    to considerably improve the quality of any work he or shecontributes to.


    In this chapter, you will systematically go through the design elements that iOS
    developers are initially given, discussing their purpose, use, implementation,
    functionality, and general guidelines for acquiring the best possible result from
    each item. Through this approach, you can acquire a better understanding of how
    best to utilize the tools given to youto create higher-quality applications.


    ### Cocoa Touch Controls


    Cocoa Touch includes a nice variety of items known as “controls,” which are the
    main objects used by an application to interact with the user. All of these elements,
    some of which are entirely new to iOS 5.0, allow you to build a more advanced
    yet simpler user interface with which to operate your applications.'
