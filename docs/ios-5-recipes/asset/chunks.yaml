    \ = [(Country *)[self.countries objectAtIndex:indexPath.row]\ncapital];\n```\n\
    \n`UITableViewCell` 类还有一个名为 `imageView` 的属性，当为其设置图片时，该图片会显示在标题标签的左侧。通过在单元格配置中添加以下代码行来实现：\n\
