- fmt: "#### Enhanced User Interaction\n\nWhen you’re dealing with applications that\
    \ focus on `UITableView`s, you often may want to allow the user to access multiple\
    \ different views from the same table. For example, the Phone application on an\
    \ iPhone has a voicemail tab, which displays a `UITableView` containing the various\
    \ voicemails left on the phone. The user can then either play the voicemail by\
    \ selecting a row from the table, or, by selecting a smaller blue button on the\
    \ right side of the row, view the contact information of the original caller.\
    \ You can implement a similar behavior by implementing another `UITableView` delegate\
    \ method.\n\nFirst, you must change the type of “accessory” of the cells in your\
    \ `UITableView`. This refers to the icon displayed on the far right side of any\
    \ given row. In your `-tableView:cellForRowAtIndexPath:` method, find the following\
    \ line:\n\n```\n        cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n\
    ```\n\nChange this value to `UITableViewCellAccessoryDetailDisclosureButton`.\
    \ This will give us the nice little blue button that can respond to touches. The\
    \ four possible values for this property are as follows:\n\n- `UITableViewCellAccessoryNone`:\
    \ Specifies a lack of accessory\n- `UITableViewCellAccessoryDisclosureIndicator`:\
    \ Adds a gray arrow on the right side of a row, as you have been using up until\
    \ now\n- `UITableViewCellAccessoryDetailDisclosureButton`: Your most recent choice\
    \ that specifies an interaction-enabled button\n- `UITableViewCellAccessoryCheckmark`:\
    \ Adds a checkmark to a given row; this is especially useful in conjunction with\
    \ the `-tableView:didSelectRowAtIndexPath:` method in order to add and remove\
    \ checkmarks from a list as you find necessary.\n\n**NOTE:** While these four\
    \ available accessory types are pretty useful and will cover almost any generic\
    \ use, it’s certainly easy to think of a reason to want something entirely different\
    \ over on the right side of your row. You can easily customize a `UITableViewCell`’s\
    \ accessory through the `accessoryView` property to be any other `UIView` subclass.\n\
    \nNow that you turned your accessory into a button, it is actually incredibly\
    \ easy to implement an action to handle this interaction. You implement another\
    \ `UITableView` delegate method, `-tableView:accessoryButtonTappedForRowWithIndexPath:`.\
    \ For your testing purposes, you’ll make this action the exact same as that of\
    \ a row selection, with an extra `NSLog()`, though it should be very easy to see\
    \ how you could implement different behavior.\n\n```\n-(void)tableView:(UITableView\
    \ *)tableView accessoryButtonTappedForRowWithIndexPath:(NSIndexPath *)indexPath\n\
    {\n    [tableView deselectRowAtIndexPath:indexPath animated:YES];\n\n    selectedIndexPath\
    \ = indexPath;\n\n    Country *chosenCountry = [self.countries objectAtIndex:indexPath.row];\n\
    \    CountryInfoViewController *infoVC = [[CountryInfoViewController alloc] init];\n\
    \    infoVC.delegate = self;\n    infoVC.currentCountry = chosenCountry;\n\n \
    \   NSLog(@\"Accessory Button Tapped\");\n    [self.navigationController pushViewController:infoVC\
    \ animated:YES];\n}\n```\n\nWhen you run this app, tapping the accessory buttons\
    \ should run your newest functionalities, as shown in [Figure 9–10](#Chapter09.html#fig_9_10).\n\
    \n![Image](images/9781430240051_Fig09-10.jpg)\n\n**Figure 9–10.** *Your `UITableView`\
    \ with detail-disclosure buttons responding to events*\n\n#### A Note on Cell\
    \ View Customization\n\nJust like with the accessory view, several other parts\
    \ of a `UITableViewCell` are customizable by way of their views. The `UITableViewCell`\
    \ class includes several properties for other views that you can edit, including\
    \ the following:\n\n- `imageView`: The `UIImageView` to the left of the `textLabel`\
    \ in a cell, as shown by your flags in the previous example; if no image is given\
    \ to this view, then the cell will appear as if the `UIImageView` did not exist\
    \ (as opposed to a blank `UIImageView` taking up space).\n- `contentView`: The\
    \ main `UIView` of the `UITableViewCell`, which includes all the text; you may\
    \ wish to customize this to implement a more powerful or versatile `UITableViewCell`.\n\
    - `backgroundView`: A `UIView` set to `nil` in plain-style tables (like you have\
    \ used so far), and otherwise for grouped tables; this view will appear behind\
    \ all other views in the table, so it is great for specifically customizing the\
    \ visual display of the cell.\n- `selectedBackgroundView`: This `UIView` is inserted\
    \ above the `backgroundView` but behind all other views when a cell is selected.\
    \ It can also be easily given an alpha animation (fading opacity in or out) by\
    \ use of the `-setSelected:animated:` action.\n- `multipleSelectionBackgroundView`:\
    \ This `UIView` acts just like the `selectedBackgroundView`, but is used for when\
    \ a `UITableView` is enabled to allow the selection of multiple rows.\n- `accessoryView`:\
    \ As discussed earlier, this allows you to create entirely different views for\
    \ a row’s accessory, so you could implement your own custom display and behavior\
    \ beyond the pre-set values.\n- `editingAccessoryView`: This is similar to the\
    \ `accessoryView` property but specifically for when a `UITableView` is in “editing”\
    \ mode, which you will see in detail soon.\n\nWhile most developers stick to the\
    \ pretty generic `UITableView` since it fits well with the iOS design theme, if\
    \ you look around you can find some pretty creative implementations of custom\
    \ views. All this extra customization may add a lot of development time to your\
    \ project, but a high-quality, custom `UITableView` will certainly stand out in\
    \ an application for its uniqueness."
  raw: '#### Enhanced User Interaction


    When you’re dealing with applications that focus on `UITableView`s, you often
    may want to allow the user to access multiple different views from the same table.
    For example, the Phone application on an iPhone has a voicemail tab, which displays
    a `UITableView` containing the various voicemails left on the phone. The user
    can then either play the voicemail by selecting a row from the table, or, by selecting
    a smaller blue button on the right side of the row, view the contact information
    of the original caller. You can implement a similar behavior by implementing another
    `UITableView` delegate method.


    First, you must change the type of “accessory” of the cells in your `UITableView`.
    This refers to the icon displayed on the far right side of any given row. In your
    `-tableView:cellForRowAtIndexPath:` method, find the following line:


    `        cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;`


    Change this value to `UITableViewCellAccessoryDetailDisclosureButton`. This will
    give us the nice little blue button that can respond to touches. The four possible
    values for this property are as follows:


    *   `UITableViewCellAccessoryNone`: Specifies a lack of accessory

    *   `UITableViewCellAccessoryDisclosureIndicator`: Adds a gray arrow on the right
    side of a row, as you have been using up until now

    *   `UITableViewCellAccessoryDetailDisclosureButton`: Your most recent choice
    that specifies an interaction-enabled button

    *   `UITableViewCellAccessoryCheckmark`: Adds a checkmark to a given row; this
    is especially useful in conjunction with the `-tableView:didSelectRowAtIndexPath:`
    method in order to add and remove checkmarks from a list as you find necessary.


    **NOTE:** While these four available accessory types are pretty useful and will
    cover almost any generic use, it’s certainly easy to think of a reason to want
    something entirely different over on the right side of your row. You can easily
    customize a `UITableViewCell`’s accessory through the `accessoryView` property
    to be any other `UIView` subclass.


    Now that you turned your accessory into a button, it is actually incredibly easy
    to implement an action to handle this interaction. You implement another `UITableView`
    delegate method, `-tableView:accessoryButtonTappedForRowWithIndexPath:`. For your
    testing purposes, you’ll make this action the exact same as that of a row selection,
    with an extra `NSLog()`, though it should be very easy to see how you could implement
    different behavior.


    `-(void)tableView:(UITableView *)tableView accessoryButtonTappedForRowWithIndexPath:(NSIndexPath
    *)indexPath`

    `{`

    `    [tableView deselectRowAtIndexPath:indexPath animated:YES];`


    `    selectedIndexPath = indexPath;`


    `    Country *chosenCountry = [self.countries objectAtIndex:indexPath.row];`

    `    CountryInfoViewController *infoVC = [[CountryInfoViewController alloc] init];`

    `    infoVC.delegate = self;`

    `    infoVC.currentCountry = chosenCountry;`


    `    NSLog(@"Accessory Button Tapped");`

    `    [self.navigationController pushViewController:infoVC animated:YES];`

    `}`


    When you run this app, tapping the accessory buttons should run your newest functionalities,
    as shown in [Figure 9–10](#Chapter09.html#fig_9_10).


    ![Image](images/9781430240051_Fig09-10.jpg)


    **Figure 9–10.** *Your `UITableView` with detail-disclosure buttons responding
    to events*


    #### A Note on Cell View Customization


    Just like with the accessory view, several other parts of a `UITableViewCell`
    are customizable by way of their views. The `UITableViewCell` class includes several
    properties for other views that you can edit, including the following:


    *   `imageView`: The `UIImageView` to the left of the `textLabel` in a cell, as
    shown by your flags in the previous example; if no image is given to this view,
    then the cell will appear as if the `UIImageView` did not exist (as opposed to
    a blank `UIImageView` taking up space).

    *   `contentView`: The main `UIView` of the `UITableViewCell`, which includes
    all the text; you may wish to customize this to implement a more powerful or versatile
    `UITableViewCell`.

    *   `backgroundView`: A `UIView` set to `nil` in plain-style tables (like you
    have used so far), and otherwise for grouped tables; this view will appear behind
    all other views in the table, so it is great for specifically customizing the
    visual display of the cell.

    *   `selectedBackgroundView`: This `UIView` is inserted above the `backgroundView`
    but behind all other views when a cell is selected. It can also be easily given
    an alpha animation (fading opacity in or out) by use of the `-setSelected:animated:`
    action.

    *   `multipleSelectionBackgroundView`: This `UIView` acts just like the `selectedBackgroundView`,
    but is used for when a `UITableView` is enabled to allow the selection of multiple
    rows.

    *   `accessoryView`: As discussed earlier, this allows you to create entirely
    different views for a row’s accessory, so you could implement your own custom
    display and behavior beyond the pre-set values.

    *   `editingAccessoryView`: This is similar to the `accessoryView` property but
    specifically for when a `UITableView` is in “editing” mode, which you will see
    in detail soon.


    While most developers stick to the pretty generic `UITableView` since it fits
    well with the iOS design theme, if you look around you can find some pretty creative
    implementations of custom views. All this extra customization may add a lot of
    development time to your project, but a high-quality, custom `UITableView` will
    certainly stand out in an application for its uniqueness.'
  trans: "\n#### 增强的用户交互\n\n当你处理以 `UITableView` 为核心的应用程序时，通常可能希望允许用户从同一个表格中访问多个不同的视图。例如，iPhone\
    \ 上的“电话”应用有一个“语音留言”标签页，其中显示一个包含各种语音留言的 `UITableView`。用户既可以通过选择表格中的某一行来播放语音留言，也可以通过选择行右侧的一个较小的蓝色按钮，来查看原始呼叫者的联系信息。你可以通过实现另一个\
    \ `UITableView` 委托方法来实现类似的行为。\n\n首先，你必须更改 `UITableView` 中单元格的“附件”类型。这指的是任何给定行最右侧显示的图标。在你的\
    \ `-tableView:cellForRowAtIndexPath:` 方法中，找到下面这行代码：\n\n```\n        cell.accessoryType\
    \ = UITableViewCellAccessoryDisclosureIndicator;\n```\n\n将此值更改为 `UITableViewCellAccessoryDetailDisclosureButton`。这将为我们提供那个漂亮的、可以响应触摸的小蓝色按钮。此属性可能的四个值如下所示：\n\
    \n- `UITableViewCellAccessoryNone`：表示没有附件\n- `UITableViewCellAccessoryDisclosureIndicator`：在行的右侧添加一个灰色箭头，就像你一直使用的那样\n\
    - `UITableViewCellAccessoryDetailDisclosureButton`：你刚刚选择的值，指定了一个可交互的按钮\n- `UITableViewCellAccessoryCheckmark`：在特定行添加一个勾选标记；这在结合\
    \ `-tableView:didSelectRowAtIndexPath:` 方法、根据需要从列表中添加或移除勾选标记时特别有用\n\n**注意：** 虽然这四种可用的附件类型非常有用，并且几乎可以覆盖所有通用场景，但肯定很容易想到需要在你行的右侧放置完全不同内容的情况。你可以通过\
    \ `accessoryView` 属性轻松地将 `UITableViewCell` 的附件自定义为任何其他 `UIView` 的子类。\n\n现在你已经将附件变成了一个按钮，实际上，实现一个处理此交互的动作非常容易。你只需实现另一个\
    \ `UITableView` 委托方法：`-tableView:accessoryButtonTappedForRowWithIndexPath:`。为了测试目的，我们将让这个动作与行选择动作完全相同，只是额外添加一个\
    \ `NSLog()`，不过你应该很容易看到如何实现不同的行为。\n\n```\n-(void)tableView:(UITableView *)tableView\
    \ accessoryButtonTappedForRowWithIndexPath:(NSIndexPath *)indexPath\n{\n    [tableView\
    \ deselectRowAtIndexPath:indexPath animated:YES];\n\n    selectedIndexPath = indexPath;\n\
    \n    Country *chosenCountry = [self.countries objectAtIndex:indexPath.row];\n\
    \    CountryInfoViewController *infoVC = [[CountryInfoViewController alloc] init];\n\
    \    infoVC.delegate = self;\n    infoVC.currentCountry = chosenCountry;\n\n \
    \   NSLog(@\"Accessory Button Tapped\");\n    [self.navigationController pushViewController:infoVC\
    \ animated:YES];\n}\n```\n\n当你运行此应用时，点击附件按钮即可运行你的最新功能，如图 9–10 所示。\n\n![图片](img/9781430240051_Fig09-10.jpg)\n\
    \n**图 9–10.** *你的带有详细信息公开按钮的 `UITableView` 响应事件*\n\n#### 关于单元格视图自定义的说明\n\n与附件视图一样，`UITableViewCell`\
    \ 的其它几个部分也可以通过其视图进行自定义。`UITableViewCell` 类包含几个你可以编辑的其他视图的属性，包括以下内容：\n\n- `imageView`：单元格中位于\
    \ `textLabel` 左侧的 `UIImageView`，如之前示例中的国旗所示；如果没有给此视图提供图像，单元格将表现得像 `UIImageView`\
    \ 不存在一样（而不是一个占用空间的空白 `UIImageView`）。\n- `contentView`：`UITableViewCell` 的主要 `UIView`，包含所有文本；你可能希望自定义此视图以实现功能更强大或更通用的\
    \ `UITableViewCell`。\n- `backgroundView`：在平铺风格表格中设置为 `nil` 的 `UIView`（就像你目前使用的那样），而在分组表格中则不然；此视图将出现在表格中所有其他视图的背后，因此非常适合专门自定义单元格的视觉显示。\n\
    - `selectedBackgroundView`：当单元格被选中时，此 `UIView` 会插入到 `backgroundView` 之上、但位于所有其他视图之下。它也可以借助\
    \ `-setSelected:animated:` 操作轻松实现 alpha 动画（淡入或淡出）。\n- `multipleSelectionBackgroundView`：此\
    \ `UIView` 的行为与 `selectedBackgroundView` 类似，但在 `UITableView` 允许选择多行时使用。\n- `accessoryView`：如前所述，这允许你为行的附件创建完全不同的视图，因此你可以在预设值之外实现自己的自定义显示和行为。\n\
    - `editingAccessoryView`：这与 `accessoryView` 属性类似，但专门用于 `UITableView` 处于“编辑”模式时，你很快会详细看到这一点。\n\
    \n虽然大多数开发者坚持使用相当通用的 `UITableView`，因为它与 iOS 设计主题非常契合，但如果你留意一下，可以找到一些非常有创意的自定义视图实现。所有这些额外的自定义可能会为你的项目增加大量开发时间，但一个高质量、自定义的\
    \ `UITableView` 肯定会因其独特性而在应用中脱颖而出。\n"
- fmt: "### Recipe 9–2: Editing a `UITableView`\n\nIf you look at almost any `UITableView`\
    \ in an application you commonly use, such as your device’s music player, you’ll\
    \ probably notice that you can edit the table in some way. In your Music application,\
    \ you can swipe across a row in order to reveal a Delete button, which can then\
    \ remove an item from a table. In your Mail application, you can press the Edit\
    \ button in the upper right-hand corner to allow the selection of multiple messages\
    \ for deletion, movement, and other functions. Both of these functionalities are\
    \ based on the concept of “editing” a `UITableView`.\n\nThe first thing you can\
    \ look at is the idea of putting your `UITableView` into “editing” mode, since\
    \ for your users to be able to use your editing functionality, they need to be\
    \ able to access it. You will do this by adding an Edit button to the top right-hand\
    \ corner of your view. Surprisingly enough, this is very easy to do by adding\
    \ the following line to your `-viewDidLoad` method.\n\n`self.navigationItem.rightBarButtonItem\
    \ = self.editButtonItem;`\n\nThis `editButtonItem` property is not actually a\
    \ property that you need to define, as it is pre-set for every `UIViewController`\
    \ subclass. The especially great thing about this button is that it is programmed\
    \ not only to call a specific method already, but also to toggle its text between\
    \ “Edit” and “Done”.\n\nThe `editButtonItem` by default is set to call the method\
    \ `-setEditing:animated:`, which you will create a simple implementation for:\n\
    \n```\n-(void)setEditing:(BOOL)editing animated:(BOOL)animated\n{\n    [super\
    \ setEditing:editing animated:animated];\n    [self.tableViewCountries setEditing:editing\
    \ animated:animated];\n}\n```\n\nThe main ideas of this method are simple, in\
    \ that first you call the `super` method, which will handle the toggling of the\
    \ button’s text, and then you set the editing mode of your `UITableView` according\
    \ to the parameters given.\n\nAt this point, your application’s Edit button will\
    \ trigger the editing mode of the `UITableView`, allowing you to reveal the Delete\
    \ buttons for any given row. However, since you haven’t actually implemented any\
    \ behavior for these buttons, you won’t actually be able to delete any rows from\
    \ your table yet. To do this, you must first implement one more delegate method,\
    \ `-tableView:commitEditingStyle:forRowAtIndexPath:`.\n\nHere’s a pretty basic\
    \ implementation of this method that you’ll start with:\n\n```\n-(void)tableView:(UITableView\
    \ *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle forRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
    \    {\n        Country *deletedCountry = [self.countries objectAtIndex:indexPath.row];\n\
    \        [self.countries removeObject:deletedCountry];\n\n        [tableViewCountries\
    \ deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath] withRowAnimation:UITableViewRowAnimationAutomatic];\n\
    \    }\n}\n```\n\nIt is *very* important in this method that you make sure to\
    \ delete the actual piece of data from your model before removing the row(s) from\
    \ your `UITableView`, just like how in the previous example you first delete the\
    \ country from your array, and then remove its row. Otherwise, your application\
    \ will throw an exception.\n\nNow when you run your app, you can tap the Edit\
    \ button to put your `UITableView` into editing mode, resembling [Figure 9–11](#Chapter09.html#fig_9_11).\n\
    \n![Image](images/9781430240051_Fig09-11.jpg)\n\n**Figure 9–11.** *Your `UITableView`\
    \ in editing mode, with functionality for removing rows*\n\n#### `UITableView`\
    \ Row Animations\n\nIn the method you just added, you specified a specific animation\
    \ type to be performed upon the deletion of a row, called `UITableViewRowAnimationAutomatic`.\
    \ The parameter that accepts this value has various other pre-set values with\
    \ which you can customize the visual behavior of your rows, including the following:\n\
    \n*   `UITableViewRowAnimationBottom`\n*   `UITableViewRowAnimationFade`\n*  \
    \ `UITableViewRowAnimationLeft`\n*   `UITableViewRowAnimationMiddle`\n*   `UITableViewRowAnimationNone`\n\
    *   `UITableViewRowAnimationRight`\n*   `UITableViewRowAnimationTop`\n\nThe animation\
    \ type that you choose won’t make any significant difference in how your application\
    \ performs, but it can certainly change how an application looks and feels to\
    \ the end user. It’s best to play around with these and see which animation looks\
    \ best in your application.\n\nAt this point, your method should now be able to\
    \ handle the deletion of rows from your table! Since you wrote your program to\
    \ re-create your data every time the application runs, it should be pretty easy\
    \ to test this out. When you are about to delete a row from a table, your table\
    \ will resemble [Figure 9–12](#Chapter09.html#fig_9_12).\n\n![Image](images/9781430240051_Fig09-12.jpg)\n\
    \n**Figure 9–12.** *Deleting a row from a table*"
  raw: '### Recipe 9–2: Editing a UITableView


    If you look at almost any `UITableView` in an application you commonly use, such
    as your device’s music player, you’ll probably notice that you can edit the table
    in some way. In your Music application, you can swipe across a row in order to
    reveal a Delete button, which can then remove an item from a table. In your Mail
    application, you can press the Edit button in the upper right-hand corner to allow
    the selection of multiple messages for deletion, movement, and other functions.
    Both of these functionalities are based on the concept of “editing” a `UITableView`.


    The first thing you can look at is the idea of putting your `UITableView` into
    “editing” mode, since for your users to be able to use your editing functionality,
    they need to be able to access it. You will do this by adding an Edit button to
    the top right-hand corner of your view. Surprisingly enough, this is very easy
    to do by adding the following line to your `-viewDidLoad` method.


    `self.navigationItem.rightBarButtonItem = self.editButtonItem;`


    This `editButtonItem` property is not actually a property that you need to define,
    as it is pre-set for every `UIViewController` subclass. The especially great thing
    about this button is that it is programmed not only to call a specific method
    already, but also to toggle its text between “Edit” and “Done”.


    The `editButtonItem` by default is set to call the method `-setEditing:animated:`,
    which you will create a simple implementation for:


    `-(void)setEditing:(BOOL)editing animated:(BOOL)animated`

    `{`

    `    [super setEditing:editing animated:animated];`

    `    [self.tableViewCountries setEditing:editing animated:animated];`

    `}`


    The main ideas of this method are simple, in that first you call the `super` method,
    which will handle the toggling of the button’s text, and then you set the editing
    mode of your `UITableView` according to the parameters given.


    At this point, your application’s Edit button will trigger the editing mode of
    the `UITableView`, allowing you to reveal the Delete buttons for any given row.
    However, since you haven’t actually implemented any behavior for these buttons,
    you won’t actually be able to delete any rows from your table yet. To do this,
    you must first implement one more delegate method, `-tableView:commitEditingStyle:forRowAtIndexPath:`.


    Here’s a pretty basic implementation of this method that you’ll start with:


    `-(void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle
    forRowAtIndexPath:(NSIndexPath *)indexPath`

    `{`

    `    if (editingStyle == UITableViewCellEditingStyleDelete)`

    `    {`

    `        Country *deletedCountry = [self.countries objectAtIndex:indexPath.row];`

    `        [self.countries removeObject:deletedCountry];`


    `        [tableViewCountries deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]
    withRowAnimation:UITableViewRowAnimationAutomatic];`

    `    }`

    `}`


    It is *very* important in this method that you make sure to delete the actual
    piece of data from your model before removing the row(s) from your `UITableView`,
    just like how in the previous example you first delete the country from your array,
    and then remove its row. Otherwise, your application will throw an exception.


    Now when you run your app, you can tap the Edit button to put your `UITableView`
    into editing mode, resembling [Figure 9–11](#Chapter09.html#fig_9_11).


    ![Image](images/9781430240051_Fig09-11.jpg)


    **Figure 9–11.** *Your `UITableView` in editing mode, with functionality for removing
    rows*


    #### UITableView Row Animations


    In the method you just added, you specified a specific animation type to be performed
    upon the deletion of a row, called `UITableViewRowAnimationAutomatic`. The parameter
    that accepts this value has various other pre-set values with which you can customize
    the visual behavior of your rows, including the following:


    *   `UITableViewRowAnimationBottom`

    *   `UITableViewRowAnimationFade`

    *   `UITableViewRowAnimationLeft`

    *   `UITableViewRowAnimationMiddle`

    *   `UITableViewRowAnimationNone`

    *   `UITableViewRowAnimationRight`

    *   `UITableViewRowAnimationTop`


    The animation type that you choose won’t make any significant difference in how
    your application performs, but it can certainly change how an application looks
    and feels to the end user. It’s best to play around with these and see which animation
    looks best in your application.


    At this point, your method should now be able to handle the deletion of rows from
    your table! Since you wrote your program to re-create your data every time the
    application runs, it should be pretty easy to test this out. When you are about
    to delete a row from a table, your table will resemble [Figure 9–12](#Chapter09.html#fig_9_12).


    ![Image](images/9781430240051_Fig09-12.jpg)


    **Figure 9–12.** *Deleting a row from a table*'
  trans: "\n### 技巧 9–2：编辑 `UITableView`\n\n如果你观察一下常用应用（比如设备上的音乐播放器）中的任何一个 `UITableView`，你很可能会发现可以以某种方式编辑表格。在音乐应用中，你可以滑动某一行来显示删除按钮，然后从表格中移除条目。在邮件应用中，你可以点击右上角的编辑按钮，以便选择多条消息进行删除、移动或其他操作。这两种功能都基于“编辑”`UITableView`\
    \ 的概念。\n\n首先要考虑的是将 `UITableView` 置于“编辑”模式，因为用户需要使用你的编辑功能，就必须能够访问它。你可以在视图的右上角添加一个编辑按钮来实现这一点。令人惊讶的是，这非常简单，只需在\
    \ `-viewDidLoad` 方法中添加以下代码行即可。\n\n`self.navigationItem.rightBarButtonItem = self.editButtonItem;`\n\
    \n这个 `editButtonItem` 属性实际上并不是你需要定义的属性，因为它对每个 `UIViewController` 子类都是预置的。这个按钮特别棒的地方在于，它不仅已经编程为会自动调用一个特定方法，还能在“编辑”和“完成”之间切换文本。\n\
    \n默认情况下，`editButtonItem` 被设置为调用 `-setEditing:animated:` 方法，你可以为其创建一个简单的实现：\n\n\
    ```\n-(void)setEditing:(BOOL)editing animated:(BOOL)animated\n{\n    [super setEditing:editing\
    \ animated:animated];\n    [self.tableViewCountries setEditing:editing animated:animated];\n\
    }\n```\n\n这个方法的主要思路很简单：首先调用 `super` 方法，它会处理按钮文本的切换，然后根据给定的参数设置 `UITableView` 的编辑模式。\n\
    \n此时，应用中的编辑按钮将触发 `UITableView` 的编辑模式，从而允许显示任意行的删除按钮。但是，由于你实际上还没有为这些按钮实现任何行为，因此你还无法从表格中删除任何行。为此，你必须先实现另一个委托方法\
    \ `-tableView:commitEditingStyle:forRowAtIndexPath:`。\n\n以下是你将采用的此方法的一个基本实现：\n\
    \n```\n-(void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\
    \ forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
    \    {\n        Country *deletedCountry = [self.countries objectAtIndex:indexPath.row];\n\
    \        [self.countries removeObject:deletedCountry];\n\n        [tableViewCountries\
    \ deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath] withRowAnimation:UITableViewRowAnimationAutomatic];\n\
    \    }\n}\n```\n\n在这个方法中，*非常*重要的是，在从 `UITableView` 中删除行之前，务必先从模型中删除实际的数据元素，就像之前的示例中先删除数组中的国家，然后再删除其行一样。否则，你的应用将抛出异常。\n\
    \n现在运行你的应用，你可以点击编辑按钮将 `UITableView` 置于编辑模式，如图所示图 9–11。\n\n![图片](img/9781430240051_Fig09-11.jpg)\n\
    \n**图 9–11.** *处于编辑模式并具备删除行功能的 `UITableView`*\n\n#### `UITableView` 行动画\n\n在你刚刚添加的方法中，你指定了一种特定的动画类型，用于在删除行时执行，即\
    \ `UITableViewRowAnimationAutomatic`。接受此值的参数还有其他各种预置值，你可以用它们自定义行的视觉行为，包括：\n\n\
    *   `UITableViewRowAnimationBottom`\n*   `UITableViewRowAnimationFade`\n*   `UITableViewRowAnimationLeft`\n\
    *   `UITableViewRowAnimationMiddle`\n*   `UITableViewRowAnimationNone`\n*   `UITableViewRowAnimationRight`\n\
    *   `UITableViewRowAnimationTop`\n\n你选择的动画类型不会对应用性能产生显著影响，但确实可以改变应用在最终用户眼中的外观和体验。最好多尝试这些动画，看看哪种在你的应用中看起来效果最佳。\n\
    \n此时，你的方法应该已经能够处理从表格中删除行的操作了！由于你编写的程序会在每次应用运行时重新创建数据，因此测试这一点应该相当容易。当你即将从表格中删除一行时，你的表格将如图所示图\
    \ 9–12。\n\n![图片](img/9781430240051_Fig09-12.jpg)\n\n**图 9–12.** *从表格中删除一行*\n"
- fmt: "#### But Wait, There’s More!\n\nDeletion is not the only kind of editing that\
    \ can occur in a `UITableView`. While not used quite as often, iOS includes functionality\
    \ to allow rows to be created and inserted with the same method with which they\
    \ were deleted.\n\nThe default editing style for any row in a `UITableView` is\
    \ `UITableViewCellEditingStyleDelete`, so in order to implement row insertion,\
    \ you need to change this. For fun, you will give every other row an “insertion”\
    \ editing style by implementing the `-tableView:editingStyleForRowAtIndexPath:`\
    \ method.\n\n```\n-(UITableViewCellEditingStyle)tableView:(UITableView *)tableView\
    \ editingStyleForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if ((indexPath.row\
    \ % 2) == 1)\n    {\n        return UITableViewCellEditingStyleInsert;\n    }\n\
    \    return UITableViewCellEditingStyleDelete;\n}\n```\n\nJust as before, you\
    \ will need to specify the behavior to be followed upon the selection of an Insertion\
    \ button. You will add a case to your `-tableView:commitEditingStyle:forRowAtIndexPath:`\
    \ so the method now looks like so:\n\n```\n-(void)tableView:(UITableView *)tableView\n\
    commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\nforRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
    \    {\n        Country *deletedCountry = [self.countries objectAtIndex:indexPath.row];\n\
    \        [self.countries removeObject:deletedCountry];\n\n        [tableViewCountries\
    \ deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\nwithRowAnimation:UITableViewRowAnimationAutomatic];\n\
    \    }\n    else if (editingStyle == UITableViewCellEditingStyleInsert)\n    {\n\
    \        Country *copiedCountry = [self.countries objectAtIndex:indexPath.row];\n\
    \        Country *newCountry = [[Country alloc] init];\n        newCountry.name\
    \ = copiedCountry.name;\n        newCountry.flag = copiedCountry.flag;\n     \
    \   newCountry.capital = copiedCountry.capital;\n        newCountry.motto = copiedCountry.motto;\n\
    \n        [self.countries insertObject:newCountry atIndex:indexPath.row+1];\n\n\
    \        [self.tableViewCountries insertRowsAtIndexPaths:[NSArray arrayWithObject:[NSIndexPath\
    \ indexPathForRow:indexPath.row+1 inSection:indexPath.section]] withRowAnimation:UITableViewRowAnimationRight];\n\
    \    }\n}\n```\n\nYou can see that you have gone with a pretty easy implementation\
    \ for insertion, in that all you have done is inserted a copy of the row selected.\
    \ It should be noted that by changing the index values in this method, you could\
    \ easily insert objects to nearly any row in the table; it is not necessary to\
    \ insert into only the following row.\n\nAs with the deletion, you must make sure\
    \ that your data model is updated before your table view is, so you add the new\
    \ `Country` to your array before you insert the new row into your `UITableView`.\n\
    \nUpon running your app and editing your table, you will be able to see both deletion\
    \ and insertion buttons, as in [Figure 9–13](#Chapter09.html#fig_9_13).\n\n![Image](images/9781430240051_Fig09-13.jpg)\n\
    \n**Figure 9–13.** *Editing a `UITableView` with insertion or deletion*\n\nThere\
    \ are two other `UITableView` delegate methods that can be used in combination\
    \ with editing to further customize your application’s behavior.\n\n- The `-tableView:willBeginEditingRowAtIndexPath:`\
    \ method allows you to get a kind of “first look” at whichever row was selected\
    \ for editing, and act accordingly.\n- The `-tableView:didEndEditingRowAtIndexPath:`\
    \ method can be used as a completion block, in that you can specify any actions\
    \ you deem necessary to be performed with a row, but only after a row’s editing\
    \ has finished.\n\n### Recipe 9–3: Re-ordering a UITableView\n\nNow that we have\
    \ covered deletion and insertion of rows, the next logical step in terms of functionality\
    \ of a table would be to make it so that you can move your rows around. This is\
    \ actually pretty simple to incorporate given how you have set up your application.\n\
    \nFirst, you have to specify exactly which of your rows are allowed to move using\
    \ `-tableView:canMoveRowAtIndexPath:`.\n\n```\n-(BOOL)tableView:(UITableView *)tableView\
    \ canMoveRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    return YES;\n}\n```\n\
    \nI’ve chosen the easy way out of this by simply making them all editable, but\
    \ you can easily change this depending on your application.\n\nNow, you simply\
    \ need to implement a delegate to update your data model upon the successful movement\
    \ of a row.\n\n```\n-(void)tableView:(UITableView *)tableView moveRowAtIndexPath:(NSIndexPath\
    \ *)sourceIndexPath toIndexPath:(NSIndexPath *)destinationIndexPath\n{\n    [self.countries\
    \ exchangeObjectAtIndex:sourceIndexPath.row withObjectAtIndex:destinationIndexPath.row];\n\
    \    [self.tableViewCountries reloadData];\n}\n```\n\nJust as with insertion,\
    \ you must make sure to correct your array to match the re-ordering, but the `UITableView`\
    \ handles the actual swapping of rows automatically.\n\nFor extra control over\
    \ the re-ordering of the table, you can implement an extra method called `-tableView:targetIndexPathForMoveFromRowAtIndexPath:`.\
    \ This delegate method is called every time a cell is dragged over another cell\
    \ as a possible movement, and its normal use is for “retargeting” a destination\
    \ row. In this way, you can check the proposed destination and either confirm\
    \ it or reject the proposed move and return a different destination.\n\nAlthough\
    \ you haven’t implemented functionality to confirm or reject your proposed movements,\
    \ your application will now be able to successfully move and re-order your rows\
    \ in addition to your previous deletion and copying functionalities, as in [Figure\
    \ 9–14](#Chapter09.html#fig_9_14).\n\n![Image](images/9781430240051_Fig09-14.jpg)\n\
    \n**Figure 9–14.** *Your table with some re-ordering of cells*"
  raw: '#### But Wait, There’s More!


    Deletion is not the only kind of editing that can occur in a `UITableView`. While
    not used quite as often, iOS includes functionality to allow rows to be created
    and inserted with the same method with which they were deleted.


    The default editing style for any row in a `UITableView` is `UITableViewCellEditingStyleDelete`,
    so in order to implement row insertion, you need to change this. For fun, you
    will give every other row an “insertion” editing style by implementing the `-tableView:editingStyleForRowAtIndexPath:`
    method.


    `-(UITableViewCellEditingStyle)tableView:(UITableView *)tableView editingStyleForRowAtIndexPath:(NSIndexPath
    *)indexPath`

    `{`

    `if ((indexPath.row %` `2``) ==` `1``)`

    `    {`

    `        return UITableViewCellEditingStyleInsert;`

    `    }`

    `    return UITableViewCellEditingStyleDelete;`

    `}`


    Just as before, you will need to specify the behavior to be followed upon the
    selection of an Insertion button. You will add a case to your `-tableView:commitEditingStyle:forRowAtIndexPath:`
    so the method now looks like so:


    `-(void)tableView:(UITableView *)tableView`

    `commitEditingStyle:(UITableViewCellEditingStyle)editingStyle`

    `forRowAtIndexPath:(NSIndexPath *)indexPath`

    `{`

    `    if (editingStyle == UITableViewCellEditingStyleDelete)`

    `    {`

    `        Country *deletedCountry = [self.countries objectAtIndex:indexPath.row];`

    `        [self.countries removeObject:deletedCountry];`


    `        [tableViewCountries deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]`

    `withRowAnimation:UITableViewRowAnimationAutomatic];`

    `    }`

    `    else if (editingStyle == UITableViewCellEditingStyleInsert)`

    `    {`

    `        Country *copiedCountry = [self.countries objectAtIndex:indexPath.row];`

    `        Country *newCountry = [[Country alloc] init];`

    `        newCountry.name = copiedCountry.name;`

    `        newCountry.flag = copiedCountry.flag;`

    `        newCountry.capital = copiedCountry.capital;`

    `        newCountry.motto = copiedCountry.motto;`


    `        [self.countries insertObject:newCountry atIndex:indexPath.row+`

    `1];`


    `        [self.tableViewCountries insertRowsAtIndexPaths:[NSArray arrayWithObject:[NSIndexPath
    indexPathForRow:indexPath.row+`

    `1 inSection:indexPath.section]] withRowAnimation:UITableViewRowAnimationRight];`

    `    }`

    `}`


    You can see that you have gone with a pretty easy implementation for insertion,
    in that all you have done is inserted a copy of the row selected. It should be
    noted that by changing the index values in this method, you could easily insert
    objects to nearly any row in the table; it is not necessary to insert into only
    the following row.


    As with the deletion, you must make sure that your data model is updated before
    your table view is, so you add the new `Country` to your array before you insert
    the new row into your `UITableView`.


    Upon running your app and editing your table, you will be able to see both deletion
    and insertion buttons, as in [Figure 9–13](#Chapter09.html#fig_9_13).


    ![Image](images/9781430240051_Fig09-13.jpg)


    **Figure 9–13.** *Editing a `UITableView` with insertion or deletion*


    There are two other `UITableView` delegate methods that can be used in combination
    with editing to further customize your application’s behavior.


    *   The `-tableView:willBeginEditingRowAtIndexPath:` method allows you to get
    a kind of “first look” at whichever row was selected for editing, and act accordingly.

    *   The `-tableView:didEndEditingRowAtIndexPath:` method can be used as a completion
    block, in that you can specify any actions you deem necessary to be performed
    with a row, but only after a row’s editing has finished.


    ### Recipe 9–3: Re-ordering a UITableView


    Now that we have covered deletion and insertion of rows, the next logical step
    in terms of functionality of a table would be to make it so that you can move
    your rows around. This is actually pretty simple to incorporate given how you
    have set up your application.


    First, you have to specify exactly which of your rows are allowed to move using
    `-tableView:canMoveRowAtIndexPath:`.


    `-(BOOL)tableView:(UITableView *)tableView canMoveRowAtIndexPath:(NSIndexPath
    *)indexPath`

    `{`

    `    return YES;`

    `}`


    I’ve chosen the easy way out of this by simply making them all editable, but you
    can easily change this depending on your application.


    Now, you simply need to implement a delegate to update your data model upon the
    successful movement of a row.


    `-(void)tableView:(UITableView *)tableView moveRowAtIndexPath:(NSIndexPath *)sourceIndexPath
    toIndexPath:(NSIndexPath *)destinationIndexPath`

    `{`

    `    [self.countries exchangeObjectAtIndex:sourceIndexPath.row withObjectAtIndex:destinationIndexPath.row];`

    `    [self.tableViewCountries reloadData];`

    `}`


    Just as with insertion, you must make sure to correct your array to match the
    re-ordering, but the `UITableView` handles the actual swapping of rows automatically.


    For extra control over the re-ordering of the table, you can implement an extra
    method called `-tableView:targetIndexPathForMoveFromRowAtIndexPath:`. This delegate
    method is called every time a cell is dragged over another cell as a possible
    movement, and its normal use is for “retargeting” a destination row. In this way,
    you can check the proposed destination and either confirm it or reject the proposed
    move and return a different destination.


    Although you haven’t implemented functionality to confirm or reject your proposed
    movements, your application will now be able to successfully move and re-order
    your rows in addition to your previous deletion and copying functionalities, as
    in [Figure 9–14](#Chapter09.html#fig_9_14).


    ![Image](images/9781430240051_Fig09-14.jpg)


    **Figure 9–14.** *Your table with some re-ordering of cells*'
  trans: "\n#### 但等等，还有更多！\n\n删除并不是`UITableView`中唯一可进行的编辑操作。尽管使用频率没那么高，但 iOS 包含了与删除相同的方法来创建和插入行的功能。\n\
    \n`UITableView`中任何一行的默认编辑样式是`UITableViewCellEditingStyleDelete`，因此要实现行的插入，你需要修改这一设置。为了增加趣味性，你可以通过实现`-tableView:editingStyleForRowAtIndexPath:`方法，让每隔一行拥有“插入”编辑样式。\n\
    \n```\n-(UITableViewCellEditingStyle)tableView:(UITableView *)tableView editingStyleForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    if ((indexPath.row % 2) == 1)\n    {\n        return UITableViewCellEditingStyleInsert;\n\
    \    }\n    return UITableViewCellEditingStyleDelete;\n}\n```\n\n和之前一样，你需要指定点击插入按钮时的行为。你将在`-tableView:commitEditingStyle:forRowAtIndexPath:`方法中添加一个分支，现在该方法看起来是这样的：\n\
    \n```\n-(void)tableView:(UITableView *)tableView\ncommitEditingStyle:(UITableViewCellEditingStyle)editingStyle\n\
    forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
    \    {\n        Country *deletedCountry = [self.countries objectAtIndex:indexPath.row];\n\
    \        [self.countries removeObject:deletedCountry];\n\n        [tableViewCountries\
    \ deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\nwithRowAnimation:UITableViewRowAnimationAutomatic];\n\
    \    }\n    else if (editingStyle == UITableViewCellEditingStyleInsert)\n    {\n\
    \        Country *copiedCountry = [self.countries objectAtIndex:indexPath.row];\n\
    \        Country *newCountry = [[Country alloc] init];\n        newCountry.name\
    \ = copiedCountry.name;\n        newCountry.flag = copiedCountry.flag;\n     \
    \   newCountry.capital = copiedCountry.capital;\n        newCountry.motto = copiedCountry.motto;\n\
    \n        [self.countries insertObject:newCountry atIndex:indexPath.row+1];\n\n\
    \        [self.tableViewCountries insertRowsAtIndexPaths:[NSArray arrayWithObject:[NSIndexPath\
    \ indexPathForRow:indexPath.row+1 inSection:indexPath.section]] withRowAnimation:UITableViewRowAnimationRight];\n\
    \    }\n}\n```\n\n你可以看到，我们采用了一种相当简单的插入实现方式，即只是复制了所选行。需要注意的是，通过修改此方法中的索引值，你可以轻松地将对象插入到表格中的几乎任何行；并非必须只插入到紧随其后的行。\n\
    \n与删除操作一样，你必须确保在更新表格视图之前先更新数据模型，因此在向`UITableView`插入新行之前，你已将新的`Country`对象添加到了数组中。\n\
    \n运行应用并编辑表格时，你将能够同时看到删除和插入按钮，如图 9-13 所示。\n\n![Image](img/9781430240051_Fig09-13.jpg)\n\
    \n**图 9-13.** *编辑带有插入或删除功能的`UITableView`*\n\n另外还有两个`UITableView`的委托方法可以与编辑功能结合使用，以进一步自定义应用的行为。\n\
    \n- `-tableView:willBeginEditingRowAtIndexPath:` 方法允许你“预览”被选中进行编辑的行，并据此采取相应操作。\n\
    - `-tableView:didEndEditingRowAtIndexPath:` 方法可以作为完成块使用，你可以在其中指定任何你认为必要的、在行编辑完成后需要执行的操作。\n\
    \n### 食谱 9–3：对 UITableView 进行重新排序\n\n现在我们已经讨论了行的删除和插入，表格功能的下一步逻辑自然就是让行能够移动。鉴于我们已经设置好了应用，实现这一功能其实相当简单。\n\
    \n首先，你必须使用`-tableView:canMoveRowAtIndexPath:` 方法精确指定哪些行允许移动。\n\n```\n-(BOOL)tableView:(UITableView\
    \ *)tableView canMoveRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    return YES;\n\
    }\n```\n\n我选择了最简单的方式，即让所有行都可移动，但你可以根据应用需求轻松更改这一设置。\n\n现在，你只需要实现一个委托，在行成功移动后更新数据模型。\n\
    \n```\n-(void)tableView:(UITableView *)tableView moveRowAtIndexPath:(NSIndexPath\
    \ *)sourceIndexPath toIndexPath:(NSIndexPath *)destinationIndexPath\n{\n    [self.countries\
    \ exchangeObjectAtIndex:sourceIndexPath.row withObjectAtIndex:destinationIndexPath.row];\n\
    \    [self.tableViewCountries reloadData];\n}\n```\n\n与插入操作一样，你必须确保更新数组以匹配重新排序，而`UITableView`会自动处理行的实际交换。\n\
    \n为了对表格的重新排序进行额外控制，你可以实现一个额外的方法，名为`-tableView:targetIndexPathForMoveFromRowAtIndexPath:`。每当一个单元格被拖到另一个单元格上方作为可能的移动目标时，就会调用这个委托方法，其常规用途是“重新定位”目标行。通过这种方式，你可以检查建议的目标位置，并确认或拒绝建议的移动，然后返回一个不同的目标位置。\n\
    \n尽管你尚未实现确认或拒绝建议移动的功能，但你的应用现在除了之前具备的删除和复制功能外，已经能够成功移动和重新排序行，如图 9-14 所示。\n\n![Image](img/9781430240051_Fig09-14.jpg)\n\
    \n**图 9-14.** *你的表格进行了一些单元格的重新排序*\n"
- fmt: '### Recipe 9–4: Creating a Grouped UITableView


    Now that you have nearly completely gone through all the basics of using an ungrouped
    `UITableView`, you can now adjust your application to consider a “grouped” approach.
    All the functionalities you implemented with an ungrouped table also apply to
    a grouped one, so you will not have to make a great deal of changes to implement
    this.


    The absolute first thing you need to do in order to use a grouped table is to
    switch the “Style” of the `UITableView` from “Plain” to “Grouped”. The easiest
    way to do this is in your view controller’s XIB file by selecting your `UITableView`,
    and changing the style in the Attribute inspector, resulting in a display similar
    to [Figure 9–15](#Chapter09.html#fig_9_15).


    ![Image](images/9781430240051_Fig09-15.jpg)


    **Figure 9–15.** *Configuring a “grouped” `UITableView`*


    The specific option you are looking for is in the top of your Attribute inspector
    under the “Style” of the “Table View”, as shown here in [Figure 9–16](#Chapter09.html#fig_9_16).


    ![Image](images/9781430240051_Fig09-16.jpg)


    **Figure 9–16.** *Modifying the table’s “Style” to create a grouped `UITableView`*


    While this is the only thing necessary in order to change the style of your table,
    the problem is that up until now, your data model has been formatted for an ungrouped
    style. You don’t even have your data grouped at all. To remedy this, you will
    change the organization with which your data is stored.


    Rather than having one array containing all five of your countries, you will separate
    your countries into their groups, with each group being an `NSMutableArray`, and
    then put these arrays into a larger `NSMutableArray`. (Although a better practice
    would be to make these immutable, I have chosen a mutable version to make editing
    your data model from the table a more simple process.)


    For your application, you will divide your five `Country` objects into two categories:
    one of countries in the United Kingdom, and one of all the others.


    First, you need to create two more `NSMutableArray`s to be your subarrays, so
    add these two properties, making sure to properly handle them (synthesize!) in
    your implementation file. You will end up with a total of three `NSMutableArray`
    properties.


    ```

    @property (strong, nonatomic) NSMutableArray *countries;

    @property (strong, nonatomic) NSMutableArray *unitedKingdomCountries;

    @property (strong, nonatomic) NSMutableArray *nonUKCountries;

    ```


    Now you’ll change your `-viewDidLoad` method to accommodate this change. Delete
    the following line from this method:


    ```

        self.countries = [NSMutableArray arrayWithObjects:usa, france, england, scotland,
    spain, nil];

    ```


    Now replace that line with the following to properly organize your countries.


    ```

        self.unitedKingdomCountries = [NSMutableArray arrayWithObjects:england, scotland,
    nil];

        self.nonUKCountries = [NSMutableArray arrayWithObjects:usa, france, spain,
    nil];

        self.countries = [NSMutableArray arrayWithObjects:unitedKingdomCountries,
    nonUKCountries, nil];

    ```


    Now is the slightly tricky part, where you have to make sure all of your data
    source and delegate methods are adjusted to your new format. You have to include
    first a retrieval of the group’s array, and then retrieve a specific country from
    there in each method. First, you’ll change your `-tableView:cellForRowAtIndexPath:`.
    It should now look like so:


    ```

    - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath {


    static NSString *CellIdentifier = @"Cell";


        UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];

        if (cell == nil)

        {

            cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle
    reuseIdentifier:CellIdentifier];

            cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;

    cell.textLabel.font = [UIFont systemFontOfSize: 19.0];

    cell.detailTextLabel.font = [UIFont systemFontOfSize: 12];

        }


        NSArray *group = [self.countries objectAtIndex:indexPath.section];

        Country *country = [group objectAtIndex:indexPath.row];

        cell.textLabel.text = country.name;

        cell.detailTextLabel.text = country.capital;

        UIImage *flag = country.flag;

    cell.imageView.image = [MainTableViewController scale:flag toSize:CGSizeMake(
    115, 75)];


        return cell;

    }

    ```


    Up next is `-tableView:numberOfRowsInSection:`.


    ```

    -(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section

    {

        NSArray *group = [self.countries objectAtIndex:section];

        return [group count];

    }

    ```


    Here is `-tableView:didSelectRowAtIndexPath:`.


    ```

    -(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath

    {

        [tableView deselectRowAtIndexPath:indexPath animated:YES];


        selectedIndexPath = indexPath;

        /////BEGIN MODIFIED CODE FOR GROUPED TABLE

        NSArray *group = [self.countries objectAtIndex:indexPath.section];

        Country *chosenCountry = [group objectAtIndex:indexPath.row];

        /////END OF MODIFIED CODE

        CountryInfoViewController *infoVC = [[CountryInfoViewController alloc] init];

        infoVC.delegate = self;

        infoVC.currentCountry = chosenCountry;


        [self.navigationController pushViewController:infoVC animated:YES];

    }

    ```


    Here is `-tableView:accessoryButtonTappedForRowWithIndexPath:`.


    ```

    -(void)tableView:(UITableView *)tableView

    accessoryButtonTappedForRowWithIndexPath:(NSIndexPath *)indexPath

    {

        [tableView deselectRowAtIndexPath:indexPath animated:YES];


        selectedIndexPath = indexPath;

        ////BEGIN MODIFIED CODE FOR GROUPED TABLE

        NSArray *group = [self.countries objectAtIndex:indexPath.section];

        Country *chosenCountry = [group objectAtIndex:indexPath.row];

        ////END MODIFIED CODE FOR GROUPED TABLE

        CountryInfoViewController *infoVC = [[CountryInfoViewController alloc] init];

        infoVC.delegate = self;

        infoVC.currentCountry = chosenCountry;


        NSLog(@"Accessory Button Tapped");

        [self.navigationController pushViewController:infoVC animated:YES];

    }

    ```


    For the `-tableView:moveRowAtIndexPath:toIndexPath:` method, you will make a quick
    assumption that you are moving only rows that are in the same section to make
    your coding easier. You will notice when you run the application later that this
    actually works well, as with your current implementation, the `UITableView` will
    not allow a `Country` to switch groups, just as is expected in this particular
    application. For an application where it may be reasonable to have objects change
    groups, you will want to be sure to include code to do so accordingly.


    ```

    -(void)tableView:(UITableView *)tableView moveRowAtIndexPath:(NSIndexPath *)sourceIndexPath
    toIndexPath:(NSIndexPath *)destinationIndexPath

    {

        NSMutableArray *group = [self.countries objectAtIndex:sourceIndexPath.section];
    //Assume same Section

        if (destinationIndexPath.row < [group count])

        {

            [group exchangeObjectAtIndex:sourceIndexPath.row withObjectAtIndex:destinationIndexPath.row];

        }

        [self.tableViewCountries reloadData];

    }

    ```


    The last method you must fix is `-tableView:commitEditingStyle:forRowAtIndexPath:`,
    which will look like so:


    ```

    -(void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle
    forRowAtIndexPath:(NSIndexPath *)indexPath

    {

        if (editingStyle == UITableViewCellEditingStyleDelete)

        {

            //////Changed code

            NSMutableArray *group = [self.countries objectAtIndex:indexPath.section];

            Country *deletedCountry = [group objectAtIndex:indexPath.row];

            [group removeObject:deletedCountry];

            //////End of changed code

    ```'
