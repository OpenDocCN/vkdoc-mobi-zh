    `{`

    `if ([self.statusLabel.text isEqualToString:@"Updating"])`

    `    {`

    `self.statusLabel.text = @"Stopped";`

    `        [self toggleUpdates];`

    `    }`

    `else`

    `    {`

    `self.statusLabel.text = @"Updating";`

    `        [self toggleUpdates];`

    `    }`

    `}`


    Whenever you deal with the `CMMotionManager`, you should always make sure that
    all of your updates are stopped at the end of your application, so you’ll set
    up your `-viewDidUnload:` method like so:


