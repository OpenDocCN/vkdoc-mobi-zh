- fmt: "```objc\n[self.findFaceButton setTitle:[NSString stringWithFormat:@\"%i Face(s)\
    \ Found\", [features count]] forState:UIControlStateNormal];\nself.findFaceButton.enabled\
    \ = NO;\nself.findFaceButton.alpha = 0.6;\n}\nelse\n{\n[self.findFaceButton setTitle:@\"\
    No Faces Found\" forState:UIControlStateNormal];\nself.findFaceButton.enabled\
    \ = NO;\nself.findFaceButton.alpha = 0.6;\n}\n```\n\nThis method contains the\
    \ following steps:\n\n1.  Acquire a `CIImage` object from your initial `UIImage`.\n\
    2.  Create a `CIContext` with which to analyze images.\n3.  Create an instance\
    \ of `CIDetector` with type and options parameters.\n    1.  The `type` parameter\
    \ specifies the specific feature to identify. Currently, the only possible value\
    \ for this is `CIDetectorTypeFace`, which allows you to specifically look for\
    \ faces.\n    2.  The `options` parameter allows you to specify the accuracy with\
    \ which you want to look for features. Low accuracy will be faster, but high accuracy\
    \ will be more precise.\n4.  Create an array of all the features found in your\
    \ image. Since you specified the `CIDetectorTypeFace` type, these objects will\
    \ all be instances of the `CIFaceFeature` class.\n5.  Create a `CIImage` using\
    \ the `-imageByCroppingToRect:` method with the original image, as well as the\
    \ bounds specified by the last `CIFaceFeature` found in the image. These bounds\
    \ specify the `CGRect` in which the face exists.\n6.  Create a `UIImage` out of\
    \ your `CIImage` (done exactly as in the previous recipe), and then display it\
    \ in your `UIImageView`.\n\nUpon running your application, you will be able to\
    \ detect any faces inside your images, the latter of which will be displayed in\
    \ your lower `UIImageView`, as in [Figure 15–24](#Chapter15.html#fig_15_24).\n\
    \n![Image](images/9781430240051_Fig15-24.jpg)\n\n**Figure 15–24.** *Your application\
    \ detecting and cropping a face from an image*\n\n### Summary\n\nImages create\
    \ our world. From the simplest of picture books that children love to read to\
    \ the massive amounts of visual data transmitted around the Internet through Twitter,\
    \ e-mail, Facebook, Tumblr, and every other web service, pictures and images have\
    \ certainly become one of the key foundations of modern culture. As such, by learning\
    \ to create, handle, manipulate, and display images in your applications, you\
    \ are able to acquire a significantly greater connection with your users, imparting\
    \ a more powerful emotional response and interacting with more flexibility and\
    \ control than ever. From building colored shapes to displaying photographs, to\
    \ even the newest iOS 5.0 additions of manipulating images, you are able to create\
    \ more interesting and useful applications. The Core Image framework even furthers\
    \ this ability with the addition of image filters, to create wildly different\
    \ images, and facial detection software, to provide more in-depth information\
    \ from your application. At this point of technological development, it seems\
    \ quite fair to say that a picture being worth a thousand words is a vast understatement.\n\
    \n## Chapter 16\n\n## Game Kit Recipes\n\nIn this chapter, you are going to use\
    \ a simple Hangman game and integrate it with Game Center. Game Center allows\
    \ you to enhance your game by providing easy methods for implementing social features\
    \ such as high scores, game achievements, and multiplayer gameplay. Adding these\
    \ features can not only provide more value to your game but also extend the \"\
    replay factor\" of your game.\n\nYou will start by adding high scores and achievements\
    \ and ultimately finish by making your game multiplayer. You can find the start\
    \ of this project at [`https://github.com/shawngrimes/HangmanMP`](https://github.com/shawngrimes/HangmanMP).\n\
    \n### Recipe 16–1: Starting with Game Center\n\nBefore you can start using Game\
    \ Center, you will need to use iTunes Connect. If you have already submitted an\
    \ app or game to the iTunes App Store, you already know what iTunes Connect is.\
    \ For those who haven't, iTunes Connect is where you manage the apps that you\
    \ are publishing. You will enter your apps metadata (description, keywords, support\
    \ URL, etc.) as well as any Apple-provided features that it will use, such as\
    \ iAds, In App Purchase, or, in this case, Game Center.\n\nIn order to use Game\
    \ Center, you will need to tell iTunes Connect about your game so you can start\
    \ using the Game Center sandbox. The Game Center sandbox is a development area\
    \ where developers can test their Game Center integration without impacting production\
    \ scores or achievements.\n\n#### iTunes Connect Setup\n\nThe first step to enabling\
    \ Game Center integration is to create a bundle identifier in the iOS Provisioning\
    \ Portal if you have not done so for your app already. The bundle identifier is\
    \ used to identify all the related data for an app. For instance, if you have\
    \ a free and a paid version of your game and you want them to use the same high\
    \ score table, you would give them the same bundle identifier.\n\nVisit the iOS\
    \ Provisioning Portal on `developer.apple.com`, and click App IDs. Create your\
    \ new bundle identifier. The information shown in [Figure 16–1](#Chapter16.html#fig_16_1)\
    \ is the app information you will use for this game.\n\n![Image](images/9781430240051_Fig16-01.jpg)\n\
    \n**Figure 16–1.** *Configuring your App ID*\n\nNow go to `itunesconnect.apple.com`,\
    \ and click Manage Your Applications. If you have not already submitted your app\
    \ for review, click the Add New App button, revealing a page resembling [Figure\
    \ 16–2](#Chapter16.html#fig_16_2). Enter the information for your new app, and\
    \ click Continue.\n\n![Image](images/9781430240051_Fig16-02.jpg)\n\n**Figure 16–2.**\
    \ *Entering your application information*\n\nOnce you've entered all of the metadata\
    \ about your app, including the screenshot and app icon, you can enable Game Center.\
    \ Click the Manage Game Center button, shown in [Figure 16–3](#Chapter16.html#fig_16_3),\
    \ and then click Enable.\n\n![Image](images/9781430240051_Fig16-03.jpg)\n\n**Figure\
    \ 16–3.** *Accessing the Game Center Management page*\n\nOnce enabled, you can\
    \ configure leaderboards and achievements (more on those to follow)."
