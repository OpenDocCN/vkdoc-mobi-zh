    \ = annotation;\n        //如果没有可复用的，则创建一个新的\n        if(!annotationView)\n   \
    \     {\n            annotationView=[[MKPinAnnotationView alloc] initWithAnnotation:annotation\n\
    reuseIdentifier:annotationIdentifier];\n        }\n\n        //可选的属性修改\n     \
    \   annotationView.canShowCallout = YES;\n        annotationView.rightCalloutAccessoryView\
    \ = [UIButton\nbuttonWithType:UIButtonTypeDetailDisclosure]; //在标注气泡右侧创建按钮\n \
    \       return annotationView;\n    }\n    return nil;\n}\n```\n\n你的两个可选属性 `canShowCallout`\
    \ 和 `rightCalloutAccessoryView` 对于制作交互式地图非常有用。第一个属性使得按下大头针时弹出一个小标注气泡，第二个属性则改变标注气泡右侧的外观。默认情况下，标注气泡中的文本是标注的标题和副标题，这意味着如果你打算显示标注气泡，你的标注应该至少包含一个标题。\n\
    \n最后，最后一步是创建带有信息的标注并将其添加到地图中。你创建一个可变数组来存储你的标注，然后将标注数组添加到你的 `mapView` 中，代码如下。这段代码应放在你的\
    \ `viewDidLoad` 方法中。\n\n```\n//创建并添加标注\n    NSMutableArray *annotations = [[NSMutableArray\
    \ alloc] initWithCapacity:2];    \n    MyAnnotation *ann1 = [[MyAnnotation alloc]\n\
    initWithCoordinate:CLLocationCoordinate2DMake(25.802, -80.132)];\n    ann1.title\
    \ = @\"迈阿密\";\n    ann1.subtitle = @\"标注 1\";\n    MyAnnotation *ann2 = [[MyAnnotation\
    \ alloc]\ninitWithCoordinate:CLLocationCoordinate2DMake(39.733, -105.018)];\n\
    \    ann2.title = @\"丹佛\";\n    ann2.subtitle = @\"标注 2\";    \n    [annotations\
    \ addObject:ann1];\n    [annotations addObject:ann2];\n\n    [self.mapViewUserMap\
    \ addAnnotations:annotations];\n```\n\n我选择让大头针落在迈阿密和丹佛，但任何坐标都能正常工作。如果你现在运行这个应用，你应该能看到常规的地图，不过上面插了几根大头针，如\
    \ 图 5–13 所示。你可能需要缩小地图才能看到它们；在模拟器中，可以通过按住 ![Image](img/U004.jpg) 模拟捏合手势并拖动来实现缩放。\n\
    \n![Image](img/9781430240051_Fig05-13.jpg)\n\n**图 5–13.** *带有地图和大头针的应用*\n\n很多时候，让应用的地图标注可以通过在地图上拖拽来移动，这可能非常有用。实现这一功能极其简单，只需在你的\
    \ `-viewForAnnotation:` 委托方法中添加一行代码即可：\n\n`annotationView.draggable = YES;`\n\n\
    只要你合成了标注的 `coordinate` 属性，你的大头针（或你决定使用的任何其他 `AnnotationView`）就变得可拖拽了。\n"
- fmt: "### Recipe 5–3: Creating Custom Annotations\n\nWhile the majority of the time\
    \ the default `MKPinAnnotationView` objects are incredibly useful, you may at\
    \ some point decide you want a different image instead of the pin to represent\
    \ an annotation on your map. This could be anything from an image of your friend\
    \ representing his or her hometown, to your logo representing your company's location.\
    \ In order to create a custom annotation view, you will be subclassing the `MKAnnotationView`\
    \ class. You will also be customizing your callouts to display more than simply\
    \ a title and subtitle.\n\nFirst, you must create your project the same way as\
    \ earlier in this chapter, naming it `customAnnotationViews`, and add your Map\
    \ Kit and Core Location frameworks. You will then add your Map Kit to your view\
    \ controller, making sure to use your `#import` statements for both `<MapKit/MapKit.h>`\
    \ and `<CoreLocation/CoreLocation.h>`, and setting your view controller to conform\
    \ to the `MKMapViewDelegate` protocol (refer to the beginning of this chapter\
    \ on how to perform these tasks). You must also not forget to set your `MapView`'s\
    \ delegate to your view controller, by modifying your `-viewDidLoad` method like\
    \ so:\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.mapViewUserMap.delegate\
    \ = self;\n}\n```\n\nBefore going any further, you will import the image that\
    \ you will be using instead of a pin into your project. For this, I have chosen\
    \ a small image called `avatar.png`, shown here in [Figure 5–14](#Chapter05.html#fig_5_14).\n\
    \n![Image](images/9781430240051_Fig05-14.jpg)\n\n**Figure 5–14.** *Custom annotation\
    \ image*\n\nObviously this image is too large to use on a map, so you will be\
    \ scaling it down later.\n\nThe best way to import the file is to simply drag\
    \ the file from the Finder into your navigation pane. I prefer to put such files\
    \ under the Supporting Files group. In the dialog that appears, make sure the\
    \ box marked \"Copy items into destination group's folder (if needed)\" is checked.\
    \ [Figure 5–15](#Chapter05.html#fig_5_15) should resemble the window in which\
    \ this option appears, with the specific box at the top.\n\n![Image](images/9781430240051_Fig05-15.jpg)\n\
    \n**Figure 5–15.** *Making sure the \"Copy items\" box is checked when adding\
    \ files*\n\nNext, you will create your annotation class. Select **File** ![Image](images/U001.jpg)\
    \ **New** ![Image](images/U001.jpg) **New File**…, and under \"Cocoa Touch\" select\
    \ \"Objective-C class\". On the next screen, you will name your class `MyAnnotation`,\
    \ and make sure it is a subclass of `NSObject`. [Figure 5–16](#Chapter05.html#fig_5_16)\
    \ shows this configuration.\n\n![Image](images/9781430240051_Fig05-16.jpg)\n\n\
    **Figure 5–16.** *Subclassing `NSObject` to create annotations*\n\nAfter clicking\
    \ Next and then Create, you will begin to edit this class.\n\nThe first thing\
    \ you need to do is import your frameworks with the following lines:\n\n```\n\
    #import <CoreLocation/CoreLocation.h>\n#import <MapKit/MapKit.h>\n```\n\nNext,\
    \ you will make sure that your class conforms to the `MKAnnotation` protocol.\
    \ To do this, you add `<MKAnnotation>` to the header of your class, and you will\
    \ declare three properties: `coordinate`, `title`, and `subtitle`. You will also\
    \ declare a designated initialization method in order to create your annotations\
    \ with coordinates. Your header file will look like so after all these changes:\n\
    \n```\n#import <Foundation/Foundation.h>\n#import <CoreLocation/CoreLocation.h>\n\
    #import <MapKit/MapKit.h>\n\n@interface MyAnnotation : NSObject <MKAnnotation>\n\
    \n@property (nonatomic) CLLocationCoordinate2D coordinate;\n@property (nonatomic,\
    \ copy) NSString *title;\n@property (nonatomic, copy) NSString *subtitle;\n\n\
    -(id)initWithCoordinate:(CLLocationCoordinate2D)coord;\n@end\n```\n\nNow you simply\
    \ need to build your implementation file. Since you are not doing anything horribly\
    \ complex with these annotations, simply their views, your `MyAnnotation.m` file\
    \ will look like so:\n\n```\n#import \"MyAnnotation.h\"\n\n@implementation MyAnnotation\n\
    \n@synthesize coordinate, title, subtitle;\n-(id)initWithCoordinate:(CLLocationCoordinate2D)coord\n\
    {\n    self = [super init];\n    if (self)\n    {\n        self.coordinate = coord;\n\
    \    }\n    return self;\n}\n@end\n```\n\nNow you can proceed to create your subclass\
    \ of `MKAnnotationView`. Start off by going to **File** ![Image](images/U001.jpg)\
    \ **New** ![Image](images/U001.jpg) **New File**…, and under \"Cocoa Touch\" choose\
    \ \"Objective-C class\", just as before. On the next screen, you will name your\
    \ class `CustomAnnotationView`. The key here is to make sure you set the parent\
    \ object correctly. Under \"Subclass of\", replace `NSObject` by typing `MKAnnotationView`\
    \ in its place, as shown in [Figure 5–17](#Chapter05.html#fig_5_17).\n\n![Image](images/9781430240051_Fig05-17.jpg)\n\
    \n**Figure 5–17.** *Subclassing `MKAnnotationView`*\n\nClick Next and then Create\
    \ to proceed.\n\nIn the header file of your `CustomAnnotationView`, you will need\
    \ to declare only one method to initialize your class, so that your header file\
    \ looks like so:\n\n```\n#import <MapKit/MapKit.h>\n\n@interface CustomAnnotationView\
    \ : MKAnnotationView\n-(id)initWithAnnotation:(id <MKAnnotation>) annotation reuseIdentifier:(NSString\n\
    *)annotationIdentifier;\n@end\n```\n\nYou may notice that this is the exact same\
    \ name as the `MKAnnotationView`'s designated initializer. This is done on purpose,\
    \ in order to make your subclassing as simple as possible. In your implementation\
    \ file, you will start this method by simply starting the view off as if it were\
    \ a regular `MKAnnotationView` by calling the super's designated initializer:\n\
    \n```\n-(id)initWithAnnotation:(id <MKAnnotation>) annotation reuseIdentifier:(NSString\n\
    *)annotationIdentifier\n{\n    self = [super initWithAnnotation:annotation reuseIdentifier:annotationIdentifier];\n\
    \    return self;\n}\n```\n\nNow, you can add to this `initWithAnnotation:reuseIdentifier:`\
    \ method to customize your view. First, you will create the `UIImage` that you\
    \ will set as your view's image to be used instead of the pin, and set it as your\
    \ image.\n\n```\nUIImage *myImage = [UIImage imageNamed:@\"avatar.png\"];\nself.image\
    \ = myImage;\n```\n\nIt is highly unlikely that the image that you have used is\
    \ of an appropriate size to be used on a map. To offset this, you will standardize\
    \ the size of these custom views by setting the frame of the view, and changing\
    \ the content scaling mode to best scale your image.\n\n```\nself.frame = CGRectMake(0,\
    \ 0, 40, 40);\nself.contentMode = UIViewContentModeScaleAspectFill;\n```\n\nIf\
    \ necessary, you can also adjust the position of the image relative to the coordinates\
    \ by using the `centerOffset` property. This is especially useful if the image\
    \ you are using has a particular point, such as a pin or arrow, that you would\
    \ like to have at the exact coordinates. The `centerOffset` property takes a `CGPoint`\
    \ value, with the easiest way to make one being through the `CGPointMake()` function.\n\
    \n```\nself.centerOffset = CGPointMake(1, 1);\n```\n\nOverall, your full method,\
    \ along with a quick check to ensure that the annotation was initialized correctly,\
    \ will resemble that shown here.\n\n```\n-(id)initWithAnnotation:(id <MKAnnotation>)\
    \ annotation reuseIdentifier:(NSString\n*)annotationIdentifier\n{\n    self =\
    \ [super initWithAnnotation:annotation reuseIdentifier:annotationIdentifier];\n\
    \    if (self)\n    {\n        //Create your UIImage to be used.\n        UIImage\
    \ *myImage = [UIImage imageNamed:@\"avatar.png\"];\n        //Set your view's\
    \ image\n        self.image = myImage;\n        //Standardize your AnnotationView's\
    \ size.\n        self.frame = CGRectMake(0, 0, 40, 40);\n        //Use contentMode\
    \ to ensure best scaling of image\n        self.contentMode = UIViewContentModeScaleAspectFill;\n\
    \        //Use centerOffset to adjust the image's position\n        self.centerOffset\
    \ = CGPointMake(1, 1);\n\n    }\n    return self;\n}\n```"
  raw: '### Recipe 5–3: Creating Custom Annotations


    While the majority of the time the default `MKPinAnnotationView` objects are incredibly
    useful, you may at some point decide you want a different image instead of the
    pin to represent an annotation on your map. This could be anything from an image
    of your friend representing his or her hometown, to your logo representing your
    company''s location. In order to create a custom annotation view, you will be
    subclassing the `MKAnnotationView` class. You will also be customizing your callouts
    to display more than simply a title and subtitle.


    First, you must create your project the same way as earlier in this chapter, naming
    it “`customAnnotationViews`”, and add your Map Kit and Core Location frameworks.
    You will then add your Map Kit to your view controller, making sure to use your
    `#import` statements for both `<MapKit/MapKit.h>` and `<CoreLocation/CoreLocation.h>`,
    and setting your view controller to conform to the `MKMapViewDelegate` protocol
    (refer to the beginning of this chapter on how to perform these tasks). You must
    also not forget to set your `MapView`''s delegate to your view controller, by
    modifying your `-viewDidLoad` method like so:


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `    self.mapViewUserMap.delegate = self;`

    `}`


    Before going any further, you will import the image that you will be using instead
    of a pin into your project. For this, I have chosen a small image called “`avatar.png`”,
    shown here in [Figure 5–14](#Chapter05.html#fig_5_14).


    ![Image](images/9781430240051_Fig05-14.jpg)


    **Figure 5–14.** *Custom annotation image*


    Obviously this image is too large to use on a map, so you will be scaling it down
    later.


    The best way to import the file is to simply drag the file from the Finder into
    your navigation pane. I prefer to put such files under the Supporting Files group.
    In the dialog that appears, make sure the box marked “Copy items into destination
    group''s folder (if needed)” is checked. [Figure 5–15](#Chapter05.html#fig_5_15)
    should resemble the window in which this option appears, with the specific box
    at the top.


    ![Image](images/9781430240051_Fig05-15.jpg)


    **Figure 5–15.** *Making sure the “Copy items” box is checked when adding files*


    Next, you will create your annotation class. Select **File** ![Image](images/U001.jpg)
    **New** ![Image](images/U001.jpg) **New File**…, and under “Cocoa Touch” select
    “Objective-C class”. On the next screen, you will name your class “`MyAnnotation`”,
    and make sure it is a subclass of `NSObject`. [Figure 5–16](#Chapter05.html#fig_5_16)
    shows this configuration.


    ![Image](images/9781430240051_Fig05-16.jpg)


    **Figure 5–16.** *Subclassing `NSObject` to create annotations*


    After clicking Next and then Create, you will begin to edit this class.


    The first thing you need to do is import your frameworks with the following lines:


    `#import <CoreLocation/CoreLocation.h>`

    `#import <MapKit/MapKit.h>`


    Next, you will make sure that your class conforms to the `MKAnnotation` protocol.
    To do this, you add `<MKAnnotation>` to the header of your class, and you will
    declare three properties: `coordinate`, `title`, and `subtitle`. You will also
    declare a designated initialization method in order to create your annotations
    with coordinates. Your header file will look like so after all these changes:


    `#import <Foundation/Foundation.h>`

    `#import <CoreLocation/CoreLocation.h>`

    `#import <MapKit/MapKit.h>`


    `@interface MyAnnotation : NSObject <MKAnnotation>`


    `@property (nonatomic) CLLocationCoordinate2D coordinate;`

    `@property (nonatomic, copy) NSString *title;`

    `@property (nonatomic, copy) NSString *subtitle;`


    `-(id)initWithCoordinate:(CLLocationCoordinate2D)coord;`

    `@end`


    Now you simply need to build your implementation file. Since you are not doing
    anything horribly complex with these annotations, simply their views, your `MyAnnotation.m`
    file will look like so:


    `#import "MyAnnotation.h"`


    `@implementation MyAnnotation`


    `@synthesize coordinate, title, subtitle;`

    `-(id)initWithCoordinate:(CLLocationCoordinate2D)coord`

    `{`

    `    self = [super init];`

    `    if (self)`

    `    {`

    `        self.coordinate = coord;`

    `    }`

    `    return self;`

    `}`

    `@end`


    Now you can proceed to create your subclass of `MKAnnotationView`. Start off by
    going to **File** ![Image](images/U001.jpg) **New** ![Image](images/U001.jpg)
    **New File**…, and under “Cocoa Touch” choose “Objective-C class”, just as before.
    On the next screen, you will name your class “`CustomAnnotationView`”. The key
    here is to make sure you set the parent object correctly. Under “Subclass of”,
    replace “NSObject” by typing **MKAnnotationView** in its place, as shown in [Figure
    5–17](#Chapter05.html#fig_5_17).


    ![Image](images/9781430240051_Fig05-17.jpg)


    **Figure 5–17.** *Subclassing `MKAnnotationView`*


    Click Next and then Create to proceed.


    In the header file of your `CustomAnnotationView`, you will need to declare only
    one method to initialize your class, so that your header file looks like so:


    `#import <MapKit/MapKit.h>`


    `@interface CustomAnnotationView : MKAnnotationView`

    `-(id)initWithAnnotation:(id <MKAnnotation>) annotation reuseIdentifier:(NSString`

    `*)annotationIdentifier;`

    `@end`


    You may notice that this is the exact same name as the `MKAnnotationView`''s designated
    initializer. This is done on purpose, in order to make your subclassing as simple
    as possible. In your implementation file, you will start this method by simply
    starting the view off as if it were a regular `MKAnnotationView` by calling the
    super''s designated initializer:


    `-(id)initWithAnnotation:(id <MKAnnotation>) annotation reuseIdentifier:(NSString`

    `*)annotationIdentifier`

    `{`

    `    self = [super initWithAnnotation:annotation reuseIdentifier:annotationIdentifier];`

    `    return self;`

    `}`


    Now, you can add to this `initWithAnnotation:reuseIdentifier:` method to customize
    your view. First, you will create the `UIImage` that you will set as your view''s
    image to be used instead of the pin, and set it as your image.


    `UIImage *myImage = [UIImage imageNamed:@"avatar.png"];`

    `self.image = myImage;`


    It is highly unlikely that the image that you have used is of an appropriate size
    to be used on a map. To offset this, you will standardize the size of these custom
    views by setting the frame of the view, and changing the content scaling mode
    to best scale your image.


    `self.frame = CGRectMake(0, 0, 40, 40);`

    `self.contentMode = UIViewContentModeScaleAspectFill;`


    If necessary, you can also adjust the position of the image relative to the coordinates
    by using the `centerOffset` property. This is especially useful if the image you
    are using has a particular point, such as a pin or arrow, that you would like
    to have at the exact coordinates. The `centerOffset` property takes a `CGPoint`
    value, with the easiest way to make one being through the `CGPointMake()` function.


    `self.centerOffset = CGPointMake(1, 1);`


    Overall, your full method, along with a quick check to ensure that the annotation
    was initialized correctly, will resemble that shown here.


    `-(id)initWithAnnotation:(id <MKAnnotation>) annotation reuseIdentifier:(NSString`

    `*)annotationIdentifier`

    `{`

    `    self = [super initWithAnnotation:annotation reuseIdentifier:annotationIdentifier];`

    `    if (self)`

    `    {`

    `        //Create your UIImage to be used.`

    `        UIImage *myImage = [UIImage imageNamed:@"avatar.png"];`

    `        //Set your view''s image`

    `        self.image = myImage;`

    `        //Standardize your AnnotationView''s size.`

    `        self.frame = CGRectMake(0, 0, 40, 40);`

    `        //Use contentMode to ensure best scaling of image`

    `        self.contentMode = UIViewContentModeScaleAspectFill;`

    `        //Use centerOffset to adjust the image''s position`

    `        self.centerOffset = CGPointMake(1, 1);`


    `    }`

    `    return self;`

    `}`'
  trans: "\n### 食谱 5–3：创建自定义标注\n\n虽然大多数情况下，默认的 `MKPinAnnotationView` 对象非常有用，但有时你可能希望在地图上使用不同的图像来代替图钉来表示标注。这可以是代表朋友家乡的朋友头像，也可以是代表公司位置的公司\
    \ Logo。为了创建自定义标注视图，你需要继承 `MKAnnotationView` 类。你还将自定义标注弹窗，使其显示不仅仅是标题和副标题。\n\n首先，你需要像本章前面那样创建项目，将其命名为\
    \ `customAnnotationViews`，并添加 Map Kit 和 Core Location 框架。然后，将 Map Kit 添加到视图控制器中，确保使用\
    \ `#import` 语句导入 `<MapKit/MapKit.h>` 和 `<CoreLocation/CoreLocation.h>`，并将视图控制器设置为遵循\
    \ `MKMapViewDelegate` 协议（有关如何执行这些任务，请参阅本章开头）。你还需要通过修改`-viewDidLoad`方法来设置 `MapView`\
    \ 的委托为你的视图控制器，具体如下：\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    self.mapViewUserMap.delegate = self;\n}\n```\n\n在进一步操作之前，你需要将要用作图钉替代图像的图片导入到项目中。为此，我选择了一个名为\
    \ `avatar.png` 的小图片，如下面的图 5–14 所示。\n\n![Image](img/9781430240051_Fig05-14.jpg)\n\
    \n**图 5–14.** *自定义标注图像*\n\n显然，这张图片对于地图来说太大了，所以你稍后会将其缩小。\n\n导入文件的最佳方式是直接将文件从 Finder\
    \ 拖拽到你的导航窗格中。我倾向于将此类文件放在 Supporting Files 组下。在出现的对话框中，确保勾选“将项目复制到目标组的文件夹中（如果需要）”选项。图\
    \ 5–15 应该类似于显示此选项的窗口，该特定复选框位于顶部。\n\n![Image](img/9781430240051_Fig05-15.jpg)\n\
    \n**图 5–15.** *添加文件时确保勾选“复制项目”复选框*\n\n接下来，你将创建标注类。选择**File** ![Image](img/U001.jpg)\
    \ **New** ![Image](img/U001.jpg) **New File**…，然后在“Cocoa Touch”下选择“Objective-C\
    \ class”。在下一个屏幕中，将类命名为 `MyAnnotation`，并确保它是 `NSObject` 的子类。图 5–16 显示了此配置。\n\n\
    ![Image](img/9781430240051_Fig05-16.jpg)\n\n**图 5–16.** *继承 `NSObject` 以创建标注*\n\
    \n单击 Next 然后 Create 后，你将开始编辑此类。\n\n首先需要做的，是用以下行引入框架：\n\n```\n#import <CoreLocation/CoreLocation.h>\n\
    #import <MapKit/MapKit.h>\n```\n\n接下来，你需要确保你的类遵循 `MKAnnotation` 协议。为此，在类的头部添加\
    \ `<MKAnnotation>`，并声明三个属性：`coordinate`、`title` 和 `subtitle`。你还将声明一个指定的初始化方法，以便通过坐标创建标注。完成所有这些更改后，你的头文件将如下所示：\n\
    \n```\n#import <Foundation/Foundation.h>\n#import <CoreLocation/CoreLocation.h>\n\
    #import <MapKit/MapKit.h>\n\n@interface MyAnnotation : NSObject <MKAnnotation>\n\
    \n@property (nonatomic) CLLocationCoordinate2D coordinate;\n@property (nonatomic,\
    \ copy) NSString *title;\n@property (nonatomic, copy) NSString *subtitle;\n\n\
    -(id)initWithCoordinate:(CLLocationCoordinate2D)coord;\n@end\n```\n\n现在，你只需构建实现文件。由于你通过这些标注所做的操作并不复杂，仅仅涉及它们的视图，所以你的\
    \ `MyAnnotation.m` 文件将如下所示：\n\n```\n#import \"MyAnnotation.h\"\n\n@implementation\
    \ MyAnnotation\n\n@synthesize coordinate, title, subtitle;\n-(id)initWithCoordinate:(CLLocationCoordinate2D)coord\n\
    {\n    self = [super init];\n    if (self)\n    {\n        self.coordinate = coord;\n\
    \    }\n    return self;\n}\n@end\n```\n\n现在，你可以继续创建 `MKAnnotationView` 的子类了。首先，依次进入\
    \ **File** ![Image](img/U001.jpg) **New** ![Image](img/U001.jpg) **New File**…，然后在“Cocoa\
    \ Touch”下选择“Objective-C class”，与之前一样。在下一个屏幕中，将类命名为 `CustomAnnotationView`。这里的关键是确保正确设置父对象。在“Subclass\
    \ of”下，将 `NSObject` 替换为 `MKAnnotationView`，如图 5–17 所示。\n\n![Image](img/9781430240051_Fig05-17.jpg)\n\
    \n**图 5–17.** *继承 `MKAnnotationView`*\n\n单击 Next 然后 Create 继续。\n\n在 `CustomAnnotationView`\
    \ 的头文件中，你只需要声明一个方法来初始化你的类，因此你的头文件将如下所示：\n\n```\n#import <MapKit/MapKit.h>\n\n\
    @interface CustomAnnotationView : MKAnnotationView\n-(id)initWithAnnotation:(id\
    \ <MKAnnotation>) annotation reuseIdentifier:(NSString\n*)annotationIdentifier;\n\
    @end\n```\n\n你可能会注意到，这与 `MKAnnotationView` 的指定初始化器名称完全相同。这是有意为之，目的是让你的子类化过程尽可能简单。在实现文件中，你将通过调用父类的指定初始化器来启动此方法，就像初始化一个普通的\
    \ `MKAnnotationView` 一样：\n\n```\n-(id)initWithAnnotation:(id <MKAnnotation>) annotation\
    \ reuseIdentifier:(NSString\n*)annotationIdentifier\n{\n    self = [super initWithAnnotation:annotation\
    \ reuseIdentifier:annotationIdentifier];\n    return self;\n}\n```\n\n现在，你可以向这个\
    \ `initWithAnnotation:reuseIdentifier:` 方法中添加代码来定制你的视图。首先，创建将用作视图图像以替代图钉的 `UIImage`，并将其设置为你的图像。\n\
    \n```\nUIImage *myImage = [UIImage imageNamed:@\"avatar.png\"];\nself.image =\
    \ myImage;\n```\n\n你使用的图像尺寸很可能不适合在地图上使用。为了解决这个问题，你可以通过设置视图的 frame 来标准化这些自定义视图的大小，并更改内容缩放模式以达到最佳的图像缩放效果。\n\
    \n```\nself.frame = CGRectMake(0, 0, 40, 40);\nself.contentMode = UIViewContentModeScaleAspectFill;\n\
    ```\n\n如果需要，你还可以使用 `centerOffset` 属性来调整图像相对于坐标的位置。如果你使用的图像有一个特定的点（例如图钉或箭头）需要精确位于坐标上，这个属性尤其有用。`centerOffset`\
    \ 属性接受一个 `CGPoint` 值，创建该值最简单的方式是通过 `CGPointMake()` 函数。\n\n```\nself.centerOffset\
    \ = CGPointMake(1, 1);\n```\n\n总的来说，你完整的方法，加上一个快速检查以确保标注被正确初始化，将如下所示：\n\n```\n\
    -(id)initWithAnnotation:(id <MKAnnotation>) annotation reuseIdentifier:(NSString\n\
    *)annotationIdentifier\n{\n    self = [super initWithAnnotation:annotation reuseIdentifier:annotationIdentifier];\n\
    \    if (self)\n    {\n        //创建要使用的 UIImage。\n        UIImage *myImage = [UIImage\
    \ imageNamed:@\"avatar.png\"];\n        //设置视图的图像\n        self.image = myImage;\n\
    \        //标准化 AnnotationView 的尺寸。\n        self.frame = CGRectMake(0, 0, 40,\
    \ 40);\n        //使用 contentMode 确保最佳的图像缩放\n        self.contentMode = UIViewContentModeScaleAspectFill;\n\
    \        //使用 centerOffset 调整图像位置\n        self.centerOffset = CGPointMake(1,\
    \ 1);\n\n    }\n    return self;\n}\n```"
- fmt: '**NOTE:** All your customization points are placed in the `if (self){}` block
    in order to ensure that your view has been correctly initialized. This is not
    entirely necessary, but merely a matter of good practice. In the case that your
    `self` is not correctly initialized, the condition will evaluate as false, causing
    the method to simply return `nil`.


    Now that your custom classes are all set up, you can return to your view controller
    in order to implement your map''s delegate method. This is done almost exactly
    the same as with a regular implementation, but you must change the type of `MKAnnotationView`
    created from `MKPinAnnotationView` to your `CustomAnnotationView`. Remember that
    your application will not work if you have not imported the `MyAnnotation.h` and
    `CustomAnnotationView.h` files.


    ```

    - (MKAnnotationView *)mapView:(MKMapView *)mapView

    viewForAnnotation:(id<MKAnnotation>)annotation

    {

        if ([annotation isKindOfClass:[MyAnnotation class]])

        {

            static NSString *annotationIdentifier=@"annotationIdentifier";

            MKAnnotationView *annotationView=[self.mapViewUserMap

    dequeueReusableAnnotationViewWithIdentifier:annotationIdentifier];

            annotationView.annotation = annotation;

            if(!annotationView)

            {

                annotationView=[[CustomAnnotationView alloc] initWithAnnotation:annotation

    reuseIdentifier:annotationIdentifier];

            }


            annotationView.canShowCallout = YES;

            return annotationView;

        }

        return nil;

    }

    ```


    Finally, all you need to run this is some test data. In your `-viewDidLoad` method,
    you will add the following lines to create a few annotations and add them to your
    map. You will give them each a title and subtitle as well for testing purposes.


    ```

    MyAnnotation *test1 = [[MyAnnotation alloc]

    initWithCoordinate:CLLocationCoordinate2DMake(37.68, -97.33)];

    test1.title = @"test1";

    test1.subtitle = @"subtitle";

    MyAnnotation *test2 = [[MyAnnotation alloc]

    initWithCoordinate:CLLocationCoordinate2DMake(41.500, -81.695)];

    test2.title = @"test2";

    test2.subtitle = @"subtitle2";

    [self.mapViewUserMap addAnnotation:test1];

    [self.mapViewUserMap addAnnotation:test2];

    ```


    **NOTE:** Even if an `MKAnnotationView`''s `canShowCallout` property is set to
    YES, the callout will not display unless the view''s annotation has been given
    a title. The subtitle is optional.


    At this point, when you run the app, you should see your two annotations appear
    on the map with your image (shrunk down to a reasonable size) over Wichita, KS
    and Cleveland, OH. [Figure 5–18](#Chapter05.html#fig_5_18) is the simulation of
    this app.


    ![Image](images/9781430240051_Fig05-18.jpg)


    **Figure 5–18.** *Application with map and custom annotations*


    Now you will add a few extra lines of code to customize your callouts.


    First, you will place an image to the left of the annotation''s title and subtitle.
    This is done through the use of the `annotationView`''s property `leftCalloutAccessoryView`.
    Your `CustomAnnotationView` class inherits a getter method for this from `MKAnnotationView`,
    so we will override this to make all our custom views display a specific image.
    You will do this by adding the following method to your `CustomAnnotationView.m`
    file.


    ```

    -(UIView *)leftCalloutAccessoryView

    {

        UIImageView *imageView = [[UIImageView alloc] initWithImage:[UIImage

    imageNamed:@"avatar.png"]];

        imageView.frame = CGRectMake(0, 0, 20, 20);

        imageView.contentMode = UIViewContentModeScaleAspectFill;

        return imageView;

    }

    ```


    This is very similar to the way you set your image for the annotation view, but
    with an extra step of having to create a `UIImageView` to hold your `avatar.png`
    image. You resize it down again (this time even smaller) and then return it. Since
    `UIImageView` is a subclass of `UIView`, this works perfectly well.


    Just as you can edit the `leftCalloutAccessoryView`, you can do the same thing
    on the right side of the callout. Here, you''ll simply place a small disclosure
    button that can then be used to perform further functions.


    ```

    -(UIView *)rightCalloutAccessoryView

    {

        return [UIButton buttonWithType:UIButtonTypeDetailDisclosure];

    }

    ```


    With this addition, your annotation callouts will resemble those in [Figure 5–19](#Chapter05.html#fig_5_19).


    ![Image](images/9781430240051_Fig05-19.jpg)


    **Figure 5–19.** *Map with custom annotations and callouts*


    At this point, your callouts are all set up visually, but there''s a massive amount
    of potential in having those buttons inside the callouts that you haven''t tapped
    into yet. Most map-based apps that use buttons on their callouts will usually
    use the button to push another view controller onto the screen. An application
    focused on displaying the locations of a specific business on the map might allow
    the user to view all the details or pictures from a specific location.


    In order to increase your functionality, you will implement another one of your
    map''s delegate methods, `-mapView:annotationView:calloutAccessoryControlTapped:`,
    and have it present a modal view controller. For demonstration purposes, you will
    have it display only your particular annotation''s title and subtitle, but it
    is quite easy to see how this could be used much more extensively.


    First, you will create your new view controller to be presented modally. Go to
    **File** ![Image](images/U001.jpg) **New** ![Image](images/U001.jpg) **New File….**
    Under “Cocoa Touch”, select “UIViewController subclass”. Name the file “DetailViewController”,
    and make sure that the box marked Targeted for iPad is unchecked (unless you are
    developing on the iPad), and the box marked With XIB for User Interface is checked,
    as in [Figure 5–20](#Chapter05.html#fig_5_20).


    ![Image](images/9781430240051_Fig05-20.jpg)


    **Figure 5–20.** *Configuring a detail view controller*


    Up next, you will go into your `DetailViewController`''s `.xib` file, and add
    in your labels. Drag two `UILabel`s from the object library out into the view.
    Change their names to “title” and “subtitle”. Your user interface will look like
    [Figure 5–21](#Chapter05.html#fig_5_21).


    ![Image](images/9781430240051_Fig05-21.jpg)


    **Figure 5–21.** *`DetailViewController` `.xib` view*


    Now, you will connect these two labels over to your `DetailViewController`''s
    header file. Just as with your `MKMapView`, hold ^ and drag the labels over into
    your header file. You will name their respective properties `titleLabel` and `subtitleLabel`.


    Next, in the rest of your `DetailViewController`, you will need a couple of `NSString`
    variables to store your title and subtitle, so you will simply declare them as
    instance variables. You will also need to declare a designated initializer method
    that takes two `NSString`s that you will set your labels to. Your header file
    will now look like so:


    ```

    #import <UIKit/UIKit.h>


    @interface DetailViewController : UIViewController {

        UILabel *titleLabel;

        UILabel *subtitleLabel;

        NSString *myTitle;

        NSString *mySubtitle;

    }


    @property (strong, nonatomic) IBOutlet UILabel *titleLabel;

    @property (strong, nonatomic) IBOutlet UILabel *subtitleLabel;


    -(id)initWithTitle:(NSString *)title subtitle:(NSString *)subtitle;

    @end

    ```


    The implementation of your designated initializer will look like so:


    ```

    -(id)initWithTitle:(NSString *)title subtitle:(NSString *)subtitle

    {

        self = [super init];

        if (self)

        {

            myTitle = title;

            mySubtitle = subtitle;

        }

        return self;

    }

    ```


    Finally, you need to add the following two lines to your `-viewDidLoad` method
    in order to set your labels'' text once the view is loaded.


    ```

    self.titleLabel.text = myTitle;

    self.subtitleLabel.text = mySubtitle;

    ```'
