    this task that the device is already using.


    `-(EKCalendar`

    `*)eventEditViewControllerDefaultCalendarForNewEvents:(EKEventEditViewController`

    `*)controller`

    `{`

    `    return [self.eventStore defaultCalendarForNewEvents];`

    `}`


    Just to ensure that your view always displays the most recent information, you
    will add to your `-viewwillAppear:` method in order to consistently refresh both
    your current data as well as your `UITableView`. The method will now appear like
    so:


    `- (void)viewWillAppear:(BOOL)animated`

    `{`

    `    [self fetchEvents];`

    `    [self.tableViewEvents reloadData];`

    `    [super viewWillAppear:animated];`

    `}`


    At this point, your application can now successfully allow the user to view and
    edit the details of an event in two different ways, through the use of either
    an `EKEventViewController` ([Figure 8–4](#Chapter08.html#fig_8_4)) or an `EKEventEditViewController`
    ([Figure 8–5](#Chapter08.html#fig_8_5)).


    ![Image](images/9781430240051_Fig08-04.jpg)


    **Figure 8–4.** *`EKEventViewController`*


    ![Image](images/9781430240051_Fig08-05.jpg)


    **Figure 8–5.** *`EKEventEditViewControl`*'
  trans: "\n### 配方 8–4：查看、编辑和删除事件\n\n接下来，你可以了解如何允许用户通过 Event Kit UI 框架中的预定义类来查看、编辑和删除事件。\n\
    \n延续之前的配方，你需要做的第一件事是为项目添加另一个框架。这次，添加 `EventKitUI.framework`。使用 import 语句将框架的头文件导入到你的类中。\n\
    \n```\n#import <EventKitUI/EventKitUI.h>\n```\n\n在本配方中，你将把你的视图控制器设置为其他几个视图控制器的委托，因此需要将它们的协议添加到头文件中。以下是你视图控制器现在应包含的完整协议列表：\n\
    \n- `UITableViewDelegate`\n- `UITableViewDataSource`\n- `EKEventViewDelegate`\n\
    - `EKEventEditViewDelegate`\n\n首先，你将实现当用户在 `UITableView` 中选择特定行时的行为。你将使用 `EKEventViewController`\
    \ 的实例来显示所选事件的信息。为此，你需要使用 `UITableView` 的数据源方法 `-tableView:DidSelectRowAtIndexPath:`。\n\
    \n```\n-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\n\
    *)indexPath\n{\n    EKEventViewController *eventVC = [[EKEventViewController alloc]\
    \ init];\n    eventVC.event = [[self.events objectForKey:[[self.calendars\nobjectAtIndex:indexPath.section]\
    \ title]] objectAtIndex:indexPath.row];\n    eventVC.delegate = self;\n    eventVC.allowsEditing\
    \ = YES;\n    UINavigationController *navcon = [[UINavigationController alloc]\n\
    initWithRootViewController:eventVC];\n    [self presentModalViewController:navcon\
    \ animated:YES];\n    [tableView deselectRowAtIndexPath:indexPath animated:YES];\n\
    }\n```\n\n你需要实现 `EKEventViewController` 的委托方法 `-eventViewController:didCompleteWithAction:`，以便正确处理事件详情的使用结束。这里有一个相当简单的实现，它根据给定的操作在事件存储中保存或删除事件。\n\
    \n```\n-(void)eventViewController:(EKEventViewController *)controller\ndidCompleteWithAction:(EKEventViewAction)action\n\
    {\n    EKEvent *event = controller.event;\n    if (action == EKEventViewActionDeleted)\n\
    \        {\n            [self.eventStore removeEvent:event span:EKSpanThisEvent\
    \ error:nil];\n        }\n    else\n    {\n        [self.eventStore saveEvent:event\
    \ span:EKSpanFutureEvents error:nil];\n    }\n    [self fetchEvents];\n    [self.tableViewEvents\
    \ reloadData];\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n\
    你为保存和删除方法的 `span:` 参数使用的值仅限于此处已使用的两个值之一。正如你可能猜到的，它们指定保存或删除操作是仅应用于特定事件，还是同时应用于该事件的所有重复事件。\n\
    \n请记住，用户在 `EKEventViewController` 中删除事件并不意味着该事件已从 `eventStore` 中移除。你需要手动删除它，然后调用\
    \ `-fetchEvents` 方法以及表格的 `-reloadData` 方法来更新 `UITableView`。\n\n作为额外功能，你还将让单元格的详情披露按钮允许用户通过\
    \ `EKEventEditViewController` 直接进入编辑事件信息的流程。首先，你将实现一个方法来处理披露按钮的按下。\n\n```\n-(void)tableView:(UITableView\
    \ *)tableView\naccessoryButtonTappedForRowWithIndexPath:(NSIndexPath *)indexPath\n\
    {\n    EKEventEditViewController *eventEditVC = [[EKEventEditViewController alloc]\
    \ init];\n    eventEditVC.event = [[self.events objectForKey:[[self.calendars\n\
    objectAtIndex:indexPath.section] title]] objectAtIndex:indexPath.row];\n    eventEditVC.eventStore\
    \ = self.eventStore;\n    eventEditVC.editViewDelegate = self;\n    [self presentModalViewController:eventEditVC\
    \ animated:YES];\n}\n```\n\n与 `EKEventViewController` 类似，你需要为 `EKEventEditViewController`\
    \ 定义一个委托方法。\n\n```\n-(void)eventEditViewController:(EKEventEditViewController\
    \ *)controller\ndidCompleteWithAction:(EKEventEditViewAction)action\n{\n    if\
    \ (action == EKEventEditViewActionDeleted)\n    {\n        [self.eventStore removeEvent:controller.event\
    \ span:EKSpanThisEvent error:nil];\n    }\n    else if (action == EKEventEditViewActionSaved)\n\
    \    {\n        [self.eventStore saveEvent:controller.event span:EKSpanThisEvent\
    \ error:nil];\n    }\n    [self fetchEvents];\n    [self.tableViewEvents reloadData];\n\
    \    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n最后，你需要额外定义一个方法才能使用\
    \ `EKEventEditViewController`，该方法允许你指定一个日历用于创建新事件。在此实现中，你将简单地返回设备已使用的默认日历来执行此任务。\n\
    \n```\n-(EKCalendar\n*)eventEditViewControllerDefaultCalendarForNewEvents:(EKEventEditViewController\n\
    *)controller\n{\n    return [self.eventStore defaultCalendarForNewEvents];\n}\n\
    ```\n\n为了确保视图始终显示最新信息，你将在 `-viewWillAppear:` 方法中添加内容，以便持续刷新当前数据以及 `UITableView`。方法现在应如下所示：\n\
    \n```\n- (void)viewWillAppear:(BOOL)animated\n{\n    [self fetchEvents];\n   \
    \ [self.tableViewEvents reloadData];\n    [super viewWillAppear:animated];\n}\n\
    ```\n\n至此，你的应用程序已成功允许用户通过 `EKEventViewController`（图 8-4）或 `EKEventEditViewController`（图\
    \ 8-5）以两种不同方式查看和编辑事件详情。\n\n![Image](img/9781430240051_Fig08-04.jpg)\n\n**图 8-4.**\
    \ *`EKEventViewController`*\n\n![Image](img/9781430240051_Fig08-05.jpg)\n\n**图\
    \ 8-5.** *`EKEventEditViewController`*\n"
- fmt: "### Recipe 8–5: Creating Simple Events\n\nWhile it is fairly simple to allow\
    \ users to create an event by themselves, we, as developers, should always attempt\
    \ to simplify the lives of the users. The less that users have to do on their\
    \ own, the happier they tend to be with the final product. To this end, it is\
    \ important to be able to create and edit events programmatically, such that users\
    \ never even have to see an `EKEventEditViewController`.\n\nAgain, building off\
    \ of the previous recipe, you will first go into your view controller's XIB file.\n\
    \nAdd a `UIToolbar` element to the top of your view. You will have to move the\
    \ top of your `UITableView` down by the height of the toolbar, which defaults\
    \ to 44 points. Go ahead and delete the `UIBarButtonItem` that is inside the toolbar\
    \ by default; you will implement the items inside your toolbar programmatically.\n\
    \nConnect your `UIToolbar` to your view controller's header file using the property\
    \ name `toolBarTop`.\n\nYou will be adding a button to your `toolBarTop` to allow\
    \ you to create a new `EKEvent`, so you will define in advance the header for\
    \ your method to perform this task.\n\n`-(void)addPressed:(UIButton *)sender;`\n\
    \nNext, you will edit your `-viewDidLoad` method to accommodate your newest features.\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    ///////////////START\
    \ OF NEW CODE\n    UIBarButtonItem *addButton = [[UIBarButtonItem alloc]\ninitWithBarButtonSystemItem:UIBarButtonSystemItemAdd\
    \ target:self\naction:@selector(addPressed:)];\n    UIBarButtonItem *fixedSpace\
    \ = [[UIBarButtonItem alloc]\ninitWithBarButtonSystemItem:UIBarButtonSystemItemFixedSpace\
    \ target:nil action:NULL];\n    fixedSpace.width = 265;\n    [self.toolBarTop\
    \ setItems:[NSArray arrayWithObjects:fixedSpace, addButton, nil]];\n    ///////////////END\
    \ OF NEW CODE\n\n    self.tableViewEvents.delegate = self;\n    self.tableViewEvents.dataSource\
    \ = self;\n\n    self.eventStore = [[EKEventStore alloc] init];\n    self.calendars\
    \ = [self.eventStore calendars];\n\n    [self fetchEvents];\n}\n```\n\nWhen your\
    \ `addButton` is pressed, you will have your application present a modal view\
    \ controller in order to take an input from the user as to the name of the new\
    \ event to be created. In order to do this, you need to create another view controller\
    \ from scratch.\n\nGo to **File** ![Image](images/U001.jpg) **New File…**, and\
    \ make sure to choose the “UIViewController subclass” option, as shown in [Figure\
    \ 8–6](#Chapter08.html#fig_8_6).\n\n![Image](images/9781430240051_Fig08-06.jpg)\n\
    \n**Figure 8–6.** *Subclassing `UIViewController`*\n\nName your subclass “EventAddViewController”,\
    \ making sure that it will be created with a XIB file, as is done in [Figure 8–7](#Chapter08.html#fig_8_7).\n\
    \n![Image](images/9781430240051_Fig08-07.jpg)\n\n**Figure 8–7.** *Configuring\
    \ your new view controller*\n\nSet up your new view controller's XIB file to resemble\
    \ the one in [Figure 8–8](#Chapter08.html#fig_8_8).\n\n![Image](images/9781430240051_Fig08-08.jpg)\n\
    \n**Figure 8–8.** *User interface for event creation*\n\nRemember that here you\
    \ are using a `UITextField`, which means at some point the bottom half of your\
    \ view will be taken up by a keyboard, so you must take care not to let anything\
    \ be hidden by this unnecessarily.\n\nConnect your `UITextField` as well as your\
    \ `UIButton` to your view controller's header file with the respective property\
    \ names `textFieldTitle` and `doneButton`. Define also the header for an action\
    \ called `-donePressed:`, as shown here, and connect `doneButton` to this action.\n\
    \n`-(IBAction)donePressed:(id)sender;`\n\nRather than have this class do any specific\
    \ work with the Event Kit, you will simply have it return the submitted string\
    \ to a delegate view controller. In order to do this, you first must declare a\
    \ protocol for the delegate to conform to, by adding the following protocol declaration\
    \ to the top of your header file:\n\n```\n@protocol EventAddViewControllerDelegate\
    \ <NSObject>\n\n-(void)EventAddViewController:(EventAddViewController *)controller\n\
    didSubmitTitle:(NSString *)title;\n\n@end\n```\n\nYour compiler will complain\
    \ about this circular reference of a class to itself before it has been declared,\
    \ so add this extra line above the protocol declaration in order to assure the\
    \ compiler that the `EventAddViewController` is, in fact, declared.\n\n`@class\
    \ EventAddViewController;`\n\nSince, as noted previously, you are using a `UITextField`,\
    \ you should have your new view controller conform to the `UITextFieldDelegate`\
    \ protocol. Make this so.\n\nFinally, declare a property of type `id` that conforms\
    \ to your protocol for this view controller called `delegate`. Make sure to properly\
    \ synthesize and handle this in your implementation file as always.\n\n`@property\
    \ (strong, nonatomic) id <EventAddViewControllerDelegate> delegate;`\n\nIn its\
    \ entirety, your header file should now look like so:\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@class EventAddViewController;\n\n@protocol EventAddViewControllerDelegate <NSObject>\n\
    -(void)EventAddViewController:(EventAddViewController *)controller\ndidSubmitTitle:(NSString\
    \ *)title;\n@end\n\n@interface EventAddViewController : UIViewController <UITextFieldDelegate>\n\
    \n@property (strong, nonatomic) IBOutlet UITextField *textFieldTitle;\n@property\
    \ (strong, nonatomic) IBOutlet UIButton *doneButton;\n@property (strong, nonatomic)\
    \ id <EventAddViewControllerDelegate> delegate;\n-(IBAction)donePressed:(id)sender;\n\
    \n@end\n```\n\nYour implementation for this view controller will be incredibly\
    \ simple, as its function will be served entirely by a delegate method.\n\nFirst,\
    \ you must modify your `-viewDidLoad` method to set your `UITextField`'s delegate.\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.textFieldTitle.delegate\
    \ = self;\n}\n```\n\nSecond, you implement a very simple `UITextField` delegate\
    \ method to handle the pressing of the “return” button.\n\n```\n-(BOOL)textFieldShouldReturn:(UITextField\
    \ *)textField\n{\n    [textField resignFirstResponder];\n    return NO;\n}\n```\n\
    \nFinally, you implement your `-donePressed:` method to call your view controller's\
    \ delegate method.\n\n```\n-(void)donePressed:(id)sender\n{\n    [self.delegate\
    \ EventAddViewController:self didSubmitTitle:self.textFieldTitle.text];\n}\n```\n\
    \nYou can now switch back to your `MainViewController`. The first thing to remember\
    \ is to add the newly created protocol to your view controller, so that, in its\
    \ final stage, your header file reads like so:\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <EventKit/EventKit.h>\n#import <EventKitUI/EventKitUI.h>\n#import \"EventAddViewController.h\"\
    \n\n@interface MainViewController : UIViewController <UITableViewDelegate,\nUITableViewDataSource,\
    \ EKEventViewDelegate, EKEventEditViewDelegate,\nEventAddViewControllerDelegate>\n\
    \n@property (strong, nonatomic) IBOutlet UIToolbar *toolBarTop;\n\n@property (nonatomic,\
    \ strong) EKEventStore *eventStore;\n@property (strong, nonatomic) IBOutlet UITableView\
    \ *tableViewEvents;\n\n@property (nonatomic, strong) NSMutableDictionary *events;\n\
    @property (nonatomic, strong) NSArray *calendars;\n-(void)addPressed:(UIButton\
    \ *)sender;\n@end\n```\n\nYou can now implement the `-addPressed:` method that\
    \ you hinted at earlier to display your new view controller.\n\n```\n-(void)addPressed:(UIButton\
    \ *)sender\n{\n    EventAddViewController *addVC = [[EventAddViewController alloc]\
    \ init];\n    addVC.delegate = self;\n    [self presentModalViewController:addVC\
    \ animated:YES];\n}\n```\n\nFinally, you can create your `EventAddViewController`'s\
    \ delegate method, which will take the submitted string, and create a new event\
    \ with it."
  raw: '### Recipe 8–5: Creating Simple Events


    While it is fairly simple to allow users to create an event by themselves, we,
    as developers, should always attempt to simplify the lives of the users. The less
    that users have to do on their own, the happier they tend to be with the final
    product. To this end, it is important to be able to create and edit events programmatically,
    such that users never even have to see an `EKEventEditViewController`.


    Again, building off of the previous recipe, you will first go into your view controller''s
    XIB file.


    Add a `UIToolbar` element to the top of your view. You will have to move the top
    of your `UITableView` down by the height of the toolbar, which defaults to 44
    points. Go ahead and delete the `UIBarButtonItem` that is inside the toolbar by
    default; you will implement the items inside your toolbar programmatically.


    Connect your `UIToolbar` to your view controller''s header file using the property
    name `toolBarTop`.


    You will be adding a button to your `toolBarTop` to allow you to create a new
    `EKEvent`, so you will define in advance the header for your method to perform
    this task.


    `-(void)addPressed:(UIButton *)sender;`


    Next, you will edit your `-viewDidLoad` method to accommodate your newest features.


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`


    `    ///////////////START OF NEW CODE`

    `    UIBarButtonItem *addButton = [[UIBarButtonItem alloc]`

    `initWithBarButtonSystemItem:UIBarButtonSystemItemAdd target:self`

    `action:@selector(addPressed:)];`

    `    UIBarButtonItem *fixedSpace = [[UIBarButtonItem alloc]`

    `initWithBarButtonSystemItem:UIBarButtonSystemItemFixedSpace target:nil action:NULL];`

    `    fixedSpace.width = 265;`

    `    [self.toolBarTop setItems:[NSArray arrayWithObjects:fixedSpace, addButton,
    nil]];`

    `    ///////////////END OF NEW CODE`


    `    self.tableViewEvents.delegate = self;`

    `    self.tableViewEvents.dataSource = self;`


    `    self.eventStore = [[EKEventStore alloc] init];`

    `    self.calendars = [self.eventStore calendars];`


    `    [self fetchEvents];`

    `}`


    When your `addButton` is pressed, you will have your application present a modal
    view controller in order to take an input from the user as to the name of the
    new event to be created. In order to do this, you need to create another view
    controller from scratch.


    Go to **File** ![Image](images/U001.jpg) **New File…**, and make sure to choose
    the “UIViewController subclass” option, as shown in [Figure 8–6](#Chapter08.html#fig_8_6).


    ![Image](images/9781430240051_Fig08-06.jpg)


    **Figure 8–6.** *Subclassing `UIViewController`*


    Name your subclass “EventAddViewController”, making sure that it will be created
    with a XIB file, as is done in [Figure 8–7](#Chapter08.html#fig_8_7).


    ![Image](images/9781430240051_Fig08-07.jpg)


    **Figure 8–7.** *Configuring your new view controller*


    Set up your new view controller''s XIB file to resemble the one in [Figure 8–8](#Chapter08.html#fig_8_8).


    ![Image](images/9781430240051_Fig08-08.jpg)


    **Figure 8–8.** *User interface for event creation*


    Remember that here you are using a `UITextField`, which means at some point the
    bottom half of your view will be taken up by a keyboard, so you must take care
    not to let anything be hidden by this unnecessarily.


    Connect your `UITextField` as well as your `UIButton` to your view controller''s
    header file with the respective property names `textFieldTitle` and `doneButton`.
    Define also the header for an action called `-donePressed:`, as shown here, and
    connect `doneButton` to this action.


    `-(IBAction)donePressed:(id)sender;`


    Rather than have this class do any specific work with the Event Kit, you will
    simply have it return the submitted string to a delegate view controller. In order
    to do this, you first must declare a protocol for the delegate to conform to,
    by adding the following protocol declaration to the top of your header file:


    `@protocol EventAddViewControllerDelegate <NSObject>`


    `-(void)EventAddViewController:(EventAddViewController *)controller`

    `didSubmitTitle:(NSString *)title;`


    `@end`


    Your compiler will complain about this circular reference of a class to itself
    before it has been declared, so add this extra line above the protocol declaration
    in order to assure the compiler that the `EventAddViewController` is, in fact,
    declared.


    `-@class EventAddViewController;`


    Since, as noted previously, you are using a `UITextField`, you should have your
    new view controller conform to the `UITextFieldDelegate` protocol. Make this so.


    Finally, declare a property of type `id` that conforms to your protocol for this
    view controller called `delegate`. Make sure to properly synthesize and handle
    this in your implementation file as always.


    `@property (strong, nonatomic) id <EventAddViewControllerDelegate> delegate;`


    In its entirety, your header file should now look like so:


    `#import <UIKit/UIKit.h>`


    `@class EventAddViewController;`


    `@protocol EventAddViewControllerDelegate <NSObject>`

    `-(void)EventAddViewController:(EventAddViewController *)controller`

    `didSubmitTitle:(NSString *)title;`

    `@end`


    `@interface EventAddViewController : UIViewController <UITextFieldDelegate>`


    `@property (strong, nonatomic) IBOutlet UITextField *textFieldTitle;`

    `@property (strong, nonatomic) IBOutlet UIButton *doneButton;`

    `@property (strong, nonatomic) id <EventAddViewControllerDelegate> delegate;`

    `-(IBAction)donePressed:(id)sender;`


    `@end`


    Your implementation for this view controller will be incredibly simple, as its
    function will be served entirely by a delegate method.


    First, you must modify your `-viewDidLoad` method to set your `UITextField`''s
    delegate.


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `    self.textFieldTitle.delegate = self;`

    `}`


    Second, you implement a very simple `UITextField` delegate method to handle the
    pressing of the “return” button.


    `-(BOOL)textFieldShouldReturn:(UITextField *)textField`

    `{`

    `    [textField resignFirstResponder];`

    `    return NO;`

    `}`


    Finally, you implement your `-donePressed:` method to call your view controller''s
    delegate method.


    `-(void)donePressed:(id)sender`

    `{`

    `    [self.delegate EventAddViewController:self didSubmitTitle:self.textFieldTitle.text];`

    `}`


    You can now switch back to your `MainViewController`. The first thing to remember
    is to add the newly created protocol to your view controller, so that, in its
    final stage, your header file reads like so:


    `#import <UIKit/UIKit.h>`

    `#import <EventKit/EventKit.h>`

    `#import <EventKitUI/EventKitUI.h>`

    `#import "EventAddViewController.h"`


    `@interface MainViewController : UIViewController <UITableViewDelegate,`

    `UITableViewDataSource, EKEventViewDelegate, EKEventEditViewDelegate,`

    `EventAddViewControllerDelegate>`


    `@property (strong, nonatomic) IBOutlet UIToolbar *toolBarTop;`


    `@property (nonatomic, strong) EKEventStore *eventStore;`

    `@property (strong, nonatomic) IBOutlet UITableView *tableViewEvents;`


    `@property (nonatomic, strong) NSMutableDictionary *events;`

    `@property (nonatomic, strong) NSArray *calendars;`

    `-(void)addPressed:(UIButton *)sender;`

    `@end`


    You can now implement the `-addPressed:` method that you hinted at earlier to
    display your new view controller.


    `-(void)addPressed:(UIButton *)sender`

    `{`

    `    EventAddViewController *addVC = [[EventAddViewController alloc] init];`

    `    addVC.delegate = self;`

    `    [self presentModalViewController:addVC animated:YES];`

    `}`


    Finally, you can create your `EventAddViewController`''s delegate method, which
    will take the submitted string, and create a new event with it.'
  trans: "\n### 食谱 8–5：创建简单事件\n\n虽然允许用户自行创建事件相当简单，但作为开发者，我们应始终尝试简化用户的操作。用户需要自行完成的操作越少，他们对最终产品的满意度通常就越高。为此，能够通过编程方式创建和编辑事件至关重要，这样用户甚至无需看到\
    \ `EKEventEditViewController`。\n\n同样，基于上一个食谱，你首先需要进入视图控制器的 XIB 文件。\n\n在视图顶部添加一个\
    \ `UIToolbar` 元素。你需要将 `UITableView` 的顶部向下移动工具栏的高度，默认为 44 点。请继续删除工具栏中默认包含的 `UIBarButtonItem`；你将通过编程方式实现工具栏内的项目。\n\
    \n使用属性名称 `toolBarTop` 将你的 `UIToolbar` 连接到视图控制器的头文件。\n\n你将向 `toolBarTop` 添加一个按钮，以便创建新的\
    \ `EKEvent`，因此你需要预先定义用于执行此任务的方法的头文件。\n\n`-(void)addPressed:(UIButton *)sender;`\n\
    \n接下来，你将编辑 `-viewDidLoad` 方法以适配你的最新功能。\n\n```\n- (void)viewDidLoad\n{\n    [super\
    \ viewDidLoad];\n\n    ///////////////新代码开始\n    UIBarButtonItem *addButton =\
    \ [[UIBarButtonItem alloc]\ninitWithBarButtonSystemItem:UIBarButtonSystemItemAdd\
    \ target:self\naction:@selector(addPressed:)];\n    UIBarButtonItem *fixedSpace\
    \ = [[UIBarButtonItem alloc]\ninitWithBarButtonSystemItem:UIBarButtonSystemItemFixedSpace\
    \ target:nil action:NULL];\n    fixedSpace.width = 265;\n    [self.toolBarTop\
    \ setItems:[NSArray arrayWithObjects:fixedSpace, addButton, nil]];\n    ///////////////新代码结束\n\
    \n    self.tableViewEvents.delegate = self;\n    self.tableViewEvents.dataSource\
    \ = self;\n\n    self.eventStore = [[EKEventStore alloc] init];\n    self.calendars\
    \ = [self.eventStore calendars];\n\n    [self fetchEvents];\n}\n```\n\n当按下 `addButton`\
    \ 时，你的应用程序将呈现一个模态视图控制器，以便获取用户输入的要创建的新事件的名称。为此，你需要从头开始创建另一个视图控制器。\n\n前往 **File**\
    \ ![Image](img/U001.jpg) **New File…**，并确保选择“UIViewController subclass”选项，如图 8–6\
    \ 所示。\n\n![Image](img/9781430240051_Fig08-06.jpg)\n\n**图 8–6.** *子类化 `UIViewController`*\n\
    \n将你的子类命名为“EventAddViewController”，确保它会同时创建一个 XIB 文件，如图 8–7 所示。\n\n![Image](img/9781430240051_Fig08-07.jpg)\n\
    \n**图 8–7.** *配置你的新视图控制器*\n\n将新视图控制器的 XIB 文件设置为类似于图 8–8 中的样式。\n\n![Image](img/9781430240051_Fig08-08.jpg)\n\
    \n**图 8–8.** *用于创建事件的用户界面*\n\n请记住，这里你使用了 `UITextField`，这意味着视图的下半部分在某个时刻会被键盘占据，因此你必须注意不要让任何内容被键盘不必要地遮挡。\n\
    \n将你的 `UITextField` 和 `UIButton` 分别使用属性名称 `textFieldTitle` 和 `doneButton` 连接到视图控制器的头文件。同时，定义一个名为\
    \ `-donePressed:` 的操作的头文件，如下所示，并将 `doneButton` 连接到该操作。\n\n`-(IBAction)donePressed:(id)sender;`\n\
    \n与其让这个类处理 Event Kit 的具体工作，不如简单地让它将提交的字符串返回给委托视图控制器。为此，你首先必须声明一个供委托遵循的协议，方法是在头文件顶部添加以下协议声明：\n\
    \n```\n@protocol EventAddViewControllerDelegate <NSObject>\n\n-(void)EventAddViewController:(EventAddViewController\
    \ *)controller\ndidSubmitTitle:(NSString *)title;\n\n@end\n```\n\n你的编译器会报错，因为在对类进行声明之前就出现了对自身的循环引用，因此请在协议声明上方添加这行额外的代码，以确保编译器知道\
    \ `EventAddViewController` 实际上已经被声明。\n\n`@class EventAddViewController;`\n\n如前所述，由于你使用了\
    \ `UITextField`，你应该让新视图控制器遵循 `UITextFieldDelegate` 协议。请实现这一点。\n\n最后，为这个视图控制器声明一个类型为\
    \ `id` 且遵循你的协议的属性，命名为 `delegate`。请像往常一样，确保在实现文件中正确合成并处理它。\n\n`@property (strong,\
    \ nonatomic) id <EventAddViewControllerDelegate> delegate;`\n\n完整来说，你的头文件现在应如下所示：\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@class EventAddViewController;\n\n@protocol\
    \ EventAddViewControllerDelegate <NSObject>\n-(void)EventAddViewController:(EventAddViewController\
    \ *)controller\ndidSubmitTitle:(NSString *)title;\n@end\n\n@interface EventAddViewController\
    \ : UIViewController <UITextFieldDelegate>\n\n@property (strong, nonatomic) IBOutlet\
    \ UITextField *textFieldTitle;\n@property (strong, nonatomic) IBOutlet UIButton\
    \ *doneButton;\n@property (strong, nonatomic) id <EventAddViewControllerDelegate>\
    \ delegate;\n-(IBAction)donePressed:(id)sender;\n\n@end\n```\n\n这个视图控制器的实现将非常简单，因为其功能将完全由一个委托方法提供。\n\
    \n首先，你必须修改 `-viewDidLoad` 方法来设置你的 `UITextField` 的委托。\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    self.textFieldTitle.delegate = self;\n}\n```\n\
    \n其次，你实现一个非常简单的 `UITextField` 委托方法来处理“return”按钮的按下。\n\n```\n-(BOOL)textFieldShouldReturn:(UITextField\
    \ *)textField\n{\n    [textField resignFirstResponder];\n    return NO;\n}\n```\n\
    \n最后，你实现 `-donePressed:` 方法来调用视图控制器的委托方法。\n\n```\n-(void)donePressed:(id)sender\n\
    {\n    [self.delegate EventAddViewController:self didSubmitTitle:self.textFieldTitle.text];\n\
    }\n```\n\n现在你可以切换回 `MainViewController`。首先要记住的是，将新创建的协议添加到你的视图控制器中，这样，在最终阶段，你的头文件应如下所示：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <EventKit/EventKit.h>\n#import <EventKitUI/EventKitUI.h>\n\
    #import \"EventAddViewController.h\"\n\n@interface MainViewController : UIViewController\
    \ <UITableViewDelegate,\nUITableViewDataSource, EKEventViewDelegate, EKEventEditViewDelegate,\n\
    EventAddViewControllerDelegate>\n\n@property (strong, nonatomic) IBOutlet UIToolbar\
    \ *toolBarTop;\n\n@property (nonatomic, strong) EKEventStore *eventStore;\n@property\
    \ (strong, nonatomic) IBOutlet UITableView *tableViewEvents;\n\n@property (nonatomic,\
    \ strong) NSMutableDictionary *events;\n@property (nonatomic, strong) NSArray\
    \ *calendars;\n-(void)addPressed:(UIButton *)sender;\n@end\n```\n\n现在你可以实现之前暗示过的\
    \ `-addPressed:` 方法来显示你的新视图控制器。\n\n```\n-(void)addPressed:(UIButton *)sender\n\
    {\n    EventAddViewController *addVC = [[EventAddViewController alloc] init];\n\
    \    addVC.delegate = self;\n    [self presentModalViewController:addVC animated:YES];\n\
    }\n```\n\n最后，你可以创建你的 `EventAddViewController` 的委托方法，该方法将获取提交的字符串，并用它创建一个新事件。\n"
- fmt: "```objc\n- (void)EventAddViewController:(EventAddViewController *)controller\n\
    didSubmitTitle:(NSString *)title\n{\n    EKEvent *event = [EKEvent eventWithEventStore:self.eventStore];\n\
    \    event.title = title;\n    event.calendar = [self.eventStore defaultCalendarForNewEvents];\n\
    \    event.startDate = [NSDate dateWithTimeIntervalSinceNow:60*60*24.0];\n   \
    \ event.endDate = [NSDate dateWithTimeInterval:60*60.0 sinceDate:event.startDate];\n\
    \    [self.eventStore saveEvent:event span:EKSpanThisEvent error:nil];\n    [self\
    \ fetchEvents];\n    [self.tableViewEvents reloadData];\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\nI have chosen an incredibly simple method for creating these new events\
    \ for the sake of demonstration, as you can see in the fact that you have simply\
    \ made any events created in this way always be a day in advance, and last only\
    \ an hour. Most likely in your application you would choose a more complex or\
    \ user-input-based method for creating `EKEvent`s.\n\n**NOTE:** The code we have\
    \ used here may generate a \"Could not load source: 6\" log in Xcode. Do not worry\
    \ about this, as it does not hinder your app from functioning correctly.\n\n##\
    \ Recipe 8–6: Recurring Events\n\nThe Event Kit framework provides an incredibly\
    \ powerful API for developers to be able to programmatically work with recurring\
    \ events. Here, you will simply add to the previous recipes in order to have your\
    \ application also add in a recurring event to your calendar.\n\nIn your `-EventAddViewController:didSubmitTitle:`\
    \ method that you have created, you will simply add in extra code to create a\
    \ recurring `EKEvent` based on the same title as the normal one. Start by adding\
    \ the following code to set up the new `EKEvent`.\n\n```objc\nEKEvent *recurringEvent\
    \ = [EKEvent eventWithEventStore:self.eventStore];\n    recurringEvent.title =\
    \ [NSString stringWithFormat:@\"Recurring %@\", title];\n    recurringEvent.calendar\
    \ = [self.eventStore defaultCalendarForNewEvents];\n    recurringEvent.startDate\
    \ = [NSDate dateWithTimeIntervalSinceNow:60*60*24.0];\n    recurringEvent.endDate\
    \ = [NSDate dateWithTimeInterval:60*60.0\nsinceDate:event.startDate];\n```\n\n\
    Next, you must create an instance of the class `EKRecurrenceRule` to provide to\
    \ your event. This class is an incredibly flexible method with which to programmatically\
    \ implement recurrent events, due to the sheer possibility of recurrence combinations.\
    \ With only one method, a developer can create nearly any combination of recurrences\
    \ imaginable. You will define a slightly complex one here:\n\n```objc\nEKRecurrenceRule\
    \ *rule = [[EKRecurrenceRule alloc]\n                              initRecurrenceWithFrequency:EKRecurrenceFrequencyDaily\n\
    \                              interval:2\n                              daysOfTheWeek:[NSArray\n\
    arrayWithObjects:[EKRecurrenceDayOfWeek dayOfWeek:2], [EKRecurrenceDayOfWeek\n\
    dayOfWeek:3], nil]\n                              daysOfTheMonth:nil\n       \
    \                       monthsOfTheYear:nil\n                              weeksOfTheYear:nil\n\
    \                              daysOfTheYear:nil\n                           \
    \   setPositions:nil\n                              end:[EKRecurrenceEnd\nrecurrenceEndWithOccurrenceCount:20]];\n\
    ```\n\nYou would then add this rule to your event with the following line of code.\
    \ The `recurrenceRules` property used is inherited from the `EKCalendarItem` class\
    \ as of iOS 5.0.\n\n```objc\nrecurringEvent.recurrenceRules = [NSArray arrayWithObject:rule];\n\
    ```\n\nThe function of each parameter of this method is listed as follows. For\
    \ any parameter, passing a value of `nil` indicates a lack of restriction.\n\n\
    - `InitRecurrenceWithFrequency`: This specifies a basic level of how often the\
    \ event will repeat, whether on a daily, weekly, monthly, or annual basis.\n-\
    \ `Interval`: Specifies the interval of repetition based on the frequency. A recurring\
    \ event with a weekly frequency and an interval of 3 will repeat every three weeks.\n\
    - `DaysOfTheWeek`: This property takes an `NSArray` of objects that must be accessed\
    \ through the `EKRecurrenceDayOfWeek` `+dayOfWeek` method, which takes an integer\
    \ parameter representing the day of the week, starting with 1 referring to Sunday.\
    \ By setting this parameter, a developer can create an event to repeat every few\
    \ days, but only if the event falls on specified days of the week.\n- `MonthsOfTheYear`:\
    \ Similar to `DaysOfTheWeek`, this parameter specifies which months to restrict\
    \ a recurring event to. It is valid only for events with a yearly frequency.\n\
    - `WeeksOfTheYear`: Just like `MonthsOfTheYear`, this is restricted only to events\
    \ with an annual frequency, but with specific weeks to restrict instead of months.\n\
    - `DaysOfTheYear`: Another parameter restricted to annually recurring events,\
    \ this allows you to specify only certain days, counting from either the beginning\
    \ or the end of the year, to filter a specific event to.\n- `SetPositions`: This\
    \ parameter is the ultimate filter, allowing you to entirely restrict the event\
    \ you have created to only specific days of the year. In this way, an event that\
    \ repeats daily could, for example, be restricted to occur only on the 28th, 102nd,\
    \ and 364th days of the year for whatever reason a developer might choose.\n-\
    \ `End`: This parameter requires a class call to the `EKRecurrenceEnd` class,\
    \ and specifies when your event will no longer repeat. The two class methods to\
    \ choose between are as follows:\n  - `+recurrenceEndWithEndDate`: Allows the\
    \ developer to specify a date after which the event will no longer repeat\n  -\
    \ `+recurrenceEndWithOccurenceCount`: Restricts an event's repetition to a limited\
    \ number of occurrences\n\nBased on all this, you can see that the recurring event\
    \ you have created for demonstration will repeat every two days, but only on either\
    \ a Monday or a Tuesday, up to a limit of 20 occurrences.\n\nBased on the different\
    \ functionalities you have implemented, you should be able to see exactly how\
    \ much possibility there is in using the Event Kit framework to interact with\
    \ a user's schedule and events. Regardless of whether you wish to allow a user\
    \ to interact with his or her schedule or you prefer a more programmatic, behind-the-scenes\
    \ approach, the tools needed to perform your goal are easily available and incredibly\
    \ simple to use, despite having immense flexibility."
