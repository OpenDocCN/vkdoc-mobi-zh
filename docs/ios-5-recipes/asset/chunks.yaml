    it has been successfully created.


    ### Summary


    As a developer, you have a great deal of choice when it comes to dealing with
    your device''s camera. The pre-defined interfaces such as `UIImagePickerController`
    and `UIVideoEditorController` are incredibly useful and well designed, but Apple''s
    implementation of the AV Foundation framework allows for infinitely more possibilities.
    Everything from dealing with video, audio, and still images is possible. Even
    a quick glance at the full documentation will reveal countless other functionalities
    that you have not gone over here, including everything from device capabilities
    (such as the video camera''s LED “torch”), to the implementation of your own “Touch-To-Focus”
    functionality. We live in a world where images, audio, and video fly around the
    world in a matter of seconds, and as developers we must be able to design and
    create innovative solutions that fit in with our media-based community.


