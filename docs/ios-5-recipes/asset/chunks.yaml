- fmt: "### Recipe 6–6: Programmatically Recording Video\n\nNow that you have covered\
    \ some of the basics of using `AVFoundation`, you will implement a slightly more\
    \ complicated project using it. This time, your application will be recording\
    \ full video, rather than simply capturing specific frames. You will also add\
    \ an audio input device so that your video has sound included.\n\nFirst, you must\
    \ make your new project, this time titled “Chapter6Recipe6”, with class prefix\
    \ “CustomVideo”.\n\nAs usual, the first thing to do is to acquire the following\
    \ necessary frameworks using the `Link Binary With Libraries` section in your\
    \ project's `Build Phases` tab.\n\n* *AV Foundation*: You will use this to deal\
    \ with your camera and microphone.\n* *Assets Library*: This is for saving the\
    \ video that you will record to your device.\n\nIn Interface Builder, add a `UIButton`\
    \ to the bottom center of the view controller's view, just like in the previous\
    \ recipe, giving it the default label “Record”. When you connect this to the header\
    \ file, give the `UIButton` the name `button`. Be sure to also create an action\
    \ for this button to perform called `-recordPressed:` (see earlier recipes on\
    \ how to do this).\n\nJust like in your previous recipe, you will be building\
    \ your `AVCaptureSession` to manage your camera's input and the output of your\
    \ video, so you will start off by adding a few variables, properties, and protocols\
    \ to your view controller's header file.\n\n* First, you will need an instance\
    \ variable of type `BOOL` called `recording`, which will simply keep track of\
    \ whether your video is recording.\n* Second, you need to create two properties\
    \ that will be used to store pointers to your `AVCaptureSession` session and your\
    \ `AVCaptureMovieFileOutput` output, the latter of which will be your `AVCaptureOutput`\
    \ device.\n* Third, you need to include an import statement for the `AV Foundation`\
    \ framework in your header file.\n* Finally, you will need to tell the compiler\
    \ that your view controller conforms to the `AVCaptureFileOutputRecordingDelegate`\
    \ protocol.\n\nWith all these changes, your view controller's header file will\
    \ now look like so:\n\n```\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\
    #import <AssetsLibrary/AssetsLibrary.h>\n\n@interface CustomVideoViewController\
    \ : UIViewController\n<AVCaptureFileOutputRecordingDelegate>{\n    UIButton *button;\n\
    \    BOOL recording;\n}\n\n@property (strong, nonatomic) IBOutlet UIButton *button;\n\
    \n@property (strong, nonatomic) AVCaptureSession *session;\n@property (strong,\
    \ nonatomic) AVCaptureMovieFileOutput *output;\n\n-(IBAction)recordPressed:(id)sender;\n\
    @end\n```\n\nNow that your header file is all set up, you will switch over to\
    \ your implementation file.\n\nFirst, since you have set up two of your own properties,\
    \ `session` and `output`, you absolutely have to remember to `@synthesize` both\
    \ of them at the top of your implementation file. You should also remember to\
    \ set them both equal to `nil` in your `-viewDidUnload` method.\n\nNext, as with\
    \ the previous recipe, you will start to build your `-viewDidLoad` method.\n\n\
    First, you must allocate your `AVCaptureSession`, like so:\n\n```\nself.session\
    \ = [[AVCaptureSession alloc] init];\nself.session.sessionPreset = AVCaptureSessionPresetMedium;\n\
    ```\n\nNext, you will create two instances of `AVCaptureDevice`, one for your\
    \ rear camera, and one for your microphone, and then create `AVCaptureDeviceInput`s\
    \ for each of them and add them to your session.\n\n```\nAVCaptureDevice *device\
    \ = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\nNSError\
    \ *error = nil;\nAVCaptureDeviceInput *input = [AVCaptureDeviceInput deviceInputWithDevice:device\n\
    error:&error];\n\nNSArray *devices = [AVCaptureDevice devicesWithMediaType:AVMediaTypeAudio];\n\
    AVCaptureDeviceInput *mic = [[AVCaptureDeviceInput alloc] initWithDevice:[devices\n\
    objectAtIndex:0] error:nil];\nif (!input || !mic)\n    {\n        NSLog(@\"Input\
    \ Error\");\n    }\n    else\n    {\n        [self.session addInput:input];\n\
    \        [self.session addInput:mic];\n    }\n```\n\nNow you create your `AVCaptureOutput`\
    \ and add it to the session. You will make sure any connections that your output\
    \ has have their video orientations set correctly.\n\n```\nself.output = [[AVCaptureMovieFileOutput\
    \ alloc] init];\n\n    NSArray *connections = self.output.connections;\n    for\
    \ (AVCaptureConnection *connection in connections)\n    {\n        if ([connection\
    \ isVideoOrientationSupported])\n             connection.videoOrientation = AVCaptureVideoOrientationPortrait;\n\
    \    }\n    if ([self.session canAddOutput:self.output])\n        [self.session\
    \ addOutput:self.output];\n```\n\nYou will need to be able to see your camera's\
    \ view, so you'll set up an instance of `AVCaptureVideoPreviewLayer`.\n\n```\n\
    AVCaptureVideoPreviewLayer *previewLayer = [AVCaptureVideoPreviewLayer\nlayerWithSession:self.session];\n\
    UIView *aView = self.view;\npreviewLayer.frame = CGRectMake(0, 0, self.view.frame.size.width,\n\
    self.view.frame.size.height-70);\n[aView.layer addSublayer:previewLayer];\n```\n\
    \nFinally, you simply need to start your `AVCaptureSession`. You'll also set your\
    \ `recording` instance to `NO` just to ensure it has the correct starting value.\n\
    \n```\n[self.session startRunning];\n    recording = NO;\n```\n\nIn its entirety,\
    \ your `-viewDidLoad` method now looks so:\n\n```\n- (void)viewDidLoad\n{\n  \
    \  [super viewDidLoad];\n\n    self.session = [[AVCaptureSession alloc] init];\n\
    \    self.session.sessionPreset = AVCaptureSessionPresetMedium;\n    AVCaptureDevice\
    \ *device = [AVCaptureDevice\ndefaultDeviceWithMediaType:AVMediaTypeVideo];\n\n\
    \    NSError *error = nil;\n    AVCaptureDeviceInput *input = [AVCaptureDeviceInput\
    \ deviceInputWithDevice:device\nerror:&error];\n\n    NSArray *devices = [AVCaptureDevice\
    \ devicesWithMediaType:AVMediaTypeAudio];\n\n    AVCaptureDeviceInput *mic = [[AVCaptureDeviceInput\
    \ alloc] initWithDevice:[devices\nobjectAtIndex:0] error:nil];\n\n    if (!input\
    \ || !mic)\n    {\n        NSLog(@\"Input Error\");\n    }\n    else\n    {\n\
    \        [self.session addInput:input];\n        [self.session addInput:mic];\n\
    \    }\n\n    self.output = [[AVCaptureMovieFileOutput alloc] init];\n\n    NSArray\
    \ *connections = self.output.connections;\n    for (AVCaptureConnection *connection\
    \ in connections)\n    {\n        if ([connection isVideoOrientationSupported])\n\
    \             connection.videoOrientation = AVCaptureVideoOrientationPortrait;\n\
    \    }\n    if ([self.session canAddOutput:self.output])\n        [self.session\
    \ addOutput:self.output];\n\n    AVCaptureVideoPreviewLayer *previewLayer = [AVCaptureVideoPreviewLayer\n\
    layerWithSession:self.session];\n    UIView *aView = self.view;\n    previewLayer.frame\
    \ = CGRectMake(0, 0, self.view.frame.size.width,\nself.view.frame.size.height-70);\n\
    \    [aView.layer addSublayer:previewLayer];\n\n    [self.session startRunning];\n\
    \    recording = NO;\n}\n```\n\n**TIP:** Adding sound to your videos is not a\
    \ complicated process in this method! All that is required is to add the audio\
    \ input device to your session, and the `AVCaptureSession` will do the rest for\
    \ you.\n\nYou will of course need to define how your application handles when\
    \ the user presses your `UIButton`. This will be a fairly simple toggle function\
    \ to start and stop your `AVCaptureOutput`.\n\n```\n-(IBAction)recordPressed:(id)sender\n\
    {\n    if (!recording)\n    {\n        [self.button setTitle:@\"Stop\" forState:UIControlStateNormal];\n\
    \        recording = YES;\n        NSURL *fileURL = [self\ntempFileURL];\n   \
    \     [self.output startRecordingToOutputFileURL:fileURL recordingDelegate:self];\n\
    \    }\n    else\n    {\n        [self.button setTitle:@\"Record\" forState:UIControlStateNormal];\n\
    \        [self.output stopRecording];\n        recording = NO;\n    }\n}\n```"
