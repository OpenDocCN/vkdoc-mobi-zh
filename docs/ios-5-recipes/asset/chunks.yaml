    to create an outlet named “labelGeocodeInfo”. Repeat the process with the `UIButton`
    to an action named “actionWhereAmI”. These steps are demonstrated by [Figures
    4–27](#Chapter04.html#fig_4_27), [4–28](#Chapter04.html#fig_4_28), and [4–29](#Chapter04.html#fig_4_29).


