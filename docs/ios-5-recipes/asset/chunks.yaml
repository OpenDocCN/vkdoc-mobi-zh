  trans: '

    ### 在同一个 Xcode 项目中同时构建精简版和完整版


    为你的应用提供一个精简版，是让客户在购买前有机会尝试应用的绝佳方式。然而，随着你不断为应用添加新功能，维护两个代码库会变得相当繁琐且难以控制。虽然在 Xcode
    3 中已经可以维护两个构建目标，但 Xcode 4 让这一过程变得更加简单。


    在导航器区域选择你的项目文件，然后选择项目的构建目标。现在按下 ![Image](img/U003.jpg)`D` 键来复制该目标。系统会提示你选择“仅复制”或“复制并过渡到
    iPad”。点击“仅复制”创建一个用于精简版构建的新目标，如 图 1-5 所示。这样会生成一个独立的构建目标，你可以用它来实现第二个版本。


    ![Image](img/9781430240051_Fig01-05.jpg)


    **图 1-5.** *项目复制选项*


    将新目标重命名，追加“Lite”字样。你还需要进入“构建设置”选项卡，在“打包”标题下找到“产品名称”属性，以便在应用名称后追加“Lite”。现在构建名称已设置好，你需要一种方法在源代码中区分这两个构建。为此，向下滚动找到“预处理宏”，并添加一个名为
    `LITE_VERSION` 的新宏。确保为 Debug 和 Release 构建设置都添加这个新宏。图 1-6 展示了这些更改的示例。


    ![Image](img/9781430240051_Fig01-06.jpg)


    **图 1-6.** *“精简版”应用配置*


    如果现在构建并运行，你的设备上会出现第二个应用，标题名为“SampleApp Lite”，但它运行的代码与普通版本相同，如 图 1-7 所示。请记住，这两个目标必须拥有独立的捆绑标识符，才能作为独立的应用显示。这是默认设置，但在进行更改时要小心。


    ![Image](img/9781430240051_Fig01-07.jpg)


    **图 1-7.** *同一应用的两个版本*


    要为你的应用构建不同的功能，你需要利用你创建的那个预处理宏。在你代码中任何需要为精简版和完整版指定不同代码的地方，请使用以下 `#ifdef` 指令：


    ```

    #ifdef LITE_VERSION

    //精简版的内容

    Self.labelAppName.text=@"Sample App Lite";

    #else

    //完整版的内容

    Self.labelAppName.text=@"Sample App Full";

    #endif

    ```


    在模拟器上构建并编译这两个应用，你会看到应用会根据预处理宏以及 `#ifdef` 指令的强大功能，改变它们所编译和运行的代码。图 1-8 展示了这种配置的结果。


    ![Image](img/9781430240051_Fig01-08.jpg)


    **图 1-8.** *完整版和“精简版”应用*


    **注意：** 你还可以控制每个构建中包含哪些文件。例如，你可能不需要在精简版中包含完整版的素材。点击你的精简版项目目标，进入“构建阶段”选项卡。然后展开“复制捆绑资源”列表，移除或添加任何特定于精简版的文件。


    ### 僵尸猎人


    有时，你会遇到一个仅描述为“`EXC_BAD_ACCESS`”的错误，不幸的是，它不会告诉你错误访问发生在哪一行。当你释放了一个变量，然后试图访问那个已释放的对象时，就会导致这个错误。当一个对象不再存在而你又试图访问它时，这个术语叫做僵尸对象。这时候就要用到僵尸猎人——`NSZombieEnabled`
    标志。这在 Xcode 4 中并非新功能，但在 Xcode 4 中设置该标志的位置可能很难找到。前往“产品”菜单，选择“编辑方案…”。现在选择“运行”步骤，点击“参数”选项卡。在“环境变量”部分，添加
    `NSZombieEnabled` 并将其值设置为 `YES`，如 图 1-9 所示。


    ![Image](img/9781430240051_Fig01-09.jpg)


    **图 1-9.** *启用 `NSZombieEnabled`*


    下次你运行代码时，僵尸将在调试窗口中被识别出来。图 1-10 展示了一个被 Xcode 捕获的僵尸示例。


    ![Image](img/9781430240051_Fig01-10.jpg)


    **图 1-10.** *识别出的一个僵尸*


    ### 使用 Xcode 4 进行版本控制


    版本控制对于新开发者来说可能是一个令人生畏的概念，但它是值得学习的东西。一旦你开始使用版本控制，你会想不通没有它以前是怎么过来的。它对于开发团队的好处显而易见。团队成员可以各自处理应用的不同部分，而不会相互干扰代码。


    个人开发者也能从版本控制中受益。通过多个分支，你可以在不干扰先前发布版本的情况下，为应用添加新功能。如果你在发布版本中发现了一个 bug，你可以切换分支并修复该
    bug，而不会影响应用的未来版本。然后你可以合并两个版本，得到一个同时包含 bug 修复和新功能的新版本。自始至终，你都可以回溯到任何时间点，查看对代码所做的更改。


    Xcode 4 将版本控制引入了 Xcode 环境。最初，它只支持本地 Git 仓库，但 Xcode 4.2 已将远程仓库引入了该环境。如果你是开发团队的一员，或者在多台机器上工作，这无疑是个好消息。远程仓库也为你的代码提供了一个安全的存储位置，以防电脑故障或丢失。

    '
- fmt: '### Creating a Local Repository


    Whenever you start a new project in Xcode 4, you are given the option to create
    a local Git repository, as shown in [Figure 1–11](#Chapter01.html#fig_1_11). If
    you select this box, Xcode will create the local repository and automatically
    add the project files it thinks are necessary.


    ![Image](images/9781430240051_Fig01-11.jpg)


    **Figure 1–11.** *Creating a Git repository*


    As you make changes to your project and its files, their source control status
    will be displayed in the navigator window. “A” is for when a file has been added
    to your project, and “M” is for when it has been modified since the last check-in.
    [Figure 1–12](#Chapter01.html#fig_1_12) shows a navigation pane with multiple
    files with these statuses.


    ![Image](images/9781430240051_Fig01-12.jpg)


    **Figure 1–12.** *Modified and added project files*


    You can filter the navigator contents so that you see only the files that are
    pending changes to the source control repository by clicking the middle icon in
    the bottom of the navigator pane, as shown in [Figure 1–13](#Chapter01.html#fig_1_13).


    ![Image](images/9781430240051_Fig01-13.jpg)


    **Figure 1–13.** *Filtered modified files*


    To commit your changes back into your local repository, go to File![Image](images/U001.jpg)Source
    Control ![Image](images/U001.jpg)Commit or ![Image](images/U004.jpg)![Image](images/U003.jpg)C.
    The Commit window will be presented. By clicking a modified file, you will see
    your edited version in the left pane and the current version in the repository
    in the right pane. All of your changes will be highlighted so that you can easily
    see the differences between the two files. [Figure 1–14](#Chapter01.html#fig_1_14)
    displays such a window with highlighted changes.


    ![Image](images/9781430240051_Fig01-14.jpg)


    **Figure 1–14.** *Viewing file changes for committal*


    Worth mentioning is the fact that the left pane is a live editor, so if you see
    something that should not be committed, such as an `NSLog` statement, this is
    your chance to comment it out or make the necessary changes.


    Xcode does a good job of suggesting which files should be committed. You do not
    want to version control your workspace file (`*.xcworkspace`) or your userdata
    directory (`xcuserdata`). Generally Xcode will not check those files, and you
    will note the “?” mark icon next to the files. This means they are not currently
    under version control, nor should they be. [Figure 1–15](#Chapter01.html#fig_1_15)
    shows these non-version-controlled files/directories.


    ![Image](images/9781430240051_Fig01-15.jpg)


    **Figure 1–15.** *Disabled version control for certain directories*


    At the bottom of the commit window, as shown in [Figure 1–16](#Chapter01.html#fig_1_16),
    is where you need to enter a message about the changes you have made before committing.
    Your commit message should be a descriptive summary of the changes you have made
    to your code, such as “added such and such feature.”


    ![Image](images/9781430240051_Fig01-16.jpg)


    **Figure 1–16.** *Commit message*


    ### Branching and Merging


    Branches are copies of your project that you can work on without disturbing the
    main branch, also known as the master branch. They allow you to add features and
    fixes without affecting the main build.


    To manage your repository, you can go to `Window` `Organizer` or ![Image](images/U005.jpg)![Image](images/U003.jpg)2
    and click the Repositories tab. In this view, you will see a list of repositories
    that Xcode knows about. As shown in [Figure 1–17](#Chapter01.html#fig_1_17), you
    can click the `Branches` folder under a repository to see a list of branches available
    to Xcode for this repository.


    ![Image](images/9781430240051_Fig01-17.jpg)


    **Figure 1–17.** *Repositories tab in Organizer*


    When you select a branch, you will see a list of the latest commits to that branch.
    The information includes who made the commit and their commit message.


    Create a new branch to start adding a main menu to your app. Click the Add Branch
    button at the bottom of the Organizer window. In the window shown in [Figure 1–18](#Chapter01.html#fig_1_18),
    type a branch name and click the check box next to “Automatically switch to this
    branch”. This will duplicate the code in the master branch into a new branch called
    “MainMenu,” and then it will switch you to that branch.


    ![Image](images/9781430240051_Fig01-18.jpg)


    **Figure 1–18.** *Creating a branch*


    Now that you are working in the MainMenu branch, you can add a new view controller
    for the main menu without affecting the rest of the app source code. After adding
    the view controller and coding it up, you can commit this back to the source code
    repository. Again, this will affect only the MainMenu branch and not make any
    changes to the master branch.


    To merge the two branches, you want to switch to the branch that you want to merge
    the changes into. You are done coding up the MainMenu, and you want to put it
    into the master branch, so you are going to switch to the master branch. This
    is done from the Organizer window, so press ![Image](images/U002.jpg)![Image](images/U003.jpg)2.


    Click the project folder, and then click the Switch Branch button on the bottom
    right. Select the branch you want to switch to—master in this case—and click OK.
    This will switch your active branch back to the master branch, and now you can
    merge the two branches together. [Figure 1–19](#Chapter01.html#fig_1_19) highlights
    these steps.


    ![Image](images/9781430240051_Fig01-19.jpg)


    **Figure 1–19.** *Switch branch*


    Go back to the Xcode window and click `File`![Image](images/U001.jpg) `Source
    Control` ![Image](images/U001.jpg) `Merge.` You will be prompted to select which
    branch you want to merge into the current branch (master), as shown in [Figure
    1–20](#Chapter01.html#fig_1_20). When you click Choose, you will see the commit
    changes window.


    ![Image](images/9781430240051_Fig01-20.jpg)


    **Figure 1–20.** *Merging a branch with the current branch*


    This commit changes window is very similar to the one you saw before with one
    minor change: at the bottom of the code review panes, you will see four icons.
    If each branch contains a file that has been modified in both branches, these
    icons will allow you to decide which one takes precedence. The icons are, in order
    from left to right, “Merge the left file first and then the right,” “Keep the
    left file changes only,” “Keep the right file changes only,” and “Merge the right
    file first and then the left.” These icons are shown in [Figure 1–21](#Chapter01.html#fig_1_21).
    This is very useful for resolving conflicts if two people have made changes to
    the same file or if a file has been modified in both branches.


    ![Image](images/9781430240051_Fig01-21.jpg)


    **Figure 1–21.** *Specify the change precedence for merging*


    Clicking the Merge button will combine the MainMenu branch into the master branch.
    If you look at the master branches commit history in the Organizer view (![Image](images/U002.jpg)![Image](images/U003.jpg)2),
    you will see that the commits from the MainMenu branch have been combined with
    the master branch commits.'
  raw: '##### Creating a Local Repository


    Whenever you start a new project in Xcode 4, you are given the option to create
    a local Git repository, as shown in [Figure 1–11](#Chapter01.html#fig_1_11). If
    you select this box, Xcode will create the local repository and automatically
    add the project files it thinks are necessary.


    ![Image](images/9781430240051_Fig01-11.jpg)


    **Figure 1–11.** *Creating a Git repository*


    As you make changes to your project and its files, their source control status
    will be displayed in the navigator window. “A” is for when a file has been added
    to your project, and “M” is for when it has been modified since the last check-in.
    [Figure 1–12](#Chapter01.html#fig_1_12) shows a navigation pane with multiple
    files with these statuses.


    ![Image](images/9781430240051_Fig01-12.jpg)


    **Figure 1–12.** *Modified and added project files*


    You can filter the navigator contents so that you see only the files that are
    pending changes to the source control repository by clicking the middle icon in
    the bottom of the navigator pane, as shown in [Figure 1–13](#Chapter01.html#fig_1_13).


    ![Image](images/9781430240051_Fig01-13.jpg)


    **Figure 1–13.** *Filtered modified files*


    To commit your changes back into your local repository, go to File![Image](images/U001.jpg)Source
    Control ![Image](images/U001.jpg)Commit or ![Image](images/U004.jpg)![Image](images/U003.jpg)C.
    The Commit window will be presented. By clicking a modified file, you will see
    your edited version in the left pane and the current version in the repository
    in the right pane. All of your changes will be highlighted so that you can easily
    see the differences between the two files. [Figure 1–14](#Chapter01.html#fig_1_14)
    displays such a window with highlighted changes.


    ![Image](images/9781430240051_Fig01-14.jpg)


    **Figure 1–14.** *Viewing file changes for committal*


    Worth mentioning is the fact that the left pane is a live editor, so if you see
    something that should not be committed, such as an `NSLog` statement, this is
    your chance to comment it out or make the necessary changes.


    Xcode does a good job of suggesting which files should be committed. You do not
    want to version control your workspace file (`*.xcworkspace`) or your userdata
    directory (`xcuserdata`). Generally Xcode will not check those files, and you
    will note the “?” mark icon next to the files. This means they are not currently
    under version control, nor should they be. [Figure 1–15](#Chapter01.html#fig_1_15)
    shows these non-version-controlled files/directories.


    ![Image](images/9781430240051_Fig01-15.jpg)


    **Figure 1–15.** *Disabled version control for certain directories*


    At the bottom of the commit window, as shown in [Figure 1–16](#Chapter01.html#fig_1_16),
    is where you need to enter a message about the changes you have made before committing.
    Your commit message should be a descriptive summary of the changes you have made
    to your code, such as “added such and such feature.”


    ![Image](images/9781430240051_Fig01-16.jpg)


    **Figure 1–16.** *Commit message*


    ##### Branching and Merging


    Branches are copies of your project that you can work on without disturbing the
    main branch, also known as the master branch. They allow you to add features and
    fixes without affecting the main build.


    To manage your repository, you can go to `Window` `Organizer` or ![Image](images/U005.jpg)![Image](images/U003.jpg)2
    and click the Repositories tab. In this view, you will see a list of repositories
    that Xcode knows about. As shown in [Figure 1–17](#Chapter01.html#fig_1_17), you
    can click the `Branches` folder under a repository to see a list of branches available
    to Xcode for this repository.


    ![Image](images/9781430240051_Fig01-17.jpg)


    **Figure 1–17.** *Repositories tab in Organizer*


    When you select a branch, you will see a list of the latest commits to that branch.
    The information includes who made the commit and their commit message.


    Create a new branch to start adding a main menu to your app. Click the Add Branch
    button at the bottom of the Organizer window. In the window shown in [Figure 1–18](#Chapter01.html#fig_1_18),
    type a branch name and click the check box next to “Automatically switch to this
    branch”. This will duplicate the code in the master branch into a new branch called
    “MainMenu,” and then it will switch you to that branch.


    ![Image](images/9781430240051_Fig01-18.jpg)


    **Figure 1–18.** *Creating a branch*


    Now that you are working in the MainMenu branch, you can add a new view controller
    for the main menu without affecting the rest of the app source code. After adding
    the view controller and coding it up, you can commit this back to the source code
    repository. Again, this will affect only the MainMenu branch and not make any
    changes to the master branch.


    To merge the two branches, you want to switch to the branch that you want to merge
    the changes into. You are done coding up the MainMenu, and you want to put it
    into the master branch, so you are going to switch to the master branch. This
    is done from the Organizer window, so press ![Image](images/U002.jpg)![Image](images/U003.jpg)2.


    Click the project folder, and then click the Switch Branch button on the bottom
    right. Select the branch you want to switch to—master in this case—and click OK.
    This will switch your active branch back to the master branch, and now you can
    merge the two branches together. [Figure 1–19](#Chapter01.html#fig_1_19) highlights
    these steps.


    ![Image](images/9781430240051_Fig01-19.jpg)


    **Figure 1–19.** *Switch branch*


    Go back to the Xcode window and click `File`![Image](images/U001.jpg) `Source
    Control` ![Image](images/U001.jpg) `Merge.` You will be prompted to select which
    branch you want to merge into the current branch (master), as shown in [Figure
    1–20](#Chapter01.html#fig_1_20). When you click Choose, you will see the commit
    changes window.


    ![Image](images/9781430240051_Fig01-20.jpg)


    **Figure 1–20.** *Merging a branch with the current branch*


    This commit changes window is very similar to the one you saw before with one
    minor change: at the bottom of the code review panes, you will see four icons.
    If each branch contains a file that has been modified in both branches, these
    icons will allow you to decide which one takes precedence. The icons are, in order
    from left to right, “Merge the left file first and then the right,” “Keep the
    left file changes only,” “Keep the right file changes only,” and “Merge the right
    file first and then the left.” These icons are shown in [Figure 1–21](#Chapter01.html#fig_1_21).
    This is very useful for resolving conflicts if two people have made changes to
    the same file or if a file has been modified in both branches.


    ![Image](images/9781430240051_Fig01-21.jpg)


    **Figure 1–21.** *Specify the change precedence for merging*


    Clicking the Merge button will combine the MainMenu branch into the master branch.
    If you look at the master branches commit history in the Organizer view (![Image](images/U002.jpg)![Image](images/U003.jpg)2),
    you will see that the commits from the MainMenu branch have been combined with
    the master branch commits.'
  trans: '好的，作为一名高级文档工程师和翻译员，我将根据您提供的注意事项和示例，将给定的英文文本翻译成中文。



    ### 创建本地仓库


    每当您在 Xcode 4 中开始一个新项目时，您都可以选择创建一个本地 Git 仓库，如图 1-11 所示。如果您选中此框，Xcode 将创建本地仓库并自动添加其认为必要的项目文件。


    ![Image](img/9781430240051_Fig01-11.jpg)


    **图 1-11.** *创建一个 Git 仓库*


    当您更改项目及其文件时，其源代码控制状态将显示在导航器窗口中。“A” 表示文件已添加到项目中，“M” 表示自上次签入以来已修改。图 1-12 显示了一个导航窗格，其中包含多个具有这些状态的文件。


    ![Image](img/9781430240051_Fig01-12.jpg)


    **图 1-12.** *已修改和已添加的项目文件*


    您可以通过单击导航器窗格底部中间的图标来过滤导航器内容，以便仅查看源代码控制仓库中待更改的文件，如图 1-13 所示。


    ![Image](img/9781430240051_Fig01-13.jpg)


    **图 1-13.** *已过滤的已修改文件*


    要将您的更改提交回本地仓库，请转到 `File`![Image](img/U001.jpg)`Source Control` ![Image](img/U001.jpg)`Commit`
    或按 ![Image](img/U004.jpg)![Image](img/U003.jpg)`C`。将出现“提交”窗口。通过单击已修改的文件，您将在左侧窗格中看到您编辑后的版本，在右侧窗格中看到仓库中的当前版本。您的所有更改都将被高亮显示，以便您可以轻松地看到两个文件之间的差异。图
    1-14 显示了这样一个窗口，其中包含高亮显示的更改。


    ![Image](img/9781430240051_Fig01-14.jpg)


    **图 1-14.** *查看待提交的文件更改*


    值得一提的是，左侧窗格是一个实时编辑器，因此如果您发现某些不应该提交的内容，例如一条 `NSLog` 语句，这是您将其注释掉或进行必要更改的机会。


    Xcode 在建议应提交哪些文件方面做得很好。您不希望将工作区文件（`*.xcworkspace`）或用户数据目录（`xcuserdata`）纳入版本控制。通常
    Xcode 不会检入这些文件，您会注意到文件旁边有“?”标记图标。这意味着它们当前不受版本控制，也不应受版本控制。图 1-15 显示了这些不受版本控制的文件/目录。


    ![Image](img/9781430240051_Fig01-15.jpg)


    **图 1-15.** *为某些目录禁用了版本控制*


    在提交窗口的底部，如图 1-16 所示，您需要在此输入关于所做更改的消息，然后再提交。您的提交消息应该是对代码所做更改的描述性摘要，例如“添加了某某功能”。


    ![Image](img/9781430240051_Fig01-16.jpg)


    **图 1-16.** *提交消息*


    ### 分支与合并


    分支是您项目的副本，您可以在其上工作而不会干扰主分支（也称为 master 分支）。它们允许您在不影响主版本的情况下添加功能和修复。


    要管理您的仓库，您可以转到 `Window` `Organizer` 或按 ![Image](img/U005.jpg)![Image](img/U003.jpg)2，然后单击“仓库”标签页。在此视图中，您将看到
    Xcode 已知的仓库列表。如图 1-17 所示，您可以单击仓库下的 `Branches` 文件夹，以查看此仓库可供 Xcode 使用的分支列表。


    ![Image](img/9781430240051_Fig01-17.jpg)


    **图 1-17.** *Organizer 中的“仓库”标签页*


    当您选择一个分支时，您将看到该分支的最新提交列表。信息包括谁进行了提交以及他们的提交消息。


    创建一个新分支以开始向您的应用添加主菜单。单击 Organizer 窗口底部的“添加分支”按钮。在图 1-18 所示的窗口中，键入一个分支名称，并选中“自动切换到该分支”旁边的复选框。这会将
    master 分支中的代码复制到一个名为“MainMenu”的新分支中，然后将您切换到该分支。


    ![Image](img/9781430240051_Fig01-18.jpg)


    **图 1-18.** *创建分支*


    现在，您正在 MainMenu 分支中工作，您可以为主菜单添加一个新的视图控制器，而不会影响应用的其余源代码。添加视图控制器并为其编码后，您可以将其提交回源代码仓库。同样，这只会影响
    MainMenu 分支，而不会对 master 分支进行任何更改。


    要合并这两个分支，您需要切换到要将更改合并到的目标分支。您已完成 MainMenu 的编码，并希望将其放入 master 分支，因此您将切换到 master
    分支。这可以从 Organizer 窗口完成，请按 ![Image](img/U002.jpg)![Image](img/U003.jpg)2。


    单击项目文件夹，然后单击右下角的“切换分支”按钮。选择要切换到的分支（在本例中为 master），然后单击“确定”。这会将您的活动分支切换回 master
    分支，现在您可以将这两个分支合并在一起。图 1-19 突出了这些步骤。


    ![Image](img/9781430240051_Fig01-19.jpg)


    **图 1-19.** *切换分支*


    返回到 Xcode 窗口，单击 `File`![Image](img/U001.jpg) `Source Control` ![Image](img/U001.jpg)
    `Merge`。系统将提示您选择要合并到当前分支（master）中的分支，如图 1-20 所示。单击“选择”后，您将看到提交更改窗口。


    ![Image](img/9781430240051_Fig01-20.jpg)


    **图 1-20.** *将一个分支与当前分支合并*


    这个提交更改窗口与您之前看到的非常相似，但有一个小的变化：在代码审阅窗格的底部，您会看到四个图标。如果每个分支都包含一个在两个分支中都被修改过的文件，这些图标将允许您决定哪个优先。这些图标从左到右依次是：“先合并左侧文件，再合并右侧文件”、“仅保留左侧文件更改”、“仅保留右侧文件更改”和“先合并右侧文件，再合并左侧文件”。这些图标显示在图
    1-21 中。这对于解决两人对同一文件进行了更改或文件在两个分支中都被修改时的冲突非常有用。


    ![Image](img/9781430240051_Fig01-21.jpg)


    **图 1-21.** *指定合并时的更改优先级*


    单击“合并”按钮将把 MainMenu 分支合并到 master 分支中。如果您在 Organizer 视图（![Image](img/U002.jpg)![Image](img/U003.jpg)2）中查看
    master 分支的提交历史，您将看到来自 MainMenu 分支的提交已与 master 分支的提交合并在一起。

