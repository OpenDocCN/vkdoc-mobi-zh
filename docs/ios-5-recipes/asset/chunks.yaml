- fmt: "### Recipe 14–1: Composing Simple Tweets\n\nThe core foundation of the Twitter\
    \ service is the idea of sending “tweets”. These are composed of quick bits of\
    \ information, limited to 140 characters, and sometimes accompanied by an image\
    \ or outside link. In the Twitter framework, you are able to access a pre-configured\
    \ class that can easily send out these messages.\n\nWhen making use of the Twitter\
    \ framework, any functionality you build that revolves around accessing a specific\
    \ Twitter account for sending or retrieving information will not actually work\
    \ on your iOS simulator, as you cannot connect it to a Twitter account. Therefore,\
    \ you will opt to test all of your Twitter-based recipes on a physical device.\n\
    \nIn order to test those functionalities that require an account on your device,\
    \ you need to make sure that your device is configured with at least one Twitter\
    \ account. You can create an account through the Twitter website, or through the\
    \ Twitter iOS app. Once you have an account, you must provide your device with\
    \ your login information. This configuration can be accessed from your Settings\
    \ app on your device, and will resemble [Figure 14-1](#Chapter14.html#fig_14_1).\n\
    \n![Image](images/9781430240051_Fig14-01.jpg)\n\n**Figure 14-1.** *Configuring\
    \ your Twitter account on your device*\n\nBy having a Twitter account configured\
    \ with your device, you will be able to fully test all the functionality that\
    \ you will create.\n\nNext, you start by creating a new project called “Tweeter”\
    \ in Xcode. Select the SingleView Application template, and then click through\
    \ to create your project. If you are running the newest version of Xcode, make\
    \ sure also that the box marked “Automatic Reference Counting” is checked, as\
    \ in [Figure 14-2](#Chapter14.html#fig_14_2).\n\n![Image](images/9781430240051_Fig14-02.jpg)\n\
    \n**Figure 14-2.** *Configuring project settings*\n\nFor all the recipes in this\
    \ chapter, you need to include the Twitter framework into your project.\n\nAfter\
    \ selecting your project, navigate to the Build Phases tab, and in the section\
    \ marked “Link Binary With Libraries”, click the + button. Find the item called\
    \ `Twitter.framework`, and add it, as shown in [Figure 14-3](#Chapter14.html#fig_14_3).\n\
    \n![Image](images/9781430240051_Fig14-03.jpg)\n\n**Figure 14-3.** *Adding the\
    \ Twitter framework*\n\nYou will also later need the Accounts framework, so repeat\
    \ this process, adding the item called `Accounts.framework`.\n\nAdd import statements\
    \ to your view controller’s header file so that the compiler allows you to use\
    \ your added frameworks.\n\n```\n#import <Twitter/Twitter.h>\n#import <Accounts/Accounts.h>\n\
    ```\n\nNext you will set up your initial user interface. Add a `UIButton` to your\
    \ view, and connect it to your controller using the property name `simpleTweetButton`.\
    \ Connect it to an `IBAction` method called `-simpleTweetPressed:`, as shown in\
    \ [Figure 14-4](#Chapter14.html#fig_14_4).\n\n![Image](images/9781430240051_Fig14-04.jpg)\n\
    \n**Figure 14-4.** *Setting up a simple user interface*\n\nLet’s set up a convenience\
    \ method to check if your application can send a tweet at any given moment. If\
    \ not, you will disable and dim your `UIButton`.\n\n```\n-(BOOL)checkCanTweet\n\
    {\n    if ([TWTweetComposeViewController canSendTweet])\n    {\n        self.simpleTweetButton.enabled\
    \ = YES;\n        self.simpleTweetButton.alpha = 1.0;\n        return YES;\n \
    \   }\n    else\n    {\n        self.simpleTweetButton.enabled = NO;\n       \
    \ self.simpleTweetButton.alpha = 0.6;\n        return NO;\n    }\n}\n```\n\nThis\
    \ method makes use of the `+canSendTweet` class method of `TWTweetComposeViewController`.\
    \ You will be using this class to allow creation of simple tweets shortly.\n\n\
    In order to make sure your view controller correctly rechecks your functionality,\
    \ you will place a call to this function in both `-viewDidLoad` and `-viewWillAppear:animated:`.\n\
    \n```\n[self checkCanTweet];\n```\n\nIt is also possible that the device your\
    \ application is on could have a Twitter account configured at any moment, so\
    \ you can also register for notifications to be sent upon the changing of account\
    \ information. Add the following line to your `-viewDidLoad` method.\n\n```\n\
    [[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(checkCanTweet)\n\
    \        name:ACAccountStoreDidChangeNotification object:nil];\n```\n\nNow you\
    \ will implement your `-simpleTweetPressed:` method to configure and send a simple\
    \ tweet.\n\n```\n-(void)simpleTweetPressed:(id)sender\n{\n    if ([self checkCanTweet])\n\
    \    {\n        TWTweetComposeViewController *tweet = [[TWTweetComposeViewController\
    \ alloc] init];\n        [tweet setInitialText:@\"Posting a simple Tweet from\
    \ my app!\"];\n        [tweet setCompletionHandler:^(TWTweetComposeViewControllerResult\
    \ result)\n        {\n            if (result == TWTweetComposeViewControllerResultDone)\n\
    \            {\n                NSLog(@\"Tweet Successfully Sent\");\n       \
    \     }\n            else\n            {\n                NSLog(@\"Tweet Cancelled\"\
    );\n            }\n            [self dismissModalViewControllerAnimated:YES];\n\
    \        }];\n        [self presentModalViewController:tweet animated:YES];\n\
    \    }\n}\n```\n\nAs shown here, you can create an initial text for your tweet,\
    \ as well as set a completion handler to be called after your `TWTweetComposeViewController`\
    \ is either cancelled or completed.\n\nYou are able to add, in addition to your\
    \ initial text, images and links to be attached to your tweets by using the `-addImage:`\
    \ and `addURL:` methods. [Figure 14-5](#Chapter14.html#fig_14_5) demonstrates\
    \ your current configuration, along with an added link.\n\n![Image](images/9781430240051_Fig14-05.jpg)\n\
    \n**Figure 14-5.** *Your view presenting a `TWTweetComposeViewController`*\n\n\
    The three methods that are used to add content to your tweet, `-setInitialText:`,\
    \ `-addImage:`, and `-addURL:`, all return BOOL values indicating whether the\
    \ content was successfully added. These values will be `NO` if either the content\
    \ does not fit in the tweet, or if the controller has already been presented.\n\
    \nIn order to ensure that the users always have the last say in what is sent in\
    \ a tweet from this controller, the developer is not allowed to set or add any\
    \ content once it has been presented.\n\nIf at any point you wish to remove content\
    \ from a controller before it is presented, you can make use of the `-removeAllImages`\
    \ and `-removeAllURLs` methods.\n\n### Recipe 14–2: Creating Simple TWRequests\n\
    \nAside from the `TWTweetComposeViewController`, the only other class in the Twitter\
    \ framework is the `TWRequest` class. This class is incredibly general, and makes\
    \ use of Twitter’s specific API in order to send and request information. Through\
    \ its use, you can mimic the basic function of the `TWTweetComposeViewController`,\
    \ as well as perform nearly any command you want to incorporate in your application\
    \ with the Twitter service.\n\nIt is important to remember that the Twitter API\
    \ changes differently from the iOS API, so any Twitter-specific code in this section\
    \ may have to be updated to the newest version."
