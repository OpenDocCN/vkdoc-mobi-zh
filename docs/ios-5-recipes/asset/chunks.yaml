  raw: '### Recipe 13–6: Formatted Printing with Page Renderers


    A page renderer is essentially what allows you to fully customize the content
    of any print job. It allows you to not only format multiple pages with different
    print formatters, but also draw custom content in the header, body, and footer
    of any page.


    In order to use a page renderer, you must create a custom subclass of the `UIPrintPageRenderer`
    class, from which you can override methods to customize the content of your printing
    job.


    Create a new file, using the Objective-C class template. When you enter your file
    name of “SendItOutPageRenderer”, make sure that the file will be a subclass of
    `UIPrintPageRenderer`, as in [Figure 13–14](#Chapter13.html#fig_13_14).


    ![Image](images/9781430240051_Fig13-14.jpg)


    **Figure 13–14.** *Creating a `UIPrintPageRenderer` subclass*


    Click through to create your new file.


    Next, define two `NSString` properties,`title` and `author`, to be printed in
    the header of your renderer.


    `#import <UIKit/UIKit.h>`


    `@interface SendItOutPageRenderer : UIPrintPageRenderer`


    `@property (nonatomic, strong) NSString *title;`

    `@property (nonatomic, strong) NSString *author;`


    `@end`


    In order to customize the layout of your specific page renderer, you can override
    methods inherited from the `UIPrintPageRenderer` class. The way that this class
    is set up is that the `-drawPageAtIndex:inRect:` method then calls four other
    methods:


    *   `-drawHeaderForPageAtIndex:inRect:`: Used to specify header content; if the
    `headerHeight` property of the renderer is zero, this method will not be called.

    *   `-drawContentForPageAtIndex:inRect:`: Draws custom content within the page''s
    content rectangle

    *   `-drawFooterForPageAtIndex:inRect:`: Specifies footer content; this method
    will also not be called if the renderer''s `footerHeight` property is zero.

    *   `-drawPrintFormatter:forPageAtIndex:`:Uses a combination of print formatters
    and custom content to overlay or fill in a view


    You are able to override any of thesefive methods (including `-drawPageAtIndex:inRect:`)
    in order to customize your printing content. In your case, you will override the
    header, footer, and print-formatter methods.


    You will have your header print out the document''s author on the left, and the
    title on the right. Your method will then look like so:


    `- (void)drawHeaderForPageAtIndex:(NSInteger)pageIndex  inRect:(CGRect)headerRect`

    `{`

    `if (pageIndex != 0)`

    `    {`

    `UIFont *font = [UIFont fontWithName:@"Helvetica"size:12.0];`

    `CGSize titleSize = [self.title sizeWithFont:font];`


    `CGFloat drawXTitle = CGRectGetMaxX(headerRect) - titleSize.width;`

    `CGFloat drawXAuthor = CGRectGetMinX(headerRect);`

    `CGFloat drawY = CGRectGetMinY(headerRect);`

    `CGPoint drawPointAuthor = CGPointMake(drawXAuthor, drawY);`

    `CGPoint drawPointTitle = CGPointMake(drawXTitle, drawY);`


    `        [self.title drawAtPoint:drawPointTitle withFont:font];`

    `        [self.author drawAtPoint:drawPointAuthor withFont:font];`

    `    }`

    `}`


    Your footer-implementation method will look similar, and will print out a centered
    page number. Since the page indexes start with 0, you must remember to increment
    all your values by 1.


    `- (void)drawFooterForPageAtIndex:(NSInteger)pageIndex inRect:(CGRect)footerRect`

    `{`

    `UIFont *font = [UIFont fontWithName:@"Helvetica"size:12.0];`

    `NSString *pageNumber = [NSString stringWithFormat:@"%d.", pageIndex+1];`


    `CGSize pageNumSize = [pageNumber sizeWithFont:font];`

    `CGFloat drawX = CGRectGetMaxX(footerRect)/2.0 - pageNumSize.width - 1.0;`

    `CGFloat drawY = CGRectGetMaxY(footerRect) - pageNumSize.height;`

    `CGPoint drawPoint = CGPointMake(drawX, drawY);`

    `    [pageNumber drawAtPoint:drawPoint withFont:font];`

    `}`


    Finally, to deal with interlaced print formatters, you will implement the `-drawPrintFormatter:forPageAtIndex:`
    method to overlay a simple text over your view. This could easily be used to place
    some kind of “Proprietary Content” label over images or documents in a more targeted
    application.'
