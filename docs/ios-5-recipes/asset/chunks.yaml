- fmt: "## 远程仓库\n\n到目前为止，你一直在使用本地仓库。在 Xcode 4.2 中，增加了对远程仓库的支持。这使你能够将代码存储到线上，从而可以从任何计算机访问，并允许多个用户访问你的代码。远程仓库的另一个好处是，可以将源代码异地存储，以防设备突然故障或更糟的情况。\n\
    \n要添加远程仓库，请前往 `Organizer` 视图（![Image](images/U002.jpg)![Image](images/U003.jpg)2）中的\
    \ `Repositories` 标签页，选择你想要添加远程选项的仓库。点击项目仓库下的 `Remotes` 文件夹，然后点击底部的 `Add Remote`。这将弹出一个类似于\
    \ [图 1-22](#Chapter01.html#fig_1_22) 的视图。为你的远程仓库输入一个名称和位置，然后点击 `Create`。\n\n![Image](images/9781430240051_Fig01-22.jpg)\n\
    \n**图 1-22.** *添加远程仓库*\n\n现在你已经有了一个远程仓库，你可以从远程仓库推送(`push`)和拉取(`pull`)代码，以保持代码更新。这与提交(`commit`)不同。提交或合并只会影响你的本地副本。你需要将代码推送到远程仓库来更新它。\n\
    \n## GitHub\n\n一个非常流行的 Git 项目在线仓库是 GitHub，地址为 [`www.github.com`](http://www.github.com)。GitHub\
    \ 提供将代码远程存储在公共或私有仓库中的能力。这允许小型开发团队协同处理一个项目，或单个开发者远程存储其代码仓库。在此之前，你必须使用第三方软件或 Git\
    \ 命令行版本来将更改推送到远程仓库。Xcode 包含了远程仓库功能后，可以轻松地与 GitHub 协作并远程存储你的源代码。\n\n在将项目添加到 Xcode\
    \ 之前，你应该先在 GitHub 上创建一个仓库。你需要一个 GitHub 账户来完成此操作；请按照非常详细的说明设置你的账户。在 GitHub 上创建仓库后，复制\
    \ `Source` 标签页上的整个 HTTP 访问路径，如 [图 1-23](#Chapter01.html#fig_1_23) 所示。这将是你的远程仓库位置。\n\
    \n![Image](images/9781430240051_Fig01-23.jpg)\n\n**图 1-23.** *查找仓库的 HTTP 访问路径*\n\
    \n在 Xcode 中设置 GitHub 与设置任何远程仓库非常相似。前往 `Organizer` 视图（![Image](images/U002.jpg)![Image](images/U003.jpg)2）中的\
    \ `Repositories` 标签页，选择你想要添加到 GitHub 仓库的仓库下方的 `Remotes` 文件夹。现在点击窗口底部的 `Add Remote`，将\
    \ HTTP 位置粘贴到位置字段中（如 [图 1-24](#Chapter01.html#fig_1_24) 所示），添加一个名称，然后点击 `Create`。\n\
    \n![Image](images/9781430240051_Fig01-24.jpg)\n\n**图 1-24.** *配置 Git 仓库*\n\n点击\
    \ `Create` 后，你将在 `Organizer` 窗口底部看到一个输入 GitHub 凭据的位置。你的用户名应该已经填好，因此你只需输入密码。现在返回你的主\
    \ Xcode 窗口，使用 `File` ![Image](images/U001.jpg) `Source Control` ![Image](images/U001.jpg)\
    \ `Push`。在一个反映 [图 1-25](#Chapter01.html#fig_1_25) 的窗口中，系统将提示你选择要推送代码的远程仓库。选择 GitHub\
    \ 仓库，然后点击 `Push`。Xcode 现在会将你的代码发送到你的 GitHub 项目仓库。使用 GitHub 的 Web 界面，验证你的更改和变更日志是否已正确上传。现在其他开发者可以使用他们自己的\
    \ GitHub 账户和 `File` ![Image](images/U001.jpg) `Source Control` ![Image](images/U001.jpg)\
    \ `Pull...` 菜单选项来签出此代码。\n\n![Image](images/9781430240051_Fig01-25.jpg)\n\n**图\
    \ 1-25.** *指定 GitHub 仓库*\n\n## 源代码管理最佳实践\n\n以下是一些使用源代码管理仓库的技巧：\n\n1.  尽量不要直接在\
    \ `master` 分支上工作。相反，在单独的分支上工作，准备就绪后再合并回 `master` 分支。\n2.  使用远程分支时，在开始编码之前，始终对你的工作分支执行\
    \ `pull` 操作。这将确保你在最新的代码修订版上工作。\n3.  尽量不要将无法编译的代码推送到远程仓库。虽然你需要经常检入以确保可用性，但最好在推送到远程仓库之前，确保你的代码至少没有错误地构建成功。\n\
    4.  使用描述你所做更改的提交消息。这不仅有助于你管理代码，还可以轻松查看你添加了哪些功能，并在提交应用以供审核时列出它们。\n\n## Steve 和\
    \ ARC\n\nXcode 4.2 引入了自动引用计数（`ARC`），作为一种帮助开发者专注于编写优秀应用、减少内存管理时间的方式。对于任何刚接触 Objective-C\
    \ 的开发者，以及一些已经接触了一段时间的开发者来说，你很可能会在内存管理概念上遇到困难。`Retain` 这个，`release` 那个，`autorelease`\
    \ 什么？如果这三个方法让你感到困惑，那么别担心，Xcode 4.2 就是为你准备的！即使你熟悉内存管理，你也会看到将代码迁移到使用 `ARC` 的好处。\n\
    \n`ARC` 是一种编译时的内存管理方法。它不会为正在运行的应用增加性能开销，因为它是在构建之前编译到代码中的。这与垃圾回收（`Garbage Collection`）概念不同，后者是\
    \ Java 开发者熟悉的一种内存管理方法。使用 `ARC`，编译器（LLVM 版本 3.0）通过分析你的对象并确定对象何时不再被引用，来自动添加 `retain`\
    \ 和 `release` 调用。只要存在指向对象的指针，该对象就会存在。在它系统地添加了内存管理方法之后，它会编译用于运行和部署的二进制文件。\n\n如果没有\
    \ `ARC`，以下代码将产生内存泄漏，因为返回值没有被自动释放（`autorelease`）：\n\n```\n-(NSString *) cityStateZip\
    \ {\n    return [[NSString alloc] initWithFormat:@”%@, %@ %@”, self.city, self.state,\
    \ self.zip];\n}\n```\n\n在不对代码进行任何更改的情况下，`ARC` 将编译此方法，并在编译时添加 `autorelease` 以修复内存泄漏。\n\
    \n### ARC 规则\n\n以下是使用启用了 `ARC` 的项目时需要遵循的一些规则：\n\n1.  你不能在代码中调用 `retain`、`release`\
    \ 或 `autorelease`。你也不能覆盖或实现这些方法。\n2.  由于不再需要 `release` 语句，你不能再在你的类中实现 `dealloc`\
    \ 方法。\n3.  你不能再创建 `structs`。相反，你必须使用自定义的 Objective-C 子类。\n4.  你不能使用诸如以下的随意类型转换：\n\
    \n    ```\n    NSString *B = (NSString *)A;\n    ```\n\n    解决方案是使用 `__bridge`\
    \ 指令：\n\n    ```\n    NSString *B = (__bridge NSString *)b;\n    ```\n\n5.  你不能使用\
    \ `NSAutoreleasePool`；相反，你可以使用 `@autoreleasepool`。\n\n### 使用 ARC\n\nXcode 4.2\
    \ 中的每个新项目模板默认使用 `ARC` 和 LLVM v3.0 编译器。你不需要做任何特殊的事情。启用了 `ARC` 的项目也与 iOS 4 兼容。"
  raw: "##### Remote Repositories\n\nUp until this point, you have been working with\
    \ local repositories. In Xcode 4.2, support for remote repositories was added.\
    \ This allows you to store your code online where you can get to it from any computer\
    \ and allows multiple users to access your code. Another benefit of remote repositories\
    \ is storing your source code offsite in case of sudden device failure or worse.\n\
    \nTo add a remote repository, go to the Organizer view (![Image](images/U002.jpg)![Image](images/U003.jpg)2)\
    \ on the Repositories tab and select the repository you want to add a remote option\
    \ to. Click the `Remotes` folder under the project repository, and click Add Remote\
    \ at the bottom. This will bring up a view similar to [Figure 1–22](#Chapter01.html#fig_1_22).\
    \ Enter a name for your remote repository and the location, and then click Create.\n\
    \n![Image](images/9781430240051_Fig01-22.jpg)\n\n**Figure 1–22.** *Adding a remote\
    \ repository*\n\nNow that you have a remote repository, you can push and pull\
    \ your code from the remote repository to keep things up to date. This is not\
    \ the same as a commit. A commit or merge affects only your local copy. You need\
    \ to then push your code to the remote repository to update the remote repository.\n\
    \n##### GitHub\n\nA very popular online repository for Git projects is GitHub,\
    \ found at [`www.github.com`](http://www.github.com). GitHub offers the ability\
    \ to remotely store your code in either a public or private repository. This allows\
    \ small teams of developers to work on one project together or individual developers\
    \ to remotely store their code repository. Up until now, you had to use third-party\
    \ software or the command-line version of Git to push your changes to a remote\
    \ repository. With the inclusion of remote repositories in Xcode, it's easy to\
    \ work with GitHub and to store your source code remotely.\n\nBefore you add the\
    \ project to Xcode, you should create a repository on GitHub. You'll need an account\
    \ on GitHub to do this; follow the very detailed instructions to set up your account.\
    \ Once you've created a repository on GitHub, copy the entire HTTP access path\
    \ on the Source tab, as shown in [Figure 1–23](#Chapter01.html#fig_1_23). This\
    \ will be the remote location of your repository.\n\n![Image](images/9781430240051_Fig01-23.jpg)\n\
    \n**Figure 1–23.** *Finding the HTTP access path of a repository*\n\nSetting up\
    \ GitHub in Xcode is very similar to setting up any remote repository. Go to the\
    \ Organizer view (![Image](images/U002.jpg)![Image](images/U003.jpg)2) on the\
    \ Repositories tab, and select the `Remotes` folder beneath the repository you\
    \ want to add to your GitHub repository. Now click Add Remote at the bottom of\
    \ the window, paste the HTTP location into the location field (as is done in [Figure\
    \ 1–24](#Chapter01.html#fig_1_24)), add a name, and click Create.\n\n![Image](images/9781430240051_Fig01-24.jpg)\n\
    \n**Figure 1–24.** *Configuring a Git repository*\n\nAfter clicking Create, you\
    \ will see a place to enter your GitHub credentials at the bottom of the Organizer\
    \ window. Your username should already be filled in, so all you need to enter\
    \ is your password. Now go back to your main Xcode window, and use `File` ![Image](images/U001.jpg)\
    \ `Source Control` ![Image](images/U001.jpg) Push. In a window reflecting [Figure\
    \ 1–25](#Chapter01.html#fig_1_25), you will be prompted to select the remote repository\
    \ to push the code to. Select the GitHub repository, and click Push. Xcode will\
    \ now send your code to your GitHub project repository. Using the GitHub web interface,\
    \ verify that your changes and changelog have been uploaded properly. Now other\
    \ developers can check this code out using their own GitHub accounts and the `File`\
    \ ![Image](images/U001.jpg)`Source Control` ![Image](images/U001.jpg) `Pull...`\
    \ menu option.\n\n![Image](images/9781430240051_Fig01-25.jpg)\n\n**Figure 1–25.**\
    \ *Specifying a GitHub repository*\n\n##### Source Control Best Practices\n\n\
    These are some tips for working with source control repositories:\n\n1.  Try not\
    \ to work on the master branch directly. Instead, work on branches that you can\
    \ then merge back into the master branch when you are ready.\n2.  When working\
    \ with remote branches, always perform a pull on your working branch before starting\
    \ to code. This will ensure that you are working on the most recent code revision.\n\
    3.  Try not to push code to the remote repository that does not compile. While\
    \ you want to check in often to ensure availability, it is always best if your\
    \ code at least builds without errors before pushing it to a remote repository.\n\
    4.  Use commit messages that are descriptive about the changes you made. Not only\
    \ will this help you to manage your code, but also you can easily see what features\
    \ you have added and list them when you submit your app for review.\n\n#### Steve\
    \ and the ARC\n\nXcode 4.2 introduced Automatic Reference Counting (ARC) as a\
    \ way to help developers focus more on writing great apps and spend less time\
    \ on memory management. As any developer new to Objective-C, and some who have\
    \ been at it for a while, you will likely struggle with memory management concepts.\
    \ `Retain` this, `release` that, `autorelease` what? If those three methods baffle\
    \ you, then fear not, Xcode 4.2 is for you! Even if you are comfortable with memory\
    \ management, you will see benefits from migrating your code to using ARC.\n\n\
    ARC is a compile time memory management method. It does not add performance overhead\
    \ to your running apps because it is compiled into the code before you build it.\
    \ This is a different concept than garbage collection, a method of memory management\
    \ that Java developers are familiar with. With ARC, the compiler (LLVM version\
    \ 3.0) automatically adds retain and release calls by analyzing your objects and\
    \ determining when objects are no longer referenced. While a pointer to an object\
    \ exists, the object will exist. After it has synthetically added the memory management\
    \ methods, it compiles the binary for running and deployment.\n\nWithout ARC,\
    \ the following code would produce a memory leak because the return value is not\
    \ autoreleased:\n\n`-(NSString *) cityStateZip {`\n`    return [[NSString alloc]\
    \ initWithFormat:@”%@, %@ %@”, self.city, self.state, self.zip];`\n`}`\n\nWithout\
    \ any changes to the code, ARC will compile this method and add the autorelease\
    \ at compile time to remediate the memory leak.\n\n##### ARC Rules\n\nThe following\
    \ are some rules to follow while working with an ARC-enabled project:\n\n1.  You\
    \ cannot call `retain`, `release`, or `autorelease` in your code. You cannot override\
    \ or implement these methods either.\n2.  Because `release` statements are no\
    \ longer needed, you must no longer implement a `dealloc` method in your classes.\n\
    3.  You cannot create structs anymore. Instead, you must utilize custom Objective-C\
    \ subclasses.\n4.  You cannot use casual casting such as the following:\n\n  \
    \  `NSString *B = (NSString *)A;`\n\n    The solution is to use the `__bridge`\
    \ directive:\n\n    `NSString *B = (__bridge NSString *)b;`\n5.  You cannot use\
    \ `NSAutoreleasePool`; instead you can use `@autoreleasepool`.\n\n##### Using\
    \ ARC\n\nEvery new project template in Xcode 4.2 uses ARC and the LLVM v3.0 compiler\
    \ by default. There is nothing special that you need to do. ARC-enabled projects\
    \ are also compatible with iOS 4."
  trans: "\n## 远程仓库\n\n到目前为止，你一直在使用本地仓库。在 Xcode 4.2 中，增加了对远程仓库的支持。这使你能够将代码存储到线上，从而可以从任何计算机访问，并允许多个用户访问你的代码。远程仓库的另一个好处是，可以将源代码异地存储，以防设备突然故障或更糟的情况。\n\
    \n要添加远程仓库，请前往 `Organizer` 视图（![Image](img/U002.jpg)![Image](img/U003.jpg)2）中的\
    \ `Repositories` 标签页，选择你想要添加远程选项的仓库。点击项目仓库下的 `Remotes` 文件夹，然后点击底部的 `Add Remote`。这将弹出一个类似于\
    \ 图 1-22 的视图。为你的远程仓库输入一个名称和位置，然后点击 `Create`。\n\n![Image](img/9781430240051_Fig01-22.jpg)\n\
    \n**图 1-22.** *添加远程仓库*\n\n现在你已经有了一个远程仓库，你可以从远程仓库推送(`push`)和拉取(`pull`)代码，以保持代码更新。这与提交(`commit`)不同。提交或合并只会影响你的本地副本。你需要将代码推送到远程仓库来更新它。\n\
    \n## GitHub\n\n一个非常流行的 Git 项目在线仓库是 GitHub，地址为 [`www.github.com`](http://www.github.com)。GitHub\
    \ 提供将代码远程存储在公共或私有仓库中的能力。这允许小型开发团队协同处理一个项目，或单个开发者远程存储其代码仓库。在此之前，你必须使用第三方软件或 Git\
    \ 命令行版本来将更改推送到远程仓库。Xcode 包含了远程仓库功能后，可以轻松地与 GitHub 协作并远程存储你的源代码。\n\n在将项目添加到 Xcode\
    \ 之前，你应该先在 GitHub 上创建一个仓库。你需要一个 GitHub 账户来完成此操作；请按照非常详细的说明设置你的账户。在 GitHub 上创建仓库后，复制\
    \ `Source` 标签页上的整个 HTTP 访问路径，如 图 1-23 所示。这将是你的远程仓库位置。\n\n![Image](img/9781430240051_Fig01-23.jpg)\n\
    \n**图 1-23.** *查找仓库的 HTTP 访问路径*\n\n在 Xcode 中设置 GitHub 与设置任何远程仓库非常相似。前往 `Organizer`\
    \ 视图（![Image](img/U002.jpg)![Image](img/U003.jpg)2）中的 `Repositories` 标签页，选择你想要添加到\
    \ GitHub 仓库的仓库下方的 `Remotes` 文件夹。现在点击窗口底部的 `Add Remote`，将 HTTP 位置粘贴到位置字段中（如 图 1-24\
    \ 所示），添加一个名称，然后点击 `Create`。\n\n![Image](img/9781430240051_Fig01-24.jpg)\n\n**图\
    \ 1-24.** *配置 Git 仓库*\n\n点击 `Create` 后，你将在 `Organizer` 窗口底部看到一个输入 GitHub 凭据的位置。你的用户名应该已经填好，因此你只需输入密码。现在返回你的主\
    \ Xcode 窗口，使用 `File` ![Image](img/U001.jpg) `Source Control` ![Image](img/U001.jpg)\
    \ `Push`。在一个反映 图 1-25 的窗口中，系统将提示你选择要推送代码的远程仓库。选择 GitHub 仓库，然后点击 `Push`。Xcode 现在会将你的代码发送到你的\
    \ GitHub 项目仓库。使用 GitHub 的 Web 界面，验证你的更改和变更日志是否已正确上传。现在其他开发者可以使用他们自己的 GitHub 账户和\
    \ `File` ![Image](img/U001.jpg) `Source Control` ![Image](img/U001.jpg) `Pull...`\
    \ 菜单选项来签出此代码。\n\n![Image](img/9781430240051_Fig01-25.jpg)\n\n**图 1-25.** *指定 GitHub\
    \ 仓库*\n\n## 源代码管理最佳实践\n\n以下是一些使用源代码管理仓库的技巧：\n\n1.  尽量不要直接在 `master` 分支上工作。相反，在单独的分支上工作，准备就绪后再合并回\
    \ `master` 分支。\n2.  使用远程分支时，在开始编码之前，始终对你的工作分支执行 `pull` 操作。这将确保你在最新的代码修订版上工作。\n\
    3.  尽量不要将无法编译的代码推送到远程仓库。虽然你需要经常检入以确保可用性，但最好在推送到远程仓库之前，确保你的代码至少没有错误地构建成功。\n4. \
    \ 使用描述你所做更改的提交消息。这不仅有助于你管理代码，还可以轻松查看你添加了哪些功能，并在提交应用以供审核时列出它们。\n\n## Steve 和 ARC\n\
    \nXcode 4.2 引入了自动引用计数（`ARC`），作为一种帮助开发者专注于编写优秀应用、减少内存管理时间的方式。对于任何刚接触 Objective-C\
    \ 的开发者，以及一些已经接触了一段时间的开发者来说，你很可能会在内存管理概念上遇到困难。`Retain` 这个，`release` 那个，`autorelease`\
    \ 什么？如果这三个方法让你感到困惑，那么别担心，Xcode 4.2 就是为你准备的！即使你熟悉内存管理，你也会看到将代码迁移到使用 `ARC` 的好处。\n\
    \n`ARC` 是一种编译时的内存管理方法。它不会为正在运行的应用增加性能开销，因为它是在构建之前编译到代码中的。这与垃圾回收（`Garbage Collection`）概念不同，后者是\
    \ Java 开发者熟悉的一种内存管理方法。使用 `ARC`，编译器（LLVM 版本 3.0）通过分析你的对象并确定对象何时不再被引用，来自动添加 `retain`\
    \ 和 `release` 调用。只要存在指向对象的指针，该对象就会存在。在它系统地添加了内存管理方法之后，它会编译用于运行和部署的二进制文件。\n\n如果没有\
    \ `ARC`，以下代码将产生内存泄漏，因为返回值没有被自动释放（`autorelease`）：\n\n```\n-(NSString *) cityStateZip\
    \ {\n    return [[NSString alloc] initWithFormat:@”%@, %@ %@”, self.city, self.state,\
    \ self.zip];\n}\n```\n\n在不对代码进行任何更改的情况下，`ARC` 将编译此方法，并在编译时添加 `autorelease` 以修复内存泄漏。\n\
    \n### ARC 规则\n\n以下是使用启用了 `ARC` 的项目时需要遵循的一些规则：\n\n1.  你不能在代码中调用 `retain`、`release`\
    \ 或 `autorelease`。你也不能覆盖或实现这些方法。\n2.  由于不再需要 `release` 语句，你不能再在你的类中实现 `dealloc`\
    \ 方法。\n3.  你不能再创建 `structs`。相反，你必须使用自定义的 Objective-C 子类。\n4.  你不能使用诸如以下的随意类型转换：\n\
    \n    ```\n    NSString *B = (NSString *)A;\n    ```\n\n    解决方案是使用 `__bridge`\
    \ 指令：\n\n    ```\n    NSString *B = (__bridge NSString *)b;\n    ```\n\n5.  你不能使用\
    \ `NSAutoreleasePool`；相反，你可以使用 `@autoreleasepool`。\n\n### 使用 ARC\n\nXcode 4.2\
    \ 中的每个新项目模板默认使用 `ARC` 和 LLVM v3.0 编译器。你不需要做任何特殊的事情。启用了 `ARC` 的项目也与 iOS 4 兼容。\n"
- fmt: '### Converting Older Projects to ARC


    One day, we will look back and not even remember writing code with `retain`, `release`,
    and `autorelease` calls. Until that day, we''ll need to work on existing projects
    and migrate to the ARC method of memory management to keep them current and to
    also take advantage of the performance improvements. Apple highly encourages that
    all projects move to LLVM 3.0 and ARC. They have provided a way to convert your
    old projects to use ARC.


    Open your old project and make sure it builds correctly before you make any changes.


    **NOTE:** This might also be a good time to commit your changes to your Git repository
    and push your changes to a remote repository for safekeeping.


    Next go to `Edit` ![Image](images/U001.jpg) `Refactor` ![Image](images/U001.jpg)
    `Convert to Objective-C ARC.` ![Image](images/U001.jpg) Xcode will ask you which
    targets to convert. Select your targets and click Precheck. [Figure 1–26](#Chapter01.html#fig_1_26)
    shows a sample target selection.


    **NOTE:** Make sure you are set to build for device and not the simulator.


    ![Image](images/9781430240051_Fig01-26.jpg)


    **Figure 1–26.** *Selecting targets to convert to ARC*


    The precheck will begin and analyze your code to see what changes need to be made
    to your project before the conversion can begin. A notification will be displayed
    if there are issues, as shown in [Figure 1–27](#Chapter01.html#fig_1_27); you
    can see them in the navigator pane under build results, an example of which is
    shown in [Figure 1–28](#Chapter01.html#fig_1_28).


    ![Image](images/9781430240051_Fig01-27.jpg)


    **Figure 1–27.** *ARC conversion issues must be corrected.*


    ![Image](images/9781430240051_Fig01-28.jpg)


    **Figure 1–28.** *List of ARC conversion issues*


    You will need to correct any issues before proceeding with the conversion. Once
    the issues have been corrected, you will be prompted to start the conversion.
    [Figure 1–29](#Chapter01.html#fig_1_29) shows a window detailing the conversion
    process. The first step is to take a snapshot of your application''s source code
    so you can revert back. The next window will show you any changes that are going
    to be made to your code. It is the same window that you have seen when you commit
    changes to a source control repository. The most common changes include removing
    `dealloc` methods and `autorelease` and `retain` statements. Properties are also
    specified to be either `strong` or `weak`. `Strong` corresponds to the former
    `retain` statement, while `weak` results in immediate de-allocation of an object
    as soon as no other strong pointers refer to it.


    ![Image](images/9781430240051_Fig01-29.jpg)


    **Figure 1–29.** *Conversion to ARC*


    After you have reviewed the changes, you can click Accept, and Xcode will make
    the necessary changes. Build your project, and make sure it builds correctly after
    the changes have been made.


    You can verify that your project is using the LLVM 3.0 compiler by checking your
    target compiler settings, as shown in [Figure 1–30](#Chapter01.html#fig_1_30).


    ![Image](images/9781430240051_Fig01-30.jpg)


    **Figure 1–30.** *Verifying the LLVM 3.0 compiler*


    To verify that you are using ARC in your project, navigate to your target Build
    Settings and go to the `Apple LLVM compiler 3.0 – Language` section. You should
    now see the `Objective-C Automatic Reference Counting` setting is equal to `Yes`.
    [Figure 1–31](#Chapter01.html#fig_1_31) demonstrates this verification.


    ![Image](images/9781430240051_Fig01-31.jpg)


    **Figure 1–31.** *Verifying ARC*


    ### Quick Tips


    Xcode has a variety of intricacies built into it that can greatly improve your
    development experience. Listed in this section are a few shortcuts meant to expedite
    common tasks and make building applications a simpler process.


    #### Comments


    To quickly comment out a block of code, select the code with your mouse and then
    press ![Image](images/U003.jpg)`/` on the keyboard; each line will be commented
    out. Need to turn the comment off? Just repeat the procedure and the lines will
    be uncommented.


    #### Autocomplete


    Xcode 4 improved greatly upon the previous autocompletion functionality that works
    as you type. This is a big help to let you know what methods are available and
    to increase your coding efficiency. If the autocomplete isn''t showing up or you
    want to know what is available for an object, hit the `Esc` key to bring up a
    list of available methods.


    #### Quick Indent/Unindent


    Xcode 4 does a pretty good job of managing your indents, but if you ever find
    yourself needing some custom indentation or to manage your own indenting, use
    ![Image](images/U003.jpg)`[` to unindent and ![Image](images/U003.jpg)`]` to indent
    manually. This works great for blocks of code as well; just select the block with
    your mouse and use the keyboard shortcuts.


    #### Quickly Switch Between Header and Implementation Files


    You have just added a new property or object to your class header file, and now
    you want to switch to the implementation file to start writing the code for that
    object. Pressing `^`![Image](images/U003.jpg)`+Up/Down` will switch you between
    the two files. [Figure 1–32](#Chapter01.html#fig_1_32) displays a common use of
    the Assistant Editor.


    Xcode 4 also offers a new split pane view that will show related files, called
    the Assistant view. To enable this view, you can click the Assistant view icon
    at the top of the screen, or press `⌥`![Image](images/U003.jpg)`+,` (option+command+comma)
    to load the Assistant view.


    **NOTE:** The keyboard shortcut works best if you are looking at the implementation
    file; execute the command, and it will automatically load the header file in the
    right pane.


    ![Image](images/9781430240051_Fig01-32.jpg)


    **Figure 1–32.** *Selecting the Assistant Editor*


    #### Class Documentation


    Can''t remember all the properties or methods of a class? You can get a reminder
    with a `^`-click of an object type, and a pop-up will be displayed with a description
    of the object, as shown in [Figure 1–33](#Chapter01.html#fig_1_33). From this
    pop-up, you can also view the object''s documentation or the header file.


    ![Image](images/9781430240051_Fig01-33.jpg)


    **Figure 1–33.** *Accessing class documentation*


    A similar shortcut is to `⌘`-click any object or class to jump to its definition.


    #### Open File in Assistant Editor


    You can `⌥`-click any file in the navigator pane to open it in the Assistant Editor.
    You can also `⌘⌥`-click any file, and a diagram, such as that shown in [Figure
    1–34](#Chapter01.html#fig_1_34), resembling the Xcode interface will pop up. Select
    a region in the diagram to open the file in the corresponding pane in Xcode.


    ![Image](images/9781430240051_Fig01-34.jpg)


    **Figure 1–34.** *Configuring the Assistant Editor*'
