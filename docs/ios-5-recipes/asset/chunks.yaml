    `kABPersonFirstNameProperty);`

    `self.lastLabel.text = (__bridge_transfer NSString *)ABRecordCopyValue(person,`

    `kABPersonLastNameProperty);`


    The `ABRecordCopyValue()` function will be your go-to call for any kind of accessing
    data in this section. It takes two parameters, the first being the `ABRecordRef`
