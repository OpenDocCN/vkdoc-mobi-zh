    ## About the Authors


    ![Image](images/shawn_grimes.jpg) In 2010, Shawn Grimes taught himself `Objective-C`
    and iOS development and wrote his first iOS app for the iPad. From Baltimore,
    Maryland, Shawn attended Capitol College in Laurel, Maryland and graduated in
    2003 with a bachelor''s degree in software and Internet applications. He founded
    Shawn''s Bits, LLC to create additional apps and present workshops for other aspiring
    iOS developers. To help local developers, he co-runs the Baltimore Mobile Developers
    group with Chris Stone. Shawn and his wife, Stephanie, run Campfire Apps, LLC,
    a mobile app development company focused on children''s apps.


    ![Image](images/colin_francis.jpg) Colin Francis is an iOS developer from Gaithersburg,
    Maryland. After extensively studying computer science, he trained himself in iOS
    development and worked with Shawn Grimes in Baltimore. Now he lives in Miami,
    developing iOS apps independently with a focus on utilities and audio-focused
    software applications.


    ## About the Technical Reviewer


    ![Image](images/anselm_bradford.jpg) Anselm Bradford is a lecturer in digital
    media at the Auckland University of Technology (AUT) in New Zealand, where he
    researches interactive media, web media, and visual communication. His experience
    with Internet-related development stretches back to 1996, when he hand-coded his
    first web site. He may be found at `@anselmbradford` on Twitter and occasionally
    blogs at [AnselmBradford.com](http://AnselmBradford.com).


    ## Introduction


    Once you have already acquired an understanding of the syntax structure of programming
    in `Objective-C` for iOS development, the most important part of creating applications
    is learning to work with the various tools and frameworks provided by Apple. In
    order to fully develop iPhone and iPad applications, you must have a detailed
    understanding not only of your development environment, but also of the various
    elements and functionalities that you are able to use. Regardless of whether your
    application is playing music, taking pictures, printing documents, or filtering
    images, this book will help guide you through the setup and building of your functionality.'
