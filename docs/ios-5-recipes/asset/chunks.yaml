- fmt: "### UITextView\n\n`UITextView`类与`UITextField`非常相似，都允许用户输入文本。然而，它的视觉设计允许容纳更大量的文本，如[图3-16](#Chapter03.html#fig_3_16)所示。\n\
    \n![Image](images/9781430240051_Fig03-16.jpg)\n\n**图3-16.** *在XIB中使用`UITextView`*\n\
    \n`UITextView`的大多数属性与`UITextField`非常相似，例如`text`、`font`和`textColor`。其他用于配置文本的有用属性包括`editable`（指定文本是否可编辑）以及`textAlignment`。你甚至可以使用`dataDetectorTypes`值来指定文本视图可以检测的数据类型，例如电话号码或电子邮件地址。\n\
    \n与`UITextField`一样，`UITextView`有一个`delegate`属性，该属性根据`UITextView`中发生的事件接收多个操作。此属性必须遵循`UITextViewDelegate`协议。\n\
    \n`UITextViewDelegate`中的大多数方法与之前讨论的`UITextFieldDelegate`协议中的方法完全相同。然而，`UITextViewDelegate`没有任何方法指示何时按下回车键，这使得使用`-resignFirstResponder`方法判断何时应该关闭键盘变得更加困难。相反，你可以实现`-textView:shouldChangeTextInRange:replacementText:`方法。\n\
    \n```\n- (BOOL)textView:(UITextView *)textView shouldChangeTextInRange:(NSRange)range\n\
    \ replacementText:(NSString *)text\n{\n    if ([text isEqualToString:@\"\\n\"\
    ])\n    {\n        [textView resignFirstResponder];\n        return FALSE;\n \
    \   }\n    return TRUE;\n}\n```\n\n对于`UITextView`，按下回车键会导致文本“\\n”被添加到当前文本中，因此你可以简单地让这个方法等待这样的输入，并相应地关闭键盘。在你的应用程序中，你可能希望允许用户在文本视图中换行，因此这个实现可能不是最理想的。\n\
    \n在自定义方面，你可以通过上述属性轻松自定义文本视图的文本属性，但你对视图本身也有一定程度的自定义能力。你可以使用`inputView`属性以及`inputAccessoryView`来访问实际的输入视图。当`UITextView`正在编辑时，如果此附件视图不为`nil`，它将显示在键盘上方，允许你在需要时将自定义工具栏附加到键盘上。\n\
    \n任何类也可以通过成为以下任一通知的观察者，来接收关于`UITextView`状态的通知：\n\n- `UITextViewTextDidBeginEditingNotification`\n\
    - `UITextViewTextDidChangeNotification`\n- `UITextViewTextDidEndEditingNotification`\n\
    \n与`UITextField`一样，`UITextView`最重要的设计方面之一是，要记住在任意给定时刻，一个巨大的键盘可能会占据屏幕的一半。作为开发者，你应该确保你的`UITextView`要么位于不会被键盘遮挡的区域，要么在键盘出现时移动到这样的区域。关于如何接收键盘出现和消失的通知的更多解释，请参见前面的“UITextField”部分。\n\
    \n### UIScrollView\n\n`UIScrollView`类对于处理无法放入单个视图但都属于同一页的大量内容非常有用。这可以是待显示的图片列表，或者只是一个你想要能够缩放和滚动的非常大的图像。\n\
    \n`UIScrollView`的内容被定义为其内部的所有子视图，因此你可以简单地使用`-addSubview:`方法向`UIScrollView`添加内容。\n\
    \n任何时候使用`UIScrollView`，都必须设置`contentSize`属性。这向`UIScrollView`指定了在任何方向上允许滚动多少。通常，这将是你内容的大小，所以如果你的内容是一个尺寸为800x640的`UIImage`的`UIImageView`，你会希望内容大小相同。或者，如果你不希望`UIScrollView`能够在一个方向上滚动，你可以使该方向的`contentSize`更小。\n\
    \n你还可以调整`contentInset`和`contentOffset`，以进一步自定义内容的显示。后者甚至可以使用`-setContentOffset:animated:`方法进行动画。\n\
    \n`UIScrollView`的滚动属性在XIB文件中和通过编程方式都非常容易配置。其中最重要的属性如下：\n\n- `scrollEnabled`：指定`UIScrollView`是否可以滚动；你可以使用此属性来“锁定”视图。\n\
    - `directionalLockEnabled`：此属性如果启用，会限制`UIScrollView`在任意给定时间内只能在一个方向上滚动（垂直或水平）。\n\
    - `scrollsToTop`：启用或禁用用户点击屏幕顶部状态栏以将`UIScrollView`滚动到其内容顶部的功能。\n- `pagingEnabled`：如果启用此属性，滚动会吸附到视图边界的倍数位置，而不是允许在内容中持续滚动。结合`UIPageController`使用，对于使用`UIScrollView`显示多页内容非常有用。\n\
    \n`UIScrollView`最有用的方法之一是`-scrollRectToVisible:animated:`，它允许你根据应用程序的需要，滚动到内容的任意特定区域。\n\
    \n在许多其他属性中，也存在一些用于管理当用户将滚动视图轻拂过其边界时“弹跳”效果的属性，例如`bounces`、`alwaysBounceVertical`和`alwaysBounceHorizontal`属性。\n\
    \n开发者还可以控制“滚动指示器”，即底部或侧面的细条，显示视图滚动了多远。你可以使用`indicatorStyle`、`scrollIndicatorInsets`、`showsHorizontalScrollIndicator`和`showsVerticalScrollIndicator`属性来调整它们。你甚至可以使用`-flashScrollIndicators`方法手动闪烁指示器。\n\
    \n除了滚动和平移之外，`UIScrollView`还内置了缩放功能。为了实现此功能，你只需将`maximumZoomScale`和/或`minimumZoomScale`属性更改为1.0以外的值。\n\
    \n`UIScrollView`也有一个`delegate`属性，用于响应在`UIScrollView`内发生的各种事件。这个对象必须遵循`UIScrollViewDelegate`协议，它有多种方法来响应任何滚动、轻拂或缩放事件的开始和结束。有关所有这些方法的详细信息，请参考Apple文档。\n\
    \n### UIWebView\n\n`UIWebView`类是一个用于“包装”某种Web应用程序的应用程序中的数据展示类。\n\n你可以非常轻松地在视图控制器的XIB文件中创建一个`UIWebView`，这也允许你在属性检查器中轻松编辑`UIWebView`的大部分属性。这些属性，例如`dataDetectorTypes`（类似于`UITextView`中使用的那些），也可以通过编程方式访问。\n\
    \n`UIWebView`可以通过多种方式从网络加载数据，具体取决于你需要管理的内容类型。内容的加载通过多种方法管理，包括`-loadData:MIMEType:textEncodingName:baseURL:`、`-loadHTMLString:baseURL:`和`-loadRequest:`。其中最简单的`-loadRequest:`方法接受一个`NSURLRequest`类型的参数。这个类本质上是一个包装了`NSURL`的类，并带有专门用于访问在线内容的额外属性，例如`timeoutInterval`或`cachePolicy`。一旦你的内容开始加载，你也可以根据需要调用`-stopLoading`或`-reload`方法。"
  raw: '#### UITextView


    The `UITextView` class is incredibly similar to a `UITextField` in that it allows
    the user to input text. However, its visual design allows for significantly greater
    quantities of text, as shown in [Figure 3–16](#Chapter03.html#fig_3_16).


    ![Image](images/9781430240051_Fig03-16.jpg)


    **Figure 3–16.** *Using a `UITextView` in a XIB*


    Most of the `UITextView` properties are very similar to the `UITextField` properties,
    such as `text`, `font`, and `textColor`. Other useful properties to configure
    your text are `editable`, which specifies whether the text can be edited, as well
    as `textAlignment`. You can even specify what kind of data the text view detects,
    such as phone numbers or e-mail addresses, using the `dataDetectorTypes` value.


    Just like the `UITextField`, the `UITextView` has a `delegate`property that receives
    multiple actions depending on what happens in the `UITextView`. This property
    must conform to the `UITextViewDelegate` protocol.


    Most of the `UITextViewDelegate` methods are the exact same as those in the `UITextFieldDelegate`
    protocol discussed earlier. However, the `UITextViewDelegate` does not have any
    method to indicate when the return key has been pressed, making it harder to determine
    when the keyboard should be dismissed using the `-resignFirstResponder` method.
    Instead, you can implement the `-textView:shouldChangeTextInRange:replacementText:`
    method.


    `- (BOOL)textView:(UITextView *)textView shouldChangeTextInRange:(NSRange)range`

    ` replacementText:(NSString *)text`

    `{`

    `if ([text isEqualToString:@"\n"])`

    `    {`

    `        [textView resignFirstResponder];`

    `return FALSE;`

    `    }`

    `return TRUE;`

    `}`


    With a `UITextView`, the pressing of the return key causes a text of “\n” to be
    added to the current text, so you can simply have this method wait for such an
    input, and dismiss the keyboard accordingly. In your application, you may wish
    to allow the user to end lines in your text view, so this implementation may not
    be ideal.


    In terms of customization, you can easily customize the text attributes of the
    text field through the aforementioned properties, but you also have some level
    of customization over the view itself. You can access the actual input view using
    the `inputView`property, as well as an `inputAccessoryView`. This accessory view,
    when non-`nil`, is displayed above the keyboard that appears once the `UITextView`
    is being edited, allowing you to attach a custom toolbar to your keyboard if desired.


    It is also possible for any class to receive notifications about the state of
    a `UITextView` by becoming an observer to any of the following notifications:


    *   `UITextViewTextDidBeginEditingNotification`

    *   `UITextViewTextDidChangeNotification`

    *   `UITextViewTextDidEndEditingNotification`


    Just as with the `UITextField`, one of the most important design aspects of the
    `UITextView` is to remember that at any given moment, a massive keyboard could
    be taking up half of your screen. As a developer, you should make sure that your
    `UITextView`eitheris in an area that will not be blocked by the keyboard, or moves
    to such an area once the keyboard appears. See the previous “UITextField” section
    `f`or more explanation on how to receive notifications when the keyboard appears
    and disappears.


    #### UIScrollView


    The `UIScrollView` class is incredibly useful for dealing with large amounts of
    content that you cannot fit in a single view, but belongs all in the same page.
    This could be a list of pictures to be displayed or simply a very large image
    that you want to be able to zoom and scroll with.


    The content of a `UIScrollView` is defined as any subviews inside of it, so you
    can simply use the `-addSubview:` method to add content to your `UIScrollView`.


    Absolutely any time that you use a `UIScrollView`, it is necessary to set the
    `contentSize` property. This specifies to the `UIScrollView` exactly how much
    scrolling in any direction to allow. Generally, this will be whatever the size
    of your content is, so if your content is a `UIImageView` with a `UIImage` of
    size 800x640, you will want the content size to be the same. Alternatively, if
    you want your `UIScrollView` not to be able to scroll in one direction, you might
    make that direction’s aspect of your `contentSize` smaller.


    You can also adjust the `contentInset`and`contentOffset` to further customize
    the displaying of your content. The latter of these can even be animated using
    the `-setContentOffset:animated:` method.


    The scrolling properties of a `UIScrollView` are incredibly easy to configure
    both in the XIBfile and programmatically. The most important of these properties
    follow:


    *   `scrollEnabled`: Specifies whether the `UIScrollView` can scroll;you can use
    this property to “lock” the view.

    *   `directionalLockEnabled`: This property, if enabled, restricts the `UIScrollView`
    to scroll in only one direction at any given time, either vertical or horizontal.

    *   `scrollsToTop`: This enables or disables the ability of the user to tap the
    status bar at the top of the screen in order to scroll the `UIScrollView` to the
    top of its content.

    *   `pagingEnabled`: If this property is enabled, the scrolling gravitates to
    multiples of the view’s bounds, rather than simply allowing constant scrolling
    throughout the content. This, in conjunction with a `UIPageController`, is very
    useful if you are using a `UIScrollView` to display multiple pages of content.


    One of the most useful methods of a `UIScrollView` is `-scrollRectToVisible:animated:`,
    as it allows you to scroll specifically to any given area of the content based
    on the needs of your application.


    Among many other properties, there also exist ones to manage the “bouncing” of
    the `UIScrollView` when the user flicks the scroll view past its bounds, such
    as the `bounces`, `alwaysBounceVertical`, and `alwaysBounceHorizontal` properties.


    The developer also has control over the “scroll indicator,” the thin bar(s) on
    the bottom or sides showing how far the view has scrolled. You can adjust these
    using the `indicatorStyle`, `scrollIndicatorInsets`, `showsHorizontalScrollIndicator`,
    and `showsVerticalScrollIndicator`properties. You can even manually flash the
    indicators using the `-flashScrollIndicators` method.


    Aside from scrolling and panning, `UIScrollView`s also have a zooming ability
    naturally built into them. In order to implement this functionality, you must
    simply change the `maximumZoomScale`and/or `minimumZoomScale`properties to values
    other than 1.0.


    The `UIScrollView` also has a `delegate` property that responds to a variety of
    events that occur within the `UIScrollView`. This object, which must conform to
    the `UIScrollViewDelegate` protocol, has multiple methods for responding to both
    the beginnings and endings of any scrolling, flicking, or zooming event. Refer
    to the Apple documentation for full details on all these methods.


    #### UIWebView


    The `UIWebView` class is a useful data presentation class for an application that
    “wraps” some kind of web application.


    You can create a `UIWebView` in your view controller’s XIBfile very easily, which
    also allows you to easily edit most of the properties of a `UIWebView` in the
    Attributes inspector. These properties, such as the `dataDetectorTypes` (similar
    to those used in a `UITextView`), are also accessible programmatically.


    A `UIWebView` can load data from the Web in a variety of ways, depending on the
    type of content you need to manage. The loading of content is managed through
    multiple methods, including `-loadData:MIMEType:textEncodingName:baseURL:`, -`loadHTMLString:baseURL:`,
    and `-loadRequest:`. The simplest of these, `-loadRequest:`, takes a parameter
    of type `NSURLRequest`. This class is essentially a wrapped `NSURL` with extra
    properties specifically pertaining to accessing content online, such as a `timeoutInterval`or
    a `cachePolicy`. Once your content is loading, you can also make use of the `-stopLoading`
    or `-reload` methods as you wish.'
  trans: "\n### UITextView\n\n`UITextView`类与`UITextField`非常相似，都允许用户输入文本。然而，它的视觉设计允许容纳更大量的文本，如图\
    \ 3-16 所示。\n\n![Image](img/9781430240051_Fig03-16.jpg)\n\n**图 3-16.** *在 XIB 中使用`UITextView`*\n\
    \n`UITextView`的大多数属性与`UITextField`非常相似，例如`text`、`font`和`textColor`。其他用于配置文本的有用属性包括`editable`（指定文本是否可编辑）以及`textAlignment`。你甚至可以使用`dataDetectorTypes`值来指定文本视图可以检测的数据类型，例如电话号码或电子邮件地址。\n\
    \n与`UITextField`一样，`UITextView`有一个`delegate`属性，该属性根据`UITextView`中发生的事件接收多个操作。此属性必须遵循`UITextViewDelegate`协议。\n\
    \n`UITextViewDelegate`中的大多数方法与之前讨论的`UITextFieldDelegate`协议中的方法完全相同。然而，`UITextViewDelegate`没有任何方法指示何时按下回车键，这使得使用`-resignFirstResponder`方法判断何时应该关闭键盘变得更加困难。相反，你可以实现`-textView:shouldChangeTextInRange:replacementText:`方法。\n\
    \n```\n- (BOOL)textView:(UITextView *)textView shouldChangeTextInRange:(NSRange)range\n\
    \ replacementText:(NSString *)text\n{\n    if ([text isEqualToString:@\"\\n\"\
    ])\n    {\n        [textView resignFirstResponder];\n        return FALSE;\n \
    \   }\n    return TRUE;\n}\n```\n\n对于`UITextView`，按下回车键会导致文本“\\n”被添加到当前文本中，因此你可以简单地让这个方法等待这样的输入，并相应地关闭键盘。在你的应用程序中，你可能希望允许用户在文本视图中换行，因此这个实现可能不是最理想的。\n\
    \n在自定义方面，你可以通过上述属性轻松自定义文本视图的文本属性，但你对视图本身也有一定程度的自定义能力。你可以使用`inputView`属性以及`inputAccessoryView`来访问实际的输入视图。当`UITextView`正在编辑时，如果此附件视图不为`nil`，它将显示在键盘上方，允许你在需要时将自定义工具栏附加到键盘上。\n\
    \n任何类也可以通过成为以下任一通知的观察者，来接收关于`UITextView`状态的通知：\n\n- `UITextViewTextDidBeginEditingNotification`\n\
    - `UITextViewTextDidChangeNotification`\n- `UITextViewTextDidEndEditingNotification`\n\
    \n与`UITextField`一样，`UITextView`最重要的设计方面之一是，要记住在任意给定时刻，一个巨大的键盘可能会占据屏幕的一半。作为开发者，你应该确保你的`UITextView`要么位于不会被键盘遮挡的区域，要么在键盘出现时移动到这样的区域。关于如何接收键盘出现和消失的通知的更多解释，请参见前面的“UITextField”部分。\n\
    \n### UIScrollView\n\n`UIScrollView`类对于处理无法放入单个视图但都属于同一页的大量内容非常有用。这可以是待显示的图片列表，或者只是一个你想要能够缩放和滚动的非常大的图像。\n\
    \n`UIScrollView`的内容被定义为其内部的所有子视图，因此你可以简单地使用`-addSubview:`方法向`UIScrollView`添加内容。\n\
    \n任何时候使用`UIScrollView`，都必须设置`contentSize`属性。这向`UIScrollView`指定了在任何方向上允许滚动多少。通常，这将是你内容的大小，所以如果你的内容是一个尺寸为\
    \ 800x640 的`UIImage`的`UIImageView`，你会希望内容大小相同。或者，如果你不希望`UIScrollView`能够在一个方向上滚动，你可以使该方向的`contentSize`更小。\n\
    \n你还可以调整`contentInset`和`contentOffset`，以进一步自定义内容的显示。后者甚至可以使用`-setContentOffset:animated:`方法进行动画。\n\
    \n`UIScrollView`的滚动属性在 XIB 文件中和通过编程方式都非常容易配置。其中最重要的属性如下：\n\n- `scrollEnabled`：指定`UIScrollView`是否可以滚动；你可以使用此属性来“锁定”视图。\n\
    - `directionalLockEnabled`：此属性如果启用，会限制`UIScrollView`在任意给定时间内只能在一个方向上滚动（垂直或水平）。\n\
    - `scrollsToTop`：启用或禁用用户点击屏幕顶部状态栏以将`UIScrollView`滚动到其内容顶部的功能。\n- `pagingEnabled`：如果启用此属性，滚动会吸附到视图边界的倍数位置，而不是允许在内容中持续滚动。结合`UIPageController`使用，对于使用`UIScrollView`显示多页内容非常有用。\n\
    \n`UIScrollView`最有用的方法之一是`-scrollRectToVisible:animated:`，它允许你根据应用程序的需要，滚动到内容的任意特定区域。\n\
    \n在许多其他属性中，也存在一些用于管理当用户将滚动视图轻拂过其边界时“弹跳”效果的属性，例如`bounces`、`alwaysBounceVertical`和`alwaysBounceHorizontal`属性。\n\
    \n开发者还可以控制“滚动指示器”，即底部或侧面的细条，显示视图滚动了多远。你可以使用`indicatorStyle`、`scrollIndicatorInsets`、`showsHorizontalScrollIndicator`和`showsVerticalScrollIndicator`属性来调整它们。你甚至可以使用`-flashScrollIndicators`方法手动闪烁指示器。\n\
    \n除了滚动和平移之外，`UIScrollView`还内置了缩放功能。为了实现此功能，你只需将`maximumZoomScale`和/或`minimumZoomScale`属性更改为\
    \ 1.0 以外的值。\n\n`UIScrollView`也有一个`delegate`属性，用于响应在`UIScrollView`内发生的各种事件。这个对象必须遵循`UIScrollViewDelegate`协议，它有多种方法来响应任何滚动、轻拂或缩放事件的开始和结束。有关所有这些方法的详细信息，请参考\
    \ Apple 文档。\n\n### UIWebView\n\n`UIWebView`类是一个用于“包装”某种 Web 应用程序的应用程序中的数据展示类。\n\
    \n你可以非常轻松地在视图控制器的 XIB 文件中创建一个`UIWebView`，这也允许你在属性检查器中轻松编辑`UIWebView`的大部分属性。这些属性，例如`dataDetectorTypes`（类似于`UITextView`中使用的那些），也可以通过编程方式访问。\n\
    \n`UIWebView`可以通过多种方式从网络加载数据，具体取决于你需要管理的内容类型。内容的加载通过多种方法管理，包括`-loadData:MIMEType:textEncodingName:baseURL:`、`-loadHTMLString:baseURL:`和`-loadRequest:`。其中最简单的`-loadRequest:`方法接受一个`NSURLRequest`类型的参数。这个类本质上是一个包装了`NSURL`的类，并带有专门用于访问在线内容的额外属性，例如`timeoutInterval`或`cachePolicy`。一旦你的内容开始加载，你也可以根据需要调用`-stopLoading`或`-reload`方法。\n"
- fmt: '#### `MKMapView`


    `MKMapView`是一个数据展示类，专门与MapKit框架配合使用，向用户呈现地图。有关此框架的更多信息（包括该视图的详细用法），请参阅第5章“MapKit食谱”。


    #### `UITableView`


    `UITableView`是一个极其强大的数据展示类，其设计理念是基于相似格式呈现大量数据。我们在第9章“`UITableView`食谱”中详细介绍了该类的通用用法，并全面阐述了开发基于表格的应用程序的细微差别。


    #### `UIPickerView`


    `UIPickerView`与`UITableView`类似，但没那么复杂且可定制性稍低。它允许向用户展示多种格式相似的选项，并让用户通过旋转选择特定选项，如图3–17所示。


    ![Image](images/9781430240051_Fig03-17.jpg)


    **图3–17.** 默认的`UIPickerView`


    `UIPickerView`的设置方式与`UITableView`类似，都通过使用`dataSource`属性和`delegate`属性来实现。这些属性必须分别遵循`UIPickerViewDataSource`和`UIPickerViewDelegate`协议，并且通常设置为将呈现该`UIPickerView`的`UIViewController`。


    `UIPickerViewDataSource`协议仅要求实现两个方法，它们根据“行”和“列”来定义`UIPickerView`的物理配置。列是视图被分成的垂直部分，允许你同时轻松选择多个值。行包含每个列中用户可选择的具体选项。


    你可以通过数据源方法`-numberOfComponentsInPickerView:`和`-pickerView:numberOfRowsInComponent:`来配置列的数量以及每个列的行数。


    `UIPickerView`的视觉设置通过多个委托方法处理：


    *   `pickerView:rowHeightForComponent:`：指定给定列中每行的高度。

    *   `pickerView:widthForComponent:`：指定每个列的宽度；列不会自动适应`UIPickerView`的宽度，因此请确保所有列的总宽度不超过`UIPickerView`的宽度。

    *   `pickerView:titleForRow:forComponent:`：使用此方法为每行提供要显示的简单文本。

    *   `pickerView:viewForRow:forComponent:reusingView:`：如果你希望在某行中显示不止简单文本，可以使用此方法。尽量利用`reusingView:`参数以提高性能。

    *   `pickerView:didSelectRow:inComponent:`：每次列停止旋转并落在某一行时，都会调用此方法，使你的应用程序能在其他位置正确更新。


    以下是一个示例配置：


    ```

    #pragma mark - Data Source methods

    -(NSInteger)numberOfComponentsInPickerView:(UIPickerView *)pickerView

    {

    return 3;

    }

    -(NSInteger)pickerView:(UIPickerView *)pickerView

    numberOfRowsInComponent:(NSInteger)component

    {

    return 3;

    }

    #pragma mark - Delegate methods

    -(CGFloat)pickerView:(UIPickerView *)pickerView

    rowHeightForComponent:(NSInteger)component

    {

    return 30;

    }

    -(CGFloat)pickerView:(UIPickerView *)pickerView widthForComponent:(NSInteger)component

    {

    return 100;

    }

    -(void)pickerView:(UIPickerView *)pickerView didSelectRow:(NSInteger)row inComponent:(NSInteger)component

    {

    NSLog(@"Selected. Row:%i, Component:%i", row, component);

    }

    -(NSString *)pickerView:(UIPickerView *)pickerView titleForRow:(NSInteger)row
    forComponent:(NSInteger)component

    {

    return [NSString stringWithFormat:@"R:%i, C:%i", row, component];

    }

    ```


    这将配置图3–18所示的`UIPickerView`，并记录每个列中所选的行。


    ![Image](images/9781430240051_Fig03-18.jpg)


    **图3–18.** 按行和列配置的`UIPickerView`


    一旦`UIPickerView`配置完成，你可以使用`-selectedRowInComponent:`方法访问每个列中选中的行。


    此外，你还可以通过`showsSelectionIndicator`属性来切换表示所选行的中心栏的显示与隐藏。


    #### `UIDatePickerView`


    `UIDatePickerView`是`UIPickerView`的一个特化版本，专门用于处理时间、日期或倒计时的选择，如图3–19所示。该类实际上并非`UIPickerView`的子类，而是将一个定制化的`UIPickerView`作为其子视图。


    ![Image](images/9781430240051_Fig03-19.jpg)


    **图3–19.** 特化的`UIDatePickerView`


    此类有一个名为`datePickerMode`的属性，允许你从多个代表不同选择器类型的值中进行选择，以适配你的具体场景。


    *   `UIDatePickerModeTime`：选择时间

    *   `UIDatePickerModeDate`：选择日期

    *   `UIDatePickerModeDateAndTime`：在一个选择器中同时选择日期和时间

    *   `UIDatePickerModeCountDownTimer`：选择要设置的倒计时定时器


    为了获知选中行的变化，请将某个方法添加为`UIDatePickerView`的动作，以便在`UIControlEventValueChanged`事件发生时被调用，这与前面讨论的多个元素类似。


    你可以通过`maximumDate`、`minimumDate`、`minuteInterval`和`countDownDuration`等属性来配置`UIDatePickerView`的不同模式。


    如果你希望以编程方式更改`UIDatePickerView`显示的日期，可以设置`date`属性，但这不会产生动画效果。如果`UIPickerView`是可见的，建议使用`-setDate:animated:`方法来进行此类更改。'
  raw: '#### MKMapView


    The `MKMapView` is a data presentation class specifically used in conjunction
    with the MapKit framework to present the user with a map. For more information
    on this framework, including the detailed use of this view, refer toChapter5,
    MapKit Recipes.


    #### UITableView


    The `UITableView` is an incredibly powerful class for data presentation, based
    on the idea of presenting large amounts of data that is all formatted similarly.
    We have devoted [Chapter 9](#Chapter09.html#ch9), UTTableViewRecipes,to covering
    the general use of this class and fully explaining the nuances of developing table-based
    applications.


    #### UIPickerView


    A `UIPickerView` is similar to a `UITableView`, though it is not quite as complex
    and customizable. It allows the user to be presented with a variety of similarly
    formatted options, and rotate through them in order to select a specific option,
    as in [Figure 3–17](#Chapter03.html#fig_3_17).


    ![Image](images/9781430240051_Fig03-17.jpg)


    **Figure 3–17.** *The default `UIPickerView`*


    The `UIPickerView` is set up similarly to the `UITableView` through the use of
    both a `dataSource` property and a `delegate` property. These properties must
    respectively conform to the `UIPickerViewDataSource` and `UIPickerViewDelegate`
    protocols, and are usually set to the `UIViewController` that will present the
    `UIPickerView`.


    The `UIPickerViewDataSource` protocol requires only two methods, which define
    the physical configuration of the `UIPickerView` in terms of “rows” and “components.”
    Components are vertical sections into which your view is split that allow you
    to easily choose multiple values at once. Rows contain the individual options
    in each component that can be chosen by the user.


    You can configure the number of components, as well as the number of rows per
    component, through the data source methods `-numberOfComponentsInPickerView:`and`-pickerView:numberOfRowsInComponent:`.


    The visual setup of a `UIPickerView` is handled through multiple delegate methods:


    *   `pickerView:rowHeightForComponent:`: Specifies the height of each row in a
    given component

    *   `pickerView:widthForComponent:`: Specifies the width of each component; your
    components will not automatically be fit into the `UIPickerView`, so make sure
    that the total width of your components is not more than the width of the `UIPickerView`.

    *   `pickerView:titleForRow:forComponent:`: Use this method to give a simple text
    to be displayed in each row.

    *   `pickerView:viewForRow:forComponent:reusingView:`: You can use this if you
    wish to display more than a simple text in a row. Try to make use of the `reusingView:`
    parameter to improve performance.

    *   `pickerView:didSelectRow:inComponent:`: This method is called every time a
    component stops rotating and lands on a specific row, allowing your application
    to update properly elsewhere.


    Here is a sample configuration:


    `#pragma mark - Data Source methods`

    `-(NSInteger)numberOfComponentsInPickerView:(UIPickerView *)pickerView`

    `{`

    `return 3;`

    `}`

    `-(NSInteger)pickerView:(UIPickerView *)pickerView`

    `numberOfRowsInComponent:(NSInteger)component`

    `{`

    `return 3;`

    `}`

    `#pragma mark - Delegate methods`

    `-(CGFloat)pickerView:(UIPickerView *)pickerView`

    `rowHeightForComponent:(NSInteger)component`

    `{`

    `return 30;`

    `}`

    `-(CGFloat)pickerView:(UIPickerView *)pickerView widthForComponent:(NSInteger)component`

    `{`

    `return 100;`

    `}`

    `-(void)pickerView:(UIPickerView *)pickerView didSelectRow:(NSInteger)row inComponent:(NSInteger)component`

    `{`

    `NSLog(@"Selected. Row:%i, Component:%i", row, component);`

    `}`

    `-(NSString *)pickerView:(UIPickerView *)pickerView titleForRow:(NSInteger)row
    forComponent:(NSInteger)component`

    `{`

    `return [NSString stringWithFormat:@"R:%i, C:%i", row, component];`

    `}`


    This will configure the `UIPickerView` shown in [Figure 3–18](#Chapter03.html#fig_3_18),
    along with logging each selected row within each component.


    ![Image](images/9781430240051_Fig03-18.jpg)


    **Figure 3–18.** *A `UIPickerView` configured by rows and columns*


    Once your `UIPickerView` is configured, you can access the selected row in each
    component using the `-selectedRowInComponent:`method.


    You can also toggle the appearance of the center bar that signifies the chosen
    rows through the `showsSelectionIndicator` property.


    #### UIDatePickerView


    The `UIDatePickerView` is a specialized version of a `UIPickerView` configured
    to handle any selection of times, dates, or countdowns, shown in [Figure 3–19](#Chapter03.html#fig_3_19).
    The class is not actually a subclass of `UIPickerView`, but instead has a customized
    `UIPickerView` as a subview.


    ![Image](images/9781430240051_Fig03-19.jpg)


    **Figure 3–19.** *The specialized `UIDatePickerView`*


    This class has a property called `datePickerMode`, which allows you to select
    from multiple values, representing types of pickers, to fit your specific situation.


    *   `UIDatePickerModeTime`: Selects a time

    *   `UIDatePickerModeDate`: Selects a date

    *   `UIDatePickerModeDateAndTime`: Selects both a date and time in one picker

    *   `UIDatePickerModeCountDownTimer`: Selects a countdown timer to be set


    In order to be informed of changes to selected rows, add a method as an action
    to your `UIDatePickerView` to be called upon `UIControlEventValueChanged` events,
    just as with several of your previously discussed elements.


    You can configure the different modes of a `UIDatePickerView` through such properties
    as `maximumDate`, `minimumDate`, `minuteInterval`, and `countDownDuration`.


    If you wish to programmatically change the date displayed by a `UIDatePickerView`,
    you can set the `date` property, but this will not animate the change. It is recommended
    that you use the `-setDate:animated:` method to make such changes if the `UIPickerView`
    is visible.'
