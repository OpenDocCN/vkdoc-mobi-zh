  trans: "\n现在，在测试您的应用程序时，您应该会看到多种不同类型的模拟打印机，可用于测试您的应用程序。您可以选择不同类型，查看打印输出如何受打印机样式影响，如图\
    \ 13–10 所示。\n\n![Image](img/9781430240051_Fig13-10.jpg)\n\n**图 13–10.** *从您的应用中选择一台模拟打印机*\n\
    \n选择打印机后，您可以打印多份副本，并在打印前更改纸张类型。此时，您应该会看到您的打印机模拟器开始活动，随后，将打开一个 PDF 文件，其中包含您的最终打印输出，类似于图\
    \ 13–11 所示。\n\n![Image](img/9781430240051_Fig13-11.jpg)\n\n**图 13–11.** *从模拟打印机打印图像的输出*\n\
    \n### 方案 13-4：打印纯文本\n\n在前一个方案的基础上，您将添加功能，利用打印格式化器来打印简单的文本。\n\n首先，您将修改`-viewDidLoad`方法，添加一个额外的按钮来打印`UITextView`中的文本。将您已有的方法中的条件语句修改为如下所示：\n\
    \n```\nif ([UIPrintInteractionController isPrintingAvailable])\n    {\nUIBarButtonItem\
    \ *printButton = [[UIBarButtonItemalloc] initWithTitle:@\"Print Image\"\nstyle:UIBarButtonItemStyleBordered\
    \ target:self action:@selector(printPressed:)];\n\nUIBarButtonItem *printTextButton\
    \ = [[UIBarButtonItem alloc] initWithTitle:@\"Print Text\"\nstyle:UIBarButtonItemStyleBordered\
    \ target:self action:@selector(printTextPressed:)];\n\nself.navigationItem.rightBarButtonItems\
    \ = [NSArray arrayWithObjects:printButton,\nprintTextButton, nil];\n    }\n```\n\
    \n然后，用于打印文本的新选择器将按如下方式实现：\n\n```\n-(void)printTextPressed:(id)sender\n{\nif ([UIPrintInteractionController\
    \ isPrintingAvailable])\n    {\nUIPrintInteractionController *pic = [UIPrintInteractionController\n\
    sharedPrintController];\n\nUIPrintInfo *printInfo = [UIPrintInfo printInfo];\n\
    \        printInfo.outputType = UIPrintInfoOutputGeneral;\n        printInfo.jobName\
    \ = self.title;\n        printInfo.duplex = UIPrintInfoDuplexLongEdge;\n     \
    \   pic.printInfo = printInfo;\n\nUISimpleTextPrintFormatter *simpleTextPF = [[UISimpleTextPrintFormatter\
    \ alloc]\ninitWithText:self.textViewInput.text];\n        simpleTextPF.startPage\
    \ = 0;\n        simpleTextPF.contentInsets = UIEdgeInsetsMake(72.0, 72.0, 72.0,\
    \ 72.0);\n        simpleTextPF.maximumContentWidth = 6*72.0;\n\n        pic.printFormatter\
    \ = simpleTextPF;\n\n        pic.showsPageRange = YES;\n\n        [pic presentFromBarButtonItem:sender\
    \ animated:YES\ncompletionHandler:^(UIPrintInteractionController *printInteractionController,\
    \ BOOL\ncompleted, NSError *error)\n         {\nif (!completed && (error != nil))\n\
    \             {\nNSLog(@\"Error due to Domain: %@, Code: %@\", error.domain, error.code);\n\
    \             }\nelse\n             {\nNSLog(@\"Printing Cancelled\");\n     \
    \        }\n         }];\n    }\n}\n```\n\n此方法与其前身相比有两个主要区别：\n\n1.  `UIPrintInfo`中的`outputType`属性被修改为`UIPrintInfoOutputGeneral`值，因为您不再打印照片。\n\
    2.  您没有将`UIImage`设置给`printingItem`属性，而是将`UISimpleTextPrintFormatter`的一个实例设置给了`printFormatter`属性。该对象使用所需文本进行初始化，然后通过其属性进行配置。\n\
    \    *   值为 72.0 的边距相当于 1 英寸，因此您为输出设置了 1 英寸的边距，并为内容指定了 6 英寸的宽度。\n    *   `startPage`属性将在后续有更多用途，但它允许您指定作业中应用格式化器的页面。\n\
    \n打印简单文本时，也很容易将上述方法应用于打印 HTML 格式的文本。要做到这一点，只需使用`UIMarkupTextPrintFormatter`代替`UISimpleTextPrintFormatter`即可。\n\
    \n与之前一样，通过使用打印机模拟器，您可以生成测试输出。由于您将文本视图的文本设置为打印格式化器的内容，您将简单地得到一个包含一些 Lorem Ipsum\
    \ 文本的文档，如图 13–12 所示。\n\n![Image](img/9781430240051_Fig13-12.jpg)\n\n**图 13–12.**\
    \ *模拟打印简单文本页面的输出*\n\n### 方案 13-5：打印视图\n\n就像您可以使用`UISimpleTextPrintFormatter`打印文本一样，您也可以轻松地使用`UIPrintFormatter`的另一个子类`UIViewPrintFormatter`来打印视图的内容。\n\
    \n首先修改您的`-viewDidLoad`的条件设置，使其现在看起来像这样：\n\n```\nif ([UIPrintInteractionController\
    \ isPrintingAvailable])\n    {\nUIBarButtonItem *printButton = [[UIBarButtonItem\
    \ alloc] initWithTitle:@\"Print Image\"\nstyle:UIBarButtonItemStyleBorderedtarget:self\
    \ action:@selector(printPressed:)];\n\nUIBarButtonItem *printTextButton = [[UIBarButtonItem\
    \ alloc] initWithTitle:@\"Print Text\"\nstyle:UIBarButtonItemStyleBordered target:self\
    \ action:@selector(printTextPressed:)];\n\nUIBarButtonItem *printViewButton =\
    \ [[UIBarButtonItem alloc] initWithTitle:@\"Print View\"\nstyle:UIBarButtonItemStyleBordered\
    \ target:self action:@selector(printViewPressed:)];\n\nself.navigationItem.rightBarButtonItems\
    \ = [NSArray arrayWithObjects:printButton,\nprintTextButton, printViewButton,\
    \ nil];\n    }\n```\n\n您最新的打印方法`-printViewPressed:`将与上一个方法非常相似，关键变化在于使用了`UIViewPrintFormatter`。\n\
    \n```\n-(void)printViewPressed:(id)sender\n{\nif ([UIPrintInteractionController\
    \ isPrintingAvailable])\n    {\nUIPrintInteractionController *pic = [UIPrintInteractionController\n\
    sharedPrintController];\n\nUIPrintInfo *printInfo = [UIPrintInfo printInfo];\n\
    \        printInfo.outputType = UIPrintInfoOutputGeneral;\n        printInfo.jobName\
    \ = self.title;\n        printInfo.duplex = UIPrintInfoDuplexLongEdge;\n     \
    \   printInfo.orientation = UIPrintInfoOrientationLandscape;\n        pic.printInfo\
    \ = printInfo;\n\nUIViewPrintFormatter *viewPF = [self.textViewInput viewPrintFormatter];\n\
    \n        pic.printFormatter = viewPF;\n        pic.showsPageRange = YES;\n\n\
    \        [pic presentFromBarButtonItem:sender animated:YES\ncompletionHandler:^(UIPrintInteractionController\
    \ *printInteractionController, BOOL\ncompleted, NSError *error)\n         {\n\
    if (!completed && (error != nil))\n             {\nNSLog(@\"Error due to Domain:\
    \ %@, Code: %@\", error.domain, error.code);\n             }\nelse\n         \
    \    {\nNSLog(@\"Printing Cancelled\");\n             }\n         }];\n    }\n\
    }\n```\n\n不幸的是，`UIViewPrintFormatter`目前仅配置为提供三种系统视图的打印视图：`UITextView`、`UIWebView`和`MKMapView`（来自\
    \ MapKit 框架，如第 4 章所述）。由于您的应用程序只使用了其中一种，您只需让它打印您的`UITextView`视图，结果输出如图 13–13 所示。\n\
    \n![Image](img/9781430240051_Fig13-13.jpg)\n\n**图 13–13.** *模拟打印输出，具体为`UITextView`的输出*\n\
    \n尽管`UIViewPrintFormatter`有局限性，但它可以是一种极其简单的方式，用于轻松打印任何文本、地图或网页的内容。\n"
- fmt: "### Recipe 13–6: Formatted Printing with Page Renderers\n\nA page renderer\
    \ is essentially what allows you to fully customize the content of any print job.\
    \ It allows you to not only format multiple pages with different print formatters,\
    \ but also draw custom content in the header, body, and footer of any page.\n\n\
    In order to use a page renderer, you must create a custom subclass of the `UIPrintPageRenderer`\
    \ class, from which you can override methods to customize the content of your\
    \ printing job.\n\nCreate a new file, using the Objective-C class template. When\
    \ you enter your file name of `SendItOutPageRenderer`, make sure that the file\
    \ will be a subclass of `UIPrintPageRenderer`, as in [Figure 13–14](#Chapter13.html#fig_13_14).\n\
    \n![Image](images/9781430240051_Fig13-14.jpg)\n\n**Figure 13–14.** *Creating a\
    \ `UIPrintPageRenderer` subclass*\n\nClick through to create your new file.\n\n\
    Next, define two `NSString` properties, `title` and `author`, to be printed in\
    \ the header of your renderer.\n\n```\n#import <UIKit/UIKit.h>\n\n@interface SendItOutPageRenderer\
    \ : UIPrintPageRenderer\n\n@property (nonatomic, strong) NSString *title;\n@property\
    \ (nonatomic, strong) NSString *author;\n\n@end\n```\n\nIn order to customize\
    \ the layout of your specific page renderer, you can override methods inherited\
    \ from the `UIPrintPageRenderer` class. The way that this class is set up is that\
    \ the `-drawPageAtIndex:inRect:` method then calls four other methods:\n\n*  \
    \ `-drawHeaderForPageAtIndex:inRect:`: Used to specify header content; if the\
    \ `headerHeight` property of the renderer is zero, this method will not be called.\n\
    *   `-drawContentForPageAtIndex:inRect:`: Draws custom content within the page's\
    \ content rectangle\n*   `-drawFooterForPageAtIndex:inRect:`: Specifies footer\
    \ content; this method will also not be called if the renderer's `footerHeight`\
    \ property is zero.\n*   `-drawPrintFormatter:forPageAtIndex:`: Uses a combination\
    \ of print formatters and custom content to overlay or fill in a view\n\nYou are\
    \ able to override any of these five methods (including `-drawPageAtIndex:inRect:`)\
    \ in order to customize your printing content. In your case, you will override\
    \ the header, footer, and print-formatter methods.\n\nYou will have your header\
    \ print out the document's author on the left, and the title on the right. Your\
    \ method will then look like so:\n\n```\n- (void)drawHeaderForPageAtIndex:(NSInteger)pageIndex\
    \  inRect:(CGRect)headerRect\n{\n    if (pageIndex != 0)\n    {\n        UIFont\
    \ *font = [UIFont fontWithName:@\"Helvetica\" size:12.0];\n        CGSize titleSize\
    \ = [self.title sizeWithFont:font];\n\n        CGFloat drawXTitle = CGRectGetMaxX(headerRect)\
    \ - titleSize.width;\n        CGFloat drawXAuthor = CGRectGetMinX(headerRect);\n\
    \        CGFloat drawY = CGRectGetMinY(headerRect);\n        CGPoint drawPointAuthor\
    \ = CGPointMake(drawXAuthor, drawY);\n        CGPoint drawPointTitle = CGPointMake(drawXTitle,\
    \ drawY);\n\n        [self.title drawAtPoint:drawPointTitle withFont:font];\n\
    \        [self.author drawAtPoint:drawPointAuthor withFont:font];\n    }\n}\n\
    ```\n\nYour footer-implementation method will look similar, and will print out\
    \ a centered page number. Since the page indexes start with 0, you must remember\
    \ to increment all your values by 1.\n\n```\n- (void)drawFooterForPageAtIndex:(NSInteger)pageIndex\
    \ inRect:(CGRect)footerRect\n{\n    UIFont *font = [UIFont fontWithName:@\"Helvetica\"\
    \ size:12.0];\n    NSString *pageNumber = [NSString stringWithFormat:@\"%d.\"\
    , pageIndex+1];\n\n    CGSize pageNumSize = [pageNumber sizeWithFont:font];\n\
    \    CGFloat drawX = CGRectGetMaxX(footerRect)/2.0 - pageNumSize.width - 1.0;\n\
    \    CGFloat drawY = CGRectGetMaxY(footerRect) - pageNumSize.height;\n    CGPoint\
