  raw: '`@interface MainTableViewController : UIViewController <UITableViewDelegate,
    UITableViewDataSource>{`


    `    __strong Teacher *selectedTeacher;`

    `}`


    `@property (strong, nonatomic) IBOutlet UITableView *tableViewMain;`


    `@property (nonatomic, strong) NSEntityDescription *entityDescription;`

    `@property (nonatomic, strong) NSFetchedResultsController *fetchedResultsController;`

    `@property (nonatomic, strong) NSManagedObjectContext *managedObjectContext;`


    `@property (nonatomic, strong) MainTableViewController *delegate;`


    `-(void)MainTableViewController:(MainTableViewController *)mainTableVC didSelectInstrument:(Instrument
    *)instrument;`


    `@end`


    Next, you will use the `delegate` property in conjunction with your `UITableView`’s
    row selection method to build your new, albeit selective, functionality.


    `-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath`

    `{`

    `    [self.tableViewMain deselectRowAtIndexPath:indexPath animated:YES];`

    `    if ([self.entityDescription.name isEqualToString:@"Teacher"])`

    `    {`

    `        selectedTeacher = [self.fetchedResultsController objectAtIndexPath:indexPath];`

    `        MainTableViewController *selectInstrument = [[MainTableViewController
    alloc] init];`

    `        selectInstrument.entityDescription = [NSEntityDescription entityForName:@"Instrument"
    inManagedObjectContext:self.managedObjectContext];`

    `        selectInstrument.managedObjectContext = self.managedObjectContext;`

    `        selectInstrument.delegate = self;`

    `        [self.navigationController pushViewController:selectInstrument animated:YES];`

    `    }`

    `    else if ([self.entityDescription.name isEqualToString:@"Instrument"] && (self.delegate
    != nil))`

    `    {`

    `        [self.delegate MainTableViewController:self didSelectInstrument:[self.fetchedResultsController
    objectAtIndexPath:indexPath]];`

    `        [self.navigationController popViewControllerAnimated:YES];`

    `    }`

    `}`


    You can now implement the `delegate` method you recently declared to add the chosen
    Instrument to the `selectedTeacher`, and then save the changes to the `NSManagedObjectContext`.


    `-(void)MainTableViewController:(MainTableViewController *)mainTableVC didSelectInstrument:(NSManagedObject
    *)instrument`

    `{`

    `    [selectedTeacher addInstrumentsObject:instrument];`

    `    NSError *saveError;`

    `    BOOL success = [self.managedObjectContext save:&saveError];`

    `    if (!success)`

    `    {`

    `        NSLog(@"%@", [saveError localizedFailureReason]);`

    `    }`

    `}`


    Since you didn’t flesh out a full system for the user to create custom data, you
    will need to adjust your `-add` method a few times, running your application each
    time, to create some different data in order to fully test this functionality.


    ### Recipe 11–4: Filtering Your Fetch Requests


    When you’re using your instances of `NSFetchRequest` to get information from your
    `NSManagedObjectContext`, you are in no way limited to only requesting all of
    a specific entity. Through the use of the `NSPredicate` class, you can easily
    refine your results to nearly any subset depending on your application.


    For your application, you will implement your filtering behavior to be applied
    upon the tapping of the Accessory button in your `UITableView`s, with different
    actions depending on the type of `NSManagedObject` tapped.


    *   If the Accessory button is tapped in your Teachers table, you will display
    another `UITableView` of all the instruments that the selected Teacher is associated
    with.

    *   Tapping the accessory button in your Students table will display a table of
    all other students of the same age as the one selected.

    *   In your Instruments table, you will filter your data to display all other
    Instruments with the same `family` as the selected one.


    All of these behaviors will be implemented by setting an `NSPredicate` to your
    `NSFetchRequest` with the specified predicate.


    First, you will add a property to your `MainTableViewController` to keep track
    of this `NSPredicate` so that it can be easily created and used to perform fetch
    requests.


    `@property (nonatomic, strong) NSPredicate *predicate;`


    You can implement your `UITableView`’s delegate method like so:


    `-(void)tableView:(UITableView *)tableView accessoryButtonTappedForRowWithIndexPath:(NSIndexPath
    *)indexPath`

    `{`

    `    if (![self.title isEqualToString:@"Filtered"])`

    `    {`

    `        MainTableViewController *filtered = [[MainTableViewController alloc]
    init];`

    `        filtered.title = @"Filtered";`

    `        filtered.managedObjectContext = self.managedObjectContext;`


    `        if ([self.entityDescription.name isEqualToString:@"Teacher"])`

    `        {`

    `            filtered.entityDescription = [NSEntityDescription entityForName:@"Instrument"
    inManagedObjectContext:self.managedObjectContext];`

    `            NSSet *instruments = [(Teacher *)[self.fetchedResultsController objectAtIndexPath:indexPath]
    instruments];`

    `            filtered.predicate = [NSPredicate predicateWithFormat:@"self IN %@",
    instruments];`

    `        }`

    `        else if ([self.entityDescription.name isEqualToString:@"Student"])`

    `        {`

    `            filtered.entityDescription = self.entityDescription;`

    `            filtered.predicate = [NSPredicate predicateWithFormat:@"age=%i",
    [[(Student *)[self.fetchedResultsController objectAtIndexPath: indexPath] age]
    intValue]];`

    `        }`

    `        else`

    `        {`

    `            filtered.entityDescription = self.entityDescription;`

    `            filtered.predicate = [NSPredicate predicateWithFormat:@"family=%@",
    [(Instrument *)[self.fetchedResultsController objectAtIndexPath:indexPath]family]];`

    `        }`


    `        [self.navigationController pushViewController:filtered animated:YES];`

    `    }`

    `}`


    As you can see, you have used a couple of different styles of predicates in your
    implementation. You have a simple comparing predicate comparing the `family` property
    with a value, and then you have a predicate to check for an object contained in
    a set for the Teacher.


    Whenever you need to specify a certain value in a predicate, you can use “%@”,
    and then pass the value afterward, as shown in the previous code block. In case
    you are unfamiliar with these kinds of values, called “format specifiers,” some
    of the more common ones include the following:


    *   %@: This can be used to represent either a `NSString` value, or simply a reference
    to an object, as you used previously.

    *   %i: This represents an integer.

    *   %f: This represents a float.

    *   %d: This represents a double value.'
  trans: "\n#### `@interface MainTableViewController : UIViewController <UITableViewDelegate,\
    \ UITableViewDataSource>`\n\n```\n{\n    __strong Teacher *selectedTeacher;\n\
    }\n```\n\n`@property (strong, nonatomic) IBOutlet UITableView *tableViewMain;`\n\
    \n`@property (nonatomic, strong) NSEntityDescription *entityDescription;`\n\n\
    `@property (nonatomic, strong) NSFetchedResultsController *fetchedResultsController;`\n\
    \n`@property (nonatomic, strong) NSManagedObjectContext *managedObjectContext;`\n\
    \n`@property (nonatomic, strong) MainTableViewController *delegate;`\n\n`-(void)MainTableViewController:(MainTableViewController\
    \ *)mainTableVC didSelectInstrument:(Instrument *)instrument;`\n\n`@end`\n\n接下来，你将结合使用\
    \ `delegate` 属性和 `UITableView` 的行选择方法，来构建你的新功能——尽管是选择性的功能。\n\n`-(void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath`\n```\n{\n    [self.tableViewMain\
    \ deselectRowAtIndexPath:indexPath animated:YES];\n    if ([self.entityDescription.name\
    \ isEqualToString:@\"Teacher\"])\n    {\n        selectedTeacher = [self.fetchedResultsController\
    \ objectAtIndexPath:indexPath];\n        MainTableViewController *selectInstrument\
    \ = [[MainTableViewController alloc] init];\n        selectInstrument.entityDescription\
    \ = [NSEntityDescription entityForName:@\"Instrument\" inManagedObjectContext:self.managedObjectContext];\n\
    \        selectInstrument.managedObjectContext = self.managedObjectContext;\n\
    \        selectInstrument.delegate = self;\n        [self.navigationController\
    \ pushViewController:selectInstrument animated:YES];\n    }\n    else if ([self.entityDescription.name\
    \ isEqualToString:@\"Instrument\"] && (self.delegate != nil))\n    {\n       \
    \ [self.delegate MainTableViewController:self didSelectInstrument:[self.fetchedResultsController\
    \ objectAtIndexPath:indexPath]];\n        [self.navigationController popViewControllerAnimated:YES];\n\
    \    }\n}\n```\n\n现在，你可以实现刚才声明的 `delegate` 方法，将选中的 Instrument 添加到 `selectedTeacher`\
    \ 中，然后将更改保存到 `NSManagedObjectContext`。\n\n`-(void)MainTableViewController:(MainTableViewController\
    \ *)mainTableVC didSelectInstrument:(NSManagedObject *)instrument`\n```\n{\n \
    \   [selectedTeacher addInstrumentsObject:instrument];\n    NSError *saveError;\n\
    \    BOOL success = [self.managedObjectContext save:&saveError];\n    if (!success)\n\
    \    {\n        NSLog(@\"%@\", [saveError localizedFailureReason]);\n    }\n}\n\
    ```\n\n由于你尚未为用户构建一个完整的自定义数据创建系统，你需要多次调整 `-add` 方法，每次运行应用程序，以创建一些不同的数据，从而充分测试此功能。\n\
    \n## 技巧 11–4：过滤你的提取请求\n\n当你使用 `NSFetchRequest` 实例从 `NSManagedObjectContext` 中获取信息时，你绝不局限于仅请求某个特定实体的全部数据。通过使用\
    \ `NSPredicate` 类，你可以根据应用需求轻松地将结果精确到几乎任何子集。\n\n对于你的应用，你将实现过滤行为，使其在点击 `UITableView`\
    \ 中的附件按钮时生效，并根据所点击的 `NSManagedObject` 类型执行不同的操作。\n\n*   如果在教师表中点击了附件按钮，你将显示另一个\
    \ `UITableView`，其中包含所选教师关联的所有乐器。\n*   在学生表中点击附件按钮，将显示一个表格，列出与所选学生同龄的所有其他学生。\n\
    *   在乐器表中，你将过滤数据，以显示与所选乐器具有相同 `family` 的所有其他乐器。\n\n所有这些行为都将通过为你的 `NSFetchRequest`\
    \ 设置一个 `NSPredicate` 并指定谓词来实现。\n\n首先，你将向 `MainTableViewController` 中添加一个属性来跟踪这个\
    \ `NSPredicate`，以便能够轻松创建并使用它来执行提取请求。\n\n`@property (nonatomic, strong) NSPredicate\
    \ *predicate;`\n\n你可以像这样实现 `UITableView` 的委托方法：\n\n`-(void)tableView:(UITableView\
    \ *)tableView accessoryButtonTappedForRowWithIndexPath:(NSIndexPath *)indexPath`\n\
    ```\n{\n    if (![self.title isEqualToString:@\"Filtered\"])\n    {\n        MainTableViewController\
    \ *filtered = [[MainTableViewController alloc] init];\n        filtered.title\
    \ = @\"Filtered\";\n        filtered.managedObjectContext = self.managedObjectContext;\n\
    \n        if ([self.entityDescription.name isEqualToString:@\"Teacher\"])\n  \
    \      {\n            filtered.entityDescription = [NSEntityDescription entityForName:@\"\
    Instrument\" inManagedObjectContext:self.managedObjectContext];\n            NSSet\
    \ *instruments = [(Teacher *)[self.fetchedResultsController objectAtIndexPath:indexPath]\
    \ instruments];\n            filtered.predicate = [NSPredicate predicateWithFormat:@\"\
    self IN %@\", instruments];\n        }\n        else if ([self.entityDescription.name\
    \ isEqualToString:@\"Student\"])\n        {\n            filtered.entityDescription\
    \ = self.entityDescription;\n            filtered.predicate = [NSPredicate predicateWithFormat:@\"\
    age=%i\", [[(Student *)[self.fetchedResultsController objectAtIndexPath: indexPath]\
    \ age] intValue]];\n        }\n        else\n        {\n            filtered.entityDescription\
    \ = self.entityDescription;\n            filtered.predicate = [NSPredicate predicateWithFormat:@\"\
    family=%@\", [(Instrument *)[self.fetchedResultsController objectAtIndexPath:indexPath]family]];\n\
    \        }\n\n        [self.navigationController pushViewController:filtered animated:YES];\n\
    \    }\n}\n```\n\n正如你所见，你在实现中使用了两种不同风格的谓词。一种是简单的比较谓词，将 `family` 属性与一个值进行比较；另一种是检查集合中是否包含某个对象的谓词，用于教师。\n\
    \n无论何时需要在谓词中指定某个值，你都可以使用 `\"%@”`，然后传入该值，如前面代码块所示。如果你对这些称为“格式说明符”的值不太熟悉，一些常见的格式说明符包括：\n\
    \n*   `%@`：可以用来表示 `NSString` 值，或者简单地对一个对象的引用，就像你之前使用的那样。\n*   `%i`：表示一个整数。\n*\
    \   `%f`：表示一个浮点数。\n*   `%d`：表示一个双精度浮点值。\n"
- fmt: "这些说明符源自 C 语言的格式化字符串打印功能，通常与 `NSLog()` 命令一起使用，或在向用户显示信息时使用。例如，你可能有一段用于测试的代码来记录一个简单的计数器，如下所示：\n\
    \n```\nfor (int n=0; n < 100; n++)\n{\n    NSLog(@\"%i\", n);\n}\n```\n\n当你引用通过谓词求值的对象时，使用关键字\
    \ `self`，如第一个 `NSPredicate` 所示。\n\n有大量关于使用不同格式和方法创建 `NSPredicate` 的文档，这使得开发者能够在为结果创建过滤器时拥有强大的能力。有关创建更复杂谓词的更多信息，请参阅\
    \ Apple 文档。\n\n在即将完成此设置之前，你还需要修改 `-fetchResults` 方法，使其考虑 `NSPredicate`。新方法如下所示：\n\
    \n```\n-(void)fetchResults\n{\n    NSFetchRequest *fetchRequest = [NSFetchRequest\
    \ fetchRequestWithEntityName:self.entityDescription.name];\n    NSString *cacheName\
    \ = [self.entityDescription.name stringByAppendingString:@\"Cache\"];\n\n    ////////////New\
    \ Predicate code\n    if (self.predicate != nil)\n    {\n        [fetchRequest\
    \ setPredicate:self.predicate];\n    }\n    ////////////End of new code\n\n  \
    \  NSSortDescriptor *sortDescriptor = [NSSortDescriptor sortDescriptorWithKey:@\"\
    name\" ascending:YES];\n    [fetchRequest setSortDescriptors:[NSArray arrayWithObject:sortDescriptor]];\n\
    \n    self.fetchedResultsController = [[NSFetchedResultsController alloc] initWithFetchRequest:fetchRequest\
    \ managedObjectContext:self.managedObjectContext sectionNameKeyPath:nil cacheName:cacheName];\n\
    \n    BOOL success;\n    NSError *error;\n    success = [self.fetchedResultsController\
    \ performFetch:&error];\n    if (!success)\n    {\n        NSLog(@\"%@\", [error\
    \ localizedDescription]);\n    }\n}\n```\n\n此时，如果你运行应用程序，可以看到一些过滤结果的示例，例如按系列过滤\
    \ Instruments，如图 [Figure 11-23](#Chapter11.html#fig_11_23) 所示。\n\n![Image](images/9781430240051_Fig11-23.jpg)\n\
    \n**Figure 11-23.** *你的应用程序显示过滤后的结果*\n\n### Recipe 11–5: Versioning\n\n对于几乎任何应用程序，你很可能需要在某个时候对\
    \ Core Data 模型进行更改。Xcode 提供了一种非常简单的方法来做到这一点，通过一个称为“版本控制”的过程，你可以轻松保留所有旧模型，以防出现问题。\n\
    \n第一步是创建数据模型的新版本，可以基于现有版本创建。首先，在左侧导航器窗格中选择 `MusicSchool.xcdatamodeld` 文件。\n\n\
    在 Editor 菜单中，选择 `Add Model Version…`。将出现一个简单的对话框，允许你指定新版本的名称，以及新版本所基于的模型。由于目前只有一个模型，它将是唯一的选择。将新模型命名为\
    \ `MusicSchool2`，如图 [Figure 11-24](#Chapter11.html#fig_11_24) 所示。\n\n![Image](images/9781430240051_Fig11-24.jpg)\n\
    \n**Figure 11-24.** *创建新版本*\n\n点击 Finish，新模型将被创建。\n\n现在，你可以对数据模型进行一些更改。就本应用程序而言，你只会进行相当简单的更改，以便稍后处理的迁移是一个简单的过程。为了保持轻量级迁移，你应该只遵循以下可能的更改：\n\
    \n*   添加或删除实体、属性或关系\n*   重命名属性或实体\n*   更改属性是否为可选\n\n对于新数据模型，你只需添加两个属性：首先，在 Instrument\
    \ 实体中添加一个名为 `size` 的 `NSString`，然后在 Instrument 实体中添加另一个名为 `range` 的 `NSString`。结果属性表将类似于\
    \ [Figure 11-25](#Chapter11.html#fig_11_25)。\n\n![Image](images/9781430240051_Fig11-25.jpg)\n\
    \n**Figure 11-25.** *向 Instrument 实体添加新属性*\n\n接下来，你需要指定这个最新模型版本为应用程序实际使用的版本。首先，选择\
    \ `.xcdatamodel` 文件的顶层，该文件将显示为文件类型 `xcdatamodeld`，并带有两个实际数据模型文件的下拉菜单，如图 [Figure\
    \ 11-26](#Chapter11.html#fig_11_26) 所示。（这指定了实际选择的是哪个文件。）\n\n![Image](images/9781430240051_Fig11-26.jpg)\n\
    \n**Figure 11-26.** *查看项目的数据模型；当前使用的模型被列为主文件。*\n\n接下来，你需要调出 File inspector。可以通过在\
    \ View 菜单中导航到 `Utilities` ![Image](images/U001.jpg) `Show File Inspector`，或者调出屏幕右侧的\
    \ Utilities 面板，然后选择第一个选项卡来实现，如图 [Figure 11-27](#Chapter11.html#fig_11_27) 所示。\n\
    \n**CAUTION:** Xcode 当前不允许你从项目中删除数据模型文件。创建新版本时要小心，因为一旦创建，你将无法轻松删除它们。在图 [Figure\
    \ 11-27](#Chapter11.html#fig_11_27) 中，你可以看到多个不需要或未使用的数据模型文件堆积在一起。\n\n![Image](images/9781430240051_Fig11-27.jpg)\n\
    \n**Figure 11-27.** *使用 File inspector 设置当前版本*\n\n在 Versioned Core Data Model\
    \ 部分，你需要将当前模型更改为新的 `MusicSchool2`，具体如图 [Figure 11-28](#Chapter11.html#fig_11_28)\
    \ 所示。\n\n![Image](images/9781430240051_Fig11-28.jpg)\n\n**Figure 11-28.** *选择不同的当前版本*\n\
    \n此时，你会注意到新模型版本旁边出现了一个小的绿色勾号，表示它现在是当前版本，如图 [Figure 11-29](#Chapter11.html#fig_11_29)\
    \ 所示。\n\n![Image](images/9781430240051_Fig11-29.jpg)\n\n**Figure 11-29.** *新的模型文件被设置为当前版本*\n\
    \n如果你立即尝试运行此应用程序，根据更改的复杂程度，应用程序可能会在运行时崩溃，并出现一个非常奇怪的原因：“The model used to open\
    \ the store is incompatible with the one used to create the store”。这 essentially\
    \ 意味着你正在尝试将数据从旧模型迁移到新模型，但系统不知道如何处理。幸运的是，对于这些轻量级迁移，这很容易修复。\n\n导航到你的应用程序委托实现文件，找到\
    \ `-persistentStoreCoordinator` 方法。查找以下行：\n\n```\nif (![__persistentStoreCoordinator\
    \ addPersistentStoreWithType:NSSQLiteStoreType configuration:nil URL:storeURL\
    \ options:nil error:&error])\n```\n\n你需要指定一个 `NSDictionary` 实例作为此方法的 `options`\
    \ 参数。在之前的 `if` 语句之前添加以下代码：\n\n```\nNSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber\
    \ numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, [NSNumber\
    \ numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];\n```\n\n\
    确保将此字典设置为实际参数，以便 `if` 语句现在读作：\n\n```\nif (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:options error:&error])\n```\n\n现在，所有轻量级迁移将自动进行，极大地简化了你的工作。\n\
    \n如果你的应用程序在没有此更改的情况下运行完全正常，那么你无需担心此步骤，但要知道你可能在某个时候必须这样做。"
  raw: 'These specifiers, which originated in the C programming language for printing
    formatted strings, are most often used in conjunction with either the `NSLog()`
    command or when displaying information for the user. For example, you may have
    a piece of code for testing to log a simple counter, which would look like so:


    `for (int n=0; n < 100; n++)`

    `    {`

    `        NSLog(@"%i", n);`

    `    }`


    Whenever you are referring to the object being evaluated with a predicate, you
    use the keyword “self”, as shown in the first `NSPredicate`.


    There is a great deal of documentation on creating `NSPredicate`s with different
    formats and methods, which allow the developer a great deal of power in creating
    filters for their results. Refer to the Apple documentation for more information
    on creating more complex predicates.


    Just before you are quite finished with this setup, you also need to modify your
    `-fetchResults` method to take the `NSPredicate` into account. The new method
    will look like so:


    `-(void)fetchResults`

    `{`

    `    NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:self.entityDescription.name];`

    `    NSString *cacheName = [self.entityDescription.name stringByAppendingString:@"Cache"];`


    `    ////////////New Predicate code`

    `    if (self.predicate != nil)`

    `    {`

    `        [fetchRequest setPredicate:self.predicate];`

    `    }`

    `    ////////////End of new code`


    `    NSSortDescriptor *sortDescriptor = [NSSortDescriptor sortDescriptorWithKey:@"name"
    ascending:YES];`

    `    [fetchRequest setSortDescriptors:[NSArray arrayWithObject:sortDescriptor]];`


    `    self.fetchedResultsController = [[NSFetchedResultsController alloc] initWithFetchRequest:fetchRequest
    managedObjectContext:self.managedObjectContext sectionNameKeyPath:nil cacheName:cacheName];`


    `    BOOL success;`

    `    NSError *error;`

    `    success = [self.fetchedResultsController performFetch:&error];`

    `    if (!success)`

    `    {`

    `        NSLog(@"%@", [error localizedDescription]);`

    `    }`

    `}`


    At this point, if you run your application, you can see some examples of the filtered
    results, such as the filtering of Instruments by family in [Figure 11-23](#Chapter11.html#fig_11_23).


    ![Image](images/9781430240051_Fig11-23.jpg)


    **Figure 11-23.** *Your app displaying filtered results*


    ### Recipe 11–5: Versioning


    For almost any application, you will most likely need to make changes to your
    Core Data model at one point or another. Xcode gives you a very nice, easy way
    to do this in such a way that you can keep all your old models easily in case
    you have any issues, through a process called “versioning.”


    The first step you will take is to create a new version of your data model, which
    you can base off of the one you already have. First, select your `MusicSchool.xcdatamodeld`
    file in your navigator pane on the left.


    In the Editor menu, select `Add Model Version…`. A simple dialog will appear,
    allowing you to specify the name of the new version model, as well as which model
    to base the new one off of. Since you have only the one model so far, it will
    be your only choice. Name the new model “MusicSchool2”, as in [Figure 11-24](#Chapter11.html#fig_11_24).


    ![Image](images/9781430240051_Fig11-24.jpg)


    **Figure 11-24.** *Creating a new version*


    Click Finish, and your new model will be created.


    Now, you can make some changes to your data model. For the purposes of your application,
    you will be making only fairly simple changes so that your migration, which you
    will deal with shortly, is a simple process. In order to keep with a lightweight
    migration, you should stick to only the following possible changes:


    *   Adding or removing entities, attributes, or relationships

    *   Renaming properties or entities

    *   Changing whether an attribute is optional


    For your new data model, you will simply add two attributes: first, an `NSString`
    called `size` to your Instrument entity, and another `NSString` called `range`,
    also to the Instrument entity. The resulting attributes table will resemble [Figure
    11-25](#Chapter11.html#fig_11_25).


    ![Image](images/9781430240051_Fig11-25.jpg)


    **Figure 11-25.** *Adding new attributes to your Instrument entity*


    Next, you need to specify this newest model version to be the one that your application
    actually uses. First, select the top level of your `.xcdatamodel` files, which
    will be listed as having the file type “`xcdatamodeld`”, and have the drop-down
    menu of your two actual data model files, as in [Figure 11-26](#Chapter11.html#fig_11_26).
    (This one specifies which of the two is actually being selected.)


    ![Image](images/9781430240051_Fig11-26.jpg)


    **Figure 11-26.** *Viewing your project’s data models; the currently used one
    is listed as the main file.*


    Next, you need to bring up the File inspector. You can do this either by navigating
    from the View menu to `Utilities` ![Image](images/U001.jpg) `Show File Inspector`,
    or by bringing up the Utilities pane on the right side of the screen, and then
    selecting the first tab, as shown in [Figure 11-27](#Chapter11.html#fig_11_27).


    **CAUTION:** Xcode does not currently allow you to delete data model files from
    your project. Be careful when creating new versions, as you will not be able to
    easily remove them once they are created. In [Figure 11-27](#Chapter11.html#fig_11_27),
    you can see a buildup of multiple data model files that are not needed or used.


    ![Image](images/9781430240051_Fig11-27.jpg)


    **Figure 11-27.** *Using the File inspector to set the current version*


    Under the Versioned Core Data Model section, you need to change the current model
    to your new “MusicSchool2”, specifically shown in [Figure 11-28](#Chapter11.html#fig_11_28).


    ![Image](images/9781430240051_Fig11-28.jpg)


    **Figure 11-28.** *Selecting a different current version*


    At this point, you will notice that a small green check mark has been placed next
    to the new model version, signifying that it is now the current version, as in
    [Figure 11-29](#Chapter11.html#fig_11_29).


    ![Image](images/9781430240051_Fig11-29.jpg)


    **Figure 11-29.** *Your new model file set as the current version*


    If you try to run this application immediately, depending on how complex your
    changes were, your application might possibly crash upon running with a very strange
    reason of “The model used to open the store is incompatible with the one used
    to create the store”. This essentially means that you are trying to migrate data
    from an old model to a new one, and it does not know what to do. Luckily, for
    those lightweight migrations, this is easy to fix.


    Navigate over to your application delegate implementation file, and find the `-persistentStoreCoordinator`
    method. Look for the following line:


    `if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType
    configuration:nil URL:storeURL options:nil error:&error])`


    You will specify an instance of `NSDictionary` to pass as the `options` parameter
    of this method. Add the following code before the previous `if` statement.


    `NSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber
    numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, [NSNumber numberWithBool:YES],
    NSInferMappingModelAutomaticallyOption, nil];`


    Make sure to set this dictionary as the actual parameter so that the `if` statement
    reads like so now:


    `if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType
    configuration:nil URL:storeURL options:options error:&error])`


    Any lightweight migrations will now automatically take place, making your job
    immensely easier.


    If your app runs perfectly fine without this change, then you do not need to worry
    about this step, but know that you may have to at some point.'
  trans: "\n这些说明符源自 C 语言的格式化字符串打印功能，通常与 `NSLog()` 命令一起使用，或在向用户显示信息时使用。例如，你可能有一段用于测试的代码来记录一个简单的计数器，如下所示：\n\
    \n```\nfor (int n=0; n < 100; n++)\n{\n    NSLog(@\"%i\", n);\n}\n```\n\n当你引用通过谓词求值的对象时，使用关键字\
    \ `self`，如第一个 `NSPredicate` 所示。\n\n有大量关于使用不同格式和方法创建 `NSPredicate` 的文档，这使得开发者能够在为结果创建过滤器时拥有强大的能力。有关创建更复杂谓词的更多信息，请参阅\
    \ Apple 文档。\n\n在即将完成此设置之前，你还需要修改 `-fetchResults` 方法，使其考虑 `NSPredicate`。新方法如下所示：\n\
    \n```\n-(void)fetchResults\n{\n    NSFetchRequest *fetchRequest = [NSFetchRequest\
    \ fetchRequestWithEntityName:self.entityDescription.name];\n    NSString *cacheName\
    \ = [self.entityDescription.name stringByAppendingString:@\"Cache\"];\n\n    ////////////New\
    \ Predicate code\n    if (self.predicate != nil)\n    {\n        [fetchRequest\
    \ setPredicate:self.predicate];\n    }\n    ////////////End of new code\n\n  \
    \  NSSortDescriptor *sortDescriptor = [NSSortDescriptor sortDescriptorWithKey:@\"\
    name\" ascending:YES];\n    [fetchRequest setSortDescriptors:[NSArray arrayWithObject:sortDescriptor]];\n\
    \n    self.fetchedResultsController = [[NSFetchedResultsController alloc] initWithFetchRequest:fetchRequest\
    \ managedObjectContext:self.managedObjectContext sectionNameKeyPath:nil cacheName:cacheName];\n\
    \n    BOOL success;\n    NSError *error;\n    success = [self.fetchedResultsController\
    \ performFetch:&error];\n    if (!success)\n    {\n        NSLog(@\"%@\", [error\
    \ localizedDescription]);\n    }\n}\n```\n\n此时，如果你运行应用程序，可以看到一些过滤结果的示例，例如按系列过滤\
    \ Instruments，如图 Figure 11-23 所示。\n\n![Image](img/9781430240051_Fig11-23.jpg)\n\
    \n**Figure 11-23.** *你的应用程序显示过滤后的结果*\n\n### Recipe 11–5: 版本控制\n\n对于几乎任何应用程序，你很可能需要在某个时候对\
    \ Core Data 模型进行更改。Xcode 提供了一种非常简单的方法来做到这一点，通过一个称为“版本控制”的过程，你可以轻松保留所有旧模型，以防出现问题。\n\
    \n第一步是创建数据模型的新版本，可以基于现有版本创建。首先，在左侧导航器窗格中选择 `MusicSchool.xcdatamodeld` 文件。\n\n\
    在 Editor 菜单中，选择 `Add Model Version…`。将出现一个简单的对话框，允许你指定新版本的名称，以及新版本所基于的模型。由于目前只有一个模型，它将是唯一的选择。将新模型命名为\
    \ `MusicSchool2`，如图 Figure 11-24 所示。\n\n![Image](img/9781430240051_Fig11-24.jpg)\n\
    \n**Figure 11-24.** *创建新版本*\n\n点击 Finish，新模型将被创建。\n\n现在，你可以对数据模型进行一些更改。就本应用程序而言，你只会进行相当简单的更改，以便稍后处理的迁移是一个简单的过程。为了保持轻量级迁移，你应该只遵循以下可能的更改：\n\
    \n*   添加或删除实体、属性或关系\n*   重命名属性或实体\n*   更改属性是否为可选\n\n对于新数据模型，你只需添加两个属性：首先，在 Instrument\
    \ 实体中添加一个名为 `size` 的 `NSString`，然后在 Instrument 实体中添加另一个名为 `range` 的 `NSString`。结果属性表将类似于\
    \ Figure 11-25。\n\n![Image](img/9781430240051_Fig11-25.jpg)\n\n**Figure 11-25.**\
    \ *向 Instrument 实体添加新属性*\n\n接下来，你需要指定这个最新模型版本为应用程序实际使用的版本。首先，选择 `.xcdatamodel`\
    \ 文件的顶层，该文件将显示为文件类型 `xcdatamodeld`，并带有两个实际数据模型文件的下拉菜单，如图 Figure 11-26 所示。（这指定了实际选择的是哪个文件。）\n\
    \n![Image](img/9781430240051_Fig11-26.jpg)\n\n**Figure 11-26.** *查看项目的数据模型；当前使用的模型被列为主文件。*\n\
    \n接下来，你需要调出 File inspector。可以通过在 View 菜单中导航到 `Utilities` ![Image](img/U001.jpg)\
    \ `Show File Inspector`，或者调出屏幕右侧的 Utilities 面板，然后选择第一个选项卡来实现，如图 Figure 11-27 所示。\n\
    \n**注意：** Xcode 当前不允许你从项目中删除数据模型文件。创建新版本时要小心，因为一旦创建，你将无法轻松删除它们。在图 Figure 11-27\
    \ 中，你可以看到多个不需要或未使用的数据模型文件堆积在一起。\n\n![Image](img/9781430240051_Fig11-27.jpg)\n\n\
    **Figure 11-27.** *使用 File inspector 设置当前版本*\n\n在 Versioned Core Data Model 部分，你需要将当前模型更改为新的\
    \ `MusicSchool2`，具体如图 Figure 11-28 所示。\n\n![Image](img/9781430240051_Fig11-28.jpg)\n\
    \n**Figure 11-28.** *选择不同的当前版本*\n\n此时，你会注意到新模型版本旁边出现了一个小的绿色勾号，表示它现在是当前版本，如图 Figure\
    \ 11-29 所示。\n\n![Image](img/9781430240051_Fig11-29.jpg)\n\n**Figure 11-29.** *新的模型文件被设置为当前版本*\n\
    \n如果你立即尝试运行此应用程序，根据更改的复杂程度，应用程序可能会在运行时崩溃，并出现一个非常奇怪的原因：“The model used to open\
    \ the store is incompatible with the one used to create the store”。这 essentially\
    \ 意味着你正在尝试将数据从旧模型迁移到新模型，但系统不知道如何处理。幸运的是，对于这些轻量级迁移，这很容易修复。\n\n导航到你的应用程序委托实现文件，找到\
    \ `-persistentStoreCoordinator` 方法。查找以下行：\n\n```\nif (![__persistentStoreCoordinator\
    \ addPersistentStoreWithType:NSSQLiteStoreType configuration:nil URL:storeURL\
    \ options:nil error:&error])\n```\n\n你需要指定一个 `NSDictionary` 实例作为此方法的 `options`\
    \ 参数。在之前的 `if` 语句之前添加以下代码：\n\n```\nNSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber\
    \ numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, [NSNumber\
    \ numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];\n```\n\n\
    确保将此字典设置为实际参数，以便 `if` 语句现在读作：\n\n```\nif (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:options error:&error])\n```\n\n现在，所有轻量级迁移将自动进行，极大地简化了你的工作。\n\
    \n如果你的应用程序在没有此更改的情况下运行完全正常，那么你无需担心此步骤，但要知道你可能在某个时候必须这样做。\n"
- fmt: "### An Irritating Error\n\nSometimes when dealing with versioning, you may\
    \ run into a problem where an error is thrown by the method that states that the\
    \ store could not be found. An easy, albeit frustrating solution to this is to\
    \ delete your persistent store using the following command in the event of an\
    \ error by adding this line inside the previously referenced `if` statement.\n\
    \n```\n[[NSFileManager defaultManager] removeItemAtURL:storeURL error:nil];\n\
    ```\n\nYour `if` statement would then resemble the following code in this case.\
    \ Keep in mind that you do not at all need or want to add this code unless you\
    \ encounter this specific problem.\n\n```\nif (![__persistentStoreCoordinator\
    \ addPersistentStoreWithType:NSSQLiteStoreType configuration:nil URL:storeURL\
    \ options:options error:&error])\n{\n    NSLog(@\"Unresolved error %@, %@\", error,\
    \ [error userInfo]);\n    [[NSFileManager defaultManager] removeItemAtURL:storeURL\
    \ error:nil];\n    abort();\n}\n```\n\nAfter running this application once, your\
    \ persistent store will be reset, so you should be able to remove this line from\
    \ the method once your application is working correctly again. This way, your\
    \ app does not go and reset your data without your explicit expectation.\n\nWhile\
    \ this should fix the problem, you will unfortunately lose all of your saved data,\
    \ so it is generally best to avoid this drastic measure.\n\nAt this point, your\
    \ application will work again, and you can add code to take advantage of your\
    \ newer model version. However, since you have not updated your `NSManagedObject`\
    \ subclasses, you will not be able to access any of your new attributes without\
    \ using the `-valueForKey:` method. Since you made changes only to the Instrument\
    \ entity, you will refresh only your Instrument subclass.\n\nFirst, delete the\
    \ Instrument subclass files. You can choose to fully delete the files, rather\
    \ than simply their references, since you will not need this version of it anymore,\
    \ and you can always re-create it from the data model again if you have to revert.\
    \ The dialog with which to do this will resemble [Figure 11-30](#Chapter11.html#fig_11_30).\n\
    \n![Image](images/9781430240051_Fig11-30.jpg)\n\n**Figure 11-30.** *Deleting your\
    \ Instrument subclass files; use the Delete option, as you will re-create them.*\n\
    \nNow you can go through the exact same steps as before to create your subclass.\n\
    \nIn your data model file, select the Instrument entity, then navigate to `File`\
    \ ![Image](images/U001.jpg) `New` ![Image](images/U001.jpg) `New File...`.\n\n\
    Under Core Data for iOS, choose the “NSManagedObject subclass” template (as in\
    \ [Figure 11-31](#Chapter11.html#fig_11_31)), and then click through to create\
    \ your new subclass.\n\n![Image](images/9781430240051_Fig11-31.jpg)\n\n**Figure\
    \ 11-31.** *Re-creating your `NSManagedObject` subclass for your newest version*\n\
    \nYou’ll now see that your `Instrument` class contains all the necessary properties\
    \ and methods to handle the added attributes in your new, versioned data model!\n\
    \n### Summary\n\nThroughout this chapter, we have covered the basics of Core Data,\
    \ one of the most integral parts of iOS development, due to its power and simplicity\
    \ of use when it comes to data modeling, persistence, and access. However, we\
    \ have by no means detailed every facet in the Core Data framework, or even touched\
    \ on every general subject related to it. You can easily find entire books devoted\
    \ to the subject of Core Data, and you probably should, in order to get a more\
    \ complete view of exactly how much ability you have in controlling how your data\
    \ is stored. The overview here has demonstrated a basic use of the framework and\
    \ explained the key concepts needed to get started working with Core Data, so\
    \ that you can implement simple persistence in your applications without worrying\
    \ about the more esoteric complexities.\n\n## Chapter 12\n\n## Core Motion Recipes\n\
    \nThe last two chapters spent an incredible amount of time on dealing with information\
    \ stored and persisted inside a device’s memory. Now, we will deal with an entirely\
    \ opposite topic: data from the outside world—not in the sense of data given by\
    \ the user, but instead, data collected by the device about the universe in which\
    \ it exists at any given second. By retrieving information about the outside world,\
    \ a developer can specifically build applications focused on enhancing the user’s\
    \ experience based on his or her physical situation. This could be anything from\
    \ simply detecting the orientation of the device to incorporating rotation into\
    \ a racing game’s steering system, to using an accelerometer to measure the acceleration\
    \ of a roller coaster. Through the use of the Core Motion framework, we are able\
    \ to access with great ease a variety of hardware built into our iOS device in\
    \ order to acquire such unique information, from magnetic fields, to accelerations,\
    \ both by gravity and otherwise, to rotation rates, about the specific situation\
    \ of our device.\n\nFor all but the first recipe in this chapter, you will need\
    \ a physical device with which to test functionality, since you will be dealing\
    \ with information generated by the physical presence of a device."
  raw: '### An Irritating Error


    Sometimes when dealing with versioning, you may run into a problem where an error
    is thrown by the method that states that the store could not be found. An easy,
    albeit frustrating solution to this is to delete your persistent store using the
    following command in the event of an error by adding this line inside the previously
    referenced `if` statement.


    `[[NSFileManager defaultManager] removeItemAtURL:storeURL error:nil];`


    Your `if` statement would then resemble the following code in this case. Keep
    in mind that you do not at all need or want to add this code unless you encounter
    this specific problem.


    `if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType
    configuration:nil URL:storeURL options:options error:&error])`

    `    {`

    `        NSLog(@"Unresolved error %@, %@", error, [error userInfo]);`

    `        [[NSFileManager defaultManager] removeItemAtURL:storeURL error:nil];`


    `        abort();`

    `    }`


    After running this application once, your persistent store will be reset, so you
    should be able to remove this line from the method once your application is working
    correctly again. This way, your app does not go and reset your data without your
    explicit expectation.


    While this should fix the problem, you will unfortunately lose all of your saved
    data, so it is generally best to avoid this drastic measure.


    At this point, your application will work again, and you can add code to take
    advantage of your newer model version. However, since you have not updated your
    `NSManagedObject` subclasses, you will not be able to access any of your new attributes
    without using the `-valueForKey:` method. Since you made changes only to the Instrument
    entity, you will refresh only your Instrument subclass.


    First, delete the Instrument subclass files. You can choose to fully delete the
    files, rather than simply their references, since you will not need this version
    of it anymore, and you can always re-create it from the data model again if you
    have to revert. The dialog with which to do this will resemble [Figure 11-30](#Chapter11.html#fig_11_30).


    ![Image](images/9781430240051_Fig11-30.jpg)


    **Figure 11-30.** *Deleting your Instrument subclass files; use the Delete option,
    as you will re-create them.*


    Now you can go through the exact same steps as before to create your subclass.


    In your data model file, select the Instrument entity, then navigate to `File`
    ![Image](images/U001.jpg) `New` ![Image](images/U001.jpg) `New File...`.


    Under Core Data for iOS, choose the “NSManagedObject subclass” template (as in
    [Figure 11-31](#Chapter11.html#fig_11_31)), and then click through to create your
    new subclass.


    ![Image](images/9781430240051_Fig11-31.jpg)


    **Figure 11-31.** *Re-creating your `NSManagedObject` subclass for your newest
    version*


    You’ll now see that your `Instrument` class contains all the necessary properties
    and methods to handle the added attributes in your new, versioned data model!


    ### Summary


    Throughout this chapter, we have covered the basics of Core Data, one of the most
    integral parts of iOS development, due to its power and simplicity of use when
    it comes to data modeling, persistence, and access. However, we have by no means
    detailed every facet in the Core Data framework, or even touched on every general
    subject related to it. You can easily find entire books devoted to the subject
    of Core Data, and you probably should, in order to get a more complete view of
    exactly how much ability you have in controlling how your data is stored. The
    overview here has demonstrated a basic use of the framework and explained the
    key concepts needed to get started working with Core Data, so that you can implement
    simple persistence in your applications without worrying about the more esoteric
    complexities.


    ## Chapter 12


    ## Core Motion Recipes


    The last two chapters spent an incredible amount of time on dealing with information
    stored and persisted inside a device’s memory. Now, we will deal with an entirely
    opposite topic: data from the outside world—not in the sense of data given by
    the user, but instead, data collected by the device about the universe in which
    it exists at any given second. By retrieving information about the outside world,
    a developer can specifically build applications focused on enhancing the user’s
    experience based on his or herphysical situation. This could be anything from
    simply detecting the orientation of the device to incorporating rotation into
    a racing game’s steering system, to using an accelerometer to measure the acceleration
    of a roller coaster. Through the use of the Core Motion framework, we are able
    to accesswith great ease a variety of hardware built into our iOS device in order
    to acquire such unique information, from magnetic fields, to accelerations, both
    by gravity and otherwise, to rotation rates, about the specific situation of our
    device.


    For all but the first recipe in this chapter, you will need a physical device
    with which to test functionality, since youwill be dealing with information generated
    by the physical presence of a device.'
  trans: "\n### 令人恼火的错误\n\n有时在处理版本控制时，你可能会遇到一个由方法抛出的错误，提示无法找到持久化存储。一个简单但令人沮丧的解决方案是，在出现错误时，通过在前面提到的\
    \ `if` 语句中添加以下代码行，使用以下命令删除你的持久化存储。\n\n```\n[[NSFileManager defaultManager] removeItemAtURL:storeURL\
    \ error:nil];\n```\n\n在这种情况下，你的 `if` 语句将类似以下代码。请记住，除非你遇到这个特定问题，否则你完全不需要也不应该添加这段代码。\n\
    \n```\nif (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
    \ configuration:nil URL:storeURL options:options error:&error])\n{\n    NSLog(@\"\
    Unresolved error %@, %@\", error, [error userInfo]);\n    [[NSFileManager defaultManager]\
    \ removeItemAtURL:storeURL error:nil];\n    abort();\n}\n```\n\n在运行此应用程序一次后，你的持久化存储将被重置，因此一旦你的应用程序恢复正常工作，你应从方法中移除这行代码。这样，你的应用就不会在你未明确预期的情况下重置你的数据。\n\
    \n虽然这应该能解决问题，但不幸的是，你会丢失所有已保存的数据，因此通常最好避免这种极端的措施。\n\n此时，你的应用程序将再次正常工作，你可以添加代码以利用更新的模型版本。然而，由于你尚未更新你的\
    \ `NSManagedObject` 子类，你将无法使用 `-valueForKey:` 方法之外的方式访问任何新属性。因为你只对 Instrument\
    \ 实体进行了更改，所以只需刷新你的 Instrument 子类。\n\n首先，删除 Instrument 子类文件。你可以选择完全删除文件，而不仅仅是移除其引用，因为你不再需要这个版本，并且如果必要，你始终可以从数据模型重新创建它。执行此操作的对话框将类似于图\
    \ 11-30。\n\n![图片](img/9781430240051_Fig11-30.jpg)\n\n**图 11-30.** *删除你的 Instrument\
    \ 子类文件；使用“删除”选项，因为你将重新创建它们。*\n\n现在，你可以按照与之前完全相同的步骤来创建你的子类。\n\n在你的数据模型文件中，选择 Instrument\
    \ 实体，然后导航到 `File` ![图片](img/U001.jpg) `New` ![图片](img/U001.jpg) `New File...`。\n\
    \n在“iOS 的 Core Data”下，选择“NSManagedObject subclass”模板（如图 11-31 所示），然后点击完成以创建你的新子类。\n\
    \n![图片](img/9781430240051_Fig11-31.jpg)\n\n**图 11-31.** *为你最新的版本重新创建 `NSManagedObject`\
    \ 子类*\n\n现在你将看到，你的 `Instrument` 类包含了所有必要的属性和方法，来处理新版版本化数据模型中新增的属性！\n\n### 总结\n\
    \n在本章中，我们介绍了 Core Data 的基础知识。由于其强大功能和在使用数据建模、持久化和访问时的简易性，它是 iOS 开发中最核心的部分之一。然而，我们绝没有详细描述\
    \ Core Data 框架的每一个方面，甚至没有触及与之相关的每一个主题。你可以轻松找到专门讨论 Core Data 的整本书，而且你可能确实应该这么做，以便更全面地了解你在控制数据存储方面究竟拥有多大的能力。这里的概述演示了该框架的基本用法，并解释了开始使用\
    \ Core Data 所需的关键概念，以便你能够在应用程序中实现简单的持久化，而无需担心更复杂的细节。\n\n## 第 12 章\n\n## Core Motion\
    \ 实例\n\n前两章花了大量篇幅讨论存储在设备内存中并持久化的信息。现在，我们将处理一个完全相反的主题：来自外部世界的数据——不是指用户提供的数据，而是设备在任何特定时刻关于其所处宇宙收集到的数据。通过获取外部世界的信息，开发者可以根据用户的物理情境，专门构建专注于增强用户体验的应用程序。这可以是从简单地检测设备方向，到将旋转整合到赛车游戏的转向系统中，再到使用加速度计测量过山车的加速度等任何功能。通过使用\
    \ Core Motion 框架，我们能够轻松访问 iOS 设备中内置的各种硬件，从而获取关于设备特定情境的独特信息，包括磁场、重力以及其他加速度、旋转速率等。\n\
    \n除本章的第一个实例外，你需要一台物理设备来测试功能，因为你将处理由设备的物理存在所生成的信息。\n"
- fmt: "### Recipe 12–1: Registering Shake Events\n\nBefore we dive into the Core\
    \ Motion framework, we can first deal with a related topic: the shaking of a device.\
    \ A large number of applications utilize this functionality in a variety of ways,\
    \ with results ranging from the shuffling of songs to the refreshing of information.\
    \ While this implementation does not necessarily rely on the Core Motion framework,\
    \ its key concept of being able to detect physical changes to your device makes\
    \ it an important functionality to understand.\n\nYou will create a very simple\
    \ application to detect and log the shaking of the device. From there, you will\
    \ start to build an app that can read and display motion information.\n\nStart\
    \ off by creating a new project called `Measurements`, which you will use throughout\
    \ this chapter. For your simple application, you will use the Single View Application\
    \ template, as in [Figure 12–1](#Chapter12.html#fig_12_1), so that you can be\
    \ saved some work on putting your application delegate together.\n\nOnce you select\
    \ the template, enter the project name, make sure that your class prefix is set\
    \ to `Main` and that only the box marked `Use Automatic Reference Counting` is\
    \ checked, and then click through to create your project.\n\n![Image](images/9781430240051_Fig12-01.jpg)\n\
    \n**Figure 12–1.** Configuring your `UIWindow` subclass\n\nThe first task involved\
    \ in configuring the shaking functionality is that you need to instruct your application\
    \ to post a notification any time the device is shaken (not stirred). To do this,\
    \ you will need to subclass the `UIWindow` class. Create a new file using the\
    \ `Objective-C class` template under the iOS Cocoa Touch section, as in [Figure\
    \ 12–2](#Chapter12.html#fig_12_2).\n\n![Image](images/9781430240051_Fig12-02.jpg)\n\
    \n**Figure 12–2.** Subclassing `UIWindow` by making an Objective-C class\n\nGo\
    \ ahead and name the class `MainWindow`, and make sure that you enter `UIWindow`\
    \ in the `Subclass of` field, just as in [Figure 12–3](#Chapter12.html#fig_12_3).\n\
    \n![Image](images/9781430240051_Fig12-03.jpg)\n\n**Figure 12–3.** Configuring\
    \ your `UIWindow` subclass\n\nClick through to create this subclass, and then\
    \ switch over to its implementation file, called `MainWindow.m`.\n\nIn this class,\
    \ you will be overriding the `-motionEnded:withEvent:` method in order to properly\
    \ handle the shaking of your device. Any time the device is shaken, this method\
    \ will automatically be called. You will write it to post a notification, which\
    \ you can then track in other classes.\n\n```\n-(void)motionEnded:(UIEventSubtype)motion\
    \ withEvent:(UIEvent *)event\n{\n    if (motion == UIEventSubtypeMotionShake)\n\
    \    {\n        [[NSNotificationCenter defaultCenter] postNotificationName:@\"\
    NOTIFICATION_SHAKE\" object:event];\n    }\n}\n```\n\nIf you are not quite familiar\
    \ with the concept of the `NSNotificationCenter` and posting notifications, you\
    \ will quickly see that they are quite simple. Any given class can post notifications\
    \ to the `NSNotificationCenter`. Any class that is “observing” the center for\
    \ any notifications with the same “Name” will be notified, and can thus act accordingly.\
    \ This is a fantastic way to move information between classes based on real-time\
    \ events, and often deal with outside changes in user input, such as adjustments\
    \ to a device’s volume or using remote controls with a music application.\n\n\
    Next you need to specify that your new subclass of `UIWindow` is the one that\
    \ your application should use. If you switch over to your application delegate,\
    \ you will notice it already has a `UIWindow` property with which it displays\
    \ all of your views.\n\nFirst, add an import statement to your app delegate header\
    \ file to include the `MainWindow` class.\n\n```\n#import \"MainWindow.h\"\n```\n\
    \nNow in the app delegate implementation file, modify your `-application:DidFinishLaunchingWithOptions:`\
    \ method to read like so:\n\n```\n- (BOOL)application:(UIApplication *)application\n\
    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n    //////////The\
    \ only changed line!\n    self.window = [[MainWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    //////////Change only the previous line.\n\n    self.viewController\
    \ = [[MainViewController alloc] initWithNibName:@\"MainViewController\" bundle:nil];\n\
    \    self.window.rootViewController = self.viewController;\n    [self.window makeKeyAndVisible];\n\
    \    return YES;\n}\n```\n\nBy modifying the class with which you allocated and\
    \ initialized your `window` property from `UIWindow` to `MainWindow`, you threw\
    \ a nice bit of polymorphism into your code, in that the `window` property is\
    \ of type `UIWindow`, but specifically behaves like a `MainWindow`. Since `MainWindow`\
    \ is a subclass of `UIWindow`, this won’t give you any problems, and saves you\
    \ from having to change the property type as well.\n\nNow, you can switch over\
    \ to your main view controller, where you need to register for your `NOTIFICATION_SHAKE`\
    \ notifications by modifying your `-viewDidLoad` method.\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n\n    [[NSNotificationCenter defaultCenter] addObserver:self\n\
    \    selector:@selector(shakeDetected:) name:@\"NOTIFICATION_SHAKE\" object:nil];\n\
    \n}\n```\n\nSince you passed the `shakeDetected:` selector as the designated action\
    \ for these notifications in the previous method, you need to implement this in\
    \ order to avoid any runtime exceptions. For now, your implementation will be\
    \ very simple, but you will add onto it later.\n\n```\n-(void)shakeDetected:(NSNotification\
    \ *)paramNotification\n{\n    NSLog(@\"Just be careful not to drop it!\");\n}\n\
    ```\n\nWhile it may seem a little odd, you do not actually need a physical device\
    \ to test out this functionality. The iOS simulator includes a function to simulate\
    \ a shaking motion on the device, so that you can see if your application responds\
    \ correctly.\n\nWhen viewing your simulator, navigate in the Hardware menu to\
    \ the `Shake Gesture` (`Ctrl+![Image](images/U003.jpg)Z`) selection, as shown\
    \ in [Figure 12–4](#Chapter12.html#fig_12_4).\n\n![Image](images/9781430240051_Fig12-04.jpg)\n\
    \n**Figure 12–4.** Simulating a shake gesture\n\nYou won't see any kind of shaking\
    \ animation in the simulator, but it should respond appropriately to make your\
    \ simple log. [Figure 12–5](#Chapter12.html#fig_12_5) demonstrates the output\
    \ of your application after “shaking” the simulator a couple of times.\n\n![Image](images/9781430240051_Fig12-05.jpg)\n\
    \n**Figure 12–5.** Resulting output from “shaking” your simulator\n\nIf you connect\
    \ your iOS device to Xcode and run through that, you’ll get the same result once\
    \ you give your device a bit of a shake!"
  raw: '### Recipe 12–1: Registering Shake Events


    Before we dive into the Core Motion framework, we can first deal with a related
    topic: the shaking of a device. A large number of applications utilize this functionality
    in a variety of ways, with results ranging from the shuffling of songs to the
    refreshing of information. While this implementation does not necessarily rely
    on the Core Motion framework, its key concept of being able to detect physical
    changes to your device makes it an important functionality to understand.


    You will create a very simple application to detect and log the shaking of the
    device. From there, you will start to build an app that can read and display motion
    information.


    Start off by creating a new project called “Measurements”, which you will use
    throughout this chapter. For your simple application, you will use the Single
    View Application template, as in [Figure 12–1](#Chapter12.html#fig_12_1), so that
    you can be saved some work on putting your application delegate together.


    Once you select the template, enter the project name, make sure that your class
    prefix is set to “Main” and that only the box marked “Use Automatic Reference
    Counting” is checked, and then click through to create your project.


    ![Image](images/9781430240051_Fig12-01.jpg)


    **Figure 12–1.** *Configuring your `UIWindow` subclass*


    The first task involved in configuring the shaking functionality is that you need
    to instruct your application to post a notification any time the device is shaken
    (not stirred). To do this, you will need to subclass the UIWindow class. Create
    a new file using the “Objective-C class” template under the iOS Cocoa Touch section,
    as in [Figure 12–2](#Chapter12.html#fig_12_2).


    ![Image](images/9781430240051_Fig12-02.jpg)


    **Figure 12–2.** *Subclassing `UIWindow` by making an Objective-C class*


    Go ahead and name the class “MainWindow”, and make sure that you enter “UIWindow”
    in the “Subclass of” field, just as in [Figure 12–3](#Chapter12.html#fig_12_3).


    ![Image](images/9781430240051_Fig12-03.jpg)


    **Figure 12–3.** *Configuring your `UIWindow` subclass*


    Click through to create this subclass, and then switch over to its implementation
    file, called `MainWindow.m`.


    In this class, you will be overriding the `-motionEnded:withEvent:` method in
    order to properly handle the shaking of your device. Any time the device is shaken,
    this method will automatically be called. You will write it to post a notification,
    which you can then track in other classes.


    `-(void)motionEnded:(UIEventSubtype)motion withEvent:(UIEvent *)event`

    `{`

    `if (motion == UIEventSubtypeMotionShake)`

    `    {`

    `        [[NSNotificationCenter defaultCenter] postNotificationName:@"NOTIFICATION_SHAKE"
    object:event];`

    `    }`

    `}`


    If you are not quite familiar with the concept of the `NSNotificationCenter` and
    posting notifications, you will quickly see that they are quite simple. Any given
    class can post notifications to the `NSNotificationCenter`. Any class that is
    “observing” the center for any notifications with the same “Name” will be notified,
    and can thus act accordingly. This is a fantastic way to move information between
    classes based on real-time events, and often deal with outside changes in userinput,
    such as adjustments to a device’s volume or using remote controls with a music
    application.


    Next you need to specify that your new subclass of `UIWindow` is the one that
    your application should use. If you switch over to your application delegate,
    you will notice it already has a `UIWindow` property with which it displays all
    of your views.


    First, add an import statement to your app delegate header file to include the
    `MainWindow` class.


    `#import "MainWindow.h"`


    Now in the app delegate implementation file, modify your `-application:DidFinishLaunchingWithOptions:`
    method to read like so:


    `- (BOOL)application:(UIApplication *)application`

    `didFinishLaunchingWithOptions:(NSDictionary *)launchOptions`

    `{`

    `//////////The only changed line!`

    `self.window = [[MainWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];`

    `//////////Change only the previous line.`


    `self.viewController = [[MainViewController alloc] initWithNibName:@"MainViewController"
    bundle:nil];`

    `self.window.rootViewController = self.viewController;`

    `    [self.window makeKeyAndVisible];`

    `return YES;`

    `}`


    By modifying the class with which you allocated and initialized your `window`
    property from “UIWindow” to “MainWindow”, you threw a nice bit of polymorphism
    into your code, in that the `window` property is of type `UIWindow`, but specifically
    behaves like a `MainWindow`. Since `MainWindow` is a subclass of `UIWindow`, this
    won’t give you any problems, and saves you from having to change the property
    type as well.


    Now, you can switch over to your main view controller, where you need to register
    for your “NOTIFICATION_SHAKE” notifications by modifying your `-viewDidLoad` method.


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`


    `    [[NSNotificationCenter defaultCenter] addObserver:self`

    `selector:@selector(shakeDetected:) name:@"NOTIFICATION_SHAKE" object:nil];`


    `}`


    Since you passed the `shakeDetected:` selector as the designated action for these
    notifications in the previous method, you need to implement this in order to avoid
    any runtime exceptions. For now, your implementation will be very simple, but
    you will add onto it later.


    `-(void)shakeDetected:(NSNotification *)paramNotification`

    `{`

    `NSLog(@"Just be careful not to drop it!");`

    `}`


    While it may seem a little odd, you do not actually need a physical device to
    test out this functionality. The iOS simulator includes a function to simulate
    a shaking motion on the device, so that you can see if your application responds
    correctly.


    When viewing your simulator, navigate in the Hardware menu to the “Shake Gesture”
    (Ctrl+![Image](images/U003.jpg)Z) selection, as shown in [Figure 12–4](#Chapter12.html#fig_12_4).


    ![Image](images/9781430240051_Fig12-04.jpg)


    **Figure 12–4.** *Simulating a shake gesture*


    You Won''t see any kind of shaking animation in the simulator, but it should respond
    appropriately to make your simple log. [Figure 12–5](#Chapter12.html#fig_12_5)
    demonstrates the output of your application after “shaking” the simulator a couple
    of times.


    ![Image](images/9781430240051_Fig12-05.jpg)


    **Figure 12–5.** *Resulting output from “shaking”your simulator*


    If you connect your iOS device to Xcode and run through that, you’ll get the same
    result once you give your device a bit of a shake!'
  trans: "\n### 配方 12–1：注册摇晃事件\n\n在深入探讨 Core Motion 框架之前，我们可以先处理一个相关主题：设备的摇晃。大量应用以各种方式利用此功能，其效果从随机播放歌曲到刷新信息不一而足。虽然此实现不一定依赖\
    \ Core Motion 框架，但其能够检测设备物理变化这一关键概念使其成为一项需要理解的重要功能。\n\n我们将创建一个非常简单的应用来检测并记录设备的摇晃。在此基础上，我们将开始构建一个能够读取并显示运动信息的应用。\n\
    \n首先创建一个名为 `Measurements` 的新项目，该项目的成果将贯穿本章使用。对于这个简单应用，我们会使用单视图应用模板，如图 12-1 所示，这样能省去一些组装应用委托的工作。\n\
    \n选择模板后，输入项目名称，确保类前缀设置为 `Main`，并且仅勾选了“使用自动引用计数” (Use Automatic Reference Counting)\
    \ 复选框，然后点击下一步创建项目。\n\n![图片](img/9781430240051_Fig12-01.jpg)\n\n**图 12-1.** 配置你的\
    \ `UIWindow` 子类\n\n配置摇晃功能的第一项任务是，你需要指示你的应用在设备被摇晃（而非搅动）时发布一条通知。为此，你需要继承 `UIWindow`\
    \ 类。创建一个新文件，使用 iOS Cocoa Touch 部分下的 `Objective-C 类` 模板，如图 12-2 所示。\n\n![图片](img/9781430240051_Fig12-02.jpg)\n\
    \n**图 12-2.** 通过创建 Objective-C 类来继承 `UIWindow`\n\n继续操作，将类命名为 `MainWindow`，并确保在“继承自”\
    \ (Subclass of) 字段中输入 `UIWindow`，如图 12-3 所示。\n\n![图片](img/9781430240051_Fig12-03.jpg)\n\
    \n**图 12-3.** 配置你的 `UIWindow` 子类\n\n点击创建该子类，然后切换到它的实现文件 `MainWindow.m`。\n\n在这个类中，我们将重写\
    \ `-motionEnded:withEvent:` 方法，以便正确处理设备摇晃。每当设备被摇晃时，此方法会被自动调用。我们将编写代码让它发布一条通知，以便在其他类中跟踪该通知。\n\
    \n```\n-(void)motionEnded:(UIEventSubtype)motion withEvent:(UIEvent *)event\n\
    {\n    if (motion == UIEventSubtypeMotionShake)\n    {\n        [[NSNotificationCenter\
    \ defaultCenter] postNotificationName:@\"NOTIFICATION_SHAKE\" object:event];\n\
    \    }\n}\n```\n\n如果你对 `NSNotificationCenter` 和发布通知的概念不太熟悉，你很快就会明白它们其实非常简单。任何给定的类都可以向\
    \ `NSNotificationCenter` 发布通知。任何“观察”着通知中心、寻找具有相同“名称”通知的类都会被通知到，并可以据此做出相应动作。这是一种根据实时事件在类之间传递信息的绝佳方式，通常用于处理用户输入的外部变化，例如调整设备音量或使用遥控器控制音乐应用。\n\
    \n接下来，你需要指定你的应用使用这个新的 `UIWindow` 子类。切换到你的应用委托，你会发现它已经有一个用于显示所有视图的 `UIWindow` 属性。\n\
    \n首先，在你的应用委托头文件中添加一条导入语句，以包含 `MainWindow` 类。\n\n```\n#import \"MainWindow.h\"\n\
    ```\n\n现在，在应用委托的实现文件中，将 `-application:DidFinishLaunchingWithOptions:` 方法修改如下：\n\
    \n```\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    //////////唯一改变的行！\n    self.window = [[MainWindow alloc]\
    \ initWithFrame:[[UIScreen mainScreen] bounds]];\n    //////////只需更改上一行。\n\n \
    \   self.viewController = [[MainViewController alloc] initWithNibName:@\"MainViewController\"\
    \ bundle:nil];\n    self.window.rootViewController = self.viewController;\n  \
    \  [self.window makeKeyAndVisible];\n    return YES;\n}\n```\n\n通过将分配并初始化 `window`\
    \ 属性的类从 `UIWindow` 修改为 `MainWindow`，你在代码中巧妙运用了多态：`window` 属性的类型是 `UIWindow`，但其行为却像一个\
    \ `MainWindow`。由于 `MainWindow` 是 `UIWindow` 的子类，这不会给你带来任何问题，也省去了你同时更改属性类型的麻烦。\n\
    \n现在，你可以切换到主视图控制器，通过修改 `-viewDidLoad` 方法来注册 `NOTIFICATION_SHAKE` 通知。\n\n```\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    [[NSNotificationCenter\
    \ defaultCenter] addObserver:self\n    selector:@selector(shakeDetected:) name:@\"\
    NOTIFICATION_SHAKE\" object:nil];\n\n}\n```\n\n由于你在上一步中将 `shakeDetected:` 选择器指定为这些通知的动作，你需要实现这个方法以避免任何运行时异常。现在，它的实现会非常简单，但你稍后会在其基础上添加更多功能。\n\
    \n```\n-(void)shakeDetected:(NSNotification *)paramNotification\n{\n    NSLog(@\"\
    小心别把设备掉地上！\");\n}\n```\n\n虽然看起来可能有点奇怪，但实际你并不需要物理设备来测试这项功能。iOS 模拟器包含一个模拟设备摇晃动作的功能，以便你查看应用是否正确响应。\n\
    \n在查看模拟器时，在“硬件” (Hardware) 菜单中导航到“摇动手势” (Shake Gesture) (`Ctrl+![图片](img/U003.jpg)Z`)\
    \ 选项，如图 12-4 所示。\n\n![图片](img/9781430240051_Fig12-04.jpg)\n\n**图 12-4.** 模拟摇动手势\n\
    \n你不会在模拟器中看到任何摇晃动画，但它应该会正确响应并记录下你简单的日志。图 12-5 展示了在“摇晃”模拟器几次后应用的输出结果。\n\n![图片](img/9781430240051_Fig12-05.jpg)\n\
    \n**图 12-5.** “摇晃”模拟器后的输出结果\n\n如果你将 iOS 设备连接到 Xcode 并运行，一旦你轻轻摇晃设备，你将得到相同的结果！\n"
- fmt: "# Recipe 12–2: Accessing Raw Core Motion Data\n\nNow that your application\
    \ is set up with some basic shaking detection, you can start to build the Core\
    \ Motion framework in, which will allow you access to accelerometer, gyroscope,\
    \ and magnetometer information.\n\nFirst, select your project, and then navigate\
    \ to the Build Phases tab. Under Link Binary With Libraries, click the + button,\
    \ and select the item labeled `CoreMotion.framework`, as in [Figure 12–6](#Chapter12.html#fig_12_6).\n\
    \n![Image](images/9781430240051_Fig12-06.jpg)\n\n**Figure 12–6.** *Adding the\
    \ CoreMotion framework*\n\nNow back in your main view controller’s header file,\
    \ add the following import statement so that you can access the Core Motion API.\n\
    \n```\n#import <CoreMotion/CoreMotion.h>\n```\n\nThe Core Motion framework relies\
    \ extremely heavily on a single class called `CMMotionManager`. This class acts\
    \ as a hub through which you access all the hardware that any given device is\
    \ able to access. You will create an instance of this class in your view controller\
    \ as a property in order to constantly keep track of it.\n\n```\n@property (nonatomic,\
    \ strong) CMMotionManager *motionManager;\n```\n\nIn your view controller, make\
    \ sure to synthesize this property, and then set it to `nil` in your `-viewDidUnload`,\
    \ as is standard.\n\nUnfortunately, simply synthesizing a `CMMotionManager` object\
    \ is not enough to ensure its initialization (like an `NSArray`), so you will\
    \ create a modified getter method to make up for this. Luckily, there’s no complicated\
    \ configuration needed to do this.\n\n```\n-(CMMotionManager *)motionManager\n\
    {\n    if (motionManager == nil)\n    {\n        motionManager = [[CMMotionManager\
    \ alloc] init];\n    }\n    return motionManager;\n}\n```\n\nNext up, you’ll start\
    \ by setting up your user interface. You will start off by measuring the output\
    \ of three different instruments: the accelerometer, the gyroscope, and the magnetometer.\
    \ You will go more into detail on the purposes of these instruments soon, but\
    \ for now you must know that each of these will provide three different values\
    \ for you to view. As such, you will set up your view as shown in [Figure 12–7](#Chapter12.html#fig_12_7).\n\
    \n![Image](images/9781430240051_Fig12-07.jpg)\n\n**Figure 12–7.** *Your view controller’s\
    \ XIB setup*\n\nMake sure to connect the required `UILabel`s to your view controller\
    \ as properties so that you can change their text! You can leave all the device\
    \ name labels as well as the `X`, `Y`, and `Z` labels alone, so you will connect\
    \ only the `UILabel`s that will show values (they read as `0.0` right now), as\
    \ well as the bottom Status label. You will use the following property names in\
    \ your code, organized by line:\n\n*   `xAccLabel`, `yAccLabel`, `zAccLabel`\n\
    *   `xGyroLabel`, `yGyroLabel`, `zGyroLabel`\n*   `xMagLabel`, `yMagLabel`, `zMagLabel`\n\
    *   `statusLabel`\n\nYou will also define a method in your header file to toggle\
    \ whether you are currently retrieving hardware updates, so add the following\
    \ method declaration.\n\n```\n-(void)toggleUpdates;\n```\n\nWhen you’re done,\
    \ your user interface should be fully set up for your initial application, and\
    \ your view controller’s header file, in its entirety, should look like so:\n\n\
    ```\n#import <UIKit/UIKit.h>\n#import <CoreMotion/CoreMotion.h>\n\n@interface\
    \ MainViewController : UIViewController\n@property (nonatomic, strong) CMMotionManager\
    \ *motionManager;\n@property (strong, nonatomic) IBOutlet UILabel *xAccLabel;\n\
    @property (strong, nonatomic) IBOutlet UILabel *yAccLabel;\n@property (strong,\
    \ nonatomic) IBOutlet UILabel *zAccLabel;\n\n@property (strong, nonatomic) IBOutlet\
    \ UILabel *xGyroLabel;\n@property (strong, nonatomic) IBOutlet UILabel *yGyroLabel;\n\
    @property (strong, nonatomic) IBOutlet UILabel *zGyroLabel;\n\n@property (strong,\
    \ nonatomic) IBOutlet UILabel *xMagLabel;\n@property (strong, nonatomic) IBOutlet\
    \ UILabel *yMagLabel;\n@property (strong, nonatomic) IBOutlet UILabel *zMagLabel;\n\
    \n@property (strong, nonatomic) IBOutlet UILabel *statusLabel;\n\n-(void)toggleUpdates;\n\
    @end\n```\n\n## Core Motion in Detail\n\nIn Core Motion, you are able to access\
    \ three different pieces of hardware on a device, assuming that the device is\
    \ new enough to be equipped with said hardware.\n\n1.  *Accelerometer*: This piece\
    \ of hardware measures acceleration (caused by gravity or user acceleration) of\
    \ a device in order to provide insight into the current orientation of the device,\
    \ as well as any accelerations of the device by the user in a specific direction.\
    \ This is particularly useful for detecting whether the device is at an angle\
    \ (and possibly rotating a view as a result).\n    Data from the accelerometer\
    \ is presented in the form of a `CMAccelerometerData` object. This object has\
    \ just one property, `acceleration`, which has `x`, `y`, and `z` values, representing\
    \ the orientation or acceleration along any given axis.\n2.  *Gyroscope*: The\
    \ gyroscope measures rotation rate of the device along multiple axes.\n    Information\
    \ from the gyroscope is enclosed in an instance of `CMGyroData`. This class has\
    \ the property `rotationRate`, with `x`, `y`, and `z` values, which represent\
    \ the rotation rate around a specific axis.\n3.  *Magnetometer*: This device provides\
    \ data regarding the magnetic field passing through the device, usually based\
    \ on the Earth’s magnetic field, as well as any other magnetic fields nearby.\
    \ Remember to be careful when testing this feature, as placing any kind of powerful\
    \ magnet near your device could possibly cause harm to it.\n    When receiving\
    \ information from the magnetometer, you access the `CMMagnetometerData` class,\
    \ which has a single property, `magneticField`, which has `x`, `y`, and `z` values\
    \ to represent the magnetic field through the device along each axis.\n\nFor all\
    \ three devices, all axes are the same. If you are holding your device facing\
    \ you with the bottom facing the ground, the x axis cuts horizontally through\
    \ your device, the y axis runs from top to bottom, and the z axis runs through\
    \ the center of the device toward you.\n\nYou will start off by implementing your\
    \ view controller to display the raw data for each of these pieces of hardware.\n\
    \nWhenever you are dealing with any internal hardware, it is the developer’s responsibility\
    \ to include some way of confirming that the hardware being accessed is actually\
    \ available on any given device running the application. For this reason, any\
    \ time you access the Core Motion hardware, you will always make use of the following\
    \ methods:\n\n*   `-isAccelerometerAvailable`\n*   `-isGyroAvailable`\n*   `-isMagnetometerAvailable`\n\
    \nAll three of these methods simply return a `BOOL` value, with `YES` indicating\
    \ that the hardware is indeed accessible.\n\nYou will also make use of three other\
    \ methods that check if any given hardware is currently already active to correctly\
    \ toggle your updates.\n\n*   `-isAccelerometerActive`\n*   `-isGyroActive`\n\
    *   `-isMagnetometerActive`\n\nWhenever you want to retrieve updates from a specific\
    \ piece of hardware, you must set an “update interval,” to specify how often you\
    \ will receive updates, as shown in the following example:\n\n```\n[self.motionManager\
    \ setAccelerometerUpdateInterval:1.0/2.0]; //Update twice per second\n```\n\n\
    There are two different methods by which you can receive updates from a particular\
    \ hardware component. First, you can simply tell the `CMMotionManager` to start\
    \ receiving updates from a device using `-startAccelerometerUpdates`, `-startGyroUpdates`,\
    \ and `-startMagnetometerUpdates`, and then query the info using the `accelerometerData`,\
    \ `gyroData`, and `magnetometerData` properties. This way is useful if you are\
    \ not planning to make use of your updates every single time they refresh.\n\n\
    The second method focuses more for the user who wants to always utilize the newest\
    \ data as it becomes available, as you are implementing here. You can make use\
    \ of three different methods that not only start updates, but also specify a handler\
    \ block of code to be performed upon updating, as well as a queue in which to\
    \ perform the handler. These are listed as follows:"
