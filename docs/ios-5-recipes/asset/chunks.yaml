    Upon testing this application, you will be able to get a simple readout of your
    device''s headings, both based on magnetic heading and true heading. Like the
    other recipes in this chapter that make use of the magnetometer, this functionality
    will work only on a physical device, and not the simulator.


    ### Recipe 4–5: Region Monitoring


    Core Location provides a method for monitoring when a device enters or exits a
    circular region. This could be used by an application to trigger an alert when
    a device enters the vicinity of a certain location, like triggering an alert to
    pick up milk when you get near the grocery store. You could also use it to send
    a notification to your family when you leave work to let them know that you are
    on your way home. There are many possibilities available if you let your imagination
    do a little wandering.


    #### A Thing or Two About Regions


    Regions are defined by a center coordinate and a radius measured in meters (again,
    a meter is just over three feet or a yard). The monitoring method triggers an
    event only when you cross a region boundary. It will not trigger an event if the
    device exists in the region when the monitoring starts. Events are triggered only
    when a device enters or exits a region.


    Once you create a `CLLocationManager` object, you can register multiple regions
    for monitoring using the `startMonitoringForRegion:desiredAccuracy:` method. The
    regions that you register for monitoring are persistent across multiple launches
    of your application. If your application is not running when a boundary event
    occurs, your application is automatically relaunched in the background so that
    it can process the event. All of the regions you set up previously will be available
    in the `monitoredRegions` property of the `CLLocationManager` object.


    Regions are shared system-wide, and there is a limited number of regions that
    can be monitored at a given time. You should always limit the number of defined
    regions that you are currently monitoring so as not to consume the system resources.
    You should remove regions for monitoring that are not near the device''s current
    location. For instance, there is no need to monitor for regions in Maryland, if
    the device is on the West Coast. The error `kCLErrorRegionMonitoringFailure` will
    be presented to the `locationManager:monitoringDidFailForRegion:withError:` delegate
    method if space is unavailable when you try to register a new region for monitoring.'
