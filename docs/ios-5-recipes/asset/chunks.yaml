    \ [self.tableViewHotspots reloadData];\n}\n```\n\n最后，在测试应用之前，您需要修改应用程序委托的实现文件，将视图控制器放入`UINavigationController`中。调整`-application:didFinishLaunchingWithOptions:`方法如下所示。\n\
    \n```\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    self.viewController = [[MainViewController alloc]\n\
    \                            initWithNibName:@\"MainViewController\"\n       \
    \                              bundle:nil];\n    __strong UINavigationController\
    \ *navcon = [[UINavigationController alloc]\n                                \
    \                initWithRootViewController:self.viewController];\n    self.window.rootViewController\
    \ = navcon;\n    [self.window makeKeyAndVisible];\n    return YES;\n}\n```\n\n\
    您的用户界面现已完全设置，允许您创建要在`UITableView`中显示、编辑或删除的`Hotspot`对象，如在图 10-8 中创建一些示例数据后所示。\n\
    \n![Image](img/9781430240051_Fig10-08.jpg)\n\n**Figure 10–8.** *您的应用带有示例数据的`UITableView`*\n\
    \n现在，使用此应用程序唯一剩下的任务就是能够保存数据，使其在应用间持久化。\n\n为了实现应用程序中的持久化，您将使用文件系统以及“归档”和“解档”对象的概念。\n\
    \n要归档（即“编码”）任何给定的对象，它及其内部存储的所有属性都必须被明确告知如何编码。对于任何预制的 iOS 对象，例如`NSArray`或`NSDictionary`，这已经完成。但是，为了编码您的`Hotspot`对象，您需要添加一些关于如何处理它们的具体指令。\n\
    \n在`Hotspot.h`类中，通过将`@interface`行更改为以下内容，指定您的类将遵守`NSCoding`协议：\n\n```\n@interface\
    \ Hotspot : NSObject<NSCoding>\n```\n\n现在，您必须实现`-encodeWithCoder:`方法，以指定如何编码`Hotspot`对象以进行保存。\n\
    \n```\n- (void) encodeWithCoder:(NSCoder *)encoder\n{\n    [encoder encodeObject:self.name\
    \ forKey:@\"name\"];\n    [encoder encodeObject:self.address forKey:@\"address\"\
    ];\n    [encoder encodeObject:self.city forKey:@\"city\"];\n    [encoder encodeObject:self.state\
    \ forKey:@\"state\"];\n}\n```\n\n在加载数据的反向过程中，您必须实现`-initWithCoder:`方法，以使用归档数据创建`Hotspot`类的实例。通过使用与前一个方法相同的键，您可以轻松提取所需的`NSString`对象。\n\
    \n```\n- (id)initWithCoder:(NSCoder *)decoder\n{\n    self = [super init];\n \
    \   if (self)\n    {\n        self.name = [decoder decodeObjectForKey:@\"name\"\
    ];\n        self.address = [decoder decodeObjectForKey:@\"address\"];\n      \
    \  self.city = [decoder decodeObjectForKey:@\"city\"];\n        self.state = [decoder\
    \ decodeObjectForKey:@\"state\"];\n    }\n    return self;\n}\n```\n\n现在，回到您的主视图控制器，您可以创建一个方法，将数据保存到特定文件。\n\
    \n```\n-(void)saveData\n{\n    NSString *rootPath = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    \                                    NSUserDomainMask, YES) objectAtIndex:0];\n\
    \    NSString *savePath = [rootPath stringByAppendingPathComponent:@\"hotspotsData\"\
    ];\n    NSFileManager *fileManager = [NSFileManager defaultManager];\n    NSMutableData\
    \ *saveData = [[NSMutableData alloc] init];\n\n    NSKeyedArchiver *archiver =\
    \ [[NSKeyedArchiver alloc] initForWritingWithMutableData:saveData];\n    [archiver\
    \ encodeObject:self.hotspots forKey:@\"DataArray\"];\n    [archiver finishEncoding];\n\
    \n    [fileManager createFileAtPath:savePath contents:saveData attributes:nil];\n\
    }\n```\n\n此方法包含以下步骤："
- fmt: "1. 获取用于保存数据的根目录路径。您已经指定了“Documents Directory”，但根据应用程序的需求，还有其他可能的目录可供使用。\n\
    2. 将文件名`hotspotsData`附加到根路径上，以创建数据文件的路径。\n3. 获取`NSFileManager`类的共享实例。\n4. 获取一个空的`NSMutableData`实例。\n\
    5. 使用`NSKeyedArchiver`类，通过键“DataArray”编码您的`hotspots NSArray`。生成的编码数据将保存在您获取的`NSMutableData\
    \ saveData`对象中。\n    1.  尽管您无法看到其实际代码，但`-encodeObject:forKey:`调用将使用您在`Hotspot.m`文件中定义的`-encodeWithCoder:`方法来归档数组中的所有`Hotspot`对象。\n\
    6. 使用`NSFileManager`，在指定路径使用编码数据创建文件。如果该路径已存在文件，它将被覆盖，这对您的应用程序非常适用。\n\n现在，要执行反向过程，您可以创建一个`-loadData`方法，如下所示：\n\
    \n```\n-(void)loadData\n{\nNSString *rootPath = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    NSUserDomainMask, YES) objectAtIndex:0];\nNSString *savePath = [rootPath stringByAppendingPathComponent:@\"\
    hotspotsData\"];\nNSFileManager *fileManager = [NSFileManager defaultManager];\n\
    if ([fileManager fileExistsAtPath:savePath])\n    {\nNSData *data = [fileManager\
    \ contentsAtPath:savePath];\nNSKeyedUnarchiver *unarchiver = [[NSKeyedUnarchiver\
    \ alloc] initForReadingWithData:data];\nself.hotspots = [unarchiver decodeObjectForKey:@\"\
    DataArray\"];\n    }\n}\n```\n\n此方法与之前的反向方法几乎相同，它从特定文件路径获取`NSData`，解档它，然后从解码后的数据重新创建`NSArray`。正如`encodeObject:forKey:`方法使用了您的`-encodeWithCoder:`，`decodeObjectForKey:`方法将为其解码对象中的所有对象（包括`NSArray`及其包含的所有`Hotspot`）使用`-initWithCoder:`方法。\n\
    \n现在，您只需将对这两个新方法的调用放在正确的位置。在您的`-viewDidLoad`方法中添加对`-loadData`的调用。\n\n```\n[self\
    \ loadData];\n```\n\n将`-saveData`和`-loadData`方法的方法签名添加到视图控制器的头文件中，以避免任何编译器问题。\n\
    \n每次数组被修改时，您都需要添加对`-saveData`方法的调用，包括在以下方法中：\n\n```\n-(void)HotspotInfoViewController:(HotspotInfoViewController\
    \ *)hotspotInfoVC\ndidReturnHotspot:(Hotspot *)hotspot isNew:(BOOL)isNew\n{\n\
    \    if (isNew)\n    {\n        [self.hotspots addObject:hotspot];\n    }\n  \
    \  [self.tableViewHotspots reloadData];\n    //New call to save data\n    [self\
    \ saveData];\n\n    [self.navigationController popViewControllerAnimated:YES];\n\
    }\n- (void)tableView:(UITableView *)tableView\ncommitEditingStyle:(UITableViewCellEditingStyle)editingStyle\n\
    forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
    \    {\n        [self.hotspots removeObjectAtIndex:indexPath.row];\n        [tableView\
    \ deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\nwithRowAnimation:UITableViewRowAnimationFade];\n\
    \        //New call to save data\n        [self saveData];\n    }\n}\n- (void)tableView:(UITableView\
    \ *)tableView moveRowAtIndexPath:(NSIndexPath\n*)fromIndexPath toIndexPath:(NSIndexPath\
    \ *)toIndexPath\n{\n    Hotspot *movingHotspot = [self.hotspots objectAtIndex:fromIndexPath.row];\n\
    \    [self.hotspots removeObject:movingHotspot];\n    [self.hotspots insertObject:movingHotspot\
    \ atIndex:toIndexPath.row];\n    [self.tableViewHotspots reloadData];\n    //New\
    \ call to save data\n    [self saveData];\n}\n```\n\n一旦添加了这些调用，您的应用程序将能够自动将对数据的任何新更改保存到外部文件，以便在重新打开应用程序时读取！\n\
    \n在您的演示应用程序中，您没有实现将图像保存到文件，尽管这是iOS文件管理系统最有效和最常见的用途之一。这个过程甚至比前面的实现更简单。要保存图像，请获取表示图像的`NSData`对象，然后使用`NSFileManager`方法`-createFileAtPath:contents:attributes`写出数据。或者，您也可以使用`NSData`方法`-writeToFile:atomically:`执行相同的任务。\n\
    \n要获取表示`UIImage`的数据，您可以使用`UIImagePNGRepresentation()`或`UIImageJPEGRepresentation()`函数，这两个函数都返回`NSData`。要使用从文件读取的`NSData`重新构建`UIImage`，请使用`+imageWithData:`或`-initWithData:`方法。\n\
    \n### Core Data\n\n到目前为止，您已经接触了用于轻量级值的`NSUserDefaults`的快速实现，以及用于更复杂或更大量数据的文件管理系统。尽管使用文件管理系统存储数据非常强大，但在处理交织类的复杂数据模型时，它很容易变得相当笨重。对于由轻量级对象组成的复杂数据模型，持久化的最佳选择是`Core\
    \ Data`。这个基于MySQL表系统的框架，允许轻松创建、操作和持久化复杂的类交互和属性。这个类的使用相当复杂，因此将在下一章中详细介绍。"
  raw: "1.  Acquire the root directory path in which you will save your data. You\
    \ have specified the “Documents Directory”, though there are other possible directories\
    \ to use depending on your application’s needs.\n2.  Append a file name “hotspotsData”\
    \ onto the root path to create the data file’s path.\n3.  Acquire a shared instance\
    \ of the `NSFileManager` class.\n4.  Acquire an empty instance of `NSMutableData`.\n\
    5.  Encode your `hotspots NSArray` with the key “DataArray” using the `NSKeyedArchiver`\
    \ class. The resulting encoded data will be in the `NSMutableData saveData` object\
    \ you acquired.\n    1.  Though you cannot see the actual code of it, the `-encodeObject:forKey:`\
    \ call will make use of the -`encodeWithCoder:` method you defined in your `Hotspot.m`\
    \ file to archive all the Hotspot objects in your array.\n6.  Using the `NSFileManager`,\
    \ create your file at the specified path, using your encoded data. If a file already\
    \ exists at this path, it will be overwritten, which works quite well for your\
    \ application.\n\nNow, to work in the reverse process, you can create a `-loadData`\
    \ method like so:\n\n`-(void)loadData`\n`{`\n`NSString *rootPath = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,`\n\
    `NSUserDomainMask, YES) objectAtIndex:0];`\n`NSString *savePath = [rootPath stringByAppendingPathComponent:@\"\
    hotspotsData\"];`\n`NSFileManager *fileManager = [NSFileManager defaultManager];`\n\
    `if ([fileManager fileExistsAtPath:savePath])`\n`    {`\n`NSData *data = [fileManager\
    \ contentsAtPath:savePath];`\n`NSKeyedUnarchiver *unarchiver = [[NSKeyedUnarchiver\
    \ alloc] initForReadingWithData:data];`\n`self.hotspots = [unarchiver decodeObjectForKey:@\"\
    DataArray\"];`\n`    }`\n`}`\n\nThis method works almost the same as the previous\
    \ one in reverse, as it acquires `NSData` from a specific file path, unarchives\
    \ it, and then creates your `NSArray` back from the decoded data. Just as the\
    \ `encodeObject:forKey:` method made use of your `-encodeWithCoder:`, the `decodeObjectForKey:`\
    \ method will make use of the `-initWithCoder:` method for all the objects involved\
    \ in your decoded object, including your `NSArray` and all the Hotspots it contains.\n\
    \nNow, you simply need to place calls to your two new methods in the correct places.\
    \ Add a call to `-loadData` to your `-viewDidLoad` method.\n\n`[self loadData];`\n\
    \nAdd method signatures for both the `-saveData` and `-loadData` methods to your\
    \ view controller’s header file to avoid any compiler problems.\n\nYou will need\
    \ to add calls to the `-saveData` method every time your array is altered, including\
    \ in the following methods:\n\n`-(void)HotspotInfoViewController:(HotspotInfoViewController\
    \ *)hotspotInfoVC`\n`didReturnHotspot:(Hotspot *)hotspot isNew:(BOOL)isNew`\n\
    `{`\n`    if (isNew)`\n`    {`\n`        [self.hotspots addObject:hotspot];`\n\
    `    }`\n`    [self.tableViewHotspots reloadData];`\n`    //New call to save data`\n\
    `    [self saveData];`\n\n`    [self.navigationController popViewControllerAnimated:YES];`\n\
    `}`\n`- (void)tableView:(UITableView *)tableView`\n`commitEditingStyle:(UITableViewCellEditingStyle)editingStyle`\n\
    `forRowAtIndexPath:(NSIndexPath *)indexPath`\n`{`\n`    if (editingStyle == UITableViewCellEditingStyleDelete)`\n\
    `    {`\n`        [self.hotspots removeObjectAtIndex:indexPath.row];`\n`        [tableView\
    \ deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]`\n`withRowAnimation:UITableViewRowAnimationFade];`\n\
    `        //New call to save data`\n`        [self saveData];`\n`    }`\n`}`\n\
    `- (void)tableView:(UITableView *)tableView moveRowAtIndexPath:(NSIndexPath`\n\
    `*)fromIndexPath toIndexPath:(NSIndexPath *)toIndexPath`\n`{`\n`    Hotspot *movingHotspot\
    \ = [self.hotspots objectAtIndex:fromIndexPath.row];`\n`    [self.hotspots removeObject:movingHotspot];`\n\
    `    [self.hotspots insertObject:movingHotspot atIndex:toIndexPath.row];`\n`    [self.tableViewHotspots\
    \ reloadData];`\n`    //New call to save data`\n`    [self saveData];`\n`}`\n\n\
    Once these calls have been added, your application will be able to automatically\
    \ save any new changes to your data to an outside file, to be read upon the reopening\
    \ of the application!\n\nIn your demo application, you did not implement any saving\
    \ of images to file, even though this is one of the most effective and common\
    \ uses of the iOS file management system. This process is even simpler than the\
    \ foregoing implementation. In order to save an image, acquire the `NSData` object\
    \ representing the image, and then use the `NSFileManager` method `-createFileAtPath:contents:attributes`\
    \ to write out the data. Alternatively, you can use the `NSData` method `-writeToFile:atomically:`\
    \ to perform the same task.\n\nTo acquire the data representing a `UIImage`, you\
    \ can make use of the `UIImagePNGRepresentation()` or `UIImageJPEGRepresentation()`\
    \ functions, which both return `NSData`. To re-build a `UIImage` using `NSData`\
    \ read from a file, use the `+imageWithData:` or `-initWithData:` methods.\n\n\
    ### Core Data\n\nSo far you have dealt with the very quick implementation of `NSUserDefaults`\
    \ for lightweight values, as well as the file management systemfor more complex\
    \ or larger amounts of data. While using the file management system is incredibly\
    \ powerful for storing data, it can easily become quite cumbersome when dealing\
    \ with complex data models of intertwined classes. For such cases of complex data\
    \ models made up of lightweight objects, the best option for persistence becomes\
    \ Core Data. This framework, based around a MySQL table system, allows for easy\
    \ creation, manipulation, and persistence of intricate class interactions and\
    \ properties. The use of this class is quite complex, and thus is covered in great\
    \ detail in the next chapter."
