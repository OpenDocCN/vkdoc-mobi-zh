  trans: "\n每当你使用 `MPMusicPlayerController` 实例时，建议注册通知，以监听播放状态的变化或当前播放歌曲的变化。你可以在 `setNotifications`\
    \ 方法中实现，如下所示：\n\n```\n-(void)setNotifications\n{\n    NSNotificationCenter *notificationCenter\
    \ = [NSNotificationCenter defaultCenter];\n    [notificationCenter\n     addObserver:\
    \ self\n     selector:    @selector (handle_NowPlayingItemChanged:)\n     name:\
    \        MPMusicPlayerControllerNowPlayingItemDidChangeNotification\n     object:\
    \      self.player];\n\n    [notificationCenter\n     addObserver: self\n    \
    \ selector:    @selector (handle_PlaybackStateChanged:)\n     name:        MPMusicPlayerControllerPlaybackStateDidChangeNotification\n\
    \     object:      self.player];\n\n    [notificationCenter addObserver:self\n\
    \                           selector:@selector(volumeChangedHardware:)\nname:@\"\
    AVSystemController_SystemVolumeDidChangeNotification\"\n                     \
    \        object:nil];\n}\n```\n\n此外，你还添加了第三个通知注册，以确保能感知用户通过设备侧边按钮调整设备音量的任何操作。这样，你的应用程序就能像普通音乐播放器一样被使用。\n\
    \n每个通知都会触发一个选择器方法，这些方法定义如下：\n\n```\n-(void)volumeChangedHardware:(id)sender\n\
    {\n    [self.sliderVolume setValue:self.player.volume animated:YES];\n}\n- (void)\
    \ handle_PlaybackStateChanged: (id) notification\n{\n    MPMusicPlaybackState\
    \ playbackState = [self.player playbackState];\n\n    if (playbackState == MPMusicPlaybackStateStopped)\n\
    \    {\n        [self.playButton setTitle:@\"播放\" forState:UIControlStateNormal];\n\
    \        self.infoLabel.text = @\"...\";\n        [self.player stop];\n    }\n\
    \    else if (playbackState == MPMusicPlaybackStatePaused)\n    {\n        [self.playButton\
    \ setTitle:@\"播放\" forState:UIControlStateNormal];\n    }\n    else if (playbackState\
    \ == MPMusicPlaybackStatePlaying)\n    {\n        [self.playButton setTitle:@\"\
    暂停\" forState:UIControlStateNormal];\n    }\n}\n- (void) handle_NowPlayingItemChanged:\
    \ (id) notification\n{\n    MPMediaItem *currentItemPlaying = [self.player nowPlayingItem];\n\
    \    if (currentItemPlaying)\n    {\n        NSString *info = [NSString stringWithFormat:@\"\
    %@ - %@\", [currentItemPlaying valueForProperty:MPMediaItemPropertyTitle], [currentItemPlaying\
    \ valueForProperty:MPMediaItemPropertyArtist]];\n        self.infoLabel.text =\
    \ info;\n    }\n    else\n    {\n        self.infoLabel.text = @\"...\";\n   \
    \ }\n    if (self.player.playbackState == MPMusicPlaybackStatePlaying)\n    {\n\
    \        [self.playButton setTitle:@\"暂停\" forState:UIControlStateNormal];\n \
    \   }\n}\n```\n\n如你所见，当设备音量改变时，你只需通过动画将滑块调整到新值。当设备播放状态改变时，你只需根据新状态调整视图。每当当前播放的歌曲发生变化时，你都会更新用户界面，以显示当前播放媒体项的基本信息。\n\
    \n接下来，你将定义 `MPMediaPickerController` 的两个委托方法，以处理取消和成功选择媒体项的情况：\n\n```\n-(void)mediaPickerDidCancel:(MPMediaPickerController\
    \ *)mediaPicker\n{\n    [self dismissModalViewControllerAnimated:YES];\n}\n-(void)mediaPicker:(MPMediaPickerController\
    \ *)mediaPicker didPickMediaItems:(MPMediaItemCollection *)mediaItemCollection\n\
    {\n    [self updateQueueWithMediaItemCollection:mediaItemCollection];\n    [self\
    \ dismissModalViewControllerAnimated:YES];\n}\n```\n\n`MPMediaItemCollection`\
    \ 是所选媒体项的集合，你可以将其排入 `MPMusicPlayerController` 的队列，并迭代播放。你需要通过定义 `updateQueueWithMediaItemCollection:`\
    \ 方法来更新 `player` 的队列：\n\n```\n-(void)updateQueueWithMediaItemCollection:(MPMediaItemCollection\
    \ *)collection\n{\n    if (collection)\n    {\n        if (self.myCollection ==\
    \ nil)\n        {\n            self.myCollection = collection;\n            [self.player\
    \ setQueueWithItemCollection: self.myCollection];\n            [self.player play];\n\
    \        }\n        else\n        {\n            BOOL wasPlaying = NO;\n     \
    \       if (self.player.playbackState == MPMusicPlaybackStatePlaying) {\n    \
    \            wasPlaying = YES;\n            }\n\n            MPMediaItem *nowPlayingItem\
    \        = self.player.nowPlayingItem;\n            NSTimeInterval currentPlaybackTime\
    \ = self.player.currentPlaybackTime;\n\n            NSMutableArray *combinedMediaItems\
    \ =\n            [[self.myCollection items] mutableCopy];\n            NSArray\
    \ *newMediaItems = [collection items];\n            [combinedMediaItems addObjectsFromArray:\
    \ newMediaItems];\n\n            [self setMyCollection:\n             [MPMediaItemCollection\
    \ collectionWithItems:\n              (NSArray *) combinedMediaItems]];\n\n  \
    \          [self.player setQueueWithItemCollection:self.myCollection];\n\n   \
    \         self.player.nowPlayingItem      = nowPlayingItem;\n            self.player.currentPlaybackTime\
    \ = currentPlaybackTime;\n\n            if (wasPlaying)\n            {\n     \
    \           [self.player play];\n            }\n        }\n    }\n}\n```\n\n这个方法看起来可能有些复杂，但实际上逻辑相当线性。首先，在确认集合不为\
    \ `nil` 后，检查是否已有先前的队列设置。如果没有，就将 `player` 的队列设置为此集合。如果有，则将两个集合合并，将 `player` 的队列设置为合并结果，然后将播放状态恢复到之前的位置。\n\
    \n**提示：** 如果在 `MPMusicPlayerController` 正在播放时更新队列，你可能会注意到播放过程中出现短暂的中断。可以通过使用 `BOOL`\
    \ 标志位，仅在歌曲之间更新队列来规避此问题。\n\n你可以相当简单地定义由按钮和滑块执行的所有方法，以执行各自的命令：\n\n```\n-(void)queuePressed:(id)sender\n\
    {\n    MPMediaPickerController *picker = [[MPMediaPickerController alloc] initWithMediaTypes:MPMediaTypeMusic];\n\
    \    picker.delegate = self;\n    picker.allowsPickingMultipleItems = YES;\n \
    \   picker.prompt =\n    NSLocalizedString (@\"添加要播放的歌曲\",\n                 \
    \      \"媒体项选择器中的提示\");\n    [self presentModalViewController:picker animated:YES];\n\
    }\n-(void)prevPressed:(id)sender\n{\nif ([self.player currentPlaybackTime] > 5.0)\n\
    \    {\n        [self.player skipToBeginning];   \n    }\n    else\n    {\n  \
    \      [self.player skipToPreviousItem];\n    }\n}\n-(void)volumeChanged:(id)sender\n\
    {\n    if (self.player.volume != self.sliderVolume.value)\n    {\n        self.player.volume\
    \ = self.sliderVolume.value;\n    }\n}\n-(void)playPressed:(id)sender\n{\n   \
    \ if ((myCollection != nil) && (self.player.playbackState != MPMusicPlaybackStatePlaying))\n\
    \    {\n        [self.player play];\n        [self.playButton setTitle:@\"暂停\"\
    \ forState:UIControlStateNormal];\n    }\n    else if (self.player.playbackState\
    \ == MPMusicPlaybackStatePlaying)\n    {\n        [self.player pause];\n     \
    \   [self.playButton setTitle:@\"播放\" forState:UIControlStateNormal];\n    }\n\
    }\n-(void)nextPressed:(id)sender\n{\n        [self.player skipToNextItem];\n}\n\
    ```\n\n如你所见，你为用户提供了一个五秒钟的时间窗口，在此期间按下“上一首”按钮会跳转到上一首歌曲，超出此时间窗口则会先跳转到当前歌曲的开头。\n"
- fmt: "你的最后一步是完整实现`-viewDidUnload`方法，以正确处理`player`的设置。由于你在应用启动时注册为三种不同通知的观察者，你需要将视图控制器移除为这些值的观察者。同时，你还要确保`-stop`你的`MPMusicPlayerController`，并将其队列设置为`nil`。完整的方法如下所示：\n\
    \n```\n- (void)viewDidUnload`\n`{\n    [self.player stop];\n    [self.player setQueueWithItemCollection:nil];\n\
    \    [[NSNotificationCenter defaultCenter]\n     removeObserver: self\n     name:\
    \           MPMusicPlayerControllerNowPlayingItemDidChangeNotification\n     object:\
    \         self.player];\n\n    [[NSNotificationCenter defaultCenter]\nremoveObserver:\
    \ self\n     name:           MPMusicPlayerControllerPlaybackStateDidChangeNotification\n\
    \     object:         self.player];\n\n    [[NSNotificationCenter defaultCenter]\
    \ removeObserver:self name:@\"AVSystemController_SystemVolumeDidChangeNotification\"\
    \  object:nil];\n\n    [self.player endGeneratingPlaybackNotifications];\n   \
    \ self.myCollection = nil;\n    self.player = nil;\n    [self setQueueButton:nil];\n\
    \    [self setPrevButton:nil];\n    [self setPlayButton:nil];\n    [self setNextButton:nil];\n\
    \    [self setSliderVolume:nil];\n    [self setInfoLabel:nil];\n    [super viewDidUnload];\n\
    }\n```\n\n运行此应用时需要注意一点：在开始播放音乐之前，你将无法通过外部音量按钮调整`AVAudioPlayer`的音量，因为这些按钮仍会控制铃声音量，而非播放音量。一旦你选择一首歌曲播放，这些按钮就会完全控制播放音量。\n\
    \n你可能已经看到这个框架为开发者提供的强大功能。通过访问用户自己的媒体库，你可以为用户的应用打开一个全新的音频定制层级，可能性包括选择闹钟音乐，或为游戏指定背景音乐。通过赋予用户选择和个性化的能力，你的应用的市场竞争力和功能性将显著提升。\n\
    \n## 查询媒体\n\n现在你已经了解了让用户选择音乐的简单方法，接下来可以实现更强大的方法来查询、过滤和排序用户媒体库中的音乐。\n\n此处你只需在前一个配方的基础上添加功能，具体地，允许用户输入艺术家名称，然后查询媒体库中该艺术家的音乐。\n\
    \n首先，在前一个配方剩余的 XIB 中添加一个`UIButton`和一个`UITextField`，使视图看起来像[图7-7](#Chapter07.html#fig_7_7)。\n\
    \n![Image](images/9781430240051_Fig07-07.jpg)\n\n**图7-7.** *用于查询音乐的用户界面*\n\n确保正确将此按钮连接到名为`-queryPressed:`的操作，并将文本字段连接到名为`textFieldArtist`的属性。\n\
    \n你首先要对新添加的`UITextField`设置其代理为你的视图控制器，在`-viewDidLoad`中添加以下代码：\n\n```\nself.textFieldArtist.delegate\
    \ = self;\nself.textFieldArtist.enablesReturnKeyAutomatically = YES;\n```\n\n\
    确保调整你的头文件，声明视图控制器遵循`UITextFieldDelegate`协议。\n\n接下来，你需要实现以下`UITextField`代理方法，以便在按下返回键时正确关闭键盘：\n\
    \n```\n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n{\n    [textField\
    \ resignFirstResponder];\n    return NO;\n}\n```\n\n你也可以选择在`-textFieldShouldReturn:`方法中包含对`-queryPressed:`（稍后实现）的调用，这样当按下返回键时自动执行查询。我选择不这样做，以防用户希望在当前歌曲播放完后才执行查询。\n\
    \n接下来实现`-queryPressed:`方法：\n\n```\n-(void)queryPressed:(id)sender\n{\n    NSString\
    \ *artist = self.textFieldArtist.text;\n    if (artist != nil && artist != @\"\
    \")\n    {\n        MPMediaPropertyPredicate *artistPredicate = [MPMediaPropertyPredicate\
    \ predicateWithValue:artist forProperty:MPMediaItemPropertyArtist comparisonType:MPMediaPredicateComparisonContains];\n\
    \        MPMediaQuery *query = [[MPMediaQuery alloc] init];\n        [query addFilterPredicate:artistPredicate];\n\
    \n        NSArray *result = [query items];\nif ([result count] > 0)\n        {\n\
    \            [self updateQueueWithMediaItemCollection:[MPMediaItemCollection collectionWithItems:result]];\n\
    \        }\n        else\n            self.infoLabel.text = @\"Artist Not Found.\"\
    ;\n    }\n}\n```\n\n可以看到，查询媒体库是一个相当简单的过程，其最低要求仅需要一个`MPMediaQuery`类的实例。然后你可以向查询添加`MPMediaPropertyPredicates`以使其更具体。\n\
    \n使用`MPMediaPropertyPredicates`需要对不同的`MPMediaItemProperties`有充分的了解，以便准确知道可以获取哪些信息。并非所有`MPMediaItemProperties`都是可过滤的，而且如果你处理的是播客，可过滤的属性也不同。你应该查阅关于`MPMediaItem`的\
    \ Apple 文档以获取完整属性列表，但以下是常用属性列表：\n\n*   `MPMediaItemPropertyMediaType`\n*   `MPMediaItemPropertyTitle`\n\
    *   `MPMediaItemPropertyAlbumTitle`\n*   `MPMediaItemPropertyArtist`\n*   `MPMediaItemPropertyArtwork`\n\
    \n**提示：** 使用`MPMediaItemPropertyArtwork`时，可以使用`MPMediaItemPropertyArtwork`中定义的`-imageWithSize:`方法来创建`UIImage`。"
  raw: 'Your very last step in this project is to fully implement your `-viewDidUnload`
    method to correctly handle your `player`''s setup. Since you registered as an
    observer for three different kinds of notifications at the beginning of your application,
    you need to remove your view controller as an observer of these values. You will
    also be sure to `-stop` your `MPMusicPlayerController` and set its queue to `nil`.
    In its entirety, the method will look like so:


    `- (void)viewDidUnload`

    `{`

    `    [self.player stop];`

    `    [self.player setQueueWithItemCollection:nil];`

    `    [[NSNotificationCenter defaultCenter]`

    `     removeObserver: self`

    `     name:           MPMusicPlayerControllerNowPlayingItemDidChangeNotification`

    `     object:         self.player];`


    `    [[NSNotificationCenter defaultCenter]`

    `removeObserver: self`

    `     name:           MPMusicPlayerControllerPlaybackStateDidChangeNotification`

    `     object:         self.player];`


    `    [[NSNotificationCenter defaultCenter] removeObserver:self name:@"AVSystemController_SystemVolumeDidChangeNotification"  object:nil];`


    `    [self.player endGeneratingPlaybackNotifications];`

    `    self.myCollection = nil;`

    `    self.player = nil;`

    `    [self setQueueButton:nil];`

    `    [self setPrevButton:nil];`

    `    [self setPlayButton:nil];`

    `    [self setNextButton:nil];`

    `    [self setSliderVolume:nil];`

    `    [self setInfoLabel:nil];`

    `    [super viewDidUnload];`

    `}`


    One thing to note when you run this application is that until you start playing
    music, you will not be able to adjust your `AVAudioPlayer`''s volume by using
    the external volume buttons, as these will still control the ringer volume, as
    opposed to the playback volume. Once you select a song to play, you will receive
    full control over the playback volume through these buttons.


    You can probably see the pure power that this framework provides the developer.
    By being able to access the user''s own library, you can open up a whole new level
    of audio customization for your application by the user, with possibilities ranging
    from selecting music to awake to, to specifying your own background music to a
    game. By giving a user the power of choice and personalization, your application''s
    marketability and functionality increase tenfold.


    #### Querying Media


    Now that you have seen a very simple way to allow the user to select music, you
    can implement an even more powerful way to query, filter, and sort music from
    the user''s media library.


    Here you will simply be taking the previous recipe and adding functionality to
    it, specifically by allowing the user to type the name of an artist and then querying
    the library for music by that artist.


    First, you will add a `UIButton` as well as a `UITextField` to your XIB remaining
    from your previous recipe, so that your view now looks like [Figure 7–7](#Chapter07.html#fig_7_7).


    ![Image](images/9781430240051_Fig07-07.jpg)


    **Figure 7–7.** *User interface for querying music*


    Make sure to correctly connect this button to an action called `-queryPressed:`
    and the text field to a property called `textFieldArtist`.


    The first thing you will do with your new `UITextField` is to set its delegate
    to your view controller by adding the following lines to your `-viewDidLoad`.


    `self.textFieldArtist.delegate = self;`

    `self.textFieldArtist.enablesReturnKeyAutomatically = YES;`


    Make sure to adjust your header file to declare that your view controller will
    conform to the `UITextFieldDelegate` protocol.


    Next, you need to implement the following `UITextField` delegate method to have
    your text field correctly dismiss the keyboard upon the pressing of the return
    key.


    `-(BOOL)textFieldShouldReturn:(UITextField *)textField`

    `{`

    `    [textField resignFirstResponder];`

    `    return NO;`

    `}`


    You may choose to also include a call to `-queryPressed:` (which you will implement
    momentarily) from the `-textFieldShouldReturn:` method, so that when the return
    key is pressed the query is automatically performed. I opted against doing this
    in case the user wants to wait to perform the query after the current song has
    finished.


    Next implement the `-queryPressed:` method.


    `-(void)queryPressed:(id)sender`

    `{`

    `    NSString *artist = self.textFieldArtist.text;`

    `    if (artist != nil && artist != @"")`

    `    {`

    `        MPMediaPropertyPredicate *artistPredicate = [MPMediaPropertyPredicate
    predicateWithValue:artist forProperty:MPMediaItemPropertyArtist comparisonType:MPMediaPredicateComparisonContains];`

    `        MPMediaQuery *query = [[MPMediaQuery alloc] init];`

    `        [query addFilterPredicate:artistPredicate];`


    `        NSArray *result = [query items];`

    `if ([result count] >` `0``)`

    `        {`

    `            [self updateQueueWithMediaItemCollection:[MPMediaItemCollection collectionWithItems:result]];`

    `        }`

    `        else`

    `            self.infoLabel.text = @"Artist Not Found.";`

    `    }`

    `}`


    As you can see, querying the media library is a fairly simple process, which at
    its bare minimum requires only an instance of the `MPMediaQuery` class. You can
    then add `MPMediaPropertyPredicates` to a query to make it more specific.


    Using `MPMediaPropertyPredicates` requires a decent knowledge of the different
    `MPMediaItemProperties`, so that you can know exactly what kind of information
    you can acquire. Not all `MPMediaItemProperties` are filterable, and the filterable
    properties are also different if you are dealing specifically with a podcast.
    You should refer to the Apple documentation on `MPMediaItem` for a full list of
    properties, but following is a list of the most commonly used ones:


    *   `MPMediaItemPropertyMediaType`

    *   `MPMediaItemPropertyTitle`

    *   `MPMediaItemPropertyAlbumTitle`

    *   `MPMediaItemPropertyArtist`

    *   `MPMediaItemPropertyArtwork`


    **TIP:** Whenever you are using the `MPMediaItemPropertyArtwork`, you can use
    the `-imageWithSize:` method defined in `MPMediaItemPropertyArtwork` to create
    a `UIImage` from the artwork.'
