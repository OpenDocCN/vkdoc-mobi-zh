    **图 1–28.** *ARC 转换问题列表*


    在继续转换之前，你需要纠正所有问题。一旦问题得到纠正，系统将提示你开始转换。图 1–29 显示了一个详细说明转换过程的窗口。第一步是为你的应用程序源代码拍摄快照，以便你可以还原。下一个窗口将显示将要对你的代码进行的任何更改。这与你在向源代码控制仓库提交更改时看到的窗口相同。最常见的更改包括移除
