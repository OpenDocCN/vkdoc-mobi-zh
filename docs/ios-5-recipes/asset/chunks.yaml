  trans: "\n如果你不需要了解玩家的每一帧更新（例如，当玩家在屏幕上移动时，你只需知道当前位置，而非其历史轨迹），也可以用 `withDataMode:GKMatchSendDataUnreliable`\
    \ 发送数据。在这种情况下，你依然需要确保玩家能收到你的数据（即他们正在猜测的单词），因此你应该使用 `GKMatchSendDataReliable` 发送。\n\
    \n在展示如何接收数据之前，我们先来看看如何配置比赛。添加以下委托方法，以便在玩家状态改变时通知你的游戏。当所有玩家都加入游戏后，`expectedPlayerCount`\
    \ 将变为 0，此时即可开始游戏。你需要确定哪位玩家先手，因此让每位玩家用 `arc4random()` 生成一个 0 到 999 之间的随机数，然后通过你之前的\
    \ `sendData` 方法发送这个随机数。\n\n```\n- (void)match:(GKMatch *)match player:(NSString\
    \ *)playerID\ndidChangeState:(GKPlayerConnectionState)state\n{\n    switch (state)\n\
    \    {\n        case GKPlayerStateConnected:\n            // 处理新玩家连接。\n      \
    \      break;\n        case GKPlayerStateDisconnected:\n            [[[UIAlertView\
    \ alloc] initWithTitle:@\"警告\" message:@\"对手离开了游戏\" delegate:nil cancelButtonTitle:@\"\
    确定\" otherButtonTitles:nil] show];\n            break;\n    }\n    if (!self.matchStarted\
    \ && match.expectedPlayerCount == 0)\n    {\n        self.matchStarted = YES;\n\
    \        // 处理初始比赛协商。\n        randomPlayerStartKey=arc4random() % 1000;\n   \
    \     NSDictionary *dictionaryRandomStart=[NSDictionary\n                    \
    \                         dictionaryWithObject:[NSNumber\nnumberWithInt:randomPlayerStartKey]\n\
    \                                             forKey:@\"randomStartKey\"];\n \
    \       [self sendData:dictionaryRandomStart];\n\n    }\n}\n```\n\n现在，你收到了第一条数据——即刚才生成的随机数。你首先需要将接收到的\
    \ `NSData` 解码为字典。然后检查键 `randomStartKey`；如果存在，则比较该值与你自己生成的随机数。若你的数字更大，则将弹出一个输入框，由你输入一个单词并发送给对手猜测。为了完善实现，还需要添加几个其他处理器：`WordToGuess`、`gameWon`\
    \ 和 `gameLost`。\n\n```\n- (void)match:(GKMatch *)match didReceiveData:(NSData\
    \ *)data fromPlayer:(NSString\n*)playerID\n{\n    NSKeyedUnarchiver *unarchiver\
    \ = [[NSKeyedUnarchiver alloc]\ninitForReadingWithData:data];\n    NSDictionary\
    \ *myDictionary = [unarchiver decodeObjectForKey:@\"DataDictionary\"];\n    [unarchiver\
    \ finishDecoding];\n    NSLog(@\"收到字典: %@\", myDictionary);\n\n    if([myDictionary\
    \ valueForKey:@\"randomStartKey\"]!=nil){\n        NSNumber *otherRandomStartKey=[myDictionary\
    \ valueForKey:@\"randomStartKey\"];\n        if([otherRandomStartKey integerValue]>randomPlayerStartKey){\n\
    \            // 如果对方的随机数更大，则由对方发送单词\n        }else{\n            // 我的随机数更大，因此由我发送单词\n\
    \            UIAlertView *wordPrompt=[[UIAlertView alloc] initWithTitle:@\"输入单词：\"\
    \nmessage:@\"请输入对手需要解码的单词\" delegate:self cancelButtonTitle:@\"取消\"\notherButtonTitles:@\"\
    确定\", nil];\n            wordPrompt.alertViewStyle=UIAlertViewStylePlainTextInput;\n\
    \            [wordPrompt show];\n        }\n    }else if([myDictionary valueForKey:@\"\
    WordToGuess\"]!=nil){\n// 如果对方发送了待猜测的单词\n        [self setWord:[myDictionary valueForKey:@\"\
    WordToGuess\"]];\n        [self.activityIndicator stopAnimating];\n    }else if([myDictionary\
    \ valueForKey:@\"gameWon\"]!=nil){\n// 如果对方赢了游戏\n        int guessCount=[[myDictionary\
    \ valueForKey:@\"gameWon\"] integerValue];\n        [[[UIAlertView alloc] initWithTitle:@\"\
    你的对手获胜！\" message:[NSString\nstringWithFormat:@\"下次好运。错误猜测次数：%i\", guessCount]\
    \ delegate:nil\ncancelButtonTitle:@\"确定\" otherButtonTitles:nil] show];\n    }else\
    \ if([myDictionary valueForKey:@\"gameLost\"]!=nil){\n        [[[UIAlertView alloc]\
    \ initWithTitle:@\"你赢了！\" message:@\"他们没能猜出你的单词\" delegate:nil cancelButtonTitle:@\"\
    确定\" otherButtonTitles:nil] show];\n    }\n}\n```\n\n由于你需要提示输入要发送的单词，因此应该检查字典并确保其为合法单词。由于你已将类设置为\
    \ `.h` 文件中的 `UIAlertViewDelegate`，并将提示框的委托设置为 self，因此可以添加以下方法，在将提交的单词发送给对手之前对其进行处理：\n\
    \n```\n- (void)alertView:(UIAlertView *)alertView\ndidDismissWithButtonIndex:(NSInteger)buttonIndex{\n\
    \    if(buttonIndex==1){\n        NSLog(@\"提示框文本: %@\", [alertView textFieldAtIndex:0].text);\n\
    \        NSString *potentialWord=[alertView textFieldAtIndex:0].text;\n\n    \
    \    NSString *path = [[NSBundle mainBundle] pathForResource:@\"wordlist\"\n \
    \                                                        ofType:@\"txt\"];\n \
    \       NSString *content = [NSString stringWithContentsOfFile:path\n        \
    \                                              encoding:NSUTF8StringEncoding\n\
    \                                                         error:NULL];\n\n   \
    \     NSArray *lines = [content componentsSeparatedByString:@\"\\n\"];\n\n   \
    \     BOOL wordMatch=NO;\n        while(wordMatch==NO){\n            for (NSString\
    \ *word in lines) {\n                if([word isEqualToString:potentialWord]){\n\
    \                    NSDictionary *myDictionary = [NSDictionary\ndictionaryWithObject:[alertView\
    \ textFieldAtIndex:0].text forKey:@\"WordToGuess\"];\n                    [self\
    \ sendData:myDictionary];\n                    wordMatch=YES;\n              \
    \      break;\n                }\n            }\n            if(wordMatch==NO){\n\
    \                UIAlertView *wordPrompt=[[UIAlertView alloc] initWithTitle:@\"\
    未找到单词\"\nmessage:@\"字典中未找到您的单词，请为对手输入一个新单词进行解码：\" delegate:self cancelButtonTitle:@\"\
    取消\"\notherButtonTitles:@\"确定\", nil];\n                wordPrompt.alertViewStyle=UIAlertViewStylePlainTextInput;\n\
    \                [wordPrompt show];\n            }\n        }\n    }\n}\n```\n\
    \n现在你已经实现了数据的双向发送，可以使用 `sendData` 方法发送游戏通知（例如胜负结果），但首先需要确认是否处于比赛状态。以下示例代码展示了如何检查是否在比赛中：\n\
    \n```\nif(self.match){\n\n                NSDictionary *dictionaryGameWon=[NSDictionary\n\
    \                                                     dictionaryWithObject:[NSNumber\n\
    numberWithInt:self.badGuessCount]\n                                          \
    \           forKey:@\"gameWon\"];\n                [self sendData:dictionaryGameWon];\n\
    \n            }\n```\n\n上述代码应放置在 `GameScene.m` 的 `-processGuess` 方法末尾附近。\n"
