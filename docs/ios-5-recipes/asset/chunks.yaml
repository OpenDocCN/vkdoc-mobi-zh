    \n![Image](images/9781430240051_Fig07-10.jpg)\n\n**Figure 7–10.** *Setting the\
    \ application category*\n\nFor the Application Category item, open the drop-down\
    \ menu by clicking the pair of arrows, and then select “Required Background modes”."
  raw: '#### A Few Notes on MPMediaPropertyPredicates:


    **3.** Whenever multiple filter predicates specifying different properties are
    added to a query, the predicates are evaluated using the AND operator, meaning
    that if you specify an artist name and an album name, you will receive only songs
    by that artist AND from that specific album.


    **4.** Do not add two filter predicates of the same property to a query, as the
    resulting behavior is not defined. If you wish to query a database for multiple
    specific values of the same property, such as filtering for all songs by two different
    artists, the better method is to simply create two queries, and then combine their
    results afterward.


    **5.** The `comparisonType` property of an `MPMediaPropertyPredicate` helps specify
    how exact you want your predicate to be. A value of `MPMediaPredicateComparisonEqualTo`
    returns only items with the string exactly equal to the given one, while a value
    of `MPMediaPredicateComparisonContains`, as shown earlier, returns items that
    contain the given string, proving to be usually a less specific search.


    As an added functionality, `MPMediaQuery`s can also be given a “grouping property”,
    so that they automatically group their results. You could, for example, filter
    a query by a specific artist, but group according to the album name. In this way,
    you can retrieve all the songs by a specific artist but iterate through them as
    if they were in albums, as demonstrated by the following code, which could be
    added to your `-queryPressed:` method, in which the following `query` object is
    created.


    `[query setGroupingType: MPMediaGroupingAlbum];`


    `        NSArray *albums = [query collections];`

    `        for (MPMediaItemCollection *album in albums)`

    `        {`

    `            MPMediaItem *representativeItem = [album representativeItem];`

    `            NSString *albumName = [representativeItem valueForProperty: MPMediaItemPropertyAlbumTitle];`

    `            NSLog (@"%@", albumName);`

    `        }`


    You can also set a grouping type by using class methods, such as `+albumsQuery`,
    for `MPMediaQuery`, which will create your `query` instance with a pre-set grouping
    property.


    ### Recipe 7–4: Background Playing and Now Playing Info


    So far you have seen multiple techniques for dealing with audio in iOS, from playing
    a single sound, to accessing the library, to utilizing the iPod player. Each technique
    tends to have its pros, cons, and specific uses depending on the goal of your
    application.


    However, when all these functionalities are used in conjunction, the possibilities
    for your app become nearly limitless. Here, you will combine the use of the `AVFoundation`,
    `MPMediaQuery`, `MPMediaPickerController`, and `MPNowPlayingInfoCenter` (a new
    iOS 5.0 feature!) to create your own version, albeit a less pretty one, of the
    iPod user interface such that your music can continue to play even if your application
    is in the background.


    Make a new project using the Single View Application template, naming it “Chapter7Recipe3”,
    with class prefix “Main”.


    Next, you will make sure all the frameworks you need are imported. Go ahead and
    link the following frameworks to your project, exactly as you have in all the
    previous recipes in this chapter.


    *   `AVFoundation.framework`: You will use this to play your audio files.

    *   `MediaPlayer.framework`: This will allow you to access your library and media
    files.

    *   `CoreMedia.framework`: You won''t use any classes from this framework, but
    you will need some of the `CMTime` functions to help deal with your audio player.


    Add the following import statements to your view controller''s header file. You
    do not need one for the Core Media framework in this project.


    `#import <MediaPlayer/MediaPlayer.h>`

    `#import <AVFoundation/AVFoundation.h>`


    Your view controller is also going to end up as the delegate for several objects,
    so add protocol statements to your header file for the following protocols:


    *   `UITextFieldDelegate`

    *   `AVAudioSessionDelegate`

    *   `MPMediaPickerControllerDelegate`


    Next you will set up your app to be able to continue playing music once it has
    entered the background of the device. The first thing you need to do is declare
    a property of type `AVAudioSession`, called `session`. Make sure to @synthesize
    it, and then in your `-viewDidUnload` set it to `nil` as usual.


    `@property (nonatomic, strong) AVAudioSession *session;`


    Next, add the following code to your `-viewDidLoad` method:


    `self.session = [AVAudioSession sharedInstance];`

    `self.session.delegate = self;`

    `[self.session setCategory:AVAudioSessionCategoryPlayback error:nil];`

    `[self.session setActive:YES error:nil];`


    By specifying that your `session`''s category is of type `AVAudioSessionCategoryPlayback`,
    you are telling your device that your application''s main focus is playing music,
    and should therefore be allowed to continue playing audio while the application
    is in the background.


    You need to also make sure your session is deactivated when you are done with
    it, so add the following line to your `-viewDidUnload` method.


    `[self.session setActive:NO error:nil];`


    Now that you have configured your `AVAudioSession`, you need to edit your application''s
    `.plist` file in order to specify that your application, when in the background,
    must be allowed to run audio. You can usually find this file in the Supporting
    Files group of your project. If not, you can find the file in your project''s
    folder, as in [Figure 7–8](#Chapter07.html#fig_7_8).


    ![Image](images/9781430240051_Fig07-08.jpg)


    **Figure 7–8.** *Finding the `.plist` file*


    By default, this file should open in Xcode, resembling [Figure 7–9](#Chapter07.html#fig_7_9).


    ![Image](images/9781430240051_Fig07-09.jpg)


    **Figure 7–9**. *Editing the `.plist` file*


    Under the Editor menu, select **Add Item**. A new item should appear, looking
    like [Figure 7–10](#Chapter07.html#fig_7_10).


    ![Image](images/9781430240051_Fig07-10.jpg)


    **Figure 7–10.** *Setting the application category*


    For the Application Category item, open the drop-down menu by clicking the pair
    of arrows, and then select “Required Background modes”.'
  trans: "\n### `MPMediaPropertyPredicates` 的几点说明：\n\n**3.**  当向查询添加多个指定不同属性的筛选谓词时，这些谓词会使用“与”（AND）运算符进行求值。这意味着，如果你指定了艺术家姓名和专辑名称，你将只会收到该艺术家**并且**来自该特定专辑的歌曲。\n\
    \n**4.**  不要向一个查询添加两个针对同一属性的筛选谓词，因为其行为结果是未定义的。如果你想针对同一属性的多个特定值查询数据库，例如筛选来自两位不同艺术家的所有歌曲，更好的方法是简单地创建两个查询，然后将它们的结果合并起来。\n\
    \n**5.**  `MPMediaPropertyPredicate` 的 `comparisonType` 属性有助于指定你的谓词匹配的精确程度。值为\
    \ `MPMediaPredicateComparisonEqualTo` 时，仅返回字符串与给定字符串完全匹配的项目；而值为 `MPMediaPredicateComparisonContains`\
    \ 时（如前所示），则返回包含给定字符串的项目，这通常意味着搜索精度较低。\n\n作为一项附加功能，`MPMediaQuery` 还可以被赋予一个“分组属性”，以便其自动对结果进行分组。例如，你可以按特定艺术家筛选查询，但根据专辑名称进行分组。通过这种方式，你可以检索特定艺术家的所有歌曲，但像按专辑分组那样进行迭代处理，如下列代码所示。你可以将这些代码添加到你的\
    \ `-queryPressed:` 方法中，在该方法中创建了以下 `query` 对象。\n\n```\n[query setGroupingType:\
    \ MPMediaGroupingAlbum];\n        NSArray *albums = [query collections];\n   \
    \     for (MPMediaItemCollection *album in albums)\n        {\n            MPMediaItem\
    \ *representativeItem = [album representativeItem];\n            NSString *albumName\
    \ = [representativeItem valueForProperty: MPMediaItemPropertyAlbumTitle];\n  \
    \          NSLog (@\"%@\", albumName);\n        }\n```\n\n你也可以通过使用类方法来设置分组类型，例如\
    \ `MPMediaQuery` 的 `+albumsQuery`，这将会为你创建一个预先设置了分组属性的 `query` 实例。\n\n### 技巧 7–4：后台播放与正在播放信息\n\
    \n到目前为止，你已经了解了在 iOS 中处理音频的多种技术：从播放单个音效，到访问媒体库，再到使用 iPod 播放器。每种技术根据你应用的目标，都各有其优缺点和特定用途。\n\
    \n然而，当所有这些功能结合使用时，你应用的潜力将变得几乎是无限的。在这里，你将结合使用 `AVFoundation`、`MPMediaQuery`、`MPMediaPickerController`\
    \ 和 `MPNowPlayingInfoCenter`（iOS 5.0 的新特性！），来创建你自己版本的 iPod 用户界面（尽管不如原版美观），以便即使你的应用在后台运行，音乐也能继续播放。\n\
    \n使用“单视图应用程序”（Single View Application）模板创建一个新项目，将其命名为“Chapter7Recipe3”，类前缀为“Main”。\n\
    \n接下来，你需要确保所有必需的框架都已导入。继续将以下框架链接到你的项目中，操作方式与你本章中之前的所有技巧完全相同。\n\n- `AVFoundation.framework`：你将使用此框架来播放音频文件。\n\
    - `MediaPlayer.framework`：此框架将允许你访问媒体库和媒体文件。\n- `CoreMedia.framework`：你不会使用此框架中的任何类，但你需要用到一些\
    \ `CMTime` 函数来帮助你处理音频播放器。\n\n在你的视图控制器头文件中添加以下导入语句。在这个项目中，你不需要为 Core Media 框架添加导入语句。\n\
    \n```\n#import <MediaPlayer/MediaPlayer.h>\n#import <AVFoundation/AVFoundation.h>\n\
    ```\n\n你的视图控制器最终还将成为多个对象的代理，因此请为以下协议在你的头文件中添加协议声明：\n\n- `UITextFieldDelegate`\n\
    - `AVAudioSessionDelegate`\n- `MPMediaPickerControllerDelegate`\n\n接下来，你将设置你的应用，使其在进入设备后台后能够继续播放音乐。你需要做的第一件事是声明一个类型为\
    \ `AVAudioSession` 的属性，命名为 `session`。确保使用 `@synthesize` 合成它，然后像往常一样，在你的 `-viewDidUnload`\
    \ 方法中将其设置为 `nil`。\n\n```\n@property (nonatomic, strong) AVAudioSession *session;\n\
    ```\n\n然后，在你的 `-viewDidLoad` 方法中添加以下代码：\n\n```\nself.session = [AVAudioSession\
    \ sharedInstance];\nself.session.delegate = self;\n[self.session setCategory:AVAudioSessionCategoryPlayback\
    \ error:nil];\n[self.session setActive:YES error:nil];\n```\n\n通过将你的 `session`\
    \ 的类别指定为 `AVAudioSessionCategoryPlayback`，你是在告知设备你的应用主要功能是播放音乐，因此应允许应用在后台时继续播放音频。\n\
    \n你还需要确保在完成使用后停用你的会话，因此请在 `-viewDidUnload` 方法中添加以下代码行。\n\n```\n[self.session setActive:NO\
    \ error:nil];\n```\n\n现在你已经配置好了 `AVAudioSession`，你需要编辑应用的 `.plist` 文件，以指定你的应用在后台时必须允许运行音频。你通常可以在项目的“支持文件”（Supporting\
    \ Files）组中找到这个文件。如果找不到，你可以在项目的文件夹中找到它，如图 7–8 所示。\n\n![图片](img/9781430240051_Fig07-08.jpg)\n\
    \n**图 7–8.** *查找 `.plist` 文件*\n\n默认情况下，该文件应在 Xcode 中打开，类似于图 7–9。\n\n![图片](img/9781430240051_Fig07-09.jpg)\n\
    \n**图 7–9**. *编辑 `.plist` 文件*\n\n在“编辑器”（Editor）菜单下，选择**添加项目（Add Item）**。应该会出现一个新项目，看起来像图\
    \ 7–10。\n\n![图片](img/9781430240051_Fig07-10.jpg)\n\n**图 7–10.** *设置应用类别*\n\n对于“应用类别”（Application\
    \ Category）项目，点击箭头对打开下拉菜单，然后选择“所需的后台模式”（Required Background modes）。\n"
- fmt: "点击该项目新项的左侧箭头，展开值列表。您将编辑“Item 0”的值。点击右侧下拉菜单，选择“App plays audio”，如图 7–11 所示。或者，您也可以在值字段中键入`audio`，按下回车键后，Xcode\
    \ 将自动更正该值。\n\n![Image](images/9781430240051_Fig07-11.jpg)\n\n**Figure 7–11.**\
    \ *Specifying background audio capabilities*\n\n现在，您的应用程序已准备好支持在后台状态下播放音频！\n\n\
    接下来，您将在 XIB 文件中构建用户界面。设置您的视图，使其外观如图 7–12 所示。\n\n![Image](images/9781430240051_Fig07-12.jpg)\n\
    \n**Figure 7–12.** *User interface for your custom music player*\n\n在本项目中，将为显示的视图元素分配以下变量名，请按所示名称将每个元素连接到您的头文件中：\n\
    \n*   `infoLabel`：视图顶部的`UILabel`，用于显示当前歌曲信息。\n*   `textFieldSong`：您的`UITextField`，为其设置了占位符文本“Song”。\n\
    *   `queryButton`：标题为“Query”的上方`UIButton`。\n*   `artworkImageView`：您的`UIImageView`，用于显示歌曲的专辑封面。\n\
    *   `libraryButton`：大的“Library”`UIButton`。\n*   `playButton`：中间的“Play”`UIButton`。\n\
    *   `nextButton`：右侧的“Next”`UIButton`。\n*   `prevButton`：左侧的“Prev”`UIButton`。\n\
    \n为您将使用的五个按钮定义操作，并将每个按钮连接到其对应的方法。您的方法声明应如下所示：\n\n```\n-(IBAction)queryPressed:(id)sender;\n\
    -(IBAction)nextPressed:(id)sender;\n-(IBAction)prevPressed:(id)sender;\n-(IBAction)playPressed:(id)sender;\n\
    -(IBAction)libraryPressed:(id)sender;\n```\n\n接下来，您将声明运行应用程序所需的其他属性对象。对于以下每个属性，请确保对其进行合成，并在应用程序结束时将其正确设置为`nil`。首先，您将使用`AVQueuePlayer`类的实例来播放和排队声音文件，因此将其声明为一个属性：\n\
    \n```\n@property (nonatomic, strong) AVQueuePlayer *player;\n```\n\n为了管理您的`player`，您需要两个`NSMutableArray`类型的副本来管理其播放列表。一个数组包含所有已排队的原始`MPMediaItem`类项（您可以从中访问媒体信息），另一个数组包含它们全部转换为`AVPlayerItem`实例后的项（您可以通过`AVQueuePlayer`播放它们）。您还需要一个`NSUInteger`类型的属性来帮助跟踪当前播放的项。这些属性将按如下方式声明，确保正确合成并将每个属性设为`nil`：\n\
    \n```\n@property (nonatomic, strong) NSMutableArray *playlist;\n@property (nonatomic,\
    \ strong) NSMutableArray *myCollection;\n@property (nonatomic) NSUInteger currentIndex;\n\
    ```\n\n现在，您要在实现文件中完成的第一件事是编写`-viewDidLoad`方法，使其如下所示：\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    self.session = [AVAudioSession sharedInstance];\n\
    \    self.session.delegate = self;\n    [self.session setCategory:AVAudioSessionCategoryPlayback\
    \ error:nil];\n    [self.session setActive:YES error:nil];\n\n    self.textFieldSong.delegate\
    \ = self;\n    [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n\
    }\n```\n\n这里新增的代码只是确认`playButton`的标题设置正确，并将您的视图控制器设置为`UITextField`的代理。实现`UITextFieldDelegate`方法来处理键盘的关闭，如下所示：\n\
    \n```\n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n{\n    [textField\
    \ resignFirstResponder];\n    return NO;\n}\n```\n\n您还需要重写`playlist`的 getter 方法，以确保其正确初始化。\n\
    \n```\n-(NSMutableArray *)playlist\n{\n    if (!playlist)\n    {\n        playlist\
    \ = [[NSMutableArray alloc] initWithCapacity:5];\n    }\n    return playlist;\n\
    }\n```\n\n您还需要重写`currentIndex`的 getter 方法，使其始终返回当前播放项的正确索引。\n\n```\n-(NSUInteger)currentIndex\n\
    {\n    currentIndex = [self.playlist indexOfObject:self.player.currentItem];\n\
    \    return currentIndex;\n}\n```\n\n接下来，您将实现一个方法，该方法会在每次歌曲切换时更新用户界面。\n\n```\n\
    -(void)updateNowPlaying\n{\n    if (self.player.currentItem != nil)\n    {\n \
    \       MPMediaItem *nowPlaying = [self.myCollection objectAtIndex:self.currentIndex];\n\
    //        NSLog(@\"%@\", [nowPlaying valueForProperty:MPMediaItemPropertyTitle]);\n\
    \n        self.infoLabel.text = [NSString stringWithFormat:@\"%@ - %@\", [nowPlaying\
    \ valueForProperty:MPMediaItemPropertyTitle],  [nowPlaying valueForProperty:MPMediaItemPropertyArtist]];\n\
    \n        UIImage *artwork = [[nowPlaying valueForProperty:MPMediaItemPropertyArtwork]\
    \ imageWithSize:self.artworkImageView.frame.size];\n        if (artwork)\n   \
    \     {\n            self.artworkImageView.image = artwork;\n        }\n     \
    \   else\n        {\n            self.artworkImageView.image = nil;\n        }\n\
    \        if ([MPNowPlayingInfoCenter class])  \n        {\n            NSString\
    \ *title = [nowPlaying valueForProperty:MPMediaItemPropertyTitle];\n         \
    \   NSString *artist = [nowPlaying valueForProperty:MPMediaItemPropertyArtist];\n\
    \            NSDictionary *currentlyPlayingTrackInfo = [NSDictionary\ndictionaryWithObjects:[NSArray\
    \ arrayWithObjects:title, artist, nil] forKeys:[NSArray\narrayWithObjects:MPMediaItemPropertyTitle,\
    \ MPMediaItemPropertyArtist, nil]];\n            [MPNowPlayingInfoCenter defaultCenter].nowPlayingInfo\
    \ =\ncurrentlyPlayingTrackInfo;\n        }\n    }\n    else\n    {\n        self.infoLabel.text\
    \ = @\"...\";\n        [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n\
    \        self.artworkImageView.image = nil;\n    }\n}\n```\n\n刚才展示的方法除了更新用户界面以显示当前歌曲信息外，还利用了\
    \ iOS 5 的一个新功能，即`MPNowPlayingInfoCenter`！这个类允许开发者将信息放置在设备的锁屏上，或者当应用程序通过 AirPlay\
    \ 显示信息时放置在其他设备上。您可以通过将`+defaultCenter`的`nowPlayingInfo`属性设置为您创建的字典值来向其传递信息。\n\n\
    要利用上述的`MPNowPlayingInfoCenter`实现，您必须在代码中进行一些特定的添加。具体来说，如果您的应用程序无法处理远程控制事件，所有这些功能都将无法工作。为此，首先实现处理远程事件的`-remoteControlReceivedWithEvent:`方法。\n\
    \n```\n- (void) remoteControlReceivedWithEvent: (UIEvent *) receivedEvent {\n\
    \    if (receivedEvent.type == UIEventTypeRemoteControl) {\n\n        switch (receivedEvent.subtype)\
    \ {\n\n            case UIEventSubtypeRemoteControlTogglePlayPause:\n        \
    \        [self playPressed:nil];\n                break;\n\n            case UIEventSubtypeRemoteControlPreviousTrack:\n\
    \                [self prevPressed:nil];\n                break;\n\n         \
    \   case UIEventSubtypeRemoteControlNextTrack:\n                [self nextPressed:nil];\n\
    \                break;\n\n            default:\n                break;\n    \
    \    }\n    }\n}\n```\n\n当用户在锁屏或多任务屏幕上点击暂停、上一首和下一首按钮时，将调用上述方法。您只需让它们调用您稍后将实现的播放、前进和后退方法即可。"
  raw: 'Drop down the values list for this new item by clicking the arrow on the left.
    You will edit the value for “Item 0”. Drop down the menu on the right side, and
    select “App plays audio”, as in [Figure 7–11](#Chapter07.html#fig_7_11). Alternatively,
    you could type **audio** into the value field, and once you press the return key,
    Xcode will change the value correctly.


    ![Image](images/9781430240051_Fig07-11.jpg)


    **Figure 7–11.** *Specifying background audio capabilities*


    Your application should now be ready to play audio while in the background state!


    Next, you will build your user interface in your XIB file. Set up your view so
    that it looks like [Figure 7–12](#Chapter07.html#fig_7_12).


    ![Image](images/9781430240051_Fig07-12.jpg)


    **Figure 7–12.** *User interface for your custom music player*


    For the purposes of this project, the following variable names will be assigned
    to the shown view elements, so connect each element over to your header file using
    the name shown here:


    *   `infoLabel`: Your `UILabel` at the top of the view, which will display the
    information of the current song

    *   `textFieldSong`: Your `UITextField`, which you put a placeholder text of “Song”
    inside

    *   `queryButton`: The upper `UIButton` with the title “Query”

    *   `artworkImageView`: Your `UIImageView`, which will display album artwork for
    songs

    *   `libraryButton`: Large “Library” `UIButton`.

    *   `playButton`: Middle “Play” `UIButton`

    *   `nextButton`: Right-side “Next” `UIButton`

    *   `prevButton`: Left-side “Prev” `UIButton`


    Define actions for the five buttons that you will use and connect each button
    to its respective method. Your method declarations should look like so:


    `-(IBAction)queryPressed:(id)sender;`

    `-(IBAction)nextPressed:(id)sender;`

    `-(IBAction)prevPressed:(id)sender;`

    `-(IBAction)playPressed:(id)sender;`

    `-(IBAction)libraryPressed:(id)sender;`


    Next, you will declare the additional property objects that you will need to run
    your application. For each of the following properties, make sure you synthesize
    each one and properly set it to `nil` at the end of your application. First, you
    will be using an instance of the `AVQueuePlayer` class to play and queue up your
    sound files, so you will declare one of them as a property:


    `@property (nonatomic, strong) AVQueuePlayer *player;`


    In order to manage your `player`, you will need two copies as `NSMutableArray`s
    of its playlist. One will have all the queued items in their original `MPMediaItem`
    class (which you can access media information for), while the other will have
    them all after they have been converted to instances of `AVPlayerItem` (which
    you can play through your `AVQueuePlayer`). You will also have a property of type
    `NSUInteger` in order to help keep track of the currently playing item. These
    properties will be declared like so, making sure to correctly synthesize and `nil`
    each one:


    `@property (nonatomic, strong) NSMutableArray *playlist;`

    `@property (nonatomic, strong) NSMutableArray *myCollection;`

    `@property (nonatomic) NSUInteger currentIndex;`


    The first thing you will do now in your implementation file is finish writing
    your `-viewDidLoad` method, so that it now looks like so:


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `    self.session = [AVAudioSession sharedInstance];`

    `    self.session.delegate = self;`

    `    [self.session setCategory:AVAudioSessionCategoryPlayback error:nil];`

    `    [self.session setActive:YES error:nil];`


    `    self.textFieldSong.delegate = self;`

    `    [self.playButton setTitle:@"Play" forState:UIControlStateNormal];`

    `}`


    The only new code here was to confirm that the title for your `playButton` is
    set correctly, and to set your view controller as the delegate for your `UITextField`.
    Implement the `UITextFieldDelegate` method to handle dismissing the keyboard like
    so:


    `-(BOOL)textFieldShouldReturn:(UITextField *)textField`

    `{`

    `    [textField resignFirstResponder];`

    `    return NO;`

    `}`


    You will also need to override the getter for your `playlist` in order to ensure
    that it correctly initializes.


    `-(NSMutableArray *)playlist`

    `{`

    `    if (!playlist)`

    `    {`

    `        playlist = [[NSMutableArray alloc] initWithCapacity:`

    `5];`

    `    }`

    `    return playlist;`

    `}`


    You will also override the getter for `currentIndex`, so that it always returns
    the correct index of the currently playing item.


    `-(NSUInteger)currentIndex`

    `{`

    `    currentIndex = [self.playlist indexOfObject:self.player.currentItem];`

    `    return currentIndex;`

    `}`


    Next you will implement a method that will update your user interface every time
    the song changes.


    `-(void)updateNowPlaying`

    `{`

    `    if (self.player.currentItem != nil)`

    `    {`

    `        MPMediaItem *nowPlaying = [self.myCollection objectAtIndex:self.currentIndex];`

    `//        NSLog(@"%@", [nowPlaying valueForProperty:MPMediaItemPropertyTitle]);`


    `        self.infoLabel.text = [NSString stringWithFormat:@"%@ - %@", [nowPlaying
    valueForProperty:MPMediaItemPropertyTitle],  [nowPlaying valueForProperty:MPMediaItemPropertyArtist]];`


    `        UIImage *artwork = [[nowPlaying valueForProperty:MPMediaItemPropertyArtwork]
    imageWithSize:self.artworkImageView.frame.size];`

    `        if (artwork)`

    `        {`

    `            self.artworkImageView.image = artwork;`

    `        }`

    `        else`

    `        {`

    `            self.artworkImageView.image = nil;`

    `        }`

    `        if ([MPNowPlayingInfoCenter class])  `

    `        {`

    `            NSString *title = [nowPlaying valueForProperty:MPMediaItemPropertyTitle];`

    `            NSString *artist = [nowPlaying valueForProperty:MPMediaItemPropertyArtist];`

    `            NSDictionary *currentlyPlayingTrackInfo = [NSDictionary`

    `dictionaryWithObjects:[NSArray arrayWithObjects:title, artist, nil] forKeys:[NSArray`

    `arrayWithObjects:MPMediaItemPropertyTitle, MPMediaItemPropertyArtist, nil]];`

    `            [MPNowPlayingInfoCenter defaultCenter].nowPlayingInfo =`

    `currentlyPlayingTrackInfo;`

    `        }`

    `    }`

    `    else`

    `    {`

    `        self.infoLabel.text = @"...";`

    `        [self.playButton setTitle:@"Play" forState:UIControlStateNormal];`

    `        self.artworkImageView.image = nil;`

    `    }`

    `}`


    The method just shown, aside from updating your user interface to display the
    current song information, also takes advantage of a new feature in iOS 5, called
    the `MPNowPlayingInfoCenter`! This class allows the developer to place information
    on the device''s lock screen, or on other devices when the application is displaying
    info through AirPlay. You can pass information to it by setting the `nowPlayingInfo`
    property of the `+defaultCenter` to a dictionary of values and properties that
    you created.


    To make use of the foregoing `MPNowPlayingInfoCenter` implementation, you must
    make a few specific additions in your code. Specifically, none of this functionality
    will work if your application cannot handle remote control events. To do this,
    start by implementing the `-remoteControlReceivedWithEvent:` method that handles
    remote events.


    `- (void) remoteControlReceivedWithEvent: (UIEvent *) receivedEvent {`

    `    if (receivedEvent.type == UIEventTypeRemoteControl) {`


    `        switch (receivedEvent.subtype) {`


    `            case UIEventSubtypeRemoteControlTogglePlayPause:`

    `                [self playPressed:nil];`

    `                break;`


    `            case UIEventSubtypeRemoteControlPreviousTrack:`

    `                [self prevPressed:nil];`

    `                break;`


    `            case UIEventSubtypeRemoteControlNextTrack:`

    `                [self nextPressed:nil];`

    `                break;`


    `            default:`

    `                break;`

    `        }`

    `    }`

    `}`


    This aforementioned method will be called when the user taps the Pause, Previous,
    and Next buttons on the lock screen or the multitasking screen. All you have to
    do is have them call your methods to play, advance, and rewind your player, which
    you will implement later.'
  trans: "\n点击该项目新项的左侧箭头，展开值列表。您将编辑“Item 0”的值。点击右侧下拉菜单，选择“App plays audio”，如图 7–11\
    \ 所示。或者，您也可以在值字段中键入`audio`，按下回车键后，Xcode 将自动更正该值。\n\n![Image](img/9781430240051_Fig07-11.jpg)\n\
    \n**图 7–11.** *指定后台音频功能*\n\n现在，您的应用程序已准备好支持在后台状态下播放音频！\n\n接下来，您将在 XIB 文件中构建用户界面。设置您的视图，使其外观如图\
    \ 7–12 所示。\n\n![Image](img/9781430240051_Fig07-12.jpg)\n\n**图 7–12.** *自定义音乐播放器的用户界面*\n\
    \n在本项目中，将为显示的视图元素分配以下变量名，请按所示名称将每个元素连接到您的头文件中：\n\n*   `infoLabel`：视图顶部的`UILabel`，用于显示当前歌曲信息。\n\
    *   `textFieldSong`：您的`UITextField`，为其设置了占位符文本“Song”。\n*   `queryButton`：标题为“Query”的上方`UIButton`。\n\
    *   `artworkImageView`：您的`UIImageView`，用于显示歌曲的专辑封面。\n*   `libraryButton`：大的“Library”`UIButton`。\n\
    *   `playButton`：中间的“Play”`UIButton`。\n*   `nextButton`：右侧的“Next”`UIButton`。\n\
    *   `prevButton`：左侧的“Prev”`UIButton`。\n\n为您将使用的五个按钮定义操作，并将每个按钮连接到其对应的方法。您的方法声明应如下所示：\n\
    \n```\n-(IBAction)queryPressed:(id)sender;\n-(IBAction)nextPressed:(id)sender;\n\
    -(IBAction)prevPressed:(id)sender;\n-(IBAction)playPressed:(id)sender;\n-(IBAction)libraryPressed:(id)sender;\n\
    ```\n\n接下来，您将声明运行应用程序所需的其他属性对象。对于以下每个属性，请确保对其进行合成，并在应用程序结束时将其正确设置为`nil`。首先，您将使用`AVQueuePlayer`类的实例来播放和排队声音文件，因此将其声明为一个属性：\n\
    \n```\n@property (nonatomic, strong) AVQueuePlayer *player;\n```\n\n为了管理您的`player`，您需要两个`NSMutableArray`类型的副本来管理其播放列表。一个数组包含所有已排队的原始`MPMediaItem`类项（您可以从中访问媒体信息），另一个数组包含它们全部转换为`AVPlayerItem`实例后的项（您可以通过`AVQueuePlayer`播放它们）。您还需要一个`NSUInteger`类型的属性来帮助跟踪当前播放的项。这些属性将按如下方式声明，确保正确合成并将每个属性设为`nil`：\n\
    \n```\n@property (nonatomic, strong) NSMutableArray *playlist;\n@property (nonatomic,\
    \ strong) NSMutableArray *myCollection;\n@property (nonatomic) NSUInteger currentIndex;\n\
    ```\n\n现在，您要在实现文件中完成的第一件事是编写`-viewDidLoad`方法，使其如下所示：\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    self.session = [AVAudioSession sharedInstance];\n\
    \    self.session.delegate = self;\n    [self.session setCategory:AVAudioSessionCategoryPlayback\
    \ error:nil];\n    [self.session setActive:YES error:nil];\n\n    self.textFieldSong.delegate\
    \ = self;\n    [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n\
    }\n```\n\n这里新增的代码只是确认`playButton`的标题设置正确，并将您的视图控制器设置为`UITextField`的代理。实现`UITextFieldDelegate`方法来处理键盘的关闭，如下所示：\n\
    \n```\n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n{\n    [textField\
    \ resignFirstResponder];\n    return NO;\n}\n```\n\n您还需要重写`playlist`的 getter 方法，以确保其正确初始化。\n\
    \n```\n-(NSMutableArray *)playlist\n{\n    if (!playlist)\n    {\n        playlist\
    \ = [[NSMutableArray alloc] initWithCapacity:5];\n    }\n    return playlist;\n\
    }\n```\n\n您还需要重写`currentIndex`的 getter 方法，使其始终返回当前播放项的正确索引。\n\n```\n-(NSUInteger)currentIndex\n\
    {\n    currentIndex = [self.playlist indexOfObject:self.player.currentItem];\n\
    \    return currentIndex;\n}\n```\n\n接下来，您将实现一个方法，该方法会在每次歌曲切换时更新用户界面。\n\n```\n\
    -(void)updateNowPlaying\n{\n    if (self.player.currentItem != nil)\n    {\n \
    \       MPMediaItem *nowPlaying = [self.myCollection objectAtIndex:self.currentIndex];\n\
    //        NSLog(@\"%@\", [nowPlaying valueForProperty:MPMediaItemPropertyTitle]);\n\
    \n        self.infoLabel.text = [NSString stringWithFormat:@\"%@ - %@\", [nowPlaying\
    \ valueForProperty:MPMediaItemPropertyTitle],  [nowPlaying valueForProperty:MPMediaItemPropertyArtist]];\n\
    \n        UIImage *artwork = [[nowPlaying valueForProperty:MPMediaItemPropertyArtwork]\
    \ imageWithSize:self.artworkImageView.frame.size];\n        if (artwork)\n   \
    \     {\n            self.artworkImageView.image = artwork;\n        }\n     \
    \   else\n        {\n            self.artworkImageView.image = nil;\n        }\n\
    \        if ([MPNowPlayingInfoCenter class])  \n        {\n            NSString\
    \ *title = [nowPlaying valueForProperty:MPMediaItemPropertyTitle];\n         \
    \   NSString *artist = [nowPlaying valueForProperty:MPMediaItemPropertyArtist];\n\
    \            NSDictionary *currentlyPlayingTrackInfo = [NSDictionary\ndictionaryWithObjects:[NSArray\
    \ arrayWithObjects:title, artist, nil] forKeys:[NSArray\narrayWithObjects:MPMediaItemPropertyTitle,\
    \ MPMediaItemPropertyArtist, nil]];\n            [MPNowPlayingInfoCenter defaultCenter].nowPlayingInfo\
    \ =\ncurrentlyPlayingTrackInfo;\n        }\n    }\n    else\n    {\n        self.infoLabel.text\
    \ = @\"...\";\n        [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n\
    \        self.artworkImageView.image = nil;\n    }\n}\n```\n\n刚才展示的方法除了更新用户界面以显示当前歌曲信息外，还利用了\
    \ iOS 5 的一个新功能，即`MPNowPlayingInfoCenter`！这个类允许开发者将信息放置在设备的锁屏上，或者当应用程序通过 AirPlay\
    \ 显示信息时放置在其他设备上。您可以通过将`+defaultCenter`的`nowPlayingInfo`属性设置为您创建的字典值来向其传递信息。\n\n\
    要利用上述的`MPNowPlayingInfoCenter`实现，您必须在代码中进行一些特定的添加。具体来说，如果您的应用程序无法处理远程控制事件，所有这些功能都将无法工作。为此，首先实现处理远程事件的`-remoteControlReceivedWithEvent:`方法。\n\
    \n```\n- (void) remoteControlReceivedWithEvent: (UIEvent *) receivedEvent {\n\
    \    if (receivedEvent.type == UIEventTypeRemoteControl) {\n\n        switch (receivedEvent.subtype)\
    \ {\n\n            case UIEventSubtypeRemoteControlTogglePlayPause:\n        \
    \        [self playPressed:nil];\n                break;\n\n            case UIEventSubtypeRemoteControlPreviousTrack:\n\
    \                [self prevPressed:nil];\n                break;\n\n         \
    \   case UIEventSubtypeRemoteControlNextTrack:\n                [self nextPressed:nil];\n\
    \                break;\n\n            default:\n                break;\n    \
    \    }\n    }\n}\n```\n\n当用户在锁屏或多任务屏幕上点击暂停、上一首和下一首按钮时，将调用上述方法。您只需让它们调用您稍后将实现的播放、前进和后退方法即可。\n"
- fmt: "Next, in order to receive these remote control events, you must modify your\
    \ `-viewDidAppear:animated:` and `-viewWillDisappear:animated:` methods.\n\n```\n\
    - (void)viewDidAppear:(BOOL)animated\n{\n    [super viewDidAppear:animated];\n\
    \    [[UIApplication sharedApplication] beginReceivingRemoteControlEvents];\n\
    \    [self becomeFirstResponder];\n}\n- (void)viewWillDisappear:(BOOL)animated\n\
    {\n    [[UIApplication sharedApplication] endReceivingRemoteControlEvents];\n\
    \    [self resignFirstResponder];\n    [super viewWillDisappear:animated];\n}\n\
    ```\n\nFinally, in order for these previous two methods to work correctly and\
    \ allow your view controller to become the first responder, you must override\
    \ the `-canBecomeFirstResponder` method like so:\n\n```\n-(BOOL)canBecomeFirstResponder\n\
    {\n    return YES;\n}\n```\n\nIf these extra steps are not followed, your application\
    \ will not be able to make use of any “Now Playing” information in the lock screen\
    \ or multitasking bar.\n\nIn order to assist in keeping your two `NSMutableArray`s\
    \ in sync, you will define a method that will take an `NSArray` of `MPMediaItem`s\
    \ and return an `NSArray` of the same items, but essentially converted to the\
    \ `AVPlayerItem`.\n\n```\n-(NSArray *)AVPlayerItemsFromArray:(NSArray *)items\n\
    {\n    NSMutableArray *array = [[NSMutableArray alloc] initWithCapacity:[items\
    \ count]];\n    NSURL *url;\n    for (MPMediaItem *current in items)\n    {\n\
    \        url = [current valueForProperty:MPMediaItemPropertyAssetURL];\n     \
    \   AVPlayerItem *playerItem = [AVPlayerItem playerItemWithURL:url];\n\n     \
    \   [[NSNotificationCenter defaultCenter]\n         addObserver:self\n       \
    \  selector:@selector(playerItemDidReachEnd:)\n         name:AVPlayerItemDidPlayToEndTimeNotification\n\
    \         object:playerItem];\n\n        if (playerItem != nil)\n            [array\
    \ addObject:playerItem];\n    }\n    return array;\n}\n```\n\nIn order to later\
    \ be able to tell when a song has finished playing and act accordingly, you will\
    \ need to add your view controller as an observer, as shown earlier. It is fairly\
    \ convenient to include the `-addObserver` call in this method since you can so\
    \ easily access all the `AVPlayerItem`s that you will be using.\n\nWhile you are\
    \ dealing with your `NSNotificationCenter`, make sure that all the observers you\
    \ just added will be properly removed. Add the following lines to your `-viewDidUnload`.\n\
    \n```\nfor (AVPlayerItem *playerItem in self.playlist)\n    {\n        [[NSNotificationCenter\
    \ defaultCenter] removeObserver:self name:AVPlayerItemDidPlayToEndTimeNotification\
    \ object:playerItem];\n    }\n```\n\nThe implementation for the `-playerItemDidReachEnd:`\
    \ method that you've specified to run any time a song ends is quite simple, as\
    \ shown here.\n\n```\n- (void)playerItemDidReachEnd:(NSNotification *)notification\n\
    {\n    [self performSelector:@selector(updateNowPlaying) withObject:nil afterDelay:\n\
    0.5];\n}\n```\n\nI have included the half-second delay here to ensure that the\
    \ `-updateNowPlaying` call does not execute until the `AVQueuePlayer` has completely\
    \ moved on to playing the next item.\n\nNext you'll implement your two methods\
    \ that will be used whenever you need to update or add to your playlist.\n\n```\n\
    -(void)updatePlaylistWithArray:(NSArray *)collection\n{\nif (([self.playlist count]\
    \ == 0) || (self.player.currentItem == nil))\n    {\n        [self.myCollection\
    \ removeAllObjects];\n        self.playlist = [NSMutableArray arrayWithArray:collection];\n\
    \        self.player = [[AVQueuePlayer alloc] initWithItems:self.playlist];\n\
    \        [self.player play];\n    }\n    else\n    {\n        AVPlayerItem *currentItem\
    \ = [self.playlist lastObject];\n        for (AVPlayerItem *item in collection)\n\
    \        {\n            if ([self.player canInsertItem:item afterItem:currentItem])\n\
    \            {\n                [self.player insertItem:item afterItem:currentItem];\n\
    \                currentItem = item;\n            }\n        }\n        [self.playlist\
    \ addObjectsFromArray:collection];\n    }\n}\n```\n\n```\n-(void)updateMyCollectionWithArray:(NSArray\
    \ *)mediaItems\n{\nif ([self.myCollection count] == 0)\n    {\n        self.myCollection\
    \ = [NSMutableArray arrayWithArray:mediaItems];\n    }\n    else\n    {\n    \
    \    [self.myCollection addObjectsFromArray:mediaItems];\n    }\n}\n```\n\nYour\
    \ `-playPressed:` and `-nextPressed:` methods are quite simple in their implementation\
    \ since `AVQueuePlayer` inherits from the `AVPlayer` class, and has a nice little\
    \ method for advancing to the next item in the queue.\n\n```\n-(void)playPressed:(id)sender\n\
    {\nif (self.playlist.count > 0)\n    {\n        if ([[self.playButton titleForState:UIControlStateNormal]\
    \ isEqualToString:@\"Play\"])\n        {\n            [self.player play];\n  \
    \          [self.playButton setTitle:@\"Pause\" forState:UIControlStateNormal];\n\
    \        }\n        else\n        {\n            [self.player pause];\n      \
    \      // Scrub back half a second to give the user a little lead-in when they\
    \ resume playing\n            [self.player seekToTime:CMTimeSubtract(self.player.currentTime,\
    \ CMTimeMakeWithSeconds(0.5, 1.0)) completionHandler:^(BOOL finished)\n      \
    \       {\n                 [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n\
    \             }];\n        }\n     [self updateNowPlaying];\n    }\n}\n-(void)nextPressed:(id)sender\n\
    {\n    [self.player advanceToNextItem];\n    if (self.player.currentItem == nil)\n\
    \    {\n        [self.playlist removeAllObjects];\n        [self.myCollection\
    \ removeAllObjects];\n    }\n    [self updateNowPlaying];\n}\n```\n\nUnfortunately,\
    \ the `AVQueuePlayer` does not include any easy implementation for moving backward\
    \ in a queue, so your implementation of the `-prevPressed:` method is slightly\
    \ more complex, and just involves a bit of swapping around of your `AVPlayerItem`s.\n\
    \n```\n-(void)prevPressed:(id)sender\n{\n    if (CMTimeCompare(self.player.currentTime,\
    \ CMTimeMake(5.0, 1)) > 0)\n    {\n        [self.player seekToTime:kCMTimeZero];\n\
    \    }\n    else\n    {\n        [self.player pause];\n\n        AVPlayerItem\
    \ *current = self.player.currentItem;\n        if (current != [self.playlist objectAtIndex:0])\n\
    \        {\n            AVPlayerItem *previous = [self.playlist objectAtIndex:[self.playlist\
    \ indexOfObject:current]-1];\n            if ([self.player canInsertItem:previous\
    \ afterItem:current])\n            {\n                [current seekToTime:kCMTimeZero];\n\
    \                [previous seekToTime:kCMTimeZero];\n\n                [self.player\
    \ insertItem:previous afterItem:current];\n                [self.player advanceToNextItem];\n\
    \                [self.player removeItem:current];\n                [self.player\
    \ insertItem:current afterItem:previous];\n            }\n            else\n \
    \           {\n                NSLog(@\"Error: Could not insert\");\n        \
    \    }\n        }\n        else\n        {\n            [self.player seekToTime:kCMTimeZero];\n\
    \        }\n\n        [self.player play];\n    }\n    [self updateNowPlaying];\n\
    }\n```\n\nThe `CMTimeMake()` function that you just used is a very flexible function\
    \ that takes two inputs. The first represents the number of time units you want,\
    \ and the second represents the timescale, where 1 represents a second, 2 represents\
    \ half a second, and so on. A call of `CMTimeMake(100, 10)` would make 100 units\
    \ of (1/10) seconds each, resulting in 10 seconds.\n\nThe function of your Query\
    \ button will be to use an `MPMediaQuery` to retrieve any songs in the library\
    \ that contain the word or phrase in your `UITextField`. This implementation is\
    \ fairly straightforward, once you remember to update both of your `NSMutableArray`s\
    \ afterward."
  raw: 'Next, in order to receive these remote control events, you must modify your
    `-viewDidAppear:animated:` and `-viewWillDisappear:animated:` methods.


