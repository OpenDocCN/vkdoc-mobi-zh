    ### Recipe 6–2: Recording Video


    Your `UIImagePickerController` is actually significantly more flexible in its
    use than how you''ve been using it so far, especially since you''ve been using
    it almost exclusively for still images. Here, you''ll go through how to set up
    your `UIImagePickerController` to handle both still images and video as well.


    For this recipe, you will be building off of the code that you have already set
    up in the previous recipe, as it already includes the entire setup that you need.
    Your app will have the added functionality of being able to record and save videos.


    First, you need to edit the properties of your `UIImagePickerController` to specify
    the allowable media types, through the use of the `UIImagePickerController` class
    method `+availableMediaTypesForSourceType:`, so that your `-cameraButtonPressed:`
    will now look like so:


    `-(IBAction)cameraButtonPressed:(id)sender`

    `{`

    `    if ([UIImagePickerController isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera]
    == NO)`

    `    {`

    `        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Error"`

    `message:@"Camera Unavailable" delegate:self cancelButtonTitle:@"Cancel"`

    `otherButtonTitles:nil, nil];`

    `        [alert show];`

    `        return;`

    `    }`

    `    UIImagePickerController *imagePicker = [[UIImagePickerController alloc] init];`

    `    imagePicker.delegate = self;`

    `    imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;`

    `    imagePicker.mediaTypes = [UIImagePickerController`

    `availableMediaTypesForSourceType:UIImagePickerControllerSourceTypeCamera];`

    `    [self presentModalViewController:imagePicker animated:YES];`

    `}`


    Next, you need to instruct your application on how to handle when a user records
    and uses a video. You will add the following code to your `UIImagePickerController`''s
    delegate method:


    `NSString *mediaType = [info objectForKey: UIImagePickerControllerMediaType];`


    `    if (CFStringCompare ((__bridge CFStringRef) mediaType, kUTTypeMovie, 0)`

    `        == kCFCompareEqualTo) {`


    `        NSString *moviePath = [[info objectForKey: UIImagePickerControllerMediaURL]
    path];`


    `        if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum (moviePath))`

    `        {`

    `            UISaveVideoAtPathToSavedPhotosAlbum (moviePath, nil, nil, nil);`

    `        }`

    `    }`


    The first thing you will probably notice is that there is an error focused on
    `kUTTypeMovie`, saying that it is undefined. In order to fix this, you need to
    import the Mobile Core Services framework into your project, and then add the
    following import statement to the header of your view controller. The beginning
    of Recipe 6–4 contains a detailed demonstration of how to add a framework to a
    project if you are unfamiliar with this process.


    `#import <MobileCoreServices/MobileCoreServices.h>`


    Essentially, all you are doing here is comparing the media type of the saved file.
    Your main issue comes into play when you attempt to compare `mediaType`, an `NSString`,
    with `kUTTypeMovie`, which is of type `CFStringRef`. You accomplish this by casting
    your `NSString` down to a `CFStringRef`. iOS 5 has made this process slightly
    more complicated with the introduction of Automatic Reference Counting (ARC),
    because ARC deals with Objective-C object types such as `NSString`, but not with
    C types like `CFStringRef`. You create a bridged casting by placing “__bridge”
    before your `CFStringRef`, as shown earlier, in order to instruct ARC to no longer
    deal with this object.


    If all has gone well, your app should now be able to record video!'
