    \                                stringValue];\n}\n```\n\n现在，你的应用应该能够正确地跨历法转换\
    \ `NSDate` 实例，正如图 8–2 展示的那样！尝试使用不同的日期甚至不同历法进行试验，探索强大的日期转换功能。\n\n![图像](img/9781430240051_Fig08-02.jpg)\n\
    \n**图 8–2.** *应用成功转换日历日期*\n\n### 食谱 8–2：获取事件\n\n既然你已经了解了如何处理基本的日期转换和计算，接下来可以更深入地研究如何具体处理事件和日历，包括与用户自己的事件和日程进行交互。接下来的几个食谱将逐步结合，最终完整地使用\
    \ Event Kit 框架。\n\n首先，使用“单视图应用”模板创建一个新项目。我将其命名为“Chapter8Recipe2”，类前缀为“Main”。\n\
    \n接下来，你需要将 Event Kit 框架导入到项目中。关于具体操作方法，请参考之前的食谱。\n\n为了使用 Event Kit 框架，你需要将以下代码添加到主视图控制器的头文件中：\n\
    \n```objc\n#import <EventKit/EventKit.h>\n```\n\n在本食谱中，你只需要访问并记录设备上已安排的事件，因此完全不涉及视图控制器的\
    \ XIB 文件。\n\n每当处理 Event Kit 框架时，你最常使用的主要元素是 `EKEventStore`。这个类将是一个非常强大的工具，可以让你访问、删除和保存日历中的事件。你需要在头文件中声明一个该类型的属性，如下所示：\n\
    \n```objc\n@property (strong, nonatomic) EKEventStore *eventStore;\n```\n\n确保对该属性进行\
    \ `@synthesize`，并在 `-viewDidUnload` 方法中将其设置为 `nil`。\n\n这个用于记录事件的第一个食谱的实现非常简单。你只需要修改\
    \ `-viewDidLoad` 方法。在初始化 `eventStore` 属性后，你需要创建一个特定版本的 `NSPredicate` 类，以便查询事件。具体来说，你要查询设备日历中未来\
    \ *48 小时* 内的所有日期。你的方法如下所示：\n\n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    self.eventStore = [[EKEventStore alloc] init];\n    NSDate *now = [NSDate\
    \ date];\n    NSDate *tomorrow = [NSDate dateWithTimeIntervalSinceNow:(2*24.0*60*60)];\n\
    \    NSPredicate *predicate = [self.eventStore predicateForEventsWithStartDate:now\n\
    \                                                                     endDate:tomorrow\n\
    \                                                                   calendars:nil];\n\
    \    NSArray *events = [self.eventStore eventsMatchingPredicate:predicate];\n\
    \    for (EKEvent *event in events)\n    {\n        NSLog(@\"%@\", event.title);\n\
    \    }\n}\n```\n\n`+date` 方法是一种非常便捷的方式，能轻松地以 `NSDate` 形式获取当前日期和时间。`+dateWithTimeIntervalSinceNow:`\
    \ 方法接受一个浮点值作为参数，表示你要包含的时间间隔（以秒为单位）。快速计算一下 2*24*60*60 秒，就能得到一个两天的查询范围。\n\n你使用 `EKEventStore`\
    \ 类的 `-predicateForEventsWithStartDate:endDate:calendars:` 方法来创建谓词。通过将 `calendars`\
    \ 参数设为 `nil`，你指定该谓词应用于所有日历。\n\n最后，要获取 `EKEvents` 数组，你只需调用 `EKEventStore` 的 `-eventsMatchingPredicate:`\
    \ 方法，如前面的代码片段所示。然后你就可以遍历事件并根据需要处理。\n\n你需要在一台物理设备上测试此应用，以便它访问你的日历并打印有效信息。请确保你的设备上确实已安排了一些事件作为测试数据。由于此处只输出日志，你还需要通过\
    \ Xcode 在设备上运行此应用，以便捕获输出。\n"
- fmt: "### Recipe 8–3: Displaying Events in a `UITableView`\n\nNow that you are able\
    \ to access your events, you will start by creating a better interface with which\
    \ to deal with them. You will implement a grouped `UITableView` to display your\
    \ events.\n\nFirst, you need to add your `UITableView` into your XIB file. Go\
    \ ahead and drag out a `UITableView` element from your library, and make it take\
    \ up the entire view. In the Attribute inspector, make sure that the “Style” of\
    \ the table view is set to “Grouped”, as shown in [Figure 8–3](#Chapter08.html#fig_8_3).\n\
    \n![Image](images/9781430240051_Fig08-03.jpg)\n\n**Figure 8–3.** *Configuring\
    \ your grouped `UITableView`*\n\nNext, connect your `UITableView` to your view\
    \ controller's header file. The property used here will be called `tableViewEvents`.\n\
    \nBefore you switch over to your implementation file, you will define two more\
    \ properties that you will use. First, an `NSArray` called `calendars` will be\
    \ used to hold references to all the calendars in your `EKEventStore`. Second,\
    \ an instance of `NSMutableDictionary` will be used to store all your events based\
    \ on which calendar they belong to. Make sure to properly synthesize these, and\
    \ also make sure they are set to `nil` in `-viewDidUnload`.\n\n```\n@property\
    \ (nonatomic, strong) NSMutableDictionary *events;\n@property (nonatomic, strong)\
    \ NSArray *calendars;\n```\n\nThe first thing you need to do is set up a newer\
    \ version of your `-viewDidLoad` method in order to properly populate your array\
    \ and dictionary, as well as to make sure your `UITableView` is properly set up.\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    self.tableViewEvents.delegate\
    \ = self;\n    self.tableViewEvents.dataSource = self;\n\n    self.eventStore\
    \ = [[EKEventStore alloc] init];\n    self.calendars = [self.eventStore calendars];\n\
    \n    [self fetchEvents];\n}\n```\n\nThe new `-fetchEvents` method will contain\
    \ your code to actually query the `eventStore` for your events. Since you will\
    \ be sorting your events by the calendar they belong to, you will perform a different\
    \ query for each calendar, rather than just one for all events.\n\n```\n-(void)fetchEvents\n\
    {\n    self.events = nil;\n    self.events = [[NSMutableDictionary alloc] initWithCapacity:[self.calendars\
    \ count]];\n\n    for (EKCalendar *cal in self.calendars)\n    {\n        NSPredicate\
    \ *calPredicate = [self.eventStore\npredicateForEventsWithStartDate:[NSDate date]\
    \ endDate:[NSDate\ndateWithTimeIntervalSinceNow:(2*24.0*60*60)] calendars:[NSArray\
    \ arrayWithObject:cal]];\n        //Passing nil to calendars means to search all\
    \ calendars.\n\n        NSArray *eventsInThisCalendar = [self.eventStore eventsMatchingPredicate:calPredicate];\n\
    \        if (eventsInThisCalendar != nil)\n        {\n            [self.events\
    \ setObject:eventsInThisCalendar forKey:cal.title];\n        }\n    }\n}\n```\n\
    \nAs you can see, you will be storing your events in an `NSMutableDictionary`\
    \ by using the titles of your calendars as keys, with their objects being arrays\
    \ of events that belong to that specific calendar.\n\nBefore you continue, you\
    \ need to specify that your view controller will conform to certain protocols\
    \ in order for your compile to allow it to be set as the delegate and data source\
    \ of your view controller. After adding the `UITableViewDelegate` and `UITableViewDataSource`\
    \ protocols, your header file should now resemble the following:\n\n```\n#import\
    \ <UIKit/UIKit.h>\n#import <EventKit/EventKit.h>\n\n@interface MainViewController\
    \ : UIViewController <UITableViewDelegate,\nUITableViewDataSource>{\n    UITableView\
    \ *tableViewEvents;\n}\n\n@property (nonatomic, strong) EKEventStore *eventStore;\n\
    @property (strong, nonatomic) IBOutlet UITableView *tableViewEvents;\n\n@property\
    \ (nonatomic, strong) NSMutableDictionary *events;\n@property (nonatomic, strong)\
    \ NSArray *calendars;\n@end\n```\n\nIn order to properly implement a grouped `UITableView`,\
    \ you need to implement a method to specify exactly how many sections you will\
    \ need. Since you have one section per calendar, this method is nice and easy.\n\
    \n```\n-(NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n \
    \   return [self.calendars count];\n}\n```\n\nYou can also implement a method\
    \ to specify your section titles, in an equally simple manner.\n\n```\n-(NSString\
    \ *)tableView:(UITableView *)tableView\ntitleForHeaderInSection:(NSInteger)section\n\
    {\n    return [[self.calendars objectAtIndex:section] title];\n}\n```\n\nYou will\
    \ also need to implement a method to determine the number of rows in each group,\
    \ as given by the count of the array returned by your dictionary for a given section.\n\
    \n```\n-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection: (NSInteger)section\n\
    {\n    NSString *title = [[self.calendars objectAtIndex:section] title];\n   \
    \ NSArray *eventsInThisCalendar = [self.events objectForKey:title];\n    return\
    \ [eventsInThisCalendar count];\n}\n```\n\nFinally, you can build your most important\
    \ method for dealing with a `UITableView`, which will define how your table's\
    \ cells are created.\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n\
    cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    static NSString *CellIdentifier\
