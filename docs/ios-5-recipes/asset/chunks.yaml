  trans: "\n### 食谱 6–6：通过编程录制视频\n\n现在你已经了解了使用 `AVFoundation` 的一些基础知识，接下来将实现一个稍微复杂的项目。这次，你的应用程序将录制完整的视频，而不仅仅是捕获特定的帧。你还需要添加一个音频输入设备，以便视频中包含声音。\n\
    \n首先，你必须创建一个新项目，这次命名为“Chapter6Recipe6”，类前缀为“CustomVideo”。\n\n像往常一样，首先要做的是通过项目\
    \ `Build Phases` 选项卡中的 `Link Binary With Libraries` 部分获取以下必要的框架。\n\n*   *AV Foundation*：你将使用它来处理摄像头和麦克风。\n\
    *   *Assets Library*：用于将录制好的视频保存到你的设备上。\n\n在 Interface Builder 中，向视图控制器的视图底部中央添加一个\
    \ `UIButton`，就像上一个食谱一样，将其默认标签设置为“Record”。当你将其连接到头文件时，请为这个 `UIButton` 命名为 `button`。确保还要为此按钮创建一个名为\
    \ `-recordPressed:` 的操作（有关如何执行此操作，请参阅之前的食谱）。\n\n与上一个食谱类似，你将构建 `AVCaptureSession`\
    \ 来管理摄像头的输入和视频的输出，因此你需要先在视图控制器的头文件中添加一些变量、属性和协议。\n\n*   首先，你需要一个 `BOOL` 类型的实例变量\
    \ `recording`，它用于跟踪视频是否正在录制。\n*   其次，你需要创建两个属性，用于存储指向 `AVCaptureSession` 会话和 `AVCaptureMovieFileOutput`\
    \ 输出的指针，后者将是你的 `AVCaptureOutput` 设备。\n*   第三，你需要在头文件中包含 `AV Foundation` 框架的导入语句。\n\
    *   最后，你需要告诉编译器你的视图控制器遵循 `AVCaptureFileOutputRecordingDelegate` 协议。\n\n完成所有这些更改后，你的视图控制器的头文件将如下所示：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n#import\
    \ <AssetsLibrary/AssetsLibrary.h>\n\n@interface CustomVideoViewController : UIViewController\n\
    <AVCaptureFileOutputRecordingDelegate>{\n    UIButton *button;\n    BOOL recording;\n\
    }\n\n@property (strong, nonatomic) IBOutlet UIButton *button;\n\n@property (strong,\
    \ nonatomic) AVCaptureSession *session;\n@property (strong, nonatomic) AVCaptureMovieFileOutput\
    \ *output;\n\n-(IBAction)recordPressed:(id)sender;\n@end\n```\n\n现在，头文件已经全部设置好，接下来切换到实现文件。\n\
    \n首先，由于你设置了自己的两个属性 `session` 和 `output`，你绝对必须记住在实现文件的顶部对它们进行 `@synthesize`。你还应该记住在\
    \ `-viewDidUnload` 方法中将它们都设置为 `nil`。\n\n接下来，与上一个食谱一样，你将开始构建 `-viewDidLoad` 方法。\n\
    \n首先，你必须像这样分配你的 `AVCaptureSession`：\n\n```\nself.session = [[AVCaptureSession\
    \ alloc] init];\nself.session.sessionPreset = AVCaptureSessionPresetMedium;\n\
    ```\n\n接下来，你将创建两个 `AVCaptureDevice` 实例，一个用于后置摄像头，一个用于麦克风，然后为它们中的每一个创建 `AVCaptureDeviceInput`，并将它们添加到你的会话中。\n\
    \n```\nAVCaptureDevice *device = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
    \nNSError *error = nil;\nAVCaptureDeviceInput *input = [AVCaptureDeviceInput deviceInputWithDevice:device\n\
    error:&error];\n\nNSArray *devices = [AVCaptureDevice devicesWithMediaType:AVMediaTypeAudio];\n\
    AVCaptureDeviceInput *mic = [[AVCaptureDeviceInput alloc] initWithDevice:[devices\n\
    objectAtIndex:0] error:nil];\nif (!input || !mic)\n    {\n        NSLog(@\"Input\
    \ Error\");\n    }\n    else\n    {\n        [self.session addInput:input];\n\
    \        [self.session addInput:mic];\n    }\n```\n\n现在，你创建 `AVCaptureOutput`\
    \ 并将其添加到会话中。你将确保输出的任何连接都正确设置了视频方向。\n\n```\nself.output = [[AVCaptureMovieFileOutput\
    \ alloc] init];\n\n    NSArray *connections = self.output.connections;\n    for\
    \ (AVCaptureConnection *connection in connections)\n    {\n        if ([connection\
    \ isVideoOrientationSupported])\n             connection.videoOrientation = AVCaptureVideoOrientationPortrait;\n\
    \    }\n    if ([self.session canAddOutput:self.output])\n        [self.session\
    \ addOutput:self.output];\n```\n\n你需要能够看到摄像头的视图，因此你将设置一个 `AVCaptureVideoPreviewLayer`\
    \ 实例。\n\n```\nAVCaptureVideoPreviewLayer *previewLayer = [AVCaptureVideoPreviewLayer\n\
    layerWithSession:self.session];\nUIView *aView = self.view;\npreviewLayer.frame\
    \ = CGRectMake(0, 0, self.view.frame.size.width,\nself.view.frame.size.height-70);\n\
    [aView.layer addSublayer:previewLayer];\n```\n\n最后，你只需启动 `AVCaptureSession`。你还需要将\
    \ `recording` 实例设置为 `NO`，以确保它具有正确的起始值。\n\n```\n[self.session startRunning];\n\
    \    recording = NO;\n```\n\n完整的 `-viewDidLoad` 方法现在看起来是这样的：\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n\n    self.session = [[AVCaptureSession alloc] init];\n\
    \    self.session.sessionPreset = AVCaptureSessionPresetMedium;\n    AVCaptureDevice\
    \ *device = [AVCaptureDevice\ndefaultDeviceWithMediaType:AVMediaTypeVideo];\n\n\
    \    NSError *error = nil;\n    AVCaptureDeviceInput *input = [AVCaptureDeviceInput\
    \ deviceInputWithDevice:device\nerror:&error];\n\n    NSArray *devices = [AVCaptureDevice\
    \ devicesWithMediaType:AVMediaTypeAudio];\n\n    AVCaptureDeviceInput *mic = [[AVCaptureDeviceInput\
    \ alloc] initWithDevice:[devices\nobjectAtIndex:0] error:nil];\n\n    if (!input\
    \ || !mic)\n    {\n        NSLog(@\"Input Error\");\n    }\n    else\n    {\n\
    \        [self.session addInput:input];\n        [self.session addInput:mic];\n\
    \    }\n\n    self.output = [[AVCaptureMovieFileOutput alloc] init];\n\n    NSArray\
    \ *connections = self.output.connections;\n    for (AVCaptureConnection *connection\
    \ in connections)\n    {\n        if ([connection isVideoOrientationSupported])\n\
    \             connection.videoOrientation = AVCaptureVideoOrientationPortrait;\n\
    \    }\n    if ([self.session canAddOutput:self.output])\n        [self.session\
    \ addOutput:self.output];\n\n    AVCaptureVideoPreviewLayer *previewLayer = [AVCaptureVideoPreviewLayer\n\
    layerWithSession:self.session];\n    UIView *aView = self.view;\n    previewLayer.frame\
    \ = CGRectMake(0, 0, self.view.frame.size.width,\nself.view.frame.size.height-70);\n\
    \    [aView.layer addSublayer:previewLayer];\n\n    [self.session startRunning];\n\
    \    recording = NO;\n}\n```\n\n**提示：** 使用这种方法为视频添加声音并不复杂！所需要做的只是将音频输入设备添加到你的会话中，其余的\
    \ `AVCaptureSession` 会替你完成。\n\n你当然需要定义你的应用程序如何处理用户按下 `UIButton` 的情况。这将是一个相当简单的切换函数，用于启动和停止你的\
    \ `AVCaptureOutput`。\n\n```\n-(IBAction)recordPressed:(id)sender\n{\n    if (!recording)\n\
    \    {\n        [self.button setTitle:@\"Stop\" forState:UIControlStateNormal];\n\
    \        recording = YES;\n        NSURL *fileURL = [self\ntempFileURL];\n   \
    \     [self.output startRecordingToOutputFileURL:fileURL recordingDelegate:self];\n\
    \    }\n    else\n    {\n        [self.button setTitle:@\"Record\" forState:UIControlStateNormal];\n\
    \        [self.output stopRecording];\n        recording = NO;\n    }\n}\n```\n"
- fmt: "你很可能已经注意到，你在早期调用了`-tempFileURL`方法来设置`AVCaptureOutput`。简单来说，这个方法会返回一个路径，用于在你的设备上临时保存录制的视频。如果该位置已经存在一个文件，它将会删除该文件。（这样，你永远不会使用超过一个视频所需的磁盘空间。）\n\
    \n```\n- (NSURL *) tempFileURL\n{\n    NSString *outputPath = [[NSString alloc]\
    \ initWithFormat:@\"%@%@\",\nNSTemporaryDirectory(), @\"output.mov\"];\n    NSURL\
    \ *outputURL = [[NSURL alloc] initFileURLWithPath:outputPath];\n    NSFileManager\
    \ *manager = [[NSFileManager alloc] init];\n    if ([manager fileExistsAtPath:outputPath])\n\
    \    {\n        [manager removeItemAtPath:outputPath error:nil];\n    }\n    return\
    \ outputURL;\n}\n```\n\n设置视频的最后一步是设置`AVCaptureMovieFileOutput`的代理。它会检查将视频录制到文件时是否有任何错误，然后将你的视频文件保存到资产管理库中。\n\
    \n```\n- (void)captureOutput:(AVCaptureFileOutput *)captureOutput\ndidFinishRecordingToOutputFileAtURL:(NSURL\
    \ *)outputFileURL\n      fromConnections:(NSArray *)connections\n            \
    \    error:(NSError *)error {\n\n    BOOL recordedSuccessfully = YES;\n    if\
    \ ([error code] != noErr) {\n        // A problem occurred: Find out if the recording\
    \ was successful.\n        id value = [[error userInfo] objectForKey:AVErrorRecordingSuccessfullyFinishedKey];\n\
    \        if (value) {\n            recordedSuccessfully = [value boolValue];\n\
    \        }\n    }\n    ALAssetsLibrary *library = [[ALAssetsLibrary alloc] init];\n\
    \n    [library writeVideoAtPathToSavedPhotosAlbum:outputFileURL\n            completionBlock:^(NSURL\
    \ *assetURL, NSError *error)\n    {\n        if (error)\n           {\n      \
    \         NSLog(@\"Error writing\") ;\n\n           }\n    }];\n}\n```\n\n最后，为了提升应用设计的功能性，你将让`-viewWillAppear:`和`-viewWillDisappear:`参与会话的开始和停止，这样就不会出现会话在后台运行或在你可见时未运行的情况。\n\
    \n```\n- (void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    if (![self.session isRunning])\n    {\n        [self.session startRunning];\n\
    \    }\n}\n- (void)viewWillDisappear:(BOOL)animated\n{\n        [super viewWillDisappear:animated];\n\
    \    if ([self.session isRunning])\n    {\n        [self.session stopRunning];\n\
    \    }\n}\n```\n\n这个应用看起来与之前示例中的应用几乎一样，主要区别在于保存的媒体类型。在之前的示例中，你是将单个帧作为图像保存到图库，而此处你将保存带有声音的录制视频。\n\
    \n### Recipe 6–7: Capturing Video Frames\n\n对于大量使用视频的应用，缩略图通常被用来“代表”给定的视频。在之前示例的基础上，你将添加一项功能，即基于视频中的特定时间点创建缩略图。你将实现两种不同的方法来完成此操作，一种基于`AVCaptureSession`，另一种基于你保存的视频。\n\
    \n首先，你将使用一种不同类型的`AVCaptureOutput`（称为`AVCaptureStillImageOutput`）从`AVCaptureSession`中捕获静态图像。\n\
    \n**提示：** 这种图像捕获方法还有一个额外功能，即在拍摄图像时自动播放快门声。\n\n首先，你需要在视图控制器的XIB文件中添加几个`UIImageView`，用于显示你捕获的静态图像。像往常一样，将它们连接到头文件，并命名为`imageViewThumb`和`imageViewThumb2`。如果需要，你可以将其背景色设置为默认颜色以外的其他颜色，以便在图像放入之前与视图区分。[Figure\
    \ 6–14](#Chapter06.html#fig_6_14)显示了最终的XIB文件。\n\n![Image](images/9781430240051_Fig06-14.jpg)\n\
    \n**Figure 6–14.** *为缩略图设置用户界面*\n\n接下来，你需要一个属性来跟踪你的`AVCaptureStillImageOutput`，你将在视图控制器中将其声明并综合为`stillImageOutput`，并确保在`-viewDidUnload`中将其设置为`nil`。\n\
    \n第三步，在`-viewDidLoad`方法中将此输出添加到`AVCaptureSession`中，现在该方法如下所示：\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n\n    self.imageViewThumb.backgroundColor = [UIColor\
    \ whiteColor];\n\n    self.session = [[AVCaptureSession alloc] init];\n    self.session.sessionPreset\
    \ = AVCaptureSessionPresetMedium;\n\n    AVCaptureDevice *device = [AVCaptureDevice\
    \ defaultDeviceWithMediaType:AVMediaTypeVideo];\n\n    NSError *error = nil;\n\
    \    AVCaptureDeviceInput *input = [AVCaptureDeviceInput deviceInputWithDevice:device\n\
    error:&error];\n\n    NSArray *devices = [AVCaptureDevice devicesWithMediaType:AVMediaTypeAudio];\n\
    \    AVCaptureDeviceInput *mic = [[AVCaptureDeviceInput alloc] initWithDevice:[devices\n\
    objectAtIndex:0] error:nil];\n\n    if (!input || !mic)\n    {\n        NSLog(@\"\
    Input Error\");\n    }\n    else\n    {\n        [self.session addInput:input];\n\
    \        [self.session addInput:mic];\n    }\n\n    self.output = [[AVCaptureMovieFileOutput\
    \ alloc] init];\n\n    NSArray *connections = self.output.connections;\n    for\
    \ (AVCaptureConnection *connection in connections)\n    {\n        if ([connection\
    \ isVideoOrientationSupported])\n            connection.videoOrientation = AVCaptureVideoOrientationPortrait;\n\
    \    }\n    if ([self.session canAddOutput:self.output])\n        [self.session\
    \ addOutput:self.output];\n\n    /////////NEW STILL IMAGE OUTPUT CODE\n    self.stillImageOutput\
    \ = [[AVCaptureStillImageOutput alloc] init];\n    NSDictionary *outputSettings\
    \ = [[NSDictionary alloc] initWithObjectsAndKeys:\n                          \
    \          AVVideoCodecJPEG, AVVideoCodecKey, nil];\n    [self.stillImageOutput\
    \ setOutputSettings:outputSettings];\n\n    if ([self.session canAddOutput:stillImageOutput])\n\
    \    {\n        [self.session addOutput:stillImageOutput];\n    }\n    else\n\
    \    {\n        NSLog(@\"Unable to add still image output\");\n    }\n    /////////END\
    \ OF NEW STILL IMAGE OUTPUT CODE\n    AVCaptureVideoPreviewLayer *previewLayer\
    \ = [AVCaptureVideoPreviewLayer\nlayerWithSession:self.session];\n    UIView *aView\
    \ = self.view;\n    previewLayer.frame = CGRectMake(0, 0, self.view.frame.size.width,\n\
    self.view.frame.size.height-70);\n    [aView.layer addSublayer:previewLayer];\n\
    \n    [self.session startRunning];\n    recording = NO;\n        // Do any additional\
    \ setup after loading the view, typically from a nib.\n}\n```"
  raw: 'You probably noticed that you called the method `-tempFileURL` in order to
    set up your `AVCaptureOutput` early. This method, in short, returns a path for
    your recorded video to be temporarily saved on your device. If there is already
    a file saved at the location, it will delete that file. (This way, you never use
    more than one video''s worth of disk space.)


    `- (NSURL *) tempFileURL`

    `{`

    `    NSString *outputPath = [[NSString alloc] initWithFormat:@"%@%@",`

    `NSTemporaryDirectory(), @"output.mov"];`

    `    NSURL *outputURL = [[NSURL alloc] initFileURLWithPath:outputPath];`

    `    NSFileManager *manager = [[NSFileManager alloc] init];`

    `    if ([manager fileExistsAtPath:outputPath])`

    `    {`

    `        [manager removeItemAtPath:outputPath error:nil];`

    `    }`

    `    return outputURL;`

    `}`


    The last major step to set up your video is to set up your `AVCaptureMovieFileOutput`''s
    delegate. It will check if there were any errors in recording the video to a file,
    and then save your video file into your Asset Library.


    `- (void)captureOutput:(AVCaptureFileOutput *)captureOutput`

    `didFinishRecordingToOutputFileAtURL:(NSURL *)outputFileURL`

    `      fromConnections:(NSArray *)connections`

    `                error:(NSError *)error {`


    `    BOOL recordedSuccessfully = YES;`

    `    if ([error code] != noErr) {`

    `        // A problem occurred: Find out if the recording was successful.`

    `        id value = [[error userInfo] objectForKey:AVErrorRecordingSuccessfullyFinishedKey];`

    `        if (value) {`

    `            recordedSuccessfully = [value boolValue];`

    `        }`

    `    }`

    `    ALAssetsLibrary *library = [[ALAssetsLibrary alloc] init];`


    `    [library writeVideoAtPathToSavedPhotosAlbum:outputFileURL`

    `            completionBlock:^(NSURL *assetURL, NSError *error)`

    `    {`

    `        if (error)`

    `           {`

    `               NSLog(@"Error writing") ;`


    `           }`

    `    }];`

    `}`


    Finally, to improve the functionality of your app''s design, you will make your
    `-viewWillAppear:` and `-viewWillDisappear:` have a hand in your session''s starting
    and stopping, so that you don''t end up with a session running in the background
    or not running when you can see it.


    `- (void)viewWillAppear:(BOOL)animated`

    `{`

    `    [super viewWillAppear:animated];`

    `    if (![self.session isRunning])`

    `    {`

    `        [self.session startRunning];`

    `    }`

    `}`

    `- (void)viewWillDisappear:(BOOL)animated`

    `{`

    `        [super viewWillDisappear:animated];`

    `    if ([self.session isRunning])`

    `    {`

    `        [self.session stopRunning];`

    `    }`

    `}`


    This app will look almost identical to the previous recipe''s app, the main difference
    being the type of media saved. In the previous recipe, you were saving individual
    frames as images to your library, but here you will be saving recorded video with
    sound.


    ### Recipe 6–7: Capturing Video Frames


    For a large number of applications that utilize videos, a thumbnail image is often
    used to “represent” a given video. Adding on to your previous recipe, you will
    be adding in a capability to create a thumbnail image based on a specific point
    in your video. You will implement two different ways to do this, with one method
    based on the `AVCaptureSession`, and the other based on your saved video.


    First, you will capture a still image from your `AVCaptureSession` using a different
    type of `AVCaptureOutput`, known as an `AVCaptureStillImageOutput`.


    **TIP:** This first method of taking images has the added ability to automatically
    play a shutter sound when an image is taken!


    First, you will add a couple of `UIImageView`s to your view controller''s XIB
    file, which will be used to display the still images that you capture. You will
    connect them to your header file as usual, naming them `imageViewThumb` and `imageViewThumb2`.
    If desired, you can set their background color to something other than the default
    color so that they can be distinguished from your view before your images are
    put in them. [Figure 6–14](#Chapter06.html#fig_6_14) shows your resulting XIB
    file.


    ![Image](images/9781430240051_Fig06-14.jpg)


    **Figure 6–14.** *Setting up your user interface for thumbnails*


    Next you will need a property to keep track of your `AVCaptureStillImageOutput`,
    which you will declare and synthesize in your view controller as `stillImageOutput`,
    making sure to remember to set it to `nil` in your `-viewDidUnload`.


    Your third step is to add this output to your `AVCaptureSession` in your `-viewDidLoad`
    method, which will now look like so:


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`


    `    self.imageViewThumb.backgroundColor = [UIColor whiteColor];`


    `    self.session = [[AVCaptureSession alloc] init];`

    `    self.session.sessionPreset = AVCaptureSessionPresetMedium;`


    `    AVCaptureDevice *device = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];`


    `    NSError *error = nil;`

    `    AVCaptureDeviceInput *input = [AVCaptureDeviceInput deviceInputWithDevice:device`

    `error:&error];`


    `    NSArray *devices = [AVCaptureDevice devicesWithMediaType:AVMediaTypeAudio];`

    `    AVCaptureDeviceInput *mic = [[AVCaptureDeviceInput alloc] initWithDevice:[devices`

    `objectAtIndex:0] error:nil];`


    `    if (!input || !mic)`

    `    {`

    `        NSLog(@"Input Error");`

    `    }`

    `    else`

    `    {`

    `        [self.session addInput:input];`

    `        [self.session addInput:mic];`

    `    }`


    `    self.output = [[AVCaptureMovieFileOutput alloc] init];`


    `    NSArray *connections = self.output.connections;`

    `    for (AVCaptureConnection *connection in connections)`

    `    {`

    `        if ([connection isVideoOrientationSupported])`

    `            connection.videoOrientation = AVCaptureVideoOrientationPortrait;`

    `    }`

    `    if ([self.session canAddOutput:self.output])`

    `        [self.session addOutput:self.output];`


    `    /////////NEW STILL IMAGE OUTPUT CODE`

    `    self.stillImageOutput = [[AVCaptureStillImageOutput alloc] init];`

    `    NSDictionary *outputSettings = [[NSDictionary alloc] initWithObjectsAndKeys:`

    `                                    AVVideoCodecJPEG, AVVideoCodecKey, nil];`

    `    [self.stillImageOutput setOutputSettings:outputSettings];`


    `    if ([self.session canAddOutput:stillImageOutput])`

    `    {`

    `        [self.session addOutput:stillImageOutput];`

    `    }`

    `    else`

    `    {`

    `        NSLog(@"Unable to add still image output");`

    `    }`

    `    /////////END OF NEW STILL IMAGE OUTPUT CODE`

    `    AVCaptureVideoPreviewLayer *previewLayer = [AVCaptureVideoPreviewLayer`

    `layerWithSession:self.session];`

    `    UIView *aView = self.view;`

    `    previewLayer.frame = CGRectMake(0, 0, self.view.frame.size.width,`

    `self.view.frame.size.height-70);`

    `    [aView.layer addSublayer:previewLayer];`


    `    [self.session startRunning];`

    `    recording = NO;`

    `        // Do any additional setup after loading the view, typically from a nib.`

    `}`'
