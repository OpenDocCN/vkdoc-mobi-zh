    ### Summary


    The Map Kit framework is probably one of the most popularly used frameworks, purely
    for its powerful yet incredibly flexible ability to provide a fully customizable
    yet simplistic map interface. In this chapter, you have discussed the major capabilities
    of Map Kit, from locating the user, to adding annotations and overlays, to even
    the important issue of annotation grouping. However, you have only scratched the
    surface of the capabilities of Map Kit, especially in the areas of map-based problem
    solving. A quick look at the Map Kit documentation reveals the various other commands,
    methods, and properties you did not cover, which range from isolating particular
    sections of a map to entirely customizing how touch events are handled by the
    map. The effectiveness of these countless capabilities is limited only by the
    developer''s imagination.


    ## Chapter 6


    ## Camera Recipes


    There are a great number of mobile applications that make use of interaction with
    the device''s camera, including such tasks as taking images, recording videos,
    and providing overlay, such as with augmented-reality applications. iOS developers
    have a great deal of control in how they can interact with any given device''s
    hardware. In this chapter, you will go over multiple ways to access and use these
    functionalities, from simple, predefined interfaces to incredibly flexible, custom
    implementations.


    **NOTE:** The iOS simulator does not support camera hardware. In order to test
    most recipes in this chapter, they must be run on a physical device.'
  trans: '

    现在，你已经有了一种相当简单的方法，通过选中特定热点来判断某个热点是否代表其他热点。但如果你能轻松看出哪些热点是集合，哪些是单个个体，那就更好了。为此，你需要为每个热点提供一个指向自身`MKPinAnnotationView`的指针。这样一来，你就可以根据它们所代表地点的数量来控制其颜色。


    首先，在你的热点文件中添加以下属性。不要忘记在`.m`文件中使用`@synthesize`进行合成！


    ```

    @property (nonatomic, strong) MKPinAnnotationView *annotationView;

    ```


    接下来，你需要告诉地图的委托如何正确显示图钉，如下面`-viewForAnnotation:`方法的新版本所示。


    ```

    - (MKAnnotationView *)mapView:(MKMapView *)mV viewForAnnotation:(id

    <MKAnnotation>)annotation{


        // 如果是用户位置，直接返回 nil。

        if ([annotation isKindOfClass:[MKUserLocation class]]){

            return nil;

        }

            else{

            static NSString *StartPinIdentifier = @"PinIdentifier";

            MKPinAnnotationView *startPin = (id)[mV

    dequeueReusableAnnotationViewWithIdentifier:StartPinIdentifier];

                    if (startPin == nil) {

                startPin = [[MKPinAnnotationView alloc] initWithAnnotation:annotation

    reuseIdentifier:StartPinIdentifier];      

            }

            startPin.canShowCallout = YES;

            startPin.animatesDrop = YES;

            // 新增代码

            Hotspot *place = annotation;

            place.annotationView = startPin;

            if ([place placesCount] > 1)

            {

                startPin.pinColor = MKPinAnnotationColorGreen;

            }

            else if ([place placesCount] == 1)

            {

                startPin.pinColor = MKPinAnnotationColorRed;

            }

            // 新增代码结束

            return startPin;

            }

    }

    ```


    这将使你的所有标注根据它们是集合还是单个个体，正确地显示为绿色或红色。但是，如果你放大一个绿色的标注，它并不会在从集合变为单个个体时正确地改变颜色。作为最后一步，为了修正这个问题，你需要在`-mapView:regionDidChangeAnimated:`方法中添加代码，根据代表地点的数量来改变图钉颜色，如下所示。


    ```

    -(void)mapView:(MKMapView *)mapView regionDidChangeAnimated:(BOOL)animated{

        if (zoom!=mapView.region.span.longitudeDelta) {     

            [self group:places];

            zoom=mapView.region.span.longitudeDelta;

            // 新增代码

            NSSet *visibleAnnotations = [mapView

    annotationsInMapRect:mapView.visibleMapRect];

            for (Hotspot *place in visibleAnnotations)

            {

                if ([place placesCount] > 1)

                    place.annotationView.pinColor = MKPinAnnotationColorGreen;

                else

                    place.annotationView.pinColor = MKPinAnnotationColorRed;

            }

            // 新增代码结束

        }

    }

    ```


    现在，任何代表热点集合的图钉都将显示为绿色，而单个热点的图钉则为红色，如图 5–27 所示。


    ![Image](img/9781430240051_Fig05-27.jpg)


    **图 5–27.** *带有数量特定颜色的分组标注*


    ## 总结


    Map Kit 框架可能是最常用的框架之一，这纯粹是因为它强大且极其灵活的能力，能够提供一个完全可定制而又简单的地图界面。在本章中，你讨论了 Map Kit
    的主要功能，从定位用户，到添加标注和覆盖层，甚至包括标注分组这一重要问题。然而，你仅仅是触及了 Map Kit 功能的皮毛，特别是在基于地图的问题解决领域。快速浏览
    Map Kit 文档，你会发现各种其他命令、方法和属性，这些内容并未涉及，涵盖范围从隔离地图的特定部分到完全自定义地图如何处理触摸事件。这些无数功能的效力，仅受限于开发者的想象力。


    # 第 6 章


    # 相机秘籍


    有大量移动应用需要与设备相机交互，包括拍摄图像、录制视频，以及提供叠加层（例如增强现实应用）等任务。iOS 开发者在与任何给定设备硬件的交互方式上拥有极大的控制权。在本章中，你将介绍访问和使用这些功能的多种方式，从简单的预定义界面到极其灵活的自定义实现。


    **注意：** iOS 模拟器不支持相机硬件。要测试本章中的大多数秘籍，必须在物理设备上运行。

