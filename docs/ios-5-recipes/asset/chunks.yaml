    `    scotland.flag = [UIImage imageNamed:@"scotland.png"];`


    `    Country *spain = [[Country alloc] init];`

    `    spain.name = @"Kingdom of Spain";`

    `    spain.motto = @"Plus Ultra";`

    `    spain.capital = @"Madrid";`

    `    spain.flag = [UIImage imageNamed:@"spain.png"];`


    Make sure to add all these `Country` objects to your array with the following
    line:


    `    self.countries = [NSMutableArray arrayWithObjects:usa, france, england, scotland,`

    `spain, nil];`


    Now that your testing data is all set up, you will focus on the construction of
    your `UITableView` through the use of its `delegate` and `data source` methods.
    Start by setting these two properties to your view controller in your `-viewDidLoad`
    with the following lines.'
  trans: '

    # 配方 9-1：创建无分组表格


    在 iOS 中，你可以使用两种 `UITableView`：**分组表格**和**无分组表格**。具体使用哪一种取决于具体的应用程序需求，但我们将从无分组表格入手，因为它更容易实现。


    为了构建一个功能完整且可定制的基于 `UITableView` 的应用程序，你将从一个空应用程序开始，逐步构建出一个能够显示各国信息的实用表格。新建一个项目，选择**空应用程序**模板，如图
    9-1 所示。这样你只会得到一个应用程序委托，你可以在此基础上构建所有视图控制器。


    ![图片](img/9781430240051_Fig09-01.jpg)


    **图 9-1.** 选择空应用程序以从头开始


    你将在本章中全程使用同一个项目，因此不必按照配方名称来命名项目，而是根据你的喜好命名（我选择了 "Countries"，因为该应用程序将专注于显示不同国家的信息），然后创建项目。我使用了类前缀
    "Main"，它仅会应用于你的应用程序委托文件，因为你使用的是空应用程序。


    由于你使用了空应用程序，你需要从创建主视图控制器开始，该控制器将包含你的 `UITableView`。


    新建一个文件，选择 **UIViewController Subclass** 模板。


    在下一个屏幕上，为你的视图控制器输入一个名称，并确保该类是 `UIViewController` 的子类。将其命名为 `MainTableViewController`。


    **注意：** 有些人可能认为创建 `UITableViewController` 的子类更方便，因为你会立即获得一个 `UITableView` 以及使用它所需的一些方法。这种方法的缺点是，控制器
    XIB 文件中提供的 `UITableView` 更难配置和调整框架。因此，你将使用 `UIViewController` 的子类，并自行添加 `UITableView`
    及其方法。


    由于你将专注于应用程序中表格的概念，首先从库中拖拽一个 `UITableView` 到你的视图中。为了让表格不占满整个视图，你可以将其稍微缩小，并在四周保留
    20 点的边距。切换到主视图，将背景颜色改为浅灰色，以便与 `UITableView` 区分开。最终显示效果将如图 9-2 所示。


    ![图片](img/9781430240051_Fig09-02.jpg)


    **图 9-2.** 在 XIB 文件中配置 `UITableView`


    使用属性名 `tableViewCountries` 将你的 `UITableView` 连接到头文件中的属性。


    接下来，切换到视图控制器的头文件。你需要让你的视图控制器遵循几个协议，以便完全实现你的 `UITableView`。添加 `UITableViewDelegate`
    和 `UITableViewDataSource` 协议，这样你的头文件现在看起来如下：


    ```

    @interface MainTableViewController : UIViewController <UITableViewDelegate, UITableViewDataSource>

    ```


    接着，你需要一个类型为 `NSArray` 的属性，用于存储显示表格信息所需的数据，命名为 `countries`。确保正确合成该数组，并在 `-viewDidUnload`
    方法中将其指针设为 `nil`。


    ```

    @property (strong, nonatomic) NSMutableArray *countries;

    ```


    在继续实现你的视图控制器之前，你需要设置好模型来存储数据。


    像之前一样新建一个文件，但选择 "Objective-C class" 模板。将你的类命名为 `Country`，并确保它是 `NSObject` 的子类，如图
    9-3 所示。


    ![图片](img/9781430240051_Fig09-03.jpg)


    **图 9-3.** 创建 `Country` 类作为 `NSObject` 的子类


    对于你的应用程序，你将让 `Country` 对象拥有四个属性：三个 `NSString` 分别表示国家名称、首都和格言，以及一个包含该国国旗的 `UIImage`。在
    `Country.h` 头文件中按如下方式定义这些属性：


    ```

    @property (nonatomic, strong) NSString *name;

    @property (nonatomic, strong) NSString *capital;

    @property (nonatomic, strong) NSString *motto;

    @property (nonatomic, strong) UIImage *flag;

    ```


    与你的视图控制器一样，你需要在实现文件中合成所有这些属性。但与视图控制器不同的是，你无需在任何方法中将它们设为 `nil`，因为没有 `-viewDidUnload`
    方法。


    ```

    @synthesize name, capital, motto, flag;

    ```


    现在模型已设置好，你可以返回视图控制器了。编译器需要能够访问你刚刚创建的 `Country` 类的方法，因此在视图控制器的头文件中添加以下导入语句。


    ```

    #import "Country.h"

    ```


    现在，你可以设置要在 `UITableView` 中使用的数据了。在继续之前，请确保你已下载了要添加的国家所使用的国旗图片文件。这里，我将使用美国、英格兰（而非英国）、苏格兰、法国和西班牙的国旗。我使用了一些来自维基百科的公共领域国旗图片，更多图片可在
    [`http://en.wikipedia.org/wiki/Gallery_of_country_flags`](http://en.wikipedia.org/wiki/Gallery_of_country_flags)
    找到。


    **注意：** 在处理图片时，请务必留意所有版权问题。公共领域图片（例如此处来自维基百科的图片）可以免费使用，且容易找到。


    将所有文件下载到 Finder 中后，选中它们并全部拖入 Xcode 项目中 "Supporting Files" 文件夹下。将出现一个对话框，提供将文件添加到项目的选项。确保勾选了
    "Copy items into destination group''s folder (if needed)" 选项，如图 9-4 所示。


    ![图片](img/9781430240051_Fig09-04.jpg)


    **图 9-4.** 添加文件的对话框；确保第一个复选框已勾选。


    在你的 `-viewDidLoad` 方法中，通过添加以下代码，用我之前提到的五个国家创建测试数据：


    ```

    Country *usa = [[Country alloc] init];

    usa.name = @"United States of America";

    usa.motto = @"E Pluribus Unum";

    usa.capital = @"Washington, D.C.";

    usa.flag = [UIImage imageNamed:@"usa.png"];


    Country *france = [[Country alloc] init];

    france.name = @"French Republic";

    france.motto = @"Liberté, Égalité, Fraternité";

    france.capital = @"Paris";

    france.flag = [UIImage imageNamed:@"france.png"];


    Country *england = [[Country alloc] init];

    england.name = @"England";

    england.motto = @"Dieu et mon droit";

    england.capital = @"London";

    england.flag = [UIImage imageNamed:@"england.png"];


    Country *scotland = [[Country alloc] init];

    scotland.name = @"Scotland";

    scotland.motto = @"In My Defens God Me Defend";

    scotland.capital = @"Edinburgh";

    scotland.flag = [UIImage imageNamed:@"scotland.png"];


    Country *spain = [[Country alloc] init];

    spain.name = @"Kingdom of Spain";

    spain.motto = @"Plus Ultra";

    spain.capital = @"Madrid";

    spain.flag = [UIImage imageNamed:@"spain.png"];

    ```


    确保使用以下代码行将所有 `Country` 对象添加到你的数组中：


    ```

    self.countries = [NSMutableArray arrayWithObjects:usa, france, england, scotland,
    spain, nil];

    ```


    现在测试数据已全部设置完毕，接下来你将专注于通过使用 `delegate` 和 `data source` 方法来构建你的 `UITableView`。首先，在
    `-viewDidLoad` 中使用以下代码行将这两个属性设置为你的视图控制器。

    '
- fmt: "`self.tableViewCountries.delegate = self;`\n`self.tableViewCountries.dataSource\
    \ = self;`\n\nYou can also set the title for the view controller, which will appear\
    \ at the top your of navigation bar with a simple command.\n\n`self.title = @\"\
    Countries\";`\n\nFor the sake of organization, all the methods that a `UITableView`\
    \ can call are split into two groups, the `delegate` methods and the `data source`\
    \ methods. `Delegate` methods are used to handle any kind of visual elements of\
    \ the `UITableView`, such as the row height of cells. `Data source` methods, on\
    \ the other hand, deal with the information displayed in the `UITableView`, such\
    \ as the configuration of any given cell's information.\n\nIn order to correctly\
    \ create an ungrouped `UITableView`, there are two main methods that you must\
    \ correctly implement.\n\nFirst, you need to specify to your `UITableView` how\
    \ many rows will be displayed via the `-tableView:numberOfRowsInSection:` method.\n\
    \n```\n-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return [self.countries count];\n}\n```\n\nSince your table is ungrouped,\
    \ you have only one section, so this method is nice and easy.\n\nSecond, you must\
    \ create a method to specify how the `UITableView`'s cells are configured using\
    \ the `-tableView:cellForRowAtIndexPath:` method. Here is a generic implementation\
    \ of this method that you will modify for your data.\n\n```\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell *cell\
    \ = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell\
    \ == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\
    \ reuseIdentifier:CellIdentifier];\n        cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n\
    \        cell.textLabel.font = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font\
    \ = [UIFont systemFontOfSize:12];\n    }\n\n    cell.textLabel.text=[NSString\
    \ stringWithFormat:@\"Cell %i\", indexPath.row];\n\n    return cell;\n}\n```\n\
    \nWhenever you are dealing with a `UITableView`, it is pretty much always a good\
    \ idea to \"reuse\" cells. Since most of the time not all the cells in a `UITableView`\
    \ will be currently in the view of the user, you are able to reuse any cells that\
    \ are not currently being displayed through the use of the `UITableView` method\
    \ `-dequeueReusableCellWithIdentifier:`, allowing you to save on both memory and\
    \ time, since you can perform any generic setup, such as font size, background\
    \ color, etc., only on the initial creation of the cell.\n\nIn the previous sample,\
    \ you can see that you first attempt to de-queue a reusable cell. If none are\
    \ available (i.e., if `cell` is `nil`), then you create a new cell and give it\
    \ a generic setup that can be reused for all of your cells. Then, no matter whether\
    \ the cell was de-queued or created, you update the text to the appropriate value.\n\
    \nIt is even possible to set up multiple differently configured cells, and specify\
    \ which one is used or reused via the `CellIdentifier`.\n\nThe last task you need\
    \ to do to get your program running is ensure that the application delegate, at\
    \ the start of your program, will present your view controller. Xcode did not\
    \ do this for you already because you chose the empty template.\n\nIn your application\
    \ delegate implementation, import the header file of your view controller so that\
    \ the compiler doesn't complain.\n\n```\n#import \"MainTableViewController.h\"\
    \n```\n\nYou will need to set up properties in your application delegate's header\
    \ file to store both your `UINavigationController` and your main view controller.\
    \ Create these like so:\n\n```\n@property (nonatomic, strong) UINavigationController\
    \ *navcon;\n@property (nonatomic, strong) MainTableViewController *tableVC;\n\
    ```\n\nMake sure to synthesize both with the following line in your application\
    \ delegate implementation file.\n\n```\n@synthesize navcon, tableVC;\n```"
