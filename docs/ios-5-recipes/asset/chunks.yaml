    and `-startDeviceMotionUpdatesUsingReferenceFrame:toQueue:WithHandler:`. We will
    go over the idea of the reference frame shortly.


    When retrieving data using an instance of `CMDeviceMotion` (through the `deviceMotion`
    property in your `CMMotionManager`), you can access five different properties.


    1.  `attitude`: This property is an instance of the `CMAttitude` class, which
    gives you an incredibly detailed insight into the device’s orientation at a given
    time as compared to a reference frame. In this class, you can access properties
    such as `roll`, `pitch`, and `yaw`. These values, measured in radians, allow you
    an incredibly accurate measurement of your device’s orientation.

    2.  `rotationRate`: This value, measured in radians per second, is just like the
    previous `rotationRate`, but gives a more accurate reading by reducing device
    bias that causes a still device to have nonzero rotation values.

    3.  `gravity`: Represents the acceleration caused solely by gravity on the device

    4.  `userAcceleration`: Represents the physical acceleration imparted on a device
    by the user outside of gravitational acceleration

    5.  `magneticField`: This value is similar to the one you used before; however,
    it removes any device bias, resulting in a significantly more accurate reading
    than you had before.


    **NOTE:** If you are unfamiliar with them, radians are a different way of measuring
    rotation from the more commonly used degrees. They are based around the value
    pi (3.14…). A radian value of pi or roughly 3.14 is equivalent to a 180-degree
    rotation, so any radian value can be converted to degrees by dividing by pi, and
    then multiplying by 180.


    You will go through your code and update it to use data only from the `deviceMotion`
    property.


