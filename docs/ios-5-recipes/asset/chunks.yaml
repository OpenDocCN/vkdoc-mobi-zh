    \ 同时存储文本和键值信息的应用*\n\n## 总结\n\n数据持久性几乎始终是开发应用程序时最重要的考虑因素之一。开发者必须考虑他们想要存储的数据类型、数据量、数据间如何关联，以及他们的应用程序是否可能跨越多个设备。在此基础上，必须选择存储数据的方法，无论是简单的\
    \ `NSUserDefaults` 方法、强大的文件管理系统，还是复杂的 Core Data 框架（如下一章所述）。在 iOS 5.0 中，新增的 iCloud\
    \ 服务访问彻底改变了应用程序存储数据的方式，允许在运行同一应用的多个设备之间近乎实时地持久化数据。随着内存、存储和移动应用在技术世界中的规模、重要性和相关性不断增长，这些主题将变得更加重要。通过深入理解\
    \ iOS 中数据持久化的最新概念，你能够始终以最快、最高效、最强大的方法让用户的数据保持最新。\n\n## 第 11 章\n\n## Core Data\
    \ 配方\n\n开发者面临的最常见问题之一是持久化概念，或更简单地说，是存储数据。对于很大比例的应用程序而言，简单地在变量中存储信息是不够的，因为一旦应用程序关闭，所有内容都将丢失。虽然前一章涵盖了在多次使用之间存储数据的多种选项，但没有一个能比得上\
    \ Core Data 的多功能性、强大性和简洁性。\n\n有大量的资源，包括整本书（我强烈推荐 Michael Privat 和 Robert Warner\
    \ 所著的 *Pro Core Data for iOS*），它们仅专注于 Core Data 这一主题。指望在一章中涵盖如此多面化概念的每个部分是不现实的。因此，你不是从头开始构建\
    \ Core Data 接口，而是使用预构建的 Xcode 模板，以便提供对 Core Data 概念的最简单演示。这样，作为开发者的你可以更轻松地掌握 Core\
    \ Data 应用，然后通过其他更专门的来源，专注于该主题更具体、更复杂的要点。"
- fmt: "### What Is Core Data?\n\n`Core Data` is persistence. Not only is `Core Data`\
    \ persistence, but also it is by far one of the best methods for implementing\
    \ persistence in iOS.\n\nPut simply, `Core Data`, in conjunction with `Xcode`,\
    \ allows a developer to perform three main tasks:\n\n1.  Create a data model\n\
    2.  Persist information\n3.  Access data\n\nFirst, it is important to understand\
    \ exactly what a data model is. This term applies essentially to whatever structure\
    \ any given application's data is built around. This could be anything as simple\
    \ as an `NSString` or an `NSArray` in a simple application, all the way up to\
    \ a complex, interconnected system of object types, each with their own properties,\
    \ methods, and pointers to other objects.\n\nNext, you should have a basic understanding\
    \ of the various types of objects and classes that are involved in `Core Data`\
    \ when you need to create, save, and retrieve information, and how you use them.\n\
    \n1.  `NSManagedObjectModel`: This is an unusual class, because you don't quite\
    \ ever deal with it directly when you are writing code if you use a template.\
    \ This is how iOS refers to your data model, which you will create later. When\
    \ you create your project for the first recipe shortly, you will see an instance\
    \ of this type in your application delegate, and you will see it used in some\
    \ pre-generated methods, but aside from that, you will have no reason to deal\
    \ with this class programmatically.\n2.  `NSPersistentStoreCoordinator`: This\
    \ class is one that you very rarely will need to deal with. It works mostly in\
    \ the background of an application to “coordinate” between your application and\
    \ the underlying database or “Persistent Store”, but you will not need to send\
    \ any actions to it. The most important part of this class that you need to know\
    \ about is the “type” of persistent store that is being used. There are three\
    \ types of persistent stores:\n    1.  `NSSQLiteStoreType`\n    2.  `NSBinaryStoreType`\n\
    \    3.  `NSInMemoryStoreType`\n\n    The default value is the first, `NSSQLiteStoreType`,\
    \ specifying that you are using a persistent store built around the `SQLite` foundation.\
    \ You will continue to use this type for your applications.\n\n    Depending on\
    \ your application, you may also find the `NSInMemoryStoreType` useful, even though\
    \ it does not actually persist data between application uses. This may be more\
    \ suited to an application that caches information from a remote source, and thus\
    \ needs a data model built around `Core Data`, but does not actually need to store\
    \ the information, as it can be retrieved again from the remote source.\n\n3.\
    \  `NSManagedObjectContext`: This class, unlike the previous two, is one that\
    \ you will be dealing with quite often. In the simplest terms, this class acts\
    \ as a sort of “workspace” for your information. Any time you need to retrieve\
    \ or store information, you will need a pointer to this class to perform the action.\
    \ For this reason, a very common practice in `Core Data`–based applications is\
    \ to “pass around” a pointer to this class between each part of the application\
    \ by giving each view controller an `NSManagedObjectContext` property.\n4.  `NSFetchedResultsController`:\
    \ This is the primary class for actually “fetching” results through the `NSManagedObjectContext`.\
    \ It is not only very powerful, but also very easy to use, especially in conjunction\
    \ with a `UITableView`. You will see plenty of examples of using this class throughout\
    \ this chapter.\n\nYou will utilize a variety of other classes specific to `Core\
    \ Data` throughout this chapter, but these are more easily explained once you\
    \ have gone through the creation of your data model.\n\n### Recipe 11–1: Creating\
    \ a Data Model\n\nFor this entire chapter, you will create a new project called\
    \ “MusicSchool”. Make sure to select the `Empty Application` template, as in [Figure\
    \ 11–1](#Chapter11.html#fig_11_1).\n\n![Image](images/9781430240051_Fig11-01.jpg)\n\
    \n**Figure 11–1.** *Creating an empty application to start from scratch*\n\nOn\
    \ the next screen, when you enter the project name of “MusicSchool”, be sure to\
    \ select the box labeled “Use Core Data”. This is the easiest way to get a nice\
    \ template for using `Core Data`, which will simplify your life greatly, pre-generating\
    \ a great deal of necessary code. Set the class prefix to “Main”, and make sure\
    \ the `Use Automatic Reference Counting` box is checked as well, as shown in [Figure\
    \ 11–2](#Chapter11.html#fig_11_2). The `Company Identifier` should be changed\
    \ to your own name or company name.\n\n![Image](images/9781430240051_Fig11-02.jpg)\n\
    \n**Figure 11–2.** *Configuring your project to use Core Data*\n\nClick `Create`\
    \ on the next screen to finish the creation of your project as usual.\n\nNow that\
    \ you have set up your project to use a `Core Data` template, you actually have\
    \ a lot of the work involved in using the `Core Data` framework already done for\
    \ you, so you are able to move directly on to building your data model.\n\nAs\
    \ you've probably guessed already, your data model will be built to represent\
    \ the idea of a music school, specifically focusing on the teachers and students.\
    \ Before you proceed to do anything in `Xcode`, you need to plan out exactly how\
    \ your model will work.\n\nWhen working with a data model, the first kind of item\
    \ you have to make is an “entity.” An entity is essentially the `Core Data` equivalent\
    \ of an object, and represents an object in the exact same way.\n\nIn the same\
    \ way that objects (or `NSObject`s in Objective-C) have properties, entities have\
    \ “attributes.” These are the simpler pieces of data associated with any given\
    \ entity, such as a name, age, or birthday, that do not require a pointer to any\
    \ other entity.\n\nWhenever you want one entity to have a pointer to another,\
    \ you use a “relationship.” A relationship can be either “to-one” or “to-many,”\
    \ referring to whether an entity has a pointer to one instance of another entity\
    \ or multiple ones. When dealing with the “to-many” relationship, you will notice\
    \ that the entity will have a pointer to a set of multiple other entities. Entities\
    \ can easily have relationships that point to themselves, which might be the case\
    \ of a `Person` entity having a relationship to another `Person`, in the form\
    \ of a spouse. You can also set up “inverse relationships,” which act as paths\
    \ back and forth between entities. For example, a `Teacher` entity might have\
    \ a “to-many” relationship to a `Student` entity called “students”, and the `Student`’s\
    \ relationship to the `Teacher`, called “teachers”, will be the inverse of this.\
    \ With this, you can access any `Teacher`’s list of `Students` and their respective\
    \ list of `Teachers` quite easily.\n\nSo for your data model, you will have three\
    \ entities with their respective attributes and relationships like so:\n\n1. \
    \ `Teacher`\n    1.  Attributes: Name, age, primary language, and number of years\
    \ teaching\n    2.  Relationships: Students (to-many) and Instruments (to-many)\n\
    2.  `Student`\n    1.  Attributes: Name, age, primary language, and skill level\n\
    \    2.  Relationships: Teacher (to-one) and Instrument (to-one)\n3.  `Instrument`\n\
    \    *   Attributes: Name and family\n    *   Relationships: Students (to-many)\
    \ and Teachers (to-many)\n\nWhile all these relationships going back and forth\
    \ between your objects may seem a bit convoluted, this will actually allow you\
    \ to create a very well-defined data model from which you can query nearly any\
    \ piece of information you need from another. For example, you might be able to\
    \ easily find all the teachers who play the piano, and then access their respective\
    \ names."
