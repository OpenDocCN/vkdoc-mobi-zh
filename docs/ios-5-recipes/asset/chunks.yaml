- fmt: "### A Few Notes on `MPMediaPropertyPredicates`:\n\n**3.** Whenever multiple\
    \ filter predicates specifying different properties are added to a query, the\
    \ predicates are evaluated using the AND operator, meaning that if you specify\
    \ an artist name and an album name, you will receive only songs by that artist\
    \ AND from that specific album.\n\n**4.** Do not add two filter predicates of\
    \ the same property to a query, as the resulting behavior is not defined. If you\
    \ wish to query a database for multiple specific values of the same property,\
    \ such as filtering for all songs by two different artists, the better method\
    \ is to simply create two queries, and then combine their results afterward.\n\
    \n**5.** The `comparisonType` property of an `MPMediaPropertyPredicate` helps\
    \ specify how exact you want your predicate to be. A value of `MPMediaPredicateComparisonEqualTo`\
    \ returns only items with the string exactly equal to the given one, while a value\
    \ of `MPMediaPredicateComparisonContains`, as shown earlier, returns items that\
    \ contain the given string, proving to be usually a less specific search.\n\n\
    As an added functionality, `MPMediaQuery`s can also be given a “grouping property”,\
    \ so that they automatically group their results. You could, for example, filter\
    \ a query by a specific artist, but group according to the album name. In this\
    \ way, you can retrieve all the songs by a specific artist but iterate through\
    \ them as if they were in albums, as demonstrated by the following code, which\
    \ could be added to your `-queryPressed:` method, in which the following `query`\
    \ object is created.\n\n```\n[query setGroupingType: MPMediaGroupingAlbum];\n\
    \        NSArray *albums = [query collections];\n        for (MPMediaItemCollection\
    \ *album in albums)\n        {\n            MPMediaItem *representativeItem =\
    \ [album representativeItem];\n            NSString *albumName = [representativeItem\
    \ valueForProperty: MPMediaItemPropertyAlbumTitle];\n            NSLog (@\"%@\"\
    , albumName);\n        }\n```\n\nYou can also set a grouping type by using class\
    \ methods, such as `+albumsQuery`, for `MPMediaQuery`, which will create your\
    \ `query` instance with a pre-set grouping property.\n\n### Recipe 7–4: Background\
    \ Playing and Now Playing Info\n\nSo far you have seen multiple techniques for\
    \ dealing with audio in iOS, from playing a single sound, to accessing the library,\
    \ to utilizing the iPod player. Each technique tends to have its pros, cons, and\
    \ specific uses depending on the goal of your application.\n\nHowever, when all\
    \ these functionalities are used in conjunction, the possibilities for your app\
    \ become nearly limitless. Here, you will combine the use of the `AVFoundation`,\
    \ `MPMediaQuery`, `MPMediaPickerController`, and `MPNowPlayingInfoCenter` (a new\
    \ iOS 5.0 feature!) to create your own version, albeit a less pretty one, of the\
    \ iPod user interface such that your music can continue to play even if your application\
    \ is in the background.\n\nMake a new project using the Single View Application\
    \ template, naming it “Chapter7Recipe3”, with class prefix “Main”.\n\nNext, you\
    \ will make sure all the frameworks you need are imported. Go ahead and link the\
    \ following frameworks to your project, exactly as you have in all the previous\
    \ recipes in this chapter.\n\n- `AVFoundation.framework`: You will use this to\
    \ play your audio files.\n- `MediaPlayer.framework`: This will allow you to access\
    \ your library and media files.\n- `CoreMedia.framework`: You won't use any classes\
    \ from this framework, but you will need some of the `CMTime` functions to help\
    \ deal with your audio player.\n\nAdd the following import statements to your\
    \ view controller's header file. You do not need one for the Core Media framework\
    \ in this project.\n\n```\n#import <MediaPlayer/MediaPlayer.h>\n#import <AVFoundation/AVFoundation.h>\n\
    ```\n\nYour view controller is also going to end up as the delegate for several\
    \ objects, so add protocol statements to your header file for the following protocols:\n\
    \n- `UITextFieldDelegate`\n- `AVAudioSessionDelegate`\n- `MPMediaPickerControllerDelegate`\n\
    \nNext you will set up your app to be able to continue playing music once it has\
    \ entered the background of the device. The first thing you need to do is declare\
    \ a property of type `AVAudioSession`, called `session`. Make sure to `@synthesize`\
    \ it, and then in your `-viewDidUnload` set it to `nil` as usual.\n\n```\n@property\
    \ (nonatomic, strong) AVAudioSession *session;\n```\n\nNext, add the following\
    \ code to your `-viewDidLoad` method:\n\n```\nself.session = [AVAudioSession sharedInstance];\n\
    self.session.delegate = self;\n[self.session setCategory:AVAudioSessionCategoryPlayback\
    \ error:nil];\n[self.session setActive:YES error:nil];\n```\n\nBy specifying that\
    \ your `session`'s category is of type `AVAudioSessionCategoryPlayback`, you are\
    \ telling your device that your application's main focus is playing music, and\
    \ should therefore be allowed to continue playing audio while the application\
    \ is in the background.\n\nYou need to also make sure your session is deactivated\
    \ when you are done with it, so add the following line to your `-viewDidUnload`\
    \ method.\n\n```\n[self.session setActive:NO error:nil];\n```\n\nNow that you\
    \ have configured your `AVAudioSession`, you need to edit your application's `.plist`\
    \ file in order to specify that your application, when in the background, must\
    \ be allowed to run audio. You can usually find this file in the Supporting Files\
    \ group of your project. If not, you can find the file in your project's folder,\
    \ as in [Figure 7–8](#Chapter07.html#fig_7_8).\n\n![Image](images/9781430240051_Fig07-08.jpg)\n\
    \n**Figure 7–8.** *Finding the `.plist` file*\n\nBy default, this file should\
