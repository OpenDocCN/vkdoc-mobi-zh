- fmt: '当您运行应用程序时，“关于我们”视图上的两个按钮现在都能正常工作，如[图 2–42](#Chapter02.html#fig_2_42)所示。无需编写任何代码，您就可以加载这些页面。


    ![Image](images/9781430240051_Fig02-42.jpg)


    **Figure 2–42.** *应用程序的三个结果视图*


    ### 在场景间传递数据


    前面的应用部分无需任何代码就能很好地工作，但只需在后台添加少量代码，您就能在极短的时间内创建出功能更强大的界面。


    当您看到`UITableView`时，几乎会本能地知道，当您触摸其中一个单元格时，很可能关联着一个详细视图。现在我们来添加这个详细视图。将名为`AppDetailsViewController`的新`UIViewController`对象拖放到故事板上，并向其中添加一个`UIImage`、一个`UILabel`、一个`UITextView`和两个`UIButton`，类似于[图
    2–43](#Chapter02.html#fig_2_43)所示。


    ![Image](images/9781430240051_Fig02-43.jpg)


    **Figure 2–43.** *详细视图的用户界面*


    您希望每个`UITableViewCell`在被触摸时都能跳转到这个 App 详细视图，因此按住^键并点击拖动，从`UITableViewCell`拖到详细视图。和之前一样，会弹出一个菜单显示可用的操作，您应该选择“`performSegueWithIdentifier:selector:`”，如[图
    2–44](#Chapter02.html#fig_2_44)和[图 2–45](#Chapter02.html#fig_2_45)所示。


    ![Image](images/9781430240051_Fig02-44.jpg)


    **Figure 2–44.** *将单元格连接到详细视图*


    ![Image](images/9781430240051_Fig02-45.jpg)


    **Figure 2–45.** *选择跳转动作*


    您将看到一条跳转线连接表格和 App 详细视图控制器。正如[图 2–46](#Chapter02.html#fig_2_46)所示，选中该跳转线，并在属性检查器中为其输入一个标识符。


    ![Image](images/9781430240051_Fig02-46.jpg)


    **Figure 2–46.** *配置详细视图跳转标识符*


    对另外两个`UITableViewCell`重复此过程，并为每个连接使用相同的跳转标识符，因为您将对每个跳转执行相同的代码。现在您应该看到三条跳转线连接这两个视图，类似于[图
    2–47](#Chapter02.html#fig_2_47)所示。


    ![Image](images/9781430240051_Fig02-47.jpg)


    **Figure 2–47.** *连接`UITableView`到视图控制器的多个跳转线*


    到目前为止，您没有使用任何代码就完成了这些工作，但这种便利即将结束。您需要在 App 详细视图控制器上生成一些动态内容，因此需要深入编写一些代码。


    首先，您将创建一个自定义类来保存应用的相关信息。由于目前应用的列表是静态的，我将创建一个`NSObject`的非常基础的子类来保存数据。使用菜单项 **文件**![Image](images/U001.jpg)![Image](images/U001.jpg)
    **新建** ![Image](images/U001.jpg) **新建文件…**，并从 Cocoa Touch 模板中选择“Objective-C class”，如[图
    2–48](#Chapter02.html#fig_2_48)所示。


    ![Image](images/9781430240051_Fig02-48.jpg)


    **Figure 2–48.** *选择“Objective-C class”模板来创建一个新的基础类*


    现在，如[图 2–49](#Chapter02.html#fig_2_49)所示，如果“Subclass of”下拉菜单中尚未指定，请从其中选择`NSObject`。


    ![Image](images/9781430240051_Fig02-49.jpg)


    **Figure 2–49.** *确保“Subclass of”字段指定为`NSObject`，以创建一个`Object`子类*


    最后，将类名设置为`MyAppClass`。如[图 2–50](#Chapter02.html#fig_2_50)所示，但与之前一样，较新版本的 Xcode
    可能会将此步骤与之前指定“Subclass of”字段的步骤合并。


    ![Image](images/9781430240051_Fig02-50.jpg)


    **Figure 2–50.** *指定类名——在较新版本的 Xcode 中，此步骤可能已包含在前一个屏幕中。*


    您希望这个类具有以下接口（`.h`）：


    ```

    //  MyAppClass.h

    #import <Foundation/Foundation.h>


    @interface MyAppClass : NSObject


    @property(strong, nonatomic) NSString *appName;

    @property(strong, nonatomic) UIImage *iconImage;

    @property(strong, nonatomic) NSString *appDescription;

    @property(strong, nonatomic) NSURL *appStoreURL;

    @property(strong, nonatomic) NSURL *webSiteURL;


    +(MyAppClass *)appWithAppID:(int)appID;


    @end

    ```'
  raw: 'And when you run the application, both buttons on the About Us view will now
    work, demonstrated in [Figure 2–42](#Chapter02.html#fig_2_42). And you can load
    the pages without ever having written a bit of code.


    ![Image](images/9781430240051_Fig02-42.jpg)


    **Figure 2–42.** *The three resulting views of your application*


    #### Passing Data Between Scenes


    The previous app segment works well enough without any code, but just by adding
    a little bit of code behind the scenes, you can create an even more powerful interface
    in a very short period of time.


    When you see a `UITableView`, you almost instinctively know that there is likely
    to be a detailed view attached to it when you touch one of the cells. Let us add
    that detail view now. Drag and drop a new `UIViewController` object named `AppDetailsViewController`
    onto the storyboard, and add a `UIImage`, `UILabel`, `UITextView`, and two `UIButton`s
    to it, resembling [Figure 2–43](#Chapter02.html#fig_2_43).


    ![Image](images/9781430240051_Fig02-43.jpg)


    **Figure 2–43.** *User interface for detail view*


    You want each of the `UITableViewCell`s to segue to this App Details view when
    touched, so ^-click-drag from the `UITableViewCell` to the detail view. Just as
    before, a pop-up will display the available actions, and you should select “performSegueWithIdentifier:selector:”,
    as demonstrated in [Figures 2–44](#Chapter02.html#fig_2_44) and [2–45](#Chapter02.html#fig_2_45).


    ![Image](images/9781430240051_Fig02-44.jpg)


    **Figure 2–44.** *Connecting a cell to the detail view*


    ![Image](images/9781430240051_Fig02-45.jpg)


    **Figure 2–45.** *Selecting a segue action*


    You will see the segue connecting the table to the App Details view controller.
    Just as is shown in [Figure 2–46](#Chapter02.html#fig_2_46), select the segue
    and enter an identifier for it in the Attributes inspector.


    ![Image](images/9781430240051_Fig02-46.jpg)


    **Figure 2–46.** *Configuring detail segue identifier*


    Repeat the process for the other two `UITableViewCell`s, and use the same segue
    identifier for each connection since you are going to execute the same code for
    each segue. You should now see three segues linking the two views, similar to
    [Figure 2–47](#Chapter02.html#fig_2_47).


    ![Image](images/9781430240051_Fig02-47.jpg)


    **Figure 2–47.** *Multiple segues connecting a `UITableView` to a view controller*


    You’ve gotten this far without using any code, but that convenience is about to
    end. You need to start generating some dynamic content on the App Details view
    controller, and you are going to need to dive into some code for that.


    First you are going to create a custom class to hold information about your apps.
    Since this is a static list of apps at the moment, I’m going to create a very
    basic subclass of `NSObject` to hold the data. Use the menu option **File**![Image](images/U001.jpg)![Image](images/U001.jpg)
    **New** ![Image](images/U001.jpg) **New File…**, and select “Objective-C class”
    from the Cocoa Touch templates, as demonstrated in [Figure 2–48](#Chapter02.html#fig_2_48).


    ![Image](images/9781430240051_Fig02-48.jpg)


    **Figure 2–48.** *Selecting the “Objective-C class” template to make a new basic
    class*


    Now, as shown in [Figure 2–49](#Chapter02.html#fig_2_49), select NSObject from
    the “Subclass of” drop-down if it is not already specified.


    ![Image](images/9781430240051_Fig02-49.jpg)


    **Figure 2–49.** *Ensuring the “Subclass of” field is specified to “NSObject”
    to create an `Object` subclass*


    And finally, set the class name to `MyAppClass`. This is shown in [Figure 2–50](#Chapter02.html#fig_2_50),
    but just as before, newer versions of Xcode may have this combined with the previous
    step of specifying the “Subclass of” field.


    ![Image](images/9781430240051_Fig02-50.jpg)


    **Figure 2–50.** *Specifying the class name—on newer versions of Xcode, this may
    be included in the previous screen.*


    You want this class to have the following interface (`.h`):


    `//  MyAppClass.h`

    `#import <Foundation/Foundation.h>`


    `@interface MyAppClass : NSObject`


    `@property(strong, nonatomic) NSString *appName;`

    `@property(strong, nonatomic) UIImage *iconImage;`

    `@property(strong, nonatomic) NSString *appDescription;`

    `@property(strong, nonatomic) NSURL *appStoreURL;`

    `@property(strong, nonatomic) NSURL *webSiteURL;`


    `+(MyAppClass *)appWithAppID:(int)appID;`


    `@end`'
