- fmt: '### Recipe 10–3: Persistence with iCloud


    One of the most expansive additions to iOS with the release of iOS 5.0 is the
    ability to create applications that have access to the new iCloud service. By
    using concepts similar to the file management system from the previous recipe,
    you are able to save, persist, and load data, not just in a local device, but
    also across multiple devices using the same application.


    Throughout this section, all recipes will require access to an iOS development
    program, as well as a physical iOS device.


    In order to configure an application for use with iCloud, a variety of configuration
    tasks must first be completed. Start by creating a new project using the `Single
    View Application` template as before. Make sure your project name is `iCloudTest`,
    and your class prefix is `iCloudStore`. While these values normally do not make
    much difference in your applications, it will help simplify this demonstration
    if your names follow those used in this recipe. Your project configuration should
    resemble [Figure 10–9](#Chapter10.html#fig_10_9).


    ![Image](images/9781430240051_Fig10-09.jpg)


    **Figure 10–9.** *Configuring an application to work with iCloud*


    First, you must configure your project to allow for "entitlements." In your new
    project, navigate to the project''s Target settings, and scroll down to the bottom
    section called "Entitlements". Click the check box labeled "Enable Entitlements",
    as shown in the bottom of [Figure 10–10](#Chapter10.html#fig_10_10), to have Xcode
    automatically generate your entitlements file.


    ![Image](images/9781430240051_Fig10-10.jpg)


    **Figure 10–10.** *Enabling entitlements to allow communication with iCloud*


    Next, you need to generate a special "App ID" for this application. In your web
    browser, log into the iOS Developer''s Member Center at [`http://developer.apple.com/membercenter/`](http://developer.apple.com/membercenter/).
    Navigate to the iOS Provisioning Portal, and then move to the App IDs section.
    Click the button titled "New App ID".


    The next screen you see will prompt you to enter a description, as well as a bundle
    identifier. Set the description to `iCloudTest`. For the bundle identifier, you
    need to enter the exact same identifier that Xcode has given your app. This can
    be found at the top of the project''s Targets settings, above the Entitlements
    section, as in [Figure 10–11](#Chapter10.html#fig_10_11). It will most likely
    have a format along the lines of `com.domainName.iCloudTest`. Copy the text listed
    under "Identifier" into the Bundle Identifier line in your browser.


    ![Image](images/9781430240051_Fig10-11.jpg)


    **Figure 10–11.** *Finding the identifier for your app to configure*


    In [Figure 10–11](#Chapter10.html#fig_10_11), my identifier is `com.ColinFrancis.iCloudTest`,
    so I will copy this to my browser as the bundle identifier, as in [Figure 10–12](#Chapter10.html#fig_10_12).


    ![Image](images/9781430240051_Fig10-12.jpg)


    **Figure 10–12.** *Copying your project''s identifier into the Bundle Identifier
    field*


    Upon creating this new App ID, you will be returned to your table of created App
    IDs. Find the one that you just created, and click the `Configure` link.


    In this screen, all you need to do is check the box labeled "Enable for iCloud",
    shown in [Figure 10–13](#Chapter10.html#fig_10_13). If a dialog appears warning
    you of having to manually regenerate profiles, simply click OK.


    ![Image](images/9781430240051_Fig10-13.jpg)


    **Figure 10–13.** *Enabling iCloud for your certificate*


    Click **Done** to finish configuring your App ID.


    Next, move down to the `Provisioning` tab listed on the left-hand side of the
    screen underneath the App IDs tab. Click on the `New Profile` button to begin
    creating a new provisioning profile.


    Name this new profile `iCloudProfile`. Select your certificate that you should
    already have as an iOS developer. Set the App ID field to your recently made `iCloudTest`
    App ID, and make sure to check the boxes next to whichever devices you want to
    test this application on. [Figure 10–14](#Chapter10.html#fig_10_14) shows my configuration
    screen, which yours should resemble with your own information.


    ![Image](images/9781430240051_Fig10-14.jpg)


    **Figure 10–14.** *Creating a new provisioning profile for your iCloud app*


    Click **Submit** to return to your list of provisioning profiles. You should see
    your new profile listed. If its status is listed as "Pending", simply refresh
    the page until it says "Active".


    Next, click the **Download** button next to your newly created profile to download
    it to your computer.


    Once your file has finished downloading (it shouldn''t take long), drag the file
    from the Finder to the Xcode icon in your dock to import it into Xcode. This should
    bring up the `Organizer` window as well, which will list all of your provisioning
    profiles.


    Finally, in the `Organizer`, while your device is connected to your computer,
    drag the new profile from the displayed list to the `Provisioning Profiles` section
    under your device, shown in [Figure 10–15](#Chapter10.html#fig_10_15).


    ![Image](images/9781430240051_Fig10-15.jpg)


    **Figure 10–15.** *Copying your new profile into the Provisioning Profiles section
    of your device*


    At this point, your device is fully configured to run the project you have created.


    You must perform one last step in your project in order for the application to
    physically be able to use the iCloud services. You will need to define a constant
    in your view controller with the "Ubiquity Container URL". This `NSString` will
    essentially be your developer account''s ID prefixed to your bundle identifier.
    For example, if you have your bundle identifier `com.domainName.iCloudTest` and
    account ID `12345ABCDE`, the URL will be `12345ABCDE.com.domainName.iCloudTest`.
    If you are unsure of your account ID, you can find it by navigating to the `Member
    Center` again and going to the **Your Account** tab. If you are using an individual
    account, it will be listed under your name next to **Individual ID**.


    Throughout this project, you will use the example URL of `12345ABCDE.com.domainName.iCloudTest`.
    Make sure that you change this according to your own account ID and domain name.


    Add the following definition to the top of your `iCloudStoreViewController.m`
    file so that you can reference it later.


    ```

    #define UBIQUITY_CONTAINER_URL @"12345ABCDE.com.domainName.iCloudTest"

    ```


    In order for your application to work properly, you must also make sure that your
    entitlements file has been properly configured with this same URL. Navigate to
    your entitlements file, and make sure the values for both `com.apple.developer.ubiquity-container-identifiers`
    (Item 0) and `com.apple.developer.ubiquity-kvstore-identifier` are set to this
    value. Xcode should have automatically set these, but it is best to always confirm
    this setup. If not, set them, as shown in [Figure 10–16](#Chapter10.html#fig_10_16).


    ![Image](images/9781430240051_Fig10-16.jpg)


    **Figure 10–16.** *Confirming the correct configuration of your entitlements file*


    Now that your application and device are configured to work with iCloud, you can
    continue to build your actual application.


    In order to build a simple program to save a text document to iCloud, you need
    to make use of the `UIDocument` abstract class. Your subclass of this will contain
    all the information needed to encode your text information into a file that can
    be saved online. Create a new file and select the "Objective-C class" template.
    The easiest way to configure this file is to start off by naming the `NSObject`
    class as the parent class. You will change the actual superclass shortly. Name
    the file `MyDocument`.'
  raw: '### Recipe 10–3: Persistence with iCloud


    One of the most expansive additions to iOS with the release of iOS 5.0 is the
    ability to create applications that have access to the new iCloud service. By
    using concepts similar to the file management system from the previous recipe,
    you are able to save, persist, and load data, not just in a local device, but
    also across multiple devices using the same application.


    Throughout this section, all recipes will require access to an iOS development
    program, as well as a physical iOS device.


    In order to configure an application for use with iCloud, a variety of configuration
    tasks must first be completed. Start by creating a new project using the Single
    View Application template as before. Make sure your project name is “iCloudTest”,
    and your class prefix is “iCloudStore”. While these values normally do not make
    much difference in your applications, it will help simplify this demonstration
    if your names follow those used in this recipe. Your project configuration should
    resemble [Figure 10–9](#Chapter10.html#fig_10_9).


    ![Image](images/9781430240051_Fig10-09.jpg)


    **Figure 10–9.** *Configuring an application to work with iCloud*


    First, you must configure your project to allow for “entitlements.” In your new
    project, navigate to the project’s Target settings, and scroll down to the bottom
    section called “Entitlements”. Click the check box labeled “Enable Entitlements”,
    as shown in the bottom of [Figure 10–10](#Chapter10.html#fig_10_10), to have Xcode
    automatically generate your entitlements file.


    ![Image](images/9781430240051_Fig10-10.jpg)


