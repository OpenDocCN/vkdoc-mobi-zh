    \ persistence in iOS.\n\nPut simply, Core Data, in conjunction with Xcode, allows\
    \ a developer to perform three main tasks:\n\n1.  Create a data model\n2.  Persist\
    \ information\n3.  Access data\n\nFirst, it is important to understand exactly\
    \ what a data model is. This term applies essentially to whatever structure any\
    \ given application's data is built around. This could be anything as simple as\
    \ an `NSString` or an `NSArray` in a simple application, all the way up to a complex,\
    \ interconnected system of object types, each with their own properties, methods,\
    \ and pointers to other objects.\n\nNext, you should have a basic understanding\
    \ of the various types of objects and classes that are involved in Core Data when\
    \ you need to create, save, and retrieve information, and how you use them.\n\n\
    1.  `NSManagedObjectModel`: This is an unusual class, because you don't quite\
    \ ever deal with it directly when you are writing code if you use a template.\
    \ This is how iOS refers to your data model, which you will create later. When\
    \ you create your project for the first recipe shortly, you will see an instance\
    \ of this type in your application delegate, and you will see it used in some\
    \ pre-generated methods, but aside from that, you will have no reason to deal\
    \ with this class programmatically.\n2.  `NSPersistentStoreCoordinator`: This\
    \ class is one that you very rarely will need to deal with. It works mostly in\
    \ the background of an application to “coordinate” between your application and\
    \ the underlying database or “Persistent Store”, but you will not need to send\
    \ any actions to it. The most important part of this class that you need to know\
    \ about is the “type” of persistent store that is being used. There are three\
    \ types of persistent stores:\n\n    1.  `NSSQLiteStoreType`\n    2.  `NSBinaryStoreType`\n\
    \    3.  `NSInMemoryStoreType`\n\n    The default value is the first, `NSSQLiteStoreType`,\
    \ specifying that you are using a persistent store built around the SQLite foundation.\
    \ You will continue to use this type for your applications.\n\n    Depending on\
    \ your application, you may also find the `NSInMemoryStoreType` useful, even though\
    \ it does not actually persist data between application uses. This may be more\
    \ suited to an application that caches information from a remote source, and thus\
    \ needs a data model built around Core Data, but does not actually need to store\
    \ the information, as it can be retrieved again from the remote source.\n\n3.\
    \  `NSManagedObjectContext`: This class, unlike the previous two, is one that\
    \ you will be dealing with quite often. In the simplest terms, this class acts\
    \ as a sort of “workspace” for your information. Any time you need to retrieve\
    \ or store information, you will need a pointer to this class to perform the action.\
    \ For this reason, a very common practice in Core Data–based applications is to\
    \ “pass around” a pointer to this class between each part of the application by\
    \ giving each view controller an `NSManagedObjectContext` property.\n4.  `NSFetchedResultsController`:\
    \ This is the primary class for actually “fetching” results through the `NSManagedObjectContext`.\
    \ It is not only very powerful, but also very easy to use, especially in conjunction\
    \ with a `UITableView`. You will see plenty of examples of using this class throughout\
    \ this chapter.\n\nYou will utilize a variety of other classes specific to Core\
    \ Data throughout this chapter, but these are more easily explained once you have\
    \ gone through the creation of your data model.\n\n### Recipe 11–1: Creating a\
    \ Data Model\n\nFor this entire chapter, you will create a new project called\
    \ “MusicSchool”. Make sure to select the Empty Application template, as in [Figure\
    \ 11–1](#Chapter11.html#fig_11_1).\n\n![Image](images/9781430240051_Fig11-01.jpg)\n\
    \n**Figure 11–1.** *Creating an empty application to start from scratch*\n\nOn\
    \ the next screen, when you enter the project name of “MusicSchool”, be sure to\
    \ select the box labeled “Use Core Data”. This is the easiest way to get a nice\
    \ template for using Core Data, which will simplify your life greatly, pre-generating\
    \ a great deal of necessary code. Set the class prefix to “Main”, and make sure\
    \ the Use Automatic Reference Counting box is checked as well, as shown in [Figure\
    \ 11–2](#Chapter11.html#fig_11_2). The Company Identifier should be changed to\
    \ your own name or company name.\n\n![Image](images/9781430240051_Fig11-02.jpg)\n\
    \n**Figure 11–.** *Configuring your project to use Core Data*\n\nClick Create\
    \ on the next screen to finish the creation of your project as usual.\n\nNow that\
    \ you have set up your project to use a Core Data template, you actually have\
    \ a lot of the work involved in using the Core Data framework already done for\
    \ you, so you are able to move directly on to building your data model.\n\nAs\
    \ you've probably guessed already, your data model will be built to represent\
    \ the idea of a music school, specifically focusing on the teachers and students.\
    \ Before you proceed to do anything in Xcode, you need to plan out exactly how\
    \ your model will work.\n\nWhen working with a data model, the first kind of item\
    \ you have to make is an “entity.” An entity is essentially the Core Data equivalent\
    \ of an object, and represents an object in the exact same way.\n\nIn the same\
    \ way that objects (or `NSObject`s in Objective-C) have properties, entities have\
    \ “attributes.” These are the simpler pieces of data associated with any given\
    \ entity, such as a name, age, or birthday, that do not require a pointer to any\
    \ other entity.\n\nWhenever you want one entity to have a pointer to another,\
    \ you use a “relationship.” A relationship can be either “to-one” or “to-many,”\
    \ referring to whether an entity has a pointer to one instance of another entity\
    \ or multiple ones. When dealing with the “to-many” relationship, you will notice\
    \ that the entity will have a pointer to a set of multiple other entities. Entities\
    \ can easily have relationships that point to themselves, which might be the case\
    \ of a Person entity having a relationship to another Person, in the form of a\
    \ spouse. You can also set up “inverse relationships,” which act as paths back\
    \ and forth between entities. For example, a Teacher entity might have a “to-many”\
    \ relationship to a Student entity called “students”, and the Student’s relationship\
    \ to the Teacher, called “teachers”, will be the inverse of this. With this, you\
    \ can access any Teacher’s list of Students and their respective list of Teachers\
    \ quite easily.\n\nSo for your data model, you will have three entities with their\
    \ respective attributes and relationships like so:\n\n1.  Teacher\n    1.  Attributes:\
    \ Name, age, primary language, and number of years teaching\n    2.  Relationships:\
    \ Students (to-many) and Instruments (to-many)\n2.  Student\n    1.  Attributes:\
    \ Name, age, primary language, and skill level\n    2.  Relationships: Teacher\
    \ (to-one) and Instrument (to-one)\n3.  Instrument\n    *   **c.** Attributes:\
    \ Name and family\n    *   **d.** Relationships: Students (to-many) and Teachers\
    \ (to-many)\n\nWhile all these relationships going back and forth between your\
    \ objects may seem a bit convoluted, this will actually allow you to create a\
    \ very well-defined data model from which you can query nearly any piece of information\
    \ you need from another. For example, you might be able to easily find all the\
    \ teachers who play the piano, and then access their respective names."
  trans: "\n### 什么是 Core Data？\n\n`Core Data` 是一种持久化方案。它不仅是一种持久化方案，而且是目前在 iOS 中实现持久化最佳的方法之一。\n\
    \n简而言之，`Core Data` 与 `Xcode` 相结合，允许开发者执行三项主要任务：\n\n1.  创建数据模型\n2.  持久化信息\n3. \
    \ 访问数据\n\n首先，准确理解什么是数据模型非常重要。这个术语本质上指的是任何给定应用程序数据所围绕构建的结构。在简单的应用程序中，它可以是像 `NSString`\
    \ 或 `NSArray` 这样简单的东西，一直到复杂、相互连接的对象类型系统，每种类型都有其自身的属性、方法和指向其他对象的指针。\n\n其次，当您需要创建、保存和检索信息时，您应该对\
    \ `Core Data` 中涉及的各种对象和类有一个基本的了解，以及如何使用它们。\n\n1.  `NSManagedObjectModel`：这是一个不常见的类，因为如果您使用模板，在编写代码时几乎不会直接处理它。这是\
    \ iOS 引用您数据模型（稍后将创建）的方式。当您为第一个示例创建项目时，您会在应用程序委托中看到此类型的实例，并在一些预生成的方法中看到它的使用，但除此之外，您没有理由以编程方式处理这个类。\n\
    2.  `NSPersistentStoreCoordinator`：这是一个您很少需要处理的类。它主要在应用程序的后台工作，用于“协调”您的应用程序与底层数据库或“持久化存储”之间的交互，但您无需向其发送任何操作。关于这个类，您需要了解的最重要部分是所使用的持久化存储的“类型”。持久化存储有三种类型：\n\
    \    1.  `NSSQLiteStoreType`\n    2.  `NSBinaryStoreType`\n    3.  `NSInMemoryStoreType`\n\
    \n    默认值是第一种，`NSSQLiteStoreType`，指定您正在使用基于 `SQLite` 基础的持久化存储。您将在应用程序中继续使用此类型。\n\
    \n    根据您的应用程序，您可能还会发现 `NSInMemoryStoreType` 很有用，尽管它实际上不会在应用程序使用之间持久化数据。这可能更适合于缓存来自远程源信息的应用程序，因此需要一个基于\
    \ `Core Data` 构建的数据模型，但实际不需要存储信息，因为它可以从远程源重新检索。\n\n3.  `NSManagedObjectContext`：与前两个不同，这个类是您会经常处理的类。简单来说，这个类充当了您信息的“工作区”。任何时候您需要检索或存储信息，都需要一个指向此类的指针来执行操作。因此，在基于\
    \ `Core Data` 的应用程序中，一个非常常见的做法是通过为每个视图控制器提供一个 `NSManagedObjectContext` 属性，在应用程序的各个部分之间“传递”一个指向此类的指针。\n\
    4.  `NSFetchedResultsController`：这是真正通过 `NSManagedObjectContext` “获取”结果的主要类。它不仅非常强大，而且非常易于使用，特别是与\
    \ `UITableView` 结合使用时。您将在本章中看到大量使用此类的示例。\n\n在本章中，您还将使用各种其他特定于 `Core Data` 的类，但一旦您完成了数据模型的创建，这些类会更容易解释。\n\
    \n### 示例 11-1：创建数据模型\n\n在本章中，您将创建一个名为“MusicSchool”的新项目。请确保选择“Empty Application”（空应用程序）模板，如图\
    \ 11-1 所示。\n\n![图片](img/9781430240051_Fig11-01.jpg)\n\n**图 11-1.** *从头开始创建一个空应用程序*\n\
    \n在下一个屏幕上，当您输入项目名称“MusicSchool”时，请务必选中标记为“Use Core Data”（使用 Core Data）的复选框。这是获得一个方便的\
    \ `Core Data` 模板的最简单方法，它可以大大简化您的工作，并预生成大量必要的代码。将类前缀设置为“Main”，并确保也勾选了“Use Automatic\
    \ Reference Counting”（使用自动引用计数）复选框，如图 11-2 所示。“Company Identifier”（公司标识符）应更改为您自己的名称或公司名称。\n\
    \n![图片](img/9781430240051_Fig11-02.jpg)\n\n**图 11-2.** *配置项目以使用 Core Data*\n\n\
    在下一个屏幕上点击“Create”（创建），像往常一样完成项目的创建。\n\n既然您已设置好项目以使用 `Core Data` 模板，那么使用 `Core\
    \ Data` 框架所需的大量工作实际上已经为您完成了，因此您可以直接进入构建数据模型的阶段。\n\n您可能已经猜到，您的数据模型将用于表示音乐学校的概念，特别关注教师和学生。在您开始在\
    \ `Xcode` 中做任何事之前，您需要精确规划您的模型将如何工作。\n\n在处理数据模型时，您首先要创建的一种项目是“实体”。实体本质上等同于 `Core\
    \ Data` 中的对象，并以完全相同的方式表示一个对象。\n\n就像对象（或 Objective-C 中的 `NSObject`）具有属性一样，实体具有“属性”。这些是与任何给定实体相关的较简单的数据片段，例如姓名、年龄或生日，它们不需要指向任何其他实体的指针。\n\
    \n每当您希望一个实体拥有指向另一个实体的指针时，您就使用“关系”。关系可以是“对一”或“对多”，指的是一个实体是指向另一个实体的一个实例还是多个实例。当处理“对多”关系时，您会注意到该实体将拥有一个指向多个其他实体集合的指针。实体可以很容易地拥有指向自身的关系，例如，一个\
    \ `Person` 实体可能以配偶的形式拥有与另一个 `Person` 的关系。您还可以设置“反向关系”，它充当实体之间的往返路径。例如，一个 `Teacher`\
    \ 实体可能有一个名为“students”的对 `Student` 实体的“对多”关系，而 `Student` 对 `Teacher` 的关系（称为“teachers”）将是它的反向关系。这样，您就可以非常轻松地访问任何\
    \ `Teacher` 的 `Student` 列表以及它们各自的 `Teacher` 列表。\n\n因此，对于您的数据模型，您将拥有三个实体及其各自的属性和关系，如下所示：\n\
    \n1.  `Teacher`（教师）\n    1.  属性：姓名、年龄、主要语言和教学年限\n    2.  关系：Students（对多）和 Instruments（对多）\n\
    2.  `Student`（学生）\n    1.  属性：姓名、年龄、主要语言和技能水平\n    2.  关系：Teacher（对一）和 Instrument（对一）\n\
    3.  `Instrument`（乐器）\n    *   属性：名称和类别\n    *   关系：Students（对多）和 Teachers（对多）\n\
    \n虽然这些在对象之间来回定义的关系看起来可能有点复杂，但这实际上将允许您创建一个非常定义明确的数据模型，您可以从中查询几乎任何您需要的、来自另一个对象的信息。例如，您也许可以轻松地找到所有会弹钢琴的教师，然后访问他们各自的名字。\n"
- fmt: '现在你已经规划好数据模型，可以在 Xcode 中进行构建。切换到你的数据模型文件，如果你使用了“MusicSchool”项目名称，该文件通常名为 `MusicSchool.xcdatamodeld`。你的视图应类似于
    [Figure 11-3](#Chapter11.html#fig_11_3)。


    ![Image](images/9781430240051_Fig11-03.jpg)


    **Figure 11–3.** *Your empty data model*


    如果窗口看起来像 [Figure 11-4](#Chapter11.html#fig_11_4)，你应切换为 Xcode 窗口右下角两个选项中的第一种编辑器样式。在本教程中，你只会使用第一种编辑器样式来实际配置数据模型。


    ![Image](images/9781430240051_Fig11-04.jpg)


    **Figure 11–4.** *The graphical Editor style*


    你可以通过屏幕右下角的选项轻松更改数据模型的编辑器样式。选择两个选项中的左侧那个（即前两幅图中的第一个），使选择器看起来像 [Figure 11-5](#Chapter11.html#fig_11_5)。


    ![Image](images/9781430240051_Fig11-05.jpg)


    **Figure 11–5.** *Make sure to select the first Editor style for these recipes.*


    接下来，你将添加三个实体。你可以从“Editor”菜单中执行此操作，也可以使用视图中央下方的“Add Entity”按钮，该按钮如 [Figure 11-6](#Chapter11.html#fig_11_6)
    所示。


    ![Image](images/9781430240051_Fig11-06.jpg)


    **Figure 11–6.** *Use this button to create new entities.*


    你将立即可以更改实体的名称，将其重命名为“Teacher”并按回车。


    重复此操作两次以创建“Student”和“Instrument”实体。先创建所有实体再逐个配置会更容易，因为你需要它们来构建关系。之后，如果你选择“Teacher”实体，其实体列表应类似于
    [Figure 11-7](#Chapter11.html#fig_11_7)。


    ![Image](images/9781430240051_Fig11-07.jpg)


    **Figure 11–7.** *Rename your entities to match your data plan.*


    你将从配置“Teacher”实体开始，请确保选中此实体。


    接下来，在“Teacher”实体的“Attributes”区域下，单击“+”按钮四次，为你的每个属性添加一次。根据你的计划命名每个属性（“name”、“age”、“language”和“years”即可）。对于每个属性，你还必须选择“Type”。对“name”和“language”属性使用“String”类型，对其他属性使用“Integer
    16”类型，如 [Figure 11-8](#Chapter11.html#fig_11_8) 所示。


    **注意：** 不同类型的整数（如 Integer 16、32、64）指的是用于存储每个值的位数。这些数字限制了你可使用的最大值，16位值只能存储到 65,535。32位值可存储到
    4,294,967,295，而64位值可存储 10^18 量级的巨大数值。由于你的数字相当小，直接使用“Integer 16”类型即可。


    ![Image](images/9781430240051_Fig11-08.jpg)


    **Figure 11–8.** *Configuring the Teacher entity''s attributes*


    现在，在“Relationships”区域下，使用“+”按钮添加两个关系。将它们命名为“students”和“instruments”，并确保它们的 destination
    值设置正确，如 [Figure 11-9](#Chapter11.html#fig_11_9) 所示（“students”关系对应“Student”，以此类推）。在你在其他实体中创建更多关系之前，你还无法设置“Inverse”关系。


    ![Image](images/9781430240051_Fig11-09.jpg)


    **Figure 11–9.** *Configuring the Teacher entity’s relationships*


    像为 XIB 文件中的任何视图元素调出“Attributes inspector”一样，调出“Data Model inspector”。选择创建的关系之一后，在检查器中勾选“To-Many
    Relationship”复选框，如 [Figure 11-10](#Chapter11.html#fig_11_10) 所示。请确保对 Teacher 的两个关系都执行此操作，因为根据你的计划，它们都是“to-many”关系。


    ![Image](images/9781430240051_Fig11-10.jpg)


    **Figure 11–10.** *Configuring relationships to be “To-Many”*


    尽管你可能不需要担心此检查器中的大多数其他值（至少从你的目的来看），但一个较重要的值是“Delete Rule”下拉菜单，如 [Figure 11-10](#Chapter11.html#fig_11_10)
    所示。该值指定了当给定实体的实例从 `NSManagedObjectContext` 中删除时，此关系将如何处理。它有四个可能的值：


    1.  *No Action*：这可能是最危险的值，因为它只是允许相关对象继续尝试访问已删除的对象，如果不小心处理，很容易导致访问问题。

    2.  *Nullify*：默认值，指定关系在删除时将被空值化，因此会返回 `nil` 值。

    3.  *Cascade*：使用此值可能有些危险，因为它指定如果某个对象被删除，所有通过此 Delete Rule 与之关联的对象也会被删除，以避免产生 `nil`
    值。如果不小心使用，可能会意外删除大量数据，但它也非常适合保持数据清洁。例如，在包含多个对象的“文件夹”场景中可以使用此规则。当删除文件夹时，你通常也希望删除其中所有包含的对象。

    4.  *Deny*：只要关系未指向 `nil`，此规则将阻止对象被删除。


    在本教程中，你将 Delete Rule 保留为“Nullify”。


    现在，选择你将进行配置的“Student”实体，添加你的四个属性（“age”、“language”、“name”和“skill”），并为它们指定适当的类型，如
    [Figure 11-11](#Chapter11.html#fig_11_11) 所示（除了 `age` 再次使用“Integer 16”外，其余均使用“String”）。


    ![Image](images/9781430240051_Fig11-11.jpg)


    **Figure 11–11.** *Configuring the Student entity’s attributes*


    再创建两个关系“instrument”和“teacher”，并设置它们各自的 destination。你现在还可以将“teacher”关系的“Inverse”设置为“students”，如
    [Figure 11-12](#Chapter11.html#fig_11_12) 所示。Teacher 实体中的“students”关系将自动将你刚创建的“teacher”关系设置为其
    inverse。


    **注意：** 逆关系并非总是必需的，但它们往往能让应用的的组织和流程变得更好，使你能够更轻松地从任意数据访问所需的任何其他数据。


    回顾你最初的数据模型计划，你会看到 Student 的两个关系不应是“to-many”，因此你无需进行此更改。


    ![Image](images/9781430240051_Fig11-12.jpg)


    **Figure 11–12.** *Configuring the Student entity’s relationships*


    现在，你将配置第三个实体“Instrument”。它将拥有两个“String”类型的属性，分别名为“name”和“family”，如 [Figure 11-13](#Chapter11.html#fig_11_13)
    所示。


    ![Image](images/9781430240051_Fig11-13.jpg)


    **Figure 11-13.** *Configuring the Instrument entity’s attributes*


    你将创建两个关系“teachers”和“students”，并指定它们各自的 destination。你应该能为这两个关系设置 inverse，如 [Figure
    11-14](#Chapter11.html#fig_11_14) 所示。


    ![Image](images/9781430240051_Fig11-14.jpg)


    **Figure 11-14.** *Configuring the Instrument entity’s relationships*


    最后，请确保在“Data Model inspector”中将这两个关系都指定为“to-many”，与之前操作相同。'
  raw: 'Now that you have your data model planned out, you can build this in Xcode.
    Switch over to view your data model file, which will probably be called `MusicSchool.xcdatamodeld`
    if you used the “MusicSchool” project name. Your view should resemble [Figure
    11-3](#Chapter11.html#fig_11_3).


    ![Image](images/9781430240051_Fig11-03.jpg)


    **Figure 11–3.** *Your empty data model*


    If your window instead resembles [Figure 11-4](#Chapter11.html#fig_11_4), you
    should change to the first Editor style of the two options in the lower-right
    of the Xcode window. For this recipe, you will use only the first Editor style
    to actually configure your data model.


    ![Image](images/9781430240051_Fig11-04.jpg)


    **Figure 11–4.** *The graphical Editor style*


    You can easily change the Editor style for configuring a data model through the
    selection in the lower right-hand corner of your screen. Select the left option
    of the two, which will be the first of the two previous figures, so that the selector
    looks like [Figure 11-5](#Chapter11.html#fig_11_5).


    ![Image](images/9781430240051_Fig11-05.jpg)


    **Figure 11–5.** *Make sure to select the first Editor style for these recipes.*


    Next, you will add your three entities. You can do this from either the Editor
    menu, or by using the Add Entity button in the lower-central area of your view,
    which resembles [Figure 11-6](#Chapter11.html#fig_11_6).


    ![Image](images/9781430240051_Fig11-06.jpg)


    **Figure 11–6.** *Use this button to create new entities.*


    You will immediately be able to change the name of the entity, so rename it to
    “Teacher” and hit return.


    Repeat this twice more to create the “Student” and “Instrument” entities. It is
    easier to create all your entities first, rather than trying to configure each
    after you create it, as you need them to build your relationships. Afterward,
    if you select the Teacher entity, your entities list should resemble [Figure 11-7](#Chapter11.html#fig_11_7).


    ![Image](images/9781430240051_Fig11-07.jpg)


    **Figure 11–7.** *Rename your entities to match your data plan.*


    You will start by configuring your Teacher entity, so make sure this one is selected.


    Next, under the Attributes area for the Teacher entity, click the + button four
    times, once for each of your attributes. Name each attribute according to your
    plan (“name”, “age”, “language”, and “years” will do fine). For each attribute,
    you must also choose a “Type”. Use the “String” type for the “name” and “language”
    attributes, and the “Integer 16” type for the others, as in [Figure 11-8](#Chapter11.html#fig_11_8).


    **NOTE:** The different types of integer (i.e., Integer 16, 32, 64), refer to
    the number of bits used to store each value. These numbers restrict the highest
    values you can use, as a 16-bit value can store only values up to 65,535\. A 32-bit
    value can store values up to 4,294,967,295, and a 64-bit can hold massive values
    on the scale of 10^(18). Since your numbers are fairly low, you can simply use
    the “Integer 16” type.


    ![Image](images/9781430240051_Fig11-08.jpg)


    **Figure 11–8.** *Configuring the Teacher entity''s attributes*


    Now under the Relationships area, add two relationships using the + button. Name
    them “students” and “instruments”, and make sure their destination values are
    set accordingly, as in [Figure 11-9](#Chapter11.html#fig_11_9). (“Student” for
    the students relationship, and so on.) Until you create more relationships in
    other entities, you cannot set up your “Inverse” relationships yet.


    ![Image](images/9781430240051_Fig11-09.jpg)


    **Figure 11–9.** *Configuring the Teacher entity’s relationships*


    Pull up the Data Model inspector just as you would pull up the Attributes inspector
    for any view element in a XIB file. After selecting one of the created relationships,
    check the box in the inspector labeled “To-Many Relationship”, as in [Figure 11-10](#Chapter11.html#fig_11_10).
    Make sure to do this for both of the Teacher relationships, since they both are
    “to-many” according to your plan.


    ![Image](images/9781430240051_Fig11-10.jpg)


    **Figure 11–10.** *Configuring relationships to be “To-Many”*


    While you will most likely not need to worry about most of the other values in
    this inspector (at least for your purposes), one of the values of higher import
    is the Delete Rule drop-down menu, as shown in [Figure 11-10](#Chapter11.html#fig_11_10).
    This value specifies exactly how this relationship is handled when an instance
    of the given entity is deleted from the `NSManagedObjectContext`. It has four
    possible values:


    1.  *No Action*: This is probably the most dangerous value, as it simply allows
    related objects to continue to attempt to access the deleted object, which could
    easily lead to accessing problems without proper care.

    2.  *Nullify*: The default value, this specifies that the relationship will be
    nullified upon deletion, and will thus return a `nil` value.

    3.  *Cascade*: This value can be slightly dangerous to use, as it specifies that
    if one object is deleted, all of the objects it is related to via this Delete
    Rule will also be deleted, so as to avoid having `nil` values. If you''re not
    careful with this, you can delete unexpectedly large amounts of data, though it
    can also be very good for keeping your data clean. You may use this, for example,
    in the case of a “folder” with multiple objects. When a folder is deleted, you
    would want to delete all the contained objects as well.

    4.  *Deny*: This will prevent the object from being deleted as long as the relationship
    does not point to `nil`.


    You will keep the Delete Rule on “Nullify” for your recipe.


    Now, after selecting the Student entity that you will now configure, add your
    four attributes (“age”, “language, “name”, and “skill”), with their appropriate
    types, as in [Figure 11-11](#Chapter11.html#fig_11_11) (“String” for all but the
    `age`, which will be “Integer 16” again).


    ![Image](images/9781430240051_Fig11-11.jpg)


    **Figure 11–11.** *Configuring the Student entity’s attributes*


    Create another two relationships, “instrument” and “teacher”, with their respective
    destinations. You can now also set the “Inverse” relationship of the teacher relationship
    to the value of “students”, as shown in [Figure 11-12](#Chapter11.html#fig_11_12).
    The students relationship in your Teacher entity will automatically now be given
    the teacher relationship you just made as its inverse as well.


    **NOTE:** Inverse relationships are not always required, though they tend to make
    the organization and flow of your application a little bit better, allowing you
    to more easily access any piece of data you need from any other piece of data.


    If you look back at your original plan for your data model, you will see that
    the two relationships for the Student are not meant to be “to-many,” so you don''t
    have to make this change.


    ![Image](images/9781430240051_Fig11-12.jpg)


    **Figure 11–12.** *Configuring the Student entity’s relationships*


    Now, you shall configure your third entity, the Instrument. It will have two attributes
    of type “String”, called “name” and “family”, as in [Figure 11-13](#Chapter11.html#fig_11_13).


    ![Image](images/9781430240051_Fig11-13.jpg)


    **Figure 11-13.** *Configuring the Instrument entity’s attributes*


    You will create your two relationships as “teachers” and “students” with their
    respective destinations. You should be able to set inverse relationships for both
    of these, as is done in [Figure 11-14](#Chapter11.html#fig_11_14).


    ![Image](images/9781430240051_Fig11-14.jpg)


    **Figure 11-14.** *Configuring the Instrument entity’s relationships*


    Finally, make sure to specify that both of these relationships *are* “to-many”
    in the Data Model inspector, just as before.'
  trans: '

    现在你已经规划好数据模型，可以在 Xcode 中进行构建。切换到你的数据模型文件，如果你使用了“MusicSchool”项目名称，该文件通常名为 `MusicSchool.xcdatamodeld`。你的视图应类似于
    Figure 11-3。


    ![Image](img/9781430240051_Fig11-03.jpg)


    **图 11–3.** *你的空白数据模型*


    如果窗口看起来像 Figure 11-4，你应切换为 Xcode 窗口右下角两个选项中的第一种编辑器样式。在本教程中，你只会使用第一种编辑器样式来实际配置数据模型。


    ![Image](img/9781430240051_Fig11-04.jpg)


    **图 11–4.** *图形编辑器样式*


    你可以通过屏幕右下角的选项轻松更改数据模型的编辑器样式。选择两个选项中的左侧那个（即前两幅图中的第一个），使选择器看起来像 Figure 11-5。


    ![Image](img/9781430240051_Fig11-05.jpg)


    **图 11–5.** *确保为本食谱选择第一种编辑器样式。*


    接下来，你将添加三个实体。你可以从“Editor”菜单中执行此操作，也可以使用视图中央下方的“Add Entity”按钮，该按钮如 Figure 11-6
    所示。


    ![Image](img/9781430240051_Fig11-06.jpg)


    **图 11–6.** *使用此按钮创建新实体。*


    你将立即可以更改实体的名称，将其重命名为“Teacher”并按回车。


    重复此操作两次以创建“Student”和“Instrument”实体。先创建所有实体再逐个配置会更容易，因为你需要它们来构建关系。之后，如果你选择“Teacher”实体，其实体列表应类似于
    Figure 11-7。


    ![Image](img/9781430240051_Fig11-07.jpg)


    **图 11–7.** *将实体重命名以匹配你的数据计划。*


    你将从配置“Teacher”实体开始，请确保选中此实体。


    接下来，在“Teacher”实体的“Attributes”区域下，单击“+”按钮四次，为你的每个属性添加一次。根据你的计划命名每个属性（“name”、“age”、“language”和“years”即可）。对于每个属性，你还必须选择“Type”。对“name”和“language”属性使用“String”类型，对其他属性使用“Integer
    16”类型，如 Figure 11-8 所示。


    **注意：** 不同类型的整数（如 Integer 16、32、64）指的是用于存储每个值的位数。这些数字限制了你可使用的最大值，16 位值只能存储到 65,535。32
    位值可存储到 4,294,967,295，而 64 位值可存储 10¹⁸ 量级的巨大数值。由于你的数字相当小，直接使用“Integer 16”类型即可。


    ![Image](img/9781430240051_Fig11-08.jpg)


    **图 11–8.** *配置 Teacher 实体的属性*


    现在，在“Relationships”区域下，使用“+”按钮添加两个关系。将它们命名为“students”和“instruments”，并确保它们的 destination
    值设置正确，如 Figure 11-9 所示（“students”关系对应“Student”，以此类推）。在你在其他实体中创建更多关系之前，你还无法设置“Inverse”关系。


    ![Image](img/9781430240051_Fig11-09.jpg)


    **图 11–9.** *配置 Teacher 实体的关系*


    像为 XIB 文件中的任何视图元素调出“Attributes inspector”一样，调出“Data Model inspector”。选择创建的关系之一后，在检查器中勾选“To-Many
    Relationship”复选框，如 Figure 11-10 所示。请确保对 Teacher 的两个关系都执行此操作，因为根据你的计划，它们都是“to-many”关系。


    ![Image](img/9781430240051_Fig11-10.jpg)


    **图 11–10.** *将关系配置为“To-Many”*


    尽管你可能不需要担心此检查器中的大多数其他值（至少从你的目的来看），但一个较重要的值是“Delete Rule”下拉菜单，如 Figure 11-10 所示。该值指定了当给定实体的实例从
    `NSManagedObjectContext` 中删除时，此关系将如何处理。它有四个可能的值：


    1.  *No Action*：这可能是最危险的值，因为它只是允许相关对象继续尝试访问已删除的对象，如果不小心处理，很容易导致访问问题。

    2.  *Nullify*：默认值，指定关系在删除时将被空值化，因此会返回 `nil` 值。

    3.  *Cascade*：使用此值可能有些危险，因为它指定如果某个对象被删除，所有通过此 Delete Rule 与之关联的对象也会被删除，以避免产生 `nil`
    值。如果不小心使用，可能会意外删除大量数据，但它也非常适合保持数据清洁。例如，在包含多个对象的“文件夹”场景中可以使用此规则。当删除文件夹时，你通常也希望删除其中所有包含的对象。

    4.  *Deny*：只要关系未指向 `nil`，此规则将阻止对象被删除。


    在本教程中，你将 Delete Rule 保留为“Nullify”。


    现在，选择你将进行配置的“Student”实体，添加你的四个属性（“age”、“language”、“name”和“skill”），并为它们指定适当的类型，如
    Figure 11-11 所示（除了 `age` 再次使用“Integer 16”外，其余均使用“String”）。


    ![Image](img/9781430240051_Fig11-11.jpg)


    **图 11–11.** *配置 Student 实体的属性*


    再创建两个关系“instrument”和“teacher”，并设置它们各自的 destination。你现在还可以将“teacher”关系的“Inverse”设置为“students”，如
    Figure 11-12 所示。Teacher 实体中的“students”关系将自动将你刚创建的“teacher”关系设置为其 inverse。


    **注意：** 逆关系并非总是必需的，但它们往往能让应用的组织和流程变得更好，使你能够更轻松地从任意数据访问所需的任何其他数据。


    回顾你最初的数据模型计划，你会看到 Student 的两个关系不应是“to-many”，因此你无需进行此更改。


    ![Image](img/9781430240051_Fig11-12.jpg)


    **图 11–12.** *配置 Student 实体的关系*


    现在，你将配置第三个实体“Instrument”。它将拥有两个“String”类型的属性，分别名为“name”和“family”，如 Figure 11-13
    所示。


    ![Image](img/9781430240051_Fig11-13.jpg)


    **图 11-13.** *配置 Instrument 实体的属性*


    你将创建两个关系“teachers”和“students”，并指定它们各自的 destination。你应该能为这两个关系设置 inverse，如 Figure
    11-14 所示。


    ![Image](img/9781430240051_Fig11-14.jpg)


    **图 11-14.** *配置 Instrument 实体的关系*


    最后，请确保在“Data Model inspector”中将这两个关系都指定为“to-many”，与之前操作相同。

