    \ and edit the attributes of your subclassed `NSManagedObject`s, you can do the\
    \ same with the relationships that your entities share. You will change your program\
    \ such that if a Teacher is selected, a list of Instruments entered appears, and\
    \ when one of these Instruments is selected, that Instrument is added to the set\
    \ of `instruments` for that Teacher. You may also notice that because you have\
    \ your relationships set up with inverses to each other, a relationship set one\
    \ way will also be set in the reverse. In your case, when you add the Instrument\
    \ into the `instruments` set of a Teacher, that Teacher will also be added into\
    \ the `teachers` set of the Instrument.\n\nFor demonstration purposes, you will\
    \ implement this behavior only between Teachers and Instruments, but it should\
    \ be easy to see how you would fully implement similar behavior between all three\
    \ entities, allowing the user to connect any Teacher with his or her Students\
    \ and Instruments.\n\nFirst, you will declare an instance variable in your `MainTableViewController`’s\
    \ header file of type Teacher, to help keep track of the selected Teacher.\n\n\
    ```\n__strong Teacher *selectedTeacher;\n```\n\nNext, you will need to declare\
    \ a new property called `delegate` of the same type as the class, which you will\
    \ use to connect your multiple view controllers. Make sure to synthesize and nil\
    \ this property as appropriate.\n\n```\n@property (nonatomic, strong) MainTableViewController\
    \ *delegate;\n```\n\nDeclare also the header for a method for your `delegate`\
    \ property to perform, like so:\n\n```\n-(void)MainTableViewController:(MainTableViewController\
    \ *)mainTableVC\ndidSelectInstrument:(Instrument *)instrument;\n```\n\nYour header\
    \ file (`MainTableViewController.h`) should now resemble the following:\n\n```\n\
    #import <UIKit/UIKit.h>\n#import \"Instrument.h\"\n#import \"Student.h\"\n#import\
