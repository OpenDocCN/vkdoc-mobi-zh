    me to pick up where I left off after the build succeeds, or fails, as is usually
    the case. The behavior in [Figure 1–35](#Chapter01.html#fig_1_35) will create
    or show the tab named Build Results, show the Issue navigator, show the debugger
    pane, and navigate to the first issue found (if any).


    ![Image](images/9781430240051_Fig01-35.jpg)


    **Figure 1–35.** *Configuring behaviors*


    You can also add custom behaviors that are performed with a shortcut key. Click
