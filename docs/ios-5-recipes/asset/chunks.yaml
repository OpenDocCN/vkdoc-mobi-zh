    For your simple uses, you will use the main queue to perform your handlers.


    Combining all these methods discussed, you can build a simple section of code
    that, if run, will start updating with data from the accelerometer. This code
    will be used to build the method `-toggleUpdates`


    `if ([self.motionManager isAccelerometerAvailable] && ![self.motionManager isAccelerometerActive])`

    `    {`

    `        [self.motionManager setAccelerometerUpdateInterval:1.0/2.0]; //Update
    twice per second`

    `        [self.motionManager startAccelerometerUpdatesToQueue:[NSOperationQueue
    mainQueue] withHandler:^(CMAccelerometerData *accelerometerData, NSError *error)`

    `         {`

    `self.xAccLabel.text = [NSString stringWithFormat:@"%f", accelerometerData.acceleration.x];`

    `self.yAccLabel.text = [NSString stringWithFormat:@"%f", accelerometerData.acceleration.y];`

    `self.zAccLabel.text = [NSString stringWithFormat:@"%f", accelerometerData.acceleration.z];`

    `         }];`

    `    }`


    As discussed earlier, you first check to make sure the hardware is both available
    and inactive. Next you set your update interval, and then start asking for updates.
    The simple handler you have specified will update your view’s information to include
    the raw data that you have received.


    Since you are in fact building a method to toggle these updates on and off, you
    can add a following condition to turn off your updates.


    `else if ([self.motionManager isAccelerometerActive])`

    `    {`

    `        [self.motionManager stopAccelerometerUpdates];`

    `self.xAccLabel.text = @"...";`

    `self.yAccLabel.text = @"...";`

    `self.zAccLabel.text = @"...";`

    `    }`


    The other two instruments operate on the exact same principles. Overall, your
    `-toggleUpdates` method will be written like so:


