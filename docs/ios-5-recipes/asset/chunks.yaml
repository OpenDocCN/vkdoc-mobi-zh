    \ *)[self.countries objectAtIndex:indexPath.row] name];\n    cell.detailTextLabel.text\
    \ = [(Country *)[self.countries objectAtIndex:indexPath.row] capital];\n\n   \
    \ UIImage *flag = [(Country *)[self.countries objectAtIndex:indexPath.row] flag];\n\
    \    cell.imageView.image = [MainTableViewController scale:flag toSize:CGSizeMake(115,\
    \ 75)];\n\n    return cell;\n}\n```\n\nYour resulting application, if you run\
    \ it, should resemble [Figure 9–6](#Chapter09.html#fig_9_6), complete with country\
