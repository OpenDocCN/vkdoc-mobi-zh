- fmt: '### UIPopoverController


    `UIPopoverController`类是一个仅适用于iPad的UI元素。它用于在当前视图之上呈现信息，通常是为了向用户提供如何继续操作的选项。`UIPopoverController`的实现非常方便，因为其位置可以轻松指定到任意位置，从而改善应用的视觉流程。


    [Figure 3–24](#Chapter03.html#fig_3_24)来自[第13章](#Chapter13.html#ch13)（数据传输配方），配方13-2，涉及邮件和打印材料，其中你从一个`UIBarButtonItem`呈现了一个`UIPopoverController`，用于选择要显示的已保存图像。


    ![Image](images/9781430240051_Fig03-24.jpg)


    **Figure 3–24** *来自[第13章](#Chapter13.html#ch13)（数据传输配方）的`UIPopoverController`示例*


    `UIPopoverController`可以轻松地通过指定初始化方法`-initWithContentViewController:`来包含内容视图，并且可以通过`-setPopoverContentSize:animated:`来配置内容大小。如果你希望在`UIPopoverController`当前可见时更改其内容视图，可以使用`-setContentViewController:animated:`方法。


    `UIPopoverController`类有一个包含`-popoverControllerShouldDismissPopover:`和`-popoverControllerDidDismissPopover:`方法的`delegate`协议。这些方法可以轻松用于确保在弹出视图被关闭之前保存所有用户数据。


    在呈现弹出视图时，你可以使用`-presentPopoverFromRect:inView:permittedArrowDirections:animated:`方法或`-presentPopoverFromBarButtonItem:permittedArrowDirections:animated:`方法。前者通常用于从主视图中的任意元素呈现，而后者用于从工具栏中的任意项目呈现弹出视图。在正确的情境下使用这些方法将显著提高应用的视觉组织质量。


    在设计使用`UIPopoverController`的iPad应用时，始终要考虑视图的整体视觉质量。确保你的弹出视图不会覆盖整个屏幕，并且其箭头指向触发它出现的元素。


    通常，你应避免在`UIPopoverController`的内容视图中放置任何“关闭”按钮，因为用户只需点击弹出视图外部即可将其关闭。


    如果你可以选择从单个视图中显示多个弹出控制器，请尽量将应用设计为打开一个弹出视图时关闭其他任何打开的弹出视图，以避免遮挡整个视图。


    ### UIPageViewController


    `UIPageViewController`是iOS 5.0中新增的控制器，专门用于组织处理多个“页面”内容且在相同信息层级上排列的应用。


    `UIPageViewController`的实例通过`-setViewControllers:direction:animated:completion:`来设置其内容视图。


    `spineLocation`属性用于自定义页面翻页的视觉动画效果。你可以将应用想象成一本书，`spineLocation`指的是翻页的枢轴点。


    该类还有两个属性，`delegate`和`dataSource`，用于配置页面视图控制器。`dataSource`遵循`UIPageViewControllerDataSource`协议，允许你通过`-pageViewController:viewControllerBeforeViewController:`和`-pageViewController:viewControllerAfterViewController:`方法特殊配置视图控制器的顺序。`delegate`属性则更多涉及控制器的视觉设置，通过`UIPageViewControllerDelegate`协议方法`-pageViewController:spineLocationForInterfaceOrientation:`实现。


    ### Modal Controllers


    模态视图控制器是以“模态”方式呈现的任何视图控制器，意味着它要么显示在呈现它的控制器之上，要么取而代之。这些可以是普通的`UIViewController`子类，也可以是特定的视图元素。模态视图控制器的一般用途是向用户提供或请求特定信息，因此你通常不希望模态呈现实现应用主要功能的控制器。


    模态视图控制器由其他视图控制器通过`-presentModalViewController:animated:`方法呈现。更改从`UIViewController`继承的`modalTransitionStyle`属性可以设置动画样式。该属性接受以下可能的值，其名称本身就能很好地描述其样式：


    * `UIModalTransitionStyleCoverVertical`

    * `UIModalTransitionStyleFlipHorizontal`

    * `UIModalTransitionStyleCrossDissolve`

    * `UIModalTransitionStylePartialCurl`


    这些选项之间的差异通常只是外观上的，尤其是在iPhone上实现模态呈现时，尽管`UIModalTransitionStylePartialCurl`样式不会覆盖整个视图，而只会在模态视图控制器中显示底部区域。这对于提供少量信息（例如你的开发者信息）而不必填充整个视图非常有用。


    如果你使用`UIModalTransitionStylePartialCurl`过渡样式，请避免在模态控制器中放置任何`UITextField`或`UITextView`元素，因为键盘最终会覆盖整个模态控制器，使用户无法看到他们正在输入的内容。


    在iPhone上开发时，模态视图控制器始终需要占据整个屏幕。然而，在iPad上，你可以自定义控制器在视图中的外观。`modalPresentationStyle`属性定义了视图控制器在iPad上的呈现方式，接受以下可能的值：


    * `UIModalPresentationFullScreen`：模态控制器覆盖整个设备屏幕

    * `UIModalPresentationPageSheet`：控制器宽度设置为设备的竖屏宽度，呈现控制器在两侧可见；背景随后变暗以将焦点带到呈现的控制器上。

    * `UIModalPresentationFormSheet`：模态控制器在iPad屏幕上居中，显示尺寸小于呈现控制器；如果键盘可见，视图会上移以保持可见，所有未覆盖区域变暗。

    * `UIModalPresentationCurrentContext`：视图完全按照其呈现控制器的方式呈现。这在处理分屏控制器或其他不填充整个屏幕的视图时特别有用。


    每当实现模态视图控制器时，你需要能够以编程方式将其关闭。关闭可以通过从模态控制器或呈现控制器调用`-dismissModalViewControllerAnimated:`方法来实现。如果你希望从呈现控制器中关闭视图，则需要为模态控制器定义一个委托方法，以便在准备好关闭时调用它。此方法还可用于将从模态控制器收集的信息传递回其父控制器。


    ### 临时用户界面元素


    许多应用在处理需要用户输入的情境时，这种输入只在应用的某个特定点需要。对于这些情况，将元素直接作为永久元素嵌入视图中会浪费宝贵的空间。相反，你可以使用某些元素，这些元素在需要输入或输出时显示，并在之后被关闭。'
  raw: '#### UIPopoverController


    The `UIPopoverController` class is an element specific only to the iPad. It is
    used to present information over top of your current view, usually to present
    options to users as to how they want to proceed. `UIPopoverController`s are very
    convenient to implement as their location can easily be specified to any location,
    improving the visual flow of your application.


    [Figure 3–24](#Chapter03.html#fig_3_24) is from [Chapter 13](#Chapter13.html#ch13)
    (Data Transmission Recipes), Recipe 13–2,dealing with mailing and printing material,
    in which you presented a `UIPopoverController` from a `UIBarButtonItem` to select
    a saved image to display.


    ![Image](images/9781430240051_Fig03-24.jpg)


    **Figure 3–24.** *Your example from [Chapter 13](#Chapter13.html#ch13) (Data TransmissionRecipes)
    of a `UIPopoverController`*


    A `UIPopoverController` is easily configured to contain a content view using the
    designated initializer `-initWithContentViewController:`, and the content size
    can be configured using `-setPopoverContentSize:animated:`.If you wish to change
    the content view of a `UIPopoverController` while it is currently visible, you
    can make use of the `-setContentViewController:animated:` method.


    The `UIPopoverController` class has a `delegate` protocol with methods -`popoverControllerShouldDismissPopover:`and`-popoverControllerDidDismissPopover:`.
    These can easily be used to make sure any user data is saved before a pop-over
    is dismissed.


    When presenting a pop-over, you can make use of either the `-presentPopoverFromRect:inView:permittedArrowDirections:animated:`
    method, or the `-presentPopoverFromBarButtonItem:permittedArrowDirections:animated:`
    method. The former is generally used for presenting from any element in your main
    view, while the latter is used when presenting a pop-over from any item in a toolbar.
    Using these methods in their correct situation will drastically improve the visual
    organization quality of your application.


    When designing iPad applications making use of a `UIPopoverController`, always
    keep in mind the overall visual quality of the view. Make sure your pop-over does
    not cover the entire screen, and that its arrow points to the element that caused
    it to appear.


    Usually you want to avoid placing any kind of “dismiss” button inside of a `UIPopoverController`’s
    content view, as the user can simply dismiss the pop-over by tapping outside of
    the pop-over.


    If you have the option of displaying multiple pop-over controllers from a single
    view, try to write your application in such a way that opening one pop-over closes
    any others that are open, so as to avoid obscuring the entire view.


    #### UIPageViewController


    The `UIPageViewController` is a controller new to iOS 5.0, designed specifically
    to help organize applications that deal with multiple “pages” of content that
    are organized on the same level of information.


    An instance of `UIPageViewController` has its content views set using `-setViewControllers:direction:animated:completion:`.


    The `spineLocation` property is used to customize the visual animation method
    of your page turning. You can imagine your application as a book, with the `spineLocation`
    referring to the pivot point of your page turning.


    This class also has two properties, a `delegate`and`dataSource`, thathelp to configure
    the page view controller. The `dataSource`, which conforms to the `UIPageViewControllerDataSource`
    protocol, allows you to specially configure your view controller’s order through
    the `-pageViewController:viewControllerBeforeViewController:`and`-pageViewController:viewControllerAfterViewController:`
    methods. The `delegate`property deals more with the visual setup of the controller,
    with the `UIPageViewControllerDelegate` protocol method `-pageViewController:spineLocationForInterfaceOrientation:`.


    #### Modal Controllers


    Amodalview controller is any view controller that is presented “modally,” meaning
    it is shown either on top of or in place of its presenting controller. These can
    be anything from a normal `UIViewController` subclass to a specific view element.
    The general use of any modal view controller is to either provide or request specific
    information from the user, so you generally will not want to modally present a
    controller that implements the main functionality of your application.


    Modal view controllers are presented by other view controllers using the `-presentModalViewController:animated:`
    method. Changing the `modalTransitionStyle` property, inherited from `UIViewController`,
    can set the style of animation. This property takes the following possible values,
    whose names give excellent description as to their style:


    *   `UIModalTransitionStyleCoverVertical`

    *   `UIModalTransitionStyleFlipHorizontal`

    *   `UIModalTransitionStyleCrossDissolve`

    *   `UIModalTransitionStylePartialCurl`


    The differences between these options tend to be fairly cosmetic, especially when
    implementing modal presentation on an iPhone, although the `UIModalTransitionStylePartialCurl`style
    will, instead of covering the entire view, reveal only the lower area in the modal
    view controller. This is good for providing small amounts of information, such
    as your developer’s information, without having to populate the entire view.


    If you make use of the `UIModalTransitionStylePartialCurl`transition style, avoid
    placing any `UITextField` or `UITextView` elements in the modal controller, as
    the keyboard will end up covering the entire modal controller, keeping your users
    from seeing what they are entering.


    When developing on the iPhone, modal view controllers will always require the
    entire screen. However, on the iPad, you are able to customize the appearance
    of the controller in your view. The `modalPresentationStyle` property defines
    how your view controller is presented on an iPad, taking the following possible
    values:


    *   `UIModalPresentationFullScreen`: Presents the modal controller over the entire
    device screen

    *   `UIModalPresentationPageSheet`:Displays the controller with the width set
    as the device’s portrait width, leaving the presenting controller visible on either
    side; the background is then dimmed to bring focus to the presented controller.

    *   `UIModalPresentationFormSheet`: Centers the modal controller on the iPad screen,
    at a smaller display size than the presenting controller; if the keyboard is visible,
    the view is shifted up to remain visible, and all uncovered areas are dimmed.

    *   `UIModalPresentationCurrentContext`: The view is presented exactly as its
    presenting controller is. This is particularly useful when dealing with a split-pane
    controller or other view that does not fill the entire screen.


    Whenever implementing a modal view controller, you need to be able to dismiss
    it programmatically. Dismissal can be implemented by calling the `-dismissModalViewControllerAnimated:`method
    from either the modal controller or the presenting controller. If you wish to
    dismiss your view from the presenting controller, you will need to define a delegate
    method for your modal controller to call when it is ready to be dismissed. This
    method can also be used to pass information gathered from your modal controller
    back into its parent controller.


    ### Temporary User Interface Elements


    Many applications deal with instances where user input is required at various
    points in an application, but only at that certain point. For these situations,
    incorporating an element directly into a view as a permanent element becomes wasteful
    of the precious space that you have to use. Instead, you can make use of certain
    elements that are shown when input or output is required, and then are dismissed
    afterward.'
  trans: '

    ### UIPopoverController


    `UIPopoverController`类是一个仅适用于 iPad 的 UI 元素。它用于在当前视图之上呈现信息，通常是为了向用户提供如何继续操作的选项。`UIPopoverController`的实现非常方便，因为其位置可以轻松指定到任意位置，从而改善应用的视觉流程。


    图 3–24 来自第 13 章（数据传输配方），配方 13-2，涉及邮件和打印材料，其中你从一个`UIBarButtonItem`呈现了一个`UIPopoverController`，用于选择要显示的已保存图像。


    ![图片](img/9781430240051_Fig03-24.jpg)


    **图 3–24** *来自第 13 章（数据传输配方）的`UIPopoverController`示例*


    `UIPopoverController`可以轻松地通过指定初始化方法`-initWithContentViewController:`来包含内容视图，并且可以通过`-setPopoverContentSize:animated:`来配置内容大小。如果你希望在`UIPopoverController`当前可见时更改其内容视图，可以使用`-setContentViewController:animated:`方法。


    `UIPopoverController`类有一个包含`-popoverControllerShouldDismissPopover:`和`-popoverControllerDidDismissPopover:`方法的`delegate`协议。这些方法可以轻松用于确保在弹出视图被关闭之前保存所有用户数据。


    在呈现弹出视图时，你可以使用`-presentPopoverFromRect:inView:permittedArrowDirections:animated:`方法或`-presentPopoverFromBarButtonItem:permittedArrowDirections:animated:`方法。前者通常用于从主视图中的任意元素呈现，而后者用于从工具栏中的任意项目呈现弹出视图。在正确的情境下使用这些方法将显著提高应用的视觉组织质量。


    在设计使用`UIPopoverController`的 iPad 应用时，始终要考虑视图的整体视觉质量。确保你的弹出视图不会覆盖整个屏幕，并且其箭头指向触发它出现的元素。


    通常，你应避免在`UIPopoverController`的内容视图中放置任何“关闭”按钮，因为用户只需点击弹出视图外部即可将其关闭。


    如果你可以选择从单个视图中显示多个弹出控制器，请尽量将应用设计为打开一个弹出视图时关闭其他任何打开的弹出视图，以避免遮挡整个视图。


    ### UIPageViewController


    `UIPageViewController`是 iOS 5.0 中新增的控制器，专门用于组织处理多个“页面”内容且在相同信息层级上排列的应用。


    `UIPageViewController`的实例通过`-setViewControllers:direction:animated:completion:`来设置其内容视图。


    `spineLocation`属性用于自定义页面翻页的视觉动画效果。你可以将应用想象成一本书，`spineLocation`指的是翻页的枢轴点。


    该类还有两个属性，`delegate`和`dataSource`，用于配置页面视图控制器。`dataSource`遵循`UIPageViewControllerDataSource`协议，允许你通过`-pageViewController:viewControllerBeforeViewController:`和`-pageViewController:viewControllerAfterViewController:`方法特殊配置视图控制器的顺序。`delegate`属性则更多涉及控制器的视觉设置，通过`UIPageViewControllerDelegate`协议方法`-pageViewController:spineLocationForInterfaceOrientation:`实现。


    ### 模态控制器


    模态视图控制器是以“模态”方式呈现的任何视图控制器，意味着它要么显示在呈现它的控制器之上，要么取而代之。这些可以是普通的`UIViewController`子类，也可以是特定的视图元素。模态视图控制器的一般用途是向用户提供或请求特定信息，因此你通常不希望模态呈现实现应用主要功能的控制器。


    模态视图控制器由其他视图控制器通过`-presentModalViewController:animated:`方法呈现。更改从`UIViewController`继承的`modalTransitionStyle`属性可以设置动画样式。该属性接受以下可能的值，其名称本身就能很好地描述其样式：


    * `UIModalTransitionStyleCoverVertical`

    * `UIModalTransitionStyleFlipHorizontal`

    * `UIModalTransitionStyleCrossDissolve`

    * `UIModalTransitionStylePartialCurl`


    这些选项之间的差异通常只是外观上的，尤其是在 iPhone 上实现模态呈现时，尽管`UIModalTransitionStylePartialCurl`样式不会覆盖整个视图，而只会在模态视图控制器中显示底部区域。这对于提供少量信息（例如你的开发者信息）而不必填充整个视图非常有用。


    如果你使用`UIModalTransitionStylePartialCurl`过渡样式，请避免在模态控制器中放置任何`UITextField`或`UITextView`元素，因为键盘最终会覆盖整个模态控制器，使用户无法看到他们正在输入的内容。


    在 iPhone 上开发时，模态视图控制器始终需要占据整个屏幕。然而，在 iPad 上，你可以自定义控制器在视图中的外观。`modalPresentationStyle`属性定义了视图控制器在
    iPad 上的呈现方式，接受以下可能的值：


    * `UIModalPresentationFullScreen`：模态控制器覆盖整个设备屏幕

    * `UIModalPresentationPageSheet`：控制器宽度设置为设备的竖屏宽度，呈现控制器在两侧可见；背景随后变暗以将焦点带到呈现的控制器上。

    * `UIModalPresentationFormSheet`：模态控制器在 iPad 屏幕上居中，显示尺寸小于呈现控制器；如果键盘可见，视图会上移以保持可见，所有未覆盖区域变暗。

    * `UIModalPresentationCurrentContext`：视图完全按照其呈现控制器的方式呈现。这在处理分屏控制器或其他不填充整个屏幕的视图时特别有用。


    每当实现模态视图控制器时，你需要能够以编程方式将其关闭。关闭可以通过从模态控制器或呈现控制器调用`-dismissModalViewControllerAnimated:`方法来实现。如果你希望从呈现控制器中关闭视图，则需要为模态控制器定义一个委托方法，以便在准备好关闭时调用它。此方法还可用于将从模态控制器收集的信息传递回其父控制器。


    ### 临时用户界面元素


    许多应用在处理需要用户输入的情境时，这种输入只在应用的某个特定点需要。对于这些情况，将元素直接作为永久元素嵌入视图中会浪费宝贵的空间。相反，你可以使用某些元素，这些元素在需要输入或输出时显示，并在之后被关闭。

    '
- fmt: '### `UIAlertView`


    `UIAlertView`是一个极其简单但有效的类。大多数情况下，它用于呈现信息，不过也可以配置为允许文本输入。


    `UIAlertView`有一个`alertViewStyle`属性，它指定了所呈现警报的类型，可选值包括：


    - `UIAlertViewStyleDefault`

    - `UIAlertViewStyleSecureTextInput`

    - `UIAlertViewStylePlainTextInput`

    - `UIAlertViewStyleLoginAndPasswordInput`


    默认样式指的是一个呈现信息的简单警报，而其余三种样式都允许文本输入。它们的名称直接表明了其具体用途。


    配置默认样式的`UIAlertView`最简单的方式是通过其指定的初始化方法`-initWithTitle:message:delegate:cancelButtonTitle:otherButtonTitles:`。下一个示例演示了这些配置属性的用途。


    以下代码将配置如图 3–25 所示的`UIAlertView`。


    ```

    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Title" message:@"This
    is our"

    message delegate:self cancelButtonTitle:@"Ok" otherButtonTitles:@"Other Button",
    nil];

    ```


    ![Image](images/9781430240051_Fig03-25.jpg)


    **图 3–25.** 呈现的`UIAlertView`


    一旦你的`UIAlertView`配置完成，只需调用`-show`方法即可非常简单地呈现它。


    ```

    [alert show];

    ```


    `UIAlertView`还有一个`delegate`属性，正如你在初始化方法中设置的那样，在此示例中你将其设置为你的视图控制器。该属性遵循`UIAlertViewDelegate`协议。它包含多个方法，这些方法在呈现、取消或关闭`UIAlertView`时被调用。但更重要的是它的`-alertView:clickedButtonAtIndex:`方法，该方法允许你的应用程序对每个不同按钮的按下做出特定响应。


    如果你希望手动关闭`UIAlertView`，例如由于某些外部事件或在特定时间之后，你可以调用`-dismissWithClickedButtonIndex:animated:`方法。


    通常，`UIAlertView`用于响应特定事件来呈现或请求信息，例如影响应用程序的外部条件变化，或某些服务不可用。


    ### `UIActionSheet`


    `UIActionSheet`类通常用于向用户提供多个选项以供选择，以便应用程序知道如何继续。它由一系列大型带标签的按钮组成，这些按钮可以根据其对应用程序影响的性质显示特定颜色，如图
    3–26 所示。


    ![Image](images/9781430240051_Fig03-26.jpg)


    **图 3–26.** 配置了多个按钮的简单`UIActionSheet`


    `UIActionSheet`有一个`actionSheetStyle`属性。与`UIAlertView`中的类似属性不同，这仅决定操作表的外观样式，可选值包括：


    - `UIActionSheetStyleAutomatic`

    - `UIActionSheetStyleDefault`

    - `UIActionSheetStyleBlackTranslucent`

    - `UIActionSheetStyleBlackOpaque`


    如果指定了自动样式，它会模仿底部栏的视觉样式。否则，它将恢复为`UIActionSheetStyleDefault`值。


    设置`UIActionSheet`最简单的方式是通过其指定的初始化方法`initWithTitle:delegate:cancelButtonTitle:destructiveButtonTitle:otherButtonTitles:`。例如，以下代码行将重现图
    3–26 中显示的`UIActionSheet`。


    ```

    UIActionSheet *actionSheet = [[UIActionSheet alloc] initWithTitle:@"Title" delegate:self

    cancelButtonTitle:@"Cancel" destructiveButtonTitle:@"Delete" otherButtonTitles:@"Other

    Button 1", @"Other Button 2", nil];

    ```


    如你所见，“取消”按钮通常是较深的颜色以指示其结果，因为它最常用于实现某些行为的取消。而“破坏性”按钮是亮红色，以指示它通常实现某种会永久删除用户数据的方法。


    在呈现`UIActionSheet`时，你必须考虑所使用的设备。由于 iPhone 的屏幕比 iPad 小，`UIActionSheet`只能从视图底部呈现。然而，在
    iPad 上，可以使用多种方法从任何指定的点、栏按钮项、工具栏、标签栏或视图呈现操作表。


    所使用的设备也会带来关于按钮使用的某些考量。在 iPhone 上，点击`UIActionSheet`外部不会产生任何效果，因此“取消”按钮是绝对必要的。然而，在
    iPad 上，用户通常可以通过点击操作表外部来关闭它。除非操作表是在`UIPopoverController`内部呈现的，否则“取消”按钮相当不必要，甚至可能造成困惑。


    与`UIAlertView`一样，你可以使用`-dismissWithClickedButtonIndex:animated:`手动关闭`UIActionSheet`。


    最后，你的`UIActionSheet`的`delegate`属性（遵循`UIActionSheetDelegate`协议）允许你对操作表的呈现、取消和关闭以及每个按钮的选择做出响应。通过实现`-actionSheet:clickedButtonAtIndex:`方法，你可以根据每个选项的选择实现特定功能。


    ### 总结


    至此，你应该对 iOS 设计和开发的各种元素有了极好的理解。我们已经回顾了最常用的设计对象及其通用指南，以及它们最常见的实现和使用中的细微差别。一旦你深入理解开发者在创建应用程序时所拥有的众多选项，设计和创建有用、设计精良且视觉上吸引人的产品就会变得轻而易举。


    ## Chapter 4


    ## 位置相关实践方案


    Core Location 框架提供了一种向应用程序提供与设备地理定位相关信息的新方式。借助该框架的功能，你的应用程序可以精确地确定设备的位置，甚至知道它面向的方向。已有多种应用程序成功抓住了利用位置感知信息的机会，例如
    Facebook 和 Foursquare。iOS 5 继续改进可用的可能性，并提供了将人类可读位置转换为地理位置的新功能。


    在本章中，我们将处理三个主要能力：定位服务、GPS 和磁力计。定位服务是允许你的应用程序访问用户位置的基本功能。在此基础上，通过使用辅助 GPS，你可以极大地提高位置精度（但通常以牺牲电池寿命为代价）。某些较新设备包含磁力计，它允许应用程序访问设备的航向和方位。


    ### 支持的设备


    当你计划将基于位置的服务整合到应用程序中时，首先需要考虑的是哪些设备将支持这些服务。并非所有 Apple 设备都生而平等，或者说并非所有设备都具备支持定位服务的能力。具体来说，所有
    iPod Touch 都不包含 GPS，它们只能基于 WiFi 连接（如果可用且已连接）来提供设备位置。请参考表 4–1，查看当前 Apple 设备所支持的定位能力。


    ![Image](images/9781430240051_tab04-01.jpg)'
  raw: '#### UIAlertView


    A `UIAlertView` is an incredibly simple yet effective class. Most of the time
    it is used to present information, though it can be configured to allow text input.


    A `UIAlertView` has a property `alertViewStyle`, which specifies the type of alert
    presented, with possible values:


    *   `UIAlertViewStyleDefault`

    *   `UIAlertViewStyleSecureTextInput`

    *   `UIAlertViewStylePlainTextInput`

    *   `UIAlertViewStyleLoginAndPasswordInput`


    The default style refers to a simple alert presenting information, while the remaining
    three all allow text input. Their names give a straightforward idea of their specific
    uses.


    The simplest way to configure a Default-styled `UIAlertView` is through its designated
    initializer,`-initWithTitle:message:delegate:cancelButtonTitle:otherButtonTitles:`.
    The next example demonstrates the purpose of the configuration properties.


    The following code will configure the `UIAlertView` shown in [Figure 3–25](#Chapter03.html#fig_3_25).


    `UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Title" message:@"This
    is our`

    `message" delegate:self cancelButtonTitle:@"Ok" otherButtonTitles:@"Other Button",
    nil];` ![Image](images/9781430240051_Fig03-25.jpg)


    **Figure 3–25.** *A `UIAlertView` presented*


    Once your `UIAlertView` is fully configured, it can be presented quite simply
    by calling the `-show` method.


    `[alert show];`


    The `UIAlertView` also has a `delegate`property, as you set in the initializer,
    which you have set to your view controller in this example. This property conforms
    to the `UIAlertViewDelegate` protocol. It contains multiple methods called upon
    the presenting, cancelling, or dismissing of a `UIAlertView`. More importantly,
    though, is its `-alertView:clickedButtonAtIndex:` method, which allows your application
    to specifically react to each different button pressed.


    If you wish to manually dismiss a `UIAlertView`, possibly by some outside event
    or after a certain amount of time, you can call the `-dismissWithClickedButtonIndex:animated:`
    method.


    In general, the `UIAlertView` is used to present or request information in response
    to specific events, such as changes in outside conditions that affect your application,
    or loss in availability of some service.


    #### UIActionSheet


    The `UIActionSheet` class is often used in cases of presenting a user with multiple
    options to choose from so that an application knows how to proceed. It consists
    of a variety of large labeled buttons, which can have certain colors depending
    on the nature of their effect on the application, as in [Figure 3–26](#Chapter03.html#fig_3_26).


    ![Image](images/9781430240051_Fig03-26.jpg)


    **Figure 3–26.** *A simple `UIActionSheet` configured with multiple buttons*


    The `UIActionSheet` has a property `actionSheetStyle`. Unlike the similar property
    in `UIAlertView`, this simply determines the cosmetic style of the action sheet,
    with possible values:


    *   `UIActionSheetStyleAutomatic`

    *   `UIActionSheetStyleDefault`

    *   `UIActionSheetStyleBlackTranslucent`

    *   `UIActionSheetStyleBlackOpaque`


    The automatic style will simply mimic, if specified, the visual style of the bottom
    bar. Otherwise, it will revert to the `UIActionSheetStyleDefault` value.


    The simplest way to set up a `UIActionSheet` is through its designated initializer,
    `initWithTitle:delegate:cancelButtonTitle:destructiveButtonTitle:otherButtonTitles:`.
    The following line, for example, will reproduce the `UIActionSheet` displayed
    in [Figure 3–26](#Chapter03.html#fig_3_26).


    `UIActionSheet *actionSheet = [[UIActionSheet alloc] initWithTitle:@"Title" delegate:self`

    `cancelButtonTitle:@"Cancel" destructiveButtonTitle:@"Delete" otherButtonTitles:@"Other`

    `Button 1", @"Other Button 2", nil];`


    As you can see, the Cancel button tends to be a darker color to indicate its result,
    as it is most often used to implement cancellation of some behavior. The Destructive
    button, however, is a bright red color in order to indicate that it usually implements
    some kind of method that will permanently delete user data.


    When presenting a `UIActionSheet`, you must take into account the device being
    used. Due to the smaller screen of the iPhone compared to the iPad, a `UIActionSheet`
    will only ever be presented from the bottom of the view. On the iPad, however,
    multiple methods can be used to present the action sheet from any specified point,
    bar button item, toolbar, tab bar, or view.


    The device being used also brings in certain considerations aboutbutton use. On
    the iPhone, tapping outside of a `UIActionSheet` does nothing, so a Cancel button
    is absolutely necessary. On the iPad, however, a user can usually dismiss the
    action sheet by tapping outside of the actual sheet. Unless the action sheet is
    being presented inside of a `UIPopoverController`, then a Cancel button is fairly
    unnecessary, and can be confusing.


    Just as with the `UIAlertView`, you can manually dismiss a `UIActionSheet` using
    `-dismissWithClickedButtonIndex:animated:`.


    Finally, your `UIActionSheet`’s`delegate` property, which conforms to the `UIActionSheetDelegate`
    protocol, allows you to react to the presenting, cancellation, and dismissing
    of your action sheet, as well as the selection of each button. By implementing
    the `-actionSheet:clickedButtonAtIndex:` method, you can implement specific functionality
    in accordance with the selection of each option.


    ### Summary


    By this point, you should have an excellent understanding of the various elements
    of iOSdesign and development. We have reviewed the most commonly used design objects,
    and their general guidelines, as well as their most common implementations and
    little nuances of their use. Once you have a key understanding of the many options
    a developer has in creating anapplication, designing and creating useful, well-designed,
    and visually appealing products become simply second nature.


    ## Chapter 4


    ## Location Recipes


    The Core Location framework provides a new way to provide information to applications
    that is relevant to where the device is geographically located. With the features
    of this framework, your application can accurately tell where a device is located
    and even what direction it is facing. There is a variety of applications that
    have successfully seized opportunities to utilize location-aware information,
    such as Facebook and Foursquare. iOS 5 continues to improve on the possibilities
    available and provides new features to convert human-readable locations into geographical
    locations.


    There are three main capabilities that we will deal with in this chapter: location
    services, GPS, and the magnetometer. Location services are the bare essential
    functionality that allows your application to access the location of the user.
    On top of this, by using assisted GPS, you can greatly improve your location accuracy
    (often at the price of battery life). The magnetometer is included on certain
    newer devices, which allows an application access to both the heading and bearing
    of a device.


    ### Supported Devices


    The first thing you need to consider when you are planning to incorporate location-based
    services into your application is what devices will support those services. Not
    all Apple devices are created equal, or rather not all of them include the capability
    to support location services. Specifically, none of the iPod Touches includes
    a GPS, and they can provide the device''s location only based on a WiFi connection
    (if available and connected). Refer to [Table 4–1](#Chapter04.html#tab_4_1) to
    see the supported location capabilities of current Apple devices.


    ![Image](images/9781430240051_tab04-01.jpg)'
  trans: '

    ### `UIAlertView`


    `UIAlertView` 是一个极其简单但有效的类。大多数情况下，它用于呈现信息，不过也可以配置为允许文本输入。


    `UIAlertView` 有一个 `alertViewStyle` 属性，它指定了所呈现警报的类型，可选值包括：


    - `UIAlertViewStyleDefault`

    - `UIAlertViewStyleSecureTextInput`

    - `UIAlertViewStylePlainTextInput`

    - `UIAlertViewStyleLoginAndPasswordInput`


    默认样式指的是一个呈现信息的简单警报，而其余三种样式都允许文本输入。它们的名称直接表明了其具体用途。


    配置默认样式的 `UIAlertView` 最简单的方式是通过其指定的初始化方法 `-initWithTitle:message:delegate:cancelButtonTitle:otherButtonTitles:`。下一个示例演示了这些配置属性的用途。


    以下代码将配置如图 3–25 所示的 `UIAlertView`。


    ```

    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Title" message:@"This
    is our"

    message delegate:self cancelButtonTitle:@"Ok" otherButtonTitles:@"Other Button",
    nil];

    ```


    ![Image](img/9781430240051_Fig03-25.jpg)


    **图 3–25.** 呈现的 `UIAlertView`


    一旦你的 `UIAlertView` 配置完成，只需调用 `-show` 方法即可非常简单地呈现它。


    ```

    [alert show];

    ```


    `UIAlertView` 还有一个 `delegate` 属性，正如你在初始化方法中设置的那样，在此示例中你将其设置为你的视图控制器。该属性遵循 `UIAlertViewDelegate`
    协议。它包含多个方法，这些方法在呈现、取消或关闭 `UIAlertView` 时被调用。但更重要的是它的 `-alertView:clickedButtonAtIndex:`
    方法，该方法允许你的应用程序对每个不同按钮的按下做出特定响应。


    如果你希望手动关闭 `UIAlertView`，例如由于某些外部事件或在特定时间之后，你可以调用 `-dismissWithClickedButtonIndex:animated:`
    方法。


    通常，`UIAlertView` 用于响应特定事件来呈现或请求信息，例如影响应用程序的外部条件变化，或某些服务不可用。


    ### `UIActionSheet`


    `UIActionSheet` 类通常用于向用户提供多个选项以供选择，以便应用程序知道如何继续。它由一系列大型带标签的按钮组成，这些按钮可以根据其对应用程序影响的性质显示特定颜色，如图
    3–26 所示。


    ![Image](img/9781430240051_Fig03-26.jpg)


    **图 3–26.** 配置了多个按钮的简单 `UIActionSheet`


    `UIActionSheet` 有一个 `actionSheetStyle` 属性。与 `UIAlertView` 中的类似属性不同，这仅决定操作表的外观样式，可选值包括：


    - `UIActionSheetStyleAutomatic`

    - `UIActionSheetStyleDefault`

    - `UIActionSheetStyleBlackTranslucent`

    - `UIActionSheetStyleBlackOpaque`


    如果指定了自动样式，它会模仿底部栏的视觉样式。否则，它将恢复为 `UIActionSheetStyleDefault` 值。


    设置 `UIActionSheet` 最简单的方式是通过其指定的初始化方法 `initWithTitle:delegate:cancelButtonTitle:destructiveButtonTitle:otherButtonTitles:`。例如，以下代码行将重现图
    3–26 中显示的 `UIActionSheet`。


    ```

    UIActionSheet *actionSheet = [[UIActionSheet alloc] initWithTitle:@"Title" delegate:self

    cancelButtonTitle:@"Cancel" destructiveButtonTitle:@"Delete" otherButtonTitles:@"Other

    Button 1", @"Other Button 2", nil];

    ```


    如你所见，“取消”按钮通常是较深的颜色以指示其结果，因为它最常用于实现某些行为的取消。而“破坏性”按钮是亮红色，以指示它通常实现某种会永久删除用户数据的方法。


    在呈现 `UIActionSheet` 时，你必须考虑所使用的设备。由于 iPhone 的屏幕比 iPad 小，`UIActionSheet` 只能从视图底部呈现。然而，在
    iPad 上，可以使用多种方法从任何指定的点、栏按钮项、工具栏、标签栏或视图呈现操作表。


    所使用的设备也会带来关于按钮使用的某些考量。在 iPhone 上，点击 `UIActionSheet` 外部不会产生任何效果，因此“取消”按钮是绝对必要的。然而，在
    iPad 上，用户通常可以通过点击操作表外部来关闭它。除非操作表是在 `UIPopoverController` 内部呈现的，否则“取消”按钮相当不必要，甚至可能造成困惑。


    与 `UIAlertView` 一样，你可以使用 `-dismissWithClickedButtonIndex:animated:` 手动关闭 `UIActionSheet`。


    最后，你的 `UIActionSheet` 的 `delegate` 属性（遵循 `UIActionSheetDelegate` 协议）允许你对操作表的呈现、取消和关闭以及每个按钮的选择做出响应。通过实现
    `-actionSheet:clickedButtonAtIndex:` 方法，你可以根据每个选项的选择实现特定功能。


    ### 总结


    至此，你应该对 iOS 设计和开发的各种元素有了极好的理解。我们已经回顾了最常用的设计对象及其通用指南，以及它们最常见的实现和使用中的细微差别。一旦你深入理解开发者在创建应用程序时所拥有的众多选项，设计和创建有用、设计精良且视觉上吸引人的产品就会变得轻而易举。


    ## Chapter 4


    ## 位置相关实践方案


    Core Location 框架提供了一种向应用程序提供与设备地理定位相关信息的新方式。借助该框架的功能，你的应用程序可以精确地确定设备的位置，甚至知道它面向的方向。已有多种应用程序成功抓住了利用位置感知信息的机会，例如
    Facebook 和 Foursquare。iOS 5 继续改进可用的可能性，并提供了将人类可读位置转换为地理位置的新功能。


    在本章中，我们将处理三个主要能力：定位服务、GPS 和磁力计。定位服务是允许你的应用程序访问用户位置的基本功能。在此基础上，通过使用辅助 GPS，你可以极大地提高位置精度（但通常以牺牲电池寿命为代价）。某些较新设备包含磁力计，它允许应用程序访问设备的航向和方位。


    ### 支持的设备


    当你计划将基于位置的服务整合到应用程序中时，首先需要考虑的是哪些设备将支持这些服务。并非所有 Apple 设备都生而平等，或者说并非所有设备都具备支持定位服务的能力。具体来说，所有
    iPod Touch 都不包含 GPS，它们只能基于 WiFi 连接（如果可用且已连接）来提供设备位置。请参考表 4–1，查看当前 Apple 设备所支持的定位能力。


    ![Image](img/9781430240051_tab04-01.jpg)

