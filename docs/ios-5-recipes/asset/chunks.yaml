    Also add the following line to the camera''s `-imagePickerController:didFinishPickingMediaWithInfo:`
    delegate method in order to “release” your `currentPicker`''s value. This can
    go at the very end of the method, after the view controller has been dismissed.


    `currentPicker = nil;`


    Now you can successfully define your `-toggleFlash:` and `-toggleCamera:` methods
    like so:


    `-(void)toggleFlash:(UIButton *)sender`

    `{`

    `    if (flashOn)`

    `    {`

    `        currentPicker.cameraFlashMode = UIImagePickerControllerCameraFlashModeOff;`

    `        flashOn = NO;`

    `        [sender setTitle:@"Flash Off" forState:UIControlStateNormal];`

    `    }`

    `    else`

    `    {`

    `        currentPicker.cameraFlashMode = UIImagePickerControllerCameraFlashModeOn;`

    `        flashOn = YES;`

    `        [sender setTitle:@"Flash On" forState:UIControlStateNormal];`

    `    }`

    `}`

    `-(void)toggleCamera:(UIButton *)sender`

    `{`

    `    if (frontCameraUsed)`

    `    {`

    `        currentPicker.cameraDevice = UIImagePickerControllerCameraDeviceRear;`

    `        frontCameraUsed = NO;`

    `        [sender setTitle:@"Rear Camera" forState:UIControlStateNormal];`

    `    }`

    `    else`

    `    {`

    `        currentPicker.cameraDevice = UIImagePickerControllerCameraDeviceFront;`

    `        frontCameraUsed = YES;`

    `        [sender setTitle:@"Front Camera" forState:UIControlStateNormal];`

    `    }`

    `}`


    Finally, you simply need to change the visibility of the camera controls by adding
    two more lines to your `-cameraButtonPressed:` method, just before your controller
    is presented.


    `imagePicker.showsCameraControls = NO;`

    `imagePicker.cameraOverlayView = [self customView:imagePicker];`


    Your camera should now have a wonderful little overlay with a couple of buttons
    that change how it works, as in [Figure 6–10](#Chapter06.html#fig_6_10). You can
    see that from here, you can create your own custom overlays and easily change
    their functions to fit nearly any situation.


    ![Image](images/9781430240051_Fig06-10.jpg)


    **Figure 6–10.** *Custom overlay view over a camera*'
  trans: "```markdown\n# 配方 6–4：自定义相机覆盖层\n\n有很多应用实现了相机界面，同时也实现了自定义覆盖层，例如用于显示天空中的星座，或者只是实现自己的自定义相机控件。在这里，您将学习如何在相机屏幕上实现一个基本的自定义覆盖层，继续上一个配方的项目。\n\
    \n您需要以编程方式构建自定义的 `UIView` 作为覆盖层，这意味着您不会使用 XIB 界面。您将调整放入按钮的某些特定属性，因此首先要做的是将 `QuartzCore`\
    \ 界面导入到您的项目中，即在头文件中添加一条 import 语句。\n\n```\n#import <QuartzCore/QuartzCore.h>\n\
    ```\n\n您将创建一个方法 `-customView:`，该方法将 `UIImagePicker` 作为参数，并返回您的 `UIView`。\n\n```\n\
    -(UIView *)customView:(UIImagePickerController *)imagePicker;\n{\n    UIView *view\
    \ = [[UIView alloc] initWithFrame:CGRectMake(0, 0, 280, 480)];\n    view.backgroundColor\
    \ = [UIColor clearColor];\n\n    UIButton *flashButton = [[UIButton alloc] initWithFrame:CGRectMake(10,\
