    Upon testing this application, you should be able to receive the location, including
    street name, city, country, and other valuable information of the given device.
    This can of course be tested on a physical device, or in the simulator using the
    same location-simulating functions you have used previously.


    ### Getting Coordinates from Place Names


    iOS 5 has introduced forward geocoding as well. This means that you can pass a
    `CLGeocoder` object an address and receive the coordinates for that address as
    a result. The `CLGeocoder` processes address strings as a parameter, and the more
    information you can provide about an address, the more accurate the resulting
    forward geocode will be. If the geocode process results in multiple coordinates
    being identified as possible matches, these coordinates will be returned in the
    `NSArray` placemarks of the `completionHandler`. A sample implementation of this
    could be as follows:


    `CLGeocoder *_geoCoder=[[CLGeocoder alloc] init];`

    `[_geoCoder geocodeAddressString:@”2400 Boston Street, Baltimore, MD, USA"`

    `        completionHandler:^(NSArray* placemarks, NSError* error){`

    `                        for (CLPlacemark* aPlacemark in placemarks)`

    `                        {`

    `                                // Process the placemark.`

    `                        }`

    `}];`


    ### Summary


    The Core Location framework is a powerful framework that can be utilized by any
    number of application features. As demonstrated in this chapter, you can determine
    where a device is located, which direction a device is facing, and when a device
    enters or exits a specific region. Beyond those powerful features, you can also
    perform lookups on geographical coordinates to determine human-readable location
    information to be presented to your end user as well as provide complementary
    services to perform the reverse.


    Apple has walked a fine line of making powerful features available to developers
    while also respecting a user''s privacy and the battery drain on a device. As
    developers, we should work to deliver exciting features and functionality in our
    applications while maintaining the same level of respect for our users. The use
    of the `purpose` property on a `CLLocationManager` object and judicious use of
    location services are steps in the right direction.


