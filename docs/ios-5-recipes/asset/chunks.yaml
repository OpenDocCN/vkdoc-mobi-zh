    **Figure 4–24.** *Connecting a `UISwitch`''s action*


    ![Image](images/9781430240051_Fig04-25.jpg)


    **Figure 4–25.** *Configuring the toggling action*


    You need to import the Core Location framework into your interface file (`.h`)
    and create a `CLLocationManager` instance variable. Then declare your view controller
    as complying with the `CLLocationManagerDelegate` protocol. Your interface file
    (`.h`) for the view controller now looks like this:


    `//  Chapter4RegionMonitoringViewController.h`

    `#import <UIKit/UIKit.h>`

    `#import <CoreLocation/CoreLocation.h>`


    `@interface Chapter4RegionMonitoringViewController : UIViewController`

    `<CLLocationManagerDelegate>{`

    `    CLLocationManager *_locationManager;`

    `    UILabel *labelRegionInfo;`

    `}`


    `@property (strong, nonatomic) IBOutlet UILabel *labelRegionInfo;`

    `- (IBAction)regionMonitoringToggle:(id)sender;`


    `@end`


    Switching to the implementation file (`.m`), you can implement your region tracking
    methods. The first thing you will make sure of is that region monitoring is available
    and enabled. Scroll to the bottom of `Chapter4RegionMonitoringViewController.m`
    and add the following to the `- (IBAction)regionMonitoringToggle:(id)sender` method:


    `//Check if region monitoring is available`

    `if([CLLocationManager regionMonitoringAvailable] && [CLLocationManager`

    `regionMonitoringEnabled]){`


    `        ….`

    `}else{`

    `        self.labelRegionInfo.text=@"Region monitoring is not available on this
    device";`

    `}`


    In the same method, you will want to instantiate your `CLLocationManager` instance
    variable if it is not already created and make sure that it is your `UISwitch`
    calling the method:


    `    //Check if region monitoring is available`

    `    if([CLLocationManager regionMonitoringAvailable] && [CLLocationManager`

    `regionMonitoringEnabled]){`

    `        //Make sure sender is UISwitch`

    `        if([sender isKindOfClass:[UISwitch class]]){`

    `            UISwitch *regionSwitch=(UISwitch *) sender;`

    `            //If UISwitch is turned On`

    `            if(regionSwitch.on){`

    `                if(_locationManager==nil){`

    `                    _locationManager=[[CLLocationManager alloc] init];`

    `                    _locationManager.purpose=@"To welcome you to Baltimore";`

    `                    _locationManager.delegate=self;`

    `                }`

    `…`


    You need to define the center coordinate of the region you want to monitor and
    the radius of the region. Be careful when specifying the radius because if it
    is too large, the monitoring will fail. You can check to make sure your radius
    is within the radius bounds by comparing it to the `maximumRegionMonitoringDistance`
    property of the `CLLocationManager` object. Once you have the center coordinate
    and radius, you create the `CLRegion` object and provide it with an identifier
    for future reference:


    `CLLocationCoordinate2D baltimoreCoordinate=CLLocationCoordinate2DMake(39.2963,
    -76.613);`

    `int regionRadius=3000;`

    `if(regionRadius>_locationManager.maximumRegionMonitoringDistance){`

    `regionRadius=_locationManager.maximumRegionMonitoringDistance;`

    `}`

    `CLRegion *baltimoreRegion=[[CLRegion alloc]`

    `initCircularRegionWithCenter:baltimoreCoordinate`

    `        radius:regionRadius`

    `        identifier:@"baltimoreRegion"];`


    Once the region has been created, you can start monitoring for boundary events
    of that region by telling your `CLLocationManager` instance object about the region
    and setting the accuracy at which you want to monitor for the event:


    `[_locationManager startMonitoringForRegion:baltimoreRegion`

    `        desiredAccuracy:kCLLocationAccuracyHundredMeters];`


    One last thing you want to do is turn off region monitoring if the user slides
    the `UISwitch` to the “Off” position. To do this, you will access the `monitoredRegions`
    property of your `CLLocationManager` instance variable and turn off region monitoring
    for all of the currently monitored regions. You could also choose to selectively
    turn off specific regions by utilizing the `identifier` property of the `CLRegion`.


    `}else{`

    `                //If UISwitch is turned Off`

    `                if(_locationManager!=nil){`

    `                    for (CLRegion *monitoredRegion in [_locationManager`

    `monitoredRegions]) {`

    `                        [_locationManager stopMonitoringForRegion:monitoredRegion];`

    `                        self.labelRegionInfo.text=[NSString stringWithFormat:@"Turned`

    `off region monitoring fore : %@", monitoredRegion.identifier];`

    `                    }`

    `                }`

    `}`


    The delegate methods need to be defined as well. There are two delegate methods
    for handling boundary events and one for handling errors:


    `locationManager:didEnterRegion:`

    `locationManager:didExitRegion:`

    `locationManager:monitoringDidFailForRegion:withError:`


    There are two main error codes that are related to region monitoring. One is `kCLErrorRegionMonitoringDenied`,
    and it is used when the user of the device has specifically denied access to region
    monitoring. The other is `kCLErrorRegionMonitoringFailure`, and it is used when
    monitoring for a specific region has failed, usually because the system has no
    more region resources available to the application.'
  trans: "\n# 欢迎来到巴尔的摩！\n\n在本项目中，你将创建一个针对马里兰州巴尔的摩市的区域，并在游客进入该区域时向他们表示欢迎。首先创建一个名为 `Chapter4RegionMonitoring`\
    \ 的新单视图应用程序。如果你的 Xcode 版本允许设置类前缀，请使用相同的名称 `Chapter4RegionMonitoring`。首先要做的是在项目中包含\
    \ Core Location 框架，方法是在导航窗格中选择项目，然后选择项目的目标。转到 Build Phases 选项卡，展开 Link Binary\
    \ With Libraries 区域以查看已包含的框架，并像之前章节中那样添加该框架。\n\n添加库后，你可以创建 `.xib` 文件。在导航窗格中选择\
    \ `Chapter4RegionMonitoringViewController.xib` 以打开 Interface Builder。添加一个 `UILabel`\
    \ 和一个 `UISwitch`。将 `UISwitch` 的初始状态设置为 `Off`。它应类似于图 4-21。\n\n![图片](img/9781430240051_Fig04-21.jpg)\n\
    \n**图 4-21.** *你非常熟悉的用户界面*\n\n使用助理编辑器，通过从 `.xib` 文件到接口文件（`.h`）执行 `^-单击-拖拽` 来连接输出口和操作。按照图\
    \ 4-22、图 4-23、图 4-24 和图 4-25 的步骤，创建一个名为 `labelRegionInfo` 的 `UILabel` 输出口，以及一个名为\
    \ `regionMonitoringToggle` 的 `UISwitch` 的 `IBAction`。\n\n![图片](img/9781430240051_Fig04-22.jpg)\n\
    \n**图 4-22.** *将 `UILabel` 连接到输出口*\n\n![图片](img/9781430240051_Fig04-23.jpg)\n\n\
    **图 4-23.** *配置 `UILabel` 输出口*\n\n![图片](img/9781430240051_Fig04-24.jpg)\n\n**图\
    \ 4-24.** *连接 `UISwitch` 的操作*\n\n![图片](img/9781430240051_Fig04-25.jpg)\n\n**图\
    \ 4-25.** *配置切换操作*\n\n你需要将 Core Location 框架导入到接口文件（`.h`）中，并创建一个 `CLLocationManager`\
    \ 实例变量。然后将你的视图控制器声明为遵循 `CLLocationManagerDelegate` 协议。现在，你的视图控制器的接口文件（`.h`）如下所示：\n\
    \n```\n//  Chapter4RegionMonitoringViewController.h\n#import <UIKit/UIKit.h>\n\
    #import <CoreLocation/CoreLocation.h>\n\n@interface Chapter4RegionMonitoringViewController\
    \ : UIViewController\n<CLLocationManagerDelegate>{\n    CLLocationManager *_locationManager;\n\
    \    UILabel *labelRegionInfo;\n}\n\n@property (strong, nonatomic) IBOutlet UILabel\
    \ *labelRegionInfo;\n- (IBAction)regionMonitoringToggle:(id)sender;\n\n@end\n\
    ```\n\n切换到实现文件（`.m`），你可以实现区域跟踪方法。首先要确保区域监控可用且已启用。滚动到 `Chapter4RegionMonitoringViewController.m`\
    \ 的底部，并将以下内容添加到 `- (IBAction)regionMonitoringToggle:(id)sender` 方法中：\n\n```\n\
    //检查区域监控是否可用\nif([CLLocationManager regionMonitoringAvailable] && [CLLocationManager\n\
    regionMonitoringEnabled]){\n\n        ….\n}else{\n        self.labelRegionInfo.text=@\"\
    此设备不支持区域监控\";\n}\n```\n\n在同一方法中，如果 `CLLocationManager` 实例变量尚未创建，你需要实例化它，并确保是你的\
    \ `UISwitch` 调用了该方法：\n\n```\n    //检查区域监控是否可用\n    if([CLLocationManager regionMonitoringAvailable]\
    \ && [CLLocationManager\nregionMonitoringEnabled]){\n        //确保发送者是 UISwitch\n\
    \        if([sender isKindOfClass:[UISwitch class]]){\n            UISwitch *regionSwitch=(UISwitch\
    \ *) sender;\n            //如果 UISwitch 处于打开状态\n            if(regionSwitch.on){\n\
    \                if(_locationManager==nil){\n                    _locationManager=[[CLLocationManager\
    \ alloc] init];\n                    _locationManager.purpose=@\"欢迎来到巴尔的摩\";\n\
    \                    _locationManager.delegate=self;\n                }\n…\n```\n\
    \n你需要定义要监控的区域中心坐标和半径。指定半径时要小心，因为如果半径太大，监控将会失败。你可以通过将半径与 `CLLocationManager` 对象的\
    \ `maximumRegionMonitoringDistance` 属性进行比较，来确保半径在边界范围内。一旦有了中心坐标和半径，就可以创建 `CLRegion`\
    \ 对象，并为其提供一个标识符以便将来引用：\n\n```\nCLLocationCoordinate2D baltimoreCoordinate=CLLocationCoordinate2DMake(39.2963,\
    \ -76.613);\nint regionRadius=3000;\nif(regionRadius>_locationManager.maximumRegionMonitoringDistance){\n\
    regionRadius=_locationManager.maximumRegionMonitoringDistance;\n}\nCLRegion *baltimoreRegion=[[CLRegion\
    \ alloc]\ninitCircularRegionWithCenter:baltimoreCoordinate\n        radius:regionRadius\n\
    \        identifier:@\"baltimoreRegion\"];\n```\n\n创建区域后，你可以通过将区域告知 `CLLocationManager`\
    \ 实例对象并设置监控事件的精度，来开始监控该区域的边界事件：\n\n```\n[_locationManager startMonitoringForRegion:baltimoreRegion\n\
    \        desiredAccuracy:kCLLocationAccuracyHundredMeters];\n```\n\n最后要做的一件事是，如果用户将\
    \ `UISwitch` 滑动到 `Off` 位置，则关闭区域监控。为此，你将访问 `CLLocationManager` 实例变量的 `monitoredRegions`\
    \ 属性，并为所有当前监控的区域关闭区域监控。你也可以选择利用 `CLRegion` 的 `identifier` 属性，有选择地关闭特定区域。\n\n```\n\
    }else{\n                //如果 UISwitch 处于关闭状态\n                if(_locationManager!=nil){\n\
    \                    for (CLRegion *monitoredRegion in [_locationManager\nmonitoredRegions])\
    \ {\n                        [_locationManager stopMonitoringForRegion:monitoredRegion];\n\
    \                        self.labelRegionInfo.text=[NSString stringWithFormat:@\"\
    已关闭区域监控：%@\", monitoredRegion.identifier];\n                    }\n          \
    \      }\n}\n```\n\n还需要定义代理方法。有两个用于处理边界事件的代理方法和一个用于处理错误的代理方法：\n\n`locationManager:didEnterRegion:`\n\
    `locationManager:didExitRegion:`\n`locationManager:monitoringDidFailForRegion:withError:`\n\
    \n有两个与区域监控相关的主要错误代码。一个是 `kCLErrorRegionMonitoringDenied`，当设备用户明确拒绝访问区域监控时使用它。另一个是\
    \ `kCLErrorRegionMonitoringFailure`，当监控特定区域失败时使用它，通常是因为系统没有更多的区域资源可供应用程序使用。\n"
- fmt: "`-(void)locationManager:(CLLocationManager *)manager monitoringDidFailForRegion:(CLRegion\
    \ *)region withError:(NSError *)error {\n    switch (error.code) {\n        case\
    \ kCLErrorRegionMonitoringDenied:\n        {\n            self.labelRegionInfo.text\
    \ = @\"Region monitoring is denied on this device\";\n            break;\n   \
    \     }\n        case kCLErrorRegionMonitoringFailure:\n        {\n          \
    \  self.labelRegionInfo.text = [NSString stringWithFormat:@\"Region monitoring\
    \ failed for region: %@\", region.identifier];\n            break;\n        }\n\
    \        default:\n        {\n            self.labelRegionInfo.text = [NSString\
    \ stringWithFormat:@\"An unhandled error occured: %@\", error.description];\n\
    \            break;\n        }\n    }\n}\n```\n\n`didEnter` and `didExit` can\
    \ perform any function that you want, and since the application could be in the\
    \ background when the boundary event occurs, you will use local notifications\
    \ in addition to updating the label to let the user know the event occurred:\n\
    \n```objc\n-(void)locationManager:(CLLocationManager *)manager didEnterRegion:(CLRegion\
    \ *)region {\n    self.labelRegionInfo.text = @\"Welcome to Baltimore!\";\n  \
    \  UILocalNotification *locationNotification = [[UILocalNotification alloc] init];\n\
    \    locationNotification.alertBody = @\"Welcome to Baltimore!\";\n    locationNotification.alertAction\
    \ = @\"Ok\";\n    locationNotification.soundName = UILocalNotificationDefaultSoundName;\n\
    \    [[UIApplication sharedApplication] presentLocalNotificationNow:locationNotification];\n\
    }\n\n-(void)locationManager:(CLLocationManager *)manager didExitRegion:(CLRegion\
    \ *)region {\n    self.labelRegionInfo.text = @\"Thanks for visiting Baltimore!\
    \ Come back soon!\";\n    UILocalNotification *locationNotification = [[UILocalNotification\
    \ alloc] init];\n    locationNotification.alertBody = @\"Thanks for visiting Baltimore!\
    \ Come back soon!\";\n    locationNotification.alertAction = @\"Ok\";\n    locationNotification.soundName\
