  raw: '### Recipe 11–3: Subclassing NSManagedObject


    Now that you have your basic `UITableView` set up to display the information you
    can store with Core Data, it''s time to improve a bit on your program design.
    The first thing you can do is an incredible time saver that will make programming
    with Core Data significantly easier. You will be subclassing the `NSManagedObject`
    class for each of the entities that you created. Unlike most subclassing, however,
    this is incredibly easy to set up.


    First, switch back to view your `MusicSchool.xcdatamodeld` file in which you created
    your entities.


    The next step can be done individually, but you will create your three subclasses
    all at once. Select each entity from the view by holding the “command” key and
    clicking each one, so that all three become highlighted. You will also notice
    that all of their combined attributes and relationships will be visible as well,
    as shown in [Figure 11-21](#Chapter11.html#fig_11_21).


    The `NSManagedObject` subclassing technique that you will be using creates a subclass
    based on which entity or entities are selected, so it is important to make sure
    that all the entities you want subclasses for are selected.


    ![Image](images/9781430240051_Fig11-21.jpg)


    **Figure 11–21.** *Selecting all three entities to be turned into `NSManagedObject`
    subclasses*


    Next, under the File menu, select `New` ![Image](images/U001.jpg)`New File...`
    to bring up the New File dialog. Navigate to the Core Data section under iOS,
    and select the “NSManagedObject subclass” option, as shown in [Figure 11-22](#Chapter11.html#fig_11_22).


    ![Image](images/9781430240051_Fig11-22.jpg)


    **Figure 11-22.** *Selecting the “NSManagedObject subclass” template to automatically
    generate classes for your entities*


    Click through, and hit Create to have Xcode create your three `NSManagedObject`
    subclasses.


    By subclassing the `NSManagedObject` class, you have effectively turned your entities
    into classes that you can use and manipulate normally, especially when it comes
    to accessing their attributes. Now, rather than having to use the `-setValue:forKey:`
    and `-valueForKey:` methods, you can simply use the setter and getter methods,
    or, more simply, the properties created with the same names as your attributes.
    This also allows you to more easily specify exactly which entity any given instance
    of `NSManagedObject` is associated with, so that your compiler can assist you
    in accessing properties and methods for that entity.


    To demonstrate these abilities, you can rewrite your `-tableView:cellForRowAtIndexPath:`
    method to first cast your `NSManagedObject` down to its appropriate subclass,
    and then populate your cell’s content using the subclass properties.


    First, make sure to import the newly created header files into your view controller.


    `#import "Instrument.h"`

    `#import "Student.h"`

    `#import "Teacher.h"`


    Once this is taken care of, you can implement your simplified method.


    `-(UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath`

    `{`

    `    static NSString *CellIdentifier = @"Cell";`


    `    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];`

    `    if (cell == nil)`

    `    {`

    `        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle
    reuseIdentifier:CellIdentifier];`

    `        cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;`

    `        cell.textLabel.font = [UIFont systemFontOfSize:19.0];`

    `        cell.detailTextLabel.font = [UIFont systemFontOfSize:12];`

    `    }`


    `    NSManagedObject *object = [self.fetchedResultsController objectAtIndexPath:indexPath];`


    `    if ([object.entity.name isEqualToString:@"Instrument"])`

    `    {`

    `        Instrument *instrument = (Instrument *)object;`

    `        cell.textLabel.text = instrument.name;`

    `        cell.detailTextLabel.text = instrument.family;`

    `    }`

    `    else if ([object.entity.name isEqualToString:@"Student"])`

    `    {`

    `        Student *student = (Student *)object;`

    `        cell.textLabel.text = student.name;`

    `        cell.detailTextLabel.text = [student.age stringValue];`

    `    }`

    `    else`

    `    {`

    `        Teacher *teacher = (Teacher *)object;`

    `        cell.textLabel.text = teacher.name;`

    `        cell.detailTextLabel.text = [teacher.age stringValue];`

    `    }`


    `    return cell;`

    `}`


    You can also simplify your `-add` method that creates your test data like so.


    `-(void)add`

    `{`

    `    NSManagedObject *add = [[NSManagedObject alloc]`

    `initWithEntity:self.entityDescription`

    `insertIntoManagedObjectContext:self.managedObjectContext];`

    `    if ([self.entityDescription.name isEqualToString:@"Teacher"])`

    `    {`

    `        Teacher *teacher = (Teacher *)add;`

    `        teacher.name = @"Peter";`

    `        teacher.age = [NSNumber numberWithInt:36];`

    `    }`

    `    else if ([self.entityDescription.name isEqualToString:@"Instrument"])`

    `    {`

    `        Instrument *instrument = (Instrument *)add;`

    `        instrument.name = @"Guitar";`

    `        instrument.family = @"Strings";`

    `    }`

    `else`

    `    {`

    `        Student *student = (Student *)add;`

    `        student.name = @"Andrew";`

    `        student.age = [NSNumber numberWithInt:18];`

    `    }`


    `    NSError *error;`

    `    BOOL success = [self.managedObjectContext save:&error];`

    `    if (!success)`

    `    {`

    `        NSLog(@"%@", [error localizedDescription]);`

    `    }`


    `    [self fetchResults];`


    `    [self.tableViewMain reloadData];`

    `}`


    Again, this doesn’t really affect how your application runs, but it makes your
    life a great deal easier in terms of coding and debugging.


    By using this subclassing technique, you will probably find yourself having fewer
    issues with runtime errors when using Core Data, as your compiler will now be
    able to confirm that you are accessing the correct properties for any given subclass.


    Just as you are able to access and edit the attributes of your subclassed `NSManagedObject`s,
    you can do the same with the relationships that your entities share. You will
    change your program such that if a Teacher is selected, a list of Instruments
    entered appears, and when one of these Instruments is selected, that Instrument
    is added to the set of `instruments` for that Teacher. You may also notice that
    because you have your relationships set up with inverses to each other, a relationship
    set one way will also be set in the reverse. In your case, when you add the Instrument
    into the `instruments` set of a Teacher, that Teacher will also be added into
    the `teachers` set of the Instrument.


    For demonstration purposes, you will implement this behavior only between Teachers
    and Instruments, but it should be easy to see how you would fully implement similar
    behavior between all three entities, allowing the user to connect any Teacher
    with his or her Students and Instruments.


    First, you will declare an instance variable in your `MainTableViewController`’s
    header file of type Teacher, to help keep track of the selected Teacher.


    `__strong Teacher *selectedTeacher;`


    Next, you will need to declare a new property called `delegate` of the same type
    as the class, which you will use to connect your multiple view controllers. Make
    sure to synthesize and nil this property as appropriate.


    `@property (nonatomic, strong) MainTableViewController *delegate;`


    Declare also the header for a method for your `delegate` property to perform,
    like so:


    `-(void)MainTableViewController:(MainTableViewController *)mainTableVC`

    `didSelectInstrument:(Instrument *)instrument;`


    Your header file (`MainTableViewController.h`) should now resemble the following:


    `#import <UIKit/UIKit.h>`

    `#import "Instrument.h"`

    `#import "Student.h"`

    `#import "Teacher.h"`'
  trans: "\n### 技巧 11-3：创建 `NSManagedObject` 的子类\n\n现在你已经设置好基础的 `UITableView` 来显示通过\
    \ Core Data 存储的信息，是时候进一步优化你的程序设计了。首先，有一项能极大节省时间的方法，能让 Core Data 编程变得简单得多：为创建的每个实体创建\
    \ `NSManagedObject` 的子类。不过，与大多数子类化操作不同，这种设置极其简单。\n\n首先，切换回 `MusicSchool.xcdatamodeld`\
    \ 文件，查看你创建的实体。\n\n下一步可以单独操作，但这里我们将一次性创建三个子类。按住 \"Command\" 键并点击每个实体，将它们全部选中，这样三个实体都会被高亮显示。你还会注意到，它们所有的属性和关系也会一并显示，如图\
    \ Figure 11-21 所示。\n\n你将使用的 `NSManagedObject` 子类化技术会基于所选实体创建子类，因此务必确保所有需要创建子类的实体都被选中。\n\
    \n![图片](img/9781430240051_Fig11-21.jpg)\n\n**图 11–21.** *选中全部三个实体，准备生成 `NSManagedObject`\
    \ 子类*\n\n接下来，在 \"File\" 菜单下，选择 `New` ![图片](img/U001.jpg)`New File...`，打开新建文件对话框。导航到\
    \ iOS 部分的 Core Data 栏目，选择 \"NSManagedObject subclass\" 选项，如图 Figure 11-22 所示。\n\
    \n![图片](img/9781430240051_Fig11-22.jpg)\n\n**图 11-22.** *选择 \"NSManagedObject\
    \ subclass\" 模板，自动为你的实体生成类*\n\n点击继续，然后点击 \"Create\"，让 Xcode 为你创建三个 `NSManagedObject`\
    \ 子类。\n\n通过子类化 `NSManagedObject`，你实际上已将实体转化为可以正常使用和操作的类，尤其是在访问其属性时。现在，无需再使用 `-setValue:forKey:`\
    \ 和 `-valueForKey:` 方法，只需调用 setter 和 getter 方法，或者更简单地说，直接使用与属性同名的属性即可。这还能让你更轻松地指定任意\
    \ `NSManagedObject` 实例关联的具体实体，从而让编译器帮你验证该实体的属性和方法访问是否正确。\n\n为了演示这些功能，你可以重写 `-tableView:cellForRowAtIndexPath:`\
    \ 方法，先将 `NSManagedObject` 向下转型为对应的子类，再使用子类属性填充单元格内容。\n\n首先，确保在视图控制器中导入新创建的头文件。\n\
    \n```\n#import \"Instrument.h\"\n#import \"Student.h\"\n#import \"Teacher.h\"\n\
    ```\n\n完成这一步后，就可以实现简化后的方法了。\n\n```\n-(UITableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    static NSString\
    \ *CellIdentifier = @\"Cell\";\n\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \    if (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\
    \ reuseIdentifier:CellIdentifier];\n        cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n\
    \        cell.textLabel.font = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font\
    \ = [UIFont systemFontOfSize:12];\n    }\n\n    NSManagedObject *object = [self.fetchedResultsController\
    \ objectAtIndexPath:indexPath];\n\n    if ([object.entity.name isEqualToString:@\"\
    Instrument\"])\n    {\n        Instrument *instrument = (Instrument *)object;\n\
    \        cell.textLabel.text = instrument.name;\n        cell.detailTextLabel.text\
    \ = instrument.family;\n    }\n    else if ([object.entity.name isEqualToString:@\"\
    Student\"])\n    {\n        Student *student = (Student *)object;\n        cell.textLabel.text\
    \ = student.name;\n        cell.detailTextLabel.text = [student.age stringValue];\n\
    \    }\n    else\n    {\n        Teacher *teacher = (Teacher *)object;\n     \
    \   cell.textLabel.text = teacher.name;\n        cell.detailTextLabel.text = [teacher.age\
    \ stringValue];\n    }\n\n    return cell;\n}\n```\n\n你还可以像这样简化创建测试数据的 `-add`\
    \ 方法。\n\n```\n-(void)add\n{\n    NSManagedObject *add = [[NSManagedObject alloc]\n\
    initWithEntity:self.entityDescription\ninsertIntoManagedObjectContext:self.managedObjectContext];\n\
    \    if ([self.entityDescription.name isEqualToString:@\"Teacher\"])\n    {\n\
    \        Teacher *teacher = (Teacher *)add;\n        teacher.name = @\"Peter\"\
    ;\n        teacher.age = [NSNumber numberWithInt:36];\n    }\n    else if ([self.entityDescription.name\
    \ isEqualToString:@\"Instrument\"])\n    {\n        Instrument *instrument = (Instrument\
    \ *)add;\n        instrument.name = @\"Guitar\";\n        instrument.family =\
    \ @\"Strings\";\n    }\nelse\n    {\n        Student *student = (Student *)add;\n\
    \        student.name = @\"Andrew\";\n        student.age = [NSNumber numberWithInt:18];\n\
    \    }\n\n    NSError *error;\n    BOOL success = [self.managedObjectContext save:&error];\n\
    \    if (!success)\n    {\n        NSLog(@\"%@\", [error localizedDescription]);\n\
    \    }\n\n    [self fetchResults];\n\n    [self.tableViewMain reloadData];\n}\n\
    ```\n\n再次强调，这并不会真正影响应用的运行方式，但它能大大简化你的编码和调试工作。\n\n通过使用这种子类化技术，你在使用 Core Data 时遇到的运行时错误将大幅减少，因为编译器现在能够确认你是否为某个子类访问了正确的属性。\n\
    \n就像你可以访问和编辑子类化 `NSManagedObject` 的属性一样，你也能对实体之间的关系进行同样的操作。接下来，我们将修改程序：当选中一个教师时，会显示已录入的乐器列表；当选中其中一个乐器时，该乐器会被添加到该教师的\
    \ `instruments` 集合中。你可能还会注意到，由于设置了逆关系，单向设置的关系也会自动反向设置。在这个例子中，当你把乐器添加到教师的 `instruments`\
    \ 集合时，该教师也会被添加到该乐器的 `teachers` 集合中。\n\n为演示起见，我们只在教师和乐器之间实现这一行为，但你应该能很容易地看出如何在这三个实体之间完全实现类似功能，从而允许用户将任意教师与其学生和乐器关联起来。\n\
    \n首先，在 `MainTableViewController` 的头文件中声明一个类型为 Teacher 的实例变量，用于跟踪选中的教师。\n\n```\n\
    __strong Teacher *selectedTeacher;\n```\n\n接下来，你需要声明一个与类类型相同的新属性 `delegate`，用于连接多个视图控制器。请确保适当地合成并将此属性置为\
    \ nil。\n\n```\n@property (nonatomic, strong) MainTableViewController *delegate;\n\
    ```\n\n同时，为 `delegate` 属性声明一个方法头，如下所示：\n\n```\n-(void)MainTableViewController:(MainTableViewController\
    \ *)mainTableVC\ndidSelectInstrument:(Instrument *)instrument;\n```\n\n你的头文件（`MainTableViewController.h`）现在应如下所示：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import \"Instrument.h\"\n#import \"Student.h\"\
    \n#import \"Teacher.h\"\n```\n"
- fmt: "#### `@interface MainTableViewController : UIViewController <UITableViewDelegate,\
    \ UITableViewDataSource>`\n\n```\n{\n    __strong Teacher *selectedTeacher;\n\
    }\n```\n\n`@property (strong, nonatomic) IBOutlet UITableView *tableViewMain;`\n\
    \n`@property (nonatomic, strong) NSEntityDescription *entityDescription;`\n\n\
    `@property (nonatomic, strong) NSFetchedResultsController *fetchedResultsController;`\n\
    \n`@property (nonatomic, strong) NSManagedObjectContext *managedObjectContext;`\n\
    \n`@property (nonatomic, strong) MainTableViewController *delegate;`\n\n`-(void)MainTableViewController:(MainTableViewController\
    \ *)mainTableVC didSelectInstrument:(Instrument *)instrument;`\n\n`@end`\n\nNext,\
    \ you will use the `delegate` property in conjunction with your `UITableView`’s\
    \ row selection method to build your new, albeit selective, functionality.\n\n\
    `-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath`\n```\n{\n    [self.tableViewMain deselectRowAtIndexPath:indexPath\
    \ animated:YES];\n    if ([self.entityDescription.name isEqualToString:@\"Teacher\"\
    ])\n    {\n        selectedTeacher = [self.fetchedResultsController objectAtIndexPath:indexPath];\n\
    \        MainTableViewController *selectInstrument = [[MainTableViewController\
    \ alloc] init];\n        selectInstrument.entityDescription = [NSEntityDescription\
    \ entityForName:@\"Instrument\" inManagedObjectContext:self.managedObjectContext];\n\
    \        selectInstrument.managedObjectContext = self.managedObjectContext;\n\
    \        selectInstrument.delegate = self;\n        [self.navigationController\
    \ pushViewController:selectInstrument animated:YES];\n    }\n    else if ([self.entityDescription.name\
    \ isEqualToString:@\"Instrument\"] && (self.delegate != nil))\n    {\n       \
    \ [self.delegate MainTableViewController:self didSelectInstrument:[self.fetchedResultsController\
    \ objectAtIndexPath:indexPath]];\n        [self.navigationController popViewControllerAnimated:YES];\n\
    \    }\n}\n```\n\nYou can now implement the `delegate` method you recently declared\
    \ to add the chosen Instrument to the `selectedTeacher`, and then save the changes\
    \ to the `NSManagedObjectContext`.\n\n`-(void)MainTableViewController:(MainTableViewController\
    \ *)mainTableVC didSelectInstrument:(NSManagedObject *)instrument`\n```\n{\n \
    \   [selectedTeacher addInstrumentsObject:instrument];\n    NSError *saveError;\n\
    \    BOOL success = [self.managedObjectContext save:&saveError];\n    if (!success)\n\
    \    {\n        NSLog(@\"%@\", [saveError localizedFailureReason]);\n    }\n}\n\
    ```\n\nSince you didn’t flesh out a full system for the user to create custom\
    \ data, you will need to adjust your `-add` method a few times, running your application\
    \ each time, to create some different data in order to fully test this functionality.\n\
    \n## Recipe 11–4: Filtering Your Fetch Requests\n\nWhen you’re using your instances\
