    self IN %@\", instruments];\n        }\n        else if ([self.entityDescription.name\
    \ isEqualToString:@\"Student\"])\n        {\n            filtered.entityDescription\
    \ = self.entityDescription;\n            filtered.predicate = [NSPredicate predicateWithFormat:@\"\
    age=%i\", [[(Student *)[self.fetchedResultsController objectAtIndexPath: indexPath]\
    \ age] intValue]];\n        }\n        else\n        {\n            filtered.entityDescription\
    \ = self.entityDescription;\n            filtered.predicate = [NSPredicate predicateWithFormat:@\"\
    family=%@\", [(Instrument *)[self.fetchedResultsController objectAtIndexPath:indexPath]family]];\n\
    \        }\n\n        [self.navigationController pushViewController:filtered animated:YES];\n\
    \    }\n}\n```\n\nAs you can see, you have used a couple of different styles of\
