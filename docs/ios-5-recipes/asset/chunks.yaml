  raw: '**Figure 5–25.** *A map with far too many annotations*


    In order to properly iterate through your annotations and group them, you will
    be going through each hotspot and determining how it should be placed. If it is
    close to another pin that has already been dropped, it will be considered “found,”
    and will be removed from the map. If not, you will add it to the list of those
    already in the map, and add it to the map itself as an annotation. The following
    method provides an efficient implementation, and should be placed in your view
    controller''s `.m` file.


    `-(void)group:(NSArray *)hotspots{`

    `    float latDelta=self.mapViewUserMap.region.span.latitudeDelta/scaleLat;`

    `    float longDelta=self.mapViewUserMap.region.span.longitudeDelta/scaleLong;`

    `    NSMutableArray *visibleHotspots=[[NSMutableArray alloc] initWithCapacity:0];`


    `    for (Hotspot *current in hotspots) {`

    `        CLLocationDegrees lat = current.coordinate.latitude;`

    `        CLLocationDegrees longi = current.coordinate.longitude;`


    `        bool found=FALSE;`

    `        for (Hotspot *tempHotspot in visibleHotspots) {`

    `            if(fabs(tempHotspot.coordinate.latitude-lat) < latDelta &&`

    `fabs(tempHotspot.coordinate.longitude-longi)<longDelta ){`

    `                [self.mapViewUserMap removeAnnotation:current];`

    `                found=TRUE;`

    `                break;`

    `            }`

    `        }`

    `        if (!found) {`

    `            [visibleHotspots addObject:current];`

    `            [self.mapViewUserMap addAnnotation:current];`

    `        }`

    `    }`

    `}`


    **NOTE:** In this method, you use the `fabs` function. This is different from
    the `abs` function in that it is specifically used for floats. Using the `abs`
    function here would result in grouping only at the integer level of coordinates,
    and your app would not work correctly.


    Next, you need to deal with your application re-grouping the points every time
    the visible section of the map is changed. This is fairly easy to do by implementing
    the following delegate method:


    `-(void)mapView:(MKMapView *)mapView regionDidChangeAnimated:(BOOL)animated{`

    `    if (zoom!=mapView.region.span.longitudeDelta) {`

    `        [self group:places];`

    `        zoom=mapView.region.span.longitudeDelta;`

    `    }`

    `}`


    **NOTE:** When implementing these methods, make sure that any methods that use
    the `-group:` method are implemented after it, otherwise the compiler will complain.
    Another way to solve this problem is to simply define `-(void)group(NSArray *)hotspots;`
    in your header file.


    This method will check to see if the user has zoomed in or out, and if so, re-group
    the annotations accordingly. Now you just need to make one change to your `-viewDidLoad`
    method. You can remove the following line, as its function will be performed by
    your `group:` method.


    `[self.mapViewUserMap addAnnotations:self.places];`


    You actually should not need to call `[self group:self.places];` at the end of
    your `viewDidLoad` method, because when the map is first displayed, your delegate
    method `-mapView: regionDidChangeAnimated:` will be called, and will do the initial
    grouping automatically.


    Upon running the app now, you should see your map populated with significantly
    fewer annotations, with a somewhat regular distance in between them, as in [Figure
    5–26](#Chapter05.html#fig_5_26). Upon zooming in or out, you can see annotations
    appear or disappear respectively as the map changes.


    ![Image](images/9781430240051_Fig05-26.jpg)


    **Figure 5–26.** *Grouped annotations by location*


    Now that you have successfully grouped your annotations, you may choose to animate
    your pins as they are added to drop down, so that your ungrouping transition looks
    smoother. This can be done with a simple “`startPin.animatesDrop = YES;`” in your
    `viewForAnnotation:` method, directly after the “`startPin.canShowCallout = YES;`”
    line.


    While your annotations are correctly grouping at this point, you have a new issue,
    in that you cannot easily tell whether a single annotation is standing on its
    own, or if it is encapsulating multiple hotspots. In order to correct this, you
    will add in functionality to allow hotspots to keep track of the number of other
    hotspots they represent.


    First, you will need to go to your `Hotspot` class, and add in an `NSMutableArray`
    property, “`places`”. You will also add a few method definitions that you will
    use shortly to help manage this array. The following lines need to be added to
    “`Hotspot.h`”.


    `@property (nonatomic, strong) NSMutableArray *places;`

    `-(void)addPlace:(Hotspot *)hotspot;`

    `-(int)placesCount;`


    Not only do you need to implement these methods, but you also need to change your
    `-initWithCoordinate:` method in order to ensure that your `places` array is correctly
    created. You will also have to implement your own version of your `title` property''s
    getter, so that the callout title will show the number of hotspots represented.
    Your implementation file now looks like so:


    `#import "Hotspot.h"`

    `@implementation Hotspot`

    `@synthesize coordinate, title, subtitle;`

    `@synthesize places;`

    `-(id)initWithCoordinate:(CLLocationCoordinate2D) c`

    `{`

    `    self=[super init];`

    `    if(self){`

    `        coordinate = c;`

    `        self.places = [[NSMutableArray alloc] initWithCapacity:0];`

    `    }`

    `    return self;`

    `}`

    `-(NSString *)title`

    `{`

    `    if ([self placesCount] == 1)`

    `    {`

    `        return title;`

    `    }`

    `    else`

    `        return [NSString stringWithFormat:@"%i Places", [self.places count]];`

    `}`

    `-(void)addPlace:(Hotspot *)hotspot`

    `{`

    `    [self.places addObject:hotspot];`

    `}`

    `-(int)placesCount{`

    `    return [self.places count];`

    `}`

    `-(void)cleanPlaces{`

    `    [self.places removeAllObjects];`

    `    [self.places addObject:self];`

    `}`

    `@end`


    The foregoing `-placesCount` method is not necessary; it just makes accessing
    the number of places represented by a single hotspot slightly easier. Your `-cleanPlaces`
    method will be used simply to reset the places array whenever you re-group your
    annotations. All you have to do now is make sure your `-group:` method correctly
    calls `-cleanPlaces` by adding the following two lines in their appropriate places,
    which you will see in the full method implementation that follows.


    `[hotspots makeObjectsPerformSelector:@selector(cleanPlaces)];`

    `[tempHotspot addPlace:current];`


    Your full `-group:` method should now look like so:


    `-(void)group:(NSArray *)hotspots{`

    `    float latDelta=self.mapViewUserMap.region.span.latitudeDelta/scaleLat;`

    `    float longDelta=self.mapViewUserMap.region.span.longitudeDelta/scaleLong;`

    `    //New lines:`

    `    [hotspots makeObjectsPerformSelector:@selector(cleanPlaces)];`

    `    //End of new lines.`

    `    NSMutableArray *visibleHotspots=[[NSMutableArray alloc] initWithCapacity:0];`


    `    for (Hotspot *current in hotspots) {`

    `        CLLocationDegrees lat = current.coordinate.latitude;`

    `        CLLocationDegrees longi = current.coordinate.longitude;`

    `        bool found=FALSE;`

    `        for (Hotspot *tempHotspot in visibleHotspots) {`

    `            if(fabs(tempHotspot.coordinate.latitude-lat) < latDelta &&`

    `fabs(tempHotspot.coordinate.longitude-longi)<longDelta ){`

    `                [self.mapViewUserMap removeAnnotation:current];`

    `                found=TRUE;`

    `                //New lines:`

    `                [tempHotspot addPlace:current];`

    `                //End of new lines.`

    `                break;`

    `            }`

    `        }`

    `        if (!found) {`

    `            [visibleHotspots addObject:current];`

    `            [self.mapViewUserMap addAnnotation:current];`

    `        }`

    `    }`

