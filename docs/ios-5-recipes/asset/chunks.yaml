    ### 将旧项目转换到 ARC


    终有一天，回首望去，我们甚至不会记得曾写过带有 `retain`、`release` 和 `autorelease` 调用的代码。但在那一天到来之前，我们仍需处理现有项目，并将其迁移到
    ARC 内存管理方法，以使它们保持最新，并充分利用性能提升。苹果强烈建议所有项目都迁移到 LLVM 3.0 和 ARC。他们提供了一种方法，可以将你的旧项目转换到使用
    ARC。


    打开你的旧项目，在进行任何更改之前，确保它能正确构建。


    **注意：** 这也正是将你的更改提交到 Git 仓库，并将更改推送到远程仓库以妥善保存的好时机。


    接下来，转到 `Edit` ![图片](img/U001.jpg) `Refactor` ![图片](img/U001.jpg) `Convert to Objective-C
    ARC`。![图片](img/U001.jpg) Xcode 会询问你要转换哪些目标。选择你的目标，然后点击 Precheck。图 1–26 显示了一个目标选择示例。


    **注意：** 请确保你设置为构建设备，而非模拟器。


    ![图片](img/9781430240051_Fig01-26.jpg)


    **图 1–26.** *选择要转换到 ARC 的目标*


    预检查将开始，并分析你的代码，以查看在开始转换之前需要对项目进行哪些更改。如果存在问题，将显示一条通知，如图 1–27 所示；你可以在导航窗格的构建结果下看到它们，图
