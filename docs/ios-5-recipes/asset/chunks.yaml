    If you are running the newest version of Xcode, make sure also that the box marked
    “Automatic Reference Counting” is checked, as in [Figure 14-2](#Chapter14.html#fig_14_2).


    ![Image](images/9781430240051_Fig14-02.jpg)


    **Figure 14-2.** *Configuring project settings*


