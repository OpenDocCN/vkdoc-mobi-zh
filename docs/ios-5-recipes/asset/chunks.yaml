    \n#import <UIKit/UIKit.h>\n\n@interface aboutUsViewController : UIViewController\n\
    \n-(IBAction)closeAboutUs:(id)sender;\n\n@end\n```\n\n然后在 `aboutUsViewController`\
    \ 的实现文件（`.m`）中实现该方法：\n\n```\n//  aboutUsViewController.m\n\n#import \"aboutUsViewController.h\"\
    \n\n@implementation aboutUsViewController\n\n-(IBAction)closeAboutUs:(id)sender{\n\
    \    [self dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\n打开 `AboutUs.storyboard`，在“关于我们”视图的\
    \ `UINavigationBar` 中添加一个标题为“返回”的 `UIBarButtonItem` 对象。然后通过按住 ^ 键并点击拖拽，从 `UIBarButtonItem`\
    \ 连接到视图控制器的状态栏，并在弹出的菜单中选中 `closeAboutUs` 事件，从而将此 `UIBarButtonItem` 连接到 `IBAction\
    \ closeAboutUs`。这些步骤在图 2–77 中进行了演示。\n\n![Image](img/9781430240051_Fig02-77.jpg)\n\
    \n**图 2–77.** *将栏按钮连接到跳转动作*\n\n现在，当你运行应用程序时，你将能够启动“关于我们”故事板，并返回到你的主应用。不要忘记，你应该将这个\
    \ `UIBarButtonItem` 和方法添加到主“关于我们”项目中，这样当你将其复制到未来的项目时，就不会遇到同样的问题了。\n\n### 总结\n\n\
    你在 Xcode 4 中首先会注意到的是，Interface Builder 不再是一个独立的应用程序。然而，这些变化远不止于此，它带来了一种真正集成的体验。Interface\
    \ Builder 将拖放式界面构建的便捷性扩展到了与 Assistant Editor 视图结合时的代码生成中。\n\n故事板工具将你的界面构建推向了更高层次，使你能够快速构建应用程序的工作原型。你的故事板图表在编码开始时不再被丢弃，而是成为应用程序开发过程中不可或缺的一部分，并且可以被控制器所利用。这一新特性将“模型-视图-控制器”从一种抽象的最佳实践转变为切实的应用程序开发流程。\n\
    \n## 第 3 章\n\n## 应用程序设计元素\n\n每个行业都有其特定的一套材料、工具和方法，而一个人对这些设备的掌握程度和理解深度几乎决定了他在该领域能否取得成功。在\
    \ iOS 开发中，你拥有大量可用于组装应用程序的组件和功能。对这些工具有充分且实用的理解，能够让任何开发者显著提升其参与工作的质量。\n\n在本章中，你将系统地了解\
    \ iOS 开发者最初可以使用的设计元素，讨论它们的目的、用途、实现方式、功能，以及如何从每个元素中获得最佳效果的一般指南。通过这种方式，你可以更好地理解如何充分利用这些工具，创建出更高质量的应用程序。\n\
    \n### Cocoa Touch 控件\n\nCocoa Touch 包含了一系列被称为“控件”的丰富元素，这些是应用程序用来与用户交互的主要对象。所有这些元素（其中一些是\
    \ iOS 5.0 全新引入的）让你能够构建一个更先进、更简单的用户界面来操作你的应用程序。\n"
- fmt: "### `UILabel`\n\n`UILabel`类可以说是最基本和基础的控制之一，你可以通过它向用户显示信息。许多其他元素都用到了`UILabel`，使其成为几乎所有用户界面的基础。[图3-1](#Chapter03.html#fig_3_1)是`UILabel`最简单的示例。\n\
    \n![Image](images/9781430240051_Fig03-01.jpg)\n\n**图3-1.** 一个简单的`UILabel`\n\n\
    处理`UILabel`的主要方法是通过`-setText:`方法或更简单的`text`属性来设置其文本。然而，该类还提供了许多其他属性供你自定义显示效果，包括：\n\
    \n*   `font`\n*   `textColor`\n*   `textAlignment`\n*   `enabled`：通过此属性可以轻松地使标签变暗或取消变暗，因为禁用的`UILabel`会以变暗效果显示。\n\
    \n若要对文本显示进行更精确的控制，你还可以使用`shadowColor`和`shadowOffset`属性创建投影。`shadowOffset`属性的类型是`CGSize`，你可以使用`CGSizeMake()`函数来创建。此函数接受两个参数，宽度和高度，用于指定阴影相对于标签的位置。例如，如果使用以下代码配置阴影，则生成的`UILabel`将类似于[图3-2](#Chapter03.html#fig_3_2]。\n\
    \n```\nmyLabel.shadowColor = [UIColor blackColor];\nmyLabel.shadowOffset = CGSizeMake(2.0,\
    \ 2.0);\n```\n\n![Image](images/9781430240051_Fig03-02.jpg)\n\n**图3-2.** 重阴影文本\n\
    \n将此与没有阴影的`UILabel`进行比较，如[图3-3](#Chapter03.html#fig_3_3)所示。\n\n![Image](images/9781430240051_Fig03-03.jpg)\n\
    \n**图3-3.** 没有阴影的标签\n\n如你所见，将`shadowOffset`的宽度指定为2.0，高度指定为2.0，标签的阴影将相对于原始文本向右偏移2点并向下偏移2点。可以想象，这些值为负数将导致阴影分别向左和向上移动。\n\
    \n利用`UILabel`的阴影通常有助于应用程序的图形设计，但通常很难确定理想的规格。一般来说，可以说“少即是多”，一个非常细微的改变，例如使用偏移量为(1.0,\
    \ 1.0)的灰色阴影，将有助于提升应用程序的视觉效果。[图3-4](#Chapter03.html#fig_3_4)展示了一个没有阴影的`UILabel`与一个具有灰色阴影且偏移量为(1.0,\
    \ 1.0)的`UILabel`的对比，以展示视觉效果上的差异。\n\n![Image](images/9781430240051_Fig03-04.jpg)\n\
    \n**图3-4.** 一个没有阴影的标签与一个具有一个平方点阴影的标签的比较\n\n`UILabel`还有属性`highlightedTextColor`（你可以指定）和`highlighted`（允许你专门高亮标签）。但是，除非使用`highlightedTextColor`属性指定了高亮颜色，否则不会应用任何高亮颜色。\n\
    \n与许多其他元素一样，`UILabel`有一个名为`userInteractionEnabled`的属性。必须将此属性设置为`YES`才能使任何手势（例如点击）对`UILabel`产生影响。\n\
    \n### `UIButton`\n\n作为双向用户交互的基石，`UIButton`允许你在应用程序中为用户提供明确的选择。\n\n有多种预定义的`UIButton`类型可供使用。你可以通过类方法`+buttonWithType:`设置按钮的类型，该方法接受以下可能的预定义值：\n\
    \n*   `UIButtonTypeCustom`\n*   `UIButtonTypeRoundedRect`\n*   `UIButtonTypeDetailDisclosure`\n\
    *   `UIButtonTypeInfoLight`\n*   `UIButtonTypeInfoDark`\n*   `UIButtonTypeContactAdd`\n\
    \n如果没有为该属性指定值，则默认为自定义类型，让你在自定义按钮视图方面拥有最大的自由度。\n\n一般而言，如果你只是想创建一个简单的带文本的按钮，可能会使用`UIButtonTypeRoundedRect`按钮；但如果需要一个更复杂的按钮（包括基于图像的按钮），则可能会使用`UIButtonTypeCustom`选项。这样，你可以更轻松地控制按钮的背景设置，确保视觉主题保持一致。\n\
    \n每当处理`UIButton`时，你必须始终考虑按钮可能处于的“状态”（即当前是否被选中）。因此，大多数`UIButton`方法都包含一个`UIControlState`参数。例如，要设置`UIButton`的文本，而不是访问`titleLabel`属性，你应该使用`-setTitle:forState:`方法。例如，你可以像这样配置一个`UIButton`：\n\
    \n```\nUIButton *button = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
    [button setTitle:@\"Test\" forState:UIControlStateNormal];\n[button setTitle:@\"\
    Selected\" forState:UIControlStateHighlighted];\n```\n\n请记住，当你以编程方式创建视图元素时，应设置其`frame`以指定位置，然后将其添加为相应视图的子视图。\n\
    \n```\n[button setFrame:CGRectMake(10, 10, 100, 44)];\n[self.view addSubview:button];\n\
    ```\n\n`UIButton`上的按钮标题本质上是一个`UILabel`，因此你可以使用`titleColorForState:`和`titleShadowColorForState:`等非常方法轻松自定义字体和阴影。\n\
    \n`UIButton`还允许在内部放置两种不同的图像：背景图像和前景图像。你可以使用`-setBackgroundImage:forState:`和`setImage:forState:`方法轻松设置这些图像。\n\
    \n为了以编程方式为`UIButton`添加操作，请使用`-addTarget:action:forControlEvents:`方法。\n\n```\n\
    [button addTarget:self action:@selector(buttonPressed:)\nforControlEvents:UIControlEventTouchUpInside];\n\
    ```\n\n然后，你可以定义`-buttonPressed:`方法来执行任何你喜欢的操作。如果以这种方式实现操作，对`UIButton`的引用将作为第一个参数传递给该方法。这使你能够通过检查“发送者”元素的属性并相应地采取相应操作，从而以单个方法响应大量不同事件。作为一个简单的例子，以下实现将在日志中显示被按下的按钮的文本。\n\
    \n```\n-(void)buttonPressed:(UIButton *)sender\n{\n    NSLog(@\"%@\", sender.titleLabel.text);\n\
    }\n```"
  raw: '#### UILabel


    The `UILabel` class is easily one of the most basic and fundamental controls with
    which you can interact with your user by displaying information. A variety of
    other elements make use of `UILabel`s, making them the foundation of nearly any
    user interface. [Figure 3–1](#Chapter03.html#fig_3_1) is the simplest example
    of a `UILabel`.


    ![Image](images/9781430240051_Fig03-01.jpg)


    **Figure 3–1.** *A simple `UILabel`*


    The primary way that you deal with a `UILabel` is simply by setting its text using
    either the `-setText:` method or, more simply, the `text` property. However, the
    class also has a variety of other properties you can set to customize your display
    even more, including the following:


    *   `font`

    *   `textColor`

    *   `textAlignment`

    *   `enabled`: You can easily dim or undim labels with this property, as a disabled
    `UILabel` is displayed dimmed out.


    For a more precise control of a text display, you can also create a drop shadow
    using the `shadowColor`and`shadowOffset`properties. The `shadowOffset` property
    takes a `CGSize` type, which you can create using the `CGSizeMake()` function.
    This function takes two parameters, a width and a height, which specify where
    your shadow is placed in reference to the label. For example, if you configure
    a shadow with the following code, then the resulting `UILabel` will resemble [Figure
    3–2](#Chapter03.html#fig_3_2).


    `myLabel.shadowColor = [UIColor blackColor];`

    `myLabel.shadowOffset = CGSizeMake(2.0, 2.0);` ![Image](images/9781430240051_Fig03-02.jpg)


    **Figure 3–2.** *Heavily shadowed text*


    Compare this to a `UILabel` with no shadow, as in [Figure 3–3](#Chapter03.html#fig_3_3).


    ![Image](images/9781430240051_Fig03-03.jpg)


    **Figure 3–3.** *A label with no shadow*


    As you can see, by specifying `shadowOffset` width of 2.0 and a height of 2.0,
    you made your label’s shadow appear shifted 2 points to the right and 2 points
    down from the original text. As you can guess, negative values for these will
    cause a shadow to move left and up respectively.


    It is often helpful to an application’s graphic design to make use of the `UILabel`’s
    shadow, but it is often difficult to determine the ideal specifications to use.
    In general, it is safe to say that less is more, and a very subtle change, such
    as a gray shadow with an offset of (1.0, 1.0), will help improve the visual quality
    of an application. [Figure 3–4](#Chapter03.html#fig_3_4) features one `UILabel`
    without a shadow compared to one with a gray shadow and an offset of (1.0, 1.0),
    in order to demonstrate the difference in visual appeal.


    ![Image](images/9781430240051_Fig03-04.jpg)


    **Figure 3–4.** *A label with no shadow compared with a one square point shadow*


    The `UILabel` also has properties `highlightedTextColor`, which you can specify,
    and `highlighted`, which allows you to specifically highlight a label. However,
    no highlighting color will be applied unless one is specified with the `highlightedTextColor`
    property.


    The `UILabel`, like many other elements you deal with, has a property called `userInteractionEnabled`.
    This property must be set to `YES` in order for any kind of gestures, such as
    a tap, to have any effect with a `UILabel`.


    #### UIButton


    As the cornerstone of two-way user interaction, the `UIButton` allows you to actively
    give your users clear options in their abilities within an application.


    There are a variety of pre-defined types of `UIButton`s that you can very easily
    use. You can set the type of a button by way of the class method `+buttonWithType:`,
    which takes the following possible pre-defined values.


    *   `UIButtonTypeCustom`

    *   `UIButtonTypeRoundedRect`

    *   `UIButtonTypeDetailDisclosure`

    *   `UIButtonTypeInfoLight`

    *   `UIButtonTypeInfoDark`

    *   `UIButtonTypeContactAdd`


    If no value is specified for the property, the Custom type is assumed, giving
    you the most freedom in customizing the view of your button.


    In general, you will probably use a `UIButtonTypeRoundedRect` button if you simply
    want to give a simple button with text, but if you have a more complex button,
    including one that is image-based, you will probably use the `UIButtonTypeCustom`
    option. This way, you can more easily control the background settings of the button
    to ensure your visual theme stays well maintained.


    Whenever you are dealing with a `UIButton`, you must always consider the possible
    “state” of the button, whether it is currently being selected. For this reason,
    most of the `UIButton` methods include a parameter for a `UIControlState`. For
    example, in order to set a `UIButton`’s text, rather than accessing the `titleLabel`
    property, you should use the `-setTitle:forState:` property. For example, you
    may configure a `UIButton` like so:


    `UIButton *button = [UIButton buttonWithType:UIButtonTypeRoundedRect];`

    `[button setTitle:@"Test" forState:UIControlStateNormal];`

    `[button setTitle:@"Selected" forState:UIControlStateHighlighted];`


    Remember that whenever you create a view element programmatically, you should
    set its frame to specify the location, and then add it as a subview of whichever
    view it belongs in.


    `[button setFrame:CGRectMake(10, 10, 100, 44)];`

    `[self.view addSubview:button];`


    The button title on a `UIButton` is simply a `UILabel`, so you can customize fonts
    and shadows quite easily with such methods as -`titleColorForState:` and `-titleShadowColorForState:`.


    A `UIButton` also allows quite easily for two different images to be placed inside
    of it: a background image and a foreground image. You can easily set these with
    the `-setBackgroundImage:forState:` and `setImage:forState:` methods.


    In order to programmatically add actions for a `UIButton` to perform, use the
    `-addTarget:action:forControlEvents:`method.


    `[button addTarget:self action:@selector(buttonPressed:)`

    `forControlEvents:UIControlEventTouchUpInside];`


    From here, you can define your `-buttonPressed:` method to do whatever you prefer.
    If you implement your action in this manner, a reference to the `UIButton` will
    be passed to the method as the first parameter. This allows you a great deal of
    power in reacting to a multitude of different events with a single method by simply
    checking the properties of the “sender” element and acting accordingly. As a simple
    example, the following implementation will display in the log the text of whichever
    button was pressed.


    `-(void)buttonPressed:(UIButton *)sender`

    `{`

    `NSLog(@"%@", sender.titleLabel.text);`

    `}`'
