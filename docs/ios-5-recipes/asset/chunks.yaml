    \n**注意：** 在使用`Core Image`框架时，大部分处理工作发生在使用`CIContext`从`CIImage`创建`UIImage`的过程。`CIImage`本身的创建是非常快速的操作。在你的应用中，你选择一次性创建所有滤镜图像，以便在各项显示之间快速导航。这就是为什么在选择图像时，你的模拟器可能需要几秒钟才能实际显示图像并刷新。如果你要构建此应用并发布，应该通过`UIActivityIndicatorView`或`UIProgressView`以某种方式向用户传达正在进行处理。"
