    \n你还需要为你的元素定义五个动作，分别是 `-playPressed:`、`-prevPressed:`、`-nextPressed:`、`-queuePressed:`\
    \ 和 `-volumeChanged:`。确保将每个元素连接到其对应的动作。\n\n你还需要在头文件中定义两个属性，一个类型为 `MPMusicPlayerController`，名为\
    \ `player`，用于播放音乐；另一个类型为 `MPMediaItemCollection`，名为 `myCollection`，用于帮助你追踪所选的要播放的曲目。最后，你将通过遵循\
    \ `MPMediaPickerControllerDelegate` 协议，使视图控制器成为名为 `MPMediaPickerController` 的类的委托，从而允许用户选择要播放的音乐。总体而言，你的头文件现在应该如下所示：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <MediaPlayer/MediaPlayer.h>\n\n@interface\
    \ MainViewController : UIViewController <MPMediaPickerControllerDelegate>\n\n\
    @property (strong, nonatomic) IBOutlet UIButton *queueButton;\n@property (strong,\
    \ nonatomic) IBOutlet UIButton *prevButton;\n@property (strong, nonatomic) IBOutlet\
    \ UIButton *playButton;\n@property (strong, nonatomic) IBOutlet UIButton *nextButton;\n\
    @property (strong, nonatomic) IBOutlet UISlider *sliderVolume;\n@property (strong,\
    \ nonatomic) IBOutlet UILabel *infoLabel;\n\n@property (strong, nonatomic) MPMediaItemCollection\
    \ *myCollection;\n@property (strong, nonatomic) MPMusicPlayerController *player;\n\
    \n-(IBAction)queuePressed:(id)sender;\n-(IBAction)prevPressed:(id)sender;\n-(IBAction)playPressed:(id)sender;\n\
    -(IBAction)nextPressed:(id)sender;\n\n-(IBAction)volumeChanged:(id)sender;\n@end\n\
    ```\n\n确保同时合成 `player` 和 `myCollection`，并像往常一样在 `-viewDidUnload` 中妥善处理它们。\n\n\
    现在，你可以设置你的 `-viewDidLoad` 方法。\n\n```\n-(void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \n    self.infoLabel.text = @\"...\";\n\n    self.player = [MPMusicPlayerController\
    \ applicationMusicPlayer];\n\n    [self setNotifications];\n\n    [self.player\
    \ beginGeneratingPlaybackNotifications];\n\n    [self.player setShuffleMode:MPMusicShuffleModeOff];\n\
    \    self.player.repeatMode = MPMusicRepeatModeNone;\n\n    self.sliderVolume.value\
    \ = self.player.volume;\n}\n```\n\n`MPMusicPlayerController` 类有两个重要的类方法，可以让你访问该类的实例。你之前使用的\
    \ `+applicationMusicPlayer` 返回一个特定于应用程序的音乐播放器。这个选项对于将你的音乐与设备的实际 iPod 分开管理很有用，但缺点是应用程序进入后台后无法播放。或者，你可以使用\
    \ `+iPodMusicPlayer`，它允许即使在后台也能持续播放。然而，在这种情况下要记住的主要一点是，你的 `player` 可能已经有一个来自实际\
    \ iPod 的 `nowPlayingItem`，你应该能够处理它。\n"
- fmt: "Whenever you use an instance of `MPMusicPlayerController`, it is recommended\
    \ to register for notifications for whenever the playback state changes, or whenever\
    \ the currently playing song changes. You will do this in your `setNotifications`\
    \ method, like so:\n\n```\n-(void)setNotifications\n{\n    NSNotificationCenter\
    \ *notificationCenter = [NSNotificationCenter defaultCenter];\n    [notificationCenter\n\
    \     addObserver: self\n     selector:    @selector (handle_NowPlayingItemChanged:)\n\
    \     name:        MPMusicPlayerControllerNowPlayingItemDidChangeNotification\n\
    \     object:      self.player];\n\n    [notificationCenter\n     addObserver:\
    \ self\n     selector:    @selector (handle_PlaybackStateChanged:)\n     name:\
    \        MPMusicPlayerControllerPlaybackStateDidChangeNotification\n     object:\
    \      self.player];\n\n    [notificationCenter addObserver:self\n           \
    \                selector:@selector(volumeChangedHardware:)\nname:@\"AVSystemController_SystemVolumeDidChangeNotification\"\
    \n                             object:nil];\n}\n```\n\nYou have also included\
    \ a third notification registration in order to make sure you know any time the\
    \ user adjusts the device volume using the device's side buttons. This way, your\
    \ application can be used just like a regular music player.\n\nEach of these notifications\
    \ performs a selector, which are defined as follows.\n\n```\n-(void)volumeChangedHardware:(id)sender\n\
    {\n    [self.sliderVolume setValue:self.player.volume animated:YES];\n}\n- (void)\
    \ handle_PlaybackStateChanged: (id) notification\n{\n    MPMusicPlaybackState\
    \ playbackState = [self.player playbackState];\n\n    if (playbackState == MPMusicPlaybackStateStopped)\n\
    \    {\n        [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n\
    \        self.infoLabel.text = @\"...\";\n        [self.player stop];\n    }\n\
    \    else if (playbackState == MPMusicPlaybackStatePaused)\n    {\n        [self.playButton\
    \ setTitle:@\"Play\" forState:UIControlStateNormal];\n    }\n    else if (playbackState\
    \ == MPMusicPlaybackStatePlaying)\n    {\n        [self.playButton setTitle:@\"\
    Pause\" forState:UIControlStateNormal];\n    }\n}\n- (void) handle_NowPlayingItemChanged:\
    \ (id) notification\n{\n    MPMediaItem *currentItemPlaying = [self.player nowPlayingItem];\n\
    \    if (currentItemPlaying)\n    {\n        NSString *info = [NSString stringWithFormat:@\"\
    %@ - %@\", [currentItemPlaying valueForProperty:MPMediaItemPropertyTitle], [currentItemPlaying\
    \ valueForProperty:MPMediaItemPropertyArtist]];\n        self.infoLabel.text =\
    \ info;\n    }\n    else\n    {\n        self.infoLabel.text = @\"...\";\n   \
    \ }\n    if (self.player.playbackState == MPMusicPlaybackStatePlaying)\n    {\n\
    \        [self.playButton setTitle:@\"Pause\" forState:UIControlStateNormal];\n\
    \    }\n}\n```\n\nAs you can see, when the device's volume is changed, you will\
    \ simply animate your slider to adjust to the new value. When the playback state\
    \ of the device is changed, you are simply adjusting your view based on the new\
    \ state. Whenever the currently playing song is changed, you are updating your\
    \ user interface to display basic information about whichever media item is now\
    \ playing.\n\nNext, you will define two of your `MPMediaPickerController`'s delegate\
    \ methods to handle both cancellation and successful selection of media.\n\n```\n\
    -(void)mediaPickerDidCancel:(MPMediaPickerController *)mediaPicker\n{\n    [self\
    \ dismissModalViewControllerAnimated:YES];\n}\n-(void)mediaPicker:(MPMediaPickerController\
    \ *)mediaPicker didPickMediaItems:(MPMediaItemCollection *)mediaItemCollection\n\
    {\n    [self updateQueueWithMediaItemCollection:mediaItemCollection];\n    [self\
    \ dismissModalViewControllerAnimated:YES];\n}\n```\n\nAn `MPMediaItemCollection`\
    \ is a group of media items that were selected, which you can then queue up in\
    \ your `MPMusicPlayerController` and iterate through. You will update your `player`'s\
    \ queue by defining the `updateQueueWithMediaItemCollection:` method.\n\n```\n\
    -(void)updateQueueWithMediaItemCollection:(MPMediaItemCollection *)collection\n\
    {\n    if (collection)\n    {\n        if (self.myCollection == nil)\n       \
    \ {\n            self.myCollection = collection;\n            [self.player setQueueWithItemCollection:\
    \ self.myCollection];\n            [self.player play];\n        }\n        else\n\
    \        {\n            BOOL wasPlaying = NO;\n            if (self.player.playbackState\
    \ == MPMusicPlaybackStatePlaying) {\n                wasPlaying = YES;\n     \
    \       }\n\n            MPMediaItem *nowPlayingItem        = self.player.nowPlayingItem;\n\
    \            NSTimeInterval currentPlaybackTime = self.player.currentPlaybackTime;\n\
    \n            NSMutableArray *combinedMediaItems =\n            [[self.myCollection\
    \ items] mutableCopy];\n            NSArray *newMediaItems = [collection items];\n\
    \            [combinedMediaItems addObjectsFromArray: newMediaItems];\n\n    \
    \        [self setMyCollection:\n             [MPMediaItemCollection collectionWithItems:\n\
    \              (NSArray *) combinedMediaItems]];\n\n            [self.player setQueueWithItemCollection:self.myCollection];\n\
    \n            self.player.nowPlayingItem      = nowPlayingItem;\n            self.player.currentPlaybackTime\
    \ = currentPlaybackTime;\n\n            if (wasPlaying)\n            {\n     \
    \           [self.player play];\n            }\n        }\n    }\n}\n```\n\nThis\
    \ method may seem complex, but it is actually a fairly linear progression. First,\
    \ after checking to make sure that the collection is not `nil`, you check to see\
    \ if there is any previous queue set up. If not, you simply set your `player`'s\
    \ queue to this collection. If so, you combine the two collections, set your `player`'s\
    \ queue as the result, and then restore your playback to where it previously was.\n\
    \n**TIP:** If the queue is updated while an `MPMusicPlayerController` is currently\
    \ playing, you will probably notice a small break in your playback as the queue\
    \ is updated. This can be worked around by using a `BOOL` flag to update the queue\
    \ only between songs.\n\nYou can fairly simply define all of your methods that\
    \ are performed by your buttons and slider to perform their respective commands.\n\
    \n```\n-(void)queuePressed:(id)sender\n{\n    MPMediaPickerController *picker\
    \ = [[MPMediaPickerController alloc] initWithMediaTypes:MPMediaTypeMusic];\n \
    \   picker.delegate = self;\n    picker.allowsPickingMultipleItems = YES;\n  \
    \  picker.prompt =\n    NSLocalizedString (@\"Add songs to play\",\n         \
    \              \"Prompt in media item picker\");\n    [self presentModalViewController:picker\
    \ animated:YES];\n}\n-(void)prevPressed:(id)sender\n{\nif ([self.player currentPlaybackTime]\
    \ > 5.0)\n    {\n        [self.player skipToBeginning];   \n    }\n    else\n\
    \    {\n        [self.player skipToPreviousItem];\n    }\n}\n-(void)volumeChanged:(id)sender\n\
    {\n    if (self.player.volume != self.sliderVolume.value)\n    {\n        self.player.volume\
    \ = self.sliderVolume.value;\n    }\n}\n-(void)playPressed:(id)sender\n{\n   \
    \ if ((myCollection != nil) && (self.player.playbackState != MPMusicPlaybackStatePlaying))\n\
    \    {\n        [self.player play];\n        [self.playButton setTitle:@\"Pause\"\
    \ forState:UIControlStateNormal];\n    }\n    else if (self.player.playbackState\
    \ == MPMusicPlaybackStatePlaying)\n    {\n        [self.player pause];\n     \
    \   [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n    }\n\
    }\n-(void)nextPressed:(id)sender\n{\n        [self.player skipToNextItem];\n}\n\
    ```\n\nAs you can see, you have given users a five-second window in which to use\
    \ the Previous button to skip to the previous song, before they must first skip\
    \ back to the beginning of the current song."
