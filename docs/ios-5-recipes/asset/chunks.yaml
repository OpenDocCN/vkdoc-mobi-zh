    After you have reviewed the changes, you can click Accept, and Xcode will make
    the necessary changes. Build your project, and make sure it builds correctly after
    the changes have been made.


    You can verify that your project is using the LLVM 3.0 compiler by checking your
    target compiler settings, as shown in [Figure 1–30](#Chapter01.html#fig_1_30).


    ![Image](images/9781430240051_Fig01-30.jpg)


    **Figure 1–30.** *Verifying the LLVM 3.0 compiler*


    To verify that you are using ARC in your project, navigate to your target Build
    Settings and go to the “Apple LLVM compiler 3.0 – Language” section. You should
    now see the Objective-C Automatic Reference Counting setting is equal to Yes.
    [Figure 1–31](#Chapter01.html#fig_1_31) demonstrates this verification.


    ![Image](images/9781430240051_Fig01-31.jpg)


    **Figure 1–31.** *Verifying ARC*


    #### Quick Tips


    Xcode has a variety of intricacies built into it that can greatly improve your
    development experience. Listed in this section are a few shortcuts meant to expedite
    common tasks and make building applications a simpler process.


    ##### Comments


    To quickly comment out a block of code, select the code with your mouse and then
    press ![Image](images/U003.jpg)/ on the keyboard; each line will be commented
    out. Need to turn the comment off? Just repeat the procedure and the lines will
    be uncommented.


    ##### Autocomplete


    Xcode 4 improved greatly upon the previous autocompletion functionality that works
    as you type. This is a big help to let you know what methods are available and
    to increase your coding efficiency. If the autocomplete isn''t showing up or you
    want to know what is available for an object, hit the Esc key to bring up a list
    of available methods.


    ##### Quick Indent/Unindent


    Xcode 4 does a pretty good job of managing your indents, but if you ever find
    yourself needing some custom indentation or to manage your own indenting, use
    ![Image](images/U003.jpg)[ to unindent and ![Image](images/U003.jpg)] to indent
    manually. This works great for blocks of code as well; just select the block with
    your mouse and use the keyboard shortcuts.


    ##### Quickly Switch Between Header and Implementation Files


    You have just added a new property or object to your class header file, and now
    you want to switch to the implementation file to start writing the code for that
    object. Pressing ^![Image](images/U003.jpg)+Up/Down will switch you between the
    two files. [Figure 1–32](#Chapter01.html#fig_1_32) displays a common use of the
    Assistant Editor.


    Xcode 4 also offers a new split pane view that will show related files, called
    the Assistant view. To enable this view, you can click the Assistant view icon
    at the top of the screen, or press ⌥![Image](images/U003.jpg)+,(option+command+comma)
    to load the Assistant view.


    **NOTE:** The keyboard shortcut works best if you are looking at the implementation
    file; execute the command, and it will automatically load the header file in the
    right pane.


    ![Image](images/9781430240051_Fig01-32.jpg)


    **Figure 1–32.** *Selecting the Assistant Editor*


    ##### Class Documentation


    Can''t remember all the properties or methods of a class? You can get a reminder
    with a ![Image](images/U004.jpg)-click of an object type, and a pop-up will be
    displayed with a description of the object, as shown in [Figure 1–33](#Chapter01.html#fig_1_33).
    From this pop-up, you can also view the object''s documentation or the header
    file.


    ![Image](images/9781430240051_Fig01-33.jpg)


    **Figure 1–33.** *Accessing class documentation*


    A similar shortcut is to ![Image](images/U003.jpg)-click any object or class to
    jump to its definition.


    ##### Open File in Assistant Editor


    You can ![Image](images/U004.jpg)-click any file in the navigator pane to open
    it in the Assistant Editor. You can also ![Image](images/U002.jpg)![Image](images/U004.jpg)-click
    any file, and a diagram, such as that shown in [Figure 1–34](#Chapter01.html#fig_1_34),
    resembling the Xcode interface will pop up. Select a region in the diagram to
    open the file in the corresponding pane in Xcode.


    ![Image](images/9781430240051_Fig01-34.jpg)


    **Figure 1–34.** *Configuring the Assistant Editor*'
