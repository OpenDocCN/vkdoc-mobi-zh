    This is the start of a multiplayer game and shows the sending of player information,
    moves, and other data back and forth. If you have trouble with any of the foregoing
    code, you can find the completed project at [https://github.com/shawngrimes/HangmanMP-Complete](https://github.com/shawngrimes/HangmanMP-Complete).


    ### Summary


    In this chapter, you''ve learned how to extend your game with Game Center and
    Game Kit. You should be able to include high scores in your games to encourage
    competition among players and establish bragging rights. You should also be able
    to implement achievements that can give your players a feeling of accomplishment
    during long levels or even easily provide mini-games within a game. Finally, you
    implemented basic multiplayer functionality into the game to encourage even more
    social game play against live opponents.


    Developing iOS applications is a multifarious process: a combination of visual
    design and programmatic functionality that requires a versatile skillset, as well
    as significant dedication. Thankfully, Apple provides an excellent development
    toolset and programming language to work with, both of which are constantly updated
    and improved upon. With such a flexible language, tasks ranging from organizing
    massive data stores, to complex web requests, to image filtering can be simplified,
    designed, and implemented for some of the most widely used and powerful devices
    of our generation. Whether you use this book as a simple reference or a full guide,
    we hope that you are able to use these recipes to build stronger applications
    to help improve and contribute to the world of iOS technology.


