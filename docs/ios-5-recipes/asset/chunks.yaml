    \n    [view addSubview:flashButton];\n    [view addSubview:changeCameraButton];\n\
    \    [view addSubview:takePictureButton];\n\n    return view;\n}\n```\n\n在这里，您定义了\
    \ `UIView` 以及要放入其中的按钮，为它们分配了要执行的操作，并将它们添加到了视图中。您将每个按钮的标题设置为初始值或功能描述。您还设置了 `cornerRadius`，以便按钮具有圆角。这里最重要的细节之一是，您将按钮设置为半透明，因为它们将放置在相机显示屏上方。您不希望遮挡任何画面，因此它们至少需要部分透明。\n\
    \n现在，您只需实现两个切换方法：`-toggleCamera:` 和 `-toggleFlash:`。您需要在类中添加一些额外的实例变量来正确处理它们，包括两个用于跟踪设置的\
    \ `BOOL` 变量，以及一个指向 `UIImagePickerController` 的指针，用于传递相机界面。您的视图控制器头文件现在应如下所示：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <MobileCoreServices/MobileCoreServices.h>\n\
    #import <QuartzCore/QuartzCore.h> //需要这个！\n\n@interface CaptureViewController\
    \ : UIViewController <UIImagePickerControllerDelegate, UINavigationControllerDelegate>\n\
    {\n    UIImageView *imageViewRecent;\n    UIButton *cameraButton;\n    UIImagePickerController\
    \ *currentPicker;\n    BOOL flashOn;\n    BOOL frontCameraUsed;\n}\n\n@property\
    \ (strong, nonatomic) IBOutlet UIImageView *imageViewRecent;\n@property (strong,\
    \ nonatomic) IBOutlet UIButton *cameraButton;\n\n-(IBAction)cameraButtonPressed:(id)sender;\n\
    @end\n```\n\n接下来，在 `-cameraButtonPressed:` 方法中创建 `imagePicker` 之后，添加以下代码行。\n\n\
    ```\ncurrentPicker = imagePicker;\n```\n\n另外，在相机的 `-imagePickerController:didFinishPickingMediaWithInfo:`\
    \ 委托方法中添加以下代码行，以“释放” `currentPicker` 的值。这可以放在方法的最后，即在视图控制器被关闭之后。\n\n```\ncurrentPicker\
    \ = nil;\n```\n\n现在，您可以成功定义 `-toggleFlash:` 和 `-toggleCamera:` 方法，如下所示：\n\n```\n\
