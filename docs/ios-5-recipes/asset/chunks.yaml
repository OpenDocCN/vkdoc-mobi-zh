- fmt: "### Recipe 10–1: Using `NSUserDefaults`\n\nWhen developing applications, we\
    \ very often run into issues where we simply need to store simple values, such\
    \ as strings, numbers, or Boolean values. While there are a variety of ways to\
    \ store data, the easiest of these is `NSUserDefaults`, built specifically for\
    \ such combinations.\n\nThe `NSUserDefaults` class is a simple implementation\
    \ used to store basic values, such as instances of `NSString`, `NSNumber`, BOOL,\
    \ etc. It can also be used to store more complex data structures, such as `NSArray`\
    \ or `NSDictionary`, as long as they do not contain massive amounts of data. Any\
    \ kind of image should not be stored with `NSUserDefaults`. In this way, it is\
    \ excellent for storing any kind of preference or option for an application.\n\
    \nStart off by creating a new project called “Stubborn” (since you want your information\
    \ to stick around).\n\nSelect the Single View Application template to create a\
    \ simple application for you to configure. After entering your name and ensuring\
    \ the device is set to the iPhone family, as in [Figure 10–1](#Chapter10.html#fig_10_1),\
    \ click through to finish creating your project.\n\n![Image](images/9781430240051_Fig10-01.jpg)\n\
    \n**Figure 10–1.** *Configuring your Stubborn project*\n\nNow, in your newly created\
    \ view controller’s XIB file, you will start off by setting up your basic user\
    \ interface. Drag and drop three `UILabel`s, two `UITextField`s, a `UISwitch`,\
    \ and a `UIActivityIndicatorView` so as to create the view shown in [Figure 10–2](#Chapter10.html#fig_10_2).\n\
    \n![Image](images/9781430240051_Fig10-02.jpg)\n\n**Figure 10–2.** *Your view controller’s\
    \ XIB for storing values*\n\nAs you can probably guess, you will simply be using\
    \ text fields to set the text of your labels, and using the switch to control\
    \ whether the activity indicator view is animating.\n\nNext, connect each of these\
    \ elements in your XIB file to a property in your view controller’s header file\
    \ by holding ^ (Ctrl), and click-dragging from each element into your header file.\
    \ This will automatically create your property, synthesize it, and add a statement\
    \ to nullify it in the application’s `-viewDidUnload` method. The following header\
    \ file excerpt shows the property names you will use to manage each element.\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@interface MainViewController : UIViewController\n\
    \n@property (strong, nonatomic) IBOutlet UILabel *firstLabel;\n@property (strong,\
    \ nonatomic) IBOutlet UILabel *secondLabel;\n@property (strong, nonatomic) IBOutlet\
    \ UILabel *animateLabel;\n@property (strong, nonatomic) IBOutlet UITextField *firstNameTextField;\n\
    @property (strong, nonatomic) IBOutlet UITextField *lastNameTextField;\n@property\
    \ (strong, nonatomic) IBOutlet UISwitch *animateSwitch;\n@property (strong, nonatomic)\
    \ IBOutlet UIActivityIndicatorView *activityIndicator;\n\n@end\n```\n\nUp next,\
    \ you need to conform your view controller to the `UITextFieldDelegate` protocol\
    \ in order to gain more control over the actions of each `UITextField`. The header\
    \ line of your view controller’s header file (the second line in the preceding\
    \ code) will now look like so:\n\n```\n@interface MainViewController : UIViewController<UITextFieldDelegate>\n\
    ```\n\nNext, update your `-viewDidLoad` method in your view controller’s interface\
    \ file to set both text field delegates.\n\n```\n- (void)viewDidLoad\n{\n    [super\
    \ viewDidLoad];\nself.firstNameTextField.delegate = self;\nself.lastNameTextField.delegate\
    \ = self;\n}\n```\n\nNow you can write a method to access the `NSUserDefaults`\
    \ class and save the desired values of your view.\n\n```\n(void)updateDefaults\n\
    {\n//Acquire Values\nNSString *first = self.firstNameTextField.text;\nNSString\
    \ *last = self.lastNameTextField.text;\nBOOL animating = self.activityIndicator.isAnimating;\n\
    \n//Acquire Shared Instance\nNSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];\n\
    \n//Set Objects/Values to Persist\n    [userDefaults setObject:first forKey:@\"\
    firstName\"];\n    [userDefaults setObject:last forKey:@\"lastName\"];\n    [userDefaults\
    \ setBool:animating forKey:@\"animating\"];\n\n//Save Changes\n    [userDefaults\
    \ synchronize];\n}\n```\n\nAs shown in this method, it is always important to\
    \ remember to call the `-synchronize` method when you have finished making changes\
    \ to the `NSUserDefaults` object in order to save your data.\n\nAlong with the\
    \ `+standardUserDefaults` method, which retrieves a shared instance of the `NSUserDefaults`\
    \ class, this class also has a class method, `+resetStandardUserDefaults`, used\
    \ to completely wipe all saved stored values for an application.\n\nYou can implement\
    \ your `UITextFieldDelegate` protocol methods to now handle the entering of data\
    \ to automatically save newly entered text.\n\n```\n-(BOOL)textFieldShouldReturn:(UITextField\
    \ *)textField\n{\n    [textField resignFirstResponder];\nreturn NO;\n}\n\n-(void)textFieldDidEndEditing:(UITextField\
    \ *)textField\n{\nif (textField == self.firstNameTextField)\n    {\nself.firstLabel.text\
    \ = textField.text;\n    }\nelse if (textField == self.lastNameTextField)\n  \
    \  {\nself.secondLabel.text = textField.text;\n    }\n    [self updateDefaults];\n\
    }\n```\n\nFor your `UISwitch`, you will also create a method to handle the changing\
    \ of its value.\n\n```\n-(void)switchValueChanged:(UISwitch *)sender\n{\nif (sender.on)\n\
    \    {\n        [self.activityIndicator startAnimating];\nself.animateLabel.text\
    \ = @\"Animating\";\n    }\nelse\n    {\n        [self.activityIndicator stopAnimating];\n\
    self.animateLabel.text = @\"Stopped\";\n    }\n    [self updateDefaults];\n}\n\
    ```\n\nIn order to assign this method to be called by your `UISwitch`, you need\
    \ to modify your `-viewDidLoad` again.\n\n```\n- (void)viewDidLoad\n{\n    [super\
    \ viewDidLoad];\nself.firstNameTextField.delegate = self;\nself.lastNameTextField.delegate\
    \ = self;\n\n    [self.animateSwitch addTarget:self action:@selector(switchValueChanged:)\n\
    forControlEvents:UIControlEventValueChanged];\n}\n```\n\nAt this point, your application\
    \ should be able to easily save your values entered, but you still need to include\
    \ functionality to reload these values in case your application is closed. You\
    \ will create a single method to access the `NSUserDefaults` class again, check\
    \ for any stored values, and display them as appropriate.\n\n```\n-(void)setValuesFromDefaults\n\
    {\n//Acquire Shared Instance\nNSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];\n\
    \n//Acquire Values\nNSString *first = [userDefaults objectForKey:@\"firstName\"\
    ];\nNSString *last = [userDefaults objectForKey:@\"lastName\"];\nBOOL animating\
    \ = [userDefaults boolForKey:@\"animating\"];\n\n//Display Values Appropriately\n\
    if (first != nil)\n    {\nself.firstNameTextField.text = first;\nself.firstLabel.text\
    \ = first;\n    }\nif (last != nil)\n    {\nself.lastNameTextField.text = last;\n\
    self.secondLabel.text = last;\n    }\nif (animating)\n    {\nself.animateLabel.text\
    \ = @\"Animating\";\nif (self.activityIndicator.isAnimating == NO)\n        {\n\
    \            [self.activityIndicator startAnimating];\n        }\n    }\nelse\n\
    \    {\nself.animateLabel.text = @\"Stopped\";\nif (self.activityIndicator.isAnimating\
    \ == YES)\n        {\n            [self.activityIndicator stopAnimating];\n  \
    \      }\n    }\n    [self.animateSwitch setOn:animating animated:NO];\n}\n```\n\
    \nFinally, you just need to adjust your `-viewDidLoad` method again in order to\
    \ load any saved preferences upon the running of the application.\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\nself.firstNameTextField.delegate = self;\nself.lastNameTextField.delegate\
    \ = self;\n\n    [self.animateSwitch addTarget:self action:@selector(switchValueChanged:)\n\
    forControlEvents:UIControlEventValueChanged];\n\n    [self setValuesFromDefaults];\n\
    }\n```"
  raw: '### Recipe 10–1: Using NSUserDefaults


    When developing applications, we very often run into issues where we simply need
    to store simple values, such as strings, numbers, or Boolean values. While there
    are a variety of ways to store data, the easiest of these is `NSUserDefaults`,
    built specifically for such combinations.


    The `NSUserDefaults` class is a simple implementation used to store basic values,
    such as instances of `NSString`, `NSNumber`, BOOL, etc. It can also be used to
    store more complex data structures, such as `NSArray` or `NSDictionary`, as long
    as they do not contain massive amounts of data. Any kind of image should not be
    stored with `NSUserDefaults`. In this way, it is excellent for storing any kind
    of preference or option for an application.


    Start off by creating a new project called “Stubborn” (since you want your information
    to stick around).


    Select the Single View Application template to create a simple application for
    you to configure. After entering your name and ensuring the device is set to the
    iPhone family, as in [Figure 10–1](#Chapter10.html#fig_10_1), click through to
    finish creating your project.


    ![Image](images/9781430240051_Fig10-01.jpg)


    **Figure 10–1.** *Configuring your Stubborn project*


    Now, in your newly created view controller’s XIB file, you will start off by setting
    up your basic user interface. Drag and drop three `UILabel`s, two `UITextField`s,
    a `UISwitch`, and a `UIActivityIndicatorView` so as to create the view shown in
    [Figure 10–2](#Chapter10.html#fig_10_2).


    ![Image](images/9781430240051_Fig10-02.jpg)


    **Figure 10–2.** *Your view controller’s XIB for storing values*


    As you can probably guess, you will simply be using text fields to set the text
    of your labels, and using the switch to control whether the activity indicator
    view is animating.


    Next, connect each of these elements in your XIB file to a property in your view
    controller’s header file by holding ^ (Ctrl), and click-dragging from each element
    into your header file. This will automatically create your property, synthesize
    it, and add a statement to nullify it in the application’s `-viewDidUnload` method.
    The following header file excerpt shows the property names you will use to manage
    each element.


    `#import <UIKit/UIKit.h>`


    `@interface MainViewController : UIViewController`


    `@property (strong, nonatomic) IBOutlet UILabel *firstLabel;`

    `@property (strong, nonatomic) IBOutlet UILabel *secondLabel;`

    `@property (strong, nonatomic) IBOutlet UILabel *animateLabel;`

    `@property (strong, nonatomic) IBOutlet UITextField *firstNameTextField;`

    `@property (strong, nonatomic) IBOutlet UITextField *lastNameTextField;`

    `@property (strong, nonatomic) IBOutlet UISwitch *animateSwitch;`

    `@property (strong, nonatomic) IBOutlet UIActivityIndicatorView *activityIndicator;`


    `@end`


    Up next, you need to conform your view controller to the `UITextFieldDelegate`
    protocol in order to gain more control over the actions of each `UITextField`.
    The header line of your view controller’s header file (the second line in the
    preceding code) will now look like so:


    `@interface MainViewController : UIViewController<UITextFieldDelegate>`


    Next, update your `-viewDidLoad` method in your view controller’s interface file
    to set both text field delegates.


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `self.firstNameTextField.delegate = self;`

    `self.lastNameTextField.delegate = self;`

    `}`


    Now you can write a method to access the `NSUserDefaults` class and save the desired
    values of your view.


    `(void)updateDefaults`

    `{`

    `//Acquire Values`

    `NSString *first = self.firstNameTextField.text;`

    `NSString *last = self.lastNameTextField.text;`

    `BOOL animating = self.activityIndicator.isAnimating;`


    `//Acquire Shared Instance`

    `NSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];`


    `//Set Objects/Values to Persist`

    `    [userDefaults setObject:first forKey:@"firstName"];`

    `    [userDefaults setObject:last forKey:@"lastName"];`

    `    [userDefaults setBool:animating forKey:@"animating"];`


    `//Save Changes`

    `    [userDefaults synchronize];`

    `}`


    As shown in this method, it is always important to remember to call the `-synchronize`
    method when you have finished making changes to the `NSUserDefaults` object in
    order to save your data.


    Along with the `+standardUserDefaults` method, which retrieves a shared instance
    of the `NSUserDefaults` class, this class also has a class method, `+resetStandardUserDefaults`,
    used to completely wipe all saved stored values for an application.


    You can implement your `UITextFieldDelegate` protocol methods to now handle the
    entering of data to automatically save newly entered text.


    `-(BOOL)textFieldShouldReturn:(UITextField *)textField`

    `{`

    `    [textField resignFirstResponder];`

    `return NO;`

    `}`


    `-(void)textFieldDidEndEditing:(UITextField *)textField`

    `{`

    `if (textField == self.firstNameTextField)`

    `    {`

    `self.firstLabel.text = textField.text;`

    `    }`

    `else if (textField == self.lastNameTextField)`

    `    {`

    `self.secondLabel.text = textField.text;`

    `    }`

    `    [self updateDefaults];`

    `}`


    For your `UISwitch`, you will also create a method to handle the changing of its
    value.


    `-(void)switchValueChanged:(UISwitch *)sender`

    `{`

    `if (sender.on)`

    `    {`

    `        [self.activityIndicator startAnimating];`

    `self.animateLabel.text = @"Animating";`

    `    }`

    `else`

    `    {`

    `        [self.activityIndicator stopAnimating];`

    `self.animateLabel.text = @"Stopped";`

    `    }`

    `    [self updateDefaults];`

    `}`


    In order to assign this method to be called by your `UISwitch`, you need to modify
    your `-viewDidLoad` again.


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `self.firstNameTextField.delegate = self;`

    `self.lastNameTextField.delegate = self;`


    `    [self.animateSwitch addTarget:self action:@selector(switchValueChanged:)`

    `forControlEvents:UIControlEventValueChanged];`

    `}`


    At this point, your application should be able to easily save your values entered,
    but you still need to include functionality to reload these values in case your
    application is closed. You will create a single method to access the `NSUserDefaults`
    class again, check for any stored values, and display them as appropriate.


    `-(void)setValuesFromDefaults`

    `{`

    `//Acquire Shared Instance`

    `NSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];`


    `//Acquire Values`

    `NSString *first = [userDefaults objectForKey:@"firstName"];`

    `NSString *last = [userDefaults objectForKey:@"lastName"];`

    `BOOL animating = [userDefaults boolForKey:@"animating"];`


    `//Display Values Appropriately`

    `if (first != nil)`

    `    {`

    `self.firstNameTextField.text = first;`

    `self.firstLabel.text = first;`

    `    }`

    `if (last != nil)`

    `    {`

    `self.lastNameTextField.text = last;`

    `self.secondLabel.text = last;`

    `    }`

    `if (animating)`

    `    {`

    `self.animateLabel.text = @"Animating";`

    `if (self.activityIndicator.isAnimating == NO)`

    `        {`

    `            [self.activityIndicator startAnimating];`

    `        }`

    `    }`

    `else`

    `    {`

    `self.animateLabel.text = @"Stopped";`

    `if (self.activityIndicator.isAnimating == YES)`

    `        {`

    `            [self.activityIndicator stopAnimating];`

    `        }`

    `    }`

    `    [self.animateSwitch setOn:animating animated:NO];`

    `}`


    Finally, you just need to adjust your `-viewDidLoad` method again in order to
    load any saved preferences upon the running of the application.


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `self.firstNameTextField.delegate = self;`

    `self.lastNameTextField.delegate = self;`


    `    [self.animateSwitch addTarget:self action:@selector(switchValueChanged:)`

    `forControlEvents:UIControlEventValueChanged];`


    `    [self setValuesFromDefaults];`

    `}`'
  trans: "\n### 配方 10-1：使用 `NSUserDefaults`\n\n开发应用时，我们经常会遇到需要存储简单值（如字符串、数字或布尔值）的场景。虽然存储数据的方式有很多种，但最简单的方式就是使用专为此类需求而设计的\
    \ `NSUserDefaults`。\n\n`NSUserDefaults` 类是一个简单的实现，用于存储 `NSString`、`NSNumber`、BOOL\
    \ 等实例这类基础值。它也可以用来存储更复杂的数据结构，比如 `NSArray` 或 `NSDictionary`，只要它们不包含大量数据即可。任何类型的图片都不应使用\
    \ `NSUserDefaults` 来存储。因此，它非常适合存储应用中的各种偏好设置或选项。\n\n首先，创建一个名为“Stubborn”（因为你希望你的信息能够持久保留）的新项目。\n\
    \n选择单视图应用模板来创建一个简单的应用供你配置。输入你的名称并确保设备设置为 iPhone 系列后，就像图 10-1 所示那样，点击下一步直到完成项目创建。\n\
    \n![Image](img/9781430240051_Fig10-01.jpg)\n\n**图 10-1.** *配置你的 Stubborn 项目*\n\
    \n现在，在你新创建的视图控制器的 XIB 文件中，你将开始设置基本的用户界面。拖放三个 `UILabel`、两个 `UITextField`、一个 `UISwitch`\
    \ 和一个 `UIActivityIndicatorView`，以创建如图 10-2 所示的视图。\n\n![Image](img/9781430240051_Fig10-02.jpg)\n\
    \n**图 10-2.** *用于存储值的视图控制器 XIB*\n\n你大概能猜到，我们将简单地使用文本字段来设置标签的文本，并使用开关来控制活动指示器视图是否在动画。\n\
    \n接下来，按住 ^ (Ctrl) 键并从 XIB 文件中的每个元素拖拽到视图控制器的头文件中，连接每个元素到对应的属性。这将自动创建属性，合成它，并在应用的\
    \ `-viewDidUnload` 方法中添加一条将其置空的语句。下面的头文件摘录展示了你将用于管理每个元素的属性名称。\n\n```\n#import\
    \ <UIKit/UIKit.h>\n\n@interface MainViewController : UIViewController\n\n@property\
    \ (strong, nonatomic) IBOutlet UILabel *firstLabel;\n@property (strong, nonatomic)\
    \ IBOutlet UILabel *secondLabel;\n@property (strong, nonatomic) IBOutlet UILabel\
    \ *animateLabel;\n@property (strong, nonatomic) IBOutlet UITextField *firstNameTextField;\n\
    @property (strong, nonatomic) IBOutlet UITextField *lastNameTextField;\n@property\
    \ (strong, nonatomic) IBOutlet UISwitch *animateSwitch;\n@property (strong, nonatomic)\
    \ IBOutlet UIActivityIndicatorView *activityIndicator;\n\n@end\n```\n\n接下来，你需要让你的视图控制器遵循\
    \ `UITextFieldDelegate` 协议，以便更好地控制每个 `UITextField` 的操作。你视图控制器头文件中的头行（前述代码中的第二行）现在看起来像这样：\n\
    \n```\n@interface MainViewController : UIViewController<UITextFieldDelegate>\n\
    ```\n\n然后，更新视图控制器接口文件中的 `-viewDidLoad` 方法，以设置两个文本字段的委托。\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\nself.firstNameTextField.delegate = self;\nself.lastNameTextField.delegate\
    \ = self;\n}\n```\n\n现在，你可以编写一个方法来访问 `NSUserDefaults` 类并保存视图所需的数值。\n\n```\n(void)updateDefaults\n\
    {\n// 获取值\nNSString *first = self.firstNameTextField.text;\nNSString *last = self.lastNameTextField.text;\n\
    BOOL animating = self.activityIndicator.isAnimating;\n\n// 获取共享实例\nNSUserDefaults\
    \ *userDefaults = [NSUserDefaults standardUserDefaults];\n\n// 设置需要持久化的对象/值\n\
    \    [userDefaults setObject:first forKey:@\"firstName\"];\n    [userDefaults\
    \ setObject:last forKey:@\"lastName\"];\n    [userDefaults setBool:animating forKey:@\"\
    animating\"];\n\n// 保存更改\n    [userDefaults synchronize];\n}\n```\n\n如该方法所示，在对\
    \ `NSUserDefaults` 对象完成更改后，务必记得调用 `-synchronize` 方法以保存数据。\n\n除了用于获取 `NSUserDefaults`\
    \ 类共享实例的 `+standardUserDefaults` 方法外，该类还有一个类方法 `+resetStandardUserDefaults`，用于完全清除应用的所有已保存存储值。\n\
    \n现在，你可以实现你的 `UITextFieldDelegate` 协议方法来处理数据的输入，以自动保存新输入的文本。\n\n```\n-(BOOL)textFieldShouldReturn:(UITextField\
    \ *)textField\n{\n    [textField resignFirstResponder];\nreturn NO;\n}\n\n-(void)textFieldDidEndEditing:(UITextField\
    \ *)textField\n{\nif (textField == self.firstNameTextField)\n    {\nself.firstLabel.text\
    \ = textField.text;\n    }\nelse if (textField == self.lastNameTextField)\n  \
    \  {\nself.secondLabel.text = textField.text;\n    }\n    [self updateDefaults];\n\
    }\n```\n\n对于你的 `UISwitch`，你还需要创建一个方法来处理其值的变化。\n\n```\n-(void)switchValueChanged:(UISwitch\
    \ *)sender\n{\nif (sender.on)\n    {\n        [self.activityIndicator startAnimating];\n\
    self.animateLabel.text = @\"Animating\";\n    }\nelse\n    {\n        [self.activityIndicator\
    \ stopAnimating];\nself.animateLabel.text = @\"Stopped\";\n    }\n    [self updateDefaults];\n\
    }\n```\n\n为了将此方法分配给 `UISwitch` 调用，你需要再次修改 `-viewDidLoad`。\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\nself.firstNameTextField.delegate = self;\nself.lastNameTextField.delegate\
    \ = self;\n\n    [self.animateSwitch addTarget:self action:@selector(switchValueChanged:)\n\
    forControlEvents:UIControlEventValueChanged];\n}\n```\n\n至此，你的应用应该能够轻松保存你输入的值，但你还需要包含在应用关闭时重新加载这些值的功能。你将创建一个单独的方法，再次访问\
    \ `NSUserDefaults` 类，检查是否有任何存储的值，并相应地显示它们。\n\n```\n-(void)setValuesFromDefaults\n\
    {\n// 获取共享实例\nNSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];\n\
    \n// 获取值\nNSString *first = [userDefaults objectForKey:@\"firstName\"];\nNSString\
    \ *last = [userDefaults objectForKey:@\"lastName\"];\nBOOL animating = [userDefaults\
    \ boolForKey:@\"animating\"];\n\n// 相应地显示值\nif (first != nil)\n    {\nself.firstNameTextField.text\
    \ = first;\nself.firstLabel.text = first;\n    }\nif (last != nil)\n    {\nself.lastNameTextField.text\
    \ = last;\nself.secondLabel.text = last;\n    }\nif (animating)\n    {\nself.animateLabel.text\
    \ = @\"Animating\";\nif (self.activityIndicator.isAnimating == NO)\n        {\n\
    \            [self.activityIndicator startAnimating];\n        }\n    }\nelse\n\
    \    {\nself.animateLabel.text = @\"Stopped\";\nif (self.activityIndicator.isAnimating\
    \ == YES)\n        {\n            [self.activityIndicator stopAnimating];\n  \
    \      }\n    }\n    [self.animateSwitch setOn:animating animated:NO];\n}\n```\n\
    \n最后，你只需要再次调整 `-viewDidLoad` 方法，以便在应用运行时加载已保存的偏好设置。\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\nself.firstNameTextField.delegate = self;\nself.lastNameTextField.delegate\
    \ = self;\n\n    [self.animateSwitch addTarget:self action:@selector(switchValueChanged:)\n\
    forControlEvents:UIControlEventValueChanged];\n\n    [self setValuesFromDefaults];\n\
    }\n```\n"
- fmt: '此时，你的应用已经能够成功保存数据了！如果你在 iOS 模拟器或设备上运行应用，修改数据后关闭并重新打开，数据应该会保持原样。请注意，在较新设备上完全关闭应用的方法是：双击主屏幕按钮，按住出现的应用图标，然后点击目标应用上的“-”标记。另外需注意，如果通过
    Xcode 运行项目，通过此方式关闭应用可能会导致崩溃，此时应使用 Xcode 中的“停止”按钮来关闭应用。虽然无法直观看到，但[图 10-3](#Chapter10.html#fig_10_3)
    展示了一个多次关闭并重新打开后数据仍然保留的应用示例！


    ![Image](images/9781430240051_Fig10-03.jpg)


    **图 10-3.** 应用持久化数据


    > **注意：** 尽管在本简短示例中你并未使用多种类型的值通过 `NSUserDefaults` 存储数据，但实际上存在多种方法可以存储几乎所有类型的轻量数据，包括
    `Bool`、`Float`、`Integer`、`Double` 和 `URL`。对于更复杂的对象（如 `NSString`、`NSArray` 或 `NSDictionary`），需要使用通用的
    `-setObject:forKey:` 方法。


    ### 方案 10-2：管理文件


    虽然 `NSUserDefaults` 类对于快速持久化轻量数据特别有用，但在处理视频、音乐或图像等大型对象时效率并不高。对于这些更复杂的项目，你可以利用
    iOS 的文件管理系统。


    你将创建一个新应用，用于显示“热点”（Hotspots）表格，并能够编辑、添加内容，同时持久化所有数据。虽然这些对象本身较轻量，理论上可以存储在 `NSUserDefaults`
    中，但出于演示目的，你将使用文件管理系统。


    首先，你将构建应用的用户界面，暂不考虑数据持久化。使用“单视图应用”模板创建一个新项目，步骤与上一个方案完全相同。


    首先，创建 `Hotspot` 类。新建文件，确保在对话框中选择“Objective-C class”模板，如[图 10-4](#Chapter10.html#fig_10_4)
    所示。


    ![Image](images/9781430240051_Fig10-04.jpg)


    **图 10-4.** 创建 `NSObject` 子类


    在下一个界面中，将文件名设为“Hotspot”，并确保“Subclass of”字段设置为“NSObject”。点击完成创建文件。


    在 `Hotspot` 类的头文件 `Hotspot.h` 中，定义一系列 `NSString` 属性来表示该对象的数据。


    ```objc

    #import <Foundation/Foundation.h>


    @interface Hotspot : NSObject


    @property (nonatomic, strong) NSString *name;

    @property (nonatomic, strong) NSString *address;

    @property (nonatomic, strong) NSString *city;

    @property (nonatomic, strong) NSString *state;


    @end

    ```


    在实现文件 `Hotspot.m` 中，为这四个属性添加一条 `@synthesize` 指令。


    ```objc

    @synthesize name, city, state, address;

    ```


    接下来，你将创建另一个视图控制器，用于管理用户创建和编辑 `Hotspot` 对象。新建文件，选择“UIViewController subclass”模板。将类名设为“HotspotInfoViewController”，并确保“Subclass
    of”字段设置为 `UIViewController`，如[图 10-5](#Chapter10.html#fig_10_5) 所示。同时确保勾选“With
    XIB for user interface”复选框。


    ![Image](images/9781430240051_Fig10-05.jpg)


    **图 10-5.** 配置新的视图控制器


    在新创建的控制器的 XIB 文件 `HotspotInfoViewController.xib` 中，按照[图 10-6](#Chapter10.html#fig_10_6)
    所示构建用户界面。


    ![Image](images/9781430240051_Fig10-06.jpg)


    **图 10-6.** 配置 `HotspotInfoViewController.xib` 文件


    将每个 `UITextField` 元素连接到视图控制器的头文件，分别使用属性标识符 `textFieldName`、`textFieldAddress`、`textFieldCity`
    和 `textFieldState`。你无需为 `UIButton` 定义属性，但需要将其连接到一个 `IBAction` 方法 `-saveButtonPressed:`。这些修改应在头文件中添加以下属性和方法声明。


    ```objc

    @property (strong, nonatomic) IBOutlet UITextField *textFieldName;

    @property (strong, nonatomic) IBOutlet UITextField *textFieldAddress;

    @property (strong, nonatomic) IBOutlet UITextField *textFieldCity;

    @property (strong, nonatomic) IBOutlet UITextField *textFieldState;

    - (IBAction)saveButtonPressed:(id)sender;

    ```


    此类需要一个 `Hotspot` 属性来引用当前正在查看的 `Hotspot` 对象。添加 `Hotspot` 类的导入语句。


    ```objc

    #import "Hotspot.h"

    ```


    声明 `Hotspot` 属性。


    ```objc

    @property (strong, nonatomic) IBOutlet Hotspot *hotspot;

    ```


    你还将创建一个 `delegate` 属性，用于处理此类使用完成后的回调。通过在头文件的 `@interface` 部分上方添加以下代码，定义协议 `HotspotInfoDelegate`。'
  raw: 'At this point, your application can successfully save your values! If you
    run your application on the iOS simulator or on your device, change the values,
    and then close and reopen it, your values should have been set as they were. Remember
    that to fully close an application on newer devices you must double-tap the home
    button, press and hold on the app icons that appear, and then press the “-” mark
    on the desired app. Keep in mind also to be careful closing an application in
    this way if running the project through Xcode, as your application may crash.
    In this case, you should use the Stop button in Xcode to close your app instead.
    Though you cannot quite tell, [Figure 10–3](#Chapter10.html#fig_10_3) shows an
    application that has been closed and reopened multiple times with the values persisting!


    ![Image](images/9781430240051_Fig10-03.jpg)


    **Figure 10–3.** *Your application persisting information*


    **NOTE:** Though you did not use a great variety of values to store with `NSUserDefaults`
    in this short recipe, there are in fact methods to store almost any type of lightweight
    value, including Bool, Float, Integer, Double, and URL. For any kind of more complex
    object, such as an `NSString`, `NSArray`, or `NSDictionary`, you use the general
    `-setObject:forKey:` method.


    ### Recipe 10–2: Managing Files


    While the `NSUserDefaults` class is especially useful for doing quick persistence
    of light data, it is not nearly as efficient for dealing with large objects, such
    as videos, music, or images. For these more complex items, you can make use of
    iOS’s file management system.


    You will create a new application to display a table of “Hotspots,” which you
    will be able to edit and add to, while persisting all of your data. While these
    objects will be fairly lightweight, and thus able to be stored in `NSUserDefaults`,
    you will make use of the file management system for demonstration purposes.


    To start off, you will build your application''s user interface without worrying
    about data persistence. Create a new project using the Single View Application
    template, following the exact same process as the previous recipe.


    First, you will go through and create your `Hotspot` class. Create a new file,
    making sure to select the “Objective-C class” template using the dialog shown
    in [Figure 10–4](#Chapter10.html#fig_10_4).


    ![Image](images/9781430240051_Fig10-04.jpg)


    **Figure 10–4.** *Creating an `NSObject` subclass*


    On the next screen, enter your file''s name as “Hotspot”, and make sure the subclass
    field is set to “NSObject”. Click through to create your file.


    In your Hotspot class''s header file, `Hotspot.h`, define a series of `NSString`
    properties to represent the data for this object.


    `#import <Foundation/Foundation.h>`


    `@interface Hotspot : NSObject`


    `@property (nonatomic, strong) NSString *name;`

    `@property (nonatomic, strong) NSString *address;`

    `@property (nonatomic, strong) NSString *city;`

    `@property (nonatomic, strong) NSString *state;`


    `@end`


    In the implementation file `Hotspot.m`, add a single synthesize command for these
    four properties.


    `@synthesize name, city, state, address;`


    Next, you will create another view controller to manage the creation and editing
    of any Hotspot objects by the user. Create a new file, and select the “UIViewController
    subclass” template. Provide the class name “HotspotInfoViewController”, and make
    sure the subclass field is set to “UIViewController”, as in [Figure 10–5](#Chapter10.html#fig_10_5).
    Make sure also that the box marked “With XIB for user interface” is also checked.


    ![Image](images/9781430240051_Fig10-05.jpg)


    **Figure 10–5.** *Configuring your new view controller*


    In the newly created controller.''s XIB file, `HotspotInfoViewController.xib`,
    create your user interface to mirror that shown in [Figure 10–6](#Chapter10.html#fig_10_6).


    ![Image](images/9781430240051_Fig10-06.jpg)


    **Figure 10–6.** *Configuring the `HotspotInfoViewController.xib` file*


    Connect each `UITextField` element to your view controller''s header file using
    the respective property identifiers `textFieldName`, `textFieldAddress`, `textFieldCity`,
    and `textFieldState`. You will not need to define a property for your `UIButton`,
    but connect it to an `IBAction` `-saveButtonPressed:`. These changes should add
    the following property and method declarations to your header file.


    `@property (strong, nonatomic) IBOutlet UITextField *textFieldName;`

    `@property (strong, nonatomic) IBOutlet UITextField *textFieldAddress;`

    `@property (strong, nonatomic) IBOutlet UITextField *textFieldCity;`

    `@property (strong, nonatomic) IBOutlet UITextField *textFieldState;`

    `- (IBAction)saveButtonPressed:(id)sender;`


    This class will need a Hotspot property to reference the Hotspot currently being
    viewed. Add an import statement for the `Hotspot` class.


    `#import "Hotspot.h"`


    Declare the Hotspot property.


    `@property (strong, nonatomic) IBOutlet Hotspot *hotspot;`


    You will also create a `delegate` property to handle the completion of this class''s
    use. Define the protocol “HotspotInfoDelegate” by adding the following code above
    the main “interface” section of the header file.'
