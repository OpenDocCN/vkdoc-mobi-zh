    \n通过在设备上配置一个 Twitter 账号，你将能够全面测试所创建的所有功能。\n\n接下来，你将开始在 Xcode 中创建一个名为“Tweeter”的新项目。选择“SingleView\
    \ Application”模板，然后点击创建项目。如果你运行的是最新版本的 Xcode，请确保勾选标记为“自动引用计数”的复选框，如图 14-2 所示。\n\
    \n![图片](img/9781430240051_Fig14-02.jpg)\n\n**图 14-2.** *配置项目设置*\n\n对于本章中的所有配方，你需要将\
    \ Twitter 框架包含到项目中。\n\n选择你的项目后，导航到“Build Phases”选项卡，在标记为“Link Binary With Libraries”的部分中，点击\
    \ + 按钮。找到名为 `Twitter.framework` 的项目，并将其添加进去，如图 14-3 所示。\n\n![图片](img/9781430240051_Fig14-03.jpg)\n\
    \n**图 14-3.** *添加 Twitter 框架*\n\n稍后你还需要 Accounts 框架，因此重复此过程，添加名为 `Accounts.framework`\
    \ 的项目。\n\n将导入语句添加到视图控制器的头文件中，以便编译器允许你使用添加的框架。\n\n```\n#import <Twitter/Twitter.h>\n\
    #import <Accounts/Accounts.h>\n```\n\n接下来，你将设置初始用户界面。向视图中添加一个 `UIButton`，并使用属性名\
    \ `simpleTweetButton` 将其连接到控制器。将其连接到一个名为 `-simpleTweetPressed:` 的 `IBAction` 方法，如图\
    \ 14-4 所示。\n\n![图片](img/9781430240051_Fig14-04.jpg)\n\n**图 14-4.** *设置简单的用户界面*\n\
    \n让我们创建一个便捷方法，用于检查应用程序在任意时刻是否可以发送推文。如果不行，你将禁用并使 `UIButton` 变暗。\n\n```\n-(BOOL)checkCanTweet\n\
    {\n    if ([TWTweetComposeViewController canSendTweet])\n    {\n        self.simpleTweetButton.enabled\
    \ = YES;\n        self.simpleTweetButton.alpha = 1.0;\n        return YES;\n \
    \   }\n    else\n    {\n        self.simpleTweetButton.enabled = NO;\n       \
    \ self.simpleTweetButton.alpha = 0.6;\n        return NO;\n    }\n}\n```\n\n这个方法使用了\
    \ `TWTweetComposeViewController` 的 `+canSendTweet` 类方法。你很快将使用这个类来创建简单的推文。\n\n\
    为了确保视图控制器能正确重新检查功能，你会在 `-viewDidLoad` 和 `-viewWillAppear:animated:` 两个方法中调用此函数。\n\
    \n```\n[self checkCanTweet];\n```\n\n你的应用程序所在的设备随时可能配置一个 Twitter 账号，因此你也可以注册通知，以便在账号信息发生变化时接收通知。将以下行添加到你的\
    \ `-viewDidLoad` 方法中。\n\n```\n[[NSNotificationCenter defaultCenter] addObserver:self\
    \ selector:@selector(checkCanTweet)\n        name:ACAccountStoreDidChangeNotification\
    \ object:nil];\n```\n\n现在，你将实现 `-simpleTweetPressed:` 方法来配置并发送一条简单的推文。\n\n```\n\
    -(void)simpleTweetPressed:(id)sender\n{\n    if ([self checkCanTweet])\n    {\n\
    \        TWTweetComposeViewController *tweet = [[TWTweetComposeViewController\
    \ alloc] init];\n        [tweet setInitialText:@\"Posting a simple Tweet from\
    \ my app!\"];\n        [tweet setCompletionHandler:^(TWTweetComposeViewControllerResult\
    \ result)\n        {\n            if (result == TWTweetComposeViewControllerResultDone)\n\
    \            {\n                NSLog(@\"Tweet Successfully Sent\");\n       \
    \     }\n            else\n            {\n                NSLog(@\"Tweet Cancelled\"\
    );\n            }\n            [self dismissModalViewControllerAnimated:YES];\n\
    \        }];\n        [self presentModalViewController:tweet animated:YES];\n\
    \    }\n}\n```\n\n如上所示，你可以为推文创建初始文本，并设置一个完成处理程序，在 `TWTweetComposeViewController`\
    \ 被取消或完成后调用。\n\n除了初始文本之外，你还可以使用 `-addImage:` 和 `addURL:` 方法向推文附加图片和链接。图 14-5 展示了你的当前配置，并附加了一个链接。\n\
    \n![图片](img/9781430240051_Fig14-05.jpg)\n\n**图 14-5.** *你的视图展示了一个 `TWTweetComposeViewController`*\n\
    \n用于向推文添加内容的三个方法 `-setInitialText:`、`-addImage:` 和 `-addURL:` 都返回 BOOL 值，指示内容是否成功添加。如果内容不适合推文，或者控制器已经展示，这些值将为\
    \ `NO`。\n\n为了确保用户始终对从此控制器发送的推文内容拥有最终决定权，开发者不允许在控制器展示后设置或添加任何内容。\n\n如果你希望在展示前从控制器中移除内容，可以使用\
    \ `-removeAllImages` 和 `-removeAllURLs` 方法。\n\n### 配方 14–2：创建简单的 TWRequest\n\n\
    除了 `TWTweetComposeViewController` 之外，Twitter 框架中唯一的另一个类是 `TWRequest` 类。这个类非常通用，并利用\
    \ Twitter 的特定 API 来发送和请求信息。通过使用它，你可以模仿 `TWTweetComposeViewController` 的基本功能，并执行几乎所有你想在应用程序中集成的、与\
    \ Twitter 服务相关的命令。\n\n重要的是要记住，Twitter API 的变化与 iOS API 不同，因此本节中任何特定于 Twitter 的代码可能需要更新到最新版本。\n"
- fmt: "### Sending Tweets via `TWRequest`\n\nYou will add another `UIButton` to your\
    \ view in order to implement a more complex functionality, with label \"Post Tweet\"\
    , property name `postTweetButton`, and action handler `-postTweetPressed:`. Place\
    \ it underneath the first button, as in [Figure 14-6](#Chapter14.html#fig_14_6).\n\
    \n![Image](images/9781430240051_Fig14-06.jpg)\n\n**Figure 14-6.** *Adding another\
    \ button to your interface*\n\nYou will implement your `-postTweetPressed:`. This\
    \ method will contain the following steps:\n\n1. Access the device's account store,\
    \ which has access to any accounts registered with the device.\n2. Create an instance\
    \ of `ACAccountType` to specify in your request for all stored Twitter accounts.\n\
    3. Request access to all accounts of the specified type. The `-requestAccessToAccountsWithType:withCompletionHandler:`\
    \ method will prompt the user as to whether the application has permission to\
    \ access the accounts. If permission has already been acquired by the application\
    \ previously, the user will not be prompted.\n4. Access an array of `ACAccount`\
    \ objects from the account store referencing all registered Twitter accounts on\
    \ the device.\n5. Access a specific account to post with.\n6. Initialize an instance\
    \ of `TWRequest`. This class is given instructions as to the specific request\
    \ being formed.\n7. Set your chosen `ACAccount` to the `TWRequest`.\n8. Perform\
    \ your request and utilize your completion handler to analyze the results.\n\n\
    ```\n-(IBAction)postTweetPressed:(id)sender\n{\n    ACAccountStore *accountStore\
    \ = [[ACAccountStore alloc] init];\n\n    ACAccountType *accountType = [accountStore\n\
    \        accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];\n\
    \n    [accountStore requestAccessToAccountsWithType:accountType\n        withCompletionHandler:^(BOOL\
    \ granted, NSError *error)\n    {\n        if (granted)\n        {\n         \
    \   NSArray *accountsArray = [accountStore accountsWithAccountType:accountType];\n\
    \n            if ([accountsArray count] >0)\n            {\n                ACAccount\
    \ *twitterAccount = [accountsArray objectAtIndex:0];\n\n                TWRequest\
    \ *postRequest = [[TWRequest alloc] initWithURL:[NSURLURL\n                  \
    \  WithString:@\"http://api.twitter.com/1/statuses/update.json\"]\n          \
    \          parameters:[NSDictionary\n                    dictionaryWithObject:@\"\
    Posted with a TWRequest!\" forKey:@\"status\"]\n                    requestMethod:TWRequestMethodPOST];\n\
    \n                [postRequest setAccount:twitterAccount];\n\n               \
    \ [postRequest performRequestWithHandler:^(NSData *responseData,\n           \
    \         NSHTTPURLResponse *urlResponse, NSError *error)\n                {\n\
    \                    if ([urlResponse statusCode] == 200)\n                  \
    \  {\n                        NSLog(@\"Tweet Posted\");\n                    }\n\
    \                    else\n                    {\n                        NSLog(@\"\
    Error Posting Tweet\");\n                    }\n                }];\n        \
    \    }\n        }\n    }];\n}\n```\n\nThe key component to this method is, of\
    \ course, the initialization of the `TWRequest`. Here you have made careful use\
    \ of the Twitter API in order to configure your tweet post with three properties:\n\
    \n* **URL**: The string used to make your URL, `http://api.twitter.com/1/statuses/update.json`,\
    \ is specially used to inform the Twitter service that you are initiating a status\
    \ update.\n* **Parameters**: You specify an instance of `NSDictionary` with a\
    \ single key \"status\", to which you assign an `NSString` with the actual text\
    \ of your tweet.\n* **Request method**: This parameter specifies the type of request\
    \ that you are making. Since you are posting a tweet, you use the `TWRequestMethodPOST`\
    \ value.\n\nThe interesting thing about posting tweets using this method is that\
    \ your user does not actually get a preview of the tweet before it is sent. In\
    \ fact, the only indication the user receives in this case is the request for\
    \ access to the Twitter account. It is important to keep the user's best interests\
    \ in mind when sending such posts, so as not to post unwanted updates.\n\n**NOTE:**\
    \ As shown in the preceding method, you can evaluate the results of a `TWRequest`\
    \ by checking the `statusCode` of the `urlResponse`. If this value is 200, the\
    \ request was successfully completed. Otherwise, there was some sort of error.\
    \ Refer to the Twitter API at `https://dev.twitter.com/docs/error-codes-responses`\
    \ for specific details on all the various error codes.\n\nUpon testing this app,\
    \ you will be able to, after requiring permission, send tweets from your device's\
    \ registered account without using the `TWTweetComposeViewController`."
  raw: '### Sending Tweets via TWRequest


    You will add another `UIButton` to your view in order to implement a more complex
    functionality, with label “Post Tweet”, property name `postTweetButton`, and action
    handler `-postTweetPressed:`. Place it underneath the first button, as in [Figure
    14-6](#Chapter14.html#fig_14_6).


    ![Image](images/9781430240051_Fig14-06.jpg)


    **Figure 14-6.** *Adding another button to your interface*


    You will implement your `-postTweetPressed:`.This method will contain the following
    steps:


    1.  Access the device''s account store, which has access to any accounts registered
    with the device.

    2.  Create an instance of `ACAccountType` to specify in your request for all stored
    Twitter accounts.

    3.  Request access to all accounts of the specified type. The `-requestAccessToAccountsWithType:withCompletionHandler:`
    method will prompt the user as to whether the application has permission to access
    the accounts. If permission has already been acquired by the application previously,
    the user will not be prompted.

    4.  Access an array of `ACAccount` objects from the account store referencing
    all registered Twitter accounts on the device.

    5.  Access a specific account to post with.

    6.  Initialize an instance of `TWRequest`. This class is given instructions as
    to the specific request being formed.

    7.  Set your chosen `ACAccount` to the `TWRequest`.

    8.  Perform your request and utilize your completion handler to analyze the results.


    `-(IBAction)postTweetPressed:(id)sender`

    `{`

    `ACAccountStore *accountStore = [[ACAccountStore alloc] init];`


    `ACAccountType *accountType = [accountStore`

    `accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];`


    `    [accountStore requestAccessToAccountsWithType:accountType`

    `withCompletionHandler:^(BOOL granted, NSError *error)`

    `    {`

    `if (granted)`

    `        {`

    `NSArray *accountsArray = [accountStore accountsWithAccountType:accountType];`


    `if ([accountsArray count] >0)`

    `            {`

    `ACAccount *twitterAccount = [accountsArray objectAtIndex:0];`


    `TWRequest *postRequest = [[TWRequest alloc] initWithURL:[NSURLURL`

    `WithString:@"http://api.twitter.com/1/statuses/update.json"] parameters:[NSDictionary`

    `dictionaryWithObject:@"Posted with a TWRequest!"forKey:@"status"]`

    `requestMethod:TWRequestMethodPOST];`


    `                [postRequest setAccount:twitterAccount];`


    `                [postRequest performRequestWithHandler:^(NSData *responseData,
    NSHTTPURLResponse *urlResponse, NSError *error)`

    `                {`

    `if ([urlResponse statusCode] == 200)`

    `                    {`

    `NSLog(@"Tweet Posted");`

    `                    }`

    `else`

    `                    {`

    `NSLog(@"Error Posting Tweet");`

    `                    }`

    `                }];`

    `            }`

    `        }`

    `    }];`

    `}`


    The key component to this method is, of course, the initialization of the `TWRequest`.
    Here you have made careful use of the Twitter API in order to configure your tweet
    post with three properties:


    *   *URL*: The string used to make your URL, `http://api.twitter.com/1/statuses/update.json`,
    is specially used to inform the Twitter service that you are initiating a status
    update.

    *   *Parameters*:Youspecify an instance of `NSDictionary` with a single key “status”,
    to which you assign an `NSString` with the actual text of your tweet.

    *   *Request method*: This parameter specifies the type of request that you are
    making. Since you are posting a tweet, you use the `TWRequestMethodPOST` value.


    The interesting thing about posting tweets using this method is that your user
    does not actually get a preview of the tweet before it is sent. In fact, the only
    indication the user receives in this case is the request for access to the Twitter
    account. It is important to keep the user''s best interests in mind when sending
    such posts, so as not to post unwanted updates.


    **NOTE:** As shown in the preceding method, you can evaluate the results of a
    `TWRequest` by checking the `statusCode` of the `urlResponse`. If this value is
    200, the request was successfully completed. Otherwise, there was some sort of
    error. Refer to the Twitter API at `https://dev.twitter.com/docs/error-codes-responses`
    for specific details on all the various error codes.


    Upon testing this app, you will be able to, after requiring permission, send tweets
    from your device''s registered account without using the `TWTweetComposeViewController`.'
  trans: "\n### 通过 `TWRequest` 发送推文\n\n你需要在视图中添加另一个 `UIButton` 以实现更复杂的功能，该按钮标签为“发布推文”，属性名为\
    \ `postTweetButton`，操作处理器为 `-postTweetPressed:`。将其放置在第一个按钮下方，如图 14-6 所示。\n\n![图片](img/9781430240051_Fig14-06.jpg)\n\
    \n**图 14-6.** *在界面中添加另一个按钮*\n\n接下来你将实现 `-postTweetPressed:` 方法。该方法将包含以下步骤：\n\n\
    1.  访问设备的帐户存储，该存储可访问设备上注册的所有帐户。\n2.  创建 `ACAccountType` 实例，用于在请求中指定所有已存储的 Twitter\
    \ 帐户。\n3.  请求访问指定类型的所有帐户。`-requestAccessToAccountsWithType:withCompletionHandler:`\
    \ 方法将提示用户是否允许应用程序访问这些帐户。如果应用程序之前已获得权限，则不会再次提示用户。\n4.  从帐户存储中获取一个 `ACAccount` 对象数组，该数组引用设备上所有已注册的\
    \ Twitter 帐户。\n5.  访问一个用于发布推文的特定帐户。\n6.  初始化 `TWRequest` 实例。该类会接收关于所构建的特定请求的指令。\n\
    7.  将你选择的 `ACAccount` 设置给 `TWRequest`。\n8.  执行请求，并利用完成处理器分析结果。\n\n```\n-(IBAction)postTweetPressed:(id)sender\n\
    {\n    ACAccountStore *accountStore = [[ACAccountStore alloc] init];\n\n    ACAccountType\
    \ *accountType = [accountStore\n        accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];\n\
    \n    [accountStore requestAccessToAccountsWithType:accountType\n        withCompletionHandler:^(BOOL\
    \ granted, NSError *error)\n    {\n        if (granted)\n        {\n         \
    \   NSArray *accountsArray = [accountStore accountsWithAccountType:accountType];\n\
    \n            if ([accountsArray count] >0)\n            {\n                ACAccount\
    \ *twitterAccount = [accountsArray objectAtIndex:0];\n\n                TWRequest\
    \ *postRequest = [[TWRequest alloc] initWithURL:[NSURLURL\n                  \
    \  WithString:@\"http://api.twitter.com/1/statuses/update.json\"]\n          \
    \          parameters:[NSDictionary\n                    dictionaryWithObject:@\"\
    Posted with a TWRequest!\" forKey:@\"status\"]\n                    requestMethod:TWRequestMethodPOST];\n\
    \n                [postRequest setAccount:twitterAccount];\n\n               \
    \ [postRequest performRequestWithHandler:^(NSData *responseData,\n           \
    \         NSHTTPURLResponse *urlResponse, NSError *error)\n                {\n\
    \                    if ([urlResponse statusCode] == 200)\n                  \
    \  {\n                        NSLog(@\"Tweet Posted\");\n                    }\n\
    \                    else\n                    {\n                        NSLog(@\"\
    Error Posting Tweet\");\n                    }\n                }];\n        \
    \    }\n        }\n    }];\n}\n```\n\n该方法的关键部分当然是 `TWRequest` 的初始化。这里你精心使用了 Twitter\
    \ API，通过三个属性配置推文发布：\n\n* **URL**：用于构建 URL 的字符串 `http://api.twitter.com/1/statuses/update.json`，专门用于告知\
    \ Twitter 服务你正在发起状态更新。\n* **参数**：你指定了一个 `NSDictionary` 实例，其中包含一个键“status”，并为其分配一个包含推文实际文本的\
    \ `NSString`。\n* **请求方法**：此参数指定你正在发出的请求类型。由于你在发布推文，因此使用 `TWRequestMethodPOST`\
    \ 值。\n\n使用此方法发布推文的一个有趣之处在于，用户在推文发送前实际上无法预览。事实上，在这种情况下，用户收到的唯一提示是请求访问 Twitter 帐户。在发送此类推文时，务必牢记用户的最佳利益，以免发布未经用户希望的更新。\n\
    \n**注意：** 如上述方法所示，你可以通过检查 `urlResponse` 的 `statusCode` 来评估 `TWRequest` 的结果。如果此值为\
    \ 200，则表示请求已成功完成。否则，存在某种错误。请参阅 Twitter API `https://dev.twitter.com/docs/error-codes-responses`\
    \ 了解各种错误代码的具体细节。\n\n在测试此应用时，你将能够在获得权限后，无需使用 `TWTweetComposeViewController`，即可从设备已注册的帐户发送推文。\n"
- fmt: "### Recipe 14–3: Retrieving Tweets\n\nNow that you have covered two different\
    \ methods with which you can post updates to Twitter, you can apply the concepts\
    \ used in the previous recipe, revolving around the `TWRequest` class, in order\
    \ to build an application that can acquire and display tweets.\n\nYou will build\
    \ an application to display multiple different groups of tweets, so you will use\
    \ a `UITabBarController` to keep your content groups separate. Open up a new project,\
    \ and start off by selecting the Tabbed Application template, as in [Figure 14-7](#Chapter14.html#fig_14_7).\n\
    \n![Image](images/9781430240051_Fig14-07.jpg)\n\n**Figure 14-7.** *Creating a\
    \ tabbed application*\n\nOn the next screen, enter your project name. Since you\
    \ will be displaying groups of tweets from a variety of sources, name your project\
    \ `\"PulseOfTheWorld\"` with the class prefix of `\"Main\"`. Make sure your application\
    \ is configured for the iPhone device family and that Automatic Reference Counting\
    \ is enabled, so that your project settings are the same as those in the previous\
    \ recipe. Click through to create your project.\n\nThe template application will\
    \ resemble that simulated here. Luckily for you, this layout is exactly how you\
    \ will start your application off, as demonstrated in [Figure 14-8](#Chapter14.html#fig_14_8),\
    \ so you can display the raw data acquired from Twitter.\n\n![Image](images/9781430240051_Fig14-08.jpg)\n\
    \n**Figure 14-8.** *Your generic tabbed application*\n\n**NOTE:** Since you have\
    \ created a template application with two view controllers that you will format\
    \ similarly, the following configuration will include changes made to both controllers\
    \ simultaneously. Make sure to follow carefully and make all necessary changes\
    \ to each view controller.\n\nYou will first need to configure your user interface\
    \ to be programmatically editable, so first go into the XIB file for each of your\
    \ two pre-made view controllers and connect both the `UILabel` and `UITextView`\
    \ to properties in your header files. You will use the respective property names\
    \ `publicLabel` and `publicTextView` in the first view controller, and `homeLabel`\
    \ and `homeTextView` in the second view controller.\n\nYou can change the initial\
    \ text of your view elements to fit your application a bit more. Add the following\
    \ lines to the `-viewDidLoad` of your first view controller.\n\n```\nself.publicLabel.text\
    \ = @\"Public Timeline\";\nself.publicTextView.text = @\"Public Timeline data\
    \ not retrieved yet.\";\n```\n\nAdd the equivalent lines of code to your second\
    \ view controller.\n\n```\nself.homeLabel.text = @\"Home Timeline\";\nself.homeTextView.text\
    \ = @\"Home Timeline data not retrieved yet.\";\n```\n\nYou'll also add a `UIButton`\
    \ to each of your view controllers to actually trigger your application to retrieve\
    \ data. Name each button either `\"Get Public Timeline\"` or `\"Get Home Timeline\"\
    ` as appropriate, and connect them to `IBAction` methods with handlers `-publicPressed:`\
    \ and `-homePressed` as well as to properties `publicButton` and `homeButton`.\n\
    \nBefore you proceed, you need to make sure to include your Twitter and Accounts\
    \ frameworks in your project. Follow the same procedure discussed in the previous\
    \ recipes to add them both, and make sure the correct import statements are added\
    \ to both view controllers.\n\n```\n#import <Twitter/Twitter.h>\n#import <Accounts/Accounts.h>\n\
    ```\n\nBack in the XIB file, you need to slightly customize your `UITextView`s\
    \ to work correctly with your application. Make sure that for each `UITextView`\
    \ the box marked \"User Interaction Enabled\" is checked, as in [Figure 14-9](#Chapter14.html#fig_14_9),\
    \ in order to allow the views to scroll.\n\n![Image](images/9781430240051_Fig14-09.jpg)\n\
    \n**Figure 14-9.** *Enabling user interaction for your `UITextView`s*\n\nNow make\
    \ sure to set each `UITextView`'s text alignment to the left, so that your raw\
    \ data is slightly more readable. I have also increased the size of these views\
    \ so as to be able to display more information at once.\n\nAt this point, your\
    \ views should resemble [Figure 14-10](#Chapter14.html#fig_14_10), with appropriately\
    \ different text for each controller.\n\n![Image](images/9781430240051_Fig14-10.jpg)\n\
    \n**Figure 14-10.** *Your configured user interface*\n\nAlso following is the\
    \ header code for the first view controller that your program should now resemble.\
    \ The second view controller's header file should be identical aside from the\
    \ different property and action names.\n\n```\n#import <UIKit/UIKit.h>\n#import\
    \ <Twitter/Twitter.h>\n#import <Accounts/Accounts.h>\n\n@interface MainFirstViewController\
    \ : UIViewController\n@property (strong, nonatomic) IBOutlet UILabel *publicLabel;\n\
    @property (strong, nonatomic) IBOutlet UITextView *publicTextView;\n@property\
    \ (strong, nonatomic) IBOutlet UIButton *publicButton;\n-(IBAction)publicPressed:(id)sender;\n\
    @end\n```\n\nFollowing the lines of your previous recipes, you will create a method\
    \ to check for Twitter availability, and adjust your view accordingly. You need\
    \ this method only in your second view controller, so it will look like so:\n\n\
    ```\n-(BOOL)checkCanTweet\n{\n    if ([TWTweetComposeViewController canSendTweet])\n\
    \    {\n        self.homeButton.enabled = YES;\n        self.homeButton.alpha\
    \ = 1.0;\n        return YES;\n    }\n    else\n    {\n        self.homeButton.enabled\
    \ = NO;\n        self.homeButton.alpha = 0.6;\n        return NO;\n    }\n}\n\
    ```\n\nJust as before, make sure to place a call to the `-checkCanTweet` method\
    \ in both your `-viewDidLoad` and `-viewWillAppear:animated:` methods.\n\nNow\
    \ you can go ahead and work on implementing your methods to request your tweets.\
    \ As you may have guessed, you will start off by retrieving data from the Public\
    \ Timeline in your first view controller, and data from the Home Timeline in the\
    \ second. In this case, the Home Timeline refers to the posts made by the current\
    \ user, as well as any users they are following, as opposed to the Public Timeline,\
    \ which simply shows public tweets. Because the Home Timeline is user-specific,\
    \ you will need to make use of the Accounts framework again to access your device's\
    \ registered Twitter account(s).\n\nYou will start off by implementing your `-publicPressed:`\
    \ method in your first view controller to retrieve public tweets with the following\
    \ code.\n\n```\n- (IBAction)publicPressed:(id)sender\n{\n    TWRequest *postRequest\
    \ = [[TWRequest alloc] initWithURL:[NSURL\n    URLWithString:@\"http://api.twitter.com/1/statuses/public_timeline.json\"\
    ]\n    parameters:nilrequestMethod:TWRequestMethodGET];\n\n    [postRequest performRequestWithHandler:^(NSData\
    \ *responseData, NSHTTPURLResponse\n    *urlResponse, NSError * error)\n    {\n\
    \        NSString *output;\n        if ([urlResponse statusCode] == 200)\n   \
    \     {\n            NSError *jsonParsingError;\n            NSArray *publicTimeline\
    \ = [NSJSONSerialization JSONObjectWithData:responseData\n            options:0error:&jsonParsingError];\n\
    \n            output = [NSString stringWithFormat:@\"Public timeline:\\n%@\",\n\
    \            publicTimeline];\n        }\n        else\n        {\n          \
    \  output = [NSString stringWithFormat:@\"HTTP response status: %i\\n\",\n   \
    \         [urlResponse statusCode]];\n        }\n        [self.publicTextView\
    \ performSelectorOnMainThread:@selector(setText:)\n        withObject:output waitUntilDone:NO];\n\
    \    }];\n}\n```\n\nThis method can be broken down into several points:\n\n**1.**\
    \ Because the Public Timeline is available openly, you did not need to access\
    \ a specific Twitter account to retrieve the data, so you went straight to configuring\
    \ your `TWRequest`.\n\n**2.** Similarly to your previous recipe, when creating\
    \ your `TWRequest`, you used a URL specific to Twitter to access your intended\
    \ service. The URL used here, `http://api.twitter.com/1/statuses/public_timeline.json`,\
    \ is written to give you the data from the Public Timeline specifically in the\
    \ JSON format (as specified by the `\"json\"` suffix)."
  raw: '### Recipe 14–3: Retrieving Tweets


    Now that you have covered two different methods with which you can post updates
    to Twitter, you can apply the concepts used in the previous recipe, revolving
    around the `TWRequest` class, in order to build an application that can acquire
    and display tweets.


    You will build an application to display multiple different groups of tweets,
    so you will use a `UITabBarController` to keep your content groups separate. Open
    up a new project, and start off by selecting the Tabbed Application template,
    as in [Figure 14-7](#Chapter14.html#fig_14_7).


    ![Image](images/9781430240051_Fig14-07.jpg)


    **Figure 14-7.** *Creating a tabbed application*


    On the next screen, enter your project name. Since you will be displaying groups
    of tweets from a variety of sources, name your project “PulseOfTheWorld” with
    the class prefix of “Main”. Make sure your application is configured for the iPhone
    device family and that Automatic Reference Counting is enabled, so that your project
    settings are the same as those in the previous recipe. Click through to create
    your project.


    The template application will resemble that simulated here. Luckily for you, this
    layout is exactly how you will start your application off, as demonstrated in
    [Figure 14-8](#Chapter14.html#fig_14_8), so you can display the raw data acquired
    from Twitter.


    ![Image](images/9781430240051_Fig14-08.jpg)


    **Figure 14-8.** *Your generic tabbed application*


    **NOTE:** Since you have created a template application with two view controllers
    that you will format similarly, the following configuration will include changes
    made to both controllers simultaneously. Make sure to follow carefully and make
    all necessary changes to each view controller.


    You will first need to configure your user interface to be programmatically editable,
    so first go into the XIB file for each of your two pre-made view controllers and
    connect both the `UILabel` and `UITextView` to properties in your header files.
    You will use the respective property names `publicLabel` and `publicTextView`
    in the first view controller, and `homeLabel`and`homeTextView` in the second view
    controller.


    You can change the initial text of your view elements to fit your application
    a bit more. Add the following lines to the `-viewDidLoad` of your first view controller.


    `self.publicLabel.text = @"Public Timeline";`

    `self.publicTextView.text = @"Public Timeline data not retrieved yet.";`


    Add the equivalent lines of code to your second view controller.


    `self.homeLabel.text = @"Home Timeline";`

    `self.homeTextView.text = @"Home Timeline data not retrieved yet.";`


    You''ll also add a `UIButton` to each of your view controllers to actually trigger
    your application to retrieve data. Name each button either “Get Public Timeline”
    or “Get Home Timeline” as appropriate, and connect them to `IBAction` methods
    with handlers `-publicPressed:` and `-homePressed` as well as to properties `publicButton`
    and `homeButton`.


    Before you proceed, you need to make sure to include your Twitter and Accounts
    frameworks in your project. Follow the same procedure discussed in the previous
    recipes to add them both, and make sure the correct import statements are added
    to both view controllers.


    `#import <Twitter/Twitter.h>`

    `#import <Accounts/Accounts.h>`


    Back in the XIB file, you need to slightly customize your `UITextView`s to work
    correctly with your application. Make sure that for each `UITextView` the box
    marked “User Interaction Enabled” is checked, as in [Figure 14-9](#Chapter14.html#fig_14_9),
    in order to allow the views to scroll.


    ![Image](images/9781430240051_Fig14-09.jpg)


    **Figure 14-9.** *Enabling user interaction for your `UITextView`s*


    Now make sure to set each `UITextView`''s text alignment to the left, so that
    your raw data is slightly more readable. I have also increased the size of these
    views so as to be able to display more information at once.


    At this point, your views should resemble [Figure 14-10](#Chapter14.html#fig_14_10),
    with appropriately different text for each controller.


    ![Image](images/9781430240051_Fig14-10.jpg)


    **Figure 14-10.** *Your configured user interface*


    Also following is the header code for the first view controller that your program
    should now resemble. The second view controller''s header file should be identical
    aside from the different property and action names.


    `#import <UIKit/UIKit.h>`

    `#import <Twitter/Twitter.h>`

    `#import <Accounts/Accounts.h>`


    `@interface MainFirstViewController : UIViewController`

    `@property (strong, nonatomic) IBOutlet UILabel *publicLabel;`

    `@property (strong, nonatomic) IBOutlet UITextView *publicTextView;`

    `@property (strong, nonatomic) IBOutlet UIButton *publicButton;`

    `-(IBAction)publicPressed:(id)sender;`

    `@end`


    Following the lines of your previous recipes, you will create a method to check
    for Twitter availability, and adjust your view accordingly. You need this method
    only in your second view controller, so it will look like so:


    `-(BOOL)checkCanTweet`

    `{`

    `if ([TWTweetComposeViewController canSendTweet])`

    `    {`

    `self.homeButton.enabled = YES;`

    `self.homeButton.alpha = 1.0;`

    `return YES;`

    `    }`

    `else`

    `    {`

    `self.homeButton.enabled = NO;`

    `self.homeButton.alpha = 0.6;`

    `return NO;`

    `    }`

    `}`


    Just as before, make sure to place a call to the `-checkCanTweet` method in both
    your `-viewDidLoad` and `-viewWillAppear:animated:` methods.


    Now you can go ahead and work on implementing your methods to request your tweets.
    As you may have guessed, you will start off by retrieving data from the Public
    Timeline in your first view controller, and data from the Home Timeline in the
    second. In this case, the Home Timeline refers to the posts made by the current
    user, as well as any users they are following, as opposed to the Public Timeline,
    which simply shows public tweets. Because the Home Timeline is user-specific,
    you will need to make use of the Accounts framework again to access your device''s
    registered Twitter account(s).


    You will start off by implementing your -`publicPressed:` method in your first
    view controller to retrieve public tweets with the following code.


    `- (IBAction)publicPressed:(id)sender`

    `{`

    `TWRequest *postRequest = [[TWRequest alloc] initWithURL:[NSURL`

    `URLWithString:@"http://api.twitter.com/1/statuses/public_timeline.json"]`

    `parameters:nilrequestMethod:TWRequestMethodGET];`


    `    [postRequest performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse`

    `*urlResponse, NSError * error)`

    `    {`

    `        NSString *output;`

    `if ([urlResponse statusCode] == 200)`

    `        {`

    `            NSError *jsonParsingError;`

    `NSArray *publicTimeline = [NSJSONSerialization JSONObjectWithData:responseData`

    `options:0error:&jsonParsingError];`


    `            output = [NSString stringWithFormat:@"Public timeline:\n%@",`

    `publicTimeline];`

    `        }`

    `else`

    `        {`

    `            output = [NSString stringWithFormat:@"HTTP response status: %i\n",`

    `[urlResponse statusCode]];`

    `        }`

    `        [self.publicTextView performSelectorOnMainThread:@selector(setText:)`

    `withObject:output waitUntilDone:NO];`

    `    }];`

    `}`


    This method can be broken down into several points:


    **1.** Because the Public Timeline is available openly, you did not need to access
    a specific Twitter account to retrieve the data, so you went straight to configuring
    your `TWRequest`.


    **2.** Similarly to your previous recipe, when creating your `TWRequest`, you
    used a URL specific to Twitter to access your intended service. The URL used here,
    `http://api.twitter.com/1/statuses/public_timeline.json`, is written to give you
    the data from the Public Timeline specifically in the JSON format (as specified
    by the “json” suffix).'
  trans: "\n### 方案 14-3：检索推文\n\n既然你已经掌握了两种在 Twitter 上发布更新的方法，接下来可以运用上一个方案中围绕 `TWRequest`\
    \ 类所学的概念，构建一个能够获取并显示推文的应用程序。\n\n你将构建一个用于显示多组不同推文的应用程序，因此需要使用 `UITabBarController`\
    \ 来分隔不同的内容组。新建一个项目，首先选择标签栏应用程序模板，如图 14-7 所示。\n\n![图片](img/9781430240051_Fig14-07.jpg)\n\
    \n**图 14-7.** *创建标签栏应用程序*\n\n在下一个界面中，输入你的项目名称。由于你将显示来自不同来源的推文组，请将项目命名为 `\"PulseOfTheWorld\"\
    `，类前缀设为 `\"Main\"`。确保应用程序配置为 iPhone 设备系列，并启用自动引用计数，这样你的项目设置就与上一个方案相同。点击继续创建项目。\n\
    \n模板应用程序将与模拟界面相似。幸运的是，这个布局恰好也是你应用程序的起始布局，如图 14-8 所示，因此你可以直接显示从 Twitter 获取的原始数据。\n\
    \n![图片](img/9781430240051_Fig14-08.jpg)\n\n**图 14-8.** *你的通用标签栏应用程序*\n\n**注意：**\
    \ 由于你创建的模板应用程序包含两个格式相似的视图控制器，以下配置将同时对这两个控制器进行修改。请仔细按照步骤，对每个视图控制器进行所有必要的更改。\n\n\
    首先，你需要将用户界面配置为可通过编程方式进行编辑。因此，先进入两个预置视图控制器的 XIB 文件，将 `UILabel` 和 `UITextView` 连接到头文件中的属性。在第一个视图控制器中使用属性名\
    \ `publicLabel` 和 `publicTextView`，在第二个视图控制器中使用 `homeLabel` 和 `homeTextView`。\n\
    \n你可以修改视图元素的初始文本，使其更符合应用程序的需求。在第一个视图控制器的 `-viewDidLoad` 方法中添加以下代码：\n\n```\nself.publicLabel.text\
    \ = @\"公共时间线\";\nself.publicTextView.text = @\"尚未获取公共时间线数据。\";\n```\n\n在第二个视图控制器中添加等效代码：\n\
    \n```\nself.homeLabel.text = @\"主页时间线\";\nself.homeTextView.text = @\"尚未获取主页时间线数据。\"\
    ;\n```\n\n同时，为每个视图控制器添加一个 `UIButton`，用于触发数据检索操作。根据功能分别将按钮命名为 `\"获取公共时间线\"` 或 `\"\
    获取主页时间线\"`，并将其连接到 `IBAction` 方法（处理程序分别为 `-publicPressed:` 和 `-homePressed:`）以及属性\
    \ `publicButton` 和 `homeButton`。\n\n在继续之前，请确保在项目中引入了 Twitter 和 Accounts 框架。按照之前方案中讨论的步骤添加这两个框架，并确保在两个视图控制器中添加了正确的导入语句：\n\
    \n```\n#import <Twitter/Twitter.h>\n#import <Accounts/Accounts.h>\n```\n\n回到 XIB\
    \ 文件，你需要对 `UITextView` 进行一些微调，以确保其与应用程序正常工作。确保每个 `UITextView` 的“用户交互已启用”复选框已勾选（如图\
    \ 14-9 所示），以便视图能够滚动。\n\n![图片](img/9781430240051_Fig14-09.jpg)\n\n**图 14-9.** *为你的\
    \ `UITextView` 启用用户交互*\n\n接下来，将每个 `UITextView` 的文本对齐方式设置为左对齐，使原始数据更易读。我还增加了这些视图的尺寸，以便一次性显示更多信息。\n\
    \n此时，你的视图应类似于图 14-10，每个控制器显示不同但适当的文本。\n\n![图片](img/9781430240051_Fig14-10.jpg)\n\
    \n**图 14-10.** *配置好的用户界面*\n\n以下是第一个视图控制器的头文件代码，你的程序应与此类似。第二个视图控制器的头文件除了属性名和动作名不同外，其余应完全一致。\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <Twitter/Twitter.h>\n#import <Accounts/Accounts.h>\n\
    \n@interface MainFirstViewController : UIViewController\n@property (strong, nonatomic)\
    \ IBOutlet UILabel *publicLabel;\n@property (strong, nonatomic) IBOutlet UITextView\
    \ *publicTextView;\n@property (strong, nonatomic) IBOutlet UIButton *publicButton;\n\
    -(IBAction)publicPressed:(id)sender;\n@end\n```\n\n按照之前方案的思路，你将创建一个方法来检查 Twitter\
    \ 是否可用，并相应调整视图。这个方法只需要在第二个视图控制器中使用，具体如下：\n\n```\n-(BOOL)checkCanTweet\n{\n   \
    \ if ([TWTweetComposeViewController canSendTweet])\n    {\n        self.homeButton.enabled\
    \ = YES;\n        self.homeButton.alpha = 1.0;\n        return YES;\n    }\n \
    \   else\n    {\n        self.homeButton.enabled = NO;\n        self.homeButton.alpha\
    \ = 0.6;\n        return NO;\n    }\n}\n```\n\n和之前一样，确保在 `-viewDidLoad` 和 `-viewWillAppear:animated:`\
    \ 方法中都调用了 `-checkCanTweet` 方法。\n\n现在，你可以着手实现请求推文的方法了。你可能已经猜到，首先需要在第一个视图控制器中从公共时间线获取数据，在第二个视图控制器中从主页时间线获取数据。此处的主页时间线指的是当前用户及其关注用户的帖子，而公共时间线仅显示公开推文。由于主页时间线是用户特定的，你需要再次使用\
    \ Accounts 框架来访问设备上注册的 Twitter 账户。\n\n首先，在第一个视图控制器中实现 `-publicPressed:` 方法，用以下代码检索公共推文：\n\
    \n```\n- (IBAction)publicPressed:(id)sender\n{\n    TWRequest *postRequest = [[TWRequest\
    \ alloc] initWithURL:[NSURL\n    URLWithString:@\"http://api.twitter.com/1/statuses/public_timeline.json\"\
    ]\n    parameters:nilrequestMethod:TWRequestMethodGET];\n\n    [postRequest performRequestWithHandler:^(NSData\
    \ *responseData, NSHTTPURLResponse\n    *urlResponse, NSError * error)\n    {\n\
    \        NSString *output;\n        if ([urlResponse statusCode] == 200)\n   \
    \     {\n            NSError *jsonParsingError;\n            NSArray *publicTimeline\
    \ = [NSJSONSerialization JSONObjectWithData:responseData\n            options:0error:&jsonParsingError];\n\
    \n            output = [NSString stringWithFormat:@\"公共时间线：\\n%@\",\n        \
    \    publicTimeline];\n        }\n        else\n        {\n            output\
    \ = [NSString stringWithFormat:@\"HTTP 响应状态：%i\\n\",\n            [urlResponse\
    \ statusCode]];\n        }\n        [self.publicTextView performSelectorOnMainThread:@selector(setText:)\n\
    \        withObject:output waitUntilDone:NO];\n    }];\n}\n```\n\n此方法可分解为以下几个要点：\n\
    \n**1.** 由于公共时间线是公开可访问的，你不需要访问特定的 Twitter 账户来获取数据，因此可以直接配置你的 `TWRequest`。\n\n\
    **2.** 与上一个方案类似，创建 `TWRequest` 时，你使用了 Twitter 特定的 URL 来访问所需服务。此处使用的 URL `http://api.twitter.com/1/statuses/public_timeline.json`\
    \ 旨在从公共时间线获取数据，并以 JSON 格式返回（由 `\"json\"` 后缀指定）。\n"
- fmt: "**3.** Also when configuring the `TWRequest`, you must specify the “request\
    \ method” value `TWRequestMethodGET`, instead of the previous `TWRequestMethodPOST`.\
    \ The easiest way to view this is that you use the “GET” value to retrieve information,\
    \ and the “POST” value to send.\n\n**4.** After confirming the successful response,\
    \ you have to convert your received data into a useful iOS format. Since you specified\
    \ your data to use the JSON format, you can make use of the `NSJSONSerialization`\
    \ class method `+JSONObjectWithData:options:error:`. This method converts your\
    \ received JSON data into either an `NSDictionary` or `NSArray`, depending on\
    \ the format. In this case, you receive an `NSArray`, whose contents you then\
    \ place into the `NSStringoutput`.\n\n**5.** Any changing of the user interface\
    \ must be performed in the main thread, so you make use of the `-performSelectorMainThread:withObject:waitUntilDone:`\
    \ method to update your user interface with the given output.\n\nIt is also important\
    \ to know that you are able to further customize your `TWRequest` by specifying\
    \ parameters, which determine what kind of results you receive. Every kind of\
    \ request has its own set of available parameters, so refer to the Twitter API\
    \ to find more information on specific options, which are set in an `NSDictionary`.\n\
    \nNow, in your second view controller, you can implement a similar solution to\
    \ retrieve the user's Home Timeline data.\n\n```\n- (IBAction)homePressed:(id)sender\n\
    {\nif ([self checkCanTweet])\n    {\nACAccountStore *accountStore = [[ACAccountStore\
    \ alloc] init];\nACAccountType *accountType = [accountStore\naccountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];\n\
    \n        [accountStore requestAccessToAccountsWithType:accountType\nwithCompletionHandler:^(BOOL\
    \ granted, NSError *error)\n        {\nif (granted)\n            {\nNSArray *accountsArray\
    \ = [accountStore accountsWithAccountType:accountType];\nif ([accountsArray count]\
    \ >0)\n                {\nACAccount *twitterAccount = [accountsArray objectAtIndex:0];\n\
    \nTWRequest *postRequest = [[TWRequest alloc] initWithURL:[NSURL\nURLWithString:@\"\
    http://api.twitter.com/1/statuses/home_timeline.json\"] parameters:nil\nrequestMethod:TWRequestMethodGET];\n\
    \n                    [postRequest setAccount:twitterAccount];\n\n           \
    \         [postRequest performRequestWithHandler:^(NSData *responseData,\nNSHTTPURLResponse\
    \ *urlResponse, NSError *error)\n                     {\n                    \
    \     NSString *output;\n\nif ([urlResponse statusCode] == 200)\n            \
    \             {\n                             NSError *jsonParsingError;\nNSArray\
    \ *homeTimeline = [NSJSONSerialization JSONObjectWithData:responseData options:0\n\
    error:&jsonParsingError];\n\n                             output = [NSString stringWithFormat:@\"\
    Home timeline:\\n%@\",\nhomeTimeline];\n                         }\nelse\n   \
    \                      {\n                             output = [NSString stringWithFormat:@\"\
    HTTP response status:\n%i\\n\", [urlResponse statusCode]];\n                 \
    \        }\n                         [self.homeTextView\nperformSelectorOnMainThread:@selector(setText:)\
    \ withObject:output waitUntilDone:NO];\n                     }];\n           \
    \     }\n            }\nelse\n            {\nself.homeTextView.text = @\"Error,\
    \ Twitter account access not granted.\";\n            }\n        }];\n    }\n\
    }\n```\n\nThis method follows the same track as the previous one, with the following\
    \ differences:\n\n**6.** You included a quick check to `-checkCanTweet` in order\
    \ to ensure that your device is properly configured with a Twitter account.\n\n\
    **7.** Since you are accessing a specific user's timeline, you include code to\
    \ access the device's registered Twitter accounts, pick the first, and include\
    \ it in the `TWRequest`.\n\n**8.** A slightly different URL, this time `http://api.twitter.com/1/statuses/home_timeline.json`,\
    \ is used to request a Home Timeline, as opposed to the Public Timeline.\n\nIf\
    \ you run your application on a device at this point, you should be able to retrieve\
    \ a good 20 tweets worth of data to your phone and view their raw data. [Figure\
    \ 14-11](#Chapter14.html#fig_14_11) shows the beginning of the Public Timeline\
    \ data at the moment of this writing.\n\n![Image](images/9781430240051_Fig14-11.jpg)\n\
    \n**Figure 14-11.** *Sample public timeline data*\n\nAs you scroll through this\
    \ massive amount of data, you can get a general sense of the format of the tweet\
    \ data that you've received. You have an `NSArray` of a group of tweets, with\
    \ each one stored as an `NSDictionary`. The values you see in [Figure 14-11](#Chapter14.html#fig_14_11)\
    \ represent the keys (on the left) and their related objects (on the right). These\
    \ objects are formatted as instances of `NSString`, `NSNumber`, `NSNull`, or even\
    \ more complex instances of `NSArray` or `NSDictionary`. For example, to access\
    \ the name of a tweet's poster, you must access a nested dictionary within your\
    \ array. You first find the tweet in your array, then access the `NSDictionary`\
    \ containing user information through the “user” key, and then retrieve the name\
    \ with the “name” key. Using this information, you can begin to build a more complete\
    \ application to display your tweets.\n\nFirst, you will create a simple data\
    \ model to encapsulate your post data into custom objects. Create a new file using\
    \ the “Objective-C class” template. Name your class “Post”, and make sure the\
    \ subclass field is set to “NSObject”, as in [Figure 14-12](#Chapter14.html#fig_14_12).\n\
    \n![Image](images/9781430240051_Fig14-12.jpg)\n\n**Figure 14-12.** *Configuring\
    \ your `NSObject` subclass called “Post”*\n\nNext you can define properties for\
    \ your Post object to have. You will specify properties for some of the most commonly\
    \ used properties of a tweet, such as the text, user's name, and retweet count.\
    \ You will also have properties to keep track of your actual `NSDictionaries`\
    \ of data in order to simplify accessing any additional values later.\n\nIn order\
    \ to create your Post objects, you will use a designated initializer that will\
    \ accept the `NSDictionary` objects that you saw earlier as a parameter. Define\
    \ these properties and method so that your `Post.h` file reads like so:\n\n```\n\
    #import <Foundation/Foundation.h>\n\n@interface Post : NSObject\n\n@property (nonatomic,\
    \ strong) NSDictionary *postData;\n@property (nonatomic, strong) NSDictionary\
    \ *user;\n@property (nonatomic, strong) NSString *text;\n@property (nonatomic,\
    \ strong) NSString *screenName;\n@property (nonatomic, strong) NSString *name;\n\
    @property (nonatomic, strong) NSString *userDescription;\n@property (nonatomic,\
    \ strong) id retweetCount; //Could be NSString (100+) or NSNumber\n@property (nonatomic,\
    \ strong) UIImage *userImage;\n-(Post *)initWithDictionary:(NSDictionary *)dictionary;\n\
    \n@end\n```\n\nAs commented here, you have made the property `retweetCount` of\
    \ type “id”, due to the possibility of it having two different types of values.\
    \ If you looked through your earlier raw data, you might have noticed some posts\
    \ with “retweet_count” values of numbers (i.e., 0, 10, etc.), and others with\
    \ the string “100+”. By making your property a general type, you can later check\
    \ to see which value you ended up with for any given post.\n\nYou can synthesize\
    \ all these properties in a single line in the `Post.m` file.\n\n```\n@synthesize\
    \ name, text, user, postData, screenName, retweetCount, userDescription,\nuserImage;\n\
    ```\n\nYour initializer is fairly easy to set up, and just involves you querying\
    \ your dictionaries with the various keys you will use."
  raw: '**3.** Also when configuring the `TWRequest`, you must specify the “request
    method” value `TWRequestMethodGET`, instead of the previous `TWRequestMethodPOST`.
    The easiest way to view this is that you use the “GET” value to retrieve information,
    and the “POST” value to send.


    **4.** After confirming the successful response, you have to convert your received
    data into a useful iOS format. Since you specified your data to use the JSON format,
    you can make use of the `NSJSONSerialization` class method `+JSONObjectWithData:options:error:`.
    This method converts your received JSON data into either an `NSDictionary` or
    `NSArray`, depending on the format. In this case, you receive an `NSArray`, whose
    contents you then place into the `NSStringoutput`.


    **5.** Any changing of the user interface must be performed in the main thread,
    so you make use of the `-performSelectorMainThread:withObject:waitUntilDone:`
    method to update your user interface with the given output.


    It is also important to know that you are able to further customize your `TWRequest`
    by specifying parameters, which determine what kind of results you receive. Every
    kind of request has its own set of available parameters, so refer to the Twitter
    API to find more information on specific options, which are set in an `NSDictionary`.


    Now, in your second view controller, you can implement a similar solution to retrieve
    the user''s Home Timeline data.


