    \ `UISearchBar` 用于指定搜索参数，如图 Figure 14-14 所示。请确保此搜索栏的“纠正”功能已关闭，以免自动更正打扰用户。  \n\n\
    ![图片](img/9781430240051_Fig14-14.jpg)  \n\n**图 14-14.** *在 `MainSearchViewController.xib`\
    \ 文件中添加 `UISearchBar`*  \n\n将 `UISearchBar` 的出口名称设置为 `searchBarPosts`。  \n\n确保正确导入框架和\
    \ `Post.h` 文件到新的视图控制器，并设置需要遵循的协议后，你可以从第一个视图控制器复制 `UITableView` 的委托/数据源方法。同时，务必设置\
    \ `NSMutableArray` 属性 `retrievedTweets`，并复制其自定义的 getter 方法。  \n\n为了配置 `UISearchBar`，你还需要让视图控制器遵循\
    \ `UISearchBarDelegate` 协议。  \n\n按如下方式设置 `-viewDidLoad` 方法：  \n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n\nself.tableViewPosts.delegate = self;\nself.tableViewPosts.dataSource\
    \ = self;\nself.searchBarPosts.delegate = self;\n}\n```\n\n在应用程序委托的实现文件中，导入新控制器的头文件。\
    \  \n\n```\n#import \"MainSearchViewController.h\"\n```\n\n现在，你需要更新 `-application:didFinishLaunchingWithOptions:`\
    \ 方法，以包含最新的视图控制器。  \n\n```\n- (BOOL)application:(UIApplication *)application\n\
    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\nself.window =\
    \ [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n// 应用启动后的自定义覆盖点\n\
    UIViewController *viewController1 = [[MainFirstViewController alloc]\ninitWithNibName:@\"\
    MainFirstViewController\" bundle:nil];\nUIViewController *viewController2 = [[MainSecondViewController\
    \ alloc]\ninitWithNibName:@\"MainSecondViewController\" bundle:nil];\nUIViewController\
    \ *viewController3 = [[MainSearchViewController alloc]\ninitWithNibName:@\"MainSearchViewController\"\
    \ bundle:nil];\nself.tabBarController = [[UITabBarController alloc] init];\nself.tabBarController.viewControllers\
    \ = [NSArray arrayWithObjects:viewController1,\nviewController2, viewController3,\
    \ nil];\nself.window.rootViewController = self.tabBarController;\n    [self.window\
    \ makeKeyAndVisible];\nreturn YES;\n}\n```\n\n你还可以在 `MainSearchViewController.m`\
    \ 文件中添加一个稍作修改的指定初始化方法，以正确设置新的视图控制器：  \n\n```\n- (id)initWithNibName:(NSString\
    \ *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil\n{\nself = [super initWithNibName:nibNameOrNil\
    \ bundle:nibBundleOrNil];\nif (self) {\nself.title = NSLocalizedString(@\"过滤后的帖子\"\
    , @\"First\");\nself.tabBarItem.image = [UIImage imageNamed:@\"first\"];\n   \
    \ }\nreturn self;\n}\n```\n\n为了完全配置 `UISearchBar`，你可以创建委托方法 `-shouldChangeTextInRange:replacementText:`，如下所示，假设该控制器中的数据检索方法名为\
    \ `-searchPressed:`。  \n\n```\n-(BOOL)searchBar:(UISearchBar *)searchBar shouldChangeTextInRange:(NSRange)range\n\
    replacementText:(NSString *)text\n{\nif ([text isEqualToString:@\"\\n\"])\n  \
    \  {\n        [searchBar resignFirstResponder];\n        [self searchPressed:searchBar.text];\n\
    return NO;\n    }\nreturn YES;\n}\n```\n"
- fmt: "现在，你必须考虑向 Twitter 发起请求的实际格式。根据 Twitter API，获取特定搜索 URL 的最佳方式是在 Twitter 网站上输入搜索词，然后修改重定向后得到的\
    \ URL。举个简单的例子，搜索单词“test”会将你重定向到 URL `http://twitter.com/#!/search/test`。然后，你将除了后缀搜索词以外的部分修改为\
    \ `http://search.twitter.com/search.json?q=test`。为了处理简单的搜索查询，你必须正确处理任何空格、井号（`#`）、`@`\
    \ 符号和引号。在你的代码中，你将需要操作搜索词来实现此行为。\n\n首先，你可以在一行代码中完成大部分字符替换。\n\n```objc\nsearchText\
    \ = [searchText stringByAddingPercentEscapesUsingEncoding:\nNSUTF8StringEncoding];\n\
    ```\n\n此方法会正确转换除 `@` 符号之外的所有上述符号，你可以像这样手动替换 `@` 符号：\n\n```objc\nNSMutableString\
    \ *mutableText = [[NSMutableString alloc] initWithString:searchText];\n[mutableText\
    \ replaceOccurrencesOfString:@\"@\" withString:[NSString\nstringWithFormat:@\"\
    %%40\"] options:NSLiteralSearch range:NSMakeRange(0, [mutableText\nlength])];\n\
    ```\n\n现在，你可以将此结果附加到通用搜索 URL 的末尾，从而完整组装你的 URL。\n\n```objc\nNSString *searchString\
    \ = @\"http://search.twitter.com/search.json?q=\";\nsearchString = [searchString\
    \ stringByAppendingString:mutableText];\nNSURL *searchURL = [NSURL URLWithString:searchString];\n\
    ```\n\n将此功能添加到类似于 `-publicPressed:` 的方法中后，你最终得到的整体方法编写如下：\n\n```objc\n- (IBAction)searchPressed:(NSString\
    \ *)searchText\n{\n    [self.retrievedTweets removeAllObjects];\n\n    searchText\
    \ = [searchText stringByAddingPercentEscapesUsingEncoding:\nNSUTF8StringEncoding];\n\
    \n    NSMutableString *mutableText = [[NSMutableString alloc] initWithString:searchText];\n\
    \    [mutableText replaceOccurrencesOfString:@\"@\"\nwithString:[NSStringstringWithFormat:@\"\
    %%40\"] options:NSLiteralSearch\nrange:NSMakeRange(0, [mutableText length])];\n\
    \n//    NSLog(@\"Searching: %@\", mutableText);\n\n    NSString *searchString\
    \ = @\"http://search.twitter.com/search.json?q=\";\n    searchString = [searchString\
    \ stringByAppendingString:mutableText];\n    NSURL *searchURL = [NSURLURLWithString:searchString];\n\
    \n    TWRequest *postRequest = [[TWRequest alloc] initWithURL:searchURL parameters:nil\n\
    requestMethod:TWRequestMethodGET];\n\n    [postRequest performRequestWithHandler:^(NSData\
    \ *responseData, NSHTTPURLResponse\n*urlResponse, NSError *error)\n     {\nif\
    \ ([urlResponse statusCode] == 200)\n         {\n             NSError *jsonParsingError;\n\
    NSDictionary *searchTimeline = [NSJSONSerialization JSONObjectWithData:responseData\n\
    options:0 error:&jsonParsingError];\nNSArray *searchResults = [searchTimeline\
    \ objectForKey:@\"results\"];\nfor (NSDictionary *dict in searchResults)\n   \
    \          {\nPost *current = [[Post alloc] initWithSearchDictionary:dict];\n\
    \                 [self.retrievedTweets addObject:current];\n             }\n\
    //             NSLog(@\"Data Retrieved: HTTP response code %i\", [urlResponse\n\
    statusCode]);\n         }\nelse\n         {\nNSLog(@\"%@\", [NSString stringWithFormat:@\"\
    HTTP response status: %i\\n\", [urlResponse\nstatusCode]]);\n         }\n    \
    \     [self.tableViewPosts reloadData];\n         [self.tableViewPosts reloadInputViews];\n\
    \     }];\n}\n```\n\n请注意，在这种情况下，将 JSON 格式数据转换为 Objective-C 对象后，初始结果并不在 `NSArray`\
    \ 中。这一次，它们位于 `NSDictionary` 中，以便提供有关查询的额外信息。然后，你可以通过访问“results”键来获取你常用的 `NSArray`，如下所示。\n\
    \n当你以这种方式从搜索中检索帖子时，数据格式与之前使用的键不同。为了弥补这一点，你将为你 Post 对象创建第二个指定初始化器 `-initWithSearchDictionary:`，如前面方法中所使用的。这种格式在默认设置下不会提供太多关于用户的信息，因此你只能访问你能获取到的信息。确保同时将此方法的处理程序添加到你的\
    \ `Post.h` 文件中。\n\n```objc\n-(Post *)initWithSearchDictionary:(NSDictionary *)dictionary\n\
    {\nself = [super init];\nif (self)\n    {\nself.postData = dictionary;\nself.screenName\
    \ = [dictionary objectForKey:@\"from_user\"];\nself.text = [dictionary objectForKey:@\"\
    text\"];\nNSString *imageURLString = [dictionary objectForKey:@\"profile_image_url\"\
    ];\nNSURL *imageURL = [NSURL URLWithString:imageURLString];\nNSData *imageData\
    \ = [NSData dataWithContentsOfURL:imageURL];\nself.userImage = [UIImage imageWithData:imageData];\n\
    \    }\nreturn self;\n}\n```\n\n至此，你的应用程序现在应该能够搜索帖子中包含的特定文本、话题标签和用户了！你已经包含了涵盖最常用搜索词的基本功能，但\
    \ Twitter API 允许进行更复杂的查询。有关各种搜索格式的完整列表，请参阅 `https://dev.twitter.com/docs/using-search`\
    \ 上的 Twitter API。\n\n现在运行你的应用程序，你应该能够搜索不同的话题标签、短语和用户名。尝试搜索 `#miami` 并查看得到的结果！\n\
    \n**注意：** 如果在任何时候你不确定从 Twitter 检索到的 JSON 数据的格式，你可以直接使用发起请求的 URL 并在 Web 浏览器中打开它。你将看到与通过代码获取的完全相同的数据的文本视图。由于缺少空格格式，它可能有点难以阅读，但你可以从中找出构建应用程序所需的内容层次。\n\
    \n### 总结\n\n在本章中，我们介绍了大量使用 Twitter 框架的示例代码，内容涵盖从发送推文的预定义用户界面，到自定义格式请求以直接从 Twitter\
    \ 获取特定筛选数据。我们的基本实现可以轻松作为更复杂应用程序的基础。与 Twitter 服务的集成不仅限于发布和显示推文，还可以轻松增强几乎任何应用程序的功能和威力。考虑到\
    \ Twitter 本身的流行度和持续增长，可以肯定 iOS 的集成只会变得更加深入，让开发者能够更简单地访问这个现代世界中最强大的网络服务之一。\n\n\
    ## 第15章\n\n## 图像秘诀\n\n开发者常常面临一个普遍问题：要显示的信息太多，而可用空间却不够。为此，你需要借助图像。图片和图形让你能够传达远超纯文本的各种信息，结合了情感、信息和风格。在\
    \ iOS 中，你有多种不同的方法来创建、使用、操作和显示图像。iOS 5.0 甚至新增了为图像应用滤镜的能力，允许用非常少的代码对显示效果进行大幅修改。通过理解\
    \ iOS 中的这些固有功能和技术，你能够更轻松地实现更强大、信息更丰富的应用程序。"
