    \ labelHeading;`  \n`@synthesize labelTrueHeading;`  \n`- (IBAction)switchHeadingServices:(id)sender\
    \ {`  \n`    if([CLLocationManager headingAvailable]){`  \n`        if([sender\
    \ isKindOfClass:[UISwitch class]]){`  \n`            UISwitch *headingSwitch=(UISwitch\
    \ *)sender;`  \n`            if(headingSwitch.on){`  \n`                if(_locationManager==nil){`\
    \  \n`                    _locationManager=[[CLLocationManager alloc] init];`\
    \  \n`                    _locationManager.headingFilter=5;`  \n`            \
    \        _locationManager.purpose=@\"We will use your location to tell you where\
    \ you are headed\";`  \n`                    _locationManager.delegate=self;`\
    \  \n`                }`  \n`                [_locationManager startUpdatingHeading];`\
    \  \n`                [_locationManager startUpdatingLocation];`  \n`        \
    \        self.labelHeading.text=@\"正在开始方向追踪…\";`  \n`            }else{`  \n`\
    \                self.labelHeading.text=@\"已关闭方向追踪\";`  \n`                if(_locationManager!=nil){`\
    \  \n`                    [_locationManager stopUpdatingHeading];`  \n`      \
    \              [_locationManager stopUpdatingLocation];`  \n`                }`\
    \  \n`            }`  \n`        }`  \n`    }else{`  \n`        self.labelHeading.text=@\"\
    方向服务不可用\";`  \n`    }`  \n`}`  \n`-(void)locationManager:(CLLocationManager *)manager\
    \ didFailWithError:(NSError *)error{`  \n`    if(error.code==kCLErrorDenied){`\
    \  \n`        [manager stopUpdatingHeading];`  \n`        self.labelHeading.text=@\"\
    错误：方向追踪被拒绝\";`  \n`    }`  \n`}`  \n`-(void)locationManager:(CLLocationManager\
    \ *)manager didUpdateHeading:(CLHeading *)newHeading{`  \n`    NSDate *headingDate=newHeading.timestamp;`\
    \  \n`    NSTimeInterval headingInterval=[headingDate timeIntervalSinceNow];`\
    \  \n`    if(abs(headingInterval)<30){`  \n`        if(newHeading.headingAccuracy<0)`\
    \  \n`            return;`  \n`        if(newHeading.trueHeading>=0){`  \n`  \
    \          self.labelTrueHeading.text=[NSString stringWithFormat:@\"您的真北方向为：%.1f°\"\
    , newHeading.trueHeading];`  \n`        }`  \n`        self.labelHeading.text=[NSString\
    \ stringWithFormat:@\"您的磁北方向为：%.1f°\", newHeading.magneticHeading];`  \n`    }`\
    \  \n`}`  \n`-(BOOL)locationManagerShouldDisplayHeadingCalibration:(CLLocationManager\
    \ *)manager{`  \n`    return YES;`  \n`}`  \n\n测试该应用程序后，您将能够获得设备方向的简单读数，该读数同时基于磁方向和真方向。与本章中其他使用磁力计的操作方法一样，此功能仅在物理设备上有效，在模拟器上无效。\n\
    \n## 操作指南 4–5：区域监测\n\nCore Location 提供了一种监测设备进入或离开圆形区域的方法。应用程序可以利用此功能，在设备进入某个特定位置附近时触发提醒，例如，当您接近杂货店时提醒购买牛奶。您也可以利用它，在您离开公司时向家人发送通知，告知他们您正在回家的路上。只要发挥一点想象力，就会发现这种功能有众多应用可能性。\n\
    \n### 关于区域的一些要点\n\n区域由中心坐标和以米为单位的半径（同样，一米略多于三英尺或一码）来定义。监测方法仅在您跨越区域边界时触发事件。如果设备在监测启动时已位于区域内，则不会触发事件。只有在设备进入或离开区域时才会触发事件。\n\
    \n一旦创建了`CLLocationManager`对象，您就可以使用`startMonitoringForRegion:desiredAccuracy:`方法注册多个需要监测的区域。您注册用于监测的区域在应用程序的多次启动之间是持久存在的。如果当边界事件发生时您的应用程序没有运行，则应用程序会在后台自动重新启动，以便处理该事件。您之前设置的所有区域都将通过`CLLocationManager`对象的`monitoredRegions`属性获取。\n\
    \n区域是系统全局共享的，并且在任何给定时间可以监测的区域数量有限。您应始终限制当前正监测的区域数量，以免消耗系统资源。您应该移除那些不在设备当前位置附近区域的监测。例如，如果设备在西海岸，就无需监测马里兰州的区域。当您尝试注册新区域进行监测而空间不足时，会向`locationManager:monitoringDidFailForRegion:withError:`委托方法返回错误`kCLErrorRegionMonitoringFailure`。\n"
- fmt: "# Welcome to Baltimore!\n\nIn this project, you are going to create a region\
    \ for the city of Baltimore, MD and welcome visitors to the city when they enter\
    \ it. You will start by creating a new single view application named `Chapter4RegionMonitoring`.\
    \ If your version of Xcode allows for the setting of a class prefix, use the same\
    \ name of `Chapter4RegionMonitoring`. The first thing to do is include the Core\
    \ Location framework in your project by selecting the project in the navigator\
    \ pane and then selecting the project's target. Go to the Build Phases tab, and\
    \ expand the Link Binary With Libraries area to see the included frameworks, and\
    \ add the framework as you have done in the previous sections.\n\nWith the library\
    \ added, you can create the `.xib` file. Select the `Chapter4RegionMonitoringViewController.xib`\
    \ in the navigator pane to open up Interface Builder. Add a `UILabel` and a `UISwitch`.\
    \ Set the `UISwitch` initial state to `Off`. It should resemble [Figure 4–21](#Chapter04.html#fig_4_21).\n\
    \n![Image](images/9781430240051_Fig04-21.jpg)\n\n**Figure 4–21.** *Your quite\
    \ familiar user interface*\n\nUsing the Assistant Editor, connect the outlets\
    \ and actions by doing a `^-click-drag` from the `.xib` file to the interface\
    \ file (`.h`). Create a `UILabel` outlet named `labelRegionInfo` and an `IBAction`\
    \ for the `UISwitch` named `regionMonitoringToggle`, following [Figures 4–22](#Chapter04.html#fig_4_22),\
    \ [4–23](#Chapter04.html#fig_4_23), [4–24](#Chapter04.html#fig_4_24), and [4–25](#Chapter04.html#fig_4_25).\n\
    \n![Image](images/9781430240051_Fig04-22.jpg)\n\n**Figure 4–22.** *Connecting\
    \ a `UILabel` to an outlet*\n\n![Image](images/9781430240051_Fig04-23.jpg)\n\n\
    **Figure 4–23.** *Configuring `UILabel` outlet*\n\n![Image](images/9781430240051_Fig04-24.jpg)\n\
    \n**Figure 4–24.** *Connecting a `UISwitch`'s action*\n\n![Image](images/9781430240051_Fig04-25.jpg)\n\
    \n**Figure 4–25.** *Configuring the toggling action*\n\nYou need to import the\
    \ Core Location framework into your interface file (`.h`) and create a `CLLocationManager`\
    \ instance variable. Then declare your view controller as complying with the `CLLocationManagerDelegate`\
    \ protocol. Your interface file (`.h`) for the view controller now looks like\
    \ this:\n\n```\n//  Chapter4RegionMonitoringViewController.h\n#import <UIKit/UIKit.h>\n\
    #import <CoreLocation/CoreLocation.h>\n\n@interface Chapter4RegionMonitoringViewController\
    \ : UIViewController\n<CLLocationManagerDelegate>{\n    CLLocationManager *_locationManager;\n\
    \    UILabel *labelRegionInfo;\n}\n\n@property (strong, nonatomic) IBOutlet UILabel\
    \ *labelRegionInfo;\n- (IBAction)regionMonitoringToggle:(id)sender;\n\n@end\n\
    ```\n\nSwitching to the implementation file (`.m`), you can implement your region\
    \ tracking methods. The first thing you will make sure of is that region monitoring\
    \ is available and enabled. Scroll to the bottom of `Chapter4RegionMonitoringViewController.m`\
    \ and add the following to the `- (IBAction)regionMonitoringToggle:(id)sender`\
    \ method:\n\n```\n//Check if region monitoring is available\nif([CLLocationManager\
    \ regionMonitoringAvailable] && [CLLocationManager\nregionMonitoringEnabled]){\n\
    \n        ….\n}else{\n        self.labelRegionInfo.text=@\"Region monitoring is\
    \ not available on this device\";\n}\n```\n\nIn the same method, you will want\
    \ to instantiate your `CLLocationManager` instance variable if it is not already\
    \ created and make sure that it is your `UISwitch` calling the method:\n\n```\n\
    \    //Check if region monitoring is available\n    if([CLLocationManager regionMonitoringAvailable]\
    \ && [CLLocationManager\nregionMonitoringEnabled]){\n        //Make sure sender\
    \ is UISwitch\n        if([sender isKindOfClass:[UISwitch class]]){\n        \
    \    UISwitch *regionSwitch=(UISwitch *) sender;\n            //If UISwitch is\
    \ turned On\n            if(regionSwitch.on){\n                if(_locationManager==nil){\n\
    \                    _locationManager=[[CLLocationManager alloc] init];\n    \
    \                _locationManager.purpose=@\"To welcome you to Baltimore\";\n\
    \                    _locationManager.delegate=self;\n                }\n…\n```\n\
    \nYou need to define the center coordinate of the region you want to monitor and\
    \ the radius of the region. Be careful when specifying the radius because if it\
    \ is too large, the monitoring will fail. You can check to make sure your radius\
    \ is within the radius bounds by comparing it to the `maximumRegionMonitoringDistance`\
    \ property of the `CLLocationManager` object. Once you have the center coordinate\
    \ and radius, you create the `CLRegion` object and provide it with an identifier\
    \ for future reference:\n\n```\nCLLocationCoordinate2D baltimoreCoordinate=CLLocationCoordinate2DMake(39.2963,\
    \ -76.613);\nint regionRadius=3000;\nif(regionRadius>_locationManager.maximumRegionMonitoringDistance){\n\
    regionRadius=_locationManager.maximumRegionMonitoringDistance;\n}\nCLRegion *baltimoreRegion=[[CLRegion\
    \ alloc]\ninitCircularRegionWithCenter:baltimoreCoordinate\n        radius:regionRadius\n\
    \        identifier:@\"baltimoreRegion\"];\n```\n\nOnce the region has been created,\
    \ you can start monitoring for boundary events of that region by telling your\
    \ `CLLocationManager` instance object about the region and setting the accuracy\
    \ at which you want to monitor for the event:\n\n```\n[_locationManager startMonitoringForRegion:baltimoreRegion\n\
    \        desiredAccuracy:kCLLocationAccuracyHundredMeters];\n```\n\nOne last thing\
    \ you want to do is turn off region monitoring if the user slides the `UISwitch`\
    \ to the `Off` position. To do this, you will access the `monitoredRegions` property\
    \ of your `CLLocationManager` instance variable and turn off region monitoring\
    \ for all of the currently monitored regions. You could also choose to selectively\
    \ turn off specific regions by utilizing the `identifier` property of the `CLRegion`.\n\
    \n```\n}else{\n                //If UISwitch is turned Off\n                if(_locationManager!=nil){\n\
    \                    for (CLRegion *monitoredRegion in [_locationManager\nmonitoredRegions])\
    \ {\n                        [_locationManager stopMonitoringForRegion:monitoredRegion];\n\
    \                        self.labelRegionInfo.text=[NSString stringWithFormat:@\"\
    Turned\noff region monitoring fore : %@\", monitoredRegion.identifier];\n    \
    \                }\n                }\n}\n```\n\nThe delegate methods need to\
    \ be defined as well. There are two delegate methods for handling boundary events\
    \ and one for handling errors:\n\n`locationManager:didEnterRegion:`\n`locationManager:didExitRegion:`\n\
    `locationManager:monitoringDidFailForRegion:withError:`\n\nThere are two main\
    \ error codes that are related to region monitoring. One is `kCLErrorRegionMonitoringDenied`,\
    \ and it is used when the user of the device has specifically denied access to\
    \ region monitoring. The other is `kCLErrorRegionMonitoringFailure`, and it is\
    \ used when monitoring for a specific region has failed, usually because the system\
    \ has no more region resources available to the application."
  raw: '#### Welcome to Baltimore!


    In this project, you are going to create a region for the city of Baltimore, MD
    and welcome visitors to the city when they enter it. You will start by creating
    a new single view application named “Chapter4RegionMonitoring”. If your version
    of Xcode allows for the setting of a class prefix, use the same name of “Chapter4RegionMonitoring”.
    The first thing to do is include the Core Location framework in your project by
    selecting the project in the navigator pane and then selecting the project''s
    target. Go to the Build Phases tab, and expand the Link Binary With Libraries
    area to see the included frameworks, and add the framework as you have done in
    the previous sections.


