    \ = NSLocalizedString(@\"Straighten Filter\", @\"Detail\");\n    return cell;\n\
    }\n```\n\n回到你的详细视图控制器，你需要做一些额外的修改来完全配置新功能。\n\n现在你正在以类似的方式格式化所有显示图像，因此需要将配置方法调整为更通用的形式。\n\
    \n```\n-(void)configureDetailsWithImage:(UIImage *)image label:(NSString *)label\
