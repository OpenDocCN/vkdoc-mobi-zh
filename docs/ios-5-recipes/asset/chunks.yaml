- fmt: "每个`MainTableViewController`的配置都相当简单，只需设置一个`NSEntityDescription`，为其提供一个指向`NSManagedObjectContext`的指针，然后给它一个在`UITabBarController`中显示的标题。\n\
    \n此时，如果运行应用程序，你只会看到几个空表格（如图 11-17 所示），这是有原因的——你还没有任何数据！不幸的是，你还没有构建`-add`方法，所以在完成之前不要按那个\
    \ + 按钮，否则应用程序会崩溃。\n\n![Image](images/9781430240051_Fig11-17.jpg)\n\n**Figure 11-17.**\
    \ *三个空的`UITableView`*\n\n对于初步的尝试，你可以先从在每个视图控制器中以编程方式创建一个新对象开始，以便显示数据。将以下代码添加到`MainViewController`的`-viewDidLoad`方法中，并确保它位于对`-fetchResults`的调用之前。\n\
    \n```\nNSManagedObject *add = [[NSManagedObject alloc] initWithEntity:self.entityDescription\n\
    insertIntoManagedObjectContext:self.managedObjectContext];\n    if (![self.entityDescription.name\
    \ isEqualToString:@\"Instrument\"])\n    {\n        [add setValue:@\"Jim\" forKey:@\"\
    name\"];\n        [add setValue:[NSNumber numberWithInt:42] forKey:@\"age\"];\n\
    \    }\n    else\n    {\n        [add setValue:@\"Trumpet\" forKey:@\"name\"];\n\
    \        [add setValue:@\"Brass\" forKey:@\"family\"];\n    }\n```\n\n现在，当你运行应用程序时，会显示一些临时数据，如图\
    \ 11-18 所示。\n\n![Image](images/9781430240051_Fig11-18.jpg)\n\n**Figure 11–18.**\
    \ *半填充的`UITableView`*\n\n虽然你已经在`NSManagedObjectContext`中为每个实体创建了一个新实例，但你可能会注意到，每次运行应用程序时，这些对象并不会持久保存——你不会看到每次运行都会增加一个列表。这是因为你没有保存对`NSManagedObjectContext`所做的更改。你可以通过在之前的添加代码之后（但在对`-fetchRequest`的调用之前）添加以下代码来实现保存。\n\
    \n```\nNSError *error;\n    BOOL success = [self.managedObjectContext save:&error];\n\
    \    if (!success)\n    {\n        NSLog(@\"%@\", [error localizedDescription]);\n\
    \    }\n```\n\n你会注意到，这与你在`-fetchResults`中使用的`-performFetch:`方法非常相似：你向它发送一个指向`NSError`实例的指针，以便记录任何问题。与之前一样，这完全是可选的，你可以传递`nil`作为此参数，但为了最佳实践，包含日志记录更为安全。\n\
    \n如果你多次运行应用程序并更改名称，可以累积一些不同的数据来显示。图 11-19 显示了应用程序在运行几次以收集一些数据后的情况。\n\n![Image](images/9781430240051_Fig11-19.jpg)\n\
    \n**Figure 11–19.** *应用程序保存并创建新数据*\n\n为了让程序运行得更好，你可以继续实现`-add`方法，以便从应用程序内部创建新数据。通常，你会希望创建单独的视图控制器，允许用户输入新对象的信息，但就本教程而言，关键概念仅仅是能够添加对象。\n\
    \n```\n-(void)add\n{\n    NSManagedObject *add = [[NSManagedObject alloc]\ninitWithEntity:self.entityDescription\n\
    insertIntoManagedObjectContext:self.managedObjectContext];\n    if (![self.entityDescription.name\
    \ isEqualToString:@\"Instrument\"])\n    {\n        [add setValue:@\"Peter\" forKey:@\"\
    name\"];\n        [add setValue:[NSNumber numberWithInt:35] forKey:@\"age\"];\n\
    \    }\n    else\n    {\n        [add setValue:@\"Guitar\" forKey:@\"name\"];\n\
    \        [add setValue:@\"Strings\" forKey:@\"family\"];\n    }\n\n    NSError\
    \ *error;\n    BOOL success = [self.managedObjectContext save:&error];\n    if\
    \ (!success)\n    {\n        NSLog(@\"%@\", [error localizedDescription]);\n \
    \   }\n\n    [self fetchResults];\n\n    [self.tableViewMain reloadData];\n}\n\
    ```\n\n在上述方法中，你必须确保在创建新对象后、重新加载`UITableView`的数据之前调用`-fetchResults`方法，以确保你的`NSFetchedResultsController`包含最新的更改。\n\
    \n正如 Core Data 使得`UITableView`的填充变得非常容易一样，结合 Core Data 类实现从`UITableView`中删除项目也非常简单。你可以像这样实现`UITableView`的`-tableView:commitEditingStyle:forRowAtIndexPath:`方法：\n\
    \n```\n-(void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\
    \ forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
    \    {\n        NSManagedObject *deleted = [self.fetchedResultsController\nobjectAtIndexPath:indexPath];\n\
    \        [self.managedObjectContext deleteObject:deleted];\n        NSError *error;\n\
    \        BOOL success = [self.managedObjectContext save:&error];\n        if (!success)\n\
    \        {\n            NSLog(@\"%@\", [error localizedDescription]);\n      \
    \  }\n        [self fetchResults];\n        [self.tableViewMain deleteRowsAtIndexPaths:[NSArray\
    \ arrayWithObject:indexPath]\nwithRowAnimation:UITableViewRowAnimationRight];\n\
    \    }\n}\n```\n\n虽然允许用户通过滑动行来删除肯定是可行的，但通常最好也提供一个编辑按钮，以防用户不熟悉滑动功能。为此，你首先需要对`-viewDidLoad`方法进行简单的调整，以创建该按钮，调整后的方法如下：\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    self.tableViewMain.delegate\
    \ = self;\n    self.tableViewMain.dataSource = self;\n\n    /////Adjusted code\
    \ to add Edit button\n    UIBarButtonItem *addButton = [[UIBarButtonItem alloc]\n\
    initWithBarButtonSystemItem:UIBarButtonSystemItemAdd target:self action:@selector(add)];\n\
    \    UIBarButtonItem *editButton = self.editButtonItem;\n    self.navigationItem.rightBarButtonItems\
    \ = [NSArray arrayWithObjects:addButton,\neditButton, nil];\n    /////End of adjusted\
    \ code\n\n    [self fetchResults];\n}\n```\n\n现在，你只需要快速实现`-setEditing:animated:`方法，就能获得漂亮的动画效果。\n\
    \n```\n-(void)setEditing:(BOOL)editing animated:(BOOL)animated\n{\n    [super\
    \ setEditing:editing animated:animated];\n    [self.tableViewMain setEditing:editing\
    \ animated:animated];\n}\n```\n\n现在运行你的应用程序，你会注意到不仅可以添加，还可以从表格中删除信息，如图 11-20 所示。\n\
    \n![Image](images/9781430240051_Fig11-20.jpg)\n\n**Figure 11-20.** *应用程序，添加和删除数据*"
  raw: 'The configuration for each of your `MainTableViewController`s was fairly simple,
    with all you had to do being to set up an `NSEntityDescription`, give it a pointer
    to your `NSManagedObjectContext`, and then give it a title to display in your
    `UITabBarController`.


    At this point, if you run your application, all you''ll see is a few empty tables
    (just as in [Figure 11-17](#Chapter11.html#fig_11_17)), and with good reason.
    You don''t have any data yet! Unfortunately, you haven''t built your `-add` method
    yet, so don''t go pressing that + button until you do, since you will crash your
    application.


    ![Image](images/9781430240051_Fig11-17.jpg)


    **Figure 11-17.** *Your three empty `UITableView`s*


    For your preliminary recipe, you can start by simply programmatically creating
    a new object in each view controller to be displayed. Add the following code to
    your `MainViewController`''s `-viewDidLoad` method, making sure it is before the
    call to `-fetchResults`.


    `NSManagedObject *add = [[NSManagedObject alloc] initWithEntity:self.entityDescription`

    `insertIntoManagedObjectContext:self.managedObjectContext];`

    `    if (![self.entityDescription.name isEqualToString:@"Instrument"])`

    `    {`

    `        [add setValue:@"Jim" forKey:@"name"];`

    `        [add setValue:[NSNumber numberWithInt:42] forKey:@"age"];`

    `    }`

    `    else`

    `    {`

    `        [add setValue:@"Trumpet" forKey:@"name"];`

    `        [add setValue:@"Brass" forKey:@"family"];`

    `    }`


    Now when you run the app, some temporary data will be displayed, as shown by [Figure
    11-18](#Chapter11.html#fig_11_18).


    ![Image](images/9781430240051_Fig11-18.jpg)


    **Figure 11–18.** *Your semi-populated `UITableView`*


    While you have created a new instance of each of your entities in your `NSManagedObjectContext`,
    you''ll probably notice that these objects are not persisting every time you run
    this application, as you are not seeing an increasing list with every run. This
    is because you did not save the changes you made to the `NSManagedObjectContext`.
    You can do this by adding the following after the previous additions, but still
    before the call to `-fetchRequest`.


    `NSError *error;`

    `    BOOL success = [self.managedObjectContext save:&error];`

    `    if (!success)`

    `    {`

    `        NSLog(@"%@", [error localizedDescription]);`

    `    }`


    You''ll notice that this is very similar to the `-performFetch:` method that you
    used in `-fetchResults`, in that you send it a pointer to an instance of `NSError`
    in order to log any issues. As with before, this is totally optional, and you
    could pass `nil` as this parameter, but for best practices it is safer to include
    the logging.


    If you run your application a few times, changing the name, you can accumulate
    a few different pieces of data to display. [Figure 11-19](#Chapter11.html#fig_11_19)
    shows your application after having been run a few times to collect some data.


    ![Image](images/9781430240051_Fig11-19.jpg)


    **Figure 11–19.** *Your app preserving and creating new data*


    To make your program run a bit better, you can go ahead and implement that `-add`
    method, so that you can create new data from inside the app. Typically, you would
    want to create separate view controllers to allow the user to input the information
    for a new object, but for your purposes, the key concept is simply to be able
    to add objects.


    `-(void)add`

    `{`

    `    NSManagedObject *add = [[NSManagedObject alloc]`

    `initWithEntity:self.entityDescription`

    `insertIntoManagedObjectContext:self.managedObjectContext];`

    `    if (![self.entityDescription.name isEqualToString:@"Instrument"])`

    `    {`

    `        [add setValue:@"Peter" forKey:@"name"];`

    `        [add setValue:[NSNumber numberWithInt:35] forKey:@"age"];`

    `    }`

    `    else`

    `    {`

    `        [add setValue:@"Guitar" forKey:@"name"];`

    `        [add setValue:@"Strings" forKey:@"family"];`

    `    }`


    `    NSError *error;`

    `    BOOL success = [self.managedObjectContext save:&error];`

    `    if (!success)`

    `    {`

    `        NSLog(@"%@", [error localizedDescription]);`

    `    }`


    `    [self fetchResults];`


    `    [self.tableViewMain reloadData];`

    `}`


    In the previous method, you must make sure to call the `-fetchResults` method
    once you are done creating the new object, but before you reload your `UITableView`''s
    data, in order to make sure that your `NSFetchedResultsController` contains the
    most recent changes.


    Just as Core Data makes a `UITableView` very easy to populate, it is also very
    easy to implement deletion of items from a `UITableView` in conjunction with the
    Core Data classes. You can implement your `UITableView`''s `-tableView:commitEditingStyle:forRowAtIndexPath:`
    like so:


    `-(void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle
    forRowAtIndexPath:(NSIndexPath *)indexPath`

    `{`

    `    if (editingStyle == UITableViewCellEditingStyleDelete)`

    `    {`

    `        NSManagedObject *deleted = [self.fetchedResultsController`

    `objectAtIndexPath:indexPath];`

    `        [self.managedObjectContext deleteObject:deleted];`

    `        NSError *error;`

    `        BOOL success = [self.managedObjectContext save:&error];`

    `        if (!success)`

    `        {`

    `            NSLog(@"%@", [error localizedDescription]);`

    `        }`

    `        [self fetchResults];`

    `        [self.tableViewMain deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]`

    `withRowAnimation:UITableViewRowAnimationRight];`

    `    }`

    `}`


    While it is certainly possible to allow deletion only by having the user swipe
    over a row, it is generally a good idea to also provide an Edit button, in case
    the user is unfamiliar with the swiping functionality. To do this, you first need
    to make a simple adjustment to your `-viewDidLoad` method to create the button,
    which will now resemble the following:


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`


    `    self.tableViewMain.delegate = self;`

    `    self.tableViewMain.dataSource = self;`


    `    /////Adjusted code to add Edit button`

    `    UIBarButtonItem *addButton = [[UIBarButtonItem alloc]`

    `initWithBarButtonSystemItem:UIBarButtonSystemItemAdd target:self action:@selector(add)];`

    `    UIBarButtonItem *editButton = self.editButtonItem;`

    `    self.navigationItem.rightBarButtonItems = [NSArray arrayWithObjects:addButton,`

    `editButton, nil];`

    `    /////End of adjusted code`


    `    [self fetchResults];`

    `}`


    Now you just need a quick implementation of the `-setEditing:animated:` method
    to get your nice little animations correct.


    `-(void)setEditing:(BOOL)editing animated:(BOOL)animated`

    `{`

    `    [super setEditing:editing animated:animated];`

    `    [self.tableViewMain setEditing:editing animated:animated];`

    `}`


    Upon running your app now, you''ll notice you can not only add, but also delete
    information from your table, just as is done in [Figure 11-20](#Chapter11.html#fig_11_20).


    ![Image](images/9781430240051_Fig11-20.jpg)


    **Figure 11-20.** *Your app, adding and deleting data*'
