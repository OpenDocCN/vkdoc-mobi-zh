- fmt: '# Multimedia Recipes


    In the words of Aldous Huxley, “After silence, that which comes nearest to expressing
    the inexpressible is music.” We live in a world where we are surrounded by sound
    and music. From the most subtle background tune in an advertisement, to the immense
    blast of the electric guitar at a rock concert, sound plays an integral part in
    our world in all its varieties, and to ignore this fact in our development process
    would be detrimental to both the user experience and the developer community.
    Music and audio have a tremendous impact on our lives, and as developers, it is
    our responsibility to translate this force into our applications in order to bring
    the most complete and ideal experience to users, even if they don’t even notice.


    Throughout this chapter, a variety of recipes will make use of accessing the iPod
    library on the device on which the app is run. In order to fully test these, you
    should ensure that there are at least a few songs in your device’s music library.


    ## Recipe 7–1: Playing Audio


    If you ask almost any random person what they think of when they hear the words
    “iPhone” and “audio,” they will probably be thinking along the lines of their
    iPod and the thousands of songs they have downloaded. What most users tend to
    overlook, despite its immense importance, is the concept of background audio and
    sound effects. These sound clips and tunes may go completely unnoticed by the
    user in normal use, but in terms of app functionality and design they can tremendously
    improve the quality of an app. It may be the little “shutter click” when you take
    a picture, or the background music of a game that gets stuck in your head after
    you play it for too long, but regardless of whether the user notices, it can make
    a world of difference. The iOS “AV Foundation” framework provides an incredibly
    simple way to access, play, and manipulate sound files, known as the `AVAudioPlayer`.
    Here you will create a sample project that will allow you to play an audio file,
    as well as allow the user to manipulate the clip’s playback.


    First, you will create a new project, naming it “Chapter7Recipe1”. Here, I have
    used the class prefix “Player”. As with most of the previous recipes, you can
    use the Single View Application template to make your project. Ensure the Storyboard
    check box is unchecked, while the Use Automatic Reference Counting box is checked,
    so that your configuration resembles [Figure 7–1](#Chapter07.html#fig_7_1).


    ![Image](images/9781430240051_Fig07-01.jpg)


    **Figure 7–1.** *Configuring your project’s settings*


    The first thing you need to do is link your project with a few frameworks that
    you will use to play your sound. Select your project in the navigation pane, and
    then navigate to **Targets** ![Image](images/U001.jpg) **SoundCheck**. Select
    the Build Phases tab, and drop down the section titled “Link Binary With Libraries”,
    as shown in [Figure 7–2](#Chapter07.html#fig_7_2).


    ![Image](images/9781430240051_Fig07-02.jpg)


    **Figure 7–2.** *Project before adding frameworks*


    Next, click the + button, and add the following two frameworks:


    1.  *AV Foundation*: This includes the `AVAudioPlayer` class, which you will be
    using to play audio.

    2.  *Audio Toolbox*: You will use this framework to implement a button to play
    the “vibrate” sound on your device.


    Next, switch over to your view controller’s header file. You will import your
    frameworks’ header files by adding the following import statements:


    ```

    #import <AVFoundation/AVFoundation.h>

    #import <AudioToolbox/AudioToolbox.h>

    ```


    Now you will go build your view in the view controller''s XIB file. You will be
    creating your view to include sliders for your audio player''s `pan`, `volume`,
    and `rate`, as well as buttons that will play and pause the player, and a third
    button to play the device''s “vibrate” system sound. You will also be monitoring
    your audio player''s channel levels via labels at the top of the view. Set up
    your view so it looks like [Figure 7–3](#Chapter07.html#fig_7_3).


    ![Image](images/9781430240051_Fig07-03.jpg)


    **Figure 7–3.** *Your view controller''s XIB file with default values set*


    You need your slider''s values to match the possible values of the properties
    they control. Using the Attribute inspector, adjust the minimum and maximum values
    of your “rate” slider to 0.5 and 2.0 (corresponding to half speed and 2x speed),
    respectively, and the same values for the “pan” slider to -1 and 1 (correspond
    to left pan and right pan). The “volume” slider''s default values should already
    be fine, as the volume property goes from 0 to 1.'
  raw: '## Multimedia Recipes


    In the words of Aldous Huxley, “After silence, that which comes nearest to expressing
    the inexpressible is music.” We live in a world where we are surrounded by sound
    and music. From the most subtle background tune in an advertisement, to the immense
    blast of the electric guitar at a rock concert, sound plays an integral part in
    our world in all its varieties, and to ignore this fact in our development process
    would be detrimental to both the user experience and the developer community.
    Music and audio have a tremendous impact on our lives, and as developers, it is
    our responsibility to translate this force into our applications in order to bring
    the most complete and ideal experience to users, even if they don’t even notice.


    Throughout this chapter, a variety of recipes will make use of accessing the iPod
    library on the device on which the app is run. In order to fully test these, you
    should ensure that there are at least a few songs in your device’s music library.


    ### Recipe 7–1: Playing Audio


    If you ask almost any random person what they think of when they hear the words
    “iPhone” and “audio,” they will probably be thinking along the lines of their
    iPod and the thousands of songs they have downloaded. What most users tend to
    overlook, despite its immense importance, is the concept of background audio and
    sound effects. These sound clips and tunes may go completely unnoticed by the
    user in normal use, but in terms of app functionality and design they can tremendously
    improve the quality of an app. It may be the little “shutter click” when you take
    a picture, or the background music of a game that gets stuck in your head after
    you play it for too long, but regardless of whether the user notices, it can make
    a world of difference. The iOS “AV Foundation” framework provides an incredibly
    simple way to access, play, and manipulate sound files, known as the `AVAudioPlayer`.
    Here you will create a sample project that will allow you to play an audio file,
    as well as allow the user to manipulate the clip’s playback.


    First, you will create a new project, naming it “Chapter7Recipe1”. Here, I have
    used the class prefix “Player”. As with most of the previous recipes, you can
    use the Single View Application template to make your project. Ensure the Storyboard
    check box is unchecked, while the Use Automatic Reference Counting box is checked,
    so that your configuration resembles [Figure 7–1](#Chapter07.html#fig_7_1).


    ![Image](images/9781430240051_Fig07-01.jpg)


    **Figure 7–1.** *Configuring your project’s settings*


    The first thing you need to do is link your project with a few frameworks that
    you will use to play your sound. Select your project in the navigation pane, and
    then navigate to **Targets** ![Image](images/U001.jpg) **SoundCheck**. Select
    the Build Phases tab, and drop down the section titled “Link Binary With Libraries”,
    as shown in [Figure 7–2](#Chapter07.html#fig_7_2).


    ![Image](images/9781430240051_Fig07-02.jpg)


    **Figure 7–2.** *Project before adding frameworks*


    Next, click the + button, and add the following two frameworks:


    1.  *AV Foundation*: This includes the `AVAudioPlayer` class, which you will be
    using to play audio.

    2.  *Audio Toolbox*: You will use this framework to implement a button to play
    the “vibrate” sound on your device.


    Next, switch over to your view controller’s header file. You will import your
    frameworks’ header files by adding the following import statements:


    `#import <AVFoundation/AVFoundation.h>`

    `#import <AudioToolbox/AudioToolbox.h>`


    Now you will go build your view in the view controller''s XIB file. You will be
    creating your view to include sliders for your audio player''s `pan`, `volume`,
    and `rate`, as well as buttons that will play and pause the player, and a third
    button to play the device''s “vibrate” system sound. You will also be monitoring
    your audio player''s channel levels via labels at the top of the view. Set up
    your view so it looks like [Figure 7–3](#Chapter07.html#fig_7_3).


    ![Image](images/9781430240051_Fig07-03.jpg)


    **Figure 7–3.** *Your view controller''s XIB file with default values set*


    You need your slider''s values to match the possible values of the properties
    they control. Using the Attribute inspector, adjust the minimum and maximum values
    of your “rate” slider to 0.5 and 2.0 (corresponding to half speed and 2x speed),
    respectively, and the same values for the “pan” slider to -1 and 1 (correspond
    to left pan and right pan). The “volume” slider''s default values should already
    be fine, as the volume property goes from 0 to 1.'
  trans: '

    # 多媒体食谱


    阿尔道斯·赫胥黎曾言：“除却静默，最能表达难以言传之意的便是音乐。”我们生活在一个被声音和音乐包围的世界里。从广告中最微妙的背景曲调，到摇滚音乐会上电吉他的巨大轰鸣，声音以其千变万化的形式在我们的世界中扮演着不可或缺的角色。在开发过程中忽视这一事实，无论对用户体验还是开发者社区都将是莫大的损失。音乐和音频对我们的生活有着巨大影响，作为开发者，我们有责任将这种力量融入我们的应用，从而为用户带来最完整、最理想的体验——即便他们自己都未曾察觉。


    本章的多个食谱将涉及访问应用运行设备上的 iPod 资料库。为了充分测试这些内容，请确保你的设备音乐资料库中至少存有几首歌曲。


    ## 食谱 7–1：播放音频


    如果你随机问一个人，听到“iPhone”和“音频”这两个词时会想到什么，他们很可能联想到自己的 iPod 和下载的数千首歌曲。然而，尽管背景音频和音效极其重要，却往往被大多数用户所忽视。这些音效片段和曲调在日常使用中可能完全不被用户注意，但就应用的功能和设计而言，它们能极大地提升应用品质。可能是拍照时那声细微的“快门咔嗒声”，也可能是游戏里玩得太久而萦绕脑海的背景音乐——无论用户是否察觉，它们都能带来天壤之别。iOS
    的“AV Foundation”框架提供了一种极其简单的方式来访问、播放和操作声音文件，即 `AVAudioPlayer`。接下来，你将创建一个示例项目，既能播放音频文件，也允许用户操控音轨的播放。


    首先，创建一个新项目，命名为“Chapter7Recipe1”。此处，我使用了类前缀“Player”。与之前大部分食谱一样，你可以使用“单视图应用”模板来创建项目。确保“使用故事板”复选框未选中，而“使用自动引用计数”复选框已选中，这样你的配置就如图
    7–1 所示。


    ![图片](img/9781430240051_Fig07-01.jpg)


    **图 7–1.** *配置项目设置*


    你需要做的第一件事是将项目与将要用于播放声音的几个框架进行链接。在导航窗格中选择你的项目，然后导航至 **Targets** ![图片](img/U001.jpg)
    **SoundCheck**。选择“构建阶段”标签页，展开“Link Binary With Libraries”部分，如图 7–2 所示。


    ![图片](img/9781430240051_Fig07-02.jpg)


    **图 7–2.** *添加框架前的项目*


    接下来，点击 + 按钮，添加以下两个框架：


    1.  *AV Foundation*：包含 `AVAudioPlayer` 类，你将用它来播放音频。

    2.  *Audio Toolbox*：你将使用此框架实现一个按钮，用于在设备上播放“震动”音效。


    接着，切换到视图控制器的头文件。你需要通过添加以下导入语句来导入框架的头文件：


    ```

    #import <AVFoundation/AVFoundation.h>

    #import <AudioToolbox/AudioToolbox.h>

    ```


    现在，你将在视图控制器的 XIB 文件中构建视图。你将创建的视图包含用于控制音频播放器 `pan`、`volume` 和 `rate` 属性的滑块，以及播放和暂停的按钮，还有一个用于播放设备“震动”系统声音的按钮。你还将通过视图顶部的标签来监控音频播放器的声道电平。请将你的视图设置成如图
    7–3 所示。


    ![图片](img/9781430240051_Fig07-03.jpg)


    **图 7–3.** *设置了默认值的视图控制器 XIB 文件*


    你需要确保滑块的值与其控制的属性可能的值相匹配。使用属性检查器，将“rate”滑块的最小值和最大值分别调整为 0.5 和 2.0（对应半速和 2 倍速），并将“pan”滑块的最小值和最大值分别调整为
    -1 和 1（对应左声道和右声道）。“volume”滑块的默认值应该没问题，因为音量属性的范围是 0 到 1。

