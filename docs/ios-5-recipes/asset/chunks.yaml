- fmt: "# Gesture Recognizers\n\nIn iOS you are able to improve the functionality\
    \ of your application by adding \"gesture recognizers\" to instances or subclasses\
    \ of `UIView`. \"Gesture\" refers to a touch-based event driven by the user, such\
    \ as a tap, swipe, or pinch. These elements can then perform actions in your application,\
    \ extending your normal functionality. Though it is possible to create your own\
    \ subclasses of `UIGestureRecognizer`, you will focus on those already incorporated\
    \ into iOS 5.0.\n\nWhenever using a `UIGestureRecognizer`, it is important to\
    \ remember that a large percentage of users will not know to look for the existence\
    \ of the gestures that you can implement. Therefore, you should implement a `UIGestureRecognizer`\
    \ only in order to expedite a task that can be performed elsewhere. Essential\
    \ functions should not be built into these without explicitly informing the user.\n\
    \nThe `UIGestureRecognizer` class is itself an abstract class that defines the\
    \ behavior of multiple subclasses, each representing different gestures. However,\
    \ no matter the subclass, a gesture recognizer is added to any `UIView` by use\
    \ of the `-addGestureRecognizer:` method. To add an instance of `UITapGestureRecognizer`\
    \ called `tapGesture` to your entire view controller's view, for example, you\
    \ write the following:\n\n`[self.view addGestureRecognizer:tapGesture];`\n\n**TIP:**\
    \ Any subclass of `UIGestureRecognizer` can be added to any instance or subclass\
    \ of `UIView`, so you can easily build custom gesture functionality into nearly\
    \ any element, resulting in very flexible applications.\n\nSome elements, such\
    \ as `UILabel`s, will not respond to any `UIGestureRecognizer`s unless their `userInteractionEnabled`\
    \ property is set to `YES`.\n\nThe `UIGestureRecognizer` property `state` allows\
    \ you to evaluate the current condition of any specific subclass as its gesture\
    \ is recognized. It has multiple different possible values, each representing\
    \ a possible step of the gesture recognition process:\n\n1. `UIGestureRecognizerStatePossible`:\
    \ Indicates a gesture is possibly in the process of being performed, but its requirements\
    \ have not yet been met\n2. `UIGestureRecognizerStateBegan`: Indicates a continuous\
    \ gesture has been recognized and is continuing\n3. `UIGestureRecognizerStateChanged`:\
    \ Signifies a change to an already begun continuous gesture\n4. `UIGestureRecognizerStateEnded`:\
    \ Indicates a gesture has finished\n5. `UIGestureRecognizerStateCancelled`: A\
    \ gesture recognizer has received touches to cancel a continuous gesture.\n6.\
    \ `UIGestureRecognizerStateRecognized`: Equivalent to `UIGestureRecognizerStateEnded`\n\
    \nEspecially when dealing with continuous gestures, you can run into an issue\
    \ where several of these states cause a `UIGestureRecognizer` to perform its action,\
    \ resulting in a method being called repeatedly unnecessarily. By checking the\
    \ `state` property for specific states, you can help avoid this.\n\nIdeally, you\
    \ will set up a single method to be called by any and all instances of `UIGestureRecognizer`\
    \ subclasses, and simply differentiate them inside the method. You can make use\
    \ of the `+isKindOfClass` method, as well as the multiple properties of each subclass,\
    \ and even the view the gesture was recognized in, in order to identify which\
    \ of multiple `UIGestureRecognizer` objects performed your action. This action\
    \ will have the following handler:\n\n`-(void)handleGesture:(UIGestureRecognizer\
    \ *)gestureRecognizer;`\n\nAnother useful functionality that all `UIGestureRecognizer`\
    \ subclasses inherit is the ability to determine exactly where in a view the gesture\
    \ was performed through the use of the `-locationInView:` and `-locationOfTouch:inView:`\
    \ methods. By using these values, you can easily adjust your application's behavior\
    \ depending on the specific location of a touch within a single view. One example\
    \ of this would be to draw at the point of a user's touch, allowing users to essentially\
    \ draw on their screen.\n\nAll subclasses of `UIGestureRecognizer` inherit the\
    \ `delegate` property, which can be set to the view controller containing the\
    \ recognizer's view. This property conforms to the `UIGestureRecognizerDelegate`\
    \ protocol, and allows the view controller extra control in responding to gestures.\n\
    \nMultiple subclasses of `UIGestureRecognizer` allow for gestures that require\
    \ multiple touches to be recognized. When dealing with these, it is important\
    \ to keep in mind the maximum number of touches each device can handle. As of\
    \ the writing of this text, the iPhone can handle up to five touches, while the\
    \ iPad can handle up to eleven.\n\n## UITapGestureRecognizer\n\nA `UITapGestureRecognizer`\
    \ recognizes, as you can guess, when the user taps on its assigned view.\n\nYou\
    \ are able to create very specific gesture functionalities by adjusting the `numberOfTapsRequired`\
    \ and `numberOfTouchesRequired`. By setting both properties to 2, for example,\
    \ you can look specifically for events of when the user taps the screen twice\
    \ with two fingers. Your configuration would look like so:\n\n```\nUITapGestureRecognizer\
    \ *tapGesture = [[UITapGestureRecognizer alloc] initWithTarget:self\naction:@selector(handleGesture:)];\n\
    \ntapGesture.numberOfTapsRequired = 2;\ntapGesture.numberOfTouchesRequired = 2;\n\
    [self.view addGestureRecognizer:tapGesture];\n```\n\nWhen you implement `handleGesture:`,\
    \ you should make sure to look for the `UIGestureRecognizerStateEnded` state with\
    \ any `UITapGestureRecognizer`.\n\n## UISwipeGestureRecognizer\n\nThe `UISwipeGestureRecognizer`\
    \ recognizes when the user swipes across a screen with one or more fingers. The\
    \ swipe is a discrete gesture, so its action is called only once.\n\nThe `UISwipeGestureRecognizer`\
    \ class has the property `direction`, which specifies the direction in which the\
    \ swipe must occur to be recognized. Possible values are `UISwipeGestureRecognizerDirectionRight`,\
    \ `UISwipeGestureRecognizerDirectionLeft`, `UISwipeGestureRecognizerDirectionUp`,\
    \ and `UISwipeGestureRecognizerDirectionDown`.\n\nThis class also has a `numberOfTouchesRequired`,\
    \ allowing you to specify multi-touch swipe gestures in your application.\n\n\
    ## UIPanGestureRecognizer\n\nThe `UIPanGestureRecognizer` class recognizes \"\
    panning\" gestures, which are continuous gestures. As such, you generally perform\
    \ actions with them in reaction to either the `UIGestureRecognizerStateChanged`\
    \ or `UIGestureRecognizerStateEnded` states.\n\nPan gestures can be configured\
    \ with both minimum and maximum numbers of touches, allowing you to create a range\
    \ of allowable touch numbers. Use the `maximumNumberOfTouches` and `minimumNumberOfTouches`\
    \ properties to implement this.\n\nWith a `UIPanGestureRecognizer`, you can access\
    \ the distance moved, as well as the velocity of a gesture, through the use of\
    \ the `-translationInView:` and `-velocityInView:` methods.\n\nIn most cases of\
    \ using a `UIPanGestureRecognizer`, it is important to reset the translation and/or\
    \ velocity values of the pan gesture after acquiring and using them. If you don't,\
    \ your values will accumulate, resulting in abnormally large values very quickly.\n\
    \nThe following is a sample implementation, extracted from your `-handleGesture:`\
    \ method, to drag and drop the view that your pan was recognized in.\n\n```\n\
    if ([gestureRecognizer isKindOfClass:[UIPanGestureRecognizer class]])\n    {\n\
    UIPanGestureRecognizer *pan = (UIPanGestureRecognizer *)gestureRecognizer;\nif\
    \ (pan.state == UIGestureRecognizerStateChanged || pan.state == UIGestureRecognizerStateEnded)\n\
    \        {\nCGPoint movement = [pan translationInView:pan.view];\n           \
    \ [pan.view setCenter:CGPointMake(pan.view.center.x + movement.x, pan.view.center.y\
    \ + movement.y)];\n            [pan setTranslation:CGPointZero inView:pan.view];\n\
    \        }\n    }\n```\n\nIf you did not reset your translation to zero after\
    \ moving your view, your translations would build up rapidly, violently throwing\
    \ your view off of the screen.\n\nIf you experience a Linker error when using\
    \ the `CGPointZero` value, add the `CoreGraphics.framework` library to your project."
  raw: '### Gesture Recognizers


    In iOS you are able to improve the functionality of your application by adding
    “gesture recognizers” to instances or subclasses of `UIView`. “Gesture” refers
    to a touch-based event driven by the user, such as a tap, swipe, or pinch. These
    elements can then perform actions in your application, extending your normal functionality.
    Though it is possible to create your own subclasses of `UIGestureRecognizer`,
    you will focus on those already incorporated into iOS 5.0.


    Whenever using a `UIGestureRecognizer`, it is important to remember that a large
    percentage of users will not know to look for the existence of the gestures that
    you can implement. Therefore, you should implement a `UIGestureRecognizer`onlyin
    order to expedite a task that can be performed elsewhere. Essential functions
    should not be built into these without explicitly informing the user.


    The `UIGestureRecognizer` class is itself an abstract class that defines the behavior
    of multiple subclasses, each representing different gestures. However, no matter
    the subclass, a gesture recognizer is added to any `UIView` by use of the `-addGestureRecognizer:`
    method. To add an instance of `UITapGestureRecognizer` called `tapGesture` to
    your entire view controller’s view, for example, you write the following:


    `[self.view addGestureRecognizer:tapGesture];`


    **TIP:** Any subclass of `UIGestureRecognizer` can be added to any instance or
    subclass of `UIView`, so you can easily build custom gesture functionality into
    nearly any element, resulting in very flexible applications.


    Some elements, such as `UILabel`s, will not respond to any `UIGestureRecognizer`s
    unless their `userInteractionEnabled` property is set to `YES`.


    The `UIGestureRecognizer` property `state` allows you to evaluate the current
    condition of any specific subclass as its gesture is recognized. It has multiple
    different possible values, each representing a possible step of the gesture recognition
    process:


    1.  `UIGestureRecognizerStatePossible`: Indicates a gesture is possibly in the
    process of being performed, but its requirements have not yet been met

    2.  `UIGestureRecognizerStateBegan`: Indicates a continuous gesture has been recognized
    and is continuing

    3.  `UIGestureRecognizerStateChanged`: Signifies a change to an already begun
    continuous gesture

    4.  `UIGestureRecognizerStateEnded`: Indicates a gesture has finished

    5.  `UIGestureRecognizerStateCancelled`: A gesture recognizer has received touches
    to cancel a continuous gesture.

    6.  `UIGestureRecognizerStateRecognized`: Equivalent to `UIGestureRecognizerStateEnded`


    Especially when dealing with continuous gestures, you can run into an issue where
    several of these states cause a `UIGestureRecognizer` to perform its action, resulting
    in a method being called repeatedly unnecessarily. By checking the `state` property
    for specific states, you can help avoid this.


    Ideally, you will set up a single method to be called by any and all instances
    of `UIGestureRecognizer` subclasses, and simply differentiate them inside the
    method. You can make use of the `+isKindOfClass` method, as well as the multiple
    properties of each subclass, and even the view the gesture was recognized in,
    in order to identify which of multiple `UIGestureRecognizer` objects performed
    your action. This action will have the following handler:


    `-(void)handleGesture:(UIGestureRecognizer *)gestureRecognizer;`


    Another useful functionality that all `UIGestureRecognizer` subclasses inherit
    is the ability to determine exactly where in a view the gesture was performed
    through the use of the `-locationInView:` and `-locationOfTouch:inView:` methods.
    By using these values, you can easily adjust your application’s behavior depending
    on the specific location of a touch within a single view. One example of this
    would be to draw at the point of a user’s touch, allowing users to essentially
    draw on their screen.


    All subclasses of `UIGestureRecognizer` inherit the `delegate` property, which
    can be set to the view controller containing the recognizer’s view. This property
    conforms to the`UIGestureRecognizerDelegate` protocol, and allows the view controller
    extra control in responding to gestures.


    Multiple subclasses of `UIGestureRecognizer` allow for gestures that require multiple
    touches to be recognized. When dealing with these, it is important to keep in
    mind the maximum number of touches each device can handle. As of the writing of
    this text, the iPhone can handle up to five touches, while the iPad can handle
    up to eleven.


    #### UITapGestureRecognizer


    A `UITapGestureRecognizer` recognizes, as you can guess, when the user taps on
    its assigned view.


    You are able to create very specific gesture functionalities by adjusting the
    `numberOfTapsRequired` and `numberOfTouchesRequired`. By setting both properties
    to 2, for example, you can look specifically for events of when the user taps
    the screen twice with two fingers. Your configuration would look like so:


    `UITapGestureRecognizer *tapGesture = [[UITapGestureRecognizer alloc] initWithTarget:self`

    `action:@selector(handleGesture:)];`


    `tapGesture.numberOfTapsRequired = 2;`

    `tapGesture.numberOfTouchesRequired = 2;`

    `[self.view addGestureRecognizer:tapGesture];`


    When you implement `handleGesture:`, you should make sure to look for the `UIGestureRecognizerStateEnded`
    state with any `UITapGestureRecognizer`.


    #### UISwipeGestureRecognizer


    The `UISwipeGestureRecognizer` recognizes when the user swipes across a screen
    with one or more fingers. The swipe is a discrete gesture, so its action is called
    only once.


    The `UISwipeGestureRecognizer` class has the property `direction`, which specifies
    the direction in which the swipe must occur to be recognized. Possible values
    are `UISwipeGestureRecognizerDirectionRight`, `UISwipeGestureRecognizerDirectionLeft`,
    `UISwipeGestureRecognizerDirectionUp`, and `UISwipeGestureRecognizerDirectionDown`.


    This class also has a `numberOfTouchesRequired`, allowing you to specify multi-touch
    swipe gestures in your application.


    #### UIPanGestureRecognizer


    The `UIPanGestureRecognizer` class recognizes “panning” gestures, which are continuous
    gestures. As such, you generally perform actions with them in reaction to either
    the `UIGestureRecognizerStateChanged` or `UIGestureRecognizerStateEnded` states.


    Pan gestures can be configured with both minimum and maximum numbers of touches,
    allowing you to create a range of allowable touch numbers. Use the `maximumNumberOfTouches`
    and `minimumNumberOfTouches` properties to implement this.


    With a `UIPanGestureRecognizer`, you can access the distance moved, as well as
    the velocity of a gesture, through the use of the `-translationInView:` and `-velocityInView:`
    methods.


    In most cases of using a `UIPanGestureRecognizer`, it is important to reset the
    translation and/or velocity values of the pan gesture after acquiring and using
    them. If you don’t, your values will accumulate, resulting in abnormally large
    values very quickly.


    The following is a sample implementation, extracted from your `-handleGesture:`
    method, to drag and drop the view that your pan was recognized in.


    `if ([gestureRecognizer isKindOfClass:[UIPanGestureRecognizer class]])`

    `    {`

    `UIPanGestureRecognizer *pan = (UIPanGestureRecognizer *)gestureRecognizer;`

    `if (pan.state == UIGestureRecognizerStateChanged || pan.state == UIGestureRecognizerStateEnded)`

    `        {`

    `CGPoint movement = [pan translationInView:pan.view];`

    `            [pan.view setCenter:CGPointMake(pan.view.center.x + movement.x, pan.view.center.y
    + movement.y)];`

    `            [pan setTranslation:CGPointZero inView:pan.view];`

    `        }`

    `    }`


    If you did not reset your translation to zero after moving your view, your translations
    would build up rapidly, violently throwing your view off of the screen.


    If you experience a Linker error when using the `CGPointZero` value, add the `CoreGraphics.framework`
    library to your project.'
  trans: "\n# 手势识别器\n\n在 iOS 中，你可以通过向 `UIView` 的实例或子类添加“手势识别器”来增强应用的功能。“手势”指的是用户驱动的基于触摸的事件，例如点击、滑动或捏合。这些元素可以在应用中执行操作，从而扩展常规功能。虽然你可以创建自己的\
    \ `UIGestureRecognizer` 子类，但本文将重点介绍 iOS 5.0 中已集成的手势识别器。\n\n使用 `UIGestureRecognizer`\
    \ 时，务必记住大部分用户不会主动寻找你能实现的手势。因此，你应该仅在为了加快可经由其他途径执行的任务时，才实现一个 `UIGestureRecognizer`。除非明确告知用户，否则不应将关键功能构建在其中。\n\
    \n`UIGestureRecognizer` 类本身是一个抽象类，定义了多个子类的行为，每个子类代表不同的手势。但无论使用哪个子类，手势识别器都是通过 `-addGestureRecognizer:`\
    \ 方法添加到任意 `UIView` 上的。例如，要将一个名为 `tapGesture` 的 `UITapGestureRecognizer` 实例添加到整个视图控制器的视图上，你可以编写如下代码：\n\
    \n`[self.view addGestureRecognizer:tapGesture];`\n\n**提示：** `UIGestureRecognizer`\
    \ 的任何子类均可被添加到 `UIView` 的任意实例或子类上，因此你可以轻松地为几乎任何元素构建自定义手势功能，从而打造出非常灵活的应用。\n\n某些元素（例如\
    \ `UILabel`）不会响应任何 `UIGestureRecognizer`，除非其 `userInteractionEnabled` 属性被设置为 `YES`。\n\
    \n`UIGestureRecognizer` 的 `state` 属性允许你评估任何特定子类在手势被识别时的当前状态。它拥有多个不同的可能值，每个值代表手势识别过程中的一个阶段：\n\
    \n1. `UIGestureRecognizerStatePossible`：表示某个手势可能正在执行中，但尚未满足其识别条件。\n2. `UIGestureRecognizerStateBegan`：表示一个持续手势已被识别并正在进行。\n\
    3. `UIGestureRecognizerStateChanged`：表示一个已开始的持续手势发生了变化。\n4. `UIGestureRecognizerStateEnded`：表示手势已完成。\n\
    5. `UIGestureRecognizerStateCancelled`：手势识别器接收到触摸事件以取消一个持续手势。\n6. `UIGestureRecognizerStateRecognized`：等同于\
    \ `UIGestureRecognizerStateEnded`。\n\n特别是在处理持续手势时，你可能会遇到多个状态导致 `UIGestureRecognizer`\
    \ 执行其动作的问题，从而不必要地重复调用某个方法。通过检查 `state` 属性中的特定状态，你可以避免这种情况。\n\n理想情况下，你可以设置单个方法供所有\
    \ `UIGestureRecognizer` 子类的实例调用，并在方法内部简单地区分它们。你可以利用 `+isKindOfClass` 方法、每个子类的多个属性，甚至手势被识别的视图，来识别多个\
    \ `UIGestureRecognizer` 对象中哪一个执行了你的操作。该操作将包含如下处理器：\n\n`-(void)handleGesture:(UIGestureRecognizer\
    \ *)gestureRecognizer;`\n\n另一个所有 `UIGestureRecognizer` 子类继承的有用功能是，能够通过 `-locationInView:`\
    \ 和 `-locationOfTouch:inView:` 方法确定手势在视图中的确切位置。通过使用这些值，你可以根据触摸在单个视图内的具体位置轻松调整应用的行为。其中一个示例是在用户触摸点进行绘制，从而让用户本质上能在屏幕上涂鸦。\n\
    \n所有 `UIGestureRecognizer` 的子类都继承了 `delegate` 属性，该属性可以被设置为包含该识别器视图的视图控制器。这个属性遵循\
    \ `UIGestureRecognizerDelegate` 协议，允许视图控制器在响应手势时获得额外的控制权。\n\n多个 `UIGestureRecognizer`\
    \ 的子类支持需要多点触摸才能被识别的手势。在处理这些手势时，务必记住每台设备能处理的最大触摸数量。在编写本文时，iPhone 最多可处理五根手指的触摸，而\
    \ iPad 最多可处理十一根。\n\n## UITapGestureRecognizer\n\n正如你所猜测的，`UITapGestureRecognizer`\
    \ 能识别用户在其分配视图上的点击操作。\n\n你可以通过调整 `numberOfTapsRequired` 和 `numberOfTouchesRequired`\
    \ 来创建非常具体的手势功能。例如，将两个属性都设置为 2，你可以专门检测用户用两根手指双击屏幕的事件。配置方式如下：\n\n```\nUITapGestureRecognizer\
    \ *tapGesture = [[UITapGestureRecognizer alloc] initWithTarget:self\naction:@selector(handleGesture:)];\n\
    \ntapGesture.numberOfTapsRequired = 2;\ntapGesture.numberOfTouchesRequired = 2;\n\
    [self.view addGestureRecognizer:tapGesture];\n```\n\n实现 `handleGesture:` 时，你应确保针对任何\
    \ `UITapGestureRecognizer` 检测 `UIGestureRecognizerStateEnded` 状态。\n\n## UISwipeGestureRecognizer\n\
    \n`UISwipeGestureRecognizer` 能识别用户用一根或多根手指在屏幕上滑动的操作。滑动是一个离散手势，因此其动作只会被调用一次。\n\n\
    `UISwipeGestureRecognizer` 类具有 `direction` 属性，该属性指定了滑动必须发生的方向才能被识别。可能的值包括 `UISwipeGestureRecognizerDirectionRight`、`UISwipeGestureRecognizerDirectionLeft`、`UISwipeGestureRecognizerDirectionUp`\
    \ 和 `UISwipeGestureRecognizerDirectionDown`。\n\n该类还有一个 `numberOfTouchesRequired`\
    \ 属性，允许你在应用中指定多点触摸的滑动手势。\n\n## UIPanGestureRecognizer\n\n`UIPanGestureRecognizer`\
    \ 类能识别“平移”手势，这是一种持续手势。因此，你通常会在响应 `UIGestureRecognizerStateChanged` 或 `UIGestureRecognizerStateEnded`\
    \ 状态时通过它们执行操作。\n\n平移手势可以通过设置最小和最大触摸数量来配置，从而允许你创建一系列可接受的触摸数值。使用 `maximumNumberOfTouches`\
    \ 和 `minimumNumberOfTouches` 属性来实现此功能。\n\n通过 `UIPanGestureRecognizer`，你可以使用 `-translationInView:`\
    \ 和 `-velocityInView:` 方法获取移动的距离以及手势的速度。\n\n在大多数使用 `UIPanGestureRecognizer` 的情况下，获取并使用平移手势的平移量和/或速度值后，将其重置是很重要的。如果不重置，这些值会累积，导致数值迅速变得异常巨大。\n\
    \n以下是一个示例实现，摘自你的 `-handleGesture:` 方法，用于拖放识别到平移手势的视图。\n\n```\nif ([gestureRecognizer\
    \ isKindOfClass:[UIPanGestureRecognizer class]])\n    {\nUIPanGestureRecognizer\
    \ *pan = (UIPanGestureRecognizer *)gestureRecognizer;\nif (pan.state == UIGestureRecognizerStateChanged\
    \ || pan.state == UIGestureRecognizerStateEnded)\n        {\nCGPoint movement\
    \ = [pan translationInView:pan.view];\n            [pan.view setCenter:CGPointMake(pan.view.center.x\
    \ + movement.x, pan.view.center.y + movement.y)];\n            [pan setTranslation:CGPointZero\
    \ inView:pan.view];\n        }\n    }\n```\n\n如果在移动视图后没有将平移量重置为零，你的平移值会迅速累积，猛地把视图扔出屏幕。\n\
    \n如果使用 `CGPointZero` 值时遇到链接器错误，请将 `CoreGraphics.framework` 库添加到你的项目中。\n"
- fmt: '# UILongPressGestureRecognizer


    `UILongPressGestureRecognizer`用于识别“长按”手势，即用户将一根或多根手指保持在相同位置超过正常轻触时长的操作。


    与之前介绍的几种手势识别器类似，你可以通过`numberOfTapsRequired`和`numberOfTouchesRequired`属性指定所需的点击次数以及使用的手指/触摸数量。


    这个`UIGestureRecognizer`的子类拥有额外属性来配置“长按”的性质。`minimumPressDuration`指定触摸必须保持多长时间，识别器的`state`才会转为`UIGestureRecognizerStateBegan`。`allowableMovement`属性接受一个浮点数，指定用户在长按手势失败前可以有多大的“活动余地”。该值应设置得足够大，使正常人能轻松保持触摸，但又不能大到允许可能跨越多个元素的显著移动。


    `UILongPressGestureRecognizer`会在手势开始和结束时触发其动作，这可能导致不期望的行为。通常，你只需要响应`UIGestureRecognizerStateBegan`状态，以便用户能轻松获知手势已被识别。


    # UIPinchGestureRecognizer


    这个`UIGestureRecognizer`的子类用于识别捏合手势，即用户将两个触摸点相互靠近或远离。此类是连续型的，意味着只要捏合动作持续，它就保持活跃状态，但其值会不断变化。


    你可以从每个捏合手势中访问两个属性：


    1.  `scale`：由捏合产生的缩放因子

    2.  `velocity`：给定捏合手势的速度


    根据你的用途，你需要关注`state`的不同值。


    # UIRotationGestureRecognizer


    此类识别一种相对不常见的手势：旋转。该手势由用户以圆周运动移动两根手指构成。


    关于所执行手势的信息可以通过`rotation`和`velocity`属性访问，与`UIPinchGestureRecognizer`类似。


    ## View Controllers


    在设计iOS应用时，你通常会根据应用中数据的流向，以相当一致的方式组织视图控制器。Cocoa Touch内置了多个`UIViewController`类的特殊子类，允许你根据应用类型轻松组织、定制和呈现数据。通过组合这些控制器，你可以为应用创建复杂的组织方案，以最优化的方式向用户展示信息。


    ### UINavigationController


    `UINavigationController`无疑是工作流设计和视图呈现中最常用的类之一。它不仅有助于组织从一个视图到另一个视图的过渡，还在每个视图顶部提供了一个高度可定制的工具栏，以帮助呈现和管理应用的不同部分。这些类随后可以被放入其他组织控制器中，允许你创建从应用一个层级到另一个层级的嵌套信息流。


    `UINavigationController`以一个“根视图控制器”开始，如果没有其他视图控制器被添加，则此视图控制器将是可见的。然后，其他视图控制器可以被“推入”控制器堆栈，或通过各种方法被“弹出”。`UINavigationController`堆栈中的视图从上到下显示，因此推入一个新的视图控制器会指示`UINavigationController`显示它。同样，当弹出当前视图控制器时，它会从视图中移除，露出堆栈中的下一个控制器。


    创建`UINavigationController`就像创建其他任何类一样简单。你可以使用一个便捷的指定初始化方法`-initWithRootViewController:`来设置根视图，或者可以在分配后直接调用`-init`方法，然后使用`-pushViewController:animated:`方法推入根视图。


    [Figure 3–20](#Chapter03.html#fig_3_20)展示了一个配置了多个元素的`UINavigationController`。


    ![Image](images/9781430240051_Fig03-20.jpg)


    **Figure 3–20.** 一个`UINavigationController`，带有左右按钮和一个工具栏


    在`UINavigationController`中呈现的此视图顶部边缘，设有导航栏。此区域旨在通过三个特性引导用户在整个应用中进行导航：


    - **标题**：导航栏中央显示所呈现视图控制器的标题。这可以通过在每个`-viewDidLoad`方法中更改继承自`UIViewController`类的`title`属性轻松设置（例如，`self.title
    = @"More Info"`）。你也可以创建自定义标题视图。

    - **返回按钮**：如果当前未显示根视图控制器，导航栏左侧会自动包含一个带箭头的按钮，默认情况下会显示先前视图控制器的标题，以帮助用户导航返回。

    - **右侧栏项目**：导航栏右侧默认是空的，但可以使用`rightBarButtonItem`或`rightBarButtonItems`属性进行配置（后者用于添加多个项目）。在iPhone上，此位置通常不会放置超过一两个小按钮，但iPad有空间容纳更多数量。此位置的按钮通常提供操作或处理当前视图控制器中显示信息的选项，例如`UITableView`的编辑按钮或打开打印界面的按钮。上述属性通过导航项访问，即`self.navigationItem.rightBarButtonItem`。


    [Figure 3–20](#Chapter03.html#fig_3_20)中视图的底部边缘包含导航工具栏，该工具栏内置于`UINavigationController`中。此工具栏默认是隐藏的，但可以通过将`UINavigationController`上的`toolbarHidden`属性设置为`NO`，或使用`-setToolbarHidden:animated:`方法（以动画方式改变）轻松显示。然而，执行此操作时需谨慎，因为工具栏的状态（无论是隐藏还是显示）在视图控制器的推入和弹出过程中保持不变，直到再次设置该属性。这意味着你可能需要在每个视图控制器中使用`-viewWillAppear:animated:`和`-viewWillDisappear:animated:`方法来适当地显示或隐藏工具栏。


    `UIToolbar`的内容不是由`UINavigationController`设置的，而是由堆栈顶部的`UIViewController`设置的。通过在`-viewDidLoad`方法中为每个视图控制器调用`-setToolbarItems:`，你可以轻松地实现每个视图控制器中配置不同的工具栏。以下示例取自一个视图控制器的`-viewDidLoad`，展示了如何轻松构建单个控制器的工具栏。


    ```

    [self setToolbarItems:[NSArray arrayWithObject:[[UIBarButtonItem alloc]

    initWithTitle:@"Toolbar Button "style:UIBarButtonItemStyleBordered target:nil

    action:NULL]] animated:NO];

    ```


    只需将`target`和`action`改为实际的值和选择器，你就可以轻松地在工具栏按钮中实现功能。


    `UINavigationController`还有一个遵循`UINavigationControllerDelegate`协议的委托属性。利用此属性可以获得对视图控制器被推入或弹出堆栈前后执行操作的额外控制。'
  raw: '#### UILongPressGestureRecognizer


    The `UILongPressGestureRecognizer` looks for “long presses,” which are simply
    when the user holds one or more fingers in the same position for longer than a
    normal tap.


    Just as with several of the previous gesture recognizers, you can specify a required
    number of taps, as well as a number of fingers/touches used using the `numberOfTapsRequired`
    and `numberOfTouchesRequired` properties.


    This subclass of `UIGestureRecognizer` has extra properties to configure the nature
    of the “long press.” The `minimumPressDuration` specifies how long a touch must
    be held for before the recognizer’s `state` turns to `UIGestureRecognizerStateBegan`.
    The `allowableMovement`property, which takes a float, specifies how much “wiggle-room”
    the user has before the long-press gesture fails. This value should be made large
    enough that a normal person can easily hold the touch, but not so large as to
    allow for significant movement that could cross multiple elements.


    A `UILongPressGestureRecognizer` will trigger its action both when it begins and
    when it ends, which can cause unwanted behavior. Generally, you will want to respond
    only to the `UIGestureRecognizerStateBegan` state, so that the user can easily
    be notified that the gesture has been recognized.


    #### UIPinchGestureRecognizer


    This subclass of `UIGestureRecognizer` looks for pinch gestures, which involve
    a user moving two touches toward or away from each other. This class is continuous,
    meaning it stays active as long as the pinch is held, but has constantly changing
    values.


    You are able to access two properties from each pinch gesture:


    1.  `scale`: The scaling factor created by the pinch

    2.  `velocity:` The velocity of the given pinch gesture


    Depending on your use, you will want to look for different values of `state`.


    #### UIRotationGestureRecognizer


    This class recognizes a fairly uncommon gesture: a rotation. This gesture is composedof
    a user moving two fingers in a circular motion.


    Information about the gesture performed can be accessed through the `rotation`and`velocity`
    properties, similar to the `UIPinchGestureRecognizer`.


    ### View Controllers


    When you design iOS applications, you tend to organize your view controllers in
    fairly consistent ways based on the flow of data in your application. Built into
    Cocoa Touch are multiple special subclasses of the `UIViewController` class that
    allow you to easily organize, customize, and present your data depending on your
    type of application. By combining these controllers, you can create complex organizational
    schemes for your applications to present information to the user in the most optimized
    manner.


    #### UINavigationController


    The `UINavigationController` is by far one of the most commonly used classes in
    terms of workflow design and view presentation. It not only helps to organize
    transitions from one view to another, but also provides a highly customizable
    toolbar across the top of each view in order to help present and manage different
    parts of an application. These classes can then be placed into other organizational
    controllers, allowing you to create a nested flow of information from one level
    of your application to another.


    A `UINavigationController` starts off with a “root view controller,” which is
    the view controller that will be visible if no others are added to it. Then, other
    view controllers can be either “pushed” onto a stack of controllers, or “popped”
    off using various methods. Views in a `UINavigationController`’s stack are displayed
    from the top down, so pushing a new view controller instructs the `UINavigationController`
    to display it. Likewise, when you pop off the current view controller, it is removed
    from the view, revealing the next controller in the stack.


    Creating a `UINavigationController` is as simple as creating any other class.
    You can use a handy designated initializer called `-initWithRootViewController:`
    to set your root view, or you can simply call the `-init` method (after allocating),
    and then use the `-pushViewController:animated:`method to push in your root view.


    [Figure 3–20](#Chapter03.html#fig_3_20) features a configured `UINavigationController`
    with multiple elements.


    ![Image](images/9781430240051_Fig03-20.jpg)


    **Figure 3–20.** *A `UINavigationController` with left and right buttons and a
    toolbar*


    The top edge of this view, presented in a `UINavigationController`, features the
    navigation bar. This area is meant to direct users in their navigation throughout
    your application through three features:


    *   *Title*: The center of the navigation bar features the title of the presented
    view controller. This can easily be set in each `-viewDidLoad` method by changing
    the `title` property inherited from the `UIViewController` class. (e.g.,`self.title
    = @“More Info”`). You can also create a custom title view.

    *   *Back Button*: The left side of the navigation bar, if the root view controller
    is not currently shown, automatically contains an arrowed button, and by default
    contains the title of the previously shown view controller, so as to help the
    user navigate back.

    *   *Right Bar Item(s)*: The right side of the navigation bar is by default empty,
    but can be configured using either the `rightBarButtonItem` or `rightBarButtonItems`
    properties (the latter for adding multiple items). On an iPhone, you most likely
    will not have more than one or two small buttons here, but an iPad has space for
    a larger quantity. Usually buttons in this location provide options to manipulate
    or operate on information shown in the current view controller, such as a `UITableView`’s
    edit button or a button to open up a printing interface. The aforementioned properties
    are accessed through the navigation item, i.e.,`self.navigationItem.rightBarButtonItem`.


    The bottom edge of the view in [Figure 3–20](#Chapter03.html#fig_3_20)containsthe
    navigation toolbar, which comes built into the `UINavigationController`. This
    toolbar is by default hidden, but can be easily shown by setting the `toolbarHidden`
    property on `UINavigationController` to `NO`, or by using the `-setToolbarHidden:animated:`
    method (to animate the change). Be careful when doing this, however, as the state
    of the toolbar, whether it is hidden or shown, remains the same across the pushing
    and popping of view controllers until the property is set again. This means you
    may have to make use of the `-viewWillAppear:animated:` and `-viewWillDisappear:animated:`
    methods in each view controller to show or hide the toolbar as appropriate.


    The contents of the `UIToolbar` are easily set, not by the `UINavigationController`,
    but instead by the `UIViewController` that is currently on top of the stack. By
    calling `-setToolbarItems:` with each view controller in your `-viewDidLoad` methods,
    you can easily implement a differently configured toolbar in each view controller.
    The following example, taken from a view controller’s `-viewDidLoad`, shows how
    an individual controller’s toolbar can be easily built.


    `[self setToolbarItems:[NSArray arrayWithObject:[[UIBarButtonItem alloc]`

    `initWithTitle:@"Toolbar Button "style:UIBarButtonItemStyleBordered target:nil`

    `action:NULL]] animated:NO];`


    By simply changing the `target` and `action` to an actual value and selector,
    you will easily be able to implement functionality in your toolbar’s buttons.


    The `UINavigationController` also has a delegate property, which conforms to the
    `UINavigationControllerDelegate` protocol. Utilize this to gain extra control
    over actions performed right before and after view controllers are pushed or popped
    from the stack.'
