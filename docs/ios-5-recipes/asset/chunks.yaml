- fmt: "This is actually all you need to do to create your data model! If you switch\
    \ over to the second `Editor` style, you can even see a neat little graphic of\
    \ your interconnect entities, their attributes, and their relationships, where\
    \ a single arrow represents a “to-one” relationship, and a double arrow represents\
    \ a “to-many” relationship. The blocks may initially appear all stacked on top\
    \ of each other, but if you drag them apart, your display should resemble [Figure\
    \ 11-15](#Chapter11.html#fig_11_15).\n\n![Image](images/9781430240051_Fig11-15.jpg)\n\
    \n**Figure 11–15.** *The resulting graphical view of your finished data model*\n\
    \n### Recipe 11–2: Working with NSManagedObjects\n\nNow that you have your data\
    \ model set up, you can start to build your application's actual user interface.\n\
    \nYou will build your application in such a way that you can view three different\
    \ tabs, each with a `UITableView` displaying all of an entity in your data, with\
    \ each tab displaying a different entity. Rather than build three different view\
    \ controllers with nearly the exact same setup, you will simply build one, then\
    \ customize the information displayed.\n\nCreate a new `UIViewController` subclass\
    \ file called “MainTableViewControlle in your project. In your XIB file, add a\
    \ `UITableView` to your view, and connect it to the view controller's header file\
    \ with the property name `tableViewMain`. Refer to [Chapter 8](#Chapter08.html#ch8)\
    \ for specific instructions on how to do this.\n\nYou can go ahead and make this\
    \ `UITableView` fill the whole view, and leave it as a “Plain” style, as in [Figure\
    \ 11-16](#Chapter11.html#fig_11_16).\n\n![Image](images/9781430240051_Fig11-16.jpg)\n\
    \n**Figure 11–16.** *Setting up your `UITableView`*\n\nGo ahead and set your delegate\
    \ and data source for your table in the `-viewDidLoad` method with the following\
    \ two lines:\n\n```\nself.tableViewMain.delegate = self;\nself.tableViewMain.dataSource\
    \ = self;\n```\n\nYou will of course have to add the `UITableViewDelegate` and\
    \ `UITableViewDataSource` protocols to your view controller’s header file.\n\n\
    Add the following line to your `-viewDidLoad` method as well to create an Add\
    \ button in your navigation bar. You will implement the action for it to perform\
    \ later.\n\n```\nself.navigationItem.rightBarButtonItem = [[UIBarButtonItem alloc]\n\
    initWithBarButtonSystemItem:UIBarButtonSystemItemAdd target:self action:@selector(add)];\n\
    ```\n\nYou will need to add a few more properties to your view controller to keep\
    \ track of your Core Data objects. Add the following three properties, making\
    \ sure to properly synthesize and handle them.\n\n```\n@property (nonatomic, strong)\
    \ NSEntityDescription *entityDescription;\n@property (nonatomic, strong) NSFetchedResultsController\
    \ *fetchedResultsController;\n@property (nonatomic, strong) NSManagedObjectContext\
    \ *managedObjectContext;\n```\n\nAn instance of the `NSEntityDescription` class\
    \ is, in rather redundant terms, a description of an entity. In its simplest use,\
    \ you simply give it a `name`. Then, when you query your database via the `NSManagedObjectContext`\
    \ with this `NSEntityDescription`, it specifically fetches instances of the specified\
    \ entity.\n\nYour `entityDescription` property will allow you to easily keep track\
    \ of whether a view controller is fetching data for Teachers, Students, or Instruments.\
    \ The `fetchedResultsController` will keep track of your fetched data, and the\
    \ `managedObjectContext` property allows you to make any necessary requests for\
    \ data.\n\nNext, you need to implement the required delegate and data source methods\
    \ for your `UITableView`. First, the method to specify the number of rows:\n\n\
    ```\n-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n     return [[self.fetchedResultsController fetchedObjects] count];\n}\n```\n\
    \nAs shown, the `NSFetchedResultsController` class contains a method `-fetchedObjects`,\
    \ which returns an `NSArray` of the objects that were queried for.\n\nHere is\
    \ your method to configure your `UITableView`’s cells:\n\n```\n-(UITableViewCell\
    \ *)tableView:(UITableView *)tableView\ncellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell *cell\
    \ = [tableView\ndequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell\
    \ == nil)\n{\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\
    \ reuseIdentifier:CellIdentifier];\n        cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n\
    \        cell.textLabel.font = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font\
    \ = [UIFont systemFontOfSize:12];\n    }\n```"
  raw: 'This is actually all you need to do to create your data model! If you switch
    over to the second Editor style, you can even see a neat little graphic of your
    interconnect entities, their attributes, and their relationships, where a single
    arrow represents a “to-one” relationship, and a double arrow represents a “to-many”
    relationship. The blocks may initially appear all stacked on top of each other,
    but if you drag them apart, your display should resemble [Figure 11-15](#Chapter11.html#fig_11_15).


    ![Image](images/9781430240051_Fig11-15.jpg)


    **Figure 11–15.** *The resulting graphical view of your finished data model*


    ### Recipe 11–2: Working with NSManagedObjects


    Now that you have your data model set up, you can start to build your application''s
    actual user interface.


    You will build your application in such a way that you can view three different
    tabs, each with a `UITableView` displaying all of an entity in your data, with
    each tab displaying a different entity. Rather than build three different view
    controllers with nearly the exact same setup, you will simply build one, then
    customize the information displayed.


    Create a new `UIViewController` subclass file called “MainTableViewControlle in
    your project. In your XIB file, add a `UITableView` to your view, and connect
    it to the view controller''s header file with the property name `tableViewMain`.
    Refer to [Chapter 8](#Chapter08.html#ch8) for specific instructions on how to
    do this.


    You can go ahead and make this `UITableView` fill the whole view, and leave it
    as a “Plain” style, as in [Figure 11-16](#Chapter11.html#fig_11_16).


    ![Image](images/9781430240051_Fig11-16.jpg)


    **Figure 11–16.** *Setting up your `UITableView`*


    Go ahead and set your delegate and data source for your table in the `-viewDidLoad`
    method with the following two lines:


    `self.tableViewMain.delegate = self;`

    `self.tableViewMain.dataSource = self;`


    You will of course have to add the `UITableViewDelegate` and `UITableViewDataSource`
    protocols to your view controller’s header file.


    Add the following line to your `-viewDidLoad` method as well to create an Add
    button in your navigation bar. You will implement the action for it to perform
    later.


    `self.navigationItem.rightBarButtonItem = [[UIBarButtonItem alloc]`

    `initWithBarButtonSystemItem:UIBarButtonSystemItemAdd target:self action:@selector(add)];`


    You will need to add a few more properties to your view controller to keep track
    of your Core Data objects. Add the following three properties, making sure to
    properly synthesize and handle them.


    `@property (nonatomic, strong) NSEntityDescription *entityDescription;`

    `@property (nonatomic, strong) NSFetchedResultsController *fetchedResultsController;`

    `@property (nonatomic, strong) NSManagedObjectContext *managedObjectContext;`


    An instance of the `NSEntityDescription` class is, in rather redundant terms,
    a description of an entity. In its simplest use, you simply give it a `name`.
    Then, when you query your database via the `NSManagedObjectContext` with this
    `NSEntityDescription`, it specifically fetches instances of the specified entity.


    Your `entityDescription` property will allow you to easily keep track of whether
    a view controller is fetching data for Teachers, Students, or Instruments. The
    `fetchedResultsController` will keep track of your fetched data, and the `managedObjectContext`
    property allows you to make any necessary requests for data.


    Next, you need to implement the required delegate and data source methods for
    your `UITableView`. First, the method to specify the number of rows:


    `-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`

    `{`

    `     return [[self.fetchedResultsController fetchedObjects] count];`

    `}`


    As shown, the `NSFetchedResultsController` class contains a method `-fetchedObjects`,
    which returns an `NSArray` of the objects that were queried for.


    Here is your method to configure your `UITableView`’s cells:


    `-(UITableViewCell *)tableView:(UITableView *)tableView`

    `cellForRowAtIndexPath:(NSIndexPath *)indexPath`

    `{`

    `    static NSString *CellIdentifier = @"Cell";`


    `    UITableViewCell *cell = [tableView`

    `dequeueReusableCellWithIdentifier:CellIdentifier];`

    `    if (cell == nil)`

    `{`

    `        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle
    reuseIdentifier:CellIdentifier];`

    `        cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;`

    `        cell.textLabel.font = [UIFont systemFontOfSize:19.0];`

    `        cell.detailTextLabel.font = [UIFont systemFontOfSize:12];`

    `    }`'
  trans: "\n实际上，这就是创建数据模型所需的全部操作！如果切换到第二种 `Editor` 样式，你甚至可以看到实体间相互关联、属性及关系的一幅精美小型关系图，其中单箭头表示“对一”关系，双箭头表示“对多”关系。这些块最初可能全部堆叠在一起，但如果你将它们拖开，显示效果应该类似于图\
    \ 11-15。\n\n![Image](img/9781430240051_Fig11-15.jpg)\n\n**图 11-15.** *完成数据模型后的最终图形视图*\n\
    \n### 食谱 11-2：使用 NSManagedObjects\n\n现在你已经设置好了数据模型，可以开始构建应用程序的实际用户界面了。\n\n你将以这种方式构建应用程序：能够查看三个不同的标签页，每个标签页都包含一个\
    \ `UITableView`，显示数据中某个实体的所有内容，并且每个标签页显示不同的实体。与其构建三个具有几乎完全相同设置的视图控制器，不如只构建一个，然后自定义显示的信息。\n\
    \n在你的项目中，创建一个名为“MainTableViewControlle”的新的 `UIViewController` 子类文件。在 XIB 文件中，向视图添加一个\
    \ `UITableView`，并使用属性名称 `tableViewMain` 将其连接到视图控制器的头文件。有关具体操作方法，请参考第 8 章。\n\n\
    你可以直接让这个 `UITableView` 填满整个视图，并将其保留为“Plain”样式，如图 11-16 所示。\n\n![Image](img/9781430240051_Fig11-16.jpg)\n\
    \n**图 11-16.** *设置你的 `UITableView`*\n\n接下来，在 `-viewDidLoad` 方法中使用以下两行代码为表格设置委托和数据源：\n\
    \n```\nself.tableViewMain.delegate = self;\nself.tableViewMain.dataSource = self;\n\
    ```\n\n当然，你还需要将 `UITableViewDelegate` 和 `UITableViewDataSource` 协议添加到视图控制器的头文件中。\n\
    \n此外，在 `-viewDidLoad` 方法中添加以下代码行，以便在导航栏中创建一个“添加”按钮。稍后你将实现其触发的操作。\n\n```\nself.navigationItem.rightBarButtonItem\
    \ = [[UIBarButtonItem alloc]\ninitWithBarButtonSystemItem:UIBarButtonSystemItemAdd\
    \ target:self action:@selector(add)];\n```\n\n你需要为视图控制器添加更多属性，以跟踪 Core Data 对象。添加以下三个属性，并确保正确合成和处理它们。\n\
