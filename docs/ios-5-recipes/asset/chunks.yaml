    ### Recipe 4–6: Reverse and Forward Geocoding


    Location coordinates are useful to applications, but they are not very friendly
    to human beings. When is the last time you wrote your address using latitude and
    longitude coordinates? It''s just not human-friendly. Human locations are expressed
    in names that reference countries, states, cities, etc. So when a device''s user
    asks, “Where am I?”, the user doesn''t want to know the GPS coordinates–the user
    wants to know what town or city he or she is in.


    Fortunately, Apple has provided a method for converting location coordinates into
    a human-readable format. The method is called reverse geocoding, and the Core
    Location framework in iOS 5 provides it. In versions of iOS prior to 5, the Map
    Kit framework provided this feature.


    Here are some best practices to be aware of when using reverse geocoding:


    *   You should send only one geocoding request at a time.

    *   If the user performs an action that will result in the same location being
    geocoded, the results should be reused rather than requesting the same location
    multiple times.

    *   You should not send more than one geocoding request per minute. You should
    check to see if the user has moved a significant distance before calling another
    geocoding request.

    *   Do not perform a geocoding request if the user will not see the results (such
    as if your application is running in the background).

    *   A device must have network access to perform a geocoding request.


    Geocoding is performed using the `CLGeocoder` class. You instantiate a `CLGeocoder`
    object and then pass it a coordinate and a block of code to perform once it has
    performed the geocoding. This is a little different than the other location recipes
    discussed thus far that used delegate methods.


    Let''s create a new single view application that will tell us where we are called
    “Chapter4Geocoder”. If you can specify a class prefix, use the same name of “Chapter4Geocoder”.
    Add the Core Location framework to the application by selecting the project in
    the navigator pane and selecting the target. Now click the Build Settings tab,
    expand the area labeled Link Binary With Libraries, and add the Core Location
    framework as you did in previous recipes.


    Select the `Chapter4GeocoderViewController.xib` file to load Interface Builder,
    and add a `UILabel` and rounded `UIButton` to the XIB, resembling [Figure 4–26](#Chapter04.html#fig_4_26).


