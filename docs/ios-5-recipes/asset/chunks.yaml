    data, persisting it between uses.


    In order to implement persistence in your application, you will make use of the
    file system, as well as the concepts of “archiving” and “unarchiving” objects.


    In order to archive, or “encode” any given object, it, and all the properties
    stored within it, must be specifically told how to be encoded. For any pre-made
    iOS object, such as an `NSArray` or `NSDictionary` this is already done. However,
    in order to encode your Hotspot objects, you will need to add some specific instructions
    on how they are to be handled.


    In your `Hotspot.h` class, specify that your class will conform to the `NSCoding`
    protocol by changing your `@interface` line to the following:


