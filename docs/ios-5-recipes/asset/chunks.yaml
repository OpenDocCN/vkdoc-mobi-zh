- fmt: "### What to Expect from This Book\n\nThe first few chapters of this book are\
    \ devoted to acquiring a basic understanding of your development environment.\
    \ You will learn a variety of ways to work within `Xcode` and `Interface Builder`,\
    \ as well as the various standard user interface elements with which you can build\
    \ your application. The remaining 13 chapters focus on specific examples, or recipes,\
    \ of a variety of different applications, in order to demonstrate exactly how\
    \ to implement each functionality from start to finish.\n\n### How This Book Is\
    \ Organized\n\nThe example-based chapters of this book do not particularly build\
    \ off of one another, in the hope that you can simply open up to any chapter of\
    \ specific interest and start building a certain type of application. However,\
    \ it is highly recommended that you read the first three chapters in order to\
    \ acquire a solid understanding of working with `Xcode` and `Interface Builder`,\
    \ if you have not already. Some of the methods used in these early chapters, such\
    \ as those used to create properties, are referenced throughout the text and should\
    \ be fully understood.\n\nThroughout this book, it is assumed that you are developing\
    \ in the latest versions of iOS (5.0) and Xcode (4.2) at the time of writing.\
    \ This means that every recipe in this text assumes that you will be using ARC\
    \ (Automatic Reference Counting), and as such does not include significant memory\
    \ management. This also means that depending on when you are reading this, your\
    \ results may look slightly different, though the basic functionality should remain\
    \ similar.\n\nMany of the recipes in this book cannot be fully tested on the iOS\
    \ simulator, and as such will require both an Apple device and a provisioning\
    \ profile, which can be acquired when you subscribe to Apple's iOS Developer Program.\
    \ Each recipe that cannot be tested in the simulator will mention this fact.\n\
    \n### Source Code and Errata\n\nAll the source code used in this book is available\
    \ online for download at [`www.apress.com`](http://www.apress.com), and it is\
    \ entirely free for use in any application, whether commercial or personal. A\
    \ number of people have worked hard to keep this code as perfect and error-free\
    \ as possible, but a few typos or bugs may become apparent with extensive use.\
    \ Any corrections to the text or code are available in this book's “Errata” section,\
    \ also at [`www.apress.com`](http://www.apress.com).\n\n### Contact Information\n\
    \nIf you have any questions or comments regarding the book or its source code,\
    \ we would be happy to assist. You can contact either author:\n\n> Colin Francis:\n\
    > E-mail: [`cmfrancis24@gmail.com`](mailto:cmfrancis24@gmail.com)\n> \n> Shawn\
    \ Grimes:\n> E-Mail: [`shawn@shawnsbits.com`](mailto:shawn@shawnsbits.com)\n>\
    \ Web: [`www.shawnsbits.com`](http://www.shawnsbits.com)\n\n## Chapter 1\n\n##\
    \ Xcode 4 Tips and Tricks\n\n`Xcode 4` brought forth a number of changes to the\
    \ look and feel of `Xcode` as well as changes in functionality. As with any major\
    \ change to the way people do things, it was met with mixed reviews and some complaints.\
    \ In this chapter, we'll steer clear of the shortcomings of `Xcode 4` and instead\
    \ focus on its strengths and improvements, which are many.\n\n### Xcode 4: An\
    \ Introduction\n\nThe very first thing you'll notice about `Xcode 4` is its unified\
    \ interface window. Everything has been brought into one window, and the new interface\
    \ has introduced the common interface element of tabs instead of multiple windows.\n\
    \nFigure 1–1 shows an example of the `Xcode` user interface, including its various\
    \ display panes. These panels help you to navigate, build, and debug your application.\
    \ Their visibility can be adjusted easily using the View buttons in the upper\
    \ right-hand corner in order to provide more viewing space for the Editor.\n\n\
    ![Image](images/9781430240051_Fig01-01.jpg)\n\n**Figure 1–1.** *The Xcode interface*\n\
    \nEven `Interface Builder` has been included in the single window interface of\
    \ `Xcode 4`. With the inclusion of `Interface Builder`, Apple has built some swift\
    \ functionality to help you go from visual interface to functioning code. Figure\
    \ 1–2 shows `Interface Builder` being used to construct an application's user\
    \ interface. This will be covered more in Chapter 2.\n\n![Image](images/9781430240051_Fig01-02.jpg)\n\
    \n**Figure 1–2.** *Interface Builder*\n\nWith the Assistant Editor, you can easily\
    \ see two related files side by side. This is very useful when working with class\
    \ headers and implementation files because you can easily modify both files in\
    \ a single view. By using the small navigation area at the top of each pane, you\
    \ can either select specific files to show together, or specify “Counterparts”\
    \ to automatically show the related header or implementation file, as shown in\
    \ Figure 1–3.\n\n![Image](images/9781430240051_Fig01-03.jpg)\n\n**Figure 1–3.**\
    \ *The Assistant Editor*\n\nA feature of `Xcode 4` that is sure to save you time\
    \ is Fix-It. This feature tries to detect common programming mistakes and offers\
    \ suggestions on how to fix them. It does this while you are writing the code\
    \ rather than waiting for you to run a build command. This makes it a great time\
    \ saver for common mistakes.\n\n`Xcode 4` also features better source control\
    \ integration with Git. You are now given the option to create a local Git repository\
    \ every time you start a new project, and modified files are clearly marked in\
    \ the Navigator pane. The Timeline Editor view will even show you changes that\
    \ you've made since the last check-in or compare your current file to any past\
    \ file version in the repository. This view back in time is very similar to the\
    \ Time Machine backup interface in Snow Leopard, as shown in Figure 1–4.\n\n![Image](images/9781430240051_Fig01-04.jpg)\n\
    \n**Figure 1–4.** *Timeline Editor displaying recent revisions*"
