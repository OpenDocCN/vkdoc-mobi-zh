  trans: "\n### 技巧 6–3：编辑视频\n\n尽管您的 `UIImagePickerController` 提供了一种极其便捷的方式来录制和保存视频文件，但它并不能让您对视频进行编辑。幸运的是，iOS\
    \ 内置了另一个名为 `UIVideoEditorController` 的控制器，您将使用它来让录制的视频能够被编辑。\n\n您将基于第二个项目来构建这个相当简单的技巧，在该项目中您已经为\
    \ `UIImagePickerController` 添加了视频功能。\n\n首先，您需要在视图控制器的界面文件中创建第二个按钮，将其标题设为“Edit\
    \ Video”，并命名为 `editButton`。同时，您需要将其连接到名为 `-editButtonPressed:` 的操作上，如图 Figure\
    \ 6–8 所示。\n\n![Image](img/9781430240051_Fig06-08.jpg)\n\n**图 6–8.** *添加了编辑按钮的新用户界面*\n\
    \n接下来，您需要定义一个 `NSString` 属性来存储最近选择/编辑的视频路径，如图 Figure 6–8 右侧所示。请记得使用 `@synthesize`\
    \ 合成该属性，并在 `-viewDidUnload` 方法中将其设置为 `nil`：\n\n`@property (nonatomic, strong)\
    \ NSString *recentMovie;`\n\n您需要在 `UIImagePickerController` 的委托方法中添加一条语句，用于存储最近创建的视频路径，具体方法是添加以下代码行：\n\
    \n`self.recentMovie = moviePath;`\n\n现在，您的委托方法看起来是这样的：\n\n```\n- (void) imagePickerController:\
    \ (UIImagePickerController *) picker\n didFinishPickingMediaWithInfo: (NSDictionary\
    \ *) info\n{\n    NSString *mediaType = [info objectForKey: UIImagePickerControllerMediaType];\n\
    \n    if (CFStringCompare ((__bridge CFStringRef) mediaType, kUTTypeMovie, 0)\n\
    \        == kCFCompareEqualTo) {\n\n        NSString *moviePath = [[info objectForKey:\
    \ UIImagePickerControllerMediaURL]\npath];\n        self.recentMovie = moviePath;\n\
    \n        if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum (moviePath))\n   \
    \     {\n            UISaveVideoAtPathToSavedPhotosAlbum (moviePath, nil, nil,\
    \ nil);\n        }\n    }\n\n    else\n    {\n    UIImage *originalImage = (UIImage\
    \ *) [info objectForKey:\n        UIImagePickerControllerOriginalImage];\n\n \
    \   UIImageWriteToSavedPhotosAlbum (originalImage, nil, nil , nil);\n    self.imageViewRecent.image\
    \ = originalImage;\n    }\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\n现在您将实现 `-editButtonPressed:` 操作，以便在有视频时显示一个可编辑的视频，否则显示一个提示用户错误的警告视图。\n\
    \n```\n-(void)editButtonPressed:(id)sender\n{\n    if (self.recentMovie)\n   \
    \ {\n        UIVideoEditorController *editor = [[UIVideoEditorController alloc]\
    \ init];\n        editor.videoPath = self.recentMovie;\n        editor.delegate\
    \ = self;\n        [self presentModalViewController:editor animated:YES];\n  \
    \  }\n    else\n    {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
    错误\" message:@\"尚未录制视频\" delegate:self cancelButtonTitle:@\"取消\" otherButtonTitles:nil,\
    \ nil];\n        [alert show];\n    }\n}\n```\n\n请记住，此时您需要确保在头文件中将您的视图控制器声明为遵循\
    \ `UIVideoEditorControllerDelegate` 和 `UINavigationControllerDelegate` 协议。\n\n\
    最后，您只需要为 `UIVideoEditorController` 实现几个委托方法。首先，是一个处理成功编辑/修剪视频的委托方法：\n\n```\n-(void)videoEditorController:(UIVideoEditorController\
    \ *)editor\ndidSaveEditedVideoToPath:(NSString *)editedVideoPath\n{\n    self.recentMovie\
    \ = editedVideoPath;\n    if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum (editedVideoPath))\n\
    \    {\n        UISaveVideoAtPathToSavedPhotosAlbum (editedVideoPath, nil, nil,\
    \ nil);\n    }\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n\
    如您所见，您的应用程序会将新编辑的视频设置为下一次要编辑的视频，这样您就可以创建越来越短的剪辑片段。同时，如果可能的话，它还会将每个编辑后的版本保存到您的相册中。\n\
    \n最后，您还需要一个委托方法来处理 `UIVideoEditorController` 的取消操作。\n\n```\n-(void)videoEditorControllerDidCancel:(UIVideoEditorController\
    \ *)editor\n{\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n\
    在实际设备上测试时，您的应用程序现在应该能够成功编辑视频了！Figure 6–9 显示了您的应用程序提供一个选项，让您可以编辑录制的视频。\n\n![Image](img/9781430240051_Fig06-09.jpg)\n\
    \n**图 6–9.** *录制视频时看到的视图*\n"
- fmt: "# Recipe 6–4: Custom Camera Overlays\n\nThere are quite a variety of applications\
    \ that implement the camera interface, but also implement a custom overlay, such\
    \ as for displaying constellations on the sky, or simply implementing their own\
    \ custom camera controls. Here, you will learn to do a basic implementation of\
    \ a custom overlay over your camera's screen, continuing from your previous recipe's\
    \ project.\n\nYou need to build your custom `UIView` to be used as a custom overlay\
    \ programmatically, meaning you will not be using a XIB interface. You will be\
    \ adjusting certain specific properties of the buttons that you put in, so the\
    \ first thing you need to do is import the `QuartzCore` interface into your project,\
    \ which means adding an import statement into your header file.\n\n```\n#import\
    \ <QuartzCore/QuartzCore.h>\n```\n\nYou will create a method, `-customView:`,\
    \ that will take your `UIImagePicker` as an argument and return your `UIView`.\n\
    \n```\n-(UIView *)customView:(UIImagePickerController *)imagePicker;\n{\n    UIView\
    \ *view = [[UIView alloc] initWithFrame:CGRectMake(0, 0, 280, 480)];\n    view.backgroundColor\
    \ = [UIColor clearColor];\n\n    UIButton *flashButton = [[UIButton alloc] initWithFrame:CGRectMake(10,\
    \ 10, 120, 44)];\n    flashButton.backgroundColor = [UIColor colorWithRed:.5 green:.5\
    \ blue:.5 alpha:.5];\n    [flashButton setTitle:@\"Flash Auto\" forState:UIControlStateNormal];\n\
    \    [flashButton setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];\n\
    \    flashButton.layer.cornerRadius = 10.0;\n\n    UIButton *changeCameraButton\
    \ = [[UIButton alloc] initWithFrame:CGRectMake(190, 10, 120, 44)];\n    changeCameraButton.backgroundColor\
    \ = [UIColor colorWithRed:.5 green:.5 blue:.5 alpha:.5];\n    [changeCameraButton\
    \ setTitle:@\"Rear Camera\" forState:UIControlStateNormal];\n    [changeCameraButton\
    \ setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];\n    changeCameraButton.layer.cornerRadius\
    \ = 10.0;\n\n    UIButton *takePictureButton = [[UIButton alloc] initWithFrame:CGRectMake(100,\
    \ 432, 120, 44)];\n    takePictureButton.backgroundColor = [UIColor colorWithRed:.5\
    \ green:.5 blue:.5 alpha:.5];\n    [takePictureButton setTitle:@\"Click!\" forState:UIControlStateNormal];\n\
    \    [takePictureButton setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];\n\
    \    takePictureButton.layer.cornerRadius = 10.0;\n\n    [flashButton addTarget:self\
    \ action:@selector(toggleFlash:) forControlEvents:UIControlEventTouchUpInside];\n\
    \    [changeCameraButton addTarget:self action:@selector(toggleCamera:) forControlEvents:UIControlEventTouchUpInside];\n\
    \    [takePictureButton addTarget:imagePicker action:@selector(takePicture) forControlEvents:UIControlEventTouchUpInside];\n\
    \n    [view addSubview:flashButton];\n    [view addSubview:changeCameraButton];\n\
    \    [view addSubview:takePictureButton];\n\n    return view;\n}\n```\n\nHere,\
    \ you have defined your `UIView` as well as your buttons to be put in it, given\
    \ them their actions to perform, and added them into the view. You set the title\
    \ of each button to be either its starting value or its purpose. You also set\
    \ your `cornerRadius` so that your buttons will have rounded corners. One of the\
    \ most important details here is that you set your buttons to be semi-transparent,\
    \ as they will be placed over your camera's display. You do not want to cover\
    \ up any of your picture, so they have to be at least partially see-through.\n\
    \nNow you need to simply implement your two toggling methods, `-toggleCamera:`\
    \ and `-toggleFlash:`. You will need a few extra instance variables in your class\
    \ to deal with these properly, including two `BOOL`s to keep track of your settings,\
    \ as well as a pointer to a `UIImagePickerController` to pass around your camera\
    \ interface. Your view controller's header file should now look like so:\n\n```\n\
    #import <UIKit/UIKit.h>\n#import <MobileCoreServices/MobileCoreServices.h>\n#import\
    \ <QuartzCore/QuartzCore.h> //Need this!\n\n@interface CaptureViewController :\
    \ UIViewController <UIImagePickerControllerDelegate, UINavigationControllerDelegate>\n\
    {\n    UIImageView *imageViewRecent;\n    UIButton *cameraButton;\n    UIImagePickerController\
    \ *currentPicker;\n    BOOL flashOn;\n    BOOL frontCameraUsed;\n}\n\n@property\
    \ (strong, nonatomic) IBOutlet UIImageView *imageViewRecent;\n@property (strong,\
    \ nonatomic) IBOutlet UIButton *cameraButton;\n\n-(IBAction)cameraButtonPressed:(id)sender;\n\
    @end\n```\n\nNext, add the following line to `-cameraButtonPressed:` after `imagePicker`\
    \ is created.\n\n```\ncurrentPicker = imagePicker;\n```\n\nAlso add the following\
    \ line to the camera's `-imagePickerController:didFinishPickingMediaWithInfo:`\
    \ delegate method in order to \"release\" your `currentPicker`'s value. This can\
    \ go at the very end of the method, after the view controller has been dismissed.\n\
    \n```\ncurrentPicker = nil;\n```\n\nNow you can successfully define your `-toggleFlash:`\
    \ and `-toggleCamera:` methods like so:\n\n```\n-(void)toggleFlash:(UIButton *)sender\n\
    {\n    if (flashOn)\n    {\n        currentPicker.cameraFlashMode = UIImagePickerControllerCameraFlashModeOff;\n\
    \        flashOn = NO;\n        [sender setTitle:@\"Flash Off\" forState:UIControlStateNormal];\n\
    \    }\n    else\n    {\n        currentPicker.cameraFlashMode = UIImagePickerControllerCameraFlashModeOn;\n\
    \        flashOn = YES;\n        [sender setTitle:@\"Flash On\" forState:UIControlStateNormal];\n\
    \    }\n}\n```\n\n```\n-(void)toggleCamera:(UIButton *)sender\n{\n    if (frontCameraUsed)\n\
    \    {\n        currentPicker.cameraDevice = UIImagePickerControllerCameraDeviceRear;\n\
    \        frontCameraUsed = NO;\n        [sender setTitle:@\"Rear Camera\" forState:UIControlStateNormal];\n\
    \    }\n    else\n    {\n        currentPicker.cameraDevice = UIImagePickerControllerCameraDeviceFront;\n\
    \        frontCameraUsed = YES;\n        [sender setTitle:@\"Front Camera\" forState:UIControlStateNormal];\n\
    \    }\n}\n```\n\nFinally, you simply need to change the visibility of the camera\
    \ controls by adding two more lines to your `-cameraButtonPressed:` method, just\
    \ before your controller is presented.\n\n```\nimagePicker.showsCameraControls\
    \ = NO;\nimagePicker.cameraOverlayView = [self customView:imagePicker];\n```\n\
    \nYour camera should now have a wonderful little overlay with a couple of buttons\
    \ that change how it works, as in [Figure 6–10](#Chapter06.html#fig_6_10). You\
    \ can see that from here, you can create your own custom overlays and easily change\
    \ their functions to fit nearly any situation.\n\n![Image](images/9781430240051_Fig06-10.jpg)\n\
    \n**Figure 6–10.** *Custom overlay view over a camera*"
