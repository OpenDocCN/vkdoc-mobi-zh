  trans: "\n### 配方 16–4：多人游戏\n\n为游戏添加多人游戏选项可极大提升其重玩价值，因为玩家现在可以突破电脑的限制，在互联网上与真实玩家对战。\n\
    \n**注意：** 您无法在模拟器中测试多人游戏，而需要两台设备进行测试，因此可以借用朋友的设备或找一台旧 iPod touch。\n\n#### 设置代码\n\
    \n在本配方中，您可以跳过 iTunes Connect 部分，因为如果您已启用 Game Center，只要游戏支持，多人游戏功能就会自动开放。那么，我们直接进入代码部分。\n\
    \n首先，您需要更新 `MainMenuScene.h` 文件。将其设置为 `GKMatchmakerViewControllerDelegate`，并添加一个用于主持多人游戏的新操作。文件内容应如下所示：\n\
    \n```\n//  MainMenuScene.h\n//  HangmanMP\n//\n#import <UIKit/UIKit.h>\n#import\
    \ <GameKit/GameKit.h>\n\n@interface MainMenuScene : UIViewController <GKLeaderboardViewControllerDelegate,\n\
    GKAchievementViewControllerDelegate,GKMatchmakerViewControllerDelegate>\n\n- (IBAction)actionShowHighScores:(id)sender;\n\
    - (IBAction)actionShowAchievements:(id)sender;\n- (IBAction)actionHostMatch:(id)sender;\n\
    \n@end\n```\n\n现在切换到 `MainMenuScene.m` 文件。您需要创建 `GKMatchmakerViewControllerDelegate`\
    \ 协议要求的两个标准方法：`matchmakerViewControllerWasCancelled` 和 `matchmakerViewController:didFailWithError`：\n\
    \n```\n- (void)matchmakerViewControllerWasCancelled:(GKMatchmakerViewController*)viewController\n\
    {\n    [self dismissModalViewControllerAnimated:YES];\n}\n\n- (void)matchmakerViewController:(GKMatchmakerViewController\
    \ *)viewController\n                didFailWithError:(NSError *)error\n{\n   \
    \ [self dismissModalViewControllerAnimated:YES];\n    [[[UIAlertView alloc] initWithTitle:@\"\
    Error\" message:error.description delegate:nil\ncancelButtonTitle:@\"OK\" otherButtonTitles:nil]\
    \ show];\n}\n```\n\n您还需要添加最后一个委托协议方法 `matchmakerViewController:didFindMatch:`，这是开始加载多人游戏的关键步骤。\n\
    \n```\n- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController\n\
    \                    didFindMatch:(GKMatch *)match\n{\n    [self dismissModalViewControllerAnimated:YES];\n\
    //从故事板设置游戏场景\n    GameScene *gameSceneVC=[self.storyboard\ninstantiateViewControllerWithIdentifier:@\"\
    GameScene\"];\n//将 GameScene 的 match 属性设置为 matchmaker 的匹配结果\n    gameSceneVC.match=match;\n\
    //将 match 的委托设置为 GameScene，更多内容稍后说明…\n    match.delegate = gameSceneVC;\n[self.navigationController\
    \ pushViewController:gameSceneVC animated:YES];\n}\n```\n\n现在，您将创建使用 `matchmakerViewController`\
    \ 实际开始寻找匹配的操作：\n\n```\n- (IBAction)actionHostMatch:(id)sender {\n    if([GKLocalPlayer\
    \ localPlayer].isAuthenticated){\n        GKMatchRequest *request = [[GKMatchRequest\
    \ alloc] init] ;\n        request.minPlayers = 2;\n        request.maxPlayers\
    \ = 2;\n        GKMatchmakerViewController *mmvc = [[GKMatchmakerViewController\
    \ alloc]\ninitWithMatchRequest:request];\n        mmvc.matchmakerDelegate = self;\n\
    \        [self presentModalViewController:mmvc animated:YES];\n    }\n}\n```\n\
    \n这会让我们开始寻找匹配，但如果您希望能响应邀请，则需要添加邀请处理程序。这应该在玩家通过身份验证后立即添加，以便尽快处理邀请请求。这段代码将处理您发送的邀请以及您收到的邀请。将以下代码添加到\
    \ `MainMenuScene.m` 的 `-viewDidLoad` 方法中：\n\n```\n- (void)viewDidLoad\n{\n   \
    \ [super viewDidLoad];\n    [GKMatchmaker sharedMatchmaker].inviteHandler = ^(GKInvite\
    \ *acceptedInvite,\n                                                      NSArray\
    \ *playersToInvite) {\n        // 在此处插入特定于应用程序的代码，清理正在进行的游戏。\n        if (acceptedInvite)\n\
    \        {\n            GKMatchmakerViewController *mmvc = [[GKMatchmakerViewController\
    \ alloc]\ninitWithInvite:acceptedInvite];\n            mmvc.matchmakerDelegate\
    \ = self;\n            [self presentModalViewController:mmvc animated:YES];\n\
    \        }\n        else if (playersToInvite)\n        {\n            GKMatchRequest\
    \ *request = [[GKMatchRequest alloc] init];\n            request.minPlayers =\
    \ 2;\n            request.maxPlayers = 2;\n            request.playersToInvite\
    \ = playersToInvite;\n            GKMatchmakerViewController *mmvc = [[GKMatchmakerViewController\
    \ alloc]\ninitWithMatchRequest:request];\n            mmvc.matchmakerDelegate\
    \ = self;\n            [self presentModalViewController:mmvc animated:YES];\n\
    \        }\n    };\n}\n```\n\n现在，您需要在 `GameScene` 中实现多人游戏控制。打开 `GameScene.h`，将其设置为\
    \ `GKMatchDelegate`。也可以将其设置为 `UIAlertViewDelegate`（供稍后使用）。最后，添加两个新属性：`GKMatch\
    \ *match` 和 `BOOL matchStarted`。`GameScene.h` 现在的样式如下：\n\n```\n//  GameScene.h\n\
    //  HangmanMP\n\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface\
    \ GameScene : UIViewController <UITextFieldDelegate, GKMatchDelegate, UIAlertViewDelegate>\n\
    \n@property (weak, nonatomic) IBOutlet UITextField *textFieldGuess;\n@property\
    \ (weak, nonatomic) IBOutlet UITextView *textViewGuesses;\n@property (weak, nonatomic)\
    \ IBOutlet UILabel *labelGuessedLetters;\n@property (weak, nonatomic) IBOutlet\
    \ UIImageView *imageViewHanger;\n@property (weak, nonatomic) IBOutlet UILabel\
    \ *labelLettersInWord;\n@property (weak, nonatomic) IBOutlet UIScrollView *scrollViewContent;\n\
    @property (weak, nonatomic) IBOutlet UIActivityIndicatorView *activityIndicator;\n\
    \n@property(strong, nonatomic) NSMutableArray *arrayGuesses;\n@property(strong,\
    \ nonatomic) NSString *stringDifficulty;\n@property(strong, nonatomic) NSString\
    \ *stringHiddenWord;\n@property(nonatomic) int badGuessCount;\n@property(strong,\
    \ nonatomic) GKMatch *match;\n@property(nonatomic) BOOL matchStarted;\n\n-(NSString\
    \ *) getMagicWord;\n\n@end\n```\n\n切换到 `GameScene.m`，您还需要进行几处修改，以确保游戏能处理多人会话。首先，需要合成您创建的两个新属性，因此在\
    \ `@synthesize` 列表底部添加以下内容：\n\n```\n@synthesize match;\n@synthesize matchStarted;\n\
    ```\n\n现在，在 `GameScene.m` 中创建一个方法，用于向游戏中的所有用户发送数据。这是一个通用函数，用于编码 `NSDictionary`\
    \ 并以 `NSData` 对象形式发送。\n\n```\n- (void) sendData:(NSDictionary *)dictionaryToSend\n\
    {\n    NSError *error;\n\n    NSMutableData *dataToSend = [[NSMutableData alloc]\
    \ init];\n        NSKeyedArchiver *archiver = [[NSKeyedArchiver alloc]\ninitForWritingWithMutableData:dataToSend];\n\
    \        [archiver encodeObject:dictionaryToSend forKey:@\"DataDictionary\"];\n\
    \        [archiver finishEncoding];\n\n    [match sendDataToAllPlayers:dataToSend\
    \ withDataMode:GKMatchSendDataReliable\nerror:&error];\n    if (error != nil)\n\
    \    {\n        NSLog(@\"Error sending data: %@\", error.description);\n    }\n\
    }\n```\n\n注意这一行：\n\n`[match sendDataToAllPlayers:dataToSend withDataMode:GKMatchSendDataReliable\
    \ error:&error];`\n"
- fmt: "You could also send the data with `withDataMode:GKMatchSendDataUnreliable`\
    \ if you didn't need to know every update of the player (for instance, if the\
    \ player were moving on the screen, you need to know only the current position,\
    \ not where the player has been). In this case, you do need to know that players\
    \ receive your data (the word they are trying to guess), so you will send with\
    \ `GKMatchSendDataReliable`.\n\nBefore I show how to receive data, let's take\
    \ a look at setting up the match. Add the following delegate method to notify\
    \ your game whenever a player's state changes. Once all the players are in the\
    \ game, the `expectedPlayerCount` will equal 0 and you are ready to start your\
    \ game. You need to know who is going to go first, so have each player generate\
    \ a random number with `arc4random()` between 0 and 999. Then send this random\
    \ number using your previous `sendData` method.\n\n```\n- (void)match:(GKMatch\
    \ *)match player:(NSString *)playerID\ndidChangeState:(GKPlayerConnectionState)state\n\
    {\n    switch (state)\n    {\n        case GKPlayerStateConnected:\n         \
    \   // handle a new player connection.\n            break;\n        case GKPlayerStateDisconnected:\n\
    \            [[[UIAlertView alloc] initWithTitle:@\"Warning\" message@\"Opponent\
    \ left the\ngame\" delegate:nil cancelButtonTitle:@\"OK\" otherButtonTitles:nil]\
    \ show];\n            break;\n    }\n    if (!self.matchStarted && match.expectedPlayerCount\
    \ == 0)\n    {\n        self.matchStarted = YES;\n        // handle initial match\
    \ negotiation.\n        randomPlayerStartKey=arc4random() % 1000;\n        NSDictionary\
    \ *dictionaryRandomStart=[NSDictionary\n                                     \
    \        dictionaryWithObject:[NSNumber\nnumberWithInt:randomPlayerStartKey]\n\
    \                                             forKey:@\"randomStartKey\"];\n \
    \       [self sendData:dictionaryRandomStart];\n\n    }\n}\n```\n\nSo now you\
    \ have your first piece of data to receive, the random number that was generated.\
    \ You'll start by decoding the `NSData` received back into a dictionary. Then\
    \ you'll check for the key `randomStartKey`; if it exists, you'll check if it\
