    **图 1–31.** *验证 ARC*


    ### 快速技巧


    Xcode 内置了许多复杂功能，可以极大地改善你的开发体验。本节列出了一些快捷方式，旨在加速常见任务，并使应用程序构建过程更简单。


    #### 注释


    要快速注释掉一段代码，请用鼠标选中代码，然后按下键盘上的 ![图片](img/U003.jpg)`/`；每一行都会被注释掉。需要取消注释吗？只需重复该操作，这些行就会被取消注释。


    #### 自动完成


    Xcode 4 在之前的自动完成功能基础上有了很大改进，它会在你输入时工作。这非常有助于让你了解哪些方法可用，并提高编码效率。如果没有显示自动完成，或者你想知道某个对象有哪些可用方法，请按
    `Esc` 键调出可用方法列表。


    #### 快速缩进/取消缩进


    Xcode 4 在管理缩进方面做得相当不错，但如果你发现自己需要一些自定义缩进或管理自己的缩进，请使用 ![图片](img/U003.jpg)`` 来取消缩进，使用
    ![图片`]` 来手动缩进。这对于代码块也同样有效；只需用鼠标选中代码块，然后使用键盘快捷键即可。


    #### 在头文件和实现文件之间快速切换


    你刚刚向类的头文件添加了一个新的属性或对象，现在想切换到实现文件开始为该对象编写代码。按 `^`![图片](img/U003.jpg)`+上/下方向键` 可以在两个文件之间切换。图
    1–32 展示了助理编辑器的一个常见用途。


    Xcode 4 还提供了一个新的拆分窗格视图，用于显示相关文件，称为助理视图。要启用此视图，你可以点击屏幕顶部的助理视图图标，或按 `⌥`![图片](img/U003.jpg)`+,`（option+command+逗号）来加载助理视图。


    **注意：** 如果你正在查看实现文件，键盘快捷键效果最佳；执行命令，它会自动在右侧窗格中加载头文件。


    ![图片](img/9781430240051_Fig01-32.jpg)


    **图 1–32.** *选择助理编辑器*


    #### 类文档


    记不起一个类的所有属性或方法了？你可以通过 `^`-点击一个对象类型来获取提示，会弹出一个包含对象描述的弹出窗口，如图 1–33 所示。在此弹出窗口中，你还可以查看对象的文档或头文件。


    ![图片](img/9781430240051_Fig01-33.jpg)


    **图 1–33.** *访问类文档*


    一个类似的快捷方式是 `⌘`-点击任何对象或类，以跳转到其定义。


    #### 在助理编辑器中打开文件


    你可以 `⌥`-点击导航窗格中的任何文件，以在助理编辑器中打开它。你也可以 `⌘⌥`-点击任何文件，会弹出一个类似 Xcode 界面的示意图，如图 1–34
    所示。在示意图中选择一个区域，即可在 Xcode 中对应的窗格中打开该文件。


    ![图片](img/9781430240051_Fig01-34.jpg)


    **图 1–34.** *配置助理编辑器*

