  raw: 'Now you just need to create your `UINavigationController` to display and manage
    the view controller and add its view as a subview of your application’s window.
    Overall, your `-application:didFinishLaunchingWithOptions:` method should look
    like so:


    `- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions`

    `{`

    `    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];`


    `    self.tableVC = [[MainTableViewController alloc] init];`

    `    self.navcon = [[UINavigationController alloc] initWithRootViewController:tableVC];`


    `    [self.window addSubview:navcon.view];`

    `    [self.window makeKeyAndVisible];`

    `    return YES;`

    `}`


    Upon running this project in the simulator, you will see a basic view of a `UITableView`
    with some generic information, as in [Figure 9–5](#Chapter09.html#fig_9_5).


