- fmt: "### Requiring Location Services\n\nIf your application is completely dependent\
    \ on location services, you may want to prevent it from being loaded on a device\
    \ that does not support location services. You can require GPS, magnetometer,\
    \ or location services in general. Place these requirements only if these capabilities\
    \ are absolutely critical to the functionality of your application. To configure\
    \ these requirements, click the project in the navigator pane, and select your\
    \ project target in the editor window.\n\nIf you wish to add these requirements\
    \ to an existing project, select the Info tab and add a row to the Custom iOS\
    \ Target Properties listing. You can add a row by clicking the small “+” icon\
    \ to the right of the key name, or to the right of the name of any existing rows.\
    \ The key you want to add is “Required device capabilities” or `UIRequiredDeviceCapabilities`.\
    \ There is no difference between these two names, as the latter will automatically\
    \ be replaced by the former. This key contains an array of values that reference\
    \ device capabilities that are required for a device to run your application.\
    \ Expand the key, and add the required capabilities as items in the key, as highlighted\
    \ in [Figure 4–1](#Chapter04.html#fig_4_1).\n\n![Image](images/9781430240051_Fig04-01.jpg)\n\
    \n**Figure 4–1.** *Specifying required device capabilities for an application*\n\
    \nIf you require just location services (i.e., knowing only the general location\
    \ of a user without heading or GPS accuracy), adding the location services item\
    \ alone is enough. If, however, your application requires GPS accuracy, then you\
    \ may want to add the GPS requirement. If you include the GPS item, you should\
    \ also include the location services item. And finally, if your device needs to\
    \ know the heading of the device, you can include the magnetometer as a required\
    \ capability.\n\n### How Do I Know Where I Am?\n\nThere are two primary methods\
    \ for finding the location of a device: standard location service and significant\
    \ location change service. Which one you use will depend on how accurate you need\
    \ that information to be and how often you need to be notified that a device's\
    \ location has changed.\n\nThe standard location service provides more accurate\
    \ location information and will invoke the GPS if the accuracy requested requires\
    \ it. This greater accuracy comes at a cost in terms of a longer time to get an\
    \ accurate location and an increased drain of the battery. If you are going to\
    \ use the standard location service, you should use it with precision and only\
    \ when necessary. We'll discuss some best practices and techniques for using this\
    \ service later in this chapter.\n\nThe significant location change service provides\
    \ some flexibility and is recommended for most applications that don't need highly\
    \ accurate location information. For instance, if you need to know only the town\
    \ or city that someone is in, the significant location change service is perfectly\
    \ acceptable. You will get a fast response without using a lot of battery power\
    \ because it uses the cellular signal to determine the device's location. Another\
    \ additional benefit of the significant location change service is its ability\
    \ to run in the background on the device. Your app does not have to be running\
    \ in the foreground to receive location updates from this service.\n\nThese two\
    \ services work in very similar ways. They require a `CLLocationManager` object\
    \ to be instantiated that sets up the location services and specifies how it is\
    \ to be used. The `CLLocationManager` object will also have a delegate defined.\
    \ This delegate should respond to at least two methods:\n\n```\n- locationManager:didUpdateToLocation:fromLocation:\n\
    - locationManager:didFailWithError:\n```\n\nThe implementation of these methods\
    \ for each service will be discussed in the recipes that follow.\n\n### Recipe\
    \ 4–1: Getting Device Location Information\n\nTo get the most accurate location\
    \ information about a device, you are going to use the standard location service.\
    \ Let's start by creating a new single view application called Chapter4SampleProject\
    \ to implement this functionality. If your version of Xcode allows you to specify\
    \ a class prefix, enter `Chapter4SampleProject` again.\n\nThe first thing you\
    \ need to do when adding location services to an application is add the Core Location\
    \ framework library to the application. The location of frameworks has changed\
    \ slightly from Xcode 3 to Xcode 4. You will now find them when you select the\
    \ project in the navigator pane and select your project's target. Switch over\
    \ to the Build Phases tab, and expand the Link Binary With Libraries area to see\
    \ the included frameworks, resembling [Figure 4–2](#Chapter04.html#fig_4_2). Clicking\
    \ the + button will allow you to add the Core Location framework to your project,\
    \ as shown in [Figure 4–3](#Chapter04.html#fig_4_3).\n\n![Image](images/9781430240051_Fig04-02.jpg)\n\
    \n**Figure 4–2.** *Clicking the + button to add a framework*\n\n![Image](images/9781430240051_Fig04-03.jpg)\n\
    \n**Figure 4–3.** *Selecting `CoreLocation.framework` to add it to your project*\n\
    \nNow you're going to set up your XIB to display the location information. Click\
    \ the `Chapter4SampleProject.xib` file in the navigator pane, and Interface Builder\
    \ will be loaded. You're going to drag a `UILabel` and `UISwitch` object onto\
    \ the XIB. The `UILabel` will be used to display the location information, and\
    \ the `UISwitch` will be used to turn location services on and off. You're going\
    \ to set the initial state of the `UISwitch` to Off in the Attributes Inspector\
    \ tab of the utilities pane. Your XIB now resembles [Figure 4–4](#Chapter04.html#fig_4_4).\n\
    \n![Image](images/9781430240051_Fig04-04.jpg)\n\n**Figure 4–4.** *User interface\
    \ for displaying simple location information*\n\nNow create some outlet properties\
    \ and actions. Turn on the Assistant Editor, and select the `UIView` in the XIB.\
    \ ^-click-;drag from the `UILabel` to the interface file (`.h`) to create an outlet.\
    \ In the pop-up that is displayed, name the `UILabel` “labelLocation”, as demonstrated\
    \ in [Figure 4–5](#Chapter04.html#fig_4_5).\n\n![Image](images/9781430240051_Fig04-05.jpg)\n\
    \n**Figure 4–5.** *Connect your `UILabel` to an outlet*\n\nRepeat the same process\
    \ with the `UISwitch`, but this time change the Connection type to Action and\
    \ name the action “toggleLocationServices”, following [Figure 4–6](#Chapter04.html#fig_4_6).\n\
    \n![Image](images/9781430240051_Fig04-06.jpg)\n\n**Figure 4–6.** *Creating an\
    \ action to be performed by the switch*\n\nImport the Core Location framework\
    \ into the `Chapter4SampleProjectViewController` interface file (`.h`) by putting\
    \ the following line at the top of the interface file:\n\n```\n#import <CoreLocation/CoreLocation.h>\n\
    ```\n\nYou should also define a `CLLocationManager` object at this time, and for\
    \ convenience, you will set the view controller to also be the `CLLocationManagerDelegate`.\
    \ This object will act as your “hub” of action for dealing with all location-based\
    \ services. Your interface file should now look like this:\n\n```\n//  Chapter4SampleProjectViewController.h\n\
    \n#import <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\n@interface\
    \ Chapter4SampleProjectViewController : UIViewController\n<CLLocationManagerDelegate>\
    \ {\n    UILabel *labelLocation;\n    CLLocationManager *_locationManager;\n}\n\
    \n@property (strong, nonatomic) IBOutlet UILabel *labelLocation;\n\n- (IBAction)toggleLocationServices:(id)sender;\n\
    @end\n```\n\nNow that the interface has been defined, you can move to the implementation\
    \ file (`.m`) and start implementing these methods and objects. The first thing\
    \ you're going to tackle is the `toggleLocationServices:sender:` action. When\
    \ the user touches this control, you'll want to check if location services are\
    \ available to you. If they are not available, you will present an alert view\
    \ stating that location services must be enabled to continue."
  raw: '### Requiring Location Services


    If your application is completely dependent on location services, you may want
    to prevent it from being loaded on a device that does not support location services.
    You can require GPS, magnetometer, or location services in general. Place these
    requirements only if these capabilities are absolutely critical to the functionality
    of your application. To configure these requirements, click the project in the
    navigator pane, and select your project target in the editor window.


    If you wish to add these requirements to an existing project, select the Info
    tab and add a row to the Custom iOS Target Properties listing. You can add a row
    by clicking the small “+” icon to the right of the key name, or to the right of
    the name of any existing rows. The key you want to add is “Required device capabilities”
    or `UIRequiredDeviceCapabilities`. There is no difference between these two names,
    as the latter will automatically be replaced by the former. This key contains
    an array of values that reference device capabilities that are required for a
    device to run your application. Expand the key, and add the required capabilities
    as items in the key, as highlighted in [Figure 4–1](#Chapter04.html#fig_4_1).


    ![Image](images/9781430240051_Fig04-01.jpg)


    **Figure 4–1.** *Specifying required device capabilities for an application*


    If you require just location services (i.e., knowing only the general location
    of a user without heading or GPS accuracy), adding the location services item
    alone is enough. If, however, your application requires GPS accuracy, then you
    may want to add the GPS requirement. If you include the GPS item, you should also
    include the location services item. And finally, if your device needs to know
    the heading of the device, you can include the magnetometer as a required capability.


    ### How Do I Know Where I Am?


    There are two primary methods for finding the location of a device: standard location
    service and significant location change service. Which one you use will depend
    on how accurate you need that information to be and how often you need to be notified
    that a device''s location has changed.


    The standard location service provides more accurate location information and
    will invoke the GPS if the accuracy requested requires it. This greater accuracy
    comes at a cost in terms of a longer time to get an accurate location and an increased
    drain of the battery. If you are going to use the standard location service, you
    should use it with precision and only when necessary. We''ll discuss some best
    practices and techniques for using this service later in this chapter.


    The significant location change service provides some flexibility and is recommended
    for most applications that don''t need highly accurate location information. For
    instance, if you need to know only the town or city that someone is in, the significant
    location change service is perfectly acceptable. You will get a fast response
    without using a lot of battery power because it uses the cellular signal to determine
    the device''s location. Another additional benefit of the significant location
    change service is its ability to run in the background on the device. Your app
    does not have to be running in the foreground to receive location updates from
    this service.


    These two services work in very similar ways. They require a `CLLocationManager`
    object to be instantiated that sets up the location services and specifies how
    it is to be used. The `CLLocationManager` object will also have a delegate defined.
    This delegate should respond to at least two methods:


    `- locationManager:didUpdateToLocation:fromLocation:`

    `- locationManager:didFailWithError:`


    The implementation of these methods for each service will be discussed in the
    recipes that follow.


    ### Recipe 4–1: Getting Device Location Information


    To get the most accurate location information about a device, you are going to
    use the standard location service. Let''s start by creating a new single view
    application called Chapter4SampleProject to implement this functionality. If your
    version of Xcode allows you to specify a class prefix, enter **Chapter4SampleProject**
    again.


    The first thing you need to do when adding location services to an application
    is add the Core Location framework library to the application. The location of
    frameworks has changed slightly from Xcode 3 to Xcode 4\. You will now find them
    when you select the project in the navigator pane and select your project''s target.
    Switch over to the Build Phases tab, and expand the Link Binary With Libraries
    area to see the included frameworks, resembling [Figure 4–2](#Chapter04.html#fig_4_2).
    Clicking the + button will allow you to add the Core Location framework to your
    project, as shown in [Figure 4–3](#Chapter04.html#fig_4_3).


    ![Image](images/9781430240051_Fig04-02.jpg)


    **Figure 4–2.** *Clicking the + button to add a framework*


    ![Image](images/9781430240051_Fig04-03.jpg)


    **Figure 4–3.** *Selecting `CoreLocation.framework` to add it to your project*


    Now you''re going to set up your XIB to display the location information. Click
    the `Chapter4SampleProject.xib` file in the navigator pane, and Interface Builder
    will be loaded. You''re going to drag a `UILabel` and `UISwitch` object onto the
    XIB. The `UILabel` will be used to display the location information, and the `UISwitch`
    will be used to turn location services on and off. You''re going to set the initial
    state of the `UISwitch` to Off in the Attributes Inspector tab of the utilities
    pane. Your XIB now resembles [Figure 4–4](#Chapter04.html#fig_4_4).


    ![Image](images/9781430240051_Fig04-04.jpg)


    **Figure 4–4.** *User interface for displaying simple location information*


    Now create some outlet properties and actions. Turn on the Assistant Editor, and
    select the `UIView` in the XIB. ^-click-;drag from the `UILabel` to the interface
    file (`.h`) to create an outlet. In the pop-up that is displayed, name the `UILabel`
    “labelLocation”, as demonstrated in [Figure 4–5](#Chapter04.html#fig_4_5).


    ![Image](images/9781430240051_Fig04-05.jpg)


    **Figure 4–5.** *Connect your `UILabel` to an outlet*


    Repeat the same process with the `UISwitch`, but this time change the Connection
    type to Action and name the action “toggleLocationServices”, following [Figure
    4–6](#Chapter04.html#fig_4_6).


    ![Image](images/9781430240051_Fig04-06.jpg)


    **Figure 4–6.** *Creating an action to be performed by the switch*


    Import the Core Location framework into the `Chapter4SampleProjectViewController`
    interface file (`.h`) by putting the following line at the top of the interface
    file:


    `#import <CoreLocation/CoreLocation.h>`


    You should also define a `CLLocationManager` object at this time, and for convenience,
    you will set the view controller to also be the `CLLocationManagerDelegate`. This
    object will act as your “hub” of action for dealing with all location-based services.
    Your interface file should now look like this:


    `//  Chapter4SampleProjectViewController.h`


    `#import <UIKit/UIKit.h>`

    `#import <CoreLocation/CoreLocation.h>`


    `@interface Chapter4SampleProjectViewController : UIViewController`

    `<CLLocationManagerDelegate> {`

    `    UILabel *labelLocation;`

    `    CLLocationManager *_locationManager;`

    `}`


    `@property (strong, nonatomic) IBOutlet UILabel *labelLocation;`


    `- (IBAction)toggleLocationServices:(id)sender;`

    `@end`


    Now that the interface has been defined, you can move to the implementation file
    (`.m`) and start implementing these methods and objects. The first thing you''re
    going to tackle is the `toggleLocationServices:sender:` action. When the user
    touches this control, you''ll want to check if location services are available
    to you. If they are not available, you will present an alert view stating that
    location services must be enabled to continue.'
  trans: "\n### 要求定位服务\n\n如果你的应用完全依赖于定位服务，你可能希望阻止它加载到不支持定位服务的设备上。你可以要求设备具备 GPS、磁力计或常规定位服务。请仅在应用功能绝对需要这些能力时，才添加这些要求。要配置这些要求，请在导航窗格中点击项目，然后在编辑器窗口中选择项目目标。\n\
    \n如果你希望向现有项目添加这些要求，请选择“信息”标签，并在“自定义 iOS 目标属性”列表中添加一行。你可以通过点击键名右侧或任何现有行名称右侧的小“+”图标来添加一行。你要添加的键是“Required\
    \ device capabilities”或`UIRequiredDeviceCapabilities`。这两个名称没有区别，因为后者会自动被前者替换。该键包含一个值数组，这些值引用了设备运行应用所需的设备能力。展开该键，并将所需能力作为该键中的项目添加，如图\
    \ 4-1 中突出显示的那样。\n\n![图像](img/9781430240051_Fig04-01.jpg)\n\n**图 4-1.** *指定应用的所需设备能力*\n\
    \n如果你只需要定位服务（即仅了解用户的大致位置，无需方向或 GPS 精度），则只需添加定位服务这一项即可。但如果你的应用需要 GPS 精度，那么你可能需要添加\
    \ GPS 要求。如果你包含了 GPS 项，也应该包含定位服务项。最后，如果你的设备需要了解设备的朝向，你可以将磁力计作为一个必需能力包含在内。\n\n###\
    \ 如何知道我在哪里？\n\n查找设备位置主要有两种方法：标准定位服务和重大位置变化服务。使用哪种方法取决于你所需信息的精度以及你希望多频繁地收到设备位置变化的通知。\n\
    \n标准定位服务提供更精确的位置信息，如果所请求的精度需要，它将调用 GPS。这种更高的精度是以获取精确位置用时更长以及电池消耗增加为代价的。如果你打算使用标准定位服务，应当精确使用，并且只在必要时使用。我们将在本章后面讨论一些使用此服务的最佳实践和技术。\n\
    \n重大位置变化服务提供了一定的灵活性，推荐给大多数不需要高精度位置信息的应用使用。例如，如果你只需要知道某人所在的城镇或城市，重大位置变化服务就完全可以接受。你将获得快速响应，而不会消耗太多电量，因为它使用蜂窝信号来确定设备位置。重大位置变化服务的另一个好处是它能够在设备后台运行。你的应用不必在前台运行就能接收来自此服务的位置更新。\n\
    \n这两种服务的工作方式非常相似。它们都需要实例化一个`CLLocationManager`对象，该对象负责设置定位服务并指定其使用方式。`CLLocationManager`对象还定义了一个委托。该委托应至少响应两个方法：\n\
    \n```\n- locationManager:didUpdateToLocation:fromLocation:\n- locationManager:didFailWithError:\n\
    ```\n\n每种服务这些方法的实现将在随后的方案中讨论。\n\n### 方案 4-1：获取设备位置信息\n\n为了获取设备最精确的位置信息，你将使用标准定位服务。我们首先创建一个名为\
    \ Chapter4SampleProject 的新单视图应用来实现此功能。如果你的 Xcode 版本允许你指定类前缀，请再次输入`Chapter4SampleProject`。\n\
    \n在向应用添加定位服务时，首先要做的是将 Core Location 框架库添加到应用中。从 Xcode 3 到 Xcode 4，框架的位置略有变化。现在，当你在导航窗格中选择项目并选择项目目标时，就能找到它们。切换到“构建阶段”标签，展开“将二进制文件与库链接”区域以查看包含的框架，如图\
    \ 4-2 所示。点击“+”按钮将允许你向项目添加 Core Location 框架，如图 4-3 所示。\n\n![图像](img/9781430240051_Fig04-02.jpg)\n\
    \n**图 4-2.** *点击“+”按钮添加框架*\n\n![图像](img/9781430240051_Fig04-03.jpg)\n\n**图 4-3.**\
    \ *选择`CoreLocation.framework`并将其添加到项目*\n\n现在，你将设置 XIB 以显示位置信息。在导航窗格中点击`Chapter4SampleProject.xib`文件，Interface\
    \ Builder 将被加载。你将把一个`UILabel`和一个`UISwitch`对象拖到 XIB 上。`UILabel`将用于显示位置信息，`UISwitch`将用于打开和关闭定位服务。你将在工具窗格的“属性检查器”标签中将`UISwitch`的初始状态设置为关闭。现在你的\
    \ XIB 如图 4-4 所示。\n\n![图像](img/9781430240051_Fig04-04.jpg)\n\n**图 4-4.** *用于显示简单位置信息的用户界面*\n\
    \n现在创建一些输出属性和操作。打开助理编辑器，并在 XIB 中选择`UIView`。按住^键并点击；从`UILabel`拖拽到接口文件（`.h`）以创建一个输出。在出现的弹出窗口中，将`UILabel`命名为“labelLocation”，如图\
    \ 4-5 所示。\n\n![图像](img/9781430240051_Fig04-05.jpg)\n\n**图 4-5.** *将`UILabel`连接到输出口*\n\
    \n对`UISwitch`重复相同过程，但这次将连接类型更改为“操作”，并将操作命名为“toggleLocationServices”，参考图 4-6。\n\
    \n![图像](img/9781430240051_Fig04-06.jpg)\n\n**图 4-6.** *创建由开关执行的操作*\n\n通过将以下行放在接口文件的顶部，将\
    \ Core Location 框架导入到`Chapter4SampleProjectViewController`接口文件（`.h`）中：\n\n```\n\
    #import <CoreLocation/CoreLocation.h>\n```\n\n此时，你还应定义一个`CLLocationManager`对象，为了方便起见，你将视图控制器也设置为`CLLocationManagerDelegate`。该对象将作为你处理所有基于位置服务的“行动中枢”。你的接口文件现在应如下所示：\n\
    \n```\n//  Chapter4SampleProjectViewController.h\n\n#import <UIKit/UIKit.h>\n\
    #import <CoreLocation/CoreLocation.h>\n\n@interface Chapter4SampleProjectViewController\
    \ : UIViewController\n<CLLocationManagerDelegate> {\n    UILabel *labelLocation;\n\
    \    CLLocationManager *_locationManager;\n}\n\n@property (strong, nonatomic)\
    \ IBOutlet UILabel *labelLocation;\n\n- (IBAction)toggleLocationServices:(id)sender;\n\
    @end\n```\n\n现在接口已定义完毕，你可以转到实现文件（`.m`）并开始实现这些方法和对象。你首先要处理的是`toggleLocationServices:sender:`操作。当用户触摸此控件时，你需要检查定位服务是否可用。如果不可用，将显示一个警告视图，说明必须启用定位服务才能继续。\n"
- fmt: "```objc\nif(![CLLocationManager locationServicesEnabled]){\n    UIAlertView\
    \ *alertLocation = [[UIAlertView alloc] initWithTitle:@\"Location\nError\" message:@\"\
    Location services must be enabled for this feature to work\"\ndelegate:nil cancelButtonTitle:@\"\
    OK\" otherButtonTitles:nil];\n    [alertLocation show];\n    return;\n}\n```\n\
    \n如果位置服务可用，您需要检查控件的状态。如果其状态已设置为“开”，您需要检查`CLLocationManager`对象是否已被实例化。如果没有，您将需要实例化它并设置其属性和委托。对于标准的位置服务，您应当始终设置`CLLocationManager`对象的`desiredAccuracy`和`distanceFilter`属性。\n\
    \n`desiredAccuracy`属性告知Core Location框架您希望位置信息的精确程度（以米为单位）。然而，精确度不被保证，设备将尽力使用可用资源，尽可能接近您期望的精确度获取信息。Apple建议对此设置尽可能保守。如果您不需要知道当前设备的街道地址，请使用更高的精确度设置。有许多常量可供您方便使用：\n\
    \n`kCLLocationAccuracyBestForNavigation`\n`kCLLocationAccuracyBest`\n`kCLLocationAccuracyNearestTenMeters`\n\
    `kCLLocationAccuracyHundredMeters`\n`kCLLocationAccuracyKilometer`\n`kCLLocationAccuracyThreeKilometers`\n\
    \n如您所见，这些指定距离的常量限于公制单位。如果您对这些距离单位不太熟悉，1米比1码稍长，1公里则略超半英里（6/10英里）。\n\n`distanceFilter`属性指定设备需要移动多远（同样以米为单位），以便您通过委托被通知其新位置。为此属性提供的唯一常量是`kCLDistanceFilterNone`，它将向委托报告所有位置变化。\n\
    \n使用定位服务时，您还应始终设置的另一个属性是`purpose`属性。当提示用户允许您的应用程序访问其位置时，`purpose`属性中的字符串会被显示，告知用户您计划如何使用设备的位置信息。\n\
    \n一旦您设置了属性和委托，可以通过调用`CLLocationManager`上的`startUpdatingLocation`方法来启动定位服务。\n\n\
    停止定位服务只需在`CLLocationManager`对象上调用`stopUpdatingLocation`。如果用户将`UISwitch`拨到关闭状态，您就需要这样做。在添加了启动和停止`CLLocationManager`的代码后，您的操作方法应如下所示：\n\
    \n```objc\n- (IBAction)toggleLocationServices:(id)sender {\n    // Display an\
    \ UIAlertView if locationServices are not enabled and return\n    if(![CLLocationManager\
    \ locationServicesEnabled]){\n        UIAlertView *alertLocation = [[UIAlertView\
    \ alloc] initWithTitle:@\"Location\nError\" message:@\"Location services must\
    \ be enabled for this feature to work\"\ndelegate:nil cancelButtonTitle:@\"OK\"\
    \ otherButtonTitles:nil];\n        [alertLocation show];\n        return;\n  \
    \  }\n\n    // Future Proof: Make sure it's a UISwitch calling this action\n \
    \   if([sender isKindOfClass:[UISwitch class]]){\n        UISwitch *locationSwitch=(UISwitch\
    \ *)sender;\n        // Check if switch is \"on\"\n        if(locationSwitch.on){\n\
    \            // Check if _locationManager has been instantiated yet\n        \
    \    if(_locationManager==nil){\n                // Instantiate _locationManager\n\
    \                _locationManager = [[CLLocationManager alloc] init];\n      \
    \          _locationManager.desiredAccuracy=kCLLocationAccuracyBest;\n       \
    \         _locationManager.distanceFilter=1;\n_locationManager.purpose=@\"We will\
    \ only use your location information to display your\npresent location.  We will\
    \ not send it or record it.\";\n_locationManager.delegate=self;\n            }\n\
    \            // Start updating location\n            [_locationManager startUpdatingLocation];\n\
    \        }else{\n            // Check if _locationManager has been instantiated\
    \ yet\n            if(_locationManager!=nil){\n                // Stop updating\
    \ location\n                [_locationManager stopUpdatingLocation];\n       \
    \     }\n        }\n    }\n}\n```\n\n接下来需要设置委托方法。当接收到位置更新或获取位置出现错误时，会调用这些方法。您将首先处理错误委托方法。最常见的错误来源是当提示用户允许您的应用程序使用定位服务，而用户拒绝授权时。如果发生这种情况，您应通过调用`stopUpdatingLocation`方法停止请求位置更新：\n\
    \n```objc\n-(void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError\
    \ *)error{\n    if(error.code == kCLErrorDenied){\n[manager stopUpdatingLocation];\n\
    \    }\n}\n```\n\n处理位置更新的委托方法稍微复杂一些。方法`- locationManager:didUpdateToLocation:fromLocation:`会传递三个对象：发起位置更新请求的`CLLocationManager`，`newLocation`，以及`oldLocation`。这两个位置对象属于`CLLocation`类。该对象包含大量有价值的信息，包括位置坐标、精确度信息以及位置更新的时间戳。您将按如下方式实现此方法：\n\
    \n```objc\n-(void)locationManager:(CLLocationManager *)manager didUpdateToLocation:(CLLocation\n\
    *)newLocation fromLocation:(CLLocation *)oldLocation{\n    // Check to make sure\
    \ this is a recent location event\n    NSDate *eventDate=newLocation.timestamp;\n\
    \    NSTimeInterval eventInterval=[eventDate timeIntervalSinceNow];\n    if(abs(eventInterval)<30.0){\n\
    \        // Check to make sure the event is accurate\n        if(newLocation.horizontalAccuracy>=0\
    \ && newLocation.horizontalAccuracy<20){\n            self.labelLocation.text=newLocation.description;\n\
    \        }\n    }\n}\n```\n\n在您的应用程序处理`CLLocation`对象之前，您应检查该位置对象的时间戳是否是最新的。Core\
    \ Location 有一种习惯，在锁定新位置之前，会首先将上一次已知位置作为第一次调用传递给委托方法。当您需要知道设备当前的位置时，无需处理一个代表设备历史上某个时间点位置的对象。为此，您可以使用类似以下的代码，只处理当前时间\
    \ 20 秒内发生的位置事件：\n\n```objc\n    // Check to make sure this is a recent location\
    \ event\n    NSDate *eventDate=newLocation.timestamp;\n    NSTimeInterval eventInterval=[eventDate\
    \ timeIntervalSinceNow];\n    if(abs(eventInterval)<30.0){\n        // …process\
