  raw: '### Recipe 8–3: Displaying Events in a UITableView


    Now that you are able to access your events, you will start by creating a better
    interface with which to deal with them. You will implement a grouped `UITableView`
    to display your events.


    First, you need to add your `UITableView` into your XIB file. Go ahead and drag
    out a `UITableView` element from your library, and make it take up the entire
    view. In the Attribute inspector, make sure that the “Style” of the table view
    is set to “Grouped”, as shown in [Figure 8–3](#Chapter08.html#fig_8_3).


    ![Image](images/9781430240051_Fig08-03.jpg)


    **Figure 8–3.** *Configuring your grouped `UITableView`*


    Next, connect your `UITableView` to your view controller''s header file. The property
    used here will be called `tableViewEvents`.


    Before you switch over to your implementation file, you will define two more properties
    that you will use. First, an `NSArray` called `calendars` will be used to hold
    references to all the calendars in your `EKEventStore`. Second, an instance of
    `NSMutableDictionary` will be used to store all your events based on which calendar
    they belong to. Make sure to properly synthesize these, and also make sure they
    are set to `nil` in `-viewDidUnload`.


    `@property (nonatomic, strong) NSMutableDictionary *events;`

    `@property (nonatomic, strong) NSArray *calendars;`


    The first thing you need to do is set up a newer version of your `-viewDidLoad`
    method in order to properly populate your array and dictionary, as well as to
    make sure your `UITableView` is properly set up.


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`


    `    self.tableViewEvents.delegate = self;`

    `    self.tableViewEvents.dataSource = self;`


    `    self.eventStore = [[EKEventStore alloc] init];`

    `    self.calendars = [self.eventStore calendars];`


    `    [self fetchEvents];`

    `}`


    The new `-fetchEvents` method will contain your code to actually query the `eventStore`
    for your events. Since you will be sorting your events by the calendar they belong
    to, you will perform a different query for each calendar, rather than just one
    for all events.


    `-(void)fetchEvents`

    `{`

    `    self.events = nil;`

    `    self.events = [[NSMutableDictionary alloc] initWithCapacity:[self.calendars
    count]];`


    `    for (EKCalendar *cal in self.calendars)`

    `    {`

    `        NSPredicate *calPredicate = [self.eventStore`

    `predicateForEventsWithStartDate:[NSDate date] endDate:[NSDate`

    `dateWithTimeIntervalSinceNow:(2*24.0*60*60)] calendars:[NSArray arrayWithObject:cal]];`

    `        //Passing nil to calendars means to search all calendars.`


    `        NSArray *eventsInThisCalendar = [self.eventStore eventsMatchingPredicate:calPredicate];`

    `        if (eventsInThisCalendar != nil)`

    `        {`

    `            [self.events setObject:eventsInThisCalendar forKey:cal.title];`

    `        }`

    `    }`

    `}`


    As you can see, you will be storing your events in an `NSMutableDictionary` by
    using the titles of your calendars as keys, with their objects being arrays of
    events that belong to that specific calendar.


    Before you continue, you need to specify that your view controller will conform
    to certain protocols in order for your compile to allow it to be set as the delegate
    and data source of your view controller. After adding the `UITableViewDelegate`
    and `UITableViewDataSource` protocols, your header file should now resemble the
    following:


    `#import <UIKit/UIKit.h>`

    `#import <EventKit/EventKit.h>`


    `@interface MainViewController : UIViewController <UITableViewDelegate,`

    `UITableViewDataSource>{`

    `    UITableView *tableViewEvents;`

    `}`


    `@property (nonatomic, strong) EKEventStore *eventStore;`

    `@property (strong, nonatomic) IBOutlet UITableView *tableViewEvents;`


    `@property (nonatomic, strong) NSMutableDictionary *events;`

    `@property (nonatomic, strong) NSArray *calendars;`

    `@end`


    In order to properly implement a grouped `UITableView`, you need to implement
    a method to specify exactly how many sections you will need. Since you have one
    section per calendar, this method is nice and easy.


    `-(NSInteger)numberOfSectionsInTableView:(UITableView *)tableView`

    `{`

    `    return [self.calendars count];`

    `}`


    You can also implement a method to specify your section titles, in an equally
    simple manner.


    `-(NSString *)tableView:(UITableView *)tableView`

    `titleForHeaderInSection:(NSInteger)section`

    `{`

    `    return [[self.calendars objectAtIndex:section] title];`

    `}`


    You will also need to implement a method to determine the number of rows in each
    group, as given by the count of the array returned by your dictionary for a given
    section.


    `-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection: (NSInteger)section`

    `{`

    `    NSString *title = [[self.calendars objectAtIndex:section] title];`

    `    NSArray *eventsInThisCalendar = [self.events objectForKey:title];`

    `    return [eventsInThisCalendar count];`

    `}`


    Finally, you can build your most important method for dealing with a `UITableView`,
    which will define how your table''s cells are created.


    `- (UITableViewCell *)tableView:(UITableView *)tableView`

    `cellForRowAtIndexPath:(NSIndexPath *)indexPath {`

    `    static NSString *CellIdentifier = @"Cell";`


    `    UITableViewCell *cell = [tableView`

    `dequeueReusableCellWithIdentifier:CellIdentifier];`

    `    if (cell == nil)`

    `    {`

    `         cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleValue1`

    `reuseIdentifier:CellIdentifier];`

    `    }`


    `    cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;`

    `    cell.textLabel.backgroundColor = [UIColor clearColor];`

    `    cell.textLabel.font = [UIFont systemFontOfSize:19.0];`


    `    cell.textLabel.text = [[[self.events objectForKey:[[self.calendars`

    `objectAtIndex:indexPath.section] title]] objectAtIndex:indexPath.row] title];`


    `    return cell;`

    `}`


    As you can see, aside from a fairly generic setup of your cell''s view, all you
    have done is specify the title of any given row through a short, albeit slightly
    convoluted, call to your array and dictionary.


    Your application should now be able to give you a nice display of all the events
    currently in your calendar!'
  trans: "\n### 技巧 8–3：在 `UITableView` 中显示事件\n\n现在你已经能够访问事件了，接下来将创建一个更好的界面来处理它们。你将实现一个分组的\
    \ `UITableView` 来显示事件。\n\n首先，你需要在 XIB 文件中添加 `UITableView`。从组件库中拖拽一个 `UITableView`\
    \ 元素，并让它占据整个视图。在属性检查器中，确保表格视图的“样式”设置为“分组”，如图 8–3 所示。\n\n![Image](img/9781430240051_Fig08-03.jpg)\n\
    \n**图 8–3.** *配置分组的 `UITableView`*\n\n接下来，将你的 `UITableView` 连接到视图控制器的头文件。这里使用的属性将命名为\
    \ `tableViewEvents`。\n\n在切换到实现文件之前，你还需要定义两个将要使用的属性。首先，一个名为 `calendars` 的 `NSArray`\
    \ 将用于保存对 `EKEventStore` 中所有日历的引用。其次，一个 `NSMutableDictionary` 实例将用于存储所有事件，并根据它们所属的日历进行归类。确保正确合成这些属性，并在\
    \ `-viewDidUnload` 方法中将其设置为 `nil`。\n\n```\n@property (nonatomic, strong) NSMutableDictionary\
    \ *events;\n@property (nonatomic, strong) NSArray *calendars;\n```\n\n你要做的第一件事是设置一个更新版本的\
    \ `-viewDidLoad` 方法，以正确填充数组和字典，同时确保 `UITableView` 已正确设置。\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n\n    self.tableViewEvents.delegate = self;\n   \
    \ self.tableViewEvents.dataSource = self;\n\n    self.eventStore = [[EKEventStore\
    \ alloc] init];\n    self.calendars = [self.eventStore calendars];\n\n    [self\
    \ fetchEvents];\n}\n```\n\n新的 `-fetchEvents` 方法将包含实际查询 `eventStore` 以获取事件的代码。由于你将按事件所属的日历进行排序，因此需要为每个日历执行不同的查询，而不是对所有事件执行一次查询。\n\
    \n```\n-(void)fetchEvents\n{\n    self.events = nil;\n    self.events = [[NSMutableDictionary\
    \ alloc] initWithCapacity:[self.calendars count]];\n\n    for (EKCalendar *cal\
    \ in self.calendars)\n    {\n        NSPredicate *calPredicate = [self.eventStore\n\
    predicateForEventsWithStartDate:[NSDate date] endDate:[NSDate\ndateWithTimeIntervalSinceNow:(2*24.0*60*60)]\
    \ calendars:[NSArray arrayWithObject:cal]];\n        //将日历参数设为 nil 表示搜索所有日历。\n\
    \n        NSArray *eventsInThisCalendar = [self.eventStore eventsMatchingPredicate:calPredicate];\n\
    \        if (eventsInThisCalendar != nil)\n        {\n            [self.events\
    \ setObject:eventsInThisCalendar forKey:cal.title];\n        }\n    }\n}\n```\n\
    \n如你所见，你将使用日历的标题作为键，将事件存储在 `NSMutableDictionary` 中，对应的值则是属于该特定日历的事件数组。\n\n在继续之前，你需要指定视图控制器遵循某些协议，以便编译器允许将其设置为视图控制器的委托和数据源。添加\
    \ `UITableViewDelegate` 和 `UITableViewDataSource` 协议后，你的头文件应类似于如下内容：\n\n```\n\
    #import <UIKit/UIKit.h>\n#import <EventKit/EventKit.h>\n\n@interface MainViewController\
    \ : UIViewController <UITableViewDelegate,\nUITableViewDataSource>{\n    UITableView\
    \ *tableViewEvents;\n}\n\n@property (nonatomic, strong) EKEventStore *eventStore;\n\
    @property (strong, nonatomic) IBOutlet UITableView *tableViewEvents;\n\n@property\
    \ (nonatomic, strong) NSMutableDictionary *events;\n@property (nonatomic, strong)\
    \ NSArray *calendars;\n@end\n```\n\n为了正确实现分组的 `UITableView`，你需要实现一个方法来指定所需的分区数量。由于每个日历对应一个分区，这个方法既简单又方便。\n\
    \n```\n-(NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n \
    \   return [self.calendars count];\n}\n```\n\n同样，你还可以实现一个方法来指定分区的标题，操作同样简单。\n\n\
    ```\n-(NSString *)tableView:(UITableView *)tableView\ntitleForHeaderInSection:(NSInteger)section\n\
    {\n    return [[self.calendars objectAtIndex:section] title];\n}\n```\n\n你还需要实现一个方法来确定每个分组中的行数，该数值由字典中对应分区的数组计数给出。\n\
    \n```\n-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection: (NSInteger)section\n\
    {\n    NSString *title = [[self.calendars objectAtIndex:section] title];\n   \
    \ NSArray *eventsInThisCalendar = [self.events objectForKey:title];\n    return\
    \ [eventsInThisCalendar count];\n}\n```\n\n最后，你可以构建处理 `UITableView` 时最重要的方法，该方法将定义表格单元格的创建方式。\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\ncellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath {\n    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell\
    \ *cell = [tableView\ndequeueReusableCellWithIdentifier:CellIdentifier];\n   \
    \ if (cell == nil)\n    {\n         cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleValue1\n\
    reuseIdentifier:CellIdentifier];\n    }\n\n    cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n\
    \    cell.textLabel.backgroundColor = [UIColor clearColor];\n    cell.textLabel.font\
    \ = [UIFont systemFontOfSize:19.0];\n\n    cell.textLabel.text = [[[self.events\
    \ objectForKey:[[self.calendars\nobjectAtIndex:indexPath.section] title]] objectAtIndex:indexPath.row]\
    \ title];\n\n    return cell;\n}\n```\n\n如你所见，除了对单元格视图进行相当通用的设置外，你所做的只是通过对数组和字典的一次简短（尽管略显复杂）调用来指定任何给定行的标题。\n\
    \n现在，你的应用应该能够很好地显示当前日历中的所有事件了！\n"
- fmt: "### Recipe 8–4: Viewing, Editing, and Deleting Events\n\nNext, you can look\
    \ into how to allow your user to view, edit, and delete events through pre-defined\
    \ classes in the Event Kit UI framework.\n\nContinuing from your previous recipe,\
    \ the first thing you need to do is add another framework to your project. This\
    \ time, add `EventKitUI.framework`. Import this framework's header file into your\
    \ class with an import statement.\n\n```\n#import <EventKitUI/EventKitUI.h>\n\
    ```\n\nIn this recipe, you will be assigning your view controller as the delegate\
    \ for a couple of other view controllers, so you will go ahead and add their protocols\
    \ to your header file. Here is the total list of protocols your view controller\
    \ should now contain:\n\n- `UITableViewDelegate`\n- `UITableViewDataSource`\n\
    - `EKEventViewDelegate`\n- `EKEventEditViewDelegate`\n\nFirst, you will implement\
    \ behavior for when a user selects a specific row in your `UITableView`. You will\
    \ use an instance of the `EKEventViewController` to display information on the\
    \ selected event. To do this, you use the `UITableView`'s data source method,\
    \ `-tableView:DidSelectRowAtIndexPath:`.\n\n```\n-(void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath\n*)indexPath\n{\n    EKEventViewController\
    \ *eventVC = [[EKEventViewController alloc] init];\n    eventVC.event = [[self.events\
    \ objectForKey:[[self.calendars\nobjectAtIndex:indexPath.section] title]] objectAtIndex:indexPath.row];\n\
    \    eventVC.delegate = self;\n    eventVC.allowsEditing = YES;\n    UINavigationController\
    \ *navcon = [[UINavigationController alloc]\ninitWithRootViewController:eventVC];\n\
    \    [self presentModalViewController:navcon animated:YES];\n    [tableView deselectRowAtIndexPath:indexPath\
    \ animated:YES];\n}\n```\n\nYou will need to implement the `EKEventViewController`'s\
    \ delegate method, `-eventViewController:didCompleteWithAction:`, in order to\
    \ properly handle the completed use of your event's details. Here, you have a\
    \ fairly simple implementation that either saves or deletes the event from your\
    \ event store, depending on the action given.\n\n```\n-(void)eventViewController:(EKEventViewController\
    \ *)controller\ndidCompleteWithAction:(EKEventViewAction)action\n{\n    EKEvent\
    \ *event = controller.event;\n    if (action == EKEventViewActionDeleted)\n  \
    \      {\n            [self.eventStore removeEvent:event span:EKSpanThisEvent\
    \ error:nil];\n        }\n    else\n    {\n        [self.eventStore saveEvent:event\
    \ span:EKSpanFutureEvents error:nil];\n    }\n    [self fetchEvents];\n    [self.tableViewEvents\
    \ reloadData];\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n\
    The values you have used for the `span:` parameter of the saving and deleting\
    \ methods are restricted to one of the two values you have used here. As you can\
    \ probably tell, they specify whether your save or removal should apply only to\
    \ the specific event, or to all of its recurrences as well.\n\nKeep in mind that\
    \ the fact that the user deletes an event in the `EKEventViewController` does\
    \ not mean that it has been removed from the `eventStore`. You need to manually\
    \ remove it, and then call your `-fetchEvents` method as well as your table's\
    \ `-reloadData` method to update your `UITableView`.\n\nFor extra functionality,\
    \ you will also make your cell's detail disclosure buttons allow the user to proceed\
    \ directly to editing an event's information through the use of the `EKEventEditViewController`.\
    \ First, you will implement a method to handle the pressing of the disclosure\
    \ buttons.\n\n```\n-(void)tableView:(UITableView *)tableView\naccessoryButtonTappedForRowWithIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    EKEventEditViewController *eventEditVC = [[EKEventEditViewController\
    \ alloc] init];\n    eventEditVC.event = [[self.events objectForKey:[[self.calendars\n\
    objectAtIndex:indexPath.section] title]] objectAtIndex:indexPath.row];\n    eventEditVC.eventStore\
    \ = self.eventStore;\n    eventEditVC.editViewDelegate = self;\n    [self presentModalViewController:eventEditVC\
    \ animated:YES];\n}\n```\n\nJust like with the `EKEventViewController`, you need\
    \ to define a delegate method for your `EKEventEditViewController`.\n\n```\n-(void)eventEditViewController:(EKEventEditViewController\
    \ *)controller\ndidCompleteWithAction:(EKEventEditViewAction)action\n{\n    if\
    \ (action == EKEventEditViewActionDeleted)\n    {\n        [self.eventStore removeEvent:controller.event\
    \ span:EKSpanThisEvent error:nil];\n    }\n    else if (action == EKEventEditViewActionSaved)\n\
    \    {\n        [self.eventStore saveEvent:controller.event span:EKSpanThisEvent\
    \ error:nil];\n    }\n    [self fetchEvents];\n    [self.tableViewEvents reloadData];\n\
    \    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\nFinally, you need\
    \ to define one extra method in order to use an `EKEventEditViewController`, which\
    \ will allow you to specify one calendar to be used for the creation of new events.\
    \ In this implementation, you will simply return the default calendar for this\
    \ task that the device is already using.\n\n```\n-(EKCalendar\n*)eventEditViewControllerDefaultCalendarForNewEvents:(EKEventEditViewController\n\
    *)controller\n{\n    return [self.eventStore defaultCalendarForNewEvents];\n}\n\
    ```\n\nJust to ensure that your view always displays the most recent information,\
    \ you will add to your `-viewwillAppear:` method in order to consistently refresh\
    \ both your current data as well as your `UITableView`. The method will now appear\
    \ like so:\n\n```\n- (void)viewWillAppear:(BOOL)animated\n{\n    [self fetchEvents];\n\
    \    [self.tableViewEvents reloadData];\n    [super viewWillAppear:animated];\n\
    }\n```\n\nAt this point, your application can now successfully allow the user\
    \ to view and edit the details of an event in two different ways, through the\
    \ use of either an `EKEventViewController` (Figure 8–4) or an `EKEventEditViewController`\
    \ (Figure 8–5).\n\n![Image](images/9781430240051_Fig08-04.jpg)\n\n**Figure 8–4.**\
    \ *`EKEventViewController`*\n\n![Image](images/9781430240051_Fig08-05.jpg)\n\n\
    **Figure 8–5.** *`EKEventEditViewControl`*"
