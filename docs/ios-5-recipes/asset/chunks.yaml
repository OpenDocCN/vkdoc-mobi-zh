    throughout modern technology and entertainment, allowing an unprecedented amount
    of mass communication. With the release of iOS 5.0, the addition of a Twitter
    framework allows developers to work and program more efficiently with this incredible
    interface. This has opened up a whole category of app possibilities, from sending
    simple tweets to analyzing trending topics to suggesting articles to a user. By
    utilizing this framework in our applications, we are able to incorporate a variety
    of functionalities into our applications that allow us to communicate with the
    Twitter service, allowing users to contribute further to the ever-growing worldwide
    network of communication.'
