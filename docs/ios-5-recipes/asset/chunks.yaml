    ];\nNSURL *imageURL = [NSURL URLWithString:imageURLString];\nNSData *imageData\
    \ = [NSData dataWithContentsOfURL:imageURL];\nself.userImage = [UIImage imageWithData:imageData];\n\
    \    }\nreturn self;\n}\n```\n\n至此，你的应用程序现在应该能够搜索帖子中包含的特定文本、话题标签和用户了！你已经包含了涵盖最常用搜索词的基本功能，但\
    \ Twitter API 允许进行更复杂的查询。有关各种搜索格式的完整列表，请参阅 `https://dev.twitter.com/docs/using-search`\
    \ 上的 Twitter API。\n\n现在运行你的应用程序，你应该能够搜索不同的话题标签、短语和用户名。尝试搜索 `#miami` 并查看得到的结果！\n\
    \n**注意：** 如果在任何时候你不确定从 Twitter 检索到的 JSON 数据的格式，你可以直接使用发起请求的 URL 并在 Web 浏览器中打开它。你将看到与通过代码获取的完全相同的数据的文本视图。由于缺少空格格式，它可能有点难以阅读，但你可以从中找出构建应用程序所需的内容层次。\n\
    \n### 总结\n\n在本章中，我们介绍了大量使用 Twitter 框架的示例代码，内容涵盖从发送推文的预定义用户界面，到自定义格式请求以直接从 Twitter\
    \ 获取特定筛选数据。我们的基本实现可以轻松作为更复杂应用程序的基础。与 Twitter 服务的集成不仅限于发布和显示推文，还可以轻松增强几乎任何应用程序的功能和威力。考虑到\
    \ Twitter 本身的流行度和持续增长，可以肯定 iOS 的集成只会变得更加深入，让开发者能够更简单地访问这个现代世界中最强大的网络服务之一。\n\n\
    ## 第 15 章\n\n## 图像秘诀\n\n开发者常常面临一个普遍问题：要显示的信息太多，而可用空间却不够。为此，你需要借助图像。图片和图形让你能够传达远超纯文本的各种信息，结合了情感、信息和风格。在\
    \ iOS 中，你有多种不同的方法来创建、使用、操作和显示图像。iOS 5.0 甚至新增了为图像应用滤镜的能力，允许用非常少的代码对显示效果进行大幅修改。通过理解\
    \ iOS 中的这些固有功能和技术，你能够更轻松地实现更强大、信息更丰富的应用程序。\n"
- fmt: "# Recipe 15–1: Drawing Simple Shapes\n\nFrom the youngest age, every person\
    \ is taught the most basic of images, dealing with shapes, colors, and pictures.\
    \ In iOS too, you can start off with the basics of drawing simple shapes in a\
    \ view. Many concepts dealt with in these first implementations will end up returning\
    \ in more complex image-based recipes.\n\nStart by creating a new project called\
    \ “ShapesAndSizes”. Select the Single View Application template, as in [Figure\
    \ 15–1](#Chapter15.html#fig_15_1), in order to build the simplest, ready-to-run\
    \ pre-configured application, and make sure the device family is set to “iPhone”.\
    \ The box marked “Use Automatic Reference Counting” should also be checked. [Figure\
    \ 15–1](#Chapter15.html#fig_15_1).\n\n![Image](images/9781430240051_Fig15-01.jpg)\n\
    \n**Figure 15–1.** *Creating a single view application*\n\nNext, before building\
    \ your user interface, you will start by implementing your custom drawing code\
    \ in a subclass of `UIView`.\n\nStart by adding `QuartzCore.framework` and `CoreGraphics.framework`\
    \ to your project by navigating to your project’s Target settings. Under the Build\
    \ Phases tab, in the Link Binary With Libraries section, click the + button. Find\
    \ the Quartz Core and Core Graphics frameworks in the window resembling [Figure\
    \ 15–2](#Chapter15.html#fig_15_2), and add them both separately.\n\n![Image](images/9781430240051_Fig15-02.jpg)\n\
    \n**Figure 15–2.** *Adding the Core Graphics and Quartz Core frameworks*\n\nNext,\
    \ create new file called “MyView” using the “Objective-C class” template. When\
    \ you enter the name, make sure the “Subclass of” field is set to “UIView”.\n\n\
    In the header file of this new class, add the required two import statements for\
    \ your extra frameworks.\n\n```\n#import <QuartzCore/QuartzCore.h>\n#import <CoreGraphics/CoreGraphics.h>\n\
    ```\n\nNow, to provide a simple view displaying a drawn rectangle and square,\
    \ you will implement the `-drawRect:` method as such:\n\n```\n- (void)drawRect:(CGRect)rect\n\
    {\n    CGContextRef context = UIGraphicsGetCurrentContext();\n    \n    CGRect\
    \ drawingRect = CGRectMake(0.0, 20.0f, 100.0f, 180.0f);\n    const CGFloat *rectColorComponents\
    \ = CGColorGetComponents([[UIColor greenColor] CGColor]);\n    CGContextSetFillColor(context,\
    \ rectColorComponents);\n    CGContextFillRect(context, drawingRect);\n    \n\
    \    CGRect ellipseRect = CGRectMake(140.0f, 200.0f, 75.0f, 50.0f);\n    const\
    \ CGFloat *ellipseColorComponenets = CGColorGetComponents([[UIColor blueColor]\
    \ CGColor]);\n    CGContextSetFillColor(context, ellipseColorComponenets);\n \
    \   CGContextFillEllipseInRect(context, ellipseRect);\n}\n```\n\nThis method makes\
    \ use of the following steps to draw basic shapes:\n\n1. Obtain a reference to\
    \ the current “context,” represented by a `CGContextRef`.\n2. Define a `CGRect`\
    \ in which to draw.\n3. Acquire color components for the desired color to fill\
    \ each shape with.\n4. Set the Fill Color.\n5. Fill the specified shape using\
    \ the `CGContextFillRect()` and `CGContextFillEllipseInRect()` functions.\n\n\
    In order to actually display this in your pre-configured view, you must add an\
    \ instance of this class to your user interface. This can be done programmatically\
    \ or through Interface Builder (the latter of which you will demonstrate).\n\n\
    In your view controller’s XIB file, drag a `UIView` out from the utilities pane\
    \ into your view, placing it with 20-point margins on each edge, as shown in [Figure\
    \ 15–3](#Chapter15.html#fig_15_3).\n\n![Image](images/9781430240051_Fig15-03.jpg)\n\
    \n**Figure 15–3.** *Building your XIB file with a `UIView`*\n\nWhile your `UIView`\
    \ is selected, navigate to the third tab in the right-hand panel. Under the Custom\
    \ Class section, make sure the Class field is changed from “UIView” to “MyView”,\
    \ in order to specify the custom `UIView` subclass to be used, resembling [Figure\
    \ 15–4](#Chapter15.html#fig_15_4).\n\n![Image](images/9781430240051_Fig15-04.jpg)\n\
    \n**Figure 15–4.** *Configuring the class of your `UIView` to `MyView`*\n\nUpon\
    \ running this application, you will see the output of your drawing commands converted\
    \ into a visual display, resulting in your simulated view in [Figure 15–5](#Chapter15.html#fig_15_5).\n\
    \n![Image](images/9781430240051_Fig15-05.jpg)\n\n**Figure 15–5.** *Your simple\
    \ application drawing a rectangle and an ellipse*\n\nThankfully, you are not at\
    \ all limited to drawing only rectangles and ellipses! You are able to use a few\
    \ other functions to draw custom objects by creating “paths.” These paths consist\
    \ of a movement from point to point, connected by lines, in order to draw a custom\
    \ shape. Add the following code to your `-drawRect:` method to draw a gray parallelogram.\n\
    \n```\nCGContextBeginPatsh(context);\nCGContextMoveToPoint(context, 0.0f, 0.0f);\n\
    CGContextAddLineToPoint(context, 100.0f, 0.0f);\nCGContextAddLineToPoint(context,\
    \ 140.0f, 100.0f);\nCGContextAddLineToPoint(context, 40.0f, 100.0f);\nCGContextClosePath(context);\n\
    CGContextSetGrayFillColor(context, 0.4f, 0.85f);\nCGContextSetGrayStrokeColor(context,\
    \ 0.0, 0.0);\nCGContextFillPath(context);\n```\n\nIt is important to note that\
    \ when creating these paths, you do not have to add a final line back to your\
    \ last point. By calling the `CGContextClosePath()` function, your shape will\
    \ automatically be closed between its ending point and starting point.\n\nWhen\
    \ you run your application now, you will see your view with a new parallelogram\
    \ created from your path, as in [Figure 15–6](#Chapter15.html#fig_15_6).\n\n![Image](images/9781430240051_Fig15-06.jpg)\n\
    \n**Figure 15–6.** *Your application with a shape created from a custom path*\n\
    \n## Programming Screenshots\n\nJust as you are able to put things into a `CGContext`,\
    \ you are also quite easily able to take them out. By making use of the `UIGraphicsGetImageFromCurrentImageContext()`\
    \ function, you can extract an image from whatever is currently drawn.\n\nIn the\
    \ `MyView` class, add a `UIImage` property, making sure to synthesize it.\n\n\
    ```\n@property (nonatomic, strong) UIImage *image;\n```\n\nNow at the end of your\
    \ `-drawRect:` method, append the following code to draw the image if it is non-`nil`.\n\
    \n```\nif (self.image)\n    {\n        CGRect imageRect = CGRectMake(200.0f, 50.0f,\
    \ 100.0f, 300.0f);\n        [image drawInRect:imageRect];\n    }\n```\n\nAdd the\
    \ same two import statements as earlier to your view controller, as well as a\
    \ third for your `MyView` class.\n\n```\n#import <QuartzCore/QuartzCore.h>\n#import\
    \ <CoreGraphics/CoreGraphics.h>\n#import \"MyView.h\"\n```\n\nYou will also need\
    \ to reference your `MyView` object, so connect the one you already added into\
    \ the user interface to your view controller’s header file with the property `customView`.\n\
    \n```\n@property (strong, nonatomic) IBOutlet MyView *customView;\n```\n\nAdd\
    \ a `UIButton` labeled “Snapshot” to the bottom of your user interface. Connect\
    \ it to an `IBAction` method called `-snapShotPressed:`.\n\n```\n- (IBAction)snapshotPressed:(id)sender;\n\
    ```\n\nThis method will then be implemented like so:\n\n```\n-(IBAction)snapshotPressed:(id)sender\n\
    {\n    //Acquire image of current layer\n    UIGraphicsBeginImageContext(self.view.bounds.size);\n\
    \    CGContextRef context = UIGraphicsGetCurrentContext();\n    [self.view.layer\
    \ renderInContext:context];\n    UIImage *image = UIGraphicsGetImageFromCurrentImageContext();\n\
    \    UIGraphicsEndImageContext();\n\n    self.customView.image = image;\n    [self.customView\
    \ setNeedsDisplay];\n}\n```\n\nThis method makes use of the `-setNeedsDisplay`\
    \ method in the `UIView` class to instruct a `UIView` to re-call its `-drawRect`\
    \ method in order to incorporate any recent changes.\n\nNow, after testing the\
    \ application again, upon pressing the Snapshot button, you should see a smaller\
    \ screenshot of your own screen appear on the right side of the view, as in [Figure\
    \ 15–7](#Chapter15.html#fig_15_7).\n\n![Image](images/9781430240051_Fig15-07.jpg)\n\
    \n**Figure 15–7.** *Your application having taken a screenshot, then scaled it\
    \ into the view*\n\nWhile most of the functionalities you’ve built into this application\
    \ have been pretty basic, you will see a variety of them come back in more complex\
    \ forms in the later, more complex image recipes."
  raw: '### Recipe 15–1: Drawing Simple Shapes


    From the youngest age, every person is taught the most basic of images, dealing
    with shapes, colors, and pictures. In iOS too, you can start off with the basics
    of drawing simple shapes in a view. Many concepts dealt with in these first implementations
    will end up returning in more complex image-based recipes.


    Start by creating a new project called “ShapesAndSizes”. Select the Single View
    Application template, as in [Figure 15–1](#Chapter15.html#fig_15_1), in order
    to build the simplest, ready-to-run pre-configured application, and make sure
    the device family is set to “iPhone”. The box marked “Use Automatic Reference
    Counting” should also be checked. [Figure 15–1](#Chapter15.html#fig_15_1).


    ![Image](images/9781430240051_Fig15-01.jpg)


    **Figure 15–1.** *Creating a single view application*


    Next, before building your user interface, you will start by implementing your
    custom drawing code in a subclass of `UIView`.


    Start by adding `QuartzCore.framework` and `CoreGraphics.framework` to your project
    by navigating to your project’s Target settings. Under the Build Phases tab, in
    the Link Binary With Libraries section, click the + button. Find the Quartz Core
    and Core Graphics frameworks in the window resembling [Figure 15–2](#Chapter15.html#fig_15_2),
    and add them both separately.


    ![Image](images/9781430240051_Fig15-02.jpg)


    **Figure 15–2.** *Adding the Core Graphics and Quartz Core frameworks*


    Next, create new file called “MyView” using the “Objective-C class” template.
    When you enter the name, make sure the “Subclass of” field is set to “UIView”.


    In the header file of this new class, add the required two import statements for
    your extra frameworks.


    `#import <QuartzCore/QuartzCore.h>`

    `#import <CoreGraphics/CoreGraphics.h>`


    Now, to provide a simple view displaying a drawn rectangle and square, you will
    implement the `-drawRect:` method as such:


    `- (void)drawRect:(CGRect)rect`

    `{`

    `CGContextRef context = UIGraphicsGetCurrentContext();`


    `CGRect drawingRect = CGRectMake(0.0, 20.0f, 100.0f, 180.0f);`

    `const CGFloat *rectColorComponents = CGColorGetComponents([[UIColor greenColor]
    CGColor]);`

    `CGContextSetFillColor(context, rectColorComponents);`

    `CGContextFillRect(context, drawingRect);`


    `CGRect ellipseRect = CGRectMake(140.0f, 200.0f, 75.0f, 50.0f);`

    `const CGFloat *ellipseColorComponenets = CGColorGetComponents([[UIColor blueColor]
    CGColor]);`

    `CGContextSetFillColor(context, ellipseColorComponenets);`

    `CGContextFillEllipseInRect(context, ellipseRect);`

    `}`


    This method makes use of the following steps to draw basic shapes:


    1.  Obtain a reference to the current “context,” represented by a `CGContextRef`.

    2.  Define a `CGRect` in which to draw.

    3.  Acquire color components for the desired color to fill each shape with.

    4.  Set the Fill Color.

    5.  Fill the specified shape using the `CGContextFillRect()` and `CGContextFillEllipseInRect()`
    functions.


    In order to actually display this in your pre-configured view, you must add an
    instance of this class to your user interface. This can be done programmatically
    or through Interface Builder (the latter of which you will demonstrate).


    In your view controller’s XIB file, drag a `UIView` out from the utilities pane
    into your view, placing it with 20-point margins on each edge, as shown in [Figure
    15–3](#Chapter15.html#fig_15_3).


    ![Image](images/9781430240051_Fig15-03.jpg)


    **Figure 15–3.** *Building your XIB file with a `UIView`*


    While your `UIView` is selected, navigate to the third tab in the right-hand panel.
    Under the Custom Class section, make sure the Class field is changed from “UIView”
    to “MyView”, in order to specify the custom `UIView` subclass to be used, resembling
    [Figure 15–4](#Chapter15.html#fig_15_4).


    ![Image](images/9781430240051_Fig15-04.jpg)


    **Figure 15–4.** *Configuring the class of your `UIView` to `MyView`*


    Upon running this application, you will see the output of your drawing commands
    converted into a visual display, resulting in your simulated view in [Figure 15–5](#Chapter15.html#fig_15_5).


    ![Image](images/9781430240051_Fig15-05.jpg)


    **Figure 15–5.** *Your simple application drawing a rectangle and an ellipse*


    Thankfully, you are not at all limited to drawing only rectangles and ellipses!
    You are able to use a few other functions to draw custom objects by creating “paths.”
    These paths consist of a movement from point to point, connected by lines, in
    order to draw a custom shape. Add the following code to your `-drawRect:` method
    to draw a gray parallelogram.


    `CGContextBeginPatsh(context);`

    `CGContextMoveToPoint(context, 0.0f, 0.0f);`

    `CGContextAddLineToPoint(context, 100.0f, 0.0f);`

    `CGContextAddLineToPoint(context, 140.0f, 100.0f);`

    `CGContextAddLineToPoint(context, 40.0f, 100.0f);`

    `CGContextClosePath(context);`

    `CGContextSetGrayFillColor(context, 0.4f, 0.85f);`

    `CGContextSetGrayStrokeColor(context, 0.0, 0.0);`

    `CGContextFillPath(context);`


    It is important to note that when creating these paths, you do not have to add
    a final line back to your last point. By calling the `CGContextClosePath()` function,
    your shape will automatically be closed between its ending point and starting
    point.


    When you run your application now, you will see your view with a new parallelogram
    created from your path, as in [Figure 15–6](#Chapter15.html#fig_15_6).


    ![Image](images/9781430240051_Fig15-06.jpg)


    **Figure 15–6.** *Your application with a shape created from a custom path*


    #### Programming Screenshots


    Just as you are able to put things into a `CGContext`, you are also quite easily
    able to take them out. By making use of the `UIGraphicsGetImageFromCurrentImageContext()`
    function, you can extract an image from whatever is currently drawn.


    In the `MyView` class, add a `UIImage` property, making sure to synthesize it.


    `@property (nonatomic, strong) UIImage *image;`


    Now at the end of your `-drawRect:` method, append the following code to draw
    the image if it is non-`nil`.


    `if (self.image)`

    `    {`

    `        CGRect imageRect = CGRectMake(200.0f, 50.0f, 100.0f, 300.0f);`

    `        [image drawInRect:imageRect];`

    `    }`


    Add the same two import statements as earlier to your view controller, as well
    as a third for your `MyView` class.


    `#import <QuartzCore/QuartzCore.h>`

    `#import <CoreGraphics/CoreGraphics.h>`

    `#import "MyView.h"`


    You will also need to reference your `MyView` object, so connect the one you already
    added into the user interface to your view controller’s header file with the property
    `customView`.


    `@property (strong, nonatomic) IBOutlet MyView *customView;`


    Add a `UIButton` labeled “Snapshot” to the bottom of your user interface. Connect
    it to an `IBAction` method called `-snapShotPressed:`.


    `- (IBAction)snapshotPressed:(id)sender;`


    This method will then be implemented like so:


    `-(IBAction)snapshotPressed:(id)sender`

    `{`

    `//Acquire image of current layer`

    `UIGraphicsBeginImageContext(self.view.bounds.size);`

    `CGContextRef context = UIGraphicsGetCurrentContext();`

    `    [self.view.layer renderInContext:context];`

    `UIImage *image = UIGraphicsGetImageFromCurrentImageContext();`

    `UIGraphicsEndImageContext();`


    `self.customView.image = image;`

    `    [self.customView setNeedsDisplay];`

    `}`


    This method makes use of the `-setNeedsDisplay` method in the `UIView` class to
    instruct a `UIView` to re-call its `-drawRect` method in order to incorporate
    any recent changes.


    Now, after testing the application again, upon pressing the Snapshot button, you
    should see a smaller screenshot of your own screen appear on the right side of
    the view, as in [Figure 15–7](#Chapter15.html#fig_15_7).


    ![Image](images/9781430240051_Fig15-07.jpg)


    **Figure 15–7.** *Your application having taken a screenshot, then scaled it into
    the view*


    While most of the functionalities you’ve built into this application have been
    pretty basic, you will see a variety of them come back in more complex forms in
    the later, more complex image recipes.'
  trans: "\n# 菜谱 15-1：绘制简单形状\n\n从幼年起，每个人都会被教导最基础的图像知识，涉及形状、颜色和图画。在 iOS 中，你也可以从在视图中绘制简单形状的基础开始。这些初始实现中涉及的许多概念最终会以更复杂的基于图像的功能中再次出现。\n\
    \n首先，创建一个名为 \"ShapesAndSizes\" 的新项目。选择 **单视图应用程序** 模板，如 图 15-1 所示，以构建最简单、可直接运行的预配置应用程序，并确保设备系列设置为\
    \ \"iPhone\"。同时勾选 \"使用自动引用计数\" 选项。图 15-1。\n\n![图片](img/9781430240051_Fig15-01.jpg)\n\
    \n**图 15-1.** *创建一个单视图应用程序*\n\n接下来，在构建用户界面之前，你将在 `UIView` 的子类中实现自定义绘图代码。\n\n首先，通过导航到项目的\
    \ Target 设置，将 `QuartzCore.framework` 和 `CoreGraphics.framework` 添加到项目中。在 \"构建阶段\"\
    \ 选项卡下的 \"与库链接二进制文件\" 部分，点击 + 按钮。在类似 图 15-2 的窗口中找到 Quartz Core 和 Core Graphics\
    \ 框架，并分别添加它们。\n\n![图片](img/9781430240051_Fig15-02.jpg)\n\n**图 15-2.** *添加 Core\
    \ Graphics 和 Quartz Core 框架*\n\n接下来，使用 \"Objective-C 类\" 模板创建一个名为 \"MyView\" 的新文件。输入名称时，确保\
    \ \"子类为\" 字段设置为 \"UIView\"。\n\n在这个新类的头文件中，为额外的框架添加两个所需的导入语句。\n\n```\n#import <QuartzCore/QuartzCore.h>\n\
    #import <CoreGraphics/CoreGraphics.h>\n```\n\n现在，为了提供一个显示绘制矩形和正方形的简单视图，你将实现 `-drawRect:`\
    \ 方法，如下所示：\n\n```\n- (void)drawRect:(CGRect)rect\n{\n    CGContextRef context\
    \ = UIGraphicsGetCurrentContext();\n    \n    CGRect drawingRect = CGRectMake(0.0,\
    \ 20.0f, 100.0f, 180.0f);\n    const CGFloat *rectColorComponents = CGColorGetComponents([[UIColor\
    \ greenColor] CGColor]);\n    CGContextSetFillColor(context, rectColorComponents);\n\
    \    CGContextFillRect(context, drawingRect);\n    \n    CGRect ellipseRect =\
    \ CGRectMake(140.0f, 200.0f, 75.0f, 50.0f);\n    const CGFloat *ellipseColorComponenets\
    \ = CGColorGetComponents([[UIColor blueColor] CGColor]);\n    CGContextSetFillColor(context,\
    \ ellipseColorComponenets);\n    CGContextFillEllipseInRect(context, ellipseRect);\n\
    }\n```\n\n此方法使用以下步骤绘制基本形状：\n\n1.  获取当前 \"上下文\" 的引用，由 `CGContextRef` 表示。\n2.  定义一个用于绘制的\
    \ `CGRect`。\n3.  获取用于填充每个形状所需颜色的颜色分量。\n4.  设置填充颜色。\n5.  使用 `CGContextFillRect()`\
    \ 和 `CGContextFillEllipseInRect()` 函数填充指定的形状。\n\n为了在预配置的视图中实际显示，你必须在用户界面中添加此类的一个实例。这可以通过编程方式或通过\
    \ Interface Builder（后者将在此演示）完成。\n\n在视图控制器的 XIB 文件中，从实用工具面板拖出一个 `UIView` 到你的视图中，将其放置在每个边缘有\
    \ 20 点边距的位置，如 图 15-3 所示。\n\n![图片](img/9781430240051_Fig15-03.jpg)\n\n**图 15-3.**\
    \ *使用 `UIView` 构建你的 XIB 文件*\n\n选中你的 `UIView` 后，导航到右侧面板的第三个选项卡。在 \"自定义类\" 部分，确保将\
    \ \"类\" 字段从 \"UIView\" 更改为 \"MyView\"，以指定要使用的自定义 `UIView` 子类，如 图 15-4 所示。\n\n\
    ![图片](img/9781430240051_Fig15-04.jpg)\n\n**图 15-4.** *将你的 `UIView` 类配置为 `MyView`*\n\
    \n运行此应用程序时，你将看到绘图命令的输出转换为可视化显示，最终在你的模拟视图中呈现 图 15-5 所示的结果。\n\n![图片](img/9781430240051_Fig15-05.jpg)\n\
    \n**图 15-5.** *你的简单应用程序绘制了一个矩形和一个椭圆*\n\n值得庆幸的是，你绝不仅限于绘制矩形和椭圆！你可以使用其他一些函数通过创建 \"\
    路径\" 来绘制自定义对象。这些路径由点之间的移动组成，通过线条连接，以绘制自定义形状。将以下代码添加到你的 `-drawRect:` 方法中，以绘制一个灰色平行四边形。\n\
    \n```\nCGContextBeginPatsh(context);\nCGContextMoveToPoint(context, 0.0f, 0.0f);\n\
    CGContextAddLineToPoint(context, 100.0f, 0.0f);\nCGContextAddLineToPoint(context,\
    \ 140.0f, 100.0f);\nCGContextAddLineToPoint(context, 40.0f, 100.0f);\nCGContextClosePath(context);\n\
    CGContextSetGrayFillColor(context, 0.4f, 0.85f);\nCGContextSetGrayStrokeColor(context,\
    \ 0.0, 0.0);\nCGContextFillPath(context);\n```\n\n需要注意的是，创建这些路径时，不必添加一条最终线回到起点。通过调用\
    \ `CGContextClosePath()` 函数，你的形状将自动在其终点和起点之间闭合。\n\n现在运行你的应用程序，你将看到视图中包含一个由路径创建的新平行四边形，如\
    \ 图 15-6 所示。\n\n![图片](img/9781430240051_Fig15-06.jpg)\n\n**图 15-6.** *你的应用程序中有一个由自定义路径创建的形状*\n\
    \n## 编程截图\n\n正如你能够将内容放入 `CGContext` 一样，你也可以很容易地将它们取出。通过使用 `UIGraphicsGetImageFromCurrentImageContext()`\
    \ 函数，你可以从当前绘制的任何内容中提取图像。\n\n在 `MyView` 类中，添加一个 `UIImage` 属性，确保对其进行合成。\n\n```\n\
    @property (nonatomic, strong) UIImage *image;\n```\n\n现在，在你的 `-drawRect:` 方法末尾，添加以下代码，以便在图像非\
    \ `nil` 时绘制它。\n\n```\nif (self.image)\n    {\n        CGRect imageRect = CGRectMake(200.0f,\
    \ 50.0f, 100.0f, 300.0f);\n        [image drawInRect:imageRect];\n    }\n```\n\
    \n将与前文相同的两个导入语句添加到你的视图控制器中，并添加第三个用于你的 `MyView` 类。\n\n```\n#import <QuartzCore/QuartzCore.h>\n\
    #import <CoreGraphics/CoreGraphics.h>\n#import \"MyView.h\"\n```\n\n你还需要引用你的 `MyView`\
    \ 对象，因此将已添加到用户界面的对象连接到视图控制器的头文件，并使用属性 `customView`。\n\n```\n@property (strong,\
    \ nonatomic) IBOutlet MyView *customView;\n```\n\n在用户界面底部添加一个标记为 \"快照\" 的 `UIButton`。将其连接到一个名为\
    \ `-snapShotPressed:` 的 `IBAction` 方法。\n\n```\n- (IBAction)snapshotPressed:(id)sender;\n\
    ```\n\n此方法将按如下方式实现：\n\n```\n-(IBAction)snapshotPressed:(id)sender\n{\n    //获取当前层的图像\n\
    \    UIGraphicsBeginImageContext(self.view.bounds.size);\n    CGContextRef context\
    \ = UIGraphicsGetCurrentContext();\n    [self.view.layer renderInContext:context];\n\
    \    UIImage *image = UIGraphicsGetImageFromCurrentImageContext();\n    UIGraphicsEndImageContext();\n\
    \n    self.customView.image = image;\n    [self.customView setNeedsDisplay];\n\
    }\n```\n\n此方法利用 `UIView` 类中的 `-setNeedsDisplay` 方法，指示 `UIView` 重新调用其 `-drawRect`\
    \ 方法，以合并任何最近的更改。\n\n现在，再次测试应用程序后，按下 \"快照\" 按钮，你应该会在视图右侧看到自己屏幕的较小截图，如 图 15-7 所示。\n\
    \n![图片](img/9781430240051_Fig15-07.jpg)\n\n**图 15-7.** *你的应用程序拍摄了屏幕截图，然后将其缩放到视图中*\n\
    \n虽然你在本应用程序中构建的大多数功能都比较基础，但你会看到其中许多功能将以更复杂的形式出现在后续更复杂的图像菜谱中。\n"
- fmt: "### Recipe 15–2: Using UIImageViews\n\nThe absolutely simplest way of displaying\
    \ an image in your application is by use of the `UIImageView` class. You will\
    \ start off by creating a simple application that can display an image chosen\
    \ by the user, and then build on top of it to take full advantage of iOS’s image\
    \ processing power.\n\nIn order to enhance the functionality of your application,\
    \ you will specifically design it for the iPad, and then make use of the `UISplitViewController`.\
    \ Create a new project, and select the Master-Detail Application template. On\
    \ the next screen, after entering the project name \"ImageRecipes\", make sure\
    \ the application’s device-family is set to \"iPad\", and that the box marked\
    \ \"Use Automatic Reference Counting\" is checked. No other boxes should be marked,\
    \ so that your dialog resembles [Figure 15–8](#Chapter15.html#fig_15_8).\n\n![Image](images/9781430240051_Fig15-08.jpg)\n\
    \n**Figure 15–8.** *Configuring project settings*\n\nUpon creating your application,\
    \ you will be given a nicely configured project with a `UISplitViewController`\
    \ already set up with master and detail view controllers. If your simulator or\
    \ device is in portrait mode, you will see only the view of the detail view controller,\
    \ but if you rotate to landscape then you will get a nice mix of both views. You\
    \ will not see both views when working in Interface Builder, but if you simulate\
    \ the app, the generic view will resemble [Figure 15–9](#Chapter15.html#fig_15_9).\n\
    \n![Image](images/9781430240051_Fig15-09.jpg)\n\n**Figure 15–9.** *An empty `UISplitViewController`*\n\
    \nNow, you will configure the detail view controller to include a bit more content.\
    \ Add a `UIImageView`, as well as two `UIButton`s to your XIB’s interface so that\
    \ your simulated application will look like [Figure 15–10](#Chapter15.html#fig_15_10).\n\
    \n![Image](images/9781430240051_Fig15-10.jpg)\n\n**Figure 15–10.** *A simulated\
    \ view of your configured user interface*\n\nIn order to make sure that both your\
    \ buttons and image view will be correctly centered in your final display, first\
    \ set them to the center of your XIB’s view as you normally would. Then, you will\
    \ set the \"autosizing\" options for each element. Open up the utilities pane\
    \ on the right side of your screen, and navigate to the fifth tab where you can\
    \ set an element’s frame, shown in [Figure 15–11](#Chapter15.html#fig_15_11).\n\
    \n![Image](images/9781430240051_Fig15-11.jpg)\n\n**Figure 15–11.** *Configuring\
    \ autosizing to customize resizing behavior*\n\nMake sure that for each element,\
    \ the Autosizing box, with its various red lines and arrows, is configured exactly\
    \ as shown in [Figure 15–11](#Chapter15.html#fig_15_11). This will specify that\
    \ each element will, if the view changes, maintain its relative position to the\
    \ top of the view and stretch horizontally to maintain its general position.\n\
    \nConnect each element to your header file using the property names `selectImageButton`,\
    \ `clearImageButton`, and `imageViewContent`. Each `UIButton` will have its respective\
    \ action, `-selectImagePressed:` and `-clearImagePressed:`.\n\nYou will be configuring\
    \ your application to display a `UIPopoverController` containing a `UIImagePickerController`\
    \ in order to allow users to select an image from their phone. To do this, you\
    \ will need your detail view controller to conform to several extra protocols:\
    \ `UIImagePickerControllerDelegate`, `UINavigationControllerDelegate` and `UIPopoverControllerDelegate`.\n\
    \n```\n@interface MainDetailViewController : UIViewController<UISplitViewControllerDelegate,\n\
    UIImagePickerControllerDelegate, UINavigationControllerDelegate,\nUIPopoverControllerDelegate>\n\
    ```\n\nYou will also create two extra properties in order to store your selected\
    \ image, as well as a reference to your `UIPopoverController` that you will use.\
    \ Make sure both of these are properly synthesized, as well as properly nullified\
    \ in the `-viewDidUnload` method.\n\n```\n@property (strong, nonatomic) UIPopoverController\
    \ *pop;\n@property (strong, nonatomic) UIImage *selectedImage;\n```\n\nAt this\
    \ point, with your basic user interface configured, your overall detail view controller’s\
    \ header file should resemble the following.\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface MainDetailViewController : UIViewController<UISplitViewControllerDelegate,\n\
    UIImagePickerControllerDelegate, UIPopoverControllerDelegate,\nUINavigationControllerDelegate>\n\
    \n@property (strong, nonatomic) id detailItem;\n\n@property (strong, nonatomic)\
    \ IBOutlet UILabel *detailDescriptionLabel;\n@property (strong, nonatomic) IBOutlet\
    \ UIButton *selectImageButton;\n@property (strong, nonatomic) IBOutlet UIButton\
    \ *clearImageButton;\n@property (strong, nonatomic) IBOutlet UIImageView *imageViewContent;\n\
    -(IBAction)selectImagePressed:(id)sender;\n-(IBAction)clearImagePressed:(id)sender;\n\
    \n@property (strong, nonatomic) UIPopoverController *pop;\n@property (strong,\
    \ nonatomic) UIImage *selectedImage;\n\n@end\n```\n\nNow you can implement your\
    \ `-selectImagePressed:` method to present an interface to select a saved image\
    \ to display.\n\n```\n-(void)selectImagePressed:(UIButton *)sender\n{\n    UIImagePickerController\
    \ *picker = [[UIImagePickerController alloc] init];\n    if ([UIImagePickerController\
    \ isSourceTypeAvailable:UIImagePickerControllerSourceTypePhotoLibrary])\n    {\n\
    \        picker.sourceType = UIImagePickerControllerSourceTypePhotoLibrary;\n\
    \        picker.delegate = self;\n\n        self.pop = [[UIPopoverController alloc]\
    \ initWithContentViewController:picker];\n        pop.delegate = self;\n     \
    \   [pop presentPopoverFromRect:sender.frame inView:self.view permittedArrowDirections:UIPopoverArrowDirectionAny\
    \ animated:YES];\n    }\n}\n```\n\nYou can then implement your `UIImagePickerControllerDelegate`\
    \ protocol methods to properly handle the selection of an image or cancellation.\n\
    \n```\n-(void)imagePickerControllerDidCancel:(UIImagePickerController *)picker\n\
    {\n    [self.pop dismissPopoverAnimated:YES];\n}\n-(void)imagePickerController:(UIImagePickerController\
    \ *)picker didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    UIImage\
    \ *image = [info valueForKey:@\"UIImagePickerControllerOriginalImage\"];\n   \
    \ self.selectedImage = image;\n    self.imageViewContent.image = image;\n    self.imageViewContent.contentMode\
    \ = UIViewContentModeScaleAspectFill;   \n\n    [self.pop dismissPopoverAnimated:YES];\n\
    }\n```\n\nAs you can see, you configure your selected image to be displayed in\
    \ your `UIImageView` by using the `image` property. You also set the `contentMode`\
    \ property to `UIViewContentModeScaleAspectFill`, in order to ensure that the\
    \ bounds of your `UIImageView` are always filled by at least most of the image.\n\
    \nFinally, you can implement a simple method for `-clearImagePressed:` to allow\
    \ your view to be reset:\n\n```\n- (IBAction)clearImagePressed:(id)sender\n{\n\
    \    self.selectedImage = nil;\n    self.imageViewContent.image = nil;\n}\n```\n\
    \nAt this point, you can run your application, select an image, and display it\
    \ in a `UIImageView`, as in [Figure 15–12](#Chapter15.html#fig_15_12)!\n\n![Image](images/9781430240051_Fig15-12.jpg)\n\
    \n**Figure 15–12.** *Your application displaying an image in a `UIImageView`*\n\
    \nIf you are testing this application on the iOS simulator, you will need to actually\
    \ have some images saved to display. The easiest way to save images to the simulator’s\
    \ photo library is to use the Safari app on the simulator, navigate to your desired\
    \ image, and then click and hold the mouse on the image. You will be given an\
    \ option to save the image, and after this you can use it in your application."
  raw: '### Recipe 15–2: Using UIImageViews


    The absolutely simplest way of displaying an image in your application is by use
    of the `UIImageView` class. You will start off by creating a simple application
    that can display an image chosen by the user, and then build on top of it to take
    full advantage of iOS’s image processing power.


    In order to enhance the functionality of your application, you will specifically
    design it for the iPad, and then make use of the `UISplitViewController`. Create
    a new project, and select the Master-Detail Application template. On the next
    screen, after entering the project name “ImageRecipes”, make sure the application’s
    device-family is set to “iPad”, and that the box marked “Use Automatic Reference
    Counting” is checked. No other boxes should be marked, so that your dialog resembles
    [Figure 15–8](#Chapter15.html#fig_15_8).


    ![Image](images/9781430240051_Fig15-08.jpg)


    **Figure 15–8.** *Configuring project settings*


    Upon creating your application, you will be given a nicely configured project
    with a `UISplitViewController` already set up with master and detail view controllers.
    If your simulator or device is in portrait mode, you will see only the view of
    the detail view controller, but if you rotate to landscape then you will get a
    nice mix of both views. You will not see both views when working in Interface
    Builder, but if you simulate the app, the generic view will resemble [Figure 15–9](#Chapter15.html#fig_15_9).


    ![Image](images/9781430240051_Fig15-09.jpg)


    **Figure 15–9.** *An empty `UISplitViewController`*


    Now, you will configure the detail view controller to include a bit more content.
    Add a `UIImageView`, as well as two `UIButton`s to your XIB’s interface so that
    your simulated application will look like [Figure 15–10](#Chapter15.html#fig_15_10).


    ![Image](images/9781430240051_Fig15-10.jpg)


    **Figure 15–10.** *A simulated view of your configured user interface*


    In order to make sure that both your buttons and image view will be correctly
    centered in your final display, first set them to the center of your XIB’s view
    as you normally would. Then, you will set the “autosizing” options for each element.
    Open up the utilities pane on the right side of your screen, and navigate to the
    fifth tab where you can set an element’s frame, shown in [Figure 15–11](#Chapter15.html#fig_15_11).


    ![Image](images/9781430240051_Fig15-11.jpg)


    **Figure 15–11.** *Configuring autosizing to customize resizing behavior*


    Make sure that for each element, the Autosizing box, with its various red lines
    and arrows, is configured exactly as shown in [Figure 15–11](#Chapter15.html#fig_15_11).
    This will specify that each element will, if the view changes, maintain its relative
    position to the top of the view and stretch horizontally to maintain its general
    position.


    Connect each element to your header file using the property names `selectImageButton`,
    `clearImageButton`, and `imageViewContent`. Each `UIButton` will have its respective
    action, `-selectImagePressed:` and `-clearImagePressed:`.


    You will be configuring your application to display a `UIPopoverController` containing
    a `UIImagePickerController` in order to allow users to select an image from their
    phone. To do this, you will need your detail view controller to conform to several
    extra protocols: `UIImagePickerControllerDelegate`, `UINavigationControllerDelegate`
    and `UIPopoverControllerDelegate`.


    `@interface MainDetailViewController : UIViewController<UISplitViewControllerDelegate,`

    `UIImagePickerControllerDelegate, UINavigationControllerDelegate,`

    `UIPopoverControllerDelegate>`


    You will also create two extra properties in order to store your selected image,
    as well as a reference to your `UIPopoverController` that you will use. Make sure
    both of these are properly synthesized, as well as properly nullified in the `-viewDidUnload`
    method.


    `@property (strong, nonatomic) UIPopoverController *pop;`

    `@property (strong, nonatomic) UIImage *selectedImage;`


    At this point, with your basic user interface configured, your overall detail
    view controller’s header file should resemble the following.


    `#import <UIKit/UIKit.h>`


    `@interface MainDetailViewController : UIViewController<UISplitViewControllerDelegate,`

    `UIImagePickerControllerDelegate, UIPopoverControllerDelegate,`

    `UINavigationControllerDelegate>`


    `@property (strong, nonatomic) id detailItem;`


    `@property (strong, nonatomic) IBOutlet UILabel *detailDescriptionLabel;`

    `@property (strong, nonatomic) IBOutlet UIButton *selectImageButton;`

    `@property (strong, nonatomic) IBOutlet UIButton *clearImageButton;`

    `@property (strong, nonatomic) IBOutlet UIImageView *imageViewContent;`

    `-(IBAction)selectImagePressed:(id)sender;`

    `-(IBAction)clearImagePressed:(id)sender;`


    `@property (strong, nonatomic) UIPopoverController *pop;`

    `@property (strong, nonatomic) UIImage *selectedImage;`


    `@end`


    Now you can implement your `-selectImagePressed:` method to present an interface
    to select a saved image to display.


    `-(void)selectImagePressed:(UIButton *)sender`

    `{`

    `UIImagePickerController *picker = [[UIImagePickerController alloc] init];`

    `if ([UIImagePickerController isSourceTypeAvailable:UIImagePickerControllerSourceTypePhotoLibrary])`

    `    {`

    `        picker.sourceType = UIImagePickerControllerSourceTypePhotoLibrary;`

    `        picker.delegate = self;`


    `self.pop = [[UIPopoverController alloc] initWithContentViewController:picker];`

    `pop.delegate = self;`

    `        [pop presentPopoverFromRect:sender.frame inView:self.view permittedArrowDirections:UIPopoverArrowDirectionAny
    animated:YES];`

    `    }`

    `}`


    You can then implement your `UIImagePickerControllerDelegate` protocol methods
    to properly handle the selection of an image or cancellation.


    `-(void)imagePickerControllerDidCancel:(UIImagePickerController *)picker`

    `{`

    `    [self.pop dismissPopoverAnimated:YES];`

    `}`

    `-(void)imagePickerController:(UIImagePickerController *)picker didFinishPickingMediaWithInfo:(NSDictionary
    *)info`

    `{`

    `UIImage *image = [info valueForKey:@"UIImagePickerControllerOriginalImage"];`

    `self.selectedImage = image;`

    `self.imageViewContent.image = image;`

    `self.imageViewContent.contentMode = UIViewContentModeScaleAspectFill;   `


    `    [self.pop dismissPopoverAnimated:YES];`

    `}`


    As you can see, you configure your selected image to be displayed in your `UIImageView`
    by using the `image` property. You also set the `contentMode` property to `UIViewContentModeScaleAspectFill`,
    in order to ensure that the bounds of your `UIImageView` are always filled by
    at least most of the image.


    Finally, you can implement a simple method for `-clearImagePressed:` to allow
    your view to be reset:


    `- (IBAction)clearImagePressed:(id)sender`

    `{`

    `self.selectedImage = nil;`

    `self.imageViewContent.image = nil;`

    `}`


    At this point, you can run your application, select an image, and display it in
    a `UIImageView`, as in [Figure 15–12](#Chapter15.html#fig_15_12)!


    ![Image](images/9781430240051_Fig15-12.jpg)


    **Figure 15–12.** *Your application displaying an image in a `UIImageView`*


    If you are testing this application on the iOS simulator, you will need to actually
    have some images saved to display. The easiest way to save images to the simulator’s
    photo library is to use the Safari app on the simulator, navigate to your desired
    image, and then click and hold the mouse on the image. You will be given an option
    to save the image, and after this you can use it in your application.'
  trans: "\n### 食谱 15–2：使用 UIImageView\n\n在你的应用中显示图像的最简单方法，就是使用 `UIImageView` 类。你将首先创建一个简单的应用来显示用户选择的图像，然后在其基础上进行扩展，以充分利用\
    \ iOS 的图像处理能力。\n\n为了增强应用的功能，你将专门为 iPad 设计它，并使用 `UISplitViewController`。创建一个新项目，选择“主-从应用程序模板”。在下一个界面中，输入项目名称“ImageRecipes”后，确保应用的设备族设置为“iPad”，并勾选“使用自动引用计数”复选框。其他复选框均不应勾选，使你的对话框与图\
    \ 15–8 一致。\n\n![Image](img/9781430240051_Fig15-08.jpg)\n\n**图 15–8.** *配置项目设置*\n\
    \n创建应用后，你将得到一个配置完善的项目，其中已设置了一个包含主视图控制器和详细视图控制器的 `UISplitViewController`。如果你的模拟器或设备处于竖屏模式，你将只能看到详细视图控制器的视图；但如果旋转到横屏，你将看到两个视图的完美混合。在\
    \ Interface Builder 中工作时，你不会同时看到两个视图，但如果你模拟运行应用，通用视图将类似于图 15–9。\n\n![Image](img/9781430240051_Fig15-09.jpg)\n\
    \n**图 15–9.** *一个空的 `UISplitViewController`*\n\n现在，你将配置详细视图控制器，使其包含更多内容。在你的 XIB\
    \ 界面中添加一个 `UIImageView` 以及两个 `UIButton`，以便你的模拟应用看起来像图 15–10。\n\n![Image](img/9781430240051_Fig15-10.jpg)\n\
    \n**图 15–10.** *你配置的用户界面的模拟视图*\n\n为了确保你的按钮和图像视图在最终显示中正确居中，首先像往常一样将它们设置在 XIB 视图的中心。然后，为每个元素设置“自动调整大小”选项。打开屏幕右侧的实用工具面板，导航到第五个标签页，你可以在其中设置元素的框架，如图\
    \ 15–11 所示。\n\n![Image](img/9781430240051_Fig15-11.jpg)\n\n**图 15–11.** *配置自动调整大小以自定义缩放行为*\n\
    \n确保每个元素的“自动调整大小”框（带有各种红色线条和箭头）都严格按照图 15–11 所示进行配置。这将指定每个元素在视图变化时，保持其相对于视图顶部的相对位置，并水平拉伸以保持其大致位置。\n\
    \n使用属性名称 `selectImageButton`、`clearImageButton` 和 `imageViewContent` 将每个元素连接到你的头文件。每个\
    \ `UIButton` 都将有各自的操作方法 `-selectImagePressed:` 和 `-clearImagePressed:`。\n\n你将配置应用以显示一个包含\
    \ `UIImagePickerController` 的 `UIPopoverController`，以便允许用户从手机中选择图像。为此，你需要让详细视图控制器遵循几个额外的协议：`UIImagePickerControllerDelegate`、`UINavigationControllerDelegate`\
    \ 和 `UIPopoverControllerDelegate`。\n\n```\n@interface MainDetailViewController\
    \ : UIViewController<UISplitViewControllerDelegate,\nUIImagePickerControllerDelegate,\
    \ UINavigationControllerDelegate,\nUIPopoverControllerDelegate>\n```\n\n你还需要创建两个额外的属性，用于存储你选择的图像，以及一个你将使用的\
    \ `UIPopoverController` 的引用。确保这两个属性都已正确合成，并且已在 `-viewDidUnload` 方法中正确置空。\n\n```\n\
    @property (strong, nonatomic) UIPopoverController *pop;\n@property (strong, nonatomic)\
    \ UIImage *selectedImage;\n```\n\n此时，在配置好基本用户界面后，你的详细视图控制器的完整头文件应类似于下面这样。\n\n\
    ```\n#import <UIKit/UIKit.h>\n\n@interface MainDetailViewController : UIViewController<UISplitViewControllerDelegate,\n\
    UIImagePickerControllerDelegate, UIPopoverControllerDelegate,\nUINavigationControllerDelegate>\n\
    \n@property (strong, nonatomic) id detailItem;\n\n@property (strong, nonatomic)\
    \ IBOutlet UILabel *detailDescriptionLabel;\n@property (strong, nonatomic) IBOutlet\
    \ UIButton *selectImageButton;\n@property (strong, nonatomic) IBOutlet UIButton\
    \ *clearImageButton;\n@property (strong, nonatomic) IBOutlet UIImageView *imageViewContent;\n\
    -(IBAction)selectImagePressed:(id)sender;\n-(IBAction)clearImagePressed:(id)sender;\n\
    \n@property (strong, nonatomic) UIPopoverController *pop;\n@property (strong,\
    \ nonatomic) UIImage *selectedImage;\n\n@end\n```\n\n现在你可以实现 `-selectImagePressed:`\
    \ 方法，以显示一个用于选择已保存图像进行显示的界面。\n\n```\n-(void)selectImagePressed:(UIButton *)sender\n\
    {\n    UIImagePickerController *picker = [[UIImagePickerController alloc] init];\n\
    \    if ([UIImagePickerController isSourceTypeAvailable:UIImagePickerControllerSourceTypePhotoLibrary])\n\
    \    {\n        picker.sourceType = UIImagePickerControllerSourceTypePhotoLibrary;\n\
    \        picker.delegate = self;\n\n        self.pop = [[UIPopoverController alloc]\
    \ initWithContentViewController:picker];\n        pop.delegate = self;\n     \
    \   [pop presentPopoverFromRect:sender.frame inView:self.view permittedArrowDirections:UIPopoverArrowDirectionAny\
    \ animated:YES];\n    }\n}\n```\n\n然后，你可以实现 `UIImagePickerControllerDelegate`\
    \ 协议方法，以正确处理图像的选择或取消操作。\n\n```\n-(void)imagePickerControllerDidCancel:(UIImagePickerController\
    \ *)picker\n{\n    [self.pop dismissPopoverAnimated:YES];\n}\n-(void)imagePickerController:(UIImagePickerController\
    \ *)picker didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    UIImage\
    \ *image = [info valueForKey:@\"UIImagePickerControllerOriginalImage\"];\n   \
    \ self.selectedImage = image;\n    self.imageViewContent.image = image;\n    self.imageViewContent.contentMode\
    \ = UIViewContentModeScaleAspectFill;   \n\n    [self.pop dismissPopoverAnimated:YES];\n\
    }\n```\n\n如你所见，你通过使用 `image` 属性将选定的图像配置为在 `UIImageView` 中显示。你还将 `contentMode`\
    \ 属性设置为 `UIViewContentModeScaleAspectFill`，以确保 `UIImageView` 的边界始终至少被图像的大部分内容填满。\n\
    \n最后，你可以为 `-clearImagePressed:` 实现一个简单的方法，以允许重置你的视图：\n\n```\n- (IBAction)clearImagePressed:(id)sender\n\
    {\n    self.selectedImage = nil;\n    self.imageViewContent.image = nil;\n}\n\
    ```\n\n此时，你可以运行你的应用，选择一张图像，并在 `UIImageView` 中显示它，如图 15–12 所示！\n\n![Image](img/9781430240051_Fig15-12.jpg)\n\
    \n**图 15–12.** *你的应用在 `UIImageView` 中显示图像*\n\n如果你在 iOS 模拟器上测试此应用，你需要实际保存一些图像以供显示。将图像保存到模拟器照片库的最简单方法是：在模拟器上使用\
    \ Safari 应用，导航到你想要的图像，然后按住鼠标左键点击该图像。你将看到一个保存图像的选项，执行此操作后，你就可以在你的应用中使用它了。\n"
- fmt: "### Recipe 15–3: Scaling Images\n\nOften the images that your applications\
    \ have to deal with can come from a variety of sources, and usually will not fit\
    \ your specific view’s display perfectly. To adjust for this, you can implement\
    \ methods to scale and resize your images.\n\nYou will configure your application\
    \ to overall have a single image selected in your first detail view controller.\
    \ Upon selecting different rows in your master view controller’s table, you will\
    \ change the display in your detail view controller to a variety of images. For\
    \ now, you will configure your views to display your images as they are resized\
    \ differently.\n\nYou will start off by creating a method to fully adjust the\
    \ content of your detail view controller. Add the following handler to your detail\
    \ view controller’s header file:\n\n`-(void)configureDetailsWithImage:(UIImage\
    \ *)image label:(NSString *)label showsButtons:(BOOL)showButton;`\n\nYou will\
    \ implement this method like so:\n\n```\n-(void)configureDetailsWithImage:(UIImage\
    \ *)image label:(NSString *)label showsButtons:(BOOL)showsButton\n{\n    self.selectedImage\
    \ = image;\n    self.imageViewContent.image = image;\n    self.detailDescriptionLabel.text\
    \ = label;\n    if (showsButton == NO)\n    {\n        self.selectImageButton.enabled\
    \ = NO;\n        self.selectImageButton.hidden = YES;\n        self.clearImageButton.enabled\
    \ = NO;\n        self.clearImageButton.hidden = YES;\n    }\n    else if (showsButton\
    \ == YES)\n    {\n        self.selectImageButton.enabled = YES;\n        self.selectImageButton.hidden\
    \ = NO;\n        self.clearImageButton.enabled = YES;\n        self.clearImageButton.hidden\
    \ = NO;\n    }\n}\n```\n\nYou will add a reference to the master view controller\
    \ to your detail view controller to allow your chosen image to be passed back.\
    \ Add the following import statement (or your own class name for the master view\
    \ controller):\n\n`#import \"MainMasterViewController.h\"`\n\nAdd the master view\
    \ controller property, and make sure to synthesize it.\n\n`@property (strong,\
    \ nonatomic) MainMasterViewController *masterViewController;`\n\nAdd the following\
    \ line to your `-viewDidUnload` method:\n\n`[self setMasterViewController:nil];`\n\
    \nNext, you will add a property to your master view controller class to store\
    \ the chosen image. Make sure to properly synthesize and handle it as usual.\n\
    \n`@property (strong, nonatomic) UIImage *mainImage;`\n\nBack in your detail view\
    \ controller, you will update your `-imagePickerController:didFinishPickingMediaWithInfo:`\
    \ method to also send the chosen image back to the master view controller.\n\n\
    ```\n-(void)imagePickerController:(UIImagePickerController *)picker didFinishPickingMediaWithInfo:(NSDictionary\
    \ *)info\n{\n    UIImage *image = [info valueForKey:@\"UIImagePickerControllerOriginalImage\"\
    ];\n    self.selectedImage = image;\n\n    //New Line\n    self.masterViewController.mainImage\
    \ = image;\n\n    self.imageViewContent.image = image;\n    self.imageViewContent.contentMode\
    \ = UIViewContentModeScaleAspectFill;   \n\n    [self.pop dismissPopoverAnimated:YES];\n\
    }\n```\n\nYou will also adjust the implementation of your `-clearImagePressed:`\
    \ method accordingly.\n\n```\n- (IBAction)clearImagePressed:(id)sender\n{\n  \
    \  self.selectedImage = nil;\n    self.imageViewContent.image = nil;\n    self.masterViewController.mainImage\
    \ = nil;\n}\n```\n\nIn your master view controller, you will later implement code\
    \ to utilize your images in the actual table, so you will implement a custom setter\
    \ method for the `mainImage` property to reload the `UITableView`’s data.\n\n\
    ```\n-(void)setMainImage:(UIImage *)image\n{\n    mainImage = image;\n    NSIndexPath\
    \ *currentIndexPath = self.tableView.indexPathForSelectedRow;\n    [self.tableView\
    \ reloadData];\n    [self.tableView selectRowAtIndexPath:currentIndexPath animated:YES\
    \ scrollPosition:UITableViewScrollPositionTop];\n}\n```\n\nNext, you will create\
    \ two different methods to resize an image. Add the following two handlers to\
    \ your detail view controller’s header file.\n\n`+ (UIImage *)scaleImage:(UIImage\
    \ *)image toSize:(CGSize)size;`\n`+ (UIImage *)aspectScaleImage:(UIImage *)image\
    \ toSize:(CGSize)size;`"
  raw: '### Recipe 15–3: Scaling Images


    Often the images that your applications have to deal with can come from a variety
    of sources, and usually will not fit your specific view’s display perfectly. To
    adjust for this, you can implement methods to scale and resize your images.


    You will configure your application to overall have a single image selected in
    your first detail view controller. Upon selecting different rows in your master
    view controller’s table, you will change the display in your detail view controller
    to a variety of images. For now, you will configure your views to display your
    images as they are resized differently.


    You will start off by creating a method to fully adjust the content of your detail
    view controller. Add the following handler to your detail view controller’s header
    file.


    `-(void)configureDetailsWithImage:(UIImage *)image label:(NSString *)label showsButtons:(BOOL)showButton;`


    You will implement this method like so:


    `-(void)configureDetailsWithImage:(UIImage *)image label:(NSString *)label showsButtons:(BOOL)showsButton`

    `{`

    `self.selectedImage = image;`

    `self.imageViewContent.image = image;`

    `self.detailDescriptionLabel.text = label;`

    `    if (showsButton == NO)`

    `    {`

    `self.selectImageButton.enabled = NO;`

    `self.selectImageButton.hidden = YES;`

    `self.clearImageButton.enabled = NO;`

    `self.clearImageButton.hidden = YES;`

    `    }`

    `else if (showsButton == YES)`

    `    {`

    `self.selectImageButton.enabled = YES;`

    `self.selectImageButton.hidden = NO;`

    `self.clearImageButton.enabled = YES;`

    `self.clearImageButton.hidden = NO;`

    `    }`

    `}`


    You will add a reference to the master view controller to your detail view controller
    to allow your chosen image to be passed back. Add the following import statement
    (or your own class name for the master view controller):


    `#import "MainMasterViewController.h"`


    Add the master view controller property, and make sure to synthesize it.


    `@property (strong, nonatomic) MainMasterViewController *masterViewController;`


    Add the following line to your `-viewDidUnload` method.


    `[self setMasterViewController:nil];`


    Next, you will add a property to your master view controller class to store the
    chosen image. Make sure to properly synthesize and handle it as usual.


    `@property (strong, nonatomic) UIImage *mainImage;`


    Back in your detail view controller, you will update your `-imagePickerController:didFinishPickingMediaWithInfo:`
    method to also send the chosen image back to the master view controller.


    `-(void)imagePickerController:(UIImagePickerController *)picker didFinishPickingMediaWithInfo:(NSDictionary
    *)info`

    `{`

    `UIImage *image = [info valueForKey:@"UIImagePickerControllerOriginalImage"];`

    `self.selectedImage = image;`


    `//New Line`

    `self.masterViewController.mainImage = image;`


    `self.imageViewContent.image = image;`

    `self.imageViewContent.contentMode = UIViewContentModeScaleAspectFill;   `


    `    [self.pop dismissPopoverAnimated:YES];`

    `}`


    You will also adjust the implementation of your `-clearImagePressed:` method accordingly.


    `- (IBAction)clearImagePressed:(id)sender`

    `{`

    `self.selectedImage = nil;`

    `self.imageViewContent.image = nil;`

    `self.masterViewController.mainImage = nil;`

    `}`


    In your master view controller, you will later implement code to utilize your
    images in the actual table, so you will implement a custom setter method for the
    `mainImage` property to reload the `UITableView`’s data.


    `-(void)setMainImage:(UIImage *)image`

    `{`

    `mainImage = image;`

    `NSIndexPath *currentIndexPath = self.tableView.indexPathForSelectedRow;`

    `    [self.tableView reloadData];`

    `    [self.tableView selectRowAtIndexPath:currentIndexPath animated:YES scrollPosition:UITableViewScrollPositionTop];`

    `}`


    Next, you will create two different methods to resize an image. Add the following
    two handlers to your detail view controller’s header file.


    `+ (UIImage *)scaleImage:(UIImage *)image toSize:(CGSize)size;`

    `+ (UIImage *)aspectScaleImage:(UIImage *)image toSize:(CGSize)size;`'
  trans: "\n### 食谱 15–3：缩放图像\n\n通常，你的应用需要处理的图像可能来自多种来源，而且往往无法完美适配特定视图的显示。为了解决这个问题，你可以实现图像缩放和调整大小的方法。\n\
    \n你需要配置应用，使第一个明细视图控制器（detail view controller）整体上只选中一张图像。当在主视图控制器（master view controller）的表格中选择不同的行时，你将在明细视图控制器中切换显示不同的图像。目前，你将配置视图，使图像以不同的大小比例显示。\n\
    \n首先，你需要创建一个方法来全面调整明细视图控制器的内容。将以下处理程序添加到明细视图控制器的头文件中：\n\n`-(void)configureDetailsWithImage:(UIImage\
    \ *)image label:(NSString *)label showsButtons:(BOOL)showButton;`\n\n你需要按如下方式实现此方法：\n\
    \n```\n-(void)configureDetailsWithImage:(UIImage *)image label:(NSString *)label\
    \ showsButtons:(BOOL)showsButton\n{\n    self.selectedImage = image;\n    self.imageViewContent.image\
    \ = image;\n    self.detailDescriptionLabel.text = label;\n    if (showsButton\
    \ == NO)\n    {\n        self.selectImageButton.enabled = NO;\n        self.selectImageButton.hidden\
    \ = YES;\n        self.clearImageButton.enabled = NO;\n        self.clearImageButton.hidden\
    \ = YES;\n    }\n    else if (showsButton == YES)\n    {\n        self.selectImageButton.enabled\
    \ = YES;\n        self.selectImageButton.hidden = NO;\n        self.clearImageButton.enabled\
    \ = YES;\n        self.clearImageButton.hidden = NO;\n    }\n}\n```\n\n你需要向明细视图控制器添加一个对主视图控制器的引用，以便将选中的图像传回。添加以下导入语句（或使用你的主视图控制器类名）：\n\
    \n`#import \"MainMasterViewController.h\"`\n\n添加主视图控制器属性，并确保对其进行合成。\n\n`@property\
    \ (strong, nonatomic) MainMasterViewController *masterViewController;`\n\n将以下代码行添加到你的\
    \ `-viewDidUnload` 方法中：\n\n`[self setMasterViewController:nil];`\n\n接下来，你需要在主视图控制器类中添加一个属性来存储选中的图像。请像平常一样正确合成并处理该属性。\n\
    \n`@property (strong, nonatomic) UIImage *mainImage;`\n\n回到明细视图控制器，你需要更新 `-imagePickerController:didFinishPickingMediaWithInfo:`\
    \ 方法，使其同时将选中的图像传回主视图控制器。\n\n```\n-(void)imagePickerController:(UIImagePickerController\
    \ *)picker didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    UIImage\
    \ *image = [info valueForKey:@\"UIImagePickerControllerOriginalImage\"];\n   \
    \ self.selectedImage = image;\n\n    //新增加的行\n    self.masterViewController.mainImage\
    \ = image;\n\n    self.imageViewContent.image = image;\n    self.imageViewContent.contentMode\
    \ = UIViewContentModeScaleAspectFill;   \n\n    [self.pop dismissPopoverAnimated:YES];\n\
    }\n```\n\n你还需要相应调整 `-clearImagePressed:` 方法的实现。\n\n```\n- (IBAction)clearImagePressed:(id)sender\n\
    {\n    self.selectedImage = nil;\n    self.imageViewContent.image = nil;\n   \
    \ self.masterViewController.mainImage = nil;\n}\n}\n\n稍后，你将在主视图控制器中实现代码，以便在表格中使用这些图像。为此，你需要为\
    \ `mainImage` 属性实现一个自定义设置方法，用于重新加载 `UITableView` 的数据。\n\n```\n-(void)setMainImage:(UIImage\
    \ *)image\n{\n    mainImage = image;\n    NSIndexPath *currentIndexPath = self.tableView.indexPathForSelectedRow;\n\
    \    [self.tableView reloadData];\n    [self.tableView selectRowAtIndexPath:currentIndexPath\
    \ animated:YES scrollPosition:UITableViewScrollPositionTop];\n}\n```\n\n接下来，你将创建两个不同的方法来调整图像大小。将以下两个处理程序添加到明细视图控制器的头文件中。\n\
    \n`+ (UIImage *)scaleImage:(UIImage *)image toSize:(CGSize)size;`\n`+ (UIImage\
    \ *)aspectScaleImage:(UIImage *)image toSize:(CGSize)size;`\n"
- fmt: "第一种方法会在指定尺寸内简单地重新创建图像，完全忽略图像的宽高比。\n\n```\n+ (UIImage *)scaleImage:(UIImage\
    \ *)image toSize:(CGSize)size\n{\n    UIGraphicsBeginImageContext(size);\n   \
    \ [image drawInRect:CGRectMake(0, 0, size.width, size.height)];\n    UIImage *scaledImage\
    \ = UIGraphicsGetImageFromCurrentImageContext();\n    UIGraphicsEndImageContext();\n\
    \    return scaledImage;\n}\n```\n\n第二种方法会通过少量计算，确定最佳的图像缩放方式，以同时保留宽高比并适应给定的尺寸。\n\
    \n```\n+ (UIImage *)aspectScaleImage:(UIImage *)image toSize:(CGSize)size\n{\n\
    \    UIGraphicsBeginImageContext(size);\n    if (image.size.height < image.size.width)\n\
    \    {\n        float ratio = size.height/image.size.height;\n        [image drawInRect:CGRectMake(0,\
    \ 0, image.size.width*ratio, size.height)];\n    }\n    else\n    {\n        float\
    \ ratio = size.width/image.size.width;\n        [image drawInRect:CGRectMake(0,\
    \ 0, size.width, image.size.height*ratio)];\n    }\n    UIImage *aspectScaledImage\
    \ = UIGraphicsGetImageFromCurrentImageContext();\n    UIGraphicsEndImageContext();\n\
    \    return aspectScaledImage;\n}\n```\n\n为确保视图控制器正确交互，请在应用程序委托的`-application:didFinishLaunchingWithOptions:`方法中，在两个视图控制器创建完成后添加以下两行代码：\n\
    \n```\ndetailViewController.masterViewController = masterViewController;\nmasterViewController.detailViewController\
    \ = detailViewController;\n```\n\n现在，要完成主视图控制器行为的配置，请修改以下委托方法：\n\n```\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    if (self.mainImage\
    \ == nil)\n    {\n        return 1;\n    }\n    else\n    {\n        return 3;\n\
    \    }\n}\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if\
    \ (cell == nil) {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\
    \ reuseIdentifier:CellIdentifier];\n    }\n\n    if (indexPath.row == 0)\n   \
    \     cell.textLabel.text = NSLocalizedString(@\"Selected Image\", @\"Detail\"\
    );\n    else if (indexPath.row == 1)\n        cell.textLabel.text = NSLocalizedString(@\"\
    Resized Image\", @\"Detail\");\n    else if (indexPath.row == 2)\n        cell.textLabel.text\
    \ = NSLocalizedString(@\"Scaled Image\", @\"Detail\");\n    return cell;\n}\n\
    - (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    if (self.mainImage != nil)\n    {\n        UIImage *image;\n\
    \        NSString *label;\n        BOOL showsButtons;\n        if (indexPath.row\
    \ == 0)\n        {\n            image = self.mainImage;\n            label = @\"\
    Select an Image to Display\";\n            showsButtons = YES;\n        }\n  \
    \      else if (indexPath.row == 1)\n        {\n            image = [MainDetailViewController\
    \ scaleImage:self.mainImage toSize:self.detailViewController.imageViewContent.frame.size];\n\
    \            label = @\"Chosen Image Resized\";\n            showsButtons = NO;\n\
    \        }\n        else if (indexPath.row == 2)\n        {\n            image\
    \ = [MainDetailViewController aspectScaleImage:self.mainImage toSize:self.detailViewController.imageViewContent.frame.size];\n\
    \            label = @\"Chosen Image Scaled\";\n            showsButtons = NO;\n\
    \        }\n        [self.detailViewController configureDetailsWithImage:image\
    \ label:label showsButtons:showsButtons];\n    }\n}\n```\n\n如前所示，原始图像为了保持宽高比，最终会扩展到`UIImageView`的框架之外。由于这可能会导致遮挡其他元素的问题，因此你可能更倾向于使用缩放后的图像。运行此应用程序时，你可以看到在展示不同尺寸图像时各选项的巨大差异。\n\
    \n[Figure 15–13](#Chapter15.html#fig_15_13)展示了同一图像的示例，但已将其简单缩放以适应图像视图的框架。\n\n\
    ![Image](images/9781430240051_Fig15-13.jpg)\n\n**Figure 15–13.** *你的应用程序展示未经缩放而调整大小的图像*\n\
    \n如你所见，你已经成功将整个图像放入一个更小的空间中，确保图像不会遮挡其他视图元素。然而，此选项的问题在于图像的尺寸发生了变化，导致图像略微变形。对于此特定图像，这或许不太明显，但在处理人物图像时，物理特征的扭曲将变得非常明显且不美观。为解决此问题，你可以使用“aspect-scaled”图像，如\
    \ [Figure 15–14](#Chapter15.html#fig_15_14) 所示。\n\n![Image](images/9781430240051_Fig15-14.jpg)\n\
    \n**Figure 15–14.** *一种替代的缩放方法以消除失真，但会导致裁剪*\n\n与之前的图像和原始图像相比，你可以看到此图像明显质量更高，因为它不存在任何尺寸变形。不幸的是，由于你选择让图像“填满”`UIImageView`，最终得到的图像是从原始图像裁剪而来的。如果你需要从较大的图像创建小缩略图，这种缩放方式效果极佳，因为随着尺寸变小，图像裁剪的问题会变得微不足道。\n\
    \n显然，如果你处理的不是缩略图，而是需要展示大图，那么上述裁剪效果则远非理想。你可以优化图像缩放方法，让图像“适应”图像视图，并为视图的其余部分提供黑色背景。进行此更改后，你之前的“缩略图创建方法”将不再有效，因此如果你想保留之前的设置，请务必保存项目的新副本。\n\
    \n首先，将配置方法调整为以下代码，以更改`UIImageView`的`contentMode`属性。\n\n```\n- (void)configureDetailsWithImage:(UIImage\
    \ *)image label:(NSString *)label showsButtons:(BOOL)showsButton\n{\n    self.selectedImage\
    \ = image;\n    self.imageViewContent.image = image;\n    self.detailDescriptionLabel.text\
    \ = label;\n    /////BEGIN NEW CODE\n    if ([label isEqualToString:@\"Chosen\
    \ Image Scaled\"])\n    {\n        self.imageViewContent.contentMode = UIViewContentModeScaleAspectFit;\n\
    \        self.imageViewContent.backgroundColor = [UIColor blackColor];\n    }\n\
    \    else\n    {\n        self.imageViewContent.contentMode = UIViewContentModeScaleAspectFill;\n\
    \    }\n    /////END NEW CODE\n    if (showsButton == NO)\n    {\n        self.selectImageButton.enabled\
    \ = NO;\n        self.selectImageButton.hidden = YES;\n        self.clearImageButton.enabled\
    \ = NO;\n        self.clearImageButton.hidden = YES;\n    }\n    else if (showsButton\
    \ == YES)\n    {\n        self.selectImageButton.enabled = YES;\n        self.selectImageButton.hidden\
    \ = NO;\n        self.clearImageButton.enabled = YES;\n        self.clearImageButton.hidden\
    \ = NO;\n    }\n}\n```\n\n你的图像缩放方法将需要略微不同的计算方式，才能以这种方式正确缩放图像。以下代码展示了新的实现。请特别注意，你已经更改了用于创建图像上下文的`CGSize`。\n\
    \n```\n+ (UIImage *)aspectScaleImage:(UIImage *)image toSize:(CGSize)size\n{\n\
    \    if (image.size.height < image.size.width)\n    {\n        float ratio = size.height/image.size.height;\n\
    \        CGSize newSize = CGSizeMake(image.size.width*ratio, size.height);\n\n\
    \        UIGraphicsBeginImageContext(newSize);\n        [image drawInRect:CGRectMake(0,\
    \ 0, newSize.width, newSize.height)];\n    }\n    else\n    {\n        float ratio\
    \ = size.width/image.size.width;\n        CGSize newSize = CGSizeMake(size.width,\
    \ image.size.height*ratio);\n```"
  raw: 'The first method will simply recreate the image within a specified size, completely
    ignoring the aspect ratio of the image.


    `+ (UIImage *)scaleImage:(UIImage *)image toSize:(CGSize)size`

    `{`

    `UIGraphicsBeginImageContext(size);`

    `    [image drawInRect:CGRectMake(0, 0, size.width, size.height)];`

    `UIImage *scaledImage = UIGraphicsGetImageFromCurrentImageContext();`

    `UIGraphicsEndImageContext();`

    `return scaledImage;`

