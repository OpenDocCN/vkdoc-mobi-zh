- fmt: "```markdown\n# Recipe 8–9: Viewing Contacts\n\nNow that we have gone over\
    \ accessing and setting values, a very simple next step is to discuss how to set\
    \ up a view controller to see a contact's details.\n\nIn a new project called\
    \ `Chapter8Recipe9`, with class prefix `MainViewController`, after importing the\
    \ Address Book and Address Book UI frameworks and adding the appropriate `#import`\
    \ statements for each, add a `UITableView` to your view controller. Connect it\
    \ to your header file with the property name `tableViewContacts`. Make your view\
    \ controller conform to the `UITableViewDelegate`, `UITableViewDataSource`, and\
    \ `ABPersonViewControllerDelegate` protocols as well.\n\nCreate a property of\
    \ type `(NSArray *)` called `contacts` to store your contact list.\n\nOverall,\
    \ your header file should look like so:\n\n```\n#import <UIKit/UIKit.h>\n#import\
    \ <AddressBook/AddressBook.h>\n#import <AddressBookUI/AddressBookUI.h>\n\n@interface\
    \ MainViewController : UIViewController <UITableViewDelegate, UITableViewDataSource,\
    \ ABPersonViewControllerDelegate>\n\n@property (strong, nonatomic) IBOutlet UITableView\
    \ *tableViewContacts;\n@property (strong, nonatomic) NSArray *contacts;\n@end\n\
    ```\n\nBefore we continue, you will need to set your main view controller inside\
    \ of a `UINavigationController`. Switch over to the implementation file for your\
    \ app delegate, and change your `-application:DidFinishLaunchingWithOptions:`\
    \ method to look like so:\n\n```\n- (BOOL)application:(UIApplication *)application\n\
    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n    self.window\
    \ = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n    // Override\
    \ point for customization after application launch.\n    self.viewController =\
    \ [[MainViewController alloc]\ninitWithNibName:@\"MainViewController\" bundle:nil];\n\
    \    UINavigationController *navcon = [[UINavigationController alloc]\ninitWithRootViewController:self.viewController];\n\
    \    self.window.rootViewController = navcon;\n    [self.window makeKeyAndVisible];\n\
    \    return YES;\n}\n```\n\nNow, back in your view controller's implementation\
    \ file, create a method to update your array of contacts like so:\n\n```\n-(void)updateContacts\n\
    {\n    ABAddressBookRef addressBook = ABAddressBookCreate();\n    CFArrayRef people\
    \ = ABAddressBookCopyArrayOfAllPeople(addressBook);\n    self.contacts = (__bridge\
    \ NSArray *)people;\n    CFRelease(people);\n}\n```\n\nThis should make your `-viewDidLoad`\
    \ method very simple to implement.\n\n```\n- (void)viewDidLoad\n{\n    [super\
    \ viewDidLoad];\n\n    self.tableViewContacts.delegate = self;\n    self.tableViewContacts.dataSource\
    \ = self;\n    self.title = @\"Contacts Table\";\n    [self updateContacts];\n\
    }\n```\n\nYou should also change your `-viewWillAppear:` method to refresh your\
    \ table in case of any changes made outside of the application.\n\n```\n- (void)viewWillAppear:(BOOL)animated\n\
    {\n    [self updateContacts];\n    [self.tableViewContacts reloadData];\n    [super\
    \ viewWillAppear:animated];\n}\n```\n\nNow you implement your `UITableView` data\
    \ source methods. You need one to specify the number of rows you have:\n\n```\n\
    -(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return [[NSNumber numberWithInt:[self.contacts count]] intValue];\n}\n\
    ```\n\nYou will have a fairly simple method for creating your cells, based on\
    \ the accessing code that you used in previous recipes.\n\n```\n-(UITableViewCell\
    \ *)tableView:(UITableView *)tableView\ncellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell *cell\
    \ = [tableView\ndequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell\
    \ == nil)\n    {\n         cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleValue1\n\
    reuseIdentifier:CellIdentifier];\n    }\n\n    cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n\
    \    cell.textLabel.backgroundColor = [UIColor clearColor];\n    cell.textLabel.font\
    \ = [UIFont systemFontOfSize:19.0];\n\n    ABRecordRef current = (__bridge ABRecordRef)[self.contacts\n\
    objectAtIndex:indexPath.row];\n\n    NSString *firstName = (__bridge_transfer\
    \ NSString *)ABRecordCopyValue(current,\nkABPersonFirstNameProperty);\n    NSString\
    \ *lastName = (__bridge_transfer NSString *)ABRecordCopyValue(current,\nkABPersonLastNameProperty);\n\
    \n    cell.textLabel.text = [NSString stringWithFormat:@\"%@ %@\", firstName,\
    \ lastName];\n\n    return cell;\n}\n```\n\nThe third data source method you need\
    \ is for the selection of a cell, which will present an instance of `ABPersonViewController`\
    \ with the selected contact's information.\n\n```\n-(void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath\n*)indexPath\n{\n    ABRecordRef\
    \ chosen = (__bridge ABRecordRef)[self.contacts\nobjectAtIndex:indexPath.row];\n\
    \n    ABPersonViewController *view = [[ABPersonViewController alloc] init];\n\
    \    view.personViewDelegate = self;\n    view.displayedPerson = chosen;\n   \
    \ view.allowsEditing = NO;\n\n    [self.navigationController pushViewController:view\
    \ animated:YES];\n    [tableView deselectRowAtIndexPath:indexPath animated:NO];\n\
    }\n```\n\nFinally, you just need to implement the `ABPersonViewController`'s delegate\
    \ method to handle the selection of a property. This method can simply return\
    \ a BOOL that will decide whether the user will be able to call or text a phone\
    \ number, or any other default property for a value, from your application.\n\n\
    ```\n-(BOOL)personViewController:(ABPersonViewController *)personViewController\n\
    shouldPerformDefaultActionForPerson:(ABRecordRef)person property:(ABPropertyID)property\n\
    identifier:(ABMultiValueIdentifier)identifier\n{\n    return YES;\n}\n```\n\n\
    Your application should have a very rudimentary table view displaying the names\
    \ of all the contacts in your phone, assuming that you have only individuals listed\
    \ in your contact list, as opposed to any groups. [Figure 8–16](#Chapter08.html#fig_8_16)\
    \ demonstrates the resulting view of selecting a record in your custom-made contact\
    \ list. Whenever dealing with an `ABRecordRef` for which you are not sure whether\
    \ it is an `ABPersonRef` or an `ABGroupRef`, you should always include code to\
    \ check for each case and act accordingly.\n\n![Image](images/9781430240051_Fig08-16.jpg)\n\
    \n**Figure 8–16.** *Contact info displayed after selecting a row in your table*\n\
    \n## Summary\n\nAs you can see, there are a great variety of methods and functionalities\
    \ for interacting with any specific user's personal data. From recurring events,\
    \ to multiple calendars, to the vast number of contacts and phone numbers that\
    \ most users have, all of this information can be used to personalize an application\
    \ for each and every customer, while developing generically for all of them. In\
    \ terms of user experience, being able to access, display, and edit all this information\
    \ allows us as developers to create more powerful, more unique, and more useful\
    \ applications, which in the end will translate to a happier customer, and a higher-quality\
    \ product.\n\n## Chapter 9\n\n## UITableView Recipes\n\nAll day, every single\
    \ day, we are receiving information. Whether in the form of video, radio, music,\
    \ e-mails, 140-character messages, or even sights and sounds, there is always\
    \ new data to acquire and process. As developers, we work to create and manage\
    \ the medium between this information and the end users through data organization\
    \ and display. We must be able to take the immense stream of information available\
    \ and process it down to simple, concise pieces that our specific audience will\
    \ be interested in. On top of this, we also have to make our data look visually\
    \ appealing, while still maintaining efficiency and organization. In iOS development,\
    \ one of our greatest tools in this goal is the `UITableView`: an incredibly flexible\
    \ yet simple interface designed to be easy to use for both developers and customers.\
    \ Throughout this chapter, we will focus on the step-by-step methodology for creating,\
    \ implementing, and customizing these useful tools.\n```"
  raw: '### Recipe 8–9: Viewing Contacts


    Now that we have gone over accessing and setting values, a very simple next step
    is to discuss how to set up a view controller to see a contact''s details.


    In a new project called “Chapter8Recipe9”, with class prefix “MainViewController”,
    after importing the Address Book and Address Book UI frameworks and adding the
    appropriate `#import` statements for each, add a `UITableView` to your view controller.
    Connect it to your header file with the property name `tableViewContacts`. Make
    your view controller conform to the `UITableViewDelegate`, `UITableViewDataSource`,
    and `ABPersonViewControllerDelegate` protocols as well.


    Create a property of type `(NSArray *)` called `contacts` to store your contact
    list.


    Overall, your header file should look like so:


    `#import <UIKit/UIKit.h>`

    `#import <AddressBook/AddressBook.h>`

    `#import <AddressBookUI/AddressBookUI.h>`


    `@interface MainViewController : UIViewController <UITableViewDelegate, UITableViewDataSource,
    ABPersonViewControllerDelegate>`


    `@property (strong, nonatomic) IBOutlet UITableView *tableViewContacts;`

    `@property (strong, nonatomic) NSArray *contacts;`

    `@end`


    Before we continue, you will need to set your main view controller inside of a
    `UINavigationController`. Switch over to the implementation file for your app
    delegate, and change your `-application:DidFinishLaunchingWithOptions:` method
    to look like so:


    `- (BOOL)application:(UIApplication *)application`

    `didFinishLaunchingWithOptions:(NSDictionary *)launchOptions`

    `{`

    `    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];`

    `    // Override point for customization after application launch.`

    `    self.viewController = [[MainViewController alloc]`

    `initWithNibName:@"MainViewController" bundle:nil];`

    `    UINavigationController *navcon = [[UINavigationController alloc]`

    `initWithRootViewController:self.viewController];`

    `    self.window.rootViewController = navcon;`

    `    [self.window makeKeyAndVisible];`

    `    return YES;`

    `}`


    Now, back in your view controller''s implementation file, create a method to update
    your array of contacts like so:


    `-(void)updateContacts`

    `{`

    `    ABAddressBookRef addressBook = ABAddressBookCreate();`

    `    CFArrayRef people = ABAddressBookCopyArrayOfAllPeople(addressBook);`

    `    self.contacts = (__bridge NSArray *)people;`

    `    CFRelease(people);`

    `}`


    This should make your `-viewDidLoad` method very simple to implement.


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`


    `    self.tableViewContacts.delegate = self;`

    `    self.tableViewContacts.dataSource = self;`

    `    self.title = @"Contacts Table";`

    `    [self updateContacts];`

    `}`


    You should also change your `-viewWillAppear:` method to refresh your table in
    case of any changes made outside of the application.


    `- (void)viewWillAppear:(BOOL)animated`

    `{`

    `    [self updateContacts];`

    `    [self.tableViewContacts reloadData];`

    `    [super viewWillAppear:animated];`

    `}`


    Now you implement your `UITableView` data source methods. You need one to specify
    the number of rows you have:


    `-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`

    `{`

    `    return [[NSNumber numberWithInt:[self.contacts count]] intValue];`

    `}`


    You will have a fairly simple method for creating your cells, based on the accessing
    code that you used in previous recipes.


    `-(UITableViewCell *)tableView:(UITableView *)tableView`

    `cellForRowAtIndexPath:(NSIndexPath *)indexPath`

    `{`

    `    static NSString *CellIdentifier = @"Cell";`


    `    UITableViewCell *cell = [tableView`

    `dequeueReusableCellWithIdentifier:CellIdentifier];`

    `    if (cell == nil)`

    `    {`

    `         cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleValue1`

    `reuseIdentifier:CellIdentifier];`

    `    }`


    `    cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;`

    `    cell.textLabel.backgroundColor = [UIColor clearColor];`

    `    cell.textLabel.font = [UIFont systemFontOfSize:19.0];`


    `    ABRecordRef current = (__bridge ABRecordRef)[self.contacts`

    `objectAtIndex:indexPath.row];`


    `    NSString *firstName = (__bridge_transfer NSString *)ABRecordCopyValue(current,`

    `kABPersonFirstNameProperty);`

    `    NSString *lastName = (__bridge_transfer NSString *)ABRecordCopyValue(current,`

    `kABPersonLastNameProperty);`


    `    cell.textLabel.text = [NSString stringWithFormat:@"%@ %@", firstName, lastName];`


    `    return cell;`

    `}`


    The third data source method you need is for the selection of a cell, which will
    present an instance of `ABPersonViewController` with the selected contact''s information.


    `-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath`

    `*)indexPath`

    `{`

    `    ABRecordRef chosen = (__bridge ABRecordRef)[self.contacts`

    `objectAtIndex:indexPath.row];`


    `    ABPersonViewController *view = [[ABPersonViewController alloc] init];`

    `    view.personViewDelegate = self;`

    `    view.displayedPerson = chosen;`

    `    view.allowsEditing = NO;`


    `    [self.navigationController pushViewController:view animated:YES];`

    `    [tableView deselectRowAtIndexPath:indexPath animated:NO];`

    `}`


    Finally, you just need to implement the `ABPersonViewController`''s delegate method
    to handle the selection of a property. This method can simply return a BOOL that
    will decide whether the user will be able to call or text a phone number, or any
    other default property for a value, from your application.


    `-(BOOL)personViewController:(ABPersonViewController *)personViewController`

    `shouldPerformDefaultActionForPerson:(ABRecordRef)person property:(ABPropertyID)property`

    `identifier:(ABMultiValueIdentifier)identifier`

    `{`

    `    return YES;`

    `}`


    Your application should have a very rudimentary table view displaying the names
    of all the contacts in your phone, assuming that you have only individuals listed
    in your contact list, as opposed to any groups. [Figure 8–16](#Chapter08.html#fig_8_16)
    demonstrates the resulting view of selecting a record in your custom-made contact
    list. Whenever dealing with an `ABRecordRef` for which you are not sure whether
    it is an `ABPersonRef` or an `ABGroupRef`, you should always include code to check
    for each case and act accordingly.


    ![Image](images/9781430240051_Fig08-16.jpg)


    **Figure 8–16.** *Contact info displayed after selecting a row in your table*


    ### Summary


    As you can see, there are a great variety of methods and functionalities for interacting
    with any specific user''s personal data. From recurring events, to multiple calendars,
    to the vast number of contacts and phone numbers that most users have, all of
    this information can be used to personalize an application for each and every
    customer, while developing generically for all of them. In terms of user experience,
    being able to access, display, and edit all this information allows us as developers
    to create more powerful, more unique, and more useful applications, which in the
    end will translate to a happier customer, and a higher-quality product.


    ## Chapter 9


    ## UITableView Recipes


    All day, every single day, we are receiving information. Whether in the form of
    video, radio, music, e-mails, 140-character messages, or even sights and sounds,
    there is always new data to acquire and process. As developers, we work to create
    and manage the medium between this information and the end users through data
    organization and display. We must be able to take the immense stream of information
    available and process it down to simple, concise pieces that our specific audience
    will be interested in. On top of this, we also have to make our data look visually
    appealing, while still maintaining efficiency and organization. In iOS development,
    one of our greatest tools in this goal is the `UITableView`: an incredibly flexible
    yet simple interface designed to be easy to use for both developers and customers.
    Throughout this chapter, we will focus on the step-by-step methodology for creating,
    implementing, and customizing these useful tools.'
  trans: "\n# 配方 8–9：查看联系人\n\n在介绍了如何访问和设置值之后，下一步非常简单的操作是讨论如何设置一个视图控制器来查看联系人的详细信息。\n\
    \n在一个名为 `Chapter8Recipe9` 的新项目中，使用类前缀 `MainViewController`，在导入 Address Book 和\
    \ Address Book UI 框架并为每个框架添加相应的 `#import` 语句后，向你的视图控制器添加一个 `UITableView`。使用属性名\
    \ `tableViewContacts` 将其连接到你的头文件。同时让你的视图控制器遵循 `UITableViewDelegate`、`UITableViewDataSource`\
    \ 和 `ABPersonViewControllerDelegate` 协议。\n\n创建一个类型为 `(NSArray *)` 的属性，名为 `contacts`，用于存储你的联系人列表。\n\
    \n总体而言，你的头文件应该如下所示：\n\n```\n#import <UIKit/UIKit.h>\n#import <AddressBook/AddressBook.h>\n\
    #import <AddressBookUI/AddressBookUI.h>\n\n@interface MainViewController : UIViewController\
    \ <UITableViewDelegate, UITableViewDataSource, ABPersonViewControllerDelegate>\n\
    \n@property (strong, nonatomic) IBOutlet UITableView *tableViewContacts;\n@property\
    \ (strong, nonatomic) NSArray *contacts;\n@end\n```\n\n在继续之前，你需要将你的主视图控制器放入一个\
    \ `UINavigationController` 中。切换到你的应用委托的实现文件，并将你的 `-application:DidFinishLaunchingWithOptions:`\
    \ 方法修改为如下所示：\n\n```\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    // 应用启动后的自定义覆盖点。\n    self.viewController = [[MainViewController\
    \ alloc]\ninitWithNibName:@\"MainViewController\" bundle:nil];\n    UINavigationController\
    \ *navcon = [[UINavigationController alloc]\ninitWithRootViewController:self.viewController];\n\
    \    self.window.rootViewController = navcon;\n    [self.window makeKeyAndVisible];\n\
    \    return YES;\n}\n```\n\n现在，回到视图控制器的实现文件，创建一个更新联系人数组的方法，如下所示：\n\n```\n-(void)updateContacts\n\
    {\n    ABAddressBookRef addressBook = ABAddressBookCreate();\n    CFArrayRef people\
    \ = ABAddressBookCopyArrayOfAllPeople(addressBook);\n    self.contacts = (__bridge\
    \ NSArray *)people;\n    CFRelease(people);\n}\n```\n\n这将使你的 `-viewDidLoad` 方法实现起来非常简单。\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    self.tableViewContacts.delegate\
    \ = self;\n    self.tableViewContacts.dataSource = self;\n    self.title = @\"\
    联系人表格\";\n    [self updateContacts];\n}\n```\n\n你还应该修改你的 `-viewWillAppear:` 方法，以便在应用程序外部发生任何更改时刷新你的表格。\n\
    \n```\n- (void)viewWillAppear:(BOOL)animated\n{\n    [self updateContacts];\n\
    \    [self.tableViewContacts reloadData];\n    [super viewWillAppear:animated];\n\
    }\n```\n\n现在实现你的 `UITableView` 数据源方法。你需要一个方法来指定你拥有的行数：\n\n```\n-(NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    return [[NSNumber\
    \ numberWithInt:[self.contacts count]] intValue];\n}\n```\n\n基于你在之前配方中使用的访问代码，你将有一个相当简单的方法来创建你的单元格。\n\
    \n```\n-(UITableViewCell *)tableView:(UITableView *)tableView\ncellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell\
    \ *cell = [tableView\ndequeueReusableCellWithIdentifier:CellIdentifier];\n   \
    \ if (cell == nil)\n    {\n         cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleValue1\n\
    reuseIdentifier:CellIdentifier];\n    }\n\n    cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n\
    \    cell.textLabel.backgroundColor = [UIColor clearColor];\n    cell.textLabel.font\
    \ = [UIFont systemFontOfSize:19.0];\n\n    ABRecordRef current = (__bridge ABRecordRef)[self.contacts\n\
    objectAtIndex:indexPath.row];\n\n    NSString *firstName = (__bridge_transfer\
    \ NSString *)ABRecordCopyValue(current,\nkABPersonFirstNameProperty);\n    NSString\
    \ *lastName = (__bridge_transfer NSString *)ABRecordCopyValue(current,\nkABPersonLastNameProperty);\n\
    \n    cell.textLabel.text = [NSString stringWithFormat:@\"%@ %@\", firstName,\
    \ lastName];\n\n    return cell;\n}\n```\n\n你需要实现的第三个数据源方法用于单元格的选中，这将显示一个包含所选联系人信息的\
    \ `ABPersonViewController` 实例。\n\n```\n-(void)tableView:(UITableView *)tableView\
    \ didSelectRowAtIndexPath:(NSIndexPath\n*)indexPath\n{\n    ABRecordRef chosen\
    \ = (__bridge ABRecordRef)[self.contacts\nobjectAtIndex:indexPath.row];\n\n  \
    \  ABPersonViewController *view = [[ABPersonViewController alloc] init];\n   \
    \ view.personViewDelegate = self;\n    view.displayedPerson = chosen;\n    view.allowsEditing\
    \ = NO;\n\n    [self.navigationController pushViewController:view animated:YES];\n\
    \    [tableView deselectRowAtIndexPath:indexPath animated:NO];\n}\n```\n\n最后，你只需要实现\
    \ `ABPersonViewController` 的代理方法，处理属性的选中。该方法可以简单地返回一个 BOOL 值，该值将决定用户是否能够从你的应用程序中拨打或发送短信给一个电话号码，或执行任何其他值的默认属性操作。\n\
    \n```\n-(BOOL)personViewController:(ABPersonViewController *)personViewController\n\
    shouldPerformDefaultActionForPerson:(ABRecordRef)person property:(ABPropertyID)property\n\
    identifier:(ABMultiValueIdentifier)identifier\n{\n    return YES;\n}\n```\n\n\
    假设你的联系人列表中只列出了个人，而没有群组，你的应用程序应该有一个非常基本的表格视图，显示手机上所有联系人的姓名。图 8–16 展示了在你自定义的联系人列表中选择一条记录后的结果视图。当处理一个你不确定是\
    \ `ABPersonRef` 还是 `ABGroupRef` 的 `ABRecordRef` 时，你应该始终包含代码来检查每种情况并相应处理。\n\n![图片](img/9781430240051_Fig08-16.jpg)\n\
    \n**图 8–16.** *在表格中选择一行后显示的联系人信息*\n\n## 总结\n\n如你所见，与任何特定用户的个人数据进行交互有着种类繁多的方法和功能。从重复事件，到多个日历，再到大多数用户拥有的海量联系人和电话号码，所有这些信息都可以用来为每个客户个性化应用，同时为所有客户进行通用开发。在用户体验方面，能够访问、显示和编辑所有这些信息，使我们作为开发者能够创建更强大、更独特、更有用的应用程序，最终将转化为更满意的客户和更高质量的产品。\n\
    \n## 第 9 章\n\n## UITableView 配方\n\n每一天，每时每刻，我们都在接收信息。无论是视频、广播、音乐、电子邮件、140 个字符的消息，甚至是视觉和声音，总有新的数据需要获取和处理。作为开发者，我们通过数据组织和展示，致力于在信息和最终用户之间创建并管理媒介。我们必须能够获取可用的海量信息流，并将其处理成简洁明了、符合特定受众兴趣的内容。除此之外，我们还必须让数据在视觉上具有吸引力，同时保持效率和条理性。在\
    \ iOS 开发中，实现这一目标最强大的工具之一就是 `UITableView`：一种极其灵活但又简单的界面，旨在为开发者和客户提供易用性。在本章中，我们将重点介绍创建、实现和定制这些实用工具的分步方法。\n"
- fmt: '# Recipe 9–1: Creating an Ungrouped Table


    There are two kinds of `UITableView`s you can use in iOS: the grouped table and
    the ungrouped table. Your use of one or the other will depend on any given application,
    but you will start by focusing on an ungrouped table due to its ease of implementation.


    In order to build a fully functional and customizable `UITableView`-based application,
    you will be starting from the ground up with an empty application, and ending
    up with a useful table to display information about various countries. Make a
    new project, and select the Empty Application template, as in [Figure 9–1](#Chapter09.html#fig_9_1).
    This will give you only an application delegate, from which you can build all
    of your view controllers.


    ![Image](images/9781430240051_Fig09-01.jpg)


    **Figure 9–1.** Selecting an empty application to start from scratch


    You will be using a single project throughout this entire chapter, so, rather
    than naming projects by recipe name, give your project whichever name you prefer
    (I chose "Countries", since the application will be focused on displaying information
    about different countries), and create your project. I have used the class prefix
    "Main", which will apply only to your app delegate files since you are using an
    empty application.


    Since you used an empty application, you will start by making your main view controller,
    which will contain your `UITableView`.


    Create a new file, and select the UIViewController Subclass template.


    On the next screen, enter a name for your view controller, and make sure that
    the class is listed as a subclass of `UIViewController`. Name it `MainTableViewController`.


    **NOTE:** Some may find it more convenient to create a subclass of `UITableViewController`,
    as you are immediately given a `UITableView` as well as some of the methods required
    to use it. The downside of this method is that the `UITableView` given in the
    controller''s XIB file is more difficult to configure and re-frame. For this reason,
    you are using a `UIViewController` subclass, and you will simply add in your `UITableView`,
    and its methods, yourself.


    Since you will be focusing on the idea of a table in your application, you will
    start by dragging a `UITableView` out from the library into your view. Rather
    than making the table take up the entire view, you will shrink it down a bit to
    have a 20-point padding around it. Switch to the main view, and change the background
    color to a light gray so that you can differentiate it from your `UITableView`.
    This will result in the display shown in [Figure 9–2](#Chapter09.html#fig_9_2).


    ![Image](images/9781430240051_Fig09-02.jpg)


    **Figure 9–2.** Configuring a `UITableView` in a XIB file


    Connect your `UITableView` to a property in your header file using the property
    name `tableViewCountries`.


    Next, switch over to your view controller''s header file. You will need your view
    controller to conform to a couple of protocols in order to fully implement your
    `UITableView`. Add the `UITableViewDelegate` and `UITableViewDataSource` protocols,
    so your header now looks like so:


    ```

    @interface MainTableViewController : UIViewController <UITableViewDelegate, UITableViewDataSource>

    ```


    Next, you will need a property of type `NSArray` to store the information that
    you will use to display your table''s information, called `countries`. Make sure
    to properly synthesize this array, and set its pointer equal to `nil` in your
    `-viewDidUnload` method.


    ```

    @property (strong, nonatomic) NSMutableArray *countries;

    ```


    Before you continue to implement your view controller, you need to set up your
    model to store your data.


    Create a new file as before, but choose the "Objective-C class" template. Name
    your class `Country`, and make sure that it is a subclass of `NSObject`, as in
    [Figure 9–3](#Chapter09.html#fig_9_3).


    ![Image](images/9781430240051_Fig09-03.jpg)


    **Figure 9–3.** Creating your `Country` class as a subclass of `NSObject`


    For your application, you will make your `Country` objects have four properties:
    three `NSString`s referring to a country''s name, capital city, and motto, and
    a `UIImage` that will contain the country''s flag. Define these properties in
    your `Country.h` header file like so:


    ```

    @property (nonatomic, strong) NSString *name;

    @property (nonatomic, strong) NSString *capital;

    @property (nonatomic, strong) NSString *motto;

    @property (nonatomic, strong) UIImage *flag;

    ```


    As with your view controllers, you need to synthesize all these properties in
    your implementation file. Unlike your view controllers, however, you do not need
    to set them equal to `nil` in any method, since there is no `-viewDidUnload` method.


    ```

    @synthesize name, capital, motto, flag;

    ```


    Now that your model is set up, you can return to your view controller. The compiler
    will need to be able to access the methods of the new `Country` class that you
    have just set up, so add the following import statement to the header of your
    view controller.


    ```

    #import "Country.h"

    ```


    Now, you can set up your data to be used in your `UITableView`. Before you proceed,
    make sure you have downloaded the image files for the flags that you will be using
    for the countries you add. Here, I will use those of the United States, England
    (as opposed to the UK), Scotland, France, and Spain. Here I have used some public
    domain flag images from Wikipedia, more of which are available at [`http://en.wikipedia.org/wiki/Gallery_of_country_flags`](http://en.wikipedia.org/wiki/Gallery_of_country_flags).


    **CAUTION:** Whenever you are working with images, watch carefully for any and
    all copyright issues. Public domain images, such as those used here from Wikipedia,
    are free to use and fairly easy to find.


    Once you have the files all downloaded and visible in the Finder, select and drag
    all of them into your project in Xcode under Supporting Files. A dialog will appear
    with options for adding the files to your project. Make sure that the option labeled
    "Copy items into destination group''s folder (if needed)" is checked, as in [Figure
    9–4](#Chapter09.html#fig_9_4).


    ![Image](images/9781430240051_Fig09-04.jpg)


    **Figure 9–4.** Dialog for adding files; make sure the first box is checked.


    In your `-viewDidLoad` method, you will make your testing data with the five countries
    I mentioned earlier by adding the following code:


    ```

    Country *usa = [[Country alloc] init];

    usa.name = @"United States of America";

    usa.motto = @"E Pluribus Unum";

    usa.capital = @"Washington, D.C.";

    usa.flag = [UIImage imageNamed:@"usa.png"];


    Country *france = [[Country alloc] init];

    france.name = @"French Republic";

    france.motto = @"Liberté, Égalité, Fraternité";

    france.capital = @"Paris";

    france.flag = [UIImage imageNamed:@"france.png"];


    Country *england = [[Country alloc] init];

    england.name = @"England";

    england.motto = @"Dieu et mon droit";

    england.capital = @"London";

    england.flag = [UIImage imageNamed:@"england.png"];


    Country *scotland = [[Country alloc] init];

    scotland.name = @"Scotland";

    scotland.motto = @"In My Defens God Me Defend";

    scotland.capital = @"Edinburgh";

    scotland.flag = [UIImage imageNamed:@"scotland.png"];


    Country *spain = [[Country alloc] init];

    spain.name = @"Kingdom of Spain";

    spain.motto = @"Plus Ultra";

    spain.capital = @"Madrid";

    spain.flag = [UIImage imageNamed:@"spain.png"];

    ```


    Make sure to add all these `Country` objects to your array with the following
    line:


    ```

    self.countries = [NSMutableArray arrayWithObjects:usa, france, england, scotland,
    spain, nil];

    ```


    Now that your testing data is all set up, you will focus on the construction of
    your `UITableView` through the use of its `delegate` and `data source` methods.
    Start by setting these two properties to your view controller in your `-viewDidLoad`
    with the following lines.'
