    \                  }\n}];\n```\n\n## 总结\n\nCore Location 框架是一个强大的框架，可以被许多应用功能所使用。正如本章所示，你可以确定设备的位置、设备面朝的方向，以及设备进入或离开特定区域的时间。除了这些强大的功能之外，你还可以对地理坐标执行查询，以确定人类可读的位置信息，呈现给你的最终用户，并提供补充服务来执行反向操作。\n\
