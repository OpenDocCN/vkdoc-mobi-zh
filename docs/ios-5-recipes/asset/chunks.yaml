    ## 关于作者


    ![Image](img/shawn_grimes.jpg) 2010 年，肖恩·格莱姆斯自学了`Objective-C`和 iOS 开发，并编写了他的第一个适用于
    iPad 的 iOS 应用。来自马里兰州巴尔的摩的肖恩，曾就读于马里兰州劳雷尔的国会技术学院，并于 2003 年获得软件与互联网应用学士学位。他创立了 Shawn''s
    Bits, LLC，以创建更多应用并为其他有抱负的 iOS 开发者举办研讨会。为了帮助当地开发者，他与克里斯·斯通共同运营着巴尔的摩移动开发者小组。肖恩和妻子斯蒂芬妮共同经营
    Campfire Apps, LLC，这是一家专注于儿童应用开发的移动应用公司。


    ![Image](img/colin_francis.jpg) 科林·弗朗西斯是一位来自马里兰州盖瑟斯堡的 iOS 开发者。在深入学习计算机科学后，他自学了
    iOS 开发，并与肖恩·格莱姆斯在巴尔的摩共事。如今他居住在迈阿密，独立开发 iOS 应用，专注方向为实用工具和音频软件应用。


    ## 关于技术审校


    ![Image](img/anselm_bradford.jpg) 安塞尔姆·布拉德福德是新西兰奥克兰理工大学（AUT）数字媒体专业的讲师，研究方向包括交互媒体、网络媒体和视觉传达。他与互联网相关的开发经验可以追溯到
    1996 年，当时他手工编写了他的第一个网站。在 Twitter 上可以通过`@anselmbradford`找到他，偶尔他也会在 [AnselmBradford.com](http://AnselmBradford.com)
    上写博客。


    ## 引言


    一旦你对用于 iOS 开发的`Objective-C`编程语法结构有了理解，创建应用最重要的部分就是学习如何使用 Apple 提供的各种工具和框架。为了全面开发
    iPhone 和 iPad 应用，你不仅要详细了解开发环境，还必须深入了解你能够使用的各种元素和功能。无论你的应用是用来播放音乐、拍照、打印文档还是过滤图像，本书都将指导你完成功能的设置与构建。

