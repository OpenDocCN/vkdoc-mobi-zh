  trans: '

    #### 项目设置


    现在为你的游戏代码配置好 Game Center。在 Xcode 中打开你的项目（或本章提供的项目）。


    Xcode 打开后，在项目导航器中点击你的项目名称，并选择所需的目标。转到 **Build Phases** 选项卡，展开 **Link Binaries
    With Libraries** 区域。你需要添加 Game Kit 框架，因此点击 图 16-4 中高亮显示的 `+` 按钮。


    ![Image](img/9781430240051_Fig16-04.jpg)


    **图 16-4.** *用于添加框架的 Build Phases 选项卡*


    在弹出的对话框（类似 图 16-5）中，搜索 **Game Kit** 并点击 **Add**。


    ![Image](img/9781430240051_Fig16-05.jpg)


    **图 16-5.** *向项目添加 Game Kit 框架*


    如果你的游戏在没有 Game Center 的情况下也能运行，那么你可能希望将此框架设为可选，而非必需。在这种情况下，你的框架列表将类似于 图 16-6。


    ![Image](img/9781430240051_Fig16-06.jpg)


    **图 16-6.** *将 Game Kit 框架配置为可选*


    如果你需要强制要求 Game Center，那么可以将其保留为必需，但你需要额外一步来强制要求 Game Center。打开目标的 **Info** 选项卡，将
    `gamekit` 添加到必需的设备功能列表中，如 图 16-7 所示。


    ![Image](img/9781430240051_Fig16-07.jpg)


    **图 16-7.** *添加 "gamekit" 作为必需的设备功能*


    在编辑 **Info** 选项卡时，请确保你的 Bundle Identifier 与你在 iTunes Connect 中设置的保持一致，如 图 16-8
    所示。


    ![Image](img/9781430240051_Fig16-08.jpg)


    **图 16-8.** *确认应用中的 Bundle Identifier 与 iTunes Connect 中使用的一致*


    现在，你可以通过在代码中添加语句 `#import <GameKit/GameKit.h>` 来包含 Game Center 功能。首先确认 Game Center
    在此设备上可用。


    #### 检查 Game Center 支持


    首先，创建一个检查 Game Center 支持的方法。我将把它添加到应用委托中，这样你可以在游戏中的任何时刻检查状态。首先将 Game Kit 导入实现文件（`.m`）中，并创建一个检查
    Game Center 可用性的方法：


    ```

    #import "HMAppDelegate.h"

    #import <GameKit/GameKit.h>


    @implementation HMAppDelegate

    @synthesize window = _window;


    +(BOOL) isGameCenterAvailable

    {

        // 检查 GKLocalPlayer 类是否存在

        BOOL localPlayerClassAvailable = (NSClassFromString(@"GKLocalPlayer")) !=
    nil;


        // 设备必须运行 iOS 4.1 或更高版本

        NSString *reqSysVer = @"4.1";

        NSString *currSysVer = [[UIDevice currentDevice] systemVersion];

        BOOL osVersionSupported = ([currSysVer compare:reqSysVer

                                               options:NSNumericSearch] !=

    NSOrderedAscending);


        return (localPlayerClassAvailable && osVersionSupported);

    }

    ```


    在你的接口文件（`.h`）中，为 `isGameCenterAvailable` 添加声明，以便其他类可以使用它，并且自动补全功能能够识别：


    ```

    #import <UIKit/UIKit.h>


    @interface HMAppDelegate : UIResponder <UIApplicationDelegate>


    @property (strong, nonatomic) UIWindow *window;


    +(BOOL) isGameCenterAvailable;


    @end

    ```


    #### 玩家认证


    你需要尽快完成玩家认证。最好在游戏启动完成后立即进行，因此你将向应用委托的 `didFinishLaunchingWithOptions:` 方法中添加认证逻辑。不过，首先切换到你的接口文件，并为本地玩家添加一个属性到应用委托，以便在需要时可以随时访问。


    由于你已将 `GameKit.h` 导入实现文件，因此需要告知接口文件存在一个名为 `GKLocalPlayer` 的类。你可以通过在接口文件中的 import
    语句下方添加如下代码来实现：


    `@class GKLocalPlayer;`


    然后为 `GKLocalPlayer` 添加一个属性：


    `@property(strong, nonatomic) GKLocalPlayer *localPlayer;`


    最终的应用委托接口文件如下所示：


    ```

    #import <UIKit/UIKit.h>


    @class GKLocalPlayer;


    @interface HMAppDelegate : UIResponder <UIApplicationDelegate>


    @property (strong, nonatomic) UIWindow *window;

    @property(strong, nonatomic) GKLocalPlayer *localPlayer;


    +(BOOL) isGameCenterAvailable;


    @end

    ```


    切换回实现文件并合成你的新属性：


    `@synthesize localPlayer;`


    将你的 `didFinishLaunchingWithOptions:` 方法修改为如下代码。这将认证玩家并将 `localPlayer` 属性设置为本地玩家：


    ```

    - (BOOL)application:(UIApplication *)application

    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions

    {

        // 应用启动后的自定义覆盖点

        if([HMAppDelegate isGameCenterAvailable]){

            // 如果 GameCenter 可用，让我们认证用户

            GKLocalPlayer *_localPlayer=[GKLocalPlayer localPlayer];

            [_localPlayer authenticateWithCompletionHandler:^(NSError *error) {

                if(localPlayer.isAuthenticated){

                    self.localPlayer=localPlayer;

                }

            }];

        }

        return YES;

    }

    ```


    关于此代码的一些说明：你应该始终检查 `isAuthenticated` 属性，而不是检查是否存在错误。即使出现错误，Game Kit 也可能利用缓存数据成功认证用户。你不应该向用户显示这些错误——Game
    Center 会替你做这些。错误信息主要用于调试。


    玩家认证的大致流程就是这样。当你运行应用时，它会提示你登录或创建新账户，如 图 16-9 所示。已认证的用户可以在不同应用间传递，因此如果你或用户已在其他应用中完成了
    Game Center 认证，该认证信息可以传递到你的应用，而无需再次提示登录。


    ![Image](img/9781430240051_Fig16-09.jpg)


    **图 16-9.** *你的应用提示输入 Game Center 账户*


    ### 技巧 16-2：排行榜


    现在你已经能够认证用户了。让我们开始存储一些最高分。排行榜，也即最高分列表，是提升游戏重复可玩性并鼓励朋友间竞争的绝佳方式。你首先需要在 iTunes Connect
    中创建一个排行榜，因此请访问 `itunesconnect.apple.com`。

    '
- fmt: "### Setting Up iTunes Connect\n\nClick Manage Your Applications, and then\
    \ click your app that has Game Center enabled. On the App Information page, click\
    \ Manage Game Center, highlighted in Figure 16–10.\n\n![Image](images/9781430240051_Fig16-10.jpg)\n\
    \n**Figure 16–10.** *Accessing the Manage Game Center screen*\n\nClick Setup under\
    \ the Leaderboard heading, shown in Figure 16–11.\n\n![Image](images/9781430240051_Fig16-11.jpg)\n\
    \n**Figure 16–11.** *The Game Center screen, from which you can set up a leaderboard*\n\
    \nOnce a leaderboard has gone live for an app, it cannot be deleted, so create\
    \ them with some thought. You can have up to 25 leaderboards per app. This allows\
    \ you to create multiple leaderboards for different difficulties or even one for\
    \ each level of your game, whatever makes the most sense. In your simple app,\
    \ you are going to create only one leaderboard.\n\nClick the Add Leaderboard button,\
    \ marked in Figure 16–12, to begin.\n\n![Image](images/9781430240051_Fig16-12.jpg)\n\
    \n**Figure 16–12.** *Your app's list of leaderboards to be added to*\n\nClick\
    \ the Choose button under Single Leaderboard, marked in Figure 16–13, to continue\
    \ with a stand-alone leaderboard.\n\n![Image](images/9781430240051_Fig16-13.jpg)\n\
    \n**Figure 16–13.** *Choosing leaderboard type*\n\nFill in a name for the leaderboard\
    \ and an identifier. The name is an internal name for tracking purposes and will\
    \ not be displayed to the player. (The display name is configured in the next\
    \ step when adding a language.) Now select the score format type; in this case,\
    \ I'm going to use a simple integer, but you can also use time-based, floats,\
    \ and currency. Select the sort order for your leaderboard. If you want high scores\
    \ at the top (typical), then sort \"High to Low\"; if you want your low scores\
    \ at the top (for instance in a golf game), then sort \"Low to High\".\n\nYou\
    \ will need to set up at least one language for the leaderboard. To do that, click\
    \ the Add Language button, shown in Figure 16–14.\n\n![Image](images/9781430240051_Fig16-14.jpg)\n\
    \n**Figure 16–14.** *Configuring a leaderboard*\n\nNow configure the localized\
    \ language for that score as shown in Figure 16–15. Select the language, and then\
    \ enter a display name for the leaderboard; this is the name that will be visible\
    \ to the player in the game. You can set the formatting of the score and what\
    \ unit to call them (singular and plural); in this case, they are \"point\" and\
    \ \"points.\"\n\n![Image](images/9781430240051_Fig16-15.jpg)\n\n**Figure 16–15.**\
    \ *Language display settings for a leaderboard*\n\nOnce complete, click Save and\
    \ then click Save on the leaderboards page as well.\n\nNow, let's dive into some\
    \ code.\n\n### Setting Up Your Code\n\nOpen the HangmanMP project, and go to the\
    \ `GameScene.m` file. Add the import statement at the top of the file: `#import\
    \ <GameKit/GameKit.h>`.\n\nLet's add a method to report the score under the `@synthesize`\
    \ and instance variables:\n\n```\n- (void) reportScore: (int64_t) score forCategory:\
    \ (NSString*) category\n{\n    GKScore *scoreReporter = [[GKScore alloc] initWithCategory:category];\n\
    \    scoreReporter.value = score;\n    [scoreReporter reportScoreWithCompletionHandler:^(NSError\
    \ *error) {\n\n        NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    NSUserDomainMask, YES);\n        NSString *scoreFilePath = [NSString stringWithFormat:@\"\
    %@/scores.plist\",[paths\nobjectAtIndex:0]];\n        NSMutableDictionary *scoreDictionary=[NSMutableDictionary\n\
    dictionaryWithContentsOfFile:scoreFilePath];\n\n        if (error != nil)\n  \
    \      {\n            //There was an error so we need to save the score locally\
    \ and resubmit later\n            NSLog(@\"Saving score for later\");\n      \
    \      [scoreDictionary setValue:scoreReporter forKey:[NSDate date]];\n      \
    \      [scoreDictionary writeToFile:scoreFilePath atomically:YES];\n        }\n\
    \    }];\n}\n```\n\nThis method will try to report the score, but if it fails,\
    \ it will save the score to a dictionary and write that dictionary to a file so\
    \ you can load the scores later. You can call this method anywhere that you want\
    \ to report the score to Game Center with a call similar to this:\n\n```\n[self\
    \ reportScore:playerScore forCategory:@\"default_high_scores\"];\n```\n\nYou should\
    \ also try to report any saved scores when you start the app, so switch over to\
    \ your app delegate implementation file (`.m`).\n\nAdd the following to the end\
    \ of `didFinishLaunchingWithOptions`, before the line that reads \"return YES;\"\
    .\n\n```\nNSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    NSUserDomainMask, YES);\n    NSString *scoreFilePath = [NSString stringWithFormat:@\"\
    %@/scores.plist\",[paths\nobjectAtIndex:0]];\n    NSMutableDictionary *scoreDictionary=[NSMutableDictionary\n\
    dictionaryWithContentsOfFile:scoreFilePath];\n\n    for (NSDate *dateID in [scoreDictionary\
    \ allKeys]) {\n        NSLog(@\"Reporting old score: %@\", dateID);\n        GKScore\
    \ *scoreToReport=(GKScore *)[scoreDictionary objectForKey:dateID];\n        [scoreToReport\
    \ reportScoreWithCompletionHandler:^(NSError *error) {\n            NSArray *paths\
    \ = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\nNSUserDomainMask,\
    \ YES);\n            NSString *scoreFilePath = [NSString\nstringWithFormat:@\"\
    %@/scores.plist\",[paths objectAtIndex:0]];\n            NSMutableDictionary *scoreDictionary=[NSMutableDictionary\n\
    dictionaryWithContentsOfFile:scoreFilePath];\n\n            if (error != nil)\n\
    \            {\n                //There was an error so we need to save the score\
    \ locally and resubmit\nlater\n                [scoreDictionary setValue:scoreToReport\
    \ forKey:scoreToReport.playerID];\n                [scoreDictionary writeToFile:scoreFilePath\
    \ atomically:YES];\n            }\n        }];\n\n    }\n```\n\nThis will take\
    \ a look at the old scores written to file and try to send them to Game Center.\n\
    \n### Showing High Scores\n\nHigh scores are no fun unless people see them. Your\
    \ users can see the High Scores for your game from within the Game Center app,\
    \ but you can also give them a direct link to the high scores very easily. Switch\
    \ over to `MainMenuScene.h`.\n\nYou'll want to import `GameKit.h` and also set\
    \ `MainMenuScene` as a `GKLeaderboardViewControllerDelegate`.\n\n```\n#import\
    \ <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface MainMenuScene : UIViewController\
    \ <GKLeaderboardViewControllerDelegate>\n\n@end\n```\n\nNow go to the implementation\
    \ file (`.m`), and add two new methods to the top. The first method will dismiss\
    \ the `GKLeaderboardViewController` when you click Done:\n\n```\n- (void)leaderboardViewControllerDidFinish:(GKLeaderboardViewController*)viewController\n\
    {\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\nThe other method\
    \ you need to add will show the actual `GKLeaderboardViewController` view:\n\n\
    ```\n- (void) showLeaderboard\n{\n    GKLeaderboardViewController *leaderboardController\
    \ = [[GKLeaderboardViewController\nalloc] init];\n    if (leaderboardController\
    \ != nil)\n    {\n        leaderboardController.leaderboardDelegate = self;\n\
    \        [self presentModalViewController: leaderboardController animated: YES];\n\
    \    }\n}\n```\n\nNow you can create a `UIButton` on the main menu scene and connect\
    \ it to the `showLeaderboard` method to display the leaderboards for your game.\
    \ You can create the button in the `-viewDidLoad` method:\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    UIButton *buttonShowHighScores=[UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
    \    [buttonShowHighScores addTarget:self action:@selector(showLeaderboard)\n\
    forControlEvents:UIControlEventTouchUpInside];\n    buttonShowHighScores.frame=CGRectMake(104,\
    \ 302, 112, 44);\n    [buttonShowHighScores setTitle:@\"High Scores\" forState:UIControlStateNormal];\n\
    \n    [self.view addSubview:buttonShowHighScores];\n}\n```"
