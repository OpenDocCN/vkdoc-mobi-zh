    \ are in no way limited to only requesting all of a specific entity. Through the\
    \ use of the `NSPredicate` class, you can easily refine your results to nearly\
    \ any subset depending on your application.\n\nFor your application, you will\
    \ implement your filtering behavior to be applied upon the tapping of the Accessory\
    \ button in your `UITableView`s, with different actions depending on the type\
    \ of `NSManagedObject` tapped.\n\n*   If the Accessory button is tapped in your\
    \ Teachers table, you will display another `UITableView` of all the instruments\
    \ that the selected Teacher is associated with.\n*   Tapping the accessory button\
    \ in your Students table will display a table of all other students of the same\
    \ age as the one selected.\n*   In your Instruments table, you will filter your\
    \ data to display all other Instruments with the same `family` as the selected\
    \ one.\n\nAll of these behaviors will be implemented by setting an `NSPredicate`\
    \ to your `NSFetchRequest` with the specified predicate.\n\nFirst, you will add\
    \ a property to your `MainTableViewController` to keep track of this `NSPredicate`\
    \ so that it can be easily created and used to perform fetch requests.\n\n`@property\
    \ (nonatomic, strong) NSPredicate *predicate;`\n\nYou can implement your `UITableView`’s\
    \ delegate method like so:\n\n`-(void)tableView:(UITableView *)tableView accessoryButtonTappedForRowWithIndexPath:(NSIndexPath\
    \ *)indexPath`\n```\n{\n    if (![self.title isEqualToString:@\"Filtered\"])\n\
    \    {\n        MainTableViewController *filtered = [[MainTableViewController\
    \ alloc] init];\n        filtered.title = @\"Filtered\";\n        filtered.managedObjectContext\
    \ = self.managedObjectContext;\n\n        if ([self.entityDescription.name isEqualToString:@\"\
    Teacher\"])\n        {\n            filtered.entityDescription = [NSEntityDescription\
