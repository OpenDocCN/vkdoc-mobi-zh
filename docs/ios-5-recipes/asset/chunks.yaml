    **Figure 9–5.** *Basic application with a `UITableView`*


    Now that your application is up, running, and displaying some kind of information,
    you can work on your specific implementation.


    To configure your `-tableView:cellForRowAtIndexPath:` method to properly fit your
    data, the first thing you need to do is change the display style of your rows.
    Modify the allocation/initialization line in your method to resemble the following:


    `cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle`

    `reuseIdentifier:CellIdentifier];`


    There are four different `UITableViewCell` styles that you can use, each with
    a slightly different display:


    *   `UITableViewCellStyleDefault`: Only one label, as shown in [Figure 9–5](#Chapter09.html#fig_9_5)

    *   `UITableViewCellStyleSubtitle`: Just like the Default style, but with a second
    subtitle line underneath the main text

    *   `UITableViewCellStyleValue1`: Two text lines, with the primary line on the
    left side of the cell and the secondary detail text label on the right

    *   `UITableViewCellStyleValue2`: Two text lines with the focus on the detail
    text label


    Of these four styles, only the `UITableViewCellStyleDefault` style has only one
    line of text.


    Next, you can set the cell’s text label to actually be the name of the country,
    rather than simply the count of the cell. Adjust the setting of the `cell.textLabel.text`
    property that is done last in the method to the following:


    `    cell.textLabel.text = [(Country *)[self.countries objectAtIndex:indexPath.row]`

    `name];`


    All you had to do here was grab the respective `Country` object, and call the
    `-name` method on it that was synthesized.


    You can set the subtitle of the text very similarly using the `detailTextLabel`
    property of the cell.


    `    cell.detailTextLabel.text = [(Country *)[self.countries objectAtIndex:indexPath.row]`

    `capital];`


    The `UITableViewCell` class also has a property called `imageView`, which, when
    given an image, places the given image to the left of the title label. Implement
    this by adding the following line to your cell configuration:


    `    cell.imageView.image = [(Country *)[self.countries objectAtIndex:indexPath.row]`

