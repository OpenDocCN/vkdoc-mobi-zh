    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `    [GKMatchmaker sharedMatchmaker].inviteHandler = ^(GKInvite *acceptedInvite,`

    `                                                      NSArray *playersToInvite)
