- fmt: "As you have done in your past recipes, you will connect some of your view\
    \ objects over to your header file by holding ^ (Ctrl) and dragging from the element\
    \ over to the view controller's header file. Name the `UISlider`s `sliderRate`,\
    \ `sliderPan`, and `sliderVolume` as appropriate. Your `UIButton`s will be `vibrateButton`,\
    \ `playButton`, and `pauseButton`. Your two level-monitoring `UILabel`s at the\
    \ top (which I have given default values so far of \"0.0\") will be `averageLabel`\
    \ and `peakLabel`. You will define three methods (of type `IBAction`, not `void`)\
    \ in your header file, one for each button, and connect your buttons to them by\
    \ holding ⌃ and dragging from the button to the action definition. You will also\
    \ define three more methods for your `UISlider`'s to be connected to as well.\
    \ Your header file should now look like so:\n\n```objc\n#import <UIKit/UIKit.h>\n\
    #import <AVFoundation/AVFoundation.h>\n#import <AudioToolbox/AudioToolbox.h>\n\
    \n@interface PlayerViewController : UIViewController\n@property (strong, nonatomic)\
    \ IBOutlet UIButton *vibrateButton;\n@property (strong, nonatomic) IBOutlet UIButton\
    \ *playButton;\n@property (strong, nonatomic) IBOutlet UIButton *pauseButton;\n\
    @property (strong, nonatomic) IBOutlet UISlider *sliderVolume;\n@property (strong,\
    \ nonatomic) IBOutlet UISlider *sliderPan;\n@property (strong, nonatomic) IBOutlet\
    \ UISlider *sliderRate;\n@property (strong, nonatomic) IBOutlet UILabel *averageLabel;\n\
    @property (strong, nonatomic) IBOutlet UILabel *peakLabel;\n-(IBAction)vibratePressed:(id)sender;\n\
    -(IBAction)playPressed:(id)sender;\n-(IBAction)pausePressed:(id)sender;\n\n-(IBAction)volumeSliderChanged:(UISlider\
    \ *)sender;\n-(IBAction)panSliderChanged:(UISlider *)sender;\n-(IBAction)rateSliderChanged:(UISlider\
    \ *)sender;\n\n@end\n```\n\nYou will also add a property to your header file to\
    \ keep track of your `AVAudioPlayer`, written like so:\n\n```objc\n@property (nonatomic,\
    \ strong) AVAudioPlayer *player;\n```\n\nSynthesize this new property in your\
    \ implementation file, and add the following lines to your `-viewDidUnload` method\
    \ to make sure your application is as efficient as possible in memory use.\n\n\
    ```objc\nself.player.delegate = nil;\n[self setPlayer:nil];\n```\n\nThe last step\
    \ in your header file is to make your view controller conform to the `AVAudioPlayerDelegate`\
    \ protocol.\n\n```objc\n@interface PlayerViewController : UIViewController <AVAudioPlayerDelegate>\n\
    ```\n\nBefore you proceed, you need to select and import the sound file that your\
    \ application will be playing. The file I use is called `systemCheck.mp3`, and\
    \ the following code will reflect this file name. You will need to change any\
    \ file name or file type according to the file that you choose. You should consult\
    \ Apple's documentation on which file types are appropriate, but it is fairly\
    \ safe to assume that most commonly used file types such as `.wav` or `.mp3` will\
    \ work.\n\nIn order to catch any errors in playing files, you can implement one\
    \ of the methods in the `AVAudioPlayerDelegate` protocol:\n\n```objc\n-(void)audioPlayerDecodeErrorDidOccur:(AVAudioPlayer\
    \ *)player error:(NSError *)error\n{\n    NSLog(@\"Error playing file: %@\", [error\
    \ localizedDescription]);\n}\n```\n\nFind your sound clip in the Finder, and then\
    \ click and drag the file into your project in Xcode. My preference is to put\
    \ such files in the Supporting Files group, but this is entirely optional. A dialog\
    \ will appear prompting you to choose options for adding the file. The only change\
    \ you may need to make is to make sure that the box next to \"Copy items into\
    \ destination group's folder (if needed)\" is checked, as in [Figure 7–4](#Chapter07.html#fig_7_4).\n\
    \n![Image](images/9781430240051_Fig07-04.jpg)\n\n**Figure 7–4.** *Pop-up dialog\
    \ for importing files—make sure the first box is checked.*\n\nNow that you have\
    \ your sound file, you can implement your `-viewDidLoad` method to set up your\
    \ `AVAudioPlayer`.\n\n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    NSString *fileName = @\"systemCheck\";\n    NSString *fileType = @\"mp3\"\
    ;\n    NSString *soundFilePath = [[NSBundle mainBundle] pathForResource:fileName\
    \ ofType:fileType];\n    NSURL *soundFileURL = [NSURL fileURLWithPath:soundFilePath];\n\
    \n    NSError *error;\n    self.player = [[AVAudioPlayer alloc] initWithContentsOfURL:soundFileURL\
    \ error:&error];\n    self.player.enableRate = YES; //Allows us to change the\
    \ playback rate.\n    self.player.meteringEnabled = YES; //Allows us to monitor\
    \ levels\n    self.player.delegate = self;\n    self.sliderVolume.value = self.player.volume;\n\
    \    self.sliderRate.value = self.player.rate;\n    self.sliderPan.value = self.player.pan;\n\
    \n    [self.player prepareToPlay]; //Preload audio to decrease lag\n\n    NSTimer\
    \ *timer = [NSTimer scheduledTimerWithTimeInterval:0.1 target:self\n    selector:@selector(updateLabels)\
    \ userInfo:nil repeats:YES];\n\n    [timer fire];\n}\n```\n\nAs you can see, you've\
    \ gotten the URL for your sound file, and then created your `AVAudioPlayer` with\
    \ it. You set up the `enableRate` property to allow you to change the playback\
    \ rate, and set the `meteringEnabled` property to allow you to monitor the player's\
    \ levels. You called the optional `-prepareToPlay` on your player in order to\
    \ pre-load the sound file, hopefully making your application slightly faster.\
    \ You created a timer at the end, which will perform your `-updateLabels` method\
    \ ten times a second. This way you can have your labels updating at a nearly constant\
    \ rate.\n\nLet's put in a simple implementation of the `-updateLabels` method.\n\
    \n```objc\n-(void)updateLabels\n{\n    [self.player updateMeters];\n    self.averageLabel.text\
    \ = [NSString stringWithFormat:@\"%f\", [self.player\n    averagePowerForChannel:0]];\n\
    \    self.peakLabel.text = [NSString stringWithFormat:@\"%f\", [self.player\n\
    \    peakPowerForChannel:0]];\n}\n```\n\nYou need to call `-updateMeters` anytime\
    \ that you use the `-averagePowerForChannel` or `-peakPowerForChannel` methods\
    \ in order to get the most up-to-date information, as these values do not automatically\
    \ refresh. Both methods take an `NSUInteger` argument that specifies the channel\
    \ to retrieve information for. By giving it the value of 0, you specify the left\
    \ channel for a stereo track, or the single channel for a mono track. Given that\
    \ you are dealing with only a basic use of the functionality, channel 0 is a good\
    \ default.\n\nNext, you will implement your action methods for your `UISlider`s,\
    \ which will be performed every time the slider's value is changed.\n\n```objc\n\
    -(void)volumeSliderChanged:(UISlider *)sender\n{\n    self.player.volume = sender.value;\n\
    }\n-(void)panSliderChanged:(UISlider *)sender\n{\n    self.player.pan = sender.value;\n\
    }\n-(void)rateSliderChanged:(UISlider *)sender\n{\n    self.player.rate = sender.value;\n\
    }\n```\n\nNow, you will implement your button action methods, which are also quite\
    \ simple.\n\n```objc\n-(void)vibratePressed:(id)sender\n{\n    AudioServicesPlaySystemSound(kSystemSoundID_Vibrate);\n\
    }\n-(void)playPressed:(id)sender\n{\n    [self.player play];\n}\n-(void)pausePressed:(id)sender\n\
    {\n    [self.player pause];\n}\n```\n\nThe `AudioServicesPlaySystemSound()` is\
    \ a function defined in the Audio Toolbox that plays pre-defined system sounds,\
    \ such as the one just shown, which causes the phone to vibrate. You can also\
    \ register your own sound systems with certain file types.\n\n**NOTE:** While\
    \ most of the AV Foundation functionalities that you are currently working with\
    \ will work on the simulator using your computer's microphone and speakers, the\
    \ foregoing vibrate sound will not. You will need a physical device to test this\
    \ functionality.\n\nAt this point, your app should be able to successfully play\
    \ and pause your music, and you can adjust your playback rate, pan, and volume,\
    \ and monitor your output levels."
