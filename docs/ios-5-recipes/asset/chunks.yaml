  trans: "\n与加速度计、陀螺仪和磁力计一样，你可以通过启动和停止更新来访问`CMDeviceMotion`，使用的方法非常相似：`startDeviceMotionUpdates`和`startDeviceMotionUpdatesToQueue:withHandler:`。不过，除此之外，你还有两个额外的方法允许你指定一个“参考系”：`startDeviceMotionUpdatesUsingReferenceFrame:`和`startDeviceMotionUpdatesUsingReferenceFrame:toQueue:WithHandler:`。我们稍后会介绍参考系的概念。\n\
    \n当通过`CMDeviceMotion`实例（通过`CMMotionManager`中的`deviceMotion`属性）检索数据时，你可以访问五个不同的属性。\n\
    \n1. `attitude`：该属性是`CMAttitude`类的一个实例，它能让你极其详细地了解设备在给定时间点相对于参考系的方向。在这个类中，你可以访问`roll`、`pitch`和`yaw`等属性。这些值以弧度为单位，能够让你极其精确地测量设备的方向。\n\
    2. `rotationRate`：该值以弧度/秒为单位，与之前的`rotationRate`类似，但通过减少导致静止设备产生非零旋转值的设备偏差，提供了更准确的读数。\n\
    3. `gravity`：表示设备上仅由重力引起的加速度。\n4. `userAcceleration`：表示用户施加在设备上、除去重力加速度之外的物理加速度。\n\
    5. `magneticField`：该值与之前用过的值类似；不过，它会消除任何设备偏差，从而得到比之前显著更准确的读数。\n\n**注意：** 如果你不熟悉弧度，它是与更常用的度量单位“度”不同的一种旋转测量方式。它基于圆周率π（3.14...）的值。弧度为π（约等于\
    \ 3.14）相当于 180 度旋转，因此任何弧度值都可以通过除以π再乘以 180 来转换为度。\n\n你将遍历代码，并将其更新为仅从`deviceMotion`属性获取数据。\n\
    \n现在你可以访问两个不同的基于加速度的属性，你将具体使用`gravity`属性。我已经将视图中顶部的`UILabel`从“Accelerometer”改为“Gravity”，当然，这是可选的。\n\
    \n现在，你的`toggleUpdates`方法将如下所示：\n\n```\n-(void)toggleUpdates\n{\n    if ([self.motionManager\
    \ isDeviceMotionAvailable] && ![self.motionManager isDeviceMotionActive])\n  \
    \  {\n        [self.motionManager setDeviceMotionUpdateInterval:1.0/2.0];\n  \
    \      [self.motionManager startDeviceMotionUpdatesToQueue:[NSOperationQueue mainQueue]\
    \ withHandler:^(CMDeviceMotion *motion, NSError *error)\n         {\n        \
    \    self.xAccLabel.text = [NSString stringWithFormat:@\"%f\", motion.gravity.x];\n\
    \            self.yAccLabel.text = [NSString stringWithFormat:@\"%f\", motion.gravity.y];\n\
    \            self.zAccLabel.text = [NSString stringWithFormat:@\"%f\", motion.gravity.z];\n\
    \n            self.xGyroLabel.text = [NSString stringWithFormat:@\"%f\", motion.rotationRate.x];\n\
    \            self.yGyroLabel.text = [NSString stringWithFormat:@\"%f\", motion.rotationRate.y];\n\
    \            self.zGyroLabel.text = [NSString stringWithFormat:@\"%f\", motion.rotationRate.z];\n\
    \n            self.xMagLabel.text = [NSString stringWithFormat:@\"%f\", motion.magneticField.field.x];\n\
    \            self.yMagLabel.text = [NSString stringWithFormat:@\"%f\", motion.magneticField.field.y];\n\
    \            self.zMagLabel.text = [NSString stringWithFormat:@\"%f\", motion.magneticField.field.z];\n\
    \         }];\n    }\n    else if ([self.motionManager isDeviceMotionActive])\n\
    \    {\n        [self.motionManager stopDeviceMotionUpdates];\n\n        self.xAccLabel.text\
    \ = @\"...\";\n        self.yAccLabel.text = @\"...\";\n        self.zAccLabel.text\
    \ = @\"...\";\n        self.xGyroLabel.text = @\"...\";\n        self.yGyroLabel.text\
    \ = @\"...\";\n        self.zGyroLabel.text = @\"...\";\n        self.xMagLabel.text\
    \ = @\"...\";\n        self.yMagLabel.text = @\"...\";\n        self.zMagLabel.text\
    \ = @\"...\";\n    }\n}\n```\n\n你还需要按如下方式更改你的`viewDidUnload`方法：\n\n```\n- (void)viewDidUnload\n\
    {\n    if ([self.motionManager isDeviceMotionAvailable] && [self.motionManager\
    \ isDeviceMotionActive])\n    {\n        [self.motionManager stopDeviceMotionUpdates];\n\
    \    }\n\n    self.motionManager = nil;\n    [self setXAccLabel:nil];\n    [self\
    \ setYAccLabel:nil];\n    [self setZAccLabel:nil];\n    [self setXGyroLabel:nil];\n\
    \    [self setYGyroLabel:nil];\n    [self setZGyroLabel:nil];\n    [self setStatusLabel:nil];\n\
    \    [self setXMagLabel:nil];\n    [self setYMagLabel:nil];\n    [self setZMagLabel:nil];\n\
    \    [superview DidUnload];\n}\n```\n\n在你的应用代理中，你还需要更新`applicationDidEnterBackground:`方法。\n\
    \n```\n- (void)applicationDidEnterBackground:(UIApplication *)application\n{\n\
    \    if ([self.viewController.motionManager isDeviceMotionAvailable] && [self.viewController.motionManager\
    \ isDeviceMotionActive])\n    {\n        [self.viewController.motionManager stopDeviceMotionUpdates];\n\
    \    }\n}\n```\n\n因此，如果你现在运行这个应用，可能会注意到大部分数值都稳定了不少。你可能还会看到磁力计读数全部为零。将你的设备以 8 字形运动移动，以校准磁力计，直到这些数值开始更新。\n\
    \n现在你已经切换到使用`DeviceMotion`，你还需要添加字段来显示来自`attitude`属性的`pitch`、`yaw`和`roll`值。请更新你的视图，使其类似于图\
    \ 12-9，并将你的新值`UILabel`属性命名为`rollLabel`、`pitchLabel`和`yawLabel`。\n\n![Image](img/9781430240051_Fig12-09.jpg)\n\
    \n**图 12-9.** *用于显示姿态的新界面*\n"
- fmt: "# Attitude Properties\n\nFor your use of the `CMAttitude` class, you are accessing\
    \ the three simplest values you can from the class in order to determine device\
    \ orientation.\n\n1. `roll`: Specifies position of rotation around the yaxis\n\
    2. `pitch`: Specifies position of rotation around the xaxis\n3. `yaw`: Specifies\
    \ position of rotation around the zaxis\n\nAll three of these values are measured\
    \ in radians, which means your displayed values will range from 0 to roughly either\
    \ 3.14 or -3.14 (meaning a rotation of pi radians, which is equal to 180 degrees).\n\
    \nNow you can update your `-toggleUpdates:` method again to include the new values\
    \ to be displayed.\n\n```\n-(void)toggleUpdates\n{\nif ([self.motionManager isDeviceMotionAvailable]\
    \ && ![self.motionManager isDeviceMotionActive])\n    {\n        [self.motionManager\
    \ setDeviceMotionUpdateInterval:1.0/2.0];\n        [self.motionManager startDeviceMotionUpdatesToQueue:[NSOperationQueue\
    \ mainQueue] withHandler:^(CMDeviceMotion *motion, NSError *error)\n         {\n\
    self.xAccLabel.text = [NSString stringWithFormat:@\"%f\", motion.gravity.x];\n\
    self.yAccLabel.text = [NSString stringWithFormat:@\"%f\", motion.gravity.y];\n\
    self.zAccLabel.text = [NSString stringWithFormat:@\"%f\", motion.gravity.z];\n\
    \nself.xGyroLabel.text = [NSString stringWithFormat:@\"%f\", motion.rotationRate.x];\n\
    self.yGyroLabel.text = [NSString stringWithFormat:@\"%f\", motion.rotationRate.y];\n\
    self.zGyroLabel.text = [NSString stringWithFormat:@\"%f\", motion.rotationRate.z];\n\
    \nself.xMagLabel.text = [NSString stringWithFormat:@\"%f\", motion.magneticField.field.x];\n\
    self.yMagLabel.text = [NSString stringWithFormat:@\"%f\", motion.magneticField.field.y];\n\
    self.zMagLabel.text = [NSString stringWithFormat:@\"%f\", motion.magneticField.field.z];\n\
    \n//////NEW ATTITUDE CODE\nself.rollLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.attitude.roll];\nself.pitchLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.attitude.pitch];\nself.yawLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.attitude.yaw];\n//////END OF NEW CODE\n         }];\n    }\nelse\
    \ if ([self.motionManager isDeviceMotionActive])\n    {\n        [self.motionManager\
    \ stopDeviceMotionUpdates];\n\nself.xAccLabel.text = @\"...\";\nself.yAccLabel.text\
    \ = @\"...\";\nself.zAccLabel.text = @\"...\";\nself.xGyroLabel.text = @\"...\"\
    ;\nself.yGyroLabel.text = @\"...\";\nself.zGyroLabel.text = @\"...\";\nself.xMagLabel.text\
    \ = @\"...\";\nself.yMagLabel.text = @\"...\";\nself.zMagLabel.text = @\"...\"\
    ;\n\n//////NEW ATTITUDE CODE\nself.rollLabel.text = @\"...\";\nself.pitchLabel.text\
    \ = @\"...\";\nself.yawLabel.text = @\"...\";\n//////END OF NEW CODE\n    }\n\
    }\n```\n\nThough it’s not exactly required, you will also specify a reference\
    \ frame for your `attitude`, so that you have some idea of what your device is\
    \ being compared to, using the `-startDeviceMotionUpdatesUsingReferenceFrame:toQueue:withHandler:`\
    \ method. The reference frame parameter of this method accepts four possible values\
    \ as of iOS 5.0.\n\n* `CMAttitudeReferenceFrameXArbitraryZVertical`: Specifies\
    \ a reference frame with the zaxis along the vertical and the xaxis along any\
    \ arbitrary direction; more simply, the device is flat and face-up.\n* `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical`:\
    \ This is the same as the previous value, but the magnetometer is used to provide\
    \ better accuracy. This option increases CPU usage, and also requires the magnetometer\
    \ to be both available and calibrated.\n* `CMAttitudeReferenceFrameXMagneticNorthZVertical`:\
    \ This reference frame has the zaxis vertical as before, but with the xaxis directed\
    \ toward “magnetic north.” This option requires the magnetometer to be available\
    \ and calibrated, which means you will probably have to wave your device around\
    \ a bit before you can get any readings in your application.\n* `CMAttitudeReferenceFrameXTrueNorthZVertical`:\
    \ This reference frame is just like the previous, but the xaxis is directed toward\
    \ “true north,” rather than “magnetic north.” The location of the device must\
    \ be available in order for the device to be able to calculate the difference\
    \ between the two.\n\n**NOTE:** When dealing with the magnetometer, you must be\
    \ sure to understand the difference between “magnetic north” and “true north.\
    \ ”Magnetic north is the magnetic north pole of the Earth, which is where any\
    \ compass will point. This point, however, is not constant due to changes in the\
    \ Earth’s core, moving more than 30 miles per year. True north refers to the direction\
    \ toward the actual north pole of the Earth, which stays constant.\n\nYou will\
    \ choose the third option, `CMAttitudeReferenceFrameXMagneticNorthZVertical`,\
    \ for your application. Change your call to the `-startDeviceMotionUpdatesToQueue:withHandler:`\
    \ method to the following:\n\n```\n[self.motionManager startDeviceMotionUpdatesUsingReferenceFrame:CMAttitudeReferenceFrameXMagneticNorthZVertical\
    \ toQueue:[NSOperationQueue mainQueue] withHandler:^(CMDeviceMotion *motion, NSError\
    \ *error)\n         {\nself.xAccLabel.text = [NSString stringWithFormat:@\"%f\"\
    , motion.gravity.x];\nself.yAccLabel.text = [NSString stringWithFormat:@\"%f\"\
    , motion.gravity.y];\nself.zAccLabel.text = [NSString stringWithFormat:@\"%f\"\
    , motion.gravity.z];\n\nself.xGyroLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.rotationRate.x];\nself.yGyroLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.rotationRate.y];\nself.zGyroLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.rotationRate.z];\n\nself.xMagLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.magneticField.field.x];\nself.yMagLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.magneticField.field.y];\nself.zMagLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.magneticField.field.z];\n\nself.rollLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.attitude.roll];\nself.pitchLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.attitude.pitch];\nself.yawLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.attitude.yaw];\n         }];\n```\n\nNow, when you run your application,\
    \ you may start off seeing “0.0” for all your values. If you move your device\
    \ around in a figure-eight motion to get your magnetometer calibrated, they should\
    \ start updating soon enough. You should notice now that if you lay your device\
    \ on a flat surface and then turn the device around the z axis, then at the moment\
    \ that your x axis is aligned with the Earth’s magnetic field, your `yaw` value\
    \ should get very close to zero, as in [Figure 12–10](#Chapter12.html#fig_12_10).\n\
    \n![Image](images/9781430240051_Fig12-10.jpg)\n\n**Figure 12–10.** *Your application\
    \ receiving calibrated device information*"
  raw: '#### Attitude Properties


    For your use of the `CMAttitude` class, you are accessing the three simplest values
    you can from the class in order to determine device orientation.


    1.  `roll`: Specifies position of rotation around the yaxis

    2.  `pitch`: Specifies position of rotation around the xaxis

    3.  `yaw`: Specifies position of rotation around the zaxis


    All three of these values are measured in radians, which means your displayed
    values will range from 0 to roughly either 3.14 or -3.14 (meaning a rotation ofpi
    radians, which is equal to 180 degrees).


    Now you can update your `-toggleUpdates:` method again to include the new values
    to be displayed.


    `-(void)toggleUpdates`

    `{`

    `if ([self.motionManager isDeviceMotionAvailable] && ![self.motionManager isDeviceMotionActive])`

    `    {`

    `        [self.motionManager setDeviceMotionUpdateInterval:1.0/2.0];`

    `        [self.motionManager startDeviceMotionUpdatesToQueue:[NSOperationQueue
    mainQueue] withHandler:^(CMDeviceMotion *motion, NSError *error)`

    `         {`

    `self.xAccLabel.text = [NSString stringWithFormat:@"%f", motion.gravity.x];`

    `self.yAccLabel.text = [NSString stringWithFormat:@"%f", motion.gravity.y];`

    `self.zAccLabel.text = [NSString stringWithFormat:@"%f", motion.gravity.z];`


    `self.xGyroLabel.text = [NSString stringWithFormat:@"%f", motion.rotationRate.x];`

    `self.yGyroLabel.text = [NSString stringWithFormat:@"%f", motion.rotationRate.y];`

    `self.zGyroLabel.text = [NSString stringWithFormat:@"%f", motion.rotationRate.z];`


    `self.xMagLabel.text = [NSString stringWithFormat:@"%f", motion.magneticField.field.x];`

    `self.yMagLabel.text = [NSString stringWithFormat:@"%f", motion.magneticField.field.y];`

    `self.zMagLabel.text = [NSString stringWithFormat:@"%f", motion.magneticField.field.z];`


    `//////NEW ATTITUDE CODE`

    `self.rollLabel.text = [NSString stringWithFormat:@"%f", motion.attitude.roll];`

    `self.pitchLabel.text = [NSString stringWithFormat:@"%f", motion.attitude.pitch];`

    `self.yawLabel.text = [NSString stringWithFormat:@"%f", motion.attitude.yaw];`

    `//////END OF NEW CODE`

    `         }];`

    `    }`

    `else if ([self.motionManager isDeviceMotionActive])`

    `    {`

    `        [self.motionManager stopDeviceMotionUpdates];`


    `self.xAccLabel.text = @"...";`

    `self.yAccLabel.text = @"...";`

    `self.zAccLabel.text = @"...";`

    `self.xGyroLabel.text = @"...";`

    `self.yGyroLabel.text = @"...";`

    `self.zGyroLabel.text = @"...";`

    `self.xMagLabel.text = @"...";`

    `self.yMagLabel.text = @"...";`

    `self.zMagLabel.text = @"...";`


    `//////NEW ATTITUDE CODE`

    `self.rollLabel.text = @"...";`

    `self.pitchLabel.text = @"...";`

    `self.yawLabel.text = @"...";`

    `//////END OF NEW CODE`

    `    }`

    `}`


    Though it’s not exactly required, you will also specify a reference frame for
    your `attitude`, so that you have some idea of what your device is being compared
    to, using the `-startDeviceMotionUpdatesUsingReferenceFrame:toQueue:withHandler:`
    method. The reference frame parameter of this method accepts four possible values
    as of iOS 5.0.


    *   `CMAttitudeReferenceFrameXArbitraryZVertical`: Specifies a reference frame
    with the zaxis along the vertical and the xaxis along any arbitrary direction;
    more simply, the device is flat and face-up.

    *   `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical`: This is the same as
    the previous value, but the magnetometer is used to provide better accuracy. This
    option increases CPU usage, and also requires the magnetometer to be both available
    and calibrated.

    *   `CMAttitudeReferenceFrameXMagneticNorthZVertical`: This reference frame has
    the zaxis vertical as before, but with the xaxis directed toward “magnetic north.”
    This option requires the magnetometer to be available and calibrated, which means
    you will probably have to wave your device around a bit before you can get any
    readings in your application.

    *   `CMAttitudeReferenceFrameXTrueNorthZVertical`:This reference frame is just
    like the previous, but the xaxis is directed toward “true north,” rather than
    “magnetic north.” The location of the device must be available in order for the
    device to be able to calculate the difference between the two.


    **NOTE:** When dealing with the magnetometer, you must be sure to understand the
    difference between “magnetic north” and “true north. ”Magnetic north is the magnetic
    north pole of the Earth, which is where any compass will point. This point, however,
    is not constant due to changes in the Earth’s core, moving more than 30 miles
    per year. True north refers to the direction toward the actual north pole of the
    Earth, which stays constant.


    You will choose the third option, `CMAttitudeReferenceFrameXMagneticNorthZVertical`,
    for your application. Change your call to the -


    `startDeviceMotionUpdatesToQueue:withHandler:` method to the following:


    `[self.motionManager startDeviceMotionUpdatesUsingReferenceFrame:CMAttitudeReferenceFrameXMagneticNorthZVertical
    toQueue:[NSOperationQueue mainQueue] withHandler:^(CMDeviceMotion *motion, NSError
    *error)`

    `         {`

    `self.xAccLabel.text = [NSString stringWithFormat:@"%f", motion.gravity.x];`

    `self.yAccLabel.text = [NSString stringWithFormat:@"%f", motion.gravity.y];`

    `self.zAccLabel.text = [NSString stringWithFormat:@"%f", motion.gravity.z];`


    `self.xGyroLabel.text = [NSString stringWithFormat:@"%f", motion.rotationRate.x];`

    `self.yGyroLabel.text = [NSString stringWithFormat:@"%f", motion.rotationRate.y];`

    `self.zGyroLabel.text = [NSString stringWithFormat:@"%f", motion.rotationRate.z];`


    `self.xMagLabel.text = [NSString stringWithFormat:@"%f", motion.magneticField.field.x];`

    `self.yMagLabel.text = [NSString stringWithFormat:@"%f", motion.magneticField.field.y];`

    `self.zMagLabel.text = [NSString stringWithFormat:@"%f", motion.magneticField.field.z];`


    `self.rollLabel.text = [NSString stringWithFormat:@"%f", motion.attitude.roll];`

    `self.pitchLabel.text = [NSString stringWithFormat:@"%f", motion.attitude.pitch];`

    `self.yawLabel.text = [NSString stringWithFormat:@"%f", motion.attitude.yaw];`

    `         }];`


    Now, when you run your application, you may start off seeing “0.0” for all your
    values. If you move your device around in a figure-eight motion to get your magnetometer
    calibrated, they should start updating soon enough. You should notice now that
    if you lay your device on a flat surface and then turn the device around the z
    axis, then at the moment that your x axis is aligned with the Earth’s magnetic
    field, your `yaw` value should get very close to zero, as in [Figure 12–10](#Chapter12.html#fig_12_10).


    ![Image](images/9781430240051_Fig12-10.jpg)


    **Figure 12–10.** *Your application receiving calibrated device information*'
  trans: "\n# 姿态属性\n\n在使用 `CMAttitude` 类时，你可以从中获取三个最简单的值来判断设备方向。\n\n1. `roll`：表示绕\
    \ y 轴旋转的位置\n2. `pitch`：表示绕 x 轴旋转的位置\n3. `yaw`：表示绕 z 轴旋转的位置\n\n这三个值均以弧度为单位测量，这意味着你显示的值范围将从\
    \ 0 到大约 3.14 或 -3.14（即 π 弧度的旋转，相当于 180 度）。\n\n现在你可以再次更新 `-toggleUpdates:` 方法，将新的显示值包含进来。\n\
    \n```\n-(void)toggleUpdates\n{\nif ([self.motionManager isDeviceMotionAvailable]\
    \ && ![self.motionManager isDeviceMotionActive])\n    {\n        [self.motionManager\
    \ setDeviceMotionUpdateInterval:1.0/2.0];\n        [self.motionManager startDeviceMotionUpdatesToQueue:[NSOperationQueue\
    \ mainQueue] withHandler:^(CMDeviceMotion *motion, NSError *error)\n         {\n\
    self.xAccLabel.text = [NSString stringWithFormat:@\"%f\", motion.gravity.x];\n\
    self.yAccLabel.text = [NSString stringWithFormat:@\"%f\", motion.gravity.y];\n\
    self.zAccLabel.text = [NSString stringWithFormat:@\"%f\", motion.gravity.z];\n\
    \nself.xGyroLabel.text = [NSString stringWithFormat:@\"%f\", motion.rotationRate.x];\n\
    self.yGyroLabel.text = [NSString stringWithFormat:@\"%f\", motion.rotationRate.y];\n\
    self.zGyroLabel.text = [NSString stringWithFormat:@\"%f\", motion.rotationRate.z];\n\
    \nself.xMagLabel.text = [NSString stringWithFormat:@\"%f\", motion.magneticField.field.x];\n\
    self.yMagLabel.text = [NSString stringWithFormat:@\"%f\", motion.magneticField.field.y];\n\
    self.zMagLabel.text = [NSString stringWithFormat:@\"%f\", motion.magneticField.field.z];\n\
    \n//////新的姿态代码\nself.rollLabel.text = [NSString stringWithFormat:@\"%f\", motion.attitude.roll];\n\
    self.pitchLabel.text = [NSString stringWithFormat:@\"%f\", motion.attitude.pitch];\n\
    self.yawLabel.text = [NSString stringWithFormat:@\"%f\", motion.attitude.yaw];\n\
    //////新代码结束\n         }];\n    }\nelse if ([self.motionManager isDeviceMotionActive])\n\
    \    {\n        [self.motionManager stopDeviceMotionUpdates];\n\nself.xAccLabel.text\
    \ = @\"...\";\nself.yAccLabel.text = @\"...\";\nself.zAccLabel.text = @\"...\"\
    ;\nself.xGyroLabel.text = @\"...\";\nself.yGyroLabel.text = @\"...\";\nself.zGyroLabel.text\
    \ = @\"...\";\nself.xMagLabel.text = @\"...\";\nself.yMagLabel.text = @\"...\"\
    ;\nself.zMagLabel.text = @\"...\";\n\n//////新的姿态代码\nself.rollLabel.text = @\"\
    ...\";\nself.pitchLabel.text = @\"...\";\nself.yawLabel.text = @\"...\";\n//////新代码结束\n\
    \    }\n}\n```\n\n虽然不是必须的，但你最好还是为你的 `attitude` 指定一个参考坐标系，以便了解设备与什么进行比较。可以使用 `-startDeviceMotionUpdatesUsingReferenceFrame:toQueue:withHandler:`\
    \ 方法来实现。从 iOS 5.0 开始，该方法的参考坐标系参数接受四个可选值。\n\n* `CMAttitudeReferenceFrameXArbitraryZVertical`：指定一个参考坐标系，其\
    \ z 轴沿垂直方向，x 轴沿任意方向；更简单地说，设备平放且屏幕朝上。\n* `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical`：与上一个值相同，但使用了磁力计来提供更好的精度。该选项会增加\
    \ CPU 使用率，并且要求磁力计可用且已校准。\n* `CMAttitudeReferenceFrameXMagneticNorthZVertical`：该参考坐标系的\
    \ z 轴仍然垂直，但 x 轴指向“磁北”方向。此选项要求磁力计可用且已校准，这意味着在应用程序中获取读数之前，你可能需要拿着设备画八字形晃动。\n* `CMAttitudeReferenceFrameXTrueNorthZVertical`：该参考坐标系与上一个类似，但\
    \ x 轴指向“真北”方向，而非“磁北”。设备必须能够获取自身位置，才能计算两者之间的差异。\n\n**注意：** 在使用磁力计时，务必理解“磁北”和“真北”的区别。磁北是地球的磁北极，是指南针所指的方向。然而，由于地核的变化，这个点并非固定不变，每年会移动超过\
    \ 30 英里。真北指的是指向地球实际北极的方向，这个方向是固定不变的。\n\n在应用程序中，你将选择第三个选项 `CMAttitudeReferenceFrameXMagneticNorthZVertical`。将对\
    \ `-startDeviceMotionUpdatesToQueue:withHandler:` 方法的调用修改为以下内容：\n\n```\n[self.motionManager\
    \ startDeviceMotionUpdatesUsingReferenceFrame:CMAttitudeReferenceFrameXMagneticNorthZVertical\
    \ toQueue:[NSOperationQueue mainQueue] withHandler:^(CMDeviceMotion *motion, NSError\
    \ *error)\n         {\nself.xAccLabel.text = [NSString stringWithFormat:@\"%f\"\
    , motion.gravity.x];\nself.yAccLabel.text = [NSString stringWithFormat:@\"%f\"\
    , motion.gravity.y];\nself.zAccLabel.text = [NSString stringWithFormat:@\"%f\"\
    , motion.gravity.z];\n\nself.xGyroLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.rotationRate.x];\nself.yGyroLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.rotationRate.y];\nself.zGyroLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.rotationRate.z];\n\nself.xMagLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.magneticField.field.x];\nself.yMagLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.magneticField.field.y];\nself.zMagLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.magneticField.field.z];\n\nself.rollLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.attitude.roll];\nself.pitchLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.attitude.pitch];\nself.yawLabel.text = [NSString stringWithFormat:@\"\
    %f\", motion.attitude.yaw];\n         }];\n```\n\n现在运行应用程序时，你可能会看到所有值都显示为“0.0”。如果你以画八字形的方式移动设备来校准磁力计，这些值应该会很快开始更新。你应该会注意到，如果你将设备平放在一个水平面上，然后绕\
    \ z 轴旋转设备，当 x 轴与地球磁场对齐时，你的 `yaw` 值应非常接近零，如图 12–10 所示。\n\n![图片](img/9781430240051_Fig12-10.jpg)\n\
    \n**图 12–10.** *你的应用程序正在接收校准后的设备信息*\n"
- fmt: "### Recipe 12–3: Moving a `UILabel` with the Accelerometer\n\nNow that we\
    \ have gone especially into detail on exactly how to access all of the data the\
    \ Core Motion can provide, you can create a simple implementation to actually\
    \ demonstrate its use beyond accessing values. You will simply modify your existing\
    \ application, so be sure to save a new copy of your project before you continue.\n\
    \nYou will be changing your application to utilize the `gravity` property that\
    \ you previously accessed in order to move a `UILabel` around your view. To do\
    \ this, you will require a very small update interval for your device motion information,\
    \ so you want to minimize the actual amount of data you display. You will remove\
    \ all but the `statusLabel` from your view, so that your user interface will look\
    \ like [Figure 12–11](#Chapter12.html#fig_12_11). I have changed the `UILabel`\
    \ as well to match the instructions for your new functionality.\n\nWhen you remove\
    \ all the other `UILabel`s from your view, you can leave your properties all set\
    \ up in your header file from your previous recipe if you want. While it takes\
    \ up a small amount of memory to still have them here, this will be fairly insignificant\
    \ for your purposes.\n\n![Image](images/9781430240051_Fig12-11.jpg)\n\n**Figure\
    \ 12–11.** *Your re-simplified user interface for moving a `UILabel`*\n\nNext,\
    \ you can delete (or comment out) your line from your `–toggleUpdates` method\
    \ that resembles the following, which sets your update interval for your `CMMotionManager`.\n\
    \n`[self.motionManager setDeviceMotionUpdateInterval:1.0/2.0];`\n\nIf you choose\
    \ not to set an update interval, the device will default to an incredibly small\
    \ value, meaning that your information will update very frequently.\n\nYou will\
    \ also change your attitude’s reference frame to one that does not require any\
    \ calibration of the magnetometer so as to improve performance speed. Specifically,\
    \ you will use the `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical` value.\n\
    \nFinally, you can add in your code to retrieve the gravity values, and then adjust\
    \ your `UILabel`’s frame based on them. Overall, your `–toggleUpdates` method\
    \ will look like so:\n\n```\n-(void)toggleUpdates\n{\n    if ([self.motionManager\
    \ isDeviceMotionAvailable] && ![self.motionManager isDeviceMotionActive])\n  \
    \  {\n        [self.motionManager setDeviceMotionUpdateInterval:1.0/2.0];\n  \
    \      [self.motionManager startDeviceMotionUpdatesUsingReferenceFrame:CMAttitudeReferenceFrameXArbitraryCorrectedZVertical\
    \ toQueue:[NSOperationQueue mainQueue] withHandler:^(CMDeviceMotion *motion, NSError\
    \ *error)\n         {\n            int scale = 5.0;\n            CGRect labelRect\
    \ = self.statusLabel.frame;\n            labelRect.origin.x += motion.gravity.x\
    \ * scale;\n            if (!CGRectContainsRect(self.view.bounds, labelRect))\n\
    \            {\n                labelRect.origin.x = self.statusLabel.frame.origin.x;\n\
    \            }\n            labelRect.origin.y -= motion.gravity.y *scale;\n \
    \           if (!CGRectContainsRect(self.view.bounds, labelRect))\n          \
    \  {\n                labelRect.origin.y = self.statusLabel.frame.origin.y;\n\
    \            }\n            [self.statusLabel setFrame:labelRect];\n         }];\n\
    \    }\n    else if ([self.motionManager isDeviceMotionActive])\n    {\n     \
    \   [self.motionManager stopDeviceMotionUpdates];\n    }\n}\n```\n\nYou can also\
    \ update your `-shakeDetected:` method to make more sense with your text:\n\n\
    ```\n-(void)shakeDetected:(NSNotification *)paramNotification\n{\n    if ([self.statusLabel.text\
    \ isEqualToString:@\"Unlocked\"])\n    {\n        self.statusLabel.text = @\"\
    Locked\";\n        [self toggleUpdates];\n    }\n    else\n    {\n        self.statusLabel.text\
    \ = @\"Unlocked\";\n        [self toggleUpdates];\n    }\n}\n```\n\nIf your application\
    \ was not linked to the CoreGraphics framework by default, you will run into a\
    \ linker error, so make sure that this is done before running your app. To do\
    \ this, the procedure is the same as the one you did earlier with the CoreMotion\
    \ framework, but you do not need to use any actual `#import` statements.\n\nNow,\
    \ your newest application should give you a nice little `UILabel` that you can\
    \ move around by tilting the device, a screenshot of which is shown in [Figure\
    \ 12–12](#Chapter12.html#fig_12_12).\n\n![Image](images/9781430240051_Fig12-12.jpg)\n\
    \n**Figure 12–12.** *Your application with a `UILabel` moving based on the orientation\
    \ of the device*\n\n### Summary\n\nWe have gone into pretty specific detail about\
    \ accessing the multiple different values and information that the Core Motion\
    \ framework has to offer. We were able to go from raw data to more calibrated,\
    \ functional values that we were then able to translate into a mildly useful (if\
    \ not slightly entertaining) application. Core Motion, however, is not a framework\
    \ that can simply be an entire application in itself. You can use it to acquire\
    \ values about your device, but you must then have the creativity to put them\
    \ to use. From a simple application to measure the rotation speed of a person\
    \ flipping, to incorporating the magnetometer into an augmented-reality application,\
    \ Core Motion provides a basic framework for accessing information, which can\
    \ then translate into some of the most powerful pieces of software in iOS.\n\n\
    ## Chapter 13\n\n## Data Transmission Recipes\n\nAs time has progressed and technology\
    \ has developed, one of the clearest trends to be noticed is the growth in user-driven\
    \ content. With the improvement of design technologies, Internet connection speeds,\
    \ and network availability, the amount of data generated electronically per year\
    \ has increased at a nearly unbelievable rate. The heart of this matter is based\
    \ around the idea of allowing users to easily take in and re-distribute information.\
    \ You can incorporate these same concepts into your development through a variety\
    \ of built-in classes in order to improve the functionality and usefulness of\
    \ your applications.\n\nIn this chapter, you will need only a physical device\
    \ to implement texting functionality, which you will build in your first recipe.\
    \ All your other functionalities will be able to be simulated."
  raw: '### Recipe 12–3: Moving a UILabel with the Accelerometer


    Now that we have gone especially into detail on exactly how to access all of the
    data the Core Motion can provide, you can create a simple implementation to actually
    demonstrate its use beyond accessing values. You will simply modify your existing
    application, so be sure to save a new copy of your project before you continue.


    You will be changing your application to utilize the `gravity` property that you
    previously accessed in order to move a `UILabel` around your view. To do this,
    you will require a very small update interval for your device motion information,
    so you want to minimize the actual amount of data you display. You will remove
    all but the `statusLabel` from your view, so that your user interface will look
    like [Figure 12–11](#Chapter12.html#fig_12_11). I have changed the `UILabel` as
    well to match the instructions for your new functionality.


    When you remove all the other `UILabel`s from your view, you can leave your properties
    all set up in your header file from your previous recipe if you want. While it
    takes up a small amount of memory to still have them here, this will be fairly
    insignificant for your purposes.


    ![Image](images/9781430240051_Fig12-11.jpg)


    **Figure 12–11.** *Your re-simplified user interface for moving a `UILabel`*


    Next, you can delete (or comment out) your line from your `–toggleUpdates` method
    that resembles the following, which sets your update interval for your `CMMotionManager`.


    `[self.motionManager setDeviceMotionUpdateInterval:1.0/2.0];`


    If you choose not to set an update interval, the device will default to an incredibly
    small value, meaning that your information will update very frequently.


    You will also change your attitude’s reference frame to one that does not require
    any calibration of the magnetometer so as to improve performance speed. Specifically,
    you will use the `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical` value.


    Finally, you can add in your code to retrieve the gravity values, and then adjust
    your `UILabel`’s frame based on them. Overall, your `–toggleUpdates` method will
    look like so:


    `-(void)toggleUpdates`

    `{`

    `if ([self.motionManager isDeviceMotionAvailable] && ![self.motionManager isDeviceMotionActive])`

    `    {`

    `        [self.motionManager setDeviceMotionUpdateInterval:1.0/2.0];`

    `        [self.motionManager startDeviceMotionUpdatesUsingReferenceFrame:CMAttitudeReferenceFrameXArbitraryCorrectedZVertical
    toQueue:[NSOperationQueue mainQueue] withHandler:^(CMDeviceMotion *motion, NSError
    *error)`

    `         {`

    `int scale = 5.0;`

    `CGRect labelRect = self.statusLabel.frame;`

    `             labelRect.origin.x += motion.gravity.x * scale;`

    `if (!CGRectContainsRect(self.view.bounds, labelRect))`

    `             {`

    `                 labelRect.origin.x = self.statusLabel.frame.origin.x;`

    `             }`

    `             labelRect.origin.y -= motion.gravity.y *scale;`

    `if (!CGRectContainsRect(self.view.bounds, labelRect))`

    `             {`

    `                 labelRect.origin.y = self.statusLabel.frame.origin.y;`

    `             }`

    `             [self.statusLabel setFrame:labelRect];`

    `         }];`

    `    }`

    `else if ([self.motionManager isDeviceMotionActive])`

    `    {`

    `        [self.motionManager stopDeviceMotionUpdates];`

    `    }`

    `}`


    You can also update your `-shakeDetected:` method to make more sense with your
    text:


    `-(void)shakeDetected:(NSNotification *)paramNotification`

    `{`

    `if ([self.statusLabel.text isEqualToString:@"Unlocked"])`

    `    {`

    `self.statusLabel.text = @"Locked";`

    `        [self toggleUpdates];`

    `    }`

    `else`

    `    {`

    `self.statusLabel.text = @"Unlocked";`

    `        [self toggleUpdates];`

    `    }`

    `}`


    If your application was not linked to the CoreGraphics framework by default, you
    will run into a linker error, so make sure that this is done before running your
    app. To do this, the procedure is the same as the one you did earlier with the
    CoreMotion framework, but you do not need to use any actual `#import` statements.


    Now, your newest application should give you a nice little `UILabel` that you
    can move around by tilting the device, a screenshot of which is shown in [Figure
    12–12](#Chapter12.html#fig_12_12).


    ![Image](images/9781430240051_Fig12-12.jpg)


    **Figure 12–12.** *Your application with a `UILabel` moving based on the orientation
    of the device*


    ### Summary


    We have gone into pretty specific detail about accessing the multiple different
    values and information that the Core Motion framework has to offer. We were able
    to go from raw data to more calibrated, functional values that we were then able
    to translate into a mildly useful (if not slightly entertaining) application.
    Core Motion, however, is not a framework that can simply be an entire application
    in itself. You can use it to acquire values about your device, but you must then
    have the creativity to put them to use. From a simple application to measure the
    rotation speed of a person flipping, to incorporating the magnetometer into an
    augmented-reality application, Core Motion provides a basic framework for accessing
    information, which can then translate into some of the most powerful pieces of
    software in iOS.


    ## Chapter 13


    ## Data Transmission Recipes


    As time has progressed and technology has developed, one of the clearest trends
    to be noticed is the growth in user-driven content. With the improvement of design
    technologies, Internet connection speeds, and network availability, the amount
    of data generated electronically per year has increased at a nearly unbelievable
    rate. The heart of this matter is based around the idea of allowing users to easily
    take in and re-distribute information. You can incorporate these same concepts
    into your development through a variety of built-in classes in order to improve
    the functionality and usefulness of your applications.


    In this chapter, you will need only a physical device to implement texting functionality,
    which you will build in your first recipe. All your other functionalities will
    be able to be simulated.'
  trans: "\n### 食谱 12–3：使用加速计移动 `UILabel`\n\n既然我们已经详细探讨了如何访问 Core Motion 提供的所有数据，那么你可以创建一个简单的实现，来实际演示其超越单纯数值访问的用途。你将直接修改现有应用，因此在继续之前，请务必保存一份项目的新副本。\n\
    \n你将修改应用，利用之前访问过的 `gravity` 属性，在视图中移动一个 `UILabel`。为此，你需要为设备运动信息设置一个非常小的更新间隔，因此需要尽量减少实际显示的数据量。你将移除视图中除\
    \ `statusLabel` 之外的所有内容，这样你的用户界面将如图 12–11 所示。为了匹配新功能的说明，我也修改了 `UILabel`。\n\n当你从视图中移除所有其他\
    \ `UILabel` 时，如果你愿意，可以保留上一食谱中在头文件中设置的所有属性。虽然保留它们会占用少量内存，但这对于你的目的来说微不足道。\n\n![Image](img/9781430240051_Fig12-11.jpg)\n\
    \n**图 12–11.** *用于移动 `UILabel` 的重新简化的用户界面*\n\n接下来，你可以删除（或注释掉）`–toggleUpdates`\
    \ 方法中类似于下面这行设置 `CMMotionManager` 更新间隔的代码。\n\n`[self.motionManager setDeviceMotionUpdateInterval:1.0/2.0];`\n\
    \n如果你选择不设置更新间隔，设备将默认为一个极小的值，这意味着你的信息将更新得非常频繁。\n\n你还需要将姿态的参考系改为不需要磁力计校准的值，以提高性能速度。具体来说，你将使用\
    \ `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical` 值。\n\n最后，你可以添加代码来获取重力值，然后基于这些值调整你的\
    \ `UILabel` 的框架。总体而言，你的 `–toggleUpdates` 方法将如下所示：\n\n```\n-(void)toggleUpdates\n\
    {\n    if ([self.motionManager isDeviceMotionAvailable] && ![self.motionManager\
    \ isDeviceMotionActive])\n    {\n        [self.motionManager setDeviceMotionUpdateInterval:1.0/2.0];\n\
    \        [self.motionManager startDeviceMotionUpdatesUsingReferenceFrame:CMAttitudeReferenceFrameXArbitraryCorrectedZVertical\
    \ toQueue:[NSOperationQueue mainQueue] withHandler:^(CMDeviceMotion *motion, NSError\
    \ *error)\n         {\n            int scale = 5.0;\n            CGRect labelRect\
    \ = self.statusLabel.frame;\n            labelRect.origin.x += motion.gravity.x\
    \ * scale;\n            if (!CGRectContainsRect(self.view.bounds, labelRect))\n\
    \            {\n                labelRect.origin.x = self.statusLabel.frame.origin.x;\n\
    \            }\n            labelRect.origin.y -= motion.gravity.y *scale;\n \
    \           if (!CGRectContainsRect(self.view.bounds, labelRect))\n          \
    \  {\n                labelRect.origin.y = self.statusLabel.frame.origin.y;\n\
    \            }\n            [self.statusLabel setFrame:labelRect];\n         }];\n\
    \    }\n    else if ([self.motionManager isDeviceMotionActive])\n    {\n     \
    \   [self.motionManager stopDeviceMotionUpdates];\n    }\n}\n```\n\n你还可以更新 `-shakeDetected:`\
    \ 方法，使其文本更有意义：\n\n```\n-(void)shakeDetected:(NSNotification *)paramNotification\n\
    {\n    if ([self.statusLabel.text isEqualToString:@\"Unlocked\"])\n    {\n   \
    \     self.statusLabel.text = @\"Locked\";\n        [self toggleUpdates];\n  \
    \  }\n    else\n    {\n        self.statusLabel.text = @\"Unlocked\";\n      \
    \  [self toggleUpdates];\n    }\n}\n```\n\n如果你的应用默认没有链接到 CoreGraphics 框架，你将会遇到链接器错误，因此请确保在运行应用之前完成此操作。操作步骤与你之前为\
    \ CoreMotion 框架所做的相同，但你不需要使用任何实际的 `#import` 语句。\n\n现在，你的最新应用应该会提供一个不错的小 `UILabel`，你可以通过倾斜设备来移动它，其截图如图\
    \ 12–12 所示。\n\n![Image](img/9781430240051_Fig12-12.jpg)\n\n**图 12–12.** *你的应用中根据设备方向移动的\
    \ `UILabel`*\n\n### 总结\n\n我们非常详细地探讨了如何访问 Core Motion 框架提供的多种不同数值和信息。我们从原始数据入手，逐步获取到经过校准的函数值，并将这些值转化为一个有点用处（尽管可能略带娱乐性）的应用。然而，Core\
    \ Motion 并非一个可以独立构成完整应用的框架。你可以用它来获取设备的数据，但必须发挥创造力来加以利用。从测量人体旋转速度的简单应用，到将磁力计集成到增强现实应用中，Core\
    \ Motion 提供了一个用于访问信息的基本框架，而这些信息可以转化为 iOS 中最强大的软件组件。\n\n## 第 13 章\n\n## 数据传输食谱\n\
    \n随着时间推移和技术发展，最明显的趋势之一就是用户生成内容的增长。由于设计技术、互联网连接速度和网络可用性的提升，每年产生的电子数据量以近乎难以置信的速度增长。这一问题的核心在于让用户能够轻松地接收并重新分发信息。你可以通过多种内置类将同样的概念融入开发中，以提升应用的功能和实用性。\n\
    \n在本章中，你将仅需一台实体设备来实现短信功能，这将在你的第一个食谱中构建。所有其他功能都可以进行模拟。\n"
- fmt: "# Recipe 13–1: Composing Text Messages\n\nText messaging is quite easily one\
    \ of the currently most incredibly popular methods of transmitting data between\
    \ individuals. It’s quick, easy, and powerful, and is used across nearly all age\
    \ groups. In iOS you can actually incorporate text messaging into your applications\
    \ in order to easily provide your users with the simple cross-application functionality\
    \ that can so easily improve the overall quality of an application.\n\nStart off\
    \ by creating a new project called `\"SendItOut\"`, which you will use throughout\
    \ this chapter, with a class prefix `\"Main\"`. Select the Single View Application\
    \ template to create a simple project, as in Figure 13–1.\n\n![Image](images/9781430240051_Fig13-01.jpg)\n\
    \n**Figure 13–1.** *Creating a single view application*\n\nIn order to fully demonstrate\
    \ a few of the functionalities of this topic, you will specifically choose to\
    \ develop your application for the iPad, rather than the iPhone. Make sure the\
    \ Device Family is set accordingly in the next screen after entering the project's\
    \ name. Since some of the functionalities you will test require a physical device\
    \ to be fully capable, you can make this application for the iPhone as well, and\
    \ simply adjust the view elements as you wish. Configure your project with the\
    \ name `\"SendItOut\"`, class prefix `\"Main\"`, and make sure the Use Automatic\
    \ Reference Counting box is checked, as in Figure 13–2.\n\n![Image](images/9781430240051_Fig13-02.jpg)\n\
    \n**Figure 13–2.** *Configuring your project settings*\n\nAfter clicking through\
    \ to create your project, switch over to your view controller's XIB file. In the\
    \ utilities pane, set the orientation (under the Simulated Metrics section) to\
    \ landscape, and make sure that the background color is set to gray.\n\nYou will\
    \ start off by adding a `UITextView`, with the default Lorem Ipsum text, to the\
    \ top half of your view, as well as a `UIButton`, with the label `\"Text Message\"\
    `, to the bottom. Connect these to your view controller with property names `textViewInput`\
    \ and `textButton`, and connect the button to an `IBAction`, `-textPressed:`.\n\
    \nBefore you proceed, you will go ahead and round the corners of your `UITextView`\
    \ to improve your application's visual quality. Add the following import statement\
    \ to your view controller's header file.\n\n```\n#import <QuartzCore/QuartzCore.h>\n\
    ```\n\nNext add the following line to the end of your `-viewDidLoad` method.\n\
    \n```\nself.textViewInput.layer.cornerRadius = 15.0;\n```\n\nYour view should\
    \ now resemble that simulated in Figure 13–3 once you rotate your simulator. This\
    \ can be done through either the `\"Rotate Left\"` (![Image](images/U003.jpg)+left)\
    \ or `\"Rotate Right\"` (![Image](images/U003.jpg)+right) commands found in the\
    \ Hardware menu of the iOS simulator.\n\n![Image](images/9781430240051_Fig13-03.jpg)\n\
    \n**Figure 13–3.** *A simulated view of your user interface*\n\nNext, you will\
    \ configure your view controller as the delegate for your `UITextView`. Add the\
    \ following line to your `-viewDidLoad` method.\n\n```\nself.textViewInput.delegate\
    \ = self;\n```\n\nNext, you will add the MessageUI framework to your project.\
    \ Do this under the Build Phases tab of your project as usual, and add the required\
    \ import statement to your view controller's header file.\n\n```\n#import <MessageUI/MessageUI.h>\n\
    ```\n\nYou need to instruct your view controller to conform to certain protocols.\
    \ Adjust your header file so that the `UITextViewDelegate`, `MFMessageComposeViewControllerDelegate`,\
    \ and `UINavigationControllerDelegate` are all conformed to.\n\nAt this point,\
    \ your fully set-up header file will now read like so:\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <QuartzCore/QuartzCore.h>\n#import <MessageUI/MessageUI.h>\n\n@interface\
    \ MainViewController : UIViewController <UITextViewDelegate, MFMessageComposeViewControllerDelegate,\
    \ UINavigationControllerDelegate>\n\n@property (strong, nonatomic) IBOutlet UITextView\
    \ *textViewInput;\n@property (strong, nonatomic) IBOutlet UIButton *textButton;\n\
    -(IBAction)textPressed:(id)sender;\n\n@end\n```\n\nNow you will implement one\
    \ of your `UITextView`'s delegate methods in order to ensure that your keyboard\
    \ is properly dismissed when the user taps the Enter key.\n\n```\n- (BOOL)textView:(UITextView\
    \ *)textView shouldChangeTextInRange:(NSRange)range\n replacementText:(NSString\
    \ *)text\n{\n    if ([text isEqualToString:@\"\\n\"])\n    {\n        [textView\
    \ resignFirstResponder];\n        return FALSE;\n    }\n    return TRUE;\n}\n\
    ```\n\nNow you can implement your `-textPressed:` method such that the text of\
    \ your `UITextView` is transposed into a text message. You will simply set the\
    \ recipient to a fake number.\n\n```\n-(void)textPressed:(id)sender\n{\n    if\
    \ ([MFMessageComposeViewController canSendText])\n    {\n        MFMessageComposeViewController\
    \ *messageVC = [[MFMessageComposeViewController alloc] init];\n        messageVC.messageComposeDelegate\
    \ = self;\n        messageVC.recipients = [NSArray arrayWithObject:@\"3015555309\"\
    ];\n        messageVC.body = self.textViewInput.text;\n        [self presentModalViewController:messageVC\
    \ animated:YES];\n    }\n    else\n    {\n        NSLog(@\"Error, Text Messaging\
    \ Unavailable\");\n    }\n}\n```\n\nThe implementation of this method should appear\
    \ fairly straightforward. After using the `+canSendText` method to check for texting\
    \ availability, you created an instance of the `MFMessageComposeViewController`\
    \ class, and then configured it with your fake recipient, as well as the intended\
    \ text. Finally, you simply present the controller modally to allow your user\
    \ to review the text message before sending it.\n\nThe `MFMessageComposeViewController`\
    \ and its counterpart you will encounter later, the `MFMailComposeViewController`,\
    \ are both classes that allow you to set their initial conditions and present\
    \ them, but they do not allow you any control of the class once it has been shown.\
    \ This is to ensure that the user has the final say in whether a message or mail\
    \ sends, rather than any application sending it without informing the user.\n\n\
    You can implement your `MFMessageComposeViewController`'s `messageComposeDelegate`\
    \ method to handle the completion of the message like so:\n\n```\n-(void)messageComposeViewController:(MFMessageComposeViewController\
    \ *)controller didFinishWithResult:(MessageComposeResult)result\n{\n    if (result\
    \ == MessageComposeResultSent)\n    {\n        self.textViewInput.text = @\"Message\
    \ sent.\";\n    }\n    else if (result == MessageComposeResultFailed)\n    {\n\
    \        NSLog(@\"Message Failed to Send!\");\n    }\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\nAlong with the two possible values of `MessageComposeResults` demonstrated\
    \ in the previous code, there is a third result, `MessageComposeResultCancelled`,\
    \ which indicates that the user cancelled the sending of the text message.\n\n\
    A new functionality in iOS 5.0 is the ability to receive notifications about the\
    \ changing of the availability of text messaging. You can register for such notifications\
    \ by adding the following line to the `-viewDidLoad` method:\n\n```\n[[NSNotificationCenter\
    \ defaultCenter] addObserver:self\n                                         selector:@selector(availabilityChange:)\n\
    \                                             name:@\"MFMessageComposeViewControllerTextMessageAvailabilityDidChangeNotification\"\
    \n                                           object:nil];\n```\n\nThe selector\
    \ specified here can easily be defined to simply inform you of the change. In\
    \ a full application, you might likely make use of a `UIAlert` to notify the user\
    \ of this change as well, but you will avoid this process for demonstration purposes.\n\
    \n```\n-(void)availabilityChange:(id)sender\n{\n    if ([MFMessageComposeViewController\
    \ canSendText])\n    {\n        NSLog(@\"Text Messaging Available\");\n    }\n\
    \    else\n    {\n        NSLog(@\"Text Messaging Unavailable\");\n    }\n}\n\
    ```"
  raw: '### Recipe 13–1: Composing Text Messages


    Text messaging is quite easily one of the currently most incredibly popular methods
    of transmitting data between individuals. It’s quick, easy, and powerful, and
    is used across nearly all age groups. In iOS you can actually incorporate text
    messaging into your applications in order to easily provide your users with the
    simple cross-application functionality that can so easily improve the overall
    quality of an application.


    Start off by creating a new project called “SendItOut”, which you will use throughout
    this chapter, with a class prefix “Main”. Select the Single View Application template
    to create a simple project, as in [Figure 13–1](#Chapter13.html#fig_13_1).


    ![Image](images/9781430240051_Fig13-01.jpg)


    **Figure 13–1.** *Creating a single view application*


    In order to fully demonstrate a few of the functionalities of this topic, you
    will specifically choose to develop your application for the iPad, rather than
    the iPhone. Make sure the Device Family is set accordingly in the next screen
    after entering the project''s name. Since some of the functionalities you will
    test require a physical device to be fully capable, you can make this application
    for the iPhone as well, and simply adjust the view elements as you wish. Configure
    your project with the name “SendItOut”, class prefix “Main”, and make sure the
    Use Automatic Reference Counting box is checked, as in [Figure 13–2](#Chapter13.html#fig_13_2).


    ![Image](images/9781430240051_Fig13-02.jpg)


    **Figure 13–2.** *Configuring your project settings*


    After clicking through to create your project, switch over to your view controller''s
    XIB file. In the utilities pane, set the orientation (under the Simulated Metrics
    section) to landscape, and make sure that the background color is set to gray.


    You will start off by adding a `UITextView`, with the default Lorem Ipsum text,
    to the top half of your view, as well as a `UIButton`, with the label “Text Message”,
    to the bottom. Connect these to your view controller with property names `textViewInput`
    and `textButton`, and connect the button to an `IBAction`,`-textPressed:`.


    Before you proceed, you will go ahead and round the corners of your `UITextView`
    to improve your application''s visual quality. Add the following import statement
    to your view controller''s header file.


    `#import <QuartzCore/QuartzCore.h>`


    Next add the following line to the end of your `-viewDidLoad` method.


    `self.textViewInput.layer.cornerRadius = 15.0;`


    Your view should now resemble that simulated in [Figure 13–3](#Chapter13.html#fig_13_3)
    once you rotate your simulator. This can be done through either the “Rotate Left”
    (![Image](images/U003.jpg)+left) or “Rotate Right” (![Image](images/U003.jpg)+right)
    commands found in the Hardware menu of the iOS simulator.


    ![Image](images/9781430240051_Fig13-03.jpg)


    **Figure 13–3.** *A simulated view of your user interface*


    Next, you will configure your view controller as the delegate for your `UITextView`.
    Add the following line to your `-viewDidLoad` method.


    `self.textViewInput.delegate = self;`


    Next, you will add the MessageUI framework to your project. Do this under the
    Build Phases tab of your project as usual, and add the required import statement
    to your view controller''s header file.


    `#import <MessageUI/MessageUI.h>`


    You need to instruct your view controller to conform to certain protocols. Adjust
    your header file so that the `UITextViewDelegate`, `MFMessageComposeViewControllerDelegate`,
    and `UINavigationControllerDelegate` are all conformed to.


    At this point, your fully set-up header file will now read like so:


    `#import <UIKit/UIKit.h>`

    `#import <QuartzCore/QuartzCore.h>`

    `#import <MessageUI/MessageUI.h>`


    `@interface MainViewController : UIViewController <UITextViewDelegate, MFMessageComposeViewControllerDelegate,
    UINavigationControllerDelegate>`


    `@property (strong, nonatomic) IBOutlet UITextView *textViewInput;`

    `@property (strong, nonatomic) IBOutlet UIButton *textButton;`

    `-(IBAction)textPressed:(id)sender;`


    `@end`


    Now you will implement one of your `UITextView`''s delegate methods in order to
    ensure that your keyboard is properly dismissed when the user taps the Enter key.


    `- (BOOL)textView:(UITextView *)textView shouldChangeTextInRange:(NSRange)range`

    ` replacementText:(NSString *)text`

    `{`

    `if ([text isEqualToString:@"\n"])`

    `    {`

    `        [textView resignFirstResponder];`

    `return FALSE;`

    `    }`

    `return TRUE;`

    `}`


    Now you can implement your `-textPressed:` method such that the text of your `UITextView`
    is transposed into a text message. You will simply set the recipient to a fake
    number.


    `-(void)textPressed:(id)sender`

    `{`

    `if ([MFMessageComposeViewController canSendText])`

    `    {`

    `MFMessageComposeViewController *messageVC = [[MFMessageComposeViewController
    alloc] init];`

    `        messageVC.messageComposeDelegate = self;`

    `        messageVC.recipients = [NSArray arrayWithObject:@"3015555309"];`

    `        messageVC.body = self.textViewInput.text;`

    `        [self presentModalViewController:messageVC animated:YES];`

    `    }`

    `else`

    `    {`

    `NSLog(@"Error, Text Messaging Unavailable");`

    `    }`

    `}`


    The implementation of this method should appear fairly straightforward. After
    using the `+canSendText` method to check for texting availability, you created
    an instance of the `MFMessageComposeViewController` class, and then configured
    it with your fake recipient, as well as the intended text. Finally, you simply
    present the controller modally to allow your user to review the text message before
    sending it.


    The `MFMessageComposeViewController` andits counterpart you will encounter later,
    the `MFMailComposeViewController`, are both classes that allow you to set their
    initial conditions and present them, but they do not allow you any control of
    the class once it has been shown. This is to ensure that the user has the final
    say in whether a message or mail sends, rather than any application sending it
    without informing the user.


    You can implement your `MFMessageComposeViewController`''s `messageComposeDelegate`
    method to handle the completion of the message like so:


    `-(void)messageComposeViewController:(MFMessageComposeViewController *)controller
    didFinishWithResult:(MessageComposeResult)result`

    `{`

    `if (result == MessageComposeResultSent)`

    `    {`

    `self.textViewInput.text = @"Message sent.";`

    `    }`

    `else if (result == MessageComposeResultFailed)`

    `    {`

    `NSLog(@"Message Failed to Send!");`

    `    }`

    `    [self dismissModalViewControllerAnimated:YES];`

    `}`


    Along with the two possible values of `MessageComposeResults` demonstrated in
    the previous code, there is a third result,`MessageComposeResultCancelled`, which
    indicates that the user cancelled the sending of the text message.


    A new functionality in iOS 5.0 is the ability to receive notifications about the
    changing of the availability of text messaging. You can register for such notifications
    by adding the following line to the `-viewDidLoad` method:


    `[[NSNotificationCenter defaultCenter] addObserver:self`

    `selector:@selector(availabilityChange:)`

    `name:@"MFMessageComposeViewControllerTextMessageAvailabilityDidChangeNotification"`

    `object:nil];`


    The selector specified here can easily be defined to simply inform you of the
    change. In a full application, you might likely make use of a `UIAlert` to notify
    the user of this change as well, but you will avoid this process for demonstration
    purposes.


    `-(void)availabilityChange:(id)sender`

    `{`

    `if ([MFMessageComposeViewController canSendText])`

    `    {`

    `NSLog(@"Text Messaging Available");`

    `    }`

    `else`

    `    {`

    `NSLog(@"Text Messaging Unavailable");`

    `    }`

    `}`'
  trans: "\n# 配方 13-1：撰写短信\n\n短信是目前个人间传输数据最为流行的方式之一，它快速、简便且强大，几乎覆盖所有年龄段的人群。在 iOS 中，你可以将短信功能整合到自己的应用中，轻松为用户提供跨应用的简单功能，从而显著提升应用的整体质量。\n\
    \n首先，创建一个名为`\"SendItOut\"`的新项目（本章将全程使用此项目），类前缀设为`\"Main\"`。选择\"单视图应用\"模板来创建简单项目，如图\
    \ 13-1 所示。\n\n![图](img/9781430240051_Fig13-01.jpg)\n\n**图 13-1.** *创建单视图应用*\n\n\
    为了充分演示本主题的部分功能，你将专门为 iPad 而非 iPhone 开发应用。在输入项目名称后的下一个界面中，确保\"设备家族\"已相应设置。由于部分测试功能需要物理设备才能完全实现，你也可以将此应用设为\
    \ iPhone 版本，只需根据需求调整视图元素即可。将项目配置为名称`\"SendItOut\"`、类前缀`\"Main\"`，并确保勾选\"使用自动引用计数\"\
    复选框，如图 13-2 所示。\n\n![图](img/9781430240051_Fig13-02.jpg)\n\n**图 13-2.** *配置项目设置*\n\
    \n点击创建项目后，切换到视图控制器的 XIB 文件。在工具面板中，将方向（位于\"模拟指标\"部分）设置为横向，并确保背景色设为灰色。\n\n首先，在视图上半部分添加一个`UITextView`（使用默认的\
    \ Lorem Ipsum 文本），并在下半部分添加一个标有`\"Text Message\"`的`UIButton`。将这些控件连接到视图控制器，分别使用属性名称`textViewInput`和`textButton`，并将按钮连接到`IBAction`方法`-textPressed:`。\n\
    \n在继续之前，我们先为`UITextView`的边角添加圆角效果，以提升应用的视觉质量。在视图控制器的头文件中添加以下导入语句：\n\n```\n#import\
    \ <QuartzCore/QuartzCore.h>\n```\n\n然后在`-viewDidLoad`方法的末尾添加以下代码行：\n\n```\nself.textViewInput.layer.cornerRadius\
    \ = 15.0;\n}\n\n旋转模拟器后，你的视图应如图 13-3 所示。可通过 iOS 模拟器\"硬件\"菜单中的\"向左旋转\"（![图](img/U003.jpg)+左箭头）或\"\
    向右旋转\"（![图](img/U003.jpg)+右箭头）命令完成此操作。\n\n![图](img/9781430240051_Fig13-03.jpg)\n\
    \n**图 13-3.** *用户界面的模拟视图*\n\n接下来，将视图控制器配置为`UITextView`的委托。在`-viewDidLoad`方法中添加以下代码行：\n\
    \n```\nself.textViewInput.delegate = self;\n```\n\n然后，向项目添加 MessageUI 框架。像往常一样在项目的\"\
    构建阶段\"标签下完成此操作，并在视图控制器的头文件中添加所需的导入语句：\n\n```\n#import <MessageUI/MessageUI.h>\n\
    ```\n\n你需要指示视图控制器遵循特定协议。调整头文件，使其同时遵循`UITextViewDelegate`、`MFMessageComposeViewControllerDelegate`和`UINavigationControllerDelegate`协议。\n\
    \n此时，完整设置后的头文件内容如下：\n\n```\n#import <UIKit/UIKit.h>\n#import <QuartzCore/QuartzCore.h>\n\
    #import <MessageUI/MessageUI.h>\n\n@interface MainViewController : UIViewController\
    \ <UITextViewDelegate, MFMessageComposeViewControllerDelegate, UINavigationControllerDelegate>\n\
    \n@property (strong, nonatomic) IBOutlet UITextView *textViewInput;\n@property\
    \ (strong, nonatomic) IBOutlet UIButton *textButton;\n-(IBAction)textPressed:(id)sender;\n\
    \n@end\n```\n\n现在，你将实现`UITextView`的一个委托方法，以确保用户在点击回车键时键盘能正确收起。\n\n```\n- (BOOL)textView:(UITextView\
    \ *)textView shouldChangeTextInRange:(NSRange)range\n replacementText:(NSString\
    \ *)text\n{\n    if ([text isEqualToString:@\"\\n\"])\n    {\n        [textView\
    \ resignFirstResponder];\n        return FALSE;\n    }\n    return TRUE;\n}\n\
    ```\n\n接下来，实现`-textPressed:`方法，将`UITextView`中的文本转为短信内容。只需将收件人设置为一个虚拟号码即可。\n\n\
    ```\n-(void)textPressed:(id)sender\n{\n    if ([MFMessageComposeViewController\
    \ canSendText])\n    {\n        MFMessageComposeViewController *messageVC = [[MFMessageComposeViewController\
    \ alloc] init];\n        messageVC.messageComposeDelegate = self;\n        messageVC.recipients\
    \ = [NSArray arrayWithObject:@\"3015555309\"];\n        messageVC.body = self.textViewInput.text;\n\
    \        [self presentModalViewController:messageVC animated:YES];\n    }\n  \
    \  else\n    {\n        NSLog(@\"错误，短信功能不可用\");\n    }\n}\n```\n\n此方法的实现相当直观。在使用`+canSendText`方法检查短信可用性后，创建了一个`MFMessageComposeViewController`类的实例，并配置了虚拟收件人以及要发送的文本。最后，以模态方式呈现该控制器，让用户在发送前检查短信内容。\n\
    \n`MFMessageComposeViewController`及其后文会提到的对应类`MFMailComposeViewController`，都允许你设置初始条件并呈现它们，但一旦显示后，你便无法控制该类。这是为了确保用户对短信或邮件的发送拥有最终决定权，而不是应用在未告知用户的情况下擅自发送。\n\
    \n你可以实现`MFMessageComposeViewController`的`messageComposeDelegate`方法来处理短信发送完成后的操作，示例如下：\n\
    \n```\n-(void)messageComposeViewController:(MFMessageComposeViewController *)controller\
    \ didFinishWithResult:(MessageComposeResult)result\n{\n    if (result == MessageComposeResultSent)\n\
    \    {\n        self.textViewInput.text = @\"短信已发送。\";\n    }\n    else if (result\
    \ == MessageComposeResultFailed)\n    {\n        NSLog(@\"短信发送失败！\");\n    }\n\
    \    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n除了上述代码中演示的两种`MessageComposeResults`值外，还有第三种结果：`MessageComposeResultCancelled`，表示用户取消了短信发送。\n\
    \niOS 5.0 新增的一项功能是接收有关短信可用性变化的通知。你可以通过在`-viewDidLoad`方法中添加以下代码行来注册此类通知：\n\n```\n\
    [[NSNotificationCenter defaultCenter] addObserver:self\n                     \
    \                    selector:@selector(availabilityChange:)\n               \
    \                              name:@\"MFMessageComposeViewControllerTextMessageAvailabilityDidChangeNotification\"\
    \n                                           object:nil];\n```\n\n此处指定的选择器可以轻松定义为仅通知你变化情况。在完整应用中，你可能还会使用`UIAlert`来通知用户这一变化，但出于演示目的，此处将省略此过程。\n\
    \n```\n-(void)availabilityChange:(id)sender\n{\n    if ([MFMessageComposeViewController\
    \ canSendText])\n    {\n        NSLog(@\"短信功能可用\");\n    }\n    else\n    {\n\
    \        NSLog(@\"短信功能不可用\");\n    }\n}\n```\n"
- fmt: "Your application can now copy the body of your `UITextView` into a text message\
    \ to be sent off to your fake recipient! If you test this, however, keep in mind\
    \ that the text messaging functionality will not be available on the iOS simulator.\
    \ You will have to test this on your physical device with 3G capabilities. To\
    \ test this application as it is exactly, you will need a 3G-capable iPad, but\
    \ you could edit the project to work for an iPhone instead.\n\n## Recipe 13–2:\
    \ Composing E-mail\n\nJust as you were able to create and configure text messages\
    \ to be sent from your application, you can also use the `MessageUI` framework\
    \ that you dealt with in the previous recipe to configure mail messages using\
    \ the counterpart to the `MFMessageComposeViewController` class, which is known\
    \ as `MFMailComposeViewController`.\n\nBuilding upon your set-up application,\
    \ you will add another button with the label “Mail”. Use the property name `mailButton`,\
    \ and assign it an action called `-mailPressed:`.\n\nThe setup for your `-mailPressed:`\
    \ method is very similar to your previous `-textPressed:` method. You will create\
    \ your composing view controller, configure it, and then present it.\n\n```\n\
    -(void)mailPressed:(id)sender\n{\n    if ([MFMailComposeViewController canSendMail])\n\
    \    {\n        MFMailComposeViewController *mailVC = [[MFMailComposeViewController\
    \ alloc] init];\n        [mailVC setSubject:@\"SendItOut\"];\n        [mailVC\
    \ setToRecipients:[NSArray arrayWithObject:@\"test@example.com\"]];\n        [mailVC\
    \ setMessageBody:self.textViewInput.text isHTML:NO];\n        mailVC.mailComposeDelegate\
    \ = self;\n        [self presentModalViewController:mailVC animated:YES];\n  \
    \  }\n    else\n    {\n        NSLog(@\"Error: Mail Unavailable\");\n    }\n}\n\
    ```\n\nAs you can see, the `MFMailComposeViewController` has a few extra properties\
    \ compared to the `MFMessageComposeViewController` to specifically configure a\
    \ more complex e-mail.\n\nSince you set your `mailComposeDelegate` property to\
    \ your view controller, you will need to specify that it will conform to the `MFMailComposeViewControllerDelegate`\
    \ protocol, in addition to those already specified, so go ahead and add this to\
    \ your header file.\n\nThe `MFMailComposeViewControllerDelegate` protocol defines\
    \ only one method, which you are required to implement in order to properly handle\
    \ the completed use of the view controller by the user. You will give this a simple\
    \ implementation to log the result.\n\n```\n-(void)mailComposeController:(MFMailComposeViewController\
    \ *)controller\ndidFinishWithResult:(MFMailComposeResult)result error:(NSError\
    \ *)error\n{\n    if (result == MFMailComposeResultSent)\n        NSLog(@\"Mail\
    \ Successfully Sent\");\n    else if (result == MFMailComposeResultCancelled)\n\
    \        NSLog(@\"Mail Cancelled\");\n    else if (result == MFMailComposeResultFailed)\n\
    \        NSLog(@\"Error, Mail Send Failed\");\n    else if (result == MFMailComposeResultSaved)\n\
    \        NSLog(@\"Mail Saved\");\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\nNow, your new application will be able to present a view controller\
    \ for sending mail, as shown in [Figure 13–4](#Chapter13.html#fig_13_4). Unlike\
    \ the `MFMessageViewController`, however, you can actually test this functionality\
    \ in the iOS simulator.\n\n![Image](images/9781430240051_Fig13-04.jpg)\n\n**Figure\
    \ 13–4.** *Your application composing an e-mail*\n\nQuite conveniently, you can\
    \ easily test all the functionalities of the `MFMailComposeViewController` using\
    \ the simulator without any fear of sending out multiple e-mails to any addresses,\
    \ real or fake. The simulator will not actually send out your test messages over\
    \ the Internet, so you can easily test your `mailComposeDelegate` method's handling\
    \ of the `MailComposeResults`.\n\nOne additional issue that you may have to deal\
    \ with when making use of the `MFMailComposeViewController` occurs if you allow\
    \ the making of the recipients to be based on user input. It is highly possible\
    \ that a user may incorrectly format a mail address. This will not cause your\
    \ application to throw an exception, though it may cause your recipient to simply\
    \ be ignored by the `MFMailComposeViewController`. You can either format your\
    \ user input to attempt to avoid this, or you can simply set up a regular expression\
    \ to verify if the given address fits the required format."
  raw: 'Your application can now copy the body of your `UITextView` into a text message
    to be sent off to your fake recipient! If you test this, however, keep in mind
    that the text messaging functionality will not be available on the iOS simulator.
    You will have to test this on your physical device with 3G capabilities. To test
    this application as it is exactly, you will need a 3G-capable iPad, but you could
    edit the project to work for an iPhone instead.


    Recipe 13–2: Composing E-mail


    Just as you were able to create and configure text messages to be sent from your
    application, you can also use the MessageUI framework that you dealt with in the
    previous recipe to configure mail messages using the counterpart to the `MFMessageComposeViewController`
    class, which is known as `MFMailComposeViewController`.


    Building upon your set-up application, you will add another button with the label
    “Mail”. Use the property name `mailButton`, and assign it an action called `-mailPressed:`.


    The setup for your `-mailPressed:` method is very similar to your previous `-textPressed:`
    method. You will create your composing view controller, configure it, and then
    present it.


    `-(void)mailPressed:(id)sender`

    `{`

    `if ([MFMailComposeViewController canSendMail])`

    `    {`

    `MFMailComposeViewController *mailVC = [[MFMailComposeViewController alloc] init];`

    `        [mailVC setSubject:@"SendItOut"];`

    `        [mailVC setToRecipients:[NSArray arrayWithObject:@"test@example.com"]];`

    `        [mailVC setMessageBody:self.textViewInput.text isHTML:NO];`

    `        mailVC.mailComposeDelegate = self;`

    `        [self presentModalViewController:mailVC animated:YES];`

    `    }`

    `else`

    `    {`

    `NSLog(@"Error: Mail Unavailable");`

    `    }`

    `}`


    As you can see, the `MFMailComposeViewController` has a few extra properties compared
    to the `MFMessageComposeViewController` to specifically configure a more complex
    e-mail.


    Since you set your `mailComposeDelegate` property to your view controller, you
    will need to specify that it will conform to the `MFMailComposeViewControllerDelegate`
    protocol, in addition to those already specified, so go ahead and add this to
    your header file.


    The `MFMailComposeViewControllerDelegate` protocol defines only one method, which
    you are required to implement in order to properly handle the completed use of
    the view controller by the user. You will give this a simple implementation to
    log the result.


    `-(void)mailComposeController:(MFMailComposeViewController *)controller`

    `didFinishWithResult:(MFMailComposeResult)result error:(NSError *)error`

    `{`

    `if (result == MFMailComposeResultSent)`

    `NSLog(@"Mail Successfully Sent");`

    `else if (result == MFMailComposeResultCancelled)`

    `NSLog(@"Mail Cancelled");`

    `else if (result == MFMailComposeResultFailed)`

    `NSLog(@"Error, Mail Send Failed");`

    `else if (result == MFMailComposeResultSaved)`

    `NSLog(@"Mail Saved");`

    `    [self dismissModalViewControllerAnimated:YES];`

    `}`


    Now, your new application will be able to present a view controller for sending
    mail, as shown in [Figure 13–4](#Chapter13.html#fig_13_4). Unlike the `MFMessageViewController`,
    however, you can actually test this functionality in the iOS simulator.


    ![Image](images/9781430240051_Fig13-04.jpg)


    **Figure 13–4.** *Your application composing an e-mail*


    Quite conveniently, you can easily test all the functionalities of the `MFMailComposeViewController`
    using the simulator without any fear of sending out multiple e-mails to any addresses,
    real or fake. The simulator will not actually send out your test messages over
    the Internet, so you can easily test your `mailComposeDelegate` method''s handling
    of the `MailComposeResults`.


    One additional issue that you may have to deal with when making use of the `MFMailComposeViewController`
    occurs if you allow the making of the recipients to be based on userinput. It
    is highly possible that a user may incorrectly format a mail address. This will
    not cause your application to throw an exception, though it may cause your recipient
    to simply be ignored by the `MFMailComposeViewController`. You can either format
    your user input to attempt to avoid this, or you can simply set up a regular expression
    to verify if the given address fits the required format.'
  trans: "\n现在，你的应用程序可以将 `UITextView` 的正文复制到短信中，发送给你的模拟收件人！但如果你测试这一功能时，请记住 iOS 模拟器无法使用短信功能。你需要在支持\
    \ 3G 的真实设备上进行测试。要像这样精确测试该应用，你需要一台支持 3G 的 iPad，不过你也可以修改项目，使其转而适用于 iPhone。\n\n##\
    \ 秘籍 13–2：编写电子邮件\n\n就像你能够创建并配置从应用中发送的短信一样，你也可以使用上一秘籍中处理过的 `MessageUI` 框架，通过 `MFMessageComposeViewController`\
    \ 类的对应类——`MFMailComposeViewController`——来配置邮件消息。\n\n在现有应用的基础上，你将添加一个标签为“Mail”（邮件）的按钮。使用属性名称\
    \ `mailButton`，并为其分配一个名为 `-mailPressed:` 的动作。\n\n你的 `-mailPressed:` 方法的设置与之前的\
    \ `-textPressed:` 方法非常相似。你将创建撰写视图控制器，配置它，然后呈现它。\n\n```\n-(void)mailPressed:(id)sender\n\
    {\n    if ([MFMailComposeViewController canSendMail])\n    {\n        MFMailComposeViewController\
    \ *mailVC = [[MFMailComposeViewController alloc] init];\n        [mailVC setSubject:@\"\
    SendItOut\"];\n        [mailVC setToRecipients:[NSArray arrayWithObject:@\"test@example.com\"\
    ]];\n        [mailVC setMessageBody:self.textViewInput.text isHTML:NO];\n    \
    \    mailVC.mailComposeDelegate = self;\n        [self presentModalViewController:mailVC\
    \ animated:YES];\n    }\n    else\n    {\n        NSLog(@\"Error: Mail Unavailable\"\
    );\n    }\n}\n```\n\n如你所见，与 `MFMessageComposeViewController` 相比，`MFMailComposeViewController`\
    \ 拥有更多属性，用于专门配置更复杂的电子邮件。\n\n由于你将 `mailComposeDelegate` 属性设置为了你的视图控制器，你需要指定它除了已经遵循的协议之外，还需遵循\
    \ `MFMailComposeViewControllerDelegate` 协议，因此请将其添加到你的头文件中。\n\n`MFMailComposeViewControllerDelegate`\
    \ 协议只定义了一个方法，你需要实现它，以便正确处理用户完成视图控制器使用后的操作。你将为其提供一个简单的实现来记录结果。\n\n```\n-(void)mailComposeController:(MFMailComposeViewController\
    \ *)controller\ndidFinishWithResult:(MFMailComposeResult)result error:(NSError\
    \ *)error\n{\n    if (result == MFMailComposeResultSent)\n        NSLog(@\"Mail\
    \ Successfully Sent\");\n    else if (result == MFMailComposeResultCancelled)\n\
    \        NSLog(@\"Mail Cancelled\");\n    else if (result == MFMailComposeResultFailed)\n\
    \        NSLog(@\"Error, Mail Send Failed\");\n    else if (result == MFMailComposeResultSaved)\n\
    \        NSLog(@\"Mail Saved\");\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\n现在，你的新应用将能够呈现一个用于发送邮件的视图控制器，如图 13–4 所示。不过与 `MFMessageViewController`\
    \ 不同，你实际上可以在 iOS 模拟器中测试这一功能。\n\n![图片](img/9781430240051_Fig13-04.jpg)\n\n**图 13–4.**\
    \ *你的应用正在撰写电子邮件*\n\n非常方便的是，你可以使用模拟器轻松测试 `MFMailComposeViewController` 的所有功能，而无需担心会向任何真实或虚假地址发送多封电子邮件。模拟器不会真正通过网络发送你的测试消息，因此你可以轻松测试\
    \ `mailComposeDelegate` 方法对 `MailComposeResults` 的处理。\n\n使用 `MFMailComposeViewController`\
    \ 时可能遇到的另一个额外问题是，如果你允许根据用户输入设置收件人。用户很可能会错误地格式化邮件地址。这不会导致你的应用抛出异常，但可能会导致收件人被 `MFMailComposeViewController`\
    \ 忽略。你可以格式化用户输入以尝试避免这种情况，或者简单地设置一个正则表达式来验证给定的地址是否符合要求的格式。\n"
- fmt: '### Attaching Data to Mail


    `MFMailComposeViewController` includes functionality for you to attach data to
    your e-mail from your application through the use of the `-addAttachmentData:mimeType:fileName:`
    method. This method takes three parameters:


    1. `attachment`: This instance of `NSData` refers to the actual data of the object
    that you want to send. This means for any object you want to attach, you will
    need to acquire the `NSData` for it.

    2. `mimeType`: This property is an `NSString` that defines to the controller the
    data type of the attachment. These values are not local to iOS, and so are not
    defined in the Apple documentation. They can, however, be easily found online.
    Wikipedia offers a very distinct article on all the possible values at `http://en.wikipedia.org/wiki/Internet_media_type`.
    The MIME type of a JPEG image, for example, is `"image/jpeg"`.

    3. `fileName`: Use this `NSString` property to set the preferred name for the
    file sent in the e-mail.


    You will add functionality to your application to access the user''s image library,
    select an image, and then use that image to attach to your e-mail.


    Start off by adding a `UIImageView` underneath your `UITextView`, along with a
    `UIButton` underneath that with the label "Get Image". Your view will now resemble
    that simulated in [Figure 13–5](#Chapter13.html#fig_13_5).


    ![Image](images/9781430240051_Fig13-05.jpg)


    **Figure 13–5.** *Your new user interface with ability to select an image*


    You will need properties `imageViewContent` and `getImageButton`, along with the
    method `-getImagePressed:` for these. You will be presenting a `UIPopoverController`
    from your `getImageButton`, so make sure the `sender` type of this method is set
    to a `UIButton*` instead of `id`. Go ahead and make a `UIImage` property as well,
    called `selectedImage`, to store a reference to the chosen image, making sure
    to properly synthesize it.


    Whenever you want to access the photo library of an iPad, you need to use a `UIImagePickerController`
    set inside of a `UIPopoverController`. You will need to create a `UIPopoverController`
    property called `pop`, and make sure to synthesize it as well.


    Before you continue, instruct your view controller to conform to the `UIImagePickerControllerDelegate`
    and `UIPopoverControllerDelegate` protocols. Overall your header file should now
    resemble the following:


    ```

    #import <UIKit/UIKit.h>

    #import <QuartzCore/QuartzCore.h>

    #import <MessageUI/MessageUI.h>


    @interface MainViewController : UIViewController <UITextViewDelegate,

    MFMessageComposeViewControllerDelegate, UINavigationControllerDelegate,

    MFMailComposeViewControllerDelegate, UIImagePickerControllerDelegate,

    UIPopoverControllerDelegate>


    @property (strong, nonatomic) IBOutlet UITextView *textViewInput;

    @property (strong, nonatomic) IBOutlet UIButton *textButton;

    @property (strong, nonatomic) IBOutlet UIButton *mailButton;

    @property (strong, nonatomic) IBOutlet UIImageView *imageViewContent;

    @property (strong, nonatomic) IBOutlet UIButton *getImageButton;

    @property (strong, nonatomic) UIImage *selectedImage;

    @property (strong, nonatomic) UIPopoverController *pop;


    -(IBAction)textPressed:(id)sender;

    -(IBAction)mailPressed:(id)sender;

    -(IBAction)getImagePressed:(UIButton *)sender;

    ///Pay close attention to the above (UIButton *) parameter type.


    @end

    ```


    If you have correctly handled all your new properties so far, your `-viewDidUnload:`
    method should resemble the following:


    ```

    - (void)viewDidUnload

    {

        [self setPop:nil];

        [self setSelectedImage:nil];

        [self setTextViewInput:nil];

        [self setTextButton:nil];

        [self setMailButton:nil];

        [self setImageViewContent:nil];

        [self setGetImageButton:nil];

        [super viewDidUnload];

    }

    ```


    Now, you can write your `-getImagePressed:` method to present your popover controller
    with access to the photo library.


    ```

    -(void)getImagePressed:(UIButton *)sender

    {

    UIImagePickerController *picker = [[UIImagePickerController alloc] init];

    if ([UIImagePickerController

    isSourceTypeAvailable:UIImagePickerControllerSourceTypePhotoLibrary])

        {

            picker.sourceType = UIImagePickerControllerSourceTypePhotoLibrary;

            picker.delegate = self;


    self.pop = [[UIPopoverController alloc] initWithContentViewController:picker];

    pop.delegate = self;

            [pop presentPopoverFromRect:sender.frame inView:self.view

    permittedArrowDirections:UIPopoverArrowDirectionAny animated:YES];

        }

    }

    ```


    Now you just need to implement your `UIImagePickerControllerDelegate` protocol
    methods.


    ```

    -(void)imagePickerControllerDidCancel:(UIImagePickerController *)picker

    {

        [self.pop dismissPopoverAnimated:YES];

    }


    -(void)imagePickerController:(UIImagePickerController *)picker

    didFinishPickingMediaWithInfo:(NSDictionary *)info

    {

    UIImage *image = [info valueForKey:@"UIImagePickerControllerOriginalImage"];

    self.selectedImage = image;

    self.imageViewContent.image = image;

    self.imageViewContent.contentMode = UIViewContentModeScaleAspectFill;


        [self.pop dismissPopoverAnimated:YES];

    }

    ```


    At this point, your application can select an image and set it in your `UIImageView`.
    If you are testing this application in the simulator, you will need to acquire
    at least one image to put in your simulator''s photo library. You can do this
    by accessing the Safari app on the simulator, finding an image online, then clicking
    and holding the image to save it to the library. In [Figure 13–6](#Chapter13.html#fig_13_6),
    your app is shown with an image already selected, with the Get Image button then
    pressed again.


