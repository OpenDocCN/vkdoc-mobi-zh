  trans: '

    **注意：** 所有自定义点都应放置在 `if (self){}` 代码块中，以确保视图已正确初始化。这并非绝对必要，但属于良好的编程实践。如果 `self`
    未正确初始化，该条件将判断为假，导致方法直接返回 `nil`。


    现在自定义类已全部设置完成，您可以返回视图控制器来实现地图的代理方法。其实现方式与常规实现几乎完全相同，但需要将 `MKPinAnnotationView`
    创建 `MKAnnotationView` 的类型改为您的 `CustomAnnotationView`。请记住，如果未导入 `MyAnnotation.h`
    和 `CustomAnnotationView.h` 文件，应用程序将无法运行。


    ```

    - (MKAnnotationView *)mapView:(MKMapView *)mapView

    viewForAnnotation:(id<MKAnnotation>)annotation

    {

        if ([annotation isKindOfClass:[MyAnnotation class]])

        {

            static NSString *annotationIdentifier=@"annotationIdentifier";

            MKAnnotationView *annotationView=[self.mapViewUserMap

    dequeueReusableAnnotationViewWithIdentifier:annotationIdentifier];

            annotationView.annotation = annotation;

            if(!annotationView)

            {

                annotationView=[[CustomAnnotationView alloc] initWithAnnotation:annotation

    reuseIdentifier:annotationIdentifier];

            }


            annotationView.canShowCallout = YES;

            return annotationView;

        }

        return nil;

    }

    ```


    最后，您只需要一些测试数据即可运行。在 `-viewDidLoad` 方法中，添加以下代码来创建几个标注并将其添加到地图中。为了测试，您还需要为每个标注提供标题和副标题。


    ```

    MyAnnotation *test1 = [[MyAnnotation alloc]

    initWithCoordinate:CLLocationCoordinate2DMake(37.68, -97.33)];

    test1.title = @"test1";

    test1.subtitle = @"subtitle";

    MyAnnotation *test2 = [[MyAnnotation alloc]

    initWithCoordinate:CLLocationCoordinate2DMake(41.500, -81.695)];

    test2.title = @"test2";

    test2.subtitle = @"subtitle2";

    [self.mapViewUserMap addAnnotation:test1];

    [self.mapViewUserMap addAnnotation:test2];

    ```


    **注意：** 即使 `MKAnnotationView` 的 `canShowCallout` 属性设置为 YES，如果视图的标注未设置标题，信息框也不会显示。副标题是可选的。


    此时，运行应用程序，您应该会看到两个标注出现在地图上，并带有您的图片（已缩小到合理尺寸），分别位于堪萨斯州威奇托和俄亥俄州克利夫兰。图 5–18 是该应用的模拟效果。


    ![图片](img/9781430240051_Fig05-18.jpg)


    **图 5–18.** *带地图和自定义标注的应用程序*


    现在，您将添加几行额外的代码来定制信息框。


    首先，在标注标题和副标题的左侧放置一张图片。这通过使用 `annotationView` 的 `leftCalloutAccessoryView` 属性实现。您的
    `CustomAnnotationView` 类从 `MKAnnotationView` 继承了该属性的 getter 方法，因此我们将重写此方法，使所有自定义视图显示特定图片。您需要在
    `CustomAnnotationView.m` 文件中添加以下方法。


    ```

    -(UIView *)leftCalloutAccessoryView

    {

        UIImageView *imageView = [[UIImageView alloc] initWithImage:[UIImage

    imageNamed:@"avatar.png"]];

        imageView.frame = CGRectMake(0, 0, 20, 20);

        imageView.contentMode = UIViewContentModeScaleAspectFill;

        return imageView;

    }

    ```


    这与您为标注视图设置图片的方式非常相似，但多了一个步骤：需要创建一个 `UIImageView` 来承载 `avatar.png` 图片。您再次将其缩小（这次更小），然后返回它。由于
    `UIImageView` 是 `UIView` 的子类，这完全可行。


    正如您可以编辑 `leftCalloutAccessoryView` 一样，您也可以在信息框的右侧做同样的事情。这里，您只需放置一个小的展开按钮，该按钮可用于执行进一步的功能。


    ```

    -(UIView *)rightCalloutAccessoryView

    {

        return [UIButton buttonWithType:UIButtonTypeDetailDisclosure];

    }

    ```


    添加此功能后，您的标注信息框将类似于图 5–19 所示。


    ![图片](img/9781430240051_Fig05-19.jpg)


    **图 5–19.** *带自定义标注和信息框的地图*


    至此，您的信息框在视觉上已全部设置完成，但信息框内的按钮还蕴含着巨大的潜力，您尚未充分利用。大多数基于地图的应用会在信息框上使用按钮，通常用于将另一个视图控制器推送到屏幕上。以显示特定商业地点在地图上位置的应用为例，它可能允许用户查看特定地点的所有详细信息或图片。


    为了增加功能，您将实现地图的另一个代理方法 `-mapView:annotationView:calloutAccessoryControlTapped:`，并让它呈现一个模态视图控制器。出于演示目的，我们将让它只显示您特定标注的标题和副标题，但很容易看出它的应用远不止于此。


    首先，创建一个新的视图控制器，用于模态呈现。转到 **文件** ![图片](img/U001.jpg) **新建** ![图片](img/U001.jpg)
    **新建文件…**。在“Cocoa Touch”下，选择“UIViewController subclass”。将文件命名为“DetailViewController”，确保“Targeted
    for iPad”复选框未选中（除非您正在为 iPad 开发），并且“With XIB for User Interface”复选框已选中，如图 5–20
    所示。


    ![图片](img/9781430240051_Fig05-20.jpg)


    **图 5–20.** *配置详情视图控制器*


    接下来，进入 `DetailViewController` 的 `.xib` 文件，添加标签。从对象库中拖拽两个 `UILabel` 到视图中。将它们分别命名为“title”和“subtitle”。您的用户界面将如图
    5–21 所示。


    ![图片](img/9781430240051_Fig05-21.jpg)


    **图 5–21.** *`DetailViewController` 的 `.xib` 视图*


    现在，将这两个标签连接到 `DetailViewController` 的头文件。就像处理 `MKMapView` 一样，按住 ^ 键并将标签拖拽到头文件中。将它们的属性分别命名为
    `titleLabel` 和 `subtitleLabel`。


    接下来，在 `DetailViewController` 的其余部分中，您需要几个 `NSString` 变量来存储标题和副标题，因此只需将它们声明为实例变量。您还需要声明一个指定的初始化方法，该方法接受两个
    `NSString` 参数，用于设置标签的文本。您的头文件现在将如下所示：


    ```

    #import <UIKit/UIKit.h>


    @interface DetailViewController : UIViewController {

        UILabel *titleLabel;

        UILabel *subtitleLabel;

        NSString *myTitle;

        NSString *mySubtitle;

    }


    @property (strong, nonatomic) IBOutlet UILabel *titleLabel;

    @property (strong, nonatomic) IBOutlet UILabel *subtitleLabel;


    -(id)initWithTitle:(NSString *)title subtitle:(NSString *)subtitle;

    @end

    ```


    指定初始化方法的实现将如下所示：


    ```

    -(id)initWithTitle:(NSString *)title subtitle:(NSString *)subtitle

    {

        self = [super init];

        if (self)

        {

            myTitle = title;

            mySubtitle = subtitle;

        }

        return self;

    }

    ```


    最后，您需要在 `-viewDidLoad` 方法中添加以下两行代码，以便在视图加载后设置标签的文本。


    ```

    self.titleLabel.text = myTitle;

    self.subtitleLabel.text = mySubtitle;

    ```

