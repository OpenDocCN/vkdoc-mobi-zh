    **Figure 10–16.** *Confirming the correct configuration of your entitlements file*


    Now that your application and device are configured to work with iCloud, you can
    continue to build your actual application.


    In order to build a simple program to save a text document to iCloud, you need
    to make use of the `UIDocument` abstract class. Your subclass of this will contain
    all the information needed to encode your text information into a file that can
    be saved online. Create a new file and select the “Objective-C class” template.
    The easiest way to configure this file is to start off by naming the `NSObject`
    class as the parent class. You will change the actual superclass shortly. Name
    the file “MyDocument”.'
  trans: '

    ### 方案 10–3：利用 iCloud 实现数据持久化


    iOS 5.0 发布时带来的最重大的扩展之一，便是能够创建访问全新 iCloud 服务的应用程序。通过运用与上一方案中文件管理系统类似的概念，你不仅能在本地设备上保存、持久化存储和加载数据，还能在使用同一应用的多个设备之间实现数据同步。


    在本节的所有方案中，你都需要拥有 iOS 开发计划的访问权限，以及一台实体 iOS 设备。


    为了配置应用以使用 iCloud，必须首先完成一系列配置任务。首先，像之前一样，使用 `Single View Application` 模板创建一个新项目。请确保你的项目名称为
    `iCloudTest`，类前缀为 `iCloudStore`。虽然这些值通常对你的应用影响不大，但如果你按照本方案中的名称来命名，将有助于简化本次演示。你的项目配置应类似于图
    10–9。


    ![图片](img/9781430240051_Fig10-09.jpg)


    **图 10–9.** *配置应用以配合 iCloud 工作*


    首先，你必须配置项目以启用“授权”。在你的新项目中，导航到项目的 Target 设置，向下滚动到名为“Entitlements”的底部区域。勾选标记为“Enable
    Entitlements”的复选框，如图 10–10 底部所示，让 Xcode 自动生成你的授权文件。


    ![图片](img/9781430240051_Fig10-10.jpg)


    **图 10–10.** *启用授权以允许与 iCloud 通信*


    接下来，你需要为此应用生成一个特殊的“App ID”。在浏览器中，登录 iOS 开发者会员中心：[`http://developer.apple.com/membercenter/`](http://developer.apple.com/membercenter/)。导航到
    iOS 预置描述文件门户，然后进入 App IDs 部分。点击标有“New App ID”的按钮。


    接下来你会看到一个屏幕，提示你输入描述以及包标识符。将描述设置为 `iCloudTest`。对于包标识符，你需要输入与 Xcode 分配给应用的完全相同的标识符。这可以在项目
    Target 设置的顶部、Entitlements 部分上方找到，如图 10–11 所示。其格式很可能类似于 `com.domainName.iCloudTest`。将“Identifier”下显示的文本复制到浏览器的包标识符行中。


    ![图片](img/9781430240051_Fig10-11.jpg)


    **图 10–11.** *查找应用标识符以进行配置*


    在图 10–11 中，我的标识符是 `com.ColinFrancis.iCloudTest`，因此我将把它作为包标识符复制到浏览器中，如图 10–12 所示。


    ![图片](img/9781430240051_Fig10-12.jpg)


    **图 10–12.** *将项目的标识符复制到包标识符字段中*


    创建这个新的 App ID 后，你会返回到已创建的 App ID 列表中。找到刚创建的那个，点击 `Configure` 链接。


    在此屏幕中，你只需要勾选标记为“Enable for iCloud”的复选框，如图 10–13 所示。如果有对话框弹出，警告你需要手动重新生成预置描述文件，只需点击
    OK 即可。


    ![图片](img/9781430240051_Fig10-13.jpg)


    **图 10–13.** *为你的证书启用 iCloud*


    点击 **Done** 完成 App ID 的配置。


    接下来，向下移动到屏幕左侧 App IDs 选项卡下方的 `Provisioning` 选项卡。点击 `New Profile` 按钮开始创建新的预置描述文件。


    将此新预置描述文件命名为 `iCloudProfile`。选择你作为 iOS 开发者应已拥有的证书。将 App ID 字段设置为你刚刚创建的 `iCloudTest`
    App ID，并确保勾选你希望在其上测试此应用的设备旁边的复选框。图 10–14 显示了我的配置屏幕，你的屏幕应与之类似，只是使用你自己的信息。


    ![图片](img/9781430240051_Fig10-14.jpg)


    **图 10–14.** *为你的 iCloud 应用创建新的预置描述文件*


    点击 **Submit** 返回预置描述文件列表。你应该会看到新列出的预置描述文件。如果其状态显示为“Pending”，只需刷新页面直至显示为“Active”。


    接下来，点击你新创建的预置描述文件旁边的 **Download** 按钮，将其下载到你的电脑。


    文件下载完成后（应该不会花很长时间），将文件从 Finder 拖拽到 Dock 中的 Xcode 图标上，以将其导入 Xcode。这也会打开 `Organizer`
    窗口，其中会列出你所有的预置描述文件。


    最后，在 `Organizer` 中，当你的设备已连接到电脑时，将新预置描述文件从显示的列表中拖拽到你设备下的 `Provisioning Profiles`
    部分，如图 10–15 所示。


    ![图片](img/9781430240051_Fig10-15.jpg)


    **图 10–15.** *将新预置描述文件复制到设备的预置描述文件部分*


    此时，你的设备已完全配置好，可以运行你创建的项目了。


    你必须在项目中执行最后一步，才能使应用真正能够使用 iCloud 服务。你需要在视图控制器中定义一个包含“通用容器 URL”的常量。这个 `NSString`
    本质上就是你的开发者帐户 ID 加上你的包标识符作为前缀。例如，如果你的包标识符是 `com.domainName.iCloudTest`，帐户 ID 是
    `12345ABCDE`，那么 URL 将是 `12345ABCDE.com.domainName.iCloudTest`。如果不确定你的帐户 ID，可以再次导航到
    `Member Center` 并进入 **Your Account** 选项卡来查找。如果你使用的是个人帐户，它将在你的姓名旁边显示为 **Individual
    ID**。


    在整个项目中，你将使用示例 URL `12345ABCDE.com.domainName.iCloudTest`。请确保根据你自己的帐户 ID 和域名进行修改。


    将以下定义添加到你的 `iCloudStoreViewController.m` 文件顶部，以便稍后引用。


    ```

    #define UBIQUITY_CONTAINER_URL @"12345ABCDE.com.domainName.iCloudTest"

    ```


    为了使你的应用正常工作，你还必须确保你的授权文件已使用相同的 URL 正确配置。导航到你的授权文件，确保 `com.apple.developer.ubiquity-container-identifiers`（第
    0 项）和 `com.apple.developer.ubiquity-kvstore-identifier` 的值都设置为此值。Xcode 应该会自动设置这些值，但最好总是确认一下。如果没有，请按图
    10–16 所示进行设置。


    ![图片](img/9781430240051_Fig10-16.jpg)


    **图 10–16.** *确认授权文件的正确配置*


    现在，你的应用和设备已配置好以配合 iCloud 工作，你可以继续构建实际的应用了。


    为了构建一个简单的程序来将文本文档保存到 iCloud，你需要使用 `UIDocument` 抽象类。你的子类将包含将所有文本信息编码成可在线保存的文件所需的全部信息。创建一个新文件，并选择“Objective-C
    class”模板。配置此文件最简单的方法是先将 `NSObject` 类命名为父类。稍后你将更改实际的父类。将文件命名为 `MyDocument`。

    '
- fmt: "Once your class has been created, modify the `@interface` line of the `MyDocument.h`\
    \ file to the following in order to specify your class as a subclass of `UIDocument`.\n\
    \n```\n@interface MyDocument : UIDocument\n```\n\nYou will give this class only\
    \ one property, `userText`, of type `NSString`, which will store the text to be\
    \ encoded and decoded. Make sure to synthesize this property in the implementation\
    \ file. Your `MyDocument.h` file should look like so:\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface MyDocument : UIDocument\n\n@property (strong, nonatomic) NSString\
    \ *userText;\n\n@end\n```\n\nNow, you must, at a bare minimum, implement two classes\
    \ to correctly subclass `UIDocument`: `-contentsForType:error:` and `-loadFromContents:ofType:error:`.\
    \ These methods will essentially act as your encoding and decoding methods respectively,\
    \ similar to the previous recipe.\n\nYour first method will return an `NSData`\
    \ object representing your `userText` property.\n\n```\n-(id)contentsForType:(NSString\
    \ *)typeName error:(NSError *__autoreleasing *)outError\n{\nreturn [NSData dataWithBytes:[self.userText\
    \ UTF8String] length:[self.userText length]];\n}\n```\n\nYour second method will\
    \ do the reverse, building an `NSString` out of raw data and setting it to your\
    \ property.\n\n```\n-(BOOL) loadFromContents:(id)contents ofType:(NSString *)typeName\
    \ error:(NSError\n*__autoreleasing *)outError\n{\nif ([contents length] >0)\n\
    \    {\nself.userText = [[NSString alloc] initWithBytes:[contents bytes] length:[contents\n\
    length] encoding:NSUTF8StringEncoding];\n    }\nelse\n    {\nself.userText = @\"\
    \";\n    }\nreturn YES;\n}\n```\n\nNow that your data model is configured (yes,\
    \ it is that simple!), you can move on to building your user interface. Switch\
    \ over to the `iCloudStoreViewController.xib` file and, using a `UITextView` and\
    \ a `UIButton`, set up the view shown in [Figure 10–17](#Chapter10.html#fig_10_17).\n\
    \n![Image](images/9781430240051_Fig10-17.jpg)\n\n**Figure 10–17.** *A simple user\
    \ interface to save text*\n\nMake sure to leave the lower half of the view entirely\
    \ blank, as the keyboard used to edit your `UITextView` will cover this area.\n\
    \nYou may also wish to change some of the background colors of your main `UIView`\
    \ and `UITextView` to clearly separate them. I made them different shades of gray,\
    \ as shown later in [Figure 10–19](#Chapter10.html#fig_10_19).\n\nConnect the\
    \ `UITextView` to your view controller's header file using the `textViewDisplay`\
    \ property. Make sure to synthesize and properly handle this property as usual.\
    \ Connect the `UIButton` to an `IBAction` with the handler `-savePressed:`.\n\n\
    You will also need several other properties to help perform your iCloud operations.\
    \ Add an import statement for the `MyDocument.h` file.\n\n```\n#import \"MyDocument.h\"\
    \n```\n\nAdd the following three properties as well, making sure to synthesize\
    \ each and `nil` them in `-viewDidUnload` as usual.\n\n```\n@property (strong,\
    \ nonatomic) MyDocument *document;\n@property (strong, nonatomic) NSURL *ubiquityURL;\n\
    @property (strong, nonatomic) NSMetadataQuery *metadataQuery;\n```\n\nNext, you\
    \ will implement your `-viewDidLoad` method to create a query for iCloud to search\
    \ for any saved versions of your document by using the `NSFileManager` and `NSMetadataQuery`\
    \ classes.\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\nNSFileManager\
    \ *filemgr = [NSFileManager defaultManager];\n\nself.ubiquityURL = [[filemgr URLForUbiquityContainerIdentifier:UBIQUITY_CONTAINER_URL]\n\
    URLByAppendingPathComponent:@\"Documents\"];\n\nif (self.ubiquityURL != nil)\n\
    \    {\nif ([filemgr fileExistsAtPath:[self.ubiquityURLpath]] == NO)\n       \
    \     [filemgr createDirectoryAtURL:self.ubiquityURL\nwithIntermediateDirectories:YES\n\
    attributes:nil\nerror:nil];\n\nself.ubiquityURL = [self.ubiquityURL URLByAppendingPathComponent:@\"\
    document.doc\"];\n\nself.metadataQuery = [[NSMetadataQuery alloc] init];\n   \
    \     [self.metadataQuery setPredicate:[NSPredicate\npredicateWithFormat:@\"%K\
    \ like 'document.doc'\",\nNSMetadataItemFSNameKey]];\n        [self.metadataQuery\
    \ setSearchScopes:[NSArray\narrayWithObjects:NSMetadataQueryUbiquitousDocumentsScope,nil]];\n\
    \n        [[NSNotificationCenter defaultCenter]\naddObserver:self\nselector:@selector(metadataQueryDidFinishGathering:)\n\
    name: NSMetadataQueryDidFinishGatheringNotification\nobject:metadataQuery];\n\
    \        [self.metadataQuery startQuery];\n    }\n}\n```\n\nThis method contains\
    \ the following steps to create a query for any saved data:\n\n1.  Acquire the\
    \ `ubiquityURL` using the `-URLForUbiquityContainerIdentifier:` method. This call\
    \ uses your identifier that you defined earlier based on your account ID and domain\
    \ name. If this value is not `nil`, then your device and application are correctly\
    \ configured to store documents in iCloud.\n2.  Ensure that the property directories\
    \ exist at the target URL by using the `-createDirectoryAtURL:withIntermediateDirectories:attributes:error:`\
    \ method.\n3.  Append the file name `\"document.doc\"` onto the full URL.\n4.\
    \  Create an instance of `NSMetadataQuery` with a predicate for your file name\
    \ and a search scope for ubiquitous documents.\n5.  Add the view controller as\
    \ an observer for the completion of the query.\n6.  Start the query.\n\nAfter\
    \ calling this method, your application will be off attempting to find any information\
    \ stored on iCloud. In order to react to its results, you must implement the `-metadataQueryDidFinishGathering:`\
    \ selector you mentioned in the previous notification registration.\n\n```\n-\
    \ (void)metadataQueryDidFinishGathering: (NSNotification *)notification\n{\nNSMetadataQuery\
    \ *query = [notification object];\n    [query disableUpdates];\n\n    [[NSNotificationCenter\
    \ defaultCenter]\nremoveObserver:self\nname:NSMetadataQueryDidFinishGatheringNotification\n\
    object:query];\n\n    [query stopQuery];\nNSArray *results = [[NSArray alloc]\
    \ initWithArray:[query results]];\n\nif ([results count] == 1)\n    {\nself.ubiquityURL\
    \ = [[results lastObject] valueForAttribute:NSMetadataItemURLKey];\nself.document\
    \ = [[MyDocument alloc] initWithFileURL:ubiquityURL];\n\n        [self.document\
    \ openWithCompletionHandler:^(BOOL success)\n        {\nif (success)\n       \
    \      {\nNSLog(@\"Opened iCloud doc\");\nself.textViewDisplay.text = self.document.userText;\n\
    \             }\nelse {\nNSLog(@\"Failed to open iCloud doc\");\n   }\n      \
    \   }];\n    }\nelse\n    {\nself.document = [[MyDocument alloc] initWithFileURL:self.ubiquityURL];\n\
    \        [self.document saveToURL:self.ubiquityURL forSaveOperation:\nUIDocumentSaveForCreating\
    \ completionHandler:^(BOOL success)\n        {\nif (success)\n              {\n\
    NSLog(@\"File created and saved to iCloud\");\n              }\nelse\n       \
    \       {\nNSLog(@\"Error, could not save file to iCloud\");\n              }\n\
    \        }];\n    }\n}\n```\n\nThis method completes your search for any previously\
    \ stored information in iCloud by running through the following steps:\n\n1. \
    \ Retrieves the original `NSMetadataQuery` object in order to disable any further\
    \ updates, remove the view controller as an observer, and stop the query.\n2.\
    \  Create an `NSArray` of documents found using the `results` property of `NSMetadataQuery`.\n\
    3.  Acquire the last/only object in this array, and then create a `UIDocument`\
    \ using its key-valued URL.\n4.  Open the document, and, upon completion, display\
    \ the document's text to the user.\n\nThis method also includes code for the case\
    \ in which no documents (or more than one) are found. In this case, the program\
    \ attempts to save an empty file directly to iCloud, so that the file will exist\
    \ in the future.\n\nAt this point, your application will be able to load any previously\
    \ stored text from iCloud, so you simply need to implement a saving functionality\
    \ to have any information to retrieve! The process of saving data is much simpler\
    \ than retrieving it."
  raw: 'Once your class has been created, modify the `@interface` line of the `MyDocument.h`
    file to the following in order to specify your class as a subclass of `UIDocument`.


    `@interface MyDocument : UIDocument`


    You will give this class only one property, `userText`, of type `NSString`, which
    will store the text to be encoded and decoded. Make sure to synthesize this property
    in the implementation file. Your `MyDocument.h` file should look like so:


    `#import <Foundation/Foundation.h>`


    `@interface MyDocument : UIDocument`


    `@property (strong, nonatomic) NSString *userText;`


    `@end`


    Now, you must, at a bare minimum, implement two classes to correctly subclass
    `UIDocument`: `-contentsForType:error:` and `-loadFromContents:ofType:error:`.
    These methods will essentially act as your encoding and decoding methods respectively,
    similar to the previous recipe.


    Your first method will return an `NSData` object representing your `userText`
    property.


    `-(id)contentsForType:(NSString *)typeName error:(NSError *__autoreleasing *)outError`

    `{`

    `return [NSData dataWithBytes:[self.userText UTF8String] length:[self.userText
    length]];`

    `}`


    Your second method will do the reverse, building an `NSString` out of raw data
    and setting it to your property.


    `-(BOOL) loadFromContents:(id)contents ofType:(NSString *)typeName error:(NSError`

    `*__autoreleasing *)outError`

    `{`

    `if ([contents length] >0)`

    `    {`

    `self.userText = [[NSString alloc] initWithBytes:[contents bytes] length:[contents`

    `length] encoding:NSUTF8StringEncoding];`

    `    }`

    `else`

    `    {`

    `self.userText = @"";`

    `    }`

    `return YES;`

    `}`


    Now that your data model is configured (yes, it is that simple!), you can move
    on to building your user interface. Switch over to the `iCloudStoreViewController.xib`
    file and, using a `UITextView` and a `UIButton`, set up the view shown in [Figure
    10–17](#Chapter10.html#fig_10_17).


    ![Image](images/9781430240051_Fig10-17.jpg)


    **Figure 10–17.** *A simple user interface to save text*


    Make sure to leave the lower half of the view entirely blank, as the keyboard
    used to edit your `UITextView` will cover this area.


    You may also wish to change some of the background colors of your main `UIView`
    and `UITextView` to clearly separate them. I made them different shades of gray,
    as shown later in [Figure 10–19](#Chapter10.html#fig_10_19).


    Connect the `UITextView` to your view controller’s header file using the `textViewDisplay`
    property. Make sure to synthesize and properly handle this property as usual.
    Connect the `UIButton` to an `IBAction` with the handler `-savePressed:`.


    You will also need several other properties to help perform your iCloud operations.
    Add an import statement for the `MyDocument.h` file.


    `#import "MyDocument.h"`


    Add the following three properties as well, making sure to synthesize each and
    `nil` them in `-viewDidUnload` as usual.


    `@property (strong, nonatomic) MyDocument *document;`

    `@property (strong, nonatomic) NSURL *ubiquityURL;`

    `@property (strong, nonatomic) NSMetadataQuery *metadataQuery;`


    Next, you will implement your `-viewDidLoad` method to create a query for iCloud
    to search for any saved versions of your document by using the `NSFileManager`
    and `NSMetadataQuery` classes.


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`


    `NSFileManager *filemgr = [NSFileManager defaultManager];`


    `self.ubiquityURL = [[filemgr URLForUbiquityContainerIdentifier:UBIQUITY_CONTAINER_URL]`

    `URLByAppendingPathComponent:@"Documents"];`


    `if (self.ubiquityURL != nil)`

    `    {`

    `if ([filemgr fileExistsAtPath:[self.ubiquityURLpath]] == NO)`

    `            [filemgr createDirectoryAtURL:self.ubiquityURL`

    `withIntermediateDirectories:YES`

    `attributes:nil`

    `error:nil];`


    `self.ubiquityURL = [self.ubiquityURL URLByAppendingPathComponent:@"document.doc"];`


    `self.metadataQuery = [[NSMetadataQuery alloc] init];`

    `        [self.metadataQuery setPredicate:[NSPredicate`

    `predicateWithFormat:@"%K like ''document.doc''",`

    `NSMetadataItemFSNameKey]];`

    `        [self.metadataQuery setSearchScopes:[NSArray`

    `arrayWithObjects:NSMetadataQueryUbiquitousDocumentsScope,nil]];`


    `        [[NSNotificationCenter defaultCenter]`

    `addObserver:self`

    `selector:@selector(metadataQueryDidFinishGathering:)`

    `name: NSMetadataQueryDidFinishGatheringNotification`

    `object:metadataQuery];`

    `        [self.metadataQuery startQuery];`

    `    }`

    `}`


    This method contains the following steps to create a query for any saved data:


    1.  Acquire the `ubiquityURL` using the `-URLForUbiquityContainerIdentifier:`
    method. This call uses your identifier that you defined earlier based on your
    account ID and domain name. If this value is not `nil`, then your device and application
    are correctly configured to store documents in iCloud.

    2.  Ensure that the property directories exist at the target URL by using the
    `-createDirectoryAtURL:withIntermediateDirectories:attributes:error:` method.

    3.  Append the file name “document.doc” onto the full URL.

    4.  Create an instance of `NSMetadataQuery` with a predicate for your file name
    and a search scope for ubiquitous documents.

    5.  Add the view controller as an observer for the completion of the query.

    6.  Start the query.


    After calling this method, your application will be off attempting to find any
    information stored on iCloud. In order to react to its results, you must implement
    the `-metadataQueryDidFinishGathering:` selector you mentioned in the previous
    notification registration.


    `- (void)metadataQueryDidFinishGathering: (NSNotification *)notification`

    `{`

    `NSMetadataQuery *query = [notification object];`

    `    [query disableUpdates];`


    `    [[NSNotificationCenter defaultCenter]`

    `removeObserver:self`

    `name:NSMetadataQueryDidFinishGatheringNotification`

    `object:query];`


    `    [query stopQuery];`

    `NSArray *results = [[NSArray alloc] initWithArray:[query results]];`


    `if ([results count] == 1)`

    `    {`

    `self.ubiquityURL = [[results lastObject] valueForAttribute:NSMetadataItemURLKey];`

    `self.document = [[MyDocument alloc] initWithFileURL:ubiquityURL];`


    `        [self.document openWithCompletionHandler:^(BOOL success)`

    `        {`

    `if (success)`

    `             {`

    `NSLog(@"Opened iCloud doc");`

    `self.textViewDisplay.text = self.document.userText;`

    `             }`

    `else {`

    `NSLog(@"Failed to open iCloud doc");`

    `   }`

    `         }];`

    `    }`

    `else`

    `    {`

    `self.document = [[MyDocument alloc] initWithFileURL:self.ubiquityURL];`

    `        [self.document saveToURL:self.ubiquityURL forSaveOperation:`

    `UIDocumentSaveForCreating completionHandler:^(BOOL success)`

    `        {`

    `if (success)`

    `              {`

    `NSLog(@"File created and saved to iCloud");`

    `              }`

    `else`

    `              {`

    `NSLog(@"Error, could not save file to iCloud");`

    `              }`

    `        }];`

    `    }`

    `}`


    This method completes your search for any previously stored information in iCloud
    by running through the following steps:


    1.  Retrieves the original `NSMetadataQuery` object in order to disable any further
    updates, remove the view controller as an observer, and stop the query.

    2.  Create an `NSArray` of documents found using the `results` property of `NSMetadataQuery`.

    3.  Acquire the last/only object in this array, and then create a `UIDocument`
    using its key-valued URL.

    4.  Open the document, and, upon completion, display the document’s text to the
    user.


    This method also includes code for the case in which no documents (or more than
    one) are found. In this case, the program attempts to save an empty file directly
    to iCloud, so that the file will exist in the future.


    At this point, your application will be able to load any previously stored text
    from iCloud, so you simply need to implement a saving functionality to have any
    information to retrieve! The process of saving data is much simpler than retrieving
    it.'
  trans: "\n创建好类后，修改 `MyDocument.h` 文件的 `@interface` 行，将其指定为 `UIDocument` 的子类，代码如下：\n\
    \n```\n@interface MyDocument : UIDocument\n```\n\n你将只给这个类一个属性，即类型为 `NSString`\
    \ 的 `userText`，用于存储待编码和解码的文本。请确保在实现文件中合成（synthesize）该属性。你的 `MyDocument.h` 文件应如下所示：\n\
    \n```\n#import <Foundation/Foundation.h>\n\n@interface MyDocument : UIDocument\n\
    \n@property (strong, nonatomic) NSString *userText;\n\n@end\n```\n\n现在，你至少必须实现两个方法才能正确继承\
    \ `UIDocument` 的子类：`-contentsForType:error:` 和 `-loadFromContents:ofType:error:`。这两个方法将分别充当你的编码和解码方法，类似于之前的示例。\n\
    \n第一个方法将返回一个 `NSData` 对象，表示你的 `userText` 属性。\n\n```\n-(id)contentsForType:(NSString\
    \ *)typeName error:(NSError *__autoreleasing *)outError\n{\nreturn [NSData dataWithBytes:[self.userText\
    \ UTF8String] length:[self.userText length]];\n}\n```\n\n第二个方法则执行反向操作，从原始数据构建一个\
    \ `NSString` 并将其赋值给属性。\n\n```\n-(BOOL) loadFromContents:(id)contents ofType:(NSString\
    \ *)typeName error:(NSError\n*__autoreleasing *)outError\n{\nif ([contents length]\
    \ >0)\n    {\nself.userText = [[NSString alloc] initWithBytes:[contents bytes]\
    \ length:[contents\nlength] encoding:NSUTF8StringEncoding];\n    }\nelse\n   \
    \ {\nself.userText = @\"\";\n    }\nreturn YES;\n}\n```\n\n现在你的数据模型已配置完成（没错，就是这么简单！），就可以开始构建用户界面了。切换到\
    \ `iCloudStoreViewController.xib` 文件，使用 `UITextView` 和 `UIButton`，设置如图 10–17 所示的视图。\n\
    \n![Image](img/9781430240051_Fig10-17.jpg)\n\n**图 10–17.** *一个用于保存文本的简单用户界面*\n\
    \n请确保视图的下半部分完全留空，因为用于编辑 `UITextView` 的键盘会覆盖这个区域。\n\n你或许还想更改主 `UIView` 和 `UITextView`\
    \ 的部分背景颜色，以便清晰区分它们。我将它们设为不同的灰色阴影，如后文图 10–19 所示。\n\n使用 `textViewDisplay` 属性将 `UITextView`\
    \ 连接到视图控制器的头文件。请确保像往常一样合成并妥善处理该属性。将 `UIButton` 连接到处理程序为 `-savePressed:` 的 `IBAction`。\n\
    \n你还需要几个其他属性来帮助执行 iCloud 操作。为 `MyDocument.h` 文件添加一个导入语句。\n\n```\n#import \"MyDocument.h\"\
    \n```\n\n同时添加以下三个属性，确保像往常一样合成每个属性，并在 `-viewDidUnload` 中将它们设为 `nil`。\n\n```\n@property\
    \ (strong, nonatomic) MyDocument *document;\n@property (strong, nonatomic) NSURL\
    \ *ubiquityURL;\n@property (strong, nonatomic) NSMetadataQuery *metadataQuery;\n\
    ```\n\n接下来，实现 `-viewDidLoad` 方法，通过使用 `NSFileManager` 和 `NSMetadataQuery` 类创建查询，让\
    \ iCloud 搜索文档的任何已保存版本。\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \nNSFileManager *filemgr = [NSFileManager defaultManager];\n\nself.ubiquityURL\
    \ = [[filemgr URLForUbiquityContainerIdentifier:UBIQUITY_CONTAINER_URL]\nURLByAppendingPathComponent:@\"\
    Documents\"];\n\nif (self.ubiquityURL != nil)\n    {\nif ([filemgr fileExistsAtPath:[self.ubiquityURLpath]]\
    \ == NO)\n            [filemgr createDirectoryAtURL:self.ubiquityURL\nwithIntermediateDirectories:YES\n\
    attributes:nil\nerror:nil];\n\nself.ubiquityURL = [self.ubiquityURL URLByAppendingPathComponent:@\"\
    document.doc\"];\n\nself.metadataQuery = [[NSMetadataQuery alloc] init];\n   \
    \     [self.metadataQuery setPredicate:[NSPredicate\npredicateWithFormat:@\"%K\
    \ like 'document.doc'\",\nNSMetadataItemFSNameKey]];\n        [self.metadataQuery\
    \ setSearchScopes:[NSArray\narrayWithObjects:NSMetadataQueryUbiquitousDocumentsScope,nil]];\n\
    \n        [[NSNotificationCenter defaultCenter]\naddObserver:self\nselector:@selector(metadataQueryDidFinishGathering:)\n\
    name: NSMetadataQueryDidFinishGatheringNotification\nobject:metadataQuery];\n\
    \        [self.metadataQuery startQuery];\n    }\n}\n```\n\n该方法包含以下步骤，用于创建查询以查找任何已保存的数据：\n\
    \n1.  使用 `-URLForUbiquityContainerIdentifier:` 方法获取 `ubiquityURL`。此调用使用了你之前根据账户\
    \ ID 和域名定义的标识符。如果该值不为 `nil`，则说明你的设备和应用已正确配置，可以将文档存储到 iCloud 中。\n2.  使用 `-createDirectoryAtURL:withIntermediateDirectories:attributes:error:`\
    \ 方法确保目标 URL 处存在必要的属性目录。\n3.  将文件名 `\"document.doc\"` 附加到完整 URL 上。\n4.  创建一个 `NSMetadataQuery`\
    \ 实例，设置用于文件名的谓词以及用于通用文档的搜索范围。\n5.  将视图控制器添加为查询完成的通知观察者。\n6.  启动查询。\n\n调用该方法后，你的应用将开始尝试查找存储在\
    \ iCloud 中的任何信息。为了响应查询结果，你必须实现先前在通知注册中提到的 `-metadataQueryDidFinishGathering:`\
    \ 选择器。\n\n```\n- (void)metadataQueryDidFinishGathering: (NSNotification *)notification\n\
    {\nNSMetadataQuery *query = [notification object];\n    [query disableUpdates];\n\
    \n    [[NSNotificationCenter defaultCenter]\nremoveObserver:self\nname:NSMetadataQueryDidFinishGatheringNotification\n\
    object:query];\n\n    [query stopQuery];\nNSArray *results = [[NSArray alloc]\
    \ initWithArray:[query results]];\n\nif ([results count] == 1)\n    {\nself.ubiquityURL\
    \ = [[results lastObject] valueForAttribute:NSMetadataItemURLKey];\nself.document\
    \ = [[MyDocument alloc] initWithFileURL:ubiquityURL];\n\n        [self.document\
    \ openWithCompletionHandler:^(BOOL success)\n        {\nif (success)\n       \
    \      {\nNSLog(@\"已打开 iCloud 文档\");\nself.textViewDisplay.text = self.document.userText;\n\
    \             }\nelse {\nNSLog(@\"无法打开 iCloud 文档\");\n   }\n         }];\n   \
    \ }\nelse\n    {\nself.document = [[MyDocument alloc] initWithFileURL:self.ubiquityURL];\n\
    \        [self.document saveToURL:self.ubiquityURL forSaveOperation:\nUIDocumentSaveForCreating\
    \ completionHandler:^(BOOL success)\n        {\nif (success)\n              {\n\
    NSLog(@\"文件已创建并保存到 iCloud\");\n              }\nelse\n              {\nNSLog(@\"\
    错误，无法将文件保存到 iCloud\");\n              }\n        }];\n    }\n}\n```\n\n该方法通过执行以下步骤完成对\
    \ iCloud 中先前存储信息的搜索：\n\n1.  获取原始的 `NSMetadataQuery` 对象，以禁用任何进一步更新，移除视图控制器的观察者身份，并停止查询。\n\
    2.  使用 `NSMetadataQuery` 的 `results` 属性创建一个包含找到的文档的 `NSArray`。\n3.  获取该数组中的最后一个（也是唯一一个）对象，然后使用其键值\
    \ URL 创建一个 `UIDocument`。\n4.  打开文档，完成后向用户显示文档中的文本。\n\n该方法还包含了未找到文档（或找到多个文档）时的处理代码。在这种情况下，程序会尝试将一个空文件直接保存到\
    \ iCloud，以便该文件将来存在。\n\n此时，你的应用将能够从 iCloud 加载任何先前存储的文本，因此你只需实现保存功能，就可以有信息可以检索了！保存数据的过程比检索它要简单得多。"
- fmt: "```objc\n- (void)savePressed:(id)sender\n{\n    self.document.userText = self.textViewDisplay.text;\n\
    \    [self.document saveToURL:self.ubiquityURL\n           forSaveOperation:UIDocumentSaveForOverwriting\n\
    \          completionHandler:^(BOOL success) {\n              if (success) {\n\
    \                  NSLog(@\"Written to iCloud\");\n              } else {\n  \
    \                NSLog(@\"Error writing to iCloud\");\n              }\n     \
    \     }];\n}\n```\n\nBefore you continue on to test your application, you must\
    \ make sure that your test device is properly configured to work with iCloud.\
    \ In the Settings app on your device, navigate to the iCloud section. In order\
    \ for this application to properly store data, your iCloud account must be properly\
    \ configured and verified. This will require you to have verified your e-mail\
    \ address and registered it as your Apple ID. The item marked `Documents & Data`\
    \ should also be set to `On`, as in [Figure 10–18](#Chapter10.html#fig_10_18).\
    \ You can, of course, easily configure this once your account is verified.\n\n\
    ![Image](images/9781430240051_Fig10-18.jpg)\n\n**Figure 10–18.** *Documents and\
    \ Data must be enabled to store information in iCloud.*\n\nAssuming your device\
    \ is correctly configured, your simple application should be able to correctly\
    \ store documents using the user’s iCloud account, allowing you to easily persist\
    \ data across multiple devices, application shutdowns, and even through system\
    \ resets, as shown by [Figure 10–19](#Chapter10.html#fig_10_19) with a few slightly\
    \ altered background colors, as mentioned earlier.\n\n![Image](images/9781430240051_Fig10-19.jpg)\n\
    \n**Figure 10–19.** *Your application with text saved and loaded from iCloud*\n\
    \n### Recipe 10–4: Storing Key-Value Data in iCloud\n\nJust as you were able to\
    \ easily persist a variety of lightweight objects locally using the `NSUserDefaults`\
    \ class at the beginning of this chapter, you are able to implement the same type\
    \ of storage using the iCloud service. You will add this functionality to your\
    \ application by keeping a count of the number of times that the text has been\
    \ saved. While this may not seem like much, the ability to have such simple values\
    \ remain synchronized in the same application across multiple devices opens up\
    \ a whole world of development power.\n\nAll key-value data handling with iCloud\
    \ is done through the `NSUbiquitousKeyValueStore` class. You will add an instance\
    \ of this class as a property to your `iCloudStoreViewController` file, making\
    \ sure to synthesize and `nil` it as appropriate.\n\n```objc\n@property (strong,\
    \ nonatomic) NSUbiquitousKeyValueStore *keyStore;\n```\n\nNext, you will do a\
    \ slight rearrangement of your user interface to include two `UILabel`s, of which\
    \ one will display your save count. Your view will now resemble [Figure 10–20](#Chapter10.html#fig_10_20).\n\
    \n![Image](images/9781430240051_Fig10-20.jpg)\n\n**Figure 10–20.** *Rearranging\
    \ your XIB file with two new `UILabel`s*\n\nConnect the right `UILabel` (displaying\
    \ the text `N` in [Figure 10–20](#Chapter10.html#fig_10_20)) to your header using\
    \ the property `countLabel`.\n\n```objc\n@property (strong, nonatomic) IBOutlet\
    \ UILabel *countLabel;\n```\n\nYou can configure your application to immediately\
    \ check for any count upon loading by adding the following code to the end of\
    \ your `-viewDidLoad` method.\n\n```objc\nself.keyStore = [[NSUbiquitousKeyValueStore\
    \ alloc] init];\ndouble count = [self.keyStore doubleForKey:@\"count\"];\nself.countLabel.text\
    \ = [NSString stringWithFormat:@\"%f\", count];\n```\n\nThe following line, added\
    \ after the foregoing ones, will allow you to receive notifications upon the changing\
    \ of any values in your `NSUbiquitousKeyValueStore`, allowing you to keep your\
    \ information updated across multiple devices.\n\n```objc\n[[NSNotificationCenter\
    \ defaultCenter] addObserver:self selector:\n    @selector(countChangeExternally:)\
    \ name:\n    NSUbiquitousKeyValueStoreDidChangeExternallyNotification object:self.keyStore];\n\
    ```\n\nYou can implement the `-countChangeExternally:` method quite simply to\
    \ set your `UILabel`’s text.\n\n```objc\n-(void)countChangeExternally:(id)sender\n\
    {\n    double count = [self.keyStore doubleForKey:@\"count\"];\n    self.countLabel.text\
    \ = [NSString stringWithFormat:@\"%f\", count];\n}\n```\n\nFinally, you need to\
    \ instruct your `savePressed:` method to correctly update this value. You will\
    \ do this only if your text is successfully saved, so your updated method will\
    \ look like so:\n\n```objc\n- (void)savePressed:(id)sender\n{\n    self.document.userText\
    \ = self.textViewDisplay.text;\n    [self.document saveToURL:self.ubiquityURL\n\
    \           forSaveOperation:UIDocumentSaveForOverwriting\n          completionHandler:^(BOOL\
    \ success) {\n              if (success) {\n                  NSLog(@\"Written\
    \ to iCloud\");\n                  double count = [self.countLabel.text doubleValue];\n\
    \                  count += 1;\n                  self.countLabel.text = [NSString\
    \ stringWithFormat:@\"%f\", count];\n                  [self.keyStore setDouble:count\
    \ forKey:@\"count\"];\n                  [self.keyStore synchronize];\n      \
    \        } else {\n                  NSLog(@\"Error writing to iCloud\");\n  \
    \            }\n          }];\n}\n```\n\nYour application should now be able to\
    \ easily store your lightweight double value to keep track of your save count,\
    \ as shown in [Figure 10–21](#Chapter10.html#fig_10_21)!\n\n![Image](images/9781430240051_Fig10-21.jpg)\n\
