    ### 总结


    在本章中，你已学习了如何使用 Game Center 和 Game Kit 扩展你的游戏。你应该能够在游戏中加入**高分榜**，以此激励玩家之间的竞争并建立炫耀资本。你还应该能够实现**成就系统**，让玩家在漫长的关卡中获得成就感，甚至轻松地在游戏中嵌入**小游戏**。最后，你在游戏中实现了基本的**多人游戏**功能，以鼓励与真人对手进行更具社交性的游戏。


    开发 iOS 应用程序是一个多方面的过程：它需要将视觉设计与程序功能相结合，这不仅要求多才多艺的技能组合，还需要极大的奉献精神。幸运的是，Apple 提供了优秀的开发工具集和编程语言，两者都在不断更新和改进。借助如此灵活的语言，从组织海量数据存储，到处理复杂的网络请求，再到图像滤镜，这些任务都可以被简化、设计并实现于我们这一代最广泛使用、最强大的设备上。无论你将本书作为简单的参考书还是完整的指南，我们都希望你能利用这些**现成方案**构建更强健的应用程序，为
    iOS 技术世界做出贡献并助其进步。


