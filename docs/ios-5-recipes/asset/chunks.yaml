    运行你的应用程序后，你将能够检测到图像中的任何人脸，这些人脸会显示在下方的 `UIImageView` 中，如图 15–24 所示。\n\n![Image](img/9781430240051_Fig15-24.jpg)\n\
    \n**图 15–24。** *你的应用程序从图像中检测并裁剪出人脸*\n\n### 总结\n\n图像构筑了我们的世界。从孩子们喜爱的最简单的图画书，到通过\
    \ Twitter、电子邮件、Facebook、Tumblr 以及其他所有网络服务在互联网上传输的海量视觉数据，图片和图像无疑已成为现代文化的关键基石之一。因此，通过学习在应用程序中创建、处理、操作和显示图像，你能够与用户建立更深入的联系，传达更强烈的情感反应，并以比以往更灵活、更具掌控力的方式进行交互。从构建彩色形状到显示照片，再到最新的\
    \ iOS 5.0 中新增的图像处理功能，你能够创建出更具趣味性和实用性的应用程序。Core Image 框架更是通过添加图像滤镜（可创造风格迥异的图像）和人脸检测软件（可从你的应用中提供更深入的信息）进一步增强了这种能力。就目前的技术发展水平而言，“一图胜千言”这种说法可以说是一种极大的保守说法。\n\
    \n## 第 16 章\n\n## Game Kit 技巧\n\n在本章中，你将使用一个简单的 Hangman 游戏，并将其与 Game Center 集成。Game\
    \ Center 允许你通过提供简便的方法来实现社交功能，例如高分、游戏成就和多人游戏玩法，从而增强你的游戏。添加这些功能不仅能为你的游戏带来更多价值，还能延长游戏的“重复游玩性”。\n\
    \n你将从添加高分和成就开始，最终让你的游戏支持多人模式。你可以在此处找到该项目的起点：[`https://github.com/shawngrimes/HangmanMP`](https://github.com/shawngrimes/HangmanMP)。\n\
    \n### 技巧 16–1：从 Game Center 开始\n\n在开始使用 Game Center 之前，你需要使用 iTunes Connect。如果你已经向\
    \ iTunes App Store 提交过应用程序或游戏，那么你已经知道 iTunes Connect 是什么了。对于那些尚未提交的人来说，iTunes\
    \ Connect 是你管理所发布应用程序的地方。你将输入应用程序的元数据（描述、关键词、支持 URL 等），以及它将要使用的由 Apple 提供的任何功能，例如\
    \ iAd、应用内购买，或者（在此例中）Game Center。\n\n为了使用 Game Center，你需要向 iTunes Connect 告知你的游戏信息，以便开始使用\
    \ Game Center 沙盒。Game Center 沙盒是一个开发环境，开发者可以在其中测试其 Game Center 集成，而不会影响正式环境下的分数或成就。\n\
    \n#### iTunes Connect 设置\n\n启用 Game Center 集成的第一步是，如果你尚未为你的应用创建 bundle identifier，则在\
    \ iOS Provisioning Portal 中创建一个。Bundle identifier 用于标识一个应用的所有相关数据。例如，如果你的游戏有免费版和付费版，并且你希望它们使用同一个高分排行榜，那么你可以为它们赋予相同的\
    \ bundle identifier。\n\n访问 `developer.apple.com` 上的 iOS Provisioning Portal，然后点击\
    \ “App IDs”。创建你的新 bundle identifier。图 16–1 中显示的信息就是你在本游戏中将使用的应用信息。\n\n![Image](img/9781430240051_Fig16-01.jpg)\n\
    \n**图 16–1.** *配置你的 App ID*\n\n现在，前往 `itunesconnect.apple.com`，点击 “Manage Your\
    \ Applications”。如果你尚未提交应用以供审核，请点击 “Add New App” 按钮，此时会显示一个类似于图 16–2 的页面。输入你新应用的信息，然后点击\
    \ “Continue”。\n\n![Image](img/9781430240051_Fig16-02.jpg)\n\n**图 16–2.** *输入你的应用信息*\n\
    \n一旦你输入了有关应用的所有元数据，包括截图和应用图标，你就可以启用 Game Center 了。点击图 16–3 中所示的 “Manage Game Center”\
    \ 按钮，然后点击 “Enable”。\n\n![Image](img/9781430240051_Fig16-03.jpg)\n\n**图 16–3.**\
    \ *访问 Game Center 管理页面*\n\n启用后，你就可以配置排行榜和成就了（后续会有更多介绍）。"
- fmt: '#### Project Setup


    Now get your game code set up to use Game Center. Open your project (or the one
    provided for this chapter) in Xcode.


    Once Xcode is open, click your project name in the project navigator and select
    the desired target. Go to the Build Phases tab, and expand the Link Binaries With
    Libraries area. You want to add the Game Kit framework, so click the `+` button
    highlighted in [Figure 16–4](#Chapter16.html#fig_16_4).


    ![Image](images/9781430240051_Fig16-04.jpg)


    **Figure 16–4.** *Build Phases tab for adding frameworks*


    In the resulting pop-up resembling [Figure 16–5](#Chapter16.html#fig_16_5), search
    for Game Kit and click Add.


    ![Image](images/9781430240051_Fig16-05.jpg)


    **Figure 16–5.** *Adding the Game Kit framework to a project*


    If your game can work without Game Center, then you''ll want to make this an optional
    framework rather than a required one, in which case your frameworks list will
    resemble [Figure 16–6](#Chapter16.html#fig_16_6).


    ![Image](images/9781430240051_Fig16-06.jpg)


    **Figure 16–6.** *Configuring the Game Kit framework to be optional*


    If you want to require Game Center, then feel free to leave it as required, but
    you''ll need to do one other step to require Game Center. Open the Info tab of
    your target, and add "gamekit" to the list of required device capabilities, as
    in [Figure 16–7](#Chapter16.html#fig_16_7).


    ![Image](images/9781430240051_Fig16-07.jpg)


    **Figure 16–7.** *Adding "gamekit" as a required device capability*


    While you are editing the Info tab, make sure your bundle identifier matches what
    you put in iTunes Connect, as in [Figure 16–8](#Chapter16.html#fig_16_8).


    ![Image](images/9781430240051_Fig16-08.jpg)


    **Figure 16–8.** *Confirming the correct bundle identifier in your app to be the
    same as was used in iTunes Connect*


    You can now include Game Center functionality in your code by adding the statement
    `#import <GameKit/GameKit.h>` to your code. Start by making sure Game Center is
    available on this device.


    #### Checking for Game Center Support


    First, create a method for checking for Game Center support. I''ll add it to the
    app delegate so that you can check the state at any point in the game. Start by
    importing Game Kit into the implementation file (`.m`), and create a method for
    checking the availability of Game Center:


    ```

    #import "HMAppDelegate.h"

    #import <GameKit/GameKit.h>


    @implementation HMAppDelegate

    @synthesize window = _window;


    +(BOOL) isGameCenterAvailable

    {

        // Check for presence of GKLocalPlayer class.

        BOOL localPlayerClassAvailable = (NSClassFromString(@"GKLocalPlayer")) !=
    nil;


        // The device must be running iOS 4.1 or later.

        NSString *reqSysVer = @"4.1";

        NSString *currSysVer = [[UIDevice currentDevice] systemVersion];

        BOOL osVersionSupported = ([currSysVer compare:reqSysVer

                                               options:NSNumericSearch] !=

    NSOrderedAscending);


        return (localPlayerClassAvailable && osVersionSupported);

    }

    ```


    In your interface file (`.h`), add a declaration for `isGameCenterAvailable` so
    other classes can use it and autocomplete will see it:


    ```

    #import <UIKit/UIKit.h>


    @interface HMAppDelegate : UIResponder <UIApplicationDelegate>


    @property (strong, nonatomic) UIWindow *window;


    +(BOOL) isGameCenterAvailable;


    @end

    ```


    #### Player Authentication


    You want to authenticate your player as soon as possible. This is best done as
    soon as your game is finished launching, so you''ll add a method to your app delegate
    `didFinishLaunchingWithOptions:` method. First, though, switch to your interface
    file and add a property for your local player to your app delegate so you can
    access it whenever needed.


    Since you imported `GameKit.h` into the implementation file, you''ll need to tell
    your interface file that a class of `GKLocalPlayer` exists. You can do this with
    the following line under the import statements in the interface file:


    `@class GKLocalPlayer;`


    Then add a property for `GKLocalPlayer`:


    `@property(strong, nonatomic) GKLocalPlayer *localPlayer;`


    The final app delegate interface file looks like this:


    ```

    #import <UIKit/UIKit.h>


    @class GKLocalPlayer;


    @interface HMAppDelegate : UIResponder <UIApplicationDelegate>


    @property (strong, nonatomic) UIWindow *window;

    @property(strong, nonatomic) GKLocalPlayer *localPlayer;


    +(BOOL) isGameCenterAvailable;


    @end

    ```


    Switch over to the implementation file and synthesize your new property:


    `@synthesize localPlayer;`


    Change your `didFinishLaunchingWithOptions:` to look like the following. This
    will authenticate the player and set the `localPlayer` property to the `localPlayer`:


    ```

    - (BOOL)application:(UIApplication *)application

    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions

    {

        // Override point for customization after application launch.

        if([HMAppDelegate isGameCenterAvailable]){

            //If GameCenter is available, let''s authenticate the user

            GKLocalPlayer *_localPlayer=[GKLocalPlayer localPlayer];

            [_localPlayer authenticateWithCompletionHandler:^(NSError *error) {

                if(localPlayer.isAuthenticated){

                    self.localPlayer=localPlayer;

                }

            }];

        }

        return YES;

    }

    ```


    Some notes on this: you should always check the property `isAuthenticated` rather
    than checking to see if there is an error. If there is an error, Game Kit may
    be able to authenticate the user with cached data and authenticate anyway. You
    shouldn''t display the errors to the user—Game Center will do that for you. The
    errors are mostly for debugging.


    That''s pretty much all there is to authenticating a user. When you run your app,
    it will prompt you to log in or create a new account, as in [Figure 16–9](#Chapter16.html#fig_16_9).
    Authenticated users can be passed between apps, so if you or a user have authenticated
    to Game Center in another app, this can be passed to your app without prompting
    you to log in again.


    ![Image](images/9781430240051_Fig16-09.jpg)


    **Figure 16–9.** *Your application prompting for a Game Center account*


    ### Recipe 16–2: Leaderboards


    You are now able to authenticate your user. Let''s start storing some high scores.
    Leaderboards, a.k.a. high scores, are a great way to increase replay value of
    your game and encourage competition among friends. You first need to create a
    leaderboard in iTunes Connect, so head over to `itunesconnect.apple.com`.'
