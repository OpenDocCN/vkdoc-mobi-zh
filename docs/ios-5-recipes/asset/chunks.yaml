    through the use of the delegate method `-imagePickerController:didFinishPickingMediaWithInfo:`.
    This method gives the delegate an instance of `NSDictionary` called `info`, with
    keys referring to the selected media.


    First, you create an instance of `UIImage` to point to the selected image.


    `UIImage *originalImage = (UIImage *) [info`

    `objectForKey:UIImagePickerControllerOriginalImage];`


    Next you will save this image to your device''s album, so that the picture is
    usable outside of this app. Alternatively, if you did not want your app to save
    several pictures as you use it for testing, you could comment out this line:


    `UIImageWriteToSavedPhotosAlbum (originalImage, nil, nil , nil);`


    Now you set your `UIImageView`''s image to be the chosen image, and also change
    the content mode of the `UIImageView`.


    `self.imageViewRecent.image = originalImage;`

    `self.imageViewRecent.contentMode = UIViewContentModeScaleAspectFill;`


