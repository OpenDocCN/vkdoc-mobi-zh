    hashtags, phrases, and usernames. Try searching for #miami and see what results
    you get!


    **NOTE:** If at any point you are unsure of the format of your JSON data retrieved
    from Twitter, you can simply take the URL used to make your request and enter
    it in your web browser. You will receive a text view of the exact same data you
    would have gotten. It can be a little difficult to read due to a lack of space
    formatting, but you can look for the necessary layers of content needed to build
    your application.


    ### Summary


    Throughout this chapter, we have gone over a great deal of sample code making
    use of the Twitter framework, with subjects from pre-defined user interfaces to
    send tweets, to custom-formatted requests to acquire specifically filtered data
    directly from Twitter. Our basic implementations can easily serve as the groundwork
    of much more complex applications. Integration with the Twitter service is not
    simply limited to posting and displaying tweets, and can easily enhance the functionality
    and power of nearly any application. Considering the popularity and consistent
    growth of Twitter itself, it is certain that iOS''s integration can only become
    more profound, allowing developers simpler access to one of the modern world''s
    most powerful web services.


    ## Chapter 15


    ## Image Recipes


    Often times a developer is faced with an all-too common problem: Too much information
    to display with not enough space to show it. For this, you turn to images. Pictures
    and graphics allow you to convey a variety of information far beyond simple text,
    combining emotion, information, and style. In iOS, you have multiple different
    methods with which to create, utilize, manipulate, and display images. New to
    iOS 5.0 even is the ability to apply filters to images, allowing for drastic alteration
    of display with very little actual code. By understanding these inherent functionalities
    and techniques in iOS, you are able to more easily implement stronger, more powerful,
    and more informative applications.'
