    from the `.xib` file to the interface file (`.h`). Create a `UILabel` outlet named
    “labelRegionInfo” and an `IBAction` for the `UISwitch` named “regionMonitoringToggle”,
    following [Figures 4–22](#Chapter04.html#fig_4_22), [4–23](#Chapter04.html#fig_4_23),
    [4–24](#Chapter04.html#fig_4_24), and [4–25](#Chapter04.html#fig_4_25).


    ![Image](images/9781430240051_Fig04-22.jpg)


