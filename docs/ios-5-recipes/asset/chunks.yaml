    You can also set the title for the view controller, which will appear at the top
    your of navigation bar with a simple command.


    `    self.title = @"Countries";`


    For the sake of organization, all the methods that a `UITableView` can call are
    split into two groups, the `delegate` methods and the `data source` methods. `Delegate`
    methods are used to handle any kind of visual elements of the `UITableView`, such
    as the row height of cells. `Data source` methods, on the other hand, deal with
    the information displayed in the `UITableView`, such as the configuration of any
    given cell’s information.


    In order to correctly create an ungrouped `UITableView`, there are two main methods
    that you must correctly implement.


    First, you need to specify to your `UITableView` how many rows will be displayed
    via the `-tableView:numberOfRowsInSection:` method.


    `-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`

    `{`

    `    return [self.countries count];`

    `}`


    Since your table is ungrouped, you have only one section, so this method is nice
    and easy.


    Second, you must create a method to specify how the `UITableView`’s cells are
    configured using the `-tableView:cellForRowAtIndexPath:` method. Here is a generic
    implementation of this method that you will modify for your data.


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath`

    `{`

    `    static NSString *CellIdentifier = @"Cell";`


    `    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];`

    `    if (cell == nil)`

    `{`

    `        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault
    reuseIdentifier:CellIdentifier];`

    `        cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;`

    `        cell.textLabel.font = [UIFont systemFontOfSize:`

    `19.0];`

    `        cell.detailTextLabel.font = [UIFont systemFontOfSize:`

    `12];`

    `    }`


    `    cell.textLabel.text=[NSString stringWithFormat:@"Cell %i", indexPath.row];`


    `    return cell;`

    `}`


    Whenever you are dealing with a `UITableView`, it is pretty much always a good
    idea to “reuse” cells. Since most of the time not all the cells in a `UITableView`
    will be currently in the view of the user, you are able to reuse any cells that
    are not currently being displayed through the use of the `UITableView` method
    `-dequeueReusableCellWithIdentifier:`, allowing you to save on both memory and
    time, since you can perform any generic setup, such as font size, background color,
    etc., only on the initial creation of the cell.


    In the previous sample, you can see that you first attempt to de-queue a reusable
    cell. If none are available (i.e., if `cell` is `nil`), then you create a new
    cell and give it a generic setup that can be reused for all of your cells. Then,
    no matter whether the cell was de-queued or created, you update the text to the
    appropriate value.


    It is even possible to set up multiple differently configured cells, and specify
    which one is used or reused via the `CellIdentifier`.


    The last task you need to do to get your program running is ensure that the application
    delegate, at the start of your program, will present your view controller. Xcode
    did not do this for you already because you chose the empty template.


    In your application delegate implementation, import the header file of your view
    controller so that the compiler doesn’t complain.


    `    #import "MainTableViewController.h"`


    You will need to set up properties in your application delegate’s header file
    to store both your `UINavigationController` and your main view controller. Create
    these like so:


    `    @property (nonatomic, strong) UINavigationController *navcon;`

    `    @property (nonatomic, strong) MainTableViewController *tableVC;`


    Make sure to synthesize both with the following line in your application delegate
    implementation file.


    `    @synthesize navcon, tableVC;`'
  trans: "\n`self.tableViewCountries.delegate = self;`  \n`self.tableViewCountries.dataSource\
    \ = self;`\n\n你也可以通过一条简单的命令为视图控制器设置标题，该标题将显示在导航栏顶部。\n\n`self.title = @\"Countries\"\
    ;`\n\n为了便于组织，`UITableView` 可以调用的所有方法分为两组：`delegate` 方法和 `data source` 方法。`Delegate`\
    \ 方法用于处理 `UITableView` 的任何视觉元素，例如单元格的行高。而 `data source` 方法则处理 `UITableView` 中显示的信息，例如任意给定单元格信息的配置。\n\
    \n为了正确创建一个无分组的 `UITableView`，你必须正确实现两个主要方法。\n\n首先，你需要通过 `-tableView:numberOfRowsInSection:`\
    \ 方法指定 `UITableView` 中要显示的行数。\n\n```\n-(NSInteger)tableView:(UITableView *)tableView\
    \ numberOfRowsInSection:(NSInteger)section\n{\n    return [self.countries count];\n\
    }\n```\n\n由于你的表格是无分组的，只有一个分区，因此这个方法非常简单易用。\n\n其次，你必须创建一个方法，通过 `-tableView:cellForRowAtIndexPath:`\
    \ 方法指定 `UITableView` 的单元格如何配置。以下是该方法的通用实现，你可以根据数据进行修改。\n\n```\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    static NSString *CellIdentifier = @\"Cell\";\n\n    UITableViewCell *cell\
    \ = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell\
    \ == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\
    \ reuseIdentifier:CellIdentifier];\n        cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n\
    \        cell.textLabel.font = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font\
    \ = [UIFont systemFontOfSize:12];\n    }\n\n    cell.textLabel.text=[NSString\
    \ stringWithFormat:@\"Cell %i\", indexPath.row];\n\n    return cell;\n}\n```\n\
    \n每当你处理 `UITableView` 时，“复用”单元格几乎总是一个好主意。由于大多数情况下，`UITableView` 中并非所有单元格都同时显示在用户视野中，你可以通过\
    \ `UITableView` 方法 `-dequeueReusableCellWithIdentifier:` 复用当前未显示的单元格，从而节省内存和时间，因为你只需在初始创建单元格时执行任何通用设置（如字体大小、背景颜色等）。\n\
    \n在上面的示例中，你可以看到首先尝试出列一个可复用的单元格。如果没有可用的（即 `cell` 为 `nil`），则创建一个新单元格并为其进行通用设置，这些设置可以用于所有单元格。然后，无论单元格是出列还是新建的，你都将文本更新为适当的值。\n\
    \n你甚至可以通过 `CellIdentifier` 设置多个配置不同的单元格，并指定使用或复用哪一个。\n\n要让程序运行起来，最后需要做的是确保应用程序委托在程序启动时呈现你的视图控制器。Xcode\
    \ 没有自动完成这一步，因为你选择了空模板。\n\n在你的应用程序委托实现中，导入视图控制器的头文件，这样编译器就不会报错。\n\n```\n#import\
    \ \"MainTableViewController.h\"\n```\n\n你需要在应用程序委托的头文件中设置属性，以存储你的 `UINavigationController`\
    \ 和主视图控制器。请按如下方式创建：\n\n```\n@property (nonatomic, strong) UINavigationController\
    \ *navcon;\n@property (nonatomic, strong) MainTableViewController *tableVC;\n\
    ```\n\n确保在应用程序委托的实现文件中使用以下代码对两者进行合成。\n\n```\n@synthesize navcon, tableVC;\n```\n"
- fmt: "Now you just need to create your `UINavigationController` to display and manage\
    \ the view controller and add its view as a subview of your application’s window.\
    \ Overall, your `-application:didFinishLaunchingWithOptions:` method should look\
    \ like so:\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    self.tableVC = [[MainTableViewController alloc] init];\n\
    \    self.navcon = [[UINavigationController alloc] initWithRootViewController:tableVC];\n\
    \    [self.window addSubview:navcon.view];\n    [self.window makeKeyAndVisible];\n\
    \    return YES;\n}\n```\n\nUpon running this project in the simulator, you will\
    \ see a basic view of a `UITableView` with some generic information, as in [Figure\
    \ 9–5](#Chapter09.html#fig_9_5).\n\n![Image](images/9781430240051_Fig09-05.jpg)\n\
    \n**Figure 9–5.** *Basic application with a `UITableView`*\n\nNow that your application\
    \ is up, running, and displaying some kind of information, you can work on your\
    \ specific implementation.\n\nTo configure your `-tableView:cellForRowAtIndexPath:`\
    \ method to properly fit your data, the first thing you need to do is change the\
    \ display style of your rows. Modify the allocation/initialization line in your\
    \ method to resemble the following:\n\n```\ncell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\n\
    reuseIdentifier:CellIdentifier];\n```\n\nThere are four different `UITableViewCell`\
    \ styles that you can use, each with a slightly different display:\n\n* `UITableViewCellStyleDefault`:\
    \ Only one label, as shown in [Figure 9–5](#Chapter09.html#fig_9_5)\n* `UITableViewCellStyleSubtitle`:\
    \ Just like the Default style, but with a second subtitle line underneath the\
    \ main text\n* `UITableViewCellStyleValue1`: Two text lines, with the primary\
    \ line on the left side of the cell and the secondary detail text label on the\
    \ right\n* `UITableViewCellStyleValue2`: Two text lines with the focus on the\
    \ detail text label\n\nOf these four styles, only the `UITableViewCellStyleDefault`\
    \ style has only one line of text.\n\nNext, you can set the cell’s text label\
    \ to actually be the name of the country, rather than simply the count of the\
    \ cell. Adjust the setting of the `cell.textLabel.text` property that is done\
    \ last in the method to the following:\n\n```\n    cell.textLabel.text = [(Country\
    \ *)[self.countries objectAtIndex:indexPath.row]\nname];\n```\n\nAll you had to\
    \ do here was grab the respective `Country` object, and call the `-name` method\
    \ on it that was synthesized.\n\nYou can set the subtitle of the text very similarly\
    \ using the `detailTextLabel` property of the cell.\n\n```\n    cell.detailTextLabel.text\
    \ = [(Country *)[self.countries objectAtIndex:indexPath.row]\ncapital];\n```\n\
    \nThe `UITableViewCell` class also has a property called `imageView`, which, when\
    \ given an image, places the given image to the left of the title label. Implement\
    \ this by adding the following line to your cell configuration:\n\n```\n    cell.imageView.image\
    \ = [(Country *)[self.countries objectAtIndex:indexPath.row]\nflag];\n```\n\n\
    You’ll probably notice that if you run your program now, all of your flags will\
    \ appear, but with widely varying aspect ratios, making your view look less professional.\
    \ Setting the frame of the cell’s `imageView` will not fix this problem, so here\
    \ is a quick solution.\n\nFirst, define a method that will redraw a `UIImage`\
    \ into a given size, like so:\n\n```\n+ (UIImage *)scale:(UIImage *)image toSize:(CGSize)size\n\
    {\n    UIGraphicsBeginImageContext(size);\n    [image drawInRect:CGRectMake(0,\
    \ 0, size.width, size.height)];\n    UIImage *scaledImage = UIGraphicsGetImageFromCurrentImageContext();\n\
    \    UIGraphicsEndImageContext();\n    return scaledImage;\n}\n```\n\nPlace this\
    \ method’s handler in your header file to avoid any potential compiler problems.\
    \ This handler will be written like so:\n\n```\n+ (UIImage *)scale:(UIImage *)image\
    \ toSize:(CGSize)size;\n```\n\nThen, you can adjust your `image` setting lines\
    \ of code to utilize this method.\n\n```\nUIImage *flag = [(Country *)[self.countries\
    \ objectAtIndex:indexPath.row] flag];\ncell.imageView.image = [MainTableViewController\
    \ scale:flag toSize:CGSizeMake(115, 75)];\n```\n\nAfter all these configurations,\
    \ your newly configured `-tableView:cellForRowAtIndexPath:` method should resemble\
