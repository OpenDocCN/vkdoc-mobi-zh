    \n区域是当前显示的地图部分，由一个中心坐标以及围绕中心坐标的纬度和经度距离构成。如果你和大多数人一样不习惯用经纬度来思考距离，可以使用`MKCoordinateRegionMakeWithDistance`方法，通过中心坐标和围绕该坐标的米数来创建区域。如果你对公制单位不熟悉，1\
    \ 米比 1 码稍长一点。\n\n在本示例中，我选择将地图初始平移到显示我的家乡马里兰州巴尔的摩。我为该位置定义了一个坐标，然后定义一个包含该中心坐标周围\
