    ## Summary


    You are responsible, when creating your applications, to always have the user
    in mind. Every single aspect of your application should be designed to both allow
    and help the user to accomplish a goal, and each aspect should then be optimized
    to expedite these goals. Functionalities to transmit data, such as sending text
    messages, constructing e-mails, or creating printouts, tend to be overlooked as
    unnecessary in this process, and most often erroneously. Developers must always
    be careful to think from the user''s standpoint, and imagine what a user could
    do with any given feature. The simple possibility of printing content for later
    use, or being able to easily e-mail an interesting image to a friend, could easily
    be the dividing line between what makes a customer buy your app over someone else''s.
    By understanding and utilizing these "extra" functionalities, you are able to
    drastically improve the functionality of your applications in order to better
    serve your end users.


