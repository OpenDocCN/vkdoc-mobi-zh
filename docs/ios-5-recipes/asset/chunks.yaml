    be working with most is your `EKEventStore`. This class will be an incredibly
    powerful tool in allowing you to access, delete, and save events to your calendars.
    You will create a property of this type in your header file like so:


    `@property (strong, nonatomic) EKEventStore *eventStore;`


    Make sure to @synthesize this property, and then set it to `nil` in your `-viewDidUnload`.


