    \ 来输入自定义坐标，然后在此处输入你自己的坐标进行测试。\n\n## 食谱 4–6：反向地理编码与正向地理编码\n\n位置坐标对应用程序很有用，但对人类来说并不友好。你上一次用经纬度坐标写地址是什么时候？这实在不便于人类理解。人类的位置通常用国家、州、城市等名称来表示。因此，当设备用户询问“我在哪里？”时，用户并不想知道\
