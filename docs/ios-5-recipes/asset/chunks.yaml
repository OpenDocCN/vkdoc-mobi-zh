    ### Summary


    Apple has provided iOS developers with an updated application development environment
    in Xcode 4\. While not perfect, it does offer many improvements over previous
    versions and is worthy of some praise. The transition between Xcode 3 and 4 may
    be difficult and time-consuming, but once you have been converted, you will be
    writing code more efficiently and easily in the new interface.


    New enhancements, such as source control with remote repositories, will make your
    project development with teams more seamless and provide independent developers
    with the ability to remotely store source code for safekeeping.


    ## Chapter 2


    ## Introduction to Interface Builder


    One of the many changes introduced in Xcode 4 was the consumption of Interface
    Builder into the main Xcode application. Interface Builder became a core component
    of Xcode and was able to run in the same windows and tabs as Xcode. The change
    was more than just a simple embedding of one application into another. As you
    will see in this chapter, the way that Interface Builder interacts with your source
    code makes it more of a well-intentioned integration into Xcode.


    ### Interface Builder Walkthrough


    When you click on a `.xib` (user interface) file in the navigator pane of Xcode,
    Interface Builder will seamlessly load into the editor pane. Generally, when I’m
    working with `.xib` files, I will close the navigator pane and show the utility
    area on the right. This gives me the most screen real estate for visually creating
    the interfaces, as shown in [Figure 2–1](#Chapter02.html#fig_2_1).


    ![Image](images/9781430240051_Fig02-01.jpg)


    **Figure 2–1.** *Interface Builder in use*


    By clicking an object in the outline view dock on the left side, you can see the
    object’s attributes and settings in the inspector pane on the right side. The
    inspector pane should be very familiar to anyone who has worked with Interface
    Builder before. The object browser has also been integrated into the library pane
    below the inspector pane. This creates one-stop shopping for your `.xib` design
    needs.


    ### Our Forces Combined…


    With the integration of Interface Builder into Xcode, it extends beyond just two
    tools in one. Just as in the cartoon Voltron, when the combination of individual
    tiger robots resulted in an incredible defender of the galaxy, Interface Builder
    when combined with the Assistant Editor view creates a super tool for source code.
    [Figure 2–2](#Chapter02.html#fig_2_2) shows a prime example of this useful combination.


    ![Image](images/9781430240051_Fig02-02.jpg)


    **Figure 2–2.** *Using Interface Builder with the Assistant Editor*


    When the Assistant Editor is visible and you select one of the objects in the
    `.xib`’s object browser on the left, any existing header file for the associated
    view controller is loaded. At first this appears to be minimally useful. You can
    see your code and the `.xib` file. The real magic comes when you ^-click-drag
    one of those objects to the interface (`.h`) file. As [Figure 2–3](#Chapter02.html#fig_2_3)
    shows, a blue line will extend into the code, and when you release it in the right
    pane of the Assistant Editor, you will be prompted to create an outlet.


    ![Image](images/9781430240051_Fig02-03.jpg)


    **Figure 2–3.** *Connecting an outlet automatically*


    When you release the mouse button, Xcode will prompt you for the name of this
    outlet connection, as shown in [Figure 2–4](#Chapter02.html#fig_2_4). After you
    specify a name and click Connect, Xcode will create all the necessary code to
    connect the `.xib`’s object to your interface (`.h`) file and implementation (`.m`)
    file.


    ![Image](images/9781430240051_Fig02-04.jpg)


    **Figure 2–4.** *Configuring an outlet’s creation*


    The header file now looks like this:


    `//`

    `//  sample1ViewController.h`

    `#import <UIKit/UIKit.h>`

    `@interface sample1ViewController : UIViewController {`

    `    UILabel *labelHelloWorld;`

    `}`


    `@property (strong, nonatomic) IBOutlet UILabel *labelHelloWorld;`


    `@end`


    And the relevant code from the implementation (`.m`) file now looks like this:


    `//`

    `//  sample1ViewController.m`

    `#import "sample1ViewController.h"`


    `@implementation sample1ViewController`

    `@synthesize labelHelloWorld;`


    `- (void)viewDidUnload`

    `{`

    `    [self setLabelHelloWorld:nil];`

    `[super` `viewDidUnload``];`

    `    // Release any retained subviews of the main view.`

    `    // e.g. self.myOutlet = nil;`

    `}`


    `@end`


    You can use the same steps to create `IBAction`s for buttons and other objects.
    ^-click-drag from a button or similar object in the `.xib` to the implementation
    (`.h`) file and release. This time, change the drop-down menu for Connection from
    Outlet to Action. If this option does not appear, the wrong type of object was
    selected. [Figures 2–5](#Chapter02.html#fig_2_5) and [2–6](#Chapter02.html#fig_2_6)
    detail the process of configuring an action in this way.


    ![Image](images/9781430240051_Fig02-05.jpg)


    **Figure 2–5.** *Creating an action*


    ![Image](images/9781430240051_Fig02-06.jpg)


    **Figure 2–6.** *Configuring an action*


    You can specify the name of the action, the type, the event to trigger the action
    on, and the arguments to send. Just like the Outlet connection, the code will
    be updated with placeholders to support your new action.


    The interface (`.h`) file now includes the `IBAction` declaration:


    `//`

    `//  sample1ViewController.h`

    `#import <UIKit/UIKit.h>`


    `@interface sample1ViewController : UIViewController {`

    `    UILabel *labelHelloWorld;`

    `}`


    `@property (strong, nonatomic) IBOutlet UILabel *labelHelloWorld;`

    `- (IBAction)tickleTheLabel:(id)sender;`


    `@end`


    And the implementation (`.m`) file includes a method placeholder for you to complete:


    `- (IBAction)tickleTheLabel:(id)sender {`

    `}`


    I’m going to complete the `tickleTheLabel` method with the following code:


    `- (IBAction)tickleTheLabel:(id)sender {`

    `    self.labelHelloWorld.text=@"That tickled";`

    `}`


    [Figures 2–7](#Chapter02.html#fig_2_7) and [2–8](#Chapter02.html#fig_2_8) show
    that now, when the app is run and the button touched, the `labelHelloWorld` is
    updated.


    ![Image](images/9781430240051_Fig02-07.jpg)


    **Figure 2–7.** *Original view*


    ![Image](images/9781430240051_Fig02-08.jpg)


    **Figure 2–8.** *View after action performed*'
  trans: "\n### 行为\n\nXcode 4 在编辑界面中引入了行为功能。通过这些行为，你可以在 Xcode 中执行操作时运行自定义命令或脚本。访问行为的方式是进入\
    \ `Xcode` ![Image](img/U001.jpg) `Behaviors` ![Image](img/U001.jpg) `Edit Behaviors`。\
    \ 图 1–35 展示了打开后的窗口。\n\n你可以自定义左侧窗格中可用的操作，这些操作对应右侧窗格中的行为。例如，我喜欢使用的一个行为是打开一个包含构建错误的独立标签页。这样可以保留我的编辑标签页，让我能够在构建成功或失败（通常是后者）后，从上次中断的地方继续工作。图\
    \ 1–35 中的行为将会创建或显示名为“Build Results”的标签页，显示问题导航器，显示调试器窗格，并导航到找到的第一个问题（如果有）。\n\n\
    ![Image](img/9781430240051_Fig01-35.jpg)\n\n**图 1–35.** *配置行为*\n\n你也可以添加通过快捷键触发的自定义行为。点击行为窗格底部的\
    \ `+`，为你的自定义行为设置一个名称。现在，点击该行末尾的命令键符号（![Image](img/U003.jpg)）来设置你的键盘快捷键。\n\n###\
    \ 总结\n\nApple 通过 Xcode 4 为 iOS 开发者提供了一个更新的应用开发环境。虽然它并非完美无缺，但确实相比之前的版本带来了许多改进，值得称赞。从\
    \ Xcode 3 过渡到 Xcode 4 可能会很困难且耗时，但一旦你适应了，你将能够在新的界面中更高效、更轻松地编写代码。\n\n新的增强功能，例如支持远程仓库的源代码控制，将使你的团队项目开发更加无缝，并为独立开发者提供远程存储源代码以确保安全的能力。\n\
    \n## 第 2 章：Interface Builder 简介\n\nXcode 4 引入的众多变化之一是将 Interface Builder 整合到主\
    \ Xcode 应用程序中。Interface Builder 成为了 Xcode 的一个核心组件，并且能够与 Xcode 在相同的窗口和标签页中运行。这一变化不仅仅是简单地将一个应用程序嵌入到另一个中。正如你将在本章中看到的，Interface\
    \ Builder 与源代码交互的方式使其更像是与 Xcode 进行了深思熟虑的集成。\n\n### Interface Builder 入门\n\n当你在\
    \ Xcode 的导航器窗格中点击一个 `.xib`（用户界面）文件时，Interface Builder 将无缝加载到编辑器窗格中。通常，在处理 `.xib`\
    \ 文件时，我会关闭导航器窗格并显示右侧的实用工具区域。这为我提供了最大的屏幕空间来直观地创建界面，如图 2–1 所示。\n\n![Image](img/9781430240051_Fig02-01.jpg)\n\
    \n**图 2–1.** *使用中的 Interface Builder*\n\n通过点击左侧大纲视图停靠栏中的对象，你可以在右侧的检查器窗格中查看该对象的属性和设置。对于任何之前使用过\
    \ Interface Builder 的人来说，检查器窗格应该非常熟悉。对象浏览器也已集成到检查器窗格下方的库窗格中。这为你的 `.xib` 设计需求提供了“一站式”服务。\n\
    \n### 我们的力量合而为一……\n\n随着 Interface Builder 集成到 Xcode 中，这不仅仅是两个工具合二为一那么简单。就像在动画片《战神金刚》中，独立的机器老虎组合成强大的银河卫士一样，Interface\
    \ Builder 与助理编辑器视图的结合为源代码创造了一个超级工具。图 2–2 展示了这一强大组合的绝佳示例。\n\n![Image](img/9781430240051_Fig02-02.jpg)\n\
    \n**图 2–2.** *将 Interface Builder 与助理编辑器结合使用*\n\n当助理编辑器可见并且你选择了左侧 `.xib` 文件对象浏览器中的一个对象时，相关的视图控制器的任何现有头文件都会被加载。起初这看起来用处不大。你可以同时看到你的代码和\
    \ `.xib` 文件。真正的魔力在于，当你 `^`-点击并拖拽其中一个对象到接口（`.h`）文件时，如图 2–3 所示，一条蓝线会延伸到代码中。当你在助理编辑器的右侧窗格中释放鼠标时，系统会提示你创建一个输出口。\n\
    \n![Image](img/9781430240051_Fig02-03.jpg)\n\n**图 2–3.** *自动连接输出口*\n\n当你释放鼠标按钮时，Xcode\
    \ 会提示你输入此输出口连接的名称，如图 2–4 所示。指定名称并点击“Connect”后，Xcode 将创建所有必要的代码，将 `.xib` 文件中的对象连接到你的接口（`.h`）文件和实现（`.m`）文件。\n\
    \n![Image](img/9781430240051_Fig02-04.jpg)\n\n**图 2–4.** *配置输出口的创建*\n\n现在头文件看起来像这样：\n\
    \n```\n//\n//  sample1ViewController.h\n#import <UIKit/UIKit.h>\n@interface sample1ViewController\
    \ : UIViewController {\n    UILabel *labelHelloWorld;\n}\n\n@property (strong,\
    \ nonatomic) IBOutlet UILabel *labelHelloWorld;\n\n@end\n```\n\n而实现（`.m`）文件中的相关代码现在看起来像这样：\n\
    \n```\n//\n//  sample1ViewController.m\n#import \"sample1ViewController.h\"\n\n\
    @implementation sample1ViewController\n@synthesize labelHelloWorld;\n\n- (void)viewDidUnload\n\
    {\n    [self setLabelHelloWorld:nil];\n    [super viewDidUnload];\n    // Release\
    \ any retained subviews of the main view.\n    // e.g. self.myOutlet = nil;\n\
    }\n\n@end\n```\n\n你可以使用相同的步骤为按钮和其他对象创建 `IBAction`。从 `.xib` 文件中的按钮或类似对象 `^`-点击并拖拽到实现（`.h`）文件，然后释放。这一次，将\
    \ Connection 下拉菜单从 Outlet 改为 Action。如果此选项没有出现，说明选中的对象类型错误。图 2–5 和 2–6 详细展示了以这种方式配置操作的流程。\n\
    \n![Image](img/9781430240051_Fig02-05.jpg)\n\n**图 2–5.** *创建操作*\n\n![Image](img/9781430240051_Fig02-06.jpg)\n\
    \n**图 2–6.** *配置操作*\n\n你可以指定操作的名称、类型、触发操作的事件以及要发送的参数。与输出口连接一样，代码将更新为包含支持你新操作的占位符。\n\
    \n接口（`.h`）文件现在包含了 `IBAction` 声明：\n\n```\n//\n//  sample1ViewController.h\n#import\
    \ <UIKit/UIKit.h>\n\n@interface sample1ViewController : UIViewController {\n \
    \   UILabel *labelHelloWorld;\n}\n\n@property (strong, nonatomic) IBOutlet UILabel\
    \ *labelHelloWorld;\n- (IBAction)tickleTheLabel:(id)sender;\n\n@end\n```\n\n并且实现（`.m`）文件包含了一个供你完成的方法占位符：\n\
    \n```\n- (IBAction)tickleTheLabel:(id)sender {\n}\n```\n\n我打算用以下代码来完成 `tickleTheLabel`\
    \ 方法：\n\n```\n- (IBAction)tickleTheLabel:(id)sender {\n    self.labelHelloWorld.text=@\"\
    That tickled\";\n}\n```\n\n图 2–7 和 2–8 显示，现在当应用程序运行并且按钮被触摸时，`labelHelloWorld`\
    \ 会更新。\n\n![Image](img/9781430240051_Fig02-07.jpg)\n\n**图 2–7.** *原始视图*\n\n![Image](img/9781430240051_Fig02-08.jpg)\n\
    \n**图 2–8.** *执行操作后的视图*\n"
- fmt: "### Touches Too\n\nOne of the new features implemented into Interface Builder\
    \ is the ability to assign touch gesture recognizers to objects directly in Interface\
    \ Builder. The various gestures are available in the lower right section of Xcode,\
    \ resembling the pane shown in [Figure 2–9](#Chapter02.html#fig_2_9).\n\n![Image](images/9781430240051_Fig02-09.jpg)\n\
    \n**Figure 2–9.** *Available gesture recognizers*\n\nTo add a gesture recognizer\
    \ to an object in a `.xib`, just drag and drop the gesture recognizer from the\
    \ object browser onto the object you want to add it to, similarly to that shown\
    \ in [Figure 2–10](#Chapter02.html#fig_2_10). This will add the gesture recognizer\
    \ to the Objects list in the `.xib` project file, as shown in [Figure 2–11](#Chapter02.html#fig_2_11).\n\
    \n![Image](images/9781430240051_Fig02-10.jpg)\n\n**Figure 2–10.** *Adding a gesture\
    \ recognizer to an element*\n\n![Image](images/9781430240051_Fig02-11.jpg)\n\n\
    **Figure 2–11.** *Resulting gesture recognizer in the outline view*\n\nBefore\
    \ you proceed, it’s important that user interaction is enabled for the object\
    \ that you want to add the gesture recognizer to. In this case, you attached it\
    \ to the Hello World label, and you can set user interaction to `true` by clicking\
    \ the label and going to the Attributes inspector tab. Under the View options,\
    \ click the check box next to User Interaction Enabled, as shown in [Figure 2–12](#Chapter02.html#fig_2_12).\
    \ This will ensure that the object responds to gesture recognizers.\n\n![Image](images/9781430240051_Fig02-12.jpg)\n\
    \n**Figure 2–12.** *The Attributes inspector*\n\nBy clicking the gesture recognizer\
    \ in the `.xib`’s dock outline view, you can set the settings for the gesture\
    \ recognizer in the Attributes inspector pane. [Figure 2–13](#Chapter02.html#fig_2_13)\
    \ demonstrates the various configurations that can be applied to this recognizer.\n\
    \n![Image](images/9781430240051_Fig02-13.jpg)\n\n**Figure 2–13.** *Adjusting attributes\
    \ of gesture recognizer*\n\nNow that the settings have been enabled, you can connect\
    \ the gesture to an `IBAction` by following the same procedures as ^-click-drag\
    \ from the gesture recognizer object to the interface (`.h`) file in the Assistant\
    \ Editor pane. In the resulting pop-up, resembling [Figure 2–14](#Chapter02.html#fig_2_14),\
    \ specify a name and click Connect. The placeholders for that action will be added\
    \ to your code just as before.\n\n![Image](images/9781430240051_Fig02-14.jpg)\n\
    \n**Figure 2–14.** *Connecting an action to the label*\n\nNow your interface file\
    \ looks like this:\n\n```\n//\n//  sample1ViewController.h\n#import <UIKit/UIKit.h>\n\
    \n@interface sample1ViewController : UIViewController {\n    UILabel *labelHelloWorld;\n\
    \    UITapGestureRecognizer *tapTheLabel;\n}\n\n@property (strong, nonatomic)\
    \ IBOutlet UILabel *labelHelloWorld;\n- (IBAction)tickleTheLabel:(id)sender;\n\
    - (IBAction)tapTheLabel:(id)sender;\n\n@end\n```\n\nAnd I’ve made the new `tapTheLabel`\
    \ action in the implementation (`.m`) file look like this:\n\n```\n- (IBAction)tapTheLabel:(id)sender\
    \ {\n    self.labelHelloWorld.text=@\"Tap Tap Tap\";\n}\n```\n\nNow when the app\
    \ is run and the label is tapped, you get the following two screens in [Figures\
    \ 2–15](#Chapter02.html#fig_2_15) and [2–16](#Chapter02.html#fig_2_16).\n\n![Image](images/9781430240051_Fig02-15.jpg)\n\
    \n**Figure 2–15.** *Application’s starting view*\n\n![Image](images/9781430240051_Fig02-16.jpg)\n\
    \n**Figure 2–16.** *View after label tapped*\n\n### Adjusting Tint\n\nIf you wanted\
    \ to give your app a different look and feel by customizing the navigation bar\
    \ or tool bar, you used to have to create your own custom classes; but in Xcode\
    \ 4.2, you can now customize certain design elements with the new tint property.`UINavigationBar`,\
    \ `UIToolBar`, `UISearchBar`, and `UISegmentedControl` all respond to this setting\
    \ and are available in Interface Builder. Other controls respond to tinting as\
    \ well, but the property is not available in Xcode and must be changed with code.\
    \ To update the tint, select an object in your `.xib` that supports the tint property,\
    \ and in the inspector pane you should see the Tint control, as shown in [Figure\
    \ 2–18](#Chapter02.html#fig_2_18). [Figure 2–17](#Chapter02.html#fig_2_17) demonstrates\
    \ a view with drastically altered tint on several elements.\n\n![Image](images/9781430240051_Fig02-17.jpg)\n\
    \n**Figure 2–17.** *A view with tint*\n\n![Image](images/9781430240051_Fig02-18.jpg)\n\
    \n**Figure 2–18.** *Adjusting tint in the Attributes inspector*\n\n**NOTE:** The\
    \ `UISegmentedControl` supports tint in Xcode only in the Bar or Bezeled style.\n\
    \n### Rapid App Development with Storyboarding\n\nRemember the days when you had\
    \ to use paper and pen to sketch out design flows for your apps? Then came flowcharting\
    \ software, in which you could digitally record your workflows and processes,\
    \ but it was a manual process to convert those workflows into source code. Apple\
    \ has provided a new tool called Storyboards that provides a visual representation\
    \ of an app’s workflow and can then produce a working framework for your app.\n\
    \n#### So What’s in a Story(board)?\n\nA storyboard is a collection of `.xib`\
    \ files packaged together along with some metadata about the views and their relationships\
    \ to each other. It is the ultimate separation of views from models and controllers\
    \ that you have been hearing about since the early days of Model-View-Controller\
    \ (MVC) programming. The storyboard has two main components: scenes and segues.\n\
    \n##### Scenes\n\nScenes are any view that fills the screen of the device. They\
    \ contain UI objects and are controlled by view controllers (or subclasses of\
    \ view controllers). This is almost exactly like the `.xib` files that you are\
    \ familiar with editing in Interface Builder. [Figure 2–19](#Chapter02.html#fig_2_19)\
    \ displays three different scenes in a storyboard that you will soon build.\n\n\
    ![Image](images/9781430240051_Fig02-19.jpg)\n\n**Figure 2–19.** *Editing scenes*\n\
    \n##### Segues\n\nSegues are the transitions that present subsequent views in\
    \ a storyboard. The segue can present a view with a push, as a modal view, as\
    \ a pop-over, or with a custom transition. A segue is of the class `UIStoryboardSegue`\
    \ and contains three properties: `sourceViewController`, `destinationViewController`,\
    \ and `identifier`. The `identifier` is an `NSString` that can be used to validate\
    \ that a segue is the segue you are expecting.\n\nYou would normally initiate\
    \ a segue based on an action from the user. This can be the touching of a button\
    \ or tableview cell, or it could be the result of a gesture recognizer. Segues\
    \ are represented on the storyboard by a line connecting two scenes, as shown\
    \ in [Figure 2–20](#Chapter02.html#fig_2_20).\n\n![Image](images/9781430240051_Fig02-20.jpg)\n\
    \n**Figure 2–20.** *A segue connecting two scenes*"
  raw: '### Touches Too


    One of the new features implemented into Interface Builder is the ability to assign
    touch gesture recognizers to objects directly in Interface Builder. The various
    gestures are available in the lower right section of Xcode, resembling the pane
    shown in [Figure 2–9](#Chapter02.html#fig_2_9).


    ![Image](images/9781430240051_Fig02-09.jpg)


    **Figure 2–9.** *Available gesture recognizers*


    To add a gesture recognizer to an object in a `.xib`, just drag and drop the gesture
    recognizer from the object browser onto the object you want to add it to, similarly
    to that shown in [Figure 2–10](#Chapter02.html#fig_2_10). This will add the gesture
    recognizer to the Objects list in the `.xib` project file, as shown in [Figure
    2–11](#Chapter02.html#fig_2_11).


    ![Image](images/9781430240051_Fig02-10.jpg)


    **Figure 2–10.** *Adding a gesture recognizer to an element*


    ![Image](images/9781430240051_Fig02-11.jpg)


    **Figure 2–11.** *Resulting gesture recognizer in the outline view*


    Before you proceed, it’s important that user interaction is enabled for the object
    that you want to add the gesture recognizer to. In this case, you attached it
    to the Hello World label, and you can set user interaction to true by clicking
    the label and going to the Attributes inspector tab. Under the View options, click
    the check box next to User Interaction Enabled, as shown in [Figure 2–12](#Chapter02.html#fig_2_12).
    This will ensure that the object responds to gesture recognizers.


    ![Image](images/9781430240051_Fig02-12.jpg)


    **Figure 2–12.** *The Attributes inspector*


    By clicking the gesture recognizer in the `.xib`’s dock outline view, you can
    set the settings for the gesture recognizer in the Attributes inspector pane.
    [Figure 2–13](#Chapter02.html#fig_2_13) demonstrates the various configurations
    that can be applied to this recognizer.


    ![Image](images/9781430240051_Fig02-13.jpg)


    **Figure 2–13.** *Adjusting attributes of gesture recognizer*


    Now that the settings have been enabled, you can connect the gesture to an `IBAction`
    by following the same procedures as ^-click-drag from the gesture recognizer object
    to the interface (`.h`) file in the Assistant Editor pane. In the resulting pop-up,
    resembling [Figure 2–14](#Chapter02.html#fig_2_14), specify a name and click Connect.
    The placeholders for that action will be added to your code just as before.


    ![Image](images/9781430240051_Fig02-14.jpg)


    **Figure 2–14.** *Connecting an action to the label*


    Now your interface file looks like this:


    `//`

    `//  sample1ViewController.h`

    `#import <UIKit/UIKit.h>`


    `@interface sample1ViewController : UIViewController {`

    `    UILabel *labelHelloWorld;`

    `    UITapGestureRecognizer *tapTheLabel;`

    `}`


    `@property (strong, nonatomic) IBOutlet UILabel *labelHelloWorld;`

    `- (IBAction)tickleTheLabel:(id)sender;`

    `- (IBAction)tapTheLabel:(id)sender;`


    `@end`


    And I’ve made the new “`tapTheLabel`” action in the implementation (`.m`) file
    look like this:


    `- (IBAction)tapTheLabel:(id)sender {`

    `    self.labelHelloWorld.text=@"Tap Tap Tap";`

    `}`


    Now when the app is run and the label is tapped, you get the following two screens
    in [Figures 2–15](#Chapter02.html#fig_2_15) and [2–16](#Chapter02.html#fig_2_16).


    ![Image](images/9781430240051_Fig02-15.jpg)


    **Figure 2–15.** *Application’s starting view*


    ![Image](images/9781430240051_Fig02-16.jpg)


    **Figure 2–16.** *View after label tapped*


    ### Adjusting Tint


    If you wanted to give your app a different look and feel by customizing the navigation
    bar or tool bar, you used to have to create your own custom classes; but in Xcode
    4.2, you can now customize certain design elements with the new tint property.
    `UINavigationBar`, `UIToolBar`, `UISearchBar`, and `UISegmentedControl` all respond
    to this setting and are available in Interface Builder. Other controls respond
    to tinting as well, but the property is not available in Xcode and must be changed
    with code. To update the tint, select an object in your `.xib` that supports the
    tint property, and in the inspector pane you should see the Tint control, as shown
    in [Figure 2–18](#Chapter02.html#fig_2_18). [Figure 2–17](#Chapter02.html#fig_2_17)
    demonstrates a view with drastically altered tint on several elements.


    ![Image](images/9781430240051_Fig02-17.jpg)


    **Figure 2–17.** *A view with tint*


    ![Image](images/9781430240051_Fig02-18.jpg)


    **Figure 2–18.** *Adjusting tint in the Attributes inspector*


    **NOTE:** The `UISegmentedControl` supports tint in Xcode only in the Bar or Bezeled
    style.


    ### Rapid App Development with Storyboarding


    Remember the days when you had to use paper and pen to sketch out design flows
    for your apps? Then came flowcharting software, in which you could digitally record
    your workflows and processes, but it was a manual process to convert those workflows
    into source code. Apple has provided a new tool called Storyboards that provides
    a visual representation of an app’s workflow and can then produce a working framework
    for your app.


    #### So What’s in a Story(board)?


    A storyboard is a collection of `.xib` files packaged together along with some
    metadata about the views and their relationships to each other. It is the ultimate
    separation of views from models and controllers that you have been hearing about
    since the early days of Model-View-Controller (MVC) programming. The storyboard
    has two main components: scenes and segues.


    ##### Scenes


    Scenes are any view that fills the screen of the device. They contain UI objects
    and are controlled by view controllers (or subclasses of view controllers). This
    is almost exactly like the `.xib` files that you are familiar with editing in
    Interface Builder. [Figure 2–19](#Chapter02.html#fig_2_19) displays three different
    scenes in a storyboard that you will soon build.


    ![Image](images/9781430240051_Fig02-19.jpg)


    **Figure 2–19.** *Editing scenes*


    ##### Segues


    Segues are the transitions that present subsequent views in a storyboard. The
    segue can present a view with a push, as a modal view, as a pop-over, or with
    a custom transition. A segue is of the class `UIStoryboardSegue` and contains
    three properties: `sourceViewController`, `destinationViewController`, and `identifier`.
    The `identifier` is an `NSString` that can be used to validate that a segue is
    the segue you are expecting.


    You would normally initiate a segue based on an action from the user. This can
    be the touching of a button or tableview cell, or it could be the result of a
    gesture recognizer. Segues are represented on the storyboard by a line connecting
    two scenes, as shown in [Figure 2–20](#Chapter02.html#fig_2_20).


    ![Image](images/9781430240051_Fig02-20.jpg)


    **Figure 2–20.** *A segue connecting two scenes*'
  trans: "\n### 触控手势\n\nInterface Builder 新增的功能之一是能直接在界面生成器中为对象分配触摸手势识别器。Xcode 右下角区域提供了各种手势，其面板类似于图\
    \ 2-9 所示。\n\n![Image](img/9781430240051_Fig02-09.jpg)\n\n**图 2-9.** *可用的手势识别器*\n\
    \n要为`.xib`文件中的对象添加手势识别器，只需从对象浏览器中将手势识别器拖放到目标对象上，操作方式与图 2-10 所示类似。这会将该手势识别器添加到`.xib`项目文件的对象列表中，如图\
    \ 2-11 所示。\n\n![Image](img/9781430240051_Fig02-10.jpg)\n\n**图 2-10.** *为元素添加手势识别器*\n\
    \n![Image](img/9781430240051_Fig02-11.jpg)\n\n**图 2-11.** *大纲视图中生成的手势识别器*\n\n\
    继续操作前，务必确保目标对象已启用用户交互。在本例中，你将其附加到了“Hello World”标签上。点击该标签并转到属性检查器选项卡，即可将用户交互设置为`true`。在“视图”选项中，勾选“已启用用户交互”旁边的复选框，如图\
    \ 2-12 所示。这将确保对象能响应手势识别器。\n\n![Image](img/9781430240051_Fig02-12.jpg)\n\n**图 2-12.**\
    \ *属性检查器*\n\n通过在`.xib`文件的停靠栏大纲视图中点击手势识别器，你可以在属性检查器面板中为其进行设置。图 2-13 展示了可应用于该识别器的各种配置。\n\
    \n![Image](img/9781430240051_Fig02-13.jpg)\n\n**图 2-13.** *调整手势识别器的属性*\n\n设置完成后，你可以按照与之前相同的方法，从手势识别器对象按住\
    \ ^ 键拖拽到助理编辑器面板中的接口（`.h`）文件，从而将该手势连接到一个`IBAction`。在弹出的类似于图 2-14 的窗口中，指定名称并点击“连接”。该操作的占位符将像之前一样被添加到你的代码中。\n\
    \n![Image](img/9781430240051_Fig02-14.jpg)\n\n**图 2-14.** *将操作连接到标签*\n\n现在，你的接口文件看起来像这样：\n\
    \n```\n//\n//  sample1ViewController.h\n#import <UIKit/UIKit.h>\n\n@interface\
    \ sample1ViewController : UIViewController {\n    UILabel *labelHelloWorld;\n\
    \    UITapGestureRecognizer *tapTheLabel;\n}\n\n@property (strong, nonatomic)\
    \ IBOutlet UILabel *labelHelloWorld;\n- (IBAction)tickleTheLabel:(id)sender;\n\
    - (IBAction)tapTheLabel:(id)sender;\n\n@end\n```\n\n我已经在实现（`.m`）文件中创建了新的`tapTheLabel`操作，如下所示：\n\
    \n```\n- (IBAction)tapTheLabel:(id)sender {\n    self.labelHelloWorld.text=@\"\
    Tap Tap Tap\";\n}\n```\n\n现在，当应用运行并点击标签时，你将看到图 2-15 和图 2-16 中展示的这两个界面。\n\n![Image](img/9781430240051_Fig02-15.jpg)\n\
    \n**图 2-15.** *应用的初始视图*\n\n![Image](img/9781430240051_Fig02-16.jpg)\n\n**图 2-16.**\
    \ *标签点击后的视图*\n\n### 调整色调\n\n如果你想通过自定义导航栏或工具栏来赋予应用不同的外观和感觉，过去必须创建自己的自定义类；但在 Xcode\
    \ 4.2 中，你现在可以通过新增的色调属性来自定义某些设计元素。`UINavigationBar`、`UIToolBar`、`UISearchBar`和`UISegmentedControl`都会响应此设置，并且这些设置可在\
    \ Interface Builder 中使用。其他控件也能响应色调设置，但该属性在 Xcode 中不可用，必须通过代码更改。要更新色调，请在`.xib`文件中选择一个支持色调属性的对象，然后在检查器面板中你应该能看到色调控件，如图\
    \ 2-18 所示。图 2-17 展示了一个对多个元素进行了大幅度色调调整的视图。\n\n![Image](img/9781430240051_Fig02-17.jpg)\n\
    \n**图 2-17.** *应用了色调的视图*\n\n![Image](img/9781430240051_Fig02-18.jpg)\n\n**图 2-18.**\
    \ *在属性检查器中调整色调*\n\n**注意：** `UISegmentedControl`仅在条形或斜面风格时支持在 Xcode 中设置色调。\n\n\
    ### 使用故事板进行快速应用开发\n\n还记得过去你必须用纸和笔来勾画应用的设计流程吗？后来有了流程图软件，你可以用数字方式记录工作流程和过程，但将这些工作流程转换为源代码仍需手动操作。苹果提供了一种名为故事板的新工具，它可以直观地展示应用的工作流，并能为你的应用生成一个可运行的框架。\n\
    \n#### 那么什么是故事板？\n\n故事板是一系列`.xib`文件的集合，其中包含关于视图及其相互关系的元数据。这实现了自模型-视图-控制器（MVC）编程早期以来就广为流传的视图与模型、控制器的彻底分离。故事板有两个主要组成部分：场景和转场。\n\
    \n##### 场景\n\n场景是任何填满设备屏幕的视图。它们包含 UI 对象，并由视图控制器（或视图控制器的子类）控制。这几乎与你熟悉并在 Interface\
    \ Builder 中编辑的`.xib`文件完全相同。图 2-19 展示了你即将构建的故事板中的三个不同场景。\n\n![Image](img/9781430240051_Fig02-19.jpg)\n\
    \n**图 2-19.** *编辑场景*\n\n##### 转场\n\n转场是在故事板中呈现后续视图的过渡方式。转场可以以推入、模态视图、弹出视图或自定义过渡的方式呈现视图。转场属于`UIStoryboardSegue`类，并包含三个属性：`sourceViewController`、`destinationViewController`和`identifier`。`identifier`是一个`NSString`，可用于验证转场是否是你期望的那个。\n\
    \n你通常根据用户的某个操作来启动转场。这可以是点击按钮或表格视图单元格，也可以是手势识别器的结果。转场在故事板上由连接两个场景的线条表示，如图 2-20\
    \ 所示。\n\n![Image](img/9781430240051_Fig02-20.jpg)\n\n**图 2-20.** *连接两个场景的转场*\n"
- fmt: '### Telling a Story


    Storyboards are available in all of the application templates in Xcode 4.2 with
    the exception of the empty project template. When creating a new project, just
    select the option to “Use storyboard” when setting the options for the new project.
    In this case, you will name the project `"aboutUs"`, as demonstrated in [Figure
    2–21](#Chapter02.html#fig_2_21).


    ![Image](images/9781430240051_Fig02-21.jpg)


    **Figure 2–21.** *Configuring for storyboard use*


    Once the project is created, you will see the storyboard option has been populated
    on the target Summary tab and an additional field has been added to the Info tab
    (as shown in [Figures 2–22](#Chapter02.html#fig_2_22) and [2–23](#Chapter02.html#fig_2_23)),
    “Main storyboard file base name”.


    ![Image](images/9781430240051_Fig02-22.jpg)


    **Figure 2–22.** *Main storyboard info*


    ![Image](images/9781430240051_Fig02-23.jpg)


    **Figure 2–23.** *Storyboard target settings*


    Finally, in the project navigator pane, you will see the `MainStoryboard.storyboard`
    file, as [Figure 2–24](#Chapter02.html#fig_2_24) demonstrates. Click on this file
    to load it into Interface Builder and start building your storyboard.


    ![Image](images/9781430240051_Fig02-24.jpg)


    **Figure 2–24.** *Storyboard file*


    In this example, you are going to build a simple project that displays information
    about your company. The storyboard starts off with a view that is controlled by
    the `aboutUsViewController` it created as part of the project. I’m going to add
    some objects (`UILabel`, `UITextView`, and two `UIButton`s) to the view to make
    it a little more informative to the user. Refer to [Figure 2–25](#Chapter02.html#fig_2_25)
    for the view to build.


    ![Image](images/9781430240051_Fig02-25.jpg)


    **Figure 2–25.** *`aboutUsViewController` view*


    Now I want to embed this view into a navigation controller, and Xcode 4.2 makes
    this an easy task. As shown in [Figure 2–26](#Chapter02.html#fig_2_26), select
    the view and go to the menu option **Editor** ![Image](images/U001.jpg) **Embed
    In** ![Image](images/U001.jpg) **Navigation Controller.** This will create a navigation
    controller and add it to your storyboard as well as create a segue between the
    navigation view and your `aboutUsView`. The resulting segue will be represented
    with an arrow, as in [Figure 2–27](#Chapter02.html#fig_2_27).


    ![Image](images/9781430240051_Fig02-26.jpg)


    **Figure 2–26.** *Embedding a view in a controller*


    ![Image](images/9781430240051_Fig02-27.jpg)


    **Figure 2–27.** *Resulting embedded view display*


    Now I’m going to add a new `UIViewController` object to the storyboard where you
    can put your contact information. It’s as simple as dragging a `UIViewController`
    object, as well as a `UIView`, from the object library to the storyboard. I set
    up the view by adding a `UILabel` as the heading, and then I add a few more `UILabel`s
    for the contact information. [Figure 2–28](#Chapter02.html#fig_2_28) displays
    the result of these additions.


    ![Image](images/9781430240051_Fig02-28.jpg)


    **Figure 2–28.** *Configured scenes*


    In order to connect the new contact information view to the About Us view, you
    are going to click on the “Contact Us” `UIButton` on the About Us view and `^-click-drag`
    to the Contact Info view. This is the same action used to connect outlets and
    actions, and that is exactly what you are going to do. You are going to connect
    the Contact Us button to the `performSegueWithIdentifier` action. When you release
    the mouse button, a pop-up will display, asking which action you want to connect
    to, and you can select `performSegueWithIdentifier:sender`. These steps, along
    with the resulting segue, are demonstrated in [Figures 2–29](#Chapter02.html#fig_2_29)
    and [2–30](#Chapter02.html#fig_2_30).


    ![Image](images/9781430240051_Fig02-29.jpg)


    **Figure 2–29.** *Configuring segue action*


    ![Image](images/9781430240051_Fig02-30.jpg)


    **Figure 2–30.** *Perform segue pop-up*


    When the connection is made, the `UINavigationBar` is automatically added to the
    view. If you specify titles for each one, the result will resemble [Figure 2–31](#Chapter02.html#fig_2_31).


    ![Image](images/9781430240051_Fig02-31.jpg)


    **Figure 2–31.** *Connected scenes with segue*


    One habit to get into is providing your segues with an identifier. This will help
    future-proof your apps if you end up connecting multiple segues to one view. You
    will be able to check the identifier of the calling segue to see the path the
    user took to reach that view and respond accordingly. You can set the identifier
    of a segue by selecting it in the storyboard and viewing its properties in the
    inspector pane, as shown in [Figure 2–32](#Chapter02.html#fig_2_32).


    ![Image](images/9781430240051_Fig02-32.jpg)


    **Figure 2–32.** *Setting segue identifiers*


    If you run this app now, [Figures 2–33](#Chapter02.html#fig_2_33) and [2–34](#Chapter02.html#fig_2_34)
    show you that the Contact Us button will work and will load the Contact Info view
    without having written any code whatsoever.


    ![Image](images/9781430240051_Fig02-33.jpg)


    **Figure 2–33.** *Main simulated view*


    ![Image](images/9781430240051_Fig02-34.jpg)


    **Figure 2–34.** *Resulting segue performed*


    What about the other button, “Our Apps”? You want to create a new view that lists
    your other apps so you can get some cross promotion. The first thing I think of
    when I hear the word “list” is `UITableViewController`. And storyboarding takes
    `UITableViewController` to a whole new level of convenience.


    I’m going to drag a `UITableViewController` to the storyboard, creating an Apps
    Table view. The first thing that you will notice is that this looks a little different
    than the regular `UITableViewController` available in Interface Builder. There
    is something called Prototype Cells at the top, as in [Figure 2–35](#Chapter02.html#fig_2_35).
    With storyboards, you can customize the layout and objects of a `UITableViewCell`
    with something called a prototype. We’ll go into this further later on.


    ![Image](images/9781430240051_Fig02-35.jpg)


    **Figure 2–35.** *Inserting a `UITableView` into a scene*


    Select the Table View, and in the Attributes inspector, change Content from Dynamic
    Prototypes to Static Cells. I’m also going to change the style to Grouped because
    I like the look of the rounded edges of the cells. [Figures 2–36](#Chapter02.html#fig_2_36)
    and [2–37](#Chapter02.html#fig_2_37) show these steps and their result.


    ![Image](images/9781430240051_Fig02-36.jpg)


    **Figure 2–36.** *Static Cells configuration*


    ![Image](images/9781430240051_Fig02-37.jpg)


    **Figure 2–37.** *Grouped cells*


    Since every cell is going to have the same layout, I’m going to delete the bottom
    two cells so that I can quickly duplicate the top cell. Now I will customize the
    remaining cell with a `UIImageView` to hold the app icon and two `UILabel`s for
    the app name and description, as shown in [Figure 2–38](#Chapter02.html#fig_2_38).


    ![Image](images/9781430240051_Fig02-38.jpg)


    **Figure 2–38.** *Customized cell*


    Select the remaining cell now that it has been designed to your specifications,
    and ![Image](images/U004.jpg)`-click-drag` to duplicate it below. Repeat again
    to add a third row to the `UITableView`, as demonstrated in [Figure 2–39](#Chapter02.html#fig_2_39).


    ![Image](images/9781430240051_Fig02-39.jpg)


    **Figure 2–39.** *Duplicating cells*


    Now you can customize each image and label in the `UITableView` to list the three
    apps you’ll be displaying, resulting in a view resembling [Figure 2–40](#Chapter02.html#fig_2_40).


    ![Image](images/9781430240051_Fig02-40.jpg)


    **Figure 2–40.** *Customizing duplicated cells*


    All that is left is to connect your button in the About Us view to this new view.
    Select the button in the About Us view, and `^-click-drag` to the `UITableView`
    you just created. Your storyboard now looks something like that shown in [Figure
    2–41](#Chapter02.html#fig_2_41).


    ![Image](images/9781430240051_Fig02-41.jpg)


    **Figure 2–41.** *Newly connected table controller*'
