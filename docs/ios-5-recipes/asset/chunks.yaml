  trans: '

    # UISlider


    `UISlider` 提供了一个非常精美且简单的 UI 元素，用于让用户平滑地调整数值，如图 3-9 所示。


    ![Image](img/9781430240051_Fig03-09.jpg)


    **图 3-9.** *一个简单的 `UISlider`*


    这些滑块相当容易设置和配置。你可以使用 Interface Builder 完成大部分数值设置，也可以通过编程方式设置数值。需要配置的最重要的属性是 `minimumValue`、`maximumValue`
    和初始值。你可以在设置 XIB 文件时设置初始值，也可以在代码中通过 `-viewDidLoad` 中直接设置滑块的 value 属性来实现。


    除了这些基本属性，你还可以极大地自定义滑块的外观，包括指定自定义的轨道图像和滑块按钮图像。你还可以指定放置在 `UISlider` 两端的图像，通过 `minimumValueImage`
    和 `maximumValueImage` 属性来帮助表示最大值和最小值。例如，如果你的 `UISlider` 用于调节音频播放器的音量，那么最小值图像可以是一个扬声器的图片，而最大值图像可以是同一个扬声器，但带有从它发出的声波。


    你可以通过两种方法，为 `UISlider` 的值变化创建要执行的操作：


    1.  在头文件中声明一个返回类型为（`IBAction`）的方法，然后在 XIB 文件中按住 ![Image](img/U003.jpg) 并从滑块拖拽到该方法头，将
    `UISlider` 连接到这个方法。

    2.  使用 `-addTarget:action:forControlEvents:` 方法，如下所示：`[self.mySlider addTarget:self
    action:@selector(valueChanged:) forControlEvents:UIControlEventValueChanged]`。


    `UISlider` 还有一个名为 `continuous` 的属性，它决定是否连续报告值的变化。如果不是，那么与滑块关联的操作只会在用户完成值调整时被调用，而不是在用户移动滑块按钮时反复调用。


    如果你希望以编程方式（可能是由于其他某些事件）改变滑块的值，而不是让用户调整，你应该使用 `-setValue:animated:` 方法，而不是直接设置
    `value` 属性，以便为用户提供更平滑的过渡。


    # UISwitch


    `UISwitch` 的工作方式与 `UISlider` 非常相似，但它只允许用户选择布尔值，即“开”（如图 3-10 所示）或“关”。这些开关通常用在应用的“设置”区域，允许用户轻松定制自己的偏好。


    ![Image](img/9781430240051_Fig03-10.jpg)


    **图 3-10.** *一个启用的 `UISwitch`*


    在添加要在值变化时执行的操作方面，`UISwitch` 的工作方式与 `UISlider` 完全相同，但由于开关的布尔值特性，它要简单得多。与之前一样，使用
    `-addTarget:action:forControlEvents:` 将一个方法连接到开关。你也可以通过 `on` 属性访问开关的值，并使用 `-setOn:animated:`
    方法动画地改变其值。


    # UIActivityIndicatorView


    通常，应用程序可能正在执行一个不会立即完成的任务。这可能是从服务器下载文件的过程，或者仅仅是处理大量数据、需要相当长的时间才能完成的任务。作为开发者，你应该始终努力让用户了解这类活动的状态。为此，你可以使用
    `UIActivityIndicatorView`，如图 3-11 所示。


    `UIActivityIndicatorView` 是一个简单的元素，用于显示后台是否有活动正在进行。然而，它只允许两种状态：正在进行和未进行。要在两者之间切换，你可以使用
    `-startAnimating` 和 `-stopAnimating` 方法。你也可以通过 `-isAnimating` 方法访问指示器当前是否正在动画。如果你在任务完成后不再需要使用指示器，可以使用
    `hidesWhenStopped` 属性。


    ![Image](img/9781430240051_Fig03-11.jpg)


    **图 3-11.** *一个 `UIActivityIndicatorView` 元素*


    对于这个元素，你的自定义选项相当有限，只能调整颜色和大小。首先，你有 `activityIndicatorViewStyle` 属性，它有三个可选值：


    * `UIActivityIndicatorViewStyleWhiteLarge`

    * `UIActivityIndicatorViewStyleWhite`

    * `UIActivityIndicatorViewStyleGray`


    这三个值仅在大小和颜色上有所不同，应从中选择以最大化视觉显示质量。


    如果上述任何一种样式都不太符合你的应用设计，你还可以通过 `UIColor` 类，使用 `color` 属性指定不同的颜色。


    # UIProgressView


    沿着 `UIActivityIndicatorView` 的思路，你还有 `UIProgressView`。它的作用与 `UISlider` 非常相似，都能显示一个值（尽管限制在
    0 到 1 之间缩放），但不允许任何用户输入。这个元素最常用于显示任务完成的进度，如图 3-12 所示，作为简单地使用 `UIActivityIndicatorView`
    来显示“正在处理”的一种替代方案。


    ![Image](img/9781430240051_Fig03-12.jpg)


    **图 3-12.** *使用中的 `UIProgressView`*


    与 `UIActivityIndicatorView` 一样，`UIProgressView` 可以带样式创建，通过 `progressViewStyle`
    属性访问，该属性有以下可能的值：


    * `UIProgressViewStyleDefault`：`UIProgressView` 的标准样式

    * `UIProgressViewStyleBar`：常用于工具栏内部的样式


    自然，`UIProgressView` 最重要的属性是进度值。这个值介于 0.0 和 1.0 之间，可以通过 `progress` 属性访问。你也可以使用
    `-setProgress:animated:` 方法来设置这个属性，以提升应用界面的视觉效果。


    除了 `progressViewStyle`，`UIProgressView` 还允许对已显示的进度条及其底部的轨道的着色颜色和图像进行相当不错的外观自定义。这些分别通过
    `progressTintColor`、`progressImage`、`trackTintColor` 和 `trackImage` 属性来访问。

    '
- fmt: '### UIPageControl


    在处理具有“分页”功能的应用程序时，`UIPageControl`是一个非常有用的微型UI元素，如图3-13所示。该组件主要作为指示器向用户显示当前处于哪一页，尽管它也可以用于直接操作应用程序（通常是通过更改当前页面）。关于此实用性的一个绝佳示例，请查看设备上“天气”应用的底部。


    ![Image](images/9781430240051_Fig03-13.jpg)


    **图3-13.** `UIPageControl`


    使用`UIPageControl`时，你可以通过`currentPage`和`numberOfPages`等属性轻松访问与其关联的多个值。如果你的应用程序在某些时候可能只有一个页面，你还可以使用`hidesForSinglePage`属性。


    与`UISlider`和`UISwitch`一样，你可以使用`-addTarget:selector:forControlEvents:`方法结合`UIControlEventValueChanged`事件，向`UIPageControl`添加在`currentPage`值发生变化时要执行的操作。此方法理想情况下应处理应用程序显示的实际更改，以显示新选择的页面。


    如果在`currentPage`发生变化时，你决定由于某些原因不希望`UIPageControl`的显示立即更新，可以将`defersCurrentPageDisplay`属性设置为`YES`，使其等待调用`-updateCurrentPageDisplay`方法后才调整显示。否则，此属性默认为`NO`。


    不幸的是，在自定义`UIPageControl`的外观方面，你受到的限制非常大。不过，你可以使用一个非常有用的方法`-sizeForNumberOfPages:`，它能让你轻松找到显示任意指定页面数量的`UIPageControl`所需的最小尺寸。


    任何时候使用`UIPageControl`元素，都要确保该指示器在视觉上不会干扰其所管理的页面。因此，根据苹果的界面指南，该元素应居中位于“页面”底部和屏幕底部之间。


    ### UIStepper


    `UIStepper`是iOS 5.0中全新引入的元素，旨在简化应用程序对增量值的使用。它为用户配备了“+”和“-”按钮，但本身并不显示其关联的值，如图3-14所示。此任务留给开发者根据每个应用程序的具体情况来实现。


    ![Image](images/9781430240051_Fig03-14.jpg)


    **图3-14.** 全新的`UIStepper`


    `UIStepper`的主要属性是它的`value`属性，你可以通过访问该属性来相应地更新显示。这个值可以通过多种属性轻松配置：


    - `minimumValue`：`value`可以达到的最小数值

    - `maximumValue`：`value`的最大值

    - `stepValue`：使用步进按钮时`value`递增的量

    - `wraps`：如果此属性设置为`YES`，你的最小值和最大值将循环衔接。因此，如果`value`递增超过`maximumValue`，它将回绕到`minimumValue`，反之亦然。

    - `autorepeat`：此属性允许长按`UIStepper`按钮以重复递增`value`，而无需反复点击该元素。

    - `continuous`：指定值更改事件是在`value`属性每次更改时发送，还是仅在用户完成更改值后才发送（与`autorepeat`属性配合使用）。


    和之前一样，你可以使用`-addTarget:selector:forControlEvents:`方法配合`UIControlEventValueChanged`事件，为`value`属性的更改分配要执行的操作。


    一旦你的`UIStepper`配置完毕，在设计应用程序时唯一需要记住的概念是，确保用户界面清晰地告知用户某个`UIStepper`更改的是哪个值。


    ### 数据视图


    在iOS中，你可以访问各种`UIView`的子类，统称为“数据视图”，它们允许你根据应用程序的类型，以非常特定的方式轻松地在应用程序中放置内容。


    #### UIImageView


    Cocoa Touch中最直观且重要的数据视图之一是`UIImageView`类。这个视图元素及其属性和方法经过优化，可帮助开发者在应用程序中显示和管理图像。


    `UIImageView`的核心属性是其`image`和`highlightedImage`属性。这两个属性都是`UIImage`类的实例，其中`highlightedImage`仅在图像被选中时显示。你可以通过使用指定的初始化方法`-initWithImage:`或`-initWithImage:highlightedImage:`以编程方式创建并指定这些图像，或者直接单独设置这些属性。示例如下：


    ```objectivec

    self.myImageView = [[UIImageView alloc] initWithImage:[UIImage imageNamed:@"myImage.png"]];

    ```


    如果你使用`+imageNamed:`方法来创建`UIImage`，则需要确保你的实际图像文件已导入到项目中。你可以通过将文件从Finder拖入Xcode来实现。拖入时，会弹出一个对话框，你需要确保选中“将项目复制到目标组的文件夹（如果需要）”选项，如图3-15所示。


    ![Image](images/9781430240051_Fig03-15.jpg)


    **图3-15.** 向项目添加文件时的弹出对话框


    `UIImageView`类还内置了通过使用以下属性来动画显示多个图像的功能：


    - `animationImages`：此属性是一个包含`UIImage`对象的`NSArray`，指定了要动画显示的实际图像。

    - `highlightedAnimationImages`：此属性作用与`animationImages`属性相同，但在`UIImageView`处于高亮状态时生效。

    - `animationDuration`：此值作为`NSTimeInterval`创建，表示`animationImages`中所有图像完成一个循环所需的总时间。如果未指定，该值默认为图像数量乘以1/30秒。

    - `animationRepeatCount`：简而言之，此值指定图像循环的重复次数。如果设置为0（默认值），动画将无限重复。


    配置好`UIImageView`的动画属性后，你可以使用`-startAnimating`、`-stopAnimating`和`isAnimating`方法来管理实际的动画。


    在处理`UIImageView`时，需要牢记的最重要属性之一是`contentMode`属性。虽然这实际上是继承自`UIView`，但在处理图像时它变得非常重要。`contentMode`属性主要指定视图如何响应其内容宽高比与视图本身不匹配的情况，例如一个方形`UIImageView`显示一张矩形图像。此属性有多种选项，苹果文档中都有完整记录，但大多数时候你可能倾向于选择`UIViewContentModeScaleAspectFill`。此选项可能会裁剪掉图像的一部分，但会确保填满展示视图的整个空间，从而提高设计质量。如果由于任何原因，你要求图像不被裁剪并且更希望保留空白区域，可以使用`UIViewContentModeScaleAspectFit`值。'
  raw: '#### UIPageControl


    For dealing with applications with “paging,” a very useful little UI element is
    the `UIPageControl`, shown in [Figure 3–13](#Chapter03.html#fig_3_13). This device
    acts mainly as an indicator to users as to which page they are currently on, though
    it can also be used to directly manipulate an application, usually by changing
    the current page. For an excellent example of this utility, look at the bottom
    of your device’s Weather app.


    ![Image](images/9781430240051_Fig03-13.jpg)


    **Figure 3–13.** *A `UIPageControl`*


    When using a `UIPageControl`, you can easily access multiple values associated
    with it through such properties as `currentPage` and `numberOfPages`. If your
    application happens to have a possibility of havingonlyone page at some point,
    you may also make use of the `hidesForSinglePage` property.


    Just as with the `UISlider` and `UISwitch`, you can add actions to a `UIPageControl`
    to be performed on the changing of the `currentPage` value using the `-addTarget:selector:forControlEvents:`
    method in conjunction with the `UIControlEventValueChanged` event. This method
    would ideally handle the actual changing of your application’s display to display
    the newly selected page.


    If, upon the changing of the `currentPage`, you decide there might be some reason
    to not have the display of the `UIPageControl` update immediately, you can set
    the `defersCurrentPageDisplay`property to `YES`, causing it to wait until the
    `-updateCurrentPageDisplay` method is called before adjusting the display. This
    property defaults to `NO` otherwise.


    Unfortunately, you are incredibly limited in terms of customizing the appearance
    of a `UIPageControl`. However, you are given a very useful method called `-sizeForNumberOfPages:`,
    which allows you to easily find the minimum size needed to display a `UIPageControl`
    with any given number of pages.


    Anytime you make use of a `UIPageControl` element, you want to make sure the indicator
    does not at all interfere visually with the pages that it manages. The element
    should therefore, according to Apple’s Interface Guidelines, be centered between
    the bottom of the “pages” and the bottom of the screen.


    #### UIStepper


    The `UIStepper` is an element entirely new in iOS 5.0, intended to streamline
    an application’s use of incremental values. It is equipped with “+” and “-” buttons
    for the user, but does not actually display its associated value, as in [Figure
    3–14](#Chapter03.html#fig_3_14). This task is left up to the developer to implement
    as is appropriate for each application.


    ![Image](images/9781430240051_Fig03-14.jpg)


    **Figure 3–14.** *The new `UIStepper`*


    The main property of the `UIStepper` is its `value` property, which you can access
    in order to update your display accordingly. This value can be easily configured
    with a variety of properties:


    *   `minimumValue`: The minimum number that the `value` can reach

    *   `maximumValue`: The maximum `value`

    *   `stepValue`: The amount by which `value` is incremented upon the use of the
    stepping buttons

    *   `wraps`: If this property is set to `YES`, your minimum and maximum values
    will wrap together. Thus, if your `value` is incremented to exceed the `maximumValue`,
    it will wrap around to the `minimumValue`, and vice versa.

    *   `autorepeat`: This property allows the `UIStepper` buttons to be held in order
    to repeatedly increment the `value` without having to repeatedly tap the element.

    *   `continuous`: Specifies whether value change events are sent every time the
    `value`property changes or only if the user has finished changing the value, as
    used with the `autorepeat`property


    As before, you can assign actions to be performed upon the changing of the `value`property
    using the `-addTarget:selector:forControlEvents:` method with `UIControlEventValueChanged`.


    Once your `UIStepper` is fully configured, the only concept to keep in mind when
    designing your application is to make sure that your user interface informs the
    user clearly as to which value a `UIStepper` changes.


    ### Data Views


    In iOS you have access to a variety of subclasses of `UIView`, known collectively
    as “data views,” that allow you to easily place content in your application in
    very specific ways depending on the type of your application.


    #### UIImageView


    One of the most intuitive and important data views in Cocoa Touch is the `UIImageView`
    class. This view element, along with its properties and methods, is optimized
    to help the developer display and manage images within an application.


    The core properties of a `UIImageView` are its `image` and `highlightedImage`
    properties. Both of these will be instances of the `UIImage` class, with the `highlightedImage`
    being displayed only if the image is selected. You can create and specify these
    images programmatically by using the `-initWithImage:`or`-initWithImage:highlightedImage:`
    designated initializers, or by simply setting the properties individually. An
    example is as follows:


    `self.myImageView = [[UIImageView alloc] initWithImage:[UIImage`

    `imageNamed:@"myImage.png"]];`


    If you make use of the `+imageNamed:`method to create your `UIImage`, you will
    need to make sure that your actual image file is imported into your project. You
    can do this by dragging the file from the Finder into Xcode. When you do this,
    a dialog will appear, and you need to make sure that the option marked “Copy items
    into destination group’s folder (if needed)” is checked, as in [Figure 3–15](#Chapter03.html#fig_3_15).


    ![Image](images/9781430240051_Fig03-15.jpg)


    **Figure 3–15.** *Pop-up dialog for adding files to a project*


    The `UIImageView` class also has built-in functionality to allow for animating
    multiple images by making use of the following properties:


    *   `animationImages`: This property, an `NSArray` of `UIImage` objects, specifies
    the actual images to be animated.

    *   `highlightedAnimationImages`: This acts just like the `animationImages`property,
    but for when the `UIImageView` is highlighted.

    *   `animationDuration`:This value, created as an `NSTimeInterval`, represents
    the total time for all the images in `animationImages` to cycle through. The value,
    if unspecified, defaults to the number of images multiplied by 1/30 of a second.

    *   `animationRepeatCount`: Quite simply, this value specifies how many times
    the cycle of images will repeat. If set to 0, the default, the animation will
    repeat indefinitely.


    Once your `UIImageView`’s animation properties are configured, you can manage
    the actual animation using the `-startAnimating`, `-stopAnimating`, and `isAnimating`methods.


    One of the most important properties to keep in mind when dealing with a `UIImageView`
    is the `contentMode` property. While this is actually inherited from `UIView`,
    it tends to become very important when dealing with images. The `contentMode`
    property essentially specifies how the view will respond to dealing with content
    whose aspect ratio does not fit well with the view it is placed in, such as a
    rectangular image being shown by a square `UIImageView`. There are a variety of
    options for this property, all of which are fully documented in the Apple documentation,
    but most of the time you will probably opt for `UIViewContentModeScaleAspectFill`.
    This option may end up clipping part of an image out, but it will be certain to
    fill the entire space of the presenting view, improving design quality. If, for
    any reason, you require the image to not be clipped and would prefer the empty
    space, you can use the `UIViewContentModeScaleAspectFit` value.'
