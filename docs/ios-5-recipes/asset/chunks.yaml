  trans: "\n### 配方 14–1：编写简单的推文\n\nTwitter 服务的核心基础是发送“推文”这一概念。推文由简短的信息片段组成，限制在 140\
    \ 个字符以内，有时会附带一张图片或外部链接。在 Twitter 框架中，你可以使用一个预配置的类来轻松发送这些消息。\n\n在使用 Twitter 框架时，你构建的任何围绕访问特定\
    \ Twitter 账号以发送或检索信息的功能，实际上都无法在 iOS 模拟器上运行，因为你无法将其连接到 Twitter 账号。因此，你将选择在物理设备上测试所有基于\
    \ Twitter 的配方。\n\n为了测试那些需要在设备上拥有账号的功能，你需要确保设备至少配置了一个 Twitter 账号。你可以通过 Twitter\
    \ 网站或 Twitter iOS 应用创建账号。一旦拥有账号，你必须向设备提供登录信息。此配置可以通过设备上的“设置”应用访问，效果类似于图 14-1。\n\
