- fmt: "Finally, you are ready to implement your map's delegate method back in your\
    \ main view controller. In this method, you will create your `DetailViewController`\
    \ and give it the necessary text, set it to do only a partial curl transition,\
    \ and then present it. After you have correctly imported your header file using\
    \ `#import \"DetailViewController.h\"`, your method implementation will look like\
    \ so:\n\n```\n-(void)mapView:(MKMapView *)mapView annotationView:(MKAnnotationView\
    \ *)view\ncalloutAccessoryControlTapped:(UIControl *)control\n{\n    MyAnnotation\
    \ *ann = view.annotation;\n    DetailViewController *dvc = [[DetailViewController\
    \ alloc] initWithTitle:ann.title\nsubtitle:ann.subtitle];\n    dvc.modalTransitionStyle\
    \ = UIModalTransitionStylePartialCurl;\n    [self presentViewController:dvc animated:YES\
    \ completion:^{}];\n}\n```\n\n**NOTE:** It is necessary to declare the variable\
    \ `ann` as an instance of `MyAnnotation` in order to assure the compiler that\
    \ the annotation you are being given will have the properties of `.title` and\
    \ `.subtitle` that you are asking for.\n\nOnce this code has been added, your\
    \ application should resemble [Figure 5–22](#Chapter05.html#fig_5_22) when a detail\
    \ disclosure button is pressed.\n\n![Image](images/9781430240051_Fig05-22.jpg)\n\
    \n**Figure 5–22.** *Application responding to the tapping of callouts*\n\n###\
    \ Recipe 5–4: Adding Overlays to a Map\n\nAnnotations are not the only thing that\
    \ can be added to a map. Here, you will go over how to add overlays to a map,\
    \ which can take on a variety of shapes, from circles to polygons to lines. This\
    \ recipe will build off of the first recipe in this chapter.\n\nYou will be adding\
    \ two kinds of overlays to your `MapView`, both polygon overlays and line overlays.\
    \ The process to add these is very similar to that of adding annotations, but\
    \ you do not have to create a separate class for the overlays like you did with\
    \ the annotations.\n\nFirst, you will implement the `MapView` delegate method\
    \ to tell your `MapView` how to deal with overlays. You will be setting up your\
    \ method to handle both polygons and lines by using the `class` methods to check\
    \ the type of overlay.\n\n```\n-(MKOverlayView *)mapView:(MKMapView *)mapView\
    \ viewForOverlay:(id )overlay{\n    if([overlay isKindOfClass:[MKPolygon class]]){\n\
    \        MKPolygonView *view = [[MKPolygonView alloc] initWithOverlay:overlay];\n\
    \n        //Display settings\n        view.lineWidth=1;\n        view.strokeColor=[UIColor\
    \ blueColor];\n        view.fillColor=[[UIColor blueColor] colorWithAlphaComponent:0.5];\n\
    \        return view;\n    }\n    else if ([overlay isKindOfClass:[MKPolyline\
    \ class]])\n    {\n        MKPolylineView *view = [[MKPolylineView alloc] initWithOverlay:overlay];\n\
    \n        //Display settings\n        view.lineWidth = 3;\n        view.strokeColor\
    \ = [UIColor blueColor];\n        return view;\n    }\n    return nil;\n}\n```\n\
    \nNow you just need to create your overlays and add them to the `MapView` by adding\
    \ the following code to `-viewDidLoad`.\n\n```\n//Create and Add Overlays\n  \
    \  NSMutableArray *overlays = [[NSMutableArray alloc] initWithCapacity:2];\n \
    \   CLLocationCoordinate2D polyCoords[5]={\n        CLLocationCoordinate2DMake(39.9,\
    \ -76.6),\n        CLLocationCoordinate2DMake(36.7, -84.0),\n        CLLocationCoordinate2DMake(33.1,\
    \ -89.4),\n        CLLocationCoordinate2DMake(27.3, -80.8),\n        CLLocationCoordinate2DMake(39.9,\
    \ -76.6)\n    };\n    MKPolygon *Poly = [MKPolygon polygonWithCoordinates:polyCoords\
    \ count:5];\n    [overlays addObject:Poly];\n    CLLocationCoordinate2D pathCoords[2]\
    \ = {\n        CLLocationCoordinate2DMake(46.8, -100.8),\n        CLLocationCoordinate2DMake(43.7,\
    \ -70.4)\n    };\n    MKPolyline *pathLine = [MKPolyline polylineWithCoordinates:pathCoords\
    \ count:2];\n    [overlays addObject:pathLine];\n    [self.mapViewUserMap addOverlays:overlays];\n\
    ```\n\n**CAUTION:** When making `MKPolygon`s, your last coordinate point should\
    \ be the same as your first one. If not, you will have issues getting the correct\
    \ shapes.\n\nWhen you run the app now, you should see the screen in [Figure 5–23](#Chapter05.html#fig_5_23)\
    \ when you zoom out on the map. You will also notice the polygon and line that\
    \ we've set up are rather strange in shape and location, as they are simply meant\
    \ to demonstrate what you can do with overlays on a `MapView`.\n\n![Image](images/9781430240051_Fig05-23.jpg)\n\
    \n**Figure 5–23.** *Map with geometric and path overlays*\n\nOverlays are incredibly\
    \ useful in Map Kit apps, and can also be very easily customized. Most of the\
    \ properties such as color or line width can be changed, allowing you to fully\
    \ customize how your app looks and acts. Overlays can also be created from circles,\
    \ as well as other user-defined shapes. Refer to the Apple documentation for details\
    \ on how to use any of these other functions."
