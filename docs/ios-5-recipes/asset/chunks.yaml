- fmt: "# Map Kit Recipes\n\nThe Map Kit framework is an incredibly powerful and useful\
    \ toolkit that adds immense functionality to the location services that devices\
    \ offer. The framework's key focus is the ability to place a user-interactive\
    \ map in an application, with countless other features expanding functionality,\
    \ allowing for a nearly entirely customizable mapping interface. iOS 5 has continued\
    \ to improve the capabilities of Map Kit, improving developer capability and making\
    \ map-based applications increasingly dynamic and useful.\n\nFor all projects\
    \ in this chapter, as in all other chapters, make sure that ARC (Automatic Reference\
    \ Counting) is enabled.\n\n## Recipe 5–1: Showing a Map with the Device's Location\n\
    \nThe core foundation of any Map Kit application is the actual displaying of the\
    \ world map. In this section, you will go over how to create a Map Kit application,\
    \ display a map, and allow the map to show the user's location.\n\nYou will start\
    \ by creating a new project using the Single View Application template, as shown\
    \ by [Figure 5–1](#Chapter05.html#fig_5_1).\n\n![Image](images/9781430240051_Fig05-01.jpg)\n\
    \n**Figure 5–1.** *Selecting a single view application*\n\n[Figure 5–2](#Chapter05.html#fig_5_2)\
    \ shows the configuration settings you will use for this project. Your version\
    \ of Xcode may also include a box for Use Automatic Reference Counting. Make sure\
    \ this box is always checked. You can name the project `Chapter5Recipe1`.\n\n\
    ![Image](images/9781430240051_Fig05-02.jpg)\n\n**Figure 5–2.** *Configuring your\
    \ project*\n\nTo begin, you will need to add the Map Kit framework and the Core\
    \ Location framework to the project. In the navigator pane, select the `Chapter5Recipe1`\
    \ project file, and then make sure the `Chapter5Recipe1` target is selected in\
    \ the Editor view (if not already selected). Click the `Build Phases` tab, and\
    \ expand the `Link Binary With Libraries` section. Click the `+` button to add\
    \ the frameworks to the labels, as highlighted in [Figure 5–3](#Chapter05.html#fig_5_3),\
    \ and use the resulting pop-up resembling [Figure 5–4](#Chapter05.html#fig_5_4)\
    \ to add the required frameworks.\n\n![Image](images/9781430240051_Fig05-03.jpg)\n\
    \n**Figure 5–3.** *Clicking the + button to add a framework*\n\n![Image](images/9781430240051_Fig05-04.jpg)\n\
    \n**Figure 5–4.** *Selecting the Core Location and Map Kit frameworks*\n\nNow\
    \ that the frameworks have been added, you can start to build your interface.\
    \ Select the view controller's `.xib` file from the navigation pane, and drag\
    \ an `MKMapView` from the objects browser to the workspace so that it fills the\
    \ view.\n\nNext, add a `UILabel` on top of the `MKMapView` that will be used to\
    \ display the device's latitude and longitude. [Figure 5–5](#Chapter05.html#fig_5_5)\
    \ shows an example of what your user interface will resemble.\n\n![Image](images/9781430240051_Fig05-05.jpg)\n\
    \n**Figure 5–5.** *`.xib` file with `MKMapView` and `UILabel`*\n\nUsing the Assistant\
    \ Editor, drag a connection from the `MKMapView` to the `SBViewController` interface\
    \ file (`.h`) with a ^-click-drag from the `MKMapView` to the `SBViewController`\
    \ file, as demonstrated in [Figures 5–6](#Chapter05.html#fig_5_6) and [5–7](#Chapter05.html#fig_5_7).\n\
    \n**NOTE:** If the interface file is not shown in the second pane of the Assistant\
    \ Editor, make sure you click your view controller in the workspace.\n\n![Image](images/9781430240051_Fig05-06.jpg)\n\
    \n**Figure 5–6.** *Connecting the `MKMapView` to an outlet*\n\nName the `MKMapView`\
    \ outlet `mapViewUserMap`.\n\n![Image](images/9781430240051_Fig05-07.jpg)\n\n\
    **Figure 5–7.** *Configuring the map view outlet*\n\nRepeat the same steps with\
    \ the `UILabel`, and name the outlet `labelUserLocation`.\n\nYour user interface\
    \ is fully set up, so you can simply focus on the interface file (`.h`) now. Select\
    \ the `SBViewController.h` file in the navigation pane. There are two additions\
    \ you need to make to this class interface before moving to the implementation\
    \ file. The first is to add the `MapKit/MapKit.h` framework library to the class\
    \ with an import statement, and the second is to define the class as complying\
    \ with the `MKMapViewDelegate` protocol. Apple recommends that when you use a\
    \ `MapView`, you should assign it a delegate object. The completed interface file\
    \ (`.h`) looks like this:\n\n```\n//  SBViewController.h\n//  Chapter5Recipe1\n\
    #import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n\n@interface SBViewController\
    \ : UIViewController <MKMapViewDelegate> {\n    MKMapView *mapViewUserMap;\n \
    \   UILabel *labelUserLocation;\n}\n\n@property (strong, nonatomic) IBOutlet MKMapView\
    \ *mapViewUserMap;\n@property (strong, nonatomic) IBOutlet UILabel *labelUserLocation;\n\
    \n@end\n```"
  raw: '## Map Kit Recipes


    The Map Kit framework is an incredibly powerful and useful toolkit that adds immense
    functionality to the location services that " devices offer. The framework''s
    key focus is the ability to place a user-interactive map in an application, with
    countless other features expanding functionality, allowing for a nearly entirely
    customizable mapping interface. iOS 5 has continued to improve the capabilities
    of Map Kit, improving developer capability and making map-based applications increasingly
    dynamic and useful.


    For all projects in this chapter, as in all other chapters, make sure that ARC
    (Automatic Reference Counting) is enabled.


    ### Recipe 5–1: Showing a Map with the Device''s Location


    The core foundation of any Map Kit application is the actual displaying of the
    world map. In this section, you will go over how to create a Map Kit application,
    display a map, and allow the map to show the user''s location.


    You will start by creating a new project using the Single View Application template,
    as shown by [Figure 5–1](#Chapter05.html#fig_5_1).


    ![Image](images/9781430240051_Fig05-01.jpg)


    **Figure 5–1.** *Selecting a single view application*


    [Figure 5–2](#Chapter05.html#fig_5_2) shows the configuration settings you will
    use for this project. Your version of Xcode may also include a box for Use Automatic
    Reference Counting. Make sure this box is always checked. You can name the project
    Chapter5Recipe1.


    ![Image](images/9781430240051_Fig05-02.jpg)


    **Figure 5–2.** *Configuring your project*


    To begin, you will need to add the Map Kit framework and the Core Location framework
    to the project. In the navigator pane, select the Chapter5Recipe1 project file,
    and then make sure the Chapter5Recipe1 target is selected in the Editor view (if
    not already selected). Click the Build Phases tab, and expand the Link Binary
    With Libraries section. Click the + button to add the frameworks to the labels,
    as highlighted in [Figure 5–3](#Chapter05.html#fig_5_3), and use the resulting
    pop-up resembling [Figure 5–4](#Chapter05.html#fig_5_4) to add the required frameworks.


    ![Image](images/9781430240051_Fig05-03.jpg)


    **Figure 5–3.** *Clicking the + button to add a framework*


    ![Image](images/9781430240051_Fig05-04.jpg)


    **Figure 5–4.** *Selecting the Core Location and Map Kit frameworks*


    Now that the frameworks have been added, you can start to build your interface.
    Select the view controller''s `.xib` file from the navigation pane, and drag a
    `MKMapView` from the objects browser to the workspace so that it fills the view.


    Next, add a `UILabel` on top of the `MKMapView` that will be used to display the
    device''s latitude and longitude. [Figure 5–5](#Chapter05.html#fig_5_5) shows
    an example of what your user interface will resemble.


    ![Image](images/9781430240051_Fig05-05.jpg)


    **Figure 5–5.** *`.xib` file with `MKMapView` and `UILabel`*


    Using the Assistant Editor, drag a connection from the `MKMapView` to the `SBViewController`
    interface file (`.h`) with a ^-click-drag from the `MKMapView` to the `SBViewController`
    file, as demonstrated in [Figures 5–6](#Chapter05.html#fig_5_6) and [5–7](#Chapter05.html#fig_5_7).


    **NOTE:** If the interface file is not shown in the second pane of the Assistant
    Editor, make sure you click your view controller in the workspace.


    ![Image](images/9781430240051_Fig05-06.jpg)


    **Figure 5–6.** *Connecting the `MKMapView` to an outlet*


    Name the `MKMapView` outlet “mapViewUserMap”.


    ![Image](images/9781430240051_Fig05-07.jpg)


    **Figure 5–7.** *Configuring the map view outlet*


    Repeat the same steps with the `UILabel`, and name the outlet “labelUserLocation”.


    Your user interface is fully set up, so you can simply focus on the interface
    file (`.h`) now. Select the `SBViewController.h` file in the navigation pane.
    There are two additions you need to make to this class interface before moving
    to the implementation file. The first is to add the `MapKit/MapKit.h` framework
    library to the class with an import statement, and the second is to define the
    class as complying with the `MKMapViewDelegate` protocol. Apple recommends that
    when you use a `MapView`, you should assign it a delegate object. The completed
    interface file (`.h`) looks like this:


    `//  SBViewController.h`

    `//  Chapter5Recipe1`

    `#import <UIKit/UIKit.h>`

    `#import <MapKit/MapKit.h>`


    `@interface SBViewController : UIViewController <MKMapViewDelegate> {`

    `    MKMapView *mapViewUserMap;`

    `    UILabel *labelUserLocation;`

    `}`


    `@property (strong, nonatomic) IBOutlet MKMapView *mapViewUserMap;`

    `@property (strong, nonatomic) IBOutlet UILabel *labelUserLocation;`


    `@end`'
  trans: "\n# 地图套件使用指南\n\nMap Kit 框架是一套极其强大且实用的工具集，它为设备提供的位置服务增添了丰富的功能。该框架的核心在于能在应用程序中放置用户可交互的地图，并通过无数其他扩展功能实现近乎完全可定制的地图界面。iOS\
    \ 5 继续提升了 Map Kit 的能力，增强了开发者的开发能力，使基于地图的应用更加动态且实用。\n\n与本书其他章节相同，本章所有项目都应确保已启用\
    \ ARC（自动引用计数）。\n\n## 配方 5–1：在地图上显示设备位置\n\n任何 Map Kit 应用的基础核心都是世界地图的实际显示。在本节中，你将了解如何创建一个\
    \ Map Kit 应用、显示地图，并让地图显示用户的位置。\n\n首先，使用**单视图应用**模板创建一个新项目，如图 图 5–1 所示。\n\n![图片](img/9781430240051_Fig05-01.jpg)\n\
    \n**图 5–1.** *选择单视图应用*\n\n图 5–2 显示了此项目将使用的配置设置。你的 Xcode 版本可能还包含“使用自动引用计数”复选框，请确保始终勾选该复选框。你可以将项目命名为\
    \ `Chapter5Recipe1`。\n\n![图片](img/9781430240051_Fig05-02.jpg)\n\n**图 5–2.** *配置项目*\n\
    \n首先，你需要将 Map Kit 框架和 Core Location 框架添加到项目中。在导航窗格中，选择 `Chapter5Recipe1` 项目文件，然后在编辑器视图中确保已选中\
    \ `Chapter5Recipe1` 目标（如果未选中）。点击`构建阶段`标签，展开`将二进制文件与库链接`部分。点击`+`按钮将框架添加到列表中，如图\
    \ 图 5–3 中高亮所示，并使用弹出的窗口（类似图 5–4）添加所需框架。\n\n![图片](img/9781430240051_Fig05-03.jpg)\n\
    \n**图 5–3.** *点击 + 按钮添加框架*\n\n![图片](img/9781430240051_Fig05-04.jpg)\n\n**图 5–4.**\
    \ *选择 Core Location 和 Map Kit 框架*\n\n添加框架后，可以开始构建界面。从导航窗格中选择视图控制器的 `.xib` 文件，并从对象浏览器中拖拽一个\
    \ `MKMapView` 到工作区，使其填满视图。\n\n接下来，在 `MKMapView` 顶部添加一个 `UILabel`，用于显示设备的纬度和经度。图\
    \ 5–5 展示了用户界面的示例样式。\n\n![图片](img/9781430240051_Fig05-05.jpg)\n\n**图 5–5.** *包含\
    \ `MKMapView` 和 `UILabel` 的 `.xib` 文件*\n\n使用助理编辑器，通过从 `MKMapView` 按住 ^-键拖拽到 `SBViewController`\
    \ 文件的方式，将 `MKMapView` 连接到 `SBViewController` 接口文件（`.h`），如 图 5–6 和 图 5–7 所示。\n\n\
    **注意：** 如果接口文件未显示在助理编辑器的第二个窗格中，请确保你在工作区中点击了视图控制器。\n\n![图片](img/9781430240051_Fig05-06.jpg)\n\
    \n**图 5–6.** *将 `MKMapView` 连接到 Outlet*\n\n将 `MKMapView` 的 Outlet 命名为 `mapViewUserMap`。\n\
    \n![图片](img/9781430240051_Fig05-07.jpg)\n\n**图 5–7.** *配置地图视图 Outlet*\n\n对 `UILabel`\
    \ 重复相同步骤，并将 Outlet 命名为 `labelUserLocation`。\n\n至此，用户界面已完全设置好，你可以直接专注于接口文件（`.h`）的编写。在导航窗格中选择\
    \ `SBViewController.h` 文件。在进入实现文件之前，需要对此类接口进行两处补充。首先，通过导入语句将 `MapKit/MapKit.h`\
    \ 框架库添加到类中；其次，将类定义为遵循 `MKMapViewDelegate` 协议。苹果建议，当你使用 `MapView` 时，应为其指定一个委托对象。完整的接口文件（`.h`）如下所示：\n\
    \n```\n//  SBViewController.h\n//  Chapter5Recipe1\n#import <UIKit/UIKit.h>\n\
    #import <MapKit/MapKit.h>\n\n@interface SBViewController : UIViewController <MKMapViewDelegate>\
    \ {\n    MKMapView *mapViewUserMap;\n    UILabel *labelUserLocation;\n}\n\n@property\
    \ (strong, nonatomic) IBOutlet MKMapView *mapViewUserMap;\n@property (strong,\
    \ nonatomic) IBOutlet UILabel *labelUserLocation;\n\n@end\n```\n"
- fmt: "切换到实现文件`SBViewController.m`，让我们开始在`viewDidLoad`方法中设置`MKMapView`。每当你使用`MKMapView`对象时，都应设置其委托（delegate）和区域（region）。\n\
    \n区域是当前显示的地图部分，由一个中心坐标以及围绕中心坐标的纬度和经度距离构成。如果你和大多数人一样不习惯用经纬度来思考距离，可以使用`MKCoordinateRegionMakeWithDistance`方法，通过中心坐标和围绕该坐标的米数来创建区域。如果你对公制单位不熟悉，1米比1码稍长一点。\n\
    \n在本示例中，我选择将地图初始平移到显示我的家乡马里兰州巴尔的摩。我为该位置定义了一个坐标，然后定义一个包含该中心坐标周围10公里×10公里区域的区域。\n\
    \n```\n//设置MKMapView委托\nself.mapViewUserMap.delegate=self;\n\n//设置MKMapView起始区域\n\
    CLLocationCoordinate2D coordinateBaltimore = CLLocationCoordinate2DMake(39.303,\
    \ -76.612);\nself.mapViewUserMap.region=\n    MKCoordinateRegionMakeWithDistance(coordinateBaltimore,\n\
    \                                       10000,\n                             \
    \          10000);\n```\n\n两个可选属性值得一提：`.zoomEnabled`和`.scrollEnabled`。这两个属性分别控制用户与地图的交互，可以防止用户缩放或平移地图。\n\
    \n```\n//可选控制\n//    self.mapViewUserMap.zoomEnabled=NO;\n//    self.mapViewUserMap.scrollEnabled=NO;\n\
    ```\n\n最后，你需要将地图设置为显示用户位置。这可以通过`.showUserLocation`属性轻松完成。将此属性设置为`YES`将启动核心位置跟踪方法，并提示用户授权该应用程序进行位置跟踪。\n\
    \n**注意：**仅仅因为`showUserLocation`被设置为`YES`，用户的位置不会自动在地图上可见。要判断该位置是否在当前地图区域内可见，请使用`userLocationVisible`属性。\n\
    \n告知地图要显示用户位置后，你还可以通过设置`.userTrackingMode`属性或使用`setUserTrackingMode:animated:`方法告知地图跟踪用户位置。该属性接受三个可能的值：\n\
    \n* `MKUserTrackingModeNone`：不跟踪用户位置；地图可以移动到不包含用户位置的区域。\n* `MKUserTrackingModeFollow`：地图将平移以保持用户位置在中心。地图顶部始终指向北方。如果用户手动平移地图，跟踪将停止。\n\
    * `MKUserTrackingModeFollowWithHeading`：地图将平移以保持用户位置在中心，并且地图会旋转，使得用户朝向位于地图顶部。如果用户手动平移地图，跟踪将停止。\n\
    \n最初，你将`userTrackingMode`设置为`MKUserTrackingModeFollow`，但稍后我将展示如何让用户自行控制跟踪模式。下面的`if`语句将确认设备上已启用位置服务。\n\
    \n```\n//控制地图上的用户位置\nif ([CLLocationManager locationServicesEnabled])\n{\n   \
    \ mapViewUserMap.showsUserLocation = YES;\n    [mapViewUserMap setUserTrackingMode:MKUserTrackingModeFollow\
    \ animated:YES];\n}\n```\n\n完整的`viewDidLoad`方法如下所示：\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n\n    //设置MKMapView委托\n    self.mapViewUserMap.delegate=self;\n\
    \n    //设置MKMapView起始区域\n    CLLocationCoordinate2D coordinateBaltimore = CLLocationCoordinate2DMake(39.303,\
    \ -76.612);\n    self.mapViewUserMap.region=\n        MKCoordinateRegionMakeWithDistance(coordinateBaltimore,\n\
    \                                           10000,\n                         \
    \                  10000);\n\n    //可选控制\n    //    self.mapViewUserMap.zoomEnabled=NO;\n\
    \    //    self.mapViewUserMap.scrollEnabled=NO;\n\n    //控制地图上的用户位置\n    if ([CLLocationManager\
    \ locationServicesEnabled])\n    {\n        mapViewUserMap.showsUserLocation =\
    \ YES;\n        [mapViewUserMap setUserTrackingMode:MKUserTrackingModeFollow animated:YES];\n\
    \    }\n}\n```\n\n下一个重要的事情是`viewDidUnload`方法。每当你为一个对象设置委托时，应该在释放该对象之前将委托设为`nil`，以避免任何内存问题。因此，你需要在`viewDidUnload`中添加一行，将`self.mapViewUserMap`的委托设为`nil`：\n\
    \n```\n- (void)viewDidUnload\n{\n    self.mapViewUserMap.delegate=nil;\n    [self\
    \ setMapViewUserMap:nil];\n    [self setLabelUserLocation:nil];\n    [super viewDidUnload];\n\
    }\n```\n\n最后要做的事情是设置一个`mapView`委托方法，以更新显示用户当前位置的标签。你将使用`-mapView:didUpdateUserLocation:`委托方法。你的方法实现如下：\n\
    \n```\n-(void)mapView:(MKMapView *)mapView didUpdateUserLocation:(MKUserLocation\
    \ *)userLocation{\n    self.labelUserLocation.text=\n        [NSString\n     \
    \       stringWithFormat:@\"Current Location: %.5f°, %.5f°\",\n              \
    \  userLocation.coordinate.latitude,\n                userLocation.coordinate.longitude];\n\
    }\n```\n\n你已经有了足够的起点，现在可以在模拟器上运行你的应用。你可以使用键盘快捷键`⌘R`来运行应用。当应用在模拟器上启动时，系统将提示用户允许该应用访问其位置。[图5–8](#Chapter05.html#fig_5_8)显示了你的应用程序展示这个确切的提示信息。\n\
    \n![Image](images/9781430240051_Fig05-08.jpg)\n\n**图5–8.** *应用程序访问位置的提示*\n\n如果你点击“OK”，并且在你的设备上看到巴尔的摩市（但地图上没有你的位置标记），那么你可能需要启动位置调试服务。在模拟器上，前往菜单选项**Debug**\
    \ ![Image](images/U001.jpg) **Location** ![Image](images/U001.jpg) **Freeway Drive**，这将启动模拟器上的位置模拟服务。地图应平移到新位置（在加利福尼亚州记录的一段驾驶路线）并更新位置标签。\n\
    \n用户在本示例中会遇到的其中一个问题是：如果他们尝试手动平移地图，用户位置跟踪就会停止。Apple提供了一个新的`UIBarButtonItem`类，名为`MKUserTrackingBarButtonItem`。此按钮可以添加到任何`UIToolBar`或`UINavigationBar`中，并会在指定的地图视图上切换用户跟踪模式。\n\
    \n你可以通过使用`initWithMapView:`方法，将你想要控制的`MKMapView`传递给`MKUserTrackingBarButtonItem`来进行初始化。\n\
    \n为此，你需要在Interface Builder中向你的`.xib`文件添加一个`UIToolbar`，并为其创建一个名为`toolbarMapTools`的插座。你可以删除工具栏默认添加的`BarButtonItem`，否则你的`viewDidLoad`方法会覆盖它。如果你从`.xib`文件中删除它，你的用户界面将类似于[图5–9](#Chapter05.html#fig_5_9)。\n\
    \n![Image](images/9781430240051_Fig05-09.jpg)\n\n**图5–9.** *向`.xib`底部添加工具栏*\n\n\
    现在你将通过代码添加`MKUserTrackingBarButtonItem`。切换到视图控制器实现文件`SBViewController.m`，并滚动到`viewDidLoad`方法。在`viewDidLoad`底部添加以下代码："
  raw: 'Switch to the implementation file, `SBViewController.m`, and let''s start
    by setting up the `MKMapView` in the `viewDidLoad` method. Whenever you use an
    `MKMapView` object, you should set its delegate and its region.


    The region is the portion of the map that is currently being displayed. The region
    consists of a center coordinate and a distance in latitude and longitude to show
    surrounding the center coordinate. If you are like most people, you don''t think
    of distances in latitudinal and longitudinal degrees, so you can use the method
    `MKCoordinateRegionMakeWithDistance` to create a region using a center coordinate
    and meters surrounding the coordinate. If you are unfamiliar with the metric system,
    a meter is just a tiny bit longer than a yard.


    In this recipe, I chose to start with the map initially panned to show my hometown
    of Baltimore, MD. I define a coordinate for this location and then define a region
    that contains the area 10km x 10km around this center coordinate.


    `    //Set MKMapView delegate`

    `    self.mapViewUserMap.delegate=self;`


    `    //Set MKMapView starting region`

    `    CLLocationCoordinate2D coordinateBaltimore = CLLocationCoordinate2DMake(39.303,
    -`

    `76.612);`

    `    self.mapViewUserMap.region=`

    `        MKCoordinateRegionMakeWithDistance(coordinateBaltimore,`

    `                                           10000,`

    `                                           10000);`


    Two optional properties worth mentioning are `.zoomEnabled` and `.scrollEnabled`.
    These two properties control the interactions a user can have with the map. They
    can prevent a user from zooming or panning a map, respectively.


    `    //Optional Controls`

    `//    self.mapViewUserMap.zoomEnabled=NO;`

    `//    self.mapViewUserMap.scrollEnabled=NO;`


    Finally, you will define the map as showing the user''s location. This is easily
    done with the `.showUserLocation` property. Setting this property to YES will
    start the Core Location tracking methods and prompt the user to authorize location
    tracking for this application.


    **NOTE:** Just because `showUserLocation` is set to YES, the user''s location
    is not automatically visible on the map. To determine if the location is visible
    in the current region of the map, use the property `userLocationVisible`.


    After you have told the map that you want to show the user location, you can also
    tell the map to track the user location by setting the `.userTrackingMode` property
    or using the method `setUserTrackingMode:animated:`. This property accepts three
    possible values:


    *   `MKUserTrackingModeNone`: Does not track the user''s location; the map can
    be moved to a region that does not contain the user''s location.

    *   `MKUserTrackingModeFollow`: Map will be panned to keep the user''s location
    at the center. The top of the map will be North. If the user pans the map manually,
    tracking will stop.

    *   `MKUserTrackingModeFollowWithHeading`: Map will be panned to keep the user''s
    location at the center, and the map will be rotated so that the user''s heading
    is at the top of the map. If the user pans the map manually, tracking will stop.


    Initially, you are going to set `userTrackingMode` to `MKUserTrackingModeFollow`,
    but later I will show how to give users the ability to control the tracking mode
    themselves. The following `if` statement will confirm that location services have
    already been enabled on the device.


    `    //Control User Location on Map`

    `    if ([CLLocationManager locationServicesEnabled])`

    `    {`

    `        mapViewUserMap.showsUserLocation = YES;`

    `        [mapViewUserMap setUserTrackingMode:MKUserTrackingModeFollow animated:YES];`

    `    }`


    In whole, your `viewDidLoad` method looks like the following:


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`


    `    //Set MKMapView delegate`

    `    self.mapViewUserMap.delegate=self;`


    `    //Set MKMapView starting region`

    `    CLLocationCoordinate2D coordinateBaltimore = CLLocationCoordinate2DMake(39.303,
    -`

    `76.612);`

    `    self.mapViewUserMap.region=`

    `        MKCoordinateRegionMakeWithDistance(coordinateBaltimore,`

    `                                           10000,`

    `                                           10000);`


    `    //Optional Controls`

    `//    self.mapViewUserMap.zoomEnabled=NO;`

    `//    self.mapViewUserMap.scrollEnabled=NO;`


    `    //Control User Location on Map`

    `    if ([CLLocationManager locationServicesEnabled])`

    `    {`

    `        mapViewUserMap.showsUserLocation = YES;`

    `        [mapViewUserMap setUserTrackingMode:MKUserTrackingModeFollow animated:YES];`

    `    }`

    `}`


    The next important thing is the `viewDidUnload` method. Whenever you set a delegate
    for an object, you should set the delegate = nil before you release the object
    in order to avoid any memory issues. So you''ll need to add a line in your `viewDidUnload`
    to set the delegate to nil on `self.mapViewUserMap`:


    `- (void)viewDidUnload`

    `{`

    `    self.mapViewUserMap.delegate=nil;`

    `    [self setMapViewUserMap:nil];`

    `    [self setLabelUserLocation:nil];`

    `    [super viewDidUnload];`

    `}`


    The last thing you will do is set up one of the `mapView` delegate methods to
    update the label with the user''s current location. You will use the `-mapView:didUpdateUserLocation:`
    delegate method. Your implementation of the method will look like this:


    `-(void)mapView:(MKMapView *)mapView didUpdateUserLocation:(MKUserLocation`

    `*)userLocation{`

    `    self.labelUserLocation.text=`

    `        [NSString`

    `            stringWithFormat:@"Current Location: %.5f°, %.5f°",`

    `                userLocation.coordinate.latitude,`

    `                userLocation.coordinate.longitude];`

    `}`


    You have enough of a start that you can now run your app on the simulator. You
    can run the app by using the keyboard shortcut ⌘R. When the app launches on the
    simulator, the user will be prompted to allow the app access to his or her location.
    [Figure 5–8](#Chapter05.html#fig_5_8) shows your application displaying this exact
    prompt.


    ![Image](images/9781430240051_Fig05-08.jpg)


    **Figure 5–8.** *App''s prompt to access location*


    If you click OK and you are looking at the city of Baltimore on your device (and
    there is no sign of your location on the map), then you may need to start the
    location debug services. On the simulator, go to the menu option **Debug** ![Image](images/U001.jpg)
    **Location** ![Image](images/U001.jpg) **Freeway Drive**, and this will start
    the location simulation services on the simulator. The map should pan to the new
    location (a drive recorded in California) and update the location label.


    One of the problems users will experience with this recipe is if they try to manually
    pan the map, the user location tracking stops. Apple has provided a new `UIBarButtonItem`
    class named `MKUserTrackingBarButtonItem`. This button can be added to any `UIToolBar`
    or `UINavigationbar` and will toggle the user tracking modes on the specified
    map view.


    You initialize the `MKUserTrackingBarButtonItem` by passing it the `MKMapView`
    that you want it to control with the `initWithMapView:` method.


    To set this up, you''ll add a `UIToolbar` to your `.xib` file in Interface Builder
    and create an outlet for it named “toolbarMapTools”. You can delete the default
    `BarButtonItem` it adds to the toolbar or your `viewDidLoad` method will override
    it. If you delete it from the `.xib` file, your user interface will now resemble
    [Figure 5–9](#Chapter05.html#fig_5_9).


    ![Image](images/9781430240051_Fig05-09.jpg)


    **Figure 5–9.** *Adding a toolbar to the bottom of the `.xib`*


    Now you will add your `MKUserTrackingBarButtonItem` in code. Switch to the view
    controller implementation file, `SBViewController.m`, and scroll to the `viewDidLoad`
    method. Add the following code at the bottom of `viewDidLoad`:'
