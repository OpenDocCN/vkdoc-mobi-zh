    `    NSArray *events = [self.eventStore eventsMatchingPredicate:predicate];`

    `    for (EKEvent *event in events)`

    `    {`

    `        NSLog(@"%@", event.title);`

    `    }`

    `}`


    The `+date` method is a nice little way to very easily get the current date and
    time represented as an `NSDate`. The `+dateWithTimeIntervalSinceNow:` method takes
