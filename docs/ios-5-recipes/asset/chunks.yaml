    Xcode 4 introduced behaviors to the editing interface. These allow you to run
    custom commands or scripts when performing actions in Xcode. Access behaviors
    by going to `Xcode` ![Image](images/U001.jpg) `Behaviors` ![Image](images/U001.jpg)
    `Edit Behaviors.` [Figure 1–35](#Chapter01.html#fig_1_35) shows the resulting
