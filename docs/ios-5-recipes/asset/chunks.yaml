- fmt: '#### A Note on Rounded Corners


    Whenever you look at any well-made iOS application, you will probably notice that
    almost every single element will have its corners rounded. This is one of those
    small details that most people don’t notice, but can dramatically improve the
    visual quality of an application, and is actually fairly simple to implement with
    just two steps.


    First, add the following import line to your view controller’s header file:


    ```

    #import <QuartzCore/QuartzCore.h>

    ```


    Once you’ve done that, you can access the `layer` property of any class that inherits
    from `UIView`, which has a `cornerRadius` property that can be set. Here you’ll
    go ahead and round the corners on your `UITableView` by adding the following line
    to your `-viewDidLoad` method, resulting in your app resembling [Figure 9–7](#Chapter09.html#fig_9_7).


    ```

    self.tableViewCountries.layer.cornerRadius = 8.0;

    ```

    ![Image](images/9781430240051_Fig09-07.jpg)


    **Figure 9–7.** *Your `UITableView` with newly rounded corners*


    So now that you have a nice little table with your five countries set up and looking
    good, you can work on extending beyond the basic functionality of the `UITableView`.
    First, you’ll focus on the most straightforward ability of a `UITableView`: to
    act upon the selection of a specific row.


    For the purpose of this recipe, you will build your application in such a way
    that upon the selection of a row, a separate view controller is presented that
    will display all the known information about the selected country.


    First, create a new file, and choose the “UIViewController subclass” template
    as before, naming it “CountryInfoViewController”.


    Construct this controller’s view in its XIB file to resemble the one shown in
    [Figure 9–8](#Chapter09.html#fig_9_8) by using a combination of `UILabel`s, `UITextField`s,
    and a `UIImageView`. I have added a slight shadow to the “Country Title” `UILabel`
    as shown in [Figure 9–8](#Chapter09.html#fig_9_8) through the use of the Attribute
    inspector, which, though optional, adds quite a bit to the visual design of the
    layout.


    ![Image](images/9781430240051_Fig09-08.jpg)


    **Figure 9–8.** *`CountryInfoViewController`’s XIB file and configuration*


    Connect each `UITextField`, the `UIImageView`, and the top “Country Name” `UILabel`
    to your view controller with the following respective property names:


    - `nameLabel`

    - `textFieldCapital`

    - `textFieldMotto`

    - `imageViewFlag`


    After switching over to your new view controller’s header file, add the `UITextFieldDelegate`
    protocol to the header, since you will need to be able to manipulate the behavior
    of your `UITextField`s.


    In order to make your view controller as generic as possible, you will give it
    a property of your `Country` class in order to hold the currently displayed data.
    This way, you will simply populate your view with the necessary data, and if desired,
    you could even make it possible to easily re-populate with different data without
    changing views. Add an import statement for the `Country` class.


    ```

    #import "Country.h"

    ```


    Create the `Country` property like so, and then make sure to synthesize it in
    the implementation file and set it to `nil` in `-viewDidUnload`.


    ```

    @property (strong, nonatomic) Country *currentCountry;

    ```


    You will later be implementing a delegate method for this `CountryInfoViewController`
    to be able to call, so create a protocol for this by adding the following class
    and protocol declarations before the header declaration.


    ```

    @class CountryInfoViewController;


    @protocol CountryInfoDelegate <NSObject>

    -(void)countryInfoViewControllerDidFinish:(CountryInfoViewController *)countryVC;

    @end

    ```


    Now you will add a `delegate` property to your `CountryInfoViewController`, making
    sure that it is required to conform to the protocol you just created. Make sure
    to synthesize and nullify it just as with any other property.


    ```

    @property (strong, nonatomic) id <CountryInfoDelegate> delegate;

    ```


    In entirety, your header file should resemble the following code.'
