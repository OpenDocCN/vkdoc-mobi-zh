- fmt: "### Recipe 4–3: Determining Magnetic Bearing\n\nModern iPhones and iPad 2s\
    \ now contain hardware, the magnetometer, which can be used to determine which\
    \ direction the device is being held. The measurement is based on the device's\
    \ position in relation to the magnetic north pole of the earth. The magnetic poles\
    \ are not the same as the geographic poles of the earth. Magnetic north is located\
    \ in Northern Canada and moves slowly by approximately 55–60km per year toward\
    \ the west as the earth's core changes.\n\nImplementing heading tracking is very\
    \ similar to implementing any of the location tracking services we have discussed\
    \ so far. You will include the Core Location framework in your project, create\
    \ a `CLLocationManager` object, and define its delegate and delegate methods.\n\
    \nBy default, it is assumed that the device heading is measured with the device\
    \ held in portrait mode with the top of the device away from the user. You can\
    \ change this setting by setting the `headingOrientation` property on the `CLLocationManager`\
    \ object. The options for this property are as follows:\n\n`CLDeviceOrientationPortrait\
    \ (default)`\n`CLDeviceOrientationPortraitUpsideDown`\n`CLDeviceOrientationLandscapeLeft`\n\
    `CLDeviceOrientationLandscapeRight`\n\nLet us start by creating a new single view\
    \ application project named `Chapter4HeadingTracking`. If your version of Xcode\
    \ allows for specifying a class prefix, supply \"Chapter4HeadingTracking\" again.\
    \ You start by including the Core Location framework in your project by selecting\
    \ the project in the navigator pane and selecting the project's target. Add the\
    \ Core Location framework into the project just as you did at the beginning of\
    \ the chapter.\n\nNext you can set up the XIB to display your heading. Click the\
    \ `Chapter4HeadingTrackingViewController.xib` file in the navigator pane, and\
    \ Interface Builder will be loaded. Like with the previous recipes, you are going\
    \ to drag a `UILabel` and `UISwitch` object onto the XIB. The `UILabel` will be\
    \ used to display the heading information, and the `UISwitch` will be used to\
    \ turn heading tracking services on and off. You're going to set the initial state\
    \ of the `UISwitch` to Off in the Attributes inspector pane. Your XIB now looks\
    \ like [Figure 4–14](#Chapter04.html#fig_4_14).\n\n![Image](images/9781430240051_Fig04-14.jpg)\n\
    \n**Figure 4–14.** *Your still–familiar user interface setup*\n\nWith the `.xib`\
    \ file laid out, let's create some outlet properties and actions. Turn on the\
    \ Assistant Editor and select the `UIView` in the XIB. ^-click-drag from the `UILabel`\
    \ to the interface file (`.h`) to create an outlet. In the pop-up that is displayed,\
    \ name the `UILabel` \"labelHeading\". These steps should resemble [Figures 4–15](#Chapter04.html#fig_4_15)\
    \ and [4–16](#Chapter04.html#fig_4_16).\n\n![Image](images/9781430240051_Fig04-15.jpg)\n\
    \n**Figure 4–15.** *Connecting a `UILabel` outlet*\n\n![Image](images/9781430240051_Fig04-16.jpg)\n\
    \n**Figure 4–16.** *Configuring the label's outlet*\n\nRepeat the same process\
    \ with the `UISwitch`, but this time change the Connection type to Action and\
    \ name the action \"switchHeadingServices\", as shown in [Figure 4–17](#Chapter04.html#fig_4_17).\n\
    \n![Image](images/9781430240051_Fig04-17.jpg)\n\n**Figure 4–17.** *Creating your\
    \ switch's action*\n\nIn your interface file (`.h`) for `Chapter4HeadingTrackingViewController`,\
    \ import the Core Location framework and set the view controller to comply with\
    \ the `CLLocationManagerDelegate` protocol. Then define a `CLLocationManager`\
    \ instance variable. The interface file should now resemble the following:\n\n\
    ```\n//  Chapter4HeadingTrackingViewController.h\n\n#import <UIKit/UIKit.h>\n\
    #import <CoreLocation/CoreLocation.h>\n\n@interface Chapter4HeadingTrackingViewController\
    \ : UIViewController <CLLocationManagerDelegate>{\n    CLLocationManager *_locationManager;\n\
    \    UILabel *labelHeading;\n}\n\n@property (strong, nonatomic) IBOutlet UILabel\
    \ *labelHeading;\n- (IBAction)switchHeadingServices:(id)sender;\n@end\n```\n\n\
    Switch to the implementation file (`.m`), and scroll to the bottom to start defining\
    \ the `switchHeadingService` method. As with location services, you will start\
    \ by checking that heading services are available by checking the return of `[CLLocationManager\
    \ headingAvailable]`. Then you will verify that the sender is `UISwitch`:\n\n\
    ```\nif([CLLocationManager headingAvailable]){\n        if([sender isKindOfClass:[UISwitch\
    \ class]]){\n            UISwitch *headingSwitch=(UISwitch *)sender;\n       \
    \ …\n```\n\nIf the `headingSwitch` is \"on\", you will check to make sure the\
    \ instance variable `_locationManager` is instantiated and instantiate it if it\
    \ has not been. When creating an instance of `CLLocationManager` that is going\
    \ to track heading changes, you should specify the `headingFilter` property. This\
    \ property specifies how far (in degrees) that your heading has to change before\
    \ your delegate method is called. Then, as with the other location tracking services,\
    \ you will specify the `purpose` property to tell the user what you intend to\
    \ use the location information for and finally the `delegate` of the `CLLocationManager`.\
    \ Once the instance variable has been instantiated, you can call `startUpdatingHeading`\
    \ to start the heading tracking services, and you will also update your label\
    \ so you can see the progress you are making:\n\n```\nif(headingSwitch.on){\n\
    \                if(_locationManager==nil){\n                    _locationManager=[[CLLocationManager\
    \ alloc] init];\n                    _locationManager.headingFilter=5;\n     \
    \               _locationManager.purpose=@\"We will use your location to tell\
    \ you\nwhere you are headed\";\n                    _locationManager.delegate=self;\n\
    \                }\n                [_locationManager startUpdatingHeading];\n\
    \                self.labelHeading.text=@\"Starting heading tracking…\";\n}else{\n\
    \       ….\n```\n\nNext you will turn off heading tracking services if the switch\
    \ has been moved to the off position, so the completed method looks like this:\n\
    \n```\n- (IBAction)switchHeadingServices:(id)sender {\n    if([CLLocationManager\
    \ headingAvailable]){\n        if([sender isKindOfClass:[UISwitch class]]){\n\
    \            UISwitch *headingSwitch=(UISwitch *)sender;\n            if(headingSwitch.on){\n\
    \                if(_locationManager==nil){\n                    _locationManager=[[CLLocationManager\
    \ alloc] init];\n                    _locationManager.headingFilter=5;\n     \
    \               _locationManager.purpose=@\"We will use your location to tell\
    \ you\nwhere you are headed\";\n                    _locationManager.delegate=self;\n\
    \                }\n                [_locationManager startUpdatingHeading];\n\
    \                self.labelHeading.text=@\"Starting heading tracking…\";\n   \
    \         }else{\n                self.labelHeading.text=@\"Turned heading tracking\
    \ off\";\n                if(_locationManager!=nil){\n                    [_locationManager\
    \ stopUpdatingHeading];\n                }\n            }\n        }\n    }else{\n\
    \        self.labelHeading.text=@\"Heading services unavailable\";\n    }\n}\n\
    ```\n\nThe delegate methods need to be defined next. With heading tracking services,\
    \ there are three delegate methods that need to be defined:\n\n- `locationManager:didFailWithError:`\n\
    - `locationManager:didUpdateHeading:`\n- `locationManagerShouldDisplayHeadingCalibration:`\n\
    \nThe first method, `didFailWithError`, is the same delegate method you have implemented\
    \ with the location tracking services discussed previously. You want to turn off\
    \ heading tracking services if there is an error (most likely caused because the\
    \ user is not granting you access to his or her location services):\n\n```\n-\
    \ (void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError\
    \ *)error{\n    if(error.code==kCLErrorDenied){\n        [manager stopUpdatingHeading];\n\
    \        self.labelHeading.text=@\"ERROR: Heading tracking is denied\";\n    }\n\
    }\n```"
  raw: '### Recipe 4–3: Determining Magnetic Bearing


    Modern iPhones and iPad 2s now contain hardware, the magnetometer, which can be
    used to determine which direction the device is being held. The measurement is
    based on the device''s position in relation to the magnetic north pole of the
    earth. The magnetic poles are not the same as the geographic poles of the earth.
    Magnetic north is located in Northern Canada and moves slowly by approximately
    55–60km per year toward the west as the earth''s core changes.


    Implementing heading tracking is very similar to implementing any of the location
    tracking services we have discussed so far. You will include the Core Location
    framework in your project, create a `CLLocationManager` object, and define its
    delegate and delegate methods.


    By default, it is assumed that the device heading is measured with the device
    held in portrait mode with the top of the device away from the user. You can change
    this setting by setting the `headingOrientation` property on the `CLLocationManager`
    object. The options for this property are as follows:


    `CLDeviceOrientationPortrait (default)`

    `CLDeviceOrientationPortraitUpsideDown`

    `CLDeviceOrientationLandscapeLeft`

    `CLDeviceOrientationLandscapeRight`


    Let us start by creating a new single view application project named Chapter4HeadingTracking.
    If your version of Xcode allows for specifying a class prefix, supply “Chapter4HeadingTracking”
    again. You start by including the Core Location framework in your project by selecting
    the project in the navigator pane and selecting the project''s target. Add the
    Core Location framework into the project just as you did at the beginning of the
    chapter.


    Next you can set up the XIB to display your heading. Click the `Chapter4HeadingTrackingViewController.xib`
    file in the navigator pane, and Interface Builder will be loaded. Like with the
    previous recipes, you are going to drag a `UILabel` and `UISwitch` object onto
    the XIB. The `UILabel` will be used to display the heading information, and the
    `UISwitch` will be used to turn heading tracking services on and off. You''re
    going to set the initial state of the `UISwitch` to Off in the Attributes inspector
    pane. Your XIB now looks like [Figure 4–14](#Chapter04.html#fig_4_14).


    ![Image](images/9781430240051_Fig04-14.jpg)


    **Figure 4–14.** *Your still–familiar user interface setup*


    With the `.xib` file laid out, let''s create some outlet properties and actions.
    Turn on the Assistant Editor and select the `UIView` in the XIB. ^-click-drag
    from the `UILabel` to the interface file (`.h`) to create an outlet. In the pop-up
    that is displayed, name the `UILabel` “labelHeading”. These steps should resemble
    [Figures 4–15](#Chapter04.html#fig_4_15) and [4–16](#Chapter04.html#fig_4_16).


    ![Image](images/9781430240051_Fig04-15.jpg)


    **Figure 4–15.** *Connecting a `UILabel` outlet*


    ![Image](images/9781430240051_Fig04-16.jpg)


    **Figure 4–16.** *Configuring the label''s outlet*


    Repeat the same process with the `UISwitch`, but this time change the Connection
    type to Action and name the action “switchHeadingServices”, as shown in [Figure
    4–17](#Chapter04.html#fig_4_17).


    ![Image](images/9781430240051_Fig04-17.jpg)


    **Figure 4–17.** *Creating your switch''s action*


    In your interface file (`.h`) for `Chapter4HeadingTrackingViewController`, import
    the Core Location framework and set the view controller to comply with the `CLLocationManagerDelegate`
    protocol. Then define a `CLLocationManager` instance variable. The interface file
    should now resemble the following:


    `//  Chapter4HeadingTrackingViewController.h`


    `#import <UIKit/UIKit.h>`

    `#import <CoreLocation/CoreLocation.h>`


    `@interface Chapter4HeadingTrackingViewController : UIViewController <CLLocationManagerDelegate>{`

    `    CLLocationManager *_locationManager;`

    `    UILabel *labelHeading;`

    `}`


    `@property (strong, nonatomic) IBOutlet UILabel *labelHeading;`

    `– (IBAction)switchHeadingServices:(id)sender;`

    `@end`


    Switch to the implementation file (`.m`), and scroll to the bottom to start defining
    the `switchHeadingService` method. As with location services, you will start by
    checking that heading services are available by checking the return of `[CLLocationManager
    headingAvailable].` Then you will verify that the sender is `UISwitch`:


    `if([CLLocationManager headingAvailable]){`

    `        if([sender isKindOfClass:[UISwitch class]]){`

    `            UISwitch *headingSwitch=(UISwitch *)sender;`

    `        …`


    If the `headingSwitch` is “on”, you will check to make sure the instance variable
    `_locationManager` is instantiated and instantiate it if it has not been. When
    creating an instance of `CLLocationManager` that is going to track heading changes,
    you should specify the `headingFilter` property. This property specifies how far
    (in degrees) that your heading has to change before your delegate method is called.
    Then, as with the other location tracking services, you will specify the `purpose`
    property to tell the user what you intend to use the location information for
    and finally the `delegate` of the `CLLocationManager`. Once the instance variable
    has been instantiated, you can call `startUpdatingHeading` to start the heading
    tracking services, and you will also update your label so you can see the progress
    you are making:


    `if(headingSwitch.on){`

    `                if(_locationManager==nil){`

    `                    _locationManager=[[CLLocationManager alloc] init];`

    `                    _locationManager.headingFilter=5;`

    `                    _locationManager.purpose=@"We will use your location to tell
    you`

    `where you are headed";`

    `                    _locationManager.delegate=self;`

    `                }`

    `                [_locationManager startUpdatingHeading];`

    `                self.labelHeading.text=@"Starting heading tracking…";`

    `}else{`

    `       ….`


    Next you will turn off heading tracking services if the switch has been moved
    to the off position, so the completed method looks like this:


    `- (IBAction)switchHeadingServices:(id)sender {`

    `    if([CLLocationManager headingAvailable]){`

    `        if([sender isKindOfClass:[UISwitch class]]){`

    `            UISwitch *headingSwitch=(UISwitch *)sender;`

    `            if(headingSwitch.on){`

    `                if(_locationManager==nil){`

    `                    _locationManager=[[CLLocationManager alloc] init];`

    `                    _locationManager.headingFilter=5;`

    `                    _locationManager.purpose=@"We will use your location to tell
    you`

    `where you are headed";`

    `                    _locationManager.delegate=self;`

    `                }`

    `                [_locationManager startUpdatingHeading];`

    `                self.labelHeading.text=@"Starting heading tracking…";`

    `            }else{`

    `                self.labelHeading.text=@"Turned heading tracking off";`

    `                if(_locationManager!=nil){`

    `                    [_locationManager stopUpdatingHeading];`

    `                }`

    `            }`

    `        }`

    `    }else{`

    `        self.labelHeading.text=@"Heading services unavailable";`

    `    }`

    `}`


    The delegate methods need to be defined next. With heading tracking services,
    there are three delegate methods that need to be defined:


    `- locationManager:didFailWithError:`

    `- locationManager:didUpdateHeading:`

    `- locationManagerShouldDisplayHeadingCalibration:`


    The first method, `didFailWithError`, is the same delegate method you have implemented
    with the location tracking services discussed previously. You want to turn off
    heading tracking services if there is an error (most likely caused because the
    user is not granting you access to his or her location services):


    `- (void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError
    *)error{`

    `    if(error.code==kCLErrorDenied){`

    `        [manager stopUpdatingHeading];`

    `        self.labelHeading.text=@"ERROR: Heading tracking is denied";`

    `    }`

    `}`'
  trans: "\n### 配方 4–3：确定磁方位角\n\n现代 iPhone 和 iPad 2 现已内置磁力计硬件，可用于判断设备握持的方向。其测量基于设备相对于地球磁北极的位置。磁极与地球的地理极点并不相同。磁北极位于加拿大北部，并随着地核变化以每年约\
    \ 55–60 公里的速度向西缓慢移动。\n\n实现航向跟踪与我们目前讨论过的任何位置跟踪服务非常相似。你需要在项目中加入 Core Location 框架，创建一个\
    \ `CLLocationManager` 对象，并定义其委托及委托方法。\n\n默认情况下，设备航向的测量假设设备以竖屏模式握持，且设备顶部远离用户。你可以通过设置\
    \ `CLLocationManager` 对象的 `headingOrientation` 属性来更改此设置。该属性的可选值如下：\n\n`CLDeviceOrientationPortrait（默认）`\n\
    `CLDeviceOrientationPortraitUpsideDown`\n`CLDeviceOrientationLandscapeLeft`\n\
    `CLDeviceOrientationLandscapeRight`\n\n让我们先创建一个名为 `Chapter4HeadingTracking` 的单视图应用程序项目。如果你的\
    \ Xcode 版本允许指定类前缀，请再次填写“Chapter4HeadingTracking”。首先，通过在导航器窗格中选择项目并选择项目的目标，将 Core\
    \ Location 框架加入你的项目中。按照本章开头的方法，将 Core Location 框架添加到项目中。\n\n接下来，你可以设置 XIB 文件以显示航向。在导航器窗格中点击\
    \ `Chapter4HeadingTrackingViewController.xib` 文件，Interface Builder 将加载。与之前的配方类似，你将拖拽一个\
    \ `UILabel` 和一个 `UISwitch` 对象到 XIB 上。`UILabel` 用于显示航向信息，而 `UISwitch` 用于开启或关闭航向跟踪服务。你将在属性检查器窗格中将\
    \ `UISwitch` 的初始状态设置为“关”。此时你的 XIB 应如图 Figure 4–14 所示。\n\n![图片](img/9781430240051_Fig04-14.jpg)\n\
    \n**图 4–14.** *你依然熟悉的用户界面设置*\n\n布局完 `.xib` 文件后，让我们创建一些输出口属性和操作。打开助理编辑器，并在 XIB\
    \ 中选择 `UIView`。按住 ^-点击并从 `UILabel` 拖拽到接口文件（`.h`）以创建一个输出口。在弹出的对话框中，将 `UILabel`\
    \ 命名为“labelHeading”。这些步骤应如图 Figure 4–15 和 4–16 所示。\n\n![图片](img/9781430240051_Fig04-15.jpg)\n\
    \n**图 4–15.** *连接 `UILabel` 输出口*\n\n![图片](img/9781430240051_Fig04-16.jpg)\n\n\
    **图 4–16.** *配置标签的输出口*\n\n对 `UISwitch` 重复相同过程，但这次将连接类型更改为“操作”，并将操作命名为“switchHeadingServices”，如图\
    \ Figure 4–17 所示。\n\n![图片](img/9781430240051_Fig04-17.jpg)\n\n**图 4–17.** *创建开关的操作*\n\
    \n在 `Chapter4HeadingTrackingViewController` 的接口文件（`.h`）中，导入 Core Location 框架并设置视图控制器遵循\
    \ `CLLocationManagerDelegate` 协议。然后定义一个 `CLLocationManager` 实例变量。接口文件现在应如下所示：\n\
    \n```\n//  Chapter4HeadingTrackingViewController.h\n\n#import <UIKit/UIKit.h>\n\
    #import <CoreLocation/CoreLocation.h>\n\n@interface Chapter4HeadingTrackingViewController\
    \ : UIViewController <CLLocationManagerDelegate>{\n    CLLocationManager *_locationManager;\n\
    \    UILabel *labelHeading;\n}\n\n@property (strong, nonatomic) IBOutlet UILabel\
    \ *labelHeading;\n- (IBAction)switchHeadingServices:(id)sender;\n@end\n```\n\n\
    切换到实现文件（`.m`），滚动到底部开始定义 `switchHeadingService` 方法。与位置服务类似，你将首先通过检查 `[CLLocationManager\
    \ headingAvailable]` 的返回值来确认航向服务是否可用。然后验证发送者是否为 `UISwitch`：\n\n```\nif([CLLocationManager\
    \ headingAvailable]){\n        if([sender isKindOfClass:[UISwitch class]]){\n\
    \            UISwitch *headingSwitch=(UISwitch *)sender;\n        …\n```\n\n如果\
    \ `headingSwitch` 处于“开”状态，你将检查实例变量 `_locationManager` 是否已实例化，如果未实例化则进行实例化。当创建用于跟踪航向变化的\
    \ `CLLocationManager` 实例时，应指定 `headingFilter` 属性。该属性指定航向变化多少度（以度为单位）后才会调用委托方法。然后，与其他位置跟踪服务一样，你需要指定\
    \ `purpose` 属性以告知用户你打算如何使用位置信息，最后指定 `CLLocationManager` 的 `delegate`。实例变量实例化后，你可以调用\
    \ `startUpdatingHeading` 来启动航向跟踪服务，同时更新标签以便查看进度：\n\n```\nif(headingSwitch.on){\n\
    \                if(_locationManager==nil){\n                    _locationManager=[[CLLocationManager\
    \ alloc] init];\n                    _locationManager.headingFilter=5;\n     \
    \               _locationManager.purpose=@\"我们将使用您的位置来告诉您前进的方向\";\n          \
    \          _locationManager.delegate=self;\n                }\n              \
    \  [_locationManager startUpdatingHeading];\n                self.labelHeading.text=@\"\
    正在开始航向跟踪…\";\n}else{\n       ….\n```\n\n接下来，如果开关被拨到“关”位置，你将关闭航向跟踪服务。因此完整的方法如下所示：\n\
    \n```\n- (IBAction)switchHeadingServices:(id)sender {\n    if([CLLocationManager\
    \ headingAvailable]){\n        if([sender isKindOfClass:[UISwitch class]]){\n\
    \            UISwitch *headingSwitch=(UISwitch *)sender;\n            if(headingSwitch.on){\n\
    \                if(_locationManager==nil){\n                    _locationManager=[[CLLocationManager\
    \ alloc] init];\n                    _locationManager.headingFilter=5;\n     \
    \               _locationManager.purpose=@\"我们将使用您的位置来告诉您前进的方向\";\n          \
    \          _locationManager.delegate=self;\n                }\n              \
    \  [_locationManager startUpdatingHeading];\n                self.labelHeading.text=@\"\
    正在开始航向跟踪…\";\n            }else{\n                self.labelHeading.text=@\"已关闭航向跟踪\"\
    ;\n                if(_locationManager!=nil){\n                    [_locationManager\
    \ stopUpdatingHeading];\n                }\n            }\n        }\n    }else{\n\
    \        self.labelHeading.text=@\"航向服务不可用\";\n    }\n}\n```\n\n接下来需要定义委托方法。对于航向跟踪服务，需要定义三个委托方法：\n\
    \n- `locationManager:didFailWithError:`\n- `locationManager:didUpdateHeading:`\n\
    - `locationManagerShouldDisplayHeadingCalibration:`\n\n第一个方法 `didFailWithError`\
    \ 与你之前实现位置跟踪服务中的委托方法相同。如果出现错误（很可能是因为用户未授权访问其位置服务），你需要关闭航向跟踪服务：\n\n```\n- (void)locationManager:(CLLocationManager\
    \ *)manager didFailWithError:(NSError *)error{\n    if(error.code==kCLErrorDenied){\n\
    \        [manager stopUpdatingHeading];\n        self.labelHeading.text=@\"错误：航向跟踪被拒绝\"\
    ;\n    }\n}\n```\n"
- fmt: "`didUpdateHeading`方法处理设备朝向变化超过`headingFilter`属性设定的阈值时的逻辑。在此实例中，将检查时间戳以确保是最近读数，然后确保`headingAccuracy`属性为正值。若朝向无效，`headingAccuracy`属性将为负值。最后，将使用`magneticHeading`读数更新`labelHeading`。\n\
    \n```\n- (void)locationManager:(CLLocationManager *)manager didUpdateHeading:(CLHeading\
    \ *)newHeading{\n    NSDate *headingDate=newHeading.timestamp;\n    NSTimeInterval\
    \ headingInterval=[headingDate timeIntervalSinceNow];\n    if(abs(headingInterval)<30){\n\
    \        if(newHeading.headingAccuracy<0)\n            return;\n        self.labelHeading.text=[NSString\
    \ stringWithFormat:@\"Your new heading is: %.1f°\", newHeading.magneticHeading];\n\
    \    }\n}\n```\n\n**注意：** 使用 ![Image](images/U004.jpg)+![Image](images/U005.jpg)+8\
    \ (Option+Shift+8) 插入度（°）符号。\n\n需要实现的最后一个委托方法是`locationManagerShouldDisplayHeadingCalibration`。该方法决定是否应显示朝向校准界面。该场景会提示用户以“8”字形移动设备，以便校准磁力计。目前尚未遇到不希望显示此界面的情况，因此始终返回`YES`：\n\
    \n```\n-(BOOL)locationManagerShouldDisplayHeadingCalibration:(CLLocationManager\
    \ *)manager{\n    return YES;\n}\n```\n\n[图 4–18](#Chapter04.html#fig_4_18) 展示了设备无法轻松校准时的校准界面。测试此应用时，可能不会看到此界面，但作为预防措施，启用它是一个重要环节。\n\
    \n![Image](images/9781430240051_Fig04-18.jpg)\n\n**图 4–18.** *朝向校准界面*\n\n这是一个无法在模拟器中运行的应用，必须将其加载到实际设备上进行测试。\n\
    \n### Recipe 4–4：指定真方位\n\n已经了解了如何获取磁北朝向，那么真北呢？磁北与真北之间的差异称为磁偏角。磁偏角随地球位置不同而变化很大，但如果知道所在位置，就可以计算磁偏角。对于\
    \ iPhone 或 iPad 2，如果设备知道自己的位置，它会为您计算并返回`CLHeading`对象的`trueHeading`属性。\n\n明确来说，如果将位置跟踪服务与朝向跟踪服务结合使用，就能找到设备相对于真北的方向。只需在`CLLocationManager`上调用`startUpdatingLocation`方法即可获取真北朝向。\n\
    \n可以新建一个项目，或在上一个 Recipe 的基础上扩展。选择`Chapter4HeadingTrackingViewController.xib`文件，为真方位添加第二个标签，如图\
    \ [4–19](#Chapter04.html#fig_4_19) 所示。\n\n![Image](images/9781430240051_Fig04-19.jpg)\n\
    \n**图 4–19.** *新增标签后的用户界面*\n\n通过显示 Assistant Editor 面板，并从标签 ^-点击拖拽到接口文件（`.h`），将此新标签连接到名为`labelTrueHeading`的出口，如图\
    \ [4–20](#Chapter04.html#fig_4_20) 所示。\n\n![Image](images/9781430240051_Fig04-20.jpg)\n\
    \n**图 4–20.** *配置额外标签的出口*\n\n接口文件（`.h`）现在应类似以下代码块。如果 Xcode 版本未在属性之外自动生成`UILabel`实例变量，无需担心，这些是可选的。\n\
    \n```\n//  Chapter4HeadingTrackingViewController.h\n//  Chapter4HeadingTracking\n\
    \n#import <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\n@interface\
    \ Chapter4HeadingTrackingViewController : UIViewController\n<CLLocationManagerDelegate>{\n\
    \    CLLocationManager *_locationManager;\n    UILabel *labelHeading;\n    UILabel\
    \ *labelTrueHeading;\n}\n\n@property (strong, nonatomic) IBOutlet UILabel *labelHeading;\n\
    @property (strong, nonatomic) IBOutlet UILabel *labelTrueHeading;\n- (IBAction)switchHeadingServices:(id)sender;\n\
    @end\n```\n\n代码只需做少量修改。首先，需要在`switchHeadingServices`方法中调用`startUpdatingLocation`和`stopUpdatingLocation`：\n\
    \n```\nif(headingSwitch.on){\n    if(_locationManager==nil){\n        _locationManager=[[CLLocationManager\
    \ alloc] init];\n        _locationManager.headingFilter=5;\n        _locationManager.purpose=@\"\
    We will use your location to tell you where you are headed\";\n        _locationManager.delegate=self;\n\
    \    }\n    [_locationManager startUpdatingHeading];\n    [_locationManager startUpdatingLocation];\n\
    \    self.labelHeading.text=@\"Starting heading tracking…\";\n}else{\n    self.labelHeading.text=@\"\
    Turned heading tracking off\";\n    if(_locationManager!=nil){\n        [_locationManager\
    \ stopUpdatingHeading];\n        [_locationManager stopUpdatingLocation];\n  \
    \  }\n}\n```\n\n现在，在`didUpdateHeading`方法中，添加一条新语句来检查`trueHeading`值。如果`trueHeading`为负值，则无效，因此仅在`trueHeading`大于或等于0时使用该属性：\n\
    \n```\nif(newHeading.headingAccuracy<0)\n    return;\n\nif(newHeading.trueHeading>=0){\n\
    \    self.labelTrueHeading.text=[NSString stringWithFormat:@\"Your true heading\
    \ is: %.1f°\", newHeading.trueHeading];\n}\n\nself.labelHeading.text=[NSString\
    \ stringWithFormat:@\"Your magnetic heading is: %.1f°\", newHeading.magneticHeading];\n\
    ```\n\n实现文件（`.m`）中的自定义方法如下所示：\n\n```\n//\n//  Chapter4HeadingTrackingViewController.m\n\
    \n#import \"Chapter4HeadingTrackingViewController.h\"\n```"
  raw: 'The next method, `didUpdateHeading`, handles when the change in heading of
    the device has exceeded your `headingFilter` property. In your instance, you are
    going to check the timestamp to make sure it is a recent reading, and then you
    are going to make sure the `headingAccuracy` property is positive. The `headingAccuracy`
    property will be negative if the heading is invalid. Finally, you will update
    the `labelHeading` with the `magneticHeading` reading.


    `- (void)locationManager:(CLLocationManager *)manager didUpdateHeading:(CLHeading`

    `*)newHeading{`

    `    NSDate *headingDate=newHeading.timestamp;`

    `    NSTimeInterval headingInterval=[headingDate timeIntervalSinceNow];`

    `    if(abs(headingInterval)<30){`

    `        if(newHeading.headingAccuracy<0)`

    `            return;`


    `        self.labelHeading.text=[NSString stringWithFormat:@"Your new heading
    is: %.1f°",`

    `newHeading.magneticHeading];`

    `    }`

    `}`


    **NOTE:** Use ![Image](images/U004.jpg)+![Image](images/U005.jpg)+8 (Option+Shift+8)
    to insert the degree (°) symbol.


    The last delegate method you need to implement is `locationManagerShouldDisplayHeadingCalibration`.
    This method determines whether the heading calibration screen should be presented.
    This is the scene that prompts a user to move his or her device in a figure-eight
    pattern so that it can calibrate the magnetometer. I haven''t run into an instance
    where I would not want to display this scene yet, so I always return YES:


    `-(BOOL)locationManagerShouldDisplayHeadingCalibration:(CLLocationManager *)manager{`

    `    return YES;`

    `}`


    [Figure 4–18](#Chapter04.html#fig_4_18) shows what the calibration screen looks
    like if the device is unable to easily calibrate. When testing this application,
    you may not actually see this screen, but it is important to have it enabled as
    a precaution.


    ![Image](images/9781430240051_Fig04-18.jpg)


    **Figure 4–18.** *Heading calibration screen*


    This is an application that will not work in the simulator. You will have to load
    it onto an actual device to test it.


    ### Recipe 4–4: Specifying True Bearing


    You have figured out how to get the magnetic north heading, but what about true
    north? The difference between magnetic north and true north is called declination.
    Declination can vary greatly depending on where you are on the planet, but if
    you know where you are, you can calculate declination. And with an iPhone or iPad
    2, if the device knows where it is located, the device will do the calculation
    for you and provide it in the `trueHeading` property of a `CLHeading` object.


    To clarify, if you combine location-tracking services with heading tracking services,
    you can find out a device''s orientation in reference to true north. All you need
    to do is also call the `startUpdatingLocation` method on your `CLLocationManager`
    to get the true north heading.


    You can start a new project or expand on the project from the previous recipe.
    Select the `Chapter4HeadingTrackingViewController.xib` file, and add a second
    label for the true heading, as in [Figure 4–19](#Chapter04.html#fig_4_19).


    ![Image](images/9781430240051_Fig04-19.jpg)


    **Figure 4–19.** *New user interface with an added label*


    Connect this new label to an outlet named “labelTrueHeading” by showing the Assistant
    Editor pane and doing a ^-click-drag from the label to the interface file (`.h`),
    as in [Figure 4–20](#Chapter04.html#fig_4_20).


    ![Image](images/9781430240051_Fig04-20.jpg)


    **Figure 4–20.** *Configuring your additional label''s outlet*


    Your interface file (`.h`) should now look like the following block. If your version
    of Xcode does not create the `UILabel` instance variables in addition to the properties,
    do not worry, as these are optional.


    `//  Chapter4HeadingTrackingViewController.h`

    `//  Chapter4HeadingTracking`


    `#import <UIKit/UIKit.h>`

    `#import <CoreLocation/CoreLocation.h>`


    `@interface Chapter4HeadingTrackingViewController : UIViewController`

    `<CLLocationManagerDelegate>{`

    `    CLLocationManager *_locationManager;`

    `    UILabel *labelHeading;`

    `    UILabel *labelTrueHeading;`

    `}`


    `@property (strong, nonatomic) IBOutlet UILabel *labelHeading;`

    `@property (strong, nonatomic) IBOutlet UILabel *labelTrueHeading;`

    `- (IBAction)switchHeadingServices:(id)sender;`

    `@end`


    There are only some minor changes that need to be made to your code. First, you
    need to call `startUpdatingLocation` and `stopUpdatingLocation` in your `switchHeadingServices`
    method:


    `if(headingSwitch.on){`

    `        if(_locationManager==nil){`

    `                _locationManager=[[CLLocationManager alloc] init];`

    `                _locationManager.headingFilter=5;`

    `                _locationManager.purpose=@"We will use your location to tell
    you where`

    `you are headed";`

    `                _locationManager.delegate=self;`

    `        }`

    `        [_locationManager startUpdatingHeading];`

    `        [_locationManager startUpdatingLocation];`

    `        self.labelHeading.text=@"Starting heading tracking…";`

    `}else{`

    `        self.labelHeading.text=@"Turned heading tracking off";`

    `        if(_locationManager!=nil){`

    `                [_locationManager stopUpdatingHeading];`

    `                [_locationManager stopUpdatingLocation];`

    `        }`

    `}`


    Now, in your `didUpdateHeading` method, you will add a new statement to check
    the `trueHeading` value. If the `trueHeading` is negative, it is invalid, so you
    want to use the `trueHeading` property only if it is greater than or equal to
    0:


    `if(newHeading.headingAccuracy<0)`

    `            return;`


    `        if(newHeading.trueHeading>=0){`

    `            self.labelTrueHeading.text=[NSString stringWithFormat:@"Your true
    heading`

    `is: %.1f°", newHeading.trueHeading];`

    `        }`


    `        self.labelHeading.text=[NSString stringWithFormat:@"Your magnetic heading
    is:`

    `%.1f°", newHeading.magneticHeading];`


    Your custom methods in your implementation file (`.m`) look like the following:


    `//`

    `//  Chapter4HeadingTrackingViewController.m`


    `#import "Chapter4HeadingTrackingViewController.h"`'
  trans: "\n`didUpdateHeading`方法处理设备朝向变化超过`headingFilter`属性设定的阈值时的逻辑。在此实例中，将检查时间戳以确保是最近读数，然后确保`headingAccuracy`属性为正值。若朝向无效，`headingAccuracy`属性将为负值。最后，将使用`magneticHeading`读数更新`labelHeading`。\n\
    \n```\n- (void)locationManager:(CLLocationManager *)manager didUpdateHeading:(CLHeading\
    \ *)newHeading{\n    NSDate *headingDate=newHeading.timestamp;\n    NSTimeInterval\
    \ headingInterval=[headingDate timeIntervalSinceNow];\n    if(abs(headingInterval)<30){\n\
    \        if(newHeading.headingAccuracy<0)\n            return;\n        self.labelHeading.text=[NSString\
    \ stringWithFormat:@\"Your new heading is: %.1f°\", newHeading.magneticHeading];\n\
    \    }\n}\n```\n\n**注意：** 使用 ![Image](img/U004.jpg)+![Image](img/U005.jpg)+8 (Option+Shift+8)\
    \ 插入度（°）符号。\n\n需要实现的最后一个委托方法是`locationManagerShouldDisplayHeadingCalibration`。该方法决定是否应显示朝向校准界面。该场景会提示用户以“8”字形移动设备，以便校准磁力计。目前尚未遇到不希望显示此界面的情况，因此始终返回`YES`：\n\
    \n```\n-(BOOL)locationManagerShouldDisplayHeadingCalibration:(CLLocationManager\
    \ *)manager{\n    return YES;\n}\n```\n\n图 4–18 展示了设备无法轻松校准时的校准界面。测试此应用时，可能不会看到此界面，但作为预防措施，启用它是一个重要环节。\n\
    \n![Image](img/9781430240051_Fig04-18.jpg)\n\n**图 4–18.** *朝向校准界面*\n\n这是一个无法在模拟器中运行的应用，必须将其加载到实际设备上进行测试。\n\
    \n### Recipe 4–4：指定真方位\n\n已经了解了如何获取磁北朝向，那么真北呢？磁北与真北之间的差异称为磁偏角。磁偏角随地球位置不同而变化很大，但如果知道所在位置，就可以计算磁偏角。对于\
    \ iPhone 或 iPad 2，如果设备知道自己的位置，它会为您计算并返回`CLHeading`对象的`trueHeading`属性。\n\n明确来说，如果将位置跟踪服务与朝向跟踪服务结合使用，就能找到设备相对于真北的方向。只需在`CLLocationManager`上调用`startUpdatingLocation`方法即可获取真北朝向。\n\
    \n可以新建一个项目，或在上一个 Recipe 的基础上扩展。选择`Chapter4HeadingTrackingViewController.xib`文件，为真方位添加第二个标签，如图\
    \ 4–19 所示。\n\n![Image](img/9781430240051_Fig04-19.jpg)\n\n**图 4–19.** *新增标签后的用户界面*\n\
    \n通过显示 Assistant Editor 面板，并从标签 ^-点击拖拽到接口文件（`.h`），将此新标签连接到名为`labelTrueHeading`的出口，如图\
    \ 4–20 所示。\n\n![Image](img/9781430240051_Fig04-20.jpg)\n\n**图 4–20.** *配置额外标签的出口*\n\
    \n接口文件（`.h`）现在应类似以下代码块。如果 Xcode 版本未在属性之外自动生成`UILabel`实例变量，无需担心，这些是可选的。\n\n```\n\
    //  Chapter4HeadingTrackingViewController.h\n//  Chapter4HeadingTracking\n\n#import\
    \ <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\n@interface Chapter4HeadingTrackingViewController\
    \ : UIViewController\n<CLLocationManagerDelegate>{\n    CLLocationManager *_locationManager;\n\
    \    UILabel *labelHeading;\n    UILabel *labelTrueHeading;\n}\n\n@property (strong,\
    \ nonatomic) IBOutlet UILabel *labelHeading;\n@property (strong, nonatomic) IBOutlet\
    \ UILabel *labelTrueHeading;\n- (IBAction)switchHeadingServices:(id)sender;\n\
    @end\n```\n\n代码只需做少量修改。首先，需要在`switchHeadingServices`方法中调用`startUpdatingLocation`和`stopUpdatingLocation`：\n\
    \n```\nif(headingSwitch.on){\n    if(_locationManager==nil){\n        _locationManager=[[CLLocationManager\
    \ alloc] init];\n        _locationManager.headingFilter=5;\n        _locationManager.purpose=@\"\
    We will use your location to tell you where you are headed\";\n        _locationManager.delegate=self;\n\
    \    }\n    [_locationManager startUpdatingHeading];\n    [_locationManager startUpdatingLocation];\n\
    \    self.labelHeading.text=@\"Starting heading tracking…\";\n}else{\n    self.labelHeading.text=@\"\
    Turned heading tracking off\";\n    if(_locationManager!=nil){\n        [_locationManager\
    \ stopUpdatingHeading];\n        [_locationManager stopUpdatingLocation];\n  \
    \  }\n}\n```\n\n现在，在`didUpdateHeading`方法中，添加一条新语句来检查`trueHeading`值。如果`trueHeading`为负值，则无效，因此仅在`trueHeading`大于或等于\
    \ 0 时使用该属性：\n\n```\nif(newHeading.headingAccuracy<0)\n    return;\n\nif(newHeading.trueHeading>=0){\n\
    \    self.labelTrueHeading.text=[NSString stringWithFormat:@\"Your true heading\
    \ is: %.1f°\", newHeading.trueHeading];\n}\n\nself.labelHeading.text=[NSString\
    \ stringWithFormat:@\"Your magnetic heading is: %.1f°\", newHeading.magneticHeading];\n\
    ```\n\n实现文件（`.m`）中的自定义方法如下所示：\n\n```\n//\n//  Chapter4HeadingTrackingViewController.m\n\
    \n#import \"Chapter4HeadingTrackingViewController.h\"\n```\n"
