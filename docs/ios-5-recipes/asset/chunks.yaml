    ### Recipe 8–2: Fetching Events


    Now that you have covered how to deal with basic date conversions and calculations,
    you can go much more into detail on dealing specifically with events and calendars,
    including interacting with the user''s own events and schedule. The next few recipes
    will all compound in order to create a complete utilization of the Event Kit framework.


    First, create a new project using the Single View Application template. I have
    called mine “Chapter8Recipe2”, with class prefix “Main”.


