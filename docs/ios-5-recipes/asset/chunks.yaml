    Here, you have defined your `UIView` as well as your buttons to be put in it,
    given them their actions to perform, and added them into the view. You set the
    title of each button to be either its starting value or its purpose. You also
    set your `cornerRadius` so that your buttons will have rounded corners. One of
    the most important details here is that you set your buttons to be semi-transparent,
    as they will be placed over your camera''s display. You do not want to cover up
    any of your picture, so they have to be at least partially see-through.


    Now you need to simply implement your two toggling methods, `-toggleCamera:` and
    `-toggleFlash:`. You will need a few extra instance variables in your class to
    deal with these properly, including two BOOLs to keep track of your settings,
    as well as a pointer to a `UIImagePickerController` to pass around your camera
    interface. Your view controller''s header file should now look like so:


    `#import <UIKit/UIKit.h>`

    `#import <MobileCoreServices/MobileCoreServices.h>`

    `#import <QuartzCore/QuartzCore.h> //Need this!`


    `@interface CaptureViewController : UIViewController <UIImagePickerControllerDelegate,`

    `UINavigationControllerDelegate>`

    `{`

    `    UIImageView *imageViewRecent;`

