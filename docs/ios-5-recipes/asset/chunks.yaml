    \        frontCameraUsed = YES;\n        [sender setTitle:@\"Front Camera\" forState:UIControlStateNormal];\n\
    \    }\n}\n```\n\n最后，您只需在 `-cameraButtonPressed:` 方法中添加两行代码来改变相机控件的可见性，这两行代码放在控制器展示之前即可。\n\
    \n```\nimagePicker.showsCameraControls = NO;\nimagePicker.cameraOverlayView =\
    \ [self customView:imagePicker];\n```\n\n现在，您的相机应该有一个漂亮的小覆盖层，上面有几个按钮，可以改变相机的工作方式，如图\
    \ 6–10 所示。您可以看到，从这里开始，您可以创建自己的自定义覆盖层，并轻松更改其功能以适应几乎任何情况。\n\n![图片](img/9781430240051_Fig06-10.jpg)\n\
    \n**图 6–10.** *相机上的自定义覆盖层视图*\n```"
- fmt: "### Recipe 6–5: AV Framework and Capture Sessions\n\nWhile the `UIImagePickerController`\
    \ and `UIVideoEditorController` interfaces are incredibly useful, they certainly\
    \ aren't as customizable as they could be. Using the AV framework, you can create\
    \ an immensely more customizable camera interface. Here, you will be creating\
    \ essentially your own version of the camera, but in such a way that further customization\
    \ is incredibly easy, by using a different method known as an `AVCaptureSession`.\n\
    \nFirst, you will create a new project, called \"Chapter6Recipe5\", using a class\
    \ prefix of \"CustomCamera\".\n\nYou will need a variety of different frameworks\
    \ linked to your project. Navigate to the project's main settings, select `CustomCamera`\
    \ under Targets, and then flip over to the Build Phases tab, resembling [Figure\
    \ 6–11](#Chapter06.html#fig_6_11).\n\n![Image](images/9781430240051_Fig06-11.jpg)\n\
    \n**Figure 6–11.** *Preparing to add frameworks to your project*\n\nUnder Link\
    \ Binary With Libraries, you will use the `+` button to add several other frameworks.\
    \ Search for and add the following frameworks:\n\n- AV Foundation\n- Core Graphics\n\
    - Core Video\n- Core Media\n\nYou will actually not need to type any import statements\
    \ for any of these except for the AV Foundation one. Go ahead and add the following\
    \ import lines to the header file of your main view controller.\n\n```\n#import\
    \ <AVFoundation/AVFoundation.h>\n#import <AVFoundation/AVCaptureInput.h>\n```\n\
    \nNext, you'll switch over to your view controller's `.xib` file to do a bit of\
    \ quick setup. Here, all you need to do is drag a `UIButton` over to your view,\
    \ and then connect it to your header file, naming it `startButton`. You need to\
    \ make an action for this button to perform, so you will declare the following\
    \ method header, and connect your `startButton` to it.\n\n```\n-(IBAction)startPressed:(id)sender;\n\
    ```\n\nOnce these changes have been made, your user interface and code should\
    \ resemble [Figure 6–12](#Chapter06.html#fig_6_12) in the Assistant Editor.\n\n\
    ![Image](images/9781430240051_Fig06-12.jpg)\n\n**Figure 6–12.** *User interface\
    \ with configured outlet and action*\n\nNext, switching away from your XIB/header\
    \ file combination to view the header and implementation files, you will define\
    \ a new kind of property for your view controller, like so.\n\n```\n@property\
    \ (strong, nonatomic) AVCaptureSession *captureSession;\n```\n\nYou must, as always,\
    \ remember to `@synthesize captureSession;` and do `self.captureSession = nil`\
    \ in your implementation file and `-viewDidUnload` respectively.\n\nNext, you\
    \ will be writing your `-viewDidLoad` method to prepare your view, create your\
    \ `AVCaptureSession`, and set it up as you desire. You will add the following\
    \ sets of lines to your method after the call `[super viewDidLoad];`.\n\nFirst,\
    \ you must create your `AVCaptureSession`, and give it a resolution preset, like\
    \ so:\n\n```\nself.captureSession = [[AVCaptureSession alloc] init];\nself.captureSession.sessionPreset\
    \ = AVCaptureSessionPresetMedium;\n```\n\nNext, you will create an instance of\
    \ `AVCaptureDevice`, with which you will specify your input device, which in this\
    \ case will be the device's rear camera (assuming one is accessible). You specify\
    \ this through the use of the `AVCaptureDevice` class method `+defaultDeviceWithMediaType:`,\
    \ which can take a variety of different arguments, depending on the type of media\
    \ desired, the most prominent of which are `AVMediaTypeVideo` and `AVMediaTypeAudio`.\n\
    \n```\nAVCaptureDevice *device = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
    ```\n\nNext, you need to create an instance of `AVCaptureDeviceInput` in order\
    \ to specify your chosen device as an input for your capture session. You will\
    \ also include a check to make sure the input has been correctly created before\
    \ adding it to your session.\n\n```\nNSError *error = nil;\nAVCaptureDeviceInput\
    \ *input = [AVCaptureDeviceInput deviceInputWithDevice:device\n              \
    \                                                      error:&error];\nif (!input)\
    \ {\n    NSLog(@\"Input Error\");\n} else {\n    [self.captureSession addInput:input];\n\
    }\n```\n\nNext, you will set up an output for your capture session, like so:\n\
    \n```\nAVCaptureVideoDataOutput *output = [[AVCaptureVideoDataOutput alloc] init];\n\
    [self.captureSession addOutput:output];\noutput.videoSettings =\n    [NSDictionary\
    \ dictionaryWithObject:[NSNumber numberWithInt:kCVPixelFormatType_32BGRA]\n  \
    \                              forKey:(id)kCVPixelBufferPixelFormatTypeKey];\n\
    \ndispatch_queue_t queue = dispatch_queue_create(\"MyQueue\", NULL);\n[output\
    \ setSampleBufferDelegate:self queue:queue];\ndispatch_release(queue);\n```\n\n\
    Here, you have created an `AVCaptureVideoDataOutput`, which is commonly used when\
    \ a developer's goal is to deal with raw video input frame-by-frame, as opposed\
    \ to simply saving a video as a whole. Other types of `AVCaptureOutput`s include\
    \ the following:\n\n- `AVCaptureMovieFileOutput`: Used for saving whole video\
    \ files\n- `AVCaptureAudioDataOutput`: Used for processing audio data\n- `AVCaptureStillImageOutput`:\
    \ Used for extracting specific still images from a session (This type of output\
    \ could also be used to perform your current goal.)\n\nYou have also dispatched\
    \ an extra queue to handle the processing of your frames that you will end up\
    \ seeing later.\n\nThe last part of your `-viewDidLoad` will be the creation of\
    \ an `AVCaptureVideoPreviewLayer`, with which you will be able to see exactly\
    \ what your camera is viewing in the app. You will set your preview layer to be\
    \ the layer of your main view, but with a slightly altered height, so as not to\
    \ block your button from being visible.\n\n```\nAVCaptureVideoPreviewLayer *previewLayer\
    \ = [AVCaptureVideoPreviewLayer\n    layerWithSession:self.captureSession];\n\
    UIView *aView = self.view;\npreviewLayer.frame = CGRectMake(0, 0, self.view.frame.size.width,\n\
    \                                self.view.frame.size.height-70);\n[aView.layer\
    \ addSublayer:previewLayer];\n```"
  raw: '### Recipe 6–5: AV Framework and Capture Sessions


    While the `UIImagePickerController` and `UIVideoEditorController` interfaces are
    incredibly useful, they certainly aren''t as customizable as they could be. Using
    the AV framework, you can create an immensely more customizable camera interface.
    Here, you will be creating essentially your own version of the camera, but in
    such a way that further customization is incredibly easy, by using a different
    method known as an `AVCaptureSession`.


    First, you will create a new project, called “Chapter6Recipe5”, using a class
    prefix of “CustomCamera”.


    You will need a variety of different frameworks linked to your project. Navigate
    to the project''s main settings, select CustomCamera under Targets, and then flip
    over to the Build Phases tab, resembling [Figure 6–11](#Chapter06.html#fig_6_11).


    ![Image](images/9781430240051_Fig06-11.jpg)


    **Figure 6–11.** *Preparing to add frameworks to your project*


    Under Link Binary With Libraries, you will use the + button to add several other
    frameworks. Search for and add the following frameworks:


    *   AV Foundation

    *   Core Graphics

    *   Core Video

    *   Core Media


    You will actually not need to type any import statements for any of these except
    for the AV Foundation one. Go ahead and add the following import lines to the
    header file of your main view controller.


    `#import <AVFoundation/AVFoundation.h>`

    `#import <AVFoundation/AVCaptureInput.h>`


    Next, you''ll switch over to your view controller''s `.xib` file to do a bit of
    quick setup. Here, all you need to do is drag a `UIButton` over to your view,
    and then connect it to your header file, naming it `startButton`. You need to
    make an action for this button to perform, so you will declare the following method
    header, and connect your `startButton` to it.


    `-(IBAction)startPressed:(id)sender;`


    Once these changes have been made, your user interface and code should resemble
    [Figure 6–12](#Chapter06.html#fig_6_12) in the Assistant Editor.


    ![Image](images/9781430240051_Fig06-12.jpg)


    **Figure 6–12.** *User interface with configured outlet and action*


    Next, switching away from your XIB/header file combination to view the header
    and implementation files, you will define a new kind of property for your view
    controller, like so.


    `@property (strong, nonatomic) AVCaptureSession *captureSession;`


    You must, as always, remember to “@synthesize captureSession;” and do “self.captureSession
    = nil” in your implementation file and `-viewDidUnload` respectively.


    Next, you will be writing your `-viewDidLoad` method to prepare your view, create
    your `AVCaptureSession`, and set it up as you desire. You will add the following
    sets of lines to your method after the call `[super viewDidLoad];`.


    First, you must create your `AVCaptureSession`, and give it a resolution preset,
    like so:


    `self.captureSession = [[AVCaptureSession alloc] init];`

    `self.captureSession.sessionPreset = AVCaptureSessionPresetMedium;`


    Next, you will create an instance of `AVCaptureDevice`, with which you will specify
    your input device, which in this case will be the device''s rear camera (assuming
    one is accessible). You specify this through the use of the `AVCaptureDevice`
    class method `+defaultDeviceWithMediaType:`, which can take a variety of different
    arguments, depending on the type of media desired, the most prominent of which
    are `AVMediaTypeVideo` and `AVMediaTypeAudio`.


    `AVCaptureDevice *device = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];`


    Next, you need to create an instance of `AVCaptureDeviceInput` in order to specify
    your chosen device as an input for your capture session. You will also include
    a check to make sure the input has been correctly created before adding it to
    your session.


    `NSError *error = nil;`

    `    AVCaptureDeviceInput *input = [AVCaptureDeviceInput deviceInputWithDevice:device`

    `error:&error];`

    `    if (!input)`

    `    {`

    `        NSLog(@"Input Error");`

    `    }`

    `    else`

    `    {`

    `        [self.captureSession addInput:input];`

    `    }`


    Next, you will set up an output for your capture session, like so:


    `AVCaptureVideoDataOutput *output = [[AVCaptureVideoDataOutput alloc] init];`

    `    [self.captureSession addOutput:output];`

    `    output.videoSettings =`

    `    [NSDictionary dictionaryWithObject:[NSNumber`

    `numberWithInt:kCVPixelFormatType_32BGRA]`

    `                                forKey:(id)kCVPixelBufferPixelFormatTypeKey];`


    `    dispatch_queue_t queue = dispatch_queue_create("MyQueue", NULL);`

    `    [output setSampleBufferDelegate:self queue:queue];`

    `    dispatch_release(queue);`


    Here, you have created an `AVCaptureVideoDataOutput`, which is commonly used when
    a developer''s goal is to deal with raw video input frame-by-frame, as opposed
    to simply saving a video as a whole. Other types of `AVCaptureOutput`s include
    the following:


    *   `AVCaptureMovieFileOutput`: Used for saving whole video files

    *   `AVCaptureAudioDataOutput`: Used for processing audio data

    *   `AVCaptureStillImageOutput`: Used for extracting specific still images from
    a session (This type of output could also be used to perform your current goal.)


    You have also dispatched an extra queue to handle the processing of your frames
    that you will end up seeing later.


    The last part of your `-viewDidLoad` will be the creation of an `AVCaptureVideoPreviewLayer`,
    with which you will be able to see exactly what your camera is viewing in the
    app. You will set your preview layer to be the layer of your main view, but with
    a slightly altered height, so as not to block your button from being visible.


    `AVCaptureVideoPreviewLayer *previewLayer = [AVCaptureVideoPreviewLayer`

    `layerWithSession:self.captureSession];`

    `    UIView *aView = self.view;`

    `    previewLayer.frame = CGRectMake(0, 0, self.view.frame.size.width,`

    `self.view.frame.size.height-70);`

    `    [aView.layer addSublayer:previewLayer];`'
  trans: "\n### 食谱 6–5：AV 框架与采集会话\n\n尽管 `UIImagePickerController` 和 `UIVideoEditorController`\
    \ 接口非常实用，但它们的可定制性显然不够。使用 AV 框架，你可以创建可定制性更强的相机接口。在此，你将创建本质上属于自己的相机版本，但通过一种称为 `AVCaptureSession`\
    \ 的不同方法，后续定制将变得极其简便。\n\n首先，你将创建一个名为 \"Chapter6Recipe5\" 的新项目，并使用 \"CustomCamera\"\
    \ 作为类前缀。\n\n你需要将多种不同的框架链接到项目中。导航到项目的主设置，在 Targets 下选择 `CustomCamera`，然后切换到 Build\
    \ Phases 标签页，如图 Figure 6–11 所示。\n\n![Image](img/9781430240051_Fig06-11.jpg)\n\n\
    **图 6–11.** *准备向项目中添加框架*\n\n在 \"Link Binary With Libraries\" 选项下，使用 `+` 按钮添加其他几个框架。搜索并添加以下框架：\n\
    \n- AV Foundation\n- Core Graphics\n- Core Video\n- Core Media\n\n实际上，除了 AV Foundation\
    \ 框架外，你无需为其他框架编写任何 import 语句。继续，将以下 import 行添加到主视图控制器的头文件中。\n\n```\n#import <AVFoundation/AVFoundation.h>\n\
    #import <AVFoundation/AVCaptureInput.h>\n```\n\n接下来，切换到视图控制器的 `.xib` 文件进行一些快速设置。在这里，你只需要将一个\
    \ `UIButton` 拖到视图中，然后将其连接到头文件，并命名为 `startButton`。你需要为该按钮创建一个动作，因此声明以下方法头，并将 `startButton`\
    \ 连接到它。\n\n```\n-(IBAction)startPressed:(id)sender;\n```\n\n完成这些更改后，用户界面和代码在 Assistant\
    \ Editor 中应类似于 Figure 6–12。\n\n![Image](img/9781430240051_Fig06-12.jpg)\n\n**图\
    \ 6–12.** *已配置 Outlet 和 Action 的用户界面*\n\n接下来，从 XIB/头文件组合切换到视图控制器的头和实现文件，为视图控制器定义一种新的属性，如下所示。\n\
    \n```\n@property (strong, nonatomic) AVCaptureSession *captureSession;\n```\n\n\
    务必记得在实现文件中 `@synthesize captureSession;`，并在 `-viewDidUnload` 中设置 `self.captureSession\
    \ = nil`。\n\n接下来，你将编写 `-viewDidLoad` 方法，用于准备视图、创建 `AVCaptureSession` 并按需设置。在调用\
    \ `[super viewDidLoad];` 之后，向方法中添加以下几组代码。\n\n首先，必须创建 `AVCaptureSession` 并为其指定一个分辨率预设，如下所示：\n\
    \n```\nself.captureSession = [[AVCaptureSession alloc] init];\nself.captureSession.sessionPreset\
    \ = AVCaptureSessionPresetMedium;\n```\n\n接着，创建 `AVCaptureDevice` 的实例，用于指定输入设备。在此例中，输入设备将是设备的后置摄像头（假设可访问）。通过使用\
    \ `AVCaptureDevice` 类方法 `+defaultDeviceWithMediaType:` 来指定，该方法可根据所需媒体类型接收多种不同参数，其中最常用的是\
    \ `AVMediaTypeVideo` 和 `AVMediaTypeAudio`。\n\n```\nAVCaptureDevice *device = [AVCaptureDevice\
    \ defaultDeviceWithMediaType:AVMediaTypeVideo];\n```\n\n然后，创建 `AVCaptureDeviceInput`\
    \ 的实例，以将所选设备指定为采集会话的输入。你还需要进行检查，确保输入已正确创建，然后再将其添加到会话中。\n\n```\nNSError *error\
    \ = nil;\nAVCaptureDeviceInput *input = [AVCaptureDeviceInput deviceInputWithDevice:device\n\
    \                                                                    error:&error];\n\
    if (!input) {\n    NSLog(@\"Input Error\");\n} else {\n    [self.captureSession\
    \ addInput:input];\n}\n```\n\n接下来，为采集会话设置一个输出，如下所示：\n\n```\nAVCaptureVideoDataOutput\
    \ *output = [[AVCaptureVideoDataOutput alloc] init];\n[self.captureSession addOutput:output];\n\
    output.videoSettings =\n    [NSDictionary dictionaryWithObject:[NSNumber numberWithInt:kCVPixelFormatType_32BGRA]\n\
    \                                forKey:(id)kCVPixelBufferPixelFormatTypeKey];\n\
    \ndispatch_queue_t queue = dispatch_queue_create(\"MyQueue\", NULL);\n[output\
    \ setSampleBufferDelegate:self queue:queue];\ndispatch_release(queue);\n```\n\n\
    在这里，你创建了一个 `AVCaptureVideoDataOutput`。当开发者的目标是逐帧处理原始视频输入，而非简单地将视频整体保存时，常会使用此类型。其他类型的\
    \ `AVCaptureOutput` 包括：\n\n- `AVCaptureMovieFileOutput`：用于保存整个视频文件\n- `AVCaptureAudioDataOutput`：用于处理音频数据\n\
    - `AVCaptureStillImageOutput`：用于从会话中提取特定的静态图像（此输出类型也可用于实现当前目标）\n\n你还分发了一个额外的队列来处理稍后将会看到的帧数据。\n\
    \n`-viewDidLoad` 的最后一部分是创建 `AVCaptureVideoPreviewLayer`，通过它你可以在应用中实时看到相机拍摄的内容。将预览层设置为主视图的图层，但高度稍作调整，以免遮挡按钮。\n\
    \n```\nAVCaptureVideoPreviewLayer *previewLayer = [AVCaptureVideoPreviewLayer\n\
    \    layerWithSession:self.captureSession];\nUIView *aView = self.view;\npreviewLayer.frame\
    \ = CGRectMake(0, 0, self.view.frame.size.width,\n                           \
    \     self.view.frame.size.height-70);\n[aView.layer addSublayer:previewLayer];\n\
    ```\n"
- fmt: '### A Note on `AVCaptureVideoPreviewLayer`


    The most significant part of the concept of an `AVCaptureVideoPreviewLayer` is
    not its visual output, but instead its power to be manipulated. Just like any
    other `CALayer`, it can be repositioned, rotated, and resized. At this point,
    you are no longer bound to using the entire screen to record video as you are
    with the `UIImagePicker`, meaning you could have your preview layer in one part
    of the screen and other information for the user in another. As with almost every
    part of iOS development, the possibilities of use are limited only by the developer''s
    imagination.


    Since you set your current view controller as the delegate for your `AVCaptureVideoDataOutput`,
    you will need to implement the `AVCaptureVideoDataOutputSampleBufferDelegate`
    protocol. Your header file should now look like so:


    ```

    #import <UIKit/UIKit.h>

    #import <AVFoundation/AVFoundation.h>

    #import <AVFoundation/AVCaptureInput.h>


    @interface CustomCameraViewController : UIViewController

    <AVCaptureVideoDataOutputSampleBufferDelegate>{

        UIImageView *imageViewDisplay;

        UIButton *startButton;

        BOOL capture;

    }


    @property (strong, nonatomic) IBOutlet UIButton *startButton;

    @property (strong, nonatomic) AVCaptureSession *captureSession;

    -(IBAction)startPressed:(id)sender;

    @end

    ```


    Make sure to note the new addition also of the `BOOL` instance variable `capture`.
    You will be using this to keep track of whether your session''s frames will be
    processed.


    Next, you will implement your `AVCaptureVideoDataOutputSampleBuffer`''s delegate
    method, like so:


    ```

    - (void)captureOutput:(AVCaptureOutput *)captureOutput

    didOutputSampleBuffer:(CMSampleBufferRef)sampleBuffer

           fromConnection:(AVCaptureConnection *)connection {


        if (capture)

        {

            UIImage *chosenImage = [self imageFromSampleBuffer:sampleBuffer];

            UIImageWriteToSavedPhotosAlbum (chosenImage, nil, nil , nil);

            capture = NO;

        }

    }

    ```


    As you can see, you are simply checking if your `capture` `BOOL` evaluates to
    a "YES", and if so, you acquire the image of the given video frame, and then save
    it to your device''s photo album. By setting `capture` to "NO" immediately afterward,
    you limit your app to capture only one frame per button press. It should be fairly
    easy to see how this could be expanded to include any number of frames.


    You must also define your `-imageFromSampleBuffer:` that you just used, as follows,
    making sure that it is defined above your delegate method.


    ```

    - (UIImage *) imageFromSampleBuffer:(CMSampleBufferRef) sampleBuffer

    {

        // Get a CMSampleBuffer''s Core Video image buffer for the media data

        CVImageBufferRef imageBuffer = CMSampleBufferGetImageBuffer(sampleBuffer);

        // Lock the base address of the pixel buffer

        CVPixelBufferLockBaseAddress(imageBuffer, 0);


        // Get the number of bytes per row for the pixel buffer

        void *baseAddress = CVPixelBufferGetBaseAddress(imageBuffer);


        // Get the number of bytes per row for the pixel buffer

        size_t bytesPerRow = CVPixelBufferGetBytesPerRow(imageBuffer);

        // Get the pixel buffer width and height

        size_t width = CVPixelBufferGetWidth(imageBuffer);

        size_t height = CVPixelBufferGetHeight(imageBuffer);


        // Create a device-dependent RGB color space

        CGColorSpaceRef colorSpace = CGColorSpaceCreateDeviceRGB();


        // Create a bitmap graphics context with the sample buffer data

        CGContextRef context = CGBitmapContextCreate(baseAddress, width, height, 8,

                                                     bytesPerRow, colorSpace,

    kCGBitmapByteOrder32Little | kCGImageAlphaPremultipliedFirst);

        // Create a Quartz image from the pixel data in the bitmap graphics context

        CGImageRef quartzImage = CGBitmapContextCreateImage(context);

        // Unlock the pixel buffer

        CVPixelBufferUnlockBaseAddress(imageBuffer,0);


        // Free up the context and color space

        CGContextRelease(context);

        CGColorSpaceRelease(colorSpace);


        // Create an image object from the Quartz image

        UIImage *image = [UIImage imageWithCGImage:quartzImage];


        // Release the Quartz image

        CGImageRelease(quartzImage);


        return (image);

    }

    ```


    Now, you will implement a fairly simple capturing toggle method to handle your
    button presses.


    ```

    -(void)startPressed:(id)sender

    {

        if (!capture)

        {

            capture = YES;

        }

        else

        {

            capture = NO;

        }

    }

    ```


    One of the most important steps to remember is to actually "start" and "stop"
    your `AVCaptureSession`. Since you want your camera''s display to be visible any
    time the app is open, you will start your session in your `-viewWillAppear` method
    and stop it in your `-viewWillDisappear` method, the two of which will now look
    like so:


    ```

    - (void)viewWillAppear:(BOOL)animated

    {

        [super viewWillAppear:animated];

        [self.captureSession startRunning];

    }

    - (void)viewWillDisappear:(BOOL)animated

    {

        [super viewWillDisappear:animated];

        [self.captureSession stopRunning];

    }

    ```


    If you run this app on your device now, you will probably notice that all the
    saved images that you take look like they were taken in landscape mode, and then
    rotated to fit in portrait, obviously not filling up the entire screen anymore.
    You fix this by changing the video orientation of your session''s output connections
    by changing your `-viewWillAppear:` method to appear like so:


    ```

    - (void)viewWillAppear:(BOOL)animated

    {

        [super viewWillAppear:animated];

        [self.captureSession startRunning];


        NSArray *array = [[self.captureSession.outputs objectAtIndex:0] connections];

        for (AVCaptureConnection *connection in array)

        {

            connection.videoOrientation = AVCaptureVideoOrientationPortrait;

        }

    }

    ```


    If you run the app now on your device, you will be able to see a preview of what
    your camera is recording, and whenever you press the button, the current frame
    will be saved to your photo library, as in [Figure 6–13](#Chapter06.html#fig_6_13).
    While you haven''t included any fancy animations to make it look like a camera,
    this is incredibly useful as far as a basic camera goes, especially given your
    new ability to fully customize its behavior in a frame-by-frame case or as a whole
    video (if you add a second output).


    ![Image](images/9781430240051_Fig06-13.jpg)


    **Figure 6–13.** *Your app displaying a preview of the camera''s view*'
