    \    self.studentTable.managedObjectContext = self.managedObjectContext;\n   \
    \ self.studentTable.title = @\"Students\";\n\n    self.instrumentTable = [[MainTableViewController\
    \ alloc] init];\n    self.instrumentTable.entityDescription = [NSEntityDescription\
    \ entityForName:@\"Instrument\" inManagedObjectContext:self.managedObjectContext];\n\
    \    self.instrumentTable.managedObjectContext = self.managedObjectContext;\n\
