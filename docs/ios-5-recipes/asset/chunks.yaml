    \ `UIImageView` 中添加黑色背景，你为图片提供了一个简单的背景板，从而实现一种通用且全面的功能，用于展示调整尺寸后的图片，如图 Figure\
    \ 15–15 所示。\n\n![Image](img/9781430240051_Fig15-15.jpg)\n\n**图 15–15.** *将缩放后的图片适配进视图有助于避免裁剪，但会带来\
    \ `UIImageView` 背景可见的问题。*\n\n#### 回顾总结\n\n你已了解了三种简单但各不相同的调整 `UIImage` 尺寸的方法，每种方法都有自己的优点和问题。\n\
    \n1. 第一种方法直接忽略宽高比，将图片调整到指定尺寸。虽然这能避免图片遮挡其他元素，但会导致明显的形变。\n2. 通过一些简单的数学计算，你手动维持宽高比，将图片缩小到合适尺寸。这种方法的缺点在于，为了填满给定空间，它往往会裁剪掉图片的部分内容。如果你需要创建一起展示的小尺寸缩略图，这是一个不错的实现方式。\n\
    3. 重新配置了宽高比调整方法后，你能够展示一个锁定宽高比且尺寸更小的图片，使其完全适配 `UIImageView`。当然，这会在图片周围留下空白区域，于是你应用了黑色背景。当在一个无法控制原始图片尺寸的应用程序中展示大图时，这是一种特别实用的技术。它能让任意图片舒适地适配给定空间，同时无论何种情况都能维持美观的黑色背景。\n\
    \n### 配方 15–4：使用滤镜处理图片\n\nCore Image 框架是 iOS 5.0 中全新引入的一组类，它允许你创造性地将多种不同类型的“滤镜”应用于图片。\n\
    \n首先，将 `CoreImage.framework` 库导入你的项目。进入应用程序的 Build Phases 标签页，点击 Link Binary With\
    \ Libraries 区域下方的 + 按钮。在弹出的对话框（如图 Figure 15–16 所示）中，找到 Core Image framework 并添加它。\n\
    \n![Image](img/9781430240051_Fig15-16.jpg)\n\n**图 15–16.** *将 Core Image 框架添加到项目中*\n\
    \n为主视图控制器的头文件添加对该框架的导入语句。\n\n`#import <CoreImage/CoreImage.h>`\n\n接下来，在同一个控制器中添加一个\
    \ `NSMutableArray` 属性，用于存储将要展示的过滤后的图片。记得照常正确合成（synthesize）并处理该属性。\n\n`@property\
    \ (strong, nonatomic) NSMutableArray *images;`\n\n此外，需要为该属性编写一个自定义的 getter 方法，以确保它能正确初始化。\n\
    \n```\n-(NSMutableArray *)images\n{\n    if (!images)\n    {\n        images =\
    \ [[NSMutableArray alloc] initWithCapacity:3];\n    }\n    return images;\n}\n\
    ```\n\n现在，你将再次修改 `-setMainImage:` 方法，加入对该数组的正确处理。\n\n```\n-(void)setMainImage:(UIImage\
    \ *)image\n{\n    [self.images removeAllObjects];\n    if (image != nil)\n   \
    \ {\n        [self.images addObject:image];\n        [self populateImagesWithImage:image];\n\
    \    }\n\n    mainImage = image;\n    NSIndexPath *currentIndexPath = self.tableView.indexPathForSelectedRow;\n\
    \    [self.tableView reloadData];\n    [self.tableView selectRowAtIndexPath:currentIndexPath\
    \ animated:YES scrollPosition:UITableViewScrollPositionTop];\n}\n```\n\n包含大部分\
    \ Core Image 代码的方法 `-populateImagesWithImage:` 将按如下方式实现。记得也要将方法声明放在你的头文件中。\n\n\
    ```\n-(void)populateImagesWithImage:(UIImage *)image\n{\n    CIImage *main = [[CIImage\
    \ alloc] initWithImage:image];\n\n    CIFilter *hueAdjust = [CIFilter filterWithName:@\"\
    CIHueAdjust\"];\n    [hueAdjust setDefaults];\n    [hueAdjust setValue:main forKey:@\"\
    inputImage\"];\n    [hueAdjust setValue:[NSNumber numberWithFloat: 3.14/2.0f]\n\
    \                forKey:@\"inputAngle\"];\n    CIImage *outputHueAdjust = [hueAdjust\
    \ valueForKey:@\"outputImage\"];\n    CIContext *context = [CIContext contextWithOptions:nil];\n\
    \    UIImage *outputImage1 = [UIImage imageWithCGImage:[context createCGImage:outputHueAdjust\n\
    \                                                                    fromRect:outputHueAdjust.extent]];\n\
    \    [self.images addObject:outputImage1];\n\n    CIFilter *strFilter = [CIFilter\
    \ filterWithName:@\"CIStraightenFilter\"];\n    [strFilter setDefaults];\n   \
    \ [strFilter setValue:main forKey:@\"inputImage\"];\n    [strFilter setValue:[NSNumber\
    \ numberWithFloat:3.14f] forKey:@\"inputAngle\"];\n    CIImage *outputStr = [strFilter\
    \ valueForKey:@\"outputImage\"];\n    UIImage *outputImage2 = [UIImage imageWithCGImage:[context\
    \ createCGImage:outputStr fromRect:outputStr.extent]];\n    [self.images addObject:outputImage2];\n\
    }\n```\n\n正如你从这个方法中看到的，创建 `CIImage` 需要以下步骤：\n\n1. 获取目标输入图片的 `CIImage` 对象。\n2.\
    \ 使用特定的名称键创建一个滤镜。名称决定了将应用哪种滤镜以及可以使用哪些参数。\n3. 为了确保无误，将滤镜的所有参数重置为默认值。\n4. 使用 `\"\
    inputImage\"` 键将输入图片设置到滤镜中。\n5. 设置与滤镜相关的任何额外值以自定义输出效果。\n6. 使用 `\"outputImage\"\
    ` 键获取输出的 `CIImage`。\n7. 通过 `CIContext` 从 `CIImage` 创建一个 `UIImage`。\n\n在这里，你选择了应用两种不同的滤镜：“色相调整”（Hue\
    \ Adjustment）和“纠直滤镜”（Straighten Filter）。前者会改变图片的色相，而后者用于旋转图片以将其摆正。\n"
- fmt: "**注意：**可应用于图像的滤镜数量极其庞大，每个滤镜都有其特定的参数和键。要查找特定滤镜的详细信息，请使用 Apple 文档：[`http://developer.apple.com/library/ios/#DOCUMENTATION/GraphicsImaging/Reference/CoreImageFilterReference/Reference/reference.html`](http://developer.apple.com/library/ios/#DOCUMENTATION/GraphicsImaging/Reference/CoreImageFilterReference/Reference/reference.html)。\n\
    \n现在，你可以通过再次修改`-tableView:didSelectRowAtIndexPath:`方法，将这些新创建的滤镜图像指定给你的视图控制器。\n\
