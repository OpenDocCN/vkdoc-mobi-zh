- fmt: '### `UITabBarController`


    另一个特殊视图控制器，其使用频率几乎与`UINavigationController`一样普遍，那就是`UITabBarController`。该类专门设计用于处理包含多个分区或“标签页”的应用程序，每个标签页都有自己的信息流。Twitter应用程序是这种实现的一个绝佳示例。每个标签页都可以包含其他控制器，包括`UINavigationController`对象，从而允许构建更复杂的视图控制器网络。然而，`UITabBarController`不应被放置在任何其他控制器内部，因为iOS
    API不支持这样做。


    在`UITabBarController`中，每个视图控制器都有一个标签页，默认情况下，该标签页会填充视图控制器的标题，并且没有图像。创建一个新的`UITabBarItem`实例并将其设置为视图控制器的`tabBarItem`属性将覆盖此默认行为，允许您添加图像并稍微自定义标签页。


    每个视图控制器的`-viewDidLoad`方法实际上直到包含该视图控制器的特定标签页被选中时才会被调用，这意味着在此方法中进行的任何配置（例如设置标题）都不会立即生效，从而导致标签页在选中之前显示为无标签状态。当声明视图控制器时设置其标题可以轻松解决此问题，但将标题配置添加到视图控制器的指定初始化方法中也同样有效。


    [图 3–21](#Chapter03.html#fig_3_21) 展示了一个简单的`UITabBarController`的屏幕截图，该控制器包含三个标签页，每个标签页都配置了标题和基于系统的图像，以及用于创建它的示例代码。


    ![Image](images/9781430240051_Fig03-21.jpg)


    **Figure 3–21.** *一个配置了三个标签页的`UITabBarController`*


    这使用了以下配置代码，取自`-application:didFinishLaunchingWithOptions:`方法，假设已经创建了两个`UIViewController`子类（`MainViewController`和`SecondViewController`）并将其导入到应用程序委托文件中。


    ```

    self.viewController = [[MainViewController alloc] initWithNibName:@"MainViewController"

    bundle:nil];

    self.viewController.title = @"First";

    self.viewController.tabBarItem = [[UITabBarItem alloc]

    initWithTabBarSystemItem:UITabBarSystemItemFeatured tag:0];


    __strong SecondViewController *second = [[SecondViewController alloc] init];

    second.title = @"Second";

    second.tabBarItem = [[UITabBarItem alloc]

    initWithTabBarSystemItem:UITabBarSystemItemDownloads tag:1];


    __strong SecondViewController *third = [[SecondViewController alloc] init];

    third.title = @"third";

    third.tabBarItem = [[UITabBarItem alloc]

    initWithTabBarSystemItem:UITabBarSystemItemRecents tag:2];


    __strong UITabBarController *tabcon = [[UITabBarController alloc] init];

    [tabcon setViewControllers:[NSArray arrayWithObjects:self.viewController, second,
    third,

    nil]];


    self.window.rootViewController = tabcon;

    ```


    ### `UISplitViewController`


    `UISplitViewController`是另一个用于帮助组织其他视图控制器的元素。但是，此类仅在进行iPad开发时可用，因为它需要大量的屏幕空间才能发挥效用。它包含两个`UIViewController`：一个“主面板”和一个“详情面板”。主面板显示在屏幕左侧较窄的视图中，剩余空间由详情面板占据，如[图
    3–22](#Chapter03.html#fig_3_22)所示。通常，这种设置用于从主面板中选择一个项目，然后在详情面板中显示该项目的详细信息。


    ![Image](images/9781430240051_Fig03-22.jpg)


    **Figure 3–22.** *适用于iPad的`UISplitViewController`*


    [图 3–22](#Chapter03.html#fig_3_22) 展示了一个基于`UISplitViewController`的预配置应用程序，该程序是使用“Master-Detail
    Application”模板创建的。如果您希望使用此控制器构建应用程序，此模板可以帮助您快速上手。此选项可以在创建新项目时出现的第一个菜单中找到，如[图 3–23](#Chapter03.html#fig_3_23)所示。与Empty
    Application模板一样，它也提供了包含Core Data框架和自动设置的选项。


    ![Image](images/9781430240051_Fig03-23.jpg)


    **Figure 3–23.** *使用Master-Detail Application模板创建预配置的`UISplitViewController`*


    `UISplitViewController`类有两个属性：`viewControllers`和`delegate`。前者是一个`NSArray`，必须恰好包含两个控制器：首先是主面板控制器，然后是详情面板控制器。


    默认情况下，如果iPad处于竖屏方向，主面板将不会显示。您可以通过`UISplitViewControllerDelegate`协议方法`-splitViewController:shouldHideViewController:inOrientation:`来调整此行为。通常，`UISplitViewController`的`delegate`属性会被设置为您的详情面板视图控制器，因为它包含应用程序的相关信息。


    在使用`UISplitViewController`时，请务必确保视图的所有部分在其相关操作和控制器方面都清晰明了。避免在两个面板中都放置工具栏，以免它们看起来是相连的。同时，请确保您在主面板中所做的任何选择都可见地持续存在，以便用户始终能够判断当前视图显示的是哪个项目。'
  raw: '#### UITabBarController


    Another special view controller, almost as ubiquitously used as the `UINavigationController`,
    is the `UITabBarController`. This class is specially designed to handle applications
    that contain multiple sections or “tabs,” each with their own flow of information.
    The Twitter application has an excellent example of this implementation. Each
    tab can include other controllers, including `UINavigationController` objects,
    allowing for more complex networks of view controllers. The `UITabBarController`,
    however, should not be placed inside of any other controllers, as it is unsupported
    by the iOS API.


    Each view controller in a `UITabBarController` has a tab, which by default is
    populated with the view controller’s title, and no image. Creating a new instance
    of the `UITabBarItem` and setting it as the view controller’s `tabBarItem` will
    override this, allowing you to add images and slightly customize your tabs.


    The `-viewDidLoad` method for each view controller is not actually called until
    the specific tab containing that view controller is selected, which means that
    any configuration done in this method, such as setting a title, does not occur
    right away, leaving you with unlabeled tabs until they are selected. Setting the
    view controller’s title when it is declared can simply solve this, though adding
    the title configuration into the view controller’s designated initializer will
    work as well.


    [Figure 3–21](#Chapter03.html#fig_3_21) features a screenshot of a simple `UITabBarController`
    with three tabs, each with configured titles and system-based images, as well
    as the sample code used to create it.


    ![Image](images/9781430240051_Fig03-21.jpg)


    **Figure 3–21.** *A `UITabBarController` configured with three tabs*


    This uses the following configuration code, taken from an `-application:didFinishLaunchingWithOptions:`
    method, assuming that two `UIViewController` subclasses, `MainViewController`
    and `SecondViewController`, have been created and imported to the application
    delegate file.


    `self.viewController = [[MainViewController alloc] initWithNibName:@"MainViewController"`

    `bundle:nil];`

    `self.viewController.title = @"First";`

    `self.viewController.tabBarItem = [[UITabBarItem alloc]`

    `initWithTabBarSystemItem:UITabBarSystemItemFeatured tag:0];`


    `__strong SecondViewController *second = [[SecondViewController alloc] init];`

    `second.title = @"Second";`

    `second.tabBarItem = [[UITabBarItem alloc]`

    `initWithTabBarSystemItem:UITabBarSystemItemDownloads tag:1];`


    `__strong SecondViewController *third = [[SecondViewController alloc] init];`

    `third.title = @"third";`

    `third.tabBarItem = [[UITabBarItem alloc]`

    `initWithTabBarSystemItem:UITabBarSystemItemRecents tag:2];`


    `__strong UITabBarController *tabcon = [[UITabBarController alloc] init];`

    `[tabcon setViewControllers:[NSArray arrayWithObjects:self.viewController, second,
    third,`

    `nil]];`


    `self.window.rootViewController = tabcon;`


    #### UISplitViewController


    The `UISplitViewController` is another element built to help organize other view
    controllers. This class, however, is available only when developing for the iPad,
    as it requires a large amount of space to utilize. It features two `UIViewController`s,
    a “master pane” and a “detail pane.” The master pane is displayed in a narrower
    view on the left side of the screen, with the remainder taken up by the detail
    pane, as in [Figure 3–22](#Chapter03.html#fig_3_22). Generally this setup is used
    to select an item from the master pane and give details on that item in the detail
    pane.


    ![Image](images/9781430240051_Fig03-22.jpg)


    **Figure 3–22.** *The iPad-specific `UISplitViewController`*


    [Figure 3–22](#Chapter03.html#fig_3_22) shows a pre-configured `UISplitViewController`-based
    application created from the Master-Detail Application template. If you wish to
    build your application using this controller, this template can easily help you
    get started. This option can be found in the first menu presented upon creating
    a new project, shown in [Figure 3–23](#Chapter03.html#fig_3_23). Like the Empty
    Application template, it also provides an option to include the Core Data framework
    and automatic setup.


    ![Image](images/9781430240051_Fig03-23.jpg)


    **Figure 3–23.** *Using the Master-Detail Application template to create a pre-configured
    `UISplitViewController`*


    The `UISplitViewController` class has two properties, `viewControllers` and `delegate`.
    The former of these is an `NSArray` that must contain exactly two controllers:
    first the master pane controller, then the detail pane controller.


    By default, if the iPad is portrait-oriented, the master pane is not shown. You
    can adjust this through the `UISplitViewControllerDelegate` protocol method `-splitViewController:shouldHideViewController:inOrientation:`.Generally
    the `delegate` property of a `UISplitViewController` is set to the view controller
    for your detail pane, as it contains the relevant information of your application.


    When using a `UISplitViewController`, be careful to ensure that all parts of your
    view are clear in their related actions and controllers. Avoid placing toolbars
    in both panes, as they might appear connected. Make sure also that any selection
    made in your master pane visibly persists, so that the user can always tell which
    item was selected to display the current view.'
