- fmt: '# UISlider


    The `UISlider` provides a very nice and simple UI element for allowing a user
    to smoothly adjust values, as shown in [Figure 3–9](#Chapter03.html#fig_3_9).


    ![Image](images/9781430240051_Fig03-09.jpg)


    **Figure 3–9.** *A simple `UISlider`*


    These sliders are fairly easy to set up and configure. You can use Interface Builder
    to do most of the value setup, or you can set values programmatically. The most
    important properties to configure are the `minimumValue`, `maximumValue`, and
    initial value. You can set the initial value when you set up your XIB file, or
    in code by simply setting the value of the slider in your `-viewDidLoad`.


    Beyond these essential properties, you can also greatly customize the appearance
    of the slider, including specifying customized track images and thumb images.
    You can also specify images to place on either end of the `UISlider` to help represent
    your maximum and minimum values using the `minimumValueImage` and `maximumValueImage`
    properties. For example, if your `UISlider` deals with an audio player’s volume,
    your minimum value image may be an image of a speaker, and the maximum value image
    might be the same speaker but with sound waves emanating from it.


    You can create actions to be performed upon the changing of a `UISlider`’s value
    through two methods:


    1. Declare a method of return type (`IBAction`) in your header file, and then
    connect the `UISlider` in your XIB file to this method by holding ![Image](images/U003.jpg)
    and dragging from the slider to the method header.

    2. Use the `-addTarget:action:forControlEvents:` method, as shown here: `[self.mySlider
    addTarget:self action:@selector(valueChanged:) forControlEvents:UIControlEventValueChanged]`.


    The `UISlider` also has a property called `continuous`, which determines whether
    the value changes are reported continuously. If not, whichever action you have
    associated with the slider will be called only when users finish adjusting the
    value, rather than repeatedly as they move the thumb.


    If you wish to cause the value of your slider to change programmatically, rather
    than having the user adjust it (possibly due to some other event), you should
    use the `-setValue:animated:` method, rather than simply setting the `value` property,
    in order to provide a smoother transition to the user.


    # UISwitch


    The `UISwitch` acts very similarly to the `UISlider`, but allows the user to choose
    only a Boolean value, either “On” (as in [Figure 3–10](#Chapter03.html#fig_3_10))
    or “Off”. These are very often used in Settings areas of applications to allow
    users to easily customize their preferences.


    ![Image](images/9781430240051_Fig03-10.jpg)


    **Figure 3–10.** *An enabled `UISwitch`*


    The `UISwitch` works the exact same way as the `UISlider` in terms of adding actions
    to be performed upon the changing of the value, though significantly simplified
    due to the Boolean nature of the switch. Just as before, `-addTarget:action:forControlEvents:`
    is used to connect a method to the switch. You can also access the value of the
    switch using the `on` property, and animate the changing of its value using the
    `-setOn:animated:` method.


    # UIActivityIndicatorView


    Often an application may be currently working on a task that does not happen immediately.
    This could be a process of downloading files from a server or even simply a task
    dealing with a large amount of data requiring some significant amount of time
    to complete. As the developer, you should always strive to keep your user informed
    of such activities. For this, you have the `UIActivityIndicatorView`, shown in
    [Figure 3–11](#Chapter03.html#fig_3_11).


    A `UIActivityIndicatorView` is a simple element that is used to display whether
    an activity is going on in the background. However, it allows for only two states:
    in progress, and not in progress. To switch between these, you can use the `-startAnimating`
    and `-stopAnimating` methods. You can also access whether the indicator is currently
    animating through the `-isAnimating` method. If you do not have any particular
    use of the indicator once your task is finished, you can use the `hidesWhenStopped`
    property.


    ![Image](images/9781430240051_Fig03-11.jpg)


    **Figure 3–11.** *A `UIActivityIndicatorView` element*


    For this element, you are fairly limited in your customization options in that
    you are given only properties to adjust the color and size. First, you have the
    `activityIndicatorViewStyle` property, which takes three possible values:


    * `UIActivityIndicatorViewStyleWhiteLarge`

    * `UIActivityIndicatorViewStyleWhite`

    * `UIActivityIndicatorViewStyleGray`


    These three values differ only in size and color, and should be chosen from to
    maximize visual display quality.


    If none of the foregoing styles fit your application’s design very well, you can
    also specify a different color, through the `UIColor` class, using the `color`
    property.


    # UIProgressView


    Following along the lines of the `UIActivityIndicatorView`, you have the `UIProgressView`.
    This acts very similarly to a `UISlider` in that it displays a value (although
    limited to scaling between 0 and 1), but does not allow for any user input. This
    element is most often used for displaying some amount of progress of a task completed,
    as in [Figure 3–12](#Chapter03.html#fig_3_12), as an alternative to simply using
    a `UIActivityIndicatorView` to show that progress is occurring.


    ![Image](images/9781430240051_Fig03-12.jpg)


    **Figure 3–12.** *A `UIProgressView` in use*


    Just like the `UIActivityIndicatorView`, `UIProgressView`s can be created with
    a style, accessed through the `progressViewStyle` property, which has the following
    possible values:


    * `UIProgressViewStyleDefault`: Standard style chosen for `UIProgressView`s

    * `UIProgressViewStyleBar`: Style often used inside of a toolbar


    The most important property of the `UIProgressView` is, naturally, the amount
    of progress. This value, which ranges between 0.0 and 1.0, can be accessed through
    the `progress` property. You can also set this property using the `-setProgress:animated:`
    method to improve your application’s visual quality.


    Aside from the `progressViewStyle`, the `UIProgressView` allows for decent appearance
    customization of the tint color and image for both the progress displayed, as
    well as the track upon which it rests. These are all respectively accessed through
    the `progressTintColor`, `progressImage`, `trackTintColor`, and `trackImage` properties.'
  raw: "#### UISlider\n\nThe `UISlider` provides a very nice and simple UI element\
    \ for allowing a user to smoothly adjust values, as shown in [Figure 3–9](#Chapter03.html#fig_3_9).\n\
    \n![Image](images/9781430240051_Fig03-09.jpg)\n\n**Figure 3–9.** *A simple `UISlider`*\n\
    \nThese sliders are fairly easy to set up and configure. You can use Interface\
    \ Builder to do most of the value setup, or you can set values programmatically.\
    \ The most important properties to configure are the `minimumValue`, `maximumValue`,\
    \ and initial value. You can set the initial value when you set up your XIB file,\
    \ or in code by simply setting the value of the slider in your `-viewDidLoad`.\n\
    \nBeyond these essential properties, you can also greatly customize the appearance\
    \ of the slider, including specifying customized track images and thumb images.\
    \ You can also specify images to place on either end of the `UISlider` to help\
    \ represent your maximum and minimum values using the `minimumValueImage` and\
    \ `maximumValueImage` properties. For example, if your `UISlider` deals with an\
    \ audio player’s volume, your minimum value image may be an image of a speaker,\
    \ and the maximum value image might be the same speaker but with sound waves emanating\
    \ from it.\n\nYou can create actions to be performed upon the changing of a `UISlider`’s\
    \ value through two methods:\n\n1.  Declare a method of return type (`IBAction`)\
    \ in your header file, and then connect the `UISlider` in your XIB file to this\
    \ method by holding ![Image](images/U003.jpg) and dragging from the slider to\
    \ the method header.\n2.  Use the `-addTarget:action:forControlEvents:` method,\
    \ as shown here: `[self.mySlider addTarget:self action:@selector(valueChanged:)`\n\
    \    `forControlEvents:UIControlEventValueChanged];`\n\nThe `UISlider` also has\
    \ a property called `continuous`, which determines whether the value changes are\
    \ reported continuously. If not, whichever action you have associated with the\
    \ slider will be called only when users finish adjusting the value, rather than\
    \ repeatedly as they move the thumb.\n\nIf you wish to cause the value of your\
    \ slider to change programmatically, rather than having the user adjust it (possibly\
    \ due to some other event), you should use the `-setValue:animated:` method, rather\
    \ than simply setting the `value` property, in order to provide a smoother transition\
    \ to the user.\n\n#### UISwitch\n\nThe `UISwitch` acts very similarly to the `UISlider`,\
    \ but allows the user to choose only a Boolean value, either “On” (as in [Figure\
    \ 3–10](#Chapter03.html#fig_3_10)) or “Off”. These are very often used in Settings\
    \ areas of applications to allow users to easily customize their preferences.\n\
    \n![Image](images/9781430240051_Fig03-10.jpg)\n\n**Figure 3–10.** *An enabled\
    \ `UISwitch`*\n\nThe `UISwitch` works the exact same way as the `UISlider` in\
    \ terms of adding actions to be performed upon the changing of the value, though\
    \ significantly simplified due to the Boolean nature of the switch. Just as before,\
    \ `-addTarget:action:forControlEvents:` is used to connect a method to the switch.\
    \ You can also access the value of the switch using the `on`property, and animate\
    \ the changing of its value using the `-setOn:animated:` method.\n\n#### UIActivityIndicatorView\n\
    \nOften an application may be currently working on a task that does not happen\
    \ immediately. This could be a process of downloading files from a server or even\
    \ simply a task dealing with a large amount of data requiring some significant\
    \ amount of time to complete. As the developer, you should always strive to keep\
    \ your user informed of such activities. For this, you have the `UIActivityIndicatorView`,\
    \ shown in [Figure 3–11](#Chapter03.html#fig_3_11).\n\nA `UIActivityIndicatorView`\
    \ is a simple element that is used to display whether an activity is going on\
    \ in the background. However, it allows for only two states: in progress, and\
    \ not in progress. To switch between these, you can use the `–startAnimating`\
    \ and `-stopAnimating`methods. You can also access whether the indicator is currently\
    \ animating through the `–isAnimating` method. If you do not have any particular\
    \ use of the indicator once your task is finished, you can use the `hidesWhenStopped`\
    \ property.\n\n![Image](images/9781430240051_Fig03-11.jpg)\n\n**Figure 3–11.**\
