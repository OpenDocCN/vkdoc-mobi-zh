- fmt: "### `UISegmentedControl`\n\n`UISegmentedControl`类本质上是`UIButton`的扩展。它不仅允许你进行选择，还能无限期地保留这些选择，直到做出另一个选择。它专为那些始终需要从多个选项中选择一个的场景而设计，比如在地图应用中选择显示类型，或者在游戏中配置设置。\n\
    \n`UISegmentedControl`元素由多个“分段”（segments）组成，每个分段内可以包含一个字符串或一张图片，如[图3–5](#Chapter03.html#fig_3_5)所示。\n\
    \n![Image](images/9781430240051_Fig03-05.jpg)\n\n**图3–5.** *一个简单的`UISegmentedControl`*\n\
    \n每个分段都有一个与之对应的索引，第一个分段的索引为0。\n\n与`UIButton`类似，你可以为`UISegmentedControl`添加动作，以便在选中的分段发生改变时执行。使用`-addTarget:action:forControlEvents:`方法即可，示例如下：\n\
    \n`[self.segCon addTarget:self action:@selector(segmentChanged:) forControlEvents:UIControlEventValueChanged];`\n\
    \n当构建`UISegmentedControl`实例时，你可以在分配对象后，使用`-initWithItems:`方法指定一组初始显示项。之后，你可以使用`-insertSegmentWithImage:atIndex:animated:`和`-insertSegmentWithTitle:atIndex:animated:`方法来添加分段，并使用`-removeSegmentAtIndex:animated:`或`-removeAllSegments:`方法来移除分段。\n\
    \n在任何时候，你都可以通过`numberOfSegments`属性获取控件中当前项目的总数，并通过`selectedSegmentIndex`访问当前选中的索引。\n\
    \n一旦你有了想要访问的特定索引，可以使用`-setImage:forSegmentAtIndex:`、`imageForSegmentAtIndex:`、`setTitle:forSegmentAtIndex:`和`titleForSegmentAtIndex:`来根据需要修改或利用你的`UISegmentedControl`。以下是`UISegmentedControl`的一个动作示例，它将新选中分段的文本替换为其先前值的平方。\n\
    \n```\n-(void)segmentChanged:(UISegmentedControl *)sender\n{\n    int index =\
    \ sender.selectedSegmentIndex;\n    NSString *title = [sender titleForSegmentAtIndex:index];\n\
    \    int x = [title intValue]*[title intValue];\n    NSString *newTitle = [[NSNumber\
    \ numberWithInt:x] stringValue];\n    [sender setTitle:newTitle forSegmentAtIndex:index];\n\
    }\n```\n\n### `UITextField`\n\n`UITextField`是最易于定制的用户输入形式，也是使用最频繁的，因为它允许你轻松地获取用户输入并进行处理。你甚至可以对用户输入应用自动更正功能，但应谨慎使用，以避免不必要的更正。\n\
    \n如果你想在视图中添加一个`UITextField`，最简单的方法是在XIB文件中将其放置在视图中，如[图3–6](#Chapter03.html#fig_3_6)所示。然后，你可以将其作为属性连接到头文件，并在`-viewDidLoad`方法中进行配置。\n\
    \n无论何时处理`UITextField`（或之后你会遇到的其他基于文本的输入），最需要记住的一点是，键盘有时会遮挡屏幕的一半。作为设计者，你需要为此做好规划，确保你的`UITextField`位于屏幕的上半部分，或者在键盘出现时自动移动到上半部分。你可以通过注册以下通知，设置在键盘出现或消失时要执行的动作：\n\
    \n*   `UIKeyboardWillShowNotification`\n*   `UIKeyboardDidShowNotification`\n\
    *   `UIKeyboardWillHideNotification`\n*   `UIKeyboardDidHideNotification`\n\n\
    ![Image](images/9781430240051_Fig03-06.jpg)\n\n**图3–6.** *在XIB界面中添加`UITextView`*\n\
    \n在Interface Builder中，你还可以轻松地对`UITextField`进行一些配置。你也可以通过`UITextField`的属性以编程方式实现所有这些更改，但Interface\
    \ Builder能使其变得更容易，尤其是键盘设置，如自动大写和自动更正。[图3–7](#Chapter03.html#fig_3_7)是包含这些设置的属性检查器视图。如图所示，“更正”类型默认为“默认”，这会导致你在输入消息时常见的一般响应。\n\
    \n![Image](images/9781430240051_Fig03-07.jpg)\n\n**图3–7.** *在实用工具面板中配置`UITextField`*\n\
    \n通过使用`leftView`、`rightView`、`inputView`和`inputAccessoryView`属性，以编程方式自定义`UITextField`的视图也非常容易。\n\
    \n`UITextField`最重要的属性之一是`delegate`属性，它接收与`UITextField`动作相关的各种方法调用。被设置为`delegate`的对象（通常是显示`UITextField`的视图控制器）必须遵循`UITextFieldDelegate`协议。\n\
    \n`UITextFieldDelegate`协议指定了多种方法来管理`UITextField`的编辑。你可以使用`-textFieldShouldBeginEditing:`和`-textFieldShouldEndEditing:`方法来启用或禁用编辑的开始或结束。（在这两个方法中返回`NO`可禁用相应的动作。）\n\
    \n你还可以使用`-textFieldDidBeginEditing:`和`-textFieldDidEndEditing:`来移动周围的元素，确保键盘不会遮挡你的`UITextField`。\n\
    \n在编辑`UITextField`的文本方面，`UITextFieldDelegate`提供了一些方法来帮助你自定义文本字段的行为。`-textField:shouldChangeCharactersInRange:replacementString:`在主动解析输入的文本时非常有用。`-textFieldShouldClear:`方法也允许你决定是否清除`UITextField`的内容。\n\
    \n`UITextFieldDelegate`协议中最有用的方法可能是`-textFieldShouldReturn:`方法，它通常是实现关闭键盘的主要方法。大多数用户习惯于按回车键结束对`UITextField`的编辑，因此你可以像下面这样简单地实现这个方法：\n\
    \n```\n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n{\n    [textField\
    \ resignFirstResponder];\n    return YES;\n}\n```\n\n通过使用`-resignFirstResponder`方法，你的`UITextField`放弃了作为当前关键元素的角色，从而关闭了键盘。如[图3–8](#Chapter03.html#fig_3_8)所示，模拟运行的应用将允许你通过按回车键来关闭键盘。\n\
    \n![Image](images/9781430240051_Fig03-08.jpg)\n\n**图3–8.** *一个启用了关闭键盘功能的应用*"
  raw: '#### UISegmentedControl


    The `UISegmentedControl` class is essentially an extension of the `UIButton`.
    It allows you to not only make selections, but alsopreserve those selections indefinitely,
    until another selection is made. They are particularly designed for situations
    in which one of multiple options will always be selected, such as choosing the
    type of display in a Maps application, or simply for configuring settings in a
    game.


    `UISegmentedControl` elements are made up of multiple “segments,” with each one
    having either a string or an image inside them, as in [Figure 3–5](#Chapter03.html#fig_3_5).


    ![Image](images/9781430240051_Fig03-05.jpg)


    **Figure 3–5.** *A simple `UISegmentedControl`*


    Each segment has an index referring to it, starting with the first segment having
    index 0.


    Just like with the `UIButton`, you can add actions to a `UISegmentedControl` to
    be performed any time the selected segment is changed using the `-addTarget:action:forControlEvents:`method,
    like so:


    `[self.segConaddTarget:self action:@selector(segmentChanged:) forControlEvents:UIControlEventValueChanged];`


    When building instances of `UISegmentedControl`, you can specify an initial set
    of items to display using the `-initWithItems:` method after allocating the object.
    From there, you can add segments using the `-insertSegmentWithImage:atIndex:animated:`and`-insertSegmentWithTitle:atIndex:animated:`
    methods, and remove them using `-removeSegmentAtIndex:animated:` or `-removeAllSegments:`.


    At any point, you can always access the current number of items in the control
    using the `numberOfSegments` property, and access the currently selected index
    with `selectedSegmentIndex`.


    Once you have a specific index you want to access, you can use `-setImage:forSegmentAtIndex:`,
    `imageForSegmentAtIndex:`, `setTitle:forSegmentAtIndex:`, and `titleForSegmentAtIndex:`
    to modify or utilize your `UISegmentedControl` as needed! The following is an
    example of an action for the `UISegmentedControl`, which replaces the text of
    a newly selected segment with the square of its previous value.


    `-(void)segmentChanged:(UISegmentedControl *)sender`

    `{`

    `int index = sender.selectedSegmentIndex;`

    `NSString *title = [sender titleForSegmentAtIndex:index];`

    `int x = [title intValue]*[title intValue];`

    `NSString *newTitle = [[NSNumber numberWithInt:x] stringValue];`

    `    [sender setTitle:newTitle forSegmentAtIndex:index];`

    `}`


    #### UITextField


    The `UITextField` is easily the most customizable form of user input, as well
    as the most heavily used, as it allows you to easily take input from a user to
    be processed. You even have the ability to apply auto-correct to the user input,
    though this should be used sparingly to avoid unwanted corrections.


    If you want to add a `UITextField` to a view, the easiest way to do it is to place
    it in the view in your XIBfile, as in [Figure 3–6](#Chapter03.html#fig_3_6). You
    can then connect it to your header file as a property, and configure it in your
    `-viewDidLoad` method.


    One of the absolutely most important things to remember whenever you are dealing
    with a `UITextField` (or other text-based inputs that you will deal with later)
    is that at some point, a keyboard will likely end up covering half of your screen.
    You need to plan for this as a designer by making sure your `UITextField` is in
    the top half of the screen or moves up to the top half of the screen when the
    keyboard appears. You can set up actions to be performed when the keyboard appears
    or disappears by registering for the following notifications:


    *   `UIKeyboardWillShowNotification`

    *   `UIKeyboardDidShowNotification`

    *   `UIKeyboardWillHideNotification`

    *   `UIKeyboardDidHideNotification`


    ![Image](images/9781430240051_Fig03-06.jpg)


    **Figure 3–6.** *Adding a `UITextView` to a XIB interface*


    While in Interface Builder, you can also do some easy configuration of your `UITextField`.
    You can make all these changes programmatically using `UITextField` properties,
    but Interface Builder makes them a great deal easier, especially the keyboard
    settings such as Capitalization and Auto-Correction. [Figure 3–7](#Chapter03.html#fig_3_7)
    is a view of the Attribute inspector containing these settings. As shown, the
    “Correction” type defaults to “Default”, resulting in the general response you
    often see when typing messages.


    ![Image](images/9781430240051_Fig03-07.jpg)


    **Figure 3–7.** *Configuring a `UITextField` in the utilities pane*


    It is also very easy to programmatically customize the view of a `UITextField`
    through the use of the `leftView`, `rightView`, `inputView`, and `inputAccessoryView`
    properties.


    One of the most important properties of a `UITextField` is the `delegate` property,
    which receives a variety of method calls relating to the actions of a `UITextField`.
    Whichever object is set as the `delegate` (usually the view controller in whose
    view the `UITextField` is shown) must conform to the `UITextFieldDelegate` protocol.


    The `UITextFieldDelegate` protocol specifies a variety of methods to manage the
    editing of a `UITextField`. You can use the `-textFieldShouldBeginEditing:`and`-textFieldShouldEndEditing:`
    methods to either enable or disable the beginning or ending of editing. (Return
    `NO` in either of these to disable the given action.)


    You can also use `-textFieldDidBeginEditing:`and`-textFieldDidEndEditing:` to
    do any movement of elements around to make sure that the keyboard does not block
    your `UITextField`.


    In terms of editing the `UITextField`’s text, the `UITextFieldDelegate` offers
    a few methods to help customize the actions of your text field. `-textField:shouldChangeCharactersInRange:replacementString:`
    is useful for actively parsing text as it is entered. The `-textFieldShouldClear:`method
    also allows you a voice in whether a `UITextField` clears.


    Quite possibly the most useful `UITextFieldDelegate` protocol method is the `-textFieldShouldReturn:`
    method, as it often serves as the main method by which you can implement the dismissing
    of the keyboard. Most users are used to pressing the return key to finish editing
    a `UITextField`, so you can simply implement this method like so:


    `-(BOOL)textFieldShouldReturn:(UITextField *)textField`

    `{`

    `    [textField resignFirstResponder];`

    `return YES;`

    `}`


    By using the `-resignFirstResponder` method, your `UITextField` gives up its role
    as the current key element, dismissing the keyboard.Yourresulting app, as simulated
    in [Figure 3–8](#Chapter03.html#fig_3_8), will allow you to dismiss a keyboard
    with the pressing of the return key.


    ![Image](images/9781430240051_Fig03-08.jpg)


    **Figure 3–8.** *An app with enabled functionality for dismissing the keyboard*'
