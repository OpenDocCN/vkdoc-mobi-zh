- fmt: '### Recipe 6–1: Taking Pictures


    iOS has an incredibly handy and simple interface built into it to utilize your
    device''s camera through fairly standard, pre-defined settings. Through these,
    you can set up basic camera-focused apps, allowing users to take pictures and
    video from inside an app. Here, you will go over the basics of starting the camera
    interface in order to capture a still image.


    You will again start by creating a new project using the Single View Application
    template, as shown in [Figure 6–1](#Chapter06.html#fig_6_1).


    ![Image](images/9781430240051_Fig06-01.jpg)


    **Figure 6–1.** *Creating a single view application*


    You will name your project "Chapter6Recipe1". Set the Class Prefix to `Capture`,
    as shown in [Figure 6–2](#Chapter06.html#fig_6_2), and, if your version of Xcode
    includes it, make sure that Use Automatic Reference Counting is enabled.


    ![Image](images/9781430240051_Fig06-02.jpg)


    **Figure 6–2.** *Specifying your project settings*


    Click Next and then Create to start the project.


    In order to access your camera in the pre-defined way that you will be using,
    you do not need to import any extra frameworks into your project, so you will
    proceed to build your user interface.


    You will be making a simple project that will allow you to pull up your camera,
    take a picture, and then display the most recently taken image on your screen.


    First, you need to switch over to your view controller''s `.xib` file, which,
    if you used all the same names as shown in [Figure 6–3](#Chapter06.html#fig_6_3),
    will be called `CaptureViewController.xib`. From the object library on the right-hand
    side of the screen, click and drag out a `UIImageView` into your view, and rearrange
    it to fill the entire view. Next, you will drag out a `UIButton` into your view,
    which will be used to access the camera, so you will set its text to say "Change
    Image" by double-clicking the button''s text.


    ![Image](images/9781430240051_Fig06-03.jpg)


    **Figure 6–3.** *`CaptureViewControlle`''s user interface*


    Next, make sure that you are in Assistant Editor mode by selecting the middle
    "editing" button in the top right area of your screen, as shown in [Figure 6–4](#Chapter06.html#fig_6_4).
    This will allow you to view both your interface file and your header file at the
    same time and work across them synchronously.


    ![Image](images/9781430240051_Fig06-04.jpg)


    **Figure 6–4.** *Selecting the Assistant Editor*


    Once in the Assistant Editor mode, create an outlet for your `UIImageView` called
    `imageViewRecent`. Repeat this process for your `UIButton`, naming it `cameraButton`.
    [Figure 6–5](#Chapter06.html#fig_6_5) shows the resulting window of these operations.


    ![Image](images/9781430240051_Fig06-05.jpg)


    **Figure 6–5.** *Completed user interface with connected outlets and actions*


    Before you leave this setup, you will declare an action for your button to perform
    when it is pressed, called `cameraButtonPressed:`, by adding a method declaration
    to your header file, and then connecting your `UIButton` to it by holding ^ (Ctrl),
    clicking the button, dragging a blue line up to the method name in the header
    file, and releasing it. When you do this, the method declaration should become
    highlighted, and a small message box will display saying "Connect Action". Your
    method declaration will look like so:


    ```

    - (IBAction)cameraButtonPressed:(id)sender;

    ```


    Now that your interface file is put together, you can switch over to view your
    `CaptureViewController.m` file.


    The first thing you will do for simple aesthetics'' sake is to change the background
    color of your `UIImageView` to gray so that it is easier to distinguish from your
    `UIButton` when there is no image set as the background. To do this, place the
    following line of code into the `viewDidLoad` method.


    ```

    self.imageViewRecent.backgroundColor = [UIColor lightGrayColor];

    ```


    Next, you will be handling what your app will do when your Change Image button
    is pressed. Since your button is already hooked up to perform your `cameraButtonPressed:`
    method, all you need to do is implement this method. You will be using an instance
    of the `UIImagePickerController` class to access your camera.


    Whenever dealing with the camera hardware on iOS, it is essential that, as a developer,
    you include a function to have your app check for hardware availability. This
    is done through the static `UIImagePickerController` method `isSourceTypeAvailable:`,
    which takes several pre-defined constants as arguments. The options for this method
    are as follows:


    ```

    UIImagePickerControllerSourceTypeCamera

    UIImagePickerControllerSourceTypePhotoLibrary

    UIImagePickerControllerSourceTypeSavedPhotosAlbum

    ```


    You will be using the first choice here, `UIImagePickerControllerSourceTypeCamera`.
    `UIImagePickerControllerPhotoLibrary` is used to access all the stored photos
    on the device, while `UIImagePickerControllerSavedPhotosAlbum` is used to access
    only the Camera Roll album.


    For your application, you will check if the Camera source type is available, and
    if not, display a `UIAlertView` saying so, by using the following code in your
    `viewDidLoad` method.


    ```

    if ([UIImagePickerController

    isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera] == NO)

        {

            UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Error"

    message:@"Camera Unavailable" delegate:self cancelButtonTitle:@"Cancel"

    otherButtonTitles:nil, nil];

            [alert show];

            return;

        }

    ```


    If you are running this application in the simulator, you will notice that this
    condition always evaluates to true, resulting in your error message, as demonstrated
    in [Figure 6–6](#Chapter06.html#fig_6_6). As mentioned earlier, the simulator
    has no camera functionality, so in order to fully test this application, you will
    need to test it on a physical device.


    ![Image](images/9781430240051_Fig06-06.jpg)


    **Figure 6–6.** *Simulation of your app, which does not support camera use*


    Now you can handle the case that you actually hope for, in which the Camera is
    available. First, you will create an instance of `UIImagePickerController`, naming
    it `imagePicker`.


    ```

        UIImagePickerController *imagePicker = [[UIImagePickerController alloc] init];

    ```


    Next, you will set the delegate and source type of `imagePicker` to be your view
    controller and `UIImagePickerControllerSourceTypeCamera`, respectively.


    ```

    imagePicker.delegate = self;

        imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;

    ```


    Finally, you will present your `UIImagePickerController` modally.


    ```

    [self presentModalViewController:imagePicker animated:YES];

    ```


    In its entirety, your method to handle your button presses should now look like
    so:


    ```

    -(IBAction)cameraButtonPressed:(id)sender

    {

        if ([UIImagePickerController isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera]
    == NO)

        {

            UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Error"

    message:@"Camera Unavailable" delegate:self cancelButtonTitle:@"Cancel"

    otherButtonTitles:nil, nil];

            [alert show];

            return;

        }

        UIImagePickerController *imagePicker = [[UIImagePickerController alloc] init];

        imagePicker.delegate = self;

        imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;

        [self presentModalViewController:imagePicker animated:YES];

    }

    ```


    By setting up your view controller as the delegate for your `UIImagePickerController`,
    you are required to ensure that your view controller conforms to a couple of protocols,
    specifically the `UIImagePickerController` and `UINavigationController` protocols.
    You will add these to your class''s header file, so that it now looks like so:'
