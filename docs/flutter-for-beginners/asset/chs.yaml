  #### 项目类型


  使用参数 `-t` 或 `--template` 来指定要创建的项目类型。共有四种项目类型，见表 2-2。


  **表 2-2** Flutter 项目类型


  | 项目类型 | 描述 |

  | --- | --- |

  | `app` | 一个 Flutter 应用。这是默认类型。 |

  | `package` | 一个可共享的 Flutter 项目，包含模块化的 Dart 代码。 |

  | `plugin` | 一个可共享的 Flutter 项目，包含针对 Android 和 iOS 的平台特定代码。 |


  以下命令展示了如何创建一个 Flutter 包和插件。


  ```

  $ flutter create -t package my_package

  $ flutter create -t plugin my_plugin

  ```


  创建插件时，我们还可以使用参数 `-i` 或 `--ios-language` 来指定 iOS 代码的编程语言。可选值为用于 Objective-C 的 `objc`
  和用于 Swift 的 `swift`。默认值为 `objc`。对于 Android 代码，我们可以使用参数 `-a` 或 `--android-language`
  来指定 Android 代码的编程语言。可选值为用于 Java 的 `java` 和用于 Kotlin 的 `kotlin`。默认值为 `java`。以下命令展示了如何创建一个
  iOS 使用 Swift 且 Android 使用 Kotlin 的 Flutter 插件。


  ```

  $ flutter create -t plugin -i swift -a kotlin my_plugin

  ```


  #### 代码示例


  创建 Flutter 应用时，我们可以使用参数 `-s` 或 `--sample` 来指定要用作新应用的 `lib/main.dart` 文件的示例代码。给定一个示例
  ID，该命令会尝试从 URL [`https://docs.flutter.dev/snippets/<sample_id>.dart`](https://docs.flutter.dev/snippets/%253csample_id%253e.dart)
  加载该 Dart 文件。


  #### 项目配置


  创建项目时，有一些通用的配置可用，见表 2-3。


  **表 2-3** Flutter 项目配置


  | 参数 | 描述 | 默认值 |

  | --- | --- | --- |

  | `--project-name` | 此新 Flutter 项目的名称。名称必须是有效的 dart 包名。 | 从输出目录名称派生 |

  | `--org` | 此新 Flutter 项目的组织名称。该值应使用反向域名表示法，例如 `com.example`。该值用作 Android 代码的 Java
  包名以及 iOS 捆绑包标识符中的前缀。 | `com.example` |

  | `--description` | 此新 Flutter 项目的描述。 | 一个新的 Flutter 项目 |


  以下命令使用了表 2-3 中的项目配置。


  ```

  $ flutter create --org=com.mycompany --description="E-commerce app" my_ecommerce_app

  ```


  #### 启用或禁用功能


  还有一些额外的标志用于启用或禁用某些功能，见表 2-4。每次只能指定一对参数中的一个。带有前缀 `--no` 的参数表示禁用某个功能，而另一个参数则表示启用该功能。例如，`--overwrite`
  表示允许覆盖，而 `--no-overwrite` 表示禁止覆盖。默认值 On 或 Off 分别表示该功能默认是启用还是禁用。例如，对于 `--overwrite`
  和 `--no-overwrite` 这对参数，默认值 Off 意味着默认使用 `--no-overwrite`。


  **表 2-4** `flutter create` 的功能


  | 参数 | 描述 | 默认值 |

  | --- | --- | --- |

  | `--overwrite` / `--no-overwrite` | 是否覆盖现有文件。 | 关闭 |

  | `--pub` / `--no-pub` | 项目创建后是否运行 `flutter packages get`。 | 开启 |

  | `--offline` / `--no-offline` | 是否以离线模式运行 `flutter packages get`。仅在 `--pub` 开启时适用。
  | 关闭 |

  | `--with-driver-test` / `--no-with-driver-test` | 是否添加 `flutter_driver` 依赖并生成一个示例
  Flutter Drive 测试。 | 关闭 |


  ## 2.8 运行 Flutter 应用


  ### 问题


  你想要运行 Flutter 应用。


  ### 解决方案


  使用带有不同参数的 `flutter run` 命令。


  ### 讨论


  `flutter run` 是 Flutter SDK 提供的用于启动 Flutter 应用的命令。`flutter run` 有许多适用于不同使用场景的参数。


  #### 不同的构建风格


  默认情况下，`flutter run` 构建应用的调试版本。调试版本适合开发和测试，并支持热重载。你还可以使用其他构建风格以适应不同场景，见表 2-5。


  **表 2-5** `flutter run` 的构建风格


  | 参数 | 描述 |

  | --- | --- |

  | `--debug` | 调试版本。这是默认的构建风格。 |

  | `--profile` | 专门用于性能分析的版本。此选项当前不支持模拟器目标。 |

  | `--release` | 准备发布到应用商店的发布版本。 |

  | `--flavor` | 由特定平台构建设置定义的自定义应用风格。这需要在 Android Gradle 脚本和自定义 Xcode scheme 中使用产品风格。
  |


  #### 其他选项


  参数 `-t` 或 `--target` 指定应用的主入口点文件。它必须是包含 `main()` 方法的 Dart 文件。默认值为 `lib/main.dart`。以下命令使用
  `lib/app.dart` 作为入口点文件。


  ```

  $ flutter run -t lib/app.dart

  ```


  如果你的应用有不同的路由，可以使用参数 `--route` 指定运行应用时要加载的路由。


  如果你想记录正在运行的 Flutter 应用的进程 ID，请使用参数 `--pid-file` 指定写入进程 ID 的文件。有了进程 ID，你可以发送信号 `SIGUSR1`
  来触发热重载，发送 `SIGUSR2` 来触发热重启。在以下命令中，进程 ID 被写入文件 `~/app.pid`。


  ```

  $ flutter run --pid-file ~/app.pid

  ```


  现在，我们可以使用 `kill` 向正在运行的 Flutter 应用发送信号。


  ```

  $ kill -SIGUSR1 $(<~/app.pid)

  $ kill -SIGUSR2 $(<~/app.pid)

  ```


  表 2-6 展示了 `flutter run` 支持的其他参数。


  **表 2-6** `flutter run` 的额外参数


  | 参数 | 描述 | 默认值 |

  | --- | --- | --- |

  | `--hot` / `--not-hot` | 是否启用热重载。 | 开启 |

  | `--build` / `--no-build` | 在运行前是否需要（如有必要）构建应用。 | 开启 |

  | `--pub`/ `--no-pub` | 运行前是否执行 `flutter packages get`。 | 开启 |

  | `--target-platform` | 为 Android 设备构建应用时指定目标平台。可选值为 `default`、`android-arm` 和 `android-arm64`。
  | `default` |

  | `--observatory-port` | 指定 Observatory 调试器连接的端口。 | `0`（随机空闲端口） |

  | `--start-paused` | 使应用以暂停模式启动，并等待调试器连接。 |   |

  | `--trace-startup` | 开始跟踪。 |   |

  | `--enable-software-rendering` | 启用使用 Skia 进行渲染。 |   |

  | `--skia-deterministic-rendering` | 当与 `--enable-software-rendering` 一起使用时，提供 100%
  确定的 Skia 渲染。 |   |

  | `--trace-skia` | 启用对 Skia 代码的跟踪。 |   |


  图 2-11 显示了运行 `flutter run` 命令的输出。从输出中，我们可以看到正在运行的应用的 Observatory 端口，这对于其他 Flutter
  SDK 命令与该运行中的应用交互非常重要。我们可以通过按下不同的键与控制台进行交互。例如，按下“r”触发热重载。按下“h”后，`flutter run` 会显示一条关于它可以接受的所有命令的帮助信息。


  ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig11_HTML.jpg](img/479501_1_En_2_Fig11_HTML.jpg)


  **图 2-11** 命令 `flutter run` 的输出


  ## 2.9 构建 Flutter 应用二进制文件


  ### 问题


  你想要为 Android 和 iOS 平台构建应用二进制文件。


  ### 解决方案


  使用命令 `flutter build`。




  ### 讨论


  要将 Flutter 应用部署到设备上并发布到应用商店，我们需要为 Android 和 iOS 平台构建二进制文件。`flutter build` 命令支持构建这些二进制文件。


  #### 为 Android 构建 APK 文件


  `flutter build apk` 命令用于为你的应用构建 APK 文件。表 2-7 显示了该命令支持的参数。


  **表 2-7** `flutter build apk` 的参数


  | 参数 | 描述 |

  | --- | --- |

  | `--debug` | 构建调试版本。 |

  | `--profile` | 构建专用于性能分析的版本。 |

  | `--release` | 构建准备发布到应用商店的发布版本。 |

  | `--flavor` | 构建由特定平台构建设置定义的自定义应用变体。这需要在 Android Gradle 脚本中使用产品变体，并自定义 Xcode 配置。
  |

  | `--pub` / `--no-pub` | 是否在构建应用前运行 `flutter packages get`。 |

  | `--build-number`= | 一个整数，用于指定递增的内部版本号。每次构建此值都必须唯一。该值用作“`versionCode`”。 |

  | `--build-name`= | 一个字符串版本号，格式为 `x.y.z`。该值用作“`versionName`”。 |

  | `--build-shared-library` | 编译为 `*.so` 文件。 |

  | `--target-platform` | 目标平台。可选值为 `android-arm` 和 `android-arm64`。 |


  构建 APK 文件时，`--release` 是默认模式。以下命令构建一个发布版本，其构建号为 `5`，版本名为 `0.1.0`。


  ```

  $ flutter build apk --build-number=5 --build-name=0.1.0

  ```


  #### 为 iOS 构建


  `flutter build ios` 命令用于构建 iOS 应用程序包。此命令与 `flutter build apk` 拥有相同的参数：`--debug`、`--profile`、`--release`、`--flavor`、`--pub`、`--no-pub`、`--build-number`
  和 `--build-version`。`--build-number` 的值用作“`CFBundleVersion`”，而 `--build-name` 的值用作“`CFBundleShortVersionString`”。


  它还有其他参数；参见表 2-8。


  **表 2-8** `flutter build ios` 的额外参数


  | 参数 | 描述 |

  | --- | --- |

  | `--simulator` | 构建一个用于 iOS 模拟器的版本。 |

  | `--no-simulator` | 构建一个用于 iOS 设备的版本。 |

  | `--codesign` / `--no-codesign` | 是否对应用程序包进行签名。默认值为 `--codesign`。 |


  默认情况下，`flutter build ios` 为设备构建应用，即使用 `--no-simulator`。以下命令为模拟器构建一个调试版本，并且不签名应用程序包。


  ```

  $ flutter build ios --debug --no-codesign --simulator

  ```


  ## 2.10 安装 Flutter 应用


  ### 问题


  你想要将 Flutter 应用安装到模拟器或设备上。


  ### 解决方案


  使用 `flutter install` 命令。


  ### 讨论


  `flutter install` 命令将当前的 Flutter 应用安装到模拟器或设备上。要安装应用，你至少需要启动一个模拟器或连接一个设备。在安装应用之前，目标模拟器或设备上应已存在可用的二进制文件。请先使用
  `flutter build` 构建二进制文件。


  以下命令安装构建好的二进制文件。


  ```

  $ flutter install

  ```


  ## 2.11 管理包


  ### 问题


  你想要管理 Flutter 应用的依赖项。


  ### 解决方案


  使用 `flutter packages` 命令。


  ### 讨论


  使用包是 Dart 管理项目依赖的方式。Flutter 继承了相同的依赖管理方式。你可能在其他编程平台中见过类似的概念。为了使依赖管理生效，我们需要一种方式来描述可共享的组件及其依赖关系，同时还需要一个工具来获取这些依赖。表
  2-9 展示了不同平台的包管理工具。Flutter SDK 使用 `flutter packages` 命令来管理依赖，该命令底层使用了 Dart 的 `pub`
  工具。


  **表 2-9** 包管理工具


  | 平台 | 描述文件 | 工具 |

  | --- | --- | --- |

  | Node.js | `package.json` | `npm`、`Yarn` |

  | Dart/Flutter | `pubspec.yaml` | `pub`、`flutter packages` |

  | Java | `pom.xml`、`build.gradle` | Maven、Gradle |

  | Ruby | `Gemfile` | Bundler |


  `flutter packages get` 命令会下载 Flutter 项目中的依赖包。`flutter packages upgrade` 命令会升级 Flutter
  项目中的包。这两个命令只是对 Dart 底层的 `pub` 工具进行了简单的封装。我们也可以使用 `flutter packages pub` 来直接调用 Dart
  的 `pub` 工具。`flutter packages` 命令的功能有限，能干的事情不多。你可以随时使用 `flutter packages pub` 将任务委托给
  Dart 的 `pub` 工具。


  ### 注意


  你应该使用 `flutter packages get` 和 `flutter packages upgrade` 来管理 Flutter 应用的依赖项。不应使用
  Dart `pub` 工具中的 `pub get` 和 `pub upgrade` 命令。如果你需要 Dart `pub` 工具提供的更多功能，请使用 `flutter
  packages pub`。


  `flutter packages test` 命令与 `pub run test` 相同，但与 `flutter test` 不同。由 `flutter packages
  test` 运行的测试托管在纯 Dart 环境中，因此 `dart:ui` 这样的库不可用。这使测试运行得更快。如果你正在构建不依赖 Flutter SDK 中任何包的库，则应使用此命令来运行测试。


  ## 2.12 运行 Flutter 测试


  ### 问题


  你已经为 Flutter 应用编写了测试，并希望确保这些测试通过。


  ### 解决方案


  使用 `flutter test` 命令。




  ### 讨论


  测试是可维护软件项目中不可或缺的一部分。你应该为 Flutter 应用编写测试。命令 `flutter test` 用于运行 Flutter 应用的测试。运行此命令时，你可以提供一系列以空格分隔的相对文件路径，来指定要运行的测试文件。如果未提供任何文件，则会包含
  `test` 目录下所有文件名以 `_test.dart` 结尾的文件。以下命令运行测试文件 `test/mytest.dart`。


  ```

  $ flutter test test/mytest.dart

  ```


  #### 筛选要运行的测试


  参数 `--name` 指定用于匹配要运行测试名称的正则表达式。一个测试文件可能包含多个测试。如果你只需要进行简单的子字符串匹配，请改用 `--plain-name`。以下命令展示了
  `--name` 和 `--plain-name` 的用法。


  ```

  $ flutter test --name="smoke\d+"

  $ flutter test --plain-name=smoke

  ```


  你可以使用 `--name` 和 `--plain-name` 指定多个匹配条件。要运行的测试必须满足所有给定的条件。以下命令同时使用了 `--name` 和
  `--plain-name`。


  ```

  $ flutter test --name="smoke.*" --plain-name=test

  ```


  #### 测试覆盖率


  如果你想了解测试的覆盖率，请使用参数 `--coverage`。测试完成后，`flutter test` 会生成测试覆盖率信息并保存到文件 `coverage/lcov.info`。可以使用参数
  `--coverage-path` 指定覆盖率信息的输出路径。如果你有基础覆盖率数据，可以将其放入路径 `coverage/lcov.base.info`，并向
  `flutter test` 传递参数 `--merge-coverage`，随后 Flutter SDK 将使用 `lcov` 合并这两个覆盖率文件。


  要查看覆盖率报告，你需要安装 `lcov`。在 macOS 上，可以使用 Homebrew 安装 `lcov`。


  ```

  $ brew install lcov

  ```


  命令 `genhtml` 从 `lcov` 覆盖率信息文件生成 HTML 文件。以下命令生成 HTML 覆盖率报告。打开生成的文件 `index.html` 即可查看报告。


  ```

  $ genhtml coverage/lcov.info --output-directory coverage_report

  ```


  #### 调试测试


  如果你想调试一个测试文件，可以使用参数 `--start-paused`。此模式下只允许使用单个测试文件。执行过程会暂停，直到调试器连接。以下命令用于调试文件
  `test/simple.dart`。


  ```

  $ flutter test --start-paused test/simple.dart

  ```


  #### 其他选项


  还有其他有用的参数；请参阅表 2-10。


  表 2-10


  `flutter test` 的额外参数


  | 参数 | 描述 | 默认值 |

  | --- | --- | --- |

  | `--j`, `--concurrency` | 并发运行的测试数量。 | `6` |

  | `--pub` / `--no-pub` | 是否在运行测试前执行 `flutter packages get`。 | 开 |


  ## 2.13 分析代码


  ### 问题


  你的 Flutter 代码编译成功，并且在测试中表现良好。但是，你想知道代码中是否存在任何潜在的错误或不佳的代码实践。


  ### 解决方案


  使用命令 `flutter analyze`。


  ### 讨论


  即使你的代码编译成功并通过了所有测试，代码仍可能存在潜在错误或不良代码味道。例如，声明了一个局部变量但从未使用过。保持代码尽可能清晰是一种良好实践。Dart 提供了分析器来分析源代码以发现潜在错误。


  命令 `flutter analyze` 接受一系列目录来扫描 Dart 文件。如果未提供路径，`flutter analyze` 仅分析当前工作目录。以下命令分析目录
  `~/my_app/lib`。


  ```

  $ flutter analyze ~/my_app/lib

  ```


  分析结果可以使用参数 `--write` 写入文件。默认情况下，结果会输出到控制台。你也可以传递参数 `--watch`，让分析器监视文件系统更改并持续进行分析。


  表 2-11 显示了 `flutter analyze` 的额外参数。


  表 2-11


  `flutter analyze` 的额外参数


  | 参数 | 描述 | 默认值 |

  | --- | --- | --- |

  | `--current-package` / `--no-current-package` | 是否分析当前项目。如果启用了 `--no-current-package`
  且未指定目录，则不会分析任何内容。 | 开 |

  | `--pub` / `--no-pub` | 是否在运行分析前执行 `flutter packages get`。 | 开 |

  | `--preamble` / `--no-preamble` | 是否显示正在分析的当前文件。 | 开 |

  | `--congratulate` / `--no-congratulate` | 即使没有错误、警告、提示或 lint 问题，是否也显示输出。 | 开 |

  | `--watch` | 持续监视文件系统更改，并响应地运行分析。 |   |


  命令 `flutter analyze` 将代码分析委托给 Dart 的 `dartanalyzer` 工具。我们可以使用项目根目录中的文件 `analysis_options.yaml`
  来自定义分析行为。


  图 2-12 展示了 `flutter analyze` 的输出，代码中发现了一个问题。


  ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig12_HTML.jpg](img/479501_1_En_2_Fig12_HTML.jpg)


  图 2-12


  命令 `flutter analyze` 的输出


  ## 2.14 管理模拟器


  ### 问题


  你想管理 Flutter SDK 使用的不同模拟器。


  ### 解决方案


  使用命令 `flutter emulators`。


  ### 讨论


  在为 Flutter SDK 设置 Android 和 iOS 平台时，我们也创建了 Android 和 iOS 模拟器。对于 Android，我们可以使用 AVD
  管理器来管理模拟器。对于 iOS，我们可以使用 Xcode 来管理模拟器。如果我们能以相同的方式管理 Android 模拟器和 iOS 模拟器，那将会非常方便。命令
  `flutter emulators` 就是用于管理模拟器的工具。


  运行 `flutter emulators` 会显示所有可供 Flutter SDK 使用的模拟器；请参见图 2-13。


  ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig13_HTML.jpg](img/479501_1_En_2_Fig13_HTML.jpg)


  图 2-13


  命令 `flutter emulators` 的输出


  要启动一个模拟器，请使用 `flutter emulators --launch <emulator_id>`。以下命令启动 `Nexus_6P_API_28`
  模拟器。你只需要提供一个部分 ID 来找到要启动的确切模拟器。这个部分 ID 必须只匹配一个模拟器。


  ```

  $ flutter emulators --launch Nexus

  ```


  我们也可以使用 `flutter emulators --create` 创建新的 Android 模拟器。以下命令创建一个名为 `Pixel` 的新模拟器。此命令只能创建基于
  Pixel 设备的模拟器。


  ```

  $ flutter emulators --create --name Pixel

  ```


  ## 2.15 截取屏幕截图


  ### 问题


  你想截取正在运行的应用的屏幕截图。


  ### 解决方案


  使用命令 `flutter screenshot`。




  ### 讨论


  Android 模拟器和 iOS 模拟器都提供了截取屏幕截图的原生功能。对于 iOS 模拟器，可以通过菜单**文件** ➤ **新建屏幕快照**来完成。对于 Android
  模拟器，可以点击浮动控制栏中的截屏图标。但使用 UI 控件并不十分方便。模拟器截取的屏幕截图默认保存到桌面。你必须配置模拟器才能保存到所需位置。


  `flutter screenshot` 命令比模拟器的内置功能更容易使用。你可以使用参数 `-o` 或 `--output` 来指定保存截图的路径；请参考以下命令。


  ```

  $ flutter screenshot -o ~/myapp/screenshots/home.png

  ```


  `flutter screenshot` 可以截取不同类型的截图。参数 `--type` 接受表 2-12 中列出的值。


  **表 2-12** 截图类型


  | 类型 | 描述 |

  | --- | --- |

  | `Device` | 使用设备的原生截图功能。截图包含当前正在显示的整个屏幕。这是默认类型。 |

  | `Rasterizer` | 使用光栅化器渲染的 Flutter 应用的截图。 |

  | `skia` | 渲染为 Skia 图片的 Flutter 应用的截图。 |


  对于 `rasterizer` 和 `skia` 类型，需要使用参数 `--observatory-port` 提供正在运行应用的 Dart Observatory
  端口号。该端口号显示在 `flutter run` 命令的输出中。


  ## 2.16 连接到正在运行的应用


  ### 问题


  你的 Flutter 应用不是通过 `flutter run` 启动的，但你需要与之交互。


  ### 解决方案


  使用 `flutter attach` 命令。


  ### 讨论


  当 Flutter 应用通过 `flutter run` 启动时，我们可以通过控制台与之交互。但是，应用也可以通过其他方式启动。例如，我们可以在设备上关闭应用然后重新打开。在这种情况下，我们会失去对正在运行的应用的控制。`flutter
  attach` 提供了一种连接到正在运行的应用的方法。


  如果应用已经在运行，并且你知道它的 observatory 端口，可以使用 `flutter attach --debug-port` 进行连接。以下命令连接到一个正在运行的应用。


  ```

  $ flutter attach --debug-port 10010

  ```


  如果没有提供 observatory 端口，`flutter attach` 会开始监听并扫描新激活的应用。当检测到新的 observatory 时，此命令会自动连接到该应用。


  ```

  $ flutter attach

  ```


  在图 2-14 中，`flutter attach` 最初正在等待新的 Flutter 应用启动。一旦 Flutter 应用启动，`flutter attach`
  就会连接到它并显示与 `flutter run` 相同的控制台。


  ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig14_HTML.jpg](img/479501_1_En_2_Fig14_HTML.jpg)


  **图 2-14** `flutter attach` 命令的输出


  ## 2.17 追踪正在运行的 Flutter 应用


  ### 问题


  你想要追踪一个正在运行的应用的执行过程。


  ### 解决方案


  使用 `flutter trace` 命令。


  ### 讨论


  要开始追踪，我们需要知道正在运行的应用的 observatory 端口，并通过参数 `--debug-port` 将此端口提供给 `flutter trace`。默认情况下，追踪会运行
  `10` 秒，并将结果 JSON 文件写入当前目录，文件名类似于 `trace_01.json`、`trace_02.json` 等。在以下命令中，observatory
  端口是 `51240`。


  ```

  $ flutter trace --debug-port=51240

  ```


  使用参数 `-d` 或 `--duration` 来指定追踪运行的持续时间（以秒为单位）。以下命令运行追踪 5 秒。


  ```

  $ flutter trace --debug-port=51240 -d 5

  ```


  如果你希望手动控制追踪过程，可以先使用 `flutter trace --start` 开始追踪，然后在稍后使用 `flutter trace --stop`
  停止追踪。值得注意的是，当调用 `flutter trace --stop` 时，追踪需要等待 `--duration` 中指定的时间才能停止。在以下命令中，在第二次
  `flutter trace --stop` 之后，追踪会再等待 10 秒才停止，这是 `--duration` 的默认值。


  ```

  $ flutter trace --start

  $ flutter trace --stop

  ```


  要立即停止追踪，请使用以下命令。


  ```

  $ flutter trace --stop -d 0

  ```


