  ### 讨论


  `flutter create` 是 Flutter SDK 提供的用于创建 Flutter 项目的命令。在方法 1-10 中，我们使用此命令创建了一个简单的
  Flutter 应用。在方法 1-11 中，我们还看到了 Android 提供的用于创建新 Flutter 项目的向导，该向导允许自定义创建的项目。在底层，Android
  Studio 也使用了 `flutter create` 命令。此命令针对不同场景支持不同的参数。以下代码是 `flutter create` 的基本用法。输出目录将包含新项目的文件。


  ```

  $ flutter create

  ```



  好的，作为高级文档工程师和翻译员，我将遵循您的注意事项和示例，将给定的英文文本翻译成中文。


