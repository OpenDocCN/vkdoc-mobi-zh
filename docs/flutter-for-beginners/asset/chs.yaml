  \n\n\n#### 数字\n\nDart 中的数字可以是不超过 64 位的整数值，或符合 IEEE 754 标准的 64 位双精度浮点数。`int` 和 `double`\
  \ 类型分别代表这两种数值类型。`num` 类型是 `int` 和 `double` 的超类型。与 Java 中的原始类型不同，Dart 中的数字也是对象，它们拥有可供操作的方法。\n\
  \n在代码清单 3-1 中，`x` 的类型是 `int`，而 `y` 的类型是 `double`。方法 `toRadixString()` 通过将数值转换为指定的基数来返回一个字符串值。方法\
  \ `toStringAsFixed()` 确保在字符串表示中保留给定数量的小数位数。`double` 的静态方法 `tryParse()` 尝试将一个字符串解析为\
  \ `double` 字面量。\n\n```\nvar x = 10;\nvar y = 1.5;\nassert(x.toRadixString(8) ==\
  \ '12');\nassert(y.toStringAsFixed(2) == '1.50');\nvar z = double.tryParse('3.14');\n\
  assert(z == 3.14);\n代码清单 3-1\n数字\n```\n\n#### 字符串\n\nDart 字符串是 UTF-16 代码单元的序列。可以使用单引号或双引号来创建字符串。使用哪种引号无关紧要，关键在于整个代码库中保持一致。Dart\
  \ 内置支持字符串插值。可以使用 `$ {表达式}` 的形式将表达式嵌入到字符串中。当使用字符串时，嵌入的表达式的值会被计算。如果表达式是一个标识符，则可以省略\
  \ `{}`。在代码清单 3-2 中，`name` 是一个标识符，因此我们可以在字符串中使用 `$name`。\n\n```\nvar name = 'Alex';\n\
  assert('The length of $name is ${name.length}' == 'The length of Alex is 4');\n\
  代码清单 3-2\n字符串插值\n```\n\n如果你想拼接字符串，可以直接将这些字符串字面量相邻放置，而无需使用 `+` 运算符；参见代码清单 3-3。\n\n\
  ```\nvar longString = 'This is a long'\n'long'\n'long'\n'string';\n代码清单 3-3\n字符串拼接\n\
  ```\n\n另一种创建多行字符串的方法是使用三引号，单引号或双引号均可；参见代码清单 3-4。\n\n```\nvar longString2 = '''\n\
  This is also a long\nlong\nlong\nstring\n''';\n代码清单 3-4\n多行字符串\n```\n\n#### 布尔值\n\
  \n布尔值使用 `bool` 类型表示。`bool` 类型只有两个对象：`true` 和 `false`。值得注意的是，只有 `bool` 值才能用作 `if`、`while`\
  \ 和 `assert` 中的检查条件。JavaScript 有更宽泛的真值（truthy）和假值（falsy）概念，而 Dart 遵循更严格的规则。例如，`if\
  \ ('abc')` 在 JavaScript 中是有效的，但在 Dart 中则不行。\n\n在代码清单 3-5 中，`name` 是一个空字符串。要在 `if`\
  \ 中使用它，我们需要调用 getter `isEmpty`。同时，我们需要显式检查 `null` 和 `0`。\n\n```\nvar name = '';\n\
  if (name.isEmpty) {\n  print('name is empty');\n}\nvar value;\nassert(value == null);\n\
  var count = 5;\nwhile(count-- != 0) {\n  print(count);\n}\n代码清单 3-5\n布尔值\n```\n\n\
  #### 列表和映射\n\n列表和映射是常用的集合类型。在 Dart 中，数组是 `List` 对象。列表和映射可以使用字面量或构造函数创建。建议尽可能使用集合字面量。代码清单\
  \ 3-6 展示了如何使用字面量和构造函数创建列表和映射。\n\n```\nvar list1 = [1, 2, 3];\nvar list2 = List(3);\n\
  var map1 = {'a': 'A', 'b': 'B'};\nvar map2 = Map();\n代码清单 3-6\n列表和映射\n```\n\n####\
