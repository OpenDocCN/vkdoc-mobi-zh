  ## 10.7 使用 Redux 管理状态\n\n### 问题\n\n你想使用 Redux 作为状态管理方案。\n\n### 解决方案\n\n使用`redux`和`flux_redux`包。\n\
  \n\n\n### 讨论\n\nRedux（[`https://redux.js.org/`](https://redux.js.org/)）是一个用于管理应用程序状态的流行库。Redux\
  \ 起源于 React，但已被移植到不同语言。`redux` 包是 Redux 的 Dart 实现。`flutter_redux` 包允许在构建 Flutter\
  \ 小部件时使用 Redux 存储。如果您之前使用过 Redux，那么 Flutter 中使用的概念相同。\n\nRedux 使用一个全局对象作为状态。这个对象是应用程序的唯一数据源，被称为\
  \ store。动作被派发到 store 以更新状态。Reducer 函数接受当前状态和一个动作作为参数，并返回下一个状态。下一个状态成为 reducer 函数下一次运行的输入。UI\
  \ 小部件可以从 store 中选择部分数据来构建内容。\n\n要使用 `flutter_redux` 包，您需要将 `flutter_redux: ⁰.5.3`\
  \ 添加到 `pubspec.yaml` 文件的 `dependencies` 中。我们将使用相同的 GitHub 职位列表示例来演示 Redux 在 Flutter\
  \ 中的用法。\n\n让我们从状态开始。清单 10-21 中的 `JobsState` 类表示全局状态。该状态有三个属性：`loading` 表示数据是否仍在加载，`error`\
  \ 表示加载数据时是否发生错误，`data` 表示数据列表。通过使用 `copyWith()` 方法，我们可以通过更新某些属性来创建新的 `JobsState`\
  \ 对象。\n\n```\nclass JobsState extends Equatable {\nJobsState({bool loading, bool\
  \ error, List data})\n: _loading = loading,\n_error = error,\n_data = data,\nsuper([loading,\
  \ error, data]);\nfinal bool _loading;\nfinal bool _error;\nfinal List _data;\n\
  bool get loading => _loading ?? false;\nbool get error => _error ?? false;\nList\
  \ get data => _data ?? [];\nbool get empty => _loading == null && _error == null\
  \ && _data == null;\nJobsState copyWith({bool loading, bool error, List data}) {\n\
  return JobsState(\nloading: loading ?? this._loading,\nerror: error ?? this._error,\n\
  data: data ?? this._data,\n);\n}\n}\nListing 10-21\n用于 Redux 的 JobsState\n```\n\n\
  清单 10-22 展示了这些动作。这些动作会触发状态变化。\n\n```\nabstract class JobsAction extends Equatable\
  \ {\nJobsAction([List props = const []]) : super(props);\n}\nclass LoadJobAction\
  \ extends JobsAction {\nLoadJobAction({@required this.keyword})\n: assert(keyword\
  \ != null),\nsuper([keyword]);\nfinal String keyword;\n}\nclass JobLoadedAction\
  \ extends JobsAction {\nJobLoadedAction({@required this.jobs})\n: assert(jobs !=\
  \ null),\nsuper([jobs]);\nfinal List jobs;\n}\nclass JobLoadErrorAction extends\
  \ JobsAction {}\nListing 10-22\n用于 Redux 的动作\n```\n\n清单 10-23 展示了根据动作更新状态的 reducer\
  \ 函数。\n\n```\nJobsState jobsReducers(JobsState state, dynamic action) {\nif (action\
  \ is LoadJobAction) {\nreturn state.copyWith(loading: true);\n} else if (action\
  \ is JobLoadErrorAction) {\nreturn state.copyWith(loading: false, error: true);\n\
  } else if (action is JobLoadedAction) {\nreturn state.copyWith(loading: false, data:\
  \ action.jobs);\n}\nreturn state;\n}\nListing 10-23\n用于 Redux 的 Reducer 函数\n```\n\
  \n清单 10-22 中定义的动作只能用于同步操作。例如，如果您想要派发 `JobLoadedAction`，您需要先准备好 `List<Job>` 对象。然而，加载职位数据的操作是异步的。您需要使用\
  \ thunk 函数作为 Redux store 的中间件。thunk 函数将 store 作为唯一参数。它使用 store 来派发动作。thunk 动作可以像其他普通动作一样被派发到\
  \ store。\n\n清单 10-24 中的 `getJobs()` 函数接受一个 `GitHubJobsClient` 对象和一个搜索关键词作为参数。该函数返回一个类型为\
  \ `ThunkAction<JobsState>` 的 thunk 函数。`ThunkAction` 来自 `redux_thunk` 包。在 thunk 函数中，首先派发一个\
  \ `LoadJobAction`。然后使用 `GitHubJobsClient` 对象获取职位数据。根据数据加载的结果，派发 `JobLoadedAction`\
  \ 或 `JobLoadErrorAction`。\n\n```\nThunkAction getJobs(GitHubJobsClient jobsClient,\
  \ String keyword) {\nreturn (Store store) async {\nstore.dispatch(LoadJobAction(keyword:\
  \ keyword));\ntry {\nList jobs = await jobsClient.getJobs(keyword);\nstore.dispatch(JobLoadedAction(jobs:\
  \ jobs));\n} catch (e) {\nstore.dispatch(JobLoadErrorAction());\n}\n};\n}\nListing\
  \ 10-24\n用于 Redux 的 Thunk 函数\n```\n\n现在我们可以使用 Redux store 来构建小部件。您可以使用两个辅助小部件来访问\
  \ store 中的数据。在清单 10-25 中，`StoreBuilder` 小部件用于直接访问 store。store 作为构建函数的第二个参数可用。`StoreBuilder`\
  \ 小部件通常用于需要派发动作的情况。`StoreConnector` 小部件允许使用转换器函数先转换状态。当搜索图标被按下时，首先调用清单 10-24 中的\
  \ `getJobs()` 函数来创建 thunk 函数，然后将 thunk 函数派发到 store。当使用 `StoreConnector` 小部件时，转换器函数简单地从\
  \ store 获取当前状态。然后状态对象在构建函数中使用。\n\n```\nclass GitHubJobs extends StatefulWidget {\n\
  GitHubJobs({\nKey key,\n@required this.store,\n@required this.jobsClient,\n})  :\
  \ assert(store != null),\nassert(jobsClient != null),\nsuper(key: key);\nfinal Store\
  \ store;\nfinal GitHubJobsClient jobsClient;\n@override\n_GitHubJobsState createState()\
  \ => _GitHubJobsState();\n}\nclass _GitHubJobsState extends State {\n@override\n\
  Widget build(BuildContext context) {\nreturn StoreProvider(\nstore: widget.store,\n\
  child: Column(\nchildren: [\nPadding(\npadding: const EdgeInsets.all(8.0),\nchild:\
  \ KeywordInput(\njobsClient: widget.jobsClient,\n),\n),\nExpanded(\nchild: JobsView(),\n\
  ),\n],\n),\n);\n}\n}\nclass KeywordInput extends StatefulWidget {\nKeywordInput({this.jobsClient});\n\
  final GitHubJobsClient jobsClient;\n@override\n_KeywordInputState createState()\
  \ => _KeywordInputState();\n}\nclass _KeywordInputState extends State {\nfinal GlobalKey>\
  \ _keywordFormKey = GlobalKey();\n@override\nWidget build(BuildContext context)\
  \ {\nreturn Row(\nchildren: [\nExpanded(\nchild: TextFormField(\nkey: _keywordFormKey,\n\
  ),\n),\nStoreBuilder(\nbuilder: (BuildContext context, Store store) {\nreturn IconButton(\n\
  icon: Icon(Icons.search),\nonPressed: () {\nString keyword = _keywordFormKey.currentState?.value\
  \ ?? \";\nif (keyword.isNotEmpty) {\nstore.dispatch(getJobs(widget.jobsClient, keyword));\n\
  }\n},\n);\n},\n),\n],\n);\n}\n}\nclass JobsView extends StatelessWidget {\n@override\n\
  Widget build(BuildContext context) {\nreturn StoreConnector(\nconverter: (Store\
  \ store) => store.state,\nbuilder: (BuildContext context, JobsState state) {\nif\
  \ (state.empty) {\nreturn Center(\nchild: Text('输入关键词并搜索'),\n);\n} else if (state.loading)\
  \ {\nreturn Center(\nchild: CircularProgressIndicator(),\n);\n} else if (state.error)\
  \ {\nreturn Center(\nchild: Text(\n'获取职位失败',\nstyle: TextStyle(color: Colors.red),\n\
  ),\n);\n} else {\nreturn JobsList(state.data);\n}\n},\n);\n}\n}\nListing 10-25\n\
  使用 Redux store 的 GitHub 职位小部件\n```\n\n最后一步是创建 store。清单 10-26 中的 store 是使用 reducer\
  \ 函数、初始状态和来自 `redux_thunk` 包的 thunk 中间件创建的。\n\n```\nfinal store = new Store(\njobsReducers,\n\
  initialState: JobsState(),\nmiddleware: [thunkMiddleware],\n);\nListing 10-26\n\
  创建 store\n```\n\n## 10.8 使用 Mobx 管理状态\n\n### 问题\n\n您想要使用 Mobx 来管理状态。\n\n### 解决方案\n\
  \n使用 `mobx` 和 `flutter_mobx` 包。\n\n\n\n### 讨论\n\nMobx（[`https://mobx.js.org`](https://mobx.js.org)）是一个将响应式数据与\
  \ UI 连接起来的状态管理库。MobX 源于使用 JavaScript 开发 Web 应用，同时也被移植到了 Dart 平台（[`https://mobx.pub`](https://mobx.pub)\
  \ ）。在 Flutter 应用中，我们可以使用 `mobx` 和 `flutter_mobx` 这两个包来构建基于 Mobx 的应用。Flutter 的 Mobx\
  \ 使用 `build_runner` 包来为 store 生成代码。`build_runner` 和 `mobx_codegen` 这两个包需要作为 `dev_dependencies`\
  \ 添加到 `pubspec.yaml` 文件中。\n\nMobx 使用可观察对象（observables）来管理状态。应用的整体状态由核心状态和派生状态两部分组成。派生状态是从核心状态计算得出的。动作（Actions）通过改变可观察对象来更新状态。反应（Reactions）是状态的观察者，当它们追踪的任何可观察对象发生变化时，便会收到通知。在\
  \ Flutter 应用中，反应被用来更新 widget。\n\n与 Flutter 的 Redux 相比，Mobx 使用代码生成来简化 store 的使用。你无需编写样板代码来创建动作。Mobx\
  \ 提供了多种注解，你只需使用这些注解来标记代码即可。这与 `json_annotation` 和 `json_serialize` 包的工作方式类似。我们将使用同样的示例（展示\
  \ GitHub 上的职位列表）来演示 Mobx 的用法。如果你的 `pubspec.yaml` 文件中还没有这个包，请将其添加进去。\n\n代码清单 10-27\
  \ 展示了用于 Mobx store 的 `jobs_store.dart` 文件的基本代码。该文件使用了生成的 part 文件 `jobs_store.g.dart`。`_JobsStore`\
  \ 是职位 store 的抽象类，它实现了 Mobx 中的 `Store` 类。这里我们使用 `@observable` 注解定义了两个可观察对象。第一个可观察对象\
  \ `keyword` 是一个简单的字符串，用于管理当前的搜索关键字。`getJobsFuture` 可观察对象是一个 `ObservableFuture<List<Job>>`\
  \ 类型的对象，用于管理通过 API 获取职位的异步操作。那些使用 `@computed` 注解标记的属性是派生可观察对象，用于检查数据加载的状态。我们还使用\
  \ `@action` 注解定义了两个动作。`setKeyword()` 动作将 `getJobsFuture` 可观察对象设置为空状态，并将 `keyword`\
  \ 可观察对象设置为提供的值。`getJobs()` 动作使用 `GitHubJobsClient.getJobs()` 方法来加载数据。`getJobsFuture`\
  \ 可观察对象会被更新为一个包装了返回的 future 的 `ObservableFuture` 对象。\n\n```\nimport 'package:meta/meta.dart';\n\
  import 'package:mobx/mobx.dart';\npart 'jobs_store.g.dart';\nclass JobsStore = _JobsStore\
  \ with _$JobsStore;\nabstract class _JobsStore implements Store {\n_JobsStore({@required\
  \ this.jobsClient}) : assert(jobsClient != null);\nfinal GitHubJobsClient jobsClient;\n\
  @observable\nString keyword = \"\";\n@observable\nObservableFuture<List<Job>> getJobsFuture\
  \ = emptyResponse;\n@computed\nbool get empty => getJobsFuture == emptyResponse;\n\
  @computed\nbool get hasResults =>\ngetJobsFuture != emptyResponse &&\ngetJobsFuture.status\
  \ == FutureStatus.fulfilled;\n@computed\nbool get loading =>\ngetJobsFuture != emptyResponse\
  \ &&\ngetJobsFuture.status == FutureStatus.pending;\n@computed\nbool get hasError\
  \ =>\ngetJobsFuture != emptyResponse &&\ngetJobsFuture.status == FutureStatus.rejected;\n\
  static ObservableFuture<List<Job>> emptyResponse = ObservableFuture.value([]);\n\
  List<Job> jobs = [];\n@action\nFuture<List<Job>> getJobs() async {\njobs = [];\n\
  final future = jobsClient.getJobs(keyword);\ngetJobsFuture = ObservableFuture(future);\n\
  return jobs = await future;\n}\n@action\nvoid setKeyword(String keyword) {\ngetJobsFuture\
  \ = emptyResponse;\nthis.keyword = keyword;\n}\n}\n代码清单 10-27\nMobx store\n```\n\
  \n需要运行 `flutter packages pub run build_runner build` 命令来生成代码。`JobsStore` 类就是我们要使用的\
  \ store。代码清单 10-28 展示了使用该 store 的 widget。在搜索按钮的 `onPressed` 回调中，首先调用 `setKeyword()`\
  \ 方法来更新关键字，然后调用 `getJobs()` 方法来触发数据加载。`Observer` widget 使用一个构建函数，通过 `JobsStore`\
  \ 对象中的计算可观察对象和字段来构建 UI。每当这些可观察对象发生变化时，`Observer` widget 就会重新构建以更新 UI。\n\n```\nclass\
  \ GitHubJobs extends StatefulWidget {\nGitHubJobs({Key key, @required this.jobsStore})\n\
  : assert(jobsStore != null),\nsuper(key: key);\nfinal JobsStore jobsStore;\n@override\n\
  _GitHubJobsState createState() => _GitHubJobsState();\n}\nclass _GitHubJobsState\
  \ extends State<GitHubJobs> {\n@override\nWidget build(BuildContext context) {\n\
  JobsStore jobsStore = widget.jobsStore;\nreturn Column(\nchildren: [\nPadding(\n\
  padding: const EdgeInsets.all(8.0),\nchild: KeywordInput(\njobsStore: jobsStore,\n\
  ),\n),\nExpanded(\nchild: JobsView(\njobsStore: jobsStore,\n),\n),\n],\n);\n}\n\
  }\nclass KeywordInput extends StatefulWidget {\nKeywordInput({this.jobsStore});\n\
  final JobsStore jobsStore;\n@override\n_KeywordInputState createState() => _KeywordInputState();\n\
  }\nclass _KeywordInputState extends State<KeywordInput> {\nfinal GlobalKey<FormFieldState<String>>\
  \ _keywordFormKey = GlobalKey();\n@override\nWidget build(BuildContext context)\
  \ {\nreturn Row(\nchildren: [\nExpanded(\nchild: TextFormField(\nkey: _keywordFormKey,\n\
  ),\n),\nIconButton(\nicon: Icon(Icons.search),\nonPressed: () {\nString keyword\
  \ = _keywordFormKey.currentState?.value ?? \" \";\nif (keyword.isNotEmpty) {\nwidget.jobsStore.setKeyword(keyword);\n\
  widget.jobsStore.getJobs();\n}\n},\n),\n],\n);\n}\n}\nclass JobsView extends StatelessWidget\
  \ {\nJobsView({this.jobsStore});\nfinal JobsStore jobsStore;\n@override\nWidget\
  \ build(BuildContext context) {\nreturn Observer(\nbuilder: (BuildContext context)\
  \ {\nif (jobsStore.empty) {\nreturn Center(\nchild: Text('请输入关键字搜索'),\n);\n} else\
  \ if (jobsStore.loading) {\nreturn Center(\nchild: CircularProgressIndicator(),\n\
  );\n} else if (jobsStore.hasError) {\nreturn Center(\nchild: Text(\n'获取职位失败',\n\
  style: TextStyle(color: Colors.red),\n),\n);\n} else {\nreturn JobsList(jobsStore.jobs);\n\
  }\n},\n);\n}\n}\n代码清单 10-28\n使用 Mobx store 的 GitHub 职位 widget\n```\n\n## 10.9 总结\n\
  \n本章讨论了适用于 Flutter 应用的不同状态管理方案。在这些方案中，`StatefulWidget`、`InheritedWidget`、`InheritedModel`\
  \ 和 `InheritedNotifier` 是 Flutter 框架提供的。Scoped model、Bloc、Redux 和 Mobx 库则是第三方的解决方案。你可以自由选择最适合你需求的方案。在下一章中，我们将讨论\
  \ Flutter 中的动画。\n\n"
- "# 11. 动画\n\n动画在移动应用中扮演着重要角色，可以为最终用户提供视觉反馈。本章涵盖了与 Flutter 动画相关的实践。\n\n## 11.1 创建简单动画\n\
  \n### 问题\n\n你想要创建简单的动画。\n\n### 解决方案\n\n使用 `AnimationController` 类来创建简单的动画。\n\n\n\
  \n### 讨论\n\nFlutter 中的动画具有值和状态。动画的值可能会随时间变化。动画使用抽象的 `Animation<T>` 类来表示。 `Animation`\
  \ 类继承自 `Listenable` 类。你可以向 `Animation` 对象添加监听器，以在值或状态发生变化时收到通知。\n\n`AnimationController`\
  \ 类是 `Animation<double>` 类的子类。 `AnimationController` 类提供对其创建的动画的控制。要创建 `AnimationController`\
  \ 对象，你可以提供下限、上限和持续时间。 `AnimationController` 对象的值会在持续时间内从下限变化到上限。此外还需要一个 `TickerProvider`\
  \ 对象。对于有状态 widget，你可以使用 `TickerProviderStateMixin` 或 `SingleTickerProviderStateMixin`\
  \ 类作为状态类的 mixin。如果状态只使用一个 `AnimationController` 对象，则使用 `SingleTickerProviderStateMixin`\
  \ 效率更高。\n\n代码清单 11-1 展示了一个在有状态 widget 中使用 `AnimationController` 来实现图片尺寸动画的示例。 `AnimationController`\
  \ 对象在 `initState()` 方法体中创建，并在 `dispose()` 方法中释放。这是使用 `AnimationController` 的典型模式。\
  \ `_GrowingImageState` 类混入了 `SingleTickerProviderStateMixin`，因此 `AnimationController`\
  \ 构造函数将该对象用作 `vsync` 参数。在 `AnimationController` 对象的监听器中，调用 `setState()` 方法来触发 widget\
  \ 的重建。 `forward()` 方法以正向启动动画运行。在 `build()` 方法中，使用 `AnimationController` 对象的当前值来控制\
  \ `SizedBox` widget 的尺寸。在运行时，`SizedBox` widget 的尺寸在 10 秒内从 `0` 增长到 `400`。\n\n```\n\
  class GrowingImage extends StatefulWidget {\n@override\n_GrowingImageState createState()\
  \ => _GrowingImageState();\n}\nclass _GrowingImageState extends State\nwith SingleTickerProviderStateMixin\
  \ {\nAnimationController controller;\n@override\nvoid initState() {\nsuper.initState();\n\
  controller = AnimationController(\nlowerBound: 0,\nupperBound: 400,\nduration: const\
  \ Duration(seconds: 10),\nvsync: this,\n)\n..addListener(() {\nsetState(() {});\n\
  })\n..forward();\n}\n@override\nWidget build(BuildContext context) {\nreturn SizedBox(\n\
  width: controller.value,\nheight: controller.value,\nchild: Image.network('https://picsum.photos/400'),\n\
  );\n}\n@override\nvoid dispose() {\ncontroller.dispose();\nsuper.dispose();\n}\n\
  }\n代码清单 11-1\n使用 AnimationController\n```\n\n表 11-1 展示了控制动画进度的 `AnimationController`\
  \ 方法。\n\n**表 11-1** 控制动画的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `forward()` | 以正向启动动画运行。\
  \ |\n| `reverse()` | 以反向启动动画运行。 |\n| `stop()` | 停止动画运行。 |\n| `repeat()` | 启动动画运行，并在完成后重新开始。\
  \ |\n| `reset()` | 将值设置为下限并停止动画。 |\n\n动画可能处于不同的状态。`AnimationStatus` 枚举表示动画的不同状态。表\
  \ 11-2 展示了该枚举的所有值。你可以使用 `addStatusListener()` 方法添加监听器，以便在状态改变时收到通知。\n\n**表 11-2**\
  \ `AnimationStatus` 的值\n\n| 名称 | 描述 |\n| --- | --- |\n| `forward` | 动画正在正向运行。 |\n\
  | `reverse` | 动画正在反向运行。 |\n| `dismissed` | 动画在开始处停止。 |\n| `completed` | 动画在结束处停止。\
  \ |\n\n在代码清单 11-2 中，为 `AnimationController` 对象添加了一个状态监听器。当动画处于 `completed` 状态时，它会以反向开始运行。\n\
  \n```\nvar controller = AnimationController(\nlowerBound: 0,\nupperBound: 300,\n\
  duration: const Duration(seconds: 10),\nvsync: this,\n)\n..addListener(() {\nsetState(()\
  \ {});\n})\n..addStatusListener((AnimationStatus status) {\nif (status == AnimationStatus.completed)\
  \ {\ncontroller.reverse();\n}\n})\n..forward();\n代码清单 11-2\n状态监听器\n```\n\n代码清单 11-1\
  \ 展示了在有状态 widget 中使用动画的典型模式。`AnimatedWidget` widget 使得动画的使用更加简单。 `AnimatedWidget`\
  \ 构造函数需要一个 `Listenable` 对象。每当 `Listenable` 对象发出一个值时，widget 会自动重建。代码清单 11-3 展示了一个使用\
  \ `AnimatedWidget` 的示例。虽然 `AnimatedWidget` 类通常与 `Animation` 对象一起使用，但你仍然可以将其与任何 `Listenable`\
  \ 对象一起使用。\n\n```\nclass AnimatedImage extends AnimatedWidget {\nAnimatedImage({Key\
  \ key, this.animation})\n: super(key: key, listenable: animation);\nfinal Animation\
  \ animation;\n@override\nWidget build(BuildContext context) {\nreturn SizedBox(\n\
  width: animation.value,\nheight: animation.value,\nchild: Image.network('https://picsum.photos/300'),\n\
  );\n}\n}\n代码清单 11-3\nAnimatedWidget 示例\n```\n\n## 11.2 使用线性插值创建动画\n\n### 问题\n\n\
  你想使用线性插值为其他数据类型创建动画。\n\n### 解决方案\n\n使用 `Tween` 类及其子类。\n\n### 讨论\n\n`AnimationController`\
  \ 类使用 `double` 作为其值类型。`double` 值对于尺寸或位置的动画非常有用。你可能还需要对其他类型的数据进行动画处理。例如，你可以将背景颜色从红色动画变化到绿色。对于这些场景，你可以使用\
  \ `Tween` 类及其子类。\n\n`Tween` 类表示起始值和结束值之间的线性插值。要创建 `Tween` 对象，你需要提供这两个值。`Tween` 对象可以为动画提供所需的值。通过将\
  \ `animate()` 方法与另一个 `Animation` 对象结合使用，你可以创建一个新的 `Animation` 对象，该对象由提供的 `Animation`\
  \ 对象驱动，但使用来自 `Tween` 对象的值。`Tween` 的子类需要实现 `lerp()` 方法，该方法接收一个动画值并返回插值后的值。\n\n在代码清单\
  \ 11-4 中，`AnimatedColor` widget 使用 `Animation<Color>` 对象来更新背景颜色。`ColorTween` 对象使用起始值\
  \ `Colors.red` 和结束值 `Colors.green` 创建。\n\n```\nclass AnimatedColorTween extends\
  \ StatefulWidget {\n@override\n_AnimatedColorTweenState createState() => _AnimatedColorTweenState();\n\
  }\nclass _AnimatedColorTweenState extends State\nwith SingleTickerProviderStateMixin\
  \ {\nAnimationController controller;\nAnimation animation;\n@override\nvoid initState()\
  \ {\nsuper.initState();\ncontroller = AnimationController(\nduration: const Duration(seconds:\
  \ 10),\nvsync: this,\n);\nanimation =\nColorTween(begin: Colors.red, end: Colors.green).animate(controller);\n\
  controller.forward();\n}\n@override\nWidget build(BuildContext context) {\nreturn\
  \ AnimatedColor(\nanimation: animation,\n);\n}\n@override\nvoid dispose() {\ncontroller.dispose();\n\
  super.dispose();\n}\n}\nclass AnimatedColor extends AnimatedWidget {\nAnimatedColor({Key\
  \ key, this.animation})\n: super(key: key, listenable: animation);\nfinal Animation\
  \ animation;\n@override\nWidget build(BuildContext context) {\nreturn Container(\n\
  width: 300,\nheight: 300,\ndecoration: BoxDecoration(color: animation.value),\n\
  );\n}\n}\n代码清单 11-4\nColorTween 示例\n```\n\n还有许多其他针对不同对象的 `Tween` 子类，包括 `AlignmentTween`、`BorderTween`、`BoxConstraintsTween`、`DecorationTween`、`EdgeInsetsTween`、`SizeTween`、`TextStyleTween`\
  \ 等等。\n\n## 11.3 创建曲线动画\n\n### 问题\n\n你想创建曲线动画。\n\n### 解决方案\n\n使用 `CurvedAnimation`\
  \ 或 `CurveTween` 类。\n\n\n\n### Discussion\n\n除了线性动画，你还可以创建使用曲线来调整变化速率的曲线动画。曲线是单位区间到另一个单位区间的映射。`Curve`类及其子类是内置的曲线类型。`Curve`类的`transform()`方法返回给定点在曲线上的映射值。曲线必须将输入`0.0`映射到`0.0`，`1.0`映射到`1.0`。表\
  \ 11-3 展示了不同类型的曲线。\n\n**表 11-3** 不同类型的曲线\n\n| 名称 | 描述 |\n| --- | --- |\n| `Cubic`\
  \ | 由两个控制点定义的立方曲线。通过四个`double`值（这两个点的 x 和 y 坐标）创建。 |\n| `ElasticInCurve` | 在超出边界时幅度增长的振荡曲线。通过振荡持续时间创建。\
  \ |\n| `ElasticOutCurve` | 在超出边界时幅度缩小的振荡曲线。通过振荡持续时间创建。 |\n| `ElasticInOutCurve`\
  \ | 在超出边界时幅度先增长后缩小的振荡曲线。通过振荡持续时间创建。 |\n| `Interval` | 使用`begin`、`end`和一个`curve`创建。其值在`begin`之前为`0.0`，在`end`之后为`1.0`。`begin`和`end`之间的值由曲线定义。\
  \ |\n| `SawTooth` | 重复指定次数的锯齿曲线。 |\n| `Threshold` | 直到阈值时值为`0.0`，然后跳变到`1.0`的曲线。\
  \ |\n\n你可以使用表 11-3 中`Curve`子类的构造函数来创建新曲线，或者使用`Curves`类中的常量。`Curves`类中的常量在大多数情况下已经足够使用。对于一个`Curve`对象，你可以使用其`flipped`属性来获取当前曲线的反转曲线。\n\
  \n使用`Curve`对象，你可以通过`CurvedAnimation`类创建曲线动画。表 11-4 展示了`CurvedAnimation`构造函数的参数。如果`reverseCurve`参数为`null`，则在两个方向都使用指定的曲线。\n\
  \n**表 11-4** `CurvedAnimation`的参数\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `parent`\
  \ | `Animation<double>` | 要应用曲线的动画。 |\n| `curve` | `Curve` | 在正向方向使用的曲线。 |\n| `reverseCurve`\
  \ | `Curve` | 在反向方向使用的曲线。 |\n\n在清单 11-5 中，`AnimatedBox`组件使用动画值来确定盒子的左侧位置。`CurvedAnimation`对象通过`Curves.easeInOut`曲线创建。\n\
  \n```\nclass CurvedPosition extends StatefulWidget {\n  @override\n  _CurvedPositionState\
  \ createState() => _CurvedPositionState();\n}\n\nclass _CurvedPositionState extends\
  \ State<CurvedPosition>\n    with SingleTickerProviderStateMixin {\n  AnimationController\
  \ controller;\n  Animation<double> animation;\n\n  @override\n  void initState()\
  \ {\n    super.initState();\n    controller = AnimationController(\n      duration:\
  \ const Duration(seconds: 5),\n      vsync: this,\n    )..forward();\n    animation\
  \ = CurvedAnimation(parent: controller, curve: Curves.easeInOut);\n  }\n\n  @override\n\
  \  Widget build(BuildContext context) {\n    return AnimatedBox(\n      animation:\
  \ animation,\n    );\n  }\n\n  @override\n  void dispose() {\n    controller.dispose();\n\
  \    super.dispose();\n  }\n}\n\nclass AnimatedBox extends AnimatedWidget {\n  AnimatedBox({Key\
  \ key, this.animation})\n      : super(key: key, listenable: animation);\n  final\
  \ Animation<double> animation;\n  final double _width = 400;\n\n  @override\n  Widget\
  \ build(BuildContext context) {\n    return Container(\n      width: _width,\n \
  \     height: 20,\n      child: Stack(\n        children: [\n          Positioned(\n\
  \            left: animation.value * _width,\n            bottom: 0,\n         \
  \   child: Container(\n              width: 10,\n              height: 10,\n   \
  \           decoration: BoxDecoration(color: Colors.red),\n            ),\n    \
  \      )\n        ],\n      ),\n    );\n  }\n}\n```\n\n**清单 11-5** `CurvedAnimation`\n\
  \n`CurveTween`类使用`Curve`对象来转换动画的值。当你需要将曲线动画与另一个`Tween`对象链式组合时，可以使用`CurveTween`对象。\n\
  \n## 11.4 链式组合补间动画\n\n### 问题\n\n你想要链式组合多个补间动画。\n\n### 解决方案\n\n使用`Animatable`类的`chain()`方法或`Animation`类的`drive()`方法。\n\
  \n### 讨论\n\n`Animatable`是`Tween`、`CurveTween`和`TweenSequence`类的超类。给定一个`Animatable`对象，你可以使用`chain()`方法并将另一个`Animatable`对象作为父级。对于给定的输入值，首先计算父级`Animatable`对象，然后将结果作为当前`Animatable`对象的输入。你可以使用多个`chain()`方法来创建复杂的动画。\n\
  \n在清单 11-6 中，`Tween`对象与另一个`CurveTween`对象进行了链式组合。\n\n```\nvar animation = Tween<double>(begin:\
  \ 0.0, end: 300.0)\n    .chain(CurveTween(curve: Curves.easeOut))\n    .animate(controller);\n\
  ```\n\n**清单 11-6** 链式组合补间动画\n\n你也可以使用`Animation`类的`drive()`方法来链式组织一个`Animatable`对象。\n\
  \n## 11.5 创建补间动画序列\n\n### 问题\n\n你想要为不同阶段创建一个补间动画序列。\n\n### 解决方案\n\n使用`TweenSequence`类。\n\
  \n### 讨论\n\n通过使用`TweenSequence`类，你可以为动画的不同阶段使用不同的`Animatable`对象。一个`TweenSequence`对象由一组`TweenSequenceItem`对象列表定义。每个`TweenSequenceItem`对象包含一个`Animatable`对象和一个权重。权重定义了这个`TweenSequenceItem`对象在其父级`TweenSequence`对象的整个持续时间中所占的相对百分比。\n\
  \n在清单 11-7 中，动画由 40%的线性补间和 60%的曲线补间组成。\n\n```\nvar animation = TweenSequence([\n\
  \  TweenSequenceItem(\n    tween: Tween<double>(begin: 0.0, end: 100.0),\n    weight:\
  \ 40,\n  ),\n  TweenSequenceItem(\n    tween: Tween<double>(begin: 100.0, end: 300.0)\n\
  \        .chain(CurveTween(curve: Curves.easeInOut)),\n    weight: 60,\n  )\n]).animate(controller);\n\
  ```\n\n**清单 11-7** `TweenSequence`示例\n\n## 11.6 运行同步动画\n\n### 问题\n\n你想要在`AnimatedWidget`中运行多个同步动画。\n\
  \n### 解决方案\n\n使用`Animatable`类的`evaluate()`方法。\n\n### 讨论\n\n`AnimatedWidget`的构造函数只支持单个`Animation`对象。如果你想在`AnimatedWidget`对象中使用多个动画，你需要在`AnimatedWidget`对象中创建多个`Tween`对象，并使用`evaluate()`方法来获取对应`Animation`对象的值。\n\
  \n在清单 11-8 中，`_leftTween`和`_bottomTween`对象分别决定了盒子的左侧和底部位置属性。\n\n```\nclass AnimatedBox\
  \ extends AnimatedWidget {\n  AnimatedBox({Key key, this.animation})\n      : super(key:\
  \ key, listenable: animation);\n  final Animation<double> animation;\n  final double\
  \ _width = 400;\n  final double _height = 300;\n  static final _leftTween = Tween<double>(begin:\
  \ 0, end: 1.0);\n  static final _bottomTween = CurveTween(curve: Curves.ease);\n\
  \n  @override\n  Widget build(BuildContext context) {\n    return Container(\n \
  \     width: _width,\n      height: _height,\n      margin: EdgeInsets.all(10),\n\
  \      decoration: BoxDecoration(border: Border.all()),\n      child: Stack(\n \
  \       children: [\n          Positioned(\n            left: _leftTween.evaluate(animation)\
  \ * _width,\n            bottom: _bottomTween.evaluate(animation) * _height,\n \
  \           child: Container(\n              width: 10,\n              height: 10,\n\
  \              decoration: BoxDecoration(color: Colors.red),\n            ),\n \
  \         )\n        ],\n      ),\n    );\n  }\n}\n```\n\n**清单 11-8** 同步动画\n\n##\
  \ 11.7 创建交错动画\n\n### 问题\n\n你想要创建顺序执行或重叠的动画。\n\n### 解决方案\n\n使用`Interval`类。\n\n\n\n\
  ### 讨论\n\n通过`TweenSequence`类，你可以创建一个由多个补间动画组成的序列。然而，在`TweenSequence`对象中指定的补间动画不能重叠。为了创建重叠的动画，你可以使用`Interval`曲线来指定动画的开始和结束时间。\n\
  \n在代码清单 11-9 中，三个`Tween`对象根据`Interval`对象指定的不同时间间隔进行动画。这些`Tween`对象都由同一个`Animation`对象控制。\n\
  \n```dart\nclass AnimatedContainer extends StatelessWidget {\nAnimatedContainer({Key\
  \ key, this.animation})\n: width = Tween(begin: 0.0, end: 300.0).animate(CurvedAnimation(\n\
  parent: animation,\ncurve: Interval(0.0, 0.5, curve: Curves.easeInOut))),\nheight\
  \ = Tween(begin: 0.0, end: 200.0).animate(CurvedAnimation(\nparent: animation,\n\
  curve: Interval(0.2, 0.7, curve: Curves.bounceInOut))),\nbackgroundColor = ColorTween(begin:\
  \ Colors.red, end: Colors.green)\n.animate(CurvedAnimation(\nparent: animation,\n\
  curve: Interval(0.3, 1.0, curve: Curves.elasticInOut))),\nsuper(key: key);\nfinal\
  \ Animation animation;\nfinal Animation width;\nfinal Animation height;\nfinal Animation\
  \ backgroundColor;\nWidget _build(BuildContext context, Widget child) {\nreturn\
  \ Container(\nwidth: width.value,\nheight: height.value,\ndecoration: BoxDecoration(color:\
  \ backgroundColor.value),\nchild: child,\n);\n}\n@override\nWidget build(BuildContext\
  \ context) {\nreturn AnimatedBuilder(\nanimation: animation,\nbuilder: _build,\n\
  );\n}\n}\nListing 11-9\nStaggered animations\n```\n\n## 11.8 创建 Hero 动画\n\n### 问题\n\
  \n你希望让一个元素在两个路由之间实现动画过渡。\n\n### 解决方案\n\n使用`Hero`组件。\n\n### 讨论\n\n当从当前路由切换到新路由时，最好在新路由中包含一些元素来指示导航的上下文。例如，当前路由显示了一个列表项。当用户点击某一项导航到详情路由时，新路由应包含一个组件来显示选中项的简要信息。\n\
  \n`Hero`组件在两个路由之间共享。创建`Hero`组件需要提供一个标签（`tag`）和一个子组件。标签是`Hero`组件的唯一标识符。如果源路由和目标路由都拥有相同标签的`Hero`组件，那么在路由过渡期间，源路由中的`Hero`组件会以动画方式移动到目标路由中的位置。`Hero`组件的标签在同一组件树中必须是唯一的。\n\
  \n在代码清单 11-10 中，`ImageHero`类包装了一个`Hero`组件，该组件在`SizedBox`组件中显示一张图片。标签被设置为图片的 URL。\n\
  \n```dart\nclass ImageHero extends StatelessWidget {\nImageHero({Key key, this.imageUrl,\
  \ this.width, this.height})\n: super(key: key);\nfinal String imageUrl;\nfinal double\
  \ width;\nfinal double height;\n@override\nWidget build(BuildContext context) {\n\
  return SizedBox(\nwidth: width,\nheight: height,\nchild: Hero(\ntag: imageUrl,\n\
  child: Image.network(imageUrl),\n),\n);\n}\n}\nListing 11-10\nHero widget\n```\n\
  \n代码清单 11-11 展示了显示图片列表的当前路由。`ImageHero`组件被包装在`GridTile`组件中。点击图片会通过`ImageView`组件导航到新路由。\n\
  \n```dart\nclass ImagesPage extends StatelessWidget {\n@override\nWidget build(BuildContext\
  \ context) {\nreturn Scaffold(\nappBar: AppBar(\ntitle: Text('Images'),\n),\nbody:\
  \ GridView.count(\ncrossAxisCount: 2,\nchildren: List.generate(8, (int index) {\n\
  String imageUrl = 'https://picsum.photos/300?random&$index';\nreturn GridTile(\n\
  child: InkWell(\nonTap: () {\nNavigator.push(\ncontext,\nMaterialPageRoute(builder:\
  \ (BuildContext context) {\nreturn ImageView(imageUrl: imageUrl);\n}),\n);\n},\n\
  child: ImageHero(\nimageUrl: imageUrl,\nwidth: 300,\nheight: 300,\n),\n),\n);\n\
  }),\n),\n);\n}\n}\nListing 11-11\nCurrent route with ImageHero\n```\n\n代码清单 11-12\
  \ 展示了`ImageView`组件。它也包含一个`ImageHero`组件，其标签与选中的图片相同。这是使动画生效的必要条件。\n\n```dart\nclass\
  \ ImageView extends StatelessWidget {\nImageView({Key key, this.imageUrl}) : super(key:\
  \ key);\nfinal String imageUrl;\n@override\nWidget build(BuildContext context) {\n\
  return Scaffold(\nappBar: AppBar(\ntitle: Text('Image'),\n),\nbody: Row(\nchildren:\
  \ [\nImageHero(\nwidth: 50,\nheight: 50,\nimageUrl: imageUrl,\n),\nExpanded(\nchild:\
  \ Text('Image Detail'),\n),\n],\n),\n);\n}\n}\nListing 11-12\nNew route with ImageHero\n\
  ```\n\n## 11.9 使用通用过渡动画\n\n### 问题\n\n你希望有一种简单的方式来使用不同类型的`Tween`对象进行动画。\n\n### 解决方案\n\
  \n使用不同类型的过渡动画。\n\n### 讨论\n\n通常使用不同类型的`Tween`对象来动画化组件的不同方面。你可以使用`AnimatedWidget`或`AnimatedBuilder`类配合`Tween`对象工作。Flutter\
  \ SDK 提供了几个过渡组件，使得某些动画更易于使用。\n\n`ScaleTransition`组件用于动画化组件的缩放。要创建一个`ScaleTransition`对象，你需要提供一个`Animation<double>`对象作为缩放比例。`alignment`参数指定了缩放坐标原点相对于盒子的对齐方式。代码清单\
  \ 11-13 展示了`ScaleTransition`的一个示例。\n\n```dart\nclass ScaleBox extends StatelessWidget\
  \ {\nScaleBox({Key key, Animation animation})\n: _animation = CurveTween(curve:\
  \ Curves.ease).animate(animation),\nsuper(key: key);\nfinal Animation _animation;\n\
  @override\nWidget build(BuildContext context) {\nreturn ScaleTransition(\nscale:\
  \ _animation,\nalignment: Alignment.centerLeft,\nchild: Container(\nheight: 100,\n\
  decoration: BoxDecoration(color: Colors.red),\n),\n);\n}\n}\nListing 11-13\nExample\
  \ of ScaleTransition\n```\n\n另一个过渡组件的例子是`FadeTransition`组件，它用于动画化透明度。代码清单 11-14\
  \ 展示了`FadeTransition`的一个示例。\n\n```dart\nclass FadeBox extends StatelessWidget {\n\
  FadeBox({Key key, Animation animation})\n: _animation = CurveTween(curve: Curves.ease).animate(animation),\n\
  super(key: key);\nfinal Animation _animation;\n@override\nWidget build(BuildContext\
  \ context) {\nreturn FadeTransition(\nopacity: _animation,\nchild: Container(\n\
  height: 100,\ndecoration: BoxDecoration(color: Colors.red),\n),\n);\n}\n}\nListing\
  \ 11-14\nExample of FadeTransition\n```\n\n## 11.10 创建物理仿真\n\n### 问题\n\n你希望使用物理仿真。\n\
  \n### 解决方案\n\n使用`physics`库中的仿真。\n\n\n\n### 讨论\n\n`animation` 库中的动画分为线性动画和曲线动画。`physics`\
  \ 库提供了物理模拟，包括弹簧、摩擦力和重力。`Simulation` 类是所有模拟的基类。模拟同样随时间变化。对于某个时间点，`x()` 方法返回位置，`dx()`\
  \ 方法返回速度，`isDone()` 方法返回模拟是否结束。给定一个 `Simulation` 对象，可以使用 `AnimationController` 类的\
  \ `animateWith()` 方法来驱动该模拟的动画。\n\n`SpringSimulation` 类表示附着在弹簧上的粒子的模拟。要创建 `SpringSimulation`\
  \ 对象，可以提供表 11-5 中列出的参数。\n\n**表 11-5**  \n`SpringSimulation` 的参数\n\n| 名称 | 类型 | 描述\
  \ |\n| --- | --- | --- |\n| `spring` | `SpringDescription` | 弹簧的描述。 |\n| `start`\
  \ | `double` | 起始距离。 |\n| `end` | `double` | 结束距离。 |\n| `velocity` | `double` |\
  \ 初始速度。 |\n| `tolerance` | `Tolerance` | 距离、持续时间和速度被视为相等的差异大小。 |\n\n要创建 `SpringDescription`\
  \ 对象，可以使用 `SpringDescription()` 构造函数，并传入参数来指定质量、刚度和阻尼系数。`SpringDescription.withDampingRatio()`\
  \ 构造函数使用阻尼比代替阻尼系数。清单 11-15 展示了一个创建 `SpringSimulation` 对象的示例。\n\n```\nSpringSimulation\
  \ _springSimulation = SpringSimulation(\nSpringDescription.withDampingRatio(\nmass:\
  \ 1.0,\nstiffness: 50,\nratio: 1.0,\n),\n0.0,\n1.0,\n1.0)\n..tolerance = Tolerance(distance:\
  \ 0.01, velocity: double.infinity);\n```\n\n**清单 11-15**  \n弹簧模拟\n\n使用弹簧模拟的一种更简单的方法是使用\
  \ `AnimationController` 类的 `fling()` 方法。该方法使用临界阻尼弹簧来驱动动画。\n\n`GravitySimulation`\
  \ 类表示遵循牛顿第二运动定律的粒子的模拟。表 11-6 显示了 `GravitySimulation` 构造函数的参数。\n\n**表 11-6**  \n\
  `GravitySimulation` 的参数\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `acceleration`\
  \ | `double` | 粒子的加速度。 |\n| `distance` | `double` | 初始距离。 |\n| `endDistance` | `double`\
  \ | 模拟结束时的距离。 |\n| `velocity` | `double` | 初始速度。 |\n\n在清单 11-16 中，`SimulationController`\
  \ 组件使用一个 `Simulation` 对象来驱动动画。\n\n```\ntypedef BuilderFunc = Widget Function(BuildContext,\
  \ Animation);\nclass SimulationController extends StatefulWidget {\nSimulationController({Key\
  \ key, this.simulation, this.builder})\n: super(key: key);\nfinal Simulation simulation;\n\
  final BuilderFunc builder;\n@override\n_SimulationControllerState createState()\
  \ => _SimulationControllerState();\n}\nclass _SimulationControllerState extends\
  \ State\nwith SingleTickerProviderStateMixin {\nAnimationController controller;\n\
  @override\nvoid initState() {\nsuper.initState();\ncontroller = AnimationController(\n\
  vsync: this,\n)..animateWith(widget.simulation);\n}\n@override\nWidget build(BuildContext\
  \ context) {\nreturn widget.builder(context, controller.view);\n}\n@override\nvoid\
  \ dispose() {\ncontroller.dispose();\nsuper.dispose();\n}\n}\n```\n\n**清单 11-16**\
  \  \n在动画中使用模拟\n\n## 11.11 总结\n\n本章涵盖与 Flutter 动画相关的实践方法。`AnimationController` 类用于控制动画。`Tween`\
  \ 类的子类为不同类型的数据创建线性动画。`AnimatedWidget` 和 `AnimatedBuilder` 是使用动画的有用组件。在下一章中，我们将讨论\
  \ Flutter 中与原生平台的集成。\n\n"
- "# 12. 平台集成\n\n在移动应用中，集成原生平台是很常见的。你可以编写平台特定代码来使用原生平台 API。有大量的插件可以执行不同的任务。\n\n##\
  \ 12.1 读写文件\n\n### 问题\n\n你想要读写文件。\n\n### 解决方案\n\n使用 `File` API。\n\n### 讨论\n\n在移动应用中，你可能需要将文件保存到设备上。`dart:io`\
  \ 库提供了用于读写文件的文件 API。`File` 类拥有读取内容、写入内容和查询文件元数据的方法。文件系统的操作可以是同步的，也可以是异步的。大多数此类操作在\
  \ `File` 类中都有成对的方法。异步方法返回一个 `Future` 对象，而同步方法则使用 `Sync` 作为名称后缀，并返回实际值。例如，`readAsString()`\
  \ 和 `readAsStringSync()` 方法是一对返回字符串的读取操作。表 12-1 显示了 `File` 类的异步方法。\n\n**表 12-1**\
  \  \n`File` 的异步方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `copy(String newPath)` | 将此文件复制到新路径。\
  \ |\n| `create({bool recursive: false})` | 创建此文件。如果 `recursive` 为 true，则会创建所有目录。\
  \ |\n| `open()` | 使用 `RandomAccessFile` 对象打开文件以供随机访问。 |\n| `readAsBytes()` | 将整个文件内容读取为字节列表。\
  \ |\n| `readAsString({Encoding encoding: utf8})` | 使用指定编码将整个文件内容读取为字符串。 |\n| `readAsLines(({Encoding\
  \ encoding: utf8})` | 使用指定编码将整个文件内容读取为多行文本。 |\n| `writeAsBytes(List<int> bytes)`\
  \ | 将字节列表写入文件。 |\n| `writeAsString(String contents)` | 将字符串写入文件。 |\n| `rename(String\
  \ newPath)` | 将此文件重命名到新路径。 |\n| `delete({bool recursive: false})` | 删除此文件。 |\n|\
  \ `exists()` | 检查此文件是否存在。 |\n| `stat()` | 返回一个描述该文件的 `FileStat` 对象。 |\n| `lastAccessed()`\
  \ | 获取此文件的最后访问时间。 |\n| `lastModified()` | 获取此文件的最后修改时间。 |\n| `length()` | 获取此文件的长度。\
  \ |\n\n`Directory` 类表示文件系统中的目录。给定一个 `Directory` 对象，可以使用 `list()` 或 `listSync()`\
  \ 方法来列出文件和子目录。\n\n要创建 `File` 对象，可以使用默认构造函数并传入路径。对于 Flutter 应用，该路径可能特定于平台。移动应用存储文件有两个常见位置：\n\
  \n-   临时目录：用于存储可能随时被清除的临时文件\n-   文档目录：用于存储应用私有的文件，仅在应用被删除时才会被清除\n\n要获取这两个位置的平台特定路径，可以使用\
  \ `path_provider` 包（https://pub.dev/packages/path_provider）。该包提供了 `getTemporaryDirectory()`\
  \ 函数来获取临时目录的路径，以及 `getApplicationDocumentsDirectory()` 函数来获取应用文档目录。\n\n在清单 12-1\
  \ 中，`readConfig()` 方法从应用文档目录读取 `config.txt` 文件，而 `writeConfig()` 方法将字符串写入同一个文件。\n\
  \n```\nclass ConfigFile {\nFuture get _configFile async {\nDirectory directory =\
  \ await getApplicationDocumentsDirectory();\nreturn File('${directory.path}/config.txt');\n\
  }\nFuture readConfig() async {\nreturn _configFile\n.then((file) => file.readAsString())\n\
  .catchError((error) => 'default config');\n}\nFuture writeConfig(String config)\
  \ async {\nFile file = await _configFile;\nreturn file.writeAsString(config);\n\
  }\n}\n```\n\n**清单 12-1**  \n读写文件\n\n## 12.2 存储键值对\n\n### 问题\n\n你想要存储类型安全的键值对。\n\n\
  ### 解决方案\n\n使用 `shared_preferences` 插件。\n\n\n\n### Discussion\n\n你可以使用文件 API 在设备上存储任何数据。使用通用文件\
  \ API 意味着你需要自己处理数据的序列化和反序列化。如果你需要存储的数据是简单的键值对，使用 `shared_preferences` 插件（[`https://pub.dev/packages/shared_preferences`](https://pub.dev/packages/shared_preferences)）是更好的选择。该插件提供了基于\
  \ Map 的 API 来管理类型安全的键值对。键的类型始终是 `String`，只有几种类型可以作为值使用，包括 `String`、`bool`、`double`、`int`\
  \ 和 `List<String>`。\n\n要管理键值对，你需要使用静态方法 `SharedPreferences.getInstance()` 来获取 `SharedPreferences`\
  \ 对象。表 12-2 展示了 `SharedPreferences` 类的方法。对于每种支持的数据类型，都有一对用于获取和设置值的方法。例如，`getBool()`\
  \ 和 `setBool()` 方法用于获取和设置 `bool` 值。\n\n表 12-2  \n`SharedPreference` 的方法\n\n| 名称\
  \ | 描述 |\n| --- | --- |\n| `get(String key)` | 读取指定键的值。 |\n| `containsKey(String\
  \ key)` | 检查指定键是否存在。 |\n| `getKeys()` | 获取所有键的集合。 |\n| `remove(String key)` | 移除指定键所对应的键值对。\
  \ |\n| `clear()` | 移除所有键值对。 |\n| `setString(String key, String value)` | 写入一个 `String`\
  \ 值。 |\n| `getString()` | 读取一个 `String` 值。 |\n\n在代码清单 12-2 中，`SharedPreferences`\
  \ 类用于读写一个键值对。\n\n```dart\nclass AppConfig {\n  Future _getPrefs() async {\n    return\
  \ await SharedPreferences.getInstance();\n  }\n\n  Future getName() async {\n  \
  \  SharedPreferences prefs = await _getPrefs();\n    return prefs.getString('name')\
  \ ?? \"\";\n  }\n\n  Future setName(String name) async {\n    SharedPreferences\
  \ prefs = await _getPrefs();\n    return prefs.setString('name', name);\n  }\n}\n\
  ```\n代码清单 12-2  \n使用 `SharedPreferences`\n\n## 12.3 编写平台特定代码\n\n### 问题\n\n你想编写平台特定代码。\n\
  \n### 解决方案\n\n使用平台通道在 Flutter 应用与底层宿主平台之间传递消息。\n\n\n\n### 讨论\n\n在 Flutter 应用中，大部分代码都是用平台无关的\
  \ Dart 语言编写的。Flutter SDK 提供的功能是有限的。有时你可能仍然需要编写特定平台的代码来使用原生平台 API。一个生成的 Flutter 应用在\
  \ `android` 和 `ios` 目录中已经包含了平台特定的代码。构建原生包需要这两个目录中的代码。\n\nFlutter 使用消息传递来调用平台特定的\
  \ API 并获取返回结果。消息通过平台通道传递。Flutter 代码通过平台通道向宿主发送消息。宿主代码监听平台通道并接收消息。然后使用平台特定的 API 生成响应，并通过同一通道将响应发送回\
  \ Flutter 代码。传递的消息实际上是异步方法调用。\n\n在 Flutter 代码中，平台通道是使用 `MethodChannel` 类创建的。一个应用中的所有通道名称必须唯一。建议使用域名作为通道名称的前缀。要通过通道发送方法调用，这些方法调用在被发送前必须编码为二进制格式，接收到的结果会被解码为\
  \ Dart 值。编码和解码是使用 `MethodCodec` 类的子类完成的：\n\n- `StandardMethodCodec` 类使用标准二进制编码。\n\
  - `JSONMethodCodec` 类使用 UTF-8 JSON 编码。\n\n`MethodChannel` 构造函数有 `name` 参数用于指定通道名称，`codec`\
  \ 参数用于指定 `MethodCodec` 对象。默认使用的 `MethodCodec` 对象是 `StandardMethodCodec` 对象。\n\n\
  给定一个 `MethodChannel` 对象，`invokeMethod()` 方法使用指定的参数在通道上调用一个方法。返回值是一个 `Future<T>`\
  \ 对象。这个 `Future` 对象可能以不同的值完成：\n\n- 如果方法调用成功，它会以结果值完成。\n- 如果方法调用失败，它会以 `PlatformException`\
  \ (平台异常) 完成。\n- 如果该方法尚未实现，它会以 `MissingPluginException` (缺少插件异常) 完成。\n\n`invokeListMethod()`\
  \ 方法也会调用一个方法，但返回一个 `Future<List<T>>` 对象。`invokeMapMethod()` 方法调用一个方法并返回一个 `Future<Map<K,\
  \ V>>` 对象。`invokeListMethod()` 和 `invokeMapMethod()` 方法都在内部使用了 `invokeMethod()`，但增加了额外的类型转换。\n\
  \n在代码清单 12-3 中，通过通道调用了 `getNetworkOperator` 方法，并返回网络运营商。\n\n```\nclass NetworkOperator\
  \ extends StatefulWidget {\n@override\n_NetworkOperatorState createState() => _NetworkOperatorState();\n\
  }\nclass _NetworkOperatorState extends State {\nstatic const channel = const MethodChannel('flutter-recipes/network');\n\
  String _networkOperator = \";\n@override\nvoid initState() {\nsuper.initState();\n\
  _getNetworkOperator();\n}\nFuture _getNetworkOperator() async {\nString operator;\n\
  try {\noperator = await channel.invokeMethod('getNetworkOperator') ?? 'unknown';\n\
  } catch (e) {\noperator = 'Failed to get network operator: ${e.message}';\n}\nsetState(()\
  \ {\n_networkOperator = operator;\n});\n}\n@override\nWidget build(BuildContext\
  \ context) {\nreturn Container(\nchild: Center(\nchild: Text(_networkOperator),\n\
  ),\n);\n}\n}\n代码清单 12-3\n获取网络运营商\n```\n\n`getNetworkOperator` 方法调用的处理器需要在 Android\
  \ 和 iOS 平台上都实现。代码清单 12-4 展示了 Java 实现。`getNetworkOperator()` 方法使用 Android API 来获取网络运营商。在通道的方法调用处理器中，如果方法名是\
  \ `getNetworkOperator`，则使用 `Result.success()` 方法将 `getNetworkOperator()` 方法的结果作为成功响应发送回去。如果你想发送错误响应，可以使用\
  \ `Result.error()` 方法。如果方法未知，你应该使用 `Result.notImplemented()` 将此方法标记为未实现。\n\n```\n\
  public class MainActivity extends FlutterActivity {\nprivate static final String\
  \ CHANNEL = \"flutter-recipes/network\";\n@Override\nprotected void onCreate(Bundle\
  \ savedInstanceState) {\nsuper.onCreate(savedInstanceState);\nGeneratedPluginRegistrant.registerWith(this);\n\
  new MethodChannel(getFlutterView(), CHANNEL)\n.setMethodCallHandler((methodCall,\
  \ result) -> {\nif (\"getNetworkOperator\".equals(methodCall.method)) {\nresult.success(getNetworkOperator());\n\
  } else {\nresult.notImplemented();\n}\n});\n}\nprivate String getNetworkOperator()\
  \ {\nTelephonyManager telephonyManager =\n((TelephonyManager) getSystemService(Context.TELEPHONY_SERVICE));\n\
  return telephonyManager.getNetworkOperatorName();\n}\n}\n代码清单 12-4\ngetNetworkOperator\
  \ 的 Android 实现\n```\n\n代码清单 12-5 展示了 iOS 平台的 `AppDelegate.swift` 文件。`receiveNetworkOperator()`\
  \ 函数使用 iOS API 来获取运营商名称，并使用 `FlutterResult` 将其作为响应发送回去。\n\n```\nimport UIKit\nimport\
  \ Flutter\nimport CoreTelephony\n@UIApplicationMain\n@objc class AppDelegate: FlutterAppDelegate\
  \ {\noverride func application(\n_ application: UIApplication,\ndidFinishLaunchingWithOptions\
  \ launchOptions: [UIApplicationLaunchOptionsKey: Any]?\n) -> Bool {\nGeneratedPluginRegistrant.register(with:\
  \ self)\nguard let controller = window?.rootViewController as? FlutterViewController\
  \ else {\nfatalError(\"rootViewController is not type FlutterViewController\")\n\
  }\nlet networkChannel = FlutterMethodChannel(name: \"flutter-recipes/network\",\
  \ binaryMessenger: controller)\nnetworkChannel.setMethodCallHandler({\n[weak self]\
  \ (call: FlutterMethodCall, result: FlutterResult) -> Void in\nguard call.method\
  \ == \"getNetworkOperator\" else {\nresult(FlutterMethodNotImplemented)\nreturn\n\
  }\nself?.receiveNetworkOperator(result: result)\n})\nreturn super.application(application,\
  \ didFinishLaunchingWithOptions: launchOptions)\n}\nprivate func receiveNetworkOperator(result:\
  \ FlutterResult) {\nlet networkInfo = CTTelephonyNetworkInfo()\nlet carrier = networkInfo.subscriberCellularProvider\n\
  result(carrier?.carrierName)\n}\n}\n代码清单 12-5\ngetNetworkOperator 的 Swift 实现\n```\n\
  \n## 12.4 创建插件\n\n### 问题\n\n你希望创建包含平台特定代码的可共享插件。\n\n### 解决方案\n\n使用插件模板创建 Flutter\
  \ 项目。\n\n\n\n### 讨论\n\n食谱 12-4 展示了如何在 Flutter 应用中添加平台特定代码。添加到 Flutter 应用的代码无法在不同应用之间共享。若要使平台特定代码可复用，可以创建\
  \ Flutter 插件。插件是 Flutter SDK 中支持的另一种项目类型。插件可以像其他 Dart 包一样使用 Dart pub 工具（`https://pub.dev/`）进行共享。\n\
  \n要创建新的 Flutter 插件，可使用`flutter create --template=plugin`命令。`template=plugin`参数表示使用`plugin`模板创建\
  \ Flutter 项目。你可以分别为 Android 选择 Java 或 Kotlin，为 iOS 选择 Objective-C 或 Swift。默认情况下，Android\
  \ 使用 Java，iOS 使用 Objective-C。通过`-a`参数（值为`java`或`kotlin`）可指定 Android 语言，`-i`参数（值为`objc`或`swift`）可指定\
  \ iOS 语言。以下命令展示了如何使用 Swift 为 iOS 创建插件：\n\n```\n$ flutter create --template=plugin\
  \ -i swift network\n```\n\n你也可以使用 Android Studio 或 VS Code 创建新插件。\n\n新创建的插件包含获取平台版本的骨架代码。我们可以使用食谱\
  \ 12-3 中的代码实现插件，添加获取网络运营商的新方法。在生成的插件目录中，包含以下几个子目录：\n\n*   `lib`目录包含插件的公开 Dart API。\n\
  *   `android`目录包含公开 API 的 Android 实现。\n*   `ios`目录包含公开 API 的 iOS 实现。\n*   `example`目录包含使用该插件的示例\
  \ Flutter 应用。\n*   `test`目录包含测试代码。\n\n我们首先在`lib/network_plugin.dart`文件中定义公开 Dart\
  \ API。在清单 12-6 中，通过方法通道调用`getNetworkOperator`方法来获取`networkOperator`属性的值。\n\n```\n\
  class NetworkPlugin {\nstatic const MethodChannel _channel =\nconst MethodChannel('network_plugin');\n\
  static Future get networkOperator async {\nreturn await _channel.invokeMethod('getNetworkOperator');\n\
  }\n}\n清单 12-6\n插件 Dart API\n```\n\n清单 12-7 中的`NetworkPlugin.java`文件是插件的 Android\
  \ 实现。`NetworkPlugin`类实现了`MethodCallHandler`接口，用于处理从平台通道接收的方法调用。\n\n```\npublic class\
  \ NetworkPlugin implements MethodCallHandler {\npublic static void registerWith(Registrar\
  \ registrar) {\nfinal MethodChannel channel = new MethodChannel(registrar.messenger(),\
  \ \"network_plugin\");\nchannel.setMethodCallHandler(new NetworkPlugin(registrar));\n\
  }\nNetworkPlugin(Registrar registrar) {\nthis.registrar = registrar;\n}\nprivate\
  \ final PluginRegistry.Registrar registrar;\n@Override\npublic void onMethodCall(MethodCall\
  \ call, Result result) {\nif (call.method.equals(\"getNetworkOperator\")) {\nresult.success(getNetworkOperator());\n\
  } else {\nresult.notImplemented();\n}\n}\nprivate String getNetworkOperator() {\n\
  Context context = registrar.context();\nTelephonyManager telephonyManager =\n((TelephonyManager)\
  \ context.getSystemService(Context.TELEPHONY_SERVICE));\nreturn telephonyManager.getNetworkOperatorName();\n\
  }\n}\n清单 12-7\nAndroid 实现\n```\n\n清单 12-8 中的`SwiftNetworkPlugin.swift`文件是插件的 Swift\
  \ 实现。\n\n```\npublic class SwiftNetworkPlugin: NSObject, FlutterPlugin {\npublic\
  \ static func register(with registrar: FlutterPluginRegistrar) {\nlet channel =\
  \ FlutterMethodChannel(name: \"network_plugin\",\nbinaryMessenger: registrar.messenger())\n\
  let instance = SwiftNetworkPlugin()\nregistrar.addMethodCallDelegate(instance, channel:\
  \ channel)\n}\npublic func handle(_ call: FlutterMethodCall,\nresult: @escaping\
  \ FlutterResult) {\nif (call.method == \"getNetworkOperator\") {\nself.receiveNetworkOperator(result:\
  \ result)\n} else {\nresult(FlutterMethodNotImplemented)\n}\n}\nprivate func receiveNetworkOperator(result:\
  \ FlutterResult) {\nlet networkInfo = CTTelephonyNetworkInfo()\nlet carrier = networkInfo.subscriberCellularProvider\n\
  result(carrier?.carrierName)\n}\n}\n清单 12-8\nSwift 实现\n```\n\n示例项目和测试代码也需要使用新的 API\
  \ 进行更新。\n\n## 12.5 显示网页\n\n### 问题\n\n你想要显示网页。\n\n### 解决方案\n\n使用`webview_flutter`插件。\n\
  \n\n\n### 讨论\n\n如果你想在 Flutter 应用中显示网页，可以使用 `webview_flutter` 插件（`https://pub.dartlang.org/packages/webview_flutter`）。在\
  \ `pubspec.yaml` 文件的依赖项中添加 `webview_flutter: ⁰.3.6` 后，你就可以使用 `WebView` 组件来显示网页并与之交互。对于\
  \ iOS 系统，你需要在 `ios/Runner/Info.plist` 文件中添加键 `io.flutter.embedded_views_preview`，其值为\
  \ `YES`。\n\n表 12-3 展示了 `WebView` 构造函数的参数。要控制网页视图，你需要使用 `onWebViewCreated` 回调来获取\
  \ `WebViewController` 对象。`javascriptMode` 的值可以是 `JavascriptMode.disabled` 或 `JavascriptMode.unrestricted`。要启用在网页中执行\
  \ JavaScript，应将值设置为 `JavascriptMode.unrestricted`。`navigationDelegate` 的类型为 `NavigationDelegate`，它是一个函数，接收一个\
  \ `NavigationRequest` 对象，并返回 `NavigationDecision` 枚举值。如果返回值是 `NavigationDecision.prevent`，则导航请求会被阻止。如果返回值是\
  \ `NavigationDecision.navigate`，则导航请求可以继续。你可以使用导航委托来阻止用户访问受限页面。`onPageFinished`\
  \ 回调接收已加载页面的 URL。\n\n**表 12-3** `WebView` 构造函数参数\n\n| 名称 | 描述 |\n| --- | --- |\n\
  | `initialUrl` | 要加载的初始 URL。 |\n| `onWebViewCreated` | 当 `WebView` 创建时的回调。 |\n|\
  \ `javascriptMode` | 是否启用 JavaScript。 |\n| `javascriptChannels` | 用于接收在网页视图中运行的\
  \ JavaScript 代码所发送消息的通道。 |\n| `navigationDelegate` | 决定是否应处理导航请求。 |\n| `onPageFinished`\
  \ | 页面加载完成时的回调。 |\n| `gestureRecognizers` | 网页视图识别的手势。 |\n\n获取 `WebViewController`\
  \ 对象后，你可以使用表 12-4 中所示的方法与网页视图进行交互。所有这些方法都是异步的，并返回 `Future` 对象。例如，`canGoBack()` 方法返回一个\
  \ `Future<bool>` 对象。\n\n**表 12-4** `WebViewController` 的方法\n\n| 名称 | 描述 |\n| ---\
  \ | --- |\n| `evaluateJavascript(String javascriptString)` | 在当前页面的上下文中执行 JavaScript\
  \ 代码。 |\n| `loadUrl(String url, { Map<String, String> headers })` | 加载指定的 URL。 |\n\
  | `reload()` | 重新加载当前 URL。 |\n| `goBack()` | 在导航历史中后退。 |\n| `canGoBack()` | 检查在历史中后退是否有效。\
  \ |\n| `goForward()` | 在导航历史中前进。 |\n| `canGoForward()` | 检查在历史中前进是否有效。 |\n| `clearCache()`\
  \ | 清除缓存。 |\n| `currentUrl()` | 获取当前的 URL。 |\n\n清单 12-9 展示了一个使用 `WebView` 组件与谷歌搜索页面交互的示例。由于\
  \ `WebView` 组件的创建是异步的，因此使用 `Completer<WebViewController>` 对象来捕获 `WebViewController`\
  \ 对象。在 `onWebViewCreated` 回调中，用已创建的 `WebViewController` 对象来填充 `Completer<WebViewController>`\
  \ 对象。在 `onPageFinished` 回调中，使用 `WebViewController` 对象的 `evaluateJavascript()` 方法来执行\
  \ JavaScript 代码，该代码向输入框设置一个值并点击搜索按钮。这会导致 `WebView` 组件加载搜索结果页面。\n\n`JavascriptChannel`\
  \ 对象通过一个通道名称和一个 `JavascriptMessageHandler` 函数创建，用于处理从网页中运行的 JavaScript 代码发送来的消息。清单\
  \ 12-9 中的消息处理器使用一个 `SnackBar` 组件来显示接收到的消息。通道名称 `Messenger` 成为一个全局对象，它有一个 `postMessage`\
  \ 函数，可供 JavaScript 代码用于发送消息回来。\n\n```dart\nclass GoogleSearch extends StatefulWidget\
  \ {\n  @override\n  _GoogleSearchState createState() => _GoogleSearchState();\n\
  }\n\nclass _GoogleSearchState extends State<GoogleSearch> {\n  final Completer<WebViewController>\
  \ _controller = Completer<WebViewController>();\n\n  @override\n  Widget build(BuildContext\
  \ context) {\n    return WebView(\n      initialUrl: 'https://google.com',\n   \
