  ```\n\n## 3.4 理解函数\n\n### 问题\n\n你想了解 Dart 中的函数。\n\n### 解决方案\n\nDart 中的函数非常强大且灵活。\n\
  \n\n\n### 讨论\n\nDart 中的函数是对象，类型为 `Function`。函数可以赋值给变量、作为函数参数传递，也可以作为函数返回值。在 Dart\
  \ 中创建高阶函数非常容易。函数可以有零个或多个参数。有些参数是必需的，有些则是可选的。必需的参数在参数列表中排在前面，后面跟着可选参数。可选的位置参数用 `[]`\
  \ 包裹。\n\n当函数有长串参数时，很难记住这些参数的位置和含义。这时最好使用命名参数。可以使用 `@required` 注解将命名参数标记为必需。参数可以使用\
  \ `=` 指定默认值。如果没有提供默认值，默认值为 `null`。\n\n在 3-11 代码清单 中，函数 `sum()` 有一个可选位置参数 `initial`，其默认值为\
  \ `0`。函数 `joinToString()` 有一个必需的命名参数 `separator` 和两个可选的命名参数 `prefix` 与 `suffix`。`joinToString()`\
  \ 中使用的箭头语法，是函数体仅包含单个表达式时的简写形式。语法 `=> expr` 等同于 `{ return expr; }`。使用箭头语法可以使代码更简短且更易读。\n\
  \n```\nimport 'package:meta/meta.dart';\nint sum(List list, [int initial = 0]) {\n\
  \  var total = initial;\n  list.forEach((v) => total += v);\n  return total;\n}\n\
  String joinToString(List list,\n    {@required String separator, String prefix =\
  \ \", String suffix = \"}) =>\n    '$prefix${list.join(separator)}$suffix';\nvoid\
  \ main() {\n  assert(sum([1, 2, 3]) == 6);\n  assert(sum([1, 2, 3], 10) == 16);\n\
  \  assert(joinToString(['a', 'b', 'c'], separator: ',') == 'a,b,c');\n  assert(\n\
  \      joinToString(['a', 'b', 'c'], separator: '-', prefix: '*', suffix: '?') ==\n\
  \          '*a-b-c?');\n}\n```\n\n有时你可能不需要为函数命名。这些匿名函数在提供回调时非常有用。在 3-12 代码清单 中，一个匿名函数被传递给了方法\
  \ `forEach()`。\n\n```\nvar list = [1, 2, 3];\nlist.forEach((v) => print(v * 10));\n\
  ```\n\n## 3.5 使用 Typedefs\n\n### 问题\n\n你想为函数类型创建一个别名。\n\n### 解决方案\n\n使用 Typedefs。\n\
  \n### 讨论\n\n在 Dart 中，函数是对象。函数是 `Function` 类型的实例。但函数的实际类型由其参数类型和返回值类型决定。当函数作为参数或返回值时，重要的是其实际的函数类型。Dart\
  \ 中的 `typedef` 允许我们为函数类型创建一个别名。这个类型别名可以像其他类型一样使用。在 3-13 代码清单 中，`Processor<T>` 是一个函数类型的别名，该函数类型包含一个类型为\
  \ `T` 的参数，返回值类型为 `void`。这个类型在函数 `process()` 中被用作参数类型。\n\n```\ntypedef Processor\
  \ = void Function(T value);\nvoid process(List list, Processor processor) {\n  list.forEach((item)\
  \ {\n    print('processing $item');\n    processor(item);\n    print('processed\
  \ $item');\n  });\n}\nvoid main() {\n  process([1, 2, 3], print);\n}\n```\n\n##\
  \ 3.6 使用级联运算符\n\n### 问题\n\n你想对同一个对象执行一系列操作。\n\n### 解决方案\n\n使用 Dart 中的级联运算符（`..`）。\n\
  \n### 讨论\n\nDart 有一个特殊的级联运算符（`..`），它允许我们对同一个对象执行一系列操作。在其他编程语言中，要链式调用同一个对象的方法，我们通常需要创建一个流畅接口（Fluent\
  \ API），让每个方法都返回当前对象。Dart 中的级联运算符使得这个要求变得不再必要。即使方法不返回当前对象，我们仍然可以进行链式调用。级联运算符还支持属性访问。在\
  \ 3-14 代码清单 中，级联运算符被用于访问 `User` 和 `Address` 类中的属性和方法。\n\n```\nclass User {\n  String\
