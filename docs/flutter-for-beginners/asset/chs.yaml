  ## 2.22 运行集成测试


  ### 问题


  你已经使用 Flutter Driver 编写了集成测试，并且希望运行这些测试。


  ### 解决方案


  使用 `flutter drive` 命令。


  ### 讨论


  Flutter Driver 是 Flutter SDK 提供的用于运行集成测试的工具。运行集成测试时，应用本身在模拟器或设备上运行，但测试脚本在你的本地机器上执行。在测试过程中，测试脚本会连接到正在运行的应用，并向其发送命令以模拟不同的用户操作。测试脚本可以执行诸如点击和滚动等操作，也可以读取
  widget 属性并验证其正确性。


  `flutter drive` 是用来运行集成测试的命令。它可以启动应用本身，也可以连接到一个已有的正在运行的应用。当 `flutter drive` 启动应用时，它可以接受与
  `flutter run` 相同的参数，包括 `--debug`、`--profile`、`--flavor`、`--route`、`--target`、`--observatory-port`、`--pub`、`--no-pub`
  和 `--trace-startup`。这些参数的含义与在 `flutter run` 中相同。当连接到已有应用时，需要使用 `--use-existing-app`
  参数并指定该应用的 observatory URL，如下命令所示。


  ```

  $ flutter drive --use-existing-app=http://localhost:50124

  ```


  启动测试脚本时，`flutter drive` 会根据应用的入口文件，按照约定定位测试脚本文件。入口文件通过 `--target` 参数指定，其默认值为 `lib/main.dart`。`flutter
  drive` 会尝试在 `test_driver` 目录下查找同名但带有 `_test.dart` 后缀的测试脚本文件。例如，如果入口文件是 `lib/main.dart`，它会尝试查找测试脚本文件
  `test_driver/main_test.dart`。你也可以使用 `--driver` 参数显式指定测试脚本文件，如下命令所示。


  ```

  $ flutter drive --driver=test_driver/simple.dart

  ```


  如果应用是由 `flutter drive` 启动的，那么测试脚本执行完毕后应用将被停止，除非指定了 `--keep-app-running` 参数来保持其运行。当连接到已有应用时，测试脚本执行完毕后应用会继续运行，除非指定了
  `--no-keep-app-running` 参数来停止它。以下命令会在测试后保持应用运行。


  ```

  $ flutter drive --keep-app-running

  ```


  ## 2.23 启用 Flutter SDK 命令的 Bash 补全功能


  ### 问题


  在输入 Flutter SDK 命令时，你希望你的 shell 能够提供补全支持。


  ### 解决方案


  使用 `flutter bash-completion` 命令来设置补全功能。


  ### 讨论


  有了 shell 补全支持，当你输入一些命令时，shell 会尝试完成它们。`flutter bash-completion` 会打印出用于启用 bash 和
  zsh 补全功能的设置脚本。如果未提供参数，设置脚本会打印到控制台。如果提供了文件路径，设置脚本则会写入该文件。


  在 macOS 上，我们可以使用 Homebrew 先安装 `bash-completion`。


  ```

  $ brew install bash-completion

  ```


  如果你使用的是 bash，需要修改 `~/.bash_profile` 文件，添加以下内容。


  ```

  [ -f /usr/local/etc/bash_completion ] && . /usr/local/etc/bash_completion

  ```


  然后，你可以运行 `flutter bash-completion` 将设置脚本保存到 `/usr/local/etc/bash_completion.d` 目录下，如下命令所示。


  ```

  $ flutter bash-completion /usr/local/etc/bash_completion.d/flutter

  ```


  最后，你应该执行 `source ~/.bash_profile` 或者重启 shell 来启用补全功能。


  如果你使用的是 zsh，可以将设置脚本添加到 `~/.zshrc` 文件中。首先，你需要在 `~/.zshrc` 文件的开头添加以下内容。


  ```

  autoload bashcompinit

  bashcompinit

  ```


  然后，你需要运行以下命令将设置脚本添加到 `~/.zshrc` 文件中。


  ```

  $ flutter bash-completion >> ~/.zshrc

  ```


  最后，你应该执行 `source ~/.zshrc` 或者重启 shell 来启用补全功能。


  ## 2.24 清理 Flutter 应用的构建文件


  ### 问题


  你想要清理 Flutter 应用的构建文件。


  ### 解决方案


  使用 `flutter clean` 命令。


  ### 讨论


  `flutter clean` 命令会删除 `build` 目录中的文件。即使对于小型应用，`build` 目录占用的磁盘空间也可能很大。例如，在构建 Flutter
  示例应用后，`build` 目录的大小约为 200 MB。在学习 Flutter 时，你可能会创建许多用于测试的小型应用。当你认为这些应用已经不再需要时，对它们运行
  `flutter clean` 是一个好主意。你会发现可以回收大量的磁盘空间。


  ## 2.25 管理 Flutter SDK 缓存


  ### 问题


  你想要显式管理 Flutter SDK 的缓存。


  ### 解决方案


  使用 `flutter precache` 命令。


  ### 讨论


  Flutter SDK 在 `bin/cache` 目录中维护了所需构建工件的缓存。该目录包含 Dart SDK、Flutter 引擎、Material 字体和
  Gradle Wrapper 的二进制文件。如果此缓存不存在，它会被自动填充。`flutter precache` 命令用于显式更新缓存。除 `config`、`precache`、`bash-completion`
  和 `upgrade` 命令外，大多数 Flutter 命令在执行前都会自动更新缓存，因此在大多数情况下你无需显式运行此命令。


  `flutter precache` 有一个 `-a` 或 `--all-platforms` 参数，用于指定是否应下载所有平台的构建工件。默认情况下，只会下载当前平台的工件。


  ```

  $ flutter precache -a

  ```


  ## 2.26 总结


  本章介绍了开发 Flutter 应用时可能需要使用的工具。你可能不需要使用所有这些工具。在 IDE 的帮助下，你可以在 IDE 内完成大部分操作。然而，了解这些工具仍然很有价值，因为你可以利用它们做更多事情。在下一章中，我们将学习关于
  Dart 语言核心部分的范例。


