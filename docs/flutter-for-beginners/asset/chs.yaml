  \ `dynamic` 作为类型。动态类型经常与 `Object` 类型混淆。`Object` 和 `dynamic` 都允许所有值。如果你想声明接受所有对象，则应使用\
  \ `Object`。如果类型是 `dynamic`，我们可以使用 `is` 操作符来检查它是否是期望的类型。实际类型可以通过 `runtimeType` 获取。在代码清单\
