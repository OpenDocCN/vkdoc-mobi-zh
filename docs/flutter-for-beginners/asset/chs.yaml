- "# 3. Dart 核心知识\n\nFlutter 项目可以包含跨平台代码和平台特定代码。跨平台代码使用 Dart 编写。充分掌握 Dart 知识是构建 Flutter\
  \ 应用的前提条件。本书不涵盖 Dart 语言的细节。你可以找到大量与 Dart 相关的在线资源。然而，介绍构建 Flutter 应用所需的 Dart 核心知识仍然非常有帮助。本章的范例涵盖了\
  \ Dart 的不同方面。如果你对自己的 Dart 知识有信心，可以跳过本章。\n\n## 3.1 理解内置类型\n\n### 问题\n\n你想了解 Dart\
