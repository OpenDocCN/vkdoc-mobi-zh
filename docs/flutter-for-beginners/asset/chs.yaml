  \ = Rectangle(100, 100);\n  var rect2 = Rectangle(200, 150);\n  assert(rect1 < rect2);\n\
  \  assert(rect2 > rect1);\n}\n```\n\n## 3.8 使用构造函数\n\n### 问题\n\n你想创建 Dart 类的新实例。\n\
  \n### 解决方案\n\n使用构造函数。\n\n\n\n### 讨论\n\n与其他编程语言类似，Dart 中的对象通过构造器创建。通常，构造器通过声明与类同名的函数来定义。构造器可以包含参数，用于提供初始化新对象所需的数值。如果某个类未声明任何构造器，系统会提供一个无参数的默认构造器。该默认构造器仅会调用超类中的无参数构造器。然而，一旦声明了构造器，这个默认构造器便不再存在。\n\
  \n一个类可以拥有多个构造器。你可以使用 `ClassName.identifier` 的形式来命名这些构造器，以更清晰地表明其含义。\n\n在代码清单 3-16\
  \ 中，`Rectangle` 类包含一个接受四个参数的常规构造器，同时还拥有一个命名构造器 `Rectangle.fromPosition`。\n\n```\n\
  class Rectangle {\nfinal num top, left, width, height;\nRectangle(this.top, this.left,\
  \ this.width, this.height);\nRectangle.fromPosition(this.top, this.left, num bottom,\
  \ num right)\n: assert(right > left),\nassert(bottom > top),\nwidth = right - left,\n\
  height = bottom - top;\n@override\nString toString() {\nreturn 'Rectangle{top: $top,\
  \ left: $left, width: $width, height: $height}';\n}\n}\nvoid main(List args) {\n\
  var rect1 = Rectangle(100, 100, 300, 200);\nvar rect2 = Rectangle.fromPosition(100,\
  \ 100, 300, 200);\nprint(rect1);\nprint(rect2);\n}\n代码清单 3-16\n构造器\n```\n\n使用工厂模式来创建对象是很常见的做法。Dart\
  \ 有一种特殊的 `factory` 构造器来实现这种模式。工厂构造器并不总是返回类的新实例，它可能返回一个缓存实例，或者返回一个子类型的实例。在代码清单 3-17\
  \ 中，`ExpensiveObject` 类包含一个命名构造器 `ExpensiveObject._create()` 来实际创建新实例。工厂构造器仅在 `_instance`\
  \ 为 `null` 时才会调用 `ExpensiveObject._create()`。运行这段代码时，你会看到信息 \"created\" 只打印了一次。\n\
  \n```\nclass ExpensiveObject {\nstatic ExpensiveObject _instance;\nExpensiveObject._create()\
  \ {\nprint('created');\n}\nfactory ExpensiveObject() {\nif (_instance == null) {\n\
  _instance = ExpensiveObject._create();\n}\nreturn _instance;\n}\n}\nvoid main()\
  \ {\nExpensiveObject();\nExpensiveObject();\n}\n代码清单 3-17\n工厂构造器\n```\n\n## 3.9\
  \ 扩展类\n\n### 问题\n\n你希望从一个已有的类中继承行为。\n\n### 解决方案\n\n通过扩展已有类来创建一个子类。\n\n### 讨论\n\n\
  Dart 是一种面向对象的编程语言，它提供了对继承的支持。一个类可以使用关键字 `extends` 从一个超类继承。在子类中，超类可以被引用为 `super`。子类可以重写超类的实例方法、getter\
  \ 和 setter。重写的成员应使用 `@override` 注解进行标记。\n\n抽象类使用 `abstract` 修饰符定义。抽象类不能被实例化。抽象类中的抽象方法没有实现，必须由非抽象子类实现。\n\
  \n在代码清单 3-18 中，`Shape` 类是一个抽象类，包含一个抽象方法 `area()`。`Rectangle` 和 `Circle` 类都继承自 `Shape`\
  \ 并实现了抽象方法 `area()`。\n\n```\nimport 'dart:math' show pi;\nabstract class Shape {\n\
  double area();\n}\nclass Rectangle extends Shape {\ndouble width, height;\nRectangle(this.width,\
  \ this.height);\n@override\ndouble area() {\nreturn width * height;\n}\n}\nclass\
  \ Square extends Rectangle {\nSquare(double width) : super(width, width);\n}\nclass\
  \ Circle extends Shape {\ndouble radius;\nCircle(this.radius);\n@override\ndouble\
  \ area() {\nreturn pi * radius * radius;\n}\n}\nvoid main() {\nvar rect = Rectangle(100,\
  \ 50);\nvar square = Square(50);\nvar circle = Circle(50);\nprint(rect.area());\n\
  print(square.area());\nprint(circle.area());\n}\n代码清单 3-18\n继承\n```\n\n## 3.10 向类添加特性\n\
  \n### 问题\n\n你想要重用某个类的代码，但受到 Dart 单继承的限制。\n\n### 解决方案\n\n使用 Mixin。\n\n### 讨论\n\n\
  继承是重用代码的一种常见方式。Dart 只支持单继承，即一个类最多只能有一个超类。如果你想从多个类中重用代码，则应使用 Mixin。一个类可以使用关键字 `with`\
  \ 声明多个 Mixin。Mixin 是一个继承自 `Object` 且不声明构造器的类。Mixin 可以使用 `class` 声明为常规类，或使用 `mixin`\
  \ 声明为专门的 Mixin。在代码清单 3-19 中，`CardHolder` 和 `SystemUser` 是 Mixin。`Assistant` 类继承自\
  \ `Student` 并使用了 `SystemUser` Mixin，因此我们可以调用 `Assistant` 实例的 `useSystem()` 方法。\n\
  \n```\nclass Person {\nString name;\nPerson(this.name);\n}\nclass Student extends\
  \ Person with CardHolder {\nStudent(String name) : super('Student: $name') {\nholder\
  \ = this;\n}\n}\nclass Teacher extends Person with CardHolder {\nTeacher(String\
  \ name) : super('Teacher: $name') {\nholder = this;\n}\n}\nmixin CardHolder {\n\
  Person holder;\nvoid swipeCard() {\nprint('${holder.name} swiped the card');\n}\n\
  }\nmixin SystemUser {\nPerson user;\nvoid useSystem() {\nprint('${user.name} used\
  \ the system.');\n}\n}\nclass Assistant extends Student with SystemUser {\nAssistant(String\
  \ name) : super(name) {\nuser = this;\n}\n}\nvoid main() {\nvar assistant = Assistant('Alex');\n\
  assistant.swipeCard();\nassistant.useSystem();\n}\n代码清单 3-19\nMixin\n```\n\n## 3.11\
  \ 使用接口\n\n### 问题\n\n你需要一个供类遵循的契约。\n\n### 解决方案\n\n使用类的隐式接口。\n\n### 讨论\n\n你应该熟悉作为类契约的接口。与其他面向对象的编程语言不同，Dart\
  \ 没有接口的概念。每个类都有一个隐式接口，该接口包含该类以及它所实现的接口的所有实例成员。你可以使用 `implements` 来声明一个类实现了另一个类的\
  \ API。在代码清单 3-20 中，`CachedDataLoader` 类实现了 `DataLoader` 类的隐式接口。\n\n```\nclass DataLoader\
  \ {\nvoid load() {\nprint('load data');\n}\n}\nclass CachedDataLoader implements\
