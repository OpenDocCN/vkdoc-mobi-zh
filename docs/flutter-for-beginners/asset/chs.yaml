  \ `Counter`。\n\n```\nimport 'lib1.dart' as lib1;\nimport 'lib2.dart' as lib2;\n\
  lib1.Counter counter;\n清单 3-25\n重命名库\n```\n\n你不需要导入一个库的所有成员。使用 `show` 来显式地包含成员。使用\
  \ `hide` 来显式地排除成员。在清单 3-26 中，当导入 `dart:math` 库时，只导入了 `Random`；当导入 `dart:html` 库时，只排除了\
  \ `Element`。\n\n```\nimport 'dart:math' show Random;\nimport 'dart:html' hide Element;\n\
  清单 3-26\n显示和隐藏成员\n```\n\n## 3.14 使用异常\n\n### 问题\n\n你想处理 Dart 应用中的失败情况。\n\n### 解决方案\n\
  \n使用 `throw` 报告失败。使用 `try-catch-finally` 处理异常。\n\n### 讨论\n\n代码会出错。代码报告失败并处理失败是很自然的事情。Dart\
  \ 拥有与 Java 类似的异常机制，区别在于 Dart 中的所有异常都是非受检异常。Dart 中的方法不会声明它们可能抛出的异常，因此不强制要求捕获异常。然而，未捕获的异常会导致隔离区挂起，并可能导致程序终止。恰当的失败处理也是健壮应用的一个关键特征。\n\
  \n#### 报告失败\n\n我们可以使用 `throw` 来抛出异常。实际上，所有非 `null` 对象都可以被抛出，而不仅仅是实现了 `Error` 或 `Exception`\
  \ 类型。建议只抛出 `Error` 和 `Exception` 类型的对象。\n\n`Error` 对象代表代码中不应该出现的 bug。例如，如果一个列表只包含三个元素，尝试访问第四个元素会导致抛出\
  \ `RangeError`。与 Exception 不同，Error 不打算被捕获。当错误发生时，最安全的方式是终止程序。`Error` 带有关于其发生原因的清晰信息。\n\
  \n与 `Error` 相比，`Exception` 被设计为通过编程方式捕获和处理。例如，发送 HTTP 请求可能不会成功，因此我们需要在代码中处理异常以应对失败。`Exception`\
  \ 通常携带关于失败的有用数据。我们应该创建继承自 `Exception` 的自定义类型来封装必要的数据。\n\n#### 捕获异常\n\n当抛出异常时，你可以捕获它以防止其传播，除非你重新抛出它。捕获异常的目的是处理它。如果你不想处理异常，就不应该捕获它。使用\
  \ `try`、`catch` 和 `on` 来捕获异常。如果你不需要访问异常对象，仅使用 `on` 就足够了。使用 `catch` 可以访问异常对象和堆栈跟踪。使用\
  \ `on` 来指定要捕获的异常类型。\n\n当你捕获一个异常时，你应该处理它。然而，有时你可能只想部分处理它。在这种情况下，你应该使用 `rethrow` 重新抛出异常。捕获异常但不完全处理它是一个坏习惯。\n\
  \n如果你希望无论是否抛出异常，某些代码都能运行，你可以将代码放在 `finally` 子句中。如果没有抛出异常，`finally` 子句会在 `try` 块之后运行。如果抛出了异常，`finally`\
  \ 子句会在匹配的 `catch` 子句之后运行。\n\n在清单 3-27 中，函数 `getNumber()` 抛出了一个自定义异常类型 `ValueTooLargeException`。在函数\
  \ `main()` 中，该异常被捕获并重新抛出。\n\n```\nimport 'dart:math' show Random;\nvar random =\
  \ Random();\nclass ValueTooLargeException implements Exception {\nint value;\nValueTooLargeException(this.value);\n\
  @override\nString toString() {\nreturn 'ValueTooLargeException{value: $value}';\n\
  }\n}\nint getNumber() {\nvar value = random.nextInt(10);\nif (value > 5) {\nthrow\
  \ ValueTooLargeException(value);\n}\nreturn value;\n}\nvoid main() {\ntry {\nprint(getNumber());\n\
  } on ValueTooLargeException catch (e) {\nprint(e);\nrethrow;\n} finally {\nprint('in\
  \ finally');\n}\n}\n清单 3-27\n使用异常\n```\n\n## 3.15 总结\n\n学习一门新的编程语言并非易事。尽管 Dart 与其他编程语言看起来相似，但它仍然有一些独特的特性。本章仅简要介绍了\
  \ Dart 中的重要特性。\n\n"
- "# 4. 部件基础\n\n在构建 Flutter 应用时，大部分时间你都在与部件（widget）打交道。本章提供关于 Flutter 中部件的基本背景信息。此外，还涵盖了显示文本、图片、图标、按钮和占位符的几个基本部件。\n\
  \n## 4.1 理解部件\n\n### 问题\n\n你想知道如何在 Flutter 中使用组件。\n\n### 解决方案\n\n部件在 Flutter 中无处不在。\n\
  \n\n\n### Discussion\n\n如果你参与过用户界面的开发，应该对“小部件”或“组件”等概念并不陌生。这些概念代表了创建用户界面的可复用构建块。一个好的用户界面库应拥有大量高质量且易于使用的组件。按钮、图标、图片、菜单、对话框和表单输入等都是组件的例子。组件可大可小，复杂的组件通常由多个小型组件组成。你可以遵循组件模型创建自己的组件，也可以选择将组件分享给社区。一个良好的组件生态系统是用户界面库成功的关键因素。\n\
  \n`Flutter`使用`widget`来描述用户界面中的可复用构建块。与其他库相比，`Flutter`中的`widget`概念更为广泛。不仅按钮和表单输入等常见组件是`widget`，布局约束在`Flutter`中也以`widget`的形式表达。例如，如果你想将一个`widget`放置在盒子中央，只需将该`widget`包装进一个`Center`\
  \ widget 中。`widget`也用于获取上下文数据，例如，`DefaultTextStyle` widget 会获取适用于未设置样式的`Text` widget\
  \ 的`TextStyle`。\n\n`Flutter`中的`widget`是用户界面某部分的不可变描述。`widget`类的所有字段都是`final`的，并在构造函数中设置。`widget`构造函数仅包含命名参数。一个`widget`可以有一个或多个子`widget`。`Flutter`应用的`widget`会形成一个树状层次结构。`Flutter`应用入口文件的`main()`方法使用`runApp()`方法来启动应用。`runApp()`的唯一参数是一个`Widget`对象，该对象是应用`widget`树的根节点。`widget`只是静态配置，用于描述如何配置层次结构中的子树。要实际运行应用，我们需要一种管理`widget`实例化的方式。\n\
  \n`Flutter`使用`Element`来表示树中特定位置上`Widget`的实例化。一个`Widget`可以被实例化零次或多次。将`Widget`转化为`Element`的过程称为“膨胀（inflation）”。`Widget`类有一个`createElement()`方法，用于将`widget`膨胀为`Element`的具体实例。`Flutter`框架负责管理元素的声明周期。与元素关联的`widget`可能随时间变化，框架会更新元素以使用新的配置。\n\
  \n运行应用时，`Flutter`框架负责渲染元素以创建渲染树，从而使最终用户能够看到用户界面。渲染树由`RenderObject`组成，其根节点为`RenderView`。如果你使用`Android\
  \ Studio`，你可以在 **Flutter Inspector** 视图中查看`widget`树和渲染树。选择 `View ➤ Tool Windows\
  \ ➤ Flutter Inspector` 即可打开`Flutter Inspector`视图。图 4-1 展示了`Flutter Inspector`中的`widget`树，顶部面板显示`widget`树，底部面板显示某个`widget`的详细信息。\n\
  \n![../images/479501_1_En_4_Chapter/479501_1_En_4_Fig1_HTML.jpg](img/479501_1_En_4_Fig1_HTML.jpg)\n\
  \n**图 4-1**  \nFlutter Inspector 中的 Widget 树\n\n图 4-2 展示了`Flutter Inspector`中的渲染树，其根节点是一个`RenderView`。\n\
  \n![../images/479501_1_En_4_Chapter/479501_1_En_4_Fig2_HTML.jpg](img/479501_1_En_4_Fig2_HTML.jpg)\n\
  \n**图 4-2**  \nFlutter Inspector 中的渲染树\n\n## 4.2 理解 `BuildContext`\n\n### 问题\n\n\
  你想访问与`widget`树中某个`widget`相关的信息。\n\n### 解决方案\n\n`WidgetBuilder`函数有一个`BuildContext`参数，用于访问与`widget`树中某个`widget`相关的信息。你可以在`StatelessWidget.build()`和`State.build()`方法中看到`BuildContext`。\n\
  \n### 讨论\n\n构建一个`widget`时，该`widget`在`widget`树中的位置可能决定其行为，特别是当它有一个`InheritedWidget`作为祖先时。`BuildContext`类提供了访问与该位置相关信息的的方法，见表\
  \ 4-1。\n\n**表 4-1**  \nBuildContext 的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `ancestorInheritedElementForWidgetOfExactType`\
  \ | 获取与给定`InheritedWidget`类型最近的祖先`widget`对应的`InheritedElement`。 |\n| `ancestorRenderObjectOfType`\
  \ | 获取最近的`RenderObjectWidget`祖先`widget`的`RenderObject`。 |\n| `ancestorStateOfType`\
  \ | 获取最近的`StatefulWidget`祖先`widget`的`State`对象。 |\n| `rootAncestorStateOfType` |\
  \ 获取最远的`StatefulWidget`祖先`widget`的`State`对象。 |\n| `ancestorWidgetOfExactType` |\
  \ 获取最近的祖先`Widget`。 |\n| `findRenderObject` | 获取当前`widget`的`RenderObject`。 |\n| `inheritFromElement`\
  \ | 将此`BuildContext`注册到给定的祖先`InheritedElement`，以便当祖先的`widget`发生变化时，此`BuildContext`会重新构建。\
  \ |\n| `inheritFromWidgetOfExactType` | 获取给定类型的最近`InheritedWidget`，并注册此`BuildContext`，以便当该`widget`发生变化时，此`BuildContext`会重新构建。\
  \ |\n| `visitAncestorElements` | 访问祖先元素。 |\n| `visitChildElements` | 访问子元素。 |\n\n\
  `BuildContext`实际上是`Element`类的接口。在`StatelessWidget.build()`和`State.build()`方法中，`BuildContext`对象代表当前`widget`被膨胀的位置。在清单\
  \ 4-1 中，使用了`ancestorWidgetOfExactType()`方法来获取类型为`Column`的祖先`widget`。\n\n```\nclass\
  \ WithBuildContext extends StatelessWidget {\n@override\nWidget build(BuildContext\
  \ context) {\nColumn column = context.ancestorWidgetOfExactType(Column);\nreturn\
  \ Text(column.children.length.toString());\n}\n}\n```\n\n**清单 4-1**  \n使用 BuildContext\n\
  \n## 4.3 理解无状态小部件\n\n### 问题\n\n你想创建一个没有可变状态的`widget`。\n\n### 解决方案\n\n继承`StatelessWidget`类。\n\
  \n### 讨论\n\n当使用`widget`来描述用户界面的某一部分时，如果该部分可以完全通过`widget`自身的配置信息和其被膨胀时的`BuildContext`来描述，那么这个`widget`应该继承自`StatelessWidget`。创建`StatelessWidget`类时，你需要实现`build()`方法，该方法接受一个`BuildContext`并返回一个`Widget`。在清单\
  \ 4-2 中，`HelloWorld`类继承自`StatelessWidget`类，并在`build()`方法中返回了一个`Center` widget。\n\
  \n```\nclass HelloWorld extends StatelessWidget {\nconst HelloWorld({Key key}) :\
  \ super(key: key);\n@override\nWidget build(BuildContext context) {\nreturn Center(\n\
  child: Text('Hello World!'),\n);\n}\n}\n```\n\n**清单 4-2**  \nStatelessWidget 示例\n\
  \n## 4.4 理解有状态小部件\n\n### 问题\n\n你想创建一个具有可变状态的`widget`。\n\n### 解决方案\n\n继承`StatefulWidget`类。\n\
  \n\n\n### 讨论\n\n如果用户界面的某个部分可能会动态变化，则需要继承 `StatefulWidget` 类。`StatefulWidget` 自身是不可变的，其状态由它们创建的\
  \ `State` 对象管理。`StatefulWidget` 子类需要实现 `createState()` 方法，该方法返回一个 `State<StatefulWidget>`\
  \ 对象。当状态发生变化时，`State` 对象应调用 `setState()` 方法来通知框架触发更新。在代码清单 4-3 中，`_CounterState`\
  \ 类是 `Counter` 小部件的 `State` 对象。当按钮被按下时，值会在 `setState()` 方法中更新，从而更新 `_CounterState`\
  \ 小部件以显示新值。\n\n```\nclass Counter extends StatefulWidget {\n@override\n_CounterState\
  \ createState() => _CounterState();\n}\nclass _CounterState extends State {\nint\
  \ value = 0;\n@override\nWidget build(BuildContext context) {\nreturn Row(\nchildren:\
  \ [\nText('$value'),\nRaisedButton(\nchild: Text('+'),\nonPressed: () {\nsetState(()\
  \ {\nvalue++;\n});\n},\n),\n],\n);\n}\n}\n代码清单 4-3\nStatefulWidget 示例\n```\n\n##\
  \ 4.5 理解 InheritedWidget\n\n### 问题\n\n你希望将数据沿小部件树向下传递。\n\n### 解决方案\n\n继承 `InheritedWidget`\
  \ 类。\n\n### 讨论\n\n在构建小部件子树时，你可能需要将数据沿小部件树向下传递。例如，子树根小部件可能定义了一些上下文数据，比如从服务器获取的配置数据。子树中的其他小部件也可能需要访问这些上下文数据。一种可能的方式是将上下文数据添加到小部件的构造函数中，然后将其作为子小部件的构造函数参数传递下去。这种方案的主要缺点是，你需要将构造函数参数添加到子树中的所有小部件中。即使某些小部件实际上并不需要这些数据，它们仍然需要拥有这些数据以传递给它们的子小部件。\n\
  \n更好的方法是使用 `InheritedWidget` 类。`BuildContext` 类提供了一个 `inheritFromWidgetOfExactType()`\
  \ 方法，用于获取特定类型 `InheritedWidget` 的最近实例。使用 `InheritedWidget`，你可以将上下文数据存储在一个 `InheritedWidget`\
  \ 实例中。如果某个小部件需要访问上下文数据，你可以使用 `inheritFromWidgetOfExactType()` 方法来获取该实例并访问数据。如果一个继承的小部件状态发生改变，它将导致其消费者小部件重新构建。\n\
  \n在代码清单 4-4 中，`ConfigWidget` 类包含数据 `config`。静态方法 `of()` 获取最近的祖先 `ConfigWidget` 实例以获取\
  \ `config` 值。方法 `updateShouldNotify()` 决定了何时应该通知消费者小部件。\n\n```\nclass ConfigWidget\
  \ extends InheritedWidget {\nconst ConfigWidget({\nKey key,\n@required this.config,\n\
  @required Widget child,\n})  : assert(config != null),\nassert(child != null),\n\
  super(key: key, child: child);\nfinal String config;\nstatic String of(BuildContext\
  \ context) {\nfinal ConfigWidget configWidget =\ncontext.inheritFromWidgetOfExactType(ConfigWidget);\n\
  return configWidget?.config ?? \";\n}\n@override\nbool updateShouldNotify(ConfigWidget\
  \ oldWidget) {\nreturn config != oldWidget.config;\n}\n}\n代码清单 4-4\nInheritedWidget\
  \ 示例\n```\n\n在代码清单 4-5 中，`ConfigUserWidget` 类使用 `ConfigWidget.of()` 方法来获取 `config`\
  \ 值。\n\n```\nclass ConfigUserWidget extends StatelessWidget {\n@override\nWidget\
  \ build(BuildContext context) {\nreturn Text('Data is ${ConfigWidget.of(context)}');\n\
  }\n}\n代码清单 4-5\nConfigWidget 的使用\n```\n\n在代码清单 4-6 中，`ConfigWidget` 实例的 `config`\
  \ 值为 “Hello!”，并且有一个后代 `ConfigUserWidget` 实例。\n\n```\nConfigWidget(\nconfig: 'Hello!',\n\
  child: Center(\nchild: ConfigUserWidget(),\n),\n);\n代码清单 4-6\n完整示例\n```\n\n## 4.6\
  \ 显示文本\n\n### 问题\n\n你想显示一些文本。\n\n### 解决方案\n\n使用 `Text` 和 `RichText` 小部件。\n\n###\
  \ 讨论\n\n几乎所有应用都需要向最终用户显示一些文本。Flutter 提供了几个与文本相关的类。`Text` 和 `RichText` 是用于显示文本的两个小部件。事实上，`Text`\
  \ 在内部使用了 `RichText`。`Text` 小部件的 `build()` 方法返回一个 `RichText` 实例。`Text` 和 `RichText`\
  \ 的区别在于，`Text` 使用最近邻的 `DefaultTextStyle` 对象的样式，而 `RichText` 需要显式指定样式。\n\n#### Text\n\
  \n`Text` 有两个构造函数。第一个构造函数 `Text()` 接受一个 `String` 作为要显示的文本。另一个构造函数 `Text.rich()` 接受一个\
  \ `TextSpan` 对象来表示文本和样式。创建 `Text` 小部件的最简单形式是 `Text('Hello world')`，它使用最近邻的 `DefaultTextStyle`\
  \ 对象的样式来显示文本。`Text()` 和 `Text.rich()` 构造函数都有几个命名参数来自定义它们；参见表 4-2。\n\n**表 4-2** `Text()`\
  \ 和 `Text.rich()` 的命名参数\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `style` | `TextStyle`\
  \ | 文本的样式。 |\n| `textAlign` | `TextAlign` | 文本应如何水平对齐。 |\n| `textDirection` | `TextDirection`\
  \ | 文本的方向。 |\n| `locale` | `Locale` | 基于 Unicode 选择字体所用的区域设置。 |\n| `softWrap` |\
  \ `bool` | 是否在软换行处断开文本。 |\n| `overflow` | `TextOverflow` | 如何处理文本溢出。 |\n| `textScaleFactor`\
  \ | `double` | 缩放文本的因子。 |\n| `maxLines` | `int` | 最大行数。如果文本超过此限制，将根据 `overflow`\
  \ 中指定的策略进行截断。 |\n| `semanticsLabel` | `String` | 文本的语义标签。 |\n\n`TextAlign` 是一个枚举类型，其值见表\
  \ 4-3。\n\n**表 4-3** `TextAlign` 值\n\n| 名称 | 描述 |\n| --- | --- |\n| `left` | 将文本对齐到其容器的左侧边缘。\
  \ |\n| `right` | 将文本对齐到其容器的右侧边缘。 |\n| `center` | 将文本对齐到其容器的中心。 |\n| `justify` |\
  \ 对于以软换行结束的文本行，拉伸这些行以填充容器的宽度；对于以硬换行结束的文本行，将它们对齐到起始边缘。 |\n| `start` | 将文本对齐到其容器的前导边缘。对于从左到右的文本，前导边缘是左侧边缘；而对于从右到左的文本，则是右侧边缘。\
  \ |\n| `end` | 将文本对齐到其容器的尾随边缘。尾随边缘与前导边缘相反。 |\n\n建议始终使用 `TextAlign` 值 `start` 和 `end`，而不是\
  \ `left` 和 `right`，以更好地处理双向文本。`TextDirection` 是一个枚举类型，其值为 `ltr` 和 `rtl`。`TextOverflow`\
  \ 是一个枚举类型，其值见表 4-4。\n\n**表 4-4** `TextOverflow` 值\n\n| 名称 | 描述 |\n| --- | --- |\n\
  | `clip` | 裁剪溢出的文本。 |\n| `fade` | 将溢出的文本淡化为透明。 |\n| `ellipsis` | 在溢出的文本后添加省略号。 |\n\
  \n`DefaultTextStyle` 是一个 `InheritedWidget`，它具有属性 `style`、`textAlign`、`softWrap`、`overflow`\
  \ 和 `maxLines`，这些属性的含义与表 4-2 中所示的命名参数相同。如果在构造函数 `Text()` 和 `Text.rich()` 中提供了某个命名参数，则该提供的值会覆盖最近祖先\
  \ `DefaultTextStyle` 对象中的值。代码清单 4-7 展示了使用 `Text` 小部件的几个示例。\n\n```\nText('Hello World')\n\
  Text(\n'Bigger Bold Text',\nstyle: TextStyle(fontWeight: FontWeight.bold),\ntextScaleFactor:\
  \ 2.0,\n);\nText(\n'Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed\
  \ do eiusmod tempor incididunt',\nmaxLines: 1,\noverflow: TextOverflow.ellipsis,\n\
  );\n代码清单 4-7\nText 示例\n```\n\n\n\n#### `TextSpan`\n\n构造函数`Text.rich()`接受一个`TextSpan`对象作为必需的参数。`TextSpan`表示一个不可变的文本段。`TextSpan()`构造函数有四个命名参数；参见表\
  \ 4-5。`TextSpan`按层次结构组织。一个`TextSpan`对象可以拥有多个`TextSpan`对象作为其子节点。子节点`TextSpan`可以覆盖其父节点的样式。\n\
  \n**表 4-5** `TextSpan()`的命名参数\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `style`\
  \ | `TextStyle` | 文本及其子节点的样式。 |\n| `text` | `String` | 该文本段中的文本。 |\n| `children`\
  \ | `List<TextSpan>` | 作为该文本段子节点的`TextSpan`。 |\n| `recognizer` | `GestureRecognizer`\
  \ | 用于接收事件的手势识别器。 |\n\n清单 4-8 展示了使用`Text.rich()`的示例。该示例使用不同的样式显示句子“The quick brown\
  \ fox jumps over the lazy dog”。\n\n```\nText.rich(TextSpan(\nstyle: TextStyle(\n\
  fontSize: 16,\n),\nchildren: [\nTextSpan(text: 'The quick brown '),\nTextSpan(\n\
  text: 'fox',\nstyle: TextStyle(\nfontWeight: FontWeight.bold,\ncolor: Colors.red,\n\
  )),\nTextSpan(text: ' jumps over the lazy '),\nTextSpan(\ntext: 'dog',\nstyle: TextStyle(\n\
  color: Colors.blue,\n)),\n],\n));\n清单 4-8\nText.rich()示例\n```\n\n#### `RichText`\n\
  \n`RichText`始终使用`TextSpan`对象来表示文本和样式。`RichText()`构造函数有一个必需的命名参数`text`，类型为`TextSpan`。它还具有可选的命名参数`textAlign`、`textDirection`、`softWrap`、`overflow`、`textScaleFactor`、`maxLines`和`locale`。这些可选的命名参数与表\
  \ 4-2 中所示的`Text()`构造函数含义相同。\n\n在`RichText`中显示的文本需要显式指定样式。您可以使用`DefaultTextStyle.of()`从`BuildContext`对象获取默认样式。这正是`Text`在内部所做的。`Text`组件获取默认样式，并与`style`参数中提供的样式合并，然后创建一个`RichText`，其中包含一个包装了文本和合并后样式的`TextSpan`。如果您发现确实需要以默认样式为基础，则应直接使用`Text`而不是`RichText`。清单\
  \ 4-9 展示了一个使用`RichText`的示例。\n\n```\nRichText(\ntext: TextSpan(\ntext: 'Level 1',\n\
  style: TextStyle(color: Colors.black),\nchildren: [\nTextSpan(\ntext: 'Level 2',\n\
  style: TextStyle(fontWeight: FontWeight.bold),\nchildren: [\nTextSpan(\ntext: 'Level\
  \ 3',\nstyle: TextStyle(color: Colors.red),\n),\n],\n),\n],\n),\n);\n清单 4-9\nRichText\
  \ 示例\n```\n\n## 4.7 为文本应用样式\n\n### 问题\n\n您希望显示的文本具有不同的样式。\n\n### 解决方案\n\n使用`TextStyle`来描述样式。\n\
  \n### 讨论\n\n`TextStyle`描述了应用于文本的样式。`TextStyle()`构造函数有许多描述样式的命名参数；参见表 4-6。\n\n**表\
  \ 4-6** `TextStyle()`的命名参数\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `color` |\
  \ `Color` | 文本的颜色。 |\n| `fontSize` | `Double` | 字体大小。 |\n| `fontWeight` | `FontWeight`\
  \ | 字型的粗细。 |\n| `fontStyle` | `FontStyle` | 字体的变体。 |\n| `letterSpacing` | `Double`\
  \ | 每个字母之间的间距。 |\n| `wordSpacing` | `Double` | 每个单词之间的间距。 |\n| `textBaseline` |\
  \ `TextBaseline` | 用于对齐此文本段及其父文本段的公共基线。 |\n| `height` | `Double` | 文本行高。 |\n| `locale`\
  \ | `Locale` | 用于选择区域特定字形的区域设置。 |\n| `foreground` | `Paint` | 文本的前景色。 |\n| `background`\
  \ | `Paint` | 文本的背景色。 |\n| `shadows` | `List<Shadow>` | 绘制在文本下方的阴影。 |\n| `decoration`\
  \ | `TextDecoration` | 文本的装饰。 |\n| `decorationColor` | `Color` | 文本装饰的颜色。 |\n| `decorationStyle`\
  \ | `TextDecorationStyle` | 文本装饰的样式。 |\n| `debugLabel` | `String` | 用于调试的样式描述。 |\n\
  | `fontFamily` | `String` | 字体的名称。 |\n| `package` | `String` | 如果字体在包中定义，则与`fontFamily`一起使用。\
  \ |\n\n`FontWeight`类定义了值`w100`、`w200`、`w300`、`w400`、`w500`、`w600`、`w700`、`w800`和`w900`。`FontWeight.w100`是最细的，而`FontWeight.w900`是最粗的。`FontWeight.bold`是`FontWeight.w700`的别名，而`FontWeight.normal`是`FontWeight.w400`的别名。`FontStyle`是一个枚举类型，具有两个值：`italic`和`normal`。`TextBaseline`是一个枚举类型，具有值`alphabetic`和`ideographic`。\n\
  \n`TextDecoration`类定义了不同类型的文本装饰。您也可以使用构造函数`TextDecoration.combine()`通过组合一个`TextDecoration`实例列表来创建一个新的`TextDecoration`实例。例如，`TextDecoration.combine([TextDecoration.underline,\
  \ TextDecoration.overline])`实例会在文本下方和上方绘制线条。表 4-7 展示了`TextDecoration`中的常量。\n\n**表\
  \ 4-7** `TextDecoration`常量\n\n| 名称 | 描述 |\n| --- | --- |\n| `none` | 无装饰。 |\n| `underline`\
  \ | 在文本下方绘制一条线。 |\n| `overline` | 在文本上方绘制一条线。 |\n| `lineThrough` | 穿过文本绘制一条线。 |\n\
  \n`TextDecorationStyle`是一个枚举类型，其值如表 4-8 所示。`TextDecorationStyle`定义了由`TextDecoration`创建的线条的样式。\n\
  \n**表 4-8** `TextDecorationStyle`值\n\n| 名称 | 描述 |\n| --- | --- |\n| `solid` | 绘制实线。\
  \ |\n| `double` | 绘制双线。 |\n| `dotted` | 绘制点线。 |\n| `dashed` | 绘制虚线。 |\n| `wavy`\
  \ | 绘制波浪线。 |\n\n清单 4-10 展示了使用`TextDecoration`和`TextDecorationStyle`的示例。\n\n```\n\
  Text(\n'Decoration',\nstyle: TextStyle(\nfontWeight: FontWeight.w900,\ndecoration:\
  \ TextDecoration.lineThrough,\ndecorationStyle: TextDecorationStyle.dashed,\n),\n\
  );\n清单 4-10\n使用 TextDecoration 和 TextDecorationStyle 的示例\n```\n\n如果您想创建一个`TextStyle`实例的副本并更新某些属性，请使用`copyWith()`方法。`apply()`方法也会创建一个新的`TextStyle`实例，但它允许使用因子和差值来更新某些属性。例如，命名参数`fontSizeFactor`和`fontSizeDelta`可以更新字体大小。`fontSize`的更新值通过`fontSize\
  \ * fontSizeFactor + fontSizeDelta`计算得出。您也可以使用相同的模式来更新`height`、`letterSpacing`和`wordSpacing`的值。对于`fontWeight`，只支持`fontWeightDelta`。在清单\
  \ 4-11 中，应用于文本的`TextStyle`更新了`fontSize`和`decoration`的值。\n\n```\nText(\n'Scale',\n\
  style: DefaultTextStyle.of(context).style.apply(\nfontSizeFactor: 2.0,\nfontSizeDelta:\
  \ 1,\ndecoration: TextDecoration.none,\n),\n);\n清单 4-11\n更新 TextStyle\n```\n\n##\
  \ 4.8 显示图像\n\n### 问题\n\n您希望显示从网络加载的图像。\n\n### 解决方案\n\n使用`Image.network()`并传入图像 URL\
  \ 来加载和显示图像。\n\n\n\n### 讨论\n\n如果图片托管在你自己的服务器或其他地方，可以使用 `Image.network()` 构造函数来显示它们。`Image.network()`\
  \ 构造函数只需要提供要加载图片的 URL。图片 widget 应通过命名参数 `width` 和 `height` 指定具体尺寸，或放置在一个设置了严格布局约束的上下文中。这是因为图片的尺寸在加载时可能会发生变化。如果没有严格的尺寸约束，图片\
  \ widget 可能会影响其他 widget 的布局。在示例 4-12 中，图片 widget 的尺寸通过命名参数 `width` 和 `height` 指定。\n\
  \n```\nImage.network(\n'https://picsum.photos/400/300',\nwidth: 400,\nheight: 300,\n\
  );\n示例 4-12\nImage.network() 示例\n```\n\n所有下载的图片都会被缓存，无论 HTTP 头部信息如何。这意味着所有 HTTP\
  \ 缓存控制头部都将被忽略。你可以使用缓存破坏器来强制刷新缓存的图片。例如，你可以在图片 URL 中添加一个随机字符串。\n\n如果需要额外的 HTTP 头部来加载图片，你可以指定\
  \ `headers` 参数（类型为 `Map<String, String>`）来提供这些头部。一个典型的用例是加载需要 HTTP 头部进行身份验证的受保护图片。\n\
  \n如果图片无法覆盖整个盒子的区域，你可以使用 `repeat` 参数（类型为 `ImageRepeat`）来指定图片如何重复。`ImageRepeat` 是一个枚举类型，其值如表\
  \ 4-9 所示。默认值为 `noRepeat`。\n\n**表 4-9** `ImageRepeat` 值\n\n| 名称 | 描述 |\n| --- | ---\
  \ |\n| `Repeat` | 在 x 和 y 两个方向重复。 |\n| `repeatX` | 仅在 x 方向重复。 |\n| `repeatY` | 仅在\
  \ y 方向重复。 |\n| `noRepeat` | 不重复。未覆盖区域将透明。 |\n\n在示例 4-13 中，图片被放入一个比图片更大的 `SizedBox`\
  \ 中。通过使用 `ImageRepeat.repeat`，盒子被该图片填充。\n\n```\nSizedBox(\nwidth: 400,\nheight:\
  \ 300,\nchild: Image.network(\n'https://picsum.photos/300/200',\nalignment: Alignment.topLeft,\n\
  repeat: ImageRepeat.repeat,\n),\n);\n示例 4-13\n重复图片\n```\n\n## 4.9 显示图标\n\n### 问题\n\
  \n你想使用图标。\n\n### 解决方案\n\n使用 `Icon` 来显示 Material Design 的图标或社区的图标包。\n\n### 讨论\n\n\
  图标在移动应用中广泛使用。与文字相比，图标用更少的屏幕空间表达相同的语义。图标可以通过字体字形或图片创建。`Icon` widget 使用字体字形绘制。字体字形通过\
  \ `IconData` 类描述。要创建一个 `IconData` 实例，需要该图标在字体中的 Unicode 码点。\n\n`Icons` 类包含许多预定义的\
  \ `IconData` 常量，对应 Material Design 中的图标（[`material.io/tools/icons/`](https://material.io/tools/icons/)）。例如，`Icons.call`\
  \ 是名为“call”的图标的 `IconData` 常量。如果应用使用 Material Design，这些图标可以直接使用。`CupertinoIcons`\
  \ 类包含许多预定义的 `IconData` 常量，对应 iOS 风格的图标。\n\n`Icon()` 构造函数有命名参数 `size` 和 `color`，分别用于指定图标的尺寸和颜色。图标始终是正方形，其宽度和高度都等于\
  \ `size`。`size` 的默认值是 24。示例 4-14 创建了一个大小为 100 的红色 `Icons.call` 图标。\n\n```\nIcon(\n\
  Icons.call,\nsize: 100,\ncolor: Colors.red,\n);\n示例 4-14\nIcon() 示例\n```\n\n要使用流行的\
  \ Font Awesome 图标，可以使用 `font_awesome_flutter` 包（[`pub.dartlang.org/packages/font_awesome_flutter`](https://pub.dartlang.org/packages/font_awesome_flutter)）。将包依赖添加到\
  \ `pubspec.yaml` 文件后，可以导入该文件以使用 `FontAwesomeIcons` 类。与 `Icons` 类类似，`FontAwesomeIcons`\
  \ 类包含许多 `IconData` 常量，对应 Font Awesome 中的不同图标。示例 4-15 创建了一个大小为 80 的蓝色 `FontAwesomeIcons.angry`\
  \ 图标。\n\n```\nIcon(\nFontAwesomeIcons.angry,\nsize: 80,\ncolor: Colors.blue,\n);\n\
  示例 4-15\n使用 Font Awesome 图标\n```\n\n## 4.10 使用带文字的按钮\n\n### 问题\n\n你想使用带文字的按钮。\n\n\
  ### 解决方案\n\n使用按钮 widget `FlatButton`、`RaisedButton`、`OutlineButton` 和 `CupertinoButton`。\n\
  \n### 讨论\n\nFlutter 为 Material Design 和 iOS 提供了不同类型的按钮。这些按钮 widget 都有一个必需的参数 `onPressed`，用于指定按下时的处理函数。如果\
  \ `onPressed` 处理函数为 `null`，则按钮被禁用。按钮的内容通过类型为 `Widget` 的参数 `child` 指定。`FlatButton`、`RaisedButton`\
  \ 和 `OutlineButton` 在触摸响应方面有不同的样式和行为：\n\n- `FlatButton` 具有零仰角且没有可见边框。它通过填充由 `highlightColor`\
  \ 指定的颜色来响应触摸。\n- `RaisedButton` 具有仰角并填充颜色。它通过将仰角增加到 `highlightElevation` 来响应触摸。\n\
  - `OutlineButton` 有边框，初始仰角为 0.0，背景透明。它通过用颜色使背景不透明并将仰角增加到 `highlightElevation` 来响应触摸。\n\
  \n`FlatButton` 应使用在工具栏、对话框、卡片或与其他内容内联的地方，这些地方有足够的空间使按钮的存在显而易见。`RaisedButton` 应使用在空间不足以让按钮脱颖而出的地方。`OutlineButton`\
  \ 是 `RaisedButton` 和 `FlatButton` 的混合体。当 `FlatButton` 或 `RaisedButton` 都不适用时，可以使用\
  \ `OutlineButton`。\n\n如果你更喜欢 iOS 风格的按钮，可以使用 `CupertinoButton` widget。`CupertinoButton`\
  \ 通过淡出和淡入来响应触摸。示例 4-16 展示了创建不同类型按钮的示例。\n\n```\nFlatButton(\nchild: Text('Flat'),\n\
  color: Colors.white,\ntextColor: Colors.grey,\nhighlightColor: Colors.red,\nonPressed:\
  \ () => {},\n);\nRaisedButton(\nchild: Text('Raised'),\ncolor: Colors.blue,\nonPressed:\
  \ () => {},\n);\nOutlineButton(\nchild: Text('Outline'),\nonPressed: () => {},\n\
  );\nCupertinoButton(\nchild: Text('Cupertino'),\ncolor: Colors.green,\nonPressed:\
  \ () => {},\n);\n示例 4-16\n不同类型的按钮\n```\n\n## 4.11 使用带图标的按钮\n\n### 问题\n\n你想使用带图标的按钮。\n\
  \n### 解决方案\n\n使用 `IconButton` widget、`FlatButton.icon()`、`RaisedButton.icon()` 和\
  \ `OutlineButton.icon()`。\n\n### 讨论\n\n创建带图标的按钮有两种方式。如果只有图标就足够，使用 `IconButton` widget。如果需要同时包含图标和文字，使用构造函数\
  \ `FlatButton.icon()`、`RaisedButton.icon()` 或 `OutlineButton.icon()`。\n\n`IconButton`\
  \ 构造函数需要 `icon` 参数来指定图标。`FlatButton.icon()`、`RaisedButton.icon()` 和 `OutlineButton.icon()`\
  \ 使用参数 `icon` 和 `label` 分别指定图标和文字。示例 4-17 展示了使用 `IconButton()` 和 `RaisedButton.icon()`\
  \ 的示例。\n\n```\nIconButton(\nicon: Icon(Icons.map),\niconSize: 50,\ntooltip: 'Map',\n\
  onPressed: () => {},\n);\nRaisedButton.icon(\nicon: Icon(Icons.save),\nlabel: Text('Save'),\n\
  onPressed: () => [],\n);\n示例 4-17\nIconButton() 和 RaisedButton.icon() 示例\n```\n\n\
  ## 4.12 添加占位符\n\n### 问题\n\n你想添加占位符，以代表稍后添加的 widget。\n\n### 解决方案\n\n使用 `Placeholder`。\n\
  \n\n\n### 讨论\n\n在实现应用的界面之前，你通常会对应用的外观有一个基本构想。你可以先将界面拆解为多个小部件（widget）。在开发过程中，可以使用占位符来表示尚未完成的小部件，这样就能测试其他小部件的布局。例如，如果你需要创建两个小部件，一个显示在顶部，另一个显示在底部。如果你选择先创建底部小部件，并用占位符代替顶部小部件，就能看到底部小部件显示在预期位置。\n\
  \n`Placeholder()` 构造函数接受命名参数 `color`、`strokeWidth`、`fallbackWidth` 和 `fallbackHeight`。占位符绘制为一个矩形和两条对角线。参数\
  \ `color` 和 `strokeWidth` 分别指定线条的颜色和宽度。默认情况下，占位符会适配其容器。然而，如果占位符的容器没有边界限制，它会使用给定的\
  \ `fallbackWidth` 和 `fallbackHeight` 来确定大小。`fallbackWidth` 和 `fallbackHeight` 的默认值都是\
  \ `400.0`。代码清单 [4-18] 展示了 `Placeholder` 小部件的示例。\n\n```\nPlaceholder(\ncolor: Colors.red,\n\
  strokeWidth: 1,\nfallbackHeight: 200,\nfallbackWidth: 200,\n);\nListing 4-18\nExample\
  \ of Placeholder\n```\n\n## 4.13 总结\n\n小部件在 Flutter 应用中无处不在。本章对 Flutter 中的小部件进行了基本介绍，包括\
  \ `StatelessWidget`、`StatefulWidget` 和 `InheritedWidget`。本章还涵盖了使用常见基本小部件显示文本、图像、图标、按钮和占位符的用法。下一章将讨论\
  \ Flutter 中的布局。\n\n"
- "# 5. 布局小部件\n\n在构建用户界面时，布局始终是一项具有挑战性的任务。对于移动应用而言，考虑到设备屏幕分辨率种类繁多，布局会变得更加复杂。本章将介绍\
  \ Flutter 中与布局相关的实用方法。\n\n## 5.1 理解 Flutter 中的布局\n\n### 问题\n\n你想了解 Flutter 中的布局是如何工作的。\n\
  \n### 解决方案\n\nFlutter 中的布局通过一组小部件来实现。这些布局小部件会包裹其他小部件，以应用不同的布局约束。\n\n### 讨论\n\n对于移动应用而言，布局必须具有响应性，才能在无需编写大量难以维护的代码的情况下，适应不同的屏幕分辨率。幸运的是，随着布局技术的发展，现在构建响应式布局变得更加容易。如果你有过使用\
  \ CSS 进行 Web 开发的经验，可能听说过 W3C 制定的 CSS 弹性盒子布局模块规范（`https://www.w3.org/TR/css-flexbox-1/`）。弹性布局模型之所以强大，是因为它允许开发者表达布局“应该是什么”，而不是“如何”实现实际布局。这种声明式方法将繁重的工作转移到了底层框架上。最终得到的布局代码更易于理解和维护。\n\
  \n例如，如果你想将一个盒子放置在容器的中央，旧方法可能需要计算盒子和容器的大小以确定盒子的位置。而使用弹性布局时，可以将布局简化为代码清单 [5-1] 中的\
  \ CSS 代码：\n\n```\n.container {\ndisplay: flex;\nwidth: 400px;\nheight: 400px;\n\
  justify-content: center;\nalign-items: center;\nborder: 1px solid green;\n}\n.item\
  \ {\nwidth: 200px;\nheight: 200px;\nborder: 1px solid red;\n}\nListing 5-1\nCSS\
  \ code to center an item\n```\n\n弹性布局的思想现在不仅用于网页设计，也应用于移动应用。React Native 使用了弹性布局（`https://facebook.github.io/react-native/docs/flexbox`）。Flutter\
  \ 也采用了弹性布局的思路。正如方法 4-1 中所述，布局是通过小部件实现的。你可以在 Flutter 中看到诸如 `Flex`、`Row`、`Column`\
  \ 和 `Flexible` 这样的小部件类，它们的名称都源自弹性布局的概念。CSS 中的弹性布局模型不在本书的讨论范围内。不过，理解这一 W3C 规范仍然很有价值，它能帮助你更好地理解\
  \ Flutter 中的弹性布局。\n\n#### RenderObject\n\nFlutter 中的布局算法负责确定渲染树中每个 `RenderObject`\
  \ 实例的尺寸和位置。`RenderObject` 类非常灵活，可以适用于任何坐标系或布局协议。`RenderObject` 类通过 `layout()` 方法定义了基本的布局协议。`layout()`\
  \ 方法有一个必需的、类型为 `Constraints` 的位置参数。`Constraints` 类指定了子对象必须遵守的布局约束。对于一个特定的 `Constraints`\
  \ 实例，可能存在多个满足它的结果。只要结果在允许范围内，子对象可以自由选择使用其中任何一个。有时，一个 `Constraints` 实例可能只给子对象留出一个有效结果。这种\
  \ `Constraints` 实例被称为紧约束。紧约束通常灵活性较低，但由于具有紧约束的小部件无需重新布局，它们能提供更好的性能。\n\n`layout()`\
  \ 方法有一个命名参数 `parentUsesSize`，用于指定父对象是否需要使用子对象计算出的布局信息。如果 `parentUsesSize` 为 true，意味着父对象的布局依赖于子对象的布局。在这种情况下，每当子对象需要布局时，父对象可能也需要重新布局。布局完成后，每个\
  \ `RenderObject` 实例的某些字段会被设置，以包含布局信息。实际存储的信息取决于布局实现方式。这段布局信息存储在 `parentData` 属性中。\n\
  \n默认情况下，Flutter 使用由 `RenderBox` 类实现的二维笛卡尔坐标系。`RenderBox` 类通过 `BoxConstraints` 类实现了盒子布局模型。在盒子布局模型中，每个\
  \ `RenderBox` 实例被视为一个矩形，其大小由 `Size` 实例指定。每个盒子都有自己的坐标系。左上角的坐标为 (0,0)，而右下角的坐标为 (宽度，高度)。`RenderBox`\
  \ 类使用 `BoxParentData` 作为布局数据的类型。`BoxParentData.offset` 属性指定了在父对象的坐标系中绘制子对象的偏移量。\n\
  \n#### BoxConstraints\n\n一个 `BoxConstraints` 实例由四个双精度浮点命名参数指定：`minWidth`、`maxWidth`、`minHeight`\
  \ 和 `maxHeight`。这些参数的值必须满足以下规则。`double.infinity` 是约束的有效值：\n\n- `0.0 <= minWidth\
  \ <= maxWidth <= double.infinity`\n- `0.0 <= minHeight <= maxHeight <= double.infinity`\n\
  \n盒子布局完成后，`RenderBox` 实例的大小必须满足应用于它的 `BoxConstraints` 实例的约束：\n\n- `minWidth <= Size.width\
  \ <= maxWidth`\n- `minHeight <= Size.height <= maxHeight`\n\n如果在某个轴向上最小约束和最大约束相同，则该轴向是紧约束。例如，如果\
  \ `minWidth` 和 `maxWidth` 的值相同，则宽度是紧约束的。当宽度和高度都是紧约束时，`BoxConstraints` 实例即为紧约束。如果在某个轴向上最小约束为\
  \ `0.0`，则该轴向是松约束。如果在某个轴向上最大约束不是无限大，则该轴向是有界的；否则，该轴向是无界的。\n\n#### 布局算法\n\n在盒子布局模型中，布局通过一次遍历渲染树来完成。首先，它通过传递约束向下遍历渲染树。在此阶段，渲染对象使用其父对象传递的约束进行布局。在第二阶段，它通过传递具体结果向上遍历渲染树，这些结果决定了每个渲染对象的大小和偏移量。\n\
  \n\n\n### 布局组件\n\nFlutter 提供了一组用于不同布局需求的布局组件。这些组件可分为两类。第一类是包含单个子组件的组件，它们是 `SingleChildRenderObjectWidget`\
  \ 类的子类。第二类是可以包含多个子组件的组件，它们是 `MultiChildRenderObjectWidget` 类的子类。这些组件的构造方法具有相似的模式。第一个命名参数是类型为\
  \ `Key` 的 `key`。单子组件布局构造方法的最后一个命名参数是类型为 `Widget` 的 `child`，而多子组件布局构造方法的最后一个命名参数是类型为\
  \ `List<Widget>` 的 `children`。\n\n这些布局组件是 `RenderObjectWidget` 类的子类。`RenderObjectWidget`\
  \ 类用于配置 `RenderObjectElement`。`RenderObjectElement` 则封装了 `RenderObject`。\n\n## 5.2\
  \ 将组件居中放置\n\n### 问题\n\n你希望将一个组件放置在另一个组件的中心。\n\n### 解决方案\n\n用 `Center` 组件包裹该组件。\n\
  \n### 讨论\n\n要将一个组件放置在另一个组件的中心，只需用 `Center` 组件包裹该组件即可。该组件将水平且垂直地放置在 `Center` 组件的中心。这个\
  \ `Center` 组件会成为原始父组件的子组件。`Center` 构造方法有两个命名参数 `widthFactor` 和 `heightFactor`，分别用于指定宽度和高度的尺寸因子。清单\
  \ 5-2 展示了使用 `Center` 组件的示例。\n\n```dart\nCenter(\nwidthFactor: 2.0,\nheightFactor:\
  \ 2.0,\nchild: Text(\"Center\"),\n)\n```\n\n`Center` 组件实际上是 `Align` 组件的一个子类，其 `alignment`\
  \ 属性被设置为 `Alignment.center`。`Center` 组件的行为与配方 5-3 中讨论的 `Align` 组件相同。\n\n## 5.3 对齐组件\n\
  \n### 问题\n\n你希望将一个组件在其父组件内的不同位置进行对齐。\n\n### 解决方案\n\n用 `Align` 组件包裹该组件。\n\n### 讨论\n\
  \n使用 `Align` 组件，你可以将子组件对齐到不同的位置。`Align` 构造方法有一个类型为 `AlignmentGeometry` 的命名参数 `alignment`，用于指定对齐方式。`Center`\
  \ 组件实际上是 `Align` 组件的一种特殊形式，其 `alignment` 始终设置为 `Alignment.center`。`Align` 构造方法还有命名参数\
  \ `widthFactor` 和 `heightFactor`。\n\n`AlignmentGeometry` 类有两个子类，用于不同的场景。`Alignment`\
  \ 类表示视觉坐标中的对齐方式。`Alignment` 有两个属性 `x` 和 `y`，用于表示二维坐标系中矩形内的位置。`x` 和 `y` 属性分别指定水平方向和垂直方向的位置。`Alignment(0.0,\
  \ 0.0)` 表示矩形的中心。1.0 单位表示从中心到矩形一侧的距离。2.0 单位表示矩形在特定方向上的长度。例如，`x` 的值为 2.0 表示矩形的宽度。`x`\
  \ 的正值表示中心右侧的位置，负值表示中心左侧的位置。`y` 的值也遵循同样的规则。`Align` 为常用位置提供了几个常量；参见表 5-1。\n\n**表 5-1**\
  \ 对齐常量\n\n| 名称 | 值 | 描述 |\n| --- | --- | --- |\n| `bottomCenter` | `Alignment(0.0,\
  \ 1.0)` | 底边中点。 |\n| `bottomLeft` | `Alignment(-1.0, 1.0)` | 底边最左点。 |\n| `bottomRight`\
  \ | `Alignment(1.0, 1.0)` | 底边最右点。 |\n| `center` | `Alignment(0.0, 0.0)` | 水平和垂直方向的中点。\
  \ |\n| `centerLeft` | `Alignment(-1.0, 0.0)` | 左边中点。 |\n| `centerRight` | `Alignment(1.0,\
  \ 0.0)` | 右边中点。 |\n| `topCenter` | `Alignment(0,0, -1.0)` | 顶边中点。 |\n| `topLeft`\
  \ | `Alignment(-1.0, -1.0)` | 顶边最左点。 |\n| `topRight` | `Alignment(1.0, -1.0)` |\
  \ 顶边最右点。 |\n\n如果在对齐时需要考虑文本方向，则需要使用 `AlignmentDirectional` 类而不是 `Alignment` 类。`AlignmentDirectional`\
  \ 类具有属性 `start` 而不是 `x`。`start` 的值沿文本方向增长。当文本方向为从左到右时，`start` 的值与 `Alignment` 中的\
  \ `x` 含义相同。如果文本方向为从右到左，则 `start` 的值与 `Alignment` 中的 `x` 相反。`AlignmentDirectional`\
  \ 类也为常用位置提供了几个常量；参见表 5-2。这些常量使用 `start` 和 `end` 而不是 `left` 和 `right` 来表示不同方向。\n\n\
  **表 5-2** AlignmentDirectional 常量\n\n| 名称 | 值 | 描述 |\n| --- | --- | --- |\n| `bottomCenter`\
  \ | `AlignmentDirectional (0.0, 1.0)` | 底边中点。 |\n| `bottomStart` | `AlignmentDirectional(-1.0,\
  \ 1.0)` | 起始侧的底角。 |\n| `bottomEnd` | `AlignmentDirectional(1.0, 1.0)` | 结束侧的底角。\
  \ |\n| `center` | `AlignmentDirectional (0.0, 0.0)` | 水平和垂直方向的中点。 |\n| `centerStart`\
  \ | `AlignmentDirectional(-1.0, 0.0)` | 起始边的中点。 |\n| `centerEnd` | `AlignmentDirectional(1.0,\
  \ 0.0)` | 结束边的中点。 |\n| `topCenter` | `AlignmentDirectional(0,0, -1.0)` | 顶边中点。 |\n\
  | `topStart` | `AlignmentDirectional(-1.0, -1.0)` | 起始侧的顶角。 |\n| `topEnd` | `AlignmentDirectional(1.0,\
  \ -1.0)` | 结束侧的顶角。 |\n\n`AlignmentGeometry` 的 `resolve()` 方法接收一个类型为 `TextDirection`\
  \ 的参数，并返回一个 `Alignment` 实例。你可以使用此方法将 `AlignmentDirectional` 实例转换为 `Alignment` 实例。\n\
  \n传递给其子组件的约束是对此组件约束对象调用 `loosen()` 方法的结果。这意味着子组件可以选择一个不超过此组件大小的尺寸。组件本身的大小取决于参数 `widthFactor`\
  \ 和 `heightFactor` 的值及其约束对象。对于宽度，如果 `widthFactor` 不为 null 或 `constraints.maxWidth`\
  \ 为 `double.infinity`，则宽度是受约束限制的，最接近 `childWidth * (widthFactory ?? 1.0)` 的值。否则，宽度由约束决定。高度也遵循同样的规则。\n\
  \n清单 5-3 展示了使用 `Align` 组件的示例。\n\n```dart\nAlign(\nalignment: Alignment.topLeft,\n\
  child: SizedBox(\nwidth: 200,\nheight: 200,\nchild: Center(\nchild: Text(\"TopLeft\"\
  ),\n),\n),\n)\n```\n\n## 5.4 对组件施加约束\n\n### 问题\n\n你希望对组件施加布局约束。\n\n### 解决方案\n\n\
  使用 `ConstrainedBox` 或 `SizedBox`。\n\n\n```markdown\n\n# Discussion\n\n正如食谱 5-1 中所讨论的，`Constraints`和`BoxContraints`实例通常分别用于`RenderObject`和`RenderBox`的`layout()`方法中。当构建\
  \ widget 树时，你可能也想对 widget 施加布局约束。在这种情况下，你可以使用`ConstrainedBox` widget。`ConstrainedBox`构造函数有一个必需的命名参数`constraints`，类型为`BoxConstraints`，用于指定要施加给子组件的约束。\n\
  \n`SizedBox` widget 可以被视为一种特殊的`ConstrainedBox`。`SizedBox`具有命名参数`width`和`height`，它们用于通过`BoxConstraints.tightFor()`方法创建一个紧约束。`SizedBox(width:\
  \ width, height: height, child: child)`等同于`ConstrainedBox(constraints: BoxConstraints.tightFor(width:\
  \ width, height: height), child: child)`。如果你想施加紧约束，那么`SizedBox`比`ConstrainedBox`更方便。`SizedBox`还有其他用于常见用例的命名构造函数；见表\
  \ 5-3。\n\n**表 5-3** `SizedBox`构造函数\n\n| 名称 | 含义 | 描述 |\n| --- | --- | --- |\n| `SizedBox.expand()`\
  \ | `SizedBox(width: double.infinity, height: double.infinity)` | 与其父组件允许的一样大。 |\n\
  | `SizedBox.shrink()` | `SizedBox(width: 0.0, height: 0.0)` | 与其父组件允许的一样小。 |\n|\
  \ `SizedBox.fromSize()` | `SizedBox(width: size.width; height: size.height)` | 具有指定大小的框。\
  \ |\n\n实际应用于子 widget 的约束是提供的`constraints`参数与`ConstrainedBox`或`SizedBox`的父组件提供的约束的组合。组合通过调用`providedContraints.enforce(parentContraints)`完成。结果约束尊重父约束，并尽可能接近提供的约束。`ConstrainedBox`或`SizedBox`的大小是子\
  \ widget 布局后的大小。\n\n列表 5-4 展示了使用`ConstrainedBox`和`SizedBox`的四个示例。第一个示例是`SizedBox`的典型用法模式。第二个示例使用了`SizedBox.shrink()`，导致图像不显示。第三个示例是`ConstrainedBox`的典型用法模式。最后一个示例展示了`ConstrainedBox`实例如何尊重来自父组件的约束。\n\
  \n```\nSizedBox(\n  width: 100,\n  height: 100,\n  child: Text('SizedBox'),\n)\n\
  \nSizedBox.shrink(\n  child: Image.network('https://picsum.photos/50'),\n)\n\nConstrainedBox(\n\
  \  constraints: BoxConstraints(\n    maxWidth: 50,\n    minHeight: 50,\n  ),\n \
  \ child: Text('ConstrainedBox'),\n)\n\nConstrainedBox(\n  constraints: BoxConstraints(\n\
  \    maxWidth: 200,\n  ),\n  child: ConstrainedBox(\n    constraints: BoxConstraints(\n\
  \      maxHeight: 200,\n    ),\n    child: Image.network('https://picsum.photos/300'),\n\
  \  ),\n)\n\n列表 5-4 ConstrainedBox 和 SizedBox 示例\n```\n\n## 5.5 不对 Widget 施加约束\n\n\
  ### 问题\n\n你想要对 widget 施加约束，以允许它们以自然大小渲染。\n\n### 解决方案\n\n使用`UnconstrainedBox`。\n\n\
  ### 讨论\n\n`UnconstrainedBox`与食谱 5-4 中的`ConstrainedBox`相反。`UnconstrainedBox`不对其子组件施加任何约束。子组件可以在`UnconstrainedBox`实例提供的无限空间上自由渲染。`UnconstrainedBox`将尝试通过遵循其自身约束的限制，使用子\
  \ widget 的大小来确定其自身大小。\n\n如果子 widget 的大小大于`UnconstrainedBox`能提供的最大尺寸，子 widget 将被裁剪。否则，子\
  \ widget 将根据`alignment`参数（类型为`AlignmentGeometry`）的值进行对齐。如果子组件溢出父组件，则在调试模式下会显示警告。使用`UnconstrainedBox`时，仍然可以通过`constrainedAxis`参数（类型为`Axis`）向一个轴添加约束。然后子组件仅允许在另一个轴上不受约束地渲染。\n\
  \n在列表 5-5 中，`UnconstrainedBox` widget 被放置在一个具有固定宽度和高度的`SizedBox` widget 中。`UnconstrainedBox`\
  \ widget 在水平轴上受到约束，这意味着最小和最大宽度均为 100px。图像的宽度为 200px，因此它被缩小到 100px 以满足宽度约束。这导致图像高度缩小到\
  \ 150px，超过了父组件`SizedBox` widget 的最大高度 100px。在调试模式下运行时，你可以看到警告消息，提示顶部和底部溢出了 25px。\n\
  \n```\nSizedBox(\n  width: 100,\n  height: 100,\n  child: UnconstrainedBox(\n  \
  \  constrainedAxis: Axis.horizontal,\n    child: Image.network('https://picsum.photos/200/300'),\n\
  \  ),\n)\n\n列表 5-5 UnconstrainedBox 示例\n```\n\n## 5.6 忽略父组件时对 Widget 施加约束\n\n###\
  \ 问题\n\n你希望无论 widget 放置在何处，都对其施加约束。\n\n### 解决方案\n\n使用`OverflowBox`。\n\n### 讨论\n\n\
  在向 widget 施加约束时，通常会尊重来自父 widget 的约束。尊重父约束使得 widget 的布局能够灵活适应不同的使用场景。有时你可能希望 widget\
  \ 只尊重显式提供的约束，而忽略父组件的约束。在这种情况下，你可以使用`OverflowBox`。\n\n`OverflowBox`构造函数具有命名参数`alignment`、`minWidth`、`maxWidth`、`minHeight`和`maxHeight`。如果任何与约束相关的参数为`null`，则使用父约束中的相应值。如果你为所有四个与约束相关的参数提供非空值，则`OverflowBox`的子组件的布局与当前\
  \ widget 完全无关。\n\n在列表 5-6 中，`OverflowBox` widget 创建时所有四个与约束相关的参数都提供了非空值，因此即使它被放置在`SizedBox`\
  \ widget 内部，其大小也始终是`Size(200, 200)`。\n\n```\nSizedBox(\n  width: 100,\n  height:\
  \ 100,\n  child: OverflowBox(\n    minWidth: 200,\n    minHeight: 200,\n    maxWidth:\
  \ 200,\n    maxHeight: 200,\n    child: Image.network('https://picsum.photos/300'),\n\
  \  ),\n)\n\n列表 5-6 OverflowBox 示例\n```\n\n## 5.7 限制大小以允许子 Widget 溢出\n\n### 问题\n\n\
  你希望 widget 具有特定大小，并允许子 widget 溢出。\n\n### 解决方案\n\n使用`SizedOverflowBox`。\n\n### 讨论\n\
  \n`SizedOverflowBox`由一个大小创建。该 widget 的实际大小尊重其约束，并尽可能接近请求的大小。子组件的布局仅使用`SizedOverflowBox`\
  \ widget 的约束。\n\n在列表 5-7 中，`SizedOverflowBox` widget 被放置在一个具有约束`BoxConstraints.loose(Size(100,\
  \ 100))`的`ConstrainedBox` widget 中。`SizedOverflowBox` widget 的请求大小是`Size(50, 50)`。`SizedOverflowBox`的实际大小也是`Size(50,\
  \ 50)`。子`Image` widget 仅使用`SizedOverflowBox`的约束。结果是图像 widget 的大小为`Size(100, 100)`，这溢出其父组件。\n\
  \n```\nConstrainedBox(\n  constraints: BoxConstraints.loose(Size(100, 100)),\n \
  \ child: SizedOverflowBox(\n    size: Size(50, 50),\n    child: Image.network('https://picsum.photos/400'),\n\
  \  ),\n)\n\n列表 5-7 SizedOverflowBox 示例\n```\n\n## 5.8 在无界时限制 Widget 大小\n\n### 问题\n\
  \n你有一个通常匹配其父组件大小的 widget，但你希望它能在需要大小约束的其他地方使用。\n\n### 解决方案\n\n使用`LimitedBox`。\n\
  ```\n\n\n### 讨论\n\n某些 widget 在设计上通常会尽可能放大以匹配父级尺寸。但在其他场景下，这些 widget 需要被约束。例如，当这些\
  \ widget 被添加到垂直列表中时，其高度需要受到限制。`LimitedBox` 构造函数的命名参数 `maxWidth` 和 `maxHeight` 用于指定限制条件。如果\
  \ `LimitedBox` widget 的最大宽度无限制，则其子级宽度将被限制在 `maxWidth` 内。如果其最大高度无限制，则子级高度被限制在 `maxHeight`\
  \ 内。\n\n在代码清单 5-8 中，`LimitedBox` widget 的 `maxHeight` 被设置为 100，因此子级的最大高度为 100px。\n\
  \n```\nLimitedBox(\nmaxHeight: 100,\nchild: Image.network('https://picsum.photos/400'),\n\
  )\n代码清单 5-8\nLimitedBox 示例\n```\n\n## 5.9 缩放与定位 Widget\n\n### 问题\n\n你需要缩放和定位一个 widget。\n\
  \n### 解决方案\n\n使用 `FittedBox` 搭配不同的适应模式和对齐方式。\n\n### 讨论\n\n食谱 5-3 中的 `Align` widget\
  \ 可以通过不同的对齐方式定位其子级。`FittedBox` widget 支持对其子级进行缩放和定位。适应模式通过类型为 `BoxFit` 的参数 `fit`\
  \ 指定。`BoxFit` 是一个枚举类型，其值如表 5-4 所示。\n\n**表 5-4** BoxFit 值\n\n| 名称 | 描述 |\n| --- |\
  \ --- |\n| `fill` | 填充目标框。会忽略源素材的宽高比。 |\n| `contain` | 尽可能大，将源素材完整包含在目标框内。 |\n|\
  \ `cover` | 尽可能小，覆盖整个目标框。 |\n| `fitWidth` | 仅确保显示源素材的完整宽度。 |\n| `fitHeight` | 仅确保显示源素材的完整高度。\
  \ |\n| `none` | 在目标框内对齐源素材，并丢弃框外部分。 |\n| `scaleDown` | 与目标框对齐，必要时缩小源素材以确保其适应框内。如果源素材被缩小，效果等同于\
  \ `contain`；否则等同于 `none`。 |\n\n`FittedBox` 通常用于显示图片时。代码清单 5-9 展示了一个演示 `BoxFit` 不同值的示例。`ImageBox`\
  \ widget 使用 `SizedBox` widget 来限制其尺寸，并将图片放置在 `FittedBox` widget 内部。`DecoratedBox`\
  \ widget 创建了一个红色边框来显示 `ImageBox` widget 的边界。\n\n```\nclass FitPage extends StatelessWidget\
  \ {\n@override\nWidget build(BuildContext context) {\nreturn Scaffold(\nappBar:\
  \ AppBar(\ntitle: Text('适应'),\n),\nbody: Center(\nchild: Wrap(\nspacing: 20,\nrunSpacing:\
  \ 20,\nalignment: WrapAlignment.spaceAround,\nchildren: [\nImageBox(fit: BoxFit.fill),\n\
  ImageBox(fit: BoxFit.contain),\nImageBox(fit: BoxFit.cover),\nImageBox(fit: BoxFit.fitWidth),\n\
  ImageBox(fit: BoxFit.fitHeight),\nImageBox(fit: BoxFit.none),\nImageBox(fit: BoxFit.scaleDown),\n\
  ],\n),\n),\n);\n}\n}\nclass ImageBox extends StatelessWidget {\nconst ImageBox({\n\
  Key key,\nthis.boxWidth = 150,\nthis.boxHeight = 170,\nthis.imageWidth = 200,\n\
  this.fit,\n});\nfinal double boxWidth;\nfinal double boxHeight;\nfinal double imageWidth;\n\
  final BoxFit fit;\n@override\nWidget build(BuildContext context) {\nreturn DecoratedBox(\n\
  decoration: BoxDecoration(border: Border.all(color: Colors.red)),\nchild: SizedBox(\n\
  width: boxWidth,\nheight: boxHeight,\nchild: FittedBox(\nfit: fit,\nchild: SizedBox(\n\
  width: imageWidth,\nheight: imageWidth,\nchild: Image.network('https://dummyimage.com/${imageWidth.toInt()}'\n\
  '&text=${fit.toString().substring(7)}'),\n),\n),\n),\n);\n}\n}\n代码清单 5-9\nBoxFit\
  \ 的不同值\n```\n\n图 5-1 展示了代码清单 5-9 的截图效果。图片中的文字显示了该 `ImageBox` widget 所采用的 `BoxFit`\
  \ 值。\n\n![../images/479501_1_En_5_Chapter/479501_1_En_5_Fig1_HTML.jpg](img/479501_1_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1** BoxFit 的不同值\n\n## 5.10 旋转 Widget\n\n### 问题\n\n你需要旋转一个 widget。\n\n###\
  \ 解决方案\n\n使用 `RotatedBox`。\n\n### 讨论\n\n`RotatedBox` widget 会在布局前旋转其子级。旋转角度通过 `int`\
  \ 类型的顺时针四分之一圈数指定，使用 `quarterTurns` 参数。`quarterTurns` 参数值为 1 表示顺时针旋转 90 度。\n\n在代码清单\
  \ 5-10 中，`Text` widget 被旋转了四分之一圈。\n\n```\nRotatedBox(\nquarterTurns: 1,\nchild:\
  \ Text(\n'Hello World',\ntextScaleFactor: 2,\n),\n)\n代码清单 5-10\nRotatedWidget 示例\n\
  ```\n\n## 5.11 为 Widget 添加内边距\n\n### 问题\n\n你需要为 widget 周围添加内边距（padding）。\n\n###\
  \ 解决方案\n\n使用 `Padding`。\n\n### 讨论\n\n`Padding` widget 会在其子级周围创建空白空间。传递给其子级的布局约束，是\
  \ widget 自身约束减去内边距后的结果，这会导致子级以更小的尺寸进行布局。内边距通过必需的 `padding` 参数指定，其类型为 `EdgeInsetsGeometry`。\n\
  \n与 `AlignmentGeometry` 类似，`EdgeInsetsGeometry` 有两个子类：`EdgeInsets` 和 `EdgeInsetsDirectional`。`EdgeInsets`\
  \ 类以视觉坐标表示偏移量。偏移量通过 `left`、`right`、`top` 和 `bottom` 边指定。表 5-5 展示了 `EdgeInsets` 类的构造函数。\n\
  \n**表 5-5** EdgeInsets 构造函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `EdgeInsets.all()`\
  \ | 所有边的偏移量都设置为给定值。 |\n| `EdgeInsets.fromLTRB()` | 分别为左、上、右、下边指定偏移量值。 |\n| `EdgeInsets.only()`\
  \ | 包含命名参数 left、top、right 和 bottom，默认值为 0.0。 |\n| `EdgeInsets.symmetric()` | 包含命名参数\
  \ vertical 和 horizontal，用于创建对称偏移量。 |\n\n如需考虑文本方向，应使用 `EdgeInsetsDirectional` 类代替\
  \ `EdgeInsets`。`EdgeInsetsDirectional` 类使用 `start` 和 `end` 来代替 `left` 和 `right`。它提供了\
  \ `EdgeInsetsDirectional.fromSTEB()` 构造函数，用于从 `start`、`top`、`end` 和 `bottom` 偏移量创建内边距。`EdgeInsetsDirectional.only()`\
  \ 构造函数与 `EdgeInsets.only()` 类似。\n\n代码清单 5-11 展示了 `Padding` widget 的示例。\n\n```\n\
  Padding(\npadding: EdgeInsets.all(20),\nchild: Image.network('https://picsum.photos/200'),\n\
  )\n代码清单 5-11\nPadding 示例\n```\n\n## 5.12 按宽高比调整 Widget 尺寸\n\n### 问题\n\n你需要调整 widget\
  \ 尺寸以保持特定的宽高比。\n\n### 解决方案\n\n使用 `AspectRatio`。\n\n\n\n### 讨论\n\n`AspectRatio` 构造函数需要一个必填参数\
  \ `aspectRatio`，用于指定宽高比的数值。例如，4:3 的宽高比对应的值为 `4.0/3.0`。`AspectRatio` 组件会尝试在尊重其布局约束的前提下，找到保持该宽高比的最佳尺寸。\n\
  \n这个过程从将宽度设置为约束的最大宽度开始。如果最大宽度是有限的，则高度通过 `width / aspectRatio` 计算得出。否则，高度被设置为约束的最大高度，宽度则设置为\
  \ `height * aspectRatio`。可能还会有些额外步骤，以确保计算出的宽度和高度满足布局约束。例如，如果高度小于约束的最小高度，则高度被设置为该最小值，宽度则基于高度和宽高比重新计算。一般规则是先检查宽度再检查高度，先检查最大值再检查最小值。最终尺寸可能不完全满足宽高比要求，但必须满足布局约束。\n\
  \n在代码清单 5-12 中，`AspectRatio` 组件被放置在一个约束宽松的 `ConstrainedBox` 内，其约束为 `Size(200, 200)`。宽高比是\
  \ `4.0/3.0`，因此高度基于 `200 / (4.0 / 3.0) = 150.0` 计算得出。`AspectRatio` 的最终尺寸为 `Size(200.0,\
  \ 150.0)`。\n\n```\nConstrainedBox(\nconstraints: BoxConstraints.loose(Size(200,\
  \ 200)),\nchild: AspectRatio(\naspectRatio: 4.0 / 3.0,\nchild: Image.network('https://picsum.photos/400/300'),\n\
  ),\n)\n代码清单 5-12\nAspectRatio 示例\n```\n\n## 5.13 变换组件\n\n### 问题\n\n你想对一个组件应用变换。\n\
  \n### 解决方案\n\n使用 `Transform`。\n\n### 讨论\n\n`Transform` 组件可以在绘制其子组件之前对其应用变换。变换使用\
  \ `Matrix4` 实例来表示。`Transform` 构造函数具有表 5-6 中所示的命名参数。\n\n**表 5-6** `Transform` 的命名参数\n\
  \n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `transform` | `Matrix4` | 用于变换子组件的矩阵。\
  \ |\n| `origin` | `Offset` | 应用变换的坐标系原点。 |\n| `alignment` | `AlignmentGeometry`\
  \ | 原点的对齐方式。 |\n| `transformHitTests` | `bool` | 执行命中测试时是否应用变换。 |\n\n`Transform`\
  \ 类提供了其他构造函数来创建常见的变换：\n\n*   `Transform.rotate()` – 通过旋转指定角度来变换子组件。\n*   `Transform.scale()`\
  \ – 通过使用指定的缩放因子均匀缩放来变换子组件。\n*   `Transform.translate()` – 通过平移指定的偏移量来变换子组件。\n\n\
  代码清单 5-13 展示了使用 `Transform` 命名构造函数的示例。\n\n```\nTransform.rotate(\nangle: pi / 4.0,\n\
  origin: Offset(10, 10),\nchild: Text('Hello World'),\n)\nTransform.translate(\n\
  offset: Offset(50, 50),\nchild: Text('Hello World'),\n)\n代码清单 5-13\nTransform 示例\n\
  ```\n\n## 5.14 在组件上控制不同的布局方面\n\n### 问题\n\n你想为一个组件定义不同的布局方面。\n\n### 解决方案\n\n使用 `Container`。\n\
  \n### 讨论\n\nFlutter 有很多用于控制布局不同方面的组件。例如，`SizedBox` 组件控制尺寸，而 `Align` 组件控制对齐方式。如果你想在同一个组件上控制不同的布局方面，可以通过嵌套地包裹这些组件来实现。实际上，Flutter\
  \ 提供了一个 `Container` 组件，使得定义不同的布局方面更加容易。\n\n表 5-7 展示了 `Container` 构造函数的命名参数。你不能同时为\
  \ `color` 和 `decoration` 提供非空值，因为 `color` 仅仅是创建 `BoxDecoration(color: color)` 的一种简写。如果\
  \ `width` 或 `height` 不为空，则它们的值将用于收紧约束。\n\n**表 5-7** `Container` 的命名参数\n\n| 名称 |\
  \ 类型 | 描述 |\n| --- | --- | --- |\n| `alignment` | `AlignmentGeometry` | 子组件的对齐方式。\
  \ |\n| `padding` | `EdgeInsetsGeometry` | 装饰内部的空间。 |\n| `color` | `Color` | 背景颜色。\
  \ |\n| `decoration` | `Decoration` | 绘制在子组件背后的装饰。 |\n| `foregroundDecoration` |\
  \ `Decoration` | 绘制在子组件前面的装饰。 |\n| `width` | `double` | 子组件的宽度。 |\n| `height` |\
  \ `double` | 子组件的高度。 |\n| `constraints` | `BoxConstraints` | 额外的约束。 |\n| `margin`\
  \ | `EdgeInsetsGeometry` | 装饰周围的空间。 |\n| `transform` | `Matrix4` | 应用于容器的变换。 |\n\
  \n`Container` 是基于参数值对不同组件的组合。代码清单 5-14 展示了 `Container` 所使用的不同组件的嵌套结构以及这些组件可能用到的参数。如果某个参数的值为空，则相应的组件可能不存在。\n\
  \n```\nTransform (transform)\n- Padding (margin)\n- ConstrainedBox (constraints,\
  \ width, height)\n- DecoratedBox (foregroundDecoration)\n- DecoratedBox (decoration,\
  \ color)\n- Padding (padding, decoration)\n- Align (alignment)\n- child\n代码清单 5-14\n\
  Container 的结构\n```\n\n代码清单 5-15 展示了一个使用了所有命名参数的 `Container` 组件示例。\n\n```\nContainer(\n\
  alignment: Alignment.bottomRight,\npadding: EdgeInsets.all(16),\ncolor: Colors.red.shade100,\n\
  foregroundDecoration: BoxDecoration(\nimage: DecorationImage(\nimage: NetworkImage('https://picsum.photos/100'),\n\
  ),\n),\nwidth: 300,\nheight: 300,\nconstraints: BoxConstraints.loose(Size(400, 400)),\n\
  margin: EdgeInsets.all(32),\ntransform: Matrix4.rotationZ(0.1),\nchild: Text(\n\
  '你好世界',\ntextScaleFactor: 3,\n),\n)\n代码清单 5-15\nContainer 示例\n```\n\n图 5-2 展示了代码清单\
  \ 5-15 中 `Container` 组件的结构。你可以清晰地看到这些组件是如何嵌套的。\n\n![../images/479501_1_En_5_Chapter/479501_1_En_5_Fig2_HTML.jpg](img/479501_1_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2** `Container` 的结构\n\n## 5.15 实现 Flex 框布局\n\n### 问题\n\n你有多个组件需要布局，并且希望它们能够占据额外的空间。\n\
  \n### 解决方案\n\n使用 `Flex`、`Column`、`Row`、`Flexible` 和 `Expanded`。\n\n### 讨论\n\n要使用弹性框模型布局多个组件，你可以使用\
  \ Flutter 提供的一组组件，包括 `Flex`、`Column`、`Row`、`Flexible`、`Expanded` 和 `Spacer`。实际上，只需理解\
  \ `Flex` 和 `Flexible` 组件即可。`Flex` 组件用作布局容器，而 `Flexible` 组件用于包裹容器内的子组件。`Flex` 组件将其子组件显示为一维数组。它支持在水平和垂直两个方向上布局子组件。`Row`\
  \ 和 `Column` 是 `Flex` 的子类，它们分别只在水平方向和垂直方向放置子组件。`Flex` 容器中的 `Flexible` 组件可以控制子组件如何伸缩以占据额外空间。`Flex`\
  \ 组件的子组件可以是弹性的，也可以不是。如果你想让一个子组件具有弹性，只需将其包裹在 `Flexible` 组件中即可。\n\n与 CSS 弹性框布局类似，`Flex`\
  \ 组件使用两个轴进行布局。子组件沿其排列的轴称为*主轴*。另一个轴称为*交叉轴*。主轴通过类型为 `Axis` 的 `direction` 参数配置。如果值是\
  \ `Axis.horizontal`，则主轴为水平轴，而交叉轴为垂直轴。如果值是 `Axis.vertical`，则主轴为垂直轴，而交叉轴为水平轴。`Row`\
  \ 组件始终使用水平轴作为主轴，`Column` 组件始终使用垂直轴作为主轴。如果主轴已知，则应使用 `Row` 或 `Column` 组件，而不是 `Flex`\
  \ 组件。\n\n\n\n#### 弹性盒子布局算法\n\n弹性盒子的子节点布局较为复杂，需分多步进行。第一步，对每个弹性因子为 null 或零的子节点进行布局，这些是非弹性子节点。用于布局这些子节点的约束取决于\
  \ `crossAxisAlignment` 的值。如果 `crossAxisAlignment` 的值是 `CrossAxisAlignment.stretch`，则约束将是交叉轴上最大尺寸的紧约束。否则，约束仅在交叉轴上设置最大值。例如，如果方向是\
  \ `Axis.horizontal` 且 `crossAxisAlignment` 为 `CrossAxisAlignment.stretch`，则这些非弹性子节点的约束会将\
  \ `minHeight` 和 `maxHeight` 都设置为 Flex 约束的 `maxHeight`。这使得这些子节点占据交叉轴上的所有空间。第一步中，会记录这些子节点的总分配尺寸以及交叉轴尺寸的最大值。\n\
  \n第二步，对每个具有弹性因子的子节点进行布局，这些是弹性子节点。根据第一步，已知主轴已分配的尺寸。基于主轴的**最大尺寸**和**已分配尺寸**可以计算出**自由空间**。自由空间根据弹性因子在所有弹性子节点之间分配。弹性因子为\
  \ `2.0` 的子节点获得的自由空间量是弹性因子为 `1.0` 的子节点的两倍。假设有三个子节点，其弹性因子分别为 `1.0`、`2.0` 和 `3.0`，如果自由空间是\
  \ `120px`，那么这些子节点获得的额外空间将分别是 `20px`、`40px` 和 `60px`。为每个子节点基于弹性因子计算出的值将成为主轴上的最大约束。主轴上的最小约束取决于该子节点的\
  \ `FlexFit` 值。如果 `fit` 值是 `FlexFit.tight`，则最小值与最大值相同，这会在主轴上产生紧约束。如果 `fit` 值是 `FlexFit.loose`，则最小值为\
  \ `0.0`，这会在主轴上产生松约束。交叉轴上的约束与 Flex 小部件的约束相同。最终的约束被用于布局这些弹性子节点。\n\n第三步，确定主轴和交叉轴的**范围**。如果\
  \ `mainAxisSize` 的值为 `MainAxisSize.max`，则主轴范围是当前 Flex 小部件的最大约束。否则，主轴范围是所有子节点的**已分配尺寸**。交叉轴的范围是所有子节点交叉轴约束的**最大值**。\n\
  \n最后一步，根据 `mainAxisAlignment` 和 `crossAxisAlignment` 的值确定每个子节点的位置。\n\n表 5-8 展示了枚举\
  \ `MainAxisAlignment` 的值。\n\n表 5-8\n\n`MainAxisAlignment` 值\n\n| 名称 | 描述 |\n| ---\
  \ | --- |\n| `start` | 将子节点放置在靠近主轴起始端的位置。起始位置对于水平方向由 `TextDirection` 决定，对于垂直方向由\
  \ `VerticalDirection` 决定。 |\n| `end` | 将子节点放置在靠近主轴末端的位置。末端位置的确定方式与起始端相同。 |\n| `center`\
  \ | 将子节点放置在靠近中间的位置。 |\n| `spaceBetween` | 将自由空间均匀分布在子节点之间。 |\n| `spaceAround` |\
  \ 将自由空间均匀分布在子节点之间，并在第一个子节点之前和最后一个子节点之后各留一半空间。 |\n| `spaceEvenly` | 将自由空间均匀分布在子节点之间，包括第一个子节点之前和最后一个子节点之后。\
  \ |\n\n表 5-9 展示了枚举 `CrossAxisAlignment` 的值。\n\n表 5-9\n\n`CrossAxisAlignment` 值\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `start` | 将子节点放置为其起始边缘与交叉轴的起始侧对齐。起始位置对于水平方向由 `TextDirection`\
  \ 决定，对于垂直方向由 `VerticalDirection` 决定。 |\n| `end` | 将子节点放置为其末端边缘与交叉轴的末端侧对齐。末端位置的确定方式与起始端相同。\
  \ |\n| `center` | 将子节点放置为其中心与交叉轴中心对齐。 |\n| `stretch` | 要求子节点填充满交叉轴。 |\n| `baseline`\
  \ | 在交叉轴上匹配子节点的基线。 |\n\n#### Flexible\n\n`Flexible` 具有 `flex` 参数用于指定弹性因子，以及 `fit`\
  \ 参数用于指定 `BoxFit` 值。`flex` 参数的默认值是 `1`，而 `fit` 的默认值是 `BoxFit.loose`。`Expanded` 是\
  \ `Flexible` 的一个子类，其 `fit` 参数被设置为 `BoxFit.tight`。\n\n在代码清单 5-16 中，`Column` 小部件被放置在一个\
  \ `LimitedBox` 小部件中以限制其高度。`Column` 小部件的所有子节点都是非弹性的。\n\n```\nLimitedBox(\nmaxHeight:\
  \ 320,\nchild: Column(\ncrossAxisAlignment: CrossAxisAlignment.end,\nmainAxisAlignment:\
  \ MainAxisAlignment.spaceAround,\nchildren: [\nImage.network('https://picsum.photos/50'),\n\
  Image.network('https://picsum.photos/70'),\nImage.network('https://picsum.photos/90'),\n\
  ],\n),\n)\n代码清单 5-16\n包含非弹性子节点的 Flex 小部件\n```\n\n在代码清单 5-17 中，`Column` 小部件同时包含弹性和非弹性子节点。可以通过使用\
  \ `Flexible` 或 `Expanded` 小部件进行包裹来创建 `Flexible` 小部件。\n\n```\nLimitedBox(\nmaxHeight:\
  \ 300,\nchild: Column(\nmainAxisAlignment: MainAxisAlignment.spaceBetween,\nchildren:\
  \ [\nFlexible(\nchild: Image.network('https://picsum.photos/50'),\n),\nImage.network('https://picsum.photos/40'),\n\
  Expanded(\nchild: Image.network('https://picsum.photos/50'),\n),\nExpanded(\nflex:\
  \ 2,\nchild: Image.network('https://picsum.photos/50'),\n),\n],\n),\n)\n代码清单 5-17\n\
  包含弹性与非弹性子节点的 Flex 小部件\n```\n\n## 5.16 显示重叠的小部件\n\n### 问题\n\n你想要布局可能会相互重叠的小部件。\n\n\
  ### 解决方案\n\n使用 `Stack` 或 `IndexedStack`。\n\n\n\n### 讨论\n\n`Stack` widget 的子组件可以是已定位的或未定位的。已定位的子组件会被包装在至少有一个非空属性的\
  \ `Positioned` widget 中。`Stack` widget 的尺寸由所有未定位的子组件决定。布局过程分为两个阶段。\n\n第一阶段是布局所有未定位的子组件。用于未定位子组件的约束取决于\
  \ `StackFit` 类型的 `fit` 属性值：\n\n*   `StackFit.loose` – 由 `constraints.loosen()` 创建的松散约束。\n\
  *   `StackFit.expand` – 由 `BoxConstraints.tight(constraints.biggest)` 创建的紧约束。\n\
  *   `StackFit.passthrough` – 与 `Stack` widget 相同的约束。\n\n`Stack` widget 的尺寸由所有未定位子组件的最大尺寸决定。\n\
  \n在第二阶段，所有未定位的子组件会根据 `alignment` 属性进行定位。用于已定位子组件的约束由 `Stack` widget 的尺寸及其属性决定。`Positioned`\
  \ widget 有六个属性：`left`、`top`、`right`、`bottom`、`width` 和 `height`。`left`、`right` 和\
  \ `width` 属性用于确定紧宽度约束。`top`、`bottom` 和 `height` 属性用于确定紧高度约束。例如，如果 `left` 和 `right`\
  \ 值都不为 null，则紧宽度约束为 `widthOfStack – right – left`。然后，已定位的子组件会根据两个轴上的 `left`、`right`、`top`\
  \ 和 `bottom` 值进行定位。如果所有这些值都为 null，则根据 `alignment` 进行定位。\n\n`Stack` 的子组件按顺序绘制，第一个子组件位于最底层。`children`\
  \ 数组中的顺序决定了子组件如何相互重叠。\n\n`IndexedStack` 类是 `Stack` 的子类。`IndexedStack` 实例仅显示子组件列表中的单个子组件。`IndexedStack`\
  \ 构造函数不仅具有与 `Stack` 构造函数相同的参数，还包括一个 `int` 类型的 `index` 参数，用于指定要显示的子组件索引。如果 `index`\
  \ 参数的值为 null，则不显示任何内容。`IndexedStack` 的布局与 `Stack` 相同。`IndexedStack` 类仅仅是绘制方式不同。这意味着即使只有一个子组件被显示，所有子组件仍然需要像\
  \ `Stack` 一样进行布局。\n\n清单 5-18 展示了一个包含已定位子组件的 `Stack` widget 示例。\n\n```\nStack(\n\
  children: [\nImage.network('https://picsum.photos/200'),\nImage.network('https://picsum.photos/100'),\n\
  Positioned(\nright: 0,\nbottom: 0,\nchild: Image.network('https://picsum.photos/150'),\n\
  ),\n],\n)\nListing 5-18\nExample of Stack\n```\n\n## 5.17 在多行中显示组件\n\n### 问题\n\n\
  你希望在多行（水平或垂直）中显示组件。\n\n### 解决方案\n\n使用 `Wrap`。\n\n### 讨论\n\n`Flex` widget 不允许子组件的尺寸超过主轴方向的尺寸。当没有足够空间容纳子组件时，`Wrap`\
  \ widget 会创建新的行。表格 5-10 展示了 `Wrap` 构造函数的命名参数。\n\n表格 5-10 `Wrap` 的命名参数\n\n| 名称 |\
  \ 值 | 默认值 | 描述 |\n| --- | --- | --- | --- |\n| `direction` | `Axis` | `Axis.horizontal`\
  \ | 主轴方向。 |\n| `alignment` | `WrapAlignment` | `WrapAlignment.start` | 主轴方向上子组件在行内的对齐方式。\
  \ |\n| `spacing` | `Double` | `0.0` | 主轴方向上子组件之间的间距。 |\n| `runAlignment` | `WrapAlignment`\
  \ | `WrapAlignment.start` | 交叉轴方向上行的对齐方式。 |\n| `runSpacing` | `Double` | `0.0` |\
  \ 交叉轴方向上各行之间的间距。 |\n| `crossAxisAlignment` | `WrapCrossAlignment` | `WrapCrossAlignment.start`\
  \ | 交叉轴方向上子组件在行内的对齐方式。 |\n| `textDirection` | `TextDirection` |  | 水平布局子组件的顺序。 |\n\
  | `verticalDirection` | `VerticalDirection` | `VerticalDirection.down` | 垂直布局子组件的顺序。\
  \ |\n| `children` | `List<Widget>` | `[]` | 子组件列表。 |\n\n`WrapAlignment` 枚举的值与 `MainAxisAlignment`\
  \ 相同。`WrapCrossAlignment` 枚举只有 `start`、`end` 和 `center` 三个值。\n\n清单 5-19 展示了一个使用\
  \ `Wrap` widget 包装十个 `Image` widget 的示例。\n\n```\nWrap(\nspacing: 10,\nrunSpacing:\
  \ 5,\ncrossAxisAlignment: WrapCrossAlignment.center,\nchildren: List.generate(\n\
  10,\n(index) => Image.network('https://picsum.photos/${50 + index * 10}'),\n),\n\
  )\nListing 5-19\nExample of Wrap\n```\n\n## 5.18 创建自定义单子布局\n\n### 问题\n\n你希望为单个子组件创建自定义布局。\n\
  \n### 解决方案\n\n使用 `CustomSingleChildLayout`。\n\n### 讨论\n\n如果那些用于单个子组件的内置布局 widget\
  \ 不能满足你的需求，你可以使用 `CustomSingleChildLayout` 创建自定义布局。`CustomSingleChildLayout` widget\
  \ 将布局委托给一个 `SingleChildLayoutDelegate` 实例。你需要创建自己的 `SingleChildLayoutDelegate` 子类来实现表格\
  \ 5-11 中所示的方法。\n\n表格 5-11 `SingleChildLayoutDelegate` 的方法\n\n| 名称 | 描述 |\n| ---\
  \ | --- |\n| `getConstraintsForChild(BoxConstraints constraints)` | 获取子组件的约束。 |\n\
  | `getPositionForChild(Size size, Size childSize)` | 根据此 widget 和子组件的尺寸获取子组件的位置。\
  \ |\n| `getSize(BoxConstraints constraints)` | 获取此 widget 的尺寸。 |\n| `shouldRelayout()`\
  \ | 是否应该重新布局。 |\n\n此 widget 的尺寸是委托的 `getSize()` 方法返回的尺寸在应用约束后的结果。子组件的布局使用委托的 `getConstraintsForChild()`\
  \ 方法返回的约束完成。最后，子组件的位置会用委托的 `getPositionForChild()` 方法返回的值更新。\n\n在清单 5-20 中，`FixedPositionLayoutDelegate`\
  \ 类重写了 `getSize()` 方法来提供父 widget 的尺寸。它还重写了 `getPositionForChild()` 方法来提供子组件的位置。`getConstraintsForChild()`\
  \ 方法也被重写以返回紧缩约束。\n\n```\nclass FixedPositionLayoutDelegate extends SingleChildLayoutDelegate\
  \ {\n@override\nbool shouldRelayout(SingleChildLayoutDelegate oldDelegate) {\nreturn\
  \ false;\n}\n@override\nSize getSize(BoxConstraints constraints) {\nreturn constraints.constrain(Size(300,\
  \ 300));\n}\n@override\nBoxConstraints getConstraintsForChild(BoxConstraints constraints)\
  \ {\nreturn constraints.tighten(width: 300, height: 300);\n}\n@override\nOffset\
  \ getPositionForChild(Size size, Size childSize) {\nreturn Offset(50, 50);\n}\n\
  }\nListing 5-20\nCustom single child layout delegate\n```\n\n清单 5-21 展示了如何使用 `FixedPositionLayoutDelegate`。\n\
  \n```\nCustomSingleChildLayout(\ndelegate: FixedPositionLayoutDelegate(),\nchild:\
  \ Image.network('https://picsum.photos/100'),\n)\nListing 5-21\nExample of FixedPositionLayoutDelegate\n\
  ```\n\n## 5.19 创建自定义多子布局\n\n### 问题\n\n你希望为多个子组件创建自定义布局。\n\n### 解决方案\n\n使用 `CustomMultiChildLayout`\
  \ 和 `MultiChildLayoutDelegate`。\n\n好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n### 讨论\n\n如果那些内建的多子元素组件无法满足你的需求，你可以使用 `CustomMultiChildLayout` 创建自定义布局。与 `CustomSingleChildLayout`\
  \ 类似，`CustomMultiChildLayout` 将布局逻辑委托给一个 `MultiChildLayoutDelegate` 实例。`CustomMultiChildLayout`\
  \ 的所有子元素必须包裹在 `LayoutId` 组件中，以便为它们提供唯一的 ID。在表 5-12 展示的所有方法中，`performLayout()` 和\
  \ `shouldRelayout()` 方法是必须实现的。所有其他方法都有默认实现。在 `performLayout()` 方法的实现中，必须为每个子元素恰好调用一次\
  \ `layoutChild()` 方法。\n\n表 5-12\n`MultiChildLayoutDelegate` 的方法\n\n| 名称 | 描述 |\n\
  | --- | --- |\n| `hasChild(Object childId)` | 检查是否存在具有给定 ID 的子元素。 |\n| `layoutChild(Object\
  \ childId, BoxConstraints constraints)` | 使用提供的约束条件布局子元素。 |\n| `positionChild(Object\
  \ childId, Offset offset)` | 将子元素定位到给定的偏移量。 |\n| `getSize(BoxConstraints constraints)`\
  \ | 获取此组件的大小。 |\n| `performLayout(Size size)` | 实际的布局逻辑。 |\n| `shouldRelayout()`\
  \ | 是否应该重新布局。 |\n\n代码清单 5-22 展示了一个自定义的多子元素布局委托。该委托使用递增的整数值作为布局 ID。子元素的布局 ID 必须从\
  \ 0 开始。在 `performLayout()` 方法中，`layoutChild()` 方法被调用在每个子元素上，从第一个子元素开始，并使用宽松约束，这让第一个子元素可以采用其自然尺寸。第一个子元素的实际尺寸被记录下来。然后，使用\
  \ `Offset.zero` 调用 `positionChild()` 方法，将第一个子元素放置在左上角。在第一个子元素之后，依次对其它所有子元素调用 `layoutChild()`\
  \ 和 `positionChild()` 方法，并使用递增的尺寸和位置偏移量。\n\n```\nclass GrowingSizeLayoutDelegate\
  \ extends MultiChildLayoutDelegate {\n@override\nvoid performLayout(Size size) {\n\
  int index = 0;\nSize childSize = layoutChild(index, BoxConstraints.loose(size));\n\
  Offset offset = Offset.zero;\npositionChild(index, offset);\nindex++;\nwhile (hasChild(index))\
  \ {\ndouble sizeFactor = 1.0 + index * 0.1;\ndouble offsetFactor = index * 10.0;\n\
  childSize = layoutChild(\nindex,\nBoxConstraints.tight(Size(\nchildSize.width *\
  \ sizeFactor, childSize.height * sizeFactor)));\noffset = offset.translate(offsetFactor,\
  \ offsetFactor);\npositionChild(index, offset);\nindex++;\n}\n}\n@override\nbool\
  \ shouldRelayout(MultiChildLayoutDelegate oldDelegate) {\nreturn false;\n}\n@override\n\
  Size getSize(BoxConstraints constraints) =>\nconstraints.constrain(Size(400, 400));\n\
  }\n代码清单 5-22\n自定义多子元素布局委托\n```\n\n代码清单 5-23 展示了 `GrowingSizeLayoutDelegate` 的用法。`CustomMultiChildLayout`\
  \ 的子元素是六个嵌套在 `SizedBox` 中的图片。需要包裹 `LayoutId` 组件来将布局 ID 传递给委托。\n\n```\nCustomMultiChildLayout(\n\
  delegate: GrowingSizeLayoutDelegate(),\nchildren: List.generate(\n6,\n(index) =>\
  \ LayoutId(\nid: index,\nchild: DecoratedBox(\ndecoration:\nBoxDecoration(border:\
  \ Border.all(color: Colors.red)),\nchild: SizedBox(\nwidth: 70,\nheight: 70,\nchild:\
  \ Image.network(\n'https://dummyimage.com/${50 + index * 10}'),\n),\n),\n),\n),\n\
  )\n代码清单 5-23\n`GrowingSizeLayoutDelegate` 示例\n```\n\n图 5-3 展示了使用 `GrowingSizeLayoutDelegate`\
  \ 的结果。\n\n![../images/479501_1_En_5_Chapter/479501_1_En_5_Fig3_HTML.jpg](img/479501_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3\n使用 `GrowingSizeLayoutDelegate` 的结果\n\n## 5.20 总结\n\n借助 Flutter 中的布局组件，可以轻松满足构建\
  \ Flutter 应用时常见的布局需求。本章介绍了许多用于单子元素和多子元素的布局组件。在下一章中，我们将讨论表单组件。\n\n"
- "# 6. 表单组件\n\n表单控件在移动应用中对于与用户交互非常重要。Flutter 提供了一套用于 Material Design 和 iOS 风格的表单组件。这些表单组件通常没有内部状态。它们的外观和行为完全由构造函数参数定义。通过在前代组件中维护状态，表单组件会重新渲染以反映状态变化。本章涵盖了与表单组件基本用法相关的方案。\n\
  \n## 6.1 收集文本输入\n\n### 问题\n\n你想要收集文本输入。\n\n### 解决方案\n\n对于 Material Design 使用 `TextField`，对于\
  \ iOS 风格使用 `CupertinoTextField`。\n\n### 讨论\n\n要在 Flutter 应用中收集用户输入，你可以为 Material\
  \ Design 使用 `TextField` 组件，或者为 iOS 风格使用 `CupertinoTextField` 组件。这两个组件具有相似的使用模式和表现。实际上，这两个组件都封装了相同的\
  \ `EditableText`，后者提供了支持滚动、选择和光标移动的基本文本输入能力。`EditableText` 是一个高度可定制的组件，拥有许多命名参数。本方案着重介绍如何设置\
  \ `TextField` 或 `CupertinoTextField` 组件的初始值，并从中获取文本。\n\n`EditableText` 组件的文本由一个\
  \ `TextEditingController` 实例控制。你可以在创建新的 `EditableText` 组件时，使用 `controller` 参数来设置一个\
  \ `TextEditingController` 实例。该控制器维护了与相应 `EditableText` 组件的双向数据绑定。控制器有一个 `text` 属性来跟踪当前编辑的文本，以及一个类型为\
  \ `TextSelection` 的 `selection` 属性来跟踪当前选中的文本。每当 `EditableText` 组件中的文本被用户修改或选中时，关联的\
  \ `TextEditingController` 实例的 `text` 和 `selection` 属性将被更新。如果你修改了 `TextEditingController`\
  \ 实例的 `text` 或 `selection` 属性，`EditableText` 组件会自行更新。`TextEditingController` 类是\
  \ `ValueNotifier<TextEditingValue>` 的子类，因此你可以向控制器添加监听器，以便在文本或选区发生变化时收到通知。在创建新的 `TextEditingController`\
  \ 实例时，你可以通过 `text` 参数传入一些文本，这些文本将成为对应 `EditableText` 组件的初始文本。\n\n让我们看看从 `EditableText`\
  \ 组件获取文本的三种不同方法。\n\n#### 使用 TextEditingController\n\n第一种方法是使用 `TextEditingController`。代码清单\
  \ 6-1 中的 `ReverseText` 组件用于反转一个输入字符串。`TextEditingController` 实例在创建时带有初始文本 `<input>`。当按钮被按下时，`_value`\
  \ 被更新为从控制器检索到的文本。反转后的字符串将被显示出来。\n\n```\nclass ReverseText extends StatefulWidget\
  \ {\n@override\n_ReverseTextState createState() => _ReverseTextState();\n}\nclass\
  \ _ReverseTextState extends State {\nfinal TextEditingController _controller = TextEditingController(\n\
  text: \"\",\n);\nString _value;\n@override\nWidget build(BuildContext context) {\n\
  return Column(\ncrossAxisAlignment: CrossAxisAlignment.start,\nchildren: [\nRow(\n\
  children: [\nExpanded(\nchild: TextField(\ncontroller: _controller,\n),\n),\nRaisedButton(\n\
  child: Text('Go'),\nonPressed: () {\nthis.setState(() {\n_value = _controller.text;\n\
  });\n},\n),\n],\n),\nText( (_value ?? \"). split(\").reversed.join()),\n],\n);\n\
  }\n}\n代码清单 6-1\n使用 TextEditingController 获取文本\n```\n\n图 6-1 展示了代码清单 6-1 中代码的截图。\n\
  \n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig1_HTML.jpg](img/479501_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1\n使用 `TextEditingController`\n\n\n\n#### 使用 `TextEditingController` 的监听器\n\
  \n`TextEditingController` 实例同时也是 `ValueNotifier<TextEditingValue>` 的实例，因此你可以为其添加监听器来响应通知。在代码清单\
  \ 6-2 中，监听器函数 `_handleTextChanged` 在接收到变更通知时会调用 `setState()` 函数来更新状态。监听器在 `initState()`\
  \ 函数中添加，并在 `dispose()` 函数中移除，这样可以确保资源被妥善清理。\n\n```\nclass ReverseTextWithListener\
  \ extends StatefulWidget {\n@override\n_ReverseTextWithListenerState createState()\
  \ =>\n_ReverseTextWithListenerState();\n}\nclass _ReverseTextWithListenerState extends\
  \ State {\nTextEditingController _controller;\nString _value;\n@override\nvoid initState()\
  \ {\nsuper.initState();\n_controller = TextEditingController(\ntext: \"\",\n);\n\
  _controller.addListener(_handleTextChanged);\n}\n@override\nWidget build(BuildContext\
  \ context) {\nreturn Column(\ncrossAxisAlignment: CrossAxisAlignment.start,\nchildren:\
  \ [\nTextField(\ncontroller: _controller,\n),\nText( (_value ?? \"). split(\").reversed.join()),\n\
  ],\n);\n}\n@override\nvoid dispose() {\n_controller.removeListener(_handleTextChanged);\n\
  super.dispose();\n}\nvoid _handleTextChanged() {\nthis.setState(() {\nthis._value\
  \ = _controller.text;\n});\n}\n}\n代码清单 6-2\n使用 TextEditingController 监听器\n```\n\n\
  图 6-2 展示了代码清单 6-2 中代码的截图。\n\n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig2_HTML.jpg](img/479501_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2\n\n使用 TextEditingController 监听器\n\n#### 使用回调函数\n\n从 `EditableText` 组件获取文本的另一种方法是使用回调函数。与文本编辑相关的回调函数有三种类型，参见表\
  \ 6-1。\n\n表 6-1\n\n`EditableText` 回调函数\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n\
  | `onChanged` | `ValueChanged<String>` | 文本更改时调用。 |\n| `onEditingComplete` | `VoidCallback`\
  \ | 用户提交文本时调用。 |\n| `onSubmitted` | `ValueChanged<String>` | 用户完成编辑文本时调用。 |\n\n\
  如果你想要主动监视文本变化，应该使用 `onChanged` 回调。当用户完成文本编辑时，`onEditingComplete` 和 `onSubmitted`\
  \ 这两个回调都会被调用。区别在于 `onEditingComplete` 回调不提供对所提交文本的访问。\n\n在代码清单 6-3 中，不同的回调函数记录了不同的消息。所有日志消息都显示在一个\
  \ `RichText` 组件中。\n\n```\nclass TextFieldCallbacks extends StatefulWidget {\n@override\n\
  _TextFieldCallbacksState createState() => _TextFieldCallbacksState();\n}\nclass\
  \ _TextFieldCallbacksState extends State {\nList _logs = List();\nvoid _log(String\
  \ value) {\nthis.setState(() {\nthis._logs.add(value);\n});\n}\n@override\nWidget\
  \ build(BuildContext context) {\nreturn Column(\ncrossAxisAlignment: CrossAxisAlignment.start,\n\
  children: [\nTextField(\nonChanged: (text) => _log('changed: $text'),\nonEditingComplete:\
  \ () => _log('completed'),\nonSubmitted: (text) => _log('submitted: $text'),\n),\n\
  Text.rich(TextSpan(\nchildren: this._logs.map((log) => TextSpan(text: '$log\\n')).toList(),\n\
  )),\n],\n);\n}\n}\n代码清单 6-3\nEditableText 回调函数\n```\n\n图 6-3 展示了代码清单 6-3 中代码的截图。\n\
  \n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig3_HTML.jpg](img/479501_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3\n\n`EditableText` 回调函数\n\n虽然代码清单 6-1、6-2 和 6-3 中的示例使用了 `TextField`，但相同的模式也可以应用于\
  \ `CupertinoTextField`。\n\n## 6.2 自定义文本输入键盘\n\n### 问题\n\n你想自定义用于编辑文本的键盘。\n\n###\
  \ 解决方案\n\n使用 `keyboardType`、`textInputAction` 和 `keyboardAppearance` 参数。\n\n###\
  \ 讨论\n\n`EditableText` 组件允许自定义用于编辑文本的键盘。你可以使用类型为 `TextInputType` 类的 `keyboardType`\
  \ 参数来设置适合文本的键盘类型。例如，如果 `EditableText` 组件用于编辑电话号码，那么 `TextInputType.phone` 是 `keyboardType`\
  \ 参数的更好选择。表 6-2 展示了 `TextInputType` 中的常量。`TextInputType.number` 常量用于不带小数点的无符号数。对于其他类型的数字，你可以使用\
  \ `TextInputType.numberWithOptions({bool signed: false, bool decimal: false })`\
  \ 构造函数来设置数字是否应带符号或是否应包含小数点。\n\n表 6-2\n\n`TextInputType` 常量\n\n| 名称 | 描述 |\n| ---\
  \ | --- |\n| `text` | 纯文本。 |\n| `multiline` | 多行文本。 |\n| `number` | 不带小数点的无符号数。\
  \ |\n| `phone` | 电话号码。 |\n| `datetime` | 日期和时间。 |\n| `emailAddress` | 电子邮件地址。 |\n\
  | `url` | URL。 |\n\n类型为 `TextInputAction` 枚举的 `textInputAction` 参数用于设置在用户提交文本时要执行的逻辑操作。例如，如果文本字段用于输入搜索查询，那么\
  \ `TextInputAction.search` 值会使键盘显示文本“Search”。用户可以期望在点击操作按钮后执行搜索操作。`TextInputAction`\
  \ 枚举定义了一组操作。这些操作的按钮在不同平台或同一平台的不同版本上可能具有不同的外观。大多数操作在 Android 和 iOS 上均受支持。它们映射到 Android\
  \ 上的 IME 输入类型和 iOS 上的键盘返回键类型。表 6-3 展示了 `TextInputAction` 的值及其在 Android 和 iOS 上的映射。某些操作可能仅在\
  \ Android 或 iOS 上受支持。使用不受支持的操作将导致在调试模式下抛出错误。然而，在发布模式下，不受支持的操作将分别在 Android 上映射为 `IME_ACTION_UNSPECIFIED`，在\
  \ iOS 上映射为 `UIReturnKeyDefault`。\n\n表 6-3\n\n`TextInputAction` 值\n\n| 名称 | Android\
  \ IME 输入类型 | iOS 键盘返回键类型 |\n| --- | --- | --- |\n| `none` | `IME_ACTION_NONE` |\
  \ 不适用 |\n| `unspecified` | `IME_ACTION_UNSPECIFIED` | `UIReturnKeyDefault` |\n|\
  \ `done` | `IME_ACTION_DONE` | `UIReturnKeyDone` |\n| `search` | `IME_ACTION_SEARCH`\
  \ | `UIReturnKeySearch` |\n| `send` | `IME_ACTION_SEND` | `UIReturnKeySend` |\n\
  | `next` | `IME_ACTION_NEXT` | `UIReturnKeyNext` |\n| `previous` | `IME_ACTION_PREVIOUS`\
  \ | 不适用 |\n| `continueAction` | 不适用 | `UIReturnKeyContinue` |\n| `join` | 不适用 |\
  \ `UIReturnKeyJoin` |\n| `route` | 不适用 | `UIReturnKeyRoute` |\n| `emergencyCall`\
  \ | 不适用 | `UIReturnKeyEmergencyCall` |\n| `newline` | `IME_ACTION_NONE` | `UIReturnKeyDefault`\
  \ |\n\n最后一个类型为 `Brightness` 的 `keyboardAppearance` 参数用于设置键盘的外观。`Brightness` 枚举有两个值：`dark`\
  \ 和 `light`。此参数仅用于 iOS。\n\n代码清单 6-4 展示了 `textInputAction` 和 `keyboardAppearance`\
  \ 参数的用法。\n\n*代码清单 6-4. `keyboardType` 和 `keyboardAppearance` 参数*\n\n```\nTextField(\n\
  keyboardType: TextInputType.phone,\n)\nTextField(\nkeyboardType: TextInputType.numberWithOptions(\n\
  signed: true,\ndecimal: true,\n),\n)\nTextField(\ntextInputAction: TextInputAction.search,\n\
  keyboardAppearance: Brightness.dark,\n)\n```\n\n## 6.3 在 Material Design 中为文本输入添加装饰\n\
  \n### 问题\n\n你想在 Material Design 中为文本字段添加前缀和后缀等装饰。\n\n### 解决方案\n\n使用类型为 `InputDecoration`\
  \ 的 `decoration` 参数。\n\n\n\n### 讨论\n\n`TextField` 组件支持添加不同的装饰，以向用户呈现各种信息。例如，如果文本输入值无效，你可以添加红色边框并在文本输入下方显示一些文本来提示。你还可以添加文本或图标作为前缀或后缀。如果\
  \ `TextField` 组件用于编辑货币值，你可以添加货币符号作为前缀。`TextField` 的 `decoration` 参数（类型为 `InputDecoration`）用于添加这些信息。`InputDecoration`\
  \ 类有许多命名参数，我们接下来将进行介绍。\n\n#### 边框\n\n让我们从为文本输入组件添加边框开始。`InputDecoration` 构造函数有多个类型为\
  \ `InputBorder` 的参数，这些参数与边框相关，包括 `errorBorder`、`disabledBorder`、`focusedBorder`、`focusedErrorBorder`\
  \ 和 `enabledBorder`。这些参数的名称表明了它们将根据状态在何时显示。还有一个 `border` 参数，但此参数仅用于提供边框的形状。\n\n\
  `InputBorder` 类是抽象类，因此应使用其子类 `UnderlineInputBorder` 或 `OutlineInputBorder`。`UnderlineInputBorder`\
  \ 类仅在底部有边框。`UnderlineInputBorder` 构造函数的参数包括类型为 `BorderSide` 的 `borderSide` 和类型为\
  \ `BorderRadius` 的 `borderRadius`。`BorderSide` 类定义了边框一侧的颜色、宽度和样式。边框样式由 `BorderStyle`\
  \ 枚举定义，其值有 `none` 和 `solid`。样式为 `BorderStyle.none` 的 `BorderSide` 将不会被渲染。`BorderRadius`\
  \ 类为矩形的每个角定义了一组圆角半径。角的半径使用 `Radius` 类创建。半径的形状可以是圆形或椭圆形。圆形或椭圆形的半径可以分别使用构造函数 `Radius.circular(double\
  \ radius)` 和 `Radius.elliptical(double x, double y)` 创建。`BorderRadius` 具有 `topLeft`、`topRight`、`bottomLeft`\
  \ 和 `bottomRight` 属性，其类型为 `Radius`，用于表示这四个角的半径。你可以使用 `BorderRadius.only()` 为每个角指定不同的\
  \ `Radius` 实例，或者使用 `BorderRadius.all()` 为所有角使用单个 `Radius` 实例。\n\n`OutlineInputBorder`\
  \ 类在组件周围绘制一个矩形。`OutlineInputBorder` 构造函数也具有参数 `borderSide` 和 `borderRadius`。它还有一个\
  \ `gapPadding` 参数，用于指定边框间隙中显示的标签文本的水平内边距。\n\n在代码清单 6-5 中，两个 `TextField` 组件都通过 `focusedBorder`\
  \ 参数声明了在获得焦点时渲染的边框。\n\n```\nTextField(\ndecoration: InputDecoration(\nenabledBorder:\
  \ UnderlineInputBorder(\nborderSide: BorderSide(color: Colors.red),\nborderRadius:\
  \ BorderRadius.all(Radius.elliptical(5, 10)),\n),\n),\n)\nTextField(\ndecoration:\
  \ InputDecoration(\nlabelText: 'Username',\nfocusedBorder: OutlineInputBorder(\n\
  borderSide: BorderSide(color: Colors.blue),\nborderRadius: BorderRadius.circular(10),\n\
  gapPadding: 2,\n),\n),\n)\nListing 6-5\nInputDecoration 示例\n```\n\n图 6-4 显示了代码清单\
  \ 6-5 中代码的截图。第二个 `TextField` 处于聚焦状态，因此显示了聚焦边框。\n\n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig4_HTML.jpg](img/479501_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4\n\n边框\n\n#### 前缀和后缀\n\n文本输入中的前缀和后缀可以提供在编辑文本时有用的信息和操作。前缀和后缀都可以是纯文本或组件。使用文本时，你可以自定义文本的样式。`InputDecoration`\
  \ 构造函数具有参数 `prefix`、`prefixIcon`、`prefixText` 和 `prefixStyle` 来自定义前缀。它还具有参数 `suffix`、`suffixIcon`、`suffixText`\
  \ 和 `suffixStyle` 来自定义后缀。你不能同时为 `prefix` 和 `prefixText` 指定非空值。此限制同样适用于 `suffix`\
  \ 和 `suffixText`。你只能提供组件或文本，但不能同时提供两者。\n\n```\nTextField(\ndecoration: InputDecoration(\n\
  prefixIcon: Icon(Icons.monetization_on),\nprefixText: 'Pay ',\nprefixStyle: TextStyle(fontStyle:\
  \ FontStyle.italic),\nsuffixText: '.00',\n),\n)\nListing 6-6\n前缀和后缀示例\n```\n\n图\
  \ 6-5 显示了代码清单 6-6 的截图。\n\n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig5_HTML.jpg](img/479501_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5\n\n前缀和后缀\n\n#### 文本\n\n你可以添加不同类型的文本作为装饰并自定义其样式。表 6-4 显示了五种类型的文本。\n\n表 6-4\n\
  \n不同文本类型\n\n| 类型 | 文本 | 样式 | 描述 |\n| --- | --- | --- | --- |\n| 标签 | `labelText`\
  \ | `labelStyle` | 标签显示在输入字段上方。 |\n| 辅助 | `helperText` | `helperStyle` | 辅助文本显示在输入字段下方。\
  \ |\n| 提示 | `hintText` | `hintStyle` | 当输入字段为空时，提示显示在其中。 |\n| 错误 | `errorText` |\
  \ `errorStyle` | 错误信息显示在输入字段下方。 |\n| 计数器 | `counterText` | `counterStyle` | 计数器显示在输入字段下方，但靠右对齐。\
  \ |\n\n如果 `errorText` 值不为 null，则输入字段将设置为错误状态。\n\n```\nTextField(\nkeyboardType:\
  \ TextInputType.emailAddress,\ndecoration: InputDecoration(\nlabelText: 'Email',\n\
  labelStyle: TextStyle(fontWeight: FontWeight.bold),\nhintText: 'Email address for\
  \ validation',\nhelperText: 'For receiving validation emails',\ncounterText: '10',\n\
  ),\n)\nListing 6-7\n文本示例\n```\n\n图 6-6 显示了代码清单 6-7 中代码的截图。\n\n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig6_HTML.jpg](img/479501_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6\n\n`TextField` 的文本\n\n## 6.4 设置文本长度限制\n\n### 问题\n\n你想控制文本的长度。\n\n### 解决方案\n\
  \n使用 `maxLength` 参数。\n\n### 讨论\n\n要设置 `TextField` 和 `CupertinoTextField` 中文本的最大长度，你可以使用\
  \ `maxLength` 参数。`maxLength` 参数的默认值为 `null`，表示对字符数没有限制。如果设置了 `maxLength` 参数，文本输入下方会显示一个字符计数器，显示已输入的字符数和允许的字符数。如果\
  \ `maxLength` 参数设置为 `TextField.noMaxLength`，则只显示已输入的字符数。当设置 `maxLength` 后，如果字符达到限制，其行为取决于\
  \ `maxLengthEnforced` 参数的值。如果 `maxLengthEnforced` 为 `true`（默认值），则无法再输入更多字符。如果 `maxLengthEnforced`\
  \ 为 `false`，则可以输入额外字符，但组件会切换到错误样式。\n\n```\nTextField(\nmaxLength: TextField.noMaxLength,\n\
  )\nTextField(\nmaxLength: 10,\nmaxLengthEnforced: false,\n)\nCupertinoTextField(\n\
  maxLength: 10,\n)\nListing 6-8\nmaxLength 示例\n```\n\n图 6-7 显示了代码清单 6-8 中两个 `TextField`\
  \ 组件的截图。\n\n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig7_HTML.jpg](img/479501_1_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7\n\n文本长度限制\n\n## 6.5 选择文本\n\n### 问题\n\n你想在文本输入中选择一些文本。\n\n### 解决方案\n\n使用\
  \ `TextEditingController` 的 `selection` 属性。\n\n\n\n### 讨论\n\n在配方 6-1 中，您已经看到了使用\
  \ `TextEditingController` 来获取和设置使用 `EditableText` 的小部件文本的示例。`TextEditingController`\
  \ 也可用于获取用户选择的文本以及选择文本。这是通过获取或设置 `selection` 属性（类型为 `TextSelection`）的值来实现的。\n\n`TextSelection`\
  \ 是 `TextRange` 的子类。您可以使用 `TextRange.textInside()` 来获取选中的文本。`TextSelection` 类使用\
  \ `baseOffset` 和 `extentOffset` 属性分别表示选择的起始和终止位置。`baseOffset` 的值可能大于、小于或等于 `extentOffset`。如果\
  \ `baseOffset` 等于 `extentOffset`，则表示选择已折叠。折叠的文本选择包含零个字符，但它们用于表示文本插入点。`TextSelection.collapsed()`\
  \ 构造函数可以在指定偏移量处创建一个折叠的选择。\n\n在清单 6-9 中，当文本选择发生变化时，会显示选中的文本。第一个按钮选择了范围 [0, 5] 内的文本，而第二个按钮将光标移动到偏移量\
  \ 1。\n\n```\nclass TextSelectionExample extends StatefulWidget {\n@override\n_TextSelectionExampleState\
  \ createState() => _TextSelectionExampleState();\n}\nclass _TextSelectionExampleState\
  \ extends State {\nTextEditingController _controller;\nString _selection;\n@override\n\
  void initState() {\nsuper.initState();\n_controller = new TextEditingController();\n\
  _controller.addListener(_handleTextSelection);\n}\n@override\nvoid dispose() {\n\
  _controller.removeListener(_handleTextSelection);\nsuper.dispose();\n}\n@override\n\
  Widget build(BuildContext context) {\nreturn Column(\ncrossAxisAlignment: CrossAxisAlignment.start,\n\
  children: [\nTextField(\ncontroller: _controller,\n),\nRow(\nchildren: [\nRaisedButton(\n\
  child: Text('Select text [0, 5]'),\nonPressed: () {\nsetState(() {\n_controller.selection\
  \ =\nTextSelection(baseOffset: 0, extentOffset: 5);\n});\n},\n),\nRaisedButton(\n\
  child: Text('Move cursor to offset 1'),\nonPressed: () {\nsetState(() {\n_controller.selection\
  \ = TextSelection.collapsed(offset: 1);\n});\n},\n),\n],\n),\nText.rich(TextSpan(\n\
  children: [\nTextSpan(\ntext: 'Selected:',\nstyle: TextStyle(fontWeight: FontWeight.bold),\n\
  ),\nTextSpan(text: _selection ?? \"),\n],\n)),\n],\n);\n}\n_handleTextSelection()\
  \ {\nTextSelection selection = _controller.selection;\nif (selection != null) {\n\
  setState(() {\n_selection = selection.textInside(_controller.text);\n});\n}\n}\n\
  }\nListing 6-9\nText selection\n```\n\n图 6-8 显示了清单 6-9 中代码的截图。\n\n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig8_HTML.jpg](img/479501_1_En_6_Fig8_HTML.jpg)\n\
  \nFigure 6-8\n\n文本选择\n\n## 6.6 格式化文本\n\n### 问题\n\n您想要格式化文本。\n\n### 解决方案\n\n结合 `EditableText`\
  \ 使用 `TextInputFormatter`。\n\n### 讨论\n\n当用户在文本输入中键入时，您可能希望验证和格式化输入的文本。一个常见的要求是移除黑名单中的字符。这可以通过将\
  \ `TextInputFormatter` 实例列表作为 `TextField` 和 `CupertinoTextField` 的 `inputFormatters`\
  \ 参数提供来实现。\n\n`TextInputFormatter` 是一个抽象类，只有 `formatEditUpdate(TextEditingValue\
  \ oldValue, TextEditingValue newValue)` 方法需要实现。`oldValue` 和 `newValue` 参数分别代表之前的文本和新文本。返回值是另一个代表格式化文本的\
  \ `TextEditingValue` 实例。`TextInputFormatter` 实例可以链式使用。当链式使用时，调用 `formatEditUpdate`\
  \ 方法的 `oldValue` 始终是之前的文本，但 `newValue` 的值是链中前一个 `TextInputFormatter` 实例调用 `formatEditUpdate`\
  \ 方法的返回值。\n\n表 6-5 中显示了 `TextInputFormatter` 已有的三个内置实现类。这些类用于 `TextField` 和 `CupertinoTextField`\
  \ 的实现。例如，当 `maxLines` 参数值为 1 时，`BlacklistingTextInputFormatter.singleLineFormatter`\
  \ 会被添加到 `TextInputFormatter` 实例列表中，以过滤掉“\\n”字符。\n\nTable 6-5\n\nTextInputFormatter\
  \ 的实现\n\n| 名称 | 描述 |\n| --- | --- |\n| `LengthLimitingTextInputFormatter` | 限制可以输入的字符数量。\
  \ |\n| `BlacklistingTextInputFormatter` | 用给定的字符串替换与正则表达式模式匹配的字符。 |\n| `WhitelistingTextInputFormatter`\
  \ | 只允许与给定正则表达式模式匹配的字符。 |\n\n除了声明新的 `TextInputFormatter` 子类之外，更简单的方法是使用 `TextInputFormatter.withFunction()`\
  \ 方法，并传入一个与 `formatEditUpdate()` 方法类型匹配的函数。\n\n在清单 6-10 中，输入文本被格式化为大写。\n\n```\n\
  TextField(\ninputFormatters: [\nTextInputFormatter.withFunction((oldValue, newValue)\
  \ {\nreturn newValue.copyWith(text: newValue.text?.toUpperCase());\n}),\n],\n)\n\
  Listing 6-10\n格式化文本\n```\n\n## 6.7 选择单个值\n\n### 问题\n\n您想要从值列表中选择单个值。\n\n### 解决方案\n\
  \n使用一组 `Radio` 小部件。\n\n### 讨论\n\n单选按钮通常用于需要单选场景。在一个组中，只能选择一个单选按钮。`Radio` 类有一个类型参数\
  \ `T`，代表值的类型。创建 `Radio` 实例时，您需要提供必需的参数，包括 `value`、`groupValue` 和 `onChanged`。`Radio`\
  \ 小部件不维护任何状态。其外观完全由 `value` 和 `groupValue` 参数决定。当单选按钮组的选择发生变化时，会使用所选值调用 `onChanged`\
  \ 监听器。表 6-6 显示了 `Radio` 构造函数的命名参数。\n\nTable 6-6\n\nRadio 的命名参数\n\n| 名称 | 类型 | 描述\
  \ |\n| --- | --- | --- |\n| `value` | `T` | 此单选按钮的值。 |\n| `groupValue` | `T` | 此组单选按钮的选定值。`groupValue`\
  \ 对应的单选按钮处于选中状态。 |\n| `onChanged` | `ValueChanged<T>` | 选择变化时的监听器函数。 |\n| `activeColor`\
  \ | `Color` | 此单选按钮被选中时的颜色。 |\n\n在清单 6-11 中，`Fruit.allFruits` 变量是所有 `Fruit` 实例的列表。`_selectedFruit`\
  \ 是当前选定的 `Fruit` 实例。对于每个 `Fruit` 实例，都会创建一个 `Radio<Fruit>` 小部件，其 `groupValue` 设置为\
  \ `_selectedFruit`。\n\n```\nclass FruitChooser extends StatefulWidget {\n@override\n\
  _FruitChooserState createState() => _FruitChooserState();\n}\nclass _FruitChooserState\
  \ extends State {\nFruit _selectedFruit;\n@override\nWidget build(BuildContext context)\
  \ {\nreturn Column(\ncrossAxisAlignment: CrossAxisAlignment.start,\nchildren: [\n\
  Column(\nchildren: Fruit.allFruits.map((fruit) {\nreturn Row(\nchildren: [\nRadio(\n\
  value: fruit,\ngroupValue: _selectedFruit,\nonChanged: (value) {\nsetState(() {\n\
  _selectedFruit = value;\n});\n},\n),\nExpanded(\nchild: Text(fruit.name),\n),\n\
  ],\n);\n}).toList(),\n),\nText(_selectedFruit != null ? _selectedFruit.name : \"\
  )\n],\n);\n}\n}\nListing 6-11\n使用 Radio 的示例\n```\n\n图 6-9 显示了清单 6-11 中示例的截图。\n\n\
  ![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig9_HTML.jpg](img/479501_1_En_6_Fig9_HTML.jpg)\n\
  \nFigure 6-9\n\nRadio 小部件\n\n## 6.8 从下拉列表中选择单个值\n\n### 问题\n\n您想要从下拉列表中选择单个值。\n\n\
  ### 解决方案\n\n使用 `DropdownButton`。\n\n\n\n### Discussion\n\n一个`DropdownButton`小部件在被点击时会显示一个项目列表。\
  \ `DropdownButton`类是泛型类，其类型参数代表值的类型。 项目列表通过`items`参数指定，其类型为`List<DropdownMenuItem<T>>`。\
  \ `DropdownMenuItem`小部件是一个简单的封装器，包含`value`和一个`child`小部件。 当选择发生变化时，`onChanged`回调会被调用，并传入所选项目的值。\
  \ 所选项目的值作为`value`参数传递。 如果`value`为`null`，则会显示`hint`小部件。\n\n在清单 6-12 中，每个`Fruit`实例都被映射到一个`DropdownMenuItem`小部件。\n\
  \n```dart\nclass FruitChooser extends StatefulWidget {\n  @override\n  _FruitChooserState\
  \ createState() => _FruitChooserState();\n}\nclass _FruitChooserState extends State\
  \ {\n  Fruit _selectedFruit;\n  @override\n  Widget build(BuildContext context)\
  \ {\n    return Column(\n      crossAxisAlignment: CrossAxisAlignment.start,\n \
  \     children: [\n        DropdownButton(\n          value: _selectedFruit,\n \
  \         items: Fruit.allFruits.map((fruit) {\n            return DropdownMenuItem(\n\
  \              value: fruit,\n              child: Text(fruit.name),\n         \
  \   );\n          }).toList(),\n          onChanged: (fruit) {\n            setState(()\
  \ {\n              _selectedFruit = fruit;\n            });\n          },\n    \
  \      hint: Text('Select a fruit'),\n        ),\n      ],\n    );\n  }\n}\n```\n\
  *清单 6-12 DropdownButton 示例*\n\n图 6-10 展示了展开后的`DropdownButton`截图。\n\n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig10_HTML.jpg](img/479501_1_En_6_Fig10_HTML.jpg)\n\
  \n*图 6-10 展开后的 DropdownButton*\n\n## 6.9 选择多个值\n\n### 问题\n\n你想要选择多个值。\n\n### 解决方案\n\
  \n使用`Checkbox`小部件。\n\n### 讨论\n\n复选框通常用于允许多项选择。 如果复选框创建时将参数`tristate`设置为`true`，它可以显示三个值：`true`、`false`和`null`。\
  \ 否则，只允许`true`和`false`两个值。 如果值为`null`，则显示一个破折号。 复选框本身不维护任何状态。 它的外观完全由`value`参数决定。\
  \ 当复选框的值改变时，`onChanged`回调会被调用，并传入新的状态值。\n\n在清单 6-13 中，选中的水果被维护在一个`List<Fruit>`实例中。\
  \ 每个`Fruit`实例都被映射到一个`Checkbox`小部件。 `Checkbox`的值取决于对应的`Fruit`实例是否在`_selectedFruits`列表中。\n\
  \n```dart\nclass FruitSelector extends StatefulWidget {\n  @override\n  _FruitSelectorState\
  \ createState() => _FruitSelectorState();\n}\nclass _FruitSelectorState extends\
  \ State {\n  List _selectedFruits = List();\n  @override\n  Widget build(BuildContext\
  \ context) {\n    return Column(\n      crossAxisAlignment: CrossAxisAlignment.start,\n\
  \      children: [\n        Column(\n          children: Fruit.allFruits.map((fruit)\
  \ {\n            return Row(\n              children: [\n                Checkbox(\n\
  \                  value: _selectedFruits.contains(fruit),\n                  onChanged:\
  \ (selected) {\n                    setState(() {\n                      if (selected)\
  \ {\n                        _selectedFruits.add(fruit);\n                     \
  \ } else {\n                        _selectedFruits.remove(fruit);\n           \
  \           }\n                    });\n                  },\n                ),\n\
  \                Expanded(\n                  child: Text(fruit.name),\n       \
  \         )\n              ],\n            );\n          }).toList(),\n        ),\n\
  \        Text(_selectedFruits.join(', ')),\n      ],\n    );\n  }\n}\n```\n*清单 6-13\
  \ Checkbox 示例*\n\n图 6-10 展示了清单 6-13 中示例的截图。\n\n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig11_HTML.jpg](img/479501_1_En_6_Fig11_HTML.jpg)\n\
  \n*图 6-11 Checkbox*\n\n## 6.10 切换开/关状态\n\n### 问题\n\n你想要切换开/关状态。\n\n### 解决方案\n\n\
  Material Design 使用`Switch`，iOS 风格使用`CupertinoSwitch`。\n\n### 讨论\n\n`Switch`是一个常用的\
  \ UI 控件，用于切换设置的开启/关闭状态。 `Switch`小部件用于 Material Design。 一个`Switch`小部件可以处于两种状态：激活和非激活。\
  \ `Switch`小部件本身不维护任何状态。 它的行为和外观完全由构造函数参数的值决定。 如果`value`参数为`true`，则`Switch`小部件处于激活状态；否则，它处于非激活状态。\
  \ 当`Switch`小部件的开/关状态改变时，`onChanged`回调会被调用，并传入新的状态。 你可以使用参数`activeColor`、`activeThumbImage`、`activeTrackColor`、`inactiveThumbColor`、`inactiveThumbImage`和`inactiveTrackColor`来自定义`Switch`小部件在不同状态下的外观。\n\
  \n在清单 6-14 中，`Switch`小部件被用来控制另一个`TextField`小部件的状态。\n\n```dart\nclass NameInput extends\
  \ StatefulWidget {\n  @override\n  _NameInputState createState() => _NameInputState();\n\
  }\nclass _NameInputState extends State {\n  bool _useCustomName = false;\n  _buildNameInput()\
  \ {\n    return TextField(\n      decoration: InputDecoration(labelText: 'Name'),\n\
  \    );\n  }\n  _buildToggle() {\n    return Row(\n      children: [\n        Switch(\n\
  \          value: _useCustomName,\n          onChanged: (value) {\n            setState(()\
  \ {\n              _useCustomName = value;\n            });\n          },\n    \
  \      activeColor: Colors.green,\n          inactiveThumbColor: Colors.grey.shade200,\n\
  \        ),\n        Expanded(\n          child: Text('Use custom name'),\n    \
  \    ),\n      ],\n    );\n  }\n  @override\n  Widget build(BuildContext context)\
  \ {\n    return Column(\n      crossAxisAlignment: CrossAxisAlignment.start,\n \
  \     children: _useCustomName\n          ? [_buildToggle(), _buildNameInput()]\n\
  \          : [_buildToggle()],\n    );\n  }\n}\n```\n*清单 6-14 Switch 示例*\n\n图 6-12\
  \ 展示了清单 6-14 中示例的截图。\n\n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig12_HTML.jpg](img/479501_1_En_6_Fig12_HTML.jpg)\n\
  \n*图 6-12 Switch*\n\n`CupertinoSwitch`小部件创建了一个 iOS 风格的开关，其工作方式与`Switch`相同，但仅支持自定义激活颜色。\
  \ `Switch`小部件拥有构造函数`Switch.adaptive()`，它会根据目标平台创建一个`Switch`小部件或`CupertinoSwitch`小部件。\
  \ 当使用`Switch.adaptive()`创建`CupertinoSwitch`小部件时，仅使用`CupertinoSwitch()`接受的构造函数参数；其他参数将被忽略。\n\
  \n清单 6-15 展示了使用`CupertinoSwitch`和`Switch.adaptive()`的示例。\n\n```dart\nCupertinoSwitch(\n\
  \  value: true,\n  onChanged: (value) => {},\n  activeColor: Colors.red.shade300,\n\
  )\nSwitch.adaptive(\n  value: true,\n  onChanged: (value) => {},\n)\n```\n*清单 6-15\
  \ CupertinoSwitch 示例*\n\n## 6.11 从范围中选择值\n\n### 问题\n\n你想从一个连续或离散的值范围中进行选择。\n\n###\
  \ 解决方案\n\nMaterial Design 使用`Slider`，iOS 风格使用`CupertinoSlider`。\n\n\n\n### 讨论\n\n\
  滑块通常用于从连续或离散的值范围中进行选择。你可以使用适用于 Material Design 的 `Slider` 组件，或适用于 iOS 风格的 `CupertinoSlider`。这两个组件行为相同，但视觉外观不同。创建滑块时，你需要使用\
  \ `min` 和 `max` 参数提供一个有效的值范围。如果 `divisions` 参数使用了非空值，则选择项将是一组离散的值。否则，选择项将是一个连续的值范围。例如，如果\
  \ `min` 的值为 `0.0`，`max` 的值为 `10.0`，并且 `divisions` 设置为 `5`，那么可选值就是 `0.0`、`2.0`、`4.0`、`6.0`、`8.0`\
  \ 和 `10.0`。`Slider` 组件不维护任何状态。其行为和外观完全由构造函数参数决定。当滑块的值改变时，会使用选中的值调用 `onChanged` 回调。你也可以使用\
  \ `onChangeStart` 和 `onChangeEnd` 回调来分别获取值开始改变和改变完成的通知。你可以使用 `label`、`activeColor`\
  \ 和 `inactiveColor` 进一步自定义滑块的外观。`CupertinoSlider` 仅支持 `activeColor` 参数。如果 `onChanged`\
  \ 为 null 或范围为空，则该滑块组件将被禁用。\n\n在代码清单 6-16 中，创建了一个带有 `divisions` 参数给定值的 `Slider` 组件，并显示了当前值。\n\
  \n```\nclass SliderValue extends StatefulWidget {\nSliderValue({Key key, this.divisions})\
  \ : super(key: key);\nfinal int divisions;\n@override\n_SliderValueState createState()\
  \ => _SliderValueState(divisions);\n}\nclass _SliderValueState extends State {\n\
  _SliderValueState(this.divisions);\nfinal int divisions;\ndouble _value = 0.0;\n\
  @override\nWidget build(BuildContext context) {\nreturn Row(\nchildren: [\nExpanded(\n\
  child: Slider(\nvalue: _value,\nmin: 0.0,\nmax: 10.0,\ndivisions: divisions,\nonChanged:\
  \ (value) {\nsetState(() {\n_value = value;\n});\n},\n),\n),\nText(_value.toStringAsFixed(2)),\n\
  ],\n);\n}\n}\n```\n\n*代码清单 6-16 — 滑块示例*\n\n`CupertinoSlider` 的用法与 `Slider` 类似。你可以在代码清单\
  \ 6-16 中简单地将 `Slider` 替换为 `CupertinoSlider`。图 6-13 展示了 `Slider` 和 `CupertinoSlider`\
  \ 的截图。\n\n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig13_HTML.jpg](img/479501_1_En_6_Fig13_HTML.jpg)\n\
  \n*图 6-13 — Slider 和 CupertinoSlider*\n\n## 6.12 使用 Chips\n\n### 问题\n\n你想要使用紧凑的替代方案来表示不同类型的实体。\n\
  \n### 解决方案\n\n使用不同类型的 `Chips`。\n\n### 讨论\n\n当空间有限时，像按钮、单选按钮和复选框这样的传统组件可能不适合。在这种情况下，可以使用\
  \ Material Design 中的 Chips 来表示相同的语义，但占用更少的空间。\n\n`Chip` 组件是通用的 chip 实现，它有一个必需的 `label`\
  \ 和一个可选的 `avatar`。当设置一个非空的 `onDeleted` 回调时，它还可以包含一个删除按钮。\n\n`InputChip` 组件比 `Chip`\
  \ 组件更强大。`InputChip` 组件可以通过设置 `onSelected` 回调变为可选中的，通过设置 `onPressed` 回调变为可点击的。但是，你不能同时为\
  \ `onSelected` 和 `onPressed` 回调设置非空值。当使用 `onSelected` 时，`InputChip` 组件的行为类似于复选框。你可以使用\
  \ `selected` 参数来设置状态。当使用 `onPressed` 时，`InputChip` 组件的行为类似于按钮。\n\n`ChoiceChip` 组件的行为类似于单选按钮，它使用\
  \ `selected` 参数设置状态，并使用 `onSelected` 回调通知状态变化。但是，`ChoiceChip` 组件没有类似于 `Radio` 组件中\
  \ `groupValue` 的参数，因此你必须手动设置 `selected` 状态。\n\n`FilterChip` 组件的行为类似于复选框。`FilterChip`\
  \ 构造函数的参数与 `ChoiceChip` 构造函数相同。\n\n`ActionChip` 组件的行为类似于带有 `onPressed` 参数的按钮。动作\
  \ chip 和按钮之间的区别在于，动作 chip 不能通过将 `onPressed` 参数设置为 null 来禁用。如果动作 chip 的动作不适用，则应将其移除。此行为与使用\
  \ chip 减少空间的目标一致。\n\n事实上，所有这些 chip 组件都通过只使用 `RawChip` 构造函数支持的部分参数来包装 `RawChip`。\n\
  \n在代码清单 6-17 中，使用了 `ChoiceChip` 组件来实现单选。\n\n```\nclass FruitChooser extends StatefulWidget\
  \ {\n@override\n_FruitChooserState createState() => _FruitChooserState();\n}\nclass\
  \ _FruitChooserState extends State {\nFruit _selectedFruit;\n@override\nWidget build(BuildContext\
  \ context) {\nreturn Column(\ncrossAxisAlignment: CrossAxisAlignment.start,\nchildren:\
  \ [\nWrap(\nspacing: 5,\nchildren: Fruit.allFruits.map((fruit) {\nreturn ChoiceChip(\n\
  label: Text(fruit.name),\nselected: _selectedFruit == fruit,\nonSelected: (selected)\
  \ {\nsetState(() {\n_selectedFruit = selected ? fruit : null;\n});\n},\nselectedColor:\
  \ Colors.red.shade200,\n);\n}).toList(),\n),\nText(_selectedFruit != null ? _selectedFruit.name\
  \ : \")\n],\n);\n}\n}\n```\n\n*代码清单 6-17 — ChoiceChip 示例*\n\n在代码清单 6-18 中，使用了 `FilterChip`\
  \ 组件来实现多选。\n\n```\nclass FruitSelector extends StatefulWidget {\n@override\n_FruitSelectorState\
  \ createState() => _FruitSelectorState();\n}\nclass _FruitSelectorState extends\
  \ State {\nList _selectedFruits = List();\n@override\nWidget build(BuildContext\
  \ context) {\nreturn Column(\ncrossAxisAlignment: CrossAxisAlignment.start,\nchildren:\
  \ [\nWrap(\nspacing: 5,\nchildren: Fruit.allFruits.map((fruit) {\nreturn FilterChip(\n\
  label: Text(fruit.name),\nselected: _selectedFruits.contains(fruit),\nonSelected:\
  \ (selected) {\nsetState(() {\nif (selected) {\n_selectedFruits.add(fruit);\n} else\
  \ {\n_selectedFruits.remove(fruit);\n}\n});\n},\nselectedColor: Colors.blue.shade200,\n\
  );\n}).toList(),\n),\nText(_selectedFruits.join(', ')),\n],\n);\n}\n}\n```\n\n*代码清单\
  \ 6-18 — FilterChip 示例*\n\n图 6-14 展示了代码清单 6-17 和 6-18 中示例的截图。\n\n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig14_HTML.jpg](img/479501_1_En_6_Fig14_HTML.jpg)\n\
  \n*Figure 6-14 — ChoiceChip 和 FilterChip*\n\n## 6.13 选择日期和时间\n\n### 问题\n\n你想要选择日期和时间。\n\
  \n### 解决方案\n\n使用 Material Design 的 `showDatePicker()` 和 `showTimePicker()` 函数，或使用\
  \ iOS 风格的 `CupertinoDatePicker` 和 `CupertinoTimerPicker`。\n\n\n\n### 讨论\n\n对于 Material\
  \ Design，你可以使用诸如 `YearPicker`、`MonthPicker` 和 `DayPicker` 这类小部件，或者使用 `showDatePicker()`\
  \ 函数来让用户选择日期。`showTimePicker()` 函数用于选择时间。小部件很少用于选择日期，大多数情况下会使用 `showDatePicker()`\
  \ 和 `showTimePicker()` 函数来显示对话框。\n\n`YearPicker` 小部件显示一个年份列表供用户选择。创建 `YearPicker`\
  \ 小部件时，你需要通过 `selectedDate`、`firstDate` 和 `lastDate` 参数分别提供选中的日期、最早日期和最晚日期的 `DateTime`\
  \ 实例。当选择发生变更时，`onChanged` 回调会被调用，并传入选中的 `DateTime` 实例。\n\n`MonthPicker` 小部件显示一个月份列表供用户选择。`MonthPicker`\
  \ 的构造函数拥有与 `YearPicker` 相同的 `selectedDate`、`firstDate`、`lastDate` 和 `onChanged`\
  \ 参数。它还包含一个谓词函数 `selectableDayPredicate`，用于自定义哪些日子是可选择的。\n\n`DayPicker` 小部件显示指定月份的天数供用户选择。`DayPicker`\
  \ 的构造函数拥有 `MonthPicker` 的所有参数，另外还有 `displayedMonth` 参数，用于设置要选择日期的月份。\n\n如果你希望显示一个对话框让用户选择日期，使用\
  \ `showDatePicker()` 函数比自己创建对话框更容易。你需要为 `initialDate`、`firstDate` 和 `lastDate` 参数传入\
  \ `DateTime` 实例。类型为 `BuildContext` 的 `context` 参数也是必需的。该函数可以工作在由 `DatePickerMode`\
  \ 枚举定义的两种模式下：`DatePickerMode.day` 表示选择月份和日期，而 `DatePickerMode.year` 表示选择年份。`showDatePicker()`\
  \ 函数的返回值是一个 `Future<DateTime>`，代表选中的日期。\n\n在清单 6-19 中，`TextField` 小部件将 `IconButton`\
  \ 作为后缀。当按钮被按下时，`showDatePicker()` 函数被调用以显示日期选择对话框。选中的日期会显示在 `TextField` 小部件中。\n\n\
  ```\nclass PickDate extends StatefulWidget {\n@override\n_PickDateState createState()\
  \ => _PickDateState();\n}\nclass _PickDateState extends State {\nDateTime _selectedDate\
  \ = DateTime.now();\nTextEditingController _controller = TextEditingController();\n\
  @override\nWidget build(BuildContext context) {\nreturn TextField(\ncontroller:\
  \ _controller,\ndecoration: InputDecoration(\nlabelText: 'Date',\nsuffix: IconButton(\n\
  icon: Icon(Icons.date_range),\nonPressed: () {\nshowDatePicker(\ncontext: context,\n\
  initialDate: _selectedDate,\nfirstDate: DateTime.now().subtract(Duration(days: 30)),\n\
  lastDate: DateTime.now().add(Duration(days: 30)),)\n.then((selectedDate) {\nif (selectedDate\
  \ != null) {\n_selectedDate = selectedDate;\n_controller.text = DateFormat.yMd().format(_selectedDate);\n\
  }\n});\n},\n),\n),\n);\n}\n}\nListing 6-19\nPick date\n```\n\n`showTimePicker()`\
  \ 函数显示一个用于选择时间的对话框。你需要传入类型为 `TimeOfDay` 的 `initialTime` 参数作为初始显示时间。返回值是一个 `Future<TimeOfDay>`\
  \ 实例，代表选中的时间。清单 6-20 中的代码使用了与清单 6-19 类似的模式来显示时间选择对话框。\n\n```\nclass PickTime extends\
  \ StatefulWidget {\n@override\n_PickTimeState createState() => _PickTimeState();\n\
  }\nclass _PickTimeState extends State {\nTimeOfDay _selectedTime = TimeOfDay.now();\n\
  TextEditingController _controller = TextEditingController();\n@override\nWidget\
  \ build(BuildContext context) {\nreturn TextField(\ncontroller: _controller,\ndecoration:\
  \ InputDecoration(\nlabelText: 'Time',\nsuffix: IconButton(\nicon: Icon(Icons.access_time),\n\
  onPressed: () {\nshowTimePicker(\ncontext: context,\ninitialTime: _selectedTime,\n\
  ).then((selectedTime) {\nif (selectedTime != null) {\n_selectedTime = selectedTime;\n\
  _controller.text = _selectedTime.format(context);\n}\n});\n},\n)),\n);\n}\n}\nListing\
  \ 6-20\nPick time\n```\n\n在 iOS 风格下，你可以分别使用 `CupertinoDatePicker` 和 `CupertinoTimerPicker`\
  \ 小部件来选择日期和时间。`CupertinoDatePicker` 可以根据 `CupertinoDatePickerMode` 枚举的 `mode` 参数有不同的模式，包括\
  \ `date`、`time` 和 `dateAndTime`。与 Material Design 的小部件类似，`CupertinoDatePicker` 构造函数拥有\
  \ `initialDateTime`、`minimumDate`、`maximumDate` 和 `onDateTimeChanged` 参数。`CupertinoTimerPicker`\
  \ 也可以根据 `CupertinoTimerPickerMode` 枚举的 `mode` 参数有不同的模式，包括 `hm`、`ms` 和 `hms`。区别在于\
  \ `CupertinoTimerPicker` 使用 `Duration` 实例来设置初始值，并作为 `onTimerDurationChanged` 回调中的值。\n\
  \n## 6.14 包装表单字段\n\n### 问题\n\n你希望将表单小部件包装为表单字段。\n\n### 解决方案\n\n使用 `FormField` 或\
  \ `TextFormField`。\n\n\n\n### 讨论\n\n表单小部件可用作普通小部件。然而，这些表单小部件不维护任何状态；你需要始终将它们包裹在有状态小部件中以保持状态。一种典型的使用模式是利用\
  \ `onChanged` 回调来更新状态并触发表单小部件的重建。由于这是表单小部件的常见模式，Flutter 内置了一个 `FormField` 小部件来维护表单小部件的当前状态，它负责处理状态更新和验证错误。\n\
  \n`FormField` 类是泛型的，其类型参数 `T` 表示值的类型。`FormField` 可以作为独立的小部件使用，也可以作为 `Form` 小部件的一部分。本示例仅讨论独立使用方式。表\
  \ 6-7 列出了 `FormField` 构造函数的命名参数。\n\n**表 6-7** `FormField` 的命名参数\n\n| 名称 | 类型 | 描述\
  \ |\n| --- | --- | --- |\n| `builder` | `FormFieldBuilder<T>` | 构建表示此表单项的小部件。 |\n\
  | `onSaved` | `FormFieldSetter<T>` | 表单保存时的回调。 |\n| `validator` | `FormFieldValidator<T>`\
  \ | 表单项的验证器。 |\n| `initialValue` | `T` | 初始值。 |\n| `autovalidate` | `boolean` |\
  \ 是否在每次更改后自动验证。 |\n| `enabled` | `boolean` | 此表单项是否启用。 |\n\n`FormFieldBuilder<T>`\
  \ 类型是一个 typedef，形式为 `Widget (FormFieldState<T> field)`。`FormFieldState<T>` 类继承自\
  \ `State` 类，表示表单项的当前状态。`FormFieldBuilder` 负责根据状态构建小部件。通过 `FormFieldState`，你可以获取表单项的当前值和错误文本。你还可以使用表\
  \ 6-8 中 `FormFieldState` 的方法。`FormFieldValidator<T>` 同样是一个 typedef，形式为 `String(T\
  \ value)`。它接收当前值作为输入，如果验证失败则返回一个非空字符串作为错误消息。`FormFieldSetter<T>` 类型是一个 typedef，形式为\
  \ `void(T newValue)`。\n\n**表 6-8** `FormFieldState` 的方法\n\n| 名称 | 描述 |\n| --- |\
  \ --- |\n| `save()` | 使用当前值调用 `onSaved()` 方法。 |\n| `validate()` | 调用 `validator`\
  \ 并在验证失败时设置 `errorText`。 |\n| `didChange(T value)` | 将字段的状态更新为新值。 |\n| `reset()`\
  \ | 将字段重置为初始值。 |\n\n当在 `FormFields` 中包裹 `TextFields` 时，最好使用内置的 `TextFormField`。`TextFormField`\
  \ 小部件已经处理了使用 `TextEditingController` 设置文本，以及使用 `FormFieldValidator` 返回的错误文本来更新输入装饰。`TextFormField`\
  \ 构造函数支持来自 `TextField` 和 `FormField` 构造函数的参数。清单 6-21 中的 `TextFormField` 有一个验证器用于验证文本长度。\n\
  \n```\nclass NameInput extends StatelessWidget {\n@override\nWidget build(BuildContext\
  \ context) {\nreturn TextFormField(\ndecoration: InputDecoration(\nlabelText: 'Name',\n\
  ),\nvalidator: (value) {\nif (value == null || value.isEmpty) {\nreturn 'Name is\
  \ required.';\n} else if (value.length < 6) {\nreturn 'Minimum length is 6.';\n\
  } else {\nreturn null;\n}\n},\nautovalidate: true,\n);\n}\n}\n清单 6-21\nTextFormField\n\
  ```\n\n图 6-15 展示了清单 6-21 中代码的截图。\n\n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig15_HTML.jpg](img/479501_1_En_6_Fig15_HTML.jpg)\n\
  \n**图 6-15** `TextFormField`\n\n`FormFieldState` 实例仅在 `FormField` 的构建器函数中可访问。如果你需要从其他位置访问状态，可以将一个\
  \ `GlobalKey` 作为 `FormField` 的 key 参数传递，然后使用 `currentState` 属性访问当前状态。\n\n在清单 6-22\
  \ 中，`FormField` 的状态是一个 `List<PizzaTopping>` 实例。借助 `GlobalKey`，可以在按下按钮时检索当前值。\n\n\
  ```\nclass PizzaToppingsSelector extends StatelessWidget {\nfinal GlobalKey>> _formFieldKey\
  \ =\nGlobalKey();\n@override\nWidget build(BuildContext context) {\nreturn Column(\n\
  children: [\nFormField>(\nkey: _formFieldKey,\ninitialValue: List(),\nbuilder: (state)\
  \ {\nreturn Wrap(\nspacing: 5,\nchildren: PizzaTopping.allPizzaToppings.map((topping)\
  \ {\nreturn ChoiceChip(\nlabel: Text(topping.name),\nselected: state.value.contains(topping),\n\
  onSelected: state.value.length  newValue = List.of(state.value);\nif (selected)\
  \ {\nnewValue.add(topping);\n} else {\nnewValue.remove(topping);\n}\nstate.didChange(newValue);\n\
  }\n: null,\n);\n}).toList(),\n);\n},\n),\nRaisedButton(\nchild: Text('Get toppings'),\n\
  onPressed: () => print(_formFieldKey.currentState?.value),\n),\n],\n);\n}\n}\n清单\
  \ 6-22\nFormField\n```\n\n## 6.15 创建表单\n\n### 问题\n\n你想要创建一个包含多个表单项的表单。\n\n### 解决方案\n\
  \n使用 `Form`。\n\n### 讨论\n\n在使用表单项时，你通常试图构建一个包含多个表单项的表单。当处理多个表单项时，单独管理它们是繁琐的任务。`Form`\
  \ 是一个便捷的包装器，用于管理多个表单项。你需要将所有表单项包裹在 `FormField` 小部件中，并使用 `Form` 小部件作为所有这些 `FormField`\
  \ 小部件的共同祖先。`Form` 小部件是一个有状态小部件，其状态由关联的 `FormState` 实例管理。`FormState` 类包含 `save()`、`validate()`\
  \ 和 `reset()` 方法。这些方法会调用后代 `FormField` 小部件的所有 `FormFieldState` 实例上对应的函数。\n\n根据需要使用\
  \ `FormState` 的小部件的位置，有两种方式可以获取 `FormState` 实例。如果小部件是 `Form` 小部件的后代，使用 `Form.of(BuildContext\
  \ context)` 是获取最近 `FormState` 实例的简便方法。第二种方式是在创建 `Form` 小部件时使用 `GlobalKey` 实例，然后使用\
  \ `GlobalKey.currentState` 获取 `FormState`。\n\n清单 6-23 展示了一个登录表单的代码。两个 `TextFormField`\
  \ 小部件都使用 `GlobalKey` 实例创建。\n\n```\nclass LoginForm extends StatefulWidget {\n@override\n\
  _LoginFormState createState() => _LoginFormState();\n}\nclass _LoginFormState extends\
  \ State {\nfinal GlobalKey> _usernameFormFieldKey = GlobalKey();\nfinal GlobalKey>\
  \ _passwordFormFieldKey = GlobalKey();\n_notEmpty(String value) => value != null\
  \ && value.isNotEmpty;\nget _value => ({\n'username': _usernameFormFieldKey.currentState?.value,\n\
  'password': _passwordFormFieldKey.currentState?.value\n});\n@override\nWidget build(BuildContext\
  \ context) {\nreturn Form(\nchild: Column(\nchildren: [\nTextFormField(\nkey: _usernameFormFieldKey,\n\
  decoration: InputDecoration(\nlabelText: 'Username',\n),\nvalidator: (value) =>\n\
  !_notEmpty(value) ? 'Username is required' : null,\n),\nTextFormField(\nkey: _passwordFormFieldKey,\n\
  obscureText: true,\ndecoration: InputDecoration(\nlabelText: 'Password',\n),\nvalidator:\
  \ (value) =>\n!_notEmpty(value) ? 'Password is required' : null,\n),\nBuilder(builder:\
  \ (context) {\nreturn Row(\nmainAxisAlignment: MainAxisAlignment.end,\nchildren:\
  \ [\nRaisedButton(\nchild: Text('Log In'),\nonPressed: () {\nif (Form.of(context).validate())\
  \ {\nprint(_value);\n}\n},\n),\nFlatButton(\nchild: Text('Reset'),\nonPressed: ()\
  \ => Form.of(context).reset(),\n)\n],\n);\n}),\n],\n),\n);\n}\n}\n清单 6-23\n登录表单\n\
  ```\n\n图 6-16 展示了登录表单的截图。\n\n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig16_HTML.jpg](img/479501_1_En_6_Fig16_HTML.jpg)\n\
  \n**图 6-16** 登录表单\n\n\n\n## 6.16 小结\n\n表单控件对于与用户交互至关重要。本章涵盖了 Material Design 和 iOS\
  \ 风格的表单控件，包括文本输入、单选按钮、复选框、下拉菜单、开关、纸片和滑块。在下一章中，我们将讨论用于应用脚手架（Scaffolding）的控件。\n\n"
- "# 7. 常用控件\n\n在 Flutter 应用中，一些控件因用途广泛而被频繁使用。本章将讨论一些常用控件。\n\n## 7.1 显示项目列表\n\n###\
  \ 问题\n\n你想要显示一个可滚动的项目列表。\n\n### 解决方案\n\n使用 `ListView` 控件作为项目的容器。\n\n### 讨论\n\n像\
  \ `Flex`、`Row` 和 `Column` 这样的 Flutter 布局控件不支持滚动，并且这些控件并非设计用于在需要滚动时显示项目。如果你想显示大量项目，应该使用\
  \ `ListView` 控件。你可以将 `ListView` 视为 `Flex` 控件的可滚动对应物。\n\n有三种不同的方式可以通过不同的构造函数创建 `ListView`\
  \ 控件：\n\n*   从一个静态的子控件列表创建。\n*   根据滚动位置按需构建子控件来创建。\n*   创建自定义实现。\n\n本方案重点介绍前两种方式。\n\
  \n#### 带有静态子控件的 ListView\n\n如果你有一个静态的子控件列表，其大小可能超过父控件的大小，你可以将它们包裹在 `ListView` 控件中以启用滚动。这是通过调用\
  \ `ListView()` 构造函数并传入类型为 `Widget[]` 的 `children` 参数来实现的。滚动方向由类型为 `Axis` 的 `scrollDirection`\
  \ 参数决定。默认的滚动方向是 `Axis.vertical`。如果你想以相反的顺序显示子控件，可以将 `reverse` 参数设置为 `true`。清单 7-1\
  \ 展示了一个包含三个子控件的 `ListView` 控件。\n\n```\nListView(\n  children: [\n    ExampleWidget(name:\
  \ 'Box 1'),\n    ExampleWidget(name: 'Box 2'),\n    ExampleWidget(name: 'Box 3'),\n\
  \  ],\n)\n```\n\n默认的 `ListView()` 构造函数只应在子控件数量较少时使用。所有子控件都会被创建，即使其中一些在视口中不可见。这可能会影响性能。\n\
  \n#### 带有项目构建器的 ListView\n\n如果你有大量项目或需要动态创建项目，可以使用 `ListView.builder()` 和 `ListView.separated()`\
  \ 构造函数。你需要提供类型为 `IndexedWidgetBuilder` 的构建器函数来按需构建项目，而不是提供一个静态的控件列表。`IndexedWidgetBuilder`\
  \ 是 `Widget (BuildContext context, int index)` 的 typedef。`index` 参数是要构建的项目的索引。`ListView`\
  \ 控件确定视口中项目的索引，并调用构建器函数来构建要渲染的项目。如果项目总数已知，你应将此数字作为 `itemCount` 参数传入。如果 `itemCount`\
  \ 非空，构建器函数将仅使用大于等于零且小于 `itemCount` 的索引被调用。如果 `itemCount` 为 `null`，则构建器函数需要返回 `null`\
  \ 以指示没有更多项目可用。\n\n当使用 `ListView.builder()` 构造函数时，你只需要提供类型为 `IndexedWidgetBuilder`\
  \ 的 `itemBuilder` 参数。对于 `ListView.separated()` 构造函数，除了 `itemBuilder` 参数外，你还需要提供类型为\
  \ `IndexedWidgetBuilder` 的 `separatorBuilder` 参数来构建项目之间的分隔符。使用 `ListView.separated()`\
  \ 时，`itemCount` 参数是必需的。清单 7-2 展示了使用 `ListView.builder()` 和 `ListView.separated()`\
  \ 的示例。\n\n```\nListView.builder(\n  itemCount: 20,\n  itemBuilder: (context, index)\
  \ {\n    return ExampleWidget(name: 'Dynamic Box ${index + 1}');\n  },\n);\n\nListView.separated(\n\
  \  itemBuilder: (context, index) {\n    return ExampleWidget(name: 'Separated Box\
  \ ${index + 1}');\n  },\n  separatorBuilder: (context, index) {\n    return Divider(\n\
  \      height: 8,\n    );\n  },\n  itemCount: 20,\n);\n```\n\n如果项目在滚动方向上的尺寸已知，你应该将此值作为\
  \ `itemExtent` 参数传入。非空的 `itemExtent` 参数值可以使滚动更加高效。\n\n\n\n#### ListTile\n\n你可以使用任何\
  \ widget 作为 `ListView` 的子项。如果你希望列表项包含文本、图标和其他控件，可以使用 `ListTile` 及其子类。一个列表磁贴可以包含一到三行文本，以及位于文本前后的\
  \ leading 和 trailing widget。表 7-1 展示了\n\n**表 7-2** `CheckboxListTile` 的参数\n\n| 名称\
  \ | 类型 | 描述 |\n| --- | --- | --- |\n| `secondary` | `Widget` | 显示在磁贴另一侧的 widget。\
  \ |\n| `controlAffinity` | `ListTileControlAffinity` | 控件在磁贴中的放置位置。 |\n\n**表 7-1**\
  \ `ListTile` 的参数\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `title` | `Widget`\
  \ | 列表磁贴的标题。 |\n| `subtitle` | `Widget` | 显示在标题下方的可选内容。 |\n| `isThreeLine` | `bool`\
  \ | 列表磁贴是否可以有*三行*文本。 |\n| `leading` | `Widget` | 显示在标题之前的 widget。 |\n| `trailing`\
  \ | `Widget` | 显示在标题之后的 widget。 |\n| `enabled` | `bool` | 列表磁贴是否启用。 |\n| `selected`\
  \ | `bool` | 列表磁贴是否被选中。选中时，图标和文本将以相同颜色渲染。 |\n| `onTap` | `GestureTapCallback` |\
  \ 点击标题时的回调。 |\n| `onLongPress` | `GestureLongPressCallback` | 长按标题时的回调。 |\n| `dense`\
  \ | `bool` | 当为 true 时，磁贴的尺寸会减小。 |\n| `contentPadding` | `EdgeInsetsGeometry` |\
  \ 磁贴内部的填充。 |\n\n清单 7-3 展示了使用 `ListTile` 的示例。\n\n```\nListTile(\ntitle: Text('标题'),\n\
  subtitle: Text('描述'),\nleading: Icon(Icons.shop),\ntrailing: Icon(Icons.arrow_right),\n\
  )\n清单 7-3\nListTile 示例\n```\n\n如果你希望在列表磁贴中添加复选框，可以使用 `CheckboxListTile` widget，它结合了\
  \ `ListTile` 和 `Checkbox`。`CheckboxListTile` 构造函数的参数 `title`、`subtitle`、`isThreeLine`、`selected`\
  \ 和 `dense` 与 `ListTile` 构造函数相同。它还包含 `value`、`onChanged` 和 `activeColor` 参数，这些参数用于\
  \ `Checkbox` 构造函数。\n\n`ListTileControlAffinity` 枚举定义了控件在列表磁贴中的位置。它有三个值：`leading`、`trailing`\
  \ 和 `platform`。当指定了控件的位置后，`secondary` widget 总是被放置在另一侧。\n\n```\nclass CheckboxInListTile\
  \ extends StatefulWidget {\n@override\n_CheckboxInListTileState createState() =>\
  \ _CheckboxInListTileState();\n}\nclass _CheckboxInListTileState extends State {\n\
  bool _value = false;\n@override\nWidget build(BuildContext context) {\nreturn CheckboxListTile(\n\
  title: Text('复选框'),\nsubtitle: Text('描述'),\nvalue: _value,\nonChanged: (value) {\n\
  setState(() {\n_value = value;\n});\n},\nsecondary: Icon(_value ? Icons.monetization_on\
  \ : Icons.money_off),\n);\n}\n}\n清单 7-4\nCheckboxListTile 示例\n```\n\n如果你希望在列表磁贴中添加单选按钮，可以使用\
  \ `RadioListTile<T>` widget。对于 `RadioListTile` 构造函数的参数，`value`、`groupValue`、`onChanged`\
  \ 和 `activeColor` 的含义与 `Radio` 构造函数相同；`title`、`subtitle`、`isThreeLine`、`dense`、`secondary`、`selected`\
  \ 和 `controlAffinity` 的含义与 `CheckboxListTile` 构造函数相同。清单 7-5 展示了使用 `RadioListTile`\
  \ 的示例。\n\n```\nenum CustomColor { red, green, blue }\nclass RadioInListTile extends\
  \ StatefulWidget {\n@override\n_RadioInListTileState createState() => _RadioInListTileState();\n\
  }\nclass _RadioInListTileState extends State {\nCustomColor _selectedColor;\n@override\n\
  Widget build(BuildContext context) {\nreturn Column(\nchildren: CustomColor.values.map((color)\
  \ {\nreturn RadioListTile(\ntitle: Text(color.toString()),\nvalue: color,\ngroupValue:\
  \ _selectedColor,\nonChanged: (value) {\nsetState(() {\n_selectedColor = value;\n\
  });\n},\n);\n}).toList(),\n);\n}\n}\n清单 7-5\nRadioListTile 示例\n```\n\n如果你希望在列表磁贴中添加开关，可以使用\
  \ `SwitchListTile`。`SwitchListTile` 构造函数的部分参数来自 `Switch` 构造函数，其他参数则来自 `ListTile`\
  \ 构造函数。清单 7-6 展示了使用 `SwitchListTile` 的示例。\n\n```\nclass SwitchInListTile extends\
  \ StatefulWidget {\n@override\n_SwitchInListTileState createState() => _SwitchInListTileState();\n\
  }\nclass _SwitchInListTileState extends State {\nbool _value = false;\n@override\n\
  Widget build(BuildContext context) {\nreturn SwitchListTile(\ntitle: Text('开关'),\n\
  subtitle: Text('描述'),\nvalue: _value,\nonChanged: (value) {\nsetState(() {\n_value\
  \ = value;\n});\n},\n);\n}\n}\n清单 7-6\nSwitchListTile 示例\n```\n\n图 7-1 展示了不同 ListTile\
  \ 的截图。\n\n![../images/479501_1_En_7_Chapter/479501_1_En_7_Fig1_HTML.jpg](img/479501_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1 ListTile 示例\n\n## 7.2 在网格中显示项目\n\n### 问题\n\n你想在网格中显示项目。\n\n### 解决方案\n\n\
  使用 `GridView`。\n\n\n\n### 讨论\n\n`ListView` 组件以线性数组形式展示列表项。如需以二维数组形式展示组件，可使用 `GridView`。`GridView`\
  \ 子组件的实际布局由 `SliverGridDelegate` 的实现类负责。Flutter 提供了两个内置的 `SliverGridDelegate` 实现：`SliverGridDelegateWithFixedCrossAxisCount`\
  \ 和 `SliverGridDelegateWithMaxCrossAxisExtent`。您也可以自行创建 `SliverGridDelegate` 的实现。\n\
  \n为 `GridView` 提供子组件有三种方式：您可以提供一个静态的组件列表，或使用 `IndexedWidgetBuilder` 类型的构建器函数，或提供一个\
  \ `SliverChildDelegate` 的实现。\n\n根据所选择的 `SliverGridDelegate` 和提供子组件的方式，您可以使用不同的 `GridView`\
  \ 构造函数。表 7-3 展示了不同构造函数的用法。\n\n**表 7-3** `GridView` 构造函数\n\n| 名称 | 委托 | 子组件 |\n|\
  \ --- | --- | --- |\n| `GridView()` | `SliverGridDelegate` | `Widget[]` |\n| `GridView.builder()`\
  \ | `SliverGridDelegate` | `IndexedWidgetBuilder` |\n| `GridView.count()` | `SliverGridDelegateWithFixedCrossAxisCount`\
  \ | `Widget[]` |\n| `GridView.extent()` | `SliverGridDelegateWithMaxCrossAxisExtent`\
  \ | `Widget[]` |\n| `GridView.custom()` | `SliverGridDelegate` | `SliverChildDelegate`\
  \ |\n\n`SliverGridDelegateWithFixedCrossAxisCount` 类使用 `crossAxisCount` 参数来指定交叉轴上固定的瓦片数量。例如，如果\
  \ `GridView` 的滚动方向是垂直的，那么 `crossAxisCount` 参数指定了列数。清单 7-7 展示了一个使用 `GridView.count()`\
  \ 创建三列网格的示例。\n\n```\nGridView.count(\ncrossAxisCount: 3,\nchildren: List.generate(10,\
  \ (index) {\nreturn ExampleWidget(\nname: 'Fixed Count ${index + 1}',\n);\n}),\n\
  );\n```\n**清单 7-7** 使用 `GridView.count()` 的示例\n\n`SliverGridDelegateWithMaxCrossAxisExtent`\
  \ 类使用 `maxCrossAxisExtent` 参数来指定交叉轴上的最大范围。瓦片实际的交叉轴范围将尽可能大，以便均匀划分 `GridView` 的交叉轴范围，并且不会超过指定的最大值。例如，如果\
  \ `GridView` 的交叉轴范围是 400，`maxCrossAxisExtent` 的值是 120，那么瓦片的交叉轴范围就是 100。如果 `GridView`\
  \ 的滚动方向是垂直的，它将有四列。清单 7-8 展示了一个使用 `GridView.extent()` 的示例。\n\n```\nGridView.extent(\n\
  maxCrossAxisExtent: 250,\nchildren: List.generate(10, (index) {\nreturn ExampleWidget(\n\
  name: 'Max Extent ${index + 1}',\n);\n}),\n);\n```\n**清单 7-8** 使用 `GridView.extent()`\
  \ 的示例\n\n要使用构建器函数创建子组件，您需要使用 `GridView.builder()` 构造函数搭配一个 `SliverGridDelegate`\
  \ 实现。清单 7-9 展示了一个将 `GridView.builder()` 与 `SliverGridDelegateWithFixedCrossAxisCount`\
  \ 结合使用的示例。\n\n```\nGridView.builder(\nitemCount: 32,\ngridDelegate:\nSliverGridDelegateWithFixedCrossAxisCount(crossAxisCount:\
  \ 3),\nitemBuilder: (context, index) {\nreturn ExampleWidget(\nname: 'Builder ${index\
  \ + 1}',\n);\n},\n);\n```\n**清单 7-9** 使用 `GridView.builder()` 的示例\n\n`SliverGridDelegateWithFixedCrossAxisCount`\
  \ 和 `SliverGridDelegateWithMaxCrossAxisExtent` 这两个类都有其他命名参数来配置布局；请参见表 7-4。\n\n**表\
  \ 7-4** 内置 `SliverGridDelegate` 实现的参数\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n\
  | `mainAxisSpacing` | `double` | 沿主轴方向的瓦片间距。 |\n| `crossAxisSpacing` | `double`\
  \ | 沿交叉轴方向的瓦片间距。 |\n| `childAspectRatio` | `double` | 瓦片的交叉轴范围与主轴范围的比率。 |\n\n使用这两个\
  \ `SliverGridDelegate` 实现时，会先确定每个瓦片的交叉轴范围，然后通过 `childAspectRatio` 参数确定主轴范围。如果 `GridView`\
  \ 用于显示具有所需宽高比的图像，您可以使用相同的比率作为 `childAspectRatio` 参数的值。`GridView.count()` 和 `GridView.extent()`\
  \ 构造函数都具有表 7-4 中相同的命名参数，以将这些参数传递给底层的 `SliverGridDelegate` 实现。清单 7-10 展示了在显示图像时使用\
  \ `childAspectRatio` 参数的示例。\n\n```\nGridView.count(\ncrossAxisCount: 3,\nchildAspectRatio:\
  \ 4 / 3,\nchildren: List.generate(10, (index) {\nreturn Image.network('https://picsum.photos/400/300');\n\
  }),\n);\n```\n**清单 7-10** 使用 `childAspectRatio` 参数\n\n就像在 `ListView` 中使用 `ListTile`\
  \ 一样，您也可以在 `GridView` 中使用 `GridTile`。一个网格瓦片包含一个必需的子组件，以及可选的页眉和页脚组件。对于网格瓦片的页眉和页脚，通常使用\
  \ `GridTileBar` 组件。`GridTileBar` 与 `ListTile` 类似。`GridTileBar` 构造函数包含 `title`（标题）、`subtitle`（副标题）、`leading`（前置图标）、`trailing`（后置图标）和\
  \ `backgroundColor`（背景色）参数。\n\n```\nGridView.count(\ncrossAxisCount: 2,\nchildren:\
  \ [\nGridTile(\nchild: ExampleWidget(name: 'Simple'),\n),\nGridTile(\nchild: ExampleWidget(name:\
  \ 'Header & Footer'),\nheader: GridTileBar(\ntitle: Text('Header'),\nbackgroundColor:\
  \ Colors.red,\n),\nfooter: GridTileBar(\ntitle: Text('Footer'),\nsubtitle: Text('Description'),\n\
  backgroundColor: Colors.blue,\n),\n)\n],\n);\n```\n**清单 7-11** `GridTile` 和 `GridTileBar`\
  \ 示例\n\n图 7-2 展示了清单 7-11 中代码的截图。\n\n![../images/479501_1_En_7_Chapter/479501_1_En_7_Fig2_HTML.png](img/479501_1_En_7_Fig2_HTML.png)\n\
  \n**图 7-2** `GridTile` 和 `GridTileBar`\n\n## 7.3 显示表格数据\n\n### 问题\n\n您希望显示表格数据或对子组件使用表格布局。\n\
  \n### 解决方案\n\n使用 `Table` 组件。\n\n\n\n### 讨论\n\n若要显示表格数据，使用数据表是自然之选。表格也可用于布局目的，以组织子组件。针对这两种使用场景，你可以使用\
  \ `Table` 组件。\n\n一个 `Table` 组件可以包含多行。表格行由 `TableRow` 组件表示。`Table` 组件的构造函数拥有类型为 `List<TableRow>`\
  \ 的 `children` 参数，用于提供行列表。`TableRow` 的构造函数也拥有类型为 `List<Widget>` 的 `children` 参数，用于提供该行中的单元格列表。表格中的每一行必须拥有相同数量的子组件。\n\
  \n表格的边框使用 `TableBorder` 类定义。`TableBorder` 与 `Border` 类似，但 `TableBorder` 有两个额外的边：\n\
  \n- `horizontalInside` – 行之间的内部水平边框\n- `verticalInside` – 列之间的内部垂直边框\n\n清单 7-12\
  \ 展示了一个包含三行四列的简单表格示例。\n\n```\nTable(\n  border: TableBorder.all(color: Colors.red.shade200),\n\
  \  children: [\n    TableRow(children: [Text('A'), Text('B'), Text('C'), Text('D')]),\n\
  \    TableRow(children: [Text('E'), Text('F'), Text('G'), Text('H')]),\n    TableRow(children:\
  \ [Text('I'), Text('J'), Text('K'), Text('L')]),\n  ],\n);\n```\n\n表格的列宽通过 `TableColumnWidth`\
  \ 的实现来配置。`columnWidths` 参数（类型为 `Map<int, TableColumnWidth>`）定义了列索引与其 `TableColumnWidth`\
  \ 实现之间的映射关系。表 7-5 展示了内置的 `TableColumnWidth` 实现。`MinColumnWidth` 和 `MaxColumnWidth`\
  \ 类组合了其他的 `TableColumnWidth` 实现。如果某列未找到 `TableColumnWidth` 实现，则使用 `defaultColumnWidth`\
  \ 参数来获取默认的 `TableColumnWidth` 实现。`defaultColumnWidth` 的默认值是 `FlexColumnWidth(1.0)`，这意味着所有列的宽度相同。\n\
  \n**表 7-5** `TableColumnWidth` 实现\n\n| 名称 | 性能 | 描述 |\n| --- | --- | --- |\n| `FixedColumnWidth`\
  \ | 高 | 使用固定的像素数作为列宽。 |\n| `FlexColumnWidth` | 中 | 在其他所有非弹性列尺寸确定后，使用弹性因子分配剩余空间。\
  \ |\n| `FractionColumnWidth` | 中 | 使用表格最大宽度的一个比例作为列宽。 |\n| `IntrinsicColumnWidth`\
  \ | 低 | 使用列中所有单元格的固有尺寸来确定列宽。 |\n| `MinColumnWidth` | | 两个 `TableColumnWidth` 对象中的较小值。\
  \ |\n| `MaxColumnWidth` | | 两个 `TableColumnWidth` 对象中的较大值。 |\n\n清单 7-13 展示了一个具有不同列宽的表格示例。\n\
  \n```\nTable(\n  border: TableBorder.all(color: Colors.blue.shade200),\n  columnWidths:\
  \ {\n    0: FixedColumnWidth(100),\n    1: FlexColumnWidth(1),\n    2: FlexColumnWidth(2),\n\
  \    3: FractionColumnWidth(0.2),\n  },\n  children: [\n    TableRow(children: [Text('A'),\
  \ Text('B'), Text('C'), Text('D')]),\n    TableRow(children: [Text('E'), Text('F'),\
  \ Text('G'), Text('H')]),\n    TableRow(children: [Text('I'), Text('J'), Text('K'),\
  \ Text('L')]),\n  ],\n);\n```\n\n单元格的垂直对齐方式通过 `TableCellVerticalAlignment` 枚举的值来配置。`TableCellVerticalAlignment`\
  \ 枚举包含值 `top`、`middle`、`bottom`、`baseline` 和 `fill`。`Table` 构造函数的 `defaultVerticalAlignment`\
  \ 参数指定了默认的 `TableCellVerticalAlignment` 值。如果你想自定义单个单元格的垂直对齐方式，可以将该单元格组件包裹在 `TableCell`\
  \ 组件内，并指定 `verticalAlignment` 参数。清单 7-14 展示了一个为单元格指定垂直对齐方式的示例。\n\n```\nclass VerticalAlignmentTable\
  \ extends StatelessWidget {\n  @override\n  Widget build(BuildContext context) {\n\
  \    return Table(\n      border: TableBorder.all(color: Colors.green.shade200),\n\
  \      defaultVerticalAlignment: TableCellVerticalAlignment.bottom,\n      children:\
  \ [\n        TableRow(children: [\n          TextCell('A'),\n          TableCell(\n\
  \            verticalAlignment: TableCellVerticalAlignment.middle,\n           \
  \ child: Text('B'),\n          ),\n          Text('C'),\n          Text('D'),\n\
  \        ]),\n        TableRow(children: [Text('E'), Text('F'), Text('G'), Text('H')]),\n\
  \        TableRow(children: [Text('I'), Text('J'), Text('K'), Text('L')]),\n   \
  \   ],\n    );\n  }\n}\n\nclass TextCell extends StatelessWidget {\n  TextCell(this.text,\
  \ {this.height = 50});\n  final String text;\n  final double height;\n\n  @override\n\
  \  Widget build(BuildContext context) {\n    return ConstrainedBox(\n      constraints:\
  \ BoxConstraints(\n        minHeight: height,\n      ),\n      child: Text(text),\n\
  \    );\n  }\n}\n```\n\n图 7-3 展示了不同表格的截图。\n\n![../images/479501_1_En_7_Chapter/479501_1_En_7_Fig3_HTML.png](img/479501_1_En_7_Fig3_HTML.png)\n\
  \n## 7.4 构建 Material Design 页面框架\n\n### 问题\n\n你想要构建 Material Design 页面的框架。\n\n###\
  \ 解决方案\n\n使用 `Scaffold` 及其他相关组件。\n\n### 讨论\n\nMaterial Design 应用具有通用的布局结构。`Scaffold`\
  \ 组件将其他通用组件组合在一起，以创建基本的页面结构。表 7-6 展示了可以包含在 `Scaffold` 组件中的元素。指定为 `drawer` 和 `endDrawer`\
  \ 的组件初始时隐藏，可通过滑动来显示。滑动方向取决于文本方向。`drawer` 组件使用与文本方向相同的方向，而 `endDrawer` 组件则使用相反的方向。例如，如果文本方向是从左到右，则\
  \ `drawer` 组件通过从左向右滑动来打开，而 `endDrawer` 组件通过从右向左滑动来打开。\n\n**表 7-6** `Scaffold` 元素\n\
  \n| 参数 | 组件 | 描述 |\n| --- | --- | --- |\n| `appBar` | `AppBar` | 显示在顶部的应用栏。 |\n\
  | `floatingActionButton` | `FloatingActionButton` | 浮动在底部主体右上角的按钮。 |\n| `drawer`\
  \ | `Drawer` | 显示在主体侧面的隐藏面板。 |\n| `endDrawer` | `Drawer` | 显示在主体侧面的隐藏面板。 |\n| `bottomNavigationBar`\
  \ | `BottomAppBar` / `BottomNavigationBar` | 显示在底部的导航栏。 |\n| `bottomSheet` | `BottomSheet`\
  \ | 持久的底部工作表。 |\n| `persistentFooterButtons` | `List<Widget>` | 显示在底部的一组按钮。 |\n\
  | `body` | `Widget` | 主要内容。 |\n\n表 7-6 中的第二列仅列出了这些元素的首选组件类型。`Scaffold` 构造函数实际上接受任何类型的组件。例如，你可以使用\
  \ `ListView` 组件作为 `drawer`。然而，这些首选组件更为合适。\n\n\n\n#### 应用栏\n\n`AppBar` 小部件用于显示当前屏幕的基本信息。它由一个工具栏和其他小部件组成。表\
  \ 7-7 展示了 `AppBar` 小部件的构成元素。这些元素也是 `AppBar` 构造器的具名参数。\n\n**表 7-7** `AppBar` 的参数\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `title` | 工具栏中的主要小部件。 |\n| `leading` | 在 `title`\
  \ 之前显示的小部件。 |\n| `actions` | 在 `title` 之后显示的小部件列表。 |\n| `bottom` | 显示在底部的小部件。 |\n\
  | `flexibleSpace` | 堆叠在工具栏和 `bottom` 之后的小部件。 |\n\n如果 `leading` 小部件为 null 且 `automaticallyImplyLeading`\
  \ 参数为 true，则实际的 `leading` 小部件会从当前状态推断得出。如果 `Scaffold` 包含一个抽屉，则 `leading` 小部件是一个用于打开抽屉的按钮。如果最近的\
  \ `Navigator` 有上一个路由记录，则 `leading` 小部件是一个用于返回上一个路由的 `BackButton`。\n\n`actions` 列表中的小部件通常是\
  \ `IconButtons`。如果没有足够的空间放置这些 `IconButtons`，可以将 `PopupMenuButton` 作为最后一个操作项，并将其他操作放入弹出菜单中。`TabBar`\
  \ 小部件通常用作 `bottom` 小部件。清单 7-15 展示了一个使用 `AppBar` 的示例。\n\n```\nAppBar(\n  title: Text('Scaffold'),\n\
  \  actions: [\n    IconButton(\n      icon: Icon(Icons.search),\n      onPressed:\
  \ () {},\n    ),\n  ],\n);\n```\n\n#### 浮动操作按钮\n\n`FloatingActionButton` 小部件是一种特殊类型的按钮，用于提供对主要操作的快速访问。浮动操作按钮是一个圆形图标，通常显示在屏幕的右下角。在\
  \ Gmail 应用中，邮件列表屏幕有一个用于撰写新邮件的浮动操作按钮。\n\n`FloatingActionButton` 有两种类型。当使用 `FloatingActionButton()`\
  \ 构造器时，只需提供 `child` 小部件和 `onPressed` 回调即可。当使用 `FloatingActionButton.extend()` 构造器时，需要提供\
  \ `icon` 和 `label` 小部件以及 `onPressed` 回调。对于这两种构造器，都可以使用 `foregroundColor` 和 `backgroundColor`\
  \ 参数来自定义颜色。清单 7-16 展示了一个使用 `FloatingActionButton` 的示例。\n\n```\nFloatingActionButton(\n\
  \  child: Icon(Icons.create),\n  onPressed: () {},\n);\n```\n\n#### 抽屉\n\n`Drawer`\
  \ 小部件是一个便捷的封装器，用于在滑动时显示在 `Scaffold` 小部件边缘的面板。虽然你可以使用 `Drawer` 来包裹任何小部件，但通常的做法是在抽屉中展示应用徽标、当前用户信息以及指向应用页面的链接。`ListView`\
  \ 小部件常用作 `Drawer` 小部件的子项，以便在抽屉中启用滚动功能。\n\n要显示应用徽标和当前用户信息，可以使用提供的 `DrawerHeader`\
  \ 小部件及其子类 `UserAccountsDrawerHeader`。`DrawerHeader` 小部件包裹一个子小部件，并具有预定义的样式。`UserAccountsDrawerHeader`\
  \ 是一个用于显示用户详细信息的专用小部件。表 7-8 展示了可以在 `UserAccountsDrawerHeader` 小部件中添加的部分。你还可以使用 `onDetailsPressed`\
  \ 参数为点击包含账户名和电子邮件的区域添加一个回调。\n\n**表 7-8** `UserAccountsDrawerHeader` 中的部分\n\n| 名称\
  \ | 描述 |\n| --- | --- |\n| `currentAccountPicture` | 当前用户账户的头像。 |\n| `otherAccountsPictures`\
  \ | 当前用户其他账户的头像列表。最多只能有三个头像。 |\n| `accountName` | 当前用户账户的名称。 |\n| `accountEmail`\
  \ | 当前用户账户的电子邮件。 |\n\n清单 7-17 展示了一个将 `Drawer` 与 `UserAccountsDrawerHeader` 结合使用的示例。\n\
  \n```\nDrawer(\n  child: ListView(\n    children: [\n      UserAccountsDrawerHeader(\n\
  \        currentAccountPicture: CircleAvatar(\n          child: Text('JD'),\n  \
  \      ),\n        accountName: Text('John Doe'),\n        accountEmail: Text('john.doe@example.com'),\n\
  \      ),\n      ListTile(\n        leading: Icon(Icons.search),\n        title:\
  \ Text('Search'),\n      ),\n      ListTile(\n        leading: Icon(Icons.history),\n\
  \        title: Text('History'),\n      ),\n    ],\n  ),\n);\n```\n\n#### 底部应用栏\n\
  \n`BottomAppBar` 小部件是 `AppBar` 的一个简化版本，显示在 `Scaffold` 的底部。通常只在底部应用栏中添加图标按钮。如果脚手架也包含一个浮动操作按钮，底部应用栏会为该按钮创建一个凹口以便对接。清单\
  \ 7-18 展示了一个使用 `BottomAppBar` 的示例。\n\n```\nBottomAppBar(\n  child: Text('Bottom'),\n\
  \  color: Colors.red,\n);\n```\n\n#### 底部导航栏\n\n`BottomNavigationBar` 小部件提供了额外的链接，用于在不同视图之间导航。表\
  \ 7-9 展示了 `BottomNavigationBar` 构造器的参数。\n\n**表 7-9** `BottomNavigationBar` 的参数\n\
  \n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `items` | `List<BottomNavigationBarItem>`\
  \ | 项目列表。 |\n| `currentIndex` | `int` | 当前选中项目的索引。 |\n| `onTap` | `ValueChanged<int>`\
  \ | 选中项目改变时的回调。 |\n| `type` | `BottomNavigationBarType` | 导航栏的类型。 |\n| `fixedColor`\
  \ | `Color` | 当类型为 `BottomNavigationBarType.fixed` 时，选中项目的颜色。 |\n| `iconSize` |\
  \ `double` | 图标的大小。 |\n\n当点击某个项目时，会调用 `onTap` 回调，并传入被点击项目的索引。根据项目的数量，可以有多种方式来显示这些项目。项目的布局由\
  \ `BottomNavigationBarType` 枚举的值定义。如果值为 `fixed`，这些项目具有固定宽度，并且始终显示文本标签。如果值为 `shifting`，项目的位置可能会根据选中的项目而变化，并且只显示选中项目的文本标签。`BottomNavigationBar`\
  \ 有一个默认的策略来选择类型。当项目少于四个时，使用 `BottomNavigationBarType.fixed`；否则，使用 `BottomNavigationBarType.shifting`。你可以使用\
  \ `type` 参数来覆盖默认行为。\n\n表 7-10 展示了 `BottomNavigationBarItem` 构造器的参数。`icon` 和 `title`\
  \ 参数都是必需的。如果 `BottomNavigationBar` 的类型是 `BottomNavigationBarType.shifting`，那么导航栏的背景颜色由选中项目的背景颜色决定。你应该指定\
  \ `backgroundColor` 参数来区分不同的项目。\n\n**表 7-10** `BottomNavigationBarItem` 的参数\n\n\
  | 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `icon` | `Widget` | 项目的图标。 |\n| `title`\
  \ | `Widget` | 项目的标题。 |\n| `activeIcon` | `Widget` | 项目被选中时显示的图标。 |\n| `backgroundColor`\
  \ | `Color` | 项目的背景颜色。 |\n\n清单 7-19 展示了一个使用 `BottomNavigationBar` 和 `BottomNavigationBarItem`\
  \ 的示例。\n\n```\nBottomNavigationBar(\n  currentIndex: 1,\n  type: BottomNavigationBarType.shifting,\n\
  \  items: [\n    BottomNavigationBarItem(\n      icon: Icon(Icons.cake),\n     \
  \ title: Text('Cake'),\n      backgroundColor: Colors.red.shade100,\n    ),\n  \
  \  BottomNavigationBarItem(\n      icon: Icon(Icons.map),\n      title: Text('Map'),\n\
  \      backgroundColor: Colors.green.shade100,\n    ),\n    BottomNavigationBarItem(\n\
  \      icon: Icon(Icons.alarm),\n      title: Text('Alarm'),\n      backgroundColor:\
  \ Colors.blue.shade100,\n    ),\n  ],\n);\n```\n\n\n\n#### 底部抽屉面板\n\n`BottomSheet`\
  \ widget 显示在应用程序底部，用于提供额外信息。系统的分享面板就是底部抽屉面板的一个典型示例。底部抽屉面板有两种类型：\n\n* 持久性底部抽屉面板始终可见。持久性底部抽屉面板可以使用\
  \ `ScaffoldState.showBottomSheet` 函数和 `Scaffold` 构造函数的 `bottomSheet` 参数来创建。\n* 模态底部抽屉面板的行为类似模态对话框。模态底部抽屉面板可以使用\
  \ `showModalBottomSheet` 函数来创建。\n\n`BottomSheet` 构造函数使用一个 `WidgetBuilder` 函数来创建实际内容。你还需要提供一个\
  \ `onClosing` 回调函数，该回调在底部抽屉面板开始关闭时被调用。清单 7-20 展示了一个使用 `BottomSheet` 的示例。\n\n```\n\
  BottomSheet(\nonClosing: () {},\nbuilder: (context) {\nreturn Text('Bottom');\n\
  },\n);\nListing 7-20\nBottomSheet 示例\n```\n\n#### Scaffold 状态\n\n`Scaffold` 是一个有状态\
  \ widget。你可以使用 `Scaffold.of()` 方法从构建上下文中获取最近 `Scaffold` widget 的 `ScaffoldState`\
  \ 对象。`ScaffoldState` 有不同的方法来与其他组件交互；请参见表 7-11。\n\n**表 7-11** `ScaffoldState` 的方法\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `openDrawer()` | 打开抽屉。 |\n| `openEndDrawer()` |\
  \ 打开末端侧的抽屉。 |\n| `showSnackBar(SnackBar snackbar)` | 显示 `SnackBar`。 |\n| `hideCurrentSnackBar()`\
  \ | 隐藏当前的 `SnackBar`。 |\n| `removeCurrentSnackBar()` | 移除当前的 `SnackBar`。 |\n| `showBottomSheet()`\
  \ | 显示一个持久性底部抽屉面板。 |\n\n#### SnackBar\n\n`SnackBar` widget 在屏幕底部显示一条消息，并可附带一个可选操作。要创建一个\
  \ `SnackBar` widget，构造函数需要 `content` 参数来指定内容。`duration` 参数控制消息栏的显示时长。要向消息栏添加操作，你可以使用类型为\
  \ `SnackBarAction` 的 `action` 参数。当提供操作时，按下操作按钮会关闭消息栏。\n\n要创建 `SnackBarAction` 实例，你需要提供\
  \ `label` 和 `onPressed` 回调。你可以使用 `textColor` 参数自定义按钮标签的颜色。消息栏操作的按钮只能被按下一次。\n\n`ScaffoldState`\
  \ 的 `showSnackBar()` 方法用于显示一个 `SnackBar` widget。一次最多只能显示一个消息栏。如果在另一个消息栏仍然可见时调用 `ScaffoldState()`\
  \ 方法，则给定的消息栏会被添加到一个队列中，并在其他消息栏关闭后显示。`showSnackBar()` 方法的返回类型是 `ScaffoldFeatureController<SnackBar,\
  \ SnackBarClosedReason>`。`SnackBarClosedReason` 是一个枚举，定义了消息栏可能被关闭的原因。\n\n清单 7-21\
  \ 展示了一个打开消息栏的示例。\n\n```\nScaffold.of(context).showSnackBar(SnackBar(\ncontent: Text('This\
  \ is a message.'),\naction: SnackBarAction(label: 'OK', onPressed: () {}),\n));\n\
  Listing 7-21\nSnackBar 示例\n```\n\n## 7.5 构建 iOS 页面框架\n\n### 问题\n\n你想要构建 iOS 页面框架。\n\
  \n### 解决方案\n\n使用 `CupertinoPageScaffold`。\n\n### 讨论\n\n对于 iOS 应用，你可以使用 `CupertinoPageScaffold`\
  \ widget 来创建页面的基本布局。与 Material Design 中的 `Scaffold` 相比，`CupertinoPageScaffold` 提供的自定义选项有限。你只能指定导航栏、子部件和背景颜色。\n\
  \n`CupertinoNavigationBar` widget 与 Material Design 中的 `AppBar` 类似，但 `CupertinoNavigationBar`\
  \ 只能拥有 `leading`、`middle` 和 `trailing` 部件。`middle` 部件位于 `leading` 和 `trailing` 部件之间。当\
  \ `automaticallyImplyLeading` 参数为 `true` 时，`leading` 部件可以根据导航状态自动推断。当 `automaticallyImplyMiddle`\
  \ 参数为 `true` 时，`middle` 部件也可以自动推断。\n\n清单 7-22 展示了一个使用 `CupertinoPageScaffold` 和\
  \ `CupertinoNavigationBar` 的示例。\n\n```\nCupertinoPageScaffold(\nnavigationBar: CupertinoNavigationBar(\n\
  middle: Text('App'),\ntrailing: CupertinoButton(\nchild: Icon(CupertinoIcons.search),\n\
  onPressed: () {},\n),\n),\nchild: Container(),\n);\nListing 7-22\nCupertinoPageScaffold\
  \ 示例\n```\n\n## 7.6 在 Material Design 中创建标签布局\n\n### 问题\n\n你想要创建标签栏和标签。\n\n### 解决方案\n\
  \n使用 `TabBar`、`Tab` 和 `TabController`。\n\n### 讨论\n\n标签布局在移动应用中广泛使用，用于在一个页面中组织多个部分。要在\
  \ Material Design 中实现标签布局，你需要使用多个 widget 协同工作。`TabBar` widget 是 `Tab` widget 的容器。`TabController`\
  \ widget 负责协调 `TabBar` 和 `TabView`。\n\n一个 `Tab` widget 必须至少包含一些文本、一个图标或一个子 widget，但不能同时包含文本和子\
  \ widget。要创建一个 `TabBar`，你需要提供一个标签列表。你可以选择使用显式创建的 `TabController` 实例，或者使用共享的 `DefaultTabController`\
  \ 实例。`DefaultTabController` 是一个继承型 widget。如果没有提供 `TabController`，`TabBar` 将尝试查找祖先级的\
  \ `DefaultTabController` 实例。\n\n你可以选择提供一个 `TabController` 实例，或者使用继承的 `DefaultTabController`。要创建一个\
  \ `TabController`，你需要提供标签数量和一个 `TickerProvider` 实例。\n\n在清单 7-23 中，`_TabPageState`\
  \ 的混入 `SingleTickerProviderStateMixin` 是 `TickerProvider` 的一个实现，因此 `_TabPageState`\
  \ 的当前实例被作为 `TabController` 构造函数的 `vsync` 参数传递。`TabController` 实例由 `TabBar` 和 `TabBarView`\
  \ 共享。\n\n```\nclass TabPage extends StatefulWidget {\n@override\n_TabPageState createState()\
  \ => _TabPageState();\n}\nclass _TabPageState extends State with SingleTickerProviderStateMixin\
  \ {\nfinal List _tabs = [\nTab(text: 'List', icon: Icon(Icons.list)),\nTab(text:\
  \ 'Map', icon: Icon(Icons.map)),\n];\nTabController _tabController;\n@override\n\
  void initState() {\nsuper.initState();\n_tabController = TabController(length: _tabs.length,\
  \ vsync: this);\n}\n@override\nvoid dispose() {\n_tabController.dispose();\nsuper.dispose();\n\
  }\n@override\nWidget build(BuildContext context) {\nreturn Scaffold(\nappBar: AppBar(\n\
  title: Text('Tab'),\nbottom: TabBar(\ntabs: _tabs,\ncontroller: _tabController,\n\
  ),\n),\nbody: TabBarView(\nchildren: _tabs.map((tab) {\nreturn Center(\nchild: Text(tab.text),\n\
  );\n}).toList(),\ncontroller: _tabController,\n),\n);\n}\n}\nListing 7-23\n使用提供的\
  \ TabController 的 TabBar\n```\n\n如果你不需要与 `TabController` 交互，使用 `DefaultTabController`\
  \ 是更好的选择。清单 7-24 中的代码使用 `DefaultTabController` 实现了与清单 7-23 代码相同的功能。\n\n```\nclass\
  \ DefaultTabControllerPage extends StatelessWidget {\nfinal List _tabs = [\nTab(text:\
  \ 'List', icon: Icon(Icons.list)),\nTab(text: 'Map', icon: Icon(Icons.map))\n];\n\
  @override\nWidget build(BuildContext context) {\nreturn DefaultTabController(\n\
  length: _tabs.length,\nchild: Scaffold(\nappBar: AppBar(\nbottom: TabBar(tabs: _tabs),\n\
  ),\nbody: TabBarView(\nchildren: _tabs.map((tab) {\nreturn Center(\nchild: Text(tab.text),\n\
  );\n}).toList(),\n),\n),\n);\n}\n}\nListing 7-24\nDefaultTabController\n```\n\n\
  ## 7.7 在 iOS 中实现标签布局\n\n### 问题\n\n你想要在 iOS 应用中实现标签布局。\n\n### 解决方案\n\n使用 `CupertinoTabScaffold`、`CupertinoTabBar`\
  \ 和 `CupertinoTabView`。\n\n\n\n### 讨论\n\n在 iOS 应用中，也可以通过 `CupertinoTabScaffold`、`CupertinoTabBar`\
  \ 和 `CupertinoTabView` 这些组件来实现标签布局。创建 `CupertinoTabScaffold` 时，应使用 `CupertinoTabBar`\
  \ 作为 `tabBar` 参数的值。`CupertinoTabBar` 中的标签以 `BottomNavigationBarItem` 组件的形式呈现。`tabBuilder`\
  \ 参数则指定了用于构建每个标签视图的构建器函数。清单 7-25/#479501_1_En_7_Chapter.xhtml#PC25) 展示了实现标签布局的一个示例。\n\
  \n```\nclass CupertinoTabPage extends StatelessWidget {\n@override\nWidget build(BuildContext\
  \ context) {\nreturn CupertinoTabScaffold(\ntabBar: CupertinoTabBar(items: [\nBottomNavigationBarItem(icon:\
  \ Icon(CupertinoIcons.settings)),\nBottomNavigationBarItem(icon: Icon(CupertinoIcons.info)),\n\
  ]),\ntabBuilder: (context, index) {\nreturn CupertinoTabView(\nbuilder: (context)\
  \ {\nreturn Center(\nchild: Text('Tab $index'),\n);\n},\n);\n},\n);\n}\n}\n清单 7-25\n\
  iOS 风格的标签布局\n```\n\n## 7.8 总结\n\n本章讨论了 Flutter 中的常用组件，包括列表视图、网格视图、表格布局、页面脚手架和标签布局。这些组件构成了\
  \ Flutter 中页面的基本结构。在下一章中，我们将探讨 Flutter 应用中的页面导航。\n\n"
- "# 8. 页面导航\n\nFlutter 应用可能有多个屏幕或页面。页面是功能的集合。用户在页面之间进行导航以使用不同的功能。像页面这样的概念在 Flutter\
  \ 中被称为路由。路由不仅包括全屏页面，还包括模态对话框和弹出窗口。路由由 `Navigator` 组件管理。本章讨论与 Flutter 中页面导航相关的实用方案。\n\
  \n## 8.1 实现基本页面导航\n\n### 问题\n\n您希望拥有基本的页面导航支持。\n\n### 解决方案\n\n使用 `Navigator.push()`\
  \ 导航到新路由，并使用 `Navigator.pop()` 返回上一个路由。\n\n### 讨论\n\n路由由 `Navigator` 组件管理。导航器管理着一个路由栈。可以使用\
  \ `push()` 方法将路由推入栈中，使用 `pop()` 方法将其从栈中弹出。栈顶元素是当前激活的路由。`Navigator` 是一个有状态组件，其状态为\
  \ `NavigatorState`。要与导航器交互，可以使用 `Navigator` 的静态方法，或者获取一个 `NavigatorState` 实例。通过使用\
  \ `Navigator.of()` 方法，可以获取给定构建上下文最近的 `NavigatorState` 实例。您可以显式创建 `Navigator` 组件，但大多数情况下，您会使用由\
  \ `WidgetsApp`、`MaterialApp` 或 `CupertinoApp` 组件创建的 `Navigator` 组件。\n\n路由使用抽象类 `Route`\
  \ 的实现来表示。例如，`PageRoute` 表示全屏模态路由，而 `PopupRoute` 表示在当前路由之上覆盖一个组件的模态路由。`PageRoute`\
  \ 和 `PopupRoute` 类都是 `ModalRoute` 类的子类。对于 Material Design 应用，创建全屏页面最简单的方法是使用 `MaterialPageRoute`\
  \ 类。`MaterialPageRoute` 使用 `WidgetBuilder` 函数来构建路由的内容。\n\n在清单 8-1/#479501_1_En_8_Chapter.xhtml#PC1)\
  \ 中，`Navigator.of(context)` 获取了要使用的 `NavigatorState` 实例。推送到导航器的新路由是一个 `MaterialPageRoute`\
  \ 实例。这个新路由包含一个按钮，该按钮使用 `NavigatorState.pop()` 方法将当前路由从导航器中弹出。实际上，当使用 `Scaffold`\
  \ 组件时，应用栏会自动添加一个返回按钮，因此无需使用显式的返回按钮。\n\n```\nclass SimpleNavigationPage extends StatelessWidget\
  \ {\n@override\nWidget build(BuildContext context) {\nreturn Scaffold(\nappBar:\
  \ AppBar(\ntitle: Text('Simple Navigation'),\n),\nbody: Center(\nchild: RaisedButton(\n\
  child: Text('Show page'),\nonPressed: () {\nNavigator.of(context).push(MaterialPageRoute(builder:\
  \ (context) {\nreturn Scaffold(\nappBar: AppBar(\ntitle: Text('New Page'),\n),\n\
  body: Center(\nchild: Column(\ncrossAxisAlignment: CrossAxisAlignment.center,\n\
  children: [\nText('A new page'),\nRaisedButton(\nchild: Text('Go back'),\nonPressed:\
  \ () {\nNavigator.of(context).pop();\n},\n),\n],\n),\n),\n);\n}));\n},\n),\n),\n\
  );\n}\n}\n清单 8-1\n使用 Navigator 进行页面导航\n```\n\n`Navigator` 类拥有诸如 `push()` 和 `pop()`\
  \ 之类的静态方法，它们与 `NavigatorState` 类中的同名方法功能相同，但这些静态方法需要一个额外的 `BuildContext` 参数。`Navigator.push(context)`\
  \ 实际上等同于 `Navigator.of(context).push()`。您可以选择使用其中任意一种方法。\n\n## 8.2 使用命名路由\n\n###\
  \ 问题\n\n您希望从不同位置导航到同一个路由。\n\n### 解决方案\n\n结合 `Navigator.pushNamed()` 方法使用命名路由。\n\n\
  ### 讨论\n\n当使用 `Navigator.push()` 方法将新路由推送到导航器时，新路由是通过构建器函数按需构建的。当路由可以从不同位置进行导航时，这种方法效果不佳，因为我们不想重复构建路由的代码。在这种情况下，使用命名路由是更好的选择。命名路由具有唯一的名称。`Navigator.pushNamed()`\
  \ 方法使用该名称来指定要推送到导航器的路由。\n\n命名路由在可以被导航之前需要先进行注册。注册命名路由最简单的方法是使用 `WidgetsApp`、`MaterialApp`\
  \ 或 `CupertinoApp` 构造函数的 `routes` 参数。`routes` 参数是一个 `Map<String, WidgetBuilder>`\
  \ 对象，其键是路由名称。路由名称通常采用以“/”开头的路径格式。这与 Web 应用组织页面的方式类似。例如，您可以使用诸如 `/log_in`、`/orders`\
  \ 和 `/orders/1234` 之类的路由名称。\n\n在清单 8-2/#479501_1_En_8_Chapter.xhtml#PC2) 中，按下“注册”按钮会将命名路由\
  \ `/sign_up` 推送到导航器。\n\n```\nclass LogInPage extends StatelessWidget {\n@override\n\
  Widget build(BuildContext context) {\nreturn Scaffold(\nappBar: AppBar(\ntitle:\
  \ Text('Log In'),\n),\nbody: Center(\nchild: RaisedButton(\nchild: Text('Sign Up'),\n\
  onPressed: () {\nNavigator.pushNamed(context, '/sign_up');\n},\n),\n),\n);\n}\n\
  }\n清单 8-2\n使用命名路由\n```\n\n在清单 8-3/#479501_1_En_8_Chapter.xhtml#PC3) 中，两个命名路由在 `routes`\
  \ 参数中注册了。\n\n```\nclass PageNavigationApp extends StatelessWidget {\n@override\n\
  Widget build(BuildContext context) {\nreturn MaterialApp(\ntitle: 'Page Navigation',\n\
  home: IndexPage(),\nroutes: {\n'/sign_up': (context) => SignUpPage(),\n'/log_in':\
  \ (context) => LogInPage(),\n},\n);\n}\n}\n清单 8-3\n注册命名路由\n```\n\n## 8.3 在路由之间传递数据\n\
  \n### 问题\n\n您希望在不同的路由之间传递数据。\n\n### 解决方案\n\n使用构造函数参数或 `RouteSettings` 对象将数据传递给路由，并使用\
  \ `Navigator.pop()` 方法的 `result` 参数从路由返回数据。\n\n\n\n### 讨论\n\n路由在构建内容时可能需要额外的数据。路由在弹出时也可能会返回一些数据。例如，编辑用户详细信息的路由可能需要当前的详细信息作为输入，并返回更新后的详细信息作为输出。根据路由导航方式的不同，在路由之间传递数据有不同方法。\n\
  \n使用 `Navigator.push()` 方法推入新路由时，最简单的方式是将数据作为 `WidgetBuilder` 函数返回的 widget 的构造函数参数传入。使用\
  \ `Navigator.pop()` 方法时，可以使用可选的 `result` 参数将返回值传递给前一个路由。`Navigator.push()` 方法的返回值是一个\
  \ `Future<T>` 对象。当新推入的路由被弹出时，这个 `Future` 对象会被解析。解析后的值就是调用 `Navigator.pop()` 方法时传入的返回值。如果路由是通过返回按钮弹出的，那么解析后的值为\
  \ `null`。\n\n在代码清单 8-4 中，`UserDetails` 类包含用户的名和姓。`UserDetailsPage` 用于显示用户详情。当按下编辑按钮时，一个新路由被推入导航器。新路由的内容是一个\
  \ `EditUserDetailsPage` widget，其构造函数参数为 `UserDetails` 对象。新路由的返回值也是一个 `UserDetails`\
  \ 对象，用于更新 `UserDetailsPage` 的状态。\n\n```\nclass UserDetails {\nUserDetails(this.firstName,\
  \ this.lastName);\nfinal String firstName;\nfinal String lastName;\n}\nclass UserDetailsPage\
  \ extends StatefulWidget {\n@override\n_UserDetailsPageState createState() => _UserDetailsPageState();\n\
  }\nclass _UserDetailsPageState extends State {\nUserDetails _userDetails = UserDetails('John',\
  \ 'Doe');\n@override\nWidget build(BuildContext context) {\nreturn Scaffold(\nappBar:\
  \ AppBar(\ntitle: Text('User Details'),\n),\nbody: Column(\nchildren: [\nText('First\
  \ name: ${_userDetails.firstName}'),\nText('Last name: ${_userDetails.lastName}'),\n\
  RaisedButton.icon(\nlabel: Text('Edit (route builder)'),\nicon: Icon(Icons.edit),\n\
  onPressed: () async {\nUserDetails result = await Navigator.push(\ncontext,\nMaterialPageRoute(\n\
  builder: (BuildContext context) {\nreturn EditUserDetailsPage(_userDetails);\n},\n\
  ),\n);\nif (result != null) {\nsetState(() {\n_userDetails = result;\n});\n}\n},\n\
  ),\n],\n),\n);\n}\n}\n代码清单 8-4\n用户详情页面\n```\n\n在代码清单 8-5 中，`EditUserDetailsPage`\
  \ 使用两个 `TextFormField` widget 来编辑用户详情。当按下保存按钮时，通过 `Navigator.pop()` 方法返回更新后的 `UserDetails`\
  \ 对象。\n\n```\nclass EditUserDetailsPage extends StatefulWidget {\nEditUserDetailsPage(this.userDetails);\n\
  final UserDetails userDetails;\n@override\n_EditUserDetailsPageState createState()\
  \ =>\n_EditUserDetailsPageState(userDetails);\n}\nclass _EditUserDetailsPageState\
  \ extends State {\n_EditUserDetailsPageState(this._userDetails);\nUserDetails _userDetails;\n\
  final GlobalKey<FormFieldState> _firstNameKey = GlobalKey();\nfinal GlobalKey<FormFieldState>\
  \ _lastNameKey = GlobalKey();\n@override\nWidget build(BuildContext context) {\n\
  return Scaffold(\nappBar: AppBar(\ntitle: Text('Edit User Details'),\n),\nbody:\
  \ Column(\nchildren: [\nTextFormField(\nkey: _firstNameKey,\ndecoration: InputDecoration(\n\
  labelText: 'First name',\n),\ninitialValue: _userDetails.firstName,\n),\nTextFormField(\n\
  key: _lastNameKey,\ndecoration: InputDecoration(\nlabelText: 'Last name',\n),\n\
  initialValue: _userDetails.lastName,\n),\nRaisedButton(\nchild: Text('Save'),\n\
  onPressed: () {\nNavigator.pop(\ncontext,\nUserDetails(_firstNameKey.currentState?.value,\n\
  _lastNameKey.currentState?.value));\n},\n)\n],\n),\n);\n}\n}\n代码清单 8-5\n编辑用户详情页面\n\
  ```\n\n如果使用命名路由，可以通过 `Navigator.pushNamed()` 方法的 `arguments` 参数将数据传递给路由。在代码清单 8-6\
  \ 中，使用 `pushNamed()` 方法导航到 `/edit_user` 路由，并传入当前 `UserDetails` 对象。\n\n```\nUserDetails\
  \ result = await Navigator.pushNamed(\ncontext,\n'/edit_user',\narguments: _userDetails,\n\
  );\n代码清单 8-6\n向命名路由传递数据\n```\n\n命名路由 `/edit_user` 在 `MaterialApp` 中注册。不能使用 `route`\
  \ 参数，因为无法在构建函数中访问传递给路由的数据。应改用 `WidgetsApp`、`MaterialApp` 或 `CupertinoApp` 的 `onGenerateRoute`\
  \ 参数。`onGenerateRoute` 参数的类型是 `RouteFactory`，它是函数类型 `Route (RouteSettings settings)`\
  \ 的类型别名。`RouteSettings` 类包含创建 `Route` 对象时可能所需的数据。表 8-1 显示了 `RouteSettings` 类的属性。\n\
  \n**表 8-1** `RouteSettings` 的属性\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `name`\
  \ | `String` | 路由的名称。 |\n| `arguments` | `Object` | 传递给路由的数据。 |\n| `isInitialRoute`\
  \ | `bool` | 此路由是否是推入导航器的第一个路由。 |\n\n在实现 `onGenerateRoute` 函数时，需要根据提供的 `RouteSettings`\
  \ 对象返回路由。在代码清单 8-7 中，首先检查 `name` 属性，然后返回一个包含 `EditUserDetailsPage` 内容的 `MeterialPageRoute`。`RouteSettings`\
  \ 的 `arguments` 属性在 `EditUserDetailsPage` 的构造函数中使用。`arguments` 属性的值就是代码清单 8-6 中传入的\
  \ `UserDetails` 对象。\n\n```\nMaterialApp(\nonGenerateRoute: (RouteSettings settings)\
  \ {\nif (settings.name == '/edit_user') {\nreturn MaterialPageRoute(\nsettings:\
  \ settings,\nbuilder: (context) {\nreturn EditUserDetailsPage(settings.arguments);\n\
  },\n);\n}\n},\n);\n代码清单 8-7\n使用 onGenerateRoute\n```\n\n## 8.4 实现动态路由匹配\n\n### 问题\n\
  \n您想使用复杂的逻辑来匹配路由名称。\n\n### 解决方案\n\n使用 `onGenerateRoute` 参数。\n\n### 讨论\n\n当使用 `WidgetsApp`\
  \ 的 `routes` 参数注册命名路由时，只能使用完整的路由名称来匹配 `Route` 对象。如果您想使用复杂的逻辑来将 `Route` 对象与路由名称匹配，可以使用\
  \ `onGenerateRoute` 参数和 `RouteSettings` 对象。例如，您可以将所有以 `/order` 开头的路由名称匹配到同一个 `Route`\
  \ 对象。\n\n在代码清单 8-8 中，所有以 `/order` 开头的路由名称都将导航到一个使用 `OrderPage` 的路由。\n\n```\nMaterialApp(\n\
  onGenerateRoute: (RouteSettings settings) {\nif (settings.name.startsWith('/order'))\
  \ {\nreturn MaterialPageRoute(\nsettings: settings,\nbuilder: (context) {\nreturn\
  \ OrderPage();\n},\n);\n}\n},\n);\n代码清单 8-8\n路由匹配\n```\n\n## 8.5 处理未知路由\n\n### 问题\n\
  \n您想处理导航到未知路由的情况。\n\n### 解决方案\n\n使用 `Navigator`、`WidgetsApp`、`MaterialApp` 和 `CupertinoApp`\
  \ 的 `onUnknownRoute` 参数。\n\n### 讨论\n\n导航器有可能被要求导航到一个未知路由。这可能是由应用程序中的编程错误或外部路由导航请求引起的。如果\
  \ `onGenerateRoute` 函数为给定的 `RouteSettings` 对象返回 `null`，则会调用 `onUnknownRoute` 函数来提供一个后备路由。这个\
  \ `onUnknownRoute` 函数通常用于错误处理，就像 Web 应用中的 404 页面一样。`onUnknownRoute` 的类型也是 `RouteFactory`。\n\
  \n在代码清单 8-9 中，`onUnknownRoute` 函数返回一个显示 `NotFoundPage` widget 的路由。\n\n```\nMaterialApp(\n\
  onUnknownRoute: (RouteSettings settings) {\nreturn MaterialPageRoute(\nsettings:\
  \ settings,\nbuilder: (BuildContext context) {\nreturn NotFoundPage(settings.name);\n\
  },\n);\n},\n);\n代码清单 8-9\n使用 onUnknownRoute\n```\n\n## 8.6 显示 Material Design 对话框\n\
  \n### 问题\n\n您想显示 Material Design 对话框。\n\n### 解决方案\n\n使用 `showDialog()` 函数以及 `Dialog`、`SimpleDialog`\
  \ 和 `AlertDialog` widget。\n\n\n\n### 讨论\n\n要使用 Material Design 对话框，你需要创建对话框小部件并显示它们。`Dialog`\
  \ 类及其子类 `SimpleDialog` 和 `AlertDialog` 可用于创建对话框。\n\n`SimpleDialog` 小部件向用户提供多个选项。选项通过\
  \ `SimpleDialogOption` 类表示。一个 `SimpleDialogOption` 小部件可以拥有一个子小部件和一个 `onPressed`\
  \ 回调。创建 `SimpleDialog` 时，你可以提供一个子列表和一个可选标题。`AlertDialog` 小部件向用户呈现内容和一个操作列表。`AlertDialog`\
  \ 用于通知用户或请求确认。\n\n要显示对话框，应使用 `showDialog()` 函数。调用此函数会将对话框路由推送到导航器中。对话框使用 `Navigator.pop()`\
  \ 方法关闭。`showDialog()` 函数使用一个 `WidgetBuilder` 函数来构建对话框内容。`showDialog()` 函数的返回值是一个\
  \ `Future<T>` 对象，它实际上是 `Navigator.push()` 方法的返回值。\n\n在代码清单 8-10 中，按下按钮会显示一个带有两个选项的简单对话框。\n\
  \n```\nRaisedButton(\nchild: Text('显示 SimpleDialog'),\nonPressed: () async {\nString\
  \ result = await showDialog(\ncontext: context,\nbuilder: (BuildContext context)\
  \ {\nreturn SimpleDialog(\ntitle: Text('选择颜色'),\nchildren: [\nSimpleDialogOption(\n\
  child: Text('红色'),\nonPressed: () {\nNavigator.pop(context, '红色');\n},\n),\nSimpleDialogOption(\n\
  child: Text('绿色'),\nonPressed: () {\nNavigator.pop(context, '绿色');\n},\n),\n],\n\
  );\n});\nprint(result);\n},\n);\n代码清单 8-10\n显示简单对话框\n```\n\n图 8-1 显示了代码清单 8-10 的截图。\n\
  \n![../images/479501_1_En_8_Chapter/479501_1_En_8_Fig1_HTML.jpg](img/479501_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n\nMaterial Design 简单对话框\n\n在代码清单 8-11 中，按下按钮会显示一个带有两个操作的提示对话框。\n\n```\n\
  RaisedButton(\nchild: Text('显示 AlertDialog'),\nonPressed: () async {\nbool result\
  \ = await showDialog(\ncontext: context,\nbuilder: (BuildContext context) {\nreturn\
  \ AlertDialog(\ntitle: Text('删除'),\ncontent: Text('删除此项目？'),\nactions: [\nFlatButton(\n\
  child: Text('是'),\nonPressed: () {\nNavigator.pop(context, true);\n},\n),\nFlatButton(\n\
  child: Text('否'),\nonPressed: () {\nNavigator.pop(context, false);\n},\n),\n],\n\
  );\n},\n);\nprint(result);\n},\n);\n代码清单 8-11\n显示提示对话框\n```\n\n图 8-2 显示了代码清单 8-11\
  \ 的截图。\n\n![../images/479501_1_En_8_Chapter/479501_1_En_8_Fig2_HTML.jpg](img/479501_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2\n\nMaterial Design 提示对话框\n\n## 8.7 显示 iOS 对话框\n\n### 问题\n\n你想要显示 iOS 对话框。\n\
  \n### 解决方案\n\n使用 `showCupertinoDialog()` 函数以及 `CupertinoAlertDialog` 和 `CupertinoPopupSurface`\
  \ 小部件。\n\n### 讨论\n\n对于 iOS 应用，你可以使用 `showCupertinoDialog()` 函数以及诸如 `CupertinoAlertDialog`\
  \ 和 `CupertinoPopupSurface` 之类的小部件来显示对话框。`showCupertinoDialog()` 函数与 Material Design\
  \ 的 `showDialog()` 函数类似。此函数也使用 `Navigator.push()` 方法将对话框路由推送到导航器。`CupertinoAlertDialog`\
  \ 是一个内置的对话框实现，用于通知用户或请求确认。一个 `CupertinoAlertDialog` 可以包含标题、内容和一个操作列表。操作通过 `CupertinoDialogAction`\
  \ 小部件表示。表 8-2 显示了 `CupertinoDialogAction` 构造函数的参数。\n\n表 8-2\n\n`CupertinoDialogAction`\
  \ 的参数\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `child` | `Widget` | 操作的内容。 |\n\
  | `onPressed` | `VoidCallback` | 操作按下的回调。 |\n| `isDefaultAction` | `bool` | 此操作是否为默认操作。\
  \ |\n| `isDestructiveAction` | `bool` | 此操作是否具有破坏性。具有破坏性的操作有不同的样式。 |\n| `textStyle`\
  \ | `TextStyle` | 应用于操作的文本样式。 |\n\n在代码清单 8-12 中，按下按钮会显示一个 iOS 风格的提示对话框。\n\n```\n\
  CupertinoButton(\nchild: Text('显示提示对话框'),\nonPressed: () async {\nbool result =\
  \ await showCupertinoDialog(\ncontext: context,\nbuilder: (BuildContext context)\
  \ {\nreturn CupertinoAlertDialog(\ntitle: Text('删除'),\ncontent: Text('删除此项目？'),\n\
  actions: [\nCupertinoDialogAction(\nchild: Text('删除'),\nonPressed: () {\nNavigator.pop(context,\
  \ true);\n},\nisDestructiveAction: true,\n),\nCupertinoDialogAction(\nchild: Text('取消'),\n\
  onPressed: () {\nNavigator.pop(context, false);\n},\n),\n],\n);\n},\n);\nprint(result);\n\
  },\n);\n代码清单 8-12\n显示 iOS 提示对话框\n```\n\n图 8-3 显示了代码清单 8-12 的截图。\n\n![../images/479501_1_En_8_Chapter/479501_1_En_8_Fig3_HTML.jpg](img/479501_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3\n\niOS 提示对话框\n\n如果你想创建自定义对话框，可以使用 `CupertinoPopupSurface` 小部件，它会创建一个圆角矩形表面。\n\
  \n## 8.8 显示 iOS 操作面板\n\n### 问题\n\n你希望在 iOS 应用中为用户提供一组可供选择的操作。\n\n### 解决方案\n\n使用\
  \ `showCupertinoModalPopup()` 函数和 `CupertinoActionSheet` 小部件。\n\n### 讨论\n\n如果你希望在\
  \ iOS 应用中为用户提供一组可供选择的操作，可以使用 `showCupertinoModalPopup()` 函数来显示 `CupertinoActionSheet`\
  \ 小部件。一个 `CupertinoActionSheet` 可以包含标题、消息、一个取消按钮以及一个操作列表。操作表示为 `CupertinoActionSheetAction`\
  \ 小部件。`CupertinoActionSheetAction` 构造函数的参数包括 `child`、`onPressed`、`isDefaultAction`\
  \ 和 `isDestructiveAction`，这些参数的含义与表 8-2 中所示的 `CupertinoDialogAction` 构造函数中的相同。\n\
  \n在代码清单 8-13 中，按下按钮会显示一个包含三个操作和一个取消按钮的操作面板。\n\n```\nCupertinoButton(\nchild: Text('显示操作面板'),\n\
  onPressed: () async {\nString result = await showCupertinoModalPopup(\ncontext:\
  \ context,\nbuilder: (BuildContext context) {\nreturn CupertinoActionSheet(\ntitle:\
  \ Text('要做什么'),\nmessage: Text('请选择一个操作'),\nactions: [\nCupertinoActionSheetAction(\n\
  child: Text('复制'),\nisDefaultAction: true,\nonPressed: () {\nNavigator.pop(context,\
  \ 'duplicate');\n},\n),\nCupertinoActionSheetAction(\nchild: Text('移动'),\nonPressed:\
  \ () {\nNavigator.pop(context, 'move');\n},\n),\nCupertinoActionSheetAction(\nisDestructiveAction:\
  \ true,\nchild: Text('删除'),\nonPressed: () {\nNavigator.pop(context, 'delete');\n\
  },\n),\n],\ncancelButton: CupertinoActionSheetAction(\nchild: Text('取消'),\nonPressed:\
