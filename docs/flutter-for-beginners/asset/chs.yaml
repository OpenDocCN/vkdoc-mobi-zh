  \  }\n  @override\n  bool shouldReload(LocalizationsDelegate old) {\n    return\
  \ false;\n  }\n}\n代码清单 13-10\n自定义 LocalizationsDelegate\n```\n\n需要将 `_AppLocalizationsDelegate`\
  \ 对象添加到代码清单 13-7 的 `localizationsDelegates` 列表中。代码清单 13-11 展示了如何使用 `AppLocalizations`\
  \ 类。\n\n```\nText(AppLocalizations.of(context).greeting('John'))\n代码清单 13-11\n使用\
  \ AppLocalizations\n```\n\n## 13.4 生成翻译文件\n\n### 问题\n\n你希望从代码中提取可本地化字符串，并整合翻译后的字符串。\n\
  \n### 解决方案\n\n使用 `intl_translation` 包中的工具。\n\n\n\n### 讨论\n\n**食谱 13-3** 描述了如何使用\
  \ `Localizations` 组件和 `LocalizationsDelegate` 类来支持多语言环境。该方案的主要缺点在于，你需要为所有支持的语言环境手动创建本地化资源类。由于本地化字符串直接嵌入在源代码中，这导致翻译人员很难参与进来。一个更好的选择是使用\
  \ `intl_translation` 包提供的工具来自动化这个过程。你需要在 `pubspec.yaml` 文件的 `dev_dependencies` 中添加\
  \ `intl_translation: ⁰.17.3`。\n\n**清单 13-12** 展示了新的 `AppLocalizations` 类，它与清单 13-9\
  \ 拥有相同的 `appName` 属性和 `greeting()` 方法。`Intl.message()` 方法用于描述一个本地化字符串。只有消息字符串是必需的。像\
  \ `name`、`desc`、`args` 和 `examples` 这样的参数用于帮助翻译人员理解消息字符串。\n\n```\nclass AppLocalizations\
  \ {\n  static AppLocalizations of(BuildContext context) {\n    return Localizations.of(context,\
  \ AppLocalizations);\n  }\n  String get appName {\n    return Intl.message(\n  \
  \    'Demo App',\n      name: 'appName',\n      desc: 'Name of the app',\n    );\n\
  \  }\n  String greeting(String name) {\n    return Intl.message(\n      'Hello,\
  \ $name',\n      name: 'greeting',\n      args: [name],\n      desc: 'Greeting message',\n\
  \      examples: const {'name': 'John'},\n    );\n  }\n}\n清单 13-12\n使用 Intl.message()\
  \ 的 AppLocalizations\n```\n\n现在我们可以使用 `intl_translation` 包提供的工具从源代码中提取本地化消息。以下命令从\
  \ `lib/app_intl.dart` 文件中提取使用 `Intl.message()` 声明的消息，并保存到 `lib/l10n` 目录中。运行此命令后，你应该会在\
  \ `lib/l10n` 目录中看到生成的 `intl_messages.arb` 文件。生成的文件采用 ARB (Application Resource Bundle)\
  \ 格式 (https://github.com/googlei18n/app-resource-bundle)，该格式可以作为 Google Translator\
  \ Toolkit 等翻译工具的输入。ARB 文件实际上是 JSON 文件；你可以直接使用文本编辑器修改它们。\n\n```\n$ flutter packages\
  \ pub run intl_translation:extract_to_arb --locale=en --output-dir=lib/l10n lib/app_intl.dart\n\
  ```\n\n现在，你可以为每个支持的语言环境复制 `intl_messages.arb` 文件并进行翻译。例如，`intl_messages_zh.arb`\
  \ 文件就是针对 `zh` 语言环境的翻译版本。翻译文件准备就绪后，你可以使用以下命令生成 Dart 文件。运行此命令后，你应该会看到一个 `messages_all.dart`\
  \ 文件以及每个语言环境对应的 `messages_*.dart` 文件。\n\n```\n$ flutter packages pub run intl_translation:generate_from_arb\
  \ --output-dir=lib/l10n --no-use-deferred-loading lib/app_intl.dart lib/l10n/intl_*.arb\n\
  ```\n\n`messages_all.dart` 文件中的 `initializeMessages()` 函数可用于为指定的语言环境初始化消息。清单 13-13\
  \ 中的静态 `load()` 方法首先使用 `initializeMessages()` 函数初始化消息，然后设置默认语言环境。\n\n```\nclass\
  \ AppLocalizations {\n  static Future<AppLocalizations> load(Locale locale) {\n\
  \    final String name =\n        locale.countryCode.isEmpty ? locale.languageCode\
  \ : locale.toString();\n    final String localeName = Intl.canonicalizedLocale(name);\n\
  \    return initializeMessages(localeName).then((_) {\n      Intl.defaultLocale\
  \ = localeName;\n      return AppLocalizations();\n    });\n  }\n}\n清单 13-13\n加载消息\n\
  ```\n\n这个静态的 `AppLocalizations.load()` 方法可以被 `LocalizationsDelegate` 类的 `load()`\
  \ 方法使用，以加载 `AppLocalizations` 对象。\n\n## 13.5 绘制自定义元素\n\n### 问题\n\n你想绘制自定义元素。\n\n\
  ### 解决方案\n\n使用 `CustomPaint` 组件以及 `CustomPainter` 和 `Canvas` 类。\n\n### 讨论\n\n如果你想完全自定义一个组件的绘制，可以使用\
  \ `CustomPaint` 组件。`CustomPaint` 组件提供了一个画布，用于绘制自定义元素。**表 13-1** 显示了 `CustomPaint`\
  \ 构造函数的参数。在绘制过程中，`painter` 首先在画布上绘制，然后绘制子组件，最后 `foregroundPainter` 在画布上绘制。\n\n**表\
  \ 13-1** `CustomPaint` 的参数\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `painter`\
  \ | `CustomPainter` | 在子组件之前绘制的绘画器。 |\n| `foregroundPainter` | `CustomPainter` |\
  \ 在子组件之后绘制的绘画器。 |\n| `size` | `Size` | 绘制的大小。 |\n| `child` | `Widget` | 子组件。 |\n\
  \n要创建 `CustomPainter` 对象，你需要创建 `CustomPainter` 的子类，并重写 `paint()` 和 `shouldRepaint()`\
  \ 方法。在 `paint()` 方法中，`canvas` 参数可用于绘制自定义元素。`Canvas` 类有一组用于绘制不同元素的方法；请参见**表 13-2**。\n\
  \n**表 13-2** `Canvas` 的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `drawArc()` | 绘制一个弧。\
  \ |\n| `drawCircle()` | 用指定的圆心和半径绘制一个圆。 |\n| `drawImage()` | 绘制一个 `Image` 对象。 |\n\
  | `drawLine()` | 在两点之间绘制一条线。 |\n| `drawOval()` | 绘制一个椭圆。 |\n| `drawParagraph()`\
  \ | 绘制文本。 |\n| `drawRect()` | 用指定的 `Rect` 对象绘制一个矩形。 |\n| `drawRRect()` | 绘制一个圆角矩形。\
  \ |\n\n`Canvas` 类中的大多数方法都有一个 `Paint` 类型的参数，用于描述在画布上绘制时使用的样式。在**清单 13-14** 中，`Shapes`\
  \ 类在画布上绘制了一个矩形和一个圆形。在 `CustomShapes` 组件中，`Text` 组件绘制在 `Shapes` 绘画器的上方。\n\n```\n\
  class CustomShapes extends StatelessWidget {\n  @override\n  Widget build(BuildContext\
  \ context) {\n    return Container(\n      width: 300,\n      height: 300,\n   \
  \   child: CustomPaint(\n        painter: Shapes(),\n        child: Center(child:\
  \ Text('Hello World')),\n      ),\n    );\n  }\n}\n\nclass Shapes extends CustomPainter\
  \ {\n  @override\n  void paint(Canvas canvas, Size size) {\n    Rect rect = Offset(5,\
  \ 5) & (size - Offset(5, 5));\n    canvas.drawRect(\n      rect,\n      Paint()\n\
  \        ..color = Colors.red\n        ..strokeWidth = 2\n        ..style = PaintingStyle.stroke,\n\
  \    );\n    canvas.drawCircle(\n      rect.center,\n      (rect.shortestSide /\
  \ 2) - 10,\n      Paint()..color = Colors.blue,\n    );\n  }\n\n  @override\n  bool\
  \ shouldRepaint(CustomPainter oldDelegate) {\n    return false;\n  }\n}\n清单 13-14\n\
  使用 CustomPaint\n```\n\n## 13.6 自定义主题\n\n### 问题\n\n你想在 Flutter 应用中自定义主题。\n\n### 解决方案\n\
  \n对于 Material Design 使用 `ThemeData` 类，对于 iOS 使用 `CupertinoThemeData` 类。\n\n\n\n\
  ### 讨论\n\n自定义应用的外观和感觉是一种常见需求。对于 Flutter 应用，如果使用 Material Design，可以通过`ThemeData`类来定制主题。`ThemeData`类拥有大量参数，用于配置主题的各个方面。`MaterialApp`类通过`theme`参数提供`ThemeData`对象。对于\
  \ iOS 风格，`CupertinoThemeData`类具有相同的作用，用于指定主题。`CupertinoApp`类也拥有类型为`CupertinoThemeData`的`theme`参数，用于自定义主题。\n\
  \n如果需要访问当前主题对象，在 Material Design 中，可以使用静态方法`Theme.of()`来获取构建上下文最近的外层`ThemeData`对象。类似地，`CupertinoTheme.of()`方法可用于\
  \ iOS 风格。\n\n在代码清单 13-15 中，第一个`Text`组件使用当前`Theme`对象的`textTheme.headline`属性作为样式。第二个`Text`组件使用`colorScheme.error`属性作为颜色，以显示错误文本。\n\
  \n```\nclass TextTheme extends StatelessWidget {\n@override\nWidget build(BuildContext\
  \ context) {\nreturn Column(\nchildren: [\nText('Headline', style: Theme.of(context).textTheme.headline),\n\
  Text('Error',\nstyle: TextStyle(color: Theme.of(context).colorScheme.error)),\n\
  ],\n);\n}\n}\n代码清单 13-15\n使用主题\n```\n\n## 13.7 总结\n\n本章讨论了 Flutter 中在不同场景下很有用的杂项主题。在下一章中，我们将讨论\
  \ Flutter 中的测试与调试。\n\n"
- "# 14. 测试与调试\n\n本章涵盖了与测试和调试 Flutter 应用相关的实践方法。\n\n## 14.1 编写单元测试\n\n### 问题\n\n你想要编写单元测试。\n\
  \n### 解决方案\n\n使用`test`包中的 API。\n\n### 讨论\n\n单元测试在应用开发中非常重要。要在 Flutter 应用中编写测试，需将`test:\
  \ ¹.5.3`添加到`pubspec.yaml`文件的`dev_dependencies`部分。测试文件通常放在`test`目录下。代码清单 14-1 中的`MovingBox`类是需要测试的类。`move()`方法更新内部的`_offset`变量。\n\
  \n```\nclass MovingBox {\nMovingBox({Offset initPos = Offset.zero}) : _offset =\
  \ initPos;\nOffset _offset;\nget offset => _offset;\nvoid move(double dx, double\
  \ dy) {\n_offset += Offset(dx, dy);\n}\n}\n代码清单 14-1\n要测试的 Dart 类\n```\n\n代码清单 14-2\
  \ 展示了`MovingBox`类的测试。`group()`函数创建一个组来描述一组测试。`test()`函数使用给定的描述和函数体创建一个测试用例。函数体是一个使用`expect()`函数声明要验证的期望的函数。要调用`expect()`函数，你需要提供实际值和一个用于检查该值的匹配器。匹配器可以是简单值，也可以是来自`matcher`包的函数。常见的匹配器函数包括`contains()`、`startsWith()`、`endsWith()`、`lessThan()`、`greaterThan()`和`inInclusiveRange()`。\n\
  \n```\nvoid main() {\ngroup('MovingBox', () {\ntest('position should be (0.0) by\
  \ default', () {\nexpect(MovingBox().offset, Offset.zero);\n});\ntest('postion should\
  \ be initial value', () {\nexpect(MovingBox(initPos: Offset(10, 10)).offset, Offset(10,\
  \ 10));\n});\ntest('postion should be moved', () {\nfinal box = MovingBox();\nbox.move(5,\
  \ 5);\nexpect(box.offset, Offset(5, 5));\nbox.move(-1, -1);\nexpect(box.offset,\
  \ Offset(4, 4));\n});\n});\n}\n代码清单 14-2\nMovingBox 的测试\n```\n\n你可以使用`async`函数作为`expect()`函数的函数体来编写异步测试。在代码清单\
  \ 14-3 中，第一个测试用例使用带有`await`的`async`函数来获取`Future`对象的值。在第二个测试用例中，`completion()`函数等待`Future`对象完成并验证其值。`throwsA()`函数验证`Future`对象是否抛出了给定的错误。在第三个测试用例中，`expectAsync1()`函数包装另一个函数以验证结果并检查其调用次数。\n\
  \n```\nvoid main() {\ntest('future with async', () async {\nvar value = await Future.value(1);\n\
  expect(value, equals(1));\n});\ntest('future', () {\nexpect(Future.value(1), completion(equals(1)));\n\
  expect(Future.error('error'), throwsA(equals('error')));\n});\ntest('future callback',\
  \ () {\nFuture.error('error').catchError(expectAsync1((error) {\nexpect(error, equals('error'));\n\
  }, count: 1));\n});\n}\n代码清单 14-3\n异步测试\n```\n\n你可以使用`setUp()`函数来添加一个在测试之前运行的函数。类似地，`tearDown()`函数用于添加一个在测试之后运行的函数。`setUp()`函数应用于准备测试用例运行的上下文。`tearDown()`函数应用于执行清理任务。`setUp()`和`tearDown()`函数通常成对出现。在代码清单\
  \ 14-4 中，`setUp()`和`tearDown()`函数将被调用两次。\n\n```\nvoid main() {\nsetUp(() {\nprint('setUp');\n\
  });\ntest('action1', () {\nprint('action1');\n});\ntest('action2', () {\nprint('action2');\n\
  });\ntearDown(() {\nprint('tearDown');\n});\n}\n代码清单 14-4\nsetUp() 和 tearDown()\
  \ 函数\n```\n\n运行代码清单 14-4 中的测试用例后，输出应如代码清单 14-5 所示。\n\n```\nsetUp\naction1\ntearDown\n\
  setUp\naction2\ntearDown\n代码清单 14-5\n使用 setUp() 和 tearDown() 函数的输出\n```\n\n## 14.2\
  \ 在测试中使用模拟对象\n\n### 问题\n\n你想要在测试用例中模拟依赖项。\n\n### 解决方案\n\n使用`mockito`包。\n\n\n\n###\
  \ 讨论\n\n在编写测试用例时，待测试的类可能依赖于需要外部资源的依赖项。例如，一个服务类需要访问后端 API 来获取数据。在测试这些类时，你不应使用真实的依赖关系。依赖外部资源会给测试用例的执行带来不确定性，并使其不稳定。使用实时服务也难以测试所有可能的场景。\n\
  \n更好的方法是创建模拟对象来替代这些依赖关系。借助模拟对象，你可以轻松模拟不同的场景。模拟对象是类的替代实现。你可以手动创建模拟对象，或使用 `mockito`\
  \ 包。要使用 `mockito` 包，你需要在 `pubspec.yaml` 文件的 `dev_dependencies` 部分添加 `mockito: ⁴.0.0`。\n\
  \n清单 14-6 中的 `GitHubJobsClient` 类使用了来自 `http` 包的 `Client` 类来访问 GitHub Jobs API。\n\
  \n```\nclass GitHubJobsClient {\n  GitHubJobsClient({@required this.httpClient})\
  \ : assert(httpClient != null);\n  final http.Client httpClient;\n  Future<List<Job>>\
  \ getJobs(String keyword) async {\n    Uri url = Uri.https(\n      'jobs.github.com',\
  \ '/positions.json', {'description': keyword});\n    http.Response response = await\
  \ httpClient.get(url);\n    if (response.statusCode != 200) {\n      throw Exception('Failed\
  \ to get job listings');\n    }\n    return (jsonDecode(response.body) as List)\n\
  \        .map((json) => Job.fromJson(json))\n        .toList();\n  }\n}\n清单 14-6\n\
  待测试的 GitHubJobsClient 类\n```\n\n为了测试 `GitHubJobsClient` 类，我们可以为 `http.Client` 对象创建一个模拟对象。在清单\
  \ 14-7 中，`MockHttpClient` 类是对 `http.Client` 类的模拟类。在第一个测试用例中，当使用指定的 `Uri` 对象调用 `MockHttpClient`\
  \ 的 `get()` 方法时，会返回一个包含 JSON 字符串的 `Future<Response>` 对象作为结果。我们可以验证 `GitHubJobsClient`\
  \ 的 `getJobs()` 方法能够解析该响应并返回一个包含一个元素的 `List` 对象。在第二个测试用例中，`MockHttpClient` 的 `get()`\
  \ 方法的返回结果被设置为一个包含 HTTP 500 错误的 `Future<Response>`。然后我们通过调用 `getJobs()` 方法来验证程序抛出了异常。\n\
  \n```\nimport 'package:mockito/mockito.dart';\nclass MockHttpClient extends Mock\
  \ implements http.Client {}\nvoid main() {\n  group('getJobs', () {\n    Uri url\
  \ = Uri.https(\n      'jobs.github.com', '/positions.json', {'description': 'flutter'});\n\
  \    test('should return list of jobs', () {\n      final httpClient = MockHttpClient();\n\
  \      when(httpClient.get(url))\n          .thenAnswer((_) async => http.Response('[{\"\
  id\": \"123\"}]', 200));\n      final jobsClient = GitHubJobsClient(httpClient:\
  \ httpClient);\n      expect(jobsClient.getJobs('flutter'), completion(hasLength(1)));\n\
  \    });\n    test('should throws an exception', () {\n      final httpClient =\
  \ MockHttpClient();\n      when(httpClient.get(url))\n          .thenAnswer((_)\
  \ async => http.Response('error', 500));\n      final jobsClient = GitHubJobsClient(httpClient:\
  \ httpClient);\n      expect(jobsClient.getJobs('flutter'), throwsException);\n\
  \    });\n  });\n}\n清单 14-7\n使用模拟对象的 GitHubJobsClient 测试\n```\n\n## 14.3 编写 Widget\
  \ 测试\n\n### 问题\n\n你想要编写测试用例来测试 Widget。\n\n### 解决方案\n\n使用 `flutter_test` 包。\n\n\n\
  \n### 讨论\n\n使用 `test` 和 `mockito` 包足以编写 Dart 类的测试。然而，你需要使用 `flutter_test` 包来编写小部件的测试。`flutter_test`\
  \ 包已经包含在由 `flutter create` 命令创建的新项目的 `pubspec.yaml` 文件中。小部件的测试用例使用 `testWidgets()`\
  \ 函数声明。调用 `testWidgets()` 时，你需要提供一个描述和一个在 Flutter 测试环境中运行的回调。该回调接收一个 `WidgetTester`\
  \ 对象，用于与小部件和测试环境进行交互。创建待测试的小部件后，你可以使用 `Finder` 对象和匹配器来验证小部件的状态。\n\n表 14-1 显示了 `WidgetTester`\
  \ 类的方法。`pumpWidget()` 方法通常是测试的入口点，它创建要测试的小部件。测试有状态小部件时，更改状态后，你需要调用 `pump()` 方法触发重建。如果小部件使用动画，你应该使用\
  \ `pumpAndSettle()` 方法等待动画完成。像 `enterText()` 和 `ensureVisible()` 这样的方法使用 `Finder`\
  \ 对象来查找要交互的小部件。\n\n**表 14-1**  \n`WidgetTester` 的方法\n\n| 名称 | 描述 |\n| --- | ---\
  \ |\n| `pumpWidget()` | 渲染指定的小部件。 |\n| `pump()` | 触发一个帧，导致小部件重建。 |\n| `pumpAndSettle()`\
  \ | 重复调用 `pump()` 方法，直到没有计划执行的帧。 |\n| `enterText()` | 向文本输入小部件输入文本。 |\n| `pageBack()`\
  \ | 关闭当前页面。 |\n| `runAsync()` | 异步运行回调。 |\n| `dispatchEvent()` | 分发事件。 |\n| `ensureVisible()`\
  \ | 通过滚动其祖先 `Scrollable` 小部件使小部件可见。 |\n| `drag()` | 按给定偏移量拖动小部件。 |\n| `press()`\
  \ | 按下小部件。 |\n| `longPress()` | 长按小部件。 |\n| `tap()` | 轻触小部件。 |\n\n清单 14-8 中的 `ToUppercase`\
  \ 小部件是一个要测试的有状态小部件。它有一个 `TextField` 小部件用于输入文本。当按钮被按下时，输入文本的大写形式会通过 `Text` 小部件显示出来。\n\
  \n```dart\nclass ToUppercase extends StatefulWidget {\n@override\n_ToUppercaseState\
  \ createState() => _ToUppercaseState();\n}\nclass _ToUppercaseState extends State\
  \ {\nfinal _controller = TextEditingController();\n@override\nWidget build(BuildContext\
  \ context) {\nreturn Column(\nchildren: [\nRow(\nchildren: [\nExpanded(child: TextField(controller:\
  \ _controller)),\nRaisedButton(\nchild: Text('Uppercase'),\nonPressed: () {\nsetState(()\
  \ {});\n},\n),\n],\n),\nText((_controller.text ?? \").toUpperCase()),\n],\n);\n\
  }\n}\n```\n**清单 14-8**  \n要测试的小部件\n\n清单 14-9 展示了 `ToUppercase` 小部件的测试用例。`_wrapInMaterial()`\
  \ 函数在测试前将 `ToUppercase` 小部件包裹在 `MaterialApp` 中。这是因为 `TextField` 小部件需要一个祖先 `Material`\
  \ 小部件。在测试用例中，首先使用 `pumpWidget()` 渲染小部件。`find` 对象是 `CommonFinders` 类的一个顶级常量。它有便捷的方法来创建不同类型的\
  \ `Finder` 对象。这里我们查找类型为 `TextField` 的小部件，并使用 `enterText()` 输入文本 \"abc\"。然后轻触 `RaisedButton`\
  \ 小部件，状态发生改变。需要调用 `pump()` 方法来触发重建。最后，我们验证是否存在一个文本为 \"ABC\" 的 `Text` 小部件。\n\n**表\
  \ 14-2**  \n`CommonFinders` 的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `byType()` | 按类型查找小部件。\
  \ |\n| `byIcon()` | 按图标数据查找 `Icon` 小部件。 |\n| `byKey()` | 通过特定的 `Key` 对象查找小部件。 |\n\
  | `byTooltip()` | 查找具有给定消息的 `Tooltip` 小部件。 |\n| `byWidget()` | 按给定的小部件实例查找小部件。 |\n\
  | `text()` | 查找具有给定文本的 `Text` 和 `EditableText` 小部件。 |\n| `widgetWithIcon()` | 查找包含具有该图标的子代小部件的小部件。\
  \ |\n| `widgetWithText()` | 查找包含具有给定文本的 `Text` 子代的小部件。 |\n\n```dart\nWidget _wrapInMaterial(Widget\
  \ widget) {\nreturn MaterialApp(\nhome: Scaffold(\nbody: widget,\n),\n);\n}\nvoid\
  \ main() {\ntestWidgets('ToUppercase', (WidgetTester tester) async {\nawait tester.pumpWidget(_wrapInMaterial(ToUppercase()));\n\
  await tester.enterText(find.byType(TextField), 'abc');\nawait tester.tap(find.byType(RaisedButton));\n\
  await tester.pump();\nexpect(find.text('ABC'), findsOneWidget);\n});\n}\n```\n**清单\
  \ 14-9**  \n测试 `ToUppercase` 小部件\n\n`Finder` 对象与匹配器一起用于验证状态。有四个匹配器可与 `Finder` 对象一起使用：\n\
  \n*   `findsOneWidget`：期望恰好找到一个小部件。\n*   `findsNothing`：期望没有找到小部件。\n*   `findsNWidgets`：期望找到指定数量的小部件。\n\
  *   `findsWidgets`：期望至少找到一个小部件。\n\n## 14.4 编写集成测试\n\n### 问题\n\n你希望编写在模拟器或真实设备上运行的集成测试。\n\
  \n### 解决方案\n\n使用 `flutter_driver` 包。\n\n\n\n### Discussion\n\n单元测试和部件测试只能测试单个类、函数或部件。这些测试在开发或测试机器上运行，无法测试应用不同组件之间的集成。针对这种情况，应使用集成测试。\n\
  \n集成测试包含两个部分：第一部分是部署到模拟器或真实设备上的被检测应用；第二部分是驱动应用并验证应用状态的测试代码。被测试的应用与测试代码相互隔离，以避免干扰。\n\
  \n编写集成测试需要使用`flutter_driver`包。你需要将`flutter_driver`包添加到`pubspec.yaml`文件的`dev_dependencies`部分，如清单\
  \ [14-10] 所示。\n\n```\ndev_dependencies:\n  flutter_driver:\n    sdk: flutter\n```\n\
  \n清单 14-10 添加`flutter_driver`包\n\n集成测试文件通常放在`test_driver`目录中。本次测试的目标是用于搜索 GitHub\
  \ 职位列表的页面。为需要被集成测试使用的部件提供`ValueKey`对象作为`key`参数非常重要，这有助于在测试用例中更容易地找到这些部件。在清单 [14-11]\
  \ 中，`Key('keyword')`创建了一个名称为 \"keyword\" 的`ValueKey`对象。\n\n```\nTextField(\n  key:\
  \ Key('keyword'),\n  controller: _controller,\n)\n```\n\n清单 14-11 为部件添加 key\n\n\
  `test_driver`目录中的`github_jobs.dart`文件包含待测试页面的被检测版本。清单 [14-12] 展示了`github_jobs.dart`文件的内容。`flutter_driver`包中的`enableFlutterDriverExtension()`函数使\
  \ Flutter Driver 能够连接到应用。\n\n```\nvoid main() {\n  enableFlutterDriverExtension();\n\
  \  runApp(SampleApp());\n}\n```\n\n清单 14-12 使用 Flutter Driver 测试的应用\n\n清单 [14-13]\
  \ 展示了`github_jobs_test.dart`文件的内容。文件名通过在应用文件名后附加`_test`后缀来选择。这是 Flutter Driver 用于查找运行被测应用的\
  \ Dart 文件的约定。在`setUpAll()`函数中，使用`FlutterDriver.connect()`连接到应用。在测试用例中，`find`是`CommonFinders`对象的顶级常量，它提供了方便的方法来创建`SerializableFinder`对象。`byValueKey()`方法通过指定的键找到清单\
  \ [14-11] 中的`TextField`部件。`FlutterDriver`的`tap()`方法点击该`TextField`部件使其获得焦点。然后使用`enterText()`方法将搜索关键词输入到已聚焦的`TextField`部件中。接着点击搜索按钮触发数据加载。如果数据加载成功，则出现带有`jobsList`键的`ListView`部件。`waitFor()`方法等待`ListView`部件出现。\n\
  \n```\nvoid main() {\n  group('GitHub Jobs', () {\n    FlutterDriver driver;\n \
  \   setUpAll(() async {\n      driver = await FlutterDriver.connect();\n    });\n\
  \    test('searches by keyword', () async {\n      await driver.tap(find.byValueKey('keyword'));\n\
  \      await driver.enterText('android');\n      await driver.tap(find.byValueKey('search'));\n\
  \      await driver.waitFor(find.byValueKey('jobsList'),\n          timeout: Duration(seconds:\
  \ 5));\n    });\n    tearDownAll(() {\n      if (driver != null) {\n        driver.close();\n\
  \      }\n    });\n  });\n}\n```\n\n清单 14-13 使用 Flutter Driver 进行测试\n\n现在我们可以使用以下命令来运行集成测试。Flutter\
  \ Driver 将应用部署到模拟器或真实设备上，并运行测试代码以验证结果。\n\n```\n$ flutter driver --target=test_driver/github_jobs.dart\n\
  ```\n\n表 [14-3] 展示了`FlutterDriver`类的方法，这些方法可用于在测试期间与应用进行交互。如果你想执行自定义操作，可以在调用`enableFlutterDriverExtension()`函数时提供一个`DataHandler`函数。通过`requestData()`方法发送的消息将由该`DataHandler`处理。\n\
  \n**表 14-3** FlutterDriver 的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `enterText()` |\
  \ 向当前聚焦的文本输入框输入文本。 |\n| `getText()` | 获取`Text`部件中的文本。 |\n| `tap()` | 点击部件。 |\n|\
  \ `waitFor()` | 等待直到查找器定位到部件。 |\n| `waitForAbsent()` | 等待直到查找器无法再定位到部件。 |\n| `scroll()`\
  \ | 按给定偏移量在部件中滚动。 |\n| `scrollIntoView()` | 滚动部件的`Scrollable`祖先，直到部件可见。 |\n| `scrollUntilVisible(SerializableFinder\
  \ scrollable, SerializableFinder item)` | 在`scrollable`部件中重复调用`scroll()`，直到`item`可见，然后对`item`调用`scrollIntoView()`。\
  \ |\n| `traceAction()` | 执行操作并返回其性能跟踪。 |\n| `startTracing()` | 开始记录性能跟踪。 |\n| `stopTracingAndDownloadTimeline()`\
  \ | 停止记录性能跟踪并下载结果。 |\n| `forceGC()` | 强制执行垃圾回收。 |\n| `getRenderTree()` | 返回当前渲染树的转储。\
  \ |\n| `requestData()` | 向应用发送消息并接收响应。 |\n| `screenshot()` | 截取屏幕截图。 |\n\n`FlutterDriver`类中的方法使用`SerializableFinder`对象来定位部件。表\
  \ [14-4] 展示了`CommonFinders`类中用于创建`SerializableFinder`对象的方法。这些方法仅支持使用`String`或`int`值作为参数，这是因为在发送到应用时需要对值进行序列化。\n\
  \n**表 14-4** flutter_driver 中 CommonFinders 的方法\n\n| 名称 | 描述 |\n| --- | --- |\n\
  | `byType()` | 通过类名查找部件。 |\n| `byValueKey()` | 通过键查找部件。 |\n| `byTooltip()` | 查找具有给定消息的工具提示的部件。\
  \ |\n| `text()` | 查找包含给定文本的`Text`和`EditableText`部件。 |\n| `pageBack()` | 查找返回按钮。\
  \ |\n\n## 14.5 调试应用\n\n### 问题\n\n你想调试在应用中发现的问题。\n\n### 解决方案\n\n使用 Flutter SDK 提供的\
  \ IDE 和实用工具。\n\n\n\n### 讨论\n\n当代码在运行时未按预期工作，你需要调试代码以找出原因。借助 IDE 可以非常直接地调试 Flutter\
  \ 应用。你可以在代码中添加断点，并以调试模式启动应用。\n\n另一种常见的代码调试方法是使用 `print()` 函数将输出写入系统控制台。这些日志可以通过\
  \ `flutter logs` 命令查看。Android Studio 也会在控制台视图中显示这些日志。你也可以使用 `debugPrint()` 函数来限制输出，以避免日志被\
  \ Android 系统丢弃。\n\n在创建你自己的组件时，应重写 `debugFillProperties()` 方法以添加自定义诊断属性。这些属性可以在 Flutter\
  \ Inspector 中查看。在代码清单 14-14 中，`DebugWidget` 拥有 `name` 和 `price` 属性。在 `debugFillProperties()`\
  \ 方法中，通过 `DiagnosticPropertiesBuilder` 对象添加了两个 `DiagnosticsProperty` 对象。\n\n```\n\
  class DebugWidget extends StatelessWidget {\nDebugWidget({Key key, this.name, this.price})\
  \ : super(key: key);\nfinal String name;\nfinal double price;\n@override\nWidget\
  \ build(BuildContext context) {\nreturn Text('$name - $price');\n}\n@override\n\
  void debugFillProperties(DiagnosticPropertiesBuilder properties) {\nsuper.debugFillProperties(properties);\n\
  properties.add(StringProperty('name', name));\nproperties.add(DoubleProperty('price',\
  \ price));\n}\n}\n代码清单 14-14\ndebugFillProperties()\n```\n\n根据属性类型的不同，可以使用不同类型的\
  \ `DiagnosticsProperty` 子类。表 14-5 展示了常用的 `DiagnosticsProperty` 子类。\n\n**表 14-5**\
  \ CommonFinders 的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `StringProperty` | 用于 `String`\
  \ 属性。 |\n| `DoubleProperty` | 用于 `double` 属性。 |\n| `PercentProperty` | 将 `double`\
  \ 属性格式化为百分比。 |\n| `IntProperty` | 用于 `int` 属性。 |\n| `FlagProperty` | 将 `bool` 属性格式化为标志。\
  \ |\n| `EnumProperty` | 用于 `enum` 属性。 |\n| `IterableProperty` | 用于 `Iterable` 属性。\
