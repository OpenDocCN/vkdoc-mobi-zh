- "# 13. 杂项\n\n本章涵盖了 Flutter 中杂项主题的实践指南。\n\n## 13.1 使用资源\n\n### 问题\n\n你想要在应用中打包静态资源。\n\
  \n### 解决方案\n\n使用 assets。\n\n\n\n### 讨论\n\nFlutter 应用可以同时包含代码和静态资源。共有两种类型的资源：\n\n\
  - 数据文件，包括 JSON、XML 和纯文本文件\n- 二进制文件，包括图片和视频\n\n资源在 `pubspec.yaml` 文件的 `flutter/assets`\
  \ 部分中声明。在构建过程中，这些资源文件会被打包到应用的二进制文件中。这些资源可以在运行时被访问。通常将资源放在 `assets` 目录下。在代码清单 13-1\
  \ 中，两个文件在 `pubspec.yaml` 文件中被声明为资源。\n\n```\nflutter:\nassets:\n- assets/dog.jpg\n\
  - assets/data.json\n代码清单 13-1\npubspec.yaml 文件中的资源\n```\n\n在运行时，使用 `AssetBundle`\
  \ 类的子类从资源中加载内容。`load()` 方法检索二进制内容，而 `loadString()` 方法检索字符串内容。使用这两个方法时，你需要提供资源的键。该键与\
  \ `pubspec.yaml` 文件中声明的资源路径相同。静态的应用级 `rootBundle` 属性引用了包含与应用打包在一起的资源的 `AssetBundle`\
  \ 对象。你可以直接使用此属性来加载资源。建议使用静态的 `DefaultAssetBundle.of()` 方法从构建上下文中获取 `AssetBundle`\
  \ 对象。\n\n在代码清单 13-2 中，JSON 文件 `assets/data.json` 使用 `loadString()` 方法作为字符串加载。\n\n\
  ```\nclass TextAssets extends StatelessWidget {\n@override\nWidget build(BuildContext\
  \ context) {\nreturn FutureBuilder(\nfuture: DefaultAssetBundle.of(context)\n.loadString('assets/data.json')\n\
  .then((json) {\nreturn jsonDecode(json)['name'];\n}),\nbuilder: (context, snapshot)\
  \ {\nif (snapshot.connectionState == ConnectionState.done) {\nreturn Center(child:\
  \ Text(snapshot.data));\n} else {\nreturn Center(child: CircularProgressIndicator());\n\
  }\n},\n);\n}\n}\n代码清单 13-2\n加载字符串资源\n```\n\n如果资源文件是图片，你可以使用 `AssetImage` 类配合 `Image`\
  \ 小部件来显示它。在代码清单 13-3 中，`AssetImage` 类用于显示 `assets/dog.jpg` 图片。\n\n```\nImage(\n\
  image: AssetImage('assets/dog.jpg'),\n)\n代码清单 13-3\n使用 AssetImage\n```\n\n对于图片资源，同一个文件通常有多个不同分辨率的变体。当使用\
  \ `AssetImage` 类加载图片资源时，将使用与当前设备像素比最匹配的变体。\n\n在代码清单 13-4 中，`assets/2.0x/dog.jpg`\
  \ 文件是 `assets/dog.jpg` 的一个变体，其分辨率为 `2.0`。如果设备像素比为 `1.6`，则会使用 `assets/2.0x/dog.jpg`\
  \ 文件。\n\n```\nflutter:\nassets:\n- assets/dog.jpg\n- assets/2.0x/dog.jpg\n- assets/3.0x/dog.jpg\n\
  代码清单 13-4\n图片资源变体\n```\n\n## 13.2 使用手势\n\n### 问题\n\n你希望允许用户使用手势来执行操作。\n\n### 解决方案\n\
  \n使用 `GestureDetector` 小部件来检测手势。\n\n### 讨论\n\n移动应用的用户习惯于在执行操作时使用手势。例如，在查看图片库时，使用滑动手势可以轻松地在不同图片之间导航。在\
  \ Flutter 中，我们可以使用 `GestureDetector` 小部件来检测手势，并为手势调用指定的回调。`GestureDetector` 构造函数有大量参数来为不同事件提供回调。一个手势在其生命周期内可能会分发多个事件。例如，水平拖动的手势可以分发三个事件。以下是这三个事件的处理程序参数：\n\
  \n- `onHorizontalDragStart` 回调表示指针可能开始水平移动。\n- `onHorizontalDragUpdate` 回调表示指针正在水平方向移动。\n\
  - `onHorizontalDragEnd` 回调表示指针不再与屏幕接触。\n\n不同事件的回调可以接收关于事件的详细信息。在代码清单 13-5 中，`GestureDetector`\
  \ 小部件包装了一个 `Container` 小部件。在 `onHorizontalDragEnd` 回调处理程序中，`DragEndDetails` 对象的\
  \ `velocity` 属性是指针的移动速度。我们使用此属性来确定拖动方向。\n\n```\nclass SwipingCounter extends StatefulWidget\
  \ {\n@override\n_SwipingCounterState createState() => _SwipingCounterState();\n\
  }\nclass _SwipingCounterState extends State {\nint _count = 0;\n@override\nWidget\
  \ build(BuildContext context) {\nreturn Column(\nchildren: [\nText('$_count'),\n\
  Expanded(\nchild: GestureDetector(\nchild: Container(\ndecoration: BoxDecoration(color:\
  \ Colors.grey.shade200),\n),\nonHorizontalDragEnd: (DragEndDetails details) {\n\
  setState(() {\ndouble dx = details.velocity.pixelsPerSecond.dx;\n_count += (dx >\
  \ 0 ? 1 : (dx < 0 ? -1 : 0));\n});\n},\n),\n),\n] ,\n);\n}\n}\n代码清单 13-5\n使用 GestureDetector\n\
  ```\n\n## 13.3 支持多种语言区域\n\n### 问题\n\n你希望应用支持多种语言区域。\n\n### 解决方案\n\n使用 `Localizations`\
  \ 小部件和 `LocalizationsDelegate` 类。\n\n\n\n### 讨论\n\nFlutter 对国际化提供了内置支持。若需支持多种语言区域，需要使用\
  \ `Localizations` 组件。`Localizations` 类通过一个 `LocalizationsDelegate` 对象列表来加载本地化资源。`LocalizationsDelegate<T>`\
  \ 类是一组类型为 `T` 的本地化资源的工厂。这组本地化资源通常是一个包含属性和方法的类，用于提供具体的本地化值。\n\n要创建一个 `Localizations`\
  \ 对象，你需要提供 `Locale` 对象和一个 `LocalizationsDelegate` 对象列表。大多数情况下，无需显式创建 `Localizations`\
  \ 对象，因为 `WidgetsApp` 组件已自动创建。`WidgetsApp` 构造函数包含一些参数，这些参数会传递给 `Localizations` 对象。当需要使用本地化值时，可以调用静态方法\
  \ `Localizations.of<T>(BuildContext context, Type type)` 来获取指定类型的、最近的本地化资源对象。\n\n\
  默认情况下，Flutter 仅提供美国英语的本地化。要支持其他语言区域，首先需要添加 Flutter 针对这些区域的本地化支持。这通过在 `pubspec.yaml`\
  \ 文件的 `dependencies` 中添加 `flutter_localizations` 包来实现，如代码清单 13-6 所示。添加此包后，即可使用 `MaterialLocalizations`\
  \ 类中定义的本地化值。\n\n```\ndependencies:\n  flutter:\n    sdk: flutter\n  flutter_localizations:\n\
  \    sdk: flutter\n代码清单 13-6\nflutter_localizations\n```\n\n添加 `flutter_localizations`\
  \ 包后，需要启用这些本地化值。在代码清单 13-7 中，通过将 `GlobalMaterialLocalizations.delegate` 和 `GlobalWidgetsLocalizations.delegate`\
  \ 添加到 `MaterialApp` 构造函数的 `localizationsDelegates` 列表来实现。`localizationsDelegates`\
  \ 参数的值会传递给 `Localizations` 构造函数。`supportedLocales` 参数则用于指定支持的语言区域。\n\n```\nMaterialApp(\n\
  \  localizationsDelegates: [\n    GlobalMaterialLocalizations.delegate,\n    GlobalWidgetsLocalizations.delegate,\n\
  \  ],\n  supportedLocales: [\n    const Locale('en'),\n    const Locale('zh', 'CN'),\n\
  \  ],\n);\n代码清单 13-7\n启用 Flutter 本地化值\n```\n\n在代码清单 13-8 中，`MaterialLocalizations.of()`\
  \ 方法从构建上下文中获取 `MaterialLocalizations` 对象。`copyButtonLabel` 属性是 `MaterialLocalizations`\
  \ 类中定义的一个本地化值。在运行时，按钮的标签文本取决于设备的语言区域。`MaterialLocalizations.of()` 方法内部使用了 `Localizations.of()`\
  \ 来查找 `MaterialLocalizations` 对象。\n\n```\nRaisedButton(\n  child: Text(MaterialLocalizations.of(context).copyButtonLabel),\n\
  \  onPressed: () {},\n);\n代码清单 13-8\n使用本地化值\n```\n\n`MaterialLocalizations` 类仅提供有限的本地化值。对于你自己的应用，需要创建自定义的本地化资源类。代码清单\
  \ 13-9 中的 `AppLocalizations` 类就是一个自定义的本地化资源类。`AppLocalizations` 类的 `appName` 属性是一个简单可本地化字符串的示例。`greeting()`\
  \ 方法是一个需要参数的可本地化字符串的示例。`AppLocalizationsEn` 和 `AppLocalizationsZhCn` 类分别是 `AppLocalizations`\
  \ 类针对 `en` 和 `zh_CN` 语言区域的实现。\n\n```\nabstract class AppLocalizations {\n  String\
  \ get appName;\n  String greeting(String name);\n  static AppLocalizations of(BuildContext\
  \ context) {\n    return Localizations.of(context, AppLocalizations);\n  }\n}\n\n\
  class AppLocalizationsEn extends AppLocalizations {\n  @override\n  String get appName\
  \ => 'Demo App';\n  @override\n  String greeting(String name) {\n    return 'Hello,\
  \ $name';\n  }\n}\n\nclass AppLocalizationsZhCn extends AppLocalizations {\n  @override\n\
  \  String get appName => '示例应用';\n  @override\n  String greeting(String name) {\n\
  \    return '你好, $name';\n  }\n}\n代码清单 13-9\nAppLocalizations 及其本地化子类\n```\n\n我们还需要创建一个自定义的\
  \ `LocalizationsDelegate` 类来加载 `AppLocalizations` 对象。需要实现三个方法：\n\n*   `isSupported()`\
  \ 方法用于检查某个语言区域是否被支持。\n*   `load()` 方法用于加载指定语言区域的本地化资源对象。\n*   `shouldReload()` 方法用于检查是否应该调用\
  \ `load()` 方法重新加载资源。\n\n在代码清单 13-10 的 `load()` 方法中，会根据给定的语言区域返回 `AppLocalizationsEn`\
