- "# 1. 开始使用\n\n本章的指南将帮助你搭建本地开发环境，为构建 Flutter 应用做好准备。根据你机器的操作系统不同，设置步骤可能有所差异。你只需根据自身需求使用相应的指南即可。完成本章指南后，你应该能够在模拟器或物理设备上运行第一个\
  \ Flutter 应用。\n\n## 1.1 在 Windows 上安装 Flutter SDK\n\n### 问题\n\n你有一台 Windows 机器，并希望在这台机器上开始\
  \ Flutter 开发。\n\n### 解决方案\n\n在 Windows 机器上安装 Flutter SDK 并配置 Android 平台。\n\n###\
  \ 讨论\n\nFlutter SDK 支持 Windows 平台。在 Windows 上安装 Flutter 并不像你想象的那样困难。首先，你需要确保本地开发环境满足最低要求。你需要拥有\
  \ 64 位 Windows 7 SP1 或更高版本，并且 Flutter SDK 至少需要 400MB 的可用磁盘空间。Flutter SDK 还需要机器上安装有\
  \ Windows PowerShell 5.0 或更新版本，以及 Git for Windows。\n\nWindows PowerShell 5.0 预装在\
  \ Windows 10 中。对于 Windows 10 之前的 Windows 版本，你需要按照微软的说明（https://docs.microsoft.com/en-us/powershell/scripting/setup/installing-windows-powershell）手动安装\
  \ PowerShell 5.0。你可能已经安装了 Git for Windows，因为 Git 是一种非常流行的开发工具。如果你可以在 PowerShell\
  \ 中运行 Git 命令，那就没问题。否则，你需要下载 Git for Windows（https://git-scm.com/download/win）并安装它。在安装\
  \ Git for Windows 时，请确保在“调整你的 PATH 环境”页面中选中“从命令行以及第三方软件使用 Git”选项；见图 1-1。\n\n满足这些最低要求后，你可以从官方网站（https://flutter.dev/docs/get-started/install/windows）下载\
  \ Flutter SDK 的 zip 压缩包。将下载的 zip 文件解压到本地机器上所需的位置。建议避免使用安装 Windows 的系统驱动器。在解压后的目录中，双击\
  \ `flutter_console.bat` 文件启动 Flutter 控制台并运行 Flutter SDK 命令。\n\n为了能够在任何 Windows 控制台中运行\
  \ Flutter SDK 命令，我们需要将 Flutter SDK 添加到 `PATH` 环境变量中。安装目录下 `bin` 文件夹的完整路径应被添加到 `PATH`\
  \ 中。在 Windows 10 上修改 PATH：\n\n1.  打开开始搜索，输入“env”并选择“编辑系统环境变量”。\n2.  点击“环境变量...”按钮，在“系统变量”区域下找到第一列为“Path”的行。\n\
  3.  在“编辑环境变量”对话框中，点击“新建”并输入已安装 Flutter SDK 的 `bin` 目录路径。\n4.  点击“确定”关闭所有对话框。\n\n\
  现在，你可以打开一个新的 PowerShell 窗口，输入命令 `flutter --version` 来验证安装；见图 1-2。\n\nWindows 上仅支持\
  \ Android 平台。请按照指南 1-7 继续设置。\n\n## 1.2 在 Linux 上安装 Flutter SDK\n\n### 问题\n\n你有一台\
  \ Linux 机器，并希望在这台机器上开始 Flutter 开发。\n\n### 解决方案\n\n在 Linux 机器上安装 Flutter SDK 并配置\
  \ Android 平台。\n\n\n\n### 讨论\n\nFlutter SDK 支持 Linux 平台。然而，由于存在众多不同的 Linux 发行版，安装\
  \ Flutter SDK 的实际步骤可能略有差异。本指南基于在 Ubuntu 18.04 LTS 上安装 Flutter SDK。\n\nFlutter SDK\
  \ 要求本地环境中具备若干命令行工具，包括 `bash`、`mkdir`、`rm`、`git`、`curl`、`unzip` 和 `which`。对于大多数 Linux\
  \ 发行版，`bash`、`mkdir`、`rm`、`unzip` 和 `which` 这些命令默认应该已经包含在内。最简便的验证方法是打开一个终端窗口并输入这些命令查看输出。如果某个命令未安装，你会看到“command\
  \ not found”错误。`git` 和 `curl` 很可能默认未包含。大多数 Linux 发行版提供了内置的包管理器来安装这些工具。对于 Ubuntu，可以使用\
  \ `apt-get`，参见以下命令。\n\n```\n$ sudo apt-get update\n$ sudo apt-get install -y curl\
  \ git\n```\n\n安装成功完成后，你可以输入 `curl` 和 `git` 命令进行验证。\n\n现在，你可以从官方网站（`https://flutter.dev/docs/get-started/install/linux`）下载\
  \ Flutter SDK 压缩包。将下载的压缩文件解压到本地机器的目标位置。打开一个终端窗口，导航到解压后的 Flutter SDK 目录，并运行以下命令来验证安装。\n\
  \n```\n$ bin/flutter --version\n```\n\n建议将 Flutter SDK 的 `bin` 目录添加到 `PATH` 环境变量中，以便在任何终端会话中都能运行\
  \ `flutter` 命令。对于 Ubuntu，你可以编辑 `~/.profile` 文件。\n\n```\n$ nano ~/.profile\n```\n\
  \n将以下行添加到此文件并保存。\n\n```\nexport PATH=\"/bin:$PATH\"\n```\n\n在当前终端窗口中，你需要运行 `source\
  \ ~/.profile` 使更改生效。或者，你可以直接创建一个新的终端窗口。在任何终端窗口中输入 `flutter --version` 进行验证。你会看到与图\
  \ 1-2 相同的输出。\n\nLinux 仅支持 Android 平台。按照指南 1-7 继续后续设置。\n\n## 1.3 在 macOS 上安装 Flutter\
  \ SDK\n\n### 问题\n\n你有一台 macOS 机器，并希望在这台机器上开始 Flutter 开发。\n\n### 解决方案\n\n在 macOS\
  \ 机器上安装 Flutter SDK 并设置 Android 和 iOS 平台。\n\n### 讨论\n\n对于 macOS，Flutter SDK 要求本地环境中具备若干命令行工具。这些工具包括\
  \ `bash`、`mkdir`、`rm`、`git`、`curl`、`unzip` 和 `which`。macOS 应该已经将这些工具作为系统的一部分包含在内。你只需在终端中输入这些命令即可验证。安装缺失工具的最简便方法是使用\
  \ Homebrew（`https://brew.sh/`）。在设置 iOS 开发环境时，Homebrew 也很重要。使用 `brew install` 来安装工具，例如，使用\
  \ `brew install git` 来安装 Git。\n\n安装所需工具后，我们可以从官方网站（`https://flutter.dev/docs/get-started/install/macos`）下载\
  \ Flutter SDK 压缩包。将下载的压缩文件解压到本地机器的目标位置。`flutter` 命令位于解压位置的 `bin` 目录下。\n\n为了在任何终端会话中运行\
  \ `flutter` 命令，应更新 `PATH` 环境变量，使其包含 Flutter SDK 的 `bin` 目录。这通常通过更新 shell 的配置文件来完成。对于默认的\
  \ bash，此文件是 `~/.bash_profile`。对于 zsh，此文件是 `~/.zshrc`。修改此文件以包含以下行。\n\n```\nexport\
  \ PATH=/bin:$PATH\n```\n\n要使当前终端窗口使用更新后的 `PATH`，你需要运行 `source ~/.bash_profile`。你也可以启动一个新的终端窗口，它会自动使用\
  \ `PATH` 的更新值。\n\n在任何终端窗口中运行 `flutter --version` 以验证安装。你会看到与图 1-2 相同的输出。\n\nmacOS\
  \ 同时支持 Android 和 iOS 平台。按照指南 1-4 和 1-7 继续后续设置。\n\n## 1.4 设置 iOS 平台\n\n### 问题\n\n\
  你想为 iOS 平台开发 Flutter 应用。\n\n### 解决方案\n\n在您的 Mac 上为 Flutter SDK 设置 iOS 平台。\n\n###\
  \ 讨论\n\n要为 iOS 开发 Flutter 应用，你需要一台至少安装了 Xcode 9.0 的 Mac。要设置 iOS 平台，你需要完成以下步骤：\n\n\
  ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig3_HTML.jpg](img/479501_1_En_1_Fig3_HTML.jpg)\
  \  \n图 1-3：`flutter doctor` 的输出\n\n1.  从 App Store 安装 Xcode（`https://developer.apple.com/xcode/`）。\n\
  \n2.  验证 Xcode 命令行工具的路径。运行以下命令以显示当前命令行工具的路径。通常你应该会看到类似 `/Applications/Xcode.app/Contents/Developer`\
  \ 的输出。\n\n    ```\n    $ xcode-select -p\n    ```\n\n    如果输出中显示的路径不是您想要的，例如，您安装了不同版本的\
  \ Xcode 命令行工具，请使用 `xcode-select -s` 切换到不同的路径。如果您没有安装命令行工具，请使用 `xcode-select --install`\
  \ 打开安装对话框。\n\n3.  您需要打开一次 Xcode 以接受其许可协议。或者，您可以选择运行命令 `sudo xcodebuild -license`\
  \ 来查看并接受它。\n\n4.  Flutter SDK 需要用于 iOS 平台的其他工具，包括 `libimobiledevice`、`usbmuxd`、`ideviceinstaller`、`ios-deploy`\
  \ 和 CocoaPods（`https://cocoapods.org/`）。所有这些工具都可以使用 Homebrew 安装。如果您运行 `flutter doctor`\
  \ 命令，它会显示使用 Homebrew 安装这些工具的命令。只需运行这些命令，然后再次使用 `flutter doctor` 进行检查。当您看到“iOS toolchain”旁边出现绿色勾选标记时，表示\
  \ iOS 平台已成功设置为 Flutter SDK 使用；示例输出见图 1-3。\n\n## 1.5 设置 iOS 模拟器\n\n### 问题\n\n您需要一种快速的方法在\
  \ iOS 平台上测试 Flutter 应用。\n\n### 解决方案\n\n设置 iOS 模拟器。\n\n### 讨论\n\nXcode 为不同的 iOS 版本提供了模拟器。您可以使用\
  \ Xcode ➤ Preferences 中的 Components 选项卡下载额外的模拟器。要打开模拟器，请运行以下命令。\n\n```\n$ open -a\
  \ Simulator\n```\n\n当模拟器打开后，您可以通过菜单 **Hardware** ➤ **Device** 切换不同设备与 iOS 版本的组合。\n\
  \n模拟器启动后，运行 `flutter devices` 应该会显示该模拟器。\n\n## 1.6 设置 iOS 真机设备\n\n### 问题\n\n您已经在\
  \ iOS 模拟器上完成了 Flutter 应用的测试，现在希望在真实的 iOS 设备上测试它们。\n\n### 解决方案\n\n将 Flutter 应用部署到\
  \ iOS 真机设备。\n\n\n\n### 讨论\n\n在将 Flutter 应用部署到 iOS 设备之前，需要运行 `flutter doctor` 来验证\
  \ iOS 工具链是否正确配置。要在设备上开发和测试 Flutter 应用，你需要有一个 Apple ID。如果你想将应用分发到 App Store，还需要注册\
  \ Apple Developer Program。\n\n首次连接物理设备进行 iOS 开发时，需要信任该 Mac 电脑以连接你的设备。Flutter 应用在部署到设备前需要进行签名。在\
  \ Xcode 中打开 Flutter 应用的 `ios/Runner.xcworkspace` 文件。在 **General** 标签页的 **Signing**\
  \ 部分选择正确的团队。如果你选择已连接的设备作为运行目标，Xcode 将完成代码签名所需的必要配置。**Bundle Identifier** 必须是唯一的。\n\
  \n![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig4_HTML.jpg](img/479501_1_En_1_Fig4_HTML.jpg)\n\
  \n图 1-4\n\n在 Xcode 中进行应用签名\n\nFlutter 应用可以通过 Xcode 或 `flutter run` 命令部署到设备。首次部署应用时，可能需要在\
  \ iOS 设备上“设置”应用的 **通用** ➤ **描述文件与设备管理** 中信任开发证书。\n\n## 1.7 搭建 Android 平台\n\n###\
  \ 问题\n\n你想为 Android 平台开发 Flutter 应用。\n\n### 解决方案\n\n安装 Android Studio 以在你的本地机器上搭建\
  \ Android 平台。\n\n### 讨论\n\n要为 Android 平台开发 Flutter 应用，我们需要先搭建 Android 平台。Flutter\
  \ SDK 需要完整安装 Android Studio 以获取其 Android 平台依赖，因此我们必须安装 Android Studio。\n\n访问 Android\
  \ Studio 下载页面（`https://developer.android.com/studio/`）并点击“下载 Android Studio”按钮。你需要接受条款和条件才能下载。下载页面会检查你的平台并提供最合适的版本进行下载。如果提供的选项不是你想要的，请点击“下载选项”并从所有下载选项列表中进行选择；见图\
  \ 1-5。\n\n![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig5_HTML.jpg](img/479501_1_En_1_Fig5_HTML.jpg)\n\
  \n图 1-5\n\nAndroid Studio 的下载选项\n\nAndroid Studio 提供了一个基于 GUI 的安装程序，因此非常容易在本地机器上安装和运行。安装\
  \ Android Studio 也会安装 Android SDK、Android SDK 平台工具和 Android SDK 构建工具。即使你选择不使用 Android\
  \ Studio 作为 IDE，Android 开发仍然需要 Android SDK 及其相关工具。\n\n在 Android Studio 偏好设置的 Android\
  \ SDK 页面中，你还可以安装其他 Android SDK 平台和工具；见图 1-6。Android Studio 还会提示已安装的 Android SDK\
  \ 平台和工具的可用更新。\n\n![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig6_HTML.jpg](img/479501_1_En_1_Fig6_HTML.jpg)\n\
  \n图 1-6\n\n在 Android Studio 中管理 Android SDK\n\n## 1.8 搭建 Android 模拟器\n\n### 问题\n\
  \n你需要一种快速的方法来测试适用于 Android 平台的 Flutter 应用。\n\n### 解决方案\n\n搭建 Android 模拟器。\n\n###\
  \ 讨论\n\n在开发 Flutter 应用时，你可以在 Android 模拟器上运行它们，以查看应用运行的效果。要搭建 Android 模拟器，可以按照以下步骤操作。\n\
  \n在 Android Studio 中打开一个 Android 项目，选择 **Tools** ➤ Android ➤ **AVD Manager** 以打开\
  \ AVD Manager，然后点击“创建虚拟设备…”；见图 1-7。\n\n![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig7_HTML.jpg](img/479501_1_En_1_Fig7_HTML.jpg)\n\
  \n图 1-7\n\nAndroid 虚拟设备管理器\n\n选择一个设备定义，例如 Nexus 6P，然后点击“下一步”；见图 1-8。\n\n![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig8_HTML.jpg](img/479501_1_En_1_Fig8_HTML.jpg)\n\
  \n图 1-8\n\n选择硬件\n\n为你想要模拟的 Android 版本选择一个系统映像，然后点击“下一步”；见图 1-9。\n\n![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig9_HTML.jpg](img/479501_1_En_1_Fig9_HTML.jpg)\n\
  \n图 1-9\n\n选择系统映像\n\n为模拟性能选择 **Hardware - GLE 2.0** 以启用硬件加速，然后点击“完成”；见图 1-10。\n\n\
  ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig10_HTML.jpg](img/479501_1_En_1_Fig10_HTML.jpg)\n\
  \n图 1-10\n\n选择模拟性能\n\n一个新的 AVD 被创建并显示在 AVD Manager 中。如果你想了解更多关于 AVD 配置的详细信息，Android\
  \ Studio 官方网站提供了一个全面的指南（`https://developer.android.com/studio/run/managing-avds`），介绍如何管理\
  \ AVD。\n\n在 AVD Manager 中，点击绿色的三角形按钮启动模拟器。模拟器启动并显示默认的 Android 主屏幕可能需要一些时间。\n\n##\
  \ 1.9 搭建 Android 设备\n\n### 问题\n\n你已经在模拟器上完成了 Flutter 应用的测试，现在想在实际的 Android 设备上测试它们。\n\
  \n### 解决方案\n\n配置你的 Android 设备以运行 Flutter 应用。\n\n### 讨论\n\n要配置你的 Android 设备，可以按照以下步骤操作：\n\
  \n1.  你需要在设备上启用开发者选项和 USB 调试。请查看 Android 官方网站上的说明（`https://developer.android.com/studio/debug/dev-options#enable`）。你可能还需要在\
  \ Windows 机器上安装 Google USB 驱动程序（`https://developer.android.com/studio/run/win-usb`）。\n\
  \n2.  使用 USB 数据线将设备连接到电脑。设备会弹出一个对话框请求权限，授权你的电脑访问设备。\n\n3.  运行命令 `flutter devices`\
  \ 以验证 Flutter SDK 能否识别你的设备。\n\nFlutter 应用可以通过 Android Studio 或 `flutter run` 命令部署到设备。\n\
  \n## 1.10 使用命令行创建 Flutter 应用\n\n### 问题\n\n你已经搭建好了本地环境来开发 Flutter 应用。虽然使用 Android\
  \ Studio 或 VS Code 是开发的良好选择，但你仍可能想知道如何通过命令行来实现。\n\n### 解决方案\n\n使用 Flutter SDK 中的命令来创建和构建\
  \ Flutter 应用。\n\n### 讨论\n\n使用像 Android Studio 和 VS Code 这样的工具可以使 Flutter 开发变得更加容易。然而，了解如何使用命令行工具构建\
  \ Flutter 应用仍然很有价值。这对于持续集成非常重要。它也使你能够使用任何其他编辑器来开发 Flutter 应用。\n\n`flutter create`\
  \ 命令可用于创建一个新的 Flutter 应用。实际上，Android Studio 和 VS Code 都使用此命令来创建新的 Flutter 应用。以下命令在\
  \ `flutter_app` 目录中创建一个新的 Flutter 应用。\n\n```\n$ flutter create flutter_app\n```\n\
  \n此命令在指定目录中创建各种文件，作为新应用的框架代码。导航到 `flutter_app` 目录，并使用 `flutter run` 来运行此应用。\n\n\
  ## 1.11 使用 Android Studio 创建 Flutter 应用\n\n### 问题\n\n你想拥有一个强大的 IDE，能满足开发 Flutter\
  \ 应用时的大部分需求。\n\n### 解决方案\n\n使用 Android Studio 创建 Flutter 应用。\n\n\n\n### 讨论\n\n由于我们已经安装了\
  \ Android Studio 来为 Flutter SDK 配置 Android 平台，因此使用 Android Studio 作为 IDE 来开发 Flutter\
  \ 应用是一个很自然的选择。Android Studio 本身是一款基于 IntelliJ 平台的强大 IDE。如果你使用过 JetBrains 的其他产品，比如\
  \ IntelliJ IDEA 或 WebStorm，你会发现上手 Android Studio 非常容易。\n\n要使用 Android Studio 进行\
  \ Flutter 开发，需要安装 `Flutter` 和 `Dart` 插件。安装这两个插件时，请打开 Android Studio 的 `Preferences`（偏好设置）对话框中的\
  \ `Plugins`（插件）页面，然后点击“Browse repositories…”（浏览仓库…）按钮。在打开的对话框中，输入“Flutter”搜索并安装\
  \ `Flutter` 插件；参见图 1-11。点击绿色的 Install（安装）按钮进行安装。系统会提示您同时安装 `Dart` 插件。点击“Yes”（是）进行安装。然后重启\
  \ Android Studio。\n\n![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig11_HTML.jpg](img/479501_1_En_1_Fig11_HTML.jpg)\n\
  \n图 1-11\n\n在 Android Studio 中安装 Flutter 插件\n\n重启 Android Studio 后，您应该会看到一个用于启动新\
  \ Flutter 项目的新选项。Flutter 项目的向导包含多个页面，用于配置新项目。\n\n第一个页面允许您选择新 Flutter 项目的类型。页面中的描述说明了这四种不同项目类型之间的区别。大多数情况下，我们将创建一个\
  \ Flutter 应用程序。\n\n![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig12_HTML.jpg](img/479501_1_En_1_Fig12_HTML.jpg)\n\
