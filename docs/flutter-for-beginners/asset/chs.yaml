  \n*图 8-5 Material Design 菜单*\n\n## 8.10 使用嵌套导航器管理复杂的页面流程\n\n### 问题\n\n你想要实现复杂的页面流程。\n\
  \n### 解决方案\n\n使用嵌套的`Navigator`实例。\n\n\n\n### 讨论\n\n`Navigator`实例管理自己的路由栈。对于简单的应用，通常一个`Navigator`实例就足够了，并且可以直接使用由`WidgetsApp`、`MaterialApp`或`CupertinoApp`创建的`Navigator`实例。如果应用具有复杂的页面流程，可能需要使用嵌套导航器。由于`Navigator`本身也是一个\
  \ widget，因此可以像创建普通 widget 一样创建`Navigator`实例。由`WidgetsApp`、`MaterialApp`或`CupertinoApp`创建的`Navigator`实例成为根导航器。所有导航器都按层级结构组织。要获取根导航器，可以在调用`Navigator.of()`方法时将`rootNavigator`参数设为`true`。表\
  \ 8-6 展示了`Navigator`构造函数的参数。\n\n**表 8-6**\n**`Navigator` 的参数**\n\n| 名称 | 类型 | 描述\
  \ |\n| --- | --- | --- |\n| `onGenerateRoute` | `RouteFactory` | 为给定的`RouteSettings`对象生成一个路由。\
  \ |\n| `onUnknownRoute` | `RouteFactory` | 处理未知路由。 |\n| `initialRoute` | `String`\
  \ | 第一个路由的名称。 |\n| `observers` | `List<NavigatorObserver>` | 导航器状态变化的观察者。 |\n\n\
  让我们用一个具体例子来说明如何使用嵌套导航器。假设你正在构建一个社交新闻阅读应用，在新用户注册后，你希望向用户展示一个可选的引导页面。这个引导页面有几个步骤需要用户完成。用户可以来回切换，只完成感兴趣的步骤。用户也可以跳过此页面并返回应用的主页。引导页面有自己的导航器来处理步骤间的导航。\n\
  \n在列表 8-16 中，导航器有两个命名路由。初始路由设置为`on_boarding/topic`，因此首先显示`UserOnBoardingTopicPage`。\n\
  \n```\nclass UserOnBoardingPage extends StatelessWidget {\n@override\nWidget build(BuildContext\
  \ context) {\nreturn Scaffold(\nappBar: AppBar(\ntitle: Text('Get Started'),\n),\n\
  body: Navigator(\ninitialRoute: 'on_boarding/topic',\nonGenerateRoute: (RouteSettings\
  \ settings) {\nWidgetBuilder builder;\nswitch (settings.name) {\ncase 'on_boarding/topic':\n\
  builder = (BuildContext context) {\nreturn UserOnBoardingTopicPage();\n};\nbreak;\n\
  case 'on_boarding/follower':\nbuilder = (BuildContext context) {\nreturn UserOnBoardingFollowPage();\n\
  };\nbreak;\n}\nreturn MaterialPageRoute(\nbuilder: builder,\nsettings: settings,\n\
  );\n},\n),\n);\n}\n}\n```\n**列表 8-16**\n**用户引导页面**\n\n在列表 8-17 中，按下“Next”按钮会导航到路由名为`on_boarding/follower`的下一步。按下“Done”按钮则会使用根导航器弹出引导页面。\n\
  \n```\nclass UserOnBoardingTopicPage extends StatelessWidget {\n@override\nWidget\
  \ build(BuildContext context) {\nreturn Column(\nchildren: [\nText('Select interested\
  \ topics'),\nRaisedButton.icon(\nicon: Icon(Icons.arrow_forward),\nlabel: Text('Next'),\n\
  onPressed: () {\nNavigator.pushNamed(context, 'on_boarding/follower');\n},\n),\n\
  RaisedButton.icon(\nicon: Icon(Icons.check),\nlabel: Text('Done'),\nonPressed: ()\
  \ {\nNavigator.of(context, rootNavigator: true).pop();\n},\n)\n],\n);\n}\n}\n```\n\
  **列表 8-17**\n**选择话题步骤**\n\n图 8-6 展示了列表 8-17 中代码的截图。\n\n![../images/479501_1_En_8_Chapter/479501_1_En_8_Fig6_HTML.jpg](img/479501_1_En_8_Fig6_HTML.jpg)\n\
  **图 8-6**\n**选择话题步骤**\n\n`CupertinoTabView`拥有自己的导航器实例。创建`CupertinoTabView`时，可以提供`routes`、`onGenerateRoute`、`onUnknownRoute`和`navigatorObservers`参数。这些参数用于配置`Navigator`实例。当使用`CupertinoTabScaffold`创建标签布局时，每个标签视图都有自己的导航状态和历史记录。\n\
  \n使用嵌套导航器时，确保使用正确的导航器实例非常重要。如果要显示和关闭全屏页面或模态对话框，应该使用通过`Navigator.of(context, rootNavigator:\
  \ true)`获取的根导航器。调用`Navigator.of(context)`只能获取最近封闭的`Navigator`实例。在层级结构中无法获取中间的`Navigator`实例。你需要在\
  \ widget 树的正确位置使用`BuildContext`对象。像`showDialog()`和`showMenu()`这样的函数内部总是使用`Navigator.of(context)`。你只能通过传入的`BuildContext`对象来控制这些函数使用哪个`Navigator`实例。\n\
  \n## 8.11 观察导航器状态变化\n\n### 问题\n\n当导航器状态发生变化时，你希望收到通知。\n\n### 解决方案\n\n使用`NavigatorObserver`。\n\
  \n\n\n### 讨论\n\n有时，你可能希望在导航器的状态发生变化时收到通知。例如，你想分析用户使用应用时的页面流转情况，从而改进用户体验。在创建 `Navigator`\
  \ 实例时，你可以提供一个 `NavigatorObserver` 对象的列表，作为导航器状态变化的观察者。表 8-7 展示了 `NavigatorObserver`\
  \ 接口的方法。\n\n**表 8-7** `NavigatorObserver` 的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `didPop(Route\
  \ route, Route previousRoute)` | `route` 被弹出，`previousRoute` 是新的活动路由。 |\n| `didPush(Route\
  \ route, Route previousRoute)` | `route` 被推入，`previousRoute` 是之前的活动路由。 |\n| `didRemove(Route\
  \ route, Route previousRoute)` | `route` 被移除，`previousRoute` 是紧挨在已移除路由下方的路由。 |\n\
  | `didReplace(Route newRoute, Route oldRoute)` | `oldRoute` 被 `newRoute` 替换。 |\n\
  | `didStartUserGesture(Route route, Route previousRoute)` | 用户开始使用手势移动 `route`。紧挨在\
  \ `route` 下方的路由是 `previousRoute`。 |\n| `didStopUserGesture()` | 用户停止使用手势移动路由。 |\n\
  \n在代码清单 8-18 中，`LoggingNavigatorObserver` 类在路由被推入和弹出时记录消息。\n\n```\nclass LoggingNavigatorObserver\
  \ extends NavigatorObserver {\n@override\nvoid didPush(Route route, Route previousRoute)\
  \ {\nprint('push: ${_routeName(previousRoute)} -> ${_routeName(route)}');\n}\n@override\n\
  void didPop(Route route, Route previousRoute) {\nprint(' pop: ${_routeName(route)}\
  \ -> ${_routeName(previousRoute)}');\n}\nString _routeName(Route route) {\nreturn\
  \ route != null\n? (route.settings?.name ?? route.runtimeType.toString())\n: 'null';\n\
  }\n}\n```\n\n**代码清单 8-18** 日志记录导航器观察者\n\n当你想为导航器中的所有状态变化设置一个全局处理器时，`NavigatorObserver`\
  \ 接口非常有用。如果你只对与特定路由相关的状态变化感兴趣，那么使用 `RouteObserver` 类是更好的选择。`RouteObserver` 类也是 `NavigatorObserver`\
  \ 接口的一个实现。\n\n为了收到与 `Route` 对象相关的状态变化通知，你的类需要实现 `RouteAware` 接口。表 8-8 展示了 `RouteAware`\
  \ 接口的方法。\n\n**表 8-8** `RouteAware` 的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `didPop()`\
  \ | 当前路由被弹出时的回调。 |\n| `didPopNext()` | 在顶部路由被弹出后，当前路由变为活动状态时调用。 |\n| `didPush()`\
  \ | 在当前路由被推入时调用。 |\n| `didPushNext()` | 在新路由被推入后，当前路由不再活动时调用。 |\n\n为了实际收到针对某个 `Route`\
  \ 对象的通知，你需要使用 `RouteObserver` 的 `subscribe()` 方法，将一个 `RouteAware` 对象订阅到该 `Route`\
  \ 对象。当不再需要此订阅时，应使用 `unsubscribe()` 方法取消 `RouteAware` 对象的订阅。\n\n在代码清单 8-19 中，`_ObservedPageState`\
  \ 类实现了 `RouteAware` 接口，并重写了 `didPush()` 和 `didPop()` 方法来打印一些消息。`ModalRoute.of(context)`\
  \ 从构建上下文中获取最近的封闭 `ModalRoute` 对象，也就是 `ObservedPage` 所在的路由。通过使用 `ModalRoute.of(context)`，无需显式传递\
  \ `Route` 对象。当前的 `_ObservedPageState` 对象使用传入的 `RouteObserver` 对象的 `subscribe()`\
  \ 方法，订阅当前路由的状态变化。当 `_ObservedPageState` 对象被释放时，该订阅被移除。\n\n```\nclass ObservedPage\
  \ extends StatefulWidget {\nObservedPage(this.routeObserver);\nfinal RouteObserver<ModalRoute<void>>\
  \ routeObserver;\n@override\n_ObservedPageState createState() => _ObservedPageState(routeObserver);\n\
  }\nclass _ObservedPageState extends State<ObservedPage> with RouteAware {\n_ObservedPageState(this._routeObserver);\n\
  final RouteObserver<ModalRoute<void>> _routeObserver;\n@override\nvoid didChangeDependencies()\
  \ {\nsuper.didChangeDependencies();\n_routeObserver.subscribe(this, ModalRoute.of(context));\n\
  }\n@override\nvoid dispose() {\n_routeObserver.unsubscribe(this);\nsuper.dispose();\n\
  }\n@override\nvoid didPush() {\nprint('pushed');\n}\n@override\nvoid didPop() {\n\
  print('popped');\n}\n@override\nWidget build(BuildContext context) {\nreturn Scaffold(\n\
  appBar: AppBar(\ntitle: Text('Observed (Stateful)'),\n),\n);\n}\n}\n```\n\n**代码清单\
  \ 8-19** 使用 `RouteObserver`\n\n## 8.12 阻止路由被弹出\n\n### 问题\n\n你想阻止路由从导航器中被弹出。\n\n\
  ### 解决方案\n\n将 `WillPopCallback` 与 `ModalRoute` 对象一起使用。\n\n### 讨论\n\n当一个路由被推入导航器后，该路由可以通过\
  \ `Scaffold` 中的返回按钮或 Android 系统中的返回按钮被弹出。有时你可能希望阻止该路由被弹出。例如，如果页面中有未保存的更改，你可能想先显示一个警报对话框来请求确认。当使用\
  \ `Navigator.maybePop()` 方法而不是 `Navigator.pop()` 方法时，你有机会决定是否应该执行弹出路由的请求。\n\n`ModalRoute`\
  \ 类有一个 `addScopedWillPopCallback()` 方法，用于添加一个 `WillPopCallback 函数，该函数决定路由是否应该被弹出。`WillPopCallback`\
  \ 是一个函数类型 `Future<bool> ()` 的别名。如果返回的 `Future<bool>` 对象解析为 `true`，则路由可以被弹出。否则，路由不能被弹出。你可以向一个\
  \ `ModalRoute` 对象添加多个 `WillPopCallback` 函数。如果其中任何一个 `WillPopCallback` 函数否决了请求，路由将不会被弹出。\n\
  \n在代码清单 8-20 中，将一个 `WillPopCallback` 函数添加到了当前路由。`WillPopCallback` 函数的返回值是由 `showDialog()`\
  \ 返回的 `Future<bool>` 对象。\n\n```\nclass VetoPopPage extends StatelessWidget {\n@override\n\
  Widget build(BuildContext context) {\nModalRoute.of(context).addScopedWillPopCallback(()\
  \ {\nreturn showDialog(\ncontext: context,\nbuilder: (BuildContext context) {\n\
  return AlertDialog(\ntitle: Text('Exit?'),\nactions: [\nFlatButton(\nchild: Text('Yes'),\n\
  onPressed: () {\nNavigator.pop(context, true);\n},\n),\nFlatButton(\nchild: Text('No'),\n\
  onPressed: () {\nNavigator.pop(context, false);\n},\n),\n],\n},\n);\n});\nreturn\
  \ Scaffold(\nappBar: AppBar(\ntitle: Text('Veto Pop'),\n),\nbody: Container(),\n\
  );\n}\n}\n```\n\n**代码清单 8-20** 否决路由弹出请求\n\n## 8.13 总结\n\n在 Flutter 应用中拥有多个页面是很常见的。本章讨论了在\
  \ Flutter 中实现页面导航的基本概念。本章还涵盖了对话框、菜单和操作面板。在下一章中，我们将讨论 Flutter 中的后端服务交互。\n\n"
- "# 9. 服务交互\n\n许多非简单的移动应用需要与后端服务进行交互。本章涵盖了与 Flutter 中服务交互相关的基本概念。\n\n## 9.1 处理 Futures\n\
  \n### 问题\n\n你想处理 `Future` 对象。\n\n### 解决方案\n\n使用 `then()` 和 `catchError()` 方法来处理\
  \ `Future` 对象的结果。\n\n\n\n### 讨论\n\n在使用 Flutter 和 Dart 库中的代码时，你可能会遇到返回 `Future` 对象的函数。`dart:async`\
  \ 库中的 `Future<T>` 类代表延迟计算。一个 `Future` 对象表示一个在未来可用的潜在值或错误。当给定一个 `Future` 对象时，你可以注册回调函数，以便在该值或错误可用时进行处理。`Future`\
  \ 类是 Dart 中异步编程的基本构建块之一。\n\n针对给定的 `Future` 对象，其结果有三种不同的情况：\n\n*   计算从未完成。不会调用任何回调函数。\n\
  *   计算完成并返回一个值。值回调函数会携带该值被调用。\n*   计算完成并抛出一个错误。错误回调函数会携带该错误被调用。\n\n要向 `Future` 对象注册回调，你可以使用\
  \ `then()` 方法来注册一个值回调和可选错误回调，或者使用 `catchError()` 方法仅注册错误回调。建议只使用 `then()` 方法注册值回调。这是因为如果通过\
  \ `then()` 方法的 `onError` 参数注册了错误回调，该错误回调无法处理值回调中抛出的错误。大多数情况下，你希望错误回调能处理所有可能的错误。如果某个\
  \ `Future` 对象的错误没有被其错误回调处理，该错误将由全局处理器处理。\n\n在代码清单 9-1 中，`Future` 对象可能以值 `1` 或一个\
  \ `Error` 对象完成。同时注册了值回调和错误回调来处理结果。\n\n```\nFuture.delayed(\nDuration(seconds: 1),\n\
  () {\nif (Random().nextBool()) {\nreturn 1;\n} else {\nthrow Error();\n}\n},\n).then((value)\
  \ {\nprint(value);\n}).catchError((error) {\nprint('error: $error');\n});\n代码清单\
  \ 9-1\n使用 then() 和 catchError() 方法处理结果\n```\n\n`then()` 和 `catchError()` 方法的返回值也是\
  \ `Future` 对象。给定一个 `Future` 对象 A，调用 `A.then(func)` 的结果是另一个 `Future` 对象 B。如果 `func`\
  \ 回调执行成功，那么 `Future` B 将以调用 `func` 函数的返回值完成。否则，`Future` B 将以调用 `func` 函数时抛出的错误完成。调用\
  \ `B.catchError(errorHandler)` 会返回一个新的 `Future` 对象 C。错误处理器可以处理 `Future` B 中抛出的错误，这些错误可能源自\
  \ `Future` A 本身或其值处理器。通过使用 `then()` 和 `catchError()` 方法，`Future` 对象形成了一个处理异步计算的链。\n\
  \n在代码清单 9-2 中，多个 `then()` 方法被链接在一起，按顺序处理结果。\n\n```\nFuture.value(1)\n.then((value)\
  \ => value + 1)\n.then((value) => value * 10)\n.then((value) => value + 2)\n.then((value)\
  \ => print(value));\n代码清单 9-2\n链式调用 then() 方法\n```\n\n如果你想在 future 完成时调用函数，可以使用\
  \ `whenComplete()` 方法。无论 future 是以值还是错误完成，使用 `whenComplete()` 添加的函数都会在 future 完成时被调用。`whenComplete()`\
  \ 方法相当于其他编程语言中的 `finally` 块。`then().catchError().whenComplete()` 链相当于 \"try-catch-finally\"\
  。\n\n代码清单 9-3 展示了使用 `whenComplete()` 方法的示例。\n\n```\nFuture.value(1).then((value)\
  \ {\nprint(value);\n}).whenComplete(() {\nprint('complete');\n});\n代码清单 9-3\n使用\
  \ whenComplete()\n```\n\n`Future` 对象的计算可能需要很长时间才能完成。你可以使用 `timeout()` 方法为计算设置时间限制。当调用\
  \ `timeout()` 方法时，需要提供一个 `Duration` 对象作为时间限制，以及一个可选的 `onTimeout` 函数，用于在超时时提供值。`timeout()`\
  \ 方法的返回值是一个新的 `Future` 对象。如果当前的 `Future` 对象在时间限制内没有完成，则调用 `onTimeout` 函数的结果将作为新\
  \ `Future` 对象的结果。如果未提供 `onTimeout` 函数，则当当前 future 超时时，新 `Future` 对象将以 `TimeoutException`\
  \ 完成。\n\n在代码清单 9-4 中，`Future` 对象将在 5 秒后以值 `1` 完成，但时间限制设置为 2 秒。因此将会使用 `onTimeout`\
  \ 函数返回的值 `10`。\n\n```\nFuture.delayed(Duration(seconds: 5), () => 1)\n.timeout(\n\
  Duration(seconds: 2),\nonTimeout: () => 10,\n)\n.then((value) => print(value));\n\
  代码清单 9-4\n使用 timeout() 方法\n```\n\n## 9.2 使用 async 和 await 处理 Futures\n\n### 问题\n\
  \n你想像处理同步操作一样处理 `Future` 对象。\n\n### 解决方案\n\n使用 `async` 和 `await`。\n\n### 讨论\n\n\
  `Future` 对象代表异步计算。处理 `Future` 对象的常用方式是注册回调来处理结果。这种基于回调的风格可能会给习惯了同步操作的开发者带来障碍。使用\
  \ `async` 和 `await` 是 Dart 中的一种语法糖，目的是让处理 `Future` 对象像普通的同步操作一样。\n\n给定一个 `Future`\
  \ 对象，`await` 可以等待其完成并返回其值。`await` 之后的代码可以直接使用返回的值，就像它是同步调用的结果一样。当使用 `await` 时，其所在的函数必须标记为\
  \ `async`。这意味着该函数返回一个 `Future` 对象。\n\n在代码清单 9-5 中，`getValue()` 函数的返回值是一个 `Future`\
  \ 对象。在 `calculate()` 函数中，使用 `await` 来获取 `getValue()` 函数的返回值并赋值给 `value` 变量。由于使用了\
  \ `await`，`calculate()` 函数被标记为 `async`。\n\n```\nFuture getValue() {\nreturn Future.value(1);\n\
  }\nFuture calculate() async {\nint value = await getValue();\nreturn value * 10;\n\
  }\n代码清单 9-5\n使用 async/await\n```\n\n当使用 `await` 处理 `Future` 对象时，你可以使用 try-catch-finally\
  \ 来处理 `Future` 对象中抛出的错误。这使得 `Future` 对象可以像普通同步操作一样使用。代码清单 9-6 展示了同时使用 try-catch-finally\
  \ 和 `await`/`async` 的示例。\n\n```\nFuture getErrorValue() {\nreturn Future.error('invalid\
  \ value');\n}\nFuture calculateWithError() async {\ntry {\nreturn await getErrorValue();\n\
  } catch (e) {\nprint(e);\nreturn 1;\n} finally {\nprint('done');\n}\n}\n代码清单 9-6\n\
  使用 try-catch-finally 和 await/async\n```\n\n## 9.3 创建 Futures\n\n### 问题\n\n你想创建 `Future`\
  \ 对象。\n\n### 解决方案\n\n使用 `Future` 构造函数 `Future()`、`Future.delayed()`、`Future.sync()`、`Future.value()`\
  \ 和 `Future.error()` 来创建 `Future` 对象。\n\n\n\n### Discussion\n\n如果你需要创建`Future`对象，可以使用其构造函数：`Future()`、`Future.delayed()`、`Future.sync()`、`Future.value()`以及`Future.error()`：\n\
  \n- `Future()`构造函数创建一个异步执行计算的`Future`对象。\n- `Future.delayed()`构造函数创建一个在由`Duration`对象指定的延迟后执行计算的`Future`对象。\n\
  - `Future.sync()`构造函数创建一个立即执行计算的`Future`对象。\n- `Future.value()`构造函数创建一个以给定值完成的`Future`对象。\n\
  - `Future.error()`构造函数创建一个以给定错误和可选堆栈跟踪完成的`Future`对象。\n\n清单 9-7 展示了使用不同`Future`构造函数的示例。\n\
  \n```\nFuture(() => 1).then(print);\nFuture.delayed(Duration(seconds: 3), () =>\
  \ 1).then(print);\nFuture.sync(() => 1).then(print);\nFuture.value(1).then(print);\n\
  Future.error(Error()).catchError(print);\nListing 9-7\nCreate Future objects\n```\n\
  \n## 9.4 使用 Streams\n\n### 问题\n\n你想处理一个事件流。\n\n### 解决方案\n\n使用`Stream<T>`类及其子类。\n\
  \n### 讨论\n\n借助`Future`类，我们可以表示一个可能在将来可用的单一值。然而，我们可能还需要处理一系列事件。`dart:async`库中的`Stream<T>`类代表了异步事件的源。为此，`Future`类提供了`asStream()`方法，用于创建一个包含当前`Future`对象结果的`Stream`。\n\
  \n如果你有使用响应式流（[`www.reactive-streams.org/`](http://www.reactive-streams.org/)）的经验，你可能会发现\
  \ Dart 中的`Stream`是一个类似的概念。流中可以包含三种类型的事件：\n\n- 数据事件：表示流中的实际数据。这些事件也被称为流中的元素。\n- 错误事件：表示发生的错误。\n\
  - 完成事件：表示已到达流的末尾。之后将不再发出更多事件。\n\n要从流中接收事件，你可以使用`listen()`方法来设置监听器。`listen()`方法的返回值是一个`StreamSubscription`对象，它代表当前活动的订阅。根据流允许的订阅数量，流分为两种类型：\n\
  \n- 单订阅流：在流的整个生命周期中只允许一个监听器。它仅在设置了监听器时才开始发出事件，并在监听器取消订阅时停止发出事件。\n- 广播流：允许任意数量的监听器。事件在准备好时就会被发出，即使没有已订阅的监听器。\n\
  \n对于给定的`Stream`对象，可以使用`isBroadcast`属性来检查它是否为广播流。你可以使用`asBroadcastStream()`方法从单订阅流创建一个广播流。\n\
  \n#### 流订阅\n\n表 9-1 展示了`listen()`方法的参数。你可以为不同的事件提供任意数量的处理程序，并忽略那些不感兴趣的事件。\n\n**表\
  \ 9-1：`listen()`方法的参数**\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `onData` | `void\
  \ (T event)` | 数据事件的处理程序。 |\n| `onError` | `Function` | 错误事件的处理程序。 |\n| `onDone`\
  \ | `void ()` | 完成事件的处理程序。 |\n| `cancelOnError` | `bool` | 是否在发出第一个错误事件时取消订阅。 |\n\
  \n在清单 9-8 中，提供了三种事件类型的处理程序。\n\n```\nStream.fromIterable([1, 2, 3]).listen(\n(value)\
  \ => print(value),\nonError: (error) => print('error: $error'),\nonDone: () => print('done'),\n\
  cancelOnError: true,\n);\nListing 9-8\nUse listen() method\n```\n\n通过`listen()`方法返回的`StreamSubscription`对象，你可以管理订阅。表\
  \ 9-2 展示了`StreamSubscription`类的方法。\n\n**表 9-2：`StreamSubscription`的方法**\n\n| 名称\
  \ | 描述 |\n| --- | --- |\n| `cancel()` | 取消此订阅。 |\n| `pause([Future resumeSignal])`\
  \ | 请求流暂停事件发送。如果提供了`resumeSignal`参数，则当该`Future`完成时流将恢复。 |\n| `resume()` | 在暂停后恢复流。\
  \ |\n| `onData()` | 替换数据事件处理程序。 |\n| `onError()` | 替换错误事件处理程序。 |\n| `onDone()` |\
  \ 替换完成事件处理程序。 |\n| `asFuture([E futureValue])` | 返回一个处理流完成的`Future`。 |\n\n`asFuture()`方法在你想要处理流完成时非常有用。由于流可以正常完成或以错误结束，使用此方法会覆盖现有的`onDone`和`onError`回调。在发生错误事件时，订阅会被取消，并且返回的`Future`对象会以该错误完成。在完成事件时，`Future`对象则以给定的`futureValue`完成。\n\
  \n\n\n### 流转换\n\n流的强大之处在于可以对流应用各种转换，从而得到另一个流或一个值。表 9-3 展示了 `Stream` 类中返回另一个 `Stream`\
  \ 对象的方法。\n\n表 9-3  \n流转换\n\n| 名称 | 描述 |\n| --- | --- |\n| `asyncExpand<E>(Stream<E>\
  \ convert(T event))` | 将每个元素转换成一个流，并将这些流中的元素连接起来作为新的流。 |\n| `asyncMap<E>(FutureOr<E>\
  \ convert(T event))` | 将每个元素转换成一个新的事件。 |\n| `distinct([bool equals(T previous, T\
  \ next)])` | 跳过重复的元素。 |\n| `expand<S>(Iterable<S> convert(T element))` | 将每个元素转换成一个元素序列。\
  \ |\n| `handleError(Function onError, { bool test(dynamic error) })` | 处理流中的错误。\
  \ |\n| `map<S>(S convert(T event))` | 将每个元素转换成一个新的事件。 |\n| `skip(int count)` | 跳过流中的指定数量的元素。\
  \ |\n| `skipWhile(bool test(T element))` | 当元素满足谓词时跳过它们。 |\n| `take(int count)`\
  \ | 仅从流中取出前指定数量的元素。 |\n| `takeWhile(bool test(T element))` | 当元素满足谓词时取出它们。 |\n|\
  \ `timeout(Duration timeLimit, { void onTimeout(EventSink<T> sink) })` | 当两个事件之间的时间超过时间限制时处理错误。\
  \ |\n| `transform<S>(StreamTransformer<T, S> streamTransformer)` | 对流进行转换。 |\n|\
  \ `where(bool test(T event))` | 过滤流中的元素。 |\n\n清单 9-9 展示了流转换的使用示例。每条语句下方的代码展示了执行结果。\n\
  \n```\nStream.fromIterable([1, 2, 3]).asyncExpand((int value) {\nreturn Stream.fromIterable([value\
  \ * 5, value * 10]);\n}).listen(print);\n// -> 5, 10, 10, 20, 15, 30\nStream.fromIterable([1,\
  \ 2, 3]).expand((int value) {\nreturn [value * 5, value * 10];\n}).listen(print);\n\
  // -> 5, 10, 10, 20, 15, 30\nStream.fromIterable([1, 2, 3]).asyncMap((int value)\
  \ {\nreturn Future.delayed(Duration(seconds: 1), () => value * 10);\n}).listen(print);\n\
  // -> 10, 20, 30\nStream.fromIterable([1, 2, 3]).map((value) => value * 10).listen(print);\n\
  // -> 10, 20, 30\nStream.fromIterable([1, 1, 2]).distinct().listen(print);\n// ->\
  \ 1, 2\nStream.fromIterable([1, 2, 3]).skip(1).listen(print);\n// -> 2, 3\nStream.fromIterable([1,\
  \ 2, 3])\n.skipWhile((value) => value % 2 == 1)\n.listen(print);\n// -> 2, 3\nStream.fromIterable([1,\
  \ 2, 3]).take(1).listen(print);\n// -> 1\nStream.fromIterable([1, 2, 3])\n.takeWhile((value)\
  \ => value % 2 == 1)\n.listen(print);\n// -> 1\nStream.fromIterable([1, 2, 3]).where((value)\
  \ => value % 2 == 1).listen(print);\n// -> 1, 3\n```\n\n清单 9-9  \n流转换\n\n`Stream`\
  \ 类中还有其他返回 `Future` 对象的方法；参见表 9-4。这些操作返回的是单个值而非流。\n\n表 9-4  \n用于获取单一值的方法\n\n| 名称\
  \ | 描述 |\n| --- | --- |\n| `any(bool test(T element))` | 检查流中是否有任意元素匹配谓词。 |\n| `every(bool\
  \ test(T element))` | 检查流中是否所有元素都匹配谓词。 |\n| `contains(Object needle)` | 检查流是否包含给定元素。\
  \ |\n| `drain<E>([E futureValue])` | 丢弃流中的所有元素。 |\n| `elementAt(int index)` | 获取指定索引处的元素。\
  \ |\n| `firstWhere(bool test(T element), { T orElse() })` | 找到第一个匹配谓词的元素。 |\n| `lastWhere(bool\
  \ test(T element), { T orElse() })` | 找到最后一个匹配谓词的元素。 |\n| `singleWhere(bool test(T\
  \ element), { T orElse() })` | 找到唯一一个匹配谓词的元素。 |\n| `fold<S>(S initialValue, S combine(S\
  \ previous, T element))` | 将流中的元素合并为一个单独的值。 |\n| `forEach(void action(T element))`\
  \ | 对流中的每个元素执行一个操作。 |\n| `join([String separator = \"\"])` | 将元素合并成一个字符串。 |\n| `pipe(StreamConsumer<T>\
  \ streamConsumer)` | 将事件导入一个 `StreamConsumer`。 |\n| `reduce(T combine(T previous,\
  \ T element))` | 将流中的元素合并为一个单独的值。 |\n| `toList()` | 将元素收集到一个列表中。 |\n| `toSet()`\
  \ | 将元素收集到一个集合中。 |\n\n清单 9-10 展示了使用表 9-4 中方法的示例。每条语句下方的代码展示了执行结果。\n\n```\nStream.fromIterable([1,\
  \ 2, 3]).forEach(print);\n// -> 1, 2, 3\nStream.fromIterable([1, 2, 3]).contains(1).then(print);\n\
  // -> true\nStream.fromIterable([1, 2, 3]).any((value) => value % 2 == 0).then(print);\n\
  // -> true\nStream.fromIterable([1, 2, 3]).every((value) => value % 2 == 0).then(print);\n\
  // -> false\nStream.fromIterable([1, 2, 3]).fold(0, (v1, v2) => v1 + v2).then(print);\n\
  // -> 6\nStream.fromIterable([1, 2, 3]).reduce((v1, v2) => v1 * v2).then(print);\n\
  // -> 6\nStream.fromIterable([1, 2, 3])\n.firstWhere((value) => value % 2 == 1)\n\
  .then(print);\n// -> 1\nStream.fromIterable([1, 2, 3])\n.lastWhere((value) => value\
  \ % 2 == 1)\n.then(print);\n// -> 3\nStream.fromIterable([1, 2, 3])\n.singleWhere((value)\
  \ => value % 2 == 1)\n.then(print);\n// -> Unhandled exception: Bad state: Too many\
  \ elements\n```\n\n清单 9-10  \n返回 `Future` 对象的方法\n\n## 9.5 创建流\n\n### 问题\n\n你想创建\
  \ `Stream` 对象。\n\n### 解决方案\n\n使用不同的 `Stream` 构造器。\n\n### 讨论\n\n有几种不同的 `Stream` 构造器用于创建\
  \ `Stream` 对象：\n\n*   `Stream.empty()` 构造器创建一个空的广播流。\n*   `Stream.fromFuture()`\
  \ 构造器从一个 `Future` 对象创建单订阅流。\n*   `Stream.fromFutures()` 构造器从一个 `Future` 对象列表创建流。\n\
  *   `Stream.fromInterable()` 构造器从一个 `Iterable` 对象的元素创建单订阅流。\n*   `Stream.periodic()`\
  \ 构造器创建一个流，按给定的时间间隔定期发射数据事件。\n\n清单 9-11 展示了不同 `Stream` 构造器的使用示例。\n\n```\nStream.fromIterable([1,\
  \ 2, 3]).listen(print);\nStream.fromFuture(Future.value(1)).listen(print);\nStream.fromFutures([Future.value(1),\
  \ Future.error('error'), Future.value(2)])\n.listen(print);\nStream.periodic(Duration(seconds:\
  \ 1), (int count) => count * 2)\n.take(5)\n.listen(print);\n```\n\n清单 9-11  \n使用\
  \ `Stream` 构造器\n\n另一种创建流的方法是使用 `StreamController` 类。一个 `StreamController` 对象可以发送不同的事件到它所控制的流。默认的\
  \ `StreamController()` 构造器创建单订阅流，而 `StreamController.broadcast()` 构造器创建广播流。使用 `StreamController`，你可以以编程方式生成流中的元素。\n\
  \n在清单 9-12 中，不同的事件被发送到由 `StreamController` 对象控制的流中。\n\n```\nStreamController controller\
  \ = StreamController();\ncontroller.add(1);\ncontroller.add(2);\ncontroller.stream.listen(print,\
  \ onError: print, onDone: () => print('done'));\ncontroller.addError('error');\n\
  controller.add(3);\ncontroller.close();\n```\n\n清单 9-12  \n使用 `StreamController`\n\
  \n## 9.6 基于流和 Future 构建小部件\n\n### 问题\n\n你想构建一个小部件，该小部件能根据流或 future 中的数据更新其内容。\n\n\
  ### 解决方案\n\n使用 `StreamBuilder<T>` 或 `FutureBuilder<T>` 小部件。\n\n\n\n### 讨论\n\n给定一个`Steam`或`Future`对象，您可能希望构建一个根据其中数据更新其内容的小部件。您可以使用`StreamBuilder<T>`小部件来处理`Stream`对象，使用`FutureBuilder<T>`小部件来处理`Future`对象。表\
  \ 9-5 展示了`StreamBuilder<T>`构造函数的参数。\n\n**表 9-5** `StreamBuilder<T>`的参数\n\n| 名称 |\
  \ 类型 | 描述 |\n| --- | --- | --- |\n| `stream` | `Stream<T>` | 构建器所使用的流。 |\n| `builder`\
  \ | `AsyncWidgetBuilder<T>` | 用于构建小部件的构建器函数。 |\n| `initialData` | `T` | 用于构建小部件的初始数据。\
  \ |\n\n`AsyncWidgetBuilder`是函数类型`Widget (BuildContext context, AsyncSnapshot<T>\
  \ snapshot)`的 typedef。`AsyncSnapshot`类表示与异步计算交互的快照。表 9-6 展示了`AsyncSnapshot<T>`类的属性。\n\
  \n**表 9-6** `AsyncSnapshot<T>`的属性\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `connectionState`\
  \ | `ConnectionState` | 与异步计算的连接状态。 |\n| `data` | `T` | 异步计算接收到的最新数据。 |\n| `error`\
  \ | `Object` | 异步计算接收到的最新错误对象。 |\n| `hasData` | `bool` | `data`属性是否不为`null`。 |\n\
  | `hasError` | `bool` | `error`属性是否不为`null`。 |\n\n您可以使用`connectionState`的值来确定连接状态。表\
  \ 9-7 展示了`ConnectionState`枚举的值。\n\n**表 9-7** `ConnectionState`的值\n\n| 名称 | 描述 |\n\
  | --- | --- |\n| `none` | 未连接到异步计算。 |\n| `waiting` | 已连接到异步计算并等待交互。 |\n| `active`\
  \ | 已连接到一个活动的异步计算。 |\n| `done` | 已连接到一个终止的异步计算。 |\n\n当使用`StreamBuilder`小部件构建 UI\
  \ 时，典型的方式是根据连接状态返回不同的小部件。例如，如果连接状态是`waiting`，则可能返回一个进度指示器。\n\n在清单 9-13 中，流包含五个元素，每秒钟生成一个。如果连接状态是`none`或`waiting`，则返回一个`CircularProgressIndicator`小部件。如果状态是`active`或`done`，则根据`data`和`error`属性的值返回一个`Text`小部件。\n\
  \n```\nclass StreamBuilderPage extends StatelessWidget {\nfinal Stream _stream =\n\
  Stream.periodic(Duration(seconds: 1), (int value) => value * 10).take(5);\n@override\n\
  Widget build(BuildContext context) {\nreturn Scaffold(\nappBar: AppBar(\ntitle:\
  \ Text('Stream Builder'),\n),\nbody: Center(\nchild: StreamBuilder(\nstream: _stream,\n\
  initialData: 0,\nbuilder: (BuildContext context, AsyncSnapshot snapshot) {\nswitch\
  \ (snapshot.connectionState) {\ncase ConnectionState.none:\ncase ConnectionState.waiting:\n\
  return CircularProgressIndicator();\ncase ConnectionState.active:\ncase ConnectionState.done:\n\
  if (snapshot.hasData) {\nreturn Text('${snapshot.data ?? \"}');\n} else if (snapshot.hasError)\
  \ {\nreturn Text(\n'${snapshot.error}',\nstyle: TextStyle(color: Colors.red),\n\
  );\n}\n}\nreturn null;\n},\n),\n),\n);\n}\n}\n```\n\n**清单 9-13** 使用`StreamBuilder`\n\
  \n`FutureBuilder`小部件的用法与`StreamBuilder`小部件类似。当将`FutureBuilder`与`Future`对象一起使用时，您可以先使用`asStream()`方法将`Future`对象转换为`Stream`对象，然后对转换后的`Stream`对象使用`StreamBuilder`。\n\
  \n在清单 9-14 中，我们使用了不同的方式来构建 UI。我们不是检查连接状态，而是使用`hasData`和`hasError`属性来检查状态。\n\n```\n\
  class FutureBuilderPage extends StatelessWidget {\nfinal Future _future = Future.delayed(Duration(seconds:\
  \ 1), () {\nif (Random().nextBool()) {\nreturn 1;\n} else {\nthrow 'invalid value';\n\
  }\n});\n@override\nWidget build(BuildContext context) {\nreturn Scaffold(\nappBar:\
  \ AppBar(\ntitle: Text('Future Builder'),\n),\nbody: Center(\nchild: FutureBuilder(\n\
  future: _future,\nbuilder: (BuildContext context, AsyncSnapshot snapshot) {\nif\
  \ (snapshot.hasData) {\nreturn Text('${snapshot.data}');\n} else if (snapshot.hasError)\
  \ {\nreturn Text(\n'${snapshot.error}',\nstyle: TextStyle(color: Colors.red),\n\
  );\n} else {\nreturn CircularProgressIndicator();\n}\n},\n),\n),\n);\n}\n}\n```\n\
  \n**清单 9-14** 使用`FutureBuilder`\n\n## 9.7 处理简单 JSON 数据\n\n### 问题\n\n您想要一种简单的方法来处理\
  \ JSON 数据。\n\n### 解决方案\n\n使用`dart:convert`库中的`jsonEncode()`和`jsonDecode()`函数。\n\n\
  ### 讨论\n\nJSON 是一种流行的 Web 服务数据格式。为了与后端服务交互，您可能需要在两种场景中处理 JSON 数据：\n\n*   JSON 数据序列化：将\
  \ Dart 中的对象转换为 JSON 字符串。\n*   JSON 数据反序列化：将 JSON 字符串转换为 Dart 中的对象。\n\n对于这两种场景，如果您只是偶尔需要处理简单的\
  \ JSON 数据，那么使用`dart:convert`库中的`jsonEncode()`和`jsonDecode()`函数是一个不错的选择。`jsonEncode()`函数将\
  \ Dart 对象转换为字符串，而`jsonDecode()`函数将字符串转换为 Dart 对象。在清单 9-15 中，`data`对象首先被序列化为 JSON\
  \ 字符串，然后 JSON 字符串再次被反序列化为 Dart 对象。\n\n```\nvar data = {\n'name': 'Test',\n'count':\
  \ 100,\n'valid': true,\n'list': [\n1,\n2,\n{\n'nested': 'a',\n'value': 123,\n},\n\
  ],\n};\nString str = jsonEncode(data);\nprint(str);\nObject obj = jsonDecode(str);\n\
  print(obj);\n```\n\n**清单 9-15** 处理 JSON 数据\n\n`dart:convert`库中的 JSON 编码器仅支持有限的数据类型，包括数字、字符串、布尔值、`null`\
  \ 、列表以及键为字符串的映射。要编码其他类型的对象，您需要使用`toEncodable`参数提供一个函数，该函数首先将对象转换为可编码的值。默认的`toEncodable`函数会调用对象的`toJson()`方法。为需要序列化为\
  \ JSON 字符串的自定义类添加`toJson()`方法是一种常见做法。\n\n在清单 9-16 中，`ToEncode`类的`toJson()`方法返回一个列表，该列表将被用作\
  \ JSON 序列化的输入。\n\n```\nclass ToEncode {\nToEncode(this.v1, this.v2);\nfinal String\
  \ v1;\nfinal String v2;\nObject toJson() {\nreturn [v1, v2];\n}\n}\nprint(jsonEncode(ToEncode('v1',\
  \ 'v2')));\n```\n\n**清单 9-16** 使用`toJson()`函数\n\n如果您希望序列化的 JSON 字符串有缩进，您需要直接使用`JsonEncoder`类。在清单\
  \ 9-17 中，使用了两个空格作为缩进。\n\n```\nString indentString = JsonEncoder.withIndent('  ').convert(data);\n\
  print(indentString);\n```\n\n**清单 9-17** 添加缩进\n\n## 9.8 处理复杂 JSON 数据\n\n### 问题\n\
  \n您想要一种类型安全的方式来处理 JSON 数据。\n\n### 解决方案\n\n使用`json_annotation`和`json_serializable`库。\n\
  \n\n\n### 讨论\n\n使用`dart:convert`库中的`jsonEncode()`和`jsonDecode()`函数可以轻松处理简单的 JSON\
  \ 数据。当 JSON 数据结构复杂时，使用这两个函数就不太方便了。在反序列化 JSON 字符串时，结果通常是列表或映射。如果 JSON 数据具有嵌套结构，从列表或映射中提取值并不容易。在序列化对象时，你需要为这些类添加`toJson()`方法来构建列表或映射。使用`json_annotation`和`json_serializable`库进行代码生成可以简化这些任务。\n\
  \n`json_annotation`库提供了用于自定义 JSON 序列化和反序列化行为的注解。`json_serializable`库提供了生成处理 JSON\
  \ 数据的代码的构建过程。要使用这两个库，你需要将它们添加到`pubspec.yaml`文件中。在清单 9-18 中，`json_annotation`库被添加到`dependencies`，而`json_serializable`库被添加到`dev_dependencies`。\n\
  \n```\ndependencies:\njson_annotation: ².0.0\ndev_dependencies:\nbuild_runner: ¹.0.0\n\
  json_serializable: ².0.0\nListing 9-18\n添加 json_annotation 和 json_serializable\n\
  ```\n\n在清单 9-19 中，`Person`类位于`json_serialize.dart`文件中。注解`@JsonSerializable()`表示要为`Person`类生成代码。生成的代码位于`json_serialize.g.dart`文件中。清单\
  \ 9-19 中使用的`_$PersonFromJson()`和`_$PersonToJson()`函数来自生成的文件。`_$PersonFromJson()`函数用于`Person.fromJson()`构造函数，而`_$PersonToJson()`函数用于`toJson()`方法。\n\
  \n```\nimport 'package:json_annotation/json_annotation.dart';\npart 'json_serialize.g.dart';\n\
  @JsonSerializable()\nclass Person {\nPerson({this.firstName, this.lastName, this.email});\n\
  final String firstName;\nfinal String lastName;\nfinal String email;\nfactory Person.fromJson(Map\
  \ json) => _$PersonFromJson(json);\nMap toJson() => _$PersonToJson(this);\n}\nListing\
  \ 9-19\n使用 json_serializable\n```\n\n要生成代码，你需要运行`flutter packages pub run build_runner\
  \ build`命令。清单 9-20 展示了生成的文件。\n\n```\npart of 'json_serialize.dart';\nPerson _$PersonFromJson(Map\
  \ json) {\nreturn Person(\nfirstName: json['firstName'] as String,\nlastName: json['lastName']\
  \ as String,\nemail: json['email'] as String);\n}\nMap _$PersonToJson(Person instance)\
  \ => {\n'firstName': instance.firstName,\n'lastName': instance.lastName,\n'email':\
  \ instance.email\n};\nListing 9-20\n处理 JSON 数据的生成代码\n```\n\n`JsonSerializable`注解具有不同的属性来自定义行为；参见表\
  \ 9-8。\n\n表 9-8 `JsonSerializable`的属性\n\n| 名称 | 默认值 | 描述 |\n| --- | --- | --- |\n\
  | `anyMap` | `false` | 当为`true`时，使用`Map`作为映射类型；否则，使用`Map<String, dynamic>`。 |\n\
  | `checked` | `false` | 是否添加额外检查以验证数据类型。 |\n| `createFactory` | `true` | 是否生成将映射转换为对象的函数。\
  \ |\n| `createToJson` | `true` | 是否生成可以用作`toJson()`函数的函数。 |\n| `disallowUnrecognizedKeys`\
  \ | `false` | 当为`true`时，无法识别的键被视为错误；否则，它们将被忽略。 |\n| `explicitToJson` | `false` |\
  \ 当为`true`时，生成的`toJson()`函数会在嵌套对象上使用`toJson`。 |\n| `fieldRename` | `FieldRename.none`\
  \ | 用于将类字段名称转换为 JSON 映射键的策略。 |\n| `generateToJsonFunction` | `true` | 当为`true`时，生成顶层函数；否则，生成一个包含`toJson()`方法的\
  \ mixin 类。 |\n| `includeIfNull` | `true` | 是否包含值为`null`的字段。 |\n| `nullable` | `true`\
  \ | 是否优雅地处理`null`值。 |\n| `useWrappers` | `false` | 是否使用包装类以最小化序列化期间`Map`和`List`实例的使用。\
  \ |\n\n`generateToJsonFunction`属性决定了`toJson()`函数是如何生成的。当值为`true`时，会生成如清单 9-20 中所示的`_$PersonToJson()`等顶层函数。在清单\
  \ 9-21 中，`User`类的`generateToJsonFunction`属性被设置为`false`。\n\n```\n@JsonSerializable(\n\
  generateToJsonFunction: false,\n)\nclass User extends Object with _$UserSerializerMixin\
  \ {\nUser(this.name);\nfinal String name;\n}\nListing 9-21\nUser 类\n```\n\n在清单 9-22\
  \ 中，生成的不是一个函数，而是包含了`toJson()`方法的`_$UserSerializerMixin`类。清单 9-21 中的`User`类只需使用这个\
  \ mixin 类即可。\n\n```\nUser _$UserFromJson(Map json) {\nreturn User(json['name'] as\
  \ String);\n}\nabstract class _$UserSerializerMixin {\nString get name;\nMap toJson()\
  \ => {'name': name};\n}\nListing 9-22\n为 User 类生成的代码\n```\n\n`JsonKey`注解指定了字段如何被序列化。表\
  \ 9-9 展示了`JsonKey`的属性。\n\n表 9-9 `JsonKey`的属性\n\n| 名称 | 描述 |\n| --- | --- |\n| `name`\
  \ | JSON 映射键。如果为`null`，则使用字段名称。 |\n| `nullable` | 是否优雅地处理`null`值。 |\n| `includeIfNull`\
  \ | 如果值为`null`，是否包含此字段。 |\n| `ignore` | 是否忽略此字段。 |\n| `fromJson` | 用于反序列化此字段的函数。\
  \ |\n| `toJson` | 用于序列化此字段的函数。 |\n| `defaultValue` | 用作默认值的值。 |\n| `required` |\
  \ JSON 映射中是否必须包含此字段。 |\n| `disallowNullValue` | 是否禁止`null`值。 |\n\n清单 9-23 展示了一个使用`JsonKey`的示例。\n\
  \n```\n@JsonKey(\nname: 'first_name',\nrequired: true,\nincludeIfNull: true,\n)\n\
  final String firstName;\nListing 9-23\n使用 JsonKey\n```\n\n`JsonValue`注解指定用于序列化的枚举值。在清单\
  \ 9-24 中，`JsonValue`注解被添加到`Color`的所有枚举值上。\n\n```\nenum Color {\n@JsonValue('R')\n\
  Red,\n@JsonValue('G')\nGreen,\n@JsonValue('B')\nBlue\n}\nListing 9-24\n使用 JsonValue\n\
  ```\n\n`JsonLiteral`注解从文件中读取 JSON 数据并将内容转换为对象。它允许轻松访问静态 JSON 数据文件的内容。在清单 9-25 中，`JsonLiteral`注解被添加到`data`\
  \ getter 上。`_$dataJsonLiteral`是 JSON 文件中数据的生成变量。\n\n```\n@JsonLiteral('data.json',\
  \ asConst: true)\nMap get data => _$dataJsonLiteral;\nListing 9-25\n使用 JsonLiteral\n\
  ```\n\n## 9.9 处理 XML 数据\n\n### 问题\n\n你想在 Flutter 应用中处理 XML 数据。\n\n### 解决方案\n\n使用`xml`库。\n\
  \n### 讨论\n\nXML 是一种流行的数据交换格式。你可以在 Flutter 应用中使用`xml`库来处理 XML 数据。首先，你需要将`xml: ³.3.1`添加到`pubspec.yaml`文件的`dependencies`中。与\
  \ JSON 数据类似，XML 数据有两种使用场景：\n\n*   解析 XML 文档并查询数据。\n\n*   构建 XML 文档。\n\n\n\n####\
  \ 解析 XML 文档\n\n要解析 XML 文档，需要使用 `parse()` 函数，该函数接收一个 XML 字符串作为输入，并返回解析后的 `XmlDocument`\
  \ 对象。利用 `XmlDocument` 对象，你可以查询和遍历 XML 文档树以从中提取数据。\n\n要查询文档树，可以使用 `findElements()`\
  \ 和 `findAllElements()` 方法。这两个方法接受一个标签名和一个可选的命名空间作为参数，并返回一个 `Iterable<XmlElement>`\
  \ 对象。它们的区别在于：`findElements()` 方法仅搜索直接子元素，而 `findAllElements()` 方法则搜索所有后代子元素。若要遍历文档树，可以使用表\
  \ 9-10 中列出的属性。\n\n**表 9-10** `XmlParent` 的属性\n\n| 名称 | 类型 | 描述 |\n| --- | --- |\
  \ --- |\n| `children` | `XmlNodeList<XmlNode>` | 该节点的直接子节点。 |\n| `ancestors` | `Iterable<XmlNode>`\
  \ | 该节点的祖先节点，按文档逆序排列。 |\n| `descendants` | `Iterable<XmlNode>` | 该节点的后代节点，按文档顺序排列。\
  \ |\n| `attributes` | `List<XmlAttribute>` | 该节点的属性节点，按文档顺序排列。 |\n| `preceding`\
  \ | `Iterable<XmlNode>` | 该节点开始标签之前的节点，按文档顺序排列。 |\n| `following` | `Iterable<XmlNode>`\
  \ | 该节点结束标签之后的节点，按文档顺序排列。 |\n| `parent` | `XmlNode` | 该节点的父节点，可以为 `null`。 |\n| `firstChild`\
  \ | `XmlNode` | 该节点的第一个子节点，可以为 `null`。 |\n| `lastChild` | `XmlNode` | 该节点的最后一个子节点，可以为\
  \ `null`。 |\n| `nextSibling` | `XmlNode` | 该节点的下一个兄弟节点，可以为 `null`。 |\n| `previousSibling`\
  \ | `XmlNode` | 该节点的上一个兄弟节点，可以为 `null`。 |\n| `root` | `XmlNode` | 树的根节点。 |\n\n在代码清单\
  \ 9-26 中，输入的 XML 字符串（摘录自 [`https://msdn.microsoft.com/en-us/windows/desktop/ms762271`](https://msdn.microsoft.com/en-us/windows/desktop/ms762271)）被解析，并查询第一个\
  \ `book` 元素。然后提取了 `title` 元素的文本和 `id` 属性的值。\n\n```\nString xmlStr = \"'\n\nGambardella,\
  \ Matthew\nXML Developer's Guide\nComputer\n44.95\n2000-10-01\nAn in-depth look\
  \ at creating applications\nwith XML.\n\nRalls, Kim\nMidnight Rain\nFantasy\n5.95\n\
  2000-12-16\nA former architect battles corporate zombies, an evil sorceress, and\
  \ her own childhood to become queen of the world.\n\n\"';\nXmlDocument document\
  \ = parse(xmlStr);\nXmlElement firstBook = document.rootElement.findElements('book').first;\n\
  String title = firstBook.findElements('title').single.text;\nString id = firstBook.attributes\n\
  .firstWhere((XmlAttribute attr) => attr.name.local == 'id')\n.value;\nprint('$id\
  \ => $title');\n代码清单 9-26\nXML 文档解析与查询\n```\n\n#### 构建 XML 文档\n\n要构建 XML 文档，可以使用\
  \ `XmlBuilder` 类。`XmlBuilder` 类提供了构建 XML 文档不同组成部分的方法，见表 9-11。利用这些方法，我们可以自上而下地构建\
  \ XML 文档，即从根元素开始，逐层构建嵌套内容。\n\n**表 9-11** `XmlBuilder` 的方法\n\n| 名称 | 描述 |\n| ---\
  \ | --- |\n| `element()` | 创建带有指定标签名、命名空间、属性和嵌套内容的 `XmlElement` 节点。 |\n| `attribute()`\
  \ | 创建带有指定名称、值、命名空间和类型的 `XmlAttribute` 节点。 |\n| `text()` | 创建带有指定文本的 `XmlText` 节点。\
  \ |\n| `namespace()` | 将命名空间 `prefix` 绑定到 `uri`。 |\n| `cdata()` | 创建带有指定文本的 `XmlCDATA`\
  \ 节点。 |\n| `comment()` | 创建带有指定文本的 `XmlComment` 节点。 |\n| `processing()` | 创建带有指定\
  \ `target` 和 `text` 的 `XmlProcessing` 节点。 |\n\n构建完成后，可以使用 `XmlBuilder` 的 `build()`\
  \ 方法将结果构建为 `XmlNode`。在代码清单 9-27 中，根元素是一个带有 `id` 属性的 `note` 元素。`nest` 参数的值是一个函数，该函数使用构建器方法来构建节点元素的内容。\n\
  \n```\nXmlBuilder builder = XmlBuilder();\nbuilder.processing('xml', 'version=\"\
  1.0\"');\nbuilder.element(\n'note',\nattributes: {\n'id': '001',\n},\nnest: () {\n\
  builder.element('from', nest: () {\nbuilder.text('John');\n});\nbuilder.element('to',\
  \ nest: () {\nbuilder.text('Jane');\n});\nbuilder.element('message', nest: () {\n\
  builder\n..text('Hello!')\n..comment('message to send');\n});\n},\n);\nXmlNode xmlNode\
  \ = builder.build();\nprint(xmlNode.toXmlString(pretty: true));\n代码清单 9-27\n使用 XmlBuilder\n\
  ```\n\n代码清单 9-28 展示了通过代码清单 9-27 中的代码构建的 XML 文档。\n\n```\n\nJohn\nJane\nHello!\n\n\
  代码清单 9-28\n构建的 XML 文档\n```\n\n## 处理 HTML 数据\n\n### 问题\n\n你希望在 Flutter 应用中解析 HTML\
  \ 文档。\n\n### 解决方案\n\n使用 `html` 库。\n\n### 讨论\n\n尽管 JSON 和 XML 数据格式在 Flutter 应用中很流行，但你仍可能需要解析\
  \ HTML 文档来提取数据。这个过程称为屏幕抓取。你可以使用 `html` 库来解析 HTML 文档。要使用该库，你需要在 `pubspec.yaml` 文件的\
  \ `dependencies` 中添加 `html: ⁰.13.4+1`。\n\n`parse()` 函数将 HTML 字符串解析为 `Document` 对象。这些\
  \ `Document` 对象可以使用 W3C DOM API 进行查询和操作。在代码清单 9-29 中，首先解析了 HTML 字符串，然后使用 `getElementsByTagName()`\
  \ 方法获取 `li` 元素，最后从 `li` 元素中提取 `id` 属性和文本。\n\n```\nimport 'package:html/dom.dart';\n\
  import 'package:html/parser.dart' show parse;\nvoid main() {\nString htmlStr = \"\
  '\n\nJohn\nJane\nMary\n\n\"';\nDocument document = parse(htmlStr);\nvar users =\
  \ document.getElementsByTagName('li').map((Element element) {\nreturn {\n'id': element.attributes['id'],\n\
  'name': element.text,\n};\n});\nprint(users);\n}\n代码清单 9-29\n解析 HTML 文档\n```\n\n\
  ## 发送 HTTP 请求\n\n### 问题\n\n你希望向后端服务发送 HTTP 请求。\n\n### 解决方案\n\n使用 `dart:io` 库中的 `HttpClient`。\n\
  \n\n\n### 讨论\n\nHTTP 协议是公开 Web 服务的常用选择。其表示形式可以是 JSON 或 XML。通过使用 `dart:io` 库中的 `HttpClient`\
  \ 类，你可以轻松地通过 HTTP 与后端服务进行交互。\n\n要使用 `HttpClient` 类，你首先需要选择一种 HTTP 方法，然后准备用于请求的 `HttpClientRequest`\
  \ 对象，并处理用于响应的 `HttpClientResponse` 对象。`HttpClient` 类根据不同 HTTP 方法提供了多对方法。例如，`get()`\
  \ 和 `getUrl()` 方法都用于发送 HTTP GET 请求。区别在于 `get()` 方法接受 `host`、`port` 和 `path` 参数，而\
  \ `getUrl()` 方法接受 `Uri` 类型的 `url` 参数。你还可以看到其他方法对，如 `post()` 和 `postUrl()`、`put()`\
  \ 和 `putUrl()`、`patch()` 和 `patchUrl()`、`delete()` 和 `deleteUrl()`，以及 `head()` 和\
  \ `headUrl()`。\n\n这些方法返回 `Future<HttpClientRequest>` 对象。你需要使用 `then()` 方法链式处理返回的\
  \ `Future` 对象，以准备 `HttpClientRequest` 对象。例如，你可以修改 HTTP 请求头或写入请求体。`then()` 方法需要返回\
  \ `HttpClientRequest.close()` 方法的值，该值是一个 `Future<HttpClientResponse>` 对象。在 `Future<HttpClientResponse>`\
  \ 对象的 `then()` 方法中，你可以使用此对象来获取响应体、请求头、Cookie 和其他信息。\n\n在清单 9-30 中，`request.close()`\
  \ 方法在第一个 `then()` 方法中直接被调用，因为我们不需要对 `HttpClientRequest` 对象做任何操作。`_handleResponse()`\
  \ 函数将 HTTP 响应解码为 UTF-8 字符串并打印出来。`HttpClientResponse` 类实现了 `Stream<List<int>>`，因此响应体可以作为流来读取。\n\
  \n```\nvoid _handleResponse(HttpClientResponse response) {\nresponse.transform(utf8.decoder).listen(print);\n\
  }\nHttpClient httpClient = HttpClient();\nhttpClient\n.getUrl(Uri.parse('https://httpbin.org/get'))\n\
  .then((HttpClientRequest request) => request.close())\n.then(_handleResponse);\n\
  清单 9-30\n发送 HTTP GET 请求\n```\n\n如果你需要发送带有请求体的 HTTP POST、PUT 和 PATCH 请求，可以使用 `HttpClientRequest.write()`\
  \ 方法来写入请求体；请参见清单 9-31。\n\n```\nhttpClient\n.postUrl(Uri.parse('https://httpbin.org/post'))\n\
  .then((HttpClientRequest request) {\nrequest.write('hello');\nreturn request.close();\n\
  }).then(_handleResponse);\n清单 9-31\n写入 HTTP 请求体\n```\n\n如果你需要修改 HTTP 请求头，可以使用 `HttpClientRequest.headers`\
  \ 属性来修改 `HttpHeaders` 对象；请参见清单 9-32。\n\n```\nhttpClient\n.getUrl(Uri.parse('https://httpbin.org/headers'))\n\
  .then((HttpClientRequest request) {\nrequest.headers.set(HttpHeaders.userAgentHeader,\
  \ 'my-agent');\nreturn request.close();\n}).then(_handleResponse);\n清单 9-32\n修改\
  \ HTTP 请求头\n```\n\n如果你需要支持 HTTP 基本认证，可以使用 `HttpClient.addCredentials()` 方法来添加 `HttpClientBasicCredentials`\
  \ 对象；请参见清单 9-33。\n\n```\nString username = 'username', password = 'password';\n\
  Uri uri = Uri.parse('https://httpbin.org/basic-auth/$username/$password');\nhttpClient.addCredentials(\n\
  uri, null, HttpClientBasicCredentials(username, password));\nhttpClient\n.getUrl(uri)\n\
  .then((HttpClientRequest request) => request.close())\n.then(_handleResponse);\n\
  清单 9-33\n基本认证\n```\n\n## 9.12 连接到 WebSocket\n\n### 问题\n\n你希望在 Flutter 应用中连接到 WebSocket\
  \ 服务器。\n\n### 解决方案\n\n使用 `dart:io` 库中的 `WebSocket` 类。\n\n### 讨论\n\nWebSocket 广泛应用于\
  \ Web 应用，以提供浏览器和服务器之间的双向通信。它们还可以提供后端数据的实时更新。如果你已经有一个与浏览器中运行的 Web 应用交互的 WebSocket\
  \ 服务器，你可能也希望在 Flutter 应用中提供相同的功能。`dart:io` 库中的 `WebSocket` 类可用于实现 WebSocket 连接。\n\
  \n静态的 `WebSocket.connect()` 方法用于连接 WebSocket 服务器。你需要提供带有 `ws` 或 `wss` 协议的服务器 URL。你可以选择性地提供一个子协议列表和一个请求头映射表。`connect()`\
  \ 方法的返回值是一个 `Future<WebSocket>` 对象。`WebSocket` 类实现了 `Stream` 类，因此你可以将来自服务器的数据作为流来读取。要向服务器发送数据，可以使用\
  \ `add()` 和 `addStream()` 方法。\n\n在清单 9-34 中，WebSocket 连接到了演示回显服务器。通过使用 `listen()`\
  \ 方法订阅 `WebSocket` 对象，我们可以处理来自服务器的数据。两次 `add()` 方法调用向服务器发送了两条消息。\n\n```\nWebSocket.connect('ws://demos.kaazing.com/echo').then((WebSocket\
  \ webSocket) {\nwebSocket.listen(print, onError: print);\nwebSocket.add('hello');\n\
  webSocket.add('world');\nwebSocket.close();\n}).catchError(print);\n清单 9-34\n连接到\
  \ WebSocket\n```\n\n## 9.13 连接到 Socket\n\n### 问题\n\n你希望连接到 Socket 服务器。\n\n### 解决方案\n\
  \n使用 `dart:io` 库中的 `Socket` 类。\n\n### 讨论\n\n如果你希望在 Flutter 应用中连接 Socket 服务器，可以使用\
  \ `dart:io` 库中的 `Socket` 类。静态的 `Socket.connect()` 方法用于连接指定 `host` 和 `port` 的 Socket\
  \ 服务器，并返回一个 `Future<Socket>` 对象。`Socket` 类实现了 `Stream<List<int>>`，因此你可以通过订阅流来读取来自服务器的数据。要向服务器发送数据，可以使用\
  \ `add()` 和 `addStream()` 方法。\n\n在清单 9-35 中，一个 Socket 服务器在端口 `10080` 上启动。该服务器将接收到的字符串转换为大写并返回结果。\n\
  \n```\nimport 'dart:io';\nimport 'dart:convert';\nvoid main() {\nServerSocket.bind('127.0.0.1',\
  \ 10080).then((serverSocket) {\nserverSocket.listen((socket) {\nsocket.addStream(socket\n\
  .transform(utf8.decoder)\n.map((str) => str.toUpperCase())\n.transform(utf8.encoder));\n\
  });\n});\n}\n清单 9-35\n简单的 Socket 服务器\n```\n\n在清单 9-36 中，`Socket.connect()` 方法用于连接清单\
  \ 9-35 中所示的 Socket 服务器。从服务器接收到的数据被打印出来。向服务器发送了两条字符串。\n\n```\nvoid main() {\nSocket.connect('127.0.0.1',\
  \ 10080).then((socket) {\nsocket.transform(utf8.decoder).listen(print);\nsocket.write('hello');\n\
  socket.write('world');\nsocket.close();\n});\n}\n清单 9-36\n连接到 Socket 服务器\n```\n\n\
  ## 9.14 与基于 JSON 的 REST 服务交互\n\n### 问题\n\n你希望使用基于 JSON 的 REST 服务。\n\n### 解决方案\n\n\
  使用 `HttpClient`、`json_serialize` 库和 `FutureBuilder` 小部件。\n\n\n\n### 讨论\n\n将移动应用后端通过\
  \ HTTP 协议以 JSON 格式暴露服务是一种常见选择。通过使用 `HttpClient`、`json_serialize` 库和 `FutureBuilder`\
  \ 组件，你可以构建与这些 REST 服务交互的用户界面。本示例结合了清单 9-6、9-8 和 9-11 中的内容，提供了一个具体示例。\n\n该示例使用 GitHub\
  \ Jobs API（[`https://jobs.github.com/api`](https://jobs.github.com/api)）获取 GitHub\
  \ 网站上的职位列表。在清单 9-37 中，`Job` 类代表一个职位信息。在 `JsonSerializable` 注解中，`createToJson` 属性被设置为\
  \ `false`，因为我们只需要从 API 解析 JSON 响应。`_parseDate` 函数用于解析 JSON 对象中 `created_at` 字段的字符串。你需要添加\
  \ `intl` 库才能使用 `DateFormat` 类。\n\n```\npart 'github_jobs.g.dart';\nDateFormat _dateFormat\
  \ = DateFormat('EEE MMM dd HH:mm:ss yyyy');\nDateTime _parseDate(String str) =>\n\
  _dateFormat.parse(str.replaceFirst(' UTC', \"\"), true);\n@JsonSerializable(\ncreateToJson:\
  \ false,\n)\nclass Job {\nJob();\nString id;\nString type;\nString url;\n@JsonKey(name:\
  \ 'created_at', fromJson: _parseDate)\nDateTime createdAt;\nString company;\n@JsonKey(name:\
  \ 'company_url')\nString companyUrl;\n@JsonKey(name: 'company_logo')\nString companyLogo;\n\
  String location;\nString title;\nString description;\n@JsonKey(name: 'how-to-apply')\n\
  String howToApply;\nfactory Job.fromJson(Map json) => _$JobFromJson(json);\n}\n\
  清单 9-37\nJob 类\n```\n\n在清单 9-38 中，使用 `HttpClient` 对象向 GitHub Jobs API 发送 HTTP GET\
  \ 请求，并通过 `jsonDecode()` 函数解析 JSON 响应。`FutureBuilder` 组件使用类型为 `Future<List<Job>>`\
  \ 的 `Future` 对象来构建 UI。`JobsList` 组件接收一个 `List<Job>` 对象，并使用 `ListView` 组件显示列表。\n\n\
  ```\nclass GitHubJobsPage extends StatelessWidget {\nfinal Future> _jobs = HttpClient()\n\
  .getUrl(Uri.parse('https://jobs.github.com/positions.json'\n'?description=java&location=new+york'))\n\
  .then((HttpClientRequest request) => request.close())\n.then((HttpClientResponse\
  \ response) {\nreturn response.transform(utf8.decoder).join(\"\").then((String content)\
  \ {\nreturn (jsonDecode(content) as List)\n.map((json) => Job.fromJson(json))\n\
  .toList();\n});\n});\n@override\nWidget build(BuildContext context) {\nreturn Scaffold(\n\
  appBar: AppBar(\ntitle: Text('GitHub Jobs'),\n),\nbody: FutureBuilder>(\nfuture:\
  \ _jobs,\nbuilder: (BuildContext context, AsyncSnapshot> snapshot) {\nif (snapshot.hasData)\
  \ {\nreturn JobsList(snapshot.data);\n} else if (snapshot.hasError) {\nreturn Center(\n\
  child: Text(\n'${snapshot.error}',\nstyle: TextStyle(color: Colors.red),\n),\n);\n\
  } else {\nreturn Center(\nchild: CircularProgressIndicator(),\n);\n}\n},\n),\n);\n\
  }\n}\nclass JobsList extends StatelessWidget {\nJobsList(this.jobs);\nfinal List\
  \ jobs;\n@override\nWidget build(BuildContext context) {\nreturn ListView.separated(\n\
  itemBuilder: (BuildContext context, int index) {\nJob job = jobs[index];\nreturn\
  \ ListTile(\ntitle: Text(job.title),\nsubtitle: Text(job.company),\n);\n},\nseparatorBuilder:\
  \ (BuildContext context, int index) {\nreturn Divider();\n},\nitemCount: jobs.length,\n\
  );\n}\n}\n清单 9-38\n用于展示职位的组件\n```\n\n## 9.15 与 gRPC 服务交互\n\n### 问题\n\n你想与 gRPC 服务进行交互。\n\
  \n### 解决方案\n\n使用 `grpc` 库。\n\n### 讨论\n\ngRPC（[`https://grpc.io/`](https://grpc.io/)）是一个高性能、开源的通用\
  \ RPC 框架。本示例展示了如何与 gRPC 服务交互。交互的 gRPC 服务是 gRPC 官方示例中的 greeter 服务（[`https://github.com/grpc/grpc/tree/master/examples/node`](https://github.com/grpc/grpc/tree/master/examples/node)）。你需要先启动\
  \ gRPC 服务器。\n\n要在 Flutter 应用中使用此 gRPC 服务，你首先需要安装 Protocol Buffers 编译器（[`https://github.com/protocolbuffers/protobuf`](https://github.com/protocolbuffers/protobuf)）。下载适合你平台的发布文件并解压后，你需要将解压后的\
  \ `bin` 目录添加到 `PATH` 环境变量中。你可以运行 `protoc --version` 命令来验证安装。本示例使用的版本是 `3.7.1`。\n\
  \n你还需要安装 Dart protoc 插件（[`https://github.com/dart-lang/protobuf/tree/master/protoc_plugin`](https://github.com/dart-lang/protobuf/tree/master/protoc_plugin)）。最简单的安装方式是运行以下命令。\n\
  \n```\n$ flutter packages pub global activate protoc_plugin\n```\n\n由于我们使用 `flutter\
  \ packages` 来运行安装，二进制文件会被放在 Flutter SDK 的 `.pub-cache/bin` 目录下。你需要将此路径添加到 `PATH`\
  \ 环境变量中。该插件需要 `dart` 命令可用，因此你还需要将 Flutter SDK 的 `bin/cache/dart-sdk/bin` 目录添加到 PATH\
  \ 环境变量中。现在我们可以使用 `protoc` 来生成与 greeter 服务交互的 Dart 文件。在以下命令中，`lib/grpc/generated`\
  \ 是生成文件的输出路径。`proto_file_path` 是 proto 文件的路径。`helloworld.proto` 文件包含 greeter 服务的定义。还需要将\
  \ `protobuf` 和 `grpc` 库添加到 `pubspec.yaml` 文件的 `dependencies` 中。\n\n```\n$ protoc\
  \ --dart_out=grpc:lib/grpc/generated --proto_path= /helloworld.proto\n```\n\n生成的\
  \ `helloworld.pbgrpc.dart` 文件提供了 `GreeterClient` 类来与服务交互。在清单 9-39 中，创建了一个 `ClientChannel`\
  \ 来连接 gRPC 服务器。创建 `GreeterClient` 对象时需要该通道。`sayHello()` 方法向服务器发送请求并接收响应。\n\n```\n\
  import 'package:grpc/grpc.dart';\nimport 'generated/helloworld.pbgrpc.dart';\nvoid\
  \ main() async {\nfinal channel = new ClientChannel('localhost',\nport: 50051,\n\
  options: const ChannelOptions(\ncredentials: const ChannelCredentials.insecure()));\n\
  final stub = new GreeterClient(channel);\ntry {\nvar response = await stub.sayHello(new\
  \ HelloRequest()..name = 'John');\nprint('Received: ${response.message}');\n} catch\
  \ (e) {\nprint('Caught error: $e');\n}\nawait channel.shutdown();\n}\n清单 9-39\n\
  与 gRPC 服务交互\n```\n\n## 9.16 总结\n\n本章重点介绍了与后端服务交互的不同方式，包括 HTTP、WebSocket、Socket 和\
  \ gRPC。Future 和 Stream 在异步计算中扮演着重要角色。本章还讨论了如何处理 JSON、XML 和 HTML 数据。在下一章中，我们将讨论 Flutter\
  \ 应用中的状态管理。\n\n"
- "# 10. 状态管理\n\n在构建 Flutter 应用时，你需要管理应用运行时的状态。状态可能因用户交互或后台任务而改变。本章涵盖了在 Flutter 中使用不同解决方案进行状态管理的示例。\n\
  \n## 10.1 使用有状态组件管理状态\n\n### 问题\n\n你希望有一种简单的方式来管理 UI 中的状态。\n\n### 解决方案\n\n创建你自己的\
  \ `StatefulWidget` 子类。\n\n\n\n### 讨论\n\n`StatefulWidget`类是在 Flutter 中管理状态的基本方式。状态\
  \ ful widget 在其状态改变时会重建自身。如果要管理的状态很简单，使用状态 ful widget 通常就足够好了。你不需要使用其他方法中讨论的第三方库。\n\
  \n状态 ful widget 使用`State`对象来存储状态。当创建自己的`StatefulWidget`子类时，需要重写`createState()`方法以返回一个`State`对象。对于每个`StatefulWidget`子类，会有一个对应的`State`类子类来管理状态。`createState()`方法返回对应`State`子类的对象。实际状态通常作为`State`子类的私有变量来保存。\n\
  \n在`State`子类中，你需要实现`build()`方法来返回一个`Widget`对象。当状态改变时，会调用`build()`方法获取新的 widget 以更新\
  \ UI。要触发 UI 的重建，需要显式调用`setState()`方法来通知框架。`setState()`方法的参数是一个`VoidCallback`函数，其中包含更新内部状态的逻辑。重建时，`build()`方法使用最新状态来创建\
  \ widget 配置。Widget 不会被更新，而是在必要时被替换。\n\n清单 10-1 中的`SelectColor` widget 是一个典型的状态 ful\
  \ widget 示例。`_SelectColorState`类是`SelectColor` widget 的`State`实现。`_selectedColor`是维护当前选中颜色的内部变量。`DropdownButton`\
  \ widget 使用`_selectedColor`的值来确定要渲染的选中选项，`Text` widget 使用它来确定要显示的文本。在`DropdownButton`的`onChanged`处理程序中，调用`setState()`来更新`_selectedColor`变量的值，这通知框架重新运行`_SelectColorState.build()`方法以获取新的\
  \ widget 配置并更新 UI。\n\n```\nclass SelectColor extends StatefulWidget {\n@override\n\
  _SelectColorState createState() => _SelectColorState();\n}\nclass _SelectColorState\
  \ extends State {\nfinal List _colors = ['Red', 'Green', 'Blue'];\nString _selectedColor;\n\
  @override\nWidget build(BuildContext context) {\nreturn Column(\nchildren: [\nDropdownButton(\n\
  value: _selectedColor,\nitems: _colors.map((String color) {\nreturn DropdownMenuItem(\n\
  value: color,\nchild: Text(color),\n);\n}).toList(),\nonChanged: (value) {\nsetState(()\
  \ {\n_selectedColor = value;\n});\n},\n),\nText('Selected: ${_selectedColor ?? \"\
  }'),\n],\n);\n}\n}\nListing 10-1\nExample of stateful widget\n```\n\n`State`对象有自己的生命周期。你可以在`State`子类中重写不同的生命周期方法，以在不同阶段执行操作。表\
  \ 10-1 显示了这些生命周期方法。\n\n**表 10-1** `State`的生命周期方法\n\n| 名称 | 描述 |\n| --- | --- |\n\
  | `initState()` | 当此对象被插入 widget 树时调用。应用于执行状态的初始化。 |\n| `didChangeDependencies()`\
  \ | 当此对象的依赖项发生变化时调用。 |\n| `didUpdateWidget(T oldWidget)` | 当此对象的 widget 发生变化时调用。旧\
  \ widget 作为参数传入。 |\n| `reassemble()` | 当应用在调试期间被重新组装时调用。此方法仅在开发期间调用。 |\n| `build(BuildContext\
  \ context)` | 当状态发生变化时调用。 |\n| `deactivate()` | 当此对象从 widget 树中移除时调用。 |\n| `dispose()`\
  \ | 当此对象被永久从 widget 树中移除时调用。此方法在`deactivate()`之后调用。 |\n\n在表 10-1 列出的方法中，`initState()`和`dispose()`方法容易理解。这两个方法在生命周期中只会被调用一次。然而，其他方法可能会被多次调用。\n\
  \n`didChangeDependencies()`方法通常在状态对象使用了继承 widget 时使用。当继承 widget 改变时调用此方法。大多数情况下，你不需要重写此方法，因为框架会在依赖项改变后自动调用`build()`方法。有时你可能需要在依赖项改变后执行一些昂贵的任务。在这种情况下，应将逻辑放入`didChangeDependencies()`方法，而不是在`build()`方法中执行。\n\
  \n`reassemble()`方法仅在开发期间使用，例如在热重载期间。此方法在发布版本中不会被调用。大多数情况下，你不需要重写此方法。\n\n`didUpdateWidget()`方法在状态的\
  \ widget 发生变化时调用。如果你需要在旧 widget 上执行清理任务或重用旧 widget 中的某些状态，则应重写此方法。例如，`TextField`\
  \ widget 的`_TextFieldState`类重写了`didUpdateWidget()`方法，以基于旧 widget 的值初始化`TextEditingController`对象。\n\
  \n`deactivate()`方法在状态对象从 widget 树中移除时调用。此状态对象可能会在之后被重新插入到 widget 树的不同位置。如果构建逻辑依赖于\
  \ widget 的位置，则应重写此方法。例如，`FormField` widget 的`FormFieldState`类重写了`deactivate()`方法，以从封闭的表单中注销当前表单字段。\n\
  \n在清单 10-1 中，widget 的全部内容都在`build()`方法中构建，因此你可以在`DropdownButton`的`onPressed`回调中直接调用`setState()`方法。如果\
  \ widget 结构复杂，你可以向下传递一个更新状态的函数给子 widget。在清单 10-2 中，`RaisedButton`的`onPressed`回调由`CounterButton`的构造函数参数设置。当`CounterButton`在`Counter`\
  \ widget 中使用时，提供的处理函数使用`setState()`来更新状态。\n\n```\nclass Counter extends StatefulWidget\
  \ {\n@override\n_CounterState createState() => _CounterState();\n}\nclass _CounterState\
  \ extends State {\nint count = 0;\n@override\nWidget build(BuildContext context)\
  \ {\nreturn Column(\nchildren: [\nCounterButton(() {\nsetState(() {\ncount++;\n\
  });\n}),\nCounterText(count),\n],\n);\n}\n}\nclass CounterText extends StatelessWidget\
  \ {\nCounterText(this.count);\nfinal int count;\n@override\nWidget build(BuildContext\
  \ context) {\nreturn Text('Value: ${count ?? \"}');\n}\n}\nclass CounterButton extends\
  \ StatelessWidget {\nCounterButton(this.onPressed);\nfinal VoidCallback onPressed;\n\
  @override\nWidget build(BuildContext context) {\nreturn RaisedButton(\nchild: Text('+'),\n\
  onPressed: onPressed,\n);\n}\n}\nListing 10-2\nPass state change function to descendant\
  \ widget\n```\n\n## 10.2 使用继承 Widget 管理状态\n\n### 问题\n\n你希望将状态沿 widget 树向下传播。\n\n\
  ### 解决方案\n\n创建你自己的`InheritedWidget`子类。\n\n\n\n### 讨论\n\n当使用有状态小部件管理状态时，状态存储在 `State`\
  \ 对象中。如果后代小部件需要访问该状态，则需从子树根节点向下传递，正如代码清单 10-2 中 `count` 状态的传递方式。当小部件的子树结构较深时，通过添加构造函数参数来向下传递状态会很不方便。在这种情况下，使用\
  \ `InheritedWidget` 是更好的选择。\n\n使用 `InheritedWidget` 时，可以通过 `BuildContext.inheritFromWidgetOfExactType()`\
  \ 方法从构建上下文中获取特定类型的最近继承小部件实例。后代小部件可以轻松访问存储在继承小部件中的状态数据。调用 `inheritFromWidgetOfExactType()`\
  \ 方法时，构建上下文会向该继承小部件注册自身。当继承小部件发生变化时，构建上下文会自动重建，以从继承小部件获取新值。这意味着，对于使用继承小部件中状态的后代小部件，无需手动更新。\n\
  \n代码清单 10-3 中的 `Config` 类代表状态。它包含 `color` 和 `fontSize` 属性。`Config` 类重写了 `==` 运算符和\
  \ `hashCode` 属性，以实现正确的相等性检查。通过 `copyWith()` 方法，可以更新部分属性来创建 `Config` 类的新实例。`Config.fallback()`\
  \ 构造函数会创建一个包含默认值的 `Config` 对象。\n\n```\nclass Config {\n  const Config({this.color,\
  \ this.fontSize});\n  const Config.fallback()\n      : color = Colors.red,\n   \
  \     fontSize = 12.0;\n  final Color color;\n  final double fontSize;\n  Config\
  \ copyWith({Color color, double fontSize}) {\n    return Config(\n      color: color\
  \ ?? this.color,\n      fontSize: fontSize ?? this.fontSize,\n    );\n  }\n  @override\n\
  \  bool operator ==(other) {\n    if (other.runtimeType != runtimeType) return false;\n\
  \    final Config typedOther = other;\n    return color == typedOther.color && fontSize\
  \ == typedOther.fontSize;\n  }\n  @override\n  int get hashCode => hashValues(color,\
  \ fontSize);\n}\n```\n\n代码清单 10-4 中的 `ConfigWidget` 是一个继承小部件。它将 `Config` 对象作为其内部状态。`updateShouldNotify()`\
  \ 方法用于检查在继承小部件更改后，是否应通知已注册的构建上下文。这是一种性能优化，可以避免不必要的更新。静态 `of()` 方法是一种常见做法，用于获取继承小部件或与该继承小部件关联的状态。`ConfigWidget`\
  \ 的 `of()` 方法使用 `inheritFromWidgetOfExactType()` 从构建上下文中获取最近的包围 `ConfigWidget` 实例，并从小部件中获取\
  \ `config` 属性。如果未找到 `ConfigWidget` 对象，则返回默认的 `Config` 实例。\n\n```\nclass ConfigWidget\
  \ extends InheritedWidget {\n  const ConfigWidget({\n    Key key,\n    @required\
  \ this.config,\n    @required Widget child,\n  }) : super(key: key, child: child);\n\
  \  final Config config;\n  static Config of(BuildContext context) {\n    final ConfigWidget\
  \ configWidget =\n        context.inheritFromWidgetOfExactType(ConfigWidget);\n\
  \    return configWidget?.config ?? const Config.fallback();\n  }\n  @override\n\
  \  bool updateShouldNotify(ConfigWidget oldWidget) {\n    return config != oldWidget.config;\n\
  \  }\n}\n```\n\n在代码清单 10-5 中，`ConfiguredText` 和 `ConfiguredBox` 小部件都使用 `ConfigWidget.of(context)`\
  \ 来获取 `Config` 对象，并在构建 UI 时使用其属性。\n\n```\nclass ConfiguredText extends StatelessWidget\
  \ {\n  @override\n  Widget build(BuildContext context) {\n    Config config = ConfigWidget.of(context);\n\
  \    return Text(\n      'Font size: ${config.fontSize}',\n      style: TextStyle(\n\
  \        color: config.color,\n        fontSize: config.fontSize,\n      ),\n  \
  \  );\n  }\n}\nclass ConfiguredBox extends StatelessWidget {\n  @override\n  Widget\
  \ build(BuildContext context) {\n    Config config = ConfigWidget.of(context);\n\
  \    return Container(\n      decoration: BoxDecoration(color: config.color),\n\
  \      child: Text('Background color: ${config.color}'),\n    );\n  }\n}\n```\n\n\
  代码清单 10-6 中的 `ConfigUpdater` 小部件用于更新 `Config` 对象。它也使用 `ConfigWidget.of(context)`\
  \ 来获取要更新的 `Config` 对象。`onColorChanged` 和 `onFontSizeIncreased` 回调用于触发 `Config` 对象的更新。\n\
  \n```\ntypedef SetColorCallback = void Function(Color color);\nclass ConfigUpdater\
  \ extends StatelessWidget {\n  const ConfigUpdater({this.onColorChanged, this.onFontSizeIncreased});\n\
  \  static const List _colors = [Colors.red, Colors.green, Colors.blue];\n  final\
  \ SetColorCallback onColorChanged;\n  final VoidCallback onFontSizeIncreased;\n\
  \  @override\n  Widget build(BuildContext context) {\n    Config config = ConfigWidget.of(context);\n\
  \    return Column(\n      children: [\n        DropdownButton(\n          value:\
  \ config.color,\n          items: _colors.map((Color color) {\n            return\
  \ DropdownMenuItem(\n              value: color,\n              child: Text(color.toString()),\n\
  \            );\n          }).toList(),\n          onChanged: onColorChanged,\n\
  \        ),\n        RaisedButton(\n          child: Text('Increase font size'),\n\
  \          onPressed: onFontSizeIncreased,\n        )\n      ],\n    );\n  }\n}\n\
  ```\n\n现在我们可以将这些小部件组合起来构建完整的 UI。在代码清单 10-7 中，`ConfiguredPage` 是一个有状态小部件，其状态为 `Config`\
  \ 对象。`ConfigUpdater` 小部件作为 `ConfiguredPage` 的子组件，用于更新 `Config` 对象。`ConfiguredPage`\
  \ 构造函数还包含 `child` 参数，用于提供使用 `ConfigWidget.of(context)` 获取正确 `Config` 对象的子小部件。对于\
  \ `ConfigWidget` 的 `onColorChanged` 和 `onFontSizeIncreased` 回调，使用 `setState()` 方法来更新\
  \ `ConfiguredPage` 小部件的状态，并触发 `ConfigWidget` 的更新。框架会通知 `ConfigUpdater` 和其他小部件使用\
  \ `Config` 对象的最新值进行更新。\n\n```\nclass ConfiguredPage extends StatefulWidget {\n \
  \ ConfiguredPage({Key key, this.child}) : super(key: key);\n  final Widget child;\n\
  \  @override\n  _ConfiguredPageState createState() => _ConfiguredPageState();\n\
  }\nclass _ConfiguredPageState extends State {\n  Config _config = Config(color:\
  \ Colors.green, fontSize: 16);\n  @override\n  Widget build(BuildContext context)\
  \ {\n    return ConfigWidget(\n      config: _config,\n      child: Column(\n  \
  \      children: [\n          ConfigUpdater(\n            onColorChanged: (Color\
  \ color) {\n              setState(() {\n                _config = _config.copyWith(color:\
  \ color);\n              });\n            },\n            onFontSizeIncreased: ()\
  \ {\n              setState(() {\n                _config = _config.copyWith(fontSize:\
  \ _config.fontSize + 1.0);\n              });\n            },\n          ),\n  \
  \        Container(\n            decoration: BoxDecoration(border: Border.all()),\n\
  \            padding: EdgeInsets.all(8),\n            child: widget.child,\n   \
  \       ),\n        ],\n      ),\n    );\n  }\n}\n```\n\n在代码清单 10-8 中，`ConfigWidgetPage`\
  \ 小部件使用 `ConfiguredPage` 小部件来包装 `ConfiguredText` 和 `ConfiguredBox` 小部件。\n\n```\n\
  class ConfigWidgetPage extends StatelessWidget {\n  @override\n  Widget build(BuildContext\
  \ context) {\n    return Scaffold(\n      appBar: AppBar(\n        title: Text('Inherited\
  \ Widget'),\n      ),\n      body: ConfiguredPage(\n        child: Column(\n   \
  \       children: [\n            ConfiguredText(),\n            ConfiguredBox(),\n\
  \          ],\n        ),\n      ),\n    );\n  }\n}\n```\n\n## 10.3 使用继承模型管理状态\n\
  \n### 问题\n\n你需要根据变化的方面获取通知并重新构建 UI。\n\n### 解决方案\n\n创建你自己的 `InheritedModel` 子类。\n\
  \n\n\n### 讨论\n\n如果我们仔细看看食谱 10-2 中清单 10-5 里的 `ConfiguredText` 和 `ConfiguredBox` 组件，可以发现\
  \ `ConfiguredBox` 组件只依赖于 `Config` 对象的 `color` 属性。如果 `fontSize` 属性发生变化，`ConfiguredBox`\
  \ 组件无需重建。这些不必要的重建可能会导致性能问题，尤其是当组件很复杂时。\n\n`InheritedModel` 组件允许你将一个状态划分为多个方面。一个构建上下文可以注册，以便仅针对特定方面接收通知。当\
  \ `InheritedModel` 组件中的状态发生变化时，只有注册了匹配方面的依赖构建上下文才会收到通知。\n\n`InheritedModel` 类继承自\
  \ `InheritedWidget` 类。它有一个类型参数用于指定方面的类型。清单 10-9 中的 `ConfigModel` 类是 `Config` 对象的\
  \ `InheritedModel` 子类。方面的类型是 `String`。在实现 `InheritedModel` 类时，你仍然需要重写 `updateShouldNotify()`\
  \ 方法来确定是否应该通知依赖项。`updateShouldNotifyDependent()` 方法根据依赖项所依赖的方面集合来决定是否应该通知某个依赖项。`updateShouldNotifyDependent()`\
  \ 方法仅在 `updateShouldNotify()` 方法返回 `true` 时才会被调用。对于 `ConfigModel`，只定义了 “color” 和\
  \ “fontSize” 两个方面。如果依赖项依赖于 “color” 方面，那么只有当 `Config` 对象的 `color` 属性发生变化时才会收到通知。这对于\
  \ “fontSize” 方面和 `fontSize` 属性同样适用。\n\n静态方法 `of()` 有一个额外的 `aspect` 参数，用于指定构建上下文所依赖的方面。静态方法\
  \ `InheritedModel.inheritFrom()` 用于使构建上下文依赖于指定的方面。当 `aspect` 为 `null` 时，此方法与使用 `BuildContext.inheritFromWidgetOfExactType()`\
  \ 方法相同。\n\n```\nclass ConfigModel extends InheritedModel {\nconst ConfigModel({\n\
  Key key,\n@required this.config,\n@required Widget child,\n}) : super(key: key,\
  \ child: child);\nfinal Config config;\nstatic Config of(BuildContext context, String\
  \ aspect) {\nConfigModel configModel =\nInheritedModel.inheritFrom(context, aspect:\
  \ aspect);\nreturn configModel?.config ?? Config.fallback();\n}\n@override\nbool\
  \ updateShouldNotify(ConfigModel oldWidget) {\nreturn config != oldWidget.config;\n\
  }\n@override\nbool updateShouldNotifyDependent(\nConfigModel oldWidget, Set dependencies)\
  \ {\nreturn (config.color != oldWidget.config.color &&\ndependencies.contains('color'))\
  \ ||\n(config.fontSize != oldWidget.config.fontSize &&\ndependencies.contains('fontSize'));\n\
  }\n}\n清单 10-9\n作为 InheritedModel 的 ConfigModel\n```\n\n在清单 10-10 中，`ConfiguredModelText`\
  \ 组件使用 `null` 作为方面，因为它同时依赖于 “color” 和 “fontSize” 两个方面。`ConfiguredModelBox` 组件使用\
  \ `color` 作为方面。如果字体大小被更新，只有 `ConfiguredModelText` 组件会被重建。\n\n```\nclass ConfiguredModelText\
  \ extends StatelessWidget {\n@override\nWidget build(BuildContext context) {\nConfig\
  \ config = ConfigModel.of(context, null);\nreturn Text(\n'字体大小: ${config.fontSize}',\n\
  style: TextStyle(\ncolor: config.color,\nfontSize: config.fontSize,\n),\n);\n}\n\
  }\nclass ConfiguredModelBox extends StatelessWidget {\n@override\nWidget build(BuildContext\
  \ context) {\nConfig config = ConfigModel.of(context, 'color');\nreturn Container(\n\
  decoration: BoxDecoration(color: config.color),\nchild: Text('背景颜色: ${config.color}'),\n\
  );\n}\n}\n清单 10-10\n使用 ConfigModel 获取 Config 对象\n```\n\n## 10.4 使用继承通知器管理状态\n\n\
  ### 问题\n\n你希望依赖组件能够基于 `Listenable` 对象的通知重建。\n\n### 解决方案\n\n创建你自己的 `InheritedNotifier`\
  \ 组件子类。\n\n### 讨论\n\n`Listenable` 类通常用于管理监听器并通知客户端进行更新。你可以使用相同的模式通过 `InheritedNotifier`\
  \ 通知依赖项重建。`InheritedNotifier` 组件也继承自 `InheritedWidget` 类。在创建 `InheritedNotifier`\
  \ 组件时，你需要提供 `Listenable` 对象。当 `Listenable` 对象发送通知时，该 `InheritedNotifier` 组件的依赖项会收到通知并重建。\n\
  \n在清单 10-11 中，`ConfigNotifier` 使用 `ValueNotifier<Config>` 作为 `Listenable` 的类型。静态方法\
  \ `of()` 从 `ConfigNotifier` 对象中获取 `Config` 对象。\n\n```\nclass ConfigNotifier extends\
  \ InheritedNotifier> {\nConfigNotifier({\nKey key,\n@required notifier,\n@required\
  \ Widget child,\n}) : super(key: key, notifier: notifier, child: child);\nstatic\
  \ Config of(BuildContext context) {\nfinal ConfigNotifier configNotifier =\ncontext.inheritFromWidgetOfExactType(ConfigNotifier);\n\
  return configNotifier?.notifier?.value ?? Config.fallback();\n}\n}\n清单 10-11\n作为\
  \ InheritedNotifier 的 ConfigNotifier\n```\n\n要使用 `ConfigNotifier` 组件，你需要创建一个 `ValueNotifier<Config>`\
  \ 的新实例。要更新 `Config` 对象，你可以简单地将 `value` 属性设置为新值。`ValueNotifier` 对象会发送通知，从而通知依赖组件进行重建。\n\
  \n```\nclass ConfiguredNotifierPage extends StatelessWidget {\nConfiguredNotifierPage({Key\
  \ key, this.child}) : super(key: key);\nfinal Widget child;\nfinal ValueNotifier\
  \ _notifier =\nValueNotifier(Config(color: Colors.green, fontSize: 16));\n@override\n\
  Widget build(BuildContext context) {\nreturn ConfigNotifier(\nnotifier: _notifier,\n\
  child: Column(\nchildren: [\nConfigUpdater(\nonColorChanged: (Color color) {\n_notifier.value\
  \ = _notifier.value.copyWith(color: color);\n},\nonFontSizeIncreased: () {\nConfig\
  \ oldConfig = _notifier.value;\n_notifier.value =\noldConfig.copyWith(fontSize:\
  \ oldConfig.fontSize + 1.0);\n},\n),\nContainer(\ndecoration: BoxDecoration(border:\
  \ Border.all()),\npadding: EdgeInsets.all(8),\nchild: child,\n),\n],\n),\n);\n}\n\
  }\n清单 10-12\n使用 ConfigNotifier 的 ConfiguredNotifierPage\n```\n\n## 10.5 使用作用域模型管理状态\n\
  \n### 问题\n\n你想要一个简单的解决方案来处理模型变化。\n\n### 解决方案\n\n使用 `scoped_model` 包。\n\n\n\n###\
  \ 讨论\n\n在 Recipes 10-1、10-2、10-3 和 10-4 中，你已经看到使用`StatefulWidget`、`InheritedWidget`、`InheritedModel`和`InheritedNotifier`这些组件来管理状态。这些组件由\
  \ Flutter 框架提供。由于这些组件是底层 API，因此在复杂应用中用起来并不方便。`scoped_model`包（[`https://pub.dev/packages/scoped_model`](https://pub.dev/packages/scoped_model)）是一个库，可以让你轻松地将数据模型从父组件向下传递给它的后代组件。它建立在`InheritedWidget`之上，但提供了易于使用的\
  \ API。要使用这个包，你需要在`pubspec.yaml`文件的`dependencies`中添加`scoped_model: ¹.0.1`。我们将使用与\
  \ Recipe 10-2 相同的示例来演示`scoped_model`包的用法。\n\n清单 10-13 展示了使用`scoped_model`包的`Config`模型。`Config`类继承自`Model`类。它有私有字段来存储状态。`setColor()`和`increaseFontSize()`方法分别更新`_color`和`_fontSize`字段。这两个方法在内部使用`notifyListeners()`来通知后代组件进行重建。\n\
  \n```\nimport 'package:scoped_model/scoped_model.dart';\nclass Config extends Model\
  \ {\nColor _color = Colors.red;\ndouble _fontSize = 16.0;\nColor get color => _color;\n\
  double get fontSize => _fontSize;\nvoid setColor(Color color) {\n_color = color;\n\
  notifyListeners();\n}\nvoid increaseFontSize() {\n_fontSize += 1;\nnotifyListeners();\n\
  }\n}\nListing 10-13\nConfig model as scoped model\n```\n\n在清单 10-14 中，`ScopedModelText`组件展示了如何在后代组件中使用模型。`ScopedModelDescendant`组件用于获取最近的封闭模型对象。类型参数决定了要获取的模型对象。`builder`参数指定了用于构建组件的构建函数。该构建函数有三个参数。第一个参数的类型是`BuildContext`，这在构建函数中很常见。最后一个参数是模型对象。如果组件\
  \ UI 的某一部分不依赖于模型，并且不应在模型更改时重建，你可以将其指定为`ScopedModelDescendant`组件的`child`参数，并在构建函数的第二个参数中访问它。\n\
  \n```\nclass ScopedModelText extends StatelessWidget {\n@override\nWidget build(BuildContext\
  \ context) {\nreturn ScopedModelDescendant(\nbuilder: (BuildContext context, Widget\
  \ child, Config config) {\nreturn Text(\n'Font size: ${config.fontSize}',\nstyle:\
  \ TextStyle(\ncolor: config.color,\nfontSize: config.fontSize,\n),\n);\n},\n);\n\
  }\n}\nListing 10-14\nScopedModelText uses ScopedModelDescendant\n```\n\n在清单 10-15\
  \ 中，`ScopedModelUpdater`组件简单地使用`setColor()`和`increaseFontSize()`方法来更新状态。\n\n```\n\
  class ScopedModelUpdater extends StatelessWidget {\nstatic const List _colors =\
  \ [Colors.red, Colors.green, Colors.blue];\n@override\nWidget build(BuildContext\
  \ context) {\nreturn ScopedModelDescendant(\nbuilder: (BuildContext context, Widget\
  \ child, Config config) {\nreturn Column(\nchildren: [\nDropdownButton(\nvalue:\
  \ config.color,\nitems: _colors.map((Color color) {\nreturn DropdownMenuItem(\n\
  value: color,\nchild: Text(color.toString()),\n);\n}).toList(),\nonChanged: (Color\
  \ color) {\nconfig.setColor(color);\n},\n),\nRaisedButton(\nchild: Text('Increase\
  \ font size'),\nonPressed: () {\nconfig.increaseFontSize();\n},\n)\n],\n);\n},\n\
  );\n}\n}\nListing 10-15\nScopedModelUpdater to update Config object\n```\n\n清单 10-16\
  \ 中的`ScopedModel`组件是将`Model`和`ScopedModelDescendant`结合在一起的最后一部分。`model`参数指定了由`ScopedModel`对象管理的模型对象。`ScopedModel`对象下的所有`ScopedModelDescendant`组件都会获取到同一个模型对象。\n\
  \n```\nclass ScopedModelPage extends StatelessWidget {\n@override\nWidget build(BuildContext\
  \ context) {\nreturn Scaffold(\nappBar: AppBar(\ntitle: Text('Scoped Model'),\n\
  ),\nbody: ScopedModel(\nmodel: Config(),\nchild: Column(\nchildren: [\nScopedModelUpdater(),\n\
  ScopedModelText()\n],\n),\n),\n);\n}\n}\nListing 10-16\nScopedModelPage uses ScopedModel\n\
  ```\n\n你也可以使用静态方法`ScopedModel.of()`来获取`ScopedModel`对象，然后通过其`model`属性获取模型对象。\n\n\
  ## 10.6 使用 Bloc 管理状态\n\n### 问题\n\n你想使用 Bloc 模式来管理状态。\n\n### 解决方案\n\n使用`bloc`和`flutter_bloc`包。\n\
  \n\n\n### 讨论\n\nBloc（业务逻辑组件）是一种架构模式，用于将表现层与业务逻辑分离。Bloc 被设计为简单、强大且易于测试。让我们从 Bloc\
  \ 的核心概念开始。\n\n`State`（状态）表示应用程序状态的一部分。当状态发生变化时，会通知 UI 组件根据最新状态进行重建。每个应用程序都有自己的方式来定义状态。通常，你会使用\
  \ Dart 类来描述状态。\n\n`Event`（事件）是状态变化的来源。事件可以由用户交互或后台任务生成。例如，按下按钮可能会生成一个描述预期操作的事件。当\
  \ HTTP 请求的响应就绪时，也可以生成一个包含响应体的事件。事件通常使用 Dart 类来描述。事件可能还带有它们的载荷。\n\n当一个事件被派发时，处理这些事件可能会导致当前状态转换到新状态。然后\
  \ UI 组件会被通知使用新状态进行重建。一个事件转换包括当前状态、事件和下一个状态。如果所有状态转换都被记录，我们可以轻松追踪所有的用户交互和状态变化。我们还可以实现时间旅行调试。\n\
  \n现在我们可以给出 Bloc 的定义。一个 Bloc 组件将事件流转换为状态流。一个 Bloc 有一个初始状态，即在接收到任何事件之前的状态。对于每个事件，Bloc\
  \ 都有一个`mapEventToState()`函数，该函数接收一个事件并返回一个状态流，供表现层使用。Bloc 还有一个`dispatch()`方法来向它派发事件。\n\
  \n在本教程中，我们将使用 GitHub Jobs API（[`https://jobs.github.com/api`](https://jobs.github.com/api)）来获取\
  \ GitHub 上的职位列表。用户可以输入关键词进行搜索并查看结果。为了实现这一点，我们将使用`http`包（[`https://pub.dev/packages/http`](https://pub.dev/packages/http)）。将这个包添加到你的`pubspec.yaml`文件中。\n\
  \n让我们从状态开始。代码清单 10-17 展示了不同状态的类。`JobsState`是所有状态类的抽象基类。`JobsState`类继承自`equatable`包中的`Equatable`类。`Equatable`类用于提供`==`运算符和`hashCode`属性的实现。`JobsEmpty`是初始状态。`JobsLoading`表示职位列表数据仍在加载中。`JobsLoaded`表示职位列表数据已加载。`JobsLoaded`事件的载荷类型是`List<Job>`。`JobsError`表示在获取数据时发生了错误。\n\
  \n```\nimport 'package:http/http.dart' as http;\nabstract class JobsState extends\
  \ Equatable {\n  JobsState([List props = const []]) : super(props);\n}\nclass JobsEmpty\
  \ extends JobsState {}\nclass GetJobsEvent extends JobsEvent {\n  GetJobsEvent({@required\
  \ this.keyword})\n      : assert(keyword != null),\n        super([keyword]);\n\
  \  final String keyword;\n}\nclass GitHubJobsClient {\n  Future> getJobs(keyword)\
  \ async {\n    final response = await http.get('https://jobs.github.com/positions.json?description=${keyword}');\n\
  \    if (response.statusCode != 200) {\n      throw new Exception(\"Unable to fetch\
  \ data\");\n    } else {\n      var result = new List();\n      final rawResult\
  \ = json.decode(response.body);\n      for (final jsonJob in rawResult) {\n    \
  \    result.add(Job.fromJson(jsonJob));\n      }\n    }\n  }\n}\nclass JobsLoading\
  \ extends JobsState {}\nclass JobsLoaded extends JobsState {\n  JobsLoaded({@required\
  \ this.jobs})\n      : assert(jobs != null),\n        super([jobs]);\n  final List\
  \ jobs;\n}\nclass JobsError extends JobsState {}\nListing 10-17\nBloc states\n```\n\
  \n代码清单 10-18 展示了事件。`JobsEvent`是事件类的抽象基类。`GetJobsEvent`类表示获取职位数据的事件。\n\n```\nabstract\
  \ class JobsEvent extends Equatable {\n  JobsEvent([List props = const []]) : super(props);\n\
  }\nclass GetJobsEvent extends JobsEvent {\n  GetJobsEvent({@required this.keyword})\n\
  \      : assert(keyword != null),\n        super([keyword]);\n  final String keyword;\n\
  }\nListing 10-18\nBloc events\n```\n\n代码清单 10-19 展示了 Bloc。`JobsBloc`类继承自`Bloc<JobsEvent,\
  \ JobsState>`类。`Bloc`的类型参数是事件和状态类。`JobsEmpty`是初始状态。在`mapEventToState()`方法中，如果事件是`GetJobsEvent`，则首先向流中`yield`一个`JobsLoading`状态。然后使用`GitHubJobsClient`对象来获取数据。如果数据获取成功，则`yield`一个包含已加载数据的`JobsLoaded`状态。否则，`yield`一个`JobsError`状态。\n\
  \n```\nclass JobsBloc extends Bloc {\n  JobsBloc({@required this.jobsClient}) :\
  \ assert(jobsClient != null);\n  final GitHubJobsClient jobsClient;\n  @override\n\
  \  JobsState get initialState => JobsEmpty();\n  @override\n  Stream mapEventToState(JobsEvent\
  \ event) async* {\n    if (event is GetJobsEvent) {\n      yield JobsLoading();\n\
  \      try {\n        List jobs = await jobsClient.getJobs(event.keyword);\n   \
  \     yield JobsLoaded(jobs: jobs);\n      } catch (e) {\n        yield JobsError();\n\
  \      }\n    }\n  }\n}\nListing 10-19\nBloc\n```\n\n代码清单 10-20 中的`GitHubJobs`类是使用代码清单\
  \ 10-19 中`JobsBloc`类的组件。`JobsBloc`对象在`initState()`方法中创建，并在`dispose()`方法中释放。在`KeywordInput`组件中，当用户在文本字段中输入关键词并按下搜索按钮时，会向`JobsBloc`对象派发一个`GetJobsEvent`。在`JobsView`组件中，使用`BlocBuilder`组件根据\
  \ Bloc 中的状态构建 UI。这里我们检查`JobsState`的实际类型并返回不同的组件。\n\n```\nclass GitHubJobs extends\
  \ StatefulWidget {\n  GitHubJobs({Key key, @required this.jobsClient})\n      :\
  \ assert(jobsClient != null),\n        super(key: key);\n  final GitHubJobsClient\
  \ jobsClient;\n  @override\n  _GitHubJobsState createState() => _GitHubJobsState();\n\
  }\nclass _GitHubJobsState extends State {\n  JobsBloc _jobsBloc;\n  @override\n\
  \  void initState() {\n    super.initState();\n    _jobsBloc = JobsBloc(jobsClient:\
  \ widget.jobsClient);\n  }\n  @override\n  Widget build(BuildContext context) {\n\
  \    return Column(\n      children: [\n        Padding(\n          padding: const\
  \ EdgeInsets.all(8.0),\n          child: KeywordInput(\n            jobsBloc: _jobsBloc,\n\
  \          ),\n        ),\n        Expanded(\n          child: JobsView(\n     \
  \       jobsBloc: _jobsBloc,\n          ),\n        ),\n      ],\n    );\n  }\n\
  \  @override\n  void dispose() {\n    _jobsBloc.dispose();\n    super.dispose();\n\
  \  }\n}\nclass KeywordInput extends StatefulWidget {\n  KeywordInput({this.jobsBloc});\n\
  \  final JobsBloc jobsBloc;\n  @override\n  _KeywordInputState createState() =>\
