    Listing [5-9](#479501_1_En_5_Chapter.xhtml#PC9). Text in an image shows the `BoxFit`
    value used in this `ImageBox` widget.


    ![../images/479501_1_En_5_Chapter/479501_1_En_5_Fig1_HTML.jpg](images/479501_1_En_5_Chapter/479501_1_En_5_Fig1_HTML.jpg)


    **Figure 5-1** Different values of BoxFit


    ## 5.10 Rotating Widgets


    ### Problem


    You want to rotate a widget.


    ### Solution


    Use `RotatedBox`.


    ### Discussion


    `RotatedBox` widget rotates its child before layout. Rotation is specified by
    an `int` type of clockwise quarter turns with `quarterTurns` parameter. The value
    1 of `quarterTurns` parameter means rotating 90 degrees clockwise.


    In Listing [5-10](#479501_1_En_5_Chapter.xhtml#PC10), the `Text` widget is rotated
    one quarter turn.


    ```

    RotatedBox(

    quarterTurns: 1,

    child: Text(

    ''Hello World'',

    textScaleFactor: 2,

    ),

    )

    Listing 5-10

    Example of RotatedWidget

    ```


    ## 5.11 Adding Padding when Displaying Widgets


    ### Problem


    You want to add padding around a widget.


    ### Solution


    Use `Padding`.


    ### Discussion


    `Padding` widget creates empty space around its child. The layout constraints
    passed to its child are the widget’s constraints after shrinking by the padding,
    which causes the child to lay out at a smaller size. The padding is specified
    in the required `padding` parameter of type `EdgeInsetsGeometry`.


    Similar with `AlignmentGeometry`, `EdgeInsetsGeometry` has two subclasses `EdgeInsets`
    and `EdgeInsetsDirectional`. `EdgeInsets` class expresses offsets in visual coordinates.
    Offsets values are specified for `left`, `right`, `top`, and `bottom` edges. Table
    [5-5](#479501_1_En_5_Chapter.xhtml#Tab5) shows constructors of `EdgeInsets` class.


    **Table 5-5** EdgeInsets constructors


    | Name | Description |

    | --- | --- |

    | `EdgeInsets.all()` | All the offsets have the given value. |

    | `EdgeInsets.fromLTRB()` | Specify values of offsets for left, top, right, and
    bottom edges. |

    | `EdgeInsets.only()` | It has named parameters left, top, right, and bottom with
    default value of 0.0. |

    | `EdgeInsets.symmetric()` | It has named parameters vertical and horizontal to
    create symmetrical offsets. |


    To consider text direction, `EdgeInsetsDirectional` class should be used instead
    of `EdgeInsets`. `EdgeInsetsDirectional` class uses `start` and `end` instead
    of `left` and `right`. It has `EdgeInsetsDirectional.fromSTEB()` constructor to
    create insets from offsets of `start`, `top`, `end`, and `bottom`. The `EdgeInsetsDirectional.only()`
    constructor is similar with `EdgeInsets.only()`.


    Listing [5-11](#479501_1_En_5_Chapter.xhtml#PC11) shows an example of `Padding`
    widget.


    ```

    Padding(

    padding: EdgeInsets.all(20),

    child: Image.network(''https://picsum.photos/200''),

    )

    Listing 5-11

    Example of Padding

    ```


