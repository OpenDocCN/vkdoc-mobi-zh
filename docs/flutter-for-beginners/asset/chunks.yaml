    ## 8.12 阻止路由被弹出


    ### 问题


    你想阻止路由从导航器中被弹出。


    ### 解决方案


    将 `WillPopCallback` 与 `ModalRoute` 对象一起使用。


    ### 讨论


    当一个路由被推入导航器后，该路由可以通过 `Scaffold` 中的返回按钮或 Android 系统中的返回按钮被弹出。有时你可能希望阻止该路由被弹出。例如，如果页面中有未保存的更改，你可能想先显示一个警报对话框来请求确认。当使用
    `Navigator.maybePop()` 方法而不是 `Navigator.pop()` 方法时，你有机会决定是否应该执行弹出路由的请求。


    `ModalRoute` 类有一个 `addScopedWillPopCallback()` 方法，用于添加一个 `WillPopCallback 函数，该函数决定路由是否应该被弹出。`WillPopCallback`
    是一个函数类型 `Future<bool> ()` 的别名。如果返回的 `Future<bool>` 对象解析为 `true`，则路由可以被弹出。否则，路由不能被弹出。你可以向一个
    `ModalRoute` 对象添加多个 `WillPopCallback` 函数。如果其中任何一个 `WillPopCallback` 函数否决了请求，路由将不会被弹出。


    在代码清单 8-20 中，将一个 `WillPopCallback` 函数添加到了当前路由。`WillPopCallback` 函数的返回值是由 `showDialog()`
    返回的 `Future<bool>` 对象。


    ```

    class VetoPopPage extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    ModalRoute.of(context).addScopedWillPopCallback(() {

    return showDialog(

    context: context,

    builder: (BuildContext context) {

    return AlertDialog(

    title: Text(''Exit?''),

    actions: [

    FlatButton(

    child: Text(''Yes''),

    onPressed: () {

    Navigator.pop(context, true);

    },

    ),

    FlatButton(

    child: Text(''No''),

    onPressed: () {

    Navigator.pop(context, false);

    },

    ),

    ],

    },

    );

    });

    return Scaffold(

    appBar: AppBar(

    title: Text(''Veto Pop''),

    ),

    body: Container(),

    );

    }

    }

    ```


