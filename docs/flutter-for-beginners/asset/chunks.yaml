    },

    ).then((value) {

    print(value);

    }).catchError((error) {

    print(''error: $error'');

    });

    Listing 9-1

    Use then() and catchError() methods to handle result

    ```


    Return values of then() and catchError() methods are also `Future` objects . Given
    a `Future` object A, the result of invoking `A.then(func)` is another `Future`
    object B. If the `func` callback runs successfully, the `Future` B will complete
    with the return value of invoking `func` function. Otherwise, Future B will complete
    with the error thrown when invoking `func` function. Invoking `B.catchError(errorHandler)`
    returns a new `Future` object C. The error handler can handle errors thrown in
    `Future` B, which may be thrown in Future A itself or in its value handler . By
    using `then()` and `catchError()` methods, `Future` objects form a chain of handling
    asynchronous computations.


    In Listing [9-2](#479501_1_En_9_Chapter.xhtml#PC2), multiple `then()` methods
    are chained together to process the result in sequence .


    ```

    Future.value(1)

    .then((value) => value + 1)

    .then((value) => value * 10)

    .then((value) => value + 2)

    .then((value) => print(value));

    Listing 9-2

    Chained then() methods

    ```


    If you want to call functions when a future completes, you can use `whenComplete()`
    method. Functions added using `whenComplete()` are called when this future completes,
    no matter it completes with a value or an error. The `whenComplete()` method is
    equivalent of a `finally` block in other programming languages . The chain of
    `then().catchError().whenComplete()` is equivalent of “try-catch-finally”.


    Listing [9-3](#479501_1_En_9_Chapter.xhtml#PC3) shows an example of using `whenComplete()`
    method.


    ```

    Future.value(1).then((value) {

    print(value);

    }).whenComplete(() {

    print(''complete'');

    });

    Listing 9-3

    Using whenComplete()

    ```


    It’s possible for the computation of `Future` object to take a long time to complete.
    You can use `timeout()` method to set the time limit on the computation. When
    invoking `timeout()` method, you need to provide a `Duration` object as the time
    limit and an optional `onTimeout` function to provide the value when a timeout
    happens. The return value of `timeout()` method is a new `Future` object. If the
    current `Future` object doesn’t complete before the time limit, the result of
    calling `onTimeout` function is the result of the new `Future` object. If no `onTimeout`
    function is provided, the new `Future` object will complete with a `TimeoutException`
    when current future is timed out.


    In Listing [9-4](#479501_1_En_9_Chapter.xhtml#PC4), the `Future` object will complete
    in 5 seconds with value `1`, but the time limit is set to 2 seconds. The value
    `10` returned by `onTimeout` function will be used instead.


    ```

    Future.delayed(Duration(seconds: 5), () => 1)

    .timeout(

    Duration(seconds: 2),

    onTimeout: () => 10,

    )

    .then((value) => print(value));

    Listing 9-4

    Use timeout() method

    ```


    ## 9.2 Using async and await to Work with Futures


    ### Problem


    You want to work with `Future` objects like they are synchronous.


    ### Solution


    Use `async` and `await` .


    ### Discussion


    `Future` objects represent asynchronous computations. The usual way to work with
    `Future` objects is registering callbacks to handle results. This callback-based
    style may create a barrier for developers that are used to synchronous operations.
    Using `async` and `await` is a syntax sugar in Dart to make working with `Future`
    objects like normal synchronous operations.


    Given a `Future` object, `await` can wait for its completion and return its value.
    The code after the `await` can use the returned value directly, just like it is
    the result of a synchronous call. When `await` is used, its enclosing function
    must be marked as `async`. This means the function returns a `Future` object.


    In Listing [9-5](#479501_1_En_9_Chapter.xhtml#PC5), the return value of `getValue()`
    function is a `Future` object. In `calculate()` function , `await` is used to
    get the return value of `getValue()` function and assign to `value` variable.
    Since `await` is used, `calculate()` function is marked as `async`.


    ```

    Future getValue() {

    return Future.value(1);

    }

    Future calculate() async {

    int value = await getValue();

    return value * 10;

    }

    Listing 9-5

    Use async/await

    ```


    When `await` is used to handle `Future` objects, you can use try-catch-finally
    to handle errors thrown in `Future` objects. This allows `Future` objects to be
    used just like normal synchronous operations. Listing [9-6](#479501_1_En_9_Chapter.xhtml#PC6)
    shows an example of using try-catch-finally and `await`/`async` together.


    ```

    Future getErrorValue() {

    return Future.error(''invalid value'');

    }

    Future calculateWithError() async {

    try {

    return await getErrorValue();

    } catch (e) {

    print(e);

    return 1;

    } finally {

    print(''done'');

    }

    }

    Listing 9-6

    Use try-catch-finally and await/async

    ```


