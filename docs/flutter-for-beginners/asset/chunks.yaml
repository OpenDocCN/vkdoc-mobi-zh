    ## 6.6 格式化文本


    ### 问题


    您想要格式化文本。


    ### 解决方案


    结合 `EditableText` 使用 `TextInputFormatter`。


    ### 讨论


    当用户在文本输入中键入时，您可能希望验证和格式化输入的文本。一个常见的要求是移除黑名单中的字符。这可以通过将 `TextInputFormatter` 实例列表作为
    `TextField` 和 `CupertinoTextField` 的 `inputFormatters` 参数提供来实现。


    `TextInputFormatter` 是一个抽象类，只有 `formatEditUpdate(TextEditingValue oldValue, TextEditingValue
    newValue)` 方法需要实现。`oldValue` 和 `newValue` 参数分别代表之前的文本和新文本。返回值是另一个代表格式化文本的 `TextEditingValue`
    实例。`TextInputFormatter` 实例可以链式使用。当链式使用时，调用 `formatEditUpdate` 方法的 `oldValue` 始终是之前的文本，但
    `newValue` 的值是链中前一个 `TextInputFormatter` 实例调用 `formatEditUpdate` 方法的返回值。


    表 6-5 中显示了 `TextInputFormatter` 已有的三个内置实现类。这些类用于 `TextField` 和 `CupertinoTextField`
    的实现。例如，当 `maxLines` 参数值为 1 时，`BlacklistingTextInputFormatter.singleLineFormatter`
    会被添加到 `TextInputFormatter` 实例列表中，以过滤掉“\n”字符。


    Table 6-5


    TextInputFormatter 的实现


    | 名称 | 描述 |

    | --- | --- |

    | `LengthLimitingTextInputFormatter` | 限制可以输入的字符数量。 |

    | `BlacklistingTextInputFormatter` | 用给定的字符串替换与正则表达式模式匹配的字符。 |

    | `WhitelistingTextInputFormatter` | 只允许与给定正则表达式模式匹配的字符。 |


    除了声明新的 `TextInputFormatter` 子类之外，更简单的方法是使用 `TextInputFormatter.withFunction()`
    方法，并传入一个与 `formatEditUpdate()` 方法类型匹配的函数。


    在清单 6-10 中，输入文本被格式化为大写。


    ```

    TextField(

    inputFormatters: [

    TextInputFormatter.withFunction((oldValue, newValue) {

    return newValue.copyWith(text: newValue.text?.toUpperCase());

    }),

    ],

    )

    Listing 6-10

    格式化文本

    ```


    ## 6.7 选择单个值


    ### 问题


    您想要从值列表中选择单个值。


    ### 解决方案


    使用一组 `Radio` 小部件。


    ### 讨论


    单选按钮通常用于需要单选场景。在一个组中，只能选择一个单选按钮。`Radio` 类有一个类型参数 `T`，代表值的类型。创建 `Radio` 实例时，您需要提供必需的参数，包括
    `value`、`groupValue` 和 `onChanged`。`Radio` 小部件不维护任何状态。其外观完全由 `value` 和 `groupValue`
    参数决定。当单选按钮组的选择发生变化时，会使用所选值调用 `onChanged` 监听器。表 6-6 显示了 `Radio` 构造函数的命名参数。


    Table 6-6


    Radio 的命名参数


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `value` | `T` | 此单选按钮的值。 |

    | `groupValue` | `T` | 此组单选按钮的选定值。`groupValue` 对应的单选按钮处于选中状态。 |

    | `onChanged` | `ValueChanged<T>` | 选择变化时的监听器函数。 |

    | `activeColor` | `Color` | 此单选按钮被选中时的颜色。 |


    在清单 6-11 中，`Fruit.allFruits` 变量是所有 `Fruit` 实例的列表。`_selectedFruit` 是当前选定的 `Fruit`
    实例。对于每个 `Fruit` 实例，都会创建一个 `Radio<Fruit>` 小部件，其 `groupValue` 设置为 `_selectedFruit`。


