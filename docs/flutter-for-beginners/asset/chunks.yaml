    Flutter 有很多用于控制布局不同方面的组件。例如，`SizedBox` 组件控制尺寸，而 `Align` 组件控制对齐方式。如果你想在同一个组件上控制不同的布局方面，可以通过嵌套地包裹这些组件来实现。实际上，Flutter
    提供了一个 `Container` 组件，使得定义不同的布局方面更加容易。


