    和 `activeColor` 的含义与 `Radio` 构造函数相同；`title`、`subtitle`、`isThreeLine`、`dense`、`secondary`、`selected`
    和 `controlAffinity` 的含义与 `CheckboxListTile` 构造函数相同。清单 7-5 展示了使用 `RadioListTile`
    的示例。


