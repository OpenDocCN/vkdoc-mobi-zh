    ## 10.9 Summary


    This chapter discusses different state management solutions for Flutter apps.
    In these solutions, `StatefulWidget`, `InheritedWidget`, `InheritedModel`, and
    `InheritedNotifier` widgets are provided by Flutter framework. Scoped model, Bloc,
    Redux, and Mobx libraries are third-party solutions. You are free to choose whatever
    solution that suits best for your requirement. In the next chapter, we’ll discuss
    animations in Flutter.


    # 11. Animations


    Animations play an important role in mobile apps to provide visual feedback for
    end users. This chapter covers recipes related to animations in Flutter.


    ## 11.1 Creating Simple Animations


    ### Problem


    You want to create simple animations.


    ### Solution


    Use `AnimationController` class to create simple animations.'
