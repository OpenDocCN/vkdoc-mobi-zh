    要使用 Material Design 对话框，你需要创建对话框小部件并显示它们。`Dialog` 类及其子类 `SimpleDialog` 和 `AlertDialog`
    可用于创建对话框。


    `SimpleDialog` 小部件向用户提供多个选项。选项通过 `SimpleDialogOption` 类表示。一个 `SimpleDialogOption`
    小部件可以拥有一个子小部件和一个 `onPressed` 回调。创建 `SimpleDialog` 时，你可以提供一个子列表和一个可选标题。`AlertDialog`
    小部件向用户呈现内容和一个操作列表。`AlertDialog` 用于通知用户或请求确认。


    要显示对话框，应使用 `showDialog()` 函数。调用此函数会将对话框路由推送到导航器中。对话框使用 `Navigator.pop()` 方法关闭。`showDialog()`
    函数使用一个 `WidgetBuilder` 函数来构建对话框内容。`showDialog()` 函数的返回值是一个 `Future<T>` 对象，它实际上是
    `Navigator.push()` 方法的返回值。


    在代码清单 8-10 中，按下按钮会显示一个带有两个选项的简单对话框。


    ```

    RaisedButton(

    child: Text(''显示 SimpleDialog''),

    onPressed: () async {

    String result = await showDialog(

    context: context,

    builder: (BuildContext context) {

    return SimpleDialog(

    title: Text(''选择颜色''),

    children: [

    SimpleDialogOption(

    child: Text(''红色''),

    onPressed: () {

    Navigator.pop(context, ''红色'');

    },

    ),

    SimpleDialogOption(

    child: Text(''绿色''),

    onPressed: () {

    Navigator.pop(context, ''绿色'');

    },

    ),

    ],

    );

    });

    print(result);

    },

    );

    代码清单 8-10

    显示简单对话框

    ```


