- fmt: "### Discussion\n\nFlutter SDK supports Linux platform. However, given that\
    \ there are many different Linux distributions available, the actual steps to\
    \ get Flutter SDK installed may be slightly different. This recipe is based on\
    \ installing Flutter SDK on Ubuntu 18.04 LTS.\n\nFlutter SDK requires several\
    \ command-line tools to be available in the local environment, including `bash`,\
    \ `mkdir`, `rm`, `git`, `curl`, `unzip`, and `which`. For most Linux distributions,\
    \ the commands `bash`, `mkdir`, `rm`, `unzip`, and `which` should already be included\
    \ by default. The easiest way to verify that is to open a terminal window and\
    \ type these commands to see the output. You’ll see “command not found” error\
    \ if a command is not installed. `git` and `curl` are unlikely to be included\
    \ by default. Most Linux distributions provide built-in package managers to install\
    \ these tools. For Ubuntu, you can use `apt-get`; see the following command.\n\
    \n```\n$ sudo apt-get update\n$ sudo apt-get install -y curl git\n```\n\nAfter\
    \ the installation finishes successfully, you can type commands `curl` and `git`\
    \ to verify.\n\nNow you can download the Flutter SDK zip bundles from the official\
    \ web site (`https://flutter.dev/docs/get-started/install/linux`). Extract the\
    \ downloaded zip file to the desired location on the local machine. Open a terminal\
    \ window, navigate to the directory of extracted Flutter SDK, and run the following\
    \ command to verify the installation.\n\n```\n$ bin/flutter --version\n```\n\n\
    It’s recommended to add the `bin` directory of Flutter SDK to the `PATH` environment\
    \ variable, so the `flutter` command can be run in any terminal session. For Ubuntu,\
    \ you can edit the file `~/.profile`.\n\n```\n$ nano ~/.profile\n```\n\nAdd the\
    \ following line to this file and save.\n\n```\nexport PATH=\"/bin:$PATH\"\n```\n\
    \nIn the current terminal window, you need to run `source ~/.profile` for the\
    \ change to take effect. Or you can simply create a new terminal window. Type\
    \ `flutter --version` in any terminal window to verify. You’ll see the same output\
    \ as Figure [1-2](#479501_1_En_1_Chapter.xhtml#Fig2).\n\nOnly Android platform\
    \ is supported on Linux. Continue the setup following Recipe 1-7.\n\n## 1.3 Installing\
    \ Flutter SDK on macOS\n\n### Problem\n\nYou have a macOS machine, and you want\
    \ to start Flutter development on this machine.\n\n### Solution\n\nInstall Flutter\
    \ SDK and set up Android and iOS platforms on the macOS machine.\n\n### Discussion\n\
    \nFor macOS, Flutter SDK requires several command-line tools to be available in\
    \ the local environment. These tools are `bash`, `mkdir`, `rm`, `git`, `curl`,\
    \ `unzip`, and `which`. macOS should already have these tools as part of the system.\
    \ You can simply type these commands in the terminal to verify. The easiest way\
    \ to install missing tools is to use Homebrew (`https://brew.sh/`). Homebrew is\
    \ also important when setting up the iOS development environment. Use `brew install`\
    \ to install tools, for example, `brew install git` to install Git.\n\nAfter installing\
    \ required tools, we can download the Flutter SDK zip bundle from the official\
    \ web site (`https://flutter.dev/docs/get-started/install/macos`). Extract the\
    \ downloaded zip file to the desired location on the local machine. The `flutter`\
    \ command is located under the `bin` directory of the extracted location.\n\n\
    To run `flutter` command in any terminal session, the `PATH` environment variable\
    \ should be updated to include the `bin` directory of the Flutter SDK. This is\
    \ typically done by updating the profile of the shell. For the default bash, this\
    \ file is `~/.bash_profile`. For zsh, this file is `~/.zshrc`. Modify this file\
    \ to include the following line.\n\n```\nexport PATH=/bin:$PATH\n```\n\nTo make\
    \ the current terminal window use the updated `PATH`, you need to run `source\
    \ ~/.bash_profile`. You can also start a new terminal window which will automatically\
    \ use the updated value of `PATH`.\n\nRun `flutter --version` in any terminal\
    \ window to verify the installation. You’ll see the same output as Figure [1-2](#479501_1_En_1_Chapter.xhtml#Fig2).\n\
    \nBoth Android and iOS platforms are supported on macOS. Continue the setup following\
    \ Recipes 1-4 and 1-7.\n\n## 1.4 Setting Up iOS Platform\n\n### Problem\n\nYou\
    \ want to develop Flutter apps for iOS platform.\n\n### Solution\n\nSet up iOS\
    \ platform for Flutter SDK on your Mac.\n\n### Discussion\n\nTo develop Flutter\
    \ apps for iOS, you need to have a Mac with at least Xcode 9.0. To set up the\
    \ iOS platform, you need to go through the following steps:\n\n![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig3_HTML.jpg](images/479501_1_En_1_Chapter/479501_1_En_1_Fig3_HTML.jpg)\
    \  \nFigure 1-3: Output of `flutter doctor`\n\n1.  Install Xcode (`https://developer.apple.com/xcode/`)\
    \ from App Store.\n\n2.  Verify the path of the Xcode command-line tools. Run\
    \ the following command to show the current path to the command-line tools. Usually\
    \ you should see output like `/Applications/Xcode.app/Contents/Developer`.\n\n\
    \    ```\n    $ xcode-select -p\n    ```\n\n    If the path shown in the output\
    \ is not the one you want, for example, you have different versions of Xcode command-line\
    \ tools installed, use `xcode-select -s` to switch to a different path. If you\
    \ don’t have the command-line tools installed, use `xcode-select --install` to\
    \ open the installation dialog.\n\n3.  You need to open Xcode once to accept its\
    \ license agreement. Or you can choose to run the command `sudo xcodebuild -license`\
    \ to view and accept it.\n\n4.  Flutter SDK requires other tools for iOS platform,\
    \ including `libimobiledevice`, `usbmuxd`, `ideviceinstaller`, `ios-deploy`, and\
    \ CocoaPods (`https://cocoapods.org/`). All these tools can be installed using\
    \ Homebrew. If you run the command `flutter doctor`, it shows the commands to\
    \ install these tools using Homebrew. Simply run these commands and use `flutter\
    \ doctor` to check again. When you see the green tick of “iOS toolchain,” the\
    \ iOS platform is set up successfully for Flutter SDK to use; see Figure [1-3](#479501_1_En_1_Chapter.xhtml#Fig3)\
    \ for a sample output.\n\n## 1.5 Setting Up iOS Simulators\n\n### Problem\n\n\
    You need a quick way to test Flutter apps on iOS platform.\n\n### Solution\n\n\
    Set up the iOS simulator.\n\n### Discussion\n\nXcode provides simulators for different\
    \ iOS versions. You can download additional simulators using the tab Components\
    \ in Xcode ➤ Preferences. To open the simulator, run the following command.\n\n\
    ```\n$ open -a Simulator\n```\n\nWhen the simulator is opened, you can switch\
    \ the combination of different devices and iOS versions using the menu **Hardware**\
    \ ➤ **Device**.\n\nAfter the simulator is started, running `flutter devices` should\
    \ show the simulator.\n\n## 1.6 Setting Up iOS Devices\n\n### Problem\n\nYou have\
    \ finished the testing of your Flutter apps on iOS simulator, and you want to\
    \ test them on real iOS devices.\n\n### Solution\n\nDeploy Flutter apps to iOS\
    \ devices."
