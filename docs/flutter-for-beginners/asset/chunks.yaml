    ## 6.12 使用 Chips


    ### 问题


    你想要使用紧凑的替代方案来表示不同类型的实体。


    ### 解决方案


    使用不同类型的 `Chips`。


    ### 讨论


    当空间有限时，像按钮、单选按钮和复选框这样的传统组件可能不适合。在这种情况下，可以使用 Material Design 中的 Chips 来表示相同的语义，但占用更少的空间。


    `Chip` 组件是通用的 chip 实现，它有一个必需的 `label` 和一个可选的 `avatar`。当设置一个非空的 `onDeleted` 回调时，它还可以包含一个删除按钮。


    `InputChip` 组件比 `Chip` 组件更强大。`InputChip` 组件可以通过设置 `onSelected` 回调变为可选中的，通过设置 `onPressed`
    回调变为可点击的。但是，你不能同时为 `onSelected` 和 `onPressed` 回调设置非空值。当使用 `onSelected` 时，`InputChip`
    组件的行为类似于复选框。你可以使用 `selected` 参数来设置状态。当使用 `onPressed` 时，`InputChip` 组件的行为类似于按钮。


    `ChoiceChip` 组件的行为类似于单选按钮，它使用 `selected` 参数设置状态，并使用 `onSelected` 回调通知状态变化。但是，`ChoiceChip`
    组件没有类似于 `Radio` 组件中 `groupValue` 的参数，因此你必须手动设置 `selected` 状态。


    `FilterChip` 组件的行为类似于复选框。`FilterChip` 构造函数的参数与 `ChoiceChip` 构造函数相同。


    `ActionChip` 组件的行为类似于带有 `onPressed` 参数的按钮。动作 chip 和按钮之间的区别在于，动作 chip 不能通过将 `onPressed`
    参数设置为 null 来禁用。如果动作 chip 的动作不适用，则应将其移除。此行为与使用 chip 减少空间的目标一致。


    事实上，所有这些 chip 组件都通过只使用 `RawChip` 构造函数支持的部分参数来包装 `RawChip`。


    在代码清单 6-17 中，使用了 `ChoiceChip` 组件来实现单选。


    ```

