    ## 5.15 实现 Flex 框布局


    ### 问题


    你有多个组件需要布局，并且希望它们能够占据额外的空间。


    ### 解决方案


    使用 `Flex`、`Column`、`Row`、`Flexible` 和 `Expanded`。


    ### 讨论


    要使用弹性框模型布局多个组件，你可以使用 Flutter 提供的一组组件，包括 `Flex`、`Column`、`Row`、`Flexible`、`Expanded`
    和 `Spacer`。实际上，只需理解 `Flex` 和 `Flexible` 组件即可。`Flex` 组件用作布局容器，而 `Flexible` 组件用于包裹容器内的子组件。`Flex`
    组件将其子组件显示为一维数组。它支持在水平和垂直两个方向上布局子组件。`Row` 和 `Column` 是 `Flex` 的子类，它们分别只在水平方向和垂直方向放置子组件。`Flex`
    容器中的 `Flexible` 组件可以控制子组件如何伸缩以占据额外空间。`Flex` 组件的子组件可以是弹性的，也可以不是。如果你想让一个子组件具有弹性，只需将其包裹在
    `Flexible` 组件中即可。


    与 CSS 弹性框布局类似，`Flex` 组件使用两个轴进行布局。子组件沿其排列的轴称为*主轴*。另一个轴称为*交叉轴*。主轴通过类型为 `Axis` 的
    `direction` 参数配置。如果值是 `Axis.horizontal`，则主轴为水平轴，而交叉轴为垂直轴。如果值是 `Axis.vertical`，则主轴为垂直轴，而交叉轴为水平轴。`Row`
    组件始终使用水平轴作为主轴，`Column` 组件始终使用垂直轴作为主轴。如果主轴已知，则应使用 `Row` 或 `Column` 组件，而不是 `Flex`
    组件。

