  raw: '### Discussion


    When the code doesn’t work as you expected in the runtime, you need to debug the
    code to find out the cause. With the help of IDEs, it’s quite straightforward
    to debug Flutter apps. You can add breakpoints in the code and start the app in
    debug mode.


    Another common approach to debug code is to write outputs to the system console
    using `print()` function . These logs can be viewed using `flutter logs` command.
    Android Studio also displays these logs in the Console view. You can also use
    `debugPrint()` function to throttle the output to avoid the logs being dropped
    by Android.


    When creating your own widgets, you should override `debugFillProperties()` method
    to add custom diagnostic properties. These properties can be viewed in Flutter
    Inspector. In Listing [14-14](#479501_1_En_14_Chapter.xhtml#PC15), the `DebugWidget`
    has `name` and `price` properties. In the `debugFillProperties()` method, two
    `DiagnosticsProperty` objects are added using `DiagnosticPropertiesBuilder` object.


    ```

    class DebugWidget extends StatelessWidget {

    DebugWidget({Key key, this.name, this.price}) : super(key: key);

    final String name;

    final double price;

    @override

    Widget build(BuildContext context) {

    return Text(''$name - $price'');

    }

    @override

    void debugFillProperties(DiagnosticPropertiesBuilder properties) {

    super.debugFillProperties(properties);

    properties.add(StringProperty(''name'', name));

    properties.add(DoubleProperty(''price'', price));

    }

    }

    Listing 14-14

    debugFillProperties()

    ```


    There are different types of `DiagnosticsProperty` subclasses to use based on
    the property type. Table [14-5](#479501_1_En_14_Chapter.xhtml#Tab5) shows common
    `DiagnosticsProperty` subclasses.


    Table 14-5


    Methods of CommonFinders


    | Name | Description |

