    滑块通常用于从连续或离散的值范围中进行选择。你可以使用适用于 Material Design 的 `Slider` 组件，或适用于 iOS 风格的 `CupertinoSlider`。这两个组件行为相同，但视觉外观不同。创建滑块时，你需要使用
    `min` 和 `max` 参数提供一个有效的值范围。如果 `divisions` 参数使用了非空值，则选择项将是一组离散的值。否则，选择项将是一个连续的值范围。例如，如果
    `min` 的值为 `0.0`，`max` 的值为 `10.0`，并且 `divisions` 设置为 `5`，那么可选值就是 `0.0`、`2.0`、`4.0`、`6.0`、`8.0`
    和 `10.0`。`Slider` 组件不维护任何状态。其行为和外观完全由构造函数参数决定。当滑块的值改变时，会使用选中的值调用 `onChanged` 回调。你也可以使用
