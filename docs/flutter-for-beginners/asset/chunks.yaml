    命名路由 `/edit_user` 在 `MaterialApp` 中注册。不能使用 `route` 参数，因为无法在构建函数中访问传递给路由的数据。应改用
    `WidgetsApp`、`MaterialApp` 或 `CupertinoApp` 的 `onGenerateRoute` 参数。`onGenerateRoute`
    参数的类型是 `RouteFactory`，它是函数类型 `Route (RouteSettings settings)` 的类型别名。`RouteSettings`
    类包含创建 `Route` 对象时可能所需的数据。表 8-1 显示了 `RouteSettings` 类的属性。


    **表 8-1** `RouteSettings` 的属性


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `name` | `String` | 路由的名称。 |

    | `arguments` | `Object` | 传递给路由的数据。 |

    | `isInitialRoute` | `bool` | 此路由是否是推入导航器的第一个路由。 |


    在实现 `onGenerateRoute` 函数时，需要根据提供的 `RouteSettings` 对象返回路由。在代码清单 8-7 中，首先检查 `name`
    属性，然后返回一个包含 `EditUserDetailsPage` 内容的 `MeterialPageRoute`。`RouteSettings` 的 `arguments`
    属性在 `EditUserDetailsPage` 的构造函数中使用。`arguments` 属性的值就是代码清单 8-6 中传入的 `UserDetails`
    对象。


    ```

    MaterialApp(

    onGenerateRoute: (RouteSettings settings) {

    if (settings.name == ''/edit_user'') {

    return MaterialPageRoute(

    settings: settings,

    builder: (context) {

    return EditUserDetailsPage(settings.arguments);

    },

    );

    }

    },

    );

