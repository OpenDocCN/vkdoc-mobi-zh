- fmt: '# Layout Widgets


    Flutter provides a set of layout widgets for different layout requirements. There
    are two categories of these widgets. The first category is for widgets that contain
    a single child, which are descendant classes of `SingleChildRenderObjectWidget`
    class. The second category is for widgets that can contain multiple children,
    which are descendant classes of `MultiChildRenderObjectWidget` class. Constructors
    of these widgets have a similar pattern. The first named parameter is `key` of
    type `Key`. The last named parameter of single child layout widget constructors
    is `child` of type `Widget`, while the last named parameter of multiple children
    layout widget constructor is `children` of type `List<Widget>`.


    These layout widgets are subclasses of `RenderObjectWidget` class. `RenderObjectWidget`
    class is used to configure `RenderObjectElement`s. `RenderObjectElement`s wrap
    `RenderObject`s.


    ## 5.2 Placing Widgets in the Center


    ### Problem


    You want to place a widget in the center of another widget.


    ### Solution


    Wrap the widget with a `Center` widget.


    ### Discussion


    To place a widget in the center of another widget, you can simply wrap the widget
    in a `Center` widget. This widget will be placed in the center of the `Center`
    widget both horizontally and vertically. This `Center` widget will be the child
    of the original parent widget. `Center` constructor has two named parameters `widthFactor`
    and `heightFactor` to specify the size factor for width and height, respectively.
    Listing [5-2](#479501_1_En_5_Chapter.xhtml#PC2) shows an example of using `Center`
    widget.


    ```dart

    Center(

    widthFactor: 2.0,

    heightFactor: 2.0,

    child: Text("Center"),

    )

    ```


    `Center` widget is actually a subclass of `Align` widget with `alignment` set
    to `Alignment.center`. The behavior of `Center` widget is the same as `Align`
    widget discussed in Recipe 5-3.


    ## 5.3 Aligning Widgets


    ### Problem


    You want to align a widget in different position of its parent widget.


    ### Solution


    Wrap the widget with an `Align` widget.


    ### Discussion


    With `Align` widget, you can align a child widget in different position. `Align`
    widget constructor has the named parameter `alignment` of type `AlignmentGeometry`
    to specify the alignment. `Center` widget is actually a special kind of `Align`
    widget with `alignment` always set to `Alignment.center`. `Align` widget constructor
    also has the named parameters `widthFactor` and `heightFactor`.


    `AlignmentGeometry` class has two subclasses to be used in different situations.
    `Alignment` class represents alignment in visual coordinates. `Alignment` has
    two properties `x` and `y` to represent the position in the rectangle of the 2D
    coordinate system. The properties `x` and `y` specify the position in the horizontal
    and vertical direction, respectively. `Alignment(0.0, 0.0)` means the center of
    the rectangle. A unit of 1.0 means the distance from the center to one side of
    the rectangle. A unit of 2.0 means the length of the rectangle in a particular
    direction. For example, the value 2.0 of `x` means the width of the rectangle.
    Positive values of `x` mean positions to the right of the center, while negative
    values of `x` mean positions to the left. The same rule also applies to values
    of `y`. `Align` has several constants for commonly used positions; see Table [5-1](#479501_1_En_5_Chapter.xhtml#Tab1).


    **Table 5-1** Alignment constants


    | Name | Value | Description |

    | --- | --- | --- |

    | `bottomCenter` | `Alignment(0.0, 1.0)` | Center point of the bottom edge. |

    | `bottomLeft` | `Alignment(-1.0, 1.0)` | Leftmost point of the bottom edge. |

    | `bottomRight` | `Alignment(1.0, 1.0)` | Rightmost point of the bottom edge.
    |

    | `center` | `Alignment(0.0, 0.0)` | Center point both horizontally and vertically.
    |

    | `centerLeft` | `Alignment(-1.0, 0.0)` | Center point of the left edge. |

    | `centerRight` | `Alignment(1.0, 0.0)` | Center point of the right edge. |

    | `topCenter` | `Alignment(0,0, -1.0)` | Center point of the top edge. |

    | `topLeft` | `Alignment(-1.0, -1.0)` | Leftmost point of the top edge. |

    | `topRight` | `Alignment(1.0, -1.0)` | Rightmost point of the top edge. |


    If you want to consider text direction in alignment, you need to use `AlignmentDirectional`
    class instead of `Alignment` class. `AlignmentDirectional` class has the property
    `start` instead of `x`. The `start` value grows in the same direction as the text
    direction. The value of `start` has the same meaning of `x` in `Alignment` when
    the text direction is left-to-right. If the text direction is right-to-left, the
    value of `start` is the opposite of `x` in `Alignment`. `AlignmentDirectional`
    class also has several constants for commonly used positions; see Table [5-2](#479501_1_En_5_Chapter.xhtml#Tab2).
    These constants use `start` and `end` instead of `left` and `right` to represent
    different directions.


    **Table 5-2** AlignmentDirectional constants


    | Name | Value | Description |

    | --- | --- | --- |

    | `bottomCenter` | `AlignmentDirectional (0.0, 1.0)` | Center point of the bottom
    edge. |

    | `bottomStart` | `AlignmentDirectional(-1.0, 1.0)` | Bottom corner on the start
    side. |

    | `bottomEnd` | `AlignmentDirectional(1.0, 1.0)` | Bottom corner on the end side.
    |

    | `center` | `AlignmentDirectional (0.0, 0.0)` | Center point both horizontally
    and vertically. |

    | `centerStart` | `AlignmentDirectional(-1.0, 0.0)` | Center point of the start
    edge. |

    | `centerEnd` | `AlignmentDirectional(1.0, 0.0)` | Center point of the end edge.
    |

    | `topCenter` | `AlignmentDirectional(0,0, -1.0)` | Center point of the top edge.
    |

    | `topStart` | `AlignmentDirectional(-1.0, -1.0)` | Top corner on the start side.
    |

    | `topEnd` | `AlignmentDirectional(1.0, -1.0)` | Top corner on the end side. |


    The `resolve()` method of `AlignmentGeometry` takes a parameter of type `TextDirection`
    and returns an `Alignment` instance. You can use this method to convert an `AlignmentDirectional`
    instance to an `Alignment` instance.


    The constraint passed to its child is the result of calling the `loosen()` method
    on this widget’s constraints object. This means the child can choose a size not
    exceeding this widget. The size of the widget itself depends on values of parameters
    `widthFactor` and `heightFactor` and its constraints object. For the width, if
    `widthFactor` is not null or `constraints.maxWidth` is `double.infinity`, then
    the width is the closest value to `childWidth * (widthFactory ?? 1.0)` constrained
    by the constraints. Otherwise, the width is determined by the constraints. The
    same rule applies to the height.


    Listing [5-3](#479501_1_En_5_Chapter.xhtml#PC3) shows an example of using `Align`
    widget.


    ```dart

    Align(

    alignment: Alignment.topLeft,

    child: SizedBox(

    width: 200,

    height: 200,

    child: Center(

    child: Text("TopLeft"),

    ),

    ),

    )

    ```


    ## 5.4 Imposing Constraints on Widgets


    ### Problem


    You want to impose layout constraints on widgets.


    ### Solution


    Use `ConstrainedBox` or `SizedBox`.'
