    ## 6.4 设置文本长度限制


    ### 问题


    你想控制文本的长度。


    ### 解决方案


    使用 `maxLength` 参数。


    ### 讨论


    要设置 `TextField` 和 `CupertinoTextField` 中文本的最大长度，你可以使用 `maxLength` 参数。`maxLength`
    参数的默认值为 `null`，表示对字符数没有限制。如果设置了 `maxLength` 参数，文本输入下方会显示一个字符计数器，显示已输入的字符数和允许的字符数。如果
    `maxLength` 参数设置为 `TextField.noMaxLength`，则只显示已输入的字符数。当设置 `maxLength` 后，如果字符达到限制，其行为取决于
    `maxLengthEnforced` 参数的值。如果 `maxLengthEnforced` 为 `true`（默认值），则无法再输入更多字符。如果 `maxLengthEnforced`
    为 `false`，则可以输入额外字符，但组件会切换到错误样式。


    ```

    TextField(

    maxLength: TextField.noMaxLength,

    )

    TextField(

    maxLength: 10,

    maxLengthEnforced: false,

    )

    CupertinoTextField(

    maxLength: 10,

    )

