    \ EdgeInsets.all(8),\n            child: widget.child,\n          ),\n       \
    \ ],\n      ),\n    );\n  }\n}\n```\n\nIn Listing [10-8](#479501_1_En_10_Chapter.xhtml#PC8),\
    \ `ConfigWidgetPage` widget uses `ConfiguredPage` widget to wrap `ConfiguredText`\
