- fmt: "### Discussion\n\nRecipe 13-3 describes how to support multiple locales using\
    \ `Localizations` widget and `LocalizationsDelegate` class. The major drawback\
    \ of solution in Recipe 13-3 is that you need to manually create localized resources\
    \ classes for all supported locales. Because localized strings are directly embedded\
    \ in source code, it’s hard to get translators involved. A better choice is to\
    \ use tools provided by `intl_translation` package to automate the process. You\
    \ need to add `intl_translation: ^0.17.3` to the `dev_dependencies` of the `pubspec.yaml`\
    \ file.\n\nListing 13-12 shows the new `AppLocalizations` class which has the\
    \ same `appName` property and `greeting()` method as Listing 13-9. `Intl.message()`\
    \ method describes a localized string. Only the message string is required. Parameters\
    \ like `name`, `desc`, `args`, and `examples` are used to help translators to\
    \ understand the message string.\n\n```\nclass AppLocalizations {\n  static AppLocalizations\
    \ of(BuildContext context) {\n    return Localizations.of(context, AppLocalizations);\n\
    \  }\n  String get appName {\n    return Intl.message(\n      'Demo App',\n  \
    \    name: 'appName',\n      desc: 'Name of the app',\n    );\n  }\n  String greeting(String\
    \ name) {\n    return Intl.message(\n      'Hello, $name',\n      name: 'greeting',\n\
    \      args: [name],\n      desc: 'Greeting message',\n      examples: const {'name':\
    \ 'John'},\n    );\n  }\n}\nListing 13-12\nAppLocalizations using Intl.message()\n\
    ```\n\nNow we can use the tool provided by `intl_translation` package to extract\
    \ localized messages from source code. The following command extracts messages\
    \ declared with `Intl.message()` from `lib/app_intl.dart` file and saves to `lib/l10n`\
    \ directory. After running this command, you should see the generated `intl_messages.arb`\
    \ file in `lib/l10n` directory. Generated files are in ARB (Application Resource\
    \ Bundle) format (https://github.com/googlei18n/app-resource-bundle) which can\
    \ be used as input of translation tools like Google Translator Toolkit. ARB files\
    \ are actually JSON files; you can simply use text editors to modify them.\n\n\
    ```\n$ flutter packages pub run intl_translation:extract_to_arb --locale=en --output-dir=lib/l10n\
    \ lib/app_intl.dart\n```\n\nNow you can duplicate the `intl_messages.arb` file\
    \ for each supported locale and get them translated. For example, the `intl_messages_zh.arb`\
    \ file is the translated version for `zh` locale. After translated files are ready,\
    \ you can use the following command to generate Dart files. After running this\
    \ command, you should see a `messages_all.dart` file and `messages_*.dart` files\
    \ for each locale.\n\n```\n$ flutter packages pub run intl_translation:generate_from_arb\
    \ --output-dir=lib/l10n --no-use-deferred-loading lib/app_intl.dart lib/l10n/intl_*.arb\n\
    ```\n\nThe `initializeMessages()` function in `messages_all.dart` file can be\
    \ used to initialize messages for a given locale. The static `load()` method in\
    \ Listing 13-13 uses `initializeMessages()` function to initialize messages first,\
    \ then sets the default locale.\n\n```\nclass AppLocalizations {\n  static Future<AppLocalizations>\
    \ load(Locale locale) {\n    final String name =\n        locale.countryCode.isEmpty\
    \ ? locale.languageCode : locale.toString();\n    final String localeName = Intl.canonicalizedLocale(name);\n\
    \    return initializeMessages(localeName).then((_) {\n      Intl.defaultLocale\
    \ = localeName;\n      return AppLocalizations();\n    });\n  }\n}\nListing 13-13\n\
    Load messages\n```\n\nThis static `AppLocalizations.load()` method can be used\
    \ by the `load()` method of `LocalizationsDelegate` class to load `AppLocalizations`\
    \ object.\n\n## 13.5 Painting Custom Elements\n\n### Problem\n\nYou want to paint\
    \ custom elements.\n\n### Solution\n\nUse `CustomPaint` widget with `CustomPainter`\
    \ and `Canvas` classes.\n\n### Discussion\n\nIf you want to completely customize\
    \ the painting of a widget, you can use `CustomPaint` widget. `CustomPaint` widget\
    \ provides a canvas on which to draw custom elements. Table 13-1 shows the parameters\
    \ of `CustomPaint` constructor. During the painting process, the `painter` paints\
    \ on the canvas first, then the child widget is painted, and finally the `foregroundPainter`\
    \ paints on the canvas.\n\n**Table 13-1** Parameters of `CustomPaint`\n\n| Name\
    \ | Type | Description |\n| --- | --- | --- |\n| `painter` | `CustomPainter` |\
    \ The painter that paints before the child. |\n| `foregroundPainter` | `CustomPainter`\
    \ | The painter that paints after the child. |\n| `size` | `Size` | The size to\
    \ paint. |\n| `child` | `Widget` | The child widget. |\n\nTo create `CustomPainter`\
    \ objects, you need to create subclasses of `CustomPainter` and override `paint()`\
    \ and `shouldRepaint()` methods. In `paint()` method, the `canvas` parameter can\
    \ be used to draw custom elements. `Canvas` class has a set of methods to draw\
    \ different elements; see Table 13-2.\n\n**Table 13-2** Methods of `Canvas`\n\n\
    | Name | Description |\n| --- | --- |\n| `drawArc()` | Draw an arc. |\n| `drawCircle()`\
    \ | Draw a circle with specified center and radius. |\n| `drawImage()` | Draw\
    \ an `Image` object. |\n| `drawLine()` | Draw a line between two points. |\n|\
    \ `drawOval()` | Draw an oval. |\n| `drawParagraph()` | Draw text. |\n| `drawRect()`\
    \ | Draw a rectangle with specified `Rect` object. |\n| `drawRRect()` | Draw a\
    \ rounded rectangle. |\n\nMost of the methods in `Canvas` class have a parameter\
    \ of type `Paint` to describe the style to use when drawing on the canvas. In\
    \ Listing 13-14, `Shapes` class draws a rectangle and a circle on the canvas.\
    \ In the `CustomShapes` widget, the `Text` widget is painted above the `Shapes`\
    \ painter.\n\n```\nclass CustomShapes extends StatelessWidget {\n  @override\n\
    \  Widget build(BuildContext context) {\n    return Container(\n      width: 300,\n\
    \      height: 300,\n      child: CustomPaint(\n        painter: Shapes(),\n \
    \       child: Center(child: Text('Hello World')),\n      ),\n    );\n  }\n}\n\
    \nclass Shapes extends CustomPainter {\n  @override\n  void paint(Canvas canvas,\
    \ Size size) {\n    Rect rect = Offset(5, 5) & (size - Offset(5, 5));\n    canvas.drawRect(\n\
    \      rect,\n      Paint()\n        ..color = Colors.red\n        ..strokeWidth\
    \ = 2\n        ..style = PaintingStyle.stroke,\n    );\n    canvas.drawCircle(\n\
    \      rect.center,\n      (rect.shortestSide / 2) - 10,\n      Paint()..color\
    \ = Colors.blue,\n    );\n  }\n\n  @override\n  bool shouldRepaint(CustomPainter\
    \ oldDelegate) {\n    return false;\n  }\n}\nListing 13-14\nUse CustomPaint\n\
    ```\n\n## 13.6 Customizing Themes\n\n### Problem\n\nYou want to customize themes\
    \ in Flutter apps.\n\n### Solution\n\nUse `ThemeData` class for Material Design\
    \ and `CupertinoThemeData` class for iOS."
  raw: '### Discussion


    Recipe 13-3 describes how to support multiple locales using `Localizations` widget
    and `LocalizationsDelegate` class. The major drawback of solution in Recipe 13-3
    is that you need to manually create localized resources classes for all supported
    locales. Because localized strings are directly embedded in source code, it’s
    hard to get translators involved. A better choice is to use tools provided by
    `intl_translation` package to automate the process. You need to add `intl_translation:
    ^0.17.3` to the `dev_dependencies` of the `pubspec.yaml` file.


    Listing [13-12](#479501_1_En_13_Chapter.xhtml#PC12) shows the new `AppLocalizations`
    class which has the same `appName` property and `greeting()` method as Listing
    [13-9](#479501_1_En_13_Chapter.xhtml#PC9). `Intl.message()` method describes a
    localized string. Only the message string is required. Parameters like `name`,
    `desc`, `args`, and `examples` are used to help translators to understand the
    message string.


    ```

    class AppLocalizations {

    static AppLocalizations of(BuildContext context) {

    return Localizations.of(context, AppLocalizations);

    }

    String get appName {

    return Intl.message(

    ''Demo App'',

    name: ''appName'',

    desc: ''Name of the app'',

    );

    }

    String greeting(String name) {

    return Intl.message(

    ''Hello, $name'',

    name: ''greeting'',

    args: [name],

    desc: ''Greeting message'',

    examples: const {''name'': ''John''},

    );

    }

    }

    Listing 13-12

    AppLocalizations using Intl.message()

    ```


    Now we can use the tool provided by `intl_translation` package to extract localized
    messages from source code. The following command extracts messages declared with
    `Intl.message()` from `lib/app_intl.dart` file and saves to `lib/l10n` directory.
    After running this command, you should see the generated `intl_messages.arb` file
    in `lib/l10n` directory. Generated files are in ARB (Application Resource Bundle)
    format ( [`https://github.com/googlei18n/app-resource-bundle`](https://github.com/googlei18n/app-resource-bundle)
    ) which can be used as input of translation tools like Google Translator Toolkit.
    ARB files are actually JSON files; you can simply use text editors to modify them.


    ```

    $ flutter packages pub run intl_translation:extract_to_arb --locale=en --output-dir=lib/l10n
    lib/app_intl.dart

    ```


    Now you can duplicate the `intl_messages.arb` file for each supported locale and
    get them translated. For example, the `intl_messages_zh.arb` file is the translated
    version for `zh` locale. After translated files are ready, you can use the following
    command to generate Dart files. After running this command, you should see a `messages_all.dart`
    file and `messages_*.dart` files for each locale.


    ```

    $ flutter packages pub run intl_translation:generate_from_arb --output-dir=lib/l10n
    --no-use-deferred-loading lib/app_intl.dart lib/l10n/intl_*.arb

    ```


    The `initializeMessages()` function in `messages_all.dart` file can be used to
    initialize messages for a given locale. The static load() method in Listing [13-13](#479501_1_En_13_Chapter.xhtml#PC15)
    uses `initializeMessages()` function to initialize messages first, then sets the
    default locale.


    ```

    class AppLocalizations {

    static Future load(Locale locale) {

    final String name =

    locale.countryCode.isEmpty ? locale.languageCode : locale.toString();

    final String localeName = Intl.canonicalizedLocale(name);

    return initializeMessages(localeName).then((_) {

    Intl.defaultLocale = localeName;

    return AppLocalizations();

    });

    }

    }

    Listing 13-13

    Load messages

    ```


    This static `AppLocalizations.load()` method can be used by the `load()` method
    of `LocalizationsDelegate` class to load `AppLocalizations` object.


    ## 13.5 Painting Custom Elements


    ### Problem


    You want to paint custom elements.


    ### Solution


    Use `CustomPaint` widget with `CustomPainter` and `Canvas` classes.


    ### Discussion


    If you want to completely customize the painting of a widget, you can use `CustomPaint`
    widget . `CustomPaint` widget provides a canvas on which to draw custom elements.
    Table [13-1](#479501_1_En_13_Chapter.xhtml#Tab1) shows the parameters of `CustomPaint`
    constructor. During the painting process, the `painter` paints on the canvas first,
    then the child widget is painted, and finally the `foregroundPainter` paints on
    the canvas.


    Table 13-1


    Parameters of CustomPaint


    | Name | Type | Description |

    | --- | --- | --- |

    | `painter` | `CustomPainter` | The painter that paints before the child. |

    | `foregroundPainter` | `CustomPainter` | The painter that paints after the child.
    |

    | `size` | `Size` | The size to paint. |

    | `child` | `Widget` | The child widget. |


    To create `CustomPainter` objects, you need to create subclasses of `CustomPainter`
    and override `paint()` and `shouldRepaint()` methods. In `paint()` method, the
    `canvas` parameter can be used to draw custom elements. `Canvas` class has a set
    of methods to draw different elements; see Table [13-2](#479501_1_En_13_Chapter.xhtml#Tab2).


    Table 13-2


    Methods of Canvas


    | Name | Description |

    | --- | --- |

    | `drawArc()` | Draw an arc. |

    | `drawCircle()` | Draw a circle with specified center and radius. |

    | `drawImage()` | Draw an `Image` object. |

    | `drawLine()` | Draw a line between two points. |

    | `drawOval()` | Draw an oval. |

    | `drawParagraph()` | Draw text. |

    | `drawRect()` | Draw a rectangle with specified `Rect` object. |

    | `drawRRect()` | Draw a rounded rectangle. |


    Most of the methods in `Canvas` class have a parameter of type `Paint` to describe
    the style to use when drawing on the canvas. In Listing [13-14](#479501_1_En_13_Chapter.xhtml#PC16),
    `Shapes` class draws a rectangle and a circle on the canvas. In the `CustomShapes`
    widget, the `Text` widget is painted above the `Shapes` painter.


    ```

    class CustomShapes extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Container(

    width: 300,

    height: 300,

    child: CustomPaint(

    painter: Shapes(),

    child: Center(child: Text(''Hello World'')),

    ),

    );

    }

    }

    class Shapes extends CustomPainter {

    @override

    void paint(Canvas canvas, Size size) {

    Rect rect = Offset(5, 5) & (size - Offset(5, 5));

    canvas.drawRect(

    rect,

    Paint()

    ..color = Colors.red

    ..strokeWidth = 2

    ..style = PaintingStyle.stroke,

    );

    canvas.drawCircle(

    rect.center,

    (rect.shortestSide / 2) - 10,

    Paint()..color = Colors.blue,

    );

    }

    @override

    bool shouldRepaint(CustomPainter oldDelegate) {

    return false;

    }

    }

    Listing 13-14

    Use CustomPaint

    ```


    ## 13.6 Customizing Themes


    ### Problem


    You want to customize themes in Flutter apps.


    ### Solution


    Use `ThemeData` class for Material Design and `CupertinoThemeData` class for iOS.'
  trans: "\n### 讨论\n\n**食谱 13-3** 描述了如何使用 `Localizations` 组件和 `LocalizationsDelegate`\
    \ 类来支持多语言环境。该方案的主要缺点在于，你需要为所有支持的语言环境手动创建本地化资源类。由于本地化字符串直接嵌入在源代码中，这导致翻译人员很难参与进来。一个更好的选择是使用\
    \ `intl_translation` 包提供的工具来自动化这个过程。你需要在 `pubspec.yaml` 文件的 `dev_dependencies`\
    \ 中添加 `intl_translation: ⁰.17.3`。\n\n**清单 13-12** 展示了新的 `AppLocalizations` 类，它与清单\
    \ 13-9 拥有相同的 `appName` 属性和 `greeting()` 方法。`Intl.message()` 方法用于描述一个本地化字符串。只有消息字符串是必需的。像\
    \ `name`、`desc`、`args` 和 `examples` 这样的参数用于帮助翻译人员理解消息字符串。\n\n```\nclass AppLocalizations\
    \ {\n  static AppLocalizations of(BuildContext context) {\n    return Localizations.of(context,\
    \ AppLocalizations);\n  }\n  String get appName {\n    return Intl.message(\n\
    \      'Demo App',\n      name: 'appName',\n      desc: 'Name of the app',\n \
    \   );\n  }\n  String greeting(String name) {\n    return Intl.message(\n    \
    \  'Hello, $name',\n      name: 'greeting',\n      args: [name],\n      desc:\
    \ 'Greeting message',\n      examples: const {'name': 'John'},\n    );\n  }\n\
    }\n清单 13-12\n使用 Intl.message() 的 AppLocalizations\n```\n\n现在我们可以使用 `intl_translation`\
    \ 包提供的工具从源代码中提取本地化消息。以下命令从 `lib/app_intl.dart` 文件中提取使用 `Intl.message()` 声明的消息，并保存到\
    \ `lib/l10n` 目录中。运行此命令后，你应该会在 `lib/l10n` 目录中看到生成的 `intl_messages.arb` 文件。生成的文件采用\
    \ ARB (Application Resource Bundle) 格式 (https://github.com/googlei18n/app-resource-bundle)，该格式可以作为\
    \ Google Translator Toolkit 等翻译工具的输入。ARB 文件实际上是 JSON 文件；你可以直接使用文本编辑器修改它们。\n\n\
    ```\n$ flutter packages pub run intl_translation:extract_to_arb --locale=en --output-dir=lib/l10n\
    \ lib/app_intl.dart\n```\n\n现在，你可以为每个支持的语言环境复制 `intl_messages.arb` 文件并进行翻译。例如，`intl_messages_zh.arb`\
    \ 文件就是针对 `zh` 语言环境的翻译版本。翻译文件准备就绪后，你可以使用以下命令生成 Dart 文件。运行此命令后，你应该会看到一个 `messages_all.dart`\
    \ 文件以及每个语言环境对应的 `messages_*.dart` 文件。\n\n```\n$ flutter packages pub run intl_translation:generate_from_arb\
    \ --output-dir=lib/l10n --no-use-deferred-loading lib/app_intl.dart lib/l10n/intl_*.arb\n\
    ```\n\n`messages_all.dart` 文件中的 `initializeMessages()` 函数可用于为指定的语言环境初始化消息。清单 13-13\
    \ 中的静态 `load()` 方法首先使用 `initializeMessages()` 函数初始化消息，然后设置默认语言环境。\n\n```\nclass\
    \ AppLocalizations {\n  static Future<AppLocalizations> load(Locale locale) {\n\
    \    final String name =\n        locale.countryCode.isEmpty ? locale.languageCode\
    \ : locale.toString();\n    final String localeName = Intl.canonicalizedLocale(name);\n\
    \    return initializeMessages(localeName).then((_) {\n      Intl.defaultLocale\
    \ = localeName;\n      return AppLocalizations();\n    });\n  }\n}\n清单 13-13\n\
    加载消息\n```\n\n这个静态的 `AppLocalizations.load()` 方法可以被 `LocalizationsDelegate` 类的\
    \ `load()` 方法使用，以加载 `AppLocalizations` 对象。\n\n## 13.5 绘制自定义元素\n\n### 问题\n\n你想绘制自定义元素。\n\
    \n### 解决方案\n\n使用 `CustomPaint` 组件以及 `CustomPainter` 和 `Canvas` 类。\n\n### 讨论\n\n\
    如果你想完全自定义一个组件的绘制，可以使用 `CustomPaint` 组件。`CustomPaint` 组件提供了一个画布，用于绘制自定义元素。**表 13-1**\
    \ 显示了 `CustomPaint` 构造函数的参数。在绘制过程中，`painter` 首先在画布上绘制，然后绘制子组件，最后 `foregroundPainter`\
    \ 在画布上绘制。\n\n**表 13-1** `CustomPaint` 的参数\n\n| 名称 | 类型 | 描述 |\n| --- | --- | ---\
    \ |\n| `painter` | `CustomPainter` | 在子组件之前绘制的绘画器。 |\n| `foregroundPainter` |\
    \ `CustomPainter` | 在子组件之后绘制的绘画器。 |\n| `size` | `Size` | 绘制的大小。 |\n| `child` |\
    \ `Widget` | 子组件。 |\n\n要创建 `CustomPainter` 对象，你需要创建 `CustomPainter` 的子类，并重写 `paint()`\
    \ 和 `shouldRepaint()` 方法。在 `paint()` 方法中，`canvas` 参数可用于绘制自定义元素。`Canvas` 类有一组用于绘制不同元素的方法；请参见**表\
    \ 13-2**。\n\n**表 13-2** `Canvas` 的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `drawArc()`\
    \ | 绘制一个弧。 |\n| `drawCircle()` | 用指定的圆心和半径绘制一个圆。 |\n| `drawImage()` | 绘制一个 `Image`\
    \ 对象。 |\n| `drawLine()` | 在两点之间绘制一条线。 |\n| `drawOval()` | 绘制一个椭圆。 |\n| `drawParagraph()`\
    \ | 绘制文本。 |\n| `drawRect()` | 用指定的 `Rect` 对象绘制一个矩形。 |\n| `drawRRect()` | 绘制一个圆角矩形。\
    \ |\n\n`Canvas` 类中的大多数方法都有一个 `Paint` 类型的参数，用于描述在画布上绘制时使用的样式。在**清单 13-14** 中，`Shapes`\
    \ 类在画布上绘制了一个矩形和一个圆形。在 `CustomShapes` 组件中，`Text` 组件绘制在 `Shapes` 绘画器的上方。\n\n```\n\
    class CustomShapes extends StatelessWidget {\n  @override\n  Widget build(BuildContext\
    \ context) {\n    return Container(\n      width: 300,\n      height: 300,\n \
    \     child: CustomPaint(\n        painter: Shapes(),\n        child: Center(child:\
    \ Text('Hello World')),\n      ),\n    );\n  }\n}\n\nclass Shapes extends CustomPainter\
    \ {\n  @override\n  void paint(Canvas canvas, Size size) {\n    Rect rect = Offset(5,\
    \ 5) & (size - Offset(5, 5));\n    canvas.drawRect(\n      rect,\n      Paint()\n\
    \        ..color = Colors.red\n        ..strokeWidth = 2\n        ..style = PaintingStyle.stroke,\n\
    \    );\n    canvas.drawCircle(\n      rect.center,\n      (rect.shortestSide\
    \ / 2) - 10,\n      Paint()..color = Colors.blue,\n    );\n  }\n\n  @override\n\
    \  bool shouldRepaint(CustomPainter oldDelegate) {\n    return false;\n  }\n}\n\
    清单 13-14\n使用 CustomPaint\n```\n\n## 13.6 自定义主题\n\n### 问题\n\n你想在 Flutter 应用中自定义主题。\n\
    \n### 解决方案\n\n对于 Material Design 使用 `ThemeData` 类，对于 iOS 使用 `CupertinoThemeData`\
    \ 类。\n"
- fmt: '### Discussion


    It’s a common requirement to customize look and feel of an app. For Flutter apps,
    if Material Design is used, you can use`ThemeData`class to customize the theme.`ThemeData`class
    has a large number of parameters to configure different aspects of the theme.`MaterialApp`class
    has the`theme`parameter to provide the`ThemeData`object. For iOS style,`CupertinoThemeData`class
    has the same purpose to specify the theme.`CupertinoApp`class also has the`theme`parameter
    of type`CupertinoThemeData`to customize the theme.


    If you need to access the current theme object, you can use static`Theme.of()`method
    to get nearest enclosing`ThemeData`object for a build context in Material Design.
    The similar`CupertinoTheme.of()`method can be used for iOS style.


    In Listing [13-15](#479501_1_En_13_Chapter.xhtml#PC17), the first`Text`widget
    uses the`textTheme.headline`property of current`Theme`object as the style. The
    second`Text`widget uses the`colorScheme.error`property as the color to display
    error text.


    ```

    class TextTheme extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Column(

    children: [

    Text(''Headline'', style: Theme.of(context).textTheme.headline),

    Text(''Error'',

    style: TextStyle(color: Theme.of(context).colorScheme.error)),

    ],

    );

    }

    }

    Listing 13-15

    Use Theme

    ```


