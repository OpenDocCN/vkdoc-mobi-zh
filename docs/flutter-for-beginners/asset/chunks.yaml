    ### 讨论


    如果用户界面的某个部分可能会动态变化，则需要继承 `StatefulWidget` 类。`StatefulWidget` 自身是不可变的，其状态由它们创建的
    `State` 对象管理。`StatefulWidget` 子类需要实现 `createState()` 方法，该方法返回一个 `State<StatefulWidget>`
    对象。当状态发生变化时，`State` 对象应调用 `setState()` 方法来通知框架触发更新。在代码清单 4-3 中，`_CounterState`
    类是 `Counter` 小部件的 `State` 对象。当按钮被按下时，值会在 `setState()` 方法中更新，从而更新 `_CounterState`
    小部件以显示新值。


    ```

    class Counter extends StatefulWidget {

    @override

    _CounterState createState() => _CounterState();

    }

    class _CounterState extends State {

    int value = 0;

    @override

    Widget build(BuildContext context) {

    return Row(

    children: [

    Text(''$value''),

    RaisedButton(

    child: Text(''+''),

    onPressed: () {

    setState(() {

    value++;

    });

    },

    ),

    ],

    );

    }

    }

