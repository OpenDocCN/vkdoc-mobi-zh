    ### 讨论


    给定一个`Steam`或`Future`对象，您可能希望构建一个根据其中数据更新其内容的小部件。您可以使用`StreamBuilder<T>`小部件来处理`Stream`对象，使用`FutureBuilder<T>`小部件来处理`Future`对象。表
    9-5 展示了`StreamBuilder<T>`构造函数的参数。


    **表 9-5** `StreamBuilder<T>`的参数


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `stream` | `Stream<T>` | 构建器所使用的流。 |

    | `builder` | `AsyncWidgetBuilder<T>` | 用于构建小部件的构建器函数。 |

    | `initialData` | `T` | 用于构建小部件的初始数据。 |


    `AsyncWidgetBuilder`是函数类型`Widget (BuildContext context, AsyncSnapshot<T> snapshot)`的
    typedef。`AsyncSnapshot`类表示与异步计算交互的快照。表 9-6 展示了`AsyncSnapshot<T>`类的属性。


    **表 9-6** `AsyncSnapshot<T>`的属性


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `connectionState` | `ConnectionState` | 与异步计算的连接状态。 |

    | `data` | `T` | 异步计算接收到的最新数据。 |

    | `error` | `Object` | 异步计算接收到的最新错误对象。 |

    | `hasData` | `bool` | `data`属性是否不为`null`。 |

    | `hasError` | `bool` | `error`属性是否不为`null`。 |


    您可以使用`connectionState`的值来确定连接状态。表 9-7 展示了`ConnectionState`枚举的值。


    **表 9-7** `ConnectionState`的值


    | 名称 | 描述 |

    | --- | --- |

    | `none` | 未连接到异步计算。 |

    | `waiting` | 已连接到异步计算并等待交互。 |

    | `active` | 已连接到一个活动的异步计算。 |

    | `done` | 已连接到一个终止的异步计算。 |


    当使用`StreamBuilder`小部件构建 UI 时，典型的方式是根据连接状态返回不同的小部件。例如，如果连接状态是`waiting`，则可能返回一个进度指示器。


    在清单 9-13 中，流包含五个元素，每秒钟生成一个。如果连接状态是`none`或`waiting`，则返回一个`CircularProgressIndicator`小部件。如果状态是`active`或`done`，则根据`data`和`error`属性的值返回一个`Text`小部件。


    ```

    class StreamBuilderPage extends StatelessWidget {

    final Stream _stream =

    Stream.periodic(Duration(seconds: 1), (int value) => value * 10).take(5);

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Stream Builder''),

    ),

    body: Center(

    child: StreamBuilder(

    stream: _stream,

    initialData: 0,

    builder: (BuildContext context, AsyncSnapshot snapshot) {

    switch (snapshot.connectionState) {

    case ConnectionState.none:

    case ConnectionState.waiting:

    return CircularProgressIndicator();

    case ConnectionState.active:

    case ConnectionState.done:

    if (snapshot.hasData) {

    return Text(''${snapshot.data ?? "}'');

    } else if (snapshot.hasError) {

    return Text(

    ''${snapshot.error}'',

    style: TextStyle(color: Colors.red),

    );

    }

    }

    return null;

    },

    ),

    ),

    );

    }

    }

    ```


    **清单 9-13** 使用`StreamBuilder`


    `FutureBuilder`小部件的用法与`StreamBuilder`小部件类似。当将`FutureBuilder`与`Future`对象一起使用时，您可以先使用`asStream()`方法将`Future`对象转换为`Stream`对象，然后对转换后的`Stream`对象使用`StreamBuilder`。


    在清单 9-14 中，我们使用了不同的方式来构建 UI。我们不是检查连接状态，而是使用`hasData`和`hasError`属性来检查状态。


    ```

    class FutureBuilderPage extends StatelessWidget {

    final Future _future = Future.delayed(Duration(seconds: 1), () {

    if (Random().nextBool()) {

    return 1;

    } else {

    throw ''invalid value'';

    }

    });

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Future Builder''),

    ),

    body: Center(

    child: FutureBuilder(

    future: _future,

    builder: (BuildContext context, AsyncSnapshot snapshot) {

    if (snapshot.hasData) {

    return Text(''${snapshot.data}'');

    } else if (snapshot.hasError) {

    return Text(

    ''${snapshot.error}'',

    style: TextStyle(color: Colors.red),

    );

    } else {

    return CircularProgressIndicator();

    }

    },

    ),

    ),

    );

    }

    }

    ```


    **清单 9-14** 使用`FutureBuilder`


    ## 9.7 处理简单 JSON 数据


    ### 问题


    您想要一种简单的方法来处理 JSON 数据。


    ### 解决方案


    使用`dart:convert`库中的`jsonEncode()`和`jsonDecode()`函数。


    ### 讨论


    JSON 是一种流行的 Web 服务数据格式。为了与后端服务交互，您可能需要在两种场景中处理 JSON 数据：


    *   JSON 数据序列化：将 Dart 中的对象转换为 JSON 字符串。

    *   JSON 数据反序列化：将 JSON 字符串转换为 Dart 中的对象。


    对于这两种场景，如果您只是偶尔需要处理简单的 JSON 数据，那么使用`dart:convert`库中的`jsonEncode()`和`jsonDecode()`函数是一个不错的选择。`jsonEncode()`函数将
    Dart 对象转换为字符串，而`jsonDecode()`函数将字符串转换为 Dart 对象。在清单 9-15 中，`data`对象首先被序列化为 JSON
    字符串，然后 JSON 字符串再次被反序列化为 Dart 对象。


    ```

    var data = {

    ''name'': ''Test'',

    ''count'': 100,

    ''valid'': true,

    ''list'': [

    1,

    2,

    {

    ''nested'': ''a'',

    ''value'': 123,

    },

    ],

    };

    String str = jsonEncode(data);

    print(str);

    Object obj = jsonDecode(str);

    print(obj);

    ```


    **清单 9-15** 处理 JSON 数据


    `dart:convert`库中的 JSON 编码器仅支持有限的数据类型，包括数字、字符串、布尔值、`null` 、列表以及键为字符串的映射。要编码其他类型的对象，您需要使用`toEncodable`参数提供一个函数，该函数首先将对象转换为可编码的值。默认的`toEncodable`函数会调用对象的`toJson()`方法。为需要序列化为
    JSON 字符串的自定义类添加`toJson()`方法是一种常见做法。


    在清单 9-16 中，`ToEncode`类的`toJson()`方法返回一个列表，该列表将被用作 JSON 序列化的输入。


    ```

    class ToEncode {

    ToEncode(this.v1, this.v2);

    final String v1;

    final String v2;

    Object toJson() {

    return [v1, v2];

    }

    }

    print(jsonEncode(ToEncode(''v1'', ''v2'')));

    ```


    **清单 9-16** 使用`toJson()`函数


    如果您希望序列化的 JSON 字符串有缩进，您需要直接使用`JsonEncoder`类。在清单 9-17 中，使用了两个空格作为缩进。


    ```

    String indentString = JsonEncoder.withIndent(''  '').convert(data);

    print(indentString);

    ```


    **清单 9-17** 添加缩进


    ## 9.8 处理复杂 JSON 数据


    ### 问题


    您想要一种类型安全的方式来处理 JSON 数据。


    ### 解决方案


    使用`json_annotation`和`json_serializable`库。

    '
- fmt: '### Discussion


    使用`dart:convert`库中的`jsonEncode()`和`jsonDecode()`函数可以轻松处理简单的JSON数据。当JSON数据结构复杂时，使用这两个函数就不太方便了。在反序列化JSON字符串时，结果通常是列表或映射。如果JSON数据具有嵌套结构，从列表或映射中提取值并不容易。在序列化对象时，你需要为这些类添加`toJson()`方法来构建列表或映射。使用`json_annotation`和`json_serializable`库进行代码生成可以简化这些任务。


    `json_annotation`库提供了用于自定义JSON序列化和反序列化行为的注解。`json_serializable`库提供了生成处理JSON数据的代码的构建过程。要使用这两个库，你需要将它们添加到`pubspec.yaml`文件中。在清单[9-18](#479501_1_En_9_Chapter.xhtml#PC18)中，`json_annotation`库被添加到`dependencies`，而`json_serializable`库被添加到`dev_dependencies`。


    ```

    dependencies:

    json_annotation: ^2.0.0

    dev_dependencies:

    build_runner: ^1.0.0

    json_serializable: ^2.0.0

    Listing 9-18

    Add json_annotation and json_serializable

    ```


    在清单[9-19](#479501_1_En_9_Chapter.xhtml#PC19)中，`Person`类位于`json_serialize.dart`文件中。注解`@JsonSerializable()`表示要为`Person`类生成代码。生成的代码位于`json_serialize.g.dart`文件中。清单[9-19](#479501_1_En_9_Chapter.xhtml#PC19)中使用的`_$PersonFromJson()`和`_$PersonToJson()`函数来自生成的文件。`_$PersonFromJson()`函数用于`Person.fromJson()`构造函数，而`_$PersonToJson()`函数用于`toJson()`方法。


    ```

    import ''package:json_annotation/json_annotation.dart'';

    part ''json_serialize.g.dart'';

    @JsonSerializable()

    class Person {

    Person({this.firstName, this.lastName, this.email});

    final String firstName;

    final String lastName;

    final String email;

    factory Person.fromJson(Map json) => _$PersonFromJson(json);

    Map toJson() => _$PersonToJson(this);

    }

    Listing 9-19

    Use json_serializable

    ```


    要生成代码，你需要运行`flutter packages pub run build_runner build`命令。清单[9-20](#479501_1_En_9_Chapter.xhtml#PC20)展示了生成的文件。


    ```

    part of ''json_serialize.dart'';

    Person _$PersonFromJson(Map json) {

    return Person(

    firstName: json[''firstName''] as String,

    lastName: json[''lastName''] as String,

    email: json[''email''] as String);

    }

    Map _$PersonToJson(Person instance) => {

    ''firstName'': instance.firstName,

    ''lastName'': instance.lastName,

    ''email'': instance.email

    };

    Listing 9-20

    Generated code to handle JSON data

    ```


    `JsonSerializable`注解具有不同的属性来自定义行为；参见表[9-8](#479501_1_En_9_Chapter.xhtml#Tab8)。


    表 9-8 `JsonSerializable`的属性


    | 名称 | 默认值 | 描述 |

    | --- | --- | --- |

    | `anyMap` | `false` | 当为`true`时，使用`Map`作为映射类型；否则，使用`Map<String, dynamic>`。 |

    | `checked` | `false` | 是否添加额外检查以验证数据类型。 |

    | `createFactory` | `true` | 是否生成将映射转换为对象的函数。 |

    | `createToJson` | `true` | 是否生成可以用作`toJson()`函数的函数。 |

    | `disallowUnrecognizedKeys` | `false` | 当为`true`时，无法识别的键被视为错误；否则，它们将被忽略。 |

    | `explicitToJson` | `false` | 当为`true`时，生成的`toJson()`函数会在嵌套对象上使用`toJson`。 |

    | `fieldRename` | `FieldRename.none` | 用于将类字段名称转换为JSON映射键的策略。 |

    | `generateToJsonFunction` | `true` | 当为`true`时，生成顶层函数；否则，生成一个包含`toJson()`方法的mixin类。
    |

    | `includeIfNull` | `true` | 是否包含值为`null`的字段。 |

    | `nullable` | `true` | 是否优雅地处理`null`值。 |

    | `useWrappers` | `false` | 是否使用包装类以最小化序列化期间`Map`和`List`实例的使用。 |


    `generateToJsonFunction`属性决定了`toJson()`函数是如何生成的。当值为`true`时，会生成如清单[9-20](#479501_1_En_9_Chapter.xhtml#PC20)中所示的`_$PersonToJson()`等顶层函数。在清单[9-21](#479501_1_En_9_Chapter.xhtml#PC21)中，`User`类的`generateToJsonFunction`属性被设置为`false`。


    ```

    @JsonSerializable(

    generateToJsonFunction: false,

    )

    class User extends Object with _$UserSerializerMixin {

    User(this.name);

    final String name;

    }

    Listing 9-21

    User class

    ```


    在清单[9-22](#479501_1_En_9_Chapter.xhtml#PC22)中，生成的不是一个函数，而是包含了`toJson()`方法的`_$UserSerializerMixin`类。清单[9-21](#479501_1_En_9_Chapter.xhtml#PC21)中的`User`类只需使用这个mixin类即可。


    ```

    User _$UserFromJson(Map json) {

    return User(json[''name''] as String);

    }

    abstract class _$UserSerializerMixin {

    String get name;

    Map toJson() => {''name'': name};

    }

    Listing 9-22

    Generated code for User class

    ```


    `JsonKey`注解指定了字段如何被序列化。表[9-9](#479501_1_En_9_Chapter.xhtml#Tab9)展示了`JsonKey`的属性。


    表 9-9 `JsonKey`的属性


    | 名称 | 描述 |

    | --- | --- |

    | `name` | JSON映射键。如果为`null`，则使用字段名称。 |

    | `nullable` | 是否优雅地处理`null`值。 |

    | `includeIfNull` | 如果值为`null`，是否包含此字段。 |

    | `ignore` | 是否忽略此字段。 |

    | `fromJson` | 用于反序列化此字段的函数。 |

    | `toJson` | 用于序列化此字段的函数。 |

    | `defaultValue` | 用作默认值的值。 |

    | `required` | JSON映射中是否必须包含此字段。 |

    | `disallowNullValue` | 是否禁止`null`值。 |


    清单[9-23](#479501_1_En_9_Chapter.xhtml#PC23)展示了一个使用`JsonKey`的示例。


    ```

    @JsonKey(

    name: ''first_name'',

    required: true,

    includeIfNull: true,

    )

    final String firstName;

    Listing 9-23

    Use JsonKey

    ```


    `JsonValue`注解指定用于序列化的枚举值。在清单[9-24](#479501_1_En_9_Chapter.xhtml#PC24)中，`JsonValue`注解被添加到`Color`的所有枚举值上。


    ```

    enum Color {

    @JsonValue(''R'')

    Red,

    @JsonValue(''G'')

    Green,

    @JsonValue(''B'')

    Blue

    }

    Listing 9-24

    Use JsonValue

    ```


    `JsonLiteral`注解从文件中读取JSON数据并将内容转换为对象。它允许轻松访问静态JSON数据文件的内容。在清单[9-25](#479501_1_En_9_Chapter.xhtml#PC25)中，`JsonLiteral`注解被添加到`data`
    getter上。`_$dataJsonLiteral`是JSON文件中数据的生成变量。


    ```

    @JsonLiteral(''data.json'', asConst: true)

    Map get data => _$dataJsonLiteral;

    Listing 9-25

    Use JsonLiteral

    ```


    ## 9.9 处理XML数据


    ### 问题


    你想在Flutter应用中处理XML数据。


    ### 解决方案


    使用`xml`库。


    ### 讨论


    XML是一种流行的数据交换格式。你可以在Flutter应用中使用`xml`库来处理XML数据。首先，你需要将`xml: ^3.3.1`添加到`pubspec.yaml`文件的`dependencies`中。与JSON数据类似，XML数据有两种使用场景：


    *   解析XML文档并查询数据。


    *   构建XML文档。'
  raw: '### Discussion


    Using `jsonEncode()` and `jsonDecode()` functions from `dart:convert` library
    can easily work with simple JSON data. When the JSON data has a complicated structure,
    using these two functions is not quite convenient. When deserializing JSON strings,
    the results are usually lists or maps. If the JSON data has a nested structure,
    it’s not easy to extract the values from lists or maps. When serializing objects,
    you need to add `toJson()` methods to these classes to build the lists or maps.
    These tasks can be simplified using code generation with `json_annotation` and
    `json_serializable` libraries.


    The `json_annotation` library provides annotations to customize JSON serialization
    and deserialization behavior. The `json_serializable` library provides the build
    process to generate code that handles JSON data. To use these two libraries, you
    need to add them into `pubspec.yaml` file. In Listing [9-18](#479501_1_En_9_Chapter.xhtml#PC18),
    `json_serializable` library is added to `dependencies`, while `json_serializable`
    library is added to `dev_dependencies`.


    ```

    dependencies:

    json_annotation: ^2.0.0

    dev_dependencies:

    build_runner: ^1.0.0

    json_serializable: ^2.0.0

    Listing 9-18

    Add json_annotation and json_serializable

    ```


    In Listing [9-19](#479501_1_En_9_Chapter.xhtml#PC19), `Person` class is in the
    `json_serialize.dart` file. The annotation `@JsonSerializable()` means generating
    code for `Person` class. The generated code is in the `json_serialize.g.dart`
    file . Functions `_$PersonFromJson()` and `_$PersonToJson()` used in Listing [9-19](#479501_1_En_9_Chapter.xhtml#PC19)
    come from the generated file. The `_$PersonFromJson()` function is used in the
    `Person.fromJson()` constructor, while `_$PersonToJson()` function is used in
    the `toJson()` method.


    ```

    import ''package:json_annotation/json_annotation.dart'';

    part ''json_serialize.g.dart'';

    @JsonSerializable()

    class Person {

    Person({this.firstName, this.lastName, this.email});

    final String firstName;

    final String lastName;

    final String email;

    factory Person.fromJson(Map json) => _$PersonFromJson(json);

    Map toJson() => _$PersonToJson(this);

    }

    Listing 9-19

    Use json_serializable

    ```


    To generate the code, you need to run `flutter packages pub run build_runner build`
    command. Listing [9-20](#479501_1_En_9_Chapter.xhtml#PC20) shows the generated
    file.


    ```

    part of ''json_serialize.dart'';

    Person _$PersonFromJson(Map json) {

    return Person(

    firstName: json[''firstName''] as String,

    lastName: json[''lastName''] as String,

    email: json[''email''] as String);

    }

    Map _$PersonToJson(Person instance) => {

    ''firstName'': instance.firstName,

    ''lastName'': instance.lastName,

    ''email'': instance.email

    };

    Listing 9-20

    Generated code to handle JSON data

    ```


    `JsonSerializable` annotation has different properties to customize the behavior;
    see Table [9-8](#479501_1_En_9_Chapter.xhtml#Tab8).


    Table 9-8


    Properties of JsonSerializable


    | Name | Default value | Description |

    | --- | --- | --- |

    | `anyMap` | `false` | When true, use Map as the map type; otherwise, Map<String,
    dynamic> is used. |

    | `checked` | `false` | Whether to add extra checks to validate data types. |

    | `createFactory` | `true` | Whether to generate the function that converts maps
    to objects. |

    | `createToJson` | `true` | Whether to generate the function that can be used
    as toJson() function. |

    | `disallowUnrecognizedKeys` | `false` | When true, unrecognized keys are treated
    as an error; otherwise, they are ignored. |

    | `explicitToJson` | `false` | When true, generated toJson() function uses toJson
    on nested objects. |

    | `fieldRename` | `FieldRename.none` | Strategy to convert names of class fields
    to JSON map keys. |

    | `generateToJsonFunction` | `true` | When true, generate top-level function;
    otherwise, generate a mixin class with toJson() function. |

    | `includeIfNull` | `true` | Whether to include fields with null values. |

    | `nullable` | `true` | Whether to handle null values gracefully. |

    | `useWrappers` | `false` | Whether to use wrapper classes to minimize the usage
    of Map and List instances during serialization. |


    The `generateToJsonFunction` property determines how `toJson()` functions are
    generated. When the value is `true`, top-level functions like `_$PersonToJson()`
    in Listing [9-20](#479501_1_En_9_Chapter.xhtml#PC20) will be generated. In Listing
    [9-21](#479501_1_En_9_Chapter.xhtml#PC21), `generateToJsonFunction` property is
    set to `false` for `User` class.


    ```

    @JsonSerializable(

    generateToJsonFunction: false,

    )

    class User extends Object with _$UserSerializerMixin {

    User(this.name);

    final String name;

    }

    Listing 9-21

    User class

    ```


    In Listing [9-22](#479501_1_En_9_Chapter.xhtml#PC22), instead of a function, the
    `_$UserSerializerMixin` class is generated with `toJson()` method. `User` class
    in Listing [9-21](#479501_1_En_9_Chapter.xhtml#PC21) only needs to use this mixin
    class.


    ```

    User _$UserFromJson(Map json) {

    return User(json[''name''] as String);

    }

    abstract class _$UserSerializerMixin {

    String get name;

    Map toJson() => {''name'': name};

    }

    Listing 9-22

    Generated code for User class

    ```


    `JsonKey` annotation specifies how a field is serialized. Table [9-9](#479501_1_En_9_Chapter.xhtml#Tab9)
    shows properties of `JsonKey`.


    Table 9-9


    Properties of JsonKey


    | Name | Description |

    | --- | --- |

    | `name` | JSON map key. If null, the field name is used. |

    | `nullable` | Whether to handle null values gracefully. |

    | `includeIfNull` | Whether to include this field if the value is null. |

    | `ignore` | Whether to ignore this field. |

    | `fromJson` | A function to deserialize this field. |

    | `toJson` | A function to serialize this field. |

    | `defaultValue` | The value to use as the default value. |

    | `required` | Whether this field is required in the JSON map. |

    | `disallowNullValue` | Whether to disallow null values. |


    Listing [9-23](#479501_1_En_9_Chapter.xhtml#PC23) shows an example of using `JsonKey`.


    ```

    @JsonKey(

    name: ''first_name'',

    required: true,

    includeIfNull: true,

    )

    final String firstName;

    Listing 9-23

    Use JsonKey

    ```


    `JsonValue` annotation specifies the enum value used for serialization. In Listing
    [9-24](#479501_1_En_9_Chapter.xhtml#PC24), `JsonValue` annotation is added to
    all enum values of `Color`.


    ```

    enum Color {

    @JsonValue(''R'')

    Red,

    @JsonValue(''G'')

    Green,

    @JsonValue(''B'')

    Blue

    }

    Listing 9-24

    Use JsonValue

    ```


    `JsonLiteral` annotation reads JSON data from a file and converts the content
    into an object. It allows easy access to content of static JSON data files. In
    Listing [9-25](#479501_1_En_9_Chapter.xhtml#PC25), `JsonLiteral` annotation is
    added to the `data` getter. `_$dataJsonLiteral` is the generated variable of the
    data in the JSON file.


    ```

    @JsonLiteral(''data.json'', asConst: true)

    Map get data => _$dataJsonLiteral;

    Listing 9-25

    Use JsonLiteral

    ```


    ## 9.9 Handling XML Data


    ### Problem


    You want to handle XML data in Flutter apps.


    ### Solution


    Use `xml` library.


    ### Discussion


    XML is a popular data exchange format. You can use `xml` library to handle XML
    data in Flutter apps. You need to add `xml: ^3.3.1` to `dependencies` of `pubspec.yaml`
    file first. Similar with JSON data, there are two usage scenarios of XML data:


    *   Parse XML documents and query data.


    *   Build XML documents.'
