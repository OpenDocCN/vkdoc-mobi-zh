  trans: '

    ### 底部抽屉面板


    `BottomSheet` widget 显示在应用程序底部，用于提供额外信息。系统的分享面板就是底部抽屉面板的一个典型示例。底部抽屉面板有两种类型：


    * 持久性底部抽屉面板始终可见。持久性底部抽屉面板可以使用 `ScaffoldState.showBottomSheet` 函数和 `Scaffold` 构造函数的
    `bottomSheet` 参数来创建。

    * 模态底部抽屉面板的行为类似模态对话框。模态底部抽屉面板可以使用 `showModalBottomSheet` 函数来创建。


    `BottomSheet` 构造函数使用一个 `WidgetBuilder` 函数来创建实际内容。你还需要提供一个 `onClosing` 回调函数，该回调在底部抽屉面板开始关闭时被调用。清单
    7-20 展示了一个使用 `BottomSheet` 的示例。


    ```

    BottomSheet(

    onClosing: () {},

    builder: (context) {

    return Text(''Bottom'');

    },

    );

    Listing 7-20

    BottomSheet 示例

    ```


    ### Scaffold 状态


    `Scaffold` 是一个有状态 widget。你可以使用 `Scaffold.of()` 方法从构建上下文中获取最近 `Scaffold` widget
    的 `ScaffoldState` 对象。`ScaffoldState` 有不同的方法来与其他组件交互；请参见表 7-11。


    **表 7-11** `ScaffoldState` 的方法


    | 名称 | 描述 |

    | --- | --- |

    | `openDrawer()` | 打开抽屉。 |

    | `openEndDrawer()` | 打开末端侧的抽屉。 |

    | `showSnackBar(SnackBar snackbar)` | 显示 `SnackBar`。 |

    | `hideCurrentSnackBar()` | 隐藏当前的 `SnackBar`。 |

    | `removeCurrentSnackBar()` | 移除当前的 `SnackBar`。 |

    | `showBottomSheet()` | 显示一个持久性底部抽屉面板。 |


    ### SnackBar


    `SnackBar` widget 在屏幕底部显示一条消息，并可附带一个可选操作。要创建一个 `SnackBar` widget，构造函数需要 `content`
    参数来指定内容。`duration` 参数控制消息栏的显示时长。要向消息栏添加操作，你可以使用类型为 `SnackBarAction` 的 `action`
    参数。当提供操作时，按下操作按钮会关闭消息栏。


    要创建 `SnackBarAction` 实例，你需要提供 `label` 和 `onPressed` 回调。你可以使用 `textColor` 参数自定义按钮标签的颜色。消息栏操作的按钮只能被按下一次。


    `ScaffoldState` 的 `showSnackBar()` 方法用于显示一个 `SnackBar` widget。一次最多只能显示一个消息栏。如果在另一个消息栏仍然可见时调用
    `ScaffoldState()` 方法，则给定的消息栏会被添加到一个队列中，并在其他消息栏关闭后显示。`showSnackBar()` 方法的返回类型是
    `ScaffoldFeatureController<SnackBar, SnackBarClosedReason>`。`SnackBarClosedReason`
    是一个枚举，定义了消息栏可能被关闭的原因。


    清单 7-21 展示了一个打开消息栏的示例。


    ```

    Scaffold.of(context).showSnackBar(SnackBar(

    content: Text(''This is a message.''),

    action: SnackBarAction(label: ''OK'', onPressed: () {}),

    ));

    Listing 7-21

    SnackBar 示例

