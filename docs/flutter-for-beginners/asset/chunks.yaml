    Figure 2-12


    Output of the command `flutter analyze`


    ## 2.14 Managing Emulators


    ### Problem


    You want to manage different emulators used by Flutter SDK.


    ### Solution


    Use the command `flutter emulators`.


    ### Discussion


    When setting up the Android and iOS platforms for Flutter SDK, we also created
    emulators for Android and iOS. For Android, we can use AVD Manager to manage emulators.
    For iOS, we can use Xcode to manage simulators. It will be convenient if we can
    manage both Android emulators and iOS simulators in the same way. The command
    `flutter emulators` is the tool for managing emulators.


    Running `flutter emulators` shows all available emulators for Flutter SDK to use;
    see Figure [2-13](#479501_1_En_2_Chapter.xhtml#Fig13).


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig13_HTML.jpg](images/479501_1_En_2_Chapter/479501_1_En_2_Fig13_HTML.jpg)


    Figure 2-13


    Output of the command `flutter emulators`


    To start a simulator, use `flutter emulators --launch <emulator_id>`. The following
    command launches the `Nexus_6P_API_28` emulator. You only need to provide a partial
    ID to find the exact emulator to launch. The partial ID must only match one emulator.


    ```

    $ flutter emulators --launch Nexus

    ```


    We can also create a new Android emulator using `flutter emulators --create`.
    The following command creates a new emulator with the name `Pixel`. This command
    can only create emulators based on Pixel devices.


    ```

    $ flutter emulators --create --name Pixel

    ```


