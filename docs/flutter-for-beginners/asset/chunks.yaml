- fmt: '### Discussion


    Mobx ( [`https://mobx.js.org`](https://mobx.js.org) ) is a state management library
    which connects reactive data with the UI. MobX originates from developing web
    apps using JavaScript. It’s also ported to Dart ( [`https://mobx.pub`](https://mobx.pub)
    ). In Flutter apps, we can use `mobx` and `flutter_mobx` packages to build apps
    with Mobx. Mobx for Flutter uses `build_runner` package to generate code for the
    store. The `build_runner` and `mobx_codegen` packages need to be added as `dev_dependencies`
    to `pubspec.yaml` file.


    Mobx uses observables to manage the state. The whole state of an app consists
    of core state and derived state. Derived state is computed from core state. Actions
    mutate observables to update the state. Reactions are observers of the state and
    get notified whenever an observable they track is changed. In Flutter app, the
    reactions are used to update the widgets.


    Comparing to Redux for Flutter, Mobx uses code generation to simplify the usage
    of store. You don’t need to write boilerplate code to create actions. Mobx provides
    several annotations. You just annotate the code with these annotations. This is
    similar with how `json_annotation` and `json_serialize` packages work. We’ll use
    the same example of showing job listings on GitHub to demonstrate the usage of
    Mobx. Add this package to your `pubspec.yaml` file if it is not already present.


    Listing [10-27](#479501_1_En_10_Chapter.xhtml#PC27) shows the basic code of `jobs_store.dart`
    file for the Mobx store. This file uses the generated part file `jobs_store.g.dart`.
    `_JobsStore` is the abstract class of the store for jobs. It implements `Store`
    class from Mobx. Here we defined two observables using `@observable` annotation.
    The first observable `keyword` is a simple string that manages the current search
    keyword. The `getJobsFuture` observable is an `ObservableFuture<List<Job>>` object
    that manages the asynchronous operation to get the jobs using API. Those properties
    marked using `@computed` annotation are derived observables to check the status
    of data loading. We also define two actions using `@action` annotation. The `setKeyword()`
    action sets the `getJobsFuture` observable to an empty state and `keyword` observable
    to the provided value. The `getJobs()` action uses `GitHubJobsClient.getJobs()`
    method to load the data. The `getJobsFuture` observable is updated to an `ObservableFuture`
    object wrapping the returned future.


    ```

    import ''package:meta/meta.dart'';

    import ''package:mobx/mobx.dart'';

    part ''jobs_store.g.dart'';

    class JobsStore = _JobsStore with _$JobsStore;

    abstract class _JobsStore implements Store {

    _JobsStore({@required this.jobsClient}) : assert(jobsClient != null);

    final GitHubJobsClient jobsClient;

    @observable

    String keyword = ";

    @observable

    ObservableFuture<List<Job>> getJobsFuture = emptyResponse;

    @computed

    bool get empty => getJobsFuture == emptyResponse;

    @computed

    bool get hasResults =>

    getJobsFuture != emptyResponse &&

    getJobsFuture.status == FutureStatus.fulfilled;

    @computed

    bool get loading =>

    getJobsFuture != emptyResponse &&

    getJobsFuture.status == FutureStatus.pending;

    @computed

    bool get hasError =>

    getJobsFuture != emptyResponse &&

    getJobsFuture.status == FutureStatus.rejected;

    static ObservableFuture<List<Job>> emptyResponse = ObservableFuture.value([]);

    List<Job> jobs = [];

    @action

    Future<List<Job>> getJobs() async {

    jobs = [];

    final future = jobsClient.getJobs(keyword);

    getJobsFuture = ObservableFuture(future);

    return jobs = await future;

    }

    @action

    void setKeyword(String keyword) {

    getJobsFuture = emptyResponse;

    this.keyword = keyword;

    }

    }

    Listing 10-27

    Mobx store

    ```


    The `flutter packages pub run build_runner build` command is required to generate
    code. `JobsStore` class is the store to use. Listing [10-28](#479501_1_En_10_Chapter.xhtml#PC28)
    shows the widget that uses the store. In the `onPressed` callback of the search
    button, `setKeyword()` method is called first to update the keyword, then `getJobs()`
    method is called to trigger the data loading. The `Observer` widget uses a build
    function to build the UI using computed observables and fields in `JobsStore`
    object. Whenever these observables change, `Observer` widget rebuilds to update
    the UI.


    ```

