    在清单 10-14 中，`ScopedModelText`组件展示了如何在后代组件中使用模型。`ScopedModelDescendant`组件用于获取最近的封闭模型对象。类型参数决定了要获取的模型对象。`builder`参数指定了用于构建组件的构建函数。该构建函数有三个参数。第一个参数的类型是`BuildContext`，这在构建函数中很常见。最后一个参数是模型对象。如果组件
    UI 的某一部分不依赖于模型，并且不应在模型更改时重建，你可以将其指定为`ScopedModelDescendant`组件的`child`参数，并在构建函数的第二个参数中访问它。


