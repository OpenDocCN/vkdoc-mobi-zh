- fmt: '### Discussion


    `Navigator`实例管理自己的路由栈。对于简单的应用，通常一个`Navigator`实例就足够了，并且可以直接使用由`WidgetsApp`、`MaterialApp`或`CupertinoApp`创建的`Navigator`实例。如果应用具有复杂的页面流程，可能需要使用嵌套导航器。由于`Navigator`本身也是一个
    widget，因此可以像创建普通 widget 一样创建`Navigator`实例。由`WidgetsApp`、`MaterialApp`或`CupertinoApp`创建的`Navigator`实例成为根导航器。所有导航器都按层级结构组织。要获取根导航器，可以在调用`Navigator.of()`方法时将`rootNavigator`参数设为`true`。表[8-6](#479501_1_En_8_Chapter.xhtml#Tab6)展示了`Navigator`构造函数的参数。


    **表 8-6**

    **`Navigator` 的参数**


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `onGenerateRoute` | `RouteFactory` | 为给定的`RouteSettings`对象生成一个路由。 |

    | `onUnknownRoute` | `RouteFactory` | 处理未知路由。 |

    | `initialRoute` | `String` | 第一个路由的名称。 |

    | `observers` | `List<NavigatorObserver>` | 导航器状态变化的观察者。 |


    让我们用一个具体例子来说明如何使用嵌套导航器。假设你正在构建一个社交新闻阅读应用，在新用户注册后，你希望向用户展示一个可选的引导页面。这个引导页面有几个步骤需要用户完成。用户可以来回切换，只完成感兴趣的步骤。用户也可以跳过此页面并返回应用的主页。引导页面有自己的导航器来处理步骤间的导航。


    在列表[8-16](#479501_1_En_8_Chapter.xhtml#PC16)中，导航器有两个命名路由。初始路由设置为`on_boarding/topic`，因此首先显示`UserOnBoardingTopicPage`。


    ```

    class UserOnBoardingPage extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Get Started''),

    ),

    body: Navigator(

    initialRoute: ''on_boarding/topic'',

    onGenerateRoute: (RouteSettings settings) {

    WidgetBuilder builder;

    switch (settings.name) {

    case ''on_boarding/topic'':

    builder = (BuildContext context) {

    return UserOnBoardingTopicPage();

    };

    break;

    case ''on_boarding/follower'':

    builder = (BuildContext context) {

    return UserOnBoardingFollowPage();

    };

    break;

    }

    return MaterialPageRoute(

    builder: builder,

    settings: settings,

    );

    },

    ),

    );

    }

    }

    ```

    **列表 8-16**

    **用户引导页面**


    在列表[8-17](#479501_1_En_8_Chapter.xhtml#PC17)中，按下“Next”按钮会导航到路由名为`on_boarding/follower`的下一步。按下“Done”按钮则会使用根导航器弹出引导页面。


    ```

    class UserOnBoardingTopicPage extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Column(

    children: [

    Text(''Select interested topics''),

    RaisedButton.icon(

    icon: Icon(Icons.arrow_forward),

    label: Text(''Next''),

    onPressed: () {

    Navigator.pushNamed(context, ''on_boarding/follower'');

    },

    ),

    RaisedButton.icon(

    icon: Icon(Icons.check),

    label: Text(''Done''),

    onPressed: () {

    Navigator.of(context, rootNavigator: true).pop();

    },

    )

    ],

    );

    }

    }

    ```

    **列表 8-17**

    **选择话题步骤**


    图[8-6](#479501_1_En_8_Chapter.xhtml#Fig6)展示了列表[8-17](#479501_1_En_8_Chapter.xhtml#PC17)中代码的截图。


    ![../images/479501_1_En_8_Chapter/479501_1_En_8_Fig6_HTML.jpg](images/479501_1_En_8_Chapter/479501_1_En_8_Fig6_HTML.jpg)

    **图 8-6**

    **选择话题步骤**


    `CupertinoTabView`拥有自己的导航器实例。创建`CupertinoTabView`时，可以提供`routes`、`onGenerateRoute`、`onUnknownRoute`和`navigatorObservers`参数。这些参数用于配置`Navigator`实例。当使用`CupertinoTabScaffold`创建标签布局时，每个标签视图都有自己的导航状态和历史记录。


    使用嵌套导航器时，确保使用正确的导航器实例非常重要。如果要显示和关闭全屏页面或模态对话框，应该使用通过`Navigator.of(context, rootNavigator:
    true)`获取的根导航器。调用`Navigator.of(context)`只能获取最近封闭的`Navigator`实例。在层级结构中无法获取中间的`Navigator`实例。你需要在
    widget 树的正确位置使用`BuildContext`对象。像`showDialog()`和`showMenu()`这样的函数内部总是使用`Navigator.of(context)`。你只能通过传入的`BuildContext`对象来控制这些函数使用哪个`Navigator`实例。


    ## 8.11 观察导航器状态变化


    ### 问题


    当导航器状态发生变化时，你希望收到通知。


    ### 解决方案


    使用`NavigatorObserver`。'
  raw: '### Discussion


    A `Navigator` instance manages its own stack of routes. For simple apps, one `Navigator`
    instance is generally enough, and you can simply use the `Navigator` instance
    created by `WidgetsApp`, `MaterialApp`, or `CupertinoApp`. If your app has complicated
    page flows, you may need to use nested navigators. Since `Navigator` itself is
    also a widget, `Navigator` instances can be created like normal widgets. The `Navigator`
    instance created by `WidgetsApp`, `MaterialApp`, or `CupertinoApp` becomes the
    root navigator. All navigators are organized in a hierarchy. To get the root navigator,
    you can set `rootNavigator` parameter to `true` when invoking `Navigator.of()`
    method. Table [8-6](#479501_1_En_8_Chapter.xhtml#Tab6) shows parameters of `Navigator`
    constructor.


    Table 8-6


    Parameters of Navigator


    | Name | Type | Description |

    | --- | --- | --- |

    | `onGenerateRoute` | `RouteFactory` | Generate a route for a given `RouteSettings`
    object. |

    | `onUnknownRoute` | `RouteFactory` | Handle unknown routes. |

    | `initialRoute` | `String` | Name of the first route. |

    | `observers` | `List<NavigatorObserver>` | Observers of state changes in the
    navigator. |


    Let’s use a concrete example to explain how nested navigators can be used. Suppose
    that you are building a social news reading app, after a new user is signed up,
    you want to show the user an optional on-boarding page. This on-boarding page
    has several steps for the user to complete. The user can go back and forth to
    only complete interested steps. The user can also skip this page and return to
    app’s home page. The on-boarding page has its own navigator to handle navigation
    of steps.


    In Listing [8-16](#479501_1_En_8_Chapter.xhtml#PC16), the navigator has two named
    routes. The initial route is set to `on_boarding/topic`, so `UserOnBoardingTopicPage`
    is displayed first.


    ```

    class UserOnBoardingPage extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Get Started''),

    ),

    body: Navigator(

    initialRoute: ''on_boarding/topic'',

    onGenerateRoute: (RouteSettings settings) {

    WidgetBuilder builder;

    switch (settings.name) {

    case ''on_boarding/topic'':

    builder = (BuildContext context) {

    return UserOnBoardingTopicPage();

    };

    break;

    case ''on_boarding/follower'':

    builder = (BuildContext context) {

    return UserOnBoardingFollowPage();

    };

    break;

    }

    return MaterialPageRoute(

    builder: builder,

    settings: settings,

    );

    },

    ),

    );

    }

    }

    Listing 8-16

    User on-boarding page

    ```


    In Listing [8-17](#479501_1_En_8_Chapter.xhtml#PC17), pressing the “Next” button
    navigates to the next step with route name `on_boarding/follower`. Pressing the
    “Done” button uses the root navigator to pop off the on-boarding page.


    ```

    class UserOnBoardingTopicPage extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Column(

    children: [

    Text(''Select interested topics''),

    RaisedButton.icon(

    icon: Icon(Icons.arrow_forward),

    label: Text(''Next''),

    onPressed: () {

    Navigator.pushNamed(context, ''on_boarding/follower'');

    },

    ),

    RaisedButton.icon(

    icon: Icon(Icons.check),

    label: Text(''Done''),

    onPressed: () {

    Navigator.of(context, rootNavigator: true).pop();

    },

    )

    ],

    );

    }

    }

    Listing 8-17

    Step to select topics

    ```


    Figure [8-6](#479501_1_En_8_Chapter.xhtml#Fig6) shows the screenshot of code in
    Listing [8-17](#479501_1_En_8_Chapter.xhtml#PC17).


    ![../images/479501_1_En_8_Chapter/479501_1_En_8_Fig6_HTML.jpg](images/479501_1_En_8_Chapter/479501_1_En_8_Fig6_HTML.jpg)


    Figure 8-6


    Step to select topics


    `CupertinoTabView` has its own navigator instance. When creating `CupertinoTabView`,
    you can provide `routes`, `onGenerateRoute`, `onUnknownRoute`, and `navigatorObservers`
    parameters. These parameters are used to configure the `Navigator` instance. When
    using `CupertinoTabScaffold` to create tab layout, each tab view has its own navigation
    state and history.


    When using nested navigators, it’s important to make sure that the correct navigator
    instance is used. If you want to show and close full-screen pages or modal dialogs,
    you should use the root navigator obtained by `Navigator.of(context, rootNavigator:
    true)`. Invoking `Navigator.of(context)` can only get the nearest enclosing `Navigator`
    instance. There is no way to get intermediate `Navigator` instances in the hierarchy.
    You need to use the `BuildContext` object at the correct location of the widgets
    tree. Functions like `showDialog()` and `showMenu()` always use `Navigator.of(context)`
    internally. You can only use the passed-in `BuildContext` object to control which
    `Navigator` instance is used by these functions.


    ## 8.11 Observing Navigator State Changes


    ### Problem


    You want to get notified when state of navigator is changed.


    ### Solution


    Use `NavigatorObserver`.'
