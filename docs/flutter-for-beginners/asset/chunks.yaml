    ## 9.12 连接到 WebSocket


    ### 问题


    你希望在 Flutter 应用中连接到 WebSocket 服务器。


    ### 解决方案


    使用 `dart:io` 库中的 `WebSocket` 类。


    ### 讨论


    WebSocket 广泛应用于 Web 应用，以提供浏览器和服务器之间的双向通信。它们还可以提供后端数据的实时更新。如果你已经有一个与浏览器中运行的 Web
    应用交互的 WebSocket 服务器，你可能也希望在 Flutter 应用中提供相同的功能。`dart:io` 库中的 `WebSocket` 类可用于实现
    WebSocket 连接。


    静态的 `WebSocket.connect()` 方法用于连接 WebSocket 服务器。你需要提供带有 `ws` 或 `wss` 协议的服务器 URL。你可以选择性地提供一个子协议列表和一个请求头映射表。`connect()`
    方法的返回值是一个 `Future<WebSocket>` 对象。`WebSocket` 类实现了 `Stream` 类，因此你可以将来自服务器的数据作为流来读取。要向服务器发送数据，可以使用
    `add()` 和 `addStream()` 方法。


    在清单 9-34 中，WebSocket 连接到了演示回显服务器。通过使用 `listen()` 方法订阅 `WebSocket` 对象，我们可以处理来自服务器的数据。两次
    `add()` 方法调用向服务器发送了两条消息。


    ```

    WebSocket.connect(''ws://demos.kaazing.com/echo'').then((WebSocket webSocket)
    {

    webSocket.listen(print, onError: print);

    webSocket.add(''hello'');

    webSocket.add(''world'');

    webSocket.close();

    }).catchError(print);

    清单 9-34

    连接到 WebSocket

    ```


    ## 9.13 连接到 Socket


    ### 问题


    你希望连接到 Socket 服务器。


    ### 解决方案


    使用 `dart:io` 库中的 `Socket` 类。


    ### 讨论


    如果你希望在 Flutter 应用中连接 Socket 服务器，可以使用 `dart:io` 库中的 `Socket` 类。静态的 `Socket.connect()`
    方法用于连接指定 `host` 和 `port` 的 Socket 服务器，并返回一个 `Future<Socket>` 对象。`Socket` 类实现了
    `Stream<List<int>>`，因此你可以通过订阅流来读取来自服务器的数据。要向服务器发送数据，可以使用 `add()` 和 `addStream()`
    方法。


    在清单 9-35 中，一个 Socket 服务器在端口 `10080` 上启动。该服务器将接收到的字符串转换为大写并返回结果。


    ```

    import ''dart:io'';

    import ''dart:convert'';

    void main() {

    ServerSocket.bind(''127.0.0.1'', 10080).then((serverSocket) {

    serverSocket.listen((socket) {

    socket.addStream(socket

    .transform(utf8.decoder)

    .map((str) => str.toUpperCase())

    .transform(utf8.encoder));

    });

    });

    }

    清单 9-35

