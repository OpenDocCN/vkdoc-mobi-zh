    | `inheritFromElement` | 将此`BuildContext`注册到给定的祖先`InheritedElement`，以便当祖先的`widget`发生变化时，此`BuildContext`会重新构建。\
    \ |\n| `inheritFromWidgetOfExactType` | 获取给定类型的最近`InheritedWidget`，并注册此`BuildContext`，以便当该`widget`发生变化时，此`BuildContext`会重新构建。\
    \ |\n| `visitAncestorElements` | 访问祖先元素。 |\n| `visitChildElements` | 访问子元素。 |\n\
    \n`BuildContext`实际上是`Element`类的接口。在`StatelessWidget.build()`和`State.build()`方法中，`BuildContext`对象代表当前`widget`被膨胀的位置。在清单\
    \ 4-1 中，使用了`ancestorWidgetOfExactType()`方法来获取类型为`Column`的祖先`widget`。\n\n```\n\
    class WithBuildContext extends StatelessWidget {\n@override\nWidget build(BuildContext\
    \ context) {\nColumn column = context.ancestorWidgetOfExactType(Column);\nreturn\
    \ Text(column.children.length.toString());\n}\n}\n```\n\n**清单 4-1**  \n使用 BuildContext\n\
    \n## 4.3 理解无状态小部件\n\n### 问题\n\n你想创建一个没有可变状态的`widget`。\n\n### 解决方案\n\n继承`StatelessWidget`类。\n\
    \n### 讨论\n\n当使用`widget`来描述用户界面的某一部分时，如果该部分可以完全通过`widget`自身的配置信息和其被膨胀时的`BuildContext`来描述，那么这个`widget`应该继承自`StatelessWidget`。创建`StatelessWidget`类时，你需要实现`build()`方法，该方法接受一个`BuildContext`并返回一个`Widget`。在清单\
    \ 4-2 中，`HelloWorld`类继承自`StatelessWidget`类，并在`build()`方法中返回了一个`Center` widget。\n\
    \n```\nclass HelloWorld extends StatelessWidget {\nconst HelloWorld({Key key})\
    \ : super(key: key);\n@override\nWidget build(BuildContext context) {\nreturn\
    \ Center(\nchild: Text('Hello World!'),\n);\n}\n}\n```\n\n**清单 4-2**  \nStatelessWidget\
    \ 示例\n\n## 4.4 理解有状态小部件\n\n### 问题\n\n你想创建一个具有可变状态的`widget`。\n\n### 解决方案\n\n继承`StatefulWidget`类。\n"
- fmt: '### Discussion


    If a part of user interface may change dynamically, you need to extend from `StatefulWidget`
    class. `StatefulWidget`s themselves are immutable with states managed in `State`
    objects created by them. A `StatefulWidget` subclass needs to implement the `createState()`
    method that returns a `State<StatefulWidget>` object. When the state changes,
    the `State` object should call `setState()` method to notify the framework to
    trigger the update. In Listing [4-3](#479501_1_En_4_Chapter.xhtml#PC3), `_CounterState`
    class is the `State` object of the `Counter` widget. When the button is pressed,
    the value is updated in the `setState()` method, which updates the `_CounterState`
    widget to show the new value.


    ```

    class Counter extends StatefulWidget {

    @override

    _CounterState createState() => _CounterState();

    }

    class _CounterState extends State {

    int value = 0;

    @override

    Widget build(BuildContext context) {

    return Row(

    children: [

    Text(''$value''),

    RaisedButton(

    child: Text(''+''),

    onPressed: () {

    setState(() {

    value++;

    });

    },

    ),

    ],

    );

    }

    }

    Listing 4-3

    Example of StatefulWidget

    ```


    ## 4.5 Understanding Inherited Widget


    ### Problem


    You want to propagate data down the widgets tree.


    ### Solution


    Extend from `InheritedWidget` class.


    ### Discussion


    When building a subtree of widgets, you may need to propagate data down the widgets
    tree. For example, your root widget of a subtree may define some context data,
    for example, configuration data retrieved from the server. Other widgets in the
    subtree may also need to access the context data. One possible way is to add the
    context data to a widget’s constructor, then propagate the data as constructor
    parameter of children widgets. The major drawback of this solution is that you
    need to add the constructor parameter to all widgets in the subtree. Even though
    some widgets may not actually need the data, they still need to have the data
    to pass to their children widgets.


    A better approach is to use `InheritedWidget` class. `BuildContext` class has
    an `inheritFromWidgetOfExactType()` method to get the nearest instance of a particular
    type of `InheritedWidget`. With `InheritedWidget`, you can store the context data
    in an `InheritedWiget` instance. If a widget needs to access the context data,
    you can use `inheritFromWidgetOfExactType()` method to get the instance and access
    the data. If an inherited widget changes state, it will cause its consumers to
    rebuild.


    In Listing [4-4](#479501_1_En_4_Chapter.xhtml#PC4), `ConfigWidget` class has the
    data `config`. The static `of()` method gets the nearest ancestor `ConfigWidget`
    instance for the `config` value. The method `updateShouldNotify()` determines
    when the consumer widgets should be notified.


    ```

    class ConfigWidget extends InheritedWidget {

    const ConfigWidget({

    Key key,

    @required this.config,

    @required Widget child,

    })  : assert(config != null),

    assert(child != null),

    super(key: key, child: child);

    final String config;

    static String of(BuildContext context) {

    final ConfigWidget configWidget =

    context.inheritFromWidgetOfExactType(ConfigWidget);

    return configWidget?.config ?? ";

    }

    @override

    bool updateShouldNotify(ConfigWidget oldWidget) {

    return config != oldWidget.config;

    }

    }

    Listing 4-4

    Example of InheritedWidget

    ```


    In Listing [4-5](#479501_1_En_4_Chapter.xhtml#PC5), `ConfigUserWidget` class uses
    the `ConfigWidget.of()` method to get the `config` value.


    ```

    class ConfigUserWidget extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Text(''Data is ${ConfigWidget.of(context)}'');

    }

    }

    Listing 4-5

    Use of ConfigWidget

    ```


    In Listing [4-6](#479501_1_En_4_Chapter.xhtml#PC6), `ConfigWidget` instance has
    a `config` value of “Hello!” and a descendant `ConfigUserWidget` instance.


    ```

    ConfigWidget(

    config: ''Hello!'',

    child: Center(

    child: ConfigUserWidget(),

    ),

    );

    Listing 4-6

    Complete example

    ```


    ## 4.6 Displaying Text


    ### Problem


    You want to display some text.


    ### Solution


    Use the `Text` and `RichText` widgets.


    ### Discussion


    Almost all apps need to display some text to the end users. Flutter provides several
    classes related to text. `Text` and `RichText` are the two widgets to display
    text. In fact, `Text` uses `RichText` internally. The `build()` method of `Text`
    widget returns a `RichText` instance. The difference between `Text` and `RichText`
    is that `Text` uses the style from the closest enclosing `DefaultTextStyle` object,
    while `RichText` requires explicit style.


    ### Text


    Text has two constructors. The first constructor `Text()` accepts a `String` as
    the text to display. Another constructor `Text.rich()` accepts a `TextSpan` object
    to represent both text and style. The simplest form to create a `Text` widget
    is `Text(''Hello world'')`, which displays text using the style from the closest
    enclosing `DefaultTextStyle` object. Both `Text()` and `Text.rich()` constructors
    have several named parameters to customize them; see Table [4-2](#479501_1_En_4_Chapter.xhtml#Tab2).


    **Table 4-2** Named parameters of `Text()` and `Text.rich()`


    | Name | Type | Description |

    | --- | --- | --- |

    | `style` | `TextStyle` | Style of the text. |

    | `textAlign` | `TextAlign` | How text should be aligned horizontally. |

    | `textDirection` | `TextDirection` | Direction of text. |

    | `locale` | `Locale` | Locale to select font based on Unicode. |

    | `softWrap` | `bool` | Whether to break text at soft line breaks. |

    | `overflow` | `TextOverflow` | How to handle text overflow. |

    | `textScaleFactor` | `double` | The factor to scale the text. |

    | `maxLines` | `int` | The maximum number of lines. If the text exceeds the limit,
    it will be truncated according to the strategy specified in overflow. |

    | `semanticsLabel` | `String` | Semantics label for the text. |


    `TextAlign` is an enum type with values shown in Table [4-3](#479501_1_En_4_Chapter.xhtml#Tab3).


    **Table 4-3** `TextAlign` values


    | Name | Description |

    | --- | --- |

    | `left` | Align text on the left edge of its container. |

    | `right` | Align text on the right edge of its container. |

    | `center` | Align text in the center of its container. |

    | `justify` | For lines of text end with soft line breaks, stretch these lines
    to fill the width of the container; for lines of text end with hard line breaks,
    align them toward the start edge. |

    | `start` | Align text on the leading edge of its container. The leading edge
    is the left edge for left-to-right text, while it’s the right edge for right-to-left
    text. |

    | `end` | Align text on the trailing edge of its container. The trailing edge
    is the opposite of the leading edge. |


    It’s recommended to always use `TextAlign` values `start` and `end` instead of
    `left` and `right` to better handle bidirectional text. `TextDirection` is an
    enum type with values `ltr` and `rtl`. `TextOverflow` is an enum type with values
    shown in Table [4-4](#479501_1_En_4_Chapter.xhtml#Tab4).


    **Table 4-4** `TextOverflow` values


    | Name | Description |

    | --- | --- |

    | `clip` | Clip the overflowing text. |

    | `fade` | Fade the overflowing text to be transparent. |

    | `ellipsis` | Add an ellipsis after the overflowing text. |


    `DefaultTextStyle` is an `InheritedWidget` that has properties `style`, `textAlign`,
    `softWrap`, `overflow`, and `maxLines` which have the same meaning as named parameters
    shown in Table [4-2](#479501_1_En_4_Chapter.xhtml#Tab2). If a named parameter
    is provided in the constructors `Text()` and `Text.rich()`, then the provided
    value overrides the value in the nearest ancestor `DefaultTextStyle` object. Listing
    [4-7](#479501_1_En_4_Chapter.xhtml#PC7) shows several examples of using `Text`
    widget.


    ```

    Text(''Hello World'')

    Text(

    ''Bigger Bold Text'',

    style: TextStyle(fontWeight: FontWeight.bold),

    textScaleFactor: 2.0,

    );

    Text(

    ''Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor
    incididunt'',

    maxLines: 1,

    overflow: TextOverflow.ellipsis,

    );

    Listing 4-7

    Examples of Text

    ```'
