    ### Problem


    You want to know the built-in types of Dart.


    ### Solution


    Dart has built-in types of numbers, strings, booleans, lists, maps, runes, and
    symbols.


    ### Discussion


    Dart has several built-in types, including numbers, strings, booleans, lists,
    maps, runes, and symbols.'
