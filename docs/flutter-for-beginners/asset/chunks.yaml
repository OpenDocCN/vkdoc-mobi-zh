    \ valid to go forward in history. |\n| `clearCache()` | Clear the cache. |\n|\
    \ `currentUrl()` | Get the current URL. |\n\nListing [12-9](#479501_1_En_12_Chapter.xhtml#PC10)\
    \ shows an example of using the `WebView` widget to interact with the Google Search\
    \ page. Because the creation of the `WebView` widget is asynchronous, the `Completer<WebViewController>`\
    \ object is used to capture the `WebViewController` object. In the `onWebViewCreated`\
    \ callback, the `Completer<WebViewController>` object is completed with the created\
