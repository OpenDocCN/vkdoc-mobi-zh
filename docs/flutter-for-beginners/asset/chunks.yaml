    仅仅是创建 `BoxDecoration(color: color)` 的一种简写。如果 `width` 或 `height` 不为空，则它们的值将用于收紧约束。


    **表 5-7** `Container` 的命名参数


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `alignment` | `AlignmentGeometry` | 子组件的对齐方式。 |

