    ## 10.5 使用作用域模型管理状态


    ### 问题


    你想要一个简单的解决方案来处理模型变化。


    ### 解决方案


    使用 `scoped_model` 包。

    '
- fmt: '### Discussion


    在 Recipes 10-1、10-2、10-3 和 10-4 中，你已经看到使用`StatefulWidget`、`InheritedWidget`、`InheritedModel`和`InheritedNotifier`这些组件来管理状态。这些组件由
    Flutter 框架提供。由于这些组件是底层 API，因此在复杂应用中用起来并不方便。`scoped_model`包（[`https://pub.dev/packages/scoped_model`](https://pub.dev/packages/scoped_model)）是一个库，可以让你轻松地将数据模型从父组件向下传递给它的后代组件。它建立在`InheritedWidget`之上，但提供了易于使用的
    API。要使用这个包，你需要在`pubspec.yaml`文件的`dependencies`中添加`scoped_model: ^1.0.1`。我们将使用与
    Recipe 10-2 相同的示例来演示`scoped_model`包的用法。


    清单 [10-13](#479501_1_En_10_Chapter.xhtml#PC13) 展示了使用`scoped_model`包的`Config`模型。`Config`类继承自`Model`类。它有私有字段来存储状态。`setColor()`和`increaseFontSize()`方法分别更新`_color`和`_fontSize`字段。这两个方法在内部使用`notifyListeners()`来通知后代组件进行重建。


    ```

    import ''package:scoped_model/scoped_model.dart'';

    class Config extends Model {

    Color _color = Colors.red;

    double _fontSize = 16.0;

    Color get color => _color;

    double get fontSize => _fontSize;

    void setColor(Color color) {

    _color = color;

    notifyListeners();

    }

    void increaseFontSize() {

    _fontSize += 1;

    notifyListeners();

    }

    }

    Listing 10-13

    Config model as scoped model

    ```


    在清单 [10-14](#479501_1_En_10_Chapter.xhtml#PC14) 中，`ScopedModelText`组件展示了如何在后代组件中使用模型。`ScopedModelDescendant`组件用于获取最近的封闭模型对象。类型参数决定了要获取的模型对象。`builder`参数指定了用于构建组件的构建函数。该构建函数有三个参数。第一个参数的类型是`BuildContext`，这在构建函数中很常见。最后一个参数是模型对象。如果部件
    UI 的某一部分不依赖于模型，并且不应在模型更改时重建，你可以将其指定为`ScopedModelDescendant`组件的`child`参数，并在构建函数的第二个参数中访问它。


    ```

    class ScopedModelText extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return ScopedModelDescendant(

    builder: (BuildContext context, Widget child, Config config) {

    return Text(

    ''Font size: ${config.fontSize}'',

    style: TextStyle(

    color: config.color,

    fontSize: config.fontSize,

    ),

    );

    },

    );

    }

    }

    Listing 10-14

    ScopedModelText uses ScopedModelDescendant

    ```


    在清单 [10-15](#479501_1_En_10_Chapter.xhtml#PC15) 中，`ScopedModelUpdater`组件简单地使用`setColor()`和`increaseFontSize()`方法来更新状态。


    ```

    class ScopedModelUpdater extends StatelessWidget {

    static const List _colors = [Colors.red, Colors.green, Colors.blue];

    @override

    Widget build(BuildContext context) {

    return ScopedModelDescendant(

    builder: (BuildContext context, Widget child, Config config) {

    return Column(

    children: [

    DropdownButton(

    value: config.color,

    items: _colors.map((Color color) {

    return DropdownMenuItem(

    value: color,

    child: Text(color.toString()),

    );

    }).toList(),

    onChanged: (Color color) {

    config.setColor(color);

    },

    ),

    RaisedButton(

    child: Text(''Increase font size''),

    onPressed: () {

    config.increaseFontSize();

    },

    )

    ],

    );

    },

    );

    }

    }

    Listing 10-15

    ScopedModelUpdater to update Config object

    ```


    清单 [10-16](#479501_1_En_10_Chapter.xhtml#PC16) 中的`ScopedModel`组件是将`Model`和`ScopedModelDescendant`结合在一起的最后一部分。`model`参数指定了由`ScopedModel`对象管理的模型对象。`ScopedModel`对象下的所有`ScopedModelDescendant`组件都会获取到同一个模型对象。


    ```

    class ScopedModelPage extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Scoped Model''),

    ),

    body: ScopedModel(

    model: Config(),

    child: Column(

    children: [

    ScopedModelUpdater(),

    ScopedModelText()

    ],

    ),

    ),

    );

    }

    }

    Listing 10-16

    ScopedModelPage uses ScopedModel

    ```


    你也可以使用静态方法`ScopedModel.of()`来获取`ScopedModel`对象，然后通过其`model`属性获取模型对象。


    ## 10.6 使用 Bloc 管理状态


    ### 问题


    你想使用 Bloc 模式来管理状态。


    ### 解决方案


    使用`bloc`和`flutter_bloc`包。'
  raw: '### Discussion


    In Recipes 10-1, 10-2, 10-3, and 10-4, you have seen the usage of `StatefulWidget`,
    `InheritedWidget`, `InheritedModel`, and `InheritedNotifier` widgets to manage
    state. These widgets are provided by Flutter framework. These widgets are low-level
    APIs, so they are inconvenient to use in complex apps. The `scoped_model` package
    ( [`https://pub.dev/packages/scoped_model`](https://pub.dev/packages/scoped_model)
    ) is a library to allow easily passing a data model from a parent widget down
    to its descendants. It’s built on top of `InheritedWidget`, but with an easy-to-use
    API. To use this package, you need to add `scoped_model: ^1.0.1` to the `dependencies`
    of `pubspec.yaml` file. We’ll use the same example as in Recipe 10-2 to demonstrate
    the usage of `scoped_model` package.


    Listing [10-13](#479501_1_En_10_Chapter.xhtml#PC13) shows the `Config` model using
    `scoped_model` package. The `Config` class extends from `Model` class. It has
    private fields to store the state. The `setColor()` and `increaseFontSize()` methods
    update `_color` and `_fontSize` fields, respectively. These two methods use `notifyListeners()`
    internally to notify descendant widgets to rebuild.


    ```

    import ''package:scoped_model/scoped_model.dart'';

    class Config extends Model {

    Color _color = Colors.red;

    double _fontSize = 16.0;

    Color get color => _color;

    double get fontSize => _fontSize;

    void setColor(Color color) {

    _color = color;

    notifyListeners();

    }

    void increaseFontSize() {

    _fontSize += 1;

    notifyListeners();

    }

    }

    Listing 10-13

    Config model as scoped model

    ```


    In Listing [10-14](#479501_1_En_10_Chapter.xhtml#PC14), `ScopedModelText` widget
    shows how to use the model in descendant widgets. `ScopedModelDescendant` widget
    is used to get the nearest enclosing model object. The type parameter determines
    the model object to get. The `builder` parameter specified the build function
    to build the widget. The build function has three parameters. The first parameter
    of type `BuildContext` is common for build functions. The last parameter is the
    model object. If a portion of the widget UI doesn’t rely on the model and should
    not be rebuilt when model changes, you can specify it as the `child` parameter
    of `ScopedModelDescendant` widget and access it in the second parameter of the
    build function.


    ```

    class ScopedModelText extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return ScopedModelDescendant(

    builder: (BuildContext context, Widget child, Config config) {

    return Text(

    ''Font size: ${config.fontSize}'',

    style: TextStyle(

    color: config.color,

    fontSize: config.fontSize,

    ),

    );

    },

    );

    }

    }

    Listing 10-14

    ScopedModelText uses ScopedModelDescendant

    ```


    In Listing [10-15](#479501_1_En_10_Chapter.xhtml#PC15), `ScopedModelUpdater` widget
    simply uses `setColor()` and `increaseFontSize()` methods to update the state.


    ```

    class ScopedModelUpdater extends StatelessWidget {

    static const List _colors = [Colors.red, Colors.green, Colors.blue];

    @override

    Widget build(BuildContext context) {

    return ScopedModelDescendant(

    builder: (BuildContext context, Widget child, Config config) {

    return Column(

    children: [

    DropdownButton(

    value: config.color,

