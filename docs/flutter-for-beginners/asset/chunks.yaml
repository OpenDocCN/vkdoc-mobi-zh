    第一个页面允许您选择新 Flutter 项目的类型。页面中的描述说明了这四种不同项目类型之间的区别。大多数情况下，我们将创建一个 Flutter 应用程序。


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig12_HTML.jpg](img/479501_1_En_1_Fig12_HTML.jpg)


    图 1-12


    选择 Flutter 项目类型


    第二个页面允许您自定义新 Flutter 项目的基本配置，包括项目名称、位置和描述。


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig13_HTML.jpg](img/479501_1_En_1_Fig13_HTML.jpg)


    图 1-13


    基本项目配置


    最后一个页面允许您自定义一些高级项目配置。公司域名用于为项目创建唯一标识符。


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig14_HTML.jpg](img/479501_1_En_1_Fig14_HTML.jpg)


    图 1-14


    高级项目配置


    完成向导后，新项目就会被创建并在 Android Studio 中打开。


    ## 1.12 使用 VS Code 创建 Flutter 应用


    ### 问题


    您想使用轻量级编辑器来开发 Flutter 应用。


    ### 解决方案


    使用 VS Code 创建 Flutter 应用。


    ### 讨论


    VS Code ( [`code.visualstudio.com/`](https://code.visualstudio.com/) ) 是一款在前端开发者社区中广受欢迎的轻量级编辑器。通过安装
    Flutter 和 Dart 的扩展，我们也可以使用 VS Code 进行 Flutter 开发。打开 VS Code 的 `Extensions`（扩展）选项卡，搜索“flutter”并安装
    `Flutter` 扩展；参见图 1-15。`Flutter` 扩展依赖于 `Dart` 扩展，该扩展也会被一并安装。安装完这两个扩展后，我们可以打开命令面板并搜索“flutter”来查看可用的
    Flutter 命令。


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig15_HTML.jpg](img/479501_1_En_1_Fig15_HTML.jpg)


    图 1-15


    在 VS Code 中安装 Flutter 扩展


    要在 VS Code 中创建新的 Flutter 项目，请打开命令面板并运行 `Flutter: New Project`（Flutter: 新建项目）命令。在打开的对话框中输入新项目的名称。选择项目的目录。VS
    Code 会为新创建的项目打开一个新窗口。


    ## 1.13 运行 Flutter 应用


    ### 问题


    您想在模拟器或设备上运行 Flutter 应用。


    ### 解决方案


    使用 `flutter run` 命令或 IDE 来运行 Flutter 应用。


    ### 讨论


    根据您喜欢的 Flutter 应用开发方式，有多种运行 Flutter 应用的方法。在运行 Flutter 应用之前，您必须至少有一个正在运行的模拟器或已连接的设备：


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig16_HTML.jpg](img/479501_1_En_1_Fig16_HTML.jpg)


    图 1-16


    在 Android Studio 中选择设备


    *   使用命令 `flutter run` 启动当前的 Flutter 应用。

    *   在 Android Studio 中，从图 1-16 所示的下拉菜单中选择模拟器或设备，然后点击 `Run`（运行）按钮启动应用。

    *   在 VS Code 中，选择 `Debug`（调试）➤ `Start Without Debugging`（不调试直接启动）来启动应用。


    ## 1.14 理解 Flutter 应用的代码结构


    ### 问题


    您想了解 Flutter 应用的典型结构。


    ### 解决方案


    浏览 Flutter SDK 生成的示例应用，并理解各个文件。


    ### 讨论


    在深入学习 Flutter 应用开发的细节之前，您应该了解 Flutter 应用的代码结构，这样才能知道在何处添加新文件。Flutter 应用为应用中的各种文件预定义了目录结构。当创建一个新应用时，您可以查看生成的文件并对其有基本的了解。表
    1-1 展示了所创建应用的目录和文件。


    表 1-1


    Flutter 应用的目录和文件


    | 名称 | 描述 |

    | --- | --- |

    | `lib` | 应用源代码的主目录。文件 `main.dart` 通常是应用的入口点。 |

    | `test` | 包含测试文件的目录。 |

    | `android` | Android 平台的文件。 |

    | `ios` | iOS 平台的文件。 |

    | `pubspec.yaml` | Dart pub 工具的包描述文件。 |

    | `pubspec.lock` | Dart pub 工具的锁定文件。 |

    | `.metadata` | Flutter SDK 使用的 Flutter 项目描述文件。 |


    ## 1.15 修复 Flutter SDK 的配置问题


    ### 问题


    您想确保本地开发环境的配置对于 Flutter 开发是正确的。


    ### 解决方案


    使用 `flutter doctor` 命令。


    ### 讨论


    安装 Flutter SDK 后，需要将其与其他支持工具进行配置。`flutter doctor` 命令是提供必要帮助的主要工具。此命令检查本地环境并报告
    Flutter SDK 安装的状态。对于它发现的每个问题，它还会给出如何修复的说明。您需要做的就是应用建议的修复，然后再次运行 `flutter doctor`
    来验证结果。没有必要修复 `flutter doctor` 报告的所有问题。如果某些问题不相关，您完全可以忽略它们。例如，如果您不打算将 VS Code 用作主要
    IDE，那么是否安装 VS Code 就无关紧要了。


    ## 1.16 总结


    本章中的技巧提供了有关如何让本地机器为 Flutter 应用开发做好准备的方法。`flutter doctor` 是一个用于设置的有用工具。您应该能够通过遵循此命令提供的说明来修复大多数配置问题。在下一章中，我们将看到关于使用
    Dart SDK、Flutter SDK 和 IDE 提供的工具的技巧。


    # 2. 了解工具


    构建 Flutter 应用离不开各种工具的帮助。在开发过程中，我们可能需要使用 Dart SDK、Flutter SDK 和各种 IDE 提供的工具。善用这些工具可以提高您的生产力。本章涵盖了
    Dart SDK、Flutter SDK、Android Studio 和 VS Code 中工具的使用。


    ## 2.1 使用 Dart Observatory


    ### 问题


    您想了解正在运行的 Flutter 应用的内部情况。


    ### 解决方案


    使用 Dart SDK 提供的 Dart Observatory。

    '
- fmt: '### Discussion


    `Dart Observatory`是一个由Dart SDK提供的工具，用于分析和调试Dart应用程序。由于Flutter应用同样是Dart应用程序，因此`Observatory`也可用于Flutter应用。`Observatory`是一个重要的工具，用于调试、追踪和性能分析Flutter应用。`Observatory`允许您：


    - 查看应用的CPU性能分析。

    - 查看应用的内存分配分析。

    - 以交互方式调试应用。

    - 查看应用的堆快照。

    - 查看应用生成的日志。


    当Flutter应用通过`flutter run`启动时，`Observatory`也会一同启动并等待连接。您可以指定`Observatory`监听的端口，否则默认会使用随机端口。您可以在命令输出中找到访问`Observatory`的URL。在浏览器中导航到该URL，即可看到`Observatory`的用户界面。


    ### 注意


    为了获得最佳效果，建议在使用`Observatory`时使用Google Chrome。其他浏览器可能无法正常运行。


    `Observatory` UI的顶部区域显示Dart VM信息，参见图[2-1](#479501_1_En_2_Chapter.xhtml#Fig1)。点击**刷新**按钮可更新信息。


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig1_HTML.jpg](images/479501_1_En_2_Chapter/479501_1_En_2_Fig1_HTML.jpg)


    图2-1 Dart `Observatory`中的VM信息


    底部区域显示了一个隔离区列表，参见图[2-2](#479501_1_En_2_Chapter.xhtml#Fig2)。每个Flutter应用都有一个用于入口文件的初始隔离区。对于每个隔离区，饼图显示了VM活动的细分情况。在饼图的右侧，有一列链接指向`Observatory`其他功能的不同界面。


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig2_HTML.jpg](images/479501_1_En_2_Chapter/479501_1_En_2_Fig2_HTML.jpg)


    图2-2 Dart `Observatory`中的隔离区信息


    这些`Observatory`界面的细节超出了本教程的范围；有关说明，请参考官方文档（[https://dart-lang.github.io/observatory/](https://dart-lang.github.io/observatory/)）。


    ## 2.2 使用热重载和热重启


    ### 问题


    在开发Flutter应用时，当您对代码进行了一些更改后，希望快速看到结果。


    ### 解决方案


    使用Flutter SDK提供的热重载和热重启功能。


    ### 讨论


    在构建移动应用时，能够高效地查看代码更改的效果至关重要，尤其是在构建UI时。这使得我们可以快速查看实际UI并迭代更新代码。在更新应用时，保持应用的当前状态也非常重要。否则，手动将应用重置回之前的状态并继续测试将非常痛苦。假设您正在开发的组件仅对注册用户可用，为了实际测试该组件，如果应用更新后状态未保留，您可能每次代码更改后都需要登录。


    Flutter SDK提供的热重载是一项杀手级功能，可以显著提高开发人员的工作效率。使用热重载，状态在应用更新之间得以保留，因此您可以立即看到UI更新，并从上次进行更改的执行点继续开发和测试。


    根据Flutter应用的启动方式不同，触发热重载的方法也不同。只有处于调试模式的Flutter应用才能进行热重载：


    - 当应用通过命令`flutter run`启动时，在终端窗口中输入`r`即可触发热重载。

    - 当应用通过Android Studio启动时，保存文件会自动触发热重载。您也可以点击**Flutter热重载**按钮手动触发。

    - 当应用通过VS Code启动时，保存文件会自动触发热重载。您也可以使用键盘快捷键`Control-F5`运行**Flutter: 热重载**命令手动触发。


    如果应用热重载成功，您可以在控制台中看到输出，其中包含热重载的详细信息。图[2-3](#479501_1_En_2_Chapter.xhtml#Fig3)显示了在Android
    Studio中通过保存文件触发热重载时的控制台输出。


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig3_HTML.jpg](images/479501_1_En_2_Chapter/479501_1_En_2_Fig3_HTML.jpg)


    图2-3 热重载输出


    热重载非常有用，您可能希望它适用于所有代码更改。不幸的是，仍有一些情况下热重载可能无效：


    - 您的代码更改引入了编译错误。您需要先修复这些编译错误，热重载才能继续进行。

    - 热重载会保留应用状态，并尝试使用保留的状态重建widget树以反映新的更改。如果您的代码更改修改了状态，则对widget的更改可能无法与旧的保留状态兼容。假设我们有一个用于显示用户个人资料信息的widget。在之前的版本中，用户的状态只包含用户名和姓名。在新版本中，状态更新为包含一个新属性`email`，并且widget也更新为显示这个新属性。热重载后，widget仍然使用旧状态，看不到新属性。在这种情况下，需要热重启来获取状态更改。

    - 全局变量和静态字段的初始化器的更改只能通过热重启来生效。

    - 应用`main()`方法的更改可能只能通过热重启来生效。

    - 当枚举类型更改为常规类，或常规类更改为枚举类型时，不支持热重载。

    - 更改类型的泛型声明时，不支持热重载。


    如果热重载无效，您仍然可以使用热重启，它会从头开始重启应用。您可以确信热重启会反映您所做的所有更改。根据Flutter应用的启动方式不同，触发热重启的方法也不同：


    - 当应用通过`flutter run`启动时，在终端窗口中输入`R`即可触发热重启。

    - 当应用通过Android Studio启动时，点击**Flutter热重启**按钮即可触发热重启。

    - 当应用通过VS Code启动时，点击重启按钮，或在命令面板中运行**Flutter: 热重启**命令来触发热重启。


    ## 2.3 升级Flutter SDK


    ### 问题


    您希望保持Flutter SDK为最新版本，以获取最新的功能、错误修复和性能改进。


    ### 解决方案


    跟踪不同的Flutter SDK频道并升级SDK。'
  raw: '### Discussion


    Dart Observatory is a tool provided by Dart SDK to profile and debug Dart applications.
    Since Flutter apps are also Dart applications, Observatory is also available for
    Flutter apps. Observatory is an important tool for debugging, tracing, and profiling
    Flutter apps. Observatory allows you to


    *   View an app’s CPU profile.


    *   View an app’s memory allocation profile.


    *   Debug an app interactively.


    *   View snapshots of an app’s heap.


    *   View logs generated by an app.


    When a Flutter app is started using `flutter run`, Observatory is also started
    and waiting for connections. You can specify the port for Observatory to listen
    on, or let it listen on a random port by default. You can see the URL to access
    the Observatory in the command output. Navigate to the URL in the browser and
    you can see the UI of Observatory.


    ### Note


    For best results, Google Chrome is recommended when using the Observatory. Other
    browsers may not function properly.


    The top section of the Observatory UI shows the Dart VM information; see Figure
    [2-1](#479501_1_En_2_Chapter.xhtml#Fig1). Click the **Refresh** button to update
    the information.


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig1_HTML.jpg](images/479501_1_En_2_Chapter/479501_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    VM information in Dart Observatory


    The bottom section shows a list of isolates; see Figure [2-2](#479501_1_En_2_Chapter.xhtml#Fig2).
    Every Flutter app has an initial isolate for its entry point file. For each isolate,
    a pie chart shows the breakdown of activities of the VM. On the right side of
    the pie chart, a list of links points to different screens of other Observatory
    functionalities.


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig2_HTML.jpg](images/479501_1_En_2_Chapter/479501_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Isolate information in Dart Observatory


    The details of these Observatory screens are out of the scope of this recipe;
    refer to the official documentation ( [`https://dart-lang.github.io/observatory/`](https://dart-lang.github.io/observatory/)
    ) for instructions.


    ## 2.2 Using Hot Reload and Hot Restart


    ### Problem


    When developing Flutter apps, after you made some code changes, you want to see
    the result quickly.


    ### Solution


    Use hot reload and hot restart provided by Flutter SDK.


    ### Discussion


    When building mobile apps, it’s crucial to be able to view effects of code changes
    efficiently, especially when building the UI. This enables us to quickly see the
    actual UI and update code iteratively. It’s also very important to keep the app’s
    current state when updating the app. Otherwise, it’ll be very painful to manually
    reset the app to the previous state and continue testing. Suppose that the component
    you are developing is only accessible to registered users, to actually test the
    component, you may need to log in every time you made a code change, if the state
    is not preserved between app updates.


    Hot reload provided by Flutter SDK is a killer feature that can significantly
    increase developers’ productivity. With hot reload, the state is perverse between
    app updates, so you can see the UI updates instantly and continue the development
    and testing from the last execution point where you made the changes.


    Depending on how a Flutter app is started, there are different ways to trigger
    hot reload. Only Flutter apps in debug mode can be hot reloaded:


    *   When the app is started by the command `flutter run`, enter `r` in the terminal
    window to trigger hot reload.


    *   When the app is started by Android Studio, saving the files automatically
    triggers hot reload. You can also click the **Flutter Hot Reload** button to manually
    trigger it.


    *   When the app is started by VS Code, saving the files automatically triggers
    hot reload. You can also run the command **Flutter: Hot Reload** with the keyboard
    shortcut Control-F5 to manually trigger it.


    If the app is hot reloaded successfully, you can see output in the console with
    details of the hot reload. Figure [2-3](#479501_1_En_2_Chapter.xhtml#Fig3) shows
    the console output when a hot reload is triggered by saving files in Android Studio.


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig3_HTML.jpg](images/479501_1_En_2_Chapter/479501_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Hot reload output


    Hot reload is so useful that you may want it to be available for all code changes
    you made. Unfortunately, there are still some cases that hot reload may not work:


    *   Your code change introduces compilation errors. You need to fix these compilation
    errors before hot reload can continue.


    *   Hot reload preserves the app state, and it tries to rebuild the widgets tree
    using the preserved state to reflect new changes. If your code change modifies
    the state, then the change to widgets may not be able to work with the old preserved
    state. Suppose that we have a widget that is designed to display a user’s profile
    information. In the previous version, the state for a user only contains the username
    and name. In the new version, the state is updated to include a new property `email`,
    and the widget is updated to display the new property. After hot reload, the widget
    still uses the old state and doesn’t see the new property. A hot restart is required
    in this case to pick up the state change.


    *   Changes to initializers of global variables and static fields can only be
    reflected after a hot restart.


    *   Changes to the app’s `main()` method may only be reflected after a hot restart.


    *   Hot reload is not supported when an enumerated type is changed to a regular
    class or a regular class is changed to an enumerated type.


    *   Hot reload is not supported when changing the generic declarations of types.


    If hot reload doesn’t work, you can still use hot restart, which restarts the
    app from scratch. You can be sure that hot restart will reflect all changes you
    made. Depending on how a Flutter app is started, there are different ways to trigger
    hot restart:


    *   When the app is started by `flutter run`, enter `R` in the terminal window
    to trigger hot restart.


    *   When the app is started by Android Studio, click the **Flutter Hot Restart**
    button to trigger hot restart.


    *   When the app is started by VS Code, click the Restart button, or run the command
    **Flutter:** **Hot Restart** from command palette to trigger hot restart.


    ## 2.3 Upgrading Flutter SDK


    ### Problem


    You want to keep the Flutter SDK up to date to get latest features, bug fixes,
    and performance improvements.


    ### Solution


    Track different Flutter SDK channels and upgrade the SDK.'
