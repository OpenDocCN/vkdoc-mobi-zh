    a `Localizations` object. `WidgetsApp` constructor has parameters that are used
    by the `Localizations` object. When you need to use localized values, you can
    use static `Localizations.of<T>(BuildContext context, Type type)` method to get
    the nearest enclosing localized resources object of the given type.


    By default, Flutter only provides US English localizations. To support other locales,
    you need to add Flutter’s own localizations for those locales first. This is done
    by adding `flutter_localizations` package to the `dependencies` of `pubspec.yaml`
    file; see Listing [13-6](#479501_1_En_13_Chapter.xhtml#PC6). With this package,
    you can use localized values defined in `MaterialLocalizations` class.


    ```

    dependencies:

    flutter:

    sdk: flutter

    flutter_localizations:

    sdk: flutter

    Listing 13-6

    flutter_localizations

    ```


    After adding the `flutter_localizations` package, we need to enable those localized
    values. In Listing [13-7](#479501_1_En_13_Chapter.xhtml#PC7), this is done by
    adding `GlobalMaterialLocalizations.delegate` and `GlobalWidgetsLocalizations.delegate`
    to the `localizationsDelegates` list of `MaterialApp` constructor. The value of
    `localizationsDelegates` parameter is passed to the `Localizations` constructor.
    The `supportedLocales` parameter specifies the supported locales.


    ```

    MaterialApp(

    localizationsDelegates: [

    GlobalMaterialLocalizations.delegate,

    GlobalWidgetsLocalizations.delegate,

    ],

    supportedLocales: [

    const Locale(''en''),

    const Locale(''zh'', ''CN''),

    ],

    );

    Listing 13-7

    Enable Flutter localized values

    ```


    In Listing [13-8](#479501_1_En_13_Chapter.xhtml#PC8), `MaterialLocalizations.of()`
    method gets the `MaterialLocalizations` object from the build context. The `copyButtonLabel`
    property is a localized value defined in `MaterialLocalizations` class. In the
    runtime, the label of the button depends on the device’s locale. `MaterialLocalizations.of()`
    method uses `Localizations.of()` internally to look up the `MaterialLocalizations`
    object.


    ```

    RaisedButton(

    child: Text(MaterialLocalizations.of(context).copyButtonLabel),

    onPressed: () {},

    );

    Listing 13-8

    Use localized values

    ```


    `MaterialLocalizations` class only provides a limit set of localized values. For
    your own apps, you need to create custom localized resources classes. `AppLocalizations`
    class in Listing [13-9](#479501_1_En_13_Chapter.xhtml#PC9) is a custom localized
    resources class. `AppLocalizations` class has the `appName` property as an example
    of simple localizable strings. The `greeting()` method is an example of localizable
    strings that require parameters. `AppLocalizationsEn` and `AppLocalizationsZhCn`
    classes are implementations of `AppLocalizations` class for `en` and `zh_CN` locales,
    respectively.


    ```

    abstract class AppLocalizations {

    String get appName;

    String greeting(String name);

    static AppLocalizations of(BuildContext context) {

    return Localizations.of(context, AppLocalizations);

    }

    }

    class AppLocalizationsEn extends AppLocalizations {

    @override

    String get appName => ''Demo App'';

    @override

    String greeting(String name) {

    return ''Hello, $name'';

    }

    }

    class AppLocalizationsZhCn extends AppLocalizations {

    @override

    String get appName => ''示例应用'';

    @override

    String greeting(String name) {

    return ''你好, $name'';

    }

    }

    Listing 13-9

    AppLocalizations and localized subclasses

    ```


    We also need to create a custom `LocalizationsDelegate` class to load `AppLocalizations`
    objects. There are three methods need to be implemented:


    *   `isSupported()` method checks whether a locale is supported.


    *   `load()` method loads the localized resources object for a given locale.


    *   `shouldReload()` method checks whether the `load()` method should be called
    to load the resource again.


    In the `load()` method of Listing [13-10](#479501_1_En_13_Chapter.xhtml#PC10),
    `AppLocalizationsEn` or `AppLocalizationsZhCn` object is returned based on the
    given locale.


    ```

    class _AppLocalizationsDelegate

    extends LocalizationsDelegate {

    const _AppLocalizationsDelegate();

    static const List _supportedLocales = [

    const Locale(''en''),

    const Locale(''zh'', ''CN'')

    ];

    @override

    bool isSupported(Locale locale) {

    return _supportedLocales.contains(locale);

    }

    @override

    Future load(Locale locale) {

    return Future.value(locale == Locale(''zh'', ''CN'')

    ? AppLocalizationsZhCn()

    : AppLocalizationsEn());

    }

    @override

    bool shouldReload(LocalizationsDelegate old) {

    return false;

    }

    }

    Listing 13-10

    Custom LocalizationsDelegate

    ```


    `_AppLocalizationsDelegate` object needs to be added to the list of `localizationsDelegates`
    in Listing [13-7](#479501_1_En_13_Chapter.xhtml#PC7). Listing [13-11](#479501_1_En_13_Chapter.xhtml#PC11)
    shows an example of using `AppLocalizations` class.


    ```

    Text(AppLocalizations.of(context).greeting(''John''))

    Listing 13-11

    Use AppLocalizations

    ```


    ## 13.4 Generating Translation Files


    ### Problem


    You want to extract localizable strings from code and integrate translated strings.


    ### Solution


    Use tools in `intl_translation` package .'
