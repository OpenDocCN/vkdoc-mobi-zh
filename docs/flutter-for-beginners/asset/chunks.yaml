    '
- fmt: '### Discussion


    Sometimes, you may want to get notified when the state of navigator is changed.
    For example, you want to analyze the page flows of users using the app to improve
    user experiences. When creating `Navigator` instances, you can provide a list
    of `NavigatorObserver` objects as the observers of navigator state changes. Table
    [8-7](#479501_1_En_8_Chapter.xhtml#Tab7) shows methods of `NavigatorObserver`
    interface.


    **Table 8-7** Methods of `NavigatorObserver`


    | Name | Description |

    | --- | --- |

    | `didPop(Route route, Route previousRoute)` | The `route` is popped and `previousRoute`
    is the newly active route. |

    | `didPush(Route route, Route previousRoute)` | The `route` is pushed and `previousRoute`
    is the previously active route. |

    | `didRemove(Route route, Route previousRoute)` | The `route` is removed and `previousRoute`
    is the route immediately below the removed route. |

    | `didReplace(Route newRoute, Route oldRoute)` | The `oldRoute` is replaced with
    `newRoute`. |

    | `didStartUserGesture(Route route, Route previousRoute)` | User starts moving
    the `route` using gesture. The route immediately below route is `previousRoute`.
    |

    | `didStopUserGesture()` | User stops moving route using gesture. |


    In Listing [8-18](#479501_1_En_8_Chapter.xhtml#PC18), `LoggingNavigatorObserver`
    class logs messages when routes are pushed and popped.


    ```

    class LoggingNavigatorObserver extends NavigatorObserver {

    @override

    void didPush(Route route, Route previousRoute) {

    print(''push: ${_routeName(previousRoute)} -> ${_routeName(route)}'');

    }

    @override

    void didPop(Route route, Route previousRoute) {

    print('' pop: ${_routeName(route)} -> ${_routeName(previousRoute)}'');

    }

    String _routeName(Route route) {

    return route != null

    ? (route.settings?.name ?? route.runtimeType.toString())

    : ''null'';

    }

    }

    ```


    **Listing 8-18** Logging navigator observer


    `NavigatorObserver` interface is useful when you want to have a global handler
    for all state changes in a navigator. If you are only interested in state changes
    related to a particular route, then using `RouteObserver` class is a better choice.
    `RouteObserver` class is also an implementation of `NavigatorObserver` interface.


    To get notified of state changes related to a `Route` object, your class needs
    to implement `RouteAware` interface. Table [8-8](#479501_1_En_8_Chapter.xhtml#Tab8)
    shows methods of `RouteAware` interface.


    **Table 8-8** Methods of `RouteAware`


    | Name | Description |

    | --- | --- |

    | `didPop()` | Callback when the current route is popped off. |

    | `didPopNext()` | Called when the current route becomes active after the top
    route is popped off. |

    | `didPush()` | Called when the current route is pushed. |

    | `didPushNext()` | Called when the current route is no longer active after a
    new route is pushed. |


    To actually get notified for a `Route` object, you need to use `subscribe()` method
    of `RouteObserver` to subscribe a `RouteAware` object to a `Route` object. When
    the subscription is no longer required, you should use `unsubscribe()` to unsubscribe
    the `RouteAware` object.


    In Listing [8-19](#479501_1_En_8_Chapter.xhtml#PC19), `_ObservedPageState` class
    implements `RouteAware` interface and overrides `didPush()` and `didPop()` methods
    to print out some messages. `ModalRoute.of(context)` gets the nearest enclosing
    `ModalRoute` object from build context, which is the route that `ObservedPage`
    is in. By using `ModalRoute.of(context)`, there is no need for explicitly passing
    `Route` objects. The current `_ObservedPageState` object subscribes to state changes
    in current route using the `subscribe()` method of the passed-in `RouteObserver`
    object. The subscription is removed when the `_ObservedPageState` object is disposed.


    ```

    class ObservedPage extends StatefulWidget {

    ObservedPage(this.routeObserver);

    final RouteObserver<ModalRoute<void>> routeObserver;

    @override

    _ObservedPageState createState() => _ObservedPageState(routeObserver);

    }

    class _ObservedPageState extends State<ObservedPage> with RouteAware {

    _ObservedPageState(this._routeObserver);

    final RouteObserver<ModalRoute<void>> _routeObserver;

    @override

    void didChangeDependencies() {

    super.didChangeDependencies();

    _routeObserver.subscribe(this, ModalRoute.of(context));

    }

    @override

    void dispose() {

    _routeObserver.unsubscribe(this);

    super.dispose();

    }

    @override

    void didPush() {

    print(''pushed'');

    }

    @override

    void didPop() {

    print(''popped'');

    }

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Observed (Stateful)''),

    ),

    );

    }

    }

    ```


    **Listing 8-19** Use `RouteObserver`


    ## 8.12 Stopping Routes from Popping


    ### Problem


    You want to stop routes from popping off the navigator.


    ### Solution


    Use `WillPopCallback` with `ModalRoute` objects.


    ### Discussion


    When a route is pushed to a navigator, the route can be popped off using the back
    button in the `Scaffold` or system’s back button in Android. Sometimes you may
    want to stop the route from being popped off. For example, if there are unsaved
    changes in the page, you may want to show an alert dialog first to ask for confirmation.
    When `Navigator.maybePop()` method is used instead of `Navigator.pop()` method,
    you have a chance to decide whether the request to pop off a route should proceed.


    `ModalRoute` class has `addScopedWillPopCallback()` method to add `WillPopCallback`
    that decides whether the route should be popped off. `WillPopCallback` is a typedef
    of function type `Future<bool> ()`. If the returned `Future<bool>` object resolves
    to `true`, then the route can be popped off. Otherwise, the route cannot be popped
    off. You can add multiple `WillPopCallback` functions to a `ModalRoute` object.
    If any of the `WillPopCallback` function vetoes the request, the route won’t be
    popped off.


    In Listing [8-20](#479501_1_En_8_Chapter.xhtml#PC20), a `WillPopCallback` function
    is added to the current route. The return value of `WillPopCallback` function
    is the `Future<bool>` object returned by `showDialog()`.


    ```

    class VetoPopPage extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    ModalRoute.of(context).addScopedWillPopCallback(() {

    return showDialog(

    context: context,

    builder: (BuildContext context) {

    return AlertDialog(

    title: Text(''Exit?''),

    actions: [

    FlatButton(

    child: Text(''Yes''),

    onPressed: () {

    Navigator.pop(context, true);

    },

    ),

    FlatButton(

    child: Text(''No''),

    onPressed: () {

