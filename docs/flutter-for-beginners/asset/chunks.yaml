    ### 讨论


    路由在构建内容时可能需要额外的数据。路由在弹出时也可能会返回一些数据。例如，编辑用户详细信息的路由可能需要当前的详细信息作为输入，并返回更新后的详细信息作为输出。根据路由导航方式的不同，在路由之间传递数据有不同方法。


    使用 `Navigator.push()` 方法推入新路由时，最简单的方式是将数据作为 `WidgetBuilder` 函数返回的 widget 的构造函数参数传入。使用
    `Navigator.pop()` 方法时，可以使用可选的 `result` 参数将返回值传递给前一个路由。`Navigator.push()` 方法的返回值是一个
    `Future<T>` 对象。当新推入的路由被弹出时，这个 `Future` 对象会被解析。解析后的值就是调用 `Navigator.pop()` 方法时传入的返回值。如果路由是通过返回按钮弹出的，那么解析后的值为
    `null`。


    在代码清单 8-4 中，`UserDetails` 类包含用户的名和姓。`UserDetailsPage` 用于显示用户详情。当按下编辑按钮时，一个新路由被推入导航器。新路由的内容是一个
    `EditUserDetailsPage` widget，其构造函数参数为 `UserDetails` 对象。新路由的返回值也是一个 `UserDetails`
    对象，用于更新 `UserDetailsPage` 的状态。


    ```

    class UserDetails {

    UserDetails(this.firstName, this.lastName);

    final String firstName;

    final String lastName;

    }

    class UserDetailsPage extends StatefulWidget {

    @override

    _UserDetailsPageState createState() => _UserDetailsPageState();

    }

    class _UserDetailsPageState extends State {

    UserDetails _userDetails = UserDetails(''John'', ''Doe'');

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''User Details''),

    ),

    body: Column(

    children: [

    Text(''First name: ${_userDetails.firstName}''),

    Text(''Last name: ${_userDetails.lastName}''),

    RaisedButton.icon(

    label: Text(''Edit (route builder)''),

    icon: Icon(Icons.edit),

    onPressed: () async {

    UserDetails result = await Navigator.push(

    context,

    MaterialPageRoute(

    builder: (BuildContext context) {

    return EditUserDetailsPage(_userDetails);

    },

    ),

    );

    if (result != null) {

