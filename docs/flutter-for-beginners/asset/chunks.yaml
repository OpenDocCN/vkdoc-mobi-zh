  trans: "\n### 讨论\n\n`animation` 库中的动画分为线性动画和曲线动画。`physics` 库提供了物理模拟，包括弹簧、摩擦力和重力。`Simulation`\
    \ 类是所有模拟的基类。模拟同样随时间变化。对于某个时间点，`x()` 方法返回位置，`dx()` 方法返回速度，`isDone()` 方法返回模拟是否结束。给定一个\
    \ `Simulation` 对象，可以使用 `AnimationController` 类的 `animateWith()` 方法来驱动该模拟的动画。\n\
    \n`SpringSimulation` 类表示附着在弹簧上的粒子的模拟。要创建 `SpringSimulation` 对象，可以提供表 11-5 中列出的参数。\n\
    \n**表 11-5**  \n`SpringSimulation` 的参数\n\n| 名称 | 类型 | 描述 |\n| --- | --- | ---\
    \ |\n| `spring` | `SpringDescription` | 弹簧的描述。 |\n| `start` | `double` | 起始距离。\
    \ |\n| `end` | `double` | 结束距离。 |\n| `velocity` | `double` | 初始速度。 |\n| `tolerance`\
    \ | `Tolerance` | 距离、持续时间和速度被视为相等的差异大小。 |\n\n要创建 `SpringDescription` 对象，可以使用 `SpringDescription()`\
    \ 构造函数，并传入参数来指定质量、刚度和阻尼系数。`SpringDescription.withDampingRatio()` 构造函数使用阻尼比代替阻尼系数。清单\
    \ 11-15 展示了一个创建 `SpringSimulation` 对象的示例。\n\n```\nSpringSimulation _springSimulation\
    \ = SpringSimulation(\nSpringDescription.withDampingRatio(\nmass: 1.0,\nstiffness:\
    \ 50,\nratio: 1.0,\n),\n0.0,\n1.0,\n1.0)\n..tolerance = Tolerance(distance: 0.01,\
    \ velocity: double.infinity);\n```\n\n**清单 11-15**  \n弹簧模拟\n\n使用弹簧模拟的一种更简单的方法是使用\
    \ `AnimationController` 类的 `fling()` 方法。该方法使用临界阻尼弹簧来驱动动画。\n\n`GravitySimulation`\
    \ 类表示遵循牛顿第二运动定律的粒子的模拟。表 11-6 显示了 `GravitySimulation` 构造函数的参数。\n\n**表 11-6**  \n\
    `GravitySimulation` 的参数\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `acceleration`\
    \ | `double` | 粒子的加速度。 |\n| `distance` | `double` | 初始距离。 |\n| `endDistance` |\
    \ `double` | 模拟结束时的距离。 |\n| `velocity` | `double` | 初始速度。 |\n\n在清单 11-16 中，`SimulationController`\
    \ 组件使用一个 `Simulation` 对象来驱动动画。\n\n```\ntypedef BuilderFunc = Widget Function(BuildContext,\
    \ Animation);\nclass SimulationController extends StatefulWidget {\nSimulationController({Key\
    \ key, this.simulation, this.builder})\n: super(key: key);\nfinal Simulation simulation;\n\
