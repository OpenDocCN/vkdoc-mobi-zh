  raw: '### Discussion


    When writing test cases, the classes to test may have dependencies that require
    external resources. For example, a service class needs to access backend API to
    get data. When testing these classes, you don’t want to use the real dependencies.
    Depending on external resources, introduce uncertainty to execution of test cases
    and make them unstable. Using live services also makes it difficult to test all
    possible scenarios.


    A better approach is to create mock objects to replace these dependencies. With
    mock objects, you can easily emulate different scenarios. Mock objects are alternative
    implementations of classes. You can create mock objects manually or use `mockito`
    package . To use `mockito` package, you need to add `mockito: ^4.0.0` to the `dev_dependencies`
    section of `pubspec.yaml` file.


    `GitHubJobsClient` class in Listing [14-6](#479501_1_En_14_Chapter.xhtml#PC6)
    uses `Client` class from `http` package to access GitHub Jobs API.


    ```

    class GitHubJobsClient {

    GitHubJobsClient({@required this.httpClient}) : assert(httpClient != null);

    final http.Client httpClient;

    Future> getJobs(String keyword) async {

    Uri url = Uri.https(

    ''jobs.github.com'', ''/positions.json'', {''description'': keyword});

    http.Response response = await httpClient.get(url);

    if (response.statusCode != 200) {

    throw Exception(''Failed to get job listings'');

    }

    return (jsonDecode(response.body) as List)

    .map((json) => Job.fromJson(json))

    .toList();

    }

    }

    Listing 14-6

    GitHubJobsClient class to test

    ```


    To test `GitHubJobsClient` class , we can create a mock object for `http.Client`
    object. In Listing [14-7](#479501_1_En_14_Chapter.xhtml#PC7), `MockHttpClient`
    class is the mock class for `http.Client` class. In the first test case, when
    the `get()` method of `MockHttpClient` is called with the specified `Uri` object,
    a `Future<Response>` object with JSON string is used as the result. We can verify
    that `getJobs()` method of `GitHubJobsClient` can parse the response and return
    a `List` object with one element. In the second test case, the return result of
    `get()` method of `MockHttpClient` is set to a `Future<Response>` with HTTP 500
    error. We then verify an exception is thrown by calling `getJobs()` method .


    ```

    import ''package:mockito/mockito.dart'';

    class MockHttpClient extends Mock implements http.Client {}

    void main() {

    group(''getJobs'', () {

    Uri url = Uri.https(

    ''jobs.github.com'', ''/positions.json'', {''description'': ''flutter''});

    test(''should return list of jobs'', () {

    final httpClient = MockHttpClient();

    when(httpClient.get(url))

    .thenAnswer((_) async => http.Response(''[{"id": "123"}]'', 200));

    final jobsClient = GitHubJobsClient(httpClient: httpClient);

    expect(jobsClient.getJobs(''flutter''), completion(hasLength(1)));

    });

    test(''should throws an exception'', () {

    final httpClient = MockHttpClient();

    when(httpClient.get(url))

    .thenAnswer((_) async => http.Response(''error'', 500));

    final jobsClient = GitHubJobsClient(httpClient: httpClient);

    expect(jobsClient.getJobs(''flutter''), throwsException);

    });

    });

    }

    Listing 14-7

    GitHubJobsClient test with mock

    ```


