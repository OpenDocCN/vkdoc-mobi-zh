    ## 7.5 构建 iOS 页面框架


    ### 问题


    你想要构建 iOS 页面框架。


    ### 解决方案


    使用 `CupertinoPageScaffold`。


    ### 讨论


    对于 iOS 应用，你可以使用 `CupertinoPageScaffold` widget 来创建页面的基本布局。与 Material Design 中的
    `Scaffold` 相比，`CupertinoPageScaffold` 提供的自定义选项有限。你只能指定导航栏、子部件和背景颜色。


    `CupertinoNavigationBar` widget 与 Material Design 中的 `AppBar` 类似，但 `CupertinoNavigationBar`
    只能拥有 `leading`、`middle` 和 `trailing` 部件。`middle` 部件位于 `leading` 和 `trailing` 部件之间。当
    `automaticallyImplyLeading` 参数为 `true` 时，`leading` 部件可以根据导航状态自动推断。当 `automaticallyImplyMiddle`
    参数为 `true` 时，`middle` 部件也可以自动推断。


    清单 7-22 展示了一个使用 `CupertinoPageScaffold` 和 `CupertinoNavigationBar` 的示例。


    ```

    CupertinoPageScaffold(

    navigationBar: CupertinoNavigationBar(

    middle: Text(''App''),

    trailing: CupertinoButton(

    child: Icon(CupertinoIcons.search),

    onPressed: () {},

    ),

    ),

    child: Container(),

    );

