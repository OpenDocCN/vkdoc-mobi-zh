- fmt: '### Discussion


    `StatefulWidget`类是在Flutter中管理状态的基本方式。状态ful widget在其状态改变时会重建自身。如果要管理的状态很简单，使用状态ful
    widget通常就足够好了。你不需要使用其他方法中讨论的第三方库。


    状态ful widget使用`State`对象来存储状态。当创建自己的`StatefulWidget`子类时，需要重写`createState()`方法以返回一个`State`对象。对于每个`StatefulWidget`子类，会有一个对应的`State`类子类来管理状态。`createState()`方法返回对应`State`子类的对象。实际状态通常作为`State`子类的私有变量来保存。


    在`State`子类中，你需要实现`build()`方法来返回一个`Widget`对象。当状态改变时，会调用`build()`方法获取新的widget以更新UI。要触发UI的重建，需要显式调用`setState()`方法来通知框架。`setState()`方法的参数是一个`VoidCallback`函数，其中包含更新内部状态的逻辑。重建时，`build()`方法使用最新状态来创建widget配置。Widget不会被更新，而是在必要时被替换。


    清单[10-1](#479501_1_En_10_Chapter.xhtml#PC1)中的`SelectColor` widget是一个典型的状态ful widget示例。`_SelectColorState`类是`SelectColor`
    widget的`State`实现。`_selectedColor`是维护当前选中颜色的内部变量。`DropdownButton` widget使用`_selectedColor`的值来确定要渲染的选中选项，`Text`
    widget使用它来确定要显示的文本。在`DropdownButton`的`onChanged`处理程序中，调用`setState()`来更新`_selectedColor`变量的值，这通知框架重新运行`_SelectColorState.build()`方法以获取新的widget配置并更新UI。


    ```

    class SelectColor extends StatefulWidget {

    @override

    _SelectColorState createState() => _SelectColorState();

    }

    class _SelectColorState extends State {

    final List _colors = [''Red'', ''Green'', ''Blue''];

    String _selectedColor;

    @override

    Widget build(BuildContext context) {

    return Column(

    children: [

    DropdownButton(

    value: _selectedColor,

    items: _colors.map((String color) {

    return DropdownMenuItem(

    value: color,

    child: Text(color),

    );

    }).toList(),

    onChanged: (value) {

    setState(() {

    _selectedColor = value;

    });

    },

    ),

    Text(''Selected: ${_selectedColor ?? "}''),

    ],

    );

    }

    }

    Listing 10-1

    Example of stateful widget

    ```


    `State`对象有自己的生命周期。你可以在`State`子类中重写不同的生命周期方法，以在不同阶段执行操作。表[10-1](#479501_1_En_10_Chapter.xhtml#Tab1)显示了这些生命周期方法。


    **表10-1** `State`的生命周期方法


    | 名称 | 描述 |

    | --- | --- |

    | `initState()` | 当此对象被插入widget树时调用。应用于执行状态的初始化。 |

    | `didChangeDependencies()` | 当此对象的依赖项发生变化时调用。 |

    | `didUpdateWidget(T oldWidget)` | 当此对象的widget发生变化时调用。旧widget作为参数传入。 |

    | `reassemble()` | 当应用在调试期间被重新组装时调用。此方法仅在开发期间调用。 |

    | `build(BuildContext context)` | 当状态发生变化时调用。 |

    | `deactivate()` | 当此对象从widget树中移除时调用。 |

    | `dispose()` | 当此对象被永久从widget树中移除时调用。此方法在`deactivate()`之后调用。 |


    在表[10-1](#479501_1_En_10_Chapter.xhtml#Tab1)列出的方法中，`initState()`和`dispose()`方法容易理解。这两个方法在生命周期中只会被调用一次。然而，其他方法可能会被多次调用。


    `didChangeDependencies()`方法通常在状态对象使用了继承widget时使用。当继承widget改变时调用此方法。大多数情况下，你不需要重写此方法，因为框架会在依赖项改变后自动调用`build()`方法。有时你可能需要在依赖项改变后执行一些昂贵的任务。在这种情况下，应将逻辑放入`didChangeDependencies()`方法，而不是在`build()`方法中执行。


    `reassemble()`方法仅在开发期间使用，例如在热重载期间。此方法在发布版本中不会被调用。大多数情况下，你不需要重写此方法。


    `didUpdateWidget()`方法在状态的widget发生变化时调用。如果你需要在旧widget上执行清理任务或重用旧widget中的某些状态，则应重写此方法。例如，`TextField`
    widget的`_TextFieldState`类重写了`didUpdateWidget()`方法，以基于旧widget的值初始化`TextEditingController`对象。


    `deactivate()`方法在状态对象从widget树中移除时调用。此状态对象可能会在之后被重新插入到widget树的不同位置。如果构建逻辑依赖于widget的位置，则应重写此方法。例如，`FormField`
    widget的`FormFieldState`类重写了`deactivate()`方法，以从封闭的表单中注销当前表单字段。


    在清单[10-1](#479501_1_En_10_Chapter.xhtml#PC1)中，widget的全部内容都在`build()`方法中构建，因此你可以在`DropdownButton`的`onPressed`回调中直接调用`setState()`方法。如果widget结构复杂，你可以向下传递一个更新状态的函数给子widget。在清单[10-2](#479501_1_En_10_Chapter.xhtml#PC2)中，`RaisedButton`的`onPressed`回调由`CounterButton`的构造函数参数设置。当`CounterButton`在`Counter`
    widget中使用时，提供的处理函数使用`setState()`来更新状态。


    ```

    class Counter extends StatefulWidget {

    @override

    _CounterState createState() => _CounterState();

    }

    class _CounterState extends State {

    int count = 0;

    @override

    Widget build(BuildContext context) {

    return Column(

    children: [

    CounterButton(() {

    setState(() {

    count++;

    });

    }),

    CounterText(count),

    ],

    );

    }

    }

    class CounterText extends StatelessWidget {

    CounterText(this.count);

    final int count;

    @override

    Widget build(BuildContext context) {

    return Text(''Value: ${count ?? "}'');

    }

    }

    class CounterButton extends StatelessWidget {

    CounterButton(this.onPressed);

    final VoidCallback onPressed;

    @override

    Widget build(BuildContext context) {

    return RaisedButton(

    child: Text(''+''),

    onPressed: onPressed,

    );

    }

    }

    Listing 10-2

    Pass state change function to descendant widget

    ```


    ## 10.2 使用继承Widget管理状态


    ### 问题


    你希望将状态沿widget树向下传播。


    ### 解决方案


    创建你自己的`InheritedWidget`子类。'
  raw: '### Discussion


    `StatefulWidget` class is the fundamental way in Flutter to manage state. A stateful
    widget rebuilds itself when its state changes. If the state to manage is simple,
    using stateful widgets is generally good enough. You don’t need to use third-party
    libraries discussed in other recipes.


    Stateful widgets use `State` objects to store the state. When creating your own
    subclasses of `StatefulWidget`, you need to override `createState()` method to
    return a `State` object. For each subclass `StatefulWidget`, there will be a corresponding
    subclass of `State` class to manage the state. The `createState()` method returns
    an object of the corresponding subclass of `State`. The actual state is usually
    kept as private variables of the subclass of `State`.


    In the subclass of `State`, you need to implement `build()` method to return a
    `Widget` object. When the state changes, the `build()` method will be called to
    get the new widget to update the UI. To trigger the rebuild of the UI, you need
    to call `setState()` method explicitly to notify the framework. The parameter
    of `setState()` method is a `VoidCallback` function that contains the logic to
    update the internal state. When rebuilding, the `build()` method uses the latest
    state to create widget configurations. Widgets are not updated but replaced when
    necessary.


    `SelectColor` widget in Listing [10-1](#479501_1_En_10_Chapter.xhtml#PC1) is a
    typical example of stateful widget. `_SelectColorState` class is the `State` implementation
    for `SelectColor` widget. `_selectedColor` is the internal variable that maintains
    the current selected color. The value of `_selectedColor` is used by the `DropdownButton`
    widget to determine the selected option to render and the `Text` widget to determine
    the text to display. In the `onChanged` handler of `DropdownButton`, `setState()`
    method is called to update the value of `_selectedColor` variable, which notifies
    the framework to run _SelectColorState.build() method again to get the new widget
    configuration to update the UI.


    ```

    class SelectColor extends StatefulWidget {

    @override

    _SelectColorState createState() => _SelectColorState();

    }

    class _SelectColorState extends State {

    final List _colors = [''Red'', ''Green'', ''Blue''];

    String _selectedColor;

    @override

    Widget build(BuildContext context) {

    return Column(

    children: [

    DropdownButton(

    value: _selectedColor,

    items: _colors.map((String color) {

    return DropdownMenuItem(

    value: color,

    child: Text(color),

    );

    }).toList(),

    onChanged: (value) {

    setState(() {

    _selectedColor = value;

    });

    },

    ),

    Text(''Selected: ${_selectedColor ?? "}''),

    ],

    );

    }

    }

    Listing 10-1

    Example of stateful widget

    ```


    `State` objects have their own lifecycle. You can override different lifecycle
    methods in subclasses of `State` to perform actions on different stages. Table
    [10-1](#479501_1_En_10_Chapter.xhtml#Tab1) shows these lifecycle methods.


    Table 10-1


    Lifecycle methods of State


    | Name | Description |

    | --- | --- |

    | `initState()` | Called when this object is inserted into the widgets tree. Should
    be used to perform initialization of state. |

    | `didChangeDependencies()` | Called when a dependency of this object changes.
    |

    | `didUpdateWidget(T oldWidget)` | Called when the widget of this object changes.
    Old widget is passed as a parameter. |

    | `reassemble()` | Called when the app is reassembled during debugging. This method
    is only called during development. |

    | `build(BuildContext context)` | Called when the state changes. |

    | `deactivate()` | Called when this object is removed from the widgets tree. |

    | `dispose()` | Called when this object is removed from the widgets tree permanently.
    This method is called after `deactivate()`. |


    Of the methods listed in Table [10-1](#479501_1_En_10_Chapter.xhtml#Tab1), `initState()`
    and `dispose()` methods are easy to understand. These two methods will only be
    called once during the lifecycle. However, other methods may be invoked multiple
    times.


    The `didChangeDependencies()` method is typically used when the state object uses
    inherited widgets. This method is called when an inherited widget changes. Most
    of the time, you don’t need to override this method, because the framework calls
    `build()` method automatically after a dependency changes. Sometimes you may need
    to perform some expensive tasks after a dependency changes. In this case, you
    should put the logic into `didChangeDependencies()` method instead of performing
    the task in `build()` method.


    The `reassemble()` method is only used during development, for example, during
    hot reload. This method is not called in release builds. Most of the time, you
    don’t need to override this method.


    The `didUpdateWidget()` method is called when the state’s widget changes. You
    should override this method if you need to perform cleanup tasks on the old widget
    or reuse some state from the old widget. For example, `_TextFieldState` class
    for `TextField` widget overrides `didUpdateWidget()` method to initialize `TextEditingController`
    object based on the value of the old widget.


    The `deactivate()` method is called when the state object is removed from the
    widgets tree. This state object may be inserted back to the widgets tree at a
    different location. You should override this method if the build logic depends
    on the widget’s location. For example, `FormFieldState` class for `FormField`
    widget overrides `deactivate()` method to unregister the current form field from
    the enclosing form.


    In Listing [10-1](#479501_1_En_10_Chapter.xhtml#PC1), the whole content of the
    widget is built in the `build()` method, so you can simply call `setState()` method
    in the `onPressed` callback of `DropdownButton`. If the widget has a complex structure,
    you can pass down a function that updates the state to the children widgets. In
    Listing [10-2](#479501_1_En_10_Chapter.xhtml#PC2), the `onPressed` callback of
    `RaisedButton` is set by the constructor parameter of `CounterButton`. When the
    `CounterButton` is used in `Counter` widget, the provided handler function uses
    `setState()` to update the state.


    ```

    class Counter extends StatefulWidget {

    @override

    _CounterState createState() => _CounterState();

    }

    class _CounterState extends State {

    int count = 0;

    @override

    Widget build(BuildContext context) {

    return Column(

    children: [

    CounterButton(() {

    setState(() {

    count++;

    });

    }),

    CounterText(count),

    ],

    );

    }

    }

    class CounterText extends StatelessWidget {

    CounterText(this.count);

    final int count;

    @override

    Widget build(BuildContext context) {

    return Text(''Value: ${count ?? "}'');

    }

    }

    class CounterButton extends StatelessWidget {

    CounterButton(this.onPressed);

    final VoidCallback onPressed;

    @override

    Widget build(BuildContext context) {

    return RaisedButton(

    child: Text(''+''),

    onPressed: onPressed,

    );

    }

    }

    Listing 10-2

    Pass state change function to descendant widget

    ```


    ## 10.2 Managing State Using Inherited Widgets


    ### Problem


    You want to propagate state down the widgets tree.


    ### Solution


    Create your own subclasses of I`nheritedWidget`.'
