    \ = '''\nThis is also a long\nlong\nlong\nstring\n''';\n代码清单 3-4\n多行字符串\n```\n\
    \n### 布尔值\n\n布尔值使用 `bool` 类型表示。`bool` 类型只有两个对象：`true` 和 `false`。值得注意的是，只有 `bool`\
    \ 值才能用作 `if`、`while` 和 `assert` 中的检查条件。JavaScript 有更宽泛的真值（truthy）和假值（falsy）概念，而\
