    \ object is created with a channel name and a `JavascriptMessageHandler` function\
    \ to handle the messages sent from JavaScript code running in the web page. The\
    \ message handler in Listing [12-9](#479501_1_En_12_Chapter.xhtml#PC10) uses a\
    \ `SnackBar` widget to show the received message. The channel name `Messenger`\
