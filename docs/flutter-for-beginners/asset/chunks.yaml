  trans: "\n## 6.16 小结\n\n表单控件对于与用户交互至关重要。本章涵盖了 Material Design 和 iOS 风格的表单控件，包括文本输入、单选按钮、复选框、下拉菜单、开关、纸片和滑块。在下一章中，我们将讨论用于应用脚手架（Scaffolding）的控件。\n\
    \n# 7. 常用控件\n\n在 Flutter 应用中，一些控件因用途广泛而被频繁使用。本章将讨论一些常用控件。\n\n## 7.1 显示项目列表\n\n\
    ### 问题\n\n你想要显示一个可滚动的项目列表。\n\n### 解决方案\n\n使用 `ListView` 控件作为项目的容器。\n\n### 讨论\n\
    \n像 `Flex`、`Row` 和 `Column` 这样的 Flutter 布局控件不支持滚动，并且这些控件并非设计用于在需要滚动时显示项目。如果你想显示大量项目，应该使用\
    \ `ListView` 控件。你可以将 `ListView` 视为 `Flex` 控件的可滚动对应物。\n\n有三种不同的方式可以通过不同的构造函数创建\
    \ `ListView` 控件：\n\n*   从一个静态的子控件列表创建。\n*   根据滚动位置按需构建子控件来创建。\n*   创建自定义实现。\n\n\
    本方案重点介绍前两种方式。\n\n### 带有静态子控件的 ListView\n\n如果你有一个静态的子控件列表，其大小可能超过父控件的大小，你可以将它们包裹在\
    \ `ListView` 控件中以启用滚动。这是通过调用 `ListView()` 构造函数并传入类型为 `Widget[]` 的 `children` 参数来实现的。滚动方向由类型为\
    \ `Axis` 的 `scrollDirection` 参数决定。默认的滚动方向是 `Axis.vertical`。如果你想以相反的顺序显示子控件，可以将\
    \ `reverse` 参数设置为 `true`。清单 7-1 展示了一个包含三个子控件的 `ListView` 控件。\n\n```\nListView(\n\
    \  children: [\n    ExampleWidget(name: 'Box 1'),\n    ExampleWidget(name: 'Box\
    \ 2'),\n    ExampleWidget(name: 'Box 3'),\n  ],\n)\n```\n\n默认的 `ListView()` 构造函数只应在子控件数量较少时使用。所有子控件都会被创建，即使其中一些在视口中不可见。这可能会影响性能。\n\
    \n### 带有项目构建器的 ListView\n\n如果你有大量项目或需要动态创建项目，可以使用 `ListView.builder()` 和 `ListView.separated()`\
    \ 构造函数。你需要提供类型为 `IndexedWidgetBuilder` 的构建器函数来按需构建项目，而不是提供一个静态的控件列表。`IndexedWidgetBuilder`\
    \ 是 `Widget (BuildContext context, int index)` 的 typedef。`index` 参数是要构建的项目的索引。`ListView`\
    \ 控件确定视口中项目的索引，并调用构建器函数来构建要渲染的项目。如果项目总数已知，你应将此数字作为 `itemCount` 参数传入。如果 `itemCount`\
    \ 非空，构建器函数将仅使用大于等于零且小于 `itemCount` 的索引被调用。如果 `itemCount` 为 `null`，则构建器函数需要返回 `null`\
    \ 以指示没有更多项目可用。\n\n当使用 `ListView.builder()` 构造函数时，你只需要提供类型为 `IndexedWidgetBuilder`\
    \ 的 `itemBuilder` 参数。对于 `ListView.separated()` 构造函数，除了 `itemBuilder` 参数外，你还需要提供类型为\
    \ `IndexedWidgetBuilder` 的 `separatorBuilder` 参数来构建项目之间的分隔符。使用 `ListView.separated()`\
    \ 时，`itemCount` 参数是必需的。清单 7-2 展示了使用 `ListView.builder()` 和 `ListView.separated()`\
    \ 的示例。\n\n```\nListView.builder(\n  itemCount: 20,\n  itemBuilder: (context, index)\
    \ {\n    return ExampleWidget(name: 'Dynamic Box ${index + 1}');\n  },\n);\n\n\
    ListView.separated(\n  itemBuilder: (context, index) {\n    return ExampleWidget(name:\
    \ 'Separated Box ${index + 1}');\n  },\n  separatorBuilder: (context, index) {\n\
    \    return Divider(\n      height: 8,\n    );\n  },\n  itemCount: 20,\n);\n```\n\
    \n如果项目在滚动方向上的尺寸已知，你应该将此值作为 `itemExtent` 参数传入。非空的 `itemExtent` 参数值可以使滚动更加高效。\n"
- fmt: '### ListTile


    You can use any widget as child of `ListView`. If you the item to include text,
    icon, and other control, you can use `ListTile` and its subclasses. A list tile
    contains one to three lines of text and leading and trailing widgets surrounding
    the text. Table [7-1](#479501_1_En_7_Chapter.xhtml#Tab1) shows


    **Table 7-2** Parameters of `CheckboxListTile`


    | Name | Type | Description |

    | --- | --- | --- |

    | `secondary` | `Widget` | Widget displayed on the opposite side of the tile.
    |

    | `controlAffinity` | `ListTileControlAffinity` | Where to place the control in
    the tile. |


    **Table 7-1** Parameters of `ListTile`


    | Name | Type | Description |

    | --- | --- | --- |

    | `title` | `Widget` | Title of the list tile. |

    | `subtitle` | `Widget` | Optional content displayed below the title. |

    | `isThreeLine` | `bool` | Whether the list tile may have three lines of text.
    |

    | `leading` | `Widget` | Widget displayed before the title. |

    | `trailing` | `Widget` | Widget displayed after the title. |

    | `enabled` | `bool` | Whether the list tile is enabled. |

    | `selected` | `bool` | Whether the list tile is selected. When selected, icons
    and text are rendered with the same color. |

    | `onTap` | `GestureTapCallback` | Callback when the title is tapped. |

    | `onLongPress` | `GestureLongPressCallback` | Callback when the title is long
    pressed. |

    | `dense` | `bool` | When true, the size of the tile is reduced. |

    | `contentPadding` | `EdgeInsetsGeometry` | Padding inside of the tile. |


    Listing [7-3](#479501_1_En_7_Chapter.xhtml#PC3) shows an example of using `ListTile`.


    ```

    ListTile(

    title: Text(''Title''),

    subtitle: Text(''Description''),

    leading: Icon(Icons.shop),

    trailing: Icon(Icons.arrow_right),

    )

    Listing 7-3

    Example of ListTile

    ```


    If you want to have a checkbox in a list tile, you can use `CheckboxListTile`
    widget which combines `ListTile` and `Checkbox`. `CheckboxListTile` constructor
    has the same parameters `title`, `subtitle`, `isThreeLine`, `selected`, and `dense`
    as `ListTile` constructor. It also has parameters `value`, `onChanged`, and `activeColor`
    used for `Checkbox` constructor.


    `ListTileControlAffinity` enum defines the position of control in the list tile.
    It has three values, `leading`, `trailing`, and `platform`. When the position
