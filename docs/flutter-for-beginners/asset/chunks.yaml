- fmt: '# Discussion


    Tests are essential part of maintainable software projects. You should have tests
    for Flutter apps. The command `flutter test` runs tests for a Flutter app. When
    running the command, you can provide a list of space-separated relative file paths
    to specify the test files to run. If no files provided, all files in the `test`
    directory that have file name ending with `_test.dart` are included. The following
    command runs the test file `test/mytest.dart`.


    ```

    $ flutter test test/mytest.dart

    ```


    ## Filter the Tests to Run


    The argument `--name` specifies the regular expression to match the names of tests
    to run. A test file may contain multiple tests. If you only need to do simple
    substring matching, use `--plain-name` instead. The following commands show the
    usage of `--name` and `--plain-name`.


    ```

    $ flutter test --name="smoke\d+"

    $ flutter test --plain-name=smoke

    ```


    You can specify multiple matching conditions using `--name` and `--plain-name`.
    The tests to run need to match all given conditions. The following command uses
    both `--name` and `--plain-name`.


    ```

    $ flutter test --name="smoke.*" --plain-name=test

    ```


    ## Test Coverage


    If you want to know the coverage of your tests, use the argument `--coverage`.
    After the testing, `flutter test` generates test coverage information and saves
    to the file `coverage/lcov.info`. The output path of the coverage information
    can be specified using the argument `--coverage-path`. If you have base coverage
    data, you can put it into the path `coverage/lcov.base.info` and pass the argument
    `--merge-coverage` to `flutter test`, then Flutter SDK will use `lcov` to merge
    these two coverage files.


    To view the coverage report, you need to have `lcov` installed. On macOS, `lcov`
    can be installed using Homebrew.


    ```

    $ brew install lcov

    ```


    The command `genhtml` generates HTML files from the `lcov` coverage information
    file. The following command generates the HTML coverage report. Open the generated
    file `index.html` to view the report.


    ```

    $ genhtml coverage/lcov.info --output-directory coverage_report

    ```


    ## Debug a Test


    If you want to debug a test file, you can use the argument `--start-paused`. Only
    a single test file is allowed in this mode. The execution is paused until a debugger
    is connected. The following command debugs the file `test/simple.dart`.


    ```

    $ flutter test --start-paused test/simple.dart

    ```


    ## Other Options


    There are other useful arguments; see Table [2-10](#479501_1_En_2_Chapter.xhtml#Tab10).


    Table 2-10


    Extra arguments of `flutter test`


    | Arguments | Description | Default value |

    | --- | --- | --- |

    | `--j`, `--concurrency` | The number of concurrent tests to run. | `6` |

    | `--pub` / `--no-pub` | Whether to run `flutter packages get` before running
    the tests. | On |


    ## 2.13 Analyzing the Code


    ### Problem


    Your Flutter code compiles successfully and looks good in tests. However, you
    want to know if there are any potential errors or bad code practices in your code.


    ### Solution


    Use the command `flutter analyze`.


    ### Discussion


    Even though your code compiles successfully and passes all tests, it’s still possible
    for the code to have potential errors or bad smells. For example, a local variable
    is declared but never used. It’s a good practice to keep the code as clean as
    possible. Dart provides the analyzer to analyze source code to find potential
    errors.


    The command `flutter analyze` accepts a list of directories to scan Dart files.
    If no path is provided, `flutter analyze` simply analyzes current working directory.
    The following command analyzes the directory `~/my_app/lib`.


    ```

    $ flutter analyze ~/my_app/lib

    ```


    The analysis result can be written to a file with the argument `--write`. By default,
    the result is written to the console. You can also pass the argument `--watch`
    to let the analyzer watch for file system changes and run analysis continuously.


    Table [2-11](#479501_1_En_2_Chapter.xhtml#Tab11) shows extra arguments of `flutter
    analyze`.


    Table 2-11


    Extra arguments of `flutter analyze`


    | Arguments | Description | Default value |

    | --- | --- | --- |

    | `--current-package` / `--no-current-package` | Whether to analyze current project.
    If `--no-current-package` is enabled and no directory is specified, then nothing
    will be analyzed. | On |

    | `--pub` / `--no-pub` | Whether to run `flutter packages get` before running
    the analysis. | On |

    | `--preamble` / `--no-preamble` | Whether to show the current file being analyzed.
    | On |

    | `--congratulate` / `--no-congratulate` | Whether to show output even there are
    no errors, warnings, hints, or lints. | On |

    | `--watch` | Continuously monitors for file system changes, and runs analysis
    in response. |   |


    The command `flutter analyze` delegates the code analysis to Dart `dartanalyzer`
    tool. We can use the file `analysis_options.yaml` in the project’s root directory
    to customize the analysis behavior.


    Figure [2-12](#479501_1_En_2_Chapter.xhtml#Fig12) shows the output of `flutter
    analyze` with one issue found in the code.


