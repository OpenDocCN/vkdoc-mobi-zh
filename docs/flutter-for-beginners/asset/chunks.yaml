    ## 5.20 总结


    借助 Flutter 中的布局组件，可以轻松满足构建 Flutter 应用时常见的布局需求。本章介绍了许多用于单子元素和多子元素的布局组件。在下一章中，我们将讨论表单组件。


    # 6. 表单组件


    表单控件在移动应用中对于与用户交互非常重要。Flutter 提供了一套用于 Material Design 和 iOS 风格的表单组件。这些表单组件通常没有内部状态。它们的外观和行为完全由构造函数参数定义。通过在前代组件中维护状态，表单组件会重新渲染以反映状态变化。本章涵盖了与表单组件基本用法相关的方案。


    ## 6.1 收集文本输入


    ### 问题


    你想要收集文本输入。


    ### 解决方案


    对于 Material Design 使用 `TextField`，对于 iOS 风格使用 `CupertinoTextField`。


    ### 讨论


    要在 Flutter 应用中收集用户输入，你可以为 Material Design 使用 `TextField` 组件，或者为 iOS 风格使用 `CupertinoTextField`
    组件。这两个组件具有相似的使用模式和表现。实际上，这两个组件都封装了相同的 `EditableText`，后者提供了支持滚动、选择和光标移动的基本文本输入能力。`EditableText`
    是一个高度可定制的组件，拥有许多命名参数。本方案着重介绍如何设置 `TextField` 或 `CupertinoTextField` 组件的初始值，并从中获取文本。


    `EditableText` 组件的文本由一个 `TextEditingController` 实例控制。你可以在创建新的 `EditableText` 组件时，使用
    `controller` 参数来设置一个 `TextEditingController` 实例。该控制器维护了与相应 `EditableText` 组件的双向数据绑定。控制器有一个
    `text` 属性来跟踪当前编辑的文本，以及一个类型为 `TextSelection` 的 `selection` 属性来跟踪当前选中的文本。每当 `EditableText`
    组件中的文本被用户修改或选中时，关联的 `TextEditingController` 实例的 `text` 和 `selection` 属性将被更新。如果你修改了
    `TextEditingController` 实例的 `text` 或 `selection` 属性，`EditableText` 组件会自行更新。`TextEditingController`
    类是 `ValueNotifier<TextEditingValue>` 的子类，因此你可以向控制器添加监听器，以便在文本或选区发生变化时收到通知。在创建新的
    `TextEditingController` 实例时，你可以通过 `text` 参数传入一些文本，这些文本将成为对应 `EditableText` 组件的初始文本。


    让我们看看从 `EditableText` 组件获取文本的三种不同方法。


    ### 使用 TextEditingController


    第一种方法是使用 `TextEditingController`。代码清单 6-1 中的 `ReverseText` 组件用于反转一个输入字符串。`TextEditingController`
    实例在创建时带有初始文本 `<input>`。当按钮被按下时，`_value` 被更新为从控制器检索到的文本。反转后的字符串将被显示出来。


    ```

    class ReverseText extends StatefulWidget {

    @override

    _ReverseTextState createState() => _ReverseTextState();

    }

    class _ReverseTextState extends State {

    final TextEditingController _controller = TextEditingController(

    text: "",

    );

    String _value;

    @override

    Widget build(BuildContext context) {

    return Column(

    crossAxisAlignment: CrossAxisAlignment.start,

    children: [

    Row(

    children: [

    Expanded(

    child: TextField(

    controller: _controller,

    ),

    ),

    RaisedButton(

    child: Text(''Go''),

    onPressed: () {

    this.setState(() {

    _value = _controller.text;

    });

    },

    ),

    ],

    ),

    Text( (_value ?? "). split(").reversed.join()),

    ],

    );

    }

    }

