- fmt: "### Discussion\n\nWhen writing test cases, the classes to test may have dependencies\
    \ that require external resources. For example, a service class needs to access\
    \ backend API to get data. When testing these classes, you don’t want to use the\
    \ real dependencies. Depending on external resources introduces uncertainty to\
    \ execution of test cases and makes them unstable. Using live services also makes\
    \ it difficult to test all possible scenarios.\n\nA better approach is to create\
    \ mock objects to replace these dependencies. With mock objects, you can easily\
    \ emulate different scenarios. Mock objects are alternative implementations of\
    \ classes. You can create mock objects manually or use `mockito` package. To use\
    \ `mockito` package, you need to add `mockito: ^4.0.0` to the `dev_dependencies`\
    \ section of `pubspec.yaml` file.\n\n`GitHubJobsClient` class in Listing [14-6](#479501_1_En_14_Chapter.xhtml#PC6)\
    \ uses `Client` class from `http` package to access GitHub Jobs API.\n\n```\n\
    class GitHubJobsClient {\n  GitHubJobsClient({@required this.httpClient}) : assert(httpClient\
    \ != null);\n  final http.Client httpClient;\n  Future<List<Job>> getJobs(String\
    \ keyword) async {\n    Uri url = Uri.https(\n      'jobs.github.com', '/positions.json',\
    \ {'description': keyword});\n    http.Response response = await httpClient.get(url);\n\
    \    if (response.statusCode != 200) {\n      throw Exception('Failed to get job\
