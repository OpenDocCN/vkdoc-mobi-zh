  trans: '

    ## 讨论


    在 Flutter 应用中，大部分代码都是用平台无关的 Dart 语言编写的。Flutter SDK 提供的功能是有限的。有时你可能仍然需要编写特定平台的代码来使用原生平台
    API。一个生成的 Flutter 应用在 `android` 和 `ios` 目录中已经包含了平台特定的代码。构建原生包需要这两个目录中的代码。


    Flutter 使用消息传递来调用平台特定的 API 并获取返回结果。消息通过平台通道传递。Flutter 代码通过平台通道向宿主发送消息。宿主代码监听平台通道并接收消息。然后使用平台特定的
    API 生成响应，并通过同一通道将响应发送回 Flutter 代码。传递的消息实际上是异步方法调用。


    在 Flutter 代码中，平台通道是使用 `MethodChannel` 类创建的。一个应用中的所有通道名称必须唯一。建议使用域名作为通道名称的前缀。要通过通道发送方法调用，这些方法调用在被发送前必须编码为二进制格式，接收到的结果会被解码为
    Dart 值。编码和解码是使用 `MethodCodec` 类的子类完成的：


    - `StandardMethodCodec` 类使用标准二进制编码。

    - `JSONMethodCodec` 类使用 UTF-8 JSON 编码。


    `MethodChannel` 构造函数有 `name` 参数用于指定通道名称，`codec` 参数用于指定 `MethodCodec` 对象。默认使用的
    `MethodCodec` 对象是 `StandardMethodCodec` 对象。


    给定一个 `MethodChannel` 对象，`invokeMethod()` 方法使用指定的参数在通道上调用一个方法。返回值是一个 `Future<T>`
    对象。这个 `Future` 对象可能以不同的值完成：


    - 如果方法调用成功，它会以结果值完成。

    - 如果方法调用失败，它会以 `PlatformException` (平台异常) 完成。

    - 如果该方法尚未实现，它会以 `MissingPluginException` (缺少插件异常) 完成。


    `invokeListMethod()` 方法也会调用一个方法，但返回一个 `Future<List<T>>` 对象。`invokeMapMethod()`
    方法调用一个方法并返回一个 `Future<Map<K, V>>` 对象。`invokeListMethod()` 和 `invokeMapMethod()`
    方法都在内部使用了 `invokeMethod()`，但增加了额外的类型转换。


    在代码清单 12-3 中，通过通道调用了 `getNetworkOperator` 方法，并返回网络运营商。


