    ## 5.11 为 Widget 添加内边距


    ### 问题


    你需要为 widget 周围添加内边距（padding）。


    ### 解决方案


    使用 `Padding`。


    ### 讨论


    `Padding` widget 会在其子级周围创建空白空间。传递给其子级的布局约束，是 widget 自身约束减去内边距后的结果，这会导致子级以更小的尺寸进行布局。内边距通过必需的
    `padding` 参数指定，其类型为 `EdgeInsetsGeometry`。


    与 `AlignmentGeometry` 类似，`EdgeInsetsGeometry` 有两个子类：`EdgeInsets` 和 `EdgeInsetsDirectional`。`EdgeInsets`
    类以视觉坐标表示偏移量。偏移量通过 `left`、`right`、`top` 和 `bottom` 边指定。表 5-5 展示了 `EdgeInsets` 类的构造函数。


    **表 5-5** EdgeInsets 构造函数


    | 名称 | 描述 |

    | --- | --- |

    | `EdgeInsets.all()` | 所有边的偏移量都设置为给定值。 |

    | `EdgeInsets.fromLTRB()` | 分别为左、上、右、下边指定偏移量值。 |

    | `EdgeInsets.only()` | 包含命名参数 left、top、right 和 bottom，默认值为 0.0。 |

    | `EdgeInsets.symmetric()` | 包含命名参数 vertical 和 horizontal，用于创建对称偏移量。 |


    如需考虑文本方向，应使用 `EdgeInsetsDirectional` 类代替 `EdgeInsets`。`EdgeInsetsDirectional`
    类使用 `start` 和 `end` 来代替 `left` 和 `right`。它提供了 `EdgeInsetsDirectional.fromSTEB()`
    构造函数，用于从 `start`、`top`、`end` 和 `bottom` 偏移量创建内边距。`EdgeInsetsDirectional.only()`
    构造函数与 `EdgeInsets.only()` 类似。


    代码清单 5-11 展示了 `Padding` widget 的示例。


    ```

    Padding(

    padding: EdgeInsets.all(20),

    child: Image.network(''https://picsum.photos/200''),

    )

    代码清单 5-11

    Padding 示例

    ```


    ## 5.12 按宽高比调整 Widget 尺寸


    ### 问题


    你需要调整 widget 尺寸以保持特定的宽高比。


    ### 解决方案


    使用 `AspectRatio`。

    '
- fmt: '### Discussion


    `AspectRatio` constructor has the required parameter `aspectRatio` to specify
    the aspect ratio value of width/height. For example, a 4:3 aspect ratio uses the
    value of `4.0/3.0`. `AspectRatio` widget tries to find the best size to maintain
    the aspect ratio while respecting its layout constraints.


    The process starts from setting the width to the maximum width of the constraints.
    If the maximum width is finite, then the height is calculated by `width / aspectRatio`.
    Otherwise, the height is set to the maximum height of the constraints and width
    is set to `height * aspectRatio`. There may be extra steps to make sure the result
    width and height meet the layout constraints. For example, if the height is less
    than the minimum height of the constraints, then height is set to this minimum
    value and width is calculated based on the height and aspect ratio. The general
    rule is to check width before height and maximum value before minimum value. The
    final size may not meet the ratio requirement, but it must meet the layout constraints.


    In Listing [5-12](#479501_1_En_5_Chapter.xhtml#PC12), `AspectRatio` widget is
    placed in a `ConstrainedBox` with a loose constraints of `Size(200, 200)`. The
    aspect ratio is `4.0/3.0`, so the height is calculated based on `200 / (4.0 /
    3.0) = 150.0`. The result size of `ApsectRatio` is `Size(200.0, 150.0)`.


    ```

    ConstrainedBox(

    constraints: BoxConstraints.loose(Size(200, 200)),

    child: AspectRatio(

    aspectRatio: 4.0 / 3.0,

    child: Image.network(''https://picsum.photos/400/300''),

    ),

    )

    Listing 5-12

    Example of AspectRatio

    ```


    ## 5.13 Transforming Widgets


    ### Problem


    You want to apply a transformation on a widget.


    ### Solution


    Use `Transform`.


    ### Discussion


    `Transform` widget can apply a transformation on its child before painting it.
    Transformations are expressed using `Matrix4` instances. `Transform` constructor
    has named parameters shown in Table [5-6](#479501_1_En_5_Chapter.xhtml#Tab6).


    **Table 5-6** Named parameters of `Transform`


    | Name | Type | Description |

    | --- | --- | --- |

    | `transform` | `Matrix4` | Matrix to transform the child. |

    | `origin` | `Offset` | Origin of the coordinate system to apply the transform.
    |

    | `alignment` | `AlignmentGeometry` | Alignment of the origin. |

    | `transformHitTests` | `bool` | Should the transform be applied when performing
    hit tests. |


    `Transform` class has other constructors to create common transformations:


    *   `Transform.rotate()` – Transform the child by rotating specified angle.

    *   `Transform.scale()` – Transform the child by scaling uniformly with specified
    scale factor.

    *   `Transform.translate()` – Transform the child by translating specified offset.


    Listing [5-13](#479501_1_En_5_Chapter.xhtml#PC13) shows examples of using `Transform`''s
    named constructors.


    ```

    Transform.rotate(

    angle: pi / 4.0,

    origin: Offset(10, 10),

    child: Text(''Hello World''),

    )

    Transform.translate(

    offset: Offset(50, 50),

    child: Text(''Hello World''),

    )

    Listing 5-13

    Examples of Transform

    ```


    ## 5.14 Controlling Different Layout Aspects on a Widget


    ### Problem


    You want to define different layout aspects for a widget.


    ### Solution


    Use `Container`.


    ### Discussion


    Flutter has many widgets to control different aspects of layout. For example,
    `SizedBox` widget controls the size, while `Align` widget controls the alignment.
    If you want to control different layout aspects on the same widget, you can wrap
    these widgets in a nested way. Actually, Flutter provides a `Container` widget
    to make it easier to define different layout aspects.


    Table [5-7](#479501_1_En_5_Chapter.xhtml#Tab7) shows the named parameters of `Container`
    constructor. You cannot provide non-null values to both `color` and `decoration`,
    because color is just a shorthand to create decoration with value `BoxDecoration(color:
    color)`. If `width` or `height` is not null, their values are used to tighten
    the constraints.


    **Table 5-7** Named parameters of `Container`


    | Name | Type | Description |

    | --- | --- | --- |

    | `alignment` | `AlignmentGeometry` | Alignment of the child. |

    | `padding` | `EdgeInsetsGeometry` | Empty space inside the decoration. |

    | `color` | `Color` | Background color. |

    | `decoration` | `Decoration` | Decoration to paint behind the child. |

    | `foregroundDecoration` | `Decoration` | Decoration to paint in front of the
    child. |

    | `width` | `double` | Width of the child. |

    | `height` | `double` | Height of the child. |

    | `constraints` | `BoxConstraints` | Additional constraints. |

    | `margin` | `EdgeInsetsGeometry` | Empty space to surround the decoration. |

    | `transform` | `Matrix4` | Transformation applied to the container. |


    `Container` is a composition of different widgets based on the values of parameters.
    Listing [5-14](#479501_1_En_5_Chapter.xhtml#PC14) shows the nesting structure
    of different widgets used by `Container` and the parameters these widgets may
    use. If the value of a parameter is null, then the corresponding widget may not
    exist.


    ```

    Transform (transform)

    - Padding (margin)

    - ConstrainedBox (constraints, width, height)

    - DecoratedBox (foregroundDecoration)

    - DecoratedBox (decoration, color)

    - Padding (padding, decoration)

    - Align (alignment)

    - child

    Listing 5-14

    Structure of Container

    ```


    Listing [5-15](#479501_1_En_5_Chapter.xhtml#PC15) shows an example of `Container`
    widget that uses all named parameters.


    ```

    Container(

    alignment: Alignment.bottomRight,

    padding: EdgeInsets.all(16),

    color: Colors.red.shade100,

    foregroundDecoration: BoxDecoration(

    image: DecorationImage(

    image: NetworkImage(''https://picsum.photos/100''),

    ),

    ),

    width: 300,

    height: 300,

    constraints: BoxConstraints.loose(Size(400, 400)),

    margin: EdgeInsets.all(32),

    transform: Matrix4.rotationZ(0.1),

    child: Text(

    ''Hello World'',

    textScaleFactor: 3,

    ),

    )

    Listing 5-15

    Example of Container

    ```


    Figure [5-2](#479501_1_En_5_Chapter.xhtml#Fig2) shows the structure of the `Container`
    widget in Listing [5-15](#479501_1_En_5_Chapter.xhtml#PC15). You can see clearly
    how these widgets are nested.


    ![../images/479501_1_En_5_Chapter/479501_1_En_5_Fig2_HTML.jpg](images/479501_1_En_5_Chapter/479501_1_En_5_Fig2_HTML.jpg)


    **Figure 5-2** Structure of `Container`


    ## 5.15 Implementing Flex Box Layout


    ### Problem


    You have multiple widgets to lay out, and you want them to be able to take extra
    space.


    ### Solution


    Use `Flex`, `Column`, `Row`, `Flexible`, and `Expanded`.


    ### Discussion


    To lay out multiple widgets using the flex box model, you can use a set of widgets
    provided by Flutter, including `Flex`, `Column`, `Row`, `Flexible`, `Expanded`,
    and `Spacer`. In fact, only `Flex` and `Flexible` widgets are important to understand.
    `Flex` widget is used as the layout container, while `Flexible` widget is used
    to wrap children widgets inside the container. `Flex` widget displays its children
    in one-dimension array. It supports layout of children in two directions, horizontal
    and vertical. `Row` and `Column` are subclasses of `Flex` that only places children
    in the horizontal and vertical direction, respectively. `Flexible` widget of a
    `Flex` container can control how a child flexes to take extra space. Children
    of `Flex` widget can be flexible or not. If you want a child to be flexible, you
    can simply wrap it in a `Flexible` widget.


    Same as CSS flex box layout, `Flex` widget uses two axes for layout. The axis
    where children are placed along is the *main axis*. The other axis is the *cross
    axis*. The main axis is configured using the `direction` parameter of type `Axis`.
    If the value is `Axis.horizontal`, then the main axis is horizontal axis, while
    the cross axis is vertical axis. If the value is `Axis.vertical`, then the main
    axis is vertical axis, while the cross axis is horizontal axis. `Row` widget always
    uses horizontal axis as the main axis, and `Column` widget always uses vertical
    axis as the main axis. If the main axis is known, then `Row` or `Column` widget
    should be used instead of `Flex` widget.'
