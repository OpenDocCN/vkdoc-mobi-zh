    ## 7.6 在 Material Design 中创建标签布局


    ### 问题


    你想要创建标签栏和标签。


    ### 解决方案


    使用 `TabBar`、`Tab` 和 `TabController`。


    ### 讨论


    标签布局在移动应用中广泛使用，用于在一个页面中组织多个部分。要在 Material Design 中实现标签布局，你需要使用多个 widget 协同工作。`TabBar`
    widget 是 `Tab` widget 的容器。`TabController` widget 负责协调 `TabBar` 和 `TabView`。


    一个 `Tab` widget 必须至少包含一些文本、一个图标或一个子 widget，但不能同时包含文本和子 widget。要创建一个 `TabBar`，你需要提供一个标签列表。你可以选择使用显式创建的
    `TabController` 实例，或者使用共享的 `DefaultTabController` 实例。`DefaultTabController` 是一个继承型
    widget。如果没有提供 `TabController`，`TabBar` 将尝试查找祖先级的 `DefaultTabController` 实例。


    你可以选择提供一个 `TabController` 实例，或者使用继承的 `DefaultTabController`。要创建一个 `TabController`，你需要提供标签数量和一个
    `TickerProvider` 实例。


    在清单 7-23 中，`_TabPageState` 的混入 `SingleTickerProviderStateMixin` 是 `TickerProvider`
    的一个实现，因此 `_TabPageState` 的当前实例被作为 `TabController` 构造函数的 `vsync` 参数传递。`TabController`
    实例由 `TabBar` 和 `TabBarView` 共享。


    ```

    class TabPage extends StatefulWidget {

    @override

    _TabPageState createState() => _TabPageState();

    }

    class _TabPageState extends State with SingleTickerProviderStateMixin {

    final List _tabs = [

    Tab(text: ''List'', icon: Icon(Icons.list)),

    Tab(text: ''Map'', icon: Icon(Icons.map)),

    ];

    TabController _tabController;

    @override

    void initState() {

    super.initState();

    _tabController = TabController(length: _tabs.length, vsync: this);

    }

    @override

    void dispose() {

    _tabController.dispose();

    super.dispose();

    }

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Tab''),

    bottom: TabBar(

    tabs: _tabs,

    controller: _tabController,

    ),

    ),

    body: TabBarView(

    children: _tabs.map((tab) {

    return Center(

    child: Text(tab.text),

    );

    }).toList(),

    controller: _tabController,

    ),

    );

    }

    }

    Listing 7-23

    使用提供的 TabController 的 TabBar

    ```


    如果你不需要与 `TabController` 交互，使用 `DefaultTabController` 是更好的选择。清单 7-24 中的代码使用 `DefaultTabController`
    实现了与清单 7-23 代码相同的功能。


    ```

    class DefaultTabControllerPage extends StatelessWidget {

    final List _tabs = [

    Tab(text: ''List'', icon: Icon(Icons.list)),

    Tab(text: ''Map'', icon: Icon(Icons.map))

    ];

    @override

    Widget build(BuildContext context) {

    return DefaultTabController(

    length: _tabs.length,

    child: Scaffold(

    appBar: AppBar(

    bottom: TabBar(tabs: _tabs),

    ),

    body: TabBarView(

    children: _tabs.map((tab) {

    return Center(

    child: Text(tab.text),

    );

    }).toList(),

    ),

    ),

    );

    }

    }

    Listing 7-24

    DefaultTabController

    ```


