    `BorderTween`, `BoxConstraintsTween`, `DecorationTween`, `EdgeInsetsTween`, `SizeTween`,
    `TextStyleTween`, and more.


    ## 11.3 Creating Curved Animations


    ### Problem


    You want to create curved animations.


    ### Solution


    Use `CurvedAnimation` or `CurveTween` class.'
  trans: '

    ### 讨论


    Flutter 中的动画具有值和状态。动画的值可能会随时间变化。动画使用抽象的 `Animation<T>` 类来表示。 `Animation` 类继承自
    `Listenable` 类。你可以向 `Animation` 对象添加监听器，以在值或状态发生变化时收到通知。


    `AnimationController` 类是 `Animation<double>` 类的子类。 `AnimationController` 类提供对其创建的动画的控制。要创建
    `AnimationController` 对象，你可以提供下限、上限和持续时间。 `AnimationController` 对象的值会在持续时间内从下限变化到上限。此外还需要一个
    `TickerProvider` 对象。对于有状态 widget，你可以使用 `TickerProviderStateMixin` 或 `SingleTickerProviderStateMixin`
    类作为状态类的 mixin。如果状态只使用一个 `AnimationController` 对象，则使用 `SingleTickerProviderStateMixin`
    效率更高。


    代码清单 11-1 展示了一个在有状态 widget 中使用 `AnimationController` 来实现图片尺寸动画的示例。 `AnimationController`
    对象在 `initState()` 方法体中创建，并在 `dispose()` 方法中释放。这是使用 `AnimationController` 的典型模式。
    `_GrowingImageState` 类混入了 `SingleTickerProviderStateMixin`，因此 `AnimationController`
    构造函数将该对象用作 `vsync` 参数。在 `AnimationController` 对象的监听器中，调用 `setState()` 方法来触发 widget
    的重建。 `forward()` 方法以正向启动动画运行。在 `build()` 方法中，使用 `AnimationController` 对象的当前值来控制
    `SizedBox` widget 的尺寸。在运行时，`SizedBox` widget 的尺寸在 10 秒内从 `0` 增长到 `400`。


    ```

    class GrowingImage extends StatefulWidget {

    @override

    _GrowingImageState createState() => _GrowingImageState();

    }

    class _GrowingImageState extends State

    with SingleTickerProviderStateMixin {

    AnimationController controller;

    @override

    void initState() {

    super.initState();

    controller = AnimationController(

    lowerBound: 0,

    upperBound: 400,

    duration: const Duration(seconds: 10),

    vsync: this,

    )

    ..addListener(() {

    setState(() {});

    })

    ..forward();

    }

    @override

    Widget build(BuildContext context) {

    return SizedBox(

    width: controller.value,

    height: controller.value,

    child: Image.network(''https://picsum.photos/400''),

    );

    }

    @override

    void dispose() {

    controller.dispose();

    super.dispose();

    }

    }

    代码清单 11-1

    使用 AnimationController

    ```


    表 11-1 展示了控制动画进度的 `AnimationController` 方法。


    **表 11-1** 控制动画的方法


    | 名称 | 描述 |

    | --- | --- |

    | `forward()` | 以正向启动动画运行。 |

    | `reverse()` | 以反向启动动画运行。 |

    | `stop()` | 停止动画运行。 |

    | `repeat()` | 启动动画运行，并在完成后重新开始。 |

    | `reset()` | 将值设置为下限并停止动画。 |


    动画可能处于不同的状态。`AnimationStatus` 枚举表示动画的不同状态。表 11-2 展示了该枚举的所有值。你可以使用 `addStatusListener()`
    方法添加监听器，以便在状态改变时收到通知。


    **表 11-2** `AnimationStatus` 的值


    | 名称 | 描述 |

    | --- | --- |

    | `forward` | 动画正在正向运行。 |

    | `reverse` | 动画正在反向运行。 |

    | `dismissed` | 动画在开始处停止。 |

    | `completed` | 动画在结束处停止。 |


    在代码清单 11-2 中，为 `AnimationController` 对象添加了一个状态监听器。当动画处于 `completed` 状态时，它会以反向开始运行。


    ```

    var controller = AnimationController(

    lowerBound: 0,

    upperBound: 300,

    duration: const Duration(seconds: 10),

    vsync: this,

    )

    ..addListener(() {

    setState(() {});

    })

    ..addStatusListener((AnimationStatus status) {

    if (status == AnimationStatus.completed) {

    controller.reverse();

    }

    })

    ..forward();

    代码清单 11-2

    状态监听器

    ```


    代码清单 11-1 展示了在有状态 widget 中使用动画的典型模式。`AnimatedWidget` widget 使得动画的使用更加简单。 `AnimatedWidget`
    构造函数需要一个 `Listenable` 对象。每当 `Listenable` 对象发出一个值时，widget 会自动重建。代码清单 11-3 展示了一个使用
    `AnimatedWidget` 的示例。虽然 `AnimatedWidget` 类通常与 `Animation` 对象一起使用，但你仍然可以将其与任何 `Listenable`
    对象一起使用。


    ```

    class AnimatedImage extends AnimatedWidget {

    AnimatedImage({Key key, this.animation})

    : super(key: key, listenable: animation);

    final Animation animation;

    @override

    Widget build(BuildContext context) {

    return SizedBox(

    width: animation.value,

    height: animation.value,

    child: Image.network(''https://picsum.photos/300''),

    );

    }

    }

    代码清单 11-3

    AnimatedWidget 示例

    ```


    ## 11.2 使用线性插值创建动画


    ### 问题


    你想使用线性插值为其他数据类型创建动画。


    ### 解决方案


    使用 `Tween` 类及其子类。


    ### 讨论


    `AnimationController` 类使用 `double` 作为其值类型。`double` 值对于尺寸或位置的动画非常有用。你可能还需要对其他类型的数据进行动画处理。例如，你可以将背景颜色从红色动画变化到绿色。对于这些场景，你可以使用
    `Tween` 类及其子类。


    `Tween` 类表示起始值和结束值之间的线性插值。要创建 `Tween` 对象，你需要提供这两个值。`Tween` 对象可以为动画提供所需的值。通过将 `animate()`
    方法与另一个 `Animation` 对象结合使用，你可以创建一个新的 `Animation` 对象，该对象由提供的 `Animation` 对象驱动，但使用来自
    `Tween` 对象的值。`Tween` 的子类需要实现 `lerp()` 方法，该方法接收一个动画值并返回插值后的值。


    在代码清单 11-4 中，`AnimatedColor` widget 使用 `Animation<Color>` 对象来更新背景颜色。`ColorTween`
    对象使用起始值 `Colors.red` 和结束值 `Colors.green` 创建。


    ```

    class AnimatedColorTween extends StatefulWidget {

    @override

    _AnimatedColorTweenState createState() => _AnimatedColorTweenState();

    }

    class _AnimatedColorTweenState extends State

    with SingleTickerProviderStateMixin {

    AnimationController controller;

    Animation animation;

    @override

    void initState() {

    super.initState();

    controller = AnimationController(

    duration: const Duration(seconds: 10),

    vsync: this,

    );

    animation =

    ColorTween(begin: Colors.red, end: Colors.green).animate(controller);

    controller.forward();

    }

    @override

    Widget build(BuildContext context) {

    return AnimatedColor(

    animation: animation,

    );

    }

    @override

    void dispose() {

    controller.dispose();

    super.dispose();

    }

    }

    class AnimatedColor extends AnimatedWidget {

    AnimatedColor({Key key, this.animation})

    : super(key: key, listenable: animation);

    final Animation animation;

    @override

    Widget build(BuildContext context) {

    return Container(

    width: 300,

    height: 300,

    decoration: BoxDecoration(color: animation.value),

    );

    }

    }

    代码清单 11-4

    ColorTween 示例

    ```


    还有许多其他针对不同对象的 `Tween` 子类，包括 `AlignmentTween`、`BorderTween`、`BoxConstraintsTween`、`DecorationTween`、`EdgeInsetsTween`、`SizeTween`、`TextStyleTween`
    等等。


    ## 11.3 创建曲线动画


    ### 问题


    你想创建曲线动画。


    ### 解决方案


    使用 `CurvedAnimation` 或 `CurveTween` 类。

