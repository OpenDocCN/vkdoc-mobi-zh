    ## 11.9 Using Common Transitions


    ### Problem


    You want to have a simple way to use different types of `Tween` objects for animations.


    ### Solution


    Use different types of transitions.


    ### Discussion


    It’s common to use different types of `Tween` objects to animate different aspects
    of widgets. You can use `AnimatedWidget` or `AnimatedBuilder` class to work with
    `Tween` objects. Flutter SDK provides several transition widgets to make certain
    animations easy to use.


    `ScaleTransition` widget animates the scale of a widget. To create a `ScaleTransition`
    object, you need to provide an `Animation<double>` object as the scale. The `alignment`
    parameter specifies the alignment of the origin of scaling coordinates relative
    to the box. Listing [11-13](#479501_1_En_11_Chapter.xhtml#PC13) shows an example
    of `ScaleTransition`.


    ```

    class ScaleBox extends StatelessWidget {

    ScaleBox({Key key, Animation animation})

    : _animation = CurveTween(curve: Curves.ease).animate(animation),

    super(key: key);

    final Animation _animation;

    @override

    Widget build(BuildContext context) {

    return ScaleTransition(

    scale: _animation,

    alignment: Alignment.centerLeft,

    child: Container(

    height: 100,

    decoration: BoxDecoration(color: Colors.red),

    ),

    );

    }

    }

    Listing 11-13

    Example of ScaleTransition

    ```


    Another example of transition widget is `FadeTransition` widget that animates
    the opacity. Listing [11-14](#479501_1_En_11_Chapter.xhtml#PC14) shows an example
    of `FadeTransition`.


    ```

    class FadeBox extends StatelessWidget {

    FadeBox({Key key, Animation animation})

    : _animation = CurveTween(curve: Curves.ease).animate(animation),

    super(key: key);

    final Animation _animation;

    @override

    Widget build(BuildContext context) {

    return FadeTransition(

    opacity: _animation,

    child: Container(

    height: 100,

    decoration: BoxDecoration(color: Colors.red),

    ),

    );

    }

    }

    Listing 11-14

    Example of FadeTransition

    ```


    ## 11.10 Creating Physics Simulations


    ### Problem


    You want to use physics simulations.


    ### Solution


    Use simulations in `physics` library.'
