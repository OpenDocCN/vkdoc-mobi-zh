    ## 10.9 总结


    本章讨论了适用于 Flutter 应用的不同状态管理方案。在这些方案中，`StatefulWidget`、`InheritedWidget`、`InheritedModel`
    和 `InheritedNotifier` 是 Flutter 框架提供的。Scoped model、Bloc、Redux 和 Mobx 库则是第三方的解决方案。你可以自由选择最适合你需求的方案。在下一章中，我们将讨论
    Flutter 中的动画。


    # 11. 动画


    动画在移动应用中扮演着重要角色，可以为最终用户提供视觉反馈。本章涵盖了与 Flutter 动画相关的实践。


    ## 11.1 创建简单动画


    ### 问题


    你想要创建简单的动画。


    ### 解决方案


    使用 `AnimationController` 类来创建简单的动画。

    '
- fmt: '### Discussion


    Animations in Flutter have a value and a status. The value of an animation may
    change over time. Animations are represented using abstract `Animation<T>` class.
    `Animation` class extends from `Listenable` class. You can add listeners to `Animation`
    objects to get notified for changes of value or status.


    `AnimationController` class is a subclass of `Animation<double>` class. `AnimationController`
    class provides control over the animation it creates. To create an `AnimationController`
    object, you can provide a lower bound, an upper bound, and a duration. The value
    of `AnimationController` object changes from the lower bound to the upper bound
    over the duration. A `TickerProvider` object is also required. For stateful widget,
    you can use `TickerProviderStateMixin` or `SingleTickerProviderStateMixin` class
    as the mixin of the state class. If only one `AnimationController` object is used
    for the state, using `SingleTickerProviderStateMixin` is more efficient.


    Listing [11-1](#479501_1_En_11_Chapter.xhtml#PC1) shows an example of using `AnimationController`
    in stateful widgets to animate the size of an image. The `AnimationController`
    object is created in the body of `initState()` method and disposed in `dispose()`
    method. This is a typical pattern of using `AnimationController`. `_GrowingImageState`
    class has the `SingleTickerProviderStateMixin` mixin, so the `AnimationController`
    constructor uses this object as the `vsync` parameter. In the listener of `AnimationController`
    object, `setState()` method is called to trigger the rebuild of the widget. The
    `forward()` method starts the running of the animation in forward direction. In
    the `build()` method, the current value of `AnimationController` object is used
    to control the size of the `SizedBox` widget. In the runtime, the size of `SizedBox`
    widget grows from `0` to `400` in 10 seconds.


    ```

    class GrowingImage extends StatefulWidget {

    @override

    _GrowingImageState createState() => _GrowingImageState();

    }

    class _GrowingImageState extends State

    with SingleTickerProviderStateMixin {

    AnimationController controller;

    @override

    void initState() {

    super.initState();

    controller = AnimationController(

    lowerBound: 0,

    upperBound: 400,

    duration: const Duration(seconds: 10),

    vsync: this,

    )

    ..addListener(() {

    setState(() {});

    })

    ..forward();

    }

    @override

    Widget build(BuildContext context) {

    return SizedBox(

    width: controller.value,

    height: controller.value,

    child: Image.network(''https://picsum.photos/400''),

    );

    }

    @override

    void dispose() {

    controller.dispose();

    super.dispose();

    }

    }

    Listing 11-1

    Using AnimationController

    ```


    Table [11-1](#479501_1_En_11_Chapter.xhtml#Tab1) shows methods of `AnimationController`
    to control the progress of animation.


    **Table 11-1** Methods to control animation


    | Name | Description |

    | --- | --- |

    | `forward()` | Starts the running of animation in forward direction. |

    | `reverse()` | Starts the running of animation in backward direction. |

    | `stop()` | Stops the running of animation. |

    | `repeat()` | Starts the running of animation and restarts when it completes.
    |

    | `reset()` | Sets the value to the lower bound and stops the animation. |


    An animation may be in different status. `AnimationStatus` enum represents different
    statuses for an animation. Table [11-2](#479501_1_En_11_Chapter.xhtml#Tab2) shows
    all values of this enum. You can use `addStatusListener()` method to add a listener
    to get notified when the status changes.


    **Table 11-2** Values of `AnimationStatus`


    | Name | Description |

    | --- | --- |

    | `forward` | The animation is running in forward direction. |

    | `reverse` | The animation is running in backward direction. |

    | `dismissed` | The animation is stopped at the beginning. |

    | `completed` | The animation is stopped at the end. |


    In Listing [11-2](#479501_1_En_11_Chapter.xhtml#PC2), a status listener is added
    to the `AnimationController` object. When the animation is in the `completed`
    status, it starts running in backward direction.


    ```

    var controller = AnimationController(

    lowerBound: 0,

    upperBound: 300,

    duration: const Duration(seconds: 10),

    vsync: this,

    )

    ..addListener(() {

    setState(() {});

    })

    ..addStatusListener((AnimationStatus status) {

    if (status == AnimationStatus.completed) {

    controller.reverse();

    }

    })

    ..forward();

    Listing 11-2

    Status listener

    ```


    Listing [11-1](#479501_1_En_11_Chapter.xhtml#PC1) shows a typical pattern to use
    animations with stateful widgets. `AnimatedWidget` widget makes the use of animations
    much easier. `AnimatedWidget` constructor requires a `Listenable` object. Whenever
    the `Listenable` object emits a value, the widget rebuilds itself. Listing [11-3](#479501_1_En_11_Chapter.xhtml#PC3)
    shows an example of using `AnimatedWidget`. Although `AnimatedWidget` class is
    typically used with `Animation` objects, you can still use it with any `Listenable`
    object.


    ```

    class AnimatedImage extends AnimatedWidget {

    AnimatedImage({Key key, this.animation})

    : super(key: key, listenable: animation);

    final Animation animation;

    @override

    Widget build(BuildContext context) {

    return SizedBox(

    width: animation.value,

    height: animation.value,

    child: Image.network(''https://picsum.photos/300''),

    );

    }

    }

