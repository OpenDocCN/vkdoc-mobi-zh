- fmt: "## 6.16 Summary\n\nForm widgets are important to interact with user. This\
    \ chapter covers form widgets for Material Design and iOS style, including text\
    \ input, radio button, checkbox, dropdown, switch, chip, and slider. In the next\
    \ chapter, we’ll discuss widgets for application scaffolding.\n\n# 7. Common Widgets\n\
    \nIn Flutter apps, some widgets are widely used for different purposes. This chapter\
    \ discusses some common widgets.\n\n## 7.1 Displaying a List of Items\n\n### Problem\n\
    \nYou want to display a scrollable list of items.\n\n### Solution\n\nUse `ListView`\
    \ widget as the container of items.\n\n### Discussion\n\nFlutter layout widgets\
    \ like `Flex`, `Row`, and `Column` don’t support scrolling, and these widgets\
    \ are not designed to be used to display items when scrolling is required. If\
    \ you want to display a large number of items, you should use `ListView` widget.\
    \ You can think `ListView` as the scrollable counterpart of `Flex` widget.\n\n\
    There are three different ways to create `ListView` widgets using different constructors:\n\
    \n* Create from a static list of children widgets.\n* Create by building children\
    \ on demand based on the scrolling position.\n* Create a custom implementation.\n\
    \nThis recipe focuses on the first two ways.\n\n### ListView with Static Children\n\
    \nIf you have a static list of children that may exceed the size of their parent\
    \ widget, you can wrap them in a `ListView` widget to enable scrolling. This is\
    \ done by invoking the `ListView()` constructor with the `children` parameter\
    \ of type `Widget[]`. The scrolling direction is determined by the `scrollDirection`\
    \ parameter of type `Axis`. The default scroll direction is `Axis.vertical`. If\
    \ you want to display the children in a reverse order, you can set the `reverse`\
    \ parameter to `true`. Listing [7-1](#479501_1_En_7_Chapter.xhtml#PC1) shows a\
    \ `ListView` widget with three children.\n\n```\nListView(\n  children: [\n  \
    \  ExampleWidget(name: 'Box 1'),\n    ExampleWidget(name: 'Box 2'),\n    ExampleWidget(name:\
    \ 'Box 3'),\n  ],\n)\n```\n\nThe default `ListView()` constructor should only\
    \ be used when you have a small number of children. All children will be created,\
    \ even though some of them are not visible in the viewport. This is likely to\
    \ have performance impact.\n\n### ListView with Item Builders\n\nIf you have a\
    \ large number of items or items need to be dynamically created, you can use `ListView.builder()`\
    \ and `ListView.separated()` constructors. Instead of a static list of widgets,\
    \ you need to provide builder functions of type `IndexedWidgetBuilder` to build\
    \ items on demand. `IndexedWidgetBuilder` is typedef of `Widget (BuildContext\
    \ context, int index)`. The `index` parameter is the index of the item to build.\
    \ `ListView` widget determines the indices of items in the viewport and invokes\
    \ the builder function to build the items to render. If the total number of items\
    \ is known, you should pass this number as the `itemCount` parameter. If `itemCount`\
    \ is non-null, the builder function will only be invoked with indices greater\
    \ than or equal to zero and less than `itemCount`. If `itemCount` is `null`, the\
    \ builder function needs to return `null` to indicate that no more items are available.\n\
    \nWhen using `ListView.builder()` constructor, you only need to provide the `itemBuilder`\
    \ parameter of type `IndexedWidgetBuilder`. For `ListView.separated()` constructor,\
    \ apart from the `itemBuilder` parameter, you also need to provide the `separatorBuilder`\
    \ parameter of type `IndexedWidgetBuilder` to build the separators between items.\
    \ When using `ListView.separated()`, the `itemCount` parameter is required. Listing\
    \ [7-2](#479501_1_En_7_Chapter.xhtml#PC2) shows examples of using `ListView.builder()`\
    \ and `ListView.separated()`.\n\n```\nListView.builder(\n  itemCount: 20,\n  itemBuilder:\
    \ (context, index) {\n    return ExampleWidget(name: 'Dynamic Box ${index + 1}');\n\
    \  },\n);\n\nListView.separated(\n  itemBuilder: (context, index) {\n    return\
    \ ExampleWidget(name: 'Separated Box ${index + 1}');\n  },\n  separatorBuilder:\
    \ (context, index) {\n    return Divider(\n      height: 8,\n    );\n  },\n  itemCount:\
    \ 20,\n);\n```\n\nIf the extent of an item in the scroll direction is known, you\
    \ should pass this value as the `itemExtent` parameter. Non-null values of `itemExtent`\
    \ parameter make the scrolling more efficient."
