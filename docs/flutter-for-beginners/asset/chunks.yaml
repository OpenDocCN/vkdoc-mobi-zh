    # 1. Get Started


    Recipes in this chapter help you set up your local development environment to
    get ready for building Flutter apps. Depending on the operating system of your
    machine, the steps to set up may be different. You only need to use the recipes
    for your own requirement. After using recipes in this chapter, you should be able
    to get the first Flutter app running on emulators or physical devices.


    ## 1.1 Installing Flutter SDK on Windows


    ### Problem


    You have a Windows machine, and you want to start Flutter development on this
    machine.


    ### Solution


    Install Flutter SDK and set up Android platform on the Windows machine.


    ### Discussion


    Flutter SDK supports Windows platform. Installing Flutter on Windows is not a
    hard task as you may think. First of all, you need to make sure that your local
    development environment meets the minimum requirements. You’ll need to have 64-bit
    Windows 7 SP1 or later and at least 400MB free disk space for Flutter SDK to use.
    Flutter SDK also requires Windows PowerShell 5.0 or newer and Git for Windows
    to be available on the machine.


    Windows PowerShell 5.0 is pre-installed with Windows 10\. For Windows versions
    older than Windows 10, you need to install PowerShell 5.0 manually by following
    instructions from Microsoft ( [`https://docs.microsoft.com/en-us/powershell/scripting/setup/installing-windows-powershell`](https://docs.microsoft.com/en-us/powershell/scripting/setup/installing-windows-powershell)
    ). You may already have Git for Windows installed since Git is a very popular
    tool for development. If you can run Git commands in PowerShell, then you are
    good to go. Otherwise, you need to download Git for Windows ( [`https://git-scm.com/download/win`](https://git-scm.com/download/win)
    ) and install it. When installing Git for Windows, make sure the option “Git from
    the command line and also from 3rd-party software” is selected in the page “Adjusting
    your PATH environment”; see Figure [1-1](#479501_1_En_1_Chapter.xhtml#Fig1).


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig1_HTML.jpg](images/479501_1_En_1_Chapter/479501_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Git for Windows setup


    After these minimum requirements have been satisfied, you can download the Flutter
    SDK zip bundles from the official web site ( [`https://flutter.dev/docs/get-started/install/windows`](https://flutter.dev/docs/get-started/install/windows)
    ). Extract the downloaded zip file to the desired location on the local machine.
    It’s recommended to avoid using the system driver where Windows is installed.
    In the extracted directory, double-click the file `flutter_console.bat` to start
    Flutter Console and run Flutter SDK commands.


    To be able to run Flutter SDK commands in any Windows console, we need to add
    Flutter SDK to the `PATH` environment variable. The full path to `bin` of the
    installation directory should be added to the `PATH`. To modify the PATH on Windows
    10


    1.  Open the Start Search and type “env” and select “Edit the system environment
    variables”.


    2.  Click the “Environment Variables…” button and find the row with “Path” in
    the first column under the “System Variables” section.


    3.  In the “Edit environment variable” dialog, click “New” and input the path
    of the bin directory of installed Flutter SDK.


    4.  Close all dialogs by clicking “OK”.


    Now you can open a new PowerShell windows and type the command `flutter --version`
    to verify the installation; see Figure [1-2](#479501_1_En_1_Chapter.xhtml#Fig2).


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig2_HTML.jpg](images/479501_1_En_1_Chapter/479501_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Success installation of Flutter SDK on Windows


    Only Android platform is supported on Windows. Continue the setup following Recipe
    1-7.


    ## 1.2 Installing Flutter SDK on Linux


    ### Problem


    You have a Linux machine, and you want to start Flutter development on this machine.


    ### Solution


    Install Flutter SDK and set up Android platform on the Linux machine.'
  trans: '

    # 1. 开始使用


    本章的指南将帮助你搭建本地开发环境，为构建 Flutter 应用做好准备。根据你机器的操作系统不同，设置步骤可能有所差异。你只需根据自身需求使用相应的指南即可。完成本章指南后，你应该能够在模拟器或物理设备上运行第一个
    Flutter 应用。


    ## 1.1 在 Windows 上安装 Flutter SDK


    ### 问题


    你有一台 Windows 机器，并希望在这台机器上开始 Flutter 开发。


    ### 解决方案


    在 Windows 机器上安装 Flutter SDK 并配置 Android 平台。


    ### 讨论


    Flutter SDK 支持 Windows 平台。在 Windows 上安装 Flutter 并不像你想象的那样困难。首先，你需要确保本地开发环境满足最低要求。你需要拥有
    64 位 Windows 7 SP1 或更高版本，并且 Flutter SDK 至少需要 400MB 的可用磁盘空间。Flutter SDK 还需要机器上安装有
    Windows PowerShell 5.0 或更新版本，以及 Git for Windows。


    Windows PowerShell 5.0 预装在 Windows 10 中。对于 Windows 10 之前的 Windows 版本，你需要按照微软的说明（https://docs.microsoft.com/en-us/powershell/scripting/setup/installing-windows-powershell）手动安装
    PowerShell 5.0。你可能已经安装了 Git for Windows，因为 Git 是一种非常流行的开发工具。如果你可以在 PowerShell
    中运行 Git 命令，那就没问题。否则，你需要下载 Git for Windows（https://git-scm.com/download/win）并安装它。在安装
    Git for Windows 时，请确保在“调整你的 PATH 环境”页面中选中“从命令行以及第三方软件使用 Git”选项；见图 1-1。


    满足这些最低要求后，你可以从官方网站（https://flutter.dev/docs/get-started/install/windows）下载 Flutter
    SDK 的 zip 压缩包。将下载的 zip 文件解压到本地机器上所需的位置。建议避免使用安装 Windows 的系统驱动器。在解压后的目录中，双击 `flutter_console.bat`
    文件启动 Flutter 控制台并运行 Flutter SDK 命令。


    为了能够在任何 Windows 控制台中运行 Flutter SDK 命令，我们需要将 Flutter SDK 添加到 `PATH` 环境变量中。安装目录下
    `bin` 文件夹的完整路径应被添加到 `PATH` 中。在 Windows 10 上修改 PATH：


    1.  打开开始搜索，输入“env”并选择“编辑系统环境变量”。

    2.  点击“环境变量...”按钮，在“系统变量”区域下找到第一列为“Path”的行。

    3.  在“编辑环境变量”对话框中，点击“新建”并输入已安装 Flutter SDK 的 `bin` 目录路径。

    4.  点击“确定”关闭所有对话框。


    现在，你可以打开一个新的 PowerShell 窗口，输入命令 `flutter --version` 来验证安装；见图 1-2。


    Windows 上仅支持 Android 平台。请按照指南 1-7 继续设置。


    ## 1.2 在 Linux 上安装 Flutter SDK


    ### 问题


    你有一台 Linux 机器，并希望在这台机器上开始 Flutter 开发。


    ### 解决方案


    在 Linux 机器上安装 Flutter SDK 并配置 Android 平台。

