    \ widget 树时，你可能也想对 widget 施加布局约束。在这种情况下，你可以使用`ConstrainedBox` widget。`ConstrainedBox`构造函数有一个必需的命名参数`constraints`，类型为`BoxConstraints`，用于指定要施加给子组件的约束。\n\
    \n`SizedBox` widget 可以被视为一种特殊的`ConstrainedBox`。`SizedBox`具有命名参数`width`和`height`，它们用于通过`BoxConstraints.tightFor()`方法创建一个紧约束。`SizedBox(width:\
    \ width, height: height, child: child)`等同于`ConstrainedBox(constraints: BoxConstraints.tightFor(width:\
    \ width, height: height), child: child)`。如果你想施加紧约束，那么`SizedBox`比`ConstrainedBox`更方便。`SizedBox`还有其他用于常见用例的命名构造函数；见表\
    \ [5-3](#479501_1_En_5_Chapter.xhtml#Tab3)。\n\n**表 5-3** `SizedBox`构造函数\n\n| 名称\
    \ | 含义 | 描述 |\n| --- | --- | --- |\n| `SizedBox.expand()` | `SizedBox(width: double.infinity,\
    \ height: double.infinity)` | 与其父组件允许的一样大。 |\n| `SizedBox.shrink()` | `SizedBox(width:\
    \ 0.0, height: 0.0)` | 与其父组件允许的一样小。 |\n| `SizedBox.fromSize()` | `SizedBox(width:\
    \ size.width; height: size.height)` | 具有指定大小的框。 |\n\n实际应用于子 widget 的约束是提供的`constraints`参数与`ConstrainedBox`或`SizedBox`的父组件提供的约束的组合。组合通过调用`providedContraints.enforce(parentContraints)`完成。结果约束尊重父约束，并尽可能接近提供的约束。`ConstrainedBox`或`SizedBox`的大小是子\
    \ widget 布局后的大小。\n\n列表 [5-4](#479501_1_En_5_Chapter.xhtml#PC4) 展示了使用`ConstrainedBox`和`SizedBox`的四个示例。第一个示例是`SizedBox`的典型用法模式。第二个示例使用了`SizedBox.shrink()`，导致图像不显示。第三个示例是`ConstrainedBox`的典型用法模式。最后一个示例展示了`ConstrainedBox`实例如何尊重来自父组件的约束。\n\
    \n```\nSizedBox(\n  width: 100,\n  height: 100,\n  child: Text('SizedBox'),\n\
    )\n\nSizedBox.shrink(\n  child: Image.network('https://picsum.photos/50'),\n)\n\
    \nConstrainedBox(\n  constraints: BoxConstraints(\n    maxWidth: 50,\n    minHeight:\
    \ 50,\n  ),\n  child: Text('ConstrainedBox'),\n)\n\nConstrainedBox(\n  constraints:\
    \ BoxConstraints(\n    maxWidth: 200,\n  ),\n  child: ConstrainedBox(\n    constraints:\
    \ BoxConstraints(\n      maxHeight: 200,\n    ),\n    child: Image.network('https://picsum.photos/300'),\n\
    \  ),\n)\n\n列表 5-4 ConstrainedBox 和 SizedBox 示例\n```\n\n## 5.5 不对 Widget 施加约束\n\
    \n### 问题\n\n你想要对 widget 施加约束，以允许它们以自然大小渲染。\n\n### 解决方案\n\n使用`UnconstrainedBox`。\n\
    \n### 讨论\n\n`UnconstrainedBox`与食谱 5-4 中的`ConstrainedBox`相反。`UnconstrainedBox`不对其子组件施加任何约束。子组件可以在`UnconstrainedBox`实例提供的无限空间上自由渲染。`UnconstrainedBox`将尝试通过遵循其自身约束的限制，使用子\
    \ widget 的大小来确定其自身大小。\n\n如果子 widget 的大小大于`UnconstrainedBox`能提供的最大尺寸，子 widget 将被裁剪。否则，子\
    \ widget 将根据`alignment`参数（类型为`AlignmentGeometry`）的值进行对齐。如果子组件溢出父组件，则在调试模式下会显示警告。使用`UnconstrainedBox`时，仍然可以通过`constrainedAxis`参数（类型为`Axis`）向一个轴添加约束。然后子组件仅允许在另一个轴上不受约束地渲染。\n\
    \n在列表 [5-5](#479501_1_En_5_Chapter.xhtml#PC5) 中，`UnconstrainedBox` widget 被放置在一个具有固定宽度和高度的`SizedBox`\
    \ widget 中。`UnconstrainedBox` widget 在水平轴上受到约束，这意味着最小和最大宽度均为 100px。图像的宽度为 200px，因此它被缩小到\
    \ 100px 以满足宽度约束。这导致图像高度缩小到 150px，超过了父组件`SizedBox` widget 的最大高度 100px。在调试模式下运行时，你可以看到警告消息，提示顶部和底部溢出了\
    \ 25px。\n\n```\nSizedBox(\n  width: 100,\n  height: 100,\n  child: UnconstrainedBox(\n\
    \    constrainedAxis: Axis.horizontal,\n    child: Image.network('https://picsum.photos/200/300'),\n\
    \  ),\n)\n\n列表 5-5 UnconstrainedBox 示例\n```\n\n## 5.6 忽略父组件时对 Widget 施加约束\n\n\
    ### 问题\n\n你希望无论 widget 放置在何处，都对其施加约束。\n\n### 解决方案\n\n使用`OverflowBox`。\n\n### 讨论\n\
    \n在向 widget 施加约束时，通常会尊重来自父 widget 的约束。尊重父约束使得 widget 的布局能够灵活适应不同的使用场景。有时你可能希望\
    \ widget 只尊重显式提供的约束，而忽略父组件的约束。在这种情况下，你可以使用`OverflowBox`。\n\n`OverflowBox`构造函数具有命名参数`alignment`、`minWidth`、`maxWidth`、`minHeight`和`maxHeight`。如果任何与约束相关的参数为`null`，则使用父约束中的相应值。如果你为所有四个与约束相关的参数提供非空值，则`OverflowBox`的子组件的布局与当前\
    \ widget 完全无关。\n\n在列表 [5-6](#479501_1_En_5_Chapter.xhtml#PC6) 中，`OverflowBox`\
    \ widget 创建时所有四个与约束相关的参数都提供了非空值，因此即使它被放置在`SizedBox` widget 内部，其大小也始终是`Size(200,\
    \ 200)`。\n\n```\nSizedBox(\n  width: 100,\n  height: 100,\n  child: OverflowBox(\n\
    \    minWidth: 200,\n    minHeight: 200,\n    maxWidth: 200,\n    maxHeight: 200,\n\
    \    child: Image.network('https://picsum.photos/300'),\n  ),\n)\n\n列表 5-6 OverflowBox\
    \ 示例\n```\n\n## 5.7 限制大小以允许子 Widget 溢出\n\n### 问题\n\n你希望 widget 具有特定大小，并允许子 widget\
    \ 溢出。\n\n### 解决方案\n\n使用`SizedOverflowBox`。\n\n### 讨论\n\n`SizedOverflowBox`由一个大小创建。该\
    \ widget 的实际大小尊重其约束，并尽可能接近请求的大小。子组件的布局仅使用`SizedOverflowBox` widget 的约束。\n\n在列表\
    \ [5-7](#479501_1_En_5_Chapter.xhtml#PC7) 中，`SizedOverflowBox` widget 被放置在一个具有约束`BoxConstraints.loose(Size(100,\
    \ 100))`的`ConstrainedBox` widget 中。`SizedOverflowBox` widget 的请求大小是`Size(50, 50)`。`SizedOverflowBox`的实际大小也是`Size(50,\
    \ 50)`。子`Image` widget 仅使用`SizedOverflowBox`的约束。结果是图像 widget 的大小为`Size(100, 100)`，这溢出其父组件。\n\
    \n```\nConstrainedBox(\n  constraints: BoxConstraints.loose(Size(100, 100)),\n\
    \  child: SizedOverflowBox(\n    size: Size(50, 50),\n    child: Image.network('https://picsum.photos/400'),\n\
    \  ),\n)\n\n列表 5-7 SizedOverflowBox 示例\n```\n\n## 5.8 在无界时限制 Widget 大小\n\n###\
    \ 问题\n\n你有一个通常匹配其父组件大小的 widget，但你希望它能在需要大小约束的其他地方使用。\n\n### 解决方案\n\n使用`LimitedBox`。"
  raw: '### Discussion


    As discussed in Recipe 5-1, `Constraints` and `BoxContraints` instances are usually
    used in the `layout()` method of `RenderObject` and `RenderBox`, respectively.
    When building the widgets tree, you may also want to impose layout constraints
    on widgets. In this case, you can use `ConstrainedBox` widget. `ConstrainedBox`
    constructor has a required named parameter constraints of type `BoxConstraints`
    to specify the constraints to impose on the child.


    `SizedBox` widget can be treated as a special kind of `ConstrainedBox`. `SizedBox`
    has named parameters `width` and `height` which are used to create a tight constraint
    using `BoxConstraints.tightFor()` method. `SizedBox(width: width, height: height,
    child: child)` is the same as `ConstrainedBox(constraints: BoxConstraints.tightFor(width:
    width, height: height), child: child)`. If you want to impose tight constraints,
    then `SizedBox` is more convenient than `ConstrainedBox`. `SizedBox` has other
    named constructors for other common use cases; see Table [5-3](#479501_1_En_5_Chapter.xhtml#Tab3).


    Table 5-3


    SizedBox constructors


    | Name | Meaning | Description |

    | --- | --- | --- |

    | `SizedBox.expand()` | `SizedBox(width: double.infinity, height: double.infinity)`
    | As large as its parent allows. |

    | SizedBox.shrink() | `SizedBox(width: 0.0, height: 0.0)` | As small as its parent
    allows. |

    | `SizedBox.fromSize()` | `SizedBox(width: size.width; height: size.height)` |
    A box with the specified size. |


    The actual constraints applied to the child widget is the combination of provided
    `constraints` parameter and the constraints provided by the parent of `ConstrainedBox`
    or `SizedBox`. The combination is done by calling `providedContraints.enforce(parentContraints)`.
    The result constraints respect the parent constraints and are as close as possible
    to the provided constraints. The size of `ConstrainedBox` or `SizedBox` is the
    size of the child widget after layout.


    Listing [5-4](#479501_1_En_5_Chapter.xhtml#PC4) shows four examples of using `ConstrainedBox`
    and `SizedBox`. The first example is a typical usage pattern of `SizedBox`. The
    second example with `SizedBox.shrink()` causes the image not to be displayed.
    The third example is a typical usage pattern of `ConstrainedBox`. The last example
    shows how a `ConstrainedBox` instance respects constraints from parent.


    ```

    SizedBox(

    width: 100,

    height: 100,

    child: Text(''SizedBox''),

    )

    SizedBox.shrink(

    child: Image.network(''https://picsum.photos/50''),

    )

    ConstrainedBox(

    constraints: BoxConstraints(

    maxWidth: 50,

    minHeight: 50,

    ),

    child: Text(''ConstrainedBox''),

    )

    ConstrainedBox(

    constraints: BoxConstraints(

    maxWidth: 200,

    ),

    child: ConstrainedBox(

    constraints: BoxConstraints(

    maxHeight: 200,

    ),

    child: Image.network(''https://picsum.photos/300''),

    ),

    )

    Listing 5-4

    Examples of ConstrainedBox and SizedBox

    ```


    ## 5.5 Imposing No Constraints on Widgets


    ### Problem


    You want to impose constraints on widgets to allow them to render at natural size.


    ### Solution


    Use `UnconstrainedBox`.


    ### Discussion


    `UnconstrainedBox` is the opposite of `ConstrainedBox` in Recipe 5-4\. `UnconstrainedBox`
    imposes no constraints on its child. The child can render freely on the unlimited
    space provided by the `UnconstrainedBox` instance. `UnconstrainedBox` will try
    to use the child widget’s size to determine its own size by following the limitations
    of its own constraints.


    If the child widget’s size is bigger than the maximum size of `UnconstrainedBox`
    can provide, the child widget will be clipped. Otherwise, the child widget is
    aligned based on the value of the parameter alignment of type `AlignmentGeometry`.
    If the child overflows the parent, a warning is displayed in debug mode. When
    using `UnconstrainedBox`, it’s still possible to add constraints to one axis using
    the parameter `constrainedAxis` of type `Axis`. Then the child is only allowed
    to render unconstrained on the other axis.


    In Listing [5-5](#479501_1_En_5_Chapter.xhtml#PC5), the `UnconstrainedBox` widget
    is placed in a `SizedBox` widget with fixed width and height. The `UnconstrainedBox`
    widget is constrained on the horizontal axis, which means the minimum and maximum
    width are both 100px. The image’s width is 200px, so it’s scaled down to 100px
    to meet the width constraint. This causes the image height to scale down to 150px,
    which exceeds the maximum height 100px of the parent `SizedBox` widget. When running
    in debug mode, you can see warning messages that the top and bottom are overflowed
    by 25px.


    ```

    SizedBox(

    width: 100,

    height: 100,

    child: UnconstrainedBox(

    constrainedAxis: Axis.horizontal,

    child: Image.network(''https://picsum.photos/200/300''),

    ),

    )

    Listing 5-5

    Example of UnconstrainedBox

    ```


    ## 5.6 Imposing Constraints on Widgets when Ignoring Parents


    ### Problem


    You want to impose constraints no matter where a widget is placed.


    ### Solution


    Use `OverflowBox`.


    ### Discussion


    When imposing constraints on widgets, constraints from the parent widget are generally
    respected. Respecting parent constraints makes a widget’s layout flexible to adapt
    different use cases. Sometimes you may want a widget to only respect explicitly
    provided constraints and ignore parent’s constraints. In this case, you can use
    `OverflowBox`.


    `OverflowBox` constructor has named parameters `alignment`, `minWidth`, `maxWidth`,
    `minHeight`, and `maxHeight`. If any of the constraints related parameter is null,
    the corresponding value from parent’s constraints is used. If you provide non-null
    values to all four constraints related parameters, the layout of `OverflowBox`’s
    child is completely irrelevant to the current widget.


    In Listing [5-6](#479501_1_En_5_Chapter.xhtml#PC6), the `OverflowBox` widget is
    created with non-null values of all four constraints related parameters, so even
    though it’s placed inside of a `SizedBox` widget , its size is always `Size(200,
    200)`.


    ```

    SizedBox(

    width: 100,

    height: 100,

    child: OverflowBox(

    minWidth: 200,

    minHeight: 200,

    maxWidth: 200,

    maxHeight: 200,

    child: Image.network(''https://picsum.photos/300''),

    ),

    )

    Listing 5-6

    Example of OverflowBox

    ```


    ## 5.7 Limiting Size to Allow Child Widget to Overflow


    ### Problem


    You want a widget to have a size and allow child widget to overflow.


    ### Solution


    Use `SizedOverflowBox`.


    ### Discussion


    `SizedOverflowBox` is created with a size. The widget’s actual size respects its
    constraints and is as close as possible to the requested size. The child’s layout
    only uses `SizedOverflowBox` widget’s constraints.


    In Listing [5-7](#479501_1_En_5_Chapter.xhtml#PC7), the `SizedOverflowBox` widget
    is placed in a `ConstrainedBox` widget with constraints `BoxConstraints.loose(Size(100,
    100))`. The requested size of `SizedOverflowBox` widget is `Size(50, 50)`. The
    actual size of `SizedOverflowBox` is also `Size(50, 50)`. The child `Image` widget
    only uses the constraints of `SizedOverflowBox`. The result is the image widget
    has a size of `Size(100, 100)`, which overflows its parent.


    ```

    ConstrainedBox(

    constraints: BoxConstraints.loose(Size(100, 100)),

    child: SizedOverflowBox(

    size: Size(50, 50),

    child: Image.network(''https://picsum.photos/400''),

    ),

    )

    Listing 5-7

    Example of SizedOverflowBox

    ```


    ## 5.8 Limiting Widgets Size when Unbounded


    ### Problem


    You have a widget that normally matches its parent’s size, but you want it to
    be used in other places where size constraints are required.


    ### Solution


    Use `LimitedBox`.'
