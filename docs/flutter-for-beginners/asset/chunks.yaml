- fmt: '### Discussion


    To deploy Flutter apps to devices and publish to app stores, we need to build
    the binaries for Android and iOS platforms. The command `flutter build` supports
    building these binaries.


    #### Build APK Files for Android


    The command `flutter build apk` builds the APK file for your app. Table [2-7](#479501_1_En_2_Chapter.xhtml#Tab7)
    shows the arguments supported by this command.


    **Table 2-7** Arguments of `flutter build apk`


    | Argument | Description |

    | --- | --- |

    | `--debug` | Build a debug version. |

    | `--profile` | Build a version specialized for performance profiling. |

    | `--release` | Build a release version ready for publishing to app store. |

    | `--flavor` | Build a custom app flavor defined by platform-specific build setup.
    This requires using product flavors in Android Gradle scripts and custom Xcode
    schemes. |

    | `--pub` / `--no-pub` | Whether to run `flutter packages get` before building
    the app. |

    | `--build-number`= | An integer to specify an increasing internal version number.
    This value must be unique for each build. The value is used as "`versionCode`".
    |

    | `--build-name`= | A string version number in the format of `x.y.z`. The value
    is used as "`versionName`". |

    | `--build-shared-library` | Compile to a `*.so` file. |

    | `--target-platform` | The target platform. Possible values are `android-arm`
    and `android-arm64`. |


    When building APK file, `--release` is the default mode. The following command
    builds a release version with build number `5` and version name `0.1.0`.


    ```

    $ flutter build apk --build-number=5 --build-name=0.1.0

    ```


    #### Build for iOS


    The command `flutter build ios` builds iOS application bundles. This command has
    the same arguments `--debug`, `--profile`, `--release`, `--flavor`, `--pub`, `--no-pub`,
    `--build-number`, and `--build-version` as `flutter build apk`. The value of `--build-number`
    is used as "`CFBundleVersion`", while the value of `--build-name` is used as "`CFBundleShortVersionString`".


    It also has other arguments; see Table [2-8](#479501_1_En_2_Chapter.xhtml#Tab8).


    **Table 2-8** Extra arguments of `flutter build ios`


    | Argument | Description |

    | --- | --- |

    | `--simulator` | Build a version for the iOS simulator. |

    | `--no-simulator` | Build a version for the iOS device. |

    | `--codesign` / `--no-codesign` | Whether to sign the application bundle. Default
    value is `--codesign`. |


    By default, `flutter build ios` builds the app for device, that is, `--no-simulator`
    is used. The following command builds a debug version for the simulator without
    signing the application bundle.


    ```

    $ flutter build ios --debug --no-codesign --simulator

    ```


    ## 2.10 Installing Flutter Apps


    ### Problem


    You want to install Flutter apps to emulators or devices.


    ### Solution


    Use the command `flutter install`.


    ### Discussion


    The command `flutter install` installs the current Flutter app to emulators or
    devices. To install the app, you need to have at least one emulator started or
    one device connected. Before installing the app, a binary file should be available
    for the target emulator or device. Use `flutter build` to build the binary file
    first.


    The following command installs the built binary.


    ```

    $ flutter install

    ```


    ## 2.11 Managing Packages


    ### Problem


    You want to manage dependencies of Flutter apps.


    ### Solution


    Use the command `flutter packages`.


    ### Discussion


    Using packages is the Dart way to manage project dependencies. Flutter inherits
    the same way for dependency management. You may have seen similar concepts in
    other programming platforms. For the dependency management to work, we need to
    have a way to describe sharable components and their dependencies. We also need
    a tool to fetch dependencies. Table [2-9](#479501_1_En_2_Chapter.xhtml#Tab9) shows
    package management tools for different platforms. Flutter SDK uses command `flutter
    packages` to manage dependencies, which uses Dart `pub` tool under the hood.


    **Table 2-9** Package management tools


    | Platform | Description file | Tool |

    | --- | --- | --- |

    | Node.js | `package.json` | `npm`, `Yarn` |

    | Dart/Flutter | `pubspec.yaml` | `pub`, `flutter packages` |

    | Java | `pom.xml`, `build.gradle` | Maven, Gradle |

    | Ruby | `Gemfile` | Bundler |


    The command `flutter packages get` downloads dependent packages in a Flutter project.
    The command `flutter packages upgrade` upgrades packages in a Flutter project.
    These two commands simply wrap around the underlying `pub` tool from Dart. We
    can also use `flutter packages pub` to directly invoke Dart `pub` tool. The command
    `flutter packages` cannot do much as functionalities it provides are limited.
    You can always use `flutter packages pub` to delegate tasks to Dart `pub` tool.


    ### Note


    You should use `flutter packages get` and `flutter packages upgrade` to manage
    dependencies of Flutter apps. Commands `pub get` and `pub upgrade` from Dart `pub`
    tool shouldn’t be used. If you need more functionalities from Dart `pub` tool,
    use `flutter packages pub`.


    The command `flutter packages test` is the same as `pub run test`, but different
    from `flutter test`. The tests run by `flutter packages test` are hosted in a
    pure Dart environment, so libraries like `dart:ui` are not available. This makes
    the tests run faster. If you are building libraries that don’t depend on any packages
    from Flutter SDK, you should use this command to run tests.


    ## 2.12 Running Flutter Tests


    ### Problem


    You have written tests for Flutter apps, and you want to make sure these tests
    passed.


    ### Solution


    Use the command `flutter test`.'
