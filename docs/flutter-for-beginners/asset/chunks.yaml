- fmt: '### Discussion


    Android emulators and iOS simulators both provide the native functionalities to
    take screenshots. For iOS simulators, this can be done using the menu **File**
    ➤ **New Screen Shot**. For Android emulators, this can be done by clicking the
    Screenshot icon in the floating control bar. But using the UI controls is not
    quite convenient. The screenshots taken by emulators are saved to the desktop
    by default. You have to configure the emulators to save to the desired location.


    The command `flutter screenshot` is much easier to use than the built-in features
    in emulators. You can use the argument `-o` or `--output` to specify the location
    to save the screenshot; see the following command.


    ```

    $ flutter screenshot -o ~/myapp/screenshots/home.png

    ```


    `flutter screenshot` can take different types of screenshots. The argument `--type`
    accepts values in Table [2-12](#479501_1_En_2_Chapter.xhtml#Tab12).


    **Table 2-12** Types of screenshots


    | Type | Description |

    | --- | --- |

    | `Device` | Use the device’s native screenshot capabilities. The screenshot includes
    the entire screen currently being displayed. This is the default type. |

    | `Rasterizer` | Screenshot of the Flutter app rendered using the rasterizer.
    |

    | `skia` | Screenshot of the Flutter app rendered as a Skia picture. |


    For the types of `rasterizer` and `skia`, the argument `--observatory-port` is
    required to provide the Dart Observatory port number of the running app. This
    port is displayed in the output of the command `flutter run`.


    ## 2.16 Attaching to Running Apps


    ### Problem


    Your Flutter app is not launched using `flutter run`, but you need want to interact
    with it.


    ### Solution


    Use the command `flutter attach`.


    ### Discussion


    When a Flutter app is launched using `flutter run`, we can interact with using
    the console. However, the app can also be launched in other ways. For example,
    we can close the app on the device and open it again. In this case, we lose the
    control of the running app. `flutter attach` provides a way to attach to running
    apps.


    If the app is already running and you know the port of its observatory, use `flutter
    attach --debug-port` to attach to it. The following command attaches to a running
    app.


    ```

    $ flutter attach --debug-port 10010

    ```


    If no observatory port is provided, `flutter attach` starts listening and scanning
    for new apps that become active. When a new observatory is detected, this command
    attaches to the app automatically.


    ```

    $ flutter attach

    ```


    In Figure [2-14](#479501_1_En_2_Chapter.xhtml#Fig14), `flutter attach` is initially
    waiting for a new Flutter app to start. Once a Flutter app is started, `flutter
    attach` connects to it and shows the same console as `flutter run`.


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig14_HTML.jpg](images/479501_1_En_2_Chapter/479501_1_En_2_Fig14_HTML.jpg)


    **Figure 2-14** Output of the command `flutter attach`


    ## 2.17 Tracing Running Flutter Apps


    ### Problem


    You want to trace the execution of a running app.


    ### Solution


    Use the command `flutter trace`.


    ### Discussion


    To start tracing, we need to know the observatory port of the running app and
    provide this port to `flutter trace` with the argument `--debug-port`. By default
    the tracing runs for `10` seconds and writes the result JSON file to the current
    directory with names like `trace_01.json`, `trace_02.json`, and so on. In the
    following command, the observatory port is `51240`.


    ```

    $ flutter trace --debug-port=51240

    ```


    Use the argument `-d` or `--duration` to specify the duration in seconds for the
    tracing to run. The following command runs the tracing for 5 seconds.


    ```

    $ flutter trace --debug-port=51240 -d 5

    ```


    If you prefer to manually control the tracing progress, you can use `flutter trace
    --start` to start the tracing first, then use `flutter trace --stop` to stop the
    tracing at a later time. It’s worth noting that when calling `flutter trace --stop`,
    the tracing needs to wait for the time specified in `--duration` before it’s stopped.
    In the following command, after the second `flutter trace --stop`, the tracing
    waits for another 10 seconds before stopping, which is the default value of `--duration`.


    ```

    $ flutter trace --start

    $ flutter trace --stop

    ```


    To stop the tracing immediately, use the following command.


    ```

    $ flutter trace --stop -d 0

    ```


    ## 2.18 Configuring Flutter SDK


    ### Problem


    You want to configure different settings of Flutter SDK.


    ### Solution


    Use the command `flutter config`.


    ### Discussion


    The command `flutter config` allows configuring some Flutter SDK settings. Table
    [2-13](#479501_1_En_2_Chapter.xhtml#Tab13) shows arguments of `flutter config`.


    **Table 2-13** Arguments of `flutter config`


    | Arguments | Description | Default value |

    | --- | --- | --- |

    | `--analytics` / `--no-analytics` | Whether to report anonymous tool usage statistics
    and crash reports. | On |

    | `--clear-ios-signing-cert` | Clear the saved development certificate used to
    sign apps for iOS device deployment. |   |

    | `--gradle-dir` | Set the Gradle install directory. |   |

    | `--android-sdk` | Set the Android SDK directory. |   |

    | `--android-studio-dir` | Set the Android Studio install directory. |   |


    To remove a setting, simply configure it to an empty string. The following command
    disables analytics reporting.


    ```

    $ flutter config --no-analytics

    ```


    ## 2.19 Showing App Logs


    ### Problem


    You want to see logs generated by Flutter apps running on emulators or devices.


    ### Solution


    Use the command `flutter logs`.


    ### Discussion


    Even though we can debug a Flutter app’s code to find out causes of certain problems,
    logs are still very valuable for error diagnosis. The easiest way to generate
    logs in Flutter apps is calling the `print()` method. The command `flutter logs`
    watches for logs generated on the device and prints out to the console.


    ```

    $ flutter logs

    ```


    Use the argument `-c` or `--clear` if you want to clear the log history before
    reading the logs.


    ```

    $ flutter logs -c

    ```


    Figure [2-15](#479501_1_En_2_Chapter.xhtml#Fig15) shows the output of `flutter
    logs`.


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig15_HTML.jpg](images/479501_1_En_2_Chapter/479501_1_En_2_Fig15_HTML.jpg)


    **Figure 2-15** Output of the command `flutter logs`


    ## 2.20 Formatting Source Code


    ### Problem


    You want to make sure that the source code of your app follows the same code style.


    ### Solution


    Use the command `flutter format`.


    ### Discussion


    It’s a good practice to have the same code style for your app, especially for
    a development team. The consistent code style is also good for code reviews. The
    command `flutter format` can format the source code files to match the default
    code style of Dart.


    To run `flutter format`, you need to provide a space-separated list of paths.
    The following command formats the current directory.


    ```

    $ flutter format .

    ```


    `flutter format` simply delegates the formatting task to Dart `dartfmt` tool.
    The code style is described in the official guide ( [`https://dart.dev/guides/language/effective-dart/style`](https://dart.dev/guides/language/effective-dart/style)
    ) of Dart language. Table [2-14](#479501_1_En_2_Chapter.xhtml#Tab14) shows extra
    arguments of `flutter format`.


    **Table 2-14** Extra arguments of `flutter format`


    | Argument | Description |

    | --- | --- |

    | `-n`, `--dry-run` | Just show which files would be modified without actually
    modifying them. |

    | `--set-exit-if-changed` | Return exit code `1` if there are any formatting changes
    made by this command. |

    | `-m`, `--machine` | Set the output format to JSON. |


    ## 2.21 Listing Connected Devices


    ### Problem


    You want to see all connected devices that can be used by Flutter SDK.


    ### Solution


    Use the command `flutter devices`.'
