    ## 11.11 Summary


    This chapter covers recipes related to animations in Flutter. `AnimationController`
    class is used to control animations. Subclasses of `Tween` class create linear
    animations for different types of data. `AnimatedWidget` and `AnimatedBuilder`
    are useful widgets that use animations. In the next chapter, we’ll discuss integration
    with native platform in Flutter.


    # 12. Platform Integration


    In mobile apps, it’s common to integrate with the native platform. You can write
    platform-specific code to use native platform API. There are a large number of
    plugins to perform different tasks.


    ## 12.1 Reading and Writing Files


    ### Problem


    You want to read and write files.


    ### Solution


    Use `File` API.


    ### Discussion


    In mobile apps, you may need to save files on the device. The `dart:io` library
    provides files API to read and write files. `File` class has methods to read content,
    write content, and query metadata of files. Operations with file system can be
    synchronous or asynchronous. Most of these operations have a pair of methods in
    `File` class. The asynchronous method returns a `Future` object, while the synchronous
    method uses `Sync` as the name suffix and returns the actual value. For example,
    `readAsString()` and `readAsStringSync()` methods are the pair for read operation
    that returns a string. Table [12-1](#479501_1_En_12_Chapter.xhtml#Tab1) shows
    asynchronous methods of `File` class.


    Table 12-1


    Asynchronous methods of File


    | Name | Description |

    | --- | --- |

    | `copy(String newPath)` | Copy this file to a new path. |

    | `create({bool recursive: false})` | Create this file. If `recursive` is true,
    all directories will be created. |

    | `open()` | Open the file for random access with a `RandomAccessFile` object.
    |

    | `readAsBytes()` | Read the entire file content as a list of bytes. |

    | `readAsString({Encoding encoding: utf8})` | Read the entire file content as
    a string using specified encoding. |

    | `readAsLines(({Encoding encoding: utf8})` | Read the entire file content as
    lines of text using specified encoding. |

    | `writeAsBytes(List<int> bytes)` | Write a list of bytes to the file. |

    | `writeAsString(String contents)` | Write a string to the file. |

    | `rename(String newPath)` | Rename this file to a new path. |

    | `delete({bool recursive: false})` | Delete this file. |

    | `exists()` | Check whether this file exists. |

    | `stat()` | Return a `FileStat` object that describes the file. |

    | `lastAccessed()` | Get the last accessed time of this file. |

    | `lastModified()` | Get the last modified time of this file. |

    | `length()` | Get the length of this file. |


    `Directory` class represents directories in the file system. Given a `Directory`
    object, `list()` or `listSync()` methods can be used to list files and sub-directories.


    To create `File` objects, you can use the default constructor with a path. For
    Flutter apps, the path may be platform-specific. There are two common places to
    store files for mobile apps:


    *   Temporary directory to store temporary files that may be cleared at any time


    *   Documents directory to store files that are private to the app and will only
    be cleared when the app is deleted


    To get the platform-specific paths for these two locations, you can use the `path_provider`
    package ( [`https://pub.dev/packages/path_provider`](https://pub.dev/packages/path_provider)
    ). This package provides `getTemporaryDirectory()` function to get the path of
    the temporary directory and `getApplicationDocumentsDirectory()` function to get
    the application documents directory.


    In Listing [12-1](#479501_1_En_12_Chapter.xhtml#PC1), `readConfig()` method reads
    the `config.txt` file from the application documents directory, while `writeConfig()`
    method writes a string to the same file.


    ```

    class ConfigFile {

    Future get _configFile async {

    Directory directory = await getApplicationDocumentsDirectory();

    return File(''${directory.path}/config.txt'');

    }

    Future readConfig() async {

    return _configFile

    .then((file) => file.readAsString())

    .catchError((error) => ''default config'');

    }

    Future writeConfig(String config) async {

    File file = await _configFile;

    return file.writeAsString(config);

    }

