    # 14. Testing and Debugging


    This chapter covers recipes related to testing and debugging Flutter apps.


    ## 14.1 Writing Unit Tests


    ### Problem


    You want to write unit tests.


    ### Solution


    Use API in`test`package.


    ### Discussion


    Unit tests are very important in app development. To write tests in Flutter apps,
    you need to add`test: ^1.5.3`to the`dev_dependencies`section of`pubspec.yaml`file.
    Test files are usually put in the`test`directory. The`MovingBox`class in Listing
    [14-1](#479501_1_En_14_Chapter.xhtml#PC1) is the class to test. The`move()`method
    updates the internal`_offset`variable.


    ```

    class MovingBox {

    MovingBox({Offset initPos = Offset.zero}) : _offset = initPos;

    Offset _offset;

    get offset => _offset;

    void move(double dx, double dy) {

    _offset += Offset(dx, dy);

    }

    }

    Listing 14-1

    Dart class to test

    ```


    Listing [14-2](#479501_1_En_14_Chapter.xhtml#PC2) shows the tests of`MovingBox`class.
    The`group()`function creates a group to describe a set of tests. The`test()`function
    creates a test case with the given description and body. The body is a function
    that uses`expect()`function to declare expectations to verify. To call the`expect()`function,
    you need to provide the actual value and a matcher to check the value. The matcher
    can be simple values or functions from the`matcher`package. Common matcher functions
    include`contains()`,`startsWith()`,`endsWith()`,`lessThan()`,`greaterThan()`,
    and`inInclusiveRange()`.


    ```

    void main() {

    group(''MovingBox'', () {

    test(''position should be (0.0) by default'', () {

    expect(MovingBox().offset, Offset.zero);

    });

    test(''postion should be initial value'', () {

    expect(MovingBox(initPos: Offset(10, 10)).offset, Offset(10, 10));

    });

    test(''postion should be moved'', () {

    final box = MovingBox();

    box.move(5, 5);

    expect(box.offset, Offset(5, 5));

    box.move(-1, -1);

    expect(box.offset, Offset(4, 4));

    });

    });

    }

    Listing 14-2

    Test of MovingBox

    ```


    You can use`async`functions as body of`expect()`function to write asynchronous
    tests. In Listing [14-3](#479501_1_En_14_Chapter.xhtml#PC3), the first test case
    uses an`async`function with`await`to get the value of a`Future`object. In the
    second test case,`completion()`function waits for completion of a`Future`object
    and verify the value. The`throwsA()`function verifies that a`Future`object throws
    the given error. In the third test case,`expectAsync1()`function wraps another
    function to verify the result and checks its invocation times.


    ```

    void main() {

    test(''future with async'', () async {

    var value = await Future.value(1);

    expect(value, equals(1));

    });

    test(''future'', () {

    expect(Future.value(1), completion(equals(1)));

    expect(Future.error(''error''), throwsA(equals(''error'')));

    });

    test(''future callback'', () {

    Future.error(''error'').catchError(expectAsync1((error) {

    expect(error, equals(''error''));

    }, count: 1));

    });

    }

    Listing 14-3

    Asynchronous tests

    ```


    You can use`setUp()`function to add a function to run before tests. Similarly,
    the`tearDown()`function is used to add a function to run after tests. The`setUp()`function
    should be used to prepare the context for test cases to run. The`tearDown()`function
    should be used to run cleanup tasks. The`setUp()`and`tearDown()`functions usually
    come in pairs. In Listing [14-4](#479501_1_En_14_Chapter.xhtml#PC4),`setUp()`and`tearDown()`functions
    will be called twice.


    ```

    void main() {

    setUp(() {

    print(''setUp'');

    });

    test(''action1'', () {

    print(''action1'');

    });

    test(''action2'', () {

    print(''action2'');

    });

    tearDown(() {

    print(''tearDown'');

    });

    }

    Listing 14-4

    setUp() and tearDown() functions

    ```


    After running the test case in Listing [14-4](#479501_1_En_14_Chapter.xhtml#PC4),
    the output should look like what’s shown in Listing [14-5](#479501_1_En_14_Chapter.xhtml#PC5).


    ```

    setUp

    action1

    tearDown

    setUp

    action2

    tearDown

    Listing 14-5

    Output with setUp() and tearDown() functions

    ```


    ## 14.2 Using Mock Objects in Tests


    ### Problem


    You want to mock dependencies in test cases.


    ### Solution


    Use`mockito`package.'
