    | `fontStyle` | `FontStyle` | 字体的变体。 |

    | `letterSpacing` | `Double` | 每个字母之间的间距。 |

    | `wordSpacing` | `Double` | 每个单词之间的间距。 |

    | `textBaseline` | `TextBaseline` | 用于对齐此文本段及其父文本段的公共基线。 |

    | `height` | `Double` | 文本行高。 |

    | `locale` | `Locale` | 用于选择区域特定字形的区域设置。 |

    | `foreground` | `Paint` | 文本的前景色。 |

    | `background` | `Paint` | 文本的背景色。 |

    | `shadows` | `List<Shadow>` | 绘制在文本下方的阴影。 |

    | `decoration` | `TextDecoration` | 文本的装饰。 |

    | `decorationColor` | `Color` | 文本装饰的颜色。 |

    | `decorationStyle` | `TextDecorationStyle` | 文本装饰的样式。 |

    | `debugLabel` | `String` | 用于调试的样式描述。 |

    | `fontFamily` | `String` | 字体的名称。 |

    | `package` | `String` | 如果字体在包中定义，则与`fontFamily`一起使用。 |


    `FontWeight`类定义了值`w100`、`w200`、`w300`、`w400`、`w500`、`w600`、`w700`、`w800`和`w900`。`FontWeight.w100`是最细的，而`FontWeight.w900`是最粗的。`FontWeight.bold`是`FontWeight.w700`的别名，而`FontWeight.normal`是`FontWeight.w400`的别名。`FontStyle`是一个枚举类型，具有两个值：`italic`和`normal`。`TextBaseline`是一个枚举类型，具有值`alphabetic`和`ideographic`。


    `TextDecoration`类定义了不同类型的文本装饰。您也可以使用构造函数`TextDecoration.combine()`通过组合一个`TextDecoration`实例列表来创建一个新的`TextDecoration`实例。例如，`TextDecoration.combine([TextDecoration.underline,
    TextDecoration.overline])`实例会在文本下方和上方绘制线条。表 4-7 展示了`TextDecoration`中的常量。


    **表 4-7** `TextDecoration`常量


    | 名称 | 描述 |

    | --- | --- |

    | `none` | 无装饰。 |

    | `underline` | 在文本下方绘制一条线。 |

    | `overline` | 在文本上方绘制一条线。 |

    | `lineThrough` | 穿过文本绘制一条线。 |


    `TextDecorationStyle`是一个枚举类型，其值如表 4-8 所示。`TextDecorationStyle`定义了由`TextDecoration`创建的线条的样式。


    **表 4-8** `TextDecorationStyle`值


    | 名称 | 描述 |

    | --- | --- |

    | `solid` | 绘制实线。 |

    | `double` | 绘制双线。 |

    | `dotted` | 绘制点线。 |

    | `dashed` | 绘制虚线。 |

    | `wavy` | 绘制波浪线。 |


    清单 4-10 展示了使用`TextDecoration`和`TextDecorationStyle`的示例。


    ```

    Text(

    ''Decoration'',

    style: TextStyle(

    fontWeight: FontWeight.w900,

    decoration: TextDecoration.lineThrough,

    decorationStyle: TextDecorationStyle.dashed,

    ),

    );

    清单 4-10

    使用 TextDecoration 和 TextDecorationStyle 的示例

    ```


    如果您想创建一个`TextStyle`实例的副本并更新某些属性，请使用`copyWith()`方法。`apply()`方法也会创建一个新的`TextStyle`实例，但它允许使用因子和差值来更新某些属性。例如，命名参数`fontSizeFactor`和`fontSizeDelta`可以更新字体大小。`fontSize`的更新值通过`fontSize
    * fontSizeFactor + fontSizeDelta`计算得出。您也可以使用相同的模式来更新`height`、`letterSpacing`和`wordSpacing`的值。对于`fontWeight`，只支持`fontWeightDelta`。在清单
    4-11 中，应用于文本的`TextStyle`更新了`fontSize`和`decoration`的值。


    ```

    Text(

    ''Scale'',

    style: DefaultTextStyle.of(context).style.apply(

    fontSizeFactor: 2.0,

    fontSizeDelta: 1,

    decoration: TextDecoration.none,

    ),

    );

    清单 4-11

    更新 TextStyle

    ```


    ## 4.8 显示图像


    ### 问题


    您希望显示从网络加载的图像。


    ### 解决方案


    使用`Image.network()`并传入图像 URL 来加载和显示图像。

    '
- fmt: '### Discussion


    If you have images hosted in your own servers or other places, you can display
    them using the `Image.network()` constructor. The `Image.network()` constructor
    only requires the URL of the image to load. An image widget should be given specific
    dimension using the named parameters `width` and `height` or placed in a context
    that sets tight layout constraints. This is because the dimension of the image
    may change when the image is loaded. Without a strict size constraint, the image
    widget may affect layout of other widgets. In Listing [4-12](#479501_1_En_4_Chapter.xhtml#PC12),
    the size of the image widget is specified with named parameters `width` and `height`.


    ```

    Image.network(

    ''https://picsum.photos/400/300'',

    width: 400,

    height: 300,

    );

    Listing 4-12

    Example of Image.network()

    ```


    All downloaded images are cached regardless of HTTP headers. This means that all
    HTTP cache control headers will be ignored. You can use cache buster to force
    cached images to refresh. For example, you can add a random string to the image
    URL.


    If extra HTTP headers are required to load the image, you can specify the `headers`
    parameter of type `Map<String, String>` to provide these headers. A typical use
    case is to load protected images that require HTTP headers for authentication.


    If an image cannot cover the whole area of a box, you can use the `repeat` parameter
    of type `ImageRepeat` to specify how images are repeated. `ImageRepeat` is an
    enum type with values shown in Table [4-9](#479501_1_En_4_Chapter.xhtml#Tab9).
    The default value is `noRepeat`.


    **Table 4-9** `ImageRepeat` values


    | Name | Description |

    | --- | --- |

    | `Repeat` | Repeat in both x and y directions. |

    | `repeatX` | Repeat only in the x direction. |

    | `repeatY` | Repeat only in the y direction. |

    | `noRepeat` | No repeat. The uncovered area will be transparent. |


    In Listing [4-13](#479501_1_En_4_Chapter.xhtml#PC13), the image is placed into
    a `SizedBox` which is larger than the image. By using `ImageRepeat.repeat`, the
    box is filled with this image.


    ```

    SizedBox(

    width: 400,

    height: 300,

    child: Image.network(

    ''https://picsum.photos/300/200'',

    alignment: Alignment.topLeft,

    repeat: ImageRepeat.repeat,

    ),

    );

    Listing 4-13

    Repeated images

    ```


    ## 4.9 Displaying Icons


    ### Problem


    You want to use icons.


    ### Solution


    Use `Icon` to show icons from Material Design or icon packs from community.


    ### Discussion


    Icons are used extensively in mobile apps. Comparing to text, icons take less
    screen estate to express the same semantics. Icons can be created from font glyphs
    or images. The `Icon` widget is drawn with a font glyph. A font glyph is described
    with `IconData` class. To create an `IconData` instance, the Unicode code point
    of this icon in the font is required.


    The `Icons` class has a number of predefined `IconData` constants for icons in
    Material Design ([https://material.io/tools/icons/](https://material.io/tools/icons/)).
    For example, `Icons.call` is the `IconData` constant for the icon named “call”.
    If the app uses Material Design, then these icons can be used out of box. The
    `CupertinoIcons` class has a number of predefined `IconData` constants for iOS-style
    icons.


    The `Icon()` constructor has named parameters `size` and `color` to specify the
    size and color of the icon, respectively. Icons are always square with width and
    height both equal to size. The default value of size is 24. Listing [4-14](#479501_1_En_4_Chapter.xhtml#PC14)
    creates a red `Icons.call` icon of size 100.


    ```

    Icon(

    Icons.call,

    size: 100,

    color: Colors.red,

    );

    Listing 4-14

    Example of Icon()

    ```


    To use the popular Font Awesome icons, you can use the package `font_awesome_flutter`
    ([https://pub.dartlang.org/packages/font_awesome_flutter](https://pub.dartlang.org/packages/font_awesome_flutter)).
    After adding the package dependency to `pubspec.yaml` file, you can import the
    file to use `FontAwesomeIcons` class. Similar to the `Icons` class, the `FontAwesomeIcons`
    class has a number of `IconData` constants for different icons in Font Awesome.
    Listing [4-15](#479501_1_En_4_Chapter.xhtml#PC15) creates a blue `FontAwesomeIcons.angry`
    icon of size 80.


    ```

    Icon(

    FontAwesomeIcons.angry,

    size: 80,

    color: Colors.blue,

    );

    Listing 4-15

    Use Font Awesome icon

    ```


    ## 4.10 Using Buttons with Text


    ### Problem


    You want to use buttons with text.


    ### Solution


    Use button widgets `FlatButton`, `RaisedButton`, `OutlineButton`, and `CupertinoButton`.


    ### Discussion


    Flutter has different types of buttons for Material Design and iOS. These button
    widgets all have a required parameter `onPressed` to specify the handler function
    when pressed. If the `onPressed` handler is `null`, the button is disabled. The
    content of a button is specified with the parameter `child` of type `Widget`.
    `FlatButton`, `RaisedButton`, and `OutlineButton` have different styles and behaviors
    reacting to touches:


    - A `FlatButton` has zero elevation and no visible borders. It reacts to touches
    by filling with color specified by `highlightColor`.

    - A `RaisedButton` has elevation and is filled with color. It reacts to touches
    by increasing elevation to `highlightElevation`.

    - An `OutlineButton` has borders, an initial elevation of 0.0, and transparent
    background. It reacts to touches by making its background opaque with the color
    and increasing its elevation to `highlightElevation`.


    `FlatButton`s should be used on toolbars, in dialogs, in cards, or inline with
    other content where there is enough space to make buttons’ presence obvious. `RaisedButton`s
    should be used where using space is not enough to make the buttons stand out.
    `OutlineButton` is the cross between `RaisedButton` and `FlatButton`. `OutlineButton`s
    can be used when neither `FlatButton`s nor `RaisedButton`s are appropriate.


    If you prefer the iOS-style button, you can use the `CupertinoButton` widget.
    `CupertinoButton` reacts to touches by fading out and in. Listing [4-16](#479501_1_En_4_Chapter.xhtml#PC16)
    shows examples of creating different types of buttons.


    ```

    FlatButton(

    child: Text(''Flat''),

    color: Colors.white,

    textColor: Colors.grey,

    highlightColor: Colors.red,

    onPressed: () => {},

    );

    RaisedButton(

    child: Text(''Raised''),

    color: Colors.blue,

    onPressed: () => {},

    );

    OutlineButton(

    child: Text(''Outline''),

    onPressed: () => {},

    );

    CupertinoButton(

    child: Text(''Cupertino''),

    color: Colors.green,

    onPressed: () => {},

    );

    Listing 4-16

    Different types of buttons

    ```


    ## 4.11 Using Buttons with Icons


    ### Problem


    You want to use buttons with icons.


    ### Solution


    Use `IconButton` widget, `FlatButton.icon()`, `RaisedButton.icon()`, and `OutlineButton.icon()`.


    ### Discussion


    There are two ways to create a button with an icon. If only the icon is enough,
    use `IconButton` widget. If both the icon and text are required, use constructors
    `FlatButton.icon()`, `RaisedButton.icon()`, or `OutlineButton.icon()`.


    The `IconButton` constructor requires the `icon` parameter to specify the icon.
    `FlatButton.icon()`, `RaisedButton.icon()`, and `OutlineButton.icon()` use the
    parameters `icon` and `label` to specify the icon and text, respectively. Listing
    [4-17](#479501_1_En_4_Chapter.xhtml#PC17) shows examples of using `IconButton()`
    and `RaisedButton.icon()`.


    ```

    IconButton(

    icon: Icon(Icons.map),

    iconSize: 50,

    tooltip: ''Map'',

    onPressed: () => {},

    );

    RaisedButton.icon(

    icon: Icon(Icons.save),

    label: Text(''Save''),

    onPressed: () => [],

    );

    Listing 4-17

    Examples of IconButton() and RaisedButton.icon()

    ```


    ## 4.12 Adding Placeholders


    ### Problem


    You want to add placeholders to represent widgets that will be added later.


    ### Solution


    Use `Placeholder`.'
