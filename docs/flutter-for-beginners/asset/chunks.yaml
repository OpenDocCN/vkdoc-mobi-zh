    ### 讨论


    `TextField` 组件支持添加不同的装饰，以向用户呈现各种信息。例如，如果文本输入值无效，你可以添加红色边框并在文本输入下方显示一些文本来提示。你还可以添加文本或图标作为前缀或后缀。如果
    `TextField` 组件用于编辑货币值，你可以添加货币符号作为前缀。`TextField` 的 `decoration` 参数（类型为 `InputDecoration`）用于添加这些信息。`InputDecoration`
    类有许多命名参数，我们接下来将进行介绍。


    ### 边框


    让我们从为文本输入组件添加边框开始。`InputDecoration` 构造函数有多个类型为 `InputBorder` 的参数，这些参数与边框相关，包括
    `errorBorder`、`disabledBorder`、`focusedBorder`、`focusedErrorBorder` 和 `enabledBorder`。这些参数的名称表明了它们将根据状态在何时显示。还有一个
    `border` 参数，但此参数仅用于提供边框的形状。


    `InputBorder` 类是抽象类，因此应使用其子类 `UnderlineInputBorder` 或 `OutlineInputBorder`。`UnderlineInputBorder`
    类仅在底部有边框。`UnderlineInputBorder` 构造函数的参数包括类型为 `BorderSide` 的 `borderSide` 和类型为
    `BorderRadius` 的 `borderRadius`。`BorderSide` 类定义了边框一侧的颜色、宽度和样式。边框样式由 `BorderStyle`
    枚举定义，其值有 `none` 和 `solid`。样式为 `BorderStyle.none` 的 `BorderSide` 将不会被渲染。`BorderRadius`
    类为矩形的每个角定义了一组圆角半径。角的半径使用 `Radius` 类创建。半径的形状可以是圆形或椭圆形。圆形或椭圆形的半径可以分别使用构造函数 `Radius.circular(double
    radius)` 和 `Radius.elliptical(double x, double y)` 创建。`BorderRadius` 具有 `topLeft`、`topRight`、`bottomLeft`
    和 `bottomRight` 属性，其类型为 `Radius`，用于表示这四个角的半径。你可以使用 `BorderRadius.only()` 为每个角指定不同的
    `Radius` 实例，或者使用 `BorderRadius.all()` 为所有角使用单个 `Radius` 实例。


    `OutlineInputBorder` 类在组件周围绘制一个矩形。`OutlineInputBorder` 构造函数也具有参数 `borderSide`
    和 `borderRadius`。它还有一个 `gapPadding` 参数，用于指定边框间隙中显示的标签文本的水平内边距。


    在代码清单 6-5 中，两个 `TextField` 组件都通过 `focusedBorder` 参数声明了在获得焦点时渲染的边框。


