    ## 8.7 Displaying iOS Dialogs


    ### Problem


    You want to display iOS dialogs.


    ### Solution


    Use `showCupertinoDialog()` function and `CupertinoAlertDialog` and `CupertinoPopupSurface`
    widgets.


    ### Discussion


    For iOS apps, you can use `showCupertinoDialog()` function and widgets like `CupertinoAlertDialog`
    and `CupertinoPopupSurface` to show dialogs. The `showCupertinoDialog()` function
    is similar with `showDialog()` function for Material Design. This function also
    uses `Navigator.push()` method to push dialog route to the navigator. `CupertinoAlertDialog`
    is a built-in dialog implementation to acknowledge user or require for confirmation.
    A `CupertinoAlertDialog` may have title, content, and a list of actions. Actions
    are represented using `CupertinoDialogAction` widget. Table [8-2](#479501_1_En_8_Chapter.xhtml#Tab2)
    shows parameters of `CupertinoDialogAction` constructor.


    Table 8-2


    Parameters of `CupertinoDialogAction`


    | Name | Type | Description |

    | --- | --- | --- |

    | `child` | `Widget` | Content of the action. |

    | `onPressed` | `VoidCallback` | Action pressed callback. |

    | `isDefaultAction` | `bool` | Whether this action is the default action. |

    | `isDestructiveAction` | `bool` | Whether this action is destructive. Destructive
    actions have a different style. |

    | `textStyle` | `TextStyle` | Text style applied to the action. |


    In Listing [8-12](#479501_1_En_8_Chapter.xhtml#PC12), pressing the button shows
    an iOS-style alert dialog.


    ```

    CupertinoButton(

    child: Text(''Show Alert Dialog''),

    onPressed: () async {

    bool result = await showCupertinoDialog(

    context: context,

    builder: (BuildContext context) {

    return CupertinoAlertDialog(

    title: Text(''Delete''),

    content: Text(''Delete this item?''),

    actions: [

    CupertinoDialogAction(

    child: Text(''Delete''),

    onPressed: () {

    Navigator.pop(context, true);

    },

    isDestructiveAction: true,

    ),

    CupertinoDialogAction(

    child: Text(''Cancel''),

    onPressed: () {

    Navigator.pop(context, false);

    },

    ),

    ],

    );

    },

    );

    print(result);

    },

    );

    Listing 8-12

    Show iOS alert dialog

    ```


    Figure [8-3](#479501_1_En_8_Chapter.xhtml#Fig3) shows the screenshot of code in
    Listing [8-12](#479501_1_En_8_Chapter.xhtml#PC12).


    ![../images/479501_1_En_8_Chapter/479501_1_En_8_Fig3_HTML.jpg](images/479501_1_En_8_Chapter/479501_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    iOS alert dialog


    If you want to create a custom dialog, you can use `CupertinoPopupSurface` widget
    which creates rounded rectangle surface.


    ## 8.8 Displaying iOS Action Sheets


    ### Problem


    You want to present a set of actions for the user to choose in iOS apps.


    ### Solution


    Use `showCupertinoModalPopup()` function and `CupertinoActionSheet` widget.


    ### Discussion


    If you want to present a set of actions for the user to choose in iOS apps, you
    can use `showCupertinoModalPopup()` function to display `CupertinoActionSheet`
    widgets. A `CupertinoActionSheet` can have a title, a message, a cancel button,
    and a list of actions. Actions are represented as `CupertinoActionSheetAction`
    widgets. `CupertinoActionSheetAction` constructor has parameters `child`, `onPressed`,
    `isDefaultAction`, and `isDestructiveAction`, which have the same meaning as in
    `CupertinoDialogAction` constructor shown in Table [8-2](#479501_1_En_8_Chapter.xhtml#Tab2).


    In Listing [8-13](#479501_1_En_8_Chapter.xhtml#PC13), pressing the button shows
    an action sheet with three actions and a cancel button.


    ```

    CupertinoButton(

    child: Text(''Show Action Sheet''),

    onPressed: () async {

    String result = await showCupertinoModalPopup(

    context: context,

    builder: (BuildContext context) {

    return CupertinoActionSheet(

    title: Text(''What to do''),

    message: Text(''Please select an action''),

    actions: [

    CupertinoActionSheetAction(

    child: Text(''Duplicate''),

    isDefaultAction: true,

    onPressed: () {

    Navigator.pop(context, ''duplicate'');

    },

    ),

    CupertinoActionSheetAction(

    child: Text(''Move''),

    onPressed: () {

    Navigator.pop(context, ''move'');

    },

    ),

    CupertinoActionSheetAction(

    isDestructiveAction: true,

    child: Text(''Delete''),

    onPressed: () {

    Navigator.pop(context, ''delete'');

    },

    ),

    ],

    cancelButton: CupertinoActionSheetAction(

    child: Text(''Cancel''),

    onPressed: () {

    Navigator.pop(context);

    },

    ),

    );

    },

    );

    print(result);

    },

    );

    Listing 8-13

    Show iOS action sheet

    ```


    Figure [8-4](#479501_1_En_8_Chapter.xhtml#Fig4) shows the screenshot of code in
    Listing [8-13](#479501_1_En_8_Chapter.xhtml#PC13).


    ![../images/479501_1_En_8_Chapter/479501_1_En_8_Fig4_HTML.jpg](images/479501_1_En_8_Chapter/479501_1_En_8_Fig4_HTML.jpg)


