- fmt: '### Using Listeners of `TextEditingController`


    A `TextEditingController` instance is also an instance of `ValueNotifier<TextEditingValue>`,
    so you can add listeners to it and react to notifications. In Listing [6-2](#479501_1_En_6_Chapter.xhtml#PC2),
    the listener function `_handleTextChanged` calls `setState()` function to update
    the state when receiving change notifications. The listener is added in the `initState()`
    function and removed in the `dispose()` function, which makes sure resource is
    properly cleaned up.


    ```

    class ReverseTextWithListener extends StatefulWidget {

    @override

    _ReverseTextWithListenerState createState() =>

    _ReverseTextWithListenerState();

    }

    class _ReverseTextWithListenerState extends State {

    TextEditingController _controller;

    String _value;

    @override

    void initState() {

    super.initState();

    _controller = TextEditingController(

    text: "",

    );

    _controller.addListener(_handleTextChanged);

    }

    @override

    Widget build(BuildContext context) {

    return Column(

    crossAxisAlignment: CrossAxisAlignment.start,

    children: [

    TextField(

    controller: _controller,

    ),

    Text( (_value ?? "). split(").reversed.join()),

    ],

    );

    }

    @override

    void dispose() {

    _controller.removeListener(_handleTextChanged);

    super.dispose();

    }

    void _handleTextChanged() {

    this.setState(() {

    this._value = _controller.text;

    });

    }

    }

    Listing 6-2

    Use TextEditingController listener

    ```


    Figure [6-2](#479501_1_En_6_Chapter.xhtml#Fig2) shows the screenshot of code in
    Listing [6-2](#479501_1_En_6_Chapter.xhtml#PC2).


    ![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig2_HTML.jpg](images/479501_1_En_6_Chapter/479501_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Use TextEditingController listener


    ### Using Callbacks


    The last way to get text from `EditableText` widgets is using the callbacks. There
    are three types of callbacks related to text editing; see Table [6-1](#479501_1_En_6_Chapter.xhtml#Tab1).


    Table 6-1


    `EditableText` callbacks


    | Name | Type | Description |

    | --- | --- | --- |

    | `onChanged` | `ValueChanged<String>` | Called when text changed. |

    | `onEditingComplete` | `VoidCallback` | Called when user submits the text. |

    | `onSubmitted` | `ValueChanged<String>` | Called when user finishes editing the
    text. |


    If you want to actively watch for text changes, you should use `onChanged` callback.
    When user finishes editing the text, both `onEditingComplete` and `onSubmitted`
    callbacks will be invoked. The difference is that `onEditingComplete` callback
    doesn’t provide access to the submitted text.


    In Listing [6-3](#479501_1_En_6_Chapter.xhtml#PC3), different messages are logged
    in different callbacks. All the log messages are displayed in a `RichText` widget.


    ```

    class TextFieldCallbacks extends StatefulWidget {

    @override

    _TextFieldCallbacksState createState() => _TextFieldCallbacksState();

    }

    class _TextFieldCallbacksState extends State {

    List _logs = List();

    void _log(String value) {

    this.setState(() {

    this._logs.add(value);

    });

    }

    @override

    Widget build(BuildContext context) {

    return Column(

    crossAxisAlignment: CrossAxisAlignment.start,

    children: [

    TextField(

    onChanged: (text) => _log(''changed: $text''),

    onEditingComplete: () => _log(''completed''),

    onSubmitted: (text) => _log(''submitted: $text''),

    ),

    Text.rich(TextSpan(

    children: this._logs.map((log) => TextSpan(text: ''$log\n'')).toList(),

    )),

    ],

    );

    }

    }

    Listing 6-3

    EditableText callbacks

    ```


