  raw: '### Discussion


    TextField widget supports adding different decorations to present various information
    to user. For example, if the value of text input is invalid, you can add a red
    border and some text below the text input to indicate that. You can also add text
    or icons as the prefix or suffix. If the TextField widget is for editing currency
    value, you can add a currency symbol as the prefix. The decoration parameter of
    type InputDecoration of TextField is used to add this information. InputDecoration
    class has many named parameters, which we will review next.


    ### Borders


    Let’s start from adding borders to text input widgets. InputDecoration constructor
    has several parameters of type InputBorder that are related to borders, including
    errorBorder, disabledBorder, focusedBorder, focusedErrorBorder, and enabledBorder.
    The names of these parameters indicate when these borders will be displayed based
    on the state. There is also a border parameter, but this parameter is only used
    to provide the shape of the border.


    InputBorder class is abstract, so one of its subclasses UnderlineInputBorder or
    OutlineInputBorder should be used. UnderlineInputBorder class only has a border
    at the bottom side. UnderlineInputBorder constructor has parameters borderSide
    of type BorderSide and borderRadius of type BorderRadius. BorderSide class defines
    color, width, and style of one side of a border. A border’s style is defined by
    BorderStyle enum which has values none and solid. A BorderSide with style BorderStyle.none
    won’t be rendered. BorderRadius class defines a set of radii for each corner of
    a rectangle. The radius for a corner is created using Radius class. The shape
    of a radius can be circular or elliptical. Circular or elliptical radii can be
    created using constructors Radius.circular(double radius) and Radius.elliptical(double
    x, double y), respectively. BorderRadius has topLeft, topRight, bottomLeft, and
    bottomRight properties of type Radius to represent radii of these four corners.
    You can use BorderRadius.only() to specify different Radius instances for each
    corner or use BorderRadius.all() to use a single Radius instance for all corners.


    OutlineInputBorder class draws a rectangle around the widget. OutlineInputBorder
    constructor also has parameters borderSide and borderRadius. It also has the gapPadding
    parameter to specify the horizontal padding for the label text displayed in a
    gap of the border.


    In Listing [6-5](#479501_1_En_6_Chapter.xhtml#PC5), both TextField widgets declare
    borders that are rendered when they gain focus using focusedBorder parameter.


    ```

    TextField(

    decoration: InputDecoration(

    enabledBorder: UnderlineInputBorder(

    borderSide: BorderSide(color: Colors.red),

    borderRadius: BorderRadius.all(Radius.elliptical(5, 10)),

    ),

    ),

    )

    TextField(

    decoration: InputDecoration(

    labelText: ''Username'',

    focusedBorder: OutlineInputBorder(

    borderSide: BorderSide(color: Colors.blue),

    borderRadius: BorderRadius.circular(10),

    gapPadding: 2,

    ),

    ),

    )

    Listing 6-5

    Examples of InputDecoration

    ```


    Figure [6-4](#479501_1_En_6_Chapter.xhtml#Fig4) shows the screenshot of code in
