- fmt: '### Flex Box Layout Algorithm


    Layout of Flex children is complicated and done in multiple steps. The first step
    is to lay out each child with a null or zero flex factor. These are non-flexible
    children. The constraints used to lay out these children depend on the value of
    `crossAxisAlignment`. If the value of `crossAxisAlignment` is `CrossAxisAlignment.stretch`,
    then the constraints will be tight cross-axis constraints of the maximum size
    on the cross axis. Otherwise, the constraints only set the maximum value for the
    cross axis. For example, if the direction is `Axis.horizontal` and `crossAxisAlignment`
    is `CrossAxisAlignment.stretch`, then the constraints for these non-flexible children
    set both `minHeight` and `maxHeight` to `maxHeight` of the Flex’s constraints.
    This makes these children take all space on the cross axis. During the first step,
    the total allocated size for these children and the maximum value of cross-axis
    size are recorded.


    The second step is to lay out each child with a flex factor. These are flexible
    children. From the first step, the allocated size of main axis is known. The free
    space can be calculated based on the max size and allocated size of main axis.
    The free space is distributed among all flexible children based on the flex factor.
    A child with a flex factor of `2.0` will receive twice the amount of free space
    as a child with a flex factor of `1.0`. Suppose there are three children with
    flex factors `1.0`, `2.0`, and `3.0`, if the free space is `120px`, then these
    children will receive space of `20px`, `40px`, and `60px`, respectively. The calculated
    value based on flex factor for each child will be the maximum constraints on the
    main axis. The minimum constraints on the main axis depends on the value of `FlexFit`
    for the child. If fit value is `FlexFit.tight`, then the minimum value is the
    same as the maximum, which creates tight constraints on the main axis. If fit
    value is `FlexFit.loose`, then the minimum value is `0.0`, which creates loose
    constraints on the main axis. The constraints on the cross axis are the same as
    Flex widget’s constraints. The final constraints are used to lay out these flex
    children.


    The third step is to determine the extent of main and cross axis. If the value
    of `mainAxisSize` is `MainAxisSize.max`, then the main-axis extent is the maximum
    constraints of current Flex widget. Otherwise, the main-axis extent is the allocated
    size for all children. The extent of cross axis is the maximum value of cross-axis
    constraints of all children.


    The last step is to determine the position of each child based on the value of
    `mainAxisAlignment` and `crossAxisAlignment`.


    Table [5-8](#479501_1_En_5_Chapter.xhtml#Tab8) shows values of the enum `MainAxisAlignment`.


    Table 5-8


    `MainAxisAlignment` values


    | Name | Description |

    | --- | --- |

    | `start` | Place the children close to the start of the main axis. The start
    position is determined by `TextDirection` for horizontal direction and `VerticalDirection`
    for vertical direction. |

    | `end` | Place the children close to the end of the main axis. The end position
    is determined using the same way as start. |

    | `center` | Place the children close to the middle. |

    | `spaceBetween` | Distribute the free space evenly between the children. |

    | `spaceAround` | Distribute the free space evenly between the children with half
    of the space before and after the first and last child. |

    | `spaceEvenly` | Distribute the free space evenly between the children including
    before and after the first and last child. |


    Table [5-9](#479501_1_En_5_Chapter.xhtml#Tab9) shows values of the enum `CrossAxisAlignment`.


    Table 5-9


    `CrossAxisAlignment` values


    | Name | Description |

    | --- | --- |

    | `start` | Place the children with start edge aligned with the start side of
    the cross axis. The start position is determined by `TextDirection` for horizontal
    direction and `VerticalDirection` for vertical direction. |

    | `end` | Place the children with end edge aligned with the end side of the cross
    axis. The end position is determined using the same way as start. |

    | `center` | Place the children with center aligned with the middle of the cross
    axis. |

    | `stretch` | Require the children to fill the cross axis. |

    | `baseline` | Match baselines of children on the cross axis. |


    ### Flexible


    `Flexible` has the `flex` parameter to specify the flex factor and `fit` parameter
    to specify the `BoxFit` value. The default value of `flex` parameter is `1`, while
    the default value of `fit` is `BoxFit.loose`. `Expanded` is a subclass of `Flexible`
    with `fit` parameter set to `BoxFit.tight`.


    In Listing [5-16](#479501_1_En_5_Chapter.xhtml#PC16), `Column` widget is placed
    in a `LimitedBox` widget to limit its height. All children of `Column` widget
    are non-flexible.


    ```

    LimitedBox(

    maxHeight: 320,

    child: Column(

    crossAxisAlignment: CrossAxisAlignment.end,

    mainAxisAlignment: MainAxisAlignment.spaceAround,

    children: [

    Image.network(''https://picsum.photos/50''),

    Image.network(''https://picsum.photos/70''),

    Image.network(''https://picsum.photos/90''),

    ],

    ),

    )

    Listing 5-16

    Flex widget with non-flexible children

    ```


    In Listing [5-17](#479501_1_En_5_Chapter.xhtml#PC17), `Column` widget has both
    flexible and non-flexible children. `Flexible` widgets can be created by wrapping
    with `Flexible` or `Expanded` widgets.


    ```

    LimitedBox(

    maxHeight: 300,

    child: Column(

    mainAxisAlignment: MainAxisAlignment.spaceBetween,

    children: [

    Flexible(

    child: Image.network(''https://picsum.photos/50''),

    ),

    Image.network(''https://picsum.photos/40''),

    Expanded(

    child: Image.network(''https://picsum.photos/50''),

    ),

    Expanded(

    flex: 2,

    child: Image.network(''https://picsum.photos/50''),

    ),

    ],

    ),

    )

    Listing 5-17

    Flex widget with flexible and non-flexible children

    ```


    ## 5.16 Displaying Overlapping Widgets


    ### Problem


    You want to lay out widgets that may overlap with each other.


    ### Solution


    Use `Stack` or `IndexedStack`.'
