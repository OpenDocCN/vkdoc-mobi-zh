    清单 10-22 中定义的动作只能用于同步操作。例如，如果您想要派发 `JobLoadedAction`，您需要先准备好 `List<Job>` 对象。然而，加载职位数据的操作是异步的。您需要使用
    thunk 函数作为 Redux store 的中间件。thunk 函数将 store 作为唯一参数。它使用 store 来派发动作。thunk 动作可以像其他普通动作一样被派发到
    store。


    清单 10-24 中的 `getJobs()` 函数接受一个 `GitHubJobsClient` 对象和一个搜索关键词作为参数。该函数返回一个类型为 `ThunkAction<JobsState>`
    的 thunk 函数。`ThunkAction` 来自 `redux_thunk` 包。在 thunk 函数中，首先派发一个 `LoadJobAction`。然后使用
    `GitHubJobsClient` 对象获取职位数据。根据数据加载的结果，派发 `JobLoadedAction` 或 `JobLoadErrorAction`。


    ```

    ThunkAction getJobs(GitHubJobsClient jobsClient, String keyword) {

    return (Store store) async {

    store.dispatch(LoadJobAction(keyword: keyword));

    try {

    List jobs = await jobsClient.getJobs(keyword);

    store.dispatch(JobLoadedAction(jobs: jobs));

    } catch (e) {

    store.dispatch(JobLoadErrorAction());

    }

    };

    }

