    ## 6.6 Formatting Text


    ### Problem


    You want to format the text.


    ### Solution


    Use TextInputFormatter with EditableText.


    ### Discussion


    When the user is typing in a text input, you may want to validate and format the
    entered text. A common requirement is to remove characters in a blacklist. This
    is done by providing a list of TextInputFormatter instances as the inputFormatters
    parameter of TextField and CupertinoTextField.


    TextInputFormatter is an abstract class with only formatEditUpdate(TextEditingValue
    oldValue, TextEditingValue newValue) to implement. The oldValue and newValue parameters
    represent the previous text and new text, respectively. The return value is another
    TextEditingValue instance representing the formatted text. TextInputFormatter
    instances can be chained. When chained, the value of oldValue to invoke formatEditUpdate
    method is always the previous text, but the value of newValue is the return value
    of invoking the formatEditUpdate method of previous TextInputFormatter instance
    in the chain.


    There are already three built-in implementation classes of TextInputFormatter
    shown in Table [6-5](#479501_1_En_6_Chapter.xhtml#Tab5). These classes are used
    in implementation of TextField and CupertinoTextField. For example, when the value
    of maxLines parameter is 1, BlacklistingTextInputFormatter.singleLineFormatter
    is added to the list of TextInputFormatter instances to filter out the “\n” character.


    Table 6-5


    Implementations of TextInputFormatter


    | Name | Description |

    | --- | --- |

    | `LengthLimitingTextInputFormatter` | Limit the number of characters can be entered.
    |

    | `BlacklistingTextInputFormatter` | Replace characters matching regular expression
    pattern with given string. |

    | `WhitelistingTextInputFormatter` | Allow only characters matching given regular
    expression pattern. |


    Instead of declaring new subclasses of TextInputFormatter, an easier way is to
    use TextInputFormatter.withFunction() method with a function matching the type
    of formatEditUpdate() method.


    In Listing [6-10](#479501_1_En_6_Chapter.xhtml#PC10), the input text is formatted
    to use uppercase.


    ```

    TextField(

    inputFormatters: [

    TextInputFormatter.withFunction((oldValue, newValue) {

    return newValue.copyWith(text: newValue.text?.toUpperCase());

    }),

    ],

    )

    Listing 6-10

    Format text

    ```


    ## 6.7 Selecting a Single Value


    ### Problem


    You want to select a single value from a list of values.


    ### Solution


    Use a group of Radio widgets.


    ### Discussion


    Radio buttons are commonly used for scenarios requiring single selections. Only
    one radio button in a group can be selected. Radio class has a type parameter
    T representing the type of values. When creating Radio instances, you need to
    provide required parameters including value, groupValue, and onChanged. A Radio
    widget doesn’t maintain any state. Its appearance is purely determined by value
    and groupValue parameters. When the selection of a radio group is changed, onChanged
    listener is invoked with the selected value. Table [6-6](#479501_1_En_6_Chapter.xhtml#Tab6)
    shows the named parameters of Radio constructor.


    Table 6-6


    Named parameters of Radio


    | Name | Type | Description |

    | --- | --- | --- |

    | `value` | `T` | Value of this radio button. |

    | `groupValue` | `T` | Selected value of this group of radio buttons. The radio
    button with groupValue is in selected state. |

    | `onChanged` | `ValueChanged<T>` | Listener function when selection changed.
    |

    | `activeColor` | `Color` | Color when this radio button is selected. |


    In Listing [6-11](#479501_1_En_6_Chapter.xhtml#PC11), Fruit.allFruits variable
    is a list of all Fruit instances. _selectedFruit is the currently selected Fruit
    instance. For each Fruit instance, a Radio<Fruit> widget is created with the groupValue
    set to _selectedFruit.


    ```

    class FruitChooser extends StatefulWidget {

    @override

    _FruitChooserState createState() => _FruitChooserState();

    }

