  raw: '### Discussion


    If those built-in widgets for multiple children cannot meet your requirement,
    you can create a custom layout using CustomMultiChildLayout. Similar to CustomSingleChildLayout,
    CustomMultiChildLayout delegates the layout logic to a MultiChildLayoutDelegate
    instance. All children of CustomMultiChildLayout must be wrapped in a LayoutId
    widget to provide unique ids for them. Of all the methods shown in Table [5-12](#479501_1_En_5_Chapter.xhtml#Tab12),
    performLayout() and shouldRelayout() methods must be implemented. All other methods
    have default implementation. In the implementation of performLayout() method,
    the layoutChild() method must be called exactly once for each child.


    Table 5-12


    Methods of MultiChildLayoutDelegate


    | Name | Description |

    | --- | --- |

    | `hasChild(Object childId)` | Check if a child with the given id exists. |

    | `layoutChild(Object childId, BoxConstraints constraints)` | Layout the child
    with the provided constraints. |

    | `positionChild(Object childId, Offset offset)` | Position the child with the
    given offset. |

    | `getSize(BoxConstraints constraints)` | Get the size of this widget. |

    | `performLayout(Size size)` | The actual layout logic. |

    | `shouldRelayout()` | Should relayout. |


    Listing [5-22](#479501_1_En_5_Chapter.xhtml#PC22) shows a custom multiple children
    layout delegate. This delegate uses increasing int values as the layout id. Layout
    ids of children must start from 0\. In the performLayout() method, layoutChild()
    method is called on each child, starting with the first child with loose constraints,
    which allows the first child to take the natural size. The actual size of the
    first child is recorded. Then positionChild() method is called with Offset.zero
    to place the first child at the top left corner. After the first child, layoutChild()
    and positionChild() methods are called on all the other children with increasing
    size and position offsets, respectively.


    ```

    class GrowingSizeLayoutDelegate extends MultiChildLayoutDelegate {

    @override

    void performLayout(Size size) {

    int index = 0;

    Size childSize = layoutChild(index, BoxConstraints.loose(size));

    Offset offset = Offset.zero;

    positionChild(index, offset);

    index++;

    while (hasChild(index)) {

    double sizeFactor = 1.0 + index * 0.1;

    double offsetFactor = index * 10.0;

    childSize = layoutChild(

    index,

    BoxConstraints.tight(Size(

    childSize.width * sizeFactor, childSize.height * sizeFactor)));

    offset = offset.translate(offsetFactor, offsetFactor);

    positionChild(index, offset);

    index++;

    }

    }

    @override

    bool shouldRelayout(MultiChildLayoutDelegate oldDelegate) {

    return false;

    }

    @override

    Size getSize(BoxConstraints constraints) =>

    constraints.constrain(Size(400, 400));

    }

