- fmt: '### Discussion


    Flutter apps can include both code and static assets. There are two types of assets:


    - Data files including JSON, XML, and plain text files

    - Binary files including images and videos


    Assets are declared in the `flutter/assets` section of the `pubspec.yaml` file.
    During the build process, these assets files are bundled into the app’s binary
    files. These assets can be accessed in the runtime. It’s common to put assets
    under the `assets` directory. In Listing [13-1](#479501_1_En_13_Chapter.xhtml#PC1),
    two files are declared as assets in `pubspec.yaml` file.


    ```

    flutter:

    assets:

    - assets/dog.jpg

    - assets/data.json

    Listing 13-1

    Assets in pubspec.yaml file

    ```


    In the runtime, subclasses of `AssetBundle` class are used to load content from
    the assets. The `load()` method retrieves the binary content, while `loadString()`
    method retrieves the string content. You need to provide the assets key when using
    these two methods. The key is the same as asset path declared in `pubspec.yaml`
    file. The static application-level `rootBundle` property refers to the `AssetBundle`
    object that contains assets packaged with the app. You can use this property directly
    to load assets. It’s recommended to use static `DefaultAssetBundle.of()` method
    to get the `AssetBundle` object from build context.


    In Listing [13-2](#479501_1_En_13_Chapter.xhtml#PC2), the JSON file `assets/data.json`
    is loaded as string using `loadString()` method .


    ```

    class TextAssets extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return FutureBuilder(

    future: DefaultAssetBundle.of(context)

    .loadString(''assets/data.json'')

    .then((json) {

    return jsonDecode(json)[''name''];

    }),

    builder: (context, snapshot) {

    if (snapshot.connectionState == ConnectionState.done) {

    return Center(child: Text(snapshot.data));

    } else {

    return Center(child: CircularProgressIndicator());

    }

    },

    );

    }

    }

    Listing 13-2

    Load string assets

    ```


    If the assets file is an image, you can use `AssetImage` class with `Image` widget
    to display it. In Listing [13-3](#479501_1_En_13_Chapter.xhtml#PC3), `AssetImage`
    class is used to display the `assets/dog.jpg` image.


    ```

    Image(

    image: AssetImage(''assets/dog.jpg''),

    )

    Listing 13-3

    Use AssetImage

    ```


    For an image asset, it’s common to have multiple variants with different resolutions
    for the same file. When using `AssetImage` class to load an asset image, the variant
    that most closely matches the current device pixel ratio will be used.


    In Listing [13-4](#479501_1_En_13_Chapter.xhtml#PC4), the `assets/2.0x/dog.jpg`
    file is the variant of `assets/dog.jpg` with resolution ratio `2.0`. If the device
    pixel ratio is `1.6`, the `assets/2.0x/dog.jpg` file is used.


    ```

    flutter:

    assets:

    - assets/dog.jpg

    - assets/2.0x/dog.jpg

    - assets/3.0x/dog.jpg

    Listing 13-4

    Image assets variants

    ```


    ## 13.2 Using Gestures


    ### Problem


    You want to allow user using gestures to perform actions.


    ### Solution


    Use `GestureDetector` widget to detect gestures.


    ### Discussion


    Users of mobiles app are used to gestures when performing actions. For example,
    when viewing pictures gallery, using swiping gesture can easily navigate between
    different pictures. In Flutter, we can use `GestureDetector` widget to detect
    gestures and invoke specified callbacks for gestures. `GestureDetector` constructor
    has a large number of parameters to provide callbacks for different events. A
    gesture may dispatch multiple events during its lifecycle. For example, the gesture
    of horizontal drag can dispatch three events. The following are the handler parameters
    for these three events:


    - `onHorizontalDragStart` callback means the pointer may begin to move horizontally.

    - `onHorizontalDragUpdate` callback means the pointer is moving in the horizontal
    direction.

    - `onHorizontalDragEnd` callback means the pointer is longer in contact with the
    screen.


    Callbacks of different events can receive details about the events. In Listing
    [13-5](#479501_1_En_13_Chapter.xhtml#PC5), the `GestureDetector` widget wraps
    a `Container` widget. In the `onHorizontalDragEnd` callback handler, the `velocity`
    property of `DragEndDetails` object is the moving velocity of the pointer. We
    use this property to determine the drag direction.


    ```

    class SwipingCounter extends StatefulWidget {

    @override

    _SwipingCounterState createState() => _SwipingCounterState();

    }

    class _SwipingCounterState extends State {

    int _count = 0;

    @override

    Widget build(BuildContext context) {

    return Column(

    children: [

    Text(''$_count''),

    Expanded(

    child: GestureDetector(

    child: Container(

    decoration: BoxDecoration(color: Colors.grey.shade200),

    ),

    onHorizontalDragEnd: (DragEndDetails details) {

    setState(() {

    double dx = details.velocity.pixelsPerSecond.dx;

    _count += (dx > 0 ? 1 : (dx < 0 ? -1 : 0));

    });

    },

    ),

    ),

    ] ,

    );

    }

    }

    Listing 13-5

    Use GestureDetector

    ```


    ## 13.3 Supporting Multiple Locales


    ### Problem


    You want the app to support multiple locales.


    ### Solution


    Use `Localizations` widget and `LocalizationsDelegate` class.'
