    # 布局组件


    Flutter 提供了一组用于不同布局需求的布局组件。这些组件可分为两类。第一类是包含单个子组件的组件，它们是 `SingleChildRenderObjectWidget`
    类的子类。第二类是可以包含多个子组件的组件，它们是 `MultiChildRenderObjectWidget` 类的子类。这些组件的构造方法具有相似的模式。第一个命名参数是类型为
    `Key` 的 `key`。单子组件布局构造方法的最后一个命名参数是类型为 `Widget` 的 `child`，而多子组件布局构造方法的最后一个命名参数是类型为
    `List<Widget>` 的 `children`。


    这些布局组件是 `RenderObjectWidget` 类的子类。`RenderObjectWidget` 类用于配置 `RenderObjectElement`。`RenderObjectElement`
    则封装了 `RenderObject`。


    ## 5.2 将组件居中放置


    ### 问题


    你希望将一个组件放置在另一个组件的中心。


    ### 解决方案


    用 `Center` 组件包裹该组件。


    ### 讨论


    要将一个组件放置在另一个组件的中心，只需用 `Center` 组件包裹该组件即可。该组件将水平且垂直地放置在 `Center` 组件的中心。这个 `Center`
    组件会成为原始父组件的子组件。`Center` 构造方法有两个命名参数 `widthFactor` 和 `heightFactor`，分别用于指定宽度和高度的尺寸因子。清单
    5-2 展示了使用 `Center` 组件的示例。


    ```dart

    Center(

    widthFactor: 2.0,

    heightFactor: 2.0,

    child: Text("Center"),

    )

    ```


    `Center` 组件实际上是 `Align` 组件的一个子类，其 `alignment` 属性被设置为 `Alignment.center`。`Center`
    组件的行为与配方 5-3 中讨论的 `Align` 组件相同。


    ## 5.3 对齐组件


    ### 问题


    你希望将一个组件在其父组件内的不同位置进行对齐。


    ### 解决方案


    用 `Align` 组件包裹该组件。


    ### 讨论


    使用 `Align` 组件，你可以将子组件对齐到不同的位置。`Align` 构造方法有一个类型为 `AlignmentGeometry` 的命名参数 `alignment`，用于指定对齐方式。`Center`
    组件实际上是 `Align` 组件的一种特殊形式，其 `alignment` 始终设置为 `Alignment.center`。`Align` 构造方法还有命名参数
    `widthFactor` 和 `heightFactor`。


    `AlignmentGeometry` 类有两个子类，用于不同的场景。`Alignment` 类表示视觉坐标中的对齐方式。`Alignment` 有两个属性
    `x` 和 `y`，用于表示二维坐标系中矩形内的位置。`x` 和 `y` 属性分别指定水平方向和垂直方向的位置。`Alignment(0.0, 0.0)`
    表示矩形的中心。1.0 单位表示从中心到矩形一侧的距离。2.0 单位表示矩形在特定方向上的长度。例如，`x` 的值为 2.0 表示矩形的宽度。`x` 的正值表示中心右侧的位置，负值表示中心左侧的位置。`y`
    的值也遵循同样的规则。`Align` 为常用位置提供了几个常量；参见表 5-1。


    **表 5-1** 对齐常量


    | 名称 | 值 | 描述 |

    | --- | --- | --- |

    | `bottomCenter` | `Alignment(0.0, 1.0)` | 底边中点。 |

    | `bottomLeft` | `Alignment(-1.0, 1.0)` | 底边最左点。 |

    | `bottomRight` | `Alignment(1.0, 1.0)` | 底边最右点。 |

    | `center` | `Alignment(0.0, 0.0)` | 水平和垂直方向的中点。 |

    | `centerLeft` | `Alignment(-1.0, 0.0)` | 左边中点。 |

    | `centerRight` | `Alignment(1.0, 0.0)` | 右边中点。 |

    | `topCenter` | `Alignment(0,0, -1.0)` | 顶边中点。 |

    | `topLeft` | `Alignment(-1.0, -1.0)` | 顶边最左点。 |

    | `topRight` | `Alignment(1.0, -1.0)` | 顶边最右点。 |


    如果在对齐时需要考虑文本方向，则需要使用 `AlignmentDirectional` 类而不是 `Alignment` 类。`AlignmentDirectional`
    类具有属性 `start` 而不是 `x`。`start` 的值沿文本方向增长。当文本方向为从左到右时，`start` 的值与 `Alignment` 中的
    `x` 含义相同。如果文本方向为从右到左，则 `start` 的值与 `Alignment` 中的 `x` 相反。`AlignmentDirectional`
    类也为常用位置提供了几个常量；参见表 5-2。这些常量使用 `start` 和 `end` 而不是 `left` 和 `right` 来表示不同方向。


    **表 5-2** AlignmentDirectional 常量


    | 名称 | 值 | 描述 |

    | --- | --- | --- |

    | `bottomCenter` | `AlignmentDirectional (0.0, 1.0)` | 底边中点。 |

    | `bottomStart` | `AlignmentDirectional(-1.0, 1.0)` | 起始侧的底角。 |

    | `bottomEnd` | `AlignmentDirectional(1.0, 1.0)` | 结束侧的底角。 |

    | `center` | `AlignmentDirectional (0.0, 0.0)` | 水平和垂直方向的中点。 |

    | `centerStart` | `AlignmentDirectional(-1.0, 0.0)` | 起始边的中点。 |

    | `centerEnd` | `AlignmentDirectional(1.0, 0.0)` | 结束边的中点。 |

    | `topCenter` | `AlignmentDirectional(0,0, -1.0)` | 顶边中点。 |

    | `topStart` | `AlignmentDirectional(-1.0, -1.0)` | 起始侧的顶角。 |

    | `topEnd` | `AlignmentDirectional(1.0, -1.0)` | 结束侧的顶角。 |


    `AlignmentGeometry` 的 `resolve()` 方法接收一个类型为 `TextDirection` 的参数，并返回一个 `Alignment`
    实例。你可以使用此方法将 `AlignmentDirectional` 实例转换为 `Alignment` 实例。


    传递给其子组件的约束是对此组件约束对象调用 `loosen()` 方法的结果。这意味着子组件可以选择一个不超过此组件大小的尺寸。组件本身的大小取决于参数 `widthFactor`
    和 `heightFactor` 的值及其约束对象。对于宽度，如果 `widthFactor` 不为 null 或 `constraints.maxWidth`
    为 `double.infinity`，则宽度是受约束限制的，最接近 `childWidth * (widthFactory ?? 1.0)` 的值。否则，宽度由约束决定。高度也遵循同样的规则。


    清单 5-3 展示了使用 `Align` 组件的示例。


    ```dart

    Align(

    alignment: Alignment.topLeft,

    child: SizedBox(

    width: 200,

    height: 200,

    child: Center(

    child: Text("TopLeft"),

    ),

    ),

    )

    ```


    ## 5.4 对组件施加约束


    ### 问题


    你希望对组件施加布局约束。


    ### 解决方案


    使用 `ConstrainedBox` 或 `SizedBox`。

