- fmt: "### Discussion\n\nBloc (Business Logic Component) 是一种架构模式，用于将表现层与业务逻辑分离。Bloc\
    \ 被设计为简单、强大且易于测试。让我们从 Bloc 的核心概念开始。\n\n`State`（状态）表示应用程序状态的一部分。当状态发生变化时，会通知 UI\
    \ 组件根据最新状态进行重建。每个应用程序都有自己的方式来定义状态。通常，你会使用 Dart 类来描述状态。\n\n`Event`（事件）是状态变化的来源。事件可以由用户交互或后台任务生成。例如，按下按钮可能会生成一个描述预期操作的事件。当\
    \ HTTP 请求的响应就绪时，也可以生成一个包含响应体的事件。事件通常使用 Dart 类来描述。事件可能还带有它们的载荷。\n\n当一个事件被派发时，处理这些事件可能会导致当前状态转换到新状态。然后\
    \ UI 组件会被通知使用新状态进行重建。一个事件转换包括当前状态、事件和下一个状态。如果所有状态转换都被记录，我们可以轻松追踪所有的用户交互和状态变化。我们还可以实现时间旅行调试。\n\
    \n现在我们可以给出 Bloc 的定义。一个 Bloc 组件将事件流转换为状态流。一个 Bloc 有一个初始状态，即在接收到任何事件之前的状态。对于每个事件，Bloc\
    \ 都有一个`mapEventToState()`函数，该函数接收一个事件并返回一个状态流，供表现层使用。Bloc 还有一个`dispatch()`方法来向它派发事件。\n\
    \n在本教程中，我们将使用 GitHub Jobs API（[`https://jobs.github.com/api`](https://jobs.github.com/api)）来获取\
