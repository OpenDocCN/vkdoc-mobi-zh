    ### 解决方案


    使用 `GridView`。

    '
- fmt: '### Discussion


    `ListView` widget displays items in a linear array. To display widgets in a two-dimensional
    array, you can use `GridView`. The actual layout of children of `GridView` is
    delegated to an implementation of `SliverGridDelegate`. Flutter provides two built-in
    implementations of `SliverGridDelegate`, `SliverGridDelegateWithFixedCrossAxisCount`
    and `SliverGridDelegateWithMaxCrossAxisExtent`. You can also create your own implementations
    of `SliverGridDelegate`.


    There are three ways to provide the children of the `GridView`. You can provide
    a static list of widgets, or use builder function of type `IndexedWidgetBuilder`,
    or provide an implementation of `SliverChildDelegate`.


    Depending on the choice of `SliverGridDelegate` and providing children, you can
    use different `GridView` constructors. Table [7-3](#479501_1_En_7_Chapter.xhtml#Tab3)
    shows the usage of different constructors.


    **Table 7-3** `GridView` constructors


    | Name | Delegate | Children |

    | --- | --- | --- |

    | `GridView()` | `SliverGridDelegate` | `Widget[]` |

    | `GridView.builder()` | `SliverGridDelegate` | `IndexedWidgetBuilder` |

    | `GridView.count()` | `SliverGridDelegateWithFixedCrossAxisCount` | `Widget[]`
    |

    | `GridView.extent()` | `SliverGridDelegateWithMaxCrossAxisExtent` | `Widget[]`
    |

    | `GridView.custom()` | `SliverGridDelegate` | `SliverChildDelegate` |


    `SliverGridDelegateWithFixedCrossAxisCount` class uses the `crossAxisCount` parameter
    to specify the fixed number of tiles in the cross axis. For example, if the scroll
    direction of `GridView` is vertical, the `crossAxisCount` parameter specifies
    the number of columns. Listing [7-7](#479501_1_En_7_Chapter.xhtml#PC7) shows an
    example of using `GridView.count()` to create a grid with three columns.


    ```

    GridView.count(

    crossAxisCount: 3,

    children: List.generate(10, (index) {

    return ExampleWidget(

    name: ''Fixed Count ${index + 1}'',

    );

    }),

    );

    ```

    **Listing 7-7** Example of using `GridView.count()`


    `SliverGridDelegateWithMaxCrossAxisExtent` class uses the `maxCrossAxisExtent`
    parameter to specify the maximum extent in the cross axis. The actual cross-axis
    extent for tiles will be as large as possible to evenly divide the cross-axis
    extent of the `GridView` and won’t exceed the specified maximum value. For example,
    if the cross-axis extent of the `GridView` is 400 and the value of `maxCrossAxisExtent`
    is 120, then the cross-axis extent for tiles is 100. If the `GridView`’s scroll
    direction is vertical, it will have four columns. Listing [7-8](#479501_1_En_7_Chapter.xhtml#PC8)
    shows an example of using `GridView.extent()`.


    ```

    GridView.extent(

    maxCrossAxisExtent: 250,

    children: List.generate(10, (index) {

    return ExampleWidget(

    name: ''Max Extent ${index + 1}'',

    );

    }),

    );

    ```

    **Listing 7-8** Example of using `GridView.extent()`


    To use a builder function to create children, you need to use `GridView.builder()`
    constructor with a `SliverGridDelegate` implementation. Listing [7-9](#479501_1_En_7_Chapter.xhtml#PC9)
    shows an example of using `GridView.builder()` with `SliverGridDelegateWithFixedCrossAxisCount`.


    ```

    GridView.builder(

    itemCount: 32,

    gridDelegate:

    SliverGridDelegateWithFixedCrossAxisCount(crossAxisCount: 3),

    itemBuilder: (context, index) {

    return ExampleWidget(

    name: ''Builder ${index + 1}'',

    );

    },

    );

    ```

    **Listing 7-9** Example of using `GridView.builder()`


    Both `SliverGridDelegateWithFixedCrossAxisCount` and `SliverGridDelegateWithMaxCrossAxisExtent`
    classes have other named parameters to configure the layout; see Table [7-4](#479501_1_En_7_Chapter.xhtml#Tab4).


    **Table 7-4** Parameters of built-in `SliverGridDelegate` implementations


    | Name | Type | Description |

    | --- | --- | --- |

    | `mainAxisSpacing` | `double` | Spacing of tiles along the main axis. |

    | `crossAxisSpacing` | `double` | Spacing of tiles along the cross axis. |

    | `childAspectRatio` | `double` | Ratio of cross-axis to main-axis extent for
    the tiles. |


    When using these two `SliverGridDelegate` implementations, the cross-axis extent
    of each tile is determined first, then the main-axis extent is determined by the
    `childAspectRatio` parameter. If `GridView` is used to display images with desired
    aspect ratio, you can use the same ratio as the value of `childAspectRatio` parameter.
    Both `GridView.count()` and `GridView.extent()` constructors have the same named
    parameters in Table [7-4](#479501_1_En_7_Chapter.xhtml#Tab4) to pass these parameters
    to the underlying `SliverGridDelegate` implementations. Listing [7-10](#479501_1_En_7_Chapter.xhtml#PC10)
    shows an example of using `childAspectRatio` parameter when displaying images.


    ```

    GridView.count(

    crossAxisCount: 3,

    childAspectRatio: 4 / 3,

    children: List.generate(10, (index) {

    return Image.network(''https://picsum.photos/400/300'');

    }),

    );

    ```

    **Listing 7-10** Using `childAspectRatio` parameter


    Just like using `ListTiles` in `ListView`, you can also use `GridTiles` in `GridView`.
    A grid tile has a required child widget and optional header and footer widgets.
    For header and footer of grid tiles, it’s typical to use the `GridTileBar` widget.
    `GridTileBar` is similar with `ListTile`. `GridTileBar` constructor has parameters
    `title`, `subtitle`, `leading`, `trailing`, and `backgroundColor`.


    ```

    GridView.count(

    crossAxisCount: 2,

    children: [

    GridTile(

    child: ExampleWidget(name: ''Simple''),

    ),

    GridTile(

    child: ExampleWidget(name: ''Header & Footer''),

    header: GridTileBar(

    title: Text(''Header''),

    backgroundColor: Colors.red,

    ),

    footer: GridTileBar(

    title: Text(''Footer''),

    subtitle: Text(''Description''),

    backgroundColor: Colors.blue,

    ),

    )

    ],

    );

    ```

    **Listing 7-11** Example of `GridTile` and `GridTileBar`


    Figure [7-2](#479501_1_En_7_Chapter.xhtml#Fig2) shows the screenshot of code in
    Listing [7-11](#479501_1_En_7_Chapter.xhtml#PC11).


    ![../images/479501_1_En_7_Chapter/479501_1_En_7_Fig2_HTML.png](images/479501_1_En_7_Chapter/479501_1_En_7_Fig2_HTML.png)


    **Figure 7-2** `GridTile` and `GridTileBar`


    ## 7.3 Displaying Tabular Data


    ### Problem


    You want to display tabular data or use table layout for children.


    ### Solution


    Use `Table` widget.'
