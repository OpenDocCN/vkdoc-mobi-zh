    ### Problem


    You want to write test cases to test widgets.


    ### Solution


    Use `flutter_test` package.'
  trans: "\n### 讨论\n\n在编写测试用例时，待测试的类可能依赖于需要外部资源的依赖项。例如，一个服务类需要访问后端 API 来获取数据。在测试这些类时，你不应使用真实的依赖关系。依赖外部资源会给测试用例的执行带来不确定性，并使其不稳定。使用实时服务也难以测试所有可能的场景。\n\
