    ### 解析 XML 文档


    要解析 XML 文档，需要使用 `parse()` 函数，该函数接收一个 XML 字符串作为输入，并返回解析后的 `XmlDocument` 对象。利用 `XmlDocument`
    对象，你可以查询和遍历 XML 文档树以从中提取数据。


    要查询文档树，可以使用 `findElements()` 和 `findAllElements()` 方法。这两个方法接受一个标签名和一个可选的命名空间作为参数，并返回一个
    `Iterable<XmlElement>` 对象。它们的区别在于：`findElements()` 方法仅搜索直接子元素，而 `findAllElements()`
    方法则搜索所有后代子元素。若要遍历文档树，可以使用表 9-10 中列出的属性。


    **表 9-10** `XmlParent` 的属性


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `children` | `XmlNodeList<XmlNode>` | 该节点的直接子节点。 |

    | `ancestors` | `Iterable<XmlNode>` | 该节点的祖先节点，按文档逆序排列。 |

    | `descendants` | `Iterable<XmlNode>` | 该节点的后代节点，按文档顺序排列。 |

    | `attributes` | `List<XmlAttribute>` | 该节点的属性节点，按文档顺序排列。 |

    | `preceding` | `Iterable<XmlNode>` | 该节点开始标签之前的节点，按文档顺序排列。 |

    | `following` | `Iterable<XmlNode>` | 该节点结束标签之后的节点，按文档顺序排列。 |

    | `parent` | `XmlNode` | 该节点的父节点，可以为 `null`。 |

    | `firstChild` | `XmlNode` | 该节点的第一个子节点，可以为 `null`。 |

    | `lastChild` | `XmlNode` | 该节点的最后一个子节点，可以为 `null`。 |

    | `nextSibling` | `XmlNode` | 该节点的下一个兄弟节点，可以为 `null`。 |

    | `previousSibling` | `XmlNode` | 该节点的上一个兄弟节点，可以为 `null`。 |

    | `root` | `XmlNode` | 树的根节点。 |


    在代码清单 9-26 中，输入的 XML 字符串（摘录自 [`https://msdn.microsoft.com/en-us/windows/desktop/ms762271`](https://msdn.microsoft.com/en-us/windows/desktop/ms762271)）被解析，并查询第一个
    `book` 元素。然后提取了 `title` 元素的文本和 `id` 属性的值。


    ```

    String xmlStr = "''


    Gambardella, Matthew

    XML Developer''s Guide

    Computer

    44.95

    2000-10-01

    An in-depth look at creating applications

    with XML.


    Ralls, Kim

    Midnight Rain

    Fantasy

    5.95

    2000-12-16

    A former architect battles corporate zombies, an evil sorceress, and her own childhood
    to become queen of the world.


    "'';

    XmlDocument document = parse(xmlStr);

    XmlElement firstBook = document.rootElement.findElements(''book'').first;

    String title = firstBook.findElements(''title'').single.text;

    String id = firstBook.attributes

    .firstWhere((XmlAttribute attr) => attr.name.local == ''id'')

    .value;

    print(''$id => $title'');

