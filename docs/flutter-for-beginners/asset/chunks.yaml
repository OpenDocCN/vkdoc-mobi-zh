    ## 4.5 理解 InheritedWidget


    ### 问题


    你希望将数据沿小部件树向下传递。


    ### 解决方案


    继承 `InheritedWidget` 类。


    ### 讨论


    在构建小部件子树时，你可能需要将数据沿小部件树向下传递。例如，子树根小部件可能定义了一些上下文数据，比如从服务器获取的配置数据。子树中的其他小部件也可能需要访问这些上下文数据。一种可能的方式是将上下文数据添加到小部件的构造函数中，然后将其作为子小部件的构造函数参数传递下去。这种方案的主要缺点是，你需要将构造函数参数添加到子树中的所有小部件中。即使某些小部件实际上并不需要这些数据，它们仍然需要拥有这些数据以传递给它们的子小部件。


    更好的方法是使用 `InheritedWidget` 类。`BuildContext` 类提供了一个 `inheritFromWidgetOfExactType()`
    方法，用于获取特定类型 `InheritedWidget` 的最近实例。使用 `InheritedWidget`，你可以将上下文数据存储在一个 `InheritedWidget`
    实例中。如果某个小部件需要访问上下文数据，你可以使用 `inheritFromWidgetOfExactType()` 方法来获取该实例并访问数据。如果一个继承的小部件状态发生改变，它将导致其消费者小部件重新构建。


    在代码清单 4-4 中，`ConfigWidget` 类包含数据 `config`。静态方法 `of()` 获取最近的祖先 `ConfigWidget` 实例以获取
    `config` 值。方法 `updateShouldNotify()` 决定了何时应该通知消费者小部件。


    ```

    class ConfigWidget extends InheritedWidget {

    const ConfigWidget({

    Key key,

    @required this.config,

    @required Widget child,

    })  : assert(config != null),

    assert(child != null),

    super(key: key, child: child);

    final String config;

    static String of(BuildContext context) {

    final ConfigWidget configWidget =

    context.inheritFromWidgetOfExactType(ConfigWidget);

    return configWidget?.config ?? ";

    }

    @override

    bool updateShouldNotify(ConfigWidget oldWidget) {

    return config != oldWidget.config;

    }

    }

    代码清单 4-4

    InheritedWidget 示例

    ```


    在代码清单 4-5 中，`ConfigUserWidget` 类使用 `ConfigWidget.of()` 方法来获取 `config` 值。


    ```

    class ConfigUserWidget extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Text(''Data is ${ConfigWidget.of(context)}'');

    }

    }

    代码清单 4-5

    ConfigWidget 的使用

    ```


    在代码清单 4-6 中，`ConfigWidget` 实例的 `config` 值为 “Hello!”，并且有一个后代 `ConfigUserWidget`
    实例。


    ```

    ConfigWidget(

    config: ''Hello!'',

    child: Center(

    child: ConfigUserWidget(),

    ),

    );

    代码清单 4-6

    完整示例

    ```


    ## 4.6 显示文本


    ### 问题


    你想显示一些文本。


    ### 解决方案


    使用 `Text` 和 `RichText` 小部件。


    ### 讨论


    几乎所有应用都需要向最终用户显示一些文本。Flutter 提供了几个与文本相关的类。`Text` 和 `RichText` 是用于显示文本的两个小部件。事实上，`Text`
    在内部使用了 `RichText`。`Text` 小部件的 `build()` 方法返回一个 `RichText` 实例。`Text` 和 `RichText`
    的区别在于，`Text` 使用最近邻的 `DefaultTextStyle` 对象的样式，而 `RichText` 需要显式指定样式。


    ### Text


    `Text` 有两个构造函数。第一个构造函数 `Text()` 接受一个 `String` 作为要显示的文本。另一个构造函数 `Text.rich()` 接受一个
    `TextSpan` 对象来表示文本和样式。创建 `Text` 小部件的最简单形式是 `Text(''Hello world'')`，它使用最近邻的 `DefaultTextStyle`
    对象的样式来显示文本。`Text()` 和 `Text.rich()` 构造函数都有几个命名参数来自定义它们；参见表 4-2。


    **表 4-2** `Text()` 和 `Text.rich()` 的命名参数


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `style` | `TextStyle` | 文本的样式。 |

    | `textAlign` | `TextAlign` | 文本应如何水平对齐。 |

    | `textDirection` | `TextDirection` | 文本的方向。 |

    | `locale` | `Locale` | 基于 Unicode 选择字体所用的区域设置。 |

    | `softWrap` | `bool` | 是否在软换行处断开文本。 |

    | `overflow` | `TextOverflow` | 如何处理文本溢出。 |

    | `textScaleFactor` | `double` | 缩放文本的因子。 |

    | `maxLines` | `int` | 最大行数。如果文本超过此限制，将根据 `overflow` 中指定的策略进行截断。 |

    | `semanticsLabel` | `String` | 文本的语义标签。 |


    `TextAlign` 是一个枚举类型，其值见表 4-3。


    **表 4-3** `TextAlign` 值


    | 名称 | 描述 |

    | --- | --- |

    | `left` | 将文本对齐到其容器的左侧边缘。 |

    | `right` | 将文本对齐到其容器的右侧边缘。 |

    | `center` | 将文本对齐到其容器的中心。 |

    | `justify` | 对于以软换行结束的文本行，拉伸这些行以填充容器的宽度；对于以硬换行结束的文本行，将它们对齐到起始边缘。 |

    | `start` | 将文本对齐到其容器的前导边缘。对于从左到右的文本，前导边缘是左侧边缘；而对于从右到左的文本，则是右侧边缘。 |

    | `end` | 将文本对齐到其容器的尾随边缘。尾随边缘与前导边缘相反。 |


    建议始终使用 `TextAlign` 值 `start` 和 `end`，而不是 `left` 和 `right`，以更好地处理双向文本。`TextDirection`
    是一个枚举类型，其值为 `ltr` 和 `rtl`。`TextOverflow` 是一个枚举类型，其值见表 4-4。


    **表 4-4** `TextOverflow` 值


    | 名称 | 描述 |

    | --- | --- |

    | `clip` | 裁剪溢出的文本。 |

    | `fade` | 将溢出的文本淡化为透明。 |

    | `ellipsis` | 在溢出的文本后添加省略号。 |


    `DefaultTextStyle` 是一个 `InheritedWidget`，它具有属性 `style`、`textAlign`、`softWrap`、`overflow`
    和 `maxLines`，这些属性的含义与表 4-2 中所示的命名参数相同。如果在构造函数 `Text()` 和 `Text.rich()` 中提供了某个命名参数，则该提供的值会覆盖最近祖先
    `DefaultTextStyle` 对象中的值。代码清单 4-7 展示了使用 `Text` 小部件的几个示例。


    ```

    Text(''Hello World'')

    Text(

    ''Bigger Bold Text'',

    style: TextStyle(fontWeight: FontWeight.bold),

    textScaleFactor: 2.0,

    );

    Text(

    ''Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor
    incididunt'',

    maxLines: 1,

    overflow: TextOverflow.ellipsis,

    );

    代码清单 4-7

    Text 示例

    ```

