- fmt: "### Stream Transformation\n\nThe power of stream is to apply various transformations\
    \ on the stream to get another stream or a value. Table [9-3](#479501_1_En_9_Chapter.xhtml#Tab3)\
    \ shows methods in `Stream` class that return another `Stream` object.\n\nTable\
    \ 9-3  \nStream transformations\n\n| Name | Description |\n| --- | --- |\n| `asyncExpand<E>(Stream<E>\
    \ convert(T event))` | Transforms each element into a stream and concatenates\
    \ elements in these streams as the new stream. |\n| `asyncMap<E>(FutureOr<E> convert(T\
    \ event))` | Transforms each element into a new event. |\n| `distinct([bool equals(T\
    \ previous, T next)])` | Skips duplicate elements. |\n| `expand<S>(Iterable<S>\
    \ convert(T element))` | Transforms each element into a sequence of elements.\
    \ |\n| `handleError(Function onError, { bool test(dynamic error) })` | Handles\
    \ errors in the stream. |\n| `map<S>(S convert(T event))` | Transforms each element\
    \ into a new event. |\n| `skip(int count)` | Skips elements in the stream. |\n\
    | `skipWhile(bool test(T element))` | Skips elements while they match the predicate.\
    \ |\n| `take(int count)` | Takes only the first count elements from the stream.\
    \ |\n| `takeWhile(bool test(T element))` | Takes elements while they match the\
    \ predicate. |\n| `timeout(Duration timeLimit, { void onTimeout(EventSink<T> sink)\
    \ })` | Handles error when the time between two events exceeds the time limit.\
    \ |\n| `transform<S>(StreamTransformer<T, S> streamTransformer)` | Transforms\
    \ the stream. |\n| `where(bool test(T event))` | Filters elements in the stream.\
    \ |\n\nListing [9-9](#479501_1_En_9_Chapter.xhtml#PC9) shows examples of using\
    \ stream transformations. Code below each statement shows the result of the execution.\n\
    \n```\nStream.fromIterable([1, 2, 3]).asyncExpand((int value) {\nreturn Stream.fromIterable([value\
    \ * 5, value * 10]);\n}).listen(print);\n// -> 5, 10, 10, 20, 15, 30\nStream.fromIterable([1,\
    \ 2, 3]).expand((int value) {\nreturn [value * 5, value * 10];\n}).listen(print);\n\
    // -> 5, 10, 10, 20, 15, 30\nStream.fromIterable([1, 2, 3]).asyncMap((int value)\
    \ {\nreturn Future.delayed(Duration(seconds: 1), () => value * 10);\n}).listen(print);\n\
    // -> 10, 20, 30\nStream.fromIterable([1, 2, 3]).map((value) => value * 10).listen(print);\n\
    // -> 10, 20, 30\nStream.fromIterable([1, 1, 2]).distinct().listen(print);\n//\
    \ -> 1, 2\nStream.fromIterable([1, 2, 3]).skip(1).listen(print);\n// -> 2, 3\n\
    Stream.fromIterable([1, 2, 3])\n.skipWhile((value) => value % 2 == 1)\n.listen(print);\n\
    // -> 2, 3\nStream.fromIterable([1, 2, 3]).take(1).listen(print);\n// -> 1\nStream.fromIterable([1,\
    \ 2, 3])\n.takeWhile((value) => value % 2 == 1)\n.listen(print);\n// -> 1\nStream.fromIterable([1,\
    \ 2, 3]).where((value) => value % 2 == 1).listen(print);\n// -> 1, 3\n```\n\n\
    Listing 9-9  \nStream transformations\n\nThere are other methods in `Stream` class\
    \ that return a `Future` object; see Table [9-4](#479501_1_En_9_Chapter.xhtml#Tab4).\
    \ These operations return a single value instead of a stream.\n\nTable 9-4  \n\
    Methods for single values\n\n| Name | Description |\n| --- | --- |\n| `any(bool\
    \ test(T element))` | Checks whether any element in the stream matches the predicate.\
    \ |\n| `every(bool test(T element))` | Checks whether all elements in the stream\
    \ match the predicate. |\n| `contains(Object needle)` | Checks whether the stream\
    \ contains the given element. |\n| `drain<E>([E futureValue])` | Discards all\
    \ elements in the stream. |\n| `elementAt(int index)` | Gets the element at the\
    \ given index. |\n| `firstWhere(bool test(T element), { T orElse() })` | Finds\
    \ the first element matching the predicate. |\n| `lastWhere(bool test(T element),\
    \ { T orElse() })` | Finds the last element matching the predicate. |\n| `singleWhere(bool\
    \ test(T element), { T orElse() })` | Finds the single element matching the predicate.\
    \ |\n| `fold<S>(S initialValue, S combine(S previous, T element))` | Combines\
    \ elements in the stream into a single value. |\n| `forEach(void action(T element))`\
    \ | Runs an action on each element of the stream. |\n| `join([String separator\
    \ = \"\"])` | Combines the elements into a single string. |\n| `pipe(StreamConsumer<T>\
    \ streamConsumer)` | Pipes the events into a `StreamConsumer`. |\n| `reduce(T\
    \ combine(T previous, T element))` | Combines elements in the stream into a single\
    \ value. |\n| `toList()` | Collects the elements into a list. |\n| `toSet()` |\
    \ Collects the elements into a set. |\n\nListing [9-10](#479501_1_En_9_Chapter.xhtml#PC10)\
    \ shows examples of using methods in Table [9-4](#479501_1_En_9_Chapter.xhtml#Tab4).\
    \ Code below each statement shows the result of the execution.\n\n```\nStream.fromIterable([1,\
    \ 2, 3]).forEach(print);\n// -> 1, 2, 3\nStream.fromIterable([1, 2, 3]).contains(1).then(print);\n\
    // -> true\nStream.fromIterable([1, 2, 3]).any((value) => value % 2 == 0).then(print);\n\
    // -> true\nStream.fromIterable([1, 2, 3]).every((value) => value % 2 == 0).then(print);\n\
    // -> false\nStream.fromIterable([1, 2, 3]).fold(0, (v1, v2) => v1 + v2).then(print);\n\
    // -> 6\nStream.fromIterable([1, 2, 3]).reduce((v1, v2) => v1 * v2).then(print);\n\
    // -> 6\nStream.fromIterable([1, 2, 3])\n.firstWhere((value) => value % 2 == 1)\n\
    .then(print);\n// -> 1\nStream.fromIterable([1, 2, 3])\n.lastWhere((value) =>\
    \ value % 2 == 1)\n.then(print);\n// -> 3\nStream.fromIterable([1, 2, 3])\n.singleWhere((value)\
    \ => value % 2 == 1)\n.then(print);\n// -> Unhandled exception: Bad state: Too\
    \ many elements\n```\n\nListing 9-10  \nMethods return `Future` objects\n\n##\
    \ 9.5 Creating Streams\n\n### Problem\n\nYou want to create `Stream` objects.\n\
    \n### Solution\n\nUse different `Stream` constructors.\n\n### Discussion\n\nThere\
    \ are different `Stream` constructors to create `Stream` objects:\n\n* `Stream.empty()`\
    \ constructor creates an empty broadcast stream.\n* `Stream.fromFuture()` constructor\
    \ creates a single-subscription stream from a `Future` object.\n* `Stream.fromFutures()`\
    \ constructor creates a stream from a list of `Future` objects.\n* `Stream.fromInterable()`\
    \ constructor creates a single-subscription stream from elements of an `Iterable`\
    \ object.\n* `Stream.periodic()` constructor creates a stream that periodically\
    \ emits data events at the given intervals.\n\nListing [9-11](#479501_1_En_9_Chapter.xhtml#PC11)\
    \ shows examples of different `Stream` constructors.\n\n```\nStream.fromIterable([1,\
    \ 2, 3]).listen(print);\nStream.fromFuture(Future.value(1)).listen(print);\nStream.fromFutures([Future.value(1),\
    \ Future.error('error'), Future.value(2)])\n.listen(print);\nStream.periodic(Duration(seconds:\
    \ 1), (int count) => count * 2)\n.take(5)\n.listen(print);\n```\n\nListing 9-11\
    \  \nUse `Stream` constructors\n\nAnother way to create streams is using `StreamController`\
    \ class. A `StreamController` object can send different events to the stream it\
    \ controls. The default `StreamController()` constructor creates a single-subscription\
    \ stream, while `StreamController.broadcast()` constructor creates a broadcast\
    \ stream. With `StreamController`, you can generate elements in stream programmatically.\n\
    \nIn Listing [9-12](#479501_1_En_9_Chapter.xhtml#PC12), different events are sent\
    \ to the stream controlled by the `StreamController` object.\n\n```\nStreamController\
    \ controller = StreamController();\ncontroller.add(1);\ncontroller.add(2);\ncontroller.stream.listen(print,\
    \ onError: print, onDone: () => print('done'));\ncontroller.addError('error');\n\
    controller.add(3);\ncontroller.close();\n```\n\nListing 9-12  \nUse `StreamController`\n\
    \n## 9.6 Building Widgets Based on Streams and Futures\n\n### Problem\n\nYou want\
    \ to build a widget that updates its content based on the data in a stream or\
    \ a future.\n\n### Solution\n\nUse `StreamBuilder<T>` or `FutureBuilder<T>` widget."
  raw: '#### Stream Transformation


    The power of stream is to apply various transformations on the stream to get another
    stream or a value. Table [9-3](#479501_1_En_9_Chapter.xhtml#Tab3) shows methods
    in `Stream` class that return another `Stream` object.


    Table 9-3


    Stream transformations


    | Name | Description |

    | --- | --- |

    | `asyncExpand<E>(Stream<E> convert(T event))` | Transforms each element into
    a stream and concatenates elements in these streams as the new stream. |

    | `asyncMap<E>(FutureOr<E> convert(T event))` | Transforms each element into a
    new event. |

    | `distinct([bool equals(T previous, T next) ])` | Skips duplicate elements. |

    | `expand<S>(Iterable<S> convert(T element))` | Transforms each element into a
    sequence of elements. |

    | `handleError(Function onError, { bool test(dynamic error) })` | Handles errors
    in the stream. |

    | `map<S>(S convert(T event))` | Transforms each element into a new event. |

    | `skip(int count)` | Skips elements in the stream. |

    | `skipWhile(bool test(T element))` | Skips elements while they match the predicate.
    |

    | `take(int count)` | Takes only the first count elements from the stream. |

    | `takeWhile(bool test(T element))` | Takes elements while they match the predicate.
    |

    | `timeout(Duration timeLimit, { void onTimeout(EventSink<T> sink) })` | Handles
    error when the time between two events exceeds the time limit. |

    | `transform<S>(StreamTransformer<T, S> streamTransformer)` | Transforms the stream.
    |

    | `where(bool test(T event))` | Filters elements in the stream. |


    Listing [9-9](#479501_1_En_9_Chapter.xhtml#PC9) shows examples of using stream
    transformations. Code below each statement shows the result of the execution.


    ```

    Stream.fromIterable([1, 2, 3]).asyncExpand((int value) {

    return Stream.fromIterable([value * 5, value * 10]);

    }).listen(print);

    // -> 5, 10, 10, 20, 15, 30

    Stream.fromIterable([1, 2, 3]).expand((int value) {

    return [value * 5, value * 10];

    }).listen(print);

    // -> 5, 10, 10, 20, 15, 30

    Stream.fromIterable([1, 2, 3]).asyncMap((int value) {

    return Future.delayed(Duration(seconds: 1), () => value * 10);

    }).listen(print);

    // -> 10, 20, 30

    Stream.fromIterable([1, 2, 3]).map((value) => value * 10).listen(print);

    // -> 10, 20, 30

    Stream.fromIterable([1, 1, 2]).distinct().listen(print);

    // -> 1, 2

    Stream.fromIterable([1, 2, 3]).skip(1).listen(print);

    // -> 2, 3

    Stream.fromIterable([1, 2, 3])

    .skipWhile((value) => value % 2 == 1)

    .listen(print);

    // -> 2, 3

    Stream.fromIterable([1, 2, 3]).take(1).listen(print);

    // -> 1

    Stream.fromIterable([1, 2, 3])

    .takeWhile((value) => value % 2 == 1)

    .listen(print);

    // -> 1

    Stream.fromIterable([1, 2, 3]).where((value) => value % 2 == 1).listen(print);

    // -> 1, 3

    Listing 9-9

    Stream transformations

    ```


    There are other methods in `Stream` class that return a `Future` object; see Table
    [9-4](#479501_1_En_9_Chapter.xhtml#Tab4). These operations return a single value
    instead of a stream.


    Table 9-4


    Methods for single values


    | Name | Description |

    | --- | --- |

    | `any(bool test(T element))` | Checks whether any element in the stream matches
    the predicate. |

    | `every(bool test(T element))` | Checks whether all elements in the stream match
    the predicate. |

    | `contains(Object needle)` | Checks whether the stream contains the given element.
    |

    | `drain<E>([E futureValue ])` | Discards all elements in the stream. |

    | `elementAt(int index)` | Gets the element at the given index. |

    | `firstWhere(bool test(T element), { T orElse() })` | Finds the first element
    matching the predicate. |

    | `lastWhere(bool test(T element), { T orElse() })` | Finds the last element matching
    the predicate. |

    | `singleWhere(bool test(T element), { T orElse() })` | Finds the single element
    matching the predicate. |

    | `fold<S>(S initialValue, S combine(S previous, T element))` | Combines elements
    in the stream into a single value. |

    | `forEach(void action(T element))` | Runs an action on each element of the stream.
    |

    | `join([String separator = "" ])` | Combines the elements into a single string.
    |

    | `pipe(StreamConsumer<T> streamConsumer)` | Pipes the events into a StreamConsumer.
    |

    | `reduce(T combine(T previous, T element))` | Combines elements in the stream
    into a single value. |

    | `toList()` | Collects the elements into a list. |

    | `toSet()` | Collects the elements into a set. |


    Listing [9-10](#479501_1_En_9_Chapter.xhtml#PC10) shows examples of using methods
    in Table [9-4](#479501_1_En_9_Chapter.xhtml#Tab4). Code below each statement shows
    the result of the execution.


    ```

    Stream.fromIterable([1, 2, 3]).forEach(print);

    // -> 1, 2, 3

    Stream.fromIterable([1, 2, 3]).contains(1).then(print);

    // -> true

    Stream.fromIterable([1, 2, 3]).any((value) => value % 2 == 0).then(print);

    // -> true

    Stream.fromIterable([1, 2, 3]).every((value) => value % 2 == 0).then(print);

    // -> false

    Stream.fromIterable([1, 2, 3]).fold(0, (v1, v2) => v1 + v2).then(print);

    // -> 6

    Stream.fromIterable([1, 2, 3]).reduce((v1, v2) => v1 * v2).then(print);

    // -> 6

    Stream.fromIterable([1, 2, 3])

    .firstWhere((value) => value % 2 == 1)

    .then(print);

    // -> 1

    Stream.fromIterable([1, 2, 3])

    .lastWhere((value) => value % 2 == 1)

    .then(print);

    // -> 3

    Stream.fromIterable([1, 2, 3])

    .singleWhere((value) => value % 2 == 1)

    .then(print);

    // -> Unhandled exception: Bad state: Too many elements

    Listing 9-10

    Methods return Future objects

    ```


    ## 9.5 Creating Streams


    ### Problem


    You want to create `Stream` objects .


    ### Solution


    Use different `Stream` constructors.


    ### Discussion


    There are different `Stream` constructors to create `Stream` objects:


    *   `Stream.empty()` constructor creates an empty broadcast stream.


    *   `Stream.fromFuture()` constructor creates a single-subscription stream from
    a `Future` object.


    *   `Stream.fromFutures()` constructor creates a stream from a list of `Future`
    objects.


    *   `Stream.fromInterable()` constructor creates a single-subscription stream
    from elements of an `Iterable` object.


    *   `Stream.periodic()` constructor creates a stream that periodically emits data
    events at the given intervals.


    Listing [9-11](#479501_1_En_9_Chapter.xhtml#PC11) shows examples of different
    `Stream` constructors .


    ```

    Stream.fromIterable([1, 2, 3]).listen(print);

    Stream.fromFuture(Future.value(1)).listen(print);

    Stream.fromFutures([Future.value(1), Future.error(''error''), Future.value(2)])

    .listen(print);

    Stream.periodic(Duration(seconds: 1), (int count) => count * 2)

    .take(5)

    .listen(print);

    Listing 9-11

    Use Stream constructors

    ```


    Another way to create streams is using `StreamController` class. A `StreamController`
    object can send different events to the stream it controls. The default `StreamController()`
    constructor creates a single-subscription stream, while `StreamController.broadcast()`
    constructor creates a broadcast stream. With `StreamController`, you can generate
    elements in stream programmatically.


    In Listing [9-12](#479501_1_En_9_Chapter.xhtml#PC12), different events are sent
    to the stream controlled by the `StreamController` object.


    ```

    StreamController controller = StreamController();

    controller.add(1);

    controller.add(2);

    controller.stream.listen(print, onError: print, onDone: () => print(''done''));

    controller.addError(''error'');

    controller.add(3);

    controller.close();

    Listing 9-12

    Use StreamController

    ```


    ## 9.6 Building Widgets Based on Streams and Futures


    ### Problem


    You want to build a widget that updates its content based on the data in a stream
    or a future.


    ### Solution


    Use `StreamBuilder<T>` or `FutureBuilder<T>` widget.'
