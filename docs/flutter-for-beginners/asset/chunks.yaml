  trans: '

    ### 弹性盒子布局算法


    弹性盒子的子节点布局较为复杂，需分多步进行。第一步，对每个弹性因子为 null 或零的子节点进行布局，这些是非弹性子节点。用于布局这些子节点的约束取决于 `crossAxisAlignment`
    的值。如果 `crossAxisAlignment` 的值是 `CrossAxisAlignment.stretch`，则约束将是交叉轴上最大尺寸的紧约束。否则，约束仅在交叉轴上设置最大值。例如，如果方向是
    `Axis.horizontal` 且 `crossAxisAlignment` 为 `CrossAxisAlignment.stretch`，则这些非弹性子节点的约束会将
    `minHeight` 和 `maxHeight` 都设置为 Flex 约束的 `maxHeight`。这使得这些子节点占据交叉轴上的所有空间。第一步中，会记录这些子节点的总分配尺寸以及交叉轴尺寸的最大值。


    第二步，对每个具有弹性因子的子节点进行布局，这些是弹性子节点。根据第一步，已知主轴已分配的尺寸。基于主轴的**最大尺寸**和**已分配尺寸**可以计算出**自由空间**。自由空间根据弹性因子在所有弹性子节点之间分配。弹性因子为
    `2.0` 的子节点获得的自由空间量是弹性因子为 `1.0` 的子节点的两倍。假设有三个子节点，其弹性因子分别为 `1.0`、`2.0` 和 `3.0`，如果自由空间是
    `120px`，那么这些子节点获得的额外空间将分别是 `20px`、`40px` 和 `60px`。为每个子节点基于弹性因子计算出的值将成为主轴上的最大约束。主轴上的最小约束取决于该子节点的
    `FlexFit` 值。如果 `fit` 值是 `FlexFit.tight`，则最小值与最大值相同，这会在主轴上产生紧约束。如果 `fit` 值是 `FlexFit.loose`，则最小值为
    `0.0`，这会在主轴上产生松约束。交叉轴上的约束与 Flex 小部件的约束相同。最终的约束被用于布局这些弹性子节点。


    第三步，确定主轴和交叉轴的**范围**。如果 `mainAxisSize` 的值为 `MainAxisSize.max`，则主轴范围是当前 Flex 小部件的最大约束。否则，主轴范围是所有子节点的**已分配尺寸**。交叉轴的范围是所有子节点交叉轴约束的**最大值**。


    最后一步，根据 `mainAxisAlignment` 和 `crossAxisAlignment` 的值确定每个子节点的位置。


    表 5-8 展示了枚举 `MainAxisAlignment` 的值。


    表 5-8


    `MainAxisAlignment` 值


    | 名称 | 描述 |

    | --- | --- |

    | `start` | 将子节点放置在靠近主轴起始端的位置。起始位置对于水平方向由 `TextDirection` 决定，对于垂直方向由 `VerticalDirection`
    决定。 |

    | `end` | 将子节点放置在靠近主轴末端的位置。末端位置的确定方式与起始端相同。 |

    | `center` | 将子节点放置在靠近中间的位置。 |

    | `spaceBetween` | 将自由空间均匀分布在子节点之间。 |

    | `spaceAround` | 将自由空间均匀分布在子节点之间，并在第一个子节点之前和最后一个子节点之后各留一半空间。 |

    | `spaceEvenly` | 将自由空间均匀分布在子节点之间，包括第一个子节点之前和最后一个子节点之后。 |


    表 5-9 展示了枚举 `CrossAxisAlignment` 的值。


    表 5-9


    `CrossAxisAlignment` 值


    | 名称 | 描述 |

    | --- | --- |

    | `start` | 将子节点放置为其起始边缘与交叉轴的起始侧对齐。起始位置对于水平方向由 `TextDirection` 决定，对于垂直方向由 `VerticalDirection`
    决定。 |

    | `end` | 将子节点放置为其末端边缘与交叉轴的末端侧对齐。末端位置的确定方式与起始端相同。 |

    | `center` | 将子节点放置为其中心与交叉轴中心对齐。 |

    | `stretch` | 要求子节点填充满交叉轴。 |

    | `baseline` | 在交叉轴上匹配子节点的基线。 |


    ### Flexible


    `Flexible` 具有 `flex` 参数用于指定弹性因子，以及 `fit` 参数用于指定 `BoxFit` 值。`flex` 参数的默认值是 `1`，而
    `fit` 的默认值是 `BoxFit.loose`。`Expanded` 是 `Flexible` 的一个子类，其 `fit` 参数被设置为 `BoxFit.tight`。


    在代码清单 5-16 中，`Column` 小部件被放置在一个 `LimitedBox` 小部件中以限制其高度。`Column` 小部件的所有子节点都是非弹性的。


    ```

    LimitedBox(

    maxHeight: 320,

    child: Column(

    crossAxisAlignment: CrossAxisAlignment.end,

    mainAxisAlignment: MainAxisAlignment.spaceAround,

    children: [

    Image.network(''https://picsum.photos/50''),

    Image.network(''https://picsum.photos/70''),

    Image.network(''https://picsum.photos/90''),

    ],

    ),

    )

    代码清单 5-16

    包含非弹性子节点的 Flex 小部件

    ```


    在代码清单 5-17 中，`Column` 小部件同时包含弹性和非弹性子节点。可以通过使用 `Flexible` 或 `Expanded` 小部件进行包裹来创建
    `Flexible` 小部件。


    ```

    LimitedBox(

    maxHeight: 300,

    child: Column(

    mainAxisAlignment: MainAxisAlignment.spaceBetween,

    children: [

    Flexible(

    child: Image.network(''https://picsum.photos/50''),

    ),

    Image.network(''https://picsum.photos/40''),

    Expanded(

    child: Image.network(''https://picsum.photos/50''),

    ),

    Expanded(

    flex: 2,

    child: Image.network(''https://picsum.photos/50''),

    ),

    ],

    ),

    )

    代码清单 5-17

    包含弹性与非弹性子节点的 Flex 小部件

    ```


    ## 5.16 显示重叠的小部件


    ### 问题


    你想要布局可能会相互重叠的小部件。


    ### 解决方案


    使用 `Stack` 或 `IndexedStack`。

    '
- fmt: '### Discussion


    `Stack` widget 的子组件可以是已定位的或未定位的。已定位的子组件会被包装在至少有一个非空属性的 `Positioned` widget 中。`Stack`
    widget 的尺寸由所有未定位的子组件决定。布局过程分为两个阶段。


    第一阶段是布局所有未定位的子组件。用于未定位子组件的约束取决于 `StackFit` 类型的 `fit` 属性值：


    *   `StackFit.loose` – 由 `constraints.loosen()` 创建的松散约束。

    *   `StackFit.expand` – 由 `BoxConstraints.tight(constraints.biggest)` 创建的紧约束。

    *   `StackFit.passthrough` – 与 `Stack` widget 相同的约束。


    `Stack` widget 的尺寸由所有未定位子组件的最大尺寸决定。


    在第二阶段，所有未定位的子组件会根据 `alignment` 属性进行定位。用于已定位子组件的约束由 `Stack` widget 的尺寸及其属性决定。`Positioned`
    widget 有六个属性：`left`、`top`、`right`、`bottom`、`width` 和 `height`。`left`、`right` 和
    `width` 属性用于确定紧宽度约束。`top`、`bottom` 和 `height` 属性用于确定紧高度约束。例如，如果 `left` 和 `right`
    值都不为 null，则紧宽度约束为 `widthOfStack – right – left`。然后，已定位的子组件会根据两个轴上的 `left`、`right`、`top`
    和 `bottom` 值进行定位。如果所有这些值都为 null，则根据 `alignment` 进行定位。


    `Stack` 的子组件按顺序绘制，第一个子组件位于最底层。`children` 数组中的顺序决定了子组件如何相互重叠。


    `IndexedStack` 类是 `Stack` 的子类。`IndexedStack` 实例仅显示子组件列表中的单个子组件。`IndexedStack`
    构造函数不仅具有与 `Stack` 构造函数相同的参数，还包括一个 `int` 类型的 `index` 参数，用于指定要显示的子组件索引。如果 `index`
    参数的值为 null，则不显示任何内容。`IndexedStack` 的布局与 `Stack` 相同。`IndexedStack` 类仅仅是绘制方式不同。这意味着即使只有一个子组件被显示，所有子组件仍然需要像
    `Stack` 一样进行布局。


    清单 [5-18](#479501_1_En_5_Chapter.xhtml#PC18) 展示了一个包含已定位子组件的 `Stack` widget 示例。


    ```

    Stack(

    children: [

    Image.network(''https://picsum.photos/200''),

    Image.network(''https://picsum.photos/100''),

    Positioned(

    right: 0,

    bottom: 0,

    child: Image.network(''https://picsum.photos/150''),

    ),

    ],

    )

    Listing 5-18

    Example of Stack

    ```


    ## 5.17 在多行中显示组件


    ### 问题


    你希望在多行（水平或垂直）中显示组件。


    ### 解决方案


    使用 `Wrap`。


    ### 讨论


    `Flex` widget 不允许子组件的尺寸超过主轴方向的尺寸。当没有足够空间容纳子组件时，`Wrap` widget 会创建新的行。表格 [5-10](#479501_1_En_5_Chapter.xhtml#Tab10)
    展示了 `Wrap` 构造函数的命名参数。


    表格 5-10 `Wrap` 的命名参数


    | 名称 | 值 | 默认值 | 描述 |

    | --- | --- | --- | --- |

    | `direction` | `Axis` | `Axis.horizontal` | 主轴方向。 |

    | `alignment` | `WrapAlignment` | `WrapAlignment.start` | 主轴方向上子组件在行内的对齐方式。 |

    | `spacing` | `Double` | `0.0` | 主轴方向上子组件之间的间距。 |

    | `runAlignment` | `WrapAlignment` | `WrapAlignment.start` | 交叉轴方向上行的对齐方式。 |

    | `runSpacing` | `Double` | `0.0` | 交叉轴方向上各行之间的间距。 |

    | `crossAxisAlignment` | `WrapCrossAlignment` | `WrapCrossAlignment.start` | 交叉轴方向上子组件在行内的对齐方式。
    |

    | `textDirection` | `TextDirection` |  | 水平布局子组件的顺序。 |

    | `verticalDirection` | `VerticalDirection` | `VerticalDirection.down` | 垂直布局子组件的顺序。
    |

    | `children` | `List<Widget>` | `[]` | 子组件列表。 |


    `WrapAlignment` 枚举的值与 `MainAxisAlignment` 相同。`WrapCrossAlignment` 枚举只有 `start`、`end`
    和 `center` 三个值。


    清单 [5-19](#479501_1_En_5_Chapter.xhtml#PC19) 展示了一个使用 `Wrap` widget 包装十个 `Image`
    widget 的示例。


    ```

    Wrap(

    spacing: 10,

    runSpacing: 5,

    crossAxisAlignment: WrapCrossAlignment.center,

    children: List.generate(

    10,

    (index) => Image.network(''https://picsum.photos/${50 + index * 10}''),

    ),

    )

    Listing 5-19

    Example of Wrap

    ```


    ## 5.18 创建自定义单子布局


    ### 问题


    你希望为单个子组件创建自定义布局。


    ### 解决方案


    使用 `CustomSingleChildLayout`。


    ### 讨论


    如果那些用于单个子组件的内置布局 widget 不能满足你的需求，你可以使用 `CustomSingleChildLayout` 创建自定义布局。`CustomSingleChildLayout`
    widget 将布局委托给一个 `SingleChildLayoutDelegate` 实例。你需要创建自己的 `SingleChildLayoutDelegate`
    子类来实现表格 [5-11](#479501_1_En_5_Chapter.xhtml#Tab11) 中所示的方法。


    表格 5-11 `SingleChildLayoutDelegate` 的方法


    | 名称 | 描述 |

    | --- | --- |

    | `getConstraintsForChild(BoxConstraints constraints)` | 获取子组件的约束。 |

    | `getPositionForChild(Size size, Size childSize)` | 根据此 widget 和子组件的尺寸获取子组件的位置。
    |

    | `getSize(BoxConstraints constraints)` | 获取此 widget 的尺寸。 |

    | `shouldRelayout()` | 是否应该重新布局。 |


    此 widget 的尺寸是委托的 `getSize()` 方法返回的尺寸在应用约束后的结果。子组件的布局使用委托的 `getConstraintsForChild()`
    方法返回的约束完成。最后，子组件的位置会用委托的 `getPositionForChild()` 方法返回的值更新。


    在清单 [5-20](#479501_1_En_5_Chapter.xhtml#PC20) 中，`FixedPositionLayoutDelegate`
    类重写了 `getSize()` 方法来提供父 widget 的尺寸。它还重写了 `getPositionForChild()` 方法来提供子组件的位置。`getConstraintsForChild()`
    方法也被重写以返回紧缩约束。


    ```

    class FixedPositionLayoutDelegate extends SingleChildLayoutDelegate {

    @override

    bool shouldRelayout(SingleChildLayoutDelegate oldDelegate) {

    return false;

    }

    @override

    Size getSize(BoxConstraints constraints) {

    return constraints.constrain(Size(300, 300));

    }

    @override

    BoxConstraints getConstraintsForChild(BoxConstraints constraints) {

    return constraints.tighten(width: 300, height: 300);

    }

    @override

    Offset getPositionForChild(Size size, Size childSize) {

    return Offset(50, 50);

    }

    }

    Listing 5-20

    Custom single child layout delegate

    ```


    清单 [5-21](#479501_1_En_5_Chapter.xhtml#PC21) 展示了如何使用 `FixedPositionLayoutDelegate`。


    ```

    CustomSingleChildLayout(

    delegate: FixedPositionLayoutDelegate(),

    child: Image.network(''https://picsum.photos/100''),

    )

    Listing 5-21

    Example of FixedPositionLayoutDelegate

    ```


    ## 5.19 创建自定义多子布局


    ### 问题


    你希望为多个子组件创建自定义布局。


    ### 解决方案


    使用 `CustomMultiChildLayout` 和 `MultiChildLayoutDelegate`。'
  raw: '### Discussion


    Children of Stack widget can be positioned or non-positioned. Positioned children
    are wrapped in a Positioned widget with at least one non-null property. Size of
    a Stack widget is determined by all the non-positioned children. The layout process
    has two phases.


    The first phase is to lay out all non-positioned children. The constraints used
    for non-positioned children depend on the value of fit property of type StackFit:


    *   StackFit.loose – Loose constraints created by constraints.loosen()


    *   StackFilt.expand – Tight constraints created by BoxConstraints.tight(constraints.biggest)


    *   StackFilt.passthrough – The same constraints as Stack widget


    Size of the Stack widget is determined by the maximum size of all non-positioned
    children.


    In the second phase, all non-positioned children are positioned according to the
    alignment property. The constraints used for positioned children are determined
    by the size of Stack widget and their properties. Positioned widget has six properties:
    left, top, right, bottom, width, and height. Properties left, right, and width
    are used to determine the tight width constraint. Properties top, bottom, and
    height are used to determine the tight height constraint. For example, if both
    left and right values are not null, the tight width constraint is widthOfStack –
    right – left. The positioned child is then positioned based on the left, right,
    top, and bottom values in two axes. If all these values are null, it’s positioned
    based on the alignment.


    Children of Stack are painted in the order with the first child being at the bottom.
    The order in the children array determines how children overlap with each other.


    IndexedStack class is a subclass of Stack. An IndexedStack instance only shows
    a single child from a list of children. IndexedStack constructor not only has
    the same parameters as Stack constructor but also includes a parameter index of
    type int to specify the index of child to display. If the value of parameter index
    is null, then nothing will be displayed. The layout of IndexedStack is the same
    as Stack. IndexedStack class simply has a different way to paint itself. This
    means even though only one child is displayed, all the children still need to
    lay out the same way as Stack.


    Listing [5-18](#479501_1_En_5_Chapter.xhtml#PC18) shows an example of Stack widget
    with positioned child.


    ```

    Stack(

    children: [

    Image.network(''https://picsum.photos/200''),

    Image.network(''https://picsum.photos/100''),

    Positioned(

    right: 0,

    bottom: 0,

    child: Image.network(''https://picsum.photos/150''),

    ),

    ],

    )

    Listing 5-18

    Example of Stack

    ```


    ## 5.17 Displaying Widgets in Multiple Runs


    ### Problem


    You want to display widgets in multiple horizontal or vertical runs.


    ### Solution


    Use Wrap.


    ### Problem


    Flex widget doesn’t allow size of children to exceed the size of the main axis.
    Wrap widget creates new runs; there is no enough space to fit the children. Table
    [5-10](#479501_1_En_5_Chapter.xhtml#Tab10) shows named parameters of Wrap constructor.


    Table 5-10


    Named parameters of Wrap


    | Name | Value | Default value | Description |

    | --- | --- | --- | --- |

    | `direction` | `Axis` | Axis.horizontal | Direction of the main axis. |

    | `alignment` | `WrapAlignment` | WrapAlignment.start | Alignment of children
    within a run in the main axis. |

    | `spacing` | `Double` | 0.0 | Space between children in a run in the main axis.
    |

    | `runAlignment` | `WrapAlignment` | WrapAlignment.start | Alignment of runs in
    the cross axis. |

    | `runSpacing` | `Double` | 0.0 | Space between runs in the cross axis. |

    | `crossAxisAlignment` | `WrapCrossAlignment` | WrapCrossAlignment.start | Alignment
    of children within a run in the cross axis. |

    | `textDirection` | `TextDirection` |   | Order to lay out children horizontally.
    |

    | `verticalDirection` | `VerticalDirection` | VerticalDirection.down | Order to
    lay out children vertically. |

    | `children` | `List<Widget>` | [] | Children. |


    WrapAlignment enum has the same values as MainAxisAlignment. WrapCrossAlignment
    enum only has values start, end, and center.


    Listing [5-19](#479501_1_En_5_Chapter.xhtml#PC19) shows an example of Wrap widget
    by wrapping ten Image widgets.


    ```

    Wrap(

    spacing: 10,

    runSpacing: 5,

    crossAxisAlignment: WrapCrossAlignment.center,

    children: List.generate(

    10,

    (index) => Image.network(''https://picsum.photos/${50 + index * 10}''),

    ),

    )

    Listing 5-19

    Example of Wrap

    ```


    ## 5.18 Creating Custom Single Child Layout


    ### Problem


    You want to create a custom layout for a single child.


    ### Solution


    Use CustomSingleChildLayout.


    ### Discussion


    If those built-in layout widgets for a single child cannot meet your requirement,
    you can create a custom layout using CustomSingleChildLayout. CustomSingleChildLayout
    widget simply delegates the layout to a SingleChildLayoutDelegate instance. You
    need to create your own subclass of SingleChildLayoutDelegate to implement methods
    shown in Table [5-11](#479501_1_En_5_Chapter.xhtml#Tab11).


    Table 5-11


    Methods of SingleChildLayoutDelegate


    | Name | Description |

    | --- | --- |

    | `getConstraintsForChild(BoxConstraints constraints)` | Get the constraints for
    the child. |

    | `getPositionForChild(Size size, Size childSize)` | Get the position of the child
    based on the size of this widget and child. |

    | `getSize(BoxConstraints constraints)` | Get the size of this widget. |

    | `shouldRelayout()` | Should relayout. |


    The size of this widget is the result of the size returned by delegate’s getSize()
    method after applying the constraints. Layout of child is done using the constraints
    returned by delegate’s getConstraintsForChild() method. Finally the position of
    child is updated with the value returned by delegate’s getPositionForChild() method.


    In Listing [5-20](#479501_1_En_5_Chapter.xhtml#PC20), FixedPositionLayoutDelegate
    class overrides getSize() method to provide the size of the parent widget. It
    also overrides getPositionForChild() methods to provide the position of the child.
    The getConstraintsForChild() method is also overridden to return tighten constraints.


    ```

    class FixedPositionLayoutDelegate extends SingleChildLayoutDelegate {

    @override

    bool shouldRelayout(SingleChildLayoutDelegate oldDelegate) {

    return false;

    }

    @override

    Size getSize(BoxConstraints constraints) {

    return constraints.constrain(Size(300, 300));

    }

    @override

    BoxConstraints getConstraintsForChild(BoxConstraints constraints) {

    return constraints.tighten(width: 300, height: 300);

    }

    @override

    Offset getPositionForChild(Size size, Size childSize) {

    return Offset(50, 50);

    }

    }

    Listing 5-20

    Custom single child layout delegate

    ```


    Listing [5-21](#479501_1_En_5_Chapter.xhtml#PC21) shows how to use FixedPositionLayoutDelegate.


    ```

    CustomSingleChildLayout(

    delegate: FixedPositionLayoutDelegate(),

    child: Image.network(''https://picsum.photos/100''),

    )

    Listing 5-21

    Example of FixedPositionLayoutDelegate

    ```


    ## 5.19 Creating Custom Multiple Children Layout


    ### Problem


    You want to create a custom layout for multiple children.


    ### Solution


    Use CustomMultiChildLayout and MultiChildLayoutDelegate.'
  trans: '

    ### 讨论


    `Stack` widget 的子组件可以是已定位的或未定位的。已定位的子组件会被包装在至少有一个非空属性的 `Positioned` widget 中。`Stack`
    widget 的尺寸由所有未定位的子组件决定。布局过程分为两个阶段。


    第一阶段是布局所有未定位的子组件。用于未定位子组件的约束取决于 `StackFit` 类型的 `fit` 属性值：


    *   `StackFit.loose` – 由 `constraints.loosen()` 创建的松散约束。

    *   `StackFit.expand` – 由 `BoxConstraints.tight(constraints.biggest)` 创建的紧约束。

    *   `StackFit.passthrough` – 与 `Stack` widget 相同的约束。


    `Stack` widget 的尺寸由所有未定位子组件的最大尺寸决定。


    在第二阶段，所有未定位的子组件会根据 `alignment` 属性进行定位。用于已定位子组件的约束由 `Stack` widget 的尺寸及其属性决定。`Positioned`
    widget 有六个属性：`left`、`top`、`right`、`bottom`、`width` 和 `height`。`left`、`right` 和
    `width` 属性用于确定紧宽度约束。`top`、`bottom` 和 `height` 属性用于确定紧高度约束。例如，如果 `left` 和 `right`
    值都不为 null，则紧宽度约束为 `widthOfStack – right – left`。然后，已定位的子组件会根据两个轴上的 `left`、`right`、`top`
    和 `bottom` 值进行定位。如果所有这些值都为 null，则根据 `alignment` 进行定位。


    `Stack` 的子组件按顺序绘制，第一个子组件位于最底层。`children` 数组中的顺序决定了子组件如何相互重叠。


    `IndexedStack` 类是 `Stack` 的子类。`IndexedStack` 实例仅显示子组件列表中的单个子组件。`IndexedStack`
    构造函数不仅具有与 `Stack` 构造函数相同的参数，还包括一个 `int` 类型的 `index` 参数，用于指定要显示的子组件索引。如果 `index`
    参数的值为 null，则不显示任何内容。`IndexedStack` 的布局与 `Stack` 相同。`IndexedStack` 类仅仅是绘制方式不同。这意味着即使只有一个子组件被显示，所有子组件仍然需要像
    `Stack` 一样进行布局。


    清单 5-18 展示了一个包含已定位子组件的 `Stack` widget 示例。


    ```

    Stack(

    children: [

    Image.network(''https://picsum.photos/200''),

    Image.network(''https://picsum.photos/100''),

    Positioned(

    right: 0,

    bottom: 0,

    child: Image.network(''https://picsum.photos/150''),

    ),

    ],

    )

    Listing 5-18

    Example of Stack

    ```


    ## 5.17 在多行中显示组件


    ### 问题


    你希望在多行（水平或垂直）中显示组件。


    ### 解决方案


    使用 `Wrap`。


    ### 讨论


    `Flex` widget 不允许子组件的尺寸超过主轴方向的尺寸。当没有足够空间容纳子组件时，`Wrap` widget 会创建新的行。表格 5-10 展示了
    `Wrap` 构造函数的命名参数。


    表格 5-10 `Wrap` 的命名参数


    | 名称 | 值 | 默认值 | 描述 |

    | --- | --- | --- | --- |

    | `direction` | `Axis` | `Axis.horizontal` | 主轴方向。 |

    | `alignment` | `WrapAlignment` | `WrapAlignment.start` | 主轴方向上子组件在行内的对齐方式。 |

    | `spacing` | `Double` | `0.0` | 主轴方向上子组件之间的间距。 |

    | `runAlignment` | `WrapAlignment` | `WrapAlignment.start` | 交叉轴方向上行的对齐方式。 |

    | `runSpacing` | `Double` | `0.0` | 交叉轴方向上各行之间的间距。 |

    | `crossAxisAlignment` | `WrapCrossAlignment` | `WrapCrossAlignment.start` | 交叉轴方向上子组件在行内的对齐方式。
    |

    | `textDirection` | `TextDirection` |  | 水平布局子组件的顺序。 |

    | `verticalDirection` | `VerticalDirection` | `VerticalDirection.down` | 垂直布局子组件的顺序。
    |

    | `children` | `List<Widget>` | `[]` | 子组件列表。 |


    `WrapAlignment` 枚举的值与 `MainAxisAlignment` 相同。`WrapCrossAlignment` 枚举只有 `start`、`end`
    和 `center` 三个值。


    清单 5-19 展示了一个使用 `Wrap` widget 包装十个 `Image` widget 的示例。


    ```

    Wrap(

    spacing: 10,

    runSpacing: 5,

    crossAxisAlignment: WrapCrossAlignment.center,

    children: List.generate(

    10,

    (index) => Image.network(''https://picsum.photos/${50 + index * 10}''),

    ),

    )

    Listing 5-19

    Example of Wrap

    ```


    ## 5.18 创建自定义单子布局


    ### 问题


    你希望为单个子组件创建自定义布局。


    ### 解决方案


    使用 `CustomSingleChildLayout`。


    ### 讨论


    如果那些用于单个子组件的内置布局 widget 不能满足你的需求，你可以使用 `CustomSingleChildLayout` 创建自定义布局。`CustomSingleChildLayout`
    widget 将布局委托给一个 `SingleChildLayoutDelegate` 实例。你需要创建自己的 `SingleChildLayoutDelegate`
    子类来实现表格 5-11 中所示的方法。


    表格 5-11 `SingleChildLayoutDelegate` 的方法


    | 名称 | 描述 |

    | --- | --- |

    | `getConstraintsForChild(BoxConstraints constraints)` | 获取子组件的约束。 |

    | `getPositionForChild(Size size, Size childSize)` | 根据此 widget 和子组件的尺寸获取子组件的位置。
    |

    | `getSize(BoxConstraints constraints)` | 获取此 widget 的尺寸。 |

    | `shouldRelayout()` | 是否应该重新布局。 |


    此 widget 的尺寸是委托的 `getSize()` 方法返回的尺寸在应用约束后的结果。子组件的布局使用委托的 `getConstraintsForChild()`
    方法返回的约束完成。最后，子组件的位置会用委托的 `getPositionForChild()` 方法返回的值更新。


    在清单 5-20 中，`FixedPositionLayoutDelegate` 类重写了 `getSize()` 方法来提供父 widget 的尺寸。它还重写了
    `getPositionForChild()` 方法来提供子组件的位置。`getConstraintsForChild()` 方法也被重写以返回紧缩约束。


    ```

    class FixedPositionLayoutDelegate extends SingleChildLayoutDelegate {

    @override

    bool shouldRelayout(SingleChildLayoutDelegate oldDelegate) {

    return false;

    }

    @override

    Size getSize(BoxConstraints constraints) {

    return constraints.constrain(Size(300, 300));

    }

    @override

    BoxConstraints getConstraintsForChild(BoxConstraints constraints) {

    return constraints.tighten(width: 300, height: 300);

    }

    @override

    Offset getPositionForChild(Size size, Size childSize) {

    return Offset(50, 50);

    }

    }

    Listing 5-20

    Custom single child layout delegate

    ```


    清单 5-21 展示了如何使用 `FixedPositionLayoutDelegate`。


    ```

    CustomSingleChildLayout(

    delegate: FixedPositionLayoutDelegate(),

    child: Image.network(''https://picsum.photos/100''),

    )

    Listing 5-21

    Example of FixedPositionLayoutDelegate

    ```


    ## 5.19 创建自定义多子布局


    ### 问题


    你希望为多个子组件创建自定义布局。


    ### 解决方案


    使用 `CustomMultiChildLayout` 和 `MultiChildLayoutDelegate`。'
- fmt: "### Discussion\n\nIf those built-in widgets for multiple children cannot meet\
    \ your requirement, you can create a custom layout using `CustomMultiChildLayout`.\
    \ Similar to `CustomSingleChildLayout`, `CustomMultiChildLayout` delegates the\
    \ layout logic to a `MultiChildLayoutDelegate` instance. All children of `CustomMultiChildLayout`\
    \ must be wrapped in a `LayoutId` widget to provide unique ids for them. Of all\
    \ the methods shown in Table [5-12](#479501_1_En_5_Chapter.xhtml#Tab12), `performLayout()`\
    \ and `shouldRelayout()` methods must be implemented. All other methods have default\
    \ implementation. In the implementation of `performLayout()` method, the `layoutChild()`\
    \ method must be called exactly once for each child.\n\nTable 5-12  \nMethods\
    \ of `MultiChildLayoutDelegate`\n\n| Name | Description |\n| --- | --- |\n| `hasChild(Object\
    \ childId)` | Check if a child with the given id exists. |\n| `layoutChild(Object\
    \ childId, BoxConstraints constraints)` | Layout the child with the provided constraints.\
    \ |\n| `positionChild(Object childId, Offset offset)` | Position the child with\
    \ the given offset. |\n| `getSize(BoxConstraints constraints)` | Get the size\
    \ of this widget. |\n| `performLayout(Size size)` | The actual layout logic. |\n\
    | `shouldRelayout()` | Should relayout. |\n\nListing [5-22](#479501_1_En_5_Chapter.xhtml#PC22)\
    \ shows a custom multiple children layout delegate. This delegate uses increasing\
    \ int values as the layout id. Layout ids of children must start from 0. In the\
    \ `performLayout()` method, `layoutChild()` method is called on each child, starting\
    \ with the first child with loose constraints, which allows the first child to\
    \ take the natural size. The actual size of the first child is recorded. Then\
    \ `positionChild()` method is called with `Offset.zero` to place the first child\
    \ at the top left corner. After the first child, `layoutChild()` and `positionChild()`\
    \ methods are called on all the other children with increasing size and position\
    \ offsets, respectively.\n\n```\nclass GrowingSizeLayoutDelegate extends MultiChildLayoutDelegate\
    \ {\n@override\nvoid performLayout(Size size) {\nint index = 0;\nSize childSize\
    \ = layoutChild(index, BoxConstraints.loose(size));\nOffset offset = Offset.zero;\n\
    positionChild(index, offset);\nindex++;\nwhile (hasChild(index)) {\ndouble sizeFactor\
    \ = 1.0 + index * 0.1;\ndouble offsetFactor = index * 10.0;\nchildSize = layoutChild(\n\
    index,\nBoxConstraints.tight(Size(\nchildSize.width * sizeFactor, childSize.height\
    \ * sizeFactor)));\noffset = offset.translate(offsetFactor, offsetFactor);\npositionChild(index,\
    \ offset);\nindex++;\n}\n}\n@override\nbool shouldRelayout(MultiChildLayoutDelegate\
    \ oldDelegate) {\nreturn false;\n}\n@override\nSize getSize(BoxConstraints constraints)\
    \ =>\nconstraints.constrain(Size(400, 400));\n}\nListing 5-22\nCustom multiple\
    \ children layout delegate\n```\n\nListing [5-23](#479501_1_En_5_Chapter.xhtml#PC23)\
    \ shows the usage of `GrowingSizeLayoutDelegate`. The children of `CustomMultiChildLayout`\
    \ are six images nested in `SizedBox`. The wrapping `LayoutId` widget is required\
    \ to pass the layout id to the delegate.\n\n```\nCustomMultiChildLayout(\ndelegate:\
    \ GrowingSizeLayoutDelegate(),\nchildren: List.generate(\n6,\n(index) => LayoutId(\n\
    id: index,\nchild: DecoratedBox(\ndecoration:\nBoxDecoration(border: Border.all(color:\
    \ Colors.red)),\nchild: SizedBox(\nwidth: 70,\nheight: 70,\nchild: Image.network(\n\
    'https://dummyimage.com/${50 + index * 10}'),\n),\n),\n),\n),\n)\nListing 5-23\n\
    Example of GrowingSizeLayoutDelegate\n```\n\nFigure [5-3](#479501_1_En_5_Chapter.xhtml#Fig3)\
    \ shows the result of using `GrowingSizeLayoutDelegate`.\n\n![../images/479501_1_En_5_Chapter/479501_1_En_5_Fig3_HTML.jpg](images/479501_1_En_5_Chapter/479501_1_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3  \nResult of using `GrowingSizeLayoutDelegate`\n\n## 5.20 Summary\n\
    \nWith the layout widgets in Flutter, it’s easy to satisfy common layout requirements\
    \ in build Flutter apps. This chapter covers many layout widgets for single child\
    \ and multiple children. In the next chapter, we’ll discuss form widgets.\n\n\
    # 6. Form Widgets\n\nForm controls are important in mobile apps to interact with\
    \ the user. Flutter provides a set of form widgets for Material Design and iOS\
    \ style. These form widgets generally have no internal state. Their appearance\
    \ and behavior are purely defined by constructor parameters. With state maintained\
    \ in ancestor widgets, form widgets are re-rendered to reflect to state changes.\
    \ This chapter covers recipes related to basic usage of form widgets.\n\n## 6.1\
    \ Collecting Text Inputs\n\n### Problem\n\nYou want to collect text inputs.\n\n\
    ### Solution\n\nUse `TextField` for Material Design and `CupertinoTextField` for\
    \ iOS style.\n\n### Discussion\n\nTo collect user inputs in Flutter apps, you\
    \ can use `TextField` widget for Material Design or `CupertinoTextField` widget\
    \ for iOS style. Both widgets have similar usage pattern and behavior. In fact,\
    \ both widgets wrap the same `EditableText` which provides the basic text input\
    \ capability with support for scrolling, selection, and cursor movement. `EditableText`\
    \ is a highly customizable widget with many named parameters. This recipe focuses\
    \ on how to set the initial value of a `TextField` or `CupertinoTextField` widget\
    \ and get the text from it.\n\nThe text of an `EditableText` widget is controlled\
    \ by a `TextEditingController` instance. You can use the `controller` parameter\
    \ to set a `TextEditingController` instance when creating a new `EditableText`\
    \ widget. The controller maintains a bidirectional data binding with the corresponding\
    \ `EditableText` widget. The controller has a `text` property to track the current\
    \ editing text and a `selection` property of type `TextSelection` to track the\
    \ currently selected text. Whenever the text in a `EditableText` widget is modified\
    \ or selected by user, the `text` and `selection` properties of the associated\
    \ `TextEditingController` instance will be updated. If you modify the `text` or\
    \ `selection` properties of the `TextEditingController` instance, the `EditableText`\
    \ widget will update itself. `TextEditingController` class is a subclass of `ValueNotifier<TextEditingValue>`,\
    \ so you can add listeners to the controller to get notifications when the text\
    \ or selection changes. When creating a new `TextEditingController` instance,\
    \ you can pass some text with the `text` parameter, which becomes the initial\
    \ text of the corresponding `EditableText` widget.\n\nLet’s see three different\
    \ ways to get the text from `EditableText` widgets.\n\n### Using TextEditingController\n\
    \nThe first way is using `TextEditingController`. The `ReverseText` widget in\
    \ Listing [6-1](#479501_1_En_6_Chapter.xhtml#PC1) is used to reverse an input\
    \ string. The `TextEditingController` instance is created with initial text `<input>`.\
    \ When the button is pressed, the `_value` is updated to the text retrieved from\
    \ the controller. The reversed string is displayed.\n\n```\nclass ReverseText\
    \ extends StatefulWidget {\n@override\n_ReverseTextState createState() => _ReverseTextState();\n\
    }\nclass _ReverseTextState extends State {\nfinal TextEditingController _controller\
    \ = TextEditingController(\ntext: \"\",\n);\nString _value;\n@override\nWidget\
    \ build(BuildContext context) {\nreturn Column(\ncrossAxisAlignment: CrossAxisAlignment.start,\n\
    children: [\nRow(\nchildren: [\nExpanded(\nchild: TextField(\ncontroller: _controller,\n\
    ),\n),\nRaisedButton(\nchild: Text('Go'),\nonPressed: () {\nthis.setState(() {\n\
    _value = _controller.text;\n});\n},\n),\n],\n),\nText( (_value ?? \"). split(\"\
    ).reversed.join()),\n],\n);\n}\n}\nListing 6-1\nUse TextEditingController to get\
    \ text\n```\n\nFigure [6-1](#479501_1_En_6_Chapter.xhtml#Fig1) shows the screenshot\
    \ of code in Listing [6-1](#479501_1_En_6_Chapter.xhtml#PC1).\n\n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig1_HTML.jpg](images/479501_1_En_6_Chapter/479501_1_En_6_Fig1_HTML.jpg)\n\
