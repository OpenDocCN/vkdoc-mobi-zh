- fmt: "### Discussion\n\n一个`DropdownButton`小部件在被点击时会显示一个项目列表。`DropdownButton`类是泛型类，其类型参数代表值的类型。项目列表通过`items`参数指定，其类型为`List<DropdownMenuItem<T>>`。`DropdownMenuItem`小部件是一个简单的封装器，包含`value`和一个`child`小部件。当选择发生变化时，`onChanged`回调会被调用，并传入所选项目的值。所选项目的值作为`value`参数传递。如果`value`为`null`，则会显示`hint`小部件。\n\
    \n在清单[6-12](#479501_1_En_6_Chapter.xhtml#PC12)中，每个`Fruit`实例都被映射到一个`DropdownMenuItem`小部件。\n\
    \n```dart\nclass FruitChooser extends StatefulWidget {\n  @override\n  _FruitChooserState\
    \ createState() => _FruitChooserState();\n}\nclass _FruitChooserState extends\
    \ State {\n  Fruit _selectedFruit;\n  @override\n  Widget build(BuildContext context)\
    \ {\n    return Column(\n      crossAxisAlignment: CrossAxisAlignment.start,\n\
    \      children: [\n        DropdownButton(\n          value: _selectedFruit,\n\
    \          items: Fruit.allFruits.map((fruit) {\n            return DropdownMenuItem(\n\
    \              value: fruit,\n              child: Text(fruit.name),\n       \
    \     );\n          }).toList(),\n          onChanged: (fruit) {\n           \
    \ setState(() {\n              _selectedFruit = fruit;\n            });\n    \
    \      },\n          hint: Text('Select a fruit'),\n        ),\n      ],\n   \
    \ );\n  }\n}\n```\n*清单 6-12 DropdownButton 示例*\n\n图[6-10](#479501_1_En_6_Chapter.xhtml#Fig10)展示了展开后的`DropdownButton`截图。\n\
    \n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig10_HTML.jpg](images/479501_1_En_6_Chapter/479501_1_En_6_Fig10_HTML.jpg)\n\
    \n*图 6-10 展开后的 DropdownButton*\n\n## 6.9 选择多个值\n\n### 问题\n\n你想要选择多个值。\n\n### 解决方案\n\
    \n使用`Checkbox`小部件。\n\n### 讨论\n\n复选框通常用于允许多项选择。如果复选框创建时将参数`tristate`设置为`true`，它可以显示三个值：`true`、`false`和`null`。否则，只允许`true`和`false`两个值。如果值为`null`，则显示一个破折号。复选框本身不维护任何状态。它的外观完全由`value`参数决定。当复选框的值改变时，`onChanged`回调会被调用，并传入新的状态值。\n\
    \n在清单[6-13](#479501_1_En_6_Chapter.xhtml#PC13)中，选中的水果被维护在一个`List<Fruit>`实例中。每个`Fruit`实例都被映射到一个`Checkbox`小部件。`Checkbox`的值取决于对应的`Fruit`实例是否在`_selectedFruits`列表中。\n\
    \n```dart\nclass FruitSelector extends StatefulWidget {\n  @override\n  _FruitSelectorState\
    \ createState() => _FruitSelectorState();\n}\nclass _FruitSelectorState extends\
    \ State {\n  List _selectedFruits = List();\n  @override\n  Widget build(BuildContext\
    \ context) {\n    return Column(\n      crossAxisAlignment: CrossAxisAlignment.start,\n\
    \      children: [\n        Column(\n          children: Fruit.allFruits.map((fruit)\
    \ {\n            return Row(\n              children: [\n                Checkbox(\n\
    \                  value: _selectedFruits.contains(fruit),\n                 \
    \ onChanged: (selected) {\n                    setState(() {\n               \
    \       if (selected) {\n                        _selectedFruits.add(fruit);\n\
    \                      } else {\n                        _selectedFruits.remove(fruit);\n\
    \                      }\n                    });\n                  },\n    \
    \            ),\n                Expanded(\n                  child: Text(fruit.name),\n\
    \                )\n              ],\n            );\n          }).toList(),\n\
    \        ),\n        Text(_selectedFruits.join(', ')),\n      ],\n    );\n  }\n\
    }\n```\n*清单 6-13 Checkbox 示例*\n\n图[6-10](#479501_1_En_6_Chapter.xhtml#Fig10)展示了清单[6-13](#479501_1_En_6_Chapter.xhtml#PC13)中示例的截图。\n\
    \n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig11_HTML.jpg](images/479501_1_En_6_Chapter/479501_1_En_6_Fig11_HTML.jpg)\n\
    \n*图 6-11 Checkbox*\n\n## 6.10 切换开/关状态\n\n### 问题\n\n你想要切换开/关状态。\n\n### 解决方案\n\n\
    Material Design 使用`Switch`，iOS 风格使用`CupertinoSwitch`。\n\n### 讨论\n\n`Switch`是一个常用的\
    \ UI 控件，用于切换设置的开启/关闭状态。`Switch`小部件用于 Material Design。一个`Switch`小部件可以处于两种状态：激活和非激活。`Switch`小部件本身不维护任何状态。它的行为和外观完全由构造函数参数的值决定。如果`value`参数为`true`，则`Switch`小部件处于激活状态；否则，它处于非激活状态。当`Switch`小部件的开/关状态改变时，`onChanged`回调会被调用，并传入新的状态。你可以使用参数`activeColor`、`activeThumbImage`、`activeTrackColor`、`inactiveThumbColor`、`inactiveThumbImage`和`inactiveTrackColor`来自定义`Switch`小部件在不同状态下的外观。\n\
    \n在清单[6-14](#479501_1_En_6_Chapter.xhtml#PC14)中，`Switch`小部件被用来控制另一个`TextField`小部件的状态。\n\
    \n```dart\nclass NameInput extends StatefulWidget {\n  @override\n  _NameInputState\
    \ createState() => _NameInputState();\n}\nclass _NameInputState extends State\
    \ {\n  bool _useCustomName = false;\n  _buildNameInput() {\n    return TextField(\n\
    \      decoration: InputDecoration(labelText: 'Name'),\n    );\n  }\n  _buildToggle()\
    \ {\n    return Row(\n      children: [\n        Switch(\n          value: _useCustomName,\n\
    \          onChanged: (value) {\n            setState(() {\n              _useCustomName\
    \ = value;\n            });\n          },\n          activeColor: Colors.green,\n\
    \          inactiveThumbColor: Colors.grey.shade200,\n        ),\n        Expanded(\n\
    \          child: Text('Use custom name'),\n        ),\n      ],\n    );\n  }\n\
    \  @override\n  Widget build(BuildContext context) {\n    return Column(\n   \
    \   crossAxisAlignment: CrossAxisAlignment.start,\n      children: _useCustomName\n\
    \          ? [_buildToggle(), _buildNameInput()]\n          : [_buildToggle()],\n\
    \    );\n  }\n}\n```\n*清单 6-14 Switch 示例*\n\n图[6-12](#479501_1_En_6_Chapter.xhtml#Fig12)展示了清单[6-14](#479501_1_En_6_Chapter.xhtml#PC14)中示例的截图。\n\
    \n![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig12_HTML.jpg](images/479501_1_En_6_Chapter/479501_1_En_6_Fig12_HTML.jpg)\n\
    \n*图 6-12 Switch*\n\n`CupertinoSwitch`小部件创建了一个 iOS 风格的开关，其工作方式与`Switch`相同，但仅支持自定义激活颜色。`Switch`小部件拥有构造函数`Switch.adaptive()`，它会根据目标平台创建一个`Switch`小部件或`CupertinoSwitch`小部件。当使用`Switch.adaptive()`创建`CupertinoSwitch`小部件时，仅使用`CupertinoSwitch()`接受的构造函数参数；其他参数将被忽略。\n\
    \n清单[6-15](#479501_1_En_6_Chapter.xhtml#PC15)展示了使用`CupertinoSwitch`和`Switch.adaptive()`的示例。\n\
    \n```dart\nCupertinoSwitch(\n  value: true,\n  onChanged: (value) => {},\n  activeColor:\
    \ Colors.red.shade300,\n)\nSwitch.adaptive(\n  value: true,\n  onChanged: (value)\
    \ => {},\n)\n```\n*清单 6-15 CupertinoSwitch 示例*\n\n## 6.11 从范围中选择值\n\n### 问题\n\n\
    你想从一个连续或离散的值范围中进行选择。\n\n### 解决方案\n\nMaterial Design 使用`Slider`，iOS 风格使用`CupertinoSlider`。"
  raw: '### Discussion


    A DropdownButton widget shows a list of items when tapped. DropdownButton class
    is generic with the type parameter representing the type of values. The list of
    items is specified using the items parameter of type List< DropdownMenuItem<T>>.
    DropdownMenuItem widget is a simple wrapper with the value and a child widget.
    When the selection is changed, the onChanged callback will be invoked with the
    value of selected item. Value of the selected item is passed as value parameter.
    If value is null, the hint widget is displayed instead.


    In Listing [6-12](#479501_1_En_6_Chapter.xhtml#PC12), each Fruit instance is mapped
    to a DropdownMenuItem widget.


    ```

    class FruitChooser extends StatefulWidget {

    @override

    _FruitChooserState createState() => _FruitChooserState();

    }

    class _FruitChooserState extends State {

    Fruit _selectedFruit;

    @override

    Widget build(BuildContext context) {

    return Column(

    crossAxisAlignment: CrossAxisAlignment.start,

    children: [

    DropdownButton(

    value: _selectedFruit,

    items: Fruit.allFruits.map((fruit) {

    return DropdownMenuItem(

    value: fruit,

    child: Text(fruit.name),

    );

    }).toList(),

    onChanged: (fruit) {

    setState(() {

    _selectedFruit = fruit;

    });

    },

    hint: Text(''Select a fruit''),

    ),

    ],

    );

    }

    }

    Listing 6-12

    Example of DropdownButton

    ```


    Figure [6-10](#479501_1_En_6_Chapter.xhtml#Fig10) shows the screenshot of an expanded
    DropdownButton .


    ![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig10_HTML.jpg](images/479501_1_En_6_Chapter/479501_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    Expanded DropdownButton


    ## 6.9 Selecting Multiple Values


    ### Problem


    You want to select multiple values .


    ### Solution


    Use Checkbox widget.


    ### Discussion


    Checkboxes are commonly used to allow multiple selections. A checkbox can display
    three values, true, false, and null, if this checkbox is created with parameter
    tristate set to true. Otherwise, only values true and false are allowed. If the
    value is null, a dash is displayed. A checkbox itself doesn’t maintain any state.
    Its appearance is purely determined by the value parameter. When the value of
    a checkbox is changed, the onChanged callback is invoked with the value of the
    new state .


    In Listing [6-13](#479501_1_En_6_Chapter.xhtml#PC13), selected fruits are maintained
    in a List<Fruit> instance. Each Fruit instance is mapped to a Checkbox widget.
    The value of a Checkbox depends on whether corresponding Fruit instance is in
    the _selectedFruits list.


    ```

    class FruitSelector extends StatefulWidget {

    @override

    _FruitSelectorState createState() => _FruitSelectorState();

    }

    class _FruitSelectorState extends State {

    List _selectedFruits = List();

    @override

    Widget build(BuildContext context) {

    return Column(

    crossAxisAlignment: CrossAxisAlignment.start,

    children: [

    Column(

    children: Fruit.allFruits.map((fruit) {

    return Row(

    children: [

    Checkbox(

    value: _selectedFruits.contains(fruit),

    onChanged: (selected) {

    setState(() {

    if (selected) {

    _selectedFruits.add(fruit);

    } else {

    _selectedFruits.remove(fruit);

    }

    });

    },

    ),

    Expanded(

    child: Text(fruit.name),

    )

    ],

    );

    }).toList(),

    ),

    Text(_selectedFruits.join('', '')),

    ],

    );

    }

    }

    Listing 6-13

    Example of Checkbox

    ```


    Figure [6-10](#479501_1_En_6_Chapter.xhtml#Fig10) shows the screenshot of the
    example in Listing [6-13](#479501_1_En_6_Chapter.xhtml#PC13).


    ![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig11_HTML.jpg](images/479501_1_En_6_Chapter/479501_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    Checkbox


    ## 6.10 Toggling On/Off State


    ### Problem


    You want to toggle the on/off state.


    ### Solution


    Use Switch for Material Design and CupertinoSwitch for iOS style.


    ### Discussion


    Switch is a commonly used UI control to toggle the on/off state of a setting.
    Switch widget is used for Material Design. A Switch widget can be in two states,
    active and inactive. A Switch widget itself doesn’t maintain any state. Its behavior
    and appearance are purely determined by values of constructor parameters. If the
    value parameter is true, then Switch widget is in active state; otherwise, it’s
    in inactive state. When the on/off state of a Switch widget is changed, the onChanged
    callback is invoked with the new state to be. You can customize the appearance
    of a Switch widget in different states using parameters activeColor, activeThumbImage,
    activeTrackColor, inactiveThumbColor, inactiveThumbImage, and inactiveTrackColor.


    In Listing [6-14](#479501_1_En_6_Chapter.xhtml#PC14), the Switch widget is used
    to control the state of another TextField widget.


    ```

    class NameInput extends StatefulWidget {

    @override

    _NameInputState createState() => _NameInputState();

    }

    class _NameInputState extends State {

    bool _useCustomName = false;

    _buildNameInput() {

    return TextField(

    decoration: InputDecoration(labelText: ''Name''),

    );

    }

    _buildToggle() {

    return Row(

    children: [

    Switch(

    value: _useCustomName,

    onChanged: (value) {

    setState(() {

    _useCustomName = value;

    });

    },

    activeColor: Colors.green,

    inactiveThumbColor: Colors.grey.shade200,

    ),

    Expanded(

    child: Text(''Use custom name''),

    ),

    ],

    );

    }

    @override

    Widget build(BuildContext context) {

    return Column(

    crossAxisAlignment: CrossAxisAlignment.start,

    children: _useCustomName

    ? [_buildToggle(), _buildNameInput()]

    : [_buildToggle()],

    );

    }

    }

    Listing 6-14

    Example of Switch

    ```


    Figure [6-12](#479501_1_En_6_Chapter.xhtml#Fig12) shows the screenshot of example
    in Listing [6-14](#479501_1_En_6_Chapter.xhtml#PC14).


    ![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig12_HTML.jpg](images/479501_1_En_6_Chapter/479501_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    Switch


    CupertinoSwitch widget creates an iOS-style switch and it works the same way as
    Switch, but it only supports customization of the active color. Switch widget
    has the constructor Switch.adaptive() to create either a Switch widget or CupertinoSwitch
    widget depends on the target platform. When a CupertinoSwitch widget is created
    using Switch.adaptive(), only constructor parameters accepted by CupertinoSwitch()
    are used; other parameters are ignored.


    Listing [6-15](#479501_1_En_6_Chapter.xhtml#PC15) shows examples of using CupertinoSwitch
    and Switch.adaptive().


    ```

    CupertinoSwitch(

    value: true,

    onChanged: (value) => {},

    activeColor: Colors.red.shade300,

    )

    Switch.adaptive(

    value: true,

    onChanged: (value) => {},

    )

    Listing 6-15

    Example of CupertinoSwitch

    ```


    ## 6.11 Selecting from a Range of Values


    ### Problem


    You want to select from a range of continuous or a discrete set of values.


    ### Solution


    Use Slider for Material Design or CupertinoSlider for iOS style.'
