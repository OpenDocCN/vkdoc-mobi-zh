    ### 讨论


    在 Recipes 10-1、10-2、10-3 和 10-4 中，你已经看到使用`StatefulWidget`、`InheritedWidget`、`InheritedModel`和`InheritedNotifier`这些组件来管理状态。这些组件由
    Flutter 框架提供。由于这些组件是底层 API，因此在复杂应用中用起来并不方便。`scoped_model`包（[`https://pub.dev/packages/scoped_model`](https://pub.dev/packages/scoped_model)）是一个库，可以让你轻松地将数据模型从父组件向下传递给它的后代组件。它建立在`InheritedWidget`之上，但提供了易于使用的
    API。要使用这个包，你需要在`pubspec.yaml`文件的`dependencies`中添加`scoped_model: ¹.0.1`。我们将使用与
    Recipe 10-2 相同的示例来演示`scoped_model`包的用法。


    清单 10-13 展示了使用`scoped_model`包的`Config`模型。`Config`类继承自`Model`类。它有私有字段来存储状态。`setColor()`和`increaseFontSize()`方法分别更新`_color`和`_fontSize`字段。这两个方法在内部使用`notifyListeners()`来通知后代组件进行重建。


    ```

    import ''package:scoped_model/scoped_model.dart'';

    class Config extends Model {

    Color _color = Colors.red;

    double _fontSize = 16.0;

    Color get color => _color;

    double get fontSize => _fontSize;

    void setColor(Color color) {

    _color = color;

    notifyListeners();

    }

