- fmt: '# 1. Get Started


    Recipes in this chapter help you set up your local development environment to
    get ready for building Flutter apps. Depending on the operating system of your
    machine, the steps to set up may be different. You only need to use the recipes
    for your own requirement. After using recipes in this chapter, you should be able
    to get the first Flutter app running on emulators or physical devices.


    ## 1.1 Installing Flutter SDK on Windows


    ### Problem


    You have a Windows machine, and you want to start Flutter development on this
    machine.


    ### Solution


    Install Flutter SDK and set up Android platform on the Windows machine.


    ### Discussion


    Flutter SDK supports Windows platform. Installing Flutter on Windows is not a
    hard task as you may think. First of all, you need to make sure that your local
    development environment meets the minimum requirements. You’ll need to have 64-bit
    Windows 7 SP1 or later and at least 400MB free disk space for Flutter SDK to use.
    Flutter SDK also requires Windows PowerShell 5.0 or newer and Git for Windows
    to be available on the machine.


    Windows PowerShell 5.0 is pre-installed with Windows 10. For Windows versions
    older than Windows 10, you need to install PowerShell 5.0 manually by following
    instructions from Microsoft (https://docs.microsoft.com/en-us/powershell/scripting/setup/installing-windows-powershell).
    You may already have Git for Windows installed since Git is a very popular tool
    for development. If you can run Git commands in PowerShell, then you are good
    to go. Otherwise, you need to download Git for Windows (https://git-scm.com/download/win)
    and install it. When installing Git for Windows, make sure the option "Git from
    the command line and also from 3rd-party software" is selected in the page "Adjusting
    your PATH environment"; see Figure 1-1.


    After these minimum requirements have been satisfied, you can download the Flutter
    SDK zip bundles from the official web site (https://flutter.dev/docs/get-started/install/windows).
    Extract the downloaded zip file to the desired location on the local machine.
    It''s recommended to avoid using the system driver where Windows is installed.
    In the extracted directory, double-click the file `flutter_console.bat` to start
    Flutter Console and run Flutter SDK commands.


    To be able to run Flutter SDK commands in any Windows console, we need to add
    Flutter SDK to the `PATH` environment variable. The full path to `bin` of the
    installation directory should be added to the `PATH`. To modify the PATH on Windows
    10:


    1. Open the Start Search and type "env" and select "Edit the system environment
    variables".

    2. Click the "Environment Variables..." button and find the row with "Path" in
    the first column under the "System Variables" section.

    3. In the "Edit environment variable" dialog, click "New" and input the path of
    the `bin` directory of installed Flutter SDK.

    4. Close all dialogs by clicking "OK".


    Now you can open a new PowerShell window and type the command `flutter --version`
    to verify the installation; see Figure 1-2.


    Only Android platform is supported on Windows. Continue the setup following Recipe
    1-7.


    ## 1.2 Installing Flutter SDK on Linux


    ### Problem


    You have a Linux machine, and you want to start Flutter development on this machine.


    ### Solution


    Install Flutter SDK and set up Android platform on the Linux machine.'
