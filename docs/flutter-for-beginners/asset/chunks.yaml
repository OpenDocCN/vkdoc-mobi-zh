  trans: '

    ### ListTile


    你可以使用任何 widget 作为 `ListView` 的子项。如果你希望列表项包含文本、图标和其他控件，可以使用 `ListTile` 及其子类。一个列表磁贴可以包含一到三行文本，以及位于文本前后的
    leading 和 trailing widget。表 7-1 展示了


    **表 7-2** `CheckboxListTile` 的参数


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `secondary` | `Widget` | 显示在磁贴另一侧的 widget。 |

    | `controlAffinity` | `ListTileControlAffinity` | 控件在磁贴中的放置位置。 |


    **表 7-1** `ListTile` 的参数


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `title` | `Widget` | 列表磁贴的标题。 |

    | `subtitle` | `Widget` | 显示在标题下方的可选内容。 |

    | `isThreeLine` | `bool` | 列表磁贴是否可以有*三行*文本。 |

    | `leading` | `Widget` | 显示在标题之前的 widget。 |

    | `trailing` | `Widget` | 显示在标题之后的 widget。 |

    | `enabled` | `bool` | 列表磁贴是否启用。 |

    | `selected` | `bool` | 列表磁贴是否被选中。选中时，图标和文本将以相同颜色渲染。 |

    | `onTap` | `GestureTapCallback` | 点击标题时的回调。 |

    | `onLongPress` | `GestureLongPressCallback` | 长按标题时的回调。 |

    | `dense` | `bool` | 当为 true 时，磁贴的尺寸会减小。 |

    | `contentPadding` | `EdgeInsetsGeometry` | 磁贴内部的填充。 |


    清单 7-3 展示了使用 `ListTile` 的示例。


    ```

    ListTile(

    title: Text(''标题''),

    subtitle: Text(''描述''),

    leading: Icon(Icons.shop),

    trailing: Icon(Icons.arrow_right),

    )

    清单 7-3

    ListTile 示例

    ```


    如果你希望在列表磁贴中添加复选框，可以使用 `CheckboxListTile` widget，它结合了 `ListTile` 和 `Checkbox`。`CheckboxListTile`
    构造函数的参数 `title`、`subtitle`、`isThreeLine`、`selected` 和 `dense` 与 `ListTile` 构造函数相同。它还包含
    `value`、`onChanged` 和 `activeColor` 参数，这些参数用于 `Checkbox` 构造函数。


    `ListTileControlAffinity` 枚举定义了控件在列表磁贴中的位置。它有三个值：`leading`、`trailing` 和 `platform`。当指定了控件的位置后，`secondary`
    widget 总是被放置在另一侧。


