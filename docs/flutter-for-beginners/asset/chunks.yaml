    ## 3.9 扩展类


    ### 问题


    你希望从一个已有的类中继承行为。


    ### 解决方案


    通过扩展已有类来创建一个子类。


    ### 讨论


    Dart 是一种面向对象的编程语言，它提供了对继承的支持。一个类可以使用关键字 `extends` 从一个超类继承。在子类中，超类可以被引用为 `super`。子类可以重写超类的实例方法、getter
    和 setter。重写的成员应使用 `@override` 注解进行标记。


    抽象类使用 `abstract` 修饰符定义。抽象类不能被实例化。抽象类中的抽象方法没有实现，必须由非抽象子类实现。


    在代码清单 3-18 中，`Shape` 类是一个抽象类，包含一个抽象方法 `area()`。`Rectangle` 和 `Circle` 类都继承自 `Shape`
    并实现了抽象方法 `area()`。


    ```

    import ''dart:math'' show pi;

    abstract class Shape {

    double area();

    }

    class Rectangle extends Shape {

    double width, height;

    Rectangle(this.width, this.height);

    @override

    double area() {

    return width * height;

    }

    }

    class Square extends Rectangle {

    Square(double width) : super(width, width);

    }

    class Circle extends Shape {

    double radius;

    Circle(this.radius);

    @override

    double area() {

    return pi * radius * radius;

    }

    }

