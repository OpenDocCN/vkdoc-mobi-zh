    ## 4.9 显示图标


    ### 问题


    你想使用图标。


    ### 解决方案


    使用 `Icon` 来显示 Material Design 的图标或社区的图标包。


    ### 讨论


    图标在移动应用中广泛使用。与文字相比，图标用更少的屏幕空间表达相同的语义。图标可以通过字体字形或图片创建。`Icon` widget 使用字体字形绘制。字体字形通过
    `IconData` 类描述。要创建一个 `IconData` 实例，需要该图标在字体中的 Unicode 码点。


    `Icons` 类包含许多预定义的 `IconData` 常量，对应 Material Design 中的图标（[`material.io/tools/icons/`](https://material.io/tools/icons/)）。例如，`Icons.call`
    是名为“call”的图标的 `IconData` 常量。如果应用使用 Material Design，这些图标可以直接使用。`CupertinoIcons`
    类包含许多预定义的 `IconData` 常量，对应 iOS 风格的图标。


    `Icon()` 构造函数有命名参数 `size` 和 `color`，分别用于指定图标的尺寸和颜色。图标始终是正方形，其宽度和高度都等于 `size`。`size`
    的默认值是 24。示例 4-14 创建了一个大小为 100 的红色 `Icons.call` 图标。


    ```

    Icon(

    Icons.call,

    size: 100,

    color: Colors.red,

    );

    示例 4-14

    Icon() 示例

    ```


    要使用流行的 Font Awesome 图标，可以使用 `font_awesome_flutter` 包（[`pub.dartlang.org/packages/font_awesome_flutter`](https://pub.dartlang.org/packages/font_awesome_flutter)）。将包依赖添加到
    `pubspec.yaml` 文件后，可以导入该文件以使用 `FontAwesomeIcons` 类。与 `Icons` 类类似，`FontAwesomeIcons`
    类包含许多 `IconData` 常量，对应 Font Awesome 中的不同图标。示例 4-15 创建了一个大小为 80 的蓝色 `FontAwesomeIcons.angry`
    图标。


    ```

    Icon(

    FontAwesomeIcons.angry,

    size: 80,

    color: Colors.blue,

    );

    示例 4-15

    使用 Font Awesome 图标

    ```


    ## 4.10 使用带文字的按钮


    ### 问题


    你想使用带文字的按钮。


    ### 解决方案


    使用按钮 widget `FlatButton`、`RaisedButton`、`OutlineButton` 和 `CupertinoButton`。


    ### 讨论


    Flutter 为 Material Design 和 iOS 提供了不同类型的按钮。这些按钮 widget 都有一个必需的参数 `onPressed`，用于指定按下时的处理函数。如果
    `onPressed` 处理函数为 `null`，则按钮被禁用。按钮的内容通过类型为 `Widget` 的参数 `child` 指定。`FlatButton`、`RaisedButton`
    和 `OutlineButton` 在触摸响应方面有不同的样式和行为：


    - `FlatButton` 具有零仰角且没有可见边框。它通过填充由 `highlightColor` 指定的颜色来响应触摸。

    - `RaisedButton` 具有仰角并填充颜色。它通过将仰角增加到 `highlightElevation` 来响应触摸。

    - `OutlineButton` 有边框，初始仰角为 0.0，背景透明。它通过用颜色使背景不透明并将仰角增加到 `highlightElevation`
    来响应触摸。


    `FlatButton` 应使用在工具栏、对话框、卡片或与其他内容内联的地方，这些地方有足够的空间使按钮的存在显而易见。`RaisedButton` 应使用在空间不足以让按钮脱颖而出的地方。`OutlineButton`
    是 `RaisedButton` 和 `FlatButton` 的混合体。当 `FlatButton` 或 `RaisedButton` 都不适用时，可以使用
    `OutlineButton`。


    如果你更喜欢 iOS 风格的按钮，可以使用 `CupertinoButton` widget。`CupertinoButton` 通过淡出和淡入来响应触摸。示例
    4-16 展示了创建不同类型按钮的示例。


    ```

    FlatButton(

    child: Text(''Flat''),

    color: Colors.white,

    textColor: Colors.grey,

    highlightColor: Colors.red,

    onPressed: () => {},

    );

    RaisedButton(

    child: Text(''Raised''),

    color: Colors.blue,

    onPressed: () => {},

    );

    OutlineButton(

    child: Text(''Outline''),

    onPressed: () => {},

    );

    CupertinoButton(

    child: Text(''Cupertino''),

    color: Colors.green,

    onPressed: () => {},

    );

    示例 4-16

    不同类型的按钮

    ```


    ## 4.11 使用带图标的按钮


    ### 问题


    你想使用带图标的按钮。


    ### 解决方案


    使用 `IconButton` widget、`FlatButton.icon()`、`RaisedButton.icon()` 和 `OutlineButton.icon()`。


    ### 讨论


    创建带图标的按钮有两种方式。如果只有图标就足够，使用 `IconButton` widget。如果需要同时包含图标和文字，使用构造函数 `FlatButton.icon()`、`RaisedButton.icon()`
    或 `OutlineButton.icon()`。


    `IconButton` 构造函数需要 `icon` 参数来指定图标。`FlatButton.icon()`、`RaisedButton.icon()` 和
    `OutlineButton.icon()` 使用参数 `icon` 和 `label` 分别指定图标和文字。示例 4-17 展示了使用 `IconButton()`
    和 `RaisedButton.icon()` 的示例。


    ```

    IconButton(

    icon: Icon(Icons.map),

    iconSize: 50,

    tooltip: ''Map'',

    onPressed: () => {},

    );

    RaisedButton.icon(

    icon: Icon(Icons.save),

    label: Text(''Save''),

    onPressed: () => [],

    );

    示例 4-17

    IconButton() 和 RaisedButton.icon() 示例

    ```


    ## 4.12 添加占位符


    ### 问题


    你想添加占位符，以代表稍后添加的 widget。


    ### 解决方案


    使用 `Placeholder`。

    '
- fmt: '### Discussion


    Before implementing the interface of an app, you usually have a basic idea about
    how the app looks like. You can start by breaking down the interface into many
    widgets. You can use placeholders to represent unfinished widgets during development,
    so you can test the layout of other widgets. For example, if you need to create
    two widgets, one displays at the top, while the other one displays at the bottom.
    If you choose to create the bottom widget first and use a placeholder for the
    top widget, you can see the bottom widget in its desired position.


    The `Placeholder()` constructor takes named parameters `color`, `strokeWidth`,
    `fallbackWidth`, and `fallbackHeight`. The placeholder is drawn as a rectangle
    and two diagonals. The parameters `color` and `strokeWidth` specify color and
    width of the lines, respectively. By default, the placeholder fits its container.
    However, if the placeholder’s container is unbounded, it uses the given `fallbackWidth`
    and `fallbackHeight` to determine the size. Both `fallbackWidth` and `fallbackHeight`
    have the default value `400.0`. Listing [4-18] shows an example of `Placeholder`
    widget.


    ```

    Placeholder(

    color: Colors.red,

    strokeWidth: 1,

    fallbackHeight: 200,

    fallbackWidth: 200,

    );

    Listing 4-18

    Example of Placeholder

    ```


    ## 4.13 Summary


    Widgets are everywhere in Flutter apps. This chapter provides basic introduction
    of widgets in Flutter, including `StatelessWidget`, `StatefulWidget`, and `InheritedWidget`.
    This chapter also covers usage of common basic widgets to display text, images,
    icons, buttons, and placeholders. The next chapter will discuss layout in Flutter.


    # 5. Layout Widgets


    Layout is always a challenging task when building user interface. When it comes
    to mobile apps, layout is much more complicated considering the large number of
    different screen resolutions for devices. This chapter covers recipes related
    to layout in Flutter.


    ## 5.1 Understanding Layout in Flutter


    ### Problem


    You want to know how layout works in Flutter.


    ### Solution


    Layout in Flutter is implemented by a set of widgets. These layout widgets wrap
    other widgets to apply different layout constraints.


    ### Discussion


    For mobile apps, the layout must be responsive to work with different screen resolutions
    without writing a lot of hard-to-maintain code. Luckily, with the evolution of
    layout techniques, it’s now easier to build responsive layout. If you have experiences
    with web development with CSS, you may have heard CSS Flexible Box Layout Module
    specification by W3C (`https://www.w3.org/TR/css-flexbox-1/`). The flex layout
    model is powerful because it allows developers to express what the layout should
    be, instead of how to implement the actual layout. This declarative approach shifts
    the heavy lifting work to the underlying framework. The result layout code is
    easier to understand and maintain.


    For example, if you want to place a box in the center of a container, the old
    approach may require calculating the size of the box and container to determine
    the position of the box. When using flex layout, the layout can be simplified
    as CSS code in Listing [5-1]:


    ```

    .container {

    display: flex;

    width: 400px;

    height: 400px;

    justify-content: center;

    align-items: center;

    border: 1px solid green;

    }

    .item {

    width: 200px;

    height: 200px;

    border: 1px solid red;

    }

    Listing 5-1

    CSS code to center an item

    ```


    The idea of flex layout has now been used not only in web design but also in mobile
    apps. React Native uses flex layout (`https://facebook.github.io/react-native/docs/flexbox`).
    Flutter also uses the idea of flex layout. As discussed in Recipe 4-1, layout
    is implemented as widgets. You can see widget classes like `Flex`, `Row`, `Column`,
    and `Flexible` in Flutter, which have names derived from flex layout concepts.
    The flex layout model in CSS is out of the scope of this book. However, it’s still
    valuable to understand this W3C specification, which can help you better understand
    flex layout in Flutter.


    ### RenderObject


    The layout algorithm in Flutter is responsible for determining the dimension and
    position for each `RenderObject` instance in the render tree. `RenderObject` class
    is very flexible to work with any coordinate system or layout protocol. `RenderObject`
    class defines the basic layout protocol with the `layout()` method. The `layout()`
    method has one required positional parameter of type `Constraints`. `Constraints`
    class specifies the layout constraints that children must obey. For a particular
    `Constraints` instance, there may be multiple results that can satisfy it. The
    child is free to use any of these results as long as it’s permissible. Sometimes,
    a `Constraints` instance may only leave one valid result to the child. This kind
    of `Constraints` instances are said to be tight. Tight constraints are generally
    less flexible, but they offer better performance as widgets with tight constraints
    don’t need to relayout.


    The `layout()` method has a named parameter `parentUsesSize` to specify whether
    the parent needs to use the layout information computed by the child. If `parentUsesSize`
    is true, it means the layout of the parent depends on the layout of the child.
    In this case, whenever the child needs to lay out, the parent may also need to
    lay out. After the layout is done, each `RenderObject` instance will have some
    fields set to include the layout information. The actual stored information depends
    on the layout implementation. This piece of layout information is stored in the
    `parentData` property.


    By default, Flutter uses a 2D Cartesian coordinate system implemented with the
    `RenderBox` class. `RenderBox` class implements the box layout model with `BoxConstraints`
    class. In the box layout model, each `RenderBox` instance is treated as a rectangle
    with the size specified as a `Size` instance. Each box has its own coordinate
    system. The coordinate of the upper left corner is (0,0), while the lower right
    corner has the coordinate (width, height). `RenderBox` class uses `BoxParentData`
    as the type of layout data. The `BoxParentData.offset` property specifies the
    offset to paint the child in the parent’s coordinate system.


    ### BoxConstraints


    A `BoxConstraints` instance is specified by four named double parameters: `minWidth`,
    `maxWidth`, `minHeight`, and `maxHeight`. The values of these must satisfy the
    following rules. `double.infinity` is a valid value for constraints:


    - `0.0 <= minWidth <= maxWidth <= double.infinity`

    - `0.0 <= minHeight <= maxHeight <= double.infinity`


    After the box layout, the size of a `RenderBox` instance must satisfy constraints
    of the `BoxConstraints` instance applied to it:


    - `minWidth <= Size.width <= maxWidth`

    - `minHeight <= Size.height <= maxHeight`


    If the minimum constraint and the maximum constraint are the same in an axis,
    then this axis is tightly constrained. For example, if the values of `minWidth`
    and `maxWidth` are the same, then width is tight. A `BoxConstraints` instance
    is said to be tight when both width and height are tight. If the minimum constraint
    is `0.0` in an axis, then this axis is loose. If the maximum constraint is not
    infinite in an axis, then this axis is bounded; otherwise, this axis is unbounded.


    ### Layout Algorithm


    In the box layout model, layout is done in one pass with the render tree. It first
    walks down the render tree by passing constraints. In this phase, render objects
    are laid out using constraints passed by their parents. In the second phase, it
    walks up the render tree by passing concrete results that determine the size and
    offset of each render object.'
