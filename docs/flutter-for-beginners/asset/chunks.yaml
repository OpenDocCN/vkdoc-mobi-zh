- fmt: '### Discussion


    If we take a closer look at the `ConfiguredText` and `ConfiguredBox` widgets in
    Listing [10-5](#479501_1_En_10_Chapter.xhtml#PC5) of Recipe 10-2, we can see that
    `ConfiguredBox` widget only depends on the `color` property of the `Config` object.
    If the `fontSize` property changes, there is no need for `ConfiguredBox` widget
    to rebuild. These unnecessary rebuilds may cause performance issues, especially
    if the widget is complex.


    `InheritedModel` widget allows you to divide a state into multiple aspects. A
    build context can register to get notified only for a particular aspect. When
    state changes in `InheritedModel` widget, only dependent build contexts registered
    to matching aspects will be notified.


    `InheritedModel` class extends from `InheritedWidget` class. It has a type parameter
    to specify the type of aspect. `ConfigModel` class in Listing [10-9](#479501_1_En_10_Chapter.xhtml#PC9)
    is the `InheritedModel` subclass for `Config` object. The type of aspect is `String`.
    When implementing `InheritedModel` class, you still need to override `updateShouldNotify()`
    method to determine whether dependents should be notified. The `updateShouldNotifyDependent()`
    method determines whether a dependent should be notified based on the set of aspects
    it depends on. The `updateShouldNotifyDependent()` method is only called when
    `updateShouldNotify()` method returns `true`. For the `ConfigModel`, only “color”
    and “fontSize” aspects are defined. If the dependent depends on the “color” aspect,
    then it’s notified only when the `color` property of `Config` object changes.
    This is also applied to “fontSize” aspect for `fontSize` property.


    The static `of()` method has an extra `aspect` parameter to specify the aspect
    the build context depends on. The static `InheritedModel.inheritFrom()` method
    is used to make the build context depend on specified aspect. When aspect is `null`,
    this method is the same as using `BuildContext.inheritFromWidgetOfExactType()`
    method .


    ```

    class ConfigModel extends InheritedModel {

    const ConfigModel({

    Key key,

    @required this.config,

    @required Widget child,

    }) : super(key: key, child: child);

    final Config config;

    static Config of(BuildContext context, String aspect) {

    ConfigModel configModel =

    InheritedModel.inheritFrom(context, aspect: aspect);

    return configModel?.config ?? Config.fallback();

    }

    @override

    bool updateShouldNotify(ConfigModel oldWidget) {

    return config != oldWidget.config;

    }

    @override

    bool updateShouldNotifyDependent(

    ConfigModel oldWidget, Set dependencies) {

    return (config.color != oldWidget.config.color &&

    dependencies.contains(''color'')) ||

    (config.fontSize != oldWidget.config.fontSize &&

    dependencies.contains(''fontSize''));

    }

    }

    Listing 10-9

    ConfigModel as InheritedModel

    ```


    In Listing [10-10](#479501_1_En_10_Chapter.xhtml#PC10), `ConfiguredModelText`
    widget uses `null` as the aspect, because it depends on both “color” and “fontSize”
    aspects. `ConfiguredModelBox` widget uses `color` as the aspect. If font size
    is updated, only `ConfiguredModelText` widget is rebuilt.


    ```

    class ConfiguredModelText extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    Config config = ConfigModel.of(context, null);

    return Text(

    ''Font size: ${config.fontSize}'',

    style: TextStyle(

    color: config.color,

    fontSize: config.fontSize,

    ),

    );

    }

    }

    class ConfiguredModelBox extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    Config config = ConfigModel.of(context, ''color'');

    return Container(

    decoration: BoxDecoration(color: config.color),

    child: Text(''Background color: ${config.color}''),

    );

    }

    }

    Listing 10-10

    Use ConfigModel to get Config object

    ```


    ## 10.4 Managing State Using Inherited Notifier


    ### Problem


    You want dependent widgets to rebuild based on notifications from `Listenable`
    objects .


    ### Solution


    Create your own subclasses of `InheritedNotifier` widget.


    ### Discussion


    `Listenable` class is typically used to manage listeners and notify clients for
    updates. You can use the same pattern to notify dependents to rebuild with `InheritedNotifier`.
    `InheritedNotifier` widget also extends from `InheritedWidget` class. When creating
    `InheritedNotifier` widgets, you need to provide `Listenable` objects. When the
    `Listenable` object sends notifications, dependents of this `InheritedNotifier`
    widget are notified for rebuilding.


    In Listing [10-11](#479501_1_En_10_Chapter.xhtml#PC11), `ConfigNotifier` uses
    `ValueNotifier<Config>` as the type of `Listenable`. The static `of()` method
    gets the `Config` object from `ConfigNotifier` object.


    ```

    class ConfigNotifier extends InheritedNotifier> {

    ConfigNotifier({

    Key key,

    @required notifier,

    @required Widget child,

    }) : super(key: key, notifier: notifier, child: child);

    static Config of(BuildContext context) {

    final ConfigNotifier configNotifier =

    context.inheritFromWidgetOfExactType(ConfigNotifier);

    return configNotifier?.notifier?.value ?? Config.fallback();

    }

    }

    Listing 10-11

    ConfigNotifier as InheritedNotifier

    ```


    To use `ConfigNotifier` widget, you need to create a new instance of `ValueNotifier<Config>`.
    To update the `Config` object, you can simply set the `value` property to a new
    value. `ValueNotifier` object will send notifications, which notify dependent
    widgets to rebuild.


    ```

    class ConfiguredNotifierPage extends StatelessWidget {

    ConfiguredNotifierPage({Key key, this.child}) : super(key: key);

    final Widget child;

    final ValueNotifier _notifier =

    ValueNotifier(Config(color: Colors.green, fontSize: 16));

    @override

    Widget build(BuildContext context) {

    return ConfigNotifier(

    notifier: _notifier,

    child: Column(

    children: [

    ConfigUpdater(

    onColorChanged: (Color color) {

    _notifier.value = _notifier.value.copyWith(color: color);

    },

    onFontSizeIncreased: () {

    Config oldConfig = _notifier.value;

    _notifier.value =

    oldConfig.copyWith(fontSize: oldConfig.fontSize + 1.0);

    },

    ),

    Container(

    decoration: BoxDecoration(border: Border.all()),

    padding: EdgeInsets.all(8),

    child: child,

    ),

    ],

    ),

    );

    }

    }

    Listing 10-12

    ConfiguredNotifierPage to use ConfigNotifier

    ```


    ## 10.5 Managing State Using Scoped Model


    ### Problem


    You want to have a simple solution to handle model changes.


    ### Solution


    Use `scoped_model` package.'
  raw: '### Discussion


    If we take a closer look at the `ConfiguredText` and `ConfiguredBox` widgets in
    Listing [10-5](#479501_1_En_10_Chapter.xhtml#PC5) of Recipe 10-2, we can see that
    `ConfiguredBox` widget only depends on the `color` property of the `Config` object.
    If the `fontSize` property changes, there is no need for `ConfiguredBox` widget
    to rebuild. These unnecessary rebuilds may cause performance issues, especially
    if the widget is complex.


    `InheritedModel` widget allows you to divide a state into multiple aspects. A
    build context can register to get notified only for a particular aspect. When
    state changes in `InheritedModel` widget, only dependent build contexts registered
    to matching aspects will be notified.


    `InheritedModel` class extends from `InheritedWidget` class. It has a type parameter
    to specify the type of aspect. `ConfigModel` class in Listing [10-9](#479501_1_En_10_Chapter.xhtml#PC9)
    is the `InheritedModel` subclass for `Config` object. The type of aspect is `String`.
    When implementing `InheritedModel` class, you still need to override `updateShouldNotify()`
    method to determine whether dependents should be notified. The `updateShouldNotifyDependent()`
    method determines whether a dependent should be notified based on the set of aspects
    it depends on. The `updateShouldNotifyDependent()` method is only called when
    `updateShouldNotify()` method returns `true`. For the `ConfigModel`, only “color”
    and “fontSize” aspects are defined. If the dependent depends on the “color” aspect,
    then it’s notified only when the `color` property of `Config` object changes.
    This is also applied to “fontSize” aspect for `fontSize` property.


    The static `of()` method has an extra `aspect` parameter to specify the aspect
    the build context depends on. The static `InheritedModel.inheritFrom()` method
    is used to make the build context depend on specified aspect. When aspect is `null`,
    this method is the same as using `BuildContext.inheritFromWidgetOfExactType()`
    method .


    ```

    class ConfigModel extends InheritedModel {

    const ConfigModel({

    Key key,

    @required this.config,

    @required Widget child,

    }) : super(key: key, child: child);

    final Config config;

    static Config of(BuildContext context, String aspect) {

    ConfigModel configModel =

    InheritedModel.inheritFrom(context, aspect: aspect);

    return configModel?.config ?? Config.fallback();

    }

    @override

    bool updateShouldNotify(ConfigModel oldWidget) {

    return config != oldWidget.config;

    }

    @override

    bool updateShouldNotifyDependent(

    ConfigModel oldWidget, Set dependencies) {

    return (config.color != oldWidget.config.color &&

    dependencies.contains(''color'')) ||

    (config.fontSize != oldWidget.config.fontSize &&

    dependencies.contains(''fontSize''));

    }

    }

    Listing 10-9

    ConfigModel as InheritedModel

    ```


    In Listing [10-10](#479501_1_En_10_Chapter.xhtml#PC10), `ConfiguredModelText`
    widget uses `null` as the aspect, because it depends on both “color” and “fontSize”
    aspects. `ConfiguredModelBox` widget uses `color` as the aspect. If font size
    is updated, only `ConfiguredModelText` widget is rebuilt.


    ```

    class ConfiguredModelText extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    Config config = ConfigModel.of(context, null);

    return Text(

    ''Font size: ${config.fontSize}'',

    style: TextStyle(

    color: config.color,

    fontSize: config.fontSize,

    ),

    );

    }

    }

    class ConfiguredModelBox extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    Config config = ConfigModel.of(context, ''color'');

    return Container(

    decoration: BoxDecoration(color: config.color),

    child: Text(''Background color: ${config.color}''),

    );

    }

    }

    Listing 10-10

    Use ConfigModel to get Config object

    ```


