    \ 展示了一个包含三行四列的简单表格示例。\n\n```\nTable(\n  border: TableBorder.all(color: Colors.red.shade200),\n\
    \  children: [\n    TableRow(children: [Text('A'), Text('B'), Text('C'), Text('D')]),\n\
    \    TableRow(children: [Text('E'), Text('F'), Text('G'), Text('H')]),\n    TableRow(children:\
    \ [Text('I'), Text('J'), Text('K'), Text('L')]),\n  ],\n);\n```\n\n表格的列宽通过 `TableColumnWidth`\
    \ 的实现来配置。`columnWidths` 参数（类型为 `Map<int, TableColumnWidth>`）定义了列索引与其 `TableColumnWidth`\
    \ 实现之间的映射关系。表 7-5 展示了内置的 `TableColumnWidth` 实现。`MinColumnWidth` 和 `MaxColumnWidth`\
    \ 类组合了其他的 `TableColumnWidth` 实现。如果某列未找到 `TableColumnWidth` 实现，则使用 `defaultColumnWidth`\
    \ 参数来获取默认的 `TableColumnWidth` 实现。`defaultColumnWidth` 的默认值是 `FlexColumnWidth(1.0)`，这意味着所有列的宽度相同。\n\
    \n**表 7-5** `TableColumnWidth` 实现\n\n| 名称 | 性能 | 描述 |\n| --- | --- | --- |\n|\
    \ `FixedColumnWidth` | 高 | 使用固定的像素数作为列宽。 |\n| `FlexColumnWidth` | 中 | 在其他所有非弹性列尺寸确定后，使用弹性因子分配剩余空间。\
    \ |\n| `FractionColumnWidth` | 中 | 使用表格最大宽度的一个比例作为列宽。 |\n| `IntrinsicColumnWidth`\
    \ | 低 | 使用列中所有单元格的固有尺寸来确定列宽。 |\n| `MinColumnWidth` | | 两个 `TableColumnWidth` 对象中的较小值。\
    \ |\n| `MaxColumnWidth` | | 两个 `TableColumnWidth` 对象中的较大值。 |\n\n清单 7-13 展示了一个具有不同列宽的表格示例。\n\
    \n```\nTable(\n  border: TableBorder.all(color: Colors.blue.shade200),\n  columnWidths:\
    \ {\n    0: FixedColumnWidth(100),\n    1: FlexColumnWidth(1),\n    2: FlexColumnWidth(2),\n\
    \    3: FractionColumnWidth(0.2),\n  },\n  children: [\n    TableRow(children:\
    \ [Text('A'), Text('B'), Text('C'), Text('D')]),\n    TableRow(children: [Text('E'),\
    \ Text('F'), Text('G'), Text('H')]),\n    TableRow(children: [Text('I'), Text('J'),\
    \ Text('K'), Text('L')]),\n  ],\n);\n```\n\n单元格的垂直对齐方式通过 `TableCellVerticalAlignment`\
    \ 枚举的值来配置。`TableCellVerticalAlignment` 枚举包含值 `top`、`middle`、`bottom`、`baseline`\
    \ 和 `fill`。`Table` 构造函数的 `defaultVerticalAlignment` 参数指定了默认的 `TableCellVerticalAlignment`\
    \ 值。如果你想自定义单个单元格的垂直对齐方式，可以将该单元格组件包裹在 `TableCell` 组件内，并指定 `verticalAlignment` 参数。清单\
    \ 7-14 展示了一个为单元格指定垂直对齐方式的示例。\n\n```\nclass VerticalAlignmentTable extends StatelessWidget\
    \ {\n  @override\n  Widget build(BuildContext context) {\n    return Table(\n\
    \      border: TableBorder.all(color: Colors.green.shade200),\n      defaultVerticalAlignment:\
    \ TableCellVerticalAlignment.bottom,\n      children: [\n        TableRow(children:\
    \ [\n          TextCell('A'),\n          TableCell(\n            verticalAlignment:\
    \ TableCellVerticalAlignment.middle,\n            child: Text('B'),\n        \
    \  ),\n          Text('C'),\n          Text('D'),\n        ]),\n        TableRow(children:\
    \ [Text('E'), Text('F'), Text('G'), Text('H')]),\n        TableRow(children: [Text('I'),\
    \ Text('J'), Text('K'), Text('L')]),\n      ],\n    );\n  }\n}\n\nclass TextCell\
    \ extends StatelessWidget {\n  TextCell(this.text, {this.height = 50});\n  final\
    \ String text;\n  final double height;\n\n  @override\n  Widget build(BuildContext\
    \ context) {\n    return ConstrainedBox(\n      constraints: BoxConstraints(\n\
    \        minHeight: height,\n      ),\n      child: Text(text),\n    );\n  }\n\
    }\n```\n\n图 7-3 展示了不同表格的截图。\n\n![../images/479501_1_En_7_Chapter/479501_1_En_7_Fig3_HTML.png](img/479501_1_En_7_Fig3_HTML.png)\n\
    \n## 7.4 构建 Material Design 页面框架\n\n### 问题\n\n你想要构建 Material Design 页面的框架。\n\n\
    ### 解决方案\n\n使用 `Scaffold` 及其他相关组件。\n\n### 讨论\n\nMaterial Design 应用具有通用的布局结构。`Scaffold`\
    \ 组件将其他通用组件组合在一起，以创建基本的页面结构。表 7-6 展示了可以包含在 `Scaffold` 组件中的元素。指定为 `drawer` 和 `endDrawer`\
    \ 的组件初始时隐藏，可通过滑动来显示。滑动方向取决于文本方向。`drawer` 组件使用与文本方向相同的方向，而 `endDrawer` 组件则使用相反的方向。例如，如果文本方向是从左到右，则\
    \ `drawer` 组件通过从左向右滑动来打开，而 `endDrawer` 组件通过从右向左滑动来打开。\n\n**表 7-6** `Scaffold`\
    \ 元素\n\n| 参数 | 组件 | 描述 |\n| --- | --- | --- |\n| `appBar` | `AppBar` | 显示在顶部的应用栏。\
    \ |\n| `floatingActionButton` | `FloatingActionButton` | 浮动在底部主体右上角的按钮。 |\n| `drawer`\
    \ | `Drawer` | 显示在主体侧面的隐藏面板。 |\n| `endDrawer` | `Drawer` | 显示在主体侧面的隐藏面板。 |\n|\
    \ `bottomNavigationBar` | `BottomAppBar` / `BottomNavigationBar` | 显示在底部的导航栏。\
    \ |\n| `bottomSheet` | `BottomSheet` | 持久的底部工作表。 |\n| `persistentFooterButtons`\
    \ | `List<Widget>` | 显示在底部的一组按钮。 |\n| `body` | `Widget` | 主要内容。 |\n\n表 7-6 中的第二列仅列出了这些元素的首选组件类型。`Scaffold`\
    \ 构造函数实际上接受任何类型的组件。例如，你可以使用 `ListView` 组件作为 `drawer`。然而，这些首选组件更为合适。\n"
- fmt: "# App Bar\n\n`AppBar` widget displays basic information of the current screen.\
    \ It consists of a toolbar and other widgets. Table 7-7 shows the elements of\
    \ an `AppBar` widget. These elements are also named parameters of `AppBar` constructor.\n\
    \n**Table 7-7** Parameters of `AppBar`\n\n| Name | Description |\n| --- | ---\
    \ |\n| `title` | Primary widget in the toolbar. |\n| `leading` | Widget to display\
    \ before the `title`. |\n| `actions` | List of widgets to display after the `title`.\
    \ |\n| `bottom` | Widget to display at the bottom. |\n| `flexibleSpace` | Widget\
    \ to stack behind the toolbar and the `bottom`. |\n\nIf the `leading` widget is\
    \ null and `automaticallyImplyLeading` parameter is true, the actual `leading`\
    \ widget is deduced from the state. If the `Scaffold` has a drawer, the `leading`\
    \ widget is a button to open the drawer. If the nearest `Navigator` has previous\
    \ routes, the `leading` widget is a `BackButton` to go back to previous route.\n\
    \nWidgets in the list of `actions` are usually `IconButtons`. If there is no enough\
    \ space for these `IconButtons`, you can use a `PopupMenuButton` as the last action\
    \ and put other actions in the popup menu. `TabBar` widget is usually used as\
    \ the `bottom` widget. Listing 7-15 shows an example of using `AppBar`.\n\n```\n\
    AppBar(\n  title: Text('Scaffold'),\n  actions: [\n    IconButton(\n      icon:\
    \ Icon(Icons.search),\n      onPressed: () {},\n    ),\n  ],\n);\n```\n\n## Floating\
    \ Action Button\n\n`FloatingActionButton` widget is a special kind of buttons\
    \ to provide quick access to primary action. A floating action button is a circular\
    \ icon that usually displays at the bottom right corner of the screen. In the\
    \ Gmail app, the email list screen has a floating action button to compose new\
    \ emails.\n\nThere are two types of `FloatingActionButtons`. When using `FloatingActionButton()`\
    \ constructor, you only need to provide the `child` widget and `onPressed` callback.\
    \ When using `FloatingActionButton.extend()` constructor, you need to provide\
    \ `icon` and `label` widgets and `onPressed` callback. For both constructors,\
    \ `foregroundColor` and `backgroundColor` parameters can customize the colors.\
    \ Listing 7-16 shows an example of using `FloatingActionButton`.\n\n```\nFloatingActionButton(\n\
    \  child: Icon(Icons.create),\n  onPressed: () {},\n);\n```\n\n## Drawer\n\n`Drawer`\
    \ widget is a convenient wrapper for the panel that displays at the edge of a\
    \ `Scaffold` widget when sliding. Although you can use `Drawer` to wrap any widget,\
    \ it’s common to show app logo, information of current user, and links to app\
    \ pages in the drawer. `ListView` widget is usually used as the child of `Drawer`\
    \ widget to enable scrolling in the drawer.\n\nTo show app logo and information\
    \ of current user, you can use the provided `DrawerHeader` widget and its subclass\
    \ `UserAccountsDrawerHeader`. `DrawerHeader` widget wraps a child widget and has\
    \ a predefined style. `UserAccountsDrawerHeader` is a specific widget to show\
    \ user details. Table 7-8 shows sections that can be added in a `UserAccountsDrawerHeader`\
    \ widget. You can also use `onDetailsPressed` parameter to add a callback when\
    \ the area with account name and email is tapped.\n\n**Table 7-8** Sections in\
    \ `UserAccountsDrawerHeader`\n\n| Name | Description |\n| --- | --- |\n| `currentAccountPicture`\
    \ | Picture of the current user’s account. |\n| `otherAccountsPictures` | List\
    \ of pictures of the current user’s other accounts. You can only have up to three\
    \ of these pictures. |\n| `accountName` | Name of the current user’s account.\
    \ |\n| `accountEmail` | Email of the current user’s account. |\n\nListing 7-17\
    \ shows an example of using `Drawer` with `UserAccountsDrawerHeader`.\n\n```\n\
    Drawer(\n  child: ListView(\n    children: [\n      UserAccountsDrawerHeader(\n\
    \        currentAccountPicture: CircleAvatar(\n          child: Text('JD'),\n\
    \        ),\n        accountName: Text('John Doe'),\n        accountEmail: Text('john.doe@example.com'),\n\
    \      ),\n      ListTile(\n        leading: Icon(Icons.search),\n        title:\
    \ Text('Search'),\n      ),\n      ListTile(\n        leading: Icon(Icons.history),\n\
    \        title: Text('History'),\n      ),\n    ],\n  ),\n);\n```\n\n## Bottom\
    \ App Bar\n\n`BottomAppBar` widget is a simplified version of `AppBar` that displays\
    \ at the bottom of a `Scaffold`. It’s common to only add icon buttons in the bottom\
    \ app bar. If the scaffold also has a floating action button, the bottom app bar\
    \ also creates the notch for the button to dock. Listing 7-18 shows an example\
    \ of using `BottomAppBar`.\n\n```\nBottomAppBar(\n  child: Text('Bottom'),\n \
    \ color: Colors.red,\n);\n```\n\n## Bottom Navigation Bar\n\n`BottomNavigationBar`\
    \ widget provides extra links to navigate between different views. Table 7-9 shows\
    \ the parameters of `BottomNavigationBar` constructor.\n\n**Table 7-9** Parameters\
    \ of `BottomNavigationBar`\n\n| Name | Type | Description |\n| --- | --- | ---\
    \ |\n| `items` | `List<BottomNavigationBarItem>` | List of items. |\n| `currentIndex`\
    \ | `int` | Index of the selected item. |\n| `onTap` | `ValueChanged<int>` | Callback\
    \ when selected item changed. |\n| `type` | `BottomNavigationBarType` | Type of\
    \ the navigation bar. |\n| `fixedColor` | `Color` | Color of selected item when\
    \ type is `BottomNavigationBarType.fixed`. |\n| `iconSize` | `double` | Size of\
    \ icons. |\n\nWhen an item is tapped, the `onTap` callback is invoked with index\
    \ of the tapped item. Depending on the number of items, there can be different\
    \ ways to show these items. The layout of items is defined by values of `BottomNavigationBarType`\
    \ enum. If the value is `fixed`, these items have fixed width and always display\
    \ text labels. If the value is `shifting`, location of items may change according\
    \ to the selected item and only text label of selected item is displayed. `BottomNavigationBar`\
    \ has a default strategy to select the type. When there are less than four items,\
    \ `BottomNavigationBarType.fixed` is used; otherwise, `BottomNavigationBarType.shifting`\
    \ is used. You can use the `type` parameter to override the default behavior.\n\
    \nTable 7-10 shows parameters of `BottomNavigationBarItem` constructor. Both `icon`\
    \ and `title` parameters are required. If the type of `BottomNavigationBar` is\
    \ `BottomNavigationBarType.shifting`, then the background of navigation bar is\
    \ determined by the background color of selected item. You should specify the\
    \ `backgroundColor` parameter to differentiate items.\n\n**Table 7-10** Parameters\
    \ of `BottomNavigationBarItem`\n\n| Name | Type | Description |\n| --- | --- |\
    \ --- |\n| `icon` | `Widget` | Item’s icon. |\n| `title` | `Widget` | Item’s title.\
    \ |\n| `activeIcon` | `Widget` | Icon to display when the item is selected. |\n\
    | `backgroundColor` | `Color` | Item's background color. |\n\nListing 7-19 shows\
    \ an example of using `BottomNavigationBar` and `BottomNavigationBarItem`.\n\n\
    ```\nBottomNavigationBar(\n  currentIndex: 1,\n  type: BottomNavigationBarType.shifting,\n\
    \  items: [\n    BottomNavigationBarItem(\n      icon: Icon(Icons.cake),\n   \
    \   title: Text('Cake'),\n      backgroundColor: Colors.red.shade100,\n    ),\n\
    \    BottomNavigationBarItem(\n      icon: Icon(Icons.map),\n      title: Text('Map'),\n\
    \      backgroundColor: Colors.green.shade100,\n    ),\n    BottomNavigationBarItem(\n\
    \      icon: Icon(Icons.alarm),\n      title: Text('Alarm'),\n      backgroundColor:\
    \ Colors.blue.shade100,\n    ),\n  ],\n);\n```"
  raw: '### App Bar


    AppBar widget displays basic information of the current screen. It consists of
    a toolbar and other widgets. Table [7-7](#479501_1_En_7_Chapter.xhtml#Tab7) shows
    the elements of an AppBar widget. These elements are also named parameters of
    AppBar constructor.


    Table 7-7


    Parameters of AppBar


    | Name | Description |

    | --- | --- |

    | title | Primary widget in the toolbar. |

    | leading | Widget to display before the title. |

    | actions | List of widgets to display after the title. |

    | bottom | Widget to display at the bottom. |

    | flexibleSpace | Widget to stack behind the toolbar and the bottom. |


    If the leading widget is null and automaticallyImplyLeading parameter is true,
    the actual leading widget is deduced from the state. If the Scaffold has a drawer,
    the leading widget is a button to open the drawer. If the nearest Navigator has
    previous routes, the leading widget is a BackButton to go back to previous route.


    Widgets in the list of actions are usually IconButtons. If there is no enough
    space for these IconButtons, you can use a PopupMenuButton as the last action
    and put other actions in the popup menu. TabBar widget is usually used as the
    bottom widget. Listing [7-15](#479501_1_En_7_Chapter.xhtml#PC15) shows an example
    of using AppBar.


    ```

    AppBar(

    title: Text(''Scaffold''),

    actions: [

    IconButton(

    icon: Icon(Icons.search),

    onPressed: () {},

    ),

    ],

    );

    Listing 7-15

    Example of AppBar

    ```


    ### Floating Action Button


    FloatingActionButton widget is a special kind of buttons to provide quick access
    to primary action. A floating action button is a circular icon that usually displays
    at the bottom right corner of the screen. In the Gmail app, the email list screen
    has a floating action button to compose new emails.


    There are two types of FloatingActionButtons. When using FloatingActionButton()
    constructor, you only need to provide the child widget and onPressed callback.
    When using FloatingActionButton.extend() constructor, you need to provide icon
    and label widgets and onPressed callback. For both constructors, foregroundColor
    and backgroundColor parameters can customize the colors. Listing [7-16](#479501_1_En_7_Chapter.xhtml#PC16)
    shows an example of using FloatingActionButton.


    ```

    FloatingActionButton(

    child: Icon(Icons.create),

    onPressed: () {},

    );

    Listing 7-16

    Example of FloatingActionButton

    ```


    ### Drawer


    Drawer widget is a convenient wrapper for the panel that displays at the edge
    of a Scaffold widget when sliding. Although you can use Drawer to wrap any widget,
    it’s common to show app logo, information of current user, and links to app pages
    in the drawer. ListView widget is usually used as the child of Drawer widget to
    enable scrolling in the drawer.


    To show app logo and information of current user, you can use the provided DrawerHeader
    widget and its subclass UserAccountsDrawerHeader. DrawerHeader widget wraps a
    child widget and has a predefined style. UserAccountsDrawerHeader is a specific
    widget to show user details. Table [7-8](#479501_1_En_7_Chapter.xhtml#Tab8) shows
    sections that can be added in a UserAccountsDrawerHeader widget. You can also
    use onDetailsPressed parameter to add a callback when the area with account name
    and email is tapped.


    Table 7-8


    Sections in UserAccountsDrawerHeader


    | Name | Description |

    | --- | --- |

    | currentAccountPicture | Picture of the current user’s account. |

    | otherAccountsPictures | List of pictures of the current user’s other accounts.
    You can only have up to three of these pictures. |

    | accountName | Name of the current user’s account. |

    | accountEmail | Email of the current user’s account. |


    Listing [7-17](#479501_1_En_7_Chapter.xhtml#PC17) shows an example of using Drawer
    with UserAccountsDrawerHeader.


    ```

    Drawer(

    child: ListView(

    children: [

    UserAccountsDrawerHeader(

    currentAccountPicture: CircleAvatar(

    child: Text(''JD''),

    ),

    accountName: Text(''John Doe''),

    accountEmail: Text(''john.doe@example.com''),

    ),

    ListTile(

    leading: Icon(Icons.search),

    title: Text(''Search''),

    ),

    ListTile(

    leading: Icon(Icons.history),

    title: Text(''History''),

    ),

    ],

    ),

    );

    Listing 7-17

    Example of Drawer

    ```


    ### Bottom App Bar


    BottomAppBar widget is a simplified version of AppBar that displays at the bottom
    of a Scaffold. It’s common to only add icon buttons in the bottom app bar. If
    the scaffold also has a floating action button, the bottom app bar also creates
    the notch for the button to dock. Listing [7-18](#479501_1_En_7_Chapter.xhtml#PC18)
    shows an example of using BottomAppBar.


    ```

    BottomAppBar(

    child: Text(''Bottom''),

    color: Colors.red,

    );

    Listing 7-18

    Example of BottomAppBar

    ```


    ### Bottom Navigation Bar


    BottomNavigationBar widget provides extra links to navigate between different
    views. Table [7-9](#479501_1_En_7_Chapter.xhtml#Tab9) shows the parameters of
    BottomNavigationBar constructor.


    Table 7-9


    Parameters of BottomNavigationBar


    | Name | Type | Description |

    | --- | --- | --- |

    | items | List< BottomNavigationBarItem> | List of items. |

    | currentIndex | int | Index of the selected item. |

    | onTap | ValueChanged<int> | Callback when selected item changed. |

    | type | BottomNavigationBarType | Type of the navigation bar. |

    | fixedColor | Color | Color of selected item when type if BottomNavigationBarType.fixed.
    |

    | iconSize | double | Size of icons. |


    When an item is tapped, the onTap callback is invoked with index of the tapped
    item. Depending on the number of items, there can be different ways to show these
    items. The layout of items is defined by values of BottomNavigationBarType enum.
    If the value is fixed, these items have fixed width and always display text labels.
    If the value is shifting, location of items may change according to the selected
    item and only text label of selected item is displayed. BottomNavigationBar has
    a default strategy to select the type. When there are less than four items, BottomNavigationBarType.fixed
    is used; otherwise, BottomNavigationBarType.shifting is used. You can use the
    type parameter to override the default behavior.


    Table [7-10](#479501_1_En_7_Chapter.xhtml#Tab10) shows parameters of BottomNavigationBarItem
    constructor. Both icon and title parameters are required. If the type of BottomNavigationBar
    is BottomNavigationBarType.shifting, then the background of navigation bar is
    determined by the background color of selected item. You should specify the backgroundColor
    parameter to differentiate items.


    Table 7-10


    Parameters of BottomNavigationBarItem


    | Name | Type | Description |

    | --- | --- | --- |

    | icon | Widget | Item’s icon. |

    | title | Widget | Item’s title. |

    | activeIcon | Widget | Icon to display when the item is selected. |

    | backgroundColor | Color | Item''s background color. |


    Listing [7-19](#479501_1_En_7_Chapter.xhtml#PC19) shows an example of using BottomNavigationBar
    and BottomNavigationBarItem.


    ```

    BottomNavigationBar(

    currentIndex: 1,

    type: BottomNavigationBarType.shifting,

    items: [

    BottomNavigationBarItem(

    icon: Icon(Icons.cake),

    title: Text(''Cake''),

    backgroundColor: Colors.red.shade100,

    ),

    BottomNavigationBarItem(

    icon: Icon(Icons.map),

    title: Text(''Map''),

    backgroundColor: Colors.green.shade100,

    ),

    BottomNavigationBarItem(

    icon: Icon(Icons.alarm),

    title: Text(''Alarm''),

    backgroundColor: Colors.blue.shade100,

    ),

    ],

    );

    Listing 7-19

    Example of BottomNavigationBar

    ```'
  trans: "\n# 应用栏\n\n`AppBar` 小部件用于显示当前屏幕的基本信息。它由一个工具栏和其他小部件组成。表 7-7 展示了 `AppBar`\
    \ 小部件的构成元素。这些元素也是 `AppBar` 构造器的具名参数。\n\n**表 7-7** `AppBar` 的参数\n\n| 名称 | 描述 |\n\
    | --- | --- |\n| `title` | 工具栏中的主要小部件。 |\n| `leading` | 在 `title` 之前显示的小部件。 |\n\
    | `actions` | 在 `title` 之后显示的小部件列表。 |\n| `bottom` | 显示在底部的小部件。 |\n| `flexibleSpace`\
    \ | 堆叠在工具栏和 `bottom` 之后的小部件。 |\n\n如果 `leading` 小部件为 null 且 `automaticallyImplyLeading`\
    \ 参数为 true，则实际的 `leading` 小部件会从当前状态推断得出。如果 `Scaffold` 包含一个抽屉，则 `leading` 小部件是一个用于打开抽屉的按钮。如果最近的\
    \ `Navigator` 有上一个路由记录，则 `leading` 小部件是一个用于返回上一个路由的 `BackButton`。\n\n`actions`\
    \ 列表中的小部件通常是 `IconButtons`。如果没有足够的空间放置这些 `IconButtons`，可以将 `PopupMenuButton` 作为最后一个操作项，并将其他操作放入弹出菜单中。`TabBar`\
    \ 小部件通常用作 `bottom` 小部件。清单 7-15 展示了一个使用 `AppBar` 的示例。\n\n```\nAppBar(\n  title:\
    \ Text('Scaffold'),\n  actions: [\n    IconButton(\n      icon: Icon(Icons.search),\n\
    \      onPressed: () {},\n    ),\n  ],\n);\n```\n\n## 浮动操作按钮\n\n`FloatingActionButton`\
    \ 小部件是一种特殊类型的按钮，用于提供对主要操作的快速访问。浮动操作按钮是一个圆形图标，通常显示在屏幕的右下角。在 Gmail 应用中，邮件列表屏幕有一个用于撰写新邮件的浮动操作按钮。\n\
    \n`FloatingActionButton` 有两种类型。当使用 `FloatingActionButton()` 构造器时，只需提供 `child`\
    \ 小部件和 `onPressed` 回调即可。当使用 `FloatingActionButton.extend()` 构造器时，需要提供 `icon` 和\
    \ `label` 小部件以及 `onPressed` 回调。对于这两种构造器，都可以使用 `foregroundColor` 和 `backgroundColor`\
    \ 参数来自定义颜色。清单 7-16 展示了一个使用 `FloatingActionButton` 的示例。\n\n```\nFloatingActionButton(\n\
    \  child: Icon(Icons.create),\n  onPressed: () {},\n);\n```\n\n## 抽屉\n\n`Drawer`\
    \ 小部件是一个便捷的封装器，用于在滑动时显示在 `Scaffold` 小部件边缘的面板。虽然你可以使用 `Drawer` 来包裹任何小部件，但通常的做法是在抽屉中展示应用徽标、当前用户信息以及指向应用页面的链接。`ListView`\
    \ 小部件常用作 `Drawer` 小部件的子项，以便在抽屉中启用滚动功能。\n\n要显示应用徽标和当前用户信息，可以使用提供的 `DrawerHeader`\
    \ 小部件及其子类 `UserAccountsDrawerHeader`。`DrawerHeader` 小部件包裹一个子小部件，并具有预定义的样式。`UserAccountsDrawerHeader`\
    \ 是一个用于显示用户详细信息的专用小部件。表 7-8 展示了可以在 `UserAccountsDrawerHeader` 小部件中添加的部分。你还可以使用\
    \ `onDetailsPressed` 参数为点击包含账户名和电子邮件的区域添加一个回调。\n\n**表 7-8** `UserAccountsDrawerHeader`\
    \ 中的部分\n\n| 名称 | 描述 |\n| --- | --- |\n| `currentAccountPicture` | 当前用户账户的头像。 |\n\
    | `otherAccountsPictures` | 当前用户其他账户的头像列表。最多只能有三个头像。 |\n| `accountName` | 当前用户账户的名称。\
    \ |\n| `accountEmail` | 当前用户账户的电子邮件。 |\n\n清单 7-17 展示了一个将 `Drawer` 与 `UserAccountsDrawerHeader`\
    \ 结合使用的示例。\n\n```\nDrawer(\n  child: ListView(\n    children: [\n      UserAccountsDrawerHeader(\n\
    \        currentAccountPicture: CircleAvatar(\n          child: Text('JD'),\n\
    \        ),\n        accountName: Text('John Doe'),\n        accountEmail: Text('john.doe@example.com'),\n\
    \      ),\n      ListTile(\n        leading: Icon(Icons.search),\n        title:\
    \ Text('Search'),\n      ),\n      ListTile(\n        leading: Icon(Icons.history),\n\
    \        title: Text('History'),\n      ),\n    ],\n  ),\n);\n```\n\n## 底部应用栏\n\
    \n`BottomAppBar` 小部件是 `AppBar` 的一个简化版本，显示在 `Scaffold` 的底部。通常只在底部应用栏中添加图标按钮。如果脚手架也包含一个浮动操作按钮，底部应用栏会为该按钮创建一个凹口以便对接。清单\
    \ 7-18 展示了一个使用 `BottomAppBar` 的示例。\n\n```\nBottomAppBar(\n  child: Text('Bottom'),\n\
    \  color: Colors.red,\n);\n```\n\n## 底部导航栏\n\n`BottomNavigationBar` 小部件提供了额外的链接，用于在不同视图之间导航。表\
    \ 7-9 展示了 `BottomNavigationBar` 构造器的参数。\n\n**表 7-9** `BottomNavigationBar` 的参数\n\
    \n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `items` | `List<BottomNavigationBarItem>`\
    \ | 项目列表。 |\n| `currentIndex` | `int` | 当前选中项目的索引。 |\n| `onTap` | `ValueChanged<int>`\
    \ | 选中项目改变时的回调。 |\n| `type` | `BottomNavigationBarType` | 导航栏的类型。 |\n| `fixedColor`\
    \ | `Color` | 当类型为 `BottomNavigationBarType.fixed` 时，选中项目的颜色。 |\n| `iconSize`\
    \ | `double` | 图标的大小。 |\n\n当点击某个项目时，会调用 `onTap` 回调，并传入被点击项目的索引。根据项目的数量，可以有多种方式来显示这些项目。项目的布局由\
    \ `BottomNavigationBarType` 枚举的值定义。如果值为 `fixed`，这些项目具有固定宽度，并且始终显示文本标签。如果值为 `shifting`，项目的位置可能会根据选中的项目而变化，并且只显示选中项目的文本标签。`BottomNavigationBar`\
    \ 有一个默认的策略来选择类型。当项目少于四个时，使用 `BottomNavigationBarType.fixed`；否则，使用 `BottomNavigationBarType.shifting`。你可以使用\
    \ `type` 参数来覆盖默认行为。\n\n表 7-10 展示了 `BottomNavigationBarItem` 构造器的参数。`icon` 和 `title`\
    \ 参数都是必需的。如果 `BottomNavigationBar` 的类型是 `BottomNavigationBarType.shifting`，那么导航栏的背景颜色由选中项目的背景颜色决定。你应该指定\
    \ `backgroundColor` 参数来区分不同的项目。\n\n**表 7-10** `BottomNavigationBarItem` 的参数\n\n\
    | 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `icon` | `Widget` | 项目的图标。 |\n| `title`\
    \ | `Widget` | 项目的标题。 |\n| `activeIcon` | `Widget` | 项目被选中时显示的图标。 |\n| `backgroundColor`\
    \ | `Color` | 项目的背景颜色。 |\n\n清单 7-19 展示了一个使用 `BottomNavigationBar` 和 `BottomNavigationBarItem`\
    \ 的示例。\n\n```\nBottomNavigationBar(\n  currentIndex: 1,\n  type: BottomNavigationBarType.shifting,\n\
    \  items: [\n    BottomNavigationBarItem(\n      icon: Icon(Icons.cake),\n   \
    \   title: Text('Cake'),\n      backgroundColor: Colors.red.shade100,\n    ),\n\
    \    BottomNavigationBarItem(\n      icon: Icon(Icons.map),\n      title: Text('Map'),\n\
    \      backgroundColor: Colors.green.shade100,\n    ),\n    BottomNavigationBarItem(\n\
    \      icon: Icon(Icons.alarm),\n      title: Text('Alarm'),\n      backgroundColor:\
    \ Colors.blue.shade100,\n    ),\n  ],\n);\n```\n"
- fmt: '### Bottom Sheet


    `BottomSheet` widget displays at the bottom of the app to provide additional information.
    The system sharing sheet is a typical example of bottom sheet. There are two types
    of bottom sheets:


    * Persistent bottom sheets are always visible. Persistent bottom sheets can be
    created using `ScaffoldState.showBottomSheet` function and `bottomSheet` parameter
    of `Scaffold` constructor.

    * Modal bottom sheets behave like modal dialogs. Modal bottom sheets can be created
    using `showModalBottomSheet` function.


    `BottomSheet` constructor uses a `WidgetBuilder` function to create the actual
    content. You also need to provide an `onClosing` callback that’s invoked when
    the bottom sheet begins to close. Listing [7-20](#479501_1_En_7_Chapter.xhtml#PC20)
    shows an example of using `BottomSheet`.


    ```

    BottomSheet(

    onClosing: () {},

    builder: (context) {

    return Text(''Bottom'');

    },

    );

    Listing 7-20

    Example of BottomSheet

    ```


    ### Scaffold State


    `Scaffold` is a stateful widget. You can use `Scaffold.of()` method to get the
    `ScaffoldState` object of nearest `Scaffold` widget from the build context. `ScaffoldState`
    has different methods to interact with other components; see Table [7-11](#479501_1_En_7_Chapter.xhtml#Tab11).


    **Table 7-11** Methods of `ScaffoldState`


    | Name | Description |

    | --- | --- |

    | `openDrawer()` | Open the drawer. |

    | `openEndDrawer()` | Open the drawer on the end side. |

    | `showSnackBar(SnackBar snackbar)` | Show the `SnackBar`. |

    | `hideCurrentSnackBar()` | Hide the current `SnackBar`. |

    | `removeCurrentSnackBar()` | Remove the current `SnackBar`. |

    | `showBottomSheet()` | Show a persistent bottom sheet. |


    ### SnackBar


    `SnackBar` widget shows a message with an optional action at the bottom of the
    screen. To create a `SnackBar` widget, the constructor requires the `content`
    parameter to specify the content. The `duration` parameter controls how long the
    snack bar is displayed. To add an action to the snack bar, you can use `action`
    parameter of type `SnackBarAction`. When an action is provided, the snack bar
    is dismissed when the action is pressed.


    To create a `SnackBarAction` instance, you need to provide the `label` and `onPressed`
    callback. You can customize the button label color using `textColor` parameter.
    The button of a snack bar action can only be pressed once.


    The `showSnackBar()` method of `ScaffoldState` shows a `SnackBar` widget. There
    can be at most one snack bar displayed at a time. If `ScaffoldState()` method
    is invoked when another snack bar is still visible, the given snack bar is added
    to a queue and will be displayed after other snack bars are dismissed. The return
    type of `showSnackBar()` method is `ScaffoldFeatureController<SnackBar, SnackBarClosedReason>`.
    `SnackBarClosedReason` is an enum that defines the reasons a snack bar may be
    closed.


    Listing [7-21](#479501_1_En_7_Chapter.xhtml#PC21) shows an example of opening
    snack bar.


    ```

    Scaffold.of(context).showSnackBar(SnackBar(

    content: Text(''This is a message.''),

    action: SnackBarAction(label: ''OK'', onPressed: () {}),

    ));

    Listing 7-21

    Example of SnackBar

    ```


    ## 7.5 Scaffolding iOS Pages


    ### Problem


    You want to scaffold iOS pages.


    ### Solution


    Use `CupertinoPageScaffold`.


    ### Discussion


    For iOS apps, you can use `CupertinoPageScaffold` widget to create the basic layout
    of pages. Comparing to `Scaffold` in Material Design, customizations provided
    by `CupertinoPageScaffold` are limited. You can only specify navigation bar, child,
    and background color.


    `CupertinoNavigationBar` widget is similar with `AppBar` in Material Design, but
    `CupertinoNavigationBar` can only have `leading`, `middle`, and `trailing` widgets.
    The `middle` widget is centered between `leading` and `trailing` widgets. The
    `leading` widget can be automatically implied based on the navigation state when
    `automaticallyImplyLeading` parameter is `true`. The `middle` widget can also
    be automatically implied when `automaticallyImplyMiddle` parameter is `true`.


    Listing [7-22](#479501_1_En_7_Chapter.xhtml#PC22) shows an example of using `CupertinoPageScaffold`
    and `CupertinoNavigationBar`.


    ```

    CupertinoPageScaffold(

    navigationBar: CupertinoNavigationBar(

    middle: Text(''App''),

    trailing: CupertinoButton(

    child: Icon(CupertinoIcons.search),

    onPressed: () {},

    ),

    ),

    child: Container(),

    );

    Listing 7-22

    Example of CupertinoPageScaffold

    ```


    ## 7.6 Creating Tab Layout in Material Design


    ### Problem


    You want to create tab bars and tabs.


    ### Solution


    Use `TabBar`, `Tab`, and `TabController`.


    ### Discussion


    Tab layout is widely used in mobile apps to organize multiple sections in one
    page. To implement tab layout in Material Design, you need to work with several
    widgets. `TabBar` widget is the container of `Tab` widgets. `TabController` widget
    is responsible for coordinating `TabBar` and `TabView`.


    A `Tab` widget must have at least some text, an icon, or a child widget, but it
    cannot have both text and child widget. To create a `TabBar`, you need to provide
    a list of tabs. You can choose to use an explicitly created `TabController` instance
    or use the shared `DefaultTabController` instance. `DefaultTabController` is an
    inherited widget. `TabBar` will try to look up an ancestor `DefaultTabController`
    instance if no `TabController` is provided.


    You can choose to provide a `TabController` instance or use the inherited `DefaultTabController`.
    To create a `TabController`, you need to provide the number of tabs and a `TickerProvider`
    instance.


    In Listing [7-23](#479501_1_En_7_Chapter.xhtml#PC23), the mixin `SingleTickerProviderStateMixin`
    of `_TabPageState` is an implementation of `TickerProvider`, so the current instance
    of `_TabPageState` is passed as the `vsync` parameter of `TabController` constructor.
    The `TabController` instance is shared by `TabBar` and `TabBarView`.


    ```

    class TabPage extends StatefulWidget {

    @override

    _TabPageState createState() => _TabPageState();

    }

    class _TabPageState extends State with SingleTickerProviderStateMixin {

    final List _tabs = [

    Tab(text: ''List'', icon: Icon(Icons.list)),

    Tab(text: ''Map'', icon: Icon(Icons.map)),

    ];

    TabController _tabController;

    @override

    void initState() {

    super.initState();

    _tabController = TabController(length: _tabs.length, vsync: this);

    }

    @override

    void dispose() {

    _tabController.dispose();

    super.dispose();

    }

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Tab''),

    bottom: TabBar(

    tabs: _tabs,

    controller: _tabController,

    ),

    ),

    body: TabBarView(

    children: _tabs.map((tab) {

    return Center(

    child: Text(tab.text),

    );

    }).toList(),

    controller: _tabController,

    ),

    );

    }

    }

    Listing 7-23

    TabBar with provided TabController

    ```


    If you don’t need to interact with `TabController`, using `DefaultTabController`
    is a better choice. Code in Listing [7-24](#479501_1_En_7_Chapter.xhtml#PC24)
    uses `DefaultTabController` to implement the same functionality as code in Listing
    [7-23](#479501_1_En_7_Chapter.xhtml#PC23).


    ```

    class DefaultTabControllerPage extends StatelessWidget {

    final List _tabs = [

    Tab(text: ''List'', icon: Icon(Icons.list)),

    Tab(text: ''Map'', icon: Icon(Icons.map))

    ];

    @override

    Widget build(BuildContext context) {

    return DefaultTabController(

    length: _tabs.length,

    child: Scaffold(

    appBar: AppBar(

    bottom: TabBar(tabs: _tabs),

    ),

    body: TabBarView(

    children: _tabs.map((tab) {

    return Center(

    child: Text(tab.text),

    );

    }).toList(),

    ),

    ),

    );

    }

    }

    Listing 7-24

    DefaultTabController

    ```


    ## 7.7 Implementing Tab Layout in iOS


    ### Problem


    You want to implement tab layout in iOS apps.


    ### Solution


    Use `CupertinoTabScaffold`, `CupertinoTabBar`, and `CupertinoTabView`.'
