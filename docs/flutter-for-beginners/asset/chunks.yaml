    \n*图 8-5 Material Design 菜单*\n\n## 8.10 使用嵌套导航器管理复杂的页面流程\n\n### 问题\n\n你想要实现复杂的页面流程。\n\
    \n### 解决方案\n\n使用嵌套的`Navigator`实例。"
  raw: '### Discussion


    To use `showMenu()` function, you need to have a list of `PopupMenuEntry` objects.
    There are different types of `PopupMenuEntry` implementations:


    *   `PopupMenuItem` – Menu item for a single value


    *   `CheckedPopupMenuItem` – Menu item with a checkmark


    *   `PopupMenuDivider` – Horizontal divider between menu items


    `PopupMenuItem` is a generic with the type of its value. Table [8-3](#479501_1_En_8_Chapter.xhtml#Tab3)
    shows parameters of `PopupMenuItem` constructor. `CheckedPopupMenuItem` is a subclass
    of `PopupMenuItem`. `CheckedPopupMenuItem` has the `checked` property to specify
    whether to display a checkmark.


    Table 8-3


    Parameters of PopupMenuItem constructor


    | Name | Type | Description |

    | --- | --- | --- |

    | `child` | `Widget` | Content of the menu item. |

    | `value` | `T` | Value for the menu item. |

    | `enabled` | `bool` | Whether this menu item can be selected. |

    | `height` | `double` | Height of the menu item. Default to `48`. |


    The `showMenu()` function returns a `Future<T>` object which resolves to the value
    of selected menu item. This function also uses `Navigator.push()` method to show
    the menu. Table [8-4](#479501_1_En_8_Chapter.xhtml#Tab4) shows major parameters
    of `showMenu()` function. When `initialValue` is specified, the first item with
    a matching value is highlighted.


    Table 8-4


    Parameters of showMenu()


    | Name | Type | Description |

    | --- | --- | --- |

    | `items` | `List<PopupMenuEntry<T>>` | A list of menu items. |

    | `initialValue` | `T` | Initial value to highlight menu item. |

    | `position` | `RelativeRect` | Position to show the menu. |


    The menu in Listing [8-14](#479501_1_En_8_Chapter.xhtml#PC14) contains a `PopupMenuItem`,
    a `PopupMenuDivider`, and a `CheckedPopupMenuItem`.


    ```

    RaisedButton(

    child: Text(''Show Menu''),

    onPressed: () async {

    String result = await showMenu(

    context: context,

    position: RelativeRect.fromLTRB(0, 0, 0, 0),

    items: [

    PopupMenuItem(

    value: ''red'',

    child: Text(''Red''),

    ),

    PopupMenuDivider(),

    CheckedPopupMenuItem(

    value: ''green'',

    checked: true,

    child: Text(''Green''),

    )

    ],

    initialValue: ''green'',

    );

    print(result);

    },

    );

    Listing 8-14

    Show menu

    ```


    The main difficulty of using `showMenu()` function is to provide proper value
    for the `position` parameter. If the menu is triggered by pressing a button, using
    `PopupMenuButton` is a better choice, because the menu position is calculated
    automatically based on the button’s position. Table [8-5](#479501_1_En_8_Chapter.xhtml#Tab5)
    shows major parameters of `PopupMenuButton` constructor. `PopupMenuItemBuilder`
    function takes a `BuildContext` object as the argument and returns a `List<PopupMenuEntry<T>>`
    object.


    Table 8-5


    Parameters of PopupMenuButton


    | Name | Type | Description |

    | --- | --- | --- |

    | `itemBuilder` | `PopupMenuItemBuilder<T>` | Builder function to create menu
    items. |

    | `initialValue` | `T` | Initial value. |

    | `onSelected` | `PopupMenuItemSelected<T>` | Callback when a menu item is selected.
    |

    | `onCanceled` | `PopupMenuCanceled` | Callback when the menu is dismissed without
    selection. |

    | `tooltip` | `String` | Tooltip of the button. |

    | `child` | `Widget` | Content of the button. |

    | `icon` | `Icon` | Icon of the button. |


    Listing [8-15](#479501_1_En_8_Chapter.xhtml#PC15) shows how to use `PopupMenuButton`
    to implement the same menu as in Listing [8-14](#479501_1_En_8_Chapter.xhtml#PC14).


    ```

    PopupMenuButton(

    itemBuilder: (BuildContext context) {

    return >[

    PopupMenuItem(

    value: ''red'',

    child: Text(''Red''),

    ),

    PopupMenuDivider(),

    CheckedPopupMenuItem(

    value: ''green'',

    checked: true,

    child: Text(''Green''),

    )

    ];

    },

    initialValue: ''green'',

    child: Text(''Select color''),

    onSelected: (String value) {

    print(value);

    },

    onCanceled: () {

    print(''no selections'');

    },

    );

    Listing 8-15

    Use PopupMenuButton

    ```


    Figure [8-5](#479501_1_En_8_Chapter.xhtml#Fig5) shows the screenshot of the menu
    created in Listings [8-14](#479501_1_En_8_Chapter.xhtml#PC14) and [8-15](#479501_1_En_8_Chapter.xhtml#PC15).


    ![../images/479501_1_En_8_Chapter/479501_1_En_8_Fig5_HTML.jpg](images/479501_1_En_8_Chapter/479501_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    Material Design menu


    ## 8.10 Managing Complicated Page Flows Using Nested Navigators


    ### Problem


    You want to have complicated page flows.


    ### Solution


    Use nested `Navigator` instances.'
