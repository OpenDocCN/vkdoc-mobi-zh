  raw: '### Discussion


    Bloc (Business Logic Component) is an architecture pattern to separate presentation
    from business logic. Bloc was designed to be simple, powerful, and testable. Let’s
    start from core concepts in Bloc.


    States represent a part of the application’s state. When state changes, UI widgets
    are notified to rebuild based on the latest state. Each application has its own
    way to define states. Typically, you’ll use Dart classes to describe states.


    Events are sources of changes to states. Events can be generated by user interactions
    or background tasks. For example, pressing a button may generate an event that
    describes the intended action. When the response of a HTTP request is ready, an
    event can also be generated to include the response body. Events are typically
    described as Dart classes. Events may also have payload carried with them.


    When events are dispatched, handling these events may cause the current state
    transits to a new state. UI widgets are then notified to rebuild using the new
    state. An event transition consists of the current state, the event, and the next
    state. If all state transitions are recorded, we can easily track all user interactions
    and state changes. We can also implement time-travelling debugging.


    Now we can have a definition of Bloc. A Bloc component transforms a stream of
    events into a stream of states. A Bloc has an initial state as the state before
    any events are received. For each event, a Bloc has a `mapEventToState()` function
    that takes a received event and returns a stream of states to be consumed by the
    presentation layer. A Bloc also has the `dispatch()` method to dispatch events
    to it.


    In this recipe, we’ll use the GitHub Jobs API ( [`https://jobs.github.com/api`](https://jobs.github.com/api)
    ) to get job listings on GitHub. The user can input a keyword for search and see
    the results. To consume this, we will be using the http package ( [`https://pub.dev/packages/http`](https://pub.dev/packages/http)
    ). Add this package to your pubspec.yaml file.


    Let’s start from the states. Listing [10-17](#479501_1_En_10_Chapter.xhtml#PC17)
    shows classes for different states. `JobsState` is the abstract base class for
    all state classes. `JobsState` class extends from `Equatable` class in the `equatable`
    package. `Equatable` class is used to provide implantations for `==` operator
    and `hashCode` property. `JobsEmpty` is the initial state. `JobsLoading` means
    the job listing data is still loading. `JobsLoaded` means job listing data is
    loaded. The payload type of `JobsLoaded` event is `List<Job>`. `JobsError` means
    an error occurred when fetching the data.


    ```

    import ''package:http/http.dart'' as http;

    abstract class JobsState extends Equatable {

    JobsState([List props = const []]) : super(props);

    }

    class JobsEmpty extends JobsState {}

    class GetJobsEvent extends JobsEvent {

    GetJobsEvent({@required this.keyword})

    : assert(keyword != null),

    super([keyword]);

    final String keyword;

    }

    class GitHubJobsClient {

    Future> getJobs(keyword) async {

    final response = await http.get(''https://jobs.github.com/positions.json?description=${keyword}'');

    if (response.statusCode != 200) {

    throw new Exception("Unable to fetch data");

    }else{

    var result = new List();

    final rawResult = json.decode(response.body);

    for(final jsonJob in rawResult){

    result.add(Job.fromJson(jsonJob));

    }

    }

    }

    }

    class JobsLoading extends JobsState {}

    class JobsLoaded extends JobsState {

    JobsLoaded({@required this.jobs})

    : assert(jobs != null),

    super([jobs]);

    final List jobs;

    }

    class JobsError extends JobsState {}

    Listing 10-17

    Bloc states

    ```


    Listing [10-18](#479501_1_En_10_Chapter.xhtml#PC18) shows the events. `JobsEvent`
    is the abstract base class for event classes. `GetJobsEvent` class represents
    the event to get jobs data.


    ```

    abstract class JobsEvent extends Equatable {

    JobsEvent([List props = const []]) : super(props);

    }

    class GetJobsEvent extends JobsEvent {

    GetJobsEvent({@required this.keyword})

    : assert(keyword != null),

    super([keyword]);

    final String keyword;

    }

    Listing 10-18

    Bloc events

    ```


    Listing [10-19](#479501_1_En_10_Chapter.xhtml#PC19) shows the Bloc. `JobsBloc`
    class extends from `Bloc<JobsEvent, JobsState>` class. Type parameters of `Bloc`
    are event and state classes. `JobsEmpty` is the initial state. In the `mapEventToState()`
    method, if the event is `GetJobsEvent`, a `JobsLoading` state is emitted first
    to the stream. Then `GitHubJobsClient` object is used to fetch the data. If the
    data is fetched successfully, a `JobsLoaded` state is emitted with the loaded
    data. Otherwise, a `JobsError` state is emitted instead.


    ```

    class JobsBloc extends Bloc {

    JobsBloc({@required this.jobsClient}) : assert(jobsClient != null);

    final GitHubJobsClient jobsClient;

    @override

    JobsState get initialState => JobsEmpty();

    @override

    Stream mapEventToState(JobsEvent event) async* {

    if (event is GetJobsEvent) {

    yield JobsLoading();

    try {

    List jobs = await jobsClient.getJobs(event.keyword);

    yield JobsLoaded(jobs: jobs);

    } catch (e) {

    yield JobsError();

    }

    }

    }

    }

    Listing 10-19

    Bloc

    ```


    `GitHubJobs` class in Listing [10-20](#479501_1_En_10_Chapter.xhtml#PC20) is the
    widget to use the `JobsBloc` class in Listing [10-19](#479501_1_En_10_Chapter.xhtml#PC19).
    The `JobsBloc` object is created in `initState()` method and disposed in `dispose()`
    method . In the `KeywordInput` widget, when user inputs the keyword in the text
    field and presses the search button, a `GetJobsEvent` is dispatched to the `JobsBloc`
    object. In the `JobsView` widget, `BlocBuilder` widget is used to build UI based
    on the state in the Bloc. Here we check the actual type of `JobsState` and return
    different widgets.


    ```

    class GitHubJobs extends StatefulWidget {

    GitHubJobs({Key key, @required this.jobsClient})

    : assert(jobsClient != null),

    super(key: key);

    final GitHubJobsClient jobsClient;

    @override

    _GitHubJobsState createState() => _GitHubJobsState();

    }

    class _GitHubJobsState extends State {

    JobsBloc _jobsBloc;

    @override

    void initState() {

    super.initState();

    _jobsBloc = JobsBloc(jobsClient: widget.jobsClient);

    }

    @override

    Widget build(BuildContext context) {

    return Column(

    children: [

    Padding(

    padding: const EdgeInsets.all(8.0),

    child: KeywordInput(

    jobsBloc: _jobsBloc,

    ),

    ),

    Expanded(

    child: JobsView(

    jobsBloc: _jobsBloc,

    ),

    ),

    ],

    );

    }

    @override

    void dispose() {

    _jobsBloc.dispose();

    super.dispose();

    }

    }

    class KeywordInput extends StatefulWidget {

    KeywordInput({this.jobsBloc});

    final JobsBloc jobsBloc;

    @override

    _KeywordInputState createState() => _KeywordInputState();

    }

    class _KeywordInputState extends State {

    final GlobalKey> _keywordFormKey = GlobalKey();

    @override

    Widget build(BuildContext context) {

    return Row(

    children: [

    Expanded(

    child: TextFormField(

    key: _keywordFormKey,

    ),

    ),

    IconButton(

    icon: Icon(Icons.search),

    onPressed: () {

    String keyword = _keywordFormKey.currentState?.value ?? ";

    if (keyword.isNotEmpty) {

    widget.jobsBloc.dispatch(GetJobsEvent(keyword: keyword));

    }

    },

    ),

    ],

    );

    }

    }

    class JobsView extends StatelessWidget {

    JobsView({this.jobsBloc});

    final JobsBloc jobsBloc;

    @override

    Widget build(BuildContext context) {

    return BlocBuilder(

    bloc: jobsBloc,

    builder: (BuildContext context, JobsState state) {

    if (state is JobsEmpty) {

    return Center(

    child: Text(''Input keyword and search''),

    );

    } else if (state is JobsLoading) {

    return Center(

    child: CircularProgressIndicator(),

    );

    } else if (state is JobsError) {

    return Center(

    child: Text(

    ''Failed to get jobs'',

    style: TextStyle(color: Colors.red),

    ),

    );

    } else if (state is JobsLoaded) {

    return JobsList(state.jobs);

    }

    },

    );

    }

    }

    Listing 10-20

    GitHub jobs widget using Bloc

    ```


    ## 10.7 Managing State Using Redux


    ### Problem


    You want to use Redux as the state management solution.


    ### Solution


    Use `redux` and `flux_redux` packages.'
  trans: "\n### 讨论\n\nBloc（业务逻辑组件）是一种架构模式，用于将表现层与业务逻辑分离。Bloc 被设计为简单、强大且易于测试。让我们从 Bloc\
    \ 的核心概念开始。\n\n`State`（状态）表示应用程序状态的一部分。当状态发生变化时，会通知 UI 组件根据最新状态进行重建。每个应用程序都有自己的方式来定义状态。通常，你会使用\
    \ Dart 类来描述状态。\n\n`Event`（事件）是状态变化的来源。事件可以由用户交互或后台任务生成。例如，按下按钮可能会生成一个描述预期操作的事件。当\
    \ HTTP 请求的响应就绪时，也可以生成一个包含响应体的事件。事件通常使用 Dart 类来描述。事件可能还带有它们的载荷。\n\n当一个事件被派发时，处理这些事件可能会导致当前状态转换到新状态。然后\
    \ UI 组件会被通知使用新状态进行重建。一个事件转换包括当前状态、事件和下一个状态。如果所有状态转换都被记录，我们可以轻松追踪所有的用户交互和状态变化。我们还可以实现时间旅行调试。\n\
    \n现在我们可以给出 Bloc 的定义。一个 Bloc 组件将事件流转换为状态流。一个 Bloc 有一个初始状态，即在接收到任何事件之前的状态。对于每个事件，Bloc\
    \ 都有一个`mapEventToState()`函数，该函数接收一个事件并返回一个状态流，供表现层使用。Bloc 还有一个`dispatch()`方法来向它派发事件。\n\
    \n在本教程中，我们将使用 GitHub Jobs API（[`https://jobs.github.com/api`](https://jobs.github.com/api)）来获取\
    \ GitHub 上的职位列表。用户可以输入关键词进行搜索并查看结果。为了实现这一点，我们将使用`http`包（[`https://pub.dev/packages/http`](https://pub.dev/packages/http)）。将这个包添加到你的`pubspec.yaml`文件中。\n\
    \n让我们从状态开始。代码清单 10-17 展示了不同状态的类。`JobsState`是所有状态类的抽象基类。`JobsState`类继承自`equatable`包中的`Equatable`类。`Equatable`类用于提供`==`运算符和`hashCode`属性的实现。`JobsEmpty`是初始状态。`JobsLoading`表示职位列表数据仍在加载中。`JobsLoaded`表示职位列表数据已加载。`JobsLoaded`事件的载荷类型是`List<Job>`。`JobsError`表示在获取数据时发生了错误。\n\
    \n```\nimport 'package:http/http.dart' as http;\nabstract class JobsState extends\
    \ Equatable {\n  JobsState([List props = const []]) : super(props);\n}\nclass\
    \ JobsEmpty extends JobsState {}\nclass GetJobsEvent extends JobsEvent {\n  GetJobsEvent({@required\
    \ this.keyword})\n      : assert(keyword != null),\n        super([keyword]);\n\
    \  final String keyword;\n}\nclass GitHubJobsClient {\n  Future> getJobs(keyword)\
    \ async {\n    final response = await http.get('https://jobs.github.com/positions.json?description=${keyword}');\n\
    \    if (response.statusCode != 200) {\n      throw new Exception(\"Unable to\
    \ fetch data\");\n    } else {\n      var result = new List();\n      final rawResult\
    \ = json.decode(response.body);\n      for (final jsonJob in rawResult) {\n  \
    \      result.add(Job.fromJson(jsonJob));\n      }\n    }\n  }\n}\nclass JobsLoading\
    \ extends JobsState {}\nclass JobsLoaded extends JobsState {\n  JobsLoaded({@required\
    \ this.jobs})\n      : assert(jobs != null),\n        super([jobs]);\n  final\
    \ List jobs;\n}\nclass JobsError extends JobsState {}\nListing 10-17\nBloc states\n\
    ```\n\n代码清单 10-18 展示了事件。`JobsEvent`是事件类的抽象基类。`GetJobsEvent`类表示获取职位数据的事件。\n\n```\n\
    abstract class JobsEvent extends Equatable {\n  JobsEvent([List props = const\
    \ []]) : super(props);\n}\nclass GetJobsEvent extends JobsEvent {\n  GetJobsEvent({@required\
    \ this.keyword})\n      : assert(keyword != null),\n        super([keyword]);\n\
    \  final String keyword;\n}\nListing 10-18\nBloc events\n```\n\n代码清单 10-19 展示了\
    \ Bloc。`JobsBloc`类继承自`Bloc<JobsEvent, JobsState>`类。`Bloc`的类型参数是事件和状态类。`JobsEmpty`是初始状态。在`mapEventToState()`方法中，如果事件是`GetJobsEvent`，则首先向流中`yield`一个`JobsLoading`状态。然后使用`GitHubJobsClient`对象来获取数据。如果数据获取成功，则`yield`一个包含已加载数据的`JobsLoaded`状态。否则，`yield`一个`JobsError`状态。\n\
    \n```\nclass JobsBloc extends Bloc {\n  JobsBloc({@required this.jobsClient})\
    \ : assert(jobsClient != null);\n  final GitHubJobsClient jobsClient;\n  @override\n\
    \  JobsState get initialState => JobsEmpty();\n  @override\n  Stream mapEventToState(JobsEvent\
    \ event) async* {\n    if (event is GetJobsEvent) {\n      yield JobsLoading();\n\
    \      try {\n        List jobs = await jobsClient.getJobs(event.keyword);\n \
    \       yield JobsLoaded(jobs: jobs);\n      } catch (e) {\n        yield JobsError();\n\
    \      }\n    }\n  }\n}\nListing 10-19\nBloc\n```\n\n代码清单 10-20 中的`GitHubJobs`类是使用代码清单\
    \ 10-19 中`JobsBloc`类的组件。`JobsBloc`对象在`initState()`方法中创建，并在`dispose()`方法中释放。在`KeywordInput`组件中，当用户在文本字段中输入关键词并按下搜索按钮时，会向`JobsBloc`对象派发一个`GetJobsEvent`。在`JobsView`组件中，使用`BlocBuilder`组件根据\
    \ Bloc 中的状态构建 UI。这里我们检查`JobsState`的实际类型并返回不同的组件。\n\n```\nclass GitHubJobs extends\
    \ StatefulWidget {\n  GitHubJobs({Key key, @required this.jobsClient})\n     \
    \ : assert(jobsClient != null),\n        super(key: key);\n  final GitHubJobsClient\
    \ jobsClient;\n  @override\n  _GitHubJobsState createState() => _GitHubJobsState();\n\
    }\nclass _GitHubJobsState extends State {\n  JobsBloc _jobsBloc;\n  @override\n\
    \  void initState() {\n    super.initState();\n    _jobsBloc = JobsBloc(jobsClient:\
    \ widget.jobsClient);\n  }\n  @override\n  Widget build(BuildContext context)\
    \ {\n    return Column(\n      children: [\n        Padding(\n          padding:\
    \ const EdgeInsets.all(8.0),\n          child: KeywordInput(\n            jobsBloc:\
    \ _jobsBloc,\n          ),\n        ),\n        Expanded(\n          child: JobsView(\n\
    \            jobsBloc: _jobsBloc,\n          ),\n        ),\n      ],\n    );\n\
    \  }\n  @override\n  void dispose() {\n    _jobsBloc.dispose();\n    super.dispose();\n\
    \  }\n}\nclass KeywordInput extends StatefulWidget {\n  KeywordInput({this.jobsBloc});\n\
    \  final JobsBloc jobsBloc;\n  @override\n  _KeywordInputState createState() =>\
    \ _KeywordInputState();\n}\nclass _KeywordInputState extends State {\n  final\
    \ GlobalKey> _keywordFormKey = GlobalKey();\n  @override\n  Widget build(BuildContext\
    \ context) {\n    return Row(\n      children: [\n        Expanded(\n        \
    \  child: TextFormField(\n            key: _keywordFormKey,\n          ),\n  \
    \      ),\n        IconButton(\n          icon: Icon(Icons.search),\n        \
    \  onPressed: () {\n            String keyword = _keywordFormKey.currentState?.value\
    \ ?? \"\";\n            if (keyword.isNotEmpty) {\n              widget.jobsBloc.dispatch(GetJobsEvent(keyword:\
    \ keyword));\n            }\n          },\n        ),\n      ],\n    );\n  }\n\
    }\nclass JobsView extends StatelessWidget {\n  JobsView({this.jobsBloc});\n  final\
    \ JobsBloc jobsBloc;\n  @override\n  Widget build(BuildContext context) {\n  \
    \  return BlocBuilder(\n      bloc: jobsBloc,\n      builder: (BuildContext context,\
    \ JobsState state) {\n        if (state is JobsEmpty) {\n          return Center(\n\
    \            child: Text('Input keyword and search'),\n          );\n        }\
    \ else if (state is JobsLoading) {\n          return Center(\n            child:\
    \ CircularProgressIndicator(),\n          );\n        } else if (state is JobsError)\
    \ {\n          return Center(\n            child: Text(\n              'Failed\
    \ to get jobs',\n              style: TextStyle(color: Colors.red),\n        \
    \    ),\n          );\n        } else if (state is JobsLoaded) {\n          return\
    \ JobsList(state.jobs);\n        }\n      },\n    );\n  }\n}\nListing 10-20\n\
    GitHub jobs widget using Bloc\n```\n\n## 10.7 使用 Redux 管理状态\n\n### 问题\n\n你想使用\
    \ Redux 作为状态管理方案。\n\n### 解决方案\n\n使用`redux`和`flux_redux`包。\n"
- fmt: '### Discussion


    Redux（[`https://redux.js.org/`](https://redux.js.org/)）是一个用于管理应用程序状态的流行库。Redux
    起源于 React，但已被移植到不同语言。`redux` 包是 Redux 的 Dart 实现。`flux_redux` 包允许在构建 Flutter 小部件时使用
    Redux 存储。如果您之前使用过 Redux，那么 Flutter 中使用的概念相同。


    Redux 使用一个全局对象作为状态。这个对象是应用程序的唯一数据源，被称为 store。动作被派发到 store 以更新状态。Reducer 函数接受当前状态和一个动作作为参数，并返回下一个状态。下一个状态成为
    reducer 函数下一次运行的输入。UI 小部件可以从 store 中选择部分数据来构建内容。


    要使用 `flutter_redux` 包，您需要将 `flutter_redux: ^0.5.3` 添加到 `pubspec.yaml` 文件的 `dependencies`
    中。我们将使用相同的 GitHub 职位列表示例来演示 Redux 在 Flutter 中的用法。


    让我们从状态开始。清单 [10-21](#479501_1_En_10_Chapter.xhtml#PC21) 中的 `JobsState` 类表示全局状态。该状态有三个属性：`loading`
    表示数据是否仍在加载，`error` 表示加载数据时是否发生错误，`data` 表示数据列表。通过使用 `copyWith()` 方法，我们可以通过更新某些属性来创建新的
    `JobsState` 对象。


    ```

    class JobsState extends Equatable {

    JobsState({bool loading, bool error, List data})

    : _loading = loading,

    _error = error,

    _data = data,

    super([loading, error, data]);

    final bool _loading;

    final bool _error;

    final List _data;

    bool get loading => _loading ?? false;

    bool get error => _error ?? false;

    List get data => _data ?? [];

    bool get empty => _loading == null && _error == null && _data == null;

    JobsState copyWith({bool loading, bool error, List data}) {

    return JobsState(

    loading: loading ?? this._loading,

    error: error ?? this._error,

    data: data ?? this._data,

    );

    }

    }

    Listing 10-21

    JobsState for Redux

    ```


    清单 [10-22](#479501_1_En_10_Chapter.xhtml#PC22) 展示了这些动作。这些动作会触发状态变化。


    ```

    abstract class JobsAction extends Equatable {

    JobsAction([List props = const []]) : super(props);

    }

    class LoadJobAction extends JobsAction {

    LoadJobAction({@required this.keyword})

    : assert(keyword != null),

    super([keyword]);

    final String keyword;

    }

    class JobLoadedAction extends JobsAction {

    JobLoadedAction({@required this.jobs})

    : assert(jobs != null),

    super([jobs]);

    final List jobs;

    }

    class JobLoadErrorAction extends JobsAction {}

    Listing 10-22

    Actions for Redux

    ```


    清单 [10-23](#479501_1_En_10_Chapter.xhtml#PC23) 展示了根据动作更新状态的 reducer 函数。


    ```

    JobsState jobsReducers(JobsState state, dynamic action) {

    if (action is LoadJobAction) {

    return state.copyWith(loading: true);

    } else if (action is JobLoadErrorAction) {

    return state.copyWith(loading: false, error: true);

    } else if (action is JobLoadedAction) {

    return state.copyWith(loading: false, data: action.jobs);

    }

    return state;

    }

    Listing 10-23

    Reducer function for Redux

    ```


    清单 [10-22](#479501_1_En_10_Chapter.xhtml#PC22) 中定义的动作只能用于同步操作。例如，如果您想要派发 `JobLoadedAction`，您需要先准备好
    `List<Job>` 对象。然而，加载职位数据的操作是异步的。您需要使用 thunk 函数作为 Redux store 的中间件。thunk 函数将 store
    作为唯一参数。它使用 store 来派发动作。thunk 动作可以像其他普通动作一样被派发到 store。


    清单 [10-24](#479501_1_En_10_Chapter.xhtml#PC24) 中的 `getJobs()` 函数接受一个 `GitHubJobsClient`
    对象和一个搜索关键词作为参数。该函数返回一个类型为 `ThunkAction<JobsState>` 的 thunk 函数。`ThunkAction` 来自
    `redux_thunk` 包。在 thunk 函数中，首先派发一个 `LoadJobAction`。然后使用 `GitHubJobsClient` 对象获取职位数据。根据数据加载的结果，派发
    `JobLoadedAction` 或 `JobLoadErrorAction`。


    ```

    ThunkAction getJobs(GitHubJobsClient jobsClient, String keyword) {

    return (Store store) async {

    store.dispatch(LoadJobAction(keyword: keyword));

    try {

    List jobs = await jobsClient.getJobs(keyword);

    store.dispatch(JobLoadedAction(jobs: jobs));

    } catch (e) {

    store.dispatch(JobLoadErrorAction());

    }

    };

    }

    Listing 10-24

    Thunk function for Redux

    ```


    现在我们可以使用 Redux store 来构建小部件。您可以使用两个辅助小部件来访问 store 中的数据。在清单 [10-25](#479501_1_En_10_Chapter.xhtml#PC25)
    中，`StoreBuilder` 小部件用于直接访问 store。store 作为构建函数的第二个参数可用。`StoreBuilder` 小部件通常用于需要派发动作的情况。`StoreConnector`
    小部件允许使用转换器函数先转换状态。当搜索图标被按下时，首先调用清单 [10-24](#479501_1_En_10_Chapter.xhtml#PC24)
    中的 `getJobs()` 函数来创建 thunk 函数，然后将 thunk 函数派发到 store。当使用 `StoreConnector` 小部件时，转换器函数简单地从
    store 获取当前状态。然后状态对象在构建函数中使用。


    ```

    class GitHubJobs extends StatefulWidget {

    GitHubJobs({

    Key key,

    @required this.store,

    @required this.jobsClient,

    })  : assert(store != null),

    assert(jobsClient != null),

    super(key: key);

    final Store store;

    final GitHubJobsClient jobsClient;

    @override

    _GitHubJobsState createState() => _GitHubJobsState();

    }

    class _GitHubJobsState extends State {

    @override

    Widget build(BuildContext context) {

    return StoreProvider(

    store: widget.store,

    child: Column(

    children: [

    Padding(

    padding: const EdgeInsets.all(8.0),

    child: KeywordInput(

    jobsClient: widget.jobsClient,

    ),

    ),

    Expanded(

    child: JobsView(),

    ),

    ],

    ),

    );

    }

    }

    class KeywordInput extends StatefulWidget {

    KeywordInput({this.jobsClient});

    final GitHubJobsClient jobsClient;

    @override

    _KeywordInputState createState() => _KeywordInputState();

    }

    class _KeywordInputState extends State {

    final GlobalKey> _keywordFormKey = GlobalKey();

    @override

    Widget build(BuildContext context) {

    return Row(

    children: [

    Expanded(

    child: TextFormField(

    key: _keywordFormKey,

    ),

    ),

    StoreBuilder(

    builder: (BuildContext context, Store store) {

    return IconButton(

    icon: Icon(Icons.search),

    onPressed: () {

    String keyword = _keywordFormKey.currentState?.value ?? ";

    if (keyword.isNotEmpty) {

    store.dispatch(getJobs(widget.jobsClient, keyword));

    }

    },

    );

    },

    ),

    ],

    );

    }

    }

    class JobsView extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return StoreConnector(

    converter: (Store store) => store.state,

    builder: (BuildContext context, JobsState state) {

    if (state.empty) {

    return Center(

    child: Text(''Input keyword and search''),

    );

    } else if (state.loading) {

    return Center(

    child: CircularProgressIndicator(),

    );

    } else if (state.error) {

    return Center(

    child: Text(

    ''Failed to get jobs'',

    style: TextStyle(color: Colors.red),

    ),

    );

    } else {

    return JobsList(state.data);

    }

    },

    );

    }

    }

    Listing 10-25

    GitHub jobs widget using Redux store

    ```


    最后一步是创建 store。清单 [10-26](#479501_1_En_10_Chapter.xhtml#PC26) 中的 store 是使用 reducer
    函数、初始状态和来自 `redux_thunk` 包的 thunk 中间件创建的。


    ```

    final store = new Store(

    jobsReducers,

    initialState: JobsState(),

    middleware: [thunkMiddleware],

    );

    Listing 10-26

    Create the store

    ```


    ## 10.8 使用 Mobx 管理状态


    ### 问题


    您想要使用 Mobx 来管理状态。


    ### 解决方案


    使用 `mobx` 和 `flutter_mobx` 包。'
  raw: '### Discussion


    Redux ( [`https://redux.js.org/`](https://redux.js.org/) ) is a popular library
    to manage state in apps. Originated for React, Redux has been ported to different
    languages. The `redux` package is a Dart implementation of Redux. The `flux_redux`
    package allows using Redux store when building Flutter widgets. If you have used
    Redux before, the same concepts are used in Flutter.


    Redux uses a single global object as the state. This object is the single source
    of truth for the app, and it’s called the store. Actions are dispatched to the
    store to update the state. Reducer functions accept the current state and an action
    as the parameters and return the next state. The next state becomes the input
    of the next run of the reducer function. UI widgets can select partial data from
    the store to build the content.


    To use `flutter_redux` package, you need to add `flutter_redux: ^0.5.3` to the
    `dependencies` of `pubspec.yaml` file. We’ll use the same example of listing jobs
    on GitHub to demonstrate the usage of Redux in Flutter.


    Let’s start from the state. `JobsState` class in Listing [10-21](#479501_1_En_10_Chapter.xhtml#PC21)
    represents the global state. The state has three properties, `loading` represents
    whether the data is still loading, `error` represents whether an error occurred
    when loading the data, and `data` presents the list of data. By using the `copyWith()`
    method, we can new `JobsState` objects by updating some properties.


    ```

    class JobsState extends Equatable {

    JobsState({bool loading, bool error, List data})

    : _loading = loading,

    _error = error,

    _data = data,

    super([loading, error, data]);

    final bool _loading;

    final bool _error;

    final List _data;

    bool get loading => _loading ?? false;

    bool get error => _error ?? false;

    List get data => _data ?? [];

    bool get empty => _loading == null && _error == null && _data == null;

    JobsState copyWith({bool loading, bool error, List data}) {

    return JobsState(

    loading: loading ?? this._loading,

    error: error ?? this._error,

    data: data ?? this._data,

    );

    }

    }

    Listing 10-21

    JobsState for Redux

    ```


    Listing [10-22](#479501_1_En_10_Chapter.xhtml#PC22) shows the actions. These actions
    trigger state changes.


    ```

    abstract class JobsAction extends Equatable {

    JobsAction([List props = const []]) : super(props);

    }

    class LoadJobAction extends JobsAction {

    LoadJobAction({@required this.keyword})

    : assert(keyword != null),

    super([keyword]);

    final String keyword;

    }

    class JobLoadedAction extends JobsAction {

    JobLoadedAction({@required this.jobs})

    : assert(jobs != null),

    super([jobs]);

    final List jobs;

    }

    class JobLoadErrorAction extends JobsAction {}

    Listing 10-22

    Actions for Redux

    ```


    Listing [10-23](#479501_1_En_10_Chapter.xhtml#PC23) shows the reducer function
    to update state according to the action.


    ```

    JobsState jobsReducers(JobsState state, dynamic action) {

    if (action is LoadJobAction) {

    return state.copyWith(loading: true);

    } else if (action is JobLoadErrorAction) {

    return state.copyWith(loading: false, error: true);

    } else if (action is JobLoadedAction) {

    return state.copyWith(loading: false, data: action.jobs);

    }

    return state;

    }

    Listing 10-23

    Reducer function for Redux

    ```


    Actions defined in Listing [10-22](#479501_1_En_10_Chapter.xhtml#PC22) can only
    be used for synchronous operations. For example, if you want to dispatch the `JobLoadedAction`,
    you need to have the `List<Job>` object ready first. However, the operation to
    load jobs data is asynchronous. You’ll need to use thunk functions as the middleware
    of Redux store. A thunk function takes the store as the only parameter. It uses
    the store to dispatch actions. A thunk action can be dispatched to the store,
    just like other normal actions.


    The `getJobs()` function in Listing [10-24](#479501_1_En_10_Chapter.xhtml#PC24)
    takes a `GitHubJobsClient` object and a search keyword as the parameters. This
    function returns a thunk function of type `ThunkAction<JobsState>`. `ThunkAction`
    comes from `redux_thunk` package. In the thunk function, a `LoadJobAction` is
    dispatched first. Then `GitHubJobsClient` object is used to get the jobs data.
    Depending on the result of data loading, a `JobLoadedAction` or `JobLoadErrorAction`
    is dispatched.


    ```

    ThunkAction getJobs(GitHubJobsClient jobsClient, String keyword) {

    return (Store store) async {

    store.dispatch(LoadJobAction(keyword: keyword));

    try {

    List jobs = await jobsClient.getJobs(keyword);

    store.dispatch(JobLoadedAction(jobs: jobs));

    } catch (e) {

    store.dispatch(JobLoadErrorAction());

    }

    };

    }

    Listing 10-24

    Thunk function for Redux

    ```


    Now we can use the Redux store to build the widgets. You can use two helper widgets
    to access data in the store. In Listing [10-25](#479501_1_En_10_Chapter.xhtml#PC25),
    `StoreBuilder` widget is used to provide direct access to the store. The store
    is available as the second parameter of the build function. `StoreBuilder` widget
    is usually used when you need to dispatch actions. `StoreConnector` widget allows
    using a converter function to transform the state first. When the search icon
    is pressed, the `getJobs()` function in Listing [10-24](#479501_1_En_10_Chapter.xhtml#PC24)
    is called first to create the thunk function, then dispatches the thunk function
    to the store. When using `StoreConnector` widget, the converter function simply
    gets the current state from the store. The state object is then used in build
    function.


    ```

    class GitHubJobs extends StatefulWidget {

    GitHubJobs({

    Key key,

    @required this.store,

