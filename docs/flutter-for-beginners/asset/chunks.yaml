    ## 6.5 选择文本


    ### 问题


    你想在文本输入中选择一些文本。


    ### 解决方案


    使用 `TextEditingController` 的 `selection` 属性。

    '
- fmt: '### Discussion


    在配方 6-1 中，您已经看到了使用`TextEditingController`来获取和设置使用`EditableText`的小部件文本的示例。`TextEditingController`也可用于获取用户选择的文本以及选择文本。这是通过获取或设置`selection`属性（类型为`TextSelection`）的值来实现的。


    `TextSelection`是`TextRange`的子类。您可以使用`TextRange.textInside()`来获取选中的文本。`TextSelection`类使用`baseOffset`和`extentOffset`属性分别表示选择的起始和终止位置。`baseOffset`的值可能大于、小于或等于`extentOffset`。如果`baseOffset`等于`extentOffset`，则表示选择已折叠。折叠的文本选择包含零个字符，但它们用于表示文本插入点。`TextSelection.collapsed()`构造函数可以在指定偏移量处创建一个折叠的选择。


    在清单 [6-9](#479501_1_En_6_Chapter.xhtml#PC9) 中，当文本选择发生变化时，会显示选中的文本。第一个按钮选择了范围 [0,
    5] 内的文本，而第二个按钮将光标移动到偏移量 1。


    ```

    class TextSelectionExample extends StatefulWidget {

    @override

    _TextSelectionExampleState createState() => _TextSelectionExampleState();

    }

    class _TextSelectionExampleState extends State {

    TextEditingController _controller;

    String _selection;

    @override

    void initState() {

    super.initState();

    _controller = new TextEditingController();

    _controller.addListener(_handleTextSelection);

    }

    @override

    void dispose() {

    _controller.removeListener(_handleTextSelection);

    super.dispose();

    }

    @override

    Widget build(BuildContext context) {

    return Column(

    crossAxisAlignment: CrossAxisAlignment.start,

    children: [

    TextField(

    controller: _controller,

    ),

    Row(

    children: [

    RaisedButton(

    child: Text(''Select text [0, 5]''),

    onPressed: () {

    setState(() {

    _controller.selection =

    TextSelection(baseOffset: 0, extentOffset: 5);

    });

    },

    ),

    RaisedButton(

    child: Text(''Move cursor to offset 1''),

    onPressed: () {

    setState(() {

    _controller.selection = TextSelection.collapsed(offset: 1);

    });

    },

    ),

    ],

    ),

    Text.rich(TextSpan(

    children: [

    TextSpan(

    text: ''Selected:'',

    style: TextStyle(fontWeight: FontWeight.bold),

    ),

    TextSpan(text: _selection ?? "),

    ],

    )),

    ],

    );

    }

    _handleTextSelection() {

    TextSelection selection = _controller.selection;

    if (selection != null) {

    setState(() {

    _selection = selection.textInside(_controller.text);

    });

    }

    }

    }

    Listing 6-9

    Text selection

    ```


    图 [6-8](#479501_1_En_6_Chapter.xhtml#Fig8) 显示了清单 [6-9](#479501_1_En_6_Chapter.xhtml#PC9)
    中代码的截图。


    ![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig8_HTML.jpg](images/479501_1_En_6_Chapter/479501_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Text selection


    ## 6.6 格式化文本


    ### 问题


    您想要格式化文本。


    ### 解决方案


    结合`EditableText`使用`TextInputFormatter`。


    ### 讨论


    当用户在文本输入中键入时，您可能希望验证和格式化输入的文本。一个常见的要求是移除黑名单中的字符。这可以通过将`TextInputFormatter`实例列表作为`TextField`和`CupertinoTextField`的`inputFormatters`参数提供来实现。


    `TextInputFormatter`是一个抽象类，只有`formatEditUpdate(TextEditingValue oldValue, TextEditingValue
    newValue)`方法需要实现。`oldValue`和`newValue`参数分别代表之前的文本和新文本。返回值是另一个代表格式化文本的`TextEditingValue`实例。`TextInputFormatter`实例可以链式使用。当链式使用时，调用`formatEditUpdate`方法的`oldValue`始终是之前的文本，但`newValue`的值是链中前一个`TextInputFormatter`实例调用`formatEditUpdate`方法的返回值。


    表 [6-5](#479501_1_En_6_Chapter.xhtml#Tab5) 中显示了`TextInputFormatter`已有的三个内置实现类。这些类用于`TextField`和`CupertinoTextField`的实现。例如，当`maxLines`参数值为
    1 时，`BlacklistingTextInputFormatter.singleLineFormatter`会被添加到`TextInputFormatter`实例列表中，以过滤掉“\n”字符。


    Table 6-5


    Implementations of TextInputFormatter


    | 名称 | 描述 |

    | --- | --- |

    | `LengthLimitingTextInputFormatter` | 限制可以输入的字符数量。 |

    | `BlacklistingTextInputFormatter` | 用给定的字符串替换与正则表达式模式匹配的字符。 |

    | `WhitelistingTextInputFormatter` | 只允许与给定正则表达式模式匹配的字符。 |


    除了声明新的`TextInputFormatter`子类之外，更简单的方法是使用`TextInputFormatter.withFunction()`方法，并传入一个与`formatEditUpdate()`方法类型匹配的函数。


    在清单 [6-10](#479501_1_En_6_Chapter.xhtml#PC10) 中，输入文本被格式化为大写。


    ```

    TextField(

    inputFormatters: [

    TextInputFormatter.withFunction((oldValue, newValue) {

    return newValue.copyWith(text: newValue.text?.toUpperCase());

    }),

    ],

    )

    Listing 6-10

    Format text

    ```


    ## 6.7 选择单个值


    ### 问题


    您想要从值列表中选择单个值。


    ### 解决方案


    使用一组`Radio`小部件。


    ### 讨论


    单选按钮通常用于需要单选场景。在一个组中，只能选择一个单选按钮。`Radio`类有一个类型参数`T`，代表值的类型。创建`Radio`实例时，您需要提供必需的参数，包括`value`、`groupValue`和`onChanged`。`Radio`小部件不维护任何状态。其外观完全由`value`和`groupValue`参数决定。当单选按钮组的选择发生变化时，会使用所选值调用`onChanged`监听器。表
    [6-6](#479501_1_En_6_Chapter.xhtml#Tab6) 显示了`Radio`构造函数的命名参数。


    Table 6-6


    Named parameters of Radio


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `value` | `T` | 此单选按钮的值。 |

    | `groupValue` | `T` | 此组单选按钮的选定值。`groupValue`对应的单选按钮处于选中状态。 |

    | `onChanged` | `ValueChanged<T>` | 选择变化时的监听器函数。 |

    | `activeColor` | `Color` | 此单选按钮被选中时的颜色。 |


    在清单 [6-11](#479501_1_En_6_Chapter.xhtml#PC11) 中，`Fruit.allFruits`变量是所有`Fruit`实例的列表。`_selectedFruit`是当前选定的`Fruit`实例。对于每个`Fruit`实例，都会创建一个`Radio<Fruit>`小部件，其`groupValue`设置为`_selectedFruit`。


