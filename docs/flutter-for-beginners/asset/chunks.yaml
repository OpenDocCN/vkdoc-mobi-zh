    ## 3.14 使用异常


    ### 问题


    你想处理 Dart 应用中的失败情况。


    ### 解决方案


    使用 `throw` 报告失败。使用 `try-catch-finally` 处理异常。


    ### 讨论


    代码会出错。代码报告失败并处理失败是很自然的事情。Dart 拥有与 Java 类似的异常机制，区别在于 Dart 中的所有异常都是非受检异常。Dart 中的方法不会声明它们可能抛出的异常，因此不强制要求捕获异常。然而，未捕获的异常会导致隔离区挂起，并可能导致程序终止。恰当的失败处理也是健壮应用的一个关键特征。


    #### 报告失败


    我们可以使用 `throw` 来抛出异常。实际上，所有非 `null` 对象都可以被抛出，而不仅仅是实现了 `Error` 或 `Exception` 类型。建议只抛出
    `Error` 和 `Exception` 类型的对象。


    `Error` 对象代表代码中不应该出现的 bug。例如，如果一个列表只包含三个元素，尝试访问第四个元素会导致抛出 `RangeError`。与 Exception
    不同，Error 不打算被捕获。当错误发生时，最安全的方式是终止程序。`Error` 带有关于其发生原因的清晰信息。


    与 `Error` 相比，`Exception` 被设计为通过编程方式捕获和处理。例如，发送 HTTP 请求可能不会成功，因此我们需要在代码中处理异常以应对失败。`Exception`
    通常携带关于失败的有用数据。我们应该创建继承自 `Exception` 的自定义类型来封装必要的数据。


    #### 捕获异常


    当抛出异常时，你可以捕获它以防止其传播，除非你重新抛出它。捕获异常的目的是处理它。如果你不想处理异常，就不应该捕获它。使用 `try`、`catch` 和
    `on` 来捕获异常。如果你不需要访问异常对象，仅使用 `on` 就足够了。使用 `catch` 可以访问异常对象和堆栈跟踪。使用 `on` 来指定要捕获的异常类型。


    当你捕获一个异常时，你应该处理它。然而，有时你可能只想部分处理它。在这种情况下，你应该使用 `rethrow` 重新抛出异常。捕获异常但不完全处理它是一个坏习惯。


    如果你希望无论是否抛出异常，某些代码都能运行，你可以将代码放在 `finally` 子句中。如果没有抛出异常，`finally` 子句会在 `try` 块之后运行。如果抛出了异常，`finally`
    子句会在匹配的 `catch` 子句之后运行。


    在清单 3-27 中，函数 `getNumber()` 抛出了一个自定义异常类型 `ValueTooLargeException`。在函数 `main()`
    中，该异常被捕获并重新抛出。


    ```

    import ''dart:math'' show Random;

    var random = Random();

    class ValueTooLargeException implements Exception {

    int value;

    ValueTooLargeException(this.value);

    @override

    String toString() {

    return ''ValueTooLargeException{value: $value}'';

    }

    }

    int getNumber() {

    var value = random.nextInt(10);

    if (value > 5) {

    throw ValueTooLargeException(value);

    }

    return value;

    }

    void main() {

    try {

    print(getNumber());

    } on ValueTooLargeException catch (e) {

    print(e);

    rethrow;

    } finally {

    print(''in finally'');

    }

    }

    清单 3-27

    使用异常

    ```


    ## 3.15 总结


    学习一门新的编程语言并非易事。尽管 Dart 与其他编程语言看起来相似，但它仍然有一些独特的特性。本章仅简要介绍了 Dart 中的重要特性。


    # 4. 部件基础


    在构建 Flutter 应用时，大部分时间你都在与部件（widget）打交道。本章提供关于 Flutter 中部件的基本背景信息。此外，还涵盖了显示文本、图片、图标、按钮和占位符的几个基本部件。


    ## 4.1 理解部件


    ### 问题


    你想知道如何在 Flutter 中使用组件。


    ### 解决方案


    部件在 Flutter 中无处不在。

