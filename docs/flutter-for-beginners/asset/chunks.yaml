    \ to view and accept it.\n\n4.  Flutter SDK requires other tools for iOS platform,\
    \ including libimobiledevice, usbmuxd, ideviceinstaller, ios-deploy, and CocoaPods\
    \ ( [`https://cocoapods.org/`](https://cocoapods.org/) ). All these tools can\
    \ be installed using Homebrew. If you run the command `flutter doctor`, it shows\
    \ the commands to install these tools using Homebrew. Simply run these commands\
    \ and use `flutter doctor` to check again. When you see the green tick of “iOS\
    \ toolchain,” the iOS platform is set up successfully for Flutter SDK to use;\
    \ see Figure [1-3](#479501_1_En_1_Chapter.xhtml#Fig3) for a sample output.\n\n\
    ## 1.5 Setting Up iOS Simulators\n\n### Problem\n\nYou need a quick way to test\
    \ Flutter apps on iOS platform.\n\n### Solution\n\nSet up the iOS simulator.\n\
    \n### Discussion\n\nXcode provides simulators for different iOS versions. You\
    \ can download additional simulators using the tab Components in Xcode ➤ Preferences.\
    \ To open the simulator, run the following command.\n\n```\n$ open -a Simulator\n\
    ```\n\nWhen the simulator is opened, you can switch the combination of different\
    \ devices and iOS versions using the menu **Hardware** ➤ **Device**.\n\nAfter\
    \ the simulator is started, running `flutter devices` should show the simulator.\n\
    \n## 1.6 Setting Up iOS Devices\n\n### Problem\n\nYou have finished the testing\
    \ of your Flutter apps on iOS simulator, and you want to test them on real iOS\
    \ devices.\n\n### Solution\n\nDeploy Flutter apps to iOS devices."
  trans: "\n### 讨论\n\nFlutter SDK 支持 Linux 平台。然而，由于存在众多不同的 Linux 发行版，安装 Flutter SDK\
    \ 的实际步骤可能略有差异。本指南基于在 Ubuntu 18.04 LTS 上安装 Flutter SDK。\n\nFlutter SDK 要求本地环境中具备若干命令行工具，包括\
    \ `bash`、`mkdir`、`rm`、`git`、`curl`、`unzip` 和 `which`。对于大多数 Linux 发行版，`bash`、`mkdir`、`rm`、`unzip`\
    \ 和 `which` 这些命令默认应该已经包含在内。最简便的验证方法是打开一个终端窗口并输入这些命令查看输出。如果某个命令未安装，你会看到“command\
    \ not found”错误。`git` 和 `curl` 很可能默认未包含。大多数 Linux 发行版提供了内置的包管理器来安装这些工具。对于 Ubuntu，可以使用\
    \ `apt-get`，参见以下命令。\n\n```\n$ sudo apt-get update\n$ sudo apt-get install -y curl\
    \ git\n```\n\n安装成功完成后，你可以输入 `curl` 和 `git` 命令进行验证。\n\n现在，你可以从官方网站（`https://flutter.dev/docs/get-started/install/linux`）下载\
    \ Flutter SDK 压缩包。将下载的压缩文件解压到本地机器的目标位置。打开一个终端窗口，导航到解压后的 Flutter SDK 目录，并运行以下命令来验证安装。\n\
    \n```\n$ bin/flutter --version\n```\n\n建议将 Flutter SDK 的 `bin` 目录添加到 `PATH` 环境变量中，以便在任何终端会话中都能运行\
    \ `flutter` 命令。对于 Ubuntu，你可以编辑 `~/.profile` 文件。\n\n```\n$ nano ~/.profile\n```\n\
    \n将以下行添加到此文件并保存。\n\n```\nexport PATH=\"/bin:$PATH\"\n```\n\n在当前终端窗口中，你需要运行 `source\
    \ ~/.profile` 使更改生效。或者，你可以直接创建一个新的终端窗口。在任何终端窗口中输入 `flutter --version` 进行验证。你会看到与图\
    \ 1-2 相同的输出。\n\nLinux 仅支持 Android 平台。按照指南 1-7 继续后续设置。\n\n## 1.3 在 macOS 上安装 Flutter\
    \ SDK\n\n### 问题\n\n你有一台 macOS 机器，并希望在这台机器上开始 Flutter 开发。\n\n### 解决方案\n\n在 macOS\
    \ 机器上安装 Flutter SDK 并设置 Android 和 iOS 平台。\n\n### 讨论\n\n对于 macOS，Flutter SDK 要求本地环境中具备若干命令行工具。这些工具包括\
    \ `bash`、`mkdir`、`rm`、`git`、`curl`、`unzip` 和 `which`。macOS 应该已经将这些工具作为系统的一部分包含在内。你只需在终端中输入这些命令即可验证。安装缺失工具的最简便方法是使用\
    \ Homebrew（`https://brew.sh/`）。在设置 iOS 开发环境时，Homebrew 也很重要。使用 `brew install` 来安装工具，例如，使用\
    \ `brew install git` 来安装 Git。\n\n安装所需工具后，我们可以从官方网站（`https://flutter.dev/docs/get-started/install/macos`）下载\
    \ Flutter SDK 压缩包。将下载的压缩文件解压到本地机器的目标位置。`flutter` 命令位于解压位置的 `bin` 目录下。\n\n为了在任何终端会话中运行\
    \ `flutter` 命令，应更新 `PATH` 环境变量，使其包含 Flutter SDK 的 `bin` 目录。这通常通过更新 shell 的配置文件来完成。对于默认的\
    \ bash，此文件是 `~/.bash_profile`。对于 zsh，此文件是 `~/.zshrc`。修改此文件以包含以下行。\n\n```\nexport\
    \ PATH=/bin:$PATH\n```\n\n要使当前终端窗口使用更新后的 `PATH`，你需要运行 `source ~/.bash_profile`。你也可以启动一个新的终端窗口，它会自动使用\
    \ `PATH` 的更新值。\n\n在任何终端窗口中运行 `flutter --version` 以验证安装。你会看到与图 1-2 相同的输出。\n\nmacOS\
    \ 同时支持 Android 和 iOS 平台。按照指南 1-4 和 1-7 继续后续设置。\n\n## 1.4 设置 iOS 平台\n\n### 问题\n\
    \n你想为 iOS 平台开发 Flutter 应用。\n\n### 解决方案\n\n在您的 Mac 上为 Flutter SDK 设置 iOS 平台。\n\n\
    ### 讨论\n\n要为 iOS 开发 Flutter 应用，你需要一台至少安装了 Xcode 9.0 的 Mac。要设置 iOS 平台，你需要完成以下步骤：\n\
    \n![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig3_HTML.jpg](img/479501_1_En_1_Fig3_HTML.jpg)\
    \  \n图 1-3：`flutter doctor` 的输出\n\n1.  从 App Store 安装 Xcode（`https://developer.apple.com/xcode/`）。\n\
    \n2.  验证 Xcode 命令行工具的路径。运行以下命令以显示当前命令行工具的路径。通常你应该会看到类似 `/Applications/Xcode.app/Contents/Developer`\
    \ 的输出。\n\n    ```\n    $ xcode-select -p\n    ```\n\n    如果输出中显示的路径不是您想要的，例如，您安装了不同版本的\
    \ Xcode 命令行工具，请使用 `xcode-select -s` 切换到不同的路径。如果您没有安装命令行工具，请使用 `xcode-select --install`\
    \ 打开安装对话框。\n\n3.  您需要打开一次 Xcode 以接受其许可协议。或者，您可以选择运行命令 `sudo xcodebuild -license`\
    \ 来查看并接受它。\n\n4.  Flutter SDK 需要用于 iOS 平台的其他工具，包括 `libimobiledevice`、`usbmuxd`、`ideviceinstaller`、`ios-deploy`\
    \ 和 CocoaPods（`https://cocoapods.org/`）。所有这些工具都可以使用 Homebrew 安装。如果您运行 `flutter\
    \ doctor` 命令，它会显示使用 Homebrew 安装这些工具的命令。只需运行这些命令，然后再次使用 `flutter doctor` 进行检查。当您看到“iOS\
    \ toolchain”旁边出现绿色勾选标记时，表示 iOS 平台已成功设置为 Flutter SDK 使用；示例输出见图 1-3。\n\n## 1.5 设置\
    \ iOS 模拟器\n\n### 问题\n\n您需要一种快速的方法在 iOS 平台上测试 Flutter 应用。\n\n### 解决方案\n\n设置 iOS\
    \ 模拟器。\n\n### 讨论\n\nXcode 为不同的 iOS 版本提供了模拟器。您可以使用 Xcode ➤ Preferences 中的 Components\
    \ 选项卡下载额外的模拟器。要打开模拟器，请运行以下命令。\n\n```\n$ open -a Simulator\n```\n\n当模拟器打开后，您可以通过菜单\
    \ **Hardware** ➤ **Device** 切换不同设备与 iOS 版本的组合。\n\n模拟器启动后，运行 `flutter devices`\
    \ 应该会显示该模拟器。\n\n## 1.6 设置 iOS 真机设备\n\n### 问题\n\n您已经在 iOS 模拟器上完成了 Flutter 应用的测试，现在希望在真实的\
    \ iOS 设备上测试它们。\n\n### 解决方案\n\n将 Flutter 应用部署到 iOS 真机设备。\n"
- fmt: '### Discussion


    Before deploying Flutter apps to iOS devices, you need to run `flutter doctor`
    to verify that iOS toolchain is set up correctly. To develop and test Flutter
    apps on devices, you need to have an Apple ID. If you want to distribute apps
    to App Store, you also need to enroll Apple Developer Program.


    The first time you connect a physical device for iOS development, you need to
    trust the Mac to connect your device. Flutter apps need to be signed before deploying
    to devices. Open the `ios/Runner.xcworkspace` file of the Flutter app in Xcode.
    In the **General** tab, select the correct team in the **Signing** section. If
    you select the connected device as the running target, Xcode will finish the necessary
    configurations for code signing. The Bundle Identifier must be unique.


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig4_HTML.jpg](images/479501_1_En_1_Chapter/479501_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    App signing in Xcode


    The Flutter app can be deployed to the device using Xcode or the command `flutter
    run`. The first time you deploy the app, you may need to trust the development
    certificate in **General** ➤ **Device Management** of the Settings app on the
    iOS device.


    ## 1.7 Setting Up Android Platform


    ### Problem


    You want to develop Flutter apps for Android platform.


    ### Solution


    Install Android Studio to set up Android platform on your local machine.


    ### Discussion


    To develop Flutter apps for Android platform, we need to set up Android platform
    first. Flutter SDK requires a full installation of Android Studio for its Android
    platform dependencies, so we have to install Android Studio.


    Go to Android Studio download page (`https://developer.android.com/studio/`) and
    click the "DOWNLOAD ANDROID STUDIO" button. You need to accept the terms and conditions
    to download it. The download page checks your platform and provides the most suitable
    version to download. If the provided option is not what you want, click the "DOWNLOAD
    OPTIONS" and select from the list of all download options; see Figure 1-5.


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig5_HTML.jpg](images/479501_1_En_1_Chapter/479501_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Download options of Android Studio


    Android Studio provides a GUI-based installer, so it''s very easy to get it installed
    and running on the local machine. Installing Android Studio also installs Android
    SDK, Android SDK platform tools, and Android SDK build tools. Even you choose
    not to use Android Studio as the IDE, Android SDK and related tools are still
    required for Android development.


    In the Android SDK page of preferences in Android Studio, you can also install
    additional Android SDK platforms and tools; see Figure 1-6. Android Studio also
    prompts available updates to installed Android SDK platforms and tools.


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig6_HTML.jpg](images/479501_1_En_1_Chapter/479501_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Manage Android SDK in Android Studio


    ## 1.8 Setting Up Android Emulators


    ### Problem


    You need a quick way to test Flutter apps for Android platform.


    ### Solution


    Set up the Android emulators.


    ### Discussion


    When developing Flutter apps, you can run them on Android emulators to see the
    results of running apps. To set up Android emulators, you can go through the following
    steps.


    Open an Android project in Android Studio and select **Tools** ➤ Android ➤ **AVD
    Manager** to open AVD Manager and click "Create Virtual Device…"; see Figure 1-7.


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig7_HTML.jpg](images/479501_1_En_1_Chapter/479501_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Android Virtual Device Manager


    Choose a device definition, for example, Nexus 6P, and click Next; see Figure
    1-8.


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig8_HTML.jpg](images/479501_1_En_1_Chapter/479501_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Select Hardware


    Select a system image for the Android version you want to emulate and click Next;
    see Figure 1-9.


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig9_HTML.jpg](images/479501_1_En_1_Chapter/479501_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Select a system image


    Select Hardware - GLE 2.0 for Emulated Performance to enable hardware acceleration
    and click Finish; see Figure 1-10.


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig10_HTML.jpg](images/479501_1_En_1_Chapter/479501_1_En_1_Fig10_HTML.jpg)


    Figure 1-10


    Select emulated performance


    A new AVD is created and listed in AVD Manager. Android Studio official web site
    provides a comprehensive guide (`https://developer.android.com/studio/run/managing-avds`)
    on how to manage AVDs, if you want to know more details about AVD configurations.


    In the AVD Manager, click the green triangle button to start the emulator. It
    may take some time for the emulator to start up and show the default Android home
    screen.


    ## 1.9 Setting Up Android Devices


    ### Problem


    You have finished the testing of your Flutter apps on emulators, and you want
    to test them on real Android devices.


    ### Solution


    Set up your Android device to run Flutter apps.


    ### Discussion


    To set up your Android device, you can go through the following steps:


    1. You need to enable Developer options and USB debugging on your device. Check
    the instructions on the official Android web site (`https://developer.android.com/studio/debug/dev-options#enable`).
    You may also need to install Google USB driver (`https://developer.android.com/studio/run/win-usb`)
    on Windows machines.


    2. Plug your device into your computer with a USB cable. The device prompts a
    dialog to ask for permissions, authorizing your computer to access your device.


    3. Run the command `flutter devices` to verify Flutter SDK can recognize your
    device.


    The Flutter app can be deployed to the device using Android Studio or the command
    `flutter run`.


    ## 1.10 Creating Flutter Apps Using Command Line


    ### Problem


    You have already set up your local environment to develop Flutter apps. Even though
    using Android Studio or VS Code is a good choice for development, you may still
    want to know how to do this from command line.


    ### Solution


    Use the commands from Flutter SDK to create and build Flutter apps.


    ### Discussion


    Using tools like Android Studio and VS Code can make Flutter development much
    easier. However, it''s still valuable to know how to build Flutter apps using
    the command-line tools. This is important for continuous integration. It also
    allows you to use any other editors to develop Flutter apps.


    The command `flutter create` can be used to create a new Flutter app. Actually,
    Android Studio and VS Code both use this command to create new Flutter apps. The
    following command creates a new Flutter app in the directory `flutter_app`.


    ```

    $ flutter create flutter_app

    ```


    This command creates various files in the specified directory as the skeleton
    code of the new app. Navigate to the directory `flutter_app` and use `flutter
    run` to run this app.


    ## 1.11 Creating Flutter Apps Using Android Studio


    ### Problem


    You want to have a powerful IDE that meets most of the requirements when developing
    Flutter apps.


    ### Solution


    Use Android Studio to create Flutter apps.'
