- fmt: '### `TextSpan`


    构造函数`Text.rich()`接受一个`TextSpan`对象作为必需的参数。`TextSpan`表示一个不可变的文本段。`TextSpan()`构造函数有四个命名参数；参见表[4-5](#479501_1_En_4_Chapter.xhtml#Tab5)。`TextSpan`按层次结构组织。一个`TextSpan`对象可以拥有多个`TextSpan`对象作为其子节点。子节点`TextSpan`可以覆盖其父节点的样式。


    **表 4-5** `TextSpan()`的命名参数


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `style` | `TextStyle` | 文本及其子节点的样式。 |

    | `text` | `String` | 该文本段中的文本。 |

    | `children` | `List<TextSpan>` | 作为该文本段子节点的`TextSpan`。 |

    | `recognizer` | `GestureRecognizer` | 用于接收事件的手势识别器。 |


    清单[4-8](#479501_1_En_4_Chapter.xhtml#PC8)展示了使用`Text.rich()`的示例。该示例使用不同的样式显示句子“The
    quick brown fox jumps over the lazy dog”。


    ```

    Text.rich(TextSpan(

    style: TextStyle(

    fontSize: 16,

    ),

    children: [

    TextSpan(text: ''The quick brown ''),

    TextSpan(

    text: ''fox'',

    style: TextStyle(

    fontWeight: FontWeight.bold,

    color: Colors.red,

    )),

    TextSpan(text: '' jumps over the lazy ''),

    TextSpan(

    text: ''dog'',

    style: TextStyle(

    color: Colors.blue,

    )),

    ],

    ));

    清单 4-8

    Text.rich()示例

    ```


    ### `RichText`


    `RichText`始终使用`TextSpan`对象来表示文本和样式。`RichText()`构造函数有一个必需的命名参数`text`，类型为`TextSpan`。它还具有可选的命名参数`textAlign`、`textDirection`、`softWrap`、`overflow`、`textScaleFactor`、`maxLines`和`locale`。这些可选的命名参数与表[4-2](#479501_1_En_4_Chapter.xhtml#Tab2)中所示的`Text()`构造函数含义相同。


    在`RichText`中显示的文本需要显式指定样式。您可以使用`DefaultTextStyle.of()`从`BuildContext`对象获取默认样式。这正是`Text`在内部所做的。`Text`组件获取默认样式，并与`style`参数中提供的样式合并，然后创建一个`RichText`，其中包含一个包装了文本和合并后样式的`TextSpan`。如果您发现确实需要以默认样式为基础，则应直接使用`Text`而不是`RichText`。清单[4-9](#479501_1_En_4_Chapter.xhtml#PC9)展示了一个使用`RichText`的示例。


    ```

    RichText(

    text: TextSpan(

    text: ''Level 1'',

    style: TextStyle(color: Colors.black),

    children: [

    TextSpan(

    text: ''Level 2'',

    style: TextStyle(fontWeight: FontWeight.bold),

    children: [

    TextSpan(

    text: ''Level 3'',

    style: TextStyle(color: Colors.red),

    ),

    ],

    ),

    ],

    ),

    );

    清单 4-9

    RichText示例

    ```


    ## 4.7 为文本应用样式


    ### 问题


    您希望显示的文本具有不同的样式。


    ### 解决方案


    使用`TextStyle`来描述样式。


    ### 讨论


    `TextStyle`描述了应用于文本的样式。`TextStyle()`构造函数有许多描述样式的命名参数；参见表[4-6](#479501_1_En_4_Chapter.xhtml#Tab6)。


    **表 4-6** `TextStyle()`的命名参数


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `color` | `Color` | 文本的颜色。 |

    | `fontSize` | `Double` | 字体大小。 |

    | `fontWeight` | `FontWeight` | 字型的粗细。 |

    | `fontStyle` | `FontStyle` | 字体的变体。 |

    | `letterSpacing` | `Double` | 每个字母之间的间距。 |

    | `wordSpacing` | `Double` | 每个单词之间的间距。 |

    | `textBaseline` | `TextBaseline` | 用于对齐此文本段及其父文本段的公共基线。 |

    | `height` | `Double` | 文本行高。 |

    | `locale` | `Locale` | 用于选择区域特定字形的区域设置。 |

    | `foreground` | `Paint` | 文本的前景色。 |

    | `background` | `Paint` | 文本的背景色。 |

    | `shadows` | `List<Shadow>` | 绘制在文本下方的阴影。 |

    | `decoration` | `TextDecoration` | 文本的装饰。 |

    | `decorationColor` | `Color` | 文本装饰的颜色。 |

    | `decorationStyle` | `TextDecorationStyle` | 文本装饰的样式。 |

    | `debugLabel` | `String` | 用于调试的样式描述。 |

    | `fontFamily` | `String` | 字体的名称。 |

    | `package` | `String` | 如果字体在包中定义，则与`fontFamily`一起使用。 |


    `FontWeight`类定义了值`w100`、`w200`、`w300`、`w400`、`w500`、`w600`、`w700`、`w800`和`w900`。`FontWeight.w100`是最细的，而`FontWeight.w900`是最粗的。`FontWeight.bold`是`FontWeight.w700`的别名，而`FontWeight.normal`是`FontWeight.w400`的别名。`FontStyle`是一个枚举类型，具有两个值：`italic`和`normal`。`TextBaseline`是一个枚举类型，具有值`alphabetic`和`ideographic`。


    `TextDecoration`类定义了不同类型的文本装饰。您也可以使用构造函数`TextDecoration.combine()`通过组合一个`TextDecoration`实例列表来创建一个新的`TextDecoration`实例。例如，`TextDecoration.combine([TextDecoration.underline,
    TextDecoration.overline])`实例会在文本下方和上方绘制线条。表[4-7](#479501_1_En_4_Chapter.xhtml#Tab7)展示了`TextDecoration`中的常量。


    **表 4-7** `TextDecoration`常量


    | 名称 | 描述 |

    | --- | --- |

    | `none` | 无装饰。 |

    | `underline` | 在文本下方绘制一条线。 |

    | `overline` | 在文本上方绘制一条线。 |

    | `lineThrough` | 穿过文本绘制一条线。 |


    `TextDecorationStyle`是一个枚举类型，其值如表[4-8](#479501_1_En_4_Chapter.xhtml#Tab8)所示。`TextDecorationStyle`定义了由`TextDecoration`创建的线条的样式。


    **表 4-8** `TextDecorationStyle`值


    | 名称 | 描述 |

    | --- | --- |

    | `solid` | 绘制实线。 |

    | `double` | 绘制双线。 |

    | `dotted` | 绘制点线。 |

    | `dashed` | 绘制虚线。 |

    | `wavy` | 绘制波浪线。 |


    清单[4-10](#479501_1_En_4_Chapter.xhtml#PC10)展示了使用`TextDecoration`和`TextDecorationStyle`的示例。


    ```

    Text(

    ''Decoration'',

    style: TextStyle(

    fontWeight: FontWeight.w900,

    decoration: TextDecoration.lineThrough,

    decorationStyle: TextDecorationStyle.dashed,

    ),

    );

    清单 4-10

    使用TextDecoration和TextDecorationStyle的示例

    ```


    如果您想创建一个`TextStyle`实例的副本并更新某些属性，请使用`copyWith()`方法。`apply()`方法也会创建一个新的`TextStyle`实例，但它允许使用因子和差值来更新某些属性。例如，命名参数`fontSizeFactor`和`fontSizeDelta`可以更新字体大小。`fontSize`的更新值通过`fontSize
    * fontSizeFactor + fontSizeDelta`计算得出。您也可以使用相同的模式来更新`height`、`letterSpacing`和`wordSpacing`的值。对于`fontWeight`，只支持`fontWeightDelta`。在清单[4-11](#479501_1_En_4_Chapter.xhtml#PC11)中，应用于文本的`TextStyle`更新了`fontSize`和`decoration`的值。


    ```

    Text(

    ''Scale'',

    style: DefaultTextStyle.of(context).style.apply(

    fontSizeFactor: 2.0,

    fontSizeDelta: 1,

    decoration: TextDecoration.none,

    ),

    );

    清单 4-11

    更新TextStyle

    ```


    ## 4.8 显示图像


    ### 问题


    您希望显示从网络加载的图像。


    ### 解决方案


    使用`Image.network()`并传入图像URL来加载和显示图像。'
  raw: '### TextSpan


    The constructor `Text.rich()` takes a `TextSpan` object as the required parameter.
    `TextSpan` represents an immutable span of text. `TextSpan()` constructor has
    four named parameters; see Table [4-5](#479501_1_En_4_Chapter.xhtml#Tab5). `TextSpan`s
    are organized in a hierarchy. A `TextSpan` object may have many `TextSpan` objects
    as the children. Children `TextSpan`s can override styles from their parent.


    Table 4-5


    Named parameters of TextSpan()


    | Name | Type | Description |

    | --- | --- | --- |

    | `style` | `TextStyle` | Style of the text and children. |

    | `text` | `String` | Text in the span. |

    | `children` | `List<TextSpan>` | `TextSpan`s as children of this span. |

    | `recognizer` | `GestureRecognizer` | A gesture recognizer to receive events.
    |


    Listing [4-8](#479501_1_En_4_Chapter.xhtml#PC8) shows the example of using `Text.rich()`.
    This example displays the sentence “The quick brown fox jumps over the lazy dog”
    using different styles.


    ```

    Text.rich(TextSpan(

    style: TextStyle(

    fontSize: 16,

    ),

    children: [

    TextSpan(text: ''The quick brown ''),

    TextSpan(

    text: ''fox'',

    style: TextStyle(

    fontWeight: FontWeight.bold,

    color: Colors.red,

    )),

    TextSpan(text: '' jumps over the lazy ''),

    TextSpan(

    text: ''dog'',

    style: TextStyle(

    color: Colors.blue,

    )),

    ],

    ));

    Listing 4-8

    Example of Text.rich()

    ```


    ### RichText


    `RichText` always uses `TextSpan` objects to represent text and styles. `RichText()`
    constructor has a required named parameter `text` of the type `TextSpan`. It also
    has optional named parameters `textAlign`, `textDirection`, `softWrap`, `overflow`,
    `textScaleFactor`, `maxLines`, and `locale`. These optional named parameters have
    the same meaning as `Text()` constructor shown in Table [4-2](#479501_1_En_4_Chapter.xhtml#Tab2).


    Text displayed in `RichText` requires explicit styling. You can use `DefaultTextStyle.of()`
    to get the default style from the `BuildContext` object. This is exactly what
    `Text` does internally. `Text` widget gets the default style and merges with the
    style provided in the style parameter, then creates a `RichText` with a `TextSpan`
    wrapping the text and merged style. If you find out that you do need to use the
    default style as the base, you should use `Text` directly instead of `RichText`.
    Listing [4-9](#479501_1_En_4_Chapter.xhtml#PC9) shows an example of using `RichText`.


    ```

    RichText(

    text: TextSpan(

    text: ''Level 1'',

    style: TextStyle(color: Colors.black),

    children: [

    TextSpan(

    text: ''Level 2'',

    style: TextStyle(fontWeight: FontWeight.bold),

    children: [

    TextSpan(

    text: ''Level 3'',

    style: TextStyle(color: Colors.red),

    ),

    ],

    ),

    ],

    ),

    );

    Listing 4-9

    Example of RichText

    ```


    ## 4.7 Applying Styles to Text


    ### Problem


    You want the displayed text to have different styles.


    ### Solution


    Use `TextStyle` to describe styles.


    ### Discussion


    `TextStyle` describes styles applied to text. `TextStyle()` constructor has many
    named parameters to describe the style; see Table [4-6](#479501_1_En_4_Chapter.xhtml#Tab6).


    Table 4-6


    Named parameters of TextStyle()


    | Name | Type | Description |

    | --- | --- | --- |

    | `color` | `Color` | Color of the text. |

    | `fontSize` | `Double` | Size of font. |

    | `fontWeight` | `FontWeight` | Typeface thickness. |

    | `fontStyle` | `FontStyle` | Typeface variant. |

    | `letterSpacing` | `Double` | Space between each letter. |

    | `wordSpacing` | `Double` | Space between each word. |

    | `textBaseLine` | `TextBaseLine` | Common baseline to align this text span and
    its parent span. |

    | `height` | `Double` | Height of the text. |

    | `locale` | `Locale` | Locale to select region-specific glyphs. |

    | `foreground` | `Paint` | Foreground for the text. |

    | `background` | `Paint` | Background for the text. |

    | `shadows` | `List<Shadow>` | Shadows painted underneath the text. |

    | `decoration` | `TextDecoration` | Decoration of the text. |

    | `decorationColor` | `Color` | Color of text decorations. |

    | `decorationStyle` | `TextDecorationStyle` | Style of text decorations. |

    | `debugLabel` | `String` | Description of the style for debugging. |

    | `fontFamily` | `String` | Name of the font. |

    | `package` | `String` | Use with `fontFamily` if the font is defined in a package.
    |


    `FontWeight` class defines values `w100`, `w200`, `w300`, `w400`, `w500`, `w600`,
    `w700`, `w800`, and `w900`. `FontWeight.w100` is the thinnest, while `w900` is
    the thickest. `FontWeight.bold` is an alias of `FontWeight.w700`, while `FontWeight.normal`
    is an alias of `FontWeight.w400`. `FontStyle` is an enum type with two values
    `italic` and `normal`. `TextBaseline` is an enum type with values `alphabetic`
    and `ideographic`.


    `TextDecoration` class defines different types of text decorations. You can also
    use constructor `TextDecoration.combine()` to create a new `TextDecoration` instance
    by combing a list of `TextDecoration` instances. For example, `TextDecoration.combine([TextDecoration.underline,
    TextDecoration.overline])` instance draws lines underneath and above text. Table
    [4-7](#479501_1_En_4_Chapter.xhtml#Tab7) shows constants in `TextDecoration`.


    Table 4-7


    TextDecoration constants


    | Name | Description |

    | --- | --- |

    | `none` | No decoration. |

    | `underline` | Draw a line underneath text. |

    | `overline` | Draw a line above text. |

    | `lineThrough` | Draw a line through text. |


    `TextDecorationStyle` is an enum type with values shown in Table [4-8](#479501_1_En_4_Chapter.xhtml#Tab8).
    `TextDecorationStyle` defines the style of lines created by `TextDecoration`.


    Table 4-8


    TextDecorationStyle values


    | Name | Description |

    | --- | --- |

    | `solid` | Draw a solid line. |

    | `double` | Draw two lines. |

    | `dotted` | Draw a dotted line. |

    | `dashed` | Draw a dashed line. |

    | `wavy` | Draw a sinusoidal line. |


    Listing [4-10](#479501_1_En_4_Chapter.xhtml#PC10) shows an example of using `TextDecoration`
    and `TextDecorationStyle`.


    ```

    Text(

    ''Decoration'',

    style: TextStyle(

    fontWeight: FontWeight.w900,

    decoration: TextDecoration.lineThrough,

    decorationStyle: TextDecorationStyle.dashed,

    ),

    );

    Listing 4-10

    Example of using TextDecoration and TextDecorationStyle

    ```


    If you want to create a copy of a `TextStyle` instance with some properties updated,
    use the `copyWith()` method . The `apply()` method also creates a new `TextStyle`
    instance, but it allows updating some properties using factor and delta. For example,
    the named parameters `fontSizeFactor` and `fontSizeDelta` can update the font
    size. The updated value of `fontSize` is calculated with `"fontSize * fontSizeFactor
    + fontSizeDelta"`. You can also update values of `height`, `letterSpacing`, and
    `wordSpacing` using the same pattern. For `fontWeight`, only `fontWeightDelta`
    is supported. In Listing [4-11](#479501_1_En_4_Chapter.xhtml#PC11), the `TextStyle`
    applied to the text has updated values of `fontSize` and `decoration`.


    ```

    Text(

    ''Scale'',

    style: DefaultTextStyle.of(context).style.apply(

    fontSizeFactor: 2.0,

    fontSizeDelta: 1,

    decoration: TextDecoration.none,

    ),

    );

    Listing 4-11

    Update TextStyle

    ```


    ## 4.8 Displaying Images


    ### Problem


    You want to display images loaded from network.


    ### Solution


    Use `Image.network()` with the image URL to load and display an image.'
