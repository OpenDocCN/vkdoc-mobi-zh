  raw: '### Discussion


    When using stateful widgets to manage state, the state is stored in `State` objects.
    If a descendant widget needs to access the state, the state needs to be passed
    down to it from the root of subtree, just like how `count` state is passed in
    Listing [10-2](#479501_1_En_10_Chapter.xhtml#PC2). When the widget has a relatively
    deep subtree structure, it’s inconvenient to add constructor parameters for passing
    the state down. In this case, using `InheritedWidget` is a better choice.


    When I`nheritedWidget` is used, the method `BuildContext.inheritFromWidgetOfExactType()`
    can get the nearest instance of a particular type of inherited widget from the
    build context. Descendant widgets can easily access state data stored in an inherited
    widget. When `inheritFromWidgetOfExactType()` method is called, the build context
    registers itself to the inherited widget. When the inherited widget changes, the
    build context is rebuilt automatically to get the new values from the inherited
    widget. This means no manual updates are required for descendant widgets that
    use state from the inherited widget.


    The `Config` class in Listing [10-3](#479501_1_En_10_Chapter.xhtml#PC3) represents
    the state. It has `color` and `fontSize` properties. `Config` class overrides
    `==` operator and `hashCode` property to implement correct equality check. The
    `copyWith()` method can be used to create new instances of `Config` class by updating
    a partial set of properties. The `Config.fallback()` constructor creates a `Config`
    object with default values.


    ```

    class Config {

    const Config({this.color, this.fontSize});

    const Config.fallback()

    : color = Colors.red,

    fontSize = 12.0;

    final Color color;

    final double fontSize;

    Config copyWith({Color color, double fontSize}) {

    return Config(

    color: color ?? this.color,

    fontSize: fontSize ?? this.fontSize,

    );

    }

    @override

    bool operator ==(other) {

    if (other.runtimeType != runtimeType) return false;

    final Config typedOther = other;

    return color == typedOther.color && fontSize == typedOther.fontSize;

    }

    @override

    int get hashCode => hashValues(color, fontSize);

    }

    Listing 10-3

    Config class for inherited widget

    ```


    The `ConfigWidget` in Listing [10-4](#479501_1_En_10_Chapter.xhtml#PC4) is an
    inherited widget. It keeps a `Config` object as its internal state. The `updateShouldNotify()`
    method is called to check whether registered build contexts should be notified
    after the inherited widget changes. This is a performance optimization to avoid
    unnecessary updates. The static `of()` method is a common practice to get the
    inherited widget or the state associated with the inherited widget. The `of()`
    method of `ConfigWidget` uses i`nheritFromWidgetOfExactType()` to get the nearest
    enclosing `ConfigWidget` instance from build context and gets `config` property
    from the widget. If no `ConfigWidget` object is found, the default `Config` instance
    is returned.


    ```

    class ConfigWidget extends InheritedWidget {

    const ConfigWidget({

    Key key,

    @required this.config,

    @required Widget child,

    }) : super(key: key, child: child);

    final Config config;

    static Config of(BuildContext context) {

    final ConfigWidget configWidget =

    context.inheritFromWidgetOfExactType(ConfigWidget);

    return configWidget?.config ?? const Config.fallback();

    }

    @override

    bool updateShouldNotify(ConfigWidget oldWidget) {

    return config != oldWidget.config;

    }

    }

    Listing 10-4

    ConfigWidget as inherited widget

    ```


    In Listing [10-5](#479501_1_En_10_Chapter.xhtml#PC5), both `ConfiguredText` and
    `ConfiguredBox` widgets use `ConfigWidget.of(context)` to get the `Config` object
    and use its properties when building the UI.


    ```

    class ConfiguredText extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    Config config = ConfigWidget.of(context);

    return Text(

    ''Font size: ${config.fontSize}'',

    style: TextStyle(

    color: config.color,

    fontSize: config.fontSize,

    ),

    );

    }

    }

    class ConfiguredBox extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    Config config = ConfigWidget.of(context);

    return Container(

    decoration: BoxDecoration(color: config.color),

    child: Text(''Background color: ${config.color}''),

    );

    }

    }

    Listing 10-5

    Use ConfigWidget to get the Config object

    ```


    `ConfigUpdater` widget in Listing [10-6](#479501_1_En_10_Chapter.xhtml#PC6) is
    used to update the `Config` object. It also uses `ConfigWidget.of(context)` to
    get the `Config` object to update. The `onColorChanged` and `onFontSizeIncreased`
    callbacks are used to trigger update of `Config` object.


    ```

    typedef SetColorCallback = void Function(Color color);

    class ConfigUpdater extends StatelessWidget {

    const ConfigUpdater({this.onColorChanged, this.onFontSizeIncreased});

    static const List _colors = [Colors.red, Colors.green, Colors.blue];

    final SetColorCallback onColorChanged;

    final VoidCallback onFontSizeIncreased;

    @override

    Widget build(BuildContext context) {

    Config config = ConfigWidget.of(context);

    return Column(

    children: [

    DropdownButton(

    value: config.color,

    items: _colors.map((Color color) {

    return DropdownMenuItem(

    value: color,

    child: Text(color.toString()),

    );

    }).toList(),

    onChanged: onColorChanged,

    ),

    RaisedButton(

    child: Text(''Increase font size''),

    onPressed: onFontSizeIncreased,

    )

    ],

    );

    }

    }

    Listing 10-6

    ConfigUpdater to update Config object

    ```


    Now we can put these widgets together to build the whole UI. In Listing [10-7](#479501_1_En_10_Chapter.xhtml#PC7),
    `ConfiguredPage` is a stateful widget with a `Config` object as its state. `ConfigUpdater`
    widget is a child of `ConfiguredPage` to update the `Config` object. `ConfiguredPage`
    constructor also has `child` parameter to provide child widget that uses `ConfigWidget.of(context)`
    to get the correct `Config` object. For the `onColorChanged` and `onFontSizeIncreased`
    callbacks of `ConfigWidget`, `setState()` method is used to update the state of
    `ConfiguredPage` widget and triggers update of `ConfigWidget`. The framework notifies
    `ConfigUpdater` and other widgets to update with latest value of `Config` object.


    ```

    class ConfiguredPage extends StatefulWidget {

    ConfiguredPage({Key key, this.child}) : super(key: key);

    final Widget child;

    @override

    _ConfiguredPageState createState() => _ConfiguredPageState();

    }

    class _ConfiguredPageState extends State {

    Config _config = Config(color: Colors.green, fontSize: 16);

    @override

    Widget build(BuildContext context) {

    return ConfigWidget(

    config: _config,

    child: Column(

    children: [

    ConfigUpdater(

    onColorChanged: (Color color) {

    setState(() {

    _config = _config.copyWith(color: color);

    });

    },

    onFontSizeIncreased: () {

    setState(() {

    _config = _config.copyWith(fontSize: _config.fontSize + 1.0);

    });

    },

    ),

    Container(

    decoration: BoxDecoration(border: Border.all()),

    padding: EdgeInsets.all(8),

    child: widget.child,

    ),

    ],

    ),

    );

    }

    }

    Listing 10-7

    ConfiguredPage to use ConfigWidget

    ```


    In Listing [10-8](#479501_1_En_10_Chapter.xhtml#PC8), `ConfigWidgetPage` widget
    uses `ConfiguredPage` widget to wrap `ConfiguredText` and `ConfiguredBox` widgets.


    ```

    class ConfigWidgetPage extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Inherited Widget''),

    ),

    body: ConfiguredPage(

    child: Column(

    children: [

    ConfiguredText(),

    ConfiguredBox(),

    ],

    ),

    ),

    );

    }

    }

    Listing 10-8

    ConfigWidgetPage to build the UI

    ```


    ## 10.3 Managing State Using Inherited Model


    ### Problem


    You want to get notified and rebuild UI based on aspects of changes.


    ### Solution


    Create your own subclasses of `InheritedModel`.'
