    添加 json_annotation 和 json_serializable

    ```


    在清单 9-19 中，`Person`类位于`json_serialize.dart`文件中。注解`@JsonSerializable()`表示要为`Person`类生成代码。生成的代码位于`json_serialize.g.dart`文件中。清单
    9-19 中使用的`_$PersonFromJson()`和`_$PersonToJson()`函数来自生成的文件。`_$PersonFromJson()`函数用于`Person.fromJson()`构造函数，而`_$PersonToJson()`函数用于`toJson()`方法。


    ```

    import ''package:json_annotation/json_annotation.dart'';

    part ''json_serialize.g.dart'';

    @JsonSerializable()

    class Person {

    Person({this.firstName, this.lastName, this.email});

    final String firstName;

    final String lastName;

    final String email;

    factory Person.fromJson(Map json) => _$PersonFromJson(json);

    Map toJson() => _$PersonToJson(this);

    }

    Listing 9-19

    使用 json_serializable

    ```


    要生成代码，你需要运行`flutter packages pub run build_runner build`命令。清单 9-20 展示了生成的文件。


    ```

    part of ''json_serialize.dart'';

    Person _$PersonFromJson(Map json) {

    return Person(

    firstName: json[''firstName''] as String,

    lastName: json[''lastName''] as String,

    email: json[''email''] as String);

    }

    Map _$PersonToJson(Person instance) => {

    ''firstName'': instance.firstName,

    ''lastName'': instance.lastName,

    ''email'': instance.email

    };

    Listing 9-20

    处理 JSON 数据的生成代码

    ```


    `JsonSerializable`注解具有不同的属性来自定义行为；参见表 9-8。


    表 9-8 `JsonSerializable`的属性


    | 名称 | 默认值 | 描述 |

    | --- | --- | --- |

    | `anyMap` | `false` | 当为`true`时，使用`Map`作为映射类型；否则，使用`Map<String, dynamic>`。 |

    | `checked` | `false` | 是否添加额外检查以验证数据类型。 |

    | `createFactory` | `true` | 是否生成将映射转换为对象的函数。 |

    | `createToJson` | `true` | 是否生成可以用作`toJson()`函数的函数。 |

    | `disallowUnrecognizedKeys` | `false` | 当为`true`时，无法识别的键被视为错误；否则，它们将被忽略。 |

    | `explicitToJson` | `false` | 当为`true`时，生成的`toJson()`函数会在嵌套对象上使用`toJson`。 |

    | `fieldRename` | `FieldRename.none` | 用于将类字段名称转换为 JSON 映射键的策略。 |

    | `generateToJsonFunction` | `true` | 当为`true`时，生成顶层函数；否则，生成一个包含`toJson()`方法的
    mixin 类。 |

    | `includeIfNull` | `true` | 是否包含值为`null`的字段。 |

    | `nullable` | `true` | 是否优雅地处理`null`值。 |

    | `useWrappers` | `false` | 是否使用包装类以最小化序列化期间`Map`和`List`实例的使用。 |


    `generateToJsonFunction`属性决定了`toJson()`函数是如何生成的。当值为`true`时，会生成如清单 9-20 中所示的`_$PersonToJson()`等顶层函数。在清单
    9-21 中，`User`类的`generateToJsonFunction`属性被设置为`false`。


    ```

    @JsonSerializable(

    generateToJsonFunction: false,

    )

    class User extends Object with _$UserSerializerMixin {

    User(this.name);

    final String name;

    }

    Listing 9-21

    User 类

    ```


    在清单 9-22 中，生成的不是一个函数，而是包含了`toJson()`方法的`_$UserSerializerMixin`类。清单 9-21 中的`User`类只需使用这个
    mixin 类即可。


    ```

    User _$UserFromJson(Map json) {

    return User(json[''name''] as String);

    }

    abstract class _$UserSerializerMixin {

    String get name;

    Map toJson() => {''name'': name};

    }

    Listing 9-22

    为 User 类生成的代码

    ```


    `JsonKey`注解指定了字段如何被序列化。表 9-9 展示了`JsonKey`的属性。


    表 9-9 `JsonKey`的属性


    | 名称 | 描述 |

    | --- | --- |

    | `name` | JSON 映射键。如果为`null`，则使用字段名称。 |

    | `nullable` | 是否优雅地处理`null`值。 |

    | `includeIfNull` | 如果值为`null`，是否包含此字段。 |

    | `ignore` | 是否忽略此字段。 |

    | `fromJson` | 用于反序列化此字段的函数。 |

    | `toJson` | 用于序列化此字段的函数。 |

    | `defaultValue` | 用作默认值的值。 |

    | `required` | JSON 映射中是否必须包含此字段。 |

    | `disallowNullValue` | 是否禁止`null`值。 |


    清单 9-23 展示了一个使用`JsonKey`的示例。


    ```

    @JsonKey(

    name: ''first_name'',

    required: true,

    includeIfNull: true,

    )

    final String firstName;

    Listing 9-23

    使用 JsonKey

    ```


    `JsonValue`注解指定用于序列化的枚举值。在清单 9-24 中，`JsonValue`注解被添加到`Color`的所有枚举值上。


    ```

    enum Color {

    @JsonValue(''R'')

    Red,

    @JsonValue(''G'')

    Green,

    @JsonValue(''B'')

    Blue

    }

    Listing 9-24

    使用 JsonValue

    ```


    `JsonLiteral`注解从文件中读取 JSON 数据并将内容转换为对象。它允许轻松访问静态 JSON 数据文件的内容。在清单 9-25 中，`JsonLiteral`注解被添加到`data`
    getter 上。`_$dataJsonLiteral`是 JSON 文件中数据的生成变量。


    ```

    @JsonLiteral(''data.json'', asConst: true)

    Map get data => _$dataJsonLiteral;

    Listing 9-25

    使用 JsonLiteral

    ```


    ## 9.9 处理 XML 数据


    ### 问题


    你想在 Flutter 应用中处理 XML 数据。


    ### 解决方案


    使用`xml`库。


    ### 讨论


    XML 是一种流行的数据交换格式。你可以在 Flutter 应用中使用`xml`库来处理 XML 数据。首先，你需要将`xml: ³.3.1`添加到`pubspec.yaml`文件的`dependencies`中。与
    JSON 数据类似，XML 数据有两种使用场景：


    *   解析 XML 文档并查询数据。


    *   构建 XML 文档。

    '
- fmt: '### Parse XML Documents


    To parse XML documents, you need to use `parse()` function which takes a XML string
    as the input and returns parsed `XmlDocument` object. With the `XmlDocument` object,
    you can query and traverse the XML document tree to extract data from it.


    To query the document tree, you can use `findElements()` and `findAllElements()`
    methods. These two methods accept a tag name and an optional namespace as the
    parameters and return an `Iterable<XmlElement>` object. The difference is that
    `findElements()` method only searches direct children, while `findAllElements()`
    method searches all descendant children. To traverse the document tree, you can
    use properties shown in Table [9-10](#479501_1_En_9_Chapter.xhtml#Tab10).


    **Table 9-10** Properties of `XmlParent`


    | Name | Type | Description |

    | --- | --- | --- |

    | `children` | `XmlNodeList<XmlNode>` | Direct children of this node. |

    | `ancestors` | `Iterable<XmlNode>` | Ancestors of this node in reverse document
    order. |

    | `descendants` | `Iterable<XmlNode>` | Descendants of this node in document order.
    |

    | `attributes` | `List<XmlAttribute>` | Attribute nodes of this node in document
    order. |

    | `preceding` | `Iterable<XmlNode>` | Nodes preceding the opening tag of this
    node in document order. |

    | `following` | `Iterable<XmlNode>` | Nodes following the closing tag of this
    node in document order. |

    | `parent` | `XmlNode` | Parent of this node, can be `null`. |

    | `firstChild` | `XmlNode` | First child of this node, can be `null`. |

    | `lastChild` | `XmlNode` | Last child of this node, can be `null`. |

    | `nextSibling` | `XmlNode` | Next sibling of this node, can be `null`. |

    | `previousSibling` | `XmlNode` | Previous sibling of this node, can be `null`.
    |

    | `root` | `XmlNode` | Root of the tree. |


    In Listing [9-26](#479501_1_En_9_Chapter.xhtml#PC26), the input XML string (excerpt
    from [`https://msdn.microsoft.com/en-us/windows/desktop/ms762271`](https://msdn.microsoft.com/en-us/windows/desktop/ms762271))
    is parsed and queried for the first `book` element. Then text of the `title` element
    and value of the `id` attribute are extracted.


    ```

    String xmlStr = "''


    Gambardella, Matthew

    XML Developer''s Guide

    Computer

    44.95

    2000-10-01

    An in-depth look at creating applications

    with XML.


    Ralls, Kim

    Midnight Rain

    Fantasy

    5.95

    2000-12-16

    A former architect battles corporate zombies, an evil sorceress, and her own childhood
    to become queen of the world.


    "'';

    XmlDocument document = parse(xmlStr);

    XmlElement firstBook = document.rootElement.findElements(''book'').first;

    String title = firstBook.findElements(''title'').single.text;

    String id = firstBook.attributes

    .firstWhere((XmlAttribute attr) => attr.name.local == ''id'')

    .value;

    print(''$id => $title'');

    Listing 9-26

    XML document parsing and querying

    ```


    ### Build XML Documents


    To build XML documents, you can use `XmlBuilder` class. `XmlBuilder` class provides
    methods to build different components of XML documents; see Table [9-11](#479501_1_En_9_Chapter.xhtml#Tab11).
    With these methods, we can build XML documents in a top-down fashion, which starts
    from the root element and build nested content layer by layer.


    **Table 9-11** Methods of `XmlBuilder`


    | Name | Description |

    | --- | --- |

    | `element()` | Creates a `XmlElement` node with specified tag name, namespaces,
    attributes, and nested content. |

    | `attribute()` | Creates a `XmlAttribute` node with specified name, value, namespace,
    and type. |

    | `text()` | Creates a `XmlText` node with specified text. |

    | `namespace()` | Binds namespace `prefix` to the `uri`. |

    | `cdata()` | Creates a `XmlCDATA` node with specified text. |

    | `comment()` | Creates a `XmlComment` node with specified text. |

    | `processing()` | Creates a `XmlProcessing` node with specified `target` and
    `text`. |


    After finishing the building, the `build()` method of `XmlBuilder` can be used
    to build the `XmlNode` as the result. In Listing [9-27](#479501_1_En_9_Chapter.xhtml#PC27),
    the root element is a `note` element with `id` attribute. Value of `nest` parameter
    is a function which uses builder methods to build the content of the node element.


    ```

    XmlBuilder builder = XmlBuilder();

    builder.processing(''xml'', ''version="1.0"'');

    builder.element(

    ''note'',

    attributes: {

    ''id'': ''001'',

    },

    nest: () {

    builder.element(''from'', nest: () {

    builder.text(''John'');

    });

    builder.element(''to'', nest: () {

    builder.text(''Jane'');

    });

    builder.element(''message'', nest: () {

    builder

    ..text(''Hello!'')

    ..comment(''message to send'');

    });

    },

    );

    XmlNode xmlNode = builder.build();

    print(xmlNode.toXmlString(pretty: true));

    Listing 9-27

    Use XmlBuilder

    ```


    Listing [9-28](#479501_1_En_9_Chapter.xhtml#PC28) shows the built XML document
    by code in Listing [9-27](#479501_1_En_9_Chapter.xhtml#PC27).


    ```


    John

    Jane

    Hello!


    Listing 9-28

    Built XML document

    ```


    ## Handling HTML Data


    ### Problem


    You want to parse HTML document in Flutter apps.


    ### Solution


    Use `html` library.


    ### Discussion


    Even though JSON and XML data format are popular in Flutter apps, you may still
    need to parse HTML document to extract data. This process is called screen scraping.
    You can use `html` library to parse HTML document. To use this library, you need
    to add `html: ^0.13.4+1` to the `dependencies` of `pubspec.yaml` file.


    The `parse()` function parses HTML strings into `Document` objects. These `Document`
    objects can be queried and manipulated using W3C DOM API. In Listing [9-29](#479501_1_En_9_Chapter.xhtml#PC29),
    HTML string is parsed first, then `getElementsByTagName()` method is used to get
    the `li` elements, and finally `id` attribute and text are extracted from `li`
    elements.


    ```

    import ''package:html/dom.dart'';

    import ''package:html/parser.dart'' show parse;

    void main() {

    String htmlStr = "''


    John

    Jane

    Mary


    "'';

    Document document = parse(htmlStr);

    var users = document.getElementsByTagName(''li'').map((Element element) {

    return {

    ''id'': element.attributes[''id''],

    ''name'': element.text,

    };

    });

    print(users);

    }

    Listing 9-29

    Parse HTML document

    ```


    ## Sending HTTP Requests


    ### Problem


    You want to send HTTP requests to backend services.


    ### Solution


    Use `HttpClient` from `dart:io` library.'
