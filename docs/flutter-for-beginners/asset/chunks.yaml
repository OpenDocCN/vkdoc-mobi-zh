  raw: '### Discussion


    In Recipe 6-1, you have seen the example of using TextEditingController to get
    and set the text of widgets using EditableText. TextEditingController can also
    be used to get the text selection by user and select text. This is done by getting
    or setting the value of selection property of type TextSelection.


    TextSelection is a subclass of TextRange. You can use TextRange.textInside() to
    get the selected text. TextSelection class uses baseOffset and extentOffset properties
    to represent the position which the selection originates and terminates, respectively.
    The value of baseOffset may be larger than, smaller than, or equal to extentOffset.
    If baseOffset equals to extentOffset, the selection is collapsed. Collapsed text
    selection contains zero characters, but they are used to represent text insertion
    points. TextSelection.collapsed() constructor can create a collapsed selection
    at specified offset.


    In Listing [6-9](#479501_1_En_6_Chapter.xhtml#PC9), when text selection changes,
    the selected text is displayed. The first button selected the text in the range
    [0, 5], while thp7;e second button moves the cursor to offset 1.


    ```

    class TextSelectionExample extends StatefulWidget {

    @override

    _TextSelectionExampleState createState() => _TextSelectionExampleState();

    }

    class _TextSelectionExampleState extends State {

    TextEditingController _controller;

    String _selection;

    @override

    void initState() {

    super.initState();

    _controller = new TextEditingController();

    _controller.addListener(_handleTextSelection);

    }

    @override

    void dispose() {

    _controller.removeListener(_handleTextSelection);

    super.dispose();

    }

    @override

    Widget build(BuildContext context) {

    return Column(

    crossAxisAlignment: CrossAxisAlignment.start,

    children: [

    TextField(

    controller: _controller,

    ),

    Row(

    children: [

    RaisedButton(

    child: Text(''Select text [0, 5]''),

    onPressed: () {

    setState(() {

    _controller.selection =

    TextSelection(baseOffset: 0, extentOffset: 5);

    });

    },

    ),

    RaisedButton(

    child: Text(''Move cursor to offset 1''),

    onPressed: () {

    setState(() {

    _controller.selection = TextSelection.collapsed(offset: 1);

    });

    },

    ),

    ],

    ),

    Text.rich(TextSpan(

    children: [

    TextSpan(

    text: ''Selected:'',

    style: TextStyle(fontWeight: FontWeight.bold),

    ),

    TextSpan(text: _selection ?? "),

    ],

    )),

    ],

    );

    }

    _handleTextSelection() {

    TextSelection selection = _controller.selection;

    if (selection != null) {

    setState(() {

    _selection = selection.textInside(_controller.text);

    });

    }

    }

    }

