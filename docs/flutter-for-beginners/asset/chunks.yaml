    # 8. 页面导航


    Flutter 应用可能有多个屏幕或页面。页面是功能的集合。用户在页面之间进行导航以使用不同的功能。像页面这样的概念在 Flutter 中被称为路由。路由不仅包括全屏页面，还包括模态对话框和弹出窗口。路由由
    `Navigator` 组件管理。本章讨论与 Flutter 中页面导航相关的实用方案。


    ## 8.1 实现基本页面导航


    ### 问题


    您希望拥有基本的页面导航支持。


    ### 解决方案


    使用 `Navigator.push()` 导航到新路由，并使用 `Navigator.pop()` 返回上一个路由。


    ### 讨论


    路由由 `Navigator` 组件管理。导航器管理着一个路由栈。可以使用 `push()` 方法将路由推入栈中，使用 `pop()` 方法将其从栈中弹出。栈顶元素是当前激活的路由。`Navigator`
    是一个有状态组件，其状态为 `NavigatorState`。要与导航器交互，可以使用 `Navigator` 的静态方法，或者获取一个 `NavigatorState`
    实例。通过使用 `Navigator.of()` 方法，可以获取给定构建上下文最近的 `NavigatorState` 实例。您可以显式创建 `Navigator`
    组件，但大多数情况下，您会使用由 `WidgetsApp`、`MaterialApp` 或 `CupertinoApp` 组件创建的 `Navigator`
    组件。


    路由使用抽象类 `Route` 的实现来表示。例如，`PageRoute` 表示全屏模态路由，而 `PopupRoute` 表示在当前路由之上覆盖一个组件的模态路由。`PageRoute`
    和 `PopupRoute` 类都是 `ModalRoute` 类的子类。对于 Material Design 应用，创建全屏页面最简单的方法是使用 `MaterialPageRoute`
    类。`MaterialPageRoute` 使用 `WidgetBuilder` 函数来构建路由的内容。


    在清单 8-1/#479501_1_En_8_Chapter.xhtml#PC1) 中，`Navigator.of(context)` 获取了要使用的 `NavigatorState`
    实例。推送到导航器的新路由是一个 `MaterialPageRoute` 实例。这个新路由包含一个按钮，该按钮使用 `NavigatorState.pop()`
    方法将当前路由从导航器中弹出。实际上，当使用 `Scaffold` 组件时，应用栏会自动添加一个返回按钮，因此无需使用显式的返回按钮。


    ```

    class SimpleNavigationPage extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Simple Navigation''),

    ),

    body: Center(

    child: RaisedButton(

    child: Text(''Show page''),

    onPressed: () {

    Navigator.of(context).push(MaterialPageRoute(builder: (context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''New Page''),

    ),

    body: Center(

    child: Column(

    crossAxisAlignment: CrossAxisAlignment.center,

    children: [

    Text(''A new page''),

    RaisedButton(

    child: Text(''Go back''),

    onPressed: () {

    Navigator.of(context).pop();

    },

    ),

    ],

    ),

    ),

    );

    }));

    },

    ),

    ),

    );

    }

    }

    清单 8-1

    使用 Navigator 进行页面导航

    ```


    `Navigator` 类拥有诸如 `push()` 和 `pop()` 之类的静态方法，它们与 `NavigatorState` 类中的同名方法功能相同，但这些静态方法需要一个额外的
    `BuildContext` 参数。`Navigator.push(context)` 实际上等同于 `Navigator.of(context).push()`。您可以选择使用其中任意一种方法。


    ## 8.2 使用命名路由


    ### 问题


    您希望从不同位置导航到同一个路由。


    ### 解决方案


    结合 `Navigator.pushNamed()` 方法使用命名路由。


    ### 讨论


    当使用 `Navigator.push()` 方法将新路由推送到导航器时，新路由是通过构建器函数按需构建的。当路由可以从不同位置进行导航时，这种方法效果不佳，因为我们不想重复构建路由的代码。在这种情况下，使用命名路由是更好的选择。命名路由具有唯一的名称。`Navigator.pushNamed()`
    方法使用该名称来指定要推送到导航器的路由。


    命名路由在可以被导航之前需要先进行注册。注册命名路由最简单的方法是使用 `WidgetsApp`、`MaterialApp` 或 `CupertinoApp`
    构造函数的 `routes` 参数。`routes` 参数是一个 `Map<String, WidgetBuilder>` 对象，其键是路由名称。路由名称通常采用以“/”开头的路径格式。这与
    Web 应用组织页面的方式类似。例如，您可以使用诸如 `/log_in`、`/orders` 和 `/orders/1234` 之类的路由名称。


    在清单 8-2/#479501_1_En_8_Chapter.xhtml#PC2) 中，按下“注册”按钮会将命名路由 `/sign_up` 推送到导航器。


    ```

    class LogInPage extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Log In''),

    ),

    body: Center(

    child: RaisedButton(

    child: Text(''Sign Up''),

    onPressed: () {

    Navigator.pushNamed(context, ''/sign_up'');

    },

    ),

    ),

    );

    }

    }

    清单 8-2

    使用命名路由

    ```


    在清单 8-3/#479501_1_En_8_Chapter.xhtml#PC3) 中，两个命名路由在 `routes` 参数中注册了。


    ```

    class PageNavigationApp extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return MaterialApp(

    title: ''Page Navigation'',

    home: IndexPage(),

    routes: {

    ''/sign_up'': (context) => SignUpPage(),

    ''/log_in'': (context) => LogInPage(),

    },

    );

    }

    }

    清单 8-3

    注册命名路由

    ```


    ## 8.3 在路由之间传递数据


    ### 问题


    您希望在不同的路由之间传递数据。


    ### 解决方案


    使用构造函数参数或 `RouteSettings` 对象将数据传递给路由，并使用 `Navigator.pop()` 方法的 `result` 参数从路由返回数据。

    '
- fmt: '### Discussion


    A route may require additional data when building its content. A route may also
    return some data when popped off. For example, a route to edit user details may
    need the current details as the input and return updated details as the output.
    Depending on how routes are navigated to, there are different ways to pass data
    between routes.


    When using `Navigator.push()` method to push new routes, the easiest way is to
    pass the data as constructor parameters of the widget returned by `WidgetBuilder`
    function. When using `Navigator.pop()` method, you can use the optional `result`
    parameter to pass return value to the previous route. The return value of `Navigator.push()`
    method is a `Future<T>` object. This `Future` object will be resolved when the
    newly pushed route is popped off. The resolved value is the return value passed
    when invoking `Navigator.pop()` method. If the route is popped off using the back
    button, then the resolved value is `null`.


    In Listing [8-4](#479501_1_En_8_Chapter.xhtml#PC4), `UserDetails` class contains
    first name and last name of a user. `UserDetailsPage` displays the user''s details.
    When the edit button is pressed, a new route is pushed to the navigator. Content
    of the new route is an `EditUserDetailsPage` widget with the `UserDetails` object
    as the constructor parameter. The return value of the new route is also a `UserDetails`
    object, which is used to update the state of `UserDetailsPage`.


    ```

    class UserDetails {

    UserDetails(this.firstName, this.lastName);

    final String firstName;

    final String lastName;

    }

    class UserDetailsPage extends StatefulWidget {

    @override

    _UserDetailsPageState createState() => _UserDetailsPageState();

    }

    class _UserDetailsPageState extends State {

    UserDetails _userDetails = UserDetails(''John'', ''Doe'');

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''User Details''),

    ),

    body: Column(

    children: [

    Text(''First name: ${_userDetails.firstName}''),

    Text(''Last name: ${_userDetails.lastName}''),

    RaisedButton.icon(

    label: Text(''Edit (route builder)''),

    icon: Icon(Icons.edit),

    onPressed: () async {

    UserDetails result = await Navigator.push(

    context,

    MaterialPageRoute(

    builder: (BuildContext context) {

    return EditUserDetailsPage(_userDetails);

    },

    ),

    );

    if (result != null) {

    setState(() {

    _userDetails = result;

    });

    }

    },

    ),

    ],

    ),

    );

    }

    }

    Listing 8-4

    User details page

    ```


    In Listing [8-5](#479501_1_En_8_Chapter.xhtml#PC5), `EditUserDetailsPage` uses
    two `TextFormField` widgets to edit user details. When the save button is pressed,
    the updated `UserDetails` object is returned using `Navigator.pop()` method.


    ```

    class EditUserDetailsPage extends StatefulWidget {

    EditUserDetailsPage(this.userDetails);

    final UserDetails userDetails;

    @override

    _EditUserDetailsPageState createState() =>

    _EditUserDetailsPageState(userDetails);

    }

    class _EditUserDetailsPageState extends State {

    _EditUserDetailsPageState(this._userDetails);

    UserDetails _userDetails;

    final GlobalKey<FormFieldState> _firstNameKey = GlobalKey();

    final GlobalKey<FormFieldState> _lastNameKey = GlobalKey();

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Edit User Details''),

    ),

    body: Column(

    children: [

    TextFormField(

    key: _firstNameKey,

    decoration: InputDecoration(

    labelText: ''First name'',

    ),

    initialValue: _userDetails.firstName,

    ),

    TextFormField(

    key: _lastNameKey,

    decoration: InputDecoration(

    labelText: ''Last name'',

    ),

    initialValue: _userDetails.lastName,

    ),

    RaisedButton(

    child: Text(''Save''),

    onPressed: () {

    Navigator.pop(

    context,

    UserDetails(_firstNameKey.currentState?.value,

    _lastNameKey.currentState?.value));

    },

    )

    ],

    ),

    );

    }

    }

    Listing 8-5

    Edit user details page

    ```


    If named routes are used, data can be passed to the route using the `arguments`
    parameter of `Navigator.pushNamed()` method. In Listing [8-6](#479501_1_En_8_Chapter.xhtml#PC6),
    `pushNamed()` method is used to navigate to the `/edit_user` route with current
    `UserDetails` object.


    ```

    UserDetails result = await Navigator.pushNamed(

    context,

    ''/edit_user'',

    arguments: _userDetails,

    );

    Listing 8-6

    Pass data to named route

    ```


    The named route `/edit_user` is registered in `MaterialApp`. The `route` parameters
    cannot be used, because you cannot access the data passed to the route in the
    builder function. The `onGenerateRoute` parameter of `WidgetsApp`, `MaterialApp`,
    or `CupertinoApp` should be used instead. The type of `onGenerateRoute` parameter
    is `RouteFactory`, which is a typedef of function type `Route (RouteSettings settings)`.
    `RouteSettings` class contains data that may be required when creating the `Route`
    object. Table [8-1](#479501_1_En_8_Chapter.xhtml#Tab1) shows properties of `RouteSettings`
    class.


    **Table 8-1** Properties of `RouteSettings`


    | Name | Type | Description |

    | --- | --- | --- |

    | `name` | `String` | Name of the route. |

    | `arguments` | `Object` | Data passed to the route. |

    | `isInitialRoute` | `bool` | Whether this route is the first route pushed to
    the navigator. |


    When implementing the `onGenerateRoute` function, you need to return routes based
    on the provided `RouteSettings` object. In Listing [8-7](#479501_1_En_8_Chapter.xhtml#PC7),
    the `name` property is checked first, then a `MeterialPageRoute` is returned with
    `EditUserDetailsPage` as the content. The `arguments` property of `RouteSettings`
    is used in `EditUserDetailsPage` constructor. The value of `arguments` property
    is the `UserDetails` object passed in Listing [8-6](#479501_1_En_8_Chapter.xhtml#PC6).


    ```

    MaterialApp(

    onGenerateRoute: (RouteSettings settings) {

    if (settings.name == ''/edit_user'') {

    return MaterialPageRoute(

    settings: settings,

    builder: (context) {

    return EditUserDetailsPage(settings.arguments);

    },

    );

    }

    },

    );

    Listing 8-7

    Use onGenerateRoute

    ```


    ## 8.4 Implementing Dynamic Route Matching


    ### Problem


    You want to use complicated logic to match route names.


    ### Solution


    Use `onGenerateRoute` parameter.


    ### Discussion


    When named routes are registered using the `routes` parameter of `WidgetsApp`,
    only the whole route name can be used to match the `Route` objects. If you want
    to use complicated logic to match `Route` objects with route names, you can use
    `onGenerateRoute` parameter and `RouteSettings` object. For example, you can match
    all route names start with `/order` to a single `Route` object.


    In Listing [8-8](#479501_1_En_8_Chapter.xhtml#PC8), all route names starting with
    `/order` will navigate to a route using `OrderPage`.


    ```

    MaterialApp(

    onGenerateRoute: (RouteSettings settings) {

    if (settings.name.startsWith(''/order'')) {

    return MaterialPageRoute(

    settings: settings,

    builder: (context) {

    return OrderPage();

    },

    );

    }

    },

    );

    Listing 8-8

    Route matching

    ```


    ## 8.5 Handling Unknown Routes


    ### Problem


    You want to handle the case of navigating to an unknown route.


    ### Solution


    Use `onUnknownRoute` parameter of `Navigator`, `WidgetsApp`, `MaterialApp`, and
    `CupertinoApp`.


    ### Discussion


    It''s possible that the navigator may be asked to navigate to an unknown route.
    This can be caused by programming errors in the app or external requests for route
    navigation. If `onGenerateRoute` function returns `null` for the given `RouteSettings`
    object, the `onUnknownRoute` function is invoked to provide a fallback route.
    This `onUnknownRoute` function is usually used for error handling, just like 404
    pages in web apps. The type of `onUnknownRoute` is also `RouteFactory`.


    In Listing [8-9](#479501_1_En_8_Chapter.xhtml#PC9), `onUnknownRoute` function
    returns the route that shows the `NotFoundPage` widget.


    ```

    MaterialApp(

    onUnknownRoute: (RouteSettings settings) {

    return MaterialPageRoute(

    settings: settings,

    builder: (BuildContext context) {

    return NotFoundPage(settings.name);

    },

    );

    },

    );

    Listing 8-9

    Use onUnknownRoute

    ```


    ## 8.6 Displaying Material Design Dialogs


    ### Problem


    You want to show Material Design dialogs.


    ### Solution


    Use `showDialog()` function and `Dialog`, `SimpleDialog`, and `AlertDialog` widgets.'
