    ### Problem


    You want to display tabular data or use table layout for children.


    ### Solution


    Use Table widget.'
  trans: '

    ### 讨论


    `ListView` 组件以线性数组形式展示列表项。如需以二维数组形式展示组件，可使用 `GridView`。`GridView` 子组件的实际布局由 `SliverGridDelegate`
    的实现类负责。Flutter 提供了两个内置的 `SliverGridDelegate` 实现：`SliverGridDelegateWithFixedCrossAxisCount`
    和 `SliverGridDelegateWithMaxCrossAxisExtent`。您也可以自行创建 `SliverGridDelegate` 的实现。


    为 `GridView` 提供子组件有三种方式：您可以提供一个静态的组件列表，或使用 `IndexedWidgetBuilder` 类型的构建器函数，或提供一个
    `SliverChildDelegate` 的实现。


    根据所选择的 `SliverGridDelegate` 和提供子组件的方式，您可以使用不同的 `GridView` 构造函数。表 7-3 展示了不同构造函数的用法。


    **表 7-3** `GridView` 构造函数


    | 名称 | 委托 | 子组件 |

    | --- | --- | --- |

    | `GridView()` | `SliverGridDelegate` | `Widget[]` |

    | `GridView.builder()` | `SliverGridDelegate` | `IndexedWidgetBuilder` |

    | `GridView.count()` | `SliverGridDelegateWithFixedCrossAxisCount` | `Widget[]`
    |

    | `GridView.extent()` | `SliverGridDelegateWithMaxCrossAxisExtent` | `Widget[]`
    |

    | `GridView.custom()` | `SliverGridDelegate` | `SliverChildDelegate` |


    `SliverGridDelegateWithFixedCrossAxisCount` 类使用 `crossAxisCount` 参数来指定交叉轴上固定的瓦片数量。例如，如果
    `GridView` 的滚动方向是垂直的，那么 `crossAxisCount` 参数指定了列数。清单 7-7 展示了一个使用 `GridView.count()`
    创建三列网格的示例。


    ```

    GridView.count(

    crossAxisCount: 3,

    children: List.generate(10, (index) {

    return ExampleWidget(

    name: ''Fixed Count ${index + 1}'',

    );

    }),

    );

    ```

    **清单 7-7** 使用 `GridView.count()` 的示例


    `SliverGridDelegateWithMaxCrossAxisExtent` 类使用 `maxCrossAxisExtent` 参数来指定交叉轴上的最大范围。瓦片实际的交叉轴范围将尽可能大，以便均匀划分
    `GridView` 的交叉轴范围，并且不会超过指定的最大值。例如，如果 `GridView` 的交叉轴范围是 400，`maxCrossAxisExtent`
    的值是 120，那么瓦片的交叉轴范围就是 100。如果 `GridView` 的滚动方向是垂直的，它将有四列。清单 7-8 展示了一个使用 `GridView.extent()`
    的示例。


    ```

    GridView.extent(

    maxCrossAxisExtent: 250,

    children: List.generate(10, (index) {

    return ExampleWidget(

    name: ''Max Extent ${index + 1}'',

    );

    }),

    );

    ```

    **清单 7-8** 使用 `GridView.extent()` 的示例


    要使用构建器函数创建子组件，您需要使用 `GridView.builder()` 构造函数搭配一个 `SliverGridDelegate` 实现。清单 7-9
    展示了一个将 `GridView.builder()` 与 `SliverGridDelegateWithFixedCrossAxisCount` 结合使用的示例。


    ```

    GridView.builder(

    itemCount: 32,

    gridDelegate:

    SliverGridDelegateWithFixedCrossAxisCount(crossAxisCount: 3),

    itemBuilder: (context, index) {

    return ExampleWidget(

    name: ''Builder ${index + 1}'',

    );

    },

    );

    ```

    **清单 7-9** 使用 `GridView.builder()` 的示例


    `SliverGridDelegateWithFixedCrossAxisCount` 和 `SliverGridDelegateWithMaxCrossAxisExtent`
    这两个类都有其他命名参数来配置布局；请参见表 7-4。


    **表 7-4** 内置 `SliverGridDelegate` 实现的参数


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `mainAxisSpacing` | `double` | 沿主轴方向的瓦片间距。 |

    | `crossAxisSpacing` | `double` | 沿交叉轴方向的瓦片间距。 |

    | `childAspectRatio` | `double` | 瓦片的交叉轴范围与主轴范围的比率。 |


    使用这两个 `SliverGridDelegate` 实现时，会先确定每个瓦片的交叉轴范围，然后通过 `childAspectRatio` 参数确定主轴范围。如果
    `GridView` 用于显示具有所需宽高比的图像，您可以使用相同的比率作为 `childAspectRatio` 参数的值。`GridView.count()`
    和 `GridView.extent()` 构造函数都具有表 7-4 中相同的命名参数，以将这些参数传递给底层的 `SliverGridDelegate`
    实现。清单 7-10 展示了在显示图像时使用 `childAspectRatio` 参数的示例。


    ```

    GridView.count(

    crossAxisCount: 3,

    childAspectRatio: 4 / 3,

    children: List.generate(10, (index) {

    return Image.network(''https://picsum.photos/400/300'');

    }),

    );

    ```

    **清单 7-10** 使用 `childAspectRatio` 参数


    就像在 `ListView` 中使用 `ListTile` 一样，您也可以在 `GridView` 中使用 `GridTile`。一个网格瓦片包含一个必需的子组件，以及可选的页眉和页脚组件。对于网格瓦片的页眉和页脚，通常使用
    `GridTileBar` 组件。`GridTileBar` 与 `ListTile` 类似。`GridTileBar` 构造函数包含 `title`（标题）、`subtitle`（副标题）、`leading`（前置图标）、`trailing`（后置图标）和
    `backgroundColor`（背景色）参数。


    ```

    GridView.count(

    crossAxisCount: 2,

    children: [

    GridTile(

    child: ExampleWidget(name: ''Simple''),

    ),

    GridTile(

    child: ExampleWidget(name: ''Header & Footer''),

    header: GridTileBar(

    title: Text(''Header''),

    backgroundColor: Colors.red,

    ),

    footer: GridTileBar(

    title: Text(''Footer''),

    subtitle: Text(''Description''),

    backgroundColor: Colors.blue,

    ),

    )

    ],

    );

    ```

    **清单 7-11** `GridTile` 和 `GridTileBar` 示例


    图 7-2 展示了清单 7-11 中代码的截图。


    ![../images/479501_1_En_7_Chapter/479501_1_En_7_Fig2_HTML.png](img/479501_1_En_7_Fig2_HTML.png)


    **图 7-2** `GridTile` 和 `GridTileBar`


    ## 7.3 显示表格数据


    ### 问题


    您希望显示表格数据或对子组件使用表格布局。


    ### 解决方案


    使用 `Table` 组件。

    '
- fmt: "### Discussion\n\nIf you want to display tabular data, using data tables is\
    \ a natural choice. Tables can also be used for layout purpose to organize children.\
    \ For these two usage scenarios, you can use the `Table` widget.\n\nA `Table`\
    \ widget may have multiple rows. A table row is represented with `TableRow` widget.\
    \ `Table` widget constructor has the `children` parameter of type `List<TableRow>`\
    \ to provide the list of rows. `TableRow` constructor also has the `children`\
    \ parameter of type `List<Widget>` to provide the list of cells in this row. Every\
    \ row in a table must have the same number of children.\n\nThe border of a table\
    \ is defined using `TableBorder` class. `TableBorder` is similar with `Border`,\
    \ but `TableBorder` has two extra sides:\n\n- `horizontalInside` – The inner horizontal\
    \ borders between rows\n- `verticalInside` – The inner vertical borders between\
    \ columns\n\nListing 7-12 shows an example of a simple table with three rows and\
    \ four columns.\n\n```\nTable(\n  border: TableBorder.all(color: Colors.red.shade200),\n\
    \  children: [\n    TableRow(children: [Text('A'), Text('B'), Text('C'), Text('D')]),\n\
    \    TableRow(children: [Text('E'), Text('F'), Text('G'), Text('H')]),\n    TableRow(children:\
    \ [Text('I'), Text('J'), Text('K'), Text('L')]),\n  ],\n);\n```\n\nWidth of columns\
    \ in a table is configured by `TableColumnWidth` implementations. The `columnWidths`\
    \ parameter of type `Map<int, TableColumnWidth>` defines the mapping between column\
    \ index and its `TableColumnWidth` implementation. Table 7-5 shows built-in `TableColumnWidth`\
    \ implementations. `MinColumnWidth` and `MaxColumnWidth` classes combine other\
    \ `TableColumnWidth` implementations. If no `TableColumnWidth` implementation\
    \ is found for a column, the `defaultColumnWidth` parameter is used to get the\
    \ default `TableColumnWidth` implementation. The default value of `defaultColumnWidth`\
    \ is `FlexColumnWidth(1.0)`, which means all columns share the same width.\n\n\
    **Table 7-5** `TableColumnWidth` implementations\n\n| Name | Performance | Description\
    \ |\n| --- | --- | --- |\n| `FixedColumnWidth` | High | Use fixed number of pixels\
    \ as the column width. |\n| `FlexColumnWidth` | Medium | Use flex factor to divide\
    \ remaining space once all the other non-flexible columns have been sized. |\n\
    | `FractionColumnWidth` | Medium | Use a fraction of the table’s max width as\
    \ the column width. |\n| `IntrinsicColumnWidth` | Low | Use the intrinsic dimensions\
    \ of all cells in a column to determine the column width. |\n| `MinColumnWidth`\
    \ | | Minimum of two `TableColumnWidth` objects. |\n| `MaxColumnWidth` | | Maximum\
    \ of two `TableColumnWidth` objects. |\n\nListing 7-13 shows an example of a table\
    \ with different column width.\n\n```\nTable(\n  border: TableBorder.all(color:\
    \ Colors.blue.shade200),\n  columnWidths: {\n    0: FixedColumnWidth(100),\n \
    \   1: FlexColumnWidth(1),\n    2: FlexColumnWidth(2),\n    3: FractionColumnWidth(0.2),\n\
    \  },\n  children: [\n    TableRow(children: [Text('A'), Text('B'), Text('C'),\
    \ Text('D')]),\n    TableRow(children: [Text('E'), Text('F'), Text('G'), Text('H')]),\n\
    \    TableRow(children: [Text('I'), Text('J'), Text('K'), Text('L')]),\n  ],\n\
    );\n```\n\nThe vertical alignment of cells is configured with values of `TableCellVerticalAlignment`\
    \ enum. `TableCellVerticalAlignment` enum has values `top`, `middle`, `bottom`,\
    \ `baseline`, and `fill`. The `defaultVerticalAlignment` parameter of `Table`\
    \ constructor specifies the default `TableCellVerticalAlignment` value. If you\
    \ want to customize vertical alignment of a single cell, you can wrap the cell\
    \ widget inside of `TableCell` widget and specify the `verticalAlignment` parameter.\
    \ Listing 7-14 shows an example of specifying vertical alignment for cells.\n\n\
    ```\nclass VerticalAlignmentTable extends StatelessWidget {\n  @override\n  Widget\
    \ build(BuildContext context) {\n    return Table(\n      border: TableBorder.all(color:\
    \ Colors.green.shade200),\n      defaultVerticalAlignment: TableCellVerticalAlignment.bottom,\n\
    \      children: [\n        TableRow(children: [\n          TextCell('A'),\n \
    \         TableCell(\n            verticalAlignment: TableCellVerticalAlignment.middle,\n\
    \            child: Text('B'),\n          ),\n          Text('C'),\n         \
    \ Text('D'),\n        ]),\n        TableRow(children: [Text('E'), Text('F'), Text('G'),\
    \ Text('H')]),\n        TableRow(children: [Text('I'), Text('J'), Text('K'), Text('L')]),\n\
    \      ],\n    );\n  }\n}\n\nclass TextCell extends StatelessWidget {\n  TextCell(this.text,\
    \ {this.height = 50});\n  final String text;\n  final double height;\n\n  @override\n\
    \  Widget build(BuildContext context) {\n    return ConstrainedBox(\n      constraints:\
    \ BoxConstraints(\n        minHeight: height,\n      ),\n      child: Text(text),\n\
    \    );\n  }\n}\n```\n\nFigure 7-3 shows the screenshot of different tables.\n\
    \n![../images/479501_1_En_7_Chapter/479501_1_En_7_Fig3_HTML.png](images/479501_1_En_7_Chapter/479501_1_En_7_Fig3_HTML.png)\n\
    \n## 7.4 Scaffolding Material Design Pages\n\n### Problem\n\nYou want to scaffold\
    \ Material Design pages.\n\n### Solution\n\nUse `Scaffold` and other related widgets.\n\
    \n### Discussion\n\nMaterial Design apps have common layout structures. `Scaffold`\
    \ widget puts together other common widgets to create the basic page structures.\
    \ Table 7-6 shows the elements that can be included in a `Scaffold` widget. Widgets\
    \ specified as `drawer` and `endDrawer` are initially hidden and can be revealed\
    \ by swiping. The swiping direction depends on the text direction. The `drawer`\
    \ widget uses the same direction as the text direction, while the `endDrawer`\
    \ widget uses the opposite direction. For example, if the text direction is left-to-right,\
    \ `drawer` widget is opened by swiping from left to right, and `endDrawer` widget\
    \ is opened by swiping from right to left.\n\n**Table 7-6** `Scaffold` elements\n\
    \n| Parameter | Widget | Description |\n| --- | --- | --- |\n| `appBar` | `AppBar`\
    \ | An app bar to display at the top. |\n| `floatingActionButton` | `FloatingActionButton`\
    \ | A button to float above the body in the bottom right corner. |\n| `drawer`\
    \ | `Drawer` | A hidden panel to display to the side of the body. |\n| `endDrawer`\
    \ | `Drawer` | A hidden panel to display to the side of the body. |\n| `bottomNavigationBar`\
    \ | `BottomAppBar` / `BottomNavigationBar` | Navigation bar to display at the\
    \ bottom. |\n| `bottomSheet` | `BottomSheet` | Persistent bottom sheet. |\n| `persistentFooterButtons`\
    \ | `List<Widget>` | A set of buttons to display at the bottom. |\n| `body` |\
    \ `Widget` | Primary content. |\n\nThe second column in Table 7-6 only lists preferred\
    \ widget types for these elements. `Scaffold` constructor actually accepts any\
    \ type of widgets. For example, you can use `ListView` widget as the `drawer`.\
    \ However, these preferred widgets are more suitable."
  raw: '### Discussion


    If you want to display tabular data, using data tables is a natural choice. Tables
    can also be used for layout purpose to organize children. For these two usage
    scenarios, you can use the Table widget.


    A Table widget may have multiple rows. A table row is represented with TableRow
    widget. Table widget constructor has the children parameter of type List<TableRow>
    to provide the list of rows. TableRow constructor also has the children parameter
    of type List<Widget> to provide the list of cells in this row. Every row in a
    table must have the same number of children.


    The border of a table is defined using TableBorder class. TableBorder is similar
    with Border, but TableBorder has two extra sides:


    *   horizontalInside – The inner horizontal borders between rows


    *   verticalInside – The inner vertical borders between columns


    Listing [7-12](#479501_1_En_7_Chapter.xhtml#PC12) shows an example of a simple
    table with three rows and four columns.


    ```

    Table(

    border: TableBorder.all(color: Colors.red.shade200),

    children: [

    TableRow(children: [Text(''A''), Text(''B''), Text(''C''), Text(''D'')]),

    TableRow(children: [Text(''E''), Text(''F''), Text(''G''), Text(''H'')]),

    TableRow(children: [Text(''I''), Text(''J''), Text(''K''), Text(''L'')]),

    ],

    );

    Listing 7-12

    Simple table

    ```


    Width of columns in a table is configured by TableColumnWidth implementations.
    The columnWidths parameter of type Map<int, TableColumnWidth> defines the mapping
    between column index and its TableColumnWidth implementation. Table [7-5](#479501_1_En_7_Chapter.xhtml#Tab5)
    shows built-in TableColumnWidth implementations. MinColumnWidth and MaxColumnWidth
    classes combine other TableColumnWidth implementations. If no TableColumnWidth
    implementation is found for a column, the defaultColumnWidth parameter is used
    to get the default TableColumnWidth implementation. The default value of defaultColumnWidth
    is FlexColumnWidth(1.0), which means all columns share the same width.


    Table 7-5


    TableColumnWidth implementations


    | Name | Performance | Description |

    | --- | --- | --- |

    | FixedColumnWidth | High | Use fixed number of pixels as the column width. |

    | FlexColumnWidth | Medium | Use flex factor to divide remaining space once all
    the other non-flexible columns have been sized. |

    | FractionColumnWidth | Medium | Use a fraction of the table’s max width as the
    column width. |

    | IntrinsicColumnWidth | Low | Use the intrinsic dimensions of all cells in a
    column to determine the column width. |

    | MinColumnWidth |   | Minimum of two TableColumnWidth objects. |

    | MaxColumnWidth |   | Maximum of two TableColumnWidth objects. |


    Listing [7-13](#479501_1_En_7_Chapter.xhtml#PC13) shows an example of a table
    with different column width.


    ```

    Table(

    border: TableBorder.all(color: Colors.blue.shade200),

    columnWidths: {

    0: FixedColumnWidth(100),

    1: FlexColumnWidth(1),

    2: FlexColumnWidth(2),

    3: FractionColumnWidth(0.2),

    },

    children: [

    TableRow(children: [Text(''A''), Text(''B''), Text(''C''), Text(''D'')]),

    TableRow(children: [Text(''E''), Text(''F''), Text(''G''), Text(''H'')]),

    TableRow(children: [Text(''I''), Text(''J''), Text(''K''), Text(''L'')]),

    ],

    );

    Listing 7-13

    Table with different column width

    ```


    The vertical alignment of cells is configured with values of TableCellVerticalAlignment
    enum. TableCellVerticalAlignment enum has values top, middle, bottom, baseline,
    and fill. The defaultVerticalAlignment parameter of Table constructor specifies
    the default TableCellVerticalAlignment value. If you want to customize vertical
    alignment of a single cell, you can wrap the cell widget inside of TableCell widget
    and specify the verticalAlignment parameter. Listing [7-14](#479501_1_En_7_Chapter.xhtml#PC14)
    shows an example of specifying vertical alignment for cells.


    ```

    class VerticalAlignmentTable extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Table(

    border: TableBorder.all(color: Colors.green.shade200),

    defaultVerticalAlignment: TableCellVerticalAlignment.bottom,

    children: [

    TableRow(children: [

    TextCell(''A''),

    TableCell(

    verticalAlignment: TableCellVerticalAlignment.middle,

    child: Text(''B''),

    ),

    Text(''C''),

    Text(''D''),

    ]),

    TableRow(children: [Text(''E''), Text(''F''), Text(''G''), Text(''H'')]),

    TableRow(children: [Text(''I''), Text(''J''), Text(''K''), Text(''L'')]),

    ],

    );

    }

    }

    class TextCell extends StatelessWidget {

    TextCell(this.text, {this.height = 50});

    final String text;

    final double height;

    @override

    Widget build(BuildContext context) {

    return ConstrainedBox(

    constraints: BoxConstraints(

    minHeight: height,

    ),

    child: Text(text),

    );

    }

    }

    Listing 7-14

    Vertical alignment of table cells

    ```


