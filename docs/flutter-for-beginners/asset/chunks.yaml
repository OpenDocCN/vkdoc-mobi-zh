    \ 3-7 中，字符串值包含两个表情符号。\n\n```\nvar value = '\\u{1F686} \\u{1F6B4}';\nprint(value);\n\
    代码清单 3-7\nRunes\n```\n\n### 符号\n\nSymbol 对象代表一个运算符或标识符。符号可以使用构造函数 `Symbol(<name>)`\
    \ 或符号字面量 `#<name>` 创建。使用相同名称创建的符号是相等的；参见代码清单 3-8。当你需要按名称引用标识符时，应该使用符号。\n\n```\n\
    assert(Symbol('a') == #a);\n代码清单 3-8\n符号\n```\n\n## 3.2 使用枚举类型\n\n### 问题\n\n你想要一种类型安全的方式来声明一组常量值。\n\
    \n### 解决方案\n\n使用枚举类型。\n\n### 讨论\n\n与其他编程语言一样，Dart 拥有枚举类型。要声明一个枚举类型，请使用 `enum`\
    \ 关键字。枚举中的每个值都有一个 `index` getter 来获取该值从零开始的位置。使用 `values` 可以获取枚举中所有值的列表。枚举通常用于\
    \ `switch` 语句中。在代码清单 3-9 中，枚举类型 `TrafficColor` 有三个值。第一个值 `red` 的索引是 `0`。\n\n```\n\
    enum TrafficColor { red, green, yellow }\nvoid main() {\n  assert(TrafficColor.red.index\
    \ == 0);\n  assert(TrafficColor.values.length == 3);\n  var color = TrafficColor.red;\n\
    \  switch (color) {\n    case TrafficColor.red:\n      print('stop');\n      break;\n\
    \    case TrafficColor.green:\n      print('go');\n      break;\n    case TrafficColor.yellow:\n\
    \      print('be careful');\n  }\n}\n代码清单 3-9\n枚举类型\n```\n\n## 3.3 使用动态类型\n\n\
    ### 问题\n\n你不知道对象的类型，或者你不在意其类型。\n\n### 解决方案\n\n使用 `dynamic` 类型。\n\n### 讨论\n\nDart\
    \ 是一种强类型语言。大多数时候，我们希望对象具有已定义的类型。然而，有时我们可能不知道或不关心实际的类型；这时我们可以使用 `dynamic` 作为类型。动态类型经常与\
    \ `Object` 类型混淆。`Object` 和 `dynamic` 都允许所有值。如果你想声明接受所有对象，则应使用 `Object`。如果类型是 `dynamic`，我们可以使用\
    \ `is` 操作符来检查它是否是期望的类型。实际类型可以通过 `runtimeType` 获取。在代码清单 3-10 中，`value` 的实际类型是 `int`，然后类型变更为\
    \ `String`。\n\n```\ndynamic value = 1;\nprint(value.runtimeType);\nvalue = 'test';\n\
    if (value is String) {\n  print('string');\n}\n代码清单 3-10\n使用动态类型\n```\n\n## 3.4\
    \ 理解函数\n\n### 问题\n\n你想了解 Dart 中的函数。\n\n### 解决方案\n\nDart 中的函数非常强大且灵活。\n"
- fmt: "### Discussion\n\nFunctions in Dart are objects and have the type `Function`.\
    \ Functions can be assigned to values, passed in function arguments, and used\
    \ as function return values. It’s very easy to create high-order functions in\
    \ Dart. A function may have zero or many parameters. Some parameters are required,\
    \ while some are optional. Required arguments come first in the parameters list,\
    \ followed by optional parameters. Optional positional parameters are wrapped\
    \ in `[]`.\n\nWhen a function has a long list of parameters, it’s hard to remember\
    \ the position and meaning of these parameters. It’s better to use named parameters.\
    \ Named parameters can be marked as required using the `@required` annotation.\
    \ Parameters can have default values specified using `=`. If no default value\
    \ is provided, the default value is `null`.\n\nIn Listing [3-11](#479501_1_En_3_Chapter.xhtml#PC11),\
    \ the function `sum()` has an optional positional argument `initial` with the\
    \ default value `0`. The function `joinToString()` has a required named argument\
    \ `separator` and two optional named arguments `prefix` and `suffix`. The arrow\
    \ syntax used in `joinToString()` is a shorthand for function body with only one\
    \ expression. The syntax `=> expr` is the same as `{ return expr; }`. Using arrow\
    \ syntax makes code shorter and easier to read.\n\n```\nimport 'package:meta/meta.dart';\n\
    int sum(List list, [int initial = 0]) {\n  var total = initial;\n  list.forEach((v)\
    \ => total += v);\n  return total;\n}\nString joinToString(List list,\n    {@required\
    \ String separator, String prefix = \", String suffix = \"}) =>\n    '$prefix${list.join(separator)}$suffix';\n\
    void main() {\n  assert(sum([1, 2, 3]) == 6);\n  assert(sum([1, 2, 3], 10) ==\
    \ 16);\n  assert(joinToString(['a', 'b', 'c'], separator: ',') == 'a,b,c');\n\
    \  assert(\n      joinToString(['a', 'b', 'c'], separator: '-', prefix: '*', suffix:\
    \ '?') ==\n          '*a-b-c?');\n}\n```\n\nSometimes you may not need a name\
    \ for a function. These anonymous functions are useful when providing callbacks.\
    \ In Listing [3-12](#479501_1_En_3_Chapter.xhtml#PC12), an anonymous function\
    \ is passed to the method `forEach()`.\n\n```\nvar list = [1, 2, 3];\nlist.forEach((v)\
    \ => print(v * 10));\n```\n\n## 3.5 Using Typedefs\n\n### Problem\n\nYou want\
    \ to have an alias of a function type.\n\n### Solution\n\nUse typedefs.\n\n###\
    \ Discussion\n\nIn Dart, functions are objects. Functions are instances of the\
    \ type `Function`. But the actual type of a function is defined by the types of\
    \ its parameters and the type of its return value. What matters is the actual\
    \ function type when a function is used as a parameter or return value. `typedef`\
    \ in Dart allows us to create an alias of a function type. The type alias can\
    \ be used just like other types. In Listing [3-13](#479501_1_En_3_Chapter.xhtml#PC13),\
    \ `Processor<T>` is an alias of the function type which has a parameter of type\
    \ `T` and a return type of `void`. This type is used as the parameter type in\
    \ the function `process()`.\n\n```\ntypedef Processor = void Function(T value);\n\
    void process(List list, Processor processor) {\n  list.forEach((item) {\n    print('processing\
    \ $item');\n    processor(item);\n    print('processed $item');\n  });\n}\nvoid\
    \ main() {\n  process([1, 2, 3], print);\n}\n```\n\n## 3.6 Using Cascade Operator\n\
    \n### Problem\n\nYou want to make a sequence of operations on the same object.\n\
    \n### Solution\n\nUse the cascade operator (`..`) in Dart.\n\n### Discussion\n\
    \nDart has a special cascade operator (`..`) which allows us to make a sequence\
    \ of operations on the same object. To chain operations on the same object in\
    \ other programming languages, we usually need to create a fluent API in which\
    \ each method returns the current object. The cascade operator in Dart makes this\
    \ requirement unnecessary. Methods can still be chained even though they don’t\
    \ return the current object. The cascade operator also supports field access.\
    \ In Listing [3-14](#479501_1_En_3_Chapter.xhtml#PC14), cascade operator is used\
    \ to access the fields and method in classes `User` and `Address`.\n\n```\nclass\
    \ User {\n  String name, email;\n  Address address;\n  void sayHi() => print('hi,\
    \ $name');\n}\nclass Address {\n  String street, suburb, zipCode;\n  void log()\
    \ => print('Address: $street');\n}\nvoid main() {\n  User()\n    ..name = 'Alex'\n\
    \    ..email = 'alex@example.org'\n    ..address = (Address()\n      ..street\
    \ = 'my street'\n      ..suburb = 'my suburb'\n      ..zipCode = '1000'\n    \
    \  ..log())\n    ..sayHi();\n}\n```\n\n## 3.7 Overriding Operators\n\n### Problem\n\
    \nYou want to override operators in Dart.\n\n### Solution\n\nDefine overriding\
    \ methods in class for operators.\n\n### Discussion\n\nDart has many operators.\
    \ Only a subset of these operators can be overridden. These overridable operators\
    \ are `<`, `+`, `|`, `[]`, `>`, `/`, `^`, `[]=`, `<=`, `~/`, `&`, `~`, `>=`, `*`,\
    \ `<<`, `==`, `-`, `%`, and `>>`. For some classes, using operators is more concise\
    \ than using methods. For example, the `List` class overrides the `+` operator\
    \ for list concatenation. The code `[1] + [2]` is very easy to understand. In\
    \ Listing [3-15](#479501_1_En_3_Chapter.xhtml#PC15), the class `Rectangle` overrides\
    \ operators `<` and `>` to compare instances by area.\n\n```\nclass Rectangle\
    \ {\n  int width, height;\n  Rectangle(this.width, this.height);\n  get area =>\
    \ width * height;\n  bool operator <(Rectangle rect) => area < rect.area;\n  bool\
    \ operator >(Rectangle rect) => area > rect.area;\n}\nvoid main() {\n  var rect1\
    \ = Rectangle(100, 100);\n  var rect2 = Rectangle(200, 150);\n  assert(rect1 <\
    \ rect2);\n  assert(rect2 > rect1);\n}\n```\n\n## 3.8 Using Constructors\n\n###\
    \ Problem\n\nYou want to create new instances of Dart classes.\n\n### Solution\n\
    \nUse constructors."
  raw: '### Discussion


    Functions in Dart are objects and have the type `Function`. Functions can be assigned
    to values, passed in function arguments, and used as function return values. It’s
    very easy to create high-order functions in Dart. A function may have zero or
    many parameters. Some parameters are required, while some are optional. Required
    arguments come first in the parameters list, followed by optional parameters.
    Optional positional parameters are wrapped in `[]`.


    When a function has a long list of parameters, it’s hard to remember the position
    and meaning of these parameters. It’s better to use named parameters. Named parameters
    can be marked as required using the `@required` annotation. Parameters can have
    default values specified using `=`. If no default value is provided, the default
    value is `null`.


    In Listing [3-11](#479501_1_En_3_Chapter.xhtml#PC11), the function `sum()` has
    an optional positional argument `initial` with the default value `0`. The function
    `joinToString()` has a required named argument `separator` and two optional named
    arguments `prefix` and `suffix`. The arrow syntax used in `joinToString()` is
    a shorthand for function body with only one expression. The syntax `=> expr` is
    the same as `{ return expr; }`. Using arrow syntax makes code shorter and easier
    to read.


    ```

    import ''package:meta/meta.dart'';

    int sum(List list, [int initial = 0]) {

    var total = initial;

    list.forEach((v) => total += v);

    return total;

    }

    String joinToString(List list,

    {@required String separator, String prefix = ", String suffix = "}) =>

    ''$prefix${list.join(separator)}$suffix'';

    void main() {

    assert(sum([1, 2, 3]) == 6);

    assert(sum([1, 2, 3], 10) == 16);

    assert(joinToString([''a'', ''b'', ''c''], separator: '','') == ''a,b,c'');

    assert(

    joinToString([''a'', ''b'', ''c''], separator: ''-'', prefix: ''*'', suffix: ''?'')
    ==

    ''*a-b-c?'');

    }

    Listing 3-11

    Function parameters

    ```


    Sometimes you may not need a name for a function. These anonymous functions are
    useful when providing callbacks. In Listing [3-12](#479501_1_En_3_Chapter.xhtml#PC12),
    an anonymous function is passed to the method `forEach()`.


    ```

    var list = [1, 2, 3];

    list.forEach((v) => print(v * 10));

    Listing 3-12

    Anonymous functions

    ```


    ## 3.5 Using Typedefs


    ### Problem


    You want to have an alias of a function type.


    ### Solution


    Use typedefs.


    ### Discussion


    In Dart, functions are objects. Functions are instances of the type `Function`.
    But the actual type of a function is defined by the types of its parameters and
    the type of its return value. What matters is the actual function type when a
    function is used as a parameter or return value. `typedef` in Dart allows us to
    create an alias of a function type. The type alias can be used just like other
    types. In Listing [3-13](#479501_1_En_3_Chapter.xhtml#PC13), `Processor<T>` is
    an alias of the function type which has a parameter of type `T` and a return type
    of `void`. This type is used as the parameter type in the function `process()`.


    ```

    typedef Processor = void Function(T value);

    void process(List list, Processor processor) {

    list.forEach((item) {

    print(''processing $item'');

    processor(item);

    print(''processed $item'');

    });

    }

    void main() {

    process([1, 2, 3], print);

    }

    Listing 3-13

    typedef

    ```


    ## 3.6 Using Cascade Operator


    ### Problem


    You want to make a sequence of operations on the same object.


    ### Solution


    Use the cascade operator (`..`) in Dart.


    ### Discussion


    Dart has a special cascade operator (`..`) which allows us to make a sequence
    of operations on the same object. To chain operations on the same object in other
    programming languages, we usually need to create a fluent API in which each method
    returns the current object. The cascade operator in Dart makes this requirement
    unnecessary. Methods can still be chained even though they don’t return the current
    object. The cascade operator also supports field access. In Listing [3-14](#479501_1_En_3_Chapter.xhtml#PC14),
    cascade operator is used to access the fields and method in classes `User` and
    `Address`.


    ```

    class User {

    String name, email;

    Address address;

    void sayHi() => print(''hi, $name'');

    }

    class Address {

    String street, suburb, zipCode;

    void log() => print(''Address: $street'');

    }

    void main() {

    User()

    ..name = ''Alex''

    ..email = ''alex@example.org''

    ..address = (Address()

    ..street = ''my street''

    ..suburb = ''my suburb''

    ..zipCode = ''1000''

    ..log())

    ..sayHi();

    }

    Listing 3-14

    Using cascade operator

    ```


    ## 3.7 Overriding Operators


    ### Problem


    You want to override operators in Dart.


    ### Solution


    Define overriding methods in class for operators.


    ### Discussion


    Dart has many operators. Only a subset of these operators can be overridden. These
    overridable operators are `<`, `+`, `|`, `[]`, `>`, `/`, `^`, `[]=`, `<=`, `~/`,
    `&`, `~`, `>=`, `*`, `<<`, `==`, `-`, `%`, and `>>`. For some classes, using operators
    is more concise than using methods. For example, the `List` class overrides the
    `+` operator for list concatenation. The code `[1] + [2]` is very easy to understand.
    In Listing [3-15](#479501_1_En_3_Chapter.xhtml#PC15), the class `Rectangle` overrides
    operators `<` and `>` to compare instances by area.


    ```

    class Rectangle {

    int width, height;

    Rectangle(this.width, this.height);

    get area => width * height;

    bool operator  area (Rectangle rect) => area > rect.area;

    }

    void main() {

    var rect1 = Rectangle(100, 100);

    var rect2 = Rectangle(200, 150);

    assert(rect1  rect1);

    }

    Listing 3-15

    Overriding operators

    ```


