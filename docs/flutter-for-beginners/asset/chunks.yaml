    ## 11.8 Creating Hero Animations


    ### Problem


    You want to animate an element across two routes.


    ### Solution


    Use `Hero` widget.


    ### Discussion


    When switching from the current route to a new route, it’s better to have some
    elements in the new route to indicate the navigation context. For example, the
    current route displays a list of items. When the user taps one item to navigate
    to the details route, the new route should have a widget to show brief information
    about the selected item.


    `Hero` widget is shared between two routes. A `Hero` widget is created with a
    tag and a child widget. The tag is the unique identifier of a `Hero` widget. If
    the source route and target route both have a `Hero` widget with the same tag,
    then during route transition, the `Hero` widget in source route is animated to
    the location in the target route. Tags of Hero widget must be unique in the same
    widgets tree.


    In Listing [11-10](#479501_1_En_11_Chapter.xhtml#PC10), ImageHero class wraps
    a Hero widget that displays an image in a SizedBox widget. The tag is set to the
    image’s URL.


    ```

    class ImageHero extends StatelessWidget {

    ImageHero({Key key, this.imageUrl, this.width, this.height})

    : super(key: key);

    final String imageUrl;

    final double width;

    final double height;

    @override

    Widget build(BuildContext context) {

    return SizedBox(

    width: width,

    height: height,

    child: Hero(

    tag: imageUrl,

    child: Image.network(imageUrl),

    ),

    );

    }

    }

    Listing 11-10

    Hero widget

    ```


