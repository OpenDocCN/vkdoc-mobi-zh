    GitHubJobsClient class to test\n```\n\nTo test `GitHubJobsClient` class, we can\
    \ create a mock object for `http.Client` object. In Listing [14-7](#479501_1_En_14_Chapter.xhtml#PC7),\
    \ `MockHttpClient` class is the mock class for `http.Client` class. In the first\
    \ test case, when the `get()` method of `MockHttpClient` is called with the specified\
    \ `Uri` object, a `Future<Response>` object with JSON string is used as the result.\
    \ We can verify that `getJobs()` method of `GitHubJobsClient` can parse the response\
    \ and return a `List` object with one element. In the second test case, the return\
    \ result of `get()` method of `MockHttpClient` is set to a `Future<Response>`\
    \ with HTTP 500 error. We then verify an exception is thrown by calling `getJobs()`\
