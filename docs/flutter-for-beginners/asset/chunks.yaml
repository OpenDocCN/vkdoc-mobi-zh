    ## 10.4 使用继承通知器管理状态


    ### 问题


    你希望依赖组件能够基于 `Listenable` 对象的通知重建。


    ### 解决方案


    创建你自己的 `InheritedNotifier` 组件子类。


    ### 讨论


    `Listenable` 类通常用于管理监听器并通知客户端进行更新。你可以使用相同的模式通过 `InheritedNotifier` 通知依赖项重建。`InheritedNotifier`
    组件也继承自 `InheritedWidget` 类。在创建 `InheritedNotifier` 组件时，你需要提供 `Listenable` 对象。当
    `Listenable` 对象发送通知时，该 `InheritedNotifier` 组件的依赖项会收到通知并重建。


    在清单 10-11 中，`ConfigNotifier` 使用 `ValueNotifier<Config>` 作为 `Listenable` 的类型。静态方法
    `of()` 从 `ConfigNotifier` 对象中获取 `Config` 对象。


    ```

    class ConfigNotifier extends InheritedNotifier> {

    ConfigNotifier({

    Key key,

    @required notifier,

    @required Widget child,

    }) : super(key: key, notifier: notifier, child: child);

    static Config of(BuildContext context) {

    final ConfigNotifier configNotifier =

    context.inheritFromWidgetOfExactType(ConfigNotifier);

    return configNotifier?.notifier?.value ?? Config.fallback();

    }

    }

    清单 10-11

    作为 InheritedNotifier 的 ConfigNotifier

    ```


    要使用 `ConfigNotifier` 组件，你需要创建一个 `ValueNotifier<Config>` 的新实例。要更新 `Config` 对象，你可以简单地将
    `value` 属性设置为新值。`ValueNotifier` 对象会发送通知，从而通知依赖组件进行重建。


    ```

    class ConfiguredNotifierPage extends StatelessWidget {

    ConfiguredNotifierPage({Key key, this.child}) : super(key: key);

    final Widget child;

    final ValueNotifier _notifier =

    ValueNotifier(Config(color: Colors.green, fontSize: 16));

    @override

    Widget build(BuildContext context) {

    return ConfigNotifier(

    notifier: _notifier,

    child: Column(

    children: [

    ConfigUpdater(

    onColorChanged: (Color color) {

    _notifier.value = _notifier.value.copyWith(color: color);

    },

    onFontSizeIncreased: () {

    Config oldConfig = _notifier.value;

    _notifier.value =

    oldConfig.copyWith(fontSize: oldConfig.fontSize + 1.0);

    },

    ),

    Container(

    decoration: BoxDecoration(border: Border.all()),

    padding: EdgeInsets.all(8),

