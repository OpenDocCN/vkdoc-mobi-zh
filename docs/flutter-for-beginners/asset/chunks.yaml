    ## 6.13 选择日期和时间


    ### 问题


    你想要选择日期和时间。


    ### 解决方案


    使用 Material Design 的 `showDatePicker()` 和 `showTimePicker()` 函数，或使用 iOS 风格的 `CupertinoDatePicker`
    和 `CupertinoTimerPicker`。

    '
- fmt: '### Discussion


    对于 Material Design，你可以使用诸如 `YearPicker`、`MonthPicker` 和 `DayPicker` 这类小部件，或者使用
    `showDatePicker()` 函数来让用户选择日期。`showTimePicker()` 函数用于选择时间。小部件很少用于选择日期，大多数情况下会使用
    `showDatePicker()` 和 `showTimePicker()` 函数来显示对话框。


    `YearPicker` 小部件显示一个年份列表供用户选择。创建 `YearPicker` 小部件时，你需要通过 `selectedDate`、`firstDate`
    和 `lastDate` 参数分别提供选中的日期、最早日期和最晚日期的 `DateTime` 实例。当选择发生变更时，`onChanged` 回调会被调用，并传入选中的
    `DateTime` 实例。


    `MonthPicker` 小部件显示一个月份列表供用户选择。`MonthPicker` 的构造函数拥有与 `YearPicker` 相同的 `selectedDate`、`firstDate`、`lastDate`
    和 `onChanged` 参数。它还包含一个谓词函数 `selectableDayPredicate`，用于自定义哪些日子是可选择的。


    `DayPicker` 小部件显示指定月份的天数供用户选择。`DayPicker` 的构造函数拥有 `MonthPicker` 的所有参数，另外还有 `displayedMonth`
    参数，用于设置要选择日期的月份。


    如果你希望显示一个对话框让用户选择日期，使用 `showDatePicker()` 函数比自己创建对话框更容易。你需要为 `initialDate`、`firstDate`
    和 `lastDate` 参数传入 `DateTime` 实例。类型为 `BuildContext` 的 `context` 参数也是必需的。该函数可以工作在由
    `DatePickerMode` 枚举定义的两种模式下：`DatePickerMode.day` 表示选择月份和日期，而 `DatePickerMode.year`
    表示选择年份。`showDatePicker()` 函数的返回值是一个 `Future<DateTime>`，代表选中的日期。


    在清单 [6-19](#479501_1_En_6_Chapter.xhtml#PC19) 中，`TextField` 小部件将 `IconButton`
    作为后缀。当按钮被按下时，`showDatePicker()` 函数被调用以显示日期选择对话框。选中的日期会显示在 `TextField` 小部件中。


    ```

    class PickDate extends StatefulWidget {

    @override

    _PickDateState createState() => _PickDateState();

    }

    class _PickDateState extends State {

    DateTime _selectedDate = DateTime.now();

    TextEditingController _controller = TextEditingController();

    @override

    Widget build(BuildContext context) {

    return TextField(

    controller: _controller,

    decoration: InputDecoration(

    labelText: ''Date'',

    suffix: IconButton(

    icon: Icon(Icons.date_range),

    onPressed: () {

    showDatePicker(

    context: context,

    initialDate: _selectedDate,

    firstDate: DateTime.now().subtract(Duration(days: 30)),

    lastDate: DateTime.now().add(Duration(days: 30)),)

    .then((selectedDate) {

    if (selectedDate != null) {

    _selectedDate = selectedDate;

    _controller.text = DateFormat.yMd().format(_selectedDate);

    }

    });

    },

    ),

    ),

    );

    }

    }

    Listing 6-19

    Pick date

    ```


    `showTimePicker()` 函数显示一个用于选择时间的对话框。你需要传入类型为 `TimeOfDay` 的 `initialTime` 参数作为初始显示时间。返回值是一个
    `Future<TimeOfDay>` 实例，代表选中的时间。清单 [6-20](#479501_1_En_6_Chapter.xhtml#PC20) 中的代码使用了与清单
    [6-19](#479501_1_En_6_Chapter.xhtml#PC19) 类似的模式来显示时间选择对话框。


    ```

    class PickTime extends StatefulWidget {

    @override

    _PickTimeState createState() => _PickTimeState();

    }

    class _PickTimeState extends State {

    TimeOfDay _selectedTime = TimeOfDay.now();

    TextEditingController _controller = TextEditingController();

    @override

    Widget build(BuildContext context) {

    return TextField(

    controller: _controller,

    decoration: InputDecoration(

    labelText: ''Time'',

    suffix: IconButton(

    icon: Icon(Icons.access_time),

    onPressed: () {

    showTimePicker(

    context: context,

    initialTime: _selectedTime,

    ).then((selectedTime) {

    if (selectedTime != null) {

    _selectedTime = selectedTime;

    _controller.text = _selectedTime.format(context);

    }

    });

    },

    )),

    );

    }

    }

    Listing 6-20

    Pick time

    ```


    在 iOS 风格下，你可以分别使用 `CupertinoDatePicker` 和 `CupertinoTimerPicker` 小部件来选择日期和时间。`CupertinoDatePicker`
    可以根据 `CupertinoDatePickerMode` 枚举的 `mode` 参数有不同的模式，包括 `date`、`time` 和 `dateAndTime`。与
    Material Design 的小部件类似，`CupertinoDatePicker` 构造函数拥有 `initialDateTime`、`minimumDate`、`maximumDate`
    和 `onDateTimeChanged` 参数。`CupertinoTimerPicker` 也可以根据 `CupertinoTimerPickerMode`
    枚举的 `mode` 参数有不同的模式，包括 `hm`、`ms` 和 `hms`。区别在于 `CupertinoTimerPicker` 使用 `Duration`
    实例来设置初始值，并作为 `onTimerDurationChanged` 回调中的值。


    ## 6.14 包装表单字段


    ### 问题


    你希望将表单小部件包装为表单字段。


    ### 解决方案


    使用 `FormField` 或 `TextFormField`。'
  raw: '### Discussion


    For Material Design, you can use widgets like YearPicker, MonthPicker, and DayPicker
    or showDatePicker() function to allow user to pick dates. The showTimePicker()
    function is used to pick times. Widgets are rarely used to pick dates. Most of
    the time, showDatePicker() and showTimePicker() functions are used to show dialogs.


    YearPicker widget shows a list of years to pick. When creating YearPicker widgets,
    you need to provide DateTime instances for selected date, earliest date, and latest
    date using selectedDate, firstDate, and lastDate parameters, respectively. When
    the selection is changed, the onChanged callback is invoked with the selected
    DateTime instance.


    MonthPicker widget shows a list of months to pick. MonthPicker constructor has
    the same parameters selectedDate, firstDate, lastDate, and onChanged as YearPicker.
    It also has a predicate function selectableDayPredicate to customize which days
    are selectable.


    DayPicker widget shows the days of a given month to pick. DayPicker constructor
    has all the parameters of MonthPicker and the displayedMonth parameter to set
    the month to pick for days.


    If you want to show a dialog for user to select dates, showDatePicker() function
    is easier to use than creating your own dialogs. You need to pass DateTime instances
    for parameters initialDate, firstDate, and lastDate. The context parameter of
    type BuildContext is also required. This function can work in two modes defined
    in the DatePickerMode enum. DatePickerMode.day means choosing a month a day, while
    DatePickerMode.year means choosing a year. The return value of showDatePicker()
    function is a Future<DateTime> representing the selected date.


    In Listing [6-19](#479501_1_En_6_Chapter.xhtml#PC19), the TextField widget has
    an IconButton as the suffix. When the button is pressed, showDatePicker() function
    is invoked to show the date picker dialog. The selected date is displayed in the
    TextField widget.


    ```

    class PickDate extends StatefulWidget {

    @override

    _PickDateState createState() => _PickDateState();

    }

    class _PickDateState extends State {

    DateTime _selectedDate = DateTime.now();

