    Prefix and suffix


    ### Text


    You can add different types of text as the decorations and customize their styles.
    There are five types of text shown in Table [6-4](#479501_1_En_6_Chapter.xhtml#Tab4).


    Table 6-4


    Different types of text


    | Type | Text | Style | Description |

    | --- | --- | --- | --- |

    | Label | `labelText` | `labelStyle` | Labels are displayed above the input field.
    |

    | Helper | `helperText` | `helperStyle` | Helper text are displayed below the
    input field. |

    | Hint | `hintText` | `hintStyle` | Hints are displayed in the input field when
    it’s empty. |

    | Error | `errorText` | `errorStyle` | Errors are displayed below the input field.
    |

    | Counter | `counterText` | `counterStyle` | Counters are displayed below the
    input field but aligned to the right. |


    If `errorText` value is not null, the input field is set to the error state.


    ```

    TextField(

    keyboardType: TextInputType.emailAddress,

    decoration: InputDecoration(

    labelText: ''Email'',

    labelStyle: TextStyle(fontWeight: FontWeight.bold),

    hintText: ''Email address for validation'',

    helperText: ''For receiving validation emails'',

    counterText: ''10'',

    ),

    )

