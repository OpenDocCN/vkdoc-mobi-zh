  raw: '### Discussion


    If you want to display web pages inside of Flutter apps, you can use `webview_flutter`
    plugin ( [`https://pub.dartlang.org/packages/webview_flutter`](https://pub.dartlang.org/packages/webview_flutter)
    ). After adding `webview_flutter: ^0.3.6` to the dependencies of `pubspec.yaml`
    file, you can use `WebView` widget to show web pages and interact with them. For
    iOS, you need to add the `io.flutter.embedded_views_preview` key with value `YES`
    to the `ios/Runner/Info.plist` file.


    Table [12-3](#479501_1_En_12_Chapter.xhtml#Tab3) shows parameters of WebView constructor.
    To control the web view, you need to use `onWebViewCreated` callback to get the
    `WebViewController` object. The value of `javascriptMode` can be `JavascriptMode.disabled`
    or `JavascriptMode.unrestricted`. To enable JavaScript execution in the web pages,
    `JavascriptMode.unrestricted` should be set as the value. The `navigationDelegate`
    of type `NavigationDelegate` is a function that takes a `NavigationRequest` object
    and returns value of `NavigationDecision` enum. If the return value is `NavigationDecision.prevent`,
    the navigation request is blocked. If the return value is `NavigationDecision.navigate`,
    then navigation request can continue. You can use navigation delegate to block
    users from accessing restricted pages. The `onPageFinished` callback receives
    the URL of the loaded page.


    Table 12-3


    Parameters of WebView constructor


    | Name | Description |

    | --- | --- |

    | `initialUrl` | The initial URL to load. |

    | `onWebViewCreated` | Callback when the `WebView` is created. |

    | `javascriptMode` | Whether JavaScript is enabled. |

    | `javascriptChannels` | Channels to receive messages sent by JavaScript code
    running in the web view. |

    | `navigationDelegate` | Determines whether a navigation request should be handled.
    |

    | `onPageFinished` | Callback when a page loading is finished. |

    | `gestureRecognizers` | Gestures recognized by the web view. |


    After getting the `WebViewController` object, you can use methods shown in Table
    [12-4](#479501_1_En_12_Chapter.xhtml#Tab4) to interact with the web view. All
    these methods are asynchronous and return `Future` objects. For example, the `canGoBack()`
    method returns a `Future<bool>` object.


    Table 12-4


    Methods of WebViewController


    | Name | Description |

    | --- | --- |

    | `evaluateJavascript(String javascriptString)` | Evaluate JavaScript code in
    the context of current page. |

    | `loadUrl(String url, { Map<String, String> headers }` | Load the specified URL.
    |

    | `reload()` | Reload the current URL. |

    | `goBack()` | Go back in the navigation history. |

    | `canGoBack()` | Whether it’s valid to go back in the history. |

    | `goForward()` | Go forward in the navigation history. |

    | `canGoForward()` | Whether it’s valid to go forward in history. |

    | `clearCache()` | Clear the cache. |

    | `currentUrl()` | Get the current URL. |


    Listing [12-9](#479501_1_En_12_Chapter.xhtml#PC10) shows an example of using `WebView`
    widget to interact with Google Search page. Because the creation of `WebView`
    widget is asynchronous, the `Completer<WebViewController>` object is used to capture
    the `WebViewController` object. In the `onWebViewCreated` callback, the `Completer<WebViewController>`
    object is completed with the created `WebViewController` object . In the `onPageFinished`
    callback, the `evaluateJavascript()` method of `WebViewController` object is used
    to execute JavaScript code that sets value to the input and clicks the search
    button. This causes the `WebView` widget to load the search result page.


    The `JavascriptChannel` object is created with a channel name and a `JavascriptMessageHandler`
    function to handle the messages sent from JavaScript code running in the web page.
    The message handler in Listing [12-9](#479501_1_En_12_Chapter.xhtml#PC10) uses
    a `SnackBar` widget to show the received message. The channel name “Messenger”
    becomes the global object that has a `postMessage` function to be used in JavaScript
    code to send messages back.


    ```

    class GoogleSearch extends StatefulWidget {

    @override

    _GoogleSearchState createState() => _GoogleSearchState();

    }

    class _GoogleSearchState extends State {

    final Completer _controller =

    Completer();

    @override

    Widget build(BuildContext context) {

    return WebView(

    initialUrl: ''https://google.com'',

    javascriptMode: JavascriptMode.unrestricted,

    javascriptChannels:

    [_javascriptChannel(context)].toSet(),

    onWebViewCreated: (WebViewController webViewController) {

    _controller.complete(webViewController);

    },

    onPageFinished: (String url) {

    _controller.future.then((WebViewController webViewController) {

    webViewController.evaluateJavascript(

    ''Messenger.postMessage("Loaded in " + navigator.userAgent);'');

    webViewController.evaluateJavascript(

    ''document.getElementsByName("q")[0].value="flutter";''

    ''document.querySelector("button[aria-label*=Search]").click();'');

    }) ;

    },

    );

    }

    JavascriptChannel _javascriptChannel(BuildContext context) {

    return JavascriptChannel(

    name: ''Messenger'',

    onMessageReceived: (JavascriptMessage message) {

    Scaffold.of(context).showSnackBar(

    SnackBar(content: Text(message.message)),

    );

    });

    }

    }

    Listing 12-9

    Use WebView

    ```


    ## 12.6 Playing Videos


    ### Problem


    You want to play videos.


    ### Solution


    Use `video_player` plugin .'
  trans: "\n### 讨论\n\n如果你想在 Flutter 应用中显示网页，可以使用 `webview_flutter` 插件（`https://pub.dartlang.org/packages/webview_flutter`）。在\
    \ `pubspec.yaml` 文件的依赖项中添加 `webview_flutter: ⁰.3.6` 后，你就可以使用 `WebView` 组件来显示网页并与之交互。对于\
    \ iOS 系统，你需要在 `ios/Runner/Info.plist` 文件中添加键 `io.flutter.embedded_views_preview`，其值为\
    \ `YES`。\n\n表 12-3 展示了 `WebView` 构造函数的参数。要控制网页视图，你需要使用 `onWebViewCreated` 回调来获取\
    \ `WebViewController` 对象。`javascriptMode` 的值可以是 `JavascriptMode.disabled` 或 `JavascriptMode.unrestricted`。要启用在网页中执行\
    \ JavaScript，应将值设置为 `JavascriptMode.unrestricted`。`navigationDelegate` 的类型为 `NavigationDelegate`，它是一个函数，接收一个\
    \ `NavigationRequest` 对象，并返回 `NavigationDecision` 枚举值。如果返回值是 `NavigationDecision.prevent`，则导航请求会被阻止。如果返回值是\
    \ `NavigationDecision.navigate`，则导航请求可以继续。你可以使用导航委托来阻止用户访问受限页面。`onPageFinished`\
    \ 回调接收已加载页面的 URL。\n\n**表 12-3** `WebView` 构造函数参数\n\n| 名称 | 描述 |\n| --- | --- |\n\
    | `initialUrl` | 要加载的初始 URL。 |\n| `onWebViewCreated` | 当 `WebView` 创建时的回调。 |\n\
    | `javascriptMode` | 是否启用 JavaScript。 |\n| `javascriptChannels` | 用于接收在网页视图中运行的\
    \ JavaScript 代码所发送消息的通道。 |\n| `navigationDelegate` | 决定是否应处理导航请求。 |\n| `onPageFinished`\
    \ | 页面加载完成时的回调。 |\n| `gestureRecognizers` | 网页视图识别的手势。 |\n\n获取 `WebViewController`\
    \ 对象后，你可以使用表 12-4 中所示的方法与网页视图进行交互。所有这些方法都是异步的，并返回 `Future` 对象。例如，`canGoBack()`\
    \ 方法返回一个 `Future<bool>` 对象。\n\n**表 12-4** `WebViewController` 的方法\n\n| 名称 | 描述\
    \ |\n| --- | --- |\n| `evaluateJavascript(String javascriptString)` | 在当前页面的上下文中执行\
    \ JavaScript 代码。 |\n| `loadUrl(String url, { Map<String, String> headers })` |\
    \ 加载指定的 URL。 |\n| `reload()` | 重新加载当前 URL。 |\n| `goBack()` | 在导航历史中后退。 |\n| `canGoBack()`\
    \ | 检查在历史中后退是否有效。 |\n| `goForward()` | 在导航历史中前进。 |\n| `canGoForward()` | 检查在历史中前进是否有效。\
    \ |\n| `clearCache()` | 清除缓存。 |\n| `currentUrl()` | 获取当前的 URL。 |\n\n清单 12-9 展示了一个使用\
    \ `WebView` 组件与谷歌搜索页面交互的示例。由于 `WebView` 组件的创建是异步的，因此使用 `Completer<WebViewController>`\
    \ 对象来捕获 `WebViewController` 对象。在 `onWebViewCreated` 回调中，用已创建的 `WebViewController`\
    \ 对象来填充 `Completer<WebViewController>` 对象。在 `onPageFinished` 回调中，使用 `WebViewController`\
    \ 对象的 `evaluateJavascript()` 方法来执行 JavaScript 代码，该代码向输入框设置一个值并点击搜索按钮。这会导致 `WebView`\
    \ 组件加载搜索结果页面。\n\n`JavascriptChannel` 对象通过一个通道名称和一个 `JavascriptMessageHandler`\
    \ 函数创建，用于处理从网页中运行的 JavaScript 代码发送来的消息。清单 12-9 中的消息处理器使用一个 `SnackBar` 组件来显示接收到的消息。通道名称\
    \ `Messenger` 成为一个全局对象，它有一个 `postMessage` 函数，可供 JavaScript 代码用于发送消息回来。\n\n```dart\n\
    class GoogleSearch extends StatefulWidget {\n  @override\n  _GoogleSearchState\
    \ createState() => _GoogleSearchState();\n}\n\nclass _GoogleSearchState extends\
    \ State<GoogleSearch> {\n  final Completer<WebViewController> _controller = Completer<WebViewController>();\n\
    \n  @override\n  Widget build(BuildContext context) {\n    return WebView(\n \
    \     initialUrl: 'https://google.com',\n      javascriptMode: JavascriptMode.unrestricted,\n\
    \      javascriptChannels: <JavascriptChannel>[_javascriptChannel(context)].toSet(),\n\
    \      onWebViewCreated: (WebViewController webViewController) {\n        _controller.complete(webViewController);\n\
    \      },\n      onPageFinished: (String url) {\n        _controller.future.then((WebViewController\
    \ webViewController) {\n          webViewController.evaluateJavascript(\n    \
    \          'Messenger.postMessage(\"Loaded in \" + navigator.userAgent);');\n\
    \          webViewController.evaluateJavascript(\n              'document.getElementsByName(\"\
    q\")[0].value=\"flutter\";'\n              'document.querySelector(\"button[aria-label*=Search]\"\
    ).click();');\n        });\n      },\n    );\n  }\n\n  JavascriptChannel _javascriptChannel(BuildContext\
    \ context) {\n    return JavascriptChannel(\n      name: 'Messenger',\n      onMessageReceived:\
    \ (JavascriptMessage message) {\n        Scaffold.of(context).showSnackBar(\n\
    \          SnackBar(content: Text(message.message)),\n        );\n      },\n \
    \   );\n  }\n}\n```\n\n**清单 12-9** 使用 `WebView`\n\n## 12.6 播放视频\n\n### 问题\n\n\
    你想要播放视频。\n\n### 解决方案\n\n使用 `video_player` 插件。\n"
- fmt: "### Discussion\n\nIf you want to play videos from assets, file system, or\
    \ network, you can use the `video_player` plugin ([https://pub.dev/packages?q=video_player](https://pub.dev/packages%253Fq%253Dvideo_player)).\
    \ To use this plugin, you need to add `video_player: ^0.10.0+5` to the dependencies\
    \ of the `pubspec.yaml` file. For iOS, you need to use a real device instead of\
    \ a simulator for development and testing. If you want to load videos from arbitrary\
    \ locations, you need to add the code in Listing [12-10](#479501_1_En_12_Chapter.xhtml#PC11)\
    \ to the `ios/Runner/Info.plist` file. Using `NSAllowsArbitraryLoads` reduces\
    \ the security of the app. It’s better to check Apple’s guide ([https://developer.apple.com/documentation/security/preventing_insecure_network_connections](https://developer.apple.com/documentation/security/preventing_insecure_network_connections))\
    \ for network security.\n\n```\nNSAppTransportSecurity\nNSAllowsArbitraryLoads\n\
    \nListing 12-10\niOS HTTP security config\n```\n\nIf you need to load videos from\
    \ network on Android, you need to add the code in Listing [12-11](#479501_1_En_12_Chapter.xhtml#PC12)\
    \ to the `android/app/src/main/AndroidManifest.xml` file.\n\n```\nListing 12-11\n\
    Android\n```\n\nTo play videos, you need to use constructors shown in Table [12-5](#479501_1_En_12_Chapter.xhtml#Tab5)\
    \ to create `VideoPlayerController` objects.\n\n**Table 12-5**\nConstructors of\
    \ `VideoPlayerController`\n\n| Name | Description |\n| --- | --- |\n| `VideoPlayerController.asset(String\
    \ dataSource, { String package })` | Play a video from assets. |\n| `VideoPlayerController.file(File\
    \ file)` | Play a video from local file system. |\n| `VideoPlayerController.network(String\
    \ dataSource)` | Play a video loaded from network. |\n\nAfter creating a `VideoPlayerController`\
    \ object, you can use methods shown in Table [12-6](#479501_1_En_12_Chapter.xhtml#Tab6)\
    \ to control the video playing. All these methods return `Future` objects. The\
    \ `initialize()` method must be called first to initialize the controller. You\
    \ can only call other methods after the `Future` object returned by the `initialize()`\
    \ method completes successfully.\n\n**Table 12-6**\nMethods of `VideoPlayerController`\n\
    \n| Name | Description |\n| --- | --- |\n| `play()` | Play the video. |\n| `pause()`\
    \ | Pause the video. |\n| `seekTo(Duration moment)` | Seek to the specified position.\
    \ |\n| `setLooping(bool looping)` | Whether to loop the video. |\n| `setVolume(double\
    \ volume)` | Set the volume of audio. |\n| `initialize()` | Initialize the controller.\
    \ |\n| `dispose()` | Dispose the controller and clean up resources. |\n\nThe `VideoPlayerController`\
    \ class extends from `ValueNotifier<VideoPlayerValue>`. You can get notified when\
    \ the state changes by adding listeners to it. The `VideoPlayerValue` class contains\
    \ different properties to access the state of the video. The `VideoPlayer` class\
    \ is the actual widget that displays the video. It requires a `VideoPlayerController`\
    \ object.\n\nThe `VideoPlayerView` class in Listing [12-12](#479501_1_En_12_Chapter.xhtml#PC13)\
    \ is a widget to play video loaded from a specified URL. In the `initState()`\
    \ method, the `VideoPlayerController.network()` constructor is used to create\
    \ the `VideoPlayerController` object. The `FutureBuilder` widget uses the `Future`\
    \ object returned by the `initialize()` method to build the UI. Since the `VideoPlayerController`\
    \ object is also a `Listenable` object, we can use `AnimatedBuilder` with the\
    \ `VideoPlayerController` object. The `AspectRatio` widget uses the `aspectRatio`\
    \ property to make sure the proper aspect ratio is used when playing the video.\
    \ The `VideoProgressIndicator` widget shows a progress bar to indicate video playback\
    \ progress.\n\n```\nclass VideoPlayerView extends StatefulWidget {\n  VideoPlayerView({Key\
    \ key, this.videoUrl}) : super(key: key);\n  final String videoUrl;\n\n  @override\n\
    \  _VideoPlayerViewState createState() => _VideoPlayerViewState();\n}\n\nclass\
    \ _VideoPlayerViewState extends State<VideoPlayerView> {\n  VideoPlayerController\
    \ _controller;\n  Future _initializedFuture;\n\n  @override\n  void initState()\
    \ {\n    super.initState();\n    _controller = VideoPlayerController.network(widget.videoUrl);\n\
    \    _initializedFuture = _controller.initialize();\n  }\n\n  @override\n  Widget\
    \ build(BuildContext context) {\n    return FutureBuilder(\n      future: _initializedFuture,\n\
    \      builder: (context, snapshot) {\n        if (snapshot.connectionState ==\
    \ ConnectionState.done) {\n          return AnimatedBuilder(\n            animation:\
    \ _controller,\n            child: VideoProgressIndicator(_controller, allowScrubbing:\
    \ true),\n            builder: (context, child) {\n              return Column(\n\
    \                children: [\n                  AspectRatio(\n               \
    \     aspectRatio: _controller.value.aspectRatio,\n                    child:\
    \ VideoPlayer(_controller),\n                  ),\n                  Row(\n  \
    \                  children: [\n                      IconButton(\n          \
    \              icon: Icon(_controller.value.isPlaying\n                      \
    \      ? Icons.pause\n                            : Icons.play_arrow),\n     \
    \                   onPressed: () {\n                          if (_controller.value.isPlaying)\
    \ {\n                            _controller.pause();\n                      \
    \    } else {\n                            _controller.play();\n             \
    \             }\n                        },\n                      ),\n      \
    \                Expanded(child: child),\n                    ],\n           \
    \       ),\n                ],\n              );\n            },\n          );\n\
    \        } else {\n          return Center(child: CircularProgressIndicator());\n\
    \        }\n      },\n    );\n  }\n\n  @override\n  void dispose() {\n    _controller.dispose();\n\
    \    super.dispose();\n  }\n}\n\nListing 12-12\nPlaying video\n```\n\n## 12.7\
    \ Using Cameras\n\n### Problem\n\nYou want to use cameras to take pictures or\
    \ record videos.\n\n### Solution\n\nUse the `camera` plugin."
  raw: '### Discussion


    If you want play videos from assets, file system, or network, you can use `video_player`
    plugin ( [`https://pub.dev/packages?q=video_player`](https://pub.dev/packages%253Fq%253Dvideo_player)
    ). To use this plugin, you need to add `video_player: ^0.10.0+5` to the dependencies
    of `pubspec.yaml` file. For iOS, you need to use a real device instead of a simulator
    for development and testing. If you want to load videos from arbitrary locations,
    you need to add the code in Listing [12-10](#479501_1_En_12_Chapter.xhtml#PC11)
    to `ios/Runner/Info.plist` file. Using NSAllowsArbitraryLoads reduces the security
    of the app. It’s better to check Apple’s guide ( [`https://developer.apple.com/documentation/security/preventing_insecure_network_connections`](https://developer.apple.com/documentation/security/preventing_insecure_network_connections)
    ) for network security.


    ```

    NSAppTransportSecurity


    NSAllowsArbitraryLoads


    Listing 12-10

    iOS HTTP security config

    ```


    If you need to load videos from network on Android, you need to add code in Listing
    [12-11](#479501_1_En_12_Chapter.xhtml#PC12) to the `android/app/src/main /AndroidManifest.xml`
    file.


    ```

    Listing 12-11

    Android

    ```


    To play videos, you need to use constructors shown in Table [12-5](#479501_1_En_12_Chapter.xhtml#Tab5)
    to create `VideoPlayerController` objects.


    Table 12-5


    Constructors of VideoPlayerController


    | Name | Description |

    | --- | --- |

    | `VideoPlayerController.asset(String dataSource, { String package })` | Play
    a video from assets. |

    | `VideoPlayerController.file(File file)` | Play a video from local file system.
    |

    | `VideoPlayerController.network(String dataSource)` | Play a video loaded from
    network. |


    After creating a `VideoPlayerController` object, you can use methods shown in
    Table [12-6](#479501_1_En_12_Chapter.xhtml#Tab6) to control the video playing.
    All these methods return `Future` objects. The `initialize()` method must be called
    first to initialize the controller. You can only call other methods after the
    `Future` object returned by `initialize()` method completes successfully.


    Table 12-6


    Methods of VideoPlayerController


    | Name | Description |

    | --- | --- |

    | `play()` | Play the video. |

    | `pause()` | Pause the video. |

    | `seekTo(Duration moment)` | Seek to the specified position. |

    | `setLooping(bool looping)` | Whether to loop the video. |

    | `setVolume(double volume)` | Set the volume of audio. |

    | `initialize()` | Initialize the controller. |

    | `dispose()` | Dispose the controller and clean up resources. |


    `VideoPlayerController` class extends from `ValueNotifier<VideoPlayerValue>` class.
    You can get notified when the state changes by adding listeners to it. `VideoPlayerValue`
    class contains different properties to access the state of the video. `VideoPlayer`
    class is the actual widget that displays the video. It requires a `VideoPlayerController`
    object.


    `VideoPlayerView` class in Listing [12-12](#479501_1_En_12_Chapter.xhtml#PC13)
    is a widget to play video loaded from specified URL. In the `initState()` method,
    `VideoPlayerController.network()` constructor is used to create the `VideoPlayerController`
    object. `FutureBuilder` widget uses the `Future` object returned by `initialize()`
    method to build the UI. Since `VideoPlayerController` object is also a `Listenable`
    object, we can use `AnimatedBuilder` with the `VideoPlayerController` object.
    `AspectRatio` widget uses the `aspectRatio` property to make sure the proper aspect
    ratio is used when playing the video. `VideoProgressIndicator` widget shows a
    progress bar to indicate video playback progress.


    ```

    class VideoPlayerView extends StatefulWidget {

    VideoPlayerView({Key key, this.videoUrl}) : super(key: key);

    final String videoUrl;

    @override

    _VideoPlayerViewState createState() => _VideoPlayerViewState();

    }

    class _VideoPlayerViewState extends State {

    VideoPlayerController _controller;

    Future _initializedFuture;

    @override

    void initState() {

    super.initState();

    _controller = VideoPlayerController.network(widget.videoUrl);

    _initializedFuture = _controller.initialize();

    }

    @override

    Widget build(BuildContext context) {

    return FutureBuilder(

    future: _initializedFuture,

    builder: (context, snapshot) {

    if (snapshot.connectionState == ConnectionState.done) {

    return AnimatedBuilder(

    animation: _controller,

    child: VideoProgressIndicator(_controller, allowScrubbing: true),

    builder: (context, child) {

    return Column(

    children: [

    AspectRatio(

    aspectRatio: _controller.value.aspectRatio,

    child: VideoPlayer(_controller),

    ),

    Row(

    children: [

    IconButton(

    icon: Icon(_controller.value.isPlaying

    ? Icons.pause

    : Icons.play_arrow),

    onPressed: () {

    if (_controller.value.isPlaying) {

    _controller.pause();

    } else {

    _controller.play();

    }

    },

    ),

    Expanded(child: child),

    ],

    ),

    ],

    );

    },

    );

    } else {

    return Center(child: CircularProgressIndicator());

    }

    },

    );

    }

    @override

    void dispose() {

    _controller.dispose();

    super.dispose();

    }

    }

    Listing 12-12

    Playing video

    ```


    ## 12.7 Using Cameras


    ### Problem


    You want to use cameras to take pictures or record videos.


    ### Solution


    Use `camera` plugin.'
