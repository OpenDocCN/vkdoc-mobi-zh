    ### 讨论


    有时，你可能希望在导航器的状态发生变化时收到通知。例如，你想分析用户使用应用时的页面流转情况，从而改进用户体验。在创建 `Navigator` 实例时，你可以提供一个
    `NavigatorObserver` 对象的列表，作为导航器状态变化的观察者。表 8-7 展示了 `NavigatorObserver` 接口的方法。


    **表 8-7** `NavigatorObserver` 的方法


    | 名称 | 描述 |

    | --- | --- |

    | `didPop(Route route, Route previousRoute)` | `route` 被弹出，`previousRoute` 是新的活动路由。
    |

    | `didPush(Route route, Route previousRoute)` | `route` 被推入，`previousRoute` 是之前的活动路由。
    |

    | `didRemove(Route route, Route previousRoute)` | `route` 被移除，`previousRoute`
    是紧挨在已移除路由下方的路由。 |

    | `didReplace(Route newRoute, Route oldRoute)` | `oldRoute` 被 `newRoute` 替换。 |

    | `didStartUserGesture(Route route, Route previousRoute)` | 用户开始使用手势移动 `route`。紧挨在
    `route` 下方的路由是 `previousRoute`。 |

    | `didStopUserGesture()` | 用户停止使用手势移动路由。 |


    在代码清单 8-18 中，`LoggingNavigatorObserver` 类在路由被推入和弹出时记录消息。


    ```

    class LoggingNavigatorObserver extends NavigatorObserver {

    @override

    void didPush(Route route, Route previousRoute) {

    print(''push: ${_routeName(previousRoute)} -> ${_routeName(route)}'');

    }

    @override

    void didPop(Route route, Route previousRoute) {

    print('' pop: ${_routeName(route)} -> ${_routeName(previousRoute)}'');

    }

    String _routeName(Route route) {

    return route != null

    ? (route.settings?.name ?? route.runtimeType.toString())

    : ''null'';

    }

    }

    ```


    **代码清单 8-18** 日志记录导航器观察者


    当你想为导航器中的所有状态变化设置一个全局处理器时，`NavigatorObserver` 接口非常有用。如果你只对与特定路由相关的状态变化感兴趣，那么使用
    `RouteObserver` 类是更好的选择。`RouteObserver` 类也是 `NavigatorObserver` 接口的一个实现。


    为了收到与 `Route` 对象相关的状态变化通知，你的类需要实现 `RouteAware` 接口。表 8-8 展示了 `RouteAware` 接口的方法。


    **表 8-8** `RouteAware` 的方法


    | 名称 | 描述 |

    | --- | --- |

    | `didPop()` | 当前路由被弹出时的回调。 |

    | `didPopNext()` | 在顶部路由被弹出后，当前路由变为活动状态时调用。 |

    | `didPush()` | 在当前路由被推入时调用。 |

    | `didPushNext()` | 在新路由被推入后，当前路由不再活动时调用。 |


    为了实际收到针对某个 `Route` 对象的通知，你需要使用 `RouteObserver` 的 `subscribe()` 方法，将一个 `RouteAware`
    对象订阅到该 `Route` 对象。当不再需要此订阅时，应使用 `unsubscribe()` 方法取消 `RouteAware` 对象的订阅。


    在代码清单 8-19 中，`_ObservedPageState` 类实现了 `RouteAware` 接口，并重写了 `didPush()` 和 `didPop()`
    方法来打印一些消息。`ModalRoute.of(context)` 从构建上下文中获取最近的封闭 `ModalRoute` 对象，也就是 `ObservedPage`
    所在的路由。通过使用 `ModalRoute.of(context)`，无需显式传递 `Route` 对象。当前的 `_ObservedPageState`
    对象使用传入的 `RouteObserver` 对象的 `subscribe()` 方法，订阅当前路由的状态变化。当 `_ObservedPageState`
    对象被释放时，该订阅被移除。


