    ## 11.9 使用通用过渡动画


    ### 问题


    你希望有一种简单的方式来使用不同类型的`Tween`对象进行动画。


    ### 解决方案


    使用不同类型的过渡动画。


    ### 讨论


    通常使用不同类型的`Tween`对象来动画化组件的不同方面。你可以使用`AnimatedWidget`或`AnimatedBuilder`类配合`Tween`对象工作。Flutter
    SDK 提供了几个过渡组件，使得某些动画更易于使用。


    `ScaleTransition`组件用于动画化组件的缩放。要创建一个`ScaleTransition`对象，你需要提供一个`Animation<double>`对象作为缩放比例。`alignment`参数指定了缩放坐标原点相对于盒子的对齐方式。代码清单
    [11-13](#479501_1_En_11_Chapter.xhtml#PC13) 展示了`ScaleTransition`的一个示例。


    ```dart

    class ScaleBox extends StatelessWidget {

    ScaleBox({Key key, Animation animation})

    : _animation = CurveTween(curve: Curves.ease).animate(animation),

    super(key: key);

    final Animation _animation;

    @override

    Widget build(BuildContext context) {

    return ScaleTransition(

    scale: _animation,

    alignment: Alignment.centerLeft,

    child: Container(

    height: 100,

    decoration: BoxDecoration(color: Colors.red),

    ),

    );

    }

    }

    Listing 11-13

    Example of ScaleTransition

    ```


    另一个过渡组件的例子是`FadeTransition`组件，它用于动画化透明度。代码清单 [11-14](#479501_1_En_11_Chapter.xhtml#PC14)
    展示了`FadeTransition`的一个示例。


    ```dart

    class FadeBox extends StatelessWidget {

    FadeBox({Key key, Animation animation})

    : _animation = CurveTween(curve: Curves.ease).animate(animation),

    super(key: key);

    final Animation _animation;

    @override

    Widget build(BuildContext context) {

    return FadeTransition(

    opacity: _animation,

    child: Container(

    height: 100,

    decoration: BoxDecoration(color: Colors.red),

    ),

    );

    }

    }

    Listing 11-14

    Example of FadeTransition

    ```


