- fmt: '## Discussion


    In Flutter apps, most of code is written in platform-agnostic Dart code. Features
    provided by Flutter SDK are limited. Sometimes you may still need to write platform-specific
    code to use native platform APIs. A generated Flutter app already has platform-specific
    code in `android` and `ios` directories. Code in these two directories is required
    to build native bundles.


    Flutter uses message passing to call platform-specific APIs and get the result
    back. Messages are passed through platform channels. Flutter code sends messages
    to the host over a platform channel. Host code listens on the platform channel
    and receives the message. It then uses platform-specific API to generate the response
    and sends it back over the same channel to the Flutter code. Messages passed are
    actually asynchronous method calls.


    In Flutter code, platform channels are created using `MethodChannel` class. All
    channel names in an app must be unique. It’s recommended to use a domain name
    as the prefix of channel names. To send method calls over a channel, these method
    calls must be encoded into binary format before being sent, and results received
    are decoded into Dart values. Encoding and decoding are done using subclasses
    of `MethodCodec` class:


    - `StandardMethodCodec` class uses standard binary encoding.

    - `JSONMethodCodec` class uses UTF-8 JSON encoding.


    `MethodChannel` constructor has `name` parameter to specify the channel name and
    `codec` parameter to specify the `MethodCodec` object. The default `MethodCodec`
    object used is a `StandardMethodCodec` object.


    Given a `MethodChannel` object, the `invokeMethod()` method invokes a method on
    the channel with specified arguments. The return value is a `Future<T>` object.
    This `Future` object may complete with different values:


    - It completes with the result if the method call succeeds.

    - It completes with a `PlatformException` if the method call fails.

    - It completes with a `MissingPluginException` if the method has not been implemented.


    The `invokeListMethod()` method also invokes a method but returns a `Future<List<T>>`
    object. The `invokeMapMethod()` method invokes a method and returns a `Future<Map<K,
    V>>` object. Both `invokeListMethod()` and `invokeMapMethod()` methods use `invokeMethod()`
    internally, but add extra type cast.


    In Listing [12-3](#479501_1_En_12_Chapter.xhtml#PC3), the `getNetworkOperator`
    method is invoked over the channel and returns the network operator.


    ```

    class NetworkOperator extends StatefulWidget {

    @override

    _NetworkOperatorState createState() => _NetworkOperatorState();

    }

    class _NetworkOperatorState extends State {

    static const channel = const MethodChannel(''flutter-recipes/network'');

    String _networkOperator = ";

    @override

    void initState() {

    super.initState();

    _getNetworkOperator();

    }

    Future _getNetworkOperator() async {

    String operator;

    try {

    operator = await channel.invokeMethod(''getNetworkOperator'') ?? ''unknown'';

    } catch (e) {

    operator = ''Failed to get network operator: ${e.message}'';

    }

    setState(() {

    _networkOperator = operator;

    });

    }

    @override

    Widget build(BuildContext context) {

    return Container(

    child: Center(

    child: Text(_networkOperator),

    ),

    );

    }

    }

    Listing 12-3

    Get network operator

    ```


    The handler of `getNetworkOperator` method call needs to be implemented in both
    Android and iOS platforms. Listing [12-4](#479501_1_En_12_Chapter.xhtml#PC4) shows
    the Java implementation. The `getNetworkOperator()` method uses Android API to
    get network operator. In the method call handler of the channel, if the method
    name is `getNetworkOperator`, the result of `getNetworkOperator()` method is sent
    back as success response using `Result.success()` method. If you want to send
    back error response, you can use `Result.error()` method. If the method is unknown,
    you should use `Result.notImplemented()` to mark the method as unimplemented.


    ```

    public class MainActivity extends FlutterActivity {

    private static final String CHANNEL = "flutter-recipes/network";

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    GeneratedPluginRegistrant.registerWith(this);

    new MethodChannel(getFlutterView(), CHANNEL)

    .setMethodCallHandler((methodCall, result) -> {

    if ("getNetworkOperator".equals(methodCall.method)) {

    result.success(getNetworkOperator());

    } else {

    result.notImplemented();

    }

    });

    }

    private String getNetworkOperator() {

    TelephonyManager telephonyManager =

    ((TelephonyManager) getSystemService(Context.TELEPHONY_SERVICE));

    return telephonyManager.getNetworkOperatorName();

    }

    }

    Listing 12-4

    Android implementation of getNetworkOperator

    ```


    Listing [12-5](#479501_1_En_12_Chapter.xhtml#PC5) shows the `AppDelegate.swift`
    file for iOS platform. The `receiveNetworkOperator()` function uses iOS API to
    get the carrier name and send back as response using `FlutterResult`.


    ```

    import UIKit

    import Flutter

    import CoreTelephony

    @UIApplicationMain

    @objc class AppDelegate: FlutterAppDelegate {

    override func application(

    _ application: UIApplication,

    didFinishLaunchingWithOptions launchOptions: [UIApplicationLaunchOptionsKey: Any]?

    ) -> Bool {

    GeneratedPluginRegistrant.register(with: self)

    guard let controller = window?.rootViewController as? FlutterViewController else
    {

    fatalError("rootViewController is not type FlutterViewController")

    }

    let networkChannel = FlutterMethodChannel(name: "flutter-recipes/network", binaryMessenger:
    controller)

    networkChannel.setMethodCallHandler({

    [weak self] (call: FlutterMethodCall, result: FlutterResult) -> Void in

    guard call.method == "getNetworkOperator" else {

    result(FlutterMethodNotImplemented)

    return

    }

    self?.receiveNetworkOperator(result: result)

    })

    return super.application(application, didFinishLaunchingWithOptions: launchOptions)

    }

    private func receiveNetworkOperator(result: FlutterResult) {

    let networkInfo = CTTelephonyNetworkInfo()

    let carrier = networkInfo.subscriberCellularProvider

    result(carrier?.carrierName)

    }

    }

    Listing 12-5

    Swift implementation of getNetworkOperator

    ```


    ## 12.4 Creating Plugins


    ### Problem


    You want to create sharable plugins that contain platform-specific code.


    ### Solution


    Create Flutter projects using the plugin template.'
