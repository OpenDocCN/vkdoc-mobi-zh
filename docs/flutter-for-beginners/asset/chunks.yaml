    ### 讨论


    表单小部件可用作普通小部件。然而，这些表单小部件不维护任何状态；你需要始终将它们包裹在有状态小部件中以保持状态。一种典型的使用模式是利用 `onChanged`
    回调来更新状态并触发表单小部件的重建。由于这是表单小部件的常见模式，Flutter 内置了一个 `FormField` 小部件来维护表单小部件的当前状态，它负责处理状态更新和验证错误。


    `FormField` 类是泛型的，其类型参数 `T` 表示值的类型。`FormField` 可以作为独立的小部件使用，也可以作为 `Form` 小部件的一部分。本示例仅讨论独立使用方式。表
    6-7 列出了 `FormField` 构造函数的命名参数。


    **表 6-7** `FormField` 的命名参数


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `builder` | `FormFieldBuilder<T>` | 构建表示此表单项的小部件。 |

    | `onSaved` | `FormFieldSetter<T>` | 表单保存时的回调。 |

    | `validator` | `FormFieldValidator<T>` | 表单项的验证器。 |

    | `initialValue` | `T` | 初始值。 |

    | `autovalidate` | `boolean` | 是否在每次更改后自动验证。 |

    | `enabled` | `boolean` | 此表单项是否启用。 |


    `FormFieldBuilder<T>` 类型是一个 typedef，形式为 `Widget (FormFieldState<T> field)`。`FormFieldState<T>`
    类继承自 `State` 类，表示表单项的当前状态。`FormFieldBuilder` 负责根据状态构建小部件。通过 `FormFieldState`，你可以获取表单项的当前值和错误文本。你还可以使用表
    6-8 中 `FormFieldState` 的方法。`FormFieldValidator<T>` 同样是一个 typedef，形式为 `String(T
    value)`。它接收当前值作为输入，如果验证失败则返回一个非空字符串作为错误消息。`FormFieldSetter<T>` 类型是一个 typedef，形式为
    `void(T newValue)`。


    **表 6-8** `FormFieldState` 的方法


    | 名称 | 描述 |

    | --- | --- |

    | `save()` | 使用当前值调用 `onSaved()` 方法。 |

    | `validate()` | 调用 `validator` 并在验证失败时设置 `errorText`。 |

    | `didChange(T value)` | 将字段的状态更新为新值。 |

    | `reset()` | 将字段重置为初始值。 |


    当在 `FormFields` 中包裹 `TextFields` 时，最好使用内置的 `TextFormField`。`TextFormField` 小部件已经处理了使用
    `TextEditingController` 设置文本，以及使用 `FormFieldValidator` 返回的错误文本来更新输入装饰。`TextFormField`
    构造函数支持来自 `TextField` 和 `FormField` 构造函数的参数。清单 6-21 中的 `TextFormField` 有一个验证器用于验证文本长度。


    ```

    class NameInput extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return TextFormField(

    decoration: InputDecoration(

    labelText: ''Name'',

    ),

    validator: (value) {

    if (value == null || value.isEmpty) {

    return ''Name is required.'';

    } else if (value.length < 6) {

    return ''Minimum length is 6.'';

    } else {

    return null;

    }

    },

    autovalidate: true,

    );

    }

    }

    清单 6-21

    TextFormField

    ```


    图 6-15 展示了清单 6-21 中代码的截图。


    ![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig15_HTML.jpg](img/479501_1_En_6_Fig15_HTML.jpg)


    **图 6-15** `TextFormField`


    `FormFieldState` 实例仅在 `FormField` 的构建器函数中可访问。如果你需要从其他位置访问状态，可以将一个 `GlobalKey`
    作为 `FormField` 的 key 参数传递，然后使用 `currentState` 属性访问当前状态。


    在清单 6-22 中，`FormField` 的状态是一个 `List<PizzaTopping>` 实例。借助 `GlobalKey`，可以在按下按钮时检索当前值。


    ```

    class PizzaToppingsSelector extends StatelessWidget {

    final GlobalKey>> _formFieldKey =

    GlobalKey();

    @override

    Widget build(BuildContext context) {

    return Column(

    children: [

    FormField>(

    key: _formFieldKey,

    initialValue: List(),

    builder: (state) {

    return Wrap(

    spacing: 5,

    children: PizzaTopping.allPizzaToppings.map((topping) {

    return ChoiceChip(

    label: Text(topping.name),

    selected: state.value.contains(topping),

    onSelected: state.value.length  newValue = List.of(state.value);

    if (selected) {

    newValue.add(topping);

    } else {

    newValue.remove(topping);

    }

    state.didChange(newValue);

    }

    : null,

    );

    }).toList(),

    );

    },

    ),

    RaisedButton(

    child: Text(''Get toppings''),

    onPressed: () => print(_formFieldKey.currentState?.value),

    ),

    ],

    );

    }

    }

    清单 6-22

    FormField

    ```


    ## 6.15 创建表单


    ### 问题


    你想要创建一个包含多个表单项的表单。


    ### 解决方案


    使用 `Form`。


    ### 讨论


    在使用表单项时，你通常试图构建一个包含多个表单项的表单。当处理多个表单项时，单独管理它们是繁琐的任务。`Form` 是一个便捷的包装器，用于管理多个表单项。你需要将所有表单项包裹在
    `FormField` 小部件中，并使用 `Form` 小部件作为所有这些 `FormField` 小部件的共同祖先。`Form` 小部件是一个有状态小部件，其状态由关联的
    `FormState` 实例管理。`FormState` 类包含 `save()`、`validate()` 和 `reset()` 方法。这些方法会调用后代
    `FormField` 小部件的所有 `FormFieldState` 实例上对应的函数。


    根据需要使用 `FormState` 的小部件的位置，有两种方式可以获取 `FormState` 实例。如果小部件是 `Form` 小部件的后代，使用 `Form.of(BuildContext
    context)` 是获取最近 `FormState` 实例的简便方法。第二种方式是在创建 `Form` 小部件时使用 `GlobalKey` 实例，然后使用
    `GlobalKey.currentState` 获取 `FormState`。


    清单 6-23 展示了一个登录表单的代码。两个 `TextFormField` 小部件都使用 `GlobalKey` 实例创建。


    ```

    class LoginForm extends StatefulWidget {

    @override

    _LoginFormState createState() => _LoginFormState();

    }

    class _LoginFormState extends State {

    final GlobalKey> _usernameFormFieldKey = GlobalKey();

    final GlobalKey> _passwordFormFieldKey = GlobalKey();

    _notEmpty(String value) => value != null && value.isNotEmpty;

    get _value => ({

    ''username'': _usernameFormFieldKey.currentState?.value,

    ''password'': _passwordFormFieldKey.currentState?.value

    });

    @override

    Widget build(BuildContext context) {

    return Form(

    child: Column(

    children: [

    TextFormField(

    key: _usernameFormFieldKey,

    decoration: InputDecoration(

    labelText: ''Username'',

    ),

    validator: (value) =>

    !_notEmpty(value) ? ''Username is required'' : null,

    ),

    TextFormField(

    key: _passwordFormFieldKey,

    obscureText: true,

    decoration: InputDecoration(

    labelText: ''Password'',

    ),

    validator: (value) =>

    !_notEmpty(value) ? ''Password is required'' : null,

    ),

    Builder(builder: (context) {

    return Row(

    mainAxisAlignment: MainAxisAlignment.end,

    children: [

    RaisedButton(

    child: Text(''Log In''),

    onPressed: () {

    if (Form.of(context).validate()) {

    print(_value);

    }

    },

    ),

    FlatButton(

    child: Text(''Reset''),

    onPressed: () => Form.of(context).reset(),

    )

    ],

    );

    }),

    ],

    ),

    );

    }

    }

    清单 6-23

    登录表单

    ```


    图 6-16 展示了登录表单的截图。


    ![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig16_HTML.jpg](img/479501_1_En_6_Fig16_HTML.jpg)


    **图 6-16** 登录表单

