  trans: '

    ### 讨论


    在实现应用的界面之前，你通常会对应用的外观有一个基本构想。你可以先将界面拆解为多个小部件（widget）。在开发过程中，可以使用占位符来表示尚未完成的小部件，这样就能测试其他小部件的布局。例如，如果你需要创建两个小部件，一个显示在顶部，另一个显示在底部。如果你选择先创建底部小部件，并用占位符代替顶部小部件，就能看到底部小部件显示在预期位置。


    `Placeholder()` 构造函数接受命名参数 `color`、`strokeWidth`、`fallbackWidth` 和 `fallbackHeight`。占位符绘制为一个矩形和两条对角线。参数
    `color` 和 `strokeWidth` 分别指定线条的颜色和宽度。默认情况下，占位符会适配其容器。然而，如果占位符的容器没有边界限制，它会使用给定的
    `fallbackWidth` 和 `fallbackHeight` 来确定大小。`fallbackWidth` 和 `fallbackHeight` 的默认值都是
    `400.0`。代码清单 [4-18] 展示了 `Placeholder` 小部件的示例。


    ```

    Placeholder(

    color: Colors.red,

    strokeWidth: 1,

    fallbackHeight: 200,

    fallbackWidth: 200,

    );

    Listing 4-18

    Example of Placeholder

    ```


    ## 4.13 总结


    小部件在 Flutter 应用中无处不在。本章对 Flutter 中的小部件进行了基本介绍，包括 `StatelessWidget`、`StatefulWidget`
    和 `InheritedWidget`。本章还涵盖了使用常见基本小部件显示文本、图像、图标、按钮和占位符的用法。下一章将讨论 Flutter 中的布局。


    # 5. 布局小部件


    在构建用户界面时，布局始终是一项具有挑战性的任务。对于移动应用而言，考虑到设备屏幕分辨率种类繁多，布局会变得更加复杂。本章将介绍 Flutter 中与布局相关的实用方法。


    ## 5.1 理解 Flutter 中的布局


    ### 问题


    你想了解 Flutter 中的布局是如何工作的。


    ### 解决方案


    Flutter 中的布局通过一组小部件来实现。这些布局小部件会包裹其他小部件，以应用不同的布局约束。


    ### 讨论


    对于移动应用而言，布局必须具有响应性，才能在无需编写大量难以维护的代码的情况下，适应不同的屏幕分辨率。幸运的是，随着布局技术的发展，现在构建响应式布局变得更加容易。如果你有过使用
    CSS 进行 Web 开发的经验，可能听说过 W3C 制定的 CSS 弹性盒子布局模块规范（`https://www.w3.org/TR/css-flexbox-1/`）。弹性布局模型之所以强大，是因为它允许开发者表达布局“应该是什么”，而不是“如何”实现实际布局。这种声明式方法将繁重的工作转移到了底层框架上。最终得到的布局代码更易于理解和维护。


    例如，如果你想将一个盒子放置在容器的中央，旧方法可能需要计算盒子和容器的大小以确定盒子的位置。而使用弹性布局时，可以将布局简化为代码清单 [5-1] 中的
    CSS 代码：


    ```

    .container {

    display: flex;

    width: 400px;

    height: 400px;

    justify-content: center;

    align-items: center;

    border: 1px solid green;

    }

    .item {

    width: 200px;

    height: 200px;

    border: 1px solid red;

    }

    Listing 5-1

    CSS code to center an item

    ```


    弹性布局的思想现在不仅用于网页设计，也应用于移动应用。React Native 使用了弹性布局（`https://facebook.github.io/react-native/docs/flexbox`）。Flutter
    也采用了弹性布局的思路。正如方法 4-1 中所述，布局是通过小部件实现的。你可以在 Flutter 中看到诸如 `Flex`、`Row`、`Column`
    和 `Flexible` 这样的小部件类，它们的名称都源自弹性布局的概念。CSS 中的弹性布局模型不在本书的讨论范围内。不过，理解这一 W3C 规范仍然很有价值，它能帮助你更好地理解
    Flutter 中的弹性布局。


    ### RenderObject


    Flutter 中的布局算法负责确定渲染树中每个 `RenderObject` 实例的尺寸和位置。`RenderObject` 类非常灵活，可以适用于任何坐标系或布局协议。`RenderObject`
    类通过 `layout()` 方法定义了基本的布局协议。`layout()` 方法有一个必需的、类型为 `Constraints` 的位置参数。`Constraints`
    类指定了子对象必须遵守的布局约束。对于一个特定的 `Constraints` 实例，可能存在多个满足它的结果。只要结果在允许范围内，子对象可以自由选择使用其中任何一个。有时，一个
    `Constraints` 实例可能只给子对象留出一个有效结果。这种 `Constraints` 实例被称为紧约束。紧约束通常灵活性较低，但由于具有紧约束的小部件无需重新布局，它们能提供更好的性能。


    `layout()` 方法有一个命名参数 `parentUsesSize`，用于指定父对象是否需要使用子对象计算出的布局信息。如果 `parentUsesSize`
    为 true，意味着父对象的布局依赖于子对象的布局。在这种情况下，每当子对象需要布局时，父对象可能也需要重新布局。布局完成后，每个 `RenderObject`
    实例的某些字段会被设置，以包含布局信息。实际存储的信息取决于布局实现方式。这段布局信息存储在 `parentData` 属性中。


    默认情况下，Flutter 使用由 `RenderBox` 类实现的二维笛卡尔坐标系。`RenderBox` 类通过 `BoxConstraints` 类实现了盒子布局模型。在盒子布局模型中，每个
    `RenderBox` 实例被视为一个矩形，其大小由 `Size` 实例指定。每个盒子都有自己的坐标系。左上角的坐标为 (0,0)，而右下角的坐标为 (宽度，高度)。`RenderBox`
    类使用 `BoxParentData` 作为布局数据的类型。`BoxParentData.offset` 属性指定了在父对象的坐标系中绘制子对象的偏移量。


    ### BoxConstraints


    一个 `BoxConstraints` 实例由四个双精度浮点命名参数指定：`minWidth`、`maxWidth`、`minHeight` 和 `maxHeight`。这些参数的值必须满足以下规则。`double.infinity`
    是约束的有效值：


    - `0.0 <= minWidth <= maxWidth <= double.infinity`

    - `0.0 <= minHeight <= maxHeight <= double.infinity`


    盒子布局完成后，`RenderBox` 实例的大小必须满足应用于它的 `BoxConstraints` 实例的约束：


    - `minWidth <= Size.width <= maxWidth`

    - `minHeight <= Size.height <= maxHeight`


    如果在某个轴向上最小约束和最大约束相同，则该轴向是紧约束。例如，如果 `minWidth` 和 `maxWidth` 的值相同，则宽度是紧约束的。当宽度和高度都是紧约束时，`BoxConstraints`
    实例即为紧约束。如果在某个轴向上最小约束为 `0.0`，则该轴向是松约束。如果在某个轴向上最大约束不是无限大，则该轴向是有界的；否则，该轴向是无界的。


    ### 布局算法


    在盒子布局模型中，布局通过一次遍历渲染树来完成。首先，它通过传递约束向下遍历渲染树。在此阶段，渲染对象使用其父对象传递的约束进行布局。在第二阶段，它通过传递具体结果向上遍历渲染树，这些结果决定了每个渲染对象的大小和偏移量。

