- fmt: "### Discussion\n\n使用`test`和`mockito`包足以编写 Dart 类的测试。然而，你需要使用`flutter_test`包来编写小部件的测试。`flutter_test`包已经包含在由`flutter\
    \ create`命令创建的新项目的`pubspec.yaml`文件中。小部件的测试用例使用`testWidgets()`函数声明。调用`testWidgets()`时，你需要提供一个描述和一个在\
    \ Flutter 测试环境中运行的回调。该回调接收一个`WidgetTester`对象，用于与小部件和测试环境进行交互。创建待测试的小部件后，你可以使用`Finder`对象和匹配器来验证小部件的状态。\n\
    \n表 [14-1](#479501_1_En_14_Chapter.xhtml#Tab1) 显示了`WidgetTester`类的方法。`pumpWidget()`方法通常是测试的入口点，它创建要测试的小部件。测试有状态小部件时，更改状态后，你需要调用`pump()`方法触发重建。如果小部件使用动画，你应该使用`pumpAndSettle()`方法等待动画完成。像`enterText()`和`ensureVisible()`这样的方法使用`Finder`对象来查找要交互的小部件。\n\
    \n**表 14-1**  \n`WidgetTester`的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `pumpWidget()`\
    \ | 渲染指定的小部件。 |\n| `pump()` | 触发一个帧，导致小部件重建。 |\n| `pumpAndSettle()` | 重复调用`pump()`方法，直到没有计划执行的帧。\
    \ |\n| `enterText()` | 向文本输入小部件输入文本。 |\n| `pageBack()` | 关闭当前页面。 |\n| `runAsync()`\
    \ | 异步运行回调。 |\n| `dispatchEvent()` | 分发事件。 |\n| `ensureVisible()` | 通过滚动其祖先`Scrollable`小部件使小部件可见。\
    \ |\n| `drag()` | 按给定偏移量拖动小部件。 |\n| `press()` | 按下小部件。 |\n| `longPress()` | 长按小部件。\
    \ |\n| `tap()` | 轻触小部件。 |\n\n清单 [14-8](#479501_1_En_14_Chapter.xhtml#PC8) 中的`ToUppercase`小部件是一个要测试的有状态小部件。它有一个`TextField`小部件用于输入文本。当按钮被按下时，输入文本的大写形式会通过`Text`小部件显示出来。\n\
    \n```dart\nclass ToUppercase extends StatefulWidget {\n@override\n_ToUppercaseState\
    \ createState() => _ToUppercaseState();\n}\nclass _ToUppercaseState extends State\
    \ {\nfinal _controller = TextEditingController();\n@override\nWidget build(BuildContext\
    \ context) {\nreturn Column(\nchildren: [\nRow(\nchildren: [\nExpanded(child:\
    \ TextField(controller: _controller)),\nRaisedButton(\nchild: Text('Uppercase'),\n\
    onPressed: () {\nsetState(() {});\n},\n),\n],\n),\nText((_controller.text ?? \"\
    ).toUpperCase()),\n],\n);\n}\n}\n```\n**清单 14-8**  \n要测试的小部件\n\n清单 [14-9](#479501_1_En_14_Chapter.xhtml#PC9)\
    \ 展示了`ToUppercase`小部件的测试用例。`_wrapInMaterial()`函数在测试前将`ToUppercase`小部件包裹在`MaterialApp`中。这是因为`TextField`小部件需要一个祖先`Material`小部件。在测试用例中，首先使用`pumpWidget()`渲染小部件。`find`对象是`CommonFinders`类的一个顶级常量。它有便捷的方法来创建不同类型的`Finder`对象。这里我们查找类型为`TextField`的小部件，并使用`enterText()`输入文本\"\
    abc\"。然后轻触`RaisedButton`小部件，状态发生改变。需要调用`pump()`方法来触发重建。最后，我们验证是否存在一个文本为\"ABC\"\
    的`Text`小部件。\n\n**表 14-2**  \n`CommonFinders`的方法\n\n| 名称 | 描述 |\n| --- | --- |\n\
    | `byType()` | 按类型查找小部件。 |\n| `byIcon()` | 按图标数据查找`Icon`小部件。 |\n| `byKey()` |\
    \ 通过特定的`Key`对象查找小部件。 |\n| `byTooltip()` | 查找具有给定消息的`Tooltip`小部件。 |\n| `byWidget()`\
    \ | 按给定的小部件实例查找小部件。 |\n| `text()` | 查找具有给定文本的`Text`和`EditableText`小部件。 |\n| `widgetWithIcon()`\
    \ | 查找包含具有该图标的子代小部件的小部件。 |\n| `widgetWithText()` | 查找包含具有给定文本的`Text`子代的小部件。 |\n\
    \n```dart\nWidget _wrapInMaterial(Widget widget) {\nreturn MaterialApp(\nhome:\
    \ Scaffold(\nbody: widget,\n),\n);\n}\nvoid main() {\ntestWidgets('ToUppercase',\
    \ (WidgetTester tester) async {\nawait tester.pumpWidget(_wrapInMaterial(ToUppercase()));\n\
    await tester.enterText(find.byType(TextField), 'abc');\nawait tester.tap(find.byType(RaisedButton));\n\
    await tester.pump();\nexpect(find.text('ABC'), findsOneWidget);\n});\n}\n```\n\
    **清单 14-9**  \n测试`ToUppercase`小部件\n\n`Finder`对象与匹配器一起用于验证状态。有四个匹配器可与`Finder`对象一起使用：\n\
    \n*   `findsOneWidget`：期望恰好找到一个小部件。\n*   `findsNothing`：期望没有找到小部件。\n*   `findsNWidgets`：期望找到指定数量的小部件。\n\
    *   `findsWidgets`：期望至少找到一个小部件。\n\n## 14.4 编写集成测试\n\n### 问题\n\n你希望编写在模拟器或真实设备上运行的集成测试。\n\
    \n### 解决方案\n\n使用`flutter_driver`包。"
  raw: '### Discussion


    Using `test` and `mockito` packages is enough to write tests for Dart classes.
    However, you need to use `flutter_test` package to write tests for widgets. The
    `flutter_test` package is already included in the `pubspec.yaml` file for new
    projects created by `flutter create` command. Test cases for widgets are declared
    using `testWidgets()` function . When calling `testWidgets()`, you need to provide
    a description and a callback to run inside the Flutter test environment. The callback
    receives a `WidgetTester` object to interact with widgets and the test environment.
    After the widget under test is created, you can use `Finder` objects and matchers
    to verify state of the widget.


    Table [14-1](#479501_1_En_14_Chapter.xhtml#Tab1) shows methods of `WidgetTester`
    class. The `pumpWidget()` method is usually the entry point of a test by creating
    the widget to test. When testing stateful widgets, after changing the state, you
    need to call `pump()` method to trigger the rebuild. If the widget uses animations,
    you should use `pumpAndSettle()` method to wait for animations to finish. Methods
    like `enterText()` and `ensureVisible()` use `Finder` objects to find the widgets
    to interact with.


    Table 14-1


    Methods of WidgetTester


    | Name | Description |

    | --- | --- |

    | `pumpWidget()` | Render the specified widget. |

    | `pump()` | Trigger a frame that causes the widget to rebuild. |

    | `pumpAndSettle()` | Repeatedly call `pump()` method until there are no frames
    scheduled. |

    | `enterText()` | Enter text to a text input widget. |

    | `pageBack()` | Dismiss the current page. |

    | `runAsync()` | Run a callback asynchronously. |

    | `dispatchEvent()` | Dispatch an event. |

    | `ensureVisible()` | Make a widget visible by scrolling its ancestor `Scrollable`
    widget. |

    | `drag()` | Drag the widget by given offset. |

    | `press()` | Press the widget. |

    | `longPress()` | Long press the widget. |

    | `tap()` | Tap the widget. |


    `ToUppercase` widget in Listing [14-8](#479501_1_En_14_Chapter.xhtml#PC8) is a
    stateful widget to test. It has a `TextField` widget to input text. When the button
    is pressed, the uppercase of input text is displayed using a `Text` widget.


    ```

    class ToUppercase extends StatefulWidget {

    @override

    _ToUppercaseState createState() => _ToUppercaseState();

    }

    class _ToUppercaseState extends State {

    final _controller = TextEditingController();

    @override

    Widget build(BuildContext context) {

    return Column(

    children: [

    Row(

    children: [

    Expanded(child: TextField(controller: _controller)),

    RaisedButton(

    child: Text(''Uppercase''),

    onPressed: () {

    setState(() {});

    },

    ),

    ],

    ),

    Text((_controller.text ?? ").toUpperCase()),

    ],

    );

    }

    }

    Listing 14-8

    Widget to test

    ```


    Listing [14-9](#479501_1_En_14_Chapter.xhtml#PC9) shows the test case of `ToUppercase`
    widget. The `_wrapInMaterial()` function wraps the `ToUppercase` widget in a `MaterialApp`
    before testing. This is because `TextField` widget requires an ancestor `Material`
    widget. In the test case, the widget is rendered using `pumpWidget()` first. The
    `find` object is a top-level constant of `CommonFinders` class. It has convenient
    methods to create different kinds of `Finder` objects. Here we find the widget
    of type `TextField` and uses `enterText()` to input the text “abc”. Then the `RaisedButton`
    widget is tapped and the state is changed. The `pump()` method is required to
    trigger the rebuild. Finally, we verify that a `Text` widget exists with the text
    “ABC”.


    Table 14-2


    Methods of CommonFinders


    | Name | Description |

    | --- | --- |

    | `byType()` | Find widgets by type. |

    | `byIcon()` | Find `Icon` widgets by icon data. |

    | `byKey()` | Find widgets by a particular `Key` object. |

    | `byTooltip()` | Find `Tooltip` widgets with the given message. |

    | `byWidget()` | Find widgets by the given widget instance. |

    | `text()` | Find `Text` and `EditableText` widgets with the given text. |

    | `widgetWithIcon()` | Find widgets that contain a descendant widget with the
    icon. |

    | `widgetWithText()` | Find widgets that contain a `Text` descendant with the
    given text. |


    ```

    Widget _wrapInMaterial(Widget widget) {

    return MaterialApp(

    home: Scaffold(

    body: widget,

    ),

    );

    }

    void main() {

    testWidgets(''ToUppercase'', (WidgetTester tester) async {

    await tester.pumpWidget(_wrapInMaterial(ToUppercase()));

    await tester.enterText(find.byType(TextField), ''abc'');

    await tester.tap(find.byType(RaisedButton));

    await tester.pump();

    expect(find.text(''ABC''), findsOneWidget);

    });

    }

    Listing 14-9

    Test ToUppercase widget

    ```


    `Finder` objects are used with matchers to verify the state. There are four matchers
    to work with `Finder` objects:


    *   `findsOneWidget` expects exactly one widget is found.


    *   `findsNothing` expects no widgets are found.


    *   `findsNWidgets` expects specified number of widgets are found.


    *   `findsWidgets` expects at least one widget is found.


    ## 14.4 Writing Integration Tests


    ### Problem


    You want to write integration tests running on emulators or real devices.


    ### Solution


    Use `flutter_driver` package.'
  trans: "\n### 讨论\n\n使用 `test` 和 `mockito` 包足以编写 Dart 类的测试。然而，你需要使用 `flutter_test`\
    \ 包来编写小部件的测试。`flutter_test` 包已经包含在由 `flutter create` 命令创建的新项目的 `pubspec.yaml`\
    \ 文件中。小部件的测试用例使用 `testWidgets()` 函数声明。调用 `testWidgets()` 时，你需要提供一个描述和一个在 Flutter\
    \ 测试环境中运行的回调。该回调接收一个 `WidgetTester` 对象，用于与小部件和测试环境进行交互。创建待测试的小部件后，你可以使用 `Finder`\
    \ 对象和匹配器来验证小部件的状态。\n\n表 14-1 显示了 `WidgetTester` 类的方法。`pumpWidget()` 方法通常是测试的入口点，它创建要测试的小部件。测试有状态小部件时，更改状态后，你需要调用\
    \ `pump()` 方法触发重建。如果小部件使用动画，你应该使用 `pumpAndSettle()` 方法等待动画完成。像 `enterText()` 和\
    \ `ensureVisible()` 这样的方法使用 `Finder` 对象来查找要交互的小部件。\n\n**表 14-1**  \n`WidgetTester`\
    \ 的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `pumpWidget()` | 渲染指定的小部件。 |\n| `pump()`\
    \ | 触发一个帧，导致小部件重建。 |\n| `pumpAndSettle()` | 重复调用 `pump()` 方法，直到没有计划执行的帧。 |\n|\
    \ `enterText()` | 向文本输入小部件输入文本。 |\n| `pageBack()` | 关闭当前页面。 |\n| `runAsync()`\
    \ | 异步运行回调。 |\n| `dispatchEvent()` | 分发事件。 |\n| `ensureVisible()` | 通过滚动其祖先 `Scrollable`\
    \ 小部件使小部件可见。 |\n| `drag()` | 按给定偏移量拖动小部件。 |\n| `press()` | 按下小部件。 |\n| `longPress()`\
    \ | 长按小部件。 |\n| `tap()` | 轻触小部件。 |\n\n清单 14-8 中的 `ToUppercase` 小部件是一个要测试的有状态小部件。它有一个\
    \ `TextField` 小部件用于输入文本。当按钮被按下时，输入文本的大写形式会通过 `Text` 小部件显示出来。\n\n```dart\nclass\
    \ ToUppercase extends StatefulWidget {\n@override\n_ToUppercaseState createState()\
    \ => _ToUppercaseState();\n}\nclass _ToUppercaseState extends State {\nfinal _controller\
    \ = TextEditingController();\n@override\nWidget build(BuildContext context) {\n\
    return Column(\nchildren: [\nRow(\nchildren: [\nExpanded(child: TextField(controller:\
    \ _controller)),\nRaisedButton(\nchild: Text('Uppercase'),\nonPressed: () {\n\
    setState(() {});\n},\n),\n],\n),\nText((_controller.text ?? \").toUpperCase()),\n\
    ],\n);\n}\n}\n```\n**清单 14-8**  \n要测试的小部件\n\n清单 14-9 展示了 `ToUppercase` 小部件的测试用例。`_wrapInMaterial()`\
    \ 函数在测试前将 `ToUppercase` 小部件包裹在 `MaterialApp` 中。这是因为 `TextField` 小部件需要一个祖先 `Material`\
    \ 小部件。在测试用例中，首先使用 `pumpWidget()` 渲染小部件。`find` 对象是 `CommonFinders` 类的一个顶级常量。它有便捷的方法来创建不同类型的\
    \ `Finder` 对象。这里我们查找类型为 `TextField` 的小部件，并使用 `enterText()` 输入文本 \"abc\"。然后轻触 `RaisedButton`\
    \ 小部件，状态发生改变。需要调用 `pump()` 方法来触发重建。最后，我们验证是否存在一个文本为 \"ABC\" 的 `Text` 小部件。\n\n\
    **表 14-2**  \n`CommonFinders` 的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `byType()`\
    \ | 按类型查找小部件。 |\n| `byIcon()` | 按图标数据查找 `Icon` 小部件。 |\n| `byKey()` | 通过特定的 `Key`\
    \ 对象查找小部件。 |\n| `byTooltip()` | 查找具有给定消息的 `Tooltip` 小部件。 |\n| `byWidget()` | 按给定的小部件实例查找小部件。\
    \ |\n| `text()` | 查找具有给定文本的 `Text` 和 `EditableText` 小部件。 |\n| `widgetWithIcon()`\
    \ | 查找包含具有该图标的子代小部件的小部件。 |\n| `widgetWithText()` | 查找包含具有给定文本的 `Text` 子代的小部件。\
    \ |\n\n```dart\nWidget _wrapInMaterial(Widget widget) {\nreturn MaterialApp(\n\
    home: Scaffold(\nbody: widget,\n),\n);\n}\nvoid main() {\ntestWidgets('ToUppercase',\
    \ (WidgetTester tester) async {\nawait tester.pumpWidget(_wrapInMaterial(ToUppercase()));\n\
    await tester.enterText(find.byType(TextField), 'abc');\nawait tester.tap(find.byType(RaisedButton));\n\
    await tester.pump();\nexpect(find.text('ABC'), findsOneWidget);\n});\n}\n```\n\
    **清单 14-9**  \n测试 `ToUppercase` 小部件\n\n`Finder` 对象与匹配器一起用于验证状态。有四个匹配器可与 `Finder`\
    \ 对象一起使用：\n\n*   `findsOneWidget`：期望恰好找到一个小部件。\n*   `findsNothing`：期望没有找到小部件。\n\
    *   `findsNWidgets`：期望找到指定数量的小部件。\n*   `findsWidgets`：期望至少找到一个小部件。\n\n## 14.4\
    \ 编写集成测试\n\n### 问题\n\n你希望编写在模拟器或真实设备上运行的集成测试。\n\n### 解决方案\n\n使用 `flutter_driver`\
    \ 包。\n"
- fmt: "### Discussion\n\n单元测试和部件测试只能测试单个类、函数或部件。这些测试在开发或测试机器上运行，无法测试应用不同组件之间的集成。针对这种情况，应使用集成测试。\n\
    \n集成测试包含两个部分：第一部分是部署到模拟器或真实设备上的被检测应用；第二部分是驱动应用并验证应用状态的测试代码。被测试的应用与测试代码相互隔离，以避免干扰。\n\
    \n编写集成测试需要使用`flutter_driver`包。你需要将`flutter_driver`包添加到`pubspec.yaml`文件的`dev_dependencies`部分，如清单\
    \ [14-10] 所示。\n\n```\ndev_dependencies:\n  flutter_driver:\n    sdk: flutter\n\
    ```\n\n清单 14-10 添加`flutter_driver`包\n\n集成测试文件通常放在`test_driver`目录中。本次测试的目标是用于搜索\
    \ GitHub 职位列表的页面。为需要被集成测试使用的部件提供`ValueKey`对象作为`key`参数非常重要，这有助于在测试用例中更容易地找到这些部件。在清单\
    \ [14-11] 中，`Key('keyword')`创建了一个名称为 \"keyword\" 的`ValueKey`对象。\n\n```\nTextField(\n\
    \  key: Key('keyword'),\n  controller: _controller,\n)\n```\n\n清单 14-11 为部件添加\
    \ key\n\n`test_driver`目录中的`github_jobs.dart`文件包含待测试页面的被检测版本。清单 [14-12] 展示了`github_jobs.dart`文件的内容。`flutter_driver`包中的`enableFlutterDriverExtension()`函数使\
    \ Flutter Driver 能够连接到应用。\n\n```\nvoid main() {\n  enableFlutterDriverExtension();\n\
    \  runApp(SampleApp());\n}\n```\n\n清单 14-12 使用 Flutter Driver 测试的应用\n\n清单 [14-13]\
    \ 展示了`github_jobs_test.dart`文件的内容。文件名通过在应用文件名后附加`_test`后缀来选择。这是 Flutter Driver\
    \ 用于查找运行被测应用的 Dart 文件的约定。在`setUpAll()`函数中，使用`FlutterDriver.connect()`连接到应用。在测试用例中，`find`是`CommonFinders`对象的顶级常量，它提供了方便的方法来创建`SerializableFinder`对象。`byValueKey()`方法通过指定的键找到清单\
    \ [14-11] 中的`TextField`部件。`FlutterDriver`的`tap()`方法点击该`TextField`部件使其获得焦点。然后使用`enterText()`方法将搜索关键词输入到已聚焦的`TextField`部件中。接着点击搜索按钮触发数据加载。如果数据加载成功，则出现带有`jobsList`键的`ListView`部件。`waitFor()`方法等待`ListView`部件出现。\n\
    \n```\nvoid main() {\n  group('GitHub Jobs', () {\n    FlutterDriver driver;\n\
    \    setUpAll(() async {\n      driver = await FlutterDriver.connect();\n    });\n\
    \    test('searches by keyword', () async {\n      await driver.tap(find.byValueKey('keyword'));\n\
    \      await driver.enterText('android');\n      await driver.tap(find.byValueKey('search'));\n\
    \      await driver.waitFor(find.byValueKey('jobsList'),\n          timeout: Duration(seconds:\
    \ 5));\n    });\n    tearDownAll(() {\n      if (driver != null) {\n        driver.close();\n\
    \      }\n    });\n  });\n}\n```\n\n清单 14-13 使用 Flutter Driver 进行测试\n\n现在我们可以使用以下命令来运行集成测试。Flutter\
    \ Driver 将应用部署到模拟器或真实设备上，并运行测试代码以验证结果。\n\n```\n$ flutter driver --target=test_driver/github_jobs.dart\n\
    ```\n\n表 [14-3] 展示了`FlutterDriver`类的方法，这些方法可用于在测试期间与应用进行交互。如果你想执行自定义操作，可以在调用`enableFlutterDriverExtension()`函数时提供一个`DataHandler`函数。通过`requestData()`方法发送的消息将由该`DataHandler`处理。\n\
    \n**表 14-3** FlutterDriver 的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `enterText()`\
    \ | 向当前聚焦的文本输入框输入文本。 |\n| `getText()` | 获取`Text`部件中的文本。 |\n| `tap()` | 点击部件。 |\n\
    | `waitFor()` | 等待直到查找器定位到部件。 |\n| `waitForAbsent()` | 等待直到查找器无法再定位到部件。 |\n| `scroll()`\
    \ | 按给定偏移量在部件中滚动。 |\n| `scrollIntoView()` | 滚动部件的`Scrollable`祖先，直到部件可见。 |\n| `scrollUntilVisible(SerializableFinder\
    \ scrollable, SerializableFinder item)` | 在`scrollable`部件中重复调用`scroll()`，直到`item`可见，然后对`item`调用`scrollIntoView()`。\
    \ |\n| `traceAction()` | 执行操作并返回其性能跟踪。 |\n| `startTracing()` | 开始记录性能跟踪。 |\n|\
    \ `stopTracingAndDownloadTimeline()` | 停止记录性能跟踪并下载结果。 |\n| `forceGC()` | 强制执行垃圾回收。\
    \ |\n| `getRenderTree()` | 返回当前渲染树的转储。 |\n| `requestData()` | 向应用发送消息并接收响应。 |\n\
    | `screenshot()` | 截取屏幕截图。 |\n\n`FlutterDriver`类中的方法使用`SerializableFinder`对象来定位部件。表\
    \ [14-4] 展示了`CommonFinders`类中用于创建`SerializableFinder`对象的方法。这些方法仅支持使用`String`或`int`值作为参数，这是因为在发送到应用时需要对值进行序列化。\n\
    \n**表 14-4** flutter_driver 中 CommonFinders 的方法\n\n| 名称 | 描述 |\n| --- | --- |\n\
    | `byType()` | 通过类名查找部件。 |\n| `byValueKey()` | 通过键查找部件。 |\n| `byTooltip()` | 查找具有给定消息的工具提示的部件。\
    \ |\n| `text()` | 查找包含给定文本的`Text`和`EditableText`部件。 |\n| `pageBack()` | 查找返回按钮。\
    \ |\n\n## 14.5 调试应用\n\n### 问题\n\n你想调试在应用中发现的问题。\n\n### 解决方案\n\n使用 Flutter SDK\
    \ 提供的 IDE 和实用工具。"
  raw: '### Discussion


    Unit tests and widget tests can only test individual classes, functions, or widgets.
    These tests are running on development or testing machines. These tests cannot
    test integration between different components of an app. Integration tests should
    be used for this scenario.


    Integration testing comes in two parts. The first part is the instrumented app
    deployed to an emulator or real device. The second part is the test code to drive
    the app and verify state of the app. The app under test is isolated from the test
    code to avoid interference.


    The `flutter_driver` package is required to write integration tests. You need
    to add `flutter_driver` package to the `dev_dependencies` section of the `pubspec.yaml`
    file; see Listing [14-10](#479501_1_En_14_Chapter.xhtml#PC10).


    ```

    dev_dependencies:

    flutter_driver:

    sdk: flutter

    Listing 14-10

    Add flutter_driver package

    ```


    Integration test files are usually put in the `test_driver` directory. The target
    to test is the page to search job listings on GitHub. It’s important to provide
    `ValueKey` objects as the `key` parameter of the widgets that need to be used
    by integration tests. This makes it easier to find those widgets in the test case.
    In Listing [14-11](#479501_1_En_14_Chapter.xhtml#PC11), `Key(''keyword'')` creates
    a `ValueKey` object with name “keyword”.


    ```

    TextField(

    key: Key(''keyword''),

    controller: _controller,

    )

    Listing 14-11

    Add key to widget

    ```


    The `github_jobs.dart` file in `test_driver` directory contains an instrumented
    version of the page to test. Listing [14-12](#479501_1_En_14_Chapter.xhtml#PC12)
    shows the content of `github_jobs.dart` file. The `enableFlutterDriverExtension()`
    function from the flutter_driver package enables Flutter Driver to connect to
    the app.


    ```

    void main() {

    enableFlutterDriverExtension();

    runApp(SampleApp());

    }

    Listing 14-12

    App to test using Flutter Driver

    ```


    Listing [14-13](#479501_1_En_14_Chapter.xhtml#PC13) shows the content of `github_jobs_test.dart`
    file. The file name is selected by appending `_test` suffix to the name of the
    app file. This is the convention used by Flutter Driver to find the Dart file
    to run the app under test. In the `setUpAll()` function , `FlutterDriver.connect()`
    is used to connect to the app. In the test case, `find` is the top-level constant
    of `CommonFinders` object that has convenient methods to create `SerializableFinder`
    objects. The `byValueKey()` method finds the `TextField` widget in Listing [14-11](#479501_1_En_14_Chapter.xhtml#PC11)
    by the specified key. The `tap()` method of `FlutterDriver` taps at the `TextField`
    widget to make it gain focus. Then `enterText()` method is used to input search
    keyword to the focused `TextField` widget . The search button is then tapped to
    trigger the loading of data. If the data is loaded successfully, the `ListView`
    widget with `jobsList` key is available. The `waitFor()` method waits for the
    `ListView` widget to appear.


    ```

    void main() {

    group(''GitHub Jobs'', () {

    FlutterDriver driver;

    setUpAll(() async {

    driver = await FlutterDriver.connect();

    });

    test(''searches by keyword'', () async {

    await driver.tap(find.byValueKey(''keyword''));

    await driver.enterText(''android'');

    await driver.tap(find.byValueKey(''search''));

    await driver.waitFor(find.byValueKey(''jobsList''),

    timeout: Duration(seconds: 5));

    });

    tearDownAll(() {

    if (driver != null) {

    driver.close();

    }

    });

    });

    }

    Listing 14-13

    Test using Flutter Driver

    ```


    Now we can use the following command to run the integration test. Flutter Driver
    deploys the app to the emulator or real device and runs the test code to verify
    the result.


    ```

    $ flutter driver --target=test_driver/github_jobs.dart

    ```


    Table [14-3](#479501_1_En_14_Chapter.xhtml#Tab3) shows methods of `FlutterDriver`
    class that can be used to interact with the app during tests. If you want to perform
    custom actions, you can provide a `DataHandler` function when calling `enableFlutterDriverExtension()`
    function . Messages sent using `requestData()` method will be handled by the `DataHandler`.


    Table 14-3


    Methods of FlutterDriver


    | Name | Description |

    | --- | --- |

    | `enterText()` | Enter text into the currently focused text input. |

    | `getText()` | Get text in the `Text` widget. |

    | `tap()` | Taps at the widget. |

    | `waitFor()` | Wait until the finder locates a widget. |

    | `waitForAbsent()` | Wait until the finder can no longer locate a widget. |

    | `scroll()` | Scroll in a widget by the given offset. |

    | `scrollIntoView()` | Scroll the `Scrollable` ancestor of the widget until it’s
    visible. |

    | `scrollUntilVisible(SerializableFinder scrollable, SerializableFinder item)`
    | Repeatedly call `scroll()` in the `scrollable` widget until the `item` is visible,
    then call `scrollIntoView()` on the `item`. |

    | `traceAction()` | Run the action and return its performance trace. |

    | `startTracing()` | Start recording performance traces. |

    | `stopTracingAndDownloadTimeline()` | Stop recording performance traces and download
    the result. |

    | `forceGC()` | For a garbage collection to run. |

    | `getRenderTree()` | Returns a dump of the current render tree. |

    | `requestData()` | Sends a message to the app and receives a response. |

    | `screenshot()` | Take a screenshot. |


    Methods in `FlutterDriver` class use `SerializableFinder` objects to locate widgets.
    Table [14-4](#479501_1_En_14_Chapter.xhtml#Tab4) shows methods of `CommonFinders`
    class to create `SerializableFinder` objects. These methods only support using
    `String` or `int` values as parameters. This is because values need to be serialized
    when sending to the app.


    Table 14-4


    Methods of CommonFinders in flutter_driver


    | Name | Description |

    | --- | --- |

    | `byType()` | Find widgets by class name. |

    | `byValueKey()` | Find widgets by key. |

    | `byTooltip()` | Find widgets with a tooltip with the given message. |

    | `text()` | Find `Text` and `EditableText` widgets with the given text. |

    | `pageBack()` | Find the back button. |


    ## 14.5 Debugging Apps


    ### Problem


    You want to debug issues found in the apps.


    ### Solution


    Use IDE and utilities provided by Flutter SDK.'
