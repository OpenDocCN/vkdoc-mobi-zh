    \ 2, 3])\n.takeWhile((value) => value % 2 == 1)\n.listen(print);\n// -> 1\nStream.fromIterable([1,\
    \ 2, 3]).where((value) => value % 2 == 1).listen(print);\n// -> 1, 3\n```\n\n\
    清单 9-9  \n流转换\n\n`Stream` 类中还有其他返回 `Future` 对象的方法；参见表 9-4。这些操作返回的是单个值而非流。\n\n\
    表 9-4  \n用于获取单一值的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `any(bool test(T element))`\
    \ | 检查流中是否有任意元素匹配谓词。 |\n| `every(bool test(T element))` | 检查流中是否所有元素都匹配谓词。 |\n\
    | `contains(Object needle)` | 检查流是否包含给定元素。 |\n| `drain<E>([E futureValue])` |\
    \ 丢弃流中的所有元素。 |\n| `elementAt(int index)` | 获取指定索引处的元素。 |\n| `firstWhere(bool test(T\
    \ element), { T orElse() })` | 找到第一个匹配谓词的元素。 |\n| `lastWhere(bool test(T element),\
    \ { T orElse() })` | 找到最后一个匹配谓词的元素。 |\n| `singleWhere(bool test(T element), {\
    \ T orElse() })` | 找到唯一一个匹配谓词的元素。 |\n| `fold<S>(S initialValue, S combine(S previous,\
    \ T element))` | 将流中的元素合并为一个单独的值。 |\n| `forEach(void action(T element))` | 对流中的每个元素执行一个操作。\
    \ |\n| `join([String separator = \"\"])` | 将元素合并成一个字符串。 |\n| `pipe(StreamConsumer<T>\
    \ streamConsumer)` | 将事件导入一个 `StreamConsumer`。 |\n| `reduce(T combine(T previous,\
    \ T element))` | 将流中的元素合并为一个单独的值。 |\n| `toList()` | 将元素收集到一个列表中。 |\n| `toSet()`\
    \ | 将元素收集到一个集合中。 |\n\n清单 9-10 展示了使用表 9-4 中方法的示例。每条语句下方的代码展示了执行结果。\n\n```\nStream.fromIterable([1,\
    \ 2, 3]).forEach(print);\n// -> 1, 2, 3\nStream.fromIterable([1, 2, 3]).contains(1).then(print);\n\
    // -> true\nStream.fromIterable([1, 2, 3]).any((value) => value % 2 == 0).then(print);\n\
    // -> true\nStream.fromIterable([1, 2, 3]).every((value) => value % 2 == 0).then(print);\n\
    // -> false\nStream.fromIterable([1, 2, 3]).fold(0, (v1, v2) => v1 + v2).then(print);\n\
    // -> 6\nStream.fromIterable([1, 2, 3]).reduce((v1, v2) => v1 * v2).then(print);\n\
    // -> 6\nStream.fromIterable([1, 2, 3])\n.firstWhere((value) => value % 2 == 1)\n\
    .then(print);\n// -> 1\nStream.fromIterable([1, 2, 3])\n.lastWhere((value) =>\
    \ value % 2 == 1)\n.then(print);\n// -> 3\nStream.fromIterable([1, 2, 3])\n.singleWhere((value)\
    \ => value % 2 == 1)\n.then(print);\n// -> Unhandled exception: Bad state: Too\
    \ many elements\n```\n\n清单 9-10  \n返回 `Future` 对象的方法\n\n## 9.5 创建流\n\n### 问题\n\
    \n你想创建 `Stream` 对象。\n\n### 解决方案\n\n使用不同的 `Stream` 构造器。\n\n### 讨论\n\n有几种不同的 `Stream`\
    \ 构造器用于创建 `Stream` 对象：\n\n*   `Stream.empty()` 构造器创建一个空的广播流。\n*   `Stream.fromFuture()`\
    \ 构造器从一个 `Future` 对象创建单订阅流。\n*   `Stream.fromFutures()` 构造器从一个 `Future` 对象列表创建流。\n\
    *   `Stream.fromInterable()` 构造器从一个 `Iterable` 对象的元素创建单订阅流。\n*   `Stream.periodic()`\
    \ 构造器创建一个流，按给定的时间间隔定期发射数据事件。\n\n清单 9-11 展示了不同 `Stream` 构造器的使用示例。\n\n```\nStream.fromIterable([1,\
    \ 2, 3]).listen(print);\nStream.fromFuture(Future.value(1)).listen(print);\nStream.fromFutures([Future.value(1),\
    \ Future.error('error'), Future.value(2)])\n.listen(print);\nStream.periodic(Duration(seconds:\
    \ 1), (int count) => count * 2)\n.take(5)\n.listen(print);\n```\n\n清单 9-11  \n\
    使用 `Stream` 构造器\n\n另一种创建流的方法是使用 `StreamController` 类。一个 `StreamController` 对象可以发送不同的事件到它所控制的流。默认的\
    \ `StreamController()` 构造器创建单订阅流，而 `StreamController.broadcast()` 构造器创建广播流。使用\
    \ `StreamController`，你可以以编程方式生成流中的元素。\n\n在清单 9-12 中，不同的事件被发送到由 `StreamController`\
    \ 对象控制的流中。\n\n```\nStreamController controller = StreamController();\ncontroller.add(1);\n\
    controller.add(2);\ncontroller.stream.listen(print, onError: print, onDone: ()\
    \ => print('done'));\ncontroller.addError('error');\ncontroller.add(3);\ncontroller.close();\n\
    ```\n\n清单 9-12  \n使用 `StreamController`\n\n## 9.6 基于流和 Future 构建小部件\n\n### 问题\n\
    \n你想构建一个小部件，该小部件能根据流或 future 中的数据更新其内容。\n\n### 解决方案\n\n使用 `StreamBuilder<T>` 或\
    \ `FutureBuilder<T>` 小部件。\n"
- fmt: '### Discussion


    给定一个`Steam`或`Future`对象，您可能希望构建一个根据其中数据更新其内容的小部件。您可以使用`StreamBuilder<T>`小部件来处理`Stream`对象，使用`FutureBuilder<T>`小部件来处理`Future`对象。表[9-5](#479501_1_En_9_Chapter.xhtml#Tab5)展示了`StreamBuilder<T>`构造函数的参数。


    **表 9-5** `StreamBuilder<T>`的参数


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `stream` | `Stream<T>` | 构建器所使用的流。 |

    | `builder` | `AsyncWidgetBuilder<T>` | 用于构建小部件的构建器函数。 |

    | `initialData` | `T` | 用于构建小部件的初始数据。 |


    `AsyncWidgetBuilder`是函数类型`Widget (BuildContext context, AsyncSnapshot<T> snapshot)`的typedef。`AsyncSnapshot`类表示与异步计算交互的快照。表[9-6](#479501_1_En_9_Chapter.xhtml#Tab6)展示了`AsyncSnapshot<T>`类的属性。


    **表 9-6** `AsyncSnapshot<T>`的属性


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `connectionState` | `ConnectionState` | 与异步计算的连接状态。 |

    | `data` | `T` | 异步计算接收到的最新数据。 |

    | `error` | `Object` | 异步计算接收到的最新错误对象。 |

    | `hasData` | `bool` | `data`属性是否不为`null`。 |

    | `hasError` | `bool` | `error`属性是否不为`null`。 |


    您可以使用`connectionState`的值来确定连接状态。表[9-7](#479501_1_En_9_Chapter.xhtml#Tab7)展示了`ConnectionState`枚举的值。


    **表 9-7** `ConnectionState`的值


    | 名称 | 描述 |

    | --- | --- |

    | `none` | 未连接到异步计算。 |

    | `waiting` | 已连接到异步计算并等待交互。 |

    | `active` | 已连接到一个活动的异步计算。 |

    | `done` | 已连接到一个终止的异步计算。 |


    当使用`StreamBuilder`小部件构建UI时，典型的方式是根据连接状态返回不同的小部件。例如，如果连接状态是`waiting`，则可能返回一个进度指示器。


    在清单[9-13](#479501_1_En_9_Chapter.xhtml#PC13)中，流包含五个元素，每秒钟生成一个。如果连接状态是`none`或`waiting`，则返回一个`CircularProgressIndicator`小部件。如果状态是`active`或`done`，则根据`data`和`error`属性的值返回一个`Text`小部件。


    ```

    class StreamBuilderPage extends StatelessWidget {

    final Stream _stream =

    Stream.periodic(Duration(seconds: 1), (int value) => value * 10).take(5);

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Stream Builder''),

    ),

    body: Center(

    child: StreamBuilder(

    stream: _stream,

    initialData: 0,

    builder: (BuildContext context, AsyncSnapshot snapshot) {

    switch (snapshot.connectionState) {

    case ConnectionState.none:

    case ConnectionState.waiting:

    return CircularProgressIndicator();

    case ConnectionState.active:

    case ConnectionState.done:

    if (snapshot.hasData) {

    return Text(''${snapshot.data ?? "}'');

    } else if (snapshot.hasError) {

    return Text(

    ''${snapshot.error}'',

    style: TextStyle(color: Colors.red),

    );

    }

    }

    return null;

    },

    ),

    ),

    );

    }

    }

    ```


    **清单 9-13** 使用`StreamBuilder`


    `FutureBuilder`小部件的用法与`StreamBuilder`小部件类似。当将`FutureBuilder`与`Future`对象一起使用时，您可以先使用`asStream()`方法将`Future`对象转换为`Stream`对象，然后对转换后的`Stream`对象使用`StreamBuilder`。


    在清单[9-14](#479501_1_En_9_Chapter.xhtml#PC14)中，我们使用了不同的方式来构建UI。我们不是检查连接状态，而是使用`hasData`和`hasError`属性来检查状态。


    ```

    class FutureBuilderPage extends StatelessWidget {

    final Future _future = Future.delayed(Duration(seconds: 1), () {

    if (Random().nextBool()) {

    return 1;

    } else {

    throw ''invalid value'';

    }

    });

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Future Builder''),

    ),

    body: Center(

    child: FutureBuilder(

    future: _future,

    builder: (BuildContext context, AsyncSnapshot snapshot) {

    if (snapshot.hasData) {

    return Text(''${snapshot.data}'');

    } else if (snapshot.hasError) {

    return Text(

    ''${snapshot.error}'',

    style: TextStyle(color: Colors.red),

    );

    } else {

    return CircularProgressIndicator();

    }

    },

    ),

    ),

    );

    }

    }

    ```


    **清单 9-14** 使用`FutureBuilder`


    ## 9.7 处理简单 JSON 数据


    ### 问题


    您想要一种简单的方法来处理 JSON 数据。


    ### 解决方案


    使用`dart:convert`库中的`jsonEncode()`和`jsonDecode()`函数。


    ### 讨论


    JSON 是一种流行的 Web 服务数据格式。为了与后端服务交互，您可能需要在两种场景中处理 JSON 数据：


    *   JSON 数据序列化：将 Dart 中的对象转换为 JSON 字符串。

    *   JSON 数据反序列化：将 JSON 字符串转换为 Dart 中的对象。


    对于这两种场景，如果您只是偶尔需要处理简单的 JSON 数据，那么使用`dart:convert`库中的`jsonEncode()`和`jsonDecode()`函数是一个不错的选择。`jsonEncode()`函数将
    Dart 对象转换为字符串，而`jsonDecode()`函数将字符串转换为 Dart 对象。在清单[9-15](#479501_1_En_9_Chapter.xhtml#PC15)中，`data`对象首先被序列化为
    JSON 字符串，然后 JSON 字符串再次被反序列化为 Dart 对象。


    ```

    var data = {

    ''name'': ''Test'',

    ''count'': 100,

    ''valid'': true,

    ''list'': [

    1,

    2,

    {

    ''nested'': ''a'',

    ''value'': 123,

    },

    ],

    };

    String str = jsonEncode(data);

    print(str);

    Object obj = jsonDecode(str);

    print(obj);

    ```


    **清单 9-15** 处理 JSON 数据


    `dart:convert`库中的 JSON 编码器仅支持有限的数据类型，包括数字、字符串、布尔值、`null` 、列表以及键为字符串的映射。要编码其他类型的对象，您需要使用`toEncodable`参数提供一个函数，该函数首先将对象转换为可编码的值。默认的`toEncodable`函数会调用对象的`toJson()`方法。为需要序列化为
    JSON 字符串的自定义类添加`toJson()`方法是一种常见做法。


    在清单[9-16](#479501_1_En_9_Chapter.xhtml#PC16)中，`ToEncode`类的`toJson()`方法返回一个列表，该列表将被用作
    JSON 序列化的输入。


    ```

    class ToEncode {

    ToEncode(this.v1, this.v2);

    final String v1;

    final String v2;

    Object toJson() {

    return [v1, v2];

    }

    }

    print(jsonEncode(ToEncode(''v1'', ''v2'')));

    ```


    **清单 9-16** 使用`toJson()`函数


    如果您希望序列化的 JSON 字符串有缩进，您需要直接使用`JsonEncoder`类。在清单[9-17](#479501_1_En_9_Chapter.xhtml#PC17)中，使用了两个空格作为缩进。


    ```

    String indentString = JsonEncoder.withIndent(''  '').convert(data);

    print(indentString);

    ```


    **清单 9-17** 添加缩进


    ## 9.8 处理复杂 JSON 数据


    ### 问题


    您想要一种类型安全的方式来处理 JSON 数据。


    ### 解决方案


    使用`json_annotation`和`json_serializable`库。'
  raw: '### Discussion


    Given a `Steam` or `Future` object, you may want to build a widget that updates
    its content based on the data in it. You can use `StreamBuilder<T>` widget to
    work with `Stream` objects and `FutureBuilder<T>` widget to work with `Future`
    objects. Table [9-5](#479501_1_En_9_Chapter.xhtml#Tab5) shows parameters of `StreamBuilder<T>`
    constructor.


    Table 9-5


    Parameters of StreamBuilder<T>


    | Name | Type | Description |

    | --- | --- | --- |

    | `stream` | `Stream<T>` | The stream for the builder. |

    | `builder` | `AsyncWidgetBuilder<T>` | Builder function for the widget. |

    | `initialData` | `T` | Initial data to build the widget. |


    `AsyncWidgetBuilder` is a typedef of function type `Widget (BuildContext context,
    AsyncSnapshot<T> snapshot)`. `AsyncSnapshot` class represents the snapshot of
    interaction with an asynchronous computation. Table [9-6](#479501_1_En_9_Chapter.xhtml#Tab6)
    shows properties of `AsyncSnapshot<T>` class.


    Table 9-6


    Properties of AsyncSnapshot<T>


    | Name | Type | Description |

    | --- | --- | --- |

    | `connectionState` | `ConnectionState` | State of connection to the asynchronous
    computation. |

    | `data` | `T` | The latest data received by the asynchronous computation. |

    | `error` | `Object` | The latest error object received by the asynchronous computation.
    |

    | `hasData` | `bool` | Whether data property is not `null`. |

    | `hasError` | `bool` | Whether error property is not `null`. |


    You can determine the connection state using the value of `connectionState`. Table
    [9-7](#479501_1_En_9_Chapter.xhtml#Tab7) shows values of `ConnectionState` enum.


    Table 9-7


    Values of ConnectionState


    | Name | Description |

    | --- | --- |

    | `none` | Not connected to the asynchronous computation. |

    | `waiting` | Connected to the asynchronous computation and waiting for interaction.
    |

    | `active` | Connected to an active asynchronous computation. |

    | `done` | Connected to a terminated asynchronous computation. |


    When using `StreamBuilder` widget to build the UI, the typical way is to return
    different widgets according to the connection state. For example, if the connection
    state is waiting, then a process indicator may be returned.


    In Listing [9-13](#479501_1_En_9_Chapter.xhtml#PC13), the stream has five elements
    that are generated every second. If the connection state is `none` or `waiting`,
    a `CircularProgressIndicator` widget is returned. If the state is `active` or
    `done`, a `Text` widget is returned according to the value of `data` and `error`
    properties.


    ```

    class StreamBuilderPage extends StatelessWidget {

    final Stream _stream =

    Stream.periodic(Duration(seconds: 1), (int value) => value * 10).take(5);

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Stream Builder''),

    ),

    body: Center(

    child: StreamBuilder(

    stream: _stream,

    initialData: 0,

    builder: (BuildContext context, AsyncSnapshot snapshot) {

    switch (snapshot.connectionState) {

    case ConnectionState.none:

    case ConnectionState.waiting:

    return CircularProgressIndicator();

    case ConnectionState.active:

    case ConnectionState.done:

    if (snapshot.hasData) {

    return Text(''${snapshot.data ?? "}'');

    } else if (snapshot.hasError) {

    return Text(

    ''${snapshot.error}'',

    style: TextStyle(color: Colors.red),

    );

    }

    }

    return null;

    },

    ),

    ),

    );

    }

    }

    Listing 9-13

    Use StreamBuilder

    ```


    The usage of `FutureBuilder` widget is similar with `StreamBuilder` widget. When
    using a `FutureBuilder` with a `Future` object, you can convert the `Future` object
    to a `Stream` object using `asStream()` method first, then use `StreamBuilder`
    with the converted `Stream` object .


    In Listing [9-14](#479501_1_En_9_Chapter.xhtml#PC14), we use a different way to
    build the UI. Instead of checking the connection state, `hasData` and `hasError`
    properties are used to check the status.


    ```

    class FutureBuilderPage extends StatelessWidget {

    final Future _future = Future.delayed(Duration(seconds: 1), () {

    if (Random().nextBool()) {

    return 1;

    } else {

    throw ''invalid value'';

    }

    });

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Future Builder''),

    ),

    body: Center(

    child: FutureBuilder(

    future: _future,

    builder: (BuildContext context, AsyncSnapshot snapshot) {

    if (snapshot.hasData) {

    return Text(''${snapshot.data}'');

    } else if (snapshot.hasError) {

    return Text(

    ''${snapshot.error}'',

    style: TextStyle(color: Colors.red),

    );

    } else {

    return CircularProgressIndicator();

    }

    },

    ),

    ),

    );

    }

    }

    Listing 9-14

    Use FutureBuilder

    ```


    ## 9.7 Handle Simple JSON Data


    ### Problem


    You want to have a simple way to handle JSON data.


    ### Solution


    Use `jsonEncode()` and `jsonDecode()` functions from `dart:convert` library.


    ### Discussion


    JSON is a popular data format for web services. To interact with backend services,
    you may need to handle JSON data in two scenarios:


    *   JSON data serialization converts objects in Dart to JSON strings.


    *   JSON data deserialization converts JSON strings to objects in Dart.


    For both scenarios, if you only need to handle simple JSON data occasionally,
    then using `jsonEncode()` and `jsonDecode()` functions from `dart:convert` library
    is a good choice. The `jsonEncode()` function converts Dart objects to strings,
    while `jsonDecode()` function converts strings to Dart objects. In Listing [9-15](#479501_1_En_9_Chapter.xhtml#PC15),
    data object is serialized to JSON string first, then the JSON string is deserialized
    to Dart object again.


    ```

    var data = {

    ''name'': ''Test'',

    ''count'': 100,

    ''valid'': true,

    ''list'': [

    1,

    2,

    {

    ''nested'': ''a'',

    ''value'': 123,

    },

    ],

    };

    String str = jsonEncode(data);

    print(str);

    Object obj = jsonDecode(str);

    print(obj);

    Listing 9-15

    Handle JSON data

    ```


    The JSON encoder in `dart:convert` library only supports a limited number of data
    types, including numbers, strings, booleans, `null`, lists, and maps with string
    keys. To encode other types of objects, you need to use the `toEncodable` parameter
    to provide a function which converts the object to an encodable value first. The
    default `toEncodable` function calls `toJson()` method on the object. It’s a common
    practice to add `toJson()` method to custom classes that need to be serialized
    as JSON strings.


    In Listing [9-16](#479501_1_En_9_Chapter.xhtml#PC16), `toJson()` method of `ToEncode`
    class returns a list which will be used as the input of JSON serialization.


    ```

    class ToEncode {

    ToEncode(this.v1, this.v2);

    final String v1;

    final String v2;

    Object toJson() {

    return [v1, v2];

    }

    }

    print(jsonEncode(ToEncode(''v1'', ''v2'')));

    Listing 9-16

    Use toJson() function

    ```


    If you want to have indent in the serialized JSON strings, you need to use `JsonEncoder`
    class directly. In Listing [9-17](#479501_1_En_9_Chapter.xhtml#PC17), two spaces
    are used as the indent.


    ```

    String indentString = JsonEncoder.withIndent(''  '').convert(data);

    print(indentString);

    Listing 9-17

    Add indent

    ```


    ## 9.8 Handle Complex JSON Data


    ### Problem


    You want to have a type-safe way to handle JSON data.


    ### Solution


    Use `json_annotation` and `json_serializable` libraries.'
