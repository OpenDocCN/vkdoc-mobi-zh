- fmt: '# Discussion


    Some widgets are normally designed to be as big as possible to match their parents’
    size. But these widgets need to be constrained in other places. For example, when
    these widgets are added to a vertical list, the height need to be limited. `LimitedBox`
    constructor has named parameters `maxWidth` and `maxHeight` to specify the limitations.
    If a `LimitedBox` widget’s maximum width is unbounded, then its child’s width
    is limited to `maxWidth`. If this `LimitedBox`’s maximum height is unbounded,
    then its child’s height is limited to `maxHeight`.


    In Listing [5-8](#479501_1_En_5_Chapter.xhtml#PC8), the `maxHeight` of a `LimitedBox`
    widget is set to 100, so the child’s maximum height is 100px.


    ```

    LimitedBox(

    maxHeight: 100,

    child: Image.network(''https://picsum.photos/400''),

    )

    Listing 5-8

    Example of LimitedBox

    ```


    ## 5.9 Scaling and Positioning Widgets


    ### Problem


    You want to scale and position a widget.


    ### Solution


    Use `FittedBox` with different fit mode and alignment.


    ### Discussion


    Align widget in Recipe 5-3 can position its child using different alignments.
    `FittedBox` widget supports scaling and positioning of its child. The fit mode
    is specified using the parameter `fit` of type `BoxFit`. `BoxFit` is an enum type
    with values shown in Table [5-4](#479501_1_En_5_Chapter.xhtml#Tab4).


    **Table 5-4** BoxFit values


    | Name | Description |

    | --- | --- |

    | `fill` | Fill the target box. Source''s aspect ratio is ignored. |

    | `contain` | As large as possible to contain the source entirely in the target
    box. |

    | `cover` | As small as possible to cover the entire target box. |

    | `fitWidth` | Only make sure the full width of the source is shown. |

    | `fitHeight` | Only make sure the full height of the source is shown. |

    | `none` | Align the source within the target box and discard anything outside
    the box. |

    | `scaleDown` | Align the source with the target box and scale down when necessary
    to ensure the source fits in the box. If the source is shrunk, this is the same
    as contain; otherwise, it is the same as none. |


    `FittedBox` is usually used when displaying images. Listing [5-9](#479501_1_En_5_Chapter.xhtml#PC9)
    shows an example to demonstrate different values of `BoxFit`. `ImageBox` widget
    uses a `SizedBox` widget to limit its size and places the image inside of a `FittedBox`
    widget. The `DecoratedBox` widget creates a red border to show the boundary of
    `ImageBox` widget.


    ```

    class FitPage extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Fit''),

    ),

    body: Center(

    child: Wrap(

    spacing: 20,

    runSpacing: 20,

    alignment: WrapAlignment.spaceAround,

    children: [

    ImageBox(fit: BoxFit.fill),

    ImageBox(fit: BoxFit.contain),

    ImageBox(fit: BoxFit.cover),

    ImageBox(fit: BoxFit.fitWidth),

    ImageBox(fit: BoxFit.fitHeight),

    ImageBox(fit: BoxFit.none),

    ImageBox(fit: BoxFit.scaleDown),

    ],

    ),

    ),

    );

    }

    }

    class ImageBox extends StatelessWidget {

    const ImageBox({

    Key key,

    this.boxWidth = 150,

    this.boxHeight = 170,

    this.imageWidth = 200,

    this.fit,

    });

    final double boxWidth;

    final double boxHeight;

    final double imageWidth;

    final BoxFit fit;

    @override

    Widget build(BuildContext context) {

    return DecoratedBox(

    decoration: BoxDecoration(border: Border.all(color: Colors.red)),

    child: SizedBox(

    width: boxWidth,

    height: boxHeight,

    child: FittedBox(

    fit: fit,

    child: SizedBox(

    width: imageWidth,

    height: imageWidth,

    child: Image.network(''https://dummyimage.com/${imageWidth.toInt()}''

    ''&text=${fit.toString().substring(7)}''),

    ),

    ),

    ),

    );

    }

    }

    Listing 5-9

    Different values of BoxFit

    ```


