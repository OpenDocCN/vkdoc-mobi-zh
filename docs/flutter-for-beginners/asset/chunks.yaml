    ## 2.17 追踪正在运行的 Flutter 应用


    ### 问题


    你想要追踪一个正在运行的应用的执行过程。


    ### 解决方案


    使用 `flutter trace` 命令。


    ### 讨论


    要开始追踪，我们需要知道正在运行的应用的 observatory 端口，并通过参数 `--debug-port` 将此端口提供给 `flutter trace`。默认情况下，追踪会运行
    `10` 秒，并将结果 JSON 文件写入当前目录，文件名类似于 `trace_01.json`、`trace_02.json` 等。在以下命令中，observatory
    端口是 `51240`。


    ```

    $ flutter trace --debug-port=51240

    ```


    使用参数 `-d` 或 `--duration` 来指定追踪运行的持续时间（以秒为单位）。以下命令运行追踪 5 秒。


    ```

    $ flutter trace --debug-port=51240 -d 5

    ```


    如果你希望手动控制追踪过程，可以先使用 `flutter trace --start` 开始追踪，然后在稍后使用 `flutter trace --stop`
    停止追踪。值得注意的是，当调用 `flutter trace --stop` 时，追踪需要等待 `--duration` 中指定的时间才能停止。在以下命令中，在第二次
    `flutter trace --stop` 之后，追踪会再等待 10 秒才停止，这是 `--duration` 的默认值。


    ```

    $ flutter trace --start

    $ flutter trace --stop

    ```


    要立即停止追踪，请使用以下命令。


    ```

    $ flutter trace --stop -d 0

    ```


