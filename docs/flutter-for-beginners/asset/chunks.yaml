    iOS 的隐私要求

    ```


    对于 Android，需要在 `android/app/build.gradle` 文件中将最低 Android SDK 版本设置为 21。


    要访问摄像头，你需要创建 `CameraController` 对象。`CameraController` 构造函数需要 `CameraDescription`
    和 `ResolutionPreset` 类型的参数。`CameraDescription` 类描述了一个摄像头。`ResolutionPreset` 枚举描述了屏幕分辨率的质量。`ResolutionPreset`
    是一个枚举，包含 `low`、`medium` 和 `high` 三个值。要获取 `CameraDescription` 对象，你可以使用 `availableCameras()`
    函数来获取可用摄像头的列表，其类型为 `List<CameraDescription>`。


    表格 12-7 展示了 `CameraController` 类的方法。所有这些方法都返回 `Future` 对象。首先需要初始化一个 `CameraController`
    对象。只有在 `initialize()` 返回的 `Future` 对象成功完成后，才能调用其他方法。`CameraController` 类继承自 `ValueNotifier<CameraValue>`
    类，因此你可以为其添加监听器，以获取状态变更的通知。


    **表 12-7** `CameraController` 的方法


    | 名称 | 描述 |

    | --- | --- |

    | `takePicture(String path)` | 拍摄一张照片并保存到文件。 |

