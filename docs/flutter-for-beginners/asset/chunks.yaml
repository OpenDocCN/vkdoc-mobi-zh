    ## 9.4 Working with Streams


    ### Problem


    You want to work with a stream of events.


    ### Solution


    Use `Stream<T>` class and its subclasses.


    ### Discussion


    With `Future` class, we can represent a single value which may be available in
    the future. However, we may also need to work with a sequence of events. `Stream<T>`
    class in `dart:async` library represents a source of asynchronous events. To help
    with this, the `Future` class has `asStream()` method to create a `Stream` containing
    the result of the current `Future` object.


    If you have experiences with Reactive Streams ( [`www.reactive-streams.org/`](http://www.reactive-streams.org/)
    ), you may find `Stream` in Dart is a similar concept. There can be three types
    of events in a stream:


    *   Data event represents actual data in the stream. These events are also called
    elements in the stream.


    *   Error event represents errors occurred.


    *   Done event represents that the end of stream has reached. No more events will
    be emitted.


    To receive events from a stream, you can use the `listen()` method to set up listeners.
    The return value of `listen()` method is a `StreamSubscription` object representing
    the active subscription. Depending on the number of subscriptions allowed on the
    stream, there are two types of streams:


    *   A single-subscription stream allows only a single listener during the whole
    lifecycle of the stream. It only starts emitting events when a listener is set
    up, and it stops emitting events when the listener unsubscribes.


    *   A broadcast stream allows any number of listeners. Events are emitted when
    they are ready, even though there are no subscribed listener.


    Given a `Stream` object, the property `isBroadcast` can be used to check whether
    it is a broadcast stream. You can use the `asBroadcastStream()` method to create
    a broadcast stream from a single-subscription stream.


    #### Stream Subscription


    Table [9-1](#479501_1_En_9_Chapter.xhtml#Tab1) shows parameters of `listen()`
    method . You can provide any number of handlers for different events and ignore
    those uninterested events.


    Table 9-1


    Parameters of listen() method


    | Name | Type | Description |

    | --- | --- | --- |

    | `onData` | `void (T event)` | Handler of data events. |

    | `onError` | `Function` | Handler of error events. |

    | `onDone` | `void ()` | Handler of done event. |

    | `cancelOnError` | `bool` | Whether to cancel the subscription when the first
    error event is emitted. |


    In Listing [9-8](#479501_1_En_9_Chapter.xhtml#PC8), handlers for three types of
    events are provided.


    ```

    Stream.fromIterable([1, 2, 3]).listen(

    (value) => print(value),

    onError: (error) => print(''error: $error''),

    onDone: () => print(''done''),

    cancelOnError: true,

    );

    Listing 9-8

    Use listen() method

    ```


    With the `StreamSubscription` object returned by `listen()` method, you can manage
    the subscription. Table [9-2](#479501_1_En_9_Chapter.xhtml#Tab2) show methods
    of `StreamSubscription` class.


    Table 9-2


    Methods of StreamSubscription


    | Name | Description |

    | --- | --- |

    | `cancel()` | Cancels this subscription. |

    | `pause([Future resumeSignal])` | Requests the stream to pause events emitting.
    If resumeSignal is provided, the stream will resume when the future completes.
    |

    | `resume()` | Resumes the stream after a pause. |

    | `onData()` | Replaces the data event handler. |

    | `onError()` | Replaces the error event handler. |

    | `onDone()` | Replaces the done event handler. |

    | `asFuture([E futureValue])` | Returns a future that handles the completion of
    stream. |


    The `asFuture()` method is useful when you want to handle the completion of a
    stream. Since a stream can complete normally or with an error, using this method
    overwrites existing `onDone` and `onError` callbacks. In the case of an error
    event, the subscription is cancelled, and the returned `Future` object is completed
    with the error. In the case of a done event, the `Future` object completes with
    the given `futureValue`.'
