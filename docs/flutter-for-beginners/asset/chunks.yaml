    ## 6.2 自定义文本输入键盘


    ### 问题


    你想自定义用于编辑文本的键盘。


    ### 解决方案


    使用 `keyboardType`、`textInputAction` 和 `keyboardAppearance` 参数。


    ### 讨论


    `EditableText` 组件允许自定义用于编辑文本的键盘。你可以使用类型为 `TextInputType` 类的 `keyboardType` 参数来设置适合文本的键盘类型。例如，如果
    `EditableText` 组件用于编辑电话号码，那么 `TextInputType.phone` 是 `keyboardType` 参数的更好选择。表
    6-2 展示了 `TextInputType` 中的常量。`TextInputType.number` 常量用于不带小数点的无符号数。对于其他类型的数字，你可以使用
    `TextInputType.numberWithOptions({bool signed: false, bool decimal: false })`
    构造函数来设置数字是否应带符号或是否应包含小数点。


    表 6-2


    `TextInputType` 常量


    | 名称 | 描述 |

    | --- | --- |

    | `text` | 纯文本。 |

    | `multiline` | 多行文本。 |

    | `number` | 不带小数点的无符号数。 |

    | `phone` | 电话号码。 |

    | `datetime` | 日期和时间。 |

    | `emailAddress` | 电子邮件地址。 |

    | `url` | URL。 |


    类型为 `TextInputAction` 枚举的 `textInputAction` 参数用于设置在用户提交文本时要执行的逻辑操作。例如，如果文本字段用于输入搜索查询，那么
    `TextInputAction.search` 值会使键盘显示文本“Search”。用户可以期望在点击操作按钮后执行搜索操作。`TextInputAction`
    枚举定义了一组操作。这些操作的按钮在不同平台或同一平台的不同版本上可能具有不同的外观。大多数操作在 Android 和 iOS 上均受支持。它们映射到 Android
    上的 IME 输入类型和 iOS 上的键盘返回键类型。表 6-3 展示了 `TextInputAction` 的值及其在 Android 和 iOS 上的映射。某些操作可能仅在
    Android 或 iOS 上受支持。使用不受支持的操作将导致在调试模式下抛出错误。然而，在发布模式下，不受支持的操作将分别在 Android 上映射为 `IME_ACTION_UNSPECIFIED`，在
    iOS 上映射为 `UIReturnKeyDefault`。


    表 6-3


    `TextInputAction` 值


    | 名称 | Android IME 输入类型 | iOS 键盘返回键类型 |

    | --- | --- | --- |

    | `none` | `IME_ACTION_NONE` | 不适用 |

    | `unspecified` | `IME_ACTION_UNSPECIFIED` | `UIReturnKeyDefault` |

    | `done` | `IME_ACTION_DONE` | `UIReturnKeyDone` |

    | `search` | `IME_ACTION_SEARCH` | `UIReturnKeySearch` |

    | `send` | `IME_ACTION_SEND` | `UIReturnKeySend` |

    | `next` | `IME_ACTION_NEXT` | `UIReturnKeyNext` |

    | `previous` | `IME_ACTION_PREVIOUS` | 不适用 |

    | `continueAction` | 不适用 | `UIReturnKeyContinue` |

    | `join` | 不适用 | `UIReturnKeyJoin` |

    | `route` | 不适用 | `UIReturnKeyRoute` |

    | `emergencyCall` | 不适用 | `UIReturnKeyEmergencyCall` |

    | `newline` | `IME_ACTION_NONE` | `UIReturnKeyDefault` |


    最后一个类型为 `Brightness` 的 `keyboardAppearance` 参数用于设置键盘的外观。`Brightness` 枚举有两个值：`dark`
    和 `light`。此参数仅用于 iOS。


    代码清单 6-4 展示了 `textInputAction` 和 `keyboardAppearance` 参数的用法。


    *代码清单 6-4. `keyboardType` 和 `keyboardAppearance` 参数*


    ```

    TextField(

    keyboardType: TextInputType.phone,

    )

    TextField(

    keyboardType: TextInputType.numberWithOptions(

    signed: true,

    decimal: true,

    ),

    )

    TextField(

    textInputAction: TextInputAction.search,

    keyboardAppearance: Brightness.dark,

    )

    ```


    ## 6.3 在 Material Design 中为文本输入添加装饰


    ### 问题


    你想在 Material Design 中为文本字段添加前缀和后缀等装饰。


    ### 解决方案


    使用类型为 `InputDecoration` 的 `decoration` 参数。

    '
- fmt: '### Discussion


    `TextField` widget supports adding different decorations to present various information
    to user. For example, if the value of text input is invalid, you can add a red
    border and some text below the text input to indicate that. You can also add text
    or icons as the prefix or suffix. If the `TextField` widget is for editing currency
    value, you can add a currency symbol as the prefix. The `decoration` parameter
    of type `InputDecoration` of `TextField` is used to add this information. `InputDecoration`
    class has many named parameters, which we will review next.


    ### Borders


    Let’s start from adding borders to text input widgets. `InputDecoration` constructor
    has several parameters of type `InputBorder` that are related to borders, including
    `errorBorder`, `disabledBorder`, `focusedBorder`, `focusedErrorBorder`, and `enabledBorder`.
    The names of these parameters indicate when these borders will be displayed based
    on the state. There is also a `border` parameter, but this parameter is only used
    to provide the shape of the border.


    `InputBorder` class is abstract, so one of its subclasses `UnderlineInputBorder`
    or `OutlineInputBorder` should be used. `UnderlineInputBorder` class only has
    a border at the bottom side. `UnderlineInputBorder` constructor has parameters
    `borderSide` of type `BorderSide` and `borderRadius` of type `BorderRadius`. `BorderSide`
    class defines color, width, and style of one side of a border. A border’s style
    is defined by `BorderStyle` enum which has values `none` and `solid`. A `BorderSide`
    with style `BorderStyle.none` won’t be rendered. `BorderRadius` class defines
    a set of radii for each corner of a rectangle. The radius for a corner is created
    using `Radius` class. The shape of a radius can be circular or elliptical. Circular
    or elliptical radii can be created using constructors `Radius.circular(double
    radius)` and `Radius.elliptical(double x, double y)`, respectively. `BorderRadius`
    has `topLeft`, `topRight`, `bottomLeft`, and `bottomRight` properties of type
    `Radius` to represent radii of these four corners. You can use `BorderRadius.only()`
    to specify different `Radius` instances for each corner or use `BorderRadius.all()`
    to use a single `Radius` instance for all corners.


    `OutlineInputBorder` class draws a rectangle around the widget. `OutlineInputBorder`
    constructor also has parameters `borderSide` and `borderRadius`. It also has the
    `gapPadding` parameter to specify the horizontal padding for the label text displayed
    in a gap of the border.


    In Listing [6-5](#479501_1_En_6_Chapter.xhtml#PC5), both `TextField` widgets declare
    borders that are rendered when they gain focus using `focusedBorder` parameter.


    ```

    TextField(

    decoration: InputDecoration(

    enabledBorder: UnderlineInputBorder(

    borderSide: BorderSide(color: Colors.red),

    borderRadius: BorderRadius.all(Radius.elliptical(5, 10)),

    ),

    ),

    )

    TextField(

    decoration: InputDecoration(

    labelText: ''Username'',

    focusedBorder: OutlineInputBorder(

    borderSide: BorderSide(color: Colors.blue),

    borderRadius: BorderRadius.circular(10),

    gapPadding: 2,

    ),

    ),

    )

    Listing 6-5

    Examples of InputDecoration

    ```


    Figure [6-4](#479501_1_En_6_Chapter.xhtml#Fig4) shows the screenshot of code in
    Listing [6-5](#479501_1_En_6_Chapter.xhtml#PC5). The second `TextField` is focused,
    so the focused border is displayed.


    ![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig4_HTML.jpg](images/479501_1_En_6_Chapter/479501_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Borders


    ### Prefix and Suffix


    Prefix and suffix in a text input can provide information and actions that are
    useful when editing text. Prefix and suffix can both be plain text or widgets.
    When using text, you can customize the style of the text. `InputDecoration` constructor
    has parameters `prefix`, `prefixIcon`, `prefixText`, and `prefixStyle` to customize
    the prefix. It also has parameters `suffix`, `suffixIcon`, `suffixText`, and `suffixStyle`
    to customize the suffix. You cannot specify non-null values to both `prefix` and
    `prefixText`. This restriction also applies to `suffix` and `suffixText`. You
    can only provide a widget or text, but not both at the same time.


    ```

    TextField(

    decoration: InputDecoration(

    prefixIcon: Icon(Icons.monetization_on),

    prefixText: ''Pay '',

    prefixStyle: TextStyle(fontStyle: FontStyle.italic),

    suffixText: ''.00'',

    ),

    )

