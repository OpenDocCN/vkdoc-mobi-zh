    ### 讨论


    Flutter 应用可以同时包含代码和静态资源。共有两种类型的资源：


    - 数据文件，包括 JSON、XML 和纯文本文件

    - 二进制文件，包括图片和视频


    资源在 `pubspec.yaml` 文件的 `flutter/assets` 部分中声明。在构建过程中，这些资源文件会被打包到应用的二进制文件中。这些资源可以在运行时被访问。通常将资源放在
    `assets` 目录下。在代码清单 13-1 中，两个文件在 `pubspec.yaml` 文件中被声明为资源。


    ```

    flutter:

    assets:

    - assets/dog.jpg

    - assets/data.json

    代码清单 13-1

    pubspec.yaml 文件中的资源

    ```


    在运行时，使用 `AssetBundle` 类的子类从资源中加载内容。`load()` 方法检索二进制内容，而 `loadString()` 方法检索字符串内容。使用这两个方法时，你需要提供资源的键。该键与
    `pubspec.yaml` 文件中声明的资源路径相同。静态的应用级 `rootBundle` 属性引用了包含与应用打包在一起的资源的 `AssetBundle`
    对象。你可以直接使用此属性来加载资源。建议使用静态的 `DefaultAssetBundle.of()` 方法从构建上下文中获取 `AssetBundle`
    对象。


    在代码清单 13-2 中，JSON 文件 `assets/data.json` 使用 `loadString()` 方法作为字符串加载。


    ```

    class TextAssets extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return FutureBuilder(

    future: DefaultAssetBundle.of(context)

    .loadString(''assets/data.json'')

    .then((json) {

    return jsonDecode(json)[''name''];

    }),

    builder: (context, snapshot) {

    if (snapshot.connectionState == ConnectionState.done) {

    return Center(child: Text(snapshot.data));

    } else {

    return Center(child: CircularProgressIndicator());

    }

    },

    );

    }

    }

    代码清单 13-2

    加载字符串资源

    ```


    如果资源文件是图片，你可以使用 `AssetImage` 类配合 `Image` 小部件来显示它。在代码清单 13-3 中，`AssetImage` 类用于显示
    `assets/dog.jpg` 图片。


    ```

    Image(

    image: AssetImage(''assets/dog.jpg''),

    )

    代码清单 13-3

    使用 AssetImage

    ```


    对于图片资源，同一个文件通常有多个不同分辨率的变体。当使用 `AssetImage` 类加载图片资源时，将使用与当前设备像素比最匹配的变体。


    在代码清单 13-4 中，`assets/2.0x/dog.jpg` 文件是 `assets/dog.jpg` 的一个变体，其分辨率为 `2.0`。如果设备像素比为
    `1.6`，则会使用 `assets/2.0x/dog.jpg` 文件。


