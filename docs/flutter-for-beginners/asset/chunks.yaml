    使用`TextStyle`来描述样式。


    ### 讨论


    `TextStyle`描述了应用于文本的样式。`TextStyle()`构造函数有许多描述样式的命名参数；参见表 4-6。


    **表 4-6** `TextStyle()`的命名参数


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `color` | `Color` | 文本的颜色。 |

    | `fontSize` | `Double` | 字体大小。 |

