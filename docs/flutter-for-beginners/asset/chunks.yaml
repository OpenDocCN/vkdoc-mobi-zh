    ### 讨论


    在开发非平凡的 Dart 应用时，不可避免地会用到库。这些库可以是 Dart SDK 中的内置库，也可以是社区贡献的库。要使用这些库，我们首先需要使用 `import`
    导入它们。`import` 只有一个参数，用于指定库的 URI。内置库使用 `dart:` 的 URI 方案，例如 `dart:html` 和 `dart:convert`。社区包使用
    `package:` 的 URI 方案，并由 Dart 的 `pub` 工具管理。清单 3-24 展示了导入库的示例。


