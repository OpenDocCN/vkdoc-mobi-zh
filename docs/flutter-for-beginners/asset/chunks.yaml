    ## 7.4 Scaffolding Material Design Pages


    ### Problem


    You want to scaffold Material Design pages.


    ### Solution


    Use Scaffold and other related widgets.


    ### Discussion


    Material Design apps have common layout structures. Scaffold widget puts together
    other common widgets to create the basic page structures. Table [7-6](#479501_1_En_7_Chapter.xhtml#Tab6)
    shows the elements that can be included in a Scaffold widget. Widgets specified
    as drawer and endDrawer are initially hidden and can be revealed by swiping. The
    swiping direction depends on the text direction. The drawer widget uses the same
    direction as the text direction, while the endDrawer widget uses the opposite
    direction. For example, if the text direction is left-to-right, drawer widget
    is opened by swiping from left to right, and endDrawer widget is opened by swiping
    from right to left.


    Table 7-6


    Scaffold elements


    | Parameter | Widget | Description |

    | --- | --- | --- |

    | appBar | AppBar | An app bar to display at the top. |

    | floatingActionButton | FloatingActionButton | A button to float above the body
    in the bottom right corner. |

    | drawer | Drawer | A hidden panel to display to the side of the body. |

    | endDrawer | Drawer | A hidden panel to display to the side of the body. |

    | bottomNavigationBar | BottomAppBarBottomNavigationBar | Navigation bar to display
    at the bottom. |

    | bottomSheet | BottomSheet | Persistent bottom sheet. |

    | persistentFooterButtons | List<Widget> | A set of buttons to display at the
    bottom. |

    | body | Widget | Primary content. |


    The second column in Table [7-6](#479501_1_En_7_Chapter.xhtml#Tab6) only lists
    preferred widget types for these elements. Scaffold constructor actually accepts
    any type of widgets. For example, you can use ListView widget as the drawer. However,
    these preferred widgets are more suitable.'
