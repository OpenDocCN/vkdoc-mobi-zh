    ## 6.2 Customizing Keyboard for Text Input


    ### Problem


    You want to customize the keyboard used to edit the text.


    ### Solution


    Use keyboardType, textInputAction, and keyboardAppearance parameters.


    ### Discussion


    EditableText widget allows customization of the keyboard used for editing the
    text. You can use keyboardType parameter of type TextInputType class to set a
    keyboard type suitable for the text. For example, if the EditableText widget is
    used to edit phone numbers, then TextInputType.phone is a better choice for the
    keyboardType parameter. Table [6-2](#479501_1_En_6_Chapter.xhtml#Tab2) shows constants
    in TextInputType. TextInputType.number constant is used for unsigned numbers without
    a decimal point. For other types of numbers, you can use TextInputType.numberWithOptions({bool
    signed: false, bool decimal: false }) constructor to set whether the numbers should
    be signed or a decimal point should be included.


    Table 6-2


    TextInputType constants


    | Name | Description |

    | --- | --- |

    | `text` | Plain text. |

    | `multiline` | Multi-line text. |

    | `number` | Unsigned number without a decimal point. |

    | `phone` | Phone numbers. |

    | `datetime` | Date and time. |

    | `emailAddress` | Email addresses. |

    | `url` | URLs. |


    The textInputAction parameter of type TextInputAction enum sets the logic action
    to perform when user is submitting the text. For example, if the text field is
    for use to input search queries, then the TextInputAction.search value makes the
    keyboard to display the text “Search”. The user can expect a search action to
    perform after tapping the action button. TextInputAction enum defined a set of
    actions. The buttons for these actions may have different appearances on different
    platforms or different versions of the same platform. Most of these actions are
    supported by both Android and iOS. They are mapped to IME input types on Android
    and keyboard return types on iOS. Table [6-3](#479501_1_En_6_Chapter.xhtml#Tab3)
    shows values of TextInputAction and their mappings on Android and iOS. Some actions
    may only be supported on Android or iOS. Using an unsupported action will cause
    an error to be thrown in the debug mode. However, in the release mode, an unsupported
    action will be mapped to IME_ACTION_UNSPECIFIED on Android and UIReturnKeyDefault
    on iOS, respectively.


    Table 6-3


    TextInputAction values


    | Name | Android IME input type | iOS keyboard return type |

    | --- | --- | --- |

    | `none` | IME_ACTION_NONE | N/A |

    | `unspecified` | IME_ACTION_UNSPECIFIED | UIReturnKeyDefault |

    | `done` | IME_ACTION_DONE | UIReturnKeyDone |

    | `search` | IME_ACTION_SEARCH | UIReturnKeySearch |

    | `send` | IME_ACTION_SEND | UIReturnKeySend |

    | `next` | IME_ACTION_NEXT | UIReturnKeyNext |

    | `previous` | IME_ACTION_PREVIOUS | N/A |

    | `continueAction` | N/A | UIReturnKeyContinue |

    | `join` | N/A | UIReturnKeyJoin |

    | `route` | N/A | UIReturnKeyRoute |

    | `emergencyCall` | N/A | UIReturnKeyEmergencyCall |

    | `newline` | IME_ACTION_NONE | UIReturnKeyDefault |


    The last keyboardAppearance parameter of type Brightness sets the appearance of
    the keyboard. Brightness enum has two values, dark and light. The parameter is
    only used for iOS.


    Listing [6-4](#479501_1_En_6_Chapter.xhtml#Par23) shows the usage of textInputAction
    and last keyboardAppearance parameters.


    *Listing 6-4. keyboardType and keyboardAppearance parameters*


    ```

    TextField(

    keyboardType: TextInputType.phone,

    )

    TextField(

    keyboardType: TextInputType.numberWithOptions(

    signed: true,

    decimal: true,

    ),

    )

    TextField(

    textInputAction: TextInputAction.search,

    keyboardAppearance: Brightness.dark,

    )

    ```


