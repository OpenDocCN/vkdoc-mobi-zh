- fmt: '### Discussion


    If you want to access the cameras on the device, you can use `camera` plugin ([`https://pub.dev/packages/camera`](https://pub.dev/packages/camera)).
    To install this plugin, you need to add `camera: ^0.5.0` to the dependencies of
    `pubspec.yaml` file. For iOS, you need to add code in Listing [12-13](#479501_1_En_12_Chapter.xhtml#PC14)
    to the `ios/Runner/Info.plist` file. These two key-value pairs describe the purpose
    of accessing camera and microphone. This is required to protect user privacy.


    ```

    NSCameraUsageDescription

    APPNAME requires access to your phone''s camera.

    NSMicrophoneUsageDescription

    APPNAME requires access to your phone''s microphone.

    Listing 12-13

    Privacy requirements for iOS

    ```


    For Android, the minimum Android SDK version needs to set to 21 in the `android/app/build.gradle`
    file.


    To access cameras, you need to create `CameraController` objects. `CameraController`
    constructor requires parameters of types `CameraDescription` and `ResolutionPreset`.
    `CameraDescription` class describes a camera. `ResolutionPreset` enum describes
    the quality of screen resolution. `ResolutionPreset` is an enum with values `low`,
    `medium`, and `high`. To get `CameraDescription` objects, you can use `availableCameras()`
    function to get a list of available cameras with type `List<CameraDescription>`.


    Table [12-7](#479501_1_En_12_Chapter.xhtml#Tab7) shows methods of `CameraController`
    class. All these methods return `Future` objects. A `CameraController` object
    needs to be initialized first. Other methods should only be called after the `Future`
    object returned by `initialize()` completes successfully. `CameraController` class
    extends from `ValueNotifier<CameraValue>` class, so you can add listeners to it
    to get notified of state changes.


    **Table 12-7** Methods of `CameraController`


    | Name | Description |

    | --- | --- |

    | `takePicture(String path)` | Take a picture and save to a file. |

    | `prepareForVideoRecording()` | Prepare for video recording. |

    | `startVideoRecording(String filePath)` | Start a video recording and save to
    a file. |

    | `stopVideoRecording()` | Stop the current video recording. |

    | `startImageStream()` | Start streaming of images. |

    | `stopImageStream()` | Stop the current streaming of images. |

    | `initialize()` | Initialize the controller. |

    | `dispose()` | Dispose the controller and clean up resources. |


    In Listing [12-14](#479501_1_En_12_Chapter.xhtml#PC15), the `CameraController`
    object is created with a passed-in `CameraDescription` object. `FutureBuilder`
    widget builds the actual UI after the `CameraController` object is initialized.
    `CameraPreview` widget shows live preview of the camera. When the icon is pressed,
    a picture is taken and saved to the temporary directory.


    ```

    class CameraView extends StatefulWidget {

    CameraView({Key key, this.camera}) : super(key: key);

    final CameraDescription camera;

    @override

    _CameraViewState createState() => _CameraViewState();

    }

    class _CameraViewState extends State {

    CameraController _controller;

    Future _initializedFuture;

    @override

    void initState() {

    super.initState();

    _controller = CameraController(widget.camera, ResolutionPreset.high);

    _initializedFuture = _controller.initialize();

    }

    @override

    Widget build(BuildContext context) {

    return FutureBuilder(

    future: _initializedFuture,

    builder: (context, snapshot) {

    if (snapshot.connectionState == ConnectionState.done) {

    return Column(

    children: [

    Expanded(child: CameraPreview(_controller)),

    IconButton(

    icon: Icon(Icons.photo_camera),

    onPressed: () async {

    String path = join((await getTemporaryDirectory()).path,

    ''${DateTime.now()}.png'');

    await _controller.takePicture(path);

    Scaffold.of(context).showSnackBar(

    SnackBar(content: Text(''Picture saved to $path'')));

    },

    ),

    ],

    );

    } else {

    return Center(child: CircularProgressIndicator());

    }

    },

    );

    }

    @override

    void dispose() {

    _controller.dispose();

    super.dispose();

    }

    }

    Listing 12-14

    Use camera

    ```


    In Listing [12-15](#479501_1_En_12_Chapter.xhtml#PC16), `availableCameras()` function
    gets a list of `CameraDescription` objects and only the first one is used to create
    the `CameraView` widget.


    ```

    class CameraSelector extends StatelessWidget {

    final Future _cameraFuture =

    availableCameras().then((list) => list.first);

    @override

    Widget build(BuildContext context) {

    return FutureBuilder(

    future: _cameraFuture,

    builder: (context, snapshot) {

    if (snapshot.connectionState == ConnectionState.done) {

    if (snapshot.hasData) {

    return CameraView(camera: snapshot.data);

    } else {

    return Center(child: Text(''No camera available!''));

    }

    } else {

    return Center(child: CircularProgressIndicator());

    }

    },

    );

    }

    }

    Listing 12-15

    Select camera

    ```


    ## 12.8 Using System Share Sheet


    ### Problem


    You want to allow user sharing items using system share sheet.


    ### Solution


    Use `share` plugin.


    ### Discussion


    If you want to allow user sharing items in the app, you can use the `share` plugin
    ([`https://pub.dev/packages/share`](https://pub.dev/packages/share)) to show the
    system share sheet. To use this plugin, you need to add `share: ^0.6.1` to the
    dependencies of `pubspec.yaml` file.


    The API provided by `share` plugin is very simple. It only has a static `share()`
    method to share some text. You can share plain text or a URL. Listing [12-16](#479501_1_En_12_Chapter.xhtml#PC17)
    shows how to use `share()` method to share a URL.


    ```

    Share.share(''https://flutter.dev'');

    Listing 12-16

    Share a URL

    ```


    ## 12.9 Summary


    Flutter apps can use platform-specific code to call native platform APIs. There
    are a large number of community plugins to use different features on the native
    platform, including cameras, microphones, sensors, and more. In the next chapter,
    we’ll discuss miscellaneous topics in Flutter.


    # 13. Miscellaneous


    This chapter covers recipes of miscellaneous topics in Flutter.


    ## 13.1 Using Assets


    ### Problem


    You want to bundle static assets in the app.


    ### Solution


    Use assets.'
