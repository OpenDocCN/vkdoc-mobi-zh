- fmt: "### Discussion\n\nWhen using stateful widgets to manage state, the state is\
    \ stored in `State` objects. If a descendant widget needs to access the state,\
    \ the state needs to be passed down to it from the root of subtree, just like\
    \ how `count` state is passed in Listing [10-2](#479501_1_En_10_Chapter.xhtml#PC2).\
    \ When the widget has a relatively deep subtree structure, it’s inconvenient to\
    \ add constructor parameters for passing the state down. In this case, using `InheritedWidget`\
    \ is a better choice.\n\nWhen `InheritedWidget` is used, the method `BuildContext.inheritFromWidgetOfExactType()`\
    \ can get the nearest instance of a particular type of inherited widget from the\
    \ build context. Descendant widgets can easily access state data stored in an\
    \ inherited widget. When `inheritFromWidgetOfExactType()` method is called, the\
    \ build context registers itself to the inherited widget. When the inherited widget\
    \ changes, the build context is rebuilt automatically to get the new values from\
    \ the inherited widget. This means no manual updates are required for descendant\
    \ widgets that use state from the inherited widget.\n\nThe `Config` class in Listing\
    \ [10-3](#479501_1_En_10_Chapter.xhtml#PC3) represents the state. It has `color`\
    \ and `fontSize` properties. `Config` class overrides `==` operator and `hashCode`\
    \ property to implement correct equality check. The `copyWith()` method can be\
    \ used to create new instances of `Config` class by updating a partial set of\
    \ properties. The `Config.fallback()` constructor creates a `Config` object with\
    \ default values.\n\n```\nclass Config {\n  const Config({this.color, this.fontSize});\n\
    \  const Config.fallback()\n      : color = Colors.red,\n        fontSize = 12.0;\n\
    \  final Color color;\n  final double fontSize;\n  Config copyWith({Color color,\
    \ double fontSize}) {\n    return Config(\n      color: color ?? this.color,\n\
    \      fontSize: fontSize ?? this.fontSize,\n    );\n  }\n  @override\n  bool\
    \ operator ==(other) {\n    if (other.runtimeType != runtimeType) return false;\n\
    \    final Config typedOther = other;\n    return color == typedOther.color &&\
    \ fontSize == typedOther.fontSize;\n  }\n  @override\n  int get hashCode => hashValues(color,\
    \ fontSize);\n}\n```\n\nThe `ConfigWidget` in Listing [10-4](#479501_1_En_10_Chapter.xhtml#PC4)\
    \ is an inherited widget. It keeps a `Config` object as its internal state. The\
    \ `updateShouldNotify()` method is called to check whether registered build contexts\
    \ should be notified after the inherited widget changes. This is a performance\
    \ optimization to avoid unnecessary updates. The static `of()` method is a common\
    \ practice to get the inherited widget or the state associated with the inherited\
    \ widget. The `of()` method of `ConfigWidget` uses `inheritFromWidgetOfExactType()`\
    \ to get the nearest enclosing `ConfigWidget` instance from build context and\
    \ gets `config` property from the widget. If no `ConfigWidget` object is found,\
    \ the default `Config` instance is returned.\n\n```\nclass ConfigWidget extends\
    \ InheritedWidget {\n  const ConfigWidget({\n    Key key,\n    @required this.config,\n\
    \    @required Widget child,\n  }) : super(key: key, child: child);\n  final Config\
    \ config;\n  static Config of(BuildContext context) {\n    final ConfigWidget\
    \ configWidget =\n        context.inheritFromWidgetOfExactType(ConfigWidget);\n\
    \    return configWidget?.config ?? const Config.fallback();\n  }\n  @override\n\
    \  bool updateShouldNotify(ConfigWidget oldWidget) {\n    return config != oldWidget.config;\n\
    \  }\n}\n```\n\nIn Listing [10-5](#479501_1_En_10_Chapter.xhtml#PC5), both `ConfiguredText`\
    \ and `ConfiguredBox` widgets use `ConfigWidget.of(context)` to get the `Config`\
    \ object and use its properties when building the UI.\n\n```\nclass ConfiguredText\
    \ extends StatelessWidget {\n  @override\n  Widget build(BuildContext context)\
    \ {\n    Config config = ConfigWidget.of(context);\n    return Text(\n      'Font\
    \ size: ${config.fontSize}',\n      style: TextStyle(\n        color: config.color,\n\
    \        fontSize: config.fontSize,\n      ),\n    );\n  }\n}\nclass ConfiguredBox\
    \ extends StatelessWidget {\n  @override\n  Widget build(BuildContext context)\
    \ {\n    Config config = ConfigWidget.of(context);\n    return Container(\n  \
    \    decoration: BoxDecoration(color: config.color),\n      child: Text('Background\
    \ color: ${config.color}'),\n    );\n  }\n}\n```\n\n`ConfigUpdater` widget in\
    \ Listing [10-6](#479501_1_En_10_Chapter.xhtml#PC6) is used to update the `Config`\
    \ object. It also uses `ConfigWidget.of(context)` to get the `Config` object to\
    \ update. The `onColorChanged` and `onFontSizeIncreased` callbacks are used to\
    \ trigger update of `Config` object.\n\n```\ntypedef SetColorCallback = void Function(Color\
    \ color);\nclass ConfigUpdater extends StatelessWidget {\n  const ConfigUpdater({this.onColorChanged,\
    \ this.onFontSizeIncreased});\n  static const List _colors = [Colors.red, Colors.green,\
    \ Colors.blue];\n  final SetColorCallback onColorChanged;\n  final VoidCallback\
    \ onFontSizeIncreased;\n  @override\n  Widget build(BuildContext context) {\n\
    \    Config config = ConfigWidget.of(context);\n    return Column(\n      children:\
    \ [\n        DropdownButton(\n          value: config.color,\n          items:\
    \ _colors.map((Color color) {\n            return DropdownMenuItem(\n        \
    \      value: color,\n              child: Text(color.toString()),\n         \
    \   );\n          }).toList(),\n          onChanged: onColorChanged,\n       \
    \ ),\n        RaisedButton(\n          child: Text('Increase font size'),\n  \
    \        onPressed: onFontSizeIncreased,\n        )\n      ],\n    );\n  }\n}\n\
    ```\n\nNow we can put these widgets together to build the whole UI. In Listing\
    \ [10-7](#479501_1_En_10_Chapter.xhtml#PC7), `ConfiguredPage` is a stateful widget\
    \ with a `Config` object as its state. `ConfigUpdater` widget is a child of `ConfiguredPage`\
    \ to update the `Config` object. `ConfiguredPage` constructor also has `child`\
    \ parameter to provide child widget that uses `ConfigWidget.of(context)` to get\
    \ the correct `Config` object. For the `onColorChanged` and `onFontSizeIncreased`\
    \ callbacks of `ConfigWidget`, `setState()` method is used to update the state\
    \ of `ConfiguredPage` widget and triggers update of `ConfigWidget`. The framework\
    \ notifies `ConfigUpdater` and other widgets to update with latest value of `Config`\
    \ object.\n\n```\nclass ConfiguredPage extends StatefulWidget {\n  ConfiguredPage({Key\
    \ key, this.child}) : super(key: key);\n  final Widget child;\n  @override\n \
    \ _ConfiguredPageState createState() => _ConfiguredPageState();\n}\nclass _ConfiguredPageState\
    \ extends State {\n  Config _config = Config(color: Colors.green, fontSize: 16);\n\
    \  @override\n  Widget build(BuildContext context) {\n    return ConfigWidget(\n\
    \      config: _config,\n      child: Column(\n        children: [\n         \
