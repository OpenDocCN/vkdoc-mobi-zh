    ### 讨论


    Mobx（[`https://mobx.js.org`](https://mobx.js.org)）是一个将响应式数据与 UI 连接起来的状态管理库。MobX
    源于使用 JavaScript 开发 Web 应用，同时也被移植到了 Dart 平台（[`https://mobx.pub`](https://mobx.pub)
    ）。在 Flutter 应用中，我们可以使用 `mobx` 和 `flutter_mobx` 这两个包来构建基于 Mobx 的应用。Flutter 的 Mobx
    使用 `build_runner` 包来为 store 生成代码。`build_runner` 和 `mobx_codegen` 这两个包需要作为 `dev_dependencies`
    添加到 `pubspec.yaml` 文件中。


    Mobx 使用可观察对象（observables）来管理状态。应用的整体状态由核心状态和派生状态两部分组成。派生状态是从核心状态计算得出的。动作（Actions）通过改变可观察对象来更新状态。反应（Reactions）是状态的观察者，当它们追踪的任何可观察对象发生变化时，便会收到通知。在
    Flutter 应用中，反应被用来更新 widget。


    与 Flutter 的 Redux 相比，Mobx 使用代码生成来简化 store 的使用。你无需编写样板代码来创建动作。Mobx 提供了多种注解，你只需使用这些注解来标记代码即可。这与
    `json_annotation` 和 `json_serialize` 包的工作方式类似。我们将使用同样的示例（展示 GitHub 上的职位列表）来演示
    Mobx 的用法。如果你的 `pubspec.yaml` 文件中还没有这个包，请将其添加进去。


    代码清单 10-27 展示了用于 Mobx store 的 `jobs_store.dart` 文件的基本代码。该文件使用了生成的 part 文件 `jobs_store.g.dart`。`_JobsStore`
    是职位 store 的抽象类，它实现了 Mobx 中的 `Store` 类。这里我们使用 `@observable` 注解定义了两个可观察对象。第一个可观察对象
    `keyword` 是一个简单的字符串，用于管理当前的搜索关键字。`getJobsFuture` 可观察对象是一个 `ObservableFuture<List<Job>>`
    类型的对象，用于管理通过 API 获取职位的异步操作。那些使用 `@computed` 注解标记的属性是派生可观察对象，用于检查数据加载的状态。我们还使用
    `@action` 注解定义了两个动作。`setKeyword()` 动作将 `getJobsFuture` 可观察对象设置为空状态，并将 `keyword`
    可观察对象设置为提供的值。`getJobs()` 动作使用 `GitHubJobsClient.getJobs()` 方法来加载数据。`getJobsFuture`
    可观察对象会被更新为一个包装了返回的 future 的 `ObservableFuture` 对象。


    ```

    import ''package:meta/meta.dart'';

    import ''package:mobx/mobx.dart'';

    part ''jobs_store.g.dart'';

    class JobsStore = _JobsStore with _$JobsStore;

    abstract class _JobsStore implements Store {

    _JobsStore({@required this.jobsClient}) : assert(jobsClient != null);

    final GitHubJobsClient jobsClient;

    @observable

    String keyword = "";

    @observable

    ObservableFuture<List<Job>> getJobsFuture = emptyResponse;

    @computed

    bool get empty => getJobsFuture == emptyResponse;

    @computed

    bool get hasResults =>

    getJobsFuture != emptyResponse &&

    getJobsFuture.status == FutureStatus.fulfilled;

    @computed

    bool get loading =>

    getJobsFuture != emptyResponse &&

    getJobsFuture.status == FutureStatus.pending;

    @computed

    bool get hasError =>

    getJobsFuture != emptyResponse &&

    getJobsFuture.status == FutureStatus.rejected;

    static ObservableFuture<List<Job>> emptyResponse = ObservableFuture.value([]);

    List<Job> jobs = [];

    @action

    Future<List<Job>> getJobs() async {

    jobs = [];

    final future = jobsClient.getJobs(keyword);

    getJobsFuture = ObservableFuture(future);

    return jobs = await future;

    }

    @action

    void setKeyword(String keyword) {

    getJobsFuture = emptyResponse;

    this.keyword = keyword;

    }

    }

