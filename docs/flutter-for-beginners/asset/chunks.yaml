    Animations in the `animation` library are either linear or curved. The `physics`
    library provides physics simulations, including springs, friction, and gravity.
    `Simulation` class is the base class for all simulations. A simulation is also
    changing over time. For a point of time, the method `x()` returns the position,
    the method `dx()` returns the velocity, and `isDone()` method returns whether
    the simulation is done. Given a `Simulation` object, you can use `animateWith()`
    method of `AnimationController` class to drive the animation using this simulation.


    `SpringSimulation` class represents the simulation for a particle attached to
    a spring. To create a `SpringSimulation` object, yon can provide the parameters
    listed in Table [11-5](#479501_1_En_11_Chapter.xhtml#Tab5).


    Table 11-5


    Parameters of SpringSimulation


    | Name | Type | Description |

    | --- | --- | --- |

    | `spring` | `SpringDescription` | The description of a spring. |

    | `start` | `double` | The start distance. |

    | `end` | `double` | The end distance. |

    | `velocity` | `double` | The initial velocity. |

    | `tolerance` | `Tolerance` | Magnitudes of differences for distances, durations,
    and velocity to be considered equal. |


    To create `SpringDescription` objects, you can use the `SpringDescription()` constructor
    with parameters to specify mass, stiffness, and damping coefficient. The `SpringDescription.withDampingRatio()`
    constructor uses a damping ratio instead of damping coefficient. Listing [11-15](#479501_1_En_11_Chapter.xhtml#PC15)
    shows an example of creating `SpringSimulation` object.


    ```

    SpringSimulation _springSimulation = SpringSimulation(

    SpringDescription.withDampingRatio(

    mass: 1.0,

    stiffness: 50,

    ratio: 1.0,

    ),

    0.0,

    1.0,

    1.0)

    ..tolerance = Tolerance(distance: 0.01, velocity: double.infinity);

    Listing 11-15

    Spring simulation

    ```


    An easier way to use spring simulation is using the `fling()` method of `AnimationController`
    class. This method drives the animation with a critically damped spring.


    `GravitySimulation` class represents a simulation for a particle that follows
    Newton’s second law of motion. Table [11-6](#479501_1_En_11_Chapter.xhtml#Tab6)
    shows parameters of `GravitySimulation` constructor.


    Table 11-6


    Parameters of GravitySimulation


    | Name | Type | Description |

    | --- | --- | --- |

    | `acceleration` | `double` | Acceleration of the particle. |

    | `distance` | `double` | Initial distance. |

    | `endDistance` | `double` | End distance for the simulation to be done. |

    | `velocity` | `double` | Initial velocity. |


    In Listing [11-16](#479501_1_En_11_Chapter.xhtml#PC16), `SimulationController`
    widget uses a Simulation object to drive the animation.


