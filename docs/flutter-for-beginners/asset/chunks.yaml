    使用 onGenerateRoute

    ```


    ## 8.4 实现动态路由匹配


    ### 问题


    您想使用复杂的逻辑来匹配路由名称。


    ### 解决方案


    使用 `onGenerateRoute` 参数。


    ### 讨论


    当使用 `WidgetsApp` 的 `routes` 参数注册命名路由时，只能使用完整的路由名称来匹配 `Route` 对象。如果您想使用复杂的逻辑来将
    `Route` 对象与路由名称匹配，可以使用 `onGenerateRoute` 参数和 `RouteSettings` 对象。例如，您可以将所有以 `/order`
    开头的路由名称匹配到同一个 `Route` 对象。


    在代码清单 8-8 中，所有以 `/order` 开头的路由名称都将导航到一个使用 `OrderPage` 的路由。


    ```

    MaterialApp(

    onGenerateRoute: (RouteSettings settings) {

    if (settings.name.startsWith(''/order'')) {

    return MaterialPageRoute(

    settings: settings,

    builder: (context) {

    return OrderPage();

    },

    );

    }

    },

    );

    代码清单 8-8

    路由匹配

    ```


    ## 8.5 处理未知路由


    ### 问题


    您想处理导航到未知路由的情况。


    ### 解决方案


    使用 `Navigator`、`WidgetsApp`、`MaterialApp` 和 `CupertinoApp` 的 `onUnknownRoute`
    参数。


    ### 讨论


    导航器有可能被要求导航到一个未知路由。这可能是由应用程序中的编程错误或外部路由导航请求引起的。如果 `onGenerateRoute` 函数为给定的 `RouteSettings`
    对象返回 `null`，则会调用 `onUnknownRoute` 函数来提供一个后备路由。这个 `onUnknownRoute` 函数通常用于错误处理，就像
    Web 应用中的 404 页面一样。`onUnknownRoute` 的类型也是 `RouteFactory`。


    在代码清单 8-9 中，`onUnknownRoute` 函数返回一个显示 `NotFoundPage` widget 的路由。


    ```

    MaterialApp(

    onUnknownRoute: (RouteSettings settings) {

    return MaterialPageRoute(

    settings: settings,

    builder: (BuildContext context) {

    return NotFoundPage(settings.name);

    },

    );

    },

    );

    代码清单 8-9

    使用 onUnknownRoute

    ```


