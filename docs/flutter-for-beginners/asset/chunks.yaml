    Slider and CupertinoSlider


    ## 6.12 Using Chips


    ### Problem


    You want to have compact alternatives to represent different types of entities.


    ### Solution


    Use different types of Chips.


    ### Discussion


    When space is limited, traditional widget like buttons, radio buttons, and checkboxes
    may not be suitable. Chips in Material Design can be used in this case to represent
    the same semantic but use less space.


    Chip widget is the generic chip implementation that has a required label and an
    optional avatar. It can also include a delete button when setting a non-null onDeleted
    callback.


    InputChip widget is more powerful than Chip widget. An InputChip widget can be
    selectable by setting the onSelected callback and pressable by setting the onPressed
    callback. However, you cannot set non-null values to both onSelected and onPressed
    callbacks. When using onSelected, an InputChip widget behaves like a checkbox.
    You can use the selected parameter to set the state. When using onPressed, an
    InputChip widget behaves like a button.


    A ChoiceChip widget behaves like a radio button with selected parameter to set
    its state and onSelected callback to notify state changes. However, ChoiceChip
    widget doesn’t have a parameter similar with groupValue in Radio widget, so you
    have to set the selected state manually.


    A FilterChip widget behaves like a checkbox. FilterChip constructor has the same
    parameters as ChoiceChip constructor.


    An ActionChip widget behaves like a button with the onPressed parameter. The difference
    between action chips and buttons is that action chips cannot be disabled by setting
    onPressed parameter to null. Action chips should be removed if their actions are
    not applicable. This behavior is consistent with the goal to using chips for reducing
    space.


    In fact, all these chip widgets wrap RawChip widgets by using only a subset of
    parameters supported by RawChip constructor.


    In Listing [6-17](#479501_1_En_6_Chapter.xhtml#PC17), ChoiceChip widget is used
    to implement single selection.


    ```

    class FruitChooser extends StatefulWidget {

    @override

    _FruitChooserState createState() => _FruitChooserState();

    }

    class _FruitChooserState extends State {

    Fruit _selectedFruit;

    @override

    Widget build(BuildContext context) {

    return Column(

    crossAxisAlignment: CrossAxisAlignment.start,

    children: [

    Wrap(

    spacing: 5,

    children: Fruit.allFruits.map((fruit) {

    return ChoiceChip(

    label: Text(fruit.name),

    selected: _selectedFruit == fruit,

    onSelected: (selected) {

    setState(() {

    _selectedFruit = selected ? fruit : null;

    });

    },

    selectedColor: Colors.red.shade200,

    );

    }).toList(),

    ),

    Text(_selectedFruit != null ? _selectedFruit.name : ")

    ],

    );

    }

    }

    Listing 6-17

    Example of ChoiceChip

    ```


    In Listing [6-18](#479501_1_En_6_Chapter.xhtml#PC18), FilterChip widget is used
