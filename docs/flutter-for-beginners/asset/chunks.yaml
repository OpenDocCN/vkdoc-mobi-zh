    @override\nvoid initState() {\nsuper.initState();\ncontroller = AnimationController(\n\
    vsync: this,\n)..animateWith(widget.simulation);\n}\n@override\nWidget build(BuildContext\
    \ context) {\nreturn widget.builder(context, controller.view);\n}\n@override\n\
    void dispose() {\ncontroller.dispose();\nsuper.dispose();\n}\n}\n```\n\n**清单 11-16**\
    \  \n在动画中使用模拟\n\n## 11.11 总结\n\n本章涵盖与 Flutter 动画相关的实践方法。`AnimationController`\
    \ 类用于控制动画。`Tween` 类的子类为不同类型的数据创建线性动画。`AnimatedWidget` 和 `AnimatedBuilder` 是使用动画的有用组件。在下一章中，我们将讨论\
    \ Flutter 中与原生平台的集成。\n\n# 12. 平台集成\n\n在移动应用中，集成原生平台是很常见的。你可以编写平台特定代码来使用原生平台 API。有大量的插件可以执行不同的任务。\n\
    \n## 12.1 读写文件\n\n### 问题\n\n你想要读写文件。\n\n### 解决方案\n\n使用 `File` API。\n\n### 讨论\n\
    \n在移动应用中，你可能需要将文件保存到设备上。`dart:io` 库提供了用于读写文件的文件 API。`File` 类拥有读取内容、写入内容和查询文件元数据的方法。文件系统的操作可以是同步的，也可以是异步的。大多数此类操作在\
    \ `File` 类中都有成对的方法。异步方法返回一个 `Future` 对象，而同步方法则使用 `Sync` 作为名称后缀，并返回实际值。例如，`readAsString()`\
    \ 和 `readAsStringSync()` 方法是一对返回字符串的读取操作。表 12-1 显示了 `File` 类的异步方法。\n\n**表 12-1**\
    \  \n`File` 的异步方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `copy(String newPath)` | 将此文件复制到新路径。\
    \ |\n| `create({bool recursive: false})` | 创建此文件。如果 `recursive` 为 true，则会创建所有目录。\
    \ |\n| `open()` | 使用 `RandomAccessFile` 对象打开文件以供随机访问。 |\n| `readAsBytes()` | 将整个文件内容读取为字节列表。\
    \ |\n| `readAsString({Encoding encoding: utf8})` | 使用指定编码将整个文件内容读取为字符串。 |\n| `readAsLines(({Encoding\
    \ encoding: utf8})` | 使用指定编码将整个文件内容读取为多行文本。 |\n| `writeAsBytes(List<int> bytes)`\
    \ | 将字节列表写入文件。 |\n| `writeAsString(String contents)` | 将字符串写入文件。 |\n| `rename(String\
    \ newPath)` | 将此文件重命名到新路径。 |\n| `delete({bool recursive: false})` | 删除此文件。 |\n\
    | `exists()` | 检查此文件是否存在。 |\n| `stat()` | 返回一个描述该文件的 `FileStat` 对象。 |\n| `lastAccessed()`\
    \ | 获取此文件的最后访问时间。 |\n| `lastModified()` | 获取此文件的最后修改时间。 |\n| `length()` | 获取此文件的长度。\
    \ |\n\n`Directory` 类表示文件系统中的目录。给定一个 `Directory` 对象，可以使用 `list()` 或 `listSync()`\
    \ 方法来列出文件和子目录。\n\n要创建 `File` 对象，可以使用默认构造函数并传入路径。对于 Flutter 应用，该路径可能特定于平台。移动应用存储文件有两个常见位置：\n\
    \n-   临时目录：用于存储可能随时被清除的临时文件\n-   文档目录：用于存储应用私有的文件，仅在应用被删除时才会被清除\n\n要获取这两个位置的平台特定路径，可以使用\
    \ `path_provider` 包（https://pub.dev/packages/path_provider）。该包提供了 `getTemporaryDirectory()`\
    \ 函数来获取临时目录的路径，以及 `getApplicationDocumentsDirectory()` 函数来获取应用文档目录。\n\n在清单 12-1\
    \ 中，`readConfig()` 方法从应用文档目录读取 `config.txt` 文件，而 `writeConfig()` 方法将字符串写入同一个文件。\n\
    \n```\nclass ConfigFile {\nFuture get _configFile async {\nDirectory directory\
    \ = await getApplicationDocumentsDirectory();\nreturn File('${directory.path}/config.txt');\n\
    }\nFuture readConfig() async {\nreturn _configFile\n.then((file) => file.readAsString())\n\
    .catchError((error) => 'default config');\n}\nFuture writeConfig(String config)\
    \ async {\nFile file = await _configFile;\nreturn file.writeAsString(config);\n\
    }\n}\n```\n\n**清单 12-1**  \n读写文件\n\n## 12.2 存储键值对\n\n### 问题\n\n你想要存储类型安全的键值对。\n\
    \n### 解决方案\n\n使用 `shared_preferences` 插件。\n"
- fmt: "### Discussion\n\n你可以使用文件 API 在设备上存储任何数据。使用通用文件 API 意味着你需要自己处理数据的序列化和反序列化。如果你需要存储的数据是简单的键值对，使用`shared_preferences`插件（[`https://pub.dev/packages/shared_preferences`](https://pub.dev/packages/shared_preferences)）是更好的选择。该插件提供了基于\
    \ Map 的 API 来管理类型安全的键值对。键的类型始终是`String`，只有几种类型可以作为值使用，包括`String`、`bool`、`double`、`int`和`List<String>`。\n\
    \n要管理键值对，你需要使用静态方法`SharedPreferences.getInstance()`来获取`SharedPreferences`对象。表\
    \ [12-2](#479501_1_En_12_Chapter.xhtml#Tab2) 展示了`SharedPreferences`类的方法。对于每种支持的数据类型，都有一对用于获取和设置值的方法。例如，`getBool()`和`setBool()`方法用于获取和设置`bool`值。\n\
    \n表 12-2  \n`SharedPreference`的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `get(String\
    \ key)` | 读取指定键的值。 |\n| `containsKey(String key)` | 检查指定键是否存在。 |\n| `getKeys()`\
    \ | 获取所有键的集合。 |\n| `remove(String key)` | 移除指定键所对应的键值对。 |\n| `clear()` | 移除所有键值对。\
    \ |\n| `setString(String key, String value)` | 写入一个`String`值。 |\n| `getString()`\
    \ | 读取一个`String`值。 |\n\n在代码清单 [12-2](#479501_1_En_12_Chapter.xhtml#PC2) 中，`SharedPreferences`类用于读写一个键值对。\n\
    \n```dart\nclass AppConfig {\n  Future _getPrefs() async {\n    return await SharedPreferences.getInstance();\n\
    \  }\n\n  Future getName() async {\n    SharedPreferences prefs = await _getPrefs();\n\
    \    return prefs.getString('name') ?? \"\";\n  }\n\n  Future setName(String name)\
    \ async {\n    SharedPreferences prefs = await _getPrefs();\n    return prefs.setString('name',\
    \ name);\n  }\n}\n```\n代码清单 12-2  \n使用`SharedPreferences`\n\n## 12.3 编写平台特定代码\n\
    \n### 问题\n\n你想编写平台特定代码。\n\n### 解决方案\n\n使用平台通道在 Flutter 应用与底层宿主平台之间传递消息。"
  raw: '### Discussion


    You can use files API to store any data on the device. Using generic files API
    means that you need to deal with data serialization and deserialization yourself.
    If the data you need to store is simple key-value pairs, using `shared_preferences`
    plugin ( [`https://pub.dev/packages/shared_preferences`](https://pub.dev/packages/shared_preferences)
    ) is a better choice. This plugin provides a map-based API to manage type-safe
    key-value pairs. The type of keys is always `String`. Only several types can be
    used as values, including `String`, `bool`, `double`, `int`, and `List<String>`.


    To manage key-value pairs, you need to use the static `SharedPreferences.getInstance()`
    method to get the `SharedPreferences` object. Table [12-2](#479501_1_En_12_Chapter.xhtml#Tab2)
    shows methods of `SharedPreferences` class. For each supported data type, there
    is a pair of methods to get and set the value. For example, `getBool()` and `setBool()`
    methods are used to get and set `bool` values.


    Table 12-2


    Methods of SharedPreference


    | Name | Description |

    | --- | --- |

    | `get(String key)` | Read the value for the specified key. |

    | `containsKey(String key)` | Check whether specified key exists. |

    | `getKeys()` | Get a set of keys. |

    | `remove(String key)` | Remove the pair with the specified key. |

    | `clear()` | Remove all pairs. |

    | `setString(String key, String value)` | Write a String value. |

    | `getString()` | Read a String value. |


    In Listing [12-2](#479501_1_En_12_Chapter.xhtml#PC2), `SharedPreferences` class
    is used to read and write a key-value pair.


    ```

    class AppConfig {

    Future _getPrefs() async {

    return await SharedPreferences.getInstance();

    }

    Future getName() async {

    SharedPreferences prefs = await _getPrefs();

    return prefs.getString(''name'') ?? ";

    }

    Future setName(String name) async {

    SharedPreferences prefs = await _getPrefs();

    return prefs.setString(''name'', name);

    }

    }

    Listing 12-2

    Use SharedPreferences

    ```


    ## 12.3 Writing Platform-Specific Code


    ### Problem


    You want to write platform-specific code.


    ### Solution


    Use platform channels to pass messages between Flutter app and the underlying
    host platform.'
