    构建的 XML 文档

    ```


    ## 处理 HTML 数据


    ### 问题


    你希望在 Flutter 应用中解析 HTML 文档。


    ### 解决方案


    使用 `html` 库。


    ### 讨论


    尽管 JSON 和 XML 数据格式在 Flutter 应用中很流行，但你仍可能需要解析 HTML 文档来提取数据。这个过程称为屏幕抓取。你可以使用 `html`
    库来解析 HTML 文档。要使用该库，你需要在 `pubspec.yaml` 文件的 `dependencies` 中添加 `html: ⁰.13.4+1`。


    `parse()` 函数将 HTML 字符串解析为 `Document` 对象。这些 `Document` 对象可以使用 W3C DOM API 进行查询和操作。在代码清单
    9-29 中，首先解析了 HTML 字符串，然后使用 `getElementsByTagName()` 方法获取 `li` 元素，最后从 `li` 元素中提取
    `id` 属性和文本。


    ```

    import ''package:html/dom.dart'';

    import ''package:html/parser.dart'' show parse;

    void main() {

    String htmlStr = "''


    John

    Jane

    Mary


    "'';

    Document document = parse(htmlStr);

    var users = document.getElementsByTagName(''li'').map((Element element) {

    return {

    ''id'': element.attributes[''id''],

    ''name'': element.text,

    };

    });

    print(users);

    }

    代码清单 9-29

    解析 HTML 文档

    ```


    ## 发送 HTTP 请求


    ### 问题


    你希望向后端服务发送 HTTP 请求。


    ### 解决方案


    使用 `dart:io` 库中的 `HttpClient`。

    '
- fmt: '# Discussion


    HTTP protocol is a popular choice to expose web services. The representation can
    be JSON or XML. By using `HttpClient` class from `dart:io` library, you can easily
    interact with backend services over HTTP.


    To use `HttpClient` class, you need to choose a HTTP method first, then prepare
    the `HttpClientRequest` object for the request, and process the `HttpClientResponse`
    object for the response. `HttpClient` class has different pairs of methods corresponding
    to different HTTP methods. For example, `get()` and `getUrl()` methods are both
    used to send HTTP GET requests. The difference is that `get()` method accepts
    `host`, `port`, and `path` parameters, while `getUrl()` method accepts `url` parameter
    of type `Uri`. You can see other pairs like `post()` and `postUrl()`, `put()`
    and `putUrl()`, `patch()` and `patchUrl()`, `delete()` and `deleteUrl()`, and
    `head()` and `headUrl()`.


    These methods return `Future<HttpClientRequest>` objects. You need to chain the
    returned `Future` objects with `then()` method to prepare `HttpClientRequest`
    object. For example, you can modify HTTP request headers or write request body.
    The `then()` method needs to return the value of `HttpClientRequest.close()` method,
    which is a `Future<HttpClientResponse>` object. In the `then()` method of the
    `Future<HttpClientResponse>` object, you can use this object to get response body,
    headers, cookies, and other information.


    In Listing [9-30](#479501_1_En_9_Chapter.xhtml#PC30), `request.close()` method
    is called directly in the first `then()` method, because we don’t need to do anything
    to the `HttpClientRequest` object. The `_handleResponse()` function decodes HTTP
    response as UTF-8 strings and prints them out. `HttpClientResponse` class implements
    `Stream<List<int>>`, so the response body can be read as streams.


    ```

    void _handleResponse(HttpClientResponse response) {

    response.transform(utf8.decoder).listen(print);

    }

    HttpClient httpClient = HttpClient();

    httpClient

    .getUrl(Uri.parse(''https://httpbin.org/get''))

    .then((HttpClientRequest request) => request.close())

    .then(_handleResponse);

    Listing 9-30

    Send HTTP GET request

    ```


    If you need to send HTTP POST, PUT, and PATCH requests with body, you can use
    `HttpClientRequest.write()` method to write the body; see Listing [9-31](#479501_1_En_9_Chapter.xhtml#PC31).


    ```

    httpClient

    .postUrl(Uri.parse(''https://httpbin.org/post''))

    .then((HttpClientRequest request) {

    request.write(''hello'');

    return request.close();

    }).then(_handleResponse);

    Listing 9-31

    Write HTTP request body

    ```


    If you need to modify HTTP request headers, you can use the `HttpClientRequest.headers`
    property to modify the `HttpHeaders` object; see Listing [9-32](#479501_1_En_9_Chapter.xhtml#PC32).


    ```

    httpClient

    .getUrl(Uri.parse(''https://httpbin.org/headers''))

    .then((HttpClientRequest request) {

    request.headers.set(HttpHeaders.userAgentHeader, ''my-agent'');

    return request.close();

    }).then(_handleResponse);

    Listing 9-32

    Modify HTTP request headers

    ```


    If you need to support HTTP basic authentication, you can use `HttpClient.addCredentials()`
    method to add `HttpClientBasicCredentials` objects; see Listing [9-33](#479501_1_En_9_Chapter.xhtml#PC33).


    ```

    String username = ''username'', password = ''password'';

    Uri uri = Uri.parse(''https://httpbin.org/basic-auth/$username/$password'');

    httpClient.addCredentials(

    uri, null, HttpClientBasicCredentials(username, password));

    httpClient

    .getUrl(uri)

    .then((HttpClientRequest request) => request.close())

    .then(_handleResponse);

    Listing 9-33

    Basic authentication

    ```


    ## 9.12 Connecting to WebSocket


    ### Problem


    You want to connect to WebSocket servers in Flutter apps.


    ### Solution


    Use `WebSocket` class in `dart:io` library.


    ### Discussion


    WebSockets are widely used in web apps to provide bidirectional communications
    between browser and server. They can also provide real-time updates of data in
    the backend. If you already have a WebSocket server that interacts with the web
    app running in the browser, you may also want the same feature to be available
    in Flutter apps. `WebSocket` class in `dart:io` library can be used to implement
    the WebSocket connections.


    The static `WebSocket.connect()` method connects to a WebSocket server. You need
    to provide the server URL with scheme `ws` or `wss`. You can optionally provide
    a list of subprotocols and a map of headers. The return value of `connect()` method
    is a `Future<WebSocket>` object. `WebSocket` class implements `Stream` class,
    so you can read data sent from server as streams. To send data to the server,
    you can use `add()` and `addStream()` methods.


    In Listing [9-34](#479501_1_En_9_Chapter.xhtml#PC34), the WebSocket connects to
    the demo echo server. By using `listen()` method to subscribe to the `WebSocket`
    object, we can process data sent from the server. The two `add()` method calls
    send two messages to the server.


    ```

    WebSocket.connect(''ws://demos.kaazing.com/echo'').then((WebSocket webSocket)
    {

    webSocket.listen(print, onError: print);

    webSocket.add(''hello'');

    webSocket.add(''world'');

    webSocket.close();

    }).catchError(print);

    Listing 9-34

    Connect to WebSocket

    ```


    ## 9.13 Connecting to Socket


    ### Problem


    You want to connect to socket servers.


    ### Solution


    Use `Socket` class in `dart:io` library.


    ### Discussion


    If you want to connect to socket servers in Flutter apps, you can use `Socket`
    class from `dart:io` library. The static `Socket.connect()` method connects to
    a socket server at specified `host` and `port` and returns a `Future<Socket>`
    object. `Socket` class implements `Stream<List<int>>`, so you can read data from
    server by subscribing to the stream. To send data to the server, you can use `add()`
    and `addStream()` methods.


    In Listing [9-35](#479501_1_En_9_Chapter.xhtml#PC35), a socket server is started
    on port `10080`. This server converts the received strings into uppercase and
    sends back the results.


    ```

    import ''dart:io'';

    import ''dart:convert'';

    void main() {

    ServerSocket.bind(''127.0.0.1'', 10080).then((serverSocket) {

    serverSocket.listen((socket) {

    socket.addStream(socket

    .transform(utf8.decoder)

    .map((str) => str.toUpperCase())

    .transform(utf8.encoder));

    });

    });

    }

    Listing 9-35

    Simple socket server

    ```


    In Listing [9-36](#479501_1_En_9_Chapter.xhtml#PC36), `Socket.connect()` method
    is used to connect to the socket server shown in Listing [9-35](#479501_1_En_9_Chapter.xhtml#PC35).
    Data received from the server is printed out. Two strings are sent to the server.


    ```

    void main() {

    Socket.connect(''127.0.0.1'', 10080).then((socket) {

    socket.transform(utf8.decoder).listen(print);

    socket.write(''hello'');

    socket.write(''world'');

    socket.close();

    });

    }

    Listing 9-36

    Connect to socket server

    ```


    ## 9.14 Interacting JSON-Based REST Services


    ### Problem


    You want to use JSON-based REST services.


    ### Solution


    Use `HttpClient`, `json_serialize` library, and `FutureBuilder` widget.'
