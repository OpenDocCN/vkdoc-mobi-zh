- fmt: '### Discussion


    Form widgets can be used as normal widgets. However, these form widgets don’t
    maintain any state; you always need to wrap them in stateful widgets to keep the
    state. A typical usage pattern is to use the `onChanged` callback to update the
    state and trigger the rebuild of the form widget. Since this is a typical pattern
    of using form widgets, Flutter has a built-in `FormField` widget to maintain the
    current state of a form widget. It handles the updates and validation errors.


    `FormField` class is generic with type parameter `T` representing the type of
    value. A `FormField` can be used as a standalone widget or be part of a `Form`
    widget. This recipe only discusses the standalone usage. Table [6-7](#479501_1_En_6_Chapter.xhtml#Tab7)
    shows the named parameters of `FormField` constructor.


    **Table 6-7** Named parameters of `FormField`


    | Name | Type | Description |

    | --- | --- | --- |

    | `builder` | `FormFieldBuilder<T>` | Build the widget representing this form
    field. |

    | `onSaved` | `FormFieldSetter<T>` | Callback when the form is saved. |

    | `validator` | `FormFieldValidator<T>` | Validator of the form field. |

    | `initialValue` | `T` | Initial value. |

    | `autovalidate` | `boolean` | Whether to validate automatically after every change.
    |

    | `enabled` | `boolean` | Whether this form field is enabled. |


    `FormFieldBuilder<T>` type is a typedef in the form of `Widget (FormFieldState<T>
    field)`. `FormFieldState<T>` class extends from `State` class and represents the
    current state of the form field. `FormFieldBuilder` is responsible for building
    the widget based on the state. From `FormFieldState`, you can get the current
    value and error text of the form field. You can also use methods of `FormFieldState`
    in Table [6-8](#479501_1_En_6_Chapter.xhtml#Tab8). `FormFieldValidator<T>` is
    also a typedef in the form of `String(T value)`. It takes the current value as
    the input and returns a non-null string as the error message if the validation
    fails. `FormFieldSetter<T>` type is a typedef in the form of `void(T newValue)`.


    **Table 6-8** Methods in `FormFieldState`


    | Name | Description |

    | --- | --- |

    | `save()` | Call the `onSaved()` method with the current value. |

    | `validate()` | Call the `validator` and set the `errorText` if validation fails.
    |

    | `didChange(T value)` | Update the field’s state to the new value. |

    | `reset()` | Reset the field to its initial value. |


    When wrapping `TextFields` inside of `FormFields`, it’s better to use the built-in
    `TextFormField`. `TextFormField` widget already handles setting text using `TextEditingController`
    and using the error text returned by `FormFieldValidator` to update the input
    decoration. `TextFormField` constructor supports parameters from `TextField` and
    `FormField` constructors. `TextFormField` in Listing [6-21](#479501_1_En_6_Chapter.xhtml#PC21)
    has a validator to validate text length.


    ```

    class NameInput extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return TextFormField(

    decoration: InputDecoration(

    labelText: ''Name'',

    ),

    validator: (value) {

    if (value == null || value.isEmpty) {

    return ''Name is required.'';

    } else if (value.length < 6) {

    return ''Minimum length is 6.'';

    } else {

    return null;

    }

    },

    autovalidate: true,

    );

    }

    }

    Listing 6-21

    TextFormField

    ```


    Figure [6-15](#479501_1_En_6_Chapter.xhtml#Fig15) shows the screenshot of code
    in Listing [6-21](#479501_1_En_6_Chapter.xhtml#PC21).


    ![../images/479501_1_En_6_Chapter/479501_1_En_6_Fig15_HTML.jpg](images/479501_1_En_6_Chapter/479501_1_En_6_Fig15_HTML.jpg)


    **Figure 6-15** `TextFormField`


    `FormFieldState` instances are only accessible in the builder function of `FormField`.
    If you need to access the state from other places, you can pass a `GlobalKey`
    as the key parameter of `FormField`, then use the `currentState` property to access
    the current state.


    In Listing [6-22](#479501_1_En_6_Chapter.xhtml#PC22), the state of `FormField`
    is a `List<PizzaTopping>` instance. With the `GlobalKey`, the current value can
    be retrieved when the button is pressed.


    ```

    class PizzaToppingsSelector extends StatelessWidget {

    final GlobalKey>> _formFieldKey =

    GlobalKey();

    @override

    Widget build(BuildContext context) {

    return Column(

    children: [

    FormField>(

    key: _formFieldKey,

    initialValue: List(),

    builder: (state) {

    return Wrap(

    spacing: 5,

    children: PizzaTopping.allPizzaToppings.map((topping) {

    return ChoiceChip(

    label: Text(topping.name),

    selected: state.value.contains(topping),

    onSelected: state.value.length  newValue = List.of(state.value);

    if (selected) {

    newValue.add(topping);

    } else {

    newValue.remove(topping);

    }

    state.didChange(newValue);

    }

    : null,

    );

    }).toList(),

    );

    },

    ),

    RaisedButton(

    child: Text(''Get toppings''),

    onPressed: () => print(_formFieldKey.currentState?.value),

    ),

    ],

    );

    }

    }

    Listing 6-22

    FormField

    ```


    ## 6.15 Creating Forms


    ### Problem


    You want to create a form with multiple form fields.


    ### Solution


    Use `Form`.


    ### Discussion


    When using form fields, generally you’re trying to build a form with multiple
    form fields. Managing form fields separately is a tedious task when dealing with
    multiple form fields. `Form` is a convenient wrapper for multiple form fields.
    You need to wrap all form fields in `FormField` widgets and use a `Form` widget
    as the common ancestor of all these `FormField` widgets. `Form` widget is a stateful
    widget with state managed by associated `FormState` instance. `FormState` class
    has methods `save()`, `validate()`, and `reset()`. These methods call corresponding
    functions on all `FormFieldState` instances of descendant `FormField` widgets.


    There are two ways to get the `FormState` instance depends on the location of
    the widget wants to use `FormState`. If the widget is a descendant of the `Form`
    widget, using `Form.of(BuildContext context)` is an easy way to get the closest
    `FormState` instance. The second way is to use `GlobalKey` instance when creating
    the `Form` widget, then use `GlobalKey.currentState` to get the `FormState`.


    Listing [6-23](#479501_1_En_6_Chapter.xhtml#PC23) shows the code of a login form.
    Two `TextFormField` widgets are created with `GlobalKey` instances.


    ```

    class LoginForm extends StatefulWidget {

    @override

    _LoginFormState createState() => _LoginFormState();

    }

    class _LoginFormState extends State {

    final GlobalKey> _usernameFormFieldKey = GlobalKey();

    final GlobalKey> _passwordFormFieldKey = GlobalKey();

    _notEmpty(String value) => value != null && value.isNotEmpty;

    get _value => ({

    ''username'': _usernameFormFieldKey.currentState?.value,

    ''password'': _passwordFormFieldKey.currentState?.value

    });

    @override

    Widget build(BuildContext context) {

    return Form(

    child: Column(

    children: [

    TextFormField(

    key: _usernameFormFieldKey,

    decoration: InputDecoration(

    labelText: ''Username'',

    ),

    validator: (value) =>

    !_notEmpty(value) ? ''Username is required'' : null,

    ),

    TextFormField(

    key: _passwordFormFieldKey,

    obscureText: true,

    decoration: InputDecoration(

    labelText: ''Password'',

    ),

    validator: (value) =>

    !_notEmpty(value) ? ''Password is required'' : null,

    ),

    Builder(builder: (context) {

    return Row(

    mainAxisAlignment: MainAxisAlignment.end,

    children: [

    RaisedButton(

    child: Text(''Log In''),

    onPressed: () {

    if (Form.of(context).validate()) {

    print(_value);

    }

    },

    ),

    FlatButton(

    child: Text(''Reset''),

    onPressed: () => Form.of(context).reset(),

    )

    ],

    );

    }),

    ],

    ),

    );

    }

    }

    Listing 6-23

    Login form

    ```


    Figure [6-16](#479501_1_En_6_Chapter.xhtml#Fig16) shows the screenshot of the
    login form.


