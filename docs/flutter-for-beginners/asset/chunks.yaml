    ## 5.20 Summary


    With the layout widgets in Flutter, it’s easy to satisfy common layout requirements
    in build Flutter apps. This chapter covers many layout widgets for single child
    and multiple children. In the next chapter, we’ll discuss form widgets.


    # 6. Form Widgets


    Form controls are important in mobile apps to interact with the user. Flutter
    provides a set of form widgets for Material Design and iOS style. These form widgets
    generally have no internal state. Their appearance and behavior are purely defined
    by constructor parameters. With state maintained in ancestor widgets, form widgets
    are re-rendered to reflect to state changes. This chapter covers recipes related
    to basic usage of form widgets.


    ## 6.1 Collecting Text Inputs


    ### Problem


    You want to collect text inputs.


    ### Solution


    Use TextField for Material Design and CupertinoTextField for iOS style.


    ### Discussion


    To collect user inputs in Flutter apps, you can use TextField widget for Material
    Design or CupertinoTextField widget for iOS style. Both widgets have similar usage
    pattern and behavior. In fact, both widgets wrap the same EditableText which provides
    the basic text input capability with support for scrolling, selection, and cursor
    movement. EditableText is a highly customizable widget with many named parameters.
    This recipe focuses on how to set the initial value of a TextField or CupertinoTextField
    widget and get the text from it.


    The text of an EditableText widget is controlled by a TextEditingController instance.
    You can use the controller parameter to set a TextEditingController instance when
    creating a new EditableText widget. The controller maintains a bidirectional data
    binding with the corresponding EditableText widget. The controller has a text
    property to track the current editing text and a selection property of type TextSelection
    to track the currently selected text. Whenever the text in a EditableText widget
    is modified or selected by user, the text and selection properties of the associated
    TextEditingController instance will be updated. If you modify the text or selection
    properties of the TextEditingController instance, the EditableText widget will
    update itself. TextEditingController class is a subclass of ValueNotifier<TextEditingValue>,
    so you can add listeners to the controller to get notifications when the text
    or selection changes. When creating a new TextEditingController instance, you
    can pass some text with the text parameter, which becomes the initial text of
    the corresponding EditableText widget.


    Let’s see three different ways to get the text from EditableText widgets.


    ### Using TextEditingController


    The first way is using TextEditingController. The ReverseText widget in Listing
    [6-1](#479501_1_En_6_Chapter.xhtml#PC1) is used to reverse an input string. The
    TextEditingController instance is created with initial text “<input>”. When the
    button is pressed, the _value is updated to the text retrieved from the controller.
    The reversed string is displayed.


    ```

    class ReverseText extends StatefulWidget {

    @override

    _ReverseTextState createState() => _ReverseTextState();

    }

    class _ReverseTextState extends State {

    final TextEditingController _controller = TextEditingController(

    text: "",

    );

    String _value;

    @override

    Widget build(BuildContext context) {

    return Column(

    crossAxisAlignment: CrossAxisAlignment.start,

    children: [

    Row(

    children: [

    Expanded(

    child: TextField(

    controller: _controller,

    ),

    ),

    RaisedButton(

    child: Text(''Go''),

    onPressed: () {

    this.setState(() {

    _value = _controller.text;

    });

    },

    ),

    ],

    ),

    Text( (_value ?? "). split(").reversed.join()),

    ],

    );

    }

    }

    Listing 6-1

    Use TextEditingController to get text

    ```


