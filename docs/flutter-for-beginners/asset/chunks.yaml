    ## 3.10 向类添加特性


    ### 问题


    你想要重用某个类的代码，但受到 Dart 单继承的限制。


    ### 解决方案


    使用 Mixin。


    ### 讨论


    继承是重用代码的一种常见方式。Dart 只支持单继承，即一个类最多只能有一个超类。如果你想从多个类中重用代码，则应使用 Mixin。一个类可以使用关键字 `with`
    声明多个 Mixin。Mixin 是一个继承自 `Object` 且不声明构造器的类。Mixin 可以使用 `class` 声明为常规类，或使用 `mixin`
    声明为专门的 Mixin。在代码清单 3-19 中，`CardHolder` 和 `SystemUser` 是 Mixin。`Assistant` 类继承自
    `Student` 并使用了 `SystemUser` Mixin，因此我们可以调用 `Assistant` 实例的 `useSystem()` 方法。


    ```

    class Person {

    String name;

    Person(this.name);

    }

    class Student extends Person with CardHolder {

    Student(String name) : super(''Student: $name'') {

    holder = this;

    }

    }

    class Teacher extends Person with CardHolder {

    Teacher(String name) : super(''Teacher: $name'') {

    holder = this;

    }

    }

    mixin CardHolder {

    Person holder;

    void swipeCard() {

    print(''${holder.name} swiped the card'');

    }

    }

    mixin SystemUser {

    Person user;

    void useSystem() {

    print(''${user.name} used the system.'');

    }

    }

    class Assistant extends Student with SystemUser {

    Assistant(String name) : super(name) {

    user = this;

    }

    }

    void main() {

    var assistant = Assistant(''Alex'');

    assistant.swipeCard();

    assistant.useSystem();

    }

    代码清单 3-19

    Mixin

    ```


    ## 3.11 使用接口


    ### 问题


    你需要一个供类遵循的契约。


    ### 解决方案


    使用类的隐式接口。


    ### 讨论


    你应该熟悉作为类契约的接口。与其他面向对象的编程语言不同，Dart 没有接口的概念。每个类都有一个隐式接口，该接口包含该类以及它所实现的接口的所有实例成员。你可以使用
    `implements` 来声明一个类实现了另一个类的 API。在代码清单 3-20 中，`CachedDataLoader` 类实现了 `DataLoader`
    类的隐式接口。


    ```

    class DataLoader {

    void load() {

    print(''load data'');

    }

    }

    class CachedDataLoader implements DataLoader {

    @override

    void load() {

    print(''load from cache'');

    }

    }

    void main() {

    var loader = CachedDataLoader();

    loader.load();

    }

