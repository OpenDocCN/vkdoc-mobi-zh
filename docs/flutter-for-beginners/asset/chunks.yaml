    ## 2.8 Running Flutter Apps


    ### Problem


    You want to run Flutter apps.


    ### Solution


    Use the command `flutter run` with different arguments.


    ### Discussion


    `flutter run` is the command provided by Flutter SDK to start Flutter apps. `flutter
    run` has a lot of arguments for different usage scenarios.


    #### Different Build Flavors


    By default, `flutter run` builds a debug version of the app. Debug version is
    good for development and testing with hot reload support. There are other build
    flavors you can use for different scenarios; see Table [2-5](#479501_1_En_2_Chapter.xhtml#Tab5).


    **Table 2-5** Build flavors of `flutter run`


    | Argument | Description |

    | --- | --- |

    | `--debug` | A debug version. This is the default build flavor. |

    | `--profile` | A version specialized for performance profiling. This option does
    not currently support emulator targets. |

    | `--release` | A release version ready for publishing to app store. |

    | `--flavor` | A custom app flavor defined by platform-specific build setup. This
    requires using product flavors in Android Gradle scripts and custom Xcode schemes.
    |


    #### Other Options


    The argument `-t` or `--target` specifies the main entry point file of the app.
    It must be a Dart file that contains the `main()` method. The default value is
    `lib/main.dart`. The following command uses `lib/app.dart` as the entry point
    file.


    ```

    $ flutter run -t lib/app.dart

    ```


    If your app has different routes, use the argument `--route` to specify the route
    to load when running the app.


    If you want to record the process id of the running Flutter app, use the argument
    `--pid-file` to specify the file to write the process id. With the process id,
    you can send the signal `SIGUSR1` to trigger a hot reload and `SIGUSR2` to trigger
    a hot restart. In the following command, the process id is written to the file
    `~/app.pid`.


    ```

    $ flutter run --pid-file ~/app.pid

    ```


    Now we can send signals to the running Flutter app using `kill`.


    ```

    $ kill -SIGUSR1 $(<~/app.pid)

    $ kill -SIGUSR2 $(<~/app.pid)

    ```


    Table [2-6](#479501_1_En_2_Chapter.xhtml#Tab6) shows other arguments supported
    by `flutter run`.


    **Table 2-6** Extra arguments of `flutter run`


    | Arguments | Description | Default value |

    | --- | --- | --- |

    | `--hot` / `--not-hot` | Whether hot reload should be enabled. | On |

    | `--build` / `--no-build` | Whether the app should be built if necessary before
    running it. | On |

    | `--pub` / `--no-pub` | Whether to run `flutter packages get` before running
    it. | On |

    | `--target-platform` | Specify the target platform when building the app for
    Android devices. Possible values are `default`, `android-arm`, and `android-arm64`.
    | `default` |

    | `--observatory-port` | Specify the port for Observatory debugger connections.
    | `0` (a random free port) |

    | `--start-paused` | Make the app to start in a paused mode and wait for a debugger
    to connect. |   |

    | `--trace-startup` | Start tracing. |   |

    | `--enable-software-rendering` | Enable rendering using Skia. |   |

    | `--skia-deterministic-rendering` | Provide 100% deterministic Skia rendering
    when used with `--enable-software-rendering`. |   |

    | `--trace-skia` | Enable tracing of Skia code. |   |


    Figure [2-11](#479501_1_En_2_Chapter.xhtml#Fig11) shows the output of running
    the command `flutter run`. From the output, we can see the Observatory port of
    the running app, which is very important for other Flutter SDK commands to work
    with the running app. We can interact with the console by pressing different keys.
    For example, pressing “r” triggers hot reload. After pressing “h”, `flutter run`
    shows a help message about all commands it can accept.


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig11_HTML.jpg](images/479501_1_En_2_Chapter/479501_1_En_2_Fig11_HTML.jpg)


    **Figure 2-11** Output of the command `flutter run`


