    ## 8.7 显示 iOS 对话框


    ### 问题


    你想要显示 iOS 对话框。


    ### 解决方案


    使用 `showCupertinoDialog()` 函数以及 `CupertinoAlertDialog` 和 `CupertinoPopupSurface`
    小部件。


    ### 讨论


    对于 iOS 应用，你可以使用 `showCupertinoDialog()` 函数以及诸如 `CupertinoAlertDialog` 和 `CupertinoPopupSurface`
    之类的小部件来显示对话框。`showCupertinoDialog()` 函数与 Material Design 的 `showDialog()` 函数类似。此函数也使用
    `Navigator.push()` 方法将对话框路由推送到导航器。`CupertinoAlertDialog` 是一个内置的对话框实现，用于通知用户或请求确认。一个
    `CupertinoAlertDialog` 可以包含标题、内容和一个操作列表。操作通过 `CupertinoDialogAction` 小部件表示。表 8-2
    显示了 `CupertinoDialogAction` 构造函数的参数。


    表 8-2


    `CupertinoDialogAction` 的参数


    | 名称 | 类型 | 描述 |

    | --- | --- | --- |

    | `child` | `Widget` | 操作的内容。 |

    | `onPressed` | `VoidCallback` | 操作按下的回调。 |

    | `isDefaultAction` | `bool` | 此操作是否为默认操作。 |

    | `isDestructiveAction` | `bool` | 此操作是否具有破坏性。具有破坏性的操作有不同的样式。 |

    | `textStyle` | `TextStyle` | 应用于操作的文本样式。 |


    在代码清单 8-12 中，按下按钮会显示一个 iOS 风格的提示对话框。


    ```

    CupertinoButton(

    child: Text(''显示提示对话框''),

    onPressed: () async {

    bool result = await showCupertinoDialog(

    context: context,

    builder: (BuildContext context) {

    return CupertinoAlertDialog(

    title: Text(''删除''),

    content: Text(''删除此项目？''),

    actions: [

    CupertinoDialogAction(

    child: Text(''删除''),

    onPressed: () {

    Navigator.pop(context, true);

    },

    isDestructiveAction: true,

    ),

    CupertinoDialogAction(

    child: Text(''取消''),

    onPressed: () {

    Navigator.pop(context, false);

    },

    ),

    ],

    );

    },

    );

    print(result);

    },

    );

    代码清单 8-12

    显示 iOS 提示对话框

    ```


    图 8-3 显示了代码清单 8-12 的截图。


    ![../images/479501_1_En_8_Chapter/479501_1_En_8_Fig3_HTML.jpg](img/479501_1_En_8_Fig3_HTML.jpg)


    图 8-3


    iOS 提示对话框


    如果你想创建自定义对话框，可以使用 `CupertinoPopupSurface` 小部件，它会创建一个圆角矩形表面。


    ## 8.8 显示 iOS 操作面板


    ### 问题


    你希望在 iOS 应用中为用户提供一组可供选择的操作。


    ### 解决方案


    使用 `showCupertinoModalPopup()` 函数和 `CupertinoActionSheet` 小部件。


    ### 讨论


    如果你希望在 iOS 应用中为用户提供一组可供选择的操作，可以使用 `showCupertinoModalPopup()` 函数来显示 `CupertinoActionSheet`
    小部件。一个 `CupertinoActionSheet` 可以包含标题、消息、一个取消按钮以及一个操作列表。操作表示为 `CupertinoActionSheetAction`
    小部件。`CupertinoActionSheetAction` 构造函数的参数包括 `child`、`onPressed`、`isDefaultAction`
    和 `isDestructiveAction`，这些参数的含义与表 8-2 中所示的 `CupertinoDialogAction` 构造函数中的相同。


    在代码清单 8-13 中，按下按钮会显示一个包含三个操作和一个取消按钮的操作面板。


    ```

    CupertinoButton(

    child: Text(''显示操作面板''),

    onPressed: () async {

    String result = await showCupertinoModalPopup(

    context: context,

    builder: (BuildContext context) {

    return CupertinoActionSheet(

    title: Text(''要做什么''),

    message: Text(''请选择一个操作''),

    actions: [

    CupertinoActionSheetAction(

    child: Text(''复制''),

    isDefaultAction: true,

    onPressed: () {

    Navigator.pop(context, ''duplicate'');

    },

    ),

    CupertinoActionSheetAction(

    child: Text(''移动''),

    onPressed: () {

    Navigator.pop(context, ''move'');

    },

    ),

    CupertinoActionSheetAction(

    isDestructiveAction: true,

    child: Text(''删除''),

    onPressed: () {

    Navigator.pop(context, ''delete'');

    },

    ),

    ],

    cancelButton: CupertinoActionSheetAction(

    child: Text(''取消''),

    onPressed: () {

    Navigator.pop(context);

    },

    ),

    );

    },

    );

    print(result);

    },

    );

    代码清单 8-13

    显示 iOS 操作面板

    ```


