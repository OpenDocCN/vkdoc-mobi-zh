- fmt: '### Discussion


    Recipe 12-4 shows how to add platform-specific code to Flutter apps. Code added
    to a Flutter app cannot be shared between different apps. If you want to make
    the platform-specific code reusable, you can create Flutter plugins. Plugins are
    another type of projects supported in Flutter SDK. Plugins can be shared like
    other Dart packages using Dart pub tool (`https://pub.dev/`).


    To create a new Flutter plugin, you can use `flutter create --template=plugin`
    command. The `template=plugin` parameter means using the `plugin` template to
    create a Flutter project. You can choose to use either Java or Kotlin for Android
    and Objective-C or Swift for iOS, respectively. By default, Java is used for Android
    and Objective-C is used for iOS. You can use `-a` parameter with values `java`
    and `kotlin` to specify the language for Android and `-i` parameter with values
    `objc` and `swift` to specify the language for iOS. The following command shows
    how to create a plugin using Swift for iOS.


    ```

    $ flutter create --template=plugin -i swift network

    ```


    You can also use Android Studio or VS Code to create new plugins.


    The newly created plugin already has skeleton code that gets the platform version.
    We can use the code in Recipe 12-3 to implement the plugin with new method to
    get the network operator. In the directory of generated plugin, there are several
    sub-directories:


    *   The `lib` directory contains plugin’s public Dart API.

    *   The `android` directory contains Android implementation of the public API.

    *   The `ios` directory contains iOS implementation of the public API.

    *   The `example` directory contains an example Flutter app that uses this plugin.

    *   The `test` directory contains test code.


    We first define the public Dart API in `lib/network_plugin.dart` file. In Listing
    12-6, the value of the `networkOperator` property is retrieved by calling `getNetworkOperator`
    method using the method channel.


    ```

    class NetworkPlugin {

    static const MethodChannel _channel =

    const MethodChannel(''network_plugin'');

    static Future get networkOperator async {

    return await _channel.invokeMethod(''getNetworkOperator'');

    }

    }

    Listing 12-6

    Plugin Dart API

    ```


    The `NetworkPlugin.java` file in Listing 12-7 is the Android implementation of
    the plugin. `NetworkPlugin` class implements `MethodCallHandler` interface to
    handle method calls received from the platform channel.


    ```

    public class NetworkPlugin implements MethodCallHandler {

    public static void registerWith(Registrar registrar) {

    final MethodChannel channel = new MethodChannel(registrar.messenger(), "network_plugin");

    channel.setMethodCallHandler(new NetworkPlugin(registrar));

    }

    NetworkPlugin(Registrar registrar) {

    this.registrar = registrar;

    }

    private final PluginRegistry.Registrar registrar;

    @Override

    public void onMethodCall(MethodCall call, Result result) {

    if (call.method.equals("getNetworkOperator")) {

    result.success(getNetworkOperator());

    } else {

    result.notImplemented();

    }

    }

    private String getNetworkOperator() {

    Context context = registrar.context();

    TelephonyManager telephonyManager =

    ((TelephonyManager) context.getSystemService(Context.TELEPHONY_SERVICE));

    return telephonyManager.getNetworkOperatorName();

    }

    }

    Listing 12-7

    Android implementation

    ```


    The `SwiftNetworkPlugin.swift` file in Listing 12-8 is the Swift implementation
    of the plugin.


    ```

    public class SwiftNetworkPlugin: NSObject, FlutterPlugin {

    public static func register(with registrar: FlutterPluginRegistrar) {

    let channel = FlutterMethodChannel(name: "network_plugin",

    binaryMessenger: registrar.messenger())

    let instance = SwiftNetworkPlugin()

    registrar.addMethodCallDelegate(instance, channel: channel)

    }

    public func handle(_ call: FlutterMethodCall,

    result: @escaping FlutterResult) {

    if (call.method == "getNetworkOperator") {

    self.receiveNetworkOperator(result: result)

    } else {

    result(FlutterMethodNotImplemented)

    }

    }

    private func receiveNetworkOperator(result: FlutterResult) {

    let networkInfo = CTTelephonyNetworkInfo()

    let carrier = networkInfo.subscriberCellularProvider

    result(carrier?.carrierName)

    }

    }

    Listing 12-8

    Swift implementation

    ```


    The example project and test code also need to be updated with new API.


