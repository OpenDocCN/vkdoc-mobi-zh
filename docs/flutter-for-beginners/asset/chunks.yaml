    ## 12.8 使用系统共享菜单


    ### 问题


    你想要允许用户使用系统共享菜单分享项目。


    ### 解决方案


    使用 `share` 插件。


    ### 讨论


    如果你想允许用户在应用中分享项目，可以使用 `share` 插件（[`https://pub.dev/packages/share`](https://pub.dev/packages/share)）来显示系统共享菜单。要使用此插件，需要在
    `pubspec.yaml` 文件的依赖项中添加 `share: ⁰.6.1`。


    `share` 插件提供的 API 非常简单。它只有一个静态的 `share()` 方法用于分享文本。你可以分享纯文本或 URL。列表 12-16 展示了如何使用
    `share()` 方法分享一个 URL。


    ```

    Share.share(''https://flutter.dev'');

    列表 12-16

    分享一个 URL

    ```


    ## 12.9 总结


    Flutter 应用可以使用平台特定的代码来调用原生平台 API。有大量的社区插件可用于原生平台上的不同功能，包括摄像头、麦克风、传感器等。在下一章中，我们将讨论
    Flutter 中的杂项主题。


