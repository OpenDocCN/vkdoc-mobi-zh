    Example of AnimatedWidget

    ```


    ## 11.2 Creating Animations Using Linear Interpolation


    ### Problem


    You want to create animations for other data types using linear interpolation.


    ### Solution


    Use `Tween` class and its subclasses.


    ### Discussion


    `AnimationController` class uses `double` as its value type. Double values are
    useful for animations with size or position. You may still need to animate other
    types of data. For example, you can animate the background color from red to green.
    For these scenarios, you can use `Tween` class and its subclasses.


    `Tween` class represents linear interpolation between a beginning and ending value.
    To create a `Tween` object, you need to provide these two values. `Tween` objects
    can provide values for animations to use. By using the `animate()` method with
    another `Animation` object, you can create a new `Animation` object that is driven
    by the provided `Animation` object but uses values from the `Tween` object. Subclasses
    of `Tween` need to implement the `lerp()` method that takes an animation value
    and returns the interpolated value.


    In Listing [11-4](#479501_1_En_11_Chapter.xhtml#PC4), `AnimatedColor` widget uses
    `Animation<Color>` object to update the background color. `ColorTween` object
    is created with beginning value `Colors.red` and ending value `Colors.green`.


    ```

    class AnimatedColorTween extends StatefulWidget {

    @override

    _AnimatedColorTweenState createState() => _AnimatedColorTweenState();

    }

    class _AnimatedColorTweenState extends State

    with SingleTickerProviderStateMixin {

    AnimationController controller;

    Animation animation;

    @override

    void initState() {

    super.initState();

    controller = AnimationController(

    duration: const Duration(seconds: 10),

    vsync: this,

    );

    animation =

    ColorTween(begin: Colors.red, end: Colors.green).animate(controller);

    controller.forward();

    }

    @override

    Widget build(BuildContext context) {

    return AnimatedColor(

    animation: animation,

    );

    }

    @override

    void dispose() {

    controller.dispose();

    super.dispose();

    }

    }

    class AnimatedColor extends AnimatedWidget {

    AnimatedColor({Key key, this.animation})

    : super(key: key, listenable: animation);

    final Animation animation;

    @override

    Widget build(BuildContext context) {

    return Container(

    width: 300,

    height: 300,

    decoration: BoxDecoration(color: animation.value),

    );

    }

    }

    Listing 11-4

    Example of ColorTween

    ```


    There are many other subclasses of `Tween` for different objects, including `AlignmentTween`,
    `BorderTween`, `BoxConstraintsTween`, `DecorationTween`, `EdgeInsetsTween`, `SizeTween`,
    `TextStyleTween`, and more.


    ## 11.3 Creating Curved Animations


    ### Problem


    You want to create curved animations.


    ### Solution


    Use `CurvedAnimation` or `CurveTween` class.'
