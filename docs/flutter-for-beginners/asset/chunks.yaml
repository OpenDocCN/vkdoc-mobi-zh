    ## 9.15 Interacting with gRPC Services


    ### Problem


    You want to interact with gRPC services .


    ### Solution


    Use `grpc` library.


    ### Discussion


    gRPC ( [`https://grpc.io/`](https://grpc.io/) ) is a high-performance, open-source
    universal RPC framework. This recipe shows how to interact with gRPC services
    . The gRPC service to interact is the greeter service from gRPC official examples
    ( [`https://github.com/grpc/grpc/tree/master/examples/node`](https://github.com/grpc/grpc/tree/master/examples/node)
    ). You need to start the gRPC server first.


    To use this gRPC service in Flutter apps, you need to install Protocol Buffers
    compiler ( [`https://github.com/protocolbuffers/protobuf`](https://github.com/protocolbuffers/protobuf)
    ) first. After downloading the release file for your platform and extracting its
    content, you need to add the extracted `bin` directory to the `PATH` environment
    variable. You can run `protoc --version` command to verify the installation .
    The version used in this recipe is `3.7.1`.


    You also need to install Dart protoc plugin ( [`https://github.com/dart-lang/protobuf/tree/master/protoc_plugin`](https://github.com/dart-lang/protobuf/tree/master/protoc_plugin)
    ). The easiest way to install is to run the following command.


    ```

    $ flutter packages pub global activate protoc_plugin

    ```


    Because we use `flutter packages` to run the installation, the binary file is
    put under the `.pub-cache/bin` directory of the Flutter SDK. You need to add this
    path to `PATH` environment variable. The plugin requires `dart` command to be
    available, so you also need to add `bin/cache/dart-sdk/bin` directory of Flutter
    SDK to PATH environment variable. Now we can use `protoc` to generate Dart files
    for interactions with the greeter service . In the following command, `lib/grpc/generated`
    is the output path of generated files. `proto_file_path` is the path of proto
    files. `helloworld.proto` file contains the definition for greeter service. Libraries
    `protobuf` and `grpc` also need to be added to the `dependencies` of `pubspec.yaml`
    file.


    ```

    $ protoc --dart_out=grpc:lib/grpc/generated --proto_path= /helloworld.proto

    ```


    The generated `helloworld.pbgrpc.dart` file provides `GreeterClient` class to
    interact with the service. In Listing [9-39](#479501_1_En_9_Chapter.xhtml#PC41),
    a `ClientChannel` is created to connect to the gRPC server. The channel is required
    when creating a `GreeterClient` object. The `sayHello()` method sends requests
    to the server and receives responses.


    ```

    import ''package:grpc/grpc.dart'';

    import ''generated/helloworld.pbgrpc.dart'';

    void main() async {

    final channel = new ClientChannel(''localhost'',

    port: 50051,

    options: const ChannelOptions(

    credentials: const ChannelCredentials.insecure()));

    final stub = new GreeterClient(channel);

    try {

    var response = await stub.sayHello(new HelloRequest()..name = ''John'');

    print(''Received: ${response.message}'');

    } catch (e) {

    print(''Caught error: $e'');

    }

    await channel.shutdown();

    }

    Listing 9-39

    Interact with gRPC service

    ```


    ## 9.16 Summary


    This chapter focuses on different ways to interact with backend services, including
    HTTP, WebSocket, Socket, and gRPC. Futures and Streams play an important role
    in asynchronous computations. This chapter also discusses how to handle JSON,
    XML, and HTML data. In the next chapter, we’ll discuss state management in Flutter
    apps.


