    Flutter SDK 提供的热重载是一项杀手级功能，可以显著提高开发人员的工作效率。使用热重载，状态在应用更新之间得以保留，因此您可以立即看到 UI 更新，并从上次进行更改的执行点继续开发和测试。


    根据 Flutter 应用的启动方式不同，触发热重载的方法也不同。只有处于调试模式的 Flutter 应用才能进行热重载：


    - 当应用通过命令`flutter run`启动时，在终端窗口中输入`r`即可触发热重载。

    - 当应用通过 Android Studio 启动时，保存文件会自动触发热重载。您也可以点击**Flutter 热重载**按钮手动触发。

    - 当应用通过 VS Code 启动时，保存文件会自动触发热重载。您也可以使用键盘快捷键`Control-F5`运行**Flutter: 热重载**命令手动触发。


    如果应用热重载成功，您可以在控制台中看到输出，其中包含热重载的详细信息。图 2-3 显示了在 Android Studio 中通过保存文件触发热重载时的控制台输出。


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig3_HTML.jpg](img/479501_1_En_2_Fig3_HTML.jpg)


    图 2-3 热重载输出


    热重载非常有用，您可能希望它适用于所有代码更改。不幸的是，仍有一些情况下热重载可能无效：


    - 您的代码更改引入了编译错误。您需要先修复这些编译错误，热重载才能继续进行。

    - 热重载会保留应用状态，并尝试使用保留的状态重建 widget 树以反映新的更改。如果您的代码更改修改了状态，则对 widget 的更改可能无法与旧的保留状态兼容。假设我们有一个用于显示用户个人资料信息的
    widget。在之前的版本中，用户的状态只包含用户名和姓名。在新版本中，状态更新为包含一个新属性`email`，并且 widget 也更新为显示这个新属性。热重载后，widget
    仍然使用旧状态，看不到新属性。在这种情况下，需要热重启来获取状态更改。

    - 全局变量和静态字段的初始化器的更改只能通过热重启来生效。

    - 应用`main()`方法的更改可能只能通过热重启来生效。

    - 当枚举类型更改为常规类，或常规类更改为枚举类型时，不支持热重载。

    - 更改类型的泛型声明时，不支持热重载。


    如果热重载无效，您仍然可以使用热重启，它会从头开始重启应用。您可以确信热重启会反映您所做的所有更改。根据 Flutter 应用的启动方式不同，触发热重启的方法也不同：


    - 当应用通过`flutter run`启动时，在终端窗口中输入`R`即可触发热重启。

    - 当应用通过 Android Studio 启动时，点击**Flutter 热重启**按钮即可触发热重启。

    - 当应用通过 VS Code 启动时，点击重启按钮，或在命令面板中运行**Flutter: 热重启**命令来触发热重启。


    ## 2.3 升级 Flutter SDK


    ### 问题


    您希望保持 Flutter SDK 为最新版本，以获取最新的功能、错误修复和性能改进。


    ### 解决方案


    跟踪不同的 Flutter SDK 频道并升级 SDK。

    '
- fmt: '### Discussion


    From time to time, we may need to upgrade Flutter SDK to get new features, bug
    fixes, and performance improvements. Flutter SDK has different channels to get
    updates. Each channel is actually a Git branch in Flutter SDK’s repository. Executing
    the command `flutter channel` shows all available channels; see Figure [2-4](#479501_1_En_2_Chapter.xhtml#Fig4).
    The channel marked with a star symbol is the current channel. In Figure [2-4](#479501_1_En_2_Chapter.xhtml#Fig4),
    the current channel is `stable`.


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig4_HTML.jpg](images/479501_1_En_2_Chapter/479501_1_En_2_Fig4_HTML.jpg)


    Figure 2-4 — Output of the command `flutter channel`


    Table [2-1](#479501_1_En_2_Chapter.xhtml#Tab1) shows four channels of Flutter
    SDK.


    **Table 2-1** Flutter SDK channels


    | Channel | Description |

    | --- | --- |

    | `stable` | Channel for stable builds. It’s the recommended channel for product
    development. |

    | `beta` | Channel for best build of the previous month. |

    | `dev` | Channel for latest fully tested build. More tests are run in this channel
    than `master`. |

    | `master` | Channel for active development with latest changes. If you want to
    try the latest features, this is the channel to track. Code in this channel usually
    works, but sometimes it may break accidentally. Use this channel at your own risk.
    |


    We can use the command `flutter channel [<channel-name>]` to switch to a different
    channel. For example, `flutter channel master` changes to the `master` channel.
    To get updates of the current channel, run the command `flutter upgrade`. The
    following command shows a typical way to switch channels.


    ```

    $ flutter channel master

    $ flutter upgrade

    ```


    ## 2.4 Debugging Flutter Apps in Android Studio


    ### Problem


    You are using Android Studio to develop Flutter apps and want to find out why
    the code doesn’t work the way you expected.


    ### Solution


    Use the built-in Flutter debugging support in Android Studio.


    ### Discussion


    Debugging is an important part of developers’ daily routines. When debugging,
    we can see the actual code execution path in the runtime and inspect values of
    variables. If you have experiences with other programming languages, you should
    already have the basic debugging skills.


    In Android Studio, you can click on the left gutter of a line in the editor to
    add breakpoints to that line. Click the **Debug** icon or use the menu **Run**
    ➤ **Debug** to start the app in debug mode; see Figure [2-5](#479501_1_En_2_Chapter.xhtml#Fig5).


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig5_HTML.jpg](images/479501_1_En_2_Chapter/479501_1_En_2_Fig5_HTML.jpg)


    Figure 2-5 — Click Debug icon to start debugging


    Once the code execution hits a breakpoint, the execution is paused. You can inspect
    values of variables and interactively continue the execution using the buttons
    in the debug toolbar. There are different panels to see related information in
    debug mode.


    Frames view in Figure [2-6](#479501_1_En_2_Chapter.xhtml#Fig6) shows the current
    execution frames.


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig6_HTML.jpg](images/479501_1_En_2_Chapter/479501_1_En_2_Fig6_HTML.jpg)


    Figure 2-6 — Frames view in Android Studio


    Variables view in Figure [2-7](#479501_1_En_2_Chapter.xhtml#Fig7) shows values
    of variables and objects. In this view, we can also add expressions to watch for
    values.


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig7_HTML.jpg](images/479501_1_En_2_Chapter/479501_1_En_2_Fig7_HTML.jpg)


    Figure 2-7 — Variables view in Android Studio


    Console view in Figure [2-8](#479501_1_En_2_Chapter.xhtml#Fig8) shows messages
    displayed to the console.


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig8_HTML.jpg](images/479501_1_En_2_Chapter/479501_1_En_2_Fig8_HTML.jpg)


    Figure 2-8 — Console view in Android Studio


    ## 2.5 Viewing Outline of Flutter Apps in Android Studio


    ### Problem


    You want to see outline of Flutter apps to have a clear view of how widgets are
    organized.


    ### Solution


    Use Flutter Outline view in Android Studio.


    ### Discussion


    In Android Studio, Flutter Outline view can be opened from menu **View** ➤ **Tool
    Windows** ➤ **Flutter Outline**. This view displays a tree-like hierarchy of current
    open file; see Figure [2-9](#479501_1_En_2_Chapter.xhtml#Fig9). Flutter Outline
    view is linked with the file editor. Selecting an element in the Flutter Outline
    view makes the editor to scroll and highlight the source code of this element.
    This link is bidirectional; selection in the editor also causes corresponding
    element to be selected in the Flutter Outline view.


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig9_HTML.jpg](images/479501_1_En_2_Chapter/479501_1_En_2_Fig9_HTML.jpg)


    Figure 2-9 — Flutter Outline view in Android Studio


    The toolbar in Flutter Outline view has different actions to manage widgets. For
    example, Center widget button wraps the current widget with a `Center` widget.


    ## 2.6 Debugging Flutter Apps in VS Code


    ### Problem


    You are using VS Code to develop Flutter apps and want to find out why the code
    doesn’t work the way you expected.


    ### Solution


    Use the built-in Flutter debugging support in VS Code.


    ### Discussion


    In VS Code, you can click on the left gutter of a line in the editor to add breakpoints
    to that line. Use the menu **Debug** ➤ **Start Debugging** to start the app in
    debug mode.


    Figure [2-10](#479501_1_En_2_Chapter.xhtml#Fig10) shows the VS Code view in debug
    mode. There are different panels in this view:


    *   Variables – Shows values of variables.

    *   Watch – Manages watch expressions and views their values.

    *   Call stack – Views current call stack.

    *   Breakpoints – Views added breakpoints.

    *   Debug console – Views messages output to the console.


    The actions bar in the top contains actions including Continue, Step Over, Step
    Into, Step Out, Restart, and Stop.


    ![../images/479501_1_En_2_Chapter/479501_1_En_2_Fig10_HTML.jpg](images/479501_1_En_2_Chapter/479501_1_En_2_Fig10_HTML.jpg)


    Figure 2-10 — Debug in VS Code


    ## 2.7 Creating Flutter Projects


    ### Problem


    You want to create different types of Flutter projects.


    ### Solution


    Use the command `flutter create` with different arguments.


    ### Discussion


    `flutter create` is the command provided by Flutter SDK to create Flutter projects.
    In Recipe 1-10, we use this command to create a simple Flutter app. In Recipe
    1-11, we also see the wizard provided by Android to create new Flutter projects,
    which allows customizations of the created projects. Under the hood, Android Studio
    also uses `flutter create` command. This command supports different arguments
    for various scenarios. The following code is the basic usage of `flutter create`.
    The output directory will contain files of the new project.


    ```

    $ flutter create

    ```'
