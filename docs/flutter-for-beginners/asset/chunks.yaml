  trans: '

    ### 讨论


    在将 Flutter 应用部署到 iOS 设备之前，需要运行 `flutter doctor` 来验证 iOS 工具链是否正确配置。要在设备上开发和测试 Flutter
    应用，你需要有一个 Apple ID。如果你想将应用分发到 App Store，还需要注册 Apple Developer Program。


    首次连接物理设备进行 iOS 开发时，需要信任该 Mac 电脑以连接你的设备。Flutter 应用在部署到设备前需要进行签名。在 Xcode 中打开 Flutter
    应用的 `ios/Runner.xcworkspace` 文件。在 **General** 标签页的 **Signing** 部分选择正确的团队。如果你选择已连接的设备作为运行目标，Xcode
    将完成代码签名所需的必要配置。**Bundle Identifier** 必须是唯一的。


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig4_HTML.jpg](img/479501_1_En_1_Fig4_HTML.jpg)


    图 1-4


    在 Xcode 中进行应用签名


    Flutter 应用可以通过 Xcode 或 `flutter run` 命令部署到设备。首次部署应用时，可能需要在 iOS 设备上“设置”应用的 **通用**
    ➤ **描述文件与设备管理** 中信任开发证书。


    ## 1.7 搭建 Android 平台


    ### 问题


    你想为 Android 平台开发 Flutter 应用。


    ### 解决方案


    安装 Android Studio 以在你的本地机器上搭建 Android 平台。


    ### 讨论


    要为 Android 平台开发 Flutter 应用，我们需要先搭建 Android 平台。Flutter SDK 需要完整安装 Android Studio
    以获取其 Android 平台依赖，因此我们必须安装 Android Studio。


    访问 Android Studio 下载页面（`https://developer.android.com/studio/`）并点击“下载 Android
    Studio”按钮。你需要接受条款和条件才能下载。下载页面会检查你的平台并提供最合适的版本进行下载。如果提供的选项不是你想要的，请点击“下载选项”并从所有下载选项列表中进行选择；见图
    1-5。


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig5_HTML.jpg](img/479501_1_En_1_Fig5_HTML.jpg)


    图 1-5


    Android Studio 的下载选项


    Android Studio 提供了一个基于 GUI 的安装程序，因此非常容易在本地机器上安装和运行。安装 Android Studio 也会安装 Android
    SDK、Android SDK 平台工具和 Android SDK 构建工具。即使你选择不使用 Android Studio 作为 IDE，Android
    开发仍然需要 Android SDK 及其相关工具。


    在 Android Studio 偏好设置的 Android SDK 页面中，你还可以安装其他 Android SDK 平台和工具；见图 1-6。Android
    Studio 还会提示已安装的 Android SDK 平台和工具的可用更新。


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig6_HTML.jpg](img/479501_1_En_1_Fig6_HTML.jpg)


    图 1-6


    在 Android Studio 中管理 Android SDK


    ## 1.8 搭建 Android 模拟器


    ### 问题


    你需要一种快速的方法来测试适用于 Android 平台的 Flutter 应用。


    ### 解决方案


    搭建 Android 模拟器。


    ### 讨论


    在开发 Flutter 应用时，你可以在 Android 模拟器上运行它们，以查看应用运行的效果。要搭建 Android 模拟器，可以按照以下步骤操作。


    在 Android Studio 中打开一个 Android 项目，选择 **Tools** ➤ Android ➤ **AVD Manager** 以打开
    AVD Manager，然后点击“创建虚拟设备…”；见图 1-7。


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig7_HTML.jpg](img/479501_1_En_1_Fig7_HTML.jpg)


    图 1-7


    Android 虚拟设备管理器


    选择一个设备定义，例如 Nexus 6P，然后点击“下一步”；见图 1-8。


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig8_HTML.jpg](img/479501_1_En_1_Fig8_HTML.jpg)


    图 1-8


    选择硬件


    为你想要模拟的 Android 版本选择一个系统映像，然后点击“下一步”；见图 1-9。


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig9_HTML.jpg](img/479501_1_En_1_Fig9_HTML.jpg)


    图 1-9


    选择系统映像


    为模拟性能选择 **Hardware - GLE 2.0** 以启用硬件加速，然后点击“完成”；见图 1-10。


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig10_HTML.jpg](img/479501_1_En_1_Fig10_HTML.jpg)


    图 1-10


    选择模拟性能


    一个新的 AVD 被创建并显示在 AVD Manager 中。如果你想了解更多关于 AVD 配置的详细信息，Android Studio 官方网站提供了一个全面的指南（`https://developer.android.com/studio/run/managing-avds`），介绍如何管理
    AVD。


    在 AVD Manager 中，点击绿色的三角形按钮启动模拟器。模拟器启动并显示默认的 Android 主屏幕可能需要一些时间。


    ## 1.9 搭建 Android 设备


    ### 问题


    你已经在模拟器上完成了 Flutter 应用的测试，现在想在实际的 Android 设备上测试它们。


    ### 解决方案


    配置你的 Android 设备以运行 Flutter 应用。


    ### 讨论


    要配置你的 Android 设备，可以按照以下步骤操作：


    1.  你需要在设备上启用开发者选项和 USB 调试。请查看 Android 官方网站上的说明（`https://developer.android.com/studio/debug/dev-options#enable`）。你可能还需要在
    Windows 机器上安装 Google USB 驱动程序（`https://developer.android.com/studio/run/win-usb`）。


    2.  使用 USB 数据线将设备连接到电脑。设备会弹出一个对话框请求权限，授权你的电脑访问设备。


    3.  运行命令 `flutter devices` 以验证 Flutter SDK 能否识别你的设备。


    Flutter 应用可以通过 Android Studio 或 `flutter run` 命令部署到设备。


    ## 1.10 使用命令行创建 Flutter 应用


    ### 问题


    你已经搭建好了本地环境来开发 Flutter 应用。虽然使用 Android Studio 或 VS Code 是开发的良好选择，但你仍可能想知道如何通过命令行来实现。


    ### 解决方案


    使用 Flutter SDK 中的命令来创建和构建 Flutter 应用。


    ### 讨论


    使用像 Android Studio 和 VS Code 这样的工具可以使 Flutter 开发变得更加容易。然而，了解如何使用命令行工具构建 Flutter
    应用仍然很有价值。这对于持续集成非常重要。它也使你能够使用任何其他编辑器来开发 Flutter 应用。


    `flutter create` 命令可用于创建一个新的 Flutter 应用。实际上，Android Studio 和 VS Code 都使用此命令来创建新的
    Flutter 应用。以下命令在 `flutter_app` 目录中创建一个新的 Flutter 应用。


    ```

    $ flutter create flutter_app

    ```


    此命令在指定目录中创建各种文件，作为新应用的框架代码。导航到 `flutter_app` 目录，并使用 `flutter run` 来运行此应用。


    ## 1.11 使用 Android Studio 创建 Flutter 应用


    ### 问题


    你想拥有一个强大的 IDE，能满足开发 Flutter 应用时的大部分需求。


    ### 解决方案


    使用 Android Studio 创建 Flutter 应用。

