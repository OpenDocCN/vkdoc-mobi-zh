- fmt: "### Discussion\n\n如果你参与过用户界面的开发，应该对“小部件”或“组件”等概念并不陌生。这些概念代表了创建用户界面的可复用构建块。一个好的用户界面库应拥有大量高质量且易于使用的组件。按钮、图标、图片、菜单、对话框和表单输入等都是组件的例子。组件可大可小，复杂的组件通常由多个小型组件组成。你可以遵循组件模型创建自己的组件，也可以选择将组件分享给社区。一个良好的组件生态系统是用户界面库成功的关键因素。\n\
    \n`Flutter`使用`widget`来描述用户界面中的可复用构建块。与其他库相比，`Flutter`中的`widget`概念更为广泛。不仅按钮和表单输入等常见组件是`widget`，布局约束在`Flutter`中也以`widget`的形式表达。例如，如果你想将一个`widget`放置在盒子中央，只需将该`widget`包装进一个`Center`\
    \ widget中。`widget`也用于获取上下文数据，例如，`DefaultTextStyle` widget会获取适用于未设置样式的`Text` widget的`TextStyle`。\n\
    \n`Flutter`中的`widget`是用户界面某部分的不可变描述。`widget`类的所有字段都是`final`的，并在构造函数中设置。`widget`构造函数仅包含命名参数。一个`widget`可以有一个或多个子`widget`。`Flutter`应用的`widget`会形成一个树状层次结构。`Flutter`应用入口文件的`main()`方法使用`runApp()`方法来启动应用。`runApp()`的唯一参数是一个`Widget`对象，该对象是应用`widget`树的根节点。`widget`只是静态配置，用于描述如何配置层次结构中的子树。要实际运行应用，我们需要一种管理`widget`实例化的方式。\n\
    \n`Flutter`使用`Element`来表示树中特定位置上`Widget`的实例化。一个`Widget`可以被实例化零次或多次。将`Widget`转化为`Element`的过程称为“膨胀（inflation）”。`Widget`类有一个`createElement()`方法，用于将`widget`膨胀为`Element`的具体实例。`Flutter`框架负责管理元素的声明周期。与元素关联的`widget`可能随时间变化，框架会更新元素以使用新的配置。\n\
    \n运行应用时，`Flutter`框架负责渲染元素以创建渲染树，从而使最终用户能够看到用户界面。渲染树由`RenderObject`组成，其根节点为`RenderView`。如果你使用`Android\
    \ Studio`，你可以在 **Flutter Inspector** 视图中查看`widget`树和渲染树。选择 `View ➤ Tool Windows\
    \ ➤ Flutter Inspector` 即可打开`Flutter Inspector`视图。图 [4-1](#479501_1_En_4_Chapter.xhtml#Fig1)\
    \ 展示了`Flutter Inspector`中的`widget`树，顶部面板显示`widget`树，底部面板显示某个`widget`的详细信息。\n\n\
    ![../images/479501_1_En_4_Chapter/479501_1_En_4_Fig1_HTML.jpg](images/479501_1_En_4_Chapter/479501_1_En_4_Fig1_HTML.jpg)\n\
    \n**图 4-1**  \nFlutter Inspector 中的 Widget 树\n\n图 [4-2](#479501_1_En_4_Chapter.xhtml#Fig2)\
    \ 展示了`Flutter Inspector`中的渲染树，其根节点是一个`RenderView`。\n\n![../images/479501_1_En_4_Chapter/479501_1_En_4_Fig2_HTML.jpg](images/479501_1_En_4_Chapter/479501_1_En_4_Fig2_HTML.jpg)\n\
    \n**图 4-2**  \nFlutter Inspector 中的渲染树\n\n## 4.2 理解 `BuildContext`\n\n### 问题\n\
    \n你想访问与`widget`树中某个`widget`相关的信息。\n\n### 解决方案\n\n`WidgetBuilder`函数有一个`BuildContext`参数，用于访问与`widget`树中某个`widget`相关的信息。你可以在`StatelessWidget.build()`和`State.build()`方法中看到`BuildContext`。\n\
    \n### 讨论\n\n构建一个`widget`时，该`widget`在`widget`树中的位置可能决定其行为，特别是当它有一个`InheritedWidget`作为祖先时。`BuildContext`类提供了访问与该位置相关信息的的方法，见表\
    \ [4-1](#479501_1_En_4_Chapter.xhtml#Tab1)。\n\n**表 4-1**  \nBuildContext 的方法\n\
    \n| 名称 | 描述 |\n| --- | --- |\n| `ancestorInheritedElementForWidgetOfExactType`\
    \ | 获取与给定`InheritedWidget`类型最近的祖先`widget`对应的`InheritedElement`。 |\n| `ancestorRenderObjectOfType`\
    \ | 获取最近的`RenderObjectWidget`祖先`widget`的`RenderObject`。 |\n| `ancestorStateOfType`\
    \ | 获取最近的`StatefulWidget`祖先`widget`的`State`对象。 |\n| `rootAncestorStateOfType`\
    \ | 获取最远的`StatefulWidget`祖先`widget`的`State`对象。 |\n| `ancestorWidgetOfExactType`\
    \ | 获取最近的祖先`Widget`。 |\n| `findRenderObject` | 获取当前`widget`的`RenderObject`。 |\n\
    | `inheritFromElement` | 将此`BuildContext`注册到给定的祖先`InheritedElement`，以便当祖先的`widget`发生变化时，此`BuildContext`会重新构建。\
    \ |\n| `inheritFromWidgetOfExactType` | 获取给定类型的最近`InheritedWidget`，并注册此`BuildContext`，以便当该`widget`发生变化时，此`BuildContext`会重新构建。\
    \ |\n| `visitAncestorElements` | 访问祖先元素。 |\n| `visitChildElements` | 访问子元素。 |\n\
    \n`BuildContext`实际上是`Element`类的接口。在`StatelessWidget.build()`和`State.build()`方法中，`BuildContext`对象代表当前`widget`被膨胀的位置。在清单\
    \ [4-1](#479501_1_En_4_Chapter.xhtml#PC1) 中，使用了`ancestorWidgetOfExactType()`方法来获取类型为`Column`的祖先`widget`。\n\
    \n```\nclass WithBuildContext extends StatelessWidget {\n@override\nWidget build(BuildContext\
    \ context) {\nColumn column = context.ancestorWidgetOfExactType(Column);\nreturn\
    \ Text(column.children.length.toString());\n}\n}\n```\n\n**清单 4-1**  \n使用 BuildContext\n\
    \n## 4.3 理解无状态小部件\n\n### 问题\n\n你想创建一个没有可变状态的`widget`。\n\n### 解决方案\n\n继承`StatelessWidget`类。\n\
    \n### 讨论\n\n当使用`widget`来描述用户界面的某一部分时，如果该部分可以完全通过`widget`自身的配置信息和其被膨胀时的`BuildContext`来描述，那么这个`widget`应该继承自`StatelessWidget`。创建`StatelessWidget`类时，你需要实现`build()`方法，该方法接受一个`BuildContext`并返回一个`Widget`。在清单\
    \ [4-2](#479501_1_En_4_Chapter.xhtml#PC2) 中，`HelloWorld`类继承自`StatelessWidget`类，并在`build()`方法中返回了一个`Center`\
    \ widget。\n\n```\nclass HelloWorld extends StatelessWidget {\nconst HelloWorld({Key\
    \ key}) : super(key: key);\n@override\nWidget build(BuildContext context) {\n\
    return Center(\nchild: Text('Hello World!'),\n);\n}\n}\n```\n\n**清单 4-2**  \n\
    StatelessWidget 示例\n\n## 4.4 理解有状态小部件\n\n### 问题\n\n你想创建一个具有可变状态的`widget`。\n\n\
    ### 解决方案\n\n继承`StatefulWidget`类。"
  raw: '### Discussion


    If you have been involved in development of user interface, you should be familiar
    with concepts like widgets or components. These concepts represent reusable building
    blocks to create user interface. A good user interface library should have a large
    number of high-quality and easy-to-use components. Buttons, icons, images, menus,
    dialogs, and form inputs are all examples of components. Components can be big
    or small. Complicated components are usually composed of small components. You
    can create your own components by following the component model. You can also
    choose to share your components to the community. A good eco-system of components
    is a key factor for a user interface library to be successful.


    Flutter uses widgets to describe reusable building blocks in the user interface.
    Comparing to other libraries, widget in Flutter is a much broader concept. Not
    only common components like buttons and form inputs are widgets, layout constraints
    are also expressed as widgets in Flutter. For example, if you want to place a
    widget in the center of a box, you simply wrap the widget into a `Center` widget.
    Widgets are also used to retrieve context data. For example, `DefaultTextStyle`
    widget gets the `TextStyle` applies to un-styled `Text` widgets.


    Widget in Flutter is an immutable description of a part of the user interface.
    All fields of a widget class are final and set in the constructor. Widget constructors
    only have named parameters. A widget can have one or many widgets as the children.
    Widgets of a Flutter app creates a tree-like hierarchy. The `main()` method of
    a Flutter app’s entry point file uses the `runApp()` method to start the app.
    The only parameter of `runApp()` is a `Widget` object. This `Widget` object is
    the root of the app’s widgets tree. Widgets are only static configurations that
    describe how to configure a subtree in the hierarchy. To actually run the app,
    we need a way to manage instantiation of widgets.


    Flutter uses `Element` to represent an instantiation of a `Widget` at a particular
    location in the tree. A `Widget` can be instantiated zero or many times. The process
    to turn `Widget`s to `Element`s is called inflation. `Widget` class has a `createElement()`
    method to inflate the widget to a concrete instance of `Element`. Flutter framework
    is responsible for managing the lifecycle of elements. The widget associated with
    an element may change over time. The framework updates the element to use the
    new configuration.


    When running the app, Flutter framework is responsible for rendering elements
    to create a render tree, so the end user can actually see the user interface.
    A render tree is composed of `RenderObject`s with the root of a `RenderView`.
    If you are using Android Studio, you can actually see the widgets tree and the
    render tree in **Flutter Inspector** view. Select View ➤ Tool Windows ➤ Flutter
    Inspector to open the Flutter Inspector view. Figure [4-1](#479501_1_En_4_Chapter.xhtml#Fig1)
    shows the widgets tree in Flutter Inspector. The top panel shows the widgets tree,
    while the bottom panel shows the details of a widget.


    ![../images/479501_1_En_4_Chapter/479501_1_En_4_Fig1_HTML.jpg](images/479501_1_En_4_Chapter/479501_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Widgets tree in Flutter Inspector


    Figure [4-2](#479501_1_En_4_Chapter.xhtml#Fig2) shows the render tree in Flutter
    Inspector. The root is a `RenderView`.


    ![../images/479501_1_En_4_Chapter/479501_1_En_4_Fig2_HTML.jpg](images/479501_1_En_4_Chapter/479501_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Render tree in Flutter Inspector


    ## 4.2 Understanding BuildContext


    ### Problem


    You want to access information related to a widget in the widgets tree.


    ### Solution


    `WidgetBuilder` functions have a `BuildContext` parameter to access information
    related to a widget in the widgets tree. You can see `BuildContext` in `StatelessWidget.build()`
    and `State.build()` methods .


    ### Discussion


    When building a widget, the location of the widget in the widgets tree may determine
    its behavior, especially when it has an `InheritedWidget` as its ancestor. `BuildContext`
    class provides methods to access information related to the location; see Table
    [4-1](#479501_1_En_4_Chapter.xhtml#Tab1).


    Table 4-1


    Methods of BuildContext


    | Name | Description |

    | --- | --- |

    | `ancestorInheritedElementForWidgetOfExactType` | Get the `InheritedElement`
    corresponding to the nearest ancestor widget of the given type of `InheritedWidget`.
    |

    | `ancestorRenderObjectOfType` | Get the `RenderObject` of the nearest ancestor
    `RenderObjectWidget` widget. |

    | `ancestorStateOfType` | Get the `State` object of the nearest ancestor `StatefulWidget`
    widget. |

    | `rootAncestorStateOfType` | Get the `State` object of the furthest ancestor
    `StatefulWidget` widget. |

    | `ancestorWidgetOfExactType` | Get the nearest ancestor `Widget`. |

    | `findRenderObject` | Get the current `RenderObject` for the widget. |

    | `inheritFromElement` | Register this `BuildContext` with the given ancestor
    `InheritedElement` such that this `BuildContext` is rebuilt when the ancestor’s
    widget changes. |

    | `inheritFromWidgetOfExactType` | Get the nearest `InheritedWidget` of the given
    type and register this `BuildContext` such that this `BuildContext` is rebuilt
    when the widget changes. |

    | `visitAncestorElements` | Visit ancestor elements. |

    | `visitChildElements` | Visit children elements. |


    `BuildContext` is actually the interface of `Element` class. In `StatelessWidget.build()`
    and `State.build()` methods , the `BuildContext` object represents the location
    where the current widget is inflated. In Listing [4-1](#479501_1_En_4_Chapter.xhtml#PC1),
    `ancestorWidgetOfExactType()` method is used to get the ancestor widget of type
    `Column`.


    ```

    class WithBuildContext extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    Column column = context.ancestorWidgetOfExactType(Column);

    return Text(column.children.length.toString());

    }

    }

    Listing 4-1

    Use BuildContext

    ```


    ## 4.3 Understanding Stateless Widget


    ### Problem


    You want to create a widget that has no mutable state.


    ### Solution


    Extend from `StatelessWidget` class.


    ### Discussion


    When using a widget to describe a part of user interface, if the part can be fully
    described using the configuration information of the widget itself and the `BuildContext`
    in which it’s inflated, then this widget should extend from `StatelessWidget`.
    When creating a `StatelessWidget` class, you need to implement the `build()` method
    which accepts a `BuildContext` and returns a `Widget`. In Listing [4-2](#479501_1_En_4_Chapter.xhtml#PC2),
    `HelloWorld` class extends from `StatelessWidget` class and returns a `Center`
    widget in the `build()` method.


    ```

    class HelloWorld extends StatelessWidget {

    const HelloWorld({Key key}) : super(key: key);

    @override

    Widget build(BuildContext context) {

    return Center(

    child: Text(''Hello World!''),

    );

    }

    }

    Listing 4-2

    Example of StatelessWidget

    ```


    ## 4.4 Understanding Stateful Widget


    ### Problem


    You want to create a widget that has mutable state.


    ### Solution


    Extend from `StatefulWidget` class.'
