    \ like Flex, Row, and Column don’t support scrolling, and these widgets are not\
    \ designed to be used to display items when scrolling is required. If you want\
    \ to display a large number of items, you should use ListView widget. You can\
    \ think ListView as the scrollable counterpart of Flex widget.\n\nThere are three\
    \ different ways to create ListView widgets using different constructors:\n\n\
    *   Create from a static list of children widgets.\n\n*   Create by building children\
    \ on demand based on the scrolling position.\n\n*   Create a custom implementation.\n\
    \n    This recipe focuses on the first two ways.\n\n### ListView with Static Children\n\
    \nIf you have a static list of children that may exceed the size of their parent\
    \ widget, you can wrap them in a ListView widget to enable scrolling. This is\
    \ done by invoking the ListView() constructor with the children parameter of type\
    \ Widget[]. The scrolling direction is determined by the scrollDirection parameter\
    \ of type Axis. The default scroll direction is Axis.vertical. If you want to\
    \ display the children in a reverse order, you can set the reverse parameter to\
    \ true. Listing [7-1](#479501_1_En_7_Chapter.xhtml#PC1) shows a ListView widget\
