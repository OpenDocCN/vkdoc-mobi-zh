    ### 问题


    您想显示 Material Design 对话框。


    ### 解决方案


    使用 `showDialog()` 函数以及 `Dialog`、`SimpleDialog` 和 `AlertDialog` widget。

    '
- fmt: '### Discussion


    To use Material Design dialogs, you need to create dialog widgets and show them.
    `Dialog` class and its subclasses `SimpleDialog` and `AlertDialog` can be used
    to create dialogs.


    `SimpleDialog` widget presents several options to the user. Options are represented
    using `SimpleDialogOption` class. A `SimpleDialogOption` widget can have a child
    widget and an `onPressed` callback. When creating `SimpleDialog`, you can provide
    a list of children and an optional title. `AlertDialog` widget presents content
    and a list of actions to the user. `AlertDialog` is used to acknowledge user or
    ask for confirmation.


    To show dialogs, you should use `showDialog()` function. Invoking this function
    pushes dialog route to the navigator. Dialogs are closed using `Navigator.pop()`
    method. The `showDialog()` function uses a `WidgetBuilder` function to build the
    dialog content. The return value of `showDialog()` function is a `Future<T>` object
    which is actually the return value of `Navigator.push()` method.


    In Listing [8-10](#479501_1_En_8_Chapter.xhtml#PC10), pressing the button shows
    a simple dialog with two options.


    ```

    RaisedButton(

    child: Text(''Show SimpleDialog''),

    onPressed: () async {

    String result = await showDialog(

    context: context,

    builder: (BuildContext context) {

    return SimpleDialog(

    title: Text(''Choose Color''),

    children: [

    SimpleDialogOption(

    child: Text(''Red''),

    onPressed: () {

    Navigator.pop(context, ''Red'');

    },

    ),

    SimpleDialogOption(

    child: Text(''Green''),

    onPressed: () {

    Navigator.pop(context, ''Green'');

    },

    ),

    ],

    );

    });

    print(result);

    },

    );

