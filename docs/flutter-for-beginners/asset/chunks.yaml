    assert(value == null);

    var count = 5;

    while(count-- != 0) {

    print(count);

    }

    Listing 3-5

    Booleans

    ```


    #### Lists and Maps


    Lists and maps are commonly used collection types. In Dart, arrays are `List`
    objects. Lists and maps can be created using literals or constructors. It’s recommended
    to use collection literals when possible. Listing [3-6](#479501_1_En_3_Chapter.xhtml#PC6)
    shows how to create lists and maps using literals and constructors.


    ```

    var list1 = [1, 2, 3];

    var list2 = List(3);

    var map1 = {''a'': ''A'', ''b'': ''B''};

    var map2 = Map();

    Listing 3-6

    Lists and maps

    ```


    #### Runes


    Runes are UTF-32 code points of a string. To express 32-bit Unicode values in
    a string, we can use the form `\uXXXX`, where `XXXX` is the four-digit hexadecimal
    value of the code point. If the code point cannot be expressed as four-digit hexadecimal
    value, then `{}` is required to wrap those digits, for example, `\u{XXXXX}`. In
    Listing [3-7](#479501_1_En_3_Chapter.xhtml#PC7), the string value contains two
    emojis.


    ```

    var value = ''\u{1F686} \u{1F6B4}'';

    print(value);

    Listing 3-7

    Runes

    ```


    #### Symbols


    A Symbol object represents an operator or identifier. Symbols can be created using
    constructor `Symbol(<name>)` or symbol literal #<name>. Symbols created with the
    same name are equal; see Listing</name> [3-8](#479501_1_En_3_Chapter.xhtml#PC8).
    Symbols should be used when you want to reference identifiers by name.


    ```

    assert(Symbol(''a'') == #a);

    Listing 3-8

    Symbols

    ```


    ## 3.2 Using Enumerated Types


    ### Problem


    You want to have a type-safe way to declare a set of constant values.


    ### Solution


    Use enumerated type.


    ### Discussion


    Like other programming languages, Dart has enumerated types. To declare an enumerated
    type, use the `enum` keyword. Each value in an enum has an `index` getter to get
    the zero-based position of the value. Use `values` to get a list of all values
    in an enum. Enums are usually used in `switch` statements. In Listing [3-9](#479501_1_En_3_Chapter.xhtml#PC9),
    the enum type `TrafficColor` has three values. The index of first value `red`
    is `0`.


    ```

    enum TrafficColor { red, green, yellow }

    void main() {

    assert(TrafficColor.red.index == 0);

    assert(TrafficColor.values.length == 3);

    var color = TrafficColor.red;

    switch (color) {

    case TrafficColor.red:

    print(''stop'');

    break;

    case TrafficColor.green:

    print(''go'');

    break;

    case TrafficColor.yellow:

    print(''be careful'');

    }

    }

    Listing 3-9

    Enumerated type

    ```


    ## 3.3 Using Dynamic Type


    ### Problem


    You don’t know the type of an object or you don’t care about the type.


    ### Solution


    Use the `dynamic` type.


    ### Discussion


    Dart is a strong-typed language. Most of the time, we want an object to have a
    defined type. However, sometimes we may not know or don’t care about the actual
    type; we can use `dynamic` as the type. The dynamic type is often confused with
    the `Object` type. Both `Object` and `dynamic` permit all values. `Object` should
    be used if you want to state that all objects are accepted. If the type is `dynamic`,
    we can use `is` operator to check whether it’s the desired type. The actual type
    can be retrieved using `runtimeType`. In Listing [3-10](#479501_1_En_3_Chapter.xhtml#PC10),
    the actual type of `value` is `int`, then the type is changed to `String`.


    ```

    dynamic value = 1;

    print(value.runtimeType);

    value = ''test'';

    if (value is String) {

    print(''string'');

    }

    Listing 3-10

    Use dynamic type

    ```


    ## 3.4 Understanding Functions


    ### Problem


    You want to understand functions in Dart.


    ### Solution


    Functions in Dart are very powerful and flexible.'
