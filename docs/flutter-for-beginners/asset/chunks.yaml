    ## 13.2 使用手势


    ### 问题


    你希望允许用户使用手势来执行操作。


    ### 解决方案


    使用 `GestureDetector` 小部件来检测手势。


    ### 讨论


    移动应用的用户习惯于在执行操作时使用手势。例如，在查看图片库时，使用滑动手势可以轻松地在不同图片之间导航。在 Flutter 中，我们可以使用 `GestureDetector`
    小部件来检测手势，并为手势调用指定的回调。`GestureDetector` 构造函数有大量参数来为不同事件提供回调。一个手势在其生命周期内可能会分发多个事件。例如，水平拖动的手势可以分发三个事件。以下是这三个事件的处理程序参数：


    - `onHorizontalDragStart` 回调表示指针可能开始水平移动。

    - `onHorizontalDragUpdate` 回调表示指针正在水平方向移动。

    - `onHorizontalDragEnd` 回调表示指针不再与屏幕接触。


    不同事件的回调可以接收关于事件的详细信息。在代码清单 13-5 中，`GestureDetector` 小部件包装了一个 `Container` 小部件。在
    `onHorizontalDragEnd` 回调处理程序中，`DragEndDetails` 对象的 `velocity` 属性是指针的移动速度。我们使用此属性来确定拖动方向。


    ```

    class SwipingCounter extends StatefulWidget {

    @override

    _SwipingCounterState createState() => _SwipingCounterState();

    }

    class _SwipingCounterState extends State {

    int _count = 0;

    @override

    Widget build(BuildContext context) {

    return Column(

    children: [

    Text(''$_count''),

    Expanded(

    child: GestureDetector(

    child: Container(

    decoration: BoxDecoration(color: Colors.grey.shade200),

    ),

    onHorizontalDragEnd: (DragEndDetails details) {

    setState(() {

    double dx = details.velocity.pixelsPerSecond.dx;

    _count += (dx > 0 ? 1 : (dx < 0 ? -1 : 0));

    });

    },

    ),

    ),

    ] ,

    );

    }

    }

    代码清单 13-5

    使用 GestureDetector

    ```


    ## 13.3 支持多种语言区域


    ### 问题


    你希望应用支持多种语言区域。


    ### 解决方案


    使用 `Localizations` 小部件和 `LocalizationsDelegate` 类。

    '
- fmt: "### Discussion\n\nFlutter has built-in support for internalization. If you\
    \ want to support multiple locales, you need to use `Localizations` widget. `Localizations`\
    \ class uses a list of `LocalizationsDelegate` objects to load localized resources.\
    \ `LocalizationsDelegate<T>` class is a factory of a set of localized resources\
    \ of type `T`. The set of localized resources is usually a class with properties\
    \ and methods to provide localized values.\n\nTo create a `Localizations` object,\
    \ you need to provide the `Locale` object and a list of `LocalizationsDelegate`\
    \ objects. Most of the time, you don't need to explicitly create a `Localizations`\
    \ object. `WidgetsApp` widget already creates a `Localizations` object. `WidgetsApp`\
    \ constructor has parameters that are used by the `Localizations` object. When\
    \ you need to use localized values, you can use static `Localizations.of<T>(BuildContext\
    \ context, Type type)` method to get the nearest enclosing localized resources\
    \ object of the given type.\n\nBy default, Flutter only provides US English localizations.\
    \ To support other locales, you need to add Flutter's own localizations for those\
    \ locales first. This is done by adding `flutter_localizations` package to the\
    \ `dependencies` of `pubspec.yaml` file; see Listing [13-6](#479501_1_En_13_Chapter.xhtml#PC6).\
    \ With this package, you can use localized values defined in `MaterialLocalizations`\
    \ class.\n\n```\ndependencies:\n  flutter:\n    sdk: flutter\n  flutter_localizations:\n\
    \    sdk: flutter\nListing 13-6\nflutter_localizations\n```\n\nAfter adding the\
    \ `flutter_localizations` package, we need to enable those localized values. In\
    \ Listing [13-7](#479501_1_En_13_Chapter.xhtml#PC7), this is done by adding `GlobalMaterialLocalizations.delegate`\
    \ and `GlobalWidgetsLocalizations.delegate` to the `localizationsDelegates` list\
    \ of `MaterialApp` constructor. The value of `localizationsDelegates` parameter\
    \ is passed to the `Localizations` constructor. The `supportedLocales` parameter\
    \ specifies the supported locales.\n\n```\nMaterialApp(\n  localizationsDelegates:\
    \ [\n    GlobalMaterialLocalizations.delegate,\n    GlobalWidgetsLocalizations.delegate,\n\
    \  ],\n  supportedLocales: [\n    const Locale('en'),\n    const Locale('zh',\
    \ 'CN'),\n  ],\n);\nListing 13-7\nEnable Flutter localized values\n```\n\nIn Listing\
    \ [13-8](#479501_1_En_13_Chapter.xhtml#PC8), `MaterialLocalizations.of()` method\
    \ gets the `MaterialLocalizations` object from the build context. The `copyButtonLabel`\
    \ property is a localized value defined in `MaterialLocalizations` class. In the\
    \ runtime, the label of the button depends on the device's locale. `MaterialLocalizations.of()`\
    \ method uses `Localizations.of()` internally to look up the `MaterialLocalizations`\
    \ object.\n\n```\nRaisedButton(\n  child: Text(MaterialLocalizations.of(context).copyButtonLabel),\n\
    \  onPressed: () {},\n);\nListing 13-8\nUse localized values\n```\n\n`MaterialLocalizations`\
    \ class only provides a limit set of localized values. For your own apps, you\
    \ need to create custom localized resources classes. `AppLocalizations` class\
    \ in Listing [13-9](#479501_1_En_13_Chapter.xhtml#PC9) is a custom localized resources\
    \ class. `AppLocalizations` class has the `appName` property as an example of\
    \ simple localizable strings. The `greeting()` method is an example of localizable\
    \ strings that require parameters. `AppLocalizationsEn` and `AppLocalizationsZhCn`\
    \ classes are implementations of `AppLocalizations` class for `en` and `zh_CN`\
    \ locales, respectively.\n\n```\nabstract class AppLocalizations {\n  String get\
    \ appName;\n  String greeting(String name);\n  static AppLocalizations of(BuildContext\
    \ context) {\n    return Localizations.of(context, AppLocalizations);\n  }\n}\n\
    \nclass AppLocalizationsEn extends AppLocalizations {\n  @override\n  String get\
    \ appName => 'Demo App';\n  @override\n  String greeting(String name) {\n    return\
    \ 'Hello, $name';\n  }\n}\n\nclass AppLocalizationsZhCn extends AppLocalizations\
    \ {\n  @override\n  String get appName => '示例应用';\n  @override\n  String greeting(String\
    \ name) {\n    return '你好, $name';\n  }\n}\nListing 13-9\nAppLocalizations and\
    \ localized subclasses\n```\n\nWe also need to create a custom `LocalizationsDelegate`\
    \ class to load `AppLocalizations` objects. There are three methods need to be\
    \ implemented:\n\n*   `isSupported()` method checks whether a locale is supported.\n\
    *   `load()` method loads the localized resources object for a given locale.\n\
    *   `shouldReload()` method checks whether the `load()` method should be called\
    \ to load the resource again.\n\nIn the `load()` method of Listing [13-10](#479501_1_En_13_Chapter.xhtml#PC10),\
    \ `AppLocalizationsEn` or `AppLocalizationsZhCn` object is returned based on the\
    \ given locale.\n\n```\nclass _AppLocalizationsDelegate extends LocalizationsDelegate\
    \ {\n  const _AppLocalizationsDelegate();\n  static const List _supportedLocales\
    \ = [\n    const Locale('en'),\n    const Locale('zh', 'CN')\n  ];\n  @override\n\
    \  bool isSupported(Locale locale) {\n    return _supportedLocales.contains(locale);\n\
    \  }\n  @override\n  Future load(Locale locale) {\n    return Future.value(locale\
    \ == Locale('zh', 'CN')\n        ? AppLocalizationsZhCn()\n        : AppLocalizationsEn());\n\
    \  }\n  @override\n  bool shouldReload(LocalizationsDelegate old) {\n    return\
    \ false;\n  }\n}\nListing 13-10\nCustom LocalizationsDelegate\n```\n\n`_AppLocalizationsDelegate`\
    \ object needs to be added to the list of `localizationsDelegates` in Listing\
    \ [13-7](#479501_1_En_13_Chapter.xhtml#PC7). Listing [13-11](#479501_1_En_13_Chapter.xhtml#PC11)\
    \ shows an example of using `AppLocalizations` class.\n\n```\nText(AppLocalizations.of(context).greeting('John'))\n\
    Listing 13-11\nUse AppLocalizations\n```\n\n## 13.4 Generating Translation Files\n\
    \n### Problem\n\nYou want to extract localizable strings from code and integrate\
    \ translated strings.\n\n### Solution\n\nUse tools in `intl_translation` package."
