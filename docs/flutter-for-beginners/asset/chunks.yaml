    app, it can take the same arguments as `flutter run`, including `--debug`, `--profile`,
    `--flavor`, `--route`, `--target`, `--observatory-port`, `--pub`, `--no-pub`,
    and `--trace-startup`. These arguments have the same meaning as in `flutter run`.
    When connecting to an existing app, the argument `--use-existing-app` needs to
    be specified with the observatory URL of the existing app; see the following command.


    ```

    $ flutter drive --use-existing-app=http://localhost:50124

    ```


    When launching the test script, `flutter drive` uses a convention to locate the
    test script file based on the entry point file of the app. The entry point file
    is specified using the argument `--target` with a default value of `lib/main.dart`.
    `flutter drive` tries to find the test script file in the `test_driver` directory
    with the same name but with a suffix `_test.dart`. For example, if the entry point
    file is `lib/main.dart`, it tries to find the test script file `test_driver/main_test.dart`.
    You can explicitly specify the test script file using the argument `--driver`;
    see the following command.


    ```

    $ flutter drive --driver=test_driver/simple.dart

    ```


    If the app is started by `flutter drive`, then the app will be stopped after test
    script finishes, unless the argument `--keep-app-running` is specified to keep
    it running. When connecting to an existing app, the app keeps running after test
    script finishes, unless the argument `--no-keep-app-running` is specified to stop
    it. The following command keeps the app running after the test.


    ```

    $ flutter drive --keep-app-running

    ```


    ## 2.23 Enabling Bash Completion of Flutter SDK Commands


    ### Problem


    When typing Flutter SDK commands, you want to have the completion support for
    your shell.


    ### Solution


    Use the command `flutter bash-completion` to set up completion.


    ### Discussion


    With shell completion support, when you type some commands, the shell tries to
    complete it. `flutter bash-completion` prints the setup script to enable completion
    for bash and zsh. If no argument is provided, the setup script is printed out
    to the console. If a file path is provided, the setup script is then written to
    this file.


    On macOS, we can use Homebrew to install `bash-completion` first.


    ```

    $ brew install bash-completion

    ```


    If you are using bash, you need to modify the file `~/.bash_profile` to add the
    following line.


    ```

    [ -f /usr/local/etc/bash_completion ] && . /usr/local/etc/bash_completion

    ```


    Then you can run `flutter bash-completion` to save the setup script to the directory
    `/usr/local/etc/bash_completion.d`; see the following command.


    ```

    $ flutter bash-completion /usr/local/etc/bash_completion.d/flutter

    ```


    Finally, you should run `source ~/.bash_profile` or restart the shell to enable
    the completion.


    If you are using zsh, you can add the setup script to the file `~/.zshrc`. First
    you need to add the following line to the top of `~/.zshrc`.


    ```

    autoload bashcompinit

    bashcompinit

    ```


    Then you need to run the following command to add the setup script to `~/.zshrc`.


    ```

    $ flutter bash-completion >> ~/.zshrc

    ```


    Finally, you should run `source ~/.zshrc` or restart the shell to enable the completion.


    ## 2.24 Cleaning Build Files of Flutter Apps


    ### Problem


    You want to clean build files of Flutter apps.


    ### Solution


    Use the command `flutter clean`.


    ### Discussion


    The command `flutter clean` deletes files in the `build` directory. The disk size
    of the `build` directory can be large even for small apps. For example, after
    building the Flutter sample app, the size of the `build` directory is about 200M.
    When learning Flutter, you may create many small apps for testing. It’s a good
    idea to run `flutter clean` for those apps when you think you have done with them.
    You’ll find out that you can reclaim a large amount of disk space.


    ## 2.25 Managing Flutter SDK Cache


    ### Problem


    You want to explicitly manage the cache of Flutter SDK.


    ### Solution


    Use the command `flutter precache`.


    ### Discussion


    Flutter SDK keeps a cache of required artifacts in the `bin/cache` directory.
    This directory contains binary files of Dart SDK, Flutter Engine, Material fonts,
    and Gradle wrapper. This cache is populated automatically if it doesn’t exist.
    The command `flutter precache` explicitly updates the cache. Most of Flutter commands
    update the cache automatically before execution, except for commands `config`,
    `precache`, `bash-completion`, and `upgrade`, so most of the time you don’t need
    to explicitly run this command.


    `flutter precach`e has the argument `-a` or `--all-platforms` to specify whether
    artifacts for all platforms should be downloaded. By default, only artifacts of
    the current platform are downloaded.


    ```

    $ flutter precache -a

    ```


    ## 2.26 Summary


    This chapter is about the tools you may need to use when developing Flutter apps.
    You may not need to use all of these tools. With the help of IDEs, you can perform
    most of the actions inside of IDEs. Knowledge of these tools is still valuable
    because you can do more with these tools. In the next chapter, we’ll see recipes
    about essential parts of Dart language.


    # 3. Essential Dart


    Flutter projects can have cross-platform code and platform-specific code. Cross-platform
    code is written in Dart. Sufficient knowledge of Dart is a prerequisite for building
    Flutter apps. Details of Dart language is out of the scope of this book. You can
    find plenty of online resources related to Dart. However, it’s still very helpful
    to cover essential part of Dart for building Flutter apps. Recipes in this chapter
    cover different aspects of Dart. You can skip this chapter if you are confident
    about your knowledge of Dart.


    ## 3.1 Understanding Built-In Types


    ### Problem


    You want to know the built-in types of Dart.


    ### Solution


    Dart has built-in types of numbers, strings, booleans, lists, maps, runes, and
    symbols.


    ### Discussion


    Dart has several built-in types, including numbers, strings, booleans, lists,
    maps, runes, and symbols.'
