    ## 3.13 Using Libraries


    ### Problem


    You want to reuse libraries from Dart SDK or the community.


    ### Solution


    Use `import` to import libraries to use them in your app.


    ### Discussion


    When developing non-trivial Dart apps, it’s inevitable to use libraries. These
    can be built-in libraries in Dart SDK or libraries contributed by the community.
    To use these libraries, we need to import them with `import` first. `import` has
    only one argument to specify the URI of the library. Built-in libraries have the
    URI scheme `dart:`, for example, `dart:html` and `dart:convert`. Community packages
    have the URI scheme `package:` and are managed by the Dart `pub` tool. Listing
    [3-24](#479501_1_En_3_Chapter.xhtml#PC24) shows examples of importing libraries.


    ```

    import ''dart:html'';

    import ''package:meta/meta.dart'';

    Listing 3-24

    Import libraries

    ```


    It’s possible that two libraries export the same identifiers. To avoid conflicts,
    we can use `as` to provide prefixes for one of the libraries or both. In Listing
    [3-25](#479501_1_En_3_Chapter.xhtml#PC25), both `lib1.dart` and `lib2.dart` export
    the class `Counter`. After assigning different prefixes to these two libraries,
    we can use the prefix to access the class `Counter`.


    ```

    import ''lib1.dart'' as lib1;

    import ''lib2.dart'' as lib2;

    lib1.Counter counter;

    Listing 3-25

    Rename libraries

    ```


    You don’t need to import all members of a library. Use `show` to explicitly include
    members. Use `hide` to explicitly exclude members. In Listing [3-26](#479501_1_En_3_Chapter.xhtml#PC26),
    when importing the library `dart:math`, only `Random` is imported; when importing
    the library `dart:html`, only `Element` is excluded.


    ```

    import ''dart:math'' show Random;

    import ''dart:html'' hide Element;

