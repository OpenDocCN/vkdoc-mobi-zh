  trans: '

    ### 讨论


    如果我们仔细看看食谱 10-2 中清单 10-5 里的 `ConfiguredText` 和 `ConfiguredBox` 组件，可以发现 `ConfiguredBox`
    组件只依赖于 `Config` 对象的 `color` 属性。如果 `fontSize` 属性发生变化，`ConfiguredBox` 组件无需重建。这些不必要的重建可能会导致性能问题，尤其是当组件很复杂时。


    `InheritedModel` 组件允许你将一个状态划分为多个方面。一个构建上下文可以注册，以便仅针对特定方面接收通知。当 `InheritedModel`
    组件中的状态发生变化时，只有注册了匹配方面的依赖构建上下文才会收到通知。


    `InheritedModel` 类继承自 `InheritedWidget` 类。它有一个类型参数用于指定方面的类型。清单 10-9 中的 `ConfigModel`
    类是 `Config` 对象的 `InheritedModel` 子类。方面的类型是 `String`。在实现 `InheritedModel` 类时，你仍然需要重写
    `updateShouldNotify()` 方法来确定是否应该通知依赖项。`updateShouldNotifyDependent()` 方法根据依赖项所依赖的方面集合来决定是否应该通知某个依赖项。`updateShouldNotifyDependent()`
    方法仅在 `updateShouldNotify()` 方法返回 `true` 时才会被调用。对于 `ConfigModel`，只定义了 “color” 和
    “fontSize” 两个方面。如果依赖项依赖于 “color” 方面，那么只有当 `Config` 对象的 `color` 属性发生变化时才会收到通知。这对于
    “fontSize” 方面和 `fontSize` 属性同样适用。


    静态方法 `of()` 有一个额外的 `aspect` 参数，用于指定构建上下文所依赖的方面。静态方法 `InheritedModel.inheritFrom()`
    用于使构建上下文依赖于指定的方面。当 `aspect` 为 `null` 时，此方法与使用 `BuildContext.inheritFromWidgetOfExactType()`
    方法相同。


    ```

    class ConfigModel extends InheritedModel {

