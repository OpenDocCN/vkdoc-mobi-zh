    ## 3.14 Using Exceptions


    ### Problem


    You want to deal with failures in Dart apps.


    ### Solution


    Report failures using `throw`. Handle exceptions using `try-catch-finally`.


    ### Discussion


    Code fails. It’s natural for code to report failures and handle them. Dart has
    a similar exception mechanism as Java, except that all exceptions in Dart are
    unchecked exceptions. Methods in Dart don’t declare exceptions they may throw,
    so it’s not required to catch exceptions. However, uncaught exceptions cause the
    isolate to suspend and may result in program termination. Proper failure handing
    is also a key characteristic of robust apps.


    #### Report Failures


    We can use `throw` to throw exceptions. In fact, all non-`null` objects can be
    thrown, not only types that implement types `Error` or `Exception`. It’s recommended
    to only throw objects of types `Error` and `Exception`.


    An `Error` object represents a bug in the code that should not happen. For example,
    if a list only contains three elements, trying to access the fourth element causes
    a `RangeError` to be thrown. Unlike Exceptions, Errors are not intended to be
    caught. When an error occurred, the safest way is to terminate the program. `Error`s
    carry clear information about why they happen.


    Comparing to `Error`s, `Exception`s are designed to be caught and handled programmatically.
    For example, sending HTTP requests may not succeed, so we need to handle exceptions
    in the code to deal with failures. `Exception`s usually carry useful data about
    the failures. We should create custom types that extend from `Exception` to encapsulate
    necessary data.


    #### Catch Exceptions


    When an exception is thrown, you can catch it to stop it from propagating, unless
    you rethrow it. The goal to catch an exception is to handle it. You shouldn’t
    catch an exception if you don’t want to handle it. Exceptions are caught using
    `try`, `catch`, and `on`. If you don’t need to access the exception object, using
    `on` is enough. With `catch`, you can access the exception object and the stack
    trace. Use `on` to specify the type of exception to be caught.


    When you catch an exception, you should handle it. However, sometimes you may
    only want to partially handle it. In this case, you should use `rethrow` to rethrow
    the exception. It’s a bad practice to catch an exception but not handle it completely.


    If you want some code to run whether or not an exception is thrown, you can put
    the code in a `finally` clause. If no exception is thrown, `finally` clause runs
    after the `try` block. If an exception is thrown, `finally` clause runs after
    the matching `catch` clause.


    In Listing [3-27](#479501_1_En_3_Chapter.xhtml#PC27), the function `getNumber()`
    throws a custom exception type `ValueTooLargeException`. In the function `main()`,
    the exception is caught and rethrown.


    ```

    import ''dart:math'' show Random;

    var random = Random();

    class ValueTooLargeException implements Exception {

    int value;

    ValueTooLargeException(this.value);

    @override

    String toString() {

    return ''ValueTooLargeException{value: $value}'';

    }

    }

    int getNumber() {

    var value = random.nextInt(10);

    if (value > 5) {

    throw ValueTooLargeException(value);

    }

    return value;

    }

    void main() {

    try {

    print(getNumber());

    } on ValueTooLargeException catch (e) {

    print(e);

    rethrow;

    } finally {

    print(''in finally'');

    }

    }

    Listing 3-27

    Use exceptions

    ```


