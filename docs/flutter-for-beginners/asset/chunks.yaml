- fmt: "### Discussion\n\nIf you want to display web pages inside of Flutter apps,\
    \ you can use the `webview_flutter` plugin (`https://pub.dartlang.org/packages/webview_flutter`).\
    \ After adding `webview_flutter: ^0.3.6` to the dependencies of `pubspec.yaml`\
    \ file, you can use the `WebView` widget to show web pages and interact with them.\
    \ For iOS, you need to add the `io.flutter.embedded_views_preview` key with value\
    \ `YES` to the `ios/Runner/Info.plist` file.\n\nTable [12-3](#479501_1_En_12_Chapter.xhtml#Tab3)\
    \ shows parameters of the `WebView` constructor. To control the web view, you\
    \ need to use the `onWebViewCreated` callback to get the `WebViewController` object.\
    \ The value of `javascriptMode` can be `JavascriptMode.disabled` or `JavascriptMode.unrestricted`.\
    \ To enable JavaScript execution in the web pages, `JavascriptMode.unrestricted`\
    \ should be set as the value. The `navigationDelegate` of type `NavigationDelegate`\
    \ is a function that takes a `NavigationRequest` object and returns a value of\
    \ `NavigationDecision` enum. If the return value is `NavigationDecision.prevent`,\
    \ the navigation request is blocked. If the return value is `NavigationDecision.navigate`,\
    \ then the navigation request can continue. You can use the navigation delegate\
    \ to block users from accessing restricted pages. The `onPageFinished` callback\
    \ receives the URL of the loaded page.\n\n**Table 12-3** Parameters of `WebView`\
    \ constructor\n\n| Name | Description |\n| --- | --- |\n| `initialUrl` | The initial\
    \ URL to load. |\n| `onWebViewCreated` | Callback when the `WebView` is created.\
    \ |\n| `javascriptMode` | Whether JavaScript is enabled. |\n| `javascriptChannels`\
    \ | Channels to receive messages sent by JavaScript code running in the web view.\
    \ |\n| `navigationDelegate` | Determines whether a navigation request should be\
    \ handled. |\n| `onPageFinished` | Callback when a page loading is finished. |\n\
