    ## 2.20 格式化源代码


    ### 问题


    你想要确保应用的源代码遵循相同的代码风格。


    ### 解决方案


    使用 `flutter format` 命令。


    ### 讨论


    为你的应用保持统一的代码风格是一个好习惯，尤其是对于开发团队来说。一致的代码风格也有利于代码审查。`flutter format` 命令可以格式化源代码文件，使其符合
    Dart 的默认代码风格。


    要运行 `flutter format`，你需要提供以空格分隔的路径列表。以下命令格式化当前目录。


    ```

    $ flutter format .

    ```


    `flutter format` 简单地将格式化任务委托给了 Dart 的 `dartfmt` 工具。代码风格在 Dart 语言的官方指南（ [`https://dart.dev/guides/language/effective-dart/style`](https://dart.dev/guides/language/effective-dart/style)
    ）中有详细说明。表 2-14 显示了 `flutter format` 的额外参数。


