    ## 6.4 Setting Text Limits


    ### Problem


    You want to control the length of text.


    ### Solution


    Use `maxLength` parameter.


    ### Discussion


    To set the maximum length of text in `TextField` and `CupertinoTextField`, you
    can use the `maxLength` parameter. The default value of `maxLength` parameter
    is `null`, which means there is no restriction on the number of characters. If
    `maxLength` parameter is set, a character counter is displayed below the text
    input, which shows the number of characters entered and the number of allowed
    characters. If `maxLength` parameter is set to `TextField.noMaxLength`, then only
    the number of characters entered is displayed. When `maxLength` is set, if the
    characters reach the limit, the behavior depends on the value of `maxLengthEnforced`
    parameter. If `maxLengthEnforced` is `true`, which is the default value, no more
    characters can be entered. If `maxLengthEnforced` is `false`, additional characters
    can be entered, but the widget switches to the error style.


    ```

    TextField(

    maxLength: TextField.noMaxLength,

    )

    TextField(

    maxLength: 10,

    maxLengthEnforced: false,

    )

    CupertinoTextField(

    maxLength: 10,

    )

