- fmt: '### Discussion


    Since we already have Android Studio installed to set up Android platform for
    Flutter SDK, it’s a natural choice to use Android Studio as the IDE to develop
    Flutter apps. Android Studio itself is a powerful IDE based on IntelliJ platform.
    If you have used other products from JetBrains, like IntelliJ IDEA or WebStorm,
    you may find it’s quite easy to get started with Android Studio.


    To use Android Studio for Flutter development, `Flutter` and `Dart` plugins are
    required. To install these two plugins, open the `Plugins` page in `Preferences`
    dialog of Android Studio and click the “Browse repositories…” button. In the opened
    dialog, type in “Flutter” to search for the `Flutter` plugin to install; see Figure
    [1-11](#479501_1_En_1_Chapter.xhtml#Fig11). Click the green Install button to
    install it. This will also prompt you to install the `Dart` plugin. Click Yes
    to install that as well. Restart Android Studio.


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig11_HTML.jpg](images/479501_1_En_1_Chapter/479501_1_En_1_Fig11_HTML.jpg)


    Figure 1-11


    Install Flutter plugin in Android Studio


    After restarting Android Studio, you should see a new option to start a new Flutter
    project. The wizard for Flutter projects has different pages to configure the
    new project.


    The first page allows you to select type of the new Flutter project. The description
    in the page shows the difference of these four different project types. Most of
    the time, we are going to create a Flutter Application.


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig12_HTML.jpg](images/479501_1_En_1_Chapter/479501_1_En_1_Fig12_HTML.jpg)


    Figure 1-12


    Select type of Flutter project


    The second page allows you to customize basic configurations of the new Flutter
    project, including project name, location, and description.


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig13_HTML.jpg](images/479501_1_En_1_Chapter/479501_1_En_1_Fig13_HTML.jpg)


    Figure 1-13


    Basic project configurations


    The last page allows you to customize some advanced project configurations. The
    company domain is used to create unique identifier for the project.


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig14_HTML.jpg](images/479501_1_En_1_Chapter/479501_1_En_1_Fig14_HTML.jpg)


    Figure 1-14


    Advanced project configurations


    After finishing the wizard, a new project is created and opened in Android Studio.


    ## 1.12 Creating Flutter Apps Using VS Code


    ### Problem


    You want to use a light-weight editor to develop Flutter apps.


    ### Solution


    Use VS Code to create Flutter apps.


    ### Discussion


    VS Code ( [https://code.visualstudio.com/](https://code.visualstudio.com/) ) is
    a popular light-weight editor in the community of front-end developers. With the
    extensions for Flutter and Dart, we can also use VS Code for Flutter development.
    Open the `Extensions` tab in VS Code and search for "flutter" to install the `Flutter`
    extension; see Figure [1-15](#479501_1_En_1_Chapter.xhtml#Fig15). `Flutter` extension
    depends on the `Dart` extension, which will also be installed. After installing
    these two extensions, we can open the command palette and search "flutter" for
    available Flutter commands.


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig15_HTML.jpg](images/479501_1_En_1_Chapter/479501_1_En_1_Fig15_HTML.jpg)


    Figure 1-15


    Install Flutter extension in VS Code


    To create a new Flutter in VS Code, open the command palette and run the `Flutter:
    New Project` command. Input the name of the new project in the opened dialog.
    Select the directory of the project. VS Code opens a new window for the newly
    created project.


    ## 1.13 Running Flutter Apps


    ### Problem


    You want to run Flutter apps on emulators or devices.


    ### Solution


    Use `flutter run` command or IDEs to run Flutter apps.


    ### Discussion


    Depending on your preferred approach to develop Flutter apps, there are different
    ways to run Flutter apps. Before running Flutter apps, you must have at least
    one running emulator or connected device:


    ![../images/479501_1_En_1_Chapter/479501_1_En_1_Fig16_HTML.jpg](images/479501_1_En_1_Chapter/479501_1_En_1_Fig16_HTML.jpg)


    Figure 1-16


    Select device in Android Studio


    *   The command `flutter run` starts the current Flutter app.

    *   In Android Studio, select the emulator or device from the dropdown menu shown
    in Figure [1-16](#479501_1_En_1_Chapter.xhtml#Fig16), then click the `Run` button
    to start the app.

    *   In VS Code, select `Debug` ➤ `Start Without Debugging` to start the app.


    ## 1.14 Understanding Code Structure of Flutter Apps


    ### Problem


    You want to know the typical structure of Flutter apps.


    ### Solution


    Go through the sample app generated by Flutter SDK and understand the files.


    ### Discussion


    Before going into details of developing Flutter apps, you should know about the
    code structure of Flutter apps, so you know where to add new files. Flutter apps
    have a predefined directory structure for various files in the app. When a new
    app is created, you can take a look of the generated files and have a basic understanding
    of them. Table [1-1](#479501_1_En_1_Chapter.xhtml#Tab1) shows directories and
    files of the created app.


    Table 1-1


    Directories and files of a Flutter app


    | Name | Description |

    | --- | --- |

    | `lib` | Main directory of app source code. The file `main.dart` is usually the
    entry point of the app. |

    | `test` | Directory that contains test files. |

    | `android` | Files for Android platform. |

    | `ios` | Files for iOS platform. |

    | `pubspec.yaml` | Package description for Dart pub tool. |

    | `pubspec.lock` | Lock file for Dart pub tool. |

    | `.metadata` | Flutter project description used by Flutter SDK. |


    ## 1.15 Fixing Configuration Issues of Flutter SDK


    ### Problem


    You want to make sure the configuration of your local development environment
    is correct for Flutter development.


    ### Solution


    Use the command `flutter doctor`.


    ### Discussion


    After Flutter SDK is installed, it needs to be configured with other supporting
    tools. The command `flutter doctor` is the primary tool to provide necessary help.
    This command checks the local environment and reports status of the Flutter SDK
    installation. For each problem it finds, it also gives instructions on how to
    fix them. All you need to do is to apply the suggested fixes and run `flutter
    doctor` again to verify the result. It’s not necessary to fix all issues reported
    by `flutter doctor`. You can safely ignore some issues if they are not relevant.
    For example, if you are not going to use VS Code as the primary IDE, then it doesn’t
    matter if VS Code is installed or not.


    ## 1.16 Summary


    Recipes in this chapter provide instructions on how to get your local machine
    prepared for Flutter apps development. `flutter doctor` is a useful tool for setup.
    You should be able to fix most of the configuration issues by following instructions
    provided by this command. In the next chapter, we’ll see recipes about using tools
    provided by Dart SDK, Flutter SDK, and IDEs.


    # 2. Know the Tools


    Building Flutter apps cannot succeed without the help of various tools. During
    the development, we may need to use tools from Dart SDK, Flutter SDK, and IDEs.
    Making good use of these tools can increase your productivity. This chapter covers
    usage of tools from Dart SDK, Flutter SDK, Android Studio, and VS Code.


    ## 2.1 Using Dart Observatory


    ### Problem


    You want to know the internals of a running Flutter app.


    ### Solution


    Use Dart Observatory provided by Dart SDK.'
