    \ jobsClient = GitHubJobsClient(httpClient: httpClient);\n      expect(jobsClient.getJobs('flutter'),\
    \ throwsException);\n    });\n  });\n}\nListing 14-7\nGitHubJobsClient test with\
    \ mock\n```\n\n## 14.3 Writing Widget Tests\n\n### Problem\n\nYou want to write\
