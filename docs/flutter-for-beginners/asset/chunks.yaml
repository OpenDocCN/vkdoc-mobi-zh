    ### Problem


    You want to create new instances of Dart classes.


    ### Solution


    Use constructors.'
  trans: "\n### 讨论\n\nDart 中的函数是对象，类型为 `Function`。函数可以赋值给变量、作为函数参数传递，也可以作为函数返回值。在\
    \ Dart 中创建高阶函数非常容易。函数可以有零个或多个参数。有些参数是必需的，有些则是可选的。必需的参数在参数列表中排在前面，后面跟着可选参数。可选的位置参数用\
    \ `[]` 包裹。\n\n当函数有长串参数时，很难记住这些参数的位置和含义。这时最好使用命名参数。可以使用 `@required` 注解将命名参数标记为必需。参数可以使用\
    \ `=` 指定默认值。如果没有提供默认值，默认值为 `null`。\n\n在 3-11 代码清单 中，函数 `sum()` 有一个可选位置参数 `initial`，其默认值为\
    \ `0`。函数 `joinToString()` 有一个必需的命名参数 `separator` 和两个可选的命名参数 `prefix` 与 `suffix`。`joinToString()`\
    \ 中使用的箭头语法，是函数体仅包含单个表达式时的简写形式。语法 `=> expr` 等同于 `{ return expr; }`。使用箭头语法可以使代码更简短且更易读。\n\
    \n```\nimport 'package:meta/meta.dart';\nint sum(List list, [int initial = 0])\
    \ {\n  var total = initial;\n  list.forEach((v) => total += v);\n  return total;\n\
    }\nString joinToString(List list,\n    {@required String separator, String prefix\
    \ = \", String suffix = \"}) =>\n    '$prefix${list.join(separator)}$suffix';\n\
    void main() {\n  assert(sum([1, 2, 3]) == 6);\n  assert(sum([1, 2, 3], 10) ==\
    \ 16);\n  assert(joinToString(['a', 'b', 'c'], separator: ',') == 'a,b,c');\n\
    \  assert(\n      joinToString(['a', 'b', 'c'], separator: '-', prefix: '*', suffix:\
    \ '?') ==\n          '*a-b-c?');\n}\n```\n\n有时你可能不需要为函数命名。这些匿名函数在提供回调时非常有用。在 3-12\
    \ 代码清单 中，一个匿名函数被传递给了方法 `forEach()`。\n\n```\nvar list = [1, 2, 3];\nlist.forEach((v)\
    \ => print(v * 10));\n```\n\n## 3.5 使用 Typedefs\n\n### 问题\n\n你想为函数类型创建一个别名。\n\n\
    ### 解决方案\n\n使用 Typedefs。\n\n### 讨论\n\n在 Dart 中，函数是对象。函数是 `Function` 类型的实例。但函数的实际类型由其参数类型和返回值类型决定。当函数作为参数或返回值时，重要的是其实际的函数类型。Dart\
    \ 中的 `typedef` 允许我们为函数类型创建一个别名。这个类型别名可以像其他类型一样使用。在 3-13 代码清单 中，`Processor<T>`\
    \ 是一个函数类型的别名，该函数类型包含一个类型为 `T` 的参数，返回值类型为 `void`。这个类型在函数 `process()` 中被用作参数类型。\n\
    \n```\ntypedef Processor = void Function(T value);\nvoid process(List list, Processor\
    \ processor) {\n  list.forEach((item) {\n    print('processing $item');\n    processor(item);\n\
    \    print('processed $item');\n  });\n}\nvoid main() {\n  process([1, 2, 3],\
    \ print);\n}\n```\n\n## 3.6 使用级联运算符\n\n### 问题\n\n你想对同一个对象执行一系列操作。\n\n### 解决方案\n\
    \n使用 Dart 中的级联运算符（`..`）。\n\n### 讨论\n\nDart 有一个特殊的级联运算符（`..`），它允许我们对同一个对象执行一系列操作。在其他编程语言中，要链式调用同一个对象的方法，我们通常需要创建一个流畅接口（Fluent\
    \ API），让每个方法都返回当前对象。Dart 中的级联运算符使得这个要求变得不再必要。即使方法不返回当前对象，我们仍然可以进行链式调用。级联运算符还支持属性访问。在\
    \ 3-14 代码清单 中，级联运算符被用于访问 `User` 和 `Address` 类中的属性和方法。\n\n```\nclass User {\n \
    \ String name, email;\n  Address address;\n  void sayHi() => print('hi, $name');\n\
    }\nclass Address {\n  String street, suburb, zipCode;\n  void log() => print('Address:\
    \ $street');\n}\nvoid main() {\n  User()\n    ..name = 'Alex'\n    ..email = 'alex@example.org'\n\
    \    ..address = (Address()\n      ..street = 'my street'\n      ..suburb = 'my\
    \ suburb'\n      ..zipCode = '1000'\n      ..log())\n    ..sayHi();\n}\n```\n\n\
    ## 3.7 重写运算符\n\n### 问题\n\n你想在 Dart 中重写运算符。\n\n### 解决方案\n\n在类中为运算符定义重写方法。\n\n###\
    \ 讨论\n\nDart 有许多运算符。其中只有一部分运算符可以被重写。这些可重写的运算符包括 `<`、`+`、`|`、`[]`、`>`、`/`、`^`、`[]=`、`<=`、`~/`、`&`、`~`、`>=`、`*`、`<<`、`==`、`-`、`%`\
    \ 和 `>>`。对于某些类来说，使用运算符比使用方法更简洁。例如，`List` 类重写了 `+` 运算符用于列表拼接。代码 `[1] + [2]` 非常容易理解。在\
    \ 3-15 代码清单 中，类 `Rectangle` 重写了运算符 `<` 和 `>`，用于按面积比较实例。\n\n```\nclass Rectangle\
    \ {\n  int width, height;\n  Rectangle(this.width, this.height);\n  get area =>\
    \ width * height;\n  bool operator <(Rectangle rect) => area < rect.area;\n  bool\
    \ operator >(Rectangle rect) => area > rect.area;\n}\nvoid main() {\n  var rect1\
    \ = Rectangle(100, 100);\n  var rect2 = Rectangle(200, 150);\n  assert(rect1 <\
    \ rect2);\n  assert(rect2 > rect1);\n}\n```\n\n## 3.8 使用构造函数\n\n### 问题\n\n你想创建\
    \ Dart 类的新实例。\n\n### 解决方案\n\n使用构造函数。\n"
- fmt: '# Discussion


    Like other programming languages, objects in Dart are created by constructors.
    Usually, constructors are created by declaring functions with the same name as
    their classes. Constructors can have arguments to provide necessary values to
    initialize new objects. If no constructor is declared for a class, a default constructor
    with no arguments is provided. This default constructor simply invokes the no-argument
    constructor in the superclass. However, if a constructor is declared, this default
    constructor doesn''t exist.


    A class may have multiple constructors. You can name these constructors in the
    form `ClassName.identifier` to better clarify the meanings.


    In Listing [3-16](#479501_1_En_3_Chapter.xhtml#PC16), the class `Rectangle` has
    a regular constructor that takes four arguments. It also has a named constructor
    `Rectangle.fromPosition`.


    ```

    class Rectangle {

    final num top, left, width, height;

    Rectangle(this.top, this.left, this.width, this.height);

    Rectangle.fromPosition(this.top, this.left, num bottom, num right)

    : assert(right > left),

    assert(bottom > top),

    width = right - left,

    height = bottom - top;

    @override

    String toString() {

    return ''Rectangle{top: $top, left: $left, width: $width, height: $height}'';

    }

    }

    void main(List args) {

    var rect1 = Rectangle(100, 100, 300, 200);

    var rect2 = Rectangle.fromPosition(100, 100, 300, 200);

    print(rect1);

    print(rect2);

    }

    Listing 3-16

    Constructors

    ```


    It''s common to use factories to create objects. Dart has a special kind of `factory`
    constructors that implements this pattern. A factory constructor doesn''t always
    return a new instance of a class. It may return a cached instance, or an instance
    of a subtype. In Listing [3-17](#479501_1_En_3_Chapter.xhtml#PC17), the class
    `ExpensiveObject` has a named constructor `ExpensiveObject._create()` to actually
    create a new instance. The factory constructor only invokes `ExpensiveObject._create()`
    when `_instance` is `null`. When running the code, you can see that the message
    "created" is only printed once.


    ```

    class ExpensiveObject {

    static ExpensiveObject _instance;

    ExpensiveObject._create() {

    print(''created'');

    }

    factory ExpensiveObject() {

    if (_instance == null) {

    _instance = ExpensiveObject._create();

    }

    return _instance;

    }

    }

    void main() {

    ExpensiveObject();

    ExpensiveObject();

    }

    Listing 3-17

    Factory constructor

    ```


    ## 3.9 Extending a Class


    ### Problem


    You want to inherit behavior from an existing class.


    ### Solution


    Extend from the existing class to create a subclass.


    ### Discussion


    Dart is an object-oriented programming language. It provides support for inheritance.
    A class can extend from a superclass using the keyword `extends`. The superclass
    can be referred as `super` in the subclass. Subclasses can override instance methods,
    getters, and setters of superclasses. Overriding members should be annotated with
    the `@override` annotation.


    Abstract classes are defined using the `abstract` modifier. Abstract classes cannot
    be instantiated. Abstract methods in abstract classes don''t have implementations
    and must be implemented by non-abstract subclasses.


    In Listing [3-18](#479501_1_En_3_Chapter.xhtml#PC18), the class `Shape` is abstract
    with an abstract method `area()`. Classes `Rectangle` and `Circle` both extend
    from `Shape` and implement the abstract method `area()`.


    ```

    import ''dart:math'' show pi;

    abstract class Shape {

    double area();

    }

    class Rectangle extends Shape {

    double width, height;

    Rectangle(this.width, this.height);

    @override

    double area() {

    return width * height;

    }

    }

    class Square extends Rectangle {

    Square(double width) : super(width, width);

    }

    class Circle extends Shape {

    double radius;

    Circle(this.radius);

    @override

    double area() {

    return pi * radius * radius;

    }

    }

    void main() {

    var rect = Rectangle(100, 50);

    var square = Square(50);

    var circle = Circle(50);

    print(rect.area());

    print(square.area());

    print(circle.area());

    }

    Listing 3-18

    Inheritance

    ```


    ## 3.10 Adding Features to a Class


    ### Problem


    You want to reuse a class''s code but are limited by single inheritance of Dart.


    ### Solution


    Use mixins.


    ### Discussion


    Inheritance is a common way to reuse code. Dart only supports single inheritance,
    that is, a class can have at most one superclass. If you want to reuse code from
    multiple classes, mixins should be used. A class can declare multiple mixins using
    the keyword `with`. A mixin is a class that extends from `Object` and declares
    on constructors. A mixin can be declared as a regular class using `class` or as
    a dedicated mixin using `mixin`. In Listing [3-19](#479501_1_En_3_Chapter.xhtml#PC19),
    `CardHolder` and `SystemUser` are mixins. The class `Assistant` extends from `Student`
    and has the mixin `SystemUser`, so we can use the `useSystem()` method of `Assistant`
    instances.


    ```

    class Person {

    String name;

    Person(this.name);

    }

    class Student extends Person with CardHolder {

    Student(String name) : super(''Student: $name'') {

    holder = this;

    }

    }

    class Teacher extends Person with CardHolder {

    Teacher(String name) : super(''Teacher: $name'') {

    holder = this;

    }

    }

    mixin CardHolder {

    Person holder;

    void swipeCard() {

    print(''${holder.name} swiped the card'');

    }

    }

    mixin SystemUser {

    Person user;

    void useSystem() {

    print(''${user.name} used the system.'');

    }

    }

    class Assistant extends Student with SystemUser {

    Assistant(String name) : super(name) {

    user = this;

    }

    }

    void main() {

    var assistant = Assistant(''Alex'');

    assistant.swipeCard();

    assistant.useSystem();

    }

    Listing 3-19

    Mixins

    ```


    ## 3.11 Using Interfaces


    ### Problem


    You want to have a contract for classes to follow.


    ### Solution


    Use implicit interface of a class.


    ### Discussion


    You should be familiar with interfaces as the contract of classes. Unlike other
    object-oriented programming languages, Dart has no concept of interfaces. Every
    class has an implicit interface that contains all the instance members of this
    class and the interfaces it implements. You can use `implements` to declare that
    a class implements the API of another class. In Listing [3-20](#479501_1_En_3_Chapter.xhtml#PC20),
    class `CachedDataLoader` implements the implicit interface of class `DataLoader`.


    ```

    class DataLoader {

    void load() {

    print(''load data'');

    }

    }

    class CachedDataLoader implements DataLoader {

    @override

    void load() {

    print(''load from cache'');

    }

    }

    void main() {

    var loader = CachedDataLoader();

    loader.load();

    }

    Listing 3-20

    Interfaces

    ```


    ## 3.12 Using Generics


    ### Problem


    You want to have type safety when your code is designed to work with different
    types.


    ### Solution


    Use generic classes and generic methods.'
