    ## 8.9 显示 Material Design 菜单


    ### 问题


    你想要在 Material Design 应用中显示菜单。


    ### 解决方案


    使用 `showMenu()` 函数以及 `PopupMenuEntry` 类的实现。

    '
- fmt: "### Discussion\n\n要使用`showMenu()`函数，你需要有一个`PopupMenuEntry`对象列表。`PopupMenuEntry`有不同的实现类型：\n\
    \n* `PopupMenuItem` – 用于单个值的菜单项\n* `CheckedPopupMenuItem` – 带有复选标记的菜单项\n* `PopupMenuDivider`\
    \ – 菜单项之间的水平分隔线\n\n`PopupMenuItem`是一个泛型类，其类型由值类型决定。表[8-3](#479501_1_En_8_Chapter.xhtml#Tab3)显示了`PopupMenuItem`构造函数的参数。`CheckedPopupMenuItem`是`PopupMenuItem`的子类，它具有`checked`属性，用于指定是否显示复选标记。\n\
    \n**表 8-3** `PopupMenuItem`构造函数的参数\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n\
    | `child` | `Widget` | 菜单项的内容。 |\n| `value` | `T` | 菜单项的值。 |\n| `enabled` | `bool`\
    \ | 此菜单项是否可被选中。 |\n| `height` | `double` | 菜单项的高度。默认为`48`。 |\n\n`showMenu()`函数返回一个`Future<T>`对象，该对象解析为所选菜单项的值。该函数还使用`Navigator.push()`方法显示菜单。表[8-4](#479501_1_En_8_Chapter.xhtml#Tab4)显示了`showMenu()`函数的主要参数。当指定了`initialValue`时，具有匹配值的第一个项目会被高亮显示。\n\
    \n**表 8-4** `showMenu()`的参数\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `items`\
    \ | `List<PopupMenuEntry<T>>` | 菜单项的列表。 |\n| `initialValue` | `T` | 用于高亮显示菜单项的初始值。\
    \ |\n| `position` | `RelativeRect` | 显示菜单的位置。 |\n\n清单 [8-14](#479501_1_En_8_Chapter.xhtml#PC14)\
    \ 中的菜单包含一个`PopupMenuItem`、一个`PopupMenuDivider`和一个`CheckedPopupMenuItem`。\n\n```dart\n\
    RaisedButton(\n  child: Text('Show Menu'),\n  onPressed: () async {\n    String\
    \ result = await showMenu(\n      context: context,\n      position: RelativeRect.fromLTRB(0,\
    \ 0, 0, 0),\n      items: [\n        PopupMenuItem(\n          value: 'red',\n\
    \          child: Text('Red'),\n        ),\n        PopupMenuDivider(),\n    \
    \    CheckedPopupMenuItem(\n          value: 'green',\n          checked: true,\n\
    \          child: Text('Green'),\n        )\n      ],\n      initialValue: 'green',\n\
    \    );\n    print(result);\n  },\n);\n```\n*清单 8-14 显示菜单*\n\n使用`showMenu()`函数的主要难点在于为`position`参数提供合适的值。如果菜单是通过按下按钮触发的，那么使用`PopupMenuButton`是更好的选择，因为菜单位置会根据按钮位置自动计算。表[8-5](#479501_1_En_8_Chapter.xhtml#Tab5)显示了`PopupMenuButton`构造函数的主要参数。`PopupMenuItemBuilder`函数接受一个`BuildContext`对象作为参数，并返回一个`List<PopupMenuEntry<T>>`对象。\n\
    \n**表 8-5** `PopupMenuButton`的参数\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `itemBuilder`\
    \ | `PopupMenuItemBuilder<T>` | 用于创建菜单项的构建器函数。 |\n| `initialValue` | `T` | 初始值。\
    \ |\n| `onSelected` | `PopupMenuItemSelected<T>` | 选中菜单项时的回调。 |\n| `onCanceled`\
    \ | `PopupMenuCanceled` | 菜单被取消（无选择）时的回调。 |\n| `tooltip` | `String` | 按钮的工具提示。\
    \ |\n| `child` | `Widget` | 按钮的内容。 |\n| `icon` | `Icon` | 按钮的图标。 |\n\n清单 [8-15](#479501_1_En_8_Chapter.xhtml#PC15)\
    \ 展示了如何使用`PopupMenuButton`实现与清单 [8-14](#479501_1_En_8_Chapter.xhtml#PC14) 相同的菜单。\n\
    \n```dart\nPopupMenuButton(\n  itemBuilder: (BuildContext context) {\n    return\
    \ [\n      PopupMenuItem(\n        value: 'red',\n        child: Text('Red'),\n\
    \      ),\n      PopupMenuDivider(),\n      CheckedPopupMenuItem(\n        value:\
    \ 'green',\n        checked: true,\n        child: Text('Green'),\n      )\n \
    \   ];\n  },\n  initialValue: 'green',\n  child: Text('Select color'),\n  onSelected:\
    \ (String value) {\n    print(value);\n  },\n  onCanceled: () {\n    print('no\
    \ selections');\n  },\n);\n```\n*清单 8-15 使用PopupMenuButton*\n\n图 [8-5](#479501_1_En_8_Chapter.xhtml#Fig5)\
    \ 展示了在清单 [8-14](#479501_1_En_8_Chapter.xhtml#PC14) 和 [8-15](#479501_1_En_8_Chapter.xhtml#PC15)\
