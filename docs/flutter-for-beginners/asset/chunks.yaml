    Listing 7-1\nListView with static children\n```\n\nThe default ListView() constructor\
    \ should only be used when you have a small number of children. All children will\
    \ be created, even though some of them are not visible in the viewport. This is\
    \ likely to have performance impact.\n\n### ListView with Item Builders\n\nIf\
    \ you have a large number of items or items need to be dynamically created, you\
    \ can use ListView.builder() and ListView.separated() constructors. Instead of\
    \ a static list of widgets, you need to provide builder functions of type IndexedWidgetBuilder\
    \ to build items on demand. IndexedWidgetBuilder is typedef of Widget (BuildContext\
    \ context, int index). The index parameter is the index of the item to build.\
    \ ListView widget determines the indices of items in the viewport and invokes\
    \ the builder function to build the items to render. If the total number of items\
    \ is known, you should pass this number as the itemCount parameter. If itemCount\
    \ is non-null, the builder function will only be invoked with indices greater\
    \ than or equal to zero and less than itemCount. If itemCount is null, the builder\
    \ function needs to return null to indicate that no more items are available.\n\
    \nWhen using ListView.builder() constructor, you only need to provide the itemBuilder\
    \ parameter of type IndexedWidgetBuilder. For ListView.separated() constructor,\
    \ apart from the itemBuilder parameter, you also need to provide the separatorBuilder\
    \ parameter of type IndexedWidgetBuilder to build the separators between items.\
    \ When using ListView.separated(), the itemCount parameter is required. Listing\
    \ [7-2](#479501_1_En_7_Chapter.xhtml#PC2) shows examples of using ListView.builder()\
    \ and ListView.separated().\n\n```\nListView.builder(\nitemCount: 20,\nitemBuilder:\
    \ (context, index) {\nreturn ExampleWidget(name: 'Dynamic Box ${index + 1}');\n\
    },\n);\nListView.separated(\nitemBuilder: (context, index) {\nreturn ExampleWidget(name:\
    \ 'Separated Box ${index + 1}');\n},\nseparatorBuilder: (context, index) {\nreturn\
    \ Divider(\nheight: 8,\n);\n},\nitemCount: 20,\n);\nListing 7-2\nListView with\
    \ item builders\n```\n\nIf the extent of an item in the scroll direction is known,\
