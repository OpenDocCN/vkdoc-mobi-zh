- fmt: "### Discussion\n\n除了线性动画，你还可以创建使用曲线来调整变化速率的曲线动画。曲线是单位区间到另一个单位区间的映射。`Curve`类及其子类是内置的曲线类型。`Curve`类的`transform()`方法返回给定点在曲线上的映射值。曲线必须将输入`0.0`映射到`0.0`，`1.0`映射到`1.0`。表[11-3](#479501_1_En_11_Chapter.xhtml#Tab3)展示了不同类型的曲线。\n\
    \n**表 11-3** 不同类型的曲线\n\n| 名称 | 描述 |\n| --- | --- |\n| `Cubic` | 由两个控制点定义的立方曲线。通过四个`double`值（这两个点的x和y坐标）创建。\
    \ |\n| `ElasticInCurve` | 在超出边界时幅度增长的振荡曲线。通过振荡持续时间创建。 |\n| `ElasticOutCurve` |\
    \ 在超出边界时幅度缩小的振荡曲线。通过振荡持续时间创建。 |\n| `ElasticInOutCurve` | 在超出边界时幅度先增长后缩小的振荡曲线。通过振荡持续时间创建。\
    \ |\n| `Interval` | 使用`begin`、`end`和一个`curve`创建。其值在`begin`之前为`0.0`，在`end`之后为`1.0`。`begin`和`end`之间的值由曲线定义。\
    \ |\n| `SawTooth` | 重复指定次数的锯齿曲线。 |\n| `Threshold` | 直到阈值时值为`0.0`，然后跳变到`1.0`的曲线。\
    \ |\n\n你可以使用表[11-3](#479501_1_En_11_Chapter.xhtml#Tab3)中`Curve`子类的构造函数来创建新曲线，或者使用`Curves`类中的常量。`Curves`类中的常量在大多数情况下已经足够使用。对于一个`Curve`对象，你可以使用其`flipped`属性来获取当前曲线的反转曲线。\n\
    \n使用`Curve`对象，你可以通过`CurvedAnimation`类创建曲线动画。表[11-4](#479501_1_En_11_Chapter.xhtml#Tab4)展示了`CurvedAnimation`构造函数的参数。如果`reverseCurve`参数为`null`，则在两个方向都使用指定的曲线。\n\
    \n**表 11-4** `CurvedAnimation`的参数\n\n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n|\
    \ `parent` | `Animation<double>` | 要应用曲线的动画。 |\n| `curve` | `Curve` | 在正向方向使用的曲线。\
    \ |\n| `reverseCurve` | `Curve` | 在反向方向使用的曲线。 |\n\n在清单[11-5](#479501_1_En_11_Chapter.xhtml#PC5)中，`AnimatedBox`组件使用动画值来确定盒子的左侧位置。`CurvedAnimation`对象通过`Curves.easeInOut`曲线创建。\n\
    \n```\nclass CurvedPosition extends StatefulWidget {\n  @override\n  _CurvedPositionState\
    \ createState() => _CurvedPositionState();\n}\n\nclass _CurvedPositionState extends\
    \ State<CurvedPosition>\n    with SingleTickerProviderStateMixin {\n  AnimationController\
    \ controller;\n  Animation<double> animation;\n\n  @override\n  void initState()\
    \ {\n    super.initState();\n    controller = AnimationController(\n      duration:\
    \ const Duration(seconds: 5),\n      vsync: this,\n    )..forward();\n    animation\
    \ = CurvedAnimation(parent: controller, curve: Curves.easeInOut);\n  }\n\n  @override\n\
    \  Widget build(BuildContext context) {\n    return AnimatedBox(\n      animation:\
    \ animation,\n    );\n  }\n\n  @override\n  void dispose() {\n    controller.dispose();\n\
    \    super.dispose();\n  }\n}\n\nclass AnimatedBox extends AnimatedWidget {\n\
    \  AnimatedBox({Key key, this.animation})\n      : super(key: key, listenable:\
    \ animation);\n  final Animation<double> animation;\n  final double _width = 400;\n\
    \n  @override\n  Widget build(BuildContext context) {\n    return Container(\n\
    \      width: _width,\n      height: 20,\n      child: Stack(\n        children:\
    \ [\n          Positioned(\n            left: animation.value * _width,\n    \
    \        bottom: 0,\n            child: Container(\n              width: 10,\n\
    \              height: 10,\n              decoration: BoxDecoration(color: Colors.red),\n\
    \            ),\n          )\n        ],\n      ),\n    );\n  }\n}\n```\n\n**清单\
    \ 11-5** `CurvedAnimation`\n\n`CurveTween`类使用`Curve`对象来转换动画的值。当你需要将曲线动画与另一个`Tween`对象链式组合时，可以使用`CurveTween`对象。\n\
    \n## 11.4 链式组合补间动画\n\n### 问题\n\n你想要链式组合多个补间动画。\n\n### 解决方案\n\n使用`Animatable`类的`chain()`方法或`Animation`类的`drive()`方法。\n\
    \n### 讨论\n\n`Animatable`是`Tween`、`CurveTween`和`TweenSequence`类的超类。给定一个`Animatable`对象，你可以使用`chain()`方法并将另一个`Animatable`对象作为父级。对于给定的输入值，首先计算父级`Animatable`对象，然后将结果作为当前`Animatable`对象的输入。你可以使用多个`chain()`方法来创建复杂的动画。\n\
    \n在清单[11-6](#479501_1_En_11_Chapter.xhtml#PC6)中，`Tween`对象与另一个`CurveTween`对象进行了链式组合。\n\
    \n```\nvar animation = Tween<double>(begin: 0.0, end: 300.0)\n    .chain(CurveTween(curve:\
    \ Curves.easeOut))\n    .animate(controller);\n```\n\n**清单 11-6** 链式组合补间动画\n\n\
    你也可以使用`Animation`类的`drive()`方法来链式组织一个`Animatable`对象。\n\n## 11.5 创建补间动画序列\n\n###\
    \ 问题\n\n你想要为不同阶段创建一个补间动画序列。\n\n### 解决方案\n\n使用`TweenSequence`类。\n\n### 讨论\n\n通过使用`TweenSequence`类，你可以为动画的不同阶段使用不同的`Animatable`对象。一个`TweenSequence`对象由一组`TweenSequenceItem`对象列表定义。每个`TweenSequenceItem`对象包含一个`Animatable`对象和一个权重。权重定义了这个`TweenSequenceItem`对象在其父级`TweenSequence`对象的整个持续时间中所占的相对百分比。\n\
    \n在清单[11-7](#479501_1_En_11_Chapter.xhtml#PC7)中，动画由40%的线性补间和60%的曲线补间组成。\n\n```\n\
    var animation = TweenSequence([\n  TweenSequenceItem(\n    tween: Tween<double>(begin:\
    \ 0.0, end: 100.0),\n    weight: 40,\n  ),\n  TweenSequenceItem(\n    tween: Tween<double>(begin:\
    \ 100.0, end: 300.0)\n        .chain(CurveTween(curve: Curves.easeInOut)),\n \
    \   weight: 60,\n  )\n]).animate(controller);\n```\n\n**清单 11-7** `TweenSequence`示例\n\
    \n## 11.6 运行同步动画\n\n### 问题\n\n你想要在`AnimatedWidget`中运行多个同步动画。\n\n### 解决方案\n\n使用`Animatable`类的`evaluate()`方法。\n\
    \n### 讨论\n\n`AnimatedWidget`的构造函数只支持单个`Animation`对象。如果你想在`AnimatedWidget`对象中使用多个动画，你需要在`AnimatedWidget`对象中创建多个`Tween`对象，并使用`evaluate()`方法来获取对应`Animation`对象的值。\n\
    \n在清单[11-8](#479501_1_En_11_Chapter.xhtml#PC8)中，`_leftTween`和`_bottomTween`对象分别决定了盒子的左侧和底部位置属性。\n\
    \n```\nclass AnimatedBox extends AnimatedWidget {\n  AnimatedBox({Key key, this.animation})\n\
    \      : super(key: key, listenable: animation);\n  final Animation<double> animation;\n\
    \  final double _width = 400;\n  final double _height = 300;\n  static final _leftTween\
    \ = Tween<double>(begin: 0, end: 1.0);\n  static final _bottomTween = CurveTween(curve:\
    \ Curves.ease);\n\n  @override\n  Widget build(BuildContext context) {\n    return\
    \ Container(\n      width: _width,\n      height: _height,\n      margin: EdgeInsets.all(10),\n\
    \      decoration: BoxDecoration(border: Border.all()),\n      child: Stack(\n\
    \        children: [\n          Positioned(\n            left: _leftTween.evaluate(animation)\
    \ * _width,\n            bottom: _bottomTween.evaluate(animation) * _height,\n\
    \            child: Container(\n              width: 10,\n              height:\
    \ 10,\n              decoration: BoxDecoration(color: Colors.red),\n         \
    \   ),\n          )\n        ],\n      ),\n    );\n  }\n}\n```\n\n**清单 11-8**\
    \ 同步动画\n\n## 11.7 创建交错动画\n\n### 问题\n\n你想要创建顺序执行或重叠的动画。\n\n### 解决方案\n\n使用`Interval`类。"
  raw: '### Discussion


    Except from linear animations, you can also create curved animations that use
    curves to adjust the rate of changes. A curve is a mapping of unit interval to
    another unit interval. `Curve` class and its subclasses are built-in types of
    curves. The `transform()` method of `Curve` class returns the mapped value of
    the curve for a given point. A curve must map the input `0.0` to `0.0` and `1.0`
    to `1.0`. Table [11-3](#479501_1_En_11_Chapter.xhtml#Tab3) shows different types
    of curves.


    Table 11-3


    Different types of curves


    | Name | Description |

    | --- | --- |

    | `Cubic` | Cubic curve defined by two control points. Created with four double
    values as x and y coordinates of these two points. |

    | `ElasticInCurve` | Oscillation curve that grows in magnitude while overshooting
    its bounds. Created with duration of the oscillation. |

    | `ElasticOutCurve` | Oscillation curve that shrinks in magnitude while overshooting
    its bounds. Created with duration of the oscillation. |

    | `ElasticInOutCurve` | Oscillation curve that grows then shrinks in magnitude
    while overshooting its bounds. Created with duration of the oscillation. |

    | `Interval` | Created with `begin`, `end`, and a `curve`. Its value is 0.0 until
    `begin` and 1.0 after `end`. Values between begin and end are defined by the curve.
    |

    | `SawTooth` | A sawtooth curve that repeats the given number of times. |

    | `Threshold` | A curve that is 0.0 until the threshold, then jumps to 1.0. |


    You can use either constructors of `Curve` subclasses in Table [11-3](#479501_1_En_11_Chapter.xhtml#Tab3)
    to create new curves or use constants in `Curves` class. Constants in `Curves`
    class are generally good enough for most cases. For a `Curve` object, you can
    use the `flipped` property to get a new curve that is the inversion of this one.


    With `Curve` objects, you can create curved animations using `CurvedAnimation`
    class. Table [11-4](#479501_1_En_11_Chapter.xhtml#Tab4) shows parameters of `CurvedAnimation`
    constructor. If `reverseCurve` parameter is null, the specified curve is used
    in both directions.


    Table 11-4


    Parameters of CurvedAnimation


    | Name | Type | Description |

    | --- | --- | --- |

    | `parent` | `Animation<double>` | The animation to apply the curve. |

    | `curve` | `Curve` | The curve to use in forward direction. |

    | `reverseCurve` | `Curve` | The curve to use in backward direction. |


    In Listing [11-5](#479501_1_En_11_Chapter.xhtml#PC5), `AnimatedBox` widget uses
    the animation value to determine the left position of the box. The `CurvedAnimation`
    object is created with `Curves.easeInOut` curve.


    ```

    class CurvedPosition extends StatefulWidget {

    @override

    _CurvedPositionState createState() => _CurvedPositionState();

    }

    class _CurvedPositionState extends State

    with SingleTickerProviderStateMixin {

    AnimationController controller;

    Animation animation;

    @override

    void initState() {

    super.initState();

    controller = AnimationController(

    duration: const Duration(seconds: 5),

    vsync: this,

    )..forward();

    animation = CurvedAnimation(parent: controller, curve: Curves.easeInOut);

    }

    @override

    Widget build(BuildContext context) {

    return AnimatedBox(

    animation: animation,

    );

    }

    @override

    void dispose() {

    controller.dispose();

    super.dispose();

    }

    }

    class AnimatedBox extends AnimatedWidget {

    AnimatedBox({Key key, this.animation})

    : super(key: key, listenable: animation);

    final Animation animation;

    final double _width = 400;

    @override

    Widget build(BuildContext context) {

    return Container(

    width: _width,

    height: 20,

    child: Stack(

    children: [

    Positioned(

    left: animation.value * _width,

    bottom: 0,

    child: Container(

    width: 10,

    height: 10,

    decoration: BoxDecoration(color: Colors.red),

    ),

    )

    ],

    ),

    );

    }

    }

    Listing 11-5

    CurvedAnimation

    ```


    `CurveTween` class uses a `Curve` object to transform the value of the animation.
    You can use `CurveTween` objects when you need to chain a curve animation with
    another `Tween` object.


    ## 11.4 Chaining Tweens


    ### Problem


    You want to chain tweens.


    ### Solution


    Use `chain()` method of `Animatable` class or `drive()` method of Animation class.


    ### Discussion


    `Animatable` is the superclass of `Tween`, `CurveTween`, and `TweenSequence` classes.
    Given an `Animatable` object, you can use the `chain()` method with another `Animatable`
    object as the parent. For a given input value, the parent `Animatable` object
    is evaluated first, then the result is used as the input of the current `Animatable`
    object. You can use multiple `chain()` methods to create complex animations.


    In Listing [11-6](#479501_1_En_11_Chapter.xhtml#PC6), the `Tween` object is chained
    with another `CurveTween` object.


    ```

    var animation = Tween(begin: 0.0, end: 300.0)

    .chain(CurveTween(curve: Curves.easeOut))

    .animate(controller);

    Listing 11-6

    Chain tweens

    ```


    You can also use the `drive()` method of `Animation` class to chain an `Animatable`
    object.


    ## 11.5 Creating Sequences of Tweens


    ### Problem


    You want to create a sequence of tweens for different stages.


    ### Solution


    Use `TweenSequence` class .


    ### Discussion


    By using `TweenSequence` class, you can use different `Animatable` objects for
    different stages of an animation. A `TweenSequence` object is defined by a list
    of `TweenSequenceItem` objects. Each `TweenSequenceItem` object has an `Animatable`
    object and a weight. The weight defines the relative percentage of this `TweenSequenceItem`
    object in the whole duration of its parent `TweenSequence` object.


    In Listing [11-7](#479501_1_En_11_Chapter.xhtml#PC7), the animation is created
    with 40% of linear tween and 60% of curved tween.


    ```

    var animation = TweenSequence([

    TweenSequenceItem(

    tween: Tween(begin: 0.0, end: 100.0),

    weight: 40,

    ),

    TweenSequenceItem(

    tween: Tween(begin: 100.0, end: 300.0)

    .chain(CurveTween(curve: Curves.easeInOut)),

    weight: 60,

    )

    ]).animate(controller);

    Listing 11-7

    Example of TweenSequence

    ```


    ## 11.6 Running Simultaneous Animations


    ### Problem


    You want to run simultaneous animations in `AnimatedWidget`.


    ### Solution


    Use `evaluate()` method of `Animatable` class.


    ### Discussion


    `AnimatedWidget` constructor only supports a single `Animation` object. If you
    want to use multiple animations in an `AnimatedWidget` object, you need to create
    multiple `Tween` objects in the `AnimatedWidget` object and use `evaluate()` method
    to get the values for the `Animation` object.


    In Listing [11-8](#479501_1_En_11_Chapter.xhtml#PC8), `_leftTween` and `_bottomTween`
    objects determine the left and bottom properties, respectively.


    ```

    class AnimatedBox extends AnimatedWidget {

    AnimatedBox({Key key, this.animation})

    : super(key: key, listenable: animation);

    final Animation animation;

    final double _width = 400;

    final double _height = 300;

    static final _leftTween = Tween(begin: 0, end: 1.0);

    static final _bottomTween = CurveTween(curve: Curves.ease);

    @override

    Widget build(BuildContext context) {

    return Container(

    width: _width,

    height: _height,

    margin: EdgeInsets.all(10),

    decoration: BoxDecoration(border: Border.all()),

    child: Stack(

    children: [

    Positioned(

    left: _leftTween.evaluate(animation) * _width,

    bottom: _bottomTween.evaluate(animation) * _height,

    child: Container(

    width: 10,

    height: 10,

    decoration: BoxDecoration(color: Colors.red),

    ),

    )

    ],

    ),

    );

    }

    }

    Listing 11-8

    Simultaneous animations

    ```


    ## 11.7 Creating Staggered Animations


    ### Problem


    You want to create sequential or overlapping animations.


    ### Solution


    Use `Interval` class.'
