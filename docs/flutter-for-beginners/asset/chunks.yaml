    ### 讨论


    如果你想访问设备上的摄像头，可以使用`camera`插件（[`https://pub.dev/packages/camera`](https://pub.dev/packages/camera)）。要安装此插件，需要在`pubspec.yaml`文件的依赖项中添加`camera:
    ⁰.5.0`。对于 iOS，需要将列表 12-13 中的代码添加到`ios/Runner/Info.plist`文件中。这两个键值对描述了访问摄像头和麦克风的目的。这是保护用户隐私所必需的。


    ```

    NSCameraUsageDescription

    APPNAME requires access to your phone''s camera.

    NSMicrophoneUsageDescription

    APPNAME requires access to your phone''s microphone.

