    ### Using Callbacks


    The last way to get text from EditableText widgets is using the callbacks. There
    are three types of callbacks related to text editing; see Table [6-1](#479501_1_En_6_Chapter.xhtml#Tab1).


    Table 6-1


    EditableText callbacks


    | Name | Type | Description |

    | --- | --- | --- |

    | `onChanged` | ValueChanged<String> | Called when text changed. |

    | `onEditingComplete` | VoidCallback | Called when user submits the text. |

    | `onSubmitted` | ValueChanged<String> | Called when user finishes editing the
    text. |


    If you want to actively watch for text changes, you should use onChanged callback.
    When user finishes editing the text, both onEditingComplete and onSubmitted callbacks
    will be invoked. The difference is that onEditingComplete callback doesn’t provide
    access to the submitted text.


    In Listing [6-3](#479501_1_En_6_Chapter.xhtml#PC3), different messages are logged
    in different callbacks. All the log messages are displayed in a RichText widget.


    ```

    class TextFieldCallbacks extends StatefulWidget {

    @override

    _TextFieldCallbacksState createState() => _TextFieldCallbacksState();

    }

    class _TextFieldCallbacksState extends State {

    List _logs = List();

    void _log(String value) {

    this.setState(() {

    this._logs.add(value);

    });

    }

    @override

    Widget build(BuildContext context) {

    return Column(

    crossAxisAlignment: CrossAxisAlignment.start,

    children: [

    TextField(

    onChanged: (text) => _log(''changed: $text''),

    onEditingComplete: () => _log(''completed''),

    onSubmitted: (text) => _log(''submitted: $text''),

    ),

    Text.rich(TextSpan(

    children: this._logs.map((log) => TextSpan(text: ''$log\n'')).toList(),

    )),

    ],

    );

    }

    }

