    # 8. Page Navigation


    Flutter apps may have multiple screens or pages. Pages are groups of functionalities.
    The user navigates between different pages to use different functionalities. Concepts
    like pages are called routes in Flutter. Routes not only include full-screen pages
    but also modal dialogs and popups. Routes are managed by `Navigator` widget. This
    chapter discusses recipes related to page navigation in Flutter.


    ## 8.1 Implementing Basic Page Navigation


    ### Problem


    You want to have basic page navigation support.


    ### Solution


    Use `Navigator.push()` to navigate to a new route and `Navigator.pop()` to navigate
    to the previous route.


    ### Discussion


    Routes are managed by `Navigator` widget. The navigator manages a stack of routes.
    Routes can be pushed on the stack using `push()` method and popped off the stack
    using `pop()` method. The top element in the stack is the currently active route.
    `Navigator` is a stateful widget with `NavigatorState` as its state. To interact
    with the navigator, you can use the static methods of `Navigator` or get an instance
    of `NavigatorState`. By using `Navigator.of()` method, you can get the nearest
    enclosing `NavigatorState` instance of the given build context. You can explicitly
    create `Navigator` widgets, but most of the time you’ll use the `Navigator` widget
    created by `WidgetsApp`, `MaterialApp`, or `CupertinoApp` widget.


    Routes are represented using implementations of abstract `Route` class. For example,
    `PageRoute` represents full-screen modal route, and `PopupRoute` represents modal
    routes that overlay a widget over the current route. Both `PageRoute` and `PopupRoute`
    classes are subclasses of `ModalRoute` class. For Material Design apps, the easiest
    way to create a full-screen page is using `MaterialPageRoute` class. `MaterialPageRoute`
    uses a `WidgetBuilder` function to build the content of the route.


    In Listing [8-1](books/Flutter%20Recipes_%20Mobile%20Development...%20(%20%20PDF%20Drive.com%20)/#479501_1_En_8_Chapter.xhtml#PC1),
    `Navigator.of(context)` gets the `NavigatorState` instance to work with. The new
    route pushed to the navigator is a `MaterialPageRoute` instance. The new route
    has a button that uses `NavigatorState.pop()` method to pop the current route
    off the navigator. In fact, when using `Scaffold` widget, a back button is added
    automatically in the app bar, so there is no need to use an explicit back button.


    ```

    class SimpleNavigationPage extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Simple Navigation''),

    ),

    body: Center(

    child: RaisedButton(

    child: Text(''Show page''),

    onPressed: () {

    Navigator.of(context).push(MaterialPageRoute(builder: (context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''New Page''),

    ),

    body: Center(

    child: Column(

    crossAxisAlignment: CrossAxisAlignment.center,

    children: [

    Text(''A new page''),

    RaisedButton(

    child: Text(''Go back''),

    onPressed: () {

    Navigator.of(context).pop();

    },

    ),

    ],

    ),

    ),

    );

    }));

    },

    ),

    ),

    );

    }

    }

    Listing 8-1

    Page navigation using Navigator

    ```


    `Navigator` class has static methods like `push()` and `pop()` which do the same
    thing as the same method in `NavigatorState` class, but these static methods require
    an extra `BuildContext` parameter. `Navigator.push(context)` is actually the same
    as `Navigator.of(context).push()`. You can choose to use either method.


    ## 8.2 Using Named Routes


    ### Problem


    You want to navigate to the same route from different places.


    ### Solution


    Use named routes with `Navigator.pushNamed()` method.


    ### Discussion


    When using `Navigator.push()` method to push new routes to the navigator, new
    routes are built on demand using builder functions. This approach doesn’t work
    well when routes can be navigated from different places, because we don’t want
    to duplicate the code of building the routes. In this case, using named routes
    is a better choice. A named route has a unique name. `Navigator.pushNamed()` method
    uses the name to specify the route to push to the navigator.


    Named routes need to be registered before they can be navigated to. The easiest
    way to register named routes is using the `routes` parameter of `WidgetsApp`,
    `MaterialApp`, or `CupertinoApp` constructor. The `routes` parameter is a `Map<String,
    WidgetBuilder>` object with keys as the route names. Route names are usually in
    path-like format starting with “/”. This is similar to how web apps organize the
    pages. For example, you can have route names like `/log_in`, `/orders`, and `/orders/1234`.


    In Listing [8-2](books/Flutter%20Recipes_%20Mobile%20Development...%20(%20%20PDF%20Drive.com%20)/#479501_1_En_8_Chapter.xhtml#PC2),
    pressing the “Sign Up” button pushes the named route `/sign_up` to the navigator.


    ```

    class LogInPage extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(

    title: Text(''Log In''),

    ),

    body: Center(

    child: RaisedButton(

    child: Text(''Sign Up''),

    onPressed: () {

    Navigator.pushNamed(context, ''/sign_up'');

    },

    ),

    ),

    );

    }

    }

    Listing 8-2

    Use named route

    ```


    In Listing [8-3](books/Flutter%20Recipes_%20Mobile%20Development...%20(%20%20PDF%20Drive.com%20)/#479501_1_En_8_Chapter.xhtml#PC3),
    two named routes are registered in `routes` parameter.


    ```

    class PageNavigationApp extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return MaterialApp(

    title: ''Page Navigation'',

    home: IndexPage(),

    routes: {

    ''/sign_up'': (context) => SignUpPage(),

    ''/log_in'': (context) => LogInPage(),

    },

    );

    }

    }

    Listing 8-3

    Register named routes

    ```


    ## 8.3 Passing Data Between Routes


    ### Problem


    You want to pass data between different routes.


    ### Solution


    Pass data to routes using constructor parameters or `RouteSettings` objects and
    pass data from routes using `result` parameter of `Navigator.pop()` method.'
