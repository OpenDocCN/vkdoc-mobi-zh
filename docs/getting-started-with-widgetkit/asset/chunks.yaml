    Now it’s time to make the API call and display the result in the views.


    ### Talk to the API and Display Fresh Information in Widgets


    If you open **OnThisDayAPI.swift**, the file that contains the `OnThisDayAPI`
    struct responsible to perform API calls , and study its static `fetchOnThisDayData(with:)`
    method, you will see that no work has been done to fetch and return data according
    to a selected event category. It just performs an API call to Wikipedia’s REST
    API endpoint, which returns data related to various categories of events under
    different keys. Then, the method stores those data of each and every category
    in a variable called `response` and returns it. Hence, currently, the method is
    returning only the results of the `all` category. Let’s modify this method so
    that it is able to filter and return events lying in categories other than `all`
    too. Replace the `fetchOnThisDayData(with:)` method with the code given in Listing
    [4-11](#505356_1_En_4_Chapter.xhtml#PC13).


    ```

    static func fetchOnThisDayData(for type: Categories, completion: @escaping ([WidgetEventData]?)
    -> Void) {

    guard let today = DateHelper.getDayAndMonthInNumbers(),

    let url = URL(string: "https://en.wikipedia.org/api/rest_v1/feed/onthisday/all/\(today.month)/\(today.day)")
    else { return }

    let task = URLSession.shared.dataTask(with: url) { data, response, _ in

    if let data = data,

    let response = response as? HTTPURLResponse,

    response.statusCode == 200 {

    do {

    let otdResponse = try JSONDecoder().decode(OTDResponse.self, from: data)

    var responses: [EventData] = []

    switch type {

    case .births: responses = otdResponse.births

    case .deaths: responses = otdResponse.deaths

    case .events: responses = otdResponse.events

    case .holidays: responses = otdResponse.holidays

    case .selected: responses = otdResponse.selected

    default: responses = otdResponse.selected

    + otdResponse.births + otdResponse.deaths + otdResponse.events + otdResponse.holidays

    }

    completion(responses.map({ WidgetEventData(text: $0.text) }))

    } catch {

    completion(nil)

    print("JSON Decoding Error.")

    }

    }

    }

    task.resume()

    }

