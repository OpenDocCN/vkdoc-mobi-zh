- fmt: "# WidgetConfiguration\n\nNow it’s time to put everything together and make\
    \ the widget work. For that, you will need to add an entry point, that is, a struct\
    \ conforming to the `Widget` protocol and marked by the `@main` property wrapper.\
    \ This struct will contain a body with an instance of `WidgetConfiguration`, and\
    \ that is where you will join all the pieces together and configure your widget.\n\
    \nTo create this entry point, navigate to the **SmallWidget** folder and create\
    \ a **SwiftUI View** named **SmallWidget** and also make sure you add a checkmark\
    \ to **SoccerTimeWidgetExtension** in Targets before creating that file. Also,\
    \ in Targets, if **SoccerTime** is checked, uncheck it.\n\n> **Tip**  \n> If you\
    \ face confusions while creating a SwiftUI View, refer to the second paragraph\
    \ of “Developing Your Widget’s UI” section.\n\nNow, replace the content of **SmallWidget**\
    \ with the code given in Listing [3-11](#505356_1_En_3_Chapter.xhtml#PC11).\n\n\
    ```\nimport WidgetKit\nimport SwiftUI\n// 1\n@main\nstruct SmallWidget: Widget\
    \ {\n    // 2\n    let widgetKind: String = \"SmallSoccerTimeWidget\"\n    //\
    \ 3\n    var body: some WidgetConfiguration {\n        StaticConfiguration(kind:\
    \ widgetKind,\n                            provider: SmallWidgetDataProvider())\
    \ { match\n            in\n            // 4\n            SmallWidgetView(match:\
    \ match)\n        }\n        // 5\n        .configurationDisplayName(\"Mini Widget\"\
    )\n        .description(\"Shows upcoming match.\")\n        .supportedFamilies([.systemSmall])\n\
    \    }\n}\n```\n\n*Listing 3-11*  \n*SmallWidget.swift*\n\nIn Listing [3-11](#505356_1_En_3_Chapter.xhtml#PC11),\
    \ the following things are done:\n\n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig7_HTML.png](images/505356_1_En_3_Chapter/505356_1_En_3_Fig7_HTML.png)\n\
    \n*Figure 3-7*  \n*The preview of a small-sized widget of SoccerTime in the widget\
    \ gallery*\n\n1.  SwiftUI and WidgetKit are imported, and a struct `SmallWidget`\
    \ conforming to `Widget` is created. Then, `SmallWidget` is marked using the `@main`\
    \ property wrapper to let the system know that it is the entry point for the target.\
    \ In other words, the code execution for rendering the small widget starts from\
    \ here.\n\n2.  `widgetKind` is defined using a unique string. It is used to describe\
    \ your widget.\n\n3.  A `Widget`’s body should be an instance of `WidgetConfiguration`.\
    \ Since both `StaticConfiguration` and `IntentConfiguration` (to be discussed\
    \ later) conform to `WidgetConfiguration`, any of them can be used. For now, you\
    \ have used `StaticConfiguration`, providing it `widgetKind` as `kind` and `SmallWidgetDataProvider`\
    \ as `provider`.\n\n4.  In this step, it’s been written that `SmallWidgetView`\
    \ will act as the view of the widget, and it has been provided with a timeline\
    \ entry, `match`.\n\n5.  In the fifth step, a configuration display name and a\
    \ description have been provided to the widget, and they are displayed above your\
    \ widget when users see it in the widget gallery. The preview of how the widget\
    \ looks in the widget gallery is shown in Figure [3-7](#505356_1_En_3_Chapter.xhtml#Fig7).\
    \ Also, since the goal is to just support the small-sized widget, an array containing\
    \ only the `systemSmall` variety of `WidgetFamily` is passed to the `supportedFamilies()`\
    \ method.\n\nThis completes the setup of the widget. Now build and run to see\
    \ the results of your effort.\n\n> **Note**  \n> Before running, make sure that\
    \ the currently selected scheme is **SoccerTimeWidgetExtension**. For reference,\
    \ refer to Figure [3-3](#505356_1_En_3_Chapter.xhtml#Fig3). If **SoccerTime**\
    \ is the selected scheme, the app will run, not the widget.\n\nBut it doesn’t\
    \ run, does it? This is because there are two entry points for your widget right\
    \ now. Delete the boilerplate file **SoccerTimeWidget.swift**, created by Xcode\
    \ when you had first generated the widget extension. Now build and run again.\n\
    \nNow it should run and your simulator should display the small-sized widget in\
    \ its homescreen, and it should look similar to Figure [3-8](#505356_1_En_3_Chapter.xhtml#Fig8).\n\
    \n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig8_HTML.png](images/505356_1_En_3_Chapter/505356_1_En_3_Fig8_HTML.png)\n\
    \n*Figure 3-8*  \n*A screenshot of the small-sized widget in the homescreen*\n\
    \nYou can play around with the widget and the application. Currently, you may\
    \ see bugs and limitations, but we will address them one after another in the\
    \ upcoming chapters.\n\n## Summary\n\nCongratulations on making it this far! This\
    \ might have been a challenging chapter for you, but no matter how hard it was,\
    \ you made it. By completing this chapter, you have created your very first widget\
    \ for iOS using SwiftUI. Also, you have gained some familiarity with the building\
    \ blocks of widgets like timeline, timeline provider, widget view, placeholder,\
    \ snapshot, and widget configuration. To sum up, a widget is made up of three\
    \ core components:\n\n1.  **Views**: SwiftUI views that are used by `WidgetKit`\
    \ as a user interface\n2.  **TimelineProvider**: A protocol responsible to update\
    \ the widget content according to the context passed at a specified date\n3. \
    \ **WidgetConfiguration**: Binds all the building blocks of a widget together\
    \ and configures the widget\n\nYou may still have confusions about things, but\
    \ have patience and practice more. And please refer to the final code of the project\
    \ in the **SoccerTimeFinal** folder of the **SoccerTime.zip** file. Plus, you\
    \ don’t have to worry as you will use those concepts in the upcoming chapters\
    \ as well.\n\nThe next chapter will teach you about links which will enable users\
    \ to tap on your widget and navigate to a relevant screen in your app for getting\
    \ more details about the content shown in your widget. Till then, keep up the\
    \ good work!\n\n---\n\n# 4. Making Widgets Configurable and Interactive\n\nOne\
    \ special thing about widgets is that users can configure them and also interact\
    \ with them to some extent. In this chapter, you will learn how you can make your\
    \ widget configurable and interactive so that users will fall in love with your\
    \ widget. To make your widget configurable, you will use `IntentConfiguration`.\
    \ And you will make the views in your widget tappable so that users can tap them\
    \ and navigate to various screens using deep links. As this chapter has a lot\
    \ of important things to cover, you may find it longer than other chapters of\
    \ this book. So, it is a good idea to give this chapter some days and even perform\
    \ revisions."
  raw: '## WidgetConfiguration


    Now it’s time to put everything together and make the widget work. For that, you
    will need to add an entry point, that is, a struct conforming to the `Widget`
    protocol and marked by the `@main` property wrapper. This struct will contain
    a body with an instance of `WidgetConfiguration` , and that is where you will
    join all the pieces together and configure your widget.


    To create this entry point, navigate to the **SmallWidget** folder and create
    a **SwiftUI View** named **SmallWidget** and also make sure you add a checkmark
    to **SoccerTimeWidgetExtension** in Targets before creating that file. Also, in
    Targets, if **SoccerTime** is checked, uncheck it.


    Tip


    If you face confusions while creating a SwiftUI View, refer to the second paragraph
    of “Developing Your Widget’s UI” section.


    Now, replace the content of **SmallWidget** with the code given in Listing [3-11](#505356_1_En_3_Chapter.xhtml#PC11).


    ```

    import WidgetKit

    import SwiftUI

    // 1

    @main

    struct SmallWidget: Widget {

    // 2

    let widgetKind: String = "SmallSoccerTimeWidget"

    // 3

    var body: some WidgetConfiguration {

    StaticConfiguration(kind: widgetKind,

    provider: SmallWidgetDataProvider()) { match

    in

    // 4

    SmallWidgetView(match: match)

    }

    // 5

    .configurationDisplayName("Mini Widget")

    .description("Shows upcoming match.")

    .supportedFamilies([.systemSmall])

    }

    }

    Listing 3-11

    SmallWidget.swift

    ```


    In Listing [3-11](#505356_1_En_3_Chapter.xhtml#PC11), the following things are
    done:


    ![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig7_HTML.png](images/505356_1_En_3_Chapter/505356_1_En_3_Fig7_HTML.png)


    Figure 3-7


    The preview of a small-sized widget of SoccerTime in the widget gallery


    1.  SwiftUI and WidgetKit are imported, and a struct `SmallWidget` conforming
    to `Widget` is created. Then, `SmallWidget` is marked using the `@main` property
    wrapper to let the system know that it is the entry point for the target. In other
    words, the code execution for rendering the small widget starts from here.


    2.  `widgetKind` is defined using a unique string. It is used to describe your
    widget.


    3.  A `Widget`’s body should be an instance of `WidgetConfiguration`. Since both
    `StaticConfiguration` and `IntentConfiguration` (to be discussed later) conform
    to `WidgetConfiguration`, any of them can be used. For now, you have used `StaticConfiguration`,
    providing it `widgetKind` as `kind` and `SmallWidgetDataProvider` as `provider`.


    4.  In this step, it’s been written that `SmallWidgetView` will act as the view
    of the widget, and it has been provided with a timeline entry, `match`.


    5.  In the fifth step, a configuration display name and a description have been
    provided to the widget, and they are displayed above your widget when users see
    it in the widget gallery. The preview of how the widget looks in the widget gallery
    is shown in Figure [3-7](#505356_1_En_3_Chapter.xhtml#Fig7). Also, since the goal
    is to just support the small-sized widget, an array containing only the `systemSmall`
    variety of `WidgetFamily` is passed to the `supportedFamilies()` method.


    This completes the setup of the widget. Now build and run to see the results of
    your effort.


    Note


    Before running, make sure that the currently selected scheme is **SoccerTimeWidgetExtension**.
    For reference, refer to Figure [3-3](#505356_1_En_3_Chapter.xhtml#Fig3). If **SoccerTime**
    is the selected scheme, the app will run, not the widget.


    But it doesn’t run, does it? This is because there are two entry points for your
    widget right now. Delete the boilerplate file **SoccerTimeWidget.swift**, created
    by Xcode when you had first generated the widget extension. Now build and run
    again.


    Now it should run and your simulator should display the small-sized widget in
    its homescreen, and it should look similar to Figure [3-8](#505356_1_En_3_Chapter.xhtml#Fig8).


    ![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig8_HTML.png](images/505356_1_En_3_Chapter/505356_1_En_3_Fig8_HTML.png)


    Figure 3-8


    A screenshot of the small-sized widget in the homescreen


    You can play around with the widget and the application. Currently, you may see
    bugs and limitations, but we will address them one after another in the upcoming
    chapters.


    ## Summary


    Congratulations on making it this far! This might have been a challenging chapter
    for you, but no matter how hard it was, you made it. By completing this chapter,
    you have created your very first widget for iOS using SwiftUI. Also, you have
    gained some familiarity with the building blocks of widgets like timeline, timeline
    provider, widget view, placeholder, snapshot, and widget configuration. To sum
    up, a widget is made up of three core components:


    1.  **Views**: SwiftUI views that are used by WidgetKit as a user interface


    2.  **TimelineProvider**: A protocol responsible to update the widget content
    according to the context passed at a specified date


    3.  **WidgetConfiguration**: Binds all the building blocks of a widget together
    and configures the widget


    You may still have confusions about things, but have patience and practice more.
    And please refer to the final code of the project in the **SoccerTimeFinal** folder
    of the **SoccerTime.zip** file. Plus, you don’t have to worry as you will use
    those concepts in the upcoming chapters as well.


    The next chapter will teach you about links which will enable users to tap on
    your widget and navigate to a relevant screen in your app for getting more details
    about the content shown in your widget. Till then, keep up the good work!


    Footnotes [1](#505356_1_En_3_Chapter.xhtml#Fn1_source)


    # 4. Making Widgets Configurable and Interactive


    One special thing about widgets is that users can configure them and also interact
    with them to some extent. In this chapter, you will learn how you can make your
    widget configurable and interactive so that users will fall in love with your
    widget. To make your widget configurable, you will use `IntentConfiguration`.
    And you will make the views in your widget tappable so that users can tap them
    and navigate to various screens using deep links. As this chapter has a lot of
    important things to cover, you may find it longer than other chapters of this
    book. So, it is a good idea to give this chapter some days and even perform revisions.'
  trans: "\n# WidgetConfiguration（小组件配置）\n\n现在是时候将所有内容整合起来，让小组件正常工作了。为此，你需要添加一个入口点，即一个符合`Widget`协议并使用`@main`属性包装器标记的结构体。该结构体将包含一个带有`WidgetConfiguration`实例的\
    \ body，在这里你将把所有部分组合在一起并配置你的小组件。\n\n要创建这个入口点，请导航至 **SmallWidget** 文件夹，创建一个名为 **SmallWidget**\
    \ 的 **SwiftUI View**，同时确保在创建该文件之前，在 Targets 中勾选了 **SoccerTimeWidgetExtension**。此外，在\
    \ Targets 中，如果 **SoccerTime** 被勾选，请取消勾选。\n\n> **提示**  \n> 如果在创建 SwiftUI View 时遇到困惑，请参考“开发小组件\
    \ UI”部分的第二段。\n\n现在，用清单 3-11 中给出的代码替换 **SmallWidget** 的内容。\n\n```\nimport WidgetKit\n\
    import SwiftUI\n// 1\n@main\nstruct SmallWidget: Widget {\n    // 2\n    let widgetKind:\
    \ String = \"SmallSoccerTimeWidget\"\n    // 3\n    var body: some WidgetConfiguration\
    \ {\n        StaticConfiguration(kind: widgetKind,\n                         \
    \   provider: SmallWidgetDataProvider()) { match\n            in\n           \
    \ // 4\n            SmallWidgetView(match: match)\n        }\n        // 5\n \
    \       .configurationDisplayName(\"迷你小组件\")\n        .description(\"显示即将到来的比赛。\"\
    )\n        .supportedFamilies([.systemSmall])\n    }\n}\n```\n\n*清单 3-11*  \n\
    *SmallWidget.swift*\n\n在清单 3-11 中，完成了以下操作：\n\n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig7_HTML.png](img/505356_1_En_3_Fig7_HTML.png)\n\
    \n*图 3-7*  \n*SoccerTime 小组件在组件库中的小型组件预览*\n\n1.  导入了 SwiftUI 和 WidgetKit，并创建了一个符合\
    \ `Widget` 协议的结构体 `SmallWidget`。然后，使用 `@main` 属性包装器标记 `SmallWidget`，让系统知道它是该目标的入口点。换句话说，渲染小组件的代码执行从此处开始。\n\
    \n2.  使用一个唯一的字符串定义了 `widgetKind`。它用于描述你的小组件。\n\n3.  `Widget` 的 body 应为一个 `WidgetConfiguration`\
    \ 实例。由于 `StaticConfiguration` 和 `IntentConfiguration`（稍后讨论）都符合 `WidgetConfiguration`，因此可以使用其中任何一个。现在，你使用了\
    \ `StaticConfiguration`，为其提供了 `widgetKind` 作为 `kind`，以及 `SmallWidgetDataProvider`\
    \ 作为 `provider`。\n\n4.  在此步骤中，已编写 `SmallWidgetView` 将充当小组件的视图，并为其提供了一个时间线条目 `match`。\n\
    \n5.  在第五步中，为小组件提供了配置显示名称和描述，当用户在小组件库中查看时，它们会显示在小组件上方。小组件在组件库中的预览如图 3-7 所示。此外，由于目标仅是支持小型组件，因此将仅包含\
    \ `WidgetFamily` 的 `systemSmall` 类型的数组传递给 `supportedFamilies()` 方法。\n\n至此，小组件的设置完成。现在构建并运行，查看你的工作成果。\n\
    \n> **注意**  \n> 在运行之前，请确保当前选定的方案是 **SoccerTimeWidgetExtension**。作为参考，请参见图 3-3。如果选定的方案是\
    \ **SoccerTime**，则运行的是应用，而不是小组件。\n\n但它并没有运行，对吗？这是因为你的小组件目前有两个入口点。删除由 Xcode 在你首次生成小组件扩展时创建的样板文件\
    \ **SoccerTimeWidget.swift**。现在再次构建并运行。\n\n现在它应该可以运行了，你的模拟器应在主屏幕上显示小型组件，并且看起来应该类似于图\
    \ 3-8。\n\n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig8_HTML.png](img/505356_1_En_3_Fig8_HTML.png)\n\
    \n*图 3-8*  \n*主屏幕上小型组件的截图*\n\n你可以随意操作小组件和应用。目前，你可能会看到一些错误和限制，但我们将在后续章节中逐一解决。\n\
    \n## 总结\n\n恭喜你走到这一步！这对你来说可能是一个充满挑战的章节，但无论多么困难，你都挺过来了。通过完成本章，你已使用 SwiftUI 为 iOS\
    \ 创建了你的第一个小组件。同时，你也熟悉了小组件的构建模块，如时间线、时间线提供程序、小组件视图、占位视图、快照和小组件配置。总而言之，小组件由三个核心组件组成：\n\
    \n1.  **视图**：由 `WidgetKit` 用作用户界面的 SwiftUI 视图\n2.  **TimelineProvider**：一个协议，负责根据在指定日期传递的上下文更新小组件内容\n\
    3.  **WidgetConfiguration**：将小组件的所有构建模块绑定在一起并配置小组件\n\n你可能仍然对某些事情感到困惑，但请保持耐心并多加练习。请参考\
    \ **SoccerTime.zip** 文件的 **SoccerTimeFinal** 文件夹中的项目最终代码。此外，你不用担心，因为在接下来的章节中你也会用到这些概念。\n\
    \n下一章将教你关于链接的知识，这将使用户能够点击你的小组件并导航到应用中的相关屏幕，以获取关于小组件中显示内容的更多详细信息。在此之前，请继续保持良好的工作！\n\
    \n---\n\n# 4. 让小组件可配置和可交互\n\n小组件的一个特别之处在于，用户可以在一定程度上配置它们并与它们进行交互。在本章中，你将学习如何使你的小组件可配置和可交互，以便用户爱上你的小组件。为了使你的小组件可配置，你将使用\
    \ `IntentConfiguration`。并且你将使小组件中的视图可点击，以便用户可以点击它们并使用深层链接导航到不同的屏幕。由于本章需要涵盖很多重要内容，你可能会发现它比本书的其他章节更长。因此，最好花几天时间来学习本章，甚至进行复习。\n"
- fmt: '## Let’s Get Started


    To begin working, you can unzip the file named `OnThisDay.zip`. If you’ve successfully
    unzipped it, open the `OnThisDayStarter` folder and run `OnThisDay.xcodeproj`
    to see `OnThisDay` in action. `OnThisDay` is an application that displays the
    events that historically took place on the system date, by making use of Wikipedia’s
    “On This Day REST API.”^([⁸](#fn8)) It lists various types of events like births,
    deaths, events, holidays, and selected events under their respective section headers.
    Figures [4-1](#505356_1_En_4_Chapter.xhtml#Fig1) and [4-2](#505356_1_En_4_Chapter.xhtml#Fig2)
    give you an idea of how the app actually looks.


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig2_HTML.png](images/505356_1_En_4_Chapter/505356_1_En_4_Fig2_HTML.png)


    Figure 4-2


    The homescreen of `OnThisDay` displaying a list of section headers


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig1_HTML.png](images/505356_1_En_4_Chapter/505356_1_En_4_Fig1_HTML.png)


    Figure 4-1


    The homescreen of `OnThisDay` displaying a list of birthdays


    Another interesting feature of `OnThisDay` is that you can choose the type of
    the event and get a filtered list of the events of that particular type. And that
    choice stays persistent even after you close and rerun the app – meaning that
    if you choose `Selected` from the menu, even when you close and rerun the app,
    only `Selected` events will be displayed in the list. Thanks to `UserDefaults`^([⁹](#fn9))
    for making this possible! Figure [4-3](#505356_1_En_4_Chapter.xhtml#Fig3) displays
    a menu from which you can select a type or category of events.


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig3_HTML.png](images/505356_1_En_4_Chapter/505356_1_En_4_Fig3_HTML.png)


    Figure 4-3


    Choosing “Selected” events from the menu


    Also, you can tap on an event to see more details and a photo related to that
    event. Refer to Figure [4-4](#505356_1_En_4_Chapter.xhtml#Fig4) to see the screenshot
    of the event detail screen. `OnThisDay` also shows the pages related to that event,
    and you can tap on those pages to navigate to their Wikipedia pages. That screen
    is shown in Figure [4-5](#505356_1_En_4_Chapter.xhtml#Fig5).


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig5_HTML.png](images/505356_1_En_4_Chapter/505356_1_En_4_Fig5_HTML.png)


    Figure 4-5


    A Wikipedia page loaded after tapping a “Related Page” in the detail screen


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig4_HTML.png](images/505356_1_En_4_Chapter/505356_1_En_4_Fig4_HTML.png)


    Figure 4-4


    A detail screen displayed after tapping an event on the homescreen


    Now you must have deduced that `OnThisDay` is a fully functional app. Yes, it
    is. But, why not create its widgets and display some information on the user’s
    homescreen? Widgets surely can help to make your app look more useful to the user.
    That is why we have done some part of the work for you. We have already created
    a widget extension of `OnThisDay` as `OnThisDayWidgetExtension` and written all
    three families of widgets for `OnThisDay`. Choose the `OnThisDayWidgetExtension`
    scheme and run the code to see the small widget of `OnThisDay` on your simulator’s
    or device’s homescreen (Figure [4-6](#505356_1_En_4_Chapter.xhtml#Fig6)).


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig6_HTML.jpg](images/505356_1_En_4_Chapter/505356_1_En_4_Fig6_HTML.jpg)


    Figure 4-6


    A screenshot displaying `OnThisDayWidgetExtension` as the selected scheme


    Add the other two widget families also to your homescreen by long pressing a space
    in the homescreen and tapping the “**+**” icon. Then from the app list, tap `OnThisDay`
    and scroll to your desired widget family and tap **Add Widget**.


    Currently, the widgets are displaying dummy data, but later you will integrate
    Wikipedia’s “On This Day REST API” to display updated information.


    Now, let’s move on to how the widgets look like. The small widget (Figure [4-7](#505356_1_En_4_Chapter.xhtml#Fig7)),
    as it has less space, displays only the number of events that took place historically
    on the system date.


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig7_HTML.jpg](images/505356_1_En_4_Chapter/505356_1_En_4_Fig7_HTML.jpg)


    Figure 4-7


    Small-sized widget of `OnThisDay`


    But since the medium widget (Figure [4-8](#505356_1_En_4_Chapter.xhtml#Fig8))
    can accommodate some more views, it not only shows the number of events that took
    place historically on the system date but also some information about a couple
    of events.


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig8_HTML.png](images/505356_1_En_4_Chapter/505356_1_En_4_Fig8_HTML.png)


    Figure 4-8


    Medium-sized widget of `OnThisDay`


    And the large widget (Figure [4-9](#505356_1_En_4_Chapter.xhtml#Fig9)) displays
    the same information that the medium widget displays, but in a greater amount
    and a different arrangement.


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig9_HTML.jpg](images/505356_1_En_4_Chapter/505356_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Large-sized widget of `OnThisDay`


    In addition to this, at the later part of this chapter, you will make your widgets
    configurable – meaning that users will be able to long press on your widgets and
    **Edit Widget** to select the type/category of events whose information they would
    like the widget to display. Hence, if the users select `Holidays`, only the information
    of the events lying in the “Holidays” category will be displayed in the widget.
    Figure [4-10](#505356_1_En_4_Chapter.xhtml#Fig10) is the screenshot of the widget
    displaying the list of options given when a widget is long pressed, and Figure
    [4-11](#505356_1_En_4_Chapter.xhtml#Fig11) is the screenshot of the widget displaying
    the configuration option shown after tapping **Edit Widget**. In addition to these,
    Figure [4-12](#505356_1_En_4_Chapter.xhtml#Fig12) shows the event categories that
    users can choose from to make their widget display information about.


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig12_HTML.jpg](images/505356_1_En_4_Chapter/505356_1_En_4_Fig12_HTML.jpg)


    Figure 4-12


    The event categories users can choose from to make the widget display information
    about


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig11_HTML.png](images/505356_1_En_4_Chapter/505356_1_En_4_Fig11_HTML.png)


    Figure 4-11


    The configuration option displayed after tapping **Edit Widget** in Figure [4-10](#505356_1_En_4_Chapter.xhtml#Fig10)


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig10_HTML.png](images/505356_1_En_4_Chapter/505356_1_En_4_Fig10_HTML.png)


    Figure 4-10


    The list of options displayed when a widget is long pressed


    Now, it’s time that you look at the already existing code. As we have already
    stated earlier, we have already set up some basic stuff.


    If you go to the **Project Navigator** and open the `OnThisDay` project, you will
    find two main folders, that is, `OnThisDay` and `OnThisDayWidget`. The `OnThisDay`
    folder contains the files and folders related to the app, and the `OnThisDayWidget`
    folder contains the files and folders related to the widgets. There are also certain
    files which are used by both the app and the widgets, and those files are shared
    using **Target Membership**.


    Open the `OnThisDay` folder in the `OnThisDay` project to see the following folder
    structure:


    ```

    OnThisDay

    ├── Assets.xcassets

    ├── Extensions

    │   ├── URL.swift

    │   └── View.swift

    ├── Info.plist

    ├── Models

    │   ├── ContentURL.swift

    │   ├── EventData.swift

    │   ├── EventType.swift

    │   ├── OTDResponse.swift

    │   ├── OriginalImage.swift

    │   ├── Page.swift

    │   └── URLData.swift

    ├── OnThisDayApp.swift

    ├── Preview\ Content

    ├── Utilities

    │   ├── DateHelper.swift

    │   └── WebView.swift

    ├── ViewModels

    │   └── OTDViewModel.swift

    └── Views

    ├── Custom\ Views

    │   ├── DetailRowView.swift

    │   ├── HomeRowView.swift

    │   ├── RelatedPageRowView.swift

    │   └── TrailingNavView.swift

    ├── DetailView.swift

    └── HomeView.swift

    ```'
