    \        task.resume()\n    }\n}\n代码清单 4-1\n包含一个静态方法用于调用 Wikipedia API 的 OnThisDayAPI\
    \ 结构体\n```\n\n代码清单 4-1 由`OnThisDayAPI`结构体组成，其中包含一个名为`fetchOnThisDayData(with:)`的静态方法。该方法调用\
    \ Wikipedia API 来获取系统日期（由`DateHelper.getDayAndMonthInNumbers()`方法返回并存储在`today`变量中）发生的所有类型的事件。然后，对响应进行解码，并通过其完成处理程序将其返回给调用方，该处理程序接受一个`WidgetEventData`数组作为参数。\n\
