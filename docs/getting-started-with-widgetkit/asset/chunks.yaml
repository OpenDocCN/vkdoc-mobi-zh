- fmt: 'If you look at the code in Listing [4-10](#505356_1_En_4_Chapter.xhtml#PC12),
    you will see that the body of `OnThisDayWidget` has an `IntentConfiguration` initializer
    instead of a `StaticConfiguration` initializer. The only difference between those
    initializers is that `IntentConfiguration` takes an argument, `intent`, with the
    value, `EventCategoryIntent.self` (you had created this custom intent in `EventCategory.intentdefinition`),
    and another argument, `provider`, with an initializer of `IntentProvider`. All
    the other codes are identical to that of the `StaticConfiguration` initializer
    that was previously being used. Also, delete the `staticConfiguration` variable
    as you will not need it anymore.


    Like this, you have completed switching to `IntentConfiguration` from `StaticConfiguration`.
    Now it’s time to make the API call and display the result in the views.


    ### Talk to the API and Display Fresh Information in Widgets


    If you open `OnThisDayAPI.swift`, the file that contains the `OnThisDayAPI` struct
    responsible to perform API calls, and study its static `fetchOnThisDayData(with:)`
    method, you will see that no work has been done to fetch and return data according
    to a selected event category. It just performs an API call to Wikipedia’s REST
    API endpoint, which returns data related to various categories of events under
    different keys. Then, the method stores those data of each and every category
    in a variable called `response` and returns it. Hence, currently, the method is
    returning only the results of the `all` category. Let’s modify this method so
    that it is able to filter and return events lying in categories other than `all`
    too. Replace the `fetchOnThisDayData(with:)` method with the code given in Listing
    [4-11](#505356_1_En_4_Chapter.xhtml#PC13).


    ```swift

    static func fetchOnThisDayData(for type: Categories, completion: @escaping ([WidgetEventData]?)
    -> Void) {

    guard let today = DateHelper.getDayAndMonthInNumbers(),

    let url = URL(string: "https://en.wikipedia.org/api/rest_v1/feed/onthisday/all/\(today.month)/\(today.day)")
    else { return }

    let task = URLSession.shared.dataTask(with: url) { data, response, _ in

    if let data = data,

    let response = response as? HTTPURLResponse,

    response.statusCode == 200 {

    do {

    let otdResponse = try JSONDecoder().decode(OTDResponse.self, from: data)

    var responses: [EventData] = []

    switch type {

    case .births: responses = otdResponse.births

    case .deaths: responses = otdResponse.deaths

    case .events: responses = otdResponse.events

    case .holidays: responses = otdResponse.holidays

    case .selected: responses = otdResponse.selected

    default: responses = otdResponse.selected

    + otdResponse.births + otdResponse.deaths + otdResponse.events + otdResponse.holidays

    }

    completion(responses.map({ WidgetEventData(text: $0.text) }))

    } catch {

    completion(nil)

    print("JSON Decoding Error.")

    }

    }

    }

    task.resume()

    }

    Listing 4-11

    fetchOnThisDayData(for:completion:) method

    ```


    Listing [4-11](#505356_1_En_4_Chapter.xhtml#PC13) is the code that replaces the
    old `fetchOnThisDayData(with:)` method. This new method `fetchOnThisDayData(for:completion:)`,
    in addition to the completion handler, has a new parameter named `for` of type
    `Categories`. This `for` parameter plays an important role in filtering the data
    according to the selected category. It is visible in the switch case used in the
    code. A switch case is applied on the `type` variable (previously `for` variable),
    and only the results of a particular category are returned by the method as long
    as other categories, except the default category `all`, are selected. For example,
    if the selected `type`/category is `births`, the method will return only the data
    held by the `births` key of the API response.


    Now build the code to see the locations affected by this change. The first location
    affected is `Provider.swift`. Since the struct in this file was being used by
    `StaticConfiguration` and now you are no longer using `StaticConfiguration`, delete
    `Provider.swift`. After that, the only affected area remaining will be `IntentProvider.swift`.
    Xcode must be saying, “Missing argument for parameter ‘for’ in call.” Click **Fix**
    to make Xcode add the necessary argument `for`. And replace the placeholder with
    `configuration.categories` to fetch the selected category from your widget’s configuration.
    Now your call to the `fetchOnThisDayData(for:completion:)` method in `getTimeline(for:in:completion:)`
    should look something like Listing [4-12](#505356_1_En_4_Chapter.xhtml#PC14).'
