    ![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig6_HTML.jpg](images/505356_1_En_3_Chapter/505356_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    A screenshot displaying the preview of small-sized widget'
  trans: '

    # 开发小组件的用户界面


    前几节内容都围绕配置小组件的工作机制展开。在本节中，您将最终着手设计小组件的用户界面。您将制作一个小尺寸小组件，其视图与通常用 SwiftUI 创建的视图基本相同，但会做一些小幅调整。该小组件将显示最近一场即将开始的比赛中两支对战球队的队徽，以及比赛开始前的倒计时。


    首先，创建一个 SwiftUI 文件。导航至 `SmallWidget` 文件夹，然后通过 **文件** ➤ **新建** ➤ **文件…** ➤ **SwiftUI
    视图**，创建一个名为 `SmallWidgetView` 的 `SwiftUI View`。设置文件名并选择位置后，在点击 **创建** 之前，请记得勾选对话框底部
    `SoccerTimeWidgetExtension` 目标旁边的复选框。


    创建 `SmallWidgetView.swift` 后，用清单 3-9 中的代码替换其内容。


    ```

    // 1

    import SwiftUI

    import WidgetKit

    struct SmallWidgetView: View {

    // 2

    var match: SmallWidgetDataProvider.Entry

    var body: some View {

    // 3

    VStack(alignment: .center) {

    HStack() {

    Club(value: match.primaryClub)

    .logo.resizable()

    .aspectRatio(contentMode: .fit)

    Text("vs").font(.footnote)

    Club(value: match.secondaryClub)

    .logo.resizable()

    .aspectRatio(contentMode: .fit)

    }.frame(height: 50)

    if match.date > Date() {

    Text(match.date, style: .timer)

    .font(.system(.title,

    design: .monospaced))

    .foregroundColor(Color.gray)

    .multilineTextAlignment(.center)

    } else {

    Text("暂无即将开始的比赛。")

    .foregroundColor(.gray)

    }

    }

    }

    }

    清单 3-9

    SmallWidgetView.swift

    ```


    清单 3-9 中的代码用于布局小尺寸小组件的用户界面。然而，粘贴代码后，您可能会看到一个错误提示：“在‘Club’作用域中找不到‘Club’”。要解决此问题，您需要使
    `Club` 在 `SoccerTimeWidgetExtension` 目标中可用，现在您应该至少模糊地知道如何操作了。不过，如果您还没弄清楚也没关系。只需前往
    `Clubs.swift` 文件，在文件检查器的**目标成员**中勾选 `SoccerTime` 和 `SoccerTimeWidgetExtension`
    两个复选框。同时，对 `ImageExtension.swift`（位于 `Extensions` 文件夹中）执行相同操作，通过勾选 `SoccerTimeWidgetExtension`
    来更新其目标成员，以避免出现诸如“类型‘Image’没有成员‘alavés’”之类的错误。


    现在，让我们解释一下清单 3-9 中代码的作用：


    1.  导入 `SwiftUI` 和 `WidgetKit`。


    2.  声明一个名为 `match` 的变量，用于向视图提供数据。在当前情况下，数据来自 `SmallWidgetDataProvider` 的 `TimelineEntry`
    值。


    3.  使用 `VStack` 和 `HStack` 准备视图，以显示比赛提供的信息。如果条目的日期不晚于当前时间，则显示“暂无即将开始的比赛。”而不是计时器。


    到目前为止，`SmallWidgetView` 的**画布**窗口应该显示“无预览”。这是因为在将内容替换为清单 3-9 的代码时，您移除了 `SmallWidgetView`
    的预览结构体。现在，通过将清单 3-10 中的代码粘贴到文件底部来修复此问题。


    ```

    struct SmallWidgetView_Previews: PreviewProvider {

    static var previews: some View {

    SmallWidgetView(match: Match(primaryClub: "", secondaryClub: "", date: Date()))

    .previewContext(WidgetPreviewContext(family:

    .systemSmall))

    }

    }

    清单 3-10

    SmallWidgetView 的预览结构体

    ```


    清单 3-10 中的代码创建了 `SmallWidgetView` 的预览。一旦粘贴并点击**画布**窗口中的**继续**按钮，就会显示如图 3-6 所示的预览。


    ![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig6_HTML.jpg](img/505356_1_En_3_Fig6_HTML.jpg)


    图 3-6


    显示小尺寸小组件预览的截图

