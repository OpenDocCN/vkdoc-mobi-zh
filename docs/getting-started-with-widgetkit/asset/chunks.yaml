    和 `getTimeline(in:completion:)` 的方法，而 `IntentProvider` 拥有类似 `getSnapshot(for:in:completion:)`
    和 `getTimeline(for:in:completion:)` 的方法。


    因此，在从 `Provider` 复制代码时，请确保不要复制整个方法，而只复制这些方法花括号内的行。为简便起见，你可以直接复制代码清单 4-6 中的代码。


