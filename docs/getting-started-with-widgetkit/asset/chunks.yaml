- fmt: '# Hello, WidgetKit!


    Apple introduced the `WidgetKit` framework to enable developers to develop widgets
    of their apps. The beauty of widgets is that users can get the latest information
    at a glance, without having to launch the app. And in case users need more details,
    they can tap on the widget to navigate to the appropriate location in the app.


    `WidgetKit` allows you to create widgets of three different sizes – small, medium,
    and large. These widgets can be used to display different amount of information.
    For example, if you have a weather app, you can use the small-sized widget to
    display only the current temperature in degree Fahrenheit or degree Celsius. The
    medium-sized widget can display the current location and the temperature. And
    since the large-sized widget has a greater space, you can use it to display the
    current location, the temperature, and a brief weather report of the day. And
    if the users want a detailed report, they can launch the app by tapping the widget.
    So, for companies, businesses, and developers, widgets are a nice way to keep
    their users attracted and engaged to their app.


    **Note**


    Before developing widgets, you must keep in mind that the `WidgetKit` framework
    is available only in iOS 14 and above. So, consider your target users before development.
    Also, you will require basic `SwiftUI` knowledge and Xcode 12 or above to be able
    to develop widgets.


    ## Summary


    Now you have gained some familiarity with `WidgetKit`, Apple’s framework to develop
    widgets of various sizes. Also, you now have an idea about how widgets can help
    users to get up-to-date information at a glance and how developers can develop
    beautiful and handy widgets to keep their users attracted and engaged to their
    app. Plus, you have learned that iOS 14 is the minimum iOS version that supports
    widgets, and Xcode 12 is the minimum version of Xcode that can be used to develop
    widgets.


    Since `SwiftUI` is used to develop widgets, in the upcoming chapter, we will give
    you an overview of `SwiftUI` and its views that you will use to create widgets.
    You will learn more about the various sizes of widgets you can create, and you
    will get an overview of Apple’s Human Interface Guidelines (`HIG`) for widgets.


    **EXERCISE**


    1. Go through the overview section of the official documentation of `WidgetKit`
    from [`https://developer.apple.com/documentation/widgetkit/`](https://developer.apple.com/documentation/widgetkit/).
    It can help you get a different perspective to understand things. You can explore
    other sections too, if you are interested.


    2. Try completing at least the first chapter, `SwiftUI Essentials`, from [`https://developer.apple.com/tutorials/swiftui/`](https://developer.apple.com/tutorials/),
    if you haven’t given `SwiftUI` a try. This tutorial will help you understand the
    basics and make you ready for the next chapter of our book.


    # 2. SwiftUI, Human Interface Guidelines, and Widget Family


    Now that you have a general idea about `WidgetKit`, you can move forward to learn
    about some basic building blocks of a widget. In this chapter, you will learn
    about some views of `SwiftUI` that will act as the building blocks of your widget.
    Then, you will get an overview of Apple’s Human Interface Guidelines for creating
    intuitive, easy-to-learn, and consistent user interface for widgets. In addition
    to these, you will learn more about `WidgetFamily` that enables you to create
    widgets of various sizes.


    ## SwiftUI


    In WWDC 2019, Apple introduced `SwiftUI` – a framework that brought a major change
    in the way iOS apps are developed. Before the introduction of `SwiftUI`, there
    existed debates between developers about whether they should use Storyboards or
    develop the app UI programmatically. `SwiftUI` flushed out the debate and brought
    a new and easier way to create beautiful and interactive user interfaces with
    eye-pleasing animations and transitions. Note the phrase “new and easier way.”
    There are three major reasons why developing apps using `SwiftUI` is easier:


    1. **`SwiftUI` uses a declarative approach of programming**: A declarative approach
    allows you to describe how your app’s user interface looks like and what you want
    your app to do when a state changes, without getting into much details. This decreases
    the amount of code and makes it easier to read, understand, and modify. Before
    `SwiftUI`, we used an imperative approach of programming, meaning that we had
    to write detailed step-by-step instructions to lay out the user interface and
    control the states. This generally led to a large volume of code. With `SwiftUI`,
    things have become simpler.


    2. **Bid farewell to Storyboard and Auto Layout**: Before `SwiftUI`, developers
    who didn’t prefer developing a user interface programmatically used Storyboard.
    Using Storyboard was a nice way, but there was a hassle of using Auto Layout to
    make the app’s interface look consistent on all screen sizes. But now, `SwiftUI`
    has introduced a number of views (like stacks and spacer) and their properties
    (like padding) to make user interface appear consistent with lesser effort.


    3. **Learn once, apply anywhere**: `SwiftUI` is a unified user interface framework
    to build a user interface for all types and sizes of Apple devices. It means that
    you can easily port the UI code you wrote for iOS to macOS or watchOS without
    modifications or with minimum modifications. Before the launch of `SwiftUI`, we
    had to use different frameworks to develop apps for different platforms – `UIKit`
    for iOS, `AppKit` for macOS, `WatchKit` for watchOS, and `TVUIKit` for tvOS.


    Due to these reasons, we think that `SwiftUI` deserves the honor of being called
    a lifesaver.


    In `SwiftUI`, views act as the visual building blocks of the user interface of
    your app. They are used to display texts, images, shapes, and drawings in your
    app. Some views like `TextField`, `Button`, `Slider`, and `Picker` even allow
    users to interact with them to manipulate data and the user interface. What’s
    more interesting is that you can combine two or more views to give birth to complex
    views too.


    Widgets are also developed using `SwiftUI`. So, you will use `SwiftUI`’s views
    to bring your widget to life. There is a wide variety of views that you can use
    to develop widgets. However, an overview of some basic views that are used more
    often will suffice.


    ### Basic SwiftUI Views for Widgets


    Let’s go through some basic `SwiftUI` views that are often used to create widgets.


    #### Text


    You can use `Text` to display one or more lines of read-only text in your app
    or widget. For example, if you want your app or widget to display the text “SwiftUI
    is fun!”, you can write `Text("SwiftUI is fun!")`. You can also modify the appearance
    and size of the text and view by playing with its methods like `font()`, `italic()`,
    `bold()`, `lineLimit()`, and so on.


    #### Button


    `Button` is one of the most commonly used items in user interfaces. It is able
    to perform an action when it is triggered through events. Its initializer takes
    two arguments – an action and a label. Let’s write some code to create a button
    that prints “Buttons are good!”.


    In Listing [2-1](#505356_1_En_2_Chapter.xhtml#PC1), the button contains an action
    that prints “Buttons are good!” when it is triggered.


    ```

    Button(action: {

    print("Buttons are good!")

    }) {

    Text("Tap me")

    }

    Listing 2-1

    A button in SwiftUI

    ```


    The second argument is a `Text` view that gives the button its title. However,
    you can use other views here to change the composition of the button and leverage
    various methods that a button provides to change its appearance and size.


    Are you thinking where you can use buttons in your widgets? Assume that you have
    a to-do list app and your widget needs to display the items that haven’t been
    completed yet. You have planned to represent each item by an empty checkbox, followed
    by text. So, in this case, you can use a button to create the checkbox, which
    when tapped removes the item from the to-do list. Simple, right?'
  raw: '## Hello, WidgetKit!


    Apple introduced the WidgetKit framework to enable developers to develop widgets
    of their apps. The beauty of widgets is that users can get the latest information
    at a glance, without having to launch the app. And in case users need more details,
    they can tap on the widget to navigate to the appropriate location in the app.


    WidgetKit allows you to create widgets of three different sizes – small, medium,
    and large. These widgets can be used to display different amount of information.
    For example, if you have a weather app, you can use the small-sized widget to
    display only the current temperature in degree Fahrenheit or degree Celsius. The
    medium-sized widget can display the current location and the temperature. And
    since the large-sized widget has a greater space, you can use it to display the
    current location, the temperature, and a brief weather report of the day. And
    if the users want a detailed report, they can launch the app by tapping the widget.
    So, for companies, businesses, and developers, widgets are a nice way to keep
    their users attracted and engaged to their app.


    Note


    Before developing widgets, you must keep in mind that the WidgetKit framework
    is available only in iOS 14 and above. So, consider your target users before development.
    Also, you will require basic SwiftUI knowledge and Xcode 12 or above to be able
    to develop widgets.


    ## Summary


    Now you have gained some familiarity with WidgetKit, Apple’s framework to develop
    widgets of various sizes. Also, you now have an idea about how widgets can help
    users to get up-to-date information at a glance and how developers can develop
    beautiful and handy widgets to keep their users attracted and engaged to their
    app. Plus, you have learned that iOS 14 is the minimum iOS version that supports
    widgets, and Xcode 12 is the minimum version of Xcode that can be used to develop
    widgets.


    Since SwiftUI is used to develop widgets, in the upcoming chapter, we will give
    you an overview of SwiftUI and its views that you will use to create widgets.
    You will learn more about the various sizes of widgets you can create, and you
    will get an overview of Apple’s Human Interface Guidelines (HIG) for widgets.


    EXERCISE


    1.  Go through the overview section of the official documentation of WidgetKit
    from [`https://developer.apple.com/documentation/widgetkit/`](https://developer.apple.com/documentation/widgetkit/).
    It can help you get a different perspective to understand things. You can explore
    other sections too, if you are interested.


    2.  Try completing at least the first chapter, SwiftUI Essentials, from [`https://developer.apple.com/tutorials/swiftui/`](https://developer.apple.com/tutorials/),
    if you haven’t given SwiftUI a try. This tutorial will help you understand the
    basics and make you ready for the next chapter of our book.


    # 2. SwiftUI, Human Interface Guidelines, and Widget Family


    Now that you have a general idea about WidgetKit, you can move forward to learn
    about some basic building blocks of a widget. In this chapter, you will learn
    about some views of SwiftUI that will act as the building blocks of your widget.
    Then, you will get an overview of Apple’s Human Interface Guidelines for creating
    intuitive, easy-to-learn, and consistent user interface for widgets. In addition
    to these, you will learn more about `WidgetFamily` that enables you to create
    widgets of various sizes.


    ## SwiftUI


    In WWDC 2019, Apple introduced SwiftUI – a framework that brought a major change
    in the way iOS apps are developed. Before the introduction of SwiftUI, there existed
    debates between developers about whether they should use Storyboards or develop
    the app UI programmatically. SwiftUI flushed out the debate and brought a new
    and easier way to create beautiful and interactive user interfaces with eye-pleasing
    animations and transitions. Note the phrase “new and easier way.” There are three
    major reasons why developing apps using SwiftUI is easier:


    1.  **SwiftUI uses a declarative approach of programming**: A declarative approach
    allows you to describe how your app’s user interface looks like and what you want
    your app to do when a state changes, without getting into much details. This decreases
    the amount of code and makes it easier to read, understand, and modify. Before
    SwiftUI, we used an imperative approach of programming, meaning that we had to
    write detailed step-by-step instructions to lay out the user interface and control
    the states. This generally led to a large volume of code. With SwiftUI, things
    have become simpler.


    2.  **Bid farewell to Storyboard and Auto Layout**: Before SwiftUI, developers
    who didn’t prefer developing a user interface programmatically used Storyboard.
    Using Storyboard was a nice way, but there was a hassle of using Auto Layout to
    make the app’s interface look consistent on all screen sizes. But now, SwiftUI
    has introduced a number of views (like stacks and spacer) and their properties
    (like padding) to make user interface appear consistent with lesser effort.


    3.  **Learn once, apply anywhere**: SwiftUI is a unified user interface framework
    to build a user interface for all types and sizes of Apple devices. It means that
    you can easily port the UI code you wrote for iOS to macOS or watchOS without
    modifications or with minimum modifications. Before the launch of SwiftUI, we
    had to use different frameworks to develop apps for different platforms – UIKit
    for iOS, AppKit for macOS, WatchKit for watchOS, and TVUIKit for tvOS.


    Due to these reasons, we think that SwiftUI deserves the honor of being called
    a lifesaver.


    In SwiftUI, views act as the visual building blocks of the user interface of your
    app. They are used to display texts, images, shapes, and drawings in your app.
    Some views like `TextField`, `Button`, `Slider`, and `Picker` even allow users
    to interact with them to manipulate data and the user interface. What’s more interesting
    is that you can combine two or more views to give birth to complex views too.


    Widgets are also developed using SwiftUI. So, you will use SwiftUI’s views to
    bring your widget to life. There is a wide variety of views that you can use to
    develop widgets. However, an overview of some basic views that are used more often
    will suffice.


    ### Basic SwiftUI Views for Widgets


    Let’s go through some basic SwiftUI views that are often used to create widgets.


    #### Text


    You can use `Text` to display one or more lines of read-only text in your app
    or widget. For example, if you want your app or widget to display the text “SwiftUI
    is fun!”, you can write `Text("SwiftUI is fun!")`. You can also modify the appearance
    and size of the text and view by playing with its methods like `font()`, `italic()`,
    `bold()`, `lineLimit()`, and so on.


    #### Button


    Button is one of the most commonly used items in user interfaces. It is able to
    perform an action when it is triggered through events. Its initializer takes two
    arguments – an action and a label. Let’s write some code to create a button that
    prints “Buttons are good!”.


    In Listing [2-1](#505356_1_En_2_Chapter.xhtml#PC1), the button contains an action
    that prints “Buttons are good!” when it is triggered.


    ```

    Button(action: {

    print("Buttons are good!")

    }) {

    Text("Tap me")

    }

    Listing 2-1

    A button in SwiftUI

    ```


    The second argument is a `Text` view that gives the button its title. However,
    you can use other views here to change the composition of the button and leverage
    various methods that a button provides to change its appearance and size.


    Are you thinking where you can use buttons in your widgets? Assume that you have
    a to-do list app and your widget needs to display the items that haven’t been
    completed yet. You have planned to represent each item by an empty checkbox, followed
    by text. So, in this case, you can use a button to create the checkbox, which
    when tapped removes the item from the to-do list. Simple, right?'
  trans: '

    # 你好，WidgetKit！


    Apple 推出了 `WidgetKit` 框架，使开发者能够为自己的 App 开发小组件。小组件的美妙之处在于，用户无需打开 App 即可一览最新信息。而且，如果用户需要查看更详细的内容，只需轻点小组件，即可导航到
    App 中的相应位置。


    `WidgetKit` 允许你创建三种不同尺寸的小组件：小、中、大。这些小组件可用于展示不同数量的信息。例如，如果你有一个天气 App，可以使用小尺寸小组件仅显示当前的华氏度或摄氏度温度。中尺寸小组件可以显示当前位置和温度。而大尺寸小组件拥有更大的空间，你可以用它来显示当前位置、温度以及当天的简要天气预报。如果用户想要一份详细报告，他们可以轻点小组件来启动
    App。因此，对于公司、企业和开发者来说，小组件是保持用户对 App 兴趣和参与度的绝佳方式。


    **注意**


    在开发小组件之前，你必须牢记 `WidgetKit` 框架仅适用于 iOS 14 及以上版本。因此，在开发前要考虑你的目标用户。此外，你还需要具备基础的 `SwiftUI`
    知识和 Xcode 12 或更高版本才能开发小组件。


    ## 总结


    现在，你已经对 `WidgetKit`——Apple 用于开发各种尺寸小组件的框架——有了一些了解。同时，你也了解了小组件如何帮助用户一目了然地获取最新信息，以及开发者如何通过开发精美实用的小组件来保持用户对
    App 的兴趣和参与度。此外，你还了解到 iOS 14 是支持小组件的最低 iOS 版本，而 Xcode 12 是可用于开发小组件的最低 Xcode 版本。


    由于 `SwiftUI` 被用于开发小组件，在接下来的章节中，我们将向你概述 `SwiftUI` 及其视图，你将使用它们来创建小组件。你将进一步了解可以创建的各种小组件尺寸，并获取
    Apple 的《人机界面指南》（`HIG`）中关于小组件的概述。


    **练习**


    1.  浏览 `WidgetKit` 官方文档的概述部分，网址为 [`https://developer.apple.com/documentation/widgetkit/`](https://developer.apple.com/documentation/widgetkit/)。这可以帮助你从不同角度理解问题。如果你有兴趣，也可以探索其他部分。


    2.  如果你还没有尝试过 `SwiftUI`，请从 [`https://developer.apple.com/tutorials/swiftui/`](https://developer.apple.com/tutorials/)
    尝试至少完成第一章 `SwiftUI Essentials`。本教程将帮助你理解基础知识，并为阅读本书的下一章做好准备。


    # 2. SwiftUI、人机界面指南和小组件系列


    既然你对 `WidgetKit` 有了大致了解，就可以继续学习小组件的一些基本构建块了。在本章中，你将学习一些作为小组件构建块的 `SwiftUI` 视图。然后，你将了解
    Apple 的《人机界面指南》中关于创建直观、易学且一致的小组件用户界面的概述。除此之外，你还将进一步了解 `WidgetFamily`，它使你能创建各种尺寸的小组件。


    ## SwiftUI


    在 2019 年全球开发者大会上，Apple 推出了 `SwiftUI`——一个为 iOS App 开发方式带来重大变革的框架。在 `SwiftUI` 引入之前，开发者们一直在争论应该使用
    Storyboard 还是以编程方式开发 App 界面。`SwiftUI` 平息了这场争论，带来了一种新的、更简单的方法，通过赏心悦目的动画和过渡来创建美观且交互式的用户界面。请注意“新的、更简单的方法”这个说法。使用
    `SwiftUI` 开发 App 之所以更简单，主要有三个原因：


    1.  **`SwiftUI` 采用声明式编程方法**：声明式方法允许你描述 App 的用户界面是什么样子，以及当状态改变时你希望 App 做什么，而无需涉及太多细节。这减少了代码量，使其更易于阅读、理解和修改。在
    `SwiftUI` 之前，我们使用命令式编程方法，这意味着我们必须编写详细的分步指令来布局用户界面和控制状态。这通常会导致代码量庞大。有了 `SwiftUI`，事情变得简单多了。


    2.  **告别 Storyboard 和 Auto Layout**：在 `SwiftUI` 之前，不喜欢以编程方式开发用户界面的开发者使用 Storyboard。使用
    Storyboard 是一种不错的方式，但使用 Auto Layout 来使 App 界面在所有屏幕尺寸上看起来一致是一件麻烦事。但现在，`SwiftUI`
    引入了许多视图（如堆栈和间距器）及其属性（如内边距），使得以更少的精力就能让用户界面看起来一致。


    3.  **一次学习，随处应用**：`SwiftUI` 是一个统一的用户界面框架，用于为所有类型和尺寸的 Apple 设备构建用户界面。这意味着你可以将为
    iOS 编写的界面代码轻松移植到 macOS 或 watchOS 上，而无需修改或只需进行极少的修改。在 `SwiftUI` 推出之前，我们必须使用不同的框架来为不同平台开发
    App——`UIKit` 用于 iOS，`AppKit` 用于 macOS，`WatchKit` 用于 watchOS，以及 `TVUIKit` 用于 tvOS。


    基于这些原因，我们认为 `SwiftUI` 值得被称为“救星”。


    在 `SwiftUI` 中，视图充当 App 用户界面的可视构建块。它们用于在 App 中显示文本、图像、形状和图形。一些视图如 `TextField`、`Button`、`Slider`
    和 `Picker` 甚至允许用户与之交互以操纵数据和用户界面。更有趣的是，你可以组合两个或更多视图来创建复杂的视图。


    小组件也是使用 `SwiftUI` 开发的。因此，你将使用 `SwiftUI` 的视图来让你的小组件栩栩如生。有各种各样的视图可用于开发小组件。不过，了解一些更常用的基本视图就足够了。


    ### 用于小组件的基本 SwiftUI 视图


    让我们来了解一下常用于创建小组件的一些基本 `SwiftUI` 视图。


    #### Text


    你可以使用 `Text` 在 App 或小组件中显示一行或多行只读文本。例如，如果你希望 App 或小组件显示文本“SwiftUI is fun!”，你可以编写
    `Text("SwiftUI is fun!")`。你还可以通过使用其方法（如 `font()`、`italic()`、`bold()`、`lineLimit()`
    等）来修改文本和视图的外观及大小。


    #### Button


    `Button` 是用户界面中最常用的组件之一。它能够在通过事件触发时执行一个操作。它的初始化器接受两个参数——一个操作和一个标签。让我们编写一些代码来创建一个打印“Buttons
    are good!”的按钮。


    在清单 2-1 中，按钮包含一个在触发时打印“Buttons are good!”的操作。


    ```

    Button(action: {

    print("Buttons are good!")

    }) {

    Text("Tap me")

    }

    清单 2-1

    SwiftUI 中的按钮

    ```


    第二个参数是一个 `Text` 视图，它为按钮提供了标题。但是，你可以在这里使用其他视图来改变按钮的构成，并利用按钮提供的各种方法来改变其外观和大小。


    你在想哪里可以在小组件中使用按钮吗？假设你有一个待办事项列表 App，你的小组件需要显示尚未完成的项目。你计划用每个项目由一个空复选框后跟文本表示。那么，在这种情况下，你可以使用一个按钮来创建复选框，点击该复选框即可将该项目从待办事项列表中移除。很简单，对吧？

