    \n1.  调用了`OnThisDayAPI`结构体的静态方法`fetchOnThisDayData(with:)`。\n\n2.  一旦`fetchOnThisDayData(with:)`的完成处理程序将结果作为`widgetData`返回后，当前日期就被存储在`currentDate`中。\n\
    \n3.  现在，下一天的日期被存储在`refreshDate`中。稍后将用它来设置 widget 的刷新策略。\n\n4.  由于 widget 依赖于时间线条目来创建时间线，因此创建了一个`WidgetEvent`时间线条目并存储在`entry`中。并且，将`currentDate`的值以及作为\
    \ API 调用响应接收到的`widgetData`传递给`WidgetEvent`构造函数。\n\n5.  既然至少有一个时间线条目，是时候创建一个时间线了。因此，通过传递一个包含`entry`的数组来创建一个时间线，并将其存储在`timeline`中。同时，刷新策略被设置为让\
    \ widget 在`refreshDate`之后请求新的时间线。这样，widget 被设置为每天刷新。\n\n现在，选择`OnThisDayWidgetExtension`方案（如果你还没有选择的话），然后运行代码，看看你的\
    \ widget 从 Wikipedia API 获取数据。目前，你的 widget 将显示所有事件的信息（而不是某个特定类别的事件）。最初，widget\
    \ 可能需要一些时间来加载更新后的数据。所以，请耐心等待，享受你的成果。你的小、中、大尺寸 widget 应该分别类似于图 4-7、图 4-8 和图 4-9。\n\
    \n你已经成功赋予了你的 widget 从 API 加载事件信息的能力。干得好！但是事件可能属于不同类别，用户可能只想要与特定事件类别相关的信息。在接下来的部分中，你将添加功能，允许用户配置你的\
    \ widget，使其仅显示与某个特定类别相关的信息。\n"
- fmt: '## Allowing Users to Configure Widgets


    This section will be about making your widgets configurable. Right now, your widgets
    are displaying event information regardless of their categories. But maybe some
    users would love to configure their widgets in such a way that they get information
    only about a specific category of events. Maybe someone would like to keep track
    of birthdays of historical personalities, or maybe someone likes to get information
    about special historical events that took place. To serve that purpose, you can
    develop your widgets in such a way that users can select their preferred event
    category and configure them to show information related to that particular event
    category.


    Now this is where `IntentConfiguration` comes into play. Till now, you have used
    `StaticConfiguration` only because you did not need to allow your users to configure
    widgets according to their preferences. If you do not remember where you had used
    `StaticConfiguration`, open the **OnThisDayWidget** folder. There, you will see
    a folder called **Widget**. Open it to find `OnThisDayWidget.swift`, which is
    the entry point of your widgets. This is where you have created a `StaticConfiguration`.
    In `OnThisDayWidget.swift`, you should see a block of code similar to Listing
    [4-3](#505356_1_En_4_Chapter.xhtml#PC5).


    ```

    var staticConfiguration: some WidgetConfiguration {

    StaticConfiguration(kind: kind, provider: Provider()) { entry in

    WidgetView(events: entry.events)

    }

    .supportedFamilies([.systemSmall, .systemMedium, .systemLarge])

    .configurationDisplayName("On This Day")

    .description("Events that occured this day.")

    }

    Listing 4-3

    The StaticConfiguration in OnThisDayWidget.swift

    ```


    You will change this configuration to `IntentConfiguration` and make some other
    changes in some time to make your widgets configurable. Now it''s time to get
    to work by following the given steps.


    ### Create and Configure a SiriKit Intent Definition File


    Firstly, you will create an intent definition file since it will allow you to
    define customizable or configurable properties for your widgets. For creating
    that file and configuring it, follow the steps given as follows:


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig13_HTML.jpg](images/505356_1_En_4_Chapter/505356_1_En_4_Fig13_HTML.jpg)


    Figure 4-13


    Creating a new intent in the intent definition file


    1. Right-click the **OnThisDayWidget** folder in your project and click **New
    File…**.

    2. In the dialog box that appears, select **SiriKit Intent Definition File**,
    name it `EventCategory.intentdefinition`, and create the file. While creating
    the file, make sure that both **OnThisDayWidgetExtension** and **OnThisDay** targets
    are checked at the bottom of the dialog box. If you do not check the **OnThisDay**
    target while creating this file, your configuration options (category selection
    field in your case) will not appear in the configuration screen of your widgets.

    3. Now, open `EventCategory.intentdefinition`. Click the "**+**" icon at the bottom
    left of the intent file, and from the list of options, click **New Intent** (Figure
    [4-13](#505356_1_En_4_Chapter.xhtml#Fig13)).


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig14_HTML.jpg](images/505356_1_En_4_Chapter/505356_1_En_4_Fig14_HTML.jpg)


    Figure 4-14


    Creating a parameter called "categories" and changing its "Type" to "Add Enum…"


    1. Give your intent the name `EventCategory`. Then, go to the right side of the
    file and set the **Category** to **View**.

    2. Since you are going to use the intent for widgets only, put a checkmark on
    **Intent is eligible for widgets** and remove checkmarks from **Intent is user-configurable
    in the Shortcuts app and Add to Siri** and **Intent is eligible for Siri Suggestions**.

    3. Now, add a parameter named `categories` in the **Parameters** section by clicking
    the "**+**" button below it. The parameters added in the **Parameters** section
    are the configurable properties that users will see and interact with in the configuration
    screen of the widget. As you complete typing the name, you will see the display
    name set to **Categories**. The display name is displayed in the configuration
    screen of the widget (Figure [4-11](#505356_1_En_4_Chapter.xhtml#Fig11)).

    4. Then change the type of the `categories` parameter to **Add Enum…** as you
    would like to display a list of selectable categories to the user in the widget
    configuration screen displayed in Figures [4-11](#505356_1_En_4_Chapter.xhtml#Fig11)
    and [4-12](#505356_1_En_4_Chapter.xhtml#Fig12). For your ease, this step is shown
    in Figure [4-14](#505356_1_En_4_Chapter.xhtml#Fig14).


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig15_HTML.jpg](images/505356_1_En_4_Chapter/505356_1_En_4_Fig15_HTML.jpg)


    Figure 4-15


    The screen shown after clicking "Add Enum…"


    1. After clicking **Add Enum…**, a new screen is displayed that looks like Figure
    [4-15](#505356_1_En_4_Chapter.xhtml#Fig15). Then, change the name of the enum
    to `Categories` by typing it in the item under the **ENUMS** header at the left.


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig16_HTML.jpg](images/505356_1_En_4_Chapter/505356_1_En_4_Fig16_HTML.jpg)


    Figure 4-16


    The final look of the Categories enum


    1. Now, go back to the `EventCategory` custom intent and select the `categories`
    parameter. Then, remove the checkmark from **Siri can ask for value when run**,
    as we do not want to work with Siri.

    2. Again, open the `Categories` enum shown below the **ENUMS** header. Now it''s
    time to add cases by clicking the "**+**" icon below the **Cases** section. Set
    the names of the cases to `all`, `births`, `deaths`, `events`, `holidays`, and
    `selected` and their display names to **All**, **Births**, **Deaths**, **Events**,
    **Holidays**, and **Selected**, respectively. These display names are shown to
    users in the configuration screen (Figure [4-12](#505356_1_En_4_Chapter.xhtml#Fig12)).
    If you have noticed the index of each case, you will see that the index of `unknown`
    is set as 0, and it cannot be modified. But, the indices of other cases are set
    in a numerical order, and Xcode allows you to modify them. At the end, your enum
    will look like Figure [4-16](#505356_1_En_4_Chapter.xhtml#Fig16).


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig17_HTML.jpg](images/505356_1_En_4_Chapter/505356_1_En_4_Fig17_HTML.jpg)


    Figure 4-17


    Setting the "Default Value" of "categories" to "All."


    1. Now for the final step, open the `EventCategory` custom intent and select the
    `categories` parameter in the **Parameters** section to see its configuration.
    Under the **Input** section at the right side of the window, set **Default Value**
    to **All** so that your widget displays information about all categories of events
    in case users do not ever configure your widgets to get information related to
    a certain category of events (Figure [4-17](#505356_1_En_4_Chapter.xhtml#Fig17)).


    Like this, you have completed creating and setting up your intent definition file.
    Congratulations! You are now one step closer to making your widget configurable.'
