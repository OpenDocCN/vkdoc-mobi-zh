    \    └── TweetsView.swift\n```\n\n在 **TwitterTrends** 文件夹中，除了 **Assets.xcassets**\
    \ 和 **Info.plist**，你还会看到 **Extensions** 文件夹，其中包含一个名为 **View.swift** 的文件。该文件包含\
    \ `View` 的一个扩展，用于处理 `redacted(reason:)` 视图修饰符。\n\n**Models** 文件夹包含 **TrendTweets.swift**、**Trends.swift**\
    \ 和 **Tweets.swift**，这些是用于解码从 Twitter API 接收的响应数据的模型。这些文件同时被应用和小组件使用。\n\n**Preview\
    \ Content** 文件夹是 Xcode 自动生成的，用于存储开发所需的资源。Xcode 在发布构建中不会包含此文件夹中的任何资源。\n\n下一个文件是\
    \ **TwitterTrendsAPI.swift**。它负责处理与 Twitter API 端点的通信。该文件同时被应用和小组件用于从 Twitter\
    \ 获取推文和趋势。\n\n还有一个名为 **TwitterTrendsApp.swift** 的文件，它是应用的入口点。\n\n现在，剩下的文件夹只有 **ViewModel**\
    \ 和 **Views**。**ViewModel** 文件夹包含 **TTViewModel.swift**，其中包含了应用所使用的视图模型。**Views**\
    \ 文件夹包含 **TrendsView.swift** 和 **TweetsView.swift**，它们分别包含显示热门趋势和与这些趋势相关的推文的屏幕的用户界面。\n\
    \n以上就是对 **TwitterTrends** 文件夹中文件和文件夹的描述。\n\n项目中还有一个名为 **TwitterTrendsWidget**\
    \ 的文件夹。如果打开它，你将看到如下文件夹结构：\n\n```\nTwitterTrendsWidget\n├── Assets.xcassets\n├──\
    \ Info.plist\n├── Model\n│   └── TweetWidgetEntry.swift\n├── Provider\n│   └──\
    \ TwitterProvider.swift\n├── View\n│   └── LargeWidgetView.swift\n└── Widget\n\
    \    └── TwitterTrendsWidget.swift\n```\n\n目前，**TwitterTrendsWidget** 中的文件和文件夹较少。除了\
    \ **Assets.xcassets** 和 **Info.plist**，还有一个名为 **Model** 的文件夹，其中包含 **TweetWidgetEntry.swift**。该文件包含一个名为\
    \ `TweetWidgetEntry` 的 `TimelineEntry`，这对于小组件的正常运行至关重要。\n\n**Provider** 文件夹包含\
    \ **TwitterProvider.swift**，它是小组件的 `TimelineProvider`。\n\n同样，你可以看到另一个文件夹 **View**。它包含\
    \ **LargeWidgetView.swift**，其中包含小组件的用户界面。\n\n最后，还有一个名为 **Widget** 的文件夹，它包含 **TwitterTrendsWidget.swift**。这是小组件的入口点。\n\
    \n在本章中，你将向小组件文件夹添加更多文件和文件夹，并赋予小组件从远程服务器获取配置选项的能力。\n\n现在，终于到了开始工作的时候了：让小组件具备与 Twitter\
    \ API 通信的能力，以获取热门趋势，并允许用户选择其中任意一个趋势，在小组件中查看与该特定趋势相关的推文。\n"
- fmt: '# Time to Create a SiriKit Intent Definition File


    This step is similar to that of the previous chapter. In this step, you will create
    an intent definition file, and using that file you will define configurable properties
    for your widgets. To create that file, follow the steps mentioned as follows:


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig6_HTML.jpg](images/505356_1_En_5_Chapter/505356_1_En_5_Fig6_HTML.jpg)


    Figure 5-6: Creating a new intent in the intent definition file


    1. Right-click the **TwitterTrendsWidget** folder in the project and click **New
    Group** to create a new folder. Name it **Intent**.

    2. Now, right-click the **Intent** folder and click **New File…**.

    3. In the dialog box that appears, select **SiriKit Intent Definition File**,
    name it `TwitterTrends.intentdefinition`, and create the file. While creating
    the file, make sure that both **TwitterTrendsWidgetExtension** and **TwitterTrends**
    targets are checked at the bottom of the dialog box.

    4. Open `TwitterTrends.intentdefinition` and click the “**+**” icon at the bottom
    left of the intent file. After that, from the list of options, click **New Intent**
    (Figure 5-6).


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig7_HTML.jpg](images/505356_1_En_5_Chapter/505356_1_En_5_Fig7_HTML.jpg)


    Figure 5-7: Creating a parameter called “selectedTrend” and changing its “Type”
    to “Add Type…”


    5. Name the intent as **Trends** and modify some configuration of that intent.
    Since you are going to use the intent for widgets only, put a checkmark on **Intent
    is eligible for widgets** and remove checkmarks from **Intent is user-configurable
    in the Shortcuts app and Add to Siri** and **Intent is eligible for Siri Suggestions**.

    6. Now, add a parameter named `selectedTrend` in the **Parameters** section by
    clicking the “**+**” button below it. Parameters are the properties that users
    will see and modify in the configuration screen of your widget to configure your
    widget. The display name that is displayed in the configuration screen of your
    widget (Figure 5-4) is automatically set to **Selected Trend**.

    7. Then, change the type of the `selectedTrend` parameter to **Add Type…** (Figure
    5-7).


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig8_HTML.jpg](images/505356_1_En_5_Chapter/505356_1_En_5_Fig8_HTML.jpg)


    Figure 5-8: The screen shown after clicking “Add Type.”


    8. As soon as you click **Add Type…**, a new screen is displayed that appears
    similar to Figure 5-8. Change the name of the new type to `SelectedTrend` by typing
    it in the item under the **TYPES** header at the left.

    9. Again, go back to the **Trends** custom intent and select the `selectedTrend`
    parameter and add a checkmark in **Options are provided dynamically** as you want
    to provide options for that parameter dynamically by fetching them from a remote
    server. Also, remove the checkmark from **Siri can ask for value when run** since
    you do not want to work with Siri.


    In this way, you have created an intent definition file and added the parameter
    `selectedTrend`, using which users will select a trend of their choice from the
    widget’s configuration screen.


    ## Setting Up IntentHandler to Fetch Top Trends and Send Them to the Widget


    Now, you have to add a mechanism to use the `selectedTrend` parameter when the
    timeline is created. In the previous chapter, it was a straightforward and simple
    process, as you had an `enum` with a set of values you had defined or hard-coded.
    But this time, you are using a `class`, and things are going to be different.


    So, first, you need to provide the widget the values that the `selectedTrend`
    parameter of `SelectedTrend` type can hold. For that, you will require an intent
    handler that will be responsible to fetch those values from the server and provide
    them to your widget.


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig9_HTML.jpg](images/505356_1_En_5_Chapter/505356_1_En_5_Fig9_HTML.jpg)


    Figure 5-9: The screen shown after clicking the “+” icon below Supported Intents


    1. In Xcode, go to **File** ➤ **New** ➤ **Target** to create a new target. In
    the dialog box that appears, select **Intents Extension** and click **Next**.

    2. In the dialog box displayed, set `TwitterTrendsIntent` as **Product Name**,
    **Swift** as **Language**, and **None** as **Starting Point**. Make sure that
    **Include UI Extension** is not checked. And set **Project** to `TwitterTrends`
    and the value of **Embed in Application** to `TwitterTrends`. Then, click **Finish**.
    And click **Cancel** if you are asked to **Activate “TwitterTrendsIntent” scheme**
    because you will not have to activate that scheme to run your widget or app later.


    Now, a new folder called `TwitterTrendsIntent` is created in your project, and
    it contains `IntentHandler.swift` and `Info.plist`. The `IntentHandler.swift`
    file is where you will write the code to fetch the top trends from Twitter’s server
    and send them to your widget.


    3. Now, open the `TwitterTrends.intentdefinition` file in `TwitterTrendsWidget`’s
    **Intent** folder and update its **Target Membership** by adding a checkmark to
    `TwitterTrendsIntent`. Now, that file is accessible from `TwitterTrends`, `TwitterTrendsWidget`,
    and `TwitterTrendsIntent`.

    4. One thing to keep in mind is that the `TwitterTrendsIntent` target should know
    the types of intents it can support. For that, select the `TwitterTrends` project
    (and not the `TwitterTrends` folder) located at the top of the **Project Navigator**
    to go to project settings. Now, select the `TwitterTrendsIntent` target under
    the **TARGETS** section and go to its **General** tab.

    5. In the **General** tab of `TwitterTrendsIntent`, go to the **Supported Intents**
    section and click the “**+**” sign below it to add a new supported intent. Then
    the screen will look like Figure 5-9.

    6. Type `TrendsIntent` under the **Class Name** heading. Since you have made `TwitterTrends.intentdefinition`
    a member of the `TwitterTrendsIntent` target in step 3, you will see a suggestion
    as soon as you begin typing. The name `TrendsIntent` has been generated automatically
    by Xcode using the name of the custom intent, **Trends**, you had added in `TwitterTrends.intentdefinition`
    in step 5 of **Creating and Configuring SiriKit Intent Definition File**. At last,
    let `TrendsIntent`’s **Authentication** remain **None**.

    7. Now, open `IntentHandler.swift` in the `TwitterTrendsIntent` folder. Right
    now, the `IntentHandler` class is inheriting from the `INExtension` class. Now
    make `IntentHandler` conform to the `TrendsIntentHandling` protocol that has been
    generated automatically by Xcode. After doing that, your code in `IntentHandler.swift`
    will look like Listing 5-1.

    8. As soon as you make `IntentHandler` conform to `TrendsIntentHandling`, Xcode
    will show you an error message saying, “Type ‘IntentHandler’ does not conform
    to protocol ‘TrendsIntentHandling’. Do you want to add protocol stubs?” It is
    because you have not yet implemented the properties of the `TrendsIntentHandling`
    protocol in `IntentHandler`.'
