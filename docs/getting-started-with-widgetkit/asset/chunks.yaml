- fmt: '# Summary


    And you made it! In this chapter, you learned how you can make your widgets configurable
    and interactive to make your widgets more user-friendly. You used `IntentConfiguration`
    to make your widgets configurable, added tap targets in them, and used deep links
    to make navigation to the different screens of your app possible. In case of any
    confusion, do check out the final version of the code by opening the final project
    folder named `OnThisDayFinal` in `OnThisDay.zip`.


    This chapter taught how you can provide hard-coded data to your widget’s configuration.
    In the upcoming chapter, you will move a level ahead and provide dynamic data
    (fetched from an API) to your widget’s configuration and make your widget even
    more powerful. Sounds exciting enough? Just keep going forward!


    Footnotes [1](#505356_1_En_4_Chapter.xhtml#Fn1_source) [2](#505356_1_En_4_Chapter.xhtml#Fn2_source)
    [3](#505356_1_En_4_Chapter.xhtml#Fn3_source)


    # 5. Fetching Configuration Options


    If you have made it to this chapter of the book, then till now you have gained
    an idea about how you can develop widgets of different sizes that not only display
    static data but also have the capability to fetch fresh data from a server at
    a specified interval. Also, you have learned how you can add tap targets to your
    widgets and also make your widgets configurable.


    By following the procedure given in the previous chapter, you developed widgets
    that offered users a list of hard-coded configuration options, using which they
    configured their widgets. To be more specific, in the `OnThisDay` app’s widgets,
    users could select a category of events from the widgets’ configuration screen
    and, hence, make the widgets display event information related only to that particular
    category. You hard-coded all those categories which users could choose from. That
    is where the difference between that chapter and this chapter lies.


    In this chapter, you will learn how you can fetch data from a server so that you
    can use those data as configuration options for the parameter in your configurable
    widgets. If you apply what you learned in this chapter to the `OnThisDay` app,
    you will be able to replace the category options you had previously hard-coded,
    with dynamic category options fetched from a server.


    Now, we understand that you must have been fed up with working on the same app
    for a long time. So, in this chapter, you will work in a new app, `TwitterTrends`
    (our friends who love Twitter are gonna enjoy this).


    ## Getting Started


    To begin working on `TwitterTrends`, unzip the file named `TwitterTrends.zip`,
    and from the `TwitterTrendsStarter` folder, open `TwitterTrends.xcodeproj`. As
    this project needs to use Twitter’s API endpoints, it is necessary to generate
    a bearer token. You have to pass that bearer token in the header of each request/API
    call, and Twitter checks that bearer token for authentication. If a valid bearer
    token is passed, Twitter sends a response with the data you request. Otherwise,
    Twitter will not give you access.


    If you already own a Twitter Developer Account, you should be able to generate
    your own bearer token. But in case you do not own a developer account, you will
    first have to apply for it from Twitter’s developer account page.^([^(11)](#fn11))
    Generally, it takes a day or two, or sometimes even more, for Twitter to review
    your application.


    If your Twitter Developer Account is ready to use, generate your own bearer token
    by going through the article at this link.^([^(12)](#fn12)) Then, open `TwitterTrendsAPI.swift`
    in the `TwitterTrends` folder of the project and replace the string that says,
    "Your bearer token here," with your bearer token string. Finally, you are ready
    to run the app.


    Now, select the `TwitterTrends` scheme and run the project to see a screen similar
    to the screenshot shown in Figure [5-1](#505356_1_En_5_Chapter.xhtml#Fig1).


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig1_HTML.png](images/505356_1_En_5_Chapter/505356_1_En_5_Fig1_HTML.png)


    Figure 5-1


    The homescreen of `TwitterTrends` displaying a list of trends trending worldwide
    on Twitter


    Figure [5-1](#505356_1_En_5_Chapter.xhtml#Fig1) shows the `TwitterTrends` app’s
    homescreen displaying a list of top trends trending worldwide on Twitter. `TwitterTrends`
    does this by making use of Twitter’s `GET trends/place`^([^(13)](#fn13)) API endpoint.
    If you play with the app, you will see that you can tap each trend to get taken
    to a screen that displays tweets related to that trend (Figure [5-2](#505356_1_En_5_Chapter.xhtml#Fig2)).


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig2_HTML.png](images/505356_1_En_5_Chapter/505356_1_En_5_Fig2_HTML.png)


    Figure 5-2


    `TwitterTrends` displaying a list of tweets about the trend `#FarmersProtest`


    Figure [5-2](#505356_1_En_5_Chapter.xhtml#Fig2) shows the screen with a list of
    tweets which was shown after the `#FarmersProtest` trend was tapped in `TwitterTrends`’
    homescreen. The list of tweets has been fetched by using Twitter’s `GET search/tweets`^([^(14)](#fn14))
    API endpoint.


    To sum up, `TwitterTrends` lets users know about the top Twitter trends and also
    fetches the tweets related to those trends. But wait, did you check out the widget
    of `TwitterTrends`? `TwitterTrends` has a large widget (Figure [5-3](#505356_1_En_5_Chapter.xhtml#Fig3))
    that displays the tweets related to the first trend of the array returned as a
    response by Twitter’s `GET trends/place` API endpoint.


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig3_HTML.png](images/505356_1_En_5_Chapter/505356_1_En_5_Fig3_HTML.png)


    Figure 5-3


    Large-sized widget of `TwitterTrends`


    In Figure [5-3](#505356_1_En_5_Chapter.xhtml#Fig3), you can see how the large
    widget of `TwitterTrends` looks. The large widget is the only widget family that
    `TwitterTrends` has. At the top of the widget, the name of the trend is displayed.
    Below that, the tweets related to that trend are listed, along with some more
    information about each tweet. If there are more than three tweets, a `Text` that
    displays the number of tweets that could not be accommodated in the widget is
    shown.'
