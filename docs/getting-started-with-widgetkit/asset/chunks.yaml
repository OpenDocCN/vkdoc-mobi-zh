  raw: 'You will see **Assets.xcassets** and **Info.plist** in that folder. Likewise,
    there is a folder called **Extensions** that stores the extensions of various
    structs.


    In addition to these, there is a **Models** folder that contains the files used
    to parse the response data received after calling Wikipedia’s API endpoint.


    **OnThisDayApp.swift** is the main entry point of your app, and the **Preview
    Content** folder is a folder generated by Xcode to store the assets used for development
    purposes. The files in this folder are not included by Xcode in release builds.


    There is a **Utilities** folder, and it contains various utilities used by the
    app for serving purposes like working with dates and loading webview.


    And the **ViewModel** folder contains **OTDViewModel.swift**, the view model for
    the app.


    Finally, the **Views** folder contains a number of files and folders. There are
    various small views stored in the **Custom Views** folder, and those views are
    used by **HomeView.swift** and **DetailView.swift**, which contain the user interface
    of the app.


    That’s the description of the folder and files in the **OnThisDay** folder.


    Now, open the **OnThisDayWidget** folder to see the following folder structure:


    ```

    OnThisDayWidget

    ├── Assets.xcassets

    ├── Info.plist

    ├── Model

    │   └── WidgetEventData.swift

    ├── Provider

    │   └── Provider.swift

    ├── Views

    │   ├── LargeWidgetView.swift

    │   ├── MediumWidgetView.swift

    │   ├── SmallWidgetView.swift

    │   └── WidgetView.swift

    └── Widget

    └── OnThisDayWidget.swift

    ```


    Other than the **Assets.xcassets** folder and **Info.plist** file, you will see
    a folder called **Model** that contains **WidgetEventData.swift**. This model
    contains a `TimelineEntry` called `WidgetEvent` which is vital for your widgets
    to work.


    Likewise, there is a folder called **Provider** containing **Provider.swift**,
    which is the `TimelineProvider` of the widgets. If you remember, it is what drives
    a widget by fetching `TimelineEntry` values.


    The next folder that you can see is **Views**, and it contains **LargeWidgetView.swift**,
    **MediumWidgetView.swift**, **SmallWidgetView.swift**, and **WidgetView.swift**.
    Those files contain the user interface of your widgets. The **WidgetView.swift**
    file is the main file that determines which view should be rendered when a particular
    widget family is chosen by users.


    And lastly, the Widget folder contains the **OnThisDayWidget.swift** file, which
    is the entry point for the **OnThisDayWidgetExtension** target. It is currently
    using `StaticConfiguration`, which you will replace with `IntentConfiguration`
    to make your widgets configurable.


    ## Giving Widgets the Power to Talk to API


    In this section, you will remove dummy data from your widgets and give them the
    capability to call Wikipedia’s “On This Day API” to fetch fresh data and to display
    latest information. For now, do not worry about the categories/types of events
    as you will make your widget fetch and display information about all types of
    events.


    1.  Create a new file named **OnThisDayAPI.swift** in the **Provider** folder
    of **OnThisDayWidget**. Make sure that the **OnThisDayWidgetExtension** target
    is checked while creating this file.


    2.  Copy and paste the code in Listing [4-1](#505356_1_En_4_Chapter.xhtml#PC3)
    to that file to create an `OnThisDayAPI` struct with a static `fetchOnThisDayData(with:)`
    method.


    ```

    struct OnThisDayAPI {

    static func fetchOnThisDayData(with completion: @escaping ([WidgetEventData])
    -> Void) {

    guard let today = DateHelper.getDayAndMonthInNumbers(),

    let url = URL(string: "https://en.wikipedia.org/api/rest_v1/feed/onthisday/all/\(today.month)/\(today.day)")
    else { return }

    let task = URLSession.shared.dataTask(with: url) { data, response, _ in

    if let data = data,

    let response = response as? HTTPURLResponse,

    response.statusCode == 200 {

    do {

    let otdResponse = try JSONDecoder().decode(OTDResponse.self, from: data)

    var responses: [EventData] = []

    responses = otdResponse.selected + otdResponse.births + otdResponse.deaths + otdResponse.events
    + otdResponse.holidays

    completion(responses.map({ WidgetEventData(text: $0.text) }))

    } catch {

    completion([])

    print("JSON Decoding Error.")

    }

    completion([])

    }

    }

    task.resume()

    }

    }

    Listing 4-1

    OnThisDayAPI struct with a static method to call Wikipedia’s API

    ```


    Listing [4-1](#505356_1_En_4_Chapter.xhtml#PC3) consists of the `OnThisDayAPI`
    struct that contains a static method named `fetchOnThisDayData(with:)`. This method
    calls Wikipedia’s API to fetch all types of events that took place on the system
    date that is returned by the `DateHelper.getDayAndMonthInNumbers()` method and
    stored in the `today` variable. Then the response is decoded, and it is returned
    to the caller using its completion handler that takes an array of `WidgetEventData`
    as an argument.


    Now, since you have `fetchOnThisDayData(with:)` ready, it’s time to call it. Go
    to **Provider.swift** and replace `getTimeline(in:completion:)` with the code
    given in Listing [4-2](#505356_1_En_4_Chapter.xhtml#PC4) .


    ```

    func getTimeline(in context: Context, completion: @escaping (Timeline) -> Void)
    {

    // 1

    OnThisDayAPI.fetchOnThisDayData { widgetData in

    // 2

    let currentDate = Date()

    // 3

    let refreshDate = Calendar.current.date(byAdding: .day, value: 1, to: currentDate)!

    // 4

    let entry = WidgetEvent(date: currentDate, events: widgetData)

    // 5

    let timeline = Timeline(entries: [entry], policy: .after(refreshDate))

    // 6

    completion(timeline)

    }

    }

    Listing 4-2

    getTimeline(in:completion:) method that performs an API call by calling fetchOnThisDayData(with:)

    ```


    In the code of Listing [4-2](#505356_1_En_4_Chapter.xhtml#PC4), the following
    things are happening:


    1.  The static `fetchOnThisDayData(with:)` method of the `OnThisDayAPI` struct
    is called.


    2.  As soon as the completion handler of `fetchOnThisDayData(with:)` returns the
    results as `widgetData`, the current date is stored in `currentDate`.


    3.  Now the date of the next day is stored in `refreshDate`. It will be used later
    to set up the widget’s refresh policy.


    4.  Since a widget depends upon timeline entries to create a timeline, a `WidgetEvent`
    timeline entry is created and stored in `entry`. And the values of `currentDate`
    and `widgetData`, received as the response of the API call, are passed to the
    `WidgetEvent` constructor.


    5.  As there is at least one timeline entry, it’s time to create a timeline. So,
    a timeline is created and stored in `timeline` by passing an array containing
    `entry`. Also, the refresh policy is set to make the widget request new timeline
    after `refreshDate`. In this way, the widget is set to refresh everyday.


    Now, select the **OnThisDayWidgetExtension** scheme (if you haven’t selected it)
    and run the code to see your widgets fetching data from Wikipedia’s API. Right
    now, your widgets will display information about all the events (and not an event
    of a certain category). Initially, the widget(s) may take some time before loading
    updated data. So, have some patience and enjoy your achievement. Your small, medium,
    and large widgets should look similar to Figures [4-7](#505356_1_En_4_Chapter.xhtml#Fig7),
    [4-8](#505356_1_En_4_Chapter.xhtml#Fig8), and [4-9](#505356_1_En_4_Chapter.xhtml#Fig9),
    respectively.


    You have successfully given your widgets the capability to load event information
    from an API. Well done! But events can lie in different categories, and users
    may want information related to a particular event category only. In the upcoming
    section, you will add the feature to allow users to configure your widgets to
    display information related only to a certain category.'
