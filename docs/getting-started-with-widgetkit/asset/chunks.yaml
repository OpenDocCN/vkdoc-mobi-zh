    \ `content` block of the widget configuration, passing the corresponding timeline\
    \ entry.\n\nNote\n\nWe know that you aren’t familiar with `TimelineProvider` and\
    \ `WidgetConfiguration` yet, but you will get to know them in the upcoming sections.\
    \ For now, you can just keep in mind that `TimelineProvider` manages timeline\
    \ entries and `WidgetConfiguration` is the place from where you configure the\
    \ widget.\n\nTo use the features of `TimelineEntry`, you create a struct that\
    \ conforms to it. Since it is a type of model that `WidgetConfiguration` will\
    \ require to render the widget, you have to make sure you add all the properties\
    \ that `WidgetConfiguration` will need.\n\nIn the current project, if you go to\
    \ **SoccerTime** ➤ **Model** ➤ **Match.swift**, you will see a model that the\
    \ app is using to store details about a match. Since your widget will display\
    \ the same details that `Match` helps to store, you can use this model.\n\nIf\
