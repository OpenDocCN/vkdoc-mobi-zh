  raw: '### Create an IntentTimelineProvider


    As mentioned previously, the first step to switch to `IntentConfiguration` is
    to set up an `IntentTimelineProvider` . Go through the given steps to set it up:


    1.  Right-click the **Provider** folder of the **TwitterTrendsWidget** folder,
    click **New File…**, and create a new Swift file named **TwitterTrendsIntentProvider.swift**.
    Make sure the **TwitterTrendsWidgetExtension** target is checked at the bottom
    of the dialog box before creating the file.


    **Note** You could use the existing **TwitterProvider.swift** file instead of
    creating **TwitterTrendsIntentProvider.swift**, but for better clarity, we recommend
    you to create **TwitterTrendsIntentProvider.swift**.


    2.  Open **TwitterTrendsIntentProvider.swift** and replace the existing code content
    with the code given in Listing [5-3](#505356_1_En_5_Chapter.xhtml#PC5).


    1.  In Listing [5-3](#505356_1_En_5_Chapter.xhtml#PC5), a struct named `TwitterTrendsIntentProvider`
    that conforms to `IntentTimelineProvider` is created. As soon as you add the code,
    Xcode will ask if you want to add protocol stubs. Click **Fix** and add them to
    see two typealiases, `Entry` and `Intent`, added to the struct.


    2.  In `TwitterTrendsIntentProvider`, replace the `type` placeholder of `Entry`
    with `TweetWidgetEntry`, a type of timeline entry. Also, replace the `type` placeholder
    of `Intent` with `TrendsIntent`, whose name was generated from the custom intent,
    `Trends`, you had created in **TwitterTrends.intentdefinition**.


    Now your code should look like the code in Listing [5-4](#505356_1_En_5_Chapter.xhtml#PC6).


    ```

    import SwiftUI

    import WidgetKit

    struct TwitterTrendsIntentProvider: IntentTimelineProvider {

    }

    Listing 5-3

    Creating TwitterTrendsIntentProvider that conforms to IntentTimelineProvider

    ```


    1.  You will still see Xcode asking you to add protocol stubs. Add them too. Then,
    `placeholder(in:)`, `getSnapshot(for:in:completion:)`, and `getTimeline(for:in:completion:)`
    methods will get generated.


    2.  For implementing the `placeholder(in:)` and `getSnapshot(for:in:completion:)`
    methods of `TwitterTrendsIntentProvider`, you can copy the code from the `placeholder(in:)`
    and `getSnapshot(for:in:completion:)` methods of `TwitterProvider` in **TwitterProvider.swift**
    as the same implementations will work.


    3.  The `getTimeline(for:in:completion:)` method of `TwitterTrendsIntentProvider`
    is different than the `getTimeline(in:completion:)` method of `TwitterProvider`
    as `TwitterTrendsIntentProvider` conforms to `IntentTimelineProvider`, but `TwitterProvider`
    conforms to `TimelineProvider`. And the `getTimeline(for:in:completion)` method
    of `TwitterTrendsIntentProvider` allows you to access the data from the configuration
    of the widget.


    In the current scenario, you will access the selected trend from the widget’s
    configuration and use it to perform the API call to fetch tweets related to that
    selected trend. In case there isn’t a selected trend, you will make the widget
    fetch the tweets related to the first trend in the array of the trends fetched
    from Twitter’s API. And you will do everything in `getTimeline(for:in:completion:)`.


    Before you start working on `getTimeline(for:in:completion:)`, let’s first create
    a method, `createTimelineFromTweets(response:)`, to create a timeline from the
    tweets that will be fetched from the API. Then, you can call this method from
    `getTimeline(for:in:completion:)`. This will make the code readable and easy to
    understand. Copy the code given in Listing [5-5](#505356_1_En_5_Chapter.xhtml#PC7)
    and paste it in `TwitterTrendsIntentProvider`.


    ```

    import SwiftUI

    import WidgetKit

    struct TwitterTrendsIntentProvider: IntentTimelineProvider {

    typealias Entry = TweetWidgetEntry

    typealias Intent = TrendsIntent

    }

    Listing 5-4

    TwitterTrendsIntentProvider after adding Entry and Intent types

    ```


    ```

    func createTimelineFromTweets(response: Result) -> Timeline {

    // a

    let currentDate = Date()

    // b

    let refreshDate = Calendar.current.date(byAdding: .minute, value: 30, to: currentDate)!

    // c

    var entry = TweetWidgetEntry(date: refreshDate, statuses: Tweets.dummyTweets,
    trendTitle: "")

    // d

    var timeline = Timeline(entries: [entry], policy: .after(refreshDate))

    // e

    switch response {

    case let .success(tweets):

    // f

    entry = TweetWidgetEntry(date: refreshDate, statuses: tweets.statuses, trendTitle:
    tweets.title)

    timeline = Timeline(entries: [entry], policy: .after(refreshDate))

    return timeline

    case let .failure(error):

    // g

    print(error.localizedDescription)

    return timeline

    }

    }

    Listing 5-5

    Creating the createTimelineFromTweets(response:) method

    ```


    In Listing [5-5](#505356_1_En_5_Chapter.xhtml#PC7), you created a method `createTimelineFromTweets(response:)`
    that has `response` as the parameter and returns a timeline. In it, the following
    things have been done:


    1.  Now it’s time to start working in the `getTimeline(for:in:completion:)` method.
    Replace the existing getTimeline(for:in:completion:) method with the code given
    in Listing [5-6](#505356_1_En_5_Chapter.xhtml#PC8).


    1.  At the beginning, the current date is stored in `currentDate`.


    2.  Now, the date after adding 30 minutes to `currentDate` is generated and stored
    in `refreshDate`. You will use it later to set up the widget’s refresh policy.


    3.  In this step, the `TweetWidgetEntry` timeline entry is created by passing
    `refreshDate`, dummy tweets, and an empty title string to its initializer. Then,
    it is stored in `entry`.


    4.  Now a timeline is created using `entry` and by setting the refresh policy
    to make the widget request a new timeline after 30 minutes. In this way, the timeline
    is created.


    5.  As `response` may either have a `.success` value or a `.failure` value, it
    is put through a `switch` case. If `response` has a `.success` value, it uses
    `tweets` received with `.success` and creates a new `TweetWidgetEntry` by using
    `tweets`’ `title` and `statuses` properties. Then, the value of the `entry` variable
    is replaced by this new entry. And the value of the `timeline` variable is also
    replaced with a new timeline created using the new value of `entry`, and therefore
    the `timeline` is returned.


    6.  In case `response` contains `.failure`, the `error` variable is accessed,
    and its value is printed into the console. Also, since the method must return
    a timeline, the `timeline` variable with dummy tweets and empty title (that you
    created in steps “c” and “d”) is returned.


    ```

    func getTimeline(for configuration: TrendsIntent, in context: Context, completion:
    @escaping (Timeline) -> Void) {

    // a

    if let trend = configuration.selectedTrend {

    let selectedTrend = Trend(name: trend.displayString, query: trend.identifier!)

    TwitterTrendsAPI.getTweets(on: selectedTrend) { response in

    completion(createTimelineFromTweets(response: response))

    }

    } else { // b

    TwitterTrendsAPI.getLatestTweets { response in

    completion(createTimelineFromTweets(response: response))

    }

    }

    }

    Listing 5-6

    Implementation of the getTimeline(for:in:completion:) method

    ```


    In Listing [5-6](#505356_1_En_5_Chapter.xhtml#PC8), the implementation of the
    `getTimeline(for:in:completion)` method is given. The following things take place
    in Listing [5-6](#505356_1_En_5_Chapter.xhtml#PC8):


    1.  This method checks for two cases – the first is the case when there exists
    a value of `selectedTrend` in `configuration`, and the second one is the case
    when `selectedTrend` does not contain any value. The `selectedTrend` property
    is the parameter that you had created in **TwitterTrends.intentdefinition** in
    the previous sections of this chapter.'
  trans: "\n### 创建 `IntentTimelineProvider`\n\n如前所述，切换到 `IntentConfiguration` 的第一步是设置一个\
    \ `IntentTimelineProvider`。请按照以下步骤进行设置：\n\n1.  右键点击 **TwitterTrendsWidget** 文件夹中的\
    \ **Provider** 文件夹，点击 **新建文件...**，然后创建一个名为 `TwitterTrendsIntentProvider.swift`\
    \ 的新 Swift 文件。在创建文件之前，请确保对话框底部的 **TwitterTrendsWidgetExtension** 目标已被勾选。\n\n**注意**：你也可以使用现有的\
    \ `TwitterProvider.swift` 文件，而不是创建 `TwitterTrendsIntentProvider.swift`，但为了清晰起见，我们建议你创建\
    \ `TwitterTrendsIntentProvider.swift`。\n\n2.  打开 `TwitterTrendsIntentProvider.swift`，并将现有代码内容替换为代码清单\
    \ 5-3 中给出的代码。\n\n1.  在代码清单 5-3 中，创建了一个遵循 `IntentTimelineProvider` 协议的名为 `TwitterTrendsIntentProvider`\
    \ 的结构体。一旦你添加了代码，Xcode 会询问是否要添加协议存根（protocol stubs）。点击 **Fix** 并添加它们，你会看到 `Entry`\
    \ 和 `Intent` 这两个 `typealias` 被添加到了结构体中。\n\n2.  在 `TwitterTrendsIntentProvider`\
    \ 中，将 `Entry` 的类型占位符替换为 `TweetWidgetEntry`（一种时间线条目类型）。同时，将 `Intent` 的类型占位符替换为\
    \ `TrendsIntent`，该名称源自你在 `TwitterTrends.intentdefinition` 中创建的自定义意图 `Trends`。\n\
    \n现在你的代码应类似于代码清单 5-4 中的代码。\n\n```\nimport SwiftUI\nimport WidgetKit\n\nstruct\
    \ TwitterTrendsIntentProvider: IntentTimelineProvider {\n}\n代码清单 5-3\n创建遵循 IntentTimelineProvider\
    \ 的 TwitterTrendsIntentProvider\n```\n\n1.  你仍会看到 Xcode 要求你添加协议存根。同样添加它们。然后，`placeholder(in:)`、`getSnapshot(for:in:completion:)`\
    \ 和 `getTimeline(for:in:completion:)` 方法就会生成。\n\n2.  要实现 `TwitterTrendsIntentProvider`\
    \ 的 `placeholder(in:)` 和 `getSnapshot(for:in:completion:)` 方法，你可以从 `TwitterProvider.swift`\
    \ 中 `TwitterProvider` 的 `placeholder(in:)` 和 `getSnapshot(for:in:completion:)`\
    \ 方法复制代码，因为相同的实现是可用的。\n\n3.  `TwitterTrendsIntentProvider` 的 `getTimeline(for:in:completion:)`\
    \ 方法与 `TwitterProvider` 的 `getTimeline(in:completion:)` 方法不同，因为 `TwitterTrendsIntentProvider`\
    \ 遵循 `IntentTimelineProvider`，而 `TwitterProvider` 遵循 `TimelineProvider`。`TwitterTrendsIntentProvider`\
    \ 的 `getTimeline(for:in:completion:)` 方法允许你从 widget 的配置中访问数据。\n\n在当前场景中，你将访问 widget\
    \ 配置中选中的趋势（trend），并使用它来执行 API 调用，以获取与该选中趋势相关的推文。如果没有选中的趋势，你将让 widget 获取与从 Twitter\
    \ API 获取的趋势数组中第一个趋势相关的推文。所有这些操作都将在 `getTimeline(for:in:completion:)` 中完成。\n\n\
    在开始处理 `getTimeline(for:in:completion:)` 之前，我们先创建一个方法 `createTimelineFromTweets(response:)`，用于从\
    \ API 获取的推文中创建时间线。然后，你可以从 `getTimeline(for:in:completion:)` 中调用此方法。这将使代码更具可读性和易于理解。复制代码清单\
    \ 5-5 中给出的代码，并将其粘贴到 `TwitterTrendsIntentProvider` 中。\n\n```\nimport SwiftUI\n\
    import WidgetKit\n\nstruct TwitterTrendsIntentProvider: IntentTimelineProvider\
    \ {\n    typealias Entry = TweetWidgetEntry\n    typealias Intent = TrendsIntent\n\
    }\n代码清单 5-4\n添加 Entry 和 Intent 类型后的 TwitterTrendsIntentProvider\n```\n\n```\n\
    func createTimelineFromTweets(response: Result) -> Timeline {\n    // a\n    let\
    \ currentDate = Date()\n    // b\n    let refreshDate = Calendar.current.date(byAdding:\
    \ .minute, value: 30, to: currentDate)!\n    // c\n    var entry = TweetWidgetEntry(date:\
    \ refreshDate, statuses: Tweets.dummyTweets, trendTitle: \"\")\n    // d\n   \
    \ var timeline = Timeline(entries: [entry], policy: .after(refreshDate))\n   \
    \ // e\n    switch response {\n    case let .success(tweets):\n        // f\n\
    \        entry = TweetWidgetEntry(date: refreshDate, statuses: tweets.statuses,\
    \ trendTitle: tweets.title)\n        timeline = Timeline(entries: [entry], policy:\
    \ .after(refreshDate))\n        return timeline\n    case let .failure(error):\n\
    \        // g\n        print(error.localizedDescription)\n        return timeline\n\
    \    }\n}\n代码清单 5-5\n创建 createTimelineFromTweets(response:) 方法\n```\n\n在代码清单 5-5\
    \ 中，你创建了一个方法 `createTimelineFromTweets(response:)`，它有一个参数 `response` 并返回一个时间线。在该方法中，完成了以下工作：\n\
    \n1.  现在是时候开始在 `getTimeline(for:in:completion:)` 方法中工作了。将现有的 `getTimeline(for:in:completion:)`\
    \ 方法替换为代码清单 5-6 中给出的代码。\n\n1.  首先，当前日期被存储在 `currentDate` 中。\n\n2.  接着，生成在 `currentDate`\
    \ 基础上增加 30 分钟后的日期，并存储在 `refreshDate` 中。稍后你将使用它来设置 widget 的刷新策略。\n\n3.  在此步骤中，通过将\
    \ `refreshDate`、虚拟推文和一个空标题字符串传递给初始化器，创建了 `TweetWidgetEntry` 时间线条目，并将其存储在 `entry`\
    \ 中。\n\n4.  现在，使用 `entry` 并设置刷新策略为 30 分钟后让 widget 请求新的时间线，从而创建了一个时间线。这样就完成了时间线的创建。\n\
    \n5.  由于 `response` 可能携带 `.success` 值或 `.failure` 值，因此通过 `switch` 分支来处理。如果 `response`\
    \ 携带 `.success` 值，则使用 `.success` 中接收到的 `tweets`，并利用 `tweets` 的 `title` 和 `statuses`\
    \ 属性创建一个新的 `TweetWidgetEntry`。然后，`entry` 变量的值被这个新条目替换。同时，`timeline` 变量的值也被替换为使用\
    \ `entry` 的新值创建的新时间线，并返回该 `timeline`。\n\n6.  如果 `response` 携带 `.failure`，则访问 `error`\
    \ 变量，并将其值输出到控制台。同时，由于方法必须返回一个时间线，因此返回包含虚拟推文和空标题的 `timeline` 变量（在步骤 \"c\" 和 \"\
    d\" 中创建）。\n\n```\nfunc getTimeline(for configuration: TrendsIntent, in context:\
    \ Context, completion: @escaping (Timeline) -> Void) {\n    // a\n    if let trend\
    \ = configuration.selectedTrend {\n        let selectedTrend = Trend(name: trend.displayString,\
    \ query: trend.identifier!)\n        TwitterTrendsAPI.getTweets(on: selectedTrend)\
    \ { response in\n            completion(createTimelineFromTweets(response: response))\n\
    \        }\n    } else { // b\n        TwitterTrendsAPI.getLatestTweets { response\
    \ in\n            completion(createTimelineFromTweets(response: response))\n \
    \       }\n    }\n}\n代码清单 5-6\ngetTimeline(for:in:completion:) 方法的实现\n```\n\n\
    在代码清单 5-6 中，给出了 `getTimeline(for:in:completion)` 方法的实现。代码清单 5-6 中完成了以下工作：\n\n\
    1.  此方法检查两种情况——第一种是 `configuration` 中存在 `selectedTrend` 的值，第二种是 `selectedTrend`\
    \ 不包含任何值。`selectedTrend` 属性是你在本章前几节中在 `TwitterTrends.intentdefinition` 中创建的参数。\n"
- fmt: "在当前步骤中，代码会检查用户是否已从配置屏幕中选择了趋势。因此，如果用户已选择一个趋势（即`selectedTrend`中存有值），该值会被存储到`trend`中，并通过使用该趋势的`displayString`和`identifier`创建一个新的`Trend`实例。\n\
    \n然后，调用`TwitterTrendsAPI`的`getTweets(on:completion:)`方法来获取与该趋势相关的推文。当收到`response`时，会通过将`createTimelineFromTweets(response:)`的调用作为参数传入，来调用`getTimeline(for:in:completion:)`方法的完成处理器。\n\
    \n`createTimelineFromTweets(response:)`将从API调用中收到的`response`作为参数，生成一个时间线并返回。最后，`getTimeline(for:in:completion:)`的完成处理器会使用该时间线，从而为小组件创建一个时间线。\n\
    \n但如果用户尚未选择任何趋势（或`configuration`的`selectedTrend`属性中没有值），则会调用`TwitterTrendsAPI`的`getLatestTweets(completion:)`方法。该方法首先从Twitter的API获取所有趋势，从API响应中选择第一个趋势，获取与该趋势相关的推文，并将其作为`response`返回。收到响应后，通过将`createTimelineFromTweets(response:)`的调用作为参数传入，来调用`getTimeline(for:in:completion:)`方法的完成处理器。\n\
    \n然后，`createTimelineFromTweets(response:)`将从API调用中收到的`response`作为参数，生成一个时间线并返回。最后，`getTimeline(for:in:completion:)`的完成处理器会使用该时间线，从而为小组件创建一个时间线。\n\
    \n通过这种方式，你创建了一个`IntentTimelineProvider`，这是切换到`IntentConfiguration`所必需的。\n\n###\
    \ 切换到`IntentConfiguration`\n\n现在你已经准备好切换到`IntentConfiguration`了。如果你打开`TwitterTrendsWidget`文件夹中的`Widget`文件夹里的`TwitterTrendsWidget.swift`文件，你会看到目前`TwitterTrendsWidget`的`body`中使用了`StaticConfiguration`。\n\
    \n在`TwitterTrendsWidget`中，使用列表 5-7 中的代码创建一个名为`dynamicConfiguration`的变量。\n\n```\n\
    var dynamicConfiguration: some WidgetConfiguration {\n    IntentConfiguration(kind:\
    \ kind, intent: TrendsIntent.self, provider: TwitterTrendsIntentProvider()) {\
    \ entry in\n        LargeWidgetView(tweets: entry.statuses, title: entry.trendTitle)\n\
    \    }\n    .supportedFamilies([.systemLarge])\n    .configurationDisplayName(\"\
    Tweets\")\n    .description(\"Tweets Trending Today\")\n}\n```\n列表 5-7 创建`dynamicConfiguration`变量\n\
    \n在列表 5-7 中，创建了一个名为`dynamicConfiguration`的变量，它返回一个`IntentConfiguration`初始化器。它使用了`TwitterTrendsWidget`的`kind`变量的值、`TrendsIntent`作为其意图，以及`TwitterTrendsIntentProvider`的初始化器作为其时间线提供者。其他所有代码行与`TwitterTrendsWidget`的`body`中现有的`StaticConfiguration`类似。\n\
    \n现在，将`TwitterTrendsWidget`的`body`替换为列表 5-8 中的代码。\n\n```\nvar body: some WidgetConfiguration\
    \ {\n    dynamicConfiguration\n}\n```\n列表 5-8 在`TwitterTrendsWidget`的`body`中使用`dynamicConfiguration`\n\
    \n列表 5-8 中的代码将`StaticConfiguration`替换为包含`IntentConfiguration`的`dynamicConfiguration`变量。\n\
    \n干得好！你已经切换到了`IntentConfiguration`。\n\n## 测试——测试——再测试！\n\n卸载设备或模拟器上所有现有的**TwitterTrends**安装。然后，选择**TwitterTrends**方案并运行它。要测试你的小组件，请将TwitterTrends小组件添加到主屏幕并尝试编辑它。你应该会看到一个类似于图\
    \ 5-4 所示的配置屏幕。点击**选择**，查看一个显示从Twitter获取的趋势列表的屏幕。这个屏幕将类似于图 5-5。从该屏幕中，选择任何趋势并返回主屏幕。现在，在你的小组件中，你应该会看到与你选择的特定趋势相关的推文。\n\
    \n太棒了！希望你觉得这个过程很有趣。\n\n## 总结\n\n恭喜你走到了这一步！在本章中，你学习了如何让你的小组件从服务器获取数据，以便将这些数据用作可配置小组件中参数的配置选项。本章的某些部分对你来说可能像是前几章的复习。我们希望你喜欢跟着学习。如果你有任何困惑，请打开`TwitterTrends.zip`中名为`TwitterTrendsFinal`的最终项目文件夹，查看代码的最终版本。\n\
    \n现在你已经能够创建任何类型的小组件——无论是可以或不可以配置的小组件，还是参数具有硬编码配置选项或从服务器获取的动态配置选项的小组件。你已经完全掌握了它们。\n\
    \n祝你未来好运。编码愉快！\n\n脚注 [1] [2] [3] [4] 索引 A, B, C `CategoriesExtension.swift` `createTimelineFromTweets(response:)`\
    \ 方法 D, E `DateHelper.getDayAndMonthInNumbers()` 方法 深度链接 `detail(with:category:)`\
    \ 方法 F `fetchOnThisDayData(for:completion:)` 方法 `fetchOnThisDayData(with:)` 方法\
