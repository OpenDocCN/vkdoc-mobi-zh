    down your computer many times. And to my aunt, Rajyashwori Sitikhu. You’re an
    epitome of kindness and affection.


    To my lovely cousins, Bigyan Sitikhu, Sachin Bohaju, Binam Sitikhu, Salin Bohaju,
    Shrijal Kharbuja, Jibisha Sitikhu, Swornim Kharbuja, Jibika Sitikhu, Raunak Sitikhu,
    and Raunika Sitikhu. You have filled my life with joy. I love you all.


    To my brother from another mother, Kshitij Raj Lohani, who has always helped me
    selflessly and who allowed me to access and use his personal MacBook Pro in the
    United States, from Nepal, for almost a year. I was able to join an iOS bootcamp,
    write blogs on iOS development, and write this book just because he allowed me
    to use his computer as I couldn’t afford one.


    To all my teachers, seniors, mentors, friends, and juniors. You are my gems. I
    feel blessed to have you in life. Thank you for everything!


    —*Sagun Raj Lage*


    To my dear mother.


    *—Prakshapan Shrestha*


    ## Before You Begin…


    Before you start exploring the beauty and power of WidgetKit through this book,
    you will need to make sure you have the following prerequisites set up:


    * **A Mac running macOS Catalina (version 10.15.4) or later**: However, we recommend
    a Mac running macOS Big Sur (version 11) or later as the code was tested on that
    version.

    * **Xcode 12 or later**: `Xcode` is the primary tool used to develop apps for
    the Apple ecosystem. You can download the latest version of `Xcode` from Apple’s
    developer site.^([¹](#fn1)) We recommend using `Xcode 12.4` or later as the code
    was tested on that version.

    * **Swift 5 or later**: Since the new versions of `Xcode` ship with the updated
    versions of `Swift`, you need not worry about this.

    * **Simulators and devices with iOS 14 or later installed** since the `WidgetKit`
    framework, the framework you will use to develop widgets, is only supported from
    iOS 14.

    * **A Twitter Developer Account**: In the last chapter of this book, you will
    develop a widget that will use Twitter’s API. And you will get access to Twitter’s
    API only after you own a Twitter Developer Account. You can apply for a developer
    account from Twitter’s developer account page.^([²](#fn2))


    Generally, it takes a day or two, or sometimes even more, for Twitter to review
    your application and approve or reject it. Therefore, it is a nice idea to apply
    for that account before beginning this book so that when you reach the last chapter,
    your Twitter Developer Account will be ready to use.


