- fmt: "在`Listing [4-29]`中，创建了`navigateToDetail`变量，其功能是返回`some View`。它首先通过运行`map`检查`deepLinkEvent`值是否可用，如果值存在，则创建一个`NavigationLink`，其`destination`设置为`DetailView`并携带`event`数据，`isActive`参数设置为`$deepLinkActive`。这里，`deepLinkActive`前面的“`$`”符号表示它是一个绑定。因此，如果`deepLinkActive`的值发生任何变化，`HomeView`的整个`body`会自动重新加载，因此如果`deepLinkActive`的值变为`true`，则`NavigationLink`会导航到其目标，即`DetailView`。同时，`NavigationLink`的`label`是一个`EmptyView()`，并且整个`NavigationLink`是`hidden()`，因为你不希望它在屏幕上的任何位置可见，只希望它正常工作。\n\
