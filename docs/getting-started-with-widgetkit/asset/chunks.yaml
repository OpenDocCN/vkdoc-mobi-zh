    by going through the article at this link.^([^(12)](#fn12)) Then, open **TwitterTrendsAPI.swift**
    in the **TwitterTrends** folder of the project and replace the string that says,
    “Your bearer token here,” with your bearer token string. Finally, you are ready
    to run the app.


    Now, select the **TwitterTrends** scheme and run the project to see a screen similar
    to the screenshot shown in Figure [5-1](#505356_1_En_5_Chapter.xhtml#Fig1).


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig1_HTML.png](images/505356_1_En_5_Chapter/505356_1_En_5_Fig1_HTML.png)


    Figure 5-1


    The homescreen of TwitterTrends displaying a list of trends trending worldwide
    on Twitter


    Figure [5-1](#505356_1_En_5_Chapter.xhtml#Fig1) shows the TwitterTrends app’s
    homescreen displaying a list of top trends trending worldwide on Twitter. TwitterTrends
    does this by making use of Twitter’s **GET trends/place**^([^(13)](#fn13)) API
    endpoint. If you play with the app, you will see that you can tap each trend to
    get taken to a screen that displays tweets related to that trend (Figure [5-2](#505356_1_En_5_Chapter.xhtml#Fig2)).


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig2_HTML.png](images/505356_1_En_5_Chapter/505356_1_En_5_Fig2_HTML.png)


    Figure 5-2


    TwitterTrends displaying a list of tweets about the trend “#FarmersProtest”


    Figure [5-2](#505356_1_En_5_Chapter.xhtml#Fig2) shows the screen with a list of
    tweets which was shown after the **#FarmersProtest** trend was tapped in TwitterTrends’
    homescreen. The list of tweets has been fetched by using Twitter’s **GET search/tweets**^([^(14)](#fn14))
    API endpoint.


    To sum up, TwitterTrends lets users know about the top Twitter trends and also
    fetches the tweets related to those trends. But wait, did you check out the widget
    of TwitterTrends? TwitterTrends has a large widget (Figure [5-3](#505356_1_En_5_Chapter.xhtml#Fig3))
    that displays the tweets related to the first trend of the array returned as a
    response by Twitter’s **GET trends/place** API endpoint.


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig3_HTML.png](images/505356_1_En_5_Chapter/505356_1_En_5_Fig3_HTML.png)


    Figure 5-3


    Large-sized widget of TwitterTrends


    In Figure [5-3](#505356_1_En_5_Chapter.xhtml#Fig3), you can see how the large
    widget of TwitterTrends looks. The large widget is the only widget family that
    TwitterTrends has. At the top of the widget, the name of the trend is displayed.
    Below that, the tweets related to that trend are listed, along with some more
    information about each tweet. If there are more than three tweets, a `Text` that
    displays the number of tweets that could not be accommodated in the widget is
    shown.'
  trans: '

    # 总结


    恭喜你完成了这一章！在本章中，你学习了如何让你的小组件变得可配置且具有交互性，从而提升用户体验。你使用了 `IntentConfiguration` 来让组件可配置，为其添加了点击目标，并利用深度链接实现了应用内不同屏幕的导航。如果遇到任何困惑，请打开
    `OnThisDay.zip` 中名为 `OnThisDayFinal` 的最终项目文件夹，查看代码的最终版本。


    本章教你如何为组件配置提供硬编码数据。在下一章中，你将更进一步，为组件配置提供动态数据（从 API 获取），让你的组件更加强大。听起来是不是很激动？继续前进吧！


    脚注 1 2 3


    # 5. 抓取配置选项


    如果你已经读到了本书的这一章，那么到现在为止，你已基本了解如何开发不同尺寸的组件，这些组件不仅能显示静态数据，还能在指定时间间隔从服务器获取新数据。此外，你还学会了如何为组件添加交互目标，并使其可配置。


    通过遵循上一章给出的步骤，你开发的组件为用户提供了一个硬编码配置选项列表，用户可据此配置自己的组件。具体来说，在 `OnThisDay` 应用的组件中，用户可以从组件配置屏幕中选择一个事件类别，从而让组件只显示与该类别相关的事件信息。你硬编码了所有可供用户选择的类别。这正是本章与上一章的区别所在。


    在本章中，你将学习如何从服务器获取数据，以便将这些数据用作可配置组件参数的配置选项。如果你将本章所学应用到 `OnThisDay` 应用中，你就能用从服务器获取的动态类别选项，替换之前硬编码的类别选项。


    现在，我们理解你可能已经对同一个应用感到厌倦了。因此，在本章中，你将使用一个新应用 `TwitterTrends`（喜欢推特的朋友们会喜欢的）。


    ## 开始上手


    要开始使用 `TwitterTrends`，请解压名为 `TwitterTrends.zip` 的文件，然后从 `TwitterTrendsStarter`
    文件夹中打开 `TwitterTrends.xcodeproj`。由于该项目需要使用推特的 API 端点，因此必须生成一个 bearer token。你需要在每次请求或
    API 调用的头部传递这个 bearer token，推特会对其验证。如果传递了有效的 bearer token，推特会返回你所请求的数据。否则，推特将拒绝你的访问。


    如果你已经拥有推特开发者账号，你应该可以生成自己的 bearer token。但如果你没有开发者账号，你首先需要从推特的开发者账号页面申请。^(¹¹) 通常，推特需要一到两天甚至更长时间来审核你的申请。


    如果你的推特开发者账号已准备就绪，请通过阅读此链接的文章生成自己的 bearer token。^(¹²) 然后，打开项目中 `TwitterTrends`
    文件夹下的 `TwitterTrendsAPI.swift`，将内容为 "Your bearer token here" 的字符串替换为你自己的 bearer
    token 字符串。最后，你就可以运行应用了。


    现在，选择 `TwitterTrends` 方案并运行项目，你将看到如图 5-1 所示的屏幕截图。


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig1_HTML.png](img/505356_1_En_5_Fig1_HTML.png)


    图 5-1


    `TwitterTrends` 的主屏幕，显示推特上全球流行的趋势列表


    图 5-1 展示了 `TwitterTrends` 应用的主屏幕，其中显示了推特上全球流行的热门趋势列表。`TwitterTrends` 通过使用推特的 `GET
    trends/place`^(¹³) API 端点来实现此功能。如果你试用一下这个应用，你会发现你可以点击每个趋势，进入一个显示与该趋势相关推文的屏幕（图
    5-2）。


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig2_HTML.png](img/505356_1_En_5_Fig2_HTML.png)


    图 5-2


    `TwitterTrends` 显示关于趋势 `#FarmersProtest` 的推文列表


    图 5-2 展示了在 `TwitterTrends` 主屏幕点击 `#FarmersProtest` 趋势后显示的推文列表屏幕。该推文列表是通过使用推特的
    `GET search/tweets`^(¹⁴) API 端点获取的。


    总之，`TwitterTrends` 让用户了解推特上的热门趋势，并获取与这些趋势相关的推文。但是，等等，你看了 `TwitterTrends` 的组件了吗？`TwitterTrends`
    有一个大尺寸组件（图 5-3），它显示的是与推特 `GET trends/place` API 端点返回的数组中的第一个趋势相关的推文。


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig3_HTML.png](img/505356_1_En_5_Fig3_HTML.png)


    图 5-3


    `TwitterTrends` 的大尺寸组件


    在图 5-3 中，你可以看到 `TwitterTrends` 大尺寸组件的外观。大尺寸组件是 `TwitterTrends` 拥有的唯一组件类型。在组件顶部，显示了趋势名称。其下方列出了与该趋势相关的推文，以及每条推文的一些附加信息。如果推文超过三条，则会显示一个
    `Text`，注明组件未能容纳的推文数量。

