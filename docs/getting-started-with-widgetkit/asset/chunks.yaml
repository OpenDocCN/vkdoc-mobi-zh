  trans: '好的，作为高级文档工程师和翻译员，我将严格遵循您的格式要求，完成本次翻译任务。


    ***



    ## 允许用户配置小组件


    本节将介绍如何让你的小组件变得可配置。目前，你的小组件正在显示所有事件信息，而不论其类别如何。但也许有些用户希望这样配置他们的组件：他们只想获取特定类别的事件信息。也许有人想追踪历史名人的生日，或者有人喜欢获取有关发生的特殊历史事件的信息。为了满足这一目的，你可以开发你的小组件，让用户能够选择他们偏好的事件类别，并配置它们以显示与该特定事件类别相关的信息。


    现在，`IntentConfiguration` 就该登场了。到目前为止，你只使用了 `StaticConfiguration`，因为你之前不需要允许用户根据自己的偏好来配置小组件。如果你不记得在哪里使用过
    `StaticConfiguration`，请打开 **OnThisDayWidget** 文件夹。在那里，你会看到一个名为 **Widget** 的文件夹。打开它，找到
    `OnThisDayWidget.swift`，这是你小组件的入口点。正是在这里，你创建了一个 `StaticConfiguration`。在 `OnThisDayWidget.swift`
    中，你应该会看到一段类似于代码清单 4-3 的代码块。


    ```

    var staticConfiguration: some WidgetConfiguration {

    StaticConfiguration(kind: kind, provider: Provider()) { entry in

    WidgetView(events: entry.events)

    }

    .supportedFamilies([.systemSmall, .systemMedium, .systemLarge])

    .configurationDisplayName("On This Day")

    .description("Events that occured this day.")

    }

    Listing 4-3

    OnThisDayWidget.swift 中的 StaticConfiguration

    ```


    稍后，你将把这个配置改为 `IntentConfiguration`，并做一些其他更改，以使你的小组件可配置。现在是时候按照以下步骤开始工作了。


    ### 创建并配置 SiriKit Intent 定义文件


    首先，你将创建一个意图定义文件，因为它允许你为小组件定义可自定义或可配置的属性。要创建该文件并进行配置，请遵循以下步骤：


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig13_HTML.jpg](img/505356_1_En_4_Fig13_HTML.jpg)


    图 4-13


    在意图定义文件中创建一个新意图


    1.  右键单击项目中的 **OnThisDayWidget** 文件夹，然后单击 **新建文件…**。

    2.  在出现的对话框中，选择 **SiriKit Intent 定义文件**，将其命名为 `EventCategory.intentdefinition`，然后创建该文件。创建文件时，请确保在对话框底部同时勾选了
    **OnThisDayWidgetExtension** 和 **OnThisDay** 两个目标。如果在创建此文件时没有勾选 **OnThisDay**
    目标，那么你的配置选项（在你的案例中是类别选择字段）将不会出现在小组件的配置界面中。

    3.  现在，打开 `EventCategory.intentdefinition`。单击意图文件左下角的 "**+**" 图标，然后从选项列表中单击 **新意图**（图
    4-13）。


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig14_HTML.jpg](img/505356_1_En_4_Fig14_HTML.jpg)


    图 4-14


    创建一个名为 “categories” 的参数并将其 “类型” 更改为 “添加枚举…”


    1.  将你的意图命名为 `EventCategory`。然后，转到文件的右侧，将 **类别** 设置为 **视图**。

    2.  由于你仅将意图用于小组件，请勾选 **意图适用于小组件**，并取消勾选 **意图在快捷指令 App 中可由用户配置并添加到 Siri** 和 **意图适用于
    Siri 建议**。

    3.  现在，通过点击 **参数** 部分下方的 "**+**" 按钮，添加一个名为 `categories` 的参数。在 **参数** 部分添加的参数是用户将在小组件配置界面中看到并与之交互的可配置属性。当你输入完名称后，你会看到显示名称被设置为
    **类别**。该显示名称将显示在小组件的配置界面中（图 4-11）。

    4.  然后，将 `categories` 参数的类型更改为 **添加枚举…**，因为你希望在图 4-11 和图 4-12 所示的小组件配置界面中向用户显示一个可选择的类别列表。为了方便你理解，此步骤如图
    4-14 所示。


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig15_HTML.jpg](img/505356_1_En_4_Fig15_HTML.jpg)


    图 4-15


    点击 “添加枚举…” 后显示的界面


    1.  点击 **添加枚举…** 后，会显示一个类似于图 4-15 的新界面。然后，通过在左侧 **ENUMS** 标题下的项目中输入，将枚举的名称更改为
    `Categories`。


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig16_HTML.jpg](img/505356_1_En_4_Fig16_HTML.jpg)


    图 4-16


    Categories 枚举的最终外观


    1.  现在，返回到 `EventCategory` 自定义意图并选择 `categories` 参数。然后，取消勾选 **Siri 可在运行时询问取值**，因为我们不想与
    Siri 交互。

    2.  再次打开 **ENUMS** 标题下方显示的 `Categories` 枚举。现在，通过点击 **用例** 部分下方的 "**+**" 图标来添加用例。将用例的名称分别设置为
    `all`、`births`、`deaths`、`events`、`holidays` 和 `selected`，并将它们的显示名称分别设置为 **全部**、**生日**、**逝世**、**事件**、**节假日**
    和 **已选**。这些显示名称会显示给配置界面中的用户（图 4-12）。如果你注意了每个用例的索引，你会发现 `unknown` 的索引被设置为 0，且无法修改。但是，其他用例的索引是按数字顺序设置的，并且
    Xcode 允许你修改它们。最后，你的枚举将如图 4-16 所示。


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig17_HTML.jpg](img/505356_1_En_4_Fig17_HTML.jpg)


    图 4-17


    将 “categories” 的 “默认值” 设置为 “全部”。


    1.  现在，进行最后一步，打开 `EventCategory` 自定义意图，在 **参数** 部分选择 `categories` 参数以查看其配置。在窗口右侧的
    **输入** 部分下，将 **默认值** 设置为 **全部**，这样即使用户从未配置你的小组件来获取特定类别事件的信息，你的小组件也会显示所有类别事件的信息（图
    4-17）。


    至此，你已经完成了意图定义文件的创建和设置。恭喜！现在，你离让小组件可配置又近了一步。

    '
- fmt: '### Switch to `IntentConfiguration`


    As mentioned previously, you had used `StaticConfiguration` till now because there
    was no need to make your widgets user configurable. But now, you want to make
    them user configurable, and you have already completed the first step of the setup.
    Now, it’s time to switch to `IntentConfiguration`. For that, you will have to
    follow the given steps:


    1. Right-click the **Provider** folder of the **OnThisDayWidget** folder, click
    **New File…**, and create a new Swift file named `IntentProvider.swift`. Make
    sure the **OnThisDayWidgetExtension** target is checked at the bottom of the dialog
    box before creating the file.


    **Note** You could use the existing `Provider.swift` file instead of creating
    `IntentProvider.swift`, but for better clarity, we recommend you to create `IntentProvider.swift`.


    2. Open the `IntentProvider.swift` file and replace the existing code content
    with the code given in Listing [4-4](#505356_1_En_4_Chapter.xhtml#PC6).


    1. In Listing [4-4](#505356_1_En_4_Chapter.xhtml#PC6), a struct named `IntentProvider`
    that conforms to `IntentTimelineProvider` is created. As soon as you add the code,
    Xcode will ask if you want to add protocol stubs. Click **Fix** and add them to
    see two typealiases, `Entry` and `Intent`, added to the struct.


    2. In the `IntentProvider` struct, replace the `type` placeholder of `Entry` with
    `WidgetEvent`, a timeline entry type. Also, replace the `type` placeholder of
    `Intent` with `EventCategoryIntent`. The name `EventCategoryIntent` was generated
    from the custom intent, `EventCategory`, you had previously created in your intent
    definition file, that is, `EventCategory.intentdefinition`.


    **Tip** While replacing the `type` placeholder of `Intent` with `EventCategoryIntent`
    in `IntentProvider`, it would be a better idea to type `EventCategoryIntent` yourself
    to check if Xcode gives the autocompletion or not. It can help you verify if `EventCategoryIntent`
    has been generated by Xcode or not.


    ```

    import SwiftUI

    import WidgetKit

