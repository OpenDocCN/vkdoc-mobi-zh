    \n如图 4-13 所示，使用`guard-let`解包`widgetData`后，错误信息应该消失。请构建项目以验证。\n\n现在还剩一件事，即设置 widget\
    \ 视图来显示选中的类别。如果查看 widget 的外观，你会发现如果选中的事件类别是`births`，日期是 1 月 20 日，且`births`类别中的事件数量为\
    \ 200，则会显示文本“1 月 20 日发生了 200 起出生事件”。那么，我们开始设置视图。\n\n首先，在`WidgetView`、`SmallWidgetView`、`MediumWidgetView`和`LargeWidgetView`中添加代码清单\
    \ 4-14 中的一行代码来设置视图。\n\n```swift\nvar category: Categories\n```\n代码清单 4-14 创建一个`Categories`类型的变量`category`\n\
    \n在所有视图中创建完该变量后，你会立即在`SmallWidgetView`、`MediumWidgetView`和`LargeWidgetView`的预览中看到错误，因为预览中没有为参数`category`传递实参。点击**修复**以添加`category`参数，并将实参设置为`.all`。例如，对于`SmallWidgetView`，可以像代码清单\
    \ 4-15 那样操作。\n\n```swift\nstruct SmallWidget_Previews: PreviewProvider {\n   \
    \ static var previews: some View {\n        SmallWidgetView(eventCount: 5, category:\
    \ .all)\n            .previewContext(WidgetPreviewContext(family: .systemSmall))\n\
    \    }\n}\n```\n代码清单 4-15 通过传递`category`来修复`SmallWidgetView`的预览\n\n在`MediumWidgetView`和`LargeWidgetView`的预览中传递`category`实参，以消除错误信息。\n\
    \n现在，如果你构建项目，仍然会看到更多错误。这次错误出现在`WidgetView.swift`中，因为在`switch`语句中`SmallWidgetView`、`MediumWidgetView`和`LargeWidgetView`的初始化器没有传递`category`实参。请传递`category`实参，使你的`WidgetView`的`body`看起来类似于代码清单\
    \ 4-16。\n\n```swift\n@ViewBuilder\nvar body: some View {\n    switch family {\n\
    \    case .systemSmall: SmallWidgetView(eventCount: events.count, category: category)\n\
    \    case .systemMedium: MediumWidgetView(events: events, category: category)\n\
    \    case .systemLarge: LargeWidgetView(events: events, category: category)\n\
    \    default: EmptyView()\n    }\n}\n```\n代码清单 4-16 向所有 widget 家族传递`category`后的`WidgetView`的`body`\n\
    \n在代码清单 4-16 中，`WidgetView`的`category`变量作为实参传递给了所有 widget 家族视图的`category`参数。\n\
    \n现在，错误只存在于`OnThisDayWidget.swift`中。在`WidgetView`的初始化器中添加`category`参数，并传递`entry.category`作为其实参，以消除该错误。之后，`OnThisDayWidget`的`body`将如代码清单\
    \ 4-17 所示。\n\n```swift\nvar body: some WidgetConfiguration {\n    IntentConfiguration(kind:\
    \ kind,\n                        intent: EventCategoryIntent.self,\n         \
    \               provider: IntentProvider()) { entry in\n        WidgetView(events:\
    \ entry.events, category: entry.category)\n    }\n    .supportedFamilies([.systemSmall,\
    \ .systemMedium, .systemLarge])\n    .configurationDisplayName(\"On This Day\"\
    )\n    .description(\"Events that occured this day.\")\n}\n```\n代码清单 4-17 向`WidgetView`的初始化器传递`category`后的`OnThisDayWidget`的`body`\n\
    \n如果你已经完成了上述所有操作，但还是不明白发生了什么，我们来解释一下。你将从`OnThisDayWidget`（widget 的入口点）中`IntentConfiguration`初始化器的完成处理器的`entry`变量接收到的选中`category`，传递给了主\
    \ widget 视图`WidgetView`。然后，从`WidgetView`，`category`被进一步传递给了`SmallWidgetView`、`MediumWidgetView`和`LargeWidgetView`。\n\
    \n现在，`SmallWidgetView`、`MediumWidgetView`和`LargeWidgetView`已经准备好使用它们的`category`变量在\
    \ widget 中显示选中的类别。但在那之前，我们还需要做一些必要的设置。\n\n创建一个新文件夹 `Intent`，并将 `EventCategory.intentdefinition`\
    \ 移动到该文件夹中。然后，在 `Intent` 文件夹中创建一个新的 Swift 文件，并将其命名为 `CategoriesExtension.swift`。确保在创建该文件时选中了\
    \ `OnThisDay` 和 `OnThisDayWidgetExtension` 目标。现在，复制代码清单 4-18 中的代码，并粘贴到 `CategoriesExtension.swift`\
    \ 中。\n\n```swift\nextension Categories {\n    var detail: String {\n        switch\
    \ self {\n        case .births: return \"births\"\n        case .all: return \"\
    historic events\"\n        case .events: return \"events\"\n        case .deaths:\
    \ return \"deaths\"\n        case .holidays: return \"holidays\"\n        case\
    \ .selected: return \"special events\"\n        default: return \"historic events\"\
    \n        }\n    }\n}\n```\n代码清单 4-18 创建`Categories`的扩展\n\n在代码清单 4-18 中，创建了`Categories`的一个扩展。它包含一个`String`类型的`detail`变量。通过`switch`语句，它根据选中的类别返回要在\
    \ widget 中显示的字符串。\n\n现在，在`SmallWidgetView`、`MediumWidgetView`和`LargeWidgetView`中，找到文本`Text(\"\
    events\")`并将其替换为`Text(category.detail)`，以便在 widget 上显示选中事件的类别。\n\n最后，是时候测试你的 widget\
    \ 了！\n"
- fmt: '### Time to Put Your Widgets to the Test!


    In your simulator or device, uninstall any existing installation of `OnThisDay`
    and remove any existing widget of `OnThisDay`. Then, select and run the `OnThisDay`
    target first to install it on your simulator or device. After that, select and
    run the `OnThisDayWidgetExtension` target to install the widgets. After the widgets
    are shown in the homescreen, try going to its configuration screen and selecting
    a different category. You can refer to Figures [4-10](#505356_1_En_4_Chapter.xhtml#Fig10),
    [4-11](#505356_1_En_4_Chapter.xhtml#Fig11), and [4-12](#505356_1_En_4_Chapter.xhtml#Fig12).
    After selecting a new category, the information related to the events of that
    particular category should show up in your widget.


    Well done! You have successfully made your widgets user configurable.


    ## Navigating to the Relevant Screens of the App Through Tap Targets


    Did you try tapping the different elements of your widgets you created in the
    previous section? The app must be launching and showing its homescreen no matter
    where you tap in your widgets. This should be changed as your widget is not your
    app icon, but way more than that. And if you see the “Human Interface Guidelines”
    section of Chapter [2](#505356_1_En_2_Chapter.xhtml) of this book, you will find
    the following statements under the heading, “Tapping your widget should open your
    app at the right location”:


    > *When a user taps an app icon, the app should launch and display its home screen.
    But when a user taps a widget, the app should launch to show the screen containing
    the details and actions useful and relevant to the widget’s content.*


    So, in this section, you will define tap targets that, when tapped, will use deep
    links to make navigation to various relevant screens of your app possible.


    **Note**: Deep linking is a technique with which you can make a link or URL not
    only open your app but also automatically navigate to the desired location of
    your app. It is very popular these days and has been adopted by various companies
    and organizations in their apps and services.


    A nice example of a company utilizing the power of deep linking is Medium. If
    you open Medium’s website and read an article in your phone’s browser, you will
    see a button that says, “Open in app” at the top of the page. After tapping that
    button, if you are using an iOS device and do not have the Medium app installed,
    the App Store will launch in your device and display the installation page of
    the Medium app. But if you are using an iOS device with the Medium app installed,
    it will launch and take you to the same article you were reading, inside the app.
    That’s some awesome deep linking magic!


    For example, if you take a look at your medium-sized widget (Figure [4-18](#505356_1_En_4_Chapter.xhtml#Fig18)),
    you will see that there are various areas and elements which can be used as tap
    targets to make navigation to the screens containing the details and actions relevant
    to the tap targets’ content possible. The potential tap targets are highlighted
    using rectangles with red borders in Figure [4-18](#505356_1_En_4_Chapter.xhtml#Fig18).


    ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig18_HTML.png](images/505356_1_En_4_Chapter/505356_1_En_4_Fig18_HTML.png)


    Figure 4-18


    Highlighting the elements which can be made tappable


    In Figure [4-18](#505356_1_En_4_Chapter.xhtml#Fig18), the first potential tap
    target is the area that says, “207 births took place on JAN 20.” As the currently
    selected category of events is **Births**, you can make that area tappable to
    navigate users to the app’s homescreen that displays only the events lying in
    the **Births** category.


    Also, you can see that there are a couple of birth events listed at the right
    side of the widget. So, you can define tap targets of each event in the list to
    directly navigate users to the detail screen of that tapped event. Hence, this
    time, the screen that will be displayed will not be the homescreen, but the detail
    screen with the content and actions relevant to the event that was tapped in the
    widget. For example, in Figure [4-18](#505356_1_En_4_Chapter.xhtml#Fig18), if
    users tap the event that says, “Calum Chambers, English footballer,” then users
    should see the detail screen containing the details about “Calum Chambers.”


    There is one more potential tap target that informs users that there are more
    events that could not be listed in the widget. In Figure [4-18](#505356_1_En_4_Chapter.xhtml#Fig18),
    it says, “205 more.” Therefore, it’s obvious that by tapping it, users will expect
    to go to the app’s homescreen that displays all the events lying in the **Births**
    category.


    Since the large-sized widget is similar to the medium-sized widget, the potential
    tap targets are the same.


    But in the case of a small-sized widget, `WidgetKit` allows you to define only
    a single tap target, as it has little space and can accommodate less content.
    So, in your small widget, you can define a tap target that takes users to the
    homescreen that displays a list of events lying in the selected category.'
