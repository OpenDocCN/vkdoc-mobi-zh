  raw: 'In Listing [4-25](#505356_1_En_4_Chapter.xhtml#PC27), a URL is generated by
    using the static `detail(with:category:)` method of `LinkConstants` and passing
    the text of the current iteration of `events`, that is, `event`, and the currently
    selected category, that is, `category`. If `detail(with:category:)` returns a
    valid URL, it is stored in `url`, and a `Link` view with its `destination` set
    to `url` and `label` set to the `eventDetail(with:)` method is created. Hence,
    the views that display brief information about events become tappable links to
    the URLs you generate. If `detail(with:category:)` does not generate a valid URL,
    just the view generated by the `eventDetail(with:)` method is displayed.


    Tip


    You can check if the `Link` view is working or not by setting a breakpoint inside
    the `onOpenURL(perform:)` method in `HomeView`. Then, build and run the project
    and add the medium widget in your simulator or device’s homescreen. After the
    updated information gets loaded in the widget, tap on any event and your app will
    launch, and the breakpoint will pause the execution inside `onOpenURL(perform:)`.
    Now check the deep link URL that passed by typing `po url` in Xcode’s **Debug
    Console**. If the URL that is printed contains the data related to the event that
    you had tapped, it can be concluded that the `Link` view is working.


    1.  Open `HomeView` and define two `State` variables, `deepLinkEvent` of `EventData?`
    type and `deepLinkActive` of `Bool` type. Listing [4-26](#505356_1_En_4_Chapter.xhtml#PC28)
    shows the code that does it.


    ```

    @State var deepLinkEvent: EventData?

    @State var deepLinkActive: Bool = false

    Listing 4-26

    Defining deepLinkEvent and deepLinkActive

    ```


    The `deepLinkEvent` variable defined in Listing [4-26](#505356_1_En_4_Chapter.xhtml#PC28)
    will be used later to store the data of the event that was tapped in the widget.
    Likewise, the `deepLinkActive` variable declared in Listing [4-26](#505356_1_En_4_Chapter.xhtml#PC28)
    will be used to activate/deactivate the `NavigationLink` responsible for navigation
    to an event’s detail screen. You will add it later.


    1.  Let’s create a method `handleLinkForDetail(with:)` in `HomeView` to handle
    operations related only to the navigation to an event’s detail screen when a deep
    link is detected. Do it using the code given in Listing [4-27](#505356_1_En_4_Chapter.xhtml#PC29).


    ```

    func handleLinkForDetail(with url: URL) {

    // a

    guard let urlScheme = url.scheme,

    urlScheme == LinkConstants.detailScheme else { return }

    // b

    guard let urlType = url.host else { return }

    // c

    type = EventType(rawValue: urlType)!

    // d

    if let firstElement = url.queryParams.first {

    for eventType in otdViewModel.events {

    for event in eventType.value where event.text == firstElement.value {

    deepLinkEvent = event

    deepLinkActive = true

    }

    }

    }

    }

    Listing 4-27

    Creating handleLinkForDetail(with:)

    ```


    In Listing [4-27](#505356_1_En_4_Chapter.xhtml#PC29), the following things are
    happening:


    1.  `handleLinkForDetail(with:)` receives a URL as an argument and stores it in
    `url`. Using `guard-let`, it is checked if `url` contains a scheme or not. If
    a scheme is present, it is stored in `urlScheme`, and a check is performed if
    `urlScheme` matches with `LinkConstants.detailScheme` (whose value is `"detail"`)
    or not. This helps to verify if the deep link is meant to make the app navigate
    to a detail screen or not (we had talked about this in the step “a” of the explanation
    of Listing [4-24](#505356_1_En_4_Chapter.xhtml#PC26)). Otherwise, the method will
    return and do nothing.


    2.  In this step, it is checked if `url` contains a host or not. If it contains
    a host, it is stored in `urlType`; otherwise, the method will return and do nothing.
    You have set up the URL in such a way that `urlType` will contain the string value
    of the selected event category.


    3.  Now, the value of `urlType` is passed to the `EventType` initializer to convert
    it into an `EventType` case. Since you can be sure that a `String` that can be
    converted into an `EventType` case has been passed, you can force-unwrap the result
    using the bang operator (`!`) and store it in `type` that stores the selected
    event category/event type and displays the events accordingly.


    4.  In this step, only the first query parameter passed in `url` is extracted
    using `if-let`, as you had passed only one query parameter containing the text
    of the event.


    Now since `firstElement` contains the text of the event tapped, you can match
    it with the texts of the `events` variable of `otdViewModel` to find out the event
    data of that tapped event. These event data can then be used to initiate navigation
    to the detail page of the tapped event. The `events` variable is where the app
    stores all the events after fetching them using the API.


    So, a `for` loop is run through the `events` variable of `otdViewModel`, setting
    the iteration variable to `eventType`. Again, another `for` loop is run through
    `eventType.value` to find out the text of the event that matches with the text
    of `firstElement`. As soon as an event is found, its value is stored in `deepLinkEvent`,
    which will make the value available throughout `HomeView`. And the `deepLinkActive`
    flag is set to `true` as it is verified that this is a valid deep link operation
    to navigate to the detail page.


    1.  Now it’s time to call the `handleLinkForDetail(with:)` method you just created.
    Since the operations related to deep linking are mainly handled by the `handleLinks(for:)`
    method in `HomeView`, go there and replace it using the code in Listing [4-28](#505356_1_En_4_Chapter.xhtml#PC30)
    to give `handleLinks(for:)` some more responsibilities.


    ```

    func handleLinks(for url: URL) {

    deepLinkEvent = nil

    deepLinkActive = false

    if let type = EventType(rawValue: url.absoluteString) {

    self.type = type

    } else {

    handleLinkForDetail(with: url)

    }

    }

    Listing 4-28

    handleLinks(for:) with added responsibilities

    ```


    Listing [4-28](#505356_1_En_4_Chapter.xhtml#PC30) contains the updated version
    of the `handleLinks(for:)` method . No matter what `url` is received, initially,
    `deepLinkEvent` is set to `nil` and `deepLinkActive` is set to `false`. Then,
    if `url` contains a `String` that can be converted into an `EventType` case, it
    is stored in the `type` variable. After that, the value of the `type` variable
    is stored in the `type` variable of `HomeView`, which is responsible to set the
    selected event category/event type and display the event list accordingly in the
    homescreen. You had previously used this condition for the small widget and for
    some portion of the medium widget.


    But if `url` does not contain such a `String`, then it is deduced that it is time
    to handle the deep link for navigating to the detail screen of an event. Hence,
    in the `else` condition, `handleLinkForDetail(with: url)` is called.


    1.  Now, the last thing remaining is to create a `NavigationLink` that gets activated
    and deactivated according to the `deepLinkActive` state variable of `HomeView`.
    When it gets activated, the app automatically navigates to the detail screen of
    an event. For that, create a variable named `navigateToDetail` by using the code
    given in Listing [4-29](#505356_1_En_4_Chapter.xhtml#PC31).


    ```

    var navigateToDetail: some View {

    return self.deepLinkEvent.map({ event in

    NavigationLink(destination: DetailView(event: event), isActive: $deepLinkActive)
    {

    EmptyView()

    }.hidden()

    })

    }

    Listing 4-29

    Defining the navigateToDetail variable

    ```'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将给定的英文文本翻译成准确、专业的中文。



    在清单 4-25 中，通过使用 `LinkConstants` 的静态方法 `detail(with:category:)`，并传入当前迭代 `events`
    的文本（即 `event`）以及当前选中的类别（即 `category`），生成一个 URL。如果 `detail(with:category:)` 返回一个有效的
    URL，则将其存储在 `url` 中，并创建一个 `Link` 视图，其 `destination` 设置为 `url`，`label` 设置为 `eventDetail(with:)`
    方法。因此，显示事件简要信息的视图将成为指向您所生成 URL 的可点击链接。如果 `detail(with:category:)` 未生成有效的 URL，则仅显示由
    `eventDetail(with:)` 方法生成的视图。


    **提示**


    您可以通过在 `HomeView` 的 `onOpenURL(perform:)` 方法中设置断点来检查 `Link` 视图是否正常工作。然后，构建并运行项目，在模拟器或设备的桌面上添加中等尺寸的小部件。当更新后的信息加载到小部件中后，点击任意事件，您的应用将会启动，并且断点将暂停在
    `onOpenURL(perform:)` 内部的执行。现在，通过在 Xcode 的 **调试控制台** 中输入 `po url` 来检查传递的深层链接 URL。如果打印出的
    URL 包含您所点击事件的相关数据，则可以断定 `Link` 视图正在正常工作。


    1.  打开 `HomeView`，并定义两个 `State` 变量：`deepLinkEvent`（类型为 `EventData?`）和 `deepLinkActive`（类型为
    `Bool`）。清单 4-26 展示了实现此操作的代码。


    ```

    @State var deepLinkEvent: EventData?

    @State var deepLinkActive: Bool = false

    清单 4-26

    定义 deepLinkEvent 和 deepLinkActive

    ```


    在清单 4-26 中定义的 `deepLinkEvent` 变量将在稍后用于存储在小部件中被点击事件的数据。同样，在清单 4-26 中声明的 `deepLinkActive`
    变量将用于激活/停用负责导航到事件详情屏幕的 `NavigationLink`。您将在稍后添加它。


    2.  让我们在 `HomeView` 中创建一个方法 `handleLinkForDetail(with:)`，以处理仅与检测到深层链接时导航到事件详情屏幕相关的操作。使用清单
    4-27 中给出的代码来完成此操作。


    ```

    func handleLinkForDetail(with url: URL) {

    // a

    guard let urlScheme = url.scheme,

    urlScheme == LinkConstants.detailScheme else { return }

    // b

    guard let urlType = url.host else { return }

    // c

    type = EventType(rawValue: urlType)!

    // d

    if let firstElement = url.queryParams.first {

    for eventType in otdViewModel.events {

    for event in eventType.value where event.text == firstElement.value {

    deepLinkEvent = event

    deepLinkActive = true

    }

    }

    }

    }

    清单 4-27

    创建 handleLinkForDetail(with:)

    ```


    在清单 4-27 中，发生了以下事情：


    a.  `handleLinkForDetail(with:)` 接收一个 URL 作为参数并将其存储在 `url` 中。使用 `guard-let`，检查
    `url` 是否包含 scheme。如果存在 scheme，则将其存储在 `urlScheme` 中，并检查 `urlScheme` 是否与 `LinkConstants.detailScheme`（其值为
    `"detail"`）匹配。这有助于验证深层链接是否旨在让应用导航到详情屏幕（我们在清单 4-24 的步骤“a”中讨论过这一点）。否则，该方法将返回且不执行任何操作。


    b.  在此步骤中，检查 `url` 是否包含 host。如果包含 host，则将其存储在 `urlType` 中；否则，该方法将返回且不执行任何操作。您已经以某种方式设置了
    URL，使得 `urlType` 将包含所选事件类别的字符串值。


    c.  现在，将 `urlType` 的值传递给 `EventType` 初始化器，以将其转换为一个 `EventType` 枚举值。由于您可以确信传入的是可以转换为
    `EventType` 枚举值的 `String`，因此您可以使用强制解包运算符（`!`）对结果进行强制解包，并将其存储在 `type` 中，该变量存储所选的事件类别/事件类型并相应地显示事件。


    d.  在此步骤中，仅使用 `if-let` 提取 `url` 中传递的第一个查询参数，因为您只传递了一个包含事件文本的查询参数。


    现在，由于 `firstElement` 包含被点击事件的文本，您可以将其与 `otdViewModel` 的 `events` 变量中的文本进行匹配，以找出该被点击事件的事件数据。然后，可以使用这些事件数据来启动导航到被点击事件的详情页面。`events`
    变量是应用使用 API 获取所有事件后存储它们的地方。


    因此，对 `otdViewModel` 的 `events` 变量运行一个 `for` 循环，将迭代变量设置为 `eventType`。再次对 `eventType.value`
    运行另一个 `for` 循环，以找出与 `firstElement` 文本匹配的事件文本。一旦找到事件，就将它的值存储在 `deepLinkEvent` 中，这将使该值在整个
    `HomeView` 中可用。并且，由于已验证这是导航到详情页面的有效深层链接操作，因此将 `deepLinkActive` 标志设置为 `true`。


    3.  现在是调用您刚刚创建的 `handleLinkForDetail(with:)` 方法的时候了。由于与深层链接相关的操作主要由 `HomeView`
    中的 `handleLinks(for:)` 方法处理，请转到那里，使用清单 4-28 中的代码替换它，以赋予 `handleLinks(for:)` 更多职责。


    ```

    func handleLinks(for url: URL) {

    deepLinkEvent = nil

    deepLinkActive = false

    if let type = EventType(rawValue: url.absoluteString) {

    self.type = type

    } else {

    handleLinkForDetail(with: url)

    }

    }

    清单 4-28

    增加职责后的 handleLinks(for:)

    ```


    清单 4-28 包含了 `handleLinks(for:)` 方法的更新版本。无论接收到什么 `url`，初始时都将 `deepLinkEvent` 设置为
    `nil`，`deepLinkActive` 设置为 `false`。然后，如果 `url` 包含可以转换为 `EventType` 枚举值的 `String`，则将其存储在
    `type` 变量中。之后，将 `type` 变量的值存储在 `HomeView` 的 `type` 变量中，该变量负责设置所选的事件类别/事件类型，并在主屏幕上相应地显示事件列表。您之前已经为小尺寸小部件和中等尺寸小部件的一部分使用了此条件。


    但如果 `url` 不包含这样的 `String`，则可以推断出是时候处理用于导航到事件详情屏幕的深层链接了。因此，在 `else` 条件中，调用了 `handleLinkForDetail(with:
    url)`。


    4.  现在，剩下的最后一件事情是创建一个 `NavigationLink`，该链接根据 `HomeView` 的 `deepLinkActive` 状态变量进行激活和停用。当它被激活时，应用会自动导航到事件的详情屏幕。为此，使用清单
    4-29 中给出的代码创建一个名为 `navigateToDetail` 的变量。


