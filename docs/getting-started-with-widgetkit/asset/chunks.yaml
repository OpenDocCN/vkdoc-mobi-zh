  trans: '

    # 创建 SiriKit 意图定义文件


    此步骤与上一章的步骤类似。在此步骤中，您将创建一个意图定义文件，并使用该文件为您的 widget 定义可配置属性。请按照以下步骤创建该文件：


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig6_HTML.jpg](img/505356_1_En_5_Fig6_HTML.jpg)


    图 5-6：在意图定义文件中创建新意图


    1.  右键点击项目中的 **TwitterTrendsWidget** 文件夹，点击 **New Group** 创建一个新文件夹，并将其命名为 **Intent**。

    2.  现在，右键点击 **Intent** 文件夹，点击 **New File…**。

    3.  在出现的对话框中，选择 **SiriKit Intent Definition File**，将其命名为 `TwitterTrends.intentdefinition`，并创建该文件。创建文件时，请确保对话框底部勾选了
    **TwitterTrendsWidgetExtension** 和 **TwitterTrends** 这两个目标。

    4.  打开 `TwitterTrends.intentdefinition`，点击意图文件左下角的“**+**”图标，然后从选项列表中点击 **New Intent**（图
    5-6）。


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig7_HTML.jpg](img/505356_1_En_5_Fig7_HTML.jpg)


    图 5-7：创建名为“selectedTrend”的参数，并将其“类型”更改为“添加类型…”


    5.  将意图命名为 **Trends**，并修改该意图的一些配置。由于您仅将意图用于 widget，请勾选 **Intent is eligible for
    widgets**，并取消勾选 **Intent is user-configurable in the Shortcuts app and Add to
    Siri** 和 **Intent is eligible for Siri Suggestions**。

    6.  现在，点击 **Parameters** 部分下方的“**+**”按钮，添加一个名为 `selectedTrend` 的参数。参数是用户将在 widget
    配置界面中看到并修改的属性，用以配置您的 widget。在 widget 配置界面（图 5-4）中显示的显示名称会自动设置为 **Selected Trend**。

    7.  然后，将 `selectedTrend` 参数的类型更改为 **添加类型…**（图 5-7）。


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig8_HTML.jpg](img/505356_1_En_5_Fig8_HTML.jpg)


    图 5-8：点击“添加类型”后显示的界面


    8.  点击 **添加类型…** 后，会立即显示一个新界面，如图 5-8 所示。在左侧 **TYPES** 标题下的项目中输入名称，将新类型更名为 `SelectedTrend`。

    9.  再次回到 **Trends** 自定义意图，选中 `selectedTrend` 参数，并勾选 **Options are provided dynamically**，这是因为您希望通过从远程服务器获取数据来动态提供该参数的选项。同时，取消勾选
    **Siri can ask for value when run**，因为您不需要与 Siri 协作。


    通过这种方式，您便创建了一个意图定义文件，并添加了参数 `selectedTrend`，用户将在 widget 的配置界面中使用该参数选择他们喜欢的趋势。


    ## 设置 IntentHandler 以获取热门趋势并发送至 Widget


    现在，您需要添加一个机制，以便在创建时间线时使用 `selectedTrend` 参数。在上一章中，这个过程简单直接，因为您有一个包含一组已定义或硬编码值的
    `enum`。但这次您将使用一个 `class`，情况会有所不同。


    因此，首先您需要为 widget 提供 `SelectedTrend` 类型的 `selectedTrend` 参数可以持有的值。为此，您需要一个意图处理器（intent
    handler），它负责从服务器获取这些值并提供给您的 widget。


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig9_HTML.jpg](img/505356_1_En_5_Fig9_HTML.jpg)


    图 5-9：点击“支持的意图”下方的“+”图标后显示的界面


    1.  在 Xcode 中，转到 **File** ➤ **New** ➤ **Target** 创建一个新目标。在出现的对话框中，选择 **Intents
    Extension**，然后点击 **Next**。

    2.  在显示的对话框中，将 **Product Name** 设置为 `TwitterTrendsIntent`，**Language** 设置为 **Swift**，**Starting
    Point** 设置为 **None**。确保 **Include UI Extension** 未被勾选。将 **Project** 设置为 `TwitterTrends`，**Embed
    in Application** 的值设置为 `TwitterTrends`。然后点击 **Finish**。如果被询问是否要 **Activate “TwitterTrendsIntent”
    scheme**，请点击 **Cancel**，因为后续运行 widget 或 App 时无需激活该 scheme。


    现在，您的项目中创建了一个名为 `TwitterTrendsIntent` 的新文件夹，其中包含 `IntentHandler.swift` 和 `Info.plist`。您将在
    `IntentHandler.swift` 文件中编写代码，从 Twitter 服务器获取热门趋势并将其发送到您的 widget。


    3.  现在，打开 `TwitterTrendsWidget` 的 **Intent** 文件夹中的 `TwitterTrends.intentdefinition`
    文件，通过勾选 `TwitterTrendsIntent` 来更新其 **Target Membership**。现在，该文件可以从 `TwitterTrends`、`TwitterTrendsWidget`
    和 `TwitterTrendsIntent` 访问。

    4.  需要注意的是，`TwitterTrendsIntent` 目标需要知道它可以支持的意图类型。为此，选择位于 **Project Navigator**
    顶部的 `TwitterTrends` 项目（而不是 `TwitterTrends` 文件夹）以进入项目设置。现在，在 **TARGETS** 部分中选择
    `TwitterTrendsIntent` 目标，并进入其 **General** 标签页。

    5.  在 `TwitterTrendsIntent` 的 **General** 标签页中，转到 **Supported Intents** 部分，点击其下方的“**+**”号新增一个支持的意图。此时的界面将如图
    5-9 所示。

    6.  在 **Class Name** 标题下输入 `TrendsIntent`。由于您在步骤 3 中已将 `TwitterTrends.intentdefinition`
    设为 `TwitterTrendsIntent` 目标的成员，因此开始输入时便会看到建议。`TrendsIntent` 这个名称是由 Xcode 根据您在**创建和配置
    SiriKit 意图定义文件** 的步骤 5 中添加到 `TwitterTrends.intentdefinition` 的自定义意图名称 **Trends**
    自动生成的。最后，让 `TrendsIntent` 的 **Authentication** 保持为 **None**。

    7.  现在，打开 `TwitterTrendsIntent` 文件夹中的 `IntentHandler.swift`。目前，`IntentHandler`
    类继承自 `INExtension` 类。现在让 `IntentHandler` 遵循 Xcode 自动生成的 `TrendsIntentHandling`
    协议。完成此操作后，`IntentHandler.swift` 中的代码将如代码清单 5-1 所示。

    8.  一旦您使 `IntentHandler` 遵循 `TrendsIntentHandling`，Xcode 将显示一条错误消息：“类型‘IntentHandler’不符合协议‘TrendsIntentHandling’。是否要添加协议存根？”这是因为您尚未在
    `IntentHandler` 中实现 `TrendsIntentHandling` 协议的属性。

    '
- fmt: "2. 单击 **Fix**，让 Xcode 生成 `provideSelectedTrendOptionsCollection(for:with:)`\
    \ 的实现。你将在此处通过 `TwitterTrendsAPI` 与 Twitter 服务器通信，获取热门趋势。但目前 `IntentHandler.swift`\
    \ 无法访问 `TwitterTrendsAPI`，因此你需要更新其 **Target Membership**。\n\n3. 打开 **TwitterTrends**\
    \ 文件夹中的 **TwitterTrendsAPI.swift**，然后更新其 **Target Membership**，为 **TwitterTrendsIntent**\
    \ 添加勾选标记。现在你就能从 `IntentHandler.swift` 中访问它了。\n\n4. 打开 `IntentHandler.swift`，通过将当前实现替换为代码清单\
    \ [5-2](#505356_1_En_5_Chapter.xhtml#PC4) 中的代码来实现 `provideSelectedTrendOptionsCollection(for:with:)`。\n\
    \n```swift\nimport Intents\nclass IntentHandler: INExtension, TrendsIntentHandling\
    \ {\n    override func handler(for intent: INIntent) -> Any {\n        return\
    \ self\n    }\n}\n// 代码清单 5-1\n// 符合 TrendsIntentHandling 协议后的 IntentHandler\n\
    ```\n\n```swift\nfunc provideSelectedTrendOptionsCollection(for intent: TrendsIntent,\
    \ with completion: @escaping (INObjectCollection?, Error?) -> Void) {\n    //\
    \ a\n    TwitterTrendsAPI.getAvailableTrends { response in\n        // b\n   \
    \     switch response {\n            // c\n        case .success(let trends):\n\
    \            // d\n            if let firstTrend = trends.first {\n          \
    \      // e\n                let availableTrends = firstTrend.trends\n       \
    \         // f\n                let usableTrends: [SelectedTrend] = availableTrends.map\
    \ { element in\n                    return SelectedTrend(identifier: element.query,\
    \ display: element.name)\n                }\n                // g\n          \
    \      let inObjectCollection: INObjectCollection = INObjectCollection(items:\
    \ usableTrends)\n                completion(inObjectCollection, nil)\n       \
    \     }\n        case .failure(let error):\n            // h\n            print(error.localizedDescription)\n\
    \        }\n    }\n}\n// 代码清单 5-2\n// provideSelectedTrendOptionsCollection(for:with:)\
    \ 的实现\n```\n\n粘贴代码清单 [5-2](#505356_1_En_5_Chapter.xhtml#PC4) 的代码后，你一定会看到大量错误。因此，在描述代码清单\
    \ [5-2](#505356_1_En_5_Chapter.xhtml#PC4) 的内容之前，我们先消除这些错误。浏览错误信息后，你会发现 Xcode 提示找不到类型\
    \ `Trends`、`TrendTweets`、`Trend` 和 `Tweets`。这是因为 `TwitterTrendsAPI` 现在也是 **TwitterTrendsIntent**\
    \ 目标的成员，但它使用的结构体（`TrendTweets`、`Trend` 和 `Tweets`）却不是该目标的成员。因此，你需要将这些结构体设为 **TwitterTrendsIntent**\
    \ 的成员。\n\n从 **TwitterTrends** 的 **Models** 文件夹中打开 `TrendTweets.swift`，并更新其 **Target\
    \ Membership**，为 **TwitterTrendsIntent** 添加勾选标记。对 `Trends.swift` 和 `Tweets.swift`\
    \ 重复同样的操作。\n\n1. 现在构建你的项目，你会发现所有错误都已消失。接下来，我们回到代码清单 [5-2](#505356_1_En_5_Chapter.xhtml#PC4)\
    \ 来了解其具体内容。\n    1. 由于 `provideSelectedTrendOptionsCollection(for:with:)` 方法是你获取\
    \ Twitter 热门趋势并将其作为 `selectedTrend` 参数的选项进行传递的位置，因此你通过调用 `TwitterTrendsAPI` 的\
    \ `getAvailableTrends(id:completion:)` 方法来开始实现。\n\n2. `getAvailableTrends(id:completion:)`\
    \ 通过其完成处理器返回 `response`。`response` 可以是 `.success` 或 `.failure`，因此使用 `switch` 语句进行处理。\n\
    \n3. 如果 `response` 的值为 `.success`，则它包含 `trends`，即热门趋势的数据。\n\n4. 如果你研究一下 Twitter\
    \ 的 **GET trends/place** API 端点的响应格式，就会发现它返回一个包含单个对象的数组。通过 `trends.first` 访问该对象，并将其存储在\
    \ `firstTrend` 中。\n\n5. 现在，所有已获取的趋势都存储在 `firstTrend` 的 `trends` 属性中。因此，通过 `firstTrend.trends`\
    \ 访问它们，并存储在 `availableTrends` 中。\n\n6. 由于你在 `TwitterTrends.intentdefinition` 中已将\
    \ `selectedTrend` 参数的数据类型定义为 `SelectedTrend`，因此现在需要将从 Twitter API 获取的趋势转换为该类型。为此，对\
    \ `availableTrends` 数组中的所有值运行 `map`，每次迭代使用 `query` 和 `name` 创建新的 `SelectedTrend`\
    \ 实例。然后将它们存储在 `usableTrends` 数组中，该数组用于存储 `SelectedTrend` 值。\n\n7. 在此步骤中，将 `usableTrends`\
    \ 传递给 `INObjectCollection` 初始化器，并存储在 `inObjectCollection` 中。然后，通过将 `inObjectCollection`\
    \ 作为参数传递给完成处理器来调用它。这样，从 Twitter 服务器获取的热门趋势就会被发送到 widget 的 `selectedTrend` 参数。\n\
    \n8. 如果 `response` 包含 `.failure`，则访问其 `error` 属性并将其打印到控制台。\n\n通过这种方式，你从 Twitter\
    \ API 获取了趋势，将它们转换为你在 `TwitterTrends.intentdefinition` 中创建的 `selectedTrend` 参数的类型，并传递给了\
    \ `selectedTrend`。\n\n## 切换到 IntentConfiguration\n\n目前，如果你构建并运行项目，会发现长按 widget\
    \ 并不会显示 **Edit Widget** 选项。这是因为你尚未做好必要的准备，将 `StaticConfiguration` 替换为 `IntentConfiguration`。而要使用\
    \ `IntentConfiguration`，你需要一个与当前不同的时间线提供器。只需按照以下步骤进行，即可完成向 `IntentConfiguration`\
    \ 的“大迁移”。"
  raw: "2.  Click **Fix** to see Xcode generate the implementation of `provideSelectedTrendOptionsCollection(for:with:)`.\
    \ This is where you will fetch top Twitter trends by communicating with its servers\
    \ using `TwitterTrendsAPI`. But `TwitterTrendsAPI` is not currently accessible\
    \ from **IntentHandler.swift**. So, you need to update its **Target Membership**.\n\
    \n3.  Open **TwitterTrendsAPI.swift** in the **TwitterTrends** folder. Then, update\
    \ its **Target Membership** by adding a checkmark to **TwitterTrendsIntent**.\
    \ Now you will be able to access it from **IntentHandler.swift**.\n\n4.  Open\
    \ **IntentHandler.swift** and implement `provideSelectedTrendOptionsCollection(for:with:)`\
    \ by replacing the current implementation with the code given in Listing [5-2](#505356_1_En_5_Chapter.xhtml#PC4).\n\
    \n```\nimport Intents\nclass IntentHandler: INExtension, TrendsIntentHandling\
    \ {\noverride func handler(for intent: INIntent) -> Any {\nreturn self\n}\n}\n\
    Listing 5-1\nIntentHandler after conforming to TrendsIntentHandling\n```\n\n```\n\
    func provideSelectedTrendOptionsCollection(for intent: TrendsIntent, with completion:\
    \ @escaping (INObjectCollection?, Error?) -> Void) {\n// a\nTwitterTrendsAPI.getAvailableTrends\
    \ { response in\n// b\nswitch response {\n// c\ncase .success(let trends):\n//\
    \ d\nif let firstTrend = trends.first {\n// e\nlet availableTrends = firstTrend.trends\n\
    // f\nlet usableTrends: [SelectedTrend] = availableTrends.map { element in\nreturn\
    \ SelectedTrend(identifier: element.query, display: element.name)\n}\n// g\nlet\
    \ inObjectCollection: INObjectCollection = INObjectCollection(items: usableTrends)\n\
    completion(inObjectCollection, nil)\n}\ncase .failure(let error):\n// h\nprint(error.localizedDescription)\n\
    }\n}\n}\nListing 5-2\nImplementation of provideSelectedTrendOptionsCollection(for:with:)\n\
    ```\n\nAfter pasting the code of Listing [5-2](#505356_1_En_5_Chapter.xhtml#PC4),\
    \ you must be seeing a lot of errors. So, before describing what is happening\
    \ in Listing [5-2](#505356_1_En_5_Chapter.xhtml#PC4), first let’s get rid of the\
    \ errors. If you go through the error messages, you will see that Xcode is complaining\
    \ about being unable to find the types `Trends`, `TrendTweets`, `Trend`, and `Tweets`.\
    \ It is because `TwitterTrendsAPI` is now a member of the **TwitterTrendsIntent**\
    \ target also, but the `struct`s that it uses (`TrendTweets`, `Trend`, and `Tweets`)\
    \ are not the members of that target. So, you need to make those `struct`s members\
    \ of **TwitterTrendsIntent**.\n\nFrom the **Models** folder of **TwitterTrends**,\
    \ open **TrendTweets.swift** and update its **Target Membership** by putting a\
    \ checkmark on **TwitterTrendsIntent**. Repeat the same for **Trends.swift** and\
    \ **Tweets.swift** too.\n\n1.  Now build your project to find all the errors gone.\
    \ Now, let’s get back to knowing what is happening in Listing [5-2](#505356_1_En_5_Chapter.xhtml#PC4).\n\
    \    1.  Since the `provideSelectedTrendOptionsCollection(for:with:)` method is\
    \ the location from where you will fetch top Twitter trends and pass them as the\
    \ options of the **selectedTrend** parameter, you begin the implementation by\
    \ calling the `getAvailableTrends(id:completion:)` method of `TwitterTrendsAPI`.\n\
    \n2.  `getAvailableTrends(id:completion:)` returns `response` using its completion\
    \ handler. `response` can either be `.success` or `.failure`. So, it is put through\
    \ a `switch` case.\n\n3.  If `response` has a `.success` value, it contains `trends`\
    \ which is the data about the top trends.\n\n4.  If you study the response format\
    \ of Twitter’s **GET trends/place** API endpoint, you will see that it returns\
    \ an array with a single object. That single object is accessed using `trends.first`\
    \ and stored in `firstTrend`.\n\n5.  Now, all the trends that have been fetched\
    \ are stored in the `trends` property of `firstTrend`. So, they are accessed using\
    \ `firstTrend.trends` and stored in `availableTrends`.\n\n6.  Since you have defined\
    \ the data type of the **selectedTrend** parameter in **TwitterTrends.intentdefinition**\
    \ as **SelectedTrend**, now you will have to convert the trends fetched from Twitter’s\
    \ API to that type. For that, `map` is run through all the values in the `availableTrends`\
    \ array, and each iteration’s `query` and `name` are used to create a new `SelectedTrend`\
    \ instance. Then, they are stored in the `usableTrends` array, which is an array\
    \ that stores `SelectedTrend` values.\n\n7.  In this step, `usableTrends` is passed\
    \ into the `INObjectCollection` initializer and stored in `inObjectCollection`.\
    \ Then, the completion handler is called by passing `inObjectCollection` as an\
    \ argument. This is how the top trends fetched from Twitter’s server are sent\
    \ to the **selectedTrend** parameter of the widget.\n\n8.  In case `response`\
    \ contains `.failure`, then its `error` property is accessed and printed into\
    \ the console.\n\nIn this way, you fetched the trends from Twitter’s API, converted\
    \ them to the type of the **selectedTrend** parameter you created in **TwitterTrends.intentdefinition**,\
    \ and passed them to **selectedTrend**.\n\n## Switching to IntentConfiguration\n\
    \nRight now, if you build and run your project, you will see that long pressing\
    \ your widgets does not give the option to **Edit Widget**. It is because you\
    \ have still not made necessary preparations to replace `StaticConfiguration`\
    \ with `IntentConfiguration` . And to use `IntentConfiguration`, you will need\
    \ a different timeline provider than the one you are using right now. Just follow\
    \ the steps given to make “the big switch” to `IntentConfiguration`."
