    \ event)\n    }\n} else {\n    eventDetail(with: event)\n}\n// Listing 4-35\n\
    // 替换 HStack 的代码\n```\n\n你在`MediumWidgetView`中也使用了`Listing [4-35]`中的代码。给定的代码通过将`event.text`和`category`传递给`LinkConstants.detail(with:category:)`方法，并使用`if-let`解包该方法返回的值，来检查是否生成了有效的\
