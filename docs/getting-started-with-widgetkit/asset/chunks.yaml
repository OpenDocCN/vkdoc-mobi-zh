- fmt: "### Image\n\n`Image`视图的名称直观表明，它可用于在应用或小组件中展示图片。在后续课程中，你将创建显示足球俱乐部标志的小组件，届时就会用到`Image`视图。\n\
    \n`Image`视图提供了多种方法来设置它所持有图片的样式。\n\n你可以通过`Image(uiImage: UIImage)`初始化器加载存储在`Assets.xcassets`文件夹中的图片。例如，如果图片名为\"\
    background\"，你可以在`Image`视图中这样加载它：`Image(uiImage: #imageLiteral(resourceName: \"\
    background\"))`。\n\n`Image`视图初始化器还有另一种变体，它允许你加载 Apple 提供的系统符号图片。该初始化器接受一个`String`参数，即你想要使用的系统符号图片的名称。\n\
    \n例如，如果你想加载垃圾桶图标，可以使用其系统符号名称`\"trash\"`，并通过编写`Image(systemName: \"trash\")`将其传入初始化器。\n\
    \n提示\n\n你可以使用 SF Symbols³ 应用查找系统符号图片的名称。\n\n### HStack\n\n`HStack`是一种将其子视图水平排列的视图。它允许你创建一个水平堆栈，将视图并排放置。在后续章节中，你将使用`HStack`创建横向并排显示足球俱乐部名称和标志的视图。在代码清单\
    \ 2-2 中，你将创建一个包含`Text`和`Button`的`HStack`。\n\n```\nHStack {\n    Text(\"New user?\"\
    )\n    Button(action: {\n        print(\"Register button is tapped.\")\n    })\
    \ {\n        Text(\"Register\")\n    }\n}\n代码清单 2-2\nHStack 的使用示例\n```\n\n代码清单\
    \ 2-2 展示了`HStack`的使用实例。该`HStack`包含一个显示\"New user?\"的`Text`视图，后跟一个显示\"Register\"\
    的按钮。图 2-1 展示了代码清单 2-2 的运行结果截图。\n\n![../images/505356_1_En_2_Chapter/505356_1_En_2_Fig1_HTML.jpg](images/505356_1_En_2_Chapter/505356_1_En_2_Fig1_HTML.jpg)\n\
    图 2-1\n一个显示`Text`和`Button`的`HStack`\n\n`HStack`允许你更改项目之间的间距和项目的对齐方式。\n\n### VStack\n\
    \n`VStack`使你能够创建垂直堆叠的视图。在后续章节中，你将使用`VStack`垂直显示即将到来的足球比赛的日期和时间。你编写的代码将与代码清单 2-3\
    \ 中的代码类似。\n\n```\nVStack {\n    Text(\"On: August 19, 2021\")\n    Text(\"At:\
    \ 6:00 PM\")\n}\n代码清单 2-3\nVStack 的使用示例\n```\n\n代码清单 2-3 是创建垂直堆栈以显示即将举行的比赛日期和时间的代码。图\
    \ 2-2 展示了代码清单 2-3 的运行结果截图。\n\n![../images/505356_1_En_2_Chapter/505356_1_En_2_Fig2_HTML.jpg](images/505356_1_En_2_Chapter/505356_1_En_2_Fig2_HTML.jpg)\n\
    图 2-2\n一个显示两个`Text`视图的`VStack`\n\n与`HStack`类似，`VStack`也允许你更改项目之间的间距和项目的对齐方式。\n\
    \n### ZStack\n\n假设你想在图片上放置一些文本，这时`ZStack`就派上用场了！`ZStack`是 SwiftUI 中一种特殊的、用于重叠视图的堆栈。代码清单\
    \ 2-4 展示了创建一个`ZStack`的代码，该`ZStack`将文本\"Welcome\"放置在图片上方。\n\n```\nZStack {\n  \
    \  Image(uiImage: #imageLiteral(resourceName: \"welcome-bg\"))\n    Text(\"Welcome\"\
    )\n}\n代码清单 2-4\nZStack 的使用示例\n```\n\n在代码清单 2-4 中，我们将`Image`视图写在`Text`视图之前，因为我们希望`Text`视图显示在`Image`视图之上。图\
    \ 2-3 展示了代码清单 2-4 的运行结果截图。\n\n![../images/505356_1_En_2_Chapter/505356_1_En_2_Fig3_HTML.jpg](images/505356_1_En_2_Chapter/505356_1_En_2_Fig3_HTML.jpg)\n\
    图 2-3\n一个在`Image`视图上显示`Text`视图的`ZStack`\n\n注意\n\n你希望显示在前景的视图应写在`ZStack`代码块的最后一行。\n\
    \n`ZStack`允许你更改其中包含的子视图的对齐方式。但是，你无法更改项目之间的间距，因为这没有意义。\n\n## 人机界面指南\n\n人机界面指南（HIG）⁴\
    \ 是 Apple 为开发者提供的建议，用于开发具有直观、易于学习和一致用户界面的应用。你可以将 HIG 视为一本包含 Apple 平台用户界面开发“注意事项”的操作手册。\n\
    \nApple 也为开发小组件准备了人机界面指南，它帮助你理解优秀小组件应具备的特质以及如何开发此类小组件。简而言之，人机界面指南建议如下：\n\n*  \
    \ 让你的小组件专注于特定的想法或目的，并用于展示相关内容，以便用户无需启动应用即可一目了然地获取有用信息。同时，避免创建仅仅用于启动应用的小组件，因为应用图标已经具有此功能。此外，WidgetKit\
    \ 允许你开发各种尺寸的小组件，但这并不意味着你总是应该开发所有尺寸的小组件。仅在能为你的应用增加价值时才这样做。\n\n*   你可以允许小组件可配置。但仅当你的小组件需要用户配置以便提供最佳输出时，才使其可配置。关于小组件的另一个有趣特性是，你可以向其中添加点击目标，以便从小组件导航到相关屏幕。但是，避免添加过多的点击目标，因为这可能会导致糟糕的用户体验。\n\
    \n*   小组件的主要功能是显示新鲜内容。因此，务必通过分析数据变化频率以及估算用户查看小组件中更新数据的频率，来确定合适的更新频率。\n\n*   你可以通过使用品牌颜色、字体和图标，让你的小组件在应用图标和小组件中脱颖而出。然而，在大多数情况下，在小组件中展示你的\
    \ Logo、文字商标或应用图标并无意义。同样，要确保内容密度看起来不拥挤，并且你的设计元素和颜色不会使用户难以查看小组件试图传达的信息。此外，支持深色模式、提供小组件真实的预览效果并附上恰当描述，以及使用占位内容来提升用户体验，都能在用户面前留下良好印象。\n\
    \n*   由于使用不同尺寸设备的用户会安装你的应用和小组件，因此你必须确保它们能很好地适应这些屏幕尺寸。为此，请根据人机界面指南中“Size images\
    \ to look great on large devices and at high scale factors”标题下的尺寸表，调整你在小组件中使用的图片尺寸。⁵\
    \ 同时，确保你的文本和字形在各种屏幕尺寸下都能良好适配。并使用`ContainerRelativeShape`来确保小组件内容在其圆角内看起来美观。"
  raw: '#### Image


    The name itself makes it clear that you can use an `Image` view to display images
    in your app or widget. In the upcoming lessons, you will create widgets that will
    display logos of football clubs. And you will use `Image` views there.


    The `Image` view provides various methods to style the image it holds.


    You can load an image stored in your Assets.xcassets folder by using the `Image(uiImage:
    UIImage)` initializer. For example, if the name of the image is “background,”
    you can load it in the `Image` view by writing `Image(uiImage: #imageLiteral(resourceName:
    "background"))`.


    There exists another variety of the `Image` view initializer. It allows you to
    load system symbol images provided by Apple. The initializer takes a `String`
    argument, and it is the name of the system symbol image that you want to use.


    For example, if you want to load the trash icon, you can use its system symbol
    name, `"trash"`, and pass it in the initializer by writing `Image(systemName:
    "trash")`.


    Tip


    You can use the SF Symbols^([³](#fn3)) app to look up the names of system symbol
    images.


    #### HStack


    `HStack` is a view that arranges its child views horizontally. It allows you to
    create a horizontal stack that arranges the views side by side. In the upcoming
    chapters, you will use `HStack` to create views that will display the name and
    the logo of a football club side by side horizontally. In Listing [2-2](#505356_1_En_2_Chapter.xhtml#PC2),
    you will create an `HStack` that holds a `Text` and a `Button`.


    ```

    HStack {

    Text("New user?")

    Button(action: {

    print("Register button is tapped.")

    }) {

    Text("Register")

    }

    }

    Listing 2-2

    HStack in action

    ```


    Listing [2-2](#505356_1_En_2_Chapter.xhtml#PC2) shows an `HStack` in action. The
    `HStack` holds a `Text` view that displays “New user?”, followed by a button displaying
    “Register.” Figure [2-1](#505356_1_En_2_Chapter.xhtml#Fig1) shows the screenshot
    of the result of Listing [2-2](#505356_1_En_2_Chapter.xhtml#PC2).


    ![../images/505356_1_En_2_Chapter/505356_1_En_2_Fig1_HTML.jpg](images/505356_1_En_2_Chapter/505356_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    An `HStack` displaying a `Text` and a `Button`


    `HStack` allows you to change the spacing between the items and the alignment
    of the items.


    #### VStack


    `VStack` enables you to create a vertical stack of views. In the upcoming chapters,
    you will use `VStack` to create views that will display the date and time of the
    upcoming football match in a vertical fashion. The code you will write will be
    similar to the code given in Listing [2-3](#505356_1_En_2_Chapter.xhtml#PC3).


    ```

    VStack {

    Text("On: August 19, 2021")

    Text("At: 6:00 PM")

    }

    Listing 2-3

    VStack in action

    ```


    Listing [2-3](#505356_1_En_2_Chapter.xhtml#PC3) is the code to create a vertical
    stack that displays the date and time of the upcoming match. Figure [2-2](#505356_1_En_2_Chapter.xhtml#Fig2)
    shows the screenshot of the result of Listing [2-3](#505356_1_En_2_Chapter.xhtml#PC3).


    ![../images/505356_1_En_2_Chapter/505356_1_En_2_Fig2_HTML.jpg](images/505356_1_En_2_Chapter/505356_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    A `VStack` displaying two `Text` views


    Like `HStack`, `VStack` also allows you to change the spacing between the items
    and the alignment of the items.


    #### ZStack


    Assume that you want to place some text over a picture. That is where `ZStack`
    comes into action! `ZStack` is SwiftUI’s special type of stack that overlaps views.
    Listing [2-4](#505356_1_En_2_Chapter.xhtml#PC4) shows the code to create a `ZStack`
    that places the text “Welcome” over a picture.


    ```

    ZStack {

    Image(uiImage: #imageLiteral(resourceName: "welcome-bg"))

    Text("Welcome")

    }

    Listing 2-4

    ZStack in action

    ```


    In Listing [2-4](#505356_1_En_2_Chapter.xhtml#PC4), we have written the `Image`
    view before the `Text` view because we want the `Text` view to appear over the
    `Image` view. Figure [2-3](#505356_1_En_2_Chapter.xhtml#Fig3) shows the screenshot
    of the result of Listing [2-4](#505356_1_En_2_Chapter.xhtml#PC4).


    ![../images/505356_1_En_2_Chapter/505356_1_En_2_Fig3_HTML.jpg](images/505356_1_En_2_Chapter/505356_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    A `ZStack` displaying a `Text` view over an `Image` view


    Note


    The view that you want to display on the foreground should be written in the last
    line of the `ZStack` block.


    `ZStack` allows you to change the alignment of the child views that you include
    in it. However, you cannot change the spacing between the items since it doesn’t
    make sense.


    ## Human Interface Guidelines


    Human Interface Guidelines (HIG)^([⁴](#fn4)) are the recommendations Apple gives
    to the developers for developing apps with intuitive, easy-to-learn, and consistent
    user interface. You can consider HIG as an instruction manual containing the *dos
    and don’ts* of user interface development for Apple platforms.


    Apple has prepared Human Interface Guidelines for developing widgets too, and
    they help you understand what the qualities of a good widget are and how you can
    develop such widgets. In short, the Human Interface Guidelines suggest the following:


    *   Keep your widget focused upon a specific idea or purpose and use it to display
    relevant content so that users can get useful information at a glance, without
    launching the app. Also, avoid creating a widget that simply launches the app,
    as the app icon already does it. In addition to this, just because WidgetKit allows
    you to develop various sizes of widgets does not mean that you should always develop
    widgets of all sizes. Do it only when it adds value to your app.


    *   You can allow widgets to be user configurable. But make your widgets configurable
    only if your widgets require users to configure them so that the widgets can deliver
    the best output. Another interesting thing about widgets is that you can add tap
    targets in them to make navigation to relevant screens possible from the widget.
    However, avoid adding too many tap targets as it may give a bad user experience.


    *   A widget’s main function is to display fresh content. So, make sure to figure
    out a proper update frequency by analyzing how often changes are seen in the data
    and by estimating how often people need to see updated data in your widget.


    *   You can make your widget stand out from the crowd of app icons and widgets
    by using your brand colors, typefaces, and icons. However, displaying your logo,
    wordmark, or app icon in the widget does not make sense in most of the cases.
    Likewise, make sure that the content density does not look crowded and your design
    elements and colors do not make it difficult for users to see the information
    your widget is trying to deliver. In addition, adding support for dark mode, giving
    a realistic preview of the widget along with a proper description, and making
    use of placeholder content for better user experience create a good impression
    in front of users.


    *   Since users using variable-sized devices will install your app and widgets,
    it is necessary for you to ensure that they adapt well to those screen sizes.
    For that, size the images you use in your widgets according to the size table
    given under the **Size images to look great on large devices and at high scale
    factors** heading in the Human Interface Guidelines for widgets.^([⁵](#fn5)) Also,
    ensure that your texts and glyphs adapt well under the various screen sizes. And
    use ContainerRelativeShape to ensure that the content of your widget looks good
    within the rounded corners of the widget.'
  trans: "\n### 图像\n\n`Image`视图的名称直观地表明了它的用途：在应用或小组件中展示图片。在后续课程中，你将创建显示足球俱乐部标志的小组件，届时就会用到`Image`视图。\n\
    \n`Image`视图提供了多种方法来设置它所持有图片的样式。\n\n你可以通过`Image(uiImage: UIImage)`初始化器加载存储在`Assets.xcassets`文件夹中的图片。例如，如果图片名为\"\
    background\"，你可以在`Image`视图中这样加载它：`Image(uiImage: #imageLiteral(resourceName: \"\
    background\"))`。\n\n`Image`视图初始化器还有另一种变体，它允许你加载 Apple 提供的系统符号图片。该初始化器接受一个`String`参数，即你想要使用的系统符号图片的名称。\n\
    \n例如，如果你想加载垃圾桶图标，可以使用其系统符号名称`\"trash\"`，并通过编写`Image(systemName: \"trash\")`将其传入初始化器。\n\
    \n**提示**\n\n你可以使用 SF Symbols³ 应用查找系统符号图片的名称。\n\n### HStack\n\n`HStack`是一种将其子视图水平排列的视图。它允许你创建一个水平堆栈，将视图并排放置。在后续章节中，你将使用`HStack`创建横向并排显示足球俱乐部名称和标志的视图。在代码清单\
    \ 2-2 中，你将创建一个包含`Text`和`Button`的`HStack`。\n\n```\nHStack {\n    Text(\"New user?\"\
    )\n    Button(action: {\n        print(\"Register button is tapped.\")\n    })\
    \ {\n        Text(\"Register\")\n    }\n}\n代码清单 2-2\nHStack 的使用示例\n```\n\n代码清单\
    \ 2-2 展示了`HStack`的使用实例。该`HStack`包含一个显示\"New user?\"的`Text`视图，后跟一个显示\"Register\"\
    的按钮。图 2-1 展示了代码清单 2-2 的运行结果截图。\n\n![../images/505356_1_En_2_Chapter/505356_1_En_2_Fig1_HTML.jpg](img/505356_1_En_2_Fig1_HTML.jpg)\n\
    图 2-1\n一个显示`Text`和`Button`的`HStack`\n\n`HStack`允许你更改项目之间的间距和项目的对齐方式。\n\n### VStack\n\
    \n`VStack`使你能够创建垂直堆叠的视图。在后续章节中，你将使用`VStack`垂直显示即将到来的足球比赛的日期和时间。你编写的代码将与代码清单 2-3\
    \ 中的代码类似。\n\n```\nVStack {\n    Text(\"On: August 19, 2021\")\n    Text(\"At:\
    \ 6:00 PM\")\n}\n代码清单 2-3\nVStack 的使用示例\n```\n\n代码清单 2-3 是创建垂直堆栈以显示即将举行的比赛日期和时间的代码。图\
    \ 2-2 展示了代码清单 2-3 的运行结果截图。\n\n![../images/505356_1_En_2_Chapter/505356_1_En_2_Fig2_HTML.jpg](img/505356_1_En_2_Fig2_HTML.jpg)\n\
    图 2-2\n一个显示两个`Text`视图的`VStack`\n\n与`HStack`类似，`VStack`也允许你更改项目之间的间距和项目的对齐方式。\n\
    \n### ZStack\n\n假设你想在图片上放置一些文本，这时`ZStack`就派上用场了！`ZStack`是 SwiftUI 中一种特殊的、用于重叠视图的堆栈。代码清单\
    \ 2-4 展示了创建一个`ZStack`的代码，该`ZStack`将文本\"Welcome\"放置在图片上方。\n\n```\nZStack {\n  \
    \  Image(uiImage: #imageLiteral(resourceName: \"welcome-bg\"))\n    Text(\"Welcome\"\
    )\n}\n代码清单 2-4\nZStack 的使用示例\n```\n\n在代码清单 2-4 中，我们将`Image`视图写在`Text`视图之前，因为我们希望`Text`视图显示在`Image`视图之上。图\
    \ 2-3 展示了代码清单 2-4 的运行结果截图。\n\n![../images/505356_1_En_2_Chapter/505356_1_En_2_Fig3_HTML.jpg](img/505356_1_En_2_Fig3_HTML.jpg)\n\
    图 2-3\n一个在`Image`视图上显示`Text`视图的`ZStack`\n\n**注意**\n\n你希望显示在前景的视图应写在`ZStack`代码块的最后一行。\n\
    \n`ZStack`允许你更改其中包含的子视图的对齐方式。但是，你无法更改项目之间的间距，因为这没有意义。\n\n## 人机界面指南\n\n人机界面指南（HIG）⁴\
    \ 是 Apple 为开发者提供的建议，用于开发具有直观、易于学习和一致用户界面的应用。你可以将 HIG 视为一本包含 Apple 平台用户界面开发“注意事项”的操作手册。\n\
    \nApple 也为开发小组件准备了人机界面指南，它帮助你理解优秀小组件应具备的特质以及如何开发此类小组件。简而言之，人机界面指南建议如下：\n\n*  \
    \ 让你的小组件专注于特定的想法或目的，并用于展示相关内容，以便用户无需启动应用即可一目了然地获取有用信息。同时，避免创建仅仅用于启动应用的小组件，因为应用图标已经具有此功能。此外，WidgetKit\
    \ 允许你开发各种尺寸的小组件，但这并不意味着你总是应该开发所有尺寸的小组件。仅在能为你的应用增加价值时才这样做。\n\n*   你可以允许小组件可配置。但仅当你的小组件需要用户配置以便提供最佳输出时，才使其可配置。关于小组件的另一个有趣特性是，你可以向其中添加点击目标，以便从小组件导航到相关屏幕。但是，避免添加过多的点击目标，因为这可能会导致糟糕的用户体验。\n\
    \n*   小组件的主要功能是显示新鲜内容。因此，务必通过分析数据变化频率以及估算用户查看小组件中更新数据的频率，来确定合适的更新频率。\n\n*   你可以通过使用品牌颜色、字体和图标，让你的小组件在应用图标和小组件中脱颖而出。然而，在大多数情况下，在小组件中展示你的\
    \ Logo、文字商标或应用图标并无意义。同样，要确保内容密度看起来不拥挤，并且你的设计元素和颜色不会使用户难以查看小组件试图传达的信息。此外，支持深色模式、提供小组件真实的预览效果并附上恰当描述，以及使用占位内容来提升用户体验，都能在用户面前留下良好印象。\n\
    \n*   由于使用不同尺寸设备的用户会安装你的应用和小组件，因此你必须确保它们能很好地适应这些屏幕尺寸。为此，请根据人机界面指南中“Size images\
    \ to look great on large devices and at high scale factors”标题下的尺寸表，调整你在小组件中使用的图片尺寸。⁵\
    \ 同时，确保你的文本和字形在各种屏幕尺寸下都能良好适配。并使用`ContainerRelativeShape`来确保小组件内容在其圆角内看起来美观。\n"
- fmt: "# Widget Family\n\nBy now, you must have known that the `WidgetKit` framework\
    \ allows you to create widgets of various sizes – small, medium, and large. For\
    \ this purpose, you can use a special enum, `WidgetFamily`. It consists of three\
    \ cases – `systemSmall`, `systemMedium`, and `systemLarge`. And by looking at\
    \ the names of the cases, you can easily guess which case is responsible for which\
    \ size.\n\nThis variety in widget sizes gives users the freedom to place and configure\
    \ their widgets the way they prefer. Since each widget size can accommodate different\
    \ amounts of content and information within it, it is up to the developers like\
    \ you to choose what volume of content and information you would like to display.\n\
    \nJust to give you a bird’s eye view at how you can use the three cases of `WidgetFamily`\
    \ to support various widget sizes, we have borrowed some code from the official\
    \ documentation^([⁶](#fn6)) and pasted it in Listing [2-5](#505356_1_En_2_Chapter.xhtml#PC5).\n\
    \n```\nstruct GameStatusWidget: Widget {\n    var body: some WidgetConfiguration\
    \ {\n        StaticConfiguration(\n            kind: \"com.mygame.game-status\"\
    ,\n            provider: GameStatusProvider(),\n            placeholder: GameStatusPlaceholderView()\n\
    \        ) { entry in\n            GameStatusView(entry.gameStatus)\n        }\n\
    \        .configurationDisplayName(\"Game Status\")\n        .description(\"Shows\
    \ an overview of your game status\")\n        .supportedFamilies([.systemSmall,\
    \ .systemMedium, .systemLarge])\n    }\n}\n```\nListing 2-5  \nA widget that supports\
    \ all three widget families\n\nYou can see in Listing [2-5](#505356_1_En_2_Chapter.xhtml#PC5)\
    \ that a widget named `GameStatusWidget` has been created. You can ignore other\
    \ lines and just pay attention to the line that says `.supportedFamilies([.systemSmall,\
    \ .systemMedium, .systemLarge])`. This is the line that defines which sizes of\
    \ widgets your app should support.\n\n`supportedFamilies(_:)` is an instance method\
    \ of the `WidgetConfiguration` protocol. It takes an array of `WidgetFamily` cases\
    \ as an argument and is used to set the sizes that a widget supports. Since the\
    \ `StaticConfiguration` struct, used in Listing [2-5](#505356_1_En_2_Chapter.xhtml#PC5),\
    \ conforms to the `WidgetConfiguration` protocol, it can access `supportedFamilies(_:)`\
    \ to set the widget size.\n\nTherefore, in Listing [2-5](#505356_1_En_2_Chapter.xhtml#PC5),\
    \ the array `[.systemSmall, .systemMedium, .systemLarge]` has been passed as an\
    \ argument to `supportedFamilies(_:)` to set the supported sizes to small, medium,\
    \ and large.\n\n**Tip**\n\nWe know, you may face difficulties while trying to\
    \ understand the things we described earlier. But do not worry since we will use\
    \ them in the exercises of our upcoming chapters. For now, you’re doing great!\n\
    \nIn case you want your app to support only a single size of widget, that’s possible\
    \ too. Assume that you want your app to support only a medium-sized widget. For\
    \ that, you can create an array containing a `.systemMedium` case and pass it\
    \ to `supportedFamilies(_:)` by writing `.supportedFamilies([.systemMedium])`.\
    \ As simple as that!\n\n# Summary\n\nBy completing this chapter, you have learned\
    \ about the SwiftUI views that can be used as building blocks to create widgets\
    \ of your app. Likewise, you got an overview of Apple’s Human Interface Guidelines\
    \ for widgets that familiarized you with the purpose of widgets and gave you tips\
    \ to develop intuitive, easy-to-learn, and consistent user interface for widgets.\
    \ In addition to these, you learned more about `WidgetFamily` that enables you\
    \ to create widgets of various sizes.\n\nThe next chapter will teach you some\
    \ important concepts of widgets – timelines and links. But fear not – we are here\
    \ to guide you!\n\nFootnotes  \n[1](#505356_1_En_2_Chapter.xhtml#Fn1_source)  \
    \ [2](#505356_1_En_2_Chapter.xhtml#Fn2_source)   [3](#505356_1_En_2_Chapter.xhtml#Fn3_source)\
    \   [4](#505356_1_En_2_Chapter.xhtml#Fn4_source)\n\n# 3. Writing Your First Widget\n\
    \nNow comes the chapter in which you will finally get to make your hands dirty\
    \ by working on a project. In this chapter, you will create a widget extension\
    \ of an existing project and break that widget extension down to see what it is\
    \ made up of – timeline, timeline provider, widget view, placeholder, snapshot,\
    \ and widget configuration.\n\nWe have prepared a starter project so that you\
    \ can get straight into creating its widget. Find the zip file named `SoccerTimeStarter.zip`\
    \ and unzip it to get started with the project.\n\nIf you’ve successfully unzipped\
    \ and opened the `SoccerTime.xcodeproj` file of the `SoccerTimeStarter` folder,\
    \ you will know that `SoccerTime` is the project we will be working on. `SoccerTime`\
    \ is an app that displays the details of the upcoming soccer matches of your favorite\
    \ teams. It consists of two screens – one for adding upcoming matches (Figure\
    \ [3-1](#505356_1_En_3_Chapter.xhtml#Fig1)) and the other for displaying a list\
    \ of the matches you add (Figure [3-2](#505356_1_En_3_Chapter.xhtml#Fig2)). Launch\
    \ the app to understand the features more clearly.\n\n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig2_HTML.png](images/505356_1_En_3_Chapter/505356_1_En_3_Fig2_HTML.png)\
    \  \nFigure 3-2  \nThe screen from where users add their favorite upcoming matches\n\
    \n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig1_HTML.png](images/505356_1_En_3_Chapter/505356_1_En_3_Fig1_HTML.png)\
    \  \nFigure 3-1  \nThe screen that displays the list of upcoming matches in `SoccerTime`\n\
    \nNow here comes the interesting part – you will create `SoccerTime`’s widget\
    \ that will display information about the forthcoming matches you add in the app.\
    \ You will create a small-sized widget that will display the logos of the two\
    \ teams competing in the nearest upcoming match and a countdown before the match\
    \ begins. The widget will look like Figure [3-3](#505356_1_En_3_Chapter.xhtml#Fig3).\n\
    \n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig3_HTML.jpg](images/505356_1_En_3_Chapter/505356_1_En_3_Fig3_HTML.jpg)\
    \  \nFigure 3-3  \nThe small-sized widget of `SoccerTime`\n\nSo, the first step\
    \ is to add a widget extension to the project, and the upcoming section describes\
    \ everything about it."
  raw: '## Widget Family


    By now, you must have known that the WidgetKit framework allows you to create
    widgets of various sizes – small, medium, and large. For this purpose, you can
    use a special enum, `WidgetFamily` . It consists of three cases – `systemSmall`,
    `systemMedium`, and `systemLarge`. And by looking at the names of the cases, you
    can easily guess which case is responsible for which size.


    This variety in widget sizes gives users the freedom to place and configure their
    widgets the way they prefer. Since each widget size can accommodate different
    amounts of content and information within it, it is up to the developers like
    you to choose what volume of content and information you would like to display.


    Just to give you a bird’s eye view at how you can use the three cases of `WidgetFamily`
    to support various widget sizes, we have borrowed some code from the official
    documentation^([⁶](#fn6)) and pasted it in Listing [2-5](#505356_1_En_2_Chapter.xhtml#PC5).


    ```

    struct GameStatusWidget: Widget {

    var body: some WidgetConfiguration {

    StaticConfiguration(

    kind: "com.mygame.game-status",

    provider: GameStatusProvider(),

    placeholder: GameStatusPlaceholderView()

    ) { entry in

    GameStatusView(entry.gameStatus)

    }

    .configurationDisplayName("Game Status")

    .description("Shows an overview of your game status")

    .supportedFamilies([.systemSmall, .systemMedium, .systemLarge])

    }

    }

    Listing 2-5

    A widget that supports all three widget families

    ```


    You can see in Listing [2-5](#505356_1_En_2_Chapter.xhtml#PC5) that a widget named
    `GameStatusWidget` has been created. You can ignore other lines and just pay attention
    to the line that says `.supportedFamilies([.systemSmall, .systemMedium, .systemLarge])`.
    This is the line that defines which sizes of widgets your app should support.


    `supportedFamilies(_:)` is an instance method of the `WidgetConfiguration` protocol.
    It takes an array of `WidgetFamily` cases as an argument and is used to set the
    sizes that a widget supports. Since the `StaticConfiguration` struct, used in
    Listing [2-5](#505356_1_En_2_Chapter.xhtml#PC5), conforms to the `WidgetConfiguration`
    protocol, it can access `supportedFamilies(_:)` to set the widget size.


    Therefore, in Listing [2-5](#505356_1_En_2_Chapter.xhtml#PC5), the array `[.systemSmall,
    .systemMedium, .systemLarge]` has been passed as an argument to `supportedFamilies(_:)`
    to set the supported sizes to small, medium, and large.


    Tip


    We know, you may face difficulties while trying to understand the things we described
    earlier. But do not worry since we will use them in the exercises of our upcoming
    chapters. For now, you’re doing great!


    In case you want your app to support only a single size of widget, that’s possible
    too. Assume that you want your app to support only a medium-sized widget. For
    that, you can create an array containing a `.systemMedium` case and pass it to
    `supportedFamilies(_:)` by writing `.supportedFamilies([.systemMedium])`. As simple
    as that!


    ## Summary


    By completing this chapter, you have learned about the SwiftUI views that can
    be used as building blocks to create widgets of your app. Likewise, you got an
    overview of Apple’s Human Interface Guidelines for widgets that familiarized you
    with the purpose of widgets and gave you tips to develop intuitive, easy-to-learn,
    and consistent user interface for widgets. In addition to these, you learned more
    about `WidgetFamily` that enables you to create widgets of various sizes.


    The next chapter will teach you some important concepts of widgets – timelines
    and links. But fear not – we are here to guide you!


    Footnotes [1](#505356_1_En_2_Chapter.xhtml#Fn1_source)   [2](#505356_1_En_2_Chapter.xhtml#Fn2_source)
      [3](#505356_1_En_2_Chapter.xhtml#Fn3_source)   [4](#505356_1_En_2_Chapter.xhtml#Fn4_source)


    # 3. Writing Your First Widget


    Now comes the chapter in which you will finally get to make your hands dirty by
    working on a project. In this chapter, you will create a widget extension of an
    existing project and break that widget extension down to see what it is made up
    of – timeline, timeline provider, widget view, placeholder, snapshot, and widget
    configuration.


    We have prepared a starter project so that you can get straight into creating
    its widget. Find the zip file named **SoccerTimeStarter.zip** and unzip it to
    get started with the project.


    If you’ve successfully unzipped and opened the **SoccerTime.xcodeproj** file of
    the **SoccerTimeStarter** folder, you will know that **SoccerTime** is the project
    we will be working on. **SoccerTime** is an app that displays the details of the
    upcoming soccer matches of your favorite teams. It consists of two screens – one
    for adding upcoming matches (Figure [3-1](#505356_1_En_3_Chapter.xhtml#Fig1))
    and the other for displaying a list of the matches you add (Figure [3-2](#505356_1_En_3_Chapter.xhtml#Fig2)).
    Launch the app to understand the features more clearly.


    ![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig2_HTML.png](images/505356_1_En_3_Chapter/505356_1_En_3_Fig2_HTML.png)


    Figure 3-2


    The screen from where users add their favorite upcoming matches


    ![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig1_HTML.png](images/505356_1_En_3_Chapter/505356_1_En_3_Fig1_HTML.png)


    Figure 3-1


    The screen that displays the list of upcoming matches in SoccerTime


    Now here comes the interesting part – you will create **SoccerTime**’s widget
    that will display information about the forthcoming matches you add in the app.
    You will create a small-sized widget that will display the logos of the two teams
    competing in the nearest upcoming match and a countdown before the match begins.
    The widget will look like Figure [3-3](#505356_1_En_3_Chapter.xhtml#Fig3).


    ![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig3_HTML.jpg](images/505356_1_En_3_Chapter/505356_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    The small-sized widget of SoccerTime


    So, the first step is to add a widget extension to the project, and the upcoming
    section describes everything about it.'
  trans: "\n# 小组件家族\n\n至此，你一定已经知道 `WidgetKit` 框架允许你创建各种尺寸的小组件——小号、中号和大号。为此，你可以使用一个特殊的枚举\
    \ `WidgetFamily`。它包含三个成员——`systemSmall`、`systemMedium` 和 `systemLarge`。通过查看这些成员的名称，你可以轻松猜出哪个尺寸对应哪个成员。\n\
    \n这种多样的小组件尺寸赋予用户自由，让他们能够以自己喜欢的方式放置和配置小组件。由于每种尺寸的小组件内部可容纳不同的内容和信息量，因此像你这样的开发者可以自行决定要显示多少内容和信息。\n\
    \n为了让你大致了解如何利用 `WidgetFamily` 的三个成员来支持不同的小组件尺寸，我们从官方文档¹借用了部分代码并粘贴在代码清单 2-5 中。\n\
    \n```\nstruct GameStatusWidget: Widget {\n    var body: some WidgetConfiguration\
    \ {\n        StaticConfiguration(\n            kind: \"com.mygame.game-status\"\
    ,\n            provider: GameStatusProvider(),\n            placeholder: GameStatusPlaceholderView()\n\
    \        ) { entry in\n            GameStatusView(entry.gameStatus)\n        }\n\
    \        .configurationDisplayName(\"Game Status\")\n        .description(\"Shows\
    \ an overview of your game status\")\n        .supportedFamilies([.systemSmall,\
    \ .systemMedium, .systemLarge])\n    }\n}\n```\n代码清单 2-5  \n支持所有三种小组件家族的组件\n\n\
    你可以在代码清单 2-5 中看到，创建了一个名为 `GameStatusWidget` 的小组件。你可以忽略其他行，只需关注 `.supportedFamilies([.systemSmall,\
    \ .systemMedium, .systemLarge])` 这一行。这行代码定义了你应用应支持哪些尺寸的小组件。\n\n`supportedFamilies(_:)`\
    \ 是 `WidgetConfiguration` 协议的一个实例方法。它接受一个 `WidgetFamily` 成员数组作为参数，用于设置小组件支持的尺寸。由于代码清单\
    \ 2-5 中使用的 `StaticConfiguration` 结构体遵循 `WidgetConfiguration` 协议，因此它可以访问 `supportedFamilies(_:)`\
    \ 来设置小组件尺寸。\n\n因此，在代码清单 2-5 中，数组 `[.systemSmall, .systemMedium, .systemLarge]`\
    \ 作为参数传递给了 `supportedFamilies(_:)`，从而将支持的尺寸设置为小、中、大号。\n\n**提示**\n\n我们知道，你在尝试理解我们之前描述的内容时可能会遇到困难。但别担心，因为我们将在后续章节的练习中使用它们。目前，你已经做得很棒了！\n\
    \n如果你希望你的应用只支持一种单一尺寸的小组件，这也是可行的。假设你希望应用只支持中号小组件，那么你可以创建一个包含 `.systemMedium` 成员的数组，并通过编写\
    \ `.supportedFamilies([.systemMedium])` 将其传递给 `supportedFamilies(_:)`。就这么简单！\n\
    \n# 总结\n\n通过学习本章，你了解了哪些 SwiftUI 视图可以作为构建块来为你的应用创建小组件。同样，你了解了苹果针对小组件的《人机界面指南》，这让你熟悉了小组件的设计目的，并为你提供了开发直观、易学且一致性好的小组件用户界面的技巧。除此之外，你还进一步了解了\
    \ `WidgetFamily`，它使你能够创建各种尺寸的小组件。\n\n下一章将教你一些重要的小组件概念——时间线与链接。但别担心——我们会全程指导你！\n\
    \n脚注  \n1   2   3   4\n\n# 3. 编写你的第一个小组件\n\n现在终于来到本章，你将通过实际操作一个项目来大展身手。在本章中，你将为一个现有项目创建小组件扩展，并拆解该扩展以了解其构成——时间线、时间线提供器、小组件视图、占位视图、快照和小组件配置。\n\
    \n我们准备了一个入门项目，以便你可以直接开始创建其小组件。找到名为 `SoccerTimeStarter.zip` 的压缩文件并解压，即可开始处理该项目。\n\
    \n如果你已经成功解压并打开了 `SoccerTimeStarter` 文件夹中的 `SoccerTime.xcodeproj` 文件，你会知道 `SoccerTime`\
    \ 就是我们将要操作的项目。`SoccerTime` 是一个显示你喜爱球队即将进行的足球比赛详情的应用。它包含两个界面——一个用于添加即将到来的比赛（图 3-1），另一个用于显示你添加的比赛列表（图\
    \ 3-2）。启动应用以更清晰地了解其功能。\n\n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig2_HTML.png](img/505356_1_En_3_Fig2_HTML.png)\
    \  \n图 3-2  \n用户添加他们喜爱的即将到来比赛的界面\n\n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig1_HTML.png](img/505356_1_En_3_Fig1_HTML.png)\
    \  \n图 3-1  \n显示 `SoccerTime` 中即将到来比赛列表的界面\n\n现在有趣的部分来了——你将创建 `SoccerTime` 的小组件，它将显示你在应用中添加的即将到来比赛的信息。你将创建一个**小尺寸**的小组件，显示距离最近比赛的两队队徽以及比赛开始前的倒计时。该小组件将如图\
    \ 3-3 所示。\n\n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig3_HTML.jpg](img/505356_1_En_3_Fig3_HTML.jpg)\
    \  \n图 3-3  \n`SoccerTime` 的小尺寸小组件\n\n因此，第一步是向项目添加一个小组件扩展，下一节将详细描述所有步骤。\n"
- fmt: "# Widget Extension\n\nThe widget extension is a template that provides a basic\
    \ structure and boilerplate code to help you get started with creating your app’s\
    \ widget. It holds the widgets that you create. Apple recommends developers to\
    \ include all the widgets of an app in a single widget extension. However, it’s\
    \ also possible to create multiple widget extensions, if necessary.\n\nTo create\
    \ a widget extension of `SoccerTime`, follow the steps given as follows:\n\n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig4_HTML.jpg](images/505356_1_En_3_Chapter/505356_1_En_3_Fig4_HTML.jpg)\n\
    \nFigure 3-4\n\nA screenshot displaying `SoccerTimeWidgetExtension` as the selected\
    \ scheme\n\n1.  Open `SoccerTime.xcodeproj`.\n2.  Go to **File** ➤ **New** ➤ **Target**\
    \ ➤ **iOS**.\n3.  You can either scroll down or use filter to find **Widget Extension**.\
    \ Then double-click it.\n4.  Now a dialog box will appear where you will do the\
    \ following:\n    1.  Set **Product Name** to `SoccerTimeWidget`.\n    2.  Set\
    \ **Team** to either **None** or choose your team.\n    3.  Uncheck **Include\
    \ Configuration Intent**.\n    4.  Make sure that `SoccerTime` is the selected\
    \ **Project**.\n    5.  Verify that `SoccerTime` is the selected application in\
    \ the **Embed in Application** field.\n    6.  Click **Finish**.\n5.  Once you\
    \ click finish, the widget extension gets generated, and Xcode will ask one final\
    \ question, “Activate ‘SoccerTimeWidgetExtension’ scheme?”. Click **Agree** so\
    \ that that scheme is activated. The change you will see in your Xcode screen\
    \ after that is shown in Figure [3-4](#505356_1_En_3_Chapter.xhtml#Fig4).\n\n\
    After you’ve followed the steps mentioned earlier, the first thing you will notice\
    \ is the addition of the `SoccerTimeWidget` folder in the project. This is where\
    \ everything related to your widgets is kept.\n\nFrom the `SoccerTimeWidget` folder,\
    \ open `SoccerTimeWidget.swift` to see the boilerplate code of the building blocks\
    \ of your widget. You will be making changes in this file to customize your widget.\
    \ Now, we will give you an overview of all the blocks in `SoccerTimeWidget.swift`.\
    \ Also, we will guide you to make changes in that file so that you can create\
    \ widgets that will allow users to see the details of the upcoming matches in\
    \ their homescreen.\n\n**Note:** Notice in the Target Membership section of File\
    \ Inspector that `SoccerTimeWidget.swift` has its target set to `SoccerTimeWidgetExtension`\
    \ instead of the `SoccerTime`.\n\n## TimelineEntry\n\n`TimelineEntry` is a protocol\
    \ that specifies when a widget should be displayed. It consists of a `date` property\
    \ for indicating that. Also, it can help the system determine the relevance of\
    \ the widget’s content. These capabilities of `TimelineEntry` are capitalized\
    \ by `TimelineProvider` by managing one or more timeline entries to tell `WidgetKit`\
    \ when to display a widget. Then, `WidgetKit` renders the widget by executing\
    \ the `content` block of the widget configuration, passing the corresponding timeline\
    \ entry.\n\n**Note:** We know that you aren’t familiar with `TimelineProvider`\
    \ and `WidgetConfiguration` yet, but you will get to know them in the upcoming\
    \ sections. For now, you can just keep in mind that `TimelineProvider` manages\
    \ timeline entries and `WidgetConfiguration` is the place from where you configure\
    \ the widget.\n\nTo use the features of `TimelineEntry`, you create a struct that\
    \ conforms to it. Since it is a type of model that `WidgetConfiguration` will\
    \ require to render the widget, you have to make sure you add all the properties\
    \ that `WidgetConfiguration` will need.\n\nIn the current project, if you go to\
    \ `SoccerTime` ➤ `Model` ➤ `Match.swift`, you will see a model that the app is\
    \ using to store details about a match. Since your widget will display the same\
    \ details that `Match` helps to store, you can use this model.\n\nIf you look\
    \ at the structure of `Match`, you will notice that it conforms to `Codable` and\
    \ `Identifiable` protocols. Now, to make it usable even as a timeline entry, make\
    \ it conform to the `TimelineEntry` protocol. For that, `WidgetKit` needs to be\
    \ imported first. So, in `Match.swift`, add the line `import WidgetKit` in Listing\
    \ [3-1](#505356_1_En_3_Chapter.xhtml#PC1) to the first line of the code.\n\nThen,\
    \ make `Match` conform to `TimelineEntry` by modifying it and making it look like\
    \ Listing [3-1](#505356_1_En_3_Chapter.xhtml#PC1).\n\n```swift\nstruct Match:\
    \ Codable, Identifiable, TimelineEntry {\n    var id = UUID()\n    var primaryClub:\
    \ String\n    var secondaryClub: String\n    var date: Date\n}\n```\n\n*Listing\
    \ 3-1: Making a model conform to `TimelineEntry`*\n\nIf you build the project\
    \ right now, you will encounter an error saying, “Match does not conform to protocol\
    \ ‘TimelineEntry’.” It is because a struct conforming to `TimelineEntry` compulsorily\
    \ needs to have a `date` property of `Date` type. If you look thoroughly at `Match`,\
    \ you will see that there already is a property of `Date` type, that is, `time`.\
    \ So, you can rename it to `date` since the `time` property was there for the\
    \ same purpose – to store date.\n\nNow build the project and you will see that\
    \ the renaming affected the whole project. You will see errors in `ListMatchView`,\
    \ `MatchCell`, and `AddMatchView`. Rename `time` to `date` in all those places\
    \ and build the project to find all errors gone."
