  raw: 'In the current step, the code checks if users have already selected a trend
    from their configuration screen. Thus, if users have selected a trend, meaning
    that there exists a value in `selectedTrend`, it is stored in `trend`, and a new
    instance of `Trend` is created by using the trend’s `displayString` and `identifier`.


    Then, the `getTweets(on:completion:)` method of `TwitterTrendsAPI` is called to
    fetch the tweets related to that trend. When a `response` is received, the completion
    handler of the `getTimeline(for:in:completion:)` method is called by passing the
    call to `createTimelineFromTweets(response:)` as its argument.


    The `createTimelineFromTweets(response:)` takes the `response` received from the
    API call as an argument, generates a timeline, and returns it. At last, the completion
    handler of `getTimeline(for:in:completion:)` uses that timeline, and a timeline
    is created for the widget.


    2.  But in case users have not selected any trend (or there is no value in the
    `selectedTrend` property of `configuration`), the `getLatestTweets(completion:)`
    method of `TwitterTrendsAPI` is called. This method first fetches all the trends
    from Twitter’s API, selects the first trend from the API’s response, fetches the
    tweets related to that trend, and returns it as `response`. On receiving the response,
    the completion handler of the `getTimeline(for:in:completion:)` method is called
    by passing the call to `createTimelineFromTweets(response:)` as its argument.


    Then, the `createTimelineFromTweets(response:)` uses the `response` received from
    the API call as an argument, generates a timeline, and returns it. At last, the
    completion handler of `getTimeline(for:in:completion:)` uses that timeline, and
    a timeline is created for the widget.


    In this way, you created an `IntentTimelineProvider`, which is necessary for switching
    to `IntentConfiguration`.


    ### Make the Switch to IntentConfiguration


    Now you are all set to make the switch to `IntentConfiguration`. If you open the
    **TwitterTrendsWidget.swift** file of the **Widget** folder in the **TwitterTrendsWidget**
    folder, you will see that `StaticConfiguration` has been used right now in the
    `body` of `TwitterTrendsWidget`.


    In `TwitterTrendsWidget`, create a variable, `dynamicConfiguration`, by using
    the code given in Listing [5-7](#505356_1_En_5_Chapter.xhtml#PC9) .


    ```

    var dynamicConfiguration: some WidgetConfiguration {

    IntentConfiguration(kind: kind, intent: TrendsIntent.self, provider: TwitterTrendsIntentProvider())
    { entry in

    LargeWidgetView(tweets: entry.statuses, title: entry.trendTitle)

    }

    .supportedFamilies([.systemLarge])

    .configurationDisplayName("Tweets")

    .description("Tweets Trending Today")

    }

    Listing 5-7

    Creation of a dynamicConfiguration variable

    ```


    In Listing [5-7](#505356_1_En_5_Chapter.xhtml#PC9), a variable named `dynamicConfiguration`
    is created which returns an `IntentConfiguration` initializer. It uses the value
    of `TwitterTrendsWidget`’s `kind` variable, `TrendsIntent` as its intent, and
    the initializer of `TwitterTrendsIntentProvider` as its timeline provider. All
    the other lines of code are similar to that of the `StaticConfiguration` that
    exists in the `body` of `TwitterTrendsWidget`.


    Now, replace the body of `TwitterTrendsWidget` with the code given in Listing
    [5-8](#505356_1_En_5_Chapter.xhtml#PC10).


    ```

    var body: some WidgetConfiguration {

    dynamicConfiguration

    }

    Listing 5-8

    Using dynamicConfiguration in the body of TwitterTrendsWidget

    ```


    The code given in Listing [5-8](#505356_1_En_5_Chapter.xhtml#PC10) replaces the
    `StaticConfiguration` with the `dynamicConfiguration` variable that contains `IntentConfiguration`.


    Well done! You have switched to `IntentConfiguration`.


    ## Test – Test – Test!


    Uninstall all the existing installations of **TwitterTrends** in your device or
    simulator. Now, select the **TwitterTrends** scheme and run it. To test your widget,
    add the TwitterTrends widget to your homescreen and try editing it. You should
    see a configuration screen similar to the one shown in Figure [5-4](#505356_1_En_5_Chapter.xhtml#Fig4).
    Tap on **Choose** to see a screen where you can see a list of trends fetched from
    Twitter. This screen will look similar to Figure [5-5](#505356_1_En_5_Chapter.xhtml#Fig5).
    From that screen, select any trend and go back to your homescreen. Now, in your
    widget, you should see the tweets related to that particular trend you had selected.


    Awesome job! We hope you had fun.


    ## Summary


    Congratulations on making it this far! In this chapter, you learned how you can
    make your widget fetch data from a server so that you can use those data as configuration
    options for the parameter in your configurable widget. Some part of this chapter
    must have been like a revision of the previous chapters to you. And we hope you
    enjoyed following along and learning. If you have any confusions, please check
    out the final version of the code by opening the final project folder named **TwitterTrendsFinal**
    in **TwitterTrends.zip**.


    Now you are able to create any kind of widgets – be it a widget that can or cannot
    be configured or a widget whose parameter has hard-coded configuration options
    or dynamic configuration options fetched from a server. You have mastered them
    all.


    We wish you luck for the future. Happy coding!


