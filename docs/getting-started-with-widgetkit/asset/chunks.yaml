  trans: '

    # TimelineProvider


    `TimelineProvider` 可视为小组件的驱动力。它是一个协议，能让 WidgetKit 知道何时更新小组件的显示内容。该协议会获取 `TimelineEntry`
    类型的条目，并在每个条目 `date` 属性中存储的时间点显示对应的条目。


    现在，你需要创建一个遵循 `TimelineProvider` 的结构体。但在此之前，先在 `SoccerTimeWidget` 文件夹中创建一个名为 `SmallWidget`
    的文件夹，用于存放与小组件小尺寸变体相关的所有文件。


    随后，在 `SmallWidget` 文件夹中创建一个 Swift 文件，并将其命名为 `SmallWidgetDataProvider`。在点击“创建”之前，请确保在“Targets”部分勾选
    `SoccerTimeWidgetExtension`，这样 `SmallWidgetDataProvider` 也能在小组件扩展中使用。


    现在，打开 `SmallWidgetDataProvider.swift`，并将文件中的现有代码替换为代码清单 3-2 中的内容。


    ```

    import SwiftUI

    import WidgetKit

    struct SmallWidgetDataProvider: TimelineProvider {

    }

    代码清单 3-2

    创建 SmallWidgetDataProvider

    ```


    代码清单 3-2 导入了 `SwiftUI` 和 `WidgetKit`，并创建了一个名为 `SmallWidgetDataProvider` 且遵循 `TimelineProvider`
    协议的结构体。


    现在，你会看到一个错误提示：“Type `SmallWidgetDataProvider` does not conform to protocol `TimelineProvider`”。这是因为你尚未实现该协议的方法。目前你可以先忽略这个错误。


    接下来，在 `SmallWidgetDataProvider` 中添加一行代码 `typealias Entry = Match`。这行代码实现了 `TimelineProvider`
    协议中的 `Entry` 类型别名属性。如前所述，通过这种方式，你为 `SmallWidgetDataProvider`（一个时间线提供者）提供了一条时间线条目（`Match`）。构建项目。


    现在，你一定会看到一个全新的错误：“Cannot find type `Match` in scope.”。出现这个错误的原因是 `Match.swift`
    不属于 `SoccerTimeWidgetExtension` 目标的一部分，因此它无法在小组件扩展中使用。如果打开 `Match.swift`，你会在文件检查器的“Target
    Membership”部分看到，只有 `SoccerTime` 被勾选了，而 `SoccerTimeWidgetExtension` 没有被勾选。目前，“Target
    Membership”部分的状态如图 3-5 所示。


    ![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig5_HTML.jpg](img/505356_1_En_3_Fig5_HTML.jpg)


    图 3-5


    显示 `Match.swift` 目标成员归属的截图


    由于你在 `SoccerTimeWidgetExtension` 中也需要使用 `Match`，请勾选它。


    现在该解决剩下的唯一错误了：“Type `SmallWidgetDataProvider` does not conform to protocol `TimelineProvider`”。点击错误提示，然后点击**修复**。接着，Xcode
    会生成 `TimelineProvider` 方法的模板代码，代码看起来会与代码清单 3-3 类似。


    ```

    import WidgetKit

    import SwiftUI

    struct SmallWidgetDataProvider: TimelineProvider {

    typealias Entry = Match

    func placeholder(in context: Context) -> Match {


    }

    func getSnapshot(in context: Context, completion: @escaping (Match) -> Void) {


    }

    func getTimeline(in context: Context, completion: @escaping (Timeline) -> Void)
    {


    }

    }

    代码清单 3-3

    SmallWidgetDataProvider 的模板代码

    ```


    代码清单 3-3 展示了 `SmallWidgetDataProvider` 的代码。其中包含了 `TimelineProvider`（`SmallWidgetDataProvider`
    所遵循的协议）三个方法的模板代码，而编写这些方法的具体实现则是开发者的任务。下面给出这些方法的基本概述，并为你提供一些动手实践。


    ### placeholder(in:)


    占位符会在小组件首次加载（添加到主屏幕后）时显示小组件视图的通用表示形式。在小组件正在检索新数据的过程中，也可能显示该占位符。


    在 WidgetKit 中，`TimelineProvider` 的 `placeholder(in:)` 方法负责返回一个占位符时间线条目。


    让我们来尝试一下。在 `SmallWidgetDataProvider` 中的 `typealias Entry = Match` 这一行之后，创建一个 `Match`
    类型的变量 `placeholderEntry`，用于返回一个占位符时间线条目。如代码清单 3-4 所示。


    ```

    var placeholderEntry: Match {

    return Match(primaryClub: "none",

    secondaryClub: "none",

    date: Date())

    }

    代码清单 3-4

    声明 placeholderEntry 变量

    ```


    如前所述，代码清单 3-4 声明了一个 `Match` 类型的变量 `placeholderEntry`，并返回一个 `Match` 对象（遵循 `TimelineEntry`
    协议），其中 `primaryClub` 和 `secondaryClub` 的值均设为 `"none"`，日期为当前日期。


    **注意：** 并非强制要求创建 `placeholderEntry` 变量，但由于你会在多个地方使用同一个对象，因此创建并将该对象存储在变量中是个好主意。


    现在，你可以更新 `placeholder(in:)` 方法，使其如代码清单 3-5 所示。


    ```

    func placeholder(in context: Context) -> Match {

    return placeholderEntry

    }

    代码清单 3-5

    placeholder(in:) 方法

    ```


    在代码清单 3-5 中，`placeholder(in:)` 方法已被修改，使其返回你在代码清单 3-4 中声明的 `placeholderEntry` 变量。

    '
- fmt: "### `getSnapshot(in:completion:)`\n\niOS 14 comes with a widget gallery that\
    \ displays the previews of the widgets of all the apps in a device. From there,\
    \ users can choose the widget they want to show in their homescreen. For a widget,\
    \ the widget gallery is the platform to display its realistic preview and flaunt\
    \ its beauty and capabilities so that users can come to an informed decision about\
    \ whether to add it to their homescreen or not.\n\nThe `getSnapshot(in:completion:)`\
    \ method of `TimelineProvider` is what provides widgets the facility of flaunting\
    \ their preview in the widget gallery, when `context.isPreview` is set to `true`.\
    \ This method is called whenever the widget is in a transient state like appearing\
    \ in the widget gallery or waiting for data. So, it’s necessary to make sure that\
    \ this method doesn’t contain heavy calculations.\n\nIn addition to this, `getSnapshot(in:completion:)`\
    \ provides a timeline entry representing the current time and state of a widget.\
    \ So, using this method, you will fetch the latest upcoming match to be displayed\
    \ in your widget. For that, you will have to fetch the current state of the widget\
    \ using a new method and perform calculation to get the latest upcoming match.\
    \ So, in `SmallWidgetDataProvider`, define the `getLatestUpcomingMatch()` method\
    \ right below the placeholder variable and write the code in Listing 3-6.\n\n\
    ```\nfunc getLatestUpcomingMatch() -> Match {\nif let matches: [Match] = AppUtils.fetchDataWith(fileName:\
    \ \"Matches.json\") {\nlet upcomingMatches = matches.filter({ $0.date > Date()\
    \ })\nlet sortedMatches = upcomingMatches.sorted(by: { $0.date < $1.date })\n\
    if let firstUpcomingMatch = sortedMatches.first {\nreturn firstUpcomingMatch\n\
    }\n}\nreturn placeholderEntry\n}\n```\n\n**Listing 3-6** Definition of the `getLatestUpcomingMatch()`\
    \ method\n\nListing 3-6 defines the `getLatestUpcomingMatch()` method, and the\
    \ following operations take place in it:\n\n1. When you save matches in the app,\
    \ all of those data are stored in JSON format in a file called `Matches.json`.\
    \ So, in this step, you are checking if that file exists or not using the `fetchDataWith(filename:)`\
    \ method of `AppUtils`. One thing to note is that the JSON file could be stored\
    \ in the document directory of the app. But since more than one target (`SoccerTime`\
    \ and `SoccerTimeWidget`) needs to access that file, it had to be stored in a\
    \ container. Hence, to access the file in the container, the `getSharedDocumentsDirectory()`\
    \ method was created in `AppUtils`, and it has been called by `fetchDataWith(filename:)`.\
    \ So, if the JSON file exists, then you move forward; else `placeholderEntry`\
    \ is returned.\n\n   **Note:** As you will be using `AppUtils` in your widget\
    \ extension, make sure to update its **Target Membership** to `SoccerTimeWidgetExtension`\
    \ as well.\n\n2. In step 2, you’re filtering the matches with future dates.\n\n\
    3. Now matches are sorted in ascending order on the basis of time. Hence, the\
    \ match with the date nearest to the current date lies at the first index, and\
    \ the match with the farthest date stays at last.\n\n4. Finally, the first match\
    \ from the sorted array of matches is fetched and returned.\n\nNow, update the\
    \ `getSnapshot(in:completion:)` method as shown in Listing 3-7 to give it the\
    \ finishing touch.\n\n```\nfunc getSnapshot(in context: Context, completion: @escaping\
    \ (Match) -> Void) {\ncompletion(getLatestUpcomingMatch())\n}\n```\n\n**Listing\
    \ 3-7** Modification of the `getSnapshot(in:completion:)` method\n\nListing 3-7\
    \ modifies the `getSnapshot(in:completion:)` method to make it return the nearest\
    \ upcoming match and, hence, display it in the widget preview shown in the widget\
    \ gallery. If no upcoming matches have been added in the app, the widget preview\
    \ displays, “No upcoming matches.”\n\n### `getTimeline(in:completion:)`\n\n`getTimeline(in:completion:)`\
    \ is the brain of `TimelineProvider`. It provides an array of timeline entries\
    \ for the current time and, optionally, any future times to update a widget. Moreover,\
    \ it sets the timeline reload policy of the widget to user preferred time. The\
    \ reload policy determines when to update the timeline to refresh the content\
    \ being displayed in your widget. There are three reload policies that are available:\n\
    \n1. `never`: This policy updates the widget when a new timeline is available.\n\
    2. `atEnd`: It requests a new timeline after the date specified in the last timeline\
    \ passes.\n3. `after`: This policy requests a new timeline at a specified date.\n\
    \nThe `never` refresh policy can be used in cases when you cannot predict the\
    \ date for refreshing the widget content. In that situation, WidgetKit doesn’t\
    \ request a new timeline, and when a new timeline becomes available at some point,\
    \ it calls `reloadTimelines(of Kind:)` of the `WidgetCenter` class. For example,\
    \ it makes sense to use `never` when a widget’s content is dependent on the user\
    \ being logged in to an account, but they aren’t logged in.\n\nBut the case is\
    \ different with `atEnd` and `after`. They are used when future events are predictable\
    \ and you know when to update the widget’s content. To explain this, the official\
    \ documentation gives an example of a widget displaying stock market details.⁷\
    \ It says that it is a nice idea to use `atEnd` or `after` in such a scenario\
    \ because you can specify the next date when the stock market opens or closes\
    \ since the information generally does not change overnight or during weekends.\n\
    \nEnough of the explanation. Now, modify the `getTimeline(in:completion:)` method\
    \ as shown in Listing 3-8.\n\n```\nfunc getTimeline(in context: Context, completion:\
    \ @escaping (Timeline) -> Void) {\n// 1\nlet entry = getLatestUpcomingMatch()\n\
    // 2\nlet refresh = Calendar.current.date(byAdding: .second, value: 1, to: entry.date)\n\
    // 3\nlet timeline = Timeline(entries: [entry],\npolicy: .after(refresh!))\n//\
    \ 4\ncompletion(timeline)\n}\n```\n\n**Listing 3-8** Modification of the `getTimeline(in:completion:)`\
    \ method\n\nIn the code of Listing 3-8, the following tasks are being done:\n\n\
    1. The nearest upcoming match is fetched using `getLatestUpcomingMatch()`, and\
    \ the fetched value is stored in `entry`.\n2. Then, the next refresh time is set\
    \ to be a second later than `entry`’s date.\n3. In the third step, a timeline\
    \ is created with `entry` and an `after` refresh policy. The refresh policy is\
    \ set to be after the time we set up in step 2.\n4. Finally, the timeline is handed\
    \ over to the widget.\n\nIn this way, the configuration of `SmallWidgetDataProvider`,\
    \ a class conforming to `TimelineProvider`, is complete. Now, it’s time to develop\
    \ the user interface of the widget using SwiftUI."
  raw: "### getSnapshot(in:completion:)\n\niOS 14 comes with a widget gallery that\
    \ displays the previews of the widgets of all the apps in a device. From there,\
    \ users can choose the widget they want to show in their homescreen. For a widget,\
    \ the widget gallery is the platform to display its realistic preview and flaunt\
    \ its beauty and capabilities so that users can come to an informed decision about\
    \ whether to add it to their homescreen or not.\n\nThe `getSnapshot(in:completion:)`\
    \ method of `TimelineProvider` is what provides widgets the facility of flaunting\
    \ their preview in the widget gallery, when `context.isPreview` is set to `true`.\
    \ This method is called whenever the widget is in a transient state like appearing\
    \ in the widget gallery or waiting for data. So, it’s necessary to make sure that\
    \ this method doesn’t contain heavy calculations.\n\nIn addition to this, `getSnapshot(in:completion:)`\
    \ provides a timeline entry representing the current time and state of a widget.\
    \ So, using this method, you will fetch the latest upcoming match to be displayed\
    \ in your widget. For that, you will have to fetch the current state of the widget\
    \ using a new method and perform calculation to get the latest upcoming match.\
    \ So, in `SmallWidgetDataProvider`, define the `getLatestUpcomingMatch()` method\
    \ right below the placeholder variable and write the code in Listing [3-6](#505356_1_En_3_Chapter.xhtml#PC6).\n\
    \n```\nfunc getLatestUpcomingMatch() -> Match {\nif let matches: [Match] = AppUtils.fetchDataWith(fileName:\
    \ \"Matches.json\") {\nlet upcomingMatches = matches.filter({ $0.date > Date()\
    \ })\nlet sortedMatches = upcomingMatches.sorted(by: { $0.date < $1.date })\n\
    if let firstUpcomingMatch = sortedMatches.first {\nreturn firstUpcomingMatch\n\
    }\n}\nreturn placeholderEntry\n}\nListing 3-6\nDefinition of the getLatestUpcomingMatch()\
    \ method\n```\n\nListing [3-6](#505356_1_En_3_Chapter.xhtml#PC6) defines the `getLatestUpcomingMatch()`\
    \ method, and the following operations take place in it:\n\n1.  When you save\
    \ matches in the app, all of those data are stored in JSON format in a file called\
    \ **Matches.json**. So, in this step, you are checking if that file exists or\
    \ not using the `fetchDataWith(filename:)` method of `AppUtils`. One thing to\
    \ note is that the JSON file could be stored in the document directory of the\
    \ app. But since more than one target (**SoccerTime** and **SoccerTimeWidget**)\
    \ needs to access that file, it had to be stored in a container. Hence, to access\
    \ the file in the container, the `getSharedDocumentsDirectory()` method was created\
    \ in `AppUtils`, and it has been called by `fetchDataWith(filename:)`. So, if\
    \ the JSON file exists, then you move forward; else `placeholderEntry` is returned.\n\
    \n    **Note** As you will be using `AppUtils` in your widget extension, make\
    \ sure to update its **Target Membership** to **SoccerTimeWidgetExtension** as\
    \ well.\n\n2.  In step 2, you’re filtering the matches with future dates.\n\n\
    3.  Now matches are sorted in ascending order on the basis of time. Hence, the\
    \ match with the date nearest to the current date lies at the first index, and\
    \ the match with the farthest date stays at last.\n\n4.  Finally, the first match\
    \ from the sorted array of matches is fetched and returned.\n\nNow, update the\
    \ `getSnapshot(in:completion:)` method as shown in Listing [3-7](#505356_1_En_3_Chapter.xhtml#PC7)\
    \ to give it the finishing touch.\n\n```\nfunc getSnapshot(in context: Context,\
    \ completion: @escaping (Match) -> Void) {\ncompletion(getLatestUpcomingMatch())\n\
    }\nListing 3-7\nModification of the getSnapshot(in:completion:) method\n```\n\n\
    Listing [3-7](#505356_1_En_3_Chapter.xhtml#PC7) modifies the `getSnapshot(in:completion:)`\
    \ method to make it return the nearest upcoming match and, hence, display it in\
    \ the widget preview shown in the widget gallery. If no upcoming matches have\
    \ been added in the app, the widget preview displays, “No upcoming matches.”\n\
    \n### getTimeline(in:completion:)\n\ngetTimeline(in:completion:) is the brain\
    \ of TimelineProvider. It provides an array of timeline entries for the current\
    \ time and, optionally, any future times to update a widget. Moreover, it sets\
    \ the timeline reload policy of the widget to user preferred time. The reload\
    \ policy determines when to update the timeline to refresh the content being displayed\
    \ in your widget. There are three reload policies that are available:\n\n1.  `never`:\
    \ This policy updates the widget when a new timeline is available.\n\n2.  `atEnd`:\
    \ It requests a new timeline after the date specified in the last timeline passes.\n\
    \n3.  `after`: This policy requests a new timeline at a specified date.\n\nThe\
    \ `never` refresh policy can be used in cases when you cannot predict the date\
    \ for refreshing the widget content. In that situation, WidgetKit doesn’t request\
    \ a new timeline, and when a new timeline becomes available at some point, it\
    \ calls `reloadTimelines(of Kind:)` of the `WidgetCenter` class. For example,\
    \ it makes sense to use `never` when a widget’s content is dependent on the user\
    \ being logged in to an account, but they aren’t logged in.\n\nBut the case is\
    \ different with `atEnd` and `after`. They are used when future events are predictable\
    \ and you know when to update the widget’s content. To explain this, the official\
    \ documentation gives an example of a widget displaying stock market details.^([⁷](#fn7))\
    \ It says that it is a nice idea to use `atEnd` or `after` in such a scenario\
    \ because you can specify the next date when the stock market opens or closes\
    \ since the information generally does not change overnight or during weekends.\n\
    \nEnough of the explanation. Now, modify the `getTimeline(in:completion:)` method\
    \ as shown in Listing [3-8](#505356_1_En_3_Chapter.xhtml#PC8).\n\n```\nfunc getTimeline(in\
    \ context: Context, completion: @escaping (Timeline) -> Void) {\n// 1\nlet entry\
    \ = getLatestUpcomingMatch()\n// 2\nlet refresh = Calendar.current.date(byAdding:\
    \ .second, value: 1, to: entry.date)\n// 3\nlet timeline = Timeline(entries: [entry],\n\
    policy: .after(refresh!))\n// 4\ncompletion(timeline)\n}\nListing 3-8\nModification\
    \ of the getTimeline(in:completion:) method\n```\n\nIn the code of Listing [3-8](#505356_1_En_3_Chapter.xhtml#PC8),\
    \ the following tasks are being done:\n\n1.  The nearest upcoming match is fetched\
    \ using `getLatestUpcomingMatch()`, and the fetched value is stored in entry.\n\
    \n2.  Then, the next refresh time is set to be a second later than `entry`’s date.\n\
    \n3.  In the third step, a timeline is created with `entry` and an `after` refresh\
    \ policy. The refresh policy is set to be after the time we set up in step 2.\n\
    \n4.  Finally, the timeline is handed over to the widget.\n\nIn this way, the\
    \ configuration of `SmallWidgetDataProvider` , a class conforming to `TimelineProvider`,\
    \ is complete. Now, it’s time to develop the user interface of the widget using\
    \ SwiftUI."
  trans: "\n### `getSnapshot(in:completion:)`\n\niOS 14 配备了一个小组件图库，用于展示设备中所有应用的小组件预览。用户可以在图库中选择要在主屏幕上显示的小组件。对于小组件而言，小组件图库是一个展示其真实预览、突显其美观与功能的平台，从而帮助用户做出明智的决定——是否将其添加到主屏幕上。\n\
    \n`TimelineProvider` 的 `getSnapshot(in:completion:)` 方法，在 `context.isPreview`\
    \ 设置为 `true` 时，为小组件提供在图库中展示其预览的功能。每当小组件处于过渡状态（例如出现在小组件图库中或等待数据）时，系统都会调用此方法。因此，务必确保此方法不包含繁重的计算。\n\
    \n除此之外，`getSnapshot(in:completion:)` 提供了一条表示小组件当前时间和状态的时间线条目。因此，使用此方法，你将获取要在小组件中显示的最新即将到来的比赛。为此，你需要使用一个新方法来获取小组件的当前状态，并执行计算以获取最新的即将到来的比赛。因此，在\
    \ `SmallWidgetDataProvider` 中，在占位变量下方定义 `getLatestUpcomingMatch()` 方法，并编写清单 3-6\
    \ 中的代码。\n\n```\nfunc getLatestUpcomingMatch() -> Match {\nif let matches: [Match]\
    \ = AppUtils.fetchDataWith(fileName: \"Matches.json\") {\nlet upcomingMatches\
    \ = matches.filter({ $0.date > Date() })\nlet sortedMatches = upcomingMatches.sorted(by:\
    \ { $0.date < $1.date })\nif let firstUpcomingMatch = sortedMatches.first {\n\
    return firstUpcomingMatch\n}\n}\nreturn placeholderEntry\n}\n```\n\n**清单 3-6**\
    \ `getLatestUpcomingMatch()` 方法的定义\n\n清单 3-6 定义了 `getLatestUpcomingMatch()` 方法，其中执行了以下操作：\n\
    \n1. 当你在应用中保存比赛时，所有数据都以 JSON 格式存储在名为 `Matches.json` 的文件中。因此，在这一步中，你使用 `AppUtils`\
    \ 的 `fetchDataWith(filename:)` 方法来检查该文件是否存在。需要注意的是，JSON 文件可以存储在应用的文档目录中。但由于多个目标（`SoccerTime`\
    \ 和 `SoccerTimeWidget`）需要访问该文件，它必须存储在一个容器中。因此，为了访问容器中的文件，在 `AppUtils` 中创建了 `getSharedDocumentsDirectory()`\
    \ 方法，并由 `fetchDataWith(filename:)` 调用。所以，如果 JSON 文件存在，则继续执行；否则返回 `placeholderEntry`。\n\
    \n   **注意：**由于你将在小组件扩展中使用 `AppUtils`，请确保同时将其 **Target Membership** 更新为 `SoccerTimeWidgetExtension`。\n\
    \n2. 在第二步中，你正在筛选出未来日期的比赛。\n3. 现在，比赛按时间升序排序。因此，日期最接近当前日期的比赛位于第一个索引，日期最远的比赛位于最后一个。\n\
    4. 最后，从排序后的比赛数组中获取第一场比赛并返回。\n\n现在，更新 `getSnapshot(in:completion:)` 方法，如清单 3-7\
    \ 所示，以完成最终调整。\n\n```\nfunc getSnapshot(in context: Context, completion: @escaping\
    \ (Match) -> Void) {\ncompletion(getLatestUpcomingMatch())\n}\n```\n\n**清单 3-7**\
    \ `getSnapshot(in:completion:)` 方法的修改\n\n清单 3-7 修改了 `getSnapshot(in:completion:)`\
    \ 方法，使其返回最近的即将到来的比赛，从而在小组件图库的预览中显示它。如果应用中没有添加即将到来的比赛，小组件预览将显示“没有即将到来的比赛”。\n\n\
    ### `getTimeline(in:completion:)`\n\n`getTimeline(in:completion:)` 是 `TimelineProvider`\
    \ 的大脑。它提供一组时间线条目，用于当前时间以及（可选）任何未来时间，以更新小组件。此外，它将小组件的时间线重载策略设置为用户偏好的时间。重载策略决定了何时更新时间线以刷新小组件中显示的内容。有三种可用的重载策略：\n\
    \n1. `never`：此策略在可用新时间线时更新小组件。\n2. `atEnd`：在最后一个时间线指定的日期过后请求一个新的时间线。\n3. `after`：此策略在指定日期请求一个新的时间线。\n\
    \n当无法预测刷新小组件内容的日期时，可以使用 `never` 刷新策略。在这种情况下，WidgetKit 不会请求新的时间线，当新时间线在某个时间点可用时，它会调用\
    \ `WidgetCenter` 类的 `reloadTimelines(of Kind:)` 方法。例如，当小组件的内容依赖于用户是否登录到账户，而用户未登录时，使用\
    \ `never` 是合理的。\n\n但 `atEnd` 和 `after` 的情况则不同。当未来事件可预测且你知道何时更新小组件内容时，可以使用它们。为了解释这一点，官方文档给出了一个显示股票市场详情的小组件示例。⁷\
    \ 它指出，在这种情况下使用 `atEnd` 或 `after` 是一个好主意，因为你可以指定下一个开市或闭市的日期，并且信息通常不会在夜间或周末发生变化。\n\
    \n解释得够多了。现在，修改 `getTimeline(in:completion:)` 方法，如清单 3-8 所示。\n\n```\nfunc getTimeline(in\
    \ context: Context, completion: @escaping (Timeline) -> Void) {\n// 1\nlet entry\
    \ = getLatestUpcomingMatch()\n// 2\nlet refresh = Calendar.current.date(byAdding:\
    \ .second, value: 1, to: entry.date)\n// 3\nlet timeline = Timeline(entries: [entry],\n\
    policy: .after(refresh!))\n// 4\ncompletion(timeline)\n}\n```\n\n**清单 3-8** `getTimeline(in:completion:)`\
    \ 方法的修改\n\n在清单 3-8 的代码中，执行了以下任务：\n\n1. 使用 `getLatestUpcomingMatch()` 获取最近的即将到来的比赛，并将获取的值存储在\
    \ `entry` 中。\n2. 然后，将下次刷新时间设置为比 `entry` 的日期晚一秒。\n3. 在第三步中，使用 `entry` 和 `after`\
    \ 刷新策略创建一个时间线。刷新策略设置为在我们第二步中设置的时间之后。\n4. 最后，将时间线交给小组件。\n\n这样，`SmallWidgetDataProvider`（一个符合\
    \ `TimelineProvider` 协议的类）的配置就完成了。现在，是时候使用 SwiftUI 来开发小组件的用户界面了。\n"
- fmt: '# Developing Your Widget’s UI


    The last sections were all about configuring the working mechanism of your widget.
    In this section, you will finally work on the user interface of your widget. You
    will be making a small-sized widget, and the view you will be creating is basically
    the same as the one normally made with SwiftUI, but with some small tweaks. The
    widget will display the logos of the two teams competing in the nearest upcoming
    match and a countdown before the match begins.


    Start by creating a SwiftUI file. Navigate to the `SmallWidget` folder and then
    create a `SwiftUI View` named `SmallWidgetView` by going to **File** ➤ **New**
    ➤ **File…** ➤ **SwiftUI View**. After setting the filename and choosing the location,
    before clicking **Create**, remember to put a checkmark on the `SoccerTimeWidgetExtension`
    target at the bottom of the dialog box.


    After `SmallWidgetView.swift` is created, replace its content by the code given
    in Listing [3-9](#505356_1_En_3_Chapter.xhtml#PC9).


    ```

    // 1

    import SwiftUI

    import WidgetKit

    struct SmallWidgetView: View {

    // 2

    var match: SmallWidgetDataProvider.Entry

    var body: some View {

    // 3

    VStack(alignment: .center) {

    HStack() {

    Club(value: match.primaryClub)

    .logo.resizable()

    .aspectRatio(contentMode: .fit)

    Text("vs").font(.footnote)

    Club(value: match.secondaryClub)

    .logo.resizable()

    .aspectRatio(contentMode: .fit)

    }.frame(height: 50)

    if match.date > Date() {

    Text(match.date, style: .timer)

    .font(.system(.title,

    design: .monospaced))

    .foregroundColor(Color.gray)

    .multilineTextAlignment(.center)

    } else {

    Text("No upcoming matches.")

    .foregroundColor(.gray)

    }

    }

    }

    }

    Listing 3-9

    SmallWidgetView.swift

    ```


    Listing [3-9](#505356_1_En_3_Chapter.xhtml#PC9) is the code that lays out the
    user interface of your small-sized widget. However, you must have seen an error
    saying “Cannot find ‘Club’ in scope” after pasting the code. To fix this, you
    need to make `Club` available in the `SoccerTimeWidgetExtension` target, and by
    now you must have had at least some blurry idea about how to do it. But it’s okay
    if you haven’t been able to figure it out yet. Just go to the `Clubs.swift` file
    and put checkmarks on both `SoccerTime` and `SoccerTimeWidgetExtension` in the
    Target Membership of File Inspector. Also, do the same and update the target membership
    of `ImageExtension.swift` (located in the `Extensions` folder) by checking `SoccerTimeWidgetExtension`
    to avoid the errors like “Type ‘Image’ has no member ‘alavés’ . ”


    Now, let us explain what the code in Listing [3-9](#505356_1_En_3_Chapter.xhtml#PC9)
    does:


    1.  Imports `SwiftUI` and `WidgetKit`.


    2.  Declares a variable named `match`, which will be used to provide data to the
    view. In the current case, the data are `TimelineEntry` values from `SmallWidgetDataProvider`.


    3.  The view is prepared using `VStack` and `HStack` to show the information provided
    by the match. If the entry’s date is not greater than the current time, then “No
    upcoming matches.” is shown instead of a timer.


    Till now, the **Canvas** window of `SmallWidgetView` must be saying “No Preview.”
    It is because you removed the preview struct of `SmallWidgetView` while replacing
    its content with the code of Listing [3-9](#505356_1_En_3_Chapter.xhtml#PC9).
    Now, fix it by pasting the code in Listing [3-10](#505356_1_En_3_Chapter.xhtml#PC10)
    at the bottom of the file.


    ```

    struct SmallWidgetView_Previews: PreviewProvider {

    static var previews: some View {

    SmallWidgetView(match: Match(primaryClub: "", secondaryClub: "", date: Date()))

    .previewContext(WidgetPreviewContext(family:

    .systemSmall))

    }

    }

    Listing 3-10

    Preview struct of SmallWidgetView

    ```


    The code in Listing [3-10](#505356_1_En_3_Chapter.xhtml#PC10) creates a preview
    of `SmallWidgetView`, and as soon as you paste it and click **Resume** in the
    **Canvas** window, a preview like the one shown in Figure [3-6](#505356_1_En_3_Chapter.xhtml#Fig6)
    is displayed.


    ![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig6_HTML.jpg](images/505356_1_En_3_Chapter/505356_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    A screenshot displaying the preview of small-sized widget'
