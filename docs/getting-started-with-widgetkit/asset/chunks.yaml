  trans: "\n# Widget 扩展\n\nWidget 扩展是一个模板，提供基础结构和样板代码，帮助你开始创建应用的小组件。它容纳你创建的小组件。苹果建议开发者将应用的所有小组件包含在单个\
    \ Widget 扩展中。不过，如有必要，也可以创建多个 Widget 扩展。\n\n请按照以下步骤为 `SoccerTime` 创建 Widget 扩展：\n\
    \n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig4_HTML.jpg](img/505356_1_En_3_Fig4_HTML.jpg)\n\
    \n图 3-4\n\n显示 `SoccerTimeWidgetExtension` 为所选方案的截图\n\n1.  打开 `SoccerTime.xcodeproj`。\n\
    2.  前往 **文件** ➤ **新建** ➤ **Target** ➤ **iOS**。\n3.  你可以向下滚动或使用筛选器找到 **Widget Extension**，然后双击它。\n\
    4.  此时会出现一个对话框，你需要执行以下操作：\n    1.  将**产品名称**设为 `SoccerTimeWidget`。\n    2.  将**团队**设为**无**或选择你的团队。\n\
    \    3.  取消勾选**包含配置意图**。\n    4.  确保 `SoccerTime` 是选中的**项目**。\n    5.  确认在**嵌入到应用程序**字段中，`SoccerTime`\
    \ 是选中的应用。\n    6.  点击**完成**。\n5.  点击完成后，Widget 扩展即可生成，Xcode 会询问最后一个问题：“激活‘SoccerTimeWidgetExtension’方案？”。点击**同意**激活该方案。之后你在\
    \ Xcode 屏幕中看到的变化如图 3-4 所示。\n\n完成上述步骤后，你首先会注意到项目中新增了 `SoccerTimeWidget` 文件夹。所有与小组件相关的内容都保存在这里。\n\
    \n从 `SoccerTimeWidget` 文件夹中打开 `SoccerTimeWidget.swift`，即可查看小组件构建块的样板代码。你将在此文件中进行修改以自定义小组件。接下来，我们将为你概述\
    \ `SoccerTimeWidget.swift` 中的所有构建块，并指导你对该文件进行修改，以便创建允许用户在主页面上查看即将到来比赛详情的小组件。\n\
    \n**注意：** 请注意文件检查器的目标成员资格部分中，`SoccerTimeWidget.swift` 的目标已设置为 `SoccerTimeWidgetExtension`，而非\
    \ `SoccerTime`。\n\n## TimelineEntry\n\n`TimelineEntry` 是一个协议，用于指定小组件的显示时机。它包含一个\
    \ `date` 属性来指示这一点。此外，它还能帮助系统判断小组件内容的相关性。`TimelineProvider` 通过管理一个或多个时间线条目来利用 `TimelineEntry`\
    \ 的这些能力，从而告知 `WidgetKit` 何时显示小组件。随后，`WidgetKit` 通过执行小组件配置的 `content` 块，并传入相应的时间线条目来渲染小组件。\n\
    \n**注意：** 我们明白你目前还不熟悉 `TimelineProvider` 和 `WidgetConfiguration`，但你将在后续章节中了解它们。目前你只需记住，`TimelineProvider`\
    \ 管理时间线条目，而 `WidgetConfiguration` 是配置小组件的地方。\n\n要使用 `TimelineEntry` 的特性，你需要创建一个符合该协议的结构体。由于它是\
    \ `WidgetConfiguration` 渲染小组件所需的一种模型类型，你必须确保添加 `WidgetConfiguration` 需要的所有属性。\n\
    \n在当前项目中，如果你前往 `SoccerTime` ➤ `Model` ➤ `Match.swift`，会看到一个应用用于存储比赛详情的模型。由于你的小组件将显示\
    \ `Match` 存储的相同详情，你可以直接使用这个模型。\n\n查看 `Match` 的结构，你会发现它符合 `Codable` 和 `Identifiable`\
    \ 协议。现在，为了让它也能用作时间线条目，需要使其符合 `TimelineEntry` 协议。为此，需要先导入 `WidgetKit`。因此，在 `Match.swift`\
    \ 中，将 `import WidgetKit` 这一行添加到代码的第一行（如代码清单 3-1 所示）。\n\n然后，通过修改 `Match` 使其遵循 `TimelineEntry`，使其像代码清单\
    \ 3-1 所示。\n\n```swift\nstruct Match: Codable, Identifiable, TimelineEntry {\n\
    \    var id = UUID()\n    var primaryClub: String\n    var secondaryClub: String\n\
    \    var date: Date\n}\n```\n\n*代码清单 3-1：使模型符合 `TimelineEntry`*\n\n如果此时构建项目，你会遇到一个错误，提示“Match\
    \ does not conform to protocol 'TimelineEntry'。”这是因为符合 `TimelineEntry` 的结构体必须拥有一个\
    \ `Date` 类型的 `date` 属性。仔细查看 `Match`，你会发现已经有一个 `Date` 类型的属性，即 `time`。因此，你可以将其重命名为\
    \ `date`，因为 `time` 属性原本就是为了存储日期而存在的。\n\n现在构建项目，你会看到重命名影响了整个项目。在 `ListMatchView`、`MatchCell`\
    \ 和 `AddMatchView` 中会出现错误。将所有这些位置中的 `time` 重命名为 `date`，然后再次构建项目，你会发现所有错误都已消失。\n"
- fmt: '# TimelineProvider


    `TimelineProvider` can be considered as the driving force of the widget. It is
    a protocol that lets WidgetKit know when it should update a widget’s display.
    It fetches entries of type `TimelineEntry` and displays each entry at the time
    stored in the entry’s `date` property.


    Now, you will create a struct that conforms to `TimelineProvider`. But before
    that, create a folder named `SmallWidget` in the `SoccerTimeWidget` folder to
    store all the files related to the small variant of your widget.


    Then, in the `SmallWidget` folder, create a Swift file and name it `SmallWidgetDataProvider`.
    Before clicking Create, make sure to check `SoccerTimeWidgetExtension` in the
    Targets section so that `SmallWidgetDataProvider` becomes available in your widget
    extension too.


    Now, open `SmallWidgetDataProvider.swift` and replace the existing code from that
    file with the code in Listing 3-2.


    ```

    import SwiftUI

    import WidgetKit

    struct SmallWidgetDataProvider: TimelineProvider {

    }

    Listing 3-2

    Creating SmallWidgetDataProvider

    ```


    Listing 3-2 imports `SwiftUI` and `WidgetKit` and creates a struct named `SmallWidgetDataProvider`
    that conforms to `TimelineProvider`.


    Now, you’ll see an error saying “Type `SmallWidgetDataProvider` does not conform
    to protocol `TimelineProvider`.” It is because you still haven’t implemented the
    methods of that protocol. For now, you can ignore that error.


    Now add the line `typealias Entry = Match` to `SmallWidgetDataProvider`. That
    line implements the `Entry typealias` property of the `TimelineProvider` protocol
    in `SmallWidgetDataProvider`. As stated earlier, this is how you are feeding `SmallWidgetDataProvider`
    (a timeline provider) a timeline entry (`Match`). Build the project.


    Now you must be seeing a new error that says, “Cannot find type `Match` in scope.”
    The reason behind this error is that `Match.swift` is not a member of the `SoccerTimeWidgetExtension`
    target, hence not being available in your widget extension. If you open `Match.swift`,
    you will see in the Target Membership section of File Inspector that only `SoccerTime`
    has been checked, and not `SoccerTimeWidgetExtension`. Right now, the Target Membership
    section looks like Figure 3-5.


    ![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig5_HTML.jpg](images/505356_1_En_3_Chapter/505356_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    A screenshot displaying `Match.swift`’s target membership


    Since you need to use `Match` in `SoccerTimeWidgetExtension` too, add a checkmark
    on it.


    It’s time to get rid of the only remaining error saying, “Type `SmallWidgetDataProvider`
    does not conform to protocol `TimelineProvider`.” Open the error and click **Fix**.
    Then it will generate the boilerplate code of `TimelineProvider`’s methods, and
    the code will look similar to Listing 3-3.


    ```

    import WidgetKit

    import SwiftUI

    struct SmallWidgetDataProvider: TimelineProvider {

    typealias Entry = Match

    func placeholder(in context: Context) -> Match {


    }

    func getSnapshot(in context: Context, completion: @escaping (Match) -> Void) {


    }

    func getTimeline(in context: Context, completion: @escaping (Timeline) -> Void)
    {


    }

    }

    Listing 3-3

    Boilerplate code of SmallWidgetDataProvider

    ```


    Listing 3-3 shows the code of `SmallWidgetDataProvider`. There is boilerplate
    code of the three methods of `TimelineProvider` (that `SmallWidgetDataProvider`
    conforms to), and it’s the developer’s job to write their implementations. The
    basic overview of those methods is given as follows, along with some hands-on
    work for you.


    ### placeholder(in:)


    A placeholder displays a generic representation of your widget view during its
    first load after being added to the homescreen. It can also be displayed while
    your widget is in the process of retrieving new data.


    In WidgetKit, the `placeholder(in:)` method of `TimelineProvider` is responsible
    to return a placeholder timeline entry.


    Let’s give it a try. After the line that says `typealias Entry = Match` in `SmallWidgetDataProvider`,
    create a variable `placeholderEntry` of `Match` type that returns a placeholder
    timeline entry. It is shown in Listing 3-4.


    ```

    var placeholderEntry: Match {

    return Match(primaryClub: "none",

    secondaryClub: "none",

    date: Date())

    }

    Listing 3-4

    Declaration of a placeholderEntry variable

    ```


    As stated earlier, Listing 3-4 declares a variable `placeholderEntry` of `Match`
    type and returns a `Match` object (that conforms to `TimelineEntry`) with `primaryClub`
    and `secondaryClub` values set to `"none"` and the current date.


    **Note:** It’s not compulsory to create a `placeholderEntry` variable, but since
    you will be using this same object in multiple places, it’s a nice idea to create
    and store the object in a variable.


    Now you can update the `placeholder(in:)` method to make it appear like Listing
    3-5.


    ```

    func placeholder(in context: Context) -> Match {

    return placeholderEntry

    }

    Listing 3-5

    placeholder(in:) method

    ```


    In Listing 3-5, the `placeholder(in:)` method has been modified to make it return
    the `placeholderEntry` variable you had declared in Listing 3-4.'
