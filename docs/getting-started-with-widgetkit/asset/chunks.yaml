    if there occurs any kind of change in `deepLinkActive`’s value, then the whole
    `body` of `HomeView` automatically gets reloaded, and hence if `deepLinkActive`’s
    value becomes `true`, the `NavigationLink` navigates to its destination, that
    is, `DetailView`. Also, the `label` of `NavigationLink` is an `EmptyView()` and
    the whole `NavigationLink` is `hidden()` as you do not want it to be visible anywhere
    on screen but just want it to work.


    1.  For a `NavigationLink` to work, it must be wrapped inside a `NavigationView`.
    So, the last step would be to somehow wrap `navigateToDetail`, which stores your
    `NavigationLink`, to the `NavigationView` in the `body` of `HomeView`. So, make
    `navigateToDetail` the background of the `List` wrapped by `NavigationView` in
    the `body` of `HomeView`. It is shown in Listing [4-30](#505356_1_En_4_Chapter.xhtml#PC32).


    ```

    var body: some View {

    NavigationView {

    List {

    if type == .all {

    eventListWhenAllChecked

    } else {

    Group { eventView(for: type) }

    }

    }

    .background(navigateToDetail)

    .navigationTitle("On This Day")

    .navigationBarItems(leading: Text("\(today?.month ?? "JANUARY") \(today?.day ??
    1)")

    .fontWeight(.semibold)

    .font(.body)

    .foregroundColor(.red),

    trailing: TrailingNavView(homeView: self))

    }

    .alert(isPresented: $isAlertDisplayed,

    content: {

    Alert(title: Text("Oops!"),

    message: Text("An error occurred. Please try reloading the data."),

    dismissButton: .cancel(Text("OK")))

    })

    .onAppear(perform: initiateDataFetch)

    .onOpenURL { url in

    handleLinks(for: url)

    }

    }

    Listing 4-30

    Setting navigateToDetail as the background of List in the body of HomeView

    ```


    If you see in Listing [4-30](#505356_1_En_4_Chapter.xhtml#PC32), exactly after
    the closing brace of `List`, `.background(navigateToDetail)` has been added to
    make `navigateToDetail` its background. In this way, you have successfully wrapped
    the `NavigationLink` stored by `navigateToDetail` in the `NavigationView` of `HomeView`’s
    `body`.


    1.  Finally, build and run the project and tap any event of the medium-sized widget
    to see the app launching and automatically navigating to the detail page of that
    particular event. If you tap the **Back** button, you will see the list of events
    related to the selected category only, in the homescreen of the app.


    With this, you have completed adding a tap target in your medium widget. Now,
    the only widget where you have not set up tap targets is the large widget. You
    will do that in the upcoming section.


    ### Addition of Tap Target in Large Widget


    In the previous sections, you have already performed the setup necessary to create
    and handle deep links. That makes adding tap targets in your large widget easier.
    The only file you will modify now is `LargeWidgetView` to make tap targets in
    it work.


    As `LargeWidgetView` is quite similar to `MediumWidgetView`, the first thing you
    can do is call the `widgetURL(_:)` method . This will create a tap target throughout
    the view that will make navigation to the app’s homescreen that displays a list
    of events of the selected category. Replace the `body` of `LargeWidgetView` with
    the code given in Listing [4-31](#505356_1_En_4_Chapter.xhtml#PC33).


    ```

    var body: some View {

    VStack(alignment: .leading, spacing: 0) {

    today

    Divider().padding(.vertical, 4)

    count

    todayEvents

    Spacer()

    }

    .padding(8)

    .widgetURL(URL(string: category.eventType.rawValue))

    }

    Listing 4-31

    Calling widgetURL(_:) from LargeWidgetView’s body

    ```


    Listing [4-31](#505356_1_En_4_Chapter.xhtml#PC33) modifies the body of `LargeWidgetView`
    by adding a call to `widgetURL(_:)`. The URL passed as an argument is created
    by using the `String rawValue` of the `eventType` property of `category`. Since
    you have set up everything to handle this deep link, if you build and run the
    project and you tap anywhere in the large widget, the app will launch and display
    a list of events of the selected category.


    Now to add the feature to navigate to the detail screen of an event listed in
    the widget, you have to make modifications in `todayEvents`. Firstly, create a
    method `eventDetail(with:)` in `LargeWidgetView` by using the code given in Listing
    [4-32](#505356_1_En_4_Chapter.xhtml#PC34).


    ```

    func eventDetail(with event: WidgetEventData) -> some View {}

    Listing 4-32

    Creating eventDetail(with:)

    ```


    Listing [4-32](#505356_1_En_4_Chapter.xhtml#PC34) creates an `eventDetail(with:)`
    method that returns `some View`. Now, go to `todayEvents` and cut its `HStack`
    (everything inside the `ForEach` loop), and paste it in `eventDetail(with:)` to
    make it look like the code given in Listing [4-33](#505356_1_En_4_Chapter.xhtml#PC35).


    ```

    func eventDetail(with event: WidgetEventData) -> some View {

    HStack(spacing: 0) {

    Color.init(UIColor.systemYellow)

    .frame(width: 4)

    .padding(.vertical, 12)

    VStack {

    Text("\(event.text)")

    .font(.caption)

    .padding(.trailing, 8)

    .frame(maxWidth: .infinity, alignment: .leading)

    }.padding(8)

    }

    }

    Listing 4-33

    Adding code to eventDetail(with:)

    ```


    Listing [4-33](#505356_1_En_4_Chapter.xhtml#PC35) creates an `eventDetail(with:)`
    method that returns an `HStack`. If you look at the code of `todayEvents` now,
    you will see only the code shown in Listing [4-34](#505356_1_En_4_Chapter.xhtml#PC36).


    ```

    var todayEvents: some View {

    VStack(spacing: 0) {

    ForEach(events.prefix(3)) { event in

    // HStack was here

    }

    if events.count > 3 {

    HStack() {

    Spacer()

    Text("\(events.count - 3) more")

    .font(.footnote)

    .padding(.trailing)

    }

    }

    }

    }

    Listing 4-34

    The remnants of todayEvents

    ```


    The line where `HStack` existed previously has been marked with the comment, `//
    HStack was here`, in Listing [4-34](#505356_1_En_4_Chapter.xhtml#PC36). Now, replace
    the line that says `// HStack was here` with the code given in Listing [4-35](#505356_1_En_4_Chapter.xhtml#PC37).


    ```

    if let url = LinkConstants.detail(with: event.text, category: category) {

    Link(destination: url) {

    eventDetail(with: event)

    }

    } else {

    eventDetail(with: event)

    }

    Listing 4-35

    The code that replaces the HStack

    ```


    You had used the code in Listing [4-35](#505356_1_En_4_Chapter.xhtml#PC37) in
    `MediumWidgetView` too. The given code checks if a valid URL has been generated
    or not by passing `event.text` and `category` to the `LinkConstants.detail(with:category:)`
    method and by unwrapping the value returned by that method using an `if-let`.
    If a valid URL is generated, it is stored in `url`, and a `Link` with `destination`
    set to `url` wraps the call to `eventDetail(with:)` that is responsible to generate
    the `HStack` that displays the event details. Otherwise, only the `eventDetail(with:)`
    method is called.


    Now, if you run the project and test your large widget, you will see that if you
    tap on any event, you get taken to its detail screen. And if you tap **Back**
    from a detail screen, the app displays the homescreen listing the events of the
    selected category.


    In this way, you have successfully added tap targets in your large widget. Well
    done!'
  trans: "\n在`Listing [4-29]`中，创建了`navigateToDetail`变量，其功能是返回`some View`。它首先通过运行`map`检查`deepLinkEvent`值是否可用，如果值存在，则创建一个`NavigationLink`，其`destination`设置为`DetailView`并携带`event`数据，`isActive`参数设置为`$deepLinkActive`。这里，`deepLinkActive`前面的“`$`”符号表示它是一个绑定。因此，如果`deepLinkActive`的值发生任何变化，`HomeView`的整个`body`会自动重新加载，因此如果`deepLinkActive`的值变为`true`，则`NavigationLink`会导航到其目标，即`DetailView`。同时，`NavigationLink`的`label`是一个`EmptyView()`，并且整个`NavigationLink`是`hidden()`，因为你不希望它在屏幕上的任何位置可见，只希望它正常工作。\n\
