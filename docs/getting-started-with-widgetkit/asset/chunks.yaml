  raw: 'Right now, if you try to edit the widget and configure it, you will see that
    there exists no option to do that. But in the upcoming sections, you will make
    your app configurable (Figure [5-4](#505356_1_En_5_Chapter.xhtml#Fig4)). Users
    will be able to choose a trend from a list of trends fetched from Twitter’s API
    endpoint (and not a list of hard-coded trends), and the widget will then display
    tweets related to that trend. This is what makes this chapter different from the
    previous one – fetching configuration options from a server and not hard-coding
    them.


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig4_HTML.png](images/505356_1_En_5_Chapter/505356_1_En_5_Fig4_HTML.png)


    Figure 5-4


    The configuration screen of TwitterTrends’ widget


    Figure [5-4](#505356_1_En_5_Chapter.xhtml#Fig4) displays the configuration screen
    of TwitterTrends’ widget that you will develop in the upcoming sections. The configuration
    screen consists of a parameter, **Selected Trend**, which is currently asking
    users to **Choose** a trend since no trend has been selected yet. After tapping
    **Choose**, users will see a screen that lists the Twitter trends trending worldwide
    (Figure [5-5](#505356_1_En_5_Chapter.xhtml#Fig5)). Those trends will be fetched
    from Twitter’s **GET trends/place** API endpoint.


    ![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig5_HTML.png](images/505356_1_En_5_Chapter/505356_1_En_5_Fig5_HTML.png)


    Figure 5-5


    The trends users can choose from to set as the “Selected Trend”


    From the screen shown in Figure [5-5](#505356_1_En_5_Chapter.xhtml#Fig5), users
    can choose any one of the trends, and then the widget will display tweets related
    to that selected trend.


    Doesn’t that sound fun? Now let’s take a look at the already existing code. We
    have already set up some basic stuff for you in TwitterTrends.


    If you go to the **Project Navigator** and open the **TwitterTrends** project,
    you will see two main folders, that is, **TwitterTrends** and **TwitterTrendsWidget**.
    The **TwitterTrends** folder contains the files and folders related to the app,
    and the **TwitterTrendsWidget** folder contains the files and folders related
    to the widget. And there are certain files which are shared by both folders using
    **Target Membership**.


    If you open the **TwitterTrends** folder in the **TwitterTrends** project, you
    will see the following folder structure:


    ```

    TwitterTrends

    ├── Assets.xcassets

    ├── Extensions

    │   └── View.swift

    ├── Info.plist

    ├── Models

    │   ├── TrendTweets.swift

    │   ├── Trends.swift

    │   └── Tweets.swift

    ├── Preview\ Content

    ├── TwitterTrendsAPI.swift

    ├── TwitterTrendsApp.swift

    ├── ViewModel

    │   └── TTViewModel.swift

    └── Views

    ├── TrendsView.swift

    └── TweetsView.swift

    ```


    In the **TwitterTrends** folder, other than **Assets.xcassets** and **Info.plist**,
    you will see the **Extensions** folder that contains a file named **View.swift**.
    It contains an extension of `View` that helps to handle the `redacted(reason:)`
    view modifier.


    The **Models** folder contains **TrendTweets.swift**, **Trends.swift**, and **Tweets.swift**,
    which are the models used for decoding the response data received from Twitter’s
    API. These files are used by both the app and the widget.


    The **Preview Content** folder is a folder generated automatically by Xcode for
    storing the assets required for development purposes. Xcode does not include any
    assets in this folder in your release builds.


    The next file is **TwitterTrendsAPI.swift**. It is responsible to handle communications
    with Twitter’s API endpoints. This file is used by both the app and the widget
    to fetch tweets and trends from Twitter.


    There is a file named **TwitterTrendsApp.swift** which is the entry point of the
    app.


    Now, the only folders remaining are **ViewModel** and **Views**. The **ViewModel**
    folder consists of **TTViewModel.swift**, which contains the view model used by
    the app. And **Views** contains **TrendsView.swift** and **TweetsView.swift**
    which contain the user interface of the screens that display the top trends and
    the tweets related to those trends, respectively.


    That’s the description of the folders and files in the **TwitterTrends** folder.


    There is another folder called **TwitterTrendsWidget** in the project. If you
    open it, you will see the folder structure given as follows:


    ```

    TwitterTrendsWidget

    ├── Assets.xcassets

    ├── Info.plist

    ├── Model

    │   └── TweetWidgetEntry.swift

    ├── Provider

    │   └── TwitterProvider.swift

    ├── View

    │   └── LargeWidgetView.swift

    └── Widget

    └── TwitterTrendsWidget.swift

    ```


    Currently, there are less files and folders in **TwitterTrendsWidget**. In addition
    to **Assets.xcassets** and **Info.plist**, there is a folder called **Model**
    that contains **TweetWidgetEntry.swift**. This file contains a `TimelineEntry`
    called `TweetWidgetEntry` which is vital for your widgets to work.


    The **Provider** folder contains **TwitterProvider.swift**, which is the `TimelineProvider`
    of the widget.


    Likewise, you can see another folder, **View**. It contains **LargeWidgetView.swift**,
    which contains the user interface of your widget.


    Lastly, there is a folder called **Widget**, and it contains **TwitterTrendsWidget.swift**.
    It is the entry point of your widget.


    Throughout this chapter, you will add more files and folders in your widget’s
    folder and give your widget the power to fetch configuration options from a remote
    server.


    Now, it’s finally time to start working to give your widget the capability to
    communicate with Twitter’s API to fetch the top trends and allow users to select
    any one of them to see the tweets related to that particular trend in the widget.'
