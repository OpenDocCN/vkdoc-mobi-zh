- fmt: "### Create an `IntentTimelineProvider`\n\nAs mentioned previously, the first\
    \ step to switch to `IntentConfiguration` is to set up an `IntentTimelineProvider`.\
    \ Go through the given steps to set it up:\n\n1.  Right-click the **Provider**\
    \ folder of the **TwitterTrendsWidget** folder, click **New File…**, and create\
    \ a new Swift file named `TwitterTrendsIntentProvider.swift`. Make sure the **TwitterTrendsWidgetExtension**\
    \ target is checked at the bottom of the dialog box before creating the file.\n\
    \n**Note**: You could use the existing `TwitterProvider.swift` file instead of\
    \ creating `TwitterTrendsIntentProvider.swift`, but for better clarity, we recommend\
    \ you to create `TwitterTrendsIntentProvider.swift`.\n\n2.  Open `TwitterTrendsIntentProvider.swift`\
    \ and replace the existing code content with the code given in Listing [5-3](#505356_1_En_5_Chapter.xhtml#PC5).\n\
    \n1.  In Listing [5-3](#505356_1_En_5_Chapter.xhtml#PC5), a struct named `TwitterTrendsIntentProvider`\
    \ that conforms to `IntentTimelineProvider` is created. As soon as you add the\
    \ code, Xcode will ask if you want to add protocol stubs. Click **Fix** and add\
    \ them to see two `typealias`es, `Entry` and `Intent`, added to the struct.\n\n\
    2.  In `TwitterTrendsIntentProvider`, replace the `type` placeholder of `Entry`\
    \ with `TweetWidgetEntry`, a type of timeline entry. Also, replace the `type`\
    \ placeholder of `Intent` with `TrendsIntent`, whose name was generated from the\
    \ custom intent, `Trends`, you had created in `TwitterTrends.intentdefinition`.\n\
    \nNow your code should look like the code in Listing [5-4](#505356_1_En_5_Chapter.xhtml#PC6).\n\
    \n```\nimport SwiftUI\nimport WidgetKit\n\nstruct TwitterTrendsIntentProvider:\
    \ IntentTimelineProvider {\n}\nListing 5-3\nCreating TwitterTrendsIntentProvider\
    \ that conforms to IntentTimelineProvider\n```\n\n1.  You will still see Xcode\
    \ asking you to add protocol stubs. Add them too. Then, `placeholder(in:)`, `getSnapshot(for:in:completion:)`,\
    \ and `getTimeline(for:in:completion:)` methods will get generated.\n\n2.  For\
    \ implementing the `placeholder(in:)` and `getSnapshot(for:in:completion:)` methods\
    \ of `TwitterTrendsIntentProvider`, you can copy the code from the `placeholder(in:)`\
    \ and `getSnapshot(for:in:completion:)` methods of `TwitterProvider` in `TwitterProvider.swift`\
    \ as the same implementations will work.\n\n3.  The `getTimeline(for:in:completion:)`\
    \ method of `TwitterTrendsIntentProvider` is different than the `getTimeline(in:completion:)`\
    \ method of `TwitterProvider` as `TwitterTrendsIntentProvider` conforms to `IntentTimelineProvider`,\
    \ but `TwitterProvider` conforms to `TimelineProvider`. And the `getTimeline(for:in:completion)`\
    \ method of `TwitterTrendsIntentProvider` allows you to access the data from the\
    \ configuration of the widget.\n\nIn the current scenario, you will access the\
    \ selected trend from the widget’s configuration and use it to perform the API\
    \ call to fetch tweets related to that selected trend. In case there isn’t a selected\
    \ trend, you will make the widget fetch the tweets related to the first trend\
    \ in the array of the trends fetched from Twitter’s API. And you will do everything\
    \ in `getTimeline(for:in:completion:)`.\n\nBefore you start working on `getTimeline(for:in:completion:)`,\
    \ let’s first create a method, `createTimelineFromTweets(response:)`, to create\
    \ a timeline from the tweets that will be fetched from the API. Then, you can\
    \ call this method from `getTimeline(for:in:completion:)`. This will make the\
    \ code readable and easy to understand. Copy the code given in Listing [5-5](#505356_1_En_5_Chapter.xhtml#PC7)\
    \ and paste it in `TwitterTrendsIntentProvider`.\n\n```\nimport SwiftUI\nimport\
    \ WidgetKit\n\nstruct TwitterTrendsIntentProvider: IntentTimelineProvider {\n\
    \    typealias Entry = TweetWidgetEntry\n    typealias Intent = TrendsIntent\n\
    }\nListing 5-4\nTwitterTrendsIntentProvider after adding Entry and Intent types\n\
    ```\n\n```\nfunc createTimelineFromTweets(response: Result) -> Timeline {\n  \
    \  // a\n    let currentDate = Date()\n    // b\n    let refreshDate = Calendar.current.date(byAdding:\
    \ .minute, value: 30, to: currentDate)!\n    // c\n    var entry = TweetWidgetEntry(date:\
    \ refreshDate, statuses: Tweets.dummyTweets, trendTitle: \"\")\n    // d\n   \
    \ var timeline = Timeline(entries: [entry], policy: .after(refreshDate))\n   \
    \ // e\n    switch response {\n    case let .success(tweets):\n        // f\n\
    \        entry = TweetWidgetEntry(date: refreshDate, statuses: tweets.statuses,\
    \ trendTitle: tweets.title)\n        timeline = Timeline(entries: [entry], policy:\
    \ .after(refreshDate))\n        return timeline\n    case let .failure(error):\n\
    \        // g\n        print(error.localizedDescription)\n        return timeline\n\
    \    }\n}\nListing 5-5\nCreating the createTimelineFromTweets(response:) method\n\
    ```\n\nIn Listing [5-5](#505356_1_En_5_Chapter.xhtml#PC7), you created a method\
    \ `createTimelineFromTweets(response:)` that has `response` as the parameter and\
    \ returns a timeline. In it, the following things have been done:\n\n1.  Now it’s\
    \ time to start working in the `getTimeline(for:in:completion:)` method. Replace\
    \ the existing `getTimeline(for:in:completion:)` method with the code given in\
    \ Listing [5-6](#505356_1_En_5_Chapter.xhtml#PC8).\n\n1.  At the beginning, the\
    \ current date is stored in `currentDate`.\n\n2.  Now, the date after adding 30\
    \ minutes to `currentDate` is generated and stored in `refreshDate`. You will\
    \ use it later to set up the widget’s refresh policy.\n\n3.  In this step, the\
    \ `TweetWidgetEntry` timeline entry is created by passing `refreshDate`, dummy\
    \ tweets, and an empty title string to its initializer. Then, it is stored in\
    \ `entry`.\n\n4.  Now a timeline is created using `entry` and by setting the refresh\
    \ policy to make the widget request a new timeline after 30 minutes. In this way,\
    \ the timeline is created.\n\n5.  As `response` may either have a `.success` value\
    \ or a `.failure` value, it is put through a `switch` case. If `response` has\
    \ a `.success` value, it uses `tweets` received with `.success` and creates a\
    \ new `TweetWidgetEntry` by using `tweets`’ `title` and `statuses` properties.\
    \ Then, the value of the `entry` variable is replaced by this new entry. And the\
    \ value of the `timeline` variable is also replaced with a new timeline created\
    \ using the new value of `entry`, and therefore the `timeline` is returned.\n\n\
    6.  In case `response` contains `.failure`, the `error` variable is accessed,\
    \ and its value is printed into the console. Also, since the method must return\
    \ a timeline, the `timeline` variable with dummy tweets and empty title (that\
    \ you created in steps “c” and “d”) is returned.\n\n```\nfunc getTimeline(for\
    \ configuration: TrendsIntent, in context: Context, completion: @escaping (Timeline)\
    \ -> Void) {\n    // a\n    if let trend = configuration.selectedTrend {\n   \
    \     let selectedTrend = Trend(name: trend.displayString, query: trend.identifier!)\n\
    \        TwitterTrendsAPI.getTweets(on: selectedTrend) { response in\n       \
    \     completion(createTimelineFromTweets(response: response))\n        }\n  \
    \  } else { // b\n        TwitterTrendsAPI.getLatestTweets { response in\n   \
    \         completion(createTimelineFromTweets(response: response))\n        }\n\
    \    }\n}\nListing 5-6\nImplementation of the getTimeline(for:in:completion:)\
    \ method\n```\n\nIn Listing [5-6](#505356_1_En_5_Chapter.xhtml#PC8), the implementation\
    \ of the `getTimeline(for:in:completion)` method is given. The following things\
