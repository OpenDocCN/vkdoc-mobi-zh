  raw: 'In Listing [4-29](#505356_1_En_4_Chapter.xhtml#PC31), the `navigateToDetail`
    variable is created, whose function is to return `some View`. It first checks
    if a `deepLinkEvent` value is available or not by running `map`, and if the value
    exists, a `NavigationLink` with its `destination` set to `DetailView`, along with
    `event` data, and its `isActive` parameter set to `$deepLinkActive`, is created.
