    ### 切换到 `IntentConfiguration`


    如前所述，你之前一直使用 `StaticConfiguration`，因为那时还无需让你的小组件支持用户配置。但现在，你希望让它们可被用户配置，并且已经完成了设置的第一步。接下来，就该切换到
    `IntentConfiguration` 了。为此，你需要遵循以下步骤：


    1.  右键点击 **OnThisDayWidget** 文件夹中的 **Provider** 文件夹，选择 **New File…**，然后创建一个名为
    `IntentProvider.swift` 的新 Swift 文件。在创建文件前，务必确认对话框底部的 **OnThisDayWidgetExtension**
    目标已被勾选。


    **注意** 你也可以使用现有的 `Provider.swift` 文件，而非创建 `IntentProvider.swift`，但为了更清晰，我们建议你创建
    `IntentProvider.swift`。


    2.  打开 `IntentProvider.swift` 文件，并将其中的现有代码替换为代码清单 4-4 中给出的代码。


    1.  在代码清单 4-4 中，创建了一个遵循 `IntentTimelineProvider` 协议、名为 `IntentProvider` 的结构体。当你添加这些代码后，Xcode
    会询问你是否要添加协议存根。点击 **Fix** 并添加它们，你会看到结构体中添加了两个类型别名：`Entry` 和 `Intent`。


    2.  在 `IntentProvider` 结构体中，将 `Entry` 的类型占位符替换为 `WidgetEvent`（一种时间线条目类型）。同时，将
    `Intent` 的类型占位符替换为 `EventCategoryIntent`。`EventCategoryIntent` 这个名称源于你之前在意图定义文件（即
    `EventCategory.intentdefinition`）中创建的自定义意图 `EventCategory`。


    **提示** 在 `IntentProvider` 中将 `Intent` 的类型占位符替换为 `EventCategoryIntent` 时，最好亲自输入
    `EventCategoryIntent` 来检查 Xcode 是否会给出自动补全。这有助于你确认 `EventCategoryIntent` 是否已被 Xcode
    生成。


    ```

    import SwiftUI

    import WidgetKit

    struct IntentProvider: IntentTimelineProvider {

    }

    代码清单 4-4

    创建遵循 IntentTimelineProvider 的 IntentProvider

