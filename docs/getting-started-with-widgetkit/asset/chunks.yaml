- fmt: "### Addition of Tap Target in Small Widget\n\nIn small widgets, you can add\
    \ a tap target using the `widgetURL(_:)` method. It is an instance method of `View`,\
    \ and it sets the URL to open in the app when users tap a widget. Another `View`\
    \ method `onOpenURL(perform:)` detects if any deep link is trying to open the\
    \ app, and that is where you perform necessary operations to make navigation to\
    \ different screens possible. So, in the case of small widgets, these two methods\
    \ play the key role to make navigation possible.\n\nNow let's set things up!\n\
    \nThe `widgetURL(_:)` method takes a URL as an argument in order to set that URL\
    \ for opening the app when its small widget is tapped. So, it is necessary to\
    \ create a URL for the `widgetURL(_:)` method (which you will implement later).\
    \ But what will you use to generate a URL? You will surely need a name or some\
    \ other string for that. What about using the name of the selected category itself?\
    \ That will be a nice way since you will get both the URL and the selected category\
    \ value which you will use in the app's homescreen to display the events lying\
    \ in that category. Now, follow the given steps to develop a mechanism for generating\
    \ a URL:\n\n1. Open **CategoriesExtension.swift** from the **Intent** folder of\
    \ **OnThisDayWidget**.\n\n2. In the extension of `Categories`, copy the code of\
    \ Listing [4-19](#505356_1_En_4_Chapter.xhtml#PC21) and paste it there to define\
    \ a property, `eventType`, of type `EventType`.\n\n```\nvar eventType: EventType\
    \ {\n    switch self {\n    case .unknown, .all: return .all\n    case .births:\
    \ return .births\n    case .deaths: return .deaths\n    case .events: return .events\n\
    \    case .holidays: return .holidays\n    case .selected: return .selected\n\
    \    }\n}\nListing 4-19\nCreating an eventType property in the Categories extension\n\
    ```\n\n`eventType` was created in the `Categories` extension because you need\
    \ to generate a `String` from the selected category of `Categories` type for creating\
    \ a URL. Since `EventType` conforms to `String` and its `rawValue` property can\
    \ be accessed to get the string of the selected category, you created `eventType`\
    \ to map all the cases of `Categories` with `EventType` and get the string `rawValue`.\n\
    \n3. After that, open **SmallWidgetView.swift** in the **Views** folder of the\
    \ **OnThisDayWidget** folder.\n\n4. Replace the body of `SmallWidgetView` with\
    \ the code given in Listing [4-20](#505356_1_En_4_Chapter.xhtml#PC22).\n\n```\n\
    var body: some View {\n    HStack {\n        VStack(alignment: .leading) {\n \
    \           Text(eventCount.description)\n                .font(.system(size:\
    \ 40,\n                              weight: .medium))\n                .foregroundColor(.red)\n\
    \            Text(category.detail)\n                .font(.body)\n           \
    \ Text(\"took place on\")\n                .font(.body)\n            Text(DateHelper.today\
    \ + \".\")\n                .font(.headline)\n        }\n        Spacer()\n  \
    \  }\n    .padding([.leading, .top, .bottom])\n    .widgetURL(URL(string: category.eventType.rawValue))\n\
    }\nListing 4-20\nThe body of SmallWidgetView after adding widgetURL(_:)\n```\n\
    \nIn Listing [4-20](#505356_1_En_4_Chapter.xhtml#PC22), the `widgetURL(_:)` method\
    \ is called by passing a URL created using the `rawValue` property of the `eventType`\
    \ property of `category` as an argument.\n\n5. Open **HomeView.swift** from the\
    \ **Views** folder of **OnThisDay**. In HomeView, create a method, `handleLinks(for:)`,\
    \ to handle deep linking and copy the code in Listing [4-21](#505356_1_En_4_Chapter.xhtml#PC23)\
    \ and paste it there.\n\n```\nfunc handleLinks(for url: URL) {\n    if let type\
    \ = EventType(rawValue: url.absoluteString) {\n        self.type = type\n    }\n\
    }\nListing 4-21\nImplementation of handleLinks(for:)\n```\n\nIn Listing [4-21](#505356_1_En_4_Chapter.xhtml#PC23),\
    \ the `handleLinks(for:)` method is implemented. The `absoluteString`^([^(10)](#fn10))\
    \ property of `url` is accessed to get its string value, and the string value\
    \ is passed to the `EventType` initializer that takes `rawValue` as an argument\
    \ and tries to convert it to an `EventType` case. If a valid `EventType` case\
    \ is generated, then it is stored in the `type` variable. At last, the `type`\
    \ variable of `HomeView` is set to the value of the `type` variable of the `if-let`\
    \ condition. Here, the `type` variable of `HomeView` is a `@State` variable that\
    \ stores the selected event category/event type and displays the events accordingly.\n\
    \n6. Now, go to the `body` of `HomeView`. This is where you will call `onOpenURL(perform:)`\
    \ to detect if a deep link is trying to launch your app. Below the `onAppear(perform:)`\
    \ function call in the `body` of `HomeView`, add the function call to `onOpenURL(perform:)`\
    \ and make the changes shown in Listing [4-22](#505356_1_En_4_Chapter.xhtml#PC24).\n\
    \n```\nvar body: some View {\n    NavigationView {\n        // Some lines of code\
    \ have been removed to make viewing easier\n    }\n    // Some lines of code have\
    \ been removed to make viewing easier\n    .onAppear(perform: initiateDataFetch)\n\
    \    .onOpenURL { url in\n        handleLinks(for: url)\n    }\n}\nListing 4-22\n\
    HomeView's body after calling onOpenURL(perform:)\n```\n\nIn Listing [4-22](#505356_1_En_4_Chapter.xhtml#PC24),\
    \ the `onOpenURL(perform:)` method is called, whose completion handler gives a\
    \ parameter, `url`. That parameter is passed to `handleLinks(for:)`, which performs\
    \ the work of filtering the data and setting up the view to display events related\
    \ to the selected event category/type.\n\n**Note**\n\nThe call to `onOpenURL(perform:)`\
    \ is performed in the body of `HomeView` because `HomeView` is the main view that\
    \ gets loaded from the entry point of the app, that is, `OnThisDayApp`. You will\
    \ see it if you open the **OnThisDayApp.swift** file in the **OnThisDay** folder.\n\
    \nHowever, you could have called `onOpenURL(perform:)` from the `OnThisDayApp`\
    \ struct using the instance of `HomeView`. But due to the availability of the\
    \ data needed for performing necessary operations, you called it from the `body`\
    \ of `HomeView`.\n\nSwiftUI has given you the freedom to call `onOpenURL(perform:)`\
    \ from any of these locations according to your preference and ease.\n\nNow, build\
    \ and run the project. Try changing the selected category of the events by long\
    \ pressing the small widget, tapping **Edit Widget**, and modifying the value\
    \ of the **Categories** field. Then, wait for the widget display information about\
    \ the events of the selected category. After the fresh information is displayed\
    \ in the widget, tap the widget to see the homescreen of the app displaying the\
    \ list of events related to the selected category.\n\nWell done! You have successfully\
    \ added a tap target in your small widget and utilized the power of deep linking\
    \ to make your app display relevant information."
  raw: '### Addition of Tap Target in Small Widget


    In small widgets, you can add a tap target using the `widgetURL(_:)` method .
    It is an instance method of `View`, and it sets the URL to open in the app when
    users tap a widget. Another `View` method `onOpenURL(perform:)` detects if any
    deep link is trying to open the app, and that is where you perform necessary operations
    to make navigation to different screens possible. So, in the case of small widgets,
    these two methods play the key role to make navigation possible.


    Now let’s set things up!


    The `widgetURL(_:)` method takes a URL as an argument in order to set that URL
    for opening the app when its small widget is tapped. So, it is necessary to create
    a URL for the `widgetURL(_:)` method (which you will implement later). But what
    will you use to generate a URL? You will surely need a name or some other string
    for that. What about using the name of the selected category itself? That will
    be a nice way since you will get both the URL and the selected category value
    which you will use in the app’s homescreen to display the events lying in that
    category. Now, follow the given steps to develop a mechanism for generating a
    URL:


    1.  Open **CategoriesExtension.swift** from the **Intent** folder of **OnThisDayWidget**.


    2.  In the extension of `Categories`, copy the code of Listing [4-19](#505356_1_En_4_Chapter.xhtml#PC21)
    and paste it there to define a property, `eventType`, of type `EventType`.


    ```

    var eventType: EventType {

    switch self {

    case .unknown, .all: return .all

    case .births: return .births

    case .deaths: return .deaths

    case .events: return .events

    case .holidays: return .holidays

    case .selected: return .selected

    }

    }

    Listing 4-19

    Creating an eventType property in the Categories extension

    ```


    `eventType` was created in the `Categories` extension because you need to generate
    a `String` from the selected category of `Categories` type for creating a URL.
    Since `EventType` conforms to `String` and its `rawValue` property can be accessed
    to get the string of the selected category, you created `eventType` to map all
    the cases of `Categories` with `EventType` and get the string `rawValue`.


    1.  After that, open **SmallWidgetView.swift** in the **Views** folder of the
    **OnThisDayWidget** folder.


    2.  Replace the body of `SmallWidgetView` with the code given in Listing [4-20](#505356_1_En_4_Chapter.xhtml#PC22).


    ```

    var body: some View {

    HStack {

    VStack(alignment: .leading) {

    Text(eventCount.description)

    .font(.system(size: 40,

    weight: .medium))

    .foregroundColor(.red)

    Text(category.detail)

    .font(.body)

    Text("took place on")

    .font(.body)

    Text(DateHelper.today + ".")

    .font(.headline)

    }

    Spacer()

    }

    .padding([.leading, .top, .bottom])

    .widgetURL(URL(string: category.eventType.rawValue))

    }

    Listing 4-20

    The body of SmallWidgetView after adding widgetURL(_:)

    ```


    In Listing [4-20](#505356_1_En_4_Chapter.xhtml#PC22), the `widgetURL(_:)` method
    is called by passing a URL created using the `rawValue` property of the `eventType`
    property of `category` as an argument.


    1.  Open **HomeView.swift** from the **Views** folder of **OnThisDay**. In HomeView,
    create a method, `handleLinks(for:)`, to handle deep linking and copy the code
    in Listing [4-21](#505356_1_En_4_Chapter.xhtml#PC23) and paste it there.


    ```

    func handleLinks(for url: URL) {

    if let type = EventType(rawValue: url.absoluteString) {

    self.type = type

    }

    }

    Listing 4-21

    Implementation of handleLinks(for:)

    ```


    In Listing [4-21](#505356_1_En_4_Chapter.xhtml#PC23), the `handleLinks(for:)`
    method is implemented. The `absoluteString`^([^(10)](#fn10)) property of `url`
    is accessed to get its string value, and the string value is passed to the `EventType`
    initializer that takes `rawValue` as an argument and tries to convert it to an
    `EventType` case. If a valid `EventType` case is generated, then it is stored
    in the `type` variable. At last, the `type` variable of `HomeView` is set to the
    value of the `type` variable of the `if-let` condition. Here, the `type` variable
    of `HomeView` is a `@State` variable that stores the selected event category/event
    type and displays the events accordingly.


    1.  Now, go to the `body` of `HomeView`. This is where you will call `onOpenURL(perform:)`
    to detect if a deep link is trying to launch your app. Below the `onAppear(perform:)`
    function call in the `body` of `HomeView`, add the function call to `onOpenURL(perform:)`
    and make the changes shown in Listing [4-22](#505356_1_En_4_Chapter.xhtml#PC24).


    ```

    var body: some View {

    NavigationView {

    // Some lines of code have been removed to make viewing easier

    }

    // Some lines of code have been removed to make viewing easier

    .onAppear(perform: initiateDataFetch)

    .onOpenURL { url in

    handleLinks(for: url)

    }

    }

    Listing 4-22

    HomeView’s body after calling onOpenURL(perform:)

    ```


    In Listing [4-22](#505356_1_En_4_Chapter.xhtml#PC24), the `onOpenURL(perform:)`
    method is called, whose completion handler gives a parameter, `url`. That parameter
    is passed to `handleLinks(for:)`, which performs the work of filtering the data
    and setting up the view to display events related to the selected event category/type.


    Note


    The call to `onOpenURL(perform:)` is performed in the body of `HomeView` because
    `HomeView` is the main view that gets loaded from the entry point of the app,
    that is, `OnThisDayApp`. You will see it if you open the **OnThisDayApp.swift**
    file in the **OnThisDay** folder.


    However, you could have called `onOpenURL(perform:)` from the `OnThisDayApp` struct
    using the instance of `HomeView`. But due to the availability of the data needed
    for performing necessary operations, you called it from the `body` of `HomeView`.


    SwiftUI has given you the freedom to call `onOpenURL(perform:)` from any of these
    locations according to your preference and ease.


    Now, build and run the project. Try changing the selected category of the events
    by long pressing the small widget, tapping **Edit Widget**, and modifying the
    value of the **Categories** field. Then, wait for the widget display information
    about the events of the selected category. After the fresh information is displayed
    in the widget, tap the widget to see the homescreen of the app displaying the
    list of events related to the selected category.


    Well done! You have successfully added a tap target in your small widget and utilized
    the power of deep linking to make your app display relevant information.'
  trans: "\n### 在小部件中添加点击目标\n\n在小尺寸部件中，您可以使用 `widgetURL(_:)` 方法来添加点击目标。它是 `View` 的一个实例方法，用于设置在用户点击部件时要在应用中打开的\
    \ URL。另一个 `View` 方法 `onOpenURL(perform:)` 用于检测是否有深层链接试图打开应用，您可以在该方法中执行必要操作，从而实现对不同屏幕的导航。因此，在小尺寸部件的场景下，这两个方法在实现导航功能中起着关键作用。\n\
    \n现在，让我们开始设置吧！\n\n`widgetURL(_:)` 方法接受一个 URL 作为参数，以便设置当小部件被点击时打开应用的 URL。因此，有必要为\
    \ `widgetURL(_:)` 方法创建一个 URL（您稍后将实现该方法）。但您将使用什么来生成 URL 呢？您肯定需要一个名称或其他字符串。使用所选类别本身的名称怎么样？这将是一个好方法，因为您既可以得到\
    \ URL，又可以得到所选类别的值，您可以在应用的主屏幕中使用该值来显示该类别中的事件。现在，请按照以下步骤开发用于生成 URL 的机制：\n\n1.  从\
    \ **OnThisDayWidget** 的 **Intent** 文件夹中打开 **CategoriesExtension.swift**。\n\n2.\
    \  在 `Categories` 的扩展中，复制代码清单 4-19 中的代码并粘贴到此处，定义一个类型为 `EventType` 的属性 `eventType`。\n\
    \n```\nvar eventType: EventType {\n    switch self {\n    case .unknown, .all:\
    \ return .all\n    case .births: return .births\n    case .deaths: return .deaths\n\
    \    case .events: return .events\n    case .holidays: return .holidays\n    case\
    \ .selected: return .selected\n    }\n}\n代码清单 4-19\n在 Categories 扩展中创建 eventType\
    \ 属性\n```\n\n之所以在 `Categories` 扩展中创建 `eventType`，是因为您需要从 `Categories` 类型的选定类别中生成一个\
    \ `String` 来创建 URL。由于 `EventType` 遵循 `String` 协议，并且可以访问其 `rawValue` 属性来获取所选类别的字符串，因此您创建了\
    \ `eventType`，将 `Categories` 的所有 case 与 `EventType` 进行映射，并获取字符串形式的 `rawValue`。\n\
    \n3.  之后，从 **OnThisDayWidget** 文件夹的 **Views** 文件夹中打开 **SmallWidgetView.swift**。\n\
    \n4.  用代码清单 4-20 中给出的代码替换 `SmallWidgetView` 的主体。\n\n```\nvar body: some View {\n\
    \    HStack {\n        VStack(alignment: .leading) {\n            Text(eventCount.description)\n\
    \                .font(.system(size: 40,\n                              weight:\
    \ .medium))\n                .foregroundColor(.red)\n            Text(category.detail)\n\
    \                .font(.body)\n            Text(\"took place on\")\n         \
    \       .font(.body)\n            Text(DateHelper.today + \".\")\n           \
    \     .font(.headline)\n        }\n        Spacer()\n    }\n    .padding([.leading,\
    \ .top, .bottom])\n    .widgetURL(URL(string: category.eventType.rawValue))\n\
    }\n代码清单 4-20\n添加 widgetURL(_:) 后的 SmallWidgetView 主体\n```\n\n在代码清单 4-20 中，通过传递一个使用\
    \ `category` 的 `eventType` 属性的 `rawValue` 属性创建的 URL 作为参数来调用 `widgetURL(_:)` 方法。\n\
    \n5.  从 **OnThisDay** 的 **Views** 文件夹中打开 **HomeView.swift**。在 HomeView 中，创建一个方法\
    \ `handleLinks(for:)` 来处理深层链接，并复制代码清单 4-21 中的代码粘贴到此处。\n\n```\nfunc handleLinks(for\
    \ url: URL) {\n    if let type = EventType(rawValue: url.absoluteString) {\n \
    \       self.type = type\n    }\n}\n代码清单 4-21\n实现 handleLinks(for:)\n```\n\n在代码清单\
    \ 4-21 中，实现了 `handleLinks(for:)` 方法。访问 `url` 的 `absoluteString`^((10)) 属性以获取其字符串值，然后将该字符串值传递给接受\
    \ `rawValue` 作为参数并尝试将其转换为 `EventType` case 的 `EventType` 初始化器。如果生成了有效的 `EventType`\
    \ case，则将其存储在 `type` 变量中。最后，将 `HomeView` 的 `type` 变量设置为 `if-let` 条件中 `type` 变量的值。此处，`HomeView`\
    \ 的 `type` 变量是一个 `@State` 变量，用于存储选定的事件类别/事件类型并相应地显示事件。\n\n6.  现在，转到 `HomeView`\
    \ 的 `body`。您将在此处调用 `onOpenURL(perform:)` 来检测是否有深层链接正试图启动您的应用。在 `HomeView` 的 `body`\
    \ 中的 `onAppear(perform:)` 函数调用下方，添加对 `onOpenURL(perform:)` 的函数调用，并按照代码清单 4-22\
    \ 所示进行更改。\n\n```\nvar body: some View {\n    NavigationView {\n        // 为便于查看，已删除部分代码行\n\
    \    }\n    // 为便于查看，已删除部分代码行\n    .onAppear(perform: initiateDataFetch)\n   \
    \ .onOpenURL { url in\n        handleLinks(for: url)\n    }\n}\n代码清单 4-22\n调用\
    \ onOpenURL(perform:) 后的 HomeView 主体\n```\n\n在代码清单 4-22 中，调用了 `onOpenURL(perform:)`\
    \ 方法，其完成处理器提供了一个参数 `url`。该参数被传递给 `handleLinks(for:)`，后者执行数据过滤工作，并设置视图以显示与所选事件类别/类型相关的事件。\n\
    \n**注意**\n\n对 `onOpenURL(perform:)` 的调用是在 `HomeView` 的 `body` 中执行的，因为 `HomeView`\
    \ 是从应用入口点（即 `OnThisDayApp`）加载的主视图。如果您打开 **OnThisDay** 文件夹中的 **OnThisDayApp.swift**\
    \ 文件，就会看到这一点。\n\n但是，您也可以使用 `HomeView` 的实例从 `OnThisDayApp` 结构体中调用 `onOpenURL(perform:)`。但由于执行必要操作所需数据的可用性原因，您是从\
    \ `HomeView` 的 `body` 中调用它的。\n\nSwiftUI 允许您根据偏好和便利性，从这些位置中的任意一处调用 `onOpenURL(perform:)`。\n\
    \n现在，构建并运行项目。尝试通过长按小部件、点击 **编辑小部件** 并修改 **类别** 字段的值来更改事件的选定类别。然后，等待小部件显示选定类别事件的信息。当小部件显示更新后的信息后，点击小部件即可看到应用主屏幕显示与所选类别相关的事件列表。\n\
    \n干得好！您已成功在小尺寸部件中添加了点击目标，并利用深层链接的强大功能使您的应用能够显示相关信息。\n"
- fmt: '### Addition of Tap Target in Medium Widget


    As shown in Figure [4-18](#505356_1_En_4_Chapter.xhtml#Fig18), you can have multiple
    tap targets in your medium and large widgets. So, in this section, you will add
    tap targets in your medium widget.


    In the medium widget, there are three regions where you can add tap targets. Open
    and preview `MediumWidgetView` so that it becomes easier for you to understand.


    The first region/view is `eventCountView` that displays the number of events that
    took place on a particular date. It resembles your small widget.


    The next region is the one where two events are listed. The `eventDetail(with:)`
    method is responsible to display that region. Each of them can have its own tap
    target that takes users to its detail screen.


    And below that region, there is a `todayEvents` view that displays the number
    of remaining events that could not be accommodated in the widget view, but are
    displayed when the app is launched.


    You must have noticed that the only region which will have a tap target that will
    perform a different function is the `eventDetail(with:)` method. Otherwise, no
    matter where you tap in the medium widget, users are supposed to be taken to the
    app’s homescreen displaying a list of events related to the currently selected
    category. So, like in your small widget, you can call `widgetURL(_:)` from one
    of your views of your medium widget. Later, to add a tap target in the `eventDetail(with:)`
    method, you will use some other way than `widgetURL(_:)`.


    Since you have already performed the setup necessary to handle deep links during
    the "Addition of Tap Target in Small Widget" (step 5 onward), now you can simply
    call `widgetURL(_:)` from any view among `eventCountView` and `todayEvents` to
    make things work. Let''s call `widgetURL(_:)` from `eventCountView`. Listing [4-23](#505356_1_En_4_Chapter.xhtml#PC25)
    shows the addition of the call to `widgetURL(_:)` in `eventCountView`.


    ```swift

    var eventCountView: some View {

    HStack {

    VStack(alignment: .leading) {

    Text(events.count.description)

    .font(.system(size: 40,

    weight: .medium))

    .foregroundColor(.red)

    Text(category.detail)

    .font(.body)

    Text("took place on")

    .font(.body)

    Text(DateHelper.today + ".")

    .font(.headline)

    }

    }

    .padding(.trailing)

    .widgetURL(URL(string: category.eventType.rawValue))

    }

    ```


    In Listing [4-23](#505356_1_En_4_Chapter.xhtml#PC25), `widgetURL(_:)` was called
    in `eventCountView` by passing the URL created using the string generated by accessing
    the `rawValue` property of the `eventType` property of `category`, which is the
    selected category.


    After adding the code in Listing [4-23](#505356_1_En_4_Chapter.xhtml#PC25), build
    and run the widget. Now, if you tap anywhere in the medium widget, you will get
    taken to the app''s homescreen that lists the events related to the selected category.


    However, if you remember, the region that displays brief information about two
    events at the right side of the widget is supposed to take users to their detail
    screens in the app to provide more relevant information. It''s time to set it
    up.


    In the case of the small widget, all you needed for the app to display the list
    of events of a selected category was the name of the selected category itself.
    And you created a URL using that category name and set it via `widgetURL(_:)`.
    When the widget was tapped, `onOpenURL(perform:)` would detect the deep link and
    the app would get launched and the homescreen with the list was displayed.


    But you need a different mechanism to handle the case when an event is tapped
    in the medium (or large) widget, and the app should launch to open the detail
    screen of that particular event. Unlike in the small widget, here, you require
    both the event information (which will be used for the detail screen) and the
    selected category (which will be used to display the list of events of that particular
    category when users decide to go back to the app''s homescreen).


    As you will use deep linking for this case too, you will surely have to create
    a URL. So, why not generate a URL that will not only contain the selected category
    but also the text of the event? And to make the app sure about the screen it should
    navigate to when that particular deep link is detected, why not include some information
    about that screen too? It may not be very useful currently, but in scenarios where
    your app may have deep links for navigating to various screens, it can surely
    come handy.


    So, let''s create a mechanism that generates the URL containing the information
    about the selected category, the text of the event, and the name of the screen
    the app should navigate to:


    1.  In the **OnThisDayWidget** folder, create a new folder, **Constants**.

    2.  In **Constants**, create a new Swift file named **LinkConstants.swift**. While
    creating that file, make sure both **OnThisDay** and **OnThisDayWidgetExtension**
    targets are checked.

    3.  Copy the code in Listing [4-24](#505356_1_En_4_Chapter.xhtml#PC26) and paste
    it in **LinkConstants.swift**.


    ```swift

    struct LinkConstants {

    // a

    static let detailScheme = "detail"

    // b

    static func detail(with text: String, category: Categories) -> URL? {

    // c

    let queryItem = URLQueryItem(name: "text", value: text)

    // d

    var urlComponents = URLComponents()

    urlComponents.scheme = Self.detailScheme

    urlComponents.host = category.eventType.rawValue

    urlComponents.queryItems = [queryItem]

    // e

    if let url = urlComponents.url {

    return url

    }

    return nil

    }

    }

    ```


    In Listing [4-24](#505356_1_En_4_Chapter.xhtml#PC26), the `LinkConstants` struct
    is created, and the following things take place in it:


    1.  A static property, `detailScheme`, is defined, and its value is set to `"detail"`.
    You will use this property to let the app know that the deep link wants it to
    navigate to the detail screen of an event.

    2.  A static `detail(with:category:)` method is created. It is where your URL
    will be generated.

    3.  A `URLQueryItem` with its `name` parameter, `text`, and its `value` parameter
    set to the `text` received as an argument from `detail(with:category:)` is defined
    and stored in `queryItem`.

    4.  By creating an instance of `URLComponents` and storing it in `urlComponents`,
    the work of creating a URL is started here. The scheme is set to `detailScheme`,
    the host is set to the string form of `category`, and `queryItems` is set to an
    array containing the `queryItem` variable you created in step "a."

    5.  Using `if-let`, it is checked if a valid URL has been generated or not. If
    a valid URL is generated, it is stored in `url` and returned. Else, the method
    returns `nil`. A sample of the URL that is created is `detail://births?text=Cory%20Paix,%20Australian%20rugby%20league%20player`.


    In this way, you have developed a mechanism to generate URLs using the selected
    category, the text of the event, and the destination screen''s name.


    Now, let''s use the `detail(with:category:)` method you just created in `LinkConstants`
    and also set up the view of the medium widget for enabling navigation:


    1.  Open `MediumWidgetView` and replace `todayEvents` with the code given in Listing
    [4-25](#505356_1_En_4_Chapter.xhtml#PC27).


    ```swift

    var todayEvents: some View {

    VStack(spacing: 0) {

    ForEach(events.prefix(2)) { event in

    // a

    if let url = LinkConstants.detail(with: event.text, category: category) {

    Link(destination: url, label: {

    eventDetail(with: event)

    })

    } else {

    eventDetail(with: event)

    }

    }

    if events.count > 2 {

    HStack {

    Spacer()

    Text("\(events.count - 2) more")

    .font(.footnote)

    .padding(.trailing)

    .padding(.bottom, 8)

    }

    }

    }

    }

    ```'
  raw: '### Addition of Tap Target in Medium Widget


    As shown in Figure [4-18](#505356_1_En_4_Chapter.xhtml#Fig18), you can have multiple
    tap targets in your medium and large widgets. So, in this section, you will add
    tap targets in your medium widget.


    In the medium widget, there are three regions where you can add tap targets. Open
    and preview `MediumWidgetView` so that it becomes easier for you to understand.


    The first region/view is `eventCountView` that displays the number of events that
    took place on a particular date. It resembles your small widget.


    The next region is the one where two events are listed. The `eventDetail(with:)`
    method is responsible to display that region. Each of them can have its own tap
    target that takes users to its detail screen.


    And below that region, there is a `todayEvents` view that displays the number
    of remaining events that could not be accommodated in the widget view, but are
    displayed when the app is launched.


    You must have noticed that the only region which will have a tap target that will
    perform a different function is the `eventDetail(with:)` method. Otherwise, no
    matter where you tap in the medium widget, users are supposed to be taken to the
    app’s homescreen displaying a list of events related to the currently selected
    category. So, like in your small widget, you can call `widgetURL(_:)` from one
    of your views of your medium widget. Later, to add a tap target in the `eventDetail(with:)`
    method, you will use some other way than `widgetURL(_:)`.


    Since you have already performed the setup necessary to handle deep links during
    the “Addition of Tap Target in Small Widget” (step 5 onward), now you can simply
    call `widgetURL(_:)` from any view among `eventCountView` and `todayEvents` to
    make things work. Let’s call `widgetURL(_:)` from `eventCountView`. Listing [4-23](#505356_1_En_4_Chapter.xhtml#PC25)
    shows the addition of the call to `widgetURL(_:)` in `eventCountView`.


    ```

    var eventCountView: some View {

    HStack {

    VStack(alignment: .leading) {

    Text(events.count.description)

    .font(.system(size: 40,

    weight: .medium))

    .foregroundColor(.red)

    Text(category.detail)

    .font(.body)

    Text("took place on")

    .font(.body)

    Text(DateHelper.today + ".")

    .font(.headline)

    }

    }

    .padding(.trailing)

    .widgetURL(URL(string: category.eventType.rawValue))

    }

    Listing 4-23

    Calling widgetURL(_:) from eventCountView

    ```


    In Listing [4-23](#505356_1_En_4_Chapter.xhtml#PC25), `widgetURL(_:)` was called
    in `eventCountView` by passing the URL created using the string generated by accessing
    the `rawValue` property of the `eventType` property of `category`, which is the
    selected category.


    After adding the code in Listing [4-23](#505356_1_En_4_Chapter.xhtml#PC25), build
    and run the widget. Now, if you tap anywhere in the medium widget, you will get
    taken to the app’s homescreen that lists the events related to the selected category.


    However, if you remember, the region that displays brief information about two
    events at the right side of the widget is supposed to take users to their detail
    screens in the app to provide more relevant information. It’s time to set it up.


    In the case of the small widget, all you needed for the app to display the list
    of events of a selected category was the name of the selected category itself.
    And you created a URL using that category name and set it via `widgetURL(_:)`.
    When the widget was tapped, `onOpenURL(perform:)` would detect the deep link and
    the app would get launched and the homescreen with the list was displayed.


    But you need a different mechanism to handle the case when an event is tapped
    in the medium (or large) widget, and the app should launch to open the detail
    screen of that particular event. Unlike in the small widget, here, you require
    both the event information (which will be used for the detail screen) and the
    selected category (which will be used to display the list of events of that particular
    category when users decide to go back to the app’s homescreen).


    As you will use deep linking for this case too, you will surely have to create
    a URL. So, why not generate a URL that will not only contain the selected category
    but also the text of the event? And to make the app sure about the screen it should
    navigate to when that particular deep link is detected, why not include some information
    about that screen too? It may not be very useful currently, but in scenarios where
    your app may have deep links for navigating to various screens, it can surely
    come handy.


    So, let’s create a mechanism that generates the URL containing the information
    about the selected category, the text of the event, and the name of the screen
    the app should navigate to:


    1.  In the **OnThisDayWidget** folder, create a new folder, **Constants**.


    2.  In **Constants**, create a new Swift file named **LinkConstants.swift**. While
    creating that file, make sure both **OnThisDay** and **OnThisDayWidgetExtension**
    targets are checked.


    3.  Copy the code in Listing [4-24](#505356_1_En_4_Chapter.xhtml#PC26) and paste
    it in **LinkConstants.swift**.


    ```

    struct LinkConstants {

    // a

    static let detailScheme = "detail"

    // b

    static func detail(with text: String, category: Categories) -> URL? {

    // c

    let queryItem = URLQueryItem(name: "text", value: text)

    // d

    var urlComponents = URLComponents()

    urlComponents.scheme = Self.detailScheme

    urlComponents.host = category.eventType.rawValue

    urlComponents.queryItems = [queryItem]

    // e

    if let url = urlComponents.url {

    return url

    }

    return nil

    }

    }

    Listing 4-24

    Creating a LinkConstants struct

    ```


    In Listing [4-24](#505356_1_En_4_Chapter.xhtml#PC26), the `LinkConstants` struct
    is created, and the following things take place in it:


    1.  A static property, `detailScheme`, is defined, and its value is set to `"detail"`.
    You will use this property to let the app know that the deep link wants it to
    navigate to the detail screen of an event.


    2.  A static `detail(with:category:)` method is created. It is where your URL
    will be generated.


    3.  A `URLQueryItem` with its `name` parameter, `text`, and its `value` parameter
    set to the `text` received as an argument from `detail(with:category:)` is defined
    and stored in `queryItem`.


    4.  By creating an instance of `URLComponents` and storing it in `urlComponents`,
    the work of creating a URL is started here. The scheme is set to `detailScheme`,
    the host is set to the string form of `category`, and `queryItems` is set to an
    array containing the `queryItem` variable you created in step “a.”


    5.  Using `if-let`, it is checked if a valid URL has been generated or not. If
    a valid URL is generated, it is stored in `url` and returned. Else, the method
    returns `nil`. A sample of the URL that is created is `detail://births?text=Cory%20Paix,%20Australian%20rugby%20league%20player`.


    In this way, you have developed a mechanism to generate URLs using the selected
    category, the text of the event, and the destination screen’s name.


    Now, let’s use the `detail(with:category:)` method you just created in `LinkConstants`
    and also set up the view of the medium widget for enabling navigation:


    1.  Open `MediumWidgetView` and replace `todayEvents` with the code given in Listing
    [4-25](#505356_1_En_4_Chapter.xhtml#PC27).


    ```

    var todayEvents: some View {

    VStack(spacing: 0) {

    ForEach(events.prefix(2)) { event in

    // a

    if let url = LinkConstants.detail(with: event.text, category: category) {

    Link(destination: url, label: {

    eventDetail(with: event)

    })

    } else {

    eventDetail(with: event)

    }

    }

    if events.count > 2 {

    HStack {

    Spacer()

    Text("\(events.count - 2) more")

    .font(.footnote)

    .padding(.trailing)

    .padding(.bottom, 8)

    }

    }

    }

    }

    Listing 4-25

    todayEvents with the Link view

    ```'
