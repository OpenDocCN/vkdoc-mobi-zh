  \ `EventCategory.intentdefinition`）中创建的自定义意图 `EventCategory`。\n\n**提示** 在 `IntentProvider`\
  \ 中将 `Intent` 的类型占位符替换为 `EventCategoryIntent` 时，最好亲自输入 `EventCategoryIntent` 来检查\
  \ Xcode 是否会给出自动补全。这有助于你确认 `EventCategoryIntent` 是否已被 Xcode 生成。\n\n```\nimport SwiftUI\n\
  import WidgetKit\nstruct IntentProvider: IntentTimelineProvider {\n}\n代码清单 4-4\n\
  创建遵循 IntentTimelineProvider 的 IntentProvider\n```\n\n现在，你的代码应该类似于代码清单 4-5 中的代码。\n\
  \n1.  此时，Xcode 应该仍在提示你添加协议存根。也请添加这些存根，你会发现生成了 `placeholder(in:)`、`getSnapshot(for:in:completion:)`\
  \ 和 `getTimeline(for:in:completion:)` 方法。\n\n2.  现在，你可以通过从 `Provider.swift` 的方法中复制粘贴代码来填充这些方法，使\
  \ `IntentProvider` 看起来像代码清单 4-6 所示。\n\n**注意** 请记住，`IntentProvider` 中的方法与 `Provider`\
  \ 中的不同。`Provider` 拥有类似 `getSnapshot(in:completion:)` 和 `getTimeline(in:completion:)`\
  \ 的方法，而 `IntentProvider` 拥有类似 `getSnapshot(for:in:completion:)` 和 `getTimeline(for:in:completion:)`\
  \ 的方法。\n\n因此，在从 `Provider` 复制代码时，请确保不要复制整个方法，而只复制这些方法花括号内的行。为简便起见，你可以直接复制代码清单 4-6\
  \ 中的代码。\n\n```\nimport SwiftUI\nimport WidgetKit\nstruct IntentProvider: IntentTimelineProvider\
  \ {\ntypealias Entry = WidgetEvent\ntypealias Intent = EventCategoryIntent\n}\n\
  代码清单 4-5\n添加 Entry 和 Intent 类型后的 IntentProvider\n```\n\n1.  由于小组件中的时间线条目需要知道所选的事件类别，因此你必须修改时间线条目模型。在\
  \ **Model** 中找到 `WidgetEventData.swift`，并向 `WidgetEvent` 结构体添加一个 `Categories` 类型的新属性\
  \ `category`。`Categories` 是你之前在 `EventCategory.intentdefinition` 中定义的枚举。同时，将其默认值设置为\
  \ `.all`，作为默认选中的类别。现在，`WidgetEvent` 应该类似于代码清单 4-7。\n\n```\nimport SwiftUI\nimport\
