- "# 3. 编写你的第一个小组件\n\n现在终于来到本章，你将通过实际操作一个项目来大展身手。在本章中，你将为一个现有项目创建小组件扩展，并拆解该扩展以了解其构成——时间线、时间线提供器、小组件视图、占位视图、快照和小组件配置。\n\
  \n我们准备了一个入门项目，以便你可以直接开始创建其小组件。找到名为 `SoccerTimeStarter.zip` 的压缩文件并解压，即可开始处理该项目。\n\
  \n如果你已经成功解压并打开了 `SoccerTimeStarter` 文件夹中的 `SoccerTime.xcodeproj` 文件，你会知道 `SoccerTime`\
  \ 就是我们将要操作的项目。`SoccerTime` 是一个显示你喜爱球队即将进行的足球比赛详情的应用。它包含两个界面——一个用于添加即将到来的比赛（图 3-1），另一个用于显示你添加的比赛列表（图\
  \ 3-2）。启动应用以更清晰地了解其功能。\n\n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig2_HTML.png](img/505356_1_En_3_Fig2_HTML.png)\
  \  \n图 3-2  \n用户添加他们喜爱的即将到来比赛的界面\n\n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig1_HTML.png](img/505356_1_En_3_Fig1_HTML.png)\
  \  \n图 3-1  \n显示 `SoccerTime` 中即将到来比赛列表的界面\n\n现在有趣的部分来了——你将创建 `SoccerTime` 的小组件，它将显示你在应用中添加的即将到来比赛的信息。你将创建一个**小尺寸**的小组件，显示距离最近比赛的两队队徽以及比赛开始前的倒计时。该小组件将如图\
  \ 3-3 所示。\n\n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig3_HTML.jpg](img/505356_1_En_3_Fig3_HTML.jpg)\
  \  \n图 3-3  \n`SoccerTime` 的小尺寸小组件\n\n因此，第一步是向项目添加一个小组件扩展，下一节将详细描述所有步骤。\n\n\n\n\
  ## Widget 扩展\n\nWidget 扩展是一个模板，提供基础结构和样板代码，帮助你开始创建应用的小组件。它容纳你创建的小组件。苹果建议开发者将应用的所有小组件包含在单个\
  \ Widget 扩展中。不过，如有必要，也可以创建多个 Widget 扩展。\n\n请按照以下步骤为 `SoccerTime` 创建 Widget 扩展：\n\
  \n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig4_HTML.jpg](img/505356_1_En_3_Fig4_HTML.jpg)\n\
  \n图 3-4\n\n显示 `SoccerTimeWidgetExtension` 为所选方案的截图\n\n1.  打开 `SoccerTime.xcodeproj`。\n\
  2.  前往 **文件** ➤ **新建** ➤ **Target** ➤ **iOS**。\n3.  你可以向下滚动或使用筛选器找到 **Widget Extension**，然后双击它。\n\
  4.  此时会出现一个对话框，你需要执行以下操作：\n    1.  将**产品名称**设为 `SoccerTimeWidget`。\n    2.  将**团队**设为**无**或选择你的团队。\n\
  \    3.  取消勾选**包含配置意图**。\n    4.  确保 `SoccerTime` 是选中的**项目**。\n    5.  确认在**嵌入到应用程序**字段中，`SoccerTime`\
  \ 是选中的应用。\n    6.  点击**完成**。\n5.  点击完成后，Widget 扩展即可生成，Xcode 会询问最后一个问题：“激活‘SoccerTimeWidgetExtension’方案？”。点击**同意**激活该方案。之后你在\
  \ Xcode 屏幕中看到的变化如图 3-4 所示。\n\n完成上述步骤后，你首先会注意到项目中新增了 `SoccerTimeWidget` 文件夹。所有与小组件相关的内容都保存在这里。\n\
  \n从 `SoccerTimeWidget` 文件夹中打开 `SoccerTimeWidget.swift`，即可查看小组件构建块的样板代码。你将在此文件中进行修改以自定义小组件。接下来，我们将为你概述\
  \ `SoccerTimeWidget.swift` 中的所有构建块，并指导你对该文件进行修改，以便创建允许用户在主页面上查看即将到来比赛详情的小组件。\n\n\
  **注意：** 请注意文件检查器的目标成员资格部分中，`SoccerTimeWidget.swift` 的目标已设置为 `SoccerTimeWidgetExtension`，而非\
  \ `SoccerTime`。\n\n## TimelineEntry\n\n`TimelineEntry` 是一个协议，用于指定小组件的显示时机。它包含一个\
  \ `date` 属性来指示这一点。此外，它还能帮助系统判断小组件内容的相关性。`TimelineProvider` 通过管理一个或多个时间线条目来利用 `TimelineEntry`\
  \ 的这些能力，从而告知 `WidgetKit` 何时显示小组件。随后，`WidgetKit` 通过执行小组件配置的 `content` 块，并传入相应的时间线条目来渲染小组件。\n\
  \n**注意：** 我们明白你目前还不熟悉 `TimelineProvider` 和 `WidgetConfiguration`，但你将在后续章节中了解它们。目前你只需记住，`TimelineProvider`\
  \ 管理时间线条目，而 `WidgetConfiguration` 是配置小组件的地方。\n\n要使用 `TimelineEntry` 的特性，你需要创建一个符合该协议的结构体。由于它是\
  \ `WidgetConfiguration` 渲染小组件所需的一种模型类型，你必须确保添加 `WidgetConfiguration` 需要的所有属性。\n\n\
  在当前项目中，如果你前往 `SoccerTime` ➤ `Model` ➤ `Match.swift`，会看到一个应用用于存储比赛详情的模型。由于你的小组件将显示\
  \ `Match` 存储的相同详情，你可以直接使用这个模型。\n\n查看 `Match` 的结构，你会发现它符合 `Codable` 和 `Identifiable`\
  \ 协议。现在，为了让它也能用作时间线条目，需要使其符合 `TimelineEntry` 协议。为此，需要先导入 `WidgetKit`。因此，在 `Match.swift`\
  \ 中，将 `import WidgetKit` 这一行添加到代码的第一行（如代码清单 3-1 所示）。\n\n然后，通过修改 `Match` 使其遵循 `TimelineEntry`，使其像代码清单\
  \ 3-1 所示。\n\n```swift\nstruct Match: Codable, Identifiable, TimelineEntry {\n  \
  \  var id = UUID()\n    var primaryClub: String\n    var secondaryClub: String\n\
  \    var date: Date\n}\n```\n\n*代码清单 3-1：使模型符合 `TimelineEntry`*\n\n如果此时构建项目，你会遇到一个错误，提示“Match\
  \ does not conform to protocol 'TimelineEntry'。”这是因为符合 `TimelineEntry` 的结构体必须拥有一个\
  \ `Date` 类型的 `date` 属性。仔细查看 `Match`，你会发现已经有一个 `Date` 类型的属性，即 `time`。因此，你可以将其重命名为\
  \ `date`，因为 `time` 属性原本就是为了存储日期而存在的。\n\n现在构建项目，你会看到重命名影响了整个项目。在 `ListMatchView`、`MatchCell`\
  \ 和 `AddMatchView` 中会出现错误。将所有这些位置中的 `time` 重命名为 `date`，然后再次构建项目，你会发现所有错误都已消失。\n\n\
  \n\n## TimelineProvider\n\n`TimelineProvider` 可视为小组件的驱动力。它是一个协议，能让 WidgetKit 知道何时更新小组件的显示内容。该协议会获取\
  \ `TimelineEntry` 类型的条目，并在每个条目 `date` 属性中存储的时间点显示对应的条目。\n\n现在，你需要创建一个遵循 `TimelineProvider`\
  \ 的结构体。但在此之前，先在 `SoccerTimeWidget` 文件夹中创建一个名为 `SmallWidget` 的文件夹，用于存放与小组件小尺寸变体相关的所有文件。\n\
  \n随后，在 `SmallWidget` 文件夹中创建一个 Swift 文件，并将其命名为 `SmallWidgetDataProvider`。在点击“创建”之前，请确保在“Targets”部分勾选\
  \ `SoccerTimeWidgetExtension`，这样 `SmallWidgetDataProvider` 也能在小组件扩展中使用。\n\n现在，打开\
  \ `SmallWidgetDataProvider.swift`，并将文件中的现有代码替换为代码清单 3-2 中的内容。\n\n```\nimport SwiftUI\n\
  import WidgetKit\nstruct SmallWidgetDataProvider: TimelineProvider {\n}\n代码清单 3-2\n\
  创建 SmallWidgetDataProvider\n```\n\n代码清单 3-2 导入了 `SwiftUI` 和 `WidgetKit`，并创建了一个名为\
  \ `SmallWidgetDataProvider` 且遵循 `TimelineProvider` 协议的结构体。\n\n现在，你会看到一个错误提示：“Type\
  \ `SmallWidgetDataProvider` does not conform to protocol `TimelineProvider`”。这是因为你尚未实现该协议的方法。目前你可以先忽略这个错误。\n\
  \n接下来，在 `SmallWidgetDataProvider` 中添加一行代码 `typealias Entry = Match`。这行代码实现了 `TimelineProvider`\
  \ 协议中的 `Entry` 类型别名属性。如前所述，通过这种方式，你为 `SmallWidgetDataProvider`（一个时间线提供者）提供了一条时间线条目（`Match`）。构建项目。\n\
  \n现在，你一定会看到一个全新的错误：“Cannot find type `Match` in scope.”。出现这个错误的原因是 `Match.swift`\
  \ 不属于 `SoccerTimeWidgetExtension` 目标的一部分，因此它无法在小组件扩展中使用。如果打开 `Match.swift`，你会在文件检查器的“Target\
  \ Membership”部分看到，只有 `SoccerTime` 被勾选了，而 `SoccerTimeWidgetExtension` 没有被勾选。目前，“Target\
  \ Membership”部分的状态如图 3-5 所示。\n\n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig5_HTML.jpg](img/505356_1_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5\n\n显示 `Match.swift` 目标成员归属的截图\n\n由于你在 `SoccerTimeWidgetExtension` 中也需要使用\
  \ `Match`，请勾选它。\n\n现在该解决剩下的唯一错误了：“Type `SmallWidgetDataProvider` does not conform\
  \ to protocol `TimelineProvider`”。点击错误提示，然后点击**修复**。接着，Xcode 会生成 `TimelineProvider`\
  \ 方法的模板代码，代码看起来会与代码清单 3-3 类似。\n\n```\nimport WidgetKit\nimport SwiftUI\nstruct SmallWidgetDataProvider:\
  \ TimelineProvider {\ntypealias Entry = Match\nfunc placeholder(in context: Context)\
  \ -> Match {\n\n}\nfunc getSnapshot(in context: Context, completion: @escaping (Match)\
  \ -> Void) {\n\n}\nfunc getTimeline(in context: Context, completion: @escaping (Timeline)\
  \ -> Void) {\n\n}\n}\n代码清单 3-3\nSmallWidgetDataProvider 的模板代码\n```\n\n代码清单 3-3 展示了\
  \ `SmallWidgetDataProvider` 的代码。其中包含了 `TimelineProvider`（`SmallWidgetDataProvider`\
  \ 所遵循的协议）三个方法的模板代码，而编写这些方法的具体实现则是开发者的任务。下面给出这些方法的基本概述，并为你提供一些动手实践。\n\n### placeholder(in:)\n\
  \n占位符会在小组件首次加载（添加到主屏幕后）时显示小组件视图的通用表示形式。在小组件正在检索新数据的过程中，也可能显示该占位符。\n\n在 WidgetKit\
  \ 中，`TimelineProvider` 的 `placeholder(in:)` 方法负责返回一个占位符时间线条目。\n\n让我们来尝试一下。在 `SmallWidgetDataProvider`\
  \ 中的 `typealias Entry = Match` 这一行之后，创建一个 `Match` 类型的变量 `placeholderEntry`，用于返回一个占位符时间线条目。如代码清单\
  \ 3-4 所示。\n\n```\nvar placeholderEntry: Match {\nreturn Match(primaryClub: \"none\"\
  ,\nsecondaryClub: \"none\",\ndate: Date())\n}\n代码清单 3-4\n声明 placeholderEntry 变量\n\
  ```\n\n如前所述，代码清单 3-4 声明了一个 `Match` 类型的变量 `placeholderEntry`，并返回一个 `Match` 对象（遵循\
  \ `TimelineEntry` 协议），其中 `primaryClub` 和 `secondaryClub` 的值均设为 `\"none\"`，日期为当前日期。\n\
  \n**注意：** 并非强制要求创建 `placeholderEntry` 变量，但由于你会在多个地方使用同一个对象，因此创建并将该对象存储在变量中是个好主意。\n\
  \n现在，你可以更新 `placeholder(in:)` 方法，使其如代码清单 3-5 所示。\n\n```\nfunc placeholder(in context:\
  \ Context) -> Match {\nreturn placeholderEntry\n}\n代码清单 3-5\nplaceholder(in:) 方法\n\
  ```\n\n在代码清单 3-5 中，`placeholder(in:)` 方法已被修改，使其返回你在代码清单 3-4 中声明的 `placeholderEntry`\
  \ 变量。\n\n\n\n### `getSnapshot(in:completion:)`\n\niOS 14 配备了一个小组件图库，用于展示设备中所有应用的小组件预览。用户可以在图库中选择要在主屏幕上显示的小组件。对于小组件而言，小组件图库是一个展示其真实预览、突显其美观与功能的平台，从而帮助用户做出明智的决定——是否将其添加到主屏幕上。\n\
  \n`TimelineProvider` 的 `getSnapshot(in:completion:)` 方法，在 `context.isPreview` 设置为\
  \ `true` 时，为小组件提供在图库中展示其预览的功能。每当小组件处于过渡状态（例如出现在小组件图库中或等待数据）时，系统都会调用此方法。因此，务必确保此方法不包含繁重的计算。\n\
  \n除此之外，`getSnapshot(in:completion:)` 提供了一条表示小组件当前时间和状态的时间线条目。因此，使用此方法，你将获取要在小组件中显示的最新即将到来的比赛。为此，你需要使用一个新方法来获取小组件的当前状态，并执行计算以获取最新的即将到来的比赛。因此，在\
  \ `SmallWidgetDataProvider` 中，在占位变量下方定义 `getLatestUpcomingMatch()` 方法，并编写清单 3-6\
  \ 中的代码。\n\n```\nfunc getLatestUpcomingMatch() -> Match {\nif let matches: [Match]\
  \ = AppUtils.fetchDataWith(fileName: \"Matches.json\") {\nlet upcomingMatches =\
  \ matches.filter({ $0.date > Date() })\nlet sortedMatches = upcomingMatches.sorted(by:\
  \ { $0.date < $1.date })\nif let firstUpcomingMatch = sortedMatches.first {\nreturn\
  \ firstUpcomingMatch\n}\n}\nreturn placeholderEntry\n}\n```\n\n**清单 3-6** `getLatestUpcomingMatch()`\
  \ 方法的定义\n\n清单 3-6 定义了 `getLatestUpcomingMatch()` 方法，其中执行了以下操作：\n\n1. 当你在应用中保存比赛时，所有数据都以\
  \ JSON 格式存储在名为 `Matches.json` 的文件中。因此，在这一步中，你使用 `AppUtils` 的 `fetchDataWith(filename:)`\
  \ 方法来检查该文件是否存在。需要注意的是，JSON 文件可以存储在应用的文档目录中。但由于多个目标（`SoccerTime` 和 `SoccerTimeWidget`）需要访问该文件，它必须存储在一个容器中。因此，为了访问容器中的文件，在\
  \ `AppUtils` 中创建了 `getSharedDocumentsDirectory()` 方法，并由 `fetchDataWith(filename:)`\
  \ 调用。所以，如果 JSON 文件存在，则继续执行；否则返回 `placeholderEntry`。\n\n   **注意：**由于你将在小组件扩展中使用 `AppUtils`，请确保同时将其\
  \ **Target Membership** 更新为 `SoccerTimeWidgetExtension`。\n\n2. 在第二步中，你正在筛选出未来日期的比赛。\n\
  3. 现在，比赛按时间升序排序。因此，日期最接近当前日期的比赛位于第一个索引，日期最远的比赛位于最后一个。\n4. 最后，从排序后的比赛数组中获取第一场比赛并返回。\n\
  \n现在，更新 `getSnapshot(in:completion:)` 方法，如清单 3-7 所示，以完成最终调整。\n\n```\nfunc getSnapshot(in\
  \ context: Context, completion: @escaping (Match) -> Void) {\ncompletion(getLatestUpcomingMatch())\n\
  }\n```\n\n**清单 3-7** `getSnapshot(in:completion:)` 方法的修改\n\n清单 3-7 修改了 `getSnapshot(in:completion:)`\
  \ 方法，使其返回最近的即将到来的比赛，从而在小组件图库的预览中显示它。如果应用中没有添加即将到来的比赛，小组件预览将显示“没有即将到来的比赛”。\n\n###\
  \ `getTimeline(in:completion:)`\n\n`getTimeline(in:completion:)` 是 `TimelineProvider`\
  \ 的大脑。它提供一组时间线条目，用于当前时间以及（可选）任何未来时间，以更新小组件。此外，它将小组件的时间线重载策略设置为用户偏好的时间。重载策略决定了何时更新时间线以刷新小组件中显示的内容。有三种可用的重载策略：\n\
  \n1. `never`：此策略在可用新时间线时更新小组件。\n2. `atEnd`：在最后一个时间线指定的日期过后请求一个新的时间线。\n3. `after`：此策略在指定日期请求一个新的时间线。\n\
  \n当无法预测刷新小组件内容的日期时，可以使用 `never` 刷新策略。在这种情况下，WidgetKit 不会请求新的时间线，当新时间线在某个时间点可用时，它会调用\
  \ `WidgetCenter` 类的 `reloadTimelines(of Kind:)` 方法。例如，当小组件的内容依赖于用户是否登录到账户，而用户未登录时，使用\
  \ `never` 是合理的。\n\n但 `atEnd` 和 `after` 的情况则不同。当未来事件可预测且你知道何时更新小组件内容时，可以使用它们。为了解释这一点，官方文档给出了一个显示股票市场详情的小组件示例。⁷\
  \ 它指出，在这种情况下使用 `atEnd` 或 `after` 是一个好主意，因为你可以指定下一个开市或闭市的日期，并且信息通常不会在夜间或周末发生变化。\n\
  \n解释得够多了。现在，修改 `getTimeline(in:completion:)` 方法，如清单 3-8 所示。\n\n```\nfunc getTimeline(in\
  \ context: Context, completion: @escaping (Timeline) -> Void) {\n// 1\nlet entry\
  \ = getLatestUpcomingMatch()\n// 2\nlet refresh = Calendar.current.date(byAdding:\
  \ .second, value: 1, to: entry.date)\n// 3\nlet timeline = Timeline(entries: [entry],\n\
  policy: .after(refresh!))\n// 4\ncompletion(timeline)\n}\n```\n\n**清单 3-8** `getTimeline(in:completion:)`\
  \ 方法的修改\n\n在清单 3-8 的代码中，执行了以下任务：\n\n1. 使用 `getLatestUpcomingMatch()` 获取最近的即将到来的比赛，并将获取的值存储在\
  \ `entry` 中。\n2. 然后，将下次刷新时间设置为比 `entry` 的日期晚一秒。\n3. 在第三步中，使用 `entry` 和 `after` 刷新策略创建一个时间线。刷新策略设置为在我们第二步中设置的时间之后。\n\
  4. 最后，将时间线交给小组件。\n\n这样，`SmallWidgetDataProvider`（一个符合 `TimelineProvider` 协议的类）的配置就完成了。现在，是时候使用\
  \ SwiftUI 来开发小组件的用户界面了。\n\n\n\n## 开发小组件的用户界面\n\n前几节内容都围绕配置小组件的工作机制展开。在本节中，您将最终着手设计小组件的用户界面。您将制作一个小尺寸小组件，其视图与通常用\
  \ SwiftUI 创建的视图基本相同，但会做一些小幅调整。该小组件将显示最近一场即将开始的比赛中两支对战球队的队徽，以及比赛开始前的倒计时。\n\n首先，创建一个\
  \ SwiftUI 文件。导航至 `SmallWidget` 文件夹，然后通过 **文件** ➤ **新建** ➤ **文件…** ➤ **SwiftUI 视图**，创建一个名为\
  \ `SmallWidgetView` 的 `SwiftUI View`。设置文件名并选择位置后，在点击 **创建** 之前，请记得勾选对话框底部 `SoccerTimeWidgetExtension`\
  \ 目标旁边的复选框。\n\n创建 `SmallWidgetView.swift` 后，用清单 3-9 中的代码替换其内容。\n\n```\n// 1\nimport\
  \ SwiftUI\nimport WidgetKit\nstruct SmallWidgetView: View {\n// 2\nvar match: SmallWidgetDataProvider.Entry\n\
  var body: some View {\n// 3\nVStack(alignment: .center) {\nHStack() {\nClub(value:\
  \ match.primaryClub)\n.logo.resizable()\n.aspectRatio(contentMode: .fit)\nText(\"\
  vs\").font(.footnote)\nClub(value: match.secondaryClub)\n.logo.resizable()\n.aspectRatio(contentMode:\
  \ .fit)\n}.frame(height: 50)\nif match.date > Date() {\nText(match.date, style:\
  \ .timer)\n.font(.system(.title,\ndesign: .monospaced))\n.foregroundColor(Color.gray)\n\
  .multilineTextAlignment(.center)\n} else {\nText(\"暂无即将开始的比赛。\")\n.foregroundColor(.gray)\n\
  }\n}\n}\n}\n清单 3-9\nSmallWidgetView.swift\n```\n\n清单 3-9 中的代码用于布局小尺寸小组件的用户界面。然而，粘贴代码后，您可能会看到一个错误提示：“在‘Club’作用域中找不到‘Club’”。要解决此问题，您需要使\
  \ `Club` 在 `SoccerTimeWidgetExtension` 目标中可用，现在您应该至少模糊地知道如何操作了。不过，如果您还没弄清楚也没关系。只需前往\
  \ `Clubs.swift` 文件，在文件检查器的**目标成员**中勾选 `SoccerTime` 和 `SoccerTimeWidgetExtension`\
  \ 两个复选框。同时，对 `ImageExtension.swift`（位于 `Extensions` 文件夹中）执行相同操作，通过勾选 `SoccerTimeWidgetExtension`\
  \ 来更新其目标成员，以避免出现诸如“类型‘Image’没有成员‘alavés’”之类的错误。\n\n现在，让我们解释一下清单 3-9 中代码的作用：\n\n\
  1.  导入 `SwiftUI` 和 `WidgetKit`。\n\n2.  声明一个名为 `match` 的变量，用于向视图提供数据。在当前情况下，数据来自\
  \ `SmallWidgetDataProvider` 的 `TimelineEntry` 值。\n\n3.  使用 `VStack` 和 `HStack` 准备视图，以显示比赛提供的信息。如果条目的日期不晚于当前时间，则显示“暂无即将开始的比赛。”而不是计时器。\n\
  \n到目前为止，`SmallWidgetView` 的**画布**窗口应该显示“无预览”。这是因为在将内容替换为清单 3-9 的代码时，您移除了 `SmallWidgetView`\
  \ 的预览结构体。现在，通过将清单 3-10 中的代码粘贴到文件底部来修复此问题。\n\n```\nstruct SmallWidgetView_Previews:\
  \ PreviewProvider {\nstatic var previews: some View {\nSmallWidgetView(match: Match(primaryClub:\
  \ \"\", secondaryClub: \"\", date: Date()))\n.previewContext(WidgetPreviewContext(family:\n\
  .systemSmall))\n}\n}\n清单 3-10\nSmallWidgetView 的预览结构体\n```\n\n清单 3-10 中的代码创建了 `SmallWidgetView`\
  \ 的预览。一旦粘贴并点击**画布**窗口中的**继续**按钮，就会显示如图 3-6 所示的预览。\n\n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig6_HTML.jpg](img/505356_1_En_3_Fig6_HTML.jpg)\n\
  \n图 3-6\n\n显示小尺寸小组件预览的截图\n\n\n\n## WidgetConfiguration（小组件配置）\n\n现在是时候将所有内容整合起来，让小组件正常工作了。为此，你需要添加一个入口点，即一个符合`Widget`协议并使用`@main`属性包装器标记的结构体。该结构体将包含一个带有`WidgetConfiguration`实例的\
  \ body，在这里你将把所有部分组合在一起并配置你的小组件。\n\n要创建这个入口点，请导航至 **SmallWidget** 文件夹，创建一个名为 **SmallWidget**\
  \ 的 **SwiftUI View**，同时确保在创建该文件之前，在 Targets 中勾选了 **SoccerTimeWidgetExtension**。此外，在\
  \ Targets 中，如果 **SoccerTime** 被勾选，请取消勾选。\n\n> **提示**  \n> 如果在创建 SwiftUI View 时遇到困惑，请参考“开发小组件\
  \ UI”部分的第二段。\n\n现在，用清单 3-11 中给出的代码替换 **SmallWidget** 的内容。\n\n```\nimport WidgetKit\n\
  import SwiftUI\n// 1\n@main\nstruct SmallWidget: Widget {\n    // 2\n    let widgetKind:\
  \ String = \"SmallSoccerTimeWidget\"\n    // 3\n    var body: some WidgetConfiguration\
  \ {\n        StaticConfiguration(kind: widgetKind,\n                           \
  \ provider: SmallWidgetDataProvider()) { match\n            in\n            // 4\n\
  \            SmallWidgetView(match: match)\n        }\n        // 5\n        .configurationDisplayName(\"\
  迷你小组件\")\n        .description(\"显示即将到来的比赛。\")\n        .supportedFamilies([.systemSmall])\n\
  \    }\n}\n```\n\n*清单 3-11*  \n*SmallWidget.swift*\n\n在清单 3-11 中，完成了以下操作：\n\n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig7_HTML.png](img/505356_1_En_3_Fig7_HTML.png)\n\
  \n*图 3-7*  \n*SoccerTime 小组件在组件库中的小型组件预览*\n\n1.  导入了 SwiftUI 和 WidgetKit，并创建了一个符合\
  \ `Widget` 协议的结构体 `SmallWidget`。然后，使用 `@main` 属性包装器标记 `SmallWidget`，让系统知道它是该目标的入口点。换句话说，渲染小组件的代码执行从此处开始。\n\
  \n2.  使用一个唯一的字符串定义了 `widgetKind`。它用于描述你的小组件。\n\n3.  `Widget` 的 body 应为一个 `WidgetConfiguration`\
  \ 实例。由于 `StaticConfiguration` 和 `IntentConfiguration`（稍后讨论）都符合 `WidgetConfiguration`，因此可以使用其中任何一个。现在，你使用了\
  \ `StaticConfiguration`，为其提供了 `widgetKind` 作为 `kind`，以及 `SmallWidgetDataProvider`\
  \ 作为 `provider`。\n\n4.  在此步骤中，已编写 `SmallWidgetView` 将充当小组件的视图，并为其提供了一个时间线条目 `match`。\n\
  \n5.  在第五步中，为小组件提供了配置显示名称和描述，当用户在小组件库中查看时，它们会显示在小组件上方。小组件在组件库中的预览如图 3-7 所示。此外，由于目标仅是支持小型组件，因此将仅包含\
  \ `WidgetFamily` 的 `systemSmall` 类型的数组传递给 `supportedFamilies()` 方法。\n\n至此，小组件的设置完成。现在构建并运行，查看你的工作成果。\n\
  \n> **注意**  \n> 在运行之前，请确保当前选定的方案是 **SoccerTimeWidgetExtension**。作为参考，请参见图 3-3。如果选定的方案是\
  \ **SoccerTime**，则运行的是应用，而不是小组件。\n\n但它并没有运行，对吗？这是因为你的小组件目前有两个入口点。删除由 Xcode 在你首次生成小组件扩展时创建的样板文件\
  \ **SoccerTimeWidget.swift**。现在再次构建并运行。\n\n现在它应该可以运行了，你的模拟器应在主屏幕上显示小型组件，并且看起来应该类似于图\
  \ 3-8。\n\n![../images/505356_1_En_3_Chapter/505356_1_En_3_Fig8_HTML.png](img/505356_1_En_3_Fig8_HTML.png)\n\
  \n*图 3-8*  \n*主屏幕上小型组件的截图*\n\n你可以随意操作小组件和应用。目前，你可能会看到一些错误和限制，但我们将在后续章节中逐一解决。\n\n\
  ## 总结\n\n恭喜你走到这一步！这对你来说可能是一个充满挑战的章节，但无论多么困难，你都挺过来了。通过完成本章，你已使用 SwiftUI 为 iOS 创建了你的第一个小组件。同时，你也熟悉了小组件的构建模块，如时间线、时间线提供程序、小组件视图、占位视图、快照和小组件配置。总而言之，小组件由三个核心组件组成：\n\
  \n1.  **视图**：由 `WidgetKit` 用作用户界面的 SwiftUI 视图\n2.  **TimelineProvider**：一个协议，负责根据在指定日期传递的上下文更新小组件内容\n\
  3.  **WidgetConfiguration**：将小组件的所有构建模块绑定在一起并配置小组件\n\n你可能仍然对某些事情感到困惑，但请保持耐心并多加练习。请参考\
  \ **SoccerTime.zip** 文件的 **SoccerTimeFinal** 文件夹中的项目最终代码。此外，你不用担心，因为在接下来的章节中你也会用到这些概念。\n\
  \n下一章将教你关于链接的知识，这将使用户能够点击你的小组件并导航到应用中的相关屏幕，以获取关于小组件中显示内容的更多详细信息。在此之前，请继续保持良好的工作！\n\
  \n---\n\n"
- "# 4. 让小组件可配置和可交互\n\n小组件的一个特别之处在于，用户可以在一定程度上配置它们并与它们进行交互。在本章中，你将学习如何使你的小组件可配置和可交互，以便用户爱上你的小组件。为了使你的小组件可配置，你将使用\
  \ `IntentConfiguration`。并且你将使小组件中的视图可点击，以便用户可以点击它们并使用深层链接导航到不同的屏幕。由于本章需要涵盖很多重要内容，你可能会发现它比本书的其他章节更长。因此，最好花几天时间来学习本章，甚至进行复习。\n\
  \n\n\n## 让我们开始吧\n\n要开始工作，你可以解压名为 `OnThisDay.zip` 的文件。如果解压成功，请打开 `OnThisDayStarter`\
  \ 文件夹，并运行 `OnThisDay.xcodeproj` 以查看 `OnThisDay` 的实际效果。`OnThisDay` 是一个应用程序，它通过调用维基百科的“历史上的今天\
  \ REST API”^(⁸)，展示系统日期当天发生的历史事件。它会在各自的分区标题下，列出各种类型的事件，例如出生、逝世、事件、节假日和精选事件。图 4-1\
  \ 和图 4-2 展示了该应用的实际外观。\n\n![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig2_HTML.png](img/505356_1_En_4_Fig2_HTML.png)\n\
  \n图 4-2\n\n`OnThisDay` 的主屏幕，显示分区标题列表\n\n![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig1_HTML.png](img/505356_1_En_4_Fig1_HTML.png)\n\
  \n图 4-1\n\n`OnThisDay` 的主屏幕，显示生日列表\n\n`OnThisDay` 的另一个有趣特性是，你可以选择事件类型，从而获得该特定类型事件的筛选列表。而且，即使你关闭并重新运行应用，这个选择也会保持不变——这意味着，如果你从菜单中选择`Selected`，即使关闭并重新运行应用，列表中只会显示`Selected`事件。这多亏了\
  \ `UserDefaults`^(⁹) 才能实现！图 4-3 显示了一个菜单，你可以从中选择事件类型或类别。\n\n![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig3_HTML.png](img/505356_1_En_4_Fig3_HTML.png)\n\
  \n图 4-3\n\n从菜单中选择“Selected”事件\n\n此外，你可以点击一个事件来查看与该事件相关的更多详情和照片。请参考图 4-4 查看事件详情屏幕的截图。`OnThisDay`\
  \ 还会显示与该事件相关的页面，你可以点击这些页面跳转到它们的维基百科页面。该屏幕如图 4-5 所示。\n\n![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig5_HTML.png](img/505356_1_En_4_Fig5_HTML.png)\n\
  \n图 4-5\n\n在详情屏幕中点击“相关页面”后加载的维基百科页面\n\n![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig4_HTML.png](img/505356_1_En_4_Fig4_HTML.png)\n\
  \n图 4-4\n\n在主屏幕上点击一个事件后显示的详情屏幕\n\n现在你肯定已经推断出 `OnThisDay` 是一个功能完整的应用。是的，没错。但是，为什么不为其创建小组件，并在用户的主屏幕上显示一些信息呢？小组件无疑能让你的应用对用户来说显得更有用。这就是为什么我们已经为你完成了部分工作。我们已经为\
  \ `OnThisDay` 创建了一个小组件扩展，名为 `OnThisDayWidgetExtension`，并为 `OnThisDay` 编写了所有三种尺寸家族的小组件。选择\
  \ `OnThisDayWidgetExtension` 方案并运行代码，即可在模拟器或设备的主屏幕上看到 `OnThisDay` 的小型小组件（图 4-6）。\n\
  \n![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig6_HTML.jpg](img/505356_1_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6\n\n显示 `OnThisDayWidgetExtension` 为选中方案的截图\n\n长按主屏幕的空白区域，然后点击“**+**”图标，将另外两种尺寸家族的小组件也添加到你的主屏幕上。然后，从应用列表中点击\
  \ `OnThisDay`，滚动到你想要的小组件家族，并点击**添加小组件**。\n\n目前，小组件显示的是占位数据，但稍后你将集成维基百科的“历史上的今天 REST\
  \ API”来显示最新信息。\n\n现在，让我们来看看小组件的外观。小型小组件（图 4-7）由于空间较小，仅显示系统日期当天发生的历史事件数量。\n\n![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig7_HTML.jpg](img/505356_1_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7\n\n`OnThisDay` 的小尺寸小组件\n\n而中型小组件（图 4-8）可以容纳更多视图，因此它不仅显示系统日期当天发生的历史事件数量，还显示一些关于个别事件的信息。\n\
  \n![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig8_HTML.png](img/505356_1_En_4_Fig8_HTML.png)\n\
  \n图 4-8\n\n`OnThisDay` 的中尺寸小组件\n\n大型小组件（图 4-9）显示与中型小组件相同的信息，但信息量更大，排列方式也不同。\n\n\
  ![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig9_HTML.jpg](img/505356_1_En_4_Fig9_HTML.jpg)\n\
  \n图 4-9\n\n`OnThisDay` 的大尺寸小组件\n\n除此之外，在本章的后面部分，你将让你的小组件变得可配置——这意味着用户可以长按你的小组件，然后点击**编辑小组件**，来选择他们希望小组件显示其信息的事件类型/类别。因此，如果用户选择了\
  \ `Holidays`，那么小组件中将只显示属于“Holidays”类别的事件信息。图 4-10 是长按小组件时显示选项列表的截图，图 4-11 是点击**编辑小组件**后显示配置选项的截图。除此之外，图\
  \ 4-12 显示了用户可以选择的事件类别，以便让小组件显示相关信息。\n\n![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig12_HTML.jpg](img/505356_1_En_4_Fig12_HTML.jpg)\n\
