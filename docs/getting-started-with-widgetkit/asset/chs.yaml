  \n干得好！您已成功在小尺寸部件中添加了点击目标，并利用深层链接的强大功能使您的应用能够显示相关信息。\n\n\n\n### 在中号组件中添加点击目标\n\n\
  如图 4-18 所示，你可以在中号和大号组件中放置多个点击目标。因此，在本节中，你将在中号组件中添加点击目标。\n\n在中号组件中，有三个区域可以添加点击目标。打开并预览\
  \ `MediumWidgetView`，以便你能更好地理解。\n\n第一个区域/视图是 `eventCountView`，它显示特定日期发生的事件数量。它类似于你之前制作的小号组件。\n\
  \n第二个区域是列出两个事件的位置。`eventDetail(with:)` 方法负责显示该区域。这两个事件各自都可以拥有自己的点击目标，引导用户进入其详情页面。\n\
  \n在该区域下方，有一个 `todayEvents` 视图，显示那些无法在组件视图中完全显示，但会在应用启动时展示的剩余事件数量。\n\n你一定注意到了，唯一会执行不同功能的点击目标位于\
  \ `eventDetail(with:)` 方法中。否则，无论你在中号组件的哪个位置点击，用户都会被带到应用的主屏幕，显示与当前选中类别相关的事件列表。因此，就像在小号组件中一样，你可以在中号组件的某个视图中调用\
  \ `widgetURL(_:)`。随后，为了在 `eventDetail(with:)` 方法中添加点击目标，你将使用 `widgetURL(_:)` 之外的其他方法。\n\
  \n由于你已经在“在小号组件中添加点击目标”（从步骤 5 开始）中完成了处理深度链接所需的设置，现在你只需从 `eventCountView` 和 `todayEvents`\
  \ 中的任意一个视图调用 `widgetURL(_:)` 即可使其工作。我们选择从 `eventCountView` 调用 `widgetURL(_:)`。代码清单\
  \ 4-23 展示了在 `eventCountView` 中添加 `widgetURL(_:)` 调用的过程。\n\n```swift\nvar eventCountView:\
  \ some View {\nHStack {\nVStack(alignment: .leading) {\nText(events.count.description)\n\
  .font(.system(size: 40,\nweight: .medium))\n.foregroundColor(.red)\nText(category.detail)\n\
  .font(.body)\nText(\"took place on\")\n.font(.body)\nText(DateHelper.today + \"\
  .\")\n.font(.headline)\n}\n}\n.padding(.trailing)\n.widgetURL(URL(string: category.eventType.rawValue))\n\
  }\n```\n\n在代码清单 4-23 中，通过在 `eventCountView` 中调用 `widgetURL(_:)`，并传入通过访问选中类别 `category`\
  \ 的 `eventType` 属性的 `rawValue` 属性生成的字符串所创建的 URL。\n\n添加完代码清单 4-23 中的代码后，构建并运行该组件。现在，如果你点击中号组件的任意位置，你将被带到应用的主屏幕，其中列出了与选中类别相关的事件。\n\
  \n然而，如果你还记得，组件右侧显示两个事件简要信息的区域，本应引导用户进入应用中的详情页面，以提供更相关的信息。是时候进行设置了。\n\n对于小号组件，让应用显示选中类别的事件列表，你只需要选中类别本身的名称。然后你使用该类别名称创建了一个\
  \ URL，并通过 `widgetURL(_:)` 进行设置。当组件被点击时，`onOpenURL(perform:)` 会检测到深度链接，应用随之启动并显示带有列表的主屏幕。\n\
  \n但是，你需要一种不同的机制来处理在中号（或大号）组件中点击事件的情况：应用应启动并打开该特定事件的详情页面。与小号组件不同，这里你既需要事件信息（用于详情页面），也需要选中的类别（用于当用户决定返回应用主屏幕时显示该类别的列表）。\n\
  \n由于你在此场景中也将使用深度链接，你当然需要创建一个 URL。那么，为什么不生成一个既包含选中类别又包含事件文本的 URL 呢？并且，为了让应用在检测到特定深度链接时确定应导航到哪个屏幕，为什么不也包含一些关于该屏幕的信息呢？虽然目前这可能不是非常有用，但在你的应用可能需要深度链接导航到各种屏幕的场景中，它肯定会派上用场。\n\
  \n因此，让我们创建一个机制，生成包含选中类别、事件文本以及应用应导航到的屏幕名称的 URL：\n\n1.  在 **OnThisDayWidget** 文件夹中，创建一个新文件夹\
  \ **Constants**。\n2.  在 **Constants** 中，创建一个名为 **LinkConstants.swift** 的新 Swift\
  \ 文件。创建该文件时，请确保同时选中 **OnThisDay** 和 **OnThisDayWidgetExtension** 两个目标。\n3.  复制代码清单\
  \ 4-24 中的代码，并将其粘贴到 **LinkConstants.swift** 中。\n\n```swift\nstruct LinkConstants\
  \ {\n// a\nstatic let detailScheme = \"detail\"\n// b\nstatic func detail(with text:\
  \ String, category: Categories) -> URL? {\n// c\nlet queryItem = URLQueryItem(name:\
  \ \"text\", value: text)\n// d\nvar urlComponents = URLComponents()\nurlComponents.scheme\
  \ = Self.detailScheme\nurlComponents.host = category.eventType.rawValue\nurlComponents.queryItems\
  \ = [queryItem]\n// e\nif let url = urlComponents.url {\nreturn url\n}\nreturn nil\n\
  }\n}\n```\n\n在代码清单 4-24 中，创建了 `LinkConstants` 结构体，其中进行了以下操作：\n\n1.  定义了一个静态属性 `detailScheme`，并将其值设置为\
  \ `\"detail\"`。你将使用此属性让应用知道深度链接希望它导航到事件的详情页面。\n2.  创建了一个静态方法 `detail(with:category:)`。这是生成\
  \ URL 的地方。\n3.  定义了一个 `URLQueryItem`，其 `name` 参数为 `text`，`value` 参数设置为从 `detail(with:category:)`\
  \ 接收的 `text` 参数，并将其存储在 `queryItem` 中。\n4.  通过创建 `URLComponents` 的实例并将其存储在 `urlComponents`\
  \ 中，开始 URL 的创建工作。将 `scheme` 设置为 `detailScheme`，`host` 设置为 `category` 的字符串形式，`queryItems`\
  \ 设置为一个包含你在步骤 “a” 中创建的 `queryItem` 变量的数组。\n5.  使用 `if-let` 语句检查是否生成了有效的 URL。如果生成了有效的\
  \ URL，则将其存储在 `url` 中并返回。否则，该方法返回 `nil`。创建的 URL 示例如下：`detail://births?text=Cory%20Paix,%20Australian%20rugby%20league%20player`。\n\
  \n这样，你就开发了一个使用选中类别、事件文本和目标屏幕名称来生成 URL 的机制。\n\n现在，让我们使用刚刚在 `LinkConstants` 中创建的 `detail(with:category:)`\
  \ 方法，并设置中号组件的视图以实现导航功能：\n\n1.  打开 `MediumWidgetView`，并将 `todayEvents` 替换为代码清单 4-25\
  \ 中给出的代码。\n\n```swift\nvar todayEvents: some View {\nVStack(spacing: 0) {\nForEach(events.prefix(2))\
  \ { event in\n// a\nif let url = LinkConstants.detail(with: event.text, category:\
  \ category) {\nLink(destination: url, label: {\neventDetail(with: event)\n})\n}\
  \ else {\neventDetail(with: event)\n}\n}\nif events.count > 2 {\nHStack {\nSpacer()\n\
  Text(\"\\(events.count - 2) more\")\n.font(.footnote)\n.padding(.trailing)\n.padding(.bottom,\
  \ 8)\n}\n}\n}\n}\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将给定的英文文本翻译成准确、专业的中文。\n\
  \n\n在清单 4-25 中，通过使用 `LinkConstants` 的静态方法 `detail(with:category:)`，并传入当前迭代 `events`\
  \ 的文本（即 `event`）以及当前选中的类别（即 `category`），生成一个 URL。如果 `detail(with:category:)` 返回一个有效的\
  \ URL，则将其存储在 `url` 中，并创建一个 `Link` 视图，其 `destination` 设置为 `url`，`label` 设置为 `eventDetail(with:)`\
  \ 方法。因此，显示事件简要信息的视图将成为指向您所生成 URL 的可点击链接。如果 `detail(with:category:)` 未生成有效的 URL，则仅显示由\
  \ `eventDetail(with:)` 方法生成的视图。\n\n**提示**\n\n您可以通过在 `HomeView` 的 `onOpenURL(perform:)`\
  \ 方法中设置断点来检查 `Link` 视图是否正常工作。然后，构建并运行项目，在模拟器或设备的桌面上添加中等尺寸的小部件。当更新后的信息加载到小部件中后，点击任意事件，您的应用将会启动，并且断点将暂停在\
  \ `onOpenURL(perform:)` 内部的执行。现在，通过在 Xcode 的 **调试控制台** 中输入 `po url` 来检查传递的深层链接 URL。如果打印出的\
  \ URL 包含您所点击事件的相关数据，则可以断定 `Link` 视图正在正常工作。\n\n1.  打开 `HomeView`，并定义两个 `State` 变量：`deepLinkEvent`（类型为\
  \ `EventData?`）和 `deepLinkActive`（类型为 `Bool`）。清单 4-26 展示了实现此操作的代码。\n\n```\n@State\
  \ var deepLinkEvent: EventData?\n@State var deepLinkActive: Bool = false\n清单 4-26\n\
  定义 deepLinkEvent 和 deepLinkActive\n```\n\n在清单 4-26 中定义的 `deepLinkEvent` 变量将在稍后用于存储在小部件中被点击事件的数据。同样，在清单\
  \ 4-26 中声明的 `deepLinkActive` 变量将用于激活/停用负责导航到事件详情屏幕的 `NavigationLink`。您将在稍后添加它。\n\
  \n2.  让我们在 `HomeView` 中创建一个方法 `handleLinkForDetail(with:)`，以处理仅与检测到深层链接时导航到事件详情屏幕相关的操作。使用清单\
  \ 4-27 中给出的代码来完成此操作。\n\n```\nfunc handleLinkForDetail(with url: URL) {\n// a\nguard\
  \ let urlScheme = url.scheme,\nurlScheme == LinkConstants.detailScheme else { return\
  \ }\n// b\nguard let urlType = url.host else { return }\n// c\ntype = EventType(rawValue:\
  \ urlType)!\n// d\nif let firstElement = url.queryParams.first {\nfor eventType\
  \ in otdViewModel.events {\nfor event in eventType.value where event.text == firstElement.value\
  \ {\ndeepLinkEvent = event\ndeepLinkActive = true\n}\n}\n}\n}\n清单 4-27\n创建 handleLinkForDetail(with:)\n\
  ```\n\n在清单 4-27 中，发生了以下事情：\n\na.  `handleLinkForDetail(with:)` 接收一个 URL 作为参数并将其存储在\
  \ `url` 中。使用 `guard-let`，检查 `url` 是否包含 scheme。如果存在 scheme，则将其存储在 `urlScheme` 中，并检查\
  \ `urlScheme` 是否与 `LinkConstants.detailScheme`（其值为 `\"detail\"`）匹配。这有助于验证深层链接是否旨在让应用导航到详情屏幕（我们在清单\
  \ 4-24 的步骤“a”中讨论过这一点）。否则，该方法将返回且不执行任何操作。\n\nb.  在此步骤中，检查 `url` 是否包含 host。如果包含 host，则将其存储在\
  \ `urlType` 中；否则，该方法将返回且不执行任何操作。您已经以某种方式设置了 URL，使得 `urlType` 将包含所选事件类别的字符串值。\n\n\
  c.  现在，将 `urlType` 的值传递给 `EventType` 初始化器，以将其转换为一个 `EventType` 枚举值。由于您可以确信传入的是可以转换为\
  \ `EventType` 枚举值的 `String`，因此您可以使用强制解包运算符（`!`）对结果进行强制解包，并将其存储在 `type` 中，该变量存储所选的事件类别/事件类型并相应地显示事件。\n\
  \nd.  在此步骤中，仅使用 `if-let` 提取 `url` 中传递的第一个查询参数，因为您只传递了一个包含事件文本的查询参数。\n\n现在，由于 `firstElement`\
  \ 包含被点击事件的文本，您可以将其与 `otdViewModel` 的 `events` 变量中的文本进行匹配，以找出该被点击事件的事件数据。然后，可以使用这些事件数据来启动导航到被点击事件的详情页面。`events`\
  \ 变量是应用使用 API 获取所有事件后存储它们的地方。\n\n因此，对 `otdViewModel` 的 `events` 变量运行一个 `for` 循环，将迭代变量设置为\
  \ `eventType`。再次对 `eventType.value` 运行另一个 `for` 循环，以找出与 `firstElement` 文本匹配的事件文本。一旦找到事件，就将它的值存储在\
  \ `deepLinkEvent` 中，这将使该值在整个 `HomeView` 中可用。并且，由于已验证这是导航到详情页面的有效深层链接操作，因此将 `deepLinkActive`\
  \ 标志设置为 `true`。\n\n3.  现在是调用您刚刚创建的 `handleLinkForDetail(with:)` 方法的时候了。由于与深层链接相关的操作主要由\
  \ `HomeView` 中的 `handleLinks(for:)` 方法处理，请转到那里，使用清单 4-28 中的代码替换它，以赋予 `handleLinks(for:)`\
  \ 更多职责。\n\n```\nfunc handleLinks(for url: URL) {\ndeepLinkEvent = nil\ndeepLinkActive\
  \ = false\nif let type = EventType(rawValue: url.absoluteString) {\nself.type =\
  \ type\n} else {\nhandleLinkForDetail(with: url)\n}\n}\n清单 4-28\n增加职责后的 handleLinks(for:)\n\
  ```\n\n清单 4-28 包含了 `handleLinks(for:)` 方法的更新版本。无论接收到什么 `url`，初始时都将 `deepLinkEvent`\
  \ 设置为 `nil`，`deepLinkActive` 设置为 `false`。然后，如果 `url` 包含可以转换为 `EventType` 枚举值的 `String`，则将其存储在\
  \ `type` 变量中。之后，将 `type` 变量的值存储在 `HomeView` 的 `type` 变量中，该变量负责设置所选的事件类别/事件类型，并在主屏幕上相应地显示事件列表。您之前已经为小尺寸小部件和中等尺寸小部件的一部分使用了此条件。\n\
  \n但如果 `url` 不包含这样的 `String`，则可以推断出是时候处理用于导航到事件详情屏幕的深层链接了。因此，在 `else` 条件中，调用了 `handleLinkForDetail(with:\
  \ url)`。\n\n4.  现在，剩下的最后一件事情是创建一个 `NavigationLink`，该链接根据 `HomeView` 的 `deepLinkActive`\
  \ 状态变量进行激活和停用。当它被激活时，应用会自动导航到事件的详情屏幕。为此，使用清单 4-29 中给出的代码创建一个名为 `navigateToDetail`\
  \ 的变量。\n\n```\nvar navigateToDetail: some View {\nreturn self.deepLinkEvent.map({\
  \ event in\nNavigationLink(destination: DetailView(event: event), isActive: $deepLinkActive)\
  \ {\nEmptyView()\n}.hidden()\n})\n}\n清单 4-29\n定义 navigateToDetail 变量\n```\n\n\n\n\
  在`Listing [4-29]`中，创建了`navigateToDetail`变量，其功能是返回`some View`。它首先通过运行`map`检查`deepLinkEvent`值是否可用，如果值存在，则创建一个`NavigationLink`，其`destination`设置为`DetailView`并携带`event`数据，`isActive`参数设置为`$deepLinkActive`。这里，`deepLinkActive`前面的“`$`”符号表示它是一个绑定。因此，如果`deepLinkActive`的值发生任何变化，`HomeView`的整个`body`会自动重新加载，因此如果`deepLinkActive`的值变为`true`，则`NavigationLink`会导航到其目标，即`DetailView`。同时，`NavigationLink`的`label`是一个`EmptyView()`，并且整个`NavigationLink`是`hidden()`，因为你不希望它在屏幕上的任何位置可见，只希望它正常工作。\n\
  \n1.  为了使`NavigationLink`工作，它必须被包裹在`NavigationView`中。因此，最后一步是以某种方式将存储你的`NavigationLink`的`navigateToDetail`包裹在`HomeView`的`body`中的`NavigationView`里。所以，将`navigateToDetail`设置为`HomeView`的`body`中由`NavigationView`包裹的`List`的背景。这如`Listing\
  \ [4-30]`所示。\n\n```\nvar body: some View {\n    NavigationView {\n        List {\n\
  \            if type == .all {\n                eventListWhenAllChecked\n      \
  \      } else {\n                Group { eventView(for: type) }\n            }\n\
  \        }\n        .background(navigateToDetail)\n        .navigationTitle(\"On\
  \ This Day\")\n        .navigationBarItems(leading: Text(\"\\(today?.month ?? \"\
  JANUARY\") \\(today?.day ?? 1)\")\n            .fontWeight(.semibold)\n        \
  \    .font(.body)\n            .foregroundColor(.red),\n            trailing: TrailingNavView(homeView:\
  \ self))\n    }\n    .alert(isPresented: $isAlertDisplayed,\n           content:\
  \ {\n        Alert(title: Text(\"Oops!\"),\n              message: Text(\"An error\
  \ occurred. Please try reloading the data.\"),\n              dismissButton: .cancel(Text(\"\
  OK\")))\n    })\n    .onAppear(perform: initiateDataFetch)\n    .onOpenURL { url\
  \ in\n        handleLinks(for: url)\n    }\n}\n// Listing 4-30\n// 将 navigateToDetail\
  \ 设置为 HomeView 的 body 中 List 的背景\n```\n\n如果你在`Listing [4-30]`中看到，在`List`的右大括号之后，添加了`.background(navigateToDetail)`，以便将`navigateToDetail`作为其背景。这样，你就成功地将`navigateToDetail`存储的`NavigationLink`包裹在了`HomeView`的`body`的`NavigationView`中。\n\
  \n1.  最后，构建并运行项目，点击中等尺寸小组件的任意事件，即可看到应用程序启动并自动导航到该特定事件的详情页面。如果你点击**Back**按钮，你将在应用程序的主屏幕上看到仅与所选类别相关的事件列表。\n\
  \n至此，你已完成在中等尺寸小组件中添加点击目标的操作。现在，唯一尚未设置点击目标的小组件是大尺寸小组件。你将在下一节中完成此操作。\n\n### 在大尺寸小组件中添加点击目标\n\
  \n在前面的章节中，你已经完成了创建和处理深层链接所需的设置。这使得在大尺寸小组件中添加点击目标更加容易。现在，你只需要修改`LargeWidgetView`文件，使其中的点击目标生效。\n\
  \n由于`LargeWidgetView`与`MediumWidgetView`非常相似，你可以做的第一件事是调用`widgetURL(_:)`方法。这将在整个视图中创建一个点击目标，该目标将导航到显示所选类别事件列表的应用程序主屏幕。用`Listing\
  \ [4-31]`中给出的代码替换`LargeWidgetView`的`body`。\n\n```\nvar body: some View {\n    VStack(alignment:\
  \ .leading, spacing: 0) {\n        today\n        Divider().padding(.vertical, 4)\n\
  \        count\n        todayEvents\n        Spacer()\n    }\n    .padding(8)\n\
  \    .widgetURL(URL(string: category.eventType.rawValue))\n}\n// Listing 4-31\n\
  // 从 LargeWidgetView 的 body 中调用 widgetURL(_:)\n```\n\n`Listing [4-31]`通过在`LargeWidgetView`的`body`中添加对`widgetURL(_:)`的调用来修改它。作为参数传入的\
  \ URL 是通过使用`category`的`eventType`属性的`String rawValue`创建的。由于你已经设置好处理此深层链接的所有内容，如果构建并运行项目，并且点击大尺寸小组件的任意位置，应用程序将启动并显示所选类别的事件列表。\n\
  \n现在，为了添加导航到小组件中列出的事件的详情屏幕的功能，你必须在`todayEvents`中进行修改。首先，使用`Listing [4-32]`中给出的代码在`LargeWidgetView`中创建一个`eventDetail(with:)`方法。\n\
  \n```\nfunc eventDetail(with event: WidgetEventData) -> some View {}\n// Listing\
  \ 4-32\n// 创建 eventDetail(with:)\n```\n\n`Listing [4-32]`创建了一个返回`some View`的`eventDetail(with:)`方法。现在，转到`todayEvents`，剪切其中的`HStack`（`ForEach`循环内的所有内容），并将其粘贴到`eventDetail(with:)`中，使其看起来像`Listing\
  \ [4-33]`中给出的代码。\n\n```\nfunc eventDetail(with event: WidgetEventData) -> some View\
  \ {\n    HStack(spacing: 0) {\n        Color.init(UIColor.systemYellow)\n      \
  \      .frame(width: 4)\n            .padding(.vertical, 12)\n        VStack {\n\
  \            Text(\"\\(event.text)\")\n                .font(.caption)\n       \
  \         .padding(.trailing, 8)\n                .frame(maxWidth: .infinity, alignment:\
  \ .leading)\n        }.padding(8)\n    }\n}\n// Listing 4-33\n// 向 eventDetail(with:)添加代码\n\
  ```\n\n`Listing [4-33]`创建了一个返回`HStack`的`eventDetail(with:)`方法。如果你现在查看`todayEvents`的代码，你将只会看到`Listing\
  \ [4-34]`中显示的代码。\n\n```\nvar todayEvents: some View {\n    VStack(spacing: 0) {\n\
  \        ForEach(events.prefix(3)) { event in\n            // HStack was here\n\
  \        }\n        if events.count > 3 {\n            HStack() {\n            \
  \    Spacer()\n                Text(\"\\(events.count - 3) more\")\n           \
  \         .font(.footnote)\n                    .padding(.trailing)\n          \
  \  }\n        }\n    }\n}\n// Listing 4-34\n// todayEvents 的剩余部分\n```\n\n在`Listing\
  \ [4-34]`中，先前存在`HStack`的那一行已被标记为注释`// HStack was here`。现在，将写着`// HStack was here`的那一行替换为`Listing\
  \ [4-35]`中给出的代码。\n\n```\nif let url = LinkConstants.detail(with: event.text, category:\
  \ category) {\n    Link(destination: url) {\n        eventDetail(with: event)\n\
  \    }\n} else {\n    eventDetail(with: event)\n}\n// Listing 4-35\n// 替换 HStack\
  \ 的代码\n```\n\n你在`MediumWidgetView`中也使用了`Listing [4-35]`中的代码。给定的代码通过将`event.text`和`category`传递给`LinkConstants.detail(with:category:)`方法，并使用`if-let`解包该方法返回的值，来检查是否生成了有效的\
  \ URL。如果生成了有效的 URL，则将其存储在`url`中，并且一个`destination`设置为`url`的`Link`包裹了对`eventDetail(with:)`的调用，该调用负责生成显示事件详细信息的`HStack`。否则，仅调用`eventDetail(with:)`方法。\n\
  \n现在，如果你运行项目并测试你的大尺寸小组件，你将看到，如果你点击任何事件，你将被带到其详情屏幕。如果你从详情屏幕点击**Back**，应用程序将显示列出所选类别事件的主屏幕。\n\
  \n这样，你已成功在大尺寸小组件中添加了点击目标。做得好！\n\n\n\n## 总结\n\n恭喜你完成了这一章！在本章中，你学习了如何让你的小组件变得可配置且具有交互性，从而提升用户体验。你使用了\
  \ `IntentConfiguration` 来让组件可配置，为其添加了点击目标，并利用深度链接实现了应用内不同屏幕的导航。如果遇到任何困惑，请打开 `OnThisDay.zip`\
  \ 中名为 `OnThisDayFinal` 的最终项目文件夹，查看代码的最终版本。\n\n本章教你如何为组件配置提供硬编码数据。在下一章中，你将更进一步，为组件配置提供动态数据（从\
  \ API 获取），让你的组件更加强大。听起来是不是很激动？继续前进吧！\n\n脚注 1 2 3\n\n"
- "# 5. 抓取配置选项\n\n如果你已经读到了本书的这一章，那么到现在为止，你已基本了解如何开发不同尺寸的组件，这些组件不仅能显示静态数据，还能在指定时间间隔从服务器获取新数据。此外，你还学会了如何为组件添加交互目标，并使其可配置。\n\
  \n通过遵循上一章给出的步骤，你开发的组件为用户提供了一个硬编码配置选项列表，用户可据此配置自己的组件。具体来说，在 `OnThisDay` 应用的组件中，用户可以从组件配置屏幕中选择一个事件类别，从而让组件只显示与该类别相关的事件信息。你硬编码了所有可供用户选择的类别。这正是本章与上一章的区别所在。\n\
  \n在本章中，你将学习如何从服务器获取数据，以便将这些数据用作可配置组件参数的配置选项。如果你将本章所学应用到 `OnThisDay` 应用中，你就能用从服务器获取的动态类别选项，替换之前硬编码的类别选项。\n\
  \n现在，我们理解你可能已经对同一个应用感到厌倦了。因此，在本章中，你将使用一个新应用 `TwitterTrends`（喜欢推特的朋友们会喜欢的）。\n\n##\
  \ 开始上手\n\n要开始使用 `TwitterTrends`，请解压名为 `TwitterTrends.zip` 的文件，然后从 `TwitterTrendsStarter`\
  \ 文件夹中打开 `TwitterTrends.xcodeproj`。由于该项目需要使用推特的 API 端点，因此必须生成一个 bearer token。你需要在每次请求或\
  \ API 调用的头部传递这个 bearer token，推特会对其验证。如果传递了有效的 bearer token，推特会返回你所请求的数据。否则，推特将拒绝你的访问。\n\
  \n如果你已经拥有推特开发者账号，你应该可以生成自己的 bearer token。但如果你没有开发者账号，你首先需要从推特的开发者账号页面申请。^(¹¹) 通常，推特需要一到两天甚至更长时间来审核你的申请。\n\
  \n如果你的推特开发者账号已准备就绪，请通过阅读此链接的文章生成自己的 bearer token。^(¹²) 然后，打开项目中 `TwitterTrends`\
  \ 文件夹下的 `TwitterTrendsAPI.swift`，将内容为 \"Your bearer token here\" 的字符串替换为你自己的 bearer\
  \ token 字符串。最后，你就可以运行应用了。\n\n现在，选择 `TwitterTrends` 方案并运行项目，你将看到如图 5-1 所示的屏幕截图。\n\
  \n![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig1_HTML.png](img/505356_1_En_5_Fig1_HTML.png)\n\
  \n图 5-1\n\n`TwitterTrends` 的主屏幕，显示推特上全球流行的趋势列表\n\n图 5-1 展示了 `TwitterTrends` 应用的主屏幕，其中显示了推特上全球流行的热门趋势列表。`TwitterTrends`\
  \ 通过使用推特的 `GET trends/place`^(¹³) API 端点来实现此功能。如果你试用一下这个应用，你会发现你可以点击每个趋势，进入一个显示与该趋势相关推文的屏幕（图\
  \ 5-2）。\n\n![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig2_HTML.png](img/505356_1_En_5_Fig2_HTML.png)\n\
  \n图 5-2\n\n`TwitterTrends` 显示关于趋势 `#FarmersProtest` 的推文列表\n\n图 5-2 展示了在 `TwitterTrends`\
  \ 主屏幕点击 `#FarmersProtest` 趋势后显示的推文列表屏幕。该推文列表是通过使用推特的 `GET search/tweets`^(¹⁴) API\
  \ 端点获取的。\n\n总之，`TwitterTrends` 让用户了解推特上的热门趋势，并获取与这些趋势相关的推文。但是，等等，你看了 `TwitterTrends`\
  \ 的组件了吗？`TwitterTrends` 有一个大尺寸组件（图 5-3），它显示的是与推特 `GET trends/place` API 端点返回的数组中的第一个趋势相关的推文。\n\
  \n![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig3_HTML.png](img/505356_1_En_5_Fig3_HTML.png)\n\
  \n图 5-3\n\n`TwitterTrends` 的大尺寸组件\n\n在图 5-3 中，你可以看到 `TwitterTrends` 大尺寸组件的外观。大尺寸组件是\
  \ `TwitterTrends` 拥有的唯一组件类型。在组件顶部，显示了趋势名称。其下方列出了与该趋势相关的推文，以及每条推文的一些附加信息。如果推文超过三条，则会显示一个\
  \ `Text`，注明组件未能容纳的推文数量。\n\n\n\n当前，如果你尝试编辑小组件并配置它，你会发现并没有相关的选项。但在后续章节中，你将让你的应用变得可配置（如图\
