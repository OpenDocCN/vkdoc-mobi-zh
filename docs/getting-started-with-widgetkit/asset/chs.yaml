  \n\n\n## 创建 SiriKit 意图定义文件\n\n此步骤与上一章的步骤类似。在此步骤中，您将创建一个意图定义文件，并使用该文件为您的 widget 定义可配置属性。请按照以下步骤创建该文件：\n\
  \n![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig6_HTML.jpg](img/505356_1_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6：在意图定义文件中创建新意图\n\n1.  右键点击项目中的 **TwitterTrendsWidget** 文件夹，点击 **New Group**\
  \ 创建一个新文件夹，并将其命名为 **Intent**。\n2.  现在，右键点击 **Intent** 文件夹，点击 **New File…**。\n3.\
  \  在出现的对话框中，选择 **SiriKit Intent Definition File**，将其命名为 `TwitterTrends.intentdefinition`，并创建该文件。创建文件时，请确保对话框底部勾选了\
  \ **TwitterTrendsWidgetExtension** 和 **TwitterTrends** 这两个目标。\n4.  打开 `TwitterTrends.intentdefinition`，点击意图文件左下角的“**+**”图标，然后从选项列表中点击\
  \ **New Intent**（图 5-6）。\n\n![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig7_HTML.jpg](img/505356_1_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7：创建名为“selectedTrend”的参数，并将其“类型”更改为“添加类型…”\n\n5.  将意图命名为 **Trends**，并修改该意图的一些配置。由于您仅将意图用于\
  \ widget，请勾选 **Intent is eligible for widgets**，并取消勾选 **Intent is user-configurable\
  \ in the Shortcuts app and Add to Siri** 和 **Intent is eligible for Siri Suggestions**。\n\
  6.  现在，点击 **Parameters** 部分下方的“**+**”按钮，添加一个名为 `selectedTrend` 的参数。参数是用户将在 widget\
  \ 配置界面中看到并修改的属性，用以配置您的 widget。在 widget 配置界面（图 5-4）中显示的显示名称会自动设置为 **Selected Trend**。\n\
  7.  然后，将 `selectedTrend` 参数的类型更改为 **添加类型…**（图 5-7）。\n\n![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig8_HTML.jpg](img/505356_1_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8：点击“添加类型”后显示的界面\n\n8.  点击 **添加类型…** 后，会立即显示一个新界面，如图 5-8 所示。在左侧 **TYPES**\
  \ 标题下的项目中输入名称，将新类型更名为 `SelectedTrend`。\n9.  再次回到 **Trends** 自定义意图，选中 `selectedTrend`\
  \ 参数，并勾选 **Options are provided dynamically**，这是因为您希望通过从远程服务器获取数据来动态提供该参数的选项。同时，取消勾选\
  \ **Siri can ask for value when run**，因为您不需要与 Siri 协作。\n\n通过这种方式，您便创建了一个意图定义文件，并添加了参数\
  \ `selectedTrend`，用户将在 widget 的配置界面中使用该参数选择他们喜欢的趋势。\n\n## 设置 IntentHandler 以获取热门趋势并发送至\
  \ Widget\n\n现在，您需要添加一个机制，以便在创建时间线时使用 `selectedTrend` 参数。在上一章中，这个过程简单直接，因为您有一个包含一组已定义或硬编码值的\
  \ `enum`。但这次您将使用一个 `class`，情况会有所不同。\n\n因此，首先您需要为 widget 提供 `SelectedTrend` 类型的 `selectedTrend`\
  \ 参数可以持有的值。为此，您需要一个意图处理器（intent handler），它负责从服务器获取这些值并提供给您的 widget。\n\n![../images/505356_1_En_5_Chapter/505356_1_En_5_Fig9_HTML.jpg](img/505356_1_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9：点击“支持的意图”下方的“+”图标后显示的界面\n\n1.  在 Xcode 中，转到 **File** ➤ **New** ➤ **Target**\
  \ 创建一个新目标。在出现的对话框中，选择 **Intents Extension**，然后点击 **Next**。\n2.  在显示的对话框中，将 **Product\
  \ Name** 设置为 `TwitterTrendsIntent`，**Language** 设置为 **Swift**，**Starting Point**\
  \ 设置为 **None**。确保 **Include UI Extension** 未被勾选。将 **Project** 设置为 `TwitterTrends`，**Embed\
  \ in Application** 的值设置为 `TwitterTrends`。然后点击 **Finish**。如果被询问是否要 **Activate “TwitterTrendsIntent”\
  \ scheme**，请点击 **Cancel**，因为后续运行 widget 或 App 时无需激活该 scheme。\n\n现在，您的项目中创建了一个名为\
  \ `TwitterTrendsIntent` 的新文件夹，其中包含 `IntentHandler.swift` 和 `Info.plist`。您将在 `IntentHandler.swift`\
  \ 文件中编写代码，从 Twitter 服务器获取热门趋势并将其发送到您的 widget。\n\n3.  现在，打开 `TwitterTrendsWidget`\
  \ 的 **Intent** 文件夹中的 `TwitterTrends.intentdefinition` 文件，通过勾选 `TwitterTrendsIntent`\
  \ 来更新其 **Target Membership**。现在，该文件可以从 `TwitterTrends`、`TwitterTrendsWidget` 和 `TwitterTrendsIntent`\
  \ 访问。\n4.  需要注意的是，`TwitterTrendsIntent` 目标需要知道它可以支持的意图类型。为此，选择位于 **Project Navigator**\
  \ 顶部的 `TwitterTrends` 项目（而不是 `TwitterTrends` 文件夹）以进入项目设置。现在，在 **TARGETS** 部分中选择\
  \ `TwitterTrendsIntent` 目标，并进入其 **General** 标签页。\n5.  在 `TwitterTrendsIntent` 的\
  \ **General** 标签页中，转到 **Supported Intents** 部分，点击其下方的“**+**”号新增一个支持的意图。此时的界面将如图\
  \ 5-9 所示。\n6.  在 **Class Name** 标题下输入 `TrendsIntent`。由于您在步骤 3 中已将 `TwitterTrends.intentdefinition`\
  \ 设为 `TwitterTrendsIntent` 目标的成员，因此开始输入时便会看到建议。`TrendsIntent` 这个名称是由 Xcode 根据您在**创建和配置\
  \ SiriKit 意图定义文件** 的步骤 5 中添加到 `TwitterTrends.intentdefinition` 的自定义意图名称 **Trends**\
  \ 自动生成的。最后，让 `TrendsIntent` 的 **Authentication** 保持为 **None**。\n7.  现在，打开 `TwitterTrendsIntent`\
  \ 文件夹中的 `IntentHandler.swift`。目前，`IntentHandler` 类继承自 `INExtension` 类。现在让 `IntentHandler`\
  \ 遵循 Xcode 自动生成的 `TrendsIntentHandling` 协议。完成此操作后，`IntentHandler.swift` 中的代码将如代码清单\
  \ 5-1 所示。\n8.  一旦您使 `IntentHandler` 遵循 `TrendsIntentHandling`，Xcode 将显示一条错误消息：“类型‘IntentHandler’不符合协议‘TrendsIntentHandling’。是否要添加协议存根？”这是因为您尚未在\
  \ `IntentHandler` 中实现 `TrendsIntentHandling` 协议的属性。\n\n\n\n2.  单击 **Fix**，让 Xcode\
  \ 生成 `provideSelectedTrendOptionsCollection(for:with:)` 的实现。你将在此处通过 `TwitterTrendsAPI`\
  \ 与 Twitter 服务器通信，获取热门趋势。但目前 `IntentHandler.swift` 无法访问 `TwitterTrendsAPI`，因此你需要更新其\
  \ **Target Membership**。\n\n3.  打开 **TwitterTrends** 文件夹中的 **TwitterTrendsAPI.swift**，然后更新其\
  \ **Target Membership**，为 **TwitterTrendsIntent** 添加勾选标记。现在你就能从 `IntentHandler.swift`\
  \ 中访问它了。\n\n4.  打开 `IntentHandler.swift`，通过将当前实现替换为代码清单 5-2 中的代码来实现 `provideSelectedTrendOptionsCollection(for:with:)`。\n\
  \n```swift\nimport Intents\nclass IntentHandler: INExtension, TrendsIntentHandling\
  \ {\n    override func handler(for intent: INIntent) -> Any {\n        return self\n\
  \    }\n}\n// 代码清单 5-1\n// 符合 TrendsIntentHandling 协议后的 IntentHandler\n```\n\n```swift\n\
  func provideSelectedTrendOptionsCollection(for intent: TrendsIntent, with completion:\
  \ @escaping (INObjectCollection?, Error?) -> Void) {\n    // a\n    TwitterTrendsAPI.getAvailableTrends\
  \ { response in\n        // b\n        switch response {\n            // c\n   \
  \     case .success(let trends):\n            // d\n            if let firstTrend\
  \ = trends.first {\n                // e\n                let availableTrends =\
  \ firstTrend.trends\n                // f\n                let usableTrends: [SelectedTrend]\
  \ = availableTrends.map { element in\n                    return SelectedTrend(identifier:\
  \ element.query, display: element.name)\n                }\n                // g\n\
  \                let inObjectCollection: INObjectCollection = INObjectCollection(items:\
  \ usableTrends)\n                completion(inObjectCollection, nil)\n         \
  \   }\n        case .failure(let error):\n            // h\n            print(error.localizedDescription)\n\
  \        }\n    }\n}\n// 代码清单 5-2\n// provideSelectedTrendOptionsCollection(for:with:)\
  \ 的实现\n```\n\n粘贴代码清单 5-2 的代码后，你一定会看到大量错误。因此，在描述代码清单 5-2 的内容之前，我们先消除这些错误。浏览错误信息后，你会发现\
  \ Xcode 提示找不到类型 `Trends`、`TrendTweets`、`Trend` 和 `Tweets`。这是因为 `TwitterTrendsAPI`\
  \ 现在也是 **TwitterTrendsIntent** 目标的成员，但它使用的结构体（`TrendTweets`、`Trend` 和 `Tweets`）却不是该目标的成员。因此，你需要将这些结构体设为\
  \ **TwitterTrendsIntent** 的成员。\n\n从 **TwitterTrends** 的 **Models** 文件夹中打开 `TrendTweets.swift`，并更新其\
  \ **Target Membership**，为 **TwitterTrendsIntent** 添加勾选标记。对 `Trends.swift` 和 `Tweets.swift`\
  \ 重复同样的操作。\n\n1.  现在构建你的项目，你会发现所有错误都已消失。接下来，我们回到代码清单 5-2 来了解其具体内容。\n    1.  由于 `provideSelectedTrendOptionsCollection(for:with:)`\
  \ 方法是你获取 Twitter 热门趋势并将其作为 `selectedTrend` 参数的选项进行传递的位置，因此你通过调用 `TwitterTrendsAPI`\
  \ 的 `getAvailableTrends(id:completion:)` 方法来开始实现。\n\n2.  `getAvailableTrends(id:completion:)`\
  \ 通过其完成处理器返回 `response`。`response` 可以是 `.success` 或 `.failure`，因此使用 `switch` 语句进行处理。\n\
  \n3.  如果 `response` 的值为 `.success`，则它包含 `trends`，即热门趋势的数据。\n\n4.  如果你研究一下 Twitter\
  \ 的 **GET trends/place** API 端点的响应格式，就会发现它返回一个包含单个对象的数组。通过 `trends.first` 访问该对象，并将其存储在\
  \ `firstTrend` 中。\n\n5.  现在，所有已获取的趋势都存储在 `firstTrend` 的 `trends` 属性中。因此，通过 `firstTrend.trends`\
  \ 访问它们，并存储在 `availableTrends` 中。\n\n6.  由于你在 `TwitterTrends.intentdefinition` 中已将\
  \ `selectedTrend` 参数的数据类型定义为 `SelectedTrend`，因此现在需要将从 Twitter API 获取的趋势转换为该类型。为此，对\
  \ `availableTrends` 数组中的所有值运行 `map`，每次迭代使用 `query` 和 `name` 创建新的 `SelectedTrend`\
  \ 实例。然后将它们存储在 `usableTrends` 数组中，该数组用于存储 `SelectedTrend` 值。\n\n7.  在此步骤中，将 `usableTrends`\
  \ 传递给 `INObjectCollection` 初始化器，并存储在 `inObjectCollection` 中。然后，通过将 `inObjectCollection`\
  \ 作为参数传递给完成处理器来调用它。这样，从 Twitter 服务器获取的热门趋势就会被发送到 widget 的 `selectedTrend` 参数。\n\n\
  8.  如果 `response` 包含 `.failure`，则访问其 `error` 属性并将其打印到控制台。\n\n通过这种方式，你从 Twitter API\
  \ 获取了趋势，将它们转换为你在 `TwitterTrends.intentdefinition` 中创建的 `selectedTrend` 参数的类型，并传递给了\
  \ `selectedTrend`。\n\n## 切换到 IntentConfiguration\n\n目前，如果你构建并运行项目，会发现长按 widget 并不会显示\
  \ **Edit Widget** 选项。这是因为你尚未做好必要的准备，将 `StaticConfiguration` 替换为 `IntentConfiguration`。而要使用\
  \ `IntentConfiguration`，你需要一个与当前不同的时间线提供器。只需按照以下步骤进行，即可完成向 `IntentConfiguration`\
  \ 的“大迁移”。\n\n\n\n### 创建 `IntentTimelineProvider`\n\n如前所述，切换到 `IntentConfiguration`\
  \ 的第一步是设置一个 `IntentTimelineProvider`。请按照以下步骤进行设置：\n\n1.  右键点击 **TwitterTrendsWidget**\
  \ 文件夹中的 **Provider** 文件夹，点击 **新建文件...**，然后创建一个名为 `TwitterTrendsIntentProvider.swift`\
  \ 的新 Swift 文件。在创建文件之前，请确保对话框底部的 **TwitterTrendsWidgetExtension** 目标已被勾选。\n\n**注意**：你也可以使用现有的\
  \ `TwitterProvider.swift` 文件，而不是创建 `TwitterTrendsIntentProvider.swift`，但为了清晰起见，我们建议你创建\
  \ `TwitterTrendsIntentProvider.swift`。\n\n2.  打开 `TwitterTrendsIntentProvider.swift`，并将现有代码内容替换为代码清单\
  \ 5-3 中给出的代码。\n\n1.  在代码清单 5-3 中，创建了一个遵循 `IntentTimelineProvider` 协议的名为 `TwitterTrendsIntentProvider`\
  \ 的结构体。一旦你添加了代码，Xcode 会询问是否要添加协议存根（protocol stubs）。点击 **Fix** 并添加它们，你会看到 `Entry`\
  \ 和 `Intent` 这两个 `typealias` 被添加到了结构体中。\n\n2.  在 `TwitterTrendsIntentProvider` 中，将\
  \ `Entry` 的类型占位符替换为 `TweetWidgetEntry`（一种时间线条目类型）。同时，将 `Intent` 的类型占位符替换为 `TrendsIntent`，该名称源自你在\
  \ `TwitterTrends.intentdefinition` 中创建的自定义意图 `Trends`。\n\n现在你的代码应类似于代码清单 5-4 中的代码。\n\
  \n```\nimport SwiftUI\nimport WidgetKit\n\nstruct TwitterTrendsIntentProvider: IntentTimelineProvider\
  \ {\n}\n代码清单 5-3\n创建遵循 IntentTimelineProvider 的 TwitterTrendsIntentProvider\n```\n\
  \n1.  你仍会看到 Xcode 要求你添加协议存根。同样添加它们。然后，`placeholder(in:)`、`getSnapshot(for:in:completion:)`\
  \ 和 `getTimeline(for:in:completion:)` 方法就会生成。\n\n2.  要实现 `TwitterTrendsIntentProvider`\
  \ 的 `placeholder(in:)` 和 `getSnapshot(for:in:completion:)` 方法，你可以从 `TwitterProvider.swift`\
  \ 中 `TwitterProvider` 的 `placeholder(in:)` 和 `getSnapshot(for:in:completion:)` 方法复制代码，因为相同的实现是可用的。\n\
  \n3.  `TwitterTrendsIntentProvider` 的 `getTimeline(for:in:completion:)` 方法与 `TwitterProvider`\
  \ 的 `getTimeline(in:completion:)` 方法不同，因为 `TwitterTrendsIntentProvider` 遵循 `IntentTimelineProvider`，而\
  \ `TwitterProvider` 遵循 `TimelineProvider`。`TwitterTrendsIntentProvider` 的 `getTimeline(for:in:completion:)`\
  \ 方法允许你从 widget 的配置中访问数据。\n\n在当前场景中，你将访问 widget 配置中选中的趋势（trend），并使用它来执行 API 调用，以获取与该选中趋势相关的推文。如果没有选中的趋势，你将让\
  \ widget 获取与从 Twitter API 获取的趋势数组中第一个趋势相关的推文。所有这些操作都将在 `getTimeline(for:in:completion:)`\
  \ 中完成。\n\n在开始处理 `getTimeline(for:in:completion:)` 之前，我们先创建一个方法 `createTimelineFromTweets(response:)`，用于从\
  \ API 获取的推文中创建时间线。然后，你可以从 `getTimeline(for:in:completion:)` 中调用此方法。这将使代码更具可读性和易于理解。复制代码清单\
  \ 5-5 中给出的代码，并将其粘贴到 `TwitterTrendsIntentProvider` 中。\n\n```\nimport SwiftUI\nimport\
  \ WidgetKit\n\nstruct TwitterTrendsIntentProvider: IntentTimelineProvider {\n  \
  \  typealias Entry = TweetWidgetEntry\n    typealias Intent = TrendsIntent\n}\n\
  代码清单 5-4\n添加 Entry 和 Intent 类型后的 TwitterTrendsIntentProvider\n```\n\n```\nfunc createTimelineFromTweets(response:\
  \ Result) -> Timeline {\n    // a\n    let currentDate = Date()\n    // b\n    let\
  \ refreshDate = Calendar.current.date(byAdding: .minute, value: 30, to: currentDate)!\n\
  \    // c\n    var entry = TweetWidgetEntry(date: refreshDate, statuses: Tweets.dummyTweets,\
  \ trendTitle: \"\")\n    // d\n    var timeline = Timeline(entries: [entry], policy:\
  \ .after(refreshDate))\n    // e\n    switch response {\n    case let .success(tweets):\n\
  \        // f\n        entry = TweetWidgetEntry(date: refreshDate, statuses: tweets.statuses,\
  \ trendTitle: tweets.title)\n        timeline = Timeline(entries: [entry], policy:\
  \ .after(refreshDate))\n        return timeline\n    case let .failure(error):\n\
  \        // g\n        print(error.localizedDescription)\n        return timeline\n\
  \    }\n}\n代码清单 5-5\n创建 createTimelineFromTweets(response:) 方法\n```\n\n在代码清单 5-5\
  \ 中，你创建了一个方法 `createTimelineFromTweets(response:)`，它有一个参数 `response` 并返回一个时间线。在该方法中，完成了以下工作：\n\
  \n1.  现在是时候开始在 `getTimeline(for:in:completion:)` 方法中工作了。将现有的 `getTimeline(for:in:completion:)`\
  \ 方法替换为代码清单 5-6 中给出的代码。\n\n1.  首先，当前日期被存储在 `currentDate` 中。\n\n2.  接着，生成在 `currentDate`\
  \ 基础上增加 30 分钟后的日期，并存储在 `refreshDate` 中。稍后你将使用它来设置 widget 的刷新策略。\n\n3.  在此步骤中，通过将\
  \ `refreshDate`、虚拟推文和一个空标题字符串传递给初始化器，创建了 `TweetWidgetEntry` 时间线条目，并将其存储在 `entry`\
  \ 中。\n\n4.  现在，使用 `entry` 并设置刷新策略为 30 分钟后让 widget 请求新的时间线，从而创建了一个时间线。这样就完成了时间线的创建。\n\
  \n5.  由于 `response` 可能携带 `.success` 值或 `.failure` 值，因此通过 `switch` 分支来处理。如果 `response`\
  \ 携带 `.success` 值，则使用 `.success` 中接收到的 `tweets`，并利用 `tweets` 的 `title` 和 `statuses`\
  \ 属性创建一个新的 `TweetWidgetEntry`。然后，`entry` 变量的值被这个新条目替换。同时，`timeline` 变量的值也被替换为使用\
  \ `entry` 的新值创建的新时间线，并返回该 `timeline`。\n\n6.  如果 `response` 携带 `.failure`，则访问 `error`\
  \ 变量，并将其值输出到控制台。同时，由于方法必须返回一个时间线，因此返回包含虚拟推文和空标题的 `timeline` 变量（在步骤 \"c\" 和 \"d\"\
  \ 中创建）。\n\n```\nfunc getTimeline(for configuration: TrendsIntent, in context: Context,\
  \ completion: @escaping (Timeline) -> Void) {\n    // a\n    if let trend = configuration.selectedTrend\
  \ {\n        let selectedTrend = Trend(name: trend.displayString, query: trend.identifier!)\n\
  \        TwitterTrendsAPI.getTweets(on: selectedTrend) { response in\n         \
  \   completion(createTimelineFromTweets(response: response))\n        }\n    } else\
  \ { // b\n        TwitterTrendsAPI.getLatestTweets { response in\n            completion(createTimelineFromTweets(response:\
  \ response))\n        }\n    }\n}\n代码清单 5-6\ngetTimeline(for:in:completion:) 方法的实现\n\
  ```\n\n在代码清单 5-6 中，给出了 `getTimeline(for:in:completion)` 方法的实现。代码清单 5-6 中完成了以下工作：\n\
  \n1.  此方法检查两种情况——第一种是 `configuration` 中存在 `selectedTrend` 的值，第二种是 `selectedTrend`\
  \ 不包含任何值。`selectedTrend` 属性是你在本章前几节中在 `TwitterTrends.intentdefinition` 中创建的参数。\n\
  \n\n\n在当前步骤中，代码会检查用户是否已从配置屏幕中选择了趋势。因此，如果用户已选择一个趋势（即`selectedTrend`中存有值），该值会被存储到`trend`中，并通过使用该趋势的`displayString`和`identifier`创建一个新的`Trend`实例。\n\
  \n然后，调用`TwitterTrendsAPI`的`getTweets(on:completion:)`方法来获取与该趋势相关的推文。当收到`response`时，会通过将`createTimelineFromTweets(response:)`的调用作为参数传入，来调用`getTimeline(for:in:completion:)`方法的完成处理器。\n\
  \n`createTimelineFromTweets(response:)`将从 API 调用中收到的`response`作为参数，生成一个时间线并返回。最后，`getTimeline(for:in:completion:)`的完成处理器会使用该时间线，从而为小组件创建一个时间线。\n\
  \n但如果用户尚未选择任何趋势（或`configuration`的`selectedTrend`属性中没有值），则会调用`TwitterTrendsAPI`的`getLatestTweets(completion:)`方法。该方法首先从\
  \ Twitter 的 API 获取所有趋势，从 API 响应中选择第一个趋势，获取与该趋势相关的推文，并将其作为`response`返回。收到响应后，通过将`createTimelineFromTweets(response:)`的调用作为参数传入，来调用`getTimeline(for:in:completion:)`方法的完成处理器。\n\
  \n然后，`createTimelineFromTweets(response:)`将从 API 调用中收到的`response`作为参数，生成一个时间线并返回。最后，`getTimeline(for:in:completion:)`的完成处理器会使用该时间线，从而为小组件创建一个时间线。\n\
  \n通过这种方式，你创建了一个`IntentTimelineProvider`，这是切换到`IntentConfiguration`所必需的。\n\n### 切换到`IntentConfiguration`\n\
  \n现在你已经准备好切换到`IntentConfiguration`了。如果你打开`TwitterTrendsWidget`文件夹中的`Widget`文件夹里的`TwitterTrendsWidget.swift`文件，你会看到目前`TwitterTrendsWidget`的`body`中使用了`StaticConfiguration`。\n\
  \n在`TwitterTrendsWidget`中，使用列表 5-7 中的代码创建一个名为`dynamicConfiguration`的变量。\n\n```\n\
  var dynamicConfiguration: some WidgetConfiguration {\n    IntentConfiguration(kind:\
  \ kind, intent: TrendsIntent.self, provider: TwitterTrendsIntentProvider()) { entry\
  \ in\n        LargeWidgetView(tweets: entry.statuses, title: entry.trendTitle)\n\
  \    }\n    .supportedFamilies([.systemLarge])\n    .configurationDisplayName(\"\
  Tweets\")\n    .description(\"Tweets Trending Today\")\n}\n```\n列表 5-7 创建`dynamicConfiguration`变量\n\
  \n在列表 5-7 中，创建了一个名为`dynamicConfiguration`的变量，它返回一个`IntentConfiguration`初始化器。它使用了`TwitterTrendsWidget`的`kind`变量的值、`TrendsIntent`作为其意图，以及`TwitterTrendsIntentProvider`的初始化器作为其时间线提供者。其他所有代码行与`TwitterTrendsWidget`的`body`中现有的`StaticConfiguration`类似。\n\
