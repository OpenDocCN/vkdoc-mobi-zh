  \ `OnThisDay` 目标以将其安装到模拟器或真机上。然后，选择并运行 `OnThisDayWidgetExtension` 目标来安装小组件。当小组件在主屏幕上显示后，尝试进入其配置界面并选择不同的类别。你可以参考图\
  \ 4-10、4-11 和 4-12。选择新类别后，与该类别事件相关的信息应显示在你的小组件中。\n\n干得漂亮！你已成功让小组件支持用户自定义配置了。\n\n\
  ## 通过点击跳转目标导航到应用的相关界面\n\n你试过点击上一节创建的小组件中的不同元素吗？目前，无论点击小组件的哪个位置，应用都会启动并显示主屏幕。这需要改变，因为你的小组件不仅仅是应用图标，它的功能远不止于此。如果你查阅本书第\
  \ 2 章的“人机界面指南”部分，你会在“点击小组件应打开应用的正确位置”这一标题下找到以下说明：\n\n> *当用户点击应用图标时，应用应启动并显示主屏幕。但当用户点击小组件时，应用应启动并显示包含与该小组件内容相关且有用的详细信息和操作的屏幕。*\n\
  \n因此，在本节中，你将定义点击跳转目标，点击这些目标将通过深层链接实现导航到应用的不同相关界面。\n\n**注意**：深层链接是一种技术，它可以使链接或 URL\
  \ 不仅能打开你的应用，还能自动导航到应用中的指定位置。这种技术目前非常流行，已被各种公司和组织应用于他们的应用和服务中。\n\n一个巧妙运用深层链接的公司例子是\
  \ Medium。如果你在手机浏览器中打开 Medium 网站并阅读一篇文章，你会看到页面顶部有一个“在应用中打开”的按钮。点击该按钮后，如果你使用的是 iOS\
  \ 设备且未安装 Medium 应用，App Store 会在你设备上启动并显示 Medium 应用的安装页面；但如果你使用的是已安装 Medium 应用的 iOS\
  \ 设备，它则会启动并将你带到应用内你正在阅读的同一篇文章。这就是一些神奇的深层链接魔法！\n\n例如，看一下你的中等尺寸小组件（图 4-18），你会发现有多个区域和元素可以作为点击跳转目标，从而实现导航到包含与点击目标内容相关的详细信息和操作的屏幕。图\
  \ 4-18 中使用红色边框的矩形高亮显示了潜在的点击跳转目标。\n\n![../images/505356_1_En_4_Chapter/505356_1_En_4_Fig18_HTML.png](img/505356_1_En_4_Fig18_HTML.png)\n\
  \n图 4-18\n\n高亮显示可点击的元素\n\n在图 4-18 中，第一个潜在的点击跳转目标是显示“1 月 20 日发生了 207 起出生事件”的区域。由于当前选定的事件类别是\
  \ **出生**，你可以将该区域设为可点击，从而将用户导航到仅显示 **出生** 类别事件的应用主屏幕。\n\n另外，你可以看到小组件右侧列出了几项出生事件。因此，你可以为列表中的每个事件定义点击跳转目标，直接将用户导航到被点击事件的详情界面。这一次，显示的屏幕将不再是主屏幕，而是包含与小组件中被点击事件相关的内容和操作的详情界面。例如，在图\
  \ 4-18 中，如果用户点击显示“卡卢姆·钱伯斯，英格兰足球运动员”的事件，那么用户就应该看到包含“卡卢姆·钱伯斯”详细信息的详情界面。\n\n还有一个潜在的点击跳转目标，它告知用户还有更多事件无法在小组件中列出。在图\
  \ 4-18 中，它显示“还有 205 个”。因此，显而易见，用户点击它会期望进入显示所有 **出生** 类别事件的应用主屏幕。\n\n由于大尺寸小组件与中等尺寸小组件类似，其潜在的点击跳转目标也是相同的。\n\
  \n但对于小尺寸小组件而言，`WidgetKit` 只允许你定义一个单一的点击跳转目标，因为它的空间有限，容纳的内容较少。因此，在你创建的小尺寸小组件中，你可以定义一个点击跳转目标，将用户带到显示选定类别事件列表的主屏幕。\n\
  \n\n\n### 在小部件中添加点击目标\n\n在小尺寸部件中，您可以使用 `widgetURL(_:)` 方法来添加点击目标。它是 `View` 的一个实例方法，用于设置在用户点击部件时要在应用中打开的\
  \ URL。另一个 `View` 方法 `onOpenURL(perform:)` 用于检测是否有深层链接试图打开应用，您可以在该方法中执行必要操作，从而实现对不同屏幕的导航。因此，在小尺寸部件的场景下，这两个方法在实现导航功能中起着关键作用。\n\
  \n现在，让我们开始设置吧！\n\n`widgetURL(_:)` 方法接受一个 URL 作为参数，以便设置当小部件被点击时打开应用的 URL。因此，有必要为\
  \ `widgetURL(_:)` 方法创建一个 URL（您稍后将实现该方法）。但您将使用什么来生成 URL 呢？您肯定需要一个名称或其他字符串。使用所选类别本身的名称怎么样？这将是一个好方法，因为您既可以得到\
  \ URL，又可以得到所选类别的值，您可以在应用的主屏幕中使用该值来显示该类别中的事件。现在，请按照以下步骤开发用于生成 URL 的机制：\n\n1.  从 **OnThisDayWidget**\
  \ 的 **Intent** 文件夹中打开 **CategoriesExtension.swift**。\n\n2.  在 `Categories` 的扩展中，复制代码清单\
  \ 4-19 中的代码并粘贴到此处，定义一个类型为 `EventType` 的属性 `eventType`。\n\n```\nvar eventType: EventType\
  \ {\n    switch self {\n    case .unknown, .all: return .all\n    case .births:\
  \ return .births\n    case .deaths: return .deaths\n    case .events: return .events\n\
  \    case .holidays: return .holidays\n    case .selected: return .selected\n  \
