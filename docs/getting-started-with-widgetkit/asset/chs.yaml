  \ widget 可配置。\n\n## 赋予 Widget 与 API 通信的能力\n\n在本节中，你将移除 widget 中的虚拟数据，并赋予它们调用 Wikipedia\
  \ 的“On This Day API”来获取新鲜数据并显示最新信息的能力。目前，无需担心事件的类别/类型，因为你将使 widget 获取并显示所有类型事件的信息。\n\
  \n1.  在`OnThisDayWidget`的`Provider`文件夹中创建一个名为`OnThisDayAPI.swift`的新文件。创建此文件时，请确保选中`OnThisDayWidgetExtension`目标。\n\
  \n2.  将代码清单 4-1 中的代码复制并粘贴到该文件中，以创建一个包含静态方法`fetchOnThisDayData(with:)`的`OnThisDayAPI`结构体。\n\
  \n```\nstruct OnThisDayAPI {\n    static func fetchOnThisDayData(with completion:\
  \ @escaping ([WidgetEventData]) -> Void) {\n        guard let today = DateHelper.getDayAndMonthInNumbers(),\n\
  \              let url = URL(string: \"https://en.wikipedia.org/api/rest_v1/feed/onthisday/all/\\\
  (today.month)/\\(today.day)\") else { return }\n        let task = URLSession.shared.dataTask(with:\
  \ url) { data, response, _ in\n            if let data = data,\n               let\
  \ response = response as? HTTPURLResponse,\n               response.statusCode ==\
  \ 200 {\n                do {\n                    let otdResponse = try JSONDecoder().decode(OTDResponse.self,\
  \ from: data)\n                    var responses: [EventData] = []\n           \
  \         responses = otdResponse.selected + otdResponse.births + otdResponse.deaths\
  \ + otdResponse.events + otdResponse.holidays\n                    completion(responses.map({\
  \ WidgetEventData(text: $0.text) }))\n                } catch {\n              \
  \      completion([])\n                    print(\"JSON Decoding Error.\")\n   \
  \             }\n                completion([])\n            }\n        }\n    \
  \    task.resume()\n    }\n}\n代码清单 4-1\n包含一个静态方法用于调用 Wikipedia API 的 OnThisDayAPI\
  \ 结构体\n```\n\n代码清单 4-1 由`OnThisDayAPI`结构体组成，其中包含一个名为`fetchOnThisDayData(with:)`的静态方法。该方法调用\
  \ Wikipedia API 来获取系统日期（由`DateHelper.getDayAndMonthInNumbers()`方法返回并存储在`today`变量中）发生的所有类型的事件。然后，对响应进行解码，并通过其完成处理程序将其返回给调用方，该处理程序接受一个`WidgetEventData`数组作为参数。\n\
  \n现在，既然你已经准备好了`fetchOnThisDayData(with:)`，是时候调用它了。转到`Provider.swift`，并将`getTimeline(in:completion:)`替换为代码清单\
  \ 4-2 中给出的代码。\n\n```\nfunc getTimeline(in context: Context, completion: @escaping\
  \ (Timeline) -> Void) {\n    // 1\n    OnThisDayAPI.fetchOnThisDayData { widgetData\
  \ in\n        // 2\n        let currentDate = Date()\n        // 3\n        let\
  \ refreshDate = Calendar.current.date(byAdding: .day, value: 1, to: currentDate)!\n\
  \        // 4\n        let entry = WidgetEvent(date: currentDate, events: widgetData)\n\
  \        // 5\n        let timeline = Timeline(entries: [entry], policy: .after(refreshDate))\n\
  \        // 6\n        completion(timeline)\n    }\n}\n代码清单 4-2\n`getTimeline(in:completion:)`\
  \ 方法，通过调用 `fetchOnThisDayData(with:)` 执行 API 调用\n```\n\n在代码清单 4-2 的代码中，发生了以下事情：\n\
  \n1.  调用了`OnThisDayAPI`结构体的静态方法`fetchOnThisDayData(with:)`。\n\n2.  一旦`fetchOnThisDayData(with:)`的完成处理程序将结果作为`widgetData`返回后，当前日期就被存储在`currentDate`中。\n\
  \n3.  现在，下一天的日期被存储在`refreshDate`中。稍后将用它来设置 widget 的刷新策略。\n\n4.  由于 widget 依赖于时间线条目来创建时间线，因此创建了一个`WidgetEvent`时间线条目并存储在`entry`中。并且，将`currentDate`的值以及作为\
  \ API 调用响应接收到的`widgetData`传递给`WidgetEvent`构造函数。\n\n5.  既然至少有一个时间线条目，是时候创建一个时间线了。因此，通过传递一个包含`entry`的数组来创建一个时间线，并将其存储在`timeline`中。同时，刷新策略被设置为让\
  \ widget 在`refreshDate`之后请求新的时间线。这样，widget 被设置为每天刷新。\n\n现在，选择`OnThisDayWidgetExtension`方案（如果你还没有选择的话），然后运行代码，看看你的\
  \ widget 从 Wikipedia API 获取数据。目前，你的 widget 将显示所有事件的信息（而不是某个特定类别的事件）。最初，widget 可能需要一些时间来加载更新后的数据。所以，请耐心等待，享受你的成果。你的小、中、大尺寸\
  \ widget 应该分别类似于图 4-7、图 4-8 和图 4-9。\n\n你已经成功赋予了你的 widget 从 API 加载事件信息的能力。干得好！但是事件可能属于不同类别，用户可能只想要与特定事件类别相关的信息。在接下来的部分中，你将添加功能，允许用户配置你的\
  \ widget，使其仅显示与某个特定类别相关的信息。\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您的格式要求，完成本次翻译任务。\n\n***\n\
  \n\n## 允许用户配置小组件\n\n本节将介绍如何让你的小组件变得可配置。目前，你的小组件正在显示所有事件信息，而不论其类别如何。但也许有些用户希望这样配置他们的组件：他们只想获取特定类别的事件信息。也许有人想追踪历史名人的生日，或者有人喜欢获取有关发生的特殊历史事件的信息。为了满足这一目的，你可以开发你的小组件，让用户能够选择他们偏好的事件类别，并配置它们以显示与该特定事件类别相关的信息。\n\
  \n现在，`IntentConfiguration` 就该登场了。到目前为止，你只使用了 `StaticConfiguration`，因为你之前不需要允许用户根据自己的偏好来配置小组件。如果你不记得在哪里使用过\
  \ `StaticConfiguration`，请打开 **OnThisDayWidget** 文件夹。在那里，你会看到一个名为 **Widget** 的文件夹。打开它，找到\
  \ `OnThisDayWidget.swift`，这是你小组件的入口点。正是在这里，你创建了一个 `StaticConfiguration`。在 `OnThisDayWidget.swift`\
  \ 中，你应该会看到一段类似于代码清单 4-3 的代码块。\n\n```\nvar staticConfiguration: some WidgetConfiguration\
  \ {\nStaticConfiguration(kind: kind, provider: Provider()) { entry in\nWidgetView(events:\
  \ entry.events)\n}\n.supportedFamilies([.systemSmall, .systemMedium, .systemLarge])\n\
  .configurationDisplayName(\"On This Day\")\n.description(\"Events that occured this\
  \ day.\")\n}\nListing 4-3\nOnThisDayWidget.swift 中的 StaticConfiguration\n```\n\n\
  稍后，你将把这个配置改为 `IntentConfiguration`，并做一些其他更改，以使你的小组件可配置。现在是时候按照以下步骤开始工作了。\n\n###\
