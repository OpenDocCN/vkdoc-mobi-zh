  trans: "好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n# 表盘复杂功能\n\n表盘复杂功能是添加到表盘上的一种功能。\n\
    \n我们将在以下章节中讨论不同的开发路径。\n\n接下来，打开 `Tools ➤ AVD Manager` 并创建一个新的虚拟穿戴设备。现在，您可以在虚拟穿戴设备上启动您的应用。除非您选择了“不添加\
    \ Activity”，否则模拟器应该已经在表盘上显示一个启动 UI。\n\n要将虚拟手表与您的智能手机配对，请使用 USB 数据线将智能手机连接到您的开发电脑，将其设为开发设备（在系统设置底部点击“版本号”七次），然后在智能手机上安装“Wear\
    \ OS by Google”应用。在您的开发电脑上，通过以下方式设置通信：\n\n```\n./adb -d forward tcp:5601 tcp:5601\n\
