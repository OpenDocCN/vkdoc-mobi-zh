- fmt: '# The Book’s Target Audience


    The book is for intermediate to experienced Android developers wishing to use
    the new Kotlin features to address current Android versions and devices.


    The readers will in the end be able to use Android Studio and Kotlin as a language
    for building advanced and elaborated apps targeting the Android platform.


    Being a Kotlin expert is not absolutely necessary for using this book, but having
    read introductory-level books or studied online resources is surely helpful. The
    online documentation of Kotlin also provides valuable resources you can use as
    a reference while reading this book.


    # Source Code


    All source code shown or referred to in this book can be found at [`github.com/Apress/pro-android-with-kotlin`](https://github.com/Apress/pro-android-with-kotlin)`-2e`.


    ## Online Text Companion


    Some lists and tables, as well as some class and interface details, are available
    to the public as a *text companion* at [`github.com/Apress/pro-android-with-kotlin`](https://github.com/Apress/pro-android-with-kotlin)`-2e`.
    References to such online resources are marked appropriately.


    ## How to Read This Book


    This book can be read sequentially if you want to get an impression of what can
    be done on the Android platform. Or you can read chapters independently when need
    arises while working on your Android projects. Besides, you can use parts of the
    book as a reference for both finding solutions with respect to particular problems
    that come up and determining how things can be done using Kotlin instead of Java.
    This includes the description of special Kotlin language constructs helping you
    make your code concise and reliable.


    The book is split up in chapters. Chapter [1](#463716_2_En_1_Chapter.xhtml) gives
    a very short bird’s-eye view of the Android system. If you already have some experience
    with Android, you can skip it or just shortly scan over it.


    Chapters [2](#463716_2_En_2_Chapter.xhtml)–[6](#463716_2_En_6_Chapter.xhtml) talk
    about the Android architecture’s corner blocks: an application as a whole, activities,
    services, broadcasts, and content providers. Talking to you as a pro-level developer,
    some of the information provided there may seem to be a little bit basic and may
    be easy to find in the official Android developer documentation or elsewhere on
    the Web. The reason I nevertheless added them can be seen if looking more thoroughly
    at it: the information you can find looking at other sources is of varying qualities,
    sometimes because of historical reasons, sometimes just because it is outdated.
    So I tried to rectify some of the peculiarities you find there and also provide
    you a consolidated, fresh, and new view on things, hoping I can save you some
    time when you try to find out how the deeper-level nuts and bolts of Android work.
    You can also see them as a reference just to keep under your pillow in case you
    are in doubt about some development issues coming up while your Android project
    advances.


    Chapter [7](#463716_2_En_7_Chapter.xhtml) briefly talks about the permission system,
    something you must of course be acquainted with if you develop pro-level Android
    apps.


    Chapters [8](#463716_2_En_8_Chapter.xhtml) and [9](#463716_2_En_9_Chapter.xhtml)
    deal with APIs you can use in your app, and user interface issues. Because both
    of them are big issues, it is just not possible to mention everything that refers
    to these topics. I however tried to give you a selection of useful and interesting
    solutions for various tasks in that area.


    Chapter [10](#463716_2_En_10_Chapter.xhtml) introduces Firebase, which is a cloud
    based app development platform providing storage and messaging services.


    Chapters [11](#463716_2_En_11_Chapter.xhtml)–[12](#463716_2_En_12_Chapter.xhtml)
    take a deeper look at development and building strategies and also describe how
    things can best be done inside Kotlin. While in the previous chapters Kotlin code
    was presented in a more empirical way, in Chapter [11](#463716_2_En_11_Chapter.xhtml)
    I describe how to use Kotlin constructs to produce more elegant and more readable
    application code.


    Chapter [13](#463716_2_En_13_Chapter.xhtml) on communication describes some methods
    you can use to communicate between components inside your app or between your
    app and other apps or the outside world.


    Chapter [14](#463716_2_En_14_Chapter.xhtml) handles different devices from a hardware
    perspective, including smartphones, wearables like smartwatches, Android TV, and
    Android Auto. Here we also talk about ways to access the camera and the sensors
    and how we can interfere with phone calls.


    In Chapters [15](#463716_2_En_15_Chapter.xhtml)–[18](#463716_2_En_18_Chapter.xhtml),
    we deal with testing, troubleshooting, and publishing your app, and the final
    chapter, Chapter [19](#463716_2_En_19_Chapter.xhtml), explains how to use the
    tools provided with the SDK installation (part of Android Studio).


    # Some Notes About the Code


    While in general for all the code presented in this book, I try to follow a *clean
    code* approach, for brevity and simplicity, I use two anti-patterns you shouldn’t
    follow in your production code:


    - I do not use localized string resources, so whenever you see something like


    ```

    android:text = "Some message"

    ```


    inside XML resources, what instead you should do is create a string resource and
    let the attribute refer to it like in


    ```

    android:text = "@string/message"

    ```


    - For logging statements, I always use `"LOG"` as a tag like in


    ```

    Log.e("LOG", "The message")

    ```


    In your code you instead should create a tag based on the class name


    ```

    companion object {

    val TAG="The class name"

    ...

    }

    ```


    and then use that one:


    ```

    Log.e(TAG, "The message")

    ```


    # 1. System


    The Android OS was born as the child of the Android Inc. company back in 2003
    and later acquired by Google LLC in 2005. The first device running Android came
    into the market in 2008. Since then it ran through numerous updates, with the
    latest version number by mid-2022 reading 12.1.


    Ever since its first build, the market share of the Android OS has been constantly
    increasing, and by 2021 it is said to stay above 72%. Even though the numbers
    vary with the sources you use, the success of the Android OS is surely undeniable.
    This victory partly has its roots in Google LLC being a clever player in the worldwide
    smartphone market, but it also comes from the Android OS carefully being tailored
    to match the needs for smartphones and other handheld or handheld-like devices.


    Having said that, the majority of computer developers formerly or still working
    in the PC environment would do a bad job utterly disregarding handheld device
    development, and this book is the result of giving to you as a developer an aid
    to understanding the Android OS and mastering the development of programs herein.
    The book also concentrates on using Kotlin as a language to achieve development
    demands, but first we will be looking at the Android OS and auxiliary development-related
    systems to give you an idea about the inner functioning of Android.'
