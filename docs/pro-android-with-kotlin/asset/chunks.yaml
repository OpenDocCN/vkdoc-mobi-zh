- fmt: '# The Android Operating System


    Android is based on a specially tailored Linux kernel. This kernel provides all
    the low-level drivers needed to address the hardware and the program execution
    environment and low-level communication channels.


    On top of the kernel, you will find the *Android Runtime (ART)* and a couple of
    low-level libraries written in C. The latter serve as a glue between application-related
    libraries and the kernel. The Android Runtime is the execution engine where Android
    programs run.


    You as a developer hardly ever need to know about the details of how these low-level
    libraries and the Android Runtime do their work, but you will be using them for
    basic programming tasks like addressing the audio subsystem or databases.


    Above the low-level libraries and the Android Runtime sits the *Application Framework*,
    which defines the outer structure of any app you build for Android. It deals with
    activities, GUI widgets, notifications, resources, and so on. While understanding
    the low-level libraries certainly helps you write good programs, knowing the Application
    Framework is essential to write any Android app at all.


    On top of all that, you will find the apps your users launch for tasks they have
    to accomplish. See Figure [1-1](#463716_2_En_1_Chapter.xhtml#Fig1).


    ![](images/463716_2_En_1_Chapter/463716_2_En_1_Fig1_HTML.png)


    The android application system has apps, an application network, and libraries.


    Figure 1-1


    The Android OS


    You as a developer will create Android apps using Kotlin, Java, or C++ as a programming
    language or a combination of them. And you will be using the Application Framework
    and the libraries to talk to the Android OS and the hardware. Using C++ as a programming
    language on a lower level, addressing target architecture peculiarities, leads
    to incorporating the *Native Development Kit* (NDK), which is an optional part
    of the Android SDK. While for special purposes it might be necessary to use the
    NDK, in most cases the extra effort to deal with yet another language and the
    special challenges it bears does not pay off. So in this book, we mostly will
    be talking about Kotlin and Java where appropriate.


    # The Development System


    The operating system running on handhelds is one part of the story – you as a
    developer also need a system for creating Android apps. The latter happens on
    a PC or laptop, and the software suite you use for it is *Android Studio*.


    Android Studio itself is the IDE you use for development, but while you install
    and operate it, the SDK gets installed as well, and we will be talking about both
    in the following sections. We will also treat virtual devices, which provide an
    invaluable aid for testing your app on various target devices.


    ## Android Studio


    The Android Studio IDE is the dedicated development environment for creating and
    running Android apps. Its main window together with an emulator view is shown
    in Figure [1-2](#463716_2_En_1_Chapter.xhtml#Fig2).


    Android Studio provides the following:


    ![](images/463716_2_En_1_Chapter/463716_2_En_1_Fig2_HTML.jpg)


    The snip of an android studio.


    Figure 1-2


    Android Studio


    * Managing program sources for Kotlin, Java, and C++ (NDK)

    * Managing program resources

    * Allowing to test-run apps inside emulators or connected real devices

    * More testing tools

    * A debugging facility

    * Performance and memory profilers

    * Code inspection

    * Tools for building local or publishable apps


    The help included in the studio and online resources provide enough information
    to master Android Studio – in this book we will be talking about it once in a
    while and in dedicated chapters.


    ## Virtual Devices


    Developing software for computers always includes the challenge to create one
    program that is able to handle all possible target systems. With handheld devices
    coming in so many different forms nowadays, this aspect has become more critical
    than ever before. You have smartphone devices with sizes between 3.9” and 5.4”
    and more, tablets from 7” to 14” and more, wearables, TVs at different sizes,
    and so on, all running with the Android OS.


    Of course you as a developer cannot possibly buy all devices that are needed to
    cover all possible sizes. This is where emulators come in handy. With emulators
    you don’t have to buy hardware, and you still can develop Android apps.


    Android Studio makes it easy for you to use emulators for developing and testing
    apps, and using the tools from the SDK (see the following section “The SDK”),
    you can even operate the emulators from outside Android Studio.


    Caution


    You *can* develop apps without owning a single real device. This is however not
    recommended. You should have at least one smartphone from the latest generation
    and maybe also a tablet if you can afford it. The reason is that operating real
    devices feels different compared with emulators, the physical handling is not
    100% the same, and the performance differs as well.


    To manage virtual devices from inside Android Studio, open the Android Virtual
    Device (AVD) Manager via *Tools ➤ Device Manager*. From here you can investigate,
    alter, create or delete, and start virtual devices. See Figure [1-3](#463716_2_En_1_Chapter.xhtml#Fig3).


    ![](images/463716_2_En_1_Chapter/463716_2_En_1_Fig3_HTML.jpg)


    The screenshot of an A V D manager.


    Figure 1-3


    AVD Manager


    When creating a new virtual device, you will be able to choose among a “TV,” “Wear,”
    “Phone,” “Automotive,” or “Tablet” device, you can select the API level to use
    (and download new API levels), and in the settings you can specify various things
    like graphics performance, camera mode, and more. For details about managing AVDs
    (Android Virtual Devices), see the online documentation at [`https://developer.android.com/studio/run/managing-avds`](https://developer.android.com/studio/run/managing-avds).


    The virtual device base images and skins used for creating virtual images can
    be found in


    ```

    SDK_INST/system-images

    SDK_INST/skins

    ```


    and the actual virtual devices with installed apps and user data in


    ```

    ~/.android/avd

    ```


    Handling running virtual devices can also be done by various command line tools.
    See sections “The SDK Tools” and “The SDK Platform Tools” in Chapter [19](#463716_2_En_19_Chapter.xhtml).


    ## The SDK


    The SDK is, in contrast to Android Studio, a loosely coupled selection of tools
    that are either essential for Android development and as such directly used by
    Android Studio or at least helpful for a couple of development tasks. They can
    all be started from within a shell and come with or without an own GUI.


    In case you don’t know where the SDK was installed during the installation of
    Android Studio, you can easily ask Android Studio itself: go to *File ➤ Project
    Structure* and select “SDK location” from the menu.


    The command line tools that are part of the SDK get described in Chapter [19](#463716_2_En_19_Chapter.xhtml).'
