    \ So, if you need more\ncontrol, you can abandon the cloud and use direct networking\n\
    instead.\n\nFor directly using network protocols  to\ncommunicate with devices\
    \ or application servers, you basically have two\noptions :\n\n*   **Use javax.net.ssl.HttpsURLConnection.**\n\
    \nThis provides for a low-level connectivity, but with already TLS,\n    streaming\
    \ capabilities, timeouts, and connection pooling included. As\n    you can see\
    \ from the class name, it is part of the standard Java API, so\n    you will find\
    \ lots of information about it on the Web. We nevertheless\n    give a description\
    \ in the following section.\n\n*   **Use the Volley API included with Android.**\n\
    \nThis is a higher-level wrapper around basic networking functions . Using Volley\n\
    \    considerably simplifies network-based development, so it is generally\n \
    \   the first candidate for using networking in Android.\n\nIn both cases you\
    \ need to add appropriate permissions inside  `AndroidManifest.xml`\n:\n\nCommunication\
    \ with HttpsURLConnection\nBefore using a network communication API, we need to\
    \ make sure\nnetworking operations happen in the background – modern Android versions\n\
    even won’t allow you to perform networking in the UI thread. But even\nwithout\
    \ that restriction, it is highly recommended to always perform\nnetworking in\
    \ a background task. We talked about background operation \nin section “Background\
    \ Tasks” of Chapter [9](#463716_2_En_9_Chapter.xhtml). A first method you want\
    \ to look\nat is running network operations inside a suspending function (part\
    \ of\nthe coroutines technology), but you are free to choose other means as\n\
    well. The following sections assume the snippets presented there are\nrunning\
    \ in the background.\n\nUsing class \n`HttpsURLConnection`-based\ncommunication\
    \ boils down to\n\n```\nfun convertStreamToString(istr: InputStream): String {\n\
    val s = Scanner(istr).useDelimiter(\"\\\\A\")\nreturn if (s.hasNext()) s.next()\
    \ else \"\"\n}\n// This is a convention for emulated devices\n// addressing the\
    \ host (development PC)\nval HOST_IP = \"10.0.2.2\"\nval url = \"https://${HOST_IP}:6699/test/person\"\
    \nvar stream: InputStream? = null\nvar connection: HttpsURLConnection? = null\n\
    var result: String? = null\ntry {\nconnection = (URL(uri.toString()).openConnection()\n\
    as HttpsURLConnection).apply {\n// ! ONLY FOR TESTING !  No SSL hostname verification\n\
    class TrustAllHostNameVerifier : HostnameVerifier {\noverride\nfun verify(hostname:\
    \ String, session: SSLSession):\nBoolean = true\n}\nhostnameVerifier = TrustAllHostNameVerifier()\n\
    // Timeout for reading InputStream set to 3000ms\nreadTimeout = 3000\n// Timeout\
    \ for connect() set to 3000ms.\nconnectTimeout = 3000\n// For this use case, set\
    \ HTTP method to GET.\nrequestMethod = \"GET\"\n// Already true by default, just\
    \ telling. Needs to\n// be true since this request is carrying an input\n// (response)\
    \ body.\ndoInput = true\n// Open communication link\nconnect()\nresponseCode.takeIf\
    \ {\nit != HttpsURLConnection.HTTP_OK }?.run {\nthrow IOException(\"HTTP error\
    \ code: $this\")\n}\n// Retrieve the response body\nstream = inputStream?.also\
    \ {\nresult = it.let { convertStreamToString(it) }\n}\n}\n} finally {\nstream?.close()\n\
    connection?.disconnect()\n}\nLog.e(\"LOG\", result)\n```\n\nThis example tries\
    \ to access a GET URL  `https://10.0.2.2:6699/test/person`\ntargeting your development\
    \ PC and prints the result in the logs.\n\nNote, if your server happens to hold\
    \ a self-signed certificate for SSL,\nyou must at an initialization place, say\
    \ inside the `onCreate()` callback , add\n\n```\nval trustAllCerts =\narrayOf(object\
    \ : X509TrustManager {\noverride\nfun getAcceptedIssuers():\nArray? = null\noverride\n\
    fun checkClientTrusted(\ncerts: Array,\nauthType: String) {\n}\noverride\nfun\
    \ checkServerTrusted(\ncerts: Array,\nauthType: String) {\n}\n})\nSSLContext.getInstance(\"\
    SSL\").apply {\ninit(null, trustAllCerts, java.security.SecureRandom())\n}.apply\
    \ {\nHttpsURLConnection.setDefaultSSLSocketFactory(\nsocketFactory)\n}\n```\n\n\
    Otherwise, the preceding code will complain and fail. Of course you\nshouldn’t\
    \ do this in production code and instead add a check for the\nvalidity of the\
    \ certificate.\n\nNetworking with Volley\n\nVolley  is a\nnetworking library that\
    \ simplifies networking for Android. First of all\nVolley  sends its\nwork to\
    \ the background by itself; you don’t have to take care about\nthat. Other goodies\
    \ provided by Volley are"
  trans: "\n# 通信\n\n通信是指在组件、应用或设备边界之间发送数据。一种标准化的方式是通过*广播*（*broadcasts*）实现一个或多个应用中各组件间的相互通信，我们已在第\
    \ 5 章中讨论过。同一设备上应用间通信的另一种可能性是使用 `ResultReceiver` 对象，这些对象通过 `Intent` 传递。尽管其名称如此，但它们不仅可以在被调用的组件完成工作后用于将数据发送回调用方，还可以在被调用组件存活期间的任何时刻使用。我们在本书的多个地方使用了它们，但在本章中，我们将重新审视它们的使用方法，以便将所有通信方式整合在一起。\n\
    \n## `ResultReceiver` 类\n\n`ResultReceiver` 对象可以通过将其分配给 `Intent`，从任何一个组件传递到另一个组件，因此您可以使用它在任意类型的组件之间发送数据，前提是这些组件位于同一设备上。\n\
    \n我们首先定义一个 `ResultReceiver` 的子类，它稍后将从被调用的组件接收消息，并编写：\n\n```\nclass MyResultReceiver\
    \ : ResultReceiver(null) {\n    companion object {\n        val INTENT_KEY = \"\
    my.result.receiver\"\n        val DATA_KEY = \"data.key\"\n    }\n    override\
    \ fun onReceiveResult(resultCode: Int,\n                                 resultData:\
    \ Bundle?) {\n        super.onReceiveResult(resultCode, resultData)\n        val\
    \ d = resultData?.get(DATA_KEY) as String\n        Log.e(\"LOG\", \"Received:\
    \ \" + d)\n    }\n}\n```\n\n当然，您可以在其 `onReceiveResult()` 函数内编写更有意义的内容。\n\n要将 `MyResultReceiver`\
    \ 的实例传递给被调用的组件，我们现在可以编写：\n\n```\nIntent(this, CalledActivity::class.java).apply\
    \ {\n    putExtra(MyResultReceiver.INTENT_KEY,\n             MyResultReceiver())\n\
    }.run{ startActivity(this) }\n```\n\n或使用任何其他方式调用另一个组件。\n\n在被调用的组件内部，您现在可以在任何合适的时机通过类似下面的方式将数据发送回调用组件：\n\
    \n```\nvar myReceiver:ResultReceiver? = null\noverride fun onCreate(savedInstanceState:\
    \ Bundle?) {\n    super.onCreate(savedInstanceState)\n    setContentView(R.layout.activity_called)\n\
    \    ...\n    myReceiver = intent.\n        getParcelableExtra(\n            MyResultReceiver.INTENT_KEY)\n\
    }\nfun go(v: View) {\n    val bndl = Bundle().apply {\n        putString(MyResultReceiver.DATA_KEY,\n\
    \                  \"Hello from called component\")\n    }\n    myReceiver?.send(42,\
    \ bndl) ?:\n        throw IllegalStateException(\"myReceiver is null\")\n}\n```\n\
    \n在生产环境中，您还需要额外注意检查接收方是否仍然存活——为简洁起见，我省略了此项检查。另请注意，在发送方，实际上并不需要持有对 `ResultReceiver`\
    \ 实现的引用——如果您通过应用边界进行通信，可以直接编写：\n\n```\n...\nval INTENT_KEY = \"my.result.receiver\"\
    \nval DATA_KEY = \"data.key\"\n...\nval myReceiver = intent.\n    getParcelableExtra(\n\
    \        INTENT_KEY)\n...\nval bndl = Bundle().apply {\n    putString(DATA_KEY,\n\
    \              \"Hello from called component\")\n}\nmyReceiver?.send(42, bndl)\n\
    ```\n\n## 与后端通信\n\n使用像 `Firebase` 这样基于云的服务提供商来将您的应用连接到其他设备上的其他应用，如第 10 章所述，当然有其独特的优点。您将拥有一个可靠的消息代理，附带消息备份功能、分析功能等。但使用云服务也有其缺点。您的数据，无论是否加密，都会离开您的“地盘”（即使对于企业应用也是如此），并且您无法\
    \ 100% 确定提供商将来不会更改 API，从而迫使您更改您的应用。因此，如果您需要更多控制权，可以放弃云服务，转而使用直接网络连接。\n\n对于直接使用网络协议与设备或应用服务器通信，您基本上有兩種选择：\n\
    \n*   **使用 `javax.net.ssl.HttpsURLConnection`。**  \n    这提供了底层连接能力，但已包含 TLS、流式处理功能、超时设置以及连接池功能。正如您从其类名中看到的，它是标准\
    \ Java API 的一部分，因此您可以在网上找到大量相关信息。不过，我们将在下一节中给出说明。\n\n*   **使用 Android 附带的 Volley\
    \ API。**  \n    这是一个更高级的封装，围绕基本的网络功能。使用 `Volley` 可以大大简化基于网络的开发，因此它通常是 Android\
    \ 中进行网络开发的首选方案。\n\n在这两种情况下，您都需要在 `AndroidManifest.xml` 中添加适当的权限。\n\n## 使用 `HttpsURLConnection`\
    \ 通信\n\n在使用网络通信 API 之前，我们需要确保网络操作在后台进行——现代 Android 版本甚至不允许在 UI 线程中执行网络操作。但即使没有这个限制，也强烈建议始终在后台任务中执行网络操作。我们在第\
    \ 9 章的“后台任务”部分讨论过后台操作。您首先想了解的一种方法是在挂起函数（属于协程技术的一部分）中运行网络操作，但您也可以自由选择其他方式。以下各节假定其中展示的代码片段在后台运行。\n\
    \n使用基于 `HttpsURLConnection` 类的通信归结为：\n\n```\nfun convertStreamToString(istr: InputStream):\
    \ String {\n    val s = Scanner(istr).useDelimiter(\"\\\\A\")\n    return if (s.hasNext())\
    \ s.next() else \"\"\n}\n// 这是访问模拟设备宿主机（开发 PC）的约定\nval HOST_IP = \"10.0.2.2\"\n\
    val url = \"https://${HOST_IP}:6699/test/person\"\nvar stream: InputStream? =\
    \ null\nvar connection: HttpsURLConnection? = null\nvar result: String? = null\n\
    try {\n    connection = (URL(uri.toString()).openConnection()\n            as\
    \ HttpsURLConnection).apply {\n        // ！仅用于测试！ 不进行 SSL 主机名验证\n        class\
    \ TrustAllHostNameVerifier : HostnameVerifier {\n            override\n      \
    \      fun verify(hostname: String, session: SSLSession):\n                  \
    \  Boolean = true\n        }\n        hostnameVerifier = TrustAllHostNameVerifier()\n\
    \        // 设置读取 InputStream 的超时时间为 3000 毫秒\n        readTimeout = 3000\n    \
    \    // 设置 connect() 的超时时间为 3000 毫秒。\n        connectTimeout = 3000\n        //\
    \ 对于此用例，将 HTTP 方法设置为 GET。\n        requestMethod = \"GET\"\n        // 默认已为 true，这里只是说明。需要\n\
    \        // 为 true，因为此请求承载输入（响应）体。\n        doInput = true\n        // 打开通信链路\n\
    \        connect()\n        responseCode.takeIf {\n            it != HttpsURLConnection.HTTP_OK\
    \ }?.run {\n            throw IOException(\"HTTP error code: $this\")\n      \
    \  }\n        // 检索响应体\n        stream = inputStream?.also {\n            result\
    \ = it.let { convertStreamToString(it) }\n        }\n    }\n} finally {\n    stream?.close()\n\
    \    connection?.disconnect()\n}\nLog.e(\"LOG\", result)\n```\n\n这个示例尝试访问针对您开发\
    \ PC 的 GET URL `https://10.0.2.2:6699/test/person`，并将结果打印到日志中。\n\n请注意，如果您的服务器恰好持有用于\
    \ SSL 的自签名证书，则必须在某个初始化位置（例如在 `onCreate()` 回调中）添加：\n\n```\nval trustAllCerts =\n\
    \    arrayOf(object : X509TrustManager {\n        override\n        fun getAcceptedIssuers():\n\
    \                Array? = null\n        override\n        fun checkClientTrusted(\n\
    \                certs: Array,\n                authType: String) {\n        }\n\
    \        override\n        fun checkServerTrusted(\n                certs: Array,\n\
    \                authType: String) {\n        }\n    })\nSSLContext.getInstance(\"\
    SSL\").apply {\n    init(null, trustAllCerts, java.security.SecureRandom())\n\
    }.apply {\n    HttpsURLConnection.setDefaultSSLSocketFactory(\n        socketFactory)\n\
    }\n```\n\n否则，前面的代码将会报错并失败。当然，您不应该在生产代码中这样做，而应添加证书有效性检查。\n\n## 使用 Volley 进行网络通信\n\
    \n`Volley` 是一个网络库，它简化了 Android 的网络操作。首先，`Volley` 会自动将工作发送到后台执行；您无需关心这一点。`Volley`\
    \ 提供的其他好处包括：\n"
- fmt: '*   Scheduling mechanisms

    *   Parallel working of several requests

    *   Handling of JSON requests and responses

    *   Caching

    *   Diagnosis tools


    To start developing with Volley, add the dependency to your module’s `build.gradle`
    file:


    ```

    dependencies {

    ...

    implementation ''com.android.volley:volley:1.2.1''

    }

    ```


    The next thing to do is set up a `RequestQueue` that Volley uses to handle requests
    in the background. The easiest way to do that is


    ```

    val queue = Volley.newRequestQueue(this)

    ```


    inside an activity. But you can also customize the creation of a `RequestQueue`
    and instead write


    ```

    val CACHE_CAPACITY = 1024 * 1024 // 1MB

    val cache = DiskBasedCache(cacheDir, CACHE_CAPACITY)

    // ... or a different implementation

    val network = BasicNetwork(HurlStack())

    // ... or a different implementation

    val requestQueue = RequestQueue(cache, network).apply {

    start()

    }

    ```


    The question is: Under which scope is the request queue best defined? We could
    create and run the request queue in an activity’s scope, which means that that
    queue needs to be recreated each time the activity gets recreated itself. This
    is a valid option, but the documentation suggests you use the application scope
    instead to reduce the recreation of caches. The recommended way is to use the
    `Singleton` pattern, which results in


    ```

    class RequestQueueSingleton

    constructor (context: Context) {

    companion object {

    @Volatile

    private var INSTANCE: RequestQueueSingleton? = null

    fun getInstance(context: Context) =

    INSTANCE ?: synchronized(this) {

    INSTANCE ?: RequestQueueSingleton(context)

    }

    }

    val requestQueue: RequestQueue by lazy {

    val alwaysTrusting = object : HurlStack() {

    override

    fun createConnection(url: URL): HttpURLConnection {

    fun getHostnameVerifier():HostnameVerifier {

    return object : HostnameVerifier {

    override

    fun verify(hostname:String,

    session:SSLSession):Boolean = true

    }

    }

    return (super.createConnection(url) as

    HttpsURLConnection).apply {

    hostnameVerifier = getHostnameVerifier()

    }

    }

    }

    // Using the Application context is important.

    // This is for testing:

    Volley.newRequestQueue(context.applicationContext,

    alwaysTrusting)

    // ... for production use:

    // Volley.newRequestQueue(context.applicationContext)

    }

    }

    ```


    where for development and testing purposes, an accept-all SSL hostname verifier
    was added.


    So, instead of writing `val queue = Volley.newRequestQueue(this)` or `val requestQueue
    = RequestQueue(...)` as shown earlier, you then use


    ```

    val queue = RequestQueueSingleton(this).requestQueue

    ```


    Now for sending a string request, you have to write


    ```

    // This is a convention for emulated devices

    // addressing the host (development PC)

    val HOST_IP = "10.0.2.2"

    val stringRequest =

    StringRequest(Request.Method.GET,

    "https://${HOST_IP}:6699/test/person",

    Response.Listener { response ->

    val shortened =

    response.substring(0,

    Math.min(response.length, 500))

    tv.text = "Response is: ${shortened}"

    },

    Response.ErrorListener { err ->

    Log.e("LOG", err.toString())

    tv.text = "That didn''t work!"

    })

    queue.add(stringRequest)

    ```


    where `tv` points to a `TextView` UI element. For that to work, you need to have
    a server responding to `https://localhost:6699/test/person`. Note that the response
    listener automatically runs in the UI thread, so you don’t have to take care of
    that yourself.

    To cancel single requests, use `cancel()` on the request object anywhere. You
    can also cancel a group of requests: add a tag to each request in question as
    in `val stringRequest = ... .apply {tag = "TheTag"}` and then write `queue?.cancelAll("TheTag")`.
    Volley makes sure the response listener never gets called once a request is canceled.


    To request a JSON object or JSON array, you have to substitute


    ```

    val request =

    JsonArrayRequest(Request.Method.GET, ...)

    or

    val request =

    JsonObjectRequest(Request.Method.GET, ...)

    ```


    for the `StringRequest` we used previously. For example, for a JSON request and
    the POST method, you can write


    ```

    val reqObj:JSONObject =

    JSONObject("""{"a":7, "b":"Hello"}""")

    val json1 = JsonObjectRequest(Request.Method.POST,

    "https://${HOST_IP}:6699/test/json",

    reqObj,

    Response.Listener { response ->

    Log.e("LOG", "Response: ${response}")

    },

    Response.ErrorListener{ err ->

    Log.e("LOG", "Error: ${err}")

    })

    ```


    Volley can do more for you. You can use other HTTP methods like `PUT` and also
    write custom requests handling and returning other data types. Please see Volley’s
    online documentation or its API documentation for more details.


    ## Setting Up a Test Server


    This is not really an Android topic and not even anything that necessarily has
    to do with Kotlin, but to test the communication, you need to have some kind of
    web server running. To have things easy, I usually configure a very simple yet
    powerful server based on Groovy and `Spark` – not Apache Spark but instead Java
    Spark from [`http://sparkjava.com/`](http://sparkjava.com/).


    To use it, for example, in Eclipse, first install the Groovy plugin. Then create
    a Maven project and add as dependencies


    ```

    com.sparkjava

    spark-core

    2.9.4


    org.slf4j

    slf4j-simple

    1.7.25

    test

    ```


    After that create a Java keystore file and write a Groovy script


    ```

    import static spark.Spark.*

    def keystoreFilePath = "keystore.jks"

    def keystorePassword = "passw7%d"

    def truststoreFilePath = null

    def truststorePassword = null

    secure(keystoreFilePath, keystorePassword,

    truststoreFilePath, truststorePassword)

    port(6699)

    get("/test/person", { req, res -> "Hello World" })

    post("/test/json", { req, res ->

    println(req.body())

    ''{ "msg":"Hello World", "val":7 }''

    })

    ```


    and start it.


    **Caution**: In order for inside Eclipse to avoid Servlet API version clashes,
    remove the dependency on the Servlet API in the Groovy settings dialog you get
    at Properties after right-clicking Groovy Libraries in the project.


    To create a keystore file, for example, under Linux, you could use the Bash script


    ```

    #!/bin/bash

    export JAVA_HOME=/opt/jdk

    $JAVA_HOME/bin/keytool -genkey -keyalg RSA \

    -alias selfsigned -keystore keystore.jks \

    -storepass passw7%d -validity 360 -keysize 2048

    ```


    with the Java path adapted.


    ## Android and NFC


    NFC is for short-range wireless connectivity for the transport of small data packages
    between NFC-capable devices. The range is limited to a few centimeters between
    the communication partners. Typical use cases are


    *   Connecting and then reading from or writing to NFC tags

    *   Connecting and then communicating with other NFC-capable devices (peer-to-peer
    mode)

    *   Emulating an NFC card: connecting and then communicating with NFC card readers
    and writers


    To start developing an app that speaks NFC, you need to acquire the permission
    to do so inside `AndroidManifest.xml`:


    ```

    <uses-permission android:name="android.permission.NFC" />

    ```


    To also limit visibility in the Google Play Store, add


    ```

    <uses-feature android:name="android.hardware.nfc" android:required="true" />

    ```


    to the same file.


    ## Talking to NFC Tags


    Once a device with NFC enabled discovers an NFC tag in the vicinity, it tries
    to dispatch the tag according to a certain algorithm: If the system determines
    an NDEF data and finds an intent filter that is able to handle NDEF, the corresponding
    component gets called. If the tag does not exhibit NDEF data but otherwise identifies
    itself by providing information about technology and/or payload, this set of data
    gets mapped to a “tech” record, and the system tries to find a component that
    is able to handle that. If both fail, the discovery information is limited to
    the bare fact that an NFC tag was discovered. In this case the system tries to
    find a component that can handle NFC tags without NDEF and without “tech”-type
    data.

    Based on the information found on the NFC tag, Android also creates a URI and
    a MIME type you can use for intent filters. The procedure for that gets described
    in more detail on page “NFC Basics” of the Android online developer documentation
    – for example, enter “Android develop NFC basics” in your favorite search engine
    to find it.'
