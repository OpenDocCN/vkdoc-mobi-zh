    以下是在 `SDK_INST/platform-tools` 文件夹内提供的平台相关工具。


    参见表 [19-4](#463716_2_En_19_Chapter.xhtml#Tab4)。


    **表 19-4** SDK Platform Tools


    | 命令 | 描述 |

    | --- | --- |

    | `adb` | *Android Debug Bridge*。请参见表下方对 `adb` 命令的描述。 |

    | `dmtracedump` | 从跟踪转储创建图形化调用堆栈图。跟踪文件必须通过 `android.os.Debug` 类获取。不带参数调用 `./dmstracedump`
    以获取命令信息。 |

