    \ 启动了。    | `onStop()`: 你可以在此处停止仅在 Activity 可见时才需要的服务。                       \
    \                                                           |\n| 已停止     | 已启动\
    \     | 已停止的 Activity 被重新启动。                               | `onStart()`: 你可以在此处启动仅在\
    \ Activity 可见时才需要的服务。                                                        \
    \                         |\n| 已停止     | 已销毁     | 已停止的 Activity 被移除。        \
    \                          | `onDestroy()`: 释放所有资源，进行清理，并停止在 `onCreate()` 中启动的服务。\
    \                                                                      |\n\n##\
    \ 在 Activity 中保存状态\n\n我们几乎过分强调了你需要采取预防措施，以确保你的应用在被 Android 操作系统强制停止时能以良好方式重新启动。现在我们提供一个关于如何做到这一点的建议。\n\
    \n查看 Activity 的生命周期——参见“Activity 生命周期”一节——我们可以看到，一个即将被 Android 操作系统终止的 Activity\
    \ 会调用 `onStop()` 方法。但我们还有两个尚未提及的回调。它们名为 `onSaveInstanceState()` 和 `onRestoreInstanceState()`，每当\
    \ Android 决定需要保存或恢复 Activity 的数据时，就会调用它们。这与 `onStart()` 和 `onStop()` 不同，因为有时不需要保存状态。例如，如果一个\
    \ Activity 不会被销毁而只是暂停，状态无论如何都会保持，`onSaveInstanceState()` 和 `onRestoreInstanceState()`\
    \ 将不会被调用。\n\nAndroid 在这方面已经帮了我们：`onSaveInstanceState()` 和 `onRestoreInstanceState()`\
    \ 的默认实现已经保存并恢复了具有 ID 的 UI 元素。因此，如果这就是你所需要的，你无需做任何事情。当然，你的 Activity 可能更复杂，并且可能包含你需要保留的其他字段。在这种情况下，你可以重写\
    \ `onSaveInstanceState()` 和 `onRestoreInstanceState()`。请确保你调用了父类的方法。否则，你必须自己处理所有\
    \ UI 元素："
- fmt: "```kotlin\noverride fun onSaveInstanceState(outState: Bundle?) {\n    super.onSaveInstanceState(outState)\n\
    \    // add your own data to the Bundle here...\n    // you can use one of the\
    \ put* methods here\n    // or write your own Parcelable types\n}\n\noverride\
    \ fun onRestoreInstanceState(savedInstanceState: Bundle?) {\n    super.onRestoreInstanceState(savedInstanceState)\n\
    \    // restore your own data from the Bundle here...\n    // use one of the get*\
    \ methods here\n}\n```\n\nNote that the saved state goes to the `onCreate()` callback\
    \ as well, so it is up to you whether you want to use the `onRestoreInstanceState()`\
    \ or the `onCreate()` method for restoring the state.\n\nUnder other circumstances\
    \ the standard mechanism for saving and restoring state might not suit your needs.\
    \ For example, what it can’t accomplish is to preserve data when you stop your\
    \ app. In this case the `onSaveInstanceState()` is not getting called. If you\
    \ need to preserve data in such cases as well, what you can do is inside `onDestroy()`\
    \ saving your app’s data in a database and reading the database during the `onCreate()`\
    \ callback. See section “Databases” in Chapter [8](#463716_2_En_8_Chapter.xhtml).\n\
    \n## Services\n\nServices are components running without a user interface apart\
    \ from notifications in the status bar or per Toast and with a conceptual affinity\
    \ toward long-running processes. Services can be started by apps, or they can\
    \ be bound to by apps, or both.\n\nServices come in two flavors: foreground services\
    \ and background services. While at first glance it seems to be a contradiction\
    \ speaking of “foreground” services, since so many people tend to tell you that\
    \ “services run in the background,” foreground services do actually exist, and\
    \ the distinction between foreground and background services is crucial, because\
    \ their behavior is different.\n\n> **Caution**\n> Do not misinterpret services\
    \ as constructs for running anything that needs to be calculated in the background,\
    \ that is, not disturbing GUI activities. If you need a process that does not\
    \ interfere with the GUI, but is otherwise not eligible to run while your app\
    \ is inactive and also not subject to being used from outside your app, consider\
    \ using an extra thread instead. See Chapter [11](#463716_2_En_11_Chapter.xhtml).\n\
    \nTo wholly understand services is not an easy task, especially with noticeable\
    \ differences across various Android versions. While this chapter tries to give\
    \ you an overview and shows you one or the other detail-level hint, it cannot\
    \ possibly handle all aspects of service development. It is therefore advisable\
    \ to also consult the online documentation at [`https://developer.android.com/guide/components/services`](https://developer.android.com/guide/components/services).\n\
    \n### Foreground Services\n\nThe intrinsic functioning of foreground services\
    \ differs with different Android versions. While foreground services prior to\
    \ Android 8.0 or API level 26 are just background services with an entry inside\
    \ the status bar and otherwise no stringent influence on how the Android OS handles\
    \ them, with Android 8.0 or API level 26, foreground services exhibit a special\
    \ behavior and receive an improved attention by the Android OS, making them less\
    \ likely to be killed because of resource shortage. In detail:\n\n*   **Foreground\
    \ services before Android 8.0 or API level 26** are services that just present\
    \ a notification entry in the status bar. The client component that needs to use\
    \ a service doesn’t know whether the service started is a foreground service or\
    \ not; it just starts the service via `startService(intent)`. See Chapter [13](#463716_2_En_13_Chapter.xhtml).\n\
    \n*   **Foreground services starting with Android 8.0 or API level 26** run with\
    \ the user being made aware of them. They *must* interfere with the operating\
    \ system by notifications in the status bar. A client component explicitly starts\
    \ a foreground service by invoking `startForegroundService(intent)`, and the service\
    \ itself must readily tell the Android OS within a few seconds that it wishes\
    \ to run as a foreground service by calling `startForeground(notificationId, notification)`.\n\
    \nOne noticeable lifetime characteristic of a foreground service is being less\
    \ likely killed by Android because of an available resource shortage. The documentation\
    \ is however not precise about that. Sometimes you’ll read “will not be killed”\
    \ and sometimes “less likely to be killed.” Also, the way Android handles such\
    \ things is subject to change with new Android versions. As a general rule of\
    \ thumb, you should be very conservative and expect the worst. In this case, read\
    \ “less likely to be killed” and take precautions if the service ceases functioning\
    \ while your app is performing some work.\n\n### Background Services\n\nBackground\
    \ services run in the background, that is, they will not show an entry in the\
    \ status bar. They are however allowed to use Toasts to send short notification\
    \ messages to the user. Background services are more brittle compared with foreground\
    \ services, since Android expects them to be more loosely connected to user activities\
    \ and thus more readily decides to kill them when there is a resource shortage.\n\
    \nStarting with Android 8.0 (API level 26), a couple of limitations hold instantiating\
    \ background services the old way, and a shift toward using the JobScheduler methodology\
    \ is recommended. Apps running on Android 8.0 or later are considered to run services\
    \ in the background, if none of the following is true:\n\n*   The app has a visible\
    \ activity, currently active or paused.\n*   The app has a foreground service,\
    \ that is, a service calling `startForeground()` during its operation.\n*   Another\
    \ foreground app is connected to it, either by using one of its services or using\
    \ it as a content provider.\n\nOnce an Android 8.0 (or later) app started its\
    \ life as a background app or switched to being a background app, it has a window\
    \ of a couple of minutes before it is considered *idle*. Once *idle*, the background\
    \ services of an app get stopped. As an exception to this, a background app will\
    \ go on a *whitelist* and is allowed to execute background services, if it handles\
    \ tasks visible to the user, for example, handling a Firebase Cloud Messaging\
    \ (FCM) message, receiving a broadcast such as an SMS or MMS message, executing\
    \ a PendingIntent from a notification (an Intent to be executed by a different\
    \ app with the originating app’s permission), or starting a `VpnService`.\n\n\
    Most things that were formerly accomplished by executing background jobs are as\
    \ of Android 8.0 considered to be eligible to be handled by the JobScheduler API\
    \ – see Chapter [8](#463716_2_En_8_Chapter.xhtml).\n\n### Declaring Services\n\
    \nServices get declared inside the app’s `AndroidManifest.xml` file like:\n\n\
    See Table 4-1 for the flags available.\n\n**Table 4-1** Manifest Flags for Services\n\
    \n| Name | Description |\n|------|-------------|\n| `android:description` | A\
    \ resource ID pointing to a description of the service. You should use it, because\
    \ users can kill services, but if you tell them what your service does, this is\
    \ less likely to happen. |\n| `android:directBootAware` | One of `true`, `false`.\
    \ Default is `false`. If `true`, the service can run even if the device is not\
    \ yet unlocked after a restart. The Direct Boot mode was introduced in Android\
    \ 7.0 or API level 24. Note that a Direct Boot–aware service must store its data\
    \ in the device-protected storage. |"
