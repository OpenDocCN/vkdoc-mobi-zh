    distinction between the *Framework API* and the  *compatibility\nlibraries* .\
    \ If you start developing Android apps, you quite\noften see classes of the same\
    \ name showing up in different packages. Or\neven worse, you see classes of different\
    \ names from different packages\nseemingly doing the same thing.\n\nNote\n\nThe\
    \ Jetpack library\n collection simplifies compatibility. If you use Jetpack\n\
    compatibility classes from the `androidx.*` namespace,\nyou can forget about compatibility\
    \ libraries as described in the\nfollowing. Android\nStudio  helps for migrating\
    \ older projects. [ `https://developer.android.com/jetpack/androidx/`\n](https://developer.android.com/jetpack/androidx/)\
    \ tells you more about it.\n\nLet us take a look at a prominent example: to create\
    \ activities you\ncan either subclass `android.app.Activity`\nor subclass `android.support.v7.app.AppCompatActivity`.\n\
    Looking at examples and tutorials you find on the Web, there seems to be\nno noticeable\
    \ difference in usage. In fact `AppCompatActivity`\ninherits from `Activity`,\
    \ so wherever\nan `Activity` is\nrequired, you can substitute `AppCompatActivity`\
    \ for\nit, and it will compile. So is there a difference in function? It\ndepends.\
    \ If you look at the documentation or at the code, you can see\nthat the `AppCompatActivity`\n\
    allows for adding an `android.support.v7.app.ActionBar,`\nwhile `android.app.Activity`\n\
    does not. Instead, `android.app.Activity`\nallows for adding an `android.app.ActionBar`.\n\
    And this time `android.support.v7.app.ActionBar`\ndoes *not* inherit from `android.app.ActionBar`,\n\
    so you cannot add `android.support.v7.app.ActionBar`\nto an `android.app.Activity`.\n\
    This basically says that if you favor `android.support.v7.app.ActionBar`\nover\
    \ `android.app.ActionBar,`\nyou must use the `AppCompatActivity` for\nan activity.\
    \ Why would one use `android.support.v7.app.ActionBar`\ninstead of `android.app.ActionBar`?\n\
    The answer is easy: the latter is quite old – it is available since API\nlevel\
    \ 11\\. Newer versions of `android.app.ActionBar`\ncannot break the API to maintain\
    \ compatibility with older devices. But\n`android.support.v7.app.ActionBar`\n\
    can have new functions added – it is much newer and exists since API\nlevel 24.\n\
    The magic  now\nworks as follows: if you use a device that speaks API level 24\
    \ or\nhigher, you can use `android.support.v7.app.AppCompatActivity`\nand add\
    \ an `android.support.v7.app.ActionBar`.\nYou could also use `android.app.Activity`,\n\
    but then you cannot add an `android.support.v7.app.ActionBar`\nand instead have\
    \ to use an `android.app.ActionBar`.\nSo for new devices, it makes sense to use\
    \ `android.support.v7.app.AppCompatActivity`\nfor your activities if the support\
    \ library action bar better suits your\nneeds compared with the framework action\
    \ bar.\nHow about older devices? You still can use `android.support.v7.app.AppCompatActivity`\n\
    because it is provided as a library added to the app. So you also can\nuse the\
    \ modern `android.support.v7.app.ActionBar`\nas an action bar and have more functionalities\
    \ compared with the old\n`android.app.ActionBar`\ngenuinely provided by the device.\
    \ And this is actually how the trick\ngoes: *using support libraries even older\
    \ devices can take advantage\nof new functionalities added later*! The implementation\
    \ of the\nsupport class internally checks for the device version and provides\n\
    sensible fallback functionalities to resemble modern devices as much as\npossible.\n\
    The caveat is that you as a developer have to live in two worlds at\nthe same\
    \ time: you have to explicitly or implicitly use framework\nclasses if there is\
    \ no other choice, and you have to think about using\nsupport library classes\
    \ if available and if you want to ensure the\nmaximum compatibility with older\
    \ devices. It is therefore vital to\ncheck, before using a class, if there is\
    \ also a matching support library\nclass. You might not be happy with this two-world\
    \ methodology used in\nAndroid , and it\nalso means more thinking work to build\
    \ an app, but that is how Android\nhandles backward compatibility.\nYou will readily\
    \ find detailed information about the support\nlibraries if you enter “Android\
    \ support library” in your favorite search\nengine.\n\nSupport libraries\n get\
    \ bundled with your app, so they must be declared as\ndependencies in the build\
    \ file. If you start a new project in Android Studio , it by\ndefault writes inside\
    \ the module’s `build.gradle` file\n\n```\ndependencies {\n...\nimplementation\
    \ 'com.android.support:appcompat-v7:26.1.0'\nimplementation 'com.android.support.constraint:constraint-layout:1.0.2'\n\
    ...\n}\n```\n\nSo you see the support library version v7 is available by default,\
    \ so\nyou can use it right from the start."
