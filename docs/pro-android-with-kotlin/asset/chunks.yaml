    \ = \"Description\"\n    // Register the channel with the system\n    val notificationManager\
    \ =\n        if (Build.VERSION.SDK_INT >=\n            Build.VERSION_CODES.M)\
    \ {\n                getSystemService(\n                    NotificationManager::class.java)\n\
    \            } else {\n                throw RuntimeException(\"Internal error\"\
    )\n            }\n    notificationManager.\n        createNotificationChannel(channel)\n\
    }\n```\n\nwhich we have already seen in the preceding sections. Speaking of Kotlin\
    \ language styling, this looks a little clumsy – the superfluous `if` constructs\
    \ have been introduced to avoid Android Studio complaining about compatibility\
    \ issues. Adapt the channel ID, the channel name, and the importance in the channel\
    \ constructor according to your needs, just as the description text.\n\nBy the\
    \ way, the `createNotificationChannel()` in the last line is idempotent – if a\
    \ channel with the same characteristics already exists, nothing will happen. The\
    \ possible importance levels in the `NotificationChannel` constructor are `IMPORTANCE_HIGH`\
    \ for sound and heads-up notification, `IMPORTANCE_DEFAULT` for sound, `IMPORTANCE_LOW`\
    \ for no sound, and `IMPORTANCE_MIN` for neither sound nor status bar presence.\n\
    \nHaving said that it is up to the user how notification channels get handled,\
    \ inside your code you can still read the settings a user made by using one of\
    \ the `get*()` methods of the `NotificationChannel` object you can get from the\
    \ manager via `getNotificationChannel()` or `getNotificationChannels()`. Please\
    \ consult the online API documentation for details.\n\nThere is also a notification\
    \ channel settings UI you can call by:\n\n```kotlin\nval intent = Intent(\n  \
    \  Settings.ACTION_CHANNEL_NOTIFICATION_SETTINGS)\nintent.putExtra(Settings.EXTRA_APP_PACKAGE,\n\
    \    getPackageName())\nintent.putExtra(Settings.EXTRA_CHANNEL_ID,\n    myNotificationChannel.getId())\n\
    startActivity(intent)\n```\n\nYou can further organize notification channels by\
    \ gathering them in groups, for example, to separate work-related and private-type\
    \ channels. To create a group, you write:\n\n```kotlin\nval groupId = \"my_group\"\
    \n// The user-visible name of the group.\nval groupName = \"Group Name\"\nval\
    \ notificationMngr =\n    getSystemService(Context.NOTIFICATION_SERVICE)\n   \
    \     as NotificationManager\nnotificationMngr.createNotificationChannelGroup(\n\
    \    NotificationChannelGroup(groupId, groupName))\n```\n\nYou can then add the\
    \ group to each notification channel by using its `setGroup()` method.\n\n## Notification\
    \ Badges\n\nStarting with Android 8.0 or API level 26, once a notification arrives\
    \ in the system, a notification badge will show up in the app’s icon – see Figure\
    \ 8-5.\n\n![A notification badge of Gmail.](images/463716_2_En_8_Chapter/463716_2_En_8_Fig5_HTML.png)\n\
    \n**Figure 8-5** A Notification Badge\n\nYou can control this badge by one of\
    \ the `NotificationChannel` methods listed in Table 8-5.\n\n**Table 8-5** Notification\
    \ Badges\n\n| Method | Description |\n| --- | --- |\n| `setShowBadge(Boolean)`\
    \ | Whether or not to show the badge. |\n| `setNumber(Int)` | Long-tapping an\
    \ app icon with a badge will show the number of notifications that arrived. You\
    \ can tailor this number according to your needs by using this method. |\n| `setBadgeIconType(Int)`\
    \ | Long-tapping an app icon with a badge will show an icon associated with the\
    \ notification. You can tailor the icon’s size by using this method. Possible\
    \ values are given as constants in class `NotificationCompat`: `BADGE_ICON_NONE`,\
    \ `BADGE_ICON_SMALL`, and `BADGE_ICON_LARGE`. |\n\n## Contacts\n\nManaging and\
    \ using contacts is one of the tasks a handheld device must really be good at.\
    \ After all, handheld devices and especially smartphones get often used to communicate\
    \ with other people, and contacts are abstracted entities representing people,\
    \ groups, companies, or other “things” you use as address points for communication\
    \ needs.\n\nContacts thus being so important, the built-in contacts framework\
    \ has become quite complex during the history of Android. Fortunately, the complexity\
    \ can be reduced somewhat if we restrict ourselves to looking solely at the back-end\
    \ part and omit user interface peculiarities, which are described in other chapters\
    \ of this book. What is left for the description of the contacts framework is:\n\
    \n- Looking at the internals, especially the database model used\n- Finding out\
    \ how to read contacts data\n- Finding out how to write contacts data\n- Calling\
    \ system activities to handle single contacts\n- Synchronizing contacts\n- Using\
    \ quick contact badges\n\n### Contacts Framework Internals\n\nThe basic class\
    \ to communicate with the contacts framework is the `android.content.ContentResolver`\
    \ class. This makes a lot of sense, since contact data very well fits into what\
    \ content providers deal with. You thus very often use content provider operations\
    \ to handle contact data. See Chapter 6.\n\nThe data model consists of three main\
    \ tables, the *Contacts*, *Raw Contacts*, and *Data* tables. In addition, a couple\
    \ of auxiliary tables for administrative tasks exist. You usually don’t have to\
    \ deal with any kind of direct table access, but in case you are interested, have\
    \ a look at the online contacts framework documentation and the documentation\
    \ for the `ContactsContract` class, which extensively describes the content provider\
    \ contract for the contacts.\n\nIf you want to look at the contacts tables directly,\
    \ using ADB for a virtual or rooted device, you can create a shell access to your\
    \ device by `cd SDK_INST/platform-tools ; ./adb root ; ./adb shell` in a terminal\
    \ – see section “The SDK Platform Tools” of Chapter 19 – and from there investigate\
    \ the tables as follows:\n\n```bash\ncd /data\nfind . -name 'contacts*.db'\n#\
    \ \nsqlite3 \n```\n\nFor example, enter `.header on` to switch on table header\
    \ output, `.tables` to list all table names, and `select * from raw_contacts;`\
    \ to list the *Raw Contacts* table.\n\n### Reading Contacts\n\nFor reading a number\
    \ of contacts, maybe based on some criterion, you best use a `ViewModel` as a\
    \ view data holder, wrap model elements with `LiveData` to make sure model changes\
    \ reflect in redisplaying the screen, apply coroutines to load data asynchronously,\
    \ and adopt the Jetpack Compose library for an elegant front-end design.\n\n>\
    \ **Note:** In former times you’d have used loaders, but those are deprecated,\
    \ and using the combination of `ViewModel`, `LiveData`, coroutines, and Jetpack\
    \ Compose makes sure you are on track with the most recent and most elegant Android\
    \ development technologies.\n\nFor all this to work, add the following dependencies\
    \ to `build.gradle`:\n\n```groovy\ndef compose_version = '1.1.1'\nimplementation\
    \ 'androidx.core:core-ktx:1.7.0'\nimplementation \"androidx.compose.ui:\" +\n\
    \    \"ui:$compose_version\"\nimplementation \"androidx.compose.foundation:\"\
    \ +\n    \"foundation:$compose_version\"\nimplementation \"androidx.compose.material:\"\
    \ +\n    \"material:$compose_version\"\nimplementation \"androidx.compose.ui:\"\
    \ +\n    \"ui-tooling-preview:$compose_version\"\nimplementation 'androidx.lifecycle:'\
    \ +\n    'lifecycle-runtime-ktx:2.3.1'\nimplementation 'androidx.lifecycle:' +\n\
    \    'lifecycle-extensions:2.2.0'\nimplementation \"androidx.lifecycle:\" +\n\
    \    \"lifecycle-livedata-ktx:2.4.1\"\nimplementation \"androidx.compose.runtime:\"\
    \ +\n    \"runtime-livedata:$compose_version\"\nimplementation 'androidx.activity:'\
    \ +\n    'activity-compose:1.3.1'\n// We need this for permission inquiry\n//\
    \ using JetPack compose:\nimplementation \"com.google.accompanist:\" +\n    \"\
    accompanist-permissions:0.23.1\"\n```"
