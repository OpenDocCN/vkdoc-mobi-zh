    # 前言


    《专业 Android 与 Kotlin 开发》是著名的 Apress 系列中针对 Java 平台 Android 开发书籍的继承者。随着 Kotlin 成为
    Android 环境中的官方语言，与 Java 标准相比，它能编写出更优雅的程序，本书将深入探讨现代 Android 应用的高级方面。通过对 Android
    系统内部重要部分和专业级 API 的详尽描述、高级用户界面主题、高级开发主题、深度通信调查、专业级硬件主题（包括手机以外的设备）、包含解决内存和性能问题指导的故障排除部分，以及应用盈利介绍，本书旨在为希望为现代
    Android 设备构建最先进专业应用的开发者提供宝贵的资源。


    本书并非 Kotlin 语言的入门教程。为此目的，请查阅 Kotlin 网站或任何 Kotlin 入门级书籍。然而，您将在本书中看到的是，尝试尽可能多地使用
    Kotlin 的特性，以编写比 Java 更少代码的优雅稳定应用。


    2021 年和 2022 年，Android 12 和 12.1 版本相继推出。在专业环境中，编写要求 API 级别达到 31 的应用并非好主意，因为截至本书撰写时，全球运行
    12.x 版本的设备占比低于 10%。但您可以通过在代码中引入分支或使用特殊的兼容性类，编写同时兼容 12.x 及 6.0 至 12.1 版本的应用，从而覆盖约
    95%的 Android 设备，这也是我们将在本书中采取的做法。我们仍将专注于现代 12.x 开发，但若使用低版本无法支持的新特性，我们会特别说明。


    请注意，本书不重点关注 Android 6.0（对应 API 级别 23）以下的版本。如果您查阅在线教程，会发现大量针对低于 23 的 API 级别的构建。尤其是在涉及为改善向后兼容性而引入的支持库时，如果您着眼于低于
    23 的 API 版本，开发会变得不必要地复杂，因为此类设备的分布如今已可忽略不计。本书将假设您对这些旧版本不感兴趣，从而在许多情况下无需研究此类支持库，并大大简化开发过程。


    # 引言


    自本书第一版出版以来，已过去了数年时光。第一版出版时，Android 8 和 API 级别 26 是当时的最新版本，但此后 Android 9、10、11
    和 12 版本相继发布。同时，Android Studio 也从 3.1 版本迁移至 4.2（2021 年 6 月），随后又经历了 Arctic Fox、Bumblebee、Chipmunk
    和 Dolphin（均从 2021 年中至今）。与此同时，Android Gradle 插件从 3.0 版本迁移至 7.2，Kotlin 从 1.2 版本迁移至
    1.5。此外，用于确保跨不同 API 级别版本兼容性的 `android.support` 包现已弃用，并由 Jetpack（ [`https://developer.android.com/jetpack`](https://developer.android.com/jetpack)
    ）取代。


    在复杂的图形渲染和游戏开发方面，尽管 2018 年新型 3D 图形渲染引擎 Vulkan 尚处于起步阶段，因此未包含在第一版中，但它逐渐获得了越来越大的影响力，因此在第
    9 章中增加相关章节如今意义重大。


    201 年中，谷歌宣布了 *Android Automotive*，这是 Android 操作系统的一个变体，能够管理特定车型的信息娱乐系统。


    随着 Jetpack Compose 的出现，一种简化的 UI 开发技术进入了 Android 世界，它通过提供复杂的 API 并应用优雅的声明式构建器式编程模式，显著减少了代码量。Jetpack
    于 2018 年推出。


    所有这些变化都反映在本书的第二版中，确保您作为开发者能够了解最新的 Android 开发 API 和工具。


    ## 简洁性与表现力


    本书中将要讲解的程序，尽管与 Kotlin 的思维方式有很强的关联，但对于 Java 开发者或任何其他现代计算机语言的开发者来说，也并非完全神秘。Kotlin
    的设计目标之一是表现力，因此理解 Kotlin 程序所需的精力更少，即使程序变得更短。但您必须明白，在某些情况下，为了追求极致的简洁性，您不得不牺牲表现力和可读性。


    在判断孰优孰劣时，作者倾向于支持表现力而非简洁性，但请放心，冗长的编程风格被认为是不可取的。最终，专业开发者希望编写简洁的应用，因为更少的代码意味着更低的维护成本。'
- fmt: '# The Transition from Java to Kotlin


    Just to whet your appetite, we will have a look at a really simple app lacking
    lots of features you will want to see in a more complex and professional app and
    then compare its Java and Kotlin variants.


    If you start *Android Studio* and enter the project creation wizard, you will
    be asked for a template. Select “Basic Activity,” choose 23 as the minimum SDK,
    and have both legacy support libraries and Kotlin support disabled. After the
    creation, a `MainActivity` class shows up. Its Java code reads (comments removed)


    ```java

    package book.andrkotlpro.frontjava;

    import android.os.Bundle;

    import com.google.android.material.snackbar.Snackbar;

    import androidx.appcompat.app.AppCompatActivity;

    import android.view.View;

    import androidx.navigation.NavController;

    import androidx.navigation.Navigation;

    import androidx.navigation.ui.AppBarConfiguration;

    import androidx.navigation.ui.NavigationUI;

    import book.andrkotlpro.frontjava.databinding.ActivityMainBinding;

    import android.view.Menu;

    import android.view.MenuItem;

    public class MainActivity extends AppCompatActivity {

    private AppBarConfiguration appBarConfiguration;

    private ActivityMainBinding binding;

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    binding = ActivityMainBinding.inflate(getLayoutInflater());

    setContentView(binding.getRoot());

    setSupportActionBar(binding.toolbar);

    NavController navController = Navigation.findNavController(this, R.id.nav_host_fragment_content_main);

    appBarConfiguration = new AppBarConfiguration.Builder(navController.getGraph()).build();

    NavigationUI.setupActionBarWithNavController(this, navController, appBarConfiguration);

    binding.fab.setOnClickListener(new View.OnClickListener() {

    @Override

    public void onClick(View view) {

    Snackbar.make(view, "Replace with your own action", Snackbar.LENGTH_LONG)

    .setAction("Action", null).show();

    }

    });

    }

    @Override

    public boolean onCreateOptionsMenu(Menu menu) {

    getMenuInflater().inflate(R.menu.menu_main, menu);

    return true;

    }

    @Override

    public boolean onOptionsItemSelected(MenuItem item) {

    int id = item.getItemId();

    if (id == R.id.action_settings) {

    return true;

    }

    return super.onOptionsItemSelected(item);

    }

    @Override

    public boolean onSupportNavigateUp() {

    NavController navController = Navigation.findNavController(this, R.id.nav_host_fragment_content_main);

    return NavigationUI.navigateUp(navController, appBarConfiguration) || super.onSupportNavigateUp();

    }

    }

    ```


    A few notes about that Java code: The `public` in front of the class and almost
    all methods tells that they are visible from everywhere. It cannot be omitted
    here since otherwise the framework and the rest of the application could not use
    the class and the methods. The `setContentView()` is, by virtue of the “set,”
    such a common construct that one could think of allowing `contentView = s.th.`
    to be written for it instead. A couple of competitor languages allow for such
    a syntax. Also for the `setOnClickListener()`, one might wish to use a `.onClickListener
    = s.th.` instead. The argument to `setOnClickListener()` is an object of an anonymous
    inner class – it is already an abbreviation of first declaring and then instantiating
    and using it. It can even be further shortened to


    ```java

    binding.fab.setOnClickListener(

    view -> {

    Snackbar.make(view, "Replace with your own action", Snackbar.LENGTH_LONG)

    .setAction("Action", null).show();

    }

    );

    ```


    This is because the interface has just a single method. The wizard just kind of
    forgot this abbreviation.


    For the various `.getSomething()`, we could just as well write something like
    `.something`, which would express the same, but shorter.


    A sister project doing the same, but *with* Kotlin support, leads to a transposed
    code in the Kotlin language as follows:


    ```kotlin

    package book.andrkotlpro.frontkotlin

    import android.os.Bundle

    import com.google.android.material.snackbar.Snackbar

    import androidx.appcompat.app.AppCompatActivity

    import androidx.navigation.findNavController

    import androidx.navigation.ui.AppBarConfiguration

    import androidx.navigation.ui.navigateUp

    import androidx.navigation.ui.setupActionBarWithNavController

    import android.view.Menu

    import android.view.MenuItem

    import book.andrkotlpro.frontkotlin.databinding.ActivityMainBinding

    class MainActivity : AppCompatActivity() {

    private lateinit var appBarConfiguration: AppBarConfiguration

    private lateinit var binding: ActivityMainBinding

    override fun onCreate(savedInstanceState: Bundle?) {

    super.onCreate(savedInstanceState)

    binding = ActivityMainBinding.inflate(layoutInflater)

    setContentView(binding.root)

    setSupportActionBar(binding.toolbar)

    val navController = findNavController(R.id.nav_host_fragment_content_main)

    appBarConfiguration = AppBarConfiguration(navController.graph)

    setupActionBarWithNavController(navController, appBarConfiguration)

    binding.fab.setOnClickListener { view ->

    Snackbar.make(view, "Replace with your own action", Snackbar.LENGTH_LONG)

    .setAction("Action", null).show()

    }

    }

    override fun onCreateOptionsMenu(menu: Menu): Boolean {

    menuInflater.inflate(R.menu.menu_main, menu)

    return true

    }

    override fun onOptionsItemSelected(item: MenuItem): Boolean {

    return when (item.itemId) {

    R.id.action_settings -> true

    else -> super.onOptionsItemSelected(item)

    }

    }

    override fun onSupportNavigateUp(): Boolean {

    val navController = findNavController(R.id.nav_host_fragment_content_main)

    return navController.navigateUp(appBarConfiguration) || super.onSupportNavigateUp()

    }

    }

    ```


    Looking at the Kotlin code more thoroughly, a couple of observations emerge:


    *   We don’t need the “;” delimiters – Kotlin checks at line breaks whether the
    statement is finished or whether the following line needs to be included.

    *   We don’t need that `public` in front of the class and the methods – “public”
    is standard in Kotlin.

    *   Instead of `extends` we just write “`:`”, improving the readability a little
    bit.

    *   We don’t need to specify a `void` as return type if a function doesn’t return
    anything. Kotlin can infer that.

    *   Unfortunately, we cannot write `contentView = s.th.` as suggested previously
    – the Groovy language, for example, allowed for that. The reason this can’t be
    done in Kotlin is that the construct `contentView = s.th.` implies that there
    must be a class field named `contentView`, which is not the case. The compiler
    could check for appropriately named methods and then allow for that syntax, but
    the Kotlin developers decided to impose this restriction and to prohibit the construct
    if the field doesn’t exist. The same holds for the `setOnClickListener`, because
    a field `onClickListener` doesn’t exist either.

    *   Instead of an anonymous inner class, we can use the functional construct `view
    -> ...`. This is always possible if the addressed class, the listener in that
    case, just contains a single method, like `void onClick( View v )` in the base
    interface used here. The Kotlin compiler knows that it must use that particular
    single method of the listener class. While for Java such lambda expressions were
    not available before JDK 8, in Kotlin they were available from the very beginning.


    As a résumé of that comparison, the Kotlin code with 1117 characters (imports
    and spaces omitted) does the same as the Java code with 1329 characters. This
    is a savings of 17%. Usually, 20–30% is a savings rate you can expect for more
    complex classes.


    Despite the syntax being different from Java, the Kotlin compiler translates its
    source code to the same virtual machine bytecode as Java, so Kotlin can use the
    plethora of Java libraries that are out there in the wild, and Java developers
    switching to or also using Kotlin won’t miss them.'
  raw: '## The Transition from Java to Kotlin


    Just to whet your appetite, we will have a look at a really simple app lacking
    lots of features you will want to see in a more complex and professional app and
    then compare its Java and Kotlin variants.


    If you start *Android Studio* and enter the project creation wizard, you will
    be asked for a template. Select “Basic Activity,” choose 23 as the minimum SDK,
    and have both legacy support libraries and Kotlin support disabled. After the
    creation, a `MainActivity` class shows up. Its Java code reads (comments removed)


    ```

    package book.andrkotlpro.frontjava;

    import android.os.Bundle;

    import com.google.android.material.snackbar.Snackbar;

    import androidx.appcompat.app.AppCompatActivity;

    import android.view.View;

    import androidx.navigation.NavController;

    import androidx.navigation.Navigation;

    import androidx.navigation.ui.AppBarConfiguration;

    import androidx.navigation.ui.NavigationUI;

    import book.andrkotlpro.frontjava.databinding.

    ActivityMainBinding;

    import android.view.Menu;

    import android.view.MenuItem;

    public class MainActivity extends AppCompatActivity {

    private AppBarConfiguration appBarConfiguration;

    private ActivityMainBinding binding;

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    binding = ActivityMainBinding.inflate(

    getLayoutInflater());

    setContentView(binding.getRoot());

    setSupportActionBar(binding.toolbar);

    NavController navController =

    Navigation.findNavController(this,

    R.id.nav_host_fragment_content_main);

    appBarConfiguration =

    new AppBarConfiguration.Builder(

    navController.getGraph()).build();

    NavigationUI.setupActionBarWithNavController(

    this, navController, appBarConfiguration);

    binding.fab.setOnClickListener(

    new View.OnClickListener() {

    @Override

    public void onClick(View view) {

    Snackbar.make(view,

    "Replace with your own action",

    Snackbar.LENGTH_LONG)

    .setAction("Action", null).show();

    }

    });

    }

    @Override

    public boolean onCreateOptionsMenu(Menu menu) {

    getMenuInflater().inflate(R.menu.menu_main, menu);

    return true;

    }

    @Override

    public boolean onOptionsItemSelected(MenuItem item) {

    int id = item.getItemId();

    if (id == R.id.action_settings) {

    return true;

    }

    return super.onOptionsItemSelected(item);

    }

    @Override

    public boolean onSupportNavigateUp() {

    NavController navController =

    Navigation.findNavController(this,

    R.id.nav_host_fragment_content_main);

    return NavigationUI.navigateUp(navController,

    appBarConfiguration)

    || super.onSupportNavigateUp();

    }

    }

    ```


    A few notes about that Java code: The `public` in front of the class and almost
    all methods tells that they are visible from everywhere. It cannot be omitted
    here since otherwise the framework and the rest of the application could not use
    the class and the methods. The `setContentView()` is, by virtue of the “set,”
    such a common construct that one could think of allowing `contentView = s.th.`
    to be written for it instead. A couple of competitor languages allow for such
    a syntax. Also for the `setOnClickListener()`, one might wish to use a `.onClickListener
    = s.th.` instead. The argument to `setOnClickListener()` is an object of an anonymous
    inner class – it is already an abbreviation of first declaring and then instantiating
    and using it. It can even be further shortened to


    ```

    binding.fab.setOnClickListener(

    view -> {

    Snackbar.make(view,

    "Replace with your own action",

    Snackbar.LENGTH_LONG)

    .setAction("Action", null).show();

    }

    );

    ```


    This is because the interface has just a single method. The wizard just kind of
    forgot this abbreviation.


    For the various `.getSomething()`, we could just as well write something like
    `.something`, which would express the same, but shorter.


    A sister project doing the same, but *with* Kotlin support, leads to a transposed
    code in the Kotlin language as follows:


    ```

    package book.andrkotlpro.frontkotlin

    import android.os.Bundle

    import com.google.android.material.snackbar.Snackbar

    import androidx.appcompat.app.AppCompatActivity

    import androidx.navigation.findNavController

    import androidx.navigation.ui.AppBarConfiguration

    import androidx.navigation.ui.navigateUp

    import androidx.navigation.ui.

    setupActionBarWithNavController

    import android.view.Menu

    import android.view.MenuItem

    import book.andrkotlpro.frontkotlin.databinding.

    ActivityMainBinding

    class MainActivity : AppCompatActivity() {

    private lateinit var appBarConfiguration:

    AppBarConfiguration

    private lateinit var binding:

    ActivityMainBinding

    override fun onCreate(savedInstanceState: Bundle?) {

    super.onCreate(savedInstanceState)

    binding = ActivityMainBinding.inflate(

    layoutInflater)

    setContentView(binding.root)

    setSupportActionBar(binding.toolbar)

    val navController = findNavController(

    R.id.nav_host_fragment_content_main)

    appBarConfiguration = AppBarConfiguration(

    navController.graph)

    setupActionBarWithNavController(navController,

    appBarConfiguration)

    binding.fab.setOnClickListener { view ->

    Snackbar.make(view,

    "Replace with your own action",

    Snackbar.LENGTH_LONG)

    .setAction("Action", null).show()

    }

    }

    override fun onCreateOptionsMenu(menu: Menu): Boolean {

    menuInflater.inflate(R.menu.menu_main, menu)

    return true

    }

    override fun onOptionsItemSelected(item: MenuItem):

    Boolean {

    return when (item.itemId) {

    R.id.action_settings -> true

    else -> super.onOptionsItemSelected(item)

    }

    }

    override fun onSupportNavigateUp(): Boolean {

    val navController = findNavController(

    R.id.nav_host_fragment_content_main)

    return navController.navigateUp(

    appBarConfiguration)

    || super.onSupportNavigateUp()

    }

    }

    ```


    Looking at the Kotlin code more thoroughly, a couple of observations emerge:


    *   We don’t need the “;” delimiters – Kotlin checks at line breaks whether the
    statement is finished or whether the following line needs to be included.


    *   We don’t need that `public` in front of the class and the methods – “public”
    is standard in Kotlin.


    *   Instead of `extends` we just write “`:`”, improving the readability a little
    bit.


    We don’t need to specify a `void` as return type if a function doesn’t return
    anything. Kotlin can infer that.


    *   Unfortunately, we cannot write `contentView = s.th.` as suggested previously
    – the Groovy language, for example, allowed for that. The reason this can’t be
    done in Kotlin is that the construct `contentView = s.th.` implies that there
    must be a class field named `contentView`, which is not the case. The compiler
    could check for appropriately named methods and then allow for that syntax, but
    the Kotlin developers decided to impose this restriction and to prohibit the construct
    if the field doesn’t exist. The same holds for the `setOnClickListener`, because
    a field `onClickListener` doesn’t exist either.


    *   Instead of an anonymous inner class, we can use the functional construct `view
    -> ...`. This is always possible if the addressed class, the listener in that
    case, just contains a single method, like `void onClick( View v )` in the base
    interface used here. The Kotlin compiler knows that it must use that particular
    single method of the listener class. While for Java such lambda expressions were
    not available before JDK 8, in Kotlin they were available from the very beginning.


    As a résumé of that comparison, the Kotlin code with 1117 characters (imports
    and spaces omitted) does the same as the Java code with 1329 characters. This
    is a savings of 17%. Usually, 20–30% is a savings rate you can expect for more
    complex classes.


    Despite the syntax being different from Java, the Kotlin compiler translates its
    source code to the same virtual machine bytecode as Java, so Kotlin can use the
    plethora of Java libraries that are out there in the wild, and Java developers
    switching to or also using Kotlin won’t miss them.'
