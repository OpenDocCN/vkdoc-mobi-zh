    \ !=\n    PackageManager.PERMISSION_GRANTED) {\n    if(shouldShowRequestPermissionRationale(\n\
    \        Manifest.permission.CAMERA)) {\n        // Explain to the user why your\
    \ app requires\n        // this permission. The view should show\n        // a\
    \ button linked to\n        //   requestPermissionLauncher.launch(\n        //\
    \        Manifest.permission.CAMERA\n        //   )\n        ...\n    } else {\n\
    \        // Ask the system for the permission.\n        requestPermissionLauncher.launch(\n\
    \            Manifest.permission.CAMERA\n        )\n    }\n} else {\n    // Use\
    \ the API that requires the permission.\n    ....\n}\n```\n\nThe only connection\
    \ to the `Activity` class is the `requestPermissionLauncher` variable, so it is\
    \ easy to factor out the permission-related code to a separate class.\n\n## Acquiring\
    \ Special Permissions\n\nUsing `ActivityCompat.requestPermissions()` under circumstances\
    \ is not enough to acquire special permissions like `SYSTEM_ALERT_WINDOW` or `WRITE_SETTINGS`.\
    \ For those two permissions and possibly others, you need to follow a different\
    \ approach.\n\nThe permission `WRITE_SETTINGS` must be acquired using a special\
    \ `Intent` as follows:\n\n```kotlin\nval backFromSettingPerm = 6183  // any suitable\
    \ constant\nif (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {\n    val activity\
    \ = this\n    if (!Settings.System.canWrite(activity)) {\n        // This is just\
    \ a suggestion: present a special\n        // dialog to the user telling about\
    \ the special\n        // permission. Important is the Activity start\n      \
    \  AlertDialog dialog =\n            new AlertDialog.Builder(activity)\n     \
    \           .setTitle(...)\n                .setMessage(...)\n               \
    \ .setPositiveButton(\"OK\", { dialog, id ->\n                    val intent =\
    \ Intent(\n                        Settings.ACTION_MANAGE_WRITE_SETTINGS)\n  \
    \                  intent.data = Uri.parse(\"package:\" +\n                  \
    \      getPackageName())\n                    activity.startActivityForResult(intent,\n\
    \                        backFromSettingPerm)\n                }).setNegativeButton(\"\
    Cancel\",\n                    { dialog, id ->\n                        // ...\n\
    \                    })\n                .create();\n        dialog.show();\n\
    \        systemWillAsk = true;\n    }\n} else {\n    // do as with any other permissions...\n\
    }\n```\n\nOnce done with that `Intent`, the callback method `onActivityResult()`\
    \ can be used to continue with the GUI flow:\n\n```kotlin\noverride\nprotected\
    \ fun onActivityResult(requestCode:Int,\n                               resultCode:Int,\
    \ data:Intent) {\n    if ((requestCode and 0xFFFF) == backFromSettingPerm) {\n\
    \        if (resultCode == Activity.RESULT_OK) {\n            // act accordingly...\n\
    \        }\n    }\n}\n```\n\nFor the `SYSTEM_ALERT_WINDOW` permission, you possibly\
    \ have to follow the same approach, but use `ACTION_MANAGE_OVERLAY_PERMISSION`\
    \ instead for creating the `Intent`.\n\n**Note**\n\nFor this special `SYSTEM_ALERT_WINDOW`\
    \ permission, the Google Play Store will automatically grant the permission if\
    \ the app gets installed from the Google Play Store. For local development and\
    \ testing, you have to use the `Intent` as described. Also note that for Android\
    \ 11, the policy for this setting was updated; see [https://developer.android.com/about/versions/11/privacy/permissions](https://developer.android.com/about/versions/11/privacy/permissions).\n\
    \n## Feature Requirements and Permissions\n\nIn Chapter [2](#463716_2_En_2_Chapter.xhtml)\
    \ we have seen that by virtue of the `<uses-feature>` element inside `AndroidManifest.xml`,\
    \ you can specify which features your app will use. This information is important\
    \ for the Google Play Store to find out on which devices your app can run after\
    \ being published. However, there is another important aspect to take into account\
    \ if you specify this requirement: which permissions will be implied by such requirement,\
    \ and how will they be handled depending on the API level in use?\n\nFeature constants\
    \ and API levels do not necessarily strictly relate to each other – for example,\
    \ the `android.hardware.bluetooth` feature was added in API level 8, but the corresponding\
    \ Bluetooth API was added in API level 5. Because of this, some apps were able\
    \ to use the API before they had the ability to declare that they required the\
    \ API using the `<uses-feature>` declaration. To remedy this discrepancy, Google\
    \ Play assumes that certain hardware-related permissions indicate that the underlying\
    \ hardware features are required by default. For instance, applications that use\
    \ Bluetooth must request the `BLUETOOTH` permission in a `<uses-permission>` element,\
    \ and for apps targeting older API levels, Google Play assumes that the permission\
    \ declaration implies that the underlying `android.hardware.bluetooth` feature\
    \ is required by the application. Table [7-2](#463716_2_En_7_Chapter.xhtml#Tab2)\
    \ lists the permissions that imply such feature requirements.\n\nNote that the\
    \ `<uses-feature>` declarations take precedence over features implied by the permissions\
    \ in Table [7-2](#463716_2_En_7_Chapter.xhtml#Tab2). For any of these permissions,\
    \ you can disable filtering based on the implied feature by explicitly declaring\
    \ the implied feature, in a `<uses-feature>` element, with an `android:required=\"\
    false\"` attribute. For example, to disable any filtering based on the `CAMERA`\
    \ permission, you would add this to the manifest file:\n\n**Table 7-2** Permissions\
    \ That Imply Feature Requirements\n\n| Category | Permission | …Implies Feature\
    \ |\n| --- | --- | --- |\n| Bluetooth | `BLUETOOTH` | `android.hardware.bluetooth`\
    \ |\n| | `BLUETOOTH_ADMIN` | `android.hardware.bluetooth` |\n| Camera | `CAMERA`\
    \ | `android.hardware.camera` and `android.hardware.camera.autofocus` |\n| Location\
    \ | `ACCESS_MOCK_LOCATION` | `android.hardware.location` |\n| | `ACCESS_LOCATION_EXTRA_COMMANDS`\
    \ | `android.hardware.location` |\n| | `INSTALL_LOCATION_PROVIDER` | `android.hardware.location`\
    \ |\n| | `ACCESS_COARSE_LOCATION` | `android.hardware.location` `android.hardware.location.network`\
    \ (API level < 21) |\n| | `ACCESS_FINE_LOCATION` | `android.hardware.location`\
    \ `android.hardware.location.gps` (API level < 21) |\n| Microphone | `RECORD_AUDIO`\
    \ | `android.hardware.microphone` |\n| Telephony | `CALL_PHONE` | `android.hardware.telephony`\
    \ |\n| | `CALL_PRIVILEGED` | `android.hardware.telephony` |\n| | `MODIFY_PHONE_STATE`\
    \ | `android.hardware.telephony` |\n| | `PROCESS_OUTGOING_CALLS` | `android.hardware.telephony`\
    \ |\n| | `READ_SMS` | `android.hardware.telephony` |\n| | `RECEIVE_SMS` | `android.hardware.telephony`\
    \ |\n| | `RECEIVE_MMS` | `android.hardware.telephony` |\n| | `RECEIVE_WAP_PUSH`\
    \ | `android.hardware.telephony` |\n| | `SEND_SMS` | `android.hardware.telephony`\
    \ |\n| | `WRITE_APN_SETTINGS` | `android.hardware.telephony` |\n| | `WRITE_SMS`\
    \ | `android.hardware.telephony` |\n| Wi-Fi | `ACCESS_WIFI_STATE` | `android.hardware.wifi`\
    \ |\n| | `CHANGE_WIFI_STATE` | `android.hardware.wifi` |\n| | `CHANGE_WIFI_MULTICAST_STATE`\
    \ | `android.hardware.wifi` |\n\n## Permission Handling Using a Terminal\n\nTo\
    \ see the permissions you have registered on your device, you can scan through\
    \ the apps list in the system settings app or, more easily, use the ADB shell\
    \ to get various permission-related information in a terminal.\n\nFor that aim,\
    \ connect the hardware device via USB to your laptop or PC, open a terminal, `cd`\
    \ to the `platform-tools` folder in your SDK installation, find your device in\n\
    \n```bash\n./adb devices\n```\n\nand then enter\n\n```bash\n./adb shell -s\n```"
