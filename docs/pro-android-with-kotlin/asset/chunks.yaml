    ## Acquiring Permissions


    Permission inquiry for “Dangerous” permissions happens during the runtime of an
    app. This makes the permission system quite flexible – users of your app might
    never use certain parts of it, and thus not asking for unneeded permission avoids
    unnecessary annoyance. The downside of this runtime approach is that more programming
    work is needed – the permission inquiry must be included in your code. To do so,
    at any suitable place before the permission is needed, you add:


    ```kotlin

    val activity = this

    val perm = Manifest.permission.CAMERA

    val cameraPermReturnId = 7239 // any suitable constant

    val permissionCheck = ContextCompat.checkSelfPermission(

    activity, perm)

    if (permissionCheck !=

    PackageManager.PERMISSION_GRANTED) {

    // Should we show an explanation?

    if (ActivityCompat.

    shouldShowRequestPermissionRationale(

    activity, perm)) {

    // Show an explanation to the user

    // *asynchronously* -- don''t block

    // this thread waiting for the user''s

    // response! After the user sees the

    // explanation, try again to request

    // the permission.

    val dialog = AlertDialog.Builder(activity) ...

    .create()

    dialog.show()

    } else {

    // No explanation needed, we can request

    // the permission.

    ActivityCompat.requestPermissions(activity,

    arrayOf(perm), cameraPermReturnId)

    // cameraPermReturnId is an app-defined

    // int constant. The callback method gets

    // the result of the request.

    }

    }

    ```


    What this code does is as follows:


    *   First, we check whether the permission has already been granted or not. If
    the permission was granted before, the user wouldn’t be asked again unless the
    app got reinstalled or the permission got revoked explicitly.

    *   The `ActivityCompat.shouldShowRequestPermissionRationale()` checks whether
    a rationale should be shown to the user. The idea behind that is if the user denied
    the permission inquiry request a couple of times, they maybe did that because
    the need for the permission was not well understood. In this case the app gets
    a chance to tell the user more about the permission need. How often `shouldShowRequestPermissionRationale()`
    returns `true` is up to the Android OS. The example here shows a dialog. You can
    of course do whatever you want here for informing the user.

    *   The `ActivityCompat.requestPermissions(...)` finally performs the permission
    inquiry. This happens asynchronously, so the call returns immediately.


    Once the call to `ActivityCompat.requestPermissions(...)` happens, the user gets
    asked by the Android OS, outside your app, whether they want to grant the permission.
    The result of that will show up in an asynchronous callback method as follows:


    ```kotlin

    override

    fun onRequestPermissionsResult(

    requestCode: Int, permissions: Array,

    grantResults: IntArray) {

    when (requestCode) {

    cameraPermReturnId -> {

    // If request is canceled, the result

    // arrays are empty. Here we know it just

    // can be one entry

    if ((grantResults.isNotEmpty()

    && grantResults[0] ==

    PackageManager.PERMISSION_GRANTED)) {

    // permission was granted

    // act accordingly...

    } else {

    // permission denied

    // act accordingly...

    }

    return

    }

    // Add other ''when'' lines to check for other

    // permissions this App might request.

    else -> {

    // Ignore all other requests.

    // Or whatever makes sense to you.

    }

    }

    }

    ```


    This method needs to be implemented inside an `android.content.Activity` class.
    In other contexts this is not possible.


