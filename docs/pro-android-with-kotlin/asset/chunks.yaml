- fmt: "# Intent Filters\n\n`Intents` are objects to tell Android that something needs\
    \ to be done, and they can be *explicit* by exactly specifying which component\
    \ needs to be called or *implicit* if we don’t precisely specify the called component\
    \ but let Android decide which app and which component can answer the request.\
    \ In case there is an ambiguity and Android cannot decide which component to call\
    \ for implicit `Intents`, Android will ask the user.\n\nFor implicit `Intents`\
    \ to work, a possible intent receiver needs to declare which `Intents` it is able\
    \ to receive. For example, an activity might be able to show the contents of a\
    \ text file, and a caller saying “I need an activity that can show me text files”\
    \ possibly connects to exactly this activity. Now the way the intent receiver\
    \ declares its ability to answer to intent requests is by specifying one or more\
    \ *intent filters* in its app’s `AndroidManifest.xml` file. The syntax of such\
    \ a declaration is\n\n```\n<intent-filter android:icon=\"drawable resource\"\n\
    android:label=\"string resource\"\nandroid:priority=\"integer\" >\n...\n```\n\n\
    where `icon` points to a drawable resource ID for an icon and `label` points to\
    \ a string resource ID for a label. If unspecified, the icon or label from the\
    \ parent element will be used. The `priority` attribute is a number between -999\
    \ and 999 and for `Intents` specifies their ability to handle such intent requests\
    \ and for receivers specifies the execution order for several receivers. Higher\
    \ priorities come before lower priorities.\n\n> **Caution**  \n> The `priority`\
    \ attribute should be used with caution – a component cannot possibly know what\
    \ priorities other components from other apps can have. So you introduce some\
    \ kind of dependency between apps, which is not intended by design.\n\nThis `<intent-filter>`\
    \ element can be a child of:\n\n* `<activity>` and `<activity-alias>`\n* `<service>`\n\
    * `<receiver>`\n\nSo `Intents` can be used to launch activities and services and\
    \ to fire broadcast messages.\n\nAnd the element must or can have children elements\
    \ as follows:\n\n* `<action>` is obligatory.\n* `<category>`.\n* `<data>`.\n\n\
    > **Note**  \n> See also the online documentation at [`https://developer.android.com/reference/android/content/Intent`](https://developer.android.com/reference/android/content/Intent).\n\
    \n## Intent Action\n\nThe `<action>` child of the filter, or children – you can\
    \ have more than one – specifies the action to perform. The syntax is\n\n```\n\
    <action android:name=\"string\" />\n```\n\nThis will be something expressing actions\
    \ like “View,” “Pick,” “Edit,” “Dial,” and so on. The complete list of generic\
    \ actions is specified by the constants whose names have `ACTION_*` inside the\
    \ class `android.content.Intent` and shown in section “Intent Constituent Parts”\
    \ in the online text companion. Besides those generic actions, you can also define\
    \ your own actions.\n\n> **Note**  \n> Using any of the standard actions does\
    \ not necessarily mean there is any app on your device being able to respond to\
    \ a corresponding `Intent`.\n\n## Intent Category\n\nThe `<category>` child of\
    \ the filter specifies a category for the filter. The syntax is\n\n```\n<category\
    \ android:name=\"string\" />\n```\n\nThis attribute may be used to specify the\
    \ type of component that an `Intent` should address. You can specify several categories,\
    \ but the category is not used for all `Intents`, and you can omit it as well\
    \ though. The filter will match the `Intent` only if *all* required categories\
    \ are present.\n\nWhen an `Intent` is used on the invoker side, you can add categories\
    \ by writing, for example\n\n```\nval intent:Intent = Intent(...)\nintent.addCategory(\"\
    android.intent.category.ALTERNATIVE\")\n```\n\nStandard categories correspond\
    \ to the constants whose names have `CATEGORY_*` inside the `android.content.Intent`\
    \ class. We list them in section “Intent Constituent Parts” in the online text\
    \ companion.\n\n> **Caution**  \n> For implicit `Intents`, you *must* use the\
    \ `DEFAULT` category inside the filter. This is because the methods `startActivity()`\
    \ and `startActivityForResult()` use this category by default.\n\n## Intent Data\n\
    \nThe `<data>` child of the filter is a data type specification for the filter.\
    \ The syntax is\n\n```\n<data android:scheme=\"string\"\n      android:host=\"\
    string\"\n      android:port=\"string\"\n      android:path=\"string\"\n     \
    \ android:pathPrefix=\"string\"\n      android:pathPattern=\"string\"\n      android:mimeType=\"\
    string\" />\n```\n\nYou can specify either:\n\n* A data type specified by only\
    \ the `mimeType` element, for example, “text/plain” or “text/html”. So you can\
    \ write `<data android:mimeType=\"text/html\" />`.\n* A data type specified by\
    \ scheme, host, port, and some path specification: `<scheme>://<host>:<port>[<path>|<pathPrefix>|<pathPattern>]`.\
    \ Here `<path>` means the full path, `<pathPrefix>` is the start of a path, and\
    \ `<pathPattern>` is like path but with wildcards: “X*” is 0 or more occurrences\
    \ of character “X,” and “.*” is 0 or more occurrences of any character. Due to\
    \ escaping rules, write `\\\\` for a literal “*” and `\\\\\\\\` for a literal\
    \ “\\”.\n\nOr you can specify both of the preceding options.  \nOn the caller\
    \ side, you can use `setType()`, `setData()`, and `setDataAndType()` to set any\
    \ data type combination.\n\n> **Caution**  \n> For implicit intent filters, if\
    \ the caller specifies a URI *data* part as in `intent.data = <some URI>`, it\
    \ might not be sufficient to specify just scheme/host/port/path inside the filter\
    \ declaration. Under these circumstances you also have to specify the MIME type\
    \ like in `mimeType=\"*/*\"`; otherwise, the filter possibly won’t match. This\
    \ generally happens in a *content provider* environment, since the content provider’s\
    \ `getType()` method gets called for the specified URI and the result gets set\
    \ as the `Intent`’s MIME type.\n\n## Intent Extra Data\n\nAny `Intent` can have\
    \ extra data added to it, which you can use to send data with it other than that\
    \ specified by the `<data>` sub-element.  \nWhile you can use one of the various\
    \ `putExtra(...)` methods to add any kind of extra data, there are also a couple\
    \ of standard extra data sent by `putExtra(String,Bundle)`, with the keys given\
    \ in the list shown in section “Intent Constituent Parts” in the online text companion.\n\
    \n## Intent Flags\n\nYou can set special intent handling flags by invoking\n\n\
    ```\nintent.flags = Intent. or Intent. or ...\n```\n\nMost of these flags specify\
    \ how the `Intent` gets handled by the Android OS. Specifically, flags of the\
    \ form `FLAG_ACTIVITY_*` aim at activities called by `Context.startActivity(..)`,\
    \ and flags like `FLAG_RECEIVER_*` are for use with `Context.sendBroadCast(...)`.\
    \ The tables in section “Intent Constituent Parts” in the online text companion\
    \ show the details.\n\n## System Intent Filters\n\nThe system apps, that is, the\
    \ apps you have installed after you bought a smartphone, have intent filters you\
    \ can use to call them from your app. Unfortunately, it is not always that easy\
    \ to guess how to call the activities from system apps, and relevant documentation\
    \ is hard to find. A remedy is to extract this information from their APK files.\
    \ This is done for you for API level 26, and the result is listed in the online\
    \ text companion in section “The System Intent Filters.”\n\nAs an example, suppose\
    \ you want to send an email. Looking at the system intent table in the online\
    \ text companion, you can find a lot of actions inside the table for “PrebuiltGmail”.\
    \ Which one to use? Well, first, a general-purpose interface should not have too\
    \ many input parameters. Second, we can also look at the action name to find something\
    \ that seems appropriate. A promising candidate is the “SEND_TO” action: all that\
    \ it apparently needs is a “mailto:” data specification. And as it happens to\
    \ be, this is the action we actually need. Using an elaborated “mailto:...” URL\
    \ allows to specify more recipients, CC and BCC recipients, a subject, and even\
    \ the mail body. However, you can also just use “mailto:master@universe.com” and\
    \ add recipients, the body, and so on by using extra fields. See section “Intent\
    \ Extra Data.” So to send an email, possibly with letting the user choose among\
    \ several email apps installed on their device, write\n\n```\nval intent = Intent(Intent.ACTION_SENDTO).apply\
    \ {\n    data = Uri.parse(\"mailto:master@universe.com\")\n    putExtra(Intent.EXTRA_SUBJECT,\
    \ \"Subject\")\n    putExtra(Intent.EXTRA_TEXT, \"Body\")\n}\nstartActivity(intent)\n\
    ```"
