- fmt: '# Android Search Suggestions and Location Services


    ## Search Suggestions


    Whenever the user enters or removes a character, the system will go to the search
    configuration and see by looking at the `searchSuggestAuthority` attribute that
    it needs to address a content provider with this authority assigned to it.


    By looking into `AndroidManifest.xml`, it sees that this authority is connected
    to the provider class `CustomProvider`.


    It invokes a `query()` on this provider and expects a `Cursor` return the custom
    suggestions.


    If the user taps a suggestion, by virtue of the `searchSuggestIntentAction` attribute
    set to `android.intent.action.VIEW`, the `SearchableActivity`''s `onCreate()`
    will see the incoming Intent with the "VIEW" action.


    Up to now we let the `query()` method return `null`, which is equivalent to no
    suggestions, but we added a logging statement, so we can see what arrives at the
    `query()` method. For example, when the user enters "sp", the arguments so far
    will read


    ```

    query(): content://com.example.CustomProvider/

    search_suggest_query/sp?limit=50

    projection=null

    selection=null

    selectionArgs=null

    sortOrder=null

    ```


    The arguments sent to the `query()` method by the search framework can be tailored
    extensively by various search configuration attributes. At this place however,
    we refer to the online documentation and continue with extracting the information
    from the first `uri` parameter. How to build `Cursor` objects is described in
    Chapter [6](#463716_2_En_6_Chapter.xhtml). For this example, we use a `MatrixCursor`,
    and instead of returning `null`, we could, for example, return


    ```

    override fun query(uri: Uri,

    projection: Array?,

    selection: String?,

    selectionArgs: Array?,

    sortOrder: String?): Cursor? {

    Log.e("LOG", "query(): " + uri +

    " - projection=" +

    Arrays.toString(projection) +

    " - selection=" + selection +

    " - selectionArgs=" +

    Arrays.toString(selectionArgs) +

    " - sortOrder=" + sortOrder)

    val lps = uri.lastPathSegment // the query

    val qr = uri.encodedQuery     // e.g. "limit=50"

    val curs = MatrixCursor(arrayOf(

    BaseColumns._ID,

    SearchManager.SUGGEST_COLUMN_TEXT_1,

    SearchManager.SUGGEST_COLUMN_INTENT_DATA

    ))

    curs.addRow(arrayOf(1, lps + "-Suggestion 1",

    lps + "-Suggestion 1"))

    curs.addRow(arrayOf(2, lps + "-Suggestion 2",

    lps + "-Suggestion 2"))

    return curs

    }

    ```


    from inside the `SearchableActivity`. This example provides only silly suggestions
    – you can write something more clever to the `MatrixCursor`.


    As a last modification, you can make your search suggestions available to the
    system''s *Quick Search Box*. All you have to do for that is add `android:includeInGlobalSearch
    = "true"` to your search configuration. The user must allow this inside the settings
    for this connection to take effect.


    ## Location and Maps


    Handheld devices may track their geographic position, and they may interact with
    map services to graphically interfere with a user''s location needs. Geographical
    position is not only about latitude and longitude numbers but also about finding
    out street addresses and points of interest. While it is certainly an important
    ethical question how far apps can go to track their users'' personal life, the
    possibilities for interesting apps and games are potentially endless. In this
    section we talk about the technical possibilities. Just be cautious with your
    user''s data and be transparent with what you are doing with them.


    The Android OS itself contains a location framework with classes at package `android.location`.
    However, the official position of Google is to favor the `Google Play Services
    location API` for it is more elaborate and simpler to use. We follow this suggestion
    and talk about the services location API in the following paragraphs. Location
    is about finding out (A) the geographical position of a device as a latitude-longitude
    pair and (B) street names, house numbers, and other points of interest given the
    geographical position.


    In order to make the services location API available to your app, inside your
    app module''s `build.gradle` file, add as dependencies


    ```

    implementation

    ''com.google.android.gms:play-services-location:11.8.0''

    implementation

    ''com.google.android.gms:play-services-maps:11.8.0''

    ```


    (There are just two lines; remove the newlines after "implementation.")


    ### Last Known Location


    The easiest way to get the device''s position is to get the *last known location*.
    To do so, in your app request permissions


    The GPS resolution with less than ten yards needs the *FINE* location permission,
    while the more coarse network-based resolution with approximately 100 yards needs
    the *COARSE* location permission. Adding both to the manifest file gives us the
    most options, but depending on your needs, you could go along with just the coarse
    one.


    Then, inside your component, for example, inside `onCreate()`, you construct a
    `FusedLocationProviderClient` as in


    ```

    var fusedLocationClient: FusedLocationProviderClient? =

    null

    override fun onCreate(savedInstanceState: Bundle?) {

    super.onCreate(savedInstanceState)

    ...

    fusedLocationClient = LocationServices.

    getFusedLocationProviderClient(this)

    }

    ```


