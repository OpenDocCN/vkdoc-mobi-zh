    和 `onCreate()` 中。


    # 编写你自己的相机应用


    使用 `Intent` 向 Android 系统发出拍照或录制视频的信号，对于许多用例来说可能已经足够。但一旦我们需要对相机或图形用户界面有更多控制，就需要使用相机
    API 编写自己的相机访问代码。在本节中，我将向你展示一个既能显示预览，又能让你拍摄静态图像的应用。

