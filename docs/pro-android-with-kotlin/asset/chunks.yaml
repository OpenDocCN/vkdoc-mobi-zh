  trans: "\n# 此命令  \n将展示使用 `am` 命令创建广播消息和执行其他操作的所有可能性。\n\n## 关于广播的随机笔记\n\n- 你还可以在回调方法\
    \ `onPause()` 和 `onResume()` 中注册和注销由程序管理的接收器。显然，与使用 `onCreate()`/`onDestroy()`\
    \ 配对相比，这种方式的注册和注销操作会更频繁。\n\n- 当前正在执行的 `onReceive()` 方法会将进程优先级提升至“前台”级别，防止 Android\
    \ 系统终止接收进程——只有在极端资源短缺的情况下才可能被终止。\n\n- 如果你在 `onReceive()` 内部有长时间运行的操作，可以考虑在后台线程中运行它们，并提前结束\
    \ `onReceive()`。但是，由于完成 `onReceive()` 后进程优先级会恢复至正常级别，你的后台进程更有可能被终止，从而导致应用崩溃。你可以通过使用\
    \ `Context.goAsync()` 然后启动一个 `AsyncTask`（在其内部，最后必须调用从 `goAsync()` 获取的 `PendingResult`\
    \ 对象上的 `finish()` 方法来最终释放资源），或者使用 `JobScheduler` 来防止这种情况。\n\n- 自定义权限（我们在“保护隐式广播”部分使用过）会在应用安装时被注册。因此，定义自定义权限的应用必须在使用这些权限的应用之前安装。\n\
    \n- 通过隐式广播发送敏感信息时要谨慎。潜在恶意应用也可能尝试接收这些信息。至少你可以在发送方通过指定权限来保护广播。\n\n- 为了清晰且不与其他应用混淆，广播操作和权限名称始终应使用命名空间。\n\
    \n- 避免从广播中启动 Activity——这违背了 Android 的可用性原则。\n\n## 6. 内容提供者\n\n### 内容提供者框架\n\n\
    *内容提供者*框架允许：\n\n1.  使用其他应用提供的（结构化）数据\n2.  提供（结构化）数据供其他应用使用\n3.  支持将数据从一个应用复制到另一个应用\n\
    4.  向*搜索框架*提供数据\n5.  向特殊的数据相关 UI 控件提供数据\n6.  通过定义良好的标准化接口完成上述所有操作\n\n通信的数据可以具有严格定义的结构，例如，来自数据库的行，具有定义的列名和类型，但也可以是没有任何语义关联的文件或字节数组。如果你应用的数据存储需求不符合上述任何情况，则无需实现内容提供者组件——而是使用常规的数据存储选项。\n\
    \n> **注意**：应用为其自身组件提供数据或使用自己的数据提供者访问内容并非严格禁止；然而，提到内容提供者时，我们通常想到的是应用间数据交换。但如果你需要，始终可以将应用内数据交换模式视为应用间通信的一个直接特例。\n\
    \n如果我们想要创建内容感知型应用，无论是提供内容还是消费内容，主要问题如下：\n\n-   应用如何提供内容？\n-   应用如何访问其他应用提供的内容？\n\
    -   应用如何处理其他应用提供的内容？\n-   我们如何保护提供的数据？\n\n在接下来的章节中，我们将专门探讨这些主题。图 6-1 展示了概述。\n\n\
    ![](img/463716_2_En_6_Fig1_HTML.png)\n\n*一张内容提供者的图示，定义了文件流的 `Uri` 类如何修改、查询，并与游标类流一起流向内容解析器和提供者，最终到达数据。*\n\
    \n**图 6-1** – 内容提供者框架\n\n### 提供内容\n\n内容可以由你的应用提供，当然也可以由系统应用提供。例如，想想相机拍摄的照片或通讯录中的联系人。如果我们先看内容提供方，内容提供者框架会更容易理解。在后面的章节中，我们还将讨论消费者和其他主题。\n\
    \n首先，我们需要知道数据存在哪里。然而，内容提供者框架对数据实际来源不做任何假设——数据可以存在于文件、数据库、内存存储或你能想到的任何其他地方。这提高了你应用的可维护性。例如，在项目早期阶段，数据可能来自文件，但后来你切换到数据库或云存储，而可能的消费者无需关心这些变化，因为他们不必改变访问你内容的方式。因此，内容提供者框架为你的数据提供了一个抽象层。\n\
    \n为实现提供内容而需要实现的单一接口是抽象类：\n\n```java\nandroid.content.ContentProvider\n```\n\n\
    在接下来的小节中，我们将从一个用例的角度来看这个类的实现。\n\n### 初始化提供者\n\n在你可实例化的 `ContentProvider` 类子类内部，你*必须*实现方法：\n\
    \n```java\nonCreate()\n```\n\n当内容提供者被实例化时，Android 系统会调用此方法。你可以在这里初始化内容提供者，但应避免在此处放入耗时的初始化过程，因为实例化并不一定意味着内容提供者会被实际使用。如果你这里没什么特别的事情要做，直接将其实现为一个空方法即可。\n\
    \n若想了解更多关于内容提供者在实例化时的运行环境信息，你可以重写它的 `attachInfo()` 方法——在那里，你会获知内容提供者运行的上下文，并且还会得到一个\
    \ `ProviderInfo` 对象。只是别忘了在内部也调用 `super.attachInfo()`。\n\n### 查询数据\n\n对于查询类似数据库的数据集，有一个方法你*必须*实现，另外两个方法你可以*选择*实现：\n\
    \n```kotlin\nabstract fun query(        // ----- 变体 A -----\n    uri: Uri,\n \
    \   projection: Array,\n    selection: String,\n    selectionArgs: Array,\n  \
    \  sortOrder: String\n) : Cursor\n\n// ----- 变体 B -----\n// 你不需要实现这个。默认\n// 实现会调用变体\
    \ A，但忽略\n// 'cancellationSignal' 参数。\nfun query(\n    uri: Uri,\n    projection:\
    \ Array,\n    selection: String,\n    selectionArgs: Array,\n    String sortOrder:\
    \ String,\n    cancellationSignal: CancellationSignal\n) : Cursor\n\n// -----\
    \ 变体 C -----\n// 你不需要实现这个。默认\n// 实现会将 bundle 参数转换为\n// 调用变体 B 的相应参数。\n// 使用的 bundle\
    \ 键为：\n//     ContentResolver.QUERY_ARG_SQL_SELECTION\n//     ContentResolver.QUERY_ARG_SQL_SELECTION_ARGS\n\
    //     ContentResolver.QUERY_ARG_SQL_SORT_ORDER -或-\n//         ContentResolver.QUERY_ARG_SORT_COLUMNS\n\
    //         （这是一个 String 数组）\nfun query(\n    uri: Uri,\n    projection: Array,\n\
    \    queryArgs: Bundle,\n    cancellationSignal: CancellationSignal\n) : Cursor\n\
    ```\n\n这些方法并非用于呈现诸如图像和声音之类的文件数据。然而，返回文件数据的链接或标识符是可以接受的。\n\n在以下段落中，我们按名称和变体描述所有参数：\n\
    \n- **`uri`** : 这是一个重要参数，用于指定查询在数据空间中的类型坐标。内容消费者将通过适当指定此参数来告知他们对哪种*类型*的数据感兴趣。由于\
    \ URI 非常重要，我们将在专门的子章节中描述它们；请参阅下一节“设计内容 URI”。此参数对于变体 A、B 和 C 含义相同。\n"
- fmt: "# Content Provider Query Parameters\n\n- **projection**: This will tell the\
    \ implementation which columns the requester is interested in. Looking at the\
    \ SQL database type of storing data, this lists the column names that should be\
    \ included in the result. There is however no strict requirement for a one-to-one\
    \ mapping – a requester might ask for a selection parameter \"X\", and the values\
    \ for \"X\" might be calculated any way you might possibly think of. If `null`,\
    \ return all fields. This parameter has the same meaning for all variants A, B,\
    \ and C.\n\n- **selection**: Only for variants A and B, this specifies a selection\
    \ for the data to be returned. The content provider framework makes no assumptions\
    \ how this selection parameter must look like – it is completely up to the implementation,\
    \ and content requesters must yield to what the implementation defines. In many\
    \ cases you will however have something like a SQL selection string like \"name\
    \ = Jean AND age < 45\" here. If `null`, return all data sets.\n\n- **selectionArgs**:\
    \ The selection parameter may contain placeholders like \"?\". If so, the values\
    \ to be inserted for the placeholders are specified in this array. Again the framework\
    \ makes no strict assumptions here, but in most cases the \"?\" serves as a placeholder\
    \ like in \"name = ? AND age < ?\", as for SQL. This may be `null` if there are\
    \ no selection placeholders.\n\n- **sortOrder**: Only for variants A and B, this\
    \ specifies a sort order for the data to be returned. The content provider framework\
    \ does not prescribe a syntax here, but for SQL-like access, this will usually\
    \ be something like \"name DESC, age ASC\".\n\n- **queryArgs**: For variant C,\
    \ all three – selection, selection arguments, and sort order – may or may not\
    \ be specified using an `android.os.Bundle` object. By convention, for SQL-like\
    \ queries, the bundle keys are:\n    - `ContentResolver.QUERY_ARG_SQL_SELECTION`\n\
    \    - `ContentResolver.QUERY_ARG_SQL_SELECTION_ARGS`\n    - `ContentResolver.QUERY_ARG_SQL_SORT_ORDER`\n\
    \n- **cancellationSignal**: For variants B and C, if this is not `null`, you can\
    \ use it to cancel the current operation. The Android OS will then appropriately\
    \ inform the requesters.\n\nAll the query methods are supposed to return an `android.database.Cursor`\
    \ object. This allows to iterate over the data sets, with the convention that\
    \ each data set contains an \"_id\"-keyed technical ID. See the following sections\
    \ \"A Cursor Class Basing on AbstractCursor and Co.\" and \"A Cursor Class Basing\
    \ on the Cursor Interface\" to see how to design appropriate cursor objects.\n\
    \n## Modifying Content\n\nContent providers do not just allow to read content;\
    \ they also allow to alter content. For this aim the following methods exist:\n\
    \n```\nabstract fun insert(\n    Uri uri:Uri,\n    values:ContentValues) : Uri\n\
    // You don't have to overwrite this, the default\n// implementation correctly\
    \ iterates over the input\n// array and calls insert(...) on each element.\nfun\
    \ bulkInsert(\n    uri:Uri,\n    values:Array) : Int\nabstract fun update(\n \
    \   uri:Uri,\n    values:ContentValues,\n    selection:String,\n    selectionArgs:Array)\
    \ : Int\nabstract fun delete(\n    uri:Uri,\n    selection:String,\n    selectionArgs:Array)\
    \ : Int\n```\n\nWe describe the parameters and their meanings in the following\
    \ paragraphs:\n\n- **uri**: Specifies the type coordinates of the data in the\
    \ data space. Content consumers will tell what *kind* of data they are targeting\
    \ at by appropriately specifying this parameter. See the following section \"\
    Designing Content URIs\" for a detailed description. Note that for deleting or\
    \ updating single data sets, it is generally assumed that the URI contains the\
    \ (technical) ID of the data at the end of the URI path, for example, `content://com.android.contacts/contact/42`.\n\
    \n- **values**: These are the values to be inserted or updated. You use the various\
    \ `get*()` methods of this class to access the values.\n\n- **selection**: This\
    \ specifies a selection for the data to be updated or deleted. The content provider\
    \ framework makes no assumptions how this selection parameter must look like –\
    \ it is completely up to the implementation, and content requesters must yield\
    \ to what the implementation defines. In many cases you will however have something\
    \ like a SQL selection string like \"name = Jean AND age < 45\" here. If `null`,\
    \ all items of the data set will be addressed.\n\n- **selectionArgs**: The selection\
    \ parameter may contain placeholders like \"?\". If so, the values to be inserted\
    \ for the placeholders are specified in this array. Again the framework makes\
    \ no strict assumptions here, but in most cases the \"?\" serves as a placeholder\
    \ like in \"name = ? AND age < ?\", as for SQL. This may be `null` if there are\
    \ no selection placeholders.\n\nThe `insert()` method is supposed to return the\
    \ URI specifying the inserted data. This return value may be `null`, so there\
    \ is no strict requirement to return something here. If it returns something,\
    \ this should contain the technical ID. All the `Int`-returning methods are supposed\
    \ to return the number of affected data sets. If you don't want the content provider\
    \ to be able to alter any data, you can just provide empty implementations to\
    \ all the insert, update, and delete methods and let them return `0` or `null`.\n\
    \n## Finishing the ContentProvider Class\n\nIn order to finish the implementation\
    \ of your `ContentProvider` class, you must – apart from the query, insert, update,\
    \ and delete methods – implement one more method:\n\n```\nabstract getType(uri:Uri)\
    \ : String\n```\n\nThis maps any usable URI to the appropriate MIME type. For\
    \ a possible implementation, you can, for example, use URIs as follows:\n\n```\n\
    ContentResolver.CURSOR_DIR_BASE_TYPE + \"/vnd.<name>.<type>\"\nContentResolver.CURSOR_ITEM_BASE_TYPE\
    \ + \"/vnd.<name>.<type>\"\n```\n\nfor URIs referring to *possibly* many items\
    \ or *at most* one item, respectively. For `<name>` use a globally unique name,\
    \ maybe the reverse company domain or the package name or a prominent part of\
    \ it. For `<type>` use an identifier defining the table name or the data domain.\n\
    \n## Registering the Content Provider\n\nOnce you finish the `ContentProvider`\
    \ implementation, you must register it inside the `AndroidManifest.xml` file as\
    \ follows:\n\n```\n<provider\n    android:authorities=\"...\"\n    android:directBootAware=\"\
    ...\"\n    android:enabled=\"...\"\n    android:exported=\"...\"\n    android:grantUriPermissions=\"\
    ...\"/>\n```\n\nThe attributes are described in Table 6-1.\n\n**Table 6-1** The\
    \ `<provider>` Element\n\n| Attribute (Prepend `android:` to Each) | Description\
    \ |\n|---|---|\n| `authorities` | A semicolon \";\"–separated list of authorities.\
    \ In many cases this will be just one, and you usually use the app (package) name\
    \ or the full class name of the `ContentProvider` implementation. There is no\
    \ default; you must have at least one. |\n| `directBootAware` | Whether the content\
    \ provider can run before the user unlocks the device. Default is false. |\n|\
    \ `enabled` | Whether the content provider is enabled. Default is true. |\n| `exported`\
    \ | Whether other apps can access contents here. Depending on the architecture\
    \ of your app, access might be restricted to components from the same app, but\
    \ usually you want other apps to access the content and thus set this to `true`.\
    \ Starting with API level 17, default is false. Prior to that the flag doesn't\
    \ exist, and apps behave like this is set to true. |\n| `grantUriPermissions`\
    \ | Whether permission to other apps accessing content from this provider by URI\
    \ can be temporarily granted or not. *Temporarily granted* means a permission\
    \ denial as defined by `<permission>`, `<readPermission>`, or `<writePermission>`\
    \ gets overridden temporarily if the content-accessing client is invoked by an\
    \ Intent with `intent.addFlags(Intent.FLAG_GRANT_URI_PERMISSION)`. If you set\
    \ this attribute to `false`, a more fine-grained temporary permission can still\
    \ be granted by setting one or more `<grant-uri-permission>` sub-elements. Default\
    \ is false. |"
