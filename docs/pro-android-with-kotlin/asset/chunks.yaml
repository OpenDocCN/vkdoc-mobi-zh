  trans: "\n# 套接字连接与可穿戴设备开发\n\n## 蓝牙套接字通信\n\n```\n/**\n* 此线程在连接远程设备期间运行。\n* 它负责处理所有传入和传出的传输。\n\
    */\nprivate inner\nclass SocketReadWrite(val mmSocket: BluetoothSocket) :\nThread()\
    \ {\n    private val mmInStream: InputStream?\n    private val mmOutStream: OutputStream?\n\
    \    init {\n        mmInStream = mmSocket.inputStream\n        mmOutStream =\
    \ mmSocket.outputStream\n        changeState(Companion.State.CONNECTED)\n    }\n\
    \    override fun run() {\n        val buffer = ByteArray(1024)\n        var bytex:\
    \ Int\n        // 保持监听 InputStream\n        // 处于连接状态时\n        while (mState\
    \ ==\n        Companion.State.CONNECTED) {\n            try {\n              \
    \  // 从 InputStream 读取\n                bytex = mmInStream!!.read(buffer)\n  \
    \          } catch (e: IOException) {\n                connectionLost()\n    \
    \            break\n            }\n        }\n    }\n    /**\n    * 写入已连接的输出流。\n\
    \    *\n    * @param buffer 要写入的字节\n    */\n    fun write(buffer: ByteArray) {\n\
    \        mmOutStream!!.write(buffer)\n    }\n    fun cancel() {\n        mmSocket.close()\n\
    \    }\n}\n```\n\n最后，我们提供一个方法，用于在套接字连接状态发生变化时通知相关方。这里它还会输出一条日志语句——在生产代码中，您应删除此语句或以其他方式向用户提供此信息：\n\
    \n```\nprivate fun changeState(newState:State) {\n    Log.e(\"LOG\",\n    \"changing\
    \ state: ${mState} -> ${newState}\")\n    mState = newState\n    stateChangeListeners.forEach\
    \ { it(newState) }\n}\n```\n\n**注意：** 伴随对象中的 UUID 必须与服务器启动日志中看到的 UUID 匹配。\n\n\
    该类的作用如下：\n\n-   一旦其`connect(...)`方法被调用，就会启动连接尝试。\n-   如果连接成功，则会启动另一个线程，用于使用连接对象初始化输入和输出流。注意：此示例中未使用输入流——此处仅为提供信息。\n\
    -   通过其`mState`成员，客户端可以检查连接状态。\n-   如果已连接，则可以调用`write(...)`方法通过连接通道发送数据。\n\n要测试连接，请点击\
    \ UI 上的 \"RFCOMM\" 按钮。服务器应用程序随后应记录：\n\n```\nCommand: 84\nCommand: 104\nCommand:\
    \ 101\nCommand: 32\nCommand: 109\nCommand: 101\nCommand: 115\nCommand: 115\nCommand:\
    \ 97\nCommand: 103\nCommand: 101\n```\n\n这是消息 \"The message\" 的数字表示形式。\n\n## 硬件\n\
    \nAndroid 不仅仅可以在智能手机上呈现图形用户界面。它还与可穿戴设备、与配备相应功能的电视进行通信，以及车载信息娱乐系统有关。此外，智能手机还配备了摄像头、NFC\
    \ 和蓝牙适配器，以及用于位置、运动、方向和指纹的传感器。当然，智能手机也可以打电话。本章介绍 Android 操作系统如何在非智能手机的设备上运行，以及如何与设备硬件进行交互。\n\
    \n### 可穿戴设备编程\n\nGoogle Wear 关乎您佩戴在身上的小型设备。虽然目前这实际上仅限于您可以购买并戴在手腕上的智能手表，但未来的设备可能会是您眼镜、衣物或其他您能想到的任何事物的一部分。此外，谈到\
    \ Google Wear，您通常会想到需要随身携带并通过某种配对机制连接到 Google Wear 设备的智能手机，但现代设备也可以独立运行。这意味着它们不再需要配对的智能手机即可运行，并且可以自行通过\
    \ Wi-Fi、蓝牙或蜂窝适配器连接到互联网、蜂窝网络或局域网。\n\n如果您恰好将配对的智能手机用于 Google Wear 应用，这不再局限于运行 Android\
    \ 的手机，因此您可以同时将 Google Wear 设备与 Android 智能手机和 Apple iOS 手机配对。Wear OS 可与运行 Android\
    \ 4.4 或更高版本以及 iOS 9.3 或更高版本的配对手机配合使用。\n\nGoogle 针对智能手机应用的设计指南，更准确地说，是对简单且富有表现力的用户界面的要求，对于\
    \ Wear 应用来说更为重要。由于空间和输入能力有限，将 UI 元素和前端工作流程减少到最低限度对于 Wear 相关开发至关重要。否则，您将面临应用可用性和接受度显著下降的风险。\n\
    \nGoogle Wear 应用的常见用例包括：\n\n-   设计自定义表盘（日期和时间显示）\n-   添加表盘复杂功能（自定义表盘元素）\n-   显示通知\n\
    -   消息传递\n-   语音交互\n-   Google 助理\n-   播放音乐\n-   拨打电话和接听电话\n-   闹钟\n-   具有简单用户界面的应用\n\
    -   智能手机和平板电脑应用的配套应用\n-   传感器应用\n-   基于位置的服务\n-   支付应用\n\n在接下来的章节中，我们将探讨 Google\
    \ Wear 应用的开发事项。\n\n### 可穿戴设备开发\n\n虽然开发 Wear 应用时，您大多可以使用与智能手机或平板电脑应用开发相同的工具和技术，但您必须注意智能手表有限的空间，以及用户与手表交互方式与其它设备的差异。\n\
    \n尽管如此，开始 Wear 开发的首选工具仍是 Android Studio。在本节中，我们将介绍如何设置 IDE 以开始 Wear 开发，以及如何将设备连接到\
    \ Android Studio。\n\n对于开发 Wear 应用，我们首先需要指出有两种操作模式：\n\n-   **将可穿戴设备与智能手机配对**\n\n\
    \    由于技术限制，无法将虚拟智能手表与虚拟智能手机配对。因此，您必须使用真实的手机来配对虚拟智能手表。\n\n-   **独立模式**\n\n   \
    \ Wear 应用自行运行，无需与智能手机配对。强烈建议现代应用也能在独立模式下执行有意义的功能。\n\n无论哪种情况，创建一个新的 Android Studio\
    \ 项目，在 \"目标 Android 设备\" 中仅勾选 Wear 复选框。在后续屏幕中，选择以下选项之一：\n\n-   **不添加活动**\n\n \
    \   继续而不添加活动。您之后需要手动添加。\n\n-   **空白 Wear 活动**\n\n    添加布局和一个活动类。\n\n-   **表盘**\n\
    \n    不会创建活动。相反，它会构建一个定义表盘所需的服务类。\n\n```\nclass MainActivity : WearableActivity()\
    \ {\n    override\n    fun onCreate(savedInstanceState: Bundle?) {\n        super.onCreate(savedInstanceState)\n\
    \        setContentView(R.layout.activity_main)\n        setAmbientEnabled() //\
    \ 启用始终在线模式\n    }\n}\n```\n\n此选择对应于要选择的开发范式。您将创建以下内容之一：\n\n-   一个类似智能手机的应用，需要明确在手表上启动才能运行。\n\
    -   一个表盘。这或多或少是一个图形设计问题——表盘是手表表面显示日期和时间的视觉外观。\n"
- fmt: "# Face Complications\n\nFace complications are a feature added to a face.\n\
    \nWe will be talking about the different development paths in the following sections.\n\
    \nNext, open `Tools ➤ AVD Manager` and create a new virtual Wear device. You can\
    \ now start your app on a virtual Wear device. Unless you chose \"Add No Activity,\"\
    \ the emulator should already show a starting UI on the face.\n\nTo pair the virtual\
    \ watch with your smartphone, connect the smartphone to your development PC with\
    \ a USB cable, make it a development device (tap seven times the build number\
    \ at the bottom of the system settings), and then install the \"Wear OS by Google\"\
    \ app on the smartphone. On your development PC, set up the communication via:\n\
    \n```\n./adb -d forward tcp:5601 tcp:5601\n```\n\nStart the app, and from the\
    \ menu choose \"Connect to Emulator.\" If you want to develop using a real smartwatch\
    \ and need debugging capabilities, the online resource [`https://developer.android.com/training/wearables/get-started/debugging`](https://developer.android.com/training/wearables/get-started/debugging)\
    \ shows more information about how to set up a smartwatch debugging process.\n\
    \n## Wearables App User Interface\n\nBefore you start creating a user interface\
    \ for your Wear app, consider using one of the built-in mechanisms, namely, a\
    \ notification or a face complication as described in the following sections.\
    \ If however you think it is necessary your Wear app presents its own layout,\
    \ do not just copy a smartphone app layout and use it for Wear. Instead, to build\
    \ a genuine Wear user interface, use the special UI elements provided by the Wear\
    \ support library. To use it, make sure the module's `build.gradle` file contains:\n\
    \n```\ndependencies {\n...\nimplementation \"androidx.wear:wear:1.2.0\"\n// Add\
    \ support for wearable specific inputs\nimplementation \"androidx.wear:wear-input:1.1.0\"\
    \nimplementation \"androidx.wear:wear-input-testing:1.1.0\"\n// Use to implement\
    \ wear ongoing activities\nimplementation \"androidx.wear:wear-ongoing:1.0.0\"\
    \n// Use to implement support for interactions from the\n// Wearables to Phones\n\
    implementation \"androidx.wear:\" +\n\"wear-phone-interactions:1.1.0-alpha03\"\
    \n// Use to implement support for interactions between\n// the Wearables and Phones\n\
    implementation \"androidx.wear:\" +\n\"wear-remote-interactions:1.0.0\"\n}\n```\n\
    \nThese libraries contain various classes helping to build a UI with elements\
    \ especially tailored for Wear development. The page at [`https://developer.android.com/jetpack/androidx/releases/wear`](https://developer.android.com/jetpack/androidx/releases/wear)\
    \ of the online API documentation contains detailed information about how to use\
    \ those classes.\n\n## Wearables Faces\n\nIf you want to create a Wear face showing\
    \ time and date in a certain custom design, start with the project creation wizard\
    \ as described previously, using the \"Watch Face\" option. The wizard service\
    \ class generated provides a pretty elaborate example for a watch face you can\
    \ use as a starting point for your own faces.\n\n## Adding Face Complications\n\
    \nFace complications are placeholders for data snippets in a face. The complication\
    \ data providers are strictly separated from the complication renderers, so in\
    \ your face you do not say you want to show certain complications. Instead, you\
    \ specify places where to show complications, and you also specify possibly complication\
    \ data types, but you let the user decide which complications to show where exactly.\n\
    \nIn this section we talk about how to enhance your face to show complication\
    \ data. For this aim I present a minimally invasive way to update your face implementation,\
    \ so it will be easier for you to realize your own ideas. Having a running face\
    \ as described previously is a requirement for this section.\n\nWe start with\
    \ the entries in `AndroidManifest.xml`. What we need here is the following:\n\n\
    - We need a way to tell Android that we are going to have a configuration activity\
    \ for complication UI elements. This happens by adding:\n\n```\n<meta-data\n \
    \   android:name=\"android.support.wearable.complications.¬\n        COMPLICATION_PROVIDER_SERVICE_EXTRA\"\
    \n    android:value=\".ComplicationConfigActivity\"/>\n```\n\ninside the `service`\
    \ element (remove the line breaks indicated by `¬`). This shows Android that there\
    \ exists a complication administration activity. We map it to the new activity\
    \ we describe next.\n\n- We add the information about a permission inquiry activity\
    \ and a configuration activity as follows:\n\n```\n<meta-data\n    android:name=\"\
    android.support.wearable.complications.¬\n        COMPLICATION_PROVIDER_PERMISSION_CALLBACK\"\
    \n    android:value=\".PermissionActivity\"/>\n```\n\nNext, we add inside the\
    \ face class at any suitable place:\n\n```\nlateinit var compl : MyComplications\n\
    private fun initializeComplications() {\ncompl = MyComplications()\ncompl.init(this@MyWatchFace,\
    \ this)\n}\noverride\nfun onComplicationDataUpdate(\ncomplicationId: Int,\ncomplicationData:\
    \ ComplicationData)\n{\ncompl.onComplicationDataUpdate(\ncomplicationId,complicationData)\n\
    }\nprivate fun drawComplications(\ncanvas: Canvas, drawWhen: Long) {\ncompl.drawComplications(canvas,\
    \ drawWhen)\n}\n// Fires PendingIntent associated with\n// complication (if it\
    \ has one).\nprivate fun onComplicationTap(\ncomplicationId:Int) {\nLog.d(\"LOG\"\
    , \"onComplicationTap()\")\ncompl.onComplicationTap(complicationId)\n}\n```\n\n\
    In the same file, add to `ci.onCreate(...)`:\n\n```\ninitializeComplications()\n\
    ```\n\nand at the end of `onSurfaceChanged(...)`:\n\n```\ncompl.updateComplicationBounds(width,\
    \ height)\n```\n\nInside the `onTapCommand(...)` function, replace the corresponding\
    \ `where` block branch as follows:\n\n```\nWatchFaceService.TAP_TYPE_TAP -> {\n\
    // The user has completed the tap gesture.\n// Toast.makeText(applicationContext,\
    \ R.string.message, Toast.LENGTH_SHORT)\n//        .show()\ncompl.getTappedComplicationId(x,\
    \ y)?.run  {\nonComplicationTap(this)\n}\n}\n```\n\nThis figures out if the user\
    \ tapped one of the shown complications and, if this is the case, forwards the\
    \ event to one of the new functions we defined. Finally, inside `onDraw(...)`\
    \ write:\n\n```\n...\ndrawBackground(canvas)\ndrawComplications(canvas, now)\n\
    drawWatchFace(canvas)\n...\n```\n\nTo handle the complications, create a new class\
    \ `MyComplications` and let it read:\n\n```\nclass MyComplications {\n```\n\n\
    We first in the companion object define a couple of constants and utility methods:\n\
    \n```\ncompanion object {\nfun getComplicationId(\npos: ComplicationConfigActivity.\n\
    ComplicationLocation): Int {\n// Add supported locations here\nreturn when(pos)\
    \ {\nComplicationConfigActivity.\nComplicationLocation.LEFT ->\nLEFT_COMPLICATION_ID\n\
    ComplicationConfigActivity.\nComplicationLocation.RIGHT ->\nRIGHT_COMPLICATION_ID\n\
    else -> -1\n}\n}\nfun getSupportedComplicationTypes(\ncomplicationLocation:\n\
    ComplicationConfigActivity.\nComplicationLocation): IntArray? {\nreturn when(complicationLocation)\
    \ {\nComplicationConfigActivity.\nComplicationLocation.LEFT ->\nCOMPLICATION_SUPPORTED_TYPES[0]\n\
    ComplicationConfigActivity.\nComplicationLocation.RIGHT ->\nCOMPLICATION_SUPPORTED_TYPES[1]\n\
    else -> IntArray(0)\n}\n}\nprivate val LEFT_COMPLICATION_ID = 0\nprivate val RIGHT_COMPLICATION_ID\
    \ = 1\nval COMPLICATION_IDS = intArrayOf(\nLEFT_COMPLICATION_ID, RIGHT_COMPLICATION_ID)\n\
    private val complicationDrawables =\nSparseArray()\nprivate val complicationDat\
    \ =\nSparseArray()\n// Left and right dial supported types.\nprivate val COMPLICATION_SUPPORTED_TYPES\
    \ =\narrayOf(\nintArrayOf(ComplicationData.TYPE_RANGED_VALUE,\nComplicationData.TYPE_ICON,\n\
    ComplicationData.TYPE_SHORT_TEXT,\nComplicationData.TYPE_SMALL_IMAGE),\nintArrayOf(ComplicationData.TYPE_RANGED_VALUE,\n\
    ComplicationData.TYPE_ICON,\nComplicationData.TYPE_SHORT_TEXT,\nComplicationData.TYPE_SMALL_IMAGE)\n\
    )\n}\nprivate lateinit var ctx:CanvasWatchFaceService\nprivate lateinit var engine:MyWatchFace.Engine\n\
    ```\n\nInside an `init()` method, we register the complications to draw. Method\
    \ `onComplicationDataUpdate()` is used to handle complication data updates, and\
    \ `updateComplicationBounds()` reacts to complication size changes."
