- fmt: '# Using Jetpack Compose Builders


    Android Jetpack is a very ambitious project inside Android’s technology universe.
    It serves as an umbrella for libraries simplifying a developer’s work and improving
    code quality with respect to best practices and embracing Kotlin as a source for
    writing elegant code.


    The reason we didn’t talk about Jetpack earlier in this book is the mere size
    of the Jetpack library collection – Jetpack could very well be the subject of
    another book. Besides, Jetpack’s approach for a front-end design somewhat contradicts
    the basic idea for screen transitions being described by switching from one activity
    to another. Well, to be honest the pre-Jetpack methodology already contained something
    similar called `fragments`, which simplified the redrawing of screen parts inside
    one activity. Jetpack’s UI technology, called `Jetpack Compose`, just follows
    this trail to a genuine single-activity approach. In addition, Jetpack heavily
    concentrates on functions instead of classes, somewhat leaving the realm of object-oriented
    design. This has advantages and disadvantages – with Jetpack it is possible to
    more readily obtain a working front end, but the code is not that easy to understand,
    because functions are not that easily recognizable as belonging to a class describing
    a unique concern.


    Nevertheless, in this section we investigate a `Jetpack Compose`–based front-end
    design example, without describing all functionalities Jetpack has to offer. You
    are asked to study the online documentation at [https://developer.android.com/jetpack/](https://developer.android.com/jetpack/),
    to learn more about the other libraries included within Jetpack.


    We start with the two build files necessary to declare the dependencies:


    ```

    // ---------- Project build.gradle ----------

    buildscript {

    ext.kotlin_version = ''1.6.21''

    repositories {

    google()

    mavenCentral()

    }

    dependencies {

    classpath ''com.android.tools.build:gradle:7.2.1''

    classpath "org.jetbrains.kotlin:" +

    "kotlin-gradle-plugin:$kotlin_version"

    }

    }

    allprojects {

    repositories {

    google()

    mavenCentral()

    }

    }

    // ---------- Module build.gradle ----------

    plugins {

    id ''com.android.application''

    id ''kotlin-android''

    id ''kotlin-kapt''

    }

    android {

    compileSdkVersion 32

    defaultConfig {

    applicationId "com.example.myapp"

    minSdkVersion 23

    targetSdkVersion 32

    versionCode 1

    versionName "1.0"

    testInstrumentationRunner ""+

    ''androidx.test.runner.AndroidJUnitRunner''

    }

    buildFeatures {

    // Enables Jetpack Compose for this module

    compose true

    }

    compileOptions {

    sourceCompatibility JavaVersion.VERSION_1_8

    targetCompatibility JavaVersion.VERSION_1_8

    }

    kotlinOptions {

    jvmTarget = "1.8"

    }

    composeOptions {

    //kotlinCompilerExtensionVersion ''1.1.1''

    kotlinCompilerExtensionVersion ''1.2.0-beta03''

    }

    buildTypes {

    release {

    minifyEnabled false

    proguardFiles getDefaultProguardFile(

    ''proguard-android.txt''), ''proguard-rules.pro''

    }

    }

    }

    dependencies {

    implementation "org.jetbrains.kotlin:" +

    "kotlin-stdlib-jdk7:$kotlin_version"

    implementation ''androidx.appcompat:appcompat:1.4.2''

    implementation ''androidx.activity:activity-ktx:1.4.0''

    implementation ''androidx.fragment:fragment-ktx:1.4.1''

    implementation ''com.google.android.material:'' +

    ''material:1.6.1''

    implementation ''androidx.constraintlayout:'' +

    ''constraintlayout:2.1.4''

    implementation ''com.jakewharton.timber:timber:5.0.1''

    implementation "androidx.datastore:" +

    "datastore-preferences:1.0.0"

    implementation "androidx.preference:" +

    "preference-ktx:1.2.0"

    testImplementation ''junit:junit:4.13.2''

    androidTestImplementation ''androidx.test.ext:'' +

    ''junit:1.1.3''

    androidTestImplementation ''androidx.test.espresso:'' +

    ''espresso-core:3.4.0''

    def lifecycle_version = "2.4.1"

    implementation "androidx.lifecycle:" +

    "lifecycle-viewmodel-ktx:$lifecycle_version"

    implementation "androidx.lifecycle:" +

    "lifecycle-viewmodel-compose:$lifecycle_version"

    implementation "androidx.lifecycle:" +

    "lifecycle-livedata-ktx:$lifecycle_version"

    implementation "androidx.lifecycle:" +

    "lifecycle-runtime-ktx:$lifecycle_version"

    implementation "androidx.lifecycle:" +

    "lifecycle-viewmodel-savedstate:$lifecycle_version"

    implementation "androidx.lifecycle:" +

    "lifecycle-common-java8:$lifecycle_version"

    implementation ''androidx.compose.ui:ui:1.1.1''

    implementation ''androidx.compose.foundation:'' +

    ''foundation:1.1.1''

    implementation ''androidx.activity:'' +

    ''activity-compose:1.4.0''

    implementation ''androidx.compose.material:'' +

    ''material:1.1.1''

    implementation ''androidx.compose.material:'' +

    ''material-icons-core:1.1.1''

    implementation ''androidx.compose.material:'' +

    ''material-icons-extended:1.1.1''

    implementation ''androidx.compose.animation:'' +

    ''animation:1.1.1''

    implementation ''androidx.compose.ui:ui-tooling:1.1.1''

    implementation ''androidx.lifecycle:'' +

    ''lifecycle-viewmodel-compose:2.4.1''

    implementation ''androidx.compose.runtime:'' +

    ''runtime-livedata:1.1.1''

    implementation ''androidx.compose.runtime:'' +

    ''runtime-rxjava2:1.1.1''

    implementation "androidx.navigation:" +

    "navigation-compose:2.4.0"

    androidTestImplementation ''androidx.compose.ui:'' +

    ''ui-test-junit4:1.1.1''

    implementation "androidx.constraintlayout:" +

    "constraintlayout-compose:1.0.0"

    }

    ```


    We start with the main activity, which serves as a container for UI units, in
    Jetpack Compose called `composables`. A navigation controller, also provided by
    Jetpack Compose, switches between different screens, so a single activity is all
    we need even for a more complex app.'
