    \nUsing the Camera\nAn application showing things to the user always has been\
    \ a\npredominant usage area of computers. First it was text, later pictures,\n\
    and even later movies. Only during the last decades the opposite,\nletting the\
    \ user show things, has more and more gained considerable\nattention. With handhelds\
