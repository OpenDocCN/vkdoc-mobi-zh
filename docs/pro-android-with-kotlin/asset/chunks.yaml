    \ intent 过滤器。\n\n## 使用 ADB 获取位置信息\n\n出于开发和调试的目的，你可以使用 ADB 获取连接到 PC 或笔记本电脑的设备的位置信息：\n\
    \n```bash\n./adb shell dumpsys location\n```\n\n有关 CLI 命令的更多信息，请参见第 19 章。\n\n\
    ## 地图\n\n为你的位置相关应用添加地图，可以极大地提升用户体验。要添加 Google Maps API，最简单的方法是使用 Android Studio\
    \ 提供的向导。请按以下步骤操作：\n\n1.  添加地图活动：右键点击你的模块。然后在菜单中选择 **New** ➤ **Activity** ➤ **Gallery…**，从图库中选择一个\
    \ Google Maps 活动。点击 **Next**，在随后的界面中，根据你的需要输入活动参数。不过，选择一个合适的活动名称通常就足够了——默认设置在大多数情况下都是合理的。\n\
    \n2.  你需要一个 API 密钥才能使用 Google Maps。为此，在文件`/res/values/google_maps_api.xml`中，找到注释里的链接；它看起来像[`https://console.developers.google.com/flows/enableapi?`](https://console.developers.google.com/flows/enableapi?)`...`。在浏览器中打开此链接并按照那里的说明操作。最后，将在线生成的密钥作为该文件中`<string\
    \ name = \"google_maps_key\" ... >`元素的文本输入。\n\n我们现在拥有的是一个准备好的活动类、一个可以包含在应用中的 Fragment\
    \ 布局文件，以及一个允许我们从 Google 服务器获取地图数据的已注册 API 密钥。\n\n要包含`/res/layout/activity_maps.xml`定义的\
    \ Fragment，你在布局中编写：\n\n```xml\n<fragment\n    android:id=\"@+id/map\"\n    android:name=\"\
    com.google.android.gms.maps.SupportMapFragment\"\n    android:layout_width=\"\
    match_parent\"\n    android:layout_height=\"match_parent\" />\n```\n\n并根据需要调整尺寸。\n\
    \n在代码中，我们首先添加一段从服务器获取地图的代码片段。你在`onCreate()`回调中执行此操作，如下所示：\n\n```kotlin\noverride\
    \ fun onCreate(savedInstanceState: Bundle?) {\n    ...\n    val mapFragment =\
    \ supportFragmentManager\n        .findFragmentById(R.id.map)\n        as SupportMapFragment\n\
    \    mapFragment.getMapAsync(this)\n}\n```\n\n其中`R.id.map`指向`/res/layout/activity_maps.xml`中地图的\
    \ ID。\n\n接下来，我们添加一个回调，当地图加载完成并准备好接收命令时，该回调会被调用。为此，我们扩展处理地图的活动，使其同时实现接口`com.google.android.gms.maps.OnMapReadyCallback`：\n\
    \n```kotlin\nclass MainActivity : AppCompatActivity(),\n    OnMapReadyCallback\
    \ { ... }\n```\n\n并添加回调实现，例如：\n\n```kotlin\n/**\n * 当地图可用时，使用此方法保存并操作地图。\n */\n\
    override fun onMapReady(map: GoogleMap) {\n    // 在德克萨斯州奥斯汀添加标记并移动摄像头\n    val\
    \ austin = LatLng(30.284935, -97.735464)\n    map.addMarker(MarkerOptions().position(austin).\n\
    \        title(\"奥斯汀的标记\"))\n    map.moveCamera(CameraUpdateFactory.\n       \
    \ newLatLng(austin))\n}\n```\n\n如果设备上未安装 Google Play 服务，用户会自动收到安装提示。地图对象当然可以作为类对象字段保存，你可以用它做许多有趣的事情，包括添加标记、线条、缩放、移动等等。这些可能性在`com.google.android.gms.maps.GoogleMap`的在线\
    \ API 文档中有所描述。\n\n## 偏好设置\n\n偏好设置允许用户更改应用中某些功能部分的运行方式。与用户应用功能工作流程中提供的输入不同，偏好设置被更改的可能性较小，因此通常通过应用菜单中的单个“偏好设置”选项来访问偏好设置。\n\
    \nAndroid 的偏好设置 API 经历了重大改革。它现在是 Jetpack 的一部分，你可以在以下网址找到其文档：[`https://developer.android.com/guide/topics/ui/settings/`](https://developer.android.com/guide/topics/ui/settings/)、[`https://developer.android.com/jetpack/androidx/releases/preference/`](https://developer.android.com/jetpack/androidx/releases/preference/)\
    \ 和 [`https://developer.android.com/reference/androidx/preference/package-summary`](https://developer.android.com/reference/androidx/preference/package-summary)。\n\
    \n为了能够使用 Jetpack 的偏好设置功能，我们必须正确地将依赖项添加到构建文件中：\n"
