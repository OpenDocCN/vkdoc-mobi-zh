    这将确保应用*也*能在配备触摸屏的智能手机上运行，并且包含 Android TV 所需的 Leanback 用户界面。


    - 仍在清单文件中，你会看到启动 Activity 拥有一个像这样的 Intent 过滤器：


    这里显示的类别很重要；否则，Android TV 将无法正确识别该应用。该 Activity 还需要一个 `android:banner` 属性，该属性指向一个在
    Android TV 用户界面上 prominently 显示的横幅。


    - 在模块的 `build.gradle` 文件中，leanback 支持库被添加到依赖项部分：


    ```

    implementation ''com.android.support:leanback-v17:27.1.1''

    ```


    为了进行开发，你可以使用虚拟设备或真机。虚拟设备通过“工具”菜单中的 AVD 管理器进行安装。对于真机，请在“设置” ➤ “设备” ➤ “关于”中连续点击七次版本号。返回“设置”，进入“偏好设置”并在“开发者选项”中启用调试。


    ## Android TV 硬件特性


    要判断某个应用是否在 Android TV 上运行，你可以像这样使用 `UiModeManager`：


    ```

    val isRunnigOnTv =

    (getSystemService(Context.UI_MODE_SERVICE)

    as UiModeManager).currentModeType ==

    Configuration.UI_MODE_TYPE_TELEVISION

    ```


    此外，可用特性因设备而异。如果你的应用需要某些硬件特性，你可以像这样检查其可用性：


    ```

    getPackageManager().

    hasSystemFeature(PackageManager.FEATURE_*)

    ```


    有关所有可能的特性，请参阅 `PackageManager` 的 API 文档。Android TV 设备上的用户输入通常通过 D-pad 控制器进行。为了构建稳定的应用，你应该对
    D-pad 控制器的可用性变化做出响应：在 `AndroidManifest.xml` 文件中，添加 `android:configChanges = "keyboard|keyboardHidden|navigation"`
    作为 Activity 的属性。然后，应用会通过重写的回调函数 `fun onConfigurationChanged( newConfig : Configuration
    )` 获知配置变更信息。


    ## Android TV 的 UI 开发


    对于 Android TV 开发，建议使用 leanback 主题。为此，将 `AndroidManifest.xml` 文件中 `<application>`
    元素的 `theme` 属性替换为：


    ```

    android:theme="@style/Theme.Leanback"

    ```


    这意味着不使用操作栏，这是合理的，因为 Android TV 不支持操作栏。此外，Activity 不得继承 `AppCompatActivity`，而必须继承
    `android.support.v4.app.FragmentActivity`。


    Android TV 应用的另一个特殊性是，可能会偶尔发生过扫描：根据像素尺寸和宽高比，Android TV 可能会裁剪掉屏幕的某些部分。为了避免布局被破坏，建议为主容器添加
    48 dp × 27 dp 的边距，如下所示：


    此外，建议为 Android TV 开发 1920 × 1080 像素的应用。对于其他硬件像素尺寸，Android 会在必要时自动缩小布局元素。由于用户无法点击可触控的
    UI 元素，而是使用 D-pad 进行导航，因此 Android TV 需要另一种在 UI 元素间切换的方式。这可以通过向 UI 元素添加 `nextFocusUp`、`nextFocusDown`、`nextFocusLeft`
    和 `nextFocusRight` 属性轻松实现。这些属性的参数是导航目标元素的 ID 说明，例如 `"@+id/xyzElement"`。


    对于电视播放组件，leanback 库提供了一些有用的类和概念：


    -   对于媒体浏览器，让你的 Fragment 继承 `android.support.v17.leanback.app.BrowseSupportFragment`。项目构建向导会创建一个已废弃的
    `BrowseFragment`，但你可以查阅 `BrowseSupportFragment` 的 API 文档来学习新的方法。

    -   在媒体浏览器中呈现的实际媒体项由卡片视图管理。要重写的相应类是 `android.support.v17.leanback.widget.Presenter`。

    -   要显示所选媒体项的详细信息，请继承 `android.support.v17.leanback.app.DetailsSupportFragment`
    类。向导会创建已废弃的 `DetailFragment` 代替，但它们的用法类似，你可以查阅 API 文档了解更多细节。

    -   对于显示视频播放的 UI 元素，请使用 `android.support.v17.leanback.app.PlaybackFragment` 或
    `android.support.v17.leanback.app.VideoFragment` 之一。

    -   使用类 `android.media.session.MediaSession` 来配置一个*“正在播放”*卡片。

    -   类 `android.media.tv.TvInputService` 支持将视频流直接渲染到 UI 元素上。调用 `onTune(...)` 将开始渲染直接视频流。

    -   如果你的应用需要一个包含多个步骤的指南，例如，向用户呈现购买流程，你可以使用类 `android.support.v17.leanback.app.GuidedStepSupportFragment`。

    -   要以非交互方式向首次用户呈现应用，请使用类 `android.support.v17.leanback.app.OnboardingSupportFragment`。


    ## 用于内容搜索的推荐频道


    显示给用户的推荐有两种形式：Android 8.0 之前的推荐行和从 Android 8.0 或 API 级别 26 开始的推荐频道。为了不错过用户，你的应用应该通过
    switch 代码同时服务于两者：


    ```

    if (android.os.Build.VERSION.SDK_INT >=

    Build.VERSION_CODES.O) {

    // 推荐频道 API ...

    } else {

    // 推荐行 API ...

    }

    ```


    对于 Android 8.0 及更高版本，Android TV 主屏幕在频道列表顶部显示一个全局的*“接下来播放”*行，以及一些属于特定应用的频道。除了*“接下来播放”*行之外，一个频道不能属于多个应用。每个应用可以定义一个*默认频道*，该频道会自动显示在频道视图中——对于应用可能定义的所有其他频道，用户必须首先批准，频道才会显示在主屏幕上。


    一个应用需要具有以下权限才能管理频道：


    因此，请将它们添加到 `AndroidManifest.xml` 文件中。


    此外，在你的模块的 `build.gradle` 文件中，将其添加到 `dependencies` 部分（一行）：


    ```

    implementation

    ''com.android.support:support-tv-provider:27.1.1''

    ```


    要创建频道、添加频道徽标，并可能将其设为默认频道，请编写：


    ```

    val builder = Channel.Builder()

    // 点击应用链接时要执行的 Intent。

    val appLink = Intent(...).toUri(Intent.URI_INTENT_SCHEME)

    // 必须使用类型 `TYPE_PREVIEW`

    builder.setType(TvContractCompat.Channels.TYPE_PREVIEW)

    .setDisplayName("频道名称")

    .setAppLinkIntentUri(Uri.parse(appLink))

    val channel = builder.build()

