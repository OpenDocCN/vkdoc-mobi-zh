    将投影应用于三维对象当然更有意义。作为此类 3D 对象的一般假设，我们期望：


    - 四维齐次坐标中的顶点坐标

    - 分配给顶点的 RGBA 颜色

    - 分配给顶点的面法线


    使用四个坐标值代替通常的三个（`x`, `y`, `z`）有助于透视投影。分配给顶点的颜色可以在着色器代码内部用于应用配色方案，但它们也可以被忽略或用于非着色目的——这完全取决于着色器代码。法线有助于实现逼真的光照。


