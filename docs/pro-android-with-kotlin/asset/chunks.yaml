    \ apps you have installed after you bought a smartphone, have\nintent filters\
    \ you can use to call them from your app. Unfortunately, it\nis not always that\
    \ easy to guess how to call the activities from system\napps, and relevant documentation\
    \ is hard to find. A remedy is to extract\nthis information from their APK files.\
    \ This is done for you for API\nlevel 26, and the result is listed in the online\
    \ text companion in\nsection “The System Intent Filters.”\n\nAs an example, suppose\
    \ you want to send an email. Looking at the system\nintent table in the online\
    \ text companion, you can find a lot of actions\ninside the table for “PrebuiltGmail”.\
    \ Which one to use? Well, first, a\ngeneral-purpose interface should not have\
    \ too many input parameters.\nSecond, we can also look at the action name to find\
    \ something that seems\nappropriate. A promising candidate is the “SEND_TO” action:\
    \ all that it\napparently needs is a “mailto:” data specification. And as it happens\
    \ to\nbe, this is the action we actually need. Using an elaborated\n“mailto:...”\
    \ URL allows to specify more recipients, CC and BCC\nrecipients, a subject, and\
    \ even the mail body. However, you can also\njust use “mailto:master@universe.com”\
    \ and add recipients, the body, and\nso on by using extra fields. See section\
    \ “Intent Extra Data.” So to send\nan email, possibly with letting the user choose\
    \ among several email apps\ninstalled on their device\n  , write"
  trans: "\n# 意图过滤器\n\n`Intent`（意图）是用来告诉 Android 系统需要执行某项操作的对象。它可以是*显式*的，即精确指定需要调用的组件；也可以是*隐式*的，当我们不精确指定被调用的组件，而是让\
    \ Android 决定哪个应用和哪个组件能够响应该请求时，就属于隐式意图。如果存在歧义，并且 Android 无法确定要为隐式`Intent`调用哪个组件，Android\
    \ 会询问用户。\n\n为了使隐式`Intent`能够工作，可能的意图接收者需要声明它能接收哪些`Intent`。例如，某个 Activity 可能能够显示文本文件的内容，而调用者说“我需要一个能显示文本文件的\
    \ Activity”，就可能连接到这个 Activity。现在，意图接收者声明其能够响应意图请求的方式是：在其应用的 `AndroidManifest.xml`\
    \ 文件中指定一个或多个*意图过滤器*。这种声明的语法如下：\n\n```\n<intent-filter android:icon=\"drawable\
    \ resource\"\nandroid:label=\"string resource\"\nandroid:priority=\"integer\"\
    \ >\n...\n```\n\n其中，`icon` 指向一个用于图标的可绘制资源 ID，`label` 指向一个用于标签的字符串资源 ID。如果未指定，将使用父元素的图标或标签。`priority`\
    \ 属性是一个介于 -999 到 999 之间的数字，对于`Intent`，它指定了处理此类意图请求的能力；对于接收者，它指定了多个接收者的执行顺序。优先级高的在前，优先级低的在后。\n\
    \n> **注意**  \n> `priority` 属性应谨慎使用——一个组件无法知道其他应用中的组件可能具有的优先级。因此，你会在应用之间引入某种类型的依赖关系，这并非设计本意。\n\
    \n此 `<intent-filter>` 元素可以作为以下元素的孩子：\n\n*   `<activity>` 和 `<activity-alias>`\n\
    *   `<service>`\n*   `<receiver>`\n\n所以，`Intent` 可用于启动 Activity 和服务，以及发送广播消息。\n\
    \n该元素必须或可以拥有以下子元素：\n\n*   `<action>` 是必需的。\n*   `<category>`\n*   `<data>`\n\n\
    > **注意**  \n> 另请参阅 [`https://developer.android.com/reference/android/content/Intent`](https://developer.android.com/reference/android/content/Intent)\
    \ 上的在线文档。\n\n## Intent 动作\n\n过滤器的 `<action>` 子元素（或多个子元素，你可以有多个）指定要执行的动作。语法如下：\n\
    \n```\n<action android:name=\"string\" />\n```\n\n这将是表达诸如“查看”、“选取”、“编辑”、“拨号”等动作的内容。通用动作的完整列表由\
    \ `android.content.Intent` 类中名称带有 `ACTION_*` 的常量指定，并在在线文本伴侣的“Intent 组成要素”一节中展示。除了这些通用动作，你也可以定义自己的动作。\n\
    \n> **注意**  \n> 使用任何标准动作并不一定意味着你的设备上存在能够响应相应 `Intent` 的应用程序。\n\n## Intent 类别\n\
    \n过滤器的 `<category>` 子元素指定了过滤器的类别。语法如下：\n\n```\n<category android:name=\"string\"\
    \ />\n```\n\n此属性可用于指定 `Intent` 应寻址的组件类型。你可以指定多个类别，但类别并非用于所有 `Intent`，你也可以省略它。仅当*所有*必需的类别都存在时，过滤器才会匹配该\
    \ `Intent`。\n\n在调用者一侧使用 `Intent` 时，你可以通过编写如下代码来添加类别：\n\n```\nval intent:Intent\
    \ = Intent(...)\nintent.addCategory(\"android.intent.category.ALTERNATIVE\")\n\
    ```\n\n标准类别对应于 `android.content.Intent` 类中名称带有 `CATEGORY_*` 的常量。我们在在线文本伴侣的“Intent\
    \ 组成要素”一节中列出了它们。\n\n> **注意**  \n> 对于隐式 `Intent`，你*必须*在过滤器中使用 `DEFAULT` 类别。这是因为\
    \ `startActivity()` 和 `startActivityForResult()` 方法默认使用了此类别。\n\n## Intent 数据\n\
    \n过滤器的 `<data>` 子元素是过滤器的数据类型规范。语法如下：\n\n```\n<data android:scheme=\"string\"\n\
    \      android:host=\"string\"\n      android:port=\"string\"\n      android:path=\"\
    string\"\n      android:pathPrefix=\"string\"\n      android:pathPattern=\"string\"\
    \n      android:mimeType=\"string\" />\n```\n\n你可以指定以下任一项：\n\n*   仅由 `mimeType`\
    \ 元素指定的数据类型，例如 \"text/plain\" 或 \"text/html\"。所以你可以编写 `<data android:mimeType=\"\
    text/html\" />`。\n*   由协议、主机、端口和某种路径规范指定的数据类型：`<scheme>://<host>:<port>[<path>|<pathPrefix>|<pathPattern>]`。这里\
    \ `<path>` 表示完整路径，`<pathPrefix>` 是路径的开头部分，`<pathPattern>` 类似于路径但可以使用通配符：\"X*\"\
    \ 表示 0 次或多次出现字符 \"X\"，\".*\" 表示 0 次或多次出现任何字符。由于转义规则，要表示字面量的 \"*\"，请编写 `\\\\`；要表示字面量的\
    \ \"\\\"，请编写 `\\\\\\\\`。\n\n或者，你也可以同时指定上述两个选项。  \n在调用者一侧，你可以使用 `setType()`、`setData()`\
    \ 和 `setDataAndType()` 来设置任意数据类型组合。\n\n> **注意**  \n> 对于隐式意图过滤器，如果调用者指定了一个 URI\
    \ *数据*部分，例如 `intent.data = <某个 URI>`，那么仅在过滤器声明中指定协议/主机/端口/路径可能是不够的。在这种情况下，你还必须指定\
    \ MIME 类型，例如 `mimeType=\"*/*\"`；否则，过滤器可能无法匹配。这种情况通常发生在*内容提供者*环境中，因为对于指定的 URI，内容提供者的\
    \ `getType()` 方法会被调用，其结果会被设置为 `Intent` 的 MIME 类型。\n\n## Intent 额外数据\n\n任何 `Intent`\
    \ 都可以添加额外的数据，你可以用它来发送除 `<data>` 子元素指定的数据之外的其他数据。  \n虽然你可以使用各种 `putExtra(...)`\
    \ 方法中的任何一种来添加任何类型的额外数据，但也有几个通过 `putExtra(String,Bundle)` 发送的标准额外数据，其键值在在线文本伴侣的“Intent\
    \ 组成要素”一节给出的列表中。\n\n## Intent 标志\n\n你可以通过调用以下方式来设置特殊的意图处理标志：\n\n```\nintent.flags\
    \ = Intent. or Intent. or ...\n```\n\n这些标志大多指定了 Android 操作系统如何处理该 `Intent`。具体来说，形式为\
    \ `FLAG_ACTIVITY_*` 的标志针对由 `Context.startActivity(..)` 调用的 Activity，而像 `FLAG_RECEIVER_*`\
    \ 这样的标志则用于 `Context.sendBroadCast(...)`。在线文本伴侣中“Intent 组成要素”一节的表格显示了详细信息。\n\n\
    ## 系统意图过滤器\n\n系统应用，即你购买智能手机后安装的应用，拥有意图过滤器，你可以从自己的应用中调用它们。不幸的是，猜测如何调用系统应用的 Activity\
    \ 并不总是那么容易，而且相关的文档也很难找到。一个补救措施是从它们的 APK 文件中提取这些信息。对于 API 级别 26，这项工作已经为你完成，结果列在在线文本伴侣的“系统意图过滤器”一节中。\n\
    \n例如，假设你想发送一封电子邮件。查看在线文本伴侣中的系统意图表，你可以在“PrebuiltGmail”的表格中找到许多动作。应该使用哪一个呢？嗯，首先，通用接口不应该有太多的输入参数。其次，我们也可以查看动作名称来找到看似合适的动作。一个很有希望的候选者是\
    \ \"SEND_TO\" 动作：它显然只需要一个 \"mailto:\" 数据规范。碰巧的是，这正是我们实际需要的动作。使用精心构造的 \"mailto:...\"\
    \ URL 可以指定更多的收件人、抄送和密送收件人、主题，甚至邮件正文。但是，你也可以直接使用 \"mailto:master@universe.com\"\
    ，并通过使用额外字段来添加收件人、正文等。请参阅“Intent 额外数据”一节。因此，要发送电子邮件，并可能让用户在设备上安装的多个电子邮件应用中进行选择，可以编写：\n\
    \n```\nval intent = Intent(Intent.ACTION_SENDTO).apply {\n    data = Uri.parse(\"\
    mailto:master@universe.com\")\n    putExtra(Intent.EXTRA_SUBJECT, \"Subject\"\
    )\n    putExtra(Intent.EXTRA_TEXT, \"Body\")\n}\nstartActivity(intent)\n```\n"
- fmt: "```kotlin\nval emailIntent: Intent = Intent(Intent.ACTION_SENDTO,\n    Uri.fromParts(\"\
    mailto\", \"abc@gmail.com\", null))\nemailIntent.putExtra(Intent.EXTRA_SUBJECT,\
    \ \"Subject\")\nemailIntent.putExtra(Intent.EXTRA_TEXT, \"Body\")\nstartActivity(Intent.createChooser(\n\
    \    emailIntent, \"Send email...\"))\n// or startActivity(emailIntent) if you\
    \ want to use\n// the standard chooser (or none, if there is only\n// one possible\
    \ receiver).\n```\n\n**Caution**\n\nIt is at the receiving app’s discretion how\
    \ to exactly handle intent URIs and extra data. A poorly designed emailer might\
    \ not allow to specify email header data at all. To be on the safe side, you may\
    \ want to add all header data both in the “mailto:” URI *and* as extra data.\n\
    \n## Activities Lifecycle\n\nActivities have a lifecycle, and contrary to traditional\
    \ desktop applications, they are intentionally subject to being killed whenever\
    \ the Android OS decides to do so. So you as a developer need to take special\
    \ precautions to make an app stable. More precisely, an activity finds itself\
    \ in one of the following states:\n\n- **Shut down**: The activity is not visible\
    \ and not processing anything. Still the app containing the activity might be\
    \ alive because it has some other components running.\n- **Created**: Either the\
    \ activity is the main activity and was started by the user or some other component,\
    \ or it is an activity regardless of whether “main” or not and was started by\
    \ some other component, from inside the same app or another app if security considerations\
    \ permit it. Also, an activity creation happens when you, for example, flip the\
    \ screen and the app needs to be built up with different screen characteristics.\
    \ During the creation process, the callback method `onCreate()` gets called. You\
    \ must implement this method, since there the GUI needs to be built up. You can\
    \ also use this callback method to start or connect to services or provide content\
    \ provider data. And you can use the APIs to *prepare* playing music, operating\
    \ the camera, or doing anything else the app is made for. This is also a good\
    \ place to initially set up a database or other data storage your app needs.\n\
    - **Started**: Once done with creation, and also in case of a restart after a\
    \ stop – see in the following – the activity goes into the *started* state. Here\
    \ the activity is about to become visible to the user. During the start process,\
    \ the callback method `onStart()` gets called. This is a good place to start broadcast\
    \ receivers, start services, and rebuild internal state and processes you quitted\
    \ while the activity went to the stopped state – see in the following.\n- **Resumed**:\
    \ Shortly before actually becoming visible to the user, the activity goes through\
    \ the resuming process. During that process the callback `onResume()` gets called.\n\
    - **Running**: The activity is fully visible, and the user can interact with it.\
    \ This state immediately follows after the resuming process.\n- **Paused**: The\
    \ activity loses focus, but is still at least partly visible. Losing the focus,\
    \ for example, happens when the user taps the Back or Recents button. The activity\
    \ may continue to send updates to the UI or continue to produce sound, but in\
    \ the majority of cases, the activity will proceed to the stopped state – see\
    \ in the following. During the pausing the `onPause()` callback gets called. The\
    \ paused state is followed by the stopped state or the resumed state.\n- **Stopped**:\
    \ The activity is going to be invisible to the user. It later might be restarted\
    \ or destroyed and expunged from the active process list. During stopping, the\
    \ `onStop()` callback gets called. After a stopping either a destruction or a\
    \ starting happens. Here you can, for example, stop services you started in `onStart()`.\n\
    - **Destroyed**: The activity is removed. The callback `onDestroy()` gets called,\
    \ and you should implement it and do everything there to release resources and\
    \ do other cleanup actions.\n\nThe possible transitions between an activity’s\
    \ states get listed in Table [3-1](#463716_2_En_3_Chapter.xhtml#Tab1) and illustrated\
    \ in Figure [3-1](#463716_2_En_3_Chapter.xhtml#Fig1).\n\n![](images/463716_2_En_3_Chapter/463716_2_En_3_Fig1_HTML.png)\n\
    \nA flowchart of activity state transitions with elements like activity startup,\
    \ activity exists, activity visible, activity partly visible ad activity gone.\n\
    \n**Figure 3-1** Activity State Transitions\n\n**Table 3-1** Activity State Transitions\n\
    \n| From | To | Description | Implement |\n|------|----|-------------|-----------|\n\
    | Shut down | Created | An activity gets called the first time or after a destruction.\
    \ | `onCreate()`: Call `super.onCreate()`, prepare the UI, and start services.\
    \ |\n| Created | Started | An activity starts after creation. | `onStart()`: You\
    \ can start services here that are needed only while the activity is visible.\
    \ |\n| `Started` | `Resumed` | `The resumed state automatically follows a started\
    \ state.` | `onResume()` |\n| Resumed | Running | The running state automatically\
    \ follows a resumed state. | The activity’s functioning including UI activity\
    \ happens here. |\n| `Running` | `Paused` | `The activity loses focus, because\
    \ the user tapped the Back or Recents button.` | `onPause()` |\n| `Paused` | `Resumed`\
    \ | `The activity was not stopped yet, and the user navigates back to the activity.`\
    \ | `onResume()` |\n| Paused | Stopped | The activity is going to be invisible\
    \ to the user, for example, because another activity gets started. | `onStop()`:\
    \ You can stop services here that are needed only while the activity is visible.\
    \ |\n| Stopped | Started | A stopped activity gets started again. | `onStart()`:\
    \ You can start services here that are needed only while the activity is visible.\
    \ |\n| Stopped | Destroyed | A stopped activity gets removed. | `onDestroy()`:\
    \ Release all resources, do a cleanup, and stop services that were started in\
    \ `onCreate()`. |\n\n## Preserving State in Activities\n\nWe almost overly stressed\
    \ the need for you to take precautions your app restarts in a well-behaving manner\
    \ when it forcibly got stopped by the Android OS. Here we give you an advice how\
    \ that can be done.\n\nLooking at the lifecycle of an activity – see section “Activities\
    \ Lifecycle” – we can see that an activity about to be killed by the Android OS\
    \ calls the method `onStop()`. But there are two more callbacks we haven’t talked\
    \ about yet. They have the names `onSaveInstanceState()` and `onRestoreInstanceState()`,\
    \ and they get called whenever Android decides that an activity’s data needs to\
    \ be saved or restored. This is not the same as `onStart()` and `onStop()`, because\
    \ it is sometimes not necessary to preserve the state. For example, if an activity\
    \ will not be destroyed but just suspended, the state is going to be kept anyways,\
    \ and `onSaveInstanceState()` and `onRestoreInstanceState()` will not be invoked.\n\
    \nAndroid already helps us here: the default implementations of `onSaveInstanceState()`\
    \ and `onRestoreInstanceState()` already save and restore UI elements that have\
    \ an ID. So if that is all what you need, you don’t have to do anything. Of course\
    \ your activity might be more complex and maybe contains other fields you need\
    \ to preserve. In this case you can override both `onSaveInstanceState()` and\
    \ `onRestoreInstanceState()`. Just make sure you call the superclass’s methods.\
    \ Otherwise, you must be taking care of all UI elements yourself:"
