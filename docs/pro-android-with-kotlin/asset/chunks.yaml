    # Android 操作系统


    Android 基于一个专门定制的 Linux 内核。该内核提供了所有底层驱动程序，用于处理硬件、程序执行环境以及底层通信通道。


    在内核之上，你会发现 *Android 运行时 (ART)* 和一些用 C 编写的底层库。后者充当了应用相关库与内核之间的桥梁。Android 运行时是 Android
    程序运行的执行引擎。


    作为开发者，你几乎不需要了解这些底层库和 Android 运行时如何工作的细节，但你将使用它们来完成基本编程任务，例如处理音频子系统或数据库。


    在底层库和 Android 运行时之上的是*应用框架*，它定义了您为 Android 构建的任何应用的外部结构。它处理活动、GUI 小部件、通知、资源等。虽然了解底层库肯定有助于编写优秀的程序，但了解应用框架对于编写任何
    Android 应用都是必不可少的。


    在最顶层，你会发现用户为完成任务而启动的应用。请参见图 1-1。


    ![](img/463716_2_En_1_Fig1_HTML.png)


    Android 应用系统包含应用、应用网络和库。


    图 1-1


    Android 操作系统


    作为开发者，您将使用 Kotlin、Java 或 C++ 作为编程语言（或它们的组合）来创建 Android 应用。并且您将使用应用框架和库来与 Android
    操作系统和硬件进行通信。在较低层面上使用 C++ 作为编程语言，处理目标架构的特殊性，会导致引入*原生开发工具包 (NDK)*，它是 Android SDK
    的一个可选部分。虽然出于特殊目的可能需要使用 NDK，但在大多数情况下，为处理另一种语言及其带来的特殊挑战而付出的额外努力并不划算。因此，在本书中，我们主要会在适当的地方讨论
    Kotlin 和 Java。


    # 开发系统


    在手持设备上运行的操作系统只是故事的一部分——作为开发者，您还需要一个用于创建 Android 应用的系统。后者发生在个人电脑或笔记本电脑上，您使用的软件套件是
    *Android Studio*。


    Android Studio 本身是您用于开发的 IDE，但当您安装和操作它时，SDK 也会随之安装，我们将在以下章节中讨论两者。我们还将讨论虚拟设备，它为在各种目标设备上测试您的应用提供了宝贵的帮助。


    ## Android Studio


    Android Studio IDE 是用于创建和运行 Android 应用的专用开发环境。其主窗口以及模拟器视图如图 1-2 所示。


    Android Studio 提供以下功能：


    ![](img/463716_2_En_1_Fig2_HTML.jpg)


    Android Studio 的截图。


    图 1-2


    Android Studio


    *   管理 Kotlin、Java 和 C++ (NDK) 的程序源代码

    *   管理程序资源

    *   允许在模拟器或连接的实机中试运行应用

    *   更多测试工具

    *   调试功能

    *   性能和内存分析器

    *   代码检查

    *   用于构建本地或可发布应用的工具


    Studio 中包含的帮助和在线资源提供了足够的信息来掌握 Android Studio——在本书中，我们会不时地并在专门的章节中讨论它。


    ## 虚拟设备


    为计算机开发软件始终包含一个挑战，即创建一个能够处理所有可能目标系统的程序。如今手持设备形式多样，这方面变得比以往任何时候都更加关键。您有尺寸在 3.9 英寸到
    5.4 英寸及以上的智能手机设备，7 英寸到 14 英寸及以上的平板电脑，可穿戴设备，不同尺寸的电视等等，所有这些都运行着 Android 操作系统。


    当然，作为开发者，您不可能购买所有必要的设备来覆盖所有可能的尺寸。这就是模拟器派上用场的地方。有了模拟器，您不必购买硬件，仍然可以开发 Android 应用。


    Android Studio 使您能够轻松使用模拟器来开发和测试应用，并且通过使用 SDK 中的工具（请参见下一节“SDK”），您甚至可以在 Android
    Studio 外部操作模拟器。


    注意


    您*可以*在不拥有任何实机的情况下开发应用。但是，不建议这样做。您应该至少拥有一部最新一代的智能手机，如果经济条件允许，可能还需要一台平板电脑。原因在于，操作实机的感觉与模拟器不同，物理操作并非
    100% 相同，性能也存在差异。


    要从 Android Studio 内部管理虚拟设备，请通过 *工具 ➤ 设备管理器* 打开 Android 虚拟设备 (AVD) 管理器。在这里，您可以查看、修改、创建或删除以及启动虚拟设备。请参见图
    1-3。


    ![](img/463716_2_En_1_Fig3_HTML.jpg)


    AVD 管理器的截图。


    图 1-3


    AVD 管理器


    创建新的虚拟设备时，您将能够在“电视”、“穿戴设备”、“手机”、“汽车”或“平板电脑”设备中进行选择，可以选择要使用的 API 级别（并下载新的 API 级别），并且在设置中可以指定各种内容，如图形性能、摄像头模式等。有关管理
    AVD（Android 虚拟设备）的详细信息，请参阅 [`https://developer.android.com/studio/run/managing-avds`](https://developer.android.com/studio/run/managing-avds)
    上的在线文档。


    用于创建虚拟镜像的虚拟设备基础镜像和皮肤可以在以下位置找到：


    ```

    SDK_INST/system-images

    SDK_INST/skins

    ```


    以及安装了应用和用户数据的实际虚拟设备位于：


    ```

    ~/.android/avd

    ```


    管理正在运行的虚拟设备也可以通过各种命令行工具来完成。请参阅第 19 章的“SDK 工具”和“SDK 平台工具”部分。


    ## SDK


    与 Android Studio 相比，SDK 是一组松散耦合的工具，它们要么是 Android 开发所必需的，因此被 Android Studio 直接使用，要么至少对一些开发任务有帮助。它们都可以从
    shell 中启动，并且可能带有或不带有自己的 GUI。


    如果您不确定在安装 Android Studio 期间 SDK 安装在哪里，您可以轻松询问 Android Studio 本身：转到 *文件 ➤ 项目结构*，然后从菜单中选择“SDK
    位置”。


    属于 SDK 一部分的命令行工具在第 19 章中进行了描述。

    '
- fmt: '# 2. Application


    An Android app consists of components like *activities*, *services*, *broadcast
    receivers*, and *content providers*. See Figure [2-1](#463716_2_En_2_Chapter.xhtml#Fig1).
    Activities are for interacting with device users, services are for program parts
    that run without a dedicated user interface, broadcast receivers listen for standardized
    messages from other apps and components, and content providers allow other apps
    and components to access a certain amount and kind of data provided by a component.


    ![](images/463716_2_En_2_Chapter/463716_2_En_2_Fig1_HTML.png)


    The flow diagram of android OS with an app into APIs and android runtime.


    Figure 2-1


    An App in the Android OS


    Components get started by the *Android Runtime*, or execution engine if you like,
    either by itself or on behalf of other components creating start triggers. Under
    which circumstances a component gets started depends on its type and the meta-information
    given to it. At the other side of their lifecycle, all running components are
    subject to removal from the process execution list either because they have finished
    their work or the Android OS has decided that a component can be removed because
    it is no longer needed or must be removed because of a device resource shortage.


    In order to make your app or component run as stable as possible and give your
    users a good feeling about its reliability, a deeper knowledge of the lifecycle
    of Android components is helpful. We will be looking at system characteristics
    of components and their lifecycles inside this chapter.


    An app or Android component is easy to build – just take one of the tutorials
    you can find on the official Android website, the templates and examples provided
    by Android Studio, or one of the thousand other tutorials you can find elsewhere
    on the Web. A simple app is not necessarily a professional-level stable app though,
    because Android state handling as far as the app is concerned is not the same
    as for a desktop application. The reason for this is that your Android device
    easily might decide to kill your app to save system resources, especially when
    you temporarily suspend the app in question because you use one or more other
    apps for some time.


    Of course Android will most likely never kill apps you are currently working with,
    but you have to take precautions. Any app that was killed by Android can be restarted
    in a defined data and processing state, including most currently entered data
    by the user and possibly interfering in the least possible amount with the user''s
    current workflow.


    From a file perspective, an Android app is a single zip archive file with the
    suffix `.apk`. It contains your complete app, including all meta-information that
    is necessary to run the app on an Android device. The most important control artifact
    inside is the file `AndroidManifest.xml` describing the application and the components
    an application consists of.


    We do not in detail cover this archive file structure here, since in most cases
    Android Studio will be taking care of creating the archive correctly for you,
    so you usually don''t need to know about its intrinsic functioning. But you can
    easily look inside. Just take any `*.apk` file, for example, a sample app you''ve
    already built using Android Studio, from inside


    ```

    AndroidStudioProject/[YOUR-APP]/release/app-release.apk

    ```


    and unzip it – APK files are just normal zip files. Maybe you have to temporarily
    change the suffix to `.zip` so your unzip program can recognize it. Such an unzipped
    APK file, for example, looks as shown in Figure [2-2](#463716_2_En_2_Chapter.xhtml#Fig2).


    ![](images/463716_2_En_2_Chapter/463716_2_En_2_Fig2_HTML.jpg)


    A snippet of an A P K unzipped android file with META-Inf, AnroidMaifest.xml and
    resources.arsc highlighted.


    Figure 2-2


    An APK File Unzipped


    The `.dex` file you can see there contains the compiled classes in *Dalvik Executable*
    format, something that is similar to a JAR file in Java.


    We will be talking about app-related artifacts shortly, but first we will be looking
    at the more conceptual idea of what *tasks* are.


    ## Tasks


    A *task* is a group of activities interacting with each other in such a way that
    the end user considers them as the elements of an application. A user starts an
    app and will see the main activity, does some work there, opens and closes sub-activities,
    maybe switches to another app, comes back, and eventually closes the app.


    Looking a little more thorough at it, the main structure a *task* exhibits is
    its *back stack* or simply *stack*, where activities of an app pile up. The standard
    behavior for simple apps concerning this stack is the first activity when you
    launch an app building the *root* of this stack, the next activity launched from
    inside the app landing on top of it, another sub-activity landing on top of both,
    and so on. Whenever an activity gets closed because you navigate back (that is
    where the name *back stack* comes from), the activity gets removed from the stack.
    And when the root activity gets removed, the stack gets closed as a whole, and
    your app is considered shut down.


    Inside the `<application>` element of the `AndroidManifest.xml`, we see several
    settings altering the standard behavior of the task stack, and we will see more
    in Chapter [3](#463716_2_En_3_Chapter.xhtml) covering activities. This way a tailored
    task stack can become a powerful means to help your end users understand and fluently
    use your app. But have in mind that a complicated stack behavior might be hard
    to understand for users beginning to use your app, so it should be your aim to
    find a good balance between power and easiness.


    Note


    More insight into the functioning of tasks and the back stack can be found at
    [`https://developer.android.com/guide/components/activities/tasks-and-back-stack.xhtml`](https://developer.android.com/guide/components/activities/tasks-and-back-stack.xhtml).'
