  trans: "\n# 探究 Android 设置表\n\n要探究这些表，请查阅 `android.provider.Settings` 的在线 API 文档。它展示并描述了所有可能的设置项。要列出完整的设置，你可以使用与之前用于\
    \ `ContactsContract` 合约类相同的函数：\n\n```\nshowTable(Settings.Global.CONTENT_URI)\n\
    showTable(Settings.System.CONTENT_URI)\nshowTable(Settings.Secure.CONTENT_URI)\n\
    ...\nfun showTable(tbl:Uri) {\nLog.e(\"LOG\", \"##################################\"\
    )\nLog.e(\"LOG\", tbl.toString())\nval cursor = contentResolver.query(\ntbl, null,\
    \ null, null, null)\ncursor.moveToFirst()\nwhile (!cursor.isAfterLast) {\nLog.e(\"\
    LOG\", \"New entry:\")\nfor(name in cursor.columnNames) {\nval v = cursor.getString(\n\
    cursor.getColumnIndex(name))\nLog.e(\"LOG\",\"  > \" + name + \" = \" + v)\n}\n\
    cursor.moveToNext()\n}\n}\n```\n\n你的应用读取设置不需要特殊权限。但是，只有 `Global` 和 `System` 表才支持写入，并且你还需要一个特殊构造来获取权限：\n\
    \n```\nif(!Settings.System.canWrite(this)) {\nval intent = Intent(\nSettings.ACTION_MANAGE_WRITE_SETTINGS)\n\
    intent.data = Uri.parse(\n\"package:\" + getPackageName())\nstartActivity(intent)\n\
    }\n```\n\n通常你通过调用以下代码获取权限：\n\n```\nActivityCompat.requestPermissions(this,\narrayOf(Manifest.permission.WRITE\\\
    _SETTINGS), 42)\n```\n\n然而，对于设置权限，当前 Android 版本会立即拒绝此请求。因此你不能使用该方法，而需要像之前展示的那样调用\
    \ `Intent`。\n\n要访问特定条目，你同样可以使用合约类中的常量和方法：\n\n```\nval uri = Settings.System.getUriFor(\n\
    Settings.System.HAPTIC_FEEDBACK_ENABLED)\nLog.e(\"LOG\", uri.toString())\nval\
    \ feedbackEnabled = Settings.System.getInt(\ncontentResolver,\nSettings.System.HAPTIC_FEEDBACK_ENABLED)\n\
    Log.e(\"LOG\", Integer.toString(feedbackEnabled))\nSettings.System.putInt(contentResolver,\n\
    Settings.System.HAPTIC_FEEDBACK_ENABLED, 0)\n```\n\n## 注意事项\n\n虽然可以为特定设置获取单独的\
    \ URI，但你不应该使用 `ContentResolver.update()`、`ContentResolver.insert()` 或 `ContentResolver.delete()`\
    \ 方法来修改值。请改用合约类提供的方法。\n\n# SyncStateContract\n\n浏览器应用、联系人应用和日历应用使用此合约来帮助将用户数据与外部服务器同步。\n\
    \n# UserDictionary\n\n这指的是一个内容提供者，它允许基于单词字典来管理和使用预测输入。从 API 级别 23 起，用户字典只能由 IME（即输入法编辑器）或拼写检查框架使用。对于现代应用，你不应尝试在其他地方使用它。因此，该合约仅起信息性作用。\n\
    \n# VoicemailContract\n\n此合约允许访问与语音邮件提供商相关的信息。它主要由两个由内部类描述的表组成：\n\n*   **VoicemailContract.Status**\
    \ – 语音邮件源应用使用此合约向系统报告其状态。\n*   **VoicemailContract.Voicemails** – 包含实际的语音邮件。\n\
    \n你可以列出这些表的内容——例如，对于 `Voicemails` 表，编写：\n\n```\nval uri = VoicemailContract.Voicemails.CONTENT_URI.\n\
    buildUpon().\nappendQueryParameter(\nVoicemailContract.PARAM_KEY_SOURCE_PACKAGE,\n\
    packageName)\n.build()\nshowTable(uri)\nfun showTable(tbl:Uri) {\nLog.e(\"LOG\"\
    , \"####################################\")\nLog.e(\"LOG\", tbl.toString())\n\
    val cursor = contentResolver.query(\ntbl, null, null, null, null)\ncursor.moveToFirst()\n\
    while (!cursor.isAfterLast) {\nLog.e(\"LOG\", \"New entry:\")\nfor(name in cursor.columnNames)\
    \ {\nval v = cursor.getString(\ncursor.getColumnIndex(name))\nLog.e(\"LOG\",\"\
    \  > \" + name + \" = \" + v)\n}\ncursor.moveToNext()\n}\n}\n```\n\n添加 `VoicemailContract.PARAM_KEY_SOURCE_PACKAGE`\
    \ URI 参数非常重要；否则，你将遇到安全异常。\n\n# 批量访问内容数据\n\n`android.content.ContentProvider` 类允许你的实现使用：\n\
    \n```\napplyBatch(\noperations: ArrayList):\nArray\n```\n\n默认实现会遍历列表并按顺序执行每个操作，但你也可以重写该方法以使用你自己的逻辑。参数中提供的\
    \ `ContentProviderOperation` 对象描述了要执行的操作——可以是更新、删除或插入之一。为方便起见，该类提供了一个构建器，你可以像以下示例一样使用它：\n\
    \n```\nval oper:ContentProviderOperation =\nContentProviderOperation.newInsert(uri)\n\
    .withValue(\"key1\", \"val1\")\n.withValue(\"key2\", 42)\n.build()\n```\n\n# 保护内容安全\n\
    \n从你在 `AndroidManifest.xml` 中声明一个内容提供者并将其 `exported` 属性设置为 `true` 的那一刻起，其他应用就被允许访问该提供者暴露的完整内容。对于敏感信息，这可能不是你想要的。作为补救措施，为了对全部或部分内容施加限制，你可以向\
    \ `<provider>` 元素或其子元素添加与权限相关的属性。\n\n你基本上有以下几种选项：\n\n## 1. 通过单一标准保护所有内容\n\n为此，请使用\
    \ `<provider>` 的 `permission` 属性，如下所示：\n\n```\n<provider ... android:permission=\"\
    PERMISSION-NAME\" ... />\n```\n\n其中 `PERMISSION-NAME` 是一个系统权限或你在应用的 `<permission>`\
    \ 元素中定义的权限。如果这样做，提供者的完整内容仅对成功获取该特定权限的客户端可访问。更准确地说，任何读取或写入操作都要求客户端拥有此权限。如果你需要区分*读取*权限和*写入*权限，可以改用\
    \ `readPermission` 和 `writePermission` 属性。如果混合使用，更具体的属性优先。这意味着：\n\n*   `permission`\
    \ = A → `writePermission` = A, `readPermission` = A\n*   `permission` = A, `readPermission`\
    \ = B → `writePermission` = A, `readPermission` = B\n*   `permission` = A, `writePermission`\
    \ = B → `writePermission` = B, `readPermission` = A\n*   `permission` = A, `writePermission`\
    \ = B, `readPermission` = C → `writePermission` = B, `readPermission` = C\n\n\
    ## 2. 保护特定的 URI 路径\n\n通过使用 `<provider>` 的 `<path-permission>` 子元素，你可以对特定的 URI\
    \ 路径施加限制：\n\n```\n<provider ...>\n    <path-permission android:path=\"...\" android:permission=\"\
    ...\" />\n</provider>\n```\n\n在 `*permission` 属性中，你指定权限名称和权限范围，正如之前在“通过单一标准保护所有内容”一节中描述的那样。对于路径规范，你只能使用三个可能的属性之一：`path`\
    \ 用于精确路径匹配，`pathPrefix` 用于匹配路径的开头，`pathPattern` 允许使用通配符：`X*` 表示零到多次出现的任意字符 `X`，`.*`\
    \ 表示零到多次出现的任意字符。由于你可以使用多个 `<path-permission>` 元素，你可以在内容提供者中构建非常细粒度的权限结构。\n\n##\
    \ 3. 权限豁免\n\n通过使用 `<provider>` 元素的 `grantUriPermission` 属性，你可以临时授予权限给由拥有该内容提供者的应用通过\
    \ `Intent` 调用的组件。如果你将 `grantUriPermission` 设置为 `true`，并且调用其他组件的 `Intent` 是借助以下方式构建的：\n\
    \n```\nintent.addFlags(\nIntent.FLAG_GRANT_READ_URI_PERMISSION)\n/*or*/\nintent.addFlags(\n\
    Intent.FLAG_GRANT_WRITE_URI_PERMISSION)\n/*or*/\nintent.addFlags(\nIntent.FLAG_GRANT_WRITE_URI_PERMISSION\
    \ and\nIntent.FLAG_GRANT_READ_URI_PERMISSION)\n```\n\n被调用的组件将拥有对提供者所有内容的完全访问权限。你也可以将\
    \ `grantUriPermission` 设置为 `false` 并添加子元素。\n"
- fmt: "# Providing Content for the Search Framework\n\nThe Android *search framework*\
    \ provides a feature to users to search any data that is available to them by\
    \ whatever means and using whatever data source. We will be talking about the\
    \ search framework in Chapter [8](#463716_2_En_8_Chapter.xhtml), section \"Search\
    \ Framework.\" For now it is important to know that for\n\n- Recent query suggestions\n\
    - Custom suggestions\n\ncontent providers play a role. For both of them, you provide\
    \ special content provider subclasses and add them to `AndroidManifest.xml` as\
    \ any other content provider.\n\n# Documents Provider\n\nThe documents provider\
    \ is part of the *Storage Access Framework (SAF)*. It allows for a document-centric\
    \ view of data access, and it also exhibits a hierarchical super-structure of\
    \ document directories.\n\n> **Note**\n> The Storage Access Framework (SAF) was\
    \ included in API level 19. This is as of mid-2022 the case for more than 99%\
    \ of active Android devices.\n\nThe main idea of a documents provider is that\
    \ your app provides access to documents, wherever the corresponding data is stored,\
    \ and otherwise doesn't care about how the documents and the document structure\
    \ get presented to the user or other apps. The documents provider data model consists\
    \ of one to many trees starting at root nodes, with sub-nodes either being documents\
    \ or directories spanning subtrees, again with other directories and documents.\
    \ It thus resembles the structure of data in a file system.\n\nTo start with a\
    \ documents provider, you create a class implementing `android.provider.DocumentsProvider`,\
    \ which itself is a specialized subclass of `android.content.ContentProvider`.\
    \ As a bare minimum, you have to implement the following methods:\n\n## `override\
    \ fun onCreate(): Boolean`\n\nUse this to initialize the documents provider. Since\
    \ this runs on the app's main thread, you must not perform lengthy operations\
    \ here. But you can prepare the data access to the provider. Return `true` if\
    \ the provider was successfully loaded and `false` otherwise.\n\n## `override\
    \ fun queryRoots(projection: Array<out String>?): Cursor`\n\nThis is supposed\
    \ to query the roots of the provider's data structure. In many cases the data\
    \ will fit into one tree, and you thus need to provide just one root, but you\
    \ can have as many roots as making sense for your requirements. The `projection`\
    \ argument may present a list of columns to be included in the result set. The\
    \ names are the same as the `COLUMN_` constants inside `DocumentsContract.Root`.\
    \ It may be `null`, which means return all columns. The method must return cursors\
    \ with at maximum the following fields (shown are the constant names from `DocumentsContract.Root`):\n\
    \n- **`COLUMN_AVAILABLE_BYTES`**: (long) Available bytes under the root. Optional\
    \ and may be `null` to indicate \"unknown.\"\n- **`COLUMN_CAPACITY_BYTES`**: (long)\
    \ The capacity of the tree at that root, in bytes. Think of a file system capacity.\
    \ Optional and may be `null` to indicate \"unknown.\"\n- **`COLUMN_DOCUMENT_ID`**:\
    \ The ID (string) of the directory corresponding to that root. Required.\n- **`COLUMN_FLAGS`**:\
    \ Flags that apply to a root (Int). A combination of (constants in `DocumentsContract.Root`):\n\
    \  - `FLAG_LOCAL_ONLY` (local to the device, no network access)\n  - `FLAG_SUPPORTS_CREATE`\
    \ (at least one document under the root supports creating content)\n  - `FLAG_SUPPORTS_RECENTS`\
    \ (root can be queried to show recently changed documents)\n  - `FLAG_SUPPORTS_SEARCH`\
    \ (the tree allows for searching documents)\n- **`COLUMN_ICON`**: (Int) Icon resource\
    \ ID for a root. Required.\n- **`COLUMN_MIME_TYPES`**: (string) Supported MIME\
    \ types. If more than one, use a newline \"\\n\" as a separator. Optional and\
    \ may be `null` to indicate support for all MIME types.\n- **`COLUMN_ROOT_ID`**:\
    \ (string) A unique ID of the root. Required.\n- **`COLUMN_SUMMARY`**: (string)\
    \ Summary for this root, might be shown to a user. Optional and may be `null`\
    \ to indicate \"unknown.\"\n- **`COLUMN_TITLE`**: (string) Title for the root,\
    \ might be shown to a user. Required.\n\nIf this set of roots changes, you must\
    \ call `ContentResolver.notifyChange` with `DocumentsContract.buildRootsUri` to\
    \ notify the system.\n\n## `override fun queryChildDocuments(parentDocumentId:\
    \ String?, projection: Array<out String>?, sortOrder: String?): Cursor`\n\nReturn\
    \ the immediate child documents and sub-directories contained in the requested\
    \ directory. Apps targeting API level 26 or higher should instead implement `fun\
    \ queryChildDocuments(parentDocumentId: String?, projection: Array<out String>?,\
    \ queryArgs: Bundle?): Cursor` and in this method use:\n\n```kotlin\noverride\
    \ fun queryChildDocuments(\n    parentDocumentId: String?,\n    projection: Array<out\
    \ String>?,\n    sortOrder: String?): Cursor {\n    val bndl = Bundle()\n    bndl.putString(\n\
    \        ContentResolver.QUERY_ARG_SQL_SORT_ORDER,\n        sortOrder)\n    return\
    \ queryChildDocuments(\n        parentDocumentId, projection, bndl)\n}\n```\n\n\
    ## `override fun queryChildDocuments(parentDocumentId: String?, projection: Array<out\
    \ String>?, queryArgs: Bundle?): Cursor`\n\nReturn the immediate child documents\
    \ and sub-directories contained in the requested directory. The bundle argument\
    \ contains query parameters at keys:\n\n- `ContentResolver.QUERY_ARG_SQL_SELECTION`\n\
    - `ContentResolver.QUERY_ARG_SQL_SELECTION_ARGS`\n- `ContentResolver.QUERY_ARG_SQL_SORT_ORDER`\
    \ -or- `ContentResolver.QUERY_ARG_SORT_COLUMNS` (this being a String array)\n\n\
    The `parentDocumentId` is the ID of the directory we want to have listed, and\
    \ inside `projection` you can specify the columns that should be returned – use\
    \ a list of constants `COLUMN_` from `DocumentsContract.Document`. Or write `null`\
    \ to return all columns. The resulting `Cursor` at a maximum returns the following\
    \ fields (keys are constants from `DocumentsContract.Document`):\n\n- **`COLUMN_DISPLAY_NAME`**:\
    \ (string) The display name of a document, used as the primary title displayed\
    \ to a user. Required\n- **`COLUMN_DOCUMENT_ID`**: (string) The unique ID of a\
    \ document. Required\n- **`COLUMN_FLAGS`**: Flags for the document. A combination\
    \ of (constant names from `DocumentsContract.Document`):\n  - `FLAG_SUPPORTS_WRITE`\
    \ (writing supported)\n  - `FLAG_SUPPORTS_DELETE` (deleting supported)\n  - `FLAG_SUPPORTS_THUMBNAIL`\
    \ (representation as thumbnail supported)\n  - `FLAG_DIR_PREFERS_GRID` (for directories,\
    \ if they should be shown as a grid)\n  - `FLAG_DIR_PREFERS_LAST_MODIFIED` (for\
    \ directories, sorting by \"last modified\" preferred)\n  - `FLAG_VIRTUAL_DOCUMENT`\
    \ (a virtual document without MIME type)\n  - `FLAG_SUPPORTS_COPY` (copying supported)\n\
    \  - `FLAG_SUPPORTS_MOVE` (moving – inside the tree – supported)\n  - `FLAG_SUPPORTS_REMOVE`\
    \ (removing from the hierarchical structure (not deleting!) supported)\n- **`COLUMN_ICON`**:\
    \ (Int) A specific icon resource ID for a document. May be `null` to use the system\
    \ default\n- **`COLUMN_LAST_MODIFIED`**: (long) The timestamp when a document\
    \ was last modified, in milliseconds since January 1, 1970, 00:00:00.0 UTC. Required,\
    \ but may be `null` if undefined."
