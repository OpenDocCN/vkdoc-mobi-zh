- fmt: "# Time Parameter\n\n`Time` parameter is the time in milliseconds since last\
    \ boot, including sleep time. If the device is asleep, the event will be discarded,\
    \ and no alarm will be triggered.\n\nThe `AlarmManager` also has a couple of auxiliary\
    \ methods. A listing is provided in Table [8-4](#463716_2_En_8_Chapter.xhtml#Tab4).\n\
    \n**Table 8-4** Auxiliary `AlarmManager` Methods\n\n| Method | Description |\n\
    | --- | --- |\n| `cancel(operation: PendingIntent) : Unit` | Removes any alarms\
    \ with a matching `Intent`. |\n| `cancel(listener: AlarmManager.OnAlarmListener):\
    \ Unit` | Removes any alarm scheduled to be delivered to the given `AlarmManager.OnAlarmListener`.\
    \ |\n| `getNextAlarmClock() : AlarmManager.AlarmClockInfo` | Gets information\
    \ about the next alarm clock currently scheduled. |\n| `setTime(long millis):\
    \ Unit` | Sets the system wall clock time, UTC (milliseconds since January 1,\
    \ 1970, 00:00:00). |\n| `setTimeZone(String timeZone): Unit` | Sets the system’s\
    \ persistent default time zone. |\n\n# Notifications\n\nA notification is a message\
    \ an app can present to the user outside its normal GUI flow. Notifications show\
    \ up at a special region of the screen, most prominently inside the status bar\
    \ and notification drawer on top of a screen, in special dialogs, on the lock\
    \ screen, on a paired Android Wear device, or on an app icon badge. See Figures\
    \ [8-1](#463716_2_En_8_Chapter.xhtml#Fig1) and [8-2](#463716_2_En_8_Chapter.xhtml#Fig2)\
    \ for a smartphone example. There, you can see the notification icon and the notification\
    \ content after the user expands the notification drawer.\n\n![](images/463716_2_En_8_Chapter/463716_2_En_8_Fig2_HTML.jpg)\n\
    \nA screenshot of a notification bar of an android smartphone.\n\n*Figure 8-2*\
    \ Notification Content\n\n![](images/463716_2_En_8_Chapter/463716_2_En_8_Fig1_HTML.jpg)\n\
    \nA screenshot of the notifications has 3 tabs with the information icon pointed\
    \ by an arrow.\n\n*Figure 8-1* Smartphone Notification\n\nNotifications also allow\
    \ for actions, like calling custom activities when tapped, or they can contain\
    \ special action buttons or even edit fields a user can fill out. Likewise, although\
    \ notifications were primarily built to show only short text snippets, with current\
    \ Android versions, it is possible to present larger texts there as well.\n\n\
    The online API documentation suggests using the `NotificationCompat` API from\
    \ the support library. Using this compatibility layer allows older versions to\
    \ present similar or no-op variants on features that were made available only\
    \ later, simplifying the development. Although using this compatibility layer\
    \ removes the burden from the developer to present many branches inside the code\
    \ to take care of different Android API levels, caution must be taken to not make\
    \ an app unusable, which depends too much on latest notification API features.\n\
    \nTo make sure the compatibility API is available for your project inside Android\
    \ Studio, check whether the `build.gradle` of your module contains the following\
    \ inside the \"dependencies\" section:\n\n```\ndependencies {\n    implementation\
    \ \"androidx.core:core:1.6.0\"\n    ...\n}\n```\n\nThe following sections present\
    \ an outline of the notification API – with this API having grown considerably\
    \ during the last years, the user is asked to consult the online documentation\
    \ for a more detailed description of all notification features: [`https://developer.android.com/guide/topics/ui/notifiers/notifications`](https://developer.android.com/guide/topics/ui/notifiers/notifications).\n\
    \n## Creating and Showing Notifications\n\nTo create and show a notification,\
    \ you prepare action `Intent`s for a tap-on and additional action buttons, use\
    \ a notification builder to construct the notification, register a notification\
    \ channel, and finally make the framework show the notification. An example for\
    \ that would be:\n\n```\nval NOTIFICATION_CHANNEL_ID = \"1\"\nval NOTIFICATION_ID\
    \ = 1\n\n// Make sure this Activity exists\nval intent = Intent(this, AlertDetails::class.java)\n\
    intent.flags = Intent.FLAG_ACTIVITY_NEW_TASK\n//or Intent.FLAG_ACTIVITY_CLEAR_TASK\n\
    val tapIntent = PendingIntent.getActivity(this, 0, intent, 0)\n\n// Make sure\
    \ this broadcast receiver exists and can\n// be called by explicit Intent like\
    \ this\nval actionIntent = Intent(this, MyReceiver::class.java)\nactionIntent.action\
    \ = \"com.xyz.MAIN\"\nactionIntent.putExtra(EXTRA_NOTIFICATION_ID, 0)\nval actionPendingIntent\
    \ = PendingIntent.getBroadcast(this, 0, actionIntent, 0)\n\nval builder = NotificationCompat.Builder(this,\
    \ NOTIFICATION_CHANNEL_ID)\n    .setSmallIcon( ... an icon resource id... )\n\
    \    .setContentTitle(\"Title\")\n    .setContentText(\"Content Content Content\
    \ Content ...\")\n    .setPriority(NotificationCompat.PRIORITY_DEFAULT)\n    //\
    \ add the default tap action\n    .setContentIntent(tapIntent)\n    .setAutoCancel(true)\n\
    \    // add a custom action button\n    .addAction( ... an icon resource id ...,\
    \ \"Go\", actionPendingIntent)\nbuildChannel(NOTIFICATION_CHANNEL_ID)\nval notificationManager\
    \ = NotificationManagerCompat.from(this)\nnotificationManager.notify(NOTIFICATION_ID,\
    \ builder.build())\n```\n\nThe function `buildChannel()` is needed for Android\
    \ API levels 26 (Android 8.0) and higher – it reads:\n\n```\nfun buildChannel(channelId:String)\
    \ {\n    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {\n        // Create\
    \ the NotificationChannel, but only\n        // on API 26+ only after that it\
    \ is needed\n        val channel = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O)\
    \ {\n            NotificationChannel(channelId,\n                \"Channel Name\"\
    ,\n                NotificationManager.IMPORTANCE_DEFAULT)\n        } else {\n\
    \            throw RuntimeException(\"Internal error\")\n        }\n        channel.description\
    \ = \"Description\"\n        // Register the channel with the system\n       \
    \ val notificationManager = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M)\
    \ {\n            getSystemService(NotificationManager::class.java)\n        }\
    \ else {\n            throw RuntimeException(\"Internal error\")\n        }\n\
    \        notificationManager.createNotificationChannel(channel)\n    }\n}\n```\n\
    \nAn explanation for the other code follows here:\n\n- The notification itself\
    \ needs a unique ID; we save that inside `NOTIFICATION_ID`.\n- The action button,\
    \ here for sending a broadcast, is for the example only – having no action button\
    \ is allowed.\n- The `setAutoCancel(true)` will lead to automatically dismissing\
    \ the notification once the user taps the notification. This works only if `setContentIntent()`\
    \ is used as well.\n- Creating the notification channel is necessary only for\
    \ API level 26 (Android 8.0) or higher. The superfluous checks inside the outer\
    \ \"if\" are necessary to make Android Studio not complain about compatibility\
    \ issues.\n- For all the strings, you should use resource IDs where feasible;\
    \ otherwise, use texts that better suit your needs.\n\n## Adding Direct Reply\n\
    \nStarting with API level 24 or Android 7.0, the possibility for the user entering\
    \ text as a reply to a notification message has been added. A major use case for\
    \ this is of course a notification message from a messaging system like a chat\
    \ client or email. See Figure [8-3](#463716_2_En_8_Chapter.xhtml#Fig3) for an\
    \ example.\n\n![](images/463716_2_En_8_Chapter/463716_2_En_8_Fig3_HTML.jpg)\n\n\
    A screenshot of a notification bar of an android smartphone. It has a reply notification.\n\
    \n*Figure 8-3* Reply Notification\n\nSince API levels below 24 are not able to\
    \ provide that, your app should not rely on this functionality. Usually this is\
    \ easy to achieve – for API levels 23 and lower, the activity called by tapping\
    \ a notification can of course contain a facility to reply if needed.\n\nA method\
    \ that issues a notification with reply functionality might look as follows:"
