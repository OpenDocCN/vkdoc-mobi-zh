    ...\nclass MainActivity : AppCompatActivity() {\n    private lateinit var requestPermissionLauncher:\
    \ ActivityResultLauncher\n    ....\n    override fun onCreate(savedInstanceState:\
    \ Bundle?) {\n        super.onCreate(savedInstanceState)\n        ...\n      \
    \  requestPermissionLauncher =\n            registerForActivityResult(\n     \
    \           ActivityResultContracts.RequestPermission()\n            ) { isGranted:\
    \ Boolean ->\n                if (isGranted) {\n                    // 权限已授予，继续在应用中进行相关操作。\n\
    \                    ...\n                } else {\n                    // 某项功能需要用户已拒绝的权限，向用户说明该功能不可用。\n\
    \                    ...\n                }\n            }\n    }\n}\n```\n\n\
    **注意**\n\n此注册必须在 Activity 进入 `ACTIVE` 状态*之前*完成。在 `create()` 内部执行此操作自然是个不错的主意。\n\
    \n要实际检查并可能获取权限，你需要在代码中添加如下内容：\n\n```kotlin\nif(checkSelfPermission(Manifest.permission.CAMERA)\
    \ !=\n    PackageManager.PERMISSION_GRANTED) {\n    if(shouldShowRequestPermissionRationale(\n\
    \        Manifest.permission.CAMERA)) {\n        // 向用户说明为什么你的应用需要此权限。\n     \
    \   // 视图中应显示一个链接到\n        //   requestPermissionLauncher.launch(\n        //\
    \        Manifest.permission.CAMERA\n        //   )\n        // 的按钮\n        ...\n\
    \    } else {\n        // 向系统请求权限。\n        requestPermissionLauncher.launch(\n\
    \            Manifest.permission.CAMERA\n        )\n    }\n} else {\n    // 使用需要该权限的\
    \ API。\n    ....\n}\n```\n\n与 `Activity` 类的唯一联系是 `requestPermissionLauncher` 变量，因此很容易将权限相关代码提取到单独的类中。\n\
    \n## 获取特殊权限\n\n在某些情况下，使用 `ActivityCompat.requestPermissions()` 不足以获取像 `SYSTEM_ALERT_WINDOW`\
    \ 或 `WRITE_SETTINGS` 这样的特殊权限。对于这两种权限以及可能的其他权限，你需要采用不同的方法。\n\n权限 `WRITE_SETTINGS`\
    \ 必须使用特殊的 `Intent` 来获取，如下所示：\n\n```kotlin\nval backFromSettingPerm = 6183  //\
    \ 任意合适的常量\nif (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {\n    val activity\
    \ = this\n    if (!Settings.System.canWrite(activity)) {\n        // 这只是一个建议：向用户显示一个关于特殊权限的特殊对话框。\n\
    \        // 重要的是启动 Activity\n        AlertDialog dialog =\n            new AlertDialog.Builder(activity)\n\
    \                .setTitle(...)\n                .setMessage(...)\n          \
    \      .setPositiveButton(\"确定\", { dialog, id ->\n                    val intent\
    \ = Intent(\n                        Settings.ACTION_MANAGE_WRITE_SETTINGS)\n\
    \                    intent.data = Uri.parse(\"package:\" +\n                \
    \        getPackageName())\n                    activity.startActivityForResult(intent,\n\
    \                        backFromSettingPerm)\n                }).setNegativeButton(\"\
    取消\",\n                    { dialog, id ->\n                        // ...\n \
    \                   })\n                .create();\n        dialog.show();\n \
    \       systemWillAsk = true;\n    }\n} else {\n    // 像处理其他权限一样处理...\n}\n```\n\
    \n完成该 `Intent` 后，可以使用回调方法 `onActivityResult()` 继续 GUI 流程：\n\n```kotlin\noverride\n\
    protected fun onActivityResult(requestCode:Int,\n                            \
    \   resultCode:Int, data:Intent) {\n    if ((requestCode and 0xFFFF) == backFromSettingPerm)\
    \ {\n        if (resultCode == Activity.RESULT_OK) {\n            // 相应地操作...\n\
    \        }\n    }\n}\n```\n\n对于 `SYSTEM_ALERT_WINDOW` 权限，你可能必须遵循相同的方法，但在创建 `Intent`\
    \ 时需使用 `ACTION_MANAGE_OVERLAY_PERMISSION` 代替。\n\n**注意**\n\n对于此特殊的 `SYSTEM_ALERT_WINDOW`\
    \ 权限，如果应用是从 Google Play 商店安装的，Google Play 商店将自动授予该权限。对于本地开发和测试，你必须按描述使用 `Intent`。另请注意，对于\
    \ Android 11，此设置的策略已更新；请参阅 [`developer.android.com/about/versions/11/privacy/permissions`](https://developer.android.com/about/versions/11/privacy/permissions)。\n\
    \n## 功能需求与权限\n\n在第 2 章中，我们看到通过 `AndroidManifest.xml` 中的 `<uses-feature>` 元素，你可以指定应用将使用哪些功能。此信息对于\
    \ Google Play 商店确定应用发布后可在哪些设备上运行很重要。然而，如果你指定了此需求，还有另一个重要方面需要考虑：此类需求会隐含哪些权限，以及根据使用的\
    \ API 级别将如何处理这些权限？\n\n功能常量和 API 级别并非严格相关——例如，`android.hardware.bluetooth` 功能是在\
    \ API 级别 8 中添加的，但相应的蓝牙 API 是在 API 级别 5 中添加的。因此，一些应用在能够使用 `<uses-feature>` 声明来声明需要该\
    \ API 之前，就已经能够使用该 API 了。为了弥补这种差异，Google Play 假设某些与硬件相关的权限默认指示了底层硬件功能是必需的。例如，使用蓝牙的应用必须在\
    \ `<uses-permission>` 元素中请求 `BLUETOOTH` 权限，而对于针对较旧 API 级别的应用，Google Play 假设该权限声明意味着应用需要底层的\
    \ `android.hardware.bluetooth` 功能。表 7-2 列出了此类隐含功能需求的权限。\n\n请注意，`<uses-feature>`\
    \ 声明的优先级高于表 7-2 中权限所隐含的功能。对于这些权限中的任何一个，你可以通过在 `<uses-feature>` 元素中显式声明隐含的功能，并添加\
    \ `android:required=\"false\"` 属性，来禁用基于该隐含功能的过滤。例如，要禁用基于 `CAMERA` 权限的任何过滤，你需要将其添加到清单文件中：\n\
    \n**表 7-2** 隐含功能需求的权限\n\n| 类别 | 权限 | …隐含的功能 |\n| --- | --- | --- |\n| 蓝牙 | `BLUETOOTH`\
    \ | `android.hardware.bluetooth` |\n| | `BLUETOOTH_ADMIN` | `android.hardware.bluetooth`\
    \ |\n| 相机 | `CAMERA` | `android.hardware.camera` 和 `android.hardware.camera.autofocus`\
    \ |\n| 位置 | `ACCESS_MOCK_LOCATION` | `android.hardware.location` |\n| | `ACCESS_LOCATION_EXTRA_COMMANDS`\
    \ | `android.hardware.location` |\n| | `INSTALL_LOCATION_PROVIDER` | `android.hardware.location`\
    \ |\n| | `ACCESS_COARSE_LOCATION` | `android.hardware.location` `android.hardware.location.network`\
    \ (API 级别 < 21) |\n| | `ACCESS_FINE_LOCATION` | `android.hardware.location` `android.hardware.location.gps`\
    \ (API 级别 < 21) |\n| 麦克风 | `RECORD_AUDIO` | `android.hardware.microphone` |\n\
    | 电话 | `CALL_PHONE` | `android.hardware.telephony` |\n| | `CALL_PRIVILEGED` |\
    \ `android.hardware.telephony` |\n| | `MODIFY_PHONE_STATE` | `android.hardware.telephony`\
    \ |\n| | `PROCESS_OUTGOING_CALLS` | `android.hardware.telephony` |\n| | `READ_SMS`\
    \ | `android.hardware.telephony` |\n| | `RECEIVE_SMS` | `android.hardware.telephony`\
    \ |\n| | `RECEIVE_MMS` | `android.hardware.telephony` |\n| | `RECEIVE_WAP_PUSH`\
    \ | `android.hardware.telephony` |\n| | `SEND_SMS` | `android.hardware.telephony`\
    \ |\n| | `WRITE_APN_SETTINGS` | `android.hardware.telephony` |\n| | `WRITE_SMS`\
    \ | `android.hardware.telephony` |\n| Wi-Fi | `ACCESS_WIFI_STATE` | `android.hardware.wifi`\
    \ |\n| | `CHANGE_WIFI_STATE` | `android.hardware.wifi` |\n| | `CHANGE_WIFI_MULTICAST_STATE`\
    \ | `android.hardware.wifi` |\n\n## 使用终端处理权限\n\n要查看设备上已注册的权限，你可以浏览系统设置应用中的应用列表，或者更简单的方式是，使用\
    \ ADB shell 在终端中获取各种与权限相关的信息。\n\n为此，将硬件设备通过 USB 连接到你的笔记本电脑或 PC，打开终端，`cd` 到 SDK\
    \ 安装目录中的 `platform-tools` 文件夹，在以下命令中查找你的设备：\n\n```bash\n./adb devices\n```\n\n\
    然后输入：\n\n```bash\n./adb shell -s\n```\n"
- fmt: "# 排版后内容\n\n如果只有一个设备，可以省略`-s`开关。\n\n进入shell后，可以使用几个命令获取权限信息。首先，可以通过以下命令列出所有已安装的包：\n\
    \n```\ncmd package list package\n```\n\n要显示*所有*危险权限，或查看某个包的权限状态，或授予/撤销一个或多个权限，可以使用：\n\
    \n```\ncmd package list permissions -d -g\ndumpsys package \npm [grant|revoke]\
    \  ...\n```\n\n注意：当前版本的`dumpsys`会同时显示*请求的*和*已授予的*权限——不要被关于此问题的旧博客文章混淆。\n\n## 8.\
    \ APIs\n\n本章主题是作为应用基石的API。这包括：\n\n*   *数据库*\n*   *调度*\n*   *通知*\n*   *联系人*\n*\
    \   *搜索框架*\n*   *位置和地图*\n*   *偏好设置*\n\n### 数据库\n\nAndroid提供了两种处理数据库的方式：使用Android操作系统自带的*SQLite*库，或者使用*Room*架构组件。推荐使用后者，因为它在数据库和客户端之间添加了一个抽象层，简化了Kotlin对象与数据库存储对象之间的映射。\n\
    \n你可以在在线文档中找到关于SQLite的详尽信息，并在网上找到大量示例——本书将讨论Room，因为抽象层引入的关注点分离有助于编写更好的代码，同时Room还能避免样板代码，从而显著缩短数据库代码。\n\
    \n### 配置Room环境\n\n由于Room是支持架构组件，因此必须在Android Studio构建脚本中进行配置。为此，请打开*模块*的`build.gradle`文件（不是项目级别的那个！），并在顶层（不在任何花括号内）写入：\n\
    \n```\napply plugin: 'kotlin-kapt'\n```\n\n这是Kotlin编译器插件，用于支持注解处理。在“dependencies”部分内，添加：\n\
    \n```\ndef room_version = \"2.4.2\"\nimplementation \"androidx.room:\" +\n\"room-runtime:$room_version\"\
    \nkapt \"androidx.room:\" +\n\"room-compiler:$room_version\"\n```\n\n### Room架构\n\
    \nRoom的设计以易用性为目标——你主要处理三种对象：\n\n*   **数据库**：数据库的持有者。用SQL语言术语来说，它包含多个表。从技术无关的角度看，数据库包含多个实体容器。\n\
    \n*   **实体**：在SQL世界中代表一个表。从技术无关的角度看，这是一个以用法为中心的字段集合。例如，公司内部的*Employee*或包含与人员/合作伙伴通信信息的*Contact*。\n\
    \n*   **DAO或数据访问对象**：包含从数据库检索数据的访问逻辑。因此，它在程序逻辑和数据库模型之间充当接口。通常每个实体类对应一个DAO，但也可能有多个DAO用于各种组合。例如，可以为Employee和Contact两个实体分别创建`EmployeeDao`和`ContactDao`，同时还可以创建一个合并员工及其联系信息的`PersonDao`。\n\
    \n### 数据库\n\n声明数据库的方法如下：\n\n```\nimport androidx.room.*\n@Database(entities =\n\
    arrayOf(Employee::class, Contact::class),\nversion = 1)\nabstract class MyDatabase\
    \ : RoomDatabase() {\nabstract fun employeeDao(): EmployeeDao\nabstract fun contactDao():\
    \ ContactDao\nabstract fun personDao(): PersonDao\n}\n```\n\n在`@Database`注解中，声明所有使用的实体类，并以抽象函数的形式提供DAO类的工厂方法。你无需实现这个抽象数据库类——Room库会根据签名和注解自动为你提供实现！版本号将帮助你升级不同的数据模型版本——后续会对此进行更多讨论。\n\
    \n### 实体\n\n接下来，我们实现实体类，这在Kotlin中极其简单："
  raw: "If there is only one device, you can omit that `-s` switch.\n\nOnce inside\
    \ the shell, you can use a couple of commands to get\npermission information.\
    \ First, you can list all packages installed via\n\n```\ncmd package list package\n\
    ```\n\nTo show *all* Dangerous permissions \nor to see the permission state for\
    \ a certain package or to grant or\nrevoke  one or\nmore permissions, you can\
    \ use\n\n```\ncmd package list permissions -d -g\ndumpsys package \npm [grant|revoke]\
    \  ...\n```\n\nNote\n\nCurrent versions of `dumpsys` will show\nboth requested\
    \ *and* granted permissions – do not get confused by\nold blog entries about that\
    \ matter.\n\n8. APIs\n\nThe subject of this chapter is APIs that are the cornerstones\
    \ of your\napp. This includes\n\n*   *Databases*\n\n*   *Scheduling*\n\n*   *Notifications*\n\
    \n*   *Contacts*\n\n*   *Search framework*\n\n*   *Location and maps*\n\n*   *Preferences*\n\
    \nDatabases\nAndroid    provides two realms for\ndealing with databases: either\
    \ you use the *SQLite* library  included in the\nAndroid OS, or you use the *Room*\
    \ architecture component . The latter is\nrecommended, since it adds an abstraction\
    \ layer between the database and\nthe client, simplifying the mapping between\
    \ Kotlin objects and database\nstorage objects .\nYou can find exhaustive information\
    \ about SQLite in the online docs and\nlots of examples on the Web – in this book\
    \ we talk about Room, since the\nseparation of concerns introduced by the abstraction\
    \ helps you write\nbetter code, and since Room also helps avoid boilerplate code,\
    \ you can\nshorten your database code significantly.\n\nConfiguring Your Environment\
    \ for Room\n\nSince Room  is a\nsupport architecture component, using it must\
    \ be configured inside your\nAndroid Studio build script. To do so, open the *module’s*\
    \ `build.gradle` file\n(not the one from the project!), and on the top level (not\
    \ inside any of\nthe curly braces), write\n\n```\napply plugin: 'kotlin-kapt'\n\
    ```\n\nThis is the Kotlin compiler plugin to support annotation processing.\n\
    Inside the “dependencies” section, add\n\n```\ndef room_version = \"2.4.2\"\n\
    implementation \"androidx.room:\" +\n\"room-runtime:$room_version\"\nkapt \"androidx.room:\"\
    \ +\n\"room-compiler:$room_version\"\n```\n\nRoom Architecture\n\nRoom  is designed\n\
    with easiness in mind – you basically deal with three kinds of objects:\n\n* \
    \  **Database**\n\nA holder for the database . Talking in SQL\n    language idioms,\
    \ it contains several tables. Technology agnostic, a\n    database contains several\
    \ entity containers.\n\n*   **Entity**\n\nRepresents  a\n    table in the SQL\
    \ world. Technology agnostic, this is a usage-centric\n    aggregate of fields.\
    \ An example would be an *Employee* inside a\n    company or a *Contact* holding\
    \ information about how to\n    communicate with people or partners.\n\n*   **DAO\
    \ or Data Access Object**\n\nContains  the\n    access logic to retrieve data\
    \ from the database. It thus serves as an\n    interface between the program logic\
    \ and the database model. You often\n    have one DAO  per\n    entity class,\
    \ but possibly more DAOs for various combinations. You\n    could, for example,\
    \ have an `EmployeeDao` and a\n    `ContactDao` for\n    the two Employee and\
    \ Contact entities, but also a `PersonDao` that\n    combines the employee and\
    \ their contact information.\n\nThe Database\n\nTo declare  a\ndatabase, you write\
    \ as follows:\n\n```\nimport androidx.room.*\n@Database(entities =\narrayOf(Employee::class,\
    \ Contact::class),\nversion = 1)\nabstract class MyDatabase : RoomDatabase() {\n\
    abstract fun employeeDao(): EmployeeDao\nabstract fun contactDao(): ContactDao\n\
    abstract fun personDao(): PersonDao\n}\n```\n\nInside the `@Database` annotation,\n\
    you declare all entity classes used, and as abstract functions you\nprovide factory\
    \ methods for the DAO  classes. You don’t\nhave to implement this abstract database\
    \ class – the Room library will\nautomatically provide an implementation for you\
    \ based on the signatures\nand the annotations! The version number will help you\
    \ upgrade different\ndata model versions – more about that in the following.\n\
    \nEntities\n\nNext, we implement the entity    classes, which is\nextremely easy\
    \ to do in Kotlin :"
  trans: "\n# 排版后内容\n\n如果只有一个设备，可以省略 `-s` 开关。\n\n进入 shell 后，可以使用几个命令获取权限信息。首先，可以通过以下命令列出所有已安装的包：\n\
    \n```\ncmd package list package\n```\n\n要显示 *所有* 危险权限，或查看某个包的权限状态，或授予/撤销一个或多个权限，可以使用：\n\
    \n```\ncmd package list permissions -d -g\ndumpsys package \npm [grant|revoke]\
    \  ...\n```\n\n注意：当前版本的 `dumpsys` 会同时显示 *请求的* 和 *已授予的* 权限——不要被关于此问题的旧博客文章混淆。\n\
    \n## 8. APIs\n\n本章主题是作为应用基石的 API。这包括：\n\n*   *数据库*\n*   *调度*\n*   *通知*\n*   *联系人*\n\
    *   *搜索框架*\n*   *位置和地图*\n*   *偏好设置*\n\n### 数据库\n\nAndroid 提供了两种处理数据库的方式：使用 Android\
    \ 操作系统自带的 *SQLite* 库，或者使用 *Room* 架构组件。推荐使用后者，因为它在数据库和客户端之间添加了一个抽象层，简化了 Kotlin\
    \ 对象与数据库存储对象之间的映射。\n\n你可以在在线文档中找到关于 SQLite 的详尽信息，并在网上找到大量示例——本书将讨论 Room，因为抽象层引入的关注点分离有助于编写更好的代码，同时\
    \ Room 还能避免样板代码，从而显著缩短数据库代码。\n\n### 配置 Room 环境\n\n由于 Room 是支持架构组件，因此必须在 Android\
    \ Studio 构建脚本中进行配置。为此，请打开 *模块* 的 `build.gradle` 文件（不是项目级别的那个！），并在顶层（不在任何花括号内）写入：\n\
    \n```\napply plugin: 'kotlin-kapt'\n```\n\n这是 Kotlin 编译器插件，用于支持注解处理。在 “dependencies”\
    \ 部分内，添加：\n\n```\ndef room_version = \"2.4.2\"\nimplementation \"androidx.room:\"\
    \ +\n\"room-runtime:$room_version\"\nkapt \"androidx.room:\" +\n\"room-compiler:$room_version\"\
    \n```\n\n### Room 架构\n\nRoom 的设计以易用性为目标——你主要处理三种对象：\n\n*   **数据库**：数据库的持有者。用 SQL\
    \ 语言术语来说，它包含多个表。从技术无关的角度看，数据库包含多个实体容器。\n\n*   **实体**：在 SQL 世界中代表一个表。从技术无关的角度看，这是一个以用法为中心的字段集合。例如，公司内部的\
    \ *Employee* 或包含与人员/合作伙伴通信信息的 *Contact*。\n\n*   **DAO 或数据访问对象**：包含从数据库检索数据的访问逻辑。因此，它在程序逻辑和数据库模型之间充当接口。通常每个实体类对应一个\
    \ DAO，但也可能有多个 DAO 用于各种组合。例如，可以为 Employee 和 Contact 两个实体分别创建 `EmployeeDao` 和 `ContactDao`，同时还可以创建一个合并员工及其联系信息的\
    \ `PersonDao`。\n\n### 数据库\n\n声明数据库的方法如下：\n\n```\nimport androidx.room.*\n@Database(entities\
    \ =\narrayOf(Employee::class, Contact::class),\nversion = 1)\nabstract class MyDatabase\
    \ : RoomDatabase() {\nabstract fun employeeDao(): EmployeeDao\nabstract fun contactDao():\
    \ ContactDao\nabstract fun personDao(): PersonDao\n}\n```\n\n在 `@Database` 注解中，声明所有使用的实体类，并以抽象函数的形式提供\
    \ DAO 类的工厂方法。你无需实现这个抽象数据库类——Room 库会根据签名和注解自动为你提供实现！版本号将帮助你升级不同的数据模型版本——后续会对此进行更多讨论。\n\
    \n### 实体\n\n接下来，我们实现实体类，这在 Kotlin 中极其简单：\n"
- fmt: "```kotlin\n@Entity\ndata class Employee(\n@PrimaryKey(autoGenerate = true)\
    \ var uid:Int = 0,\nvar firstName:String,\nvar lastName:String)\n\n@Entity\ndata\
    \ class Contact(\n@PrimaryKey(autoGenerate = true) var uid:Int = 0,\nvar emailAddr:String)\n\
    ```\n\n你可以看到，每个实体都需要一个`Int`类型的主键。`autoGenerate = true`负责自动确保其唯一性。\n\n这些实体类定义的数据库表中的列名与变量名匹配。如果你想更改这一点，可以添加另一个注解`@ColumnInfo`：\n\
    \n```kotlin\n@Entity\ndata class Employee(\n@PrimaryKey(autoGenerate = true) var\
    \ uid:Int = 0,\n@ColumnInfo(name = \"first_name\") var firstName:String,\n@ColumnInfo(name\
    \ = \"last_name\") var lastName:String)\n```\n\n这将导致使用`\"first_name\"`和`\"last_name\"\
    `作为表列名。\n\n同样，表名取自实体类名`\"Employee\"`和`\"Contact\"`。你也可以更改这一点：只需向`@Entity`注解添加一个`tableName`参数，如下所示：\n\
    \n```kotlin\n@Entity(tableName = \"empl\")\ndata class Employee(\n@PrimaryKey(autoGenerate\
    \ = true) var uid:Int = 0,\n@ColumnInfo(name = \"first_name\") var firstName:String,\n\
    @ColumnInfo(name = \"last_name\") var lastName:String)\n```\n\n虽然使用单个整数主键通常是一个好主意，但你也可以使用组合键。为此，`@Entity`中还有一个额外的注解参数可供使用：\n\
    \n```kotlin\n@Entity(tableName = \"empl\",\nprimaryKeys = tableOf(\"first_name\"\
    ,\"last_name\"))\ndata class Employee(\n@ColumnInfo(name = \"first_name\") var\
    \ firstName:String,\n@ColumnInfo(name = \"last_name\") var lastName:String)\n\
    ```\n\n实体也可以拥有不会被持久化的字段。从设计角度来看，这可能不是一个好主意，但如果你需要这样的字段，可以添加它并使用`@Ignore`注解，如下所示：\n\
    \n```kotlin\n@Entity(tableName = \"empl\")\ndata class Employee(\n@PrimaryKey(autoGenerate\
    \ = true) var uid:Int = 0,\nvar firstName:String = \"\",\nvar lastName:String\
    \ = \"\",\n@Ignore var salary:Int)\n```\n\n由于Room实现方式的限制，如果你添加了这样的`@Ignore`注解，则所有字段都必须分配默认值，即使未使用。\n\
    \n## 关系\n\nRoom在设计上不允许实体之间存在直接关系。例如，你不能将一个`Contact`实体列表添加为`Employee`实体的类成员。但是，可以声明外键关系，这有助于维护数据一致性。\n\
    \n> 注意：\n> 另请参阅：`https://developer.android.com/training/data-storage/room/relationships`\n\
    \n为此，请添加一个`foreignKeys`注解属性，如下面的代码片段所示：\n\n```kotlin\n@Entity(\nforeignKeys =\
    \ arrayOf(\nForeignKey(entity = Employee::class,\nparentColumns = arrayOf( \"\
    uid\" ),\nchildColumns = arrayOf( \"employeeId\" ),\nonDelete = ForeignKey.CASCADE,\n\
    onUpdate = ForeignKey.CASCADE,\ndeferred = true)),\nindices = arrayOf(\nIndex(\"\
    employeeId\"))\n)\n@Entity\ndata class Contact(\n@PrimaryKey(autoGenerate = true)\
    \ var uid:Int = 0,\nvar employeeId:Int,\nvar emailAddr:String)\n```\n\n关于该构造的一些说明：\n\
    \n*   在Java中，你会编写`@Entity(foreignKeys = @ForeignKey( ... ))`。Kotlin不允许注解内部嵌套注解。在这种情况下，使用构造函数作为替代，这归结为省略内部注解的`@`。\n\
    *   在Java中，注解属性值数组的写法是`name = { ..., ... }`。这在Kotlin中无法使用，因为花括号不能作为数组初始化器。相反，会使用`arrayOf(...)`库方法。\n\
    *   `childColumns`属性指向*本*实体中的引用键，即此处的`Contact.employeeId`。\n*   `parentColumns`属性指向被引用的外键实体，此处为`Employee.uid`。\n\
    *   `onDelete`属性指定当父项被删除时该如何处理。值`ForeignKey.CASCADE`意味着也自动删除所有子项，即关联的`Contact`实体。所有可能的值如下：\n\
    \    *   **CASCADE**：将所有操作传递到子-父关系树的根。\n    *   **NO_ACTION**：不执行任何操作。这是默认值，如果因更新或删除操作导致关系破坏，则会引发异常。\n\
    \    *   **RESTRICT**：类似于`NO_ACTION`，但会在删除或更新发生时立即进行检查。\n    *   **SET_NULL**：当父项删除或更新发生时，所有子键列都设置为`null`。\n\
    \    *   **SET_DEFAULT**：当父项删除或更新发生时，所有子键列都设置为其默认值。\n*   `onUpdate`属性指定当父项被更新时该如何处理。值`ForeignKey.CASCADE`意味着也自动更新所有子项，即关联的`Contact`实体。可能的值与前述`onDelete`相同。\n\
    *   设置`deferred = true`会将一致性检查推迟到数据库事务提交时执行。例如，如果父项和子项在同一事务中创建，这可能很重要。\n*   外键必须是相应索引的一部分。此处，`Contact.employeeId`获得了索引。更多关于索引的信息，请参见下文。\n\
    \n## 嵌套对象\n\n虽然除了通过外键手动定义之外，无法定义对象间关系，但你可以在对象侧定义层次化对象的嵌套。例如，从`Employee`实体\n\n\
    ```kotlin\n@Entity\ndata class Employee(\n@PrimaryKey(autoGenerate = true) var\
    \ uid:Int = 0,\nvar firstName:String,\nvar lastName:String)\n```\n\n你可以提取出名字和姓氏，改为编写：\n\
    \n```kotlin\ndata class Name(var firstName:String, var lastName:String)\n@Entity\n\
    data class Employee(\n@PrimaryKey(autoGenerate = true) var uid:Int = 0,\n@Embedded\
    \ var name:Name)\n```\n\n注意，这对数据模型的数据库端没有影响。关联的表仍然会有`\"uid\"`、`\"firstName\"`和`\"\
    lastName\"`列。由于此类嵌入对象的数据库标识与其字段名称绑定，当有多个相同嵌入类型的嵌入对象时，你必须使用`prefix`属性来消除名称歧义，如下所示：\n\
    \n```kotlin\ndata class Name(var firstName:String, var lastName:String)\n@Entity\n\
    data class Employee(\n@PrimaryKey(autoGenerate = true) var uid:Int = 0,\n@Embedded\
    \ var name:Name,\n@Embedded(prefix=\"spouse_\") var spouseName:Name)\n```\n\n\
    这将使表拥有`\"uid\"`、`\"firstName\"`、`\"lastName\"`、`\"spouse_firstName\"`和`\"spouse_lastName\"\
    `列。\n\n如果愿意，你可以在可嵌入类内部使用Room注解，例如，使用`@ColumnInfo`注解来指定自定义列名：\n\n```kotlin\ndata\
    \ class Name(\n@ColumnInfo(name = \"first_name\") var firstName:String,\n@ColumnInfo(name\
    \ = \"last_name\") var lastName:String)\n@Entity\ndata class Employee(\n@PrimaryKey(autoGenerate\
    \ = true) var uid:Int = 0,\n@Embedded var name:Name)\n```\n\n## 使用索引\n\n为了提升数据库查询性能，你可以声明一个或多个索引，用于特定字段或字段组合。你不需要为唯一键执行此操作；这是自动完成的。但对于你想要定义的任何其他索引，请编写类似如下的内容：\n\
    \n```kotlin\n@Entity(indices = arrayOf(\nIndex(\"employeeId\"),\nIndex(value =\
    \ arrayOf(\"country\",\"city\"))\n)\n)\ndata class Contact(\n@PrimaryKey(autoGenerate\
    \ = true) var uid:Int = 0,\nvar employeeId:Int,\nvar emailAddr:String,\nvar country:String,\n\
    var city:String)\n```\n\n这将添加一个支持使用外键字段`\"employeeId\"`进行快速查询的索引，以及另一个支持在给定国家和城市条件下进行快速查询的索引。"
  raw: "```\n@Entity\ndata class Employee(\n@PrimaryKey(autoGenerate = true) var uid:Int\
    \ = 0,\nvar firstName:String,\nvar lastName:String)\n@Entity\ndata class Contact(\n\
    @PrimaryKey(autoGenerate = true) var uid:Int = 0,\nvar emailAddr:String)\n```\n\
    \nYou can see that we need a primary key of type `Int` for each entity.\nThe `autoGenerate\
    \ = true` takes care of automatically making it unique.\n\nThe column names from\
    \ the database table defined by these entity classes\nmatch the variable names.\
    \ If you want to change that, you can add\nanother annotation `@ColumnInfo`:\n\
    \n```\n@Entity\ndata class Employee(\n@PrimaryKey(autoGenerate = true) var uid:Int\
    \ = 0,\n@ColumnInfo(name = \"first_name\") var firstName:String,\n@ColumnInfo(name\
    \ = \"last_name\") var lastName:String)\n```\n\nThis would lead to using “first_name”\
    \ and “last_name” as table column\nnames.\n\nAlso, the table name is taken from\
    \ the entity class names “Employee” and\n“Contact” for these examples. You can\
    \ also change that: just add a\nparameter “tableName” to the `@Entity` annotation\
    \ as\nin\n\n```\n@Entity(tableName = \"empl\")\ndata class Employee(\n@PrimaryKey(autoGenerate\
    \ = true) var uid:Int = 0,\n@ColumnInfo(name = \"first_name\") var firstName:String,\n\
    @ColumnInfo(name = \"last_name\") var lastName:String)\n```\n\nWhile it is generally\
    \ a good idea to have a single integer-valued\nprimary key , you\ncan also use\
    \ a combined key. For that aim there is an additional\nannotation parameter in\
    \ `@Entity` you can use:\n\n```\n@Entity(tableName = \"empl\",\nprimaryKeys =\
    \ tableOf(\"first_name\",\"last_name\"))\ndata class Employee(\n@ColumnInfo(name\
    \ = \"first_name\") var firstName:String,\n@ColumnInfo(name = \"last_name\") var\
    \ lastName:String)\n```\n\nEntities  can also\nhave fields that are not going\
    \ to be persisted. From a design\nperspective, this is maybe not a good idea,\
    \ but if you need such a\nfield, you can add it and use the annotation `@Ignore`\
    \ as in\n\n```\n@Entity(tableName = \"empl\")\ndata class Employee(\n@PrimaryKey(autoGenerate\
    \ = true) var uid:Int = 0,\nvar firstName:String = \"\",\nvar lastName:String\
    \ = \"\",\n@Ignore var salary:Int)\n```\n\nAs a restriction imposed by the way\
    \ Room is implemented, in case you\nadd such an “@Ignore” annotation ,\n*all*\
    \ fields must have default values assigned, even if\nunused.\n\nRelationships\n\
    Room by design doesn’t allow direct relationships  between\nentities. You cannot,\
    \ for example, add a list of `Contact` entities as a\nclass member of an `Employee`\
    \ entity.\nHowever, it is possible to declare foreign key relationships, which\n\
    helps in maintaining data consistency.\n\nNote\n\nSee also [`https://developer.android.com/training/data-storage/room/relationships`](https://developer.android.com/training/data-storage/room/relationships)\
    \ .\n\nTo do so, add a `foreignKeys`\nannotation attribute\n as in the following\
    \ code snippet:\n\n```\n@Entity(\nforeignKeys = arrayOf(\nForeignKey(entity =\
    \ Employee::class,\nparentColumns = arrayOf( \"uid\" ),\nchildColumns = arrayOf(\
    \ \"employeeId\" ),\nonDelete = ForeignKey.CASCADE,\nonUpdate = ForeignKey.CASCADE,\n\
    deferred = true)),\nindices = arrayOf(\nIndex(\"employeeId\"))\n)\n@Entity\ndata\
    \ class Contact(\n@PrimaryKey(autoGenerate = true) var uid:Int = 0,\nvar employeeId:Int,\n\
    var emailAddr:String)\n```\n\nHere are a few notes about that construct:\n\n*\
    \   In Java you would write `@Entity(foreignKeys = @ForeignKey( ... )` . Kotlin\
    \  doesn’t allow\n    annotations inside annotations. In this case using the constructor\n\
    \    serves as a substitute, which boils down to omitting the “@” for inner\n\
    \    annotations.\n\n*   In Java \n    annotation attribute value arrays are written\
    \ like `name = { ..., ... }`.\n    This cannot be used in Kotlin, because the\
    \ curly braces do not serve as\n    array initializers. Instead, the `arrayOf(...)`\
    \ library\n    method  gets\n    used.\n\n*   The `childColumns` attribute  points\
    \ to the\n    reference key in *this* entity, that is, `Contact.employeeId` in\n\
    \    this case.\n\n*   The `parentColumns`\n    attribute points to the referred-to\
    \ foreign key entity, in this case the\n    `Employee.uid`.\n\n*   The `onDelete`\n\
    \    attribute tells what to do if the parent gets deleted. A value `ForeignKey.CASCADE`\n\
    \    means to also automatically remove all children, that is, the associated\n\
    \    `Contact` entities . All possible\n    values are as follows:\n\n*   **CASCADE**:\
    \ Transport all actions to the root of\n        the child-parent relation tree.\n\
    \n*   **NO_ACTION**: Don’t do anything. This is the\n        default, and it leads\
    \ to an exception if the relationship breaks due to\n        update or delete\
    \ actions.\n\n*   **RESTRICT**: Similar to `NO_ACTION`, but the\n        check\
    \ will be made immediately when a delete or an update\n        happens.\n\n* \
    \  **SET_NULL**: All child key columns get set to `null` if a parent\n       \
    \ delete or update happens.\n\n*   **SET_DEFAULT**: All child key columns get\
    \ set to\n        their default if a parent delete or update happens.\n\n*   The\
    \ `onUpdate` attribute  tells what to\n    do if the parent gets updated. A value\
    \ `ForeignKey.CASCADE`\n    means to also automatically update all children, that\
    \ is, the associated\n    `Contact`\n    entities. The possible values are the\
    \ same as for `onDelete`\n    earlier.\n\n*   The `deferred = true` setting will\
    \ postpone the consistency check until the\n    database transaction is committed.\
    \ This might, for example, be important\n    if both parent and child get created\
    \ inside the same\n    transaction.\n\n*   Foreign keys must be part of a corresponding\
    \ index. Here the\n    `Contact.employeeId`\n    gets  the index.\n    Find more\
    \ about indexes in the following.\n\nNested Objects\n\nAlthough it is not possible\
    \ to define inter-object relations other than\nmanually by foreign keys\n  , you\
    \ can\non the object side define a nesting of hierarchical objects. For\nexample,\
    \ from the Employee entity\n\n```\n@Entity\ndata class Employee(\n@PrimaryKey(autoGenerate\
    \ = true) var uid:Int = 0,\nvar firstName:String,\nvar lastName:String)\n```\n\
    \nyou can factor out the first and last names and instead write\n\n```\ndata class\
    \ Name(var firstName:String, var lastName:String)\n@Entity\ndata class Employee(\n\
    @PrimaryKey(autoGenerate = true) var uid:Int = 0,\n@Embedded var name:Name)\n\
    ```\n\nNote that this does not have any impact on the database side of the data\n\
    model. The associated table will still have the columns “uid”,\n“firstName”, and\
    \ “lastName”. Since the database identity of such an\nembedded object is tied\
    \ to the names of its fields, in case of several\nembedded objects of the same\
    \ embedded type, you must disambiguate the\nnames by using a `prefix` attribute\
    \ as\nin\n\n```\ndata class Name(var firstName:String, var lastName:String)\n\
    @Entity\ndata class Employee(\n@PrimaryKey(autoGenerate = true) var uid:Int =\
    \ 0,\n@Embedded var name:Name,\n@Embedded(prefix=\"spouse_\") var spouseName:Name)\n\
    ```\n\nwhich makes the table have columns “uid”, “firstName”, “lastName”,\n“spouse_firstName”,\
    \ and “spouse_lastName”.\n\nIf you like, inside the embeddable class, you can\
    \ use Room annotations   , for example, the\n`@ColumnInfo`\nannotation to specify\
    \ custom column names:\n\n```\ndata class Name(\n@ColumnInfo(name = \"first_name\"\
    ) var firstName:String,\n@ColumnInfo(name = \"last_name\") var lastName:String)\n\
    @Entity\ndata class Employee(\n@PrimaryKey(autoGenerate = true) var uid:Int =\
    \ 0,\n@Embedded var name:Name)\n```\n\nUsing Indexes\n\nTo improve database query\
    \ performance, you can declare one or more indexes  to be used on\ncertain fields\
    \ or field combinations. You don’t have to do that for the\nunique key; this is\
    \ done automatically for you. But for any other index\nyou want to define, write\
    \ something like\n\n```\n@Entity(indices = arrayOf(\nIndex(\"employeeId\"),\n\
    Index(value = arrayOf(\"country\",\"city\"))\n)\n)\ndata class Contact(\n@PrimaryKey(autoGenerate\
    \ = true) var uid:Int = 0,\nvar employeeId:Int,\nvar emailAddr:String,\nvar country:String,\n\
    var city:String)\n```\n\nThis adds an index that allows for fast queries using\
    \ the foreign key\nfield “employeeId” and another one for fast queries given both\
    \ country\nand city."
  trans: "```kotlin\n@Entity\ndata class Employee(\n@PrimaryKey(autoGenerate = true)\
    \ var uid:Int = 0,\nvar firstName:String,\nvar lastName:String)\n\n@Entity\ndata\
    \ class Contact(\n@PrimaryKey(autoGenerate = true) var uid:Int = 0,\nvar emailAddr:String)\n\
    ```\n\n你可以看到，每个实体都需要一个`Int`类型的主键。`autoGenerate = true`负责自动确保其唯一性。\n\n这些实体类定义的数据库表中的列名与变量名匹配。如果你想更改这一点，可以添加另一个注解`@ColumnInfo`：\n\
    \n```kotlin\n@Entity\ndata class Employee(\n@PrimaryKey(autoGenerate = true) var\
    \ uid:Int = 0,\n@ColumnInfo(name = \"first_name\") var firstName:String,\n@ColumnInfo(name\
    \ = \"last_name\") var lastName:String)\n```\n\n这将导致使用`\"first_name\"`和`\"last_name\"\
    `作为表列名。\n\n同样，表名取自实体类名`\"Employee\"`和`\"Contact\"`。你也可以更改这一点：只需向`@Entity`注解添加一个`tableName`参数，如下所示：\n\
    \n```kotlin\n@Entity(tableName = \"empl\")\ndata class Employee(\n@PrimaryKey(autoGenerate\
    \ = true) var uid:Int = 0,\n@ColumnInfo(name = \"first_name\") var firstName:String,\n\
    @ColumnInfo(name = \"last_name\") var lastName:String)\n```\n\n虽然使用单个整数主键通常是一个好主意，但你也可以使用组合键。为此，`@Entity`中还有一个额外的注解参数可供使用：\n\
    \n```kotlin\n@Entity(tableName = \"empl\",\nprimaryKeys = tableOf(\"first_name\"\
    ,\"last_name\"))\ndata class Employee(\n@ColumnInfo(name = \"first_name\") var\
    \ firstName:String,\n@ColumnInfo(name = \"last_name\") var lastName:String)\n\
    ```\n\n实体也可以拥有不会被持久化的字段。从设计角度来看，这可能不是一个好主意，但如果你需要这样的字段，可以添加它并使用`@Ignore`注解，如下所示：\n\
    \n```kotlin\n@Entity(tableName = \"empl\")\ndata class Employee(\n@PrimaryKey(autoGenerate\
    \ = true) var uid:Int = 0,\nvar firstName:String = \"\",\nvar lastName:String\
    \ = \"\",\n@Ignore var salary:Int)\n```\n\n由于 Room 实现方式的限制，如果你添加了这样的`@Ignore`注解，则所有字段都必须分配默认值，即使未使用。\n\
    \n## 关系\n\nRoom 在设计上不允许实体之间存在直接关系。例如，你不能将一个`Contact`实体列表添加为`Employee`实体的类成员。但是，可以声明外键关系，这有助于维护数据一致性。\n\
    \n> 注意：\n> 另请参阅：`https://developer.android.com/training/data-storage/room/relationships`\n\
    \n为此，请添加一个`foreignKeys`注解属性，如下面的代码片段所示：\n\n```kotlin\n@Entity(\nforeignKeys =\
    \ arrayOf(\nForeignKey(entity = Employee::class,\nparentColumns = arrayOf( \"\
    uid\" ),\nchildColumns = arrayOf( \"employeeId\" ),\nonDelete = ForeignKey.CASCADE,\n\
    onUpdate = ForeignKey.CASCADE,\ndeferred = true)),\nindices = arrayOf(\nIndex(\"\
    employeeId\"))\n)\n@Entity\ndata class Contact(\n@PrimaryKey(autoGenerate = true)\
    \ var uid:Int = 0,\nvar employeeId:Int,\nvar emailAddr:String)\n```\n\n关于该构造的一些说明：\n\
    \n*   在 Java 中，你会编写`@Entity(foreignKeys = @ForeignKey( ... ))`。Kotlin 不允许注解内部嵌套注解。在这种情况下，使用构造函数作为替代，这归结为省略内部注解的`@`。\n\
    *   在 Java 中，注解属性值数组的写法是`name = { ..., ... }`。这在 Kotlin 中无法使用，因为花括号不能作为数组初始化器。相反，会使用`arrayOf(...)`库方法。\n\
    *   `childColumns`属性指向*本*实体中的引用键，即此处的`Contact.employeeId`。\n*   `parentColumns`属性指向被引用的外键实体，此处为`Employee.uid`。\n\
    *   `onDelete`属性指定当父项被删除时该如何处理。值`ForeignKey.CASCADE`意味着也自动删除所有子项，即关联的`Contact`实体。所有可能的值如下：\n\
    \    *   **CASCADE**：将所有操作传递到子-父关系树的根。\n    *   **NO_ACTION**：不执行任何操作。这是默认值，如果因更新或删除操作导致关系破坏，则会引发异常。\n\
    \    *   **RESTRICT**：类似于`NO_ACTION`，但会在删除或更新发生时立即进行检查。\n    *   **SET_NULL**：当父项删除或更新发生时，所有子键列都设置为`null`。\n\
    \    *   **SET_DEFAULT**：当父项删除或更新发生时，所有子键列都设置为其默认值。\n*   `onUpdate`属性指定当父项被更新时该如何处理。值`ForeignKey.CASCADE`意味着也自动更新所有子项，即关联的`Contact`实体。可能的值与前述`onDelete`相同。\n\
    *   设置`deferred = true`会将一致性检查推迟到数据库事务提交时执行。例如，如果父项和子项在同一事务中创建，这可能很重要。\n*   外键必须是相应索引的一部分。此处，`Contact.employeeId`获得了索引。更多关于索引的信息，请参见下文。\n\
    \n## 嵌套对象\n\n虽然除了通过外键手动定义之外，无法定义对象间关系，但你可以在对象侧定义层次化对象的嵌套。例如，从`Employee`实体\n\n\
    ```kotlin\n@Entity\ndata class Employee(\n@PrimaryKey(autoGenerate = true) var\
    \ uid:Int = 0,\nvar firstName:String,\nvar lastName:String)\n```\n\n你可以提取出名字和姓氏，改为编写：\n\
    \n```kotlin\ndata class Name(var firstName:String, var lastName:String)\n@Entity\n\
    data class Employee(\n@PrimaryKey(autoGenerate = true) var uid:Int = 0,\n@Embedded\
    \ var name:Name)\n```\n\n注意，这对数据模型的数据库端没有影响。关联的表仍然会有`\"uid\"`、`\"firstName\"`和`\"\
    lastName\"`列。由于此类嵌入对象的数据库标识与其字段名称绑定，当有多个相同嵌入类型的嵌入对象时，你必须使用`prefix`属性来消除名称歧义，如下所示：\n\
    \n```kotlin\ndata class Name(var firstName:String, var lastName:String)\n@Entity\n\
    data class Employee(\n@PrimaryKey(autoGenerate = true) var uid:Int = 0,\n@Embedded\
    \ var name:Name,\n@Embedded(prefix=\"spouse_\") var spouseName:Name)\n```\n\n\
    这将使表拥有`\"uid\"`、`\"firstName\"`、`\"lastName\"`、`\"spouse_firstName\"`和`\"spouse_lastName\"\
    `列。\n\n如果愿意，你可以在可嵌入类内部使用 Room 注解，例如，使用`@ColumnInfo`注解来指定自定义列名：\n\n```kotlin\n\
    data class Name(\n@ColumnInfo(name = \"first_name\") var firstName:String,\n@ColumnInfo(name\
    \ = \"last_name\") var lastName:String)\n@Entity\ndata class Employee(\n@PrimaryKey(autoGenerate\
    \ = true) var uid:Int = 0,\n@Embedded var name:Name)\n```\n\n## 使用索引\n\n为了提升数据库查询性能，你可以声明一个或多个索引，用于特定字段或字段组合。你不需要为唯一键执行此操作；这是自动完成的。但对于你想要定义的任何其他索引，请编写类似如下的内容：\n\
    \n```kotlin\n@Entity(indices = arrayOf(\nIndex(\"employeeId\"),\nIndex(value =\
    \ arrayOf(\"country\",\"city\"))\n)\n)\ndata class Contact(\n@PrimaryKey(autoGenerate\
    \ = true) var uid:Int = 0,\nvar employeeId:Int,\nvar emailAddr:String,\nvar country:String,\n\
    var city:String)\n```\n\n这将添加一个支持使用外键字段`\"employeeId\"`进行快速查询的索引，以及另一个支持在给定国家和城市条件下进行快速查询的索引。\n\
    ```"
- fmt: "# Room 数据库访问与查询优化\n\n如果你将`unique = true`作为属性添加到`@Index`注解中，Room 将确保该表不能有两个具有相同索引值的条目。例如，我们为`Employee`添加一个SSN（社会安全号码）字段，并为其定义唯一索引：\n\
    \n```kotlin\n@Entity(indices = arrayOf(\n    Index(value = arrayOf(\"ssn\"), unique\
    \ = true)\n)\n)\ndata class Employee(\n    @PrimaryKey(autoGenerate = true) var\
    \ uid: Int = 0,\n    var ssn: String,\n    @Embedded var name: Name\n)\n```\n\n\
    如果现在尝试向数据库添加两个具有相同SSN的员工，Room 将抛出异常。\n\n## 数据访问：DAO\n\n数据访问对象（Data Access Objects，简称DAOs）提供访问数据库的逻辑。我们已经看到，在数据库声明内部，必须在工厂方法中列出所有DAO，如下所示：\n\
    \n```kotlin\n@Database(entities =\n    arrayOf(Employee::class, Contact::class),\n\
    \    version = 1)\nabstract class MyDatabase : RoomDatabase() {\n    abstract\
    \ fun employeeDao(): EmployeeDao\n    abstract fun contactDao(): ContactDao\n\
    \    abstract fun personDao(): PersonDao\n}\n```\n\n在此示例中，我们声明了三个DAO供Room使用。对于实际实现，我们不需要完整的DAO类。只需声明接口或抽象类即可；Room\
    \ 将为我们完成其余工作。\n\n例如，对于实体`Employee`，其DAO类可能如下所示：\n\n```kotlin\n@Entity\ndata class\
    \ Employee(\n    @PrimaryKey(autoGenerate = true) var uid: Int = 0,\n    @ColumnInfo(name\
    \ = \"first_name\") var firstName: String,\n    @ColumnInfo(name = \"last_name\"\
    ) var lastName: String\n)\n```\n\n```kotlin\n@Dao\ninterface EmployeeDao {\n \
    \   @Query(\"SELECT * FROM employee\")\n    fun getAll(): List<Employee>\n\n \
    \   @Query(\"SELECT * FROM employee\" +\n           \" WHERE uid IN (:uIds)\"\
    )\n    fun loadAllByIds(uIds: IntArray): List<Employee>\n\n    @Query(\"SELECT\
    \ * FROM employee\" +\n           \" WHERE last_name LIKE :name\")\n    fun findByLastName(name:\
    \ String): List<Employee>\n\n    @Query(\"SELECT * FROM employee\" +\n       \
    \    \" WHERE last_name LIKE :lname AND \" +\n           \"       first_name LIKE\
    \ :fname LIMIT 1\")\n    fun findByName(lname: String, fname: String): Employee\n\
    \n    @Query(\"SELECT * FROM employee\" +\n           \" WHERE uid = :uid\")\n\
    \    fun findById(uid: Int): Employee\n\n    @Insert\n    fun insert(vararg employees:\
    \ Employee): LongArray\n\n    @Update\n    fun update(vararg employees: Employee)\n\
    \n    @Delete\n    fun delete(vararg employees: Employee)\n}\n```\n\n可以看到，我们在这里使用了接口，这是因为完整的访问逻辑完全由方法签名和注解定义。此外，对于插入、更新和删除操作，方法签名就是Room所需的一切——它只需查看签名就能向数据库发送正确的命令。对于各种查询方法，我们使用`@Query`注解来提供正确的数据库命令。可以看出，Room\
    \ 足够智能，能够判断我们是想要返回对象列表还是单个对象。我们还可以通过使用`:name`标识符将方法参数传递到伪SQL中。\n\n`@Insert`注解允许添加属性`onConflict\
    \ = \"<strategy>\"`，用于指定当违反唯一键或主键约束时该怎么做。`<strategy>`的可能值由常量给出：\n\n- `OnConflictStrategy.ABORT`：中止事务\n\
    - `OnConflictStrategy.FAIL`：使事务失败\n- `OnConflictStrategy.IGNORE`：忽略冲突\n- `OnConflictStrategy.REPLACE`：直接替换实体并继续事务\n\
    - `OnConflictStrategy.ROLLBACK`：回滚事务\n\n先前使用的示例实体中的其他DAO看起来将非常相似——`PersonDao`可能会执行外连接来组合`Employee`和`Contact`实体：\n\
    \n```kotlin\n@Dao\ninterface ContactDao {\n    @Insert\n    fun insert(vararg\
    \ contacts: Contact)\n\n    @Query(\"SELECT * FROM Contact WHERE uid = :uId\"\
    )\n    fun findById(uId: Int): List<Contact>\n\n    @Query(\"SELECT * FROM Contact\
    \ WHERE\" +\n           \" employeeId = :employeeId\")\n    fun loadByEmployeeId(employeeId:\
    \ Int): List<Contact>\n}\n\ndata class Person(\n    @Embedded var name: Name?,\n\
    \    var emailAddr: String?\n)\n\n@Dao\ninterface PersonDao {\n    @Query(\"SELECT\
    \ * FROM empl\" +\n           \" LEFT OUTER JOIN Contact ON\" +\n           \"\
    \     empl.uid = Contact.employeeId\" +\n           \" WHERE empl.uid = :uId\"\
    )\n    fun findById(uId: Int): List<Person>\n}\n```\n\n## 可观察查询\n\n除了执行查询并返回查询发生时的实体、实体列表或实体数组外，还可以检索查询结果，并注册一个观察者，该观察者在底层数据发生变化时被调用。\n\
    \n在DAO类中实现此目标的方法如下所示：\n\n```kotlin\n@Query(\"SELECT * FROM employee\")\nfun getAllSync():\
    \ LiveData<List<Employee>>\n```\n\n基本上，您将结果包装在`LiveData`类中，这可以应用于所有查询。\n\n然而，这仅在添加了相应的架构组件时才可能实现。为此，请将以下内容添加到模块的`build.gradle`文件中：\n\
    \n```groovy\nimplementation \"androidx.lifecycle:\" +\n\"lifecycle-livedata-ktx:2.4.1\"\
    \n```\n\n现在，这个`LiveData`对象允许添加如下观察者：\n\n```kotlin\nval ld: LiveData<List<Employee>>\
    \ =\n    employeeDao.getAllSync()\nld.observeForever { l ->\n    l?.forEach {\
    \ empl ->\n        Log.e(\"LOG\", empl.toString())\n        // do s.th. else with\
    \ the employee\n    }\n}\n```\n\n这在观察者回调中更新GUI组件时特别有用。您的生产代码应该更好地进行正确的资源管理——如果使用了`observeForever()`方法，则应在代码中的适当位置调用`ld.removeObserver(...)`来取消注册观察者。\n\
    \n为了更好的资源管理方案，`LiveData`对象还允许添加绑定到生命周期对象的观察者。操作如下：\n\n```kotlin\nval ld: LiveData<List<Employee>>\
    \ =\n    employeeDao.getAllSync()\nval lcOwn : LifecycleOwner = ...\nld.observe(lcOwn,\
    \ { l ->\n    l?.forEach { empl ->\n        Log.e(\"LOG\", empl.toString())\n\
    \        // do s.th. else with the employee\n    }\n})\n```\n\n例如，`AppCompatActivity`是一个可能的`LifecycleOwner`，因此如果您能获取活动引用，只需编写：\n\
    \n```kotlin\nval lcOwn : LifecycleOwner = activity\n```\n\n有关生命周期对象的更多详细信息，请参阅`androidx.compose.runtime.LiveData`的在线API文档。\n\
    \n另一种类似但可能更全面的向数据库代码添加可观察性的方法是使用*RxJava*/*RxKotlin*，它是Java/Kotlin平台的*ReactiveX*实现。这里我们不介绍*ReactiveX*编程，但要将其纳入查询中，只需将结果包装到RxJava对象中。虽然不是完整的示例，但为了展示如何操作，例如您可以编写：\n\
    \n```kotlin\n@Query(\"SELECT * FROM employee\" +\n       \" WHERE uid = :uid\"\
    )\nfun findByIdRx(uid: Int): Flowable<Employee> {\n    [...] // Wrap query results\
    \ into a Flowable\n}\n```\n\n这将返回一个`Flowable`，允许*观察者*以异步方式*响应*检索到的数据库行。\n\n为此，您必须在构建文件中包含RxJava支持：\n\
    \n```groovy\n// RxJava support for Room\nimplementation \"androidx.room:room-rxjava3:2.4.2\"\
    \n```\n\n有关RxKotlin的更多详细信息，请查阅关于ReactiveX的一般在线资源，或关于RxKotlin（ReactiveX的Kotlin语言绑定）的资料。\n\
    \n随着Android Room现在与Kotlin协程集成，您还可以使用一种真正的技术来将数据库访问与非抢占式并发相结合。只需在DAO方法中添加`suspend`关键字将其转换为挂起函数，或为返回列表添加`Flow<>`类型限定符。"
  raw: "If you add `unique = true` as an attribute to the `@Index` annotation,\nRoom\
    \ will make sure the table cannot have two entries with the same\nvalue for that\
    \ particular index . As an example we\nadd a SSN (social security number) field\
    \ to `Employee` and define a\nunique index for it:\n\n```\n@Entity(indices = arrayOf(\n\
    Index(value = arrayOf(\"ssn\"), unique = true)\n)\n)\ndata class Employee(\n@PrimaryKey(autoGenerate\
    \ = true) var uid:Int = 0,\nvar ssn:String,\n@Embedded var name:Name)\n```\n\n\
    If you now try to add two employees with the same SSN to the database , Room will\n\
    throw an exception.\n\nData Access: DAOs\n\nData Access Objects or DAOs    provide\
    \ the logic to\naccess the database. We have already seen that inside the database\n\
    declaration, we have to list all DAOs in factory methods like\n\n```\n@Database(entities\
    \ =\narrayOf(Employee::class, Contact::class),\nversion = 1)\nabstract class MyDatabase\
    \ : RoomDatabase() {\nabstract fun employeeDao(): EmployeeDao\nabstract fun contactDao():\
    \ ContactDao\nabstract fun personDao(): PersonDao\n}\n```\n\nIn this example we\
    \ declare three DAOs for use by Room. For the actual\nimplementation, we don’t\
    \ need full-fledged DAO classes. It is enough to\ndeclare interfaces or abstract\
    \ classes; Room will do the rest for\nus.\n\nThe DAO classes, for example, for\
    \ the entity\n\n```\n@Entity\ndata class Employee(\n@PrimaryKey(autoGenerate =\
    \ true) var uid:Int = 0,\n@ColumnInfo(name = \"first_name\") var firstName:String,\n\
    @ColumnInfo(name = \"last_name\") var lastName:String)\n```\n\nmight look like\n\
    \n```\n@Dao\ninterface EmployeeDao {\n@Query(\"SELECT * FROM employee\")\nfun\
    \ getAll(): List\n@Query(\"SELECT * FROM employee\" +\n\" WHERE uid IN (:uIds)\"\
    )\nfun loadAllByIds(uIds: IntArray): List\n@Query(\"SELECT * FROM employee\" +\n\
    \" WHERE last_name LIKE :name\")\nfun findByLastName(name: String): List\n@Query(\"\
    SELECT * FROM employee\" +\n\" WHERE last_name LIKE :lname AND \" +\n\"      \
    \ first_name LIKE :fname LIMIT 1\")\nfun findByName(lname: String, fname: String):\
    \ Employee\n@Query(\"SELECT * FROM employee\" +\n\" WHERE uid = :uid\")\nfun findById(uid:\
    \ Int): Employee\n@Insert\nfun insert(vararg employees: Employee): LongArray\n\
    @Update\nfun update(vararg employees: Employee)\n@Delete\nfun delete(vararg employees:\
    \ Employee)\n}\n```\n\nYou see that we used an interface here, which is possible\
    \ because the\ncomplete access \n  logic is defined\nby method signatures and\
    \ annotations. Also, for insert, update, and\ndelete, the method signature is\
    \ all that Room needs – it will send the\nright commands to the database just\
    \ by looking at the signatures.\nFor the various query methods, we use `@Query`\
    \ annotations to\nprovide the correct database commands. You can see that Room\
    \ is smart\nenough to see whether we want to return a list of objects or a single\n\
    object. Also we can pass method arguments into the pseudo-SQL by using\n“:name”\
    \ identifiers.\n\nThe `@Insert`\nannotation allows for adding an attribute `onConflict\
    \ = \"<strategy>\"` where you can specify what to do if a conflict\noccurs because\
    \ a unique or primary key constraint is violated. Possible\nvalues    for the\n\
    <strategy> are given inside constants:\n\n*   `OnConflictStrategy.ABORT`\n   \
    \ to abort the transaction\n\n*   `OnConflictStrategy.FAIL`\n    to fail the transaction\n\
    \n*   `OnConflictStrategy.IGNORE`\n    to ignore the conflict\n\n*   `OnConflictStrategy.REPLACE`\n\
    \    to just replace the entity and otherwise continue the\n    transaction\n\n\
    *   `OnConflictStrategy.ROLLBACK`\n    to roll back the transaction\n\nThe other\
    \ DAOs from the example entities used previously will look very\nsimilar – the\
    \ `PersonDao` maybe will\ndo outer joins to combine the Employee and Contact entities\
    \   :\n\n```\n@Dao\ninterface ContactDao {\n@Insert\nfun insert(vararg contacts:\
    \ Contact)\n@Query(\"SELECT * FROM Contact WHERE uid = :uId\")\nfun findById(uId:\
    \ Int): List\n@Query(\"SELECT * FROM Contact WHERE\" +\n\" employeeId = :employeeId\"\
    )\nfun loadByEmployeeId(employeeId: Int): List\n}\ndata class Person(@Embedded\
    \ var name:Name?,\nvar emailAddr: String?)\n@Dao\ninterface PersonDao {\n@Query(\"\
    SELECT * FROM empl\" +\n\" LEFT OUTER JOIN Contact ON\" +\n\"     empl.uid = Contact.employeeId\"\
    \ +\n\" WHERE empl.uid = :uId\")\nfun findById(uId: Int): List\n}\n```\n\nObservable\
    \ Queries\nIn addition to performing a query with returning entities or lists\
    \ or\narrays  of\nentities as they are in the moment when the query happens, it\
    \ is also\npossible to retrieve the query result *plus* the possibility to\nregister\
    \ an observer, which gets invoked when the underlying data\nchanges.\n\nThe construct\
    \ to achieve this for a method inside a DAO class looks as\nfollows:\n\n```\n\
    @Query(\"SELECT * FROM employee\")\nfun getAllSync(): LiveData>\n```\n\nSo you\
    \ basically wrap a `LiveData` class  around the\nresult, and this is what you\
    \ can do with all your queries.\n\nHowever, this is only possible if you add the\
    \ corresponding architecture\ncomponent. For this aim add\n\n```\nimplementation\
    \ \"androidx.lifecycle:\" +\n\"lifecycle-livedata-ktx:2.4.1\"\n```\n\nto your\
    \ module’s `build.gradle`\nfile.\n\nThis `LiveData`\nobject now allows for adding\
    \ an observer as follows:\n\n```\nval ld: LiveData> =\nemployeeDao.getAllSync()\n\
    ld.observeForever { l ->\nl?.forEach { empl ->\nLog.e(\"LOG\", empl.toString())\n\
    // do s.th. else with the employee\n}\n}\n```\n\nThis is particularly useful if\
    \ inside the observer callback you\nupdate GUI components.\nYour production code\
    \ should do a better job in doing correct\nhousekeeping – if we use the `observeForever()`\n\
    method , the `LiveData` object  should have the\nobserver unregistered by calling\
    \  `ld.removeObserver(...)`\n at an appropriate place in your code.\n\nFor a better\
    \ solution for correct housekeeping, the `LiveData` object  also allows for\n\
    adding an observer tied to a lifecycle object. This is done by\n\n```\nval ld:\
    \ LiveData> =\nemployeeDao.getAllSync()\nval lcOwn : LifecycleOwner = ...\nld.observe(lcOwn,\
    \ { l ->\nl?.forEach { empl ->\nLog.e(\"LOG\", empl.toString())\n// do s.th. else\
    \ with the employee\n}\n} )\n```\n\nAn  `AppCompatActivity`\n `,` for\nexample,\
    \ is a possible \n`LifecycleOwner`\n, so if you can get hold of the activity reference\
    \ , you just\nwrite\n\n```\nval lcOwn : LifecycleOwner = activity\n```\n\nFor\
    \ more details about lifecycle objects, please have a look at the\nonline API\
    \ documentation for `androidx.compose.runtime.LiveData`.\n\nA similar but maybe\
    \ more comprehensive approach to add observables to\nyour database code is using\
    \ *RxJava*/*RxKotlin*  , which is the Java/Kotlin platform \nimplementation of\
    \ \n*ReactiveX* . We do not give an introduction into\n*ReactiveX* programming\
    \ here, but to include it into queries,\nusing it boils down to wrapping the results\
    \ into RxJava objects. Not as\na complete example, but as an impression on how\
    \ to do that, you, for\nexample, write\n\n```\n@Query(\"SELECT * FROM employee\"\
    \ +\n\" WHERE uid = :uid\")\nfun findByIdRx(uid: Int): Flowable {\n[...] // Wrap\
    \ query results into a Flowable\n}\n```\n\nwhich returns a `Flowable`, allowing\n\
    *observers* to *react* on retrieved database rows in an\nasynchronous manner.\n\
    \nFor this to work, you have to include RxJava support into the build\nfile:\n\
    \n```\n// RxJava support for Room\nimplementation \"androidx.room:room-rxjava3:2.4.2\"\
    \n```\n\nFor more details about RxKotlin , please\nconsult the online resources\
    \ about ReactiveX in general or RxKotlin for\nthe Kotlin language binding of ReactiveX.\n\
    \nWith Android Room now integrating with Kotlin coroutines , you\nalso have a\
    \ genuine technique to couple database access with\nnon-preemptive concurrency\
    \ . Just add\n`suspend` to the\nDao  methods to\nconvert them into suspending\
    \ functions, or add the `Flow<>` type\nqualifier for returned lists:"
  trans: "\n# Room 数据库访问与查询优化\n\n如果你将 `unique = true` 作为属性添加到 `@Index` 注解中，Room 将确保该表不能有两个具有相同索引值的条目。例如，我们为\
    \ `Employee` 添加一个 SSN（社会安全号码）字段，并为其定义唯一索引：\n\n```kotlin\n@Entity(indices = arrayOf(\n\
    \    Index(value = arrayOf(\"ssn\"), unique = true)\n)\n)\ndata class Employee(\n\
    \    @PrimaryKey(autoGenerate = true) var uid: Int = 0,\n    var ssn: String,\n\
    \    @Embedded var name: Name\n)\n```\n\n如果现在尝试向数据库添加两个具有相同 SSN 的员工，Room 将抛出异常。\n\
    \n## 数据访问：DAO\n\n数据访问对象（Data Access Objects，简称 DAOs）提供访问数据库的逻辑。我们已经看到，在数据库声明内部，必须在工厂方法中列出所有\
    \ DAO，如下所示：\n\n```kotlin\n@Database(entities =\n    arrayOf(Employee::class, Contact::class),\n\
    \    version = 1)\nabstract class MyDatabase : RoomDatabase() {\n    abstract\
    \ fun employeeDao(): EmployeeDao\n    abstract fun contactDao(): ContactDao\n\
    \    abstract fun personDao(): PersonDao\n}\n```\n\n在此示例中，我们声明了三个 DAO 供 Room 使用。对于实际实现，我们不需要完整的\
    \ DAO 类。只需声明接口或抽象类即可；Room 将为我们完成其余工作。\n\n例如，对于实体 `Employee`，其 DAO 类可能如下所示：\n\n\
    ```kotlin\n@Entity\ndata class Employee(\n    @PrimaryKey(autoGenerate = true)\
    \ var uid: Int = 0,\n    @ColumnInfo(name = \"first_name\") var firstName: String,\n\
    \    @ColumnInfo(name = \"last_name\") var lastName: String\n)\n```\n\n```kotlin\n\
    @Dao\ninterface EmployeeDao {\n    @Query(\"SELECT * FROM employee\")\n    fun\
    \ getAll(): List<Employee>\n\n    @Query(\"SELECT * FROM employee\" +\n      \
    \     \" WHERE uid IN (:uIds)\")\n    fun loadAllByIds(uIds: IntArray): List<Employee>\n\
    \n    @Query(\"SELECT * FROM employee\" +\n           \" WHERE last_name LIKE\
    \ :name\")\n    fun findByLastName(name: String): List<Employee>\n\n    @Query(\"\
    SELECT * FROM employee\" +\n           \" WHERE last_name LIKE :lname AND \" +\n\
    \           \"       first_name LIKE :fname LIMIT 1\")\n    fun findByName(lname:\
    \ String, fname: String): Employee\n\n    @Query(\"SELECT * FROM employee\" +\n\
    \           \" WHERE uid = :uid\")\n    fun findById(uid: Int): Employee\n\n \
    \   @Insert\n    fun insert(vararg employees: Employee): LongArray\n\n    @Update\n\
    \    fun update(vararg employees: Employee)\n\n    @Delete\n    fun delete(vararg\
    \ employees: Employee)\n}\n```\n\n可以看到，我们在这里使用了接口，这是因为完整的访问逻辑完全由方法签名和注解定义。此外，对于插入、更新和删除操作，方法签名就是\
    \ Room 所需的一切——它只需查看签名就能向数据库发送正确的命令。对于各种查询方法，我们使用 `@Query` 注解来提供正确的数据库命令。可以看出，Room\
    \ 足够智能，能够判断我们是想要返回对象列表还是单个对象。我们还可以通过使用 `:name` 标识符将方法参数传递到伪 SQL 中。\n\n`@Insert`\
    \ 注解允许添加属性 `onConflict = \"<strategy>\"`，用于指定当违反唯一键或主键约束时该怎么做。`<strategy>` 的可能值由常量给出：\n\
    \n- `OnConflictStrategy.ABORT`：中止事务\n- `OnConflictStrategy.FAIL`：使事务失败\n- `OnConflictStrategy.IGNORE`：忽略冲突\n\
    - `OnConflictStrategy.REPLACE`：直接替换实体并继续事务\n- `OnConflictStrategy.ROLLBACK`：回滚事务\n\
    \n先前使用的示例实体中的其他 DAO 看起来将非常相似——`PersonDao` 可能会执行外连接来组合 `Employee` 和 `Contact` 实体：\n\
    \n```kotlin\n@Dao\ninterface ContactDao {\n    @Insert\n    fun insert(vararg\
    \ contacts: Contact)\n\n    @Query(\"SELECT * FROM Contact WHERE uid = :uId\"\
    )\n    fun findById(uId: Int): List<Contact>\n\n    @Query(\"SELECT * FROM Contact\
    \ WHERE\" +\n           \" employeeId = :employeeId\")\n    fun loadByEmployeeId(employeeId:\
    \ Int): List<Contact>\n}\n\ndata class Person(\n    @Embedded var name: Name?,\n\
    \    var emailAddr: String?\n)\n\n@Dao\ninterface PersonDao {\n    @Query(\"SELECT\
    \ * FROM empl\" +\n           \" LEFT OUTER JOIN Contact ON\" +\n           \"\
    \     empl.uid = Contact.employeeId\" +\n           \" WHERE empl.uid = :uId\"\
    )\n    fun findById(uId: Int): List<Person>\n}\n```\n\n## 可观察查询\n\n除了执行查询并返回查询发生时的实体、实体列表或实体数组外，还可以检索查询结果，并注册一个观察者，该观察者在底层数据发生变化时被调用。\n\
    \n在 DAO 类中实现此目标的方法如下所示：\n\n```kotlin\n@Query(\"SELECT * FROM employee\")\nfun\
    \ getAllSync(): LiveData<List<Employee>>\n```\n\n基本上，您将结果包装在 `LiveData` 类中，这可以应用于所有查询。\n\
    \n然而，这仅在添加了相应的架构组件时才可能实现。为此，请将以下内容添加到模块的 `build.gradle` 文件中：\n\n```groovy\nimplementation\
    \ \"androidx.lifecycle:\" +\n\"lifecycle-livedata-ktx:2.4.1\"\n```\n\n现在，这个 `LiveData`\
    \ 对象允许添加如下观察者：\n\n```kotlin\nval ld: LiveData<List<Employee>> =\n    employeeDao.getAllSync()\n\
    ld.observeForever { l ->\n    l?.forEach { empl ->\n        Log.e(\"LOG\", empl.toString())\n\
    \        // do s.th. else with the employee\n    }\n}\n```\n\n这在观察者回调中更新 GUI 组件时特别有用。您的生产代码应该更好地进行正确的资源管理——如果使用了\
    \ `observeForever()` 方法，则应在代码中的适当位置调用 `ld.removeObserver(...)` 来取消注册观察者。\n\n为了更好的资源管理方案，`LiveData`\
    \ 对象还允许添加绑定到生命周期对象的观察者。操作如下：\n\n```kotlin\nval ld: LiveData<List<Employee>> =\n\
    \    employeeDao.getAllSync()\nval lcOwn : LifecycleOwner = ...\nld.observe(lcOwn,\
    \ { l ->\n    l?.forEach { empl ->\n        Log.e(\"LOG\", empl.toString())\n\
    \        // do s.th. else with the employee\n    }\n})\n```\n\n例如，`AppCompatActivity`\
    \ 是一个可能的 `LifecycleOwner`，因此如果您能获取活动引用，只需编写：\n\n```kotlin\nval lcOwn : LifecycleOwner\
    \ = activity\n```\n\n有关生命周期对象的更多详细信息，请参阅 `androidx.compose.runtime.LiveData` 的在线\
    \ API 文档。\n\n另一种类似但可能更全面的向数据库代码添加可观察性的方法是使用 *RxJava*/*RxKotlin*，它是 Java/Kotlin\
    \ 平台的 *ReactiveX* 实现。这里我们不介绍 *ReactiveX* 编程，但要将其纳入查询中，只需将结果包装到 RxJava 对象中。虽然不是完整的示例，但为了展示如何操作，例如您可以编写：\n\
    \n```kotlin\n@Query(\"SELECT * FROM employee\" +\n       \" WHERE uid = :uid\"\
    )\nfun findByIdRx(uid: Int): Flowable<Employee> {\n    [...] // Wrap query results\
    \ into a Flowable\n}\n```\n\n这将返回一个 `Flowable`，允许*观察者*以异步方式*响应*检索到的数据库行。\n\n为此，您必须在构建文件中包含\
    \ RxJava 支持：\n\n```groovy\n// RxJava support for Room\nimplementation \"androidx.room:room-rxjava3:2.4.2\"\
    \n```\n\n有关 RxKotlin 的更多详细信息，请查阅关于 ReactiveX 的一般在线资源，或关于 RxKotlin（ReactiveX 的\
    \ Kotlin 语言绑定）的资料。\n\n随着 Android Room 现在与 Kotlin 协程集成，您还可以使用一种真正的技术来将数据库访问与非抢占式并发相结合。只需在\
    \ DAO 方法中添加 `suspend` 关键字将其转换为挂起函数，或为返回列表添加 `Flow<>` 类型限定符。\n"
- fmt: "```java\n@Dao\ninterface ContactDao {\n    @Insert\n    suspend fun insert(vararg\
    \ contacts: Contact)\n    @Query(\"SELECT * FROM Contact WHERE uid = :uId\")\n\
    \    suspend fun findById(uId: Int): List<Contact>\n    @Query(\"SELECT * FROM\
    \ Contact WHERE\" +\n            \" employeeName like = '%' || :name || '%'\"\
    )\n    fun loadByEmployeeNameLike(name: String):\n            Flow<List<Contact>>\n\
    }\n```\n\n## Database Clients\n\nTo actually include Room into the app, we need\
    \ to know how we can get hold of databases and DAOs. To achieve this, we first\
    \ acquire a reference to a database via\n\n```kotlin\nfun fetchDb() =\n    Room.databaseBuilder(\n\
    \        this, MyDatabase::class.java,\n        \"MyDatabase.db\")\n        .build()\n\
    val db = fetchDb()\n```\n\nwhich creates a file-backed database. The string argument\
    \ is the name of the file holding the data. To instead open a memory-based database,\
    \ say for testing purposes or because you favor speed over data loss when the\
    \ application stops, use\n\n```kotlin\nfun fetchDb() =\n    Room.inMemoryDatabaseBuilder(\n\
    \        this, MyDatabase::class.java)\n        .build()\nval db = fetchDb()\n\
    ```\n\nThe builder allows for certain configuration activities in a fluent builder\
    \ style. Interesting configuration options are shown in Table 8-1. You just chain\
    \ them before the final `.build()` call. One option you might use often during\
    \ early development phases is relaxing the foreground operation restriction by\n\
    \n```kotlin\nfun fetchDb() =\n    Room.databaseBuilder(\n        this, MyDatabase::class.java,\n\
    \        \"MyDatabase.db\")\n        .allowMainThreadQueries()\n        .build()\n\
    val db = fetchDb()\n```\n\n**Table 8-1** Room Builder Options\n\n| Option | Description\
    \ |\n|---|---|\n| `addCallback(RoomDatabase.Callback)` | Adds a `RoomDatabase.Callback`\
    \ to this database. You can use it, for example, to have some code executed when\
    \ the database gets created or opened. |\n| `allowMainThreadQueries()` | Use this\
    \ to disable the no-main-thread restriction in Room. If you don't use this and\
    \ try to perform database operations in the main thread, Room will throw an exception.\
    \ There is a good reason for Room to work this way – GUI-related threads should\
    \ not be blocked because of lengthy DB operations. So for your code, you should\
    \ not call this method – it makes sense only for experiments to avoid dealing\
    \ with asynchronicity. |\n| `addMigrations(vararg Migration)` | Adds migration\
    \ plans. Migration gets handled in more detail in the following in section \"\
    Migrating Databases.\" |\n| `fallbackToDestructiveMigration()` | If a matching\
    \ migration plan is missing – that is, for a necessary upgrade from the data version\
    \ *inside* the database to the version specified in the `@Database` annotation,\
    \ no registered migration plan can be found – Room normally throws an exception.\
    \ If you instead want the current database to be purged and then the database\
    \ be built up from scratch for the new version, use this method. |\n| `fallbackToDestructiveMigration(vararg\
    \ Int)` | Same as `fallbackToDestructiveMigration()` earlier, but restricts to\
    \ certain starting versions. For all other versions, an exception will be thrown\
    \ if the migration plan is missing. |\n\nThen, once you have a database object,\
    \ just call any of the DAO factory methods we defined inside the database class\
    \ in an abstract manner – Room automatically provides implementations. So, for\
    \ example, write\n\n```kotlin\nval db = ...\nval employeeDao = db.employeeDao()\n\
    // use the DAO...\n```\n\n## Transactions\n\nRoom allows for transactions in `EXCLUSIVE`\
    \ mode. This means that if transaction A is in progress, no other processes or\
    \ threads are allowed to access a database in another transaction B until transaction\
    \ A is finished. More precisely, transaction B will have to wait until A is finished.\n\
    \nTo run a set of database operations inside a transaction in Kotlin, you can\
    \ write\n\n```kotlin\nval db = ...\ndb.runInTransaction { ->\n    // do DB work...\n\
    }\n```\n\nThe transaction is marked \"successful\" if the code inside the closure\
    \ does not throw any exception. Otherwise, the transaction will be rolled back.\n\
    \n## Migrating Databases\n\nIn order to migrate databases from one version of\
    \ your app to another version, you add migration plans while accessing the database\
    \ as in\n\n```kotlin\nval migs = arrayOf(\n    object : Migration(1,2) {\n   \
    \     override fun migrate(db: SupportSQLiteDatabase) {\n            // code for\
    \ the 1->2 migration...\n            // this is already running inside a transaction,\n\
    \            // don't add your own transaction code here!\n        }\n    }, object\
    \ : Migration(2,3) {\n        override fun migrate(db: SupportSQLiteDatabase)\
    \ {\n            // code for the 2->3 migration...\n            // this is already\
    \ running inside a transaction,\n            // don't add your own transaction\
    \ code here!\n        }\n    } // more migrations ...\n)\nprivate fun fetchDb()\
