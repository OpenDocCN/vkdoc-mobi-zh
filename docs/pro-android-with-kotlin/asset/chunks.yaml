    implementation \"androidx.wear:\" +\n\"wear-remote-interactions:1.0.0\"\n}\n```\n\
    \n这些库包含各种类，可帮助构建具有专为 Wear 开发定制的元素的 UI。在线 API 文档页面 [`https://developer.android.com/jetpack/androidx/releases/wear`](https://developer.android.com/jetpack/androidx/releases/wear)\
    \ 包含有关如何使用这些类的详细信息。\n\n## 可穿戴设备表盘\n\n如果您想创建一个以特定自定义设计显示时间和日期的 Wear 表盘，请使用“Watch\
    \ Face”选项，按照前面描述的项目创建向导开始。生成的向导服务类提供了一个相当详尽的表盘示例，您可以将其作为您自己表盘的起点。\n\n## 添加表盘复杂功能\n\
    \n表盘复杂功能是表盘中数据片段的占位符。复杂功能数据提供者与复杂功能渲染器是严格分离的，因此，在您的表盘中，您不需要指定要显示哪些复杂功能。相反，您要指定显示复杂功能的位置，并且还可以指定可能的复杂功能数据类型，但让用户决定准确在何处显示哪些复杂功能。\n\
    \n在本节中，我们将讨论如何增强您的表盘以显示复杂功能数据。为此，我提出一种侵入性最小的方法来更新您的表盘实现，以便您能够更轻松地实现自己的想法。拥有一个如之前所述的可运行的表盘是本节的前提条件。\n\
