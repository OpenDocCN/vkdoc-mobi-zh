    private fun lockFocusOrTakePicture() {

    if(cameraHasAutoFocus) {

    captSess?.run {

    try {

    val captureRequest =

    buildLockFocusRequest()

    mState = State.STATE_WAITING_LOCK

    capture(captureRequest,

    captureCallback,

    handler)

