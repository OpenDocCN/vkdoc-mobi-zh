    |`duration`| 通话持续时间（秒）。|\n|`subscription_id`| 用于拨打或接听电话的账户标识符。|\n|`is_read`| 用户是否已读取或处理此条目（0\
    \ = 否，1 = 是）。|\n|`number`| 用户输入的原始电话号码。|\n"
- fmt: "`features` | Bit mask describing features of the call, built of (constant\
    \ names in `CallLog.Calls`) `FEATURES_HD_CALL`: Call was HD. `FEATURES_PULLED_EXTERNALLY`:\
    \ Call was pulled externally. `FEATURES_VIDEO`: Call had video. `FEATURES_WIFI`:\
    \ Call was WIFI call. |\n\n`voicemail_uri` | URI of the voicemail entry, if applicable.\
    \ |\n\n`normalized_number` | The cached normalized (E164) version of the phone\
    \ number, if it exists. |\n\n`via_number` | For an incoming call, the secondary\
    \ line number the call was received via. When a SIM card has multiple phone numbers\
    \ associated with it, the via number indicates which of the numbers associated\
    \ with the SIM was called. |\n\n`matched_number` | The cached phone number of\
    \ the contact that matches this entry, if it exists. |\n\n`last_modified` | The\
    \ date the row is last inserted, updated, or marked as deleted. In milliseconds\
    \ since the epoch. Read-only. |\n\n`new` | Whether or not the call has been acknowledged\
    \ (0 = false, 1 = true). |\n\n`numberlabel` | The cached number label, for a custom\
    \ number type, associated with the phone number, if it exists. |\n\n`lookup_uri`\
    \ | The cached URI to look up the contact associated with the phone number, if\
    \ it exists. |\n\n`photo_uri` | The cached photo URI of the picture associated\
    \ with the phone number, if it exists. |\n\n`data_usage` | The data usage of the\
    \ call in bytes. |\n\n`phone_account_address` | Undocumented. |\n\n`formatted_number`\
    \ | The cached phone number, formatted with rules based on the country the user\
    \ was in when the call was made or received. |\n\n`add_for_all_users` | Undocumented.\
    \ |\n\n`numbertype` | The cached number type associated with the phone number,\
    \ if applicable. One of (constant names in `CallLog.Calls`) `INCOMING_TYPE` `OUTGOING_TYPE`\
    \ `MISSED_TYPE` `VOICEMAIL_TYPE` `REJECTED_TYPE` `BLOCKED_TYPE` `ANSWERED_EXTERNALLY_TYPE`\
    \ |\n\n`countryiso` | The ISO 3166-1 two-letter country code of the country where\
    \ the user received or made the call. |\n\n`name` | The cached name associated\
    \ with the phone number, if it exists. |\n\n`post_dial_digits` | The post-dial\
    \ portion of a dialed number. |\n\n`transcription_state` | Undocumented. |\n\n\
    `_id` | The (technical) ID of the table entry. |\n\n## `ContactsContract`\n\n\
    This is a complex contract describing the phone contacts. Contact information\
    \ is stored in a three-tier data model:\n\n* **`ContactsContract.Data`** – Any\
    \ kind of personal data.\n* **`ContactsContract.RawContacts`** – A set of data\
    \ describing a person.\n* **`ContactsContract.Contacts`** – An aggregated view\
    \ on a person, possibly related to several rows inside the `RawContacts` table.\
    \ Due to its aggregating nature, it is writable only in parts.\n\nThere are more\
    \ contract-related tables described as inner classes of `ContactsContract`. Instead\
    \ of explaining all possible use cases for the contacts content provider, to get\
    \ you started, we just present code to list the contents of the three main tables\
    \ listed previously, show what a single new contact writes there, and otherwise\
    \ refer to the online documentation of the `ContactsContract` class. To list the\
    \ contents of the three tables, use:\n\n```\nfun showTable(tbl:Uri) {\n    Log.e(\"\
    LOG\", \"##################################\")\n    Log.e(\"LOG\", tbl.toString())\n\
    \    val cursor = contentResolver.query(\n        tbl, null, null, null, null)\n\
    \    cursor.moveToFirst()\n    while (!cursor.isAfterLast) {\n        Log.e(\"\
    LOG\", \"New entry:\")\n        for(name in cursor.columnNames) {\n          \
    \  val v = cursor.getString(\n                cursor.getColumnIndex(name))\n \
    \           Log.e(\"LOG\",\"  > \" + name + \" = \" + v)\n        }\n        cursor.moveToNext()\n\
    \    }\n}\n...\nshowTable(ContactsContract.Contacts.CONTENT_URI)\nshowTable(ContactsContract.RawContacts.CONTENT_URI)\n\
    showTable(ContactsContract.Data.CONTENT_URI)\n```\n\nIf you create a new contact\
    \ using Android’s pre-installed Contacts app, inside the `Contacts` view table,\
    \ you will find the following new entry (only important columns):\n\n```\n_id\
    \ = 1\ndisplay_name_alt = Mayer, Hugo\nsort_key_alt = Mayer, Hugo\nhas_phone_number\
    \ = 1\ncontact_last_updated_timestamp = 1518451432615\ndisplay_name = Hugo Mayer\n\
    sort_key = Hugo Mayer\ntimes_contacted = 0\nname_raw_contact_id = 1\n```\n\nAnd\
    \ as an associated entry inside table `RawContacts`, you will find among others:\n\
    \n```\n_id = 1\naccount_type = com.google\ncontact_id = 1\ndisplay_name_alt =\
    \ Mayer, Hugo\nsort_key_alt = Mayer, Hugo\naccount_name = pmspaeth1111@gmail.com\n\
    display_name = Hugo Mayer\nsort_key = Hugo Mayer\ntimes_contacted = 0\naccount_type_and_data_set\
    \ = com.google\n```\n\nObviously you find many of these entries also inside the\
    \ `Contacts` view listed before. Associated are zero to many entries inside the\
    \ `Data` table (only the most important shown):\n\n```\nEntry:\n_id = 3\nmimetype\
    \ = vnd.android.cursor.item/phone_v2\nraw_contact_id = 1\ncontact_id = 1\ndata1\
    \ = (012) 345-6789\nEntry:\n_id = 4\nmimetype = vnd.android.cursor.item/phone_v2\n\
    raw_contact_id = 1\ncontact_id = 1\ndata1 = (098) 765-4321\nEntry:\n_id = 5\n\
    mimetype = vnd.android.cursor.item/email_v2\nraw_contact_id = 1\ncontact_id =\
    \ 1\ndata1 = null\nEntry:\n_id = 6\nmimetype = vnd.android.cursor.item/name\n\
    raw_contact_id = 1\ncontact_id = 1\ndata3 = Mayer\ndata2 = Hugo\ndata1 = Hugo\
    \ Mayer\nEntry:\n_id = 7\nmimetype = vnd.android.cursor.item/nickname\nraw_contact_id\
    \ = 1\ncontact_id = 1\ndata1 = null\nEntry:\n_id = 8\nmimetype = vnd.android.cursor.item/note\n\
    raw_contact_id = 1\ncontact_id = 1\ndata1 = null\n```\n\nYou can see that the\
    \ rows inside the `Data` table correspond to edit fields inside the GUI – you\
    \ see two phone numbers, a first and second name, no nickname, and no email address.\n\
    \n## `DocumentsContract`\n\nThis is not a content contract in the same sense as\
    \ the other contracts we see here – it corresponds to `android.provider.DocumentsProvider`,\
    \ which is a subclass of `android.content.ContentProvider`. We will be dealing\
    \ with documents providers in the following in section “Documents Provider.”\n\
    \n## `FontsContract`\n\nThis is a contract that deals with downloadable fonts\
    \ and does not correspond to content providers.\n\n## `MediaStore`\n\nThe media\
    \ store handles metadata for all media-related files on both internal and external\
    \ storage devices. This includes audio files, images, and videos. Apart from that\
    \ it handles files in a usage-agnostic manner – that means media and non-media\
    \ files that by whatever means relate to media files. The root class `android.provider.MediaStore`\
    \ itself does not contain content provider–specific assets, but the following\
    \ inner classes do:\n\n* **`MediaStore.Audio`** – Audio files. Contains more inner\
    \ classes for music albums, artists, the audio files themselves, genres, and playlists.\n\
    * **`MediaStore.Images`** – Images.\n* **`MediaStore.Videos`** – Videos.\n* **`MediaStore.Files`**\
    \ – Files in general.\n\nYou can investigate any of the media store tables by\
    \ scanning through the online API documentation. For your own experiments, you\
    \ can start with the tables as a whole by watching out for constants `EXTERNAL_CONTENT_URI`\
    \ and `INTERNAL_CONTENT_URI`, or method `getContentUri()`, and then sending those\
    \ through the same code we already used previously:\n\n```\nshowTable(MediaStore.Audio.Media.getContentUri(\n\
    \    \"internal\"))  //  \" + name + \" = \" + v)\n}\ncursor.moveToNext()\n}\n\
    }\n```\n\n## `Settings`\n\nThis is a content provider that deals with various\
    \ global and system-level settings. The following are the main URIs as constants\
    \ from the contract class:\n\n* **`Settings.Global.CONTENT_URI`** – Global settings.\
    \ All entries are triples of:\n    * `_id`\n    * `android.provider.Settings.NameValueTable.NAME`\n\
    \    * `android.provider.Settings.NameValueTable.VALUE`\n\n* **`Settings.System.CONTENT_URI`**\
    \ – Global system-level settings. All entries are triples of:\n    * `_id`\n \
    \   * `android.provider.Settings.NameValueTable.NAME`\n    * `android.provider.Settings.NameValueTable.VALUE`\n\
    \n* **`Settings.Secure.CONTENT_URI`** – Secured system settings – apps are not\
    \ allowed to alter them. All entries are triples of:\n    * `_id`\n    * `android.provider.Settings.NameValueTable.NAME`\n\
    \    * `android.provider.Settings.NameValueTable.VALUE`"
