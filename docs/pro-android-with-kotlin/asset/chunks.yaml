  trans: "\n# Android 动画与过渡指南\n\n此方法仅当相关对象（此处为 `TextView`）具有指定属性（此处为\"x\"）的 setter\
    \ 方法时才有效。更准确地说，对象需要包含 `setX(Float)` 方法，而所有 `View` 对象都具备此方法。\n\n## 注意事项\n\n实际效果在很大程度上取决于\
    \ UI 对象所放置的布局——毕竟布局对象可能对如何定位对象有自己的想法，从而阻碍动画的实现。此处使用 `FrameLayout` 颇为理想，但您需要在代码中完成所有布局工作。\n\
    \n使用 `android.animation.AnimatorSet`，您可以编排一组动画。在线 API 文档将为您提供更多关于如何使用它的信息。\n\n\
    ## 视图属性动画\n\n在特定约束条件下，一些与 `View` 相关的属性也可以使用 `android.view.ViewPropertyAnimator`\
    \ 进行动画处理。与常规属性动画相比，它的侵入性似乎较小，但只有少数属性可以动画化，并且只有绘图受动画影响——例如，如果视图移开，用于点击监听器的位置就会失效。除此之外，您还可以使用它来\
    \ (A) 平移视图、(B) 缩放视图、(C) 旋转视图以及 (D) 淡入或淡出视图。详细信息请参阅在线文档。\n\n作为内置*视图属性*动画的扩展，您可能还想了解一下*投掷动画*。这类动画会对移动对象施加摩擦力，使动画看起来更自然。要查找关于投掷动画的信息，请在您常用的搜索引擎中搜索\"\
    Android 投掷动画\"。\n\n## 弹簧物理\n\n为动画添加弹簧物理效果可以通过使移动更逼真来提升用户体验。要添加弹簧物理效果，您需要包含相应的支持库：在模块的\
    \ `build.gradle` 文件中，于 \"dependencies\" 元素内添加 \"implementation 'com.android.support:support-dynamic-animation:27.1.0'\"\
    。\n\n详细信息请参考 `android.support.animation.SpringAnimation` 类的在线 API 文档。最重要的设置如下：\n\
    \n- 在构造函数中，设置属性。可用的属性包括 alpha、translation、rotation、scroll value 和 scale。\n- 添加监听器：使用\
    \ `addUpdateListener()` 和/或 `addEndListener()`。\n- 使用 `setStartVelocity()` 以初始速度启动动画（默认值为\
    \ 0.0f）。\n- 使用 `getSpring().setDampingRatio()` 或在 Kotlin 中直接使用 `.spring.dampingRatio\
    \ = ...` 来设置阻尼系数。\n- 使用 `getSpring().setStiffness()` 或在 Kotlin 中直接使用 `.spring.stiffness\
    \ = ...` 来设置弹簧刚度。\n\n使用 `start()` 或 `animateToFinalPosition()` 启动动画。此操作必须在 GUI\
    \ 线程内或 `runOnUiThread { ... }` 内部进行。\n\n例如，在按钮按下后，一个弹簧动画的示例如下：\n\n```\nval springAnim\
    \ = SpringAnimation(tv, DynamicAnimation.TRANSLATION_X, 500.0f).apply {\n    setStartVelocity(1.0f)\n\
    \    spring.stiffness = SpringForce.STIFFNESS_LOW\n    spring.dampingRatio = SpringForce.DAMPING_RATIO_LOW_BOUNCY\n\
    }\nspringAnim.start()\n```\n\n## 过渡动画\n\n过渡框架允许在不同的布局之间应用动画过渡。您基本上是从开始布局和结束布局创建\
    \ `android.transition.Scene` 对象，然后让 `TransitionManager` 执行操作，例如：\n\n```\nval sceneRoot:\
    \ ViewGroup = ...\n// 获取在进入此场景时作为场景根视图子视图添加的视图层次结构\nval startViewHierarchy: ViewGroup\
    \ = ...\n// 结束场景的相同操作\nval endViewHierarchy: ViewGroup = ...\n// 创建场景\nval startScene\
    \ = Scene(sceneRoot, startViewHierarchy)\nval endScene = Scene(sceneRoot, endViewHierarchy)\n\
    val fadeTransition = Fade()\nTransitionManager.go(endScene, fadeTransition)\n\
    ```\n\n`sceneRoot` 可以是，例如，一个 `FrameLayout`，过渡动画将在其内部发生。然后您可以在开始时将开始布局（`startViewHierarchy`）添加进去。上述代码将建立一个到结束布局（`endViewHierarchy`）的过渡，所有操作都在\
    \ `sceneRoot` *内部* 进行。这种过渡既可以在代码中指定，也可以通过特殊的 XML 文件指定。详细信息请参阅在线文档。\n\n### 注意事项\n\
    \n存在某些限制——并非所有 `View` 类型都能正确参与此类布局过渡。但是，您可以通过使用 `removeTarget()` 方法从过渡中排除某些元素。\n\
    \n## 使用过渡启动 Activity\n\n当一个 Activity 被另一个 Activity 替换时，可以 (A) 为第一个 Activity 指定退出过渡，(B)\
    \ 为第二个 Activity 指定进入过渡，以及 (C) 允许共同视图元素进行平滑过渡。此类过渡既可以通过特殊的 XML 文件指定，也可以在代码中指定。我们简要介绍后一种方法。关于\
    \ XML 方式以及更多详细信息，请查阅在线文档。\n\n此类 Activity 切换过渡适用于 API 级别 21（Android 5.0）及以上版本。为确保您的代码在此之前的版本上也能工作，我们在以下代码片段中添加了一个检查：\n\
    \n```\nif (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) ...\n```\n\n\
    要设置*退出*和*进入*过渡，请在两个 Activity 中使用以下代码片段：\n\n```\noverride fun onCreate(savedInstanceState:\
    \ Bundle?) {\n    super.onCreate(savedInstanceState)\n    if (Build.VERSION.SDK_INT\
    \ >= Build.VERSION_CODES.LOLLIPOP) {\n        with(window) {\n            requestFeature(Window.FEATURE_CONTENT_TRANSITIONS)\n\
    \            exitTransition = Explode()\n            // 如果是在被调用的过渡中，请改用：\n   \
    \         // enterTransition = Explode()\n            // 在被调用的过渡中使用此代码以\n    \
    \        // 优先启动进入过渡：\n            // allowEnterTransitionOverlap = true\n   \
    \     }\n    } else {\n        // 不使用过渡进行 - 此处可以为空\n    }\n    ...\n}\n```\n\n\
    其中，除了 `Explode()`，您还可以选择 `Slide()`、`Fade()` 或 `AutoTransition()`。*Fade* 和 *Slide*\
    \ 执行其字面含义；`AutoTransition` 会淡出不共有的元素（如下所述），移动并调整共有元素的大小，然后淡入新元素。\n\n### 注意\n\n\
    `requestFeature()` 必须在 `onCreate()` 的开头调用。\n\n仅当您通过以下方式启动新 Activity 时，过渡才会被激活：\n\
    \n```\nif (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {\n    startActivity(intent,\
    \ ActivityOptions.makeSceneTransitionAnimation(this).toBundle())\n} else {\n \
    \   startActivity(intent)\n}\n```\n\n当*被调用的* Activity 存在时，您可以使用 `Activity.finishAfterTransition()`\
    \ 代替通常的 `finish()`，以便更妥善地处理反向过渡。同样，您需要将其放在 `if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP)`\
    \ 检查内部。\n\n为了提升用户体验，您可以识别两个 Activity 共有的元素，并让过渡框架以特殊方式处理它们。为此，您需要做两件事：\n\n- 为共有的\
    \ UI 元素赋予一个特殊的*过渡名称*：\n\n    ```\n    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP)\
    \ {\n        img.transitionName = \"imgTrans\"\n        // 针对某个 \"img\" UI 元素\n\
    \    }\n    ```\n\n    此名称必须唯一，并且该设置应在调用方和被调用方的 Activity 的 `onCreate()` 内部完成。\n\
    \n- 将之前的 `ActivityOptions.makeSceneTransitionAnimation(this)` 替换为：\n\n    ```\n\
    \    ActivityOptions.makeSceneTransitionAnimation(\n        this@MainActivity,\n\
    \        UPair.create(img, \"imgTrans\"),\n        ...更多配对...\n    )\n    ```\n\
    \n    其中 `UPair` 是用于避免名称冲突的导入别名：`import android.util.Pair as UPair`。然后，您就可以，例如，使用\
    \ `AutoTransition()` 过渡，让这些共有的 UI 元素在动画期间得到特殊处理。\n"
- fmt: '# Animation in Jetpack Compose


    `Jetpack Compose` has its own, very concise and elegant animation methodology.
    The online documentation of `Jetpack Compose` tells you more about it and also
    gives examples.


    # Fast Graphics OpenGL ES


    For Android apps you can use the industry-standard OpenGL ES to render high-performance
    graphics in 2D and 3D. The user interface development differs significantly from
    the standard Android OS way, and you have to expect to spend some time learning
    how to use OpenGL ES. In the end however, you might end up with an outstanding
    graphics, which pays off for the effort.


    > **Note**

    >

    > It doesn’t make sense to use OpenGL ES if the Android OS user interface provides
    the same functionality and performance is not an issue.


    OpenGL ES comes in different versions: 1.x, 2.0, and 3.x. While there is a huge
    difference in terms of methodology between 1.x and the later versions, the difference
    between 2.0 and 3.x is not so big. But setting 3.x as a strict requirement, you
    may miss a considerable part of all possible users, so the recommendation is:


    * Develop for OpenGL ES 2.0 and only in case you really need it add 3.x features.
    If using 3.x you best supply fallbacks for devices that do not speak 3.x.


    In the following sections, we will be talking about version 2.0.


    > **Note**

    >

    > OpenGL ES for Android is supported by both the framework and also the *Native
    Development Kit* (NDK). In the book we will be putting more weight on the framework
    classes.


    OpenGL ES is extremely versatile, and usage patterns are potentially endless.
    To cover all what OpenGL ES provides goes beyond the scope of the book, but I
    will present the following scenarios to get you started:


    * Configure the activity to use OpenGL ES.

    * Provide a custom `GLSurfaceView` class to hold the OpenGL scene.

    * Provide two graphics primitives: a triangle that uses a vertex buffer and a
    shader program and a quad that uses a vertex buffer, an index buffer, and a shader
    program.

    * Provide a renderer to paint the graphics.

    * Briefly outline how to introduce view projection.

    * Briefly outline how to add motion.

    * Briefly outline how to add light.

    * Briefly outline how to react to user input.


    # Showing an OpenGL Surface in Your Activity


    You can make a custom OpenGL view element be the only UI element to show in an
    activity via:


    ```

    class MyActivity : AppCompatActivity() {

    var glView:GLSurfaceView? = null

    override fun onCreate(savedInstanceState: Bundle?) {

    super.onCreate(savedInstanceState)

    // Create a GLSurfaceView instance and set it

    // as the ContentView for this Activity.

    glView = MyGLSurfaceView(this)

    setContentView(glView)

    }

    }

    ```


    where `MyGLSurfaceView` is the custom `GLSurfaceView` we will define in the following.


    Or you could use a normal XML layout file and add the custom GL view there by,
    for example, writing:


    ```

    <com.example.MyGLSurfaceView android:id="@+id/gl_view" ... />

    ```


    where you have to specify the full class path of the custom GL view class.


    # Creating a Custom OpenGL View Element


    A custom OpenGL view element could be as easy as subclassing `android.opengl.GLSurfaceView`
    and specifying a renderer for the graphics data, a rendering mode, and maybe listeners
    for user interactions. We however want to go a step further and include an OpenGL
    ES version check, so you can decide whether the inclusion of OpenGL ES 3.x constructs
    is possible. The code reads:


    ```

    import android.app.ActivityManager

    import android.content.Context

    import android.opengl.GLSurfaceView

    import android.util.Log

    import javax.microedition.khronos.egl.EGL10

    class MyGLSurfaceView(context: Context) :

    GLSurfaceView(context) {

    val renderer: MyGLRenderer

    var supports3x = false

    var minVers = 0

    init {

    fetchVersion()

    // Create an OpenGL ES 2.0 context

    setEGLContextClientVersion(2)

    // We set the 2.x context factory to use for

    // the view

    setEGLContextFactory()

    // We set the renderer for drawing the graphics

    renderer = MyGLRenderer()

    setRenderer(renderer)

    // This setting prevents the GLSurfaceView frame

    // from being redrawn until you call

    // requestRender()

    renderMode = GLSurfaceView.RENDERMODE_WHEN_DIRTY

    }

    private fun fetchVersion() {

    val activityManager =

    context.getSystemService(

    Context.ACTIVITY_SERVICE)

    as ActivityManager

    val configurationInfo =

    activityManager.deviceConfigurationInfo

    val vers = configurationInfo.glEsVersion

    // e.g. "2.0"

    supports3x = vers.split(".")[0] == "3"

    minVers = vers.split(".")[1].toInt()

    Log.i("LOG", "Supports OpenGL 3.x = " +

    supports3x)

    Log.i("LOG", "OpenGL minor version = " +

    minVers)

    }

    private fun setEGLContextFactory() {

    val EGL_CONTEXT_CLIENT_VERSION = 0x3098

    // from egl.h c-source

    class ContextFactory :

    GLSurfaceView.EGLContextFactory {

    override fun createContext(egl: EGL10,

    display: javax.microedition.khronos.

    egl.EGLDisplay?,

    eglConfig: javax.microedition.khronos.

    egl.EGLConfig?)

    :javax.microedition.khronos.egl.EGLContext? {

    val attrib_list =

    intArrayOf(EGL_CONTEXT_CLIENT_VERSION,

    2, EGL10.EGL_NONE)

    val ectx = egl.eglCreateContext(display,

    eglConfig,

    EGL10.EGL_NO_CONTEXT,

    attrib_list)

    return ectx

    }

    override fun destroyContext(egl: EGL10,

    display: javax.microedition.khronos.

    egl.EGLDisplay?,

    context: javax.microedition.khronos.

    egl.EGLContext?) {

    egl.eglDestroyContext(display, context)

    }

    }

    setEGLContextFactory(ContextFactory())

    }

    }

    ```


    You can then use `.supports3x` to see whether OpenGL ES 3.x is supported and `.minVers`
    for the minor version number in case you need it. The renderer used by this class
    gets defined in the following. Also note that by virtue of `RENDERMODE_WHEN_DIRTY`
    a redrawing only happens on demand. If you need fully dynamic changes, comment
    that line out.


    # A Triangle with a Vertex Buffer


    A class responsible for drawing graphics primitives, in this case a simple triangle,
    reads:


    ```

    class Triangle {

    val vertexShaderCode = """

    attribute vec4 vPosition;

    void main() {

    gl_Position = vPosition;

    }

    """.trimIndent()

    val fragmentShaderCode = """

    precision mediump float;

    uniform vec4 vColor;

    void main() {

    gl_FragColor = vColor;

    }

    """.trimIndent()

    var program:Int? = 0

    val vertexBuffer: FloatBuffer

    var color = floatArrayOf(0.6f, 0.77f, 0.22f, 1.0f)

    var positionHandle: Int? = 0

    var colorHandle: Int? = 0

    val vertexCount =

    triangleCoords.size / COORDS_PER_VERTEX

    val vertexStride = COORDS_PER_VERTEX * 4

    // 4 bytes per vertex

    companion object {

    // number of coordinates per vertex

    internal val COORDS_PER_VERTEX = 3

    internal var triangleCoords =

    floatArrayOf( // in counterclockwise order:

    0.0f, 0.6f, 0.0f,   // top

    -0.5f, -0.3f, 0.0f, // bottom left

    0.5f, -0.3f, 0.0f   // bottom right

    )

    }

    ```


    Inside the class’s `init` block, the shaders get loaded and initialized, and a
    vertex buffer gets prepared:'
