- fmt: "# Quick Contact Badges\n\n`QuickContactBadge` allows you to use a GUI widget\
    \ that your user can tap to see a contact’s details and take any suitable action\
    \ from there like sending an email, issuing a call, or whatever makes sense. This\
    \ details screen gets presented by the system, you don’t have to implement it\
    \ in your app. See Figure [8-6](#463716_2_En_8_Chapter.xhtml#Fig6).\n\n![](images/463716_2_En_8_Chapter/463716_2_En_8_Fig6_HTML.jpg)\n\
    \nA screenshot of a quick contact badge with an animated picture.\n\n**Figure\
    \ 8-6** A Quick Contact Badge\n\nIn order to generate such a quick contact badge\
    \ using the traditional XML description way, inside your layout file you must\
    \ add\n\n```\n<QuickContactBadge\n    android:id=\"@+id/quickBadge\"\n    android:layout_width=\"\
    wrap_content\"\n    android:layout_height=\"wrap_content\" />\n```\n\nWe talk\
    \ about using Jetpack Compose instead for including quick contact badges in the\
    \ following.\n\nInside your code you must connect the badge to the following information\
    \ you get from the contacts provider: the raw contact ID, the look-up key, and\
    \ a thumbnail URI. The corresponding code might look like\n\n```\nval id = row[ContactsContract.Contacts._ID]\n\
    val lookup = row[ContactsContract.Contacts.LOOKUP_KEY]\nval photo = row[ContactsContract.Contacts.PHOTO_THUMBNAIL_URI]\n\
    ```\n\nwhere the `row`, for example, is a map you get from a contacts content\
    \ provider query. In this case a query inside the *Raw Contacts* table is enough;\
    \ you don’t need to also query the *Data* table.\n\nFrom here we configure the\
    \ badge as follows, for example, after you load the contact information by user\
    \ interface activities:\n\n```\nval contactUri = ContactsContract.Contacts.getLookupUri(id.toLong(),\
    \ lookup)\nquickBadge.assignContactUri(contactUri)\nval thumbnail = loadContactPhotoThumbnail(photo.toString())\n\
    quickBadge.setImageBitmap(thumbnail)\n```\n\nwhere the `loadContactPhotoThumbnail()`\
    \ function loads the thumbnail image data:\n\n```\nprivate fun loadContactPhotoThumbnail(photoData:\
    \ String): Bitmap? {\n    var afd: AssetFileDescriptor? = null\n    try {\n  \
    \      val thumbUri = Uri.parse(photoData)\n        afd = contentResolver.openAssetFileDescriptor(thumbUri,\
    \ \"r\")\n        afd?.apply {\n            fileDescriptor?.apply {\n        \
    \        return BitmapFactory.decodeFileDescriptor(this, null, null)\n       \
    \     }\n        }\n    } catch (e: FileNotFoundException) {\n        // Handle\
    \ file not found errors ...\n    } finally {\n        afd?.close()\n    }\n  \
    \  return null\n}\n```\n\nIf we want to use Jetpack Compose as a front-end development\
    \ technology, we immediately realize that there is no `QuickContactBadge` composable\
    \ element available. This is not a real problem, though, because with `AndroidView`\
    \ there is a compatibility bridge between Jetpack Compose and traditional AndroidViews.\
    \ All you have to do is to add\n\n```\nAndroidView(\n    modifier = Modifier.width(60.dp).height(60.dp),\n\
    \    factory = { context ->\n        // This instantiates a non-Compose View:\n\
    \        QuickContactBadge(context).apply {\n            val contactUri = ContactsContract.Contacts.getLookupUri(\n\
    \                itm.id.toLong(),\n                itm.lookupKey\n           \
    \ )\n            assignContactUri(contactUri)\n            val thumbnail = loadContactPhotoThumbnail(itm.photoThumbnailUri)\n\
    \            setImageBitmap(thumbnail)\n        }\n    },\n    update = { view\
    \ ->\n        // View's been inflated or state has been\n        // updated. Add\
    \ logic here if necessary.\n        // Because the QuickContactBadge does not\n\
    \        // represent a state, we don't need to add\n        // anything here.\n\
    \    }\n)\n```\n\nto your composable’s structure. The `itm` is a data holder (data\
    \ class) for the ID, the lookup-key, and the photo thumbnail URI. Remember that\
    \ for Jetpack Compose, no entry in whatever layout XML file is needed.\n\n# Search\
    \ Framework\n\nThe *search framework* allows you to seamlessly add search functionality\
    \ to your app and register your app as a searchable items provider in the Android\
    \ OS.\n\nTalking of the user interface, you have two options:\n\n- Open the search\
    \ dialog provided by the OS.\n- Add a search widget to your UI via `SearchView`.\n\
    \nMore precisely, in order to include search facilities inside your app, you have\
    \ to\n\n1. Provide a searchable configuration as an XML file.\n2. Provide a dialog\
    \ or search widget.\n3. Provide an activity that (A) is able to receive a search\
    \ query, (B) performs the search inside your app’s data, (C) and displays the\
    \ search result.\n\nThe rest of this section walks through these requirements.\n\
    \n## The Searchable Configuration\n\nThe searchable configuration is a file named\
    \ `searchable.xml` and resides inside the folder `/res/xml` of your project. The\
    \ most basic contents of this file read\n\n```\n<searchable xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:label=\"@string/app_label\"\n    android:hint=\"@string/search_hint\"\
    \ />\n```\n\nThe `@string/...` entries point to localized string resources. The\
    \ `@string/app_label` points to a label and should equal the name of the `label`\
    \ attribute of the `<application>` element. The other one, `@string/search_hint`,\
    \ is the string to be shown inside search fields if nothing has been entered yet.\
    \ It is recommended and should show something like `\"Search <content>\"` with\
    \ `<content>` being specific to the data being searched for. There are a lot more\
    \ possible attributes and some optional child elements – we will mention some\
    \ in the following sections. For the complete list, please see the online documentation\
    \ under the “Searchable Configuration” document.\n\n## The Searchable Activity\n\
    \nFor the activity that handles search-related issues inside your app, start with\
    \ its declaration inside `AndroidManifest.xml`. The activity needs to have a special\
    \ signature there, as in\n\n```\n<activity\n    android:name=\".SearchableActivity\"\
    \n    android:exported=\"false\">\n    <intent-filter>\n        <action android:name=\"\
    android.intent.action.SEARCH\" />\n    </intent-filter>\n    <meta-data\n    \
    \    android:name=\"android.app.searchable\"\n        android:resource=\"@xml/searchable\"\
    \ />\n</activity>\n```\n\nThe name of the activity is up to you. All the other\
    \ tags and attributes must be as shown here.\n\nNext, we let this activity receive\
    \ the search request. This is done inside its `onCreate()` callback as in\n\n\
    ```\noverride fun onCreate(savedInstanceState: Bundle?) {\n    super.onCreate(savedInstanceState)\n\
    \    setContentView(R.layout.activity_searchable)\n    // This is the standard\
    \ way a system search dialog\n    // or the search widget communicates the query\
    \ string:\n    if (Intent.ACTION_SEARCH == intent.action) {\n        val query\
    \ = intent.getStringExtra(SearchManager.QUERY)\n        doMySearch(query)\n  \
    \  }\n    // More initialization if necessary...\n}\n```\n\nThe `doMySearch()`\
    \ function is supposed to perform the search and present the result or whatever\
    \ inside the `SearchableActivity`. The way this is done is totally up to the application\
    \ – it could be a database search or a search using a content provider or any\
    \ other way you might think of.\n\n## The Search Dialog\n\nIn order for any activity\
    \ to open the system’s search dialog and have it pass the query entered there\
    \ to the `SearchableActivity`, inside `AndroidManifest.xml` you write\n\n```\n\
    <activity\n    android:name=\".MainActivity\"\n    android:exported=\"true\">\n\
    \    <!-- Other attributes... -->\n    <meta-data\n        android:name=\"android.app.default_searchable\"\
    \n        android:value=\".SearchableActivity\" />\n</activity>\n```\n\nThis example\
    \ allows for the `MainActivity` to open the system’s search dialog – in fact you\
    \ can use any suitable activity from inside your app for that purpose.\n\nTo open\
    \ the search dialog inside your searchable activity, write\n\n```\nonSearchRequested()\n\
    ```\n\n> **Note**  \n> Usually, directly executing an obvious callback function\
    \ starting with “on…” has a bad smell. You sometimes do that for half-legal shortcuts.\
    \ The reason we have to do it here is that your device might have a dedicated\
    \ search button. In this case `onSearchRequested()` gets called from the system,\
    \ and it is a real callback method. Because such a button is optional, it is however\
    \ necessary always to provide a search initiator from inside your app.\n\nA dialog-based\
    \ search flow gets depicted in Figure [8-7](#463716_2_En_8_Chapter.xhtml#Fig7).\n\
    \n![](images/463716_2_En_8_Chapter/463716_2_En_8_Fig7_HTML.jpg)\n\nA screenshot\
    \ of a dialog-based search flow with an animated picture and two rightward arrows.\n\
    \n**Figure 8-7** A Dialog-Based Search Flow\n\n## The Search Widget\n\nInstead\
    \ of opening the system’s search dialog, you can also place a `<SearchView>` widget\
    \ inside your UI. While in principle you can place it wherever you like, it is\
    \ recommended to put it in the action bar. For this aim, provided you have set\
    \ up an action bar and defined a menu there, inside the menu XML definition, write\n\
    \n```\n<item\n    android:id=\"@+id/action_search\"\n    android:title=\"@string/action_search\"\
    \n    android:icon=\"@drawable/ic_search\"\n    app:actionViewClass=\"android.widget.SearchView\"\
    \n    app:showAsAction=\"ifRoom\" />\n```\n\nWhat then needs to be done inside\
    \ your app in order to connect the widget with the search framework is"
