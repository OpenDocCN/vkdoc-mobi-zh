    \ 提供了有关如何设置智能手表调试过程的更多信息。\n\n## 可穿戴应用用户界面\n\n在开始为您的 Wear 应用创建用户界面之前，请考虑使用内置机制之一，即如下章节所述的*通知*或*表盘复杂功能*。但是，如果您认为您的\
    \ Wear 应用有必要呈现自己的布局，请不要直接复制智能手机应用的布局并将其用于 Wear。相反，要构建真正的 Wear 用户界面，请使用 Wear 支持库提供的特殊\
    \ UI 元素。要使用它，请确保模块的 `build.gradle` 文件中包含：\n\n```\ndependencies {\n...\nimplementation\
