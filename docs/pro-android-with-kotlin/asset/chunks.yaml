    \n## Preferences\n\nPreferences allow the user to change the way the app performs\
    \ certain parts of its functionalities. Contrary to the input given by the user\
    \ during the app’s functional workflows, preferences are less likely to be changed,\
    \ so the access to preferences gets usually provided by a single “Preferences”\
    \ entry in the app’s menu.\n\nThere was a major overhaul in Android’s Preferences\
    \ API. It is now part of Jetpack, and you can find its documentation at [`https://developer.android.com/guide/topics/ui/settings/`](https://developer.android.com/guide/topics/ui/settings/),\
