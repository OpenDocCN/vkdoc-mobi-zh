    * @param reason Either DEACTIVATION_LINK_LOSS or\n*     DEACTIVATION_DESELECTED\n\
    */\noverride fun onDeactivated(reason: Int) {}\n```\n\nThe  `processCommandApdu()`\n\
    \ will be called when a command APDU has been received. A response\nAPDU can be\
