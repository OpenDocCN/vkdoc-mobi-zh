    ```


    在本书中，我们尽可能使用函数式构造，以提高代码的全面性和简洁性。


    ## 顶级函数与数据


    在 Java 世界中，拥有过多全局可用的函数和数据被认为是一种不良风格，例如，通过某个工具类内部具有静态作用域的定义来实现。然而，在 Kotlin 中，这种做法复兴了，而且看起来也更自然。这是因为您可以在文件中、在任何类之外声明函数和变量/值。尽管如此，要使用它们，您必须像`import
    com.example.global.*`这样导入这些元素，其中包`com/example/global`内任意名称的文件不包含任何类，只包含`fun`、`var`和`val`元素。


