  raw: '## The Application Manifest


    A very important central app configuration file you can see in any Android app
    is the file `AndroidManifest.xml` . It describes the app and declares all the
    components that are part of the app. The outline of such a manifest file, for
    example, might look like


    ```

    ...


    ```


    The most important attribute of the root entry `<manifest>` is called `package`
    . It declares the ID of your app, and if you plan to publish your app, this must
    be a worldwide unique ID for it. A good idea is to use your or your company’s
    domain reversed and then a unique application identifier as shown here.


    All possible attributes of `<manifest>` are described in Table [2-1](#463716_2_En_2_Chapter.xhtml#Tab1).
    Note that for the most simple apps, all you need is the `package` attribute and
    a single `<application>` child.


    Table 2-1


    Manifest Main Attributes


    | Name | Description |

    | --- | --- |

    | android:installLocation | Defines the installation location: use “internalOnly”
    for installing ever only in the internal storage, “auto” for letting the OS decide
    with affinity toward using the internal storage (the user can switch later in
    the system settings), or “preferExternal” for letting the OS decide with affinity
    toward using the external storage. Default is “internalOnly”. Note that a couple
    of restrictions apply to using external storage for that aim, see the online document
    “<manifest>”, and for modern devices usually having lots of free internal storage,
    you should never need to specify “preferExternal” here. |

    | package | The worldwide unique ID of your app. A string like “abc.def.ghi.[...]”
    where the non-dot characters may contain letters A–Z and a–z, numbers 0–9, and
    underscores. Don’t use a number after a dot! This is also the default process
    name and the default task affinity. See the text companion for what those mean.
    Note that once your app is published, you cannot change this package name in the
    Google Play Store. There is no default; you must set this attribute. |

    | android:sharedUserId | Deprecated since API level 29\. The name of the Android
    OS’s user ID assigned to the app. |

    | android:sharedUserLabel | Deprecated since API level 29\. Only if you also set
    “sharedUserId”, you can set a user-readable label for the shared user ID here.
    |

    | android:targetSandboxVersion | One of “1” and “2”. Serves as a security level.
    Starting with Android 8.0 or API level 26, you *must* set it to “2” for instant
    apps. With “2” in contrast to “1”, the user ID can no longer be shared between
    different apps, and the default value for `usesClearTextTraffic` (see the text
    companion) is set to false. |

    | android:versionCode | An internal version number of your app. This is not shown
    to users and only used for comparison of versions. Use an integer number greater
    than one here. Defaults to `undefined`. |

    | android:versionName | A user-visible version string. Either the string itself
    or a pointer to a string resource (“@string/...”). This is not used for anything
    else but informing the user. |


    All elements possible as children to the `<manifest>` element are listed in section
    “Manifest Top-Level Entries” of the online text companion. The most important
    one, `<application>`, describes the application and gets treated in detail in
    section “The Application Declaration” of the online text companion.


    # 3. Activities


    *Activities* represent user interface entry points of your app. Any app you need
    to interact functionally with the user in a direct way, by letting the user enter
    things or telling the user graphically about the functional state of an app, will
    expose at least one *activity* to the system. We say *functionally* because telling
    the user in a notifying way about events can also happen by notifications via
    *Toasts* or the *status bar*, for which an activity is not needed.


    Apps can have zero, one, or more activities, and they get started in one of two
    ways:


    1.  The *main activity*, as declared inside `AndroidManifest.xml` , gets started
    by launching the app. This is kind of similar to the `main()` function of traditional
    applications.


    2.  All activities can be configured to be started by an explicit or implicit
    *Intent* , as configured inside `AndroidManifest.xml` . Intents are both objects
    of a class and an outstanding concept in Android. For explicit Intents, by triggering
    an Intent, a component tells that it needs something to be done by a dedicated
    component of a dedicated app. For implicit Intents, the component just tells what
    needs to be done without specifying which component is supposed to do it – the
    Android OS or the user decides which app or component is capable of fulfilling
    such an implicit request.


    From a user perspective , activities show up as screens that can be started from
    inside an application launcher, be it the standard launcher or a specialized third-party
    launcher app. And, as soon as they are running, they get listed in a task stack
    as well, and users will see them when using the back button.


    Note


    Activities are such an important concept that it is advisable to see also the
    online documentation at [`https://developer.android.com/guide/components/activities/intro-activities`](https://developer.android.com/guide/components/activities/intro-activities)
    and [`https://developer.android.com/reference/android/app/Activity`](https://developer.android.com/reference/android/app/Activity)
    . This chapter can only show an excerpt of that huge topic.'
  trans: '

    # 应用清单


    在任何安卓应用中都能看到的一个非常重要的中央应用配置文件是`AndroidManifest.xml`。它描述了应用并声明了应用的所有组成部分。这样一个清单文件的大纲可能如下所示：


    ```

    ...

    ```


    根条目`<manifest>`最重要的属性是`package`。它声明了应用的 ID，如果你计划发布应用，它必须是全球唯一的 ID。一个好的做法是使用你或你公司的反向域名，然后加上一个唯一的应用标识符，如下所示。


    `<manifest>`的所有可能属性在表 2-1 中进行了描述。请注意，对于最简单的应用，你只需要`package`属性和一个`<application>`子元素。


    **表 2-1** 清单的主要属性


    | 名称 | 描述 |

    | --- | --- |

    | `android:installLocation` | 定义安装位置：使用`"internalOnly"`表示仅安装到内部存储；`"auto"`表示让操作系统决定，倾向于使用内部存储（用户之后可以在系统设置中切换）；或`"preferExternal"`表示让操作系统决定，倾向于使用外部存储。默认值为`"internalOnly"`。请注意，为此目的使用外部存储会有一系列限制，参见在线文档`<manifest>`。对于现代通常拥有大量空闲内部存储的设备，你永远不需要在此指定`"preferExternal"`。
    |

    | `package` | 应用的全局唯一 ID。一个类似`"abc.def.ghi.[...]"`的字符串，其中非点号字符可以包含字母 A-Z 和 a-z、数字
    0-9 以及下划线。不要在点号后使用数字！这也是默认的进程名称和默认的任务亲和性。有关这些含义，请参见文本配套资料。请注意，一旦你的应用发布，你就无法在 Google
    Play 商店中更改这个包名。没有默认值，你必须设置此属性。 |

    | `android:sharedUserId` | 自 API 级别 29 起已弃用。分配给应用的安卓操作系统用户 ID 的名称。 |

    | `android:sharedUserLabel` | 自 API 级别 29 起已弃用。仅当你同时设置了`"sharedUserId"`时，才能在此为共享用户
    ID 设置一个用户可读的标签。 |

    | `android:targetSandboxVersion` | 值为`"1"`或`"2"`。作为安全级别使用。从安卓 8.0 或 API 级别 26
    开始，对于即时应用，你*必须*将其设置为`"2"`。与`"1"`相比，使用`"2"`时，不同应用之间不能再共享用户 ID，并且`usesClearTextTraffic`（参见文本配套资料）的默认值设置为
    false。 |

    | `android:versionCode` | 应用的内部版本号。此编号不向用户显示，仅用于版本比较。请使用一个大于 1 的整数。默认值为`undefined`。
    |

    | `android:versionName` | 用户可见的版本字符串。可以是字符串本身，也可以是指向字符串资源的指针（`"@string/..."`）。除了通知用户之外，它不用于其他任何用途。
    |


    可以作为`<manifest>`元素子元素的所有元素都在在线文本配套资料的“清单顶级条目”部分列出。其中最重要的`<application>`描述了应用，并在在线文本配套资料的“应用声明”部分进行了详细讨论。


    # 活动


    *活动*代表了应用的用户界面入口点。任何需要以直接方式与用户进行功能交互的应用——通过让用户输入内容或以图形方式告知用户应用的功能状态——都会向系统暴露至少一个*活动*。我们之所以说*功能性地*，是因为以通知方式告知用户事件也可以通过*Toasts*或*状态栏*的通知来实现，这不需要活动。


    应用可以有零个、一个或多个活动，它们通过以下两种方式之一启动：


    1.  *主活动*，在`AndroidManifest.xml`中声明，通过启动应用来启动。这有点类似于传统应用的`main()`函数。


    2.  所有活动都可以配置为由显示或隐式*Intent*启动，如`AndroidManifest.xml`中所配置。Intent 既是类的对象，也是安卓中一个卓越的概念。对于显式
    Intent，通过触发 Intent，一个组件告知它需要由某个特定应用的专用组件来完成某事。对于隐式 Intent，组件仅告知需要做什么，而不指定应由哪个组件来完成——由安卓操作系统或用户决定哪个应用或组件能够完成这样的隐式请求。


    从用户角度来看，活动表现为可以从应用启动器中启动的屏幕，无论是标准启动器还是专门的第三方启动器应用。并且，一旦它们运行起来，它们也会被列在任务栈中，用户在使用返回按钮时会看到它们。


    **注意** 活动是一个非常重要的概念，建议也参阅在线文档，网址为 [`https://developer.android.com/guide/components/activities/intro-activities`](https://developer.android.com/guide/components/activities/intro-activities)
    和 [`https://developer.android.com/reference/android/app/Activity`](https://developer.android.com/reference/android/app/Activity)。本章只能展示这个庞大主题的一部分内容。

    '
- fmt: '# Declaring Activities


    To declare an activity, inside `AndroidManifest.xml`, write, for example


    ```

    ...

    ...

    ```


    As seen in this particular example, you can start the name with a dot, which leads
    to prepending the app''s package name. In this case the full name of the activity
    reads "com.example.myapp.ExampleActivity". Or you can write the full name here:


    ```

    ...

    ...

    ```


    All attributes you can add to the `<activity>` element are listed in section "Activity-Related
    Manifest Entries" in the online text companion.


    Elements that can go as child elements inside the `activity` element are as follows:


    - **intent-filter**


    An intent filter. For details see section "Intent Filters." You can specify zero,
    one, or many intent filters.


    - **layout**


    Starting with Android 7.0, you can specify layout attributes in multi-window modes
    here like


    ```

    where you of course can use your own numbers. The attributes `defaultWidth` and

    `defaultHeight`

    specify the default dimensions, `gravity` defines the

    initial placement of the activity in freeform modes, and `minHeight` and `maxHeight`
    signify

    minimum dimensions.

    ```


    - **meta-data**


    An arbitrary name-value pair in the form `<meta-data android:name = "..." android:resource
    = "..." android:value = "..." />`. You can have several of them, and they go into
    an `android.os.Bundle` element available as `PackageItemInfo.metaData`.


    ## Caution


    Writing an app without any activity is possible – the app can still provide services,
    broadcast receivers, and data content as a content provider. One thing you as
    an app developer need to bear in mind is that users do not necessarily understand
    what such user interface–less components actually do. In most cases, providing
    a very simple main activity just to give information is recommended and improves
    user experience. In a corporate environment though, providing apps without activities
    is acceptable.


    # Starting Activities


    Activities can be started in one of two ways. First, if the activity is marked
    as the launchable main activity of an app, the activity can be started from the
    app launcher. To declare an activity as a launchable main activity, inside the
    `AndroidManifest.xml` you''d write


    ```

    ...

    ...

    ```


    The `android.intent.action.MAIN` tells Android that it is the main activity and
    will go to the bottom of a task. The `android.intent.category.LAUNCHER` tells
    it must be listed inside the launcher.


    Second, an activity can be started by an `Intent` from the same app or any other
    app. For this to be possible, inside the manifest you declare an intent filter:


    ```

    ...

    ...

    ```


    The corresponding code to address this intent filter and actually launch the activity
    now looks like


    ```kotlin

    val intent = Intent()

    intent.action = "com.example.myapp.ExampleActivity.START_ME"

    startActivity(intent)

    ```


    The flag `exported="false"` must not have been set for calls from other apps.
    The category specification `android.intent.category.DEFAULT` inside the filter
    takes care of the activity being launchable even with no category set in the launching
    code.


    In the example shown previously, we used an *explicit* `Intent` to call an activity.
    We precisely told Android which activity to call, and we expected there to be
    precisely one activity that got addressed this way through its intent filter.
    The other type of `Intent` is called *implicit* `Intent`, and what it does contrary
    to calling precisely one activity is to tell the system what we actually *want*
    to do without specifying *which* app or which component is capable of doing it.
    Such implicit calls, for example, look like


    ```kotlin

    val intent = Intent(Intent.ACTION_SEND)

    intent.type = "text/plain"

    intent.putExtra(Intent.EXTRA_TEXT, "Give me a Quote")

    startActivity(intent)

    ```


    and what this snippet does is "Call an activity that is able to handle `Intent.ACTION_SEND`
    actions, receive texts in MIME type `text/plain`, and pass over the text ''Give
    me a quote.''" The Android OS will then present the user a list of activities
    from this or other apps that are capable of receiving this kind of `Intent`. Activities
    can have data associated with them. Just use one of the overloaded `putExtra(...)`
    methods of the `Intent` class.


    # Activities and Tasks


    What actually happens with a launched activity concerning the task stack gets
    determined by the attributes


    - `taskAffinity`

    - `launchMode`

    - `allowTaskReparenting`

    - `clearTaskOnLaunch`

    - `alwaysRetainTaskState`

    - `finishOnTaskLaunch`


    as given in the `<activity>` element''s attributes and the `Intent` calling flags


    - `FLAG_ACTIVITY_NEW_TASK`

    - `FLAG_ACTIVITY_CLEAR_TOP`

    - `FLAG_ACTIVITY_SINGLE_TOP`


    you can specify in `Intent.flags = Intent.<FLAG>` where `<FLAG>` is one from the
    list. In case activity attributes and caller flags contradict, the latter win.


    The name of an attribute or flag already gives you a hint what it is supposed
    to do. For more details about them, please see the online documentation.


    # Activities Returning Data


    If you start an activity by


    ```kotlin

    startActivityForResult(intent:Intent, requestCode:Int)

    ```


    it means you expect the called activity to give something back while it returns.
    The construct you use in the called activity reads


    ```kotlin

    val intent = Intent()

    intent.putExtra(...)

    intent.putExtra(...)

    setResult(Activity.RESULT_OK, intent)

    finish()

    ```


    where inside the `.putExtra(...)` method calls you can add whatever data is to
    be returned from the activity. You can, for example, add these lines to the `onBackPressed()`
    event handler method.


    For the `setResult()`''s first argument, you can use either of


    - **`Activity.RESULT_OK`**, if you want to tell the caller the called activity
    successfully finished its job.

    - **`Activity.RESULT_CANCELED`**, if you want to tell the caller the called activity
    did not successfully finish its job. You still can put extra information via `.putExtra(...)`
    to tell what went wrong.

    - **`Activity.RESULT_FIRST_USER + N`**, with N any number from 0, 1, 2, ... for
    any custom result code you want to define. There is practically no limit for N
    (the maximum value reads 2^(31) − 1).


    Note that you need to take care of also handling back-press events if you have
    a toolbar. One possibility is to add to the `onCreate()` method lines as follows:


    ```kotlin

    setSupportActionBar(toolbar)

    supportActionBar!!.setDisplayHomeAsUpEnabled(true)

    // The navigation button from the toolbar does not

    // do the same as the BACK button, more precisely

    // it does not call the onBackPressed() method.

    // We add a listener to do it ourselves

    toolbar.setNavigationOnClickListener { onBackPressed() }

    ```


    When the called `Intent` returns the way described previously, the calling component
    needs to be informed of that event. This is done asynchronously, since the `startActivityForResult()`
    immediately returns and does not wait for the called activity to finish. The way
    this event gets caught nevertheless is by overriding the `onActivityResult()`
    method:


    ```kotlin

    override

    fun onActivityResult(requestCode:Int, resultCode:Int,

    data:Intent) {

    // do something with ''requestCode'' and ''resultCode''

    // returned data is inside ''data''

    }

    ```


    The `requestCode` is whatever you set inside the `startActivityForResult()` as
    `requestCode`, and the `resultCode` is what you wrote as first argument in `setResult()`
    in the called activity.


    ## Caution


    On some devices the `requestCode` has its most significant bit set to 1, no matter
    what was set before. To be on the safe side, you can use the Kotlin construct
    `val requestCodeFixed = requestCode and 0xFFFF` inside `onActivityResult()`.'
