    \ is the `android:showAsAction` attribute – setting it to \"ifRoom\" allows for\
    \ prominently placing the menu item inside the action bar as a separate action\
    \ element.\n\n## Context Menu\n\nA context menu shows up after a long tap on a\
    \ registered view. To do this registration, inside the activity call `registerForContextMenu()`\
    \ and provide the view as an argument:\n\n```kotlin\noverride fun onCreate(savedInstanceState:\
    \ Bundle?) {\n...\nregisterForContextMenu(myViewId)\n}\n```\n\nThis can be done\
    \ several times if you want the context menu to show up for several views.\n\n\
    Once a context menu is registered, you define it by overwriting `onCreateContextMenu(...)`\
    \ inside the activity and furthermore overwriting `onContextItemSelected` to listen\
    \ to menu select events. An example would be:\n\n```kotlin\noverride\nfun onCreateContextMenu(menu:\
    \ ContextMenu, v: View,\nmenuInfo: ContextMenuInfo?) {\nsuper.onCreateContextMenu(menu,\
    \ v, menuInfo)\nval inflater = menuInflater\ninflater.inflate(R.menu.context_menu,\
    \ menu)\n}\noverride\nfun onContextItemSelected(item: MenuItem): Boolean {\nwhen\
    \ (item.itemId) {\nctxmenu_item1 -> {\nToast.makeText(this,\"CTX Item 1\",\nToast.LENGTH_LONG).show()\n\
    }\nctxmenu_item2 -> {\nToast.makeText(this,\"CTX Item 2\",\nToast.LENGTH_LONG).show()\n\
    }\nelse -> return\nsuper.onContextItemSelected(item)\n}\nreturn true\n}\n```\n\
    \nThe XML definition goes to a standard menu XML file, for the example `res/context_menu.xml`:\n\
    \nIt is also possible to open a context menu programmatically by `openContextMenu(\
    \ someView )` inside an activity.\n\n## Contextual Action Mode\n\nThe *contextual\
    \ action mode* behaves like a context-relative app bar. While a standard app bar\
    \ is static to the app, a contextual action mode is view specific. What you have\
    \ to do for this kind of context menu is as follows:\n\n- Implement the `ActionMode.Callback`\
    \ interface.\n- Inside `onCreateActionMode(...)` create the menu, similar to `onCreateContextMenu()`\
    \ earlier for the standard context menu.\n- Inside `onPrepareActionMode(...)`\
    \ return `false`, unless you need special preparation steps.\n- Implement `onActionItemClicked(...)`\
    \ to listen to touch events.\n- Create a menu XML resource file, as for the standard\
    \ context menu.\n- Inside your code, open the contextual action mode by calling\
    \ `startActionMode( theActionModeCallback )`.\n\n## Popup Menus\n\nWhile context-related\
    \ menus are mostly for settings that are not subject to be changed often, menus\
    \ that belong to a front-end workflow best are implemented as popup menus. Popups\
    \ usually show up as a result of the user interacting with a certain view, so\
    \ popup menus are assigned to UI elements.\n\nShowing the popup menu of a view\
    \ after some user action can be as easy as calling a function:\n\n```kotlin\n\
    fun showPopup(v: View) {\nPopupMenu(this, v).run {\nsetOnMenuItemClickListener\
    \ { menuItem ->\nToast.makeText(this@TheActivity,\nmenuItem.toString(),\nToast.LENGTH_LONG).show()\n\
    true\n}\nmenuInflater.inflate(popup, menu)\nshow()\n}\n}\n```\n\nAs usual, you\
    \ also need to define the menu inside the `res/menu` resources – for the example,\
    \ a file `popup.xml` (as seen by the first argument to `inflate(...)`).\n\n##\
    \ Progress Bars\n\nShowing progress bars is a good means to improve user experience\
    \ for tasks that are running a couple of seconds. To implement progress bars,\
    \ add a `ProgressBar` view to your layout. It doesn't matter whether you do that\
    \ inside the XML layout file or from inside the Kotlin program. In XML you write:\n\
    \n```xml\n<ProgressBar\n    android:id=\"@+id/progressBar\"\n    style=\"?android:attr/progressBarStyleHorizontal\"\
    \n    android:layout_width=\"match_parent\"\n    android:layout_height=\"wrap_content\"\
    \ />\n```\n\nfor an indeterminate bar (if you can't tell the progress as a percentage\
    \ value) or:\n\n```xml\n<ProgressBar\n    android:id=\"@+id/progressBar\"\n  \
    \  style=\"?android:attr/progressBarStyleHorizontal\"\n    android:layout_width=\"\
    match_parent\"\n    android:layout_height=\"wrap_content\"\n    android:max=\"\
    100\" />\n```\n\nfor a determinate progress bar (you know the percentage while\
    \ updating the progress bar).\n\nInside the code you toggle the visibility of\
    \ an indeterminate progress bar by using:\n\n```kotlin\nprogressBar.visibility\
    \ = View.INVISIBLE\n// or .. = View.VISIBLE\n```\n\nTo set the progress value\
    \ for a determinate progress bar, see the following example:\n\n```kotlin\nwith(progressBar)\
    \ {\nif (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O)\nmin = 0\nmax = 100\n\
    }\nvar value = 0\nThread {\nwhile(value < 100) {\nvalue += 1\nThread.sleep(200)\n\
    runOnUiThread {\nprogressBar.progress = value\n}\n}\nprogressBar.visibility =\
    \ View.INVISIBLE\n}.start()\n```\n\nHere we use a background thread to simulate\
    \ the longer-running task – in a real-world app, something more sensible will\
    \ be happening in the background. And maybe you use an `AsyncTask` instead of\
    \ a thread.\n\n## Working with Fragments\n\nA *fragment* is a reusable modular\
    \ part of an activity. If you develop a nontrivial app without fragments, you\
    \ will have a number of activities calling each other. The problem with that is\
    \ that on devices with larger screens, this is maybe not the optimal solution\
    \ if the activities stay in close relation to each other. Consider, for example,\
    \ a list of some items in one activity and a details view of a selected item in\
    \ another activity. On a small device, it is perfectly acceptable to start the\
    \ details activity once the user clicks an item in the list activity. On a larger\
    \ screen however, it might improve user experience if both views, the list and\
    \ the details, show up side by side.\n\nThat is where fragments come handy. Instead\
    \ of switching between activities, you create several fragments that are part\
    \ of the *same* activity. Then, depending on the device, you choose either the\
    \ one-pane view or the two-pane view.\n\nDeveloping for fragments is easy if you\
    \ perform a transition from an app that consists only of activities. Fragments\
    \ have a lifecycle just as activities do, and the lifecycle callbacks are very\
    \ similar if not the same as for activities. This is where the story gets a little\
    \ bit complicated, though, because the lifecycle of the container activity and\
    \ the lifecycles of the contained fragments are connected to each other and fragments\
    \ also exhibit a dedicated callstack behavior. The online documentation for fragments\
    \ gives you a detailed reference for all fragment-related issues. Here in this\
    \ section, we however limit the survey to basic aspects of creating and using\
    \ fragments.\n\n### Creating Fragments\n\nTo create fragments you have two options:\
    \ either you specify `Fragment` elements inside a layout file, or you add fragments\
    \ programmatically from inside Kotlin code.\n\nTo use the XML way of adding fragments\
    \ to your app, inside a layout file, you identify appropriate places where to\
    \ add fragments and write:\n\n```xml\n<fragment\n    android:name=\"com.example.myapp.MyFragment\"\
    \n    android:id=\"@+id/myFragment\"\n    android:layout_width=\"match_parent\"\
    \n    android:layout_height=\"match_parent\" />\n```\n\nwhere layouting parameters\
    \ are to be chosen according to your app's layouting needs. For different devices,\
    \ more precisely different screen sizes, you can provide several distinct layout\
    \ files that contain varying numbers of fragments at varying places.\n\nFor the\
    \ fragment class, designated by the \"name\" attribute in the XML file, start\
    \ with a bare minimum like:\n\n```kotlin\nimport android.support.v4.app.Fragment\n\
    ...\nclass MyFragment : Fragment() {\noverride\nfun onCreateView(inflater: LayoutInflater?,\n\
    container: ViewGroup?,\nsavedInstanceState: Bundle?): View? {\nreturn inflater!!.inflate(\n\
    my_fragment, container, false)\n}\n}\n```\n\nand add a layout file `my_fragment.xml`\
    \ to the `res/layout` resource folder."
