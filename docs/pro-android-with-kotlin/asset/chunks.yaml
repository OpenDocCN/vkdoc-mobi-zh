    ## Retrieving Sensor Capabilities


    Beginning with Android 4.0 or API level 14, Android devices are supposed to provide
    all sensor types as defined by the various `android.hardware.Sensor.TYPE_`* constants.
    To see a list of all sensors including various information about them, use the
    following code snippet:


    ```

    val sensorManager = getSystemService(

    Context.SENSOR_SERVICE) as SensorManager

    val deviceSensors =

    sensorManager.getSensorList(Sensor.TYPE_ALL)

    deviceSensors.forEach { sensor ->

    Log.e("LOG", "+++" + sensor.toString())

    }

    ```


    To fetch a certain sensor instead, use for example:


    ```

    val magneticFieldSensor = sensorManager.getDefaultSensor(

    Sensor.TYPE_MAGNETIC_FIELD)

    ```


    Once you have a `Sensor` object, you can obtain various information about it.
    Please see the API documentation of `android.hardware.Sensor` for details. To
    find out sensor values, see the following section.


    ## Listening to Sensor Events


    Android allows for the following two sensor event listeners:


    - Changes in a sensor''s accuracy

    - Changes in a sensor''s value


    To register for a listener, fetch the sensor manager and the sensor as described
    in the preceding section and then use inside the activity something like:


    ```

    val sensorManager = getSystemService(

    Context.SENSOR_SERVICE) as SensorManager

    val magneticFieldSensor = sensorManager.getDefaultSensor(

    Sensor.TYPE_MAGNETIC_FIELD)

    sensorManager.registerListener(this,

    magneticFieldSensor,

    SensorManager.SENSOR_DELAY_NORMAL)

    ```


    For the temporal resolution, you can also use one of the other delay specifications
    `SensorManager.SENSOR_DELAY_`*.


    The activity must then overwrite `android.hardware.SensorEventListener` and implement
    it:


    ```

    class MainActivity : ActivityCompat(),

    SensorEventListener {

    private lateinit var sensorManager:SensorManager

    private lateinit var magneticFieldSensor:Sensor

    override fun onCreate(savedInstanceState: Bundle?) {

    ...

    sensorManager =

    getSystemService(Context.SENSOR_SERVICE)

    as SensorManager

    magneticFieldSensor =

    sensorManager.getDefaultSensor(

    Sensor.TYPE_MAGNETIC_FIELD)

    }

    override

    fun onAccuracyChanged(sensor: Sensor, accuracy: Int) {

    // Do something here if sensor accuracy changes.

    }

    override

    fun onSensorChanged(event: SensorEvent) {

    Log.e("LOG", Arrays.toString(event.values))

    // Do something with this sensor value.

    }

    override

    fun onResume() {

    super.onResume()

    sensorManager.registerListener(this,

    magneticFieldSensor,

    SensorManager.SENSOR_DELAY_NORMAL)

    }

    override

    fun onPause() {

    super.onPause()

    sensorManager.unregisterListener(this)

    }

    }

    ```


    As seen in this example, it is important to unregister sensor event listeners
    when no longer needed, since sensors may substantially drain battery power.


    > **Note**: Other than what the name suggests, `onSensorChanged` events might
    be fired even when there is not really a sensor value change.


    All possible sensor values you get from `SensorEvent.values` inside `onSensorChanged()`
    are listed in Table 14-3.


    ### Table 14-3: Sensor Event Values


    | Type | Values |

    | --- | --- |

    | `TYPE_ACCELEROMETER` | Vector3: Acceleration along the x-y-z axes in *m/s²*.
    Includes gravity. |

    | `TYPE_AMBIENT_TEMPERATURE` | Scalar: The ambient air temperature in °C. |

    | `TYPE_GRAVITY` | Vector3: Gravitational force along the x-y-z axes in *m/s²*.
    |

    | `TYPE_GYROSCOPE` | Vector3: Rate of rotation around each of the x-y-z axes,
    in *rad/s*. |

    | `TYPE_LIGHT` | Scalar: Illuminance in *lx*. |

    | `TYPE_LINEAR_ACCELERATION` | Vector3: Acceleration along the x-y-z axes in *m/s²*.
    Without gravity. |

    | `TYPE_MAGNETIC_FIELD` | Vector3: Strength of the geomagnetic field in *μT*.
    |

    | `TYPE_ORIENTATION` | Vector3: Azimuth, Pitch, Roll in degrees. |

    | `TYPE_PRESSURE` | Scalar: Ambient air pressure in *hPa*. |

    | `TYPE_PROXIMITY` | Scalar: Distance from object in *cm*. |

    | `TYPE_RELATIVE_HUMIDITY` | Scalar: Ambient relative humidity in %. |

    | `TYPE_ROTATION_VECTOR` | Vector4: Rotation vector as a quaternion. |

    | `TYPE_SIGNIFICANT_MOTION` | The event gets fired each time a significant motion
    is detected. To catch this event, you must register via `SensorManager.requestTriggerSensor(...)`.
    |

    | `TYPE_STEP_COUNTER` | Scalar: Accumulated step count since reboot and while
    the sensor is activated. |

    | `TYPE_STEP_DETECTOR` | The event gets fired each time a step is detected. |

    | `TYPE_TEMPERATURE` | Deprecated. Scalar: The device''s temperature in °C. |


    Some sensors have an uncalibrated version, which means they show changes more
    accurately, but less accurately relate to a fixed point:


    - `TYPE_ACCELEROMETER_UNCALIBRATED`

    - `TYPE_GYROSCOPE_UNCALIBRATED`

    - `TYPE_MAGNETIC_FIELD_UNCALIBRATED`


    Instead of the `TYPE_ROTATION_VECTOR` sensor, you can also use one of the following:


    - `TYPE_GAME_ROTATION_VECTOR`

    - `TYPE_GEOMAGNETIC_ROTATION_VECTOR`


    The first one does not use a gyroscope and is more accurate for detecting changes,
    but not so accurate to find out where *north* is. The second one uses the magnetic
    field instead of a gyroscope – it is less accurate but also needs less battery
    power.


    ## Interacting with Phone Calls


    Android allows for a couple of ways to interact with incoming or outgoing phone
    calls and the dialing process. The most prominent use cases your app might implement
    for telephony are as follows:


    - Monitor state changes of the telephone, like being informed of incoming and
    outgoing calls.

    - Initiate a dialing process to start outgoing calls.

    - Provide your own UI for managing a call.


    You can find telephony-relevant classes and interfaces inside the packages `android.telecom`
    and `android.telephony` and sub-packages.


    ### Monitoring Phone State Changes


    To monitor phone state changes, add the following permissions to `AndroidManifest.xml`:


    The `READ_PHONE_STATE` permission allows to detect the status of ongoing calls.
    The `PROCESS_OUTGOING_CALLS` permission lets your app see the number of outgoing
    calls or even use a different number or cancel calls. For how to acquire permissions
    from inside your app, please see Chapter [7](#463716_2_En_7_Chapter.xhtml).


    For listening to phone-related events, you then add a broadcast receiver inside
    `AndroidManifest.xml`:


    ```

    ...

    ```


    And implement it, for example, as follows:


    ```

    package ...

    import android.telephony.TelephonyManager as TM

    import ...

    class CallMonitor : BroadcastReceiver() {

    companion object {

    private var lastState = TM.CALL_STATE_IDLE

    private var callStartTime: Date? = null

    private var isIncoming: Boolean = false

    private var savedNumber: String? = null

    }

    ```


    The `onReceive()` callback handles incoming broadcasts, this time an incoming
    or outgoing call.'
