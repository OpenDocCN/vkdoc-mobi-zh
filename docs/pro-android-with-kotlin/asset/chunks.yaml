  raw: "Unit Tests\nUnit tests aim \nat the class level and test low-level functional\
    \ aspects of your app. By\n“functional” I mean unit tests usually check deterministic\
    \ relations\nbetween input and output of a method call, maybe but not necessarily\n\
    including state variables of class instances in a deterministic,\nstraightforward\
    \ manner.\n\nStandard Unit Tests\nIn an Android environment, standard unit tests\
    \ \nrun without dependency on the device hardware nor any Android framework\n\
    classes and are thus executed on the development machine.\nThis is typically useful\
    \ for libraries and not so much GUI-related\nfunctionalities. That is why the\
    \ applicability of this kind of unit\ntests is somewhat limited for most Android\
    \ apps.\n\nHowever, if your app’s classes contain method calls and you can\nanticipate\
    \ the call result given various sets of inputs, using standard\nunit tests makes\
    \ sense. It is easy to add unit tests to your app. In\nfact, if you start a new\
    \ project using Android Studio, all is set up  for you, and\nyou even get a sample\
    \ test class. See Figure [15-1](#463716_2_En_15_Chapter.xhtml#Fig1).\n\n![](images/463716_2_En_15_Chapter/463716_2_En_15_Fig1_HTML.jpg)\n\
    \nA list of folders and applications for a test set up. The Example\nUnitTest\
    \ is highlighted.\n\nFigure 15-1\nInitial Unit Test Setup\n\nSo you immediately\
    \ can start writing unit tests using that test class  as an example –\njust add\
    \ more test classes to the *test* section of the source\ncode.\n\nNote\n\nWhile\
    \ not technically necessary, a common convention is to use the\nsame names for\
    \ the test classes as the classes under test, with a “Test”\nappended. So the\
    \ test class for `com.example.myapp.TheClass`\nshould be called `com.example.myapp.TheClassTest`.\n\
    \nTo run the unit tests inside Android Studio, right-click the\n*test* section\
    \ and select “Run Tests in …” or “Debug Tests in\n…”.\n\nUnit Tests with a Stubbed\
    \ Android Framework\nBy default, the Gradle plugin used for executing unit tests\
    \ contains\na stubbed \nversion of the Android framework, throwing an exception\
    \ whenever an\nAndroid class gets called.\n\nYou can change this behavior by adding\
    \ to the app’s `build.gradle` file:\n\n```\nandroid {\n...\ntestOptions {\nunitTests.returnDefaultValues\
    \ = true\n}\n}\n```\n\nAny call of an Android class’s method then does nothing\
    \ and returns\n`null` on\ndemand.\n\nUnit Tests with a Simulated Android Framework\n\
    If you need to access Android classes  from inside\nyour unit tests and expect\
    \ them to do real things, using the\ncommunity-supported *Robolectric* framework\
    \ as a unit test\nimplementation is a valid option. With Robolectric you can simulate\n\
    button clicks, reading and writing text, and lots of other GUI-related\nactivities.\
    \ Still all that runs on your development machine, which\nconsiderably speeds\
    \ up testing.\n\nTo allow your project to use Robolectric, add to your app’s `build.gradle`\
    \ file:\n\n```\nandroid {\ntestOptions {\nunitTests {\nincludeAndroidResources\
    \ = true\n}\n}\n}\ndependencies {\n...\n//testImplementation 'junit:junit:4.12'\n\
    testImplementation \"org.robolectric:robolectric:4.8.1\"\n}\n```\n\nAs an example,\
    \ a test class that simulates a click on a `Button` and then\nchecks whether the\
    \ click action has updated a `TextView` reads\n\n```\npackage com.example.robolectric\n\
    import org.junit.runner.RunWith\nimport org.robolectric.RobolectricTestRunner\n\
    import org.robolectric.shadows.ShadowApplication\nimport android.content.Intent\n\
    import android.widget.Button\nimport android.widget.TextView\nimport org.junit.Test\n\
    import org.robolectric.Robolectric\nimport org.junit.Assert.*\n@RunWith(RobolectricTestRunner::class)\n\
    class MainActivityTest {\n@Test\nfun clickingGo_shouldWriteToTextView() {\nval\
    \ activity = Robolectric.setupActivity(\nMainActivity::class.java!!)\nactivity.findViewById(R.id.go).\n\
    performClick()\nassertEquals(\"Clicked\",\nactivity.findViewById(\nR.id.tv).text)\n\
    }\n}\n```\n\nYou start that test like any normal unit test by right-clicking the\n\
    *test* section and selecting “Run Tests in …” or “Debug Tests in\n…”.\nFor more\
    \ test options\n and details, please see the home page of Robolectric at [`www.robolectric.org`](http://www.robolectric.org)\
    \ .\n\nUnit Tests with Mocking\nMocking  means\nyou let the test hook into the\
