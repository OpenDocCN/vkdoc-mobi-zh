    以下是关于 `CameraSession` 类的一些说明：


    * 模拟器不具备自动对焦功能。代码已对此进行了处理。

    * 术语“预捕获”只是*自动曝光*的另一种说法。

    * 在本类中使用闪光灯是一个`待办事项`。如需启用闪光，请查看代码中提及闪光的地方。

    * 通过从 `CameraSession` 开始的监听器链，静态图片捕获数据最终会到达 `MainActivity` 的 `dataArrived(...)`
    方法。在那里，你可以开始编写进一步的处理算法，例如保存、发送、转换、读取等。


    ## Android 与 NFC


    只要 Android 设备具备 NFC 适配器，它就能与其他支持 NFC 的设备或 NFC 标签进行短距离无线通信。我们在第 13 章的“Android 与
    NFC”一节中讨论了 NFC。


    ## Android 与蓝牙


    几乎所有现代 Android 设备都内置了蓝牙。通过蓝牙，它们可以与其他蓝牙设备进行无线通信。详情请参阅第 13 章的“Android 与蓝牙”一节。


    ## Android 传感器


    Android 设备会向应用提供关于其环境的各种信息：


    * 由指南针或陀螺仪确定的方位

    * 由加速度力提供的运动状态

    * 重力

    * 气温和气压、湿度

    * 光照强度'
