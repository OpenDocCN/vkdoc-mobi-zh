    此工具可帮助您管理 Android SDK 的软件包。您可以安装、卸载或更新 SDK 软件包，并可以使用它列出已安装和可用的软件包。调用

    `./sdkmanager --help`

    会显示详细的使用信息。例如，要列出已安装和可用的软件包（包括构建工具、平台、文档、源代码、系统映像以及更多 SDK 组件），请调用

    `./sdkmanager --list`

    要安装新组件，该工具需要下载它们。存在一些标志；请查看 `–help` 的输出以了解如何指定代理或禁用 HTTPS 的使用。


    `uiautomatorviewer`


    打开 UI Automator GUI。用法概要：

    `./uiautomatorviewer`

    这在当前的 JDK 中已失效。请改用虚拟设备扩展控件中的“录制和回放”功能。


    ## 父目录中的工具


    在父目录

    ```

    SDK_INST/tools

    ```

    中，您会找到更多工具。有关这些工具的摘要，请参见表 19-2。


    **表 19-2 更多 SDK 工具**


    | 命令 | 描述 |

    | --- | --- |

    | `android` | **已弃用。** 不带参数调用它以查看概要。 |

    | `emulator` | 模拟器管理工具。我们在第 1 章“虚拟设备”一节中讨论了模拟器。调用 `./emulator -help` 以获取此命令的使用信息。
    |

    | `emulator-check` | 主机的诊断工具。查看 `./emulator-check -h` 的输出以获取概要。 |

    | `mksdcard` | 创建一个用作模拟器映像的 FAT32 映像。不带参数调用它 `./mksdcard` 以获取使用信息。 |

    | `monitor` | 启动图形设备监视器。这与从 Android Studio 内部调用的设备监视器相同，路径为 *Tools ➤ Android ➤
    Android Device Monitor*。请注意，如果在 Android Studio 实例运行时运行此命令，可能会收到错误消息。 |

    | `proguard` | Proguard 程序位于此目录中。使用 Proguard，您可以通过忽略不需要的文件、类、字段和方法来缩减 APK 文件。请在在线文档中查找“Shrink
    Your Code and Resources”以了解 Proguard 的工作原理。 |


    另请参阅[`https://developer.android.com/studio/command-line`](https://developer.android.com/studio/command-line)。


    ## SDK 构建工具


    以下是在文件夹

    ```

    SDK_INST/build-tools/[VERSION]

    ```

    中提供的构建工具。包含链接器、编译器、APK 文件工具和一个 AIDL（Android 接口定义语言）管理工具。请参见表 19-3。


    **表 19-3 SDK 工具**


    | 命令 | 描述 |

    | --- | --- |

    | `aapt` | 这是 Android 资产打包工具。调用不带参数的命令 `./aapt` 会显示使用信息。该工具能够列出 APK 文件的内容，并从中提取信息。此外，它还能够打包资产，以及向
    APK 文件添加和从中删除元素。该工具还负责创建 `R` 类，该类将资源映射到可从代码内部使用的资源 ID（Android Studio 会自动为您完成此操作）。
    |

    | `aapt2` | 这是前述 `aapt` 工具的继任者。调用不带参数的命令 `./aapt2` 会显示一些基本使用信息。调用任何 `./aapt2 CMD
    -h`（其中 `CMD` 为 “compile”、“link”、“dump”、“diff”、“optimize” 和 “version” 之一）会提供更详细的信息。与
    `aapt` 命令的帮助进行交叉核对可获得额外帮助。 |

    | `aarch64-linux-android-ld` | 针对具有 64 位 ARM 架构的设备的 Android 目标文件的专用链接器。调用命令 `./aarch64-linux-android-ld
    --help` 会显示详细的使用信息。如果您使用 Android Studio，通常不必直接调用该工具，因为它会为您处理编译和链接。 |

    | `aidl` | AIDL 是 Android 接口定义语言，用于处理不同应用的 *Bound Service* 类之间的低级进程间通信。`aidl`
    工具可用于将 `*.aidl` 接口定义文件编译成定义接口的 Java 语言接口文件。调用不带参数的 `./aidl` 命令会显示使用信息。 |

    | `apksigner` | 管理 APK 文件签名。APK 文件在发布前需要签名。Android Studio 会帮助您完成此过程 – 请参阅 *Build
    ➤ Generate Signed APK* – 但您也可以使用此工具。调用 `./apksigner -h` 以获取使用信息。 |

    | `arm-linux-androideabi-ld` | 针对具有 32 位 ARM 架构的设备，以及针对已由 ABI 编译器生成的目标文件的 Android
    目标文件的专用链接器。调用命令 `./arm-linux-androideabi-ld --help` 会显示详细的使用信息。如果您使用 Android Studio，通常不必直接调用该工具，因为它会为您处理编译和链接。
    |

    | `bcc_compat` | Android 用于 *renderscript* 的 BCC 编译器。调用命令 `./bcc_compat --help`
    会显示使用信息。 |

    | `dexdump` | 用于调查 DEX 文件的工具，DEX 文件位于 APK 文件内部并包含类。不带参数调用 `./dexdump` 会显示使用信息。
    |

    | `d8` | 用于管理 DEX 文件的工具。例如，您可以创建 DEX 文件或转储其内容。调用 `./dx --help` 以获取使用信息。 |

    | `i686-linux-android-ld` | 针对具有 x86 架构的设备的 Android 目标文件的链接器。调用命令 `./i686-linux-android-ld
    --help` 会显示详细的使用信息。如果您使用 Android Studio，通常不必直接调用该工具，因为它会为您处理编译和链接。 |

    | `llvm-rs-cc` | renderscript 源码编译器（离线模式）。调用 `./llvm-rs-cc --help` 以查看一些使用信息。
    |

    | `mipsel-linux-android-ld` | 针对具有 MIPS 架构的设备的 Android 目标文件的链接器。调用命令 `./mipsel-linux-android-ld
    --help` 会显示详细的使用信息。如果您使用 Android Studio，通常不必直接调用该工具，因为它会为您处理编译和链接。 |

    | `split-select` | 允许根据目标设备配置生成选择 *Split APK* 的逻辑。调用命令 `./split-select --help`
    会显示一些使用信息。 |

