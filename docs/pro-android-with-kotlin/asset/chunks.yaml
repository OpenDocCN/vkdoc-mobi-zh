  raw: "We start with three utility classes. The first class is an extension of\n\
    a `TextureView`.\nWe use a  `TextureView` \nsince it allows for a more rapid connection\
    \ between the camera hardware\nand the screen, and we extend it so it gets adapted\
    \ better to the fixed\nratio output of the camera. The listing reads\n\n```\n\
    /**\n* A custom TextureView which is able to automatically\n* crop its size according\
    \ to an aspect ratio set\n*/\nclass AutoFitTextureView : TextureView {\nconstructor(context:\
    \ Context) : super(context)\nconstructor(context: Context, attrs: AttributeSet?)\
    \ :\nsuper(context, attrs)\nconstructor(context: Context, attrs: AttributeSet?,\n\
    attributeSetId: Int) :\nsuper(context, attrs, attributeSetId)\nvar mRatioWidth\
    \ = 0\nvar mRatioHeight = 0\n/**\n* Sets the aspect ratio for this view. The size\
    \ of\n* the view will be measured based on the ratio\n* calculated from the parameters.\
    \ Note that the\n* actual sizes of parameters don't matter, that\n* is, calling\
    \ setAspectRatio(2, 3) and\n* setAspectRatio(4, 6) make the same result.\n*\n\
    * @param width  Relative horizontal size\n* @param height Relative vertical size\n\
    */\nfun setAspectRatio(width:Int, height:Int) {\nif (width < 0 || height < 0)\
    \ {\nthrow IllegalArgumentException(\n\"Size cannot be negative.\");\n}\nmRatioWidth\
    \ = width;\nmRatioHeight = height;\nrequestLayout()\n}\noverride\nfun onMeasure(widthMeasureSpec:Int,\n\
    heightMeasureSpec:Int) {\nsuper.onMeasure(\nwidthMeasureSpec, heightMeasureSpec)\n\
    val width = MeasureSpec.getSize(widthMeasureSpec)\nval height = MeasureSpec.getSize(heightMeasureSpec)\n\
    if (0 == mRatioWidth || 0 == mRatioHeight) {\nsetMeasuredDimension(width, height)\n\
    } else {\nval ratio = 1.0 * mRatioWidth / mRatioHeight\nif (width < height * ratio)\
    \ {\nsetMeasuredDimension(\nwidth, (width / ratio).toInt())\n} else {\nsetMeasuredDimension(\n\
    (height * ratio).toInt(), height)\n}\n}\n}\n}\n```\n\nThe next utility class queries\
    \ the system for a backface camera  and\nonce found stores its characteristics.\
    \ It reads\n\n```\n/**\n* Find a backface camera\n*/\nclass BackfaceCamera(context:Context)\
    \ {\nvar cameraId: String? = null\nvar characteristics: CameraCharacteristics?\
    \ = null\ninit {\nval manager = context.getSystemService(\nContext.CAMERA_SERVICE)\
    \ as CameraManager\ntry {\nmanager.cameraIdList.find {\nmanager.getCameraCharacteristics(it).\n\
    get(CameraCharacteristics.LENS_FACING) ==\nCameraCharacteristics.LENS_FACING_BACK\n\
    }.run {\ncameraId = this\ncharacteristics = manager.\ngetCameraCharacteristics(this)\n\
    }\n} catch (e: CameraAccessException) {\nLog.e(\"LOG\", \"Cannot access camera\"\
    , e)\n}\n}\n}\n```\n\nThe third utility class performs a couple of calculations\
    \ , which\nhelp us appropriately map camera output dimensions to the texture view\n\
    size. It reads\n\n```\n/**\n* Calculates and holds preview dimensions\n*/\nclass\
    \ PreviewDimension {\ncompanion object {\nval LOG_KEY = \"PreviewDimension\"\n\
    // Max preview width guaranteed by Camera2 API\nval MAX_PREVIEW_WIDTH = 1920\n\
    // Max preview height guaranteed by Camera2 API\nval MAX_PREVIEW_HEIGHT = 1080\n\
    val ORIENTATIONS = SparseIntArray().apply {\nappend(Surface.ROTATION_0, 90);\n\
    append(Surface.ROTATION_90, 0);\nappend(Surface.ROTATION_180, 270);\nappend(Surface.ROTATION_270,\
    \ 180);\n}\n```\n\nAs a companion function, we need a method that, given sizes\
    \  supported by a\ncamera, chooses the smallest one that is at least as large\
    \ as the\nrespective texture view size and that is at most as large as the\nrespective\
    \ max size and whose aspect ratio matches with the specified\nvalue. If such a\
    \ size doesn’t exist, it chooses the largest one that is\nat most as large as\
    \ the respective max size and whose aspect ratio\nmatches with the specified value:\n\
    \n```\n/**\n* Calculate the optimal size.\n*\n* @param choices           The list\
    \ of sizes\n*     that the camera supports for the intended\n*     output class\n\
    * @param textureViewWidth  The width of the\n*     texture view relative to sensor\
    \ coordinate\n* @param textureViewHeight The height of the\n*     texture view\
    \ relative to sensor coordinate\n* @param maxWidth          The maximum width\n\
    *     that can be chosen\n* @param maxHeight         The maximum height\n*   \
    \  that can be chosen\n* @param aspectRatio       The aspect ratio\n* @return\
    \ The optimal size, or an arbitrary one\n*     if none were big enough\n*/\nfun\
    \ chooseOptimalSize(choices: Array?,\ntextureViewWidth: Int,\ntextureViewHeight:\
    \ Int,\nmaxWidth: Int, maxHeight: Int,\naspectRatio: Size): Size {\n// Collect\
    \ the supported resolutions that are\n// at least as big as the preview Surface\n\
    val bigEnough = ArrayList()\n// Collect the supported resolutions that are\n//\
    \ smaller than the preview Surface\nval notBigEnough = ArrayList()\nval w = aspectRatio.width\n\
    val h = aspectRatio.height\nchoices?.forEach { option ->\nif (option.width = textureViewWidth\n\
    && option.height >=\ntextureViewHeight) {\nbigEnough.add(option)\n} else {\nnotBigEnough.add(option)\n\
    }\n}\n}\n// Pick the smallest of those big enough. If\n// there is no one big\
    \ enough, pick the\n// largest of those not big enough.\nif (bigEnough.size >\
    \ 0) {\nreturn Collections.min(bigEnough,\nCompareSizesByArea())\n} else if (notBigEnough.size\
    \ > 0) {\nreturn Collections.max(notBigEnough,\nCompareSizesByArea())\n} else\
    \ {\nLog.e(LOG_KEY,\n\"Couldn't find any suitable size\")\nreturn Size(textureViewWidth,\n\
    textureViewHeight)\n}\n}\n/**\n* Compares two sizes based on their areas.\n*/\n\
    class CompareSizesByArea : Comparator {\noverride\nfun compare(lhs: Size, rhs:\
    \ Size): Int {\n// We cast here to ensure the\n// multiplications won't overflow\n\
    return Long.signum(lhs.width.toLong() *\nlhs.height -\nrhs.width.toLong() * rhs.height)\n\
    }\n}\n}\ninternal var rotatedPreviewWidth: Int = 0\ninternal var rotatedPreviewHeight:\
    \ Int = 0\ninternal var maxPreviewWidth: Int = 0\ninternal var maxPreviewHeight:\
    \ Int = 0\ninternal var sensorOrientation: Int = 0\ninternal var previewSize:\
    \ Size? = null\n```\n\nWe need a method that calculates the preview dimension,\
    \ including the\nsensor orientation. Method `calcPreviewDimension()`\n  does exactly\n\
    that:"
