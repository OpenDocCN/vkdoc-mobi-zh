- fmt: "# Communication\n\nCommunication is about sending data through component or\
    \ app or device boundaries. A standardized way of components of one or more apps\
    \ communicating with each other is using *broadcasts*, which we talked about in\
    \ Chapter [5](#463716_2_En_5_Chapter.xhtml). Another possibility for inter-app\
    \ communication on one device is using `ResultReceiver` objects, which are passed\
    \ by `Intents`. Despite their name they can not only be used to send data back\
    \ to an invoker when an invoked component has done its work, but also anytime\
    \ while it is alive. We used them at a couple of places in this book, but in this\
    \ chapter, we will revise using them to have all communication means together.\n\
    \n## `ResultReceiver` Classes\n\nA `ResultReceiver` object can be passed from\
    \ any one component to another component by assigning it to an `Intent`, so you\
    \ can use it to send data between components of any kind, provided they live on\
    \ the same device.\n\nWe first subclass a `ResultReceiver`, which will later receive\
    \ messages from an invoked component, and write\n\n```\nclass MyResultReceiver\
    \ : ResultReceiver(null) {\n    companion object {\n        val INTENT_KEY = \"\
    my.result.receiver\"\n        val DATA_KEY = \"data.key\"\n    }\n    override\
    \ fun onReceiveResult(resultCode: Int,\n                                 resultData:\
    \ Bundle?) {\n        super.onReceiveResult(resultCode, resultData)\n        val\
    \ d = resultData?.get(DATA_KEY) as String\n        Log.e(\"LOG\", \"Received:\
    \ \" + d)\n    }\n}\n```\n\nOf course you can write more meaningful things inside\
    \ its `onReceiveResult()` function.\n\nTo pass an instance of `MyResultReceiver`\
    \ over to an invoked component, we can now write\n\n```\nIntent(this, CalledActivity::class.java).apply\
    \ {\n    putExtra(MyResultReceiver.INTENT_KEY,\n             MyResultReceiver())\n\
    }.run{ startActivity(this) }\n```\n\nor any other means to invoke another component.\n\
    \nInside the invoked component, you can now at any suitable place send data to\
    \ the invoking component via something like\n\n```\nvar myReceiver:ResultReceiver?\
    \ = null\noverride fun onCreate(savedInstanceState: Bundle?) {\n    super.onCreate(savedInstanceState)\n\
    \    setContentView(R.layout.activity_called)\n    ...\n    myReceiver = intent.\n\
    \        getParcelableExtra(\n            MyResultReceiver.INTENT_KEY)\n}\nfun\
    \ go(v: View) {\n    val bndl = Bundle().apply {\n        putString(MyResultReceiver.DATA_KEY,\n\
    \                  \"Hello from called component\")\n    }\n    myReceiver?.send(42,\
    \ bndl) ?:\n        throw IllegalStateException(\"myReceiver is null\")\n}\n```\n\
    \nInside a production environment, you additionally need to take care of checking\
    \ whether the recipient is still alive – I left this check out for brevity. Also\
    \ note that on the sending side, a reference to the `ResultReceiver` implementation\
    \ is actually not needed – if you communicate through app boundaries, you can\
    \ just write\n\n```\n...\nval INTENT_KEY = \"my.result.receiver\"\nval DATA_KEY\
    \ = \"data.key\"\n...\nval myReceiver = intent.\n    getParcelableExtra(\n   \
    \     INTENT_KEY)\n...\nval bndl = Bundle().apply {\n    putString(DATA_KEY,\n\
    \              \"Hello from called component\")\n}\nmyReceiver?.send(42, bndl)\n\
    ```\n\n## Communication with Back Ends\n\nUsing a cloud-based provider like `Firebase`\
    \ for connecting your app to other apps on other devices, as described in Chapter\
    \ [10](#463716_2_En_10_Chapter.xhtml), certainly exhibits different merits. You\
    \ have a reliable message broker with message backup facilities, analytics, and\
    \ more. But using the cloud has its disadvantages as well. Your data, be it encrypted\
    \ or not, will leave your house even for corporate apps, and you cannot be 100%\
    \ sure the provider will not change the API at some point in the future, forcing\
    \ you to change your app. So, if you need more control, you can abandon the cloud\
    \ and use direct networking instead.\n\nFor directly using network protocols to\
    \ communicate with devices or application servers, you basically have two options:\n\
    \n*   **Use `javax.net.ssl.HttpsURLConnection`.**  \n    This provides for a low-level\
    \ connectivity, but with already TLS, streaming capabilities, timeouts, and connection\
    \ pooling included. As you can see from the class name, it is part of the standard\
    \ Java API, so you will find lots of information about it on the Web. We nevertheless\
    \ give a description in the following section.\n\n*   **Use the Volley API included\
    \ with Android.**  \n    This is a higher-level wrapper around basic networking\
    \ functions. Using `Volley` considerably simplifies network-based development,\
    \ so it is generally the first candidate for using networking in Android.\n\n\
    In both cases you need to add appropriate permissions inside `AndroidManifest.xml`.\n\
    \n## Communication with `HttpsURLConnection`\n\nBefore using a network communication\
    \ API, we need to make sure networking operations happen in the background – modern\
    \ Android versions even won’t allow you to perform networking in the UI thread.\
    \ But even without that restriction, it is highly recommended to always perform\
    \ networking in a background task. We talked about background operation in section\
    \ \"Background Tasks\" of Chapter [9](#463716_2_En_9_Chapter.xhtml). A first method\
    \ you want to look at is running network operations inside a suspending function\
    \ (part of the coroutines technology), but you are free to choose other means\
    \ as well. The following sections assume the snippets presented there are running\
    \ in the background.\n\nUsing class `HttpsURLConnection`-based communication boils\
    \ down to\n\n```\nfun convertStreamToString(istr: InputStream): String {\n   \
    \ val s = Scanner(istr).useDelimiter(\"\\\\A\")\n    return if (s.hasNext()) s.next()\
    \ else \"\"\n}\n// This is a convention for emulated devices\n// addressing the\
    \ host (development PC)\nval HOST_IP = \"10.0.2.2\"\nval url = \"https://${HOST_IP}:6699/test/person\"\
    \nvar stream: InputStream? = null\nvar connection: HttpsURLConnection? = null\n\
    var result: String? = null\ntry {\n    connection = (URL(uri.toString()).openConnection()\n\
    \            as HttpsURLConnection).apply {\n        // ! ONLY FOR TESTING ! \
    \ No SSL hostname verification\n        class TrustAllHostNameVerifier : HostnameVerifier\
    \ {\n            override\n            fun verify(hostname: String, session: SSLSession):\n\
    \                    Boolean = true\n        }\n        hostnameVerifier = TrustAllHostNameVerifier()\n\
    \        // Timeout for reading InputStream set to 3000ms\n        readTimeout\
    \ = 3000\n        // Timeout for connect() set to 3000ms.\n        connectTimeout\
    \ = 3000\n        // For this use case, set HTTP method to GET.\n        requestMethod\
    \ = \"GET\"\n        // Already true by default, just telling. Needs to\n    \
    \    // be true since this request is carrying an input\n        // (response)\
    \ body.\n        doInput = true\n        // Open communication link\n        connect()\n\
    \        responseCode.takeIf {\n            it != HttpsURLConnection.HTTP_OK }?.run\
    \ {\n            throw IOException(\"HTTP error code: $this\")\n        }\n  \
    \      // Retrieve the response body\n        stream = inputStream?.also {\n \
    \           result = it.let { convertStreamToString(it) }\n        }\n    }\n\
    } finally {\n    stream?.close()\n    connection?.disconnect()\n}\nLog.e(\"LOG\"\
    , result)\n```\n\nThis example tries to access a GET URL `https://10.0.2.2:6699/test/person`\
    \ targeting your development PC and prints the result in the logs.\n\nNote, if\
    \ your server happens to hold a self-signed certificate for SSL, you must at an\
    \ initialization place, say inside the `onCreate()` callback, add\n\n```\nval\
    \ trustAllCerts =\n    arrayOf(object : X509TrustManager {\n        override\n\
    \        fun getAcceptedIssuers():\n                Array? = null\n        override\n\
    \        fun checkClientTrusted(\n                certs: Array,\n            \
    \    authType: String) {\n        }\n        override\n        fun checkServerTrusted(\n\
    \                certs: Array,\n                authType: String) {\n        }\n\
    \    })\nSSLContext.getInstance(\"SSL\").apply {\n    init(null, trustAllCerts,\
    \ java.security.SecureRandom())\n}.apply {\n    HttpsURLConnection.setDefaultSSLSocketFactory(\n\
    \        socketFactory)\n}\n```\n\nOtherwise, the preceding code will complain\
    \ and fail. Of course you shouldn’t do this in production code and instead add\
    \ a check for the validity of the certificate.\n\n## Networking with Volley\n\n\
    `Volley` is a networking library that simplifies networking for Android. First\
    \ of all `Volley` sends its work to the background by itself; you don’t have to\
    \ take care about that. Other goodies provided by `Volley` are"
