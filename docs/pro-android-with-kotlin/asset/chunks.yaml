    \ // 创建通知渠道，但仅在 API 26 及以上版本中需要\n    val channel = if (Build.VERSION.SDK_INT >=\n\
    \        Build.VERSION_CODES.O) {\n            NotificationChannel(channelId,\n\
    \                \"渠道名称\",\n                NotificationManager.IMPORTANCE_DEFAULT)\n\
    \        } else {\n            throw RuntimeException(\"内部错误\")\n        }\n \
    \   channel.description = \"描述\"\n    // 向系统注册通知渠道\n    val notificationManager\
    \ =\n        if (Build.VERSION.SDK_INT >=\n            Build.VERSION_CODES.M)\
    \ {\n                getSystemService(\n                    NotificationManager::class.java)\n\
    \            } else {\n                throw RuntimeException(\"内部错误\")\n    \
    \        }\n    notificationManager.\n        createNotificationChannel(channel)\n\
    }\n```\n\n我们在前面的章节中已经看到了这段代码。就 Kotlin 语言风格而言，它看起来有点笨拙——引入了多余的 `if` 结构，是为了避免 Android\
    \ Studio 对兼容性问题发出警告。请根据你的需求，在通知渠道的构造函数中调整渠道 ID、渠道名称和重要性等级，就像调整描述文本一样。\n\n顺便提一下，最后一行中的\
    \ `createNotificationChannel()` 方法是幂等的——如果具有相同特征的渠道已经存在，则不会发生任何操作。`NotificationChannel`\
    \ 构造函数中可能的重要性等级包括：`IMPORTANCE_HIGH`（声音和横幅通知）、`IMPORTANCE_DEFAULT`（声音）、`IMPORTANCE_LOW`（无声音）以及\
    \ `IMPORTANCE_MIN`（既无声音也不显示在状态栏中）。\n\n虽然通知渠道的处理方式取决于用户，但在你的代码中，你仍然可以使用 `NotificationChannel`\
    \ 对象的某个 `get*()` 方法来读取用户所做的设置，你可以通过 `getNotificationChannel()` 或 `getNotificationChannels()`\
    \ 从管理器获取该对象。详情请参阅在线 API 文档。\n\n还有一个通知渠道设置界面，你可以通过以下方式调用：\n\n```kotlin\nval intent\
    \ = Intent(\n    Settings.ACTION_CHANNEL_NOTIFICATION_SETTINGS)\nintent.putExtra(Settings.EXTRA_APP_PACKAGE,\n\
    \    getPackageName())\nintent.putExtra(Settings.EXTRA_CHANNEL_ID,\n    myNotificationChannel.getId())\n\
    startActivity(intent)\n```\n\n你还可以通过将通知渠道分组来进一步组织它们，例如，将工作相关渠道和私人类型渠道分开。要创建一个分组，你可以这样编写：\n\
    \n```kotlin\nval groupId = \"my_group\"\n// 用户可见的分组名称。\nval groupName = \"分组名称\"\
    \nval notificationMngr =\n    getSystemService(Context.NOTIFICATION_SERVICE)\n\
    \        as NotificationManager\nnotificationMngr.createNotificationChannelGroup(\n\
    \    NotificationChannelGroup(groupId, groupName))\n```\n\n然后，你可以通过每个通知渠道的 `setGroup()`\
    \ 方法将其添加到该分组中。\n\n## 通知徽章\n\n从 Android 8.0 或 API 级别 26 开始，一旦通知到达系统，应用图标上就会显示一个通知徽章——见图\
    \ 8-5。\n\n![Gmail 的通知徽章。](img/463716_2_En_8_Fig5_HTML.png)\n\n**图 8-5** 通知徽章\n\
    \n你可以通过表 8-5 列出的 `NotificationChannel` 方法之一来控制此徽章。\n\n**表 8-5** 通知徽章\n\n| 方法 |\
    \ 描述 |\n| --- | --- |\n| `setShowBadge(Boolean)` | 是否显示徽章。 |\n| `setNumber(Int)`\
    \ | 长按带有徽章的应用图标将显示已到达的通知数量。你可以通过此方法根据需要调整该数字。 |\n| `setBadgeIconType(Int)` | 长按带有徽章的应用图标将显示与通知关联的图标。你可以通过此方法调整图标大小。可能的取值在\
    \ `NotificationCompat` 类中以常量形式提供：`BADGE_ICON_NONE`、`BADGE_ICON_SMALL` 和 `BADGE_ICON_LARGE`。\
    \ |\n\n## 联系人\n\n管理和使用联系人是手持设备必须胜任的任务之一。毕竟，手持设备，尤其是智能手机，经常用于与其他人通信，而联系人则是代表个人、群组、公司或其他“事物”的抽象实体，作为通信需求的地址点。\n\
    \n联系人如此重要，内置的联系人框架在 Android 的发展历程中已变得相当复杂。幸运的是，如果我们只关注后端部分，并省略本书其他章节描述的用户界面特性，那么复杂性可以有所降低。关于联系人框架的描述，剩下的内容包括：\n\
    \n-   查看内部机制，特别是使用的数据库模型\n-   了解如何读取联系人数据\n-   了解如何写入联系人数据\n-   调用系统活动来处理单个联系人\n\
    -   同步联系人\n-   使用快速联系人徽章\n\n### 联系人框架内部机制\n\n与联系人框架通信的基本类是 `android.content.ContentResolver`\
    \ 类。这非常合理，因为联系人数据非常适合内容提供者处理。因此，你通常会使用内容提供者操作来处理联系人数据。参见第 6 章。\n\n数据模型由三个主要表组成：*联系人*、*原始联系人*和*数据*表。此外，还存在一些用于管理任务的辅助表。你通常不需要处理任何形式的直接表访问，但如果你感兴趣，可以查看在线联系人框架文档以及\
    \ `ContactsContract` 类的文档，后者详细描述了联系人的内容提供者契约。\n\n如果你想直接查看联系人表，可以使用 ADB（针对虚拟设备或已\
    \ root 的设备），在终端中通过 `cd SDK_INST/platform-tools ; ./adb root ; ./adb shell` 创建对设备的\
    \ shell 访问——参见第 19 章“SDK 平台工具”部分——然后从那里按如下方式调查表：\n\n```bash\ncd /data\nfind .\
    \ -name 'contacts*.db'\n# \nsqlite3 \n```\n\n例如，输入 `.header on` 打开表头输出，`.tables`\
    \ 列出所有表名，`select * from raw_contacts;` 列出原始联系人表。\n\n### 读取联系人\n\n为了读取一定数量的联系人（可能基于某些条件），你最好使用\
    \ `ViewModel` 作为视图数据持有者，用 `LiveData` 包装模型元素以确保模型更改能反映在屏幕重绘上，应用协程异步加载数据，并采用 Jetpack\
    \ Compose 库实现优雅的前端设计。\n\n> **注意：** 以前你会使用加载器，但这些已被弃用。使用 `ViewModel`、`LiveData`、协程和\
    \ Jetpack Compose 的组合可以确保你紧跟最新、最优雅的 Android 开发技术。\n\n为了让这一切生效，请将以下依赖项添加到 `build.gradle`\
    \ 中：\n\n```groovy\ndef compose_version = '1.1.1'\nimplementation 'androidx.core:core-ktx:1.7.0'\n\
    implementation \"androidx.compose.ui:\" +\n    \"ui:$compose_version\"\nimplementation\
    \ \"androidx.compose.foundation:\" +\n    \"foundation:$compose_version\"\nimplementation\
    \ \"androidx.compose.material:\" +\n    \"material:$compose_version\"\nimplementation\
    \ \"androidx.compose.ui:\" +\n    \"ui-tooling-preview:$compose_version\"\nimplementation\
    \ 'androidx.lifecycle:' +\n    'lifecycle-runtime-ktx:2.3.1'\nimplementation 'androidx.lifecycle:'\
    \ +\n    'lifecycle-extensions:2.2.0'\nimplementation \"androidx.lifecycle:\"\
    \ +\n    \"lifecycle-livedata-ktx:2.4.1\"\nimplementation \"androidx.compose.runtime:\"\
    \ +\n    \"runtime-livedata:$compose_version\"\nimplementation 'androidx.activity:'\
    \ +\n    'activity-compose:1.3.1'\n// 我们需要这个来进行权限查询\n// 使用 JetPack Compose：\n\
    implementation \"com.google.accompanist:\" +\n    \"accompanist-permissions:0.23.1\"\
    \n```\n"
- fmt: "# 排版后的文档\n\n为了从联系人相关的数据库中读取数据，我们为每个联系人声明了一个`data class`和一个用于读取数据的数据源类：\n\n\
    ```kotlin\npackage book.andrkotlpro.mycontacts1.db\nimport android.content.ContentResolver\n\
    import android.content.ContentUris\nimport android.net.Uri\nimport android.provider.ContactsContract\n\
    data class MyContact(val id:String, val lookupKey,\nval display:String, val email:String)\n\
    class MyContactsDataSource(\nprivate val contentResolver: ContentResolver) {\n\
    fun fetchContactsPrimary(): List {\nval result: MutableList =\nmutableListOf()\n\
    val CONTENT_URI =\nContactsContract.Contacts.CONTENT_URI\nval PROJECTION = arrayOf(\n\
    ContactsContract.Contacts._ID,\nContactsContract.Contacts.LOOKUP_KEY,\nContactsContract.Contacts.DISPLAY_NAME_PRIMARY)\n\
    val SORT_ORDER = ContactsContract.Contacts.\nDISPLAY_NAME_PRIMARY\nval cursor\
    \ = contentResolver.query(\nCONTENT_URI,\nPROJECTION,\nnull,\nnull,\nSORT_ORDER\n\
    )\ncursor?.let {\ncursor.moveToFirst()\nwhile (!cursor.isAfterLast) {\nresult.add(\n\
    MyContact(\ncursor.getString(0),\ncursor.getString(1),\ncursor.getString(2),\n\
    \"\"\n)\n)\ncursor.moveToNext()\n}\ncursor.close()\n}\nreturn result.toList()\n\
    }\nfun fetchContactsData(): List {\nval result: MutableList =\nmutableListOf()\n\
    val CONTENT_URI =\nContactsContract.Data.CONTENT_URI\nval PROJECTION = arrayOf(\n\
    ContactsContract.Data._ID,\nContactsContract.Data.LOOKUP_KEY,\nContactsContract.Data.DISPLAY_NAME_PRIMARY,\n\
    ContactsContract.CommonDataKinds.Email.ADDRESS)\nval SELECTION =\nContactsContract.Data.MIMETYPE\
    \ + \" = '\" +\nContactsContract.CommonDataKinds.Email.\nCONTENT_ITEM_TYPE +\n\
    \"'\"\nval SORT_ORDER = ContactsContract.Data.\nDISPLAY_NAME_PRIMARY\nval cursor\
    \ = contentResolver.query(\nCONTENT_URI,\nPROJECTION,\nSELECTION,\nnull,\nSORT_ORDER\n\
    )\ncursor?.let {\ncursor.moveToFirst()\nwhile (!cursor.isAfterLast) {\nresult.add(\n\
    MyContact(\ncursor.getString(0),\ncursor.getString(1),\ncursor.getString(2),\n\
    cursor.getString(3)\n)\n)\ncursor.moveToNext()\n}\ncursor.close()\n}\nreturn result.toList()\n\
    }\n}\n```\n\n`MyContactsDataSource`类提供了两个函数`fetchContactsPrimary()`和`fetchContactsData()`，用于分别从主联系人表和联系人数据表中读取数据。只有后者包含电子邮件地址，因此第一个函数仅用于演示目的，我们不会在后续代码中使用它。\n\
    \n在`SELECTION`字符串中，你可以根据需要添加搜索条件。其中“?”充当占位符，你可以在`query()`调用的倒数第二个参数中为其填充值，如下所示：\n\
    \n```kotlin\nval SELECTION =\nContactsContract.CommonDataKinds.Email.ADDRESS +\n\
    \" LIKE ? \" + \"AND \" +\nContactsContract.Data.MIMETYPE + \" = '\" +\nContactsContract.\n\
    CommonDataKinds.Email.CONTENT_ITEM_TYPE +\n\"'\"\nval selectionArgs = arrayOf(\"\
    %\" + search + \"%\")\n...\nval cursor = contentResolver.query(\nCONTENT_URI,\n\
    PROJECTION,\nSELECTION,\nselectionArgs,\nSORT_ORDER\n)\n```\n\n还有一些特殊的 URI 可供使用。例如，要通过电子邮件地址查找联系人，你可以使用内容\
    \ URI `ContactsContract.CommonDataKinds.Email.CONTENT_URI`。另一个选项是 URI `ContactsContract.Contacts.CONTENT_FILTER_URI`，它允许将搜索条件添加到\
    \ URI 内部，而不是作为`query()`调用的参数指定：\n\n```kotlin\n...\nval PROJECTION : Array? = null\n\
    val SELECTION : String? = null\nval selectionArgs : Array? = null\nval contentUri\
    \ = Uri.withAppendedPath(\nContactsContract.Contacts.CONTENT_FILTER_URI,\nUri.encode(search))\n\
    Log.e(\"LOG\", contentUri.toString())\n...\n```\n\n请注意，在这种情况下，不允许传递空字符串“”作为搜索条件。\n\
    \n`MyContactsRepository`类将查询封装到一个`suspend function`中，这是协程中用于“允许异步调用”的惯用写法。关于协程的更多信息，请参见[`https://kotlinlang.org/docs/coroutines-overview.xhtml`](https://kotlinlang.org/docs/coroutines-overview.xhtml)：\n\
    \n```kotlin\npackage book.andrkotlpro.mycontacts1.db\nimport kotlinx.coroutines.CoroutineDispatcher\n\
    import kotlinx.coroutines.withContext\nclass MyContactsRepository(\nprivate val\
    \ source: MyContactsDataSource,\nprivate val myDispatcher: CoroutineDispatcher)\
    \ {\nsuspend fun fetchContacts(): List {\nreturn withContext(myDispatcher) {\n\
    source.fetchContactsData()\n}\n}\n}\n```\n\n对于 ViewModel，我们定义了`ContactsViewModel`和`ContactsViewModelFactory`两个类。前者将查询结果列表封装到`LiveData`对象中（用于模型和\
    \ UI 层之间的数据绑定），后者则作为创建 ViewModel 实例的工厂：\n\n```kotlin\npackage book.andrkotlpro.mycontacts1\n\
    import android.app.Application\nimport androidx.lifecycle.*\nimport book.andrkotlpro.mycontacts1.db.*\n\
    import kotlinx.coroutines.Dispatchers\nclass ContactsViewModel (\ncontext: Application,\n\
    private val myContactsRepository: MyContactsRepository\n) : AndroidViewModel(context)\
    \ {\nvar myContacts: LiveData> = liveData {\nemit(myContactsRepository.fetchContacts())\n\
    }\n}\nclass ContactsViewModelFactory(\nprivate val application: Application)\n\
    : ViewModelProvider.AndroidViewModelFactory(\napplication) {\noverride fun \n\
    create(modelClass: Class): T {\nreturn if (modelClass.isAssignableFrom(\nContactsViewModel::class.java))\
    \ {\nval source = MyContactsDataSource(\napplication.contentResolver)\nContactsViewModel(application,\n\
    MyContactsRepository(source,\nDispatchers.IO)) as T\n} else\nthrow IllegalArgumentException(\n\
    \"Unknown ViewModel class\")\n}\n}\n```\n\n在`ContactsViewModelFactory`内部，我们为`MyContactsRepository`实例化使用了`Dispatchers.IO`参数，这使得\
    \ suspend 函数可以在一个专为 IO 后台处理优化的线程池中执行。\n\n清单文件`AndroidManifest.xml`包含了访问联系人数据库表所需的权限：\n\
    \n```xml\n...\n\n...\n```\n\nActivity 类的代码看起来与你习惯的非常不同，如果这是你的第一个 Jetpack Compose\
    \ 项目。最显著的区别是不再使用布局 XML 文件。取而代之的是，前端视图结构采用了类似于构建器的语法，如下所示：\n\n```kotlin\nColumn()\
    \ {\nText(textToShow)\nButton(onClick = { ... }) {\nText(\"Request permission\"\
    )\n}\n}\n```\n\nActivity 类的完整代码如下："
  raw: "For reading the data from the contacts-related content databases, we\ndeclare\
    \ a per-contact `data class` and a data\nsource class for reading the data:\n\n\
    ```\npackage book.andrkotlpro.mycontacts1.db\nimport android.content.ContentResolver\n\
    import android.content.ContentUris\nimport android.net.Uri\nimport android.provider.ContactsContract\n\
    data class MyContact(val id:String, val lookupKey,\nval display:String, val email:String)\n\
    class MyContactsDataSource(\nprivate val contentResolver: ContentResolver) {\n\
    fun fetchContactsPrimary(): List {\nval result: MutableList =\nmutableListOf()\n\
    val CONTENT_URI =\nContactsContract.Contacts.CONTENT_URI\nval PROJECTION = arrayOf(\n\
    ContactsContract.Contacts._ID,\nContactsContract.Contacts.LOOKUP_KEY,\nContactsContract.Contacts.DISPLAY_NAME_PRIMARY)\n\
    val SORT_ORDER = ContactsContract.Contacts.\nDISPLAY_NAME_PRIMARY\nval cursor\
    \ = contentResolver.query(\nCONTENT_URI,\nPROJECTION,\nnull,\nnull,\nSORT_ORDER\n\
    )\ncursor?.let {\ncursor.moveToFirst()\nwhile (!cursor.isAfterLast) {\nresult.add(\n\
    MyContact(\ncursor.getString(0),\ncursor.getString(1),\ncursor.getString(2),\n\
    \"\"\n)\n)\ncursor.moveToNext()\n}\ncursor.close()\n}\nreturn result.toList()\n\
    }\nfun fetchContactsData(): List {\nval result: MutableList =\nmutableListOf()\n\
    val CONTENT_URI =\nContactsContract.Data.CONTENT_URI\nval PROJECTION = arrayOf(\n\
    ContactsContract.Data._ID,\nContactsContract.Data.LOOKUP_KEY,\nContactsContract.Data.DISPLAY_NAME_PRIMARY,\n\
    ContactsContract.CommonDataKinds.Email.ADDRESS)\nval SELECTION =\nContactsContract.Data.MIMETYPE\
    \ + \" = '\" +\nContactsContract.CommonDataKinds.Email.\nCONTENT_ITEM_TYPE +\n\
    \"'\"\nval SORT_ORDER = ContactsContract.Data.\nDISPLAY_NAME_PRIMARY\nval cursor\
    \ = contentResolver.query(\nCONTENT_URI,\nPROJECTION,\nSELECTION,\nnull,\nSORT_ORDER\n\
    )\ncursor?.let {\ncursor.moveToFirst()\nwhile (!cursor.isAfterLast) {\nresult.add(\n\
    MyContact(\ncursor.getString(0),\ncursor.getString(1),\ncursor.getString(2),\n\
    cursor.getString(3)\n)\n)\ncursor.moveToNext()\n}\ncursor.close()\n}\nreturn result.toList()\n\
    }\n}\n```\n\nThe `MyContactsDataSource`\nclass  provides\ntwo functions  `fetchContactsPrimary()`\n\
    \ and  `fetchContactsData()`\n for reading data from the primary contacts table\
    \ and from the\ncontacts Data table, respectively. Only the latter contains the\
    \ email\naddress, so the first one is here only for illustration purposes, and\
    \ we\nwon’t use it in the rest of the code.\n\nInside the `SELECTION` string,\
    \ you\ncan add search criteria, if you like. A “?” serves as a placeholder\nthen,\
    \ and you can populate it in the penultimate parameter of the `query()` call,\
    \ like in\n\n```\nval SELECTION =\nContactsContract.CommonDataKinds.Email.ADDRESS\
    \ +\n\" LIKE ? \" + \"AND \" +\nContactsContract.Data.MIMETYPE + \" = '\" +\n\
    ContactsContract.\nCommonDataKinds.Email.CONTENT_ITEM_TYPE +\n\"'\"\nval selectionArgs\
    \ = arrayOf(\"%\" + search + \"%\")\n...\nval cursor = contentResolver.query(\n\
    CONTENT_URI,\nPROJECTION,\nSELECTION,\nselectionArgs,\nSORT_ORDER\n)\n```\n\n\
    There are also special URIs you can use, for example, for finding\ncontacts by\
    \ email address, you could use the content URI `ContactsContract.CommonDataKinds.Email.CONTENT_URI`.\n\
    As another option, the URI given by `ContactsContract.Contacts.CONTENT_FILTER_URI`\n\
    allows for adding search criteria inside the URI instead of specifying\nthem as\
    \ a parameter for the `query()` call:\n\n```\n...\nval PROJECTION : Array? = null\n\
    val SELECTION : String? = null\nval selectionArgs : Array? = null\nval contentUri\
    \ = Uri.withAppendedPath(\nContactsContract.Contacts.CONTENT_FILTER_URI,\nUri.encode(search))\n\
    Log.e(\"LOG\", contentUri.toString())\n...\n```\n\nNote that in this case it is\
    \ not allowed to pass an empty string “”\nas a search criterion.\n\nA class  `MyContactsRepository`\n\
    \ wraps the query into a `suspend function`,\nwhich is the coroutine idiom for\
    \ “allow for asynchronous invocation.”\nFor more information about coroutines,\
    \ see [`https://kotlinlang.org/docs/coroutines-overview.xhtml`](https://kotlinlang.org/docs/coroutines-overview.xhtml)\
    \ :\n\n```\npackage book.andrkotlpro.mycontacts1.db\nimport kotlinx.coroutines.CoroutineDispatcher\n\
    import kotlinx.coroutines.withContext\nclass MyContactsRepository(\nprivate val\
    \ source: MyContactsDataSource,\nprivate val myDispatcher: CoroutineDispatcher)\
    \ {\nsuspend fun fetchContacts(): List {\nreturn withContext(myDispatcher) {\n\
    source.fetchContactsData()\n}\n}\n}\n```\n\nFor the ViewModel we define the classes\
    \ `ContactsViewModel`\n  and  `ContactsViewModelFactory`\n, the former wrapping\
    \ the query result list into a LiveData\nobject (for data binding between the\
    \ model and the UI layer) and the\nlatter serving as a factory for creating the\
    \ ViewModel instance:\n\n```\npackage book.andrkotlpro.mycontacts1\nimport android.app.Application\n\
    import androidx.lifecycle.*\nimport book.andrkotlpro.mycontacts1.db.*\nimport\
    \ kotlinx.coroutines.Dispatchers\nclass ContactsViewModel (\ncontext: Application,\n\
    private val myContactsRepository: MyContactsRepository\n) : AndroidViewModel(context)\
    \ {\nvar myContacts: LiveData> = liveData {\nemit(myContactsRepository.fetchContacts())\n\
    }\n}\nclass ContactsViewModelFactory(\nprivate val application: Application)\n\
    : ViewModelProvider.AndroidViewModelFactory(\napplication) {\noverride fun \n\
    create(modelClass: Class): T {\nreturn if (modelClass.isAssignableFrom(\nContactsViewModel::class.java))\
    \ {\nval source = MyContactsDataSource(\napplication.contentResolver)\nContactsViewModel(application,\n\
    MyContactsRepository(source,\nDispatchers.IO)) as T\n} else\nthrow IllegalArgumentException(\n\
    \"Unknown ViewModel class\")\n}\n}\n```\n\nInside  `ContactsViewModelFactory`\n\
    \ we use a `Dispatchers.IO`\nparameter for the  `MyContactsRepository`\n instantiation,\
    \ which enables suspend function execution in a\nthread pool especially tailored\
    \ for IO background processing.\n\nThe manifest file  `AndroidManifest.xml`\n\
    \ contains the permissions necessary to access the contacts\ndatabase tables:\n\
    \n```\n\n...\n\n```\n\nThe activity class looks very different from what you are\
    \ used to, in\ncase this is your first Jetpack Compose project. The most noticeable\n\
    difference is that a layout XML file no longer is in use. Instead a\nbuilder-like\
    \ syntax gets applied for front-end view structures, as in\n\n```\nColumn() {\n\
    Text(textToShow)\nButton(onClick = { ... }) {\nText(\"Request permission\")\n\
    }\n}\n```\n\nThe full code of the activity class reads"
