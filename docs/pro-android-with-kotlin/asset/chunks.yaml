  trans: "\n# 为搜索框架提供内容\n\nAndroid *搜索框架*为用户提供了一项功能，即通过任何方式、使用任何数据源搜索其可用的任何数据。我们将在第\
    \ 8 章的“搜索框架”一节中讨论该框架。目前需要了解的是，对于以下情况：\n\n- 近期查询建议\n- 自定义建议\n\n内容提供者扮演着重要角色。对于这两种情况，你需要提供特殊的内容提供者子类，并像其他内容提供者一样将它们添加到`AndroidManifest.xml`中。\n\
    \n# 文档提供者\n\n文档提供者是*存储访问框架（SAF）*的一部分。它提供了以文档为中心的数据访问视图，并且还展示了文档目录的分层超级结构。\n\n\
    > **注意**\n> 存储访问框架（SAF）自 API 级别 19 开始引入。截至 2022 年中期，超过 99% 的活跃 Android 设备都支持该框架。\n\
    \n文档提供者的主要思想是：你的应用程序提供对文档的访问（无论相应的数据存储在哪里），而不关心文档及其结构如何呈现给用户或其他应用程序。文档提供者的数据模型由一个到多个从根节点开始的树组成，子节点要么是文档，要么是构成子树的目录，这些子树中又包含其他目录和文档。因此，它类似于文件系统中的数据结构。\n\
    \n要开始使用文档提供者，你需要创建一个实现`android.provider.DocumentsProvider`的类，它本身就是`android.content.ContentProvider`的一个专门子类。作为最低要求，你必须实现以下方法：\n\
    \n## `override fun onCreate(): Boolean`\n\n使用此方法初始化文档提供者。由于它在应用的主线程上运行，因此不得在此执行耗时操作。但你可以准备对该提供者的数据访问。如果提供者加载成功，则返回`true`，否则返回`false`。\n\
    \n## `override fun queryRoots(projection: Array<out String>?): Cursor`\n\n此方法用于查询提供者数据结构的根节点。在许多情况下，数据将适合放入一个树中，因此你只需要提供一个根节点，但你可以根据需要设置任意多个根节点。`projection`参数可能呈现一个要包含在结果集中的列列表。这些列名与`DocumentsContract.Root`中的`COLUMN_`常量相同。它可以是`null`，意思是返回所有列。该方法必须返回最多包含以下字段的游标（此处显示的是`DocumentsContract.Root`中的常量名）：\n\
    \n- **`COLUMN_AVAILABLE_BYTES`**：（长整型）该根节点下的可用字节数。可选，可以为`null`表示“未知”。\n- **`COLUMN_CAPACITY_BYTES`**：（长整型）该根节点下树的总容量，以字节为单位。可以理解为文件系统的容量。可选，可以为`null`表示“未知”。\n\
    - **`COLUMN_DOCUMENT_ID`**：对应于该根节点的目录的 ID（字符串）。必填。\n- **`COLUMN_FLAGS`**：适用于根节点的标志（整型）。是（`DocumentsContract.Root`中的常量）的组合：\n\
    \  - `FLAG_LOCAL_ONLY`（仅限于设备本地，无需网络访问）\n  - `FLAG_SUPPORTS_CREATE`（根节点下至少有一个文档支持创建内容）\n\
    \  - `FLAG_SUPPORTS_RECENTS`（可查询根节点以显示最近更改的文档）\n  - `FLAG_SUPPORTS_SEARCH`（该树允许搜索文档）\n\
    - **`COLUMN_ICON`**：（整型）根节点的图标资源 ID。必填。\n- **`COLUMN_MIME_TYPES`**：（字符串）支持的 MIME\
    \ 类型。如果有多个，请使用换行符“\\n”作为分隔符。可选，可以为`null`表示支持所有 MIME 类型。\n- **`COLUMN_ROOT_ID`**：（字符串）根节点的唯一\
    \ ID。必填。\n- **`COLUMN_SUMMARY`**：（字符串）此根节点的摘要信息，可能会显示给用户。可选，可以为`null`表示“未知”。\n\
    - **`COLUMN_TITLE`**：（字符串）根节点的标题，可能会显示给用户。必填。\n\n如果这组根节点发生了变化，你必须使用`DocumentsContract.buildRootsUri`调用`ContentResolver.notifyChange`来通知系统。\n\
    \n## `override fun queryChildDocuments(parentDocumentId: String?, projection:\
    \ Array<out String>?, sortOrder: String?): Cursor`\n\n返回指定目录中包含的直接子文档和子目录。针对 API\
    \ 级别 26 或更高版本的应用，应改为实现`fun queryChildDocuments(parentDocumentId: String?, projection:\
    \ Array<out String>?, queryArgs: Bundle?): Cursor`，并在此方法中使用：\n\n```kotlin\noverride\
    \ fun queryChildDocuments(\n    parentDocumentId: String?,\n    projection: Array<out\
    \ String>?,\n    sortOrder: String?): Cursor {\n    val bndl = Bundle()\n    bndl.putString(\n\
    \        ContentResolver.QUERY_ARG_SQL_SORT_ORDER,\n        sortOrder)\n    return\
    \ queryChildDocuments(\n        parentDocumentId, projection, bndl)\n}\n```\n\n\
    ## `override fun queryChildDocuments(parentDocumentId: String?, projection: Array<out\
    \ String>?, queryArgs: Bundle?): Cursor`\n\n返回指定目录中包含的直接子文档和子目录。bundle 参数包含查询参数，键为：\n\
    \n- `ContentResolver.QUERY_ARG_SQL_SELECTION`\n- `ContentResolver.QUERY_ARG_SQL_SELECTION_ARGS`\n\
    - `ContentResolver.QUERY_ARG_SQL_SORT_ORDER` 或 `ContentResolver.QUERY_ARG_SORT_COLUMNS`（后者是一个字符串数组）\n\
    \n`parentDocumentId` 是我们想要列出的目录的 ID，在 `projection` 中你可以指定应返回的列——使用 `DocumentsContract.Document`\
    \ 中的 `COLUMN_` 常量列表。或者传入 `null` 以返回所有列。生成的 `Cursor` 最多返回以下字段（键是 `DocumentsContract.Document`\
    \ 中的常量）：\n\n- **`COLUMN_DISPLAY_NAME`**：（字符串）文档的显示名称，用作显示给用户的主要标题。必填\n- **`COLUMN_DOCUMENT_ID`**：（字符串）文档的唯一\
    \ ID。必填\n- **`COLUMN_FLAGS`**：文档的标志。是（`DocumentsContract.Document` 中的常量名）的组合：\n\
    \  - `FLAG_SUPPORTS_WRITE`（支持写入）\n  - `FLAG_SUPPORTS_DELETE`（支持删除）\n  - `FLAG_SUPPORTS_THUMBNAIL`（支持缩略图表示）\n\
    \  - `FLAG_DIR_PREFERS_GRID`（对于目录，是否应以网格形式显示）\n  - `FLAG_DIR_PREFERS_LAST_MODIFIED`（对于目录，首选按“最后修改时间”排序）\n\
    \  - `FLAG_VIRTUAL_DOCUMENT`（没有 MIME 类型的虚拟文档）\n  - `FLAG_SUPPORTS_COPY`（支持复制）\n\
    \  - `FLAG_SUPPORTS_MOVE`（支持在树内移动）\n  - `FLAG_SUPPORTS_REMOVE`（支持从层次结构中移除（不是删除！））\n\
    - **`COLUMN_ICON`**：（整型）文档的特定图标资源 ID。可以为 `null` 以使用系统默认图标\n- **`COLUMN_LAST_MODIFIED`**：（长整型）文档最后修改的时间戳，以毫秒为单位，从\
    \ UTC 时间 1970 年 1 月 1 日 00:00:00.0 开始计算。必填，但如果未定义，可以为 `null`。\n"
- fmt: '- **`COLUMN_MIME_TYPE`**: (string) The MIME type of a document. Required


    - **`COLUMN_SIZE`**: (long) Size of a document, in bytes, or `null` if unknown.
    Required


    - **`COLUMN_SUMMARY`**: (string) The summary of a document, may be shown to a
    user. Optional and may be `null`


    For network-related operations, you might return data partly and set `DocumentsContract.EXTRA_LOADING`
    on the `Cursor` to indicate that you are still fetching additional data. Then,
    when the network data is available, you can send a change notification to trigger
    a requery and return the complete contents. To support change notifications, you
    must fire `Cursor.setNotificationUri()` with a relevant URI, maybe from `DocumentsContract.buildChildDocumentsUri()`.
    Then you can call `ContentResolver.notifyChange()` with that URI to send change
    notifications.


    - **fun `openDocument(documentId: String?, mode: String?, signal: CancellationSignal?):
    ParcelFileDescriptor`**


    Open and return the requested document. This should return a reliable `ParcelFileDescriptor`
    to detect when the remote caller has finished reading or writing the document.
    If you block while downloading content, you should periodically check `CancellationSignal.isCanceled()`
    to abort abandoned open requests. The parameters are as follows: `documentId`
    is for the document to return. The `mode` specifies the "open" mode, such as "r",
    "w", or "rw". Mode "r" should always be supported. The provider should throw `UnsupportedOperationException`
    if the passed mode is not supported. You may return a pipe or socket pair if the
    mode is exclusively "r" or "w", but complex modes like "rw" imply a normal file
    on disk that supports seeking. The `signal` may be used from the caller if the
    request should be canceled. May be `null`.


    - **override fun `queryDocument(documentId: String?, projection: Array<out String>?):
    Cursor`**


    Return metadata for a single requested document. Parameters are as follows: `documentId`
    is the ID of the document to return and `projection` a list of columns to put
    into the cursor. Use the constants from `DocumentsContract.Document`; for a list
    see earlier inside the description of method `queryChildDocuments()`. If you use
    `null` here, all columns are to be returned.


    Inside the file `AndroidManifest.xml`, you register the documents provider almost
    like any other provider:


    Inside the preceding queries, we have seen that the `Cursor` object returns flags
    to indicate that recent documents and searching inside the tree be supported.
    In order for this to work, you must implement one or two more methods in your
    `DocumentsProvider` implementation:


    - **override fun `queryRecentDocuments(rootId: String, projection: Array<String>):
    Cursor`**


    Supposed to return recently modified documents under the requested root. The returned
    documents should be sorted by `COLUMN_LAST_MODIFIED` in descending order, and
    at most 64 entries should be shown. Recent documents do not support change notifications.


    - **`querySearchDocuments(rootId: String, query: String, projection: Array<String>):
    Cursor`**


    Supposed to return documents that match the given query under the requested root.
    The returned documents should be sorted by relevance in descending order. For
    slow queries you can return data in part and set `EXTRA_LOADING` on the cursor
    to indicate that you are fetching additional data. Then, when the data is available,
    you can send a change notification to trigger a requery and return the complete
    contents. To support change notifications, you must use `setNotificationUri(ContentResolver,
    Uri)` with a relevant URI, maybe from `buildSearchDocumentsUri(String, String,
    String)`. Then you can call the method `notifyChange(Uri, android.database.ContentObserver,
    boolean)` with that URI to send change notifications.


    Once your documents provider is configured and running, a client component can
    then use an `ACTION_OPEN_DOCUMENT` or `ACTION_CREATE_DOCUMENT` Intent to open
    or create a document. The Android system picker will be taking care of presenting
    the appropriate documents to the user – you don''t have to provide an own GUI
    for your documents provider.


    An example of such a client access would be:


    ```

    // An integer you can use to identify that call when the

    // called Intent returns

    val READ_REQUEST_CODE = 42

    // ACTION_OPEN_DOCUMENT used in this example is the

    // intent to choose a document like for example a file

    // file via the system''s file browser.

    val intent = Intent(Intent.ACTION_OPEN_DOCUMENT)

    // Filter to only show results that can be "opened", such

    // as a file (as opposed to a list of informational items)

    intent.addCategory(Intent.CATEGORY_OPENABLE)

    // You can use a filter to for example show only images.

    // To search for all documents instead, you can use "*/*"

    // here.

    intent.type = "image/*"

    // The actual Intent call - the system will provide the

    // GUI

    startActivityForResult(intent, READ_REQUEST_CODE)

    ```


    Once an item is selected from inside the system picker, to catch the intent return,
    you''d write something like:


    ```

    override fun onActivityResult(requestCode:Int,

    resultCode:Int,

    resultData:Intent) {

    // The ACTION_OPEN_DOCUMENT intent was sent with the

    // request code READ_REQUEST_CODE. If the request

    // code seen here doesn''t match, it''s the

    // response to some other intent, and the code below

    // shouldn''t run at all.

    if (requestCode == READ_REQUEST_CODE

    && resultCode == Activity.RESULT_OK) {

    // The document selected shows up in

    // intent.getData()

    val uri = resultData.data

    Log.i("LOG", "Uri: " + uri.toString())

    showImage(uri) // Do s.th. with it

    }

    }

    ```


    Instead of opening a file as shown in the example, you can do other things with
    the URI you received in the Intent''s return. You could, for example, also issue
    a query to fetch metadata as shown in the preceding query methods. Since the `DocumentsProvider`
    inherits from `ContentProvider`, you can use the methods described there – see
    the preceding section "Providing Content Files," to open a stream for the document''s
    bytes.


    7. Permissions'
