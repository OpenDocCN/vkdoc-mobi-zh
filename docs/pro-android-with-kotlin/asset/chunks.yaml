    # 本书的目标读者


    本书面向中高级 Android 开发者，他们希望利用新的 Kotlin 特性来适配当前 Android 版本和设备。


    读者最终将能够使用 Android Studio 和 Kotlin 作为开发语言，构建针对 Android 平台的高级且精细的应用程序。


    使用本书并不要求你是 Kotlin 专家，但阅读过入门级书籍或研究过在线资源无疑会有所帮助。阅读本书时，Kotlin 的在线文档也提供了宝贵的参考资料。


    # 源代码


    本书中展示或引用的所有源代码均可在[`github.com/Apress/pro-android-with-kotlin`](https://github.com/Apress/pro-android-with-kotlin)`-2e`找到。


    ## 在线文本伴侣


    部分列表、表格以及类和接口的详细信息，作为*文本伴侣*对公众开放，网址为[`github.com/Apress/pro-android-with-kotlin`](https://github.com/Apress/pro-android-with-kotlin)`-2e`。对此类在线资源的引用均已适当标注。


    ## 如何阅读本书


    如果你想全面了解在 Android 平台上能做什么，可以按顺序阅读本书。或者，当你进行 Android 项目开发时，可以根据需要独立阅读各个章节。此外，你也可以将本书的部分内容作为参考手册，用于寻找特定问题的解决方案，以及确定如何使用
    Kotlin（而非 Java）来完成任务。这包括对特殊 Kotlin 语言结构的描述，帮助你编写简洁可靠的代码。


    本书按章节划分。第 1 章对 Android 系统进行了非常简短的鸟瞰式介绍。如果你对 Android 已有一定经验，可以跳过或快速浏览。


    第 2 至 6 章讨论了 Android 架构的核心模块：应用程序整体、活动、服务、广播和内容提供者。鉴于你的专业开发者身份，这里提供的一些信息可能略显基础，并且很容易在官方
    Android 开发者文档或网络上找到。尽管如此，我仍然添加这些内容的原因，仔细审视便可知晓：从其他来源能获取的信息质量参差不齐，部分是由于历史原因，部分则仅仅是因为过时了。因此，我试图纠正其中一些特性，并为你们提供一个整合的、新颖的视角，希望能为你探索
    Android 底层运作机制节省一些时间。你也可以把它们当作参考资料，以备在项目进展中遇到开发问题时随时查阅。


    第 7 章简要介绍了权限系统，这是开发专业级 Android 应用时必须掌握的内容。


    第 8 和第 9 章涉及可在应用中使用的 API 以及用户界面问题。由于这两个主题都非常庞大，无法面面俱到。但我尽力为你挑选了该领域中针对各种任务的一些实用且有趣的解决方案。


    第 10 章介绍了 Firebase，这是一个提供存储和消息传递服务的云端应用开发平台。


    第 11 至 12 章深入探讨了开发和构建策略，并描述了如何在 Kotlin 中最佳地实现相关操作。前几章主要以经验主义的方式展示 Kotlin 代码，而在第
    11 章中，我阐述了如何使用 Kotlin 结构来编写更优雅、更具可读性的应用程序代码。


    第 13 章关于通信，介绍了一些用于在应用内部组件之间，或在应用与其他应用及外部世界之间进行通信的方法。


    第 14 章从硬件角度介绍了不同设备，包括智能手机、智能手表等可穿戴设备、Android TV 和 Android Auto。我们还讨论了访问摄像头和传感器的方法，以及如何与电话呼叫进行交互。


    在第 15 至 18 章中，我们涉及了测试、故障排除和应用发布，最后一章，即第 19 章，解释了如何使用 SDK 安装包（作为 Android Studio
    的一部分）提供的工具。


    # 关于代码的一些说明


    虽然我力求对本书中展示的所有代码遵循*整洁代码*原则，但为了简洁明了，我使用了两种反模式，**你不应该**在你的生产代码中遵循：


    -   我没有使用本地化的字符串资源。因此，当你在 XML 资源中看到类似：


    ```

    android:text = "Some message"

    ```


    的内容时，你实际应该做的是创建一个字符串资源，并让属性引用它，如下所示：


    ```

    android:text = "@string/message"

    ```


    -   对于日志记录语句，我总是使用`"LOG"`作为标签，例如：


    ```

    Log.e("LOG", "The message")

    ```


    在你的代码中，你应该基于类名创建一个标签：


    ```

    companion object {

    val TAG="The class name"

    ...

    }

    ```


    然后使用它：


    ```

    Log.e(TAG, "The message")

    ```


    # 1. 系统


    Android 操作系统诞生于 2003 年，是 Android Inc.公司的产品，随后于 2005 年被谷歌有限责任公司收购。第一款运行 Android
    的设备于 2008 年进入市场。自那时起，它经历了无数次更新，截至 2022 年中，最新版本号为 12.1。


    从第一个版本开始，Android 操作系统的市场份额就持续增长，到 2021 年，据称保持在 72%以上。尽管数据因资料来源而异，但 Android 操作系统的成功无疑是无可否认的。这一胜利部分源于谷歌有限责任公司作为全球智能手机市场的精明参与者，但也归功于
    Android 操作系统被精心定制，以满足智能手机及其他手持或类手持设备的需求。


    话虽如此，大多数以前或仍在 PC 环境工作的计算机开发者，如果完全忽视手持设备开发，将会错失良机。本书旨在帮助你作为开发者理解 Android 操作系统并掌握其上程序的开发。本书也专注于使用
    Kotlin 作为语言来实现开发需求，但首先，我们将审视 Android 操作系统及其辅助的开发相关系统，使你了解 Android 的内部运作机制。

