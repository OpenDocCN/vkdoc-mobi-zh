  trans: '

    # 使用 Jetpack Compose 构建器


    Android Jetpack 是 Android 技术领域中一个雄心勃勃的项目。它作为一个库的集合，旨在简化开发者的工作，并遵循最佳实践来提升代码质量，同时将
    Kotlin 作为编写优雅代码的源泉。


    我们在本书前面之所以没有讨论 Jetpack，纯粹是因为 Jetpack 库集合的庞大 —— Jetpack 本身完全可以作为另一本书的主题。此外，Jetpack
    的前端设计方法在某种程度上与通过切换 Activity 来描述屏幕转换的基本思想相矛盾。说实话，在 Jetpack 之前的开发方法中已经包含了类似的概念，称为
    `fragments`，它简化了在单个 Activity 内部重绘屏幕部分的功能。Jetpack 的 UI 技术，名为 `Jetpack Compose`，正是沿着这条路走向了真正的单
    Activity 方法。此外，Jetpack 高度专注于函数而非类，这在一定程度上脱离了面向对象设计的领域。这种方式有利有弊 —— 使用 Jetpack 可以更容易地获得一个可工作的前端，但代码并不那么容易理解，因为函数不太容易被识别为属于描述特定关注点的类。


    尽管如此，在本节中，我们将研究一个基于 `Jetpack Compose` 的前端设计示例，而不会描述 Jetpack 提供的所有功能。建议你查阅 [`developer.android.com/jetpack/`](https://developer.android.com/jetpack/)
    上的在线文档，以了解 Jetpack 中包含的其他库。


    我们从声明依赖项所需的两个构建文件开始：


    ```

    // ---------- 项目 build.gradle ----------

    buildscript {

    ext.kotlin_version = ''1.6.21''

    repositories {

    google()

    mavenCentral()

    }

    dependencies {

    classpath ''com.android.tools.build:gradle:7.2.1''

    classpath "org.jetbrains.kotlin:" +

    "kotlin-gradle-plugin:$kotlin_version"

    }

    }

    allprojects {

    repositories {

    google()

    mavenCentral()

    }

    }

    // ---------- 模块 build.gradle ----------

    plugins {

    id ''com.android.application''

    id ''kotlin-android''

    id ''kotlin-kapt''

    }

    android {

    compileSdkVersion 32

    defaultConfig {

    applicationId "com.example.myapp"

    minSdkVersion 23

    targetSdkVersion 32

    versionCode 1

    versionName "1.0"

    testInstrumentationRunner ""+

    ''androidx.test.runner.AndroidJUnitRunner''

    }

    buildFeatures {

    // 为此模块启用 Jetpack Compose

    compose true

    }

    compileOptions {

    sourceCompatibility JavaVersion.VERSION_1_8

    targetCompatibility JavaVersion.VERSION_1_8

    }

    kotlinOptions {

    jvmTarget = "1.8"

    }

    composeOptions {

    //kotlinCompilerExtensionVersion ''1.1.1''

    kotlinCompilerExtensionVersion ''1.2.0-beta03''

    }

    buildTypes {

    release {

    minifyEnabled false

    proguardFiles getDefaultProguardFile(

    ''proguard-android.txt''), ''proguard-rules.pro''

    }

    }

    }

    dependencies {

    implementation "org.jetbrains.kotlin:" +

    "kotlin-stdlib-jdk7:$kotlin_version"

    implementation ''androidx.appcompat:appcompat:1.4.2''

    implementation ''androidx.activity:activity-ktx:1.4.0''

    implementation ''androidx.fragment:fragment-ktx:1.4.1''

    implementation ''com.google.android.material:'' +

    ''material:1.6.1''

    implementation ''androidx.constraintlayout:'' +

    ''constraintlayout:2.1.4''

    implementation ''com.jakewharton.timber:timber:5.0.1''

    implementation "androidx.datastore:" +

    "datastore-preferences:1.0.0"

    implementation "androidx.preference:" +

    "preference-ktx:1.2.0"

    testImplementation ''junit:junit:4.13.2''

    androidTestImplementation ''androidx.test.ext:'' +

    ''junit:1.1.3''

    androidTestImplementation ''androidx.test.espresso:'' +

    ''espresso-core:3.4.0''

    def lifecycle_version = "2.4.1"

    implementation "androidx.lifecycle:" +

    "lifecycle-viewmodel-ktx:$lifecycle_version"

    implementation "androidx.lifecycle:" +

    "lifecycle-viewmodel-compose:$lifecycle_version"

    implementation "androidx.lifecycle:" +

    "lifecycle-livedata-ktx:$lifecycle_version"

    implementation "androidx.lifecycle:" +

    "lifecycle-runtime-ktx:$lifecycle_version"

    implementation "androidx.lifecycle:" +

    "lifecycle-viewmodel-savedstate:$lifecycle_version"

    implementation "androidx.lifecycle:" +

    "lifecycle-common-java8:$lifecycle_version"

    implementation ''androidx.compose.ui:ui:1.1.1''

    implementation ''androidx.compose.foundation:'' +

    ''foundation:1.1.1''

    implementation ''androidx.activity:'' +

    ''activity-compose:1.4.0''

    implementation ''androidx.compose.material:'' +

    ''material:1.1.1''

    implementation ''androidx.compose.material:'' +

    ''material-icons-core:1.1.1''

    implementation ''androidx.compose.material:'' +

    ''material-icons-extended:1.1.1''

    implementation ''androidx.compose.animation:'' +

    ''animation:1.1.1''

    implementation ''androidx.compose.ui:ui-tooling:1.1.1''

    implementation ''androidx.lifecycle:'' +

    ''lifecycle-viewmodel-compose:2.4.1''

    implementation ''androidx.compose.runtime:'' +

    ''runtime-livedata:1.1.1''

    implementation ''androidx.compose.runtime:'' +

    ''runtime-rxjava2:1.1.1''

    implementation "androidx.navigation:" +

    "navigation-compose:2.4.0"

    androidTestImplementation ''androidx.compose.ui:'' +

    ''ui-test-junit4:1.1.1''

    implementation "androidx.constraintlayout:" +

    "constraintlayout-compose:1.0.0"

    }

    ```


    我们从主 Activity 开始，它在 Jetpack Compose 中作为 UI 单元的容器，这些 UI 单元被称为 `composables`。导航控制器（同样由
    Jetpack Compose 提供）负责在不同屏幕之间切换，因此，即使是更复杂的应用，我们也只需要一个 Activity。

    '
- fmt: "```kotlin\nimport android.content.Context\nimport android.content.pm.PackageManager\n\
    import android.os.Bundle\nimport androidx.core.app.ActivityCompat\nimport androidx.core.content.ContextCompat\n\
    import androidx.appcompat.app.AppCompatActivity\nimport androidx.activity.compose.setContent\n\
    import androidx.activity.viewModels\nimport androidx.compose.material.*\nimport\
    \ androidx.compose.runtime.*\nimport androidx.lifecycle.*\nimport androidx.navigation.compose.NavHost\n\
    import androidx.navigation.compose.composable\nimport androidx.navigation.compose.rememberNavController\n\
    \nclass MainActivity : AppCompatActivity() {\n    override fun onCreate(savedInstanceState:\
    \ Bundle?) {\n        super.onCreate(savedInstanceState)\n        // view models\
    \ ------------------------------------\n        val homeViewModel: HomeViewModel\
    \ by viewModels()\n        // ------------------------------------------------\n\
    \        setContent {\n            val navController = rememberNavController()\n\
    \            val topBar by remember { mutableStateOf(MyTopBar(navController, this))\
    \ }\n            val startDestination = \"home\"\n            Scaffold(\n    \
    \            topBar = { topBar.make() },\n                content = {\n      \
    \              NavHost(navController = navController,\n                      \
    \  startDestination = startDestination) {\n                        composable(\"\
    home\"){\n                            HomeScreen(homeViewModel, navController).make()\n\
    \                        }\n                        composable(\"otherScreen\"\
    ){\n                            //...\n                        }\n           \
    \         }\n                }\n            )\n        }\n    }\n}\n```\n\n`remember`\
    \ 和 `mutableStateOf` 对于 `navController` 和 `topBar` 的构造至关重要，因为它们能确保变量的状态在因 UI 状态变化而发生重组时得以保留，并且负责处理\
    \ UI 的更新（例如当文本字段的值发生变化时，如下列表所示）。\n\n类 `MyTopBar` 负责顶部操作栏的内容：\n\n```kotlin\nimport\
    \ android.app.Activity\nimport android.content.Context\nimport android.content.DialogInterface\n\
    import androidx.compose.material.*\nimport androidx.compose.material.icons.Icons\n\
    import androidx.compose.material.icons.filled.MoreVert\nimport androidx.compose.runtime.*\n\
    import androidx.compose.ui.platform.LocalContext\nimport androidx.navigation.NavHostController\n\
    \nclass MyTopBar(private val nav: NavHostController,\n               private val\
    \ activity: Activity) {\n    // A boolean variable to store the display menu state\n\
    \    private lateinit var displayMenu: MutableState<Boolean>\n\n    @Composable\n\
    \    fun make() {\n        displayMenu = remember { mutableStateOf(false) }\n\
    \        // fetching local context\n        val context = LocalContext.current\n\
    \        TopAppBar(\n            title = { Text(\"My App\") },\n            actions\
    \ = {\n                // Icon button for dropdown menu\n                IconButton(onClick\
    \ = { displayMenu.value = !displayMenu.value }) {\n                    Icon(Icons.Default.MoreVert,\
    \ \"\")\n                }\n                DropdownMenu(\n                  \
    \  expanded = displayMenu.value,\n                    onDismissRequest = { displayMenu.value\
    \ = false }\n                ) {\n                    DropdownMenuItem(onClick\
    \ = {\n                        displayMenu.value = false\n                   \
    \     nav.navigate(\"settings\")\n                    }) {\n                 \
    \       Text(text = \"Settings\")\n                    }\n                   \
    \ // ... more items\n                }\n            }\n        )\n    }\n}\n```\n\
    \n由于在定义 `displayMenu` 时使用了 `mutableStateOf()`，下拉菜单会随着 `displayMenu` 值的改变而自动响应并更新其\
    \ UI。\n\n`HomeScreen` 的起点可以如下所示：\n\n```kotlin\nimport androidx.compose.material.Button\n\
    import androidx.compose.material.Text\nimport androidx.compose.material.TextField\n\
    import androidx.compose.runtime.*\nimport androidx.navigation.NavHostController\n\
    \nclass HomeScreen(\n    private val vm: HomeViewModel,\n    private val navController:\
    \ NavHostController\n) {\n    @Composable\n    fun make() {\n        Column {\n\
    \            Text(text = vm.text1)\n            TextField(value = vm.text2,\n\
    \                onValueChange = { vm.text2 = it })\n        }\n    }\n}\n```\n\
    \n目前，一个简单的 `ViewModel` 仅包含两个字符串变量 `text1` 和 `text2`：\n\n```kotlin\nimport androidx.compose.runtime.*\n\
    import androidx.lifecycle.ViewModel\n\nclass HomeViewModel : ViewModel() {\n \
    \   var text1 by mutableStateOf(\"Hello\")\n    var text2 by mutableStateOf(\"\
    \")\n}\n```\n\n在复杂的应用中，`ViewModel` 也将是使用某种外部存储（如 Room 数据库）来初始化和持久化值的地方。\n\n##\
    \ Adapters and List Controls\n\n显示包含可变数量项目的列表的需求非常常见，尤其是在企业环境中。虽然 `AdapterView`\
    \ 和具有各种子类的 `Adapter` 对象已经存在了一段时间，但我们将重点放在相对较新且高性能的**RecyclerView**上。您将看到，借助 Kotlin\
    \ 的简洁性，实现 RecyclerView 变得非常优雅和全面。\n\n基本思路如下：您有一个数组、列表或数据项的其他集合（可能来自数据库），并希望将它们发送到一个单一的\
    \ UI 元素，该元素负责所有呈现工作，包括渲染所有可见项目，并在必要时提供滚动功能。每个项目的呈现要么依赖于一个*项目* XML 布局文件，要么可以从代码内部动态生成。从每个数据项成员到其\
    \ UI 表示中对应视图元素的映射，应由一个**适配器**对象处理。\n\n使用 RecyclerView，这一切都以直接的方式完成，但首先我们必须包含一个支持库，因为\
    \ RecyclerView 不是框架的一部分。为此，在您*模块*的 `build.gradle` 中的 `dependencies{ ... }` 部分内，添加：\n\
    \n```gradle\nimplementation 'com.android.support:recyclerview-v7:26.1.0'\n```\n\
    \n（一行代码——删除 \"implementation\" 后的换行符）。\n\n要告诉应用程序我们要使用 RecyclerView，请在 Activity\
    \ 的布局文件中添加：\n\n```xml\n<android.support.v7.widget.RecyclerView\n    android:id=\"\
    @+id/recycler_view\"\n    android:layout_width=\"match_parent\"\n    android:layout_height=\"\
    match_parent\"/>\n```\n\n并像指定任何其他 `View` 一样指定其布局选项。\n\n为了布局列表中的项目，请在 `res/layout`\
    \ 内创建另一个布局文件，例如 `item.xml`，内容示例如下：\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    utf-8\"?>\n<RelativeLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:layout_width=\"match_parent\"\n    android:layout_height=\"wrap_content\"\
    >\n    <TextView\n        android:id=\"@+id/firstLine\"\n        android:layout_width=\"\
    wrap_content\"\n        android:layout_height=\"wrap_content\"\n        android:layout_margin=\"\
    8dp\"\n        android:textSize=\"18sp\"/>\n</RelativeLayout>\n```\n\n如前所述，您也可以跳过此步骤，完全从代码内部定义项目的布局！接下来，我们提供一个适配器。在\
    \ Kotlin 中，这可以简单如下：\n\n```kotlin\nclass MyAdapter(val myDataset: Array<String>)\
    \ : RecyclerView.Adapter<MyAdapter.ViewHolder>() {\n    companion object {\n \
    \       class ViewHolder(val v: RelativeLayout) : RecyclerView.ViewHolder(v)\n\
    \    }\n\n    override fun onCreateViewHolder(parent: ViewGroup, viewType: Int):\
    \ ViewHolder {\n        val v = LayoutInflater.from(parent.context)\n        \
    \    .inflate(R.layout.item, parent, false) as RelativeLayout\n        return\
    \ ViewHolder(v)\n    }\n\n    override fun onBindViewHolder(holder: ViewHolder,\
    \ position: Int) {\n        // replace the contents of the view with the element\
    \ at this position\n        holder.v.findViewById<TextView>(R.id.firstLine).text\
    \ = myDataset[position]\n    }\n\n    override fun getItemCount(): Int = myDataset.size\n\
    }\n```\n\n以下是对该列表的几点说明：\n\n*   `companion object` 内的类是 Kotlin 中声明静态内部类的方式。该类将每个数据项引用为\
    \ UI 元素。更准确地说，RecyclerView 内部只会持有足够表示*可见*项目的 ViewHolder。\n*   只有在真正需要时，`onCreateViewHolder()`\
    \ 函数才会被调用来创建 ViewHolder——更准确地说，大致上它只会在渲染用户可见项目时被调用。\n*   `onBindViewHolder()`\
    \ 函数将一个可见的 ViewHolder 连接到特定的数据项。在此我们必须替换 ViewHolder 视图的内容。\n\n在 Activity 中，定义\
    \ RecyclerView 所需的全部代码如下：\n\n```kotlin\nwith(recycler_view) {\n    // use this\
    \ setting to improve performance if you know\n    // that changes in content do\
    \ not change the layout size of the RecyclerView\n    setHasFixedSize(true)\n\
    \    // use for example a linear layout manager\n    layoutManager = LinearLayoutManager(this@MainActivity)\n\
    \    // specify the adapter, use some sample data\n    val dataset = (1..21).map\
    \ { \"Itm\" + it }.toTypedArray()\n    adapter = MyAdapter(dataset)\n}\n```\n\n\
    效果将如图 9-1 所示。对程序的有用扩展如下：\n\n**图 9-1 RecyclerView 截图**"
