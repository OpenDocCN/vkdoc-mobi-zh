    \            val CONTENT_ITEM_TYPE =\n                ContentResolver.CURSOR_ITEM_BASE_TYPE\
    \ +\n                        \"/vnd.\" + MyContentContract.AUTHORITY +\n     \
    \                   \".items\"\n            // 在此可以添加数据库列名、投影规范\n            //\
    \ 或排序规范等\n            // ...\n        }\n    }\n}\n```\n\n当然，界面设计的一部分必须为类、字段名和字段值使用有意义的名字。\n\
    \n**注意**\n\n契约类中描述的界面并非*必须*对应实际的数据库表——将界面与实际实现从概念上解耦，并在此提供以任意方式衍生的表连接或其他项目类型，不仅完全可行，而且是有益的。\n\
    \n关于这个结构有几点说明：\n\n- 如果你能确保客户端仅使用 Kotlin 作为平台，那么代码可以写得更简短，无需任何样板代码：\n\n```kotlin\n\
    object MyContentContract2 {\n    val AUTHORITY = \"com.xyz.whatitis\"\n    val\
    \ CONTENT_URI = Uri.parse(\"content://\"\n            + AUTHORITY)\n    val SELECTION_ID_BASED\
    \ =\n        BaseColumns._ID + \" = ? \"\n    object Items {\n        val NAME\
    \ = \"item_name\"\n        val CONTENT_URI =\n            Uri.withAppendedPath(\n\
    \                MyContentContract.CONTENT_URI, \"items\")\n        val CONTENT_TYPE\
    \ =\n            ContentResolver.CURSOR_DIR_BASE_TYPE +\n                    \"\
    /vnd.\" + MyContentContract.AUTHORITY +\n                    \".items\"\n    \
    \    val CONTENT_ITEM_TYPE =\n            ContentResolver.CURSOR_ITEM_BASE_TYPE\
    \ +\n                    \"/vnd.\" + MyContentContract.AUTHORITY +\n         \
    \           \".items\"\n    }\n}\n```\n\n然而，如果我们希望 Java 客户端也能使用这个界面，就必须使用这些 `companion\
    \ object` 和 `@JvmObject` 声明及修饰符。\n\n- 使用 `companion object` 和 `@JvmObject` 注解可以像\
    \ Java 的静态字段一样，通过 `TheClass.THE_FIELD` 进行访问。\n\n- 你可以考虑为客户端提供等效的 Java 构造，这样如果客户端只使用\
    \ Java，就无需学习 Kotlin 语法。\n\n- `Uri.parse()` 和 `Uri.withAppendedPath()` 方法调用只是 `Uri`\
    \ 类使用的两个例子。该类还包含其他一些有助于构建正确 URI 的方法。\n\n- 你也可以在契约类内部提供辅助方法。如果这样做，请确保该界面类不依赖其他类，并为\
    \ `fun` 函数声明添加 `@JvmStatic` 修饰符，使其可从 Java 调用。\n\n然后，你可以将此契约类（或者多个类，如果你想同时用 Kotlin\
    \ 和 Java 记录界面）公开提供给任何可能使用你内容提供器应用的客户端。\n\n## 基于 `AbstractCursor` 等的游标类\n\n`ContentProvider`\
    \ 中所有的 `query*()` 方法都返回一个 `android.database.Cursor` 对象。从包名可以看出这是一个以数据库为中心的类，这实际上是\
    \ Android 的一个小设计缺陷，因为内容接口本应对访问方法保持不可知。\n\n除此之外，`Cursor` 接口为希望遍历结果集的客户端提供了一个随机访问接口。你可以使用基础实现\
    \ `android.database.AbstractCursor` 作为游标类——它已经实现了该接口的多个方法。具体做法是编写 `class MyCursor\
    \ : AbstractCursor { ... }` 或 `val myCursor = object : AbstractCursor { ... }`，然后实现所有抽象方法并重写部分其他方法，使类具备实际功能：\n\
    \n- **`override fun getCount(): Int`**\n\n  可用的数据集数量。\n\n- **`override fun getColumnNames():\
    \ Array<String>`**\n\n  列名的有序数组。\n\n- **`override fun getInt(column: Int): Int`**\n\
    \n  获取一个整型值（列索引从 0 开始）。\n\n- **`override fun getLong(column: Int): Long`**\n\n\
    \  获取一个长整型值（列索引从 0 开始）。\n\n- **`override fun getShort(column: Int): Short`**\n\
    \n  获取一个短整型值（列索引从 0 开始）。\n\n- **`override fun getFloat(column: Int): Float`**\n\
    \n  获取一个浮点值（列索引从 0 开始）。\n\n- **`override fun getDouble(column: Int): Double`**\n\
    \n  获取一个双精度浮点值（列索引从 0 开始）。\n\n- **`override fun getString(column: Int): String`**\n\
    \n  获取一个字符串值（列索引从 0 开始）。\n\n- **`override fun isNull(column: Int): Boolean`**\n\
    \n  指示该值是否为 `null`（列索引从 0 开始）。\n\n- **`override fun getType(column: Int): Int`**\n\
    \n  你不必重写此方法，但如果未重写，它将始终返回 `Cursor.FIELD_TYPE_STRING`，并假定 `getString()` 始终返回有意义的内容。若需要更精细的控制，可让它返回\
    \ `FIELD_TYPE_NULL`、`FIELD_TYPE_INTEGER`、`FIELD_TYPE_FLOAT`、`FIELD_TYPE_STRING`\
    \ 或 `FIELD_TYPE_BLOB` 中的一个。列索引从 0 开始。\n\n- **`override fun getBlob(column: Int):\
    \ ByteArray`**\n\n  如果你要支持 BLOB（二进制大对象），请重写此方法。否则将抛出 `UnsupportedOperationException`。\n\
    \n- **`override fun onMove(oldPosition: Int, newPosition: Int): Boolean`**\n\n\
    \  尽管没有标记为 `abstract`，你*必须*重写此方法。你的实现必须将游标移动到结果集中对应的位置。可能的值范围从 `-1`（第一个位置之前，无效位置）到\
    \ `count`（最后一个位置之后，无效位置）。如果移动成功，请返回 `true`。如果不重写，则不会发生任何操作，并且该函数始终返回 `true`。\n\
    \n`AbstractCursor` 还提供了一个方法 `fillWindow(position: Int, window: CursorWindow?):\
    \ Unit`，你可以用它基于查询结果集填充 `android.database.CursorWindow` 对象。请参阅 `CursorWindow` 的在线\
    \ API 文档，以进一步了解此方法。\n\n除了 `AbstractCursor`，`Cursor` 接口还有多个其他（抽象）实现可供使用。我们在表 6-2\
    \ 中简要总结了它们。\n\n**表 6-2** 更多游标实现\n\n| `android.database` 中的名称 | 描述 |\n|---|---|\n\
    | `AbstractWindowedCursor` | 继承自 `AbstractCursor`，拥有一个包含数据的 `CursorWindow` 对象。子类负责在\
    \ `onMove(Int, Int)` 操作期间填充游标窗口，并在必要时分配新的游标窗口。与 `AbstractCursor` 相比更易实现，但需要在 `onMove()`\
    \ 中添加大量功能。 |\n| `CrossProcessCursor` | 一种允许从远程进程使用的游标实现。它只是 `android.database.Cursor`\
    \ 接口的扩展，包含三个额外的方法：`fillWindow(Int, CursorWindow)`、`getWindow(): CursorWindow`\
    \ 和 `onMove(Int, Int): Boolean`。它不提供自身实现；你需要重写 `Cursor` 中定义的所有方法。 |"
- fmt: "`CrossProcessCursorWrapper` | A cursor implementation that allows using it\
    \ from remote processes. Implements `CrossProcessCursor` and holds a `Cursor`\
    \ delegate, which can also be a `CrossProcessCursor`. |  \n`CursorWrapper` | Holds\
    \ a `Cursor` delegate all method calls are forwarded to. |  \n`MatrixCursor` |\
    \ A full implementation of `Cursor`, with in-memory storage of data as an object\
    \ array. You have to use `addRow(...)` to add data. The inner class `MatrixCursor.RowBuilder`\
    \ can be used to build rows to be used by `MatrixCursor.addRow(Array<Object>)`.\
    \ |  \n`MergeCursor` | Use this to transparently merge, or concatenate, cursor\
    \ objects. |  \n`sqlite.SQLiteCursor` | An implementation of `Cursor` with the\
    \ data backed by a SQLite database. Use one of the constructors to connect the\
    \ cursor with a SQLite database object. |\n\n## A Cursor Class Basing on the Cursor\
    \ Interface\n\nA more low-level approach of implementing a cursor is not relying\
    \ on `AbstractCursor` but instead implementing all the interface methods yourself.\
    \ You can then use subclassing as in `class MyCursor : Cursor { ... }` or use\
    \ an anonymous object as in `val myCursor = object : Cursor { ... }`. In section\
    \ “Cursor Interface” in the online text companion, we list and describe all the\
    \ interface methods.\n\n## Dispatching URIs Inside the Provider Code\n\nIn order\
    \ to simplify dispatching incoming URIs, the class `android.content.UriMatcher`\
    \ comes handy. If you have query-related URIs like\n\n```\npeople            #list\
    \ all people from a directory\npeople/37         #inquire a person with ID 37\n\
    people/37/phone   #get phone info of person with ID 37\n```\n\nand want to use\
    \ an easy switch statement, you can write inside your class or object\n\n```\n\
    val PEOPLE_DIR_AUTHORITY = \"directory\"\nval PEOPLE = 1\nval PEOPLE_ID = 2\n\
    val PEOPLE_PHONES = 3\nval uriMatcher = UriMatcher(UriMatcher.NO_MATCH)\ninit\
    \ {\nuriMatcher.addURI(PEOPLE_DIR_AUTHORITY,\n\"people\", PEOPLE)\nuriMatcher.addURI(PEOPLE_DIR_AUTHORITY,\n\
    \"people/#\", PEOPLE_ID)\nuriMatcher.addURI(PEOPLE_DIR_AUTHORITY,\n\"people/#/phone\"\
    , PEOPLE_PHONES)\n}\n```\n\nwhere “#” stands for any number and “*” matches any\
    \ string.\n\nIn your `ContentProvider` implementation, you can then use the following\
    \ construct to dispatch incoming string URLs:\n\n```\nwhen(uriMatcher.match(url))\
    \ {\nPEOPLE ->\n// incoming path = people, do s.th. with that...\nPEOPLE_ID ->\n\
    // incoming path = people/#, do s.th. with that...\nPEOPLE_PHONES ->\n// incoming\
    \ path = people/#/phone, ...\nelse ->\n// do something else\n}\n```\n\n## Providing\
    \ Content Files\n\nContent providers can not only give access to database-like\
    \ content; they may also expose methods for the retrieval of file-like data, like\
    \ image or sound files. For this aim the following methods are provided:\n\n*\
    \   `override fun getStreamTypes(uri:Uri, mimeTypeFilter:String) : Array<String>`\
    \  \n    If your content provider offers files, overwrite this method to allow\
    \ clients to determine supported MIME types given a URI. The `mimeTypeFilter`\
    \ is supposed not to be `null`, and you can use it to filter the output. It supports\
    \ wildcards, so if a client wants to retrieve all values, it will write “*/*”\
    \ here, and your provider code needs to correctly handle this. The output must\
    \ also contain all those types that may be the result of suitable type conversions\
    \ performed by the provider. May return `null` to indicate an empty result set.\
    \ Examples are “image/png” or “audio/mpeg”.\n\n*   `override fun openFile(uri:Uri,\
    \ mode:String): ParcelFileDescriptor`  \n    Override this to handle requests\
    \ to open a file blob. The parameter “mode” must be one of (there is no default):\n\
    \    *   “r” for read-only access\n    *   “w” for write-only access (first erasing\
    \ if data is already present)\n    *   “wa” like “w”, but possibly appends data\n\
    \    *   “rw” for reading and appending writing\n    *   “rwt” like “rw”, but\
    \ truncates existing data\n    To learn what to do with the returned `ParcelFileDescriptor`,\
    \ see in the following.\n\n*   `override fun openFile(uri:Uri, mode:String, signal:CancellationSignal):\
    \ ParcelFileDescriptor`  \n    Same as `openFile(Uri, String)`, but additionally\
    \ the client may signal a cancellation while reading the file is in progress –\
    \ the provider can save the `signal` object and catch the client’s cancellation\
    \ request by periodically calling `throwIfCancelled()` on the `signal` object.\n\
    \n*   `override fun openAssetFile(uri:Uri, mode:String): AssetFileDescriptor`\
    \  \n    This is like `openFile(Uri, String)`, but can be implemented by providers\
    \ that need to be able to return subsections of files, often assets inside of\
    \ their APK. For implementing this you probably want to use the `android.content.res.AssetManager`\
    \ class. You have it in the `asset` field of a context, so, for example, in an\
    \ activity you can directly use `asset` to address the `AssetManager`.\n\n*  \
    \ `override fun openAssetFile(uri:Uri, mode:String, signal:CancellationSignal):\
    \ AssetFileDescriptor`  \n    Same as `openAssetFile(Uri, String)`, but allows\
    \ for cancellation from the client side. The provider can save the `signal` object\
    \ and catch the client’s cancellation request by periodically calling `throwIfCancelled()`\
    \ on the `signal` object.\n\n*   `override fun : openTypedAssetFile(uri:Uri, mimeTypeFilter:String,\
    \ opts:Bundle): AssetFileDescriptor`  \n    Implement this if you want clients\
    \ to be able to read (not write!) asset data by MIME type. The default implementation\
    \ compares the `mimeTypeFilter` with whatever it gets from `getType(Uri)`, and\
    \ if they match, it simply forwards to `openAssetFile(...)`.\n\n*   `override\
    \ fun : openTypedAssetFile(uri:Uri, mimeTypeFilter:String, opts:Bundle, signal:CancellationSignal):\
    \ AssetFileDescriptor`  \n    Same as `openTypedAssetFile(Uri, String, Bundle)`,\
    \ but allows for cancellation from the client side. The provider can save the\
    \ `signal` object and catch the client’s cancellation request by periodically\
    \ calling `throwIfCancelled()` on the `signal` object.\n\n*   `override fun <T\
    \ : Any?> openPipeHelper(uri: Uri?, mimeType: String?, opts: Bundle?, args: T,\
    \ func: PipeDataWriter<T>?): ParcelFileDescriptor`  \n    A helper function for\
    \ implementing `openTypedAssetFile(Uri, String, Bundle)`. It creates a data pipe\
    \ and a background thread allowing you to stream generated data back to the client.\
    \ This function returns a new `ParcelFileDescriptor`. After work is done, the\
    \ caller must close it.\n\n*   `override fun openFileHelper(uri:Uri, mode:String):\
    \ ParcelFileDescriptor`  \n    This is a convenience method for subclasses. The\
    \ default implementation opens a file whose path is given by the result of a `query()`\
    \ using the URI provided. For the file path, the “_data” member gets extracted\
    \ from the query result, and the result set count must be `1`.\n\nThose methods\
    \ that return a `ParcelFileDescriptor` object can invoke appropriate constructors\
    \ as in\n\n```\nval fd = ... // get the ParcelFileDescriptor\nval inpStream =\
    \ ParcelFileDescriptor.AutoCloseInputStream(fd)\nval outpStream = ParcelFileDescriptor.AutoCloseOutputStream(fd)\n\
    ```\n\nto build input and output streams for the files. You must use the `close()`\
    \ method on the stream once its work is done – the “Auto” means the `ParcelFileDescriptor`\
    \ gets closed for you automatically when you close the streams.\n\nSimilarly,\
    \ those methods that return an `AssetFileDescriptor` object can invoke appropriate\
    \ constructors as in\n\n```\nval fd = ... // get the AssetFileDescriptor\nval\
    \ inpStream = AssetFileDescriptor.AutoCloseInputStream(fd)\nval outpStream = AssetFileDescriptor.AutoCloseOutputStream(fd)\n\
    ```\n\nto build input and output streams for the files. Here again, you must use\
    \ the `close()` method on the stream once its work is done – only the `AssetFileDescriptor`\
    \ gets closed for you automatically when you close the streams.\n\n## Informing\
    \ Listeners of Data Changes"
