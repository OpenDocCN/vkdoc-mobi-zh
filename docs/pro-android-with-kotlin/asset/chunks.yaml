    \ the badge as follows, for example, after you load\nthe contact information by\
    \ user interface activities:\n\n```\nval contactUri = ContactsContract.Contacts.getLookupUri(\n\
    id.toLong(), lookup)\nquickBadge.assignContactUri(contactUri)\nval thumbnail =\n\
    loadContactPhotoThumbnail(photo.toString())\nquickBadge.setImageBitmap(thumbnail)\n\
    ```\n\nwhere the `loadContactPhotoThumbnail()`\nfunction  loads\nthe thumbnail\
    \ image data:\n\n```\nprivate fun loadContactPhotoThumbnail(photoData: String):\n\
    Bitmap? {\nvar afd: AssetFileDescriptor? = null\ntry {\nval thumbUri = Uri.parse(photoData)\n\
    afd = contentResolver.\nopenAssetFileDescriptor(thumbUri, \"r\")\nafd?.apply {\n\
    fileDescriptor?.apply {\nreturn BitmapFactory.decodeFileDescriptor(\nthis, null,\
    \ null)\n}\n}\n} catch (e: FileNotFoundException) {\n// Handle file not found\
    \ errors ...\n} finally {\nafd?.close()\n}\nreturn null\n}\n```\n\nIf we want\
    \ to use Jetpack Compose as a front-end development\ntechnology , we immediately\
    \ realize that there is no\n“QuickContactBadge” composable element    available.\
    \ This is\nnot a real problem, though, because with `AndroidView` there is\na\
    \ compatibility bridge between Jetpack Compose and traditional\nAndroidViews.\
    \ All you have to do is to add\n\n```\nAndroidView(\nmodifier = Modifier.width(60.dp).height(60.dp),\n\
    factory = { context ->\n// This instantiates a non-Compose View:\nQuickContactBadge(context).apply\
    \ {\nval contactUri = ContactsContract.\nContacts.getLookupUri(\nitm.id.toLong(),\n\
    itm.lookupKey)\nassignContactUri(contactUri)\nval thumbnail =\nloadContactPhotoThumbnail(\n\
    itm.photoThumbnailUri)\nsetImageBitmap(thumbnail)\n}\n},\nupdate = { view ->\n\
    // View's been inflated or state has been\n// updated. Add logic here if necessary.\n\
    // Because the QuickContactBadge does not\n// represent a state, we don't need\
    \ to add\n// anything here.\n}\n)\n```\n\nto your composable’s structure. The\
    \ `itm` is a data holder\n(data class) for the ID, the lookup-key, and the photo\
    \ thumbnail URI   . Remember that for\nJetpack Compose, no entry in whatever layout\
    \ XML file is needed.\n\nSearch Framework\nThe  *search\nframework*  allows you\
    \ to seamlessly add search functionality\nto your app and register your app as\
    \ a searchable items provider in the\nAndroid OS.\n\nTalking of the user\ninterface\
    \ , you have two options:\n\n*   Open the search dialog provided by the OS.\n\n\
    *   Add a search widget to your UI via `SearchView`.\n\nMore precisely, in order\
    \ to include search facilities \ninside your app, you have to\n\n1.  Provide a\
    \ searchable configuration as an XML file.\n\n2.  Provide a dialog or search widget.\n\
    \n3.  Provide an activity that (A) is able to receive a search query, (B)\n  \
    \  performs the search inside your app’s data, (C) and displays the search\n \
    \   result.\n\nThe rest of this section walks through these requirements.\n\n\
    The Searchable Configuration\n\nThe searchable\nconfiguration  \n is a file named\
    \ `searchable.xml` and\nresides inside the folder `/res/xml` of your\nproject.\
    \ The most basic contents of this file read\n\nThe “@string/...” entries point\
    \ to localized string resources. The\n“@string/app_label” points to a label and\
    \ should equal the name of the\n“label” attribute of the `<application>`\nelement.\
    \ The other one, “@string/search_hint”, is the string to be shown\ninside search\
    \ fields if nothing has been entered yet. It is recommended\nand should show something\
    \ like “Search <content>” with\n <content>being specific to the data being searched\
    \ for. There are\na lot more possible attributes and some optional child elements\
    \ – we\nwill mention some in the following</content></content> sections   . For\
    \ the complete\nlist, please see the online documentation under the “Searchable\n\
    Configuration” document.\n\nThe Searchable Activity\n\nFor the activity \n  that\
    \ handles\nsearch-related issues inside your app, start with its declaration inside\n\
    `AndroidManifest.xml`.\nThe activity needs to have a special signature there,\
    \ as in\n\n```\n\n...\n\n```\n\nThe name of the activity is up to you. All the\
    \ other tags and\nattributes must be as shown here.\n\nNext, we let this activity\
    \ receive the search request. This is done\ninside its `onCreate()` callback\n\
    as in\n\n```\noverride fun onCreate(savedInstanceState: Bundle?) {\nsuper.onCreate(savedInstanceState)\n\
    setContentView(R.layout.activity_searchable)\n// This is the standard way a system\
    \ search dialog\n// or the search widget communicates the query\n// string:\n\
    if (Intent.ACTION_SEARCH == intent.action) {\nval query =\nintent.getStringExtra(SearchManager.QUERY)\n\
    doMySearch(query)\n}\n// More initialization if necessary...\n}\n```\n\nThe `doMySearch()`\
    \ function  is supposed\nto perform the search and present the result or whatever\
    \ inside the\n`SearchableActivity`\n . The way this\nis done is totally up to\
    \ the application – it could be a database search    or a search using a\ncontent\
    \ provider or any other way you might think of.\n\nThe Search Dialog\n\nIn order\
    \ for any activity to open the system’s search dialog and have it\npass the query\
    \ \n  entered there\nto the `SearchableActivity`,\ninside `AndroidManifest.xml`\n\
    you write\n\n```\n\n...\n\n```\n\nThis example allows for the `MainActivity` to\
    \ open\nthe system’s search dialog – in fact you can use any suitable activity\n\
    from inside your app for that purpose.\n\nTo open the search\ndialog   \ninside\
    \ your searchable activity, write\n\n```\nonSearchRequested()\n```\n\nNote\n\n\
    Usually, directly executing an obvious callback function starting\nwith “on…”\
    \ has a bad smell. You sometimes do that for half-legal\nshortcuts. The reason\
    \ we have to do it here is that your device might\nhave a dedicated search button.\
    \ In this case  `onSearchRequested()`\n gets called from the system, and it is\
    \ a real callback method.\nBecause such a button is optional, it is however necessary\
    \ always to\nprovide a search initiator from inside your app.\n\nA dialog-based\
    \ search flow    gets depicted in\nFigure [8-7](#463716_2_En_8_Chapter.xhtml#Fig7).\n\
    \n![](images/463716_2_En_8_Chapter/463716_2_En_8_Fig7_HTML.jpg)\n\nA screenshot\
    \ of a dialog-based search flow with an animated picture\nand two rightward arrows.\n\
    \nFigure 8-7\nA Dialog-Based Search Flow\n\nThe Search Widget\n\nInstead of opening\
    \ the system’s search dialog   , you can also place a\n`<SearchView>`\nwidget\
    \ inside your UI. While in principle you can place it wherever you\nlike, it is\
    \ recommended to put it in the action bar. For this aim,\nprovided you have set\
    \ up an action bar and defined a menu there, inside\nthe menu XML definition,\
    \ write\n\nWhat then needs to be done inside your app in order to connect the\
    \ widget    with the search\nframework is"
  trans: "\n# 快速联系人徽章\n\n`QuickContactBadge` 允许你使用一个 GUI 小部件，用户点击它即可查看联系人的详细信息，并执行任何合适的操作，例如发送电子邮件、拨打电话等。此详情屏幕由系统呈现，你无需在应用中实现它。请参见图\
    \ 8-6。\n\n![](img/463716_2_En_8_Fig6_HTML.jpg)\n\n一张快速联系人徽章的截图，显示了一个动态图片。\n\n\
    **图 8-6** 快速联系人徽章\n\n为了使用传统的 XML 描述方式生成这样一个快速联系人徽章，你需要在布局文件中添加以下内容：\n\n```\n<QuickContactBadge\n\
    \    android:id=\"@+id/quickBadge\"\n    android:layout_width=\"wrap_content\"\
    \n    android:layout_height=\"wrap_content\" />\n```\n\n接下来我们将讨论如何使用 Jetpack Compose\
    \ 来包含快速联系人徽章。\n\n在你的代码中，你必须将该徽章与从联系人提供程序获取的以下信息关联起来：原始联系人 ID、查找键和缩略图 URI。相应的代码可能如下所示：\n\
    \n```\nval id = row[ContactsContract.Contacts._ID]\nval lookup = row[ContactsContract.Contacts.LOOKUP_KEY]\n\
    val photo = row[ContactsContract.Contacts.PHOTO_THUMBNAIL_URI]\n```\n\n其中，`row`\
    \ 例如是你从联系人内容提供程序查询中获取的一个映射。在这种情况下，只需在*原始联系人*表中进行查询就足够了；你不需要再查询*数据*表。\n\n接着，我们可以像下面这样配置徽章，例如，在通过用户界面活动加载联系人信息之后：\n\
    \n```\nval contactUri = ContactsContract.Contacts.getLookupUri(id.toLong(), lookup)\n\
    quickBadge.assignContactUri(contactUri)\nval thumbnail = loadContactPhotoThumbnail(photo.toString())\n\
    quickBadge.setImageBitmap(thumbnail)\n```\n\n其中，`loadContactPhotoThumbnail()`\
    \ 函数用于加载缩略图数据：\n\n```\nprivate fun loadContactPhotoThumbnail(photoData: String):\
    \ Bitmap? {\n    var afd: AssetFileDescriptor? = null\n    try {\n        val\
    \ thumbUri = Uri.parse(photoData)\n        afd = contentResolver.openAssetFileDescriptor(thumbUri,\
    \ \"r\")\n        afd?.apply {\n            fileDescriptor?.apply {\n        \
    \        return BitmapFactory.decodeFileDescriptor(this, null, null)\n       \
    \     }\n        }\n    } catch (e: FileNotFoundException) {\n        // 处理文件未找到错误...\n\
    \    } finally {\n        afd?.close()\n    }\n    return null\n}\n```\n\n如果我们想使用\
    \ Jetpack Compose 作为前端开发技术，我们会立即意识到没有可用的 `QuickContactBadge` 可组合元素。不过，这并非一个真正的问题，因为通过\
    \ `AndroidView`，在 Jetpack Compose 和传统 Android View 之间有一个兼容桥接。你需要做的只是添加以下内容：\n\n\
    ```\nAndroidView(\n    modifier = Modifier.width(60.dp).height(60.dp),\n    factory\
    \ = { context ->\n        // 此实例化一个非 Compose View：\n        QuickContactBadge(context).apply\
    \ {\n            val contactUri = ContactsContract.Contacts.getLookupUri(\n  \
    \              itm.id.toLong(),\n                itm.lookupKey\n            )\n\
    \            assignContactUri(contactUri)\n            val thumbnail = loadContactPhotoThumbnail(itm.photoThumbnailUri)\n\
    \            setImageBitmap(thumbnail)\n        }\n    },\n    update = { view\
    \ ->\n        // View 已展开或状态已更新。\n        // 如有必要，在此处添加逻辑。\n        // 由于 QuickContactBadge\
    \ 不表示状态，\n        // 此处无需添加任何内容。\n    }\n)\n```\n\n到你的可组合结构体中。`itm` 是一个用于保存 ID、查找键和照片缩略图\
    \ URI 的数据持有者（数据类）。请记住，对于 Jetpack Compose，不需要在任何布局 XML 文件中添加条目。\n\n# 搜索框架\n\n*搜索框架*允许你将搜索功能无缝集成到你的应用中，并将你的应用注册为\
    \ Android 操作系统中的可搜索项提供程序。\n\n谈到用户界面，你有两个选择：\n\n- 打开操作系统提供的搜索对话框。\n- 通过 `SearchView`\
    \ 在你的 UI 中添加搜索小部件。\n\n更精确地说，为了在你的应用中包含搜索功能，你必须：\n\n1.  提供一个可搜索配置文件（XML 格式）。\n\
    2.  提供一个对话框或搜索小部件。\n3.  提供一个 Activity，该 Activity (A) 能够接收搜索查询，(B) 在你的应用数据内执行搜索，(C)\
    \ 并显示搜索结果。\n\n本节的其余部分将逐一说明这些要求。\n\n## 可搜索配置\n\n可搜索配置文件名为 `searchable.xml`，位于你项目的\
    \ `/res/xml` 文件夹中。该文件最基本的内容如下：\n\n```\n<searchable xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:label=\"@string/app_label\"\n    android:hint=\"@string/search_hint\"\
    \ />\n```\n\n`@string/...` 条目指向本地化的字符串资源。`@string/app_label` 指向一个标签，应与 `<application>`\
    \ 元素的 `label` 属性值相等。另一个 `@string/search_hint` 是在搜索字段中尚未输入任何内容时显示的字符串。建议其内容类似于\
    \ `\"搜索<内容>\"`，其中的 `<内容>` 应与被搜索的数据类型相关。还有更多可能的属性和一些可选的子元素——我们将在后续章节中提及一些。完整列表请参阅在线文档中的“可搜索配置”文档。\n\
    \n## 可搜索 Activity\n\n对于处理应用中搜索相关问题的 Activity，首先在 `AndroidManifest.xml` 中声明它。该\
    \ Activity 在其中需要有一个特殊的签名，如下所示：\n\n```\n<activity\n    android:name=\".SearchableActivity\"\
    \n    android:exported=\"false\">\n    <intent-filter>\n        <action android:name=\"\
    android.intent.action.SEARCH\" />\n    </intent-filter>\n    <meta-data\n    \
    \    android:name=\"android.app.searchable\"\n        android:resource=\"@xml/searchable\"\
    \ />\n</activity>\n```\n\nActivity 的名称由你决定。所有其他标签和属性必须按此处所示。\n\n接下来，我们让这个 Activity\
    \ 接收搜索请求。这是在其 `onCreate()` 回调中完成的，如下所示：\n\n```\noverride fun onCreate(savedInstanceState:\
    \ Bundle?) {\n    super.onCreate(savedInstanceState)\n    setContentView(R.layout.activity_searchable)\n\
    \    // 这是系统搜索对话框或搜索小部件传递查询字符串的标准方式：\n    if (Intent.ACTION_SEARCH == intent.action)\
    \ {\n        val query = intent.getStringExtra(SearchManager.QUERY)\n        doMySearch(query)\n\
    \    }\n    // 如有必要进行更多初始化...\n}\n```\n\n`doMySearch()` 函数负责执行搜索并将结果（或其他内容）呈现在\
    \ `SearchableActivity` 中。实现方式完全取决于应用——可以是数据库搜索、使用内容提供程序的搜索，或者你能想到的任何其他方式。\n\n\
    ## 搜索对话框\n\n为了让任何 Activity 都能打开系统的搜索对话框，并将其中输入的查询传递给 `SearchableActivity`，你需要在\
    \ `AndroidManifest.xml` 中编写如下内容：\n\n```\n<activity\n    android:name=\".MainActivity\"\
    \n    android:exported=\"true\">\n    <!-- 其他属性... -->\n    <meta-data\n     \
    \   android:name=\"android.app.default_searchable\"\n        android:value=\"\
    .SearchableActivity\" />\n</activity>\n```\n\n此示例允许 `MainActivity` 打开系统的搜索对话框——实际上，你可以使用应用内任何合适的\
    \ Activity 来实现此目的。\n\n要在你的可搜索 Activity 中打开搜索对话框，编写以下代码：\n\n```\nonSearchRequested()\n\
    ```\n\n> **注意**  \n> 通常，直接执行一个以“on…”开头的明显回调函数是一种不好的做法。你有时会为了“半合法”的快捷方式而这样做。我们在这里必须这样做，是因为你的设备可能有一个专用的搜索按钮。在这种情况下，系统会调用\
    \ `onSearchRequested()`，这是一个真正的回调方法。但由于这种按钮是可选的，因此始终有必要在你的应用中提供一个搜索启动器。\n\n基于对话框的搜索流程如图\
    \ 8-7 所示。\n\n![](img/463716_2_En_8_Fig7_HTML.jpg)\n\n一张基于对话框的搜索流程截图，显示了一个动态图片和两个向右箭头。\n\
    \n**图 8-7** 基于对话框的搜索流程\n\n## 搜索小部件\n\n除了打开系统的搜索对话框，你也可以在你的 UI 中放置一个 `<SearchView>`\
    \ 小部件。虽然原则上可以将其放置在任何地方，但建议将其放在操作栏中。为此，假设你已经设置了操作栏并在其中定义了菜单，那么在菜单 XML 定义中，编写以下内容：\n\
    \n```\n<item\n    android:id=\"@+id/action_search\"\n    android:title=\"@string/action_search\"\
    \n    android:icon=\"@drawable/ic_search\"\n    app:actionViewClass=\"android.widget.SearchView\"\
    \n    app:showAsAction=\"ifRoom\" />\n```\n\n接下来，在你的应用中，为了将该小部件与搜索框架连接起来，需要执行以下操作：\n"
- fmt: "```\n// Set the searchable configuration\nval searchManager = getSystemService(SEARCH_SERVICE)\n\
    as SearchManager\nval searchView = menu.findItem(R.id.action_search).\nactionView\
    \ as SearchView\nsearchView.setSearchableInfo(\nsearchManager.getSearchableInfo(componentName))\n\
    // Do not iconify the widget; expand it by default:\nsearchView.setIconifiedByDefault(false)\n\
    ```\n\nThis is it! The flow looks like that shown in Figure [8-8](#463716_2_En_8_Chapter.xhtml#Fig8)\
    \ (you’d press the search icon in the action bar).\n\n![](images/463716_2_En_8_Chapter/463716_2_En_8_Fig8_HTML.jpg)\n\
    \nA screenshot of a widget-based search flow with an animated picture and two\
    \ rightward arrows.\n\n**Figure 8-8** A Widget-Based Search Flow\n\nIf you want\
    \ to do the same using Jetpack Compose as a front-end technology, you must use\
    \ `AndroidView`, because there is no built-in composable for the search widget:\n\
    \n```\n@Composable\nfun MySearchWidget() {\nvar searchTxt by remember { mutableStateOf(\"\
    \") }\nAndroidView(\nmodifier = Modifier\n.fillMaxWidth()\n.height(60.dp),\nfactory\
    \ = { context ->\n// This instantiates a non-Compose\n// View:\nval searchManager\
    \ =\ngetSystemService(SEARCH_SERVICE)\nas SearchManager\nSearchView(context).apply\
    \ {\nsetSearchableInfo(\nsearchManager.\ngetSearchableInfo(\ncomponentName))\n\
    isIconifiedByDefault = false\nsetQuery(searchTxt, false)\n}\n},\nupdate = { view\
    \ ->\n// View's been inflated or state has\n// been updated. Add logic here if\n\
    // necessary.\nview.setQuery(searchTxt, false)\n}\n)\n}\n```\n\n## Search Suggestions\n\
    \nThere are two ways you can help the user input search query strings: First,\
    \ you can let the system memorize queries for the next times the searches get\
    \ used. Second, you can let your app provide fully customizable suggestions.\n\
    \n### Recent Query Suggestions\n\nFor the recent query suggestions, you implement\
    \ a content provider subclass of `SearchRecentSuggestionsProvider` and add it\
    \ to `AndroidManifest.xml` like any other content provider. A basic but nevertheless\
    \ already fully implemented content provider looks like:\n\n```\nclass RecentsProvider\
    \ :\nSearchRecentSuggestionsProvider {\nval AUTHORITY = \"com.example.RecentsProvider\"\
    \nval MODE = DATABASE_MODE_QUERIES\ninit {\nsetupSuggestions(AUTHORITY, MODE)\n\
    }\n}\n```\n\nRegister it inside `/res/xml/searchable.xml` as follows:\n\nNew are\
    \ the last two attributes. The `android:searchSuggestAuthority` here draws a connection\
    \ to the provider.\n\nThe content provider must still be registered inside `AndroidManifest.xml`.\
    \ This, for example, reads:\n\nThis reads previous queries from an automatically\
    \ generated database. What is left to do is to add the search queries. For this\
    \ aim, inside the `SearchableActivity` class, write:\n\n```\noverride fun onCreate(savedInstanceState:\
    \ Bundle?) {\nsuper.onCreate(savedInstanceState)\nsetContentView(R.layout.activity_searchable)\n\
    // This is the standard way a system search dialog\n// or the search widget communicates\
    \ the query\n// string:\nif (Intent.ACTION_SEARCH == intent.action) {\nval query\
    \ =\nintent.getStringExtra(SearchManager.QUERY)\n// Add it to the recents suggestion\
    \ database\nval suggestions = SearchRecentSuggestions(this,\nRecentsProvider.AUTHORITY,\
    \ RecentsProvider.MODE)\nsuggestions.saveRecentQuery(q, null)\ndoMySearch(query)\n\
    }\n// More initialization if necessary...\n}\n```\n\nThe second parameter for\
    \ the `saveRecentQuery()` method could be a second line for annotation purposes.\
    \ For this to work, you (A) have to use `val MODE = DATABASE_MODE_QUERIES or DATABASE_MODE_2LINES`\
    \ in the `RecentsProvider` and (B) find a way to retrieve annotation texts inside\
    \ the `SearchableActivity` class.\n\n### Custom Suggestions\n\nCustom suggestions\
    \ are more powerful compared with recent query suggestions. They can be fully\
    \ app or domain specific, and you can provide intelligent suggestions to the user,\
    \ tailored for the current user action. Compared with recent query suggestions,\
    \ you instead implement and register a `ContentProvider` obeying certain rules:\n\
    \n*   The Android OS will fire `ContentProvider.query(uri, projection, selection,\
    \ selectionArgs, sortOrder)` calls with URIs like:\n\n```\ncontent://your.authority/\n\
    optional.suggest.path/\nSUGGEST_URI_PATH_QUERY/\n\n```\n\nwhere `your.authority`\
    \ is the content provider authority, `/optional.suggest.path` might be added by\
    \ the search configuration for disambiguation, and `SUGGEST_URI_PATH_QUERY` is\
    \ the value of the constant `SearchManager.SUGGEST_URI_PATH_QUERY`. The `<query>`\
    \ contains the string to be searched for. Both the `selection` and `selectionArgs`\
    \ parameters will be filled only if appropriately configured in the search configuration.\n\
    \n*   The resulting `Cursor` must return the following fields (shown are constant\
    \ names):\n\n    *   **BaseColumns._ID** – A (technical) unique ID you must provide\n\
    \n    *   **SearchManager.SUGGEST_COLUMN_TEXT_1** – The search suggestion\n\n\
    \    *   **SearchManager.SUGGEST_COLUMN_TEXT_2** – (optional) A second, less important\
    \ string representing an annotation text\n\n    *   **SearchManager.SUGGEST_COLUMN_ICON_1**\
    \ – (optional) A drawable resource ID, content, or file URI string for an icon\
    \ to be shown on the left\n\n    *   **SearchManager.SUGGEST_COLUMN_ICON_2** –\
    \ (optional) A drawable resource ID, content, or file URI string for an icon to\
    \ be shown on the right\n\n    *   **SearchManager.SUGGEST_COLUMN_INTENT_ACTION**\
    \ – (optional) An intent action string that is used to call an Intent when the\
    \ suggestion gets clicked\n\n    *   **SearchManager.SUGGEST_COLUMN_INTENT_DATA**\
    \ – An intent `data` member to be sent with the Intent\n\n    *   **SearchManager.SUGGEST_COLUMN_INTENT_DATA_ID**\
    \ – A string to be appended to the intent `data` member\n\n    *   **SearchManager.SUGGEST_COLUMN_INTENT_EXTRA_DATA**\
    \ – Extra data to be sent with the Intent\n\n    *   **SearchManager.SUGGEST_COLUMN_QUERY**\
    \ – The original query string\n\n    *   **SearchManager.SUGGEST_COLUMN_SHORTCUT_ID**\
    \ – Used when providing suggestions for the *Quick Search Box* – indicates whether\
    \ a search suggestion should be stored as a shortcut and whether it should be\
    \ validated\n\n    *   **SearchManager.SUGGEST_COLUMN_SPINNER_WHILE_REFRESHING**\
