    \ OS, you can run media apps, messaging apps, navigation apps, point-of-interest\
    \ apps, and video playback apps. In this book we do not further dig into car-related\
    \ Android programming. However, [`https://developer.android.com/training/cars`](https://developer.android.com/training/cars)\
    \ gives you a good starting point for automotive projects. Also, in the *New Project*\
    \ wizard of Android Studio, you can easily set up a project for an Android Automotive\
    \ media or messaging app. And there is also an emulated Android Automotive OS\
    \ device available.\n\n# Playing and Recording Sound\n\nPlaying sound in Android\
    \ means one of two things or both together:\n\n* **Short sound snippets**: You\
    \ typically play them as a feedback to user interface actions, like pressing a\
    \ button or entering something in an edit field. Another use case is games, where\
    \ certain events could be mapped to short audio fragments. Especially for UI reactivity,\
    \ make sure you don’t annoy users and provide for a possibility to readily mute\
    \ audio output.\n* **Music playback**: You want to play music pieces with a duration\
    \ longer than a few seconds.\n\nFor short audio snippets, you use a `SoundPool`\
    \ and for music pieces a `MediaPlayer`. We talk about them and also audio recording\
    \ in the following sections.\n\n## Short Sound Snippets\n\nFor short sound snippets,\
    \ you use a `SoundPool` and preload the sounds during initialization. You cannot\
    \ immediately use the sound snippets after you load them using one of the `SoundPool.load(...)`\
    \ methods. Instead, you have to wait until all sounds are loaded. The suggested\
    \ way is not to wait for some time as you frequently can read in some blogs –\
    \ instead, listen to sound loaded events and count finished snippets. You can\
    \ let a custom class do that, for example:\n\n```\nclass SoundLoadManager(val\
    \ ctx:Context) {\n  var scheduled = 0\n  var loaded = 0\n  val sndPool:SoundPool\n\
    \  val soundPoolMap = mutableMapOf()\n  init {\n    sndPool =\n      if (Build.VERSION.SDK_INT\
    \ >=\n        Build.VERSION_CODES.LOLLIPOP) {\n        SoundPool.Builder()\n \
    \         .setMaxStreams(4)\n          .setAudioAttributes(\n            AudioAttributes.Builder()\n\
    \              .setUsage(\n                AudioAttributes.USAGE_MEDIA)\n    \
    \          .setContentType(\n                AudioAttributes.CONTENT_TYPE_MUSIC)\n\
    \              .build()\n          ).build()\n      } else {\n        SoundPool(4,\n\
    \          AudioManager.STREAM_MUSIC,\n          100)\n      }\n    sndPool.setOnLoadCompleteListener({\n\
    \      sndPool, sampleId, status ->\n      if(status != 0) {\n        Log.e(\"\
    LOG\",\n          \"Sound could not be loaded\")\n      } else {\n        Log.i(\"\
    LOG\", \"Loaded sample \" +\n          sampleId + \", status = \" +\n        \
    \  status)\n      }\n      loaded++\n    })\n  }\n  fun load(resourceId:Int) {\n\
    \    scheduled++\n    soundPoolMap[resourceId] =\n      sndPool.load(ctx, resourceId,\
    \ 1)\n  }\n  fun allLoaded() = scheduled == loaded\n  fun play(rsrcId: Int, loop:\
    \ Boolean):Int {\n    return soundPoolMap[rsrcId]?.run {\n      val audioManager\
    \ = ctx.getSystemService(\n        Context.AUDIO_SERVICE) as AudioManager\n  \
    \    val curVolume = audioManager.\n        getStreamVolume(\n        AudioManager.STREAM_MUSIC)\n\
    \      val maxVolume = audioManager.\n        getStreamMaxVolume(\n        AudioManager.STREAM_MUSIC)\n\
    \      val leftVolume = 1f * curVolume / maxVolume\n      val rightVolume = 1f\
    \ * curVolume / maxVolume\n      val priority = 1\n      val noLoop = if(loop)\
    \ -1 else 0\n      val normalPlaybackRate = 1f\n      sndPool.play(this, leftVolume,\
    \ rightVolume,\n        priority, noLoop, normalPlaybackRate)\n    } ?: -1\n \
    \ }\n}\n```\n\nWhat this class does is as follows:\n\n* Loads and saves an instance\
    \ of `SoundPool`. The constructor is deprecated; that is why we use different\
    \ ways of initializing it, dependent of the Android API level. The parameters\
    \ shown here may be adapted according to your needs. Please see the API documentation\
    \ of `SoundPool`, `SoundPool.Builder`, and `AudioAttributes.Builder`.\n* Provides\
    \ for a `load()` method with a resource ID as argument – this could, for example,\
    \ be a WAV file inside the `res/raw` folder.\n* Provides for a `allLoaded()` method\
    \ you can use to check whether all sounds have been loaded.\n* Provides for a\
    \ `play()` method you can use to play a loaded sound. Will do nothing if the sound\
    \ is not loaded yet. Will return the stream ID if the sound gets actually played,\
    \ or else `-1`.\n\nTo use the class, create a field with an instance. Upon initialization,\
    \ for example, in an activity’s `onCreate(...)` method, load the sounds and invoke\
    \ `play()` to start playing."
  raw: "Android TV Content Search\nYour Android TV app may contribute to the Android\
    \ search framework . We\ndescribed it in section “Search Framework” of Chapter\
    \ [8](#463716_2_En_8_Chapter.xhtml) – in this section we point out\npeculiarities\
    \ for using search in a TV app.\n\nThe search item fields important for TV search\
    \ *suggestions* are\nshown in Table [14-2](#463716_2_En_14_Chapter.xhtml#Tab2),\
    \ where in the\nleft column constant names from the `SearchManager` class\nare\
    \ shown. You can use them in your database as shown, or at least you\nmust provide\
    \ a mapping mechanism inside the app.\n\nTable 14-2\nTV Search Fields\n\nField\
    \ |\n Description |\n\n| --- | --- | --- | --- | --- |\n\nSUGGEST_COLUMN_TEXT_1\
    \ |\n Required: The name of your content |\n\nSUGGEST_COLUMN_TEXT_2 |\n A text\
    \ description of your content |\n\nSUGGEST_COLUMN_RESULT_CARD_IMAGE |\n An image/poster/cover\
    \ for your content |\n\nSUGGEST_COLUMN_CONTENT_TYPE |\n Required: The MIME type\
    \ of your media |\n\nSUGGEST_COLUMN_VIDEO_WIDTH |\n The width of your media |\n\
    \nSUGGEST_COLUMN_VIDEO_HEIGHT |\n The height of your media |\n\nSUGGEST_COLUMN_PRODUCTION_YEAR\
    \ |\n Required: The production year |\n\nSUGGEST_COLUMN_DURATION |\n Required:\
    \ The duration in milliseconds |\n\nAs for any other search provider, create a\
    \ content provider for the\nsearch suggestions inside your app.\n\nAs soon as\
    \ the user submits the search dialog to actually\n*perform* a search query, the\
    \ search framework fires an Intent\nwith action `SEARCH`, so you can\nwrite an\
    \ activity with an appropriate intent filter as follows:\n\nAndroid TV Games\n\
    \nWhile game \ndevelopment seems very appealing first due to the large display,\
    \ it is\nimportant to have a couple of things in mind:\n\n*   TVs are always in\
    \ landscape mode, so make sure your app is good\n    at using landscape mode.\n\
    \n*   For a multiplayer game, it is normally not possible to hide\n    things\
    \ from users, for example, in a card game. You could connect TV\n    apps to companion\
    \ apps running on smartphones to remedy this.\n\n*   Your TV game should support\
    \ gamepads, and it should prominently\n    tell the users how to use them. Inside\
    \ the `AndroidManifest.xml`\n    file, you better declare `<uses-feature android:name\
    \ = \"android.hardware.gamepad\" android:required = \"false\"/>` – if instead\
    \ you write `required = \"true\",`\n    you make your app uninstallable for users\
    \ who don’t own\n    gamepads.\n\nAndroid TV Channels\nThe handling of live content,\
    \ that is, the presentation of continuous ,\nchannel-based content, is governed\
    \ by the *TV Input Framework*\nand various classes in the `com.android.tv, com.android.providers.tv,`\
    \ and `android.media.tv`\npackages. It primarily addresses OEM manufacturers to\
    \ serve as an aid to\nconnect the TV system of Android to live-stream data. For\
    \ details please\nhave a look at the API documentation of these packages, and/or\
    \ enter\n“Android building TV channels” in your favorite search engine.\n\nProgramming\
    \ with Android Auto and Automotive OS\n\nAndroid support for cars comes in two\
    \ flavors:\n\n*   **Android\n    Auto**  for car-related apps running on a\n \
    \   smartphone\n\n*   **Android Automotive OS** for devices  built in your\n \
    \   vehicle\n\nOn Android Auto and/or Automotive OS, you can run media apps,\n\
    messaging apps, navigation apps, point-of-interest apps, and video\nplayback apps.\n\
    In this book we do not further dig into car-related Android\nprogramming. However,\
    \ [ `https://developer.android.com/training/cars`\n](https://developer.android.com/training/cars)\
    \ gives you a good starting point for automotive\nprojects. Also, in the *New\
    \ Project* wizard of Android Studio,\nyou can easily set up a project for an Android\
    \ Automotive media or\nmessaging app. And there is also an emulated Android Automotive\
    \ OS\ndevice available.\n\nPlaying and Recording Sound\n\nPlaying sound in Android\
    \ means one of two things or both together:\n\n*   **Short\n    sound snippets**\
    \ : You typically play them as a feedback\n    to user interface actions, like\
    \ pressing a button or entering something\n    in an edit field. Another use case\
    \ is games, where certain events could\n    be mapped to short audio fragments.\
    \ Especially for UI reactivity, make\n    sure you don’t annoy users and provide\
    \ for a possibility to readily mute\n    audio output.\n\n*   **Music\n    playback**\
    \ : You want to play music pieces with a duration\n    longer than a few seconds.\n\
    \nFor short audio snippets, you use a `SoundPool` and for\nmusic pieces a `MediaPlayer`.\
    \ We talk\nabout them and also audio recording in the following sections.\n\n\
    Short Sound Snippets\n\nFor short sound snippets, you use a `SoundPool`   and\
    \ preload the\nsounds during initialization. You cannot immediately use the sound\n\
    snippets after you load them using one of the `SoundPool.load(...)`\nmethods .\n\
    Instead, you have to wait until all sounds are loaded. The suggested way\nis not\
    \ to wait for some time as you frequently can read in some blogs –\ninstead, listen\
    \ to sound loaded events and count finished snippets. You\ncan let a custom class\n\
    \ do that, for example:\n\n```\nclass SoundLoadManager(val ctx:Context) {\nvar\
    \ scheduled = 0\nvar loaded = 0\nval sndPool:SoundPool\nval soundPoolMap = mutableMapOf()\n\
    init {\nsndPool =\nif (Build.VERSION.SDK_INT >=\nBuild.VERSION_CODES.LOLLIPOP)\
    \ {\nSoundPool.Builder()\n.setMaxStreams(4)\n.setAudioAttributes(\nAudioAttributes.Builder()\n\
    .setUsage(\nAudioAttributes.USAGE_MEDIA)\n.setContentType(\nAudioAttributes.CONTENT_TYPE_MUSIC)\n\
    .build()\n).build()\n} else {\nSoundPool(4,\nAudioManager.STREAM_MUSIC,\n100)\n\
    }\nsndPool.setOnLoadCompleteListener({\nsndPool, sampleId, status ->\nif(status\
    \ != 0) {\nLog.e(\"LOG\",\n\"Sound could not be loaded\")\n} else {\nLog.i(\"\
    LOG\", \"Loaded sample \" +\nsampleId + \", status = \" +\nstatus)\n}\nloaded++\n\
    })\n}\nfun load(resourceId:Int) {\nscheduled++\nsoundPoolMap[resourceId] =\nsndPool.load(ctx,\
    \ resourceId, 1)\n}\nfun allLoaded() = scheduled == loaded\nfun play(rsrcId: Int,\
    \ loop: Boolean):Int {\nreturn soundPoolMap[rsrcId]?.run {\nval audioManager =\
    \ ctx.getSystemService(\nContext.AUDIO_SERVICE) as AudioManager\nval curVolume\
    \ = audioManager.\ngetStreamVolume(\nAudioManager.STREAM_MUSIC)\nval maxVolume\
    \ = audioManager.\ngetStreamMaxVolume(\nAudioManager.STREAM_MUSIC)\nval leftVolume\
    \ = 1f * curVolume / maxVolume\nval rightVolume = 1f * curVolume / maxVolume\n\
    val priority = 1\nval noLoop = if(loop) -1 else 0\nval normalPlaybackRate = 1f\n\
    sndPool.play(this, leftVolume, rightVolume,\npriority, noLoop, normalPlaybackRate)\n\
    } ?: -1\n}\n}\n```\n\nWhat this class does is as follows:\n\n*   Loads and saves\
    \ an instance of `SoundPool`  . The constructor is\n    deprecated; that is why\
    \ we use different ways of initializing it,\n    dependent of the Android API\
    \ level. The parameters shown here may be\n    adapted according to your needs.\
    \ Please see the API documentation of\n    `SoundPool`,\n    `SoundPool.Builder`,\n\
    \    and `AudioAttributes.Builder`.\n\n*   Provides for a `load()` method  with\
    \ a\n    resource ID as argument – this could, for example, be a WAV file inside\n\
    \    the `res/raw`\n    folder.\n\n*   Provides for a `allLoaded()` method  you\
    \ can use to\n    check whether all sounds have been loaded.\n\n*   Provides for\
    \ a `play()` method  you can use to\n    play a loaded sound. Will do nothing\
    \ if the sound is not loaded yet.\n    Will return the stream ID if the sound\
    \ gets actually played, or else\n    `-1`.\n\nTo use the class, create a field\
    \ with an instance. Upon initialization,\nfor example, in an activity’s `onCreate(...)`\
    \ method , load the\nsounds and invoke `play()` to start\nplaying:"
  trans: "\n# Android TV 内容搜索\n\n您的 Android TV 应用可以接入 Android 搜索框架。我们在第 8 章的“搜索框架”一节中对此进行了描述——在本节中，我们将指出在\
    \ TV 应用中使用搜索的特殊之处。\n\n对于 TV 搜索*建议*而言，重要的搜索条目字段如表 14-2 所示，左侧列展示了来自 `SearchManager`\
    \ 类的常量名称。您可以直接在数据库中使用它们，或者至少必须在应用内部提供一种映射机制。\n\n**表 14-2** TV 搜索字段\n\n| 字段 | 描述\
    \ |\n| --- | --- |\n| `SUGGEST_COLUMN_TEXT_1` | 必需：您的内容名称 |\n| `SUGGEST_COLUMN_TEXT_2`\
    \ | 您内容的文本描述 |\n| `SUGGEST_COLUMN_RESULT_CARD_IMAGE` | 您内容的图片/海报/封面 |\n| `SUGGEST_COLUMN_CONTENT_TYPE`\
    \ | 必需：您媒体的 MIME 类型 |\n| `SUGGEST_COLUMN_VIDEO_WIDTH` | 您媒体的宽度 |\n| `SUGGEST_COLUMN_VIDEO_HEIGHT`\
    \ | 您媒体的高度 |\n| `SUGGEST_COLUMN_PRODUCTION_YEAR` | 必需：制作年份 |\n| `SUGGEST_COLUMN_DURATION`\
    \ | 必需：以毫秒为单位的时长 |\n\n与任何其他搜索提供程序一样，请在您的应用内为搜索建议创建一个内容提供程序。\n\n一旦用户提交搜索对话框以实际*执行*搜索查询，搜索框架就会发出一个带有\
    \ `SEARCH` 操作的 Intent，因此您可以编写一个带有适当 intent 过滤器的 Activity，如下所示：\n\n# Android TV\
    \ 游戏\n\n虽然一开始游戏开发因其大屏幕显示而显得非常吸引人，但有几件事需要谨记：\n\n* TV 始终处于横屏模式，因此请确保您的应用擅长使用横屏模式。\n\
    * 对于多人游戏，通常无法向用户隐藏信息，例如在纸牌游戏中。您可以将 TV 应用与运行在智能手机上的配套应用连接起来以解决此问题。\n* 您的 TV 游戏应支持游戏手柄，并且应明确告知用户如何使用它们。在\
    \ `AndroidManifest.xml` 文件中，最好声明 `<uses-feature android:name = \"android.hardware.gamepad\"\
    \ android:required = \"false\"/>`——如果改为编写 `required = \"true\"`，则会使没有游戏手柄的用户无法安装您的应用。\n\
    \n# Android TV 频道\n\n直播内容的处理，即基于频道的连续内容的呈现，由 *TV 输入框架*以及 `com.android.tv`、`com.android.providers.tv`\
    \ 和 `android.media.tv` 包中的各种类管理。它主要面向 OEM 制造商，作为将 Android 电视系统连接到直播数据流的辅助工具。有关详细信息，请查看这些包的\
    \ API 文档，或在您偏好的搜索引擎中输入“Android building TV channels”。\n\n# 使用 Android Auto 和 Automotive\
    \ OS 进行编程\n\nAndroid 对汽车的支持有两种形式：\n\n* **Android Auto** 适用于在智能手机上运行的汽车相关应用\n*\
    \ **Android Automotive OS** 适用于内置于车辆中的设备\n\n在 Android Auto 和/或 Automotive OS 上，您可以运行媒体应用、消息应用、导航应用、兴趣点应用和视频播放应用。本书不进一步深入研究汽车相关的\
    \ Android 编程。然而，[`https://developer.android.com/training/cars`](https://developer.android.com/training/cars)\
    \ 为汽车项目提供了一个良好的起点。此外，在 Android Studio 的“新建项目”向导中，您可以轻松地为 Android Automotive 媒体或消息应用设置项目。并且还有一个可用的模拟\
    \ Android Automotive OS 设备。\n\n# 播放和录制声音\n\n在 Android 中播放声音意味着以下两种情况之一，或两者兼有：\n\
    \n* **短声音片段**：通常作为对用户界面操作（如按下按钮或在编辑字段中输入内容）的反馈进行播放。另一种用例是游戏，其中某些事件可以映射到短音频片段。特别是对于\
    \ UI 响应，请确保不要打扰用户，并提供一种可以随时静音音频输出的可能性。\n* **音乐播放**：您想要播放时长超过几秒的音乐片段。\n\n对于短音频片段，您使用\
    \ `SoundPool`，而对于音乐片段，则使用 `MediaPlayer`。我们将在以下部分讨论它们以及音频录制。\n\n## 短声音片段\n\n对于短声音片段，您使用\
    \ `SoundPool` 并在初始化期间预加载声音。在使用 `SoundPool.load(...)` 方法之一加载声音后，您不能立即使用这些声音片段。相反，您必须等待所有声音加载完毕。建议的方法不是像一些博客中经常读到的那样等待一段时间——而是监听声音加载事件并统计已完成的片段。您可以自定义一个类来实现，例如：\n\
    \n```\nclass SoundLoadManager(val ctx:Context) {\n  var scheduled = 0\n  var loaded\
    \ = 0\n  val sndPool:SoundPool\n  val soundPoolMap = mutableMapOf()\n  init {\n\
    \    sndPool =\n      if (Build.VERSION.SDK_INT >=\n        Build.VERSION_CODES.LOLLIPOP)\
    \ {\n        SoundPool.Builder()\n          .setMaxStreams(4)\n          .setAudioAttributes(\n\
    \            AudioAttributes.Builder()\n              .setUsage(\n           \
    \     AudioAttributes.USAGE_MEDIA)\n              .setContentType(\n         \
    \       AudioAttributes.CONTENT_TYPE_MUSIC)\n              .build()\n        \
    \  ).build()\n      } else {\n        SoundPool(4,\n          AudioManager.STREAM_MUSIC,\n\
    \          100)\n      }\n    sndPool.setOnLoadCompleteListener({\n      sndPool,\
    \ sampleId, status ->\n      if(status != 0) {\n        Log.e(\"LOG\",\n     \
    \     \"Sound could not be loaded\")\n      } else {\n        Log.i(\"LOG\", \"\
    Loaded sample \" +\n          sampleId + \", status = \" +\n          status)\n\
    \      }\n      loaded++\n    })\n  }\n  fun load(resourceId:Int) {\n    scheduled++\n\
    \    soundPoolMap[resourceId] =\n      sndPool.load(ctx, resourceId, 1)\n  }\n\
    \  fun allLoaded() = scheduled == loaded\n  fun play(rsrcId: Int, loop: Boolean):Int\
    \ {\n    return soundPoolMap[rsrcId]?.run {\n      val audioManager = ctx.getSystemService(\n\
    \        Context.AUDIO_SERVICE) as AudioManager\n      val curVolume = audioManager.\n\
    \        getStreamVolume(\n        AudioManager.STREAM_MUSIC)\n      val maxVolume\
    \ = audioManager.\n        getStreamMaxVolume(\n        AudioManager.STREAM_MUSIC)\n\
    \      val leftVolume = 1f * curVolume / maxVolume\n      val rightVolume = 1f\
    \ * curVolume / maxVolume\n      val priority = 1\n      val noLoop = if(loop)\
    \ -1 else 0\n      val normalPlaybackRate = 1f\n      sndPool.play(this, leftVolume,\
    \ rightVolume,\n        priority, noLoop, normalPlaybackRate)\n    } ?: -1\n \
    \ }\n}\n```\n\n此类的功能如下：\n\n* 加载并保存一个 `SoundPool` 实例。构造函数已弃用；这就是为什么我们根据 Android\
    \ API 级别使用不同的初始化方式。此处显示的参数可根据您的需求进行调整。请参阅 `SoundPool`、`SoundPool.Builder` 和 `AudioAttributes.Builder`\
    \ 的 API 文档。\n* 提供一个带有资源 ID 作为参数的 `load()` 方法——例如，这可以是 `res/raw` 文件夹中的一个 WAV 文件。\n\
    * 提供一个 `allLoaded()` 方法，您可以用它来检查所有声音是否都已加载。\n* 提供一个 `play()` 方法，您可以用它来播放已加载的声音。如果声音尚未加载则无操作。如果声音确实播放了，则返回流\
    \ ID，否则返回 `-1`。\n\n要使用此类，请创建一个带有实例的字段。在初始化时，例如在 Activity 的 `onCreate(...)` 方法中，加载声音并调用\
    \ `play()` 开始播放。\n"
- fmt: "```\nlateinit var soundLoadManager: SoundLoadManager\n...\noverride\nfun onCreate(savedInstanceState:\
    \ Bundle?) {\n    super.onCreate(savedInstanceState)\n    setContentView(R.layout.activity_main)\n\
    \    ...\n    soundLoadManager = SoundLoadManager(this)\n    with(soundLoadManager)\
    \ {\n        load(R.raw.click)\n        // more ...\n    }\n}\nfun go(v: View)\
    \ {\n    Log.e(\"LOG\", \"All sounds loaded = \" +\n            soundLoadManager.allLoaded())\n\
    \    val strmId = soundLoadManager.play(\n            R.raw.click, false)\n  \
    \  Log.e(\"LOG\", \"Stream ID = \" + strmId.toString())\n}\n```\n\n`SoundPool`类还允许停止和恢复声音。如果需要，你可以适当地扩展`SoundLoadManager`类来考虑这一点。\n\
    \n## 播放媒体\n\n`MediaPlayer`类是你注册和播放任意长度和任意来源的音乐片段所需的一切。它是一个状态机，因此不是特别容易处理，但我们首先讨论操作媒体播放器可能需要的权限：\n\
    \n*   如果你的应用需要播放来自互联网的媒体，你必须通过将以下内容添加到`AndroidManifest.xml`文件中来允许互联网访问：\n\n```\n\
    <uses-permission android:name=\"android.permission.INTERNET\" />\n```\n\n*   如果你想防止播放被设备休眠中断，你需要获取唤醒锁。我们将在后面详细讨论，但为了实现这一点，首先需要将以下权限添加到`AndroidManifest.xml`：\n\
    \n```\n<uses-permission android:name=\"android.permission.WAKE_LOCK\" />\n```\n\
    \n要了解如何在代码中进一步获取权限，请参阅第七章 [7](#463716_2_En_7_Chapter.xhtml)。\n\n设置好必要的权限后，我们现在可以处理`MediaPlayer`类。如前所述，它的实例创建一个状态机，状态之间的转换对应于各种播放状态。更详细地说，对象可以处于以下状态之一：\n\
    \n*   **空闲**\n\n一旦通过默认构造函数构造，或者在`reset()`之后，播放器处于*空闲*状态。\n\n*   **已初始化**\n\n一旦通过`setDataSource(...)`设置了数据源，播放器就处于*已初始化*状态。除非你先使用`reset()`，否则再次调用`setDataSource(...)`会导致错误。\n\
    \n*   **已准备**\n\n准备阶段为回放准备一些资源和数据流。由于这可能需要一些时间，特别是对于来自互联网数据源的流资源，有两种方式可以开始这个转换：`prepare()`方法执行此步骤并阻塞程序流直到完成，而`prepareAsync()`将准备过程发送到后台。在后一种情况下，你必须通过`setOnPreparedListener(...)`注册一个监听器来了解准备步骤何时实际完成。在初始化之后、开始播放之前，你必须进行准备，并且在`stop()`之后，在再次开始播放之前，你必须再次进行准备。\n\
    \n*   **已启动**\n\n成功准备后，可以通过调用`start()`开始播放。\n\n*   **已暂停**\n\n在`start()`之后，你可以通过调用`pause`来临时暂停播放。再次调用`start`会从当前播放位置恢复播放。\n\
    \n*   **已停止**\n\n你可以在播放运行中或暂停时通过调用`stop()`来停止播放。一旦停止，不允许再次开始，除非先重复准备步骤。\n\n* \
    \  **已完成**\n\n一旦播放完成且没有启用循环，就会进入*已完成*状态。你可以从这里停止或重新开始。\n\n请注意，各种静态的`create(...)`工厂方法集合了多个状态转换。详情请参阅API文档。\n\
    \n为你提供一个例子，一个用于播放`assets`文件夹内音乐文件的基本播放器UI，使用同步准备，并带有开始/暂停按钮和停止按钮，如下所示：\n\n```\n\
    var mPlayer: MediaPlayer? = null\nfun btnText(playing:Boolean) {\n    startBtn.text\
    \ = if(playing) \"Pause\" else \"Play\"\n}\nfun goStart(v:View) {\n    mPlayer\
    \ = mPlayer?.run {\n        btnText(!isPlaying)\n        if(isPlaying)\n     \
    \       pause()\n        else\n            start()\n        this\n    } ?: MediaPlayer().apply\
    \ {\n        setOnCompletionListener {\n            btnText(false)\n         \
    \   release()\n            mPlayer = null\n        }\n        val fd: AssetFileDescriptor\
    \ =\n            assets.openFd(\"tune1.mp3\")\n        setDataSource(fd.fileDescriptor)\n\
    \        prepare() // synchronous\n        start()\n        btnText(true)\n  \
    \  }\n}\nfun goStop(v:View) {\n    mPlayer?.run {\n        stop()\n        prepare()\n\
    \        btnText(false)\n    }\n}\n```\n\n这段代码大部分是不言自明的。`goStart()`和`goStop()`方法在按下按钮时被调用，`btnText(...)`用于指示状态变化。这里使用的构造：\n\
    \n```\nmPlayer = mPlayer?.run {\n    (A)\n    this\n} ?: MediaPlayer().apply {\n\
    \    (B)\n}\n```\n\n可能看起来很奇怪，但它所做的就是：如果`mPlayer`对象不为`null`，则执行(A)并最终对自己执行空赋值。否则，构造它，然后对其应用(B)。\n\
    \n为了使这个示例工作，你必须在布局中包含ID为`startBtn`和`stopBtn`的按钮，通过`android:onclick=\"goStop\"\
    `和`android:onclick=\"goStart\"`连接它们，并在`assets/`文件夹中放置一个名为“tune1.mp3”的文件。该示例在按钮文本“Play”和“Pause”标签之间切换——当然，你也可以在这里使用`ImageButton`视图，并在按下时更改图标。\n\
    \n要使用任何其他数据源，包括来自互联网的在线流，请应用各种`setDataSource(...)`替代方案之一，或使用其中一个静态的`create(...)`方法。要监控各种状态转换，请通过`setOn...Listener(...)`添加适当的监听器。此外，建议在完成`MediaPlayer`对象的使用后立即调用`release()`，以释放不再使用的系统资源。\n\
    \n一些音乐的播放也可以在后台处理，例如，使用服务而不是活动。在这种情况下，如果你想避免设备因决定进入睡眠模式而中断播放，可以按如下方式获取唤醒锁：\n\n\
    ```\nmPlayer.setWakeMode(applicationContext,\n    PowerManager.PARTIAL_WAKE_LOCK)\n\
    ```\n\n以防止CPU进入休眠，以及：\n\n```\nval wifiLock = (applicationContext.getSystemService(Context.WIFI_SERVICE)\
    \ as WifiManager)\n    .createWifiLock(WifiManager.WIFI_MODE_FULL, \"myWifilock\"\
    )\n    .run {\n        acquire()\n        this\n    }\n... later:\nwifiLock.release()\n\
    ```\n\n以防止网络连接被中断。\n\n## 录制音频\n\n要录制音频，你使用`MediaRecorder`类。使用它相当直接：\n\n```\nval\
    \ mRecorder = MediaRecorder().apply {\n    setAudioSource(MediaRecorder.AudioSource.MIC)\n\
    \    setOutputFormat(MediaRecorder.OutputFormat.THREE_GPP)\n    setOutputFile(mFileName)\n\
    \    setAudioEncoder(MediaRecorder.AudioEncoder.AMR_NB)\n}\nmRecorder.prepare()\n\
    mRecorder.start()\n... later:\nmRecorder.stop()\n```\n\n关于输入、媒体格式和输出的其他选项，请参阅`MediaRecorder`类的API文档。\n\
    \n## 使用摄像头\n\n向用户展示内容的应用程序一直是计算机的主要用途领域。最初是文本，后来是图片，再后来是电影。仅在最近几十年，相反的方向，即让用户展示内容，才越来越受到关注。随着手持设备配备质量越来越高的摄像头，能够处理摄像头数据应用的需求也随之出现。Android在这方面提供了很大帮助。一个应用可以告诉Android操作系统拍照或录制电影并保存到某个位置，也可以完全控制相机硬件，并持续监控相机数据，按需更改变焦、曝光和对焦。\n\
    \n我们将在以下部分讨论所有这些内容。如果你需要我们在这里未描述的功能或设置，API文档可作为对此问题进行扩展研究的起点。"
