- fmt: "# Securing Sensitive Data in Android Apps\n\nSecuring sensitive data is an\
    \ important task during the development of an app. With more and more apps on\
    \ handheld devices being used for sensitive everyday tasks like banking and communicating,\
    \ security has been gaining more and more importance over time, and it will continue\
    \ to do so in the future. You as a developer must yield to this evolvement and\
    \ take every precaution possible to handle your app users’ data responsibly.\n\
    \nFully handling each and every possible security aspect is a challenging task\
    \ and would fill a whole book on its own. Fortunately, there is a vast amount\
    \ of online resources you can consult to get updated with Android OS security\
    \ matters. Just be cautious to filter out inappropriate information. A good place\
    \ to start is the security-related topics of the Android OS’s online resources\
    \ – by mid-2022 two relevant page URLs for that read are [`https://developer.android.com/design-for-safety#security`](https://developer.android.com/design-for-safety%2523security)\
    \ and [`https://developer.android.com/guide/topics/permissions/overview`](https://developer.android.com/guide/topics/permissions/overview).\
    \ If these links are broken when you read the book, enter “Android best practices\
    \ security” and “Android best practices permissions” in your favorite search engine,\
    \ and you’ll readily get to these resources.\n\nHaving said that, we still want\
    \ to deal with the *permission* system inside the Android OS to some depth, because\
    \ this is the place you as a developer will definitely have to feel at home once\
    \ your app addresses sensitive data. Permissions add security to using system\
    \ data and features, by using predefined permissions or defining them yourself.\
    \ In `AndroidManifest.xml` you add custom permissions and declare permissions\
    \ that your app wants to use. Dependent on the permission type, you must add dialogs\
    \ in your code to inform the user about which permissions are needed, and you\
    \ request confirmation for accessing secured resources or features.\n\n## Permission\
    \ Types\n\nPermissions come in several flavors according to the desired protection\
    \ level:\n\n* **Normal**: This level corresponds to low-level security sensitive\
    \ information. The system will automatically grant such permissions for installed\
    \ apps without explicitly asking the user, but the permission is listed in the\
    \ package description before the app gets installed. And it can be queried by\
    \ explicit demand using the system settings app.\n\n* **Dangerous**: This level\
    \ corresponds to high-level security sensitive information. The user will be asked\
    \ whether they want to allow using that permission during runtime. Once allowed\
    \ for an app, the allowance will be saved, and the user possibly won’t be asked\
    \ again until the app gets reinstalled or the permission gets explicitly revoked\
    \ by using the system settings app.\n\n* **Signature**: This level corresponds\
    \ to extremely high-level security sensitive information. Only apps signed with\
    \ the same certificate as the app defining the permission can acquire it. The\
    \ system will check whether the signatures match and then automatically grant\
    \ the permission. This level makes sense only for a collection of apps developed\
    \ by the same developer.\n\n* **Special**: Only for a couple of use cases, the\
    \ system grants access to certain system resources only by off-bands acquisition\
    \ methods. Such special permissions are defined by the platform.\n\n* **Privileged**\
    \ or **System**: Only for system image apps. You normally should not and should\
    \ not have to use them.\n\nPermissions are gathered in permission groups. The\
    \ idea behind that is that once the user has accepted a permission request from\
    \ permission A of group G1, another permission inquiry for another permission\
    \ B of the same group G1 is not needed. From a user experience perspective, permission\
    \ groups show only an effect if we are talking of *Dangerous*-type permissions\
    \ – permission groups for *Normal* permissions have no impact.\n\n> **Note**\n\
    >\n> The mapping of permissions to permission groups may change with future versions\
    \ of Android – your app thus should not rely on such a mapping. From a development\
    \ perspective, you should just ignore permission groups, unless you define your\
    \ own permissions and permission groups.\n\n## Defining Permissions\n\nThe Android\
    \ OS includes a number of permissions defined by various built-in apps or the\
    \ OS itself. In addition, you as a developer can define your own permissions to\
    \ secure apps or parts of your apps. You define such permissions inside `AndroidManifest.xml`:\n\
    \n```\n<permission android:name=\"string\"\n            android:protectionLevel=[\"\
    normal\" | \"dangerous\" | \"signature\" | ...]\n            android:label=\"\
    string\"\n            android:icon=\"drawable resource\"\n            android:description=\"\
    string\" />\n```\n\nThe meaning of the attributes gets described in section “Manifest\
    \ Top-Level Entries” of the online text companion. At a bare minimum, you must\
    \ provide the `name` and the `protectionLevel` attribute, but it certainly is\
    \ a good idea to also add `label` and/or `icon` and a description to help your\
    \ users understand what the permission does.\n\nIn case you need to group your\
    \ permissions, you can use one of two methods:\n\n1. Use the `<permission-group>`\
    \ element and add `permissionGroup` attributes to `<permission>` – see section\
    \ “Manifest Top-Level Entries” in the online text companion.\n\n2. Use the `<permission-tree>`\
    \ element and name your permissions accordingly – see “Manifest Top-Level Entries”\
    \ again inside the online text companion.\n\nIf you then acquire a permission\
    \ of a group, the sibling permissions from the same group will be implicitly included\
    \ in the grant.\n\n> **Caution**\n>\n> To adhere to security guidelines and to\
    \ have your app design clear and stable, keep the number of permissions you define\
    \ yourself at the absolute bare minimum.\n\n## Using Permissions\n\nTo use permissions,\
    \ inside your `AndroidManifest.xml` file add one or more `<uses-permission>` elements:\n\
    \n```\n<uses-permission android:name=\"string\"\n                 android:maxSdkVersion=\"\
    integer\" />\n```\n\nThe `name` attribute specifies the permission name and `maxSdkVersion`\
    \ the maximum API level this permission requirement will take into account. The\
    \ reason this special `<uses-permission-sdk-23>` element was introduced is a major\
    \ change in permission semantics for Android 6.0.\n\nThe question is: How would\
    \ we know which permissions exactly we need for our app? The answer has three\
    \ parts:\n\n* Android Studio tells you about a permission your app needs. If you,\
    \ for example, write:\n\n```kotlin\nval uri = CallLog.Calls.CONTENT_URI\nval cursor\
    \ = contentResolver.query(\nuri, null, null, null, null)\n```\n\nAndroid Studio\
    \ tells you a certain permission is required – see Figure [7-1](#463716_2_En_7_Chapter.xhtml#Fig1).\n\
    \n* During development and testing, your app crashes, and in the logs you see\
    \ an entry like:\n\n```\nCaused by: java.lang.SecurityException: Permission\n\
    Denial: opening provider\ncom.android.providers.contacts.CallLogProvider\nfrom\n\
    ProcessRecord{faeda9c 4127:de.pspaeth.cp1/u0a96}\n(pid=4127, uid=10096) requires\n\
    android.permission.READ_CALL_LOG or\nandroid.permission.WRITE_CALL_LOG\n```\n\n\
    * The list of system permissions tells you that you need a certain permission\
    \ for a certain task. See Table [7-1](#463716_2_En_7_Chapter.xhtml#Tab1) (not\
    \ exhaustive).\n\nIn order to enforce an activity or the whole app being protected\
    \ by a custom permission, you declare the permission inside the `permission` attribute\
    \ as in:\n\n```xml\n<activity android:name=\".MyActivity\"\n          android:permission=\"\
    com.example.myapp.PERMISSION_NAME\"\n          ...>\n</activity>\n```\n\nor likewise\
    \ inside the `<application>` element.\n\n### Figure 7-1\nAn interface of the android\
    \ studio with lines of coding. It represents the permission requirements.\n\n\
    *Figure 7-1: Android Studio Tells About a Permission Requirement* (Image not displayed)\n\
    \n### Table 7-1: System Permissions\n\n| Permission | Group | Description |\n\
    | --- | --- | --- |\n| ... | ... | ... |"
