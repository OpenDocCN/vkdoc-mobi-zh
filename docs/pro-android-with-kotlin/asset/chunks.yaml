    \ // AID for our loyalty card service.\n    private val SAMPLE_LOYALTY_CARD_AID\
    \ = \"F222222222\"\n    // ISO-DEP command HEADER for selecting an AID.\n    //\
    \ Format: [Class | Instruction | Parameter 1 |\n    //          Parameter 2]\n\
    \    private val SELECT_APDU_HEADER = \"00A40400\"\n    // \"OK\" status word\
