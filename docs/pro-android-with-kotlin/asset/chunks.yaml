    \ when it forcibly got stopped by the Android OS.\nHere we give you an advice\
    \ how that can be done.\nLooking at the lifecycle of an activity – see section\
    \ “Activities\nLifecycle” – we can see that an activity about to be killed by\
    \ the\nAndroid OS calls the method `onStop()`  . But there are two\nmore callbacks\
    \ we haven’t talked about yet. They have the names `onSaveInstanceState()`\nand\
    \ `onRestoreInstanceState()`,\nand they get called whenever Android decides  that\
    \ an\nactivity’s data needs to be saved or restored. This is not the same as\n\
    `onStart()` and\n`onStop()`,\nbecause it is sometimes not necessary to preserve\
    \ the state. For\nexample, if an activity will not be destroyed but just suspended,\
    \ the\nstate is going to be kept anyways, and `onSaveInstanceState()`\nand `onRestoreInstanceState()`\n\
    will not be invoked.\n\nAndroid already helps us here: the default implementations\
    \ of  `onSaveInstanceState()`\n and  `onRestoreInstanceState()`\n already save\
    \ and restore UI elements that have an ID. So if that\nis all what you need, you\
    \ don’t have to do anything. Of course your\nactivity might be more complex and\
    \ maybe contains other fields you need\nto preserve. In this case you can override\
    \ both `onSaveInstanceState()`\nand `onRestoreInstanceState()`.\nJust make sure\
    \ you call the superclass’s methods. Otherwise, you must be\ntaking care of all\
    \ UI elements yourself:"
  trans: "```kotlin\nval emailIntent: Intent = Intent(Intent.ACTION_SENDTO,\n    Uri.fromParts(\"\
    mailto\", \"abc@gmail.com\", null))\nemailIntent.putExtra(Intent.EXTRA_SUBJECT,\
    \ \"Subject\")\nemailIntent.putExtra(Intent.EXTRA_TEXT, \"Body\")\nstartActivity(Intent.createChooser(\n\
    \    emailIntent, \"发送邮件...\"))\n// 或者 startActivity(emailIntent)，如果你想使用\n// 标准选择器（如果只有一个可能的接收者，则可能不显示选择器）。\n\
    ```\n\n**注意**\n\n接收应用自行决定如何处理 Intent URI 和附加数据。设计糟糕的邮件客户端可能根本不允许指定邮件头数据。为安全起见，你可能需要将所有的头数据同时添加到“mailto:”URI\
    \ *和*附加数据中。\n\n## Activity 生命周期\n\nActivity 有一个生命周期，与传统的桌面应用程序相反，它们有意地可能被 Android\
    \ 操作系统随时终止。因此，作为开发者，你需要采取特殊预防措施来确保应用的稳定性。更准确地说，一个活动会处于以下状态之一：\n\n-   **已关闭**：Activity\
    \ 不可见且不处理任何任务。但包含该 Activity 的应用可能仍然存活，因为它有其他组件在运行。\n-   **已创建**：该 Activity 可能是主\
    \ Activity 并由用户或其他组件启动，或者它是一个非主 Activity，由同一应用或满足安全考虑的其他应用中的其他组件启动。此外，当你翻转屏幕且应用需要用不同屏幕特性重建时，也会发生\
    \ Activity 创建。在创建过程中，会调用回调方法 `onCreate()`。你必须实现此方法，因为在此处需要构建 GUI。你也可以使用此回调方法启动或连接服务，或提供内容提供者数据。你可以使用\
    \ API 来*准备*播放音乐、操作相机或执行应用设计的任何其他功能。这也是一个初始化应用所需的数据库或其他数据存储的好地方。\n-   **已启动**：一旦创建完成，或者在停止后重新启动的情况下——参见下文——Activity\
    \ 将进入*已启动*状态。在此状态下，Activity 即将对用户可见。在启动过程中，会调用回调方法 `onStart()`。这是启动广播接收器、启动服务以及重建当\
    \ Activity 进入停止状态时你退出的内部状态和进程的好地方——参见下文。\n-   **已恢复**：在即将对用户可见之前，Activity 会经历恢复过程。在此过程中，会调用回调\
    \ `onResume()`。\n-   **运行中**：Activity 完全可见，用户可以与其交互。此状态紧接在恢复过程之后。\n-   **已暂停**：Activity\
    \ 失去焦点，但仍至少部分可见。例如，当用户点击“返回”或“概览”按钮时，就会失去焦点。Activity 可能继续向 UI 发送更新或继续产生声音，但在大多数情况下，Activity\
    \ 将进入已停止状态——参见下文。在暂停过程中，会调用 `onPause()` 回调。暂停状态之后是已停止状态或已恢复状态。\n-   **已停止**：Activity\
    \ 将对用户不可见。它稍后可能会重新启动或销毁并从活动进程列表中移除。在停止过程中，会调用 `onStop()` 回调。停止之后要么是销毁要么是启动。例如，你可以在此处停止你在\
    \ `onStart()` 中启动的服务。\n-   **已销毁**：Activity 被移除。会调用回调 `onDestroy()`，你应该实现它并在其中执行所有操作以释放资源和执行其他清理操作。\n\
