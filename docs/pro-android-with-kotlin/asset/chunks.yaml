  trans: "\n`CrossProcessCursorWrapper` | 一种游标实现，允许从远程进程使用它。实现`CrossProcessCursor`并持有一个`Cursor`委托，该委托也可以是`CrossProcessCursor`。\
    \ |\n`CursorWrapper` | 持有一个`Cursor`委托，所有方法调用都将转发给它。 |\n`MatrixCursor` | `Cursor`的完整实现，以对象数组的形式在内存中存储数据。你必须使用`addRow(...)`来添加数据。内部类`MatrixCursor.RowBuilder`可用于构建行，供`MatrixCursor.addRow(Array<Object>)`使用。\
    \ |\n`MergeCursor` | 使用它可以透明地合并或连接游标对象。 |\n`sqlite.SQLiteCursor` | `Cursor`的一种实现，数据由\
    \ SQLite 数据库提供支持。使用其中一个构造函数将游标连接到 SQLite 数据库对象。 |\n\n## 基于游标接口的游标类\n\n实现游标的一种更底层的方法是不依赖`AbstractCursor`，而是自己实现所有接口方法。然后你可以像`class\
    \ MyCursor : Cursor { ... }`那样使用子类化，或者像`val myCursor = object : Cursor { ... }`那样使用匿名对象。在在线文本伴侣的“游标接口”部分，我们列出并描述了所有接口方法。\n\
    \n## 在提供者代码内分派 URI\n\n为了简化传入 URI 的分派，`android.content.UriMatcher`类非常方便。如果你有类似这样的查询相关\
    \ URI：\n\n```\npeople            #列出目录中的所有人员\npeople/37         #查询 ID 为 37 的人员\n\
    people/37/phone   #获取 ID 为 37 的人员的电话信息\n```\n\n并且想使用一个简单的 switch 语句，你可以在你的类或对象内部编写：\n\
    \n```\nval PEOPLE_DIR_AUTHORITY = \"directory\"\nval PEOPLE = 1\nval PEOPLE_ID\
    \ = 2\nval PEOPLE_PHONES = 3\nval uriMatcher = UriMatcher(UriMatcher.NO_MATCH)\n\
    init {\nuriMatcher.addURI(PEOPLE_DIR_AUTHORITY,\n\"people\", PEOPLE)\nuriMatcher.addURI(PEOPLE_DIR_AUTHORITY,\n\
    \"people/#\", PEOPLE_ID)\nuriMatcher.addURI(PEOPLE_DIR_AUTHORITY,\n\"people/#/phone\"\
    , PEOPLE_PHONES)\n}\n```\n\n其中“#”代表任意数字，“*”匹配任意字符串。\n\n在你的`ContentProvider`实现中，然后你可以使用以下结构来分派传入的字符串\
    \ URL：\n\n```\nwhen(uriMatcher.match(url)) {\nPEOPLE ->\n// 传入路径 = people，对其进行处理...\n\
    PEOPLE_ID ->\n// 传入路径 = people/#，对其进行处理...\nPEOPLE_PHONES ->\n// 传入路径 = people/#/phone，...\n\
    else ->\n// 做其他事情\n}\n```\n\n## 提供内容文件\n\n内容提供者不仅仅可以访问类似数据库的内容；它们还可以公开用于检索类似文件数据（如图像或声音文件）的方法。为此目的，提供了以下方法：\n\
    \n*   `override fun getStreamTypes(uri:Uri, mimeTypeFilter:String) : Array<String>`\
    \  \n    如果你的内容提供者提供文件，请重写此方法以允许客户端根据 URI 确定支持的 MIME 类型。`mimeTypeFilter`不应为`null`，你可以使用它来过滤输出。它支持通配符，因此如果客户端想要检索所有值，它将在此处写入“*/*”，你的提供者代码需要正确处理此情况。输出还必须包含那些可能是提供者执行适当类型转换后结果的所有类型。可能返回`null`以指示结果集为空。例如“image/png”或“audio/mpeg”。\n\
    \n*   `override fun openFile(uri:Uri, mode:String): ParcelFileDescriptor`  \n\
    \    重写此方法以处理打开文件 blob 的请求。参数“mode”必须是以下之一（没有默认值）：\n    *   “r” 表示只读访问\n    *\
    \   “w” 表示只写访问（如果数据已存在则先擦除）\n    *   “wa” 类似“w”，但可能追加数据\n    *   “rw” 表示读取和追加写入\n\
    \    *   “rwt” 类似“rw”，但会截断现有数据\n    要了解如何处理返回的`ParcelFileDescriptor`，请参阅下文。\n\n\
    *   `override fun openFile(uri:Uri, mode:String, signal:CancellationSignal): ParcelFileDescriptor`\
    \  \n    与`openFile(Uri, String)`相同，但另外客户端可以在读取文件进行中时发出取消信号——提供者可以保存`signal`对象，并通过定期调用`signal`对象上的`throwIfCancelled()`来捕获客户端的取消请求。\n\
    \n*   `override fun openAssetFile(uri:Uri, mode:String): AssetFileDescriptor`\
    \  \n    这类似于`openFile(Uri, String)`，但可以由需要能够返回文件子集（通常是其 APK 中的资产）的提供者实现。要实现此目的，你可能想使用`android.content.res.AssetManager`类。你可以在上下文的`asset`字段中找到它，因此，例如在\
    \ Activity 中，你可以直接使用`asset`来寻址`AssetManager`。\n\n*   `override fun openAssetFile(uri:Uri,\
    \ mode:String, signal:CancellationSignal): AssetFileDescriptor`  \n    与`openAssetFile(Uri,\
    \ String)`相同，但允许从客户端取消。提供者可以保存`signal`对象，并通过定期调用`signal`对象上的`throwIfCancelled()`来捕获客户端的取消请求。\n\
    \n*   `override fun : openTypedAssetFile(uri:Uri, mimeTypeFilter:String, opts:Bundle):\
    \ AssetFileDescriptor`  \n    如果你希望客户端能够按 MIME 类型读取（不是写入！）资产数据，请实现此方法。默认实现将`mimeTypeFilter`与从`getType(Uri)`获得的任何内容进行比较，如果匹配，则简单地转发到`openAssetFile(...)`。\n\
    \n*   `override fun : openTypedAssetFile(uri:Uri, mimeTypeFilter:String, opts:Bundle,\
    \ signal:CancellationSignal): AssetFileDescriptor`  \n    与`openTypedAssetFile(Uri,\
    \ String, Bundle)`相同，但允许从客户端取消。提供者可以保存`signal`对象，并通过定期调用`signal`对象上的`throwIfCancelled()`来捕获客户端的取消请求。\n\
    \n*   `override fun <T : Any?> openPipeHelper(uri: Uri?, mimeType: String?, opts:\
    \ Bundle?, args: T, func: PipeDataWriter<T>?): ParcelFileDescriptor`  \n    一个用于实现`openTypedAssetFile(Uri,\
    \ String, Bundle)`的辅助函数。它创建一个数据管道和一个后台线程，允许你将生成的数据流回客户端。此函数返回一个新的`ParcelFileDescriptor`。工作完成后，调用者必须关闭它。\n\
    \n*   `override fun openFileHelper(uri:Uri, mode:String): ParcelFileDescriptor`\
    \  \n    这是一个供子类使用的便捷方法。默认实现打开一个文件，其路径由使用提供的 URI 进行的`query()`结果给出。对于文件路径，从查询结果中提取“_data”成员，并且结果集计数必须为`1`。\n\
    \n那些返回`ParcelFileDescriptor`对象的方法可以像这样调用适当的构造函数：\n\n```\nval fd = ... // 获取 ParcelFileDescriptor\n\
    val inpStream = ParcelFileDescriptor.AutoCloseInputStream(fd)\nval outpStream\
    \ = ParcelFileDescriptor.AutoCloseOutputStream(fd)\n```\n\n来为文件构建输入和输出流。一旦流的工作完成，你必须在流上使用`close()`方法\
    \ —— “Auto”意味着当你关闭流时，`ParcelFileDescriptor`会自动为你关闭。\n\n类似地，那些返回`AssetFileDescriptor`对象的方法可以像这样调用适当的构造函数：\n\
    \n```\nval fd = ... // 获取 AssetFileDescriptor\nval inpStream = AssetFileDescriptor.AutoCloseInputStream(fd)\n\
    val outpStream = AssetFileDescriptor.AutoCloseOutputStream(fd)\n```\n\n来为文件构建输入和输出流。同样，一旦流的工作完成，你必须在流上使用`close()`方法\
    \ —— 只有当你关闭流时，`AssetFileDescriptor`才会为你自动关闭。\n\n## 通知监听器数据已更改\n"
- fmt: "# 客户端通过 Content Provider 接收变更通知\n\n一个客户端通过其 `ContentResolver` 字段（例如 `Activity.contentResolver`）访问内容提供者时，可以注册以接收内容变更的通知，调用方式如下：\n\
    \n```\nval uri = ... // a content uri\ncontentResolver.registerContentObserver(uri,\
    \ true,\n    object : ContentObserver(null) {\n        override fun onChange(selfChange:\
    \ Boolean) {\n            // do s.th.\n        }\n        override fun onChange(selfChange:\
    \ Boolean,\n                              uri: Uri?) {\n            // do s.th.\n\
    \        }\n    }\n)\n```\n\n`registerContentObserver()` 的第二个参数指定子 URI（即原 URI\
    \ 加上更多路径元素）是否也会触发通知。`ContentObserver` 的构造函数参数也可以是一个 `Handler` 对象，用于在不同线程中接收 `onChange`\
    \ 消息。\n\n为了使这一机制正常工作，在内容提供者端，你可能需要确保事件被正确触发。例如，在任何数据修改方法内部，你应该添加：\n\n```\ncontext.contentResolver.notifyChange(uri,\
    \ null)\n```\n\n此外，为了使变更监听更加健壮，你可能希望通知由 `query()` 方法返回的所有 `Cursor` 对象。为此，`cursor`\
    \ 提供了 `registerContentObserver()` 方法，你可以用它来收集基于游标的内容观察者。内容提供者随后也会向这些内容观察者发送消息。\n\
    \n# 扩展 Content Provider\n\n我们已经看到，内容提供者允许访问类似数据库的内容和文件。如果你对这种实现方式不太满意，或者对内容提供者的功能有自己独特的设计思路，你可以实现\
    \ `call()` 方法，如下所示：\n\n```\noverride fun call(method: String, arg: String, extras:\
    \ Bundle): Bundle {\n    super.call(method, arg, extras)\n    // do your own stuff...\n\
    }\n```\n\n通过这种方式，你可以设计自己的内容访问框架。当然，你应该告知可能的客户端如何使用这个接口，例如在契约类中说明。\n\n## 注意\n\n\
    调用此方法时不进行任何安全检查。你必须自行实现适当的安全检查，例如在上下文中使用 `checkSelfPermission()`。\n\n# 通过 URI\
    \ 规范化的客户端访问一致性\n\n很多时候，查询结果中包含依赖于短期数据库上下文的 ID、列表索引号或其他信息。例如，一个查询可能返回项目 ID 如 23、67\
    \ 和 56，如果你需要获取某个项目的详细信息，你需要使用包含该 ID 的另一个 URI 再次查询，例如 `content://com.xyz/people/23`。这种\
    \ URI 的问题是，客户端通常不会将它们保存起来供以后使用——ID 可能会改变，因此 URI 并不可靠。\n\n为了解决这个问题，内容提供者可以实现 *URI\
    \ 规范化*。为此，你的内容提供者类需要实现以下两个方法：\n\n- **`canonicalize(url: Uri): Uri`**：让此方法返回规范化的\
    \ URI，例如通过添加一些特定于域的查询参数，如下例所示。\n- **`uncanonicalize(url: Uri): Uri`**：执行与 `canonicalize()`\
    \ 完全相反的操作。如果项目已丢失且无法执行反规范化，则返回 `null`。\n\n```\ncontent://com.xyz/people/23  ->\n\
    content://com.xyz/people?firstName=John&lastName=Bird&Birthday=20010534&SSN=123-99-1624\n\
    ```\n\n# 消费内容\n\n为了消费内容，内容提供者的客户端使用一个 `android.content.ContentResolver` 对象。任何\
    \ `Context` 对象（包括 Activity、Service 等）都提供一个 `getContentResolver()` 方法，在 Kotlin\
    \ 中简写为 `contentResolver`。\n\n## 使用 Content Resolver\n\n访问类似数据库的内容时，你可以使用以下 `ContentResolver`\
    \ 方法：\n\n- **`insert(url: Uri, values: ContentValues): Int`**：插入一条记录。\n- **`delete(url:\
    \ Uri, where: String, selectionArgs: Array<String>): Int`**：删除记录。\n- **`update(uri:\
    \ Uri, values: ContentValues, where: String, selectionArgs: Array<String>): Int`**：更新记录。\n\
    - **`query(uri: Uri, projection: Array<String>, queryArgs: Bundle, cancellationSignal:\
    \ CancellationSignal): Cursor`**：查询。\n- **`query(uri: Uri, projection: Array<String>,\
    \ selection: String, selectionArgs: Array<String>, sortOrder: String, cancellationSignal:\
    \ CancellationSignal): Cursor`**：查询。\n- **`query(uri: Uri, projection: Array<String>,\
    \ selection: String, selectionArgs: Array<String>, sortOrder: String): Cursor`**：查询。\n\
    \n这些方法的签名和含义与对应的 `ContentProvider` 方法密切相关——请参阅前面的“提供内容”部分。也可以查阅在线 API 参考。\n\n\
    要访问文件内容，你可以使用以下方法之一：\n\n- **`openAssetFileDescriptor(uri: Uri, mode: String, cancellationSignal:\
    \ CancellationSignal): AssetFileDescriptor`**：打开内部（资产）文件。\n- **`openAssetFileDescriptor(uri:\
    \ Uri, mode: String): AssetFileDescriptor`**：打开内部（资产）文件，无取消信号。\n- **`openTypedAssetFileDescriptor(uri:\
    \ Uri, mimeType: String, opts: Bundle, cancellationSignal: CancellationSignal):\
    \ AssetFileDescriptor`**：打开类型化的内部（资产）文件。\n- **`openTypedAssetFileDescriptor(uri:\
    \ Uri, mimeType: String, opts: Bundle): AssetFileDescriptor`**：打开类型化的内部（资产）文件，无取消信号。\n\
    - **`openFileDescriptor(uri: Uri, mode: String, cancellationSignal: CancellationSignal):\
    \ ParcelFileDescriptor`**：打开文件。\n- **`openFileDescriptor(uri: Uri, mode: String):\
    \ ParcelFileDescriptor`**：打开文件，无取消信号。\n- **`openInputStream(uri: Uri): InputStream`**：打开输入流。\n\
    - **`openOutputStream(uri: Uri, mode: String): OutputStream`**：打开输出流。\n- **`openOutputStream(uri:\
    \ Uri): OutputStream`**：打开输出流，模式为 “w”。\n\n`open*Descriptor()` 方法同样与“提供内容”部分中对应的\
    \ `ContentProvider` 方法密切相关。另外两个方法 `openInputStream()` 和 `openOutputStream()` 是用于更方便地访问文件（流）数据的便捷方法。\n\
    \n要注册内容观察者以便在内容发生变化时异步收到通知——请参阅前面的“通知监听器数据变更”部分——可以使用以下方法：\n\n- `registerContentObserver(uri:\
    \ Uri, notifyForDescendants: Boolean, observer: ContentObserver)`\n- `unregisterContentObserver(observer:\
    \ ContentObserver)`\n\n要使用通过实现 `call()` 方法进行扩展的内容提供者，你可以使用内容解析器对应的 `call(uri:\
    \ Uri, method: String, arg: String, extras: Bundle): Bundle` 方法。\n\n# 访问系统 Content\
    \ Provider\n\nAndroid 操作系统（包括预装的应用）提供了多个内容提供者组件。在在线 API 文档中，内容提供者的契约类可以在 “android.provider/Classes”\
    \ 下找到。以下章节总结了它们是什么以及如何访问它们。\n\n## BlockedNumberContract\n\n公开一个包含被阻止号码的表。只有系统、默认电话应用、默认短信应用和运营商应用可以访问此表——但\
    \ `canCurrentUserBlockNumbers()` 方法除外，任何应用都可以调用它。使用示例：\n\n```\nval values = ContentValues()\n\
    values.put(BlockedNumbers.COLUMN_ORIGINAL_NUMBER,\n    \"1234567890\")\nUri uri\
    \ = contentResolver.insert(\n    BlockedNumbers.CONTENT_URI, values)\n```\n\n\
    ## CalendarContract\n\n一个相当复杂的内容提供者，包含多个表。作为示例，我们访问日历列表并添加一个事件："
  raw: "A client addressing a content provider via its `ContentResolver` field   \
    \ (e.g., `Activity.contentResolver`)\ncan register for being notified of content\
    \ changes by calling\n\n```\nval uri = ... // a content uri\ncontentResolver.registerContentObserver(uri,\
    \ true,\nobject : ContentObserver(null) {\noverride fun onChange(selfChange: Boolean)\
    \ {\n// do s.th.\n}\noverride fun onChange(selfChange: Boolean,\nuri: Uri?) {\n\
    // do s.th.\n}\n}\n)\n```\n\nThe second argument to  `registerContentObserver()`\n\
    \ specifies whether sub-URIs (the URI plus any more path elements)\nwill lead\
    \ to a notification as well. The constructor argument to  `ContentObserver`\n\
    \ can also be a `Handler` object for\nreceiving `onChange` messages in\na different\
    \ thread.\n\nIn order for this to work, on the content provider side, you may\
    \ need to\ntake care the event gets correctly emitted. For example, inside any\
    \ data\nmodification method, you should add\n\n```\ncontext.contentResolver.notifyChange(uri,\
    \ null)\n```\n\nAlso, to make change listening bulletproof, you might want to\
    \ inform\nany `Cursor`\nobjects  returned\nby the `query()`\nmethods . For this\n\
    aim a `cursor`\nhas a `registerContentObserver()`\nmethod that you can use to\
    \ collect cursor-based content observers . The content\nprovider may then send\
    \ messages to those content observers as well.\n\nExtending a Content Provider\n\
    \nWe have seen that a content provider allows for accessing database-like\ncontent\
    \  and\nfiles. If you don’t like the way this is done too much or have your own\n\
    ideas about what a content provider should be able to do, you can\nimplement the\
    \ `call()` method  as in\n\n```\noverride call(method:String, arg:String, extras:Bundle)\n\
    : Bundle {\nsuper.call(method, arg, extras)\n// do your own stuff...\n}\n```\n\
    \nThis way you can design your own content access framework. Of course\nyou should\
    \ inform possible clients of ways how to use the interface , for example,\ninside\
    \ the contract class.\n\nCaution\n\nNo security checks apply to calling this method.\
    \ You have to\nimplement appropriate security checks yourself, for example, by\
    \ using\n`checkSelfPermission()`\non the context.\n\nClient Access Consistency\
    \ by URI\nCanonicalization\nQuite often query results contain IDs or list index\
    \ numbers or other\ninformation  that\ndepends on some short-term database context.\
    \ For example, a query may\nreturn item IDs like 23, 67, and 56, and if you need\
    \ to get the details\nfor an item, you query again using another URI containing\
    \ this ID, for\nexample, `content://com.xyz/people/23`.\nThe problem with such\
    \ URIs is that a client usually wouldn’t save them\nfor later retrievals – the\
    \ ID might have changed, so the URI is thus not\nvery reliable.\n\nTo overcome\
    \ this problem, a content provider may implement a  *URI canonicalization*\n.\
    \ To do so, your content provider class has to implement the\nfollowing two methods:\n\
    \n*   **canonicalize(url:Uri)**  **:\n    Uri**\n\nLet this method return a canonicalized\
    \ URI, for example, by adding\n    some domain-specific query parameters like\
    \ in\n\n*   **uncanonicalize(url:Uri)**  **:\n    Uri**\n\nDoes the exact opposite\
    \ of  `canonicalize()`\n    . Let it return `null` if the item got\n    lost and\
    \ the uncanonicalization \n    cannot be performed.\n\n```\ncontent://com.xyz/people/23\
    \  ->\ncontent://com.xyz/people?\nfirstName=John&\nlastName=Bird&\nBirthday=20010534&\n\
    SSN=123-99-1624\n```\n\nConsuming Content\nIn order to consume content, content\
    \ provider clients use an `android.content.ContentResolver`\nobject . Any `Context`\
    \ object,\nincluding activities, services, and more, provides one: `getContentResolver()`\n\
    or, with Kotlin in short, `contentResolver`.\n\nUsing the Content Resolver\n\n\
    To access database-like content   , you use one of the\nfollowing `ContentResolver`\n\
    methods:\n\n*   **insert(url: Uri, values: ContentValues): Int**\n\nInsert a record.\n\
    \n*   **delete(url: Uri, where: String, selectionArgs:\n    Array<String>): Int**\n\
    \nDelete records.\n\n*   **update(uri: Uri, values: ContentValues, where: String,\n\
    \    selectionArgs: Array<String>): Int**\n\nUpdate records.\n\n*   **query(uri:\
    \ Uri, projection: Array<String>,\n    queryArgs: Bundle, cancellationSignal:\
    \ CancellationSignal):\n    Cursor**\n\nQuery.\n\n*   **query(uri: Uri, projection:\
    \ Array<String>,\n    selection: String, selectionArgs: Array<String>, sortOrder:\n\
    \    String, cancellationSignal: CancellationSignal): Cursor**\n\nQuery.\n\n*\
    \   **query(uri: Uri, projection: Array<String>,\n    selection: String, selectionArgs:\
    \ Array<String>, sortOrder:\n    String): Cursor**\n\nQuery.\n\nTheir signatures\
    \ and meanings closely relate to the corresponding\n`ContentProvider`\nmethods\
    \  – see\nthe preceding section “Providing Content.” Also have a look at the\n\
    online API reference.\n\nTo instead access file content   , you can use one of\n\
    the following methods:\n\n*   **openAssetFileDescriptor(uri: Uri, mode: String,\n\
    \    cancellationSignal: CancellationSignal):\n    AssetFileDescriptor**\n\nOpen\
    \ inner (asset) file.\n\n*   **openAssetFileDescriptor(uri: Uri, mode: String):\n\
    \    AssetFileDescriptor**\n\nOpen inner (asset) file, no cancellation signal.\n\
    \n*   **openTypedAssetFileDescriptor(uri: Uri, mimeType: String,\n    opts: Bundle,\
    \ cancellationSignal: CancellationSignal):\n    AssetFileDescriptor**\n\nOpen\
    \ typed inner (asset) file.\n\n*   **openTypedAssetFileDescriptor(uri: Uri, mimeType:\
    \ String,\n    opts: Bundle): AssetFileDescriptor**\n\nOpen typed inner (asset)\
    \ file, no cancellation signal.\n\n*   **openFileDescriptor(uri: Uri, mode: String,\n\
    \    cancellationSignal: CancellationSignal):\n    ParcelFileDescriptor**\n\n\
    Open file.\n\n*   **openFileDescriptor(uri: Uri, mode: String):\n    ParcelFileDescriptor**\n\
    \nOpen file, no cancellation signal.\n\n*   **openInputStream(uri: Uri): InputStream**\n\
    \nOpen an input stream.\n\n*   **openOutputStream(uri: Uri, mode: String):\n \
    \   OutputStream**\n\nOpen an output stream.\n\n*   **openOutputStream(uri: Uri):\
    \ OutputStream**\n\nOpen an output stream, “w” mode.\n\nThe `open*Descriptor()`\n\
    methods  again\nclosely relate to the corresponding `ContentProvider` methods\
    \  from section\n“Providing Content.” The two others, `openInputStream()` and\n\
    `openOutputStream(),`\nare convenience methods to more readily access file (stream)\
    \ data.\n\nTo register content\n\nobservers for asynchronously being signaled\
    \ when content changes – see\nthe preceding section “Informing Listeners of Data\
    \ Changes” – use one of\nthe methods.\n\n*   registerContentObserver(uri: Uri,\
    \ notifyForDescendants: Boolean,\n    observer: ContentObserver)\n\n*   unregisterContentObserver(observer:\
    \ ContentObserver)\n\nTo use a content provider that exhibits an extension by\
    \ virtue of an\nimplementation of its `call()` method, you\nuse the corresponding\n\
    \n*   call(uri: Uri, method: String, arg: String, extras: Bundle):\n    Bundle\n\
    \nmethod  of the\ncontent resolver.\n\nAccessing System Content Providers\nThe\
    \ Android OS including preinstalled apps provides several content\nprovider components.\
    \ Inside the online API documentation, the content\nprovider contract classes\
    \ can be found at “android.provider/Classes”.\nThe following sections summarize\
    \ what they are and how they can be\naccessed.\n\nBlockedNumberContract\n\nExposes\
    \ a table \n  containing\nblocked numbers. Only the system, the default phone\
    \ app, the default SMS\napp, and carrier apps can access this table – except for\
    \  `canCurrentUserBlockNumbers()`\n that can be called by any app. To use it,\
    \ you, for example,\nwrite\n\n```\nval values = ContentValues()\nvalues.put(BlockedNumbers.COLUMN_ORIGINAL_NUMBER,\n\
    \"1234567890\")\nUri uri = contentResolver.insert(\nBlockedNumbers.CONTENT_URI,\
    \ values)\n```\n\nCalendarContract\n\nA rather complex content\n\nprovider with\
    \ many tables. As an example, we access the calendars list\nand add an event:"
  trans: "\n# 客户端通过 Content Provider 接收变更通知\n\n一个客户端通过其 `ContentResolver` 字段（例如 `Activity.contentResolver`）访问内容提供者时，可以注册以接收内容变更的通知，调用方式如下：\n\
    \n```\nval uri = ... // a content uri\ncontentResolver.registerContentObserver(uri,\
    \ true,\n    object : ContentObserver(null) {\n        override fun onChange(selfChange:\
    \ Boolean) {\n            // do something\n        }\n        override fun onChange(selfChange:\
    \ Boolean,\n                              uri: Uri?) {\n            // do something\n\
    \        }\n    }\n)\n```\n\n`registerContentObserver()` 的第二个参数指定子 URI（即原 URI\
    \ 加上更多路径元素）是否也会触发通知。`ContentObserver` 的构造函数参数也可以是一个 `Handler` 对象，用于在不同线程中接收 `onChange`\
    \ 消息。\n\n为了使这一机制正常工作，在内容提供者端，你可能需要确保事件被正确触发。例如，在任何数据修改方法内部，你应该添加：\n\n```\ncontext.contentResolver.notifyChange(uri,\
    \ null)\n```\n\n此外，为了使变更监听更加健壮，你可能希望通知由 `query()` 方法返回的所有 `Cursor` 对象。为此，`cursor`\
    \ 提供了 `registerContentObserver()` 方法，你可以用它来收集基于游标的内容观察者。内容提供者随后也会向这些内容观察者发送消息。\n\
    \n# 扩展 Content Provider\n\n我们已经看到，内容提供者允许访问类似数据库的内容和文件。如果你对这种实现方式不太满意，或者对内容提供者的功能有自己独特的设计思路，你可以实现\
    \ `call()` 方法，如下所示：\n\n```\noverride fun call(method: String, arg: String, extras:\
    \ Bundle): Bundle {\n    super.call(method, arg, extras)\n    // do your own stuff...\n\
    }\n```\n\n通过这种方式，你可以设计自己的内容访问框架。当然，你应该告知可能的客户端如何使用这个接口，例如在契约类中说明。\n\n## 注意\n\n\
    调用此方法时不进行任何安全检查。你必须自行实现适当的安全检查，例如在上下文中使用 `checkSelfPermission()`。\n\n# 通过 URI\
    \ 规范化的客户端访问一致性\n\n很多时候，查询结果中包含依赖于短期数据库上下文的 ID、列表索引号或其他信息。例如，一个查询可能返回项目 ID 如 23、67\
    \ 和 56，如果你需要获取某个项目的详细信息，你需要使用包含该 ID 的另一个 URI 再次查询，例如 `content://com.xyz/people/23`。这种\
    \ URI 的问题是，客户端通常不会将它们保存起来供以后使用——ID 可能会改变，因此 URI 并不可靠。\n\n为了解决这个问题，内容提供者可以实现 *URI\
    \ 规范化*。为此，你的内容提供者类需要实现以下两个方法：\n\n- **`canonicalize(url: Uri): Uri`**：让此方法返回规范化的\
    \ URI，例如通过添加一些特定于域的查询参数，如下例所示。\n- **`uncanonicalize(url: Uri): Uri`**：执行与 `canonicalize()`\
    \ 完全相反的操作。如果项目已丢失且无法执行反规范化，则返回 `null`。\n\n```\ncontent://com.xyz/people/23  ->\n\
    content://com.xyz/people?firstName=John&lastName=Bird&Birthday=20010534&SSN=123-99-1624\n\
    ```\n\n# 消费内容\n\n为了消费内容，内容提供者的客户端使用一个 `android.content.ContentResolver` 对象。任何\
    \ `Context` 对象（包括 Activity、Service 等）都提供一个 `getContentResolver()` 方法，在 Kotlin\
    \ 中简写为 `contentResolver`。\n\n## 使用 Content Resolver\n\n访问类似数据库的内容时，你可以使用以下 `ContentResolver`\
    \ 方法：\n\n- **`insert(url: Uri, values: ContentValues): Int`**：插入一条记录。\n- **`delete(url:\
    \ Uri, where: String, selectionArgs: Array<String>): Int`**：删除记录。\n- **`update(uri:\
    \ Uri, values: ContentValues, where: String, selectionArgs: Array<String>): Int`**：更新记录。\n\
    - **`query(uri: Uri, projection: Array<String>, queryArgs: Bundle, cancellationSignal:\
    \ CancellationSignal): Cursor`**：查询。\n- **`query(uri: Uri, projection: Array<String>,\
    \ selection: String, selectionArgs: Array<String>, sortOrder: String, cancellationSignal:\
    \ CancellationSignal): Cursor`**：查询。\n- **`query(uri: Uri, projection: Array<String>,\
    \ selection: String, selectionArgs: Array<String>, sortOrder: String): Cursor`**：查询。\n\
    \n这些方法的签名和含义与对应的 `ContentProvider` 方法密切相关——请参阅前面的“提供内容”部分。也可以查阅在线 API 参考。\n\n\
    要访问文件内容，你可以使用以下方法之一：\n\n- **`openAssetFileDescriptor(uri: Uri, mode: String, cancellationSignal:\
    \ CancellationSignal): AssetFileDescriptor`**：打开内部（资产）文件。\n- **`openAssetFileDescriptor(uri:\
    \ Uri, mode: String): AssetFileDescriptor`**：打开内部（资产）文件，无取消信号。\n- **`openTypedAssetFileDescriptor(uri:\
    \ Uri, mimeType: String, opts: Bundle, cancellationSignal: CancellationSignal):\
    \ AssetFileDescriptor`**：打开类型化的内部（资产）文件。\n- **`openTypedAssetFileDescriptor(uri:\
    \ Uri, mimeType: String, opts: Bundle): AssetFileDescriptor`**：打开类型化的内部（资产）文件，无取消信号。\n\
    - **`openFileDescriptor(uri: Uri, mode: String, cancellationSignal: CancellationSignal):\
    \ ParcelFileDescriptor`**：打开文件。\n- **`openFileDescriptor(uri: Uri, mode: String):\
    \ ParcelFileDescriptor`**：打开文件，无取消信号。\n- **`openInputStream(uri: Uri): InputStream`**：打开输入流。\n\
    - **`openOutputStream(uri: Uri, mode: String): OutputStream`**：打开输出流。\n- **`openOutputStream(uri:\
    \ Uri): OutputStream`**：打开输出流，模式为 “w”。\n\n`open*Descriptor()` 方法同样与“提供内容”部分中对应的\
    \ `ContentProvider` 方法密切相关。另外两个方法 `openInputStream()` 和 `openOutputStream()` 是用于更方便地访问文件（流）数据的便捷方法。\n\
    \n要注册内容观察者以便在内容发生变化时异步收到通知——请参阅前面的“通知监听器数据变更”部分——可以使用以下方法：\n\n- `registerContentObserver(uri:\
    \ Uri, notifyForDescendants: Boolean, observer: ContentObserver)`\n- `unregisterContentObserver(observer:\
    \ ContentObserver)`\n\n要使用通过实现 `call()` 方法进行扩展的内容提供者，你可以使用内容解析器对应的 `call(uri:\
    \ Uri, method: String, arg: String, extras: Bundle): Bundle` 方法。\n\n# 访问系统 Content\
    \ Provider\n\nAndroid 操作系统（包括预装的应用）提供了多个内容提供者组件。在在线 API 文档中，内容提供者的契约类可以在 “android.provider/Classes”\
    \ 下找到。以下章节总结了它们是什么以及如何访问它们。\n\n## BlockedNumberContract\n\n公开一个包含被阻止号码的表。只有系统、默认电话应用、默认短信应用和运营商应用可以访问此表——但\
    \ `canCurrentUserBlockNumbers()` 方法除外，任何应用都可以调用它。使用示例：\n\n```\nval values = ContentValues()\n\
    values.put(BlockedNumbers.COLUMN_ORIGINAL_NUMBER,\n    \"1234567890\")\nUri uri\
    \ = contentResolver.insert(\n    BlockedNumbers.CONTENT_URI, values)\n```\n\n\
    ## CalendarContract\n\n一个相当复杂的内容提供者，包含多个表。作为示例，我们访问日历列表并添加一个事件：\n"
