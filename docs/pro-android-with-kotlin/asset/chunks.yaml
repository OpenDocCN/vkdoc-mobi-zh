    \ =\nGLES20.glGetUniformLocation(program,\n\"texture\")\nif(textureHandle >= 0)\
    \ {\n// Set the active texture unit to\n// texture unit 0.\nGLES20.glActiveTexture(GLES20.GL_TEXTURE0)\n\
    // Tell the texture uniform sampler to use\n// this texture in the shader by binding\
