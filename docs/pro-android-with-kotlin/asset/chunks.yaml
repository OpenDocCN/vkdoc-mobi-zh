    // 尝试连接到 BluetoothSocket

    try {

    // 这是一个阻塞调用，只有在成功连接或抛出异常时才会返回

    mmSocket!!.connect()

    } catch (e: IOException) {

    Log.e("LOG","Connection failed", e)

    Log.e("LOG", "Maybe device does not " +

    " expose service " +

    MY_UUID_INSECURE)

    // 关闭套接字

    mmSocket!!.close()

    connectionFailed()

    return

    }

    // 重置线程，因为任务已完成

    createSocket = null

    // 启动已连接的线程

    connected(mmSocket, mmDevice)

    }

    fun cancel() {

    mmSocket!!.close()

    }

    }

    ```


