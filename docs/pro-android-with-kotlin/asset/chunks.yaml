- fmt: "# Socket Connection and Wearables Development\n\n## Bluetooth Socket Communication\n\
    \n```\n/**\n* This thread runs during a connection with a\n* remote device. It\
    \ handles all incoming and outgoing\n* transmissions.\n*/\nprivate inner\nclass\
    \ SocketReadWrite(val mmSocket: BluetoothSocket) :\nThread() {\n    private val\
    \ mmInStream: InputStream?\n    private val mmOutStream: OutputStream?\n    init\
    \ {\n        mmInStream = mmSocket.inputStream\n        mmOutStream = mmSocket.outputStream\n\
    \        changeState(Companion.State.CONNECTED)\n    }\n    override fun run()\
    \ {\n        val buffer = ByteArray(1024)\n        var bytex: Int\n        //\
    \ Keep listening to the InputStream while\n        // connected\n        while\
    \ (mState ==\n        Companion.State.CONNECTED) {\n            try {\n      \
    \          // Read from the InputStream\n                bytex = mmInStream!!.read(buffer)\n\
    \            } catch (e: IOException) {\n                connectionLost()\n  \
    \              break\n            }\n        }\n    }\n    /**\n    * Write to\
    \ the connected OutStream.\n    *\n    * @param buffer The bytes to write\n  \
    \  */\n    fun write(buffer: ByteArray) {\n        mmOutStream!!.write(buffer)\n\
    \    }\n    fun cancel() {\n        mmSocket.close()\n    }\n}\n```\n\nFinally,\
    \ we provide a method to tell interested parties when a socket connection state\
    \ changes. Here this also emits a logging statement – for production code you'd\
    \ remove this or provide this information to the user some other way:\n\n```\n\
    private fun changeState(newState:State) {\n    Log.e(\"LOG\",\n    \"changing\
    \ state: ${mState} -> ${newState}\")\n    mState = newState\n    stateChangeListeners.forEach\
    \ { it(newState) }\n}\n```\n\n**Note:** The UUID from the companion object must\
    \ match the UUID you see in the server startup logs.\n\nWhat this class does is\
    \ as follows:\n\n- Once its `connect(...)` method gets called, it starts a connection\
    \ attempt.\n- If the connection succeeds, another thread for initializing input\
    \ and output streams using the connection object gets started. Note: The input\
    \ stream is not used in this example – it is here for informational purposes.\n\
    - By virtue of its `mState` member, clients can check for the connection state.\n\
    - If connected, the method `write(...)` can be called to send data through the\
    \ connection channel.\n\nTo test the connection, press the \"RFCOMM\" button on\
    \ the UI. The server application should then log:\n\n```\nCommand: 84\nCommand:\
    \ 104\nCommand: 101\nCommand: 32\nCommand: 109\nCommand: 101\nCommand: 115\nCommand:\
    \ 115\nCommand: 97\nCommand: 103\nCommand: 101\n```\n\nWhich is the numerical\
    \ representation of the message \"The message\".\n\n## Hardware\n\nAndroid can\
    \ do more than presenting a GUI on a smartphone. Android is also about wearables,\
    \ talking to appropriately equipped TV sets, and infotainment in cars. And smartphones\
    \ have cameras, NFC and Bluetooth adapters, and sensors for position, movement,\
    \ orientation, and fingerprints. And, yes, smartphones can do phone calls as well.\
    \ This chapter describes how the Android OS can run on devices other than smartphones\
    \ and how to interact with the device's hardware.\n\n### Programming with Wearables\n\
    \nGoogle Wear is about small devices you wear on your body. While as of now this\
    \ is practically restricted to smartwatches you can buy and then wrap around your\
    \ wrist, future devices will maybe be part of your glasses, your clothes, or what\
    \ else you might think of. Also, talking of Google Wear, you usually think of\
    \ a smartphone you need to carry with you and connect to a Google Wear device\
    \ via some pairing mechanism, but modern devices also may run in a standalone\
    \ fashion. This means to function they don't need paired smartphones any longer\
    \ and themselves can connect to the Internet, a cellular network, or a local network\
    \ via Wi-Fi, Bluetooth, or a cellular adapter.\n\nIf you happen to use a paired\
    \ smartphone for a Google Wear app, this no longer is restricted to Android running\
    \ there, so you can pair a Google Wear device with both an Android smartphone\
    \ and an Apple iOS phone. The Wear OS works with paired phones running Android\
    \ version 4.4 or higher and iOS 9.3 or higher.\n\nGoogle's design guidelines for\
    \ smartphone apps, more precisely the demand for an easy and expressive user interface,\
    \ are even more important for Wear apps. Due to the limited space and input capabilities,\
    \ it is absolutely vital for Wear-related development to reduce UI elements and\
    \ front-end workflows to a bare minimum. Otherwise, you risk your app's usability\
    \ and acceptance degrading significantly.\n\nCommon use cases for Google Wear\
    \ apps are as follows:\n\n- Designing own watch faces (time and date display)\n\
    - Adding face complications (custom face elements)\n- Displaying notifications\n\
    - Messaging\n- Voice interaction\n- Google Assistant\n- Playing music\n- Making\
    \ and receiving calls\n- Alarms\n- Apps with simple user interfaces\n- Companion\
    \ apps to smartphone and tablet apps\n- Sensor apps\n- Location-based services\n\
    - Pay apps\n\nIn the following sections, we will be looking at development matters\
    \ for Google Wear apps.\n\n### Wearables Development\n\nWhile to develop Wear\
    \ apps you can mostly use the same tools and techniques you use for smartphone\
    \ or tablet app development, you have to take care of the limited space on smartwatches\
    \ and the different way users interact with watches compared with other devices.\n\
    \nNevertheless, the prominent place to start Wear development is Android Studio,\
    \ and in this section we describe what to do to set up your IDE to start Wear\
    \ development and how to get devices connected to Android Studio.\n\nFor developing\
    \ Wear apps, we first have to point out that there are two operation modes:\n\n\
    - **Pairing a wearable device with a smartphone**\n\n  Due to technical restrictions,\
    \ it is not possible to pair a virtual smartwatch with a virtual smartphone. So\
    \ you have to use a real phone to pair a virtual smartwatch.\n\n- **Standalone\
    \ mode**\n\n  The Wear app runs on its own, without needing pairing to a smartphone.\
    \ It is highly recommended for modern apps to be able to do sensible things also\
    \ in standalone mode.\n\nIn either case create a new Android Studio project and\
    \ in the \"Target Android Devices\" check only the Wear checkbox. In the subsequent\
    \ screen, select one of the following:\n\n- **Add No Activity**\n\n  Proceed without\
    \ adding an activity. You will have to do that later manually.\n\n- **Blank Wear\
    \ Activity**\n\n  Add as layout and an activity class.\n\n- **Watch Face**\n\n\
    \  Does not create an activity. Instead, it builds a service class needed to define\
    \ a watch face.\n\n```\nclass MainActivity : WearableActivity() {\n    override\n\
    \    fun onCreate(savedInstanceState: Bundle?) {\n        super.onCreate(savedInstanceState)\n\
    \        setContentView(R.layout.activity_main)\n        setAmbientEnabled() //\
    \ Enables Always-on\n    }\n}\n```\n\nThis choice corresponds to the development\
    \ paradigm to choose. You will create one of the following:\n\n- A smartphone-like\
    \ app that needs explicitly to be started on the watch in order to run.\n- A watch\
    \ face. This is more or less a graphics design issue – a face is the visual appearance\
    \ of time and date on the watch's surface."
