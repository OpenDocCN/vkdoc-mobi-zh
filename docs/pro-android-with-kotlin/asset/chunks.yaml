    }\n```\n\nwhere for development and testing  purposes, an\naccept-all SSL hostname\
    \ verifier was added.\n\nSo, instead of writing `val queue = Volley.newRequestQueue(this)`\
    \ or `val requestQueue = RequestQueue(...)` as shown earlier, you then use\n\n\
    ```\nval queue = RequestQueueSingleton(this).requestQueue\n```\n\nNow for sending\
    \ a string\nrequest , you have to write\n\n```\n// This is a convention for emulated\
    \ devices\n// addressing the host (development PC)\nval HOST_IP = \"10.0.2.2\"\
    \nval stringRequest =\nStringRequest(Request.Method.GET,\n\"https://${HOST_IP}:6699/test/person\"\
    ,\nResponse.Listener { response ->\nval shortened =\nresponse.substring(0,\nMath.min(response.length,\
    \ 500))\ntv.text = \"Response is: ${shortened}\"\n},\nResponse.ErrorListener {\
    \ err ->\nLog.e(\"LOG\", err.toString())\ntv.text = \"That didn't work!\"\n})\n\
    queue.add(stringRequest)\n```\n\nwhere `tv`\npoints to a `TextView` UI element\
    \ . For that to\nwork, you need to have a server responding to `https://localhost:6699/test/person`.\n\
    Note that the response listener automatically runs in the UI thread, so\nyou don’t\
    \ have to take care of that yourself.\nTo cancel single requests, use  `cancel()`\
    \  on\nthe request object anywhere. You can also cancel a group of requests:\n\
    add a tag to each request in question as in `val stringRequest = ... .apply {tag\
    \ = \"TheTag\"}` and then write `queue?.cancelAll( \"TheTag\" )`. Volley makes\
    \ sure the response listener never gets called once\na request is canceled.\n\n\
    To request a JSON object or JSON array , you have to\nsubstitute\n\n```\nval request\
    \ =\nJsonArrayRequest(Request.Method.GET, ...)\nor\nval request =\nJsonObjectRequest(Request.Method.GET,\
    \ ...)\n```\n\nfor the `StringRequest` we used\npreviously. For example, for a\
    \ JSON request and the POST method , you can\nwrite\n\n```\nval reqObj:JSONObject\
    \ =\nJSONObject(\"\"\"{\"a\":7, \"b\":\"Hello\"}\"\"\")\nval json1 = JsonObjectRequest(Request.Method.POST,\n\
    \"https://${HOST_IP}:6699/test/json\",\nreqObj,\nResponse.Listener { response\
    \ ->\nLog.e(\"LOG\", \"Response: ${response}\")\n},\nResponse.ErrorListener{ err\
    \ ->\nLog.e(\"LOG\", \"Error: ${err}\")\n})\n```\n\nVolley can do more for you.\
    \ You can use other HTTP methods  like\n“PUT” and also write custom requests handling\
    \ and returning other data\ntypes. Please see Volley’s online documentation or\
    \ its API documentation\nfor more details.\n\nSetting Up a Test Server\nThis is\
    \ not really an Android topic and not even anything that\nnecessarily has to do\
    \ with Kotlin, but to test the communication, you\nneed to have some kind of web\
    \ server running. To have things easy, I\nusually configure a very simple yet\
    \ powerful server based on Groovy and\n`Spark` – not\nApache Spark but instead\
    \ Java Spark from [`http://sparkjava.com/`](http://sparkjava.com/) .\n\nTo use\
    \ it, for example, in Eclipse, first install the Groovy plugin.\nThen create a\
    \ Maven\nproject  and add as dependencies\n\n```\ncom.sparkjava\nspark-core\n\
    2.9.4\n\norg.slf4j\nslf4j-simple\n1.7.25\ntest\n\n```\n\nAfter that create a Java\n\
    keystore file  and write a Groovy script\n\n```\nimport static spark.Spark.*\n\
    def keystoreFilePath = \"keystore.jks\"\ndef keystorePassword = \"passw7%d\"\n\
    def truststoreFilePath = null\ndef truststorePassword = null\nsecure(keystoreFilePath,\
    \ keystorePassword,\ntruststoreFilePath, truststorePassword)\nport(6699)\nget(\"\
    /test/person\", { req, res -> \"Hello World\" })\npost(\"/test/json\", { req,\
    \ res ->\nprintln(req.body())\n'{ \"msg\":\"Hello World\", \"val\":7 }'\n})\n\
    ```\n\nand start it.\n\nCaution\n\nIn order for inside Eclipse to avoid Servlet\
    \ API version clashes , remove the\ndependency on the Servlet API in the Groovy\
    \ settings dialog you get at\nProperties after right-clicking Groovy Libraries\
    \ in the project.\n\nTo create a keystore file, for example, under Linux, you\
    \ could use the\nBash script\n\n```\n#!/bin/bash\nexport JAVA_HOME=/opt/jdk\n\
    $JAVA_HOME/bin/keytool -genkey -keyalg RSA \\\n-alias selfsigned -keystore keystore.jks\
    \ \\\n-storepass passw7%d -validity 360 -keysize 2048\n```\n\nwith the Java path\
    \ adapted.\n\nAndroid and NFC\n\nNFC  is for\nshort-range wireless connectivity\
    \ for the transport of small data\npackages between NFC-capable devices . The\
    \ range is\nlimited to a few centimeters between the communication partners. Typical\n\
    use cases  are\n\n*   Connecting and then reading from or writing to NFC tags\n\
    \n*   Connecting and then communicating with other NFC-capable devices\n    (peer-to-peer\
    \ mode)\n\n*   Emulating an NFC card: connecting and then communicating with NFC\n\
    \    card readers and writers\n\nTo start developing an app that speaks NFC, you\
    \ need to acquire the\npermission to do so inside `AndroidManifest.xml`\n :\n\n\
    ```\n\nTo also limit visibility\n in the Google Play Store, add\n\n```\nto the\
    \ same file.\n\nTalking to NFC Tags\nOnce a device with NFC enabled discovers\
    \ an NFC tag in the vicinity,\nit tries to dispatch the tag according to a certain\
    \ algorithm: If the\nsystem determines an NDEF data and finds an intent filter\
    \ that is able\nto handle NDEF ,\nthe corresponding component gets called. If\
    \ the tag does not exhibit\nNDEF data but otherwise identifies itself by providing\
    \ information about\ntechnology and/or payload, this set of data gets mapped to\
    \ a “tech”\nrecord, and the system tries to find a component that is able to handle\n\
    that. If both fail, the discovery information is limited to the bare\nfact that\
    \ an NFC tag was discovered. In this case the system tries to\nfind a component\
    \ that can handle NFC tags without NDEF and without\n“tech”-type data.\nBased\
    \ on the information found on the NFC tag, Android also creates a\nURI and a MIME\
    \ type you can use for intent filters. The procedure for\nthat gets described\
    \ in more detail on page “NFC Basics” of the Android\nonline developer documentation\
    \ – for example, enter “Android develop NFC\nbasics” in your favorite search engine\
    \ to find it."
