    ## 兼容库


    *框架 API* 与*兼容库*之间存在一个很重要但起初不易理解的区别。当你开始开发 Android 应用时，经常会看到不同包中出现同名的类，甚至更糟的是，你还会看到不同包中名称不同的类似乎做着同样的事情。


    **注意**


    Jetpack 库集合简化了兼容性。如果你使用来自 `androidx.*` 命名空间的 Jetpack 兼容类，就可以忽略下文所述的兼容库。Android
    Studio 有助于迁移旧项目。`https://developer.android.com/jetpack/androidx/` 上有更多相关信息。


    我们来举一个典型的例子：要创建 Activity，你可以继承 `android.app.Activity`，也可以继承 `android.support.v7.app.AppCompatActivity`。查看网上找到的示例和教程，似乎在使用上没有明显区别。实际上，`AppCompatActivity`
    继承自 `Activity`，因此任何需要 `Activity` 的地方，你都可以用 `AppCompatActivity` 替代，并且编译也能通过。那么，它们在功能上有区别吗？这取决于具体情况。如果你查看文档或代码，会发现
    `AppCompatActivity` 允许添加 `android.support.v7.app.ActionBar`，而 `android.app.Activity`
    则不行。相反，`android.app.Activity` 允许添加 `android.app.ActionBar`。而这次 `android.support.v7.app.ActionBar`
    并*没有*继承自 `android.app.ActionBar`，所以你不能将 `android.support.v7.app.ActionBar` 添加到
    `android.app.Activity` 中。这基本上意味着，如果你倾向于使用 `android.support.v7.app.ActionBar` 而非
    `android.app.ActionBar`，那么就必须使用 `AppCompatActivity` 作为 Activity。为什么有人会用 `android.support.v7.app.ActionBar`
    而不是 `android.app.ActionBar` 呢？答案很简单：后者相当陈旧——自 API 级别 11 起就已存在。较新版本的 `android.app.ActionBar`
    不能破坏 API 以保持与旧设备的兼容性。但 `android.support.v7.app.ActionBar` 可以添加新功能——它更新，自 API 级别
    24 起才存在。


    其神奇之处如下：如果你使用支持 API 级别 24 或更高版本的设备，你可以使用 `android.support.v7.app.AppCompatActivity`
    并添加一个 `android.support.v7.app.ActionBar`。你也可以使用 `android.app.Activity`，但那样就不能添加
    `android.support.v7.app.ActionBar`，而必须使用 `android.app.ActionBar`。因此，对于新设备，如果支持库的
    ActionBar 比框架的 ActionBar 更适合你的需求，那么为 Activity 使用 `android.support.v7.app.AppCompatActivity`
    是合理的。


    旧设备呢？你仍然可以使用 `android.support.v7.app.AppCompatActivity`，因为它是作为库添加到应用中的。因此，你也可以使用现代的
    `android.support.v7.app.ActionBar` 作为 ActionBar，与设备原生提供的旧版 `android.app.ActionBar`
    相比，能获得更多功能。而这正是其中的诀窍所在：*使用支持库，即使是旧设备也能利用以后添加的新功能！* 支持类内部会检查设备版本，并提供合理的回退功能，以尽可能地模拟现代设备。


    需要注意的一点是，作为开发者，你必须同时生活在两个世界中：在没有其他选择时，你必须显式或隐式地使用框架类；而在有兼容库可用且你希望确保与旧设备最大程度兼容时，你必须考虑使用兼容库类。因此，在使用某个类之前，检查是否存在匹配的兼容库类至关重要。你可能不喜欢
    Android 中这种“两世界”的方法，这也意味着构建应用时需要更多思考工作，但这正是 Android 处理向后兼容性的方式。


    如果你在常用搜索引擎中输入“Android support library”，很快就能找到关于支持库的详细信息。


    支持库会与应用捆绑在一起，因此必须在构建文件中将其声明为依赖项。如果你在 Android Studio 中启动一个新项目，它默认会在模块的 `build.gradle`
    文件中写入以下内容：


    ```

    dependencies {

    ...

    implementation ''com.android.support:appcompat-v7:26.1.0''

    implementation ''com.android.support.constraint:constraint-layout:1.0.2''

    ...

    }

    ```


    所以你会看到，支持库 v7 版本默认可用，因此你从一开始就可以使用它。

