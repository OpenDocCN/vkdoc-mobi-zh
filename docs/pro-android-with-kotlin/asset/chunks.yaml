    \ this feature though, since your fellow developers may need to memorize too many\
    \ new names, which makes your code hard to read.\n\n## Kotlin on JavaScript\n\n\
    If you hear Android and Kotlin together, the obvious thing you will think about\
    \ is that Kotlin serves as a substitute for Java and addresses the Android Runtime\
    \ and Android APIs. But there is another possibility, which is not that obvious\
    \ but nevertheless opens interesting possibilities. If you look at Kotlin alone,\
    \ you can see that it can create bytecode to be run on a Java Virtual Machine\
    \ or on a somewhat Java-like Dalvik Virtual Machine in the case of Android. Or\
    \ it can produce JavaScript to be used in a browser. The question is: Can we use\
    \ that in Android as well? The answer is yes, and in the following sections, I\
    \ will show you how this can be done.\n\n### Creating a JavaScript Module\n\n\
    We start with a JavaScript module containing Kotlin files, which are compiled\
    \ to JavaScript files. There is nothing like a “JavaScript” module wizard available\
    \ when you start a new module, but we can easily start with a standard smartphone\
    \ app module and convert it to serve our needs.\n\nIn an Android Studio project,\
    \ select New ➤ New Module and then choose Phone & Tablet Module. Give it a decent\
    \ name, say “kotlinjsSample” for now. Once the module is generated, remove the\
    \ following folders and files, because we don’t need them:\n\n```\nsrc/test\n\
    src/androidTest\nsrc/main/java\nsrc/main/res\nsrc/main/AndroidManifest.xml\n```\n\
    \n**Note:** If you want to do that removal from inside Android Studio, you have\
    \ to switch the view type from \"Android\" to \"Project\" first.\n\nInstead, add\
    \ two folders:\n\n```\nsrc/main/kotlinjs\nsrc/main/web\n```\n\nNow replace the\
    \ contents of the module’s `build.gradle` file to read:\n\n```\nbuildscript {\n\
    ext.kotlin_version = '1.2.31'\nrepositories {\nmavenCentral()\n}\ndependencies\
    \ {\nclasspath \"org.jetbrains.kotlin:\" +\n\"kotlin-gradle-plugin:$kotlin_version\"\
    \n}\n}\napply plugin: 'kotlin2js'\nsourceSets {\nmain.kotlin.srcDirs += 'src/main/kotlinjs'\n\
    }\ntask prepareForExport(type: Jar) {\nbaseName = project.name + '-all'\nfrom\
    \ {\nconfigurations.compile.collect {\nit.isDirectory() ? it : zipTree(it) } +\n\
    'src/main/web'\n}\nwith jar\n}\nrepositories {\nmavenCentral()\n}\ndependencies\
    \ {\nimplementation \"org.jetbrains.kotlin:\" +\n\"kotlin-stdlib-js:$kotlin_version\"\
    \n}\n```\n\nThis build file enables the Kotlin ➤ JavaScript compiler and introduces\
    \ a new export task. You can now open the “Gradle” view on the right side of Android\
    \ Studio’s window, and there under “others” you will find the task `prepareForExport`.\
    \ To run it, double-click it. After that inside `build/libs`, you will find a\
    \ new file `kotlinjsSample-all.jar`. It is this file that represents the JavaScript\
    \ module for use by other apps or modules.\n\nCreate a first file `Main.kt` inside\
    \ `src/main/kotlinjs` and let it read:\n\n```\nimport kotlin.browser.document\n\
    fun main(args: Array) {\nval message = \"Hello JavaScript!\"\ndocument.getElementById(\"\
    cont\")!!.innerHTML = message\n}\n```\n\nIn the end we will be targeting a website,\
    \ so we need a first HTML page as well. Make it the standard landing page `index.xhtml`,\
    \ create it inside `src/main/web`, and enter:\n\n```\n\nKotlin-JavaScript\n\n\
    ```\n\nExecute the task `prepareForExport` once again to let the module output\
    \ artifact reflect the changes we just made.\n\n### Using the JavaScript Module\n\
    \nTo use the JavaScript module we constructed in the last section, we add a couple\
    \ of lines in the app’s `build.gradle` file:\n\n```\ntask syncKotlinJs(type: Copy)\
    \ {\nfrom zipTree('../kotlinjsSample/build/libs/' +\n'kotlinjsSample-all.jar')\n\
    into 'src/main/assets/kotlinjs'\n}\npreBuild.dependsOn(syncKotlinJs)\n```\n\n\
    This will import the JavaScript module’s output file and extract it inside the\
    \ `assets` folder of the app. This extra build task gets executed automatically\
    \ for you during a normal build by virtue of the `dependsOn()` declaration.\n\n\
    Now inside your layout file, place a `WebView` element, like in:\n\nTo fill that\
    \ view with a web page, inside your main activity’s `onCreate()` callback, write:\n\
    \n```\nwv.webChromeClient = WebChromeClient()\nwv.settings.javaScriptEnabled =\
    \ true\nwv.loadUrl(\"file:///android_asset/kotlinjs/index.xhtml\")\n```\n\nThis\
    \ will enable JavaScript support for the `WebView` widget and load the main HTML\
    \ page from the JavaScript module.\n\nAs an extension you maybe want to connect\
    \ the JavaScript inside the web page to the Kotlin code from the app (not the\
    \ JavaScript module). This is not overly complicated. You just have to add:\n\n\
    ```\nclass JsObject {\n@JavascriptInterface\noverride fun toString(): String {\n\
    return \"Hi from injectedObject\"\n}\n}\nwv.addJavascriptInterface(JsObject(),\
    \ \"injectedObject\")\n```\n\nand henceforth can use `injectedObject` from the\
    \ JavaScript module as follows:\n\n```\nval message = \"Hello JavaScript! injected=\"\
    \ +\nwindow[\"injectedObject\"]\n```\n\nUsing these techniques you could design\
    \ your complete app using HTML, CSS, Kotlin transcribing to JavaScript, and a\
    \ couple of accessor objects to address Android APIs.\n\n## 12. Building\n\nIn\
    \ this chapter we talk about the building process of your apps. While building\
    \ an app given source files can be done using both a terminal and buttons and\
    \ menu entries from inside the Android Studio IDE, this is not an introduction\
    \ to Android Studio nor a reference – for these please refer to the help included\
    \ or books and online resources. What we will do in this chapter is look at build-related\
    \ concepts and methods for adapting the build process to your needs.\n\n### Build-Related\
    \ Files\n\nOnce you create a new project inside Android Studio, you will see the\
    \ following build-related files:\n\n- **build.gradle**  \n  This is the top-level\
    \ project-related build file. It contains the declaration of repositories and\
    \ dependencies common to all modules the project contains. There is normally no\
    \ need for you to edit this file for simple apps.\n\n- **gradle.properties** \
    \ \n  Technical settings related to Gradle builds. There is normally no need for\
    \ you to edit this file.\n\n- **gradlew** and **gradlew.bat**  \n  Wrapper scripts\
    \ so you can run builds using a terminal instead of the Android Studio IDE.\n\n\
    - **local.properties**  \n  Generated technical properties related to your Android\
    \ Studio installation. You should not edit this file.\n\n- **settings.gradle**\
    \  \n  Tells which modules are part of the project. Android Studio will handle\
    \ this file if you add new modules.\n\n- **app/build.gradle**  \n  Module-related\
    \ build file. This is important – here dependencies and the build process for\
    \ the module get configured. Android Studio will create a first module named “app”\
    \ including the corresponding build file for you, but this “app” as a name is\
    \ just a convention. Additional modules will have different names you choose at\
    \ will, and they all have their own build files. It is even possible to rename\
    \ “app” to a different name that better suits your needs, if you like.\n\n###\
    \ Module Configuration\n\nEach module of a project contains its own build file\
    \ `build.gradle`. If you let Android Studio create a new project or module for\
    \ you, it also creates an initial build file. Such a basic build file for a module\
    \ with Kotlin support looks like:\n"
