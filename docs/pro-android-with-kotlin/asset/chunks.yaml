  trans: "\n# 发布库\n\n到目前为止，我们仅在本地使用该库，这意味着你的开发机器上某处有该库项目，并在同一台机器的其他项目中使用它。你也可以发布库，这意味着在拥有公司仓库的情况下，让库可供公司环境内的其他开发者使用，或者对于你想提供给社区的库，使其真正公开。\n\
    \n不幸的是，发布库的过程相当复杂，涉及在多个地方修改构建文件，并使用第三方插件和仓库网站。这使得发布库成为一项复杂且脆弱的任务，向你详细描述一种可能的发布流程，在你阅读本书时很可能已经过时。因此，我建议你自己进行研究——在你常用的搜索引擎中输入“发布\
    \ Android 库”，它会立刻指向能帮助你的在线资源。如果你找到了几个可能满足需求的流程，一般经验法则是选择（A）拥有大型支持社区且（B）尽可能简单的那个。\n\
    \n此外，对于公司项目，如果要使用公共仓库，请确保你得到了许可。如果你无法使用公共仓库，安装公司仓库并非极其复杂的任务。例如，要建立一个公司 Maven 仓库，你可以使用软件套件“Artifactory”。\n\
    \n# 使用 Kotlin 的高级监听器\n\n无论你正在为 Android 创建哪种应用，总会在某个地方，或者更可能是经常需要为 API 函数调用提供监听器。在\
    \ Java 中，你必须创建实现监听器接口的类或匿名内部类，而在 Kotlin 中，你可以更优雅地做到这一点。\n\n如果你有一个 SAM（即*单抽象方法*）类或接口，事情就很简单。例如，如果你想给按钮添加点击监听器，这意味着你需要提供\
    \ `View.OnClickListener` 接口的实现，用 Java 方式看起来是这样的：\n\n```\nbtn.setOnClickListener(object\
    \ : View.OnClickListener {\noverride fun onClick(v: View?) {\n// 执行某些操作\n}\n})\n\
    ```\n\n然而，由于这个接口只有一个方法，你可以更简洁地编写：\n\n```\nbtn.setOnClickListener {\n// 执行某些操作\n\
    }\n```\n\n并让编译器找出接口方法该如何实现。\n\n如果监听器不是 SAM，即它有多个方法，这种简写方式就不再可行。例如，如果你有一个 `EditText`\
    \ 视图并想添加文本改变监听器，基本必须这样写：\n\n```\nval et = ... // EditText 视图\net.addTextChangedListener(\
    \ object : TextWatcher {\noverride fun afterTextChanged(s: Editable?) {\n// ...\n\
    }\noverride fun beforeTextChanged(s: CharSequence?,\nstart: Int, count: Int, after:\
    \ Int) {\n// ...\n}\noverride fun onTextChanged(s: CharSequence?,\nstart: Int,\
    \ before: Int, count: Int) {\n// ...\n}\n})\n```\n\n即使你只关心 `onTextChanged()` 回调方法也是如此。不过，你可以做的是在工具文件中扩展\
    \ `EditText` 类，并在其中添加提供简化文本改变监听器的可能性。为此，首先创建一个这样的文件，例如 `utility.kt`，放在 `com.example`\
    \ 包内，或者当然也可以是应用的任何包内。在其中添加：\n\n```\nfun EditText.addTextChangedListener(l:\n(CharSequence?,\
    \ Int, Int, Int) -> Unit) {\nthis.addTextChangedListener(object : TextWatcher\
    \ {\noverride fun afterTextChanged(s: Editable?) {\n}\noverride fun beforeTextChanged(s:\
    \ CharSequence?,\nstart: Int, count: Int, after: Int) {\n}\noverride fun onTextChanged(s:\
    \ CharSequence?,\nstart: Int, before: Int, count: Int) {\nl(s, start, before,\
    \ count)\n}\n})\n}\n```\n\n这会动态地向该类添加所需的方法。\n\n现在，你可以在任何需要的地方使用 `import com.example.utility.*`，然后这样写：\n\
    \n```\nval et = ... // EditText 视图\net.addTextChangedListener({ s: CharSequence?,\n\
    start: Int, before: Int, count: Int ->\n// 执行某些操作\n})\n```\n\n与原始结构相比，这看起来简洁得多。\n\
    \n# 多线程\n\n我们已经在第 9 章的“后台任务”部分一定程度上讨论过多线程。本节仅指出 Kotlin 在语言层面可以做些什么来简化多线程。\n\n\
    Kotlin 在其标准库中包含了一些实用函数。与使用 Java API 相比，它们有助于更轻松地启动线程和计时器——参见表 11-1。\n\n**表 11-1**\
    \  \nKotlin 并发\n\n| 名称 | 参数 | 返回值 | 描述 |\n| --- | --- | --- | --- |\n| `fixedRateTimer`\
    \ | `name: String?` `daemon: Boolean` `initialDelay: Long` `period: Long` `action:\
    \ TimerTask.() -> Unit` | `Timer` | 创建并启动一个用于固定速率调度的计时器对象。`period` 和 `initialDelay`\
    \ 参数以毫秒为单位。 |\n| `fixedRateTimer` | `name: String?` `daemon: Boolean` `startAt:\
    \ Date` `period: Long` `action: TimerTask.() -> Unit` | `Timer` | 创建并启动一个用于固定速率调度的计时器对象。`period`\
    \ 参数以毫秒为单位。 |\n| `timer` | `name: String?` `daemon: Boolean` `initialDelay: Long`\
    \ `period: Long` `action: TimerTask.() -> Unit` | `Timer` | 创建并启动一个用于固定速率调度的计时器对象。`period`\
    \ 参数是前一个任务结束到下一个任务开始之间的时间（毫秒）。 |\n| `timer` | `name: String?` `daemon: Boolean`\
    \ `startAt: Date` `period: Long` `action: TimerTask.() -> Unit` | `Timer` | 创建并启动一个用于固定速率调度的计时器对象。`period`\
    \ 参数是前一个任务结束到下一个任务开始之间的时间（毫秒）。 |\n| `thread` | `start: Boolean` `isDaemon: Boolean`\
    \ `contextClassLoader: ClassLoader?` `name: String?` `priority: Int` `block: ()\
    \ -> Unit` | `Thread` | 创建并可能启动一个线程，执行其 `block`。优先级较高的线程将优先于优先级较低的线程执行。 |\n\n\
    对于计时器函数，“action”参数是一个闭包，其中 `this` 是相应的 `TimerTask` 对象。使用它，你可以例如从其执行块内部取消计时器。当所有非守护线程退出后，将\
    \ `daemon` 或 `isDaemon` 设置为 `true` 的线程或计时器不会阻止 JVM 关闭。\n\n凭借其通用的函数能力，Kotlin 无论如何都能很好地帮助我们处理并发——`java.util.concurrent`\
    \ 中许多处理并行执行的类都接受 `Runnable` 或 `Callable` 作为参数，在 Kotlin 中，你总是可以通过直接的 `{ ... }`\
    \ lambda 结构替换这种 SAM（单抽象方法）结构，例如：\n\n```\nval es = Executors.newFixedThreadPool(10)\n\
    // ...\nval future = es.submit({\nThread.sleep(2000L)\nprintln(\"executor over\"\
    )\n\n} as ()->Int)\nval res:Int = future.get()\n```\n\n因此，你不必像在 Java 中那样编写：\n\n\
    ```\nExecutorService es = Executors.newFixedThreadPool(10);\n// ...\nCallable\
    \ c = new Callable() {\npublic Integer call() {\ntry {\nThread.sleep(2000L);\n\
    } catch(InterruptedException e) { }\nSystem.out.println(\"executor over\");\n\
    return 10;\n};\nFuture f = es.submit(c);\nint res = f.get();\n```\n\n请注意，在 Kotlin\
    \ 代码中，强制转换为 `()->Int` 是必要的，即使 Android Studio 会抱怨这是多余的。原因在于，如果不这样做，将会调用另一个以 `Runnable`\
    \ 为参数的方法，导致执行器无法返回值。\n"
- fmt: '## Compatibility Libraries


    There is an important and at the beginning not-so-easy-to-understand distinction
    between the *Framework API* and the *compatibility libraries*. If you start developing
    Android apps, you quite often see classes of the same name showing up in different
    packages. Or even worse, you see classes of different names from different packages
    seemingly doing the same thing.


    **Note**


    The Jetpack library collection simplifies compatibility. If you use Jetpack compatibility
    classes from the `androidx.*` namespace, you can forget about compatibility libraries
    as described in the following. Android Studio helps for migrating older projects.
    `https://developer.android.com/jetpack/androidx/` tells you more about it.


    Let us take a look at a prominent example: to create activities you can either
    subclass `android.app.Activity` or subclass `android.support.v7.app.AppCompatActivity`.
    Looking at examples and tutorials you find on the Web, there seems to be no noticeable
    difference in usage. In fact `AppCompatActivity` inherits from `Activity`, so
    wherever an `Activity` is required, you can substitute `AppCompatActivity` for
    it, and it will compile. So is there a difference in function? It depends. If
    you look at the documentation or at the code, you can see that the `AppCompatActivity`
    allows for adding an `android.support.v7.app.ActionBar`, while `android.app.Activity`
    does not. Instead, `android.app.Activity` allows for adding an `android.app.ActionBar`.
    And this time `android.support.v7.app.ActionBar` does *not* inherit from `android.app.ActionBar`,
    so you cannot add `android.support.v7.app.ActionBar` to an `android.app.Activity`.
    This basically says that if you favor `android.support.v7.app.ActionBar` over
    `android.app.ActionBar`, you must use the `AppCompatActivity` for an activity.
    Why would one use `android.support.v7.app.ActionBar` instead of `android.app.ActionBar`?
    The answer is easy: the latter is quite old – it is available since API level
    11. Newer versions of `android.app.ActionBar` cannot break the API to maintain
    compatibility with older devices. But `android.support.v7.app.ActionBar` can have
    new functions added – it is much newer and exists since API level 24.


    The magic now works as follows: if you use a device that speaks API level 24 or
    higher, you can use `android.support.v7.app.AppCompatActivity` and add an `android.support.v7.app.ActionBar`.
    You could also use `android.app.Activity`, but then you cannot add an `android.support.v7.app.ActionBar`
    and instead have to use an `android.app.ActionBar`. So for new devices, it makes
    sense to use `android.support.v7.app.AppCompatActivity` for your activities if
    the support library action bar better suits your needs compared with the framework
    action bar.


    How about older devices? You still can use `android.support.v7.app.AppCompatActivity`
    because it is provided as a library added to the app. So you also can use the
    modern `android.support.v7.app.ActionBar` as an action bar and have more functionalities
    compared with the old `android.app.ActionBar` genuinely provided by the device.
    And this is actually how the trick goes: *using support libraries even older devices
    can take advantage of new functionalities added later*! The implementation of
    the support class internally checks for the device version and provides sensible
    fallback functionalities to resemble modern devices as much as possible.


    The caveat is that you as a developer have to live in two worlds at the same time:
    you have to explicitly or implicitly use framework classes if there is no other
    choice, and you have to think about using support library classes if available
    and if you want to ensure the maximum compatibility with older devices. It is
    therefore vital to check, before using a class, if there is also a matching support
    library class. You might not be happy with this two-world methodology used in
    Android, and it also means more thinking work to build an app, but that is how
    Android handles backward compatibility.


    You will readily find detailed information about the support libraries if you
    enter “Android support library” in your favorite search engine.


    Support libraries get bundled with your app, so they must be declared as dependencies
    in the build file. If you start a new project in Android Studio, it by default
    writes inside the module’s `build.gradle` file:


    ```

    dependencies {

    ...

    implementation ''com.android.support:appcompat-v7:26.1.0''

    implementation ''com.android.support.constraint:constraint-layout:1.0.2''

    ...

    }

    ```


    So you see the support library version v7 is available by default, so you can
    use it right from the start.'
