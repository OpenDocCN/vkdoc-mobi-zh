    # 使用备选布局


    使用备选布局是为不同屏幕尺寸提供支持的一种非常强大的手段。布局 XML 文件可以放入名称包含尺寸过滤器的不同目录中。例如，你可以将一个布局放入 `res/layout/main_activity.xml`
    文件，并将另一个布局放入 `res/layout-sw480dp/main_activity.xml` 文件，用以表示“最小宽度”为 480 dp（5 英寸或更大的大屏手机）。Android
    开发者文档中的“提供资源”和“提供备选资源”文档分别在线详细描述了命名方案。然后，Android 操作系统会在用户设备上运行时自动选择最匹配的布局。


    ## 使用可拉伸图像


    你可以为 UI 元素提供 *九宫格* 位图。在这类图像内部，你提供一个单像素宽的边框，标明图像的哪些部分可以重复以拉伸图像，并可选择性地标明哪些部分可用于内部内容。此类九宫格图像是后缀名为
    `.9.png` 的 PNG 文件。Android Studio 允许将传统的 PNG 转换为九宫格 PNG——可使用上下文菜单来实现此目的。


    # 像素密度


    设备具有不同的像素密度。为了使你的应用尽可能与设备无关，在需要像素尺寸的地方，请使用 *密度无关像素* 尺寸，而不是 *像素尺寸*。密度无关像素尺寸使用 `dp`
    作为单位，而像素使用 `px`。除此之外，你还可以基于不同的密度提供不同的布局文件——这种区分方式类似于前面描述的针对不同屏幕尺寸的区分。


    # 声明受限屏幕支持


    在某些情况下，你想通过声明某些屏幕特性无法使用来限制你的应用。显然，你希望避免这种情况，但如果不可避免，你可以在 `AndroidManifest.xml`
    中：


    -   ​告知应用某些 Activity 可以在 API 级别 24（Android 7.0）或更高版本中提供的多窗口模式下运行。为此，请使用属性 `android:resizeableActivity`
    并将其设置为 `true` 或 `false`。

    -   ​告知某些 Activity 在超过特定宽高比时应被加黑边（相应地添加边距）。为此，请使用属性 `android:maxAspectRatio` 并将宽高比指定为一个值。对于
    Android 7.1 及更低版本，请在 `<application>` 元素内重复此设置，如 `<meta-data android:name = "android.max_aspect"
    android:value = "s.th." />` 所示。

    -   ​通过使用 `<supports-screens>` 元素中的 `largestWidthLimitDp` 属性，告知某些 Activity 不应被拉伸超过某个特定限制。

    -   ​使用更多 `<supports-screens>` 和 `<compatible-screens>` 元素及属性，如第 2 章所述。


    # 检测设备能力


    在你的应用内部，你可以检查某些特性，例如：


    ```

    if(packageManager.

    hasSystemFeature(PackageManager.FEATURE_...)) {

    // ...

    }

    ```


    其中 `FEATURE_...` 是 `PackageManager` 中的众多常量之一。


    另一个特性信息来源是 `Configuration`。在 Kotlin 中，在 Activity 内部，你可以通过以下方式获取配置对象：


    ```

    val conf = resources.configuration

    ```


    并从中获取有关当前使用的颜色模式、可用键盘、屏幕方向以及触摸屏能力的信息。要获取屏幕尺寸，你可以编写：


    ```

    val size = Point()

    windowManager.defaultDisplay.getSize(size)

    // 或者 (getSystemService(Context.WINDOW_SERVICE)

    //    as WindowManager).defaultDisplay.getSize(size)

    val (width,height) = Pair(size.x, size.y)

    ```


    要获取分辨率：


    ```

    val metrics = DisplayMetrics()

    windowManager.defaultDisplay.getMetrics(metrics)

    val density = metrics.density

    ```


    # 程序化 UI 设计


    通常，UI 设计是通过在一个或多个 XML 布局文件中声明 UI 对象（`View` 对象）和容器（`ViewGroup` 对象）来完成的。虽然这是设计 UI
    的推荐方式，而且大多数人可能会告诉你，你不应该采取其他方式，但确实存在一些理由，让你脱离 XML 布局设计，转而采用程序化布局：


    -   **你需要布局具有更多动态性。** 例如，你的应用根据用户操作添加、删除或移动布局元素。或者你想创建一个游戏，其中的游戏元素由 `View` 对象表示，这些对象会动态移动、出现和消失。

    -   **你的布局定义在服务器上。** 尤其是在企业环境中，在服务器上定义布局是有意义的——每当应用的布局发生变化时，你无需在所有设备上安装新版本。相反，只需更新一个中央布局引擎即可。

    -   **你定义了一个布局构建器**，它允许以比 XML 更具表现力和更简洁的方式在 Kotlin 中指定布局。例如，考虑：


    ```

    LinearLayout(orientation="vertical") {

    TextView(id="tv1",

    width="match_parent", height="wrap_content")

    Button(id="btn1", text="Go",

    onClick = { btn1Clicked() })

    }

    ```


    这是有效的 Kotlin 语法。


    -   **你需要 XML 中未定义的特殊构造。** 虽然标准做法是尽可能在 XML 中定义，并在代码中完成其余部分，但你可能更倾向于单一技术解决方案，在这种情况下，你必须在代码中完成所有工作。


    > **注：** 使用 Jetpack Compose 是程序化构建布局的一种极好方法。请参阅以下内容以及相关文档以了解如何做到这一点。


    请注意，如果你放弃通过 XML 文件的描述性布局，转而使用程序化布局，则必须手动处理不同的屏幕尺寸、屏幕密度和其他硬件特性。尽管这总是可行的，但在某些情况下，这可能是一个复杂且容易出错的过程。某些特性（如
    UI 元素尺寸）在 XML 中表达起来比在代码中要容易得多。


    ## 手动添加视图


    要从程序化 UI 设计开始，最简单的方法是在 XML 中定义一个单独的容器，并在你的代码中使用它。我这里特意用了“简单”一词，因为布局有其自身的想法来决定如何以及何时放置其子元素，如果你的代码对如何以及何时放置视图有另外的想法，那么你最终可能会遇到时间、布局和裁剪问题的噩梦。`FrameLayout`
    是一个很好的选择，你可以编写一个布局 XML，比如 `/res/layout/activity_main.xml`，以及：


    ```

    class MainActivity : AppCompatActivity() {

    var tv:TextView? = null

    override fun onCreate(savedInstanceState: Bundle?) {

    super.onCreate(savedInstanceState)

    setContentView(R.layout.activity_main)

    // 例如，在特定位置添加一个文本

    tv = TextView(this).apply {

    text = "Dynamic"

    x = 37.0f

    y = 100.0f

    }

    fl.addView(tv)

    }

    }

    ```


    作为一个示例 Activity。例如，要添加一个按钮来移动前面示例中的文本，你可以编写：


    ```

    val WRAP = ViewGroup.LayoutParams(

    ViewGroup.LayoutParams.WRAP_CONTENT,

    ViewGroup.LayoutParams.WRAP_CONTENT)

    fl.addView(

    Button(this).apply {

    text = "Go"

    setOnClickListener { v ->

    v?.run {

    x += 30.0f *

    (-0.5f + Math.random().toFloat())

    y += 30.0f *

    (-0.5f + Math.random().toFloat())

    }

    }

    }, WRAP

    )

    ```


    如果你不需要完全控制，并且希望布局对象按其设计方式执行其子元素定位和调整大小的工作，那么向其他布局类型（如 `LinearLayout`）添加子元素当然也可以在代码内部实现。只需使用
    `addView()` 方法，无需通过 `setX()` 或 `setY()` 显式设置位置。在某些情况下，你必须使用 `layoutObject.invalidate()`
    来触发后续的重新布局。后者必须在 UI 线程内完成，或者放在 `runOnUiThread{ ... }` 内部执行。

