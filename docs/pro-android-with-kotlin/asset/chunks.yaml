  trans: "\n# 内容提供者属性\n\n`icon`  \n用于提供者图标的资源 ID。默认使用父组件的图标。\n\n`initOrder`  \n在此处可为同一应用的内容提供者指定实例化顺序。数值越大，实例化越早。请谨慎使用此属性，因为启动顺序依赖可能表明应用设计存在缺陷。\n\
    \n`label`  \n用于标签的字符串资源 ID。默认使用应用的 `label`。\n\n`multiprocess`  \n若设为 `true`，运行在多个进程中的应用可能会同时运行多个内容提供者实例。否则，最多只会存在一个内容提供者实例。默认值为\
    \ `false`。\n\n`name`  \n`ContentProvider` 实现的完全限定类名。\n\n`permission`  \n用于同时设置\
    \ `readPermission` 和 `writePermission` 的便捷方式（详见下文）。若后两者之一被指定，则优先采用该指定值。\n\n`process`\
    \  \n若希望内容提供者在不同于应用自身的进程中运行，请指定进程名称。若以“:”开头，则该进程为应用私有；若以小写字母开头，将使用全局进程（需具备相应权限）。默认在应用进程中运行。\n\
    \n`readPermission`  \n客户端为读取内容提供者数据所必须具备的权限。未获得该权限的客户端仍可能通过 `grantUriPermissions`\
    \ 属性访问内容。\n\n`syncable`  \n内容提供者的数据是否应与服务器同步。\n\n`writePermission`  \n客户端为写入内容提供者数据所必须具备的权限。未获得该权限的客户端仍可能通过\
    \ `grantUriPermissions` 属性访问内容。\n\n---\n\n若使用 `grantUriPermissions` 临时授予通过隐式 `Intent`\
    \ 调用的其他应用组件 URI 权限，则必须精心构造此类 `Intent`：(1) 添加标志 `Intent.FLAG_GRANT_READ_URI_PERMISSION`；(2)\
    \ 在 `Intent` 的 `data` 字段中添加允许访问的 URI。示例如下：\n\n```\nintent.action = \"com.example.app.VIEW\"\
    \ // 设置 INTENT 动作\nintent.flags = Intent.FLAG_ACTIVITY_NEW_TASK\nintent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION)\
    \ // 授予临时读取权限\nintent.data = Uri.parse(\"content:///\") // 请使用你自己的 URI！\nstartActivity(intent)\n\
    ```\n\n在被调用组件的 Intent 过滤器中，必须指定一个 `<data>` 元素，且该元素必须包含适当的 URI *和* MIME 类型。虽然我们未明确声明，但必须指定\
    \ MIME 类型的原因是：Android 系统在解析 `Intent` 时，会通过内容提供者的 `getType(Uri)` 方法自动添加 MIME 类型。例如：\n\
    \n被调用组件随后获得按指定方式访问该 URI 的权限。完成操作后，应调用 `revokeUriPermission(String, Uri, Int)`\
    \ 撤销已获得的临时权限：\n\n```\nrevokePermission(getPackageName(), uri, Intent.FLAG_GRANT_READ_URI_PERMISSION\
    \ or Intent.FLAG_GRANT_WRITE_URI_PERMISSION)\n```\n\n在 `<provider>` 元素内，可添加若干子元素：\n\
    \n*   **meta-data**\n\n根据指定方式，必须指定“resource”或“value”。使用“resource”时，像 `@string/someString`\
    \ 这样的资源 ID 会将资源 ID 本身赋给元条目；而使用“value”和 `@string/someString` 则会将资源的*内容*赋给元条目。\n\
    \n*   **grant-uri-permission**\n\n授予特定 URI 权限（可使用零到多个此子元素）。仅当父元素的 `grantUriPermissions`\
    \ 属性设为 `false` 时，此子元素才允许访问特定 URI。请使用以下属性之一：“path”用于完整 URI，“pathPrefix”用于以特定值开头的\
    \ URI，“pathPattern”支持通配符——`X*` 表示匹配零到多个任意字符 `X`，`.*` 表示匹配零到多个任意字符。\n\n*   **path-permission**\n\
    \n若要定义内容提供者可提供的部分数据，可使用此元素指定路径和所需权限。“path”属性指定完整路径，“pathPrefix”属性用于匹配路径的起始部分，“pathPattern”是完整路径，但支持通配符：`*`\
    \ 匹配零到多个特定字符，`.*` 匹配零到多个任意字符。`permission` 属性指定读写权限，而 `readPermission` 和 `writePermission`\
    \ 属性则区分读权限和写权限。若后两者之一被指定，则优先于 `permission` 属性。\n\n---\n\n## 设计内容 URI\n\nURI 描述了内容请求者感兴趣的数据域。从\
    \ SQL 的角度看，这相当于表名。然而 URI 的功能不止于此。URI 的官方语法是：\n\n```\nscheme:[//[user[:password]@]host[:port]][/path][?query][#fragment]\n\
    ```\n\n可以看到，“user”“password”和“port”部分是可选的，在 Android 环境中通常不会指定它们。但这并非禁止，在某些情况下也是有意义的。“host”部分被最广泛地解释为提供某种内容的主体，这正是此处对其的解读，其中“某种内容”即数据。为使这一概念更清晰，在\
    \ Android 中“host”部分通常被称为*authority*。例如，在*通讯录*系统应用中，authority 会是 `com.android.contacts`（不要使用字符串，而应使用类常量字段——详见下文的“Contract”部分）。“scheme”按惯例通常为\
    \ `content`。因此通用通讯录 URI 以如下形式开始：\n\n```\ncontent://com.android.contacts\n```\n\
    \nURI 的“path”部分指定数据域，或从 SQL 角度理解为“表”。例如通讯录中的用户个人资料数据通过以下 URI 访问：\n\n```\ncontent://com.android.contacts/profile\n\
    ```\n\n在此示例中路径只有一个元素，但可以更复杂，如 `pathpart1/pathpart2/pathpart3`。URI 还可以包含指定筛选条件的“query”部分。查看\
    \ `android.content.ContentProvider` 类中的查询方法，我们已有在 API 层面指定筛选条件的可能性，但允许在 URI 中包含查询参数也是完全可以接受的（尽管非必需）。若需在查询参数中放入多个元素，可遵循常规惯例使用“&”作为分隔符，例如\
    \ `name=John&age=37`。“fragment”部分指定辅助资源，在内容提供者中不常用。但如果对你有帮助，也可以使用。由于 URI 是一种非常通用的构造，且猜测用于访问某些应用所提供内容的正确\
    \ URI 几乎不可能，因此内容提供者应用通常会提供一个契约类来帮助构建正确的 URI——详见下文“构建内容接口契约”部分。\n\n---\n\n## 构建内容接口契约\n\
    \n客户端访问数据所使用的 URI 代表了对内容的接口。因此，提供一个客户端可查阅以确定使用哪些 URI 的集中式位置是个好主意。Android 文档建议为此目的使用内容契约类。此类契约类的大致轮廓如下：\n"
- fmt: "```kotlin\nclass MyContentContract {\n    companion object {\n        // The\
    \ authority and the base URI\n        @JvmField\n        val AUTHORITY = \"com.xyz.whatitis\"\
    \n        @JvmField\n        val CONTENT_URI = Uri.parse(\"content://\" +\n  \
    \              AUTHORITY)\n        // Selection for ID bases query\n        @JvmField\n\
    \        val SELECTION_ID_BASED = BaseColumns._ID +\n                \" = ? \"\
    \n    }\n    // For various tables (or item types) it is\n    // recommended to\
    \ use inner classes to specify\n    // them. This is just an example\n    class\
    \ Items {\n        companion object {\n            // The name of the item.\n\
    \            @JvmField\n            val NAME = \"item_name\"\n            // The\
    \ content URI for items\n            @JvmField\n            val CONTENT_URI =\
    \ Uri.withAppendedPath(\n                MyContentContract.CONTENT_URI, \"items\"\
    )\n            // The MIME type of a directory of items\n            @JvmField\n\
    \            val CONTENT_TYPE =\n                ContentResolver.CURSOR_DIR_BASE_TYPE\
    \ +\n                        \"/vnd.\" + MyContentContract.AUTHORITY +\n     \
    \                   \".items\"\n            // The mime type of a single item.\n\
    \            @JvmField\n            val CONTENT_ITEM_TYPE =\n                ContentResolver.CURSOR_ITEM_BASE_TYPE\
    \ +\n                        \"/vnd.\" + MyContentContract.AUTHORITY +\n     \
    \                   \".items\"\n            // You could add database column names\
    \ or\n            // projection specifications here, or sort\n            // order\
    \ specifications, and more\n            // ...\n        }\n    }\n}\n```\n\nOf\
    \ course part of your interface design must be using meaningful names for the\
    \ classes, field names, and field values.\n\n**Note**\n\nThe interface described\
    \ in the contract class does *not* have to correspond to actual database tables\
    \ – it is completely feasible and beneficial to conceptually decouple the interface\
    \ from the actual implementation and also provide table joins or other item types\
    \ here derived in any way you might think of.\n\nHere are a couple of notes about\
    \ this construct:\n\n- If you can make sure clients will ever be using only Kotlin\
    \ as a platform, this can be written much shorter without any boilerplate code:\n\
    \n```kotlin\nobject MyContentContract2 {\n    val AUTHORITY = \"com.xyz.whatitis\"\
    \n    val CONTENT_URI = Uri.parse(\"content://\"\n            + AUTHORITY)\n \
    \   val SELECTION_ID_BASED =\n        BaseColumns._ID + \" = ? \"\n    object\
    \ Items {\n        val NAME = \"item_name\"\n        val CONTENT_URI =\n     \
    \       Uri.withAppendedPath(\n                MyContentContract.CONTENT_URI,\
    \ \"items\")\n        val CONTENT_TYPE =\n            ContentResolver.CURSOR_DIR_BASE_TYPE\
    \ +\n                    \"/vnd.\" + MyContentContract.AUTHORITY +\n         \
    \           \".items\"\n        val CONTENT_ITEM_TYPE =\n            ContentResolver.CURSOR_ITEM_BASE_TYPE\
    \ +\n                    \"/vnd.\" + MyContentContract.AUTHORITY +\n         \
    \           \".items\"\n    }\n}\n```\n\nHowever, if we want Java clients to use\
    \ the interface as well, we have to use all that `companion object` and `@JvmObject`\
    \ declarations and modifiers.\n\n- Using companion objects and `JvmObject` annotations\
    \ allows for writing `TheClass.THE_FIELD` as for static fields in Java.\n\n- You\
    \ might consider providing an equivalent Java construct to your clients, so they\
    \ don’t have to learn the Kotlin syntax if they use only Java.\n\n- The `Uri.parse()`\
    \ and `Uri.withAppendedPath()` method calls are just two examples of using the\
    \ `Uri` class. The class contains a couple of more methods that help manage constructing\
    \ correct URIs.\n\n- You can also provide helper methods inside the contract class.\
    \ If you do so, make sure the interface class does not depend on other classes,\
    \ and add a modifier `JvmStatic` to the `fun` function declaration to make it\
    \ callable from Java.\n\nYou would then provide this contract class, or classes\
    \ if you want to document the interface using both Kotlin and Java, publicly to\
    \ any possible clients that are supposed to use your content provider app.\n\n\
    ## A Cursor Class Basing on `AbstractCursor` and Co.\n\nAll of the `query*()`\
    \ methods from `ContentProvider` return an `android.database.Cursor` object. From\
    \ the package you can see that this is a database-centric class, and this is actually\
    \ a small design flaw of Android, since the content interface better had been\
    \ access methodology agnostic.\n\nApart from that the `Cursor` interface is a\
    \ random-access interface for clients wishing to scan through result sets. You\
    \ can use the base implementation `android.database.AbstractCursor` for your cursor\
    \ class – it already implements a couple of the interface methods. To do so write\
    \ `class MyCursor : AbstractCursor { ... }` or `val myCursor = object : AbstractCursor\
    \ { ... }` and implement all abstract methods and overwrite some of the other\
    \ methods for the class to do meaningful things:\n\n- **`override fun getCount():\
    \ Int`**\n\n  The number of data sets available.\n\n- **`override fun getColumnNames():\
    \ Array<String>`**\n\n  The ordered array of column names.\n\n- **`override fun\
    \ getInt(column: Int): Int`**\n\n  Get a long value (the column index is zero\
    \ based).\n\n- **`override fun getLong(column: Int): Long`**\n\n  Get a long value\
    \ (the column index is zero based).\n\n- **`override fun getShort(column: Int):\
    \ Short`**\n\n  Get a short value (the column index is zero based).\n\n- **`override\
    \ fun getFloat(column: Int): Float`**\n\n  Get a float value (the column index\
    \ is zero based).\n\n- **`override fun getDouble(column: Int): Double`**\n\n \
    \ Get a double value (the column index is zero based).\n\n- **`override fun getString(column:\
    \ Int): String`**\n\n  Get a string value (the column index is zero based).\n\n\
    - **`override fun isNull(column: Int): Boolean`**\n\n  Tells whether the value\
    \ is `null` (the column index is zero based).\n\n- **`override fun getType(column:\
    \ Int): Int`**\n\n  You don’t have to overwrite this, but if you don’t it will\
    \ always return `Cursor.FIELD_TYPE_STRING`, assuming that `getString()` will always\
    \ return something meaningful. For more fine-grained control, let it return one\
    \ of `FIELD_TYPE_NULL`, `FIELD_TYPE_INTEGER`, `FIELD_TYPE_FLOAT`, `FIELD_TYPE_STRING`,\
    \ and `FIELD_TYPE_BLOB`. The column index is zero based.\n\n- **`override fun\
    \ getBlob(column: Int): ByteArray`**\n\n  Overwrite this, if you want to support\
    \ blobs. Otherwise, an `UnsupportedOperationException` will be thrown.\n\n- **`override\
    \ fun onMove(oldPosition: Int, newPosition: Int): Boolean`**\n\n  Although not\
    \ marked `abstract`, you `must` overwrite this. Your implementation must move\
    \ the cursor to the corresponding position in the result set. Possible values\
    \ range from `-1` (before the first pos, not a valid position) to `count` (after\
    \ the last pos, not a valid position). Let it return `true` if the move was successful.\
    \ If you don’t overwrite it, nothing will happen, and the function returns always\
    \ `true`.\n\nThe `AbstractCursor` also provides a method `fillWindow(position:\
    \ Int, window: CursorWindow?): Unit`, which you can use to fill an `android.database.CursorWindow`\
    \ object based on the result set from the query. See the online API documentation\
    \ of `CursorWindow` to proceed with this approach.\n\nBesides `AbstractCursor`,\
    \ the `Cursor` interface has a couple of more (abstract) implementations you can\
    \ use. We briefly summarize them in Table 6-2.\n\n**Table 6-2** More Cursor Implementations\n\
    \n| Name Inside `android.database` | Description |\n|---|---|\n| `AbstractWindowedCursor`\
    \ | Inherits from `AbstractCursor` and owns a `CursorWindow` object holding the\
    \ data. Subclasses are responsible for filling the cursor window with data during\
    \ their `onMove(Int, Int)` operation, allocating a new cursor window if necessary.\
    \ Easier to implement compared with `AbstractCursor`, but you have to add a lot\
    \ of functionality to `onMove()`. |\n| `CrossProcessCursor` | A cursor implementation\
    \ that allows using it from remote processes. It is just an extension of the `android.database.Cursor`\
    \ interface, containing three more methods: `fillWindow(Int, CursorWindow)`, `getWindow():\
    \ CursorWindow`, and `onMove(Int, Int): Boolean`. It does not provide its own\
    \ implementation; you have to overwrite all the methods defined in `Cursor`. |"
