    \ object {\n        val MY_DATA_CHECK_CODE = 42\n    }\n    var tts: TextToSpeech?\
    \ = null\n    override\n    fun onCreate(savedInstanceState: Bundle?) {\n    \
    \    super.onCreate(savedInstanceState)\n        setContentView(R.layout.activity_main)\n\
    \        val checkIntent = Intent()\n        checkIntent.action = TextToSpeech.Engine.ACTION_CHECK_TTS_DATA\n\
    \        startActivityForResult(checkIntent, MY_DATA_CHECK_CODE)\n    }\n    fun\
    \ go(view: View) {\n        tts?.run {\n            language = Locale.US\n   \
    \         val myText1 = \"Did you sleep well?\"\n            val myText2 = \"\
    It's time to wake up.\"\n            speak(myText1, TextToSpeech.QUEUE_FLUSH,\
    \ null)\n            speak(myText2, TextToSpeech.QUEUE_ADD, null)\n        }\n\
    \    }\n    override\n    fun onActivityResult(requestCode: Int, resultCode: Int,\
    \ data: Intent) {\n        if (requestCode == MY_DATA_CHECK_CODE) {\n        \
    \    if (resultCode == TextToSpeech.Engine.CHECK_VOICE_DATA_PASS) {\n        \
    \        // success, create the TTS instance\n                tts = TextToSpeech(this,\
    \ { status ->\n                    // do s.th. if you like\n                })\n\
    \            } else {\n                // data are missing, install it\n     \
    \           val installIntent = Intent()\n                installIntent.action\
    \ = TextToSpeech.Engine.ACTION_INSTALL_TTS_DATA\n                startActivity(installIntent)\n\
    \            }\n        }\n    }\n}\n```\n\nThis example also contains a `go()`\
    \ method, which, for example, could be triggered by a button press. It will produce\
    \ some speech and send it immediately to the loudspeakers. If instead you want\
