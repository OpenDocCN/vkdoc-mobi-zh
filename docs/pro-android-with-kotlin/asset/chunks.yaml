    \nYou can stop the playback, either while it is running or while it is\n    paused,\
    \ by invoking `stop()`. Once stopped,\n    it is not allowed to start again, unless\
    \ the preparation step got\n    repeated first.\n\n*   **Completed**\n\nOnce the\
