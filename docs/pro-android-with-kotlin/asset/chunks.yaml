    \ that receives the reply must know they refer to each other.\n- As usual make\
    \ sure that in production code you use string resources and appropriate texts.\n\
    \nWhen the notification shows up, it will contain a \"Reply\" button, and when\
    \ the user presses it, the system will inquire some reply text, which is then\
    \ going to be sent to the intent receiver (`messageReplyIntent` in the example).\n\
    \nThe intent receiver for the reply text might then have a receive callback, which\
    \ looks like:\n\n```kotlin\noverride fun onReceive(context: Context, intent: Intent)\
    \ {\n    Log.e(\"LOG\", intent.toString())\n    val KEY_TEXT_REPLY = \"key_text_reply\"\
    \n    val remoteInput = RemoteInput.getResultsFromIntent(intent)\n    val txt\
    \ = remoteInput?.getCharSequence(KEY_TEXT_REPLY)?:\"undefined\"\n    val conversationId\
    \ = intent.getIntExtra(\"conversationId\",0)\n    Log.e(\"LOG\",\"reply text =\
    \ \" + txt)\n    // Do s.th. with the reply...\n    // Build a new notification,\
    \ which informs the user that the system handled their interaction with the previous\
    \ notification.\n    val NOTIFICATION_CHANNEL_ID = \"1\"\n    val repliedNotification\
    \ = NotificationCompat.Builder(context, NOTIFICATION_CHANNEL_ID)\n        .setSmallIcon(android.R.drawable.ic_media_play)\n\
    \        .setContentText(\"Replied\")\n        .build()\n    buildChannel(NOTIFICATION_CHANNEL_ID)\n\
    \    // Issue the new notification.\n    val notificationManager = NotificationManagerCompat.from(context)\n\
    \    notificationManager.notify(conversationId, repliedNotification)\n}\n```\n\
    \nThis method:\n\n- Fetches the reply text by using `RemoteInput.getResultsFromIntent()`\
    \ using the same key as used for the reply input\n- Fetches the conversation ID\
    \ we added as an extra value to the Intent\n- Does whatever is appropriate to\
    \ handle the reply\n- Issues a reply to the reply by setting another notification\n\
    \n## Notification Progress Bar\n\nTo add a progress bar to the notification, add\
    \ to the builder:\n\n```kotlin\n.setProgress(PROGRESS_MAX, PROGRESS_CURRENT, false)\n\
    ```\n\nwith `PROGRESS_MAX` the maximum integer value and `PROGRESS_CURRENT` 0\
    \ at the beginning. Or, if you want an indeterminate progress bar, you instead\
    \ use:\n\n```kotlin\n.setProgress(0, 0, true)\n```\n\nIn a background thread that\
    \ does the work, you then update a determinate progress bar by periodically executing:\n\
    \n```kotlin\nbuilder.setProgress(PROGRESS_MAX, currentProgress, false)\nnotificationManager.notify(NOTIFICATION_ID,\
    \ builder.build())\n```\n\nwith new `currentProgress` values.\n\nTo finish a determinate\
    \ or an indeterminate progress bar, you can write:\n\n```kotlin\nbuilder.setContentText(\"\
    Download complete\")\n    .setProgress(0,0,false)\nnotificationManager.notify(NOTIFICATION_ID,\
    \ builder.build())\n```\n\n## Expandable Notifications\n\nNotifications cannot\
    \ only contain short messages. Using the expandable features, it is also possible\
    \ to show larger amounts of information to the user. For details on how to do\
    \ that, please consult the online documentation: enter, for example, \"Android\
    \ create expandable notification\" in your favorite search engine to find the\
    \ corresponding pages.\n\n## Rectifying Activity Navigation\n\nTo improve the\
    \ user experience, an activity that was started from inside a notification can\
    \ have its expected task behavior added. For example, if pressing the back button,\
    \ the activity down in the stack gets called. For this to work, you must define\
    \ an activity hierarchy inside `AndroidManifest.xml`, for example, as follows:\n\
    \n```xml\n...\n```\n\nYou can then use a `TaskStackBuilder` to inflate a task\
    \ stack for the Intent called:\n\n```kotlin\n// Create an Intent for the Activity\
    \ you want to start\nval resultIntent = Intent(this, ResultActivity::class.java)\n\
    // Create the TaskStackBuilder\nval stackBuilder = TaskStackBuilder.create(this)\n\
    stackBuilder.addNextIntentWithParentStack(resultIntent)\n// Get the PendingIntent\
    \ containing the back stack\nval resultPendingIntent = stackBuilder.getPendingIntent(0,\
    \ PendingIntent.FLAG_UPDATE_CURRENT)\n// -> this can go to .setContentIntent()\
    \ inside the builder\n```\n\nFor more details about activities and task management,\
    \ please see section \"Activities and Tasks\" of Chapter [3](#463716_2_En_3_Chapter.xhtml).\n\
    \n## Grouping Notifications\n\nBeginning with API level 24 (Android 7.0), notifications\
    \ can be grouped to improve the representation of several notifications that by\
    \ one or the other way are related. To create such a group, all you have to do\
    \ is add:\n\n```kotlin\n.setGroup(GROUP_KEY)\n```\n\nto the builder chain, with\
    \ the `GROUP_KEY` being a string of your choice. If you need a custom sorting\
    \ – the default is to sort by incoming date – you can use the method `setSortKey()`\
    \ from the builder. Sorting then happens lexicographically given that key. A grouping\
    \ inside the notification drawer might look like that shown in Figure [8-4](#463716_2_En_8_Chapter.xhtml#Fig4).\n\
    \n![A screenshot of a notification bar of an android smartphone. It has notification\
    \ grouping.](images/463716_2_En_8_Chapter/463716_2_En_8_Fig4_HTML.jpg)\n\n**Figure\
    \ 8-4** Notification Group\n\nFor API levels below 24 where some kind of Android-managed\
    \ auto-summary for groups is not available, you can add a notification summary.\
    \ To do so, just create a notification like any other notification, but additionally\
    \ call `.setGroupSummary(true)` inside the builder chain. Make sure all the notifications\
    \ from the group *and* the summary use the same `setGroup(GROUP_KEY)`.\n\n> **Caution**\n\
    >\n> It seems like due to a bug at least in API level 27 you *must* add a summary\
    \ notification for the grouping to be enabled at all. So the advice is, no matter\
    \ what API level you are targeting, to add a notification summary anyways.\n\n\
    For the summary you maybe want to tailor the display style for displaying an appropriate\
    \ number of summary items. For this aim you can use a construct like:\n\n```kotlin\n\
    .setStyle(NotificationCompat.InboxStyle()\n    .addLine(\"MasterOfTheUniverse\
    \   Go play PacMan\")\n    .addLine(\"Silvia Cheng          Party tonite\")\n\
    \    .setBigContentTitle(\"2 new messages\")\n    .setSummaryText(\"xyz@example.com\"\
    ))\n```\n\ninside the builder chain.\n\n## Notification Channels\n\nStarting with\
    \ Android 8.0 or API level 26, another way of grouping notifications by *notification\
    \ channels* has been introduced. The idea behind that is to give the device user\
    \ more control over how notifications get categorized and prioritized by the system\
    \ and the way notifications get presented to the user.\n\nTo create a notification\
    \ channel, you write:"
