    \ `tts.synthesizeToFile()` 方法。更多细节将在 `TextToSpeech` 的在线文档中提供。\n\n## 10. Firebase\n\
    \nFirebase 是谷歌云及（离岸）开发平台的名称。在本章中，我们将讨论云数据存储和基于云的消息传递。\n\n> **注意**\n>\n> Firebase\
    \ 的功能远不止消息传递和数据存储——请查阅在线文档（例如，[`https://firebase.google.com/products-build`](https://firebase.google.com/products-build)）、Firebase\
    \ 控制台中的信息以及 Android Studio 提供的信息，来了解还可以做什么。\n\n### Firebase 云存储\n\n你可以使用云存储 API\
    \ 将文件保存到 Google Cloud Storage 并从中读取文件。你需要拥有一个已激活 Firebase 的 Google 账户，并通过 [`https://console.firebase.google.com`](https://console.firebase.google.com)\
    \ 设置一个 Firebase 项目。\n\n> **注意**\n>\n> “文件”这个概念的含义非常广泛——它可以是来自设备内存的一系列字节、一个字节流，或者来自设备存储的一个实际文件。\n\
    \n本书中逐字复制应用设置和存储配置文档的价值不大。相反，只需遵循 [`https://firebase.google.com/docs/storage`](https://firebase.google.com/docs/storage)\
    \ 上给出的详细说明，尤其是其中的 [`https://firebase.google.com/docs/storage/android/start`](https://firebase.google.com/docs/storage/android/start)。\n\
    \n### Firebase 云消息传递\n\nFirebase 云消息传递 (FCM) 是一个基于云的消息代理，你可以使用它向各种设备（包括其他操作系统，如\
    \ Apple iOS）发送和接收消息。其思路如下：你在 Firebase 控制台中注册一个应用，此后便可以在连接的设备中接收和发送消息，包括在其他设备上你的应用的其他安装实例。\n\
    \n> **注意**\n>\n> Firebase 云消息传递 (FCM) 是 *Google Cloud Messaging* (GCM) 的后续版本。\n\
    \n要从 Android Studio 内部启动 FCM，请在你打开的项目中，转到 **Tools ➤ Firebase**。选择 **Cloud Messaging**，然后选择\
    \ **Set up Firebase Cloud Messaging**。如果按照那里的说明进行操作，你将最终使用两项服务：\n\n*   一个 `FirebaseInstanceIdService`\
    \ 的子类，你将在其中接收消息令牌。该类大致如下所示：\n\n```kotlin\nclass MyFirebaseInstanceIdService :\
    \ FirebaseInstanceIdService() {\n    override\n    fun onTokenRefresh() {\n  \
    \      // 获取更新的 InstanceID 令牌。\n        val refreshedToken = FirebaseInstanceId.getInstance().token\n\
    \        Log.d(TAG, \"Refreshed token: \" + refreshedToken!!)\n        // 如果你想向此应用实例发送消息\n\
    \        // 或在服务器端管理此应用的订阅，\n        // 请将 Instance ID 令牌发送到你的应用服务器。\n       \
    \ sendRegistrationToServer(refreshedToken)\n    }\n}\n```\n\n并且它在 `AndroidManifest.xml`\
    \ 中有一个相应的条目：\n\n你首次启动连接到 Firebase 的应用时在此处收到的令牌非常重要——你需要它来使用基于 Firebase 的通信渠道。并且该令牌会不定期地自动更新，因此你需要找到一种方法，以便在此服务中收到令牌时可靠地存储它。为了方便起见：除非你实现了存储令牌的方法，否则一定要保存你在日志中收到的令牌，因为恢复丢失的令牌会导致烦人的管理工作。\n\
    \n*   另一个用于接收基于 FCM 消息的服务。它可能如下所示：\n\n```kotlin\nclass MyFirebaseMessagingService\
    \ : FirebaseMessagingService() {\n    override\n    fun onMessageReceived(remoteMessage:\
    \ RemoteMessage) {\n        // ...\n        // 检查消息是否包含数据负载。\n        if (remoteMessage.data.size\
    \ > 0) {\n            Log.d(TAG, \"Message data payload: \" + remoteMessage.data)\n\
    \            // 实现一个逻辑：\n            // 对于长时间运行的任务（10 秒或更长）\n            // 使用\
    \ Firebase Job Dispatcher。\n            scheduleJob()\n            // ...否则在 10\
    \ 秒内处理消息\n            // handleNow()\n        }\n        // 消息包含通知负载？\n      \
    \  remoteMessage.notification?.run {\n            Log.d(TAG, \"Message Notification\
    \ Body: \" + body)\n        }\n    }\n    private fun handleNow() {\n        Log.e(\"\
    LOG\",\"handleNow()\")\n    }\n    private fun scheduleJob() {\n        Log.e(\"\
    LOG\",\"scheduleJob()\")\n    }\n}\n```\n\n这同样在 `AndroidManifest.xml` 中有一个相应的条目：\n\
    \n为了使这一切正常工作，你需要在你的 Google 账户中激活 Firebase。有几种选择。对于高流量的消息传递服务，你需要购买一个套餐。不过，免费版本（截至\
    \ 2018 年 3 月）将为你提供远超开发和测试所需的强大功能。如果一切设置正确，你可以使用基于 Web 的 Firebase 控制台测试向正在运行的应用发送消息，并查看消息到达日志中。对于发送消息，建议的解决方案是以应用服务器的形式设置一个可信环境。这超出了本书的范围，但\
    \ Firebase 在线文档为你提供了各种入门指导。\n\n## 11. 开发\n\n与前几章相比，本章涉及更贴近开发事项的问题。我们在此讨论的主题与特定\
    \ Android OS API 的耦合度较低——我们更关心的是如何利用 Kotlin 方法最佳地实现技术需求。本章末尾附有一节内容，介绍如何将 Kotlin\
    \ 代码转录为可为 `WebView` 控件提供服务的 JavaScript 代码。\n"
- fmt: "# Writing Reusable Libraries in Kotlin\n\nMost tutorials you will find on\
    \ the Web are about activities, services, broadcast receivers, and content providers.\
    \ These components are reusable in the sense that you can more or less easily\
    \ extract them from a project and copy them to another project. The encapsulation\
    \ in the Android OS has reached a quite elaborate stage, which makes this reusing\
    \ possible. On a lower level, however, in quite some cases, the libraries or APIs\
    \ that are provided inside Android maybe do not suit all your needs, so you might\
    \ be tempted to develop such libraries yourself and then *copy* the sources from\
    \ project to project wherever feasible.\n\nSurely, such a copying on the source\
    \ code level does not fit well into modern methodologies for reusable libraries.\
    \ Just think about maintenance and versioning issues, which introduce a lot of\
    \ boilerplate efforts. The best is you design such reusable libraries as dedicated\
    \ development artifacts that then can be easily reused from different projects.\n\
    \nIn the following sections, we develop a rudimentary *Regular Expression* library,\
    \ serving as a conceptual basis for your own library projects.\n\n## Starting\
    \ a Library Module\n\nLibrary projects come as projects containing one or more\
    \ modules. With Android Studio open, create a new project. Then, inside the new\
    \ project, go to *New ➤ New Module* and choose *Android Library*.\n\n> **Note**\
    \  \n> An Android library is more than just a collection of classes. It may also\
    \ contain resources and configuration files. For our purposes we just look at\
    \ the classes – from a development perspective, these additional possibilities\
    \ don’t hurt, and you just can ignore them. For your projects using the Android\
    \ library type however gives you many more possibilities for future extensions,\
    \ compared with using just JAR files.\n\n## Creating the Library\n\nInside the\
    \ library module, create a new Kotlin class, and inside write:\n\n```\npackage\
    \ com.example.regularexpressionlib\ninfix operator fun String.div(re:String) :\n\
    Array =\nRegex(re).findAll(this).toList().toTypedArray()\ninfix operator fun String.rem(re:String)\
    \ :\nMatchResult? =\nRegex(re).findAll(this).toList().firstOrNull()\noperator\
    \ fun MatchResult.get(i:Int) =\nthis.groupValues[i]\nfun String.onMatch(re:String,\
    \ func: (String)-> Unit)\n: Boolean =\nthis.matches(Regex(re)).also { if(it) func(this)\
    \ }\n```\n\nWhat these four operators and functions do is not less than allowing\
    \ us to write `searchString / regExpString` to search for regular expression matches\
    \ and `searchString % regExpString` to search for the first match. Besides, we\
    \ can use `searchString.onMatch()` to have some block execute only if there is\
    \ a match.\n\nThis listing is different from all the listings we have seen so\
    \ far in this book. First of all you can see that we don’t have any class here.\
    \ This is possible, because Kotlin knows the concept of a file artifact – behind\
    \ the scenes it generates a hidden class based on the package name. Any client\
    \ of the library that imports it via `import com.example.regularexpressionlib.*`\
    \ can act as if it performed a static import of all these functions in Java.\n\
    \nThe `infix operator fun String.div( re:String )` defines a division operator\
    \ for strings. Such a division is not possible in the standard, so there is no\
    \ clash with Kotlin built-in operators. It uses the `Regex` class from the Kotlin\
    \ libraries to find all occurrences of a regular expression in a search string\
    \ and converts it to an array, so we can later use the `[]` operator to access\
    \ the results by index. The `infix operator fun String.rem( re:String )` does\
    \ almost the same, but it defines the `%` operator for strings, performs a regular\
    \ expression search, and takes only the first result or returns `null` if no result\
    \ exists.\n\nThe `operator fun MatchResult.get(i:Int) = ...` is an extension of\
    \ the `MatchResult` returned by the preceding operators. It allows for accessing\
    \ the groups of a match by index. Say you searched for “(el)” inside “Hello Nelo”,\
    \ you could write `(\"Hello Nelo\" / \"(e.)\") [0][1]` to get the first group\
    \ of the first match, in this case the “el” from “Hello”.\n\n## Testing the Library\n\
    \nWe need a way to test the library while developing it. Unfortunately, Android\
    \ Studio version 3.0 does not allow for something like a `main()` function it\
    \ could start. The only thing we can do is to create a *unit test*, and for our\
    \ case such a unit test could read:\n\n```\nimport org.junit.Assert.*\nimport\
    \ org.junit.Test\n...\nclass RegularExpressionTest {\n@Test\nfun proof_of_concept()\
    \ {\nassertEquals(1, (\"Hello Nelo\" / \".*el.*\").size)\nassertEquals(2, (\"\
    Hello Nelo\" / \".*?el.*?\").size)\nvar s1:String = \"\"\n(\"Hello Nelo\" / \"\
    e[lX]\").forEach {\ns1 += it.groupValues\n}\nassertEquals(\"[el][el]\", s1)\n\
    var s2: String = \"\"\n(\"Hello Nelo\" / \".*el.*\").firstOrNull()?.run {\ns2\
    \ += this[0]\n}\nassertEquals(\"Hello Nelo\", s2)\nassertEquals(\"el\",\n(\"Hello\
    \ Nelo\" % \".*(el).*\")?.let{ it[1] } )\nassertEquals(\"el\",\n(\"Hello Nelo\"\
    \ / \".*(el).*\")[0][1])\nvar match1: Boolean = false\n\"Hello\".onMatch(\".*el.*\"\
    ) {\nmatch1 = true\n}\nassertTrue(match1)\n}\n}\n```\n\nYou can then run this\
    \ test like any other unit test using Android Studio’s context menu. Note that\
    \ at early stages of the development, you can add `println()` statements to the\
    \ test in order to print some information on the test console while the test runs.\n\
    \n## Using the Library\n\nOnce you invoke *Build ➤ Rebuild Project*, you can find\
    \ the Android library inside the:\n\n```\nbuild/outputs/aar\n```\n\nfolder of\
    \ the module. To use it from clients, create a new module in the client project\
    \ via *New ➤ New Module*, choose “Import .JAR/.AAR Package,” and navigate to the\
    \ `.aar` file generated by the library project.\n\n> **Caution**  \n> This procedure\
    \ copies the `.aar` file. If you have a new version of the library, you can either\
    \ remove the library project inside the client project (!) and import it again\
    \ or copy the `.aar` file manually from the library project to the client project.\n\
    \nTo use the library in the client, you just add `import com.example.regularexpressionlib.*`\
    \ to the header, and henceforth you can apply the new matching constructs as shown\
    \ in the preceding test."
