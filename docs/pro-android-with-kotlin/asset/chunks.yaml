  trans: "\n# 单元测试\n\n单元测试以类为测试目标，检验应用中低层功能层面的内容。这里所说的\"功能性\"，是指单元测试通常以确定性的、直接的方式，检查方法调用的输入与输出之间的确定性关系，可能包含（但不一定包含）类实例的状态变量。\n\
    \n## 标准单元测试\n\n在 Android 环境中，标准单元测试不依赖设备硬件或任何 Android 框架类，因此在开发机上执行。这类测试通常适用于库，而不太适合与\
    \ GUI 相关的功能。这也是为何此类单元测试对大多数 Android 应用的适用性有一定限制。\n\n然而，如果你的应用类中包含方法调用，且你能根据不同的输入集预判调用结果，那么使用标准单元测试就很有意义。为应用添加单元测试十分简便。实际上，如果你使用\
    \ Android Studio 创建新项目，所有配置都已为你准备就绪，甚至会给你一个示例测试类。参见图 15-1。\n\n![](img/463716_2_En_15_Fig1_HTML.jpg)\n\
    \n测试设置对应的文件夹和应用列表。其中 **Example UnitTest** 已高亮显示。\n\n**图 15-1** 初始单元测试设置\n\n因此，你可以立即以该测试类为示例开始编写单元测试——只需在源代码的\
    \ *test* 目录下添加更多测试类即可。\n\n> **注意**  \n> 虽然并非技术上的硬性要求，但常见的约定是：测试类使用与被测类相同的名称，并附加\
    \ \"Test\" 后缀。因此，`com.example.myapp.TheClass` 的测试类应命名为 `com.example.myapp.TheClassTest`。\n\
    \n要在 Android Studio 中运行单元测试，右键点击 *test* 目录，选择\"在…中运行测试\"或\"在…中调试测试\"。\n\n## 使用桩版\
    \ Android 框架的单元测试\n\n默认情况下，用于执行单元测试的 Gradle 插件包含一个桩版 Android 框架，当任何 Android 类被调用时会抛出异常。\n\
    \n你可以通过在应用的 `build.gradle` 文件中添加以下内容来改变此行为：\n\n```\nandroid {\n  ...\n  testOptions\
    \ {\n    unitTests.returnDefaultValues = true\n  }\n}\n```\n\n此后，任何对 Android 类方法的调用都不会执行任何操作，并根据需求返回\
    \ `null`。\n\n## 使用模拟 Android 框架的单元测试\n\n如果你需要在单元测试中访问 Android 类，并期望它们执行实际功能，那么使用社区支持的\
    \ *Robolectric* 框架作为单元测试实现是一个可行的选择。借助 Robolectric，你可以模拟按钮点击、文本读写以及大量其他 GUI 相关操作。尽管如此，这一切仍在你的开发机上运行，从而显著加速测试。\n\
    \n要让你的项目使用 Robolectric，请在应用的 `build.gradle` 文件中添加：\n\n```\nandroid {\n  testOptions\
    \ {\n    unitTests {\n      includeAndroidResources = true\n    }\n  }\n}\ndependencies\
    \ {\n  ...\n  //testImplementation 'junit:junit:4.12'\n  testImplementation \"\
    org.robolectric:robolectric:4.8.1\"\n}\n```\n\n例如，一个模拟点击 `Button` 并检查点击操作是否更新了\
    \ `TextView` 的测试类如下所示：\n\n```\npackage com.example.robolectric\nimport org.junit.runner.RunWith\n\
    import org.robolectric.RobolectricTestRunner\nimport org.robolectric.shadows.ShadowApplication\n\
    import android.content.Intent\nimport android.widget.Button\nimport android.widget.TextView\n\
    import org.junit.Test\nimport org.robolectric.Robolectric\nimport org.junit.Assert.*\n\
    @RunWith(RobolectricTestRunner::class)\nclass MainActivityTest {\n  @Test\n  fun\
    \ clickingGo_shouldWriteToTextView() {\n    val activity = Robolectric.setupActivity(\n\
    \        MainActivity::class.java!!)\n    activity.findViewById(R.id.go).\n  \
    \      performClick()\n    assertEquals(\"Clicked\",\n        activity.findViewById(\n\
    \            R.id.tv).text)\n  }\n}\n```\n\n你可以像运行任何普通单元测试一样启动此测试：右键点击 *test*\
    \ 目录，选择\"在…中运行测试\"或\"在…中调试测试\"。更多测试选项和详细信息，请参见 Robolectric 主页：[`www.robolectric.org`](http://www.robolectric.org)。\n\
    \n## 使用 Mocking 的单元测试\n\nMocking（模拟）是指让测试钩入 Android OS 函数的调用，并通过模仿其功能来模拟执行。如果你想在单元测试中引入\
    \ Mocking，Android 开发者文档建议使用 *Mockito* 测试库。我建议更进一步，使用基于 Mockito 的 *PowerMock*，它增加了对静态或\
    \ final 类的模拟等更强大的功能。\n\n要启用 PowerMock，请在应用的 `build.gradle` 文件中添加：\n\n```\nandroid\
    \ {\n  ...\n  testOptions {\n    unitTests.returnDefaultValues = true\n  }\n}\n\
    dependencies {\n  ...\n  def powermock_version = \"2.0.2\"\n  testImplementation\
    \ (\"org.powermock:\n      powermock-module-junit4:${powermock_version}\")\n \
    \ testImplementation (\"org.powermock:\n      powermock-api-mockito2:${powermock_version}\"\
    )\n  testImplementation 'junit:junit:4.13.2'\n}\n```\n\n（删除 \"powermock:\" 后的换行符。）\n\
    \n`unitTests.returnDefaultValues = true` 条目负责处理桩版 Android 实现，以确保单元测试不会抛出异常，以防万一。\n\
    \n作为一个非平凡的例子，我展示一个向数据库写入条目的 Activity。我们将模拟实际的数据库实现，但仍需确保必要的表被创建且 `insert` 语句被执行。使用\
    \ Android Studio 中的相应向导创建一个 Jetpack Compose Activity。\n\n现在，向该 Activity 添加以下方法：\n\
    \n```\nfun count() {\n  val db = openOrCreateDatabase(\"MyDb\",\n      MODE_PRIVATE,\
    \ null)\n  with(db) {\n    val resultSet = rawQuery(\n        \"Select * from\
    \ MyItems\", null)\n    val cnt = resultSet.count\n    Toast.makeText(this@MainActivity,\n\
    \        \"Count: ${cnt}\", Toast.LENGTH_LONG).\n        show()\n  }\n  db.close()\n\
    }\nfun saveInDb(item:String) {\n  val tm = System.currentTimeMillis() / 1000\n\
    \  val db = openOrCreateDatabase(\"MyDb\",\n      MODE_PRIVATE, null)\n  with(db)\
    \ {\n    execSQL(\"CREATE TABLE IF NOT EXISTS \" +\n        \"MyItems(Item VARCHAR,timestamp\
    \ INT);\")\n    execSQL(\"INSERT INTO MyItems VALUES(?,?);\",\n        arrayOf(item,\
    \ tm))\n  }\n  db.close()\n}\n```\n\n对于测试本身，在源代码的 *test* 目录下创建一个类 `MainActivityTest`。其内容如下：\n"
- fmt: "```kotlin\npackage book.andrkotlpro.mocktest\nimport android.database.sqlite.SQLiteDatabase\n\
    import androidx.activity.ComponentActivity\nimport org.junit.Test\nimport org.junit.runner.RunWith\n\
    import org.mockito.ArgumentMatchers\nimport org.mockito.BDDMockito.*\nimport org.powermock.api.mockito.PowerMockito\n\
    import org.powermock.core.classloader.annotations.PrepareForTest\nimport org.powermock.modules.junit4.PowerMockRunner\n\
    import org.powermock.reflect.Whitebox\nimport java.lang.reflect.Constructor\n\
    import java.lang.reflect.Method\n@RunWith(PowerMockRunner::class)\n@PrepareForTest(MainActivity::class)\n\
    class MainActivityTest {\n    @Test\n    fun table_created() {\n        val componentActivityConstructors:\
    \ Array<Constructor<*>> =\n            PowerMockito.constructors(\n          \
    \      ComponentActivity::class.java.getConstructor()\n            )\n       \
    \ PowerMockito.suppress(componentActivityConstructors)\n        val activity =\
    \ MainActivity()\n        val activitySpy = spy(activity)\n        val db = mock(SQLiteDatabase::class.java)\n\
    \        // given\n        given(activitySpy.openOrCreateDatabase(anyString(),\
    \ anyInt(), any())).willReturn(db)\n        // when\n        Whitebox.invokeMethod(activitySpy,\
    \ \"saveInDb\", \"hello\")\n        // then\n        verify(db).execSQL(ArgumentMatchers.argThat\
    \ { arg ->\n            arg.toString().matches(Regex(\"(?i)create table.*\\\\\
    bMyItems\\\\b.*\"))\n        })\n    }\n    @Test\n    fun item_inserted() {\n\
    \        val componentActivityConstructors: Array<Constructor<*>> =\n        \
    \    PowerMockito.constructors(\n                ComponentActivity::class.java.getConstructor()\n\
    \            )\n        PowerMockito.suppress(componentActivityConstructors)\n\
    \        val activity = MainActivity()\n        val activitySpy = spy(activity)\n\
    \        val db = mock(SQLiteDatabase::class.java)\n        // given\n       \
    \ given(activitySpy.openOrCreateDatabase(anyString(), anyInt(), any())).willReturn(db)\n\
    \        // when\n        Whitebox.invokeMethod(activitySpy, \"saveInDb\", \"\
    hello\")\n        // then\n        verify(db).execSQL(\n            ArgumentMatchers.argThat\
    \ { arg ->\n                arg.toString().matches(Regex(\"(?i)insert into MyItems\\\
    \\b.*\"))\n            },\n            ArgumentMatchers.argThat { arg ->\n   \
    \             val arr = arg as Array<*>\n                arr[0] == \"hello\" &&\
    \ arr[1] is Number\n            }\n        )\n    }\n}\n```\n\n`@RunWith(PowerMockRunner::class)`\
    \ will make sure PowerMock gets used as a unit test runner, and `@PrepareForTest(MainActivity::class)`\
    \ prepares the `MainActivity` class, so it can be mocked even though it is marked\
    \ \"final\" (something that Kotlin does by default).\n\nThe first function `table_created()`\
    \ is supposed to make sure the table gets created if necessary. It acts as follows:\n\
    \n- We first make sure the constructor of `ComponentActivity` is not called. This\
    \ is necessary, because this class is lifecycle aware and thus observed by the\
    \ UI framework.\n- We instantiate `MainActivity`.\n- We wrap the `MainActivity`\
    \ instance into a *Spy*. This allows us to hook into method calls to mock out\
    \ the actual implementation.\n- We create a mock of `SQLiteDatabase` so we can\
    \ hook into database operations without actually using a real database.\n- The\
    \ following `//given`, `//when`, and `//then` sections follow the BDD style of\
    \ development.\n- Inside the `//given` section, we mock out the `openOrCreateDatabase()`\
    \ call of the activity and instead let it return our mock database.\n- Inside\
    \ `//when` we call method `saveInDb()` of the activity class.\n- In the `//then`\
    \ section, we can check whether the call of `saveInDb()` invokes the appropriate\
    \ database operation to create the necessary table. For this aim we use an `ArgMatcher`,\
    \ which allows us to check for appropriate method call arguments.\n\nThe test\
    \ function `item_inserted()` does almost the same, but instead checks whether\
    \ an appropriate *insert* statement gets fired to the database. You can now run\
    \ the tests, and they should pass without problems.\n\n## Integration Tests\n\n\
    Integration tests sit between unit tests that do fine-grained testing work on\
    \ the development machine and full-fledged user interface tests running on real\
    \ or virtual devices. Integration tests run on a device, too, but they do not\
    \ test the app as a whole but instead selected components in an isolated execution\
    \ environment.\n\nIntegration tests happen inside the `androidTest` section of\
    \ the source code. You also need to add a couple of packages to the app's `build.gradle`\
    \ file.\n\n```groovy\ndependencies {\n    ...\n    androidTestImplementation 'com.android.support:support-annotations:27.1.1'\n\
    \    androidTestImplementation 'com.android.support.test:runner:1.0.2'\n    androidTestImplementation\
    \ 'com.android.support.test:rules:1.0.2'\n}\n```\n\nwith the line breaks after\
    \ `androidTestImplementation` removed.\n\n### Testing Services\n\nIn order to\
    \ test a service with a binding, write something like:\n\n```kotlin\n@RunWith(AndroidJUnit4::class)\n\
    class ServiceTest {\n    // A @Rule wraps around the test invocation - here we\n\
