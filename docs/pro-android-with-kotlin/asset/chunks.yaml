    # Preface


    *Pro Android with Kotlin* is a successor of the famous Apress series for Android
    development targeting the Java platform. With Kotlin as an official language in
    the Android environment, allowing for more elegant programs compared with the
    Java standard, the new book deals with advanced aspects of a modern Android app.
    With a thorough description of important parts of Android system internals and
    professional-level APIs, advanced user interface topics, advanced development
    topics, in-depth communication surveys, professional-level hardware topics including
    looking at devices other than the smartphone, a troubleshooting part with guidance
    on how to fix memory and performance problems, and an introduction to app monetizing,
    the book is supposed to be an invaluable source for developers willing to build
    state-of-the-art professional apps for modern Android devices.


    This book is not meant to be an introduction to the Kotlin language. For this
    aim please have a look at the Kotlin website or any introductory-level book about
    Kotlin. What you will find here however is an attempt to use as many features
    of Kotlin as necessary to write elegant and stable apps using less code compared
    with Java.


    In 2021 and 2022, Android versions 12 and 12.1 have been introduced. In a professional
    environment, writing apps that require a corresponding API level of 31 is a bad
    idea, since the worldwide distribution of devices running a 12.x version is below
    10% as of the writing of this book. But you can write code targeting version 12.x
    and also version 6.0 all the way up to 12.1, thus covering approximately 95% of
    all Android devices, by introducing branches in your code or by using special
    compatibility-aware classes, and this is what we will be doing in this book. We
    still concentrate on modern 12.x development, but if we use modern features not
    available to lower versions, we will be telling you.


    Note that this book does not pay much attention to Android versions below 6.0,
    which corresponds to an API level of 23. If you look into online tutorials, you
    will find a lot of constructs targeting API levels below 23. Especially when it
    comes to support libraries that were introduced to improve backward compatibility,
    development gets unnecessarily complicated if you look at API versions below 23,
    for the distribution of such devices is neglectable nowadays. The book will just
    assume you are not interested in such old versions, making it unnecessary to look
    at such support libraries in many cases and simplifying development considerably.


    # Introduction


    A couple of years have passed since the first edition of this book. For the first
    edition, Android 8, and API level 26, was the current version, but since then
    Android versions 9, 10, 11, and 12 have been published. Also, Android Studio has
    migrated from versions 3.1 to 4.2 (June 2021) and later to Arctic Fox, Bumblebee,
    Chipmunk, and Dolphin (all mid-2021 till now). At the same time, the Android Gradle
    plugin migrated from versions 3.0 to 7.2 and Kotlin from versions 1.2 to 1.5.
    In addition, `android.support` packages, which help ensure version compatibility
    across different API levels, are now deprecated and replaced by Jetpack ( [`https://developer.android.com/jetpack`](https://developer.android.com/jetpack)
    ).


    With respect to sophisticated graphics rendering and game development, while in
    2018 the new 3D graphics rendering engine Vulkan was in its infancy and therefore
    not included in the first edition, it gained more and more influence, and adding
    a section on it in Chapter [9](#463716_2_En_9_Chapter.xhtml) today makes a lot
    of sense.


    In mid-2019 Google announced *Android Automotive*, a variant of the Android OS
    capable of managing infotainment systems of selected cars.


    With Jetpack Compose a simplified UI development technology entered the Android
    world, considerably reducing the amount of code by providing sophisticated APIs
    and applying an elegant declarative builder-like programming pattern. Jetpack
    was introduced in 2018.


    All these changes reflect in the second edition of the book, making sure you as
    a developer are up to date with the current Android development APIs and tools.


    ## Brevity vs. Expressiveness


    The programs we will be explaining in this book, despite their strong affinity
    to the Kotlin way of thinking, however are not totally mysterious to a Java developer
    or developer of any other modern computer language. One of the design goals of
    Kotlin is expressiveness, so to understand Kotlin programs, you need less effort,
    even when the programs get shorter. But you have to understand that at some point
    you have to pay for maximum brevity with a loss of expressiveness and a loss of
    readability.


    When it comes to deciding what is better, the author favors expressiveness over
    brevity, but be assured that a loquacious programming style is considered a no-go.
    In the end a professional developer wants to write a concise app, because less
    code means lower costs when it comes to maintenance.'
