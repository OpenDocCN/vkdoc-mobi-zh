    ```groovy

    implementation "androidx.activity:" +

    "activity-ktx:1.4.0"

    implementation "androidx.fragment:" +

    "fragment-ktx:1.4.1"

    ```


    然后，在 Activity 的初始化部分，你编写以下代码：

