    \ {\nmenu_item1 -> {\nToast.makeText(this,\"Item 1\",\nToast.LENGTH_LONG).show()\n\
    return true\n}\nmenu_item2 -> {\nToast.makeText(this,\"Item 2\",\nToast.LENGTH_LONG).show()\n\
    return true\n}\nelse -> return\nsuper.onOptionsItemSelected(item)\n}\n}\noverride\n\
    fun onCreateOptionsMenu(menu: Menu): Boolean {\nval inflater = menuInflater\n\
    inflater.inflate(R.menu.my_menu, menu)\nreturn true\n}\n```\n\nWhat is left is\
    \ the definition of the menu itself: inside `res/menu` add an XML file `my_menu.xml`\
    \ and inside write where the `<item>` element accepts more attributes – see the\
