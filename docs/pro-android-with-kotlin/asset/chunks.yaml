    \ Android 操作系统组件生命周期之外运行，因此当 Android 进程的生命周期状态发生变化时，您实际上无法很好地控制长时间运行的后台线程会发生什么。\n\
    \n- **Java 并发类**\n```"
- fmt: "Java 和 Kotlin 允许使用`java.util.concurrency`包中的并发相关类。这是一种在后台运行任务的高级方法，具有改进的后台任务管理能力，但其缺点仍然是在任何\
    \ Android 组件生命周期控制之外运行。\n\n* **Kotlin 协程**\n\nKotlin 协程引入了一种全新的软件设计模式来处理并发。函数可以转换为*挂起函数*，从而暂时将程序流交给其他挂起函数。\n\
    \n* **AlarmManager**\n\n该功能最初设计用于在非常特定的时间运行任务，如果你需要在特定时刻向用户发送通知，可以使用它。它自 API 级别\
    \ 1 就已存在。但从 API 级别 19（Android 4.4）开始，系统允许在某些条件下推迟闹钟。缺点是，你无法控制更一般的设备条件——当设备启动时，无论设备上发生什么，它都会自行决定触发闹钟事件。\n\
    \n* **SyncAdapter**\n\n此方法是在 Android API 级别 5 中添加的，它对于同步任务特别有用。对于更一般的后台执行任务，你应该改用下文描述的*JobScheduler*。仅当你需要其提供的额外功能时，才使用`SyncAdapter`。\n\
    \n* **JobScheduler**\n\n这是一个用于在 Android 操作系统上调度任务的集成库。它可以在 API 级别 21 及以上的任何设备上运行，这约占当前使用的\
    \ Android 设备的 98%。\n\n更底层的方法将在第 [11](#463716_2_En_11_Chapter.xhtml) 章中讨论。本节剩余部分将介绍*JobScheduler*和*AlarmManager*。\n\
    \n### JobScheduler\n\n`JobScheduler`是在 API 级别 21 及以上任何 Android 设备上调度和运行后台任务的专用方法。\n\
    \n> **注意**\n>\n> 此外，Android 8 的文档强烈建议使用`JobScheduler`来克服自 Android 8 以来强加的后台任务执行限制。\n\
    \n要开始使用`JobScheduler`，我们首先需要实现任务本身。为此，实现`android.app.job.JobService`类，例如：\n\n\
    ```kotlin\nclass MyJob : JobService() {\n    var jobThread: Thread? = null\n\n\
    \    override fun onStartJob(params: JobParameters): Boolean {\n        Log.i(\"\
    LOG\", \"MyJob: onStartJob() : \" + params.jobId)\n        jobThread?.interrupt()\n\
    \        jobThread = Thread {\n            Log.i(\"LOG\", \"started job thread\"\
    )\n            // do job work...\n            jobFinished(params, false)\n   \
    \         jobThread = null\n            Log.i(\"LOG\", \"finished job thread\"\
    )\n        }\n        jobThread.start()\n        return true\n    }\n\n    override\
    \ fun onStopJob(params: JobParameters): Boolean {\n        Log.i(\"LOG\", \"MyJob:\
    \ onStopJob()\")\n        jobThread?.interrupt()\n        jobThread = null\n \
    \       return true\n    }\n}\n```\n\n实现中最关键的部分是`onStartJob()`方法——在这里你需要输入任务实际应该执行的工作。请注意，我们将实际工作推入了一个线程。这一点很重要，因为`onStartJob()`在应用的主线程中运行，如果它停留时间过长，可能会阻塞其他重要工作。改为启动一个线程可以立即结束。同时我们返回`true`，表示任务在后台线程中继续工作。一旦任务完成，它必须调用`jobFinished()`；否则，系统将不知道任务已完成其工作。\n\
    重写的`onStopJob()`方法*不是*正常任务生命周期的一部分——它会在系统决定提前结束任务时被调用。我们让它返回`true`，以告诉系统，如果任务已相应配置，则允许其重新调度该任务。\n\
    \n要完成任务实现，我们仍然需要在`AndroidManifest.xml`中配置服务类。为此，添加：\n\n```xml\n<service\n    android:name=\"\
    .MyJob\"\n    android:permission=\"android.permission.BIND_JOB_SERVICE\" />\n\
    ```\n\n这里配置的权限*不是*“危险”权限，因此你不必实现获取此权限的过程。但是，你必须在此处添加此权限；否则，任务将被忽略。\n\n要实际调度由`JobScheduler`管理的任务，你首先需要获取一个`JobScheduler`对象作为系统服务。然后，你可以构建一个`JobInfo`对象，最后将其注册到`JobScheduler`：\n\
    \n```kotlin\nval jsched = getSystemService(JobScheduler::class.java)\nval JOB_ID:\
    \ Int = 7766\nval service = ComponentName(this, MyJob::class.java)\nval builder\
    \ = JobInfo.Builder(JOB_ID, service)\n    .setMinimumLatency((1 * 1000).toLong())\n\
    \    // wait at least 1 sec\n    .setOverrideDeadline((3 * 1000).toLong())\n \
    \   // maximum delay 3 secs\njsched.schedule(builder.build())\n```\n\n此示例调度任务最早在\
    \ 1 秒后启动，最晚在 3 秒后启动。通过构造，它被分配了 ID `7766`——这是一个传递给任务实现中`onStartJob()`的值。该数字仅是一个示例——你可以使用任何唯一的数字作为\
    \ ID。\n\n在构建`JobInfo`对象时，你可以设置各种任务特性，如表 8-2 所示。\n\n**表 8-2**`JobInfo.Builder`选项\n\
    \n| 方法 | 描述 |\n| --- | --- |\n| `setMinimumLatency(minLatencyMillis: Long)` |\
    \ 此任务应延迟指定的时间或更长时间。 |\n| `setOverrideDeadline(maxExecutionDelayMillis: Long)`\
    \ | 任务可以被延迟的最大时间。 |\n| `setPeriodic(intervalMillis: Long)` | 使任务重复并设置重复间隔。实际间隔可能更长，但不会更短。\
    \ |\n| `setPeriodic(intervalMillis: Long, flexMillis: Long)` | 使任务重复并设置重复间隔和灵活性窗口。因此实际间隔将在*intervalMillis*\
    \ − 0.5 · *flexMillis* 和 *intervalMillis* + 0.5 · *flexMillis* 之间。两个数字的最小可能值分别被限制为`getMinPeriodMillis()`和\
    \ MAX(`getMinFlexMillis()`, 0.05 * intervalMillis)。 |\n| `setBackoffCriteria(initialBackoffMillis:\
    \ Long, backoffPolicy: Int)` | 当你在任务实现中编写`jobFinished(params, true)`时，可能会发生退避。这里指定了在这种情况下会发生什么。`backoffPolicy`的可能值由以下常量给出：<br>\
    \ • `JobInfo.BACKOFF_POLICY_LINEAR`：退避以间隔 *initialBackoffMillis* · *retry* − *number*\
    \ 发生。<br> • `JobInfo.BACKOFF_POLICY_EXPONENTIAL`：退避以间隔 *initialBackoffMillis*\
    \ · 2^(*retry* − *number*) 发生。 |\n| `setExtras(extras: PersistableBundle)` | 设置可选的附加数据。这些附加数据会被传递给任务实现中的`onStartJob()`。\
    \ |\n| `setTransientExtras(extras: Bundle)` | 仅适用于 API 级别 26 及更高版本。设置可选的未持久化附加数据。这些附加数据会被传递给任务实现中的`onStartJob()`。\
    \ |\n| `setPersisted(isPersisted: Boolean)` | 任务是否在设备重启后持久化。需要权限 `android.Manifest.permission.RECEIVE_BOOT_COMPLETED`。\
    \ |\n| `setRequiredNetworkType(networkType: Int)` | 指定任务运行需要满足的附加条件。可能的参数值为：<br>\
    \ • `JobInfo.NETWORK_TYPE_NONE`<br> • `JobInfo.NETWORK_TYPE_ANY`<br> • `JobInfo.NETWORK_TYPE_UNMETERED`<br>\
    \ • `JobInfo.NETWORK_TYPE_NOT_ROAMING`<br> • `JobInfo.NETWORK_TYPE_METERED` |\n\
    | `setRequiresBatteryNotLow(batteryNotLow: Boolean)` | 仅适用于 API 级别 26 及更高版本。指定任务运行需要满足的附加条件，即电池电量不能低。False\
    \ 表示不关心。 |\n| `setRequiresCharging(requiresCharging: Boolean)` | 指定任务运行需要满足的附加条件，即设备必须已插入电源。False\
    \ 表示不关心。 |\n| `setRequiresDeviceIdle(requiresDeviceIdle: Boolean)` | 指定任务运行需要满足的附加条件，即设备必须处于空闲状态。False\
    \ 表示不关心。 |"
  raw: "Java    and Kotlin allow the\n    use of concurrency-related classes from\
    \ the `java.util.concurrency`\n    package . This is\n    a higher-level approach\
    \ of running things in the background with\n    improved background task management\
    \ capabilities, but it still has the\n    downside of running outside any Android\
    \ component lifecycle\n    control.\n\n*   **Kotlin coroutines**\n\nKotlin coroutines\n\
    \nintroduce a totally new software design pattern for handling\n    concurrency.\
    \ Functions can be transformed to *suspending\n    functions*, subject to temporarily\
    \ giving away program flow to other\n    suspending functions.\n\n*   **AlarmManager**\n\
    \nThis was originally designed for running tasks at very specific times   , and\
    \ you can use it if\n    you need to send notifications to the user at specific\
    \ instances in\n    time. It has been there since API level 1\\. Only starting\
    \ at API level 19\n    (Android 4.4) the system allows for postponing alarms under\
    \ certain\n    conditions. The downside is you don’t have control over more general\n\
    \    device conditions – when the device is up, it will fire alarm events at\n\
    \    its own discretion, no matter what else happens on your device.\n\n*   **SyncAdapter**\n\
    \nThis methodology\n     was added in Android API level 5\\. It is particularly\
    \ useful for\n    synchronization tasks. For more general background execution\
    \ tasks, you\n    should instead use a \n    *JobScheduler*  as described in the\
    \ following. Use a SyncAdapter  only if you\n    need one of the additional functionalities\
    \ it provides.\n\n*   **JobScheduler**\n\nThis is an integrated library    for\
    \ scheduling jobs on\n    the Android OS. It runs on any device starting at API\
    \ level 21, which is\n    about 98% of the Android devices in use.\n\nThe more\
    \ low-level approaches get handled in Chapter [11](#463716_2_En_11_Chapter.xhtml).\
    \ The rest of this section is\nabout the \n*JobScheduler*    and the  *AlarmManager*\n\
    .\n\nJobScheduler\nA JobScheduler \n  is the dedicated\nmethod to schedule and\
    \ run background tasks in any Android device\nstarting at API level 21.\n\nNote\n\
    \nAlso, the documentation of Android 8 strongly recommends using\nJobSchedulers\
    \ to overcome the background task execution restrictions\nimposed since Android\
    \ 8.\n\nTo start using a JobScheduler, we first implement the job itself. To do\n\
    so, implement the class \n`android.app.job.JobService`\n, as, for example, in\n\
    \n```\nclass MyJob : JobService() {\nvar jobThread:Thread? = null\noverride\n\
    fun onStartJob(params: JobParameters) : Boolean {\nLog.i(\"LOG\", \"MyJob: onStartJob()\
    \ : \" +\nparams.jobId)\njobThread?.interrupt()\njobThread = Thread {\nLog.i(\"\
    LOG\", \"started job thread\")\n// do job work...\njobFinished(params, false)\n\
    jobThread = null\nLog.i(\"LOG\", \"finished job thread\")\n}\njobThread.start()\n\
    return true\n}\noverride\nfun onStopJob(params:JobParameters) : Boolean {\nLog.i(\"\
    LOG\", \"MyJob: onStopJob()\")\njobThread?.interrupt()\njobThread = null\nreturn\
    \ true\n}\n}\n```\n\nThe most important part of the implementation is the `onStartJob()`\
    \ method  – here you’ll\nenter the work the job is actually supposed to do. Note\
    \ that we pushed\nthe actual work into a thread. This is important, because the\
    \ `onStartJob()` runs in\nthe app’s main thread, thus blocking maybe important\
    \ other work if it\nstays too long inside. Starting a thread instead finishes\
    \ immediately.\nAlso we return `true` signaling that\nthe job continues doing\
    \ its work in a background thread. Once the job\nfinishes, it must call \n`jobFinished()`\n\
    ; otherwise, the system wouldn’t know that the job finished doing\nits work.\n\
    The overridden `onStopJob()` method  is *not*\npart of the normal job lifecycle\
    \ – it instead gets called when the\nsystem decides to finish the job    prematurely.\
    \ We let\nit return `true`\nto tell the system that it is allowed to reschedule\
    \ the job, in case it\nwas configured accordingly.\n\nTo finish the job implementation,\
    \ we must still configure the service\nclass inside  `AndroidManifest.xml`\n.\
    \ To do so, add\n\n```\nThe permission\n configured here is *not* a “Dangerous”\
    \ permission, so you\ndon’t have to implement a process to acquire this permission.\
    \ However,\nyou must add this permission here; otherwise, the job gets ignored.\n\
    \nTo actually schedule a job governed by the JobScheduler, you first need\nto\
    \ obtain a `JobScheduler` object  as a system\nservice. Then you can build a `JobInfo`\
    \ object , and in the end\nyou register it with the JobScheduler   :\n\n```\n\
    val jsched = getSystemService(JobScheduler::class.java)\nval JOB_ID : Int = 7766\n\
    val service = ComponentName(this, MyJob::class.java)\nval builder = JobInfo.Builder(JOB_ID,\
    \ service)\n.setMinimumLatency((1 * 1000).toLong())\n// wait at least 1 sec\n\
    .setOverrideDeadline((3 * 1000).toLong())\n// maximum delay 3 secs\njsched.schedule(builder.build())\n\
    ```\n\nThis example schedules the job to be started the earliest after 1\nsecond\
    \ and the latest after 3 seconds. By construction it gets the ID\n`7766` assigned\
    \ –\nthis is a value passed to `onStartJob()` inside\nthe job implementation.\
    \ The number is just an example – you can use any\nunique number for the ID.\n\
    \nWhile building the `JobInfo` object     , you can set various\njob characteristics,\
    \ as shown in Table [8-2](#463716_2_En_8_Chapter.xhtml#Tab2).\n\nTable 8-2\nJobInfo\
    \ Builder\nOptions\n\nMethod |\n Description |\n\n| --- | --- | --- | --- | ---\
    \ |\n\nsetMinimumLatency(minLatencyMillis: Long) |\n This job should be delayed\
    \ by the specified amount of time or longer. |\n\nsetOverrideDeadline(maxExecutionDelayMillis:\
    \ Long) |\n The maximum time a job can be delayed. |\n\nsetPeriodic(intervalMillis:\
    \ Long) |\n Make the job repeat and set a recurrence interval. The actual interval\
    \ can be\nhigher, but will not be lower. |\n\nsetPeriodic(intervalMillis: Long,\
    \ flexMillis: Long) |\n Make the job repeat and set a recurrence interval and\
    \ a flexibility window. So\nthe real interval will be between\n*intervalMillis* − 0.5 · *flexMillis*\
    \ and\n*intervalMillis* + 0.5 · *flexMillis*. Both numbers get\ntheir lowest possible\
    \ value clamped to `getMinPeriodMillis()`\nand MAX( `getMinFlexMillis()`,\n0.05\
    \ * intervalMillis), respectively. |\n\nsetBackoffCriteria(initialBackoffMillis:Long,\
    \ backoffPolicy:Int) |\n A back-off might happen when inside your job implementation\
    \ you write `jobFinished(params, true)`. Here you specify what happens in such\
    \ a case. Possible\nvalues for “backoffPolicy” are given by the constants in |\n\
    \n|\n • **JobInfo.BACKOFF_POLICY_LINEAR**: Back-offs happen at\nintervals*initialBackoffMillis* · *retry* − *number*.\
    \ |\n\n|\n • **JobInfo.BACKOFF_POLICY_EXPONENTIAL**: Back-offs happen at intervals\n\
    *initialBackoffMillis* · 2^(*retry* − *number*). |\n\nsetExtras(extras: PersistableBundle)\
    \ |\n Set optional extras. These extras get passed to `onStartJob()` inside\n\
    the job implementation. |\n\nsetTransientExtras(extras: Bundle) |\n Only for API\
    \ level 26 and higher. Set optional unpersisted extras. These extras\nget passed\
    \ to `onStartJob()` inside\nthe job implementation. |\n\nsetPersisted(isPersisted:\
    \ Boolean) |\n Whether the job gets persisted across device reboots. Needs permission\n\
    “android.Manifest.permission.RECEIVE_BOOT_COMPLETED”. |\n\nsetRequiredNetworkType(networkType:\
    \ Int) |\n Specifies an additional condition that needs to be met for the job\
    \ to run.\nPossible argument values are\n• JobInfo.NETWORK_TYPE_NONE\n• JobInfo.NETWORK_TYPE_ANY\n\
    • JobInfo.NETWORK_TYPE_UNMETERED\n• JobInfo.NETWORK_TYPE_NOT_ROAMING\n• JobInfo.NETWORK_TYPE_METERED\
    \ |\n\nsetRequiresBatteryNotLow(batteryNotLow: Boolean) |\n Only for API level\
    \ 26 and higher. Specifies an additional condition that needs to\nbe met for the\
    \ job to run, that is, the battery must not be low. False\nresets to not care.\
    \ |\n\nsetRequiresCharging(requiresCharging: Boolean) |\n Specifies an additional\
    \ condition that needs to be met for the job to run, that\nis, the device must\
    \ be plugged in. False resets to not care. |\n\nsetRequiresDeviceIdle(requiresDeviceIdle:\
    \ Boolean) |\n Specifies an additional condition that needs to be met for the\
    \ job to run, that\nis, the device must be in idle state. False resets to not\
    \ care. |"
  trans: "\nJava 和 Kotlin 允许使用`java.util.concurrency`包中的并发相关类。这是一种在后台运行任务的高级方法，具有改进的后台任务管理能力，但其缺点仍然是在任何\
    \ Android 组件生命周期控制之外运行。\n\n* **Kotlin 协程**\n\nKotlin 协程引入了一种全新的软件设计模式来处理并发。函数可以转换为*挂起函数*，从而暂时将程序流交给其他挂起函数。\n\
    \n* **AlarmManager**\n\n该功能最初设计用于在非常特定的时间运行任务，如果你需要在特定时刻向用户发送通知，可以使用它。它自 API 级别\
    \ 1 就已存在。但从 API 级别 19（Android 4.4）开始，系统允许在某些条件下推迟闹钟。缺点是，你无法控制更一般的设备条件——当设备启动时，无论设备上发生什么，它都会自行决定触发闹钟事件。\n\
    \n* **SyncAdapter**\n\n此方法是在 Android API 级别 5 中添加的，它对于同步任务特别有用。对于更一般的后台执行任务，你应该改用下文描述的*JobScheduler*。仅当你需要其提供的额外功能时，才使用`SyncAdapter`。\n\
    \n* **JobScheduler**\n\n这是一个用于在 Android 操作系统上调度任务的集成库。它可以在 API 级别 21 及以上的任何设备上运行，这约占当前使用的\
    \ Android 设备的 98%。\n\n更底层的方法将在第 11 章中讨论。本节剩余部分将介绍*JobScheduler*和*AlarmManager*。\n\
    \n### JobScheduler\n\n`JobScheduler`是在 API 级别 21 及以上任何 Android 设备上调度和运行后台任务的专用方法。\n\
    \n> **注意**\n>\n> 此外，Android 8 的文档强烈建议使用`JobScheduler`来克服自 Android 8 以来强加的后台任务执行限制。\n\
    \n要开始使用`JobScheduler`，我们首先需要实现任务本身。为此，实现`android.app.job.JobService`类，例如：\n\n\
    ```kotlin\nclass MyJob : JobService() {\n    var jobThread: Thread? = null\n\n\
    \    override fun onStartJob(params: JobParameters): Boolean {\n        Log.i(\"\
    LOG\", \"MyJob: onStartJob() : \" + params.jobId)\n        jobThread?.interrupt()\n\
    \        jobThread = Thread {\n            Log.i(\"LOG\", \"started job thread\"\
    )\n            // do job work...\n            jobFinished(params, false)\n   \
    \         jobThread = null\n            Log.i(\"LOG\", \"finished job thread\"\
    )\n        }\n        jobThread.start()\n        return true\n    }\n\n    override\
    \ fun onStopJob(params: JobParameters): Boolean {\n        Log.i(\"LOG\", \"MyJob:\
    \ onStopJob()\")\n        jobThread?.interrupt()\n        jobThread = null\n \
    \       return true\n    }\n}\n```\n\n实现中最关键的部分是`onStartJob()`方法——在这里你需要输入任务实际应该执行的工作。请注意，我们将实际工作推入了一个线程。这一点很重要，因为`onStartJob()`在应用的主线程中运行，如果它停留时间过长，可能会阻塞其他重要工作。改为启动一个线程可以立即结束。同时我们返回`true`，表示任务在后台线程中继续工作。一旦任务完成，它必须调用`jobFinished()`；否则，系统将不知道任务已完成其工作。\n\
    重写的`onStopJob()`方法*不是*正常任务生命周期的一部分——它会在系统决定提前结束任务时被调用。我们让它返回`true`，以告诉系统，如果任务已相应配置，则允许其重新调度该任务。\n\
    \n要完成任务实现，我们仍然需要在`AndroidManifest.xml`中配置服务类。为此，添加：\n\n```xml\n<service\n    android:name=\"\
    .MyJob\"\n    android:permission=\"android.permission.BIND_JOB_SERVICE\" />\n\
    ```\n\n这里配置的权限*不是*“危险”权限，因此你不必实现获取此权限的过程。但是，你必须在此处添加此权限；否则，任务将被忽略。\n\n要实际调度由`JobScheduler`管理的任务，你首先需要获取一个`JobScheduler`对象作为系统服务。然后，你可以构建一个`JobInfo`对象，最后将其注册到`JobScheduler`：\n\
    \n```kotlin\nval jsched = getSystemService(JobScheduler::class.java)\nval JOB_ID:\
    \ Int = 7766\nval service = ComponentName(this, MyJob::class.java)\nval builder\
    \ = JobInfo.Builder(JOB_ID, service)\n    .setMinimumLatency((1 * 1000).toLong())\n\
    \    // wait at least 1 sec\n    .setOverrideDeadline((3 * 1000).toLong())\n \
    \   // maximum delay 3 secs\njsched.schedule(builder.build())\n```\n\n此示例调度任务最早在\
    \ 1 秒后启动，最晚在 3 秒后启动。通过构造，它被分配了 ID `7766`——这是一个传递给任务实现中`onStartJob()`的值。该数字仅是一个示例——你可以使用任何唯一的数字作为\
    \ ID。\n\n在构建`JobInfo`对象时，你可以设置各种任务特性，如表 8-2 所示。\n\n**表 8-2** `JobInfo.Builder`选项\n\
    \n| 方法 | 描述 |\n| --- | --- |\n| `setMinimumLatency(minLatencyMillis: Long)` |\
    \ 此任务应延迟指定的时间或更长时间。 |\n| `setOverrideDeadline(maxExecutionDelayMillis: Long)`\
    \ | 任务可以被延迟的最大时间。 |\n| `setPeriodic(intervalMillis: Long)` | 使任务重复并设置重复间隔。实际间隔可能更长，但不会更短。\
    \ |\n| `setPeriodic(intervalMillis: Long, flexMillis: Long)` | 使任务重复并设置重复间隔和灵活性窗口。因此实际间隔将在\
    \ *intervalMillis* − 0.5 · *flexMillis* 和 *intervalMillis* + 0.5 · *flexMillis*\
    \ 之间。两个数字的最小可能值分别被限制为 `getMinPeriodMillis()` 和 MAX(`getMinFlexMillis()`, 0.05\
    \ * intervalMillis)。 |\n| `setBackoffCriteria(initialBackoffMillis: Long, backoffPolicy:\
    \ Int)` | 当你在任务实现中编写 `jobFinished(params, true)` 时，可能会发生退避。这里指定了在这种情况下会发生什么。`backoffPolicy`\
    \ 的可能值由以下常量给出：<br> • `JobInfo.BACKOFF_POLICY_LINEAR`：退避以间隔 *initialBackoffMillis*\
    \ · *retry* − *number* 发生。<br> • `JobInfo.BACKOFF_POLICY_EXPONENTIAL`：退避以间隔 *initialBackoffMillis*\
    \ · 2^(*retry* − *number*) 发生。 |\n| `setExtras(extras: PersistableBundle)` | 设置可选的附加数据。这些附加数据会被传递给任务实现中的\
    \ `onStartJob()`。 |\n| `setTransientExtras(extras: Bundle)` | 仅适用于 API 级别 26 及更高版本。设置可选的未持久化附加数据。这些附加数据会被传递给任务实现中的\
    \ `onStartJob()`。 |\n| `setPersisted(isPersisted: Boolean)` | 任务是否在设备重启后持久化。需要权限\
    \ `android.Manifest.permission.RECEIVE_BOOT_COMPLETED`。 |\n| `setRequiredNetworkType(networkType:\
    \ Int)` | 指定任务运行需要满足的附加条件。可能的参数值为：<br> • `JobInfo.NETWORK_TYPE_NONE`<br> • `JobInfo.NETWORK_TYPE_ANY`<br>\
    \ • `JobInfo.NETWORK_TYPE_UNMETERED`<br> • `JobInfo.NETWORK_TYPE_NOT_ROAMING`<br>\
    \ • `JobInfo.NETWORK_TYPE_METERED` |\n| `setRequiresBatteryNotLow(batteryNotLow:\
    \ Boolean)` | 仅适用于 API 级别 26 及更高版本。指定任务运行需要满足的附加条件，即电池电量不能低。False 表示不关心。 |\n|\
    \ `setRequiresCharging(requiresCharging: Boolean)` | 指定任务运行需要满足的附加条件，即设备必须已插入电源。False\
    \ 表示不关心。 |\n| `setRequiresDeviceIdle(requiresDeviceIdle: Boolean)` | 指定任务运行需要满足的附加条件，即设备必须处于空闲状态。False\
    \ 表示不关心。 |\n"
- fmt: '`setRequiresStorageNotLow(storageNotLow: Boolean)` |

    Only for API level 26 and higher. Specifies an additional condition that needs
    to be met for the job to run, that is, the device memory must not be low. `False`
    resets to not care. |


    `addTriggerContentUri(uri: JobInfo.TriggerContentUri)` |

    Only for API level 24 and higher. Add a content URI that will be monitored for
    changes. If a change happens, the job gets executed. |


    `setTriggerContentUpdateDelay(durationMs: Long)` |

    Only for API level 24 and higher. Set the minimum delay in milliseconds from when
    a content change is detected until the job is scheduled. |


    `setTriggerContentMaxDelay(durationMs: Long)` |

    Only for API level 24 and higher. Set the maximum total delay in milliseconds
    that is allowed from the first time a content change is detected until the job
    is scheduled. |


    `setClipData(clip: ClipData, grantFlags: Int)` |

    Only for API level 26 and higher. Set a `ClipData` associated with this job. Possible
    values for the `grantFlags` are `FLAG_GRANT_READ_URI_PERMISSION`, `FLAG_GRANT_WRITE_URI_PERMISSION`,
    and `FLAG_GRANT_PREFIX_URI_PERMISSION` (all constants inside class `Intent`).
    |


    ## AlarmManager


    If you need actions to happen at specific times, regardless of whether associated
    components are running or not, the `AlarmManager` is the system service that you
    can use for such tasks.


    As for matters concerning the `AlarmManager`, your device is in one of the following
    states:


    - **Device awake**: The device is running. Usually this means also the screen
    is on, but there is no guarantee that if the screen is off, the device is no longer
    awake. However, quite often if the screen gets switched off, the device shortly
    after that leaves the awake state. The details depend on the hardware and the
    device’s software configuration. The `AlarmManager` can do its work if the device
    is awake, but being awake is not necessary for the `AlarmManager` to fire events
    – see the other states in the following.


    - **Device locked**: The device is locked, and the user needs to unlock it before
    it can be handled again. A locked device *might* lead to the device going asleep;
    however, locking per se is a security measure and has no primary impact on the
    `AlarmManager`’s functioning.


    - **Device asleep**: The screen is switched off, and the device runs in a low-power-consumption
    mode. Events triggered by the `AlarmManager` will be able to wake up the device,
    which then fires them, but this needs to be explicitly specified.


    - **Device switched off**: The `AlarmManager` stops working and resumes working
    only the next time the device is switched on. Alarm events get lost when the device
    is switched off – there is nothing like a retry functionality here.


    Alarm events are one of the following:


    - A `PendingIntent` gets fired. Since `PendingIntent`s may target either Services,
    activities, or broadcasts, an alarm event may start an activity or a service or
    send a broadcast.


    - A *handler* gets invoked. This is a direct version of sending alarm events to
    the same component that is issuing the alarms.


    In order to schedule alarms, you first need to get the `AlarmManager` as a system
    service as follows:


    ```kotlin

    val alrm = getSystemService(AlarmManager::class.java)

    ```


    You can then issue alarms by various methods as shown in Table 8-3. If for API
    levels 24 and higher you choose to have a listener receive alarm events, the details
    about how to use the associated handlers get presented in section “Multithreading”
    of Chapter 11. If instead aiming at Intents, all corresponding methods have a
    `type: Int` parameter with the following possible values:


    ### Table 8-3 Issuing Alarms


    | Method | Description |

    | --- | --- |

    | `set(type: Int, triggerAtMillis: Long, operation: PendingIntent): Unit` | Schedule
    an alarm. An Intent gets invoked, triggered according to the type and the time
    parameter provided. Starting with API level 19, alarm event delivery might be
    inexact to optimize system resource usage. Use one of the “setExact” methods if
    you need exact delivery. |

    | `set(type: Int, triggerAtMillis: Long, tag: String, listener: AlarmManager.OnAlarmListener,
    targetHandler: Handler): Unit` | Requires API level 24 or higher. Direct callback
    version of `set(Int, Long, PendingIntent)`. The Handler parameter can be `null`
    to invoke the listener on the app’s main looper. Otherwise, the call of the listener
    will be performed from inside the handler provided. |

    | `setAlarmClock(info: AlarmManager.AlarmClockInfo, operation: PendingIntent):
    Unit` | Requires API level 21 or higher. Schedule an alarm represented by an alarm
    clock. The alarm clock info object allows for adding an Intent, which is able
    to describe the trigger. The system may choose to display information about this
    alarm to the user. Other than that, this method is like `setExact(Int, Long, PendingIntent)`,
    but implies the `RTC_WAKEUP` trigger type. |

    | `setAndAllowWhileIdle(type: Int, triggerAtMillis: Long, operation: PendingIntent):
    Unit` | Requires API level 23 or higher. Like `set(Int, Long, PendingIntent)`,
    but this alarm will be allowed to execute even when the system is in low-power
    idle modes. |

    | `setExact(type: Int, triggerAtMillis: Long, operation: PendingIntent): Unit`
    | Requires API level 19 or higher. Schedule an alarm to be delivered precisely
    at the stated time. |

    | `setExact(type: Int, triggerAtMillis: Long, tag: String, listener: AlarmManager.OnAlarmListener,
    targetHandler: Handler): Unit` | Requires API level 24 or higher. Direct callback
    version of `setExact(Int, Long, PendingIntent)`. The Handler parameter can be
    `null` to invoke the listener on the app’s main looper. Otherwise, the call of
    the listener will be performed from inside the handler provided. |

    | `setExactAndAllowWhileIdle(type: Int, triggerAtMillis: Long, operation: PendingIntent):
    Unit` | Requires API level 23 or higher. Like `setExact(Int, Long, PendingIntent)`,
    but this alarm will be allowed to execute even when the system is in low-power
    idle modes. |

    | `setInexactRepeating(type: Int, triggerAtMillis: Long, intervalMillis: Long,
    operation: PendingIntent): Unit` | Schedule a repeating alarm that has inexact
    trigger time requirements, for example, an alarm that repeats every hour, but
    not necessarily at the top of every hour. |

    | `setRepeating(type: Int, triggerAtMillis: Long, intervalMillis: Long, operation:
    PendingIntent): Unit` | Schedule a repeating alarm. Starting at API level 19,
    this is the same as `setInexactRepeating()`. |

    | `setWindow(type: Int, windowStartMillis: Long, windowLengthMillis: Long, operation:
    PendingIntent): Unit` | Schedule an alarm to be delivered within a given window
    of time. |

    | `setWindow(int type: Int, windowStartMillis: Long, windowLengthMillis: Long,
    tag: String, listener: AlarmManager.OnAlarmListener, targetHandler: Handler):
    Unit` | Requires API level 24 or higher. Direct callback version of `setWindow(int,
    long, long, PendingIntent)`. The Handler parameter can be `null` to invoke the
    listener on the app’s main looper. Otherwise, the call of the listener will be
    performed from inside the handler provided. |


    The `type` parameter can be one of the following constants:


    - **`AlarmManager.RTC_WAKEUP`**: Time parameter is wall clock time in UTC (milliseconds
    since January 1, 1970, 00:00:00). The device will be woken up if necessary.

    - **`AlarmManager.RTC`**: Time parameter is wall clock time in UTC (milliseconds
    since January 1, 1970, 00:00:00). If the device is asleep, the event will be discarded,
    and no alarm will be triggered.

    - **`AlarmManager.ELAPSED_REALTIME_WAKEUP`**: Time parameter is the time in milliseconds
    since last boot, including sleep time. The device will be woken up if necessary.

    - **`AlarmManager.ELAPSED_REALTIME`**: (Time parameter is the time in milliseconds
    since last boot, including sleep time. No wake-up guarantee.)'
