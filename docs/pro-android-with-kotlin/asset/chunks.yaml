  trans: "\n此外，在 Activity 中重写 `onCreateOptionsMenu(...)` 来创建菜单，并重写 `onOptionsItemSelected(...)`\
    \ 来监听菜单点击事件：\n\n```kotlin\noverride\nfun onOptionsItemSelected(item: MenuItem):\
    \ Boolean {\nwhen (item.getItemId()) {\nmenu_item1 -> {\nToast.makeText(this,\"\
    Item 1\",\nToast.LENGTH_LONG).show()\nreturn true\n}\nmenu_item2 -> {\nToast.makeText(this,\"\
    Item 2\",\nToast.LENGTH_LONG).show()\nreturn true\n}\nelse -> return\nsuper.onOptionsItemSelected(item)\n\
    }\n}\noverride\nfun onCreateOptionsMenu(menu: Menu): Boolean {\nval inflater =\
    \ menuInflater\ninflater.inflate(R.menu.my_menu, menu)\nreturn true\n}\n```\n\n\
    剩下的就是菜单本身的定义：在 `res/menu` 目录下添加一个名为 `my_menu.xml` 的 XML 文件，并在其中编写 `<item>` 元素，该元素可接受更多属性——请参阅在线文档（搜索\
    \ \"Android menu resource\"）。特别值得一提的是 `android:showAsAction` 属性——将其设置为 \"ifRoom\"\
    \ 可以将菜单项作为单独的操作元素突出显示在操作栏中。\n\n## 上下文菜单\n\n上下文菜单在长按已注册的视图后显示。要进行此注册，请在 Activity\
    \ 内部调用 `registerForContextMenu()` 并将该视图作为参数传入：\n\n```kotlin\noverride fun onCreate(savedInstanceState:\
    \ Bundle?) {\n...\nregisterForContextMenu(myViewId)\n}\n```\n\n如果你希望多个视图都能显示上下文菜单，可以多次执行此操作。\n\
    \n注册上下文菜单后，你可以在 Activity 中重写 `onCreateContextMenu(...)` 来定义它，并重写 `onContextItemSelected`\
    \ 来监听菜单选择事件。示例如下：\n\n```kotlin\noverride\nfun onCreateContextMenu(menu: ContextMenu,\
    \ v: View,\nmenuInfo: ContextMenuInfo?) {\nsuper.onCreateContextMenu(menu, v,\
    \ menuInfo)\nval inflater = menuInflater\ninflater.inflate(R.menu.context_menu,\
    \ menu)\n}\noverride\nfun onContextItemSelected(item: MenuItem): Boolean {\nwhen\
    \ (item.itemId) {\nctxmenu_item1 -> {\nToast.makeText(this,\"CTX Item 1\",\nToast.LENGTH_LONG).show()\n\
    }\nctxmenu_item2 -> {\nToast.makeText(this,\"CTX Item 2\",\nToast.LENGTH_LONG).show()\n\
    }\nelse -> return\nsuper.onContextItemSelected(item)\n}\nreturn true\n}\n```\n\
    \nXML 定义放在一个标准的菜单 XML 文件中，例如 `res/context_menu.xml`：\n\n也可以通过在 Activity 内部调用 `openContextMenu(\
    \ someView )` 以编程方式打开上下文菜单。\n\n## 上下文操作模式\n\n*上下文操作模式* 的行为类似于与上下文相关的应用栏。标准应用栏对应用来说是静态的，而上下文操作模式则是视图特定的。对于这种上下文菜单，你需要执行以下操作：\n\
    \n- 实现 `ActionMode.Callback` 接口。\n- 在 `onCreateActionMode(...)` 中创建菜单，类似于之前标准上下文菜单的\
    \ `onCreateContextMenu()`。\n- 在 `onPrepareActionMode(...)` 中返回 `false`，除非你需要特殊的准备步骤。\n\
    - 实现 `onActionItemClicked(...)` 来监听触摸事件。\n- 像创建标准上下文菜单那样，创建一个菜单 XML 资源文件。\n- 在代码中，通过调用\
    \ `startActionMode( theActionModeCallback )` 打开上下文操作模式。\n\n## 弹出菜单\n\n上下文相关菜单主要用于不常更改的设置，而属于前端工作流程的菜单最好以弹出菜单的形式实现。弹出菜单通常由用户与特定视图交互而触发，因此弹出菜单会分配给\
    \ UI 元素。\n\n在用户执行某些操作后显示视图的弹出菜单，可以简单地通过调用一个函数来实现：\n\n```kotlin\nfun showPopup(v:\
    \ View) {\nPopupMenu(this, v).run {\nsetOnMenuItemClickListener { menuItem ->\n\
    Toast.makeText(this@TheActivity,\nmenuItem.toString(),\nToast.LENGTH_LONG).show()\n\
    true\n}\nmenuInflater.inflate(popup, menu)\nshow()\n}\n}\n```\n\n像往常一样，你还需要在 `res/menu`\
    \ 资源中定义菜单——例如，一个名为 `popup.xml` 的文件（正如在 `inflate(...)` 的第一个参数中看到的那样）。\n\n## 进度条\n\
    \n显示进度条是改善需要运行几秒钟的任务用户体验的好方法。要实现进度条，请向布局中添加一个 `ProgressBar` 视图。无论是在 XML 布局文件中还是在\
    \ Kotlin 程序中执行此操作，都没有关系。在 XML 中，你编写：\n\n```xml\n<ProgressBar\n    android:id=\"\
    @+id/progressBar\"\n    style=\"?android:attr/progressBarStyleHorizontal\"\n \
    \   android:layout_width=\"match_parent\"\n    android:layout_height=\"wrap_content\"\
    \ />\n```\n\n用于不确定进度条（如果你无法以百分比值表示进度），或者：\n\n```xml\n<ProgressBar\n    android:id=\"\
    @+id/progressBar\"\n    style=\"?android:attr/progressBarStyleHorizontal\"\n \
    \   android:layout_width=\"match_parent\"\n    android:layout_height=\"wrap_content\"\
    \n    android:max=\"100\" />\n```\n\n用于确定进度条（在更新进度条时你知道百分比）。\n\n在代码中，你可以通过以下方式切换不确定进度条的可见性：\n\
    \n```kotlin\nprogressBar.visibility = View.INVISIBLE\n// 或 .. = View.VISIBLE\n\
    ```\n\n要设置确定进度条的进度值，请参阅以下示例：\n\n```kotlin\nwith(progressBar) {\nif (Build.VERSION.SDK_INT\
    \ >= Build.VERSION_CODES.O)\nmin = 0\nmax = 100\n}\nvar value = 0\nThread {\n\
    while(value < 100) {\nvalue += 1\nThread.sleep(200)\nrunOnUiThread {\nprogressBar.progress\
    \ = value\n}\n}\nprogressBar.visibility = View.INVISIBLE\n}.start()\n```\n\n这里我们使用一个后台线程来模拟耗时较长的任务——在真实应用中，后台会执行更有意义的事情。也许你会使用\
    \ `AsyncTask` 而不是线程。\n\n## 使用 Fragment\n\n*Fragment* 是 Activity 的一个可重用的模块化部分。如果你开发一个没有使用\
    \ Fragment 的非平凡应用，你会有一系列相互调用的 Activity。这样带来的问题是，在屏幕较大的设备上，如果 Activity 之间保持紧密关联，这可能不是最佳的解决方案。例如，一个\
    \ Activity 中显示某些项目的列表，而另一个 Activity 中显示选定项目的详细信息。在小屏幕设备上，当用户点击列表 Activity 中的项目时启动详细信息\
    \ Activity 是完全可以接受的。然而在较大的屏幕上，如果列表和详细信息两个视图能够并排显示，可能会改善用户体验。\n\n这就是 Fragment 派上用场的地方。你不是在\
    \ Activity 之间切换，而是创建多个属于*同一* Activity 的 Fragment。然后，根据设备的不同，你可以选择单窗格视图或双窗格视图。\n\
    \n如果你从一个仅包含 Activity 的应用进行迁移，那么开发 Fragment 很简单。Fragment 具有与 Activity 相同的生命周期，并且生命周期回调与\
    \ Activity 的非常相似（如果不是完全相同的话）。不过，这里的情况会变得稍微复杂一些，因为容器 Activity 的生命周期和所包含 Fragment\
    \ 的生命周期彼此关联，并且 Fragment 还表现出专门的调用栈行为。Fragment 的在线文档为你提供了所有与 Fragment 相关问题的详细参考。但在本节中，我们将仅介绍创建和使用\
    \ Fragment 的基本方面。\n\n### 创建 Fragment\n\n创建 Fragment 有两种选择：要么在布局文件中指定 `Fragment`\
    \ 元素，要么从 Kotlin 代码中以编程方式添加 Fragment。\n\n要使用 XML 方式将 Fragment 添加到你的应用中，在布局文件中，确定合适的位置来添加\
    \ Fragment，然后编写：\n\n```xml\n<fragment\n    android:name=\"com.example.myapp.MyFragment\"\
    \n    android:id=\"@+id/myFragment\"\n    android:layout_width=\"match_parent\"\
    \n    android:layout_height=\"match_parent\" />\n```\n\n其中布局参数需要根据应用的布局需求进行选择。对于不同的设备（更准确地说是不同的屏幕尺寸），你可以提供几个不同的布局文件，这些文件在不同位置包含不同数量的\
    \ Fragment。\n\n对于由 XML 文件中的 \"name\" 属性指定的 Fragment 类，从一个最简的类开始，比如：\n\n```kotlin\n\
    import android.support.v4.app.Fragment\n...\nclass MyFragment : Fragment() {\n\
    override\nfun onCreateView(inflater: LayoutInflater?,\ncontainer: ViewGroup?,\n\
    savedInstanceState: Bundle?): View? {\nreturn inflater!!.inflate(\nmy_fragment,\
    \ container, false)\n}\n}\n```\n\n并将一个名为 `my_fragment.xml` 的布局文件添加到 `res/layout`\
    \ 资源文件夹中。\n"
- fmt: "# Adding Fragments from Kotlin Code\n\nTo add fragments from inside your Kotlin\
    \ code, you identify a layout container or `ViewGroup` where to place a fragment\
    \ and then use a fragment manager to perform that insertion:\n\n```\nwith(supportFragmentManager.beginTransaction())\
    \ {\n    val fragment = MyFragment()\n    add(fragm_container.id, fragment, \"\
    fragmTag\")\n    val fragmentId = fragment.id // can use that later...\n    commit()\n\
    }\n```\n\nThis can happen, for example, inside the activity’s `onCreate()` callback\
    \ or more dynamically at any other suitable place. The `fragm_container` is, for\
    \ example, a `<FrameLayout>` element inside the layout XML.\n\n> **Note**\n> A\
    \ fragment gets its ID from the fragment manager during adding it inside a transaction.\
    \ You cannot use it before that, and you cannot provide your own ID if you add\
    \ fragments in Kotlin code.\n\n# Handling Fragments from Activities\n\nHandling\
    \ fragments from inside activities includes:\n\n- Adding fragments, as shown previously\
    \ in the “Creating Fragments” section\n- Getting references to fragments, given\
    \ an ID or a tag\n- Handling the back stack\n- Registering listeners for lifecycle\
    \ events\n\nFor all these needs, you use `getSupportFragmentManager()`, which\
    \ gives you the fragment manager, which is capable of doing all that, or in Kotlin\
    \ simply just use the accessor:\n\n```\nsupportFragmentManager\n```\n\nto fetch\
    \ a reference.\n\n> **Note**\n> There is also a `fragmentManager` without the\
    \ “support” in the name. That one points to the framework’s fragment manager as\
    \ opposed to the support library fragment manager. Using the support fragment\
    \ manager however improves the compatibility with older API levels.\n\n# Communicating\
    \ with Fragments\n\nActivities can communicate with their fragments by using the\
    \ fragment manager and finding fragments given their ID or tag:\n\n```\nval fragm\
    \ = supportFragmentManager.findFragmentByTag(\"fragmTag\")\n// or val fragm =\
    \ supportFragmentManager.findFragmentById(fragmId)\n```\n\nBut fragments also\
    \ can talk to their activity. This might indicate a poor application design, for\
    \ fragments should be self-contained entities. If you still need it, you can use\
    \ `getActivity()` inside the fragment class or in Kotlin simply:\n\n```\nactivity\n\
    ```\n\nto access it. And from there a fragment can even fetch references to other\
    \ fragments.\n\n# App Widgets\n\nApp widgets are their own class of applications\
    \ that show informational messages and/or controllers in other apps, especially\
    \ the home screen. App widgets get implemented as special broadcast receivers\
    \ and as such are subject to being killed by the Android OS once the callback\
    \ methods have done their work and a couple of seconds have passed by after that.\
    \ If you need to have longer process run, consider starting *services* from inside\
    \ the app widgets.\n\nTo start creating an app widget, write inside `AndroidManifest.xml`,\
    \ more precisely as a child element of `<application>`.\n\nNext, create metadata\
    \ inside the resources: create a new file `example_appwidget_info.xml` inside\
    \ `res/xml` and write inside.\n\nWhat is left is creating the broadcast listener\
    \ class – for this aim it is easiest to inherit from class `android.appwidget.AppWidgetProvider`\
    \ and, for example, write:\n\n```\nclass ExampleAppWidgetProvider : AppWidgetProvider()\
    \ {\n    override fun onUpdate(context: Context,\n                          appWidgetManager:\
    \ AppWidgetManager,\n                          appWidgetIds: IntArray) {\n   \
    \     // Perform this loop procedure for each App\n        // Widget that belongs\
    \ to this provider\n        for (appWidgetId in appWidgetIds) {\n            //\
    \ This is just an example, you can do other\n            // stuff here...\n  \
    \          // Create an Intent to launch MainActivity\n            val intent\
    \ = Intent(context, MainActivity::class.java)\n            val pendingIntent =\
    \ PendingIntent.getActivity(context, 0, intent, 0)\n            // Attach listener\
    \ to the button\n            val views = RemoteViews(context.getPackageName(),\n\
    \                                    R.layout.appwidget_provider_layout)\n   \
    \         views.setOnClickPendingIntent(R.id.button, pendingIntent)\n        \
    \    // Tell the AppWidgetManager to perform an\n            // update on the\
    \ app widget\n            appWidgetManager.updateAppWidget(appWidgetId, views)\n\
    \        }\n    }\n}\n```\n\nAn *app widget provider* can serve several app widgets;\
    \ that is why we have to go through a loop inside the setup. Since this needs\
    \ a layout file `appwidget_provider_layout.xml`, we create this one inside `res/layout`\
    \ and, for example, write.\n\n> **Note**\n> Not all layout containers and views\
    \ are allowed inside the layout file for an app widget – you can use one of `FrameLayout`,\
    \ `LinearLayout`, `RelativeLayout`, `GridLayout`, `AnalogClock`, `Button`, `Chronometer`,\
    \ `ImageButton`, `ImageView`, `ProgressBar`, `TextView`, `ViewFlipper`, `ListView`,\
    \ `GridView`, `StackView`, and `AdapterViewFlipper`.\n> The user must still decide\
    \ to activate an app widget by long-tapping the app icon and then placing it on\
    \ the home screen. Because not all users know this, the functionality of an app\
    \ should not depend on whether it gets set as an app widget on the home screen\
    \ or not.\n\nApp widgets can have a configuration activity attached to them. This\
    \ special activity gets called once the user tries to place the app widget on\
    \ the home screen. The user then may, for example, be asked for some settings\
    \ concerning appearance or functioning. To install such an activity, you write\
    \ inside `AndroidManifest.xml`.\n\nThe intent filter shown here is important –\
    \ it tells the system about this special nature of the activity.\n\nThe app widget\
    \ configuration activity must then be added to the XML configuration file `example_appwidget_info.xml`:\
    \ add:\n\n```\nandroid:configure=\"full.class.name.ExampleAppWidgetConfigure\"\
    \n```\n\nas an additional attribute, using the fully qualified name of the configuration\
    \ class.\n\nThe configuration activity itself is asked to return the app widget\
    \ ID as follows:\n\n```\nclass ExampleAppWidgetConfigure : AppCompatActivity()\
    \ {\n    var awi: Int = 0\n    override fun onCreate(savedInstanceState: Bundle?)\
    \ {\n        super.onCreate(savedInstanceState)\n        setContentView(R.layout.activity_conf)\n\
    \        awi = intent.extras.getInt(AppWidgetManager.EXTRA_APPWIDGET_ID)\n   \
    \     Toast.makeText(this, \"\" + awi, Toast.LENGTH_LONG).show()\n        // do\
    \ more configuration stuff...\n    }\n    fun goBack(view: View) {\n        //\
    \ just an example...\n        val data = Intent()\n        data.putExtra(AppWidgetManager.EXTRA_APPWIDGET_ID,\
    \ awi)\n        setResult(RESULT_OK, data)\n        finish()\n    }\n}\n```\n\n\
    > **Note**\n> The app widget’s `onUpdate()` method does not get called *the first\
    \ time* the configuration activity exits – it is the responsibility of the configuration\
    \ activity to accordingly call `updateAppWidget()` on the app widget manager if\
    \ needed.\n\n# Drag-and-Drop\n\nAndroid supports drag-and-drop for any kind of\
    \ UI element and layout. The idea is as follows:\n\n- The app defines a gesture\
    \ that defines the start of a drag operation. You are totally free to define this\
    \ gesture – usual candidates are touch or touch and move operations, but you can\
    \ also start drag operations programmatically.\n\n- If the drag-and-drop designates\
    \ some kind of data transfer, you may assign a data snippet of type `android.content.ClipData`\
    \ to the drag operation.\n\n- Views that take part of this drag-and-drop operation\
    \ – this includes *any* drag source and *all* possible drop targets – get a customized\
    \ `View.OnDragListener` object assigned.\n\n- While the dragging is in progress,\
    \ the dragged target gets visually represented by a moving *shadow* object. You\
    \ are free to define it – it could be a star, a box, or any kind of graphics resembling\
    \ the drag source. You only have to tell the system how to paint it – the positioning\
    \ during the drag operation gets automatically handled by the Android OS. Because\
    \ the drag source stays in place during the drag operation, the layout remains\
    \ static all the time, and the dragging does not thwart layout operations by the\
    \ layout manager.\n\n- When the drag shadow enters the area of a possible drop\
    \ target, the listener gets informed about that, and you can react by, for example,\
    \ changing the visual appearance of the drop candidate."
  raw: "To add fragments from inside your Kotlin code, you identify a layout\ncontainer\
    \ or `ViewGroup` where to\nplace a fragment and then use a fragment manager to\
    \ perform that\ninsertion:\n\n```\nwith(supportFragmentManager.beginTransaction())\
    \ {\nval fragment = MyFragment()\nadd(fragm_container.id, fragment, \"fragmTag\"\
    )\nval fragmentId = fragment.id // can use that later...\ncommit()\n}\n```\n\n\
    which can happen, for example, inside the activity’s `onCreate()` callback\nor\
    \ more dynamically at any other suitable place. The `fragm_container` is,\nfor\
    \ example, a `<FrameLayout>`\nelement inside the layout XML   .\n\nNote\n\nA fragment\
    \ gets its ID from the fragment manager during adding it\ninside a transaction.\
    \ You cannot use it before that, and you cannot\nprovide your own ID if you add\
    \ fragments in Kotlin code.\n\nHandling Fragments from Activities\n\nHandling\
    \ fragments\n   from\ninside activities includes\n\n*   Adding fragments, as shown\
    \ previously in the “Creating Fragments”\n    section\n\n*   Getting references\
    \ to fragments, given an ID or a tag\n\n*   Handling the back stack\n\n*   Registering\
    \ listeners for lifecycle events\n\nFor all these needs, you use `getSupportFragmentManager()`,\n\
    which gives you the fragment manager, which is capable of doing all\nthat, or\
    \ in Kotlin simply just use the accessor\n\n```\nsupportFragmentManager\n```\n\
    \nto fetch a reference.\n\nNote\n\nThere is also a `fragmentManager`\nwithout\
    \ the “support” in the name. That one points to the framework’s\nfragment manager\
    \ as opposed to the support library fragment manager.\nUsing the support fragment\
    \ manager however improves the compatibility\nwith older API levels.\n\nCommunicating\
    \ with Fragments\n\nActivities can communicate  with their\nfragments by using\
    \ the fragment manager and finding fragments given\ntheir ID or tag:\n\n```\n\
    val fragm = supportFragmentManager.\nfindFragmentByTag(\"fragmTag\")\n// or val\
    \ fragm = supportFragmentManager.\n//          findFragmentById(fragmId)\n```\n\
    \nBut fragments also can talk to their activity. This might indicate a\npoor application\
    \ design, for fragments should be self-contained\nentities. If you still need\
    \ it, you can use `getActivity()` inside\nthe fragment class or in Kotlin simply\n\
    \n```\nactivity\n```\n\nto access it. And from there a fragment  can even\nfetch\
    \ references to other fragments.\n\nApp Widgets\nApp widgets \n  are their own\n\
    class of applications that show informational messages and/or\ncontrollers in\
    \ other apps, especially the home screen. App widgets get\nimplemented as special\
    \ broadcast receivers and as such are subject to\nbeing killed by the Android\
    \ OS once the callback methods have done their\nwork and a couple of seconds have\
    \ passed by after that. If you need to\nhave longer process run, consider starting\
    \ *services* from inside\nthe app widgets.\n\nTo start creating an app widget,\
    \ write inside `AndroidManifest.xml`,\nmore precisely as a child element of `<application>`\n\
    \nNext, create metadata inside the resources: create a new file `example_appwidget_info.xml`\n\
    inside `res/xml`\nand write inside\n\nWhat is left is creating the broadcast listener\
    \    class – for this aim\nit is easiest to inherit from class `android.appwidget.AppWidgetProvider`\n\
    and, for example, write\n\n```\nclass ExampleAppWidgetProvider : AppWidgetProvider()\
    \ {\noverride\nfun onUpdate(context: Context,\nappWidgetManager: AppWidgetManager,\n\
    appWidgetIds:IntArray) {\n// Perform this loop procedure for each App\n// Widget\
    \ that belongs to this provider\nfor(appWidgetId in appWidgetIds) {\n// This is\
    \ just an example, you can do other\n// stuff here...\n// Create an Intent to\
    \ launch MainActivity\nval intent = Intent(context,\nMainActivity::class.java)\n\
    val pendingIntent = PendingIntent.\ngetActivity(context, 0, intent, 0)\n// Attach\
    \ listener to the button\nval views =\nRemoteViews(context.getPackageName(),\n\
    R.layout.appwidget_provider_layout)\nviews.setOnClickPendingIntent(\nR.id.button,\
    \ pendingIntent)\n// Tell the AppWidgetManager to perform an\n// update on the\
    \ app widget\nappWidgetManager.updateAppWidget(\nappWidgetId, views)\n}\n}\n}\n\
    ```\n\nAn *app widget provider*     can serve several app\nwidgets; that is why\
    \ we have to go through a loop inside the setup.\nSince this needs a layout file\
    \ ciappwidget_provider_layout.xml, we\ncreate this one inside `res/layout` and,\
    \ for\nexample, write\n\nNote\n\nNot all layout containers and views are allowed\
    \ inside the layout\nfile for an app widget – you can use one of `FrameLayout`,\
    \ `LinearLayout`, `RelativeLayout`, `GridLayout`, `AnalogClock`, `Button`, `Chronometer`,\
    \ `ImageButton`, `ImageView`, `ProgressBar`, `TextView`, `ViewFlipper`, `ListView`,\
    \ `GridView`, `StackView`, and `AdapterViewFlipper`.\nThe user must still decide\
    \ to activate an app widget by long-tapping\nthe app icon and then placing it\
    \ on the home screen. Because not all\nusers know this, the functionality of an\
    \ app should not depend on\nwhether it gets set as an app widget on the home screen\
    \ or not.\n\nApp widgets \n  can have a\nconfiguration activity attached to them.\
    \ This special activity gets\ncalled once the user tries to place the app widget\
    \ on the home screen.\nThe user then may, for example, be asked for some settings\
    \ concerning\nappearance or functioning. To install such an activity, you write\
    \ inside\n`AndroidManifest.xml`\n\nThe intent filter shown here is important –\
    \ it tells the system about\nthis special nature of the activity.\n\nThe app widget\
    \ configuration activity must then be added to the XML\nconfiguration file `example_appwidget_info.xml`:\n\
    add\n\n```\nandroid:configure=\n\"full.class.name.ExampleAppWidgetConfigure\"\n\
    ```\n\nas an additional attribute, using the fully qualified name of the\nconfiguration\
    \ class.\n\nThe configuration activity    itself is asked to\nreturn the app widget\
    \ ID as follows:\n\n```\nclass ExampleAppWidgetConfigure : AppCompatActivity()\
    \ {\nvar awi:Int = 0\noverride fun onCreate(savedInstanceState: Bundle?) {\nsuper.onCreate(savedInstanceState)\n\
    setContentView(R.layout.activity_conf)\nawi = intent.extras.getInt(\nAppWidgetManager.EXTRA_APPWIDGET_ID)\n\
    Toast.makeText(this,\"\" + awi, Toast.LENGTH_LONG).\nshow()\n// do more configuration\
    \ stuff...\n}\nfun goBack(view: View) {\n// just an example...\nval data = Intent()\n\
    data.putExtra(AppWidgetManager.EXTRA_APPWIDGET_ID,\nawi)\nsetResult(RESULT_OK,\
    \ data)\nfinish()\n}\n}\n```\n\nNote\n\nThe app widget’s `onUpdate()` method \
    \   does not get called\n*the first time* the configuration activity exits – it\
    \ is the\nresponsibility of the configuration activity to accordingly call `updateAppWidget()`\
    \ on\nthe app widget manager if needed.\n\nDrag-and-Drop\n\nAndroid supports drag-and-drop\
    \  for any\nkind of UI element and layout. The idea is as follows:\n\n*   The\
    \ app defines a gesture  that defines\n    the start of a drag operation. You\
    \ are totally free to define this\n    gesture – usual candidates are touch or\
    \ touch and move operations, but\n    you can also start drag operations programmatically.\n\
    \n*   If the drag-and-drop designates some kind of data transfer , you may\n \
    \   assign a data snippet of type `android.content.ClipData`\n    to the drag\
    \ operation.\n\n*   Views \n    that take part of this drag-and-drop operation\
    \ – this includes\n    *any* drag source and *all* possible drop targets – get\
    \ a\n    customized `View.OnDragListener`\n    object assigned.\n\n*   While the\
    \ dragging is in progress, the dragged target gets\n    visually represented by\
    \ a moving *shadow* object . You are free\n    to define it – it could be a star,\
    \ a box, or any kind of graphics\n    resembling the drag source. You only have\
    \ to tell the system how to\n    paint it – the positioning during the drag operation\
    \ gets automatically\n    handled by the Android OS. Because the drag source stays\
    \ in place during\n    the drag operation, the layout remains static all the time,\
    \ and the\n    dragging does not thwart layout operations by the layout\n    manager.\n\
    \n*   When the drag shadow enters the area of a possible drop target,\n    the\
    \ listener gets informed about that, and you can react by, for\n    example, changing\
    \ the visual appearance of the drop candidate."
  trans: "\n# 从 Kotlin 代码中添加 Fragment\n\n要从 Kotlin 代码内部添加 Fragment，你需要确定一个用于放置 Fragment\
    \ 的布局容器或 `ViewGroup`，然后使用 Fragment 管理器执行插入操作：\n\n```\nwith(supportFragmentManager.beginTransaction())\
    \ {\n    val fragment = MyFragment()\n    add(fragm_container.id, fragment, \"\
    fragmTag\")\n    val fragmentId = fragment.id // 之后可以使用...\n    commit()\n}\n\
    ```\n\n例如，这可以发生在 Activity 的 `onCreate()` 回调中，或者更动态地在其他任何合适的位置。`fragm_container`\
    \ 例如是布局 XML 中的一个 ` <FrameLayout>` 元素。\n\n> **注意**\n> Fragment 在事务中添加时，会从 Fragment\
    \ 管理器获取其 ID。在此之前你无法使用它，并且如果在 Kotlin 代码中添加 Fragment，你也无法提供自己的 ID。\n\n# 从 Activity\
    \ 管理 Fragment\n\n从 Activity 内部管理 Fragment 包括：\n\n- 添加 Fragment，如先前“创建 Fragment”部分所示\n\
    - 根据 ID 或标签获取 Fragment 的引用\n- 处理返回栈\n- 为生命周期事件注册监听器\n\n对于所有这些需求，你可以使用 `getSupportFragmentManager()`，它会给你一个能够处理所有这些事务的\
    \ Fragment 管理器，或者在 Kotlin 中直接使用访问器：\n\n```\nsupportFragmentManager\n```\n\n来获取一个引用。\n\
    \n> **注意**\n> 还有一个名称中不带“support”的 `fragmentManager`。它指向框架的 Fragment 管理器，而非支持库的\
    \ Fragment 管理器。不过，使用支持 Fragment 管理器可以提高与旧版 API 级别的兼容性。\n\n# 与 Fragment 通信\n\n\
    Activity 可以通过使用 Fragment 管理器并根据其 ID 或标签查找 Fragment 来与其 Fragment 进行通信：\n\n```\n\
    val fragm = supportFragmentManager.findFragmentByTag(\"fragmTag\")\n// 或 val fragm\
    \ = supportFragmentManager.findFragmentById(fragmId)\n```\n\n但 Fragment 也可以与其\
    \ Activity 通信。这可能表明应用设计不佳，因为 Fragment 应该是自包含的实体。如果你仍然需要，可以在 Fragment 类内部使用 `getActivity()`，或者在\
    \ Kotlin 中直接使用：\n\n```\nactivity\n```\n\n来访问它。并且从那里，Fragment 甚至可以获取其他 Fragment\
    \ 的引用。\n\n# 应用微件\n\n应用微件是一类特殊的应用，用于在其他应用（尤其是主屏幕）中显示信息性消息和/或控制器。应用微件作为特殊的广播接收器实现，因此一旦回调方法完成其工作，并且过后几秒钟，它们就有可能被\
    \ Android 操作系统终止。如果你需要运行较长的进程，请考虑从应用微件内部启动*服务*。\n\n要开始创建应用微件，请在 `AndroidManifest.xml`\
    \ 中编写，更确切地说，是作为 `<application>` 的子元素。\n\n接下来，在资源中创建元数据：在 `res/xml` 中创建一个新文件 `example_appwidget_info.xml`\
    \ 并写入内容。\n\n剩下的就是创建广播监听器类——为此，最简单的方法是继承 `android.appwidget.AppWidgetProvider`\
    \ 类，并例如编写：\n\n```\nclass ExampleAppWidgetProvider : AppWidgetProvider() {\n  \
    \  override fun onUpdate(context: Context,\n                          appWidgetManager:\
    \ AppWidgetManager,\n                          appWidgetIds: IntArray) {\n   \
    \     // 为属于此提供者的每个\n        // 应用微件执行此循环过程\n        for (appWidgetId in appWidgetIds)\
    \ {\n            // 这只是一个示例，你可以在此处\n            // 做其他事情...\n            // 创建一个\
    \ Intent 启动 MainActivity\n            val intent = Intent(context, MainActivity::class.java)\n\
    \            val pendingIntent = PendingIntent.getActivity(context, 0, intent,\
    \ 0)\n            // 为按钮附加监听器\n            val views = RemoteViews(context.getPackageName(),\n\
    \                                    R.layout.appwidget_provider_layout)\n   \
    \         views.setOnClickPendingIntent(R.id.button, pendingIntent)\n        \
    \    // 通知 AppWidgetManager 对应用微件\n            // 执行更新\n            appWidgetManager.updateAppWidget(appWidgetId,\
    \ views)\n        }\n    }\n}\n```\n\n一个*应用微件提供者*可以为多个应用微件提供服务；这就是为什么我们需要在设置中遍历循环。由于这需要一个布局文件\
    \ `appwidget_provider_layout.xml`，我们可以在 `res/layout` 中创建它，并例如编写内容。\n\n> **注意**\n\
    > 并非所有布局容器和视图都允许出现在应用微件的布局文件中——你可以使用 `FrameLayout`、`LinearLayout`、`RelativeLayout`、`GridLayout`、`AnalogClock`、`Button`、`Chronometer`、`ImageButton`、`ImageView`、`ProgressBar`、`TextView`、`ViewFlipper`、`ListView`、`GridView`、`StackView`\
    \ 和 `AdapterViewFlipper` 之一。\n> 用户仍需通过长按应用图标并将其放置在主屏幕上来决定激活应用微件。因为并非所有用户都知道这一点，应用的功能不应依赖于它是否被设置为主屏幕上的应用微件。\n\
    \n应用微件可以附加一个配置 Activity。当用户尝试将应用微件放置在主屏幕上时，会调用这个特殊的 Activity。然后，用户可以例如被询问一些关于外观或功能的设置。要安装这样一个\
    \ Activity，请在 `AndroidManifest.xml` 中编写。\n\n这里显示的 Intent 过滤器很重要——它告诉系统此 Activity\
    \ 的特殊性质。\n\n然后，必须将应用微件配置 Activity 添加到 XML 配置文件 `example_appwidget_info.xml` 中：添加以下内容：\n\
    \n```\nandroid:configure=\"full.class.name.ExampleAppWidgetConfigure\"\n```\n\n\
    作为额外的属性，并使用配置类的完整限定名。\n\n配置 Activity 本身需要按如下方式返回应用微件 ID：\n\n```\nclass ExampleAppWidgetConfigure\
    \ : AppCompatActivity() {\n    var awi: Int = 0\n    override fun onCreate(savedInstanceState:\
    \ Bundle?) {\n        super.onCreate(savedInstanceState)\n        setContentView(R.layout.activity_conf)\n\
    \        awi = intent.extras.getInt(AppWidgetManager.EXTRA_APPWIDGET_ID)\n   \
    \     Toast.makeText(this, \"\" + awi, Toast.LENGTH_LONG).show()\n        // 做更多配置工作...\n\
    \    }\n    fun goBack(view: View) {\n        // 只是一个示例...\n        val data =\
    \ Intent()\n        data.putExtra(AppWidgetManager.EXTRA_APPWIDGET_ID, awi)\n\
    \        setResult(RESULT_OK, data)\n        finish()\n    }\n}\n```\n\n> **注意**\n\
    > 应用微件的 `onUpdate()` 方法在配置 Activity 退出时*第一次*不会被调用——如果需要，配置 Activity 有责任相应地调用应用微件管理器上的\
    \ `updateAppWidget()` 方法。\n\n# 拖放\n\nAndroid 支持任何类型的 UI 元素和布局的拖放。其思路如下：\n\n- 应用定义一个手势来标识拖放操作的开始。你可以完全自由地定义这个手势——通常的候选是触摸或触摸并移动操作，但你也可以以编程方式启动拖放操作。\n\
    \n- 如果拖放指定了某种数据传输，你可以将一个 `android.content.ClipData` 类型的数据片段分配给拖放操作。\n\n- 参与此拖放操作的视图（包括*任何*拖放源和*所有*可能的放置目标）会被分配一个自定义的\
    \ `View.OnDragListener` 对象。\n\n- 当拖放进行中时，拖动的目标会通过一个移动的*阴影*对象进行视觉呈现。你可以自由定义它——它可以是一个星星、一个方框或任何类似于拖动源的图形。你只需告诉系统如何绘制它——拖放操作期间的定位由\
    \ Android 操作系统自动处理。由于拖动源在拖放操作期间保持原位，布局始终保持静态，并且拖动不会阻碍布局管理器的布局操作。\n\n- 当拖放阴影进入可能的放置目标区域时，监听器会收到通知，你可以通过例如更改放置候选对象的视觉外观来做出反应。\n"
- fmt: "# Drag and Drop Implementation Guide\n\nBecause all drag sources and possible\
    \ drop targets get informed about the various dragging states, you are free to\
    \ visually express that by using different view appearances.\n\nOnce a drop happens,\
    \ the listener gets informed, and you can freely react on such drop events.\n\n\
    It is also possible to not use a dedicated drag-and-drop listener but instead\
    \ overwrite some specific methods of the views taking part in drag-and-drop operations.\
    \ The downside of that is you have to use the customized views inside the layout\
    \ description, which makes it somewhat less readable. Also from an architectural\
    \ point of view, the views then know too much of what is happening *to* them,\
    \ which is an external concern and as such better gets handled from outside objects.\
    \ We therefore follow the listener approach and in the following sections describe\
    \ what exactly to do for this methodology.\n\n## Defining Drag Data\n\nIf your\
    \ drag-and-drop operation defines some kind of data transfer from one object represented\
    \ by a view to another, you define a `ClipData` object, for example, as follows:\n\
    \n```\nval item = ClipData.Item(myView.tag.toString())\nval dragData = ClipData(myView.tag.toString(),\n\
    arrayOf(MIMETYPE_TEXT_PLAIN), item)\n```\n\nThe first argument to the constructor\
    \ is a user-readable label for the clip data, the second describes the type of\
    \ the contents by assigning appropriate MIME types, and the `item` argument represents\
    \ the data to be transported, here the string given by the `tag` attribute of\
    \ the view. Other item types are `Intents` and `URIs`, to be specified in the\
    \ constructor of `ClipData.Item`.\n\n## Defining a Drag Shadow\n\nThe drag shadow\
    \ is the visible element painted underneath your finger while the dragging is\
    \ in progress. You define the shadow in an object like in:\n\n```\nclass DragShadow(val\
    \ resources: Resources, val resId:Int,\nview: ImageView) : View.DragShadowBuilder(view)\
    \ {\nval rect = Rect()\n// Defines a callback that sends the drag shadow\n// dimensions\
    \ and touch point back to the\n// system.\noverride\nfun onProvideShadowMetrics(size:\
    \ Point, touch: Point) {\nval width = view.width\nval height = view.height\nrect.set(0,\
    \ 0, width, height)\n// Back to the system through the size parameter.\nsize.set(width,\
    \ height)\n// The touch point's position in the middle\ntouch.set(width / 2, height\
    \ / 2)\n}\n// Defines a callback that draws the drag shadow in a\n// Canvas\n\
    override\nfun onDrawShadow(canvas: Canvas) {\ncanvas.drawBitmap(\nBitmapFactory.decodeResource(\n\
    resources, resId),\nnull, rect, null)\n}\n}\n```\n\nThis example draws a bitmap\
    \ resource, but you can do anything you like here.\n\n## Starting a Drag\n\nTo\
    \ start a drag you invoke `startDragAndDrop()` for API levels 24 and higher, or\
    \ `startDrag()` else, on the view object, which serves as a drag source. An example\
    \ would be:\n\n```\ntheView.setOnTouchListener { view, event ->\nif(event.action\
    \ == MotionEvent.ACTION_DOWN) {\nval shadow = DragShadow(resources,\nR.the_dragging_image,\
    \ theView)\nval item = ClipData.Item(frog.tag.toString())\nval dragData = ClipData(frog.tag.toString(),\n\
    arrayOf(MIMETYPE_TEXT_PLAIN), item)\nif (Build.VERSION.SDK_INT >=\nBuild.VERSION_CODES.N)\
    \ {\ntheView.startDragAndDrop(dragData, shadow,\nnull, 0)\n} else {\ntheView.startDrag(dragData,\
    \ shadow,\nnull, 0)\n}\n}\ntrue\n}\n```\n\nIf the drag operation is *not* associated\
    \ with a data type, you can just as well let `dragData` be `null`. In this case\
    \ you don't have to build a `ClipData` object.\n\n## Listening to Drag Events\n\
    \nThe complete set of events occurring during a drag-and-drop operation is governed\
    \ by a drag-and-drop listener. An example would be:\n\n```\nclass MyDragListener\
    \ : View.OnDragListener {\noverride\nfun onDrag(v: View, event: DragEvent): Boolean\
    \ {\nvar res = true\nwhen(event.action) {\nDragEvent.ACTION_DRAG_STARTED -> {\n\
    when(v.tag) {\n\"DragSource\" -> { res = false\n/*not a drop receiver*/ }\n\"\
    OneTarget\" -> {\n// could visibly change\n// possible drop receivers\n}\n}\n\
    }\nDragEvent.ACTION_DRAG_ENDED -> {\nwhen(v.tag) {\n\"OneTarget\" -> {\n// could\
    \ visibly change\n// possible drop receivers\n}\n}\n}\nDragEvent.ACTION_DROP ->\
    \ {\nwhen(v.tag) {\n\"OneTarget\" -> {\n// visually revert drop\n// receiver ...\n\
    }\n}\nToast.makeText(v.context, \"dropped!\",\nToast.LENGTH_LONG).show()\n}\n\
    DragEvent.ACTION_DRAG_ENTERED -> {\nwhen(v.tag) {\n\"OneTarget\" -> {\n// could\
    \ visibly change\n// possible drop receivers\n}\n}\n}\nDragEvent.ACTION_DRAG_EXITED\
    \ -> {\nwhen(v.tag) {\n\"OneTarget\" -> {\n// visually revert drop\n// receiver\
    \ ...\n}\n}\n}\n}\nreturn res\n}\n}\n```\n\nYou can see that we are listening\
    \ to drag start and end events and also to the shadow entering or exiting a possible\
    \ drop area and to drop events. As pointed out, how you react to all these events\
    \ is totally up to you.\n\n> **Note**  \n> In the example we use a `tag` attribute\
    \ assigned to a view to identify the view as part of a drag-and-drop operation.\
    \ In fact you can also use the ID or any other way you might think of.\n\nWhat\
    \ is left is inside, for example, the activity's `onCreate()` callback you register\
    \ the listener to all views that participate in a drag-and-drop operation:\n\n\
    ```\noverride fun onCreate(savedInstanceState: Bundle?) {\nsuper.onCreate(savedInstanceState)\n\
    setContentView(R.layout.activity_main)\ntheView.setOnTouchListener ...\nval dragListener\
    \ = MyDragListener()\ntheView.setOnDragListener(dragListener)\notherView.setOnDragListener(dragListener)\n\
    ...\n}\n```\n\n## Multitouch\n\nMultitouch events in Android OS are surprisingly\
    \ easy to handle. All you need is overwrite the `onTouchEvent()` method of a `View`\
    \ or a `ViewGroup` element. Inside the `onTouchEvent()` you fetch the masked action\
    \ and act upon it:\n\n```\nfrog.setOnTouchListener { view, event ->\ntrue\n}\n\
    ```\n\n> **Note**  \n> In older versions of Android, you usually dispatch on the\
    \ action as in `event.action`. With multitouch gestures it is better to act on\
    \ the `maskedAction` – see in the following.\n\nInside the listener, you get the\
    \ masked action by `event.actionMasked` and pass it to a `when(){ .. }` statement.\n\
    \nThe magic now lies in this listener being invoked for all fingers (here called\
    \ *pointers*) consecutively. To find out how many fingers currently are registered,\
    \ you use `event.pointerCount`, and if you want to know which finger the event\
    \ belongs to, you use `val index = event.actionIndex`. A starting point is thus:\n\
    \n```\ntheView.setOnTouchListener { view,event ->\nfun actionToString(action:Int)\
    \ : String = mapOf(\nMotionEvent.ACTION_DOWN to \"Down\",\nMotionEvent.ACTION_MOVE\
    \ to \"Move\",\nMotionEvent.ACTION_POINTER_DOWN to \"Pointer Down\",\nMotionEvent.ACTION_UP\
    \ to \"Up\",\nMotionEvent.ACTION_POINTER_UP to \"Pointer Up\",\nMotionEvent.ACTION_OUTSIDE\
    \ to \"Outside\",\nMotionEvent.ACTION_CANCEL to \"Cancel\").\ngetOrDefault(action,\"\
    \")\nval action = event.actionMasked\nval index = event.actionIndex\nvar xPos\
    \ = -1\nvar yPos = -1\nLog.d(\"LOG\", \"The action is \" +\nactionToString(action))\n\
    if (event.pointerCount > 1) {\nLog.d(\"LOG\", \"Multitouch event\")\n// The coordinates\
    \ of the current screen contact,\n// relative to the responding View or Activity.\n\
    xPos = event.getX(index).toInt()\nyPos = event.getY(index).toInt()\n} else {\n\
    // Single touch event\nLog.d(\"LOG\", \"Single touch event\")\nxPos = event.getX(index).toInt()\n\
    yPos = event.getY(index).toInt()\n}\n// do more things...\ntrue\n}\n```\n\n##\
    \ Picture-in-Picture Mode\n\nStarting with Android 8.0 or API level 26, there\
    \ exists a picture-in-picture mode where an activity gets shrunk and pinned to\
    \ an edge of the screen. This is especially useful if the activity plays a video\
    \ and you want the video to keep playing while another activity shows up.\n\n\
    To enable the picture-in-picture mode, inside `AndroidManifest.xml` add the following\
    \ attributes to `<activity>`:"
  raw: "*   Because all drag sources and possible drop targets get informed\n    about\
    \ the various dragging states, you are free to visually express that\n    by using\
    \ different view appearances.\n\n*   Once a drop happens, the listener gets informed,\
    \ and you can\n    freely react on such drop events.\n\nIt is also possible to\
    \ not use a dedicated drag-and-drop listener but\ninstead overwrite some specific\
    \ methods of the views taking part in\ndrag-and-drop operations. The downside\
    \ of that is you have to use the\ncustomized views \ninside the layout description,\
    \ which makes it somewhat less readable.\nAlso from an architectural point of\
    \ view, the views then know too much\nof what is happening *to* them, which is\
    \ an external concern and\nas such better gets handled from outside objects. We\
    \ therefore follow\nthe listener approach and in the following sections describe\
    \ what\nexactly to do for this methodology.\n\nDefining Drag Data\n\nIf your drag-and-drop\
    \ operation defines    some kind of data\ntransfer from one object represented\
    \ by a view to another, you define a\n`ClipData`\nobject, for example, as follows:\n\
    \n```\nval item = ClipData.Item(myView.tag.toString())\nval dragData = ClipData(myView.tag.toString(),\n\
    arrayOf(MIMETYPE_TEXT_PLAIN), item)\n```\n\nThe first argument to the constructor\
    \ is a user-readable label for\nthe clip data, the second describes the type of\
    \ the contents by\nassigning appropriate MIME types, and the `item` argument\n\
    represents the data to be transported, here the string given by the\n`tag` attribute\
    \    of the view. Other\nitem types are Intents and URIs, to be specified in the\
    \ constructor of\n`ClipData.Item`.\n\nDefining a Drag Shadow\n\nThe drag shadow\
    \ \n  is the visible\nelement painted underneath your finger while the dragging\
    \ is in\nprogress. You define the shadow in an object like in\n\n```\nclass DragShadow(val\
    \ resources: Resources, val resId:Int,\nview: ImageView) : View.DragShadowBuilder(view)\
    \ {\nval rect = Rect()\n// Defines a callback that sends the drag shadow\n// dimensions\
    \ and touch point back to the\n// system.\noverride\nfun onProvideShadowMetrics(size:\
    \ Point, touch: Point) {\nval width = view.width\nval height = view.height\nrect.set(0,\
    \ 0, width, height)\n// Back to the system through the size parameter.\nsize.set(width,\
    \ height)\n// The touch point's position in the middle\ntouch.set(width / 2, height\
    \ / 2)\n}\n// Defines a callback that draws the drag shadow in a\n// Canvas\n\
    override\nfun onDrawShadow(canvas: Canvas) {\ncanvas.drawBitmap(\nBitmapFactory.decodeResource(\n\
    resources, resId),\nnull, rect, null)\n}\n}\n```\n\nThis example draws a bitmap\
    \    resource, but you can\ndo anything you like here.\n\nStarting a Drag\n\n\
    To start a drag \nyou invoke `startDragAndDrop()`\nfor API levels 24 and higher,\
    \ or `startDrag()` else, on\nthe view object, which serves as a drag source. An\
    \ example would be\n\n```\ntheView.setOnTouchListener { view, event ->\nif(event.action\
    \ == MotionEvent.ACTION_DOWN) {\nval shadow = DragShadow(resources,\nR.the_dragging_image,\
    \ theView)\nval item = ClipData.Item(frog.tag.toString())\nval dragData = ClipData(frog.tag.toString(),\n\
    arrayOf(MIMETYPE_TEXT_PLAIN), item)\nif (Build.VERSION.SDK_INT >=\nBuild.VERSION_CODES.N)\
    \ {\ntheView.startDragAndDrop(dragData, shadow,\nnull, 0)\n} else {\ntheView.startDrag(dragData,\
    \ shadow,\nnull, 0)\n}\n}\ntrue\n}\n```\n\nIf the drag operation is *not* associated\
    \ with a data type,\nyou can just as well let `dragData`   be `null`. In this\
    \ case\nyou don’t have to build a `ClipData` object.\n\nListening to Drag Events\n\
    \nThe complete set of events  occurring\nduring a drag-and-drop operation is governed\
    \ by a drag-and-drop\nlistener. An example would be\n\n```\nclass MyDragListener\
    \ : View.OnDragListener {\noverride\nfun onDrag(v: View, event: DragEvent): Boolean\
    \ {\nvar res = true\nwhen(event.action) {\nDragEvent.ACTION_DRAG_STARTED -> {\n\
    when(v.tag) {\n\"DragSource\" -> { res = false\n/*not a drop receiver*/ }\n\"\
    OneTarget\" -> {\n// could visibly change\n// possible drop receivers\n}\n}\n\
    }\nDragEvent.ACTION_DRAG_ENDED -> {\nwhen(v.tag) {\n\"OneTarget\" -> {\n// could\
    \ visibly change\n// possible drop receivers\n}\n}\n}\nDragEvent.ACTION_DROP ->\
    \ {\nwhen(v.tag) {\n\"OneTarget\" -> {\n// visually revert drop\n// receiver ...\n\
    }\n}\nToast.makeText(v.context, \"dropped!\",\nToast.LENGTH_LONG).show()\n}\n\
    DragEvent.ACTION_DRAG_ENTERED -> {\nwhen(v.tag) {\n\"OneTarget\" -> {\n// could\
    \ visibly change\n// possible drop receivers\n}\n}\n}\nDragEvent.ACTION_DRAG_EXITED\
    \ -> {\nwhen(v.tag) {\n\"OneTarget\" -> {\n// visually revert drop\n// receiver\
    \ ...\n}\n}\n}\n}\nreturn res\n}\n}\n```\n\nYou can see that we are listening\
    \  to drag\nstart and end events and also to the shadow entering or exiting a\n\
    possible drop area and to drop events. As pointed out, how you react to\nall these\
    \ events is totally up to you.\n\nNote\n\nIn the example we use a `tag` attribute\n\
    assigned to a view to identify the view as part of a drag-and-drop\noperation.\
    \ In fact you can also use the ID or any other way you might\nthink of.\n\nWhat\
    \ is left is inside, for example, the activity’s `onCreate()` callback\nyou register\
    \ the listener to all views that participate in a\ndrag-and-drop operation\n:\n\
    \n```\noverride fun onCreate(savedInstanceState: Bundle?) {\nsuper.onCreate(savedInstanceState)\n\
    setContentView(R.layout.activity_main)\ntheView.setOnTouchListener ...\nval dragListener\
    \ = MyDragListener()\ntheView.setOnDragListener(dragListener)\notherView.setOnDragListener(dragListener)\n\
    ...\n}\n```\n\nMultitouch\n\nMultitouch events\n   in\nAndroid OS are surprisingly\
    \ easy to handle. All you need is overwrite\nthe `onTouchEvent()` method  of a\
    \ `View` or a `ViewGroup` element.\nInside the `onTouchEvent()` you\nfetch the\
    \ masked action and act upon it:\n\n```\nfrog.setOnTouchListener { view, event\
    \ ->\ntrue\n}\n```\n\nNote\n\nIn older versions of Android, you usually dispatch\
    \ on the action as\nin `event.action`. With\nmultitouch gestures it is better\
    \ to act on the `maskedAction` – see in\nthe following.\n\nInside the listener,\
    \ you get the masked action by `event.actionMasked`\nand pass it to a `when(){\
    \ .. }`\nstatement.\n\nThe magic now lies in this listener being invoked for all\
    \ fingers (here\ncalled *pointers*) consecutively. To find out how many fingers\
    \    currently are\nregistered, you use `event.pointerCount`,\nand if you want\
    \ to know which finger the event belongs to, you use `val index = event.actionIndex`.\
    \ A starting point is thus\n\n```\ntheView.setOnTouchListener { view,event ->\n\
    fun actionToString(action:Int) : String = mapOf(\nMotionEvent.ACTION_DOWN to \"\
    Down\",\nMotionEvent.ACTION_MOVE to \"Move\",\nMotionEvent.ACTION_POINTER_DOWN\
    \ to \"Pointer Down\",\nMotionEvent.ACTION_UP to \"Up\",\nMotionEvent.ACTION_POINTER_UP\
    \ to \"Pointer Up\",\nMotionEvent.ACTION_OUTSIDE to \"Outside\",\nMotionEvent.ACTION_CANCEL\
    \ to \"Cancel\").\ngetOrDefault(action,\"\")\nval action = event.actionMasked\n\
    val index = event.actionIndex\nvar xPos = -1\nvar yPos = -1\nLog.d(\"LOG\", \"\
    The action is \" +\nactionToString(action))\nif (event.pointerCount > 1) {\nLog.d(\"\
    LOG\", \"Multitouch event\")\n// The coordinates of the current screen contact,\n\
    // relative to the responding View or Activity.\nxPos = event.getX(index).toInt()\n\
    yPos = event.getY(index).toInt()\n} else {\n// Single touch event\nLog.d(\"LOG\"\
    , \"Single touch event\")\nxPos = event.getX(index).toInt()\nyPos = event.getY(index).toInt()\n\
    }\n// do more things...\ntrue\n}\n```\n\nPicture-in-Picture Mode\nStarting with\
    \ Android\n   8.0 or\nAPI level 26, there exists a picture-in-picture mode where\
    \ an activity\ngets shrunk and pinned to an edge of the screen. This is especially\n\
    useful if the activity plays a video and you want the video to keep\nplaying while\
    \ another activity shows up.\n\nTo enable the picture-in-picture mode, inside\
    \ `AndroidManifest.xml`\nadd the following attributes to `<activity>`:"
  trans: "\n# 拖放实现指南\n\n由于所有拖拽源和可能的放置目标都会获知各种拖拽状态，您可以自由地通过不同的视图外观来直观地表达这些状态。\n\n一旦发生放置操作，监听器便会收到通知，您可以自由地对此类放置事件做出响应。\n\
    \n还可以不专门使用拖放监听器，而是重写参与拖放操作的视图的某些特定方法。这样做的缺点是必须在布局描述中使用自定义视图，这会使代码可读性降低。此外，从架构角度来看，视图会过多地了解正在*对其*发生的事情，这属于外部关注点，因此最好由外部对象来处理。因此，我们采用监听器方法，并在接下来的章节中描述此方法的具体操作步骤。\n\
    \n## 定义拖放数据\n\n如果您的拖放操作定义了某种从视图所代表的对象到另一个对象的数据传输，您可以按如下方式定义 `ClipData` 对象：\n\n\
    ```\nval item = ClipData.Item(myView.tag.toString())\nval dragData = ClipData(myView.tag.toString(),\n\
    arrayOf(MIMETYPE_TEXT_PLAIN), item)\n```\n\n构造函数的第一个参数是剪贴数据的用户可读标签，第二个参数通过分配适当的\
    \ MIME 类型来描述内容类型，`item` 参数表示要传输的数据，此处是视图的 `tag` 属性给出的字符串。其他项类型为 `Intents` 和 `URIs`，需在\
    \ `ClipData.Item` 的构造函数中指定。\n\n## 定义拖拽阴影\n\n拖拽阴影是拖拽进行时绘制在手指下方的可见元素。您可以按如下方式在对象中定义阴影：\n\
    \n```\nclass DragShadow(val resources: Resources, val resId:Int,\nview: ImageView)\
    \ : View.DragShadowBuilder(view) {\nval rect = Rect()\n// 定义回调，将拖拽阴影\n// 尺寸和触摸点信息发送回\n\
    // 系统。\noverride\nfun onProvideShadowMetrics(size: Point, touch: Point) {\nval\
    \ width = view.width\nval height = view.height\nrect.set(0, 0, width, height)\n\
    // 通过 size 参数返回给系统。\nsize.set(width, height)\n// 触摸点位于中间位置\ntouch.set(width /\
    \ 2, height / 2)\n}\n// 定义回调，在画布上绘制拖拽阴影\noverride\nfun onDrawShadow(canvas: Canvas)\
    \ {\ncanvas.drawBitmap(\nBitmapFactory.decodeResource(\nresources, resId),\nnull,\
    \ rect, null)\n}\n}\n```\n\n此示例绘制了一个位图资源，但您也可以在此处执行任何其他操作。\n\n## 开始拖拽\n\n对于 API\
    \ 级别 24 及以上版本，请在充当拖拽源的视图对象上调用 `startDragAndDrop()`，否则调用 `startDrag()`。示例如下：\n\n\
    ```\ntheView.setOnTouchListener { view, event ->\nif(event.action == MotionEvent.ACTION_DOWN)\
    \ {\nval shadow = DragShadow(resources,\nR.the_dragging_image, theView)\nval item\
    \ = ClipData.Item(frog.tag.toString())\nval dragData = ClipData(frog.tag.toString(),\n\
    arrayOf(MIMETYPE_TEXT_PLAIN), item)\nif (Build.VERSION.SDK_INT >=\nBuild.VERSION_CODES.N)\
    \ {\ntheView.startDragAndDrop(dragData, shadow,\nnull, 0)\n} else {\ntheView.startDrag(dragData,\
    \ shadow,\nnull, 0)\n}\n}\ntrue\n}\n```\n\n如果拖拽操作*不*与数据类型关联，您也可以将 `dragData` 设置为\
    \ `null`。在这种情况下，您无需构建 `ClipData` 对象。\n\n## 监听拖拽事件\n\n拖放操作中发生的完整事件集由拖放监听器管理。示例如下：\n\
    \n```\nclass MyDragListener : View.OnDragListener {\noverride\nfun onDrag(v: View,\
    \ event: DragEvent): Boolean {\nvar res = true\nwhen(event.action) {\nDragEvent.ACTION_DRAG_STARTED\
    \ -> {\nwhen(v.tag) {\n\"DragSource\" -> { res = false\n/*不是放置接收器*/ }\n\"OneTarget\"\
    \ -> {\n// 可以明显改变\n// 可能的放置接收器\n}\n}\n}\nDragEvent.ACTION_DRAG_ENDED -> {\nwhen(v.tag)\
    \ {\n\"OneTarget\" -> {\n// 可以明显改变\n// 可能的放置接收器\n}\n}\n}\nDragEvent.ACTION_DROP\
    \ -> {\nwhen(v.tag) {\n\"OneTarget\" -> {\n// 视觉上还原放置\n// 接收器 ...\n}\n}\nToast.makeText(v.context,\
    \ \"已放置！\",\nToast.LENGTH_LONG).show()\n}\nDragEvent.ACTION_DRAG_ENTERED -> {\n\
    when(v.tag) {\n\"OneTarget\" -> {\n// 可以明显改变\n// 可能的放置接收器\n}\n}\n}\nDragEvent.ACTION_DRAG_EXITED\
    \ -> {\nwhen(v.tag) {\n\"OneTarget\" -> {\n// 视觉上还原放置\n// 接收器 ...\n}\n}\n}\n}\n\
    return res\n}\n}\n```\n\n您可以看到我们正在监听拖拽开始和结束事件，以及阴影进入或退出可能的放置区域的事件和放置事件。如前所述，您如何响应所有这些事件完全取决于您。\n\
    \n> **注意**  \n> 在示例中，我们使用分配给视图的 `tag` 属性来标识该视图为拖放操作的一部分。实际上，您也可以使用 ID 或任何其他您能想到的方式。\n\
    \n剩下的就是，例如，在 Activity 的 `onCreate()` 回调中，将监听器注册到所有参与拖放操作的视图：\n\n```\noverride\
    \ fun onCreate(savedInstanceState: Bundle?) {\nsuper.onCreate(savedInstanceState)\n\
    setContentView(R.layout.activity_main)\ntheView.setOnTouchListener ...\nval dragListener\
    \ = MyDragListener()\ntheView.setOnDragListener(dragListener)\notherView.setOnDragListener(dragListener)\n\
    ...\n}\n```\n\n## 多点触控\n\nAndroid 操作系统中的多点触控事件处理起来出奇地简单。您只需重写 `View` 或 `ViewGroup`\
    \ 元素的 `onTouchEvent()` 方法。在 `onTouchEvent()` 内部，您获取掩码后的动作并对其进行处理：\n\n```\nfrog.setOnTouchListener\
    \ { view, event ->\ntrue\n}\n```\n\n> **注意**  \n> 在旧版 Android 中，您通常通过 `event.action`\
    \ 来分发动作。对于多点触控手势，最好使用 `maskedAction` 进行操作——详见下文。\n\n在监听器内部，您通过 `event.actionMasked`\
    \ 获取掩码后的动作，并将其传递给 `when(){ .. }` 语句。\n\n现在，神奇之处在于这个监听器会被所有手指（此处称为*指针*）连续调用。要了解当前注册了多少根手指，请使用\
    \ `event.pointerCount`；如果您想知道事件属于哪根手指，请使用 `val index = event.actionIndex`。因此，起点如下：\n\
    \n```\ntheView.setOnTouchListener { view,event ->\nfun actionToString(action:Int)\
    \ : String = mapOf(\nMotionEvent.ACTION_DOWN to \"按下\",\nMotionEvent.ACTION_MOVE\
    \ to \"移动\",\nMotionEvent.ACTION_POINTER_DOWN to \"指针按下\",\nMotionEvent.ACTION_UP\
    \ to \"抬起\",\nMotionEvent.ACTION_POINTER_UP to \"指针抬起\",\nMotionEvent.ACTION_OUTSIDE\
    \ to \"外部\",\nMotionEvent.ACTION_CANCEL to \"取消\").\ngetOrDefault(action,\"\"\
    )\nval action = event.actionMasked\nval index = event.actionIndex\nvar xPos =\
    \ -1\nvar yPos = -1\nLog.d(\"LOG\", \"动作是 \" +\nactionToString(action))\nif (event.pointerCount\
    \ > 1) {\nLog.d(\"LOG\", \"多点触控事件\")\n// 当前屏幕接触点的坐标，\n// 相对于响应的 View 或 Activity。\n\
    xPos = event.getX(index).toInt()\nyPos = event.getY(index).toInt()\n} else {\n\
    // 单点触控事件\nLog.d(\"LOG\", \"单点触控事件\")\nxPos = event.getX(index).toInt()\nyPos\
    \ = event.getY(index).toInt()\n}\n// 做更多事情...\ntrue\n}\n```\n\n## 画中画模式\n\n从 Android\
    \ 8.0 或 API 级别 26 开始，存在一种画中画模式，其中 Activity 会缩小并固定到屏幕边缘。当 Activity 正在播放视频，并且您希望在另一个\
    \ Activity 出现时视频继续播放时，这尤其有用。\n\n要启用画中画模式，请在 `AndroidManifest.xml` 中的 `<activity>`\
    \ 内添加以下属性：\n"
- fmt: "```xml\n<code_block>\nandroid:resizeableActivity=\"true\"\nandroid:supportsPictureInPicture=\"\
    true\"\nandroid:configChanges=\n\"screenSize|smallestScreenSize|\nscreenLayout|orientation\"\
    \n```\n</code_block>\n\nThen, wherever feasible in your app, you start the picture-in-picture\
    \ mode by:\n\n```xml\nenterPictureInPictureMode()\n```\n\nYou might want to change\
    \ and later revert the layout if the picture-in-picture mode gets entered or exited.\
    \ To do so, overwrite the `onPictureInPictureModeChanged(isInPictureInPictureMode\
    \ : Boolean, newConfig : Configuration)` and react accordingly.\n\n## Text-to-Speech\n\
    \nThe text-to-speech framework allows for text to be converted to audio, either\
    \ directly sent to the audio hardware or sent to a file. Using the corresponding\
    \ `TextToSpeech` class is easy, but you should make sure all necessary resources\
    \ are loaded. For this aim an `Intent` with action `TextToSpeech.Engine.ACTION_CHECK_TTS_DATA`\
    \ should be fired. It is expected to return `TextToSpeech.Engine.CHECK_VOICE_DATA_PASS`;\
    \ if it does not, call another `Intent` with action `TextToSpeech.Engine.ACTION_INSTALL_TTS_DATA`\
    \ to let the user install text-to-speech data.\n\nAn example activity doing all\
