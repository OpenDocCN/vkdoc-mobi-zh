    ]\napplicationIdSuffix \".integration\"\n}\n}\n```\n\nThis defines \na new build\
    \ type “integration” that inherits from “debug” by virtue of\n“initWith” and otherwise\
    \ adds a custom app file suffix and provides a\nplaceholder to be used in the\
