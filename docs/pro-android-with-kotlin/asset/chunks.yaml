    \ the plane\nGLES20.glBindBuffer(GLES20.GL_ARRAY_BUFFER,\nvertBuf)\nGLES20.glBindBuffer(\n\
    GLES20.GL_ELEMENT_ARRAY_BUFFER, idxBuf)\nGLES20.glDrawElements(GLES20.GL_TRIANGLES,\n\
    drawListBuffer.capacity(),\nGLES20.GL_UNSIGNED_SHORT, 0)\nGLES20.glBindBuffer(GLES20.GL_ARRAY_BUFFER,\
    \ 0)\nGLES20.glBindBuffer(\nGLES20.GL_ELEMENT_ARRAY_BUFFER, 0)\n// Disable vertex\
    \ array\nGLES20.glDisableVertexAttribArray(\npositionHandle)\nif(normHandle >=\
    \ 0)\nGLES20.glDisableVertexAttribArray(\nnormHandle)\nif(textureHandle >= 0)\n\
    GLES20.glDisableVertexAttribArray(\ntextureHandle)\nif(colorHandle >= 0)\nGLES20.glDisableVertexAttribArray(\n\
    colorHandle)\n}\n}\n```\n\nUser Input\n\nTo respond to user touch events   , all\
    \ you have to do\nis overwrite the function `onTouchEvent( e: MotionEvent ) :\
    \ Boolean { ... }`. The  `MotionEvent` \nyou receive is able to tell many things:\n\
    \n*   **Touch events:** Touchdown and touch-up\n\n*   **Move events**: Moving\
    \ while touched\n\n*   **Pointer events**: Second, third,… finger\n    touching\n\
    \nBesides that, a couple more events are registered – see the online\ndocumentation\
    \ of  `MotionEvent`\n.\n\nIf we want to listen to touch and move events, the minimum\n\
    implementation for such a listener reads\n\n```\noverride\nfun onTouchEvent(event:\
    \ MotionEvent): Boolean {\nvar handled = true\nwhen(event.actionMasked) {\nMotionEvent.ACTION_DOWN\
    \ -> {\nLog.e(\"LOG\",\"Action: ACTION_DOWN \" +\nevent.toString())\n}\nMotionEvent.ACTION_UP\
    \ -> {\nLog.e(\"LOG\",\"Action: ACTION_UP \" +\nevent.toString())\n}\nMotionEvent.ACTION_MOVE\
    \ -> {\nLog.e(\"LOG\",\"Action: MOVE \" +\nevent.toString())\n}\nelse -> handled\
    \ = false\n}\nreturn handled || super.onTouchEvent(event)\n}\n```\n\nYou can see\
    \ that we return `true` when our\nlistener handles events\n  .\nEspecially if\
    \ we receive an ACTION_DOWN event, returning `true` is important;\notherwise,\
    \ both move and up actions will be ignored.\n\nNote\n\nWe check the `actionMasked`\
    \ accessor\nof the event object, not the `action` accessor as is\nsuggested often.\
    \ The reason for this is that the `action` accessor might\ncontain additional\
    \ bits if a multi-touch event happens. The masked\nvariant is just more reliable.\n\
    \nFast Graphics with Vulkan\nThe *Vulkan* API    is an alternative way\nfor addressing\
    \ high-performance 3D graphics needs on Android devices.\nCompared with OpenGL,\
    \ Vulkan somewhat better fits video game programming\nmethodologies, and with\
    \ its development starting in 2016, it is arguably\nthe more modern framework\
    \ (OpenGL exists since 1992).\nIn this book we don’t further talk about Vulkan,\
    \ but [https://​developer.​android.​com/​ndk/​guides/​graphics/​getting-started](https://developer.android.com/ndk/guides/graphics/getting-started)\n\
    and [www.​khronos.​org/​vulkan/​](http://www.khronos.org/vulkan/) give you a\n\
    good starting point if you want to learn more about it.\n\nUI Design with Movable\
    \ Items\nIf your app needs movable UI  elements, you best\nuse the `FrameLayout`\
    \ class or\na subclass of it. We want to take care of UI element positions ourselves\n\
    and don’t want a layout class to interfere with that. The  `FrameLayout` \nclass\
    \ does not position its elements dynamically, so using it is a good\nchoice for\
    \ that kind of positioning.\n\nIf you want your view movable, you create a subclass\
    \ and overwrite its\n`onTouchEvent()`\nmethod . For\nexample, say you have an\
    \ `ImageView` and want to\nhave it movable. For that aim create a subclass as\
    \ follows:\n\n```\nclass MyImageView : ImageView {\nconstructor(context: Context)\n\
    : super(context)\nconstructor(context: Context, attrs: AttributeSet)\n: super(context,\
    \ attrs)\nvar dx : Float = 0.0f\nvar dy : Float = 0.0f\noverride\nfun onTouchEvent(event:\
    \ MotionEvent): Boolean {\nvar handled = true\nwhen(event.actionMasked) {\nMotionEvent.ACTION_DOWN\
    \ -> {\n//Log.e(\"LOG\",\"Action: ACTION_DOWN \" +\n//        event.toString())\n\
    dx = x - event.rawX\ndy = y - event.rawY\n}\nMotionEvent.ACTION_UP -> {\n//Log.e(\"\
    LOG\",\"Action: ACTION_UP \" +\n//        event.toString())\n}\nMotionEvent.ACTION_MOVE\
    \ -> {\n//Log.e(\"LOG\",\"Action: MOVE \" +\n//        event.toString())\nx =\
    \ event.rawX + dx\ny = event.rawY + dy\n}\nelse -> handled = false\n}\nreturn\
    \ handled || super.onTouchEvent(event)\n}\n}\n```\n\nIf instead you want to have\
    \ moving handled by a single point inside your\ncode, you can do one of the following:\n\
    \n*   Create a base class for movable views and let all UI elements\n    inherit\
    \ from it.\n\n*   Add the touch event  listener to the\n    layout container.\
    \ You then however have to provide some logic to find\n    the touched UI element\
    \ by checking pixel coordinate bounds.\n\nMenus and Action Bars\nMenus and action\
    \ bars\n are important user interface elements if you want to present\nyour user\
    \ a list of selectable choices. In the following sections, we\npresent different\
    \ kinds of menus and explain when and how to use\nthem.\n\nOptions Menu\n\nThe\
    \ options menu \n  shows up inside\nthe app bar. Android Studio will help you\
    \ start developing an app with\nan app bar. If you want to do that yourself, inside\
    \ your layout, add\n\nInside the activity’s `onCreate(...)` method , we need to\n\
    tell the Android OS that we are using an app bar. To do so, register the\napp\
    \ bar via\n\n```\nsetSupportActionBar(toolbar)\n```"
