- fmt: "```kotlin\npackage com.example.myapp.vm\n\nimport android.app.Application\n\
    import androidx.compose.runtime.getValue\nimport androidx.compose.runtime.mutableStateOf\n\
    import androidx.compose.runtime.setValue\nimport androidx.compose.runtime.snapshotFlow\n\
    import androidx.lifecycle.AndroidViewModel\nimport androidx.lifecycle.viewModelScope\n\
    import kotlinx.coroutines.flow.*\nimport kotlinx.coroutines.launch\nimport com.example.myapp.vm.prefs.Prefs\n\
    \nclass SettingsViewModel(application: Application) :\n    AndroidViewModel(application)\
    \ {\n\n    private val dataStore = Prefs(application)\n\n    var user by mutableStateOf(\"\
    \")\n    var flag by mutableStateOf(false)\n    var count by mutableStateOf(0)\n\
    \n    init {\n        viewModelScope.launch {\n            user = dataStore.loadString(\"\
    app_user\", \"\")\n                .first()\n            launch {\n          \
    \      snapshotFlow { user }.onEach {\n                    dataStore.save(\"app_user\"\
    , it)\n                }.collect()\n            }\n\n            flag = dataStore.loadBoolean(\"\
    app_flag\", false)\n                .first()\n            launch {\n         \
    \       snapshotFlow { flag }.onEach {\n                    dataStore.save(\"\
    app_flag\", it)\n                }.collect()\n            }\n\n            count\
    \ = dataStore.loadInt(\"app_count\", \"\")\n                .first()\n       \
    \     launch {\n                snapshotFlow { count }.onEach {\n            \
    \        dataStore.save(\"app_count\", it)\n                }.collect()\n    \
    \        }\n        }\n    }\n}\n```\n\n`launch { snapshotFlow { ... }` 注册了一个异步处理器，并确保任何值变化都会自动将新值保存到偏好设置\
    \ `DataStore` 中。\n\n`Prefs` 类是一个通用外观类，用于与 `DataStore` 实现进行交互：\n\n```kotlin\npackage\
    \ com.example.myapp.prefs\n\nimport android.content.Context\nimport androidx.datastore.preferences.core.booleanPreferencesKey\n\
    import androidx.datastore.preferences.core.intPreferencesKey\nimport androidx.datastore.preferences.core.stringPreferencesKey\n\
    import androidx.datastore.preferences.core.edit\nimport kotlinx.coroutines.flow.Flow\n\
    import kotlinx.coroutines.flow.first\nimport kotlinx.coroutines.flow.map\nimport\
    \ kotlinx.coroutines.runBlocking\nimport com.example.myapp.settingsDataStore\n\
    \nclass Prefs(val context: Context) {\n\n    suspend fun <T> save(key: String,\
    \ v: T) {\n        context.settingsDataStore.edit { preferences ->\n         \
    \   when (v) {\n                is String -> preferences[stringPreferencesKey(key)]\
    \ = v as String\n                is Boolean -> preferences[booleanPreferencesKey(key)]\
    \ = v as Boolean\n                is Int -> preferences[intPreferencesKey(key)]\
    \ = v as Int\n                else -> throw IllegalArgumentException(v!!::class.java.toString())\n\
    \            }\n        }\n    }\n\n    fun loadBoolean(key: String, defVal: Boolean\
    \ = false): Flow<Boolean> {\n        return context.settingsDataStore.data\n \
    \           .map { preferences ->\n                preferences[booleanPreferencesKey(key)]\
    \ ?: defVal\n            }\n    }\n\n    fun loadString(key: String, defVal: String\
    \ = \"\"): Flow<String> {\n        return context.settingsDataStore.data\n   \
    \         .map { preferences ->\n                preferences[stringPreferencesKey(key)]\
    \ ?: defVal\n            }\n    }\n\n    fun loadInt(key: String, defVal: Int\
    \ = 0): Flow<Int> {\n        return context.settingsDataStore.data\n         \
    \   .map { preferences ->\n                preferences[intPreferencesKey(key)]\
    \ ?: defVal\n            }\n    }\n\n    // Non-coroutines getters\n    fun getString(key:\
    \ String, defVal: String = \"\") =\n        runBlocking { loadString(key, defVal).first()\
    \ }\n\n    fun getInt(key: String, defVal: Int = 0) =\n        runBlocking { loadInt(key,\
    \ defVal).first() }\n\n    fun getBoolean(key: String, defVal: Boolean = false)\
    \ =\n        runBlocking { loadBoolean(key, defVal).first() }\n}\n```\n\n`SettingsScreen`\
    \ 包含用于显示和调整偏好设置的完整 UI：\n\n```kotlin\npackage com.example.myapp.ui\n\nimport androidx.compose.foundation.clickable\n\
    import androidx.compose.foundation.layout.*\nimport androidx.compose.foundation.rememberScrollState\n\
    import androidx.compose.foundation.verticalScroll\nimport androidx.compose.material.*\n\
    import androidx.compose.material.icons.Icons\nimport androidx.compose.material.icons.twotone.Help\n\
    import androidx.compose.runtime.*\nimport androidx.compose.ui.Modifier\nimport\
    \ androidx.compose.ui.graphics.Color\nimport androidx.compose.ui.platform.LocalContext\n\
    import androidx.compose.ui.res.stringResource\nimport androidx.compose.ui.text.font.FontWeight\n\
    import androidx.compose.ui.unit.dp\nimport androidx.compose.ui.unit.sp\nimport\
    \ androidx.constraintlayout.compose.ConstraintLayout\nimport com.example.myapp.vm.SettingsViewModel\n\
    \nclass SettingsScreen(private val vm: SettingsViewModel) {\n\n    @Composable\n\
    \    fun make() {\n        val ctx = LocalContext.current\n        val DROPDOWN_TITLES:\
    \ Array<String> = arrayOf(\"Item 1\", \"Item 2\")\n        var selectMenu by remember\
    \ { mutableStateOf(false) }\n\n        Box(modifier = Modifier.verticalScroll(rememberScrollState()))\
    \ {\n            Column {\n                // ----------------------------------------\n\
    \                SectionHeader(\"Header 1\")\n                // ----------------------------------------\n\
    \                Label(\"Some String\")\n                TextFieldAndDescription(\n\
    \                    text = vm.someString,\n                    onValueChange\
    \ = { vm.someString = it },\n                    description = \"Description\"\
    \n                )\n                // ...\n                Label(\"Some String\"\
    )\n                Box {\n                    ButtonForDropDown(\n           \
    \             DROPDOWN_TITLES[vm.selector],\n                        { selectMenu\
    \ = !selectMenu },\n                        description = \"Description\"\n  \
    \                  )\n                    DropdownMenu(\n                    \
    \    expanded = selectMenu,\n                        onDismissRequest = { selectMenu\
    \ = false }\n                    ) {\n                        DROPDOWN_TITLES.forEachIndexed\
    \ { i, s ->\n                            DropdownMenuItem(onClick = {\n      \
    \                          vm.selector = i\n                                selectMenu\
    \ = false\n                            }) {\n                                Text(s)\n\
    \                            }\n                        }\n                  \
    \  }\n                }\n                // ----------------------------------------\n\
    \                SectionHeader( /* ... */ )\n                // ----------------------------------------\n\
    \                // ...\n            }\n        }\n    }\n}\n\n///////////////////////////////////////////////////////\n\
    ///////////////////////////////////////////////////////\n@Composable\nprivate\
    \ fun Label(text: String) {\n    Spacer(modifier = Modifier.height(5.dp))\n  \
    \  Text(text = text)\n}\n\n@Composable\nprivate fun SectionHeader(text: String)\
    \ {\n    Spacer(modifier = Modifier.height(25.dp))\n    Text(text = text, fontSize\
    \ = 20.sp, fontWeight = FontWeight.Bold)\n}\n\n@Composable\nprivate fun ButtonForDropDown(\n\
    \    text: String,\n    onClick: () -> Unit,\n    description: String = \"\"\n\
    ) {\n    ConstraintLayout(modifier = Modifier.fillMaxWidth()) {\n        var helpShown\
    \ by remember { mutableStateOf(false) }\n        val icon = createRef()\n\n  \
    \      Button(\n            colors = ButtonDefaults.buttonColors(backgroundColor\
    \ = Color(200, 200, 255)),\n            modifier = Modifier.fillMaxWidth(),\n\
    \            onClick = onClick\n        ) {\n            Text(text = text)\n \
    \       }\n\n        Icon(\n            Icons.TwoTone.Help,\n            contentDescription\
    \ = \"\",\n            modifier = Modifier\n                .constrainAs(icon)\
    \ {\n                    top.linkTo(parent.top, margin = 5.dp)\n             \
    \       end.linkTo(parent.end, margin = 5.dp)\n                }\n           \
    \     .height(35.dp)\n                .width(35.dp)\n                .clickable\
    \ { helpShown = true }\n        )\n\n        HelpDialog(text = description, shown\
    \ = helpShown, onDismiss = { helpShown = false })\n    }\n}\n```\n\nUI 使用了一些自定义的\
    \ `Compose` 组件。你可以将它们放在 UI 类旁边，甚至放在内部，但由于它们是通用型组件，你也可以将它们放在一个工具包中。"
  raw: "```\npackage com.example.myapp.vm\nimport android.app.Application\nimport\
    \ androidx.compose.runtime.getValue\nimport androidx.compose.runtime.mutableStateOf\n\
    import androidx.compose.runtime.setValue\nimport androidx.compose.runtime.snapshotFlow\n\
    import androidx.lifecycle.AndroidViewModel\nimport androidx.lifecycle.viewModelScope\n\
    import kotlinx.coroutines.flow.*\nimport kotlinx.coroutines.launch\nimport com.example.myapp.vm.prefs.Prefs\n\
    class SettingsViewModel(application: Application):\nAndroidViewModel(application)\
    \ {\nprivate val dataStore = Prefs(application)\nvar user by mutableStateOf(\"\
    \")\nvar flag by mutableStateOf(false)\nvar count by mutableStateOf(0)\ninit {\n\
    viewModelScope.launch {\nuser = dataStore.loadString(\"app_user\",\"\")\n.first()\n\
    launch { snapshotFlow { user }.onEach {\ndataStore.save(\"app_user\", it) }.collect()\
    \ }\nflag = dataStore.loadBoolean(\"app_flag\",false)\n.first()\nlaunch { snapshotFlow\
    \ { flag }.onEach {\ndataStore.save(\"app_flag\", it) }.collect() }\ncount = dataStore.loadInt(\"\
    app_count\",\"\")\n.first()\nlaunch { snapshotFlow { count }.onEach {\ndataStore.save(\"\
    app_count\", it) }.collect() }\n}\n}\n}\n```\n\nThe `launch { snapshotFlow { ...`\
    \ registers an asynchronous handler and makes\nsure that any value change automatically\
    \ leads to saving the new value\nin the preferences DataStore.\n\nThe `Prefs`\
    \ class  is a generic\nfacade for interfering with the DataStore implementation:\n\
    \n```\npackage com.example.myapp.prefs\nimport android.content.Context\nimport\
    \ androidx.datastore.preferences.core.\nbooleanPreferencesKey\nimport androidx.datastore.preferences.core.\n\
    intPreferencesKey\nimport androidx.datastore.preferences.core.\nstringPreferencesKey\n\
    import androidx.datastore.preferences.core.edit\nimport kotlinx.coroutines.flow.Flow\n\
    import kotlinx.coroutines.flow.first\nimport kotlinx.coroutines.flow.map\nimport\
    \ kotlinx.coroutines.runBlocking\nimport com.example.myapp.settingsDataStore\n\
    class Prefs(val context: Context) {\nsuspend fun  save(key:String, v: T) {\ncontext.settingsDataStore.edit\
    \ { preferences ->\nwhen(v) {\nis String -> preferences[\nstringPreferencesKey(key)]\
    \ =\nv as String\nis Boolean -> preferences[\nbooleanPreferencesKey(key)] =\n\
    v as Boolean\nis Int -> preferences[\nintPreferencesKey(key)] =\nv as Int\nelse\
    \ -> throw\nIllegalArgumentException(\nv!!::class.java.toString())\n}\n}\n}\n\
    fun loadBoolean(key:String, defVal:Boolean = false)\n: Flow {\nreturn context.settingsDataStore.data\n\
    .map { preferences ->\npreferences[\nbooleanPreferencesKey(key)] ?: defVal\n}\n\
    }\nfun loadString(key:String, defVal:String = \"\")\n: Flow {\nreturn context.settingsDataStore.data\n\
    .map { preferences ->\npreferences[\nstringPreferencesKey(key)] ?: defVal\n}\n\
    }\nfun loadInt(key:String, defVal:Int = 0)\n: Flow {\nreturn context.settingsDataStore.data\n\
    .map { preferences ->\npreferences[\nintPreferencesKey(key)] ?: defVal\n}\n}\n\
    // Non-coroutines getters\nfun getString(key:String, defVal:String = \"\") =\n\
    runBlocking { loadString(key, defVal).first() }\nfun getInt(key:String, defVal:Int\
    \ = 0) =\nrunBlocking { loadInt(key, defVal).first() }\nfun getBoolean(key:String,\
    \ defVal:Boolean = false) =\nrunBlocking { loadBoolean(key, defVal).first() }\n\
    }\n```\n\nThe  `SettingsScreen`\n contains the complete UI for showing and adjusting\
    \ the\npreferences:\n\n```\npackage com.example.myapp.ui\nimport androidx.compose.foundation.clickable\n\
    import androidx.compose.foundation.layout.*\nimport androidx.compose.foundation.rememberScrollState\n\
    import androidx.compose.foundation.verticalScroll\nimport androidx.compose.material.*\n\
    import androidx.compose.material.icons.Icons\nimport androidx.compose.material.icons.twotone.Help\n\
    import androidx.compose.runtime.*\nimport androidx.compose.ui.Modifier\nimport\
    \ androidx.compose.ui.graphics.Color\nimport androidx.compose.ui.platform.LocalContext\n\
    import androidx.compose.ui.res.stringResource\nimport androidx.compose.ui.text.font.FontWeight\n\
    import androidx.compose.ui.unit.dp\nimport androidx.compose.ui.unit.sp\nimport\
    \ androidx.constraintlayout.compose.ConstraintLayout\nimport com.example.myapp.vm.SettingsViewModel\n\
    class SettingsScreen(private val vm: SettingsViewModel) {\n@Composable\nfun make()\
    \ {\nval ctx = LocalContext.current\nval DROPDOWN_TITLES: Array =\narrayOf(\"\
    Item 1\", \"Item 2\")\nvar selectMenu by\nremember { mutableStateOf(false) }\n\
    Box(modifier = Modifier.verticalScroll(\nrememberScrollState())) {\nColumn {\n\
    // ----------------------------------------\nSectionHeader(\"Header 1\")\n// ----------------------------------------\n\
    Label(\"Some String\")\nTextFieldAndDescription(\ntext = vm.someString,\nonValueChange\
    \ = {\nvm.someString = it },\ndescription = \"Description\")\n...\nLabel(\"Some\
    \ String\")\nBox {\nButtonForDropDown(\nDROPDOWN_TITLES[vm.selector],\n{ selectMenu\
    \ = !selectMenu },\ndescription = \"Description\"\n)\nDropdownMenu(expanded =\
    \ selectMenu,\nonDismissRequest = {\nselectMenu = false }) {\nDROPDOWN_TITLES.forEachIndexed\
    \ {\ni, s ->\nDropdownMenuItem(onClick = {\nvm.selector = i\nselectMenu = false\n\
    }) {\nText(s)\n}\n}\n}\n}\n// ----------------------------------------\nSectionHeader(\
    \ ... )\n// ----------------------------------------\n...\n}\n}\n}\n///////////////////////////////////////////////////////\n\
    ///////////////////////////////////////////////////////\n@Composable\nprivate\
    \ fun Label(text:String) {\nSpacer(modifier = Modifier.height(5.dp))\nText(text\
    \ = text)\n}\n@Composable\nprivate fun SectionHeader(text:String) {\nSpacer(modifier\
    \ = Modifier.height(25.dp))\nText(text = text, fontSize = 20.sp,\nfontWeight =\
    \ FontWeight.Bold)\n}\n@Composable\nprivate fun\nButtonForDropDown(text:String,\
    \ onClick:()->Unit,\ndescription:String=\"\") {\nConstraintLayout(modifier =\n\
    Modifier.fillMaxWidth()) {\nvar helpShown by\nremember { mutableStateOf(false)\
    \ }\nval icon = createRef()\nButton( colors = ButtonDefaults.\nbuttonColors(\n\
    backgroundColor =\nColor(200,200,255)),\nmodifier = Modifier.fillMaxWidth(),\n\
    onClick = onClick\n) {\nText(text = text)\n}\nIcon(Icons.TwoTone.Help,\ncontentDescription\
    \ = \"\",\nmodifier = Modifier\n.constrainAs(icon) {\ntop.linkTo(parent.top, margin\
    \ = 5.dp)\nend.linkTo(parent.end, margin = 5.dp)\n}\n.height(35.dp)\n.width(35.dp)\n\
    .clickable { helpShown = true })\nHelpDialog(text = description,\nshown = helpShown,\n\
    onDismiss = { helpShown = false })\n}\n}\n}\n```\n\nThe UI uses  a\ncouple of\
    \ custom Compose components. You can put them alongside the UI\nclass, or even\
    \ inside it, but since they are of the general-purpose kind\nof components, you\
    \ can also place them inside a utilities package:"
  trans: "\n```kotlin\npackage com.example.myapp.vm\n\nimport android.app.Application\n\
    import androidx.compose.runtime.getValue\nimport androidx.compose.runtime.mutableStateOf\n\
    import androidx.compose.runtime.setValue\nimport androidx.compose.runtime.snapshotFlow\n\
    import androidx.lifecycle.AndroidViewModel\nimport androidx.lifecycle.viewModelScope\n\
    import kotlinx.coroutines.flow.*\nimport kotlinx.coroutines.launch\nimport com.example.myapp.vm.prefs.Prefs\n\
    \nclass SettingsViewModel(application: Application) :\n    AndroidViewModel(application)\
    \ {\n\n    private val dataStore = Prefs(application)\n\n    var user by mutableStateOf(\"\
    \")\n    var flag by mutableStateOf(false)\n    var count by mutableStateOf(0)\n\
    \n    init {\n        viewModelScope.launch {\n            user = dataStore.loadString(\"\
    app_user\", \"\")\n                .first()\n            launch {\n          \
    \      snapshotFlow { user }.onEach {\n                    dataStore.save(\"app_user\"\
    , it)\n                }.collect()\n            }\n\n            flag = dataStore.loadBoolean(\"\
    app_flag\", false)\n                .first()\n            launch {\n         \
    \       snapshotFlow { flag }.onEach {\n                    dataStore.save(\"\
    app_flag\", it)\n                }.collect()\n            }\n\n            count\
    \ = dataStore.loadInt(\"app_count\", \"\")\n                .first()\n       \
    \     launch {\n                snapshotFlow { count }.onEach {\n            \
    \        dataStore.save(\"app_count\", it)\n                }.collect()\n    \
    \        }\n        }\n    }\n}\n```\n\n`launch { snapshotFlow { ... }` 注册了一个异步处理器，并确保任何值变化都会自动将新值保存到偏好设置\
    \ `DataStore` 中。\n\n`Prefs` 类是一个通用外观类，用于与 `DataStore` 实现进行交互：\n\n```kotlin\npackage\
    \ com.example.myapp.prefs\n\nimport android.content.Context\nimport androidx.datastore.preferences.core.booleanPreferencesKey\n\
    import androidx.datastore.preferences.core.intPreferencesKey\nimport androidx.datastore.preferences.core.stringPreferencesKey\n\
    import androidx.datastore.preferences.core.edit\nimport kotlinx.coroutines.flow.Flow\n\
    import kotlinx.coroutines.flow.first\nimport kotlinx.coroutines.flow.map\nimport\
    \ kotlinx.coroutines.runBlocking\nimport com.example.myapp.settingsDataStore\n\
    \nclass Prefs(val context: Context) {\n\n    suspend fun <T> save(key: String,\
    \ v: T) {\n        context.settingsDataStore.edit { preferences ->\n         \
    \   when (v) {\n                is String -> preferences[stringPreferencesKey(key)]\
    \ = v as String\n                is Boolean -> preferences[booleanPreferencesKey(key)]\
    \ = v as Boolean\n                is Int -> preferences[intPreferencesKey(key)]\
    \ = v as Int\n                else -> throw IllegalArgumentException(v!!::class.java.toString())\n\
    \            }\n        }\n    }\n\n    fun loadBoolean(key: String, defVal: Boolean\
    \ = false): Flow<Boolean> {\n        return context.settingsDataStore.data\n \
    \           .map { preferences ->\n                preferences[booleanPreferencesKey(key)]\
    \ ?: defVal\n            }\n    }\n\n    fun loadString(key: String, defVal: String\
    \ = \"\"): Flow<String> {\n        return context.settingsDataStore.data\n   \
    \         .map { preferences ->\n                preferences[stringPreferencesKey(key)]\
    \ ?: defVal\n            }\n    }\n\n    fun loadInt(key: String, defVal: Int\
    \ = 0): Flow<Int> {\n        return context.settingsDataStore.data\n         \
    \   .map { preferences ->\n                preferences[intPreferencesKey(key)]\
    \ ?: defVal\n            }\n    }\n\n    // 非协程获取器\n    fun getString(key: String,\
    \ defVal: String = \"\") =\n        runBlocking { loadString(key, defVal).first()\
    \ }\n\n    fun getInt(key: String, defVal: Int = 0) =\n        runBlocking { loadInt(key,\
    \ defVal).first() }\n\n    fun getBoolean(key: String, defVal: Boolean = false)\
    \ =\n        runBlocking { loadBoolean(key, defVal).first() }\n}\n```\n\n`SettingsScreen`\
    \ 包含用于显示和调整偏好设置的完整 UI：\n\n```kotlin\npackage com.example.myapp.ui\n\nimport androidx.compose.foundation.clickable\n\
    import androidx.compose.foundation.layout.*\nimport androidx.compose.foundation.rememberScrollState\n\
    import androidx.compose.foundation.verticalScroll\nimport androidx.compose.material.*\n\
    import androidx.compose.material.icons.Icons\nimport androidx.compose.material.icons.twotone.Help\n\
    import androidx.compose.runtime.*\nimport androidx.compose.ui.Modifier\nimport\
    \ androidx.compose.ui.graphics.Color\nimport androidx.compose.ui.platform.LocalContext\n\
    import androidx.compose.ui.res.stringResource\nimport androidx.compose.ui.text.font.FontWeight\n\
    import androidx.compose.ui.unit.dp\nimport androidx.compose.ui.unit.sp\nimport\
    \ androidx.constraintlayout.compose.ConstraintLayout\nimport com.example.myapp.vm.SettingsViewModel\n\
    \nclass SettingsScreen(private val vm: SettingsViewModel) {\n\n    @Composable\n\
    \    fun make() {\n        val ctx = LocalContext.current\n        val DROPDOWN_TITLES:\
    \ Array<String> = arrayOf(\"Item 1\", \"Item 2\")\n        var selectMenu by remember\
    \ { mutableStateOf(false) }\n\n        Box(modifier = Modifier.verticalScroll(rememberScrollState()))\
    \ {\n            Column {\n                // ----------------------------------------\n\
    \                SectionHeader(\"Header 1\")\n                // ----------------------------------------\n\
    \                Label(\"Some String\")\n                TextFieldAndDescription(\n\
    \                    text = vm.someString,\n                    onValueChange\
    \ = { vm.someString = it },\n                    description = \"Description\"\
    \n                )\n                // ...\n                Label(\"Some String\"\
    )\n                Box {\n                    ButtonForDropDown(\n           \
    \             DROPDOWN_TITLES[vm.selector],\n                        { selectMenu\
    \ = !selectMenu },\n                        description = \"Description\"\n  \
    \                  )\n                    DropdownMenu(\n                    \
    \    expanded = selectMenu,\n                        onDismissRequest = { selectMenu\
    \ = false }\n                    ) {\n                        DROPDOWN_TITLES.forEachIndexed\
    \ { i, s ->\n                            DropdownMenuItem(onClick = {\n      \
    \                          vm.selector = i\n                                selectMenu\
    \ = false\n                            }) {\n                                Text(s)\n\
    \                            }\n                        }\n                  \
    \  }\n                }\n                // ----------------------------------------\n\
    \                SectionHeader( /* ... */ )\n                // ----------------------------------------\n\
    \                // ...\n            }\n        }\n    }\n}\n\n///////////////////////////////////////////////////////\n\
    ///////////////////////////////////////////////////////\n@Composable\nprivate\
    \ fun Label(text: String) {\n    Spacer(modifier = Modifier.height(5.dp))\n  \
    \  Text(text = text)\n}\n\n@Composable\nprivate fun SectionHeader(text: String)\
    \ {\n    Spacer(modifier = Modifier.height(25.dp))\n    Text(text = text, fontSize\
    \ = 20.sp, fontWeight = FontWeight.Bold)\n}\n\n@Composable\nprivate fun ButtonForDropDown(\n\
    \    text: String,\n    onClick: () -> Unit,\n    description: String = \"\"\n\
    ) {\n    ConstraintLayout(modifier = Modifier.fillMaxWidth()) {\n        var helpShown\
    \ by remember { mutableStateOf(false) }\n        val icon = createRef()\n\n  \
    \      Button(\n            colors = ButtonDefaults.buttonColors(backgroundColor\
    \ = Color(200, 200, 255)),\n            modifier = Modifier.fillMaxWidth(),\n\
    \            onClick = onClick\n        ) {\n            Text(text = text)\n \
    \       }\n\n        Icon(\n            Icons.TwoTone.Help,\n            contentDescription\
    \ = \"\",\n            modifier = Modifier\n                .constrainAs(icon)\
    \ {\n                    top.linkTo(parent.top, margin = 5.dp)\n             \
    \       end.linkTo(parent.end, margin = 5.dp)\n                }\n           \
    \     .height(35.dp)\n                .width(35.dp)\n                .clickable\
    \ { helpShown = true }\n        )\n\n        HelpDialog(text = description, shown\
    \ = helpShown, onDismiss = { helpShown = false })\n    }\n}\n```\n\nUI 使用了一些自定义的\
    \ `Compose` 组件。你可以将它们放在 UI 类旁边，甚至放在内部，但由于它们是通用型组件，你也可以将它们放在一个工具包中。\n"
- fmt: "# Kotlin Compose 界面组件\n\n```kotlin\n@Composable\nfun TextFieldAndDescription(text:\
    \ String,\n                            onValueChange: (String) -> Unit = {},\n\
    \                            description: String) {\n    ConstraintLayout(modifier\
    \ = Modifier.fillMaxWidth()) {\n        MyBasicTextField(value = text,\n     \
    \                    onValueChange = onValueChange)\n        var helpShown by\
    \ remember { mutableStateOf(false) }\n        val icon = createRef()\n       \
    \ Icon(Icons.TwoTone.Help, contentDescription = \"\",\n             modifier =\
    \ Modifier\n                 .constrainAs(icon) {\n                     top.linkTo(parent.top,\
    \ margin = -6.dp)\n                     end.linkTo(parent.end, margin = 5.dp)\n\
    \                 }\n                 .height(33.dp)\n                 .width(33.dp)\n\
    \                 .clickable { helpShown = true })\n        HelpDialog(text =\
    \ description, shown = helpShown,\n                   onDismiss = { helpShown\
    \ = false })\n    }\n}\n\n@Composable\nfun HelpDialog(text: String, shown: Boolean,\n\
    \               onDismiss: () -> Unit) {\n    if (shown) {\n        AlertDialog(\n\
    \            onDismissRequest = onDismiss,\n            confirmButton = {},\n\
    \            dismissButton = {},\n            text = {\n                Text(text\
    \ = text, fontSize = 17.sp)\n            },\n            modifier = Modifier\n\
    \                .fillMaxWidth()\n                .fillMaxHeight()\n         \
    \       .padding(10.dp),\n            shape = RoundedCornerShape(5.dp),\n    \
    \        backgroundColor = Color.White,\n            properties = DialogProperties(\n\
    \                dismissOnBackPress = true,\n                dismissOnClickOutside\
    \ = true\n            )\n        )\n    }\n}\n\n@Composable\nfun MyBasicTextField(\n\
    \    value: String,\n    singleline: Boolean = true,\n    onValueChange: (String)\
    \ -> Unit = {},\n    placeholder: String = \"\",\n    keyboardOptions: KeyboardOptions\
    \ = KeyboardOptions.Default,\n    keyboardActions: KeyboardActions = KeyboardActions.Default,\n\
    \    onFocusLost: () -> Unit = {},\n    modifier: Modifier = Modifier\n) {\n \
    \   BasicTextField(value = value,\n                   onValueChange = onValueChange,\n\
    \                   singleLine = singleline,\n                   textStyle = TextStyle.Default.merge(\n\
    \                       TextStyle(fontSize = 18.sp)),\n                   modifier\
    \ = modifier\n                       .padding(horizontal = 5.dp)\n           \
    \            .fillMaxWidth()\n                       .onFocusChanged { fs ->\n\
    \                           if (!fs.isFocused) onFocusLost()\n               \
    \        },\n                   decorationBox = { innerTextField ->\n        \
    \               Box(modifier = Modifier\n                               .fillMaxWidth()\n\
    \                               .offset(x = 2.dp),\n                         \
    \  contentAlignment = Alignment.CenterStart,\n                       ) {\n   \
    \                        if (value.isEmpty()) {\n                            \
    \   Text(placeholder, fontSize = 18.sp,\n                                    color\
    \ = Color.Gray)\n                           }\n                           innerTextField()\n\
    \                       }\n                   },\n                   keyboardOptions\
    \ = keyboardOptions,\n                   keyboardActions = keyboardActions)\n\
    }\n```\n\n为了从应用内部读取偏好设置，编写：\n\n```kotlin\nval someString = Prefs(context).readString(\"\
    app_key\",\n                                           \"default\")\n```\n\n其中`context`可以是Activity本身，或者如果您在`@Composable`内部，则是`LocalContext.current`。`\"\
    app_key\"`对应于`SettingsViewModel`中用作键的值之一。\n\n## 用户界面\n\n用户界面无疑是任何最终用户应用中最重要的一部分。对于企业级应用，没有用户界面当然是可能的，但即便如此，在大多数情况下，您仍会拥有某种基本的用户界面，即使仅仅是为了避免Android操作系统在进行资源管理任务时过早终止您的应用。在本章中，我们不会涵盖Android\
    \ UI开发的基础知识——相反，我们假定您已经阅读过一些入门级书籍，或完成了官方教程，或浏览过网络上其他众多教程。我们在此要做的是讨论一些重要的UI相关问题，这些问题能够帮助您创建更稳定的应用，或者具有特殊卓越需求的应用。\n\
    \n## 后台任务\n\nAndroid依赖于单线程执行模型。这意味着当应用启动时，默认情况下只会启动一个线程，称为主线程，所有操作都在其中运行，除非您明确地为某些任务使用后台线程。就用户体验而言，这自动意味着如果您有长时间运行的任务会中断流畅的UI工作流，您必须采取特殊预防措施。对于现代应用来说，用户按下按钮后UI冻结，仅仅因为这个操作导致进程运行几秒或更长时间，这是不可接受的。因此，将长时间运行的任务放入后台至关重要。\n\
    \n完成将任务放入后台的一种方法是使用`IntentService`对象，如第[4](#463716_2_En_4_Chapter.xhtml)章“服务子类”部分所述。然而，根据具体情况，将所有后台工作放入服务可能会使您的应用设计变得臃肿，并且设备上运行过多的服务不利于保持资源使用率低。因此，对于低级别任务，最好使用更底层的方法。您有几种选择，我们将在以下部分中描述。\n\
    \n### Java并发\n\n在非常底层的级别上，您可以使用Java线程和`java.util.concurrent`包中的类来处理后台任务。从Java\
    \ 7开始，这些类已经变得相当强大，但需要一些时间来充分理解所有选项和影响。您经常会读到，在Android操作系统内部直接处理线程不是一个好主意，因为线程在系统资源方面代价高昂。虽然这对于旧设备和旧版Android来说确实如此，但如今情况已不再如此。在摩托罗拉Moto\
    \ G4上启动1000个线程并等待所有线程运行的一个简单测试显示，每个线程大约需要0.0006秒。因此，如果您习惯使用Java线程，并且不到一毫秒的启动时间对您来说可以接受，那么没有性能方面的理由不使用Java线程。然而，您必须考虑到线程在任何Android组件生命周期之外运行，因此如果使用线程，您需要手动处理生命周期问题。\n\
    \n在Kotlin中，线程的定义和启动非常简单：\n\n```kotlin\nval t = Thread {\n    // 执行后台工作...\n}.also\
    \ { it.start() }\n```\n\n> **注意**\n> \n> 在Android中，不允许仅从线程内部访问UI。您必须按如下方式操作：\n\
    > \n> ```kotlin\n> val t = Thread {\n>     // 执行后台工作...\n>     runOnUiThread {\n\
    >         // 使用UI...\n>     }\n> }.also { it.start() }\n> ```\n\n## AsyncTask\
    \ 类\n\n`AsyncTask`对象是一个中等级别的辅助类，用于在后台运行代码。您需要重写其`doInBackground()`方法以执行一些后台工作，如果需要与UI通信，还需要实现`onProgressUpdate()`来进行通信，并从后台工作中触发`publishProgress()`以启动它。\n\
    \n从Android 11开始，`AsyncTask`已被弃用。我们在此提及是因为它的广泛使用。\n\n> **注意**\n> \n> Android Studio将会发出警告，提示如果创建类似`val\
    \ at = object : AsyncTask<Int, Int, Int>() { ... }`的`AsyncTask`对象，可能会发生内存泄漏。这是因为内部会持有一个对后台代码的静态引用。可以通过在方法上添加`@SuppressLint(\"\
    StaticFieldLeak\")`注解来抑制该警告。\n\n> **警告**\n> \n> `N`个`AsyncTask`作业不会导致所有`N`个作业并行执行——相反，它们都会在*一个*后台线程中顺序运行。\n\
    \n## Handlers\n\n`Handler`是一个维护消息队列的对象，用于异步处理消息或`Runnable`对象。您可以使用`Handler`进行异步处理，方式如下："
