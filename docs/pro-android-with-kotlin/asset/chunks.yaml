    ```


    为简单起见，我使用了字符串作为按钮标签和消息——在生产代码中，请务必使用资源文件！`checkPermission()` 函数在必要时会尝试从系统 Activity
    获取权限。无论用户是否授予权限，在从该 Activity 返回后，你的应用可以在以下方法中相应地处理结果：


    ```

    override

    fun onRequestPermissionsResult(requestCode: Int,

    permissions: Array,

    grantResults: IntArray) {

    when (requestCode) {

    PERMISSION_ID -> {

    ...

    }

    ...

    }

    }

    ```


    ### 注意事项


    “最后已知位置”这个概念有些模糊。例如，在模拟设备中，仅通过提供的设备控制功能来设置位置，并不足以更改“最后已知位置”。只有像 Google Maps 这样的应用使用了位置更新机制后，此处描述的代码才能返回正确的值。下一节描述的机制虽然更复杂，但也更可靠。


