    modifier: Modifier = Modifier\n){\nBasicTextField(value = value,\nonValueChange\
    \ = onValueChange,\nsingleLine = singleline,\ntextStyle = TextStyle.Default.merge(\n\
    TextStyle(fontSize = 18.sp)),\nmodifier = modifier\n.padding(horizontal = 5.dp)\n\
    .fillMaxWidth()\n.onFocusChanged { fs->\nif(!fs.isFocused) onFocusLost() },\n\
    decorationBox = { innerTextField ->\nBox(modifier = Modifier\n.fillMaxWidth()\n\
    .offset(x = 2.dp),\ncontentAlignment = Alignment.CenterStart,\n) {\nif (value.isEmpty())\
    \ {\nText(placeholder, fontSize = 18.sp,\ncolor = Color.Gray)\n}\ninnerTextField()\n\
    }\n},\nkeyboardOptions = keyboardOptions,\nkeyboardActions = keyboardActions)\n\
    }\n```\n\nIn order to read preferences from inside your app, write\n\n```\nval\
    \ someString = Prefs(context).readString(\"app_key\",\n\"default\")\n```\n\nwhere\
    \ `context` could be the\nactivity itself, or \n`LocalContext.current`\n if you\
    \ are inside a `@Composable`. The\n“app_key” corresponds to one of the values\
    \ used as keys inside `SettingsViewModel`.\n\n9. User Interface\n\nThe user interface\
    \ is certainly the most important part of any end user app . For\ncorporate usage\
    \ apps without user interfaces are of course possible, but\neven then in most\
    \ cases, you will have some kind of rudimentary UI, if\nfor no other reason then\
    \ maybe just to avoid the Android OS to kill your\napp too readily during resource\
    \ housekeeping tasks.\nIn this chapter we will not cover the basics of UI development\
    \ for\nAndroid – instead, it is expected you’ve read some introductory-level\n\
    book or worked through the official tutorials or any number of the other\ntutorials\
    \ you will find on the Web. What we do here is to cover a couple\nof important\
    \ UI-related issues, which help you create more stable apps\nor apps with special\
    \ outstanding requirements.\n\nBackground Tasks\nAndroid relies \non a single-threaded\
    \ execution model . This means when\nan app starts, it by default starts only\
    \ a single thread, called the\nmain thread, in which all actions run unless you\
    \ explicitly use\nbackground threads for certain tasks. Talking of user experience,\
    \ this\nautomatically means you have to take special precautions if you have\n\
    long-running tasks that would interrupt a fluent UI workflow. It is just\nnot\
    \ acceptable for modern apps that the UI freezes after the user\npresses a button,\
    \ just because this action leads to a process running\nfor a few seconds or longer.\
    \ It is therefore vital to put long-running\ntasks into the background.\nOne way\
    \ to accomplish putting things into the background is using\n`IntentService`\n\
    objects    as described in section\n“Service Subclasses” of Chapter [4](#463716_2_En_4_Chapter.xhtml).\
    \ Depending on circumstances it\nmight however blow up your app design to put\
    \ all background work into\nservices, and having too many services run on a device\
    \ will not help\nkeep resource usage low. For low-level tasks, it is therefore\
    \ better to\nuse a more low-level approach. You have several options here, which\
    \ we\ndescribe in the following sections.\n\nJava Concurrency\nOn a very low level,\
    \ you can use Java threads  and classes\nfrom the `java.util.concurrent`\npackage\
    \      to handle background\njobs. Beginning with Java 7, those classes have become\
    \ quite powerful,\nbut it needs some time to fully understand all options and\n\
    implications.\nYou will quite often read that directly handling threads from inside\n\
    the Android OS is not a good idea because threads are expensive in terms\nof system\
    \ resources. While this was certainly true for older devices and\nold Android\
    \ versions, nowadays this is just no longer the case. A simple\ntest on a Motorola\
    \ Moto G4 starting 1000 threads and waiting until all\nwere running took approximately\
    \ 0.0006 seconds per thread. So if you are\nused to Java threads and less than\
    \ a millisecond for the thread to start\nis good for you, there is no performance\
    \ reason for not using Java\nthreads. However, you must take into account that\
    \ threads run outside\nany Android component lifecycle, so you have to handle\
    \ lifecycle issues\nmanually if you use threads.\n\nIn Kotlin threads \n    are\
    \ defined and\nstarted easily:\n\n```\nval t = Thread{ ->\n// do background work...\n\
    }.also { it.start() }\n```\n\nNote\n\nTo just access the UI from inside a thread\
    \ is not allowed in Android.\nYou must do that as follows:\n\n```\nval t = Thread{\
    \ ->\n// do background work...\nrunOnUiThread {\n// use the UI...\n}\n}.also {\
    \ it.start() }\n```\n\nThe AsyncTask Class\nAn `AsyncTask`\nobject    is a medium-level\n\
    helper class to run some code in the background. You override its `doInBackground()`\n\
    method  to do some\nbackground work, and if you need to communicate with the UI,\
    \ you also\nimplement `onProgressUpdate()` to\ndo the communication and fire `publishProgress()`\n\
    from inside the background work to trigger it.\n`AsyncTask`s\nare deprecated starting\
    \ with Android 11\\. We mention it here because of\nits widespread use.\n\nNote\n\
    \nAndroid Studio \nwill as a warning complain about a possible memory leak if\
    \ you create\n`AsyncTask`\nobjects like `val at = object : AsyncTask< Int, Int,\
    \ Int >() { ... }`. This is\nbecause internally a static reference to the background\
    \ code will be\nheld. The warning can be suppressed by annotating the method with\
    \ `@SuppressLint(\"StaticFieldLeak\")`.\n\nCaution\n\nA number of `N` AsyncTask\
    \ jobs will\nnot lead to a parallel execution of all `N` of them – instead\nthey\
    \ all run sequentially in *one* background thread.\n\nHandlers\n\nA  `Handler`\
    \    is an object\nmaintaining a message queue for asynchronous processing of\
    \ messages or\n`Runnable` objects . You can use a\n`Handler` for\nasynchronous\
    \ processes as follows:"
