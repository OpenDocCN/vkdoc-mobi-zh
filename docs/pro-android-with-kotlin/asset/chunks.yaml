    Here are a couple of notes on the `CameraSession` class:


    * The emulators don’t exhibit auto-focus capabilities. The code takes care of
    that.

    * The term “precapture” is just another name for *auto-exposure*.

    * Using the flash is a `todo` in this class. To enable flashing see the places
    where the flash gets mentioned inside the code.

    * By virtue of a listener chain starting in `CameraSession`, the still image capture
    data eventually arrives in the `dataArrived(...)` method of `MainActivity`. It
    is there where you can start writing further processing algorithms like saving,
    sending, converting, reading, and so on.


