    \ We will be talking more about concurrency\nin Chapter [11](#463716_2_En_11_Chapter.xhtml).\n\
    \nIf the service needs to address the  *device-protected\nstorage* , as in the\
    \ *Direct Boot* mode  triggered by the\n`android:directBootAware`\nflag  in the\n\
    manifest, it needs to access a special context:\n\n```\nval directBootContext:Context\
    \ =\nappContext.createDeviceProtectedStorageContext()\n// For example open a file\
    \ from there:\nval inStream:FileInputStream =\ndirectBootContext.openFileInput(filename)\n\
    ```\n\nYou should not use this context normally, only for special services\nthat\
    \ need to be active directly after the boot process.\n\nService Classes\n\nServices\
    \ must extend the\n\n```\nandroid.app.Service\n```\n\nclass  or one\nof its subclasses,\
    \ and they must be declared inside the app’s `AndroidManifest.xml`\nfile  as described\n\
    previously.\nThe interface methods from  `android.app.Service`\n get described\
    \ in section “Intent Constituent Parts” in the\nonline text companion.\nNote that\
    \ to stop a service that was explicitly started via  `startService()`\n or  `startForeroundService`\n\
    \ `,` there\nare two ways: either the service stops itself by calling `stopSelf()`\
    \ or `stopSelfResult()` or\nfrom outside by calling `stopService()`.\n\nStarting\
    \ Services\nA service  can\nbe explicitly started from any component that is a\
    \ subclass of  `android.content.Context`\n or has access to a `Context`. This\
    \ is the\ncase for activities, other services, broadcast receivers, and content\n\
    providers."
