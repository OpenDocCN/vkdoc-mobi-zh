  trans: "\n# Android 服务的启动与绑定\n\n## 启动服务\n\n要显式启动一个服务，你需要一个合适的 `Intent`。基本上有两种情况：\n\
    \n### 内部服务（同一应用）\n\n首先，如果服务与调用方位于同一应用中，可以这样编写：\n\n```\nval intent = Intent(this,\
    \ TheService::class.java)\nstartService(intent)\n```\n\n适用于普通服务，或者：\n\n```\nval\
    \ intent = Intent(this, TheService::class.java)\nif (Build.VERSION.SDK_INT >=\
    \ Build.VERSION_CODES.O) {\n    startForegroundService(intent)\n} else {\n   \
    \ startService(intent)\n}\n```\n\n适用于 Android 8.0 或 API 级别 26 开始定义的前台服务（在此之前的版本则按常规方式启动）。也就是说，我们可以直接引用服务类。如果你刚接触\
    \ Kotlin 开发，`TheService::class.java` 这种写法初看可能有些奇怪——这其实是 Kotlin 提供 Java 类作为参数的方式。\n\
    \n> **注意**\n> 由于 `Intent` 可以通过各种 `putExtra()` 方法传递通用附加属性，我们也可以向服务传递数据。\n\n###\
    \ 外部服务（另一应用）\n\n其次，如果要启动的服务属于另一个应用，即*外部*服务，则首先需要在服务声明中添加 intent filter，例如：\n\n\
    ```\n<action android:name=\"<PCKG_NAME>.START_SERVICE\" />\n```\n\n其中 `<PCKG_NAME>`\
    \ 是应用包的名称，`START_SERVICE` 也可以替换为其他标识符。然后在服务客户端中，可以这样编写：\n\n```\nval intent = Intent(\"\
    .START_SERVICE\")\nintent.setPackage(\"<PCKG_NAME>\")\nstartService(intent)\n\
    // ... 执行其他操作 ...\nstopService(intent)\n```\n\n来启动和停止外部服务，其中 Intent 构造函数的参数必须与服务\
    \ intent filter 声明中的字符串完全一致。`setPackage()` 语句在这里很重要（当然你需要替换为服务所在的包名）；否则会触发安全限制，导致错误信息。\n\
    \n## 绑定服务\n\n启动服务只是其中的一部分——另一部分是在服务运行时使用它。这正是*服务绑定*的用途。\n\n### 内部绑定（同一应用）\n\n\
    要创建可供同一应用绑定的服务，可以这样编写：\n\n```\n/**\n * 用于本地绑定的类，即在同一应用中。\n */\nclass MyBinder(val\
    \ servc: MyService) : Binder() {\n    fun getService(): MyService {\n        return\
    \ servc\n    }\n}\n\nclass MyService : Service() {\n    // 提供给客户端的 Binder\n  \
    \  private val binder: IBinder = MyBinder(this)\n    // 随机数生成器\n    private val\
    \ generator: Random = Random()\n\n    override fun onBind(intent: Intent): IBinder\
    \ {\n        return binder\n    }\n\n    /** 供客户端使用的方法 */\n    fun getRandomNumber():\
    \ Int {\n        return generator.nextInt(100)\n    }\n}\n```\n\n要在同一应用内绑定到此服务，在服务客户端中编写：\n\
    \n```\nval servcConn = object : ServiceConnection {\n    override fun onServiceDisconnected(compName:\
    \ ComponentName?) {\n        Log.e(\"LOG\", \"onServiceDisconnected: \" + compName)\n\
    \    }\n\n    override fun onServiceConnected(compName: ComponentName?,\n    \
    \                                binder: IBinder?) {\n        Log.e(\"LOG\", \"\
    onServiceConnected: \" + compName)\n        val servc = (binder as MyBinder).getService()\n\
    \        Log.i(\"LOG\", \"Next random number from service: \" +\n            \
    \    servc.getRandomNumber())\n    }\n\n    override fun onBindingDied(compName:\
    \ ComponentName) {\n        Log.e(\"LOG\", \"onBindingDied: \" + compName)\n \
    \   }\n}\n\nval intent = Intent(this, MyService::class.java)\nval flags = BIND_AUTO_CREATE\n\
    bindService(intent, servcConn, flags)\n```\n\n其中 `object : ServiceConnection {...}`\
    \ 结构是 Kotlin 中通过创建匿名内部类对象来实现接口的方式，类似于 Java 中的 `new ServiceConnection(){ ... }`。在\
    \ Kotlin 中，这种结构被称为*对象表达式*。此处的 `this` 在 Intent 构造函数中指向一个 `Context` 对象。你可以在 Activity\
    \ 中这样使用它。如果将 `Context` 存储在变量中，请在此处使用该变量名。\n\n当然，除了日志记录，你应该做更有意义的事情。特别是可以在 `onServiceConnected()`\
    \ 方法中将 binder 或服务保存到变量中以便后续使用。不过要记住，你应当适当处理绑定失效或服务连接被终止的情况。例如，可以尝试重新绑定服务或通知用户，或者两者都做。\n\
    \n上述代码会在你绑定时自动启动服务（如果服务尚未存在）。这是通过以下语句实现的：\n\n```\nval flags = BIND_AUTO_CREATE\n\
    [...]\n```\n\n如果你确定服务正在运行而不需要此功能，可以省略它。但大多数情况下，包含该标志更稳妥。可用于设置绑定特性的标志如下：\n\n- **`BIND_AUTO_CREATE`**：我们刚刚使用了它。表示如果服务尚未启动，则自动启动它。有时你会读到，如果绑定了服务，就不需要显式启动它，但这只有在设置了此标志时才成立。\n\
    \n- **`BIND_DEBUG_UNBIND`**：这会导致保存后续 `unbindService()` 的调用栈，以防后续的解绑命令有误。如果发生这种情况，会显示更详细的诊断输出。由于这会导致内存泄漏，此功能应仅用于调试目的。\n\
    \n- **`BIND_NOT_FOREGROUND`**：仅在客户端运行在前台进程且目标服务运行在后台进程时使用。使用此标志时，绑定过程不会将服务提升为前台调度优先级。\n\
    \n- **`BIND_ABOVE_CLIENT`**：使用此标志表示服务的优先级高于客户端（即服务调用者）。在资源短缺的情况下，系统会先于被调用的服务终止客户端。\n\
