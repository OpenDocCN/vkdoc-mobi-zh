    \    // create a floating point buffer from bb\n    vertexBuffer = bb.asFloatBuffer()\n\
    \    // add the coordinates to the buffer\n    vertexBuffer.put(triangleCoords)\n\
    \    // set the buffer to start at 0\n    vertexBuffer.position(0)\n}\n```\n\n\
