  trans: "```kotlin\npackage book.andrkotlpro.mocktest\nimport android.database.sqlite.SQLiteDatabase\n\
    import androidx.activity.ComponentActivity\nimport org.junit.Test\nimport org.junit.runner.RunWith\n\
    import org.mockito.ArgumentMatchers\nimport org.mockito.BDDMockito.*\nimport org.powermock.api.mockito.PowerMockito\n\
    import org.powermock.core.classloader.annotations.PrepareForTest\nimport org.powermock.modules.junit4.PowerMockRunner\n\
    import org.powermock.reflect.Whitebox\nimport java.lang.reflect.Constructor\n\
    import java.lang.reflect.Method\n@RunWith(PowerMockRunner::class)\n@PrepareForTest(MainActivity::class)\n\
    class MainActivityTest {\n    @Test\n    fun table_created() {\n        val componentActivityConstructors:\
    \ Array<Constructor<*>> =\n            PowerMockito.constructors(\n          \
    \      ComponentActivity::class.java.getConstructor()\n            )\n       \
    \ PowerMockito.suppress(componentActivityConstructors)\n        val activity =\
    \ MainActivity()\n        val activitySpy = spy(activity)\n        val db = mock(SQLiteDatabase::class.java)\n\
    \        // given\n        given(activitySpy.openOrCreateDatabase(anyString(),\
    \ anyInt(), any())).willReturn(db)\n        // when\n        Whitebox.invokeMethod(activitySpy,\
    \ \"saveInDb\", \"hello\")\n        // then\n        verify(db).execSQL(ArgumentMatchers.argThat\
    \ { arg ->\n            arg.toString().matches(Regex(\"(?i)create table.*\\\\\
    bMyItems\\\\b.*\"))\n        })\n    }\n    @Test\n    fun item_inserted() {\n\
    \        val componentActivityConstructors: Array<Constructor<*>> =\n        \
    \    PowerMockito.constructors(\n                ComponentActivity::class.java.getConstructor()\n\
    \            )\n        PowerMockito.suppress(componentActivityConstructors)\n\
    \        val activity = MainActivity()\n        val activitySpy = spy(activity)\n\
    \        val db = mock(SQLiteDatabase::class.java)\n        // given\n       \
    \ given(activitySpy.openOrCreateDatabase(anyString(), anyInt(), any())).willReturn(db)\n\
    \        // when\n        Whitebox.invokeMethod(activitySpy, \"saveInDb\", \"\
    hello\")\n        // then\n        verify(db).execSQL(\n            ArgumentMatchers.argThat\
    \ { arg ->\n                arg.toString().matches(Regex(\"(?i)insert into MyItems\\\
    \\b.*\"))\n            },\n            ArgumentMatchers.argThat { arg ->\n   \
    \             val arr = arg as Array<*>\n                arr[0] == \"hello\" &&\
    \ arr[1] is Number\n            }\n        )\n    }\n}\n```\n\n`@RunWith(PowerMockRunner::class)`\
    \ 将确保 PowerMock 被用作单元测试运行器，而 `@PrepareForTest(MainActivity::class)` 则准备好 `MainActivity`\
    \ 类，使其即使被标记为“final”（这是 Kotlin 的默认行为）也能被模拟。\n\n第一个函数 `table_created()` 旨在确保在必要时创建表。它的工作过程如下：\n\
    \n- 首先确保 `ComponentActivity` 的构造方法不会被调用。这是必要的，因为该类是生命周期感知的，因此会被 UI 框架观察。\n- 实例化\
    \ `MainActivity`。\n- 将 `MainActivity` 实例包装到一个*间谍对象（Spy）*中。这使我们能够挂接到方法调用，从而模拟出实际的实现。\n\
    - 创建一个 `SQLiteDatabase` 的模拟对象，这样我们就能在不使用真实数据库的情况下挂接到数据库操作。\n- 接下来的 `//given`、`//when`\
    \ 和 `//then` 部分遵循 BDD（行为驱动开发）风格。\n- 在 `//given` 部分，我们模拟了 activity 的 `openOrCreateDatabase()`\
    \ 调用，让它返回我们的模拟数据库。\n- 在 `//when` 部分，我们调用 activity 类的 `saveInDb()` 方法。\n- 在 `//then`\
    \ 部分，我们检查 `saveInDb()` 的调用是否触发了适当的数据库操作来创建必要的表。为此，我们使用了一个 `ArgMatcher`，它允许我们检查适当的方法调用参数。\n\
    \n测试函数 `item_inserted()` 做的事情几乎相同，但检查的是是否有一条适当的 *插入* 语句被发送到数据库。现在你可以运行这些测试，它们应该能毫无问题地通过。\n\
    \n## 集成测试\n\n集成测试介于单元测试和完整的用户界面测试之间。单元测试在开发机器上进行细粒度的测试工作，而完整的用户界面测试则在真实或虚拟设备上运行。集成测试也在设备上运行，但它们测试的不是整个应用，而是在隔离的执行环境中测试选定的组件。\n\
    \n集成测试位于源代码的 `androidTest` 目录下。你还需要在应用的 `build.gradle` 文件中添加几个依赖包。\n\n```groovy\n\
    dependencies {\n    ...\n    androidTestImplementation 'com.android.support:support-annotations:27.1.1'\n\
    \    androidTestImplementation 'com.android.support.test:runner:1.0.2'\n    androidTestImplementation\
    \ 'com.android.support.test:rules:1.0.2'\n}\n```\n\n注意：需要移除 `androidTestImplementation`\
    \ 后面的换行符。\n\n### 测试服务\n\n为了测试一个带有绑定的服务，可以编写如下代码：\n\n```kotlin\n@RunWith(AndroidJUnit4::class)\n\
    class ServiceTest {\n    // @Rule 会包裹测试调用——这里我们\n    // 使用 'ServiceTestRule' 来确保\n\
    \    // 服务能够正确地启动和停止。\n    @Rule @JvmField\n    val mServiceRule = ServiceTestRule()\n\
    \    @Test\n    fun testWithBoundService() {\n        val serviceIntent = Intent(\n\
    \            InstrumentationRegistry.getTargetContext(),\n            MyService::class.java\n\
    \        ).apply {\n            // 如果需要，可以通过 Intent 向\n            // 服务传递数据。\n\
    \            putExtra(\"IN_VAL\", 42L)\n        }\n        // 绑定服务并获取\n      \
    \  // 绑定器（Binder）的引用。\n        val binder: IBinder = mServiceRule.bindService(serviceIntent)\n\
    \        // 获取对服务的引用\n        val service: MyService = (binder as MyService.MyBinder).getService()\n\
    \        // 验证服务是否正常工作。\n        assertThat(service.add(11, 27), `is`(38))\n \
    \   }\n}\n```\n\n这测试了一个名为 `MyService` 的简单服务，其中包含一个 `add(Int, Int)` 服务方法：\n\n```kotlin\n\
    class MyService : Service() {\n    class MyBinder(val servc: MyService) : Binder()\
    \ {\n        fun getService(): MyService {\n            return servc\n       \
    \ }\n    }\n    private val binder: IBinder = MyBinder(this)\n    override fun\
    \ onBind(intent: Intent): IBinder = binder\n    fun add(a: Int, b: Int) = a +\
    \ b\n}\n```\n\n要运行集成测试，右键点击源代码中的 `androidTest` 目录，选择“Run Tests in …”。这将创建并上传一个\
    \ APK 文件，通过 `InstrumentationRegistry.getTargetContext()` 创建一个集成测试上下文，然后在设备上运行测试。\n\
    \n### 测试 Intent 服务\n\n与官方文档声称的不同，基于 `IntentService` 类的服务也可以进行集成测试。只是你不能使用 `@Rule\
    \ ServiceTestRule` 来处理服务的生命周期，因为意图服务（Intent Service）有自己的启动和停止时机。但你可以自己管理生命周期。作为示例，我展示了一个简单意图服务的测试，该服务运行\
    \ 10 秒钟，并通过 `ResultReceiver` 持续回传数据。\n\n服务本身的代码如下：\n\n```kotlin\nclass MyIntentService()\
    \ :\n    IntentService(\"MyIntentService\") {\n    class MyResultReceiver(val\
    \ cb: (Double) -> Unit) :\n        ResultReceiver(null) {\n        companion object\
    \ {\n            val RESULT_CODE = 42\n            val INTENT_KEY = \"my.result.receiver\"\
    \n            val DATA_KEY = \"data.key\"\n        }\n        override\n     \
    \   fun onReceiveResult(resultCode: Int,\n                            resultData:\
    \ Bundle?) {\n            super.onReceiveResult(resultCode, resultData)\n    \
    \        val d = resultData?.get(DATA_KEY) as Double\n            cb(d)\n    \
    \    }\n    }\n    var status = 0.0\n    override fun onHandleIntent(intent: Intent)\
    \ {\n        val myReceiver = intent.\n            getParcelableExtra<MyResultReceiver>(\n\
    \                MyResultReceiver.INTENT_KEY)\n        for (i in 0..100) {\n \
    \           Thread.sleep(100)\n            val bndl = Bundle().apply {\n     \
    \           putDouble(MyResultReceiver.DATA_KEY,\n                    i * 0.01)\n\
    \            }\n            myReceiver.send(MyResultReceiver.RESULT_CODE,\n  \
    \              bndl)\n        }\n    }\n}\n```\n\n以及测试类，同样位于源代码的 `androidTest`\
    \ 目录下：\n\n```kotlin\n@RunWith(AndroidJUnit4::class)\nclass MyIntentServiceTest\
    \ {\n    @Test\n    fun testIntentService() {\n        var serviceVal = 0.0\n\
    \        val ctx = InstrumentationRegistry.\n            getTargetContext()\n\
    \        val serviceIntent = Intent(ctx,\n            MyIntentService::class.java\n\
    \        ).apply {\n            `package` = ctx.packageName\n            putExtra(\n\
    \                MyIntentService.MyResultReceiver.INTENT_KEY,\n              \
    \  MyIntentService.MyResultReceiver({ d ->\n                    serviceVal = d\n\
    \                }))\n        }\n        ctx.startService(serviceIntent)\n   \
    \     val tm0 = System.currentTimeMillis() / 1000\n        var ok = false\n  \
    \      while (System.currentTimeMillis() / 1000 - tm0 < 20) {\n            if\
    \ (serviceVal == 1.0) {\n                ok = true\n                break\n  \
    \          }\n            Thread.sleep(1000)\n        }\n        assertThat(ok,\
    \ `is`(true))\n    }\n}\n```"
- fmt: "This test calls the service, listens to its result for a while, and, when\
    \ it detects that the service did its work as expected, lets the test pass.\n\n\
    ## Testing Content Providers\n\nFor testing content providers, Android provides\
    \ a special class `ProviderTestCase2`, which starts an isolated temporary environment\
    \ so the testing won’t interfere with the user data. A test case, for example,\
    \ reads:\n\n```kotlin\n@RunWith(AndroidJUnit4::class)\nclass MyContentProviderTest\
    \ :\n    ProviderTestCase2(\n        MyContentProvider::class.java,\n        \"\
    com.example.database.provider.MyContentProvider\") {\n    @Before public override\
    \   // \"public\" necessary!\n    fun setUp() {\n        context = InstrumentationRegistry.\n\
    \            getTargetContext()\n        super.setUp()\n        val mockRslv:\
    \ ContentResolver = mockContentResolver\n        mockRslv.delete(MyContentProvider.CONTENT_URI,\n\
    \            \"1=1\", arrayOf())\n    }\n    @Test\n    fun test_inserted() {\n\
    \        val mockCtx: Context = mockContext\n        val mockRslv: ContentResolver\
    \ = mockContentResolver\n        // add an entry\n        val cv = ContentValues()\n\
    \        cv.put(MyContentProvider.COLUMN_PRODUCTNAME,\n            \"Milk\")\n\
    \        cv.put(MyContentProvider.COLUMN_QUANTITY,\n            27)\n        val\
    \ newItem = mockRslv.insert(\n            MyContentProvider.CONTENT_URI, cv)\n\
    \        // query all\n        val cursor = mockRslv.query(\n            MyContentProvider.CONTENT_URI,\n\
    \            null, null, null)\n        assertThat(cursor.count, `is`(1))\n  \
    \      cursor.moveToFirst()\n        val ind = cursor.getColumnIndex(\n      \
    \      MyContentProvider.COLUMN_PRODUCTNAME)\n        assertThat(cursor.getString(ind),\
    \ `is`(\"Milk\"))\n    }\n}\n```\n\nColumn names, the authority, and the URI used\
    \ are biased by the content provider – important for the test case is that you\
    \ use the mocked content resolver for talking to the content provider.\n\n> **Note**\
    \  \n> Observe the order of the first two lines in `setUp()` – this is different\
    \ from what you can read in the Android developer docs by May 2018. The docs are\
    \ wrong here.\n\n## Testing Broadcast Receivers\n\nFor testing broadcast receivers,\
    \ the Android testing framework does not pay particular attention. It is also\
    \ crucial what the broadcast receiver under test actually does. Provided it performs\
    \ some kind of side effect, for example, writing something to a database, you\
    \ can mock out that database operation by using the same testing context we used\
    \ previously for content providers.\n\nFor example, if you look at the following\
    \ test case from inside the `\"androidTest\"` source section:\n\n```kotlin\nimport\
    \ android.support.test.InstrumentationRegistry\nimport android.support.test.runner.AndroidJUnit4\n\
    import org.junit.Test\nimport org.junit.runner.RunWith\nimport org.junit.Assert.*\n\
    import org.hamcrest.Matchers.*\nimport android.content.Intent\n@RunWith(AndroidJUnit4::class)\n\
    class BroadcastTest {\n    @Test\n    fun testBroadcastReceiver() {\n        val\
    \ context = InstrumentationRegistry.\n            getTargetContext()\n       \
    \ val intent = Intent(context,\n            MyReceiver::class.java)\n        intent.putExtra(\"\
    data\", \"Hello World!\")\n        context.sendBroadcast(intent)\n        // Give\
    \ the receiver some time to do its work\n        Thread.sleep(5000)\n        //\
    \ Check the DB for the entry added\n        // by the broadcast receiver\n   \
    \     val db = MyDBHandler(context)\n        val p = db.findProduct(\"Milk\")\n\
    \        assertThat(p, isA(Product::class.java))\n        assertThat(p!!.productName,\
    \ `is`(\"Milk\"))\n    }\n}\n```\n\nyou can see that we used the context provided\
    \ by `InstrumentationRegistry.getTargetContext()`. This will make sure the database\
    \ used by the broadcast receiver and later by the test uses a temporary space\
    \ for its data. You start this test like any other integration test by right-clicking\
    \ it or the package it resides in and then selecting “Run …” or “Run Tests in\
    \ …”.\n\n## User Interface Tests\n\nConducting user interface tests, you can work\
    \ through user stories and see whether your app as a whole acts as expected. I\
    \ briefly mention two frameworks:\n\n*   **Espresso**  \n    Use *Espresso* to\
    \ write tests targeting your app, disregarding any inter-app activities. With\
    \ Espresso you can do things like as follows: when a certain `View` (`Button`,\
    \ `TextView`, `EditText`, etc.) shows up, do something (enter text or perform\
    \ a click), and then check whether some post-conditions occur.\n\n*   **UI Automator**\
    \  \n    Use *UI Automator* to write tests that span several apps. With UI Automator\
    \ you can inspect layouts to find out the UI structure of activities, simulate\
    \ actions on activities, and do checks on UI elements.\n\nFor details on how to\
    \ use either of them, please consult the online documentation – for example, enter\
    \ “Android automating UI tests” in your favorite search engine to find resources.\n\
    \n## 16. Troubleshooting\n\nIn the previous chapter, we talked about ways to test\
    \ your app. If tests fail, the logs usually tell you what exactly happens, and\
    \ if this is not enough, you can extend the logging of your app to see where things\
    \ go wrong.  \nBut even with the best possible testing concept, it might still\
    \ happen that your app doesn’t exactly behave as it is supposed to. First, it\
    \ might just sometimes not do the right things from a functional perspective.\
    \ Second, it might be ill-behaving from a non-functional perspective, which means\
    \ it eats up memory resources as time goes by or it might perform bad in terms\
    \ of speed.  \nIn this chapter we talk about techniques to remedy problems that\
    \ your app might expose. We will talk about logging, debugging, and monitoring\
    \ and the tools from inside Android Studio or the SDK that help us with respect\
    \ to them.\n\n### Logging\n\nLogging in Android is impressively easy – you just\
    \ import `android.util.Log`, and inside your code you write statements like `Log.e(\"\
    LOG\", \"Message\")` to issue logging messages. Android Studio then helps you\
    \ gather, filter, and analyze the logging.  \nWhile for developing using this\
    \ logging is extremely handy, when it comes to publishing your app, it gets problematic.\
    \ You don’t want to thwart the performance of your app, and the documentation\
    \ suggests to remove all logging, basically negating all the work you put in the\
    \ logging. If your users later report problems, you add logging statements for\
    \ troubleshooting, remove them later again after the fix has been done, and so\
    \ on.\n\nTo rectify this procedure, I suggest instead adding a simple wrapper\
    \ around the logging from the beginning:\n\n```kotlin\nclass Log {\n    companion\
    \ object {\n        fun v(tag: String, msg: String) {\n            android.util.Log.v(tag,\
    \ msg)\n        }\n        fun v(tag: String, msg: String, tr: Throwable) {\n\
    \            android.util.Log.v(tag, msg, tr)\n        }\n        fun d(tag: String,\
    \ msg: String) {\n            android.util.Log.d(tag, msg)\n        }\n      \
    \  fun d(tag: String, msg: String, tr: Throwable) {\n            android.util.Log.d(tag,\
    \ msg, tr)\n        }\n        fun i(tag: String, msg: String) {\n           \
    \ android.util.Log.i(tag, msg)\n        }\n        fun i(tag: String, msg: String,\
    \ tr: Throwable) {\n            android.util.Log.i(tag, msg, tr)\n        }\n\
    \        fun w(tag: String, msg: String) {\n            android.util.Log.w(tag,\
    \ msg)\n        }\n        fun w(tag: String, msg: String, tr: Throwable) {\n\
    \            android.util.Log.w(tag, msg, tr)\n        }\n        fun w(tag: String,\
    \ tr: Throwable) {\n            android.util.Log.w(tag, tr)\n        }\n     \
    \   fun e(tag: String, msg: String) {\n            android.util.Log.e(tag, msg)\n\
    \        }\n        fun e(tag: String, msg: String, tr: Throwable) {\n       \
    \     android.util.Log.e(tag, msg, tr)\n        }\n    }\n}\n```\n\nYou can then\
    \ use the same simple logging notation as for the Android standard, but are free\
    \ later to change the logging implementation without touching the rest of your\
    \ code. You could, for example, add a simple switch:\n\n```kotlin\nclass Log {\n\
    \    companion object {\n        val ENABLED = true\n        fun v(tag: String,\
    \ msg: String) {\n            if(!ENABLED) return\n            // <- add this\
    \ to all the other statements\n            android.util.Log.v(tag, msg)\n    \
    \    }\n        ...\n    }\n}\n```\n\nOr you could enable logging only for virtual\
    \ devices. Unfortunately, there is no easy and reliable way to find out if your\
    \ app is running on a virtual device. All solutions presented in blogs have their\
    \ pros and cons and are subject to change for new Android versions. What you could\
    \ do instead is to transport build variables to your app. To do so, add in your\
    \ app’s `build.gradle` file:\n\n```groovy\nbuildTypes {\n    release {\n     \
    \   ...\n        buildConfigField \"boolean\", \"LOG\", \"false\"\n    }\n   \
    \ debug {\n        ...\n        buildConfigField \"boolean\", \"LOG\", \"true\"\
    \n    }\n}\n```\n\nAll you have to do then in your logging implementation is replace:\n\
    \n```kotlin\nval ENABLED = BuildConfig.LOG\n```"
