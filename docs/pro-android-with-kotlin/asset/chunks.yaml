    另请参阅 [`https://developer.android.com/studio/command-line`](https://developer.android.com/studio/command-line)。


    # Android Debug Bridge (ADB)


    由 `adb` 命令调用的 *Android Debug Bridge* (ADB) 是一个多功能工具，用于从开发 PC 连接到正在运行的模拟器以及通过 USB
    或 Wi-Fi 连接的设备。它由开发 PC 上的客户端和透明服务器进程以及设备上运行的守护进程组成。你可以使用 `adb` 来：


    *   查询可访问的设备。

    *   安装和卸载应用（APK 文件）。

    *   向设备复制文件或从设备复制文件。

    *   执行备份和恢复。

    *   连接到应用的日志输出。

    *   在设备上启用 root 访问权限。

    *   在设备上启动 Shell（例如，查看和检查应用的文件）。

    *   启动和停止活动和服务。

    *   发送广播。

    *   启动和停止性能分析会话。

    *   转储堆。

    *   访问设备上的包管理器。

    *   截取屏幕截图和录制视频。

    *   重启设备。


    更多详情，请查阅在线文档中的 “Android Debug Bridge” 页面（[`https://developer.android.com/studio/command-line/adb`](https://developer.android.com/studio/command-line/adb)）。通过以下方式调用它：


    ```

    ./adb

    ```


    显示命令自带的帮助信息，例如：


    ```

    ./adb devices

    ```


    列出已连接的设备，以及 `./adb -s DEVICE_NAME shell` 在设备上打开 Shell，其中 `DEVICE_NAME` 参数是设备列表第一列中的条目之一。如果只有一个设备，则在后一个命令中可以省略
    `-s` 标志和设备名称。


    **注意**


    你必须在真实设备上启用调试功能，以便 ADB 能够成功连接到它们。


