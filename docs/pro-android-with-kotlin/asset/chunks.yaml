- fmt: "# Starting and Binding to Services in Android\n\n## Starting a Service\n\n\
    In order to explicitly start a service, you need an appropriate `Intent`. We basically\
    \ have two cases:\n\n### Internal Service (Same App)\n\nFirst, if the service\
    \ lives in the same app as the client (invoker) of the service, you can write:\n\
    \n```\nval intent = Intent(this, TheService::class.java)\nstartService(intent)\n\
    ```\n\nfor a normal service or:\n\n```\nval intent = Intent(this, TheService::class.java)\n\
    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {\n    startForegroundService(intent)\n\
    } else {\n    startService(intent)\n}\n```\n\nfor a foreground service as defined\
    \ starting in Android 8.0 or API level 26 (for versions prior to that, we start\
    \ it the normal way). So we can directly refer to the service class. The `TheService::class.java`\
    \ notation may look strange at first glance if you are a new Kotlin developer\
    \ – it is just the Kotlin way of providing Java classes as an argument.\n\n> **Note**\n\
    > Since `Intent`s allow general-purpose extra attributes by using one of the various\
    \ `putExtra()` methods, we can also pass data to the service.\n\n### External\
    \ Service (Another App)\n\nSecond, if the service we want to start is part of\
    \ another app and thus is an *external* service, first you have to add an intent\
    \ filter inside the service declaration, for example:\n\n```\n<action android:name=\"\
    <PCKG_NAME>.START_SERVICE\" />\n```\n\nwhere `<PCKG_NAME>` is the name of the\
    \ app's package and instead of `START_SERVICE` you can write a different identifier\
    \ if you like. Now, inside the service client, you can write:\n\n```\nval intent\
    \ = Intent(\".START_SERVICE\")\nintent.setPackage(\"<PCKG_NAME>\")\nstartService(intent)\n\
    // ... do something ...\nstopService(intent)\n```\n\nto start and stop the external\
    \ service, where inside the intent constructor you have to write the very same\
    \ string as in the intent filter declaration of the service. The `setPackage()`\
    \ statement is important here (of course you have to substitute the service's\
    \ package name); otherwise, a security restriction applies, and you get an error\
    \ message.\n\n## Binding to Services\n\nStarting a service is one part of the\
    \ story – the other part is using it while it is running. This is what the *binding*\
    \ of services is used for.\n\n### Internal Binding (Same App)\n\nTo create a service\
    \ that can be bound to from the same app, write something like:\n\n```\n/**\n\
    \ * Class used for binding locally, i.e. in the same App.\n */\nclass MyBinder(val\
    \ servc: MyService) : Binder() {\n    fun getService(): MyService {\n        return\
    \ servc\n    }\n}\n\nclass MyService : Service() {\n    // Binder given to clients\n\
    \    private val binder: IBinder = MyBinder(this)\n    // Random number generator\n\
    \    private val generator: Random = Random()\n\n    override fun onBind(intent:\
    \ Intent): IBinder {\n        return binder\n    }\n\n    /** method for clients\
    \ */\n    fun getRandomNumber(): Int {\n        return generator.nextInt(100)\n\
    \    }\n}\n```\n\nTo bind to this service internally, from the same app, inside\
    \ the service client, write:\n\n```\nval servcConn = object : ServiceConnection\
    \ {\n    override fun onServiceDisconnected(compName: ComponentName?) {\n    \
    \    Log.e(\"LOG\", \"onServiceDisconnected: \" + compName)\n    }\n\n    override\
    \ fun onServiceConnected(compName: ComponentName?,\n                         \
    \           binder: IBinder?) {\n        Log.e(\"LOG\", \"onServiceConnected:\
    \ \" + compName)\n        val servc = (binder as MyBinder).getService()\n    \
    \    Log.i(\"LOG\", \"Next random number from service: \" +\n                servc.getRandomNumber())\n\
    \    }\n\n    override fun onBindingDied(compName: ComponentName) {\n        Log.e(\"\
    LOG\", \"onBindingDied: \" + compName)\n    }\n}\n\nval intent = Intent(this,\
    \ MyService::class.java)\nval flags = BIND_AUTO_CREATE\nbindService(intent, servcConn,\
    \ flags)\n```\n\nwhere the `object : ServiceConnection {...}` construct is the\
    \ Kotlin way of implementing an interface by creating an object of an anonymous\
    \ inner class, as `new ServiceConnection(){ ... }` in Java. The construct is called\
    \ *object expression* in Kotlin. The `this` inside the intent constructor in this\
    \ case refers to a `Context` object. You can use it like this inside an activity.\
    \ If you have the `Context` in a variable instead, use that variable's name here.\n\
    \nOf course instead of the logging, you should do more meaningful things. Especially\
    \ inside the `onServiceConnected()` method, you can save the binder or service\
    \ in a variable for further use. Just make sure, having said all these, that you\
    \ appropriately react to a died binding or a killed service connection. You could,\
    \ for example, try to bind to the service again or tell the user or both.\n\n\
    The preceding code starts the service automatically once you bind to it, and it\
    \ doesn't exist yet. This happens by virtue of the:\n\n```\nval flags = BIND_AUTO_CREATE\n\
    [...]\n```\n\nstatement. If you don't need it because you are sure the service\
    \ is running, you can omit it. In most cases it is however better to include that\
    \ flag. The flags you can use for setting binding characteristics are as follows:\n\
    \n- **`BIND_AUTO_CREATE`**: We just used that. It means the service gets started\
    \ automatically if it hasn't started yet. You'll sometimes read that explicitly\
    \ starting a service is unnecessary if you bind to it, but this is only true if\
    \ you set this flag.\n\n- **`BIND_DEBUG_UNBIND`**: This leads to saving the callstack\
    \ of a following `unbindService()`, just in case subsequent unbind commands are\
    \ wrong. If this happens, a more verbose diagnostic output will be shown. Since\
    \ this imposes a memory leak, this feature should be used only for debugging purposes.\n\
    \n- **`BIND_NOT_FOREGROUND`**: Only if the client runs in a foreground process\
    \ and the target service runs in a background process. With this flag the binding\
    \ process will not raise the service to foreground scheduling priority.\n\n- **`BIND_ABOVE_CLIENT`**:\
    \ With this flag, we express the service to be more important than the client\
    \ (i.e., service invoker). In case of a resource shortage, the system will kill\
    \ the client prior to the service invoked.\n\n- **`BIND_ALLOW_OOM_MANAGEMENT`**:\
    \ This flag tells the Android OS that you more willingly accept Android treating\
    \ the binding as noncritical and killing the service under low-memory circumstances.\n\
    \n- **`BIND_WAIVE_PRIORITY`**: This flag leads to leaving the scheduling of the\
    \ service invocation up to the process where the service runs in.\n\nJust add\
    \ them together in a combination that suits your needs.\n\n> **Note**\n> Binding\
    \ is not possible from inside a `BroadcastReceiver` component, unless the `BroadcastReceiver`\
    \ has been registered via `registerReceiver(receiver, intentfilter)`. In the latter\
    \ case, the lifetime of the receiver is tied to the registering component. You\
    \ can however from broadcast receivers pass instruction strings inside the `Intent`\
    \ you used for starting, that is, not binding, the service.\n\n### External Binding\
    \ (Another App)\n\nTo bind to an external service, that is, a service belonging\
    \ to another app, you cannot use the same binding technique as described for internal\
    \ services. The reason for that is the `IBinder` interface we are using cannot\
    \ directly access the service class, since the class is not visible across process\
    \ boundaries. We can however wrap data to be transported between the service and\
    \ the service client into an `android.os.Handler` object and use this object to\
    \ send data from the service client to the service. To achieve this, for the service\
    \ we first need to define a `Handler` for receiving messages, for example:"
