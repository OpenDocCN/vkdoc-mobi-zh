- fmt: '# Kotlin Best Practices


    Development is not only about solving IT-related problems or implementing requirements;
    you also want to write “good” software. What “good” exactly means in this context
    is a little blurry, though. A lot of aspects play a role here: quick development,
    high execution performance, short programs, readable programs, high program stability,
    and so on. All of them have their merits, and exaggerating any of them will thwart
    the other aspects.


    In fact, you should have all of them in mind. Experience tells however to put
    some stress on the following aspects:


    - Make programs comprehensive (or expressive). A super-elegant solution that nobody
    else understands maybe makes you happy, but bear in mind that later maybe other
    people need to understand your software.

    - Keep programs simple. Overly complex solutions are subject to instabilities.
    Of course you will not wake up one morning and say, “OK, today I will write a
    simple program to solve requirement XYZ.” Writing simple programs that reliably
    solve problems is a matter of experience, and it comes with years of practice.
    But you can always try to constantly get better in writing simple programs. A
    good starting point is always asking yourself “Shouldn’t there be a simpler solution
    to this?” for any part of your software, and looking at the API documentations
    and the programming language reference in quite some cases, you *will* find easier
    solutions doing the same as what you currently have.

    - Don’t repeat yourself. This principle, commonly referred to as “DRY” programming,
    cannot be overemphasized. Whenever you find yourself using `Ctrl+C` and `Ctrl+V`
    to copy some program passages, think of instead using one function or one lambda
    expression providing just one place where things are done.

    - Do expectable and anticipatable things. You can overwrite class methods and
    operators in Kotlin, and you can dynamically add functions to existing classes,
    even to such basic classes like `String`. In any case make sure such extensions
    work as expected looking at their names, for if they didn’t, the program would
    be hard to understand.


    Kotlin helps with all of these aspects and quite often does a better job than
    the venerable Java. In the following sections, we point out a couple of Kotlin
    concepts you can use to make your program short, simple, and expressive. Note
    that the sum of these concepts is far away from being a complete documentation
    of Kotlin. So for more details, please see the online documentation or a Kotlin
    book.


    ## Functional Programming


    While functional programming as a development paradigm entered Java with version
    8, Kotlin supports a functional programming style from the beginning. In functional
    programming you prefer non-mutable values over variables, avoid state machines,
    and allow functions as parameters to functions. Also, the lambda calculus allows
    for passing functions without names. Kotlin provides us with all that.


    In Java you have the `final` modifier to express a variable isn’t going to be
    changed after first initialization. While most Java developers use `final` modifiers
    for constants as in


    ```

    public class Constants {

    public final static int CALCULATION_PRECISION = 10;

    public final static int MAX_ITERATIONS = 1000;

    ...

    }

    ```


    I barely ever saw developers using it inside the coding, which is a pity, since
    it improves both readability and stability. The temptation to omit it for saving
    a few keystrokes is just too big. In Kotlin the story is different – you say `val`
    to express a data object remains constant during its lifetime and `var` if you
    need a real variable:


    ```

    fun getMaxFactorial():Int = 13

    fun fact(n:Int):Int {

    val maxFactorial = getMaxFactorial()

    if(n > maxFactorial)

    throw RuntimeException("Too big")

    var x = 1

    for( i in 1..(n) ) {

    x *= i

    }

    return x

    }

    val x = fact(12)

    System.out.println("12! = ${x}")

    ```'
