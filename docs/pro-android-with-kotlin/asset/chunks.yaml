    \ gets entered. You can either stop from here or start\n    again.\n\nNote that\
    \ the various static `create(...)` factory\nmethods  gather\nseveral transitions.\
    \ For details please see the API documentation.\n\nTo give you an example, a basic\
    \ player UI for playing a music file from\ninside the `assets` folder,\nutilizing\
