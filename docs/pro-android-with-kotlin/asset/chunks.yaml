    and that the leanback user interface needed by Android TV gets included.


    - Still inside the manifest file, you will see the start activity to have an intent
    filter like


    The category shown here is important; otherwise, Android TV will not properly
    recognize the app. The activity also needs to have an `android:banner` attribute,
    which points to a banner prominently shown on the Android TV user interface.


    - Inside the module’s `build.gradle` file, the leanback support library gets added
    inside the dependencies section:


    ```

    implementation ''com.android.support:leanback-v17:27.1.1''

    ```


    For development you can either use a virtual or a real device. Virtual devices
    get installed via the AVD Manager in the Tools menu. For real devices, tap seven
    times the build number in Settings ➤ Device ➤ About. Back in Settings, go to Preferences
    and enable debugging in the Developer Options.


    ## Android TV Hardware Features


    To find out whether an app is running on an Android TV, you can use the `UiModeManager`
    as follows:


    ```

    val isRunnigOnTv =

    (getSystemService(Context.UI_MODE_SERVICE)

    as UiModeManager).currentModeType ==

    Configuration.UI_MODE_TYPE_TELEVISION

    ```


    Also, available features vary from device to device. If your app needs certain
    hardware features, you can check the availability as follows:


    ```

    getPackageManager().

    hasSystemFeature(PackageManager.FEATURE_*)

    ```


    For all possible features, see the API documentation of the `PackageManager`.
    User input on Android TV devices normally happens via a D-pad controller. To build
    stable apps, you should react to changes on the availability of the D-pad controller:
    inside the `AndroidManifest.xml` file, add `android:configChanges = "keyboard|keyboardHidden|navigation"`
    as an activity attribute. The app then gets informed about configuration changes
    via the overwritten callback function `fun onConfigurationChanged( newConfig :
    Configuration )`.


    ## UI Development for Android TV


    For Android TV development, using the leanback theme is suggested. For this aim
    replace the `theme` attribute in the `<application>` element of the `AndroidManifest.xml`
    file with


    ```

    android:theme="@style/Theme.Leanback"

    ```


    This implies not using an action bar, which makes sense since Android TV does
    not support action bars. Also, the activity must not extend `AppCompatActivity`,
    but instead must extend `android.support.v4.app.FragmentActivity`.


    Another specialty of Android TV apps is that an occasional overscan might happen:
    depending on pixel size and aspect ratio, Android TV might clip away parts of
    the screen. In order to avoid your layout being destroyed, adding a margin of
    48 dp × 27 dp to the main container is suggested, as in


    Besides, for Android TV a development for 1920 × 1080 pixels is suggested. With
    other hardware pixel sizes, Android will then automatically downscale layout elements
    if necessary. Since users cannot navigate through tappable UI elements and instead
    use a D-pad for navigation, an alternative way to switch between UI elements is
    needed for Android TV. This can easily be accomplished by adding `nextFocusUp`,
    `nextFocusDown`, `nextFocusLeft`, and `nextFocusRight` attributes to UI elements.
    The arguments are then ID specifications of navigate-to elements as in `"@+id/xyzElement"`.


    For TV playback components, the leanback library provides a couple of classes
    and concepts, which come in handy:


    - For a media browser, let your fragment extend `android.support.v17.leanback.app.BrowseSupportFragment`.
    The project builder wizard instead creates a deprecated `BrowseFragment`, but
    you can walk through the API documentation of `BrowseSupportFragment` to learn
    the new methodology.


    - The actual media items to be presented inside the media browser are governed
    by a card view. The corresponding class to overwrite is `android.support.v17.leanback.widget.Presenter`.


    - To show details of a selected media item, extend class `android.support.v17.leanback.app.DetailsSupportFragment`.
    The wizard creates the deprecated `DetailFragment` instead, but their usage is
    similar, and you can have a look at the API documentation for more details.


    - For a UI element showing video playback, use one of `android.support.v17.leanback.app.PlaybackFragment`
    and `android.support.v17.leanback.app.VideoFragment`.


    - Use class `android.media.session.MediaSession` to configure a *Now Playing*
    card.


    - Direct rendering of a video stream onto a UI element is supported by class `android.media.tv.TvInputService`.
    Calling `onTune(...)` will start rendering the direct video stream.


    - If your app needs a guide using several steps, for example, to present a purchasing
    workflow to the user, you can use class `android.support.v17.leanback.app.GuidedStepSupportFragment`.


    - To present an app to the first-time user in a non-interactive way, use class
    `android.support.v17.leanback.app.OnboardingSupportFragment`.


    ## Recommendation Channels for Content Search


    Recommendations shown to users come in two forms: as a recommendation row before
    Android 8.0 and as recommendation channels starting with Android 8.0 or API level
    26. To not miss users, your app should serve both in a switch:


    ```

    if (android.os.Build.VERSION.SDK_INT >=

    Build.VERSION_CODES.O) {

    // Recommendation channels API ...

    } else {

    // Recommendations row API ...

    }

    ```


    For Android 8.0 and later, the Android TV home screen shows a global *Play Next*
    row at the top of the channel list and a number of channels each belonging to
    a certain app. A channel other than the *Play Next* row cannot belong to more
    than one app. Each app can define a *default channel*, which automatically shows
    up in the channel view – for all other channels an app might define, the user
    must approve first before the channel gets shown on the home screen.


    An app needs to have the following permissions in order to be able to manage channels:


    So add them to file `AndroidManifest.xml`.


    In addition inside your module’s `build.gradle` file, add to the `dependencies`
    section (one line)


    ```

    implementation

    ''com.android.support:support-tv-provider:27.1.1''

    ```


    To create a channel, add a channel logo, and possibly make it the default channel,
    write


    ```

    val builder = Channel.Builder()

    // Intent to execute when the App link gets tapped.

    val appLink = Intent(...).toUri(Intent.URI_INTENT_SCHEME)

    // You must use type `TYPE_PREVIEW`

    builder.setType(TvContractCompat.Channels.TYPE_PREVIEW)

    .setDisplayName("Channel Name")

    .setAppLinkIntentUri(Uri.parse(appLink))

    val channel = builder.build()

    val channelUri = contentResolver.insert(

    TvContractCompat.Channels.CONTENT_URI,

    channel.toContentValues())

    val channelId = ContentUris.parseId(channelUri)

    // Choose one or the other

    ChannelLogoUtils.storeChannelLogo(this, channelId,

    /*Uri*/ logoUri)

    ChannelLogoUtils.storeChannelLogo(this, channelId,

    /*Bitmap*/ logoBitmap)

    // optional, make it the default channel

    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O)

    TvContractCompat.requestChannelBrowsable(this,

    channelId)

    ```


    To update or delete a channel, you use the channel ID gathered from the channel
    creation step and then write


    ```

    // to update:

    contentResolver.update(

    TvContractCompat.buildChannelUri(channelId),

    channel.toContentValues(), null, null)

    // to delete:

    contentResolver.delete(

    TvContractCompat.buildChannelUri(channelId),

    null, null)

    ```


