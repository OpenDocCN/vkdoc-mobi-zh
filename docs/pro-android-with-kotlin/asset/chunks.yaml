  trans: "```kotlin\nclass MainActivity : WearableActivity() {\n    override fun onCreate(savedInstanceState:\
    \ Bundle?) {\n        super.onCreate(savedInstanceState)\n        setContentView(activity_main)\n\
    \        setAmbientEnabled() // 启用常亮模式\n    }\n    fun go(v: View) {\n       \
    \ val notificationId = 1\n        // 通知的频道 ID\n        val id = \"my_channel_01\"\
    \n        if (Build.VERSION.SDK_INT >=\n            Build.VERSION_CODES.O) {\n\
    \            // 创建 NotificationChannel\n            val name = \"My channel\"\n\
    \            val description = \"Channel description\"\n            val importance\
    \ =\n                NotificationManager.IMPORTANCE_DEFAULT\n            val mChannel\
    \ = NotificationChannel(\n                id, name, importance)\n            mChannel.description\
    \ = description\n            // 向系统注册频道\n            val notificationManager =\
    \ getSystemService(\n                Context.NOTIFICATION_SERVICE)\n         \
    \           as NotificationManager\n            notificationManager.\n       \
    \         createNotificationChannel(mChannel)\n        }\n        // 对于 Android\
    \ 7.1.1（API 级别 25）及更低版本，通知频道 ID 将被忽略\n        val notificationBuilder =\n    \
    \        NotificationCompat.Builder(this, id)\n                .setSmallIcon(android.R.drawable.ic_media_play)\n\
    \                .setContentTitle(\"标题\")\n                .setContentText(\"\
    内容文本\")\n        // 获取 NotificationManager 服务\n        val notificationManager\
    \ =\n            NotificationManagerCompat.from(this)\n        // 发出通知\n     \
    \   notificationManager.notify(\n            notificationId, notificationBuilder.build())\n\
    \    }\n}\n```\n\n如果启动此应用，会显示一个包含文本和按钮的简单 UI。按下按钮后会短暂显示通知图标，在我们的示例中是一个“播放”矩形。使用返回键和上滑手势，通知会显示标题和内容。此外，用户使用的表盘上可能添加了通知预览。参见图\
    \ 14-1。\n\n![](img/463716_2_En_14_Fig1_HTML.jpg)\n\n三个帧分别显示带有播放按钮和不同文本的 UI。1.\
    \ 你好圆形世界、GO 按钮。2. 时钟显示电池 100%、时间 19:35 和日期 4 月 6 日。3. 标题、内容文本。\n\n**图 14-1** Wear\
    \ 上的通知\n\n你还可以在代码中添加 `PendingIntent`，并在构建器内使用 `setContentIntent(...)` 注册它，以便在用户点击出现的通知时发送\
    \ Intent。此外，在构建器内，你还可以通过 `addAction(...)` 或 `addActions(...)` 添加额外的操作图标。通过构建 `NotificationCompat.WearableExtender`\
    \ 对象并在构建器上调用 `extent(...)` 并传入此扩展器对象，可以将 Wear 特定的功能添加到通知中。请注意，通过向 `WearableExtender`\
    \ 对象（而非构建器）添加操作，可以确保这些操作仅在可穿戴设备上显示。如需向 Wear 通知添加语音功能、使用预定义文本回复以及在桥接模式下使用特殊功能，请参阅在线文档：[`https://developer.android.com/training/wearables/notifications/index.xhtml`](https://developer.android.com/training/wearables/notifications/index.xhtml)。\n\
    \n## 控制应用在可穿戴设备上的可见性\n\n从 Android 5.1 开始，Wear OS 设备允许即使在启用省电模式或*环境光*模式时，也能在后台运行\
    \ Wear 应用。你有两种方式来处理环境光模式：\n\n*   使用 `AmbientModeSupport` 类。\n*   使用 `WearableActivity`\
    \ 类。\n\n要使用 `AmbientModeSupport` 类，需实现 `Activity` 的子类，实现 `AmbientCallbackProvider`\
    \ 接口，并按以下方式声明和保存 `AmbientController`：\n\n```kotlin\nclass MainActivity : FragmentActivity(),\n\
    \    AmbientModeSupport.AmbientCallbackProvider {\n    override\n    fun getAmbientCallback():\n\
    \        AmbientModeSupport.AmbientCallback\n    {\n        ...\n    }\n    lateinit\n\
    \    var mAmbientController:\n        AmbientModeSupport.AmbientController\n \
    \   override\n    fun onCreate(savedInstanceState:Bundle?) {\n        super.onCreate(savedInstanceState)\n\
    \        ...\n        mAmbientController =\n            AmbientModeSupport.attach(this)\n\
    \    }\n}\n```\n\n在 `getAmbientCallback()` 函数内部，创建并返回 `AmbientModeSupport.AmbientCallback`\
    \ 的子类。此回调负责在标准模式和环境光模式之间切换。环境光模式的具体行为由你作为开发者决定，但你应该采取省电措施，例如变暗的黑白图形、延长更新间隔等。允许环境光模式的第二种方式是让你的\
    \ Activity 继承 `WearableActivity` 类，在其 `onCreate(...)` 回调中调用 `setAmbientEnabled()`，并重写\
    \ `onEnterAmbient()` 和 `onExitAmbient()`。如果你还重写了 `onUpdateAmbient()`，可以将屏幕更新逻辑放在其中，并让系统决定环境光模式下使用的更新频率。\n\
    \n## Wear 中的身份验证\n\n随着 Wear 应用能够在独立模式下运行，身份验证变得更加重要。详细描述相关适当的程序超出了本书的范围，但 [`https://developer.android.com/training/wearables/overlays/auth-wear`](https://developer.android.com/training/wearables/overlays/auth-wear)\
    \ 页面提供了有关 Wear 中身份验证的详细信息。\n\n## Wear 中的语音功能\n\n为 Wear 设备添加语音功能非常有意义，因为由于设备尺寸较小，其他用户输入方法受到限制。你有两种选择：将你的应用连接到一个或多个系统提供的语音操作，或者定义你自己的操作。\n\
    \n> **注意**\n>\n> Wear 模拟器无法处理语音命令——你必须使用真实设备进行测试。\n\n将系统语音事件连接到你的应用提供的 Activity\
    \ 很简单——你只需按如下方式向 Activity 添加 intent 过滤器即可：\n\n可能的语音键列于表 14-1 中。\n\n**表 14-1**\
    \ 系统语音命令\n\n| 命令 | 清单键 | 附加数据 |\n| --- | --- | --- |\n| “OK, Google, 帮我叫辆出租车”<br>“OK,\
    \ Google, 帮我叫车” | `com.google.android.gms.actions.RESERVE_TAXI_RESERVATION` |\
    \ - |\n| “OK, Google, 记个笔记”<br>“OK, Google, 给自己记笔记” | `android.intent.action.SEND`<br>类别：`com.android.voicesearch.SELF_NOTE`\
    \ | `android.content.Intent.EXTRA_TEXT` – 包含笔记内容的字符串 |\n| “OK, Google, 设一个早上 8\
    \ 点的闹钟”<br>“OK, Google, 明早 6 点叫我起床” | `android.intent.action.SET_ALARM` | `android.provider.AlarmClock.EXTRA_HOUR`\
    \ – 表示闹钟小时的整数。<br>`android.provider.AlarmClock.EXTRA_MINUTES` – 表示闹钟分钟的整数 |\n\
    | “OK, Google, 设一个 10 分钟的计时器” | `android.intent.action.SET_TIMER` | `android.provider.AlarmClock.EXTRA_LENGTH`\
    \ – 表示计时器时长的整数，范围 1–86400（24 小时内的秒数） |\n| “OK, Google, 开始秒表” | `com.google.android.wearable.action.STOPWATCH`\
    \ | - |\n| “OK, Google, 开始骑行”<br>“OK, Google, 开始骑车”<br>“OK, Google, 停止骑行” | `vnd.google.fitness.TRACK`<br>Mime\
    \ 类型：`vnd.google.fitness.activity/biking` | `actionStatus` – 字符串，开始时值为 `ActiveActionStatus`，停止时值为\
    \ `CompletedActionStatus` |\n| “OK, Google, 追踪我的跑步”<br>“OK, Google, 开始跑步”<br>“OK,\
    \ Google, 停止跑步” | `vnd.google.fitness.TRACK`<br>Mime 类型：`vnd.google.fitness.activity/running`\
    \ | `actionStatus` – 字符串，开始时值为 `ActiveActionStatus`，停止时值为 `CompletedActionStatus`\
    \ |\n| “OK, Google, 开始锻炼”<br>“OK, Google, 追踪我的锻炼”<br>“OK, Google, 停止锻炼” | `vnd.google.fitness.TRACK`<br>Mime\
    \ 类型：`vnd.google.fitness.activity/other` | `actionStatus` – 字符串，开始时值为 `ActiveActionStatus`，停止时值为\
    \ `CompletedActionStatus` |\n| “OK, Google, 我的心率是多少？”<br>“OK, Google, 我的 BPM 是多少？”\
    \ | `vnd.google.fitness.VIEW`<br>Mime 类型：`vnd.google.fitness.data_type/com.google.heart_rate.bpm`\
    \ | - |\n```"
- fmt: "# “OK, Google” Voice Actions and Data Extraction\n\n“OK, Google, how many\
    \ steps have I taken?” “OK, Google, what’s my step count?”\n\n| Action | Mime\
    \ Type |\n|--------|-----------|\n| `vnd.google.fitness.VIEW` | `vnd.google.fitness.data_type/com.google.step_count.cumulative`\
    \ |\n\nExtra data can be extracted from incoming `Intent`s as usual via one of\
    \ the various `Intent.get*Extra(...)` methods.\n\nYou may also provide app-defined\
    \ voice actions, which can start custom activities. To do so, inside `AndroidManifest.xml`\
    \ define each `<action>` element in question as follows:\n\n```xml\n<activity\n\
    \    android:name=\".MyRunningApp\"\n    android:label=\"@string/start_my_running_app\"\
    >\n    <intent-filter>\n        <action android:name=\"android.intent.action.VOICE_COMMAND\"\
    \ />\n    </intent-filter>\n</activity>\n```\n\nwhich by virtue of the “label”\
    \ attribute will allow you to speak “Start MyRunningApp” to start the activity.\n\
    \nYou can also let speech recognition fill edit fields. For this purpose, write:\n\
    \n```kotlin\nval SPEECH_REQUEST_CODE = 42\nval intent = Intent(\n    RecognizerIntent.ACTION_RECOGNIZE_SPEECH).apply\
    \ {\n    putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL,\n        RecognizerIntent.LANGUAGE_MODEL_FREE_FORM)\n\
    }.run {\n    startActivityForResult(this, SPEECH_REQUEST_CODE)\n}\n```\n\nand\
    \ fetch the result in the overwritten `onActivityResult(...)` callback:\n\n```kotlin\n\
    fun onActivityResult(requestCode: Int, resultCode: Int,\n                    \
    \ data: Intent) {\n    if (requestCode and 0xFFFF == SPEECH_REQUEST_CODE\n   \
    \     && resultCode == RESULT_OK) {\n        val results = data.getStringArrayListExtra(\n\
    \            RecognizerIntent.EXTRA_RESULTS)\n        val spokenText = results[0]\n\
    \        // ... do something with spoken text\n    }\n    super.onActivityResult(\n\
    \        requestCode, resultCode, data)\n}\n```\n\n# Speakers on Wearables\n\n\
    If you want to use the speakers connected to a Wear device to play some audio,\
    \ you first check whether the Wear app can connect to speakers:\n\n```kotlin\n\
    fun hasSpeakers(): Boolean {\n    val packageManager = context.getPackageManager()\n\
    \    val audioManager =\n        context.getSystemService(\n            Context.AUDIO_SERVICE)\
    \ as AudioManager\n    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {\n\
    \        // Check FEATURE_AUDIO_OUTPUT to guard against\n        // false positives.\n\
    \        if (!packageManager.hasSystemFeature(\n                PackageManager.FEATURE_AUDIO_OUTPUT))\
    \ {\n            return false\n        }\n        val devices =\n            audioManager.getDevices(\n\
    \                AudioManager.GET_DEVICES_OUTPUTS)\n        for (device in devices)\
    \ {\n            if (device.type ==\n                AudioDeviceInfo.TYPE_BUILTIN_SPEAKER)\
    \ {\n                return true\n            }\n        }\n    }\n    return\
    \ false\n}\n```\n\nYou can then play sound the same way as for any other app on\
    \ any other device. This gets described in detail in the following in section\
    \ “Playing Media.”\n\n# Location in Wear\n\nTo use location detection in a Wear\
    \ device, you must first check if location data is available:\n\n```kotlin\nfun\
    \ hasGps(): Boolean {\n    return packageManager.hasSystemFeature(\n        PackageManager.FEATURE_LOCATION_GPS)\n\
    }\n```\n\nIf the wearable has no own location sensor, you must instead constantly\
    \ check whether the wearable is connected. You do so by handling callbacks as\
    \ in:\n\n```kotlin\nvar wearableConnected = false\nfun onCreate(savedInstanceState:\
    \ Bundle?) {\n    ...\n    Wearable.getNodeClient(this@MainActivity)\n       \
    \ .connectedNodes.addOnSuccessListener {\n            wearableConnected = it.any\
    \ {\n                it.isNearby\n            }\n        }.addOnCompleteListener\
    \ {\n        }.addOnFailureListener {\n            ...\n        }\n}\n```\n\n\
    Starting from there you can handle location detection using the *Fused Location\
    \ Provider* as described in section “Location and Maps” of Chapter [8](#463716_2_En_8_Chapter.xhtml).\n\
    \n# Data Communication in Wear\n\nData communication in the Wear OS happens in\
    \ one of two ways:\n\n- **Direct network communication**: This is for Wear devices\
    \ able to connect to a network by themselves, wishing to talk to non-paired devices.\n\
    - **Using the wearable data layer API**: This is for communication to paired handheld\
    \ devices.\n\nFor a direct network communication, use class `android.net.ConnectivityManager`\
    \ for both checking for capabilities like bandwidth and requesting new capabilities\
    \ like increased bandwidth. Please see the class’s online API documentation for\
    \ details. To actually perform network communication, use the classes and interfaces\
    \ from package `android.net`. The rest of this section is for describing the *wearable\
    \ data layer API* for communication to paired handhelds.\n\nTo access the wearable\
    \ data layer API, retrieve a `DataClient` or a `MessageClient` via:\n\n```kotlin\n\
    val dataClient = Wearable.getDataClient(this)\nval msgClient = Wearable.getMessageClient(this)\n\
    ```\n\nfrom inside an activity. You can do this often, for both calls are inexpensive.\
    \ A message client is best used for data with a small payload; for larger payloads,\
    \ use a data client instead. Also, a data client is a reliable means of synchronizing\
    \ data between Wear devices and handhelds, while a message client uses a fire-and-forget\
    \ mode. A message client thus does not know whether sent data actually arrives\
    \ or not.\n\nFor sending data items using a data client, create a `PutDataMapRequest`\
    \ object, call `getDataMap()` on it, and use one of the various `put...()` methods\
    \ to add data. Finally, call `asPutDataRequest()` and use its result to call `DataClient.putDataItem(...)`.\
    \ The latter starts the synchronization with other devices and returns a `com.google.android.gms.tasks.Task`\
    \ object to which you can add listeners to watch the communication. On the receiver\
    \ side, you can observe data synchronization by extending your activity with `DataClient.OnDataChangedListener`\
    \ and implementing the `fun onDataChanged(dataEvents: DataEventBuffer)` function.\n\
    \nFor larger binary data sets like images, you can use an `Asset` as a data type\
    \ to be sent over the data client, as in:\n\n```kotlin\nfun createAssetFromBitmap(bitmap:\
    \ Bitmap): Asset {\n    val byteStream = ByteArrayOutputStream()\n    bitmap.compress(Bitmap.CompressFormat.PNG,\
    \ 100,\n        byteStream)\n    return Asset.createFromBytes(byteStream\n   \
    \     .toByteArray())\n}\n\nval bitmap = BitmapFactory.decodeResource(\n    getResources(),\
    \ android.R.drawable.ic_media_play)\nval asset = createAssetFromBitmap(bitmap)\n\
    val dataMap = PutDataMapRequest.create(\"/image\")\ndataMap.getDataMap().putAsset(\"\
    profileImage\", asset)\nval request = dataMap.asPutDataRequest()\nval putTask:\
    \ Task<DataItem> =\n    Wearable.getDataClient(this).putDataItem(request)\n```\n\
    \nTo instead use a message client, we first need to find suitable message receivers.\
    \ You do so by first assigning capabilities to suitable handheld apps. This can\
    \ be accomplished by adding a file `wear.xml` to `res/values` and letting it read:\n\
    \n```xml\n<resources>\n    <string-array name=\"android_wear_capabilities\">\n\
    \        <item>my_capability1</item>\n        <item>my_capability2</item>\n  \
    \      ...\n    </string-array>\n</resources>\n```\n\nTo find a handheld (or network\
    \ node) with suitable capabilities and then send messages to it, you write:\n\n\
    ```kotlin\nval capabilityInfo = Tasks.await(\n    Wearable.getCapabilityClient(this).getCapability(\n\
    \        \"my_capability1\",\n        CapabilityClient.FILTER_REACHABLE))\ncapabilityInfo.nodes.find\
    \ {\n    it.isNearby\n}?.run {\n    msgClient.sendMessage(\n        this.id, \"\
    /msg/path\", \"Hello\".toByteArray())\n}\n```\n\nInstead of this you could also\
    \ add a `CapabilityClient.OnCapabilityChangedListener` listener directly to the\
    \ client like in:\n\n```kotlin\nWearable.getCapabilityClient(this).addListener({\n\
    \    it.nodes.find {\n        it.isNearby\n    }?.run {\n        msgClient.sendMessage(\n\
    \            this.id, \"/msg/path\", \"Hello\".toByteArray())\n    }\n}, \"my_capability1\"\
    )\n```\n\nTo receive such a message, anywhere in an app installed on a handheld,\
    \ register a message event listener via:\n\n```kotlin\nWearable.getMessageClient(this).addListener\
    \ {\n    messageEvent ->\n    // do s.th. with the message event\n}\n```\n\n#\
    \ Programming with Android TV\n\nApp development targeting an Android TV device\
    \ does not substantially differ from development on smartphones. However, due\
    \ to the user expectation coming from decades of TV consumption, conventions are\
    \ more strict compared with smartphones. Fortunately, the project builder wizard\
    \ of Android Studio helps you get started. And in this section too, we will be\
    \ talking about important aspects of Android TV development.\n\n## Android TV\
    \ Use Cases\n\nThe typical use cases for an Android TV app are:\n\n- Playback\
    \ of video and music data streams and files\n- A catalog to help users find content\n\
    - A game that can be played on Android TV (without touchscreen)\n- Presenting\
    \ channels with content\n\n## Starting an Android TV Studio Project\n\nIf you\
    \ start a new Android TV project in Android Studio, the prominent points of interest\
    \ are as follows:\n\n- Inside the manifest file, add the items"
