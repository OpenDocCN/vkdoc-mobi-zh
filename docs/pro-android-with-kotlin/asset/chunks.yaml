  trans: '

    - **`COLUMN_MIME_TYPE`**：（字符串）文档的 MIME 类型。必填项


    - **`COLUMN_SIZE`**：（长整型）文档的大小（以字节为单位），如果未知则为 `null`。必填项


    - **`COLUMN_SUMMARY`**：（字符串）文档的摘要，可能会显示给用户。可选项，可为 `null`


    对于网络相关操作，你可以先返回部分数据，并在 `Cursor` 上设置 `DocumentsContract.EXTRA_LOADING`，以表示仍在获取更多数据。然后，当网络数据可用时，你可以发送变更通知来触发重新查询并返回完整内容。为支持变更通知，你必须使用相关
    URI（可能来自 `DocumentsContract.buildChildDocumentsUri()`）触发 `Cursor.setNotificationUri()`。然后，你可以使用该
    URI 调用 `ContentResolver.notifyChange()` 来发送变更通知。


    - **`fun openDocument(documentId: String?, mode: String?, signal: CancellationSignal?):
    ParcelFileDescriptor`**


    打开并返回请求的文档。它应返回一个可靠的 `ParcelFileDescriptor`，以便检测远程调用方何时完成文档的读取或写入。如果在下载内容时阻塞，应定期检查
    `CancellationSignal.isCanceled()` 以放弃已废弃的打开请求。参数如下：`documentId` 是要返回的文档的 ID。`mode`
    指定“打开”模式，例如“r”、“w”或“rw”。应始终支持模式“r”。如果传递的模式不被支持，提供程序应抛出 `UnsupportedOperationException`。如果模式仅是“r”或“w”，你可以返回管道或套接字对，但像“rw”这样的复杂模式意味着磁盘上支持定位的普通文件。如果请求应被取消，调用者可能会使用
    `signal`。可为 `null`。


    - **`override fun queryDocument(documentId: String?, projection: Array<out String>?):
    Cursor`**


    返回单个请求文档的元数据。参数如下：`documentId` 是要返回的文档的 ID，`projection` 是放入游标的列列表。使用 `DocumentsContract.Document`
    中的常量；有关列表，请参见前面 `queryChildDocuments()` 方法描述。如果此处使用 `null`，则返回所有列。


    在文件 `AndroidManifest.xml` 中，注册文档提供程序的方式几乎与注册其他提供程序相同：


    在前面的查询中，我们看到 `Cursor` 对象返回标志，指示支持最近文档和在树内搜索。为实现这一点，你必须在你的 `DocumentsProvider`
    实现中实现一个或两个额外的方法：


    - **`override fun queryRecentDocuments(rootId: String, projection: Array<String>):
    Cursor`**


    旨在返回指定根目录下最近修改过的文档。返回的文档应按照 `COLUMN_LAST_MODIFIED` 降序排序，并且最多显示 64 条记录。最近文档不支持变更通知。


    - **`querySearchDocuments(rootId: String, query: String, projection: Array<String>):
    Cursor`**


    旨在返回指定根目录下与给定查询匹配的文档。返回的文档应按照相关性降序排序。对于慢速查询，你可以返回部分数据，并在游标上设置 `EXTRA_LOADING`，以表示正在获取更多数据。然后，当数据可用时，你可以发送变更通知来触发重新查询并返回完整内容。为支持变更通知，你必须使用相关
    URI（可能来自 `buildSearchDocumentsUri(String, String, String)`）调用 `setNotificationUri(ContentResolver,
    Uri)`。然后，你可以使用该 URI 调用方法 `notifyChange(Uri, android.database.ContentObserver,
    boolean)` 来发送变更通知。


    一旦你的文档提供程序配置并运行，客户端组件就可以使用 `ACTION_OPEN_DOCUMENT` 或 `ACTION_CREATE_DOCUMENT` Intent
    来打开或创建文档。Android 系统选择器将负责向用户展示适当的文档——你无需为文档提供程序提供自己的 GUI。


    此类客户端访问的示例如下：


    ```

    // 一个整数，可用于在调用的 Intent 返回时标识该调用

    val READ_REQUEST_CODE = 42

    // 此示例中使用的 ACTION_OPEN_DOCUMENT 是

    // 用于选择文档（例如通过系统文件浏览器选择文件）

    // 的 Intent

    val intent = Intent(Intent.ACTION_OPEN_DOCUMENT)

    // 过滤仅显示可以“打开”的结果，例如

    // 文件（与信息项列表相对）

    intent.addCategory(Intent.CATEGORY_OPENABLE)

    // 你可以使用过滤器，例如仅显示图像。

    // 要改为搜索所有文档，可以在此处使用 "*/*"

    intent.type = "image/*"

    // 实际的 Intent 调用 - 系统将提供 GUI

    startActivityForResult(intent, READ_REQUEST_CODE)

    ```


    当从系统选择器中选择一个项目后，要捕获 Intent 的返回，你可以编写类似以下内容：


    ```

    override fun onActivityResult(requestCode:Int,

    resultCode:Int,

    resultData:Intent) {

    // ACTION_OPEN_DOCUMENT Intent 是使用

    // 请求码 READ_REQUEST_CODE 发送的。如果此处看到的

    // 请求码不匹配，则它是某个其他 Intent 的响应，

    // 下面的代码不应运行。

    if (requestCode == READ_REQUEST_CODE

    && resultCode == Activity.RESULT_OK) {

    // 选中的文档显示在

    // intent.getData() 中

    val uri = resultData.data

    Log.i("LOG", "Uri: " + uri.toString())

    showImage(uri) // 用它做点什么

    }

    }

    ```


    除了像示例中那样打开文件，你还可以对 Intent 返回中收到的 URI 执行其他操作。例如，你也可以发出查询来获取元数据，如前面的查询方法所示。由于 `DocumentsProvider`
    继承自 `ContentProvider`，你可以使用其中描述的方法——请参阅前面的“提供内容文件”部分，来为文档的字节打开一个流。


    7. 权限

