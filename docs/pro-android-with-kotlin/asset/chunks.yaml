    \ a broadcast message or a `ResultReceiver` class, get handled in Chapters [5](#463716_2_En_5_Chapter.xhtml)\
    \ and [13](#463716_2_En_13_Chapter.xhtml).\n\n## Service Subclasses\n\nUp to now\
    \ we were always using the `android.app.Service` as a base class for services\
    \ we described. There are other classes supplied by Android usable as base classes\
    \ though, with different semantics. For Android 8.0 (and above), there are not\
    \ less than 20 service classes or base classes you can use. You can see them all\
    \ if inside the Android API documentation,\n\n> **Note**  \n> At the time of writing\
    \ this book, you can find it at [`https://developer.android.com/reference/android/app/Service.xhtml`](https://developer.android.com/reference/android/app/Service.xhtml).\n\
    \nyou investigate \"Known Direct Subclasses.\" Outstanding are the following three:\n\
    \n- **`android.app.Service`** : The one we've been using so far. This is the most\
    \ basic service class. Unless you use multithreading *inside* the service class\
    \ or the service is explicitly configured to execute in another process, the service\
    \ will be running inside the service caller's main thread. If this is the GUI\
    \ thread, and unless you expect the service invocation to run really fast, it\
    \ is strongly recommended to send service activities to a background thread.\n\
    \n- **`android.app.IntentService`** : While a service by design does not naturally\
    \ handle incoming start requests simultaneously to the main thread, an `IntentService`\
    \ uses a dedicated worker thread to receive multiple start messages. Still it\
    \ uses just one thread to work on start requests, so they get executed one after\
    \ the other. `IntentService` classes take care of correctly stopping services,\
    \ so you don't need to care about this yourself. You have to provide the service's\
    \ work to be done for each start request inside an overwritten `onHandleIntent()`\
    \ method. Since basically you don't need anything else, `IntentService` services\
    \ are very easy to implement. Note that starting with Android 8.0 or API level\
    \ 26, restrictions apply to background processes – see section \"Background Services\"\
    \ – so under appropriate circumstances, consider using `JobIntentService` classes\
    \ instead.\n\n- **`android.support.v4.app.JobIntentService`** uses a `JobScheduler`\
    \ to enqueue service execution requests. Starting with Android 8.0 or API level\
    \ 26, consider using this service base class for background services. To implement\
    \ such a service, you basically have to create a subclass of `JobIntentService`\
    \ and override the method `onHandleWork(intent: Intent): Unit` to contain the\
    \ service's workload.\n\n## Services Lifecycle\n\nHaving described various service\
    \ characteristics in the preceding sections, the actual lifecycle of a service\
    \ from a bird's-eye view is arguably easier than that of an activity. But be careful.\
    \ Because of services being able to run in the background and also because services\
    \ are more readily subject to stops forced by the Android OS, they may require\
    \ special attention in correspondence with service clients.\n\nIn your service\
    \ implementation, you can overwrite any of the lifecycle callbacks\n\n- `onCreate()`\n\
    - `onStartCommand()`\n- `onBind()`\n- `onUnbind()`\n- `onRebind()`\n- `onDestroy()`\n\
    \nat will, for example, to log service invocation information while developing\
    \ or debugging. Figure [4-1](#463716_2_En_4_Chapter.xhtml#Fig1) shows you an overview\
    \ of the lifecycle of a service.\n\n![](images/463716_2_En_4_Chapter/463716_2_En_4_Fig1_HTML.png)\n\
    \nA flowchart of the service lifecycle. Start and bind services to on create of\
    \ function to service active with different stages and ends with on destroy of\
    \ function and service shut down.\n\n**Figure 4-1** Services Lifecycle\n\n## More\
    \ Service Characteristics\n\nMore observations for services are as follows:\n\n\
    1.  Services get declared alongside with activities inside `AndroidManifest.xml`.\
    \ The question of how they interact with each other comes up. Surely, somebody\
    \ needs to invoke services in order to use them, but this can also be done from\
    \ other services, other activities, or even other apps.\n\n2.  Do not bind or\
    \ unbind during an activity's `onResume()` and `onPause()` for performance and\
    \ stability reasons. Do bind and unbind instead inside the `onStart()` and `onStop()`\
    \ methods, if you need to interact with services only when an activity is visible.\
    \ If you need service connections also when activities are stopped and in the\
    \ background, do bind and unbind in the `onCreate()` and `onRestore()` methods.\n\
    \n3.  In remote connection operations (the service lives in another app), catch\
    \ and handle `DeadObjectException` exceptions.\n\n4.  If you overwrite a service's\
    \ `onStartCommand(intent: Intent, flags: Int, startId: Int)` method, first make\
    \ sure to also call method `super.onStartCommand()` unless you have good reasons\
    \ not to do that. Next, appropriately react on the incoming `flags` parameter,\
    \ which tells whether this is an automatic follow-up start request because a previous\
    \ start attempt failed. See the API documentation for details. Eventually this\
    \ method returns an integer describing the service's state after leaving the `onStartCommand()`\
    \ method – see the API documentation for details.\n\n5.  Calling `stopService()`\
    \ from outside a service or `stopSelf()` from inside a service does not guarantee\
    \ that the service gets stopped immediately. Expect the service to hang around\
    \ for a little while until Android really stops it.\n\n6.  If a service is not\
    \ designed to react on binding requests, if you overwrite the `onBind()` method\
    \ of the service, it should return `null`.\n\n7.  While not forbidden explicitly,\
    \ for a service that is designed for communicating with service clients via binding,\
    \ consider disallowing the service to be started by `startService()`. In this\
    \ case you *must* provide the `Context.BIND_AUTO_CREATE` flag in the `bindService()`\
    \ method call.\n\n## 5. Broadcasts"
