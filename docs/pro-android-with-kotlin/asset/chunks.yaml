    }\n```\n\n为了从应用内部读取偏好设置，编写：\n\n```kotlin\nval someString = Prefs(context).readString(\"\
    app_key\",\n                                           \"default\")\n```\n\n其中`context`可以是\
    \ Activity 本身，或者如果您在`@Composable`内部，则是`LocalContext.current`。`\"app_key\"`对应于`SettingsViewModel`中用作键的值之一。\n\
    \n## 用户界面\n\n用户界面无疑是任何最终用户应用中最重要的一部分。对于企业级应用，没有用户界面当然是可能的，但即便如此，在大多数情况下，您仍会拥有某种基本的用户界面，即使仅仅是为了避免\
    \ Android 操作系统在进行资源管理任务时过早终止您的应用。在本章中，我们不会涵盖 Android UI 开发的基础知识——相反，我们假定您已经阅读过一些入门级书籍，或完成了官方教程，或浏览过网络上其他众多教程。我们在此要做的是讨论一些重要的\
    \ UI 相关问题，这些问题能够帮助您创建更稳定的应用，或者具有特殊卓越需求的应用。\n\n## 后台任务\n\nAndroid 依赖于单线程执行模型。这意味着当应用启动时，默认情况下只会启动一个线程，称为主线程，所有操作都在其中运行，除非您明确地为某些任务使用后台线程。就用户体验而言，这自动意味着如果您有长时间运行的任务会中断流畅的\
    \ UI 工作流，您必须采取特殊预防措施。对于现代应用来说，用户按下按钮后 UI 冻结，仅仅因为这个操作导致进程运行几秒或更长时间，这是不可接受的。因此，将长时间运行的任务放入后台至关重要。\n\
    \n完成将任务放入后台的一种方法是使用`IntentService`对象，如第 4 章“服务子类”部分所述。然而，根据具体情况，将所有后台工作放入服务可能会使您的应用设计变得臃肿，并且设备上运行过多的服务不利于保持资源使用率低。因此，对于低级别任务，最好使用更底层的方法。您有几种选择，我们将在以下部分中描述。\n\
    \n### Java 并发\n\n在非常底层的级别上，您可以使用 Java 线程和`java.util.concurrent`包中的类来处理后台任务。从 Java\
    \ 7 开始，这些类已经变得相当强大，但需要一些时间来充分理解所有选项和影响。您经常会读到，在 Android 操作系统内部直接处理线程不是一个好主意，因为线程在系统资源方面代价高昂。虽然这对于旧设备和旧版\
    \ Android 来说确实如此，但如今情况已不再如此。在摩托罗拉 Moto G4 上启动 1000 个线程并等待所有线程运行的一个简单测试显示，每个线程大约需要\
    \ 0.0006 秒。因此，如果您习惯使用 Java 线程，并且不到一毫秒的启动时间对您来说可以接受，那么没有性能方面的理由不使用 Java 线程。然而，您必须考虑到线程在任何\
    \ Android 组件生命周期之外运行，因此如果使用线程，您需要手动处理生命周期问题。\n\n在 Kotlin 中，线程的定义和启动非常简单：\n\n```kotlin\n\
    val t = Thread {\n    // 执行后台工作...\n}.also { it.start() }\n```\n\n> **注意**\n>\
    \ \n> 在 Android 中，不允许仅从线程内部访问 UI。您必须按如下方式操作：\n> \n> ```kotlin\n> val t = Thread\
    \ {\n>     // 执行后台工作...\n>     runOnUiThread {\n>         // 使用 UI...\n>     }\n\
    > }.also { it.start() }\n> ```\n\n## AsyncTask 类\n\n`AsyncTask`对象是一个中等级别的辅助类，用于在后台运行代码。您需要重写其`doInBackground()`方法以执行一些后台工作，如果需要与\
    \ UI 通信，还需要实现`onProgressUpdate()`来进行通信，并从后台工作中触发`publishProgress()`以启动它。\n\n从\
    \ Android 11 开始，`AsyncTask`已被弃用。我们在此提及是因为它的广泛使用。\n\n> **注意**\n> \n> Android Studio\
    \ 将会发出警告，提示如果创建类似`val at = object : AsyncTask<Int, Int, Int>() { ... }`的`AsyncTask`对象，可能会发生内存泄漏。这是因为内部会持有一个对后台代码的静态引用。可以通过在方法上添加`@SuppressLint(\"\
    StaticFieldLeak\")`注解来抑制该警告。\n\n> **警告**\n> \n> `N`个`AsyncTask`作业不会导致所有`N`个作业并行执行——相反，它们都会在*一个*后台线程中顺序运行。\n\
    \n## Handlers\n\n`Handler`是一个维护消息队列的对象，用于异步处理消息或`Runnable`对象。您可以使用`Handler`进行异步处理，方式如下：\n"
- fmt: "# Android 并发与数据加载\n\n## HandlerThread\n\n```kotlin\nvar handlerThread : HandlerThread?\
    \ = null\n// or: lateinit var handlerThread : HandlerThread\n...\nfun doSomething()\
    \ {\n    handlerThread = handlerThread ?:\n        HandlerThread(\"MyHandlerThread\"\
    ).apply {\n            start()\n        }\n    val handler = Handler(handlerThread?.looper)\n\
    \    handler.post {\n        // do s.th. in background\n    }\n}\n```\n\n如果你像上面这个代码片段一样创建一个`HandlerThread`，那么所有通过`handler.post{}`发布的任务都会在后台运行，但它们是按顺序执行的。这意味着连续调用`handler.post{}\
    \ ; handler.post{}`会串行执行。不过，你可以创建更多的`HandlerThread`对象来并行处理任务。要实现真正的并行，你需要为每个执行任务使用一个独立的`HandlerThread`。\n\
    \n> **注意**：`Handler`早在Java 7引入新的`java.util.concurrent`包之前就已经在Android中出现了。如今，在你自己的代码中，你可能会倾向于使用通用的Java类而非`Handler`，而不会损失任何功能。然而，`Handler`在Android的库中仍然很常见。\n\
    \n## Loaders（加载器）\n\n`Loaders`也在后台执行任务——它们主要用于从外部源加载数据。从API level 28开始，`Loaders`已被弃用。现在你应该使用`ViewModel`和`LiveData`进行后台数据加载——详见后续内容。我们在此提及`Loaders`是为了完整性以及它们曾经广泛使用的原因。\n\
    \n## Coroutines（协程）\n\n协程是Kotlin对非抢占式后台处理的解决方案。如果你习惯了Java的抢占式并发以及Android的`AsyncTask`、`Handler`和`Loader`，那么理解协程的工作原理需要一些时间。\n\
    \n我们不会在此处对协程进行深入介绍，因为它在某种程度上引入了重大的范式转变，并且将协程完全整合到你的代码中是一项复杂的任务，需要大量使用Jetpack提供的库，这超出了本书当前版本的范围。不过，协程内容已计划在第三版更新中。目前请访问以下链接：\n\
    - [https://developer.android.com/kotlin/coroutines](https://developer.android.com/kotlin/coroutines)\n\
    - [https://kotlinlang.org/docs/coroutines-overview.html](https://kotlinlang.org/docs/coroutines-overview.html)\n\
    \n作为开胃菜，考虑在`ViewModel`（你将`ViewModel`作为UI相关类的数据持有者）中，你希望将一些IO相关的任务发送到后台。使用协程，你可以编写如下代码：\n\
    \n```kotlin\nclass MyViewModel(): ViewModel() {\n    fun doSomething() {\n   \
    \     // 创建一个协程，将执行移出UI线程\n        viewModelScope.launch(Dispatchers.IO) {\n \
    \           // 做一些后台工作...\n        }\n    }\n}\n```\n\n这里的`viewModelScope`（来自基类）是一个上下文对象，特别适合在`ViewModel`中进行后台处理，而`Dispatchers.IO`表示需要IO相关的后台进程管理。你可以看到，配置执行器或`Handler`等控制并发所需的工作都留给了框架，因此不包含在我们的代码中——这正是**非抢占式**的含义。\n\
    \n### 在ViewModel中加载数据\n\n在`ViewModel`中异步加载外部数据的最佳方式是基于协程和`LiveData`的组合。虽然远非一个完整的通用示例，但考虑一个用于偏好设置的`ViewModel`：\n\
    \n```kotlin\nimport android.content.Context\nimport androidx.datastore.preferences.preferencesDataStore\n\
    import androidx.lifecycle.*\nimport android.app.Application\nimport androidx.compose.runtime.getValue\n\
    import androidx.compose.runtime.mutableStateOf\nimport androidx.compose.runtime.setValue\n\
    import androidx.compose.runtime.snapshotFlow\nimport kotlinx.coroutines.flow.*\n\
    import kotlinx.coroutines.launch\nimport androidx.datastore.preferences.core.edit\n\
    import androidx.datastore.preferences.core.stringPreferencesKey\nimport kotlinx.coroutines.runBlocking\n\
    \n// 一个中央\"单例\"DataStore。你可能将它放在主Activity旁边（而非内部）\nval Context.settingsDataStore\
    \ by preferencesDataStore(name = \"settings\")\n\n// 一个用于使用settings datastore的包装类\n\
    class Prefs(val context: Context) {\n    suspend fun <T> save(key: String, v:\
    \ T) {\n        context.settingsDataStore.edit { preferences ->\n            when(v)\
    \ {\n                is String -> preferences[stringPreferencesKey(key)] = v as\
    \ String\n                else -> throw IllegalArgumentException(v!!::class.java.toString())\n\
    \            }\n        }\n    }\n\n    fun loadString(key: String, defVal: String\
    \ = \"\"): Flow<String> {\n        return context.settingsDataStore.data\n   \
    \         .map { preferences ->\n                preferences[stringPreferencesKey(key)]\
    \ ?: defVal\n            }\n    }\n\n    // 非协程getter。用于在协程外部使用\n    fun getString(key:\
    \ String, defVal: String = \"\") =\n        runBlocking { loadString(key, defVal).first()\
    \ }\n}\n\n// 一个ViewModel。你在客户端代码中使用它来读取（和写入）偏好设置\nclass SettingsViewModel(application:\
    \ Application): AndroidViewModel(application) {\n    private val dataStore = Prefs(application)\n\
    \n    // 因为使用了mutableStateOf(\"\")，这是一个被观察的变量\n    var someString by mutableStateOf(\"\
    \")\n\n    init {\n        viewModelScope.launch {\n            // 从datastore异步加载\n\
    \            someString = dataStore.loadString(\"some_string\",\"\").first()\n\
    \            // 自动将更改保存到datastore\n            launch { snapshotFlow { someString\
    \ }.onEach {\n                dataStore.save(\"some_string\", it) }.collect()\
    \ }\n        }\n    }\n}\n```\n\n`suspend fun <T> save()`（在`Prefs`类中）中的`suspend`关键字确保保存偏好设置（例如，在偏好设置界面中）是异步进行的。对应的加载偏好设置的方法`loadString(...)`返回一个`Flow<String>`，这是协程中表示最终会求值为字符串的方式，在协程中用于异步获取值。有关其他构造，请参阅内联注释。\n\
    \n## 支持多种设备\n\n设备兼容性是应用程序的一个重要问题。每当你创建一个应用时，你的目标当然是尽可能多地支持各种设备配置，并确保在特定设备上安装你的应用的用户能够正常使用。兼容性归结为以下几点：\n\
    \n- 找到你的应用能够在不同屏幕能力（包括像素宽度、像素高度、像素密度、色彩空间和屏幕形状）下运行的方法\n- 找到你的应用能够在不同API版本下运行的方法\n\
    - 找到你的应用能够在不同硬件特性（包括传感器和键盘）下运行的方法\n- 找到你能在Google Play商店中过滤应用可见性的方法\n- 可能根据设备特性为同一应用提供不同的APK\n\
    \n在本章中，我们将讨论与UI相关的兼容性问题，即重点关注屏幕和用户输入能力。\n\n### 屏幕尺寸\n\n为了让你的应用在不同屏幕尺寸上看起来美观，你有以下措施可用：\n\
    \n- **使用灵活的布局**：避免指定绝对位置和绝对宽度。相反，使用允许像\"在XX右侧\"或\"使用可用空间的一半\"等指定方式的布局。\n- **使用备选布局**"
  raw: "```\nvar handlerThread : HandlerThread? = null\n// or: lateinit var handlerThread\
    \ : HandlerThread\n...\nfun doSomething() {\nhandlerThread = handlerThread ?:\n\
    HandlerThread(\"MyHandlerThread\").apply {\nstart()\n}\nval handler = Handler(handlerThread?.looper)\n\
    handler.post {\n// do s.th. in background\n}\n}\n```\n\nIf you create one \n`HandlerThread`\n\
    \ as in this code snippet, everything that is posted gets run in\nthe background,\
    \ but there executed sequentially. This means a `handler.post{} ; handler.post{}`\
    \ will run the posts in series. You can however\ncreate more `HandlerThread` objects\n\
    to handle the posts in parallel. For a true parallelism, you’d have to\nuse one\
    \ `HandlerThread` for\neach execution.\n\nNote\n\nHandlers    had been introduced\
    \ in\nAndroid a long time before the new `java.util.concurrent`\npackage came\
    \ up in Java 7\\. Nowadays for your own code, you might decide\nto favor the generic\
    \ Java classes over `Handler`s without\nmissing anything. Handlers however quite\
    \ often show up in Android’s\nlibraries.\n\nLoaders\nLoaders    also do their\
    \ work in\nthe background – they are primarily used for loading data from an\n\
    external source.\nLoaders are deprecated starting with API level 28\\. You should\
    \ now use\nViewModels and LiveData for background loading purposes – see in the\n\
    following. We mention loaders here for completeness and because of their\nwidespread\
    \ use.\n\nCoroutines\nCoroutines \n  are Kotlin’s\nanswer to non-preemptive background\
    \ processing. If you are used to\nJava’s preemptive concurrency and to Android’s\
    \ AsyncTasks, handlers, and\nloaders, understanding how coroutines work takes\
    \ some time.\nWe don’t give a thorough introduction into coroutines at this place,\n\
    since it somewhat imposes a major paradigm change and fully\nincorporating coroutines\
    \ into your code is a complex task and requires\nextensively using the libraries\
    \ provided by Jetpack, which is out of\nscope for this edition of the book. It\
    \ is however in the pipeline of\nanticipated updates for a third edition to come\
    \ up. For now please visit\n[https://​developer.​android.​com/​kotlin/​coroutines](https://developer.android.com/kotlin/coroutines)\n\
    and [https://​kotlinlang.​org/​docs/​coroutines-overview.​html](https://kotlinlang.org/docs/coroutines-overview.xhtml).\n\
    \nJust as an appetizer, consider inside a `ViewModel`   (you use a ViewModel\n\
    as a data holder for UI-related classes) you want to send some\nIO-related task\
    \ to the background. With coroutines you can write as\nfollows:\n\n```\nclass\
    \ MyViewModel(): ViewModel() {\nfun doSomething() {\n// Create a coroutine to\
    \ move the execution off\n// the UI thread\nviewModelScope.launch(Dispatchers.IO)\
    \ {\n// do some background work...\n}\n}\n}\n```\n\nHere the  `viewModelScope`\n\
    \ (from the base class) is a contextual object especially suited\nfor background\
    \ processing in ViewModels, and `Dispatchers.IO`\nexpresses the need for IO-related\
    \ background process housekeeping. You\ncan see that configuring executors or\
    \ handlers or whatever is needed for\ncontrolling the concurrency    is left to\
    \ the\nframework and thus not part of our code, which is what\n*non-preemptive*\
    \ actually means.\n\nLoading Data in ViewModels\n\nAsynchronously loading external\
    \ data in ViewModels    best happens based on\na combination of coroutines and\
    \ LiveData. While far away from a complete\nfits-all example, consider a ViewModel\
    \ for preferences:\n\n```\nimport android.content.Context\nimport androidx.datastore.preferences.preferencesDataStore\n\
    import androidx.lifecycle.*\nimport android.app.Application\nimport androidx.compose.runtime.getValue\n\
    import androidx.compose.runtime.mutableStateOf\nimport androidx.compose.runtime.setValue\n\
    import androidx.compose.runtime.snapshotFlow\nimport kotlinx.coroutines.flow.*\n\
    import kotlinx.coroutines.launch\nimport androidx.datastore.preferences.core.edit\n\
    import androidx.datastore.preferences.core.\nstringPreferencesKey\nimport kotlinx.coroutines.runBlocking\n\
    // A central \"singleton\" DataStore. You maybe put this\n// alongside (not inside)\
    \ the main Activity.\nval Context.settingsDataStore by\npreferencesDataStore(name\
    \ = \"settings\")\n// A wrapper for using the settings datastore\nclass Prefs(val\
    \ context: Context) {\nsuspend fun  save(key:String, v: T) {\ncontext.settingsDataStore.edit\
    \ { preferences ->\nwhen(v) {\nis String -> preferences[\nstringPreferencesKey(key)]\
    \ =\nv as String\nelse -> throw IllegalArgumentException(\nv!!::class.java.toString())\n\
    }\n}\n}\nfun loadString(key:String, defVal:String = \"\")\n: Flow {\nreturn context.settingsDataStore.data\n\
    .map { preferences ->\npreferences[stringPreferencesKey(key)]\n?: defVal\n}\n\
    }\n// Non-coroutines getter. For use outside of Coroutines\nfun getString(key:String,\
    \ defVal:String = \"\") =\nrunBlocking { loadString(key, defVal).first() }\n}\n\
    // A ViewModel. You use this in client code to read\n// (and write) preferences.\n\
    class SettingsViewModel(application: Application):\nAndroidViewModel(application)\
    \ {\nprivate val dataStore = Prefs(application)\n// Because of mutableStateOf(\"\
    \"), this is an observed\n// variable\nvar someString by mutableStateOf(\"\")\n\
    init {\nviewModelScope.launch {\n// async loading from the datastore\nsomeString\
    \ = dataStore.loadString(\n\"some_string\",\"\").first()\n// automatically save\
    \ changes to the datastore\nlaunch { snapshotFlow { someString }.onEach {\ndataStore.save(\"\
    some_string\", it) }.\ncollect() }\n}\n}\n}\n```\n\nThe `suspend`\ninside `suspend\
    \ fun <T> save()` (class `Prefs`) makes sure\nthat saving preferences\n  , for\n\
    example, in a preferences screen, happens asynchronously. The\ncounterpart for\
    \ loading preferences, `loadString( ... )`,\nreturns a `Flow<String>`,\nwhich\
    \ is the coroutines’ way of saying something that eventually\nevaluates to a string,\
    \ available in coroutines for asynchronously\ngetting values. For the other constructs,\
    \ see the inline comments.\n\nSupporting Multiple Devices\n\nDevice compatibility\n\
    \   is an\nimportant issue for apps. Whenever you create an app, it is of course\n\
    your goal to address as many device configurations as possible and to\nmake sure\
    \ users who install your app on a certain device can actually\nuse it. Compatibility\
    \ boils down to\n\n*   Finding a way your app can run with different screen\n\
    \    capabilities, including pixel width, pixel height, pixel density, color\n\
    \    space, and screen shape\n\n*   Finding a way your app can run with different\
    \ API\n    versions\n\n*   Finding a way your app can run with different hardware\
    \ features,\n    including sensors and keyboards\n\n*   Finding a way you can\
    \ filter your app’s visibility inside the\n    Google Play Store\n\n*   Possibly\
    \ providing different APKs for one app, depending on\n    device features\n\n\
    In this chapter we talk about UI-related issues for compatibility,\nthat is, we\
    \ focus on screen and user input capabilities.\n\nScreen Sizes\n\nTo allow your\
    \ app \nlooking nice on different screen sizes, you have the following measures\n\
    at hand:\n\n*   **Use flexible layouts.**\n\nAvoid specifying absolute positions\
    \ and absolute width. Instead, use\n    layouts that allow specifications like\
    \ “on the right of” or “use half of\n    the available space” or similar.\n\n\
    *   **Use alternative layouts.**"
  trans: "\n# 并发与数据加载 in Android\n\n## HandlerThread\n\n```kotlin\nvar handlerThread\
    \ : HandlerThread? = null\n// 或：lateinit var handlerThread : HandlerThread\n...\n\
    fun doSomething() {\n    handlerThread = handlerThread ?:\n        HandlerThread(\"\
    MyHandlerThread\").apply {\n            start()\n        }\n    val handler =\
    \ Handler(handlerThread?.looper)\n    handler.post {\n        // 在后台执行某些操作\n \
    \   }\n}\n```\n\n如果你像上面这个代码片段一样创建一个`HandlerThread`，那么所有通过`handler.post{}`发布的任务都会在后台运行，但它们是按**顺序**执行的。这意味着连续调用`handler.post{}\
    \ ; handler.post{}`会串行执行。不过，你可以创建更多的`HandlerThread`对象来并行处理任务。要实现真正的并行，你需要为每个执行任务使用一个独立的`HandlerThread`。\n\
    \n> **注意**：`Handler`早在 Java 7 引入新的 `java.util.concurrent` 包之前就已经在 Android 中出现了。如今，在你自己的代码中，你可能会倾向于使用通用的\
    \ Java 类而非 `Handler`，而不会损失任何功能。然而，`Handler` 在 Android 的库中仍然很常见。\n\n## Loaders（加载器）\n\
    \n`Loaders` 也在后台执行任务——它们主要用于从外部源加载数据。从 API level 28 开始，`Loaders` 已被弃用。现在你应该使用\
    \ `ViewModel` 和 `LiveData` 进行后台数据加载——详见后续内容。我们在此提及 `Loaders` 是为了完整性以及它们曾经广泛使用的原因。\n\
    \n## Coroutines（协程）\n\n协程是 Kotlin 对非抢占式后台处理的解决方案。如果你习惯了 Java 的抢占式并发以及 Android\
    \ 的 `AsyncTask`、`Handler` 和 `Loader`，那么理解协程的工作原理需要一些时间。\n\n我们不会在此处对协程进行深入介绍，因为它在某种程度上引入了重大的范式转变，并且将协程完全整合到你的代码中是一项复杂的任务，需要大量使用\
    \ Jetpack 提供的库，这超出了本书当前版本的范围。不过，协程内容已计划在第三版更新中。目前请访问以下链接：\n- [`developer.android.com/kotlin/coroutines`](https://developer.android.com/kotlin/coroutines)\n\
    - [`kotlinlang.org/docs/coroutines-overview.html`](https://kotlinlang.org/docs/coroutines-overview.html)\n\
    \n作为开胃菜，考虑在`ViewModel`（你将`ViewModel`作为 UI 相关类的数据持有者）中，你希望将一些 IO 相关的任务发送到后台。使用协程，你可以编写如下代码：\n\
    \n```kotlin\nclass MyViewModel(): ViewModel() {\n    fun doSomething() {\n   \
    \     // 创建一个协程，将执行移出 UI 线程\n        viewModelScope.launch(Dispatchers.IO) {\n\
    \            // 做一些后台工作...\n        }\n    }\n}\n```\n\n这里的 `viewModelScope`（来自基类）是一个上下文对象，特别适合在`ViewModel`中进行后台处理，而\
    \ `Dispatchers.IO` 表示需要 IO 相关的后台进程管理。你可以看到，配置执行器或 `Handler` 等控制并发所需的工作都留给了框架，因此不包含在我们的代码中——这正是**非抢占式**的含义。\n\
    \n### 在 ViewModel 中加载数据\n\n在 `ViewModel` 中异步加载外部数据的最佳方式是基于协程和 `LiveData` 的组合。虽然远非一个完整的通用示例，但考虑一个用于偏好设置的\
    \ `ViewModel`：\n\n```kotlin\nimport android.content.Context\nimport androidx.datastore.preferences.preferencesDataStore\n\
    import androidx.lifecycle.*\nimport android.app.Application\nimport androidx.compose.runtime.getValue\n\
    import androidx.compose.runtime.mutableStateOf\nimport androidx.compose.runtime.setValue\n\
    import androidx.compose.runtime.snapshotFlow\nimport kotlinx.coroutines.flow.*\n\
    import kotlinx.coroutines.launch\nimport androidx.datastore.preferences.core.edit\n\
    import androidx.datastore.preferences.core.stringPreferencesKey\nimport kotlinx.coroutines.runBlocking\n\
    \n// 一个中央\"单例\"DataStore。你可能将它放在主 Activity 旁边（而非内部）\nval Context.settingsDataStore\
    \ by preferencesDataStore(name = \"settings\")\n\n// 一个用于使用 settings datastore\
    \ 的包装类\nclass Prefs(val context: Context) {\n    suspend fun <T> save(key: String,\
    \ v: T) {\n        context.settingsDataStore.edit { preferences ->\n         \
    \   when(v) {\n                is String -> preferences[stringPreferencesKey(key)]\
    \ = v as String\n                else -> throw IllegalArgumentException(v!!::class.java.toString())\n\
    \            }\n        }\n    }\n\n    fun loadString(key: String, defVal: String\
    \ = \"\"): Flow<String> {\n        return context.settingsDataStore.data\n   \
    \         .map { preferences ->\n                preferences[stringPreferencesKey(key)]\
    \ ?: defVal\n            }\n    }\n\n    // 非协程 getter。用于在协程外部使用\n    fun getString(key:\
    \ String, defVal: String = \"\") =\n        runBlocking { loadString(key, defVal).first()\
    \ }\n}\n\n// 一个 ViewModel。你在客户端代码中使用它来读取（和写入）偏好设置\nclass SettingsViewModel(application:\
    \ Application): AndroidViewModel(application) {\n    private val dataStore = Prefs(application)\n\
    \n    // 因为使用了 mutableStateOf(\"\")，这是一个被观察的变量\n    var someString by mutableStateOf(\"\
    \")\n\n    init {\n        viewModelScope.launch {\n            // 从 datastore\
    \ 异步加载\n            someString = dataStore.loadString(\"some_string\",\"\").first()\n\
    \            // 自动将更改保存到 datastore\n            launch { snapshotFlow { someString\
    \ }.onEach {\n                dataStore.save(\"some_string\", it) }.collect()\
    \ }\n        }\n    }\n}\n```\n\n`suspend fun <T> save()`（在 `Prefs` 类中）中的 `suspend`\
    \ 关键字确保保存偏好设置（例如，在偏好设置界面中）是异步进行的。对应的加载偏好设置的方法 `loadString(...)` 返回一个 `Flow<String>`，这是协程中表示最终会求值为字符串的方式，在协程中用于异步获取值。有关其他构造，请参阅内联注释。\n\
    \n## 支持多种设备\n\n设备兼容性是应用程序的一个重要问题。每当你创建一个应用时，你的目标当然是尽可能多地支持各种设备配置，并确保在特定设备上安装你的应用的用户能够正常使用。兼容性归结为以下几点：\n\
    \n- 找到你的应用能够在不同屏幕能力（包括像素宽度、像素高度、像素密度、色彩空间和屏幕形状）下运行的方法\n- 找到你的应用能够在不同 API 版本下运行的方法\n\
    - 找到你的应用能够在不同硬件特性（包括传感器和键盘）下运行的方法\n- 找到你能在 Google Play 商店中过滤应用可见性的方法\n- 可能根据设备特性为同一应用提供不同的\
    \ APK\n\n在本章中，我们将讨论与 UI 相关的兼容性问题，即重点关注屏幕和用户输入能力。\n\n### 屏幕尺寸\n\n为了让你的应用在不同屏幕尺寸上看起来美观，你有以下措施可用：\n\
    \n- **使用灵活的布局**：避免指定绝对位置和绝对宽度。相反，使用允许像“在 XX 右侧”或“使用可用空间的一半”等指定方式的布局。\n- **使用备选布局**\n"
- fmt: '# Using Alternative Layouts


    Using alternative layouts is a very powerful means for supplying different screen
    sizes. The layout XML files can be put into different directories with names containing
    size filters. For example, you could put one layout into the file `res/layout/main_activity.xml`
    and another one into `res/layout-sw480dp/main_activity.xml` expressing a "smallest
    width" of 480 dp (large phone screens 5" or higher). The naming schema gets extensively
    described online in the "Providing Resources" and "Providing Alternative Resources"
    documents, respectively, from inside the Android developer documentation. The
    Android OS then automatically picks the best matching layout at runtime on the
    user''s device.


    ## Use Stretchable Images


    You can provide *nine-patch* bitmaps for UI elements. Inside such images you provide
    a one-pixel-wide border telling which parts of an image can be repeated to stretch
    an image and optionally which parts can be used for inner contents. Such nine-patch
    images are PNG files with the suffix `.9.png`. Android Studio allows for converting
    conventional PNGs into nine-patch PNGs – use the context menu for that purpose.


    # Pixel Densities


    Devices have different pixel densities. To make your app as device independent
    as possible, wherever you need pixel sizes, use *density-independent pixel* sizes
    instead of *pixel sizes*. Density-independent pixel sizes use `dp` as a unit,
    while pixels use `px`. Besides that, you can also provide different layout files
    based on different densities – the separation is similar to the separation for
    different screen sizes described previously.


    # Declare Restricted Screen Support


    In some situations you want to restrict your app by saying that some screen characteristics
    just cannot be used. Obviously you want to avoid such situations, but in case
    it is inevitable, you can inside `AndroidManifest.xml`:


    - Tell the app certain activities can run in multi-window modes available in API
    level 24 (Android 7.0) or later. For that aim use attribute `android:resizeableActivity`
    and set it to `true` or `false`.

    - Tell certain activities should be letter-boxed (margins added accordingly) above
    certain aspect ratios. For that aim use attribute `android:maxAspectRatio` and
    specify the aspect ratio as a value. For Android 7.1 and lower, duplicate this
    setting inside the `<application>` element as in `<meta-data android:name = "android.max_aspect"
    android:value = "s.th." />`.

    - Tell certain activities should not be stretched above a certain limit by using
    the `largestWidthLimitDp` attribute inside a `<supports-screens>` element.

    - Use more `<supports-screens>` and `<compatible-screens>` elements and attributes
    as described in Chapter [2](#463716_2_En_2_Chapter.xhtml).


    # Detect Device Capabilities


    From inside your app, you can check for certain features like in:


    ```

    if(packageManager.

    hasSystemFeature(PackageManager.FEATURE_...)) {

    // ...

    }

    ```


    where `FEATURE_...` is one of the various constants from inside `PackageManager`.


    An additional source of feature information is the `Configuration`. In Kotlin
    from inside an activity, you can obtain the configuration object via:


    ```

    val conf = resources.configuration

    ```


    and from there obtain information about the color mode in use, available keyboards,
    the screen orientation, and touchscreen capabilities. To get the screen''s size,
    you can write:


    ```

    val size = Point()

    windowManager.defaultDisplay.getSize(size)

    // or (getSystemService(Context.WINDOW_SERVICE)

    //    as WindowManager).defaultDisplay.getSize(size)

    val (width,height) = Pair(size.x, size.y)

    ```


    and to get the resolution:


    ```

    val metrics = DisplayMetrics()

    windowManager.defaultDisplay.getMetrics(metrics)

    val density = metrics.density

    ```


    # Programmatic UI Design


    Usually UI design happens by declaring UI objects (`View` objects) and containers
    (`ViewGroup` objects) inside one or more XML layout files. While this is the suggested
    way of designing a UI and most people probably tell you, you shouldn''t do anything
    else, there are reasons to take away the layout design from XML and do a programmatic
    layout instead:


    - **You need more dynamics on a layout.** For example, your app adds, removes,
    or moves layout elements by user actions. Or you want to create a game with game
    elements represented by `View` objects, which are dynamically moving, appearing,
    and disappearing.

    - **Your layout is defined on a server.** Especially in a corporate environment,
    defining the layout on a server makes sense – whenever the layout of an app changes,
    you don''t need a new version to be installed on all devices. Instead, only a
    central layout engine needs to be updated.

    - **You define a layout builder** that allows to specify layouts in Kotlin in
    a way more expressive and concise compared with XML. Think of, for example:


    ```

    LinearLayout(orientation="vertical") {

    TextView(id="tv1",

    width="match_parent", height="wrap_content")

    Button(id="btn1", text="Go",

    onClick = { btn1Clicked() })

    }

    ```


    which is valid Kotlin syntax.


    - **You need special constructs that are not defined in XML.** While the standard
    way is to define in XML as much as possible and do the rest in the code, you might
    want to prefer a single-technology solution, and in this case you have to do all
    from inside the code.


    > **Note:** Using Jetpack Compose is an extremely good way of programmatically
    building layouts. See in the following and the documentation in order to find
    out how to do that.


    Note that if you abandon descriptive layouting via XML files and use programmatic
    layouting instead, you manually have to take care of different screen sizes, screen
    densities, and other hardware characteristics. While this is always possible,
    it under circumstances could be a complicated and error-prone procedure. Certain
    characteristics like UI element sizes can be much more easily expressed in XML
    than in the code.


    ## Adding Views Manually


    In order to start with a programmatic UI design, it is the easiest if you define
    a single container inside XML and use this in your code. I say deliberately `simple`,
    because layouts have their own idea how and when to place their children, so you
    might end up in a nightmare of timing, layout, and clipping issues if your code
    has another idea how and when to place views. A good candidate is a `FrameLayout`,
    and you can write as a layout XML, say `/res/layout/activity_main.xml`, and:


    ```

    class MainActivity : AppCompatActivity() {

    var tv:TextView? = null

    override fun onCreate(savedInstanceState: Bundle?) {

    super.onCreate(savedInstanceState)

    setContentView(R.layout.activity_main)

    // For example add a text at a certain position

    tv = TextView(this).apply {

    text = "Dynamic"

    x = 37.0f

    y = 100.0f

    }

    fl.addView(tv)

    }

    }

    ```


    as a sample activity. To, for example, add a button that shifts the text from
    the preceding example around, you can write:


    ```

    val WRAP = ViewGroup.LayoutParams(

    ViewGroup.LayoutParams.WRAP_CONTENT,

    ViewGroup.LayoutParams.WRAP_CONTENT)

    fl.addView(

    Button(this).apply {

    text = "Go"

    setOnClickListener { v ->

    v?.run {

    x += 30.0f *

    (-0.5f + Math.random().toFloat())

    y += 30.0f *

    (-0.5f + Math.random().toFloat())

    }

    }

    }, WRAP

    )

    ```


    If you don''t need total control and want a layout object to do its child positioning
    and sizing job the way it is designed, adding children to other layout types,
    like a `LinearLayout`, is of course also possible from inside the code. Just use
    the `addView()` method without explicitly setting the position via `setX()` or
    `setY()`. Under circumstances you must use `layoutObject.invalidate()` to trigger
    a re-layouting afterward. The latter has to be done from inside the UI thread
    or else inside a `runOnUiThread{ ... }`.'
  raw: "Using alternative layouts is a very powerful means for supplying\n    different\
    \ screen sizes. The layout XML files can be put into different\n    directories\
    \ with names containing size filters. For example, you could\n    put one layout\
    \ into the file `res/layout/main_activity.xml`\n    and another one into `res/layout-sw480dp/main_activity.xml`\n\
    \    expressing a “smallest width” of 480 dp (large phone screens 5” or\n    higher).\
    \ The naming schema gets extensively described online in the\n    “Providing Resources”\
    \ and “Providing Alternative Resources” documents,\n    respectively, from inside\
    \ the Android developer documentation. The\n    Android OS then automatically\
    \ picks the best matching layout at runtime\n    on the user’s device.\n\n*  \
    \ **Use stretchable images.**\n\nYou can provide *nine-patch* bitmaps  for UI\n\
    \    elements. Inside such images you provide a one-pixel-wide border telling\n\
    \    which parts of an image can be repeated to stretch an image and\n    optionally\
    \ which parts can be used for inner contents. Such nine-patch\n    images are\
    \ PNG files with the suffix `.9.png`. Android Studio    allows for converting\n\
    \    conventional PNGs into nine-patch PNGs – use the context menu for that\n\
    \    purpose.\n\nPixel Densities\nDevices have different pixel densities   . To\
    \ make your app as\ndevice independent as possible, wherever you need pixel sizes,\
    \ use\n*density-independent pixel* sizes instead of *pixel\nsizes*. Density-independent\
    \ pixel sizes use “dp” as a unit, while\npixels use “px”.\nBesides that, you can\
    \ also provide different layout files based on\ndifferent densities – the separation\
    \ is similar to the separation for\ndifferent screen sizes described previously.\n\
    \nDeclare Restricted Screen Support\n\nIn some situations\n you want to restrict\
    \ your app by saying that some screen\ncharacteristics just cannot be used. Obviously\
    \ you want to avoid such\nsituations, but in case it is inevitable, you can inside\
    \  `AndroidManifest.xml`\n\n*   Tell the app certain activities can run in multi-window\
    \ modes\n    available in API level 24 (Android 7.0) or later. For that aim use\n\
    \    attribute `android:resizeableActivity`\n    and set it to “true” or “false.”\n\
    \n*   Tell certain activities should be letter-boxed (margins added\n    accordingly)\
    \ above certain aspect ratios. For that aim use attribute\n    `android:maxAspectRatio`\n\
    \    and specify the aspect ratio as a value. For Android 7.1 and lower,\n   \
    \ duplicate this setting inside the `<application>`\n    element as in `<meta-data\
    \ android:name = \"android.max_aspect\" android:value = \"s.th.\" />`.\n\n*  \
    \ Tell certain activities should not be stretched above a certain\n    limit by\
    \ using the `largestWidthLimitDp`\n    attribute inside a `<supports-screens>`\n\
    \    element.\n\n*   Use more `<supports-screens>`\n    and `<compatible-screens>`\n\
    \    elements and attributes\n     as described in Chapter [2](#463716_2_En_2_Chapter.xhtml).\n\
    \nDetect Device Capabilities\n\nFrom inside your app\n, you can check for certain\
    \ features like in\n\n```\nif(packageManager.\nhasSystemFeature(PackageManager.FEATURE_...))\
    \ {\n// ...\n}\n```\n\nwhere “FEATURE_...” is one of the various constants from\
    \ inside `PackageManager`.\n\nAn additional source of feature information is the\
    \ `Configuration`. In\nKotlin  from\ninside an activity, you can obtain the configuration\
    \ object via\n\n```\nval conf = resources.configuration\n```\n\nand from there\
    \ obtain information about the color mode in use, available\nkeyboards , the\n\
    screen orientation, and touchscreen capabilities. To get the screen’s\nsize, you\
    \ can write\n\n```\nval size = Point()\nwindowManager.defaultDisplay.getSize(size)\n\
    // or (getSystemService(Context.WINDOW_SERVICE)\n//    as WindowManager).defaultDisplay.getSize(size)\n\
    val (width,height) = Pair(size.x, size.y)\n```\n\nand to get the resolution\n\n\
    ```\nval metrics = DisplayMetrics()\nwindowManager.defaultDisplay.getMetrics(metrics)\n\
    val density = metrics.density\n```\n\nProgrammatic UI Design\n\nUsually UI design\
    \ happens by declaring UI objects    (`View` objects) and\ncontainers (`ViewGroup`\
    \ objects)\ninside one or more XML layout files. While this is the suggested way\
    \ of\ndesigning a UI and most people probably tell you, you shouldn’t do\nanything\
    \ else, there are reasons to take away the layout design from XML\nand do a programmatic\
    \ layout    instead:\n\n*   You need more dynamics on a layout. For example, your\
    \ app adds,\n    removes, or moves layout elements by user actions. Or you want\
    \ to create\n    a game with game elements represented by `View` objects, which\n\
    \    are dynamically moving, appearing, and disappearing.\n\n*   Your layout is\
    \ defined on a server. Especially in a corporate\n    environment, defining the\
    \ layout on a server makes sense – whenever the\n    layout of an app changes,\
    \ you don’t need a new version to be installed\n    on all devices. Instead, only\
    \ a central layout engine needs to be\n    updated.\n\n*   You define a layout\
    \    builder that allows to\n    specify layouts in Kotlin in a way more expressive\
    \ and concise compared\n    with XML. Think of, for example\n\n```\nLinearLayout(orientation=\"\
    vertical\") {\nTextView(id=\"tv1\",\nwidth=\"match_parent\", height=\"wrap_content\"\
    )\nButton(id=\"btn1\", text=\"Go\",\nonClick = { btn1Clicked() })\n}\n```\n\n\
    which is valid Kotlin syntax.\n\n*   You need special constructs that are not\
    \ defined in XML   . While the standard\n    way is to define in XML as much as\
    \ possible and do the rest in the code,\n    you might want to prefer a single-technology\
    \ solution, and in this case\n    you have to do all from inside the code.\n\n\
    Note\n\nUsing Jetpack Compose is an extremely good way of programmatically\nbuilding\
    \ layouts. See in the following and the documentation in order to\nfind out how\
    \ to do that.\n\nNote that if you abandon descriptive layouting via XML files\
    \ and use\nprogrammatic layouting\n   instead,\nyou manually have to take care\
    \ of different screen sizes, screen\ndensities, and other hardware characteristics.\
    \ While this is always\npossible, it under circumstances could be a complicated\
    \ and error-prone\nprocedure. Certain characteristics like UI element sizes can\
    \ be much\nmore easily expressed in XML than in the code.\n\nAdding Views Manually\n\
    \nIn order to start with a programmatic UI design, it is the easiest if\nyou define\
    \ a single container    inside XML and use\nthis in your code. I say deliberately\
    \ `simple`, because\nlayouts have their own idea how and when to place their children,\
    \ so you\nmight end up in a nightmare of timing, layout, and clipping issues if\n\
    your code has another idea how and when to place views. A good candidate\nis a\
    \  `FrameLayout` ,\nand you can write\n\nas a layout XML, say `/res/layout/activity_main.xml`,\n\
    and\n\n```\nclass MainActivity : AppCompatActivity() {\nvar tv:TextView? = null\n\
    override fun onCreate(savedInstanceState: Bundle?) {\nsuper.onCreate(savedInstanceState)\n\
    setContentView(R.layout.activity_main)\n// For example add a text at a certain\
    \ position\ntv = TextView(this).apply {\ntext = \"Dynamic\"\nx = 37.0f\ny = 100.0f\n\
    }\nfl.addView(tv)\n}\n}\n```\n\nas a sample activity\n. To, for example, add a\
    \ button that shifts the text from the\npreceding example around, you can write\n\
    \n```\nval WRAP = ViewGroup.LayoutParams(\nViewGroup.LayoutParams.WRAP_CONTENT,\n\
    ViewGroup.LayoutParams.WRAP_CONTENT)\nfl.addView(\nButton(this).apply {\ntext\
    \ = \"Go\"\nsetOnClickListener { v ->\nv?.run {\nx += 30.0f *\n(-0.5f + Math.random().toFloat())\n\
    y += 30.0f *\n(-0.5f + Math.random().toFloat())\n}\n}\n}, WRAP\n)\n```\n\nIf you\
    \ don’t need total control    and want a layout\nobject to do its child positioning\
    \ and sizing job the way it is\ndesigned, adding children to other layout types,\
    \ like a  `LinearLayout` ,\nis of course also possible from inside the code. Just\
    \ use the `addView()` method  without\nexplicitly setting the position via `setX()`\
    \ or `setY()`. Under\ncircumstances you must use `layoutObject.invalidate()`\n\
    to trigger a re-layouting afterward. The latter has to be done from\ninside the\
    \ UI thread\n or else inside a `runOnUiThread{ ... }`."
