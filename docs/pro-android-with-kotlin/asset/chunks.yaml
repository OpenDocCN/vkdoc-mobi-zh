  trans: "好的，作为高级文档工程师和翻译员，我将遵循您的格式要求，将给定的英文文本翻译成中文。\n\n\n该测试会调用服务，并在一段时间内监听其结果。当检测到服务按预期完成工作时，测试便会通过。\n\
    \n## 测试内容提供者\n\n为了测试内容提供者，Android 提供了一个特殊的类 `ProviderTestCase2`，它会启动一个独立的临时环境，从而确保测试不会干扰用户数据。例如，一个测试用例的代码如下：\n\
    \n```kotlin\n@RunWith(AndroidJUnit4::class)\nclass MyContentProviderTest :\n \
    \   ProviderTestCase2(\n        MyContentProvider::class.java,\n        \"com.example.database.provider.MyContentProvider\"\
    ) {\n    @Before public override   // \"public\" 是必须的！\n    fun setUp() {\n  \
    \      context = InstrumentationRegistry.\n            getTargetContext()\n  \
    \      super.setUp()\n        val mockRslv: ContentResolver = mockContentResolver\n\
    \        mockRslv.delete(MyContentProvider.CONTENT_URI,\n            \"1=1\",\
    \ arrayOf())\n    }\n    @Test\n    fun test_inserted() {\n        val mockCtx:\
    \ Context = mockContext\n        val mockRslv: ContentResolver = mockContentResolver\n\
    \        // 添加一条记录\n        val cv = ContentValues()\n        cv.put(MyContentProvider.COLUMN_PRODUCTNAME,\n\
    \            \"Milk\")\n        cv.put(MyContentProvider.COLUMN_QUANTITY,\n  \
    \          27)\n        val newItem = mockRslv.insert(\n            MyContentProvider.CONTENT_URI,\
    \ cv)\n        // 查询所有记录\n        val cursor = mockRslv.query(\n            MyContentProvider.CONTENT_URI,\n\
    \            null, null, null)\n        assertThat(cursor.count, `is`(1))\n  \
    \      cursor.moveToFirst()\n        val ind = cursor.getColumnIndex(\n      \
    \      MyContentProvider.COLUMN_PRODUCTNAME)\n        assertThat(cursor.getString(ind),\
    \ `is`(\"Milk\"))\n    }\n}\n```\n\n列名、授权（authority）和 URI 的使用都取决于具体的内容提供者——对于测试用例来说，关键在于要使用模拟的内容解析器（mocked\
    \ content resolver）来与内容提供者通信。\n\n> **注意**  \n> 请注意 `setUp()` 方法中前两行的顺序——这与你可能在\
    \ 2018 年 5 月的 Android 开发者文档中看到的不同。该文档此处有误。\n\n## 测试广播接收器\n\n对于测试广播接收器，Android\
    \ 测试框架并没有提供特别的关注。这很大程度上取决于被测试的广播接收器实际执行的操作。假设它执行了某种副作用，例如向数据库写入数据，那么你可以使用之前测试内容提供者时用到的测试上下文来模拟（mock）该数据库操作。\n\
    \n例如，看看下面这个位于 `\"androidTest\"` 源码目录下的测试用例：\n\n```kotlin\nimport android.support.test.InstrumentationRegistry\n\
    import android.support.test.runner.AndroidJUnit4\nimport org.junit.Test\nimport\
    \ org.junit.runner.RunWith\nimport org.junit.Assert.*\nimport org.hamcrest.Matchers.*\n\
    import android.content.Intent\n@RunWith(AndroidJUnit4::class)\nclass BroadcastTest\
    \ {\n    @Test\n    fun testBroadcastReceiver() {\n        val context = InstrumentationRegistry.\n\
    \            getTargetContext()\n        val intent = Intent(context,\n      \
    \      MyReceiver::class.java)\n        intent.putExtra(\"data\", \"Hello World!\"\
    )\n        context.sendBroadcast(intent)\n        // 给接收器一些时间来完成工作\n        Thread.sleep(5000)\n\
    \        // 检查数据库中由广播接收器添加的记录\n        val db = MyDBHandler(context)\n       \
    \ val p = db.findProduct(\"Milk\")\n        assertThat(p, isA(Product::class.java))\n\
    \        assertThat(p!!.productName, `is`(\"Milk\"))\n    }\n}\n```\n\n你可以看到，我们使用了由\
    \ `InstrumentationRegistry.getTargetContext()` 提供的上下文。这将确保广播接收器以及后续测试所使用的数据库，都会使用一个临时空间来存储数据。运行此测试与运行其他集成测试一样，可以通过右键单击它或其所在的包，然后选择“Run\
    \ …”或“Run Tests in …”。\n\n## 用户界面测试\n\n进行用户界面测试时，你可以模拟用户的使用场景，从而检查你的应用整体上是否如预期般运行。我简要提及两个框架：\n\
    \n*   **Espresso**  \n    使用 *Espresso* 来编写针对你应用的测试，而无需考虑跨应用的活动。使用 Espresso，你可以执行以下操作：当某个特定的\
    \ `View`（`Button`、`TextView`、`EditText` 等）出现时，执行某些操作（如输入文本或执行点击），然后检查是否满足某些后续条件。\n\
    \n*   **UI Automator**  \n    使用 *UI Automator* 来编写跨越多个应用的测试。使用 UI Automator，你可以检查布局以了解活动的\
    \ UI 结构，模拟对活动的操作，并对 UI 元素进行检查。\n\n关于如何使用这两种工具的详细信息，请查阅在线文档——例如，在您常用的搜索引擎中输入“Android\
    \ 自动化 UI 测试”来查找相关资源。\n\n## 16. 故障排查\n\n在前一章中，我们讨论了测试应用的各种方法。如果测试失败，日志通常会告诉你具体发生了什么；如果这还不够，你可以扩展应用的日志记录，以查看问题出在哪里。\n\
    但是，即使拥有最佳的测试方案，你的应用仍可能无法完全按预期运行。首先，它可能只是偶尔在功能上做错事。其次，它可能在非功能方面表现不佳，这意味着随着时间推移它会消耗大量内存资源，或者在速度上表现很差。\n\
    本章我们将讨论一些技术，用于解决你的应用可能出现的问题。我们将讨论日志记录、调试和监控，以及 Android Studio 或 SDK 中能帮助我们处理这些问题的工具。\n\
    \n### 日志记录\n\n在 Android 中记录日志非常简便——你只需导入 `android.util.Log`，然后在代码中编写诸如 `Log.e(\"\
    LOG\", \"Message\")` 这样的语句来发出日志消息。随后，Android Studio 会帮助你收集、过滤和分析这些日志。\n虽然在开发过程中使用日志记录非常方便，但当涉及到发布应用时，这就变得有问题了。你不想影响应用的性能，文档也建议移除所有日志记录，这基本上否定了你在日志记录上投入的所有工作。如果用户后来报告了问题，你又需要添加日志记录语句进行故障排查，修复完成后再将它们移除，如此反复。\n\
    \n为了规范这个过程，我建议从一开始就为日志记录添加一个简单的封装：\n\n```kotlin\nclass Log {\n    companion object\
    \ {\n        fun v(tag: String, msg: String) {\n            android.util.Log.v(tag,\
    \ msg)\n        }\n        fun v(tag: String, msg: String, tr: Throwable) {\n\
    \            android.util.Log.v(tag, msg, tr)\n        }\n        fun d(tag: String,\
    \ msg: String) {\n            android.util.Log.d(tag, msg)\n        }\n      \
    \  fun d(tag: String, msg: String, tr: Throwable) {\n            android.util.Log.d(tag,\
    \ msg, tr)\n        }\n        fun i(tag: String, msg: String) {\n           \
    \ android.util.Log.i(tag, msg)\n        }\n        fun i(tag: String, msg: String,\
    \ tr: Throwable) {\n            android.util.Log.i(tag, msg, tr)\n        }\n\
    \        fun w(tag: String, msg: String) {\n            android.util.Log.w(tag,\
    \ msg)\n        }\n        fun w(tag: String, msg: String, tr: Throwable) {\n\
    \            android.util.Log.w(tag, msg, tr)\n        }\n        fun w(tag: String,\
    \ tr: Throwable) {\n            android.util.Log.w(tag, tr)\n        }\n     \
    \   fun e(tag: String, msg: String) {\n            android.util.Log.e(tag, msg)\n\
    \        }\n        fun e(tag: String, msg: String, tr: Throwable) {\n       \
    \     android.util.Log.e(tag, msg, tr)\n        }\n    }\n}\n```\n\n然后你可以使用与 Android\
    \ 标准相同的简单日志记录符号，但以后可以自由更改日志记录的实现，而无需修改代码的其余部分。例如，你可以添加一个简单的开关：\n\n```kotlin\n\
    class Log {\n    companion object {\n        val ENABLED = true\n        fun v(tag:\
    \ String, msg: String) {\n            if(!ENABLED) return\n            // <- 将其添加到所有其他语句\n\
    \            android.util.Log.v(tag, msg)\n        }\n        ...\n    }\n}\n\
    ```\n\n或者，你可以仅对虚拟设备启用日志记录。不幸的是，目前没有简单可靠的方法来确定你的应用是否在虚拟设备上运行。博客中提出的所有解决方案都有其优缺点，并且可能会随着新的\
    \ Android 版本而改变。你可以做的另一种方法是将构建变量传递给你的应用。为此，在你的应用的 `build.gradle` 文件中添加：\n\n```groovy\n\
    buildTypes {\n    release {\n        ...\n        buildConfigField \"boolean\"\
    , \"LOG\", \"false\"\n    }\n    debug {\n        ...\n        buildConfigField\
    \ \"boolean\", \"LOG\", \"true\"\n    }\n}\n```\n\n然后，在你的日志实现中，只需替换为：\n\n```kotlin\n\
    val ENABLED = BuildConfig.LOG\n```\n"
- fmt: "# 日志开关\n\n这会打开用于调试 APK 的日志记录，否则将其关闭。\n\n> **注意**\n> 在之前的版本中，我们还讨论了将 `Log4j`\
    \ 等日志框架添加到 Android 项目中。由于目前 Android 的替代日志框架似乎并未获得太多关注，甚至因主要安全漏洞而缺少更新，因此我目前不建议在\
    \ Android 中使用它们。相反，请使用内置日志器，或如前所述使用其包装器。\n\n提高性能的最后一个措施是在日志记录活动中使用 lambda 表达式。为此，请在自定义日志器中按如下方式使用日志方法：\n\
    \n```\nfun v(tag: String, msg: ()->String) {\n    if(!ENABLED) return\n    Logger.getLogger(tag).trace(msg.invoke())\n\
    }\n... // 其他语句类似\n```\n\n在代码中，你可以像下面这样发出日志消息：\n\n```\nLog.v(\"LOG\",\n    {->\
    \ \"Number of items added = \" + calculate()})\n```\n\n这种方法的优势在于，如果日志未启用，则不会计算日志消息，从而为应用的发布版本带来一些性能提升。\n\
    \n# 调试\n\n关于在 Android Studio 中进行调试，没有太多要说的——它按预期工作。你在代码中设置断点，一旦程序流程到达断点，你就可以逐步执行程序的其余部分，观察程序的行为以及变量如何变化。\n\
    \n# 性能监控\n\nAndroid Studio 拥有一个非常强大的性能监视器，它可以让你在方法级别分析性能问题。要使用它，你首先必须找到一种方法，让可能存在性能问题的代码部分在循环中运行。你可以尝试使用测试来实现这一点，但临时向代码中添加人工循环也是可行的。\n\
    \n然后，在循环运行时，在 Android Studio 中打开 `View` ➤ `Tool Windows` ➤ `Profiler`。接着添加性能分析会话。\n\
    \n性能分析器监视器会显示出来，如图 [16-1] 所示。除了 CPU 性能分析，它还包含内存使用情况分析。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig1_HTML.jpg)\n\
    \n*性能分析通道示意图，包含 CPU、内存等组件。*\n\n**图 16-1 性能分析器通道**\n\n在那里，点击“CPU”通道会将视图缩小到你在图 [16-2]\
    \ 中看到的性能监视器图表。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig2_HTML.jpg)\n\
    \n*说明 CPU 性能分析部分的图表。*\n\n**图 16-2 CPU 性能分析部分**\n\n在下方面板中滚动浏览线程，然后你可以尝试找到可疑的线程。对于我在此处运行的示例，你可以看到\
    \ `DefaultDispatch` 线程做了相当多的工作。\n\n在中间面板中，你可以看到图 [16-3] 所示的捕获控件。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig3_HTML.jpg)\n\
    \n*CPU 性能分析捕获控件示意图，包含调用栈样本记录和其他记录。*\n\n**图 16-3 CPU 性能分析捕获控件**\n\n选择捕获模式——`Java/Kotlin\
    \ Method Trace Recording` 通常是一个不错的选择——然后你可以通过按下相应命名的按钮开始录制。捕获完成后，分析会向你显示热点，直至类方法级别。从那里通常可以很容易地找到性能瓶颈。\n\
    \n有关性能监控的更多信息和细节，请参阅 Android Studio 的文档和屏幕上的上下文帮助。\n\n# 内存使用监控\n\n除了像上一节所示对应用的性能进行性能分析外，Android\
    \ Studio 的性能分析器还允许查找内存泄漏或与糟糕的内存管理相关的问题。再次将有问题的代码部分放入循环并启动它。通过 `View` ➤ `Tool Windows`\
    \ ➤ `Profiler` 打开性能分析器。选择内存通道，性能分析器会立即向你显示如图 [16-4] 所示的内存使用情况图表。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig4_HTML.jpg)\n\
    \n*内存监视器使用情况示意图。*\n\n**图 16-4 内存监视器**\n\n运行一段时间后，你可以看到内存使用量在上升——这是因为在示例应用中，我添加了一个人为的内存泄漏。参见图\
    \ [16-5]。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig5_HTML.jpg)\n\
    \n*内存性能分析及较长时间段的内存泄漏示意图。*\n\n**图 16-5 内存性能分析，较长时间段**\n\n要开始分析，请选择 `Record Java/Kotlin\
    \ Allocations` 并启动录制会话。从这里你可以使用各种分析工具。参见图 [16-6]。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig6_HTML.jpg)\n\
    \n*内存性能分析详情示意图。*\n\n**图 16-6 内存性能分析，详情**\n\n如果你选择 `Arrange by Callstack` 模式，你可以看到哪个方法导致了泄漏。对于我的示例，它指向以下方法：\n\
    \n```\nfun go(l: MutableList) {\n    Thread {\n        while (true) {\n      \
    \      l.add(\"\" + System.currentTimeMillis())\n            Thread.sleep(1)\n\
    \        }\n    }.start()\n}\n```\n\n我在其中编程了一个人为的内存泄漏。参见图 [16-7]。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig7_HTML.jpg)\n\
    \n*内存性能分析及问题定位示意图。*\n\n**图 16-7 内存性能分析，问题定位**\n\n如果这还不足以解决内存问题，你可以额外获取一个堆转储。为此，请选择\
    \ `Capture heap dump` 录制模式。然后你可以使用与之前相同的技术，或者将堆导出为 HPROF 文件，并使用其他工具分析转储。\n\n>\
    \ **注意**\n> 这样的堆转储允许确定对象引用关系——这超出了 Android Studio 的内存分析范围。这使你能够最大程度地洞察内存结构，但需要花费一些时间来熟悉像\
    \ `Eclipse Memory Analyzer` 这样的堆转储分析工具，并找到正确的答案。\n\n# 17. 分发应用\n\n如果你完成了应用，你需要找到一种分发方式。为此主要的平台是\
    \ *Google Play Store*，但如果你能说服用户允许从“其他来源”安装应用，也可以使用其他分发渠道。我不会在此介绍分发渠道列表，也不会提供使用\
    \ Google Play Store 的详细说明。根据你目标市场的不同，选项实在太多。此外，本书并非旨在介绍一般的应用营销。\n\n如需进一步了解此问题，请访问：\n\
    [`https://developer.android.com/google/play/dist`](https://developer.android.com/google/play/dist)\n\
    或\n[`https://developer.android.com/distribute/marketing-tools/alternative-distribution`](https://developer.android.com/distribute/marketing-tools/alternative-distribution)\n\
    或\n[`https://support.google.com/googleplay/android-developer/`](https://support.google.com/googleplay/android-developer/)。\n\
    \n## Android App Bundle\n\nAPK 作为分发格式已经存在了一段时间，谷歌于 2021 年引入了一种新的打包格式 *Android\
    \ App Bundle* 或 AAB。它通过过滤掉用户不需要的本地化资源等文件，简化了向最终用户的分发。Android Studio 允许在 `Build`\
    \ ➤ `Generate Signed Bundle/APK…` ➤ `Android App Bundle` 处创建 AAB。\n\n## 你自己的应用商店"
  raw: "which switches on the logging for debugging APKs and otherwise turns\nit off.\n\
    \nNote\n\nIn the previous edition, we also talked about adding logging\nframeworks\
    \ like Log4j\n to your Android projects. Because alternative logging frameworks\n\
    for Android these days seem not to gain considerable attention and even\nupdates\
    \ because of major security vulnerabilities seem to be missing, I\ncurrently do\
    \ not suggest using them for Android. Instead, use the\nbuilt-in logger, or a\
    \ wrapper around it as described previously.\n\nOne final measure you could take\
    \ to improve performance is to use lambdas  for logging\nactivities. For this\
    \ to work, use logging methods as follows in your\ncustom logger:\n\n```\nfun\
    \ v(tag: String, msg: ()->String) {\nif(!ENABLED) return\nLogger.getLogger(tag).trace(msg.invoke())\n\
    }\n... similar for the other statements\n```\n\nInside your code you then issue\
    \ log messages  like in\n\n```\nLog.v(\"LOG\",\n{-> \"Number of items added =\
    \ \" + calculate()})\n```\n\nThe advantage \nof this approach is that the logging\
    \ message will not be calculated if\nlogging is not enabled, adding some performance\
    \ boost to production\nversions of your app.\n\nDebugging\nThere is not much to\
    \ say about debugging  from inside\nAndroid Studio – it just works as expected.\n\
    You set breakpoints inside your code, and once the program flow\nreaches a breakpoint,\
    \ you can step through the rest of the program and\nobserve what the program does\
    \ and how variables change their values.\n\nPerformance Monitoring\nAndroid Studio\
    \ has a quite powerful performance monitor   , which lets you\nanalyze performance\
    \ matters down to the method level. To use it you must\nfirst find a way to run\
    \ that part of your code that is subject to\nperformance issues inside a loop.\
    \ You can try to use tests for that, but\ntemporarily adding artificial loops\
    \ to your code is feasible as\nwell.\nThen, with that loop running, inside Android\
    \ Studio open View ➤ Tool\nWindows ➤ Profiler. Then add profiling sessions.\n\n\
    The profiler monitor shows up, as seen in Figure [16-1](#463716_2_En_16_Chapter.xhtml#Fig1).\
    \ Apart from\nCPU profiling, it also contains memory usage profiling.\n\n![](images/463716_2_En_16_Chapter/463716_2_En_16_Fig1_HTML.jpg)\n\
    \nAn illustration of profile lanes with components like C P U, memory,\nand others.\n\
    \nFigure 16-1\nProfiler Lanes\n\nThere, clicking the “CPU” lane narrows the view\
    \ to the performance\nmonitor diagram you see in Figure [16-2](#463716_2_En_16_Chapter.xhtml#Fig2).\n\
    \n![](images/463716_2_En_16_Chapter/463716_2_En_16_Fig2_HTML.jpg)\n\nA chart illustrates\
    \ the C P U profiling section.\n\nFigure 16-2\nThe CPU Profiling Section\n\nScrolling\
    \ \nthrough the threads in the lower pane, you can then try to find\nsuspicious\
    \ threads. For the example I am running here, you can see that\nthe “DefaultDispatch”\
    \ thread does quite a lot of work.\n\nIn the middle pane, you can see the capture\
    \ control as shown in Figure\n[16-3](#463716_2_En_16_Chapter.xhtml#Fig3).\n\n\
    ![](images/463716_2_En_16_Chapter/463716_2_En_16_Fig3_HTML.jpg)\n\nAn illustration\
    \ of C P U profiling capture control with call stack\nsample recording and other\
    \ recordings as well.\n\nFigure 16-3\nThe CPU Profiling Capture Control\n\nWith\
    \ the capturing mode chosen – “Java/Kotlin Method Trace Recording”\nusually is\
    \ a good candidate – you can start a recording by pressing the\naccordingly named\
    \ button. After finishing the capturing, the analysis\nshows you hotspots down\
    \ to a class method level. From there to find\nperformance bottlenecks usually\
    \ is easily achievable.\nFor more information and details about performance monitoring,\
    \ please\nsee Android Studio’s documentation and the onscreen context help.\n\n\
    Memory Usage Monitoring\n\nApart from profiling the app’s performance as shown\
    \ in the previous\nsection, Android Studio’s profiler also allows for finding\
    \ memory leaks\nor issues related to poor memory management. Again put the parts\
    \ of the\ncode subject to problems into a loop and start it. Open the profiler\
    \ via\nView ➤ Tool Windows ➤ Profiler. Choose the memory lane, and immediately\n\
    the profiler shows you a memory usage diagram  as shown in\nFigure [16-4](#463716_2_En_16_Chapter.xhtml#Fig4).\n\
    \n![](images/463716_2_En_16_Chapter/463716_2_En_16_Fig4_HTML.jpg)\n\nAn illustration\
    \ of memory monitor usuage.\n\nFigure 16-4\nThe Memory Monitor\n\nThis running\
    \ for a while, you can see that the memory usage rises – this\nis because in the\
    \ sample app, I added an artificial memory leak\n. See Figure [16-5](#463716_2_En_16_Chapter.xhtml#Fig5).\n\
    \n![](images/463716_2_En_16_Chapter/463716_2_En_16_Fig5_HTML.jpg)\n\nAn illustration\
    \ of memory profiling and longer period memory\nleak.\n\nFigure 16-5\nMemory Profiling,\
    \ Longer Period\n\nTo start an analysis, select “Record Java/Kotlin Allocations”\
    \ and start\na recording session. From here you can use various analysis tools\
    \ . See Figure\n[16-6](#463716_2_En_16_Chapter.xhtml#Fig6).\n\n![](images/463716_2_En_16_Chapter/463716_2_En_16_Fig6_HTML.jpg)\n\
    \nAn illustration of memory profiling, details.\n\nFigure 16-6\nMemory Profiling,\
    \ Details\n\nIf you select the “Arrange by Callstack” mode , you can see\nwhich\
    \ method causes a leak. For my example it points to the method\n\n```\nfun go(l:MutableList)\
    \ {\nThread {\nwhile (true) {\nl.add(\"\" + System.currentTimeMillis())\nThread.sleep(1)\n\
    }\n}.start()\n}\n```\n\nwhere I programmed an artificial memory leak\n. See Figure\
    \ [16-7](#463716_2_En_16_Chapter.xhtml#Fig7).\n\n![](images/463716_2_En_16_Chapter/463716_2_En_16_Fig7_HTML.jpg)\n\
    \nAn illustration of memory profiling and the pinning down.\n\nFigure 16-7\nMemory\
    \ Profiling, Pinning Down\n\nIf this is not enough to troubleshoot memory problems,\
    \ you can in\naddition acquire a heap\ndump . To do so, select the “Capture heap\
    \ dump” recording mode.\nYou can then use the same techniques as described previously\
    \ or export\nthe heap as an HPROF file and use other tools to analyze the dump.\n\
    \nNote\n\nSuch a heap dump\n allows for determining object reference relationships\
    \ –\nsomething that goes beyond the memory analysis  of\nAndroid Studio. This\
    \ gives you the maximum insight into the memory\nstructure, but it takes some\
    \ time to get acquainted to heap dump\nanalysis tools like Eclipse Memory Analyzer\n\
    \ and to find correct answers.\n\n17. Distributing Apps\n\nIf you have finished\
    \ your app, you need to find a way to distribute\nit. The primary place to go\
    \ for that purpose is the  *Google Play Store*\n, but it is also possible to use\
    \ other distribution channels if\nyou can convince your users to allow for app\
    \ installations from “other\nsources.” I do not present a list for distribution\
    \ channels here, nor do\nI present detailed instructions for using the Google\
    \ Play Store. There\nare just too many options depending on which market  you\
    \ are\ntargeting at. Also, this book is not intended to be an introduction into\n\
    app marketing in general.\nFor further investigation on that matter, visit\n [`https://developer.android.com/google/play/dist`](https://developer.android.com/google/play/dist)\
    \ or\n [`https://developer.android.com/distribute/marketing-tools/alternative-distribution\
    \ or`](https://developer.android.com/distribute/marketing-tools/alternative-distribution)\
    \ \n [`https://support.google.com/googleplay/android-developer/`](https://support.google.com/googleplay/android-developer/)\
    \ .\n\nAndroid App Bundle\nWith APK as a distribution format having been around\
    \ for quite some\ntime, Google in 2021 introduced a new packaging format, *Android\
    \ App\nBundle* or AAB\n. It streamlines distribution to the end user by filtering\
    \ out\nunneeded files like localization resources the user would not need.\nAndroid\
    \ Studio allows for the creation of AAB  at Build ➤ Generate\nSigned Bundle/APK…\
    \ ➤ Check “Android App Bundle”.\n\nYour Own App Store"
