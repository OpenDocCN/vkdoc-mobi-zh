    \n## Controlling App Visibility on Wearables\n\nWear OS devices since Android\
    \ 5.1 allow for running Wear apps in foreground even when the power-saving or\
    \ *ambient* mode was engaged. You have two options for handling the ambient mode:\n\
    \n*   Use the `AmbientModeSupport` class.\n*   Use the `WearableActivity` class.\n\
    \nFor using the `AmbientModeSupport` class, implement a subclass of `Activity`,\
    \ implement the `AmbientCallbackProvider` interface, and declare and save an `AmbientController`\
    \ as in:\n\n```kotlin\nclass MainActivity : FragmentActivity(),\n    AmbientModeSupport.AmbientCallbackProvider\
    \ {\n    override\n    fun getAmbientCallback():\n        AmbientModeSupport.AmbientCallback\n\
    \    {\n        ...\n    }\n    lateinit\n    var mAmbientController:\n      \
    \  AmbientModeSupport.AmbientController\n    override\n    fun onCreate(savedInstanceState:Bundle?)\
    \ {\n        super.onCreate(savedInstanceState)\n        ...\n        mAmbientController\
    \ =\n            AmbientModeSupport.attach(this)\n    }\n}\n```\n\nInside the\
    \ `getAmbientCallback()` function, create and return a subclass of `AmbientModeSupport.AmbientCallback`.\
    \ This callback is then responsible for the switch between standard and ambient\
    \ modes. What ambient mode actually does is up to you as a developer, but you\
    \ should engage power-saving measures such as dimmed and black-and-white graphics,\
    \ augmented update intervals, and so on. The second possibility to allow for an\
    \ ambient mode is to let your activity inherit from class `WearableActivity`,\
    \ call `setAmbientEnabled()` in its `onCreate(...)` callback, and overwrite `onEnterAmbient()`\
    \ and `onExitAmbient()`. If you also overwrite `onUpdateAmbient()`, you can put\
    \ your screen updating logic there and let the system decide which update frequency\
    \ to use in ambient mode.\n\n## Authentication in Wear\n\nWith Wear apps being\
    \ able to run in standalone mode, authentication becomes more important. Describing\
    \ the appropriate procedures for this matter is out of scope for this book, but\
    \ the page at [`https://developer.android.com/training/wearables/overlays/auth-wear`](https://developer.android.com/training/wearables/overlays/auth-wear)\
    \ gives you detailed information about authentication in Wear.\n\n## Voice Capabilities\
    \ in Wear\n\nAdding voice capabilities to Wear devices makes a lot of sense, since\
    \ other methods for user input are limited due to the small device dimensions.\
    \ You have two options: connect your app to one or more of the system-provided\
    \ voice actions, or define your own actions.\n\n> **Caution**\n>\n> The Wear emulator\
    \ cannot handle voice commands – you have to use real devices to test them.\n\n\
    Connecting system voice events to activities your app provides is easy – all you\
    \ have to do is to add an intent filter to your activity as follows:\n\nPossible\
    \ voice keys are listed in Table [14-1](#463716_2_En_14_Chapter.xhtml#Tab1).\n\
    \n**Table 14-1** System Voice Commands\n\n| Command | Manifest Key | Extras |\n\
    | --- | --- | --- |\n| “OK, Google, get me a taxi”<br>“OK, Google, call me a car”\
    \ | `com.google.android.gms.actions.RESERVE_TAXI_RESERVATION` | - |\n| “OK, Google,\
    \ take a note”<br>“OK, Google, note to self” | `android.intent.action.SEND`<br>Category:\
    \ `com.android.voicesearch.SELF_NOTE` | `android.content.Intent.EXTRA_TEXT` –\
    \ a string with note body |\n| “OK, Google, set an alarm for 8 AM”<br>“OK, Google,\
    \ wake me up at 6 tomorrow” | `android.intent.action.SET_ALARM` | `android.provider.AlarmClock.EXTRA_HOUR`\
    \ – an integer with the hour of the alarm.<br>`android.provider.AlarmClock.EXTRA_MINUTES`\
    \ – an integer with the minute of the alarm |\n| “OK, Google, set a timer for\
    \ 10 minutes” | `android.intent.action.SET_TIMER` | `android.provider.AlarmClock.EXTRA_LENGTH`\
    \ – an integer in the range of 1–86400 (number of seconds in 24 hours) representing\
    \ the length of the timer |\n| “OK, Google, start stopwatch” | `com.google.android.wearable.action.STOPWATCH`\
    \ | - |\n| “OK, Google, start cycling”<br>“OK, Google, start my bike ride”<br>“OK,\
    \ Google, stop cycling” | `vnd.google.fitness.TRACK`<br>Mime Type: `vnd.google.fitness.activity/biking`\
    \ | `actionStatus` – a string with the value `ActiveActionStatus` when starting\
    \ and `CompletedActionStatus` when stopping |\n| “OK, Google, track my run”<br>“OK,\
    \ Google, start running”<br>“OK, Google, stop running” | `vnd.google.fitness.TRACK`<br>Mime\
    \ Type: `vnd.google.fitness.activity/running` | `actionStatus` – a string with\
    \ the value `ActiveActionStatus` when starting and `CompletedActionStatus` when\
    \ stopping |\n| “OK, Google, start a workout”<br>“OK, Google, track my workout”<br>“OK,\
    \ Google, stop workout” | `vnd.google.fitness.TRACK`<br>Mime Type: `vnd.google.fitness.activity/other`\
    \ | `actionStatus` – a string with the value `ActiveActionStatus` when starting\
    \ and `CompletedActionStatus` when stopping |\n| “OK, Google, what’s my heart\
    \ rate?”<br>“OK, Google, what’s my BPM?” | `vnd.google.fitness.VIEW`<br>Mime Type:\
    \ `vnd.google.fitness.data_type/com.google.heart_rate.bpm` | - |"
