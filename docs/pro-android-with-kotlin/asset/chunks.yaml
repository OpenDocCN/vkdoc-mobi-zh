    \ 访问器。这样做的原因是，如果发生多点触摸事件，`action` 访问器可能包含额外的位。带掩码的变体更可靠。\n\n## 使用 Vulkan 实现快速图形\n\
    \n*Vulkan* API 是在 Android 设备上满足高性能 3D 图形需求的另一种方式。与 OpenGL 相比，Vulkan 更适合视频游戏编程方法论，并且随着其开发始于\
    \ 2016 年，它可以说是一个更现代的框架（OpenGL 自 1992 年就已存在）。在本书中，我们不会进一步讨论 Vulkan，但[`developer.android.com/ndk/guides/graphics/getting-started`](https://developer.android.com/ndk/guides/graphics/getting-started)和[www.khronos.org/vulkan/](http://www.khronos.org/vulkan/)为您提供了很好的起点，如果您想了解更多相关信息。\n\
    \n## 使用可移动项目的 UI 设计\n\n如果你的应用需要可移动的 UI 元素，你最好使用 `FrameLayout` 类或其子类。我们希望自己处理 UI\
    \ 元素的位置，而不希望布局类干扰这一点。`FrameLayout` 类不会动态定位其元素，因此对于这种定位方式来说，它是一个很好的选择。\n\n如果你想让你的视图可移动，你可以创建一个子类并重写其\
    \ `onTouchEvent()` 方法。例如，假设你有一个 `ImageView` 并希望它可以移动。为此目的，创建一个如下所示的子类：\n\n```kotlin\n\
    class MyImageView : ImageView {\n    constructor(context: Context) : super(context)\n\
    \    constructor(context: Context, attrs: AttributeSet) : super(context, attrs)\n\
    \n    var dx: Float = 0.0f\n    var dy: Float = 0.0f\n\n    override fun onTouchEvent(event:\
    \ MotionEvent): Boolean {\n        var handled = true\n        when(event.actionMasked)\
    \ {\n            MotionEvent.ACTION_DOWN -> {\n                //Log.e(\"LOG\"\
    , \"动作: ACTION_DOWN \" + event.toString())\n                dx = x - event.rawX\n\
    \                dy = y - event.rawY\n            }\n            MotionEvent.ACTION_UP\
    \ -> {\n                //Log.e(\"LOG\", \"动作: ACTION_UP \" + event.toString())\n\
    \            }\n            MotionEvent.ACTION_MOVE -> {\n                //Log.e(\"\
    LOG\", \"动作: MOVE \" + event.toString())\n                x = event.rawX + dx\n\
    \                y = event.rawY + dy\n            }\n            else -> handled\
    \ = false\n        }\n        return handled || super.onTouchEvent(event)\n  \
    \  }\n}\n```\n\n如果你希望由代码中的一个单一中心点来处理移动，你可以执行以下操作之一：\n*   为可移动视图创建一个基类，并让所有 UI\
    \ 元素继承自它。\n*   将触摸事件监听器添加到布局容器中。但是，你需要提供一些逻辑，通过检查像素坐标边界来找到被触摸的 UI 元素。\n\n## 菜单和操作栏\n\
    \n如果你想要向用户呈现一个可选项目的列表，菜单和操作栏是重要的用户界面元素。在以下章节中，我们将介绍不同类型的菜单，并说明何时以及如何使用它们。\n\n\
    ### 选项菜单\n\n选项菜单会显示在应用栏内。Android Studio 将帮助你开始开发带有应用栏的应用。如果你想自己操作，请在你的布局中添加\n\n\
    在 Activity 的 `onCreate(...)` 方法中，我们需要告诉 Android 操作系统我们在使用应用栏。为此，通过以下方式注册应用栏：\n\
    \n```kotlin\nsetSupportActionBar(toolbar)\n```\n"
