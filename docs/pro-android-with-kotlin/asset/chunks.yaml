- fmt: "# NFC 开发指南\n\n为了编写合适的意图过滤器（intent filter），请参见第 [3](#463716_2_En_3_Chapter.xhtml)\
    \ 章的“意图过滤器”部分，此外，对于“tech”风格的发现，你需要在`<activity>`内添加一个特定的`<meta-data>`元素，如下所示：\n\
    \n```xml\n<meta-data android:name=\"android.nfc.action.TECH_DISCOVERED\"\n   \
    \ android:resource=\"@xml/nfc_tech_filter\" />\n```\n\n该元素指向`res/xml`内的`nfc_tech_filter.xml`文件，其中包含：\n\
    \n```xml\n<resources>\n    <tech-list>\n        <tech>android.nfc.tech.IsoDep</tech>\n\
    \        <tech>android.nfc.tech.NfcA</tech>\n        <tech>android.nfc.tech.NfcB</tech>\n\
    \        <tech>android.nfc.tech.NfcF</tech>\n        <tech>android.nfc.tech.NfcV</tech>\n\
    \        <tech>android.nfc.tech.Ndef</tech>\n        <tech>android.nfc.tech.NdefFormatable</tech>\n\
    \        <tech>android.nfc.tech.MifareClassic</tech>\n        <tech>android.nfc.tech.MifareUltralight</tech>\n\
    \    </tech-list>\n</resources>\n```\n\n或者其中任意子集。\n\n为了参与 NFC 调度流程，你需要向意图过滤器添加以下操作：\n\
    \n- 对于 NDEF 发现风格，使用`<action android:name=\"android.nfc.action.NDEF_DISCOVERED\"\
    \ />`\n- 对于技术发现风格，使用`<action android:name=\"android.nfc.action.TECH_DISCOVERED\"\
    \ />`\n\n```xml\n...more filter specs...\n```\n\n- 对于回退发现风格，使用`<action android:name=\"\
    android.nfc.action.TAG_DISCOVERED\" />`\n\n```xml\n...more filter specs...\n```\n\
    \n一旦 NFC 相关的意图被分发，匹配的 Activity 可以从意图中提取 NFC 信息。为此，可以通过以下一种或多种方式获取意图的额外数据：\n\n\
    - `NfcAdapter.EXTRA_TAG`：必需，返回一个`android.nfc.Tag`对象。\n- `NfcAdapter.EXTRA_NDEF_MESSAGES`：可选，来自标签的\
    \ NDEF 消息。可以通过`intent.getParcelableArrayExtra(NfcAdapter.EXTRA_NDEF_MESSAGES)`检索它们。\n\
    - `NfcAdapter.EXTRA_ID`：可选，标签的低级 ID。\n\n```kotlin\nval rawMessages : Parcelable[]\
    \ =\n    intent.getParcelableArrayExtra(\n        NfcAdapter.EXTRA_NDEF_MESSAGES\n\
    \    )\n```\n\n如果你想写入 NFC 标签，相关流程在 Android 在线开发者文档的“NFC 基础”页面中有所描述。\n\n## 点对点\
    \ NFC 数据交换\n\nAndroid 允许通过其 Beam 技术在两台 Android 设备之间进行 NFC 通信。流程如下：让 NFC 设备的 Activity\
    \ 继承`CreateNdefMessageCallback`并实现方法`createNdefMessage(event: NfcEvent): NdefMessage`。在此方法内部，创建并返回一个`NdefMessage`，如下所示：\n\
    \n```kotlin\nval text = \"A NFC message at \" +\n    System.currentTimeMillis().toString()\n\
    val msg = NdefMessage(arrayOf(\n    NdefRecord.createMime(\n        \"application/vnd.com.example.android.beam\"\
    ,\n        text.toByteArray()\n    )\n))\n/*\n * 当设备接收到带有 Android 应用程序记录 (AAR)\
    \ 的 NFC 消息时，\n * AAR 中指定的应用保证会运行。因此，AAR 会覆盖标签调度系统。\n */\n//val msg = NdefMessage(arrayOf(\n\
    //      NdefRecord.createMime(\n//           \"application/vnd.com.example.android.beam\"\
    ,\n//           text.toByteArray()),\n//      NdefRecord.createApplicationRecord(\n\
    //           \"com.example.android.beam\")\n//))\nreturn msg\n```\n\n然后，一个 NFC\
    \ 数据接收应用可以在其`onResume()`回调中检测是否由 NFC 发现操作启动：\n\n```kotlin\noverride\nfun onResume()\
    \ {\n    super.onResume()\n    // 检查 Activity 是否因 Android Beam 事件而启动\n    if (NfcAdapter.ACTION_NDEF_DISCOVERED\
    \ ==\n        intent.action) {\n        processIntent(intent)\n    }\n}\n```\n\
    \n## NFC 卡模拟\n\n让 Android 设备充当带有 NFC 芯片的智能卡需要复杂的设置和编程任务。这在考虑安全性时尤其有意义——某些 Android\
    \ 设备可能包含一个安全元件，该元件在硬件基础上执行与读卡器的通信。其他设备可能应用基于主机的卡模拟，让设备 CPU 执行通信。本书不涵盖 NFC 卡模拟所有细节的详尽描述，但你可以在网络上找到信息，或者访问\
    \ Android 在线开发者指南中的“基于主机的卡模拟”页面。\n\n尽管如此，我们描述了开始进行基于主机的卡模拟的基本工件。该示例基于 Android\
    \ 开发者指南提供的 HCE 示例，但已转换为 Kotlin 并精简为仅与 NFC 相关的重要方面（该示例在 Apache 许可下运行——请参见[www.apache.org/licenses/LICENSE-2.0](http://www.apache.org/licenses/LICENSE-2.0)）。代码如下：\n\
    \n```kotlin\n/**\n * 这是一个示例 APDU 服务，演示如何\n * 与 Android 4.4 KitKat 中新增的\n * 卡模拟支持进行交互。\n\
    \ *\n * 本示例用字符串 \"Hello World\" 回复\n * 任何发送的请求。在实际场景中，你\n * 需要修改此代码以实现你期望的\n *\
    \ 通信协议。\n *\n * 任何选择 AIDs 为 0xF11111111、0xF22222222 或\n * 0xF33333333 的终端都会调用本示例。\n\
    \ * 详见 src/main/res/xml/aid_list.xml。\n *\n * 注意：这是一个低级接口。与许多开发者\n * 在实现 Android\
    \ Beam 应用时熟悉的 NdefMessage\n * 不同，卡模拟仅提供基于字节数组的通信\n * 通道。开发者需要根据需要实现\n * 更高级别的协议支持。\n\
    \ */\nclass CardService : HostApduService() {\n```\n\n当与 NFC 卡的连接丢失时，会调用`onDeactivated()`回调，以便让应用了解断开连接的原因（链接丢失或读卡器选择了另一个\
    \ AID）：\n\n```kotlin\n/**\n * 当与 NFC 卡的连接丢失时调用。\n * @param reason 可以是 DEACTIVATION_LINK_LOSS\
    \ 或\n *     DEACTIVATION_DESELECTED\n */\noverride fun onDeactivated(reason: Int)\
    \ {}\n```\n\n当收到命令 APDU 时，会调用`processCommandApdu()`方法。通过在此方法中返回一个字节数组，可以直接提供响应\
    \ APDU。通常，响应 APDU 必须尽可能快地发送，因为用户可能会在调用此方法时将设备放在 NFC 读卡器上。如果有多个服务在其元数据条目中注册了相同的\
    \ AID，则只有在用户明确选择你的服务时（无论是作为默认服务还是仅针对下一次点击），你才会被调用。此方法在你的应用程序的主线程中运行。如果你不能立即返回响应\
    \ APDU，请返回`null`并使用`sendResponseApdu()`方法稍后发送：\n\n```kotlin\n/**\n * 当从远程设备接收到命令\
    \ APDU 时，\n * 将调用此方法。\n *\n * @param commandApdu 从远程设备接收到的 APDU\n * @param extras\
