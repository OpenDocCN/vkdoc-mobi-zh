    \ AccelerateInterpolator()\n}\nanim.start()\n```\n\nNote"
  trans: "\n*   为所有项目添加点击监听器。\n*   使项目可被选中。\n*   使项目或项目部分可编辑。\n*   自动响应底层数据的变化。\n\
    *   定制图形过渡效果。\n\n关于这些内容，请参阅 recycler 视图的在线文档。不过，此处提供的代码应能为您提供一个良好的起点。\n\n## 样式与主题\n\
    \nAndroid 应用默认使用的预定义样式已经为打造专业外观的应用提供了良好起点。但如果您想遵循公司的样式指南，或者希望打造视觉上出类拔萃的应用，那么创建自己的样式是值得的。甚至更好的是，创建自己的主题——这是一个应用于\
    \ UI 元素组的样式集合。\n\n样式和主题在 `res/values/` 目录下以 XML 文件的形式创建。要创建新主题，您可以使用或创建一个名为 `themes.xml`\
    \ 的文件，并写入如下内容：\n\n```\n<style name=\"AppTheme\" parent=\"Theme.AppCompat\">\n\
    \    <item name=\"colorPrimary\">@color/colorPrimary</item>\n    <item name=\"\
    colorPrimaryDark\">@color/colorPrimaryDark</item>\n    <item name=\"colorAccent\"\
    >@color/colorAccent</item>\n    <item name=\"android:windowBackground\">#FF0000</item>\n\
    \    <item name=\"android:textSize\">22sp</item>\n</style>\n```\n\n关于此示例，有几点说明：\n\
    \n*   `parent` 属性很重要。它表示我们想要创建一个覆盖兼容库中 `Theme.AppCompat` 主题部分内容的主题。\n*   根据 `Theme`\
    \ + 点号 + `AppCompat` 的命名规则，我们可以推断出 `Theme.AppCompat` 主题继承自 `Theme` 主题。这种由点号引发的继承关系可以有更多层级。\n\
    *   除了父主题 `Theme.AppCompat`，我们也可以使用它的子主题之一。您可以在 Android Studio 中点击 `AppCompat`\
    \ 部分，然后按 `Ctrl+B` 查看子主题列表。Android Studio 会打开一个文件，其中列出了所有子主题，例如 `Theme.AppCompat.CompactMenu`、`Theme.AppCompat.Light`\
    \ 等等。\n*   在示例中，我们看到了两种覆盖样式的方法：以 `android:` 开头的属性指的是 UI 元素定义的样式设置，其方式与我们想要从布局文件中设置样式相同。您可以在所有视图的在线\
    \ API 文档中找到它们。不过，最好使用那些不以 `android:` 开头的属性，因为它们指的是构成主题的抽象样式标识符。如果您在在线文档中搜索 `R.styleable.Theme`，就能得到可能的项目名称列表。\n\
    *   多年来，样式系统变得愈发复杂——如果您有勇气且有时间，可以在 Android Studio 中通过反复按 `Ctrl+B` 来浏览所有父级相关的文件。\n\
    *   `@color/...` 引用的是 `res/values/colors.xml` 文件中的条目——您应该采用这种方法，并在您应用模块的 `res/values/colors.xml`\
    \ 文件中定义新的颜色。\n*   `<item>` 元素的值可以通过 `@style/...` 引用样式，例如，元素 `<item name=\"buttonStyle\"\
    >@style/Widget.AppCompat.Button</item>`。您也可以覆盖此类项目——只需在 `styles.xml` 中定义您自己的样式并引用它们即可。\n\
    \n为了将此新主题一次性地应用于整个应用，您需要在清单文件 `AndroidManifest.xml` 中写入：\n\n```\nandroid:theme=\"\
    @style/AppTheme\"\n```\n\n> **注意**\n> 您不必使用完整的主题来覆盖样式——相反，您可以覆盖或创建单个样式，然后将其应用于单个小部件。不过，使用主题可以极大地提高应用设计的一致性。\n\
    \n您可以为不同的 API 级别分配样式。为此，可以创建一个文件夹，例如 `res/values-v21/`，或任何适合您的级别编号。如果当前的 API 级别*大于或等于*该数字，则该文件夹内的样式将*额外*被应用。\n\
    \n## XML 中的字体\n\nAndroid 从 API 26 级（Android 8.0）开始，以及使用支持库 26 的早期版本，允许您添加 TTF\
    \ 或 OTF 格式的自定义字体。\n\n> **注意**\n> 要使用此支持库，请在您模块的 `build.gradle` 文件的 `dependencies`\
    \ 部分添加 `implementation 'com.android.support:appcompat-v7:26.1.0'`。\n\n要添加字体文件，请创建一个字体资源目录：选择“新建\
    \ ➤ Android 资源目录”，然后输入 `font` 作为目录名称，`font` 作为资源类型，然后点击“确定”。将您的字体文件复制到该新资源目录中，但首先要将所有文件名转换为仅包含\
    \ `a 到 z 以及 0 到 9_` 的字符，然后再使用后缀。\n\n要应用新字体，请使用 `android:fontFamily` 属性，例如：\n\n\
    ```\n<TextView\n    android:layout_width=\"match_parent\"\n    android:layout_height=\"\
    wrap_content\"\n    android:fontFamily=\"@font/<FONT_NAME>\"\n/>\n```\n\n其中 `<FONT_NAME>`\
    \ 是不带后缀的字体文件名。\n\n要添加具有不同字体样式的字体，假设您的 `font` 资源文件夹中有 `myfont_regular.ttf`、`myfont_bold.ttf`、`myfont_italic.ttf`\
    \ 和 `myfont_bold_italic.ttf`，请通过选择“新建 ➤ 字体资源文件”来添加一个 `myfont.xml` 文件。在其中写入：\n\n\
    ```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<font-family xmlns:android=\"\
    http://schemas.android.com/apk/res/android\">\n    <font android:fontStyle=\"\
    normal\" android:fontWeight=\"400\" android:font=\"@font/myfont_regular\" />\n\
    \    <font android:fontStyle=\"normal\" android:fontWeight=\"700\" android:font=\"\
    @font/myfont_bold\" />\n    <font android:fontStyle=\"italic\" android:fontWeight=\"\
    400\" android:font=\"@font/myfont_italic\" />\n    <font android:fontStyle=\"\
    italic\" android:fontWeight=\"700\" android:font=\"@font/myfont_bold_italic\"\
    \ />\n</font-family>\n```\n\n并忽略 Android Studio 的版本警告——为了兼容性，所有属性都使用标准命名空间并额外使用一个兼容性命名空间。\n\
    \n然后，您可以在 UI 视图的 `android:fontFamily` 属性中使用此 XML 文件的名称（不带后缀）：\n\n```\n<TextView\n\
    \    android:layout_width=\"match_parent\"\n    android:layout_height=\"wrap_content\"\
    \n    android:fontFamily=\"@font/myfont\"\n    android:textStyle=\"normal\"\n\
    />\n```\n\n现在，您也可以将 `textStyle` 设置为 `italic`、`bold` 或 `bold|italic`。\n\n## 2D\
    \ 动画\n\n动画能让您的应用看起来更炫酷，虽然过多的动画可能会显得怪异，但适量的动画能帮助用户理解应用的功能。Android 操作系统提供了多种可用的动画技术，我们将在以下各部分中对其进行描述。\n\
    \n### 自动动画布局\n\n添加动画的一种非常简单的方法是使用内置的布局自动动画。您只需在布局声明中添加 `android:animateLayoutChanges=\"\
    true\"` 即可，例如：\n\n```\n<LinearLayout\n    android:layout_width=\"match_parent\"\
    \n    android:layout_height=\"match_parent\"\n    android:animateLayoutChanges=\"\
    true\">\n    ...\n</LinearLayout>\n```\n\n### 动画位图\n\n您可以通过提供位图的不同版本并让 Android\
    \ 在它们之间切换来为位图添加动画。首先，将所有图片添加到 `res/drawable` 目录中，例如 `img1.png`、`img2.png`、…、`img9.png`。然后，在同一文件夹中创建一个文件，例如命名为\
    \ `anim.xml`，并在其中写入：\n\n```\n<animation-list xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \ android:oneshot=\"false\">\n    <item android:drawable=\"@drawable/img1\" android:duration=\"\
    100\" />\n    <item android:drawable=\"@drawable/img2\" android:duration=\"100\"\
    \ />\n    ...\n    <item android:drawable=\"@drawable/img9\" android:duration=\"\
    100\" />\n</animation-list>\n```\n\n其中每个位图幻灯片的持续时间以毫秒为单位。要使其不重复，请设置 `android:oneshot=\"\
    true\"`。将图片（例如，作为 `ImageView`）添加到您的布局中，如下所示：\n\n```\n<ImageView\n    android:layout_width=\"\
    wrap_content\"\n    android:layout_height=\"wrap_content\"\n    android:src=\"\
    @drawable/anim\"\n    android:id=\"@+id/img\" />\n```\n\n这准备好了动画，但它需要从程序内部启动，例如，如下所示：\n\
    \n```\nimg.setBackgroundResource(R.drawable.anim1)\nimg.setOnClickListener{\n\
    val anim = img.background as AnimationDrawable\nanim.start()\n}\n```\n\n此处，动画在用户点击图片时开始播放。\n\
    \n### 属性动画\n\n属性动画框架允许您对任何想到的对象进行动画处理。使用 `android.animation.ValueAnimator` 类，您可以指定：\n\
    \n*   持续时间和重复模式\n*   插值值的类型\n*   动画期间的时间插值器\n*   用于值更新的监听器\n\n不过，大多数时候，您会使用 `android.animation.ObjectAnimator`\
    \ 类，因为它已经针对对象及其属性进行操作，因此您不必实现监听器。此类有各种静态工厂方法来创建 `ObjectAnimator` 的实例，其中参数指定了要动画处理的对象、要使用的该对象属性的名称，以及动画期间要使用的值。然后，您可以在该对象上设置特定的插值器（默认是\
    \ `AccelerateDecelerateInterpolator`，它开始和结束缓慢，中间加速又减速），并添加一个值更新监听器（设置在 `onAnimationUpdate()`\
    \ 中），例如，当需要通知 `View` 类型的某个目标对象必须更新自身时（通过调用 `invalidate()`）。\n\n作为示例，我们在 `FrameLayout`\
    \ 中定义一个 `TextView` 对象，并以加速方式将其从 x=0 移动到 x=500。布局文件包含：\n\n```\n<FrameLayout\n \
    \   android:layout_width=\"match_parent\"\n    android:layout_height=\"match_parent\"\
    >\n    <TextView\n        android:layout_width=\"wrap_content\"\n        android:layout_height=\"\
    wrap_content\"\n        android:text=\"移动的文本\"\n        android:id=\"@+id/tv\"\
    \ />\n</FrameLayout>\n```\n\n在代码内部，例如，在按钮被点击之后，执行：\n\n```\nval anim = ObjectAnimator.ofFloat(tv,\
    \ \"x\", 0.0f, 500.0f)\n.apply {\n    duration = 1000 // 默认为 300ms\n    interpolator\
    \ = AccelerateInterpolator()\n}\nanim.start()\n```\n\n> **注意**\n"
- fmt: "# Android Animation and Transition Guide\n\nThis only works if the object\
    \ in question, here a `TextView`, has a setter method for the property specified,\
    \ here an \"x\". More precisely, the object needs a `setX(Float)`, which however\
    \ is the case for all `View` objects.\n\n## Caution\n\nYour mileage varies largely\
    \ depending on the layout your UI object is placed in – after all the layout object\
    \ might have its own idea how to position objects, thwarting the animation. A\
    \ `FrameLayout` is quite handsome here, but you have to do all layouting inside\
    \ the code.\n\nUsing the `android.animation.AnimatorSet` you can also choreograph\
    \ a set of several animations. The online API documentation will tell you more\
    \ about how to use it.\n\n## View Property Animator\n\nWith certain constraints\
    \ imposed, a couple of `View`-related properties can also be animated using an\
    \ `android.view.ViewPropertyAnimator`. It seems to be less invasive compared with\
    \ general property animation, but only a small number of properties can be animated,\
    \ and only the drawing gets affected by the animation – the position for on-click\
    \ listeners, for example, gets orphaned if views move away. Other than that you\
    \ can use it to (A) translate views, (B) scale views, (C) rotate views, and (D)\
    \ fade in or fade out views. For details please see the online documentation.\n\
    \nAs an extension to the built-in *view property* animation, you might want to\
    \ have a look at *fling animation* as well. This type of animation applies a frictional\
    \ force on moving objects, letting the animation appear more natural. To find\
    \ information about fling animation, search for \"Android fling animation\" inside\
    \ your favorite search engine.\n\n## Spring Physics\n\nAdding spring physics to\
    \ your animations improves the user experience by making moves more realistic.\
    \ To add spring physics, you need to include the corresponding support library:\
    \ in your module's `build.gradle` file, add \"implementation 'com.android.support:support-dynamic-animation:27.1.0'\"\
    \ inside the \"dependencies\" element.\n\nFor details I refer to the online API\
    \ documentation of class `android.support.animation.SpringAnimation`. The most\
    \ important settings are the following:\n\n- Inside the constructor, set the property.\
    \ Available are alpha, translation, rotation, scroll value, and scale.\n- Add\
    \ listeners: use `addUpdateListener()` and/or `addEndListener()`.\n- Use `setStartVelocity()`\
    \ to start the animation with an initial speed (default is 0.0f).\n- Use `getSpring().setDampingRatio()`\
    \ or in Kotlin just `.spring.dampingRatio = ...` to set the damping factor.\n\
    - Use `getSpring().setStiffness()` or in Kotlin just `.spring.stiffness = ...`\
    \ to set the spring stiffness.\n\nUse `start()` or `animateToFinalPosition()`\
    \ to start the animation. This must happen inside the GUI thread or inside `runOnUiThread\
    \ { ... }`.\n\nAn example for a spring animation would be, for example, after\
    \ a button press:\n\n```\nval springAnim = SpringAnimation(tv, DynamicAnimation.TRANSLATION_X,\
    \ 500.0f).apply {\n    setStartVelocity(1.0f)\n    spring.stiffness = SpringForce.STIFFNESS_LOW\n\
    \    spring.dampingRatio = SpringForce.DAMPING_RATIO_LOW_BOUNCY\n}\nspringAnim.start()\n\
    ```\n\n## Transitions\n\nThe transition framework allows for applying animated\
    \ transitions between different layouts. You basically create `android.transition.Scene`\
    \ objects from a starting and an end layout and then let the `TransitionManager`\
    \ act, for example:\n\n```\nval sceneRoot: ViewGroup = ...\n// Obtain the view\
    \ hierarchy to add as a child of\n// the scene root when this scene is entered\n\
    val startViewHierarchy: ViewGroup = ...\n// Same for the end scene\nval endViewHierarchy:\
    \ ViewGroup = ...\n// Create the scenes\nval startScene = Scene(sceneRoot, startViewHierarchy)\n\
    val endScene = Scene(sceneRoot, endViewHierarchy)\nval fadeTransition = Fade()\n\
    TransitionManager.go(endScene, fadeTransition)\n```\n\nThe `sceneRoot` could,\
    \ for instance, be a `FrameLayout` with the transition supposed to happen inside.\
    \ You'd then at the beginning add the starting layout (`startViewHierarchy`) inside.\
    \ The preceding code will establish a transition to the end layout (`endViewHierarchy`),\
    \ all happening *inside* the `sceneRoot`. Such transitions can be specified from\
    \ inside the code, but also as by special XML files. For details please see the\
    \ online documentation.\n\n### Caution\n\nCertain restrictions apply – not all\
    \ `View` types will correctly take part of such layout transitions. It is however\
    \ possible to exclude elements from the transition by using the `removeTarget()`\
    \ method.\n\n## Start an Activity Using Transitions\n\nWhile one activity gets\
    \ replaced by another activity, it is possible to (A) specify an exit transition\
    \ for the first, (B) specify an enter transition for the second, and (C) allow\
    \ for a smooth transition of common view elements. Such transitions can be specified\
    \ either by special XML files or from inside the code. We briefly describe the\
    \ latter. For the XML way and also for more details, please consult the online\
    \ documentation.\n\nSuch activity switch transitions are available for API levels\
    \ 21 (Android 5.0) and up. To make sure your code works with versions prior to\
    \ that, inside the following code snippet, we write a check:\n\n```\nif (Build.VERSION.SDK_INT\
    \ >= Build.VERSION_CODES.LOLLIPOP) ...\n```\n\nTo set an *exit* and an *enter*\
    \ transition, use the following snippet inside both activities:\n\n```\noverride\
    \ fun onCreate(savedInstanceState: Bundle?) {\n    super.onCreate(savedInstanceState)\n\
    \    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {\n        with(window)\
    \ {\n            requestFeature(Window.FEATURE_CONTENT_TRANSITIONS)\n        \
    \    exitTransition = Explode()\n            // if inside the CALLED transition,\
    \ instead use:\n            // enterTransition = Explode()\n            // use\
    \ this in the CALLED transition to\n            // primordially start the enter\
    \ transition:\n            // allowEnterTransitionOverlap = true\n        }\n\
    \    } else {\n        // Go without transition - this can be empty\n    }\n \
    \   ...\n}\n```\n\nwhere instead of `Explode()` you can also choose `Slide()`,\
    \ `Fade()`, or `AutoTransition()`. *Fade* and *Slide* do the obvious thing; the\
    \ `AutoTransition` fades out elements that are not common (see in the following\
    \ what that means), moves and resizes common elements, and then fades in new elements.\n\
    \n### Note\n\nThe `requestFeature()` must happen at the beginning of `onCreate()`.\n\
    \nThe transition gets only activated when you start a new activity via:\n\n```\n\
    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {\n    startActivity(intent,\
    \ ActivityOptions.makeSceneTransitionAnimation(this).toBundle())\n} else {\n \
    \   startActivity(intent)\n}\n```\n\nWhen the *called* activity exists, you could\
    \ use `Activity.finishAfterTransition()` instead of the usual `finish()` to have\
    \ the reverse transition more nicely handled. Again you have to put that inside\
    \ an `if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP)` check.\n\nTo\
    \ improve user experience, you can identify elements that are common to both activities\
    \ and let the transition framework handle them in a special way. To do so you\
    \ do two things:\n\n- Give the common UI elements a special *transition name*:\n\
    \n    ```\n    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {\n\
    \        img.transitionName = \"imgTrans\"\n        // for a certain \"img\" UI\
    \ element\n    }\n    ```\n\n    This name must be unique, and the setting should\
    \ happen inside `onCreate()` in both the calling and the called activity.\n\n\
    - Replace the preceding `ActivityOptions.makeSceneTransitionAnimation(this)` by:\n\
    \n    ```\n    ActivityOptions.makeSceneTransitionAnimation(\n        this@MainActivity,\n\
    \        UPair.create(img, \"imgTrans\"),\n        ...more pairs...\n    )\n \
    \   ```\n\n    where the `UPair` is an import alias to avoid name clashes: `import\
    \ android.util.Pair as UPair`. You can then, for example, use the `AutoTransition()`\
    \ transition to get such common UI elements handled in a special way during the\
    \ animation."
