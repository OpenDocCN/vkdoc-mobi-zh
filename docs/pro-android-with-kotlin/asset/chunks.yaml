  trans: "\n`features` | 位掩码，描述通话的特性，由（`CallLog.Calls` 中的常量名称）构成：`FEATURES_HD_CALL`：高清通话。`FEATURES_PULLED_EXTERNALLY`：通话被外部拉取。`FEATURES_VIDEO`：视频通话。`FEATURES_WIFI`：WIFI\
    \ 通话。 |\n\n`voicemail_uri` | 语音邮件条目的 URI（如果适用）。 |\n\n`normalized_number` | 电话号码的规范化（E164）缓存版本（如果存在）。\
    \ |\n\n`via_number` | 对于来电，表示接听该通话的辅助线路号码。当一张 SIM 卡关联了多个电话号码时，via number 指示呼叫的是\
    \ SIM 卡关联的哪个号码。 |\n\n`matched_number` | 与此条目匹配的联系人的缓存电话号码（如果存在）。 |\n\n`last_modified`\
    \ | 该行最后被插入、更新或标记为删除的日期。单位是自纪元以来的毫秒数。只读。 |\n\n`new` | 通话是否已被确认（0 = 否，1 = 是）。 |\n\
    \n`numberlabel` | 电话号码关联的自定义号码类型的缓存号码标签（如果存在）。 |\n\n`lookup_uri` | 用于查找与该电话号码关联的联系人的缓存\
    \ URI（如果存在）。 |\n\n`photo_uri` | 与该电话号码关联的图片的缓存 URI（如果存在）。 |\n\n`data_usage` |\
    \ 通话的数据使用量，以字节为单位。 |\n\n`phone_account_address` | 未记录。 |\n\n`formatted_number`\
    \ | 缓存的电话号码，根据用户拨打或接听通话时所处国家的规则格式化。 |\n\n`add_for_all_users` | 未记录。 |\n\n`numbertype`\
    \ | 与电话号码关联的缓存号码类型（如果适用）。取值为（`CallLog.Calls` 中的常量名称）：`INCOMING_TYPE` `OUTGOING_TYPE`\
    \ `MISSED_TYPE` `VOICEMAIL_TYPE` `REJECTED_TYPE` `BLOCKED_TYPE` `ANSWERED_EXTERNALLY_TYPE`\
    \ |\n\n`countryiso` | 用户接收或拨打电话所在国家的 ISO 3166-1 二位字母国家代码。 |\n\n`name` | 与电话号码关联的缓存名称（如果存在）。\
    \ |\n\n`post_dial_digits` | 拨号号码的后拨号部分。 |\n\n`transcription_state` | 未记录。 |\n\n\
    `_id` | 表条目的（技术性）ID。 |\n\n## `ContactsContract`\n\n这是一个描述电话联系人的复杂协议。联系信息存储在一个三层数据模型中：\n\
    \n* **`ContactsContract.Data`** – 任何类型的个人数据。\n* **`ContactsContract.RawContacts`**\
    \ – 描述一个人的数据集。\n* **`ContactsContract.Contacts`** – 对一个人的聚合视图，可能关联到 `RawContacts`\
    \ 表中的多行。由于其聚合特性，它只能部分写入。\n\n还有更多与协议相关的表，作为 `ContactsContract` 的内部类进行了描述。为了让你能快速上手，我们不会解释联系人内容提供器的所有可能用例，而是直接提供代码来列出前面提到的三个主要表的内容，展示创建一个新联系人在这些表中写入的内容，除此之外，请参考\
    \ `ContactsContract` 类的在线文档。要列出这三个表的内容，请使用：\n\n```\nfun showTable(tbl:Uri) {\n\
    \    Log.e(\"LOG\", \"##################################\")\n    Log.e(\"LOG\"\
    , tbl.toString())\n    val cursor = contentResolver.query(\n        tbl, null,\
    \ null, null, null)\n    cursor.moveToFirst()\n    while (!cursor.isAfterLast)\
    \ {\n        Log.e(\"LOG\", \"New entry:\")\n        for(name in cursor.columnNames)\
    \ {\n            val v = cursor.getString(\n                cursor.getColumnIndex(name))\n\
    \            Log.e(\"LOG\",\"  > \" + name + \" = \" + v)\n        }\n       \
    \ cursor.moveToNext()\n    }\n}\n...\nshowTable(ContactsContract.Contacts.CONTENT_URI)\n\
    showTable(ContactsContract.RawContacts.CONTENT_URI)\nshowTable(ContactsContract.Data.CONTENT_URI)\n\
    ```\n\n如果你使用 Android 预装的通讯录应用创建一个新联系人，在 `Contacts` 视图表中，你会找到以下新条目（仅显示重要列）：\n\n\
    ```\n_id = 1\ndisplay_name_alt = Mayer, Hugo\nsort_key_alt = Mayer, Hugo\nhas_phone_number\
    \ = 1\ncontact_last_updated_timestamp = 1518451432615\ndisplay_name = Hugo Mayer\n\
    sort_key = Hugo Mayer\ntimes_contacted = 0\nname_raw_contact_id = 1\n```\n\n在\
    \ `RawContacts` 表中，作为关联条目，你将找到如下内容（以及其他）：\n\n```\n_id = 1\naccount_type = com.google\n\
    contact_id = 1\ndisplay_name_alt = Mayer, Hugo\nsort_key_alt = Mayer, Hugo\naccount_name\
    \ = pmspaeth1111@gmail.com\ndisplay_name = Hugo Mayer\nsort_key = Hugo Mayer\n\
    times_contacted = 0\naccount_type_and_data_set = com.google\n```\n\n显然，你也会在之前列出的\
    \ `Contacts` 视图中找到这些条目中的许多。在 `Data` 表中关联了零到多个条目（仅显示最重要的部分）：\n\n```\nEntry:\n_id\
    \ = 3\nmimetype = vnd.android.cursor.item/phone_v2\nraw_contact_id = 1\ncontact_id\
    \ = 1\ndata1 = (012) 345-6789\nEntry:\n_id = 4\nmimetype = vnd.android.cursor.item/phone_v2\n\
    raw_contact_id = 1\ncontact_id = 1\ndata1 = (098) 765-4321\nEntry:\n_id = 5\n\
    mimetype = vnd.android.cursor.item/email_v2\nraw_contact_id = 1\ncontact_id =\
    \ 1\ndata1 = null\nEntry:\n_id = 6\nmimetype = vnd.android.cursor.item/name\n\
    raw_contact_id = 1\ncontact_id = 1\ndata3 = Mayer\ndata2 = Hugo\ndata1 = Hugo\
    \ Mayer\nEntry:\n_id = 7\nmimetype = vnd.android.cursor.item/nickname\nraw_contact_id\
    \ = 1\ncontact_id = 1\ndata1 = null\nEntry:\n_id = 8\nmimetype = vnd.android.cursor.item/note\n\
    raw_contact_id = 1\ncontact_id = 1\ndata1 = null\n```\n\n你可以看到 `Data` 表中的行对应于图形界面中的编辑字段——你会看到两个电话号码、名和姓、无昵称和无电子邮件地址。\n\
    \n## `DocumentsContract`\n\n这与我们这里看到的其他协议的意义不同——它对应于 `android.provider.DocumentsProvider`，后者是\
    \ `android.content.ContentProvider` 的子类。我们将在接下来的“文档提供器”部分处理文档提供器。\n\n## `FontsContract`\n\
    \n这是一个处理可下载字体的协议，与内容提供器无关。\n\n## `MediaStore`\n\n媒体存储处理内部和外部存储设备上所有媒体相关文件的元数据。这包括音频文件、图像和视频。除此之外，它还以不区分用途的方式处理文件——这意味着媒体文件以及以任何方式与媒体文件相关的非媒体文件。根类\
    \ `android.provider.MediaStore` 本身不包含内容提供器特定的资产，但以下内部类包含：\n\n* **`MediaStore.Audio`**\
    \ – 音频文件。包含更多用于音乐专辑、艺术家、音频文件本身、流派和播放列表的内部类。\n* **`MediaStore.Images`** – 图像。\n\
    * **`MediaStore.Videos`** – 视频。\n* **`MediaStore.Files`** – 通用文件。\n\n你可以通过浏览在线\
    \ API 文档来研究任何媒体存储表。对于你自己的实验，你可以从整体上研究这些表，方法是查找常量 `EXTERNAL_CONTENT_URI` 和 `INTERNAL_CONTENT_URI`，或者方法\
    \ `getContentUri()`，然后将它们传入我们之前使用的相同代码：\n\n```\nshowTable(MediaStore.Audio.Media.getContentUri(\n\
    \    \"internal\"))  //  \" + name + \" = \" + v)\n}\ncursor.moveToNext()\n}\n\
    }\n```\n\n## `Settings`\n\n这是一个处理各种全局和系统级设置的内容提供器。以下是来自协议类的主要 URI 常量：\n\n* **`Settings.Global.CONTENT_URI`**\
    \ – 全局设置。所有条目都是三元组：\n    * `_id`\n    * `android.provider.Settings.NameValueTable.NAME`\n\
    \    * `android.provider.Settings.NameValueTable.VALUE`\n\n* **`Settings.System.CONTENT_URI`**\
    \ – 全局系统级设置。所有条目都是三元组：\n    * `_id`\n    * `android.provider.Settings.NameValueTable.NAME`\n\
    \    * `android.provider.Settings.NameValueTable.VALUE`\n\n* **`Settings.Secure.CONTENT_URI`**\
    \ – 安全系统设置——应用不允许修改它们。所有条目都是三元组：\n    * `_id`\n    * `android.provider.Settings.NameValueTable.NAME`\n\
    \    * `android.provider.Settings.NameValueTable.VALUE`\n"
- fmt: "# Investigating Android Settings Tables\n\nTo investigate these tables, have\
    \ a look at the online API documentation of `android.provider.Settings`. It shows\
    \ and describes all possible settings entries. To list the complete settings,\
    \ you can use the same function as earlier for the `ContactsContract` contract\
    \ class:\n\n```\nshowTable(Settings.Global.CONTENT_URI)\nshowTable(Settings.System.CONTENT_URI)\n\
    showTable(Settings.Secure.CONTENT_URI)\n...\nfun showTable(tbl:Uri) {\nLog.e(\"\
    LOG\", \"##################################\")\nLog.e(\"LOG\", tbl.toString())\n\
    val cursor = contentResolver.query(\ntbl, null, null, null, null)\ncursor.moveToFirst()\n\
    while (!cursor.isAfterLast) {\nLog.e(\"LOG\", \"New entry:\")\nfor(name in cursor.columnNames)\
    \ {\nval v = cursor.getString(\ncursor.getColumnIndex(name))\nLog.e(\"LOG\",\"\
    \  > \" + name + \" = \" + v)\n}\ncursor.moveToNext()\n}\n}\n```\n\nYour app doesn’t\
    \ need a special permission to read the settings. However, writing is only possible\
    \ for the `Global` and `System` tables, and you also need a special construct\
    \ to acquire permission:\n\n```\nif(!Settings.System.canWrite(this)) {\nval intent\
    \ = Intent(\nSettings.ACTION_MANAGE_WRITE_SETTINGS)\nintent.data = Uri.parse(\n\
    \"package:\" + getPackageName())\nstartActivity(intent)\n}\n```\n\nUsually you\
    \ acquire permissions by calling\n\n```\nActivityCompat.requestPermissions(this,\n\
    arrayOf(Manifest.permission.WRITE\\_SETTINGS), 42)\n```\n\nFor settings permissions\
    \ this request however gets denied immediately by current Android versions. So\
    \ you cannot use that and need to call the `Intent` as shown earlier instead.\n\
    \nTo access a certain entry, you can again use constants and methods from the\
    \ contract class:\n\n```\nval uri = Settings.System.getUriFor(\nSettings.System.HAPTIC_FEEDBACK_ENABLED)\n\
    Log.e(\"LOG\", uri.toString())\nval feedbackEnabled = Settings.System.getInt(\n\
    contentResolver,\nSettings.System.HAPTIC_FEEDBACK_ENABLED)\nLog.e(\"LOG\", Integer.toString(feedbackEnabled))\n\
    Settings.System.putInt(contentResolver,\nSettings.System.HAPTIC_FEEDBACK_ENABLED,\
    \ 0)\n```\n\n## Caution\n\nWhile it is possible to acquire an individual URI for\
    \ a certain setting, you should not use the `ContentResolver.update()`, `ContentResolver.insert()`,\
    \ or `ContentResolver.delete()` method to alter values. Instead use the methods\
    \ provided by the contract class.\n\n# SyncStateContract\n\nThis contract is used\
    \ by the Browser app, the Contacts app, and the Calendar app to help synchronize\
    \ user data with external servers.\n\n# UserDictionary\n\nThis refers to a content\
    \ provider that allows for administering and using predictive input based on a\
    \ word dictionary. As of API level 23, the user dictionary can only be used from\
    \ IMEs, that is, Input Method Editors, or the Spelling Checker Framework. You\
    \ should for modern apps not try to use it from some other place. This contract\
    \ thus plays only an informational role.\n\n# VoicemailContract\n\nThis contract\
    \ allows for accessing information referring to voicemail providers. It primarily\
    \ consists of two tables described by inner classes:\n\n*   **VoicemailContract.Status**\
    \ – A voicemail source app uses this contract to tell the system about its state.\n\
    *   **VoicemailContract.Voicemails** – Contains the actual voicemails.\n\nYou\
    \ can list the contents of these tables – for example, for the `Voicemails` table,\
    \ write\n\n```\nval uri = VoicemailContract.Voicemails.CONTENT_URI.\nbuildUpon().\n\
    appendQueryParameter(\nVoicemailContract.PARAM_KEY_SOURCE_PACKAGE,\npackageName)\n\
    .build()\nshowTable(uri)\nfun showTable(tbl:Uri) {\nLog.e(\"LOG\", \"####################################\"\
    )\nLog.e(\"LOG\", tbl.toString())\nval cursor = contentResolver.query(\ntbl, null,\
    \ null, null, null)\ncursor.moveToFirst()\nwhile (!cursor.isAfterLast) {\nLog.e(\"\
    LOG\", \"New entry:\")\nfor(name in cursor.columnNames) {\nval v = cursor.getString(\n\
    cursor.getColumnIndex(name))\nLog.e(\"LOG\",\"  > \" + name + \" = \" + v)\n}\n\
    cursor.moveToNext()\n}\n}\n```\n\nAdding the `VoicemailContract.PARAM_KEY_SOURCE_PACKAGE`\
    \ URI parameter is important; otherwise, you’ll get a security exception.\n\n\
    # Batch-Accessing Content Data\n\nThe `android.content.ContentProvider` class\
    \ allows your implementation to use\n\n```\napplyBatch(\noperations: ArrayList):\n\
    Array\n```\n\nThe default implementation iterates through the list and performs\
    \ each operation in turn, but you can also override the method to use your own\
    \ logic. The `ContentProviderOperation` objects provided in the parameter describe\
    \ the operation to perform – it can be one of update, delete, and insert. For\
    \ your convenience, the class provides a builder, which you can use, for example,\
    \ as follows:\n\n```\nval oper:ContentProviderOperation =\nContentProviderOperation.newInsert(uri)\n\
    .withValue(\"key1\", \"val1\")\n.withValue(\"key2\", 42)\n.build()\n```\n\n# Securing\
    \ Content\n\nFrom the moment you declare a content provider inside `AndroidManifest.xml`\
    \ and export it by setting its `exported` attribute to `true`, other apps are\
    \ allowed to access the complete contents exposed by the provider. This might\
    \ not be what you want for sensitive information. As a remedy, in order to impose\
    \ restrictions on the content or part of the content, you add permission-related\
    \ attributes to the `<provider>` element or its sub-elements.\n\nYou basically\
    \ have the following options:\n\n## 1. Securing all content by one criterion\n\
    \nTo do so, use the `permission` attribute of `<provider>` as in\n\n```\n<provider\
    \ ... android:permission=\"PERMISSION-NAME\" ... />\n```\n\nwhere `PERMISSION-NAME`\
    \ is a system permission or a permission you defined in the `<permission>` element\
    \ of the app. If you do it that way, the complete content of the provider is accessible\
    \ only to such clients that successfully acquired exactly this permission. More\
    \ precisely, any read or write access requires clients to have this permission.\
    \ If you need to distinguish between *read* permission and *write* permission,\
    \ you can instead use the `readPermission` and `writePermission` attributes. If\
    \ you use a mixture, the more specific attributes win. This means:\n\n*   `permission`\
    \ = A → `writePermission` = A, `readPermission` = A\n*   `permission` = A, `readPermission`\
    \ = B → `writePermission` = A, `readPermission` = B\n*   `permission` = A, `writePermission`\
    \ = B → `writePermission` = B, `readPermission` = A\n*   `permission` = A, `writePermission`\
    \ = B, `readPermission` = C → `writePermission` = B, `readPermission` = C\n\n\
    ## 2. Securing specific URI paths\n\nBy using the `<path-permission>` sub-element\
    \ of `<provider>`, you can impose restrictions on specific URI paths:\n\n```\n\
    <provider ...>\n    <path-permission android:path=\"...\" android:permission=\"\
    ...\" />\n</provider>\n```\n\nIn the `*permission` attributes, you specify the\
    \ permission name and permission scope, just as described previously in item \"\
    Securing all content by one criterion.\" For the path specification, you use exactly\
    \ one of the three possible attributes: `path` is for an exact path match, `pathPrefix`\
    \ is for matching the start of a path, and `pathPattern` allows for wildcards:\
    \ `X*` is for zero to many occurrences of any character `X`, and `.*` is for zero\
    \ to many occurrences of any character. Since you can use several `<path-permission>`\
    \ elements, you can build a very fine-grained permission structure in your content\
    \ provider.\n\n## 3. Permission exemptions\n\nBy using the `grantUriPermission`\
    \ attribute of the `<provider>` element, you can temporarily grant permissions\
    \ to components called by the `Intent` from the app that owns the content provider.\
    \ If you set `grantUriPermission` to `true` and the `Intent` for calling the other\
    \ component gets constructed using the help of\n\n```\nintent.addFlags(\nIntent.FLAG_GRANT_READ_URI_PERMISSION)\n\
    /*or*/\nintent.addFlags(\nIntent.FLAG_GRANT_WRITE_URI_PERMISSION)\n/*or*/\nintent.addFlags(\n\
    Intent.FLAG_GRANT_WRITE_URI_PERMISSION and\nIntent.FLAG_GRANT_READ_URI_PERMISSION)\n\
    ```\n\nthe called component will have full access to all content of the provider.\
    \ You can instead set `grantUriPermission` to `false` and add sub-elements"
