    \ Studio 的性能分析器还允许查找内存泄漏或与糟糕的内存管理相关的问题。再次将有问题的代码部分放入循环并启动它。通过 `View` ➤ `Tool Windows`\
    \ ➤ `Profiler` 打开性能分析器。选择内存通道，性能分析器会立即向你显示如图 [16-4] 所示的内存使用情况图表。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig4_HTML.jpg)\n\
    \n*内存监视器使用情况示意图。*\n\n**图 16-4 内存监视器**\n\n运行一段时间后，你可以看到内存使用量在上升——这是因为在示例应用中，我添加了一个人为的内存泄漏。参见图\
    \ [16-5]。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig5_HTML.jpg)\n\
    \n*内存性能分析及较长时间段的内存泄漏示意图。*\n\n**图 16-5 内存性能分析，较长时间段**\n\n要开始分析，请选择 `Record Java/Kotlin\
    \ Allocations` 并启动录制会话。从这里你可以使用各种分析工具。参见图 [16-6]。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig6_HTML.jpg)\n\
    \n*内存性能分析详情示意图。*\n\n**图 16-6 内存性能分析，详情**\n\n如果你选择 `Arrange by Callstack` 模式，你可以看到哪个方法导致了泄漏。对于我的示例，它指向以下方法：\n\
    \n```\nfun go(l: MutableList) {\n    Thread {\n        while (true) {\n      \
    \      l.add(\"\" + System.currentTimeMillis())\n            Thread.sleep(1)\n\
    \        }\n    }.start()\n}\n```\n\n我在其中编程了一个人为的内存泄漏。参见图 [16-7]。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig7_HTML.jpg)\n\
    \n*内存性能分析及问题定位示意图。*\n\n**图 16-7 内存性能分析，问题定位**\n\n如果这还不足以解决内存问题，你可以额外获取一个堆转储。为此，请选择\
    \ `Capture heap dump` 录制模式。然后你可以使用与之前相同的技术，或者将堆导出为 HPROF 文件，并使用其他工具分析转储。\n\n>\
    \ **注意**\n> 这样的堆转储允许确定对象引用关系——这超出了 Android Studio 的内存分析范围。这使你能够最大程度地洞察内存结构，但需要花费一些时间来熟悉像\
    \ `Eclipse Memory Analyzer` 这样的堆转储分析工具，并找到正确的答案。\n\n# 17. 分发应用\n\n如果你完成了应用，你需要找到一种分发方式。为此主要的平台是\
    \ *Google Play Store*，但如果你能说服用户允许从“其他来源”安装应用，也可以使用其他分发渠道。我不会在此介绍分发渠道列表，也不会提供使用\
    \ Google Play Store 的详细说明。根据你目标市场的不同，选项实在太多。此外，本书并非旨在介绍一般的应用营销。\n\n如需进一步了解此问题，请访问：\n\
    [`https://developer.android.com/google/play/dist`](https://developer.android.com/google/play/dist)\n\
    或\n[`https://developer.android.com/distribute/marketing-tools/alternative-distribution`](https://developer.android.com/distribute/marketing-tools/alternative-distribution)\n\
    或\n[`https://support.google.com/googleplay/android-developer/`](https://support.google.com/googleplay/android-developer/)。\n\
    \n## Android App Bundle\n\nAPK 作为分发格式已经存在了一段时间，谷歌于 2021 年引入了一种新的打包格式 *Android\
    \ App Bundle* 或 AAB。它通过过滤掉用户不需要的本地化资源等文件，简化了向最终用户的分发。Android Studio 允许在 `Build`\
    \ ➤ `Generate Signed Bundle/APK…` ➤ `Android App Bundle` 处创建 AAB。\n\n## 你自己的应用商店\n"
- fmt: '一旦设备允许从 Google Play 商店以外的来源安装应用程序，就可以从任何服务器（包括您自己的企业服务器）提供 `APK` 或 `AAB` 文件。请注意，此选项因使用的
    Android 版本而异：


    - 在 Android 7（API 级别 25）及更低版本中，`"安全"` 部分有一个系统范围的设置，用于允许从 Google Play 以外的来源进行安装。

    - 从 Android 8（API 级别 26）开始，从其他来源安装应用的权限是按应用处理的，例如浏览器中的设置。


    无论您选择哪种分发渠道，都必须首先通过 `Build` ➤ `Generate Signed Bundle/APK…` 生成已签名的 `APK` 或 `AAB`。然后，将其复制到服务器，并确保文件被分配了
    `"application/vnd.android.package-archive"` MIME 类型（对于 `APK` 文件）或 `"application/x-authorware-bin"`
    和 `"application/octet-stream"` 之一（对于 `AAB` 文件，选择最适合您的一种）。


    **注意**


    尽管 Android Studio 会自动将应用的调试版本上传到虚拟设备或通过 USB 连接的设备，但对于虚拟设备，您也可以测试已签名的 `APK` 安装过程。如果您在本地开发机器上运行服务器，请在虚拟设备内部使用
    IP 地址 `10.0.2.2` 连接到开发机器。最好先卸载开发构建过程安装的版本。


    然后，您可以使用设备的浏览器下载并安装 `APK` 和 `AAB` 文件。


    ## Google Play 商店


    尽管这不是对 Google Play 商店使用的介绍，但为了给您提供关于分发技术方面的一些额外要点，我在此列出一些随机提示：


    - 如前所述，在应用可以分发到 Google Play 之前，您*必须*对其签名。

    - 在线文档建议在分发应用之前，从应用中移除所有日志记录语句。作为一种破坏性较小的替代方案，请遵循第 [16](#463716_2_En_16_Chapter.xhtml)
    章 `"日志记录"` 部分的说明，并创建一个自定义日志记录器。

    - 如果您的应用使用数据库，请为数据库架构更改时提供更新机制。请参阅 `SQLiteOpenHelper` 类。如果您忘记了这一点，更新应用并从版本到版本升级数据库可能会变得非常麻烦。

    - 可以为不同的设备分发不同的 `APK`。本书对这一功能有些忽略，因为在当今现代设备中，应用的大小不再起关键作用，您通常可以将所有内容放入一个 `APK`
    文件中。如果您仍想提供多个 `APK`，请查阅在线文档——在您喜欢的搜索引擎中搜索 `"Android multiple APK"` 或类似内容。

    - 如果您在真实设备上测试应用，如果设备上使用的 Google 帐户与分发应用时使用的帐户不同，事情会变得稍微容易一些。否则，Google 不会让您通过 Play
    商店安装应用。请尽早执行此操作，因为稍后更改设备的 Google 帐户可能会很复杂。

    - 本地化所有向用户显示的文本！在本书中，为简洁起见，未使用本地化，但您绝对应该为您的应用执行此操作。Android Studio 附带的 `LINT` 检查器有助于发现本地化缺陷，使用模拟器附带的自定义语言环境切换器也可以进行检查。

    - 尽管仅为智能手机形态（屏幕尺寸、分辨率）进行开发有些诱人，但您也应该为其他形态因素检查您的设计。各种模拟器可以帮助您做到这一点。您至少还应该为平板电脑测试您的应用。


    应用分发的中心点是 [*Google Play Console*](https://play.google.com/console/)。这也是您可以开始营销应用的地方。


    ## 18. 即时应用


    即时应用允许设备用户在不实际安装的情况下使用应用。在 Google Play 商店中，您有时会看到的 `"Try it"` 按钮启动的就是这样一个即时应用。有关即时应用的更多信息，请参阅
    [`https://developer.android.com/topic/google-play-instant/`](https://developer.android.com/topic/google-play-instant/)
    或 [`https://support.google.com/googleplay/android-developer/answer/9900182?hl=en`](https://support.google.com/googleplay/android-developer/answer/9900182%253Fhl%253Den)。


    ### 开发即时应用


    在过去的几年里，即时应用的开发和推出发生了巨大变化。


    开发、构建和推出即时应用的蓝图如下：


    - 检查执行条件。允许使用以下权限：`ACCESS_COARSE_LOCATION`、`ACCESS_FINE_LOCATION`、`ACCESS_NETWORK_STATE`、`BILLING`（自
    Play Billing Library 1.0 起已弃用）、`CAMERA`、`INSTANT_APP_FOREGROUND_SERVICE`（Android
    8.0 = API 级别 26 及更高版本）、`INTERNET`、`READ_PHONE_NUMBERS`（Android 8.0 = API 级别 26
    及更高版本）、`RECORD_AUDIO`、`VIBRATE` 和 `WAKE_LOCK`。

    - 声明启用即时的应用模块。Android Studio 在此处提供各种帮助工具。

    - 生成上传密钥和密钥库（作为 Android Studio 的工具部分）。

    - 使用您的上传密钥对应用进行签名（作为 Android Studio 的工具部分）。

    - 配置 Play 应用签名（Google Play 控制台）。

    - 将您的应用作为 `AAB` 上传到 Google Play。


    为了避免描述在您阅读本书时已经过时的事情，我决定不在本书中进一步介绍此主题。相反，请访问 [`https://developer.android.com/topic/google-play-instant/getting-started/instant-enabled-app-bundle`](https://developer.android.com/topic/google-play-instant/getting-started/instant-enabled-app-bundle)，这为您开发即时应用提供了一个极好的起点。


    ## 19. CLI


    在本章中，我们简要总结了一些命令行工具，您可以在 *Android Studio* 之外使用它们进行构建、管理以及一些维护任务。


    **注意**


    - 这些工具在某种程度上是"半"官方的——您可能在 SDK 文件夹中的略有不同的位置找到它们，并且在线文档不一定是最新的。

    - 此处显示的工具是 Linux 发行版的一部分。对于其他操作系统，提供了对应的工具，其用法类似。

    - 此列表并非详尽无遗——如果您安装的 SDK 包较少或较多，它可能与您的安装不同。


    ### SDK 工具


    以下是在 `SDK_INST/tools/bin` 文件夹中提供的平台无关工具，其中 SDK 安装目录通常位于 `Android` 内，而 `Android`
    又位于您的主文件夹内。


    `tools` 文件夹包含虚拟设备和 SDK 本身的管理，以及各种测试和工件管理工具。表 [19-1](#463716_2_En_19_Chapter.xhtml#Tab1)
    提供了这些工具的列表和描述。


    **表 19-1** SDK 工具


    | 命令 | 描述 |

    | :--- | :--- |

    | `apkanalyzer` | 使用此工具分析 `APK` 文件，例如，您可以在 `PROJECT-DIR/PROJECT/release` 文件夹中找到这些文件（`PROJECT`
    通常为 `"app"`）。在不带参数的情况下调用命令 `./apkanalyzer` 会显示使用信息。 |

    | `archquery` | 一个用于查询操作系统架构的简单工具：`./archquery` 输出例如 `"x86_64"`。 |'
  raw: "Once the device \nallows for installing apps from sources other than the Google\
    \ Play\nStore, APK or AAB files can be presented from any server including your\n\
    own corporate servers. Note that there is a difference for this option\ndepending\
    \ on the Android version  used:\n\n*   Up to Android 7 or API level 25, there\
    \ is a system-wide setting\n    inside the “security” section for allowing the\
    \ installation from other\n    sources than Google Play.\n\n*   Starting with\
    \ Android 8 or API level 26, the permission to\n    install apps from other sources\
    \ is handled on a per-app basis, for\n    example, a setting in the browser.\n\
    \nNo matter which distribution channel you choose, you must first\ngenerate a\
    \ signed APK or AAB via Build ➤ Generate Signed Bundle/APK…\nThen, copy it to\
    \ the server and make sure the file gets assigned the\nMIME type “application/vnd.android.package-archive”\
    \ for APK files or one\nof “application/x-authorware-bin” and “aplication/octet-stream”\
    \ for AAB\nfiles (choose which works best for you).\n\nNote\n\nAlthough Android\
    \ Studio automatically uploads debug versions of your\napp to virtual devices\
    \ or devices connected per USB, for virtual devices  you can\nalso test the signed\
    \ APK installation procedure. If you have a server\nrunning on your local development\
    \ machine, inside the virtual device,\nuse the IP 10.0.2.2 to connect to the development\
    \ machine. Better first\nuninstall versions installed by the development build\
    \ process.\n\nYou can then use the device’s browser to download and install APK\
    \ and\nAAB files.\n\nThe Google Play Store\n\nDespite this not being an introduction\
    \ into the usage of the Google Play Store , to\ngive you a couple of additional\
    \ points for the technical aspects of\ndistribution, I list a few random hints\
    \ here:\n\n*   As stated before, you *must* sign you app before it can be\n  \
    \  distributed to Google Play.\n\n*   The online documentation suggests removing\
    \ all logging statements\n    from inside your app prior to distributing it. As\
    \ a less destructive\n    alternative, follow the instructions from section “Logging”\
    \ of Chapter\n    [16](#463716_2_En_16_Chapter.xhtml) and create a custom\n  \
    \  logger.\n\n*   If your app uses a database, provide for update mechanisms for\n\
    \    when the database scheme changes. See class `SQLiteOpenHelper`. If\n    you\
    \ forget that, updating apps and upgrading the database from version\n    to version\
    \ can become really cumbersome.\n\n*   It is possible to distribute different\
    \ APKs for different\n    devices. This feature was somewhat neglected inside\
    \ this book, because\n    nowadays with modern devices, the size an app has no\
    \ longer plays a\n    vital role and you usually can put all into a single APK\
    \ file. If you\n    still want to provide multiple APKs, please consult the online\n\
    \    documentation – search for “Android multiple APK” or similar inside your\n\
    \    favorite search engine.\n\n*   If you test your app on a real device, things\
    \ become a little\n    easier if on your device you use a different Google account\
    \ compared\n    with the account you use for distributing the app. Google otherwise\n\
    \    won’t let you install your app using the Play Store. Do this early,\n   \
    \ because later changing the Google account of a device might be\n    complicated.\n\
    \n*   Localize all texts shown to the user! In this book for brevity,\n    localization\
    \ has not been used, but you definitely should do that for\n    your app. The\
    \ LINT checker  included with\n    Android Studio helps in finding localization\
    \ deficiencies, and using the\n    custom locale switcher included with the emulators\
    \ lets you do a check\n    as well.\n\n*   Although developing just for a smartphone\
    \ form factor (screen\n    size, resolution) is somewhat tempting, you should\
    \ check your design\n    also for other form factors. The various emulators help\
    \ you with that.\n    You should at least also test your app for a tablet.\n\n\
    The central point for app distribution is the *Google Play\nConsole* at [`https://play.google.com/console/`](https://play.google.com/console/)\
    \ . This is also the place where you would start\nmarketing your app.\n\n18. Instant\
    \ Apps\n\nInstant apps \nallow a device user to use apps without actually installing\
    \ them. In the\nGoogle Play Store, the “Try it” button you sometimes see exactly\
    \ starts\nsuch an instant app.\nFor more information about instant apps, see [\
    \ `https://developer.android.com/topic/google-play-instant/`\n](https://developer.android.com/topic/google-play-instant/)\
    \ or [`https://support.google.com/googleplay/android-developer/answer/9900182?hl=en`](https://support.google.com/googleplay/android-developer/answer/9900182%253Fhl%253Den)\
    \ .\n\nDeveloping Instant Apps\nThe development and rollout of instant apps heavily\
    \ changed during\nthe last couple of years.\n\nA blueprint for developing, building,\
    \ and rolling out an instant app  is as follows:\n\n*   Check execution conditions.\
    \ Allowed are the following\n    permissions: ACCESS_COARSE_LOCATION, ACCESS_FINE_LOCATION,\n\
    \    ACCESS_NETWORK_STATE, BILLING (deprecated as of Play Billing Library\n  \
    \  1.0), CAMERA, INSTANT_APP_FOREGROUND_SERVICE (Android 8.0 = API level 26\n\
    \    and higher), INTERNET, READ_PHONE_NUMBERS (Android 8.0 = API level 26\n \
    \   and higher), RECORD_AUDIO, VIBRATE, and WAKE_LOCK.\n\n*   Declare instant-enabled\
    \ app modules. Android Studio provides\n    various help facilities here.\n\n\
    *   Generate an upload key and keystore (as a tool part of Android\n    Studio).\n\
    \n*   Sign your app with your upload key (as a tool part of Android\n    Studio).\n\
    \n*   Configure Play App Signing (Google Play Console).\n\n*   Upload your app\
    \ as an AAB to Google Play.\n\nTo avoid describing something that is already outdated\
    \ when you are\nreading this book\n, I decided to not further cover this subject\
    \ in this book.\nInstead, please visit\n [`https://developer.android.com/topic/google-play-instant/getting-started/instant-enabled-app-bundle`](https://developer.android.com/topic/google-play-instant/getting-started/instant-enabled-app-bundle)\
    \ \nwhich gives you an excellent starting point for developing instant\napps.\n\
    \n19. CLI\n\nIn this chapter we briefly summarize the command line tools  that\n\
    you can use for building, administration, and some maintenance tasks\nrunning\
    \ outside *Android Studio*.\n\nNote\n\n*   These tools in part are kind of “semi”-official\
    \ – you might find\n    them at slightly different locations inside the SDK folder,\
    \ and the\n    online documentation is not necessarily up to date.\n\n*   The\
    \ tools shown here are part of the Linux distribution. For\n    other OSs, counterparts\
    \ are provided, and their usage will be\n    similar.\n\n*   The list is not exhaustive\
    \ – it might differ from your\n    installation if you have fewer or more SDK\
    \ packages installed.\n\nThe SDK Tools\n\nThe following are the platform-independent\
    \ tools\n provided inside folder\n\n```\nSDK_INST/tools/bin\n```\n\nwhere the\
    \ SDK installation directory usually resides inside `Android`, which in\nturn\
    \ sits inside your Home folder.\n\nThe tools  folder\nincludes the management\
    \ of virtual devices and the SDK itself and\nvarious testing and artifact management\
    \ tools. Table [19-1](#463716_2_En_19_Chapter.xhtml#Tab1) provides a\nlist and\
    \ describes these tools.\n\nTable 19-1\nSDK Tools\n\nCommand |\n Description |\n\
    \n| --- | --- | --- | --- | --- |\n\napkanalyzer |\n Use this to analyze APK files\
    \ you can find, for example, in the `PROJECT-DIR/PROJECT/release`\nfolder (PROJECT\
    \ quite often reads “app”). Invoking the command without\nargument\n`./apkanalyzer`\n\
    shows usage information. |\n\narchquery |\n A simple tool to query your OS’s architecture:\n\
    `./archquery`\noutputs, for example, “x86_64” |"
