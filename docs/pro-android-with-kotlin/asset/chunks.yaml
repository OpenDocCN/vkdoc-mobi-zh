  trans: "\n# 保护 Android 应用中的敏感数据\n\n在应用开发过程中，保护敏感数据是一项重要任务。随着手持设备上用于银行、通讯等敏感日常任务的应用程序日益增多，安全性在过去一段时间里变得越来越重要，并且未来也将持续如此。作为开发者，你必须顺应这一演变趋势，采取一切可能的预防措施，负责任地处理应用用户的数据。\n\
    \n全面处理每一个可能的安全方面是一项具有挑战性的任务，单凭这一点就足以写满一整本书。幸运的是，有大量在线资源可供你查阅，以获取 Android 操作系统安全相关的最新信息。只需注意筛选掉不恰当的信息即可。一个不错的起点是\
    \ Android 操作系统在线资源中与安全相关的主题——截至 2022 年年中，相关的两个页面 URL 是 [`https://developer.android.com/design-for-safety#security`](https://developer.android.com/design-for-safety%2523security)\
    \ 和 [`https://developer.android.com/guide/topics/permissions/overview`](https://developer.android.com/guide/topics/permissions/overview)。如果你在阅读本书时这些链接失效了，可以在你常用的搜索引擎中输入“Android\
    \ best practices security”和“Android best practices permissions”，你就能轻松找到这些资源。\n\
    \n话虽如此，我们仍然需要深入探讨 Android 操作系统内部的*权限*系统，因为一旦你的应用涉及敏感数据，作为开发者，这绝对是你必须熟练掌握的部分。权限通过使用预定义的权限或自行定义权限，为使用系统数据和功能增加了安全性。在\
    \ `AndroidManifest.xml` 中，你可以添加自定义权限，并声明你的应用想要使用的权限。根据权限类型的不同，你必须在代码中添加对话框，告知用户需要哪些权限，并请求用户确认以访问受保护的资源或功能。\n\
    \n## 权限类型\n\n根据所需的保护级别，权限有几种不同的类型：\n\n*   **正常**：此级别对应低级别的安全敏感信息。系统会自动授予已安装应用此类权限，而无需明确询问用户，但该权限会在应用安装前列在包描述中。并且可以通过使用系统设置应用按需显式查询。\n\
    \n*   **危险**：此级别对应高级别的安全敏感信息。在运行时，系统会询问用户是否允许使用该权限。一旦某个应用被允许，该授权将被保存，用户可能不会再被询问，直到应用被重新安装，或者通过使用系统设置应用显式撤销该权限。\n\
    \n*   **签名**：此级别对应极高安全级别的敏感信息。只有使用与定义该权限的应用相同的证书签名的应用才能获取该权限。系统会检查签名是否匹配，然后自动授予权限。此级别仅对由同一开发者开发的一组应用有意义。\n\
    \n*   **特殊**：仅在少数用例中，系统通过非标准获取方法授予对某些系统资源的访问权限。这类特殊权限由平台定义。\n\n*   **特权**或**系统**：仅用于系统映像应用。你通常不应该也不需要使用它们。\n\
    \n权限被归入权限组。其背后的理念是，一旦用户接受了来自 G1 组权限 A 的请求，就无需再对同一 G1 组的另一个权限 B 进行权限查询。从用户体验的角度来看，只有当我们谈论*危险*类型权限时，权限组才会产生影响——*正常*权限的权限组没有影响。\n\
    \n> **注意**\n>\n> 权限到权限组的映射可能会随着 Android 的未来版本而改变——因此你的应用不应依赖这种映射。从开发的角度来看，你应该忽略权限组，除非你定义了自己的权限和权限组。\n\
    \n## 定义权限\n\nAndroid 操作系统包含许多由各种内置应用或操作系统本身定义的权限。此外，作为开发者，你可以定义自己的权限来保护应用或应用的部分功能。你在\
    \ `AndroidManifest.xml` 中定义此类权限：\n\n```\n<permission android:name=\"string\"\n\
    \            android:protectionLevel=[\"normal\" | \"dangerous\" | \"signature\"\
    \ | ...]\n            android:label=\"string\"\n            android:icon=\"drawable\
    \ resource\"\n            android:description=\"string\" />\n```\n\n这些属性的含义在在线文本伴侣的“清单顶级条目”部分有描述。至少，你必须提供\
    \ `name` 和 `protectionLevel` 属性，但添加 `label` 和/或 `icon` 以及描述来帮助用户理解该权限的作用，当然也是个好主意。\n\
    \n如果你需要将权限分组，可以使用以下两种方法之一：\n\n1.  使用 `<permission-group>` 元素，并向 `<permission>`\
    \ 添加 `permissionGroup` 属性——参见在线文本伴侣中的“清单顶级条目”部分。\n\n2.  使用 `<permission-tree>`\
    \ 元素并相应地为你的权限命名——再次参见在线文本伴侣中的“清单顶级条目”部分。\n\n如果你随后获取了某个组的权限，则同一组中的同级权限将被隐式地包含在授权中。\n\
    \n> **警告**\n>\n> 为了遵守安全准则并使你的应用设计清晰稳定，请将自己定义的权限数量保持在绝对最低限度。\n\n## 使用权限\n\n要使用权限，请在\
    \ `AndroidManifest.xml` 文件中添加一个或多个 `<uses-permission>` 元素：\n\n```\n<uses-permission\
    \ android:name=\"string\"\n                 android:maxSdkVersion=\"integer\"\
    \ />\n```\n\n`name` 属性指定权限名称，`maxSdkVersion` 指定此权限要求将生效的最高 API 级别。引入这个特殊的 `<uses-permission-sdk-23>`\
    \ 元素的原因是 Android 6.0 中权限语义的重大变更。\n\n问题是：我们如何知道自己的应用具体需要哪些权限？答案有三部分：\n\n*   Android\
    \ Studio 会告诉你应用需要某个权限。例如，如果你编写：\n\n```kotlin\nval uri = CallLog.Calls.CONTENT_URI\n\
    val cursor = contentResolver.query(\nuri, null, null, null, null)\n```\n\nAndroid\
    \ Studio 会告诉你需要某个特定的权限——见图 7-1。\n\n*   在开发和测试期间，你的应用崩溃了，在日志中你会看到类似这样的条目：\n\n```\n\
    Caused by: java.lang.SecurityException: Permission\nDenial: opening provider\n\
    com.android.providers.contacts.CallLogProvider\nfrom\nProcessRecord{faeda9c 4127:de.pspaeth.cp1/u0a96}\n\
    (pid=4127, uid=10096) requires\nandroid.permission.READ_CALL_LOG or\nandroid.permission.WRITE_CALL_LOG\n\
    ```\n\n*   系统权限列表会告诉你，对于某个特定任务需要某个特定的权限。参见表 7-1（未详尽列出）。\n\n为了强制某个 Activity 或整个应用受到自定义权限的保护，你可以在\
    \ `permission` 属性中声明该权限，如下所示：\n\n```xml\n<activity android:name=\".MyActivity\"\
    \n          android:permission=\"com.example.myapp.PERMISSION_NAME\"\n       \
    \   ...>\n</activity>\n```\n\n或者在 `<application>` 元素内部进行类似声明。\n\n### 图 7-1\nAndroid\
    \ Studio 的界面，其中包含几行代码。它表示了权限要求。\n\n*图 7-1：Android Studio 提示权限要求*（图片未显示）\n\n###\
    \ 表 7-1：系统权限\n\n| 权限 | 组 | 描述 |\n| --- | --- | --- |\n| ... | ... | ... |\n"
