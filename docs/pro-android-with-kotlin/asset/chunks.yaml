  trans: '

    # 2. 应用


    一个 Android 应用由 *活动*、*服务*、*广播接收器*和*内容提供者*等组件构成。参见图 2-1。活动用于与设备用户交互，服务用于在无专用用户界面的情况下运行的程序部分，广播接收器监听来自其他应用和组件的标准化消息，而内容提供者则允许其他应用和组件访问某个组件所提供的一定数量和类型的数据。


    ![](img/463716_2_En_2_Fig1_HTML.png)


    Android 操作系统将应用通过 API 接入 Android 运行时的流程图。


    图 2-1

    Android 操作系统中的应用


    组件由 *Android 运行时*（或者你喜欢的话，也可以称之为执行引擎）启动，它既可以自行启动组件，也可以代表其他组件生成启动触发器。组件在何种情况下被启动取决于其类型及其所赋予的元信息。在其生命周期的另一端，所有正在运行的组件都可能从进程执行列表中被移除，原因可能是它们已完成工作，或者
    Android 操作系统判定该组件不再需要而被移除，抑或是因为设备资源短缺而必须被移除。


    为了使你的应用或组件尽可能稳定地运行，并让用户对其可靠性产生良好的感受，深入了解 Android 组件的生命周期会很有帮助。我们将在本章中探讨组件的系统特性及其生命周期。


    构建一个应用或 Android 组件并不难——只需参考 Android 官方网站上的任何教程、Android Studio 提供的模板和示例，或者你在网络上其他地方能找到的成千上万个教程之一即可。然而，一个简单的应用并不一定就是专业级别的稳定应用，因为就应用而言，Android
    的状态处理与桌面应用程序的状态处理是不同的。原因在于，你的 Android 设备很可能会为了节省系统资源而决定终止你的应用，特别是当你因一段时间内使用一个或多个其他应用而暂时挂起该应用时。


    当然，Android 基本不会终止你正在使用的应用，但你必须采取预防措施。任何被 Android 终止的应用都应该能够以定义好的数据和加工状态重新启动，包括用户当前输入的大部分数据，并尽可能少地干扰用户当前的工作流程。


    从文件角度来看，一个 Android 应用是单个后缀为 `.apk` 的压缩归档文件。它包含你的完整应用，包括在 Android 设备上运行该应用所需的所有元信息。其中最重要的控制工件是
    `AndroidManifest.xml` 文件，它描述了应用以及应用所包含的组件。


    我们在此不详细讨论这个归档文件的结构，因为在大多数情况下，Android Studio 会负责为你正确创建归档文件，所以你通常不需要了解其内部运作方式。但你可以轻松查看其内部结构。只需随便找一个
    `*.apk` 文件，例如，一个你已经用 Android Studio 构建好的示例应用，它位于


    ```

    AndroidStudioProject/[YOUR-APP]/release/app-release.apk

    ```


    然后解压它——APK 文件就是普通的 zip 文件。你可能需要临时将后缀名改为 `.zip`，以便你的解压程序能够识别它。这样一个解压后的 APK 文件，例如，看起来会如图
    2-2 所示。


    ![](img/463716_2_En_2_Fig2_HTML.jpg)


    一个解压后的 APK 文件片段，其中 META-INF、AndroidManifest.xml 和 resources.arsc 被高亮显示。


    图 2-2

    解压后的 APK 文件


    你在那里看到的 `.dex` 文件包含了以 *Dalvik Executable* 格式编译的类，这类似于 Java 中的 JAR 文件。


    我们稍后会讨论与应用相关的工件，但首先我们将从更概念化的角度来探讨什么是*任务*。


    ## 任务


    一个*任务*是一组相互交互的活动，最终用户将它们视为一个应用的各个元素。用户启动一个应用，会看到主活动，在那里进行一些操作，打开和关闭子活动，可能切换到另一个应用，再回来，最终关闭应用。


    更深入地看，一个*任务*所展现的主要结构是其*返回栈*或简称为*栈*，应用的活动在此栈中堆叠。对于简单的应用，关于这个栈的标准行为是：当你启动一个应用时，第一个活动成为这个栈的*根*，然后从应用内部启动的下一个活动位于其顶部，另一个子活动位于两者之上，以此类推。当你通过导航返回（这就是*返回栈*这个名字的由来）关闭一个活动时，该活动会从栈中移除。当根活动被移除时，整个栈被关闭，你的应用也就被认为关闭了。


    在 `AndroidManifest.xml` 的 `<application>` 元素内部，我们看到一些设置可以改变任务栈的标准行为，我们将在第 3 章（关于活动的章节）中看到更多内容。这样，一个定制化的任务栈可以成为帮助你的最终用户理解并流畅使用你的应用的有力工具。但请记住，复杂的栈行为可能让刚开始使用你应用的用户难以理解，因此，你的目标应该是在强大性与易用性之间找到良好的平衡。


    注意


    关于任务和返回栈运作方式的更多深入见解，可参见 [`https://developer.android.com/guide/components/activities/tasks-and-back-stack.xhtml`](https://developer.android.com/guide/components/activities/tasks-and-back-stack.xhtml)。

    '
- fmt: '# The Application Manifest


    A very important central app configuration file you can see in any Android app
    is the file `AndroidManifest.xml`. It describes the app and declares all the components
    that are part of the app. The outline of such a manifest file, for example, might
    look like


    ```

    ...

    ```


    The most important attribute of the root entry `<manifest>` is called `package`.
    It declares the ID of your app, and if you plan to publish your app, this must
    be a worldwide unique ID for it. A good idea is to use your or your company’s
    domain reversed and then a unique application identifier as shown here.


    All possible attributes of `<manifest>` are described in Table [2-1](#463716_2_En_2_Chapter.xhtml#Tab1).
    Note that for the most simple apps, all you need is the `package` attribute and
    a single `<application>` child.


    **Table 2-1** Manifest Main Attributes


    | Name | Description |

    | --- | --- |

    | `android:installLocation` | Defines the installation location: use `"internalOnly"`
    for installing ever only in the internal storage, `"auto"` for letting the OS
    decide with affinity toward using the internal storage (the user can switch later
    in the system settings), or `"preferExternal"` for letting the OS decide with
    affinity toward using the external storage. Default is `"internalOnly"`. Note
    that a couple of restrictions apply to using external storage for that aim, see
    the online document `<manifest>`, and for modern devices usually having lots of
    free internal storage, you should never need to specify `"preferExternal"` here.
    |

    | `package` | The worldwide unique ID of your app. A string like `"abc.def.ghi.[...]"`
    where the non-dot characters may contain letters A–Z and a–z, numbers 0–9, and
    underscores. Don’t use a number after a dot! This is also the default process
    name and the default task affinity. See the text companion for what those mean.
    Note that once your app is published, you cannot change this package name in the
    Google Play Store. There is no default; you must set this attribute. |

    | `android:sharedUserId` | Deprecated since API level 29. The name of the Android
    OS’s user ID assigned to the app. |

    | `android:sharedUserLabel` | Deprecated since API level 29. Only if you also
    set `"sharedUserId"`, you can set a user-readable label for the shared user ID
    here. |

    | `android:targetSandboxVersion` | One of `"1"` and `"2"`. Serves as a security
    level. Starting with Android 8.0 or API level 26, you *must* set it to `"2"` for
    instant apps. With `"2"` in contrast to `"1"`, the user ID can no longer be shared
    between different apps, and the default value for `usesClearTextTraffic` (see
    the text companion) is set to false. |

    | `android:versionCode` | An internal version number of your app. This is not
    shown to users and only used for comparison of versions. Use an integer number
    greater than one here. Defaults to `undefined`. |

    | `android:versionName` | A user-visible version string. Either the string itself
    or a pointer to a string resource (`"@string/..."`). This is not used for anything
    else but informing the user. |


    All elements possible as children to the `<manifest>` element are listed in section
    “Manifest Top-Level Entries” of the online text companion. The most important
    one, `<application>`, describes the application and gets treated in detail in
    section “The Application Declaration” of the online text companion.


    # Activities


    *Activities* represent user interface entry points of your app. Any app you need
    to interact functionally with the user in a direct way, by letting the user enter
    things or telling the user graphically about the functional state of an app, will
    expose at least one *activity* to the system. We say *functionally* because telling
    the user in a notifying way about events can also happen by notifications via
    *Toasts* or the *status bar*, for which an activity is not needed.


    Apps can have zero, one, or more activities, and they get started in one of two
    ways:


    1.  The *main activity*, as declared inside `AndroidManifest.xml`, gets started
    by launching the app. This is kind of similar to the `main()` function of traditional
    applications.


    2.  All activities can be configured to be started by an explicit or implicit
    *Intent*, as configured inside `AndroidManifest.xml`. Intents are both objects
    of a class and an outstanding concept in Android. For explicit Intents, by triggering
    an Intent, a component tells that it needs something to be done by a dedicated
    component of a dedicated app. For implicit Intents, the component just tells what
    needs to be done without specifying which component is supposed to do it – the
    Android OS or the user decides which app or component is capable of fulfilling
    such an implicit request.


    From a user perspective, activities show up as screens that can be started from
    inside an application launcher, be it the standard launcher or a specialized third-party
    launcher app. And, as soon as they are running, they get listed in a task stack
    as well, and users will see them when using the back button.


    **Note** Activities are such an important concept that it is advisable to see
    also the online documentation at [`https://developer.android.com/guide/components/activities/intro-activities`](https://developer.android.com/guide/components/activities/intro-activities)
    and [`https://developer.android.com/reference/android/app/Activity`](https://developer.android.com/reference/android/app/Activity).
