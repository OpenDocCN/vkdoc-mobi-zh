    \    setAudioEncoder(MediaRecorder.AudioEncoder.AMR_NB)\n}\nmRecorder.prepare()\n\
    mRecorder.start()\n... later:\nmRecorder.stop()\n```\n\n关于输入、媒体格式和输出的其他选项，请参阅`MediaRecorder`类的\
    \ API 文档。\n\n## 使用摄像头\n\n向用户展示内容的应用程序一直是计算机的主要用途领域。最初是文本，后来是图片，再后来是电影。仅在最近几十年，相反的方向，即让用户展示内容，才越来越受到关注。随着手持设备配备质量越来越高的摄像头，能够处理摄像头数据应用的需求也随之出现。Android\
    \ 在这方面提供了很大帮助。一个应用可以告诉 Android 操作系统拍照或录制电影并保存到某个位置，也可以完全控制相机硬件，并持续监控相机数据，按需更改变焦、曝光和对焦。\n\
    \n我们将在以下部分讨论所有这些内容。如果你需要我们在这里未描述的功能或设置，API 文档可作为对此问题进行扩展研究的起点。\n```"
- fmt: '# Taking a Picture


    A high-level approach to communicate with the camera hardware is the IT counterpart
    of the order “Take a picture and save it somewhere I tell you.” To accomplish
    that, assuming the handheld actually has a camera and you have the permission
    to use it, you call a certain `Intent` telling the path name where to save the
    image. Upon intent result retrieval, you have access to the image data, both directly
    to a low-resolution thumbnail and to the full image data at the place requested.


    We start with telling Android that our app needs a camera. This happens via an
    `<uses-feature>` element inside file `AndroidManifest.xml`:


    ```

    ```


    Inside your app you will then do a runtime check


    ```

    if (!packageManager.hasSystemFeature(

    PackageManager.FEATURE_CAMERA)) {

    ...

    }

    ```


    and act accordingly.


    To declare the permission necessary, you write inside the manifest file `AndroidManifest.xml`
    in the `<manifest>` element


    ```

    ```


    To check that permission and in case acquire it, see Chapter 7. In case you want
    to save the picture to a publicly available store, so other apps can see it, you
    additionally need the permission `"android.permission.WRITE_EXTERNAL_STORAGE"`,
    declared and acquired the same way. To instead save the picture data to a space
    private to the app, you declare a slightly different permission need


    ```

    because that declaration is necessary only up to Android 4.4 or API level 18.

    ```


    We need to do some extra work to access the image data storage. Apart from the
    permission we just described, we also need access to the storage on a content
    provider security level. This means, inside the `<application>` element of `AndroidManifest.xml`,
    you add


    ```

    ```


    and inside a file `res/xml/file_paths.xml` write


    ```

    ```


    The value inside the `path` attribute depends on whether we save the pictures
    in the publicly available storage or in the app’s private data space:


    - Use `"Android/data/com.example.package.name/files/Pictures"` if you want to
    save the image to the app’s private data space.

    - Use `"Pictures"` if you want to save the image to the public data space.


    > **Note:** If you use the app’s private data space, all pictures will be deleted
    if the app gets uninstalled.


    In order to start the system’s camera, first create an empty file where the picture
    taken is written. Then create and fire an `Intent` as follows:


    ```

    val REQUEST_TAKE_PHOTO = 42

    var photoFile:File? = null

    fun dispatchTakePictureIntent() {

    fun createImageFile():File {

    val timeStamp =

    SimpleDateFormat("yyyyMMdd_HHmmss_SSS",

    Locale.US).format(Date())

    val imageFileName = "JPEG_" + timeStamp + "_"

    val storageDir =

    Environment.getExternalStoragePublicDirectory(

    Environment.DIRECTORY_PICTURES)

    // To instead take the App''s private space:

    // val storageDir =

    // getExternalFilesDir(

    // Environment.DIRECTORY_PICTURES)

    val image = File.createTempFile(

    imageFileName,

    ".jpg",

    storageDir)

    return image

    }

    val takePictureIntent =

    Intent(MediaStore.ACTION_IMAGE_CAPTURE)

    val canHandleIntent = takePictureIntent.

    resolveActivity(packageManager) != null

    if (canHandleIntent) {

    photoFile = createImageFile()

    Log.e("LOG","Photo output File: ${photoFile}")

    val photoURI = FileProvider.getUriForFile(this,

    "com.example.autho.fileprovider",

    photoFile!!)

    Log.e("LOG","Photo output URI: ${photoURI}")

    takePictureIntent.putExtra(

    MediaStore.EXTRA_OUTPUT, photoURI)

    startActivityForResult(takePictureIntent,

    REQUEST_TAKE_PHOTO)

    }

    }

    dispatchTakePictureIntent()

    ```


    Note that the second parameter in `FileProvider.getUriForFile()` designates the
    authority and as such must also show up in file `AndroidManifest.xml` inside the
    `<provider>` element, as shown previously.


    After the photo has been taken, the app’s `onActivityResult()` can be used to
    fetch the image data:


    ```

    override

    fun onActivityResult(requestCode: Int, resultCode: Int,

    data: Intent) {

    if ((requestCode and 0xFFFF) == REQUEST_TAKE_PHOTO

    && resultCode == Activity.RESULT_OK) {

    val bmOptions = BitmapFactory.Options()

    BitmapFactory.decodeFile(

    photoFile?.getAbsolutePath(), bmOptions)?.run {

    imgView.setImageBitmap(this)

    }

    }

    }

    ```


    where `imgView` points to an `ImageView` element inside the UI layout.


    > **Caution:** Other than suggested by the API documentation, the returned `Intent`
    does not reliably contain a thumbnail image in its `data` field – some devices
    do that and some do not.


    Since we use the `photoFile` field to transport the image file’s name, we must
    take care of it surviving activity restarts. To make sure it gets persisted, write


    ```

    override

    fun onSaveInstanceState(outState: Bundle?) {

    super.onSaveInstanceState(outState)

    photoFile?.run{

    outState?.putString("imgFile", absolutePath)

    }

    }

    ```


    and inside `onCreate(...)` add


    ```

    savedInstanceState?.run {

    photoFile = getString("imgFile")?.let {File(it)}

    }

    ```


    Only in case you used the publicly available space to store the picture, you can
    advertise the image to the system’s media scanner. Do so by writing


    ```

    val mediaScanIntent =

    Intent(Intent.ACTION_MEDIA_SCANNER_SCAN_FILE)

    val contentUri = Uri.fromFile(photoFile)

    mediaScanIntent.setData(contentUri)

    sendBroadcast(mediaScanIntent)

    ```


    # Recording a Video


    To record a video using the system’s app does not substantially differ from taking
    a picture as described in the preceding section. The rest of this section assumes
    you worked through that section before.


    First of all we need a different entry inside file `res/xml/file_paths.xml`. Since
    we now address the videos section, write


    ```

    ```


    for saving videos into the app’s private data space or


    ```

    ```


    to instead use the public data space available to all apps.


    Then, in order to signal the Android OS to start recording a video and save the
    data to a file of our choice, write


    ```

    var videoFile:File? = null

    val REQUEST_VIDEO_CAPTURE = 43

    fun dispatchRecordVideoIntent() {

    fun createVideoFile(): File {

    val timeStamp =

    SimpleDateFormat("yyyyMMdd_HHmmss_SSS",

    Locale.US).format(Date())

    val imageFileName = "MP4_" + timeStamp + "_"

    val storageDir =

    Environment.getExternalStoragePublicDirectory(

    Environment.DIRECTORY_MOVIES)

    // To instead tke the App''s private space:

    // val storageDir = getExternalFilesDir(

    // Environment.DIRECTORY_MOVIES)

    val image = File.createTempFile(

    imageFileName,

    ".mp4",

    storageDir)

    return image

    }

    val takeVideoIntent =

    Intent(MediaStore.ACTION_VIDEO_CAPTURE)

    if (takeVideoIntent.resolveActivity(packageManager)

    != null) {

    videoFile = createVideoFile()

    val videoURI = FileProvider.getUriForFile(this,

    "com.example.autho.fileprovider",

    videoFile!!)

    Log.e("LOG","Video output URI: ${videoURI}")

    takeVideoIntent.putExtra(MediaStore.EXTRA_OUTPUT,

    videoURI)

    startActivityForResult(

    takeVideoIntent, REQUEST_VIDEO_CAPTURE)

    }

    }

    dispatchRecordVideoIntent()

    ```


    To eventually fetch the video data after the recording completes, add to `onActivityResult(...)`


    ```

    if((requestCode == REQUEST_VIDEO_CAPTURE and 0xFFFF) &&

    resultCode == Activity.RESULT_OK) {

    videoView.setVideoPath(videoFile!!.absolutePath)

    videoView.start()

    }

    ```


    where `videoView` points to a `VideoView` inside your layout file.


    Also here, since we need to make sure the `videoFile` member survives an activity
    restart, add it to `onSaveInstanceState(...)` and `onCreate()` as shown before
    for the `photoFile` field.


    # Writing Your Own Camera App


    Using `Intent`s to signal the Android OS to take a picture for us or record a
    video might be fine for many use cases. But as soon as we need to have more control
    over the camera or the GUI, you need to write your own camera access code using
    the camera API. In this section I will show you an app that can both show you
    a preview and let you take a still image.'
