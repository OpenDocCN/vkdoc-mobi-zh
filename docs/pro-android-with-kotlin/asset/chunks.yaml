    perspective, including smartphones, wearables like smartwatches, Android TV, and
    Android Auto. Here we also talk about ways to access the camera and the sensors
    and how we can interfere with phone calls.


    In Chapters [15](#463716_2_En_15_Chapter.xhtml)–[18](#463716_2_En_18_Chapter.xhtml),
    we deal with testing, troubleshooting, and publishing your app, and the final
    chapter, Chapter [19](#463716_2_En_19_Chapter.xhtml), explains how to use the
    tools provided with the SDK installation (part of Android Studio).


    ## Some Notes About the Code


    While in general for all the code presented in this book, I try to follow a *clean
    code* approach, for brevity and simplicity, I use two anti-patterns you shouldn’t
    follow in your production code:


    *   I do not use localized string resources, so whenever you see something like


    ```

    android:text = "Some message"

    ```


    inside XML resources, what instead you should do is create a string resource and
    let the attribute refer to it like in


    *   For logging statements, I always use ”LOG” as a tag like in


    ```

    android:text = "@string/message"

    ```


    ```

    Log.e("LOG", "The message")

    ```


    In your code you instead should create a tag based on the class name


    ```

    companion object {

    val TAG="The class name"

    ...

    }

    ```


    and then use that one:


    ```

    Log.e(TAG, "The message")

    ```


    About the Author About the Technical Reviewer


    # 1. System


    The Android OS was born as the child of the Android Inc. company back in 2003
    and later acquired by Google LLC in 2005 . The first device running Android came
    into the market in 2008\. Since then it ran through numerous updates, with the
    latest version number by mid-2022 reading 12.1.


    Ever since its first build, the market share of the Android OS has been constantly
    increasing, and by 2021 it is said to stay above 72%. Even though the numbers
    vary with the sources you use, the success of the Android OS is surely undeniable.
    This victory partly has its roots in Google LLC being a clever player in the worldwide
    smartphone market, but it also comes from the Android OS carefully being tailored
    to match the needs for smartphones and other handheld or handheld-like devices.


    Having said that, the majority of computer developers formerly or still working
    in the PC environment would do a bad job utterly disregarding handheld device
    development, and this book is the result of giving to you as a developer an aid
    to understanding the Android OS and mastering the development of programs herein.
    The book also concentrates on using Kotlin as a language to achieve development
    demands, but first we will be looking at the Android OS and auxiliary development-related
    systems to give you an idea about the inner functioning of Android.'
