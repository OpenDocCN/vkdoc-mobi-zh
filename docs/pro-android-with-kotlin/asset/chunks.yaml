    \ and [`https://developer.android.com/reference/androidx/preference/package-summary`](https://developer.android.com/reference/androidx/preference/package-summary).\n\
    \nIn order to be able to use Jetpack for preferences, we have to correctly add\
    \ the dependencies to the build file:"
