  trans: "\n# 内容提供者查询参数\n\n- **projection**：该参数告知实现方请求者感兴趣的列。以 SQL 数据库类型存储数据为例，它列出了结果中应包含的列名。但并非严格要求一一映射——请求者可能要求选择参数\"\
    X\"，而\"X\"的值可通过任何你能想到的方式计算得出。如果为`null`，则返回所有字段。该参数对所有变体 A、B、C 含义相同。\n\n- **selection**：仅适用于变体\
    \ A 和 B，指定要返回数据的筛选条件。内容提供者框架不要求该筛选参数的具体形式——完全由实现方决定，内容请求者必须遵循实现方的定义。但在许多情况下，你会看到类似\
    \ SQL 筛选字符串如\"name = Jean AND age < 45\"的形式。如果为`null`，则返回所有数据集。\n\n- **selectionArgs**：筛选参数可能包含\"\
    ?\"等占位符。若存在，此数组指定要填入占位符的值。框架同样不对此做严格规定，但大多数情况下\"?\"作为占位符使用，如 SQL 中的\"name = ?\
    \ AND age < ?\"。若无筛选占位符，此参数可为`null`。\n\n- **sortOrder**：仅适用于变体 A 和 B，指定返回数据的排序方式。内容提供者框架不规定具体语法，但针对类似\
    \ SQL 的访问，通常会是\"name DESC, age ASC\"这样的形式。\n\n- **queryArgs**：对于变体 C，筛选条件、筛选参数和排序方式这三个参数均可选择通过`android.os.Bundle`对象来指定。按惯例，对于类似\
    \ SQL 的查询，Bundle 的键值为：\n    - `ContentResolver.QUERY_ARG_SQL_SELECTION`\n    -\
    \ `ContentResolver.QUERY_ARG_SQL_SELECTION_ARGS`\n    - `ContentResolver.QUERY_ARG_SQL_SORT_ORDER`\n\
    \n- **cancellationSignal**：对于变体 B 和 C，如果此参数不为`null`，你可以用它取消当前操作。Android OS 会相应通知请求者。\n\
    \n所有查询方法都应返回一个`android.database.Cursor`对象，以便遍历数据集。按约定，每个数据集都包含一个以\"_id\"为键的技术主键。请参阅以下章节\"\
    基于 AbstractCursor 等的 Cursor 类\"和\"基于 Cursor 接口的 Cursor 类\"，了解如何设计合适的游标对象。\n\n\
    ## 修改内容\n\n内容提供者不仅允许读取内容，还允许修改内容。为此提供了以下方法：\n\n```\nabstract fun insert(\n   \
    \ Uri uri:Uri,\n    values:ContentValues) : Uri\n// 无需重写此方法，默认实现会正确遍历输入数组\n//\
    \ 并对每个元素调用 insert(...)\nfun bulkInsert(\n    uri:Uri,\n    values:Array) : Int\n\
    abstract fun update(\n    uri:Uri,\n    values:ContentValues,\n    selection:String,\n\
    \    selectionArgs:Array) : Int\nabstract fun delete(\n    uri:Uri,\n    selection:String,\n\
    \    selectionArgs:Array) : Int\n```\n\n下面我们描述这些参数及其含义：\n\n- **uri**：指定数据空间中的数据类型坐标。内容消费者通过恰当指定此参数来告知其目标数据的*种类*。详细描述请参见\"\
    设计内容 URI\"一节。注意，对于删除或更新单个数据集，通常假定 URI 路径末尾包含数据的（技术）主键，例如：`content://com.android.contacts/contact/42`。\n\
    \n- **values**：要插入或更新的值。通过此类提供的各种`get*()`方法来访问这些值。\n\n- **selection**：指定要更新或删除数据的筛选条件。内容提供者框架不强制要求该参数的形式——完全由实现方定义，内容请求者必须遵循实现方的定义。但在许多情况下，你会看到类似\
    \ SQL 筛选字符串如\"name = Jean AND age < 45\"的形式。如果为`null`，则作用于数据集中的所有条目。\n\n- **selectionArgs**：筛选参数可能包含\"\
    ?\"等占位符。若存在，此数组指定要填入占位符的值。框架同样不对此做严格规定，但大多数情况下\"?\"作为占位符使用，如 SQL 中的\"name = ?\
    \ AND age < ?\"。若无筛选占位符，此参数可为`null`。\n\n`insert()`方法应返回指定插入数据的 URI。此返回值可为`null`，因此没有严格要求必须返回值。如果返回了值，则应包含技术主键。所有返回`Int`的方法都应返回受影响数据集的数量。如果你不希望内容提供者能修改任何数据，可以为所有插入、更新和删除方法提供空实现，并让它们返回`0`或`null`。\n\
    \n## 完成 ContentProvider 类\n\n为了完成`ContentProvider`类的实现，除了查询、插入、更新和删除方法外，你还必须实现一个方法：\n\
    \n```\nabstract getType(uri:Uri) : String\n```\n\n该方法将任何可用的 URI 映射到相应的 MIME 类型。例如，对于可能的实现，你可以按如下方式使用\
    \ URI：\n\n```\nContentResolver.CURSOR_DIR_BASE_TYPE + \"/vnd.<名称>.<类型>\"\nContentResolver.CURSOR_ITEM_BASE_TYPE\
    \ + \"/vnd.<名称>.<类型>\"\n```\n\n分别用于指向*可能*包含多个条目或*至多*一个条目的 URI。对于`<名称>`，请使用全局唯一的名称，可以是公司域名的倒序、包名或其显著部分。对于`<类型>`，使用定义表名或数据域的标识符。\n\
    \n## 注册内容提供者\n\n完成`ContentProvider`实现后，必须在`AndroidManifest.xml`文件中按如下方式注册：\n\n\
    ```\n<provider\n    android:authorities=\"...\"\n    android:directBootAware=\"\
    ...\"\n    android:enabled=\"...\"\n    android:exported=\"...\"\n    android:grantUriPermissions=\"\
    ...\"/>\n```\n\n这些属性在表 6-1 中描述。\n\n**表 6-1** `<provider>`元素\n\n| 属性（每个需加`android:`前缀）\
    \ | 描述 |\n|---|---|\n| `authorities` | 分号\";\"分隔的权限列表。多数情况下只有一个权限，通常使用应用（包）名或`ContentProvider`实现类的完整类名。没有默认值，必须至少有一个。\
    \ |\n| `directBootAware` | 内容提供者是否可在用户解锁设备前运行。默认值为 false。 |\n| `enabled` | 内容提供者是否启用。默认值为\
    \ true。 |\n| `exported` | 其他应用是否可访问此内容。根据应用架构，访问权限可能仅限于同一应用的组件，但通常你希望其他应用能访问内容，因此将此设置为`true`。从\
    \ API 级别 17 开始，默认值为 false。在此之前该标记不存在，应用行为等同于设置为 true。 |\n| `grantUriPermissions`\
    \ | 是否可以通过 URI 临时授予其他应用访问此提供者内容的权限。*临时授予*是指当访问内容的客户端通过带有`intent.addFlags(Intent.FLAG_GRANT_URI_PERMISSION)`的\
    \ Intent 调用时，临时覆盖由`<permission>`、`<readPermission>`或`<writePermission>`定义的权限拒绝。若将此属性设为`false`，仍可通过设置一个或多个`<grant-uri-permission>`子元素来授予更细粒度的临时权限。默认值为\
    \ false。 |\n"
- fmt: "# 内容提供者属性\n\n`icon`  \nThe resource ID of an icon to use for the provider.\
    \ Default is to use the parent component’s icon.\n\n`initOrder`  \nHere you can\
    \ impose some order for content providers of the same app to be instantiated.\
    \ Higher numbers get instantiated first. Use this with care, since startup order\
    \ dependencies might indicate a bad application design.\n\n`label`  \nA string\
    \ resource ID for a label to use. Default is the app’s `label`.\n\n`multiprocess`\
    \  \nIf set to `true`, an app running in more than one process possibly will have\
    \ multiple instances of the content provider running. Otherwise, at most one instance\
    \ of the content provider will exist. Default is `false`.\n\n`name`  \nThe fully\
    \ qualified class name of the `ContentProvider` implementation.\n\n`permission`\
    \  \nA convenient way of setting both `readPermission` and `writePermission` –\
    \ see in the following. Specifying one of the latter has precedence.\n\n`process`\
    \  \nSpecify a process name if you want the content provider to run in another\
    \ process than the app itself. If it starts with a “:”, the process will be private\
    \ to the app; if it starts with a lowercase letter, a global process will be used\
    \ (permission to do so required). Default is to run in the app’s process.\n\n\
    `readPermission`  \nA permission a client must have in order to have read access\
    \ to content of the content provider. You can have a client without that permission\
    \ still being able to access the content by virtue of the `grantUriPermissions`\
    \ attribute.\n\n`syncable`  \nWhether data of the content provider should be synchronized\
    \ with a server.\n\n`writePermission`  \nA permission a client must have in order\
    \ to have write access to content of the content provider. You can have a client\
    \ without that permission still being able to access the content by virtue of\
    \ the `grantUriPermissions` attribute.\n\n---\n\nIf you use `grantUriPermissions`\
    \ to temporarily give URI permissions to components from other apps called by\
    \ an implicit `Intent`, you have to carefully tailor such an `Intent`: (1) add\
    \ flag `Intent.FLAG_GRANT_READ_URI_PERMISSION`, (2) and add the URI you want to\
    \ allow access for inside the `Intent`’s `data` field. An example would be:\n\n\
    ```\nintent.action = \"com.example.app.VIEW\" // SET INTENT ACTION\nintent.flags\
    \ = Intent.FLAG_ACTIVITY_NEW_TASK\nintent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION)\
    \ // GRANT TEMPORARY READ PERMISSION\nintent.data = Uri.parse(\"content:///\"\
    ) // USE YOUR OWN!\nstartActivity(intent)\n```\n\nInside the intent filter of\
    \ the called component, you then must specify a `<data>` element, and it must\
    \ contain an appropriate URI *and* a MIME type. The reason a MIME type must be\
    \ specified, although we haven’t explicitly stated one, is that the Android OS\
    \ uses the content provider’s `getType(Uri)` method to automatically add the MIME\
    \ type while the `Intent` gets resolved, for example:\n\nThe called component\
    \ is then granted to access this URI in the specified way. After it finishes its\
    \ work, it is supposed to call `revokeUriPermission(String, Uri, Int)` to revoke\
    \ the temporary permission it has been given to:\n\n```\nrevokePermission(getPackageName(),\
    \ uri, Intent.FLAG_GRANT_READ_URI_PERMISSION or Intent.FLAG_GRANT_WRITE_URI_PERMISSION)\n\
    ```\n\nInside the `<provider>` element, there are a couple of child elements you\
    \ can add:\n\n*   **meta-data**\n\nDepending on how you specify it, either “resource”\
    \ or “value” must be specified. If you use “resource”, a resource ID like `@string/someString`\
    \ would assign the resource ID itself to the meta-entry, while using “value” and\
    \ `@string/someString` would assign the *contents* of the resource to the meta-entry.\n\
    \n*   **grant-uri-permission**\n\nGrant a specific URI permission (use zero to\
    \ many of this child). Only if the parent’s attribute `grantUriPermissions` is\
    \ set to `false`, this child allows the access to specific URIs. Use exactly one\
    \ of the following attributes: “path” is for the complete URI, “pathPrefix” is\
    \ for URIs starting with a certain value, and “pathPattern” allows for wildcards\
    \ – `X*` is for zero to many repetitions of any character `X`, and `.*` is for\
    \ zero to many repetitions of any character.\n\n*   **path-permission**\n\nTo\
    \ define a subset of data a content provider can serve, you can use this element\
    \ to specify a path and a required permission. The “path” attribute specifies\
    \ a complete path, the “pathPrefix” attribute allows matching the initial part\
    \ of a path, and “pathPattern” is a complete path, but with wildcards: `*` matches\
    \ zero to many occurrences of a certain character, and `.*` matches zero to many\
    \ occurrences of any character. The `permission` attribute specifies a read and\
    \ write permission, and the attributes `readPermission` and `writePermission`\
    \ draw a distinction between read and write permissions. If any of the latter\
    \ two is specified, it takes precedence over the `permission` attribute.\n\n---\n\
    \n## Designing Content URIs\n\nURIs describe the domain of the data a content\
    \ requester is interested in. Thinking of SQL, this would be the table name. URIs\
    \ can do more, however. The official syntax of a URI is:\n\n```\nscheme:[//[user[:password]@]host[:port]][/path][?query][#fragment]\n\
    ```\n\nYou can see that the “user,” “password,” and “port” parts are optional,\
    \ and in fact you usually wouldn’t specify them in an Android environment. It\
    \ is not forbidden, though, and makes sense under certain circumstances. The “host”\
    \ part however is interpreted in the most general way as something that provides\
    \ something, and this is exactly the way it is interpreted here, with “something”\
    \ being the data. To make that notion somewhat clearer, the “host” part is for\
    \ Android commonly referred to as *authority*. For example, in the *Contacts*\
    \ system app, the authority would be `com.android.contacts` (don’t use strings;\
    \ use class constant fields instead – see in the following in the “Contract” section).\
    \ The “scheme” is by convention normally `content`. So a general contacts URI\
    \ starts with:\n\n```\ncontent://com.android.contacts\n```\n\nThe “path” part\
    \ of the URI specifies the data domain, or table if you think of SQL. The user\
    \ profile data inside the contacts, for example, gets addressed by:\n\n```\ncontent://com.android.contacts/profile\n\
    ```\n\nIn this example the path has just one element, but it can be more complex\
    \ like `pathpart1/pathpart2/pathpart3`. A URI may also have a “query” part specifying\
    \ a selection. Looking at the query methods from class `android.content.ContentProvider`,\
    \ we already have a possibility to specify a selection on an API basis, but it\
    \ is totally acceptable, although not mandatory, to also allow query parameters\
    \ inside the URI. If you need to put several elements into the query parameter,\
    \ you can follow the usual convention to use “&” as a separator, for example,\
    \ `name=John&age=37`. The “fragment” specifies a secondary resource and is not\
    \ used often for content providers. But you can use it, if it helps you. Since\
    \ a URI is such a generic construct and guessing correct URIs for accessing content\
    \ provided by some app is almost impossible, a content provider app usually provides\
    \ a contract class that helps in building correct URIs for the task at hand –\
    \ see the following section “Building a Content Interface Contract.”\n\n---\n\n\
    ## Building a Content Interface Contract\n\nThe URIs a client has to use to access\
    \ data represent the interface to the contents. It is therefore a good idea to\
    \ have a central place a client can look at to find out which URIs to use. The\
    \ Android documentation suggests using a content contract class for that purpose.\
    \ The outline of such a class will look like:"
