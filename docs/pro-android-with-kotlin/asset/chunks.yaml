  trans: "\n# 在 Kotlin 中编写可重用库\n\n你在网络上能找到的大多数教程都涉及活动、服务、广播接收器和内容提供者。这些组件是可重用的，因为你可以或多或少轻松地将它们从一个项目中提取出来并复制到另一个项目中。Android\
    \ 操作系统中的封装已达到相当精细的阶段，这使得重用成为可能。然而，在更底层的层面，在某些情况下，Android 内部提供的库或 API 可能无法完全满足你的所有需求，因此你可能会想自行开发此类库，然后在可行的项目之间*复制*源码。\n\
    \n当然，这种源码层面的复制并不符合现代的可重用库方法论。只需考虑一下维护和版本控制问题，就会引入大量重复性的工作。最好的方法是，你将此类可重用库设计为专门的开发工件，这样它们就可以轻松地被不同项目复用。\n\
    \n在接下来的章节中，我们将开发一个基础的*正则表达式*库，作为你自己库项目的概念基础。\n\n## 启动一个库模块\n\n库项目以包含一个或多个模块的项目形式存在。打开\
    \ Android Studio 后，创建一个新项目。然后，在新项目内部，转到*新建 ➤ 新建模块*，并选择*Android 库*。\n\n> **注意**\
    \  \n> Android 库不仅仅是类的集合。它还可能包含资源和配置文件。出于我们的目的，我们只关注类——从开发角度看，这些额外的可能性并无坏处，你可以直接忽略它们。然而，与仅使用\
    \ JAR 文件相比，对于你的项目来说，使用 Android 库类型会为未来的扩展提供更多可能性。\n\n## 创建库\n\n在库模块内部，创建一个新的 Kotlin\
    \ 类，并在其中编写：\n\n```\npackage com.example.regularexpressionlib\ninfix operator fun\
    \ String.div(re:String) :\nArray =\nRegex(re).findAll(this).toList().toTypedArray()\n\
    infix operator fun String.rem(re:String) :\nMatchResult? =\nRegex(re).findAll(this).toList().firstOrNull()\n\
    operator fun MatchResult.get(i:Int) =\nthis.groupValues[i]\nfun String.onMatch(re:String,\
    \ func: (String)-> Unit)\n: Boolean =\nthis.matches(Regex(re)).also { if(it) func(this)\
    \ }\n```\n\n这四个操作符和函数的作用不亚于让我们能够编写 `searchString / regExpString` 来搜索正则表达式匹配项，并使用\
    \ `searchString % regExpString` 来搜索第一个匹配项。此外，我们可以使用 `searchString.onMatch()` 来仅在存在匹配项时执行某个代码块。\n\
    \n这个代码清单与我们目前在本章中看到的所有代码清单都不同。首先，你可以看到这里没有任何类。这是可行的，因为 Kotlin 了解文件工件的概念——它在幕后会根据包名生成一个隐藏类。任何通过\
    \ `import com.example.regularexpressionlib.*` 导入该库的客户端，其行为都如同在 Java 中执行了所有这些函数的静态导入一样。\n\
    \n`infix operator fun String.div( re:String )` 为字符串定义了一个除法运算符。这种除法在标准中是不可能的，因此与\
    \ Kotlin 内置运算符没有冲突。它使用 Kotlin 库中的 `Regex` 类来查找搜索字符串中所有匹配的正则表达式，并将其转换为数组，这样我们稍后就可以使用\
    \ `[]` 运算符按索引访问结果。`infix operator fun String.rem( re:String )` 几乎做了同样的事情，但它为字符串定义了\
    \ `%` 运算符，执行正则表达式搜索，并且只取第一个结果，如果没有结果则返回 `null`。\n\n`operator fun MatchResult.get(i:Int)\
    \ = ...` 是对前面运算符返回的 `MatchResult` 的一个扩展。它允许通过索引访问匹配的分组。例如，你在 \"Hello Nelo\" 中搜索\
    \ \"(el)\"，可以编写 `(\"Hello Nelo\" / \"(e.)\") [0][1]` 来获取第一个匹配的第一个分组，在本例中就是从 \"\
    Hello\" 中获取的 \"el\"。\n\n## 测试库\n\n我们需要一种在开发过程中测试库的方法。不幸的是，Android Studio 3.0 版本不允许启动类似\
    \ `main()` 函数的东西。我们唯一能做的就是创建一个*单元测试*，对于我们的情况，这样的单元测试可以这样写：\n\n```\nimport org.junit.Assert.*\n\
    import org.junit.Test\n...\nclass RegularExpressionTest {\n@Test\nfun proof_of_concept()\
    \ {\nassertEquals(1, (\"Hello Nelo\" / \".*el.*\").size)\nassertEquals(2, (\"\
    Hello Nelo\" / \".*?el.*?\").size)\nvar s1:String = \"\"\n(\"Hello Nelo\" / \"\
    e[lX]\").forEach {\ns1 += it.groupValues\n}\nassertEquals(\"[el][el]\", s1)\n\
    var s2: String = \"\"\n(\"Hello Nelo\" / \".*el.*\").firstOrNull()?.run {\ns2\
    \ += this[0]\n}\nassertEquals(\"Hello Nelo\", s2)\nassertEquals(\"el\",\n(\"Hello\
    \ Nelo\" % \".*(el).*\")?.let{ it[1] } )\nassertEquals(\"el\",\n(\"Hello Nelo\"\
    \ / \".*(el).*\")[0][1])\nvar match1: Boolean = false\n\"Hello\".onMatch(\".*el.*\"\
    ) {\nmatch1 = true\n}\nassertTrue(match1)\n}\n}\n```\n\n然后你可以像运行其他任何单元测试一样，使用\
    \ Android Studio 的上下文菜单来运行这个测试。请注意，在开发的早期阶段，你可以向测试中添加 `println()` 语句，以便在测试运行时在测试控制台上打印一些信息。\n\
    \n## 使用库\n\n一旦你调用*构建 ➤ 重建项目*，你就可以在模块的：\n\n```\nbuild/outputs/aar\n```\n\n文件夹中找到\
    \ Android 库。要从客户端使用它，请通过*新建 ➤ 新建模块*在客户端项目中创建一个新模块，选择“导入 .JAR/.AAR 包”，然后导航到库项目生成的\
    \ `.aar` 文件。\n\n> **警告**  \n> 此过程会复制 `.aar` 文件。如果你有库的新版本，你可以删除客户端项目中的库项目 (!) 并重新导入，或者手动将\
    \ `.aar` 文件从库项目复制到客户端项目。\n\n要在客户端中使用该库，只需在文件头部添加 `import com.example.regularexpressionlib.*`，之后你就可以应用前面测试中所示的新匹配结构了。\n"
- fmt: "# Publishing the Library\n\nSo far we have used the library locally, which\
    \ means you have the library project somewhere on your development machine and\
    \ use it from other projects on the same machine. You can also publish libraries,\
    \ meaning to make them either available for other developers inside a corporate\
    \ environment if you have a corporate repository at hand or truly public for libraries\
    \ you want to provide to the community.\n\nUnfortunately, the process of publishing\
    \ libraries is rather complex and involves altering the build files at several\
    \ places and using third-party plugins and repository websites. This makes the\
    \ process of publishing libraries a complex and brittle task, and giving you a\
    \ detailed description of one possible publishing process might easily be outdated\
    \ when you read this book. I therefore ask you to do your own research – entering\
    \ “publishing Android libraries” in your favorite search engine will readily point\
    \ you to online resources that will help you. If you find several processes that\
    \ might suit your needs, a general rule of thumb is to use one that (A) has a\
    \ large support community and (B) is as easy as possible.\n\nAlso, make sure for\
    \ corporate projects you have the allowance to use public repositories if you\
    \ want to use one of them. If you cannot use public repositories, to install a\
    \ corporate repository is not an overly complex task. To, for example, establish\
    \ a corporate Maven repository, you can use the software suite “Artifactory.”\n\
    \n# Advanced Listeners Using Kotlin\n\nWhatever kind of app you are creating for\
    \ Android, at one or the other place or more probably quite often, you will have\
    \ to provide listeners for API function calls. While in Java you have to create\
    \ classes or anonymous inner classes that implement the listener interface, in\
    \ Kotlin you can do that more elegantly.\n\nIf you have a SAM (or *single abstract\
    \ method*) class or interface, the story goes very easy. For example, if you want\
    \ to add an on-click listener to a button, which means you have to provide an\
    \ implementation of interface `View.OnClickListener`, doing it the Java way looks\
    \ like\n\n```\nbtn.setOnClickListener(object : View.OnClickListener {\noverride\
    \ fun onClick(v: View?) {\n// do s.th.\n}\n})\n```\n\nHowever, since this interface\
    \ just has only one method, you can write more shortly\n\n```\nbtn.setOnClickListener\
    \ {\n// do s.th.\n}\n```\n\nand let the compiler find out how the interface method\
    \ is to implement.\n\nIf a listener is not a SAM, that is, it has more than one\
    \ method, this short notation is not possible any longer. If, for example, you\
    \ have an `EditText` view and want to add a text changed listener, you basically\
    \ have to write\n\n```\nval et = ... // the EditText view\net.addTextChangedListener(\
    \ object : TextWatcher {\noverride fun afterTextChanged(s: Editable?) {\n// ...\n\
    }\noverride fun beforeTextChanged(s: CharSequence?,\nstart: Int, count: Int, after:\
    \ Int) {\n// ...\n}\noverride fun onTextChanged(s: CharSequence?,\nstart: Int,\
    \ before: Int, count: Int) {\n// ...\n}\n})\n```\n\neven if you are only interested\
    \ in the `onTextChanged()` callback method. What you could do however is extend\
    \ the `EditText` class in a utility file and there add the possibility to provide\
    \ a simplified text changed listener. To do so, start with such a file, for example,\
    \ `utility.kt`, inside package `com.example` or of course any package of your\
    \ app. Inside add\n\n```\nfun EditText.addTextChangedListener(l:\n(CharSequence?,\
    \ Int, Int, Int) -> Unit) {\nthis.addTextChangedListener(object : TextWatcher\
    \ {\noverride fun afterTextChanged(s: Editable?) {\n}\noverride fun beforeTextChanged(s:\
    \ CharSequence?,\nstart: Int, count: Int, after: Int) {\n}\noverride fun onTextChanged(s:\
    \ CharSequence?,\nstart: Int, before: Int, count: Int) {\nl(s, start, before,\
    \ count)\n}\n})\n}\n```\n\nwhich adds the desired method to that class dynamically.\n\
    \nYou can now `import com.example.utility.*` anywhere needed and then write\n\n\
    ```\nval et = ... // the EditText view\net.addTextChangedListener({ s: CharSequence?,\n\
    start: Int, before: Int, count: Int ->\n// do s.th.\n})\n```\n\nwhich looks considerably\
    \ more concise compared with the original construct.\n\n# Multithreading\n\nWe\
    \ already talked about multithreading to some extent inside section “Background\
    \ Tasks” of Chapter [9](#463716_2_En_9_Chapter.xhtml). In this section we just\
    \ point out what Kotlin on a language level can do to simplify multithreading.\n\
    \nKotlin contains a couple of utility functions inside its standard library. They\
    \ help start threads and timers more easily compared with using the Java API –\
    \ see Table [11-1](#463716_2_En_11_Chapter.xhtml#Tab1).\n\n**Table 11-1**  \n\
    Kotlin Concurrency\n\n| Name | Parameters | Return | Description |\n| --- | ---\
    \ | --- | --- |\n| `fixedRateTimer` | `name: String?` `daemon: Boolean` `initialDelay:\
    \ Long` `period: Long` `action: TimerTask.() -> Unit` | `Timer` | Creates and\
    \ starts a timer object for fixed-rate scheduling. The period and initialDelay\
    \ parameters are in milliseconds. |\n| `fixedRateTimer` | `name: String?` `daemon:\
    \ Boolean` `startAt: Date` `period: Long` `action: TimerTask.() -> Unit` | `Timer`\
    \ | Creates and starts a timer object for fixed-rate scheduling. The period parameter\
    \ is in milliseconds. |\n| `timer` | `name: String?` `daemon: Boolean` `initialDelay:\
    \ Long` `period: Long` `action: TimerTask.() -> Unit` | `Timer` | Creates and\
    \ starts a timer object for fixed-rate scheduling. The period parameter is the\
    \ time in milliseconds between the end of the previous and the start of the next\
    \ task. |\n| `timer` | `name: String?` `daemon: Boolean` `startAt: Date` `period:\
    \ Long` `action: TimerTask.() -> Unit` | `Timer` | Creates and starts a timer\
    \ object for fixed-rate scheduling. The period parameter is the time in milliseconds\
    \ between the end of the previous and the start of the next task. |\n| `thread`\
    \ | `start: Boolean` `isDaemon: Boolean` `contextClassLoader: ClassLoader?` `name:\
    \ String?` `priority: Int` `block: () -> Unit` | `Thread` | Creates and possibly\
    \ starts a thread, executing its `block`. Threads with higher priority are executed\
    \ in preference to threads with lower priority. |\n\nFor the timer functions,\
    \ the “action” parameter is a closure with `this` being the corresponding `TimerTask`\
    \ object. Using it you may, for example, cancel the timer from inside its execution\
    \ block. Threads or timers that have `daemon` or `isDaemon` set to `true` will\
    \ not prevent the JVM from shutting down when all non-daemonized threads have\
    \ exited.\n\nBy virtue of its general functional abilities, Kotlin anyway does\
    \ a good job in helping us with concurrency – many of the classes inside `java.util.concurrent`\
    \ that deal with parallel execution take a `Runnable` or `Callable` as an argument,\
    \ and in Kotlin you can always replace such SAM (single abstract method) constructs\
    \ via direct `{ ... }` lambda constructs, for example:\n\n```\nval es = Executors.newFixedThreadPool(10)\n\
    // ...\nval future = es.submit({\nThread.sleep(2000L)\nprintln(\"executor over\"\
    )\n\n} as ()->Int)\nval res:Int = future.get()\n```\n\nSo you don’t have to write\n\
    \n```\nExecutorService es = Executors.newFixedThreadPool(10);\n// ...\nCallable\
    \ c = new Callable() {\npublic Integer call() {\ntry {\nThread.sleep(2000L);\n\
    } catch(InterruptedException e) { }\nSystem.out.println(\"executor over\");\n\
    return 10;\n};\nFuture f = es.submit(c);\nint res = f.get();\n```\n\nas in Java.\
    \ Note the cast to `()->Int` is necessary in the Kotlin code, even with Android\
    \ Studio complaining that it be superfluous. The reason for that is if we didn’t\
    \ do it, the other method with a `Runnable` as argument would get called instead\
    \ and the executor would be unable to return a value."
