    \ 类允许确定给定地址的地理坐标 `(longitude, latitude)`，或者反过来，确定给定地理坐标的可能地址。这些过程被称为正向地理编码和反向地理编码。`Geocoder`\
    \ 类内部使用在线 Google 服务，但细节隐藏在实现中——作为开发者，您使用 `Geocoder` 类时无需理解数据来源。\n\n本节关于反向地理编码——我们使用一个包含经度和纬度的\
    \ `Location` 对象来查找附近的街道名称。首先，我们需要决定如何处理可能长时间运行的操作——执行查找需要网络操作，并且在线服务需要查找巨大的数据库。`IntentService`\
    \ 将为我们完成这项工作，在可以返回结果的方法中，我们选择通过意图附加传递的 `ResultReceiver`。首先，我们在一个包含一些常量的类中定义服务与服务客户端之间的契约：\n\
    \n```kotlin\nclass GeocoderConstants {\n    companion object Constants {\n   \
    \     val SUCCESS_RESULT = 0\n        val FAILURE_RESULT = 1\n        val PACKAGE_NAME\
    \ = \"\"\n        val RECEIVER = \"$PACKAGE_NAME.RECEIVER\"\n        val RESULT_DATA_KEY\
    \ =\n            \"$PACKAGE_NAME.RESULT_DATA_KEY\"\n        val LOCATION_DATA_EXTRA\
    \ =\n            \"$PACKAGE_NAME.LOCATION_DATA_EXTRA\"\n    }\n}\n```\n\n现在完整的服务类如下：\n\
    \n```kotlin\nclass FetchAddressService :\n    IntentService(\"FetchAddressService\"\
    ) {\n    override\n    fun onHandleIntent(intent: Intent?) {\n        val geocoder\
    \ = Geocoder(this, Locale.getDefault())\n        var errorMessage = \"\"\n   \
    \     // Get the location passed to this service through\n        // an extra.\n\
