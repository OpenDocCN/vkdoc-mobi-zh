    \ details will be given to you in the online documentation of `TextToSpeech`.\n\
    \n## 10. Firebase\n\nFirebase is the name of Google’s cloud and (offshore) development\
    \ platform. In this chapter we talk about cloud data storage and cloud-based messaging.\n\
    \n> **Note**\n>\n> Firebase is more than just messaging and data storage – please\
    \ consult the online documentation (e.g., [`https://firebase.google.com/products-build`](https://firebase.google.com/products-build))\
    \ and information you find in the Firebase console, and the information Android\
    \ Studio gives you, to see what else can be done.\n\n### Firebase Cloud Storage\n\
    \nYou can save files to and read them from Google Cloud Storage using the Cloud\
    \ Storage API. You need a Google account with Firebase activated and a Firebase\
    \ project set up via [`https://console.firebase.google.com`](https://console.firebase.google.com).\n\
    \n> **Note**\n>\n> The notion “file” is meant in a very broad sense – this could\
    \ just be a series of bytes from your device’s memory, a byte stream, or an actual\
    \ file from the device’s storage.\n\nA verbatim copy of the app setup and storage\
    \ configuration documentation in this book would not have much value. Instead,\
    \ just follow the detailed instructions given at [`https://firebase.google.com/docs/storage`](https://firebase.google.com/docs/storage),\
    \ especially [`https://firebase.google.com/docs/storage/android/start`](https://firebase.google.com/docs/storage/android/start)\
    \ therein.\n\n### Firebase Cloud Messaging\n\nFirebase Cloud Messaging (FCM) is\
    \ a cloud-based message broker you can use to send and receive messages to and\
    \ from various devices, including other operating systems like Apple iOS. The\
    \ idea is as follows: you register an app in the Firebase console and henceforth\
    \ can receive and send messages in connected devices, including other installations\
    \ of your app on other devices.\n\n> **Note**\n>\n> Firebase Cloud Messaging (FCM)\
    \ is a successor of *Google Cloud Messaging* (GCM).\n\nTo start FCM from inside\
    \ Android Studio, from your open project, go to **Tools ➤ Firebase**. Select **Cloud\
    \ Messaging** and then **Set up Firebase Cloud Messaging**. If you follow the\
    \ instructions there, you will end up using two services:\n\n*   A subclass of\
    \ `FirebaseInstanceIdService` where you will receive a message token. The class\
    \ basically looks like:\n\n```kotlin\nclass MyFirebaseInstanceIdService : FirebaseInstanceIdService()\
    \ {\n    override\n    fun onTokenRefresh() {\n        // Get updated InstanceID\
    \ token.\n        val refreshedToken = FirebaseInstanceId.getInstance().token\n\
    \        Log.d(TAG, \"Refreshed token: \" + refreshedToken!!)\n        // If you\
    \ want to send messages to this\n        // application instance or manage this\
    \ apps\n        // subscriptions on the server side, send the\n        // Instance\
    \ ID token to your app server.\n        sendRegistrationToServer(refreshedToken)\n\
    \    }\n}\n```\n\nand it has a corresponding entry inside `AndroidManifest.xml`:\n\
    \nThe token you receive here when you first start an app that is connected to\
    \ Firebase is important – you need it to use the Firebase-based communication\
    \ channel. And it is subject to infrequent automated renewal, so you need to find\
    \ a way to reliably store the token whenever you receive it in this service. And\
    \ do yourself a favor: unless you implemented a way to store the token, be sure\
    \ to save the token you receive in the logs, because to recover a lost token results\
    \ in annoying administrative work.\n\n*   Another service for receiving FCM-based\
    \ messages. It could read:\n\n```kotlin\nclass MyFirebaseMessagingService : FirebaseMessagingService()\
    \ {\n    override\n    fun onMessageReceived(remoteMessage: RemoteMessage) {\n\
    \        // ...\n        // Check if message contains a data payload.\n      \
    \  if (remoteMessage.data.size > 0) {\n            Log.d(TAG, \"Message data payload:\
    \ \" + remoteMessage.data)\n            // Implement a logic:\n            //\
    \ For long-running tasks (10 seconds or more)\n            // use Firebase Job\
    \ Dispatcher.\n            scheduleJob()\n            // ...or else handle message\
    \ within 10 seconds\n            // handleNow()\n        }\n        // Message\
    \ contains a notification payload?\n        remoteMessage.notification?.run {\n\
    \            Log.d(TAG, \"Message Notification Body: \" + body)\n        }\n \
    \   }\n    private fun handleNow() {\n        Log.e(\"LOG\",\"handleNow()\")\n\
    \    }\n    private fun scheduleJob() {\n        Log.e(\"LOG\",\"scheduleJob()\"\
    )\n    }\n}\n```\n\nand this too has a corresponding entry in `AndroidManifest.xml`:\n\
    \nIn order for this all to work, you need to have Firebase active in your Google\
    \ account. There are several options. For a high-traffic messaging service, you\
    \ need to buy a plan. The free variant (as of March 2018) however will give you\
    \ more than enough power for development and testing. If all is set up correctly,\
    \ you can use the web-based Firebase console to test sending messages to your\
    \ running app and see the messages arriving there in the logs. For sending messages\
    \ the suggested solution is to set up a trusted environment in the form of an\
    \ application server. This is beyond the scope of the book, but the online Firebase\
    \ documentation gives you various hints to get started with that matter.\n\n##\
    \ 11. Development\n\nThis chapter is about issues closer to development matters,\
    \ compared with the previous chapters. The topics we will be talking about here\
    \ are less tightly coupled to specific Android OS APIs – it is more our concern\
    \ here to find out how technical requirements can best be accomplished using Kotlin\
    \ methodologies. The chapter gets amended by a section for transcribing Kotlin\
    \ code to JavaScript code, which can serve `WebView` widgets."
