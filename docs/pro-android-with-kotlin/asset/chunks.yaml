  trans: "\n# “OK, Google”语音操作与数据提取\n\n“OK, Google，我今天走了多少步？”“OK，Google，我的步数是多少？”\n\
    \n| 操作 | MIME 类型 |\n|------|----------|\n| `vnd.google.fitness.VIEW` | `vnd.google.fitness.data_type/com.google.step_count.cumulative`\
    \ |\n\n可以像往常一样，通过多种 `Intent.get*Extra(...)` 方法之一从传入的 `Intent` 中提取额外数据。\n\n你也可以提供应用定义的语音操作来启动自定义活动。为此，请在\
    \ `AndroidManifest.xml` 中按如下方式定义相关的每个 `<action>` 元素：\n\n```xml\n<activity\n  \
    \  android:name=\".MyRunningApp\"\n    android:label=\"@string/start_my_running_app\"\
    >\n    <intent-filter>\n        <action android:name=\"android.intent.action.VOICE_COMMAND\"\
    \ />\n    </intent-filter>\n</activity>\n```\n\n凭借“label”属性，你可以说出“启动我的跑步应用”来启动该活动。\n\
    \n你还可以让语音识别填充编辑字段。为此，请编写：\n\n```kotlin\nval SPEECH_REQUEST_CODE = 42\nval intent\
    \ = Intent(\n    RecognizerIntent.ACTION_RECOGNIZE_SPEECH).apply {\n    putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL,\n\
    \        RecognizerIntent.LANGUAGE_MODEL_FREE_FORM)\n}.run {\n    startActivityForResult(this,\
    \ SPEECH_REQUEST_CODE)\n}\n```\n\n并在重写的 `onActivityResult(...)` 回调中获取结果：\n\n```kotlin\n\
    fun onActivityResult(requestCode: Int, resultCode: Int,\n                    \
    \ data: Intent) {\n    if (requestCode and 0xFFFF == SPEECH_REQUEST_CODE\n   \
    \     && resultCode == RESULT_OK) {\n        val results = data.getStringArrayListExtra(\n\
    \            RecognizerIntent.EXTRA_RESULTS)\n        val spokenText = results[0]\n\
    \        // ... 处理语音文本\n    }\n    super.onActivityResult(\n        requestCode,\
    \ resultCode, data)\n}\n```\n\n# 可穿戴设备的扬声器\n\n如果你想使用连接到 Wear 设备的扬声器播放音频，首先检查 Wear\
    \ 应用能否连接到扬声器：\n\n```kotlin\nfun hasSpeakers(): Boolean {\n    val packageManager\
    \ = context.getPackageManager()\n    val audioManager =\n        context.getSystemService(\n\
    \            Context.AUDIO_SERVICE) as AudioManager\n    if (Build.VERSION.SDK_INT\
    \ >= Build.VERSION_CODES.M) {\n        // 检查 FEATURE_AUDIO_OUTPUT 以防止误报。\n   \
    \     if (!packageManager.hasSystemFeature(\n                PackageManager.FEATURE_AUDIO_OUTPUT))\
    \ {\n            return false\n        }\n        val devices =\n            audioManager.getDevices(\n\
    \                AudioManager.GET_DEVICES_OUTPUTS)\n        for (device in devices)\
    \ {\n            if (device.type ==\n                AudioDeviceInfo.TYPE_BUILTIN_SPEAKER)\
    \ {\n                return true\n            }\n        }\n    }\n    return\
    \ false\n}\n```\n\n然后，你可以像在其他任何设备上播放声音一样播放声音。这在“播放媒体”一节中有详细描述。\n\n# Wear 中的位置功能\n\
    \n要在 Wear 设备中使用位置检测，首先必须检查位置数据是否可用：\n\n```kotlin\nfun hasGps(): Boolean {\n  \
    \  return packageManager.hasSystemFeature(\n        PackageManager.FEATURE_LOCATION_GPS)\n\
    }\n```\n\n如果可穿戴设备没有自带的位置传感器，则必须持续检查可穿戴设备是否已连接。可以通过处理回调来实现，如下所示：\n\n```kotlin\n\
    var wearableConnected = false\nfun onCreate(savedInstanceState: Bundle?) {\n \
    \   ...\n    Wearable.getNodeClient(this@MainActivity)\n        .connectedNodes.addOnSuccessListener\
    \ {\n            wearableConnected = it.any {\n                it.isNearby\n \
    \           }\n        }.addOnCompleteListener {\n        }.addOnFailureListener\
    \ {\n            ...\n        }\n}\n```\n\n在此基础上，你可以使用 *Fused Location Provider*\
    \ 处理位置检测，如第 8 章的“位置与地图”部分所述。\n\n# Wear 中的数据通信\n\nWear OS 中的数据通信通过以下两种方式之一进行：\n\
    \n- **直接网络通信**：适用于能够自行连接网络并希望与非配对设备通信的 Wear 设备。\n- **使用可穿戴数据层 API**：用于与配对手持设备进行通信。\n\
    \n对于直接网络通信，使用 `android.net.ConnectivityManager` 类来检查带宽等能力，并请求增加带宽等新能力。详细信息请参见该类的在线\
    \ API 文档。要实际执行网络通信，请使用 `android.net` 包中的类和接口。本节其余部分将描述用于与配对手持设备通信的 *可穿戴数据层 API*。\n\
    \n要访问可穿戴数据层 API，请通过以下方式获取 `DataClient` 或 `MessageClient`：\n\n```kotlin\nval dataClient\
    \ = Wearable.getDataClient(this)\nval msgClient = Wearable.getMessageClient(this)\n\
    ```\n\n在 activity 内部进行调用。你可以频繁调用，因为这两个操作开销都很低。消息客户端最适合传输小负载数据；对于较大负载，应改用数据客户端。此外，数据客户端是在\
    \ Wear 设备和手持设备之间同步数据的可靠方式，而消息客户端使用即发即忘模式。因此，消息客户端无法知道发送的数据是否实际到达。\n\n使用数据客户端发送数据项时，创建\
    \ `PutDataMapRequest` 对象，调用其上的 `getDataMap()`，并使用各种 `put...()` 方法添加数据。最后，调用 `asPutDataRequest()`\
    \ 并使用其结果调用 `DataClient.putDataItem(...)`。后者启动与其他设备的同步，并返回一个 `com.google.android.gms.tasks.Task`\
    \ 对象，你可以向该对象添加监听器以观察通信。在接收方，你可以通过让你的 activity 实现 `DataClient.OnDataChangedListener`\
    \ 并实现 `fun onDataChanged(dataEvents: DataEventBuffer)` 函数来观察数据同步。\n\n对于较大的二进制数据集（如图像），可以使用\
    \ `Asset` 作为数据类型通过数据客户端发送，如下所示：\n\n```kotlin\nfun createAssetFromBitmap(bitmap:\
    \ Bitmap): Asset {\n    val byteStream = ByteArrayOutputStream()\n    bitmap.compress(Bitmap.CompressFormat.PNG,\
    \ 100,\n        byteStream)\n    return Asset.createFromBytes(byteStream\n   \
    \     .toByteArray())\n}\n\nval bitmap = BitmapFactory.decodeResource(\n    getResources(),\
    \ android.R.drawable.ic_media_play)\nval asset = createAssetFromBitmap(bitmap)\n\
    val dataMap = PutDataMapRequest.create(\"/image\")\ndataMap.getDataMap().putAsset(\"\
    profileImage\", asset)\nval request = dataMap.asPutDataRequest()\nval putTask:\
    \ Task<DataItem> =\n    Wearable.getDataClient(this).putDataItem(request)\n```\n\
    \n如果要改用消息客户端，首先需要找到合适的消息接收者。为此，首先将能力分配给合适的手持应用。这可以通过将文件 `wear.xml` 添加到 `res/values`\
    \ 并使其包含以下内容来实现：\n\n```xml\n<resources>\n    <string-array name=\"android_wear_capabilities\"\
    >\n        <item>my_capability1</item>\n        <item>my_capability2</item>\n\
    \        ...\n    </string-array>\n</resources>\n```\n\n要找到具有合适能力的手持设备（或网络节点）并向其发送消息，请编写：\n\
    \n```kotlin\nval capabilityInfo = Tasks.await(\n    Wearable.getCapabilityClient(this).getCapability(\n\
    \        \"my_capability1\",\n        CapabilityClient.FILTER_REACHABLE))\ncapabilityInfo.nodes.find\
    \ {\n    it.isNearby\n}?.run {\n    msgClient.sendMessage(\n        this.id, \"\
    /msg/path\", \"Hello\".toByteArray())\n}\n```\n\n除此之外，你也可以直接将 `CapabilityClient.OnCapabilityChangedListener`\
    \ 监听器添加到客户端，如下所示：\n\n```kotlin\nWearable.getCapabilityClient(this).addListener({\n\
    \    it.nodes.find {\n        it.isNearby\n    }?.run {\n        msgClient.sendMessage(\n\
    \            this.id, \"/msg/path\", \"Hello\".toByteArray())\n    }\n}, \"my_capability1\"\
    )\n```\n\n要接收此类消息，在安装于手持设备上的应用的任何位置，通过以下方式注册消息事件监听器：\n\n```kotlin\nWearable.getMessageClient(this).addListener\
    \ {\n    messageEvent ->\n    // 处理消息事件\n}\n```\n\n# 使用 Android TV 进行编程\n\n针对\
    \ Android TV 设备的应用开发与智能手机上的开发没有本质区别。然而，由于用户数十年观看电视形成的期望，其约定俗成的规范比智能手机更为严格。幸运的是，Android\
