    \n## Maps\n\nAdding a map to your location-related app greatly improves the usability\
    \ for your users. To add a Google Maps API, the easiest is to use the wizard provided\
    \ by Android Studio. Do as follows:\n\n1. Add a map activity: Right-click your\
    \ module. Then in the menu, choose **New** ➤ **Activity** ➤ **Gallery…**, and\
    \ from the gallery choose a Google Maps activity. Press **Next** and inside the\
    \ screen that follows, enter activity parameters according to your needs. However,\
    \ choosing an appropriate activity name basically is all you need – the defaults\
    \ make sense in most cases.\n\n2. You need an API key in order to use Google Maps.\
    \ For this purpose, inside the file `/res/values/google_maps_api.xml`, locate\
    \ the link inside the comments; it might look like [`https://console.developers.google.com/flows/enableapi?`](https://console.developers.google.com/flows/enableapi?)`...`.\
    \ Open this link in a browser and follow the instructions there. Finally, enter\
    \ the key generated online as the text of the `<string name = \"google_maps_key\"\
    \ ... >` element in that file.\n\nWhat we have now is an activity class prepared\
    \ for us, a fragment layout file that we can include in our app, and a registered\
    \ API key that allows us to fetch map data from the Google server.\n\nTo include\
    \ the fragment as defined by `/res/layout/activity_maps.xml`, you write:\n\n```xml\n\
    <fragment\n    android:id=\"@+id/map\"\n    android:name=\"com.google.android.gms.maps.SupportMapFragment\"\
    \n    android:layout_width=\"match_parent\"\n    android:layout_height=\"match_parent\"\
    \ />\n```\n\ninside your layout, with sizes adapted according to your needs.\n\
    \nInside the code we first add a snippet to fetch a map from the server. You do\
    \ this inside your `onCreate()` callback as follows:\n\n```kotlin\noverride fun\
    \ onCreate(savedInstanceState: Bundle?) {\n    ...\n    val mapFragment = supportFragmentManager\n\
    \        .findFragmentById(R.id.map)\n        as SupportMapFragment\n    mapFragment.getMapAsync(this)\n\
    }\n```\n\nwhere `R.id.map` points to the map’s ID inside `/res/layout/activity_maps.xml`.\n\
    \nNext, we add a callback that gets called when the map is loaded and ready to\
    \ receive commands. To do so, we extend the activity that handles the map to also\
    \ implement the interface `com.google.android.gms.maps.OnMapReadyCallback`:\n\n\
    ```kotlin\nclass MainActivity : AppCompatActivity(),\n    OnMapReadyCallback {\
    \ ... }\n```\n\nand add the callback implementation, for example:\n\n```kotlin\n\
