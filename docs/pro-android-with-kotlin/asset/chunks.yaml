    \    id 'com.google.gms.google-services'\n}\nandroid {\n    compileSdk 32\n  \
    \  defaultConfig {\n        applicationId \"book.andrkotlpro.example1\"\n    \
    \    minSdk 23\n        targetSdk 32\n        versionCode 1\n        versionName\
    \ \"1.0\"\n        testInstrumentationRunner \"androidx.test.runner.AndroidJUnitRunner\"\
    \n        vectorDrawables {\n            useSupportLibrary true\n        }\n \
    \   }\n    buildTypes {\n        release {\n            minifyEnabled false\n\
    \            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),\
    \ 'proguard-rules.pro'\n        }\n    }\n    compileOptions {\n        sourceCompatibility\
    \ JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8\n\
    \    }\n    kotlinOptions {\n        jvmTarget = '1.8'\n    }\n    buildFeatures\
    \ {\n        compose true\n    }\n    composeOptions {\n        kotlinCompilerExtensionVersion\
    \ compose_version\n    }\n    packagingOptions {\n        resources {\n      \
    \      excludes += '/META-INF/{AL2.0,LGPL2.1}'\n        }\n    }\n}\ndependencies\
    \ {\n    implementation 'androidx.core:core-ktx:1.7.0'\n    implementation \"\
    androidx.compose.ui:ui:$compose_version\"\n    implementation \"androidx.compose.material:material:$compose_version\"\
    \n    implementation \"androidx.compose.ui:ui-tooling-preview:$compose_version\"\
    \n    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.3.1'\n    implementation\
    \ 'androidx.activity:activity-compose:1.3.1'\n    implementation 'com.google.firebase:firebase-messaging:20.1.0'\n\
    \    testImplementation 'junit:junit:4.13.2'\n    androidTestImplementation 'androidx.test.ext:junit:1.1.3'\n\
    \    androidTestImplementation 'androidx.test.espresso:espresso-core:3.4.0'\n\
    \    androidTestImplementation \"androidx.compose.ui:ui-test-junit4:$compose_version\"\
    \n    debugImplementation \"androidx.compose.ui:ui-tooling:$compose_version\"\n\
    \    debugImplementation \"androidx.compose.ui:ui-test-manifest:$compose_version\"\
    \n}\n```\n\n（忽略 ¬ 及其后的换行符。）请注意，Gradle 中 `\"...\"` 字符串允许包含 `${}` 占位符，而 `'...'`\
    \ 字符串则不允许。除此之外，两者可以互换使用。\n\n其元素含义如下：\n\n*   `plugins { }` 各加载并应用 Android 和 Kotlin\
    \ 开发所需的 Gradle 插件。\n*   `android { }` 元素指定 Android 插件的设置。\n*   `dependencies {\
    \ }` 元素描述模块的依赖关系。`implementation` 关键字表示该依赖在编译模块和运行模块时都需要。后者意味着该依赖会被包含在 APK 文件中。类似\
    \ `\"xyzImplementation\"` 这样的标识符指的是名为 `\"xyz\"` 的构建类型或源代码集——你可以看到，对于 `src/test`\
    \ 下的单元测试，添加了 JUnit 库；而对于 `src/androidTest`，则同时使用了测试运行器和 Espresso。如果你引用的是构建类型或产品风味（将在后续章节详细介绍），可以用构建类型名称或产品风味名称替换\
    \ `\"xyz\"`。如果你想引用一个变体（即构建类型和产品风味的组合），你还必须在 `configurations { }` 元素内声明它，例如：\n\n\
    *   关于 `defaultConfig { }` 和 `buildTypes { }`，请参见后续章节。\n\n```groovy\nconfigurations\
    \ {\n    // flavor = \"free\", type = \"debug\"\n    freeDebugCompile {}\n}\n\
    ```\n\n`dependencies {...}` 部分中的其他关键字包括：\n\n*   **`implementation`** – 我们已经讨论过这个。它表示该依赖在编译和运行应用时都需要。\n\
    *   **`api`** – 与 `implementation` 相同，但额外允许该依赖泄露给应用的客户端。\n*   **`compile`** –\
    \ 这是 `api` 的旧别名，请勿使用。\n*   **`compileOnly`** – 该依赖仅编译时需要，但不会包含在应用中。这通常用于仅含源代码的库，例如源代码预处理器等。\n\
    *   **`runtimeOnly`** – 该依赖编译时不需要，但会包含在应用内部。\n\n请注意，变量 `compose_version` 是在项目的\
    \ `build.gradle` 文件中定义的：\n\n```groovy\nbuildscript {\n    ext {\n        compose_version\
    \ = '1.1.0-beta01'\n    }\n    dependencies {\n        classpath 'com.google.gms:google-services:4.3.3'\n\
    \    }\n}\n// 顶层构建文件，可在此添加适用于所有子项目/模块的配置选项。\nplugins {\n    id 'com.android.application'\
    \ version '7.2.1' apply false\n    id 'com.android.library' version '7.2.1' apply\
    \ false\n    id 'org.jetbrains.kotlin.android' version '1.5.31' apply false\n\
    }\ntask clean(type: Delete) {\n    delete rootProject.buildDir\n}\n```\n\n（请移除\
    \ `apply false` 前面的换行符。在此文件中，你还可以找到适用于所有项目模块的其他非常通用的设置。）\n\n## 模块通用配置\n\n模块 `build.gradle`\
    \ 文件中的 `defaultConfig { ... }` 元素指定了构建的配置设置，与所选变体无关（参见下一节）。可用的设置项可在 Android Gradle\
    \ DSL 参考文档中查阅，但常见配置如下：\n\n```groovy\ndefaultConfig {\n    // 用于发布的唯一标识符。\n   \
    \ applicationId 'com.example.myapp'\n    // 运行应用所需的最低 API 级别。\n    minSdk 23\n\
    \    // 用于测试应用的 API 级别。\n    targetSdk 32\n    // 应用的版本号。\n    versionCode 42\n\
    \    // 对用户友好的应用版本名称。\n    versionName \"42.0\"\n}\n```\n\n## 模块构建变体\n\n构建变体对应构建过程生成的不同\
    \ `.apk` 文件。构建变体的数量由下式给出：\n\n```\n构建变体数量 = (构建类型数量) x (产品风味数量)\n```\n\n在 Android\
    \ Studio 中，您可以通过菜单 **Build > Select Build Variant** 选择构建变体。在以下章节中，我们将描述什么是构建类型和产品风味。\n\
    \n## 构建类型\n\n```\n构建类型对应应用开发的不同阶段——在启动项目时，Android Studio 会为您设置两种构建类型：开发和发布。打开模块的\
    \ build.gradle 文件，你可以在 `android { ... }` 中看到：\n```\n\n```groovy\nbuildTypes {\n\
    \    release {\n        minifyEnabled false\n        proguardFiles getDefaultProguardFile('proguard-android.txt'),\
    \ 'proguard-rules.pro'\n    }\n}\n```\n\n（忽略 ¬ 及其后的换行符。）即使你没有看到 `\"debug\"` 类型，它也实际存在。它没有出现只是因为\
    \ `\"debug\"` 类型使用了其默认设置。如果需要更改默认设置，只需在此处添加一个 `\"debug\"` 部分，如下所示：\n\n```groovy\n\
    buildTypes {\n    release {\n        ...\n    }\n    debug {\n        ...\n  \
    \  }\n}\n```\n\n你不限于使用预定义的构建类型。可以像下面这样定义额外的构建类型：\n\n```groovy\nbuildTypes {\n\
    \    release {\n        ...\n    }\n    debug {\n        ...\n    }\n    integration\
    \ {\n        initWith debug\n        manifestPlaceholders = [hostName:\"internal.mycompany.com\"\
    ]\n        applicationIdSuffix \".integration\"\n    }\n}\n```\n\n这定义了一个新的构建类型\
    \ `\"integration\"`，它通过 `\"initWith\"` 继承了 `\"debug\"`，除此之外还添加了一个自定义的应用文件后缀，并为清单文件提供了一个占位符。你可以在此处指定的设置相当多——如果你在常用搜索引擎中输入“Android\
    \ Gradle plugin DSL reference”，就能找到它们。另一个我们尚未提及的标识符是 `proguardFiles`。它用于在分发应用之前，对要包含在应用中的文件进行过滤和/或混淆。如果你用它进行过滤，请首先权衡其收益与工作量——在当今设备上，节省几兆字节已不太重要。如果你打算用它进行混淆，请注意，如果你的代码或所引用的库使用了反射，这可能会引发问题。而且混淆并不能真正阻止劫持者在反编译后使用你的代码——它只是稍微增加了难度。因此，请仔细考虑使用\
    \ Proguard 的优势。如果你认为它符合你的需求，关于如何使用它的详细信息可以在在线文档中找到。"
- fmt: '# Product Flavors


    *Product flavors* allow distinctions between things like different *feature sets*
    or different *device requirements*, but you can draw the distinction wherever
    best suits you.


    By default Android Studio doesn''t prepare different product flavors for a new
    project or module – if you need them, you must add a `productFlavors { ... }`
    section inside the `android { ... }` element of file `build.gradle`. An example
    would be


    ```

    buildTypes {...}

    flavorDimensions "monetary"

    productFlavors {

    free {

    dimension "monetary"

    applicationIdSuffix ".free"

    versionNameSuffix "-free"

    }

    paid {

    dimension "monetary"

    applicationIdSuffix ".paid"

    versionNameSuffix "-paid"

    }

    }

    ```


    where the possible setting can be looked up in the Android Gradle DSL reference.
    This will lead to APKs of the form


    ```

    app-free-debug.apk

    app-paid-debug.apk

    app-free-release.apk

    app-paid-release.apk

    ```


    The dimensionality can even be extended. If you add more elements to the `flavorDimensions`
    line, for example, `flavorDimensions "monetary", "apilevel"`, you can add more
    flavors


    ```

    flavorDimensions "monetary", "apilevel"

    productFlavors {

    free {

    dimension "monetary" ... }

    paid {

    dimension "monetary" ... }

    sinceapi21 {

    dimension "apilevel"

    versionNameSuffix "-api21" ... }

    sinceapi24 {

    dimension "apilevel"

    versionNameSuffix "-api24" ... }

    }

    ```


    which in the end will give us the following set of APK files:


    ```

    app-free-api21-debug.apk

    app-paid-api21-debug.apk

    app-free-api21-release.apk

    app-paid-api21-release.apk

    app-free-api24-debug.apk

    app-paid-api24-debug.apk

    app-free-api24-release.apk

    app-paid-api24-release.apk

    ```


    To filter out certain variants of the possible variants, add a `variantFilter`
    element into the build file and write


    ```

    variantFilter { variant ->

    def names = variant.flavors*.name  // this is an array

    // To filter out variants, make a check here and then

    // do a "setIgnore(true)" if you don''t need a variant.

    // This is just an example:

    if (names.contains("sinceapi24") &&

    names.contains("free")) {

    setIgnore(true)

    }

    }

    ```


    # Source Sets


    If you create a project in Android Studio and switch to the "Project" view, you
    can see that there is a "main" folder inside the "src" folder. This corresponds
    to the "main" source set, which is the single source set configured and used by
    default. See Figure [12-1](#463716_2_En_12_Chapter.xhtml#Fig1).


    ![](images/463716_2_En_12_Chapter/463716_2_En_12_Fig1_HTML.jpg)


    An interface of a regular expression library of Gradle dot properties with the
    list of folders.


    **Figure 12-1** The "main" Source Set


    You can however have more sets, and they correspond to the build types, the product
    flavors, and the build variants. As soon as you add more source sets, a build
    will lead to merging the current build variant, the build type it includes, the
    product flavor it includes, and finally the "main" source set. To see which source
    sets will be included in a build, open the Gradle view on the right side of the
    window and run the `sourceSets` task. This will produce a long listing, and you
    can see entries like


    ```

    main

    Java sources: [app/src/main/java]

    debug

    Java sources: [app/src/debug/java]

    free

    Java sources: [app/src/free/java]

    freeSinceapi21

    Java sources: [app/src/freeSinceapi21/java]

    freeSinceapi21Debug

    Java sources: [app/src/freeSinceapi21Debug/java]

    freeSinceapi21Release

    Java sources: [app/src/freeSinceapi21Release/java]

    paid

    Java sources: [app/src/paid/java]

    paidSinceapi21

    Java sources: [app/src/paidSinceapi21/java]

    release

    Java sources: [app/src/release/java]

    sinceapi21

    Java sources: [app/src/sinceapi21/java]

    ```


    This will tell you that if you choose a build variant `freeSinceapi21Debug`, the
    build process will look into folders


    ```

    app/src/freeSinceapi21Debug/java

    app/src/freeSinceapi21/java

    app/src/free/java

    app/src/sinceapi21/java

    app/src/debug/java

    app/src/main/java

    ```


    for classes and likewise into the corresponding folders for resources, assets,
    and the `AndroidManifest.xml` file. While the Java or Kotlin classes must not
    repeat in such a build chain, the manifest files and resource and assets files
    will be merged by the build process.


    Inside the `dependencies { ... }` section of file `build.gradle`, you can dispatch
    dependencies according to build variants. Just add a camel-cased version of the
    source set in front of any of the settings there. For example, if for the `freeSinceapi21`
    variant you want to include a compile dependency `:mylib`, write


    ```

    freeSinceapi21Compile '':mylib''

    ```


    # Running a Build from the Console


    You don''t have to use Android Studio to build apps. While it is a good idea to
    bootstrap an app project using Android Studio, after this you can build the app
    using a terminal. This is what the Gradle wrapper scripts `gradlew` and `gradlew.bat`
    are for – the first one is for Linux, and the second one is for Windows. In the
    following paragraphs, we will have a look at some command line commands for Linux;
    if you have a Windows development machine, just use the BAT script instead.


    In the preceding sections, we have seen that the basic building blocks of each
    build consist of one or more tasks that get executed during the build. So we first
    want to know which tasks actually exist. For this aim, to list all tasks available,
    enter


    ```

    ./gradlew tasks

    ```


    This will give you an extensive list and some description of each task. In the
    following we will have a look at some of these tasks.


    To build the app APK file for build type "debug" or "release," enter one of


    ```

    ./gradlew assembleDebug

    ./gradlew assembleRelease

    ```


    which creates an APK file inside `<PROJECT>/<MODULE>/build/outputs`. Of course
    you can also specify any custom build type you defined inside `build.gradle`.


    To build the debug type APK and then install it on a connected device or emulator,
    enter


    ```

    ./gradlew installDebug

    ```


    where for the "Debug" part in the argument, you can substitute any build variant
    using the variant''s camel-cased name. This installs the app on connected devices.
    It does not automatically run it though – you have to do that manually! To install
    *and* run an app, please see Chapter [19](#463716_2_En_19_Chapter.xhtml).


    In case you want to find out which dependencies any of your app''s modules has,
    to see the dependency tree, enter


    ```

    ./gradlew dependencies :app:dependencies

    ```


    or with "app" substituted by the module name in question. This provides a rather
    lengthy listing, so you maybe want to pipe it into a file


    ```

    ./gradlew dependencies :app:dependencies > deps.txt

    ```


    and then investigate the result in an editor.


    # Signing


    Each app''s APK file needs to be signed before it can be run on a device. For
    the "debug" build type, a suitable signing configuration will be chosen for you
    automatically, so for the debugging development stage, you don''t need to care
    about signing.


    A release APK however needs a proper signing configuration. If you use Android
    Studio''s menu Build ➤ Generate Signed APK, Android Studio will help you create
    and/or use an appropriate key. But you can also specify the signing configuration
    inside the module''s `build.gradle` file. To do so, add a `signingConfigs { ...
    }` section as in


    ```

    android {

    ...

    defaultConfig {...}

    signingConfigs {

    release {

    storeFile file("myrelease.keystore")

    storePassword "passwd"

    keyAlias "MyReleaseKey"

    keyPassword "passwd"

    }

    }

    buildTypes {

    release {

    ...

    signingConfig signingConfigs.release

    }

    }

    }

    ```


    and also from inside the release build type refer to a signing config as shown
    at `signingConfig ...` inside the listing. The keystore you need to provide for
    that is a standard Java keystore – please see Java''s online documentation to
    learn how to build one. Or you let Android Studio help you create a keystore using
    the dialog that pops up when you chose Build ➤ Generate Signed APK in the menu.


