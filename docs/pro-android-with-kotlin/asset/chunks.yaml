    thr.start()\n}\n}\n}\n```\n\nThe other two methods\n, using a broadcast message\
    \ or a `ResultReceiver` class , get handled in\nChapters [5](#463716_2_En_5_Chapter.xhtml)\
    \ and [13](#463716_2_En_13_Chapter.xhtml).\n\nService Subclasses\nUp to now we\
    \ were always using the  `android.app.Service`\n as a base class for services\
    \ we described. There are other\nclasses supplied by Android usable as base classes\
    \ though, with\ndifferent semantics. For Android 8.0  (and\nabove), there are\
    \ not less than 20 service classes or base classes you\ncan use. You can see them\
    \ all if inside the Android API\ndocumentation,\n\nNote\n\nAt the time of writing\
    \ this book, you can find it at [ `https://developer.android.com/reference/android/app/Service.xhtml`\n\
    ](https://developer.android.com/reference/android/app/Service.xhtml) `.`\n\nyou\
    \ investigate “Known Direct Subclasses.” Outstanding are the following\nthree:\n\
    \n*   **android.app.Service**   : The one we’ve been\n    using so far. This is\
    \ the most basic service class. Unless you use\n    multithreading *inside* the\
    \ service class or the service is\n    explicitly configured to execute in another\
    \ process, the service will be\n    running inside the service caller’s main thread.\
    \ If this is the GUI\n    thread, and unless you expect the service invocation\
    \ to run really fast,\n    it is strongly recommended to send service activities\
    \ to a background\n    thread.\n\n*   **android.app.IntentService**   : While\
    \ a service by\n    design does not naturally handle incoming start requests simultaneously\n\
    \    to the main thread, an `IntentService` uses a\n    dedicated worker thread\
    \ to receive multiple start messages. Still it\n    uses just one thread to work\
    \ on start requests, so they get executed one\n    after the other. `IntentService`\
    \ classes  take care of\n    correctly stopping services, so you don’t need to\
    \ care about this\n    yourself. You have to provide the service’s work to be\
    \ done for each\n    start request inside an overwritten `onHandleIntent()`\n\
    \    method . Since\n    basically you don’t need anything else, `IntentService`\
    \ services  are very easy\n    to implement. Note that starting with Android 8.0\
    \ or API level 26,\n    restrictions apply to background processes – see section\
    \ “Background\n    Services” – so under appropriate circumstances, consider using\
    \  `JobIntentService`\n     classes instead.\n\n*   **android.support.v4.app.JobIntentService**\
    \    uses a  `JobScheduler` \n    to enqueue service execution requests. Starting\
    \ with Android 8.0 or API\n    level 26, consider using this service base class\
    \ for background\n    services. To implement such a service, you basically have\
    \ to create a\n    subclass of `JobIntentService` and\n    override the method\
    \ `onHandleWork(intent: Intent): Unit` to contain the service’s workload.\n\n\
    Services Lifecycle\nHaving described various service characteristics in the preceding\n\
    sections, the actual lifecycle  of a service\nfrom a bird’s-eye view is arguably\
    \ easier than that of an activity. But\nbe careful. Because of services being\
    \ able to run in the background and\nalso because services are more readily subject\
    \ to stops forced by the\nAndroid OS, they may require special attention in correspondence\
    \ with\nservice clients.\n\nIn your service implementation, you can overwrite\
    \ any of the lifecycle\ncallbacks\n\n*   onCreate()\n\n*   onStartCommand()\n\n\
    *   onBind()\n\n*   onUnbind()\n\n*   onRebind()\n\n*   onDestroy()\n\nat will,\
    \ for example, to log service invocation information while\ndeveloping or debugging.\
    \ Figure [4-1](#463716_2_En_4_Chapter.xhtml#Fig1) shows you an\noverview of the\
    \ lifecycle of a service.\n\n![](images/463716_2_En_4_Chapter/463716_2_En_4_Fig1_HTML.png)\n\
    \nA flowchart of the service lifecycle. Start and bind services to on\ncreate\
    \ of function to service active with different stages and ends with\non destroy\
    \ of function and service shut down.\n\nFigure 4-1\nServices Lifecycle\n\nMore\
    \ Service Characteristics\n\nMore observations \nfor services are as follows:\n\
    \n1.  Services get declared alongside with activities inside `AndroidManifest.xml`\n\
    \     . The question of\n    how they interact with each other comes up. Surely,\
    \ somebody needs to\n    invoke services in order to use them, but this can also\
    \ be done from\n    other services, other activities, or even other apps.\n\n\
    2.  Do not bind or unbind during an activity’s `onResume()` and `onPause()` for\n\
    \    performance and stability reasons. Do bind and unbind instead inside the\n\
    \    `onStart()` and\n    `onStop()`\n    methods, if you need to interact with\
    \ services only when an activity is\n    visible. If you need service connections\
    \ also when activities are\n    stopped and in the background, do bind and unbind\
    \ in the `onCreate()` and `onRestore()`\n    methods.\n\n3.  In remote connection\
    \ operations (the service lives in another app),\n    catch and handle `DeadObjectException`\n\
    \    exceptions.\n\n4.  If you overwrite a service’s `onStartCommand(intent: Intent,\
    \ flags: Int, startId: Int)` method , first make sure\n    to also call method\
    \ `super.onStartCommand()`\n    unless you have good reasons not to do that. Next,\
    \ appropriately react\n    on the incoming `flags` parameter,\n    which tells\
    \ whether this is an automatic follow-up start request because\n    a previous\
    \ start attempt failed. See the API documentation for details.\n    Eventually\
    \ this method returns an integer describing the service’s state\n    after leaving\
    \ the `onStartCommand()`\n    method  – see the\n    API documentation for details.\n\
    \n5.  Calling  `stopService()` \n    from outside a service or `stopSelf()` from\n\
    \    inside a service does not guarantee that the service gets stopped\n    immediately.\
    \ Expect the service to hang around for a little while until\n    Android really\
    \ stops it.\n\n6.  If a service \n    is not designed to react on binding requests,\
    \ if you overwrite the `onBind()` method  of the service,\n    it should return\
    \ `null`.\n\n7.  While not forbidden explicitly, for a service that is designed\
    \ for\n    communicating with service clients via binding, consider disallowing\
    \ the\n    service to be started by \n    `startService()`\n    . In this case\
    \ you *must* provide the `Context.BIND_AUTO_CREATE`\n    flag in the `bindService()`\
    \ method\n    call.\n\n5. Broadcasts"
  trans: "\n```kotlin\ninternal class IncomingHandler(val ctx: Context) : Handler()\
    \ {\n    override fun handleMessage(msg: Message) {\n        val s = msg.data.getString(\"\
    MyString\")\n        val repl = msg.replyTo\n        Toast.makeText(ctx, s, Toast.LENGTH_SHORT).show()\n\
    \        Log.e(\"IncomingHandler\", \"!!! \" + s)\n        Log.e(\"IncomingHandler\"\
    , \"!!! replyTo = \" + repl)\n        // 如果不为 null，我们现在可以使用 'repl' 向客户端发送消息。\n\
    \        // 当然，我们也可以将其保存到其他地方以便稍后使用\n        if (repl != null) {\n           \
    \ val thr = Thread(object : Runnable {\n                override fun run() {\n\
    \                    Thread.sleep(3000)\n                    val msg = Message.obtain()\n\
    \                    val bundle = Bundle()\n                    bundle.putString(\"\
    MyString\", \"一条要发送的回复消息\")\n                    msg.data = bundle\n         \
    \           repl?.send(msg)\n                }\n            })\n            thr.start()\n\
    \        }\n    }\n}\n```\n\n另外两种方法，即使用广播消息或`ResultReceiver`类，将在第 5 章和第 13 章中介绍。\n\
    \n## 服务的子类\n\n到目前为止，我们一直使用`android.app.Service`作为所描述服务的基类。不过，Android 还提供了其他可用作基类的类，它们具有不同的语义。对于\
    \ Android 8.0（及更高版本），可用的服务类或基类不少于 20 个。你可以在 Android API 文档中查看它们全部：\n\n> **注意**\
    \  \n> 在本书撰写时，你可以在 [`https://developer.android.com/reference/android/app/Service.xhtml`](https://developer.android.com/reference/android/app/Service.xhtml)\
    \ 找到它。\n\n请查看“已知直接子类”。以下三个尤为突出：\n\n- **`android.app.Service`** ：这是我们迄今为止一直在使用的类。这是最基本的服务类。除非你在服务类*内部*使用多线程，或者服务被显式配置为在另一个进程中执行，否则该服务将在服务调用者的主线程内运行。如果这是\
    \ GUI 线程，并且除非你期望服务调用运行得非常快，否则强烈建议将服务活动发送到后台线程。\n\n- **`android.app.IntentService`**\
    \ ：虽然服务在设计上自然不会同时处理主线程的传入启动请求，但`IntentService`使用一个专用工作线程来接收多个启动消息。但它仍然只使用一个线程来处理启动请求，因此这些请求会一个接一个地执行。`IntentService`类负责正确停止服务，因此你无需自己操心。你需要在重写的`onHandleIntent()`方法中提供每个启动请求所需完成的服务工作。由于基本上你不需要其他任何东西，因此`IntentService`服务非常容易实现。请注意，从\
    \ Android 8.0 或 API 级别 26 开始，对后台进程有限制——请参阅“后台服务”一节——因此在适当的情况下，请考虑改用`JobIntentService`类。\n\
    \n- **`android.support.v4.app.JobIntentService`** 使用`JobScheduler`对服务执行请求进行排队。从\
    \ Android 8.0 或 API 级别 26 开始，对于后台服务，请考虑使用此服务基类。要实现这样的服务，你基本上需要创建一个`JobIntentService`的子类，并重写`onHandleWork(intent:\
    \ Intent): Unit`方法来包含服务的工作负载。\n\n## 服务的生命周期\n\n在前面几节中描述了各种服务特性之后，从宏观角度来看，服务的实际生命周期可以说比活动的生命周期更简单。但需要小心。由于服务能够在后台运行，并且服务更容易受到\
    \ Android 操作系统强制停止的影响，因此它们可能需要与服务客户端进行特殊关注。\n\n在你的服务实现中，你可以随意重写任何生命周期回调方法：\n\n\
    - `onCreate()`\n- `onStartCommand()`\n- `onBind()`\n- `onUnbind()`\n- `onRebind()`\n\
    - `onDestroy()`\n\n例如，在开发或调试时记录服务调用信息。图 4-1 向您展示了服务生命周期的概览。\n\n![](img/463716_2_En_4_Fig1_HTML.png)\n\
    \n服务生命周期的流程图。启动和绑定服务到创建函数，服务激活经历不同阶段，并以销毁函数和服务关闭结束。\n\n**图 4-1** 服务的生命周期\n\n##\
    \ 更多服务特性\n\n关于服务的更多要点如下：\n\n1. 服务与活动一起在`AndroidManifest.xml`中声明。它们如何相互交互的问题随之而来。当然，需要有人调用服务才能使用它们，但这也可以从其他服务、其他活动甚至其他应用程序中完成。\n\
    \n2. 出于性能和稳定性的原因，不要在活动的`onResume()`和`onPause()`期间绑定或解绑服务。如果你只需要在活动可见时与服务交互，请在`onStart()`和`onStop()`方法内部进行绑定和解绑。如果在活动停止并在后台运行时也需要服务连接，请在`onCreate()`和`onRestore()`方法中进行绑定和解绑。\n\
    \n3. 在远程连接操作中（服务位于另一个应用程序中），捕获并处理`DeadObjectException`异常。\n\n4. 如果你重写服务的`onStartCommand(intent:\
    \ Intent, flags: Int, startId: Int)`方法，首先确保也调用`super.onStartCommand()`方法，除非你有充分的理由不这样做。接下来，适当地对传入的`flags`参数做出反应，该参数指示这是否是因为先前的启动尝试失败而自动进行的后续启动请求。有关详细信息，请参阅\
    \ API 文档。最终，此方法返回一个整数，描述离开`onStartCommand()`方法后服务的状态——有关详细信息，请参阅 API 文档。\n\n5.\
    \ 从服务外部调用`stopService()`或从服务内部调用`stopSelf()`并不能保证服务立即停止。预计服务会继续存在一小段时间，直到 Android\
    \ 真正停止它。\n\n6. 如果服务的用途不是响应绑定请求，那么如果你重写了服务的`onBind()`方法，它应该返回`null`。\n\n7. 虽然没有明确禁止，但对于一个旨在通过绑定与服务客户端进行通信的服务，请考虑禁止通过`startService()`启动该服务。在这种情况下，你*必须*在`bindService()`方法调用中提供`Context.BIND_AUTO_CREATE`标志。\n\
    \n## 5. 广播\n"
- fmt: "# Android Broadcasts\n\nAndroid broadcasts are messages following the publish-subscribe\
    \ pattern. They are sent across the Android OS, with the internals hidden by the\
    \ Android OS, so both publishers and subscribers only see a lean asynchronous\
    \ interface for sending and receiving messages. Broadcasts can be published by\
    \ the Android OS itself, by standard apps, and by any other app installed on the\
    \ system. Likewise, any app can be configured or programmed to receive broadcast\
    \ messages it is interested in. As with activities, broadcasts can be explicitly\
    \ or implicitly routed – whichever is used is the responsibility of the broadcast\
    \ sender.\n\nBroadcast receivers are declared either in the `AndroidManifest.xml`\
    \ file or programmatically. Starting with Android 8.0 or API level 26, the developers\
    \ of Android have abandoned the usual symmetry between XML and programmatic declaration\
    \ of broadcast receivers for implicit `Intents`. The reason is the general idea\
    \ of imposing restrictions on processes running in background mode – such processes,\
    \ especially related to broadcasts, resulted in a high load on the Android OS,\
    \ making devices slow down considerably and leading to a bad user experience.\
    \ For that reason the declaration of broadcast receivers inside `AndroidManifest.xml`\
    \ is now limited to a smaller set of use cases. See the following section “Implicit\
    \ Broadcasts.”\n\n> **Note**\n>\n> We want to write modern apps runnable also\
    \ on Android 8.0 and later. For that reason take this broadcast limits for implicit\
    \ `Intents` serious and make your app live with those limitations.\n\n## Explicit\
    \ Broadcasts\n\nAn explicit broadcast is a broadcast published in such a way that\
    \ there is exactly one receiver addressed by it. This usually makes sense only\
    \ if both broadcast publishers and subscribers are part of the same app or, less\
    \ frequently, part of the same app collection if there is a strong functional\
    \ dependency among them.\n\nAlso, there is a difference between local and remote\
    \ broadcasts: Local broadcast receivers *must* reside in the same app, they run\
    \ fast, and these receivers cannot be declared inside `AndroidManifest.xml`. Instead,\
    \ a programmatic registration method must be used for local broadcast receivers.\
    \ Also, you must use\n\n```\n// send local broadcast\nLocalBroadcastManager.getInstance(Context).\n\
    sendBroadcast(...)\n```\n\nto send local broadcast messages. Remote broadcast\
    \ receivers on the other hand *can* reside in the same app, they are slower, and\
    \ it is possible to use `AndroidManifest.xml` to declare them. To send remote\
    \ broadcasts, you write\n\n```\n// send remote broadcast (this App or other Apps)\n\
    sendBroadcast(...)\n```\n\n> **Note**\n>\n> Local broadcasts should be favored\
    \ over remote broadcasts for performance reasons. The apparent disadvantage that\
    \ you cannot use `AndroidManifest.xml` to declare local receivers does not weigh\
    \ too much, since starting with Android 8.0 or API level 26, the use cases of\
    \ declaring broadcast receivers inside the manifest files are limited anyways.\n\
    \n### Explicit Local Broadcasts\n\nTo send a local broadcast message to a local\
    \ broadcast receiver inside the same app, you write\n\n```\nval intent = Intent(this,\
    \ MyReceiver::class.java)\nintent.action = \"de.pspaeth.simplebroadcast.DO_STH\"\
    \nintent.putExtra(\"myExtra\", \"myExtraVal\")\nLog.e(\"LOG\", \"Sending broadcast\"\
    )\nLocalBroadcastManager.getInstance(this).\nsendBroadcast(intent)\nLog.e(\"LOG\"\
    , \"Broadcast sent\")\n```\n\nwhere `MyReceiver` is the receiver class:\n\n```\n\
    class MyReceiver : BroadcastReceiver() {\noverride\nfun onReceive(context: Context?,\
    \ intent: Intent?) {\nToast.makeText(context, \"Intent Detected.\",\nToast.LENGTH_LONG).show()\n\
    Log.e(\"LOG\", \"Received broadcast\")\nThread.sleep(3000)\n// or real work of\
    \ course...\nLog.e(\"LOG\", \"Broadcast done\")\n}\n}\n```\n\nFor local broadcasts\
    \ the receiver *must* be declared inside the code. To avoid a resource leakage,\
    \ we create and register the receiver inside `onCreate()` and unregister it inside\
    \ `onDestroy()`:\n\n```\nclass MainActivity : AppCompatActivity() {\nprivate var\
    \ bcReceiver:BroadcastReceiver? = null\noverride fun onCreate(savedInstanceState:\
    \ Bundle?) {\nsuper.onCreate(savedInstanceState)\n// ...\nbcReceiver = MyReceiver()\n\
    val ifi:IntentFilter =\nIntentFilter(\"de.pspaeth.myapp.DO_STH\")\nLocalBroadcastManager.getInstance(this).\n\
    registerReceiver(bcReceiver, ifi)\n}\noverride fun onDestroy() {\nsuper.onDestroy()\n\
    // ...\nLocalBroadcastManager.getInstance(this).\nunregisterReceiver(bcReceiver)\n\
    }\n}\n```\n\n### Explicit Remote Broadcasts\n\nWe already pointed out that we\
    \ can send broadcast messages of the *remote* type to other apps or to the same\
    \ app where the receivers live. The difference is how the data is sent – for remote\
    \ messages the data goes through an IPC channel. Now to send such remote broadcast\
    \ messages to the same app, you write\n\n```\nval intent = Intent(this, MyReceiver::class.java)\n\
    intent.action = \"de.pspaeth.myapp.DO_STH\"\nintent.putExtra(\"myExtra\", \"myExtraVal\"\
    )\nsendBroadcast(intent)\n```\n\nOn the receiving side, for remote messages the\
    \ receiver *must* be declared inside the manifest file:\n\n```\n<receiver android:name=\"\
    .MyReceiver\" />\n```\n\nLooking at the differences between local and remote broadcasts,\
    \ it is helpful to keep the following in mind:\n\n- **Local explicit broadcasts**\
    \  \n  Sender uses explicit receiver class, receiver must be declared programmatically,\
    \ and both sender and receiver use the `LocalBroadcastManager` to send messages\
    \ and to register the receiver.\n\n- **Remote explicit broadcasts**  \n  Sender\
    \ uses explicit receiver class, and receiver must be declared in `AndroidManifest.xml`.\n\
    \nFor the class that is responsible to handle received broadcasts, there is no\
    \ difference compared to that of explicit local broadcasts:\n\n```\nclass MyReceiver\
    \ : BroadcastReceiver() {\noverride\nfun onReceive(context: Context?, intent:\
    \ Intent?) {\n// handle incoming broadcasts...\n}\n}\n```\n\n### Explicit Broadcasts\
    \ Sent to Other Apps\n\nThe senders and receivers of explicit broadcasts can live\
    \ in different apps. In order for this to work, we can no longer use the intent\
    \ constructor we used earlier:\n\n```\nval intent = Intent(this, MyReceiver::class.java)\n\
    intent.action = \"de.pspaeth.myapp.DO_STH\"\n// add other coords...\nsendBroadcast(intent)\n\
    ```\n\nThis is because the receiving class, here `MyReceiver`, is not part of\
    \ the class path. There is however another construct we can use instead\n\n```\n\
    val intent = Intent()\nintent.component = ComponentName(\"de.pspaeth.xyz\",\n\"\
    de.pspaeth.xyz.MyReceiver\")\nintent.action = \"de.pspaeth.simplebroadcast.DO_STH\"\
    \n// add other coords...\nsendBroadcast(intent)\n```\n\nwhere the first argument\
    \ to `ComponentName` is the package string of the receiving package and the second\
    \ argument is the class name there.\n\n> **Caution**\n>\n> Unless you are broadcasting\
    \ to apps that have been built by yourself as well, this way of sending explicit\
    \ broadcasts is of limited use only. The developer of the other app may easily\
    \ decide to change class names, so then your communication to the other app using\
    \ broadcasts will be broken.\n\n## Implicit Broadcasts\n\nImplicit broadcasts\
    \ are broadcasts with an undefined number of possible receivers. For explicit\
    \ broadcasts we learned that we have to build the corresponding `Intents` by using\
    \ the constructor, which point to the recipient component: `val intent = Intent(this,\
    \ TheReceiverClass::class.java)`. Contrary to that, for an implicit broadcast,\
    \ we no longer specify the recipient, but instead give hints on which components\
    \ might be interested to receive it. For example, in\n\n```\nval intent = Intent()\n\
    intent.action = \"de.pspaeth.myapp.DO_STH\"\nsendBroadcast(intent)\n```\n\nwe\
    \ actually express the following: \"Send a broadcast message to all receivers\
    \ that are interested in action 'de.pspaeth.myapp.DO_STH'.\" The Android OS determines\
    \ which components are eligible to receive such broadcast message then – this\
    \ might result in zero, one, or many actual recipients.\n\nThere are three decisions\
    \ you must take before you start programming implicit broadcasts:\n\n1. **Do we\
    \ want to listen to system broadcasts?**"
