    , \"myExtraVal\")\nLog.e(\"LOG\", \"Sending broadcast\")\nLocalBroadcastManager.getInstance(this).\n\
    sendBroadcast(intent)\nLog.e(\"LOG\", \"Broadcast sent\")\n```\n\nwhere `MyReceiver`\
    \ is the\nreceiver class:\n\n```\nclass MyReceiver : BroadcastReceiver() {\noverride\n\
    fun onReceive(context: Context?, intent: Intent?) {\nToast.makeText(context, \"\
    Intent Detected.\",\nToast.LENGTH_LONG).show()\nLog.e(\"LOG\", \"Received broadcast\"\
    )\nThread.sleep(3000)\n// or real work of course...\nLog.e(\"LOG\", \"Broadcast\
    \ done\")\n}\n}\n```\n\nFor local broadcasts\n   the\nreceiver *must* be declared\
    \ inside the code. To avoid a resource\nleakage, we create and register the receiver\
    \ inside `onCreate()` and\nunregister it inside `onDestroy()`:\n\n```\nclass MainActivity\
    \ : AppCompatActivity() {\nprivate var bcReceiver:BroadcastReceiver? = null\n\
    override fun onCreate(savedInstanceState: Bundle?) {\nsuper.onCreate(savedInstanceState)\n\
    // ...\nbcReceiver = MyReceiver()\nval ifi:IntentFilter =\nIntentFilter(\"de.pspaeth.myapp.DO_STH\"\
    )\nLocalBroadcastManager.getInstance(this).\nregisterReceiver(bcReceiver, ifi)\n\
    }\noverride fun onDestroy() {\nsuper.onDestroy()\n// ...\nLocalBroadcastManager.getInstance(this).\n\
    unregisterReceiver(bcReceiver)\n}\n}\n```\n\nExplicit Remote Broadcasts\n\nWe\
    \ already pointed out that we can send broadcast messages of the  *remote*   \
    \ type to other apps or\nto the same app where the receivers live. The difference\
    \ is how the data\nis sent – for remote messages the data goes through an IPC\
    \ channel. Now\nto send such remote broadcast messages to the same app, you write\n\
    \n```\nval intent = Intent(this, MyReceiver::class.java)\nintent.action = \"de.pspaeth.myapp.DO_STH\"\
    \nintent.putExtra(\"myExtra\", \"myExtraVal\")\nsendBroadcast(intent)\n```\n\n\
    On the receiving side, for remote messages the receiver *must* be\ndeclared inside\
    \ the manifest file:\n\n```\n...\n\n```\n\nLooking at the differences between\
    \ local and remote broadcasts, it is\nhelpful to keep the following in mind:\n\
    \n*   **Local\n    explicit broadcasts**\n\nSender uses explicit receiver class,\
    \ receiver must be declared\nprogrammatically, and both sender and receiver use\
    \ the `LocalBroadcastManager`\nto send messages and to register the receiver.\n\
    \n*   **Remote\n    explicit broadcasts**\n\nSender uses explicit receiver class,\
    \ and receiver must be declared in\n`AndroidManifest.xml`.\n\nFor the class that\
    \ is responsible to handle received broadcasts, there\nis no difference \n  compared\
    \ to that\nof explicit local broadcasts:\n\n```\nclass MyReceiver : BroadcastReceiver()\
    \ {\noverride\nfun onReceive(context: Context?, intent: Intent?) {\n// handle\
    \ incoming broadcasts...\n}\n}\n```\n\nExplicit Broadcasts Sent to Other Apps\n\
    \nThe senders and receivers\n of explicit broadcasts can live in different apps.\
    \ In order for\nthis to work, we can no longer use the intent constructor we used\n\
    earlier:\n\n```\nval intent = Intent(this, MyReceiver::class.java)\nintent.action\
    \ = \"de.pspaeth.myapp.DO_STH\"\n// add other coords...\nsendBroadcast(intent)\n\
    ```\n\nThis is because the receiving class, here  `MyReceiver` ,\nis not part\
    \ of the class path. There is however another construct we can\nuse instead\n\n\
    ```\nval intent = Intent()\nintent.component = ComponentName(\"de.pspaeth.xyz\"\
    ,\n\"de.pspaeth.xyz.MyReceiver\")\nintent.action = \"de.pspaeth.simplebroadcast.DO_STH\"\
    \n// add other coords...\nsendBroadcast(intent)\n```\n\nwhere the first argument\
    \ to  `ComponentName` \nis the package string of the receiving package and the\
    \ second argument\nis the class name there.\n\nCaution\n\nUnless you are broadcasting\
    \ to apps that have been built by yourself\nas well, this way of sending explicit\
    \ broadcasts is of limited use only.\nThe developer of the other app may easily\
    \ decide to change class names,\nso then your communication to the other app using\
    \ broadcasts will be\nbroken.\n\nImplicit Broadcasts\n\nImplicit broadcasts\n\
    \ are broadcasts with an undefined number of possible receivers.\nFor explicit\
    \ broadcasts we learned that we have to build the\ncorresponding Intents by using\
    \ the constructor, which point to the recipient component :\n`val intent = Intent(this,\
    \ TheReceiverClass::class.java)`. Contrary to that, for\nan implicit broadcast,\
    \ we no longer specify the recipient, but instead\ngive hints on which components\
    \ might be interested to receive it. For\nexample, in\n\n```\nval intent = Intent()\n\
    intent.action = \"de.pspaeth.myapp.DO_STH\"\nsendBroadcast(intent)\n```\n\nwe\
    \ actually express the following: “Send a broadcast message to all\nreceivers\
    \ that are interested in action ’de.pspaeth.myapp.DO_STH’.” The\nAndroid OS determines\
    \ which components are eligible to receive such\nbroadcast message then – this\
    \ might result in zero, one, or many actual\nrecipients.\n\nThere are three decisions\n\
    \ you must take before you start programming implicit broadcasts:\n\n1.  **Do\
    \ we want to listen to system broadcasts?**"
  trans: "\n# Android 广播\n\nAndroid 广播是遵循发布-订阅模式的消息。它们在整个 Android 操作系统中发送，其内部机制由 Android\
    \ 系统隐藏，因此发布者和订阅者都只能看到一个用于发送和接收消息的简洁异步接口。广播可以由 Android 系统本身、标准应用以及系统上安装的任何其他应用发布。同样，任何应用都可以被配置或编程为接收其感兴趣的广播消息。与活动类似，广播可以是显式或隐式路由的——具体使用哪种方式由广播发送者决定。\n\
    \n广播接收器可以在 `AndroidManifest.xml` 文件中声明，也可以通过编程方式声明。从 Android 8.0 或 API 级别 26 开始，Android\
    \ 开发者放弃了在 XML 和编程方式声明隐式 `Intent` 的广播接收器之间通常存在的对称性。原因是出于对后台运行进程施加限制的总体思路——这类进程，尤其是与广播相关的进程，会导致\
    \ Android 系统负载过高，使设备运行速度显著变慢，并导致用户体验不佳。因此，现在在 `AndroidManifest.xml` 内部声明广播接收器仅限于较少的用例。请参见下一节“隐式广播”。\n\
    \n> **注意**\n>\n> 我们希望编写也能在 Android 8.0 及更高版本上运行的现代应用。因此，请认真对待隐式 `Intent` 的这些广播限制，让您的应用适应这些限制。\n\
    \n## 显式广播\n\n显式广播是一种以明确指定唯一接收器的方式发布的广播。这通常仅在广播发布者和订阅者属于同一个应用时才有意义，或者较少情况下，当它们属于同一个应用集合且彼此之间存在强功能依赖关系时才有意义。\n\
    \n此外，本地广播和远程广播之间存在差异：本地广播接收器*必须*位于同一个应用中，它们运行速度快，并且不能在 `AndroidManifest.xml` 内部声明。相反，必须使用编程注册方法来注册本地广播接收器。此外，你必须使用\n\
    \n```\n// 发送本地广播\nLocalBroadcastManager.getInstance(Context).\nsendBroadcast(...)\n\
    ```\n\n来发送本地广播消息。另一方面，远程广播接收器*可以*位于同一个应用中，它们速度较慢，并且可以使用 `AndroidManifest.xml`\
    \ 来声明它们。要发送远程广播，你可以编写\n\n```\n// 发送远程广播（此应用或其他应用）\nsendBroadcast(...)\n```\n\n\
    > **注意**\n>\n> 出于性能原因，应优先选择本地广播而非远程广播。不能使用 `AndroidManifest.xml` 声明本地接收器这一明显缺点影响并不大，因为从\
    \ Android 8.0 或 API 级别 26 开始，在清单文件中声明广播接收器的用例无论如何都已经受到限制了。\n\n### 显式本地广播\n\n要向同一应用内的本地广播接收器发送本地广播消息，你可以编写\n\
    \n```\nval intent = Intent(this, MyReceiver::class.java)\nintent.action = \"de.pspaeth.simplebroadcast.DO_STH\"\
    \nintent.putExtra(\"myExtra\", \"myExtraVal\")\nLog.e(\"LOG\", \"Sending broadcast\"\
    )\nLocalBroadcastManager.getInstance(this).\nsendBroadcast(intent)\nLog.e(\"LOG\"\
    , \"Broadcast sent\")\n```\n\n其中 `MyReceiver` 是接收器类：\n\n```\nclass MyReceiver\
    \ : BroadcastReceiver() {\noverride\nfun onReceive(context: Context?, intent:\
    \ Intent?) {\nToast.makeText(context, \"Intent Detected.\",\nToast.LENGTH_LONG).show()\n\
    Log.e(\"LOG\", \"Received broadcast\")\nThread.sleep(3000)\n// 当然也可以是实际工作...\n\
    Log.e(\"LOG\", \"Broadcast done\")\n}\n}\n```\n\n对于本地广播，接收器*必须*在代码内部声明。为避免资源泄漏，我们在\
    \ `onCreate()` 中创建并注册接收器，并在 `onDestroy()` 中注销它：\n\n```\nclass MainActivity : AppCompatActivity()\
    \ {\nprivate var bcReceiver:BroadcastReceiver? = null\noverride fun onCreate(savedInstanceState:\
    \ Bundle?) {\nsuper.onCreate(savedInstanceState)\n// ...\nbcReceiver = MyReceiver()\n\
    val ifi:IntentFilter =\nIntentFilter(\"de.pspaeth.myapp.DO_STH\")\nLocalBroadcastManager.getInstance(this).\n\
    registerReceiver(bcReceiver, ifi)\n}\noverride fun onDestroy() {\nsuper.onDestroy()\n\
    // ...\nLocalBroadcastManager.getInstance(this).\nunregisterReceiver(bcReceiver)\n\
    }\n}\n```\n\n### 显式远程广播\n\n我们已经指出，可以将*远程*类型的广播消息发送到其他应用或接收器所在的同一应用。区别在于数据的发送方式——对于远程消息，数据通过\
    \ IPC 通道传输。现在，要将此类远程广播消息发送到同一应用，你可以编写\n\n```\nval intent = Intent(this, MyReceiver::class.java)\n\
    intent.action = \"de.pspaeth.myapp.DO_STH\"\nintent.putExtra(\"myExtra\", \"myExtraVal\"\
    )\nsendBroadcast(intent)\n```\n\n在接收端，对于远程消息，接收器*必须*在清单文件中声明：\n\n```\n<receiver\
    \ android:name=\".MyReceiver\" />\n```\n\n审视本地广播和远程广播之间的差异时，牢记以下几点会很有帮助：\n\n-\
    \   **显式本地广播**  \n    发送者使用显式接收器类，接收器必须通过编程方式声明，并且发送者和接收者都使用 `LocalBroadcastManager`\
    \ 来发送消息和注册接收器。\n\n-   **显式远程广播**  \n    发送者使用显式接收器类，接收器必须在 `AndroidManifest.xml`\
    \ 中声明。\n\n对于负责处理已接收广播的类，与显式本地广播的类相比没有区别：\n\n```\nclass MyReceiver : BroadcastReceiver()\
    \ {\noverride\nfun onReceive(context: Context?, intent: Intent?) {\n// 处理传入的广播...\n\
    }\n}\n```\n\n### 发送到其他应用的显式广播\n\n显式广播的发送者和接收者可以位于不同的应用中。为了使其工作，我们不能再使用之前使用的 Intent\
    \ 构造器：\n\n```\nval intent = Intent(this, MyReceiver::class.java)\nintent.action\
    \ = \"de.pspaeth.myapp.DO_STH\"\n// 添加其他参数...\nsendBroadcast(intent)\n```\n\n\
    这是因为接收类（此处为 `MyReceiver`）不在类路径中。然而，我们可以使用另一种构造方式\n\n```\nval intent = Intent()\n\
    intent.component = ComponentName(\"de.pspaeth.xyz\",\n\"de.pspaeth.xyz.MyReceiver\"\
    )\nintent.action = \"de.pspaeth.simplebroadcast.DO_STH\"\n// 添加其他参数...\nsendBroadcast(intent)\n\
    ```\n\n其中，`ComponentName` 的第一个参数是接收方应用的包名字符串，第二个参数是该应用中的类名。\n\n> **警告**\n>\n>\
    \ 除非你是在向同样由你自己构建的应用发送广播，否则这种发送显式广播的方式用途有限。其他应用的开发者可能很容易决定更改类名，从而导致你与该应用之间使用广播进行的通信中断。\n\
    \n## 隐式广播\n\n隐式广播是具有未定义数量潜在接收器的广播。对于显式广播，我们了解到必须使用指向接收组件的构造器来构建相应的 `Intent`：`val\
    \ intent = Intent(this, TheReceiverClass::class.java)`。与此相反，对于隐式广播，我们不再指定接收者，而是提供哪些组件可能对其感兴趣的提示。例如，在\n\
    \n```\nval intent = Intent()\nintent.action = \"de.pspaeth.myapp.DO_STH\"\nsendBroadcast(intent)\n\
    ```\n\n中，我们实际上表达了以下含义：“向所有对动作 'de.pspaeth.myapp.DO_STH' 感兴趣的接收器发送一条广播消息。”然后，Android\
    \ 系统会确定哪些组件有资格接收此类广播消息——这可能不会找到接收者，也可能找到一个或许多个实际接收者。\n\n在开始编写隐式广播程序之前，你必须做出三项决定：\n\
    \n1.  **我们是否想要监听系统广播？**\n"
- fmt: 'Android 预定义了大量的广播消息类型。在您随 Android Studio 一起安装的 Android SDK 中，更确切地说，在`SDK_INST_DIR/platforms/VERSION/data/broadcast_actions.txt`路径下，您可以找到系统广播操作的列表。如果我们想要监听此类消息，只需按照下文“接收隐式广播”和“监听系统广播”章节所述，编写相应的广播接收器即可。在在线文本伴读的“系统广播”章节中，您将找到系统广播的完整列表。


    ## 如何对广播消息类型进行分类？


    广播发送者和广播接收者基于 Intent 过滤器匹配来加入，这与 Activity 的方式相同，如第[3](#463716_2_En_3_Chapter.xhtml)章“Intent
    过滤器”部分所述。广播的分类同样分为三类：首先，您有一个必须的“操作”说明符；其次，一个“类别”说明符；第三，一个“数据和类型”说明符。您可以使用这些来定义过滤器。我们将在下文描述此匹配过程。


    ## 我们使用本地广播还是远程广播？


    如果所有广播都完全在您的应用内部发生，您应该使用本地广播来发送和接收消息。对于隐式广播，这种情况可能不常见，但对于大型复杂应用，这完全是可以接受的。如果涉及系统广播或来自其他应用的广播，则*必须*使用远程广播。后者是大多数示例中的默认情况，因此您会经常看到这种模式。


    ## Intent 过滤器匹配


    广播接收器通过声明*操作*、*类别*和*数据说明符*来表示它们接受哪些广播。


    我们首先讨论*操作*。从表面上看，它们只是一些字符串，没有任何语法限制。但更仔细地观察，我们会发现它们首先是一组或多或少严格定义的预定义操作名称。我们已将它们全部列在第[3](#463716_2_En_3_Chapter.xhtml)章的“Intent
    过滤器”部分。此外，您也可以定义自己的操作。惯例是使用您的包名，加上一个点号，然后跟上操作说明符。您不必强制遵守此惯例，但强烈建议这样做，这样您的应用就不会与其他应用冲突。在不指定其他过滤器条件的情况下，指定了与过滤器中特定操作相匹配的发送者将到达所有匹配的接收器：


    - 要使 Intent 过滤器匹配，接收方指定的*操作*必须与发送方指定的*操作*匹配。对于隐式广播，一个广播可能寻址零个、一个或多个接收器。

    - 一个接收器可以指定多个过滤器。如果其中一个过滤器包含指定的*操作*，则该特定过滤器将匹配该广播。


    示例如表 5-1 所示。


    **表 5-1 操作匹配**


    | 接收器 | 发送器 | 匹配 |

    | :--- | :--- | :--- |

    | 单个过滤器 操作 = `com.xyz.ACTION1` | 操作 = `com.xyz.ACTION1` | 是 |

    | 单个过滤器 操作 = `com.xyz.ACTION1` | 操作 = `com.xyz.ACTION2` | 否 |

    | 两个过滤器 操作 = `com.xyz.ACTION1` 操作 = `com.xyz.ACTION2` | 操作 = `com.xyz.ACTION1`
    | 是 |

    | 两个过滤器 操作 = `com.xyz.ACTION1` 操作 = `com.xyz.ACTION2` | 操作 = `com.xyz.ACTION3`
    | 否 |


    除了*操作*之外，还可以使用*类别*说明符来限制 Intent 过滤器。我们有一些预定义的类别，列在第[3](#463716_2_En_3_Chapter.xhtml)章的“Intent
    过滤器”部分，但您同样可以定义自己的类别。并且与*操作*一样，对于您自己的*类别*，您应该遵循命名惯例，即在类别名称前加上应用包名。在 Intent 匹配过程中，一旦找到*操作*的匹配项，发送方声明的所有类别也必须出现在接收方的
    Intent 过滤器中，匹配才能继续。


    - 一旦 Intent 过滤器中的*操作*与广播匹配，并且该过滤器也包含发送方指定的类别列表，则只有该过滤器会匹配该广播。


    示例如表 5-2 所示（仅一个过滤器——如果有多个过滤器，则匹配基于“或”的方式进行）。


    **表 5-2 类别匹配**


    | 接收方操作 | 接收方类别 | 发送方 | 匹配 |

    | :--- | :--- | :--- | :--- |

    | `com.xyz.ACT1` | `com.xyz.cate1` | 操作 = `com.xyz.ACT1` | 是 |

    | `com.xyz.ACT1` | - | 操作 = `com.xyz.ACT1` 类别 = `com.xyz.cate1` | 否 |

    | `com.xyz.ACT1` | `com.xyz.cate1` | 操作 = `com.xyz.ACT1` 类别 = `com.xyz.cate1`
    | 是 |

    | `com.xyz.ACT1` | `com.xyz.cate1` | 操作 = `com.xyz.ACT1` 类别 = `com.xyz.cate1`
    类别 = `com.xyz.cate2` | 否 |

    | `com.xyz.ACT1` | `com.xyz.cate1` `com.xyz.cate2` | 操作 = `com.xyz.ACT1` 类别 =
    `com.xyz.cate1` 类别 = `com.xyz.cate2` | 是 |

    | `com.xyz.ACT1` | `com.xyz.cate1` `com.xyz.cate2` | 操作 = `com.xyz.ACT1` 类别 =
    `com.xyz.cate1` | 是 |

    | `com.xyz.ACT1` | 任意 | 操作 = `com.xyz.ACT2` 类别 = 任意 | 否 |


    最后，*数据和类型*说明符允许过滤数据类型。这样的说明符可以是以下之一：


    - **类型**：MIME 类型，例如 `text/html` 或 `text/plain`

    - **数据**：数据 URI，例如 `http://xyz.com/type1`

    - **数据**和**类型**：两者皆有


    其中`data`元素允许通配符匹配。详细信息见“接收隐式广播”部分。


    - 假定*操作*和*类别*匹配，如果发送方指定的 MIME 类型包含在接收方允许的 MIME 类型列表中，则*类型*过滤器元素匹配。

    - 假定*操作*和*类别*匹配，如果发送方指定的数据 URI 与接收方允许的数据 URI 列表中的任何一个匹配（可能应用通配符匹配），则*数据*过滤器元素匹配。

    - 假定*操作*和*类别*匹配，如果 MIME 类型和数据 URI 都匹配，即都包含在接收方指定的列表中，则*数据和类型*过滤器元素匹配。


    示例如表 5-3 所示（仅一个过滤器——如果有多个过滤器，则匹配基于“或”的方式进行）。


    **表 5-3 数据匹配**


    | 接收方类型 | 接收方 URI (`.*` = 任意字符串) | 发送方 | 匹配 |

    | :--- | :--- | :--- | :--- |

    | `text/html` | - | 类型 = `text/html` | 是 |

    | `text/html` `text/plain` | - | 类型 = `text/html` | 是 |

    | `text/html` `text/plain` | - | 类型 = `image/jpeg` | 否 |

    | - | `http://a.b.c/xyz` | 数据 = `http://a.b.c/xyz` | 是 |

    | - | `http://a.b.c/xyz` | 数据 = `http://a.b.c/qrs` | 否 |

    | - | `http://a.b.c/xyz/.*` | 数据 = `http://a.b.c/xyz/3` | 是 |

    | - | `http://.*/xyz` | 数据 = `http://a.b.c/xyz` | 是 |

    | - | `http://.*/xyz` | 数据 = `http://a.b.c/qrs` | 否 |

    | `text/html` | `http://a.b.c/xyz/.*` | 类型 = `text/html` 数据 = `http://a.b.c/xyz/1`
    | 是 |

    | `text/html` | `http://a.b.c/xyz/.*` | 类型 = `image/jpeg` 数据 = `http://a.b.c/xyz/1`
    | 否 |'
  raw: "A quite large number of predefined broadcast message types exist for\n   \
    \ Android. Inside the Android SDK, which you installed alongside with\n    Android\
    \ Studio, more precisely at `SDK_INST_DIR/platforms/VERSION/data/broadcast_actions.txt`,\n\
    \    you find a list of system broadcast actions. In case we want to listen\n\
    \    to such messages, we just need to program appropriate broadcast\n    receivers\
    \ as described in the following in sections “Receiving Implicit\n    Broadcasts”\
    \ and “Listening to System Broadcasts.” In the online text\n    companion in section\
    \ “System Broadcasts,” you’ll find a comprehensive\n    list of the system broadcasts.\n\
    \n2.  **How do we classify broadcast message types?**\n\nBroadcast senders and\
    \ broadcast receivers join based on intent filter\n    matches, just as activities\
    \ do, as described in section “Intent Filters”\n    of Chapter [3](#463716_2_En_3_Chapter.xhtml).\
    \ The classification is threefold\n    for broadcasts  as\n    well: first, you\
    \ have an obligatory “action” specifier, second a\n    “category,” and third a\
    \ “data-and-type” specifier, which you can all use\n    to define filters. We\
    \ describe this matching procedure in the\n    following.\n\n3.  **Are we heading\
    \ for local or remote broadcasts?**\n\nIf all the broadcasting happens completely\
    \ inside your app, you\n    should use local broadcasting for sending and receiving\
    \ messages. For\n    implicit broadcasts this will probably not be the case too\
    \ often, but\n    for large complex apps, this is totally acceptable. If system\
    \ broadcasts\n    are involved, or broadcasts from other apps, you *must* use\n\
    \    remote broadcasts\n    . The latter is the default case in most examples,\
    \ so you will\n    see this pattern quite often.\n\nIntent Filter Matching\nBroadcast\
    \ receivers express they’re accepting broadcasts by means of\ndeclaring *action*,\
    \ *category*, and *data\nspecifiers*.\n\nWe first talk about \n*actions* . Prima\
    \ facie those are just strings without any\nsyntax restriction. Looking more thoroughly\
    \ at them, you see that we\nfirst have a more or less stringently defined set\
    \ of predefined action\nnames. We listed them all in section “Intent Filters”\
    \ of Chapter [3](#463716_2_En_3_Chapter.xhtml). Also, you can define your own\n\
    actions. A convention is to use your package name plus a dot and then an\naction\
    \ specifier. You are not forced to follow this convention, but it\nis strongly\
    \ recommended to do it that way, so your apps do not mess up\nwith other apps.\
    \ Without specifying any other filter criteria, a sender\nspecifying that particular\
    \ action you specified in the filter will reach\nall matching receivers:\n\n*\
    \   For an intent filter to match, the *action* specified on\n    the receiver\
    \ side must match the *action* specified on the sender\n    side. For implicit\
    \ broadcasts, zero, one, or many receivers might be\n    addressed by one broadcast.\n\
    \n*   A receiver may specify more than one filter. If one of the\n    filters\
    \ contains the specified *action*, this particular filter\n    will match the\
    \ broadcast.\n\nExamples are shown in Table [5-1](#463716_2_En_5_Chapter.xhtml#Tab1).\n\
    \nTable 5-1\nAction Matches\n\nReceiver |\n Sender |\n Match |\n\n| --- | ---\
    \ | --- | --- | --- | --- | --- |\n\nOne-filter action = “com.xyz.ACTION1” |\n\
    \ action = “com.xyz.ACTION1” |\n YES |\n\nOne-filter action = “com.xyz.ACTION1”\
    \ |\n action = “com.xyz.ACTION2” |\n NO |\n\nTwo-filter action = “com.xyz.ACTION1”action\
    \ = “com.xyz.ACTION2” |\n action = “com.xyz.ACTION1” |\n YES |\n\nTwo-filter action\
    \ = “com.xyz.ACTION1”action = “com.xyz.ACTION2” |\n action = “com.xyz.ACTION3”\
    \ |\n NO |\n\nApart from *actions*, a *category* specifier may be used\nto restrict\
    \ an intent filter. We have a couple of predefined categories\nlisted in section\
    \ “Intent Filters” of chapter [3](#463716_2_En_3_Chapter.xhtml), but again you\
    \ can define your own\ncategories. And as with *actions*, for your own  *categories*\
    \ ,\nyou should follow the naming convention to prepend your app’s package\nname\
    \ to your category name. Once during the intent matching process a\nmatch in the\
    \ *action* is found, all the categories that were\ndeclared by the sender must\
    \ be present as well in the receiver’s intent\nfilter for the match to further\
    \ prevail.\n\n*   Once an *action* inside an intent filter matches a\n    broadcast\
    \ and the filter also contains a list of categories specified by\n    the sender,\
    \ only such filter will match the broadcast.\n\nExamples are shown in Table [5-2](#463716_2_En_5_Chapter.xhtml#Tab2)\
    \ (one filter only\n– if there are several filters, the matching happens on an\
    \ “or” basis).\n\nTable 5-2\nCategory Matches\n\nRecv. Act. |\n Recv. Categ. |\n\
    \ Sender |\n Match |\n\n| --- | --- | --- | --- | --- | --- | --- | --- | ---\
    \ |\n\ncom.xyz.ACT1 |\n com.xyz.cate1 |\n action = “com.xyz.ACT1” |\n YES |\n\n\
    com.xyz.ACT1 |\n - |\n action = “com.xyz.ACT1” categ = “com.xyz.cate1” |\n NO\
    \ |\n\ncom.xyz.ACT1 |\n com.xyz.cate1 |\n action = “com.xyz.ACT1” categ = “com.xyz.cate1”\
    \ |\n YES |\n\ncom.xyz.ACT1 |\n com.xyz.cate1 |\n action = “com.xyz.ACT1” categ\
    \ = “com.xyz.cate1” categ =\n“com.xyz.cate2” |\n NO |\n\ncom.xyz.ACT1 |\n com.xyz.cate1com.xyz.cate2\
    \ |\n action = “com.xyz.ACT1” categ = “com.xyz.cate1” categ =\n“com.xyz.cate2”\
    \ |\n YES |\n\ncom.xyz.ACT1 |\n com.xyz.cate1com.xyz.cate2 |\n action = “com.xyz.ACT1”\
    \ categ = “com.xyz.cate1” |\n YES |\n\ncom.xyz.ACT1 |\n any |\n action = “com.xyz.ACT2”\
    \ categ = any |\n NO |\n\nLastly, a *data-and-type* specifier  allows for\nfiltering\
    \ data types. Such a specifier is one of\n\n*   **type**: The MIME type, for example,\
    \ “text/html” or\n    “text/plain”\n\n*   **data**: A data URI, for example, “\
    \ [`http://xyz.com/type1`](http://xyz.com/type1) ”\n\n*   **data** and **type**:\
    \ Both of\n    them\n\nwhere the `data`\nelement allows for wildcard matching.\
    \ The details are shown in section\n“Receiving Implicit Broadcasts.”\n\n*   Presumed\
    \ *action* and *category* match, and a\n    *type* filter element matches if the\
    \ sender’s specified MIME type\n    is contained in the receiver’s list of allowed\
    \ MIME types.\n\n*   Presumed *action* and *category* match, and a\n    *data*\
    \ filter element matches if the sender’s specified data URI\n    matches any of\
    \ the receiver’s list of allowed data  URIs (wildcard\n    matching might apply).\n\
    \n*   Presumed *action* and *category* match, and a\n    *data-and-type* filter\
    \ element matches if both the MIME type and\n    the data URI match, that is,\
    \ are contained within the receiver’s\n    specified list.\n\nExamples are shown\
    \ in Table [5-3](#463716_2_En_5_Chapter.xhtml#Tab3) (one filter only\n– if there\
    \ are several filters, the matching happens on an “or” basis).\n\nTable 5-3\n\
    Data Matches\n\nRecv. Type |\n Recv. URI (.* = any string) |\n Sender |\n Match\
    \ |\n\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n\ntext/html |\n\
    \ - |\n type = “text/html” |\n YES |\n\ntext/htmltext/plain |\n - |\n type = “text/html”\
    \ |\n YES |\n\ntext/htmltext/plain |\n - |\n type = “image/jpeg” |\n NO |\n\n\
    - |\n http://a.b.c/xyz |\n data = “http://a.b.c/xyz” |\n YES |\n\n- |\n http://a.b.c/xyz\
    \ |\n data = “http://a.b.c/qrs” |\n NO |\n\n- |\n http://a.b.c/xyz/.* |\n data\
    \ = “http://a.b.c/xyz/3” |\n YES |\n\n- |\n http://.*/xyz |\n data = “http://a.b.c/xyz”\
    \ |\n YES |\n\n- |\n http://.*/xyz |\n data = “http://a.b.c/qrs” |\n NO |\n\n\
    text/html |\n http://a.b.c/xyz/.* |\n type = “text/html”\ndata = “http://a.b.c/xyz/1”\
    \ |\n YES |\n\ntext/html |\n http://a.b.c/xyz/.* |\n type = “image/jpeg”\ndata\
    \ = “http://a.b.c/xyz/1” |\n NO |"
  trans: '

    Android 预定义了大量的广播消息类型。在您随 Android Studio 一起安装的 Android SDK 中，更确切地说，在`SDK_INST_DIR/platforms/VERSION/data/broadcast_actions.txt`路径下，您可以找到系统广播操作的列表。如果我们想要监听此类消息，只需按照下文“接收隐式广播”和“监听系统广播”章节所述，编写相应的广播接收器即可。在在线文本伴读的“系统广播”章节中，您将找到系统广播的完整列表。


    ## 如何对广播消息类型进行分类？


    广播发送者和广播接收者基于 Intent 过滤器匹配来加入，这与 Activity 的方式相同，如第 3 章“Intent 过滤器”部分所述。广播的分类同样分为三类：首先，您有一个必须的“操作”说明符；其次，一个“类别”说明符；第三，一个“数据和类型”说明符。您可以使用这些来定义过滤器。我们将在下文描述此匹配过程。


    ## 我们使用本地广播还是远程广播？


    如果所有广播都完全在您的应用内部发生，您应该使用本地广播来发送和接收消息。对于隐式广播，这种情况可能不常见，但对于大型复杂应用，这完全是可以接受的。如果涉及系统广播或来自其他应用的广播，则*必须*使用远程广播。后者是大多数示例中的默认情况，因此您会经常看到这种模式。


    ## Intent 过滤器匹配


    广播接收器通过声明*操作*、*类别*和*数据说明符*来表示它们接受哪些广播。


    我们首先讨论*操作*。从表面上看，它们只是一些字符串，没有任何语法限制。但更仔细地观察，我们会发现它们首先是一组或多或少严格定义的预定义操作名称。我们已将它们全部列在第
    3 章的“Intent 过滤器”部分。此外，您也可以定义自己的操作。惯例是使用您的包名，加上一个点号，然后跟上操作说明符。您不必强制遵守此惯例，但强烈建议这样做，这样您的应用就不会与其他应用冲突。在不指定其他过滤器条件的情况下，指定了与过滤器中特定操作相匹配的发送者将到达所有匹配的接收器：


    - 要使 Intent 过滤器匹配，接收方指定的*操作*必须与发送方指定的*操作*匹配。对于隐式广播，一个广播可能寻址零个、一个或多个接收器。

    - 一个接收器可以指定多个过滤器。如果其中一个过滤器包含指定的*操作*，则该特定过滤器将匹配该广播。


    示例如表 5-1 所示。


    **表 5-1 操作匹配**


    | 接收器 | 发送器 | 匹配 |

    | :--- | :--- | :--- |

    | 单个过滤器 操作 = `com.xyz.ACTION1` | 操作 = `com.xyz.ACTION1` | 是 |

    | 单个过滤器 操作 = `com.xyz.ACTION1` | 操作 = `com.xyz.ACTION2` | 否 |

    | 两个过滤器 操作 = `com.xyz.ACTION1` 操作 = `com.xyz.ACTION2` | 操作 = `com.xyz.ACTION1`
    | 是 |

    | 两个过滤器 操作 = `com.xyz.ACTION1` 操作 = `com.xyz.ACTION2` | 操作 = `com.xyz.ACTION3`
    | 否 |


    除了*操作*之外，还可以使用*类别*说明符来限制 Intent 过滤器。我们有一些预定义的类别，列在第 3 章的“Intent 过滤器”部分，但您同样可以定义自己的类别。并且与*操作*一样，对于您自己的*类别*，您应该遵循命名惯例，即在类别名称前加上应用包名。在
    Intent 匹配过程中，一旦找到*操作*的匹配项，发送方声明的所有类别也必须出现在接收方的 Intent 过滤器中，匹配才能继续。


    - 一旦 Intent 过滤器中的*操作*与广播匹配，并且该过滤器也包含发送方指定的类别列表，则只有该过滤器会匹配该广播。


    示例如表 5-2 所示（仅一个过滤器——如果有多个过滤器，则匹配基于“或”的方式进行）。


    **表 5-2 类别匹配**


    | 接收方操作 | 接收方类别 | 发送方 | 匹配 |

    | :--- | :--- | :--- | :--- |

    | `com.xyz.ACT1` | `com.xyz.cate1` | 操作 = `com.xyz.ACT1` | 是 |

    | `com.xyz.ACT1` | - | 操作 = `com.xyz.ACT1` 类别 = `com.xyz.cate1` | 否 |

    | `com.xyz.ACT1` | `com.xyz.cate1` | 操作 = `com.xyz.ACT1` 类别 = `com.xyz.cate1`
    | 是 |

    | `com.xyz.ACT1` | `com.xyz.cate1` | 操作 = `com.xyz.ACT1` 类别 = `com.xyz.cate1`
    类别 = `com.xyz.cate2` | 否 |

    | `com.xyz.ACT1` | `com.xyz.cate1` `com.xyz.cate2` | 操作 = `com.xyz.ACT1` 类别 =
    `com.xyz.cate1` 类别 = `com.xyz.cate2` | 是 |

    | `com.xyz.ACT1` | `com.xyz.cate1` `com.xyz.cate2` | 操作 = `com.xyz.ACT1` 类别 =
    `com.xyz.cate1` | 是 |

    | `com.xyz.ACT1` | 任意 | 操作 = `com.xyz.ACT2` 类别 = 任意 | 否 |


    最后，*数据和类型*说明符允许过滤数据类型。这样的说明符可以是以下之一：


    - **类型**：MIME 类型，例如 `text/html` 或 `text/plain`

    - **数据**：数据 URI，例如 `http://xyz.com/type1`

    - **数据**和**类型**：两者皆有


    其中`data`元素允许通配符匹配。详细信息见“接收隐式广播”部分。


    - 假定*操作*和*类别*匹配，如果发送方指定的 MIME 类型包含在接收方允许的 MIME 类型列表中，则*类型*过滤器元素匹配。

    - 假定*操作*和*类别*匹配，如果发送方指定的数据 URI 与接收方允许的数据 URI 列表中的任何一个匹配（可能应用通配符匹配），则*数据*过滤器元素匹配。

    - 假定*操作*和*类别*匹配，如果 MIME 类型和数据 URI 都匹配，即都包含在接收方指定的列表中，则*数据和类型*过滤器元素匹配。


    示例如表 5-3 所示（仅一个过滤器——如果有多个过滤器，则匹配基于“或”的方式进行）。


    **表 5-3 数据匹配**


    | 接收方类型 | 接收方 URI (`.*` = 任意字符串) | 发送方 | 匹配 |

    | :--- | :--- | :--- | :--- |

    | `text/html` | - | 类型 = `text/html` | 是 |

    | `text/html` `text/plain` | - | 类型 = `text/html` | 是 |

    | `text/html` `text/plain` | - | 类型 = `image/jpeg` | 否 |

    | - | `http://a.b.c/xyz` | 数据 = `http://a.b.c/xyz` | 是 |

    | - | `http://a.b.c/xyz` | 数据 = `http://a.b.c/qrs` | 否 |

    | - | `http://a.b.c/xyz/.*` | 数据 = `http://a.b.c/xyz/3` | 是 |

    | - | `http://.*/xyz` | 数据 = `http://a.b.c/xyz` | 是 |

    | - | `http://.*/xyz` | 数据 = `http://a.b.c/qrs` | 否 |

    | `text/html` | `http://a.b.c/xyz/.*` | 类型 = `text/html` 数据 = `http://a.b.c/xyz/1`
    | 是 |

    | `text/html` | `http://a.b.c/xyz/.*` | 类型 = `image/jpeg` 数据 = `http://a.b.c/xyz/1`
    | 否 |

