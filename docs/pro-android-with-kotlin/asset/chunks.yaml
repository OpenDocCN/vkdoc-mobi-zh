  trans: "```kotlin\noverride\nfun onReceive(context: Context, intent: Intent) {\n\
    \    if (intent.action ==\n        Intent.ACTION_NEW_OUTGOING_CALL) {\n      \
    \  savedNumber = intent.extras!!.\n            getString(Intent.EXTRA_PHONE_NUMBER)\n\
    \    } else {\n        val stateStr = intent.extras!!.\n            getString(TM.EXTRA_STATE)\n\
    \        val number = intent.extras!!.\n            getString(TM.EXTRA_INCOMING_NUMBER)\n\
    \        val state = when(stateStr) {\n            TM.EXTRA_STATE_IDLE ->\n  \
    \              TM.CALL_STATE_IDLE\n            TM.EXTRA_STATE_OFFHOOK ->\n   \
    \             TM.CALL_STATE_OFFHOOK\n            TM.EXTRA_STATE_RINGING ->\n \
    \               TM.CALL_STATE_RINGING\n            else -> 0\n        }\n    \
    \    callStateChanged(context, state, number)\n    }\n}\nprotected fun onIncomingCallReceived(\n\
    \    ctx: Context, number: String?, start: Date){\n    Log.e(\"LOG\",\n      \
    \  \"IncomingCallReceived ${number} ${start}\")\n}\nprotected fun onIncomingCallAnswered(\n\
    \    ctx: Context, number: String?, start: Date) {\n    Log.e(\"LOG\",\n     \
    \   \"IncomingCallAnswered ${number} ${start}\")\n}\nprotected fun onIncomingCallEnded(\n\
    \    ctx: Context, number: String?,\n    start: Date?, end: Date) {\n    Log.e(\"\
    LOG\",\n        \"IncomingCallEnded ${number} ${start}\")\n}\nprotected fun onOutgoingCallStarted(\n\
    \    ctx: Context, number: String?, start: Date) {\n    Log.e(\"LOG\",\n     \
    \   \"OutgoingCallStarted ${number} ${start}\")\n}\nprotected fun onOutgoingCallEnded(\n\
    \    ctx: Context, number: String?,\n    start: Date?, end: Date) {\n    Log.e(\"\
    LOG\",\n        \"OutgoingCallEnded ${number} ${start}\")\n}\nprotected fun onMissedCall(\n\
    \    ctx: Context, number: String?, start: Date?) {\n    Log.e(\"LOG\",\n    \
    \    \"MissedCall ${number} ${start}\")\n}\n```\n\n私有方法 `callStateChanged()` 会响应与电话通话对应的各种状态变化：\n\
    \n```kotlin\n/**\n* 来电：\n*     振铃时 IDLE -> RINGING，\n*     接听时 -> OFFHOOK，\n*\
    \     挂断时 -> IDLE\n* 去电：\n*     拨出时 IDLE -> OFFHOOK，\n*     挂断时 -> IDLE\n*/\n\
    private fun callStateChanged(\n    context: Context, state: Int, number: String?)\
    \ {\n    if (lastState == state) {\n        return // 状态无变化\n    }\n    when (state)\
    \ {\n        TM.CALL_STATE_RINGING -> {\n            isIncoming = true\n     \
    \       callStartTime = Date()\n            savedNumber = number\n           \
    \ onIncomingCallReceived(\n                context, number, callStartTime!!)\n\
    \        }\n        TM.CALL_STATE_OFFHOOK ->\n            if (lastState != TM.CALL_STATE_RINGING)\
    \ {\n                isIncoming = false\n                callStartTime = Date()\n\
    \                onOutgoingCallStarted(context,\n                    savedNumber,\
    \ callStartTime!!)\n            } else {\n                isIncoming = true\n\
    \                callStartTime = Date()\n                onIncomingCallAnswered(context,\n\
    \                    savedNumber, callStartTime!!)\n            }\n        TM.CALL_STATE_IDLE\
    \ ->\n            if (lastState == TM.CALL_STATE_RINGING) {\n                //振铃但未接听——漏接\n\
    \                onMissedCall(context,\n                    savedNumber, callStartTime)\n\
    \            } else if (isIncoming) {\n                onIncomingCallEnded(context,\n\
    \                    savedNumber, callStartTime,\n                    Date())\n\
    \            } else {\n                onOutgoingCallEnded(context,\n        \
    \            savedNumber, callStartTime,\n                    Date())\n      \
    \      }\n    }\n    lastState = state\n}\n```\n\n使用这样的监听器，你可以收集关于电话使用情况的统计信息、创建优先级电话号码列表，或执行其他有趣的操作。要将电话通话与联系人信息关联起来，请参阅第\
    \ 8 章的“联系人”部分。\n\n## 发起拨号流程\n\n要从你的应用内部发起拨号流程，基本上有两种选择：\n\n*   发起拨号流程，用户可以查看并更改被叫号码。\n\
    *   发起拨号流程，用户无法更改被叫号码。\n\n对于第一种情况（向用户展示号码并允许其修改），你无需任何特殊权限。只需编写：\n\n```kotlin\n\
    val num = \"+34111222333\"\nval intent = Intent(Intent.ACTION_DIAL,\n    Uri.fromParts(\"\
    tel\", num, null))\nstartActivity(intent)\n```\n\n要使用预设号码发起拨号流程，你需要额外添加 `CALL_PHONE`\
    \ 权限。关于如何获取该权限，请参阅第 7 章。随后可通过以下方式启动拨号过程：\n\n```kotlin\nval num = \"+34111222333\"\
    \nval intent = Intent(Intent.ACTION_CALL,\n    Uri.fromParts(\"tel\", num, null))\n\
    startActivity(intent)\n```\n\n## 创建自定义电话通话界面\n\nAndroid 文档中的“构建通话应用”在线页面描述了如何创建包含自定义界面的电话通话活动。详情请参见该页面。\n\
    \n## 指纹认证\n\nAndroid 中的指纹认证属于生物识别认证框架的一部分。用于指纹认证的旧版 API（Android Fingerprint API）随\
    \ Android 6.0（API 级别 23）引入。在此之前，如果存在供应商特定的 API，则必须使用这些 API。对于 Android 11（API 级别\
    \ 30）或更高版本，请使用 [`https://developer.android.com/training/sign-in/biometric-auth`](https://developer.android.com/training/sign-in/biometric-auth)\
    \ 上提供的生物识别认证信息。对于低至 API 级别 23 的版本，可以使用相同的类，特别是 `BiometricPrompt`，因为该 API 具有内置的向后兼容支持。\n\
    \n要使用它，请在 `build.gradle` 文件的 dependencies 部分添加：\n\n```gradle\nimplementation \"\
    androidx.biometric:biometric:1.1.0\"\n```\n\n## 15. 测试\n\n在信息技术领域，关于测试的讨论很多。测试在过去几十年中备受关注，原因有三：\n\
    \n*   测试是开发者和用户之间的接口。\n*   测试在某种程度上可以工程化。\n*   测试有助于创造收益。\n\n开发者往往会对自己的软件产生带有偏见的看法。这样说绝非冒犯之意。这很自然：如果你在某个主题上投入了大量时间，你可能会失去预判新用户想法的能力。因此，强烈建议你定期跳出开发者的角色，问自己这个问题：“假设我对这个应用一无所知——如果进入这个\
    \ GUI 工作流，它是否有意义、是否易于遵循、是否难以造成不可恢复的错误？”测试正是为此提供帮助——它迫使开发者进入最终用户的角色，并对自己提出同样的问题。\n\
    \n软件开发远非一门工业化的工程科学。这既是好消息，也是坏消息。如果有强大的工程化路径，遵循公认的开发模式会更容易，其他开发者也能更轻松地理解你的工作。另一方面，不那么精确的工程化也为更多创造力打开了大门，使开发成为一种艺术。优秀的开发者深知自己始终在这两个极限之间摇摆。\n\
    \n如今的测试倾向于优先考虑工程化。这是因为你可以精确地说明软件应该做什么，而完全不需要理会任何一行代码。因此，部分测试根本不关心事情在编码层面是如何实现的，从而排除了满足开发需求的众多可能性。当然，这对于低层级的单元测试并不成立，但即使是单元测试，你也能看到软件制品契约与测试方法论之间存在很强的重叠。因此，与单纯的开发相比，测试的工程化程度更高。然而，由于测试只是整个开发过程的一个方面，你依然可以作为一名开发者拥有有趣的工作，并生活在两个世界中：在编码时做一名艺术家，在编写测试时做一名工程师。\n\
    \n在开发链的另一端，根据你的意图，你可能希望最终用户为你的应用付费。测试显然有助于避免因未预料到的 bug 而产生的挫败感，让公众更容易认可你的应用。关于\
    \ Android 测试的讨论很多，你可以在官方 Android 文档中找到优质信息以及入门或高级视频。本章剩余部分应被视为关于测试问题的建议和经验性知识总结。我也没有打算对测试的方方面面进行入门介绍，但我希望可以为你自己的深入探索提供一个起点。"
- fmt: "# Unit Tests\n\nUnit tests aim at the class level and test low-level functional\
    \ aspects of your app. By “functional” I mean unit tests usually check deterministic\
    \ relations between input and output of a method call, maybe but not necessarily\
    \ including state variables of class instances in a deterministic, straightforward\
    \ manner.\n\n## Standard Unit Tests\n\nIn an Android environment, standard unit\
    \ tests run without dependency on the device hardware nor any Android framework\
    \ classes and are thus executed on the development machine. This is typically\
    \ useful for libraries and not so much GUI-related functionalities. That is why\
    \ the applicability of this kind of unit tests is somewhat limited for most Android\
    \ apps.\n\nHowever, if your app’s classes contain method calls and you can anticipate\
    \ the call result given various sets of inputs, using standard unit tests makes\
    \ sense. It is easy to add unit tests to your app. In fact, if you start a new\
    \ project using Android Studio, all is set up for you, and you even get a sample\
    \ test class. See Figure [15-1](#463716_2_En_15_Chapter.xhtml#Fig1).\n\n![](images/463716_2_En_15_Chapter/463716_2_En_15_Fig1_HTML.jpg)\n\
    \nA list of folders and applications for a test set up. The Example UnitTest is\
    \ highlighted.\n\n**Figure 15-1** Initial Unit Test Setup\n\nSo you immediately\
    \ can start writing unit tests using that test class as an example – just add\
    \ more test classes to the *test* section of the source code.\n\n> **Note**  \n\
    > While not technically necessary, a common convention is to use the same names\
    \ for the test classes as the classes under test, with a “Test” appended. So the\
    \ test class for `com.example.myapp.TheClass` should be called `com.example.myapp.TheClassTest`.\n\
    \nTo run the unit tests inside Android Studio, right-click the *test* section\
    \ and select “Run Tests in …” or “Debug Tests in …”.\n\n## Unit Tests with a Stubbed\
    \ Android Framework\n\nBy default, the Gradle plugin used for executing unit tests\
    \ contains a stubbed version of the Android framework, throwing an exception whenever\
    \ an Android class gets called.\n\nYou can change this behavior by adding to the\
    \ app’s `build.gradle` file:\n\n```\nandroid {\n  ...\n  testOptions {\n    unitTests.returnDefaultValues\
    \ = true\n  }\n}\n```\n\nAny call of an Android class’s method then does nothing\
    \ and returns `null` on demand.\n\n## Unit Tests with a Simulated Android Framework\n\
    \nIf you need to access Android classes from inside your unit tests and expect\
    \ them to do real things, using the community-supported *Robolectric* framework\
    \ as a unit test implementation is a valid option. With Robolectric you can simulate\
    \ button clicks, reading and writing text, and lots of other GUI-related activities.\
    \ Still all that runs on your development machine, which considerably speeds up\
    \ testing.\n\nTo allow your project to use Robolectric, add to your app’s `build.gradle`\
    \ file:\n\n```\nandroid {\n  testOptions {\n    unitTests {\n      includeAndroidResources\
    \ = true\n    }\n  }\n}\ndependencies {\n  ...\n  //testImplementation 'junit:junit:4.12'\n\
