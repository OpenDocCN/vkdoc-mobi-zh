    \n## 可空性\n\nKotlin 在语言层面解决了可空性问题，以避免烦人的 `NullPointerException` 抛出。对于任何变量或常量，默认情况下不允许赋值为\
    \ `null`——你必须通过添加 `?` 来显式声明可空性，如下所示：\n\n```kotlin\nvar name:String? = null\n```\n\
    \n编译器随后知道示例中的 `name` 可能为 `null`，并采取各种预防措施来避免 `NullPointerException`。例如，你不能编写 `name.toUpperCase()`，而必须使用\
    \ `name?.toUpperCase()` 代替，后者仅在 `name` 不为 `null` 时才执行大写转换，否则返回 `null` 本身。\n\n\
    使用我们之前描述的作用域函数，有一种非常优雅的方法可以避免像 `if( x != null ) { ... }` 这样的结构。你可以改为编写：\n\n```kotlin\n\
    x?.run {\n    ...\n}\n```\n\n这实现了相同的效果，但更具表现力：凭借 `?.`，只有当 `x` 不为 `null` 时，`run{}`\
    \ 才会执行。\n\n`Elvis` 运算符 `?:` 也非常有用，它用于处理仅当接收变量为 `null` 时才想计算某个表达式的情况，如下所示：\n\n\
    ```kotlin\nvar x:String? = ...\n...\nvar y:String = x ?: \"default\"\n```\n\n\
    这等同于 Java 中的 `String y = (x != null) ? x : \"default\");`。\n\n## 数据类\n\n数据类是负责承载结构化数据的类。通常，对数据类内部的数据进行操作是不必要的，或者至少不重要。\n\
    \n在 Kotlin 中声明数据类非常简单；你只需编写：\n\n```kotlin\ndata class Person(\n    val fName:String,\n\
    \    val lName:String,\n    val age:Int)\n```\n\n或者，如果你想为某些参数使用默认值：\n\n```kotlin\n\
    data class Person(\n    val fName:String=\"\",\n    val lName:String,\n    val\
    \ age:Int=0)\n```\n\n这个简单的声明已经定义了一个构造函数、一个用于比较的合适的 `equals()` 方法、一个默认的 `toString()`\
    \ 实现，以及参与解构的能力——请参见下文。要创建一个对象，你只需编写：\n\n```kotlin\nval pers = Person(\"John\"\
    ,\"Smith\",37)\n```\n\n或者更具表达力的写法：\n\n```kotlin\nval pers = Person(fName=\"John\"\
    , lName=\"Smith\", age=37)\n```\n\n在这种情况下，如果参数有默认声明，你也可以省略它们。\n\n这一点，加上你可以在函数内部声明类和函数，使得定义临时的复杂函数返回类型变得非常容易，如下所示：\n\
    \n```kotlin\nfun someFun() {\n    ...\n    data class Person(\n        val fName:String,\n\
    \        val lName:String,\n        val age:Int)\n    fun innerFun():Person =\
    \ ...\n    ...\n    val p1:Person = innerFun()\n    val fName1 = p1.fName\n  \
    \  ...\n```\n\n## 解构\n\n*解构声明*允许你进行多值或变量赋值。假设你有一个上一节中定义的数据类 `Person`。那么你可以编写：\n\
    \n```kotlin\nval p:Person = ...\nval (fName,lName,age) = p\n```\n\n这会给你三个不同的值。对于数据类，其顺序由类成员声明的顺序决定。通常，任何具有\
    \ `component1()`、`component2()` …… 访问器的对象都可以参与解构，因此你也可以为自己的类使用解构。例如，map 条目默认就支持这一点，所以你可以编写：\n\
    \n```kotlin\nval m = mapOf( 1 to \"John\", 2 to \"Greg\", ... )\nfor( (k,v) in\
    \ m) { ... }\n```\n\n因为 `to` 是一个中缀运算符，它创建一个 `Pair` 类，而该类又定义了 `fun component1()`\
    \ 和 `fun component2()`。\n\n作为解构声明的附加特性，你可以使用 `_` 通配符来表示未使用的部分，如下所示：\n\n```kotlin\n\
    val p:Person = ...\nval (fName,lName,_) = p\n```\n\n## 多行字符串字面量\n\nJava 中的多行字符串字面量定义起来总是有点笨拙：\n\
    \n```java\nString s = \"First line\\n\" +\n        \"Second line\";\n```\n\n在\
    \ Kotlin 中，你可以像这样定义多行字符串字面量：\n\n```kotlin\nval s = \"\"\"\nFirst line\nSecond\
    \ Line\"\"\"\n```\n\n你甚至可以通过添加 `.trimIndent()` 来去除前导缩进空格，如下所示：\n\n```kotlin\n\
    val s = \"\"\"\nFirst line\nSecond Line\"\"\".trimIndent()\n```\n\n这会移除开头的换行符以及每行开头的公共空格。\n\
    \n## 内部函数和类\n\n在 Kotlin 中，函数和类也可以在其他函数内部声明，这进一步有助于组织代码：\n\n```kotlin\nfun someFun()\
    \ {\n    ...\n    class InnerClass { ... }\n    fun innerFun() = ...\n    ...\n\
    }\n```\n\n这种内部构造的作用域当然仅限于声明它们的函数内部。\n\n## 字符串插值\n\n在 Kotlin 中，你可以将值传递到字符串中，如下所示：\n\
    \n```kotlin\nval i = 7\nval s = \"And the value of 'i' is ${i}\"\n```\n\n这借鉴自\
    \ Groovy 语言，你可以将其用于所有类型，因为所有类型都有一个 `toString()` 成员。唯一的要求是 `${}` 的内容计算结果必须是一个表达式，因此你甚至可以编写：\n\
    \n```kotlin\nval i1 = 7\nval i2 = 8\nval s = \"The sum is: ${i1+i2}\"\n```\n\n\
    或者使用方法调用和 lambda 函数构建更复杂的结构：\n\n```kotlin\nval s = \"8 + 1 is: ${ { i: Int ->\
    \ i + 1 }(8) }\"\n```\n\n## 限定“this”\n\n如果 `this` 不是你想要的，而是想引用来自外部上下文的 `this`，在\
    \ Kotlin 中你可以使用 `@` 限定符，如下所示：\n\n```kotlin\nclass A {\n    val b = 7\n    init\
    \ {\n        val p = arrayOf(8,9).apply {\n            this[0] += this@A.b\n \
    \       }\n        ...\n    }\n}\n```\n\n## 委托\n\nKotlin 允许轻松实现*委托*模式。在\n\n```kotlin\n\
    interface Printer {\n    fun print()\n}\nclass PrinterImpl(val x: Int) : Printer\
    \ {\n    override fun print() { print(x) }\n}\nclass Derived(b: Printer) : Printer\
    \ by b\n```\n\n中，类 `Derived` 是 `Printer` 类型，并将它的所有方法调用委托给 `b` 对象。因此你可以编写：\n\n\
    ```kotlin\nval pi = PrinterImpl(7)\nDerived(pi).print()\n```\n\n你可以随意覆盖方法调用，因此可以调整委托以使用新功能：\n\
    \n```kotlin\nclass Derived(val b: Printer) : Printer by b {\n    override fun\
    \ print() {\n        print(\"Printing:\")\n        b.print()\n    }\n}\n```\n\n\
    ## 重命名导入\n\n在某些情况下，导入的类可能使用很长的名称，而你频繁使用它们，因此你希望它们有更短的名称。例如，如果你经常在代码中使用 `SimpleDateFormat`\
    \ 类，并且不想每次都写出完整的类名。为了帮助我们解决这个问题并稍微缩短它，你可以引入导入别名并编写：\n\n```kotlin\nimport java.text.SimpleDateFormat\
    \ as SDF\n```\n\n此后，你可以使用 `SDF` 作为 `SimpleDateFormat` 的替代，例如："
