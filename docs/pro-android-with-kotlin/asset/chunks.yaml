    no intent filters, or true otherwise. The presence of intent filters\nimplies\
    \ external usage, thus this distinction. |\n\nandroid:icon |\n The icon resource\
    \ ID. Default is the app’s icon. |\n\nandroid:isolatedProcess |\n One of `true`,\
    \ `false`. Default is\nfalse. If true, the service has no means to communicate\
    \ with the system,\nonly through the service methods. It is actually a good idea\
    \ to use this\nflag, but in most cases your service will need to talk to the system,\
    \ so\nyou have to leave it false unless the service is really\nself-contained.\
    \ |\n\nandroid:foregroundServiceType |\n One of “camera”, “connectedDevice”, “dataSync”,\
    \ “location”, “mediaPlayback”,\n“mediaProjection”, “microphone”, “phoneCall”.\
    \ Android behaves\ndifferently for different foreground service types. You can\
    \ improve user\nexperience if you explicitly specify the type of foreground service\n\
    using this attribute. |\n\nandroid:label |\n A label for the service displayed\
    \ to the user. Default is the app’s label. |\n\nandroid:name |\n The name of the\
    \ service’s class. If you use a dot as the first character, it\nautomatically\
    \ gets prepended the name of the package specified in the\n`manifest`\nelement.\
    \ |\n\nandroid:permission |\n The permission name adjoint to this service. Default\
    \ is the permission\nattribute in the `application` element.\nIf specified nowhere,\
    \ the service will not be protected. |\n\nandroid:process |\n The name of the\
    \ service’s process. If specified, the service will run in its own process. If\
    \ it starts with a\ncolon “:”, the process will be private to the app. If it starts\
    \ with a\nlowercase letter, the process spawned will be a global process. Security\n\
    restrictions might apply. |\n\nSee also [`https://developer.android.com/guide/topics/manifest/service-element`](https://developer.android.com/guide/topics/manifest/service-element)\
    \ .\n\nThe `<service>`\nelement allows for child\nelements :\n\n*   **intent-filter**:\
    \ Zero, one, or many intent\n    filters. They are described in section “Intent\
    \ Filters” of Chapter [3](#463716_2_En_3_Chapter.xhtml).\n\n*   **meta-data**:\
    \ An arbitrary name-value pair in the\n    form `<meta-data android:name=\"...\"\
    \ android:resource=\"...\" android:value=\"...\" />`. You can have several of\
    \ them, and they go into an `android.os.Bundle`\n    element available as `PackageItemInfo.metaData`.\n\
    \nStarting with Android 9 (API level 28), foreground services \nmust request an\
    \ additional permission inside the `AndroidManifest.xml`\nfile:\n\n```\n\n...\n\
    \n```\n\nFor you as a professional developer, understanding what a\n*process*\
    \ actually is and how it gets treated by the Android OS\nis quite important; see\
    \ the `android:service` flag  in the manifest\nfor process control. And it can\
    \ be tricky, because process internals\ntend to change with new Android versions\
    \ and they seem to change on a\nper-minute basis if you look inside blogs. As\
    \ a matter of fact, a\n*process* is a computational unit that gets started by\
    \ the\nAndroid OS to perform computational tasks. Also it gets stopped when\n\
    Android decides it runs out of system resources. If you decide to stop\nworking\
    \ with a particular app, it doesn’t automatically mean the\ncorresponding process\
    \ or processes get killed. Whenever you start an app\nfor the first time and you\
    \ don’t explicitly tell the app to use another\napp’s process, surely a new process\
    \ gets created and started, and with\nsubsequent computational tasks, existing\
    \ processes get used or new\nprocesses get started, depending on their settings\
    \ and relations to each\nother.\nWithout any precaution an own service started\
    \ by an app will run in\nthe app’s process. This means the services possibly live\
    \ and inevitably\ndie with the app. A service needs to be started to actually\
    \ live, but\nwhen it runs in the app’s main process, it will die when the app\
    \ dies.\nThis automatically means a service’s resource needs count to the app’s\n\
    resource needs. In former times when resources were more scarce, this\nwas more\
    \ important than nowadays with stronger devices, but it is still\ngood to know\
    \ if a service needs a lot of resources, and if there is some\nkind of resource\
    \ shortage, it makes a difference if the whole app needs\nto be killed to free\
