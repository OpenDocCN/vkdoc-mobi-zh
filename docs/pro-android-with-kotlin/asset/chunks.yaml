- fmt: "### Active or On-Hold Listening\n\nThe question is in which state an app must\
    \ be in order to be able to receive implicit broadcasts. If we want a broadcast\
    \ receiver to be just registered in the system and fired up only on demand when\
    \ a matching broadcast arrives, the listener must be specified in the manifest\
    \ file of the app. However, for implicit broadcasts this cannot be freely done,\
    \ only for predefined system broadcasts as listed in section “Listening to System\
    \ Broadcasts.”\n\n**Note:**  \nThis restriction on implicit intent filters has\
    \ been introduced in Android 8.0 or API level 26\\. Before that, any implicit\
    \ filters could be specified inside the manifest file.\n\nIf however you start\
    \ your broadcast listeners programmatically from inside an app and this app is\
    \ running, you can define as many implicit broadcast listeners as you wish, and\
    \ there is no restriction on whether the broadcasts come from the system, your\
    \ app, or other apps. Likewise, there is no restriction on usable *action* or\
    \ *category* names.\n\nSince listening for booting completed events is included\
    \ in the list for allowed listeners inside the manifest file, you are free to\
    \ start apps there as activities or services, and inside those apps you can register\
    \ any implicit listener. That means you can legally work around the restrictions\
    \ imposed starting with Android 8.0\\. Just be aware that such apps may be killed\
    \ by the Android OS if resource shortages occur, so you have to take appropriate\
    \ precautions.\n\n### Sending Implicit Broadcasts\n\nTo prepare sending an implicit\
    \ broadcast, you specify an action, categories, data, and extra data as follows:\n\
    \n```\nval intent = Intent()\nintent.action = \"de.pspaeth.myapp.DO_STH\"\nintent.addCategory(\"\
    de.pspaeth.myapp.CATEG1\")\nintent.addCategory(\"de.pspaeth.myapp.CATEG2\")\n\
    // ... more categories\nintent.type = \"text/html\"\nintent.data = Uri.parse(\"\
    content://myContent\")\nintent.putExtra(\"EXTRA_KEY\", \"extraVal\")\nintent.flags\
    \ = ...\n```\n\nOnly the action is mandatory; all the others are optional. Now\
    \ to send the broadcast, you’d write\n\n```\nsendBroadcast(intent)\n```\n\nfor\
    \ a remote broadcast or\n\n```\nLocalBroadcastManager.getInstance(this).sendBroadcast(intent)\n\
    ```\n\nfor a local broadcast. The “this” must be a `Context` or a subclass thereof\
    \ – it will work exactly like shown here if the code is from inside an activity\
    \ or a service class.\n\nFor remote messages there is also a variant sending a\
    \ broadcast to applicable receivers one at a time:\n\n```\n...\nsendOrderedBroadcast(...)\n\
    ...\n```\n\nThis makes the receivers get the message sequentially, and each receiver\
    \ may cancel forwarding the message to the next receiver in the line by using\
    \ `BroadcastReceiver.abortBroadcast()`.\n\n### Receiving Implicit Broadcasts\n\
    \nTo receive an implicit broadcast, for a limited set of broadcast types (see\
    \ section “Listening to System Broadcasts”), you can specify a `BroadcastListener`\
    \ inside `AndroidManifest.xml` as follows:\n\n```\n...\n\n```\n\nThe `<data>`\
    \ element shown here is just an example – all possibilities are shown in Chapter\
    \ [3](#463716_2_En_3_Chapter.xhtml), section “Intent Filters.”\n\nIn contrast\
    \ to that, adding a programmatic listener for implicit broadcasts to your code\
    \ is unrestricted:\n\n```\nclass MainActivity : AppCompatActivity() {\nprivate\
    \ var bcReceiver:BroadcastReceiver? = null\noverride fun onCreate(savedInstanceState:\
    \ Bundle?) {\nsuper.onCreate(savedInstanceState)\n// ...\nbcReceiver = MyReceiver()\n\
    val ifi:IntentFilter =\nIntentFilter(\"de.pspaeth.myapp.DO_STH\")\nregisterReceiver(bcReceiver,\
    \ ifi)\n}\noverride fun onDestroy() {\nsuper.onDestroy()\n// ...\nunregisterReceiver(bcReceiver)\n\
    }\n}\n```\n\nThe `MyReceiver` shown here is an implementation of class `android.content.BroadcastReceiver`.\n\
    \n### Listening to System Broadcasts\n\nIn order to listen to system broadcasts\
    \ – see the list in the online text companion’s section “System Broadcasts” –\
    \ you can just use a programmatic registration as shown earlier. For most of them,\
    \ you cannot use the manifest registration way, for background execution limits\
    \ imposed since Android 8.0 or API level 26\\. However, for a number of them,\
    \ you can also use the manifest file to specify listeners:\n\n- **`ACTION_LOCKED_BOOT_COMPLETED`**,\
    \ **`ACTION_BOOT_COMPLETED`**: Apps may need those to schedule jobs, alarms, and\
    \ so on.\n- **`ACTION_USER_INITIALIZE`**, **`\"android.intent.action.USER_ADDED\"\
    `**, **`\"android.intent.action.USER_REMOVED\"`**: Protected by privileged permissions,\
    \ so use cases are limited.\n- **`\"android.intent.action.TIME_SET\"`**, **`ACTION_TIMEZONE_CHANGED`**,\
    \ **`ACTION_NEXT_ALARM_CLOCK_CHANGED`**: Needed by clock apps.\n- **`ACTION_LOCALE_CHANGED`**:\
    \ The locale changed, and apps might need to update their data when this happens.\n\
    - **`ACTION_USB_ACCESSORY_ATTACHED`**, **`ACTION_USB_ACCESSORY_DETACHED`**, **`ACTION_USB_DEVICE_ATTACHED`**,\
    \ **`ACTION_USB_DEVICE_DETACHED`**: USB-related events.\n- **`ACTION_CONNECTION_STATE_CHANGED`**,\
    \ **`ACTION_ACL_CONNECTED`**, **`ACTION_ACL_DISCONNECTED`**: Bluetooth events.\n\
    - **`ACTION_CARRIER_CONFIG_CHANGED`**, **`TelephonyIntents.ACTION__SUBSCRIPTION_CHANGED`**,\
    \ **`TelephonyIntents.SECRET_CODE_ACTION`**: OEM telephony apps may need to receive\
    \ these broadcasts.\n- **`LOGIN_ACCOUNTS_CHANGED_ACTION`**: Needed by some apps\
    \ to set up scheduled operations for new and changed accounts.\n- **`ACTION_PACKAGE_DATA_CLEARED`**:\
    \ Data cleared by the OS “Settings” app. A running app likely is interested in\
    \ that.\n- **`ACTION_PACKAGE_FULLY_REMOVED`**: Related apps may need to be informed\
    \ if some apps get uninstalled and their data removed.\n- **`ACTION_NEW_OUTGOING_CALL`**:\
    \ Intercepting outgoing calls.\n- **`ACTION_DEVICE_OWNER_CHANGED`**: Some apps\
    \ may need to receive it, so that they know that the device’s security status\
    \ has changed.\n- **`ACTION_EVENT_REMINDER`**: Sent by the calendar provider to\
    \ post an event reminder to the calendar app.\n- **`ACTION_MEDIA_MOUNTED`**, **`ACTION_MEDIA_CHECKING`**,\
    \ **`ACTION_MEDIA_UNMOUNTED`**, **`ACTION_MEDIA_EJECT`**, **`ACTION_MEDIA_UNMOUNTABLE`**,\
    \ **`ACTION_MEDIA_REMOVED`**, **`ACTION_MEDIA_BAD_REMOVAL`**: Apps may need to\
    \ know about the user’s physical interactions with the device.\n- **`SMS_RECEIVED_ACTION`**,\
    \ **`WAP_PUSH_RECEIVED_ACTION`**: Needed by SMS recipient apps.\n\n### Adding\
    \ Security to Broadcasts\n\nSecurity in broadcasting messages is handled by the\
    \ *permission* system, which gets described in more detail in Chapter [7](#463716_2_En_7_Chapter.xhtml).\
    \ In the following sections, we distinguish between explicit and implicit broadcasts.\n\
    \n#### Securing Explicit Broadcasts\n\nFor non-local broadcasting, that is, not\
    \ using the `LocalBroadcastManager`, permissions can be specified on both sides,\
    \ the receiver *and* the sender. For the latter, the broadcast sending methods\
    \ have overloaded versions including a permission specifier:\n\n```\n...\nval\
    \ intent = Intent(this, MyReceiver::class.java)\n...\nsendBroadcast(intent, \"\
    com.xyz.theapp.PERMISSION1\")\n...\n```\n\nThis expresses sending a broadcast\
    \ to a receiver that is protected by `\"com.xyz.theapp.PERMISSION1\"`. Of course\
    \ you should write your own package names here and use appropriate permission\
    \ names.\n\nIn contrast, sending a broadcast without permission specification\n\
    \n```\n...\nval intent = Intent(this, MyReceiver::class.java)\n...\nsendBroadcast(intent)\n\
    ...\n```\n\nmay address receivers with and without permission protection. That\
    \ means specifying permissions on the sender side is not supposed to tell the\
    \ receiver that the sender is protected in any way.\n\nFor adding a permission\
    \ to the receiver side, we first need to declare using it inside `AndroidManifest.xml`\
    \ on an app level:\n\n```\n...\n<application ...\n```\n\nNext, we explicitly add\
    \ it to the receiver element inside the same manifest file\n\nwhere `MyReceiver`\
    \ is an implementation of `android.content.BroadcastReceiver`."
  raw: "Active or On-Hold Listening\nThe question \nis in which state an app must\
    \ be in order to be able to receive implicit\nbroadcasts. If we want a broadcast\
    \ receiver to be just registered in the\nsystem and fired up only on demand when\
    \ a matching broadcast arrives,\nthe listener must be specified in the manifest\
    \ file of the app. However,\nfor implicit broadcasts this cannot be freely done,\
    \ only for predefined\nsystem broadcasts as listed in section “Listening to System\n\
    Broadcasts.”\n\nNote\n\nThis restriction on implicit intent filters has been introduced\
    \ in\nAndroid 8.0 or API level 26\\. Before that, any implicit filters could be\n\
    specified inside the manifest file.\n\nIf however you start your broadcast listeners\
    \ programmatically from\ninside an app and this app is running, you can define\
    \ as many implicit\nbroadcast listeners as you wish, and there is no restriction\
    \ on whether\nthe broadcasts come from the system, your app, or other apps. Likewise,\n\
    there is no restriction on usable *action* or *category*\nnames.\nSince listening\
    \ for booting completed events is included in the list\nfor allowed listeners\
    \ inside the manifest file, you are free to start\napps there as activities or\
    \ services, and inside those apps you can\nregister any implicit listener. That\
    \ means you can legally work around\nthe restrictions imposed starting with Android\
    \ 8.0\\. Just be aware that\nsuch apps may be killed by the Android OS  if resource\n\
    shortages occur, so you have to take appropriate precautions.\n\nSending Implicit\
    \ Broadcasts\n\nTo prepare sending\n an implicit broadcast, you specify an action,\
    \ categories, data,\nand extra data as follows:\n\n```\nval intent = Intent()\n\
    intent.action = \"de.pspaeth.myapp.DO_STH\"\nintent.addCategory(\"de.pspaeth.myapp.CATEG1\"\
    )\nintent.addCategory(\"de.pspaeth.myapp.CATEG2\")\n// ... more categories\nintent.type\
    \ = \"text/html\"\nintent.data = Uri.parse(\"content://myContent\")\nintent.putExtra(\"\
    EXTRA_KEY\", \"extraVal\")\nintent.flags = ...\n```\n\nOnly the action is mandatory;\
    \ all the others are optional. Now to send\nthe broadcast, you’d write\n\n```\n\
    sendBroadcast(intent)\n```\n\nfor a remote broadcast or\n\n```\nLocalBroadcastManager.getInstance(this).\n\
    sendBroadcast(intent)\n```\n\nfor a local broadcast. The “this” must be a `Context`\
    \ or a subclass\nthereof – it will work exactly like shown here if the code is\
    \ from\ninside an activity or a service class.\n\nFor remote messages there is\
    \ also a variant sending a broadcast to\napplicable receivers one at a time:\n\
    \n```\n...\nsendOrderedBroadcast(...)\n...\n```\n\nThis makes the receivers get\
    \ the message sequentially, and each receiver  may cancel\nforwarding the message\
    \ to the next receiver in the line by using `BroadcastReceiver.abortBroadcast()`.\n\
    \nReceiving Implicit Broadcasts\n\nTo receive  an\nimplicit broadcast, for a limited\
    \ set of broadcast types (see section\n“Listening to System Broadcasts”), you\
    \ can specify a `BroadcastListener`\ninside `AndroidManifest.xml`\nas follows:\n\
    \n```\n...\n\n```\n\nThe `<data>` element\nshown here is just an example – all\
    \ possibilities are shown in Chapter\n[3](#463716_2_En_3_Chapter.xhtml), section\
    \ “Intent Filters.”\n\nIn contrast to that, adding a programmatic listener for\
    \ implicit broadcasts  to\nyour code is unrestricted:\n\n```\nclass MainActivity\
    \ : AppCompatActivity() {\nprivate var bcReceiver:BroadcastReceiver? = null\n\
    override fun onCreate(savedInstanceState: Bundle?) {\nsuper.onCreate(savedInstanceState)\n\
    // ...\nbcReceiver = MyReceiver()\nval ifi:IntentFilter =\nIntentFilter(\"de.pspaeth.myapp.DO_STH\"\
    )\nregisterReceiver(bcReceiver, ifi)\n}\noverride fun onDestroy() {\nsuper.onDestroy()\n\
    // ...\nunregisterReceiver(bcReceiver)\n}\n}\n```\n\nThe `MyReceiver`   shown\
    \ here is an\nimplementation of class `android.content.BroadcastReceiver`.\n\n\
    Listening to System Broadcasts\n\nIn order to listen to\nsystem broadcasts  –\
    \ see the list in the online text companion’s\nsection “System Broadcasts” – you\
    \ can just use a programmatic\nregistration as shown earlier. For most of them,\
    \ you cannot use the\nmanifest registration way, for background execution limits\
    \ imposed since\nAndroid 8.0 or API level 26\\. However, for a number of them,\
    \ you can also\nuse the manifest file to specify listeners:\n\n*   **ACTION_LOCKED_BOOT_COMPLETED**,\n\
    \    **ACTION_BOOT_COMPLETED**:\n\nApps may need those to schedule jobs, alarms,\
    \ and so on.\n\n*   **ACTION_USER_INITIALIZE,\n    \"android.intent.action.USER_ADDED”,\n\
    \    “android.intent.action.USER_REMOVED”:**\n\nProtected by privileged permissions,\
    \ so use cases are\n    limited.\n\n*   **\"android.intent.action.TIME_SET\",\n\
    \    ACTION_TIMEZONE_CHANGED, ACTION_NEXT_ALARM_CLOCK_CHANGED:**\n\nNeeded by\
    \ clock apps.\n\n*   **ACTION_LOCALE_CHANGED**:\n\nThe locale changed, and apps\
    \  might need to\n    update their data when this happens.\n\n*   **ACTION_USB_ACCESSORY_ATTACHED,\n\
    \    ACTION_USB_ACCESSORY_DETACHED, ACTION_USB_DEVICE_ATTACHED,\n    ACTION_USB_DEVICE_DETACHED:**\n\
    \nUSB-related events.\n\n*   **ACTION_CONNECTION_STATE_CHANGED, ACTION_ACL_ CONNECTED,\n\
    \    ACTION_ACL_DISCONNECTED:**\n\nBluetooth events.\n\n*   **ACTION_CARRIER_CONFIG_CHANGED,\
    \ TelephonyIntents.\n    ACTION__SUBSCRIPTION_CHANGED, “TelephonyIntents.\n  \
    \  SECRET_CODE_ACTION”:**\n\nOEM telephony apps may need to receive these broadcasts.\n\
    \n*   **LOGIN_ACCOUNTS_CHANGED_ACTION**:\n\nNeeded by some apps to set up scheduled\
    \ operations for new and\n    changed accounts.\n\n*   **ACTION_PACKAGE_DATA_CLEARED**:\n\
    \nData cleared by the OS “Settings” app. A running app likely is\n    interested\
    \ in that.\n\n*   **ACTION_PACKAGE_FULLY_REMOVED**:\n\nRelated apps may need to\
    \ be informed if some apps get uninstalled and\n    their data removed.\n\n* \
    \  **ACTION_NEW_OUTGOING_CALL**:\n\nIntercepting outgoing calls.\n\n*   **ACTION_DEVICE_OWNER_CHANGED**:\n\
    \nSome apps may need to receive it, so that they know that the device’s\n    security\
    \ status has changed.\n\n*   **ACTION_EVENT_REMINDER**:\n\nSent by the calendar\
    \ provider  to post an\n    event reminder to the calendar app.\n\n*   **ACTION_MEDIA_MOUNTED,\
    \ ACTION_MEDIA_CHECKING,\n    ACTION_MEDIA_UNMOUNTED, ACTION_MEDIA_EJECT, ACTION_MEDIA_UNMOUNTABLE,\n\
    \    ACTION_MEDIA_REMOVED, ACTION_MEDIA_BAD_REMOVAL**:\n\nApps may need to know\
    \ about the user’s physical interactions with the\n    device.\n\n*   **SMS_RECEIVED_ACTION,\n\
    \    WAP_PUSH_RECEIVED_ACTION**:\n\nNeeded by SMS recipient apps.\n\nAdding Security\
    \ to Broadcasts\nSecurity    in broadcasting\nmessages is handled by the *permission*\
    \ system, which gets\ndescribed in more detail in Chapter [7](#463716_2_En_7_Chapter.xhtml).\n\
    In the following sections, we distinguish between explicit and\nimplicit broadcasts.\n\
    \nSecuring Explicit Broadcasts\n\nFor non-local broadcasting     , that is, not\
    \ using\nthe `LocalBroadcastManager`,\npermissions can be specified on both sides,\
    \ the receiver *and*\nthe sender. For the latter, the broadcast sending methods\
    \ have\noverloaded versions including a permission specifier:\n\n```\n...\nval\
    \ intent = Intent(this, MyReceiver::class.java)\n...\nsendBroadcast(intent, \"\
    com.xyz.theapp.PERMISSION1\")\n...\n```\n\nThis expresses sending a broadcast\
    \ to a receiver that is protected by\n“com.xyz.theapp.PERMISSION1”. Of course\
    \ you should write your own\npackage names here and use appropriate permission\
    \ names.\n\nIn contrast, sending a broadcast without permission specification\n\
    \n```\n...\nval intent = Intent(this, MyReceiver::class.java)\n...\nsendBroadcast(intent)\n\
    ...\n```\n\nmay address receivers with and without permission protection. That\n\
    means specifying permissions on the sender side is not supposed to tell\nthe receiver\
    \ that the sender is protected in any way.\n\nFor adding a permission to the receiver\
    \ side, we first need to declare\nusing it inside `AndroidManifest.xml`\non an\
    \ app level:\n\n```\n\n...\n<application ...\n```\n\nNext, we explicitly add it\
    \ to the receiver element inside the same\nmanifest file\n\nwhere `MyReceiver`\
    \ is an\nimplementation of `android.content.BroadcastReceiver`."
  trans: "\n### 活跃监听与待命监听\n\n问题在于，一个应用必须处于何种状态才能接收隐式广播。如果我们希望广播接收器仅在系统中注册，并且只在匹配的广播到达时按需启动，则必须在应用的清单文件中指定该监听器。然而，对于隐式广播，这不能随意进行，只能针对“监听系统广播”一节中列出的预定义系统广播进行。\n\
    \n**注意：**  \n此对隐式意图过滤器的限制是在 Android 8.0（即 API 级别 26）中引入的。在此之前，可以在清单文件中指定任何隐式过滤器。\n\
    \n但是，如果你在应用内部以编程方式启动广播监听器，并且该应用正在运行，则可以定义任意数量的隐式广播监听器，并且对于广播是来自系统、你的应用还是其他应用没有限制。同样，对可用的*操作*或*类别*名称也没有限制。\n\
    \n由于监听开机完成事件被包含在清单文件允许的监听器列表中，因此你可以自由地在其中以 Activity 或 Service 形式启动应用，并在这些应用内部注册任何隐式监听器。这意味着你可以合法地规避从\
    \ Android 8.0 开始施加的限制。只需注意，如果出现资源短缺，此类应用可能会被 Android 操作系统杀死，因此你必须采取适当的预防措施。\n\n\
    ### 发送隐式广播\n\n要准备发送隐式广播，你需要指定操作、类别、数据和附加数据，如下所示：\n\n```\nval intent = Intent()\n\
    intent.action = \"de.pspaeth.myapp.DO_STH\"\nintent.addCategory(\"de.pspaeth.myapp.CATEG1\"\
    )\nintent.addCategory(\"de.pspaeth.myapp.CATEG2\")\n// ... 更多类别\nintent.type =\
    \ \"text/html\"\nintent.data = Uri.parse(\"content://myContent\")\nintent.putExtra(\"\
    EXTRA_KEY\", \"extraVal\")\nintent.flags = ...\n```\n\n只有操作是强制性的；其他所有项都是可选的。现在，要发送广播，你可以编写\n\
    \n```\nsendBroadcast(intent)\n```\n\n用于远程广播，或者\n\n```\nLocalBroadcastManager.getInstance(this).sendBroadcast(intent)\n\
    ```\n\n用于本地广播。其中的“this”必须是 `Context` 或其子类——如果代码来自 Activity 或 Service 类内部，它将完全按此处所示的方式工作。\n\
    \n对于远程消息，还有一个变体，可以一次将广播发送给一个适用的接收器：\n\n```\n...\nsendOrderedBroadcast(...)\n...\n\
    ```\n\n这使得接收器顺序接收消息，并且每个接收器可以通过使用 `BroadcastReceiver.abortBroadcast()` 来取消将消息转发给队列中的下一个接收器。\n\
    \n### 接收隐式广播\n\n要接收隐式广播，对于有限的一组广播类型（参见“监听系统广播”一节），你可以在 `AndroidManifest.xml` 中指定一个\
    \ `BroadcastListener`，如下所示：\n\n```\n...\n\n```\n\n此处显示的 `<data>` 元素只是一个例子——所有可能性在第\
    \ 3 章的“意图过滤器”部分中都有介绍。\n\n相比之下，在你的代码中以编程方式添加隐式广播监听器则不受限制：\n\n```\nclass MainActivity\
    \ : AppCompatActivity() {\nprivate var bcReceiver:BroadcastReceiver? = null\n\
    override fun onCreate(savedInstanceState: Bundle?) {\nsuper.onCreate(savedInstanceState)\n\
    // ...\nbcReceiver = MyReceiver()\nval ifi:IntentFilter =\nIntentFilter(\"de.pspaeth.myapp.DO_STH\"\
    )\nregisterReceiver(bcReceiver, ifi)\n}\noverride fun onDestroy() {\nsuper.onDestroy()\n\
    // ...\nunregisterReceiver(bcReceiver)\n}\n}\n```\n\n此处显示的 `MyReceiver` 是 `android.content.BroadcastReceiver`\
    \ 类的一个实现。\n\n### 监听系统广播\n\n要监听系统广播——请参阅在线文本配套资料的“系统广播”部分中的列表——你可以像之前展示的那样使用编程注册。对于大多数系统广播，你不能使用清单文件注册方式，这是由于自\
    \ Android 8.0（即 API 级别 26）以来对后台执行施加的限制。然而，对于其中一些广播，你也可以使用清单文件来指定监听器：\n\n- **`ACTION_LOCKED_BOOT_COMPLETED`**、**`ACTION_BOOT_COMPLETED`**：应用可能需要这些来安排作业、闹钟等。\n\
    - **`ACTION_USER_INITIALIZE`**、**`\"android.intent.action.USER_ADDED\"`**、**`\"\
    android.intent.action.USER_REMOVED\"`**：由特权权限保护，因此用例有限。\n- **`\"android.intent.action.TIME_SET\"\
    `**、**`ACTION_TIMEZONE_CHANGED`**、**`ACTION_NEXT_ALARM_CLOCK_CHANGED`**：时钟应用所需。\n\
    - **`ACTION_LOCALE_CHANGED`**：语言区域已更改，应用可能需要在此时更新其数据。\n- **`ACTION_USB_ACCESSORY_ATTACHED`**、**`ACTION_USB_ACCESSORY_DETACHED`**、**`ACTION_USB_DEVICE_ATTACHED`**、**`ACTION_USB_DEVICE_DETACHED`**：USB\
    \ 相关事件。\n- **`ACTION_CONNECTION_STATE_CHANGED`**、**`ACTION_ACL_CONNECTED`**、**`ACTION_ACL_DISCONNECTED`**：蓝牙事件。\n\
    - **`ACTION_CARRIER_CONFIG_CHANGED`**、**`TelephonyIntents.ACTION__SUBSCRIPTION_CHANGED`**、**`TelephonyIntents.SECRET_CODE_ACTION`**：OEM\
    \ 电话应用可能需要接收这些广播。\n- **`LOGIN_ACCOUNTS_CHANGED_ACTION`**：某些应用需要用它来为新建和已更改的账户设置计划操作。\n\
    - **`ACTION_PACKAGE_DATA_CLEARED`**：由操作系统的“设置”应用清除数据。正在运行的应用可能对此感兴趣。\n- **`ACTION_PACKAGE_FULLY_REMOVED`**：如果某些应用被卸载且其数据被移除，可能需要通知相关应用。\n\
    - **`ACTION_NEW_OUTGOING_CALL`**：拦截拨出的电话。\n- **`ACTION_DEVICE_OWNER_CHANGED`**：某些应用可能需要接收它，以便了解设备的安全状态已更改。\n\
    - **`ACTION_EVENT_REMINDER`**：由日历提供程序发送，以将事件提醒发布到日历应用。\n- **`ACTION_MEDIA_MOUNTED`**、**`ACTION_MEDIA_CHECKING`**、**`ACTION_MEDIA_UNMOUNTED`**、**`ACTION_MEDIA_EJECT`**、**`ACTION_MEDIA_UNMOUNTABLE`**、**`ACTION_MEDIA_REMOVED`**、**`ACTION_MEDIA_BAD_REMOVAL`**：应用可能需要了解用户与设备的物理交互。\n\
    - **`SMS_RECEIVED_ACTION`**、**`WAP_PUSH_RECEIVED_ACTION`**：短信接收应用所需。\n\n### 为广播增加安全性\n\
    \n广播消息的安全性由*权限*系统处理，这将在第 7 章中更详细地描述。在以下章节中，我们区分显式广播和隐式广播。\n\n#### 保护显式广播\n\n对于非本地广播，即不使用\
    \ `LocalBroadcastManager`，可以在接收方*和*发送方两侧指定权限。对于后者，广播发送方法有包含权限说明符的重载版本：\n\n```\n\
    ...\nval intent = Intent(this, MyReceiver::class.java)\n...\nsendBroadcast(intent,\
    \ \"com.xyz.theapp.PERMISSION1\")\n...\n```\n\n这表示向受 `\"com.xyz.theapp.PERMISSION1\"\
    ` 保护的接收器发送广播。当然，你应该在此处写入你自己的包名并使用适当的权限名称。\n\n相比之下，不指定权限发送广播\n\n```\n...\nval intent\
    \ = Intent(this, MyReceiver::class.java)\n...\nsendBroadcast(intent)\n...\n```\n\
    \n可能会寻址到有权限保护和无权限保护的接收器。这意味着在发送方指定权限并不旨在告诉接收方发送方以任何方式受到保护。\n\n要为接收方添加权限，我们首先需要在应用级别的\
    \ `AndroidManifest.xml` 中声明使用它：\n\n```\n...\n<application ...\n```\n\n接下来，我们在同一个清单文件中将其显式添加到接收器元素中\n\
    \n其中 `MyReceiver` 是 `android.content.BroadcastReceiver` 的一个实现。\n"
- fmt: "Then, since this is a custom permission, you have to declare itself in the\
    \ manifest file:\n\n```xml\n...\n```\n\nThe `<permission>` allows for a couple\
    \ of more attributes (see section “Manifest Top-Level Entries” in the online text\
    \ companion), namely, the protection level. The details for and implications of\
    \ that get explained thoroughly in Chapter [7](#463716_2_En_7_Chapter.xhtml).\
    \ For non-custom permissions, you don’t need to use the `<permission>` element.\n\
    \n**Caution**\n\nSpecifying a permission on the sender side without having a matching\
    \ permission on the receiver side silently fails when you try to send a broadcast.\
    \ There are also no logging entries, so be careful with sender-side permissions.\n\
    \nIf you use local broadcasts with the `LocalBroadcastManager`, you cannot specify\
    \ permissions on neither the sender nor the receiver side.\n\n## Securing Implicit\
    \ Broadcasts\n\nSame as for non-local explicit broadcasts, permissions in implicit\
    \ broadcasts can be specified on both broadcast sender and receiver sides. On\
    \ the sender side, you would write:\n\n```kotlin\nval intent = Intent()\nintent.action\
    \ = \"de.pspaeth.myapp.DO_STH\"\n// ... more intent coordinates\nsendBroadcast(intent,\
    \ \"com.xyz.theapp.PERMISSION1\")\n```\n\nwhich expresses sending a broadcast\
    \ to all matching receivers that are additionally protected by `\"com.xyz.theapp.PERMISSION1\"\
    `. Of course you should write your own package names here and use appropriate\
    \ permission names. As with the usual sender-receiver matching procedure for implicit\
    \ broadcasts, adding a permission kind of serves as an additional matching criterion,\
    \ so if there are several receiver candidates, looking at the intent filters,\
    \ for actually receiving this broadcast, only those that additionally provide\
    \ this permission flag will be picked out.\n\nOne more thing that needs to be\
    \ taken care of for implicit broadcasts is specifying the permission usage in\
    \ `AndroidManifest.xml`. So for this sender to be able to use the permission,\
    \ add:\n\n```xml\n<uses-permission android:name=\"com.xyz.theapp.PERMISSION1\"\
    \ />\n```\n\nto the manifest file.\n\nSame as for explicit broadcasts, sending\
    \ a broadcast without permission specification:\n\n```kotlin\n...\nsendBroadcast(intent)\n\
    ...\n```\n\nmay address receivers with and without permission protection. That\
    \ means specifying permissions on the sender side is not supposed to tell the\
    \ receiver that the sender is protected in any way.\n\nIn order for a receiver\
    \ to be able to get hold of such a broadcast, the permission must be added to\
    \ the code like:\n\n```kotlin\nprivate var bcReceiver: BroadcastReceiver? = null\n\
    override fun onCreate(savedInstanceState: Bundle?) {\n    super.onCreate(savedInstanceState)\n\
    \    ...\n    bcReceiver = object : BroadcastReceiver() {\n        override fun\
    \ onReceive(context: Context?,\n                                intent: Intent?)\
    \ {\n            // do s.th. when receiving...\n        }\n    }\n    val ifi:\
    \ IntentFilter =\n        IntentFilter(\"de.pspaeth.myapp.DO_STH\")\n    registerReceiver(bcReceiver,\
    \ ifi,\n        \"com.xyz.theapp.PERMISSION1\", null)\n}\noverride fun onDestroy()\
    \ {\n    super.onDestroy()\n    unregisterReceiver(bcReceiver)\n}\n```\n\nIn addition\
    \ you must both define the permission and declare using it in the receiver’s manifest\
    \ file:\n\n```xml\n<permission android:name=\"com.xyz.theapp.PERMISSION1\" />\n\
    ...\n<uses-permission android:name=\"com.xyz.theapp.PERMISSION1\" />\n```\n\n\
    Again, for non-custom permissions, you don’t need to use the `<permission>` element.\
    \ For more about permissions, see Chapter [7](#463716_2_En_7_Chapter.xhtml).\n\
    \n**Note**\n\nAs an additional means to improve security, in applicable cases\
    \ you can use `Intent.setPackage()` to restrict possible receivers.\n\n## Sending\
    \ Broadcasts from the Command Line\n\nFor devices you can connect to via the *Android\
    \ Debug Bridge* (ADB) – see Chapter [19](#463716_2_En_19_Chapter.xhtml), section\
    \ “The SDK Platform Tools” – you can use a shell command on your development PC\
    \ to send a broadcast message. An example would be:\n\n```bash\n./adb shell am\
    \ broadcast -a de.pspaeth.myapp.DO_STH \\\n    de.pspaeth.simplebroadcast MyReceiver\n\
    ```\n\nsending an action `\"de.pspaeth.myapp.DO_STH\"` to the dedicated receiver\
    \ `\"MyReceiver\"` of the package `\"de.pspaeth.simplebroadcast\"` (this thus\
    \ is an explicit broadcast message).\n\nTo get a complete synopsis for that way\
    \ of sending broadcasts, you can use the shell as follows:\n\n```bash\n./adb shell\n\
    am\n```"
  raw: "Then, since this is a custom permission, you have to declare itself in\nthe\
    \ manifest file:\n\n```\n\n...\n```\n\nThe `<permission>`\nallows for a couple\
    \ of more attributes (see section “Manifest Top-Level\nEntries” in the online\
    \ text companion), namely, the protection level     . The details for and\nimplications\
    \ of that get explained thoroughly in Chapter [7](#463716_2_En_7_Chapter.xhtml).\n\
    For non-custom permissions, you don’t need to use the `<permission>`\nelement.\n\
    \nCaution\n\nSpecifying a permission on the sender side without having a matching\n\
    permission on the receiver side silently fails when you try to send a\nbroadcast.\
    \ There are also no logging entries, so be careful with\nsender-side permissions.\n\
    \nIf you use local broadcasts  with the\n`LocalBroadcastManager`,\nyou cannot\
    \ specify permissions on neither the sender nor the receiver\nside.\n\nSecuring\
    \ Implicit Broadcasts\n\nSame as for non-local\nexplicit broadcasts , permissions\
    \ in implicit broadcasts \n    can be specified on\nboth broadcast sender and\
    \ receiver sides. On the sender side, you would\nwrite\n\n```\nval intent = Intent()\n\
    intent.action = \"de.pspaeth.myapp.DO_STH\"\n// ... more intent coordinates\n\
    sendBroadcast(intent, \"com.xyz.theapp.PERMISSION1\")\n```\n\nwhich expresses\
    \ sending a broadcast to all matching receivers that\nare additionally protected\
    \ by “com.xyz.theapp.PERMISSION1”. Of course\nyou should write your own package\
    \ names here and use appropriate\npermission names. As with the usual sender-receiver\
    \ matching procedure\nfor implicit broadcasts, adding a permission kind of serves\
    \ as an\nadditional matching criterion, so if there are several receiver\ncandidates,\
    \ looking at the intent filters, for actually receiving this\nbroadcast, only\
    \ those that additionally provide this permission flag\nwill be picked out.\n\n\
    One more thing that needs to be taken care of for implicit broadcasts is\nspecifying\
    \ the permission usage in `AndroidManifest.xml`.\nSo for this sender to be able\
    \ to use the permission, add\n\n```\nto the manifest file.\n\nSame as for explicit\
    \ broadcasts, sending a broadcast without permission\nspecification\n\n```\n...\n\
    sendBroadcast(intent)\n...\n```\n\nmay address receivers\n   with and\nwithout\
    \ permission protection. That means specifying permissions on the\nsender side\
    \ is not supposed to tell the receiver that the sender  is protected in\nany way.\n\
    \nIn order for a receiver to be able to get hold of such a broadcast, the\npermission\
    \ must be added to the code like\n\n```\nprivate var bcReceiver: BroadcastReceiver?\
    \ = null\noverride fun onCreate(savedInstanceState: Bundle?) {\nsuper.onCreate(savedInstanceState)\n\
    ...\nbcReceiver = object : BroadcastReceiver() {\noverride fun onReceive(context:\
    \ Context?,\nintent: Intent?) {\n// do s.th. when receiving...\n}\n}\nval ifi:\
    \ IntentFilter =\nIntentFilter(\"de.pspaeth.myapp.DO_STH\")\nregisterReceiver(bcReceiver,\
    \ ifi,\n\"com.xyz.theapp.PERMISSION1\", null)\n}\noverride fun onDestroy() {\n\
    super.onDestroy()\nunregisterReceiver(bcReceiver)\n}\n```\n\nIn addition you must\
    \ both define the permission and declare using it in\nthe receiver’s manifest\
    \ file:\n\n```\n...\n\n...\n```\n\nAgain, for non-custom permissions   , you don’t\
    \ need to use\nthe `<permission>`\nelement. For more about permissions , see\n\
    Chapter [7](#463716_2_En_7_Chapter.xhtml).\n\nNote\n\nAs an additional means to\
    \ improve security, in applicable cases you\ncan use `Intent.setPackage()`\nto\
    \ restrict possible receivers.\n\nSending Broadcasts from the Command Line\n\n\
    For devices you can connect to via the *Android Debug Bridge*\n(ADB)  – see\n\
    Chapter [19](#463716_2_En_19_Chapter.xhtml), section “The SDK Platform Tools”\n\
    – you can use a shell command on your development PC to send a broadcast\nmessage\
    \ . An\nexample would be\n\n```\n./adb shell am broadcast -a de.pspaeth.myapp.DO_STH\
    \ \\\nde.pspaeth.simplebroadcast MyReceiver\n```\n\nsending an action “de.pspaeth.myapp.DO_STH”\
    \ to the dedicated receiver\n“MyReceiver” of the package “de.pspaeth.simplebroadcast”\
    \ (this thus is\nan explicit broadcast message).\n\nTo get a complete synopsis\
    \ for that way of sending broadcasts, you can\nuse the shell as follows:\n\n```\n\
    ./adb shell\nam\n```"
  trans: "\n由于这是自定义权限，你需要在清单文件中声明它：\n\n```xml\n...\n```\n\n`<permission>` 元素还支持一些其他属性（参见在线配套文本中的“清单顶级条目”章节），例如保护级别。这些属性的详细说明及其影响将在第\
    \ 7 章中深入讲解。对于非自定义权限，你无需使用 `<permission>` 元素。\n\n**警告**\n\n如果在发送方指定了权限，但接收方没有匹配的权限，尝试发送广播时会静默失败。同时也不会有任何日志记录，因此使用发送方权限时需格外小心。\n\
    \n如果通过 `LocalBroadcastManager` 使用本地广播，则无法在发送方或接收方指定权限。\n\n## 保护隐式广播\n\n与非本地显式广播类似，隐式广播的权限既可以在发送方指定，也可以在接收方指定。在发送方，你可以这样写：\n\
    \n```kotlin\nval intent = Intent()\nintent.action = \"de.pspaeth.myapp.DO_STH\"\
    \n// ... 更多 intent 坐标\nsendBroadcast(intent, \"com.xyz.theapp.PERMISSION1\")\n\
    ```\n\n这表示向所有同时受 `\"com.xyz.theapp.PERMISSION1\"` 保护的匹配接收方发送广播。当然，你应该在这里使用自己的包名和合适的权限名称。与隐式广播的常规发送方-接收方匹配流程一样，添加权限相当于增加了一个额外的匹配条件。因此，如果存在多个候选接收方，在查看\
    \ Intent 过滤器时，只有同时提供了该权限标志的接收方才会被选中来实际接收此广播。\n\n隐式广播还需要注意的另一件事是，在 `AndroidManifest.xml`\
    \ 中声明权限使用。因此，为了让发送方能够使用该权限，需要在清单文件中添加：\n\n```xml\n<uses-permission android:name=\"\
    com.xyz.theapp.PERMISSION1\" />\n```\n\n与显式广播相同，不带权限规范的广播发送：\n\n```kotlin\n...\n\
    sendBroadcast(intent)\n...\n```\n\n可能会同时寻址到有权限保护和无权限保护的接收方。这意味着，在发送方指定权限并不意味着告知接收方发送方受到了任何形式的保护。\n\
    \n为了让接收方能够获取此类广播，必须在代码中添加权限，示例如下：\n\n```kotlin\nprivate var bcReceiver: BroadcastReceiver?\
    \ = null\noverride fun onCreate(savedInstanceState: Bundle?) {\n    super.onCreate(savedInstanceState)\n\
    \    ...\n    bcReceiver = object : BroadcastReceiver() {\n        override fun\
    \ onReceive(context: Context?,\n                                intent: Intent?)\
    \ {\n            // 接收到广播时执行某些操作...\n        }\n    }\n    val ifi: IntentFilter\
    \ =\n        IntentFilter(\"de.pspaeth.myapp.DO_STH\")\n    registerReceiver(bcReceiver,\
    \ ifi,\n        \"com.xyz.theapp.PERMISSION1\", null)\n}\noverride fun onDestroy()\
    \ {\n    super.onDestroy()\n    unregisterReceiver(bcReceiver)\n}\n```\n\n此外，你必须在接收方的清单文件中同时定义并使用该权限：\n\
    \n```xml\n<permission android:name=\"com.xyz.theapp.PERMISSION1\" />\n...\n<uses-permission\
    \ android:name=\"com.xyz.theapp.PERMISSION1\" />\n```\n\n再次强调，对于非自定义权限，你无需使用 `<permission>`\
    \ 元素。更多关于权限的信息，请参见第 7 章。\n\n**注意**\n\n作为提升安全性的附加手段，在适用情况下，你可以使用 `Intent.setPackage()`\
    \ 来限制可能的接收方。\n\n## 从命令行发送广播\n\n对于可通过*安卓调试桥*（ADB）连接的设备（参见第 19 章“SDK 平台工具”部分），你可以在开发电脑上使用\
    \ shell 命令发送广播消息。示例如下：\n\n```bash\n./adb shell am broadcast -a de.pspaeth.myapp.DO_STH\
    \ \\\n    de.pspaeth.simplebroadcast MyReceiver\n```\n\n这会将操作 `\"de.pspaeth.myapp.DO_STH\"\
    ` 发送给包 `\"de.pspaeth.simplebroadcast\"` 中的指定接收器 `\"MyReceiver\"`（因此这是一个显式广播消息）。\n\
    \n要获取这种广播发送方式的完整说明，可以按如下方式使用 shell：\n\n```bash\n./adb shell\nam\n```\n"
- fmt: "# This command  \nwill show you all the possibilities to create broadcast\
    \ messages and do other things using that `am` command.\n\n## Random Notes on\
    \ Broadcasts\n\n- You can register and unregister programmatically managed receivers\
    \ also in callback methods `onPause()` and `onResume()`. Obviously, registering\
    \ and unregistering will then happen more often compared with using the `onCreate()`/`onDestroy()`\
    \ pair.\n\n- A currently executing `onReceive()` method will upgrade the process\
    \ priority to “foreground” level, preventing the Android OS from killing the receiving\
    \ process – it would then happen only under extreme resource shortage conditions.\n\
    \n- If you have long-running processes inside `onReceive()`, you might think of\
    \ running them on a background thread, finishing `onReceive()` early. However,\
    \ since the process priority will be reverted to the normal level after finishing\
    \ `onReceive()`, your background process is more likely to be killed, breaking\
    \ your app. You can prevent this by using `Context.goAsync()` and then starting\
    \ an `AsyncTask` (inside, at the end you must call `finish()` on the `PendingResult`\
    \ object you got from `goAsync()` to eventually free resources), or you can use\
    \ a `JobScheduler`.\n\n- Custom permissions (we used such in the “Securing Implicit\
    \ Broadcasts” section) get registered when the app gets installed. Because of\
    \ that the app defining the custom permissions must be installed prior to the\
    \ apps using them.\n\n- Be cautious with sending sensitive information through\
    \ implicit broadcasts. Potentially malicious apps may try to receive them as well.\
    \ At the least you can secure the broadcast by specifying permissions on the sender\
    \ side.\n\n- For clarity and to not mess up with other apps, always use namespaces\
    \ for broadcast action and permission names.\n\n- Avoid starting activities from\
    \ broadcasts – this contradicts Android usability principles.\n\n## 6. Content\
    \ Providers\n\n### The Content Provider Framework\n\nThe *content provider* framework\
    \ allows for:\n\n1. Using (structured) data provided by other apps\n2. Providing\
    \ (structured) data for use by other apps\n3. Supporting copying data from one\
    \ app to another\n4. Providing data to the *search framework*\n5. Providing data\
    \ to special data-related UI widgets\n6. Doing all that by virtue of a well-defined\
    \ standardized interface\n\nThe data communicated can have a strictly defined\
    \ structure, for example, the rows from a database with defined column names and\
    \ types, but it can also be files or byte arrays without any semantics associated.\
    \ If the requirements of your app concerning data storage do not fit in any of\
    \ the preceding cases, you don’t need to implement content provider components\
    \ – use the normal data storage options instead.\n\n> **Note**: It is not strictly\
    \ forbidden for an app to provide data to its own components or use its own data\
    \ provider for accessing content; however, looking at content providers, you usually\
    \ think of inter-app data exchange. But if you need it, you always can consider\
    \ intra-app data exchange patterns as a straightforward special case of inter-app\
    \ communication.\n\nIf we want to create content-aware apps, both looking at providing\
    \ and consuming content, the main questions are as follows:\n\n- How do apps provide\
    \ content?\n- How do apps access content provided by other apps?\n- How do apps\
    \ handle content provided by other apps?\n- How do we secure the provided data?\n\
    \nAnd we will be looking at exactly these topics in the following sections. An\
    \ outline is shown in Figure [6-1](#463716_2_En_6_Chapter.xhtml#Fig1).\n\n![](images/463716_2_En_6_Chapter/463716_2_En_6_Fig1_HTML.png)\n\
    \n*A graphic of a content provider defines how the `Uri` class of file streams,\
    \ modifies, and queries with cursor class flow to the content resolver and provider,\
    \ and in turn to the data.*\n\n**Figure 6-1** – Content Provider Framework\n\n\
    ### Providing Content\n\nContent can be provided by your app, but of course also\
    \ by system apps. Think, for example, of pictures taken by the camera or contacts\
    \ from your contacts list. The content provider framework is a little easier to\
    \ grasp if we first look at the content providing side. In later sections we will\
    \ also be looking at consumers and other topics.\n\nFirst of all we need to know\
    \ where the data lives. However, the content provider framework makes no assumptions\
    \ on where the data actually comes from – it can reside in files, databases, in-memory\
    \ storages, or any other place you might think of. This improves the maintenance\
    \ of your app. For example, in an early project stage, data may come from files,\
    \ but later you switch to a database or cloud storage, and the possible consumers\
    \ don’t have to care about those changes, because they don’t have to change the\
    \ way of addressing your content. The content provider framework thus provides\
    \ an abstraction layer for your data.\n\nThe single interface you need to implement\
    \ for providing content is the abstract class:\n\n```java\nandroid.content.ContentProvider\n\
    ```\n\nIn the following subsections, we will be looking at the implementation\
    \ of this class from a use case perspective.\n\n### Initializing the Provider\n\
    \nInside your instantiable subclass of the `ContentProvider` class, you *have*\
    \ to implement the method:\n\n```java\nonCreate()\n```\n\nThis method gets called\
    \ by the Android OS when the content provider is being instantiated. Here you\
    \ can initialize the content provider, but you should avoid putting time-consuming\
    \ initialization processes at this place, since instantiation does not necessarily\
    \ mean the content provider will be actually used at all. If you don’t have anything\
    \ interesting to do here, just implement it as an empty method.\n\nTo find out\
    \ more about the environment your content provider is running in when instantiated,\
    \ you can overwrite its `attachInfo()` method – there you will be told about the\
    \ context the content provider is running in and also get a `ProviderInfo` object.\
    \ Just don’t forget to also call `super.attachInfo()` from inside.\n\n### Querying\
    \ Data\n\nFor querying database-like data sets, there is one method you *must*\
    \ implement and two more you *can* implement:\n\n```kotlin\nabstract fun query(\
    \        // ----- Variant A -----\n    uri: Uri,\n    projection: Array,\n   \
    \ selection: String,\n    selectionArgs: Array,\n    sortOrder: String\n) : Cursor\n\
    \n// ----- Variant B -----\n// You don't have to implement this. The default\n\
    // implementation calls variant A, but disregards the\n// 'cancellationSignal'\
    \ argument.\nfun query(\n    uri: Uri,\n    projection: Array,\n    selection:\
    \ String,\n    selectionArgs: Array,\n    String sortOrder: String,\n    cancellationSignal:\
    \ CancellationSignal\n) : Cursor\n\n// ----- Variant C -----\n// You don't have\
    \ to implement this. The default\n// implementation converts the bundle argument\
    \ to\n// appropriate arguments for calling variant B.\n// The bundle keys used\
    \ are:\n//     ContentResolver.QUERY_ARG_SQL_SELECTION\n//     ContentResolver.QUERY_ARG_SQL_SELECTION_ARGS\n\
    //     ContentResolver.QUERY_ARG_SQL_SORT_ORDER -or-\n//         ContentResolver.QUERY_ARG_SORT_COLUMNS\n\
    //         (this being a String array)\nfun query(\n    uri: Uri,\n    projection:\
    \ Array,\n    queryArgs: Bundle,\n    cancellationSignal: CancellationSignal\n\
    ) : Cursor\n```\n\nThese methods are not intended to present file data like images\
    \ and sound. To return links or identifiers to file data is acceptable, though.\n\
    \nIn the following paragraphs, we describe all the parameters by name and variant:\n\
    \n- **`uri`** : This is an important parameter specifying the type coordinates\
    \ of the query in the data space. Content consumers will tell what *kind* of data\
    \ they are interested in by appropriately specifying this parameter. Since URIs\
    \ are so important, we describe them in an own subsection; see the following section\
    \ “Designing Content URIs.” This parameter has the same meaning for all variants\
    \ A, B, and C."
