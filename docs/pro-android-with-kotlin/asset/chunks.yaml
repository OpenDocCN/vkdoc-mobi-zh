    \ 你可以使用这里提供的 put* 方法之一\n    // 或编写你自己的 Parcelable 类型\n}\n\noverride fun onRestoreInstanceState(savedInstanceState:\
    \ Bundle?) {\n    super.onRestoreInstanceState(savedInstanceState)\n    // 在此处从\
    \ Bundle 还原你自己的数据……\n    // 使用这里提供的 get* 方法之一\n}\n```\n\n请注意，保存的状态也会传递到 `onCreate()`\
    \ 回调中，因此你可以自行决定是使用 `onRestoreInstanceState()` 还是 `onCreate()` 方法来恢复状态。\n\n在其他情况下，用于保存和恢复状态的标准机制可能无法满足你的需求。例如，它无法在停止应用时保留数据。在这种情况下，`onSaveInstanceState()`\
    \ 不会被调用。如果你也需要在此类情况下保留数据，可以在 `onDestroy()` 中将应用数据保存到数据库，并在 `onCreate()` 回调中读取该数据库。请参阅第\
    \ 8 章的“数据库”部分。\n\n## 服务\n\n服务是那些没有用户界面（状态栏中的通知或 Toast 除外）的组件，且概念上与长时间运行的进程密切相关。服务可以由应用启动，也可以被应用绑定，或者同时进行这两种操作。\n\
    \n服务分为两种：前台服务和后台服务。乍看之下，“前台服务”这个说法似乎有些矛盾，因为很多人倾向于告诉你“服务在后台运行”，但前台服务确实存在，并且区分前台服务和后台服务至关重要，因为它们的行为不同。\n\
    \n> **注意**\n> 不要将服务误解为用于运行所有后台计算任务（即不干扰 GUI 活动）的构造。如果你需要一个不干扰 GUI，但在应用不活动时也无法运行，且不被应用外部使用的进程，请考虑使用额外的线程。请参阅第\
    \ 11 章。\n\n完全理解服务并非易事，尤其是在不同 Android 版本之间存在显著差异的情况下。虽然本章旨在为你提供概述并展示一些细节层面的提示，但它无法涵盖服务开发的所有方面。因此，建议你同时查阅在线文档：[`https://developer.android.com/guide/components/services`](https://developer.android.com/guide/components/services)。\n\
    \n### 前台服务\n\n前台服务的内部功能因 Android 版本而异。在 Android 8.0 或 API 级别 26 之前，前台服务只是在状态栏有一个条目的后台服务，操作系统如何处理它们没有严格的影响；而在\
    \ Android 8.0 或 API 级别 26 之后，前台服务表现出特殊的行为，并得到 Android 操作系统的优先关注，这使它们不太可能因为资源短缺而被终止。具体来说：\n\
    \n*   **Android 8.0 或 API 级别 26 之前的前台服务** 只是那些在状态栏中显示通知条目的服务。需要使用服务的客户端组件并不知道启动的服务是否是前台服务；它只是通过\
    \ `startService(intent)` 启动服务。请参阅第 13 章。\n\n*   **从 Android 8.0 或 API 级别 26 开始的前台服务**\
    \ 以用户能感知到的方式运行。它们*必须*通过状态栏中的通知来与操作系统交互。客户端组件通过调用 `startForegroundService(intent)`\
    \ 显式启动前台服务，并且服务本身必须在几秒钟内通过调用 `startForeground(notificationId, notification)` 明确告知\
    \ Android 操作系统它希望作为前台服务运行。\n\n前台服务一个值得注意的生命周期特性是，它因资源短缺而被 Android 终止的可能性较小。然而，文档对此并不精确。有时你会读到“不会被终止”，有时是“不太可能被终止”。此外，Android\
    \ 处理此类问题的方式可能会随着新版本而改变。作为一般经验法则，你应该非常保守并做好最坏的打算。在这种情况下，应理解为“不太可能被终止”，并在你的应用正在执行某些工作而服务停止运行时采取预防措施。\n\
    \n### 后台服务\n\n后台服务在后台运行，也就是说，它们不会在状态栏中显示条目。不过，它们被允许使用 Toast 向用户发送简短的通知消息。与前台服务相比，后台服务更为脆弱，因为\
    \ Android 期望它们与用户活动的关联更松散，因此在资源短缺时更容易决定终止它们。\n\n从 Android 8.0（API 级别 26）开始，以旧方式实例化后台服务受到了一些限制，并且建议转向使用\
    \ JobScheduler 方法。当以下情况均不成立时，运行在 Android 8.0 或更高版本上的应用被视为以后台服务的形式运行：\n\n*   该应用有一个可见的活动，当前处于活动或暂停状态。\n\
    *   该应用有一个前台服务，即在其运行期间调用了 `startForeground()` 的服务。\n*   另一个前台应用正在连接到它，无论是通过使用它的某个服务还是将其用作内容提供者。\n\
    \n一旦 Android 8.0（或更高版本）的应用作为后台应用启动或切换为后台应用，在它被视为 *空闲* 之前，会有一个几分钟的时间窗口。一旦 *空闲*，应用的后台服务就会被停止。作为例外，如果后台应用处理用户可见的任务，例如处理\
    \ Firebase Cloud Messaging (FCM) 消息、接收广播（如 SMS 或 MMS 消息）、执行来自通知的 `PendingIntent`（一个由其他应用以原始应用权限执行的\
    \ Intent）或启动一个 `VpnService`，则该应用会进入 *白名单*，并被允许执行后台服务。\n\n从 Android 8.0 开始，以前通过执行后台作业完成的许多事情，现在被认为适合由\
    \ JobScheduler API 处理——请参阅第 8 章。\n\n### 声明服务\n\n服务需在应用的 `AndroidManifest.xml`\
    \ 文件中声明，如下所示：\n\n可用的标志请参见表 4-1。\n\n**表 4-1** 服务的清单标志\n\n| 名称 | 描述 |\n|------|------|\n\
    | `android:description` | 指向服务描述的资源 ID。建议你使用它，因为用户可以终止服务，但如果你告诉他们你的服务是做什么的，就不太可能发生这种情况。\
    \ |\n| `android:directBootAware` | 其值为 `true` 或 `false`。默认值为 `false`。如果为 `true`，即使设备重启后尚未解锁，该服务也可以运行。直接启动模式是在\
    \ Android 7.0 或 API 级别 24 中引入的。请注意，支持直接启动模式的服务必须将其数据存储在设备保护存储中。 |\n"
- fmt: '# Android 服务属性


    ## `android:enabled`

    取值为 `true` 或 `false`。默认值为 `true`。若设为 `false`，则服务将被有效禁用。通常情况下，你不会为生产环境中的服务将其设置为
    `false`。


    ## `android:exported`

    取值为 `true` 或 `false`。表示其他应用是否可以使用该服务。如果没有定义 intent 过滤器，默认值为 `false`，否则为 `true`。intent
    过滤器的存在暗示了外部使用场景，因此有此区分。


    ## `android:icon`

    图标的资源 ID。默认值为应用的图标。


    ## `android:isolatedProcess`

    取值为 `true` 或 `false`。默认值为 `false`。若设为 `true`，服务将无法通过常规途径与系统通信，只能通过服务方法进行交互。使用此标记通常是个好主意，但在大多数情况下，你的服务需要与系统通信，因此除非服务是完全自包含的，否则必须将其保留为
    `false`。


    ## `android:foregroundServiceType`

    取值可为以下之一：`"camera"`、`"connectedDevice"`、`"dataSync"`、`"location"`、`"mediaPlayback"`、`"mediaProjection"`、`"microphone"`、`"phoneCall"`。不同的前台服务类型会导致
    Android 系统采取不同的行为。如果通过此属性明确指定前台服务的类型，可以改善用户体验。


    ## `android:label`

    向用户显示的服务标签。默认值为应用的标签。


    ## `android:name`

    服务类的名称。如果以点号（`.`）作为首字符，系统会自动在其前面补上 `manifest` 元素中指定的包名。


    ## `android:permission`

    与此服务关联的权限名称。默认值为 `application` 元素中的 `permission` 属性。如果两处均未指定，服务将不受保护。


    ## `android:process`

    服务所属进程的名称。如果指定了此属性，服务将在其自己的进程中运行。若以冒号（`:`）开头，则该进程将为应用私有；若以小写字母开头，则生成的进程将是全局进程。可能存在安全限制。


    另请参阅：[`https://developer.android.com/guide/topics/manifest/service-element`](https://developer.android.com/guide/topics/manifest/service-element)


    ## `<service>` 元素的子元素


    `<service>` 元素可以包含以下子元素：


    - **`intent-filter`**：零个、一个或多个 intent 过滤器。相关描述见第 3 章“Intent 过滤器”一节。

    - **`meta-data`**：任意名称-值对，格式为 `<meta-data android:name="..." android:resource="..."
    android:value="..." />`。可以有多个此类元素，它们会被存储到一个 `android.os.Bundle` 元素中，可通过 `PackageItemInfo.metaData`
    访问。


    从 Android 9（API 级别 28）开始，前台服务必须在 `AndroidManifest.xml` 文件中请求额外的权限：


    ```xml

    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />

    ```


    ## 进程理解


    作为一名专业开发者，理解 *进程* 的实际含义以及 Android 操作系统如何处理它至关重要；请参阅清单中的 `android:service` 标记以控制进程。这可能很棘手，因为进程的内部机制往往会随着新
    Android 版本而变化，如果你浏览博客，会发现它们似乎每分钟都在变化。事实上，*进程* 是一个计算单元，由 Android 操作系统启动以执行计算任务。当
    Android 判定系统资源不足时，进程也会被终止。如果你决定停止使用某个特定应用，这并不自动意味着相应的一个或多个进程会被杀死。当你第一次启动一个应用，并且没有明确指示它使用另一个应用的进程时，系统一定会创建一个新进程并启动它。在后续的计算任务中，现有的进程会被复用，或者根据它们各自的设置及相互关系启动新的进程。


    如果没有任何预防措施，由应用启动的自身服务将在该应用的进程中运行。这意味着服务可能与应用一同存在，并不可避免地随之消亡。服务需要被启动才能真正存活，但当它运行在应用的主进程中时，它会随应用的终止而终止。这自动意味着服务的资源需求会计入应用的资源需求。在以前资源更为稀缺的时代，这一点比现代设备更强大时更为重要，但了解服务是否需要大量资源仍然是有益的：当出现某种资源短缺时，是杀整个应用还是只杀那个贪心的服务来释放资源，结果会截然不同。


    然而，如果你通过清单中的 `android:service` 条目告诉服务使用自己的进程，Android 操作系统就可以独立地管理服务的生命周期。你必须做出决定：要么让服务使用自己的进程，并接受单个应用可能出现进程泛滥的情况；要么让它们运行在同一个进程中，从而更紧密地耦合生命周期。


    让多个计算单元运行在同一个进程中还会带来另一个后果：它们不会并发运行！这对 GUI 活动和进程来说至关重要，因为我们知道 GUI 活动必须快速响应以避免阻塞用户交互，而服务在概念上绑定于长时间运行的计算任务。解决此困境的方法是使用异步任务或线程。我们将在第
    11 章中进一步讨论并发问题。


    ## 设备保护存储


    如果服务需要访问 *设备保护存储*（例如在由 `android:directBootAware` 标记触发的 *Direct Boot* 模式下），则需要访问一个特殊的上下文：


    ```kotlin

    val directBootContext: Context = appContext.createDeviceProtectedStorageContext()

    // 例如，从那里打开一个文件：

    val inStream: FileInputStream = directBootContext.openFileInput(filename)

    ```


    通常情况下不应使用此上下文，仅适用于需要在启动后立即激活的特殊服务。


    ## 服务类


    服务必须继承 `android.app.Service` 类或其子类，并且必须像前面描述的那样在应用的 `AndroidManifest.xml` 文件中进行声明。


    `android.app.Service` 的接口方法在在线配套文本的“Intent 组成部分”一节中进行了描述。


    请注意，要停止通过 `startService()` 或 `startForegroundService()` 显式启动的服务，有两种方式：服务自身通过调用
    `stopSelf()` 或 `stopSelfResult()` 停止，或者从外部通过调用 `stopService()` 停止。


    ## 启动服务


    可以从任何继承自 `android.content.Context` 或有权访问 `Context` 的组件（例如 Activity、其他 Service、BroadcastReceiver
    和 ContentProvider）显式启动服务。'
  raw: "android:enabled |\n One of `true`, `false`. Default is\ntrue. If false, the\
    \ service is effectively disabled. You wouldn’t\nnormally set it to false for\
    \ a production service. |\n\nandroid:exported |\n One of `true`, `false`. Whether\
