    \ 虚拟机上运行，或者在 Android 的类似 Java 的 Dalvik 虚拟机上运行。它也可以生成 JavaScript，供浏览器使用。问题是：我们能在\
    \ Android 中也使用它吗？答案是肯定的，在接下来的章节中，我将向你展示如何实现。\n\n### 创建一个 JavaScript 模块\n\n我们从一个包含\
    \ Kotlin 文件的 JavaScript 模块开始，这些文件会被编译成 JavaScript 文件。在启动新模块时，并没有所谓的\"JavaScript\"\
    模块向导，但我们可以轻松地从一个标准的智能手机应用模块开始，并将其转换以满足我们的需求。\n\n在 Android Studio 项目中，选择 New ➤\
    \ New Module，然后选择 Phone & Tablet Module。给它起个合适的名字，暂时就叫 \"kotlinjsSample\"。生成模块后，删除以下文件夹和文件，因为我们不需要它们：\n\
    \n```\nsrc/test\nsrc/androidTest\nsrc/main/java\nsrc/main/res\nsrc/main/AndroidManifest.xml\n\
    ```\n\n**注意：** 如果你想在 Android Studio 内部执行删除操作，需要先将视图类型从 \"Android\" 切换到 \"Project\"\
    。\n\n然后，添加两个文件夹：\n\n```\nsrc/main/kotlinjs\nsrc/main/web\n```\n\n现在，替换模块 `build.gradle`\
    \ 文件的内容，使其如下所示：\n\n```\nbuildscript {\next.kotlin_version = '1.2.31'\nrepositories\
    \ {\nmavenCentral()\n}\ndependencies {\nclasspath \"org.jetbrains.kotlin:\" +\n\
    \"kotlin-gradle-plugin:$kotlin_version\"\n}\n}\napply plugin: 'kotlin2js'\nsourceSets\
    \ {\nmain.kotlin.srcDirs += 'src/main/kotlinjs'\n}\ntask prepareForExport(type:\
    \ Jar) {\nbaseName = project.name + '-all'\nfrom {\nconfigurations.compile.collect\
    \ {\nit.isDirectory() ? it : zipTree(it) } +\n'src/main/web'\n}\nwith jar\n}\n\
    repositories {\nmavenCentral()\n}\ndependencies {\nimplementation \"org.jetbrains.kotlin:\"\
    \ +\n\"kotlin-stdlib-js:$kotlin_version\"\n}\n```\n\n此构建文件启用了 Kotlin ➤ JavaScript\
    \ 编译器，并引入了一个新的导出任务。现在，你可以在 Android Studio 窗口右侧打开 \"Gradle\" 视图，然后在 \"others\"\
    \ 下找到 `prepareForExport` 任务。双击即可运行它。之后，在 `build/libs` 目录下，你会发现一个新文件 `kotlinjsSample-all.jar`。这个文件就是供其他应用或模块使用的\
    \ JavaScript 模块。\n\n在 `src/main/kotlinjs` 目录下创建第一个文件 `Main.kt`，内容如下：\n\n```\n\
    import kotlin.browser.document\nfun main(args: Array) {\nval message = \"Hello\
    \ JavaScript!\"\ndocument.getElementById(\"cont\")!!.innerHTML = message\n}\n\
    ```\n\n最终我们面向的是一个网站，所以我们也需要一个初始的 HTML 页面。将其制作成标准的登录页面 `index.xhtml`，在 `src/main/web`\
    \ 目录下创建，并输入：\n\n```\n\nKotlin-JavaScript\n\n```\n\n再次执行 `prepareForExport` 任务，使模块输出的工件反映我们刚刚所做的更改。\n\
    \n### 使用 JavaScript 模块\n\n为了使用我们在上一节构建的 JavaScript 模块，我们在应用的 `build.gradle` 文件中添加几行代码：\n\
    \n```\ntask syncKotlinJs(type: Copy) {\nfrom zipTree('../kotlinjsSample/build/libs/'\
    \ +\n'kotlinjsSample-all.jar')\ninto 'src/main/assets/kotlinjs'\n}\npreBuild.dependsOn(syncKotlinJs)\n\
    ```\n\n这将导入 JavaScript 模块的输出文件，并将其解压到应用的 `assets` 文件夹中。通过 `dependsOn()` 声明，这个额外的构建任务会在正常构建过程中自动执行。\n\
    \n现在，在你的布局文件中，放置一个 `WebView` 元素，例如：\n\n为了用一个网页填充该视图，在你的主 Activity 的 `onCreate()`\
    \ 回调中，编写：\n\n```\nwv.webChromeClient = WebChromeClient()\nwv.settings.javaScriptEnabled\
    \ = true\nwv.loadUrl(\"file:///android_asset/kotlinjs/index.xhtml\")\n```\n\n\
    这将为 `WebView` 控件启用 JavaScript 支持，并从 JavaScript 模块加载主 HTML 页面。\n\n作为扩展，你可能希望将网页内的\
    \ JavaScript 连接到应用（而非 JavaScript 模块）中的 Kotlin 代码。这并不复杂。你只需添加：\n\n```\nclass JsObject\
    \ {\n@JavascriptInterface\noverride fun toString(): String {\nreturn \"Hi from\
    \ injectedObject\"\n}\n}\nwv.addJavascriptInterface(JsObject(), \"injectedObject\"\
    )\n```\n\n此后，就可以在 JavaScript 模块中通过以下方式使用 `injectedObject`：\n\n```\nval message\
    \ = \"Hello JavaScript! injected=\" +\nwindow[\"injectedObject\"]\n```\n\n利用这些技术，你可以完全使用\
    \ HTML、CSS、Kotlin（转译为 JavaScript）以及一些用于访问 Android API 的访问器对象来设计你的应用。\n\n## 12.\
    \ 构建\n\n在本章中，我们将讨论应用的构建过程。虽然从源文件构建应用既可以通过终端，也可以通过 Android Studio IDE 中的按钮和菜单项来完成，但本章并非\
    \ Android Studio 的入门指南或参考手册——这些内容请参阅其内置帮助文档、相关书籍或在线资源。我们本章要做的是，探讨构建相关的概念和方法，以便你能根据自身需求调整构建过程。\n\
    \n### 构建相关文件\n\n一旦你在 Android Studio 中创建一个新项目，你会看到以下构建相关文件：\n\n- **build.gradle**\
    \  \n  这是顶层项目级的构建文件。它包含项目所有模块共用的仓库和依赖项声明。对于简单的应用，你通常无需编辑此文件。\n\n- **gradle.properties**\
    \  \n  与 Gradle 构建相关的技术设置。通常无需编辑此文件。\n\n- **gradlew** 和 **gradlew.bat**  \n  包装脚本，这样你就可以使用终端而非\
    \ Android Studio IDE 来运行构建。\n\n- **local.properties**  \n  生成的、与你的 Android Studio\
    \ 安装相关的技术属性。你不应编辑此文件。\n\n- **settings.gradle**  \n  告知哪些模块属于该项目。如果你添加新模块，Android\
    \ Studio 会自动处理此文件。\n\n- **app/build.gradle**  \n  模块级别的构建文件。这很重要——模块的依赖项和构建过程在此处进行配置。Android\
    \ Studio 会为你创建一个名为 \"app\" 的第一个模块，并包含相应的构建文件，但 \"app\" 这个名称只是一个惯例。其他模块会有你随意选择的不同名称，且它们都有各自的构建文件。如果你愿意，甚至可以重命名\
    \ \"app\"，以更好地满足你的需求。\n\n### 模块配置\n\n项目中的每个模块都包含自己的构建文件 `build.gradle`。如果你让 Android\
    \ Studio 为你创建一个新项目或模块，它也会创建一个初始构建文件。一个支持 Kotlin 的模块的基本构建文件示例如下：\n\n"
- fmt: "```groovy\nplugins {\n    id 'com.android.application'\n    id 'org.jetbrains.kotlin.android'\n\
    \    id 'com.google.gms.google-services'\n}\nandroid {\n    compileSdk 32\n  \
    \  defaultConfig {\n        applicationId \"book.andrkotlpro.example1\"\n    \
    \    minSdk 23\n        targetSdk 32\n        versionCode 1\n        versionName\
    \ \"1.0\"\n        testInstrumentationRunner \"androidx.test.runner.AndroidJUnitRunner\"\
    \n        vectorDrawables {\n            useSupportLibrary true\n        }\n \
    \   }\n    buildTypes {\n        release {\n            minifyEnabled false\n\
    \            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),\
    \ 'proguard-rules.pro'\n        }\n    }\n    compileOptions {\n        sourceCompatibility\
    \ JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8\n\
    \    }\n    kotlinOptions {\n        jvmTarget = '1.8'\n    }\n    buildFeatures\
    \ {\n        compose true\n    }\n    composeOptions {\n        kotlinCompilerExtensionVersion\
    \ compose_version\n    }\n    packagingOptions {\n        resources {\n      \
    \      excludes += '/META-INF/{AL2.0,LGPL2.1}'\n        }\n    }\n}\ndependencies\
    \ {\n    implementation 'androidx.core:core-ktx:1.7.0'\n    implementation \"\
    androidx.compose.ui:ui:$compose_version\"\n    implementation \"androidx.compose.material:material:$compose_version\"\
    \n    implementation \"androidx.compose.ui:ui-tooling-preview:$compose_version\"\
    \n    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.3.1'\n    implementation\
    \ 'androidx.activity:activity-compose:1.3.1'\n    implementation 'com.google.firebase:firebase-messaging:20.1.0'\n\
    \    testImplementation 'junit:junit:4.13.2'\n    androidTestImplementation 'androidx.test.ext:junit:1.1.3'\n\
    \    androidTestImplementation 'androidx.test.espresso:espresso-core:3.4.0'\n\
    \    androidTestImplementation \"androidx.compose.ui:ui-test-junit4:$compose_version\"\
    \n    debugImplementation \"androidx.compose.ui:ui-tooling:$compose_version\"\n\
    \    debugImplementation \"androidx.compose.ui:ui-test-manifest:$compose_version\"\
    \n}\n```\n\n(Disregard the ¬ and the following line breaks.) Note that `\"...\"\
    ` strings in Gradle allow to contain `${}` placeholders, while `'...'` strings\
    \ do not. Other than that they are interchangeable.\n\nIts elements are as follows:\n\
    \n*   The `plugins { }` lines load and apply Gradle plugins necessary for Android\
    \ and Kotlin development.\n*   The `android { }` element specifies settings for\
    \ the Android plugin.\n*   The `dependencies { }` element describes dependencies\
    \ of the module. The `implementation` keyword means the dependency is needed both\
    \ for compiling the module and running it. The latter implies that the dependency\
    \ gets included in the APK file. Identifiers like `\"xyzImplementation\"` refer\
    \ to a build type or source set `\"xyz\"` – you can see that for the unit tests\
    \ located at `src/test`, the JUnit libraries get added, while for `src/androidTest`\
    \ both the test runner and Espresso get used. If you refer to build types or product\
    \ flavors (more about build types and product flavors in the following), you can\
    \ substitute the build type name or product flavor name for `\"xyz\"`. If you\
    \ want to refer to a variant, which is a combination of a build type and a product\
    \ flavor, you additionally must declare it inside a `configurations { }` element,\
    \ for example:\n*   For `defaultConfig { }` and `buildTypes { }`, see the following\
    \ sections.\n\n```groovy\nconfigurations {\n    // flavor = \"free\", type = \"\
    debug\"\n    freeDebugCompile {}\n}\n```\n\nOther keywords inside the `dependencies\
    \ {...}` section include:\n\n*   **`implementation`** – We talked about that one.\
    \ It expresses the dependency is needed both for compiling and running the app.\n\
    *   **`api`** – Same as `implementation`, but in addition lets the dependency\
    \ leak through to clients of the app.\n*   **`compile`** – This is an old alias\
    \ for `api`. Don’t use it.\n*   **`compileOnly`** – The dependency is needed for\
    \ compilation, but will not be included in the app. This frequently happens for\
    \ source-only libraries like source code preprocessors and alike.\n*   **`runtimeOnly`**\
    \ – The dependency is not needed for compilation, but will be included inside\
    \ the app.\n\nNote that variable `compose_version` is defined in the *project’s*\
    \ `build.gradle` file:\n\n```groovy\nbuildscript {\n    ext {\n        compose_version\
    \ = '1.1.0-beta01'\n    }\n    dependencies {\n        classpath 'com.google.gms:google-services:4.3.3'\n\
    \    }\n}\n// Top-level build file where you can add configuration\n// options\
    \ common to all sub-projects/modules.\nplugins {\n    id 'com.android.application'\
    \ version '7.2.1' apply false\n    id 'com.android.library' version '7.2.1' apply\
    \ false\n    id 'org.jetbrains.kotlin.android' version '1.5.31' apply false\n\
    }\ntask clean(type: Delete) {\n    delete rootProject.buildDir\n}\n```\n\n(Remove\
    \ the line breaks in front of the `apply false`. In this file you also find other\
    \ very general settings applicable to all project modules.)\n\n## Module Common\
    \ Configuration\n\nThe element `defaultConfig { ... }` inside a module’s `build.gradle`\
    \ file specifies configuration settings for a build, independent of the variant\
    \ chosen (see the next section). The possible setting can be looked up in the\
    \ Android Gradle DSL reference, but a common setup reads like:\n\n```groovy\n\
    defaultConfig {\n    // Uniquely identifies the package for publishing.\n    applicationId\
    \ 'com.example.myapp'\n    // The minimum API level required to run the app.\n\
    \    minSdk 23\n    // The API level used to test the app.\n    targetSdk 32\n\
    \    // The version number of your app.\n    versionCode 42\n    // A user-friendly\
    \ version name for your app.\n    versionName \"42.0\"\n}\n```\n\n## Module Build\
    \ Variants\n\nBuild variants correspond to different `.apk` files, which are generated\
    \ by the build process. The number of build variants is given by:\n\n```\nNumber\
    \ of Build Variants = (Number of Build Types) x (Number of Product Flavors)\n\
    ```\n\nInside Android Studio, you choose the build variant via **Build > Select\
    \ Build Variant** in the menu. In the following sections, we describe what build\
    \ types and product flavors are.\n\n## Build Types\n\n```\nBuild types correspond\
    \ to different stages of the app development – if you start a project, Android\
    \ Studio will set up two build types for you: development and release. If you\
    \ open the module’s build.gradle file, you can see inside `android { ... }`:\n\
    ```\n\n```groovy\nbuildTypes {\n    release {\n        minifyEnabled false\n \
    \       proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'\n\
    \    }\n}\n```\n\n(Disregard the ¬ including the following newlines.) Even though\
    \ you don’t see a `\"debug\"` type there, it exists. The fact that it doesn’t\
    \ appear just means the `\"debug\"` type uses its default settings. If you need\
    \ to change the defaults, just add a `\"debug\"` section here as in:\n\n```groovy\n\
    buildTypes {\n    release {\n        ...\n    }\n    debug {\n        ...\n  \
    \  }\n}\n```\n\nYou are not restricted to use one of the predefined build types.\
    \ Define additional build types as in:\n\n```groovy\nbuildTypes {\n    release\
    \ {\n        ...\n    }\n    debug {\n        ...\n    }\n    integration {\n\
    \        initWith debug\n        manifestPlaceholders = [hostName:\"internal.mycompany.com\"\
    ]\n        applicationIdSuffix \".integration\"\n    }\n}\n```\n\nThis defines\
    \ a new build type `\"integration\"` that inherits from `\"debug\"` by virtue\
    \ of `\"initWith\"` and otherwise adds a custom app file suffix and provides a\
    \ placeholder to be used in the manifest file. The settings you can specify there\
    \ are rather numerous – you can find them if you enter “Android Gradle plugin\
    \ DSL reference” in your favorite search engine. Another identifier we haven’t\
    \ talked about yet is the `proguardFiles` identifier. That one is used for filtering\
    \ and/or obfuscating files that are to be included in the app before distributing\
    \ it. If you use it for filtering, please first weigh the benefit against the\
    \ effort – with modern devices saving a few megabytes doesn’t play a big role\
    \ nowadays. And if you want to use it for obfuscation, note that this might cause\
    \ trouble if reflection gets used either by your code or from the libraries referred\
    \ to. And obfuscation does not really prevent hijackers from using your code after\
    \ decompilation – it just makes it a little harder. So carefully consider the\
    \ advantages of using Proguard. If you think it will suit your needs, details\
    \ about how to use it can be found in the online documentation."
