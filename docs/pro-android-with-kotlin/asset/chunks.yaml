    ```\n\n## Create a Phone Call Custom UI\n\nThe creation of your own phone call\
    \ activity including your own UI gets described on the online page “Build a calling\
    \ app” inside the Android documentation. Please see it for details.\n\n## Fingerprint\
    \ Authentication\n\nFingerprint authentication in Android is part of the biometric\
    \ authentication framework. An older API for fingerprint authentication, the Android\
    \ Fingerprint API, entered Android with Android version 6.0 or API level 23. Before\
    \ that, you had to use vendor-specific APIs if they existed. For Android 11 (API\
    \ level 30) or higher, use the information given at [`https://developer.android.com/training/sign-in/biometric-auth`](https://developer.android.com/training/sign-in/biometric-auth)\
    \ for biometric authentication. For lower API levels down to 23, use the same\
    \ classes, especially `BiometricPrompt`, since the API has an integrated backward\
    \ compatibility support.\n\nTo use it, in the dependencies section of your `build.gradle`\
    \ file, add:\n\n```gradle\nimplementation \"androidx.biometric:biometric:1.1.0\"\
    \n```\n\n## 15. Testing\n\nA lot is said about testing in information technology.\
    \ There are three reasons for the attention testing has gained during the last\
    \ decades:\n\n* Testing is the interface between the developers and the users.\n\
    * Testing can be engineered to some extent.\n* Testing helps gain money.\n\nThe\
    \ developers tend to grow their own biased view on their software. By no means\
    \ any kind of offense is intended by saying that. It is just natural that if you\
    \ spend a lot of time with some subject, you potentially lose the ability to anticipate\
    \ what is going on in a new user’s mind. It is therefore a strong advise to regularly\
    \ step out of your developer role and ask yourself the question: “Suppose I didn’t\
    \ know anything about the app – if I enter this GUI workflow, does it make sense,\
    \ is it easy to follow, and is it hard to make unrecoverable mistakes?” Testing\
    \ helps with that – it forces the developer to enter this end user role and ask\
    \ themselves exactly that question.\n\nDevelopment is far away from being an industrially\
    \ engineered science. This is good news and bad news at the same time. If it had\
    \ strong engineering paths, it would be easier to follow agreed-on development\
    \ patterns, and other developers would much more readily understand what you are\
    \ doing. On the other hand, not being that precisely engineerable also opens the\
    \ realm to more creativity and allows for development to become an art. Good developers\
    \ know that they are constantly swaying between those limits.\n\nTesting nowadays\
    \ tends to prioritize engineerability. This stems from the fact that you can precisely\
    \ say what a software is supposed to do, totally ignorant of a single line of\
    \ code. So parts of the tests just don’t care how things were accomplished on\
    \ the coding level, taking away the plethora of possibilities how development\
    \ demands were satisfied. This is of course not true for low-level unit tests,\
    \ but even for those you can see a strong overlap of software artifact contracts\
    \ and testing methodologies. So for testing the grade of engineerability is somewhat\
    \ higher compared with mere developing. However, because testing is just one aspect\
    \ of the development process as a whole, it is still possible to have an interesting\
    \ job as a developer and live in both worlds: you can be an artist during developing\
    \ code and an engineer while writing tests.\n\nOn the other side of the development\
    \ chain, depending on your intention, you might want to have end users spending\
    \ some money for your app. Testing obviously helps avoid frustration because of\
    \ bugs you didn’t anticipate, allowing for the public to more readily acknowledge\
    \ your app. A lot is said about testing for Android, and you can find good information\
    \ and introductory- or advanced-level videos in the official Android documentation.\
    \ The rest of this chapter should be seen as an advice and a collection of empirical\
    \ know-how on the matter of testing. I also do not intend to give an introduction\
    \ into testing, covering each and every aspect of it, but I hope I can give you\
    \ a starting point for your own deeper research."
