    \ constructs for  `navController` \nand  `topBar`  are\nimportant, because they\
    \ make sure a variable’s state survives\nrecomposition because of UI state changes\
    \ and they take care of UI\nupdates that happen, for example, if the value of\
    \ a text field changes\n(see the following listings).\n\nClass `MyTopBar`\n  is\
    \ responsible\nfor the top action bar’s content:\n\n```\nimport android.app.Activity\n\
    import android.content.Context\nimport android.content.DialogInterface\nimport\
    \ androidx.compose.material.*\nimport androidx.compose.material.icons.Icons\n\
    import androidx.compose.material.icons.filled.MoreVert\nimport androidx.compose.runtime.*\n\
    import androidx.compose.ui.platform.LocalContext\nimport androidx.navigation.NavHostController\n\
    class MyTopBar(private val nav:NavHostController,\nprivate val activity:Activity)\
    \ {\n// A boolean variable to store the display menu state\nprivate lateinit var\
    \ displayMenu:MutableState\n@Composable\nfun make() {\ndisplayMenu = remember\
    \ { mutableStateOf(false) }\n// fetching local context\nval context = LocalContext.current\n\
    TopAppBar(\ntitle = { Text(\"My App\") },\nactions = {\n// Icon button for dropdown\
    \ menu\nIconButton(onClick = { displayMenu.value =\n!displayMenu.value }) {\n\
    Icon(Icons.Default.MoreVert, \"\")\n}\nDropdownMenu(\nexpanded = displayMenu.value,\n\
    onDismissRequest = {\ndisplayMenu.value = false }\n) {\nDropdownMenuItem(onClick\
    \ = {\ndisplayMenu.value = false\nnav.navigate(\"settings\")\n}) {\nText(text\
    \ = \"Settings\")\n}\n... more items\n}\n}\n)\n}\n}\n```\n\nBecause of the  `mutableStateOf()`\n\
    \   while\ndefining `displayMenu`, the\ndropdown menu automatically reacts and\
    \ updates its UI as soon as the\nvalue of `displayMenu`\nchanges.\n\nA starting\
    \ point for the HomeScreen  could read\nas follows:\n\n```\nimport androidx.compose.material.Button\n\
    import androidx.compose.material.Text\nimport androidx.compose.material.TextField\n\
    import androidx.compose.runtime.*\nimport androidx.navigation.NavHostController\n\
    class HomeScreen(\nprivate val vm: HomeViewModel,\nprivate val navController:\
    \ NavHostController\n) {\n@Composable\nfun make() {\nColumn {\nText(text = vm.text1)\n\
    TextField(value = vm.text2,\nonValueChange = {\nvm.text2 = it } )\n}\n}\n}\n```\n\
    \nAnd a simple ViewModel\n for now contains just the two string variables `text1`\
    \ and `text2`:\n\n```\nimport androidx.compose.runtime.*\nimport androidx.lifecycle.ViewModel\n\
    class HomeViewModel : ViewModel() {\nvar text1 by mutableStateOf(\"Hello\")\n\
    var text2 by mutableStateOf(\"\")\n}\n```\n\nIn an elaborated app, the ViewModel\
    \  would also be\nthe place where you initialize and persist values using some\
    \ kind of\nexternal storage, like a Room database.\n\nAdapters and List Controls\n\
    The need to display a list with a variable number of items happens\nquite often,\
    \ especially in a corporate environment. While `AdapterView`   and `Adapter` objects\
    \      with various\nsubclasses have been around for a while, we concentrate on\
    \ the\nrelatively new and high-performing *recycler views*. You will see\nthat\
    \ with Kotlin’s conciseness, implementing a recycler view happens in\na very elegant\
    \ and comprehensive manner.\nThe basic idea is as follows: you have an array or\
    \ a list or another\ncollection of data items, maybe from a database, and you\
    \ want to send\nthem to a single UI element that does all the presentation, including\n\
    rendering all visible items and providing a scroll facility if\nnecessary. Each\
    \ item’s presentation either should depend on an\n*item* XML layout file or could\
    \ be generated dynamically from\ninside the code. The mapping from each data item’s\
    \ member to the\ncorresponding view element from inside the item’s UI representation\
    \ is\nto be handled by an *adapter* object .\n\nWith recycler views this all happens\
    \ in a straightforward manner, but\nfirst we have to include a support library,\
    \ because the recycler views\nare not part of the framework. To do so, inside\
    \ your *module*’s\n`build.gradle`,\nadd\n\n```\nimplementation\n'com.android.support:recyclerview-v7:26.1.0'\n\
    ```\n\ninside the `dependencies{ ... }`\nsection (one line – remove the newline\
    \ after “implementation”).\n\nTo tell the app we want to use a recycler view,\
    \ inside your activity’s\nlayout file, add\n\n```\nand specify its layouting options\
    \ as for any other `View`.\n\nFor the layouting of an item from the list, create\
    \ another layout file\ninside `res/layout`, say `item.xml`, with sample\ncontent:\n\
    \nAs stated previously, you could also omit this step and define an item’s\nlayout\
    \ solely from inside the code! Next, we provide an adapter. In\nKotlin  this could\n\
    be as easy as\n\n```\nclass MyAdapter(val myDataset:Array) :\nRecyclerView.Adapter\n\
    () {\ncompanion object {\nclass ViewHolder(val v:RelativeLayout) :\nRecyclerView.ViewHolder(v)\n\
    }\noverride\nfun onCreateViewHolder(parent:ViewGroup,\nviewType:Int) : ViewHolder\
    \ {\nval v = LayoutInflater.from(parent.context)\n.inflate(R.layout.item, parent,\
    \ false)\nas RelativeLayout\nreturn ViewHolder(v)\n}\noverride\nfun onBindViewHolder(holder:ViewHolder,\n\
    position:Int) {\n// replace the contents of the view with\n// the element at this\
    \ position\nholder.v.findViewById(\nR.id.firstLine).text =\nmyDataset[position]\n\
    }\noverride\nfun getItemCount() : Int = myDataset.size\n}\n```\n\nHere are a couple\
    \ of notes on that listing:\n\n*   The class inside “companion object ” is\n \
    \   the Kotlin  way of\n    declaring a static inner class. This one designates\
    \ a reference to each\n    data item as a UI element. More precisely, the recycler\
    \ view will\n    internally hold only so many view holders as are necessary to\
    \ represent\n    the *visible* items.\n\n*   Only when really needed the function\
    \ `onCreateViewHolder()`\n      to create a view\n    holder gets called – more\
    \ precisely, more or less only as often as is\n    necessary to render the items\
    \ visible to the user.\n\n*   The function `onBindViewHolder()`\n      connects\
    \ one of\n    the visible view holders with a certain data item. Here we must\
    \ replace\n    the contents of a view holder’s view.\n\nInside the activity all\
    \ that is needed to define the recycler view  is\n\n```\nwith(recycler_view) {\n\
    // use this setting to improve performance if you know\n// that changes in content\
    \ do not change the layout\n// size of the RecyclerView\nsetHasFixedSize(true)\n\
    // use for example a linear layout manager\nlayoutManager = LinearLayoutManager(this@MainActivity)\n\
    // specify the adapter, use some sample data\nval dataset = (1..21).map { \"Itm\"\
    \ + it }.toTypedArray()\nadapter = MyAdapter(dataset)\n}\n```\n\nThis will look\
    \ like that shown in Figure [9-1](#463716_2_En_9_Chapter.xhtml#Fig1). Useful\n\
    extensions to the program are the following:\n\n![](images/463716_2_En_9_Chapter/463716_2_En_9_Fig1_HTML.jpg)\n\
    \nThe screenshot of the recycler view. with star points.\n\nFigure 9-1\nRecycler\
    \ View"
  trans: "\n```kotlin\nimport android.content.Context\nimport android.content.pm.PackageManager\n\
    import android.os.Bundle\nimport androidx.core.app.ActivityCompat\nimport androidx.core.content.ContextCompat\n\
    import androidx.appcompat.app.AppCompatActivity\nimport androidx.activity.compose.setContent\n\
    import androidx.activity.viewModels\nimport androidx.compose.material.*\nimport\
    \ androidx.compose.runtime.*\nimport androidx.lifecycle.*\nimport androidx.navigation.compose.NavHost\n\
    import androidx.navigation.compose.composable\nimport androidx.navigation.compose.rememberNavController\n\
    \nclass MainActivity : AppCompatActivity() {\n    override fun onCreate(savedInstanceState:\
    \ Bundle?) {\n        super.onCreate(savedInstanceState)\n        // 视图模型 ------------------------------------\n\
    \        val homeViewModel: HomeViewModel by viewModels()\n        // ------------------------------------------------\n\
    \        setContent {\n            val navController = rememberNavController()\n\
    \            val topBar by remember { mutableStateOf(MyTopBar(navController, this))\
    \ }\n            val startDestination = \"home\"\n            Scaffold(\n    \
    \            topBar = { topBar.make() },\n                content = {\n      \
    \              NavHost(navController = navController,\n                      \
    \  startDestination = startDestination) {\n                        composable(\"\
    home\"){\n                            HomeScreen(homeViewModel, navController).make()\n\
    \                        }\n                        composable(\"otherScreen\"\
    ){\n                            //...\n                        }\n           \
    \         }\n                }\n            )\n        }\n    }\n}\n```\n\n`remember`\
    \ 和 `mutableStateOf` 对于 `navController` 和 `topBar` 的构造至关重要，因为它们能确保变量的状态在因 UI 状态变化而发生重组时得以保留，并且负责处理\
    \ UI 的更新（例如当文本字段的值发生变化时，如下列表所示）。\n\n类 `MyTopBar` 负责顶部操作栏的内容：\n\n```kotlin\nimport\
    \ android.app.Activity\nimport android.content.Context\nimport android.content.DialogInterface\n\
    import androidx.compose.material.*\nimport androidx.compose.material.icons.Icons\n\
    import androidx.compose.material.icons.filled.MoreVert\nimport androidx.compose.runtime.*\n\
    import androidx.compose.ui.platform.LocalContext\nimport androidx.navigation.NavHostController\n\
    \nclass MyTopBar(private val nav: NavHostController,\n               private val\
    \ activity: Activity) {\n    // 一个布尔变量，用于存储菜单的显示状态\n    private lateinit var displayMenu:\
    \ MutableState<Boolean>\n\n    @Composable\n    fun make() {\n        displayMenu\
    \ = remember { mutableStateOf(false) }\n        // 获取本地上下文\n        val context\
    \ = LocalContext.current\n        TopAppBar(\n            title = { Text(\"我的应用\"\
    ) },\n            actions = {\n                // 下拉菜单的图标按钮\n                IconButton(onClick\
    \ = { displayMenu.value = !displayMenu.value }) {\n                    Icon(Icons.Default.MoreVert,\
    \ \"\")\n                }\n                DropdownMenu(\n                  \
    \  expanded = displayMenu.value,\n                    onDismissRequest = { displayMenu.value\
    \ = false }\n                ) {\n                    DropdownMenuItem(onClick\
    \ = {\n                        displayMenu.value = false\n                   \
    \     nav.navigate(\"settings\")\n                    }) {\n                 \
    \       Text(text = \"设置\")\n                    }\n                    // ...\
    \ 更多菜单项\n                }\n            }\n        )\n    }\n}\n```\n\n由于在定义 `displayMenu`\
    \ 时使用了 `mutableStateOf()`，下拉菜单会随着 `displayMenu` 值的改变而自动响应并更新其 UI。\n\n`HomeScreen`\
    \ 的起点可以如下所示：\n\n```kotlin\nimport androidx.compose.material.Button\nimport androidx.compose.material.Text\n\
    import androidx.compose.material.TextField\nimport androidx.compose.runtime.*\n\
    import androidx.navigation.NavHostController\n\nclass HomeScreen(\n    private\
    \ val vm: HomeViewModel,\n    private val navController: NavHostController\n)\
    \ {\n    @Composable\n    fun make() {\n        Column {\n            Text(text\
    \ = vm.text1)\n            TextField(value = vm.text2,\n                onValueChange\
    \ = { vm.text2 = it })\n        }\n    }\n}\n```\n\n目前，一个简单的 `ViewModel` 仅包含两个字符串变量\
    \ `text1` 和 `text2`：\n\n```kotlin\nimport androidx.compose.runtime.*\nimport androidx.lifecycle.ViewModel\n\
    \nclass HomeViewModel : ViewModel() {\n    var text1 by mutableStateOf(\"你好\"\
    )\n    var text2 by mutableStateOf(\"\")\n}\n```\n\n在复杂的应用中，`ViewModel` 也将是使用某种外部存储（如\
    \ Room 数据库）来初始化和持久化值的地方。\n\n## 适配器与列表控件\n\n显示包含可变数量项目的列表的需求非常常见，尤其是在企业环境中。虽然 `AdapterView`\
    \ 和具有各种子类的 `Adapter` 对象已经存在了一段时间，但我们将重点放在相对较新且高性能的**RecyclerView**上。您将看到，借助 Kotlin\
    \ 的简洁性，实现 RecyclerView 变得非常优雅和全面。\n\n基本思路如下：您有一个数组、列表或数据项的其他集合（可能来自数据库），并希望将它们发送到一个单一的\
    \ UI 元素，该元素负责所有呈现工作，包括渲染所有可见项目，并在必要时提供滚动功能。每个项目的呈现要么依赖于一个*项目* XML 布局文件，要么可以从代码内部动态生成。从每个数据项成员到其\
    \ UI 表示中对应视图元素的映射，应由一个**适配器**对象处理。\n\n使用 RecyclerView，这一切都以直接的方式完成，但首先我们必须包含一个支持库，因为\
    \ RecyclerView 不是框架的一部分。为此，在您*模块*的 `build.gradle` 中的 `dependencies{ ... }` 部分内，添加：\n\
    \n```gradle\nimplementation 'com.android.support:recyclerview-v7:26.1.0'\n```\n\
    \n（一行代码——删除 \"implementation\" 后的换行符）。\n\n要告诉应用程序我们要使用 RecyclerView，请在 Activity\
    \ 的布局文件中添加：\n\n```xml\n<android.support.v7.widget.RecyclerView\n    android:id=\"\
    @+id/recycler_view\"\n    android:layout_width=\"match_parent\"\n    android:layout_height=\"\
    match_parent\"/>\n```\n\n并像指定任何其他 `View` 一样指定其布局选项。\n\n为了布局列表中的项目，请在 `res/layout`\
    \ 内创建另一个布局文件，例如 `item.xml`，内容示例如下：\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    utf-8\"?>\n<RelativeLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:layout_width=\"match_parent\"\n    android:layout_height=\"wrap_content\"\
    >\n    <TextView\n        android:id=\"@+id/firstLine\"\n        android:layout_width=\"\
    wrap_content\"\n        android:layout_height=\"wrap_content\"\n        android:layout_margin=\"\
    8dp\"\n        android:textSize=\"18sp\"/>\n</RelativeLayout>\n```\n\n如前所述，您也可以跳过此步骤，完全从代码内部定义项目的布局！接下来，我们提供一个适配器。在\
    \ Kotlin 中，这可以简单如下：\n\n```kotlin\nclass MyAdapter(val myDataset: Array<String>)\
    \ : RecyclerView.Adapter<MyAdapter.ViewHolder>() {\n    companion object {\n \
    \       class ViewHolder(val v: RelativeLayout) : RecyclerView.ViewHolder(v)\n\
    \    }\n\n    override fun onCreateViewHolder(parent: ViewGroup, viewType: Int):\
    \ ViewHolder {\n        val v = LayoutInflater.from(parent.context)\n        \
    \    .inflate(R.layout.item, parent, false) as RelativeLayout\n        return\
    \ ViewHolder(v)\n    }\n\n    override fun onBindViewHolder(holder: ViewHolder,\
    \ position: Int) {\n        // 用此位置的元素替换视图的内容\n        holder.v.findViewById<TextView>(R.id.firstLine).text\
    \ = myDataset[position]\n    }\n\n    override fun getItemCount(): Int = myDataset.size\n\
    }\n```\n\n以下是对该列表的几点说明：\n\n*   `companion object` 内的类是 Kotlin 中声明静态内部类的方式。该类将每个数据项引用为\
    \ UI 元素。更准确地说，RecyclerView 内部只会持有足够表示*可见*项目的 ViewHolder。\n*   只有在真正需要时，`onCreateViewHolder()`\
    \ 函数才会被调用来创建 ViewHolder——更准确地说，大致上它只会在渲染用户可见项目时被调用。\n*   `onBindViewHolder()`\
    \ 函数将一个可见的 ViewHolder 连接到特定的数据项。在此我们必须替换 ViewHolder 视图的内容。\n\n在 Activity 中，定义\
    \ RecyclerView 所需的全部代码如下：\n\n```kotlin\nwith(recycler_view) {\n    // 使用此设置以提升性能，如果你知道\n\
    \    // 内容的变化不会改变 RecyclerView 的布局大小\n    setHasFixedSize(true)\n    // 例如，使用线性布局管理器\n\
    \    layoutManager = LinearLayoutManager(this@MainActivity)\n    // 指定适配器，使用一些示例数据\n\
    \    val dataset = (1..21).map { \"项目\" + it }.toTypedArray()\n    adapter = MyAdapter(dataset)\n\
    }\n```\n\n效果将如图 9-1 所示。对程序的有用扩展如下：\n\n**图 9-1 RecyclerView 截图**\n"
- fmt: "*   Add on-click listeners to all items.\n*   Make items selectable.\n*  \
    \ Make items or item parts editable.\n*   Automatically react to changes in the\
    \ underlying data.\n*   Tailor graphical transition effects.\n\nFor all that I\
    \ refer to the online documentation of recycler views. The code presented here\
    \ however should give you a good starting point.\n\n## Styles and Themes\n\nThe\
    \ predefined styles an Android app uses by default already give a good starting\
    \ point for professionally looking apps. If however you want to apply your company’s\
    \ style guidelines or otherwise create a visually outstanding app, creating your\
    \ own styles is worth the effort. Or even better, create your own theme, which\
    \ is a collection of styles to be applied to groups of UI elements.\n\nStyles\
    \ and themes get created inside `res/values/` as XML files. To make a new theme,\
    \ you use or create a file `themes.xml` and write something like\n\n```\n<style\
    \ name=\"AppTheme\" parent=\"Theme.AppCompat\">\n    <item name=\"colorPrimary\"\
    >@color/colorPrimary</item>\n    <item name=\"colorPrimaryDark\">@color/colorPrimaryDark</item>\n\
    \    <item name=\"colorAccent\">@color/colorAccent</item>\n    <item name=\"android:windowBackground\"\
    >#FF0000</item>\n    <item name=\"android:textSize\">22sp</item>\n</style>\n```\n\
    \nHere are a couple of notes on that:\n\n*   The `parent` attribute is important.\
    \ It expresses that we want to create a theme overriding parts of the `Theme.AppCompat`\
    \ theme from the compatibility library.\n*   Because of the naming schema `Theme`\
    \ + DOT + `AppCompat`, we can infer that the theme `Theme.AppCompat` inherits\
    \ from theme `Theme`. This dot-induced inheritance could have more elements.\n\
    *   Instead of the parent `Theme.AppCompat`, we could use one of its sub-themes.\
    \ You can see a list of them if inside Android Studio, you click the `AppCompat`\
    \ part and then press `Ctrl+B`. Android Studio will open a file with the list\
    \ of all sub-themes, for example, `Theme.AppCompat.CompactMenu`, `Theme.AppCompat.Light`,\
    \ and more.\n*   In the example we see two methods to overwrite styles: Those\
    \ with `android:` at the beginning refer to style settings as defined for UI elements\
    \ the same way as if we wanted to set styles from inside a layout file. You find\
    \ all of them in the online API documentation for all the views. Better however,\
    \ you use those without `android:` at the beginning, for those refer to abstract\
    \ style identifiers that actually make up a theme. You get a list of possible\
    \ item names if inside the online documentation you search for `R.styleable.Theme`.\n\
    *   The styling system has become complex over the years – if you are brave and\
    \ have some time, you can inside Android Studio navigate through all files by\
    \ repeatedly pressing `Ctrl+B` on the parents.\n*   The `@color/...` refer to\
    \ entries inside `res/values/colors.xml` files – you should adopt that method\
    \ and define new colors in your app module’s `res/values/colors.xml` file.\n*\
    \   The values of `<item>` elements can refer to styles via `@style/...`, for\
    \ example, the item `<item name=\"buttonStyle\">@style/Widget.AppCompat.Button</item>`.\
    \ You can overwrite such items as well – just define your own styles in `styles.xml`\
    \ and refer to them.\n\nIn order to use that new theme for your whole app at once,\
    \ you write in the manifest file `AndroidManifest.xml`\n\n```\nandroid:theme=\"\
    @style/AppTheme\"\n```\n\n> **Note**\n> You don’t have to use a complete theme\
    \ to overwrite styles – instead, you can overwrite or create single styles you\
    \ can then apply to single widgets. Using a theme however greatly improves the\
    \ design consistency of your app.\n\nYou can assign styles to different API levels.\
    \ For that aim, for example, create a folder `res/values-v21/` or any level number\
    \ that suits you. Styles from inside there then get applied *additionally* if\
    \ the current API level is *greater than or equal to* that number.\n\n## Fonts\
    \ in XML\n\nAndroid starting at API level 26 (Android 8.0) and also prior versions\
    \ if using the support library 26 allow you to add your own fonts in TTF or OTF\
    \ format.\n\n> **Note**\n> To use this support library, inside your module’s `build.gradle`\
    \ file, add `implementation 'com.android.support:appcompat-v7:26.1.0'` inside\
    \ the `dependencies` section.\n\nTo add font files, create a font resource directory:\
    \ select New ➤ Android resource directory, then enter `font` as a directory name\
    \ and `font` as a resource type, and press OK. Copy your font files to that new\
    \ resource directory, but first convert all file names to only contain characters\
    \ from `a to z and 0 to 9_` before the suffix.\n\nTo apply the new font, use the\
    \ `android:fontFamily` attribute as, for example, in\n\n```\n<TextView\n    android:layout_width=\"\
    match_parent\"\n    android:layout_height=\"wrap_content\"\n    android:fontFamily=\"\
    @font/<FONT_NAME>\"\n/>\n```\n\nwhere `<FONT_NAME>` is the file name of the font\
    \ without suffix.\n\nTo add fonts with different font styles, say you have a `myfont_regular.ttf`,\
    \ a `myfont_bold.ttf`, a `myfont_italic.ttf`, and a `myfont_bold_italic.ttf` inside\
    \ the `font` resource folder, add a file `myfont.xml` by choosing New ➤ Font resource\
    \ file. Inside write\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<font-family\
    \ xmlns:android=\"http://schemas.android.com/apk/res/android\">\n    <font android:fontStyle=\"\
    normal\" android:fontWeight=\"400\" android:font=\"@font/myfont_regular\" />\n\
    \    <font android:fontStyle=\"normal\" android:fontWeight=\"700\" android:font=\"\
    @font/myfont_bold\" />\n    <font android:fontStyle=\"italic\" android:fontWeight=\"\
    400\" android:font=\"@font/myfont_italic\" />\n    <font android:fontStyle=\"\
    italic\" android:fontWeight=\"700\" android:font=\"@font/myfont_bold_italic\"\
    \ />\n</font-family>\n```\n\nand ignore Android Studio’s version warning – for\
    \ compatibility all attributes use a standard and additionally a compatibility\
    \ namespace.\n\nThen you can use the name of this XML file, without the suffix,\
    \ for UI views inside the `android:fontFamily` attribute:\n\n```\n<TextView\n\
    \    android:layout_width=\"match_parent\"\n    android:layout_height=\"wrap_content\"\
    \n    android:fontFamily=\"@font/myfont\"\n    android:textStyle=\"normal\"\n\
    />\n```\n\nAs `textStyle` you could now also use `italic` or `bold` or `bold|italic`.\n\
    \n## 2D Animation\n\nAnimation makes your apps look more fancy, and while too\
    \ much animation might look kinky, the right amount of it helps your users understand\
    \ what your app does. The Android OS provides several animation techniques you\
    \ can use, and we describe them in the following sections.\n\n### Auto-animating\
    \ Layouts\n\nA very easy way to add animation is using the built-in automatic\
    \ animation for layouts. All you have to do is add `android:animateLayoutChanges=\"\
    true\"` to the layout declaration, for example\n\n```\n<LinearLayout\n    android:layout_width=\"\
    match_parent\"\n    android:layout_height=\"match_parent\"\n    android:animateLayoutChanges=\"\
    true\">\n    ...\n</LinearLayout>\n```\n\n### Animated Bitmaps\n\nYou can add\
    \ animation to bitmaps by providing a number of different versions of a bitmap\
    \ and letting Android switch between them. First, add all the images to `res/drawable`,\
    \ for example, `img1.png`, `img2.png`, …, `img9.png`. Then create a file inside\
    \ the same folder named, for example, `anim.xml` and inside write\n\n```\n<animation-list\
    \ xmlns:android=\"http://schemas.android.com/apk/res/android\" android:oneshot=\"\
    false\">\n    <item android:drawable=\"@drawable/img1\" android:duration=\"100\"\
    \ />\n    <item android:drawable=\"@drawable/img2\" android:duration=\"100\" />\n\
    \    ...\n    <item android:drawable=\"@drawable/img9\" android:duration=\"100\"\
    \ />\n</animation-list>\n```\n\nwhere the duration for each bitmap slide is given\
    \ in milliseconds. To make it non-repeating, set `android:oneshot=\"true\"`. Add\
    \ the image, for example, as an `ImageView` to your layout as follows:\n\n```\n\
    <ImageView\n    android:layout_width=\"wrap_content\"\n    android:layout_height=\"\
    wrap_content\"\n    android:src=\"@drawable/anim\"\n    android:id=\"@+id/img\"\
    \ />\n```\n\nThis prepares the animation, but it needs to be started from inside\
    \ the program, for example, as follows:\n\n```\nimg.setBackgroundResource(R.drawable.anim1)\n\
    img.setOnClickListener{\nval anim = img.background as AnimationDrawable\nanim.start()\n\
    }\n```\n\nHere the animation starts when the user clicks the image.\n\n### Property\
    \ Animation\n\nThe property animation framework allows you to animate everything\
    \ you might think of. Using the class `android.animation.ValueAnimator`, you can\
    \ specify\n\n*   Duration and repeating mode\n*   Type of the interpolated value\n\
    *   Time interpolation during the animation\n*   A listener for value updates\n\
    \nMost of the time, you will however use the `android.animation.ObjectAnimator`\
    \ class, because it already targets objects and their properties, so you don’t\
    \ have to implement listeners. This class has various static factory methods to\
    \ create instances of `ObjectAnimator`, where as arguments you specify the object\
    \ to animate, the name of the property of this object to use, and the values to\
    \ use during the animation. On the object you can then set a certain interpolator\
    \ (default is the `AccelerateDecelerateInterpolator` that starts and ends slowly\
    \ and in between accelerates and decelerates) and add a value update listener\
    \ (set in `onAnimationUpdate()`) in case, for example, a target object of type\
    \ `View` needs to be informed that it must update itself (by calling `invalidate()`).\n\
    \nAs an example we define a `TextView` object inside a `FrameLayout` and move\
