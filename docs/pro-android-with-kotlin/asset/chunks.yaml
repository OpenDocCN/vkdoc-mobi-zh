    \        // service via the Intent.\n            putExtra(\"IN_VAL\", 42L)\n \
    \       }\n        // Bind the service and grab a reference to the\n        //\
    \ binder.\n        val binder: IBinder = mServiceRule.bindService(serviceIntent)\n\
    \        // Get the reference to the service\n        val service: MyService =\
    \ (binder as MyService.MyBinder).getService()\n        // Verify that the service\
    \ is working correctly.\n        assertThat(service.add(11, 27), `is`(38))\n \
    \   }\n}\n```\n\nThis tests a simple service called `MyService` with an `add(Int,\
    \ Int)` service method:\n\n```kotlin\nclass MyService : Service() {\n    class\
    \ MyBinder(val servc: MyService) : Binder() {\n        fun getService(): MyService\
    \ {\n            return servc\n        }\n    }\n    private val binder: IBinder\
    \ = MyBinder(this)\n    override fun onBind(intent: Intent): IBinder = binder\n\
    \    fun add(a: Int, b: Int) = a + b\n}\n```\n\nTo run the integration test, right-click\
    \ the `androidTest` section of the sources and choose \"Run Tests in …\". This\
    \ will create and upload an APK file, by virtue of `InstrumentationRegistry.getTargetContext()`\
    \ create an integration test context, and then run the test on the device.\n\n\
    ### Testing Intent Services\n\nOther than the official documentation claims, services\
    \ based on the `IntentService` class can be subject to integration tests as well.\
    \ You just cannot use the `@Rule ServiceTestRule` for handling the service lifecycle,\
    \ because intent services have their own idea when to start and stop. But you\
    \ can handle the lifecycle yourself. As an example, I present a test for a simple\
    \ intent service working for 10 seconds and continuously sending back data through\
    \ a `ResultReceiver`.\n\nThe service itself reads:\n\n```kotlin\nclass MyIntentService()\
    \ :\n    IntentService(\"MyIntentService\") {\n    class MyResultReceiver(val\
    \ cb: (Double) -> Unit) :\n        ResultReceiver(null) {\n        companion object\
    \ {\n            val RESULT_CODE = 42\n            val INTENT_KEY = \"my.result.receiver\"\
    \n            val DATA_KEY = \"data.key\"\n        }\n        override\n     \
    \   fun onReceiveResult(resultCode: Int,\n                            resultData:\
    \ Bundle?) {\n            super.onReceiveResult(resultCode, resultData)\n    \
    \        val d = resultData?.get(DATA_KEY) as Double\n            cb(d)\n    \
    \    }\n    }\n    var status = 0.0\n    override fun onHandleIntent(intent: Intent)\
    \ {\n        val myReceiver = intent.\n            getParcelableExtra<MyResultReceiver>(\n\
    \                MyResultReceiver.INTENT_KEY)\n        for (i in 0..100) {\n \
    \           Thread.sleep(100)\n            val bndl = Bundle().apply {\n     \
    \           putDouble(MyResultReceiver.DATA_KEY,\n                    i * 0.01)\n\
