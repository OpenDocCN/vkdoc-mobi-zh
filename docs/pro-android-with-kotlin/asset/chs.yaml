- "# 使用 Kotlin 的高级监听器\n\n无论你正在为 Android 创建哪种应用，总会在某个地方，或者更可能是经常需要为 API 函数调用提供监听器。在\
  \ Java 中，你必须创建实现监听器接口的类或匿名内部类，而在 Kotlin 中，你可以更优雅地做到这一点。\n\n如果你有一个 SAM（即*单抽象方法*）类或接口，事情就很简单。例如，如果你想给按钮添加点击监听器，这意味着你需要提供\
  \ `View.OnClickListener` 接口的实现，用 Java 方式看起来是这样的：\n\n```\nbtn.setOnClickListener(object\
  \ : View.OnClickListener {\noverride fun onClick(v: View?) {\n// 执行某些操作\n}\n})\n\
  ```\n\n然而，由于这个接口只有一个方法，你可以更简洁地编写：\n\n```\nbtn.setOnClickListener {\n// 执行某些操作\n\
  }\n```\n\n并让编译器找出接口方法该如何实现。\n\n如果监听器不是 SAM，即它有多个方法，这种简写方式就不再可行。例如，如果你有一个 `EditText`\
  \ 视图并想添加文本改变监听器，基本必须这样写：\n\n```\nval et = ... // EditText 视图\net.addTextChangedListener(\
  \ object : TextWatcher {\noverride fun afterTextChanged(s: Editable?) {\n// ...\n\
  }\noverride fun beforeTextChanged(s: CharSequence?,\nstart: Int, count: Int, after:\
  \ Int) {\n// ...\n}\noverride fun onTextChanged(s: CharSequence?,\nstart: Int, before:\
  \ Int, count: Int) {\n// ...\n}\n})\n```\n\n即使你只关心 `onTextChanged()` 回调方法也是如此。不过，你可以做的是在工具文件中扩展\
  \ `EditText` 类，并在其中添加提供简化文本改变监听器的可能性。为此，首先创建一个这样的文件，例如 `utility.kt`，放在 `com.example`\
  \ 包内，或者当然也可以是应用的任何包内。在其中添加：\n\n```\nfun EditText.addTextChangedListener(l:\n(CharSequence?,\
  \ Int, Int, Int) -> Unit) {\nthis.addTextChangedListener(object : TextWatcher {\n\
  override fun afterTextChanged(s: Editable?) {\n}\noverride fun beforeTextChanged(s:\
  \ CharSequence?,\nstart: Int, count: Int, after: Int) {\n}\noverride fun onTextChanged(s:\
  \ CharSequence?,\nstart: Int, before: Int, count: Int) {\nl(s, start, before, count)\n\
  }\n})\n}\n```\n\n这会动态地向该类添加所需的方法。\n\n现在，你可以在任何需要的地方使用 `import com.example.utility.*`，然后这样写：\n\
  \n```\nval et = ... // EditText 视图\net.addTextChangedListener({ s: CharSequence?,\n\
  start: Int, before: Int, count: Int ->\n// 执行某些操作\n})\n```\n\n与原始结构相比，这看起来简洁得多。\n\
  \n### 多线程\n\n我们已经在第 9 章的“后台任务”部分一定程度上讨论过多线程。本节仅指出 Kotlin 在语言层面可以做些什么来简化多线程。\n\n\
  Kotlin 在其标准库中包含了一些实用函数。与使用 Java API 相比，它们有助于更轻松地启动线程和计时器——参见表 11-1。\n\n**表 11-1**\
  \  \nKotlin 并发\n\n| 名称 | 参数 | 返回值 | 描述 |\n| --- | --- | --- | --- |\n| `fixedRateTimer`\
  \ | `name: String?` `daemon: Boolean` `initialDelay: Long` `period: Long` `action:\
  \ TimerTask.() -> Unit` | `Timer` | 创建并启动一个用于固定速率调度的计时器对象。`period` 和 `initialDelay`\
  \ 参数以毫秒为单位。 |\n| `fixedRateTimer` | `name: String?` `daemon: Boolean` `startAt:\
  \ Date` `period: Long` `action: TimerTask.() -> Unit` | `Timer` | 创建并启动一个用于固定速率调度的计时器对象。`period`\
  \ 参数以毫秒为单位。 |\n| `timer` | `name: String?` `daemon: Boolean` `initialDelay: Long`\
  \ `period: Long` `action: TimerTask.() -> Unit` | `Timer` | 创建并启动一个用于固定速率调度的计时器对象。`period`\
  \ 参数是前一个任务结束到下一个任务开始之间的时间（毫秒）。 |\n| `timer` | `name: String?` `daemon: Boolean`\
  \ `startAt: Date` `period: Long` `action: TimerTask.() -> Unit` | `Timer` | 创建并启动一个用于固定速率调度的计时器对象。`period`\
  \ 参数是前一个任务结束到下一个任务开始之间的时间（毫秒）。 |\n| `thread` | `start: Boolean` `isDaemon: Boolean`\
  \ `contextClassLoader: ClassLoader?` `name: String?` `priority: Int` `block: ()\
  \ -> Unit` | `Thread` | 创建并可能启动一个线程，执行其 `block`。优先级较高的线程将优先于优先级较低的线程执行。 |\n\n对于计时器函数，“action”参数是一个闭包，其中\
  \ `this` 是相应的 `TimerTask` 对象。使用它，你可以例如从其执行块内部取消计时器。当所有非守护线程退出后，将 `daemon` 或 `isDaemon`\
  \ 设置为 `true` 的线程或计时器不会阻止 JVM 关闭。\n\n凭借其通用的函数能力，Kotlin 无论如何都能很好地帮助我们处理并发——`java.util.concurrent`\
  \ 中许多处理并行执行的类都接受 `Runnable` 或 `Callable` 作为参数，在 Kotlin 中，你总是可以通过直接的 `{ ... }` lambda\
  \ 结构替换这种 SAM（单抽象方法）结构，例如：\n\n```\nval es = Executors.newFixedThreadPool(10)\n//\
  \ ...\nval future = es.submit({\nThread.sleep(2000L)\nprintln(\"executor over\"\
  )\n\n} as ()->Int)\nval res:Int = future.get()\n```\n\n因此，你不必像在 Java 中那样编写：\n\n\
  ```\nExecutorService es = Executors.newFixedThreadPool(10);\n// ...\nCallable c\
  \ = new Callable() {\npublic Integer call() {\ntry {\nThread.sleep(2000L);\n} catch(InterruptedException\
  \ e) { }\nSystem.out.println(\"executor over\");\nreturn 10;\n};\nFuture f = es.submit(c);\n\
  int res = f.get();\n```\n\n请注意，在 Kotlin 代码中，强制转换为 `()->Int` 是必要的，即使 Android Studio\
  \ 会抱怨这是多余的。原因在于，如果不这样做，将会调用另一个以 `Runnable` 为参数的方法，导致执行器无法返回值。\n\n\n\n## 兼容库\n\n\
  *框架 API* 与*兼容库*之间存在一个很重要但起初不易理解的区别。当你开始开发 Android 应用时，经常会看到不同包中出现同名的类，甚至更糟的是，你还会看到不同包中名称不同的类似乎做着同样的事情。\n\
  \n**注意**\n\nJetpack 库集合简化了兼容性。如果你使用来自 `androidx.*` 命名空间的 Jetpack 兼容类，就可以忽略下文所述的兼容库。Android\
  \ Studio 有助于迁移旧项目。`https://developer.android.com/jetpack/androidx/` 上有更多相关信息。\n\n\
  我们来举一个典型的例子：要创建 Activity，你可以继承 `android.app.Activity`，也可以继承 `android.support.v7.app.AppCompatActivity`。查看网上找到的示例和教程，似乎在使用上没有明显区别。实际上，`AppCompatActivity`\
  \ 继承自 `Activity`，因此任何需要 `Activity` 的地方，你都可以用 `AppCompatActivity` 替代，并且编译也能通过。那么，它们在功能上有区别吗？这取决于具体情况。如果你查看文档或代码，会发现\
  \ `AppCompatActivity` 允许添加 `android.support.v7.app.ActionBar`，而 `android.app.Activity`\
  \ 则不行。相反，`android.app.Activity` 允许添加 `android.app.ActionBar`。而这次 `android.support.v7.app.ActionBar`\
  \ 并*没有*继承自 `android.app.ActionBar`，所以你不能将 `android.support.v7.app.ActionBar` 添加到\
  \ `android.app.Activity` 中。这基本上意味着，如果你倾向于使用 `android.support.v7.app.ActionBar` 而非\
  \ `android.app.ActionBar`，那么就必须使用 `AppCompatActivity` 作为 Activity。为什么有人会用 `android.support.v7.app.ActionBar`\
  \ 而不是 `android.app.ActionBar` 呢？答案很简单：后者相当陈旧——自 API 级别 11 起就已存在。较新版本的 `android.app.ActionBar`\
  \ 不能破坏 API 以保持与旧设备的兼容性。但 `android.support.v7.app.ActionBar` 可以添加新功能——它更新，自 API 级别\
  \ 24 起才存在。\n\n其神奇之处如下：如果你使用支持 API 级别 24 或更高版本的设备，你可以使用 `android.support.v7.app.AppCompatActivity`\
  \ 并添加一个 `android.support.v7.app.ActionBar`。你也可以使用 `android.app.Activity`，但那样就不能添加\
  \ `android.support.v7.app.ActionBar`，而必须使用 `android.app.ActionBar`。因此，对于新设备，如果支持库的\
  \ ActionBar 比框架的 ActionBar 更适合你的需求，那么为 Activity 使用 `android.support.v7.app.AppCompatActivity`\
  \ 是合理的。\n\n旧设备呢？你仍然可以使用 `android.support.v7.app.AppCompatActivity`，因为它是作为库添加到应用中的。因此，你也可以使用现代的\
  \ `android.support.v7.app.ActionBar` 作为 ActionBar，与设备原生提供的旧版 `android.app.ActionBar`\
  \ 相比，能获得更多功能。而这正是其中的诀窍所在：*使用支持库，即使是旧设备也能利用以后添加的新功能！* 支持类内部会检查设备版本，并提供合理的回退功能，以尽可能地模拟现代设备。\n\
  \n需要注意的一点是，作为开发者，你必须同时生活在两个世界中：在没有其他选择时，你必须显式或隐式地使用框架类；而在有兼容库可用且你希望确保与旧设备最大程度兼容时，你必须考虑使用兼容库类。因此，在使用某个类之前，检查是否存在匹配的兼容库类至关重要。你可能不喜欢\
  \ Android 中这种“两世界”的方法，这也意味着构建应用时需要更多思考工作，但这正是 Android 处理向后兼容性的方式。\n\n如果你在常用搜索引擎中输入“Android\
  \ support library”，很快就能找到关于支持库的详细信息。\n\n支持库会与应用捆绑在一起，因此必须在构建文件中将其声明为依赖项。如果你在 Android\
  \ Studio 中启动一个新项目，它默认会在模块的 `build.gradle` 文件中写入以下内容：\n\n```\ndependencies {\n...\n\
  implementation 'com.android.support:appcompat-v7:26.1.0'\nimplementation 'com.android.support.constraint:constraint-layout:1.0.2'\n\
  ...\n}\n```\n\n所以你会看到，支持库 v7 版本默认可用，因此你从一开始就可以使用它。\n\n\n\n"
- "# Kotlin 最佳实践\n\n开发工作不仅仅是解决信息技术相关的问题或实现需求，你还希望编写“优质”的软件。不过，在这个语境下，“优质”具体意味着什么，稍微有些模糊。很多方面都起着作用：快速开发、高执行性能、简洁的程序、可读性强的程序、高程序稳定性等等。所有这些都有其优点，但过度强调其中任何一个方面都会损害其他方面。\n\
  \n实际上，你应该将所有这些方面都牢记在心。不过，经验表明，需要特别强调以下几个方面：\n\n-   **让程序易于理解（或富有表现力）。** 一个别人都看不懂的超级优雅解决方案也许能让你自己高兴，但请记住，以后可能其他人需要理解你的软件。\n\
  -   **保持程序简单。** 过于复杂的解决方案容易导致不稳定。当然，你不会某天早上醒来就说：“好，今天我要写一个简单的程序来解决需求 XYZ。”编写能可靠解决问题的简单程序，是经验的体现，并且需要多年的实践积累。但你可以不断尝试，在编写简单程序方面持续进步。一个好的起点是，对于你软件的任何部分，都时常自问“这个问题难道没有更简单的解决方案吗？”，并且查阅\
  \ API 文档和编程语言参考手册。在很多情况下，你*将会*找到比当前实现更简单的、能达到同样目的的解决方案。\n-   **不要重复自己。** 这个通常被称为“DRY”编程的原则，再怎么强调也不为过。每当你发现自己要使用\
  \ `Ctrl+C` 和 `Ctrl+V` 复制某些程序段落时，请考虑转而使用一个函数或一个 lambda 表达式，只提供一个执行操作的地方。\n-   **做符合预期和可预见的事情。**\
  \ 在 Kotlin 中，你可以重写类的方法和运算符，也可以动态地向现有类（甚至像 `String` 这样的基础类）添加函数。无论如何，请确保此类扩展的行为与其名称所暗示的预期一致，如果名不副实，程序将难以理解。\n\
  \nKotlin 在这些方面都提供了帮助，并且常常比老牌的 Java 做得更好。在接下来的章节中，我们将指出一些你可以用来使程序更简洁、简单且富有表现力的 Kotlin\
  \ 概念。请注意，这些概念的集合远非 Kotlin 的完整文档。因此，如需更多细节，请参阅在线文档或 Kotlin 书籍。\n\n## 函数式编程\n\n虽然函数式编程作为一种开发范式是在\
  \ Java 8 才引入的，但 Kotlin 从一开始就支持函数式编程风格。在函数式编程中，你更倾向于使用不可变的值而非变量，避免状态机，并允许将函数作为参数传递给其他函数。同时，lambda\
  \ 演算允许传递无名函数。Kotlin 为我们提供了所有这些特性。\n\n在 Java 中，你有 `final` 修饰符来表达一个变量在首次初始化后不会改变。虽然大多数\
  \ Java 开发者会像下面这样使用 `final` 修饰符来定义常量：\n\n```\npublic class Constants {\npublic final\
  \ static int CALCULATION_PRECISION = 10;\npublic final static int MAX_ITERATIONS\
  \ = 1000;\n...\n}\n```\n\n但我很少看到开发者在其编码内部使用它，这很可惜，因为它既能提高可读性也能提高稳定性。为了节省几次按键而省略它的诱惑实在太大了。在\
  \ Kotlin 中情况则不同——你使用 `val` 来表达一个数据对象在其生命周期内保持不变，使用 `var` 来表示你需要一个真正的变量：\n\n```\n\
  fun getMaxFactorial():Int = 13\nfun fact(n:Int):Int {\nval maxFactorial = getMaxFactorial()\n\
  if(n > maxFactorial)\nthrow RuntimeException(\"Too big\")\nvar x = 1\nfor( i in\
  \ 1..(n) ) {\nx *= i\n}\nreturn x\n}\nval x = fact(12)\nSystem.out.println(\"12!\
  \ = ${x}\")\n```\n\n\n\n在以下简短代码片段中，您将看到`maxFactorial`是一个`val`，这意味着“这是不可更改的”。然而，`x`是一个`var`，它在初始化之后会被修改。\n\
  \n为了计算阶乘，我们甚至可以避免在代码片段中使用`var x`，并将其替换为函数式构造。这是另一个函数式编程要旨：优先使用表达式而非语句或语句链。为此，我们使用递归并编写如下代码：\n\
  \n```\nfun fact(n:Int):Int = if(n>getMaxFactorial())\nthrow RuntimeException(\"\
  Too big\") else\nif(n > 1) n * fact(n-1) else 1\nval x = fact(10)\nSystem.out.println(\"\
  10! = ${x}\")\n```\n\n这个简单的阶乘计算器只是一个简短示例——使用集合时，情况会变得更有趣。Kotlin 标准库包含许多函数式构造，您可以用它们编写优雅的代码。为了向您展示所有可能性，我们再次重写阶乘计算器，并使用集合包中的`fold`函数：\n\
  \n```\nfun fact(n:Int) = (1..n).fold(1, { acc,i -> acc * i })\nSystem.out.println(\"\
  10! = ${fact(10)}\")\n```\n\n为简单起见，我移除了范围检查；如果您愿意，可以将之前的`if...`检查添加到`{...}`内的 lambda\
  \ 表达式中。您可以看到，我们甚至不需要保留`val`——尽管`i`和`acc`在内部是作为`val`处理的。这甚至可以进一步缩短。由于我们只使用了`Int`类型的“乘法”功能，我们可以直接引用它并编写如下代码：\n\
  \n```\nfun fact(n:Int) = (1..n).fold(1, Int::times)\nSystem.out.println(\"10! =\
  \ ${fact(10)}\")\n```\n\n借助集合包中的其他函数式构造，您可以对集合、列表和映射执行更有趣的转换。但函数式编程还涉及将函数作为对象在代码中传递。在\
  \ Kotlin 中，您可以将函数赋值给`val`或`var`，如下所示：\n\n```\nval factEngine:  (acc:Int,i:Int) ->\
  \ Int =\n{ acc,i -> acc * i }\nfun fact(n:Int) = (1..n).fold(1, factEngine)\nSystem.out.println(\"\
  10! = ${fact(10)}\")\n```\n\n或者更短，因为 Kotlin 在某些情况下可以推断类型：\n\n```\nval factEngine\
  \ = { acc:Int, i:Int -> acc * i }\nfun fact(n:Int) = (1..n).fold(1, factEngine)\n\
  System.out.println(\"10! = ${fact(10)}\")\n```\n\n在本书中，我们尽可能使用函数式构造，以提高代码的全面性和简洁性。\n\
  \n## 顶级函数与数据\n\n在 Java 世界中，拥有过多全局可用的函数和数据被认为是一种不良风格，例如，通过某个工具类内部具有静态作用域的定义来实现。然而，在\
  \ Kotlin 中，这种做法复兴了，而且看起来也更自然。这是因为您可以在文件中、在任何类之外声明函数和变量/值。尽管如此，要使用它们，您必须像`import\
  \ com.example.global.*`这样导入这些元素，其中包`com/example/global`内任意名称的文件不包含任何类，只包含`fun`、`var`和`val`元素。\n\
  \n例如，在`com/example/app/util`中编写一个文件“common.kt”，并在内部添加如下内容：\n\n```\npackage com.example.app.util\n\
  val PI_SQUARED = Math.PI * Math.PI\nfun logObj(o:Any?) =\no?.let { \"(\" + o::class.toString()\
  \ + \") \" +\no.toString() } ?: \"\"\n```\n\n以及其他一些工具函数和常量。要使用它们，请编写如下代码：\n\n```\n\
  import com.example.app.util.*\n...\nval ps = PI_SQUARED\nlogObj(ps)\n```\n\n但是，您应该谨慎使用此功能——过度使用很容易导致结构混乱。完全避免在此类作用域中放置可变变量！不过，您可以将工具函数和全局常量放在此类全局文件中。\n\
  \n## 类扩展\n\n与 Java 语言不同，Kotlin 允许您动态地向类添加方法。为此，请编写如下代码：\n\n```\nfun TheClass.newFun(...){\
  \ ... }\n```\n\n操作符也可以这样使用，这使您可以创建诸如`\"Some Text\" % \"magic\"`（它做什么由您想象）这样的扩展，并将其应用于像`String`这样的通用类。您可以通过以下方式实现这个特定的扩展：\n\
  \n```\ninfix operator fun String.rem(s:String){ ... }\n```\n\n只需确保您不会无意中覆盖现有的类方法和操作符——这会使您的程序难以阅读，因为它会执行意料之外的操作。请注意，大多数标准操作符（如`Double.times()`）无论如何都无法被覆盖，因为它们在内部被标记为`final`。\n\
  \n可以通过`operator fun TheClass.<OPERATOR>`定义的操作符列表如表 [11-2] 所示。\n\n**表 11-2: Kotlin\
  \ 操作符**\n\n| 符号 | 转换为 | 中缀 | 默认函数 |\n| :--- | :--- | :--- | :--- |\n| +a | `a.unaryPlus()`\
  \ | | 通常什么都不做 |\n| -a | `a.unaryMinus()` | | 取反一个数字 |\n| !a | `a.not()` | | 取反一个布尔表达式\
  \ |\n| a++ | `a.inc()` | | 递增一个数字 |\n| a-- | `a.dec()` | | 递减一个数字 |\n| a + b | `a.plus(b)`\
  \ | x | 加法 |\n| a – b | `a.minus(b)` | x | 减法 |\n| a * b | `a.times(b)` | x | 乘法\
  \ |\n| a / b | `a.div(b)` | x | 除法 |\n| a % b | `a.rem(b)` | x | 除法取余 |\n| a ..\
  \ b | `a.rangeTo(b)` | x | 定义一个范围 |\n| a in b | `b.contains(a)` | x | 包含性检查 |\n\
  | a !in b | `!b.contains(a)` | x | 非包含性检查 |\n| a[i] | `a.get(i)` | | 索引访问 |\n| a[i,j,...]\
  \ | `a.get(i,j,...)` | | 索引访问，通常不使用 |\n| a[i] = b | `a.set(i,b)` | | 索引设置访问 |\n\
  | a[i,j,...] = b | `a.set(i,j,...,b)` | | 索引设置访问，通常不使用 |\n| a() | `a.invoke()` |\
  \ | 调用 |\n| a(b) | `a.invoke(b)` | | 调用 |\n| a(b,c,...) | `a.invoke(b,c,...)` |\
  \ | 调用 |\n| a += b | `a.plusAssign(b)` | x | 加到`a`。不得返回值——必须修改`this` |\n| a -= b\
  \ | `a.minusAssign(b)` | x | 从`a`减去。不得返回值——必须修改`this` |\n| a *= b | `a.timesAssign()`\
  \ | x | 乘以`a`。不得返回值——必须修改`this` |\n| a /= b | `a.divAssign(b)` | x | 将`a`除以`b`并赋值。不得返回值——必须修改`this`\
  \ |\n| a %= b | `a.remAssign(b)` | x | 取除以`b`的余数并赋值。不得返回值——必须修改`this` |\n| a ==\
  \ b | `a?.equals(b) ?: (b === null)` | x | 检查相等性 |\n| a != b | `!(a?.equals(b) ?:\
  \ (b === null))` | x | 检查不等性 |\n| a > b | `a.compareTo(b) > 0` | x | 比较 |\n| a <\
  \ b | `a.compareTo(b) < 0` | x | 比较 |\n| a >= b | `a.compareTo(b) >= 0` | x | 比较\
  \ |\n| a <= b | `a.compareTo(b) <= 0` | x | 比较 |\n\n要定义一个扩展，对于表中类型为“中缀”的任何操作符，您可以编写：\n\
  \n```\ninfix operator fun TheClass.( ... ){ ... }\n```\n\n其中函数参数是第二个及后续的操作数，函数体内部的`this`引用第一个操作数。对于非“中缀”类型的操作符，只需省略`infix`。为您自己的类定义操作符当然是个好主意。通过操作符来扩充标准的\
  \ Java 或 Kotlin 库类也可以提高代码的可读性。\n\n### 命名参数\n\n使用命名参数，例如：\n\n```\nfun person(fName:String\
  \ = \"\", lName:String = \"\",\nage:Int=0) {\nval p = Person().apply { ... }\nreturn\
  \ p\n}\n```\n\n您可以进行更具表达性的调用，比如：\n\n```\nval p = person(age = 27, lName = \"Smith\"\
  )\n```\n\n使用参数名称，您不必关心参数的顺序，并且在许多情况下，您可以避免为不同的参数组合重载构造函数。\n\n## 作用域函数\n\n作用域函数允许您以不同于使用类和方法的方式来组织代码。例如，考虑以下代码：\n\
  \n```\nval person = Person()\nperson.lastName = \"Smith\"\nperson.firstName = \"\
  John\"\nperson.birthDay = \"2011-01-23\"\nval company = Company(\"ACME\")\n```\n\
  \n\n```kotlin\n// 虽然这是有效的代码，但重复出现\"person.\"令人厌烦。\n// 此外，前四行是关于构造一个 person 对象，\n\
  // 而最后一行与 person 毫无关系。如果能直观地表达\n// 这一点并避免重复就好了。\n// Kotlin 中有一种结构，即：\n\nval person\
  \ = Person().apply {\n    lastName = \"Smith\"\n    firstName = \"John\"\n    birthDay\
  \ = \"2011-01-23\"\n}\nval company = Company(\"ACME\")\n```\n\n与原始代码相比，这段代码表达力更强。它清晰地表明：构造一个\
  \ person 并对其进行操作；然后做其他事情。共有五种这样的结构，尽管它们相似，但在含义和用法上有所不同：`also`、`apply`、`let`、`run`\
  \ 和 `with`。表 11-3 对此进行了说明。\n\n**表 11-3** 作用域函数\n\n| 语法 | “this” 是什么 | “it” 是什么 |\
  \ 返回值 | 用途 |\n| --- | --- | --- | --- | --- |\n| `a.also { ... }` | 外部上下文的 `this`\
  \ | `a` | `a` | 用于横切关注点，例如添加日志。 |\n| `a.apply { ... }` | `a` | - | `a` | 用于构造后对象成型。\
  \ |\n| `a.let { ... }` | 外部上下文的 `this` | `a` | 最后一个表达式 | 用于转换。 |\n| `a.run { ...\
  \ }` | `a` | - | 最后一个表达式 | 使用对象进行某些计算，仅产生副作用。为了清晰起见，最好不要使用其返回值。 |\n| `with(a) {\
  \ ... }` | `a` | - | 最后一个表达式 | 对对象进行分组操作。为了清晰起见，最好不要使用其返回值。 |\n\n使用作用域函数能极大地提升代码的表达力——我在本书中经常使用它们。\n\
  \n### 可空性\n\nKotlin 在语言层面解决了可空性问题，以避免烦人的 `NullPointerException` 抛出。对于任何变量或常量，默认情况下不允许赋值为\
  \ `null`——你必须通过添加 `?` 来显式声明可空性，如下所示：\n\n```kotlin\nvar name:String? = null\n```\n\
  \n编译器随后知道示例中的 `name` 可能为 `null`，并采取各种预防措施来避免 `NullPointerException`。例如，你不能编写 `name.toUpperCase()`，而必须使用\
  \ `name?.toUpperCase()` 代替，后者仅在 `name` 不为 `null` 时才执行大写转换，否则返回 `null` 本身。\n\n使用我们之前描述的作用域函数，有一种非常优雅的方法可以避免像\
  \ `if( x != null ) { ... }` 这样的结构。你可以改为编写：\n\n```kotlin\nx?.run {\n    ...\n}\n\
  ```\n\n这实现了相同的效果，但更具表现力：凭借 `?.`，只有当 `x` 不为 `null` 时，`run{}` 才会执行。\n\n`Elvis` 运算符\
  \ `?:` 也非常有用，它用于处理仅当接收变量为 `null` 时才想计算某个表达式的情况，如下所示：\n\n```kotlin\nvar x:String?\
  \ = ...\n...\nvar y:String = x ?: \"default\"\n```\n\n这等同于 Java 中的 `String y = (x\
  \ != null) ? x : \"default\");`。\n\n## 数据类\n\n数据类是负责承载结构化数据的类。通常，对数据类内部的数据进行操作是不必要的，或者至少不重要。\n\
  \n在 Kotlin 中声明数据类非常简单；你只需编写：\n\n```kotlin\ndata class Person(\n    val fName:String,\n\
  \    val lName:String,\n    val age:Int)\n```\n\n或者，如果你想为某些参数使用默认值：\n\n```kotlin\n\
  data class Person(\n    val fName:String=\"\",\n    val lName:String,\n    val age:Int=0)\n\
  ```\n\n这个简单的声明已经定义了一个构造函数、一个用于比较的合适的 `equals()` 方法、一个默认的 `toString()` 实现，以及参与解构的能力——请参见下文。要创建一个对象，你只需编写：\n\
  \n```kotlin\nval pers = Person(\"John\",\"Smith\",37)\n```\n\n或者更具表达力的写法：\n\n```kotlin\n\
  val pers = Person(fName=\"John\", lName=\"Smith\", age=37)\n```\n\n在这种情况下，如果参数有默认声明，你也可以省略它们。\n\
  \n这一点，加上你可以在函数内部声明类和函数，使得定义临时的复杂函数返回类型变得非常容易，如下所示：\n\n```kotlin\nfun someFun() {\n\
  \    ...\n    data class Person(\n        val fName:String,\n        val lName:String,\n\
  \        val age:Int)\n    fun innerFun():Person = ...\n    ...\n    val p1:Person\
  \ = innerFun()\n    val fName1 = p1.fName\n    ...\n```\n\n## 解构\n\n*解构声明*允许你进行多值或变量赋值。假设你有一个上一节中定义的数据类\
  \ `Person`。那么你可以编写：\n\n```kotlin\nval p:Person = ...\nval (fName,lName,age) = p\n\
  ```\n\n这会给你三个不同的值。对于数据类，其顺序由类成员声明的顺序决定。通常，任何具有 `component1()`、`component2()` ……\
  \ 访问器的对象都可以参与解构，因此你也可以为自己的类使用解构。例如，map 条目默认就支持这一点，所以你可以编写：\n\n```kotlin\nval m =\
  \ mapOf( 1 to \"John\", 2 to \"Greg\", ... )\nfor( (k,v) in m) { ... }\n```\n\n\
  因为 `to` 是一个中缀运算符，它创建一个 `Pair` 类，而该类又定义了 `fun component1()` 和 `fun component2()`。\n\
  \n作为解构声明的附加特性，你可以使用 `_` 通配符来表示未使用的部分，如下所示：\n\n```kotlin\nval p:Person = ...\nval\
  \ (fName,lName,_) = p\n```\n\n### 多行字符串字面量\n\nJava 中的多行字符串字面量定义起来总是有点笨拙：\n\n```java\n\
  String s = \"First line\\n\" +\n        \"Second line\";\n```\n\n在 Kotlin 中，你可以像这样定义多行字符串字面量：\n\
  \n```kotlin\nval s = \"\"\"\nFirst line\nSecond Line\"\"\"\n```\n\n你甚至可以通过添加 `.trimIndent()`\
  \ 来去除前导缩进空格，如下所示：\n\n```kotlin\nval s = \"\"\"\nFirst line\nSecond Line\"\"\".trimIndent()\n\
  ```\n\n这会移除开头的换行符以及每行开头的公共空格。\n\n## 内部函数和类\n\n在 Kotlin 中，函数和类也可以在其他函数内部声明，这进一步有助于组织代码：\n\
  \n```kotlin\nfun someFun() {\n    ...\n    class InnerClass { ... }\n    fun innerFun()\
  \ = ...\n    ...\n}\n```\n\n这种内部构造的作用域当然仅限于声明它们的函数内部。\n\n## 字符串插值\n\n在 Kotlin 中，你可以将值传递到字符串中，如下所示：\n\
  \n```kotlin\nval i = 7\nval s = \"And the value of 'i' is ${i}\"\n```\n\n这借鉴自 Groovy\
  \ 语言，你可以将其用于所有类型，因为所有类型都有一个 `toString()` 成员。唯一的要求是 `${}` 的内容计算结果必须是一个表达式，因此你甚至可以编写：\n\
  \n```kotlin\nval i1 = 7\nval i2 = 8\nval s = \"The sum is: ${i1+i2}\"\n```\n\n或者使用方法调用和\
  \ lambda 函数构建更复杂的结构：\n\n```kotlin\nval s = \"8 + 1 is: ${ { i: Int -> i + 1 }(8)\
  \ }\"\n```\n\n## 限定“this”\n\n如果 `this` 不是你想要的，而是想引用来自外部上下文的 `this`，在 Kotlin 中你可以使用\
  \ `@` 限定符，如下所示：\n\n```kotlin\nclass A {\n    val b = 7\n    init {\n        val\
  \ p = arrayOf(8,9).apply {\n            this[0] += this@A.b\n        }\n       \
  \ ...\n    }\n}\n```\n\n## 委托\n\nKotlin 允许轻松实现*委托*模式。在\n\n```kotlin\ninterface Printer\
  \ {\n    fun print()\n}\nclass PrinterImpl(val x: Int) : Printer {\n    override\
  \ fun print() { print(x) }\n}\nclass Derived(b: Printer) : Printer by b\n```\n\n\
  中，类 `Derived` 是 `Printer` 类型，并将它的所有方法调用委托给 `b` 对象。因此你可以编写：\n\n```kotlin\nval pi\
  \ = PrinterImpl(7)\nDerived(pi).print()\n```\n\n你可以随意覆盖方法调用，因此可以调整委托以使用新功能：\n\n\
  ```kotlin\nclass Derived(val b: Printer) : Printer by b {\n    override fun print()\
  \ {\n        print(\"Printing:\")\n        b.print()\n    }\n}\n```\n\n## 重命名导入\n\
  \n在某些情况下，导入的类可能使用很长的名称，而你频繁使用它们，因此你希望它们有更短的名称。例如，如果你经常在代码中使用 `SimpleDateFormat`\
  \ 类，并且不想每次都写出完整的类名。为了帮助我们解决这个问题并稍微缩短它，你可以引入导入别名并编写：\n\n```kotlin\nimport java.text.SimpleDateFormat\
  \ as SDF\n```\n\n此后，你可以使用 `SDF` 作为 `SimpleDateFormat` 的替代，例如：\n\n\n\n```\nval dateStr\
  \ = SDF(\"yyyy-MM-dd\").format(Date())\n```\n\n不过，请不要过度使用此功能，因为你的同事开发者可能需要记住太多新名称，这会让你的代码难以阅读。\n\
  \n## Kotlin on JavaScript\n\n当你同时听到 Android 和 Kotlin 时，自然会想到 Kotlin 是 Java 的替代品，并用于处理\
  \ Android 运行时和 Android API。但还有另一种不那么显而易见却充满趣味的可能性。单独看 Kotlin，你会发现它可以生成字节码，在 Java\
  \ 虚拟机上运行，或者在 Android 的类似 Java 的 Dalvik 虚拟机上运行。它也可以生成 JavaScript，供浏览器使用。问题是：我们能在\
  \ Android 中也使用它吗？答案是肯定的，在接下来的章节中，我将向你展示如何实现。\n\n### 创建一个 JavaScript 模块\n\n我们从一个包含\
  \ Kotlin 文件的 JavaScript 模块开始，这些文件会被编译成 JavaScript 文件。在启动新模块时，并没有所谓的\"JavaScript\"\
  模块向导，但我们可以轻松地从一个标准的智能手机应用模块开始，并将其转换以满足我们的需求。\n\n在 Android Studio 项目中，选择 New ➤ New\
  \ Module，然后选择 Phone & Tablet Module。给它起个合适的名字，暂时就叫 \"kotlinjsSample\"。生成模块后，删除以下文件夹和文件，因为我们不需要它们：\n\
  \n```\nsrc/test\nsrc/androidTest\nsrc/main/java\nsrc/main/res\nsrc/main/AndroidManifest.xml\n\
  ```\n\n**注意：** 如果你想在 Android Studio 内部执行删除操作，需要先将视图类型从 \"Android\" 切换到 \"Project\"\
  。\n\n然后，添加两个文件夹：\n\n```\nsrc/main/kotlinjs\nsrc/main/web\n```\n\n现在，替换模块 `build.gradle`\
  \ 文件的内容，使其如下所示：\n\n```\nbuildscript {\next.kotlin_version = '1.2.31'\nrepositories\
  \ {\nmavenCentral()\n}\ndependencies {\nclasspath \"org.jetbrains.kotlin:\" +\n\"\
  kotlin-gradle-plugin:$kotlin_version\"\n}\n}\napply plugin: 'kotlin2js'\nsourceSets\
  \ {\nmain.kotlin.srcDirs += 'src/main/kotlinjs'\n}\ntask prepareForExport(type:\
  \ Jar) {\nbaseName = project.name + '-all'\nfrom {\nconfigurations.compile.collect\
  \ {\nit.isDirectory() ? it : zipTree(it) } +\n'src/main/web'\n}\nwith jar\n}\nrepositories\
  \ {\nmavenCentral()\n}\ndependencies {\nimplementation \"org.jetbrains.kotlin:\"\
  \ +\n\"kotlin-stdlib-js:$kotlin_version\"\n}\n```\n\n此构建文件启用了 Kotlin ➤ JavaScript\
  \ 编译器，并引入了一个新的导出任务。现在，你可以在 Android Studio 窗口右侧打开 \"Gradle\" 视图，然后在 \"others\" 下找到\
  \ `prepareForExport` 任务。双击即可运行它。之后，在 `build/libs` 目录下，你会发现一个新文件 `kotlinjsSample-all.jar`。这个文件就是供其他应用或模块使用的\
  \ JavaScript 模块。\n\n在 `src/main/kotlinjs` 目录下创建第一个文件 `Main.kt`，内容如下：\n\n```\nimport\
  \ kotlin.browser.document\nfun main(args: Array) {\nval message = \"Hello JavaScript!\"\
  \ndocument.getElementById(\"cont\")!!.innerHTML = message\n}\n```\n\n最终我们面向的是一个网站，所以我们也需要一个初始的\
  \ HTML 页面。将其制作成标准的登录页面 `index.xhtml`，在 `src/main/web` 目录下创建，并输入：\n\n```\n\nKotlin-JavaScript\n\
  \n```\n\n再次执行 `prepareForExport` 任务，使模块输出的工件反映我们刚刚所做的更改。\n\n### 使用 JavaScript 模块\n\
  \n为了使用我们在上一节构建的 JavaScript 模块，我们在应用的 `build.gradle` 文件中添加几行代码：\n\n```\ntask syncKotlinJs(type:\
  \ Copy) {\nfrom zipTree('../kotlinjsSample/build/libs/' +\n'kotlinjsSample-all.jar')\n\
  into 'src/main/assets/kotlinjs'\n}\npreBuild.dependsOn(syncKotlinJs)\n```\n\n这将导入\
  \ JavaScript 模块的输出文件，并将其解压到应用的 `assets` 文件夹中。通过 `dependsOn()` 声明，这个额外的构建任务会在正常构建过程中自动执行。\n\
  \n现在，在你的布局文件中，放置一个 `WebView` 元素，例如：\n\n为了用一个网页填充该视图，在你的主 Activity 的 `onCreate()`\
  \ 回调中，编写：\n\n```\nwv.webChromeClient = WebChromeClient()\nwv.settings.javaScriptEnabled\
  \ = true\nwv.loadUrl(\"file:///android_asset/kotlinjs/index.xhtml\")\n```\n\n这将为\
  \ `WebView` 控件启用 JavaScript 支持，并从 JavaScript 模块加载主 HTML 页面。\n\n作为扩展，你可能希望将网页内的 JavaScript\
  \ 连接到应用（而非 JavaScript 模块）中的 Kotlin 代码。这并不复杂。你只需添加：\n\n```\nclass JsObject {\n@JavascriptInterface\n\
  override fun toString(): String {\nreturn \"Hi from injectedObject\"\n}\n}\nwv.addJavascriptInterface(JsObject(),\
  \ \"injectedObject\")\n```\n\n此后，就可以在 JavaScript 模块中通过以下方式使用 `injectedObject`：\n\
  \n```\nval message = \"Hello JavaScript! injected=\" +\nwindow[\"injectedObject\"\
  ]\n```\n\n利用这些技术，你可以完全使用 HTML、CSS、Kotlin（转译为 JavaScript）以及一些用于访问 Android API 的访问器对象来设计你的应用。\n\
  \n## 12. 构建\n\n在本章中，我们将讨论应用的构建过程。虽然从源文件构建应用既可以通过终端，也可以通过 Android Studio IDE 中的按钮和菜单项来完成，但本章并非\
  \ Android Studio 的入门指南或参考手册——这些内容请参阅其内置帮助文档、相关书籍或在线资源。我们本章要做的是，探讨构建相关的概念和方法，以便你能根据自身需求调整构建过程。\n\
  \n## 构建相关文件\n\n一旦你在 Android Studio 中创建一个新项目，你会看到以下构建相关文件：\n\n- **build.gradle**\
  \  \n  这是顶层项目级的构建文件。它包含项目所有模块共用的仓库和依赖项声明。对于简单的应用，你通常无需编辑此文件。\n\n- **gradle.properties**\
  \  \n  与 Gradle 构建相关的技术设置。通常无需编辑此文件。\n\n- **gradlew** 和 **gradlew.bat**  \n  包装脚本，这样你就可以使用终端而非\
  \ Android Studio IDE 来运行构建。\n\n- **local.properties**  \n  生成的、与你的 Android Studio\
  \ 安装相关的技术属性。你不应编辑此文件。\n\n- **settings.gradle**  \n  告知哪些模块属于该项目。如果你添加新模块，Android\
  \ Studio 会自动处理此文件。\n\n- **app/build.gradle**  \n  模块级别的构建文件。这很重要——模块的依赖项和构建过程在此处进行配置。Android\
  \ Studio 会为你创建一个名为 \"app\" 的第一个模块，并包含相应的构建文件，但 \"app\" 这个名称只是一个惯例。其他模块会有你随意选择的不同名称，且它们都有各自的构建文件。如果你愿意，甚至可以重命名\
  \ \"app\"，以更好地满足你的需求。\n\n## 模块配置\n\n项目中的每个模块都包含自己的构建文件 `build.gradle`。如果你让 Android\
  \ Studio 为你创建一个新项目或模块，它也会创建一个初始构建文件。一个支持 Kotlin 的模块的基本构建文件示例如下：\n\n\n\n```groovy\n\
  plugins {\n    id 'com.android.application'\n    id 'org.jetbrains.kotlin.android'\n\
  \    id 'com.google.gms.google-services'\n}\nandroid {\n    compileSdk 32\n    defaultConfig\
  \ {\n        applicationId \"book.andrkotlpro.example1\"\n        minSdk 23\n  \
  \      targetSdk 32\n        versionCode 1\n        versionName \"1.0\"\n      \
  \  testInstrumentationRunner \"androidx.test.runner.AndroidJUnitRunner\"\n     \
  \   vectorDrawables {\n            useSupportLibrary true\n        }\n    }\n  \
  \  buildTypes {\n        release {\n            minifyEnabled false\n          \
  \  proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'\n\
  \        }\n    }\n    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_1_8\n\
  \        targetCompatibility JavaVersion.VERSION_1_8\n    }\n    kotlinOptions {\n\
  \        jvmTarget = '1.8'\n    }\n    buildFeatures {\n        compose true\n \
  \   }\n    composeOptions {\n        kotlinCompilerExtensionVersion compose_version\n\
  \    }\n    packagingOptions {\n        resources {\n            excludes += '/META-INF/{AL2.0,LGPL2.1}'\n\
  \        }\n    }\n}\ndependencies {\n    implementation 'androidx.core:core-ktx:1.7.0'\n\
  \    implementation \"androidx.compose.ui:ui:$compose_version\"\n    implementation\
  \ \"androidx.compose.material:material:$compose_version\"\n    implementation \"\
  androidx.compose.ui:ui-tooling-preview:$compose_version\"\n    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.3.1'\n\
  \    implementation 'androidx.activity:activity-compose:1.3.1'\n    implementation\
  \ 'com.google.firebase:firebase-messaging:20.1.0'\n    testImplementation 'junit:junit:4.13.2'\n\
  \    androidTestImplementation 'androidx.test.ext:junit:1.1.3'\n    androidTestImplementation\
  \ 'androidx.test.espresso:espresso-core:3.4.0'\n    androidTestImplementation \"\
  androidx.compose.ui:ui-test-junit4:$compose_version\"\n    debugImplementation \"\
  androidx.compose.ui:ui-tooling:$compose_version\"\n    debugImplementation \"androidx.compose.ui:ui-test-manifest:$compose_version\"\
  \n}\n```\n\n（忽略 ¬ 及其后的换行符。）请注意，Gradle 中 `\"...\"` 字符串允许包含 `${}` 占位符，而 `'...'` 字符串则不允许。除此之外，两者可以互换使用。\n\
  \n其元素含义如下：\n\n*   `plugins { }` 各加载并应用 Android 和 Kotlin 开发所需的 Gradle 插件。\n*   `android\
  \ { }` 元素指定 Android 插件的设置。\n*   `dependencies { }` 元素描述模块的依赖关系。`implementation`\
  \ 关键字表示该依赖在编译模块和运行模块时都需要。后者意味着该依赖会被包含在 APK 文件中。类似 `\"xyzImplementation\"` 这样的标识符指的是名为\
  \ `\"xyz\"` 的构建类型或源代码集——你可以看到，对于 `src/test` 下的单元测试，添加了 JUnit 库；而对于 `src/androidTest`，则同时使用了测试运行器和\
  \ Espresso。如果你引用的是构建类型或产品风味（将在后续章节详细介绍），可以用构建类型名称或产品风味名称替换 `\"xyz\"`。如果你想引用一个变体（即构建类型和产品风味的组合），你还必须在\
  \ `configurations { }` 元素内声明它，例如：\n\n*   关于 `defaultConfig { }` 和 `buildTypes {\
  \ }`，请参见后续章节。\n\n```groovy\nconfigurations {\n    // flavor = \"free\", type = \"\
  debug\"\n    freeDebugCompile {}\n}\n```\n\n`dependencies {...}` 部分中的其他关键字包括：\n\n\
  *   **`implementation`** – 我们已经讨论过这个。它表示该依赖在编译和运行应用时都需要。\n*   **`api`** – 与 `implementation`\
  \ 相同，但额外允许该依赖泄露给应用的客户端。\n*   **`compile`** – 这是 `api` 的旧别名，请勿使用。\n*   **`compileOnly`**\
  \ – 该依赖仅编译时需要，但不会包含在应用中。这通常用于仅含源代码的库，例如源代码预处理器等。\n*   **`runtimeOnly`** – 该依赖编译时不需要，但会包含在应用内部。\n\
  \n请注意，变量 `compose_version` 是在项目的 `build.gradle` 文件中定义的：\n\n```groovy\nbuildscript\
  \ {\n    ext {\n        compose_version = '1.1.0-beta01'\n    }\n    dependencies\
  \ {\n        classpath 'com.google.gms:google-services:4.3.3'\n    }\n}\n// 顶层构建文件，可在此添加适用于所有子项目/模块的配置选项。\n\
  plugins {\n    id 'com.android.application' version '7.2.1' apply false\n    id\
  \ 'com.android.library' version '7.2.1' apply false\n    id 'org.jetbrains.kotlin.android'\
  \ version '1.5.31' apply false\n}\ntask clean(type: Delete) {\n    delete rootProject.buildDir\n\
  }\n```\n\n（请移除 `apply false` 前面的换行符。在此文件中，你还可以找到适用于所有项目模块的其他非常通用的设置。）\n\n## 模块通用配置\n\
  \n模块 `build.gradle` 文件中的 `defaultConfig { ... }` 元素指定了构建的配置设置，与所选变体无关（参见下一节）。可用的设置项可在\
  \ Android Gradle DSL 参考文档中查阅，但常见配置如下：\n\n```groovy\ndefaultConfig {\n    // 用于发布的唯一标识符。\n\
  \    applicationId 'com.example.myapp'\n    // 运行应用所需的最低 API 级别。\n    minSdk 23\n\
  \    // 用于测试应用的 API 级别。\n    targetSdk 32\n    // 应用的版本号。\n    versionCode 42\n\
  \    // 对用户友好的应用版本名称。\n    versionName \"42.0\"\n}\n```\n\n## 模块构建变体\n\n构建变体对应构建过程生成的不同\
  \ `.apk` 文件。构建变体的数量由下式给出：\n\n```\n构建变体数量 = (构建类型数量) x (产品风味数量)\n```\n\n在 Android\
  \ Studio 中，您可以通过菜单 **Build > Select Build Variant** 选择构建变体。在以下章节中，我们将描述什么是构建类型和产品风味。\n\
  \n## 构建类型\n\n```\n构建类型对应应用开发的不同阶段——在启动项目时，Android Studio 会为您设置两种构建类型：开发和发布。打开模块的\
  \ build.gradle 文件，你可以在 `android { ... }` 中看到：\n```\n\n```groovy\nbuildTypes {\n\
  \    release {\n        minifyEnabled false\n        proguardFiles getDefaultProguardFile('proguard-android.txt'),\
  \ 'proguard-rules.pro'\n    }\n}\n```\n\n（忽略 ¬ 及其后的换行符。）即使你没有看到 `\"debug\"` 类型，它也实际存在。它没有出现只是因为\
  \ `\"debug\"` 类型使用了其默认设置。如果需要更改默认设置，只需在此处添加一个 `\"debug\"` 部分，如下所示：\n\n```groovy\n\
  buildTypes {\n    release {\n        ...\n    }\n    debug {\n        ...\n    }\n\
  }\n```\n\n你不限于使用预定义的构建类型。可以像下面这样定义额外的构建类型：\n\n```groovy\nbuildTypes {\n    release\
  \ {\n        ...\n    }\n    debug {\n        ...\n    }\n    integration {\n  \
  \      initWith debug\n        manifestPlaceholders = [hostName:\"internal.mycompany.com\"\
  ]\n        applicationIdSuffix \".integration\"\n    }\n}\n```\n\n这定义了一个新的构建类型 `\"\
  integration\"`，它通过 `\"initWith\"` 继承了 `\"debug\"`，除此之外还添加了一个自定义的应用文件后缀，并为清单文件提供了一个占位符。你可以在此处指定的设置相当多——如果你在常用搜索引擎中输入“Android\
  \ Gradle plugin DSL reference”，就能找到它们。另一个我们尚未提及的标识符是 `proguardFiles`。它用于在分发应用之前，对要包含在应用中的文件进行过滤和/或混淆。如果你用它进行过滤，请首先权衡其收益与工作量——在当今设备上，节省几兆字节已不太重要。如果你打算用它进行混淆，请注意，如果你的代码或所引用的库使用了反射，这可能会引发问题。而且混淆并不能真正阻止劫持者在反编译后使用你的代码——它只是稍微增加了难度。因此，请仔细考虑使用\
  \ Proguard 的优势。如果你认为它符合你的需求，关于如何使用它的详细信息可以在在线文档中找到。\n\n\n"
- '# 产品风味


  *产品风味*允许区分不同的*功能集*或*设备要求*等特性，但你可以根据最适合自己的方式进行区分。


  默认情况下，Android Studio 不会为新项目或模块准备不同的产品风味——如果需要，你必须在文件 `build.gradle` 的 `android {
  ... }` 元素内添加一个 `productFlavors { ... }` 部分。示例如下


  ```

  buildTypes {...}

  flavorDimensions "monetary"

  productFlavors {

  free {

  dimension "monetary"

  applicationIdSuffix ".free"

  versionNameSuffix "-free"

  }

  paid {

  dimension "monetary"

  applicationIdSuffix ".paid"

  versionNameSuffix "-paid"

  }

  }

  ```


  其中可能的设置可以在 Android Gradle DSL 参考文档中查阅。这将生成如下形式的 APK 文件


  ```

  app-free-debug.apk

  app-paid-debug.apk

  app-free-release.apk

  app-paid-release.apk

  ```


  维度甚至可以进行扩展。如果你向 `flavorDimensions` 行添加更多元素，例如 `flavorDimensions "monetary", "apilevel"`，就可以添加更多风味


  ```

  flavorDimensions "monetary", "apilevel"

  productFlavors {

  free {

  dimension "monetary" ... }

  paid {

  dimension "monetary" ... }

  sinceapi21 {

  dimension "apilevel"

  versionNameSuffix "-api21" ... }

  sinceapi24 {

  dimension "apilevel"

  versionNameSuffix "-api24" ... }

  }

  ```


  最终将生成以下 APK 文件集合：


  ```

  app-free-api21-debug.apk

  app-paid-api21-debug.apk

  app-free-api21-release.apk

  app-paid-api21-release.apk

  app-free-api24-debug.apk

  app-paid-api24-debug.apk

  app-free-api24-release.apk

  app-paid-api24-release.apk

  ```


  要从可能的变体中过滤出某些变体，请在构建文件中添加一个 `variantFilter` 元素，并编写


  ```

  variantFilter { variant ->

  def names = variant.flavors*.name  // 这是一个数组

  // 要过滤变体，在此处进行检查，然后

  // 如果不需要某个变体，则执行 "setIgnore(true)"。

  // 这只是一个示例：

  if (names.contains("sinceapi24") &&

  names.contains("free")) {

  setIgnore(true)

  }

  }

  ```


  '
- '# 源集


  如果你在 Android Studio 中创建一个项目，并切换到“项目”视图，你可以看到在 `src` 文件夹中有一个 `main` 文件夹。这对应于 `main`
  源集，它是默认配置和使用的单一源集。请参见图 12-1。


  ![](img/463716_2_En_12_Fig1_HTML.jpg)


  一个带有文件夹列表的 Gradle 点属性正则表达式库的界面。


  **图 12-1** “主”源集


  然而，你可以拥有更多的源集，它们对应于构建类型、产品风味和构建变体。一旦你添加了更多的源集，构建将导致合并当前的构建变体、其包含的构建类型、其包含的产品风味，最后是
  `main` 源集。要查看哪些源集将被包含在构建中，请打开窗口右侧的 Gradle 视图，并运行 `sourceSets` 任务。这将产生一个长列表，你可以看到类似以下的条目


  ```

  main

  Java sources: [app/src/main/java]

  debug

  Java sources: [app/src/debug/java]

  free

  Java sources: [app/src/free/java]

  freeSinceapi21

  Java sources: [app/src/freeSinceapi21/java]

  freeSinceapi21Debug

  Java sources: [app/src/freeSinceapi21Debug/java]

  freeSinceapi21Release

  Java sources: [app/src/freeSinceapi21Release/java]

  paid

  Java sources: [app/src/paid/java]

  paidSinceapi21

  Java sources: [app/src/paidSinceapi21/java]

  release

  Java sources: [app/src/release/java]

  sinceapi21

  Java sources: [app/src/sinceapi21/java]

  ```


  这告诉你，如果你选择构建变体 `freeSinceapi21Debug`，构建过程会查找文件夹


  ```

  app/src/freeSinceapi21Debug/java

  app/src/freeSinceapi21/java

  app/src/free/java

  app/src/sinceapi21/java

  app/src/debug/java

  app/src/main/java

  ```


  中的类，并相应地查找资源、资产和 `AndroidManifest.xml` 文件的对应文件夹。在此构建链中，Java 或 Kotlin 类不得重复，而清单文件以及资源和资产文件将由构建过程进行合并。


  在文件 `build.gradle` 的 `dependencies { ... }` 部分内部，你可以根据构建变体分发依赖项。只需在任何设置前面加上源集的驼峰命名版本即可。例如，如果你希望为
  `freeSinceapi21` 变体包含一个编译依赖项 `:mylib`，请编写


  ```

  freeSinceapi21Compile '':mylib''

  ```


  '
- '# 从控制台运行构建


  你不必使用 Android Studio 来构建应用程序。虽然使用 Android Studio 启动一个应用程序项目是一个好主意，但之后你可以使用终端来构建应用程序。这就是
  Gradle 包装器脚本 `gradlew` 和 `gradlew.bat` 的用途——前者用于 Linux，后者用于 Windows。在接下来的段落中，我们将介绍一些针对
  Linux 的命令行命令；如果你使用的是 Windows 开发机器，只需改用 BAT 脚本即可。


  在前面几节中，我们已经看到每个构建的基本构建块由构建过程中执行的一个或多个任务组成。因此，我们首先想知道实际存在哪些任务。为此，要列出所有可用的任务，请输入


  ```

  ./gradlew tasks

  ```


  这将为你提供一个详尽的列表以及每个任务的一些描述。接下来我们将了解其中一些任务。


  要为构建类型 "debug" 或 "release" 构建应用的 APK 文件，请输入以下命令之一


  ```

  ./gradlew assembleDebug

  ./gradlew assembleRelease

  ```


  这将在 `<PROJECT>/<MODULE>/build/outputs` 目录下创建一个 APK 文件。当然，你也可以指定你在 `build.gradle`
  中定义的任何自定义构建类型。


  要构建调试类型 APK 并将其安装到连接的设备或模拟器上，请输入


  ```

  ./gradlew installDebug

  ```


  其中，对于参数中的 "Debug" 部分，你可以使用任何构建变体的驼峰命名名称进行替换。此命令会将应用安装到连接的设备上，但不会自动运行它——你必须手动运行！要安装*并*运行一个应用，请参见第
  19 章。


  如果你想知道你的应用模块有哪些依赖项，以查看依赖树，请输入


  ```

  ./gradlew dependencies :app:dependencies

  ```


  或者将 "app" 替换为相关的模块名称。这会提供一个相当冗长的列表，因此你可能希望将其输出到一个文件中


  ```

  ./gradlew dependencies :app:dependencies > deps.txt

  ```


  然后在编辑器中检查结果。


  '
- '# 签名


  每个应用的 APK 文件在设备上运行之前都需要进行签名。对于 "debug" 构建类型，会自动为你选择合适的签名配置，所以在调试开发阶段，你无需关心签名问题。


  然而，发布版 APK 需要正确的签名配置。如果你使用 Android Studio 的菜单 构建 ➤ 生成签名 APK，Android Studio 会帮助你创建和/或使用合适的密钥。但你也可以在模块的
  `build.gradle` 文件中指定签名配置。为此，添加一个 `signingConfigs { ... }` 部分，如下所示


  ```

  android {

  ...

  defaultConfig {...}

  signingConfigs {

  release {

  storeFile file("myrelease.keystore")

  storePassword "passwd"

  keyAlias "MyReleaseKey"

  keyPassword "passwd"

  }

  }

  buildTypes {

  release {

  ...

  signingConfig signingConfigs.release

  }

  }

  }

  ```


  并且从发布构建类型内部引用一个签名配置，如代码清单中 `signingConfig ...` 所示。为此你需要提供的密钥库是一个标准的 Java 密钥库——请参阅
  Java 的在线文档，以了解如何构建一个。或者，你可以让 Android Studio 通过菜单中选择 构建 ➤ 生成签名 APK 时弹出的对话框来帮助你创建一个密钥库。


