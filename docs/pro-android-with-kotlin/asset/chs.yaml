  \        cameraDev: CameraDevice) {\n                cameraOpenCloseLock.release()\n\
  \                cameraDevice?.close()\n                cameraDevice = null\n  \
  \          }\n            override\n            fun onError(cameraDev: CameraDevice,\n\
  \                        error: Int) {\n                Log.e(LOG_KEY,\n       \
  \               \"Camera on error callback: \"\n                      + error);\n\
