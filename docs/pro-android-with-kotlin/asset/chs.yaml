  \ mBackgroundHandler)\n    } catch (e: CameraAccessException) {\n        Log.e(LOG_KEY,\"\
  Could not access camera\", e)\n    } catch (e: InterruptedException) {\n       \
  \ Log.e(LOG_KEY,\n              \"Interrupted while camera opening.\", e)\n    }\n\
  }\n/**\n * 启动静态图像捕捉。\n */\nfun takePicture() {\n    cameraSession?.takePicture()\n\
  }\nfun close() {\n    stopBackgroundThread()\n    cameraSession?.run {\n       \
  \ close()\n    }\n    imageReader?.run {\n        surface.release()\n        close()\n\
  \        imageReader = null\n    }\n}\n```\n\n以下是处理后台线程和相机会话的几个私有方法：\n\n```kotlin\n\
  //////////////////////////////////////////////////////\n//////////////////////////////////////////////////////\n\
  /**\n * 启动一个后台线程及其 [Handler]。\n */\nprivate fun startBackgroundThread() {\n    mBackgroundThread\
