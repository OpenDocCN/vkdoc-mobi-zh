  \    fun addStillImageConsumer(\n        l: (ByteArray) -> Unit) {\n        stillImageConsumers.add(l)\n\
  \    }\n    /**\n     * 一个额外的线程和处理器，用于执行\n     * 不应阻塞 UI 的任务。\n     */\n    private\
