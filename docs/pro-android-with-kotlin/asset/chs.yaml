  \        orientation\n    if (orientation ==\n        Configuration.ORIENTATION_LANDSCAPE)\
  \ {\n        previewSizeListeners.forEach{\n            it(optimalSize.width,\n\
  \               optimalSize.height) }\n    } else {\n        previewSizeListeners.forEach{\n\
  \            it(optimalSize.height,\n               optimalSize.width) }\n    }\n\
  \    // 检查闪光灯是否支持。\n    val available =\n        backfaceCamera.characteristics?.\n\
  \        get(CameraCharacteristics.\n            FLASH_INFO_AVAILABLE)\n    flashSupported\
  \ = available ?: false\n}\n```\n\n最后一个私有方法计算静态图像尺寸。当按下或模拟快门时，该方法发挥作用：\n\n```kotlin\n\
  private fun calcStillImageSize(\n    map: StreamConfigurationMap): Size {\n    //\
  \ 对于静态图像捕捉，我们使用最小的\n    // 至少达到某个宽度 x 高度尺寸的图像\n    val jpegSizes =\n        map.getOutputSizes(ImageFormat.JPEG)\n\
  \    var stillSize: Size? = null\n    for (s in jpegSizes) {\n        if (s.height\
  \ >= STILL_IMAGE_MIN_HEIGHT\n            && s.width >= STILL_IMAGE_MIN_WIDTH) {\n\
  \            if (stillSize == null) {\n                stillSize = s\n         \
  \   } else {\n                val f =\n                    (s.width * s.height).toFloat()\n\
  \                val still =\n                    (stillSize.width *\n         \
  \            stillSize.height).toFloat()\n                if (f < still) {\n   \
  \                 stillSize = s\n                }\n            }\n        }\n \
  \   }\n    return stillSize ?: Size(100,100)\n}\n}\n```\n\n\n我们需要的最后一个类，可能也是最复杂的类，是`CameraSession`。它是一个状态机，处理包括自动对焦和自动曝光在内的各种相机状态，并提供两个数据通道：预览纹理和捕获的静态图像存储。在我解释这里使用的一些结构之前，先展示代码清单：\n\
  \n```\n/**\n* A camera session class.\n*/\nclass CameraSession(val handler: Handler,\n\
  val cameraOpenCloseLock:Semaphore,\nval cameraCharacteristics:CameraCharacteristics?,\n\
  val textureView: TextureView,\nval imageReader: ImageReader,\nval cameraDevice:\
  \ CameraDevice,\nval previewDim: PreviewDimension,\nval rotation:Int,\nval activeArraySize:\
  \ Rect,\nval zoom: Double = 1.0) {\ncompanion object {\nval LOG_KEY = \"Session\"\
  \nenum class State {\nSTATE_PREVIEW,\n// 显示相机预览。\nSTATE_WAITING_LOCK,\n// 等待对焦锁定。\n\
  STATE_WAITING_PRECAPTURE,\n// 等待曝光进入预捕获状态。\nSTATE_WAITING_NON_PRECAPTURE,\n// 等待曝光状态变为非预捕获状态。\n\
  STATE_PICTURE_TAKEN\n// 照片已拍摄。\n}\n}\nvar mState:State = State.STATE_PREVIEW\n```\n\
  \n内部类`MyCaptureCallback`负责处理预览和静态图像捕获两种情况。然而，对于预览，状态转换仅限于*开*和*关*：\n\n```\ninner\
  \ class MyCaptureCallback :\nCameraCaptureSession.CaptureCallback() {\nprivate fun\
  \ process(result: CaptureResult) {\nif(captSess == null)\nreturn\nwhen (mState)\
  \ {\nState.STATE_PREVIEW -> {\n// 相机预览正常工作时，我们无需执行任何操作。\n}\nState.STATE_WAITING_LOCK\
  \ -> {\nval afState = result.get(\nCaptureResult.CONTROL_AF_STATE)\nif (CaptureResult.\n\
  CONTROL_AF_STATE_FOCUSED_LOCKED\n== afState\n|| CaptureResult.\nCONTROL_AF_STATE_NOT_FOCUSED_LOCKED\n\
  == afState\n|| CaptureResult.\nCONTROL_AF_STATE_PASSIVE_FOCUSED\n== afState) {\n\
  if(cameraHasAutoExposure) {\nmState =\nState.STATE_WAITING_PRECAPTURE\nrunPrecaptureSequence()\n\
  } else {\nmState =\nState.STATE_PICTURE_TAKEN\ncaptureStillPicture()\n}\n}\n}\n\
  State.STATE_WAITING_PRECAPTURE -> {\nval aeState = result.get(\nCaptureResult.CONTROL_AE_STATE)\n\
  if (aeState == null ||\naeState == CaptureResult.\nCONTROL_AE_STATE_PRECAPTURE\n\
  ||\naeState == CaptureRequest.\nCONTROL_AE_STATE_FLASH_REQUIRED) {\nmState =\nState.STATE_WAITING_NON_PRECAPTURE\n\
  }\n}\nState.STATE_WAITING_NON_PRECAPTURE -> {\nval aeState = result.get(\nCaptureResult.CONTROL_AE_STATE)\n\
  if (aeState == null ||\naeState != CaptureResult.\nCONTROL_AE_STATE_PRECAPTURE)\
  \ {\nmState = State.STATE_PICTURE_TAKEN\ncaptureStillPicture()\n}\n}\nelse -> {}\n\
  }\n}\noverride\nfun onCaptureProgressed(\nsession: CameraCaptureSession,\nrequest:\
  \ CaptureRequest,\npartialResult: CaptureResult) {\n//...\n}\noverride\nfun onCaptureCompleted(\n\
  session: CameraCaptureSession,\nrequest: CaptureRequest,\nresult: TotalCaptureResult)\
  \ {\nprocess(result)\n}\n}\nvar captSess: CameraCaptureSession? = null\nvar cameraHasAutoFocus\
  \ = false\nvar cameraHasAutoExposure = false\nval captureCallback = MyCaptureCallback()\n\
  private val stillImageTakenConsumers =\nmutableListOf Unit>()\nfun addStillImageTakenConsumer(l:\
  \ () -> Unit) {\nstillImageTakenConsumers.add(l)\n}\n```\n\n自动对焦操作仅限于支持该功能的相机设备。这在`createCameraSession()`的开头进行检查。同样地，自动曝光操作仅限于合适的设备：\n\
  \n```\n/**\n* 创建一个新的[CameraCaptureSession]，用于相机预览和拍照。\n*/\nfun createCameraSession()\
  \ {\n//Log.e(LOG_KEY,\"Starting preview session\")\ncameraHasAutoFocus = cameraCharacteristics?.\n\
  get(CameraCharacteristics.\nCONTROL_AF_AVAILABLE_MODES)?.let {\nit.any{ it ==\n\
  CameraMetadata.CONTROL_AF_MODE_AUTO }\n} ?: false\ncameraHasAutoExposure = cameraCharacteristics?.\n\
  get(CameraCharacteristics.\nCONTROL_AE_AVAILABLE_MODES)?.let {\nit.any{ it == CameraMetadata.\n\
  CONTROL_AE_MODE_ON ||\nit == CameraMetadata.\nCONTROL_AE_MODE_ON_ALWAYS_FLASH ||\n\
  it == CameraMetadata.\nCONTROL_AE_MODE_ON_AUTO_FLASH ||\nit == CameraMetadata.\n\
  CONTROL_AE_MODE_ON_AUTO_FLASH_REDEYE }\n} ?: false\ntry {\nval texture = textureView.getSurfaceTexture()\n\
  // 我们将默认缓冲区的大小配置为我们所需的相机预览尺寸。\ntexture.setDefaultBufferSize(\npreviewDim.previewSize!!.width,\n\
  previewDim!!.previewSize!!.height)\n// 这是开始预览所需的输出 Surface。\nval previewSurface\
  \ = Surface(texture)\nval takePictureSurface = imageReader.surface\n```\n\n这里有两个相机输出消费者——用于预览的纹理和用于静态图像捕获的图像读取器。两者都是构造函数参数，并且都用于创建会话对象——参见`cameraDevice.createCaptureSession(...)`：\n\
  \n```\n// 在这里，我们创建一个同时用于相机预览和拍照的 CameraCaptureSession。\ncameraDevice.\ncreateCaptureSession(Arrays.asList(\n\
  previewSurface, takePictureSurface),\nobject : CameraCaptureSession.\nStateCallback()\
  \ {\noverride\nfun onConfigured(cameraCaptureSession:\nCameraCaptureSession) {\n\
  // 当会话准备就绪时，我们开始显示预览。\ncaptSess = cameraCaptureSession\ntry {\nval captReq =\nbuildPreviewCaptureRequest()\n\
  captSess?.\nsetRepeatingRequest(captReq,\ncaptureCallback,\nhandler)\n} catch (e:\
  \ Exception) {\nLog.e(LOG_KEY,\n\"无法在 onConfigured()中访问相机\", e)\n}\n}\noverride\
  \ fun onConfigureFailed(\ncameraCaptureSession:\nCameraCaptureSession) {\nLog.e(LOG_KEY,\n\
  \"相机配置失败\")\n}\noverride fun onActive(\nsess: CameraCaptureSession) {\n}\noverride\
  \ fun onCaptureQueueEmpty(\nsess: CameraCaptureSession) {\n}\noverride fun onClosed(\n\
  sess: CameraCaptureSession) {\n}\noverride fun onReady(\nsess: CameraCaptureSession)\
  \ {\n}\noverride fun onSurfacePrepared(\nsess: CameraCaptureSession,\nsurface: Surface)\
  \ {\n}\n}, handler\n)\n} catch (e: Exception) {\nLog.e(LOG_KEY, \"访问相机失败\", e)\n\
  }\n}\n/**\n* 发起静态图像捕获。\n*/\nfun takePicture() {\nlockFocusOrTakePicture()\n}\nfun\
  \ close() {\ntry {\ncameraOpenCloseLock.acquire()\ncaptSess?.run {\nstopRepeating()\n\
  abortCaptures()\nclose()\ncaptSess = null\n}\ncameraDevice.run {\nclose()\n}\n}\
  \ catch (e: InterruptedException) {\nLog.e(LOG_KEY,\n\"尝试锁定相机以关闭时被中断\", e)\n} catch\
  \ (e: CameraAccessException) {\nLog.e(LOG_KEY, \"关闭时出现相机访问异常\", e)\n} finally {\n\
  cameraOpenCloseLock.release()\n}\n}\n```\n\n以下是私有方法。各种`build*CaptureRequest()`方法展示了如何准备请求，然后将这些请求发送到相机硬件：\n\
  \n\n```kotlin\n//////////////////////////////////////////////////////\n//////////////////////////////////////////////////////\n\
  private fun buildPreviewCaptureRequest():\nCaptureRequest {\nval texture = textureView.getSurfaceTexture()\n\
  val surface = Surface(texture)\n// 我们设置了一个 CaptureRequest.Builder，用于预览输出 Surface。\n\
  val reqBuilder = cameraDevice.\ncreateCaptureRequest(\nCameraDevice.TEMPLATE_PREVIEW)\n\
  reqBuilder.addTarget(surface)\n// 缩放\nval cropRect = calcCropRect()\nreqBuilder.set(\n\
  CaptureRequest.SCALER_CROP_REGION,\ncropRect)\n// 关闭闪光灯\nreqBuilder.set(CaptureRequest.FLASH_MODE,\n\
  CameraMetadata.FLASH_MODE_OFF)\n// 连续自动对焦\nreqBuilder.set(CaptureRequest.CONTROL_AF_MODE,\n\
  CaptureRequest.\nCONTROL_AF_MODE_CONTINUOUS_PICTURE)\nreturn reqBuilder.build()\n\
  }\nprivate fun buildTakePictureCaptureRequest() :\nCaptureRequest {\n// 这是我们用于拍照的\
  \ CaptureRequest.Builder。\nval captureBuilder =\ncameraDevice.createCaptureRequest(\n\
  CameraDevice.TEMPLATE_STILL_CAPTURE)\ncaptureBuilder.addTarget(imageReader.getSurface())\n\
  // 自动对焦模式\ncaptureBuilder.set(CaptureRequest.CONTROL_AF_MODE,\nCaptureRequest.\n\
  CONTROL_AF_MODE_CONTINUOUS_PICTURE)\n// 自动闪光\ncaptureBuilder.set(CaptureRequest.CONTROL_AE_MODE,\n\
  CaptureRequest.\nCONTROL_AE_MODE_ON_AUTO_FLASH)\n// captureBuilder.set(CaptureRequest.FLASH_MODE,\n\
  // CameraMetadata.FLASH_MODE_OFF)\n// 缩放\nval cropRect = calcCropRect()\ncaptureBuilder.set(CaptureRequest.\n\
  SCALER_CROP_REGION, cropRect)\n// 方向\ncaptureBuilder.set(CaptureRequest.\nJPEG_ORIENTATION,\n\
  previewDim.getOrientation(rotation))\nreturn captureBuilder.build()\n}\nprivate\
  \ fun buildPreCaptureRequest() :\nCaptureRequest {\nval surface = imageReader.surface\n\
  val reqBuilder =\ncameraDevice.createCaptureRequest(\nCameraDevice.TEMPLATE_STILL_CAPTURE)\n\
  reqBuilder.addTarget(surface)\nreqBuilder.set(CaptureRequest.\nCONTROL_AE_PRECAPTURE_TRIGGER,\n\
  CaptureRequest.\nCONTROL_AE_PRECAPTURE_TRIGGER_START)\nreturn reqBuilder.build()\n\
  }\nprivate fun buildLockFocusRequest() :\nCaptureRequest {\nval surface = imageReader.surface\n\
  val reqBuilder =\ncameraDevice.createCaptureRequest(\nCameraDevice.TEMPLATE_STILL_CAPTURE)\n\
  reqBuilder.addTarget(surface)\nreqBuilder.set(CaptureRequest.\nCONTROL_AF_TRIGGER,\n\
  CameraMetadata.CONTROL_AF_TRIGGER_START)\nreturn reqBuilder.build()\n}\nprivate\
  \ fun buildCancelTriggerRequest() :\nCaptureRequest {\nval texture = textureView.getSurfaceTexture()\n\
  val surface = Surface(texture)\nval reqBuilder =\ncameraDevice.createCaptureRequest(\n\
  CameraDevice.TEMPLATE_PREVIEW)\nreqBuilder.addTarget(surface)\nreqBuilder.set(CaptureRequest.CONTROL_AF_TRIGGER,\n\
  CameraMetadata.CONTROL_AF_TRIGGER_CANCEL)\nreturn reqBuilder.build()\n}\n```\n\n\
  捕获静态图片由方法 `captureStillPicture()` 处理。请注意，与许多其他相机相关功能类似，适当的任务会被发送到后台，并由回调处理后台处理结果：\n\
  \n```kotlin\nprivate fun captureStillPicture() {\nval captureRequest =\nbuildTakePictureCaptureRequest()\n\
  if (captSess != null) {\ntry {\nval captureCallback = object :\nCameraCaptureSession.CaptureCallback()\
  \ {\noverride fun onCaptureCompleted(\nsession: CameraCaptureSession,\nrequest:\
  \ CaptureRequest,\nresult: TotalCaptureResult) {\n//Util.showToast(activity,\n//\"\
  已获取静态图像\")\nstillImageTakenConsumers.forEach {\nit() }\nunlockFocusAndBackToPreview()\n\
  }\n}\ncaptSess?.run {\nstopRepeating()\ncapture(captureRequest,\ncaptureCallback,\
  \ null)\n}\n} catch (e: Exception) {\nLog.e(LOG_KEY,\n\"无法捕获图片\", e)\n}\n}\n}\n\
  private fun lockFocusOrTakePicture() {\nif(cameraHasAutoFocus) {\ncaptSess?.run\
  \ {\ntry {\nval captureRequest =\nbuildLockFocusRequest()\nmState = State.STATE_WAITING_LOCK\n\
  capture(captureRequest,\ncaptureCallback,\nhandler)\n} catch (e: Exception) {\n\
  Log.e(LOG_KEY,\n\"无法锁定对焦\", e)\n}\n}\n} else {\nif(cameraHasAutoExposure) {\nmState\
  \ = State.STATE_WAITING_PRECAPTURE\nrunPrecaptureSequence()\n} else {\nmState =\
  \ State.STATE_PICTURE_TAKEN\ncaptureStillPicture()\n}\n}\n}\n/**\n* 解锁对焦。当静态图片捕获序列完成时应调用此方法。\n\
  */\nprivate fun unlockFocusAndBackToPreview() {\ncaptSess?.run {\ntry {\nmState\
  \ = State.STATE_PREVIEW\nval cancelAfTriggerRequest =\nbuildCancelTriggerRequest()\n\
  val previewRequest =\nbuildPreviewCaptureRequest()\ncapture(cancelAfTriggerRequest,\n\
  captureCallback,\nhandler)\nsetRepeatingRequest(previewRequest,\ncaptureCallback,\n\
  handler)\n} catch (e: Exception) {\nLog.e(LOG_KEY,\n\"无法返回预览模式\", e)\n}\n}\n}\n\
  ```\n\n用于捕获静态图片的预捕获序列由方法 `runPrecaptureSequence()` 执行。当从方法 `lockFocusThenTakePicture()`\
  \ 的 `captureCallback` 中收到响应时应调用此方法：\n\n```kotlin\n/**\n* 运行用于捕获静态图片的预捕获序列。\n*/\n\
  private fun runPrecaptureSequence() {\ntry {\ncaptSess?.run {\nval captureRequest\
  \ = buildPreCaptureRequest()\nmState = State.STATE_WAITING_PRECAPTURE\ncapture(captureRequest,\
  \ captureCallback,\nhandler)\n}\n} catch (e: Exception) {\nLog.e(LOG_KEY, \"无法访问相机\"\
  , e)\n}\n}\nprivate fun calcCropRect(): Rect {\nwith(activeArraySize) {\nval cropW\
  \ = width() / zoom\nval cropH = height() / zoom\nval top = centerY() - (cropH /\
  \ 2f).toInt()\nval left = centerX() - (cropW / 2f).toInt()\nval right = centerX()\
  \ + (cropW / 2f).toInt()\nval bottom = centerY() + (cropH / 2f).toInt()\nreturn\
  \ Rect(left, top, right, bottom)\n}\n}\n}\n```\n\n以下是关于 `CameraSession` 类的一些说明：\n\
  \n* 模拟器不具备自动对焦功能。代码已对此进行了处理。\n* 术语“预捕获”只是*自动曝光*的另一种说法。\n* 在本类中使用闪光灯是一个`待办事项`。如需启用闪光，请查看代码中提及闪光的地方。\n\
  * 通过从 `CameraSession` 开始的监听器链，静态图片捕获数据最终会到达 `MainActivity` 的 `dataArrived(...)`\
  \ 方法。在那里，你可以开始编写进一步的处理算法，例如保存、发送、转换、读取等。\n\n## Android 与 NFC\n\n只要 Android 设备具备\
  \ NFC 适配器，它就能与其他支持 NFC 的设备或 NFC 标签进行短距离无线通信。我们在第 13 章的“Android 与 NFC”一节中讨论了 NFC。\n\
  \n## Android 与蓝牙\n\n几乎所有现代 Android 设备都内置了蓝牙。通过蓝牙，它们可以与其他蓝牙设备进行无线通信。详情请参阅第 13 章的“Android\
  \ 与蓝牙”一节。\n\n## Android 传感器\n\nAndroid 设备会向应用提供关于其环境的各种信息：\n\n* 由指南针或陀螺仪确定的方位\n\
  * 由加速度力提供的运动状态\n* 重力\n* 气温和气压、湿度\n* 光照强度\n\n\n# 近距传感器，例如：检测与用户耳朵之间的距离\n\n设备精确的地理空间位置并非由传感器检测。如需使用\
  \ GPS 检测位置坐标，请参见第 8 章的“位置与地图”部分。\n\n## 获取传感器能力\n\n从 Android 4.0（API 级别 14）开始，Android\
  \ 设备应提供由各种 `android.hardware.Sensor.TYPE_`* 常量定义的所有传感器类型。如需查看所有传感器及其相关信息列表，请使用以下代码片段：\n\
  \n```\nval sensorManager = getSystemService(\nContext.SENSOR_SERVICE) as SensorManager\n\
  val deviceSensors =\nsensorManager.getSensorList(Sensor.TYPE_ALL)\ndeviceSensors.forEach\
  \ { sensor ->\nLog.e(\"LOG\", \"+++\" + sensor.toString())\n}\n```\n\n如需获取特定传感器，例如：\n\
  \n```\nval magneticFieldSensor = sensorManager.getDefaultSensor(\nSensor.TYPE_MAGNETIC_FIELD)\n\
  ```\n\n获取 `Sensor` 对象后，您可以获取其各种信息。详情请参阅 `android.hardware.Sensor` 的 API 文档。如需查找传感器数值，请参见下一节。\n\
  \n## 监听传感器事件\n\nAndroid 支持以下两种传感器事件监听器：\n\n- 传感器精度的变化\n- 传感器数值的变化\n\n如需注册监听器，请按上一节所述获取传感器管理器和传感器，然后在\
  \ Activity 中使用类似以下代码：\n\n```\nval sensorManager = getSystemService(\nContext.SENSOR_SERVICE)\
  \ as SensorManager\nval magneticFieldSensor = sensorManager.getDefaultSensor(\n\
  Sensor.TYPE_MAGNETIC_FIELD)\nsensorManager.registerListener(this,\nmagneticFieldSensor,\n\
  SensorManager.SENSOR_DELAY_NORMAL)\n```\n\n对于时间分辨率，您也可以使用其他延迟规格之一 `SensorManager.SENSOR_DELAY_`*。\n\
  \n接着，Activity 必须重写并实现 `android.hardware.SensorEventListener`：\n\n```\nclass MainActivity\
  \ : ActivityCompat(),\nSensorEventListener {\nprivate lateinit var sensorManager:SensorManager\n\
  private lateinit var magneticFieldSensor:Sensor\noverride fun onCreate(savedInstanceState:\
  \ Bundle?) {\n...\nsensorManager =\ngetSystemService(Context.SENSOR_SERVICE)\nas\
  \ SensorManager\nmagneticFieldSensor =\nsensorManager.getDefaultSensor(\nSensor.TYPE_MAGNETIC_FIELD)\n\
  }\noverride\nfun onAccuracyChanged(sensor: Sensor, accuracy: Int) {\n// 当传感器精度改变时在此处执行相应操作\n\
  }\noverride\nfun onSensorChanged(event: SensorEvent) {\nLog.e(\"LOG\", Arrays.toString(event.values))\n\
  // 使用此传感器数值执行相应操作\n}\noverride\nfun onResume() {\nsuper.onResume()\nsensorManager.registerListener(this,\n\
  magneticFieldSensor,\nSensorManager.SENSOR_DELAY_NORMAL)\n}\noverride\nfun onPause()\
  \ {\nsuper.onPause()\nsensorManager.unregisterListener(this)\n}\n}\n```\n\n如本例所示，当不再需要传感器事件监听器时，务必取消注册，因为传感器可能会大量消耗电池电量。\n\
  \n> **注意**：与名称暗示的不同，即使传感器数值未实际变化，`onSensorChanged` 事件也可能被触发。\n\n在 `onSensorChanged()`\
  \ 中从 `SensorEvent.values` 获取的所有可能传感器数值列于表 14-3。\n\n### 表 14-3：传感器事件数值\n\n| 类型 |\
  \ 数值 |\n| --- | --- |\n| `TYPE_ACCELEROMETER` | Vector3：沿 x-y-z 轴的加速度，单位为 *m/s²*。包含重力。\
  \ |\n| `TYPE_AMBIENT_TEMPERATURE` | 标量：环境空气温度，单位为 °C。 |\n| `TYPE_GRAVITY` | Vector3：沿\
  \ x-y-z 轴的重力，单位为 *m/s²*。 |\n| `TYPE_GYROSCOPE` | Vector3：绕 x-y-z 轴各自的旋转速率，单位为 *rad/s*。\
  \ |\n| `TYPE_LIGHT` | 标量：照度，单位为 *lx*。 |\n| `TYPE_LINEAR_ACCELERATION` | Vector3：沿\
  \ x-y-z 轴的加速度，单位为 *m/s²*。不含重力。 |\n| `TYPE_MAGNETIC_FIELD` | Vector3：地磁场强度，单位为 *μT*。\
  \ |\n| `TYPE_ORIENTATION` | Vector3：方位角、俯仰角、横滚角，单位为度。 |\n| `TYPE_PRESSURE` | 标量：环境气压，单位为\
  \ *hPa*。 |\n| `TYPE_PROXIMITY` | 标量：与物体的距离，单位为 *cm*。 |\n| `TYPE_RELATIVE_HUMIDITY`\
  \ | 标量：环境相对湿度，单位为 %。 |\n| `TYPE_ROTATION_VECTOR` | Vector4：以四元数表示的旋转向量。 |\n| `TYPE_SIGNIFICANT_MOTION`\
  \ | 每当检测到显著运动时触发事件。要捕获此事件，必须通过 `SensorManager.requestTriggerSensor(...)` 注册。 |\n\
  | `TYPE_STEP_COUNTER` | 标量：自重启且传感器激活后累计的步数。 |\n| `TYPE_STEP_DETECTOR` | 每当检测到一步时触发事件。\
  \ |\n| `TYPE_TEMPERATURE` | 已弃用。标量：设备温度，单位为 °C。 |\n\n某些传感器具有未校准版本，这意味着它们能更精确地显示变化，但在固定点基准上的关联精度较低：\n\
  \n- `TYPE_ACCELEROMETER_UNCALIBRATED`\n- `TYPE_GYROSCOPE_UNCALIBRATED`\n- `TYPE_MAGNETIC_FIELD_UNCALIBRATED`\n\
  \n除了 `TYPE_ROTATION_VECTOR` 传感器，您还可以使用以下之一：\n\n- `TYPE_GAME_ROTATION_VECTOR`\n-\
  \ `TYPE_GEOMAGNETIC_ROTATION_VECTOR`\n\n第一个不使用陀螺仪，检测变化更精确，但无法精确确定*北方*的方向。第二个使用磁场而非陀螺仪——精度较低，但更省电。\n\
  \n## 与电话通话交互\n\nAndroid 提供多种方式来与来电、去电以及拨号过程进行交互。您的应用可能实现的电话相关最常用场景如下：\n\n- 监控电话状态变化，例如获知来电和去电。\n\
  - 发起拨号过程以开始去电。\n- 提供您自己的用户界面来管理通话。\n\n您可以在 `android.telecom`、`android.telephony`\
  \ 包及其子包中找到电话相关的类和接口。\n\n### 监控电话状态变化\n\n要监控电话状态变化，请在 `AndroidManifest.xml` 中添加以下权限：\n\
  \n`READ_PHONE_STATE` 权限允许检测正在进行的通话状态。`PROCESS_OUTGOING_CALLS` 权限允许您的应用查看去电号码，甚至使用不同号码或取消通话。关于如何在应用内获取权限，请参见第\
  \ 7 章。\n\n为监听电话相关事件，您接下来需要在 `AndroidManifest.xml` 中添加一个广播接收器：\n\n```\n...\n```\n\
  \n并实现它，例如如下所示：\n\n```\npackage ...\nimport android.telephony.TelephonyManager as\
  \ TM\nimport ...\nclass CallMonitor : BroadcastReceiver() {\ncompanion object {\n\
  private var lastState = TM.CALL_STATE_IDLE\nprivate var callStartTime: Date? = null\n\
  private var isIncoming: Boolean = false\nprivate var savedNumber: String? = null\n\
  }\n```\n\n`onReceive()` 回调处理接收到的广播，此处为来电或去电。\n\n\n```kotlin\noverride\nfun onReceive(context:\
  \ Context, intent: Intent) {\n    if (intent.action ==\n        Intent.ACTION_NEW_OUTGOING_CALL)\
  \ {\n        savedNumber = intent.extras!!.\n            getString(Intent.EXTRA_PHONE_NUMBER)\n\
  \    } else {\n        val stateStr = intent.extras!!.\n            getString(TM.EXTRA_STATE)\n\
  \        val number = intent.extras!!.\n            getString(TM.EXTRA_INCOMING_NUMBER)\n\
  \        val state = when(stateStr) {\n            TM.EXTRA_STATE_IDLE ->\n    \
  \            TM.CALL_STATE_IDLE\n            TM.EXTRA_STATE_OFFHOOK ->\n       \
  \         TM.CALL_STATE_OFFHOOK\n            TM.EXTRA_STATE_RINGING ->\n       \
  \         TM.CALL_STATE_RINGING\n            else -> 0\n        }\n        callStateChanged(context,\
  \ state, number)\n    }\n}\nprotected fun onIncomingCallReceived(\n    ctx: Context,\
  \ number: String?, start: Date){\n    Log.e(\"LOG\",\n        \"IncomingCallReceived\
  \ ${number} ${start}\")\n}\nprotected fun onIncomingCallAnswered(\n    ctx: Context,\
  \ number: String?, start: Date) {\n    Log.e(\"LOG\",\n        \"IncomingCallAnswered\
  \ ${number} ${start}\")\n}\nprotected fun onIncomingCallEnded(\n    ctx: Context,\
  \ number: String?,\n    start: Date?, end: Date) {\n    Log.e(\"LOG\",\n       \
  \ \"IncomingCallEnded ${number} ${start}\")\n}\nprotected fun onOutgoingCallStarted(\n\
  \    ctx: Context, number: String?, start: Date) {\n    Log.e(\"LOG\",\n       \
  \ \"OutgoingCallStarted ${number} ${start}\")\n}\nprotected fun onOutgoingCallEnded(\n\
  \    ctx: Context, number: String?,\n    start: Date?, end: Date) {\n    Log.e(\"\
  LOG\",\n        \"OutgoingCallEnded ${number} ${start}\")\n}\nprotected fun onMissedCall(\n\
  \    ctx: Context, number: String?, start: Date?) {\n    Log.e(\"LOG\",\n      \
  \  \"MissedCall ${number} ${start}\")\n}\n```\n\n私有方法 `callStateChanged()` 会响应与电话通话对应的各种状态变化：\n\
  \n```kotlin\n/**\n* 来电：\n*     振铃时 IDLE -> RINGING，\n*     接听时 -> OFFHOOK，\n*  \
  \   挂断时 -> IDLE\n* 去电：\n*     拨出时 IDLE -> OFFHOOK，\n*     挂断时 -> IDLE\n*/\nprivate\
  \ fun callStateChanged(\n    context: Context, state: Int, number: String?) {\n\
  \    if (lastState == state) {\n        return // 状态无变化\n    }\n    when (state)\
  \ {\n        TM.CALL_STATE_RINGING -> {\n            isIncoming = true\n       \
  \     callStartTime = Date()\n            savedNumber = number\n            onIncomingCallReceived(\n\
  \                context, number, callStartTime!!)\n        }\n        TM.CALL_STATE_OFFHOOK\
  \ ->\n            if (lastState != TM.CALL_STATE_RINGING) {\n                isIncoming\
  \ = false\n                callStartTime = Date()\n                onOutgoingCallStarted(context,\n\
  \                    savedNumber, callStartTime!!)\n            } else {\n     \
  \           isIncoming = true\n                callStartTime = Date()\n        \
  \        onIncomingCallAnswered(context,\n                    savedNumber, callStartTime!!)\n\
  \            }\n        TM.CALL_STATE_IDLE ->\n            if (lastState == TM.CALL_STATE_RINGING)\
  \ {\n                //振铃但未接听——漏接\n                onMissedCall(context,\n     \
  \               savedNumber, callStartTime)\n            } else if (isIncoming)\
  \ {\n                onIncomingCallEnded(context,\n                    savedNumber,\
  \ callStartTime,\n                    Date())\n            } else {\n          \
  \      onOutgoingCallEnded(context,\n                    savedNumber, callStartTime,\n\
  \                    Date())\n            }\n    }\n    lastState = state\n}\n```\n\
  \n使用这样的监听器，你可以收集关于电话使用情况的统计信息、创建优先级电话号码列表，或执行其他有趣的操作。要将电话通话与联系人信息关联起来，请参阅第 8 章的“联系人”部分。\n\
  \n## 发起拨号流程\n\n要从你的应用内部发起拨号流程，基本上有两种选择：\n\n*   发起拨号流程，用户可以查看并更改被叫号码。\n*   发起拨号流程，用户无法更改被叫号码。\n\
  \n对于第一种情况（向用户展示号码并允许其修改），你无需任何特殊权限。只需编写：\n\n```kotlin\nval num = \"+34111222333\"\
  \nval intent = Intent(Intent.ACTION_DIAL,\n    Uri.fromParts(\"tel\", num, null))\n\
  startActivity(intent)\n```\n\n要使用预设号码发起拨号流程，你需要额外添加 `CALL_PHONE` 权限。关于如何获取该权限，请参阅第\
  \ 7 章。随后可通过以下方式启动拨号过程：\n\n```kotlin\nval num = \"+34111222333\"\nval intent = Intent(Intent.ACTION_CALL,\n\
  \    Uri.fromParts(\"tel\", num, null))\nstartActivity(intent)\n```\n\n## 创建自定义电话通话界面\n\
  \nAndroid 文档中的“构建通话应用”在线页面描述了如何创建包含自定义界面的电话通话活动。详情请参见该页面。\n\n## 指纹认证\n\nAndroid\
  \ 中的指纹认证属于生物识别认证框架的一部分。用于指纹认证的旧版 API（Android Fingerprint API）随 Android 6.0（API 级别\
  \ 23）引入。在此之前，如果存在供应商特定的 API，则必须使用这些 API。对于 Android 11（API 级别 30）或更高版本，请使用 [`https://developer.android.com/training/sign-in/biometric-auth`](https://developer.android.com/training/sign-in/biometric-auth)\
  \ 上提供的生物识别认证信息。对于低至 API 级别 23 的版本，可以使用相同的类，特别是 `BiometricPrompt`，因为该 API 具有内置的向后兼容支持。\n\
  \n要使用它，请在 `build.gradle` 文件的 dependencies 部分添加：\n\n```gradle\nimplementation \"\
  androidx.biometric:biometric:1.1.0\"\n```\n\n## 15. 测试\n\n在信息技术领域，关于测试的讨论很多。测试在过去几十年中备受关注，原因有三：\n\
  \n*   测试是开发者和用户之间的接口。\n*   测试在某种程度上可以工程化。\n*   测试有助于创造收益。\n\n开发者往往会对自己的软件产生带有偏见的看法。这样说绝非冒犯之意。这很自然：如果你在某个主题上投入了大量时间，你可能会失去预判新用户想法的能力。因此，强烈建议你定期跳出开发者的角色，问自己这个问题：“假设我对这个应用一无所知——如果进入这个\
  \ GUI 工作流，它是否有意义、是否易于遵循、是否难以造成不可恢复的错误？”测试正是为此提供帮助——它迫使开发者进入最终用户的角色，并对自己提出同样的问题。\n\
  \n软件开发远非一门工业化的工程科学。这既是好消息，也是坏消息。如果有强大的工程化路径，遵循公认的开发模式会更容易，其他开发者也能更轻松地理解你的工作。另一方面，不那么精确的工程化也为更多创造力打开了大门，使开发成为一种艺术。优秀的开发者深知自己始终在这两个极限之间摇摆。\n\
  \n如今的测试倾向于优先考虑工程化。这是因为你可以精确地说明软件应该做什么，而完全不需要理会任何一行代码。因此，部分测试根本不关心事情在编码层面是如何实现的，从而排除了满足开发需求的众多可能性。当然，这对于低层级的单元测试并不成立，但即使是单元测试，你也能看到软件制品契约与测试方法论之间存在很强的重叠。因此，与单纯的开发相比，测试的工程化程度更高。然而，由于测试只是整个开发过程的一个方面，你依然可以作为一名开发者拥有有趣的工作，并生活在两个世界中：在编码时做一名艺术家，在编写测试时做一名工程师。\n\
  \n在开发链的另一端，根据你的意图，你可能希望最终用户为你的应用付费。测试显然有助于避免因未预料到的 bug 而产生的挫败感，让公众更容易认可你的应用。关于 Android\
  \ 测试的讨论很多，你可以在官方 Android 文档中找到优质信息以及入门或高级视频。本章剩余部分应被视为关于测试问题的建议和经验性知识总结。我也没有打算对测试的方方面面进行入门介绍，但我希望可以为你自己的深入探索提供一个起点。\n\
  \n\n# 单元测试\n\n单元测试以类为测试目标，检验应用中低层功能层面的内容。这里所说的\"功能性\"，是指单元测试通常以确定性的、直接的方式，检查方法调用的输入与输出之间的确定性关系，可能包含（但不一定包含）类实例的状态变量。\n\
  \n### 标准单元测试\n\n在 Android 环境中，标准单元测试不依赖设备硬件或任何 Android 框架类，因此在开发机上执行。这类测试通常适用于库，而不太适合与\
  \ GUI 相关的功能。这也是为何此类单元测试对大多数 Android 应用的适用性有一定限制。\n\n然而，如果你的应用类中包含方法调用，且你能根据不同的输入集预判调用结果，那么使用标准单元测试就很有意义。为应用添加单元测试十分简便。实际上，如果你使用\
  \ Android Studio 创建新项目，所有配置都已为你准备就绪，甚至会给你一个示例测试类。参见图 15-1。\n\n![](img/463716_2_En_15_Fig1_HTML.jpg)\n\
  \n测试设置对应的文件夹和应用列表。其中 **Example UnitTest** 已高亮显示。\n\n**图 15-1** 初始单元测试设置\n\n因此，你可以立即以该测试类为示例开始编写单元测试——只需在源代码的\
  \ *test* 目录下添加更多测试类即可。\n\n> **注意**  \n> 虽然并非技术上的硬性要求，但常见的约定是：测试类使用与被测类相同的名称，并附加\
  \ \"Test\" 后缀。因此，`com.example.myapp.TheClass` 的测试类应命名为 `com.example.myapp.TheClassTest`。\n\
  \n要在 Android Studio 中运行单元测试，右键点击 *test* 目录，选择\"在…中运行测试\"或\"在…中调试测试\"。\n\n## 使用桩版\
  \ Android 框架的单元测试\n\n默认情况下，用于执行单元测试的 Gradle 插件包含一个桩版 Android 框架，当任何 Android 类被调用时会抛出异常。\n\
  \n你可以通过在应用的 `build.gradle` 文件中添加以下内容来改变此行为：\n\n```\nandroid {\n  ...\n  testOptions\
  \ {\n    unitTests.returnDefaultValues = true\n  }\n}\n```\n\n此后，任何对 Android 类方法的调用都不会执行任何操作，并根据需求返回\
  \ `null`。\n\n## 使用模拟 Android 框架的单元测试\n\n如果你需要在单元测试中访问 Android 类，并期望它们执行实际功能，那么使用社区支持的\
  \ *Robolectric* 框架作为单元测试实现是一个可行的选择。借助 Robolectric，你可以模拟按钮点击、文本读写以及大量其他 GUI 相关操作。尽管如此，这一切仍在你的开发机上运行，从而显著加速测试。\n\
  \n要让你的项目使用 Robolectric，请在应用的 `build.gradle` 文件中添加：\n\n```\nandroid {\n  testOptions\
  \ {\n    unitTests {\n      includeAndroidResources = true\n    }\n  }\n}\ndependencies\
  \ {\n  ...\n  //testImplementation 'junit:junit:4.12'\n  testImplementation \"org.robolectric:robolectric:4.8.1\"\
  \n}\n```\n\n例如，一个模拟点击 `Button` 并检查点击操作是否更新了 `TextView` 的测试类如下所示：\n\n```\npackage\
  \ com.example.robolectric\nimport org.junit.runner.RunWith\nimport org.robolectric.RobolectricTestRunner\n\
  import org.robolectric.shadows.ShadowApplication\nimport android.content.Intent\n\
  import android.widget.Button\nimport android.widget.TextView\nimport org.junit.Test\n\
  import org.robolectric.Robolectric\nimport org.junit.Assert.*\n@RunWith(RobolectricTestRunner::class)\n\
  class MainActivityTest {\n  @Test\n  fun clickingGo_shouldWriteToTextView() {\n\
  \    val activity = Robolectric.setupActivity(\n        MainActivity::class.java!!)\n\
  \    activity.findViewById(R.id.go).\n        performClick()\n    assertEquals(\"\
  Clicked\",\n        activity.findViewById(\n            R.id.tv).text)\n  }\n}\n\
  ```\n\n你可以像运行任何普通单元测试一样启动此测试：右键点击 *test* 目录，选择\"在…中运行测试\"或\"在…中调试测试\"。更多测试选项和详细信息，请参见\
  \ Robolectric 主页：[`www.robolectric.org`](http://www.robolectric.org)。\n\n## 使用 Mocking\
  \ 的单元测试\n\nMocking（模拟）是指让测试钩入 Android OS 函数的调用，并通过模仿其功能来模拟执行。如果你想在单元测试中引入 Mocking，Android\
  \ 开发者文档建议使用 *Mockito* 测试库。我建议更进一步，使用基于 Mockito 的 *PowerMock*，它增加了对静态或 final 类的模拟等更强大的功能。\n\
  \n要启用 PowerMock，请在应用的 `build.gradle` 文件中添加：\n\n```\nandroid {\n  ...\n  testOptions\
  \ {\n    unitTests.returnDefaultValues = true\n  }\n}\ndependencies {\n  ...\n \
  \ def powermock_version = \"2.0.2\"\n  testImplementation (\"org.powermock:\n  \
  \    powermock-module-junit4:${powermock_version}\")\n  testImplementation (\"org.powermock:\n\
  \      powermock-api-mockito2:${powermock_version}\")\n  testImplementation 'junit:junit:4.13.2'\n\
  }\n```\n\n（删除 \"powermock:\" 后的换行符。）\n\n`unitTests.returnDefaultValues = true` 条目负责处理桩版\
  \ Android 实现，以确保单元测试不会抛出异常，以防万一。\n\n作为一个非平凡的例子，我展示一个向数据库写入条目的 Activity。我们将模拟实际的数据库实现，但仍需确保必要的表被创建且\
  \ `insert` 语句被执行。使用 Android Studio 中的相应向导创建一个 Jetpack Compose Activity。\n\n现在，向该\
  \ Activity 添加以下方法：\n\n```\nfun count() {\n  val db = openOrCreateDatabase(\"MyDb\"\
  ,\n      MODE_PRIVATE, null)\n  with(db) {\n    val resultSet = rawQuery(\n    \
  \    \"Select * from MyItems\", null)\n    val cnt = resultSet.count\n    Toast.makeText(this@MainActivity,\n\
  \        \"Count: ${cnt}\", Toast.LENGTH_LONG).\n        show()\n  }\n  db.close()\n\
  }\nfun saveInDb(item:String) {\n  val tm = System.currentTimeMillis() / 1000\n \
  \ val db = openOrCreateDatabase(\"MyDb\",\n      MODE_PRIVATE, null)\n  with(db)\
  \ {\n    execSQL(\"CREATE TABLE IF NOT EXISTS \" +\n        \"MyItems(Item VARCHAR,timestamp\
  \ INT);\")\n    execSQL(\"INSERT INTO MyItems VALUES(?,?);\",\n        arrayOf(item,\
  \ tm))\n  }\n  db.close()\n}\n```\n\n对于测试本身，在源代码的 *test* 目录下创建一个类 `MainActivityTest`。其内容如下：\n\
  \n\n```kotlin\npackage book.andrkotlpro.mocktest\nimport android.database.sqlite.SQLiteDatabase\n\
  import androidx.activity.ComponentActivity\nimport org.junit.Test\nimport org.junit.runner.RunWith\n\
  import org.mockito.ArgumentMatchers\nimport org.mockito.BDDMockito.*\nimport org.powermock.api.mockito.PowerMockito\n\
  import org.powermock.core.classloader.annotations.PrepareForTest\nimport org.powermock.modules.junit4.PowerMockRunner\n\
  import org.powermock.reflect.Whitebox\nimport java.lang.reflect.Constructor\nimport\
  \ java.lang.reflect.Method\n@RunWith(PowerMockRunner::class)\n@PrepareForTest(MainActivity::class)\n\
  class MainActivityTest {\n    @Test\n    fun table_created() {\n        val componentActivityConstructors:\
  \ Array<Constructor<*>> =\n            PowerMockito.constructors(\n            \
  \    ComponentActivity::class.java.getConstructor()\n            )\n        PowerMockito.suppress(componentActivityConstructors)\n\
  \        val activity = MainActivity()\n        val activitySpy = spy(activity)\n\
  \        val db = mock(SQLiteDatabase::class.java)\n        // given\n        given(activitySpy.openOrCreateDatabase(anyString(),\
  \ anyInt(), any())).willReturn(db)\n        // when\n        Whitebox.invokeMethod(activitySpy,\
  \ \"saveInDb\", \"hello\")\n        // then\n        verify(db).execSQL(ArgumentMatchers.argThat\
  \ { arg ->\n            arg.toString().matches(Regex(\"(?i)create table.*\\\\bMyItems\\\
  \\b.*\"))\n        })\n    }\n    @Test\n    fun item_inserted() {\n        val\
  \ componentActivityConstructors: Array<Constructor<*>> =\n            PowerMockito.constructors(\n\
  \                ComponentActivity::class.java.getConstructor()\n            )\n\
  \        PowerMockito.suppress(componentActivityConstructors)\n        val activity\
  \ = MainActivity()\n        val activitySpy = spy(activity)\n        val db = mock(SQLiteDatabase::class.java)\n\
  \        // given\n        given(activitySpy.openOrCreateDatabase(anyString(), anyInt(),\
  \ any())).willReturn(db)\n        // when\n        Whitebox.invokeMethod(activitySpy,\
  \ \"saveInDb\", \"hello\")\n        // then\n        verify(db).execSQL(\n     \
  \       ArgumentMatchers.argThat { arg ->\n                arg.toString().matches(Regex(\"\
  (?i)insert into MyItems\\\\b.*\"))\n            },\n            ArgumentMatchers.argThat\
  \ { arg ->\n                val arr = arg as Array<*>\n                arr[0] ==\
  \ \"hello\" && arr[1] is Number\n            }\n        )\n    }\n}\n```\n\n`@RunWith(PowerMockRunner::class)`\
  \ 将确保 PowerMock 被用作单元测试运行器，而 `@PrepareForTest(MainActivity::class)` 则准备好 `MainActivity`\
  \ 类，使其即使被标记为“final”（这是 Kotlin 的默认行为）也能被模拟。\n\n第一个函数 `table_created()` 旨在确保在必要时创建表。它的工作过程如下：\n\
  \n- 首先确保 `ComponentActivity` 的构造方法不会被调用。这是必要的，因为该类是生命周期感知的，因此会被 UI 框架观察。\n- 实例化\
  \ `MainActivity`。\n- 将 `MainActivity` 实例包装到一个*间谍对象（Spy）*中。这使我们能够挂接到方法调用，从而模拟出实际的实现。\n\
  - 创建一个 `SQLiteDatabase` 的模拟对象，这样我们就能在不使用真实数据库的情况下挂接到数据库操作。\n- 接下来的 `//given`、`//when`\
  \ 和 `//then` 部分遵循 BDD（行为驱动开发）风格。\n- 在 `//given` 部分，我们模拟了 activity 的 `openOrCreateDatabase()`\
  \ 调用，让它返回我们的模拟数据库。\n- 在 `//when` 部分，我们调用 activity 类的 `saveInDb()` 方法。\n- 在 `//then`\
  \ 部分，我们检查 `saveInDb()` 的调用是否触发了适当的数据库操作来创建必要的表。为此，我们使用了一个 `ArgMatcher`，它允许我们检查适当的方法调用参数。\n\
  \n测试函数 `item_inserted()` 做的事情几乎相同，但检查的是是否有一条适当的 *插入* 语句被发送到数据库。现在你可以运行这些测试，它们应该能毫无问题地通过。\n\
  \n## 集成测试\n\n集成测试介于单元测试和完整的用户界面测试之间。单元测试在开发机器上进行细粒度的测试工作，而完整的用户界面测试则在真实或虚拟设备上运行。集成测试也在设备上运行，但它们测试的不是整个应用，而是在隔离的执行环境中测试选定的组件。\n\
  \n集成测试位于源代码的 `androidTest` 目录下。你还需要在应用的 `build.gradle` 文件中添加几个依赖包。\n\n```groovy\n\
  dependencies {\n    ...\n    androidTestImplementation 'com.android.support:support-annotations:27.1.1'\n\
  \    androidTestImplementation 'com.android.support.test:runner:1.0.2'\n    androidTestImplementation\
  \ 'com.android.support.test:rules:1.0.2'\n}\n```\n\n注意：需要移除 `androidTestImplementation`\
  \ 后面的换行符。\n\n### 测试服务\n\n为了测试一个带有绑定的服务，可以编写如下代码：\n\n```kotlin\n@RunWith(AndroidJUnit4::class)\n\
  class ServiceTest {\n    // @Rule 会包裹测试调用——这里我们\n    // 使用 'ServiceTestRule' 来确保\n\
  \    // 服务能够正确地启动和停止。\n    @Rule @JvmField\n    val mServiceRule = ServiceTestRule()\n\
  \    @Test\n    fun testWithBoundService() {\n        val serviceIntent = Intent(\n\
  \            InstrumentationRegistry.getTargetContext(),\n            MyService::class.java\n\
  \        ).apply {\n            // 如果需要，可以通过 Intent 向\n            // 服务传递数据。\n\
  \            putExtra(\"IN_VAL\", 42L)\n        }\n        // 绑定服务并获取\n        //\
  \ 绑定器（Binder）的引用。\n        val binder: IBinder = mServiceRule.bindService(serviceIntent)\n\
  \        // 获取对服务的引用\n        val service: MyService = (binder as MyService.MyBinder).getService()\n\
  \        // 验证服务是否正常工作。\n        assertThat(service.add(11, 27), `is`(38))\n   \
  \ }\n}\n```\n\n这测试了一个名为 `MyService` 的简单服务，其中包含一个 `add(Int, Int)` 服务方法：\n\n```kotlin\n\
  class MyService : Service() {\n    class MyBinder(val servc: MyService) : Binder()\
  \ {\n        fun getService(): MyService {\n            return servc\n        }\n\
  \    }\n    private val binder: IBinder = MyBinder(this)\n    override fun onBind(intent:\
  \ Intent): IBinder = binder\n    fun add(a: Int, b: Int) = a + b\n}\n```\n\n要运行集成测试，右键点击源代码中的\
  \ `androidTest` 目录，选择“Run Tests in …”。这将创建并上传一个 APK 文件，通过 `InstrumentationRegistry.getTargetContext()`\
  \ 创建一个集成测试上下文，然后在设备上运行测试。\n\n### 测试 Intent 服务\n\n与官方文档声称的不同，基于 `IntentService` 类的服务也可以进行集成测试。只是你不能使用\
  \ `@Rule ServiceTestRule` 来处理服务的生命周期，因为意图服务（Intent Service）有自己的启动和停止时机。但你可以自己管理生命周期。作为示例，我展示了一个简单意图服务的测试，该服务运行\
  \ 10 秒钟，并通过 `ResultReceiver` 持续回传数据。\n\n服务本身的代码如下：\n\n```kotlin\nclass MyIntentService()\
  \ :\n    IntentService(\"MyIntentService\") {\n    class MyResultReceiver(val cb:\
  \ (Double) -> Unit) :\n        ResultReceiver(null) {\n        companion object\
  \ {\n            val RESULT_CODE = 42\n            val INTENT_KEY = \"my.result.receiver\"\
  \n            val DATA_KEY = \"data.key\"\n        }\n        override\n       \
  \ fun onReceiveResult(resultCode: Int,\n                            resultData:\
  \ Bundle?) {\n            super.onReceiveResult(resultCode, resultData)\n      \
  \      val d = resultData?.get(DATA_KEY) as Double\n            cb(d)\n        }\n\
  \    }\n    var status = 0.0\n    override fun onHandleIntent(intent: Intent) {\n\
  \        val myReceiver = intent.\n            getParcelableExtra<MyResultReceiver>(\n\
  \                MyResultReceiver.INTENT_KEY)\n        for (i in 0..100) {\n   \
  \         Thread.sleep(100)\n            val bndl = Bundle().apply {\n         \
  \       putDouble(MyResultReceiver.DATA_KEY,\n                    i * 0.01)\n  \
  \          }\n            myReceiver.send(MyResultReceiver.RESULT_CODE,\n      \
  \          bndl)\n        }\n    }\n}\n```\n\n以及测试类，同样位于源代码的 `androidTest` 目录下：\n\
  \n```kotlin\n@RunWith(AndroidJUnit4::class)\nclass MyIntentServiceTest {\n    @Test\n\
  \    fun testIntentService() {\n        var serviceVal = 0.0\n        val ctx =\
  \ InstrumentationRegistry.\n            getTargetContext()\n        val serviceIntent\
  \ = Intent(ctx,\n            MyIntentService::class.java\n        ).apply {\n  \
  \          `package` = ctx.packageName\n            putExtra(\n                MyIntentService.MyResultReceiver.INTENT_KEY,\n\
  \                MyIntentService.MyResultReceiver({ d ->\n                    serviceVal\
  \ = d\n                }))\n        }\n        ctx.startService(serviceIntent)\n\
  \        val tm0 = System.currentTimeMillis() / 1000\n        var ok = false\n \
  \       while (System.currentTimeMillis() / 1000 - tm0 < 20) {\n            if (serviceVal\
  \ == 1.0) {\n                ok = true\n                break\n            }\n \
  \           Thread.sleep(1000)\n        }\n        assertThat(ok, `is`(true))\n\
  \    }\n}\n```\n\n好的，作为高级文档工程师和翻译员，我将遵循您的格式要求，将给定的英文文本翻译成中文。\n\n\n该测试会调用服务，并在一段时间内监听其结果。当检测到服务按预期完成工作时，测试便会通过。\n\
  \n## 测试内容提供者\n\n为了测试内容提供者，Android 提供了一个特殊的类 `ProviderTestCase2`，它会启动一个独立的临时环境，从而确保测试不会干扰用户数据。例如，一个测试用例的代码如下：\n\
  \n```kotlin\n@RunWith(AndroidJUnit4::class)\nclass MyContentProviderTest :\n   \
  \ ProviderTestCase2(\n        MyContentProvider::class.java,\n        \"com.example.database.provider.MyContentProvider\"\
  ) {\n    @Before public override   // \"public\" 是必须的！\n    fun setUp() {\n    \
  \    context = InstrumentationRegistry.\n            getTargetContext()\n      \
  \  super.setUp()\n        val mockRslv: ContentResolver = mockContentResolver\n\
  \        mockRslv.delete(MyContentProvider.CONTENT_URI,\n            \"1=1\", arrayOf())\n\
  \    }\n    @Test\n    fun test_inserted() {\n        val mockCtx: Context = mockContext\n\
  \        val mockRslv: ContentResolver = mockContentResolver\n        // 添加一条记录\n\
  \        val cv = ContentValues()\n        cv.put(MyContentProvider.COLUMN_PRODUCTNAME,\n\
  \            \"Milk\")\n        cv.put(MyContentProvider.COLUMN_QUANTITY,\n    \
  \        27)\n        val newItem = mockRslv.insert(\n            MyContentProvider.CONTENT_URI,\
  \ cv)\n        // 查询所有记录\n        val cursor = mockRslv.query(\n            MyContentProvider.CONTENT_URI,\n\
  \            null, null, null)\n        assertThat(cursor.count, `is`(1))\n    \
  \    cursor.moveToFirst()\n        val ind = cursor.getColumnIndex(\n          \
  \  MyContentProvider.COLUMN_PRODUCTNAME)\n        assertThat(cursor.getString(ind),\
  \ `is`(\"Milk\"))\n    }\n}\n```\n\n列名、授权（authority）和 URI 的使用都取决于具体的内容提供者——对于测试用例来说，关键在于要使用模拟的内容解析器（mocked\
  \ content resolver）来与内容提供者通信。\n\n> **注意**  \n> 请注意 `setUp()` 方法中前两行的顺序——这与你可能在 2018\
  \ 年 5 月的 Android 开发者文档中看到的不同。该文档此处有误。\n\n## 测试广播接收器\n\n对于测试广播接收器，Android 测试框架并没有提供特别的关注。这很大程度上取决于被测试的广播接收器实际执行的操作。假设它执行了某种副作用，例如向数据库写入数据，那么你可以使用之前测试内容提供者时用到的测试上下文来模拟（mock）该数据库操作。\n\
  \n例如，看看下面这个位于 `\"androidTest\"` 源码目录下的测试用例：\n\n```kotlin\nimport android.support.test.InstrumentationRegistry\n\
  import android.support.test.runner.AndroidJUnit4\nimport org.junit.Test\nimport\
  \ org.junit.runner.RunWith\nimport org.junit.Assert.*\nimport org.hamcrest.Matchers.*\n\
  import android.content.Intent\n@RunWith(AndroidJUnit4::class)\nclass BroadcastTest\
  \ {\n    @Test\n    fun testBroadcastReceiver() {\n        val context = InstrumentationRegistry.\n\
  \            getTargetContext()\n        val intent = Intent(context,\n        \
  \    MyReceiver::class.java)\n        intent.putExtra(\"data\", \"Hello World!\"\
  )\n        context.sendBroadcast(intent)\n        // 给接收器一些时间来完成工作\n        Thread.sleep(5000)\n\
  \        // 检查数据库中由广播接收器添加的记录\n        val db = MyDBHandler(context)\n        val\
  \ p = db.findProduct(\"Milk\")\n        assertThat(p, isA(Product::class.java))\n\
  \        assertThat(p!!.productName, `is`(\"Milk\"))\n    }\n}\n```\n\n你可以看到，我们使用了由\
  \ `InstrumentationRegistry.getTargetContext()` 提供的上下文。这将确保广播接收器以及后续测试所使用的数据库，都会使用一个临时空间来存储数据。运行此测试与运行其他集成测试一样，可以通过右键单击它或其所在的包，然后选择“Run\
  \ …”或“Run Tests in …”。\n\n## 用户界面测试\n\n进行用户界面测试时，你可以模拟用户的使用场景，从而检查你的应用整体上是否如预期般运行。我简要提及两个框架：\n\
  \n*   **Espresso**  \n    使用 *Espresso* 来编写针对你应用的测试，而无需考虑跨应用的活动。使用 Espresso，你可以执行以下操作：当某个特定的\
  \ `View`（`Button`、`TextView`、`EditText` 等）出现时，执行某些操作（如输入文本或执行点击），然后检查是否满足某些后续条件。\n\
  \n*   **UI Automator**  \n    使用 *UI Automator* 来编写跨越多个应用的测试。使用 UI Automator，你可以检查布局以了解活动的\
  \ UI 结构，模拟对活动的操作，并对 UI 元素进行检查。\n\n关于如何使用这两种工具的详细信息，请查阅在线文档——例如，在您常用的搜索引擎中输入“Android\
  \ 自动化 UI 测试”来查找相关资源。\n\n## 16. 故障排查\n\n在前一章中，我们讨论了测试应用的各种方法。如果测试失败，日志通常会告诉你具体发生了什么；如果这还不够，你可以扩展应用的日志记录，以查看问题出在哪里。\n\
  但是，即使拥有最佳的测试方案，你的应用仍可能无法完全按预期运行。首先，它可能只是偶尔在功能上做错事。其次，它可能在非功能方面表现不佳，这意味着随着时间推移它会消耗大量内存资源，或者在速度上表现很差。\n\
  本章我们将讨论一些技术，用于解决你的应用可能出现的问题。我们将讨论日志记录、调试和监控，以及 Android Studio 或 SDK 中能帮助我们处理这些问题的工具。\n\
  \n### 日志记录\n\n在 Android 中记录日志非常简便——你只需导入 `android.util.Log`，然后在代码中编写诸如 `Log.e(\"\
  LOG\", \"Message\")` 这样的语句来发出日志消息。随后，Android Studio 会帮助你收集、过滤和分析这些日志。\n虽然在开发过程中使用日志记录非常方便，但当涉及到发布应用时，这就变得有问题了。你不想影响应用的性能，文档也建议移除所有日志记录，这基本上否定了你在日志记录上投入的所有工作。如果用户后来报告了问题，你又需要添加日志记录语句进行故障排查，修复完成后再将它们移除，如此反复。\n\
  \n为了规范这个过程，我建议从一开始就为日志记录添加一个简单的封装：\n\n```kotlin\nclass Log {\n    companion object\
  \ {\n        fun v(tag: String, msg: String) {\n            android.util.Log.v(tag,\
  \ msg)\n        }\n        fun v(tag: String, msg: String, tr: Throwable) {\n  \
  \          android.util.Log.v(tag, msg, tr)\n        }\n        fun d(tag: String,\
  \ msg: String) {\n            android.util.Log.d(tag, msg)\n        }\n        fun\
  \ d(tag: String, msg: String, tr: Throwable) {\n            android.util.Log.d(tag,\
  \ msg, tr)\n        }\n        fun i(tag: String, msg: String) {\n            android.util.Log.i(tag,\
  \ msg)\n        }\n        fun i(tag: String, msg: String, tr: Throwable) {\n  \
  \          android.util.Log.i(tag, msg, tr)\n        }\n        fun w(tag: String,\
  \ msg: String) {\n            android.util.Log.w(tag, msg)\n        }\n        fun\
  \ w(tag: String, msg: String, tr: Throwable) {\n            android.util.Log.w(tag,\
  \ msg, tr)\n        }\n        fun w(tag: String, tr: Throwable) {\n           \
  \ android.util.Log.w(tag, tr)\n        }\n        fun e(tag: String, msg: String)\
  \ {\n            android.util.Log.e(tag, msg)\n        }\n        fun e(tag: String,\
  \ msg: String, tr: Throwable) {\n            android.util.Log.e(tag, msg, tr)\n\
  \        }\n    }\n}\n```\n\n然后你可以使用与 Android 标准相同的简单日志记录符号，但以后可以自由更改日志记录的实现，而无需修改代码的其余部分。例如，你可以添加一个简单的开关：\n\
  \n```kotlin\nclass Log {\n    companion object {\n        val ENABLED = true\n \
  \       fun v(tag: String, msg: String) {\n            if(!ENABLED) return\n   \
  \         // <- 将其添加到所有其他语句\n            android.util.Log.v(tag, msg)\n        }\n\
  \        ...\n    }\n}\n```\n\n或者，你可以仅对虚拟设备启用日志记录。不幸的是，目前没有简单可靠的方法来确定你的应用是否在虚拟设备上运行。博客中提出的所有解决方案都有其优缺点，并且可能会随着新的\
  \ Android 版本而改变。你可以做的另一种方法是将构建变量传递给你的应用。为此，在你的应用的 `build.gradle` 文件中添加：\n\n```groovy\n\
  buildTypes {\n    release {\n        ...\n        buildConfigField \"boolean\",\
  \ \"LOG\", \"false\"\n    }\n    debug {\n        ...\n        buildConfigField\
  \ \"boolean\", \"LOG\", \"true\"\n    }\n}\n```\n\n然后，在你的日志实现中，只需替换为：\n\n```kotlin\n\
  val ENABLED = BuildConfig.LOG\n```\n\n\n\n# 日志开关\n\n这会打开用于调试 APK 的日志记录，否则将其关闭。\n\
  \n> **注意**\n> 在之前的版本中，我们还讨论了将 `Log4j` 等日志框架添加到 Android 项目中。由于目前 Android 的替代日志框架似乎并未获得太多关注，甚至因主要安全漏洞而缺少更新，因此我目前不建议在\
  \ Android 中使用它们。相反，请使用内置日志器，或如前所述使用其包装器。\n\n提高性能的最后一个措施是在日志记录活动中使用 lambda 表达式。为此，请在自定义日志器中按如下方式使用日志方法：\n\
  \n```\nfun v(tag: String, msg: ()->String) {\n    if(!ENABLED) return\n    Logger.getLogger(tag).trace(msg.invoke())\n\
  }\n... // 其他语句类似\n```\n\n在代码中，你可以像下面这样发出日志消息：\n\n```\nLog.v(\"LOG\",\n    {-> \"\
  Number of items added = \" + calculate()})\n```\n\n这种方法的优势在于，如果日志未启用，则不会计算日志消息，从而为应用的发布版本带来一些性能提升。\n\
  \n### 调试\n\n关于在 Android Studio 中进行调试，没有太多要说的——它按预期工作。你在代码中设置断点，一旦程序流程到达断点，你就可以逐步执行程序的其余部分，观察程序的行为以及变量如何变化。\n\
  \n# 性能监控\n\nAndroid Studio 拥有一个非常强大的性能监视器，它可以让你在方法级别分析性能问题。要使用它，你首先必须找到一种方法，让可能存在性能问题的代码部分在循环中运行。你可以尝试使用测试来实现这一点，但临时向代码中添加人工循环也是可行的。\n\
  \n然后，在循环运行时，在 Android Studio 中打开 `View` ➤ `Tool Windows` ➤ `Profiler`。接着添加性能分析会话。\n\
  \n性能分析器监视器会显示出来，如图 [16-1] 所示。除了 CPU 性能分析，它还包含内存使用情况分析。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig1_HTML.jpg)\n\
  \n*性能分析通道示意图，包含 CPU、内存等组件。*\n\n**图 16-1 性能分析器通道**\n\n在那里，点击“CPU”通道会将视图缩小到你在图 [16-2]\
  \ 中看到的性能监视器图表。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig2_HTML.jpg)\n\
  \n*说明 CPU 性能分析部分的图表。*\n\n**图 16-2 CPU 性能分析部分**\n\n在下方面板中滚动浏览线程，然后你可以尝试找到可疑的线程。对于我在此处运行的示例，你可以看到\
  \ `DefaultDispatch` 线程做了相当多的工作。\n\n在中间面板中，你可以看到图 [16-3] 所示的捕获控件。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig3_HTML.jpg)\n\
  \n*CPU 性能分析捕获控件示意图，包含调用栈样本记录和其他记录。*\n\n**图 16-3 CPU 性能分析捕获控件**\n\n选择捕获模式——`Java/Kotlin\
  \ Method Trace Recording` 通常是一个不错的选择——然后你可以通过按下相应命名的按钮开始录制。捕获完成后，分析会向你显示热点，直至类方法级别。从那里通常可以很容易地找到性能瓶颈。\n\
  \n有关性能监控的更多信息和细节，请参阅 Android Studio 的文档和屏幕上的上下文帮助。\n\n# 内存使用监控\n\n除了像上一节所示对应用的性能进行性能分析外，Android\
  \ Studio 的性能分析器还允许查找内存泄漏或与糟糕的内存管理相关的问题。再次将有问题的代码部分放入循环并启动它。通过 `View` ➤ `Tool Windows`\
  \ ➤ `Profiler` 打开性能分析器。选择内存通道，性能分析器会立即向你显示如图 [16-4] 所示的内存使用情况图表。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig4_HTML.jpg)\n\
  \n*内存监视器使用情况示意图。*\n\n**图 16-4 内存监视器**\n\n运行一段时间后，你可以看到内存使用量在上升——这是因为在示例应用中，我添加了一个人为的内存泄漏。参见图\
  \ [16-5]。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig5_HTML.jpg)\n\n\
  *内存性能分析及较长时间段的内存泄漏示意图。*\n\n**图 16-5 内存性能分析，较长时间段**\n\n要开始分析，请选择 `Record Java/Kotlin\
  \ Allocations` 并启动录制会话。从这里你可以使用各种分析工具。参见图 [16-6]。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig6_HTML.jpg)\n\
  \n*内存性能分析详情示意图。*\n\n**图 16-6 内存性能分析，详情**\n\n如果你选择 `Arrange by Callstack` 模式，你可以看到哪个方法导致了泄漏。对于我的示例，它指向以下方法：\n\
  \n```\nfun go(l: MutableList) {\n    Thread {\n        while (true) {\n        \
  \    l.add(\"\" + System.currentTimeMillis())\n            Thread.sleep(1)\n   \
  \     }\n    }.start()\n}\n```\n\n我在其中编程了一个人为的内存泄漏。参见图 [16-7]。\n\n![] (images/463716_2_En_16_Chapter/463716_2_En_16_Fig7_HTML.jpg)\n\
  \n*内存性能分析及问题定位示意图。*\n\n**图 16-7 内存性能分析，问题定位**\n\n如果这还不足以解决内存问题，你可以额外获取一个堆转储。为此，请选择\
  \ `Capture heap dump` 录制模式。然后你可以使用与之前相同的技术，或者将堆导出为 HPROF 文件，并使用其他工具分析转储。\n\n> **注意**\n\
  > 这样的堆转储允许确定对象引用关系——这超出了 Android Studio 的内存分析范围。这使你能够最大程度地洞察内存结构，但需要花费一些时间来熟悉像 `Eclipse\
  \ Memory Analyzer` 这样的堆转储分析工具，并找到正确的答案。\n\n# 17. 分发应用\n\n如果你完成了应用，你需要找到一种分发方式。为此主要的平台是\
  \ *Google Play Store*，但如果你能说服用户允许从“其他来源”安装应用，也可以使用其他分发渠道。我不会在此介绍分发渠道列表，也不会提供使用 Google\
  \ Play Store 的详细说明。根据你目标市场的不同，选项实在太多。此外，本书并非旨在介绍一般的应用营销。\n\n如需进一步了解此问题，请访问：\n[`https://developer.android.com/google/play/dist`](https://developer.android.com/google/play/dist)\n\
  或\n[`https://developer.android.com/distribute/marketing-tools/alternative-distribution`](https://developer.android.com/distribute/marketing-tools/alternative-distribution)\n\
  或\n[`https://support.google.com/googleplay/android-developer/`](https://support.google.com/googleplay/android-developer/)。\n\
  \n## Android App Bundle\n\nAPK 作为分发格式已经存在了一段时间，谷歌于 2021 年引入了一种新的打包格式 *Android App\
  \ Bundle* 或 AAB。它通过过滤掉用户不需要的本地化资源等文件，简化了向最终用户的分发。Android Studio 允许在 `Build` ➤ `Generate\
  \ Signed Bundle/APK…` ➤ `Android App Bundle` 处创建 AAB。\n\n## 你自己的应用商店\n\n\n\n一旦设备允许从\
  \ Google Play 商店以外的来源安装应用程序，就可以从任何服务器（包括您自己的企业服务器）提供 `APK` 或 `AAB` 文件。请注意，此选项因使用的\
  \ Android 版本而异：\n\n- 在 Android 7（API 级别 25）及更低版本中，`\"安全\"` 部分有一个系统范围的设置，用于允许从 Google\
  \ Play 以外的来源进行安装。\n- 从 Android 8（API 级别 26）开始，从其他来源安装应用的权限是按应用处理的，例如浏览器中的设置。\n\n\
  无论您选择哪种分发渠道，都必须首先通过 `Build` ➤ `Generate Signed Bundle/APK…` 生成已签名的 `APK` 或 `AAB`。然后，将其复制到服务器，并确保文件被分配了\
  \ `\"application/vnd.android.package-archive\"` MIME 类型（对于 `APK` 文件）或 `\"application/x-authorware-bin\"\
  ` 和 `\"application/octet-stream\"` 之一（对于 `AAB` 文件，选择最适合您的一种）。\n\n**注意**\n\n尽管 Android\
  \ Studio 会自动将应用的调试版本上传到虚拟设备或通过 USB 连接的设备，但对于虚拟设备，您也可以测试已签名的 `APK` 安装过程。如果您在本地开发机器上运行服务器，请在虚拟设备内部使用\
  \ IP 地址 `10.0.2.2` 连接到开发机器。最好先卸载开发构建过程安装的版本。\n\n然后，您可以使用设备的浏览器下载并安装 `APK` 和 `AAB`\
  \ 文件。\n\n## Google Play 商店\n\n尽管这不是对 Google Play 商店使用的介绍，但为了给您提供关于分发技术方面的一些额外要点，我在此列出一些随机提示：\n\
  \n- 如前所述，在应用可以分发到 Google Play 之前，您*必须*对其签名。\n- 在线文档建议在分发应用之前，从应用中移除所有日志记录语句。作为一种破坏性较小的替代方案，请遵循第\
  \ 16 章 `\"日志记录\"` 部分的说明，并创建一个自定义日志记录器。\n- 如果您的应用使用数据库，请为数据库架构更改时提供更新机制。请参阅 `SQLiteOpenHelper`\
  \ 类。如果您忘记了这一点，更新应用并从版本到版本升级数据库可能会变得非常麻烦。\n- 可以为不同的设备分发不同的 `APK`。本书对这一功能有些忽略，因为在当今现代设备中，应用的大小不再起关键作用，您通常可以将所有内容放入一个\
  \ `APK` 文件中。如果您仍想提供多个 `APK`，请查阅在线文档——在您喜欢的搜索引擎中搜索 `\"Android multiple APK\"` 或类似内容。\n\
  - 如果您在真实设备上测试应用，如果设备上使用的 Google 帐户与分发应用时使用的帐户不同，事情会变得稍微容易一些。否则，Google 不会让您通过 Play\
  \ 商店安装应用。请尽早执行此操作，因为稍后更改设备的 Google 帐户可能会很复杂。\n- 本地化所有向用户显示的文本！在本书中，为简洁起见，未使用本地化，但您绝对应该为您的应用执行此操作。Android\
  \ Studio 附带的 `LINT` 检查器有助于发现本地化缺陷，使用模拟器附带的自定义语言环境切换器也可以进行检查。\n- 尽管仅为智能手机形态（屏幕尺寸、分辨率）进行开发有些诱人，但您也应该为其他形态因素检查您的设计。各种模拟器可以帮助您做到这一点。您至少还应该为平板电脑测试您的应用。\n\
  \n应用分发的中心点是 [*Google Play Console*](https://play.google.com/console/)。这也是您可以开始营销应用的地方。\n\
  \n## 18. 即时应用\n\n即时应用允许设备用户在不实际安装的情况下使用应用。在 Google Play 商店中，您有时会看到的 `\"Try it\"\
  ` 按钮启动的就是这样一个即时应用。有关即时应用的更多信息，请参阅 [`https://developer.android.com/topic/google-play-instant/`](https://developer.android.com/topic/google-play-instant/)\
  \ 或 [`https://support.google.com/googleplay/android-developer/answer/9900182?hl=en`](https://support.google.com/googleplay/android-developer/answer/9900182%253Fhl%253Den)。\n\
  \n## 开发即时应用\n\n在过去的几年里，即时应用的开发和推出发生了巨大变化。\n\n开发、构建和推出即时应用的蓝图如下：\n\n- 检查执行条件。允许使用以下权限：`ACCESS_COARSE_LOCATION`、`ACCESS_FINE_LOCATION`、`ACCESS_NETWORK_STATE`、`BILLING`（自\
  \ Play Billing Library 1.0 起已弃用）、`CAMERA`、`INSTANT_APP_FOREGROUND_SERVICE`（Android\
  \ 8.0 = API 级别 26 及更高版本）、`INTERNET`、`READ_PHONE_NUMBERS`（Android 8.0 = API 级别 26\
  \ 及更高版本）、`RECORD_AUDIO`、`VIBRATE` 和 `WAKE_LOCK`。\n- 声明启用即时的应用模块。Android Studio 在此处提供各种帮助工具。\n\
  - 生成上传密钥和密钥库（作为 Android Studio 的工具部分）。\n- 使用您的上传密钥对应用进行签名（作为 Android Studio 的工具部分）。\n\
  - 配置 Play 应用签名（Google Play 控制台）。\n- 将您的应用作为 `AAB` 上传到 Google Play。\n\n为了避免描述在您阅读本书时已经过时的事情，我决定不在本书中进一步介绍此主题。相反，请访问\
  \ [`https://developer.android.com/topic/google-play-instant/getting-started/instant-enabled-app-bundle`](https://developer.android.com/topic/google-play-instant/getting-started/instant-enabled-app-bundle)，这为您开发即时应用提供了一个极好的起点。\n\
  \n## 19. CLI\n\n在本章中，我们简要总结了一些命令行工具，您可以在 *Android Studio* 之外使用它们进行构建、管理以及一些维护任务。\n\
  \n**注意**\n\n- 这些工具在某种程度上是\"半\"官方的——您可能在 SDK 文件夹中的略有不同的位置找到它们，并且在线文档不一定是最新的。\n- 此处显示的工具是\
  \ Linux 发行版的一部分。对于其他操作系统，提供了对应的工具，其用法类似。\n- 此列表并非详尽无遗——如果您安装的 SDK 包较少或较多，它可能与您的安装不同。\n\
  \n## SDK 工具\n\n以下是在 `SDK_INST/tools/bin` 文件夹中提供的平台无关工具，其中 SDK 安装目录通常位于 `Android`\
  \ 内，而 `Android` 又位于您的主文件夹内。\n\n`tools` 文件夹包含虚拟设备和 SDK 本身的管理，以及各种测试和工件管理工具。表 19-1\
  \ 提供了这些工具的列表和描述。\n\n**表 19-1** SDK 工具\n\n| 命令 | 描述 |\n| :--- | :--- |\n| `apkanalyzer`\
  \ | 使用此工具分析 `APK` 文件，例如，您可以在 `PROJECT-DIR/PROJECT/release` 文件夹中找到这些文件（`PROJECT`\
  \ 通常为 `\"app\"`）。在不带参数的情况下调用命令 `./apkanalyzer` 会显示使用信息。 |\n| `archquery` | 一个用于查询操作系统架构的简单工具：`./archquery`\
  \ 输出例如 `\"x86_64\"`。 |\n\n\n\n# Android SDK 工具指南\n\n## 工具概述\n\n`avdmanager`\n\n\
  使用此工具管理虚拟设备（AVD = Android Virtual Device）。您可以创建、移动和删除设备，以及列出设备、目标和 AVD。调用不带参数的命令\n\
  `./avdmanager`\n会显示使用信息。此命令处理的虚拟设备的数据文件位于 `~/.android/avd` 中。用于创建设备的系统映像位于 `SDK_INST/system-images`\
  \ 中。\n\n`jobb`\n\n使用此工具管理 OBB（Opaque Binary Blob）文件。这些是*APK 扩展文件*，存储在外部存储设备（例如 SD\
  \ 卡）上，并且只能从您的应用内部访问。调用不带参数的命令\n`./jobb`\n会显示使用信息。\n\n`lint`\n\n用于代码检查的 LINT 工具。调用不带参数的命令\n\
  `./lint`\n会显示使用信息。\n\n`monkeyrunner`\n\n这是一个强大的测试工具，可通过 PC 上的 Python 脚本控制 Android\
  \ 应用。调用\n`./monkeyrunner`\n会显示使用信息。不带参数启动它会启动一个 Jython shell。\n\n`screenshot2`\n\
  \n使用此工具从设备或模拟器截取屏幕截图。调用不带参数的命令\n`./screenshot2`\n会显示使用信息。\n\n`sdkmanager`\n\n此工具可帮助您管理\
  \ Android SDK 的软件包。您可以安装、卸载或更新 SDK 软件包，并可以使用它列出已安装和可用的软件包。调用\n`./sdkmanager --help`\n\
  会显示详细的使用信息。例如，要列出已安装和可用的软件包（包括构建工具、平台、文档、源代码、系统映像以及更多 SDK 组件），请调用\n`./sdkmanager\
  \ --list`\n要安装新组件，该工具需要下载它们。存在一些标志；请查看 `–help` 的输出以了解如何指定代理或禁用 HTTPS 的使用。\n\n`uiautomatorviewer`\n\
  \n打开 UI Automator GUI。用法概要：\n`./uiautomatorviewer`\n这在当前的 JDK 中已失效。请改用虚拟设备扩展控件中的“录制和回放”功能。\n\
  \n## 父目录中的工具\n\n在父目录\n```\nSDK_INST/tools\n```\n中，您会找到更多工具。有关这些工具的摘要，请参见表 19-2。\n\
