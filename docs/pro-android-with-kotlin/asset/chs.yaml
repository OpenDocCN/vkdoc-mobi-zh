- "# 意图过滤器\n\n`Intent`（意图）是用来告诉 Android 系统需要执行某项操作的对象。它可以是*显式*的，即精确指定需要调用的组件；也可以是*隐式*的，当我们不精确指定被调用的组件，而是让\
  \ Android 决定哪个应用和哪个组件能够响应该请求时，就属于隐式意图。如果存在歧义，并且 Android 无法确定要为隐式`Intent`调用哪个组件，Android\
  \ 会询问用户。\n\n为了使隐式`Intent`能够工作，可能的意图接收者需要声明它能接收哪些`Intent`。例如，某个 Activity 可能能够显示文本文件的内容，而调用者说“我需要一个能显示文本文件的\
  \ Activity”，就可能连接到这个 Activity。现在，意图接收者声明其能够响应意图请求的方式是：在其应用的 `AndroidManifest.xml`\
  \ 文件中指定一个或多个*意图过滤器*。这种声明的语法如下：\n\n```\n<intent-filter android:icon=\"drawable resource\"\
  \nandroid:label=\"string resource\"\nandroid:priority=\"integer\" >\n...\n```\n\n\
  其中，`icon` 指向一个用于图标的可绘制资源 ID，`label` 指向一个用于标签的字符串资源 ID。如果未指定，将使用父元素的图标或标签。`priority`\
  \ 属性是一个介于 -999 到 999 之间的数字，对于`Intent`，它指定了处理此类意图请求的能力；对于接收者，它指定了多个接收者的执行顺序。优先级高的在前，优先级低的在后。\n\
  \n> **注意**  \n> `priority` 属性应谨慎使用——一个组件无法知道其他应用中的组件可能具有的优先级。因此，你会在应用之间引入某种类型的依赖关系，这并非设计本意。\n\
  \n此 `<intent-filter>` 元素可以作为以下元素的孩子：\n\n*   `<activity>` 和 `<activity-alias>`\n\
  *   `<service>`\n*   `<receiver>`\n\n所以，`Intent` 可用于启动 Activity 和服务，以及发送广播消息。\n\n\
  该元素必须或可以拥有以下子元素：\n\n*   `<action>` 是必需的。\n*   `<category>`\n*   `<data>`\n\n> **注意**\
  \  \n> 另请参阅 [`https://developer.android.com/reference/android/content/Intent`](https://developer.android.com/reference/android/content/Intent)\
  \ 上的在线文档。\n\n## Intent 动作\n\n过滤器的 `<action>` 子元素（或多个子元素，你可以有多个）指定要执行的动作。语法如下：\n\n\
  ```\n<action android:name=\"string\" />\n```\n\n这将是表达诸如“查看”、“选取”、“编辑”、“拨号”等动作的内容。通用动作的完整列表由\
  \ `android.content.Intent` 类中名称带有 `ACTION_*` 的常量指定，并在在线文本伴侣的“Intent 组成要素”一节中展示。除了这些通用动作，你也可以定义自己的动作。\n\
  \n> **注意**  \n> 使用任何标准动作并不一定意味着你的设备上存在能够响应相应 `Intent` 的应用程序。\n\n## Intent 类别\n\n\
  过滤器的 `<category>` 子元素指定了过滤器的类别。语法如下：\n\n```\n<category android:name=\"string\" />\n\
  ```\n\n此属性可用于指定 `Intent` 应寻址的组件类型。你可以指定多个类别，但类别并非用于所有 `Intent`，你也可以省略它。仅当*所有*必需的类别都存在时，过滤器才会匹配该\
  \ `Intent`。\n\n在调用者一侧使用 `Intent` 时，你可以通过编写如下代码来添加类别：\n\n```\nval intent:Intent =\
  \ Intent(...)\nintent.addCategory(\"android.intent.category.ALTERNATIVE\")\n```\n\
  \n标准类别对应于 `android.content.Intent` 类中名称带有 `CATEGORY_*` 的常量。我们在在线文本伴侣的“Intent 组成要素”一节中列出了它们。\n\
  \n> **注意**  \n> 对于隐式 `Intent`，你*必须*在过滤器中使用 `DEFAULT` 类别。这是因为 `startActivity()` 和\
  \ `startActivityForResult()` 方法默认使用了此类别。\n\n## Intent 数据\n\n过滤器的 `<data>` 子元素是过滤器的数据类型规范。语法如下：\n\
  \n```\n<data android:scheme=\"string\"\n      android:host=\"string\"\n      android:port=\"\
  string\"\n      android:path=\"string\"\n      android:pathPrefix=\"string\"\n \
  \     android:pathPattern=\"string\"\n      android:mimeType=\"string\" />\n```\n\
  \n你可以指定以下任一项：\n\n*   仅由 `mimeType` 元素指定的数据类型，例如 \"text/plain\" 或 \"text/html\"。所以你可以编写\
  \ `<data android:mimeType=\"text/html\" />`。\n*   由协议、主机、端口和某种路径规范指定的数据类型：`<scheme>://<host>:<port>[<path>|<pathPrefix>|<pathPattern>]`。这里\
  \ `<path>` 表示完整路径，`<pathPrefix>` 是路径的开头部分，`<pathPattern>` 类似于路径但可以使用通配符：\"X*\" 表示\
  \ 0 次或多次出现字符 \"X\"，\".*\" 表示 0 次或多次出现任何字符。由于转义规则，要表示字面量的 \"*\"，请编写 `\\\\`；要表示字面量的\
  \ \"\\\"，请编写 `\\\\\\\\`。\n\n或者，你也可以同时指定上述两个选项。  \n在调用者一侧，你可以使用 `setType()`、`setData()`\
  \ 和 `setDataAndType()` 来设置任意数据类型组合。\n\n> **注意**  \n> 对于隐式意图过滤器，如果调用者指定了一个 URI *数据*部分，例如\
  \ `intent.data = <某个 URI>`，那么仅在过滤器声明中指定协议/主机/端口/路径可能是不够的。在这种情况下，你还必须指定 MIME 类型，例如\
  \ `mimeType=\"*/*\"`；否则，过滤器可能无法匹配。这种情况通常发生在*内容提供者*环境中，因为对于指定的 URI，内容提供者的 `getType()`\
  \ 方法会被调用，其结果会被设置为 `Intent` 的 MIME 类型。\n\n## Intent 额外数据\n\n任何 `Intent` 都可以添加额外的数据，你可以用它来发送除\
  \ `<data>` 子元素指定的数据之外的其他数据。  \n虽然你可以使用各种 `putExtra(...)` 方法中的任何一种来添加任何类型的额外数据，但也有几个通过\
  \ `putExtra(String,Bundle)` 发送的标准额外数据，其键值在在线文本伴侣的“Intent 组成要素”一节给出的列表中。\n\n## Intent\
  \ 标志\n\n你可以通过调用以下方式来设置特殊的意图处理标志：\n\n```\nintent.flags = Intent. or Intent. or ...\n\
  ```\n\n这些标志大多指定了 Android 操作系统如何处理该 `Intent`。具体来说，形式为 `FLAG_ACTIVITY_*` 的标志针对由 `Context.startActivity(..)`\
  \ 调用的 Activity，而像 `FLAG_RECEIVER_*` 这样的标志则用于 `Context.sendBroadCast(...)`。在线文本伴侣中“Intent\
  \ 组成要素”一节的表格显示了详细信息。\n\n## 系统意图过滤器\n\n系统应用，即你购买智能手机后安装的应用，拥有意图过滤器，你可以从自己的应用中调用它们。不幸的是，猜测如何调用系统应用的\
  \ Activity 并不总是那么容易，而且相关的文档也很难找到。一个补救措施是从它们的 APK 文件中提取这些信息。对于 API 级别 26，这项工作已经为你完成，结果列在在线文本伴侣的“系统意图过滤器”一节中。\n\
  \n例如，假设你想发送一封电子邮件。查看在线文本伴侣中的系统意图表，你可以在“PrebuiltGmail”的表格中找到许多动作。应该使用哪一个呢？嗯，首先，通用接口不应该有太多的输入参数。其次，我们也可以查看动作名称来找到看似合适的动作。一个很有希望的候选者是\
  \ \"SEND_TO\" 动作：它显然只需要一个 \"mailto:\" 数据规范。碰巧的是，这正是我们实际需要的动作。使用精心构造的 \"mailto:...\"\
  \ URL 可以指定更多的收件人、抄送和密送收件人、主题，甚至邮件正文。但是，你也可以直接使用 \"mailto:master@universe.com\"，并通过使用额外字段来添加收件人、正文等。请参阅“Intent\
  \ 额外数据”一节。因此，要发送电子邮件，并可能让用户在设备上安装的多个电子邮件应用中进行选择，可以编写：\n\n```\nval intent = Intent(Intent.ACTION_SENDTO).apply\
  \ {\n    data = Uri.parse(\"mailto:master@universe.com\")\n    putExtra(Intent.EXTRA_SUBJECT,\
  \ \"Subject\")\n    putExtra(Intent.EXTRA_TEXT, \"Body\")\n}\nstartActivity(intent)\n\
  ```\n\n\n```kotlin\nval emailIntent: Intent = Intent(Intent.ACTION_SENDTO,\n   \
  \ Uri.fromParts(\"mailto\", \"abc@gmail.com\", null))\nemailIntent.putExtra(Intent.EXTRA_SUBJECT,\
  \ \"Subject\")\nemailIntent.putExtra(Intent.EXTRA_TEXT, \"Body\")\nstartActivity(Intent.createChooser(\n\
  \    emailIntent, \"发送邮件...\"))\n// 或者 startActivity(emailIntent)，如果你想使用\n// 标准选择器（如果只有一个可能的接收者，则可能不显示选择器）。\n\
  ```\n\n**注意**\n\n接收应用自行决定如何处理 Intent URI 和附加数据。设计糟糕的邮件客户端可能根本不允许指定邮件头数据。为安全起见，你可能需要将所有的头数据同时添加到“mailto:”URI\
  \ *和*附加数据中。\n\n## Activity 生命周期\n\nActivity 有一个生命周期，与传统的桌面应用程序相反，它们有意地可能被 Android\
  \ 操作系统随时终止。因此，作为开发者，你需要采取特殊预防措施来确保应用的稳定性。更准确地说，一个活动会处于以下状态之一：\n\n-   **已关闭**：Activity\
  \ 不可见且不处理任何任务。但包含该 Activity 的应用可能仍然存活，因为它有其他组件在运行。\n-   **已创建**：该 Activity 可能是主\
  \ Activity 并由用户或其他组件启动，或者它是一个非主 Activity，由同一应用或满足安全考虑的其他应用中的其他组件启动。此外，当你翻转屏幕且应用需要用不同屏幕特性重建时，也会发生\
  \ Activity 创建。在创建过程中，会调用回调方法 `onCreate()`。你必须实现此方法，因为在此处需要构建 GUI。你也可以使用此回调方法启动或连接服务，或提供内容提供者数据。你可以使用\
  \ API 来*准备*播放音乐、操作相机或执行应用设计的任何其他功能。这也是一个初始化应用所需的数据库或其他数据存储的好地方。\n-   **已启动**：一旦创建完成，或者在停止后重新启动的情况下——参见下文——Activity\
  \ 将进入*已启动*状态。在此状态下，Activity 即将对用户可见。在启动过程中，会调用回调方法 `onStart()`。这是启动广播接收器、启动服务以及重建当\
  \ Activity 进入停止状态时你退出的内部状态和进程的好地方——参见下文。\n-   **已恢复**：在即将对用户可见之前，Activity 会经历恢复过程。在此过程中，会调用回调\
  \ `onResume()`。\n-   **运行中**：Activity 完全可见，用户可以与其交互。此状态紧接在恢复过程之后。\n-   **已暂停**：Activity\
  \ 失去焦点，但仍至少部分可见。例如，当用户点击“返回”或“概览”按钮时，就会失去焦点。Activity 可能继续向 UI 发送更新或继续产生声音，但在大多数情况下，Activity\
  \ 将进入已停止状态——参见下文。在暂停过程中，会调用 `onPause()` 回调。暂停状态之后是已停止状态或已恢复状态。\n-   **已停止**：Activity\
  \ 将对用户不可见。它稍后可能会重新启动或销毁并从活动进程列表中移除。在停止过程中，会调用 `onStop()` 回调。停止之后要么是销毁要么是启动。例如，你可以在此处停止你在\
  \ `onStart()` 中启动的服务。\n-   **已销毁**：Activity 被移除。会调用回调 `onDestroy()`，你应该实现它并在其中执行所有操作以释放资源和执行其他清理操作。\n\
  \nActivity 状态之间可能的转换列于表 3-1 中，并在图 3-1 中说明。\n\n![](img/463716_2_En_3_Fig1_HTML.png)\n\
  \n一个 Activity 状态转换流程图，包含 Activity 启动、Activity 存在、Activity 可见、Activity 部分可见和 Activity\
  \ 消失等元素。\n\n**图 3-1** Activity 状态转换\n\n**表 3-1** Activity 状态转换\n\n| 来自       | 前往\
  \       | 描述                                                       | 实现        \
  \                                                                              \
  \                                                   |\n| :--------- | :---------\
  \ | :--------------------------------------------------------- | :-------------------------------------------------------------------------------------------------------------------------------------------\
  \ |\n| 已关闭     | 已创建     | Activity 首次被调用或在销毁后被调用。                        | `onCreate()`:\
  \ 调用 `super.onCreate()`，准备 UI，并启动服务。                                           \
  \                                          |\n| 已创建     | 已启动     | Activity 在创建后启动。\
  \                                      | `onStart()`: 你可以在此处启动仅在 Activity 可见时才需要的服务。\
  \                                                                              \
  \   |\n| `已启动`   | `已恢复`   | `已恢复状态自动跟随已启动状态。`                             | `onResume()`\
  \                                                                              \
  \                                                   |\n| 已恢复     | 运行中     | 运行中状态自动跟随已恢复状态。\
  \                             | 此处发生 Activity 的功能，包括 UI 活动。                    \
  \                                                                              \
  \       |\n| `运行中`   | `已暂停`   | `Activity 失去焦点，因为用户点击了“返回”或“概览”按钮。`   | `onPause()`\
  \                                                                              \
  \                                                    |\n| `已暂停`   | `已恢复`   | `Activity\
  \ 尚未停止，用户导航回该 Activity。`                | `onResume()`                         \
  \                                                                              \
  \                          |\n| 已暂停     | 已停止     | Activity 将对用户不可见，例如，因为另一个 Activity\
  \ 启动了。    | `onStop()`: 你可以在此处停止仅在 Activity 可见时才需要的服务。                         \
  \                                                         |\n| 已停止     | 已启动   \
  \  | 已停止的 Activity 被重新启动。                               | `onStart()`: 你可以在此处启动仅在\
  \ Activity 可见时才需要的服务。                                                          \
  \                       |\n| 已停止     | 已销毁     | 已停止的 Activity 被移除。            \
  \                      | `onDestroy()`: 释放所有资源，进行清理，并停止在 `onCreate()` 中启动的服务。  \
  \                                                                    |\n\n## 在 Activity\
  \ 中保存状态\n\n我们几乎过分强调了你需要采取预防措施，以确保你的应用在被 Android 操作系统强制停止时能以良好方式重新启动。现在我们提供一个关于如何做到这一点的建议。\n\
  \n查看 Activity 的生命周期——参见“Activity 生命周期”一节——我们可以看到，一个即将被 Android 操作系统终止的 Activity\
  \ 会调用 `onStop()` 方法。但我们还有两个尚未提及的回调。它们名为 `onSaveInstanceState()` 和 `onRestoreInstanceState()`，每当\
  \ Android 决定需要保存或恢复 Activity 的数据时，就会调用它们。这与 `onStart()` 和 `onStop()` 不同，因为有时不需要保存状态。例如，如果一个\
  \ Activity 不会被销毁而只是暂停，状态无论如何都会保持，`onSaveInstanceState()` 和 `onRestoreInstanceState()`\
  \ 将不会被调用。\n\nAndroid 在这方面已经帮了我们：`onSaveInstanceState()` 和 `onRestoreInstanceState()`\
  \ 的默认实现已经保存并恢复了具有 ID 的 UI 元素。因此，如果这就是你所需要的，你无需做任何事情。当然，你的 Activity 可能更复杂，并且可能包含你需要保留的其他字段。在这种情况下，你可以重写\
  \ `onSaveInstanceState()` 和 `onRestoreInstanceState()`。请确保你调用了父类的方法。否则，你必须自己处理所有\
  \ UI 元素：\n\n\n```kotlin\noverride fun onSaveInstanceState(outState: Bundle?) {\n\
  \    super.onSaveInstanceState(outState)\n    // 在此处将你自己的数据添加到 Bundle 中……\n    //\
  \ 你可以使用这里提供的 put* 方法之一\n    // 或编写你自己的 Parcelable 类型\n}\n\noverride fun onRestoreInstanceState(savedInstanceState:\
  \ Bundle?) {\n    super.onRestoreInstanceState(savedInstanceState)\n    // 在此处从\
  \ Bundle 还原你自己的数据……\n    // 使用这里提供的 get* 方法之一\n}\n```\n\n请注意，保存的状态也会传递到 `onCreate()`\
  \ 回调中，因此你可以自行决定是使用 `onRestoreInstanceState()` 还是 `onCreate()` 方法来恢复状态。\n\n在其他情况下，用于保存和恢复状态的标准机制可能无法满足你的需求。例如，它无法在停止应用时保留数据。在这种情况下，`onSaveInstanceState()`\
  \ 不会被调用。如果你也需要在此类情况下保留数据，可以在 `onDestroy()` 中将应用数据保存到数据库，并在 `onCreate()` 回调中读取该数据库。请参阅第\
  \ 8 章的“数据库”部分。\n\n## 服务\n\n服务是那些没有用户界面（状态栏中的通知或 Toast 除外）的组件，且概念上与长时间运行的进程密切相关。服务可以由应用启动，也可以被应用绑定，或者同时进行这两种操作。\n\
  \n服务分为两种：前台服务和后台服务。乍看之下，“前台服务”这个说法似乎有些矛盾，因为很多人倾向于告诉你“服务在后台运行”，但前台服务确实存在，并且区分前台服务和后台服务至关重要，因为它们的行为不同。\n\
  \n> **注意**\n> 不要将服务误解为用于运行所有后台计算任务（即不干扰 GUI 活动）的构造。如果你需要一个不干扰 GUI，但在应用不活动时也无法运行，且不被应用外部使用的进程，请考虑使用额外的线程。请参阅第\
  \ 11 章。\n\n完全理解服务并非易事，尤其是在不同 Android 版本之间存在显著差异的情况下。虽然本章旨在为你提供概述并展示一些细节层面的提示，但它无法涵盖服务开发的所有方面。因此，建议你同时查阅在线文档：[`https://developer.android.com/guide/components/services`](https://developer.android.com/guide/components/services)。\n\
  \n### 前台服务\n\n前台服务的内部功能因 Android 版本而异。在 Android 8.0 或 API 级别 26 之前，前台服务只是在状态栏有一个条目的后台服务，操作系统如何处理它们没有严格的影响；而在\
  \ Android 8.0 或 API 级别 26 之后，前台服务表现出特殊的行为，并得到 Android 操作系统的优先关注，这使它们不太可能因为资源短缺而被终止。具体来说：\n\
  \n*   **Android 8.0 或 API 级别 26 之前的前台服务** 只是那些在状态栏中显示通知条目的服务。需要使用服务的客户端组件并不知道启动的服务是否是前台服务；它只是通过\
  \ `startService(intent)` 启动服务。请参阅第 13 章。\n\n*   **从 Android 8.0 或 API 级别 26 开始的前台服务**\
  \ 以用户能感知到的方式运行。它们*必须*通过状态栏中的通知来与操作系统交互。客户端组件通过调用 `startForegroundService(intent)`\
  \ 显式启动前台服务，并且服务本身必须在几秒钟内通过调用 `startForeground(notificationId, notification)` 明确告知\
  \ Android 操作系统它希望作为前台服务运行。\n\n前台服务一个值得注意的生命周期特性是，它因资源短缺而被 Android 终止的可能性较小。然而，文档对此并不精确。有时你会读到“不会被终止”，有时是“不太可能被终止”。此外，Android\
  \ 处理此类问题的方式可能会随着新版本而改变。作为一般经验法则，你应该非常保守并做好最坏的打算。在这种情况下，应理解为“不太可能被终止”，并在你的应用正在执行某些工作而服务停止运行时采取预防措施。\n\
  \n"
- '# 后台服务


  后台服务在后台运行，也就是说，它们不会在状态栏中显示条目。不过，它们被允许使用 Toast 向用户发送简短的通知消息。与前台服务相比，后台服务更为脆弱，因为 Android
  期望它们与用户活动的关联更松散，因此在资源短缺时更容易决定终止它们。


  从 Android 8.0（API 级别 26）开始，以旧方式实例化后台服务受到了一些限制，并且建议转向使用 JobScheduler 方法。当以下情况均不成立时，运行在
  Android 8.0 或更高版本上的应用被视为以后台服务的形式运行：


  *   该应用有一个可见的活动，当前处于活动或暂停状态。

  *   该应用有一个前台服务，即在其运行期间调用了 `startForeground()` 的服务。

  *   另一个前台应用正在连接到它，无论是通过使用它的某个服务还是将其用作内容提供者。


  一旦 Android 8.0（或更高版本）的应用作为后台应用启动或切换为后台应用，在它被视为 *空闲* 之前，会有一个几分钟的时间窗口。一旦 *空闲*，应用的后台服务就会被停止。作为例外，如果后台应用处理用户可见的任务，例如处理
  Firebase Cloud Messaging (FCM) 消息、接收广播（如 SMS 或 MMS 消息）、执行来自通知的 `PendingIntent`（一个由其他应用以原始应用权限执行的
  Intent）或启动一个 `VpnService`，则该应用会进入 *白名单*，并被允许执行后台服务。


  从 Android 8.0 开始，以前通过执行后台作业完成的许多事情，现在被认为适合由 JobScheduler API 处理——请参阅第 8 章。


  ### 声明服务


  服务需在应用的 `AndroidManifest.xml` 文件中声明，如下所示：


  可用的标志请参见表 4-1。


  **表 4-1** 服务的清单标志


  | 名称 | 描述 |

  |------|------|

  | `android:description` | 指向服务描述的资源 ID。建议你使用它，因为用户可以终止服务，但如果你告诉他们你的服务是做什么的，就不太可能发生这种情况。
  |

  | `android:directBootAware` | 其值为 `true` 或 `false`。默认值为 `false`。如果为 `true`，即使设备重启后尚未解锁，该服务也可以运行。直接启动模式是在
  Android 7.0 或 API 级别 24 中引入的。请注意，支持直接启动模式的服务必须将其数据存储在设备保护存储中。 |




  '
- '# Android 服务属性


  ## `android:enabled`

  取值为 `true` 或 `false`。默认值为 `true`。若设为 `false`，则服务将被有效禁用。通常情况下，你不会为生产环境中的服务将其设置为 `false`。


  ## `android:exported`

  取值为 `true` 或 `false`。表示其他应用是否可以使用该服务。如果没有定义 intent 过滤器，默认值为 `false`，否则为 `true`。intent
  过滤器的存在暗示了外部使用场景，因此有此区分。


  ## `android:icon`

  图标的资源 ID。默认值为应用的图标。


  ## `android:isolatedProcess`

  取值为 `true` 或 `false`。默认值为 `false`。若设为 `true`，服务将无法通过常规途径与系统通信，只能通过服务方法进行交互。使用此标记通常是个好主意，但在大多数情况下，你的服务需要与系统通信，因此除非服务是完全自包含的，否则必须将其保留为
  `false`。


  ## `android:foregroundServiceType`

  取值可为以下之一：`"camera"`、`"connectedDevice"`、`"dataSync"`、`"location"`、`"mediaPlayback"`、`"mediaProjection"`、`"microphone"`、`"phoneCall"`。不同的前台服务类型会导致
  Android 系统采取不同的行为。如果通过此属性明确指定前台服务的类型，可以改善用户体验。


  ## `android:label`

  向用户显示的服务标签。默认值为应用的标签。


  ## `android:name`

  服务类的名称。如果以点号（`.`）作为首字符，系统会自动在其前面补上 `manifest` 元素中指定的包名。


  ## `android:permission`

  与此服务关联的权限名称。默认值为 `application` 元素中的 `permission` 属性。如果两处均未指定，服务将不受保护。


  ## `android:process`

  服务所属进程的名称。如果指定了此属性，服务将在其自己的进程中运行。若以冒号（`:`）开头，则该进程将为应用私有；若以小写字母开头，则生成的进程将是全局进程。可能存在安全限制。


  另请参阅：[`https://developer.android.com/guide/topics/manifest/service-element`](https://developer.android.com/guide/topics/manifest/service-element)


  ## `<service>` 元素的子元素


  `<service>` 元素可以包含以下子元素：


  - **`intent-filter`**：零个、一个或多个 intent 过滤器。相关描述见第 3 章“Intent 过滤器”一节。

  - **`meta-data`**：任意名称-值对，格式为 `<meta-data android:name="..." android:resource="..."
  android:value="..." />`。可以有多个此类元素，它们会被存储到一个 `android.os.Bundle` 元素中，可通过 `PackageItemInfo.metaData`
  访问。


  从 Android 9（API 级别 28）开始，前台服务必须在 `AndroidManifest.xml` 文件中请求额外的权限：


  ```xml

  <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />

  ```


  ## 进程理解


  作为一名专业开发者，理解 *进程* 的实际含义以及 Android 操作系统如何处理它至关重要；请参阅清单中的 `android:service` 标记以控制进程。这可能很棘手，因为进程的内部机制往往会随着新
  Android 版本而变化，如果你浏览博客，会发现它们似乎每分钟都在变化。事实上，*进程* 是一个计算单元，由 Android 操作系统启动以执行计算任务。当
  Android 判定系统资源不足时，进程也会被终止。如果你决定停止使用某个特定应用，这并不自动意味着相应的一个或多个进程会被杀死。当你第一次启动一个应用，并且没有明确指示它使用另一个应用的进程时，系统一定会创建一个新进程并启动它。在后续的计算任务中，现有的进程会被复用，或者根据它们各自的设置及相互关系启动新的进程。


  如果没有任何预防措施，由应用启动的自身服务将在该应用的进程中运行。这意味着服务可能与应用一同存在，并不可避免地随之消亡。服务需要被启动才能真正存活，但当它运行在应用的主进程中时，它会随应用的终止而终止。这自动意味着服务的资源需求会计入应用的资源需求。在以前资源更为稀缺的时代，这一点比现代设备更强大时更为重要，但了解服务是否需要大量资源仍然是有益的：当出现某种资源短缺时，是杀整个应用还是只杀那个贪心的服务来释放资源，结果会截然不同。


  然而，如果你通过清单中的 `android:service` 条目告诉服务使用自己的进程，Android 操作系统就可以独立地管理服务的生命周期。你必须做出决定：要么让服务使用自己的进程，并接受单个应用可能出现进程泛滥的情况；要么让它们运行在同一个进程中，从而更紧密地耦合生命周期。


  让多个计算单元运行在同一个进程中还会带来另一个后果：它们不会并发运行！这对 GUI 活动和进程来说至关重要，因为我们知道 GUI 活动必须快速响应以避免阻塞用户交互，而服务在概念上绑定于长时间运行的计算任务。解决此困境的方法是使用异步任务或线程。我们将在第
  11 章中进一步讨论并发问题。


  ## 设备保护存储


  如果服务需要访问 *设备保护存储*（例如在由 `android:directBootAware` 标记触发的 *Direct Boot* 模式下），则需要访问一个特殊的上下文：


  ```kotlin

  val directBootContext: Context = appContext.createDeviceProtectedStorageContext()

  // 例如，从那里打开一个文件：

  val inStream: FileInputStream = directBootContext.openFileInput(filename)

  ```


  通常情况下不应使用此上下文，仅适用于需要在启动后立即激活的特殊服务。


  ## 服务类


  服务必须继承 `android.app.Service` 类或其子类，并且必须像前面描述的那样在应用的 `AndroidManifest.xml` 文件中进行声明。


  `android.app.Service` 的接口方法在在线配套文本的“Intent 组成部分”一节中进行了描述。


  请注意，要停止通过 `startService()` 或 `startForegroundService()` 显式启动的服务，有两种方式：服务自身通过调用 `stopSelf()`
  或 `stopSelfResult()` 停止，或者从外部通过调用 `stopService()` 停止。


  ## 启动服务


  可以从任何继承自 `android.content.Context` 或有权访问 `Context` 的组件（例如 Activity、其他 Service、BroadcastReceiver
  和 ContentProvider）显式启动服务。




