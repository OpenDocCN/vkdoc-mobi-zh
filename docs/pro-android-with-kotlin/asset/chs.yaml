- "# 访问系统 Content Provider\n\nAndroid 操作系统（包括预装的应用）提供了多个内容提供者组件。在在线 API 文档中，内容提供者的契约类可以在\
  \ “android.provider/Classes” 下找到。以下章节总结了它们是什么以及如何访问它们。\n\n## BlockedNumberContract\n\
  \n公开一个包含被阻止号码的表。只有系统、默认电话应用、默认短信应用和运营商应用可以访问此表——但 `canCurrentUserBlockNumbers()`\
  \ 方法除外，任何应用都可以调用它。使用示例：\n\n```\nval values = ContentValues()\nvalues.put(BlockedNumbers.COLUMN_ORIGINAL_NUMBER,\n\
  \    \"1234567890\")\nUri uri = contentResolver.insert(\n    BlockedNumbers.CONTENT_URI,\
  \ values)\n```\n\n## CalendarContract\n\n一个相当复杂的内容提供者，包含多个表。作为示例，我们访问日历列表并添加一个事件：\n\
  \n\n\n```kotlin\nval havePermissions =\n    ContextCompat.checkSelfPermission(this,\n\
  \        Manifest.permission.WRITE_CALENDAR)\n        == PackageManager.PERMISSION_GRANTED\n\
  \        && ContextCompat.checkSelfPermission(this,\n        Manifest.permission.READ_CALENDAR)\n\
  \        == PackageManager.PERMISSION_GRANTED\nif(!havePermissions) {\n    // 获取权限...\n\
  } else {\n    data class CalEntry(val name: String, val id: String)\n    val calendars\
  \ = HashMap()\n    val uri = CalendarContract.Calendars.CONTENT_URI\n    val cursor\
  \ = contentResolver.query(\n        uri, null, null, null, null)\n    cursor.moveToFirst()\n\
  \    while (!cursor.isAfterLast) {\n        val calName = cursor.getString(\n  \
  \          cursor.getColumnIndex(\n                CalendarContract.Calendars.NAME))\n\
  \        val calId = cursor.getString(\n            cursor.getColumnIndex(\n   \
  \             CalendarContract.Calendars._ID))\n        calendars[calName] = CalEntry(calName,\
  \ calId)\n        cursor.moveToNext()\n    }\n    Log.e(\"LOG\", calendars.toString())\n\
  \    val calId = \"4\" // 你应从映射中获取合适的条目！\n    val year = 2018\n    val month = Calendar.AUGUST\n\
  \    val dayInt = 27\n    val hour = 8\n    val minute = 30\n    val beginTime =\
  \ Calendar.getInstance()\n    beginTime.set(year, month, dayInt, hour, minute)\n\
  \    val event = ContentValues()\n    event.put(CalendarContract.Events.CALENDAR_ID,\n\
  \        calId)\n    event.put(CalendarContract.Events.TITLE,\n        \"MyEvent\"\
  )\n    event.put(CalendarContract.Events.DESCRIPTION,\n        \"This is test event\"\
  )\n    event.put(CalendarContract.Events.EVENT_LOCATION,\n        \"School\")\n\
  \    event.put(CalendarContract.Events.DTSTART,\n        beginTime.getTimeInMillis())\n\
  \    event.put(CalendarContract.Events.DTEND,\n        beginTime.getTimeInMillis())\n\
  \    event.put(CalendarContract.Events.ALL_DAY,\n        0)\n    event.put(CalendarContract.Events.RRULE,\n\
  \        \"FREQ=YEARLY\")\n    event.put(CalendarContract.Events.EVENT_TIMEZONE,\n\
  \        \"Germany\")\n    val retUri = contentResolver.insert(\n        CalendarContract.Events.CONTENT_URI,\
  \ event)\n    Log.e(\"LOG\", retUri.toString())\n}\n```\n\n我们并未实现权限查询——权限的详细说明见第\
  \ 7 章。\n\n## 通话记录\n\n这是一个存储已拨和已接电话的表格。下面展示一个查询该表格的示例：\n\n```kotlin\nval havePermissions\
  \ =\n    ContextCompat.checkSelfPermission(this,\n        Manifest.permission.READ_CALL_LOG)\n\
  \        == PackageManager.PERMISSION_GRANTED\n        && ContextCompat.checkSelfPermission(this,\n\
  \        Manifest.permission.WRITE_CALL_LOG)\n        == PackageManager.PERMISSION_GRANTED\n\
  if(!havePermissions) {\n    // 获取权限...\n} else {\n    val uri = CallLog.Calls.CONTENT_URI\n\
  \    val cursor = contentResolver.query(\n        uri, null, null, null, null)\n\
  \    cursor.moveToFirst()\n    while (!cursor.isAfterLast) {\n        Log.e(\"LOG\"\
  , \"新条目:\")\n        for(name in cursor.columnNames) {\n            val v = cursor.getString(\n\
  \                cursor.getColumnIndex(name))\n            Log.e(\"LOG\",\"  > \"\
  \ + name + \" = \" + v)\n        }\n        cursor.moveToNext()\n    }\n}\n```\n\
  \n我们并未实现权限查询——权限的详细说明见第 7 章。\n\n表格的列信息列在表 6-3 中。\n\n**表 6-3**  \n通话记录表格列\n\n| 列名\
  \ | 描述 |\n|------|-------------|\n|`date`| 通话日期，以自纪元起的毫秒数表示。|\n|`transcription`|\
  \ 通话或语音邮件的转录文本。|\n|`photo_id`| 关联照片的缓存照片 ID。|\n|`subscription_component_name`| 用于拨打或接听电话的账户组件名称。|\n\
  |`type`| 通话类型。可选值（对应`CallLog.Calls`中的常量名）：`INCOMING_TYPE`、`OUTGOING_TYPE`、`MISSED_TYPE`、`VOICEMAIL_TYPE`、`REJECTED_TYPE`、`BLOCKED_TYPE`、`ANSWERED_EXTERNALLY_TYPE`。|\n\
  |`geocoded_location`| 此通话关联号码的地理编码位置。|\n|`presentation`| 网络设置的号码显示规则。可选值（对应`CallLog.Calls`中的常量名）：`PRESENTATION_ALLOWED`、`PRESENTATION_RESTRICTED`、`PRESENTATION_UNKNOWN`、`PRESENTATION_PAYPHONE`。|\n\
  |`duration`| 通话持续时间（秒）。|\n|`subscription_id`| 用于拨打或接听电话的账户标识符。|\n|`is_read`| 用户是否已读取或处理此条目（0\
  \ = 否，1 = 是）。|\n|`number`| 用户输入的原始电话号码。|\n\n\n\n`features` | 位掩码，描述通话的特性，由（`CallLog.Calls`\
  \ 中的常量名称）构成：`FEATURES_HD_CALL`：高清通话。`FEATURES_PULLED_EXTERNALLY`：通话被外部拉取。`FEATURES_VIDEO`：视频通话。`FEATURES_WIFI`：WIFI\
  \ 通话。 |\n\n`voicemail_uri` | 语音邮件条目的 URI（如果适用）。 |\n\n`normalized_number` | 电话号码的规范化（E164）缓存版本（如果存在）。\
  \ |\n\n`via_number` | 对于来电，表示接听该通话的辅助线路号码。当一张 SIM 卡关联了多个电话号码时，via number 指示呼叫的是\
  \ SIM 卡关联的哪个号码。 |\n\n`matched_number` | 与此条目匹配的联系人的缓存电话号码（如果存在）。 |\n\n`last_modified`\
  \ | 该行最后被插入、更新或标记为删除的日期。单位是自纪元以来的毫秒数。只读。 |\n\n`new` | 通话是否已被确认（0 = 否，1 = 是）。 |\n\
  \n`numberlabel` | 电话号码关联的自定义号码类型的缓存号码标签（如果存在）。 |\n\n`lookup_uri` | 用于查找与该电话号码关联的联系人的缓存\
  \ URI（如果存在）。 |\n\n`photo_uri` | 与该电话号码关联的图片的缓存 URI（如果存在）。 |\n\n`data_usage` | 通话的数据使用量，以字节为单位。\
  \ |\n\n`phone_account_address` | 未记录。 |\n\n`formatted_number` | 缓存的电话号码，根据用户拨打或接听通话时所处国家的规则格式化。\
  \ |\n\n`add_for_all_users` | 未记录。 |\n\n`numbertype` | 与电话号码关联的缓存号码类型（如果适用）。取值为（`CallLog.Calls`\
  \ 中的常量名称）：`INCOMING_TYPE` `OUTGOING_TYPE` `MISSED_TYPE` `VOICEMAIL_TYPE` `REJECTED_TYPE`\
  \ `BLOCKED_TYPE` `ANSWERED_EXTERNALLY_TYPE` |\n\n`countryiso` | 用户接收或拨打电话所在国家的 ISO\
  \ 3166-1 二位字母国家代码。 |\n\n`name` | 与电话号码关联的缓存名称（如果存在）。 |\n\n`post_dial_digits` | 拨号号码的后拨号部分。\
  \ |\n\n`transcription_state` | 未记录。 |\n\n`_id` | 表条目的（技术性）ID。 |\n\n## `ContactsContract`\n\
  \n这是一个描述电话联系人的复杂协议。联系信息存储在一个三层数据模型中：\n\n* **`ContactsContract.Data`** – 任何类型的个人数据。\n\
  * **`ContactsContract.RawContacts`** – 描述一个人的数据集。\n* **`ContactsContract.Contacts`**\
  \ – 对一个人的聚合视图，可能关联到 `RawContacts` 表中的多行。由于其聚合特性，它只能部分写入。\n\n还有更多与协议相关的表，作为 `ContactsContract`\
  \ 的内部类进行了描述。为了让你能快速上手，我们不会解释联系人内容提供器的所有可能用例，而是直接提供代码来列出前面提到的三个主要表的内容，展示创建一个新联系人在这些表中写入的内容，除此之外，请参考\
  \ `ContactsContract` 类的在线文档。要列出这三个表的内容，请使用：\n\n```\nfun showTable(tbl:Uri) {\n \
  \   Log.e(\"LOG\", \"##################################\")\n    Log.e(\"LOG\", tbl.toString())\n\
  \    val cursor = contentResolver.query(\n        tbl, null, null, null, null)\n\
  \    cursor.moveToFirst()\n    while (!cursor.isAfterLast) {\n        Log.e(\"LOG\"\
  , \"New entry:\")\n        for(name in cursor.columnNames) {\n            val v\
  \ = cursor.getString(\n                cursor.getColumnIndex(name))\n          \
  \  Log.e(\"LOG\",\"  > \" + name + \" = \" + v)\n        }\n        cursor.moveToNext()\n\
  \    }\n}\n...\nshowTable(ContactsContract.Contacts.CONTENT_URI)\nshowTable(ContactsContract.RawContacts.CONTENT_URI)\n\
  showTable(ContactsContract.Data.CONTENT_URI)\n```\n\n如果你使用 Android 预装的通讯录应用创建一个新联系人，在\
  \ `Contacts` 视图表中，你会找到以下新条目（仅显示重要列）：\n\n```\n_id = 1\ndisplay_name_alt = Mayer,\
  \ Hugo\nsort_key_alt = Mayer, Hugo\nhas_phone_number = 1\ncontact_last_updated_timestamp\
  \ = 1518451432615\ndisplay_name = Hugo Mayer\nsort_key = Hugo Mayer\ntimes_contacted\
  \ = 0\nname_raw_contact_id = 1\n```\n\n在 `RawContacts` 表中，作为关联条目，你将找到如下内容（以及其他）：\n\
  \n```\n_id = 1\naccount_type = com.google\ncontact_id = 1\ndisplay_name_alt = Mayer,\
  \ Hugo\nsort_key_alt = Mayer, Hugo\naccount_name = pmspaeth1111@gmail.com\ndisplay_name\
  \ = Hugo Mayer\nsort_key = Hugo Mayer\ntimes_contacted = 0\naccount_type_and_data_set\
  \ = com.google\n```\n\n显然，你也会在之前列出的 `Contacts` 视图中找到这些条目中的许多。在 `Data` 表中关联了零到多个条目（仅显示最重要的部分）：\n\
  \n```\nEntry:\n_id = 3\nmimetype = vnd.android.cursor.item/phone_v2\nraw_contact_id\
  \ = 1\ncontact_id = 1\ndata1 = (012) 345-6789\nEntry:\n_id = 4\nmimetype = vnd.android.cursor.item/phone_v2\n\
  raw_contact_id = 1\ncontact_id = 1\ndata1 = (098) 765-4321\nEntry:\n_id = 5\nmimetype\
  \ = vnd.android.cursor.item/email_v2\nraw_contact_id = 1\ncontact_id = 1\ndata1\
  \ = null\nEntry:\n_id = 6\nmimetype = vnd.android.cursor.item/name\nraw_contact_id\
  \ = 1\ncontact_id = 1\ndata3 = Mayer\ndata2 = Hugo\ndata1 = Hugo Mayer\nEntry:\n\
  _id = 7\nmimetype = vnd.android.cursor.item/nickname\nraw_contact_id = 1\ncontact_id\
  \ = 1\ndata1 = null\nEntry:\n_id = 8\nmimetype = vnd.android.cursor.item/note\n\
  raw_contact_id = 1\ncontact_id = 1\ndata1 = null\n```\n\n你可以看到 `Data` 表中的行对应于图形界面中的编辑字段——你会看到两个电话号码、名和姓、无昵称和无电子邮件地址。\n\
  \n## `DocumentsContract`\n\n这与我们这里看到的其他协议的意义不同——它对应于 `android.provider.DocumentsProvider`，后者是\
  \ `android.content.ContentProvider` 的子类。我们将在接下来的“文档提供器”部分处理文档提供器。\n\n## `FontsContract`\n\
  \n这是一个处理可下载字体的协议，与内容提供器无关。\n\n### `MediaStore`\n\n媒体存储处理内部和外部存储设备上所有媒体相关文件的元数据。这包括音频文件、图像和视频。除此之外，它还以不区分用途的方式处理文件——这意味着媒体文件以及以任何方式与媒体文件相关的非媒体文件。根类\
  \ `android.provider.MediaStore` 本身不包含内容提供器特定的资产，但以下内部类包含：\n\n* **`MediaStore.Audio`**\
  \ – 音频文件。包含更多用于音乐专辑、艺术家、音频文件本身、流派和播放列表的内部类。\n* **`MediaStore.Images`** – 图像。\n*\
  \ **`MediaStore.Videos`** – 视频。\n* **`MediaStore.Files`** – 通用文件。\n\n你可以通过浏览在线 API\
  \ 文档来研究任何媒体存储表。对于你自己的实验，你可以从整体上研究这些表，方法是查找常量 `EXTERNAL_CONTENT_URI` 和 `INTERNAL_CONTENT_URI`，或者方法\
  \ `getContentUri()`，然后将它们传入我们之前使用的相同代码：\n\n```\nshowTable(MediaStore.Audio.Media.getContentUri(\n\
  \    \"internal\"))  //  \" + name + \" = \" + v)\n}\ncursor.moveToNext()\n}\n}\n\
  ```\n\n## `Settings`\n\n这是一个处理各种全局和系统级设置的内容提供器。以下是来自协议类的主要 URI 常量：\n\n* **`Settings.Global.CONTENT_URI`**\
  \ – 全局设置。所有条目都是三元组：\n    * `_id`\n    * `android.provider.Settings.NameValueTable.NAME`\n\
  \    * `android.provider.Settings.NameValueTable.VALUE`\n\n* **`Settings.System.CONTENT_URI`**\
  \ – 全局系统级设置。所有条目都是三元组：\n    * `_id`\n    * `android.provider.Settings.NameValueTable.NAME`\n\
  \    * `android.provider.Settings.NameValueTable.VALUE`\n\n* **`Settings.Secure.CONTENT_URI`**\
  \ – 安全系统设置——应用不允许修改它们。所有条目都是三元组：\n    * `_id`\n    * `android.provider.Settings.NameValueTable.NAME`\n\
  \    * `android.provider.Settings.NameValueTable.VALUE`\n\n\n\n"
- '# 探究 Android 设置表


  要探究这些表，请查阅 `android.provider.Settings` 的在线 API 文档。它展示并描述了所有可能的设置项。要列出完整的设置，你可以使用与之前用于
  `ContactsContract` 合约类相同的函数：


  ```

  showTable(Settings.Global.CONTENT_URI)

  showTable(Settings.System.CONTENT_URI)

  showTable(Settings.Secure.CONTENT_URI)

  ...

  fun showTable(tbl:Uri) {

  Log.e("LOG", "##################################")

  Log.e("LOG", tbl.toString())

  val cursor = contentResolver.query(

  tbl, null, null, null, null)

  cursor.moveToFirst()

  while (!cursor.isAfterLast) {

  Log.e("LOG", "New entry:")

  for(name in cursor.columnNames) {

  val v = cursor.getString(

  cursor.getColumnIndex(name))

  Log.e("LOG","  > " + name + " = " + v)

  }

  cursor.moveToNext()

  }

  }

  ```


  你的应用读取设置不需要特殊权限。但是，只有 `Global` 和 `System` 表才支持写入，并且你还需要一个特殊构造来获取权限：


  ```

  if(!Settings.System.canWrite(this)) {

  val intent = Intent(

  Settings.ACTION_MANAGE_WRITE_SETTINGS)

  intent.data = Uri.parse(

  "package:" + getPackageName())

  startActivity(intent)

  }

  ```


  通常你通过调用以下代码获取权限：


  ```

  ActivityCompat.requestPermissions(this,

  arrayOf(Manifest.permission.WRITE\_SETTINGS), 42)

  ```


  然而，对于设置权限，当前 Android 版本会立即拒绝此请求。因此你不能使用该方法，而需要像之前展示的那样调用 `Intent`。


  要访问特定条目，你同样可以使用合约类中的常量和方法：


  ```

  val uri = Settings.System.getUriFor(

  Settings.System.HAPTIC_FEEDBACK_ENABLED)

  Log.e("LOG", uri.toString())

  val feedbackEnabled = Settings.System.getInt(

  contentResolver,

  Settings.System.HAPTIC_FEEDBACK_ENABLED)

  Log.e("LOG", Integer.toString(feedbackEnabled))

  Settings.System.putInt(contentResolver,

  Settings.System.HAPTIC_FEEDBACK_ENABLED, 0)

  ```


  ### 注意事项


  虽然可以为特定设置获取单独的 URI，但你不应该使用 `ContentResolver.update()`、`ContentResolver.insert()`
  或 `ContentResolver.delete()` 方法来修改值。请改用合约类提供的方法。


  '
- '# SyncStateContract


  浏览器应用、联系人应用和日历应用使用此合约来帮助将用户数据与外部服务器同步。


  '
- '# UserDictionary


  这指的是一个内容提供者，它允许基于单词字典来管理和使用预测输入。从 API 级别 23 起，用户字典只能由 IME（即输入法编辑器）或拼写检查框架使用。对于现代应用，你不应尝试在其他地方使用它。因此，该合约仅起信息性作用。


  '
- '# VoicemailContract


  此合约允许访问与语音邮件提供商相关的信息。它主要由两个由内部类描述的表组成：


  *   **VoicemailContract.Status** – 语音邮件源应用使用此合约向系统报告其状态。

  *   **VoicemailContract.Voicemails** – 包含实际的语音邮件。


  你可以列出这些表的内容——例如，对于 `Voicemails` 表，编写：


  ```

  val uri = VoicemailContract.Voicemails.CONTENT_URI.

  buildUpon().

  appendQueryParameter(

  VoicemailContract.PARAM_KEY_SOURCE_PACKAGE,

  packageName)

  .build()

  showTable(uri)

  fun showTable(tbl:Uri) {

  Log.e("LOG", "####################################")

  Log.e("LOG", tbl.toString())

  val cursor = contentResolver.query(

  tbl, null, null, null, null)

  cursor.moveToFirst()

  while (!cursor.isAfterLast) {

  Log.e("LOG", "New entry:")

  for(name in cursor.columnNames) {

  val v = cursor.getString(

  cursor.getColumnIndex(name))

  Log.e("LOG","  > " + name + " = " + v)

  }

  cursor.moveToNext()

  }

  }

  ```


  添加 `VoicemailContract.PARAM_KEY_SOURCE_PACKAGE` URI 参数非常重要；否则，你将遇到安全异常。


  '
- '# 批量访问内容数据


  `android.content.ContentProvider` 类允许你的实现使用：


  ```

  applyBatch(

  operations: ArrayList):

  Array

  ```


  默认实现会遍历列表并按顺序执行每个操作，但你也可以重写该方法以使用你自己的逻辑。参数中提供的 `ContentProviderOperation` 对象描述了要执行的操作——可以是更新、删除或插入之一。为方便起见，该类提供了一个构建器，你可以像以下示例一样使用它：


  ```

  val oper:ContentProviderOperation =

  ContentProviderOperation.newInsert(uri)

  .withValue("key1", "val1")

  .withValue("key2", 42)

  .build()

  ```


  '
- "# 保护内容安全\n\n从你在 `AndroidManifest.xml` 中声明一个内容提供者并将其 `exported` 属性设置为 `true` 的那一刻起，其他应用就被允许访问该提供者暴露的完整内容。对于敏感信息，这可能不是你想要的。作为补救措施，为了对全部或部分内容施加限制，你可以向\
  \ `<provider>` 元素或其子元素添加与权限相关的属性。\n\n你基本上有以下几种选项：\n\n## 1. 通过单一标准保护所有内容\n\n为此，请使用\
  \ `<provider>` 的 `permission` 属性，如下所示：\n\n```\n<provider ... android:permission=\"\
  PERMISSION-NAME\" ... />\n```\n\n其中 `PERMISSION-NAME` 是一个系统权限或你在应用的 `<permission>`\
  \ 元素中定义的权限。如果这样做，提供者的完整内容仅对成功获取该特定权限的客户端可访问。更准确地说，任何读取或写入操作都要求客户端拥有此权限。如果你需要区分*读取*权限和*写入*权限，可以改用\
  \ `readPermission` 和 `writePermission` 属性。如果混合使用，更具体的属性优先。这意味着：\n\n*   `permission`\
  \ = A → `writePermission` = A, `readPermission` = A\n*   `permission` = A, `readPermission`\
  \ = B → `writePermission` = A, `readPermission` = B\n*   `permission` = A, `writePermission`\
  \ = B → `writePermission` = B, `readPermission` = A\n*   `permission` = A, `writePermission`\
  \ = B, `readPermission` = C → `writePermission` = B, `readPermission` = C\n\n##\
  \ 2. 保护特定的 URI 路径\n\n通过使用 `<provider>` 的 `<path-permission>` 子元素，你可以对特定的 URI 路径施加限制：\n\
  \n```\n<provider ...>\n    <path-permission android:path=\"...\" android:permission=\"\
  ...\" />\n</provider>\n```\n\n在 `*permission` 属性中，你指定权限名称和权限范围，正如之前在“通过单一标准保护所有内容”一节中描述的那样。对于路径规范，你只能使用三个可能的属性之一：`path`\
  \ 用于精确路径匹配，`pathPrefix` 用于匹配路径的开头，`pathPattern` 允许使用通配符：`X*` 表示零到多次出现的任意字符 `X`，`.*`\
  \ 表示零到多次出现的任意字符。由于你可以使用多个 `<path-permission>` 元素，你可以在内容提供者中构建非常细粒度的权限结构。\n\n## 3.\
  \ 权限豁免\n\n通过使用 `<provider>` 元素的 `grantUriPermission` 属性，你可以临时授予权限给由拥有该内容提供者的应用通过\
  \ `Intent` 调用的组件。如果你将 `grantUriPermission` 设置为 `true`，并且调用其他组件的 `Intent` 是借助以下方式构建的：\n\
  \n```\nintent.addFlags(\nIntent.FLAG_GRANT_READ_URI_PERMISSION)\n/*or*/\nintent.addFlags(\n\
  Intent.FLAG_GRANT_WRITE_URI_PERMISSION)\n/*or*/\nintent.addFlags(\nIntent.FLAG_GRANT_WRITE_URI_PERMISSION\
  \ and\nIntent.FLAG_GRANT_READ_URI_PERMISSION)\n```\n\n被调用的组件将拥有对提供者所有内容的完全访问权限。你也可以将\
  \ `grantUriPermission` 设置为 `false` 并添加子元素。\n\n\n\n"
- '# 为搜索框架提供内容


  Android *搜索框架*为用户提供了一项功能，即通过任何方式、使用任何数据源搜索其可用的任何数据。我们将在第 8 章的“搜索框架”一节中讨论该框架。目前需要了解的是，对于以下情况：


  - 近期查询建议

  - 自定义建议


  内容提供者扮演着重要角色。对于这两种情况，你需要提供特殊的内容提供者子类，并像其他内容提供者一样将它们添加到`AndroidManifest.xml`中。


  '
- "# 文档提供者\n\n文档提供者是*存储访问框架（SAF）*的一部分。它提供了以文档为中心的数据访问视图，并且还展示了文档目录的分层超级结构。\n\n> **注意**\n\
  > 存储访问框架（SAF）自 API 级别 19 开始引入。截至 2022 年中期，超过 99% 的活跃 Android 设备都支持该框架。\n\n文档提供者的主要思想是：你的应用程序提供对文档的访问（无论相应的数据存储在哪里），而不关心文档及其结构如何呈现给用户或其他应用程序。文档提供者的数据模型由一个到多个从根节点开始的树组成，子节点要么是文档，要么是构成子树的目录，这些子树中又包含其他目录和文档。因此，它类似于文件系统中的数据结构。\n\
  \n要开始使用文档提供者，你需要创建一个实现`android.provider.DocumentsProvider`的类，它本身就是`android.content.ContentProvider`的一个专门子类。作为最低要求，你必须实现以下方法：\n\
  \n## `override fun onCreate(): Boolean`\n\n使用此方法初始化文档提供者。由于它在应用的主线程上运行，因此不得在此执行耗时操作。但你可以准备对该提供者的数据访问。如果提供者加载成功，则返回`true`，否则返回`false`。\n\
  \n## `override fun queryRoots(projection: Array<out String>?): Cursor`\n\n此方法用于查询提供者数据结构的根节点。在许多情况下，数据将适合放入一个树中，因此你只需要提供一个根节点，但你可以根据需要设置任意多个根节点。`projection`参数可能呈现一个要包含在结果集中的列列表。这些列名与`DocumentsContract.Root`中的`COLUMN_`常量相同。它可以是`null`，意思是返回所有列。该方法必须返回最多包含以下字段的游标（此处显示的是`DocumentsContract.Root`中的常量名）：\n\
  \n- **`COLUMN_AVAILABLE_BYTES`**：（长整型）该根节点下的可用字节数。可选，可以为`null`表示“未知”。\n- **`COLUMN_CAPACITY_BYTES`**：（长整型）该根节点下树的总容量，以字节为单位。可以理解为文件系统的容量。可选，可以为`null`表示“未知”。\n\
  - **`COLUMN_DOCUMENT_ID`**：对应于该根节点的目录的 ID（字符串）。必填。\n- **`COLUMN_FLAGS`**：适用于根节点的标志（整型）。是（`DocumentsContract.Root`中的常量）的组合：\n\
  \  - `FLAG_LOCAL_ONLY`（仅限于设备本地，无需网络访问）\n  - `FLAG_SUPPORTS_CREATE`（根节点下至少有一个文档支持创建内容）\n\
  \  - `FLAG_SUPPORTS_RECENTS`（可查询根节点以显示最近更改的文档）\n  - `FLAG_SUPPORTS_SEARCH`（该树允许搜索文档）\n\
  - **`COLUMN_ICON`**：（整型）根节点的图标资源 ID。必填。\n- **`COLUMN_MIME_TYPES`**：（字符串）支持的 MIME\
  \ 类型。如果有多个，请使用换行符“\\n”作为分隔符。可选，可以为`null`表示支持所有 MIME 类型。\n- **`COLUMN_ROOT_ID`**：（字符串）根节点的唯一\
  \ ID。必填。\n- **`COLUMN_SUMMARY`**：（字符串）此根节点的摘要信息，可能会显示给用户。可选，可以为`null`表示“未知”。\n-\
  \ **`COLUMN_TITLE`**：（字符串）根节点的标题，可能会显示给用户。必填。\n\n如果这组根节点发生了变化，你必须使用`DocumentsContract.buildRootsUri`调用`ContentResolver.notifyChange`来通知系统。\n\
  \n## `override fun queryChildDocuments(parentDocumentId: String?, projection: Array<out\
  \ String>?, sortOrder: String?): Cursor`\n\n返回指定目录中包含的直接子文档和子目录。针对 API 级别 26 或更高版本的应用，应改为实现`fun\
  \ queryChildDocuments(parentDocumentId: String?, projection: Array<out String>?,\
  \ queryArgs: Bundle?): Cursor`，并在此方法中使用：\n\n```kotlin\noverride fun queryChildDocuments(\n\
  \    parentDocumentId: String?,\n    projection: Array<out String>?,\n    sortOrder:\
  \ String?): Cursor {\n    val bndl = Bundle()\n    bndl.putString(\n        ContentResolver.QUERY_ARG_SQL_SORT_ORDER,\n\
  \        sortOrder)\n    return queryChildDocuments(\n        parentDocumentId,\
  \ projection, bndl)\n}\n```\n\n## `override fun queryChildDocuments(parentDocumentId:\
  \ String?, projection: Array<out String>?, queryArgs: Bundle?): Cursor`\n\n返回指定目录中包含的直接子文档和子目录。bundle\
  \ 参数包含查询参数，键为：\n\n- `ContentResolver.QUERY_ARG_SQL_SELECTION`\n- `ContentResolver.QUERY_ARG_SQL_SELECTION_ARGS`\n\
  - `ContentResolver.QUERY_ARG_SQL_SORT_ORDER` 或 `ContentResolver.QUERY_ARG_SORT_COLUMNS`（后者是一个字符串数组）\n\
  \n`parentDocumentId` 是我们想要列出的目录的 ID，在 `projection` 中你可以指定应返回的列——使用 `DocumentsContract.Document`\
  \ 中的 `COLUMN_` 常量列表。或者传入 `null` 以返回所有列。生成的 `Cursor` 最多返回以下字段（键是 `DocumentsContract.Document`\
  \ 中的常量）：\n\n- **`COLUMN_DISPLAY_NAME`**：（字符串）文档的显示名称，用作显示给用户的主要标题。必填\n- **`COLUMN_DOCUMENT_ID`**：（字符串）文档的唯一\
  \ ID。必填\n- **`COLUMN_FLAGS`**：文档的标志。是（`DocumentsContract.Document` 中的常量名）的组合：\n\
  \  - `FLAG_SUPPORTS_WRITE`（支持写入）\n  - `FLAG_SUPPORTS_DELETE`（支持删除）\n  - `FLAG_SUPPORTS_THUMBNAIL`（支持缩略图表示）\n\
  \  - `FLAG_DIR_PREFERS_GRID`（对于目录，是否应以网格形式显示）\n  - `FLAG_DIR_PREFERS_LAST_MODIFIED`（对于目录，首选按“最后修改时间”排序）\n\
  \  - `FLAG_VIRTUAL_DOCUMENT`（没有 MIME 类型的虚拟文档）\n  - `FLAG_SUPPORTS_COPY`（支持复制）\n\
  \  - `FLAG_SUPPORTS_MOVE`（支持在树内移动）\n  - `FLAG_SUPPORTS_REMOVE`（支持从层次结构中移除（不是删除！））\n\
  - **`COLUMN_ICON`**：（整型）文档的特定图标资源 ID。可以为 `null` 以使用系统默认图标\n- **`COLUMN_LAST_MODIFIED`**：（长整型）文档最后修改的时间戳，以毫秒为单位，从\
  \ UTC 时间 1970 年 1 月 1 日 00:00:00.0 开始计算。必填，但如果未定义，可以为 `null`。\n\n\n\n- **`COLUMN_MIME_TYPE`**：（字符串）文档的\
  \ MIME 类型。必填项\n\n- **`COLUMN_SIZE`**：（长整型）文档的大小（以字节为单位），如果未知则为 `null`。必填项\n\n- **`COLUMN_SUMMARY`**：（字符串）文档的摘要，可能会显示给用户。可选项，可为\
  \ `null`\n\n对于网络相关操作，你可以先返回部分数据，并在 `Cursor` 上设置 `DocumentsContract.EXTRA_LOADING`，以表示仍在获取更多数据。然后，当网络数据可用时，你可以发送变更通知来触发重新查询并返回完整内容。为支持变更通知，你必须使用相关\
  \ URI（可能来自 `DocumentsContract.buildChildDocumentsUri()`）触发 `Cursor.setNotificationUri()`。然后，你可以使用该\
  \ URI 调用 `ContentResolver.notifyChange()` 来发送变更通知。\n\n- **`fun openDocument(documentId:\
  \ String?, mode: String?, signal: CancellationSignal?): ParcelFileDescriptor`**\n\
  \n打开并返回请求的文档。它应返回一个可靠的 `ParcelFileDescriptor`，以便检测远程调用方何时完成文档的读取或写入。如果在下载内容时阻塞，应定期检查\
  \ `CancellationSignal.isCanceled()` 以放弃已废弃的打开请求。参数如下：`documentId` 是要返回的文档的 ID。`mode`\
  \ 指定“打开”模式，例如“r”、“w”或“rw”。应始终支持模式“r”。如果传递的模式不被支持，提供程序应抛出 `UnsupportedOperationException`。如果模式仅是“r”或“w”，你可以返回管道或套接字对，但像“rw”这样的复杂模式意味着磁盘上支持定位的普通文件。如果请求应被取消，调用者可能会使用\
  \ `signal`。可为 `null`。\n\n- **`override fun queryDocument(documentId: String?, projection:\
  \ Array<out String>?): Cursor`**\n\n返回单个请求文档的元数据。参数如下：`documentId` 是要返回的文档的 ID，`projection`\
  \ 是放入游标的列列表。使用 `DocumentsContract.Document` 中的常量；有关列表，请参见前面 `queryChildDocuments()`\
  \ 方法描述。如果此处使用 `null`，则返回所有列。\n\n在文件 `AndroidManifest.xml` 中，注册文档提供程序的方式几乎与注册其他提供程序相同：\n\
  \n在前面的查询中，我们看到 `Cursor` 对象返回标志，指示支持最近文档和在树内搜索。为实现这一点，你必须在你的 `DocumentsProvider`\
  \ 实现中实现一个或两个额外的方法：\n\n- **`override fun queryRecentDocuments(rootId: String, projection:\
  \ Array<String>): Cursor`**\n\n旨在返回指定根目录下最近修改过的文档。返回的文档应按照 `COLUMN_LAST_MODIFIED`\
  \ 降序排序，并且最多显示 64 条记录。最近文档不支持变更通知。\n\n- **`querySearchDocuments(rootId: String, query:\
  \ String, projection: Array<String>): Cursor`**\n\n旨在返回指定根目录下与给定查询匹配的文档。返回的文档应按照相关性降序排序。对于慢速查询，你可以返回部分数据，并在游标上设置\
  \ `EXTRA_LOADING`，以表示正在获取更多数据。然后，当数据可用时，你可以发送变更通知来触发重新查询并返回完整内容。为支持变更通知，你必须使用相关\
  \ URI（可能来自 `buildSearchDocumentsUri(String, String, String)`）调用 `setNotificationUri(ContentResolver,\
  \ Uri)`。然后，你可以使用该 URI 调用方法 `notifyChange(Uri, android.database.ContentObserver,\
  \ boolean)` 来发送变更通知。\n\n一旦你的文档提供程序配置并运行，客户端组件就可以使用 `ACTION_OPEN_DOCUMENT` 或 `ACTION_CREATE_DOCUMENT`\
  \ Intent 来打开或创建文档。Android 系统选择器将负责向用户展示适当的文档——你无需为文档提供程序提供自己的 GUI。\n\n此类客户端访问的示例如下：\n\
  \n```\n// 一个整数，可用于在调用的 Intent 返回时标识该调用\nval READ_REQUEST_CODE = 42\n// 此示例中使用的 ACTION_OPEN_DOCUMENT\
  \ 是\n// 用于选择文档（例如通过系统文件浏览器选择文件）\n// 的 Intent\nval intent = Intent(Intent.ACTION_OPEN_DOCUMENT)\n\
  // 过滤仅显示可以“打开”的结果，例如\n// 文件（与信息项列表相对）\nintent.addCategory(Intent.CATEGORY_OPENABLE)\n\
  // 你可以使用过滤器，例如仅显示图像。\n// 要改为搜索所有文档，可以在此处使用 \"*/*\"\nintent.type = \"image/*\"\n\
  // 实际的 Intent 调用 - 系统将提供 GUI\nstartActivityForResult(intent, READ_REQUEST_CODE)\n\
  ```\n\n当从系统选择器中选择一个项目后，要捕获 Intent 的返回，你可以编写类似以下内容：\n\n```\noverride fun onActivityResult(requestCode:Int,\n\
  resultCode:Int,\nresultData:Intent) {\n// ACTION_OPEN_DOCUMENT Intent 是使用\n// 请求码\
  \ READ_REQUEST_CODE 发送的。如果此处看到的\n// 请求码不匹配，则它是某个其他 Intent 的响应，\n// 下面的代码不应运行。\n\
  if (requestCode == READ_REQUEST_CODE\n&& resultCode == Activity.RESULT_OK) {\n//\
  \ 选中的文档显示在\n// intent.getData() 中\nval uri = resultData.data\nLog.i(\"LOG\", \"\
  Uri: \" + uri.toString())\nshowImage(uri) // 用它做点什么\n}\n}\n```\n\n除了像示例中那样打开文件，你还可以对\
  \ Intent 返回中收到的 URI 执行其他操作。例如，你也可以发出查询来获取元数据，如前面的查询方法所示。由于 `DocumentsProvider` 继承自\
  \ `ContentProvider`，你可以使用其中描述的方法——请参阅前面的“提供内容文件”部分，来为文档的字节打开一个流。\n\n7. 权限\n\n\n\n"
- "# 保护 Android 应用中的敏感数据\n\n在应用开发过程中，保护敏感数据是一项重要任务。随着手持设备上用于银行、通讯等敏感日常任务的应用程序日益增多，安全性在过去一段时间里变得越来越重要，并且未来也将持续如此。作为开发者，你必须顺应这一演变趋势，采取一切可能的预防措施，负责任地处理应用用户的数据。\n\
  \n全面处理每一个可能的安全方面是一项具有挑战性的任务，单凭这一点就足以写满一整本书。幸运的是，有大量在线资源可供你查阅，以获取 Android 操作系统安全相关的最新信息。只需注意筛选掉不恰当的信息即可。一个不错的起点是\
  \ Android 操作系统在线资源中与安全相关的主题——截至 2022 年年中，相关的两个页面 URL 是 [`https://developer.android.com/design-for-safety#security`](https://developer.android.com/design-for-safety%2523security)\
  \ 和 [`https://developer.android.com/guide/topics/permissions/overview`](https://developer.android.com/guide/topics/permissions/overview)。如果你在阅读本书时这些链接失效了，可以在你常用的搜索引擎中输入“Android\
  \ best practices security”和“Android best practices permissions”，你就能轻松找到这些资源。\n\n\
  话虽如此，我们仍然需要深入探讨 Android 操作系统内部的*权限*系统，因为一旦你的应用涉及敏感数据，作为开发者，这绝对是你必须熟练掌握的部分。权限通过使用预定义的权限或自行定义权限，为使用系统数据和功能增加了安全性。在\
  \ `AndroidManifest.xml` 中，你可以添加自定义权限，并声明你的应用想要使用的权限。根据权限类型的不同，你必须在代码中添加对话框，告知用户需要哪些权限，并请求用户确认以访问受保护的资源或功能。\n\
  \n## 权限类型\n\n根据所需的保护级别，权限有几种不同的类型：\n\n*   **正常**：此级别对应低级别的安全敏感信息。系统会自动授予已安装应用此类权限，而无需明确询问用户，但该权限会在应用安装前列在包描述中。并且可以通过使用系统设置应用按需显式查询。\n\
  \n*   **危险**：此级别对应高级别的安全敏感信息。在运行时，系统会询问用户是否允许使用该权限。一旦某个应用被允许，该授权将被保存，用户可能不会再被询问，直到应用被重新安装，或者通过使用系统设置应用显式撤销该权限。\n\
  \n*   **签名**：此级别对应极高安全级别的敏感信息。只有使用与定义该权限的应用相同的证书签名的应用才能获取该权限。系统会检查签名是否匹配，然后自动授予权限。此级别仅对由同一开发者开发的一组应用有意义。\n\
  \n*   **特殊**：仅在少数用例中，系统通过非标准获取方法授予对某些系统资源的访问权限。这类特殊权限由平台定义。\n\n*   **特权**或**系统**：仅用于系统映像应用。你通常不应该也不需要使用它们。\n\
  \n权限被归入权限组。其背后的理念是，一旦用户接受了来自 G1 组权限 A 的请求，就无需再对同一 G1 组的另一个权限 B 进行权限查询。从用户体验的角度来看，只有当我们谈论*危险*类型权限时，权限组才会产生影响——*正常*权限的权限组没有影响。\n\
  \n> **注意**\n>\n> 权限到权限组的映射可能会随着 Android 的未来版本而改变——因此你的应用不应依赖这种映射。从开发的角度来看，你应该忽略权限组，除非你定义了自己的权限和权限组。\n\
  \n## 定义权限\n\nAndroid 操作系统包含许多由各种内置应用或操作系统本身定义的权限。此外，作为开发者，你可以定义自己的权限来保护应用或应用的部分功能。你在\
  \ `AndroidManifest.xml` 中定义此类权限：\n\n```\n<permission android:name=\"string\"\n \
  \           android:protectionLevel=[\"normal\" | \"dangerous\" | \"signature\"\
  \ | ...]\n            android:label=\"string\"\n            android:icon=\"drawable\
  \ resource\"\n            android:description=\"string\" />\n```\n\n这些属性的含义在在线文本伴侣的“清单顶级条目”部分有描述。至少，你必须提供\
  \ `name` 和 `protectionLevel` 属性，但添加 `label` 和/或 `icon` 以及描述来帮助用户理解该权限的作用，当然也是个好主意。\n\
  \n如果你需要将权限分组，可以使用以下两种方法之一：\n\n1.  使用 `<permission-group>` 元素，并向 `<permission>` 添加\
  \ `permissionGroup` 属性——参见在线文本伴侣中的“清单顶级条目”部分。\n\n2.  使用 `<permission-tree>` 元素并相应地为你的权限命名——再次参见在线文本伴侣中的“清单顶级条目”部分。\n\
  \n如果你随后获取了某个组的权限，则同一组中的同级权限将被隐式地包含在授权中。\n\n> **警告**\n>\n> 为了遵守安全准则并使你的应用设计清晰稳定，请将自己定义的权限数量保持在绝对最低限度。\n\
  \n## 使用权限\n\n要使用权限，请在 `AndroidManifest.xml` 文件中添加一个或多个 `<uses-permission>` 元素：\n\
  \n```\n<uses-permission android:name=\"string\"\n                 android:maxSdkVersion=\"\
  integer\" />\n```\n\n`name` 属性指定权限名称，`maxSdkVersion` 指定此权限要求将生效的最高 API 级别。引入这个特殊的\
  \ `<uses-permission-sdk-23>` 元素的原因是 Android 6.0 中权限语义的重大变更。\n\n问题是：我们如何知道自己的应用具体需要哪些权限？答案有三部分：\n\
  \n*   Android Studio 会告诉你应用需要某个权限。例如，如果你编写：\n\n```kotlin\nval uri = CallLog.Calls.CONTENT_URI\n\
  val cursor = contentResolver.query(\nuri, null, null, null, null)\n```\n\nAndroid\
  \ Studio 会告诉你需要某个特定的权限——见图 7-1。\n\n*   在开发和测试期间，你的应用崩溃了，在日志中你会看到类似这样的条目：\n\n```\n\
  Caused by: java.lang.SecurityException: Permission\nDenial: opening provider\ncom.android.providers.contacts.CallLogProvider\n\
  from\nProcessRecord{faeda9c 4127:de.pspaeth.cp1/u0a96}\n(pid=4127, uid=10096) requires\n\
  android.permission.READ_CALL_LOG or\nandroid.permission.WRITE_CALL_LOG\n```\n\n\
  *   系统权限列表会告诉你，对于某个特定任务需要某个特定的权限。参见表 7-1（未详尽列出）。\n\n为了强制某个 Activity 或整个应用受到自定义权限的保护，你可以在\
  \ `permission` 属性中声明该权限，如下所示：\n\n```xml\n<activity android:name=\".MyActivity\"\n\
  \          android:permission=\"com.example.myapp.PERMISSION_NAME\"\n          ...>\n\
  </activity>\n```\n\n或者在 `<application>` 元素内部进行类似声明。\n\n### 图 7-1\nAndroid Studio\
  \ 的界面，其中包含几行代码。它表示了权限要求。\n\n*图 7-1：Android Studio 提示权限要求*（图片未显示）\n\n### 表 7-1：系统权限\n\
