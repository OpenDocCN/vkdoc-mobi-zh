  \n## 获取权限\n\n对“危险”权限的询问发生在应用运行时。这使得权限系统相当灵活——你的应用用户可能永远不使用其中的某些部分，因此不请求不必要的权限可以避免无谓的困扰。这种运行时方法的缺点是需要更多的编程工作——权限询问必须包含在你的代码中。为此，在需要权限之前的任何合适位置，你可以添加以下代码：\n\
  \n```kotlin\nval activity = this\nval perm = Manifest.permission.CAMERA\nval cameraPermReturnId\
  \ = 7239 // 任何合适的常量\nval permissionCheck = ContextCompat.checkSelfPermission(\n\
  activity, perm)\nif (permissionCheck !=\nPackageManager.PERMISSION_GRANTED) {\n\
  // 是否应向用户显示解释？\nif (ActivityCompat.\nshouldShowRequestPermissionRationale(\nactivity,\
  \ perm)) {\n// 向用户显示解释\n// *异步*——不要阻塞\n// 此线程等待用户响应！\n// 用户看完解释后，再次尝试请求\n// 权限。\n\
  val dialog = AlertDialog.Builder(activity) ...\n.create()\ndialog.show()\n} else\
  \ {\n// 无需解释，可以直接请求\n// 权限。\nActivityCompat.requestPermissions(activity,\narrayOf(perm),\
  \ cameraPermReturnId)\n// cameraPermReturnId 是一个应用定义的\n// int 常量。回调方法将获取\n// 请求的结果。\n\
  }\n}\n```\n\n这段代码执行以下操作：\n\n*   首先，我们检查权限是否已被授予。如果之前已授予权限，除非应用被重新安装或权限被明确撤销，否则不会再次询问用户。\n\
  *   `ActivityCompat.shouldShowRequestPermissionRationale()` 检查是否应向用户显示理由。其背后的理念是，如果用户多次拒绝了权限询问请求，可能是因为他们不了解该权限的必要性。在这种情况下，应用有机会向用户说明更多关于该权限需求的信息。`shouldShowRequestPermissionRationale()`\
  \ 返回 `true` 的频率取决于 Android 操作系统。这里的示例显示了一个对话框。你当然可以根据需要采取任何方式来告知用户。\n*   `ActivityCompat.requestPermissions(...)`\
  \ 最终执行权限询问。这是异步执行的，因此该调用会立即返回。\n\n一旦调用 `ActivityCompat.requestPermissions(...)`，Android\
  \ 操作系统会在你的应用之外询问用户是否授予该权限。其结果将通过一个异步回调方法返回，如下所示：\n\n```kotlin\noverride\nfun onRequestPermissionsResult(\n\
  requestCode: Int, permissions: Array,\ngrantResults: IntArray) {\nwhen (requestCode)\
  \ {\ncameraPermReturnId -> {\n// 如果请求被取消，结果\n// 数组为空。这里我们知道它\n// 只能有一个条目\nif ((grantResults.isNotEmpty()\n\
  && grantResults[0] ==\nPackageManager.PERMISSION_GRANTED)) {\n// 权限已被授予\n// 进行相应处理...\n\
  } else {\n// 权限被拒绝\n// 进行相应处理...\n}\nreturn\n}\n// 添加其他 'when' 分支以检查\n// 此应用可能请求的其他权限。\n\
  else -> {\n// 忽略所有其他请求。\n// 或者做任何你认为合适的处理。\n}\n}\n}\n```\n\n此方法需要在 `android.content.Activity`\
  \ 类内部实现。在其他上下文中这是不可行的。\n\n"
- "# 系统管理的权限请求\n\n如果你不喜欢权限询问过程与 Activity 紧密耦合——回想一下你必须在 Activity 类中实现 `onRequestPermissionsResult()`\
  \ 方法——那么有一种使用回调注册机制的替代方案。要使用它，你必须首先在 `build.gradle` 文件中添加两个额外的依赖项：\n\n```groovy\n\
  implementation \"androidx.activity:\" +\n\"activity-ktx:1.4.0\"\nimplementation\
  \ \"androidx.fragment:\" +\n\"fragment-ktx:1.4.1\"\n```\n\n然后，在 Activity 的初始化部分，你编写以下代码：\n\
  \n\n\n```kotlin\nimport androidx.activity.result.contract.ActivityResultContracts\n\
  ...\nclass MainActivity : AppCompatActivity() {\n    private lateinit var requestPermissionLauncher:\
  \ ActivityResultLauncher\n    ....\n    override fun onCreate(savedInstanceState:\
  \ Bundle?) {\n        super.onCreate(savedInstanceState)\n        ...\n        requestPermissionLauncher\
  \ =\n            registerForActivityResult(\n                ActivityResultContracts.RequestPermission()\n\
  \            ) { isGranted: Boolean ->\n                if (isGranted) {\n     \
  \               // 权限已授予，继续在应用中进行相关操作。\n                    ...\n              \
  \  } else {\n                    // 某项功能需要用户已拒绝的权限，向用户说明该功能不可用。\n              \
  \      ...\n                }\n            }\n    }\n}\n```\n\n**注意**\n\n此注册必须在\
  \ Activity 进入 `ACTIVE` 状态*之前*完成。在 `create()` 内部执行此操作自然是个不错的主意。\n\n要实际检查并可能获取权限，你需要在代码中添加如下内容：\n\
  \n```kotlin\nif(checkSelfPermission(Manifest.permission.CAMERA) !=\n    PackageManager.PERMISSION_GRANTED)\
  \ {\n    if(shouldShowRequestPermissionRationale(\n        Manifest.permission.CAMERA))\
  \ {\n        // 向用户说明为什么你的应用需要此权限。\n        // 视图中应显示一个链接到\n        //   requestPermissionLauncher.launch(\n\
  \        //        Manifest.permission.CAMERA\n        //   )\n        // 的按钮\n\
  \        ...\n    } else {\n        // 向系统请求权限。\n        requestPermissionLauncher.launch(\n\
  \            Manifest.permission.CAMERA\n        )\n    }\n} else {\n    // 使用需要该权限的\
  \ API。\n    ....\n}\n```\n\n与 `Activity` 类的唯一联系是 `requestPermissionLauncher` 变量，因此很容易将权限相关代码提取到单独的类中。\n\
  \n## 获取特殊权限\n\n在某些情况下，使用 `ActivityCompat.requestPermissions()` 不足以获取像 `SYSTEM_ALERT_WINDOW`\
  \ 或 `WRITE_SETTINGS` 这样的特殊权限。对于这两种权限以及可能的其他权限，你需要采用不同的方法。\n\n权限 `WRITE_SETTINGS`\
  \ 必须使用特殊的 `Intent` 来获取，如下所示：\n\n```kotlin\nval backFromSettingPerm = 6183  // 任意合适的常量\n\
  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {\n    val activity = this\n\
  \    if (!Settings.System.canWrite(activity)) {\n        // 这只是一个建议：向用户显示一个关于特殊权限的特殊对话框。\n\
  \        // 重要的是启动 Activity\n        AlertDialog dialog =\n            new AlertDialog.Builder(activity)\n\
  \                .setTitle(...)\n                .setMessage(...)\n            \
  \    .setPositiveButton(\"确定\", { dialog, id ->\n                    val intent\
  \ = Intent(\n                        Settings.ACTION_MANAGE_WRITE_SETTINGS)\n  \
  \                  intent.data = Uri.parse(\"package:\" +\n                    \
  \    getPackageName())\n                    activity.startActivityForResult(intent,\n\
  \                        backFromSettingPerm)\n                }).setNegativeButton(\"\
  取消\",\n                    { dialog, id ->\n                        // ...\n   \
  \                 })\n                .create();\n        dialog.show();\n     \
  \   systemWillAsk = true;\n    }\n} else {\n    // 像处理其他权限一样处理...\n}\n```\n\n完成该\
  \ `Intent` 后，可以使用回调方法 `onActivityResult()` 继续 GUI 流程：\n\n```kotlin\noverride\nprotected\
  \ fun onActivityResult(requestCode:Int,\n                               resultCode:Int,\
  \ data:Intent) {\n    if ((requestCode and 0xFFFF) == backFromSettingPerm) {\n \
  \       if (resultCode == Activity.RESULT_OK) {\n            // 相应地操作...\n     \
  \   }\n    }\n}\n```\n\n对于 `SYSTEM_ALERT_WINDOW` 权限，你可能必须遵循相同的方法，但在创建 `Intent` 时需使用\
  \ `ACTION_MANAGE_OVERLAY_PERMISSION` 代替。\n\n**注意**\n\n对于此特殊的 `SYSTEM_ALERT_WINDOW`\
  \ 权限，如果应用是从 Google Play 商店安装的，Google Play 商店将自动授予该权限。对于本地开发和测试，你必须按描述使用 `Intent`。另请注意，对于\
  \ Android 11，此设置的策略已更新；请参阅 [`developer.android.com/about/versions/11/privacy/permissions`](https://developer.android.com/about/versions/11/privacy/permissions)。\n\
  \n## 功能需求与权限\n\n在第 2 章中，我们看到通过 `AndroidManifest.xml` 中的 `<uses-feature>` 元素，你可以指定应用将使用哪些功能。此信息对于\
  \ Google Play 商店确定应用发布后可在哪些设备上运行很重要。然而，如果你指定了此需求，还有另一个重要方面需要考虑：此类需求会隐含哪些权限，以及根据使用的\
  \ API 级别将如何处理这些权限？\n\n功能常量和 API 级别并非严格相关——例如，`android.hardware.bluetooth` 功能是在 API\
  \ 级别 8 中添加的，但相应的蓝牙 API 是在 API 级别 5 中添加的。因此，一些应用在能够使用 `<uses-feature>` 声明来声明需要该 API\
  \ 之前，就已经能够使用该 API 了。为了弥补这种差异，Google Play 假设某些与硬件相关的权限默认指示了底层硬件功能是必需的。例如，使用蓝牙的应用必须在\
  \ `<uses-permission>` 元素中请求 `BLUETOOTH` 权限，而对于针对较旧 API 级别的应用，Google Play 假设该权限声明意味着应用需要底层的\
  \ `android.hardware.bluetooth` 功能。表 7-2 列出了此类隐含功能需求的权限。\n\n请注意，`<uses-feature>`\
  \ 声明的优先级高于表 7-2 中权限所隐含的功能。对于这些权限中的任何一个，你可以通过在 `<uses-feature>` 元素中显式声明隐含的功能，并添加\
  \ `android:required=\"false\"` 属性，来禁用基于该隐含功能的过滤。例如，要禁用基于 `CAMERA` 权限的任何过滤，你需要将其添加到清单文件中：\n\
  \n**表 7-2** 隐含功能需求的权限\n\n| 类别 | 权限 | …隐含的功能 |\n| --- | --- | --- |\n| 蓝牙 | `BLUETOOTH`\
  \ | `android.hardware.bluetooth` |\n| | `BLUETOOTH_ADMIN` | `android.hardware.bluetooth`\
  \ |\n| 相机 | `CAMERA` | `android.hardware.camera` 和 `android.hardware.camera.autofocus`\
  \ |\n| 位置 | `ACCESS_MOCK_LOCATION` | `android.hardware.location` |\n| | `ACCESS_LOCATION_EXTRA_COMMANDS`\
  \ | `android.hardware.location` |\n| | `INSTALL_LOCATION_PROVIDER` | `android.hardware.location`\
  \ |\n| | `ACCESS_COARSE_LOCATION` | `android.hardware.location` `android.hardware.location.network`\
  \ (API 级别 < 21) |\n| | `ACCESS_FINE_LOCATION` | `android.hardware.location` `android.hardware.location.gps`\
  \ (API 级别 < 21) |\n| 麦克风 | `RECORD_AUDIO` | `android.hardware.microphone` |\n| 电话\
  \ | `CALL_PHONE` | `android.hardware.telephony` |\n| | `CALL_PRIVILEGED` | `android.hardware.telephony`\
  \ |\n| | `MODIFY_PHONE_STATE` | `android.hardware.telephony` |\n| | `PROCESS_OUTGOING_CALLS`\
  \ | `android.hardware.telephony` |\n| | `READ_SMS` | `android.hardware.telephony`\
  \ |\n| | `RECEIVE_SMS` | `android.hardware.telephony` |\n| | `RECEIVE_MMS` | `android.hardware.telephony`\
  \ |\n| | `RECEIVE_WAP_PUSH` | `android.hardware.telephony` |\n| | `SEND_SMS` | `android.hardware.telephony`\
  \ |\n| | `WRITE_APN_SETTINGS` | `android.hardware.telephony` |\n| | `WRITE_SMS`\
  \ | `android.hardware.telephony` |\n| Wi-Fi | `ACCESS_WIFI_STATE` | `android.hardware.wifi`\
  \ |\n| | `CHANGE_WIFI_STATE` | `android.hardware.wifi` |\n| | `CHANGE_WIFI_MULTICAST_STATE`\
  \ | `android.hardware.wifi` |\n\n## 使用终端处理权限\n\n要查看设备上已注册的权限，你可以浏览系统设置应用中的应用列表，或者更简单的方式是，使用\
  \ ADB shell 在终端中获取各种与权限相关的信息。\n\n为此，将硬件设备通过 USB 连接到你的笔记本电脑或 PC，打开终端，`cd` 到 SDK 安装目录中的\
  \ `platform-tools` 文件夹，在以下命令中查找你的设备：\n\n```bash\n./adb devices\n```\n\n然后输入：\n\n\
  ```bash\n./adb shell -s\n```\n\n\n\n"
- "# 排版后内容\n\n如果只有一个设备，可以省略 `-s` 开关。\n\n进入 shell 后，可以使用几个命令获取权限信息。首先，可以通过以下命令列出所有已安装的包：\n\
  \n```\ncmd package list package\n```\n\n要显示 *所有* 危险权限，或查看某个包的权限状态，或授予/撤销一个或多个权限，可以使用：\n\
  \n```\ncmd package list permissions -d -g\ndumpsys package \npm [grant|revoke] \
  \ ...\n```\n\n注意：当前版本的 `dumpsys` 会同时显示 *请求的* 和 *已授予的* 权限——不要被关于此问题的旧博客文章混淆。\n\n\
  ## 8. APIs\n\n本章主题是作为应用基石的 API。这包括：\n\n*   *数据库*\n*   *调度*\n*   *通知*\n*   *联系人*\n\
  *   *搜索框架*\n*   *位置和地图*\n*   *偏好设置*\n\n### 数据库\n\nAndroid 提供了两种处理数据库的方式：使用 Android\
  \ 操作系统自带的 *SQLite* 库，或者使用 *Room* 架构组件。推荐使用后者，因为它在数据库和客户端之间添加了一个抽象层，简化了 Kotlin 对象与数据库存储对象之间的映射。\n\
  \n你可以在在线文档中找到关于 SQLite 的详尽信息，并在网上找到大量示例——本书将讨论 Room，因为抽象层引入的关注点分离有助于编写更好的代码，同时 Room\
  \ 还能避免样板代码，从而显著缩短数据库代码。\n\n### 配置 Room 环境\n\n由于 Room 是支持架构组件，因此必须在 Android Studio\
  \ 构建脚本中进行配置。为此，请打开 *模块* 的 `build.gradle` 文件（不是项目级别的那个！），并在顶层（不在任何花括号内）写入：\n\n```\n\
  apply plugin: 'kotlin-kapt'\n```\n\n这是 Kotlin 编译器插件，用于支持注解处理。在 “dependencies” 部分内，添加：\n\
  \n```\ndef room_version = \"2.4.2\"\nimplementation \"androidx.room:\" +\n\"room-runtime:$room_version\"\
  \nkapt \"androidx.room:\" +\n\"room-compiler:$room_version\"\n```\n\n### Room 架构\n\
  \nRoom 的设计以易用性为目标——你主要处理三种对象：\n\n*   **数据库**：数据库的持有者。用 SQL 语言术语来说，它包含多个表。从技术无关的角度看，数据库包含多个实体容器。\n\
  \n*   **实体**：在 SQL 世界中代表一个表。从技术无关的角度看，这是一个以用法为中心的字段集合。例如，公司内部的 *Employee* 或包含与人员/合作伙伴通信信息的\
  \ *Contact*。\n\n*   **DAO 或数据访问对象**：包含从数据库检索数据的访问逻辑。因此，它在程序逻辑和数据库模型之间充当接口。通常每个实体类对应一个\
  \ DAO，但也可能有多个 DAO 用于各种组合。例如，可以为 Employee 和 Contact 两个实体分别创建 `EmployeeDao` 和 `ContactDao`，同时还可以创建一个合并员工及其联系信息的\
  \ `PersonDao`。\n\n### 数据库\n\n声明数据库的方法如下：\n\n```\nimport androidx.room.*\n@Database(entities\
  \ =\narrayOf(Employee::class, Contact::class),\nversion = 1)\nabstract class MyDatabase\
  \ : RoomDatabase() {\nabstract fun employeeDao(): EmployeeDao\nabstract fun contactDao():\
  \ ContactDao\nabstract fun personDao(): PersonDao\n}\n```\n\n在 `@Database` 注解中，声明所有使用的实体类，并以抽象函数的形式提供\
  \ DAO 类的工厂方法。你无需实现这个抽象数据库类——Room 库会根据签名和注解自动为你提供实现！版本号将帮助你升级不同的数据模型版本——后续会对此进行更多讨论。\n\
  \n### 实体\n\n接下来，我们实现实体类，这在 Kotlin 中极其简单：\n\n\n```kotlin\n@Entity\ndata class Employee(\n\
  @PrimaryKey(autoGenerate = true) var uid:Int = 0,\nvar firstName:String,\nvar lastName:String)\n\
  \n@Entity\ndata class Contact(\n@PrimaryKey(autoGenerate = true) var uid:Int = 0,\n\
  var emailAddr:String)\n```\n\n你可以看到，每个实体都需要一个`Int`类型的主键。`autoGenerate = true`负责自动确保其唯一性。\n\
  \n这些实体类定义的数据库表中的列名与变量名匹配。如果你想更改这一点，可以添加另一个注解`@ColumnInfo`：\n\n```kotlin\n@Entity\n\
  data class Employee(\n@PrimaryKey(autoGenerate = true) var uid:Int = 0,\n@ColumnInfo(name\
  \ = \"first_name\") var firstName:String,\n@ColumnInfo(name = \"last_name\") var\
  \ lastName:String)\n```\n\n这将导致使用`\"first_name\"`和`\"last_name\"`作为表列名。\n\n同样，表名取自实体类名`\"\
  Employee\"`和`\"Contact\"`。你也可以更改这一点：只需向`@Entity`注解添加一个`tableName`参数，如下所示：\n\n```kotlin\n\
  @Entity(tableName = \"empl\")\ndata class Employee(\n@PrimaryKey(autoGenerate =\
  \ true) var uid:Int = 0,\n@ColumnInfo(name = \"first_name\") var firstName:String,\n\
  @ColumnInfo(name = \"last_name\") var lastName:String)\n```\n\n虽然使用单个整数主键通常是一个好主意，但你也可以使用组合键。为此，`@Entity`中还有一个额外的注解参数可供使用：\n\
  \n```kotlin\n@Entity(tableName = \"empl\",\nprimaryKeys = tableOf(\"first_name\"\
  ,\"last_name\"))\ndata class Employee(\n@ColumnInfo(name = \"first_name\") var firstName:String,\n\
  @ColumnInfo(name = \"last_name\") var lastName:String)\n```\n\n实体也可以拥有不会被持久化的字段。从设计角度来看，这可能不是一个好主意，但如果你需要这样的字段，可以添加它并使用`@Ignore`注解，如下所示：\n\
  \n```kotlin\n@Entity(tableName = \"empl\")\ndata class Employee(\n@PrimaryKey(autoGenerate\
  \ = true) var uid:Int = 0,\nvar firstName:String = \"\",\nvar lastName:String =\
  \ \"\",\n@Ignore var salary:Int)\n```\n\n由于 Room 实现方式的限制，如果你添加了这样的`@Ignore`注解，则所有字段都必须分配默认值，即使未使用。\n\
  \n## 关系\n\nRoom 在设计上不允许实体之间存在直接关系。例如，你不能将一个`Contact`实体列表添加为`Employee`实体的类成员。但是，可以声明外键关系，这有助于维护数据一致性。\n\
  \n> 注意：\n> 另请参阅：`https://developer.android.com/training/data-storage/room/relationships`\n\
  \n为此，请添加一个`foreignKeys`注解属性，如下面的代码片段所示：\n\n```kotlin\n@Entity(\nforeignKeys = arrayOf(\n\
  ForeignKey(entity = Employee::class,\nparentColumns = arrayOf( \"uid\" ),\nchildColumns\
  \ = arrayOf( \"employeeId\" ),\nonDelete = ForeignKey.CASCADE,\nonUpdate = ForeignKey.CASCADE,\n\
  deferred = true)),\nindices = arrayOf(\nIndex(\"employeeId\"))\n)\n@Entity\ndata\
  \ class Contact(\n@PrimaryKey(autoGenerate = true) var uid:Int = 0,\nvar employeeId:Int,\n\
  var emailAddr:String)\n```\n\n关于该构造的一些说明：\n\n*   在 Java 中，你会编写`@Entity(foreignKeys\
  \ = @ForeignKey( ... ))`。Kotlin 不允许注解内部嵌套注解。在这种情况下，使用构造函数作为替代，这归结为省略内部注解的`@`。\n\
  *   在 Java 中，注解属性值数组的写法是`name = { ..., ... }`。这在 Kotlin 中无法使用，因为花括号不能作为数组初始化器。相反，会使用`arrayOf(...)`库方法。\n\
  *   `childColumns`属性指向*本*实体中的引用键，即此处的`Contact.employeeId`。\n*   `parentColumns`属性指向被引用的外键实体，此处为`Employee.uid`。\n\
  *   `onDelete`属性指定当父项被删除时该如何处理。值`ForeignKey.CASCADE`意味着也自动删除所有子项，即关联的`Contact`实体。所有可能的值如下：\n\
  \    *   **CASCADE**：将所有操作传递到子-父关系树的根。\n    *   **NO_ACTION**：不执行任何操作。这是默认值，如果因更新或删除操作导致关系破坏，则会引发异常。\n\
  \    *   **RESTRICT**：类似于`NO_ACTION`，但会在删除或更新发生时立即进行检查。\n    *   **SET_NULL**：当父项删除或更新发生时，所有子键列都设置为`null`。\n\
  \    *   **SET_DEFAULT**：当父项删除或更新发生时，所有子键列都设置为其默认值。\n*   `onUpdate`属性指定当父项被更新时该如何处理。值`ForeignKey.CASCADE`意味着也自动更新所有子项，即关联的`Contact`实体。可能的值与前述`onDelete`相同。\n\
  *   设置`deferred = true`会将一致性检查推迟到数据库事务提交时执行。例如，如果父项和子项在同一事务中创建，这可能很重要。\n*   外键必须是相应索引的一部分。此处，`Contact.employeeId`获得了索引。更多关于索引的信息，请参见下文。\n\
  \n### 嵌套对象\n\n虽然除了通过外键手动定义之外，无法定义对象间关系，但你可以在对象侧定义层次化对象的嵌套。例如，从`Employee`实体\n\n```kotlin\n\
  @Entity\ndata class Employee(\n@PrimaryKey(autoGenerate = true) var uid:Int = 0,\n\
  var firstName:String,\nvar lastName:String)\n```\n\n你可以提取出名字和姓氏，改为编写：\n\n```kotlin\n\
  data class Name(var firstName:String, var lastName:String)\n@Entity\ndata class\
  \ Employee(\n@PrimaryKey(autoGenerate = true) var uid:Int = 0,\n@Embedded var name:Name)\n\
  ```\n\n注意，这对数据模型的数据库端没有影响。关联的表仍然会有`\"uid\"`、`\"firstName\"`和`\"lastName\"`列。由于此类嵌入对象的数据库标识与其字段名称绑定，当有多个相同嵌入类型的嵌入对象时，你必须使用`prefix`属性来消除名称歧义，如下所示：\n\
  \n```kotlin\ndata class Name(var firstName:String, var lastName:String)\n@Entity\n\
  data class Employee(\n@PrimaryKey(autoGenerate = true) var uid:Int = 0,\n@Embedded\
  \ var name:Name,\n@Embedded(prefix=\"spouse_\") var spouseName:Name)\n```\n\n这将使表拥有`\"\
  uid\"`、`\"firstName\"`、`\"lastName\"`、`\"spouse_firstName\"`和`\"spouse_lastName\"\
  `列。\n\n如果愿意，你可以在可嵌入类内部使用 Room 注解，例如，使用`@ColumnInfo`注解来指定自定义列名：\n\n```kotlin\ndata\
  \ class Name(\n@ColumnInfo(name = \"first_name\") var firstName:String,\n@ColumnInfo(name\
  \ = \"last_name\") var lastName:String)\n@Entity\ndata class Employee(\n@PrimaryKey(autoGenerate\
  \ = true) var uid:Int = 0,\n@Embedded var name:Name)\n```\n\n## 使用索引\n\n为了提升数据库查询性能，你可以声明一个或多个索引，用于特定字段或字段组合。你不需要为唯一键执行此操作；这是自动完成的。但对于你想要定义的任何其他索引，请编写类似如下的内容：\n\
  \n```kotlin\n@Entity(indices = arrayOf(\nIndex(\"employeeId\"),\nIndex(value = arrayOf(\"\
  country\",\"city\"))\n)\n)\ndata class Contact(\n@PrimaryKey(autoGenerate = true)\
  \ var uid:Int = 0,\nvar employeeId:Int,\nvar emailAddr:String,\nvar country:String,\n\
  var city:String)\n```\n\n这将添加一个支持使用外键字段`\"employeeId\"`进行快速查询的索引，以及另一个支持在给定国家和城市条件下进行快速查询的索引。\n\
  ```\n\n\n# Room 数据库访问与查询优化\n\n如果你将 `unique = true` 作为属性添加到 `@Index` 注解中，Room 将确保该表不能有两个具有相同索引值的条目。例如，我们为\
  \ `Employee` 添加一个 SSN（社会安全号码）字段，并为其定义唯一索引：\n\n```kotlin\n@Entity(indices = arrayOf(\n\
  \    Index(value = arrayOf(\"ssn\"), unique = true)\n)\n)\ndata class Employee(\n\
  \    @PrimaryKey(autoGenerate = true) var uid: Int = 0,\n    var ssn: String,\n\
  \    @Embedded var name: Name\n)\n```\n\n如果现在尝试向数据库添加两个具有相同 SSN 的员工，Room 将抛出异常。\n\
  \n## 数据访问：DAO\n\n数据访问对象（Data Access Objects，简称 DAOs）提供访问数据库的逻辑。我们已经看到，在数据库声明内部，必须在工厂方法中列出所有\
  \ DAO，如下所示：\n\n```kotlin\n@Database(entities =\n    arrayOf(Employee::class, Contact::class),\n\
  \    version = 1)\nabstract class MyDatabase : RoomDatabase() {\n    abstract fun\
  \ employeeDao(): EmployeeDao\n    abstract fun contactDao(): ContactDao\n    abstract\
  \ fun personDao(): PersonDao\n}\n```\n\n在此示例中，我们声明了三个 DAO 供 Room 使用。对于实际实现，我们不需要完整的\
  \ DAO 类。只需声明接口或抽象类即可；Room 将为我们完成其余工作。\n\n例如，对于实体 `Employee`，其 DAO 类可能如下所示：\n\n```kotlin\n\
  @Entity\ndata class Employee(\n    @PrimaryKey(autoGenerate = true) var uid: Int\
  \ = 0,\n    @ColumnInfo(name = \"first_name\") var firstName: String,\n    @ColumnInfo(name\
  \ = \"last_name\") var lastName: String\n)\n```\n\n```kotlin\n@Dao\ninterface EmployeeDao\
  \ {\n    @Query(\"SELECT * FROM employee\")\n    fun getAll(): List<Employee>\n\n\
  \    @Query(\"SELECT * FROM employee\" +\n           \" WHERE uid IN (:uIds)\")\n\
  \    fun loadAllByIds(uIds: IntArray): List<Employee>\n\n    @Query(\"SELECT * FROM\
  \ employee\" +\n           \" WHERE last_name LIKE :name\")\n    fun findByLastName(name:\
  \ String): List<Employee>\n\n    @Query(\"SELECT * FROM employee\" +\n         \
  \  \" WHERE last_name LIKE :lname AND \" +\n           \"       first_name LIKE\
  \ :fname LIMIT 1\")\n    fun findByName(lname: String, fname: String): Employee\n\
  \n    @Query(\"SELECT * FROM employee\" +\n           \" WHERE uid = :uid\")\n \
  \   fun findById(uid: Int): Employee\n\n    @Insert\n    fun insert(vararg employees:\
  \ Employee): LongArray\n\n    @Update\n    fun update(vararg employees: Employee)\n\
  \n    @Delete\n    fun delete(vararg employees: Employee)\n}\n```\n\n可以看到，我们在这里使用了接口，这是因为完整的访问逻辑完全由方法签名和注解定义。此外，对于插入、更新和删除操作，方法签名就是\
  \ Room 所需的一切——它只需查看签名就能向数据库发送正确的命令。对于各种查询方法，我们使用 `@Query` 注解来提供正确的数据库命令。可以看出，Room\
  \ 足够智能，能够判断我们是想要返回对象列表还是单个对象。我们还可以通过使用 `:name` 标识符将方法参数传递到伪 SQL 中。\n\n`@Insert`\
  \ 注解允许添加属性 `onConflict = \"<strategy>\"`，用于指定当违反唯一键或主键约束时该怎么做。`<strategy>` 的可能值由常量给出：\n\
  \n- `OnConflictStrategy.ABORT`：中止事务\n- `OnConflictStrategy.FAIL`：使事务失败\n- `OnConflictStrategy.IGNORE`：忽略冲突\n\
  - `OnConflictStrategy.REPLACE`：直接替换实体并继续事务\n- `OnConflictStrategy.ROLLBACK`：回滚事务\n\
  \n先前使用的示例实体中的其他 DAO 看起来将非常相似——`PersonDao` 可能会执行外连接来组合 `Employee` 和 `Contact` 实体：\n\
  \n```kotlin\n@Dao\ninterface ContactDao {\n    @Insert\n    fun insert(vararg contacts:\
  \ Contact)\n\n    @Query(\"SELECT * FROM Contact WHERE uid = :uId\")\n    fun findById(uId:\
  \ Int): List<Contact>\n\n    @Query(\"SELECT * FROM Contact WHERE\" +\n        \
  \   \" employeeId = :employeeId\")\n    fun loadByEmployeeId(employeeId: Int): List<Contact>\n\
  }\n\ndata class Person(\n    @Embedded var name: Name?,\n    var emailAddr: String?\n\
  )\n\n@Dao\ninterface PersonDao {\n    @Query(\"SELECT * FROM empl\" +\n        \
  \   \" LEFT OUTER JOIN Contact ON\" +\n           \"     empl.uid = Contact.employeeId\"\
  \ +\n           \" WHERE empl.uid = :uId\")\n    fun findById(uId: Int): List<Person>\n\
  }\n```\n\n## 可观察查询\n\n除了执行查询并返回查询发生时的实体、实体列表或实体数组外，还可以检索查询结果，并注册一个观察者，该观察者在底层数据发生变化时被调用。\n\
  \n在 DAO 类中实现此目标的方法如下所示：\n\n```kotlin\n@Query(\"SELECT * FROM employee\")\nfun getAllSync():\
  \ LiveData<List<Employee>>\n```\n\n基本上，您将结果包装在 `LiveData` 类中，这可以应用于所有查询。\n\n然而，这仅在添加了相应的架构组件时才可能实现。为此，请将以下内容添加到模块的\
  \ `build.gradle` 文件中：\n\n```groovy\nimplementation \"androidx.lifecycle:\" +\n\"\
  lifecycle-livedata-ktx:2.4.1\"\n```\n\n现在，这个 `LiveData` 对象允许添加如下观察者：\n\n```kotlin\n\
  val ld: LiveData<List<Employee>> =\n    employeeDao.getAllSync()\nld.observeForever\
  \ { l ->\n    l?.forEach { empl ->\n        Log.e(\"LOG\", empl.toString())\n  \
  \      // do s.th. else with the employee\n    }\n}\n```\n\n这在观察者回调中更新 GUI 组件时特别有用。您的生产代码应该更好地进行正确的资源管理——如果使用了\
  \ `observeForever()` 方法，则应在代码中的适当位置调用 `ld.removeObserver(...)` 来取消注册观察者。\n\n为了更好的资源管理方案，`LiveData`\
  \ 对象还允许添加绑定到生命周期对象的观察者。操作如下：\n\n```kotlin\nval ld: LiveData<List<Employee>> =\n\
  \    employeeDao.getAllSync()\nval lcOwn : LifecycleOwner = ...\nld.observe(lcOwn,\
  \ { l ->\n    l?.forEach { empl ->\n        Log.e(\"LOG\", empl.toString())\n  \
  \      // do s.th. else with the employee\n    }\n})\n```\n\n例如，`AppCompatActivity`\
  \ 是一个可能的 `LifecycleOwner`，因此如果您能获取活动引用，只需编写：\n\n```kotlin\nval lcOwn : LifecycleOwner\
  \ = activity\n```\n\n有关生命周期对象的更多详细信息，请参阅 `androidx.compose.runtime.LiveData` 的在线\
  \ API 文档。\n\n另一种类似但可能更全面的向数据库代码添加可观察性的方法是使用 *RxJava*/*RxKotlin*，它是 Java/Kotlin 平台的\
  \ *ReactiveX* 实现。这里我们不介绍 *ReactiveX* 编程，但要将其纳入查询中，只需将结果包装到 RxJava 对象中。虽然不是完整的示例，但为了展示如何操作，例如您可以编写：\n\
  \n```kotlin\n@Query(\"SELECT * FROM employee\" +\n       \" WHERE uid = :uid\")\n\
  fun findByIdRx(uid: Int): Flowable<Employee> {\n    [...] // Wrap query results\
  \ into a Flowable\n}\n```\n\n这将返回一个 `Flowable`，允许*观察者*以异步方式*响应*检索到的数据库行。\n\n为此，您必须在构建文件中包含\
  \ RxJava 支持：\n\n```groovy\n// RxJava support for Room\nimplementation \"androidx.room:room-rxjava3:2.4.2\"\
  \n```\n\n有关 RxKotlin 的更多详细信息，请查阅关于 ReactiveX 的一般在线资源，或关于 RxKotlin（ReactiveX 的 Kotlin\
  \ 语言绑定）的资料。\n\n随着 Android Room 现在与 Kotlin 协程集成，您还可以使用一种真正的技术来将数据库访问与非抢占式并发相结合。只需在\
  \ DAO 方法中添加 `suspend` 关键字将其转换为挂起函数，或为返回列表添加 `Flow<>` 类型限定符。\n\n\n```java\n@Dao\n\
  interface ContactDao {\n    @Insert\n    suspend fun insert(vararg contacts: Contact)\n\
  \    @Query(\"SELECT * FROM Contact WHERE uid = :uId\")\n    suspend fun findById(uId:\
  \ Int): List<Contact>\n    @Query(\"SELECT * FROM Contact WHERE\" +\n          \
  \  \" employeeName like = '%' || :name || '%'\")\n    fun loadByEmployeeNameLike(name:\
  \ String):\n            Flow<List<Contact>\n}\n```\n\n## 数据库客户端\n\n要将 Room 实际集成到应用中，我们需要知道如何获取数据库和\
  \ DAO。为此，我们首先通过以下方式获取数据库的引用：\n\n```kotlin\nfun fetchDb() =\n    Room.databaseBuilder(\n\
  \        this, MyDatabase::class.java,\n        \"MyDatabase.db\")\n        .build()\n\
  val db = fetchDb()\n```\n\n这会创建一个基于文件的数据库。字符串参数是存储数据的文件名。要改为打开基于内存的数据库（例如用于测试目的，或者因为您更看重速度而不在意应用停止时的数据丢失），请使用：\n\
  \n```kotlin\nfun fetchDb() =\n    Room.inMemoryDatabaseBuilder(\n        this, MyDatabase::class.java)\n\
  \        .build()\nval db = fetchDb()\n```\n\n构建器允许以流畅的构建器风格进行某些配置活动。表 8-1 展示了有趣的配置选项。您只需在最终的\
  \ `.build()` 调用之前将它们链式连接即可。在早期开发阶段，您可能经常使用的一个选项是通过以下方式放宽前台操作限制：\n\n```kotlin\nfun\
  \ fetchDb() =\n    Room.databaseBuilder(\n        this, MyDatabase::class.java,\n\
  \        \"MyDatabase.db\")\n        .allowMainThreadQueries()\n        .build()\n\
  val db = fetchDb()\n```\n\n**表 8-1** Room 构建器选项\n\n| 选项 | 描述 |\n|---|---|\n| `addCallback(RoomDatabase.Callback)`\
  \ | 为此数据库添加一个 `RoomDatabase.Callback`。例如，您可以用它在数据库创建或打开时执行一些代码。 |\n| `allowMainThreadQueries()`\
  \ | 使用此选项可禁用 Room 中的非主线程限制。如果您不使用此选项并尝试在主线程中执行数据库操作，Room 将抛出异常。Room 这样做有充分的理由——与\
  \ GUI 相关的线程不应因冗长的数据库操作而被阻塞。因此，在您的代码中，不应调用此方法——它仅对避免处理异步性的实验有意义。 |\n| `addMigrations(vararg\
  \ Migration)` | 添加迁移计划。迁移将在接下来的“迁移数据库”部分中更详细地介绍。 |\n| `fallbackToDestructiveMigration()`\
  \ | 如果缺少匹配的迁移计划——即，对于从数据库*内部*的数据版本到 `@Database` 注解中指定的版本的必要升级，找不到已注册的迁移计划——Room\
  \ 通常会抛出异常。如果您希望清空当前数据库并从头开始为新版本构建数据库，请使用此方法。 |\n| `fallbackToDestructiveMigration(vararg\
  \ Int)` | 与前面的 `fallbackToDestructiveMigration()` 相同，但限制为特定的起始版本。对于所有其他版本，如果缺少迁移计划，将抛出异常。\
  \ |\n\n然后，一旦有了数据库对象，只需以抽象方式调用我们在数据库类中定义的任何 DAO 工厂方法——Room 会自动提供实现。因此，例如，编写：\n\n\
  ```kotlin\nval db = ...\nval employeeDao = db.employeeDao()\n// 使用 DAO...\n```\n\
  \n# 事务\n\nRoom 支持 `EXCLUSIVE` 模式的事务。这意味着如果事务 A 正在进行，则不允许其他进程或线程在事务 B 中访问数据库，直到事务\
  \ A 完成。更准确地说，事务 B 必须等待直到 A 完成。\n\n要在 Kotlin 中在一组数据库操作的事务内运行，您可以编写：\n\n```kotlin\n\
  val db = ...\ndb.runInTransaction { ->\n    // 执行数据库工作...\n}\n```\n\n如果闭包内的代码没有抛出任何异常，则事务标记为“成功”。否则，事务将被回滚。\n\
  \n### 迁移数据库\n\n为了将数据库从应用的一个版本迁移到另一个版本，您在访问数据库时添加迁移计划，如下所示：\n\n```kotlin\nval migs\
  \ = arrayOf(\n    object : Migration(1,2) {\n        override fun migrate(db: SupportSQLiteDatabase)\
  \ {\n            // 1->2 迁移的代码...\n            // 这已经在事务内运行，\n            // 不要在此处添加您自己的事务代码！\n\
  \        }\n    }, object : Migration(2,3) {\n        override fun migrate(db: SupportSQLiteDatabase)\
  \ {\n            // 2->3 迁移的代码...\n            // 这已经在事务内运行，\n            // 不要在此处添加您自己的事务代码！\n\
  \        }\n    } // 更多迁移...\n)\nprivate fun fetchDb() =\n    Room.databaseBuilder(\n\
  \        this, MyDatabase::class.java,\n        \"MyDatabase.db\")\n        .addMigrations(*migs)\n\
  \        .build()\n```\n\n在这里使用 DAO 类显然没有意义，因为您必须管理多个 DAO 变体，每个版本一个。这就是为什么在 `migrate()`\
  \ 方法内部，您需要在较低级别访问数据库，例如，通过执行与 Kotlin 对象无绑定的 SQL 语句。例如，假设您有一个 `Employee` 表，并且通过从版本\
  \ 1 升级到 2 需要添加一个“salary”列，并从版本 2 升级到 3 需要添加另一个“childCount”列。在前述代码的 `migs` 数组内部，您可以编写：\n\
  \n```kotlin\n//...\nobject : Migration(1,2) {\n    override fun migrate(db: SupportSQLiteDatabase)\
  \ {\n        db.execSQL(\"ALTER TABLE components \"+\n                \"ADD COLUMN\
  \ salary INTEGER DEFAULT 0;\")\n    }\n}\n//...\nobject : Migration(2,3) {\n   \
  \ override fun migrate(db: SupportSQLiteDatabase) {\n        db.execSQL(\"ALTER\
  \ TABLE components \"+\n                \"ADD COLUMN childCount INTEGER DEFAULT\
  \ 0;\")\n    }\n}\n//...\nobject : Migration(1,3) {\n    override fun migrate(db:\
  \ SupportSQLiteDatabase) {\n        db.execSQL(\"ALTER TABLE components \"+\n  \
  \              \"ADD COLUMN salary INTEGER DEFAULT 0;\")\n        db.execSQL(\"\
  ALTER TABLE components \"+\n                \"ADD COLUMN childCount INTEGER DEFAULT\
  \ 0;\")\n    }\n}\n//...\n```\n\n如果您提供了小步骤迁移以及大步骤迁移，后者将具有优先权。这意味着如果您有迁移计划 1 → 2、2\
  \ → 3 和 1 → 3，并且系统需要迁移 1 → 3，则计划 1 → 3 将运行，而不是链 1 → 2 → 3。\n\n## 调度\n\n考虑到用户体验，以异步方式运行任务是一个重要问题。确保没有冗长的操作干扰前端流程，避免给用户留下应用无法流畅运行的印象，这一点至关重要。然而，编写具有重要部分在后台运行的稳定应用并不容易。原因有很多：设备可能因需求或电池电量低而关机，或者用户可能启动了另一个优先级更高的更重要应用，期望以低优先级模式临时运行后台作业。此外，Android\
  \ 操作系统可能因资源短缺或超时条件等其他原因决定中断或推迟后台作业。随着 Android 8 的出现，考虑执行后台任务的巧妙方式变得更加重要，因为该版本对程序部分的后台执行施加了重要限制。\n\
  \n对于以异步方式运行作业，存在几种技术，它们各有优缺点：\n\n- **Java 线程** – Java 或 Kotlin 线程（请记住两者都针对相同的 Java\
  \ 虚拟机）是一种非常低级的技术，用于在后台运行任务。在 Kotlin 中，您可以使用像这样简单的构造：\n\n```kotlin\nThread{-> do\
  \ s.th.}.start()\n```\n\n来在后台线程中处理程序部分。这是一种非常基础的方法，您可以期望后台执行任务具有高性能。然而，您完全在任何 Android\
  \ 操作系统组件生命周期之外运行，因此当 Android 进程的生命周期状态发生变化时，您实际上无法很好地控制长时间运行的后台线程会发生什么。\n\n- **Java\
  \ 并发类**\n```\n\n\nJava 和 Kotlin 允许使用`java.util.concurrency`包中的并发相关类。这是一种在后台运行任务的高级方法，具有改进的后台任务管理能力，但其缺点仍然是在任何\
  \ Android 组件生命周期控制之外运行。\n\n* **Kotlin 协程**\n\nKotlin 协程引入了一种全新的软件设计模式来处理并发。函数可以转换为*挂起函数*，从而暂时将程序流交给其他挂起函数。\n\
  \n* **AlarmManager**\n\n该功能最初设计用于在非常特定的时间运行任务，如果你需要在特定时刻向用户发送通知，可以使用它。它自 API 级别\
  \ 1 就已存在。但从 API 级别 19（Android 4.4）开始，系统允许在某些条件下推迟闹钟。缺点是，你无法控制更一般的设备条件——当设备启动时，无论设备上发生什么，它都会自行决定触发闹钟事件。\n\
  \n* **SyncAdapter**\n\n此方法是在 Android API 级别 5 中添加的，它对于同步任务特别有用。对于更一般的后台执行任务，你应该改用下文描述的*JobScheduler*。仅当你需要其提供的额外功能时，才使用`SyncAdapter`。\n\
  \n* **JobScheduler**\n\n这是一个用于在 Android 操作系统上调度任务的集成库。它可以在 API 级别 21 及以上的任何设备上运行，这约占当前使用的\
  \ Android 设备的 98%。\n\n更底层的方法将在第 11 章中讨论。本节剩余部分将介绍*JobScheduler*和*AlarmManager*。\n\
  \n### JobScheduler\n\n`JobScheduler`是在 API 级别 21 及以上任何 Android 设备上调度和运行后台任务的专用方法。\n\
  \n> **注意**\n>\n> 此外，Android 8 的文档强烈建议使用`JobScheduler`来克服自 Android 8 以来强加的后台任务执行限制。\n\
  \n要开始使用`JobScheduler`，我们首先需要实现任务本身。为此，实现`android.app.job.JobService`类，例如：\n\n```kotlin\n\
  class MyJob : JobService() {\n    var jobThread: Thread? = null\n\n    override\
  \ fun onStartJob(params: JobParameters): Boolean {\n        Log.i(\"LOG\", \"MyJob:\
  \ onStartJob() : \" + params.jobId)\n        jobThread?.interrupt()\n        jobThread\
  \ = Thread {\n            Log.i(\"LOG\", \"started job thread\")\n            //\
  \ do job work...\n            jobFinished(params, false)\n            jobThread\
  \ = null\n            Log.i(\"LOG\", \"finished job thread\")\n        }\n     \
  \   jobThread.start()\n        return true\n    }\n\n    override fun onStopJob(params:\
  \ JobParameters): Boolean {\n        Log.i(\"LOG\", \"MyJob: onStopJob()\")\n  \
  \      jobThread?.interrupt()\n        jobThread = null\n        return true\n \
  \   }\n}\n```\n\n实现中最关键的部分是`onStartJob()`方法——在这里你需要输入任务实际应该执行的工作。请注意，我们将实际工作推入了一个线程。这一点很重要，因为`onStartJob()`在应用的主线程中运行，如果它停留时间过长，可能会阻塞其他重要工作。改为启动一个线程可以立即结束。同时我们返回`true`，表示任务在后台线程中继续工作。一旦任务完成，它必须调用`jobFinished()`；否则，系统将不知道任务已完成其工作。\n\
  重写的`onStopJob()`方法*不是*正常任务生命周期的一部分——它会在系统决定提前结束任务时被调用。我们让它返回`true`，以告诉系统，如果任务已相应配置，则允许其重新调度该任务。\n\
  \n要完成任务实现，我们仍然需要在`AndroidManifest.xml`中配置服务类。为此，添加：\n\n```xml\n<service\n    android:name=\"\
  .MyJob\"\n    android:permission=\"android.permission.BIND_JOB_SERVICE\" />\n```\n\
  \n这里配置的权限*不是*“危险”权限，因此你不必实现获取此权限的过程。但是，你必须在此处添加此权限；否则，任务将被忽略。\n\n要实际调度由`JobScheduler`管理的任务，你首先需要获取一个`JobScheduler`对象作为系统服务。然后，你可以构建一个`JobInfo`对象，最后将其注册到`JobScheduler`：\n\
  \n```kotlin\nval jsched = getSystemService(JobScheduler::class.java)\nval JOB_ID:\
  \ Int = 7766\nval service = ComponentName(this, MyJob::class.java)\nval builder\
  \ = JobInfo.Builder(JOB_ID, service)\n    .setMinimumLatency((1 * 1000).toLong())\n\
  \    // wait at least 1 sec\n    .setOverrideDeadline((3 * 1000).toLong())\n   \
  \ // maximum delay 3 secs\njsched.schedule(builder.build())\n```\n\n此示例调度任务最早在 1\
  \ 秒后启动，最晚在 3 秒后启动。通过构造，它被分配了 ID `7766`——这是一个传递给任务实现中`onStartJob()`的值。该数字仅是一个示例——你可以使用任何唯一的数字作为\
  \ ID。\n\n在构建`JobInfo`对象时，你可以设置各种任务特性，如表 8-2 所示。\n\n**表 8-2** `JobInfo.Builder`选项\n\
  \n| 方法 | 描述 |\n| --- | --- |\n| `setMinimumLatency(minLatencyMillis: Long)` | 此任务应延迟指定的时间或更长时间。\
  \ |\n| `setOverrideDeadline(maxExecutionDelayMillis: Long)` | 任务可以被延迟的最大时间。 |\n\
  | `setPeriodic(intervalMillis: Long)` | 使任务重复并设置重复间隔。实际间隔可能更长，但不会更短。 |\n| `setPeriodic(intervalMillis:\
  \ Long, flexMillis: Long)` | 使任务重复并设置重复间隔和灵活性窗口。因此实际间隔将在 *intervalMillis* − 0.5\
  \ · *flexMillis* 和 *intervalMillis* + 0.5 · *flexMillis* 之间。两个数字的最小可能值分别被限制为 `getMinPeriodMillis()`\
  \ 和 MAX(`getMinFlexMillis()`, 0.05 * intervalMillis)。 |\n| `setBackoffCriteria(initialBackoffMillis:\
  \ Long, backoffPolicy: Int)` | 当你在任务实现中编写 `jobFinished(params, true)` 时，可能会发生退避。这里指定了在这种情况下会发生什么。`backoffPolicy`\
  \ 的可能值由以下常量给出：<br> • `JobInfo.BACKOFF_POLICY_LINEAR`：退避以间隔 *initialBackoffMillis*\
  \ · *retry* − *number* 发生。<br> • `JobInfo.BACKOFF_POLICY_EXPONENTIAL`：退避以间隔 *initialBackoffMillis*\
  \ · 2^(*retry* − *number*) 发生。 |\n| `setExtras(extras: PersistableBundle)` | 设置可选的附加数据。这些附加数据会被传递给任务实现中的\
  \ `onStartJob()`。 |\n| `setTransientExtras(extras: Bundle)` | 仅适用于 API 级别 26 及更高版本。设置可选的未持久化附加数据。这些附加数据会被传递给任务实现中的\
  \ `onStartJob()`。 |\n| `setPersisted(isPersisted: Boolean)` | 任务是否在设备重启后持久化。需要权限\
  \ `android.Manifest.permission.RECEIVE_BOOT_COMPLETED`。 |\n| `setRequiredNetworkType(networkType:\
  \ Int)` | 指定任务运行需要满足的附加条件。可能的参数值为：<br> • `JobInfo.NETWORK_TYPE_NONE`<br> • `JobInfo.NETWORK_TYPE_ANY`<br>\
  \ • `JobInfo.NETWORK_TYPE_UNMETERED`<br> • `JobInfo.NETWORK_TYPE_NOT_ROAMING`<br>\
  \ • `JobInfo.NETWORK_TYPE_METERED` |\n| `setRequiresBatteryNotLow(batteryNotLow:\
  \ Boolean)` | 仅适用于 API 级别 26 及更高版本。指定任务运行需要满足的附加条件，即电池电量不能低。False 表示不关心。 |\n| `setRequiresCharging(requiresCharging:\
  \ Boolean)` | 指定任务运行需要满足的附加条件，即设备必须已插入电源。False 表示不关心。 |\n| `setRequiresDeviceIdle(requiresDeviceIdle:\
  \ Boolean)` | 指定任务运行需要满足的附加条件，即设备必须处于空闲状态。False 表示不关心。 |\n\n\n\n`setRequiresStorageNotLow(storageNotLow:\
  \ Boolean)` |\n仅适用于 API 级别 26 及以上。指定任务运行需要满足的额外条件，即设备内存不得处于低水平。`False` 表示重置为不关心此条件。\
  \ |\n\n`addTriggerContentUri(uri: JobInfo.TriggerContentUri)` |\n仅适用于 API 级别 24\
  \ 及以上。添加一个内容 URI 以监听其变化。如果内容发生变化，任务将被执行。 |\n\n`setTriggerContentUpdateDelay(durationMs:\
  \ Long)` |\n仅适用于 API 级别 24 及以上。设置从检测到内容变化到任务被调度之间的最小延迟时间（毫秒）。 |\n\n`setTriggerContentMaxDelay(durationMs:\
  \ Long)` |\n仅适用于 API 级别 24 及以上。设置从首次检测到内容变化到任务被调度之间允许的最大总延迟时间（毫秒）。 |\n\n`setClipData(clip:\
  \ ClipData, grantFlags: Int)` |\n仅适用于 API 级别 26 及以上。设置与此任务关联的 `ClipData`。`grantFlags`\
  \ 的可能取值包括 `FLAG_GRANT_READ_URI_PERMISSION`、`FLAG_GRANT_WRITE_URI_PERMISSION` 和 `FLAG_GRANT_PREFIX_URI_PERMISSION`（均为\
  \ `Intent` 类中的常量）。 |\n\n## AlarmManager\n\n如果你需要在特定时间执行操作，无论相关组件是否正在运行，`AlarmManager`\
  \ 就是你可以用于此类任务的系统服务。\n\n关于 `AlarmManager` 的相关事宜，你的设备可能处于以下状态之一：\n\n- **设备唤醒**：设备正在运行。通常这也意味着屏幕亮起，但无法保证如果屏幕关闭，设备就不再处于唤醒状态。不过，通常当屏幕关闭后，设备很快会离开唤醒状态。具体细节取决于硬件和设备的软件配置。如果设备处于唤醒状态，`AlarmManager`\
  \ 可以正常工作，但唤醒状态并非 `AlarmManager` 触发事件的必要条件——请参见下文的其他状态。\n\n- **设备锁定**：设备已锁定，用户需要解锁后才能再次操作。设备锁定*可能*会导致设备进入休眠状态；然而，锁定本身是一种安全措施，对\
  \ `AlarmManager` 的功能没有直接影响。\n\n- **设备休眠**：屏幕关闭，设备以低功耗模式运行。由 `AlarmManager` 触发的事件能够唤醒设备，然后触发相应操作，但这需要明确指定。\n\
  \n- **设备关机**：`AlarmManager` 停止工作，并且只有在下一次设备开机时才会恢复工作。设备关机时，闹钟事件会丢失——这里没有重试功能。\n\n\
  闹钟事件可以是以下之一：\n\n- 触发一个 `PendingIntent`。由于 `PendingIntent` 可以针对服务、Activity 或广播，因此闹钟事件可以启动一个\
  \ Activity、一个服务或发送一条广播。\n\n- 调用一个*处理器（handler）*。这是将闹钟事件直接发送到发出闹钟的同一组件的一种方式。\n\n\
  为了调度闹钟，你需要首先以如下方式获取 `AlarmManager` 作为系统服务：\n\n```kotlin\nval alrm = getSystemService(AlarmManager::class.java)\n\
  ```\n\n然后，你可以通过多种方法发出闹钟，如表 8-3 所示。如果对于 API 级别 24 及更高版本，你选择使用监听器接收闹钟事件，关于如何使用相关处理器的详细信息将在第\
  \ 11 章的“多线程”部分介绍。如果目标是 Intent，则所有对应的方法都有一个 `type: Int` 参数，其可能取值如下：\n\n### 表 8-3\
  \ 发出闹钟\n\n| 方法 | 描述 |\n| --- | --- |\n| `set(type: Int, triggerAtMillis: Long, operation:\
  \ PendingIntent): Unit` | 调度一个闹钟。根据提供的类型和时间参数触发一个 Intent。从 API 级别 19 开始，闹钟事件的传递可能不精确，以优化系统资源使用。如果你需要精确传递，请使用某个\
  \ \"setExact\" 方法。 |\n| `set(type: Int, triggerAtMillis: Long, tag: String, listener:\
  \ AlarmManager.OnAlarmListener, targetHandler: Handler): Unit` | 需要 API 级别 24 或更高。这是\
  \ `set(Int, Long, PendingIntent)` 的直接回调版本。Handler 参数可以为 `null`，表示在应用的主 looper 上调用监听器。否则，监听器的调用将在提供的处理器内部执行。\
  \ |\n| `setAlarmClock(info: AlarmManager.AlarmClockInfo, operation: PendingIntent):\
  \ Unit` | 需要 API 级别 21 或更高。调度一个由闹钟表示的闹钟。闹钟信息对象允许添加一个 Intent，该 Intent 能够描述触发器。系统可能会选择向用户显示此闹钟的信息。除此之外，此方法类似于\
  \ `setExact(Int, Long, PendingIntent)`，但隐含了 `RTC_WAKEUP` 触发类型。 |\n| `setAndAllowWhileIdle(type:\
  \ Int, triggerAtMillis: Long, operation: PendingIntent): Unit` | 需要 API 级别 23 或更高。类似于\
  \ `set(Int, Long, PendingIntent)`，但此闹钟即使系统处于低功耗空闲模式也允许执行。 |\n| `setExact(type: Int,\
  \ triggerAtMillis: Long, operation: PendingIntent): Unit` | 需要 API 级别 19 或更高。调度一个在指定时间精确传递的闹钟。\
  \ |\n| `setExact(type: Int, triggerAtMillis: Long, tag: String, listener: AlarmManager.OnAlarmListener,\
  \ targetHandler: Handler): Unit` | 需要 API 级别 24 或更高。这是 `setExact(Int, Long, PendingIntent)`\
  \ 的直接回调版本。Handler 参数可以为 `null`，表示在应用的主 looper 上调用监听器。否则，监听器的调用将在提供的处理器内部执行。 |\n\
  | `setExactAndAllowWhileIdle(type: Int, triggerAtMillis: Long, operation: PendingIntent):\
  \ Unit` | 需要 API 级别 23 或更高。类似于 `setExact(Int, Long, PendingIntent)`，但此闹钟即使系统处于低功耗空闲模式也允许执行。\
  \ |\n| `setInexactRepeating(type: Int, triggerAtMillis: Long, intervalMillis: Long,\
  \ operation: PendingIntent): Unit` | 调度一个具有不精确触发时间要求的重复闹钟，例如，每小时重复一次的闹钟，但不一定在每个整点时刻触发。\
  \ |\n| `setRepeating(type: Int, triggerAtMillis: Long, intervalMillis: Long, operation:\
  \ PendingIntent): Unit` | 调度一个重复闹钟。从 API 级别 19 开始，此方法等同于 `setInexactRepeating()`。\
  \ |\n| `setWindow(type: Int, windowStartMillis: Long, windowLengthMillis: Long,\
  \ operation: PendingIntent): Unit` | 调度一个在指定时间窗口内传递的闹钟。 |\n| `setWindow(int type:\
  \ Int, windowStartMillis: Long, windowLengthMillis: Long, tag: String, listener:\
  \ AlarmManager.OnAlarmListener, targetHandler: Handler): Unit` | 需要 API 级别 24 或更高。这是\
  \ `setWindow(int, long, long, PendingIntent)` 的直接回调版本。Handler 参数可以为 `null`，表示在应用的主\
  \ looper 上调用监听器。否则，监听器的调用将在提供的处理器内部执行。 |\n\n`type` 参数可以是以下常量之一：\n\n- **`AlarmManager.RTC_WAKEUP`**：时间参数为\
  \ UTC 挂钟时间（自 1970 年 1 月 1 日 00:00:00 以来的毫秒数）。必要时将唤醒设备。\n- **`AlarmManager.RTC`**：时间参数为\
  \ UTC 挂钟时间（自 1970 年 1 月 1 日 00:00:00 以来的毫秒数）。如果设备处于休眠状态，事件将被丢弃，不会触发闹钟。\n- **`AlarmManager.ELAPSED_REALTIME_WAKEUP`**：时间参数为自上次启动以来经过的时间（毫秒），包括休眠时间。必要时将唤醒设备。\n\
  - **`AlarmManager.ELAPSED_REALTIME`**：时间参数为自上次启动以来经过的时间（毫秒），包括休眠时间。不保证唤醒设备。\n\n\n\
  \n"
- "# 时间参数\n\n`Time` 参数是指自上次启动以来经过的毫秒数（包含睡眠时间）。如果设备处于休眠状态，该事件将被丢弃，不会触发任何闹钟。\n\n`AlarmManager`\
  \ 还包含一些辅助方法。表 8-4 对这些方法进行了汇总。\n\n**表 8-4** `AlarmManager` 的辅助方法\n\n| 方法 | 描述 |\n\
  | --- | --- |\n| `cancel(operation: PendingIntent) : Unit` | 移除所有与指定`Intent`匹配的闹钟。\
  \ |\n| `cancel(listener: AlarmManager.OnAlarmListener): Unit` | 移除所有计划发送给指定`AlarmManager.OnAlarmListener`的闹钟。\
  \ |\n| `getNextAlarmClock() : AlarmManager.AlarmClockInfo` | 获取当前计划的下一个闹钟的信息。 |\n\
  | `setTime(long millis): Unit` | 设置系统壁钟时间（UTC，自 1970 年 1 月 1 日 00:00:00 以来的毫秒数）。\
  \ |\n| `setTimeZone(String timeZone): Unit` | 设置系统的持久默认时区。 |\n\n### 通知\n\n通知是应用可以在其正常\
  \ GUI 流程之外向用户呈现的消息。通知会显示在屏幕的特定区域，最显著的是在状态栏和屏幕顶部的通知抽屉中，此外也会出现在特殊对话框、锁屏、配对的 Android\
  \ Wear 设备或应用图标角标上。智能手机上的示例请参见图 8-1 和图 8-2。在这些图中，您可以看到通知图标以及用户展开通知抽屉后的通知内容。\n\n![](img/463716_2_En_8_Fig2_HTML.jpg)\n\
  \n一张安卓智能手机通知栏的截图。\n\n*图 8-2* 通知内容\n\n![](img/463716_2_En_8_Fig1_HTML.jpg)\n\n一张通知截图，有三个选项卡，其中包含一个箭头指向的信息图标。\n\
  \n*图 8-1* 智能手机通知\n\n通知还支持操作，例如点击时调用自定义活动，或者它们可以包含特殊的操作按钮，甚至包含用户可填写的编辑字段。同样，尽管通知最初只设计用于显示简短的文本片段，但在当前的\
  \ Android 版本中，也可以呈现较长的文本。\n\n在线 API 文档建议使用支持库中的 `NotificationCompat` API。使用这个兼容层可以让旧版本在仅在新版本中才可用的功能上呈现类似或空操作变体，从而简化开发。虽然使用这个兼容层减轻了开发者在代码中编写许多分支以处理不同\
  \ Android API 级别的负担，但必须注意避免应用因过度依赖最新的通知 API 功能而变得不可用。\n\n为了确保 Android Studio 中您的项目可以使用兼容性\
  \ API，请检查模块的 `build.gradle` 文件是否在 \"dependencies\" 部分包含以下内容：\n\n```\ndependencies\
  \ {\n    implementation \"androidx.core:core:1.6.0\"\n    ...\n}\n```\n\n以下各节概述了通知\
  \ API——随着该 API 在过去几年中大幅增长，建议用户查阅在线文档以获取所有通知功能的更详细描述：[`https://developer.android.com/guide/topics/ui/notifiers/notifications`](https://developer.android.com/guide/topics/ui/notifiers/notifications)。\n\
  \n## 创建和显示通知\n\n要创建并显示通知，您需要准备触控操作和额外操作按钮的 `Intent`，使用通知构建器构建通知，注册通知渠道，最后让框架显示通知。示例如下：\n\
  \n```\nval NOTIFICATION_CHANNEL_ID = \"1\"\nval NOTIFICATION_ID = 1\n\n// 确保该 Activity\
  \ 存在\nval intent = Intent(this, AlertDetails::class.java)\nintent.flags = Intent.FLAG_ACTIVITY_NEW_TASK\n\
  // 或 Intent.FLAG_ACTIVITY_CLEAR_TASK\nval tapIntent = PendingIntent.getActivity(this,\
  \ 0, intent, 0)\n\n// 确保该广播接收器存在，并且可以通过像这样的显式 Intent 调用\nval actionIntent = Intent(this,\
  \ MyReceiver::class.java)\nactionIntent.action = \"com.xyz.MAIN\"\nactionIntent.putExtra(EXTRA_NOTIFICATION_ID,\
  \ 0)\nval actionPendingIntent = PendingIntent.getBroadcast(this, 0, actionIntent,\
  \ 0)\n\nval builder = NotificationCompat.Builder(this, NOTIFICATION_CHANNEL_ID)\n\
  \    .setSmallIcon( ... 一个图标资源 ID... )\n    .setContentTitle(\"标题\")\n    .setContentText(\"\
  内容 内容 内容 内容 ...\")\n    .setPriority(NotificationCompat.PRIORITY_DEFAULT)\n    //\
  \ 添加默认的点击操作\n    .setContentIntent(tapIntent)\n    .setAutoCancel(true)\n    //\
  \ 添加自定义操作按钮\n    .addAction( ... 一个图标资源 ID ..., \"前往\", actionPendingIntent)\nbuildChannel(NOTIFICATION_CHANNEL_ID)\n\
  val notificationManager = NotificationManagerCompat.from(this)\nnotificationManager.notify(NOTIFICATION_ID,\
  \ builder.build())\n```\n\n`buildChannel()` 函数在 Android API 级别 26（Android 8.0）及更高版本中是必需的——其代码如下：\n\
  \n```\nfun buildChannel(channelId:String) {\n    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O)\
  \ {\n        // 创建 NotificationChannel，但仅在\n        // API 26+ 之后才需要这样做\n      \
  \  val channel = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {\n       \
  \     NotificationChannel(channelId,\n                \"渠道名称\",\n              \
  \  NotificationManager.IMPORTANCE_DEFAULT)\n        } else {\n            throw\
  \ RuntimeException(\"内部错误\")\n        }\n        channel.description = \"描述\"\n\
  \        // 向系统注册该渠道\n        val notificationManager = if (Build.VERSION.SDK_INT\
  \ >= Build.VERSION_CODES.M) {\n            getSystemService(NotificationManager::class.java)\n\
  \        } else {\n            throw RuntimeException(\"内部错误\")\n        }\n   \
  \     notificationManager.createNotificationChannel(channel)\n    }\n}\n```\n\n\
  以下是对其他代码的解释：\n\n- 通知本身需要一个唯一 ID；我们将其保存在 `NOTIFICATION_ID` 中。\n- 示例中的操作按钮（此处用于发送广播）仅作示例——可以没有操作按钮。\n\
  - `setAutoCancel(true)` 将导致用户在点击通知后自动解除通知。这仅在与 `setContentIntent()` 一起使用时才有效。\n\
  - 仅在 API 级别 26（Android 8.0）或更高版本时才需要创建通知渠道。外部 \"if\" 中的多余检查是为避免 Android Studio 提示兼容性问题所必需的。\n\
  - 对于所有字符串，如果可行，应使用资源 ID；否则，请使用更适合您需求的文本。\n\n## 添加直接回复\n\n从 API 级别 24（Android 7.0）开始，新增了用户输入文本作为通知消息回复的功能。这的一个主要用例当然是来自聊天客户端或电子邮件等消息系统的通知消息。示例如图\
  \ 8-3 所示。\n\n![](img/463716_2_En_8_Fig3_HTML.jpg)\n\n一张安卓智能手机通知栏的截图。其中包含一个回复通知。\n\
  \n*图 8-3* 回复通知\n\n由于低于 24 的 API 级别无法提供此功能，您的应用不应依赖此功能。通常这很容易实现——对于 API 级别 23 及更低版本，通过点击通知调用的活动当然可以在需要时包含回复功能。\n\
  \n一个发出带有回复功能通知的方法可能如下所示：\n\n\n```kotlin\nfun directReply(view:View) {\n    // 用于传递操作意图中字符串的键。\n\
  \    val KEY_TEXT_REPLY = \"key_text_reply\"\n    val remoteInput = RemoteInput.Builder(KEY_TEXT_REPLY)\n\
  \        .setLabel(\"回复标签\")\n        .build()\n    // 确保此广播接收器存在\n    val CONVERSATION_ID\
  \ = 1\n    val messageReplyIntent = Intent(this, MyReceiver2::class.java)\n    messageReplyIntent.action\
  \ = \"com.xyz2.MAIN\"\n    messageReplyIntent.putExtra(\"conversationId\", CONVERSATION_ID)\n\
  \    // 构建用于触发回复操作的 PendingIntent。\n    val replyPendingIntent = PendingIntent.getBroadcast(applicationContext,\n\
  \        CONVERSATION_ID,\n        messageReplyIntent,\n        PendingIntent.FLAG_UPDATE_CURRENT)\n\
  \    // 创建回复操作并添加远程输入。\n    val action = NotificationCompat.Action.Builder(\n  \
  \      ... 图标资源 ID ...,\n        \"回复\", replyPendingIntent)\n        .addRemoteInput(remoteInput)\n\
  \        .build()\n    val builder = NotificationCompat.Builder(this, NOTIFICATION_CHANNEL_ID)\n\
  \        .setSmallIcon(... 图标资源 ID ...)\n        .setContentTitle(\"标题\")\n    \
  \    .setContentText(\"内容 内容 内容 ...\")\n        .setPriority(NotificationCompat.PRIORITY_DEFAULT)\n\
  \        // 添加回复操作按钮\n        .addAction(action)\n    buildChannel(NOTIFICATION_CHANNEL_ID)\n\
  \    val notificationManager = NotificationManagerCompat.from(this)\n    notificationManager.notify(NOTIFICATION_ID,\
  \ builder.build())\n}\n```\n\n以下是关于此代码的一些说明：\n\n- `KEY_TEXT_REPLY` 用于在意图接收器中标识回复文本。\n\
  - `CONVERSATION_ID` 用于标识对话链——在这里，通知和接收回复的意图必须知道它们彼此关联。\n- 如同往常，请确保在生产代码中使用字符串资源和合适的文本。\n\
  \n当通知显示时，它将包含一个“回复”按钮，当用户按下它时，系统会询问一些回复文本，然后将其发送到意图接收器（示例中的 `messageReplyIntent`）。\n\
  \n用于回复文本的意图接收器可能有一个接收回调，看起来像这样：\n\n```kotlin\noverride fun onReceive(context: Context,\
  \ intent: Intent) {\n    Log.e(\"LOG\", intent.toString())\n    val KEY_TEXT_REPLY\
  \ = \"key_text_reply\"\n    val remoteInput = RemoteInput.getResultsFromIntent(intent)\n\
  \    val txt = remoteInput?.getCharSequence(KEY_TEXT_REPLY)?:\"undefined\"\n   \
  \ val conversationId = intent.getIntExtra(\"conversationId\",0)\n    Log.e(\"LOG\"\
  ,\"回复文本 = \" + txt)\n    // 对回复内容进行相应处理...\n    // 构建一个新通知，告知用户系统已处理他们与之前通知的交互。\n\
  \    val NOTIFICATION_CHANNEL_ID = \"1\"\n    val repliedNotification = NotificationCompat.Builder(context,\
  \ NOTIFICATION_CHANNEL_ID)\n        .setSmallIcon(android.R.drawable.ic_media_play)\n\
  \        .setContentText(\"已回复\")\n        .build()\n    buildChannel(NOTIFICATION_CHANNEL_ID)\n\
  \    // 发出新通知。\n    val notificationManager = NotificationManagerCompat.from(context)\n\
  \    notificationManager.notify(conversationId, repliedNotification)\n}\n```\n\n\
  此方法：\n\n- 通过使用与回复输入相同的键，调用 `RemoteInput.getResultsFromIntent()` 来获取回复文本\n- 获取我们作为额外值添加到\
  \ Intent 中的对话 ID\n- 执行处理回复所需的任何操作\n- 通过设置另一个通知来对回复作出回应\n\n## 通知进度条\n\n要向通知添加进度条，请在构建器中添加：\n\
  \n```kotlin\n.setProgress(PROGRESS_MAX, PROGRESS_CURRENT, false)\n```\n\n其中 `PROGRESS_MAX`\
  \ 是最大整数值，`PROGRESS_CURRENT` 在开始时为 0。或者，如果你想要一个不确定的进度条，你可以使用：\n\n```kotlin\n.setProgress(0,\
  \ 0, true)\n```\n\n在执行工作的后台线程中，你可以通过定期执行以下代码来更新确定的进度条：\n\n```kotlin\nbuilder.setProgress(PROGRESS_MAX,\
  \ currentProgress, false)\nnotificationManager.notify(NOTIFICATION_ID, builder.build())\n\
  ```\n\n并传入新的 `currentProgress` 值。\n\n要完成确定的或不确的进度条，你可以编写：\n\n```kotlin\nbuilder.setContentText(\"\
  下载完成\")\n    .setProgress(0,0,false)\nnotificationManager.notify(NOTIFICATION_ID,\
  \ builder.build())\n```\n\n## 可展开通知\n\n通知不仅仅可以包含短消息。使用可展开功能，还可以向用户显示更多信息。有关如何执行的详细信息，请查阅在线文档：例如，在你常用的搜索引擎中输入“Android\
  \ 创建可展开通知”来查找相应的页面。\n\n## 修正活动导航\n\n为了改善用户体验，从通知内部启动的活动可以添加其预期的任务行为。例如，如果按下返回按钮，会调用堆栈中的下一个活动。为此，你必须在\
  \ `AndroidManifest.xml` 中定义活动层次结构，例如，如下所示：\n\n```xml\n...\n```\n\n然后你可以使用 `TaskStackBuilder`\
  \ 为调用的 Intent 填充任务栈：\n\n```kotlin\n// 为你要启动的活动创建 Intent\nval resultIntent = Intent(this,\
  \ ResultActivity::class.java)\n// 创建 TaskStackBuilder\nval stackBuilder = TaskStackBuilder.create(this)\n\
  stackBuilder.addNextIntentWithParentStack(resultIntent)\n// 获取包含返回栈的 PendingIntent\n\
  val resultPendingIntent = stackBuilder.getPendingIntent(0, PendingIntent.FLAG_UPDATE_CURRENT)\n\
  // -> 这可以在构建器内部用于 .setContentIntent()\n```\n\n有关活动和任务管理的更多详细信息，请参阅第 3 章的“活动和任务”部分。\n\
  \n## 通知分组\n\n从 API 级别 24（Android 7.0）开始，可以对通知进行分组，以改进对以某种方式相关的多个通知的呈现。要创建这样的组，你只需添加：\n\
  \n```kotlin\n.setGroup(GROUP_KEY)\n```\n\n到构建器链中，其中 `GROUP_KEY` 是你选择的字符串。如果你需要自定义排序（默认按接收日期排序），你可以使用构建器中的\
  \ `setSortKey()` 方法。然后按照该键进行字典序排序。通知抽屉内的分组可能看起来像图 8-4 所示。\n\n![一张安卓智能手机通知栏截图。它展示了通知分组。](img/463716_2_En_8_Fig4_HTML.jpg)\n\
  \n**图 8-4** 通知组\n\n对于低于 24 的 API 级别，其中没有 Android 管理的分组自动摘要，你可以添加一个通知摘要。只需像创建任何其他通知一样创建一个通知，但额外在构建器链中调用\
  \ `.setGroupSummary(true)`。确保组中的所有通知*以及*摘要都使用相同的 `setGroup(GROUP_KEY)`。\n\n> **注意**\n\
  >\n> 似乎在至少 API 级别 27 中存在一个错误，你*必须*添加一个摘要通知才能启用分组。因此建议是，无论你的目标 API 级别是什么，都添加一个通知摘要。\n\
  \n对于摘要，你可能希望调整显示样式，以显示适当数量的摘要项目。为此，你可以使用如下结构：\n\n```kotlin\n.setStyle(NotificationCompat.InboxStyle()\n\
  \    .addLine(\"宇宙大师           去玩吃豆人\")\n    .addLine(\"Silvia Cheng         今晚派对\"\
  )\n    .setBigContentTitle(\"2 条新消息\")\n    .setSummaryText(\"xyz@example.com\"\
  ))\n```\n\n放在构建器链内部。\n\n## 通知渠道\n\n从 Android 8.0 或 API 级别 26 开始，引入了另一种通过*通知渠道*对通知进行分组的方式。其背后的理念是赋予设备用户更多控制权，让他们决定系统如何对通知进行分类和优先级排序，以及通知如何呈现给用户。\n\
  \n要创建通知渠道，你编写：\n```\n\n\n```kotlin\nif (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O)\
  \ {\n    // 创建通知渠道，但仅在 API 26 及以上版本中需要\n    val channel = if (Build.VERSION.SDK_INT\
  \ >=\n        Build.VERSION_CODES.O) {\n            NotificationChannel(channelId,\n\
  \                \"渠道名称\",\n                NotificationManager.IMPORTANCE_DEFAULT)\n\
  \        } else {\n            throw RuntimeException(\"内部错误\")\n        }\n   \
  \ channel.description = \"描述\"\n    // 向系统注册通知渠道\n    val notificationManager =\n\
  \        if (Build.VERSION.SDK_INT >=\n            Build.VERSION_CODES.M) {\n  \
  \              getSystemService(\n                    NotificationManager::class.java)\n\
  \            } else {\n                throw RuntimeException(\"内部错误\")\n      \
  \      }\n    notificationManager.\n        createNotificationChannel(channel)\n\
  }\n```\n\n我们在前面的章节中已经看到了这段代码。就 Kotlin 语言风格而言，它看起来有点笨拙——引入了多余的 `if` 结构，是为了避免 Android\
  \ Studio 对兼容性问题发出警告。请根据你的需求，在通知渠道的构造函数中调整渠道 ID、渠道名称和重要性等级，就像调整描述文本一样。\n\n顺便提一下，最后一行中的\
  \ `createNotificationChannel()` 方法是幂等的——如果具有相同特征的渠道已经存在，则不会发生任何操作。`NotificationChannel`\
  \ 构造函数中可能的重要性等级包括：`IMPORTANCE_HIGH`（声音和横幅通知）、`IMPORTANCE_DEFAULT`（声音）、`IMPORTANCE_LOW`（无声音）以及\
  \ `IMPORTANCE_MIN`（既无声音也不显示在状态栏中）。\n\n虽然通知渠道的处理方式取决于用户，但在你的代码中，你仍然可以使用 `NotificationChannel`\
  \ 对象的某个 `get*()` 方法来读取用户所做的设置，你可以通过 `getNotificationChannel()` 或 `getNotificationChannels()`\
  \ 从管理器获取该对象。详情请参阅在线 API 文档。\n\n还有一个通知渠道设置界面，你可以通过以下方式调用：\n\n```kotlin\nval intent\
  \ = Intent(\n    Settings.ACTION_CHANNEL_NOTIFICATION_SETTINGS)\nintent.putExtra(Settings.EXTRA_APP_PACKAGE,\n\
  \    getPackageName())\nintent.putExtra(Settings.EXTRA_CHANNEL_ID,\n    myNotificationChannel.getId())\n\
  startActivity(intent)\n```\n\n你还可以通过将通知渠道分组来进一步组织它们，例如，将工作相关渠道和私人类型渠道分开。要创建一个分组，你可以这样编写：\n\
  \n```kotlin\nval groupId = \"my_group\"\n// 用户可见的分组名称。\nval groupName = \"分组名称\"\
  \nval notificationMngr =\n    getSystemService(Context.NOTIFICATION_SERVICE)\n \
  \       as NotificationManager\nnotificationMngr.createNotificationChannelGroup(\n\
  \    NotificationChannelGroup(groupId, groupName))\n```\n\n然后，你可以通过每个通知渠道的 `setGroup()`\
  \ 方法将其添加到该分组中。\n\n## 通知徽章\n\n从 Android 8.0 或 API 级别 26 开始，一旦通知到达系统，应用图标上就会显示一个通知徽章——见图\
  \ 8-5。\n\n![Gmail 的通知徽章。](img/463716_2_En_8_Fig5_HTML.png)\n\n**图 8-5** 通知徽章\n\n\
  你可以通过表 8-5 列出的 `NotificationChannel` 方法之一来控制此徽章。\n\n**表 8-5** 通知徽章\n\n| 方法 | 描述\
  \ |\n| --- | --- |\n| `setShowBadge(Boolean)` | 是否显示徽章。 |\n| `setNumber(Int)` |\
  \ 长按带有徽章的应用图标将显示已到达的通知数量。你可以通过此方法根据需要调整该数字。 |\n| `setBadgeIconType(Int)` | 长按带有徽章的应用图标将显示与通知关联的图标。你可以通过此方法调整图标大小。可能的取值在\
  \ `NotificationCompat` 类中以常量形式提供：`BADGE_ICON_NONE`、`BADGE_ICON_SMALL` 和 `BADGE_ICON_LARGE`。\
  \ |\n\n# 联系人\n\n管理和使用联系人是手持设备必须胜任的任务之一。毕竟，手持设备，尤其是智能手机，经常用于与其他人通信，而联系人则是代表个人、群组、公司或其他“事物”的抽象实体，作为通信需求的地址点。\n\
  \n联系人如此重要，内置的联系人框架在 Android 的发展历程中已变得相当复杂。幸运的是，如果我们只关注后端部分，并省略本书其他章节描述的用户界面特性，那么复杂性可以有所降低。关于联系人框架的描述，剩下的内容包括：\n\
  \n-   查看内部机制，特别是使用的数据库模型\n-   了解如何读取联系人数据\n-   了解如何写入联系人数据\n-   调用系统活动来处理单个联系人\n\
  -   同步联系人\n-   使用快速联系人徽章\n\n### 联系人框架内部机制\n\n与联系人框架通信的基本类是 `android.content.ContentResolver`\
  \ 类。这非常合理，因为联系人数据非常适合内容提供者处理。因此，你通常会使用内容提供者操作来处理联系人数据。参见第 6 章。\n\n数据模型由三个主要表组成：*联系人*、*原始联系人*和*数据*表。此外，还存在一些用于管理任务的辅助表。你通常不需要处理任何形式的直接表访问，但如果你感兴趣，可以查看在线联系人框架文档以及\
  \ `ContactsContract` 类的文档，后者详细描述了联系人的内容提供者契约。\n\n如果你想直接查看联系人表，可以使用 ADB（针对虚拟设备或已\
  \ root 的设备），在终端中通过 `cd SDK_INST/platform-tools ; ./adb root ; ./adb shell` 创建对设备的\
  \ shell 访问——参见第 19 章“SDK 平台工具”部分——然后从那里按如下方式调查表：\n\n```bash\ncd /data\nfind . -name\
  \ 'contacts*.db'\n"
- "# \nsqlite3 \n```\n\n例如，输入 `.header on` 打开表头输出，`.tables` 列出所有表名，`select * from\
  \ raw_contacts;` 列出原始联系人表。\n\n### 读取联系人\n\n为了读取一定数量的联系人（可能基于某些条件），你最好使用 `ViewModel`\
  \ 作为视图数据持有者，用 `LiveData` 包装模型元素以确保模型更改能反映在屏幕重绘上，应用协程异步加载数据，并采用 Jetpack Compose 库实现优雅的前端设计。\n\
  \n> **注意：** 以前你会使用加载器，但这些已被弃用。使用 `ViewModel`、`LiveData`、协程和 Jetpack Compose 的组合可以确保你紧跟最新、最优雅的\
  \ Android 开发技术。\n\n为了让这一切生效，请将以下依赖项添加到 `build.gradle` 中：\n\n```groovy\ndef compose_version\
  \ = '1.1.1'\nimplementation 'androidx.core:core-ktx:1.7.0'\nimplementation \"androidx.compose.ui:\"\
  \ +\n    \"ui:$compose_version\"\nimplementation \"androidx.compose.foundation:\"\
  \ +\n    \"foundation:$compose_version\"\nimplementation \"androidx.compose.material:\"\
  \ +\n    \"material:$compose_version\"\nimplementation \"androidx.compose.ui:\"\
  \ +\n    \"ui-tooling-preview:$compose_version\"\nimplementation 'androidx.lifecycle:'\
  \ +\n    'lifecycle-runtime-ktx:2.3.1'\nimplementation 'androidx.lifecycle:' +\n\
  \    'lifecycle-extensions:2.2.0'\nimplementation \"androidx.lifecycle:\" +\n  \
  \  \"lifecycle-livedata-ktx:2.4.1\"\nimplementation \"androidx.compose.runtime:\"\
  \ +\n    \"runtime-livedata:$compose_version\"\nimplementation 'androidx.activity:'\
  \ +\n    'activity-compose:1.3.1'\n// 我们需要这个来进行权限查询\n// 使用 JetPack Compose：\nimplementation\
  \ \"com.google.accompanist:\" +\n    \"accompanist-permissions:0.23.1\"\n```\n\n\
  \n\n# 排版后的文档\n\n为了从联系人相关的数据库中读取数据，我们为每个联系人声明了一个`data class`和一个用于读取数据的数据源类：\n\n```kotlin\n\
  package book.andrkotlpro.mycontacts1.db\nimport android.content.ContentResolver\n\
  import android.content.ContentUris\nimport android.net.Uri\nimport android.provider.ContactsContract\n\
  data class MyContact(val id:String, val lookupKey,\nval display:String, val email:String)\n\
  class MyContactsDataSource(\nprivate val contentResolver: ContentResolver) {\nfun\
  \ fetchContactsPrimary(): List {\nval result: MutableList =\nmutableListOf()\nval\
  \ CONTENT_URI =\nContactsContract.Contacts.CONTENT_URI\nval PROJECTION = arrayOf(\n\
  ContactsContract.Contacts._ID,\nContactsContract.Contacts.LOOKUP_KEY,\nContactsContract.Contacts.DISPLAY_NAME_PRIMARY)\n\
  val SORT_ORDER = ContactsContract.Contacts.\nDISPLAY_NAME_PRIMARY\nval cursor =\
  \ contentResolver.query(\nCONTENT_URI,\nPROJECTION,\nnull,\nnull,\nSORT_ORDER\n\
  )\ncursor?.let {\ncursor.moveToFirst()\nwhile (!cursor.isAfterLast) {\nresult.add(\n\
  MyContact(\ncursor.getString(0),\ncursor.getString(1),\ncursor.getString(2),\n\"\
  \"\n)\n)\ncursor.moveToNext()\n}\ncursor.close()\n}\nreturn result.toList()\n}\n\
  fun fetchContactsData(): List {\nval result: MutableList =\nmutableListOf()\nval\
  \ CONTENT_URI =\nContactsContract.Data.CONTENT_URI\nval PROJECTION = arrayOf(\n\
  ContactsContract.Data._ID,\nContactsContract.Data.LOOKUP_KEY,\nContactsContract.Data.DISPLAY_NAME_PRIMARY,\n\
  ContactsContract.CommonDataKinds.Email.ADDRESS)\nval SELECTION =\nContactsContract.Data.MIMETYPE\
  \ + \" = '\" +\nContactsContract.CommonDataKinds.Email.\nCONTENT_ITEM_TYPE +\n\"\
  '\"\nval SORT_ORDER = ContactsContract.Data.\nDISPLAY_NAME_PRIMARY\nval cursor =\
  \ contentResolver.query(\nCONTENT_URI,\nPROJECTION,\nSELECTION,\nnull,\nSORT_ORDER\n\
  )\ncursor?.let {\ncursor.moveToFirst()\nwhile (!cursor.isAfterLast) {\nresult.add(\n\
  MyContact(\ncursor.getString(0),\ncursor.getString(1),\ncursor.getString(2),\ncursor.getString(3)\n\
  )\n)\ncursor.moveToNext()\n}\ncursor.close()\n}\nreturn result.toList()\n}\n}\n\
  ```\n\n`MyContactsDataSource`类提供了两个函数`fetchContactsPrimary()`和`fetchContactsData()`，用于分别从主联系人表和联系人数据表中读取数据。只有后者包含电子邮件地址，因此第一个函数仅用于演示目的，我们不会在后续代码中使用它。\n\
  \n在`SELECTION`字符串中，你可以根据需要添加搜索条件。其中“?”充当占位符，你可以在`query()`调用的倒数第二个参数中为其填充值，如下所示：\n\
  \n```kotlin\nval SELECTION =\nContactsContract.CommonDataKinds.Email.ADDRESS +\n\
  \" LIKE ? \" + \"AND \" +\nContactsContract.Data.MIMETYPE + \" = '\" +\nContactsContract.\n\
  CommonDataKinds.Email.CONTENT_ITEM_TYPE +\n\"'\"\nval selectionArgs = arrayOf(\"\
  %\" + search + \"%\")\n...\nval cursor = contentResolver.query(\nCONTENT_URI,\n\
  PROJECTION,\nSELECTION,\nselectionArgs,\nSORT_ORDER\n)\n```\n\n还有一些特殊的 URI 可供使用。例如，要通过电子邮件地址查找联系人，你可以使用内容\
  \ URI `ContactsContract.CommonDataKinds.Email.CONTENT_URI`。另一个选项是 URI `ContactsContract.Contacts.CONTENT_FILTER_URI`，它允许将搜索条件添加到\
  \ URI 内部，而不是作为`query()`调用的参数指定：\n\n```kotlin\n...\nval PROJECTION : Array? = null\n\
  val SELECTION : String? = null\nval selectionArgs : Array? = null\nval contentUri\
  \ = Uri.withAppendedPath(\nContactsContract.Contacts.CONTENT_FILTER_URI,\nUri.encode(search))\n\
  Log.e(\"LOG\", contentUri.toString())\n...\n```\n\n请注意，在这种情况下，不允许传递空字符串“”作为搜索条件。\n\
  \n`MyContactsRepository`类将查询封装到一个`suspend function`中，这是协程中用于“允许异步调用”的惯用写法。关于协程的更多信息，请参见[`https://kotlinlang.org/docs/coroutines-overview.xhtml`](https://kotlinlang.org/docs/coroutines-overview.xhtml)：\n\
  \n```kotlin\npackage book.andrkotlpro.mycontacts1.db\nimport kotlinx.coroutines.CoroutineDispatcher\n\
  import kotlinx.coroutines.withContext\nclass MyContactsRepository(\nprivate val\
  \ source: MyContactsDataSource,\nprivate val myDispatcher: CoroutineDispatcher)\
  \ {\nsuspend fun fetchContacts(): List {\nreturn withContext(myDispatcher) {\nsource.fetchContactsData()\n\
  }\n}\n}\n```\n\n对于 ViewModel，我们定义了`ContactsViewModel`和`ContactsViewModelFactory`两个类。前者将查询结果列表封装到`LiveData`对象中（用于模型和\
  \ UI 层之间的数据绑定），后者则作为创建 ViewModel 实例的工厂：\n\n```kotlin\npackage book.andrkotlpro.mycontacts1\n\
  import android.app.Application\nimport androidx.lifecycle.*\nimport book.andrkotlpro.mycontacts1.db.*\n\
  import kotlinx.coroutines.Dispatchers\nclass ContactsViewModel (\ncontext: Application,\n\
  private val myContactsRepository: MyContactsRepository\n) : AndroidViewModel(context)\
  \ {\nvar myContacts: LiveData> = liveData {\nemit(myContactsRepository.fetchContacts())\n\
  }\n}\nclass ContactsViewModelFactory(\nprivate val application: Application)\n:\
  \ ViewModelProvider.AndroidViewModelFactory(\napplication) {\noverride fun \ncreate(modelClass:\
  \ Class): T {\nreturn if (modelClass.isAssignableFrom(\nContactsViewModel::class.java))\
  \ {\nval source = MyContactsDataSource(\napplication.contentResolver)\nContactsViewModel(application,\n\
  MyContactsRepository(source,\nDispatchers.IO)) as T\n} else\nthrow IllegalArgumentException(\n\
  \"Unknown ViewModel class\")\n}\n}\n```\n\n在`ContactsViewModelFactory`内部，我们为`MyContactsRepository`实例化使用了`Dispatchers.IO`参数，这使得\
  \ suspend 函数可以在一个专为 IO 后台处理优化的线程池中执行。\n\n清单文件`AndroidManifest.xml`包含了访问联系人数据库表所需的权限：\n\
  \n```xml\n...\n\n...\n```\n\nActivity 类的代码看起来与你习惯的非常不同，如果这是你的第一个 Jetpack Compose\
  \ 项目。最显著的区别是不再使用布局 XML 文件。取而代之的是，前端视图结构采用了类似于构建器的语法，如下所示：\n\n```kotlin\nColumn()\
  \ {\nText(textToShow)\nButton(onClick = { ... }) {\nText(\"Request permission\"\
  )\n}\n}\n```\n\nActivity 类的完整代码如下：\n\n\n\n```kotlin\npackage book.andrkotlpro.mycontacts1\n\
  \nimport android.os.Bundle\nimport android.util.Log\nimport androidx.activity.ComponentActivity\n\
  import androidx.activity.compose.setContent\nimport androidx.compose.foundation.ExperimentalFoundationApi\n\
  import androidx.compose.foundation.layout.Column\nimport androidx.compose.foundation.layout.fillMaxSize\n\
  import androidx.compose.foundation.layout.padding\nimport androidx.compose.foundation.lazy.LazyColumn\n\
  import androidx.compose.foundation.lazy.items\nimport androidx.compose.material.*\n\
  import androidx.compose.runtime.*\nimport androidx.compose.ui.Modifier\nimport androidx.compose.ui.unit.dp\n\
  import androidx.compose.runtime.livedata.observeAsState\nimport androidx.lifecycle.ViewModelProvider\n\
  import book.andrkotlpro.mycontacts1.ui.theme.MyContacts1Theme\nimport com.google.accompanist.permissions.*\n\
  \nclass MainActivity : ComponentActivity() {\n    // 需要 @OptIn，因为库中的\n    // com.google.accompanist.permissions\
  \ 类\n    // 是实验性的\n    @OptIn(ExperimentalPermissionsApi::class)\n    override fun\
  \ onCreate(savedInstanceState: Bundle?) {\n        super.onCreate(savedInstanceState)\n\
  \        // 访问模型数据仅需这两行代码。\n        val myViewModelFactory = ContactsViewModelFactory(application)\n\
  \        val contactsViewModel = ViewModelProvider(this, myViewModelFactory).get(ContactsViewModel::class.java)\n\
  \        setContent { // UI 构建器从这里开始\n            // 包裹在主题中。请注意，主题\n           \
  \ // 类由 Studio 的\n            // “新建项目”向导生成\n            MyContacts1Theme {\n  \
  \              // 一个使用主题“background”颜色的表面容器\n                Surface(modifier =\
  \ Modifier.fillMaxSize(), color = MaterialTheme.colors.background) {\n         \
  \           // 查询权限状态\n                    val contactsPermissionState = rememberMultiplePermissionsState(listOf(\n\
  \                        android.Manifest.permission.WRITE_CONTACTS,\n         \
