- "# Android 服务的启动与绑定\n\n## 启动服务\n\n要显式启动一个服务，你需要一个合适的 `Intent`。基本上有两种情况：\n\n### 内部服务（同一应用）\n\
  \n首先，如果服务与调用方位于同一应用中，可以这样编写：\n\n```\nval intent = Intent(this, TheService::class.java)\n\
  startService(intent)\n```\n\n适用于普通服务，或者：\n\n```\nval intent = Intent(this, TheService::class.java)\n\
  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {\n    startForegroundService(intent)\n\
  } else {\n    startService(intent)\n}\n```\n\n适用于 Android 8.0 或 API 级别 26 开始定义的前台服务（在此之前的版本则按常规方式启动）。也就是说，我们可以直接引用服务类。如果你刚接触\
  \ Kotlin 开发，`TheService::class.java` 这种写法初看可能有些奇怪——这其实是 Kotlin 提供 Java 类作为参数的方式。\n\
  \n> **注意**\n> 由于 `Intent` 可以通过各种 `putExtra()` 方法传递通用附加属性，我们也可以向服务传递数据。\n\n### 外部服务（另一应用）\n\
  \n其次，如果要启动的服务属于另一个应用，即*外部*服务，则首先需要在服务声明中添加 intent filter，例如：\n\n```\n<action android:name=\"\
  <PCKG_NAME>.START_SERVICE\" />\n```\n\n其中 `<PCKG_NAME>` 是应用包的名称，`START_SERVICE`\
  \ 也可以替换为其他标识符。然后在服务客户端中，可以这样编写：\n\n```\nval intent = Intent(\".START_SERVICE\")\n\
  intent.setPackage(\"<PCKG_NAME>\")\nstartService(intent)\n// ... 执行其他操作 ...\nstopService(intent)\n\
  ```\n\n来启动和停止外部服务，其中 Intent 构造函数的参数必须与服务 intent filter 声明中的字符串完全一致。`setPackage()`\
  \ 语句在这里很重要（当然你需要替换为服务所在的包名）；否则会触发安全限制，导致错误信息。\n\n## 绑定服务\n\n启动服务只是其中的一部分——另一部分是在服务运行时使用它。这正是*服务绑定*的用途。\n\
  \n### 内部绑定（同一应用）\n\n要创建可供同一应用绑定的服务，可以这样编写：\n\n```\n/**\n * 用于本地绑定的类，即在同一应用中。\n */\n\
  class MyBinder(val servc: MyService) : Binder() {\n    fun getService(): MyService\
  \ {\n        return servc\n    }\n}\n\nclass MyService : Service() {\n    // 提供给客户端的\
  \ Binder\n    private val binder: IBinder = MyBinder(this)\n    // 随机数生成器\n    private\
  \ val generator: Random = Random()\n\n    override fun onBind(intent: Intent): IBinder\
  \ {\n        return binder\n    }\n\n    /** 供客户端使用的方法 */\n    fun getRandomNumber():\
  \ Int {\n        return generator.nextInt(100)\n    }\n}\n```\n\n要在同一应用内绑定到此服务，在服务客户端中编写：\n\
  \n```\nval servcConn = object : ServiceConnection {\n    override fun onServiceDisconnected(compName:\
  \ ComponentName?) {\n        Log.e(\"LOG\", \"onServiceDisconnected: \" + compName)\n\
  \    }\n\n    override fun onServiceConnected(compName: ComponentName?,\n      \
  \                              binder: IBinder?) {\n        Log.e(\"LOG\", \"onServiceConnected:\
  \ \" + compName)\n        val servc = (binder as MyBinder).getService()\n      \
  \  Log.i(\"LOG\", \"Next random number from service: \" +\n                servc.getRandomNumber())\n\
  \    }\n\n    override fun onBindingDied(compName: ComponentName) {\n        Log.e(\"\
  LOG\", \"onBindingDied: \" + compName)\n    }\n}\n\nval intent = Intent(this, MyService::class.java)\n\
  val flags = BIND_AUTO_CREATE\nbindService(intent, servcConn, flags)\n```\n\n其中 `object\
  \ : ServiceConnection {...}` 结构是 Kotlin 中通过创建匿名内部类对象来实现接口的方式，类似于 Java 中的 `new ServiceConnection(){\
  \ ... }`。在 Kotlin 中，这种结构被称为*对象表达式*。此处的 `this` 在 Intent 构造函数中指向一个 `Context` 对象。你可以在\
  \ Activity 中这样使用它。如果将 `Context` 存储在变量中，请在此处使用该变量名。\n\n当然，除了日志记录，你应该做更有意义的事情。特别是可以在\
  \ `onServiceConnected()` 方法中将 binder 或服务保存到变量中以便后续使用。不过要记住，你应当适当处理绑定失效或服务连接被终止的情况。例如，可以尝试重新绑定服务或通知用户，或者两者都做。\n\
  \n上述代码会在你绑定时自动启动服务（如果服务尚未存在）。这是通过以下语句实现的：\n\n```\nval flags = BIND_AUTO_CREATE\n\
  [...]\n```\n\n如果你确定服务正在运行而不需要此功能，可以省略它。但大多数情况下，包含该标志更稳妥。可用于设置绑定特性的标志如下：\n\n- **`BIND_AUTO_CREATE`**：我们刚刚使用了它。表示如果服务尚未启动，则自动启动它。有时你会读到，如果绑定了服务，就不需要显式启动它，但这只有在设置了此标志时才成立。\n\
  \n- **`BIND_DEBUG_UNBIND`**：这会导致保存后续 `unbindService()` 的调用栈，以防后续的解绑命令有误。如果发生这种情况，会显示更详细的诊断输出。由于这会导致内存泄漏，此功能应仅用于调试目的。\n\
  \n- **`BIND_NOT_FOREGROUND`**：仅在客户端运行在前台进程且目标服务运行在后台进程时使用。使用此标志时，绑定过程不会将服务提升为前台调度优先级。\n\
  \n- **`BIND_ABOVE_CLIENT`**：使用此标志表示服务的优先级高于客户端（即服务调用者）。在资源短缺的情况下，系统会先于被调用的服务终止客户端。\n\
  \n- **`BIND_ALLOW_OOM_MANAGEMENT`**：此标志告诉 Android 操作系统，你更愿意接受 Android 将绑定视为非关键，并在内存不足时终止服务。\n\
  \n- **`BIND_WAIVE_PRIORITY`**：此标志将服务调用的调度权交由服务所在进程处理。\n\n你可以根据需要将它们组合使用。\n\n> **注意**\n\
  > 不能在 `BroadcastReceiver` 组件内部进行绑定，除非该 `BroadcastReceiver` 已通过 `registerReceiver(receiver,\
  \ intentfilter)` 注册。在后一种情况下，接收器的生命周期与注册组件绑定。不过，你可以在广播接收器中通过用于启动（而非绑定）服务的 `Intent`\
  \ 传递指令字符串。\n\n### 外部绑定（另一应用）\n\n要绑定外部服务（即属于另一个应用的服务），不能使用与内部服务相同的绑定技术。原因在于我们使用的\
  \ `IBinder` 接口无法直接访问服务类，因为该类在进程边界之外不可见。不过，我们可以将需要在服务和客户端之间传输的数据封装到 `android.os.Handler`\
  \ 对象中，并使用该对象将数据从服务客户端发送到服务。为实现这一点，服务端首先需要定义一个用于接收消息的 `Handler`，例如：\n\n\n```kotlin\n\
  internal class InHandler(val ctx: Context) : Handler() {\noverride\nfun handleMessage(msg:\
  \ Message) {\nval s = msg.data.getString(\"MyString\")\nToast.makeText(ctx, s, Toast.LENGTH_SHORT).show()\n\
  }\n}\n[...]\nclass MyService : Service() {\nval myMessg:Messenger = Messenger(InHandler(this))\n\
  [...]\n}\n```\n\n当然，收到消息时，除了创建 `Toast` 消息外，您还可以执行更有趣的操作。现在，在服务的 `onBind()` 方法中，我们返回信使提供的绑定器对象：\n\
  \n```kotlin\noverride\nfun onBind(intent:Intent):IBinder {\nreturn myMessg.binder\n\
  }\n```\n\n至于 `AndroidManifest.xml` 文件中的条目，我们可以按照与*启动*远程服务相同的方式来编写；请参阅前面的“启动服务”一节。\n\
  \n在服务客户端中，您需要添加一个 `Messenger` 属性和一个 `ServiceConnection` 对象，例如：\n\n```kotlin\nvar\
  \ remoteSrvc:Messenger? = null\nprivate val myConnection = object : ServiceConnection\
  \ {\noverride\nfun onServiceConnected(className: ComponentName,\nservice: IBinder)\
  \ {\nremoteSrvc = Messenger(service)\n}\noverride\nfun onServiceDisconnected(className:\
  \ ComponentName) {\nremoteSrvc = null\n}\n}\n```\n\n要实际执行绑定，我们可以像处理内部服务一样进行。例如，在\
  \ Activity 的 `onCreate()` 方法中，您可以编写：\n\n```kotlin\nval intent:Intent = Intent(\"\
  .START_SERVICE\")\nintent.setPackage(\"\")\nbindService(intent, myConnection, Context.BIND_AUTO_CREATE)\n\
  ```\n\n其中 `<PCKG_NAME>` 应替换为服务包的实际名称。\n\n现在，要将消息从客户端跨进程边界发送到服务，您可以编写：\n\n```kotlin\n\
  val msg = Message.obtain()\nval bundle = Bundle()\nbundle.putString(\"MyString\"\
  , \"要发送的消息\")\nmsg.data = bundle\nremoteSrvc?.send(msg)\n```\n\n请注意，在此示例中，您不能将这些代码行添加到\
  \ Activity 的 `onCreate()` 方法中的 `bindService()` 语句之后，因为 `remoteSrvc` 只有在连接建立后才会被赋值。但您可以将它们添加到\
  \ `ServiceConnection` 类的 `onServiceConnected()` 方法中。\n\n> **注意：** 上述代码中未采取任何措施来确保连接正常。您应该为生产代码添加健全性检查。此外，请在\
  \ `onStop()` 方法中解除与服务的绑定。\n\n## 服务发送的数据\n\n到目前为止，我们讨论的是从服务客户端发送到服务的消息。将数据从服务反向发送到服务客户端也是可行的——可以通过在客户端中使用额外的*信使*、广播消息或\
  \ `ResultReceiver` 类来实现。\n\n对于第一种方法，在服务客户端中提供另一个*处理程序*和*信使*，一旦客户端收到 `onServiceConnected()`\
  \ 回调，就通过 `replyTo` 参数将第二个信使发送给服务：\n\n```kotlin\ninternal class InHandler(val ctx:\
  \ Context) : Handler() {\noverride\nfun handleMessage(msg: Message) {\n// 处理来自服务的消息\n\
  }\n}\nclass MainActivity : AppCompatActivity() {\nprivate var remoteSrvc:Messenger?\
  \ = null\nprivate var backData:Messenger? = null\nprivate val myConn = object :\
  \ ServiceConnection {\noverride\nfun onServiceConnected(className: ComponentName,\n\
  service: IBinder) {\nremoteSrvc = Messenger(service)\nbackData = Messenger(\nInHandler(this@MainActivity))\n\
  // 建立反向通道\nval msg0 = Message.obtain()\nmsg0.replyTo = backData\nremoteSrvc?.send(msg0)\n\
  // 处理正向通信（客户端 -> 服务）\n// 连接逻辑...\n}\noverride\nfun onServiceDisconnected(clazz:\
  \ ComponentName) {\nremoteSrvc = null\n}\n}\noverride fun onCreate(savedInstanceState:\
  \ Bundle?) {\nsuper.onCreate(savedInstanceState)\nsetContentView(R.layout.activity_main)\n\
  // 绑定到服务，使用清单中的 ID！\nval intent = Intent(\".START_SERVICE\")\nintent.setPackage(\"\
  \")\nval flags = Context.BIND_AUTO_CREATE\nbindService(intent, myConn, flags)\n\
  }\n}\n```\n\n然后，服务可以使用此消息，提取 `replyTo` 属性，并利用它向服务客户端发送消息。\n\n\n```kotlin\ninternal\
  \ class IncomingHandler(val ctx: Context) : Handler() {\n    override fun handleMessage(msg:\
  \ Message) {\n        val s = msg.data.getString(\"MyString\")\n        val repl\
  \ = msg.replyTo\n        Toast.makeText(ctx, s, Toast.LENGTH_SHORT).show()\n   \
  \     Log.e(\"IncomingHandler\", \"!!! \" + s)\n        Log.e(\"IncomingHandler\"\
  , \"!!! replyTo = \" + repl)\n        // 如果不为 null，我们现在可以使用 'repl' 向客户端发送消息。\n \
  \       // 当然，我们也可以将其保存到其他地方以便稍后使用\n        if (repl != null) {\n            val\
  \ thr = Thread(object : Runnable {\n                override fun run() {\n     \
  \               Thread.sleep(3000)\n                    val msg = Message.obtain()\n\
  \                    val bundle = Bundle()\n                    bundle.putString(\"\
  MyString\", \"一条要发送的回复消息\")\n                    msg.data = bundle\n           \
  \         repl?.send(msg)\n                }\n            })\n            thr.start()\n\
  \        }\n    }\n}\n```\n\n另外两种方法，即使用广播消息或`ResultReceiver`类，将在第 5 章和第 13 章中介绍。\n\
  \n## 服务的子类\n\n到目前为止，我们一直使用`android.app.Service`作为所描述服务的基类。不过，Android 还提供了其他可用作基类的类，它们具有不同的语义。对于\
  \ Android 8.0（及更高版本），可用的服务类或基类不少于 20 个。你可以在 Android API 文档中查看它们全部：\n\n> **注意** \
  \ \n> 在本书撰写时，你可以在 [`https://developer.android.com/reference/android/app/Service.xhtml`](https://developer.android.com/reference/android/app/Service.xhtml)\
  \ 找到它。\n\n请查看“已知直接子类”。以下三个尤为突出：\n\n- **`android.app.Service`** ：这是我们迄今为止一直在使用的类。这是最基本的服务类。除非你在服务类*内部*使用多线程，或者服务被显式配置为在另一个进程中执行，否则该服务将在服务调用者的主线程内运行。如果这是\
  \ GUI 线程，并且除非你期望服务调用运行得非常快，否则强烈建议将服务活动发送到后台线程。\n\n- **`android.app.IntentService`**\
  \ ：虽然服务在设计上自然不会同时处理主线程的传入启动请求，但`IntentService`使用一个专用工作线程来接收多个启动消息。但它仍然只使用一个线程来处理启动请求，因此这些请求会一个接一个地执行。`IntentService`类负责正确停止服务，因此你无需自己操心。你需要在重写的`onHandleIntent()`方法中提供每个启动请求所需完成的服务工作。由于基本上你不需要其他任何东西，因此`IntentService`服务非常容易实现。请注意，从\
  \ Android 8.0 或 API 级别 26 开始，对后台进程有限制——请参阅“后台服务”一节——因此在适当的情况下，请考虑改用`JobIntentService`类。\n\
  \n- **`android.support.v4.app.JobIntentService`** 使用`JobScheduler`对服务执行请求进行排队。从\
  \ Android 8.0 或 API 级别 26 开始，对于后台服务，请考虑使用此服务基类。要实现这样的服务，你基本上需要创建一个`JobIntentService`的子类，并重写`onHandleWork(intent:\
  \ Intent): Unit`方法来包含服务的工作负载。\n\n## 服务的生命周期\n\n在前面几节中描述了各种服务特性之后，从宏观角度来看，服务的实际生命周期可以说比活动的生命周期更简单。但需要小心。由于服务能够在后台运行，并且服务更容易受到\
  \ Android 操作系统强制停止的影响，因此它们可能需要与服务客户端进行特殊关注。\n\n在你的服务实现中，你可以随意重写任何生命周期回调方法：\n\n-\
  \ `onCreate()`\n- `onStartCommand()`\n- `onBind()`\n- `onUnbind()`\n- `onRebind()`\n\
  - `onDestroy()`\n\n例如，在开发或调试时记录服务调用信息。图 4-1 向您展示了服务生命周期的概览。\n\n![](img/463716_2_En_4_Fig1_HTML.png)\n\
  \n服务生命周期的流程图。启动和绑定服务到创建函数，服务激活经历不同阶段，并以销毁函数和服务关闭结束。\n\n**图 4-1** 服务的生命周期\n\n## 更多服务特性\n\
  \n关于服务的更多要点如下：\n\n1. 服务与活动一起在`AndroidManifest.xml`中声明。它们如何相互交互的问题随之而来。当然，需要有人调用服务才能使用它们，但这也可以从其他服务、其他活动甚至其他应用程序中完成。\n\
  \n2. 出于性能和稳定性的原因，不要在活动的`onResume()`和`onPause()`期间绑定或解绑服务。如果你只需要在活动可见时与服务交互，请在`onStart()`和`onStop()`方法内部进行绑定和解绑。如果在活动停止并在后台运行时也需要服务连接，请在`onCreate()`和`onRestore()`方法中进行绑定和解绑。\n\
  \n3. 在远程连接操作中（服务位于另一个应用程序中），捕获并处理`DeadObjectException`异常。\n\n4. 如果你重写服务的`onStartCommand(intent:\
  \ Intent, flags: Int, startId: Int)`方法，首先确保也调用`super.onStartCommand()`方法，除非你有充分的理由不这样做。接下来，适当地对传入的`flags`参数做出反应，该参数指示这是否是因为先前的启动尝试失败而自动进行的后续启动请求。有关详细信息，请参阅\
  \ API 文档。最终，此方法返回一个整数，描述离开`onStartCommand()`方法后服务的状态——有关详细信息，请参阅 API 文档。\n\n5. 从服务外部调用`stopService()`或从服务内部调用`stopSelf()`并不能保证服务立即停止。预计服务会继续存在一小段时间，直到\
  \ Android 真正停止它。\n\n6. 如果服务的用途不是响应绑定请求，那么如果你重写了服务的`onBind()`方法，它应该返回`null`。\n\n\
  7. 虽然没有明确禁止，但对于一个旨在通过绑定与服务客户端进行通信的服务，请考虑禁止通过`startService()`启动该服务。在这种情况下，你*必须*在`bindService()`方法调用中提供`Context.BIND_AUTO_CREATE`标志。\n\
  \n## 5. 广播\n\n\n\n"
- "# Android 广播\n\nAndroid 广播是遵循发布-订阅模式的消息。它们在整个 Android 操作系统中发送，其内部机制由 Android 系统隐藏，因此发布者和订阅者都只能看到一个用于发送和接收消息的简洁异步接口。广播可以由\
  \ Android 系统本身、标准应用以及系统上安装的任何其他应用发布。同样，任何应用都可以被配置或编程为接收其感兴趣的广播消息。与活动类似，广播可以是显式或隐式路由的——具体使用哪种方式由广播发送者决定。\n\
  \n广播接收器可以在 `AndroidManifest.xml` 文件中声明，也可以通过编程方式声明。从 Android 8.0 或 API 级别 26 开始，Android\
  \ 开发者放弃了在 XML 和编程方式声明隐式 `Intent` 的广播接收器之间通常存在的对称性。原因是出于对后台运行进程施加限制的总体思路——这类进程，尤其是与广播相关的进程，会导致\
  \ Android 系统负载过高，使设备运行速度显著变慢，并导致用户体验不佳。因此，现在在 `AndroidManifest.xml` 内部声明广播接收器仅限于较少的用例。请参见下一节“隐式广播”。\n\
  \n> **注意**\n>\n> 我们希望编写也能在 Android 8.0 及更高版本上运行的现代应用。因此，请认真对待隐式 `Intent` 的这些广播限制，让您的应用适应这些限制。\n\
  \n## 显式广播\n\n显式广播是一种以明确指定唯一接收器的方式发布的广播。这通常仅在广播发布者和订阅者属于同一个应用时才有意义，或者较少情况下，当它们属于同一个应用集合且彼此之间存在强功能依赖关系时才有意义。\n\
  \n此外，本地广播和远程广播之间存在差异：本地广播接收器*必须*位于同一个应用中，它们运行速度快，并且不能在 `AndroidManifest.xml` 内部声明。相反，必须使用编程注册方法来注册本地广播接收器。此外，你必须使用\n\
  \n```\n// 发送本地广播\nLocalBroadcastManager.getInstance(Context).\nsendBroadcast(...)\n\
  ```\n\n来发送本地广播消息。另一方面，远程广播接收器*可以*位于同一个应用中，它们速度较慢，并且可以使用 `AndroidManifest.xml` 来声明它们。要发送远程广播，你可以编写\n\
  \n```\n// 发送远程广播（此应用或其他应用）\nsendBroadcast(...)\n```\n\n> **注意**\n>\n> 出于性能原因，应优先选择本地广播而非远程广播。不能使用\
  \ `AndroidManifest.xml` 声明本地接收器这一明显缺点影响并不大，因为从 Android 8.0 或 API 级别 26 开始，在清单文件中声明广播接收器的用例无论如何都已经受到限制了。\n\
  \n### 显式本地广播\n\n要向同一应用内的本地广播接收器发送本地广播消息，你可以编写\n\n```\nval intent = Intent(this,\
  \ MyReceiver::class.java)\nintent.action = \"de.pspaeth.simplebroadcast.DO_STH\"\
  \nintent.putExtra(\"myExtra\", \"myExtraVal\")\nLog.e(\"LOG\", \"Sending broadcast\"\
  )\nLocalBroadcastManager.getInstance(this).\nsendBroadcast(intent)\nLog.e(\"LOG\"\
  , \"Broadcast sent\")\n```\n\n其中 `MyReceiver` 是接收器类：\n\n```\nclass MyReceiver :\
  \ BroadcastReceiver() {\noverride\nfun onReceive(context: Context?, intent: Intent?)\
  \ {\nToast.makeText(context, \"Intent Detected.\",\nToast.LENGTH_LONG).show()\n\
  Log.e(\"LOG\", \"Received broadcast\")\nThread.sleep(3000)\n// 当然也可以是实际工作...\nLog.e(\"\
  LOG\", \"Broadcast done\")\n}\n}\n```\n\n对于本地广播，接收器*必须*在代码内部声明。为避免资源泄漏，我们在 `onCreate()`\
  \ 中创建并注册接收器，并在 `onDestroy()` 中注销它：\n\n```\nclass MainActivity : AppCompatActivity()\
  \ {\nprivate var bcReceiver:BroadcastReceiver? = null\noverride fun onCreate(savedInstanceState:\
  \ Bundle?) {\nsuper.onCreate(savedInstanceState)\n// ...\nbcReceiver = MyReceiver()\n\
  val ifi:IntentFilter =\nIntentFilter(\"de.pspaeth.myapp.DO_STH\")\nLocalBroadcastManager.getInstance(this).\n\
  registerReceiver(bcReceiver, ifi)\n}\noverride fun onDestroy() {\nsuper.onDestroy()\n\
  // ...\nLocalBroadcastManager.getInstance(this).\nunregisterReceiver(bcReceiver)\n\
  }\n}\n```\n\n### 显式远程广播\n\n我们已经指出，可以将*远程*类型的广播消息发送到其他应用或接收器所在的同一应用。区别在于数据的发送方式——对于远程消息，数据通过\
  \ IPC 通道传输。现在，要将此类远程广播消息发送到同一应用，你可以编写\n\n```\nval intent = Intent(this, MyReceiver::class.java)\n\
  intent.action = \"de.pspaeth.myapp.DO_STH\"\nintent.putExtra(\"myExtra\", \"myExtraVal\"\
  )\nsendBroadcast(intent)\n```\n\n在接收端，对于远程消息，接收器*必须*在清单文件中声明：\n\n```\n<receiver\
  \ android:name=\".MyReceiver\" />\n```\n\n审视本地广播和远程广播之间的差异时，牢记以下几点会很有帮助：\n\n-  \
  \ **显式本地广播**  \n    发送者使用显式接收器类，接收器必须通过编程方式声明，并且发送者和接收者都使用 `LocalBroadcastManager`\
  \ 来发送消息和注册接收器。\n\n-   **显式远程广播**  \n    发送者使用显式接收器类，接收器必须在 `AndroidManifest.xml`\
  \ 中声明。\n\n对于负责处理已接收广播的类，与显式本地广播的类相比没有区别：\n\n```\nclass MyReceiver : BroadcastReceiver()\
  \ {\noverride\nfun onReceive(context: Context?, intent: Intent?) {\n// 处理传入的广播...\n\
  }\n}\n```\n\n### 发送到其他应用的显式广播\n\n显式广播的发送者和接收者可以位于不同的应用中。为了使其工作，我们不能再使用之前使用的 Intent\
  \ 构造器：\n\n```\nval intent = Intent(this, MyReceiver::class.java)\nintent.action\
  \ = \"de.pspaeth.myapp.DO_STH\"\n// 添加其他参数...\nsendBroadcast(intent)\n```\n\n这是因为接收类（此处为\
  \ `MyReceiver`）不在类路径中。然而，我们可以使用另一种构造方式\n\n```\nval intent = Intent()\nintent.component\
  \ = ComponentName(\"de.pspaeth.xyz\",\n\"de.pspaeth.xyz.MyReceiver\")\nintent.action\
  \ = \"de.pspaeth.simplebroadcast.DO_STH\"\n// 添加其他参数...\nsendBroadcast(intent)\n\
  ```\n\n其中，`ComponentName` 的第一个参数是接收方应用的包名字符串，第二个参数是该应用中的类名。\n\n> **警告**\n>\n> 除非你是在向同样由你自己构建的应用发送广播，否则这种发送显式广播的方式用途有限。其他应用的开发者可能很容易决定更改类名，从而导致你与该应用之间使用广播进行的通信中断。\n\
  \n## 隐式广播\n\n隐式广播是具有未定义数量潜在接收器的广播。对于显式广播，我们了解到必须使用指向接收组件的构造器来构建相应的 `Intent`：`val\
  \ intent = Intent(this, TheReceiverClass::class.java)`。与此相反，对于隐式广播，我们不再指定接收者，而是提供哪些组件可能对其感兴趣的提示。例如，在\n\
  \n```\nval intent = Intent()\nintent.action = \"de.pspaeth.myapp.DO_STH\"\nsendBroadcast(intent)\n\
  ```\n\n中，我们实际上表达了以下含义：“向所有对动作 'de.pspaeth.myapp.DO_STH' 感兴趣的接收器发送一条广播消息。”然后，Android\
  \ 系统会确定哪些组件有资格接收此类广播消息——这可能不会找到接收者，也可能找到一个或许多个实际接收者。\n\n在开始编写隐式广播程序之前，你必须做出三项决定：\n\
  \n1.  **我们是否想要监听系统广播？**\n\n\n\nAndroid 预定义了大量的广播消息类型。在您随 Android Studio 一起安装的 Android\
  \ SDK 中，更确切地说，在`SDK_INST_DIR/platforms/VERSION/data/broadcast_actions.txt`路径下，您可以找到系统广播操作的列表。如果我们想要监听此类消息，只需按照下文“接收隐式广播”和“监听系统广播”章节所述，编写相应的广播接收器即可。在在线文本伴读的“系统广播”章节中，您将找到系统广播的完整列表。\n\
  \n## 如何对广播消息类型进行分类？\n\n广播发送者和广播接收者基于 Intent 过滤器匹配来加入，这与 Activity 的方式相同，如第 3 章“Intent\
  \ 过滤器”部分所述。广播的分类同样分为三类：首先，您有一个必须的“操作”说明符；其次，一个“类别”说明符；第三，一个“数据和类型”说明符。您可以使用这些来定义过滤器。我们将在下文描述此匹配过程。\n\
  \n## 我们使用本地广播还是远程广播？\n\n如果所有广播都完全在您的应用内部发生，您应该使用本地广播来发送和接收消息。对于隐式广播，这种情况可能不常见，但对于大型复杂应用，这完全是可以接受的。如果涉及系统广播或来自其他应用的广播，则*必须*使用远程广播。后者是大多数示例中的默认情况，因此您会经常看到这种模式。\n\
  \n## Intent 过滤器匹配\n\n广播接收器通过声明*操作*、*类别*和*数据说明符*来表示它们接受哪些广播。\n\n我们首先讨论*操作*。从表面上看，它们只是一些字符串，没有任何语法限制。但更仔细地观察，我们会发现它们首先是一组或多或少严格定义的预定义操作名称。我们已将它们全部列在第\
  \ 3 章的“Intent 过滤器”部分。此外，您也可以定义自己的操作。惯例是使用您的包名，加上一个点号，然后跟上操作说明符。您不必强制遵守此惯例，但强烈建议这样做，这样您的应用就不会与其他应用冲突。在不指定其他过滤器条件的情况下，指定了与过滤器中特定操作相匹配的发送者将到达所有匹配的接收器：\n\
  \n- 要使 Intent 过滤器匹配，接收方指定的*操作*必须与发送方指定的*操作*匹配。对于隐式广播，一个广播可能寻址零个、一个或多个接收器。\n- 一个接收器可以指定多个过滤器。如果其中一个过滤器包含指定的*操作*，则该特定过滤器将匹配该广播。\n\
  \n示例如表 5-1 所示。\n\n**表 5-1 操作匹配**\n\n| 接收器 | 发送器 | 匹配 |\n| :--- | :--- | :--- |\n\
  | 单个过滤器 操作 = `com.xyz.ACTION1` | 操作 = `com.xyz.ACTION1` | 是 |\n| 单个过滤器 操作 = `com.xyz.ACTION1`\
  \ | 操作 = `com.xyz.ACTION2` | 否 |\n| 两个过滤器 操作 = `com.xyz.ACTION1` 操作 = `com.xyz.ACTION2`\
  \ | 操作 = `com.xyz.ACTION1` | 是 |\n| 两个过滤器 操作 = `com.xyz.ACTION1` 操作 = `com.xyz.ACTION2`\
  \ | 操作 = `com.xyz.ACTION3` | 否 |\n\n除了*操作*之外，还可以使用*类别*说明符来限制 Intent 过滤器。我们有一些预定义的类别，列在第\
  \ 3 章的“Intent 过滤器”部分，但您同样可以定义自己的类别。并且与*操作*一样，对于您自己的*类别*，您应该遵循命名惯例，即在类别名称前加上应用包名。在\
  \ Intent 匹配过程中，一旦找到*操作*的匹配项，发送方声明的所有类别也必须出现在接收方的 Intent 过滤器中，匹配才能继续。\n\n- 一旦 Intent\
  \ 过滤器中的*操作*与广播匹配，并且该过滤器也包含发送方指定的类别列表，则只有该过滤器会匹配该广播。\n\n示例如表 5-2 所示（仅一个过滤器——如果有多个过滤器，则匹配基于“或”的方式进行）。\n\
  \n**表 5-2 类别匹配**\n\n| 接收方操作 | 接收方类别 | 发送方 | 匹配 |\n| :--- | :--- | :--- | :--- |\n\
  | `com.xyz.ACT1` | `com.xyz.cate1` | 操作 = `com.xyz.ACT1` | 是 |\n| `com.xyz.ACT1`\
  \ | - | 操作 = `com.xyz.ACT1` 类别 = `com.xyz.cate1` | 否 |\n| `com.xyz.ACT1` | `com.xyz.cate1`\
  \ | 操作 = `com.xyz.ACT1` 类别 = `com.xyz.cate1` | 是 |\n| `com.xyz.ACT1` | `com.xyz.cate1`\
  \ | 操作 = `com.xyz.ACT1` 类别 = `com.xyz.cate1` 类别 = `com.xyz.cate2` | 否 |\n| `com.xyz.ACT1`\
  \ | `com.xyz.cate1` `com.xyz.cate2` | 操作 = `com.xyz.ACT1` 类别 = `com.xyz.cate1` 类别\
  \ = `com.xyz.cate2` | 是 |\n| `com.xyz.ACT1` | `com.xyz.cate1` `com.xyz.cate2` |\
  \ 操作 = `com.xyz.ACT1` 类别 = `com.xyz.cate1` | 是 |\n| `com.xyz.ACT1` | 任意 | 操作 = `com.xyz.ACT2`\
  \ 类别 = 任意 | 否 |\n\n最后，*数据和类型*说明符允许过滤数据类型。这样的说明符可以是以下之一：\n\n- **类型**：MIME 类型，例如 `text/html`\
  \ 或 `text/plain`\n- **数据**：数据 URI，例如 `http://xyz.com/type1`\n- **数据**和**类型**：两者皆有\n\
  \n其中`data`元素允许通配符匹配。详细信息见“接收隐式广播”部分。\n\n- 假定*操作*和*类别*匹配，如果发送方指定的 MIME 类型包含在接收方允许的\
  \ MIME 类型列表中，则*类型*过滤器元素匹配。\n- 假定*操作*和*类别*匹配，如果发送方指定的数据 URI 与接收方允许的数据 URI 列表中的任何一个匹配（可能应用通配符匹配），则*数据*过滤器元素匹配。\n\
  - 假定*操作*和*类别*匹配，如果 MIME 类型和数据 URI 都匹配，即都包含在接收方指定的列表中，则*数据和类型*过滤器元素匹配。\n\n示例如表 5-3\
  \ 所示（仅一个过滤器——如果有多个过滤器，则匹配基于“或”的方式进行）。\n\n**表 5-3 数据匹配**\n\n| 接收方类型 | 接收方 URI (`.*`\
  \ = 任意字符串) | 发送方 | 匹配 |\n| :--- | :--- | :--- | :--- |\n| `text/html` | - | 类型 =\
  \ `text/html` | 是 |\n| `text/html` `text/plain` | - | 类型 = `text/html` | 是 |\n|\
  \ `text/html` `text/plain` | - | 类型 = `image/jpeg` | 否 |\n| - | `http://a.b.c/xyz`\
  \ | 数据 = `http://a.b.c/xyz` | 是 |\n| - | `http://a.b.c/xyz` | 数据 = `http://a.b.c/qrs`\
  \ | 否 |\n| - | `http://a.b.c/xyz/.*` | 数据 = `http://a.b.c/xyz/3` | 是 |\n| - | `http://.*/xyz`\
  \ | 数据 = `http://a.b.c/xyz` | 是 |\n| - | `http://.*/xyz` | 数据 = `http://a.b.c/qrs`\
  \ | 否 |\n| `text/html` | `http://a.b.c/xyz/.*` | 类型 = `text/html` 数据 = `http://a.b.c/xyz/1`\
  \ | 是 |\n| `text/html` | `http://a.b.c/xyz/.*` | 类型 = `image/jpeg` 数据 = `http://a.b.c/xyz/1`\
  \ | 否 |\n\n\n\n### 活跃监听与待命监听\n\n问题在于，一个应用必须处于何种状态才能接收隐式广播。如果我们希望广播接收器仅在系统中注册，并且只在匹配的广播到达时按需启动，则必须在应用的清单文件中指定该监听器。然而，对于隐式广播，这不能随意进行，只能针对“监听系统广播”一节中列出的预定义系统广播进行。\n\
  \n**注意：**  \n此对隐式意图过滤器的限制是在 Android 8.0（即 API 级别 26）中引入的。在此之前，可以在清单文件中指定任何隐式过滤器。\n\
  \n但是，如果你在应用内部以编程方式启动广播监听器，并且该应用正在运行，则可以定义任意数量的隐式广播监听器，并且对于广播是来自系统、你的应用还是其他应用没有限制。同样，对可用的*操作*或*类别*名称也没有限制。\n\
  \n由于监听开机完成事件被包含在清单文件允许的监听器列表中，因此你可以自由地在其中以 Activity 或 Service 形式启动应用，并在这些应用内部注册任何隐式监听器。这意味着你可以合法地规避从\
  \ Android 8.0 开始施加的限制。只需注意，如果出现资源短缺，此类应用可能会被 Android 操作系统杀死，因此你必须采取适当的预防措施。\n\n\
  ### 发送隐式广播\n\n要准备发送隐式广播，你需要指定操作、类别、数据和附加数据，如下所示：\n\n```\nval intent = Intent()\n\
  intent.action = \"de.pspaeth.myapp.DO_STH\"\nintent.addCategory(\"de.pspaeth.myapp.CATEG1\"\
  )\nintent.addCategory(\"de.pspaeth.myapp.CATEG2\")\n// ... 更多类别\nintent.type = \"\
  text/html\"\nintent.data = Uri.parse(\"content://myContent\")\nintent.putExtra(\"\
  EXTRA_KEY\", \"extraVal\")\nintent.flags = ...\n```\n\n只有操作是强制性的；其他所有项都是可选的。现在，要发送广播，你可以编写\n\
  \n```\nsendBroadcast(intent)\n```\n\n用于远程广播，或者\n\n```\nLocalBroadcastManager.getInstance(this).sendBroadcast(intent)\n\
  ```\n\n用于本地广播。其中的“this”必须是 `Context` 或其子类——如果代码来自 Activity 或 Service 类内部，它将完全按此处所示的方式工作。\n\
  \n对于远程消息，还有一个变体，可以一次将广播发送给一个适用的接收器：\n\n```\n...\nsendOrderedBroadcast(...)\n...\n\
  ```\n\n这使得接收器顺序接收消息，并且每个接收器可以通过使用 `BroadcastReceiver.abortBroadcast()` 来取消将消息转发给队列中的下一个接收器。\n\
  \n### 接收隐式广播\n\n要接收隐式广播，对于有限的一组广播类型（参见“监听系统广播”一节），你可以在 `AndroidManifest.xml` 中指定一个\
  \ `BroadcastListener`，如下所示：\n\n```\n...\n\n```\n\n此处显示的 `<data>` 元素只是一个例子——所有可能性在第\
  \ 3 章的“意图过滤器”部分中都有介绍。\n\n相比之下，在你的代码中以编程方式添加隐式广播监听器则不受限制：\n\n```\nclass MainActivity\
  \ : AppCompatActivity() {\nprivate var bcReceiver:BroadcastReceiver? = null\noverride\
  \ fun onCreate(savedInstanceState: Bundle?) {\nsuper.onCreate(savedInstanceState)\n\
  // ...\nbcReceiver = MyReceiver()\nval ifi:IntentFilter =\nIntentFilter(\"de.pspaeth.myapp.DO_STH\"\
  )\nregisterReceiver(bcReceiver, ifi)\n}\noverride fun onDestroy() {\nsuper.onDestroy()\n\
  // ...\nunregisterReceiver(bcReceiver)\n}\n}\n```\n\n此处显示的 `MyReceiver` 是 `android.content.BroadcastReceiver`\
  \ 类的一个实现。\n\n### 监听系统广播\n\n要监听系统广播——请参阅在线文本配套资料的“系统广播”部分中的列表——你可以像之前展示的那样使用编程注册。对于大多数系统广播，你不能使用清单文件注册方式，这是由于自\
  \ Android 8.0（即 API 级别 26）以来对后台执行施加的限制。然而，对于其中一些广播，你也可以使用清单文件来指定监听器：\n\n- **`ACTION_LOCKED_BOOT_COMPLETED`**、**`ACTION_BOOT_COMPLETED`**：应用可能需要这些来安排作业、闹钟等。\n\
  - **`ACTION_USER_INITIALIZE`**、**`\"android.intent.action.USER_ADDED\"`**、**`\"\
  android.intent.action.USER_REMOVED\"`**：由特权权限保护，因此用例有限。\n- **`\"android.intent.action.TIME_SET\"\
  `**、**`ACTION_TIMEZONE_CHANGED`**、**`ACTION_NEXT_ALARM_CLOCK_CHANGED`**：时钟应用所需。\n\
  - **`ACTION_LOCALE_CHANGED`**：语言区域已更改，应用可能需要在此时更新其数据。\n- **`ACTION_USB_ACCESSORY_ATTACHED`**、**`ACTION_USB_ACCESSORY_DETACHED`**、**`ACTION_USB_DEVICE_ATTACHED`**、**`ACTION_USB_DEVICE_DETACHED`**：USB\
  \ 相关事件。\n- **`ACTION_CONNECTION_STATE_CHANGED`**、**`ACTION_ACL_CONNECTED`**、**`ACTION_ACL_DISCONNECTED`**：蓝牙事件。\n\
  - **`ACTION_CARRIER_CONFIG_CHANGED`**、**`TelephonyIntents.ACTION__SUBSCRIPTION_CHANGED`**、**`TelephonyIntents.SECRET_CODE_ACTION`**：OEM\
  \ 电话应用可能需要接收这些广播。\n- **`LOGIN_ACCOUNTS_CHANGED_ACTION`**：某些应用需要用它来为新建和已更改的账户设置计划操作。\n\
  - **`ACTION_PACKAGE_DATA_CLEARED`**：由操作系统的“设置”应用清除数据。正在运行的应用可能对此感兴趣。\n- **`ACTION_PACKAGE_FULLY_REMOVED`**：如果某些应用被卸载且其数据被移除，可能需要通知相关应用。\n\
  - **`ACTION_NEW_OUTGOING_CALL`**：拦截拨出的电话。\n- **`ACTION_DEVICE_OWNER_CHANGED`**：某些应用可能需要接收它，以便了解设备的安全状态已更改。\n\
  - **`ACTION_EVENT_REMINDER`**：由日历提供程序发送，以将事件提醒发布到日历应用。\n- **`ACTION_MEDIA_MOUNTED`**、**`ACTION_MEDIA_CHECKING`**、**`ACTION_MEDIA_UNMOUNTED`**、**`ACTION_MEDIA_EJECT`**、**`ACTION_MEDIA_UNMOUNTABLE`**、**`ACTION_MEDIA_REMOVED`**、**`ACTION_MEDIA_BAD_REMOVAL`**：应用可能需要了解用户与设备的物理交互。\n\
  - **`SMS_RECEIVED_ACTION`**、**`WAP_PUSH_RECEIVED_ACTION`**：短信接收应用所需。\n\n### 为广播增加安全性\n\
  \n广播消息的安全性由*权限*系统处理，这将在第 7 章中更详细地描述。在以下章节中，我们区分显式广播和隐式广播。\n\n#### 保护显式广播\n\n对于非本地广播，即不使用\
  \ `LocalBroadcastManager`，可以在接收方*和*发送方两侧指定权限。对于后者，广播发送方法有包含权限说明符的重载版本：\n\n```\n\
  ...\nval intent = Intent(this, MyReceiver::class.java)\n...\nsendBroadcast(intent,\
  \ \"com.xyz.theapp.PERMISSION1\")\n...\n```\n\n这表示向受 `\"com.xyz.theapp.PERMISSION1\"\
  ` 保护的接收器发送广播。当然，你应该在此处写入你自己的包名并使用适当的权限名称。\n\n相比之下，不指定权限发送广播\n\n```\n...\nval intent\
  \ = Intent(this, MyReceiver::class.java)\n...\nsendBroadcast(intent)\n...\n```\n\
  \n可能会寻址到有权限保护和无权限保护的接收器。这意味着在发送方指定权限并不旨在告诉接收方发送方以任何方式受到保护。\n\n要为接收方添加权限，我们首先需要在应用级别的\
  \ `AndroidManifest.xml` 中声明使用它：\n\n```\n...\n<application ...\n```\n\n接下来，我们在同一个清单文件中将其显式添加到接收器元素中\n\
  \n其中 `MyReceiver` 是 `android.content.BroadcastReceiver` 的一个实现。\n\n\n\n由于这是自定义权限，你需要在清单文件中声明它：\n\
  \n```xml\n...\n```\n\n`<permission>` 元素还支持一些其他属性（参见在线配套文本中的“清单顶级条目”章节），例如保护级别。这些属性的详细说明及其影响将在第\
  \ 7 章中深入讲解。对于非自定义权限，你无需使用 `<permission>` 元素。\n\n**警告**\n\n如果在发送方指定了权限，但接收方没有匹配的权限，尝试发送广播时会静默失败。同时也不会有任何日志记录，因此使用发送方权限时需格外小心。\n\
  \n如果通过 `LocalBroadcastManager` 使用本地广播，则无法在发送方或接收方指定权限。\n\n## 保护隐式广播\n\n与非本地显式广播类似，隐式广播的权限既可以在发送方指定，也可以在接收方指定。在发送方，你可以这样写：\n\
  \n```kotlin\nval intent = Intent()\nintent.action = \"de.pspaeth.myapp.DO_STH\"\n\
  // ... 更多 intent 坐标\nsendBroadcast(intent, \"com.xyz.theapp.PERMISSION1\")\n```\n\
  \n这表示向所有同时受 `\"com.xyz.theapp.PERMISSION1\"` 保护的匹配接收方发送广播。当然，你应该在这里使用自己的包名和合适的权限名称。与隐式广播的常规发送方-接收方匹配流程一样，添加权限相当于增加了一个额外的匹配条件。因此，如果存在多个候选接收方，在查看\
  \ Intent 过滤器时，只有同时提供了该权限标志的接收方才会被选中来实际接收此广播。\n\n隐式广播还需要注意的另一件事是，在 `AndroidManifest.xml`\
  \ 中声明权限使用。因此，为了让发送方能够使用该权限，需要在清单文件中添加：\n\n```xml\n<uses-permission android:name=\"\
  com.xyz.theapp.PERMISSION1\" />\n```\n\n与显式广播相同，不带权限规范的广播发送：\n\n```kotlin\n...\n\
  sendBroadcast(intent)\n...\n```\n\n可能会同时寻址到有权限保护和无权限保护的接收方。这意味着，在发送方指定权限并不意味着告知接收方发送方受到了任何形式的保护。\n\
  \n为了让接收方能够获取此类广播，必须在代码中添加权限，示例如下：\n\n```kotlin\nprivate var bcReceiver: BroadcastReceiver?\
  \ = null\noverride fun onCreate(savedInstanceState: Bundle?) {\n    super.onCreate(savedInstanceState)\n\
  \    ...\n    bcReceiver = object : BroadcastReceiver() {\n        override fun\
  \ onReceive(context: Context?,\n                                intent: Intent?)\
  \ {\n            // 接收到广播时执行某些操作...\n        }\n    }\n    val ifi: IntentFilter\
  \ =\n        IntentFilter(\"de.pspaeth.myapp.DO_STH\")\n    registerReceiver(bcReceiver,\
  \ ifi,\n        \"com.xyz.theapp.PERMISSION1\", null)\n}\noverride fun onDestroy()\
  \ {\n    super.onDestroy()\n    unregisterReceiver(bcReceiver)\n}\n```\n\n此外，你必须在接收方的清单文件中同时定义并使用该权限：\n\
  \n```xml\n<permission android:name=\"com.xyz.theapp.PERMISSION1\" />\n...\n<uses-permission\
  \ android:name=\"com.xyz.theapp.PERMISSION1\" />\n```\n\n再次强调，对于非自定义权限，你无需使用 `<permission>`\
  \ 元素。更多关于权限的信息，请参见第 7 章。\n\n**注意**\n\n作为提升安全性的附加手段，在适用情况下，你可以使用 `Intent.setPackage()`\
  \ 来限制可能的接收方。\n\n## 从命令行发送广播\n\n对于可通过*安卓调试桥*（ADB）连接的设备（参见第 19 章“SDK 平台工具”部分），你可以在开发电脑上使用\
  \ shell 命令发送广播消息。示例如下：\n\n```bash\n./adb shell am broadcast -a de.pspaeth.myapp.DO_STH\
  \ \\\n    de.pspaeth.simplebroadcast MyReceiver\n```\n\n这会将操作 `\"de.pspaeth.myapp.DO_STH\"\
  ` 发送给包 `\"de.pspaeth.simplebroadcast\"` 中的指定接收器 `\"MyReceiver\"`（因此这是一个显式广播消息）。\n\
  \n要获取这种广播发送方式的完整说明，可以按如下方式使用 shell：\n\n```bash\n./adb shell\nam\n```\n\n\n\n"
- "# 此命令  \n将展示使用 `am` 命令创建广播消息和执行其他操作的所有可能性。\n\n## 关于广播的随机笔记\n\n- 你还可以在回调方法 `onPause()`\
  \ 和 `onResume()` 中注册和注销由程序管理的接收器。显然，与使用 `onCreate()`/`onDestroy()` 配对相比，这种方式的注册和注销操作会更频繁。\n\
  \n- 当前正在执行的 `onReceive()` 方法会将进程优先级提升至“前台”级别，防止 Android 系统终止接收进程——只有在极端资源短缺的情况下才可能被终止。\n\
  \n- 如果你在 `onReceive()` 内部有长时间运行的操作，可以考虑在后台线程中运行它们，并提前结束 `onReceive()`。但是，由于完成 `onReceive()`\
  \ 后进程优先级会恢复至正常级别，你的后台进程更有可能被终止，从而导致应用崩溃。你可以通过使用 `Context.goAsync()` 然后启动一个 `AsyncTask`（在其内部，最后必须调用从\
  \ `goAsync()` 获取的 `PendingResult` 对象上的 `finish()` 方法来最终释放资源），或者使用 `JobScheduler`\
  \ 来防止这种情况。\n\n- 自定义权限（我们在“保护隐式广播”部分使用过）会在应用安装时被注册。因此，定义自定义权限的应用必须在使用这些权限的应用之前安装。\n\
  \n- 通过隐式广播发送敏感信息时要谨慎。潜在恶意应用也可能尝试接收这些信息。至少你可以在发送方通过指定权限来保护广播。\n\n- 为了清晰且不与其他应用混淆，广播操作和权限名称始终应使用命名空间。\n\
  \n- 避免从广播中启动 Activity——这违背了 Android 的可用性原则。\n\n## 6. 内容提供者\n\n## 内容提供者框架\n\n*内容提供者*框架允许：\n\
  \n1.  使用其他应用提供的（结构化）数据\n2.  提供（结构化）数据供其他应用使用\n3.  支持将数据从一个应用复制到另一个应用\n4.  向*搜索框架*提供数据\n\
  5.  向特殊的数据相关 UI 控件提供数据\n6.  通过定义良好的标准化接口完成上述所有操作\n\n通信的数据可以具有严格定义的结构，例如，来自数据库的行，具有定义的列名和类型，但也可以是没有任何语义关联的文件或字节数组。如果你应用的数据存储需求不符合上述任何情况，则无需实现内容提供者组件——而是使用常规的数据存储选项。\n\
  \n> **注意**：应用为其自身组件提供数据或使用自己的数据提供者访问内容并非严格禁止；然而，提到内容提供者时，我们通常想到的是应用间数据交换。但如果你需要，始终可以将应用内数据交换模式视为应用间通信的一个直接特例。\n\
  \n如果我们想要创建内容感知型应用，无论是提供内容还是消费内容，主要问题如下：\n\n-   应用如何提供内容？\n-   应用如何访问其他应用提供的内容？\n\
  -   应用如何处理其他应用提供的内容？\n-   我们如何保护提供的数据？\n\n在接下来的章节中，我们将专门探讨这些主题。图 6-1 展示了概述。\n\n\
  ![](img/463716_2_En_6_Fig1_HTML.png)\n\n*一张内容提供者的图示，定义了文件流的 `Uri` 类如何修改、查询，并与游标类流一起流向内容解析器和提供者，最终到达数据。*\n\
  \n**图 6-1** – 内容提供者框架\n\n## 提供内容\n\n内容可以由你的应用提供，当然也可以由系统应用提供。例如，想想相机拍摄的照片或通讯录中的联系人。如果我们先看内容提供方，内容提供者框架会更容易理解。在后面的章节中，我们还将讨论消费者和其他主题。\n\
  \n首先，我们需要知道数据存在哪里。然而，内容提供者框架对数据实际来源不做任何假设——数据可以存在于文件、数据库、内存存储或你能想到的任何其他地方。这提高了你应用的可维护性。例如，在项目早期阶段，数据可能来自文件，但后来你切换到数据库或云存储，而可能的消费者无需关心这些变化，因为他们不必改变访问你内容的方式。因此，内容提供者框架为你的数据提供了一个抽象层。\n\
  \n为实现提供内容而需要实现的单一接口是抽象类：\n\n```java\nandroid.content.ContentProvider\n```\n\n在接下来的小节中，我们将从一个用例的角度来看这个类的实现。\n\
  \n## 初始化提供者\n\n在你可实例化的 `ContentProvider` 类子类内部，你*必须*实现方法：\n\n```java\nonCreate()\n\
  ```\n\n当内容提供者被实例化时，Android 系统会调用此方法。你可以在这里初始化内容提供者，但应避免在此处放入耗时的初始化过程，因为实例化并不一定意味着内容提供者会被实际使用。如果你这里没什么特别的事情要做，直接将其实现为一个空方法即可。\n\
  \n若想了解更多关于内容提供者在实例化时的运行环境信息，你可以重写它的 `attachInfo()` 方法——在那里，你会获知内容提供者运行的上下文，并且还会得到一个\
  \ `ProviderInfo` 对象。只是别忘了在内部也调用 `super.attachInfo()`。\n\n## 查询数据\n\n对于查询类似数据库的数据集，有一个方法你*必须*实现，另外两个方法你可以*选择*实现：\n\
  \n```kotlin\nabstract fun query(        // ----- 变体 A -----\n    uri: Uri,\n   \
  \ projection: Array,\n    selection: String,\n    selectionArgs: Array,\n    sortOrder:\
  \ String\n) : Cursor\n\n// ----- 变体 B -----\n// 你不需要实现这个。默认\n// 实现会调用变体 A，但忽略\n\
  // 'cancellationSignal' 参数。\nfun query(\n    uri: Uri,\n    projection: Array,\n\
  \    selection: String,\n    selectionArgs: Array,\n    String sortOrder: String,\n\
  \    cancellationSignal: CancellationSignal\n) : Cursor\n\n// ----- 变体 C -----\n\
  // 你不需要实现这个。默认\n// 实现会将 bundle 参数转换为\n// 调用变体 B 的相应参数。\n// 使用的 bundle 键为：\n//  \
  \   ContentResolver.QUERY_ARG_SQL_SELECTION\n//     ContentResolver.QUERY_ARG_SQL_SELECTION_ARGS\n\
  //     ContentResolver.QUERY_ARG_SQL_SORT_ORDER -或-\n//         ContentResolver.QUERY_ARG_SORT_COLUMNS\n\
  //         （这是一个 String 数组）\nfun query(\n    uri: Uri,\n    projection: Array,\n\
  \    queryArgs: Bundle,\n    cancellationSignal: CancellationSignal\n) : Cursor\n\
  ```\n\n这些方法并非用于呈现诸如图像和声音之类的文件数据。然而，返回文件数据的链接或标识符是可以接受的。\n\n在以下段落中，我们按名称和变体描述所有参数：\n\
  \n- **`uri`** : 这是一个重要参数，用于指定查询在数据空间中的类型坐标。内容消费者将通过适当指定此参数来告知他们对哪种*类型*的数据感兴趣。由于\
  \ URI 非常重要，我们将在专门的子章节中描述它们；请参阅下一节“设计内容 URI”。此参数对于变体 A、B 和 C 含义相同。\n\n\n\n"
- "# 内容提供者查询参数\n\n- **projection**：该参数告知实现方请求者感兴趣的列。以 SQL 数据库类型存储数据为例，它列出了结果中应包含的列名。但并非严格要求一一映射——请求者可能要求选择参数\"\
  X\"，而\"X\"的值可通过任何你能想到的方式计算得出。如果为`null`，则返回所有字段。该参数对所有变体 A、B、C 含义相同。\n\n- **selection**：仅适用于变体\
  \ A 和 B，指定要返回数据的筛选条件。内容提供者框架不要求该筛选参数的具体形式——完全由实现方决定，内容请求者必须遵循实现方的定义。但在许多情况下，你会看到类似\
  \ SQL 筛选字符串如\"name = Jean AND age < 45\"的形式。如果为`null`，则返回所有数据集。\n\n- **selectionArgs**：筛选参数可能包含\"\
  ?\"等占位符。若存在，此数组指定要填入占位符的值。框架同样不对此做严格规定，但大多数情况下\"?\"作为占位符使用，如 SQL 中的\"name = ? AND\
  \ age < ?\"。若无筛选占位符，此参数可为`null`。\n\n- **sortOrder**：仅适用于变体 A 和 B，指定返回数据的排序方式。内容提供者框架不规定具体语法，但针对类似\
  \ SQL 的访问，通常会是\"name DESC, age ASC\"这样的形式。\n\n- **queryArgs**：对于变体 C，筛选条件、筛选参数和排序方式这三个参数均可选择通过`android.os.Bundle`对象来指定。按惯例，对于类似\
  \ SQL 的查询，Bundle 的键值为：\n    - `ContentResolver.QUERY_ARG_SQL_SELECTION`\n    - `ContentResolver.QUERY_ARG_SQL_SELECTION_ARGS`\n\
  \    - `ContentResolver.QUERY_ARG_SQL_SORT_ORDER`\n\n- **cancellationSignal**：对于变体\
  \ B 和 C，如果此参数不为`null`，你可以用它取消当前操作。Android OS 会相应通知请求者。\n\n所有查询方法都应返回一个`android.database.Cursor`对象，以便遍历数据集。按约定，每个数据集都包含一个以\"\
  _id\"为键的技术主键。请参阅以下章节\"基于 AbstractCursor 等的 Cursor 类\"和\"基于 Cursor 接口的 Cursor 类\"\
  ，了解如何设计合适的游标对象。\n\n## 修改内容\n\n内容提供者不仅允许读取内容，还允许修改内容。为此提供了以下方法：\n\n```\nabstract\
  \ fun insert(\n    Uri uri:Uri,\n    values:ContentValues) : Uri\n// 无需重写此方法，默认实现会正确遍历输入数组\n\
  // 并对每个元素调用 insert(...)\nfun bulkInsert(\n    uri:Uri,\n    values:Array) : Int\n\
  abstract fun update(\n    uri:Uri,\n    values:ContentValues,\n    selection:String,\n\
  \    selectionArgs:Array) : Int\nabstract fun delete(\n    uri:Uri,\n    selection:String,\n\
  \    selectionArgs:Array) : Int\n```\n\n下面我们描述这些参数及其含义：\n\n- **uri**：指定数据空间中的数据类型坐标。内容消费者通过恰当指定此参数来告知其目标数据的*种类*。详细描述请参见\"\
  设计内容 URI\"一节。注意，对于删除或更新单个数据集，通常假定 URI 路径末尾包含数据的（技术）主键，例如：`content://com.android.contacts/contact/42`。\n\
  \n- **values**：要插入或更新的值。通过此类提供的各种`get*()`方法来访问这些值。\n\n- **selection**：指定要更新或删除数据的筛选条件。内容提供者框架不强制要求该参数的形式——完全由实现方定义，内容请求者必须遵循实现方的定义。但在许多情况下，你会看到类似\
  \ SQL 筛选字符串如\"name = Jean AND age < 45\"的形式。如果为`null`，则作用于数据集中的所有条目。\n\n- **selectionArgs**：筛选参数可能包含\"\
  ?\"等占位符。若存在，此数组指定要填入占位符的值。框架同样不对此做严格规定，但大多数情况下\"?\"作为占位符使用，如 SQL 中的\"name = ? AND\
  \ age < ?\"。若无筛选占位符，此参数可为`null`。\n\n`insert()`方法应返回指定插入数据的 URI。此返回值可为`null`，因此没有严格要求必须返回值。如果返回了值，则应包含技术主键。所有返回`Int`的方法都应返回受影响数据集的数量。如果你不希望内容提供者能修改任何数据，可以为所有插入、更新和删除方法提供空实现，并让它们返回`0`或`null`。\n\
  \n## 完成 ContentProvider 类\n\n为了完成`ContentProvider`类的实现，除了查询、插入、更新和删除方法外，你还必须实现一个方法：\n\
  \n```\nabstract getType(uri:Uri) : String\n```\n\n该方法将任何可用的 URI 映射到相应的 MIME 类型。例如，对于可能的实现，你可以按如下方式使用\
  \ URI：\n\n```\nContentResolver.CURSOR_DIR_BASE_TYPE + \"/vnd.<名称>.<类型>\"\nContentResolver.CURSOR_ITEM_BASE_TYPE\
  \ + \"/vnd.<名称>.<类型>\"\n```\n\n分别用于指向*可能*包含多个条目或*至多*一个条目的 URI。对于`<名称>`，请使用全局唯一的名称，可以是公司域名的倒序、包名或其显著部分。对于`<类型>`，使用定义表名或数据域的标识符。\n\
  \n## 注册内容提供者\n\n完成`ContentProvider`实现后，必须在`AndroidManifest.xml`文件中按如下方式注册：\n\n```\n\
  <provider\n    android:authorities=\"...\"\n    android:directBootAware=\"...\"\n\
  \    android:enabled=\"...\"\n    android:exported=\"...\"\n    android:grantUriPermissions=\"\
  ...\"/>\n```\n\n这些属性在表 6-1 中描述。\n\n**表 6-1** `<provider>`元素\n\n| 属性（每个需加`android:`前缀）\
  \ | 描述 |\n|---|---|\n| `authorities` | 分号\";\"分隔的权限列表。多数情况下只有一个权限，通常使用应用（包）名或`ContentProvider`实现类的完整类名。没有默认值，必须至少有一个。\
  \ |\n| `directBootAware` | 内容提供者是否可在用户解锁设备前运行。默认值为 false。 |\n| `enabled` | 内容提供者是否启用。默认值为\
  \ true。 |\n| `exported` | 其他应用是否可访问此内容。根据应用架构，访问权限可能仅限于同一应用的组件，但通常你希望其他应用能访问内容，因此将此设置为`true`。从\
  \ API 级别 17 开始，默认值为 false。在此之前该标记不存在，应用行为等同于设置为 true。 |\n| `grantUriPermissions`\
  \ | 是否可以通过 URI 临时授予其他应用访问此提供者内容的权限。*临时授予*是指当访问内容的客户端通过带有`intent.addFlags(Intent.FLAG_GRANT_URI_PERMISSION)`的\
  \ Intent 调用时，临时覆盖由`<permission>`、`<readPermission>`或`<writePermission>`定义的权限拒绝。若将此属性设为`false`，仍可通过设置一个或多个`<grant-uri-permission>`子元素来授予更细粒度的临时权限。默认值为\
  \ false。 |\n\n\n\n"
- "# 内容提供者属性\n\n`icon`  \n用于提供者图标的资源 ID。默认使用父组件的图标。\n\n`initOrder`  \n在此处可为同一应用的内容提供者指定实例化顺序。数值越大，实例化越早。请谨慎使用此属性，因为启动顺序依赖可能表明应用设计存在缺陷。\n\
  \n`label`  \n用于标签的字符串资源 ID。默认使用应用的 `label`。\n\n`multiprocess`  \n若设为 `true`，运行在多个进程中的应用可能会同时运行多个内容提供者实例。否则，最多只会存在一个内容提供者实例。默认值为\
  \ `false`。\n\n`name`  \n`ContentProvider` 实现的完全限定类名。\n\n`permission`  \n用于同时设置 `readPermission`\
  \ 和 `writePermission` 的便捷方式（详见下文）。若后两者之一被指定，则优先采用该指定值。\n\n`process`  \n若希望内容提供者在不同于应用自身的进程中运行，请指定进程名称。若以“:”开头，则该进程为应用私有；若以小写字母开头，将使用全局进程（需具备相应权限）。默认在应用进程中运行。\n\
  \n`readPermission`  \n客户端为读取内容提供者数据所必须具备的权限。未获得该权限的客户端仍可能通过 `grantUriPermissions`\
  \ 属性访问内容。\n\n`syncable`  \n内容提供者的数据是否应与服务器同步。\n\n`writePermission`  \n客户端为写入内容提供者数据所必须具备的权限。未获得该权限的客户端仍可能通过\
  \ `grantUriPermissions` 属性访问内容。\n\n---\n\n若使用 `grantUriPermissions` 临时授予通过隐式 `Intent`\
  \ 调用的其他应用组件 URI 权限，则必须精心构造此类 `Intent`：(1) 添加标志 `Intent.FLAG_GRANT_READ_URI_PERMISSION`；(2)\
  \ 在 `Intent` 的 `data` 字段中添加允许访问的 URI。示例如下：\n\n```\nintent.action = \"com.example.app.VIEW\"\
  \ // 设置 INTENT 动作\nintent.flags = Intent.FLAG_ACTIVITY_NEW_TASK\nintent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION)\
  \ // 授予临时读取权限\nintent.data = Uri.parse(\"content:///\") // 请使用你自己的 URI！\nstartActivity(intent)\n\
  ```\n\n在被调用组件的 Intent 过滤器中，必须指定一个 `<data>` 元素，且该元素必须包含适当的 URI *和* MIME 类型。虽然我们未明确声明，但必须指定\
  \ MIME 类型的原因是：Android 系统在解析 `Intent` 时，会通过内容提供者的 `getType(Uri)` 方法自动添加 MIME 类型。例如：\n\
  \n被调用组件随后获得按指定方式访问该 URI 的权限。完成操作后，应调用 `revokeUriPermission(String, Uri, Int)` 撤销已获得的临时权限：\n\
  \n```\nrevokePermission(getPackageName(), uri, Intent.FLAG_GRANT_READ_URI_PERMISSION\
  \ or Intent.FLAG_GRANT_WRITE_URI_PERMISSION)\n```\n\n在 `<provider>` 元素内，可添加若干子元素：\n\
  \n*   **meta-data**\n\n根据指定方式，必须指定“resource”或“value”。使用“resource”时，像 `@string/someString`\
  \ 这样的资源 ID 会将资源 ID 本身赋给元条目；而使用“value”和 `@string/someString` 则会将资源的*内容*赋给元条目。\n\n\
  *   **grant-uri-permission**\n\n授予特定 URI 权限（可使用零到多个此子元素）。仅当父元素的 `grantUriPermissions`\
  \ 属性设为 `false` 时，此子元素才允许访问特定 URI。请使用以下属性之一：“path”用于完整 URI，“pathPrefix”用于以特定值开头的\
  \ URI，“pathPattern”支持通配符——`X*` 表示匹配零到多个任意字符 `X`，`.*` 表示匹配零到多个任意字符。\n\n*   **path-permission**\n\
  \n若要定义内容提供者可提供的部分数据，可使用此元素指定路径和所需权限。“path”属性指定完整路径，“pathPrefix”属性用于匹配路径的起始部分，“pathPattern”是完整路径，但支持通配符：`*`\
  \ 匹配零到多个特定字符，`.*` 匹配零到多个任意字符。`permission` 属性指定读写权限，而 `readPermission` 和 `writePermission`\
  \ 属性则区分读权限和写权限。若后两者之一被指定，则优先于 `permission` 属性。\n\n---\n\n## 设计内容 URI\n\nURI 描述了内容请求者感兴趣的数据域。从\
  \ SQL 的角度看，这相当于表名。然而 URI 的功能不止于此。URI 的官方语法是：\n\n```\nscheme:[//[user[:password]@]host[:port]][/path][?query][#fragment]\n\
  ```\n\n可以看到，“user”“password”和“port”部分是可选的，在 Android 环境中通常不会指定它们。但这并非禁止，在某些情况下也是有意义的。“host”部分被最广泛地解释为提供某种内容的主体，这正是此处对其的解读，其中“某种内容”即数据。为使这一概念更清晰，在\
  \ Android 中“host”部分通常被称为*authority*。例如，在*通讯录*系统应用中，authority 会是 `com.android.contacts`（不要使用字符串，而应使用类常量字段——详见下文的“Contract”部分）。“scheme”按惯例通常为\
  \ `content`。因此通用通讯录 URI 以如下形式开始：\n\n```\ncontent://com.android.contacts\n```\n\n\
  URI 的“path”部分指定数据域，或从 SQL 角度理解为“表”。例如通讯录中的用户个人资料数据通过以下 URI 访问：\n\n```\ncontent://com.android.contacts/profile\n\
  ```\n\n在此示例中路径只有一个元素，但可以更复杂，如 `pathpart1/pathpart2/pathpart3`。URI 还可以包含指定筛选条件的“query”部分。查看\
  \ `android.content.ContentProvider` 类中的查询方法，我们已有在 API 层面指定筛选条件的可能性，但允许在 URI 中包含查询参数也是完全可以接受的（尽管非必需）。若需在查询参数中放入多个元素，可遵循常规惯例使用“&”作为分隔符，例如\
  \ `name=John&age=37`。“fragment”部分指定辅助资源，在内容提供者中不常用。但如果对你有帮助，也可以使用。由于 URI 是一种非常通用的构造，且猜测用于访问某些应用所提供内容的正确\
  \ URI 几乎不可能，因此内容提供者应用通常会提供一个契约类来帮助构建正确的 URI——详见下文“构建内容接口契约”部分。\n\n---\n\n## 构建内容接口契约\n\
  \n客户端访问数据所使用的 URI 代表了对内容的接口。因此，提供一个客户端可查阅以确定使用哪些 URI 的集中式位置是个好主意。Android 文档建议为此目的使用内容契约类。此类契约类的大致轮廓如下：\n\
  \n\n```kotlin\nclass MyContentContract {\n    companion object {\n        // 授权信息和基础\
  \ URI\n        @JvmField\n        val AUTHORITY = \"com.xyz.whatitis\"\n       \
  \ @JvmField\n        val CONTENT_URI = Uri.parse(\"content://\" +\n            \
  \    AUTHORITY)\n        // 基于 ID 查询的选择条件\n        @JvmField\n        val SELECTION_ID_BASED\
  \ = BaseColumns._ID +\n                \" = ? \"\n    }\n    // 针对不同数据表（或项目类型）\n\
  \    // 建议用内部类来分别定义。\n    // 以下仅为一个示例\n    class Items {\n        companion object\
  \ {\n            // 项目名称\n            @JvmField\n            val NAME = \"item_name\"\
  \n            // 项目的 Content URI\n            @JvmField\n            val CONTENT_URI\
  \ = Uri.withAppendedPath(\n                MyContentContract.CONTENT_URI, \"items\"\
  )\n            // 项目目录的 MIME 类型\n            @JvmField\n            val CONTENT_TYPE\
  \ =\n                ContentResolver.CURSOR_DIR_BASE_TYPE +\n                  \
  \      \"/vnd.\" + MyContentContract.AUTHORITY +\n                        \".items\"\
  \n            // 单个项目的 MIME 类型\n            @JvmField\n            val CONTENT_ITEM_TYPE\
  \ =\n                ContentResolver.CURSOR_ITEM_BASE_TYPE +\n                 \
  \       \"/vnd.\" + MyContentContract.AUTHORITY +\n                        \".items\"\
  \n            // 在此可以添加数据库列名、投影规范\n            // 或排序规范等\n            // ...\n \
  \       }\n    }\n}\n```\n\n当然，界面设计的一部分必须为类、字段名和字段值使用有意义的名字。\n\n**注意**\n\n契约类中描述的界面并非*必须*对应实际的数据库表——将界面与实际实现从概念上解耦，并在此提供以任意方式衍生的表连接或其他项目类型，不仅完全可行，而且是有益的。\n\
  \n关于这个结构有几点说明：\n\n- 如果你能确保客户端仅使用 Kotlin 作为平台，那么代码可以写得更简短，无需任何样板代码：\n\n```kotlin\n\
  object MyContentContract2 {\n    val AUTHORITY = \"com.xyz.whatitis\"\n    val CONTENT_URI\
  \ = Uri.parse(\"content://\"\n            + AUTHORITY)\n    val SELECTION_ID_BASED\
  \ =\n        BaseColumns._ID + \" = ? \"\n    object Items {\n        val NAME =\
  \ \"item_name\"\n        val CONTENT_URI =\n            Uri.withAppendedPath(\n\
  \                MyContentContract.CONTENT_URI, \"items\")\n        val CONTENT_TYPE\
  \ =\n            ContentResolver.CURSOR_DIR_BASE_TYPE +\n                    \"\
  /vnd.\" + MyContentContract.AUTHORITY +\n                    \".items\"\n      \
  \  val CONTENT_ITEM_TYPE =\n            ContentResolver.CURSOR_ITEM_BASE_TYPE +\n\
  \                    \"/vnd.\" + MyContentContract.AUTHORITY +\n               \
  \     \".items\"\n    }\n}\n```\n\n然而，如果我们希望 Java 客户端也能使用这个界面，就必须使用这些 `companion\
  \ object` 和 `@JvmObject` 声明及修饰符。\n\n- 使用 `companion object` 和 `@JvmObject` 注解可以像\
  \ Java 的静态字段一样，通过 `TheClass.THE_FIELD` 进行访问。\n\n- 你可以考虑为客户端提供等效的 Java 构造，这样如果客户端只使用\
  \ Java，就无需学习 Kotlin 语法。\n\n- `Uri.parse()` 和 `Uri.withAppendedPath()` 方法调用只是 `Uri`\
  \ 类使用的两个例子。该类还包含其他一些有助于构建正确 URI 的方法。\n\n- 你也可以在契约类内部提供辅助方法。如果这样做，请确保该界面类不依赖其他类，并为\
  \ `fun` 函数声明添加 `@JvmStatic` 修饰符，使其可从 Java 调用。\n\n然后，你可以将此契约类（或者多个类，如果你想同时用 Kotlin\
  \ 和 Java 记录界面）公开提供给任何可能使用你内容提供器应用的客户端。\n\n## 基于 `AbstractCursor` 等的游标类\n\n`ContentProvider`\
  \ 中所有的 `query*()` 方法都返回一个 `android.database.Cursor` 对象。从包名可以看出这是一个以数据库为中心的类，这实际上是\
  \ Android 的一个小设计缺陷，因为内容接口本应对访问方法保持不可知。\n\n除此之外，`Cursor` 接口为希望遍历结果集的客户端提供了一个随机访问接口。你可以使用基础实现\
  \ `android.database.AbstractCursor` 作为游标类——它已经实现了该接口的多个方法。具体做法是编写 `class MyCursor\
  \ : AbstractCursor { ... }` 或 `val myCursor = object : AbstractCursor { ... }`，然后实现所有抽象方法并重写部分其他方法，使类具备实际功能：\n\
  \n- **`override fun getCount(): Int`**\n\n  可用的数据集数量。\n\n- **`override fun getColumnNames():\
  \ Array<String>`**\n\n  列名的有序数组。\n\n- **`override fun getInt(column: Int): Int`**\n\
  \n  获取一个整型值（列索引从 0 开始）。\n\n- **`override fun getLong(column: Int): Long`**\n\n \
  \ 获取一个长整型值（列索引从 0 开始）。\n\n- **`override fun getShort(column: Int): Short`**\n\n\
  \  获取一个短整型值（列索引从 0 开始）。\n\n- **`override fun getFloat(column: Int): Float`**\n\n\
  \  获取一个浮点值（列索引从 0 开始）。\n\n- **`override fun getDouble(column: Int): Double`**\n\n\
  \  获取一个双精度浮点值（列索引从 0 开始）。\n\n- **`override fun getString(column: Int): String`**\n\
  \n  获取一个字符串值（列索引从 0 开始）。\n\n- **`override fun isNull(column: Int): Boolean`**\n\n\
  \  指示该值是否为 `null`（列索引从 0 开始）。\n\n- **`override fun getType(column: Int): Int`**\n\
  \n  你不必重写此方法，但如果未重写，它将始终返回 `Cursor.FIELD_TYPE_STRING`，并假定 `getString()` 始终返回有意义的内容。若需要更精细的控制，可让它返回\
  \ `FIELD_TYPE_NULL`、`FIELD_TYPE_INTEGER`、`FIELD_TYPE_FLOAT`、`FIELD_TYPE_STRING`\
  \ 或 `FIELD_TYPE_BLOB` 中的一个。列索引从 0 开始。\n\n- **`override fun getBlob(column: Int):\
  \ ByteArray`**\n\n  如果你要支持 BLOB（二进制大对象），请重写此方法。否则将抛出 `UnsupportedOperationException`。\n\
  \n- **`override fun onMove(oldPosition: Int, newPosition: Int): Boolean`**\n\n \
  \ 尽管没有标记为 `abstract`，你*必须*重写此方法。你的实现必须将游标移动到结果集中对应的位置。可能的值范围从 `-1`（第一个位置之前，无效位置）到\
  \ `count`（最后一个位置之后，无效位置）。如果移动成功，请返回 `true`。如果不重写，则不会发生任何操作，并且该函数始终返回 `true`。\n\n\
  `AbstractCursor` 还提供了一个方法 `fillWindow(position: Int, window: CursorWindow?): Unit`，你可以用它基于查询结果集填充\
  \ `android.database.CursorWindow` 对象。请参阅 `CursorWindow` 的在线 API 文档，以进一步了解此方法。\n\n\
  除了 `AbstractCursor`，`Cursor` 接口还有多个其他（抽象）实现可供使用。我们在表 6-2 中简要总结了它们。\n\n**表 6-2**\
  \ 更多游标实现\n\n| `android.database` 中的名称 | 描述 |\n|---|---|\n| `AbstractWindowedCursor`\
  \ | 继承自 `AbstractCursor`，拥有一个包含数据的 `CursorWindow` 对象。子类负责在 `onMove(Int, Int)` 操作期间填充游标窗口，并在必要时分配新的游标窗口。与\
  \ `AbstractCursor` 相比更易实现，但需要在 `onMove()` 中添加大量功能。 |\n| `CrossProcessCursor` | 一种允许从远程进程使用的游标实现。它只是\
  \ `android.database.Cursor` 接口的扩展，包含三个额外的方法：`fillWindow(Int, CursorWindow)`、`getWindow():\
  \ CursorWindow` 和 `onMove(Int, Int): Boolean`。它不提供自身实现；你需要重写 `Cursor` 中定义的所有方法。\
  \ |\n\n\n`CrossProcessCursorWrapper` | 一种游标实现，允许从远程进程使用它。实现`CrossProcessCursor`并持有一个`Cursor`委托，该委托也可以是`CrossProcessCursor`。\
  \ |\n`CursorWrapper` | 持有一个`Cursor`委托，所有方法调用都将转发给它。 |\n`MatrixCursor` | `Cursor`的完整实现，以对象数组的形式在内存中存储数据。你必须使用`addRow(...)`来添加数据。内部类`MatrixCursor.RowBuilder`可用于构建行，供`MatrixCursor.addRow(Array<Object>)`使用。\
  \ |\n`MergeCursor` | 使用它可以透明地合并或连接游标对象。 |\n`sqlite.SQLiteCursor` | `Cursor`的一种实现，数据由\
  \ SQLite 数据库提供支持。使用其中一个构造函数将游标连接到 SQLite 数据库对象。 |\n\n## 基于游标接口的游标类\n\n实现游标的一种更底层的方法是不依赖`AbstractCursor`，而是自己实现所有接口方法。然后你可以像`class\
  \ MyCursor : Cursor { ... }`那样使用子类化，或者像`val myCursor = object : Cursor { ... }`那样使用匿名对象。在在线文本伴侣的“游标接口”部分，我们列出并描述了所有接口方法。\n\
  \n## 在提供者代码内分派 URI\n\n为了简化传入 URI 的分派，`android.content.UriMatcher`类非常方便。如果你有类似这样的查询相关\
  \ URI：\n\n```\npeople            #列出目录中的所有人员\npeople/37         #查询 ID 为 37 的人员\n\
  people/37/phone   #获取 ID 为 37 的人员的电话信息\n```\n\n并且想使用一个简单的 switch 语句，你可以在你的类或对象内部编写：\n\
  \n```\nval PEOPLE_DIR_AUTHORITY = \"directory\"\nval PEOPLE = 1\nval PEOPLE_ID =\
  \ 2\nval PEOPLE_PHONES = 3\nval uriMatcher = UriMatcher(UriMatcher.NO_MATCH)\ninit\
  \ {\nuriMatcher.addURI(PEOPLE_DIR_AUTHORITY,\n\"people\", PEOPLE)\nuriMatcher.addURI(PEOPLE_DIR_AUTHORITY,\n\
  \"people/#\", PEOPLE_ID)\nuriMatcher.addURI(PEOPLE_DIR_AUTHORITY,\n\"people/#/phone\"\
  , PEOPLE_PHONES)\n}\n```\n\n其中“#”代表任意数字，“*”匹配任意字符串。\n\n在你的`ContentProvider`实现中，然后你可以使用以下结构来分派传入的字符串\
  \ URL：\n\n```\nwhen(uriMatcher.match(url)) {\nPEOPLE ->\n// 传入路径 = people，对其进行处理...\n\
  PEOPLE_ID ->\n// 传入路径 = people/#，对其进行处理...\nPEOPLE_PHONES ->\n// 传入路径 = people/#/phone，...\n\
  else ->\n// 做其他事情\n}\n```\n\n## 提供内容文件\n\n内容提供者不仅仅可以访问类似数据库的内容；它们还可以公开用于检索类似文件数据（如图像或声音文件）的方法。为此目的，提供了以下方法：\n\
  \n*   `override fun getStreamTypes(uri:Uri, mimeTypeFilter:String) : Array<String>`\
  \  \n    如果你的内容提供者提供文件，请重写此方法以允许客户端根据 URI 确定支持的 MIME 类型。`mimeTypeFilter`不应为`null`，你可以使用它来过滤输出。它支持通配符，因此如果客户端想要检索所有值，它将在此处写入“*/*”，你的提供者代码需要正确处理此情况。输出还必须包含那些可能是提供者执行适当类型转换后结果的所有类型。可能返回`null`以指示结果集为空。例如“image/png”或“audio/mpeg”。\n\
  \n*   `override fun openFile(uri:Uri, mode:String): ParcelFileDescriptor`  \n  \
  \  重写此方法以处理打开文件 blob 的请求。参数“mode”必须是以下之一（没有默认值）：\n    *   “r” 表示只读访问\n    *   “w”\
  \ 表示只写访问（如果数据已存在则先擦除）\n    *   “wa” 类似“w”，但可能追加数据\n    *   “rw” 表示读取和追加写入\n    *\
  \   “rwt” 类似“rw”，但会截断现有数据\n    要了解如何处理返回的`ParcelFileDescriptor`，请参阅下文。\n\n*   `override\
  \ fun openFile(uri:Uri, mode:String, signal:CancellationSignal): ParcelFileDescriptor`\
  \  \n    与`openFile(Uri, String)`相同，但另外客户端可以在读取文件进行中时发出取消信号——提供者可以保存`signal`对象，并通过定期调用`signal`对象上的`throwIfCancelled()`来捕获客户端的取消请求。\n\
  \n*   `override fun openAssetFile(uri:Uri, mode:String): AssetFileDescriptor`  \n\
  \    这类似于`openFile(Uri, String)`，但可以由需要能够返回文件子集（通常是其 APK 中的资产）的提供者实现。要实现此目的，你可能想使用`android.content.res.AssetManager`类。你可以在上下文的`asset`字段中找到它，因此，例如在\
  \ Activity 中，你可以直接使用`asset`来寻址`AssetManager`。\n\n*   `override fun openAssetFile(uri:Uri,\
  \ mode:String, signal:CancellationSignal): AssetFileDescriptor`  \n    与`openAssetFile(Uri,\
  \ String)`相同，但允许从客户端取消。提供者可以保存`signal`对象，并通过定期调用`signal`对象上的`throwIfCancelled()`来捕获客户端的取消请求。\n\
  \n*   `override fun : openTypedAssetFile(uri:Uri, mimeTypeFilter:String, opts:Bundle):\
  \ AssetFileDescriptor`  \n    如果你希望客户端能够按 MIME 类型读取（不是写入！）资产数据，请实现此方法。默认实现将`mimeTypeFilter`与从`getType(Uri)`获得的任何内容进行比较，如果匹配，则简单地转发到`openAssetFile(...)`。\n\
  \n*   `override fun : openTypedAssetFile(uri:Uri, mimeTypeFilter:String, opts:Bundle,\
  \ signal:CancellationSignal): AssetFileDescriptor`  \n    与`openTypedAssetFile(Uri,\
  \ String, Bundle)`相同，但允许从客户端取消。提供者可以保存`signal`对象，并通过定期调用`signal`对象上的`throwIfCancelled()`来捕获客户端的取消请求。\n\
  \n*   `override fun <T : Any?> openPipeHelper(uri: Uri?, mimeType: String?, opts:\
  \ Bundle?, args: T, func: PipeDataWriter<T>?): ParcelFileDescriptor`  \n    一个用于实现`openTypedAssetFile(Uri,\
  \ String, Bundle)`的辅助函数。它创建一个数据管道和一个后台线程，允许你将生成的数据流回客户端。此函数返回一个新的`ParcelFileDescriptor`。工作完成后，调用者必须关闭它。\n\
  \n*   `override fun openFileHelper(uri:Uri, mode:String): ParcelFileDescriptor`\
  \  \n    这是一个供子类使用的便捷方法。默认实现打开一个文件，其路径由使用提供的 URI 进行的`query()`结果给出。对于文件路径，从查询结果中提取“_data”成员，并且结果集计数必须为`1`。\n\
  \n那些返回`ParcelFileDescriptor`对象的方法可以像这样调用适当的构造函数：\n\n```\nval fd = ... // 获取 ParcelFileDescriptor\n\
  val inpStream = ParcelFileDescriptor.AutoCloseInputStream(fd)\nval outpStream =\
  \ ParcelFileDescriptor.AutoCloseOutputStream(fd)\n```\n\n来为文件构建输入和输出流。一旦流的工作完成，你必须在流上使用`close()`方法\
  \ —— “Auto”意味着当你关闭流时，`ParcelFileDescriptor`会自动为你关闭。\n\n类似地，那些返回`AssetFileDescriptor`对象的方法可以像这样调用适当的构造函数：\n\
  \n```\nval fd = ... // 获取 AssetFileDescriptor\nval inpStream = AssetFileDescriptor.AutoCloseInputStream(fd)\n\
  val outpStream = AssetFileDescriptor.AutoCloseOutputStream(fd)\n```\n\n来为文件构建输入和输出流。同样，一旦流的工作完成，你必须在流上使用`close()`方法\
  \ —— 只有当你关闭流时，`AssetFileDescriptor`才会为你自动关闭。\n\n## 通知监听器数据已更改\n\n\n\n"
- "# 客户端通过 Content Provider 接收变更通知\n\n一个客户端通过其 `ContentResolver` 字段（例如 `Activity.contentResolver`）访问内容提供者时，可以注册以接收内容变更的通知，调用方式如下：\n\
  \n```\nval uri = ... // a content uri\ncontentResolver.registerContentObserver(uri,\
  \ true,\n    object : ContentObserver(null) {\n        override fun onChange(selfChange:\
  \ Boolean) {\n            // do something\n        }\n        override fun onChange(selfChange:\
  \ Boolean,\n                              uri: Uri?) {\n            // do something\n\
  \        }\n    }\n)\n```\n\n`registerContentObserver()` 的第二个参数指定子 URI（即原 URI 加上更多路径元素）是否也会触发通知。`ContentObserver`\
  \ 的构造函数参数也可以是一个 `Handler` 对象，用于在不同线程中接收 `onChange` 消息。\n\n为了使这一机制正常工作，在内容提供者端，你可能需要确保事件被正确触发。例如，在任何数据修改方法内部，你应该添加：\n\
  \n```\ncontext.contentResolver.notifyChange(uri, null)\n```\n\n此外，为了使变更监听更加健壮，你可能希望通知由\
  \ `query()` 方法返回的所有 `Cursor` 对象。为此，`cursor` 提供了 `registerContentObserver()` 方法，你可以用它来收集基于游标的内容观察者。内容提供者随后也会向这些内容观察者发送消息。\n\
  \n"
- "# 扩展 Content Provider\n\n我们已经看到，内容提供者允许访问类似数据库的内容和文件。如果你对这种实现方式不太满意，或者对内容提供者的功能有自己独特的设计思路，你可以实现\
  \ `call()` 方法，如下所示：\n\n```\noverride fun call(method: String, arg: String, extras:\
  \ Bundle): Bundle {\n    super.call(method, arg, extras)\n    // do your own stuff...\n\
  }\n```\n\n通过这种方式，你可以设计自己的内容访问框架。当然，你应该告知可能的客户端如何使用这个接口，例如在契约类中说明。\n\n### 注意\n\n\
  调用此方法时不进行任何安全检查。你必须自行实现适当的安全检查，例如在上下文中使用 `checkSelfPermission()`。\n\n"
- '# 通过 URI 规范化的客户端访问一致性


  很多时候，查询结果中包含依赖于短期数据库上下文的 ID、列表索引号或其他信息。例如，一个查询可能返回项目 ID 如 23、67 和 56，如果你需要获取某个项目的详细信息，你需要使用包含该
  ID 的另一个 URI 再次查询，例如 `content://com.xyz/people/23`。这种 URI 的问题是，客户端通常不会将它们保存起来供以后使用——ID
  可能会改变，因此 URI 并不可靠。


  为了解决这个问题，内容提供者可以实现 *URI 规范化*。为此，你的内容提供者类需要实现以下两个方法：


  - **`canonicalize(url: Uri): Uri`**：让此方法返回规范化的 URI，例如通过添加一些特定于域的查询参数，如下例所示。

  - **`uncanonicalize(url: Uri): Uri`**：执行与 `canonicalize()` 完全相反的操作。如果项目已丢失且无法执行反规范化，则返回
  `null`。


  ```

  content://com.xyz/people/23  ->

  content://com.xyz/people?firstName=John&lastName=Bird&Birthday=20010534&SSN=123-99-1624

  ```


  '
- '# 消费内容


  为了消费内容，内容提供者的客户端使用一个 `android.content.ContentResolver` 对象。任何 `Context` 对象（包括 Activity、Service
  等）都提供一个 `getContentResolver()` 方法，在 Kotlin 中简写为 `contentResolver`。


  ## 使用 Content Resolver


  访问类似数据库的内容时，你可以使用以下 `ContentResolver` 方法：


  - **`insert(url: Uri, values: ContentValues): Int`**：插入一条记录。

  - **`delete(url: Uri, where: String, selectionArgs: Array<String>): Int`**：删除记录。

  - **`update(uri: Uri, values: ContentValues, where: String, selectionArgs: Array<String>):
  Int`**：更新记录。

  - **`query(uri: Uri, projection: Array<String>, queryArgs: Bundle, cancellationSignal:
  CancellationSignal): Cursor`**：查询。

  - **`query(uri: Uri, projection: Array<String>, selection: String, selectionArgs:
  Array<String>, sortOrder: String, cancellationSignal: CancellationSignal): Cursor`**：查询。

  - **`query(uri: Uri, projection: Array<String>, selection: String, selectionArgs:
  Array<String>, sortOrder: String): Cursor`**：查询。


  这些方法的签名和含义与对应的 `ContentProvider` 方法密切相关——请参阅前面的“提供内容”部分。也可以查阅在线 API 参考。


  要访问文件内容，你可以使用以下方法之一：


  - **`openAssetFileDescriptor(uri: Uri, mode: String, cancellationSignal: CancellationSignal):
  AssetFileDescriptor`**：打开内部（资产）文件。

  - **`openAssetFileDescriptor(uri: Uri, mode: String): AssetFileDescriptor`**：打开内部（资产）文件，无取消信号。

  - **`openTypedAssetFileDescriptor(uri: Uri, mimeType: String, opts: Bundle, cancellationSignal:
  CancellationSignal): AssetFileDescriptor`**：打开类型化的内部（资产）文件。

  - **`openTypedAssetFileDescriptor(uri: Uri, mimeType: String, opts: Bundle): AssetFileDescriptor`**：打开类型化的内部（资产）文件，无取消信号。

  - **`openFileDescriptor(uri: Uri, mode: String, cancellationSignal: CancellationSignal):
  ParcelFileDescriptor`**：打开文件。

  - **`openFileDescriptor(uri: Uri, mode: String): ParcelFileDescriptor`**：打开文件，无取消信号。

  - **`openInputStream(uri: Uri): InputStream`**：打开输入流。

  - **`openOutputStream(uri: Uri, mode: String): OutputStream`**：打开输出流。

  - **`openOutputStream(uri: Uri): OutputStream`**：打开输出流，模式为 “w”。


  `open*Descriptor()` 方法同样与“提供内容”部分中对应的 `ContentProvider` 方法密切相关。另外两个方法 `openInputStream()`
  和 `openOutputStream()` 是用于更方便地访问文件（流）数据的便捷方法。


  要注册内容观察者以便在内容发生变化时异步收到通知——请参阅前面的“通知监听器数据变更”部分——可以使用以下方法：


  - `registerContentObserver(uri: Uri, notifyForDescendants: Boolean, observer: ContentObserver)`

  - `unregisterContentObserver(observer: ContentObserver)`


  要使用通过实现 `call()` 方法进行扩展的内容提供者，你可以使用内容解析器对应的 `call(uri: Uri, method: String, arg:
  String, extras: Bundle): Bundle` 方法。


