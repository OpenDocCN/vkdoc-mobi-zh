- '# 关于代码的一些说明


  虽然我力求对本书中展示的所有代码遵循*整洁代码*原则，但为了简洁明了，我使用了两种反模式，**你不应该**在你的生产代码中遵循：


  -   我没有使用本地化的字符串资源。因此，当你在 XML 资源中看到类似：


  ```

  android:text = "Some message"

  ```


  的内容时，你实际应该做的是创建一个字符串资源，并让属性引用它，如下所示：


  ```

  android:text = "@string/message"

  ```


  -   对于日志记录语句，我总是使用`"LOG"`作为标签，例如：


  ```

  Log.e("LOG", "The message")

  ```


  在你的代码中，你应该基于类名创建一个标签：


  ```

  companion object {

  val TAG="The class name"

  ...

  }

  ```


  然后使用它：


  ```

  Log.e(TAG, "The message")

  ```


  '
- '# 1. 系统


  Android 操作系统诞生于 2003 年，是 Android Inc.公司的产品，随后于 2005 年被谷歌有限责任公司收购。第一款运行 Android 的设备于
  2008 年进入市场。自那时起，它经历了无数次更新，截至 2022 年中，最新版本号为 12.1。


  从第一个版本开始，Android 操作系统的市场份额就持续增长，到 2021 年，据称保持在 72%以上。尽管数据因资料来源而异，但 Android 操作系统的成功无疑是无可否认的。这一胜利部分源于谷歌有限责任公司作为全球智能手机市场的精明参与者，但也归功于
  Android 操作系统被精心定制，以满足智能手机及其他手持或类手持设备的需求。


  话虽如此，大多数以前或仍在 PC 环境工作的计算机开发者，如果完全忽视手持设备开发，将会错失良机。本书旨在帮助你作为开发者理解 Android 操作系统并掌握其上程序的开发。本书也专注于使用
  Kotlin 作为语言来实现开发需求，但首先，我们将审视 Android 操作系统及其辅助的开发相关系统，使你了解 Android 的内部运作机制。




  '
- '# Android 操作系统


  Android 基于一个专门定制的 Linux 内核。该内核提供了所有底层驱动程序，用于处理硬件、程序执行环境以及底层通信通道。


  在内核之上，你会发现 *Android 运行时 (ART)* 和一些用 C 编写的底层库。后者充当了应用相关库与内核之间的桥梁。Android 运行时是 Android
  程序运行的执行引擎。


  作为开发者，你几乎不需要了解这些底层库和 Android 运行时如何工作的细节，但你将使用它们来完成基本编程任务，例如处理音频子系统或数据库。


  在底层库和 Android 运行时之上的是*应用框架*，它定义了您为 Android 构建的任何应用的外部结构。它处理活动、GUI 小部件、通知、资源等。虽然了解底层库肯定有助于编写优秀的程序，但了解应用框架对于编写任何
  Android 应用都是必不可少的。


  在最顶层，你会发现用户为完成任务而启动的应用。请参见图 1-1。


  ![](img/463716_2_En_1_Fig1_HTML.png)


  Android 应用系统包含应用、应用网络和库。


  图 1-1


  Android 操作系统


  作为开发者，您将使用 Kotlin、Java 或 C++ 作为编程语言（或它们的组合）来创建 Android 应用。并且您将使用应用框架和库来与 Android
  操作系统和硬件进行通信。在较低层面上使用 C++ 作为编程语言，处理目标架构的特殊性，会导致引入*原生开发工具包 (NDK)*，它是 Android SDK 的一个可选部分。虽然出于特殊目的可能需要使用
  NDK，但在大多数情况下，为处理另一种语言及其带来的特殊挑战而付出的额外努力并不划算。因此，在本书中，我们主要会在适当的地方讨论 Kotlin 和 Java。


  '
- '# 开发系统


  在手持设备上运行的操作系统只是故事的一部分——作为开发者，您还需要一个用于创建 Android 应用的系统。后者发生在个人电脑或笔记本电脑上，您使用的软件套件是
  *Android Studio*。


  Android Studio 本身是您用于开发的 IDE，但当您安装和操作它时，SDK 也会随之安装，我们将在以下章节中讨论两者。我们还将讨论虚拟设备，它为在各种目标设备上测试您的应用提供了宝贵的帮助。


  ## Android Studio


  Android Studio IDE 是用于创建和运行 Android 应用的专用开发环境。其主窗口以及模拟器视图如图 1-2 所示。


  Android Studio 提供以下功能：


  ![](img/463716_2_En_1_Fig2_HTML.jpg)


  Android Studio 的截图。


  图 1-2


  Android Studio


  *   管理 Kotlin、Java 和 C++ (NDK) 的程序源代码

  *   管理程序资源

  *   允许在模拟器或连接的实机中试运行应用

  *   更多测试工具

  *   调试功能

  *   性能和内存分析器

  *   代码检查

  *   用于构建本地或可发布应用的工具


  Studio 中包含的帮助和在线资源提供了足够的信息来掌握 Android Studio——在本书中，我们会不时地并在专门的章节中讨论它。


  '
- '# 虚拟设备


  为计算机开发软件始终包含一个挑战，即创建一个能够处理所有可能目标系统的程序。如今手持设备形式多样，这方面变得比以往任何时候都更加关键。您有尺寸在 3.9 英寸到
  5.4 英寸及以上的智能手机设备，7 英寸到 14 英寸及以上的平板电脑，可穿戴设备，不同尺寸的电视等等，所有这些都运行着 Android 操作系统。


  当然，作为开发者，您不可能购买所有必要的设备来覆盖所有可能的尺寸。这就是模拟器派上用场的地方。有了模拟器，您不必购买硬件，仍然可以开发 Android 应用。


  Android Studio 使您能够轻松使用模拟器来开发和测试应用，并且通过使用 SDK 中的工具（请参见下一节“SDK”），您甚至可以在 Android Studio
  外部操作模拟器。


  注意


  您*可以*在不拥有任何实机的情况下开发应用。但是，不建议这样做。您应该至少拥有一部最新一代的智能手机，如果经济条件允许，可能还需要一台平板电脑。原因在于，操作实机的感觉与模拟器不同，物理操作并非
  100% 相同，性能也存在差异。


  要从 Android Studio 内部管理虚拟设备，请通过 *工具 ➤ 设备管理器* 打开 Android 虚拟设备 (AVD) 管理器。在这里，您可以查看、修改、创建或删除以及启动虚拟设备。请参见图
  1-3。


  ![](img/463716_2_En_1_Fig3_HTML.jpg)


  AVD 管理器的截图。


  图 1-3


  AVD 管理器


  创建新的虚拟设备时，您将能够在“电视”、“穿戴设备”、“手机”、“汽车”或“平板电脑”设备中进行选择，可以选择要使用的 API 级别（并下载新的 API 级别），并且在设置中可以指定各种内容，如图形性能、摄像头模式等。有关管理
  AVD（Android 虚拟设备）的详细信息，请参阅 [`https://developer.android.com/studio/run/managing-avds`](https://developer.android.com/studio/run/managing-avds)
  上的在线文档。


  用于创建虚拟镜像的虚拟设备基础镜像和皮肤可以在以下位置找到：


  ```

  SDK_INST/system-images

  SDK_INST/skins

  ```


  以及安装了应用和用户数据的实际虚拟设备位于：


  ```

  ~/.android/avd

  ```


  管理正在运行的虚拟设备也可以通过各种命令行工具来完成。请参阅第 19 章的“SDK 工具”和“SDK 平台工具”部分。


  ## SDK


  与 Android Studio 相比，SDK 是一组松散耦合的工具，它们要么是 Android 开发所必需的，因此被 Android Studio 直接使用，要么至少对一些开发任务有帮助。它们都可以从
  shell 中启动，并且可能带有或不带有自己的 GUI。


  如果您不确定在安装 Android Studio 期间 SDK 安装在哪里，您可以轻松询问 Android Studio 本身：转到 *文件 ➤ 项目结构*，然后从菜单中选择“SDK
  位置”。


  属于 SDK 一部分的命令行工具在第 19 章中进行了描述。




  '
- '# 2. 应用


  一个 Android 应用由 *活动*、*服务*、*广播接收器*和*内容提供者*等组件构成。参见图 2-1。活动用于与设备用户交互，服务用于在无专用用户界面的情况下运行的程序部分，广播接收器监听来自其他应用和组件的标准化消息，而内容提供者则允许其他应用和组件访问某个组件所提供的一定数量和类型的数据。


  ![](img/463716_2_En_2_Fig1_HTML.png)


  Android 操作系统将应用通过 API 接入 Android 运行时的流程图。


  图 2-1

  Android 操作系统中的应用


  组件由 *Android 运行时*（或者你喜欢的话，也可以称之为执行引擎）启动，它既可以自行启动组件，也可以代表其他组件生成启动触发器。组件在何种情况下被启动取决于其类型及其所赋予的元信息。在其生命周期的另一端，所有正在运行的组件都可能从进程执行列表中被移除，原因可能是它们已完成工作，或者
  Android 操作系统判定该组件不再需要而被移除，抑或是因为设备资源短缺而必须被移除。


  为了使你的应用或组件尽可能稳定地运行，并让用户对其可靠性产生良好的感受，深入了解 Android 组件的生命周期会很有帮助。我们将在本章中探讨组件的系统特性及其生命周期。


  构建一个应用或 Android 组件并不难——只需参考 Android 官方网站上的任何教程、Android Studio 提供的模板和示例，或者你在网络上其他地方能找到的成千上万个教程之一即可。然而，一个简单的应用并不一定就是专业级别的稳定应用，因为就应用而言，Android
  的状态处理与桌面应用程序的状态处理是不同的。原因在于，你的 Android 设备很可能会为了节省系统资源而决定终止你的应用，特别是当你因一段时间内使用一个或多个其他应用而暂时挂起该应用时。


  当然，Android 基本不会终止你正在使用的应用，但你必须采取预防措施。任何被 Android 终止的应用都应该能够以定义好的数据和加工状态重新启动，包括用户当前输入的大部分数据，并尽可能少地干扰用户当前的工作流程。


  从文件角度来看，一个 Android 应用是单个后缀为 `.apk` 的压缩归档文件。它包含你的完整应用，包括在 Android 设备上运行该应用所需的所有元信息。其中最重要的控制工件是
  `AndroidManifest.xml` 文件，它描述了应用以及应用所包含的组件。


  我们在此不详细讨论这个归档文件的结构，因为在大多数情况下，Android Studio 会负责为你正确创建归档文件，所以你通常不需要了解其内部运作方式。但你可以轻松查看其内部结构。只需随便找一个
  `*.apk` 文件，例如，一个你已经用 Android Studio 构建好的示例应用，它位于


  ```

  AndroidStudioProject/[YOUR-APP]/release/app-release.apk

  ```


  然后解压它——APK 文件就是普通的 zip 文件。你可能需要临时将后缀名改为 `.zip`，以便你的解压程序能够识别它。这样一个解压后的 APK 文件，例如，看起来会如图
  2-2 所示。


  ![](img/463716_2_En_2_Fig2_HTML.jpg)


  一个解压后的 APK 文件片段，其中 META-INF、AndroidManifest.xml 和 resources.arsc 被高亮显示。


  图 2-2

  解压后的 APK 文件


  你在那里看到的 `.dex` 文件包含了以 *Dalvik Executable* 格式编译的类，这类似于 Java 中的 JAR 文件。


  我们稍后会讨论与应用相关的工件，但首先我们将从更概念化的角度来探讨什么是*任务*。


  '
- '# 任务


  一个*任务*是一组相互交互的活动，最终用户将它们视为一个应用的各个元素。用户启动一个应用，会看到主活动，在那里进行一些操作，打开和关闭子活动，可能切换到另一个应用，再回来，最终关闭应用。


  更深入地看，一个*任务*所展现的主要结构是其*返回栈*或简称为*栈*，应用的活动在此栈中堆叠。对于简单的应用，关于这个栈的标准行为是：当你启动一个应用时，第一个活动成为这个栈的*根*，然后从应用内部启动的下一个活动位于其顶部，另一个子活动位于两者之上，以此类推。当你通过导航返回（这就是*返回栈*这个名字的由来）关闭一个活动时，该活动会从栈中移除。当根活动被移除时，整个栈被关闭，你的应用也就被认为关闭了。


  在 `AndroidManifest.xml` 的 `<application>` 元素内部，我们看到一些设置可以改变任务栈的标准行为，我们将在第 3 章（关于活动的章节）中看到更多内容。这样，一个定制化的任务栈可以成为帮助你的最终用户理解并流畅使用你的应用的有力工具。但请记住，复杂的栈行为可能让刚开始使用你应用的用户难以理解，因此，你的目标应该是在强大性与易用性之间找到良好的平衡。


  注意


  关于任务和返回栈运作方式的更多深入见解，可参见 [`https://developer.android.com/guide/components/activities/tasks-and-back-stack.xhtml`](https://developer.android.com/guide/components/activities/tasks-and-back-stack.xhtml)。




  '
