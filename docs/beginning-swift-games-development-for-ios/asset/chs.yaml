  SpriteKit 简介


  ## Swift 与 SpriteKit


  在本部分的章节中，我们将介绍 SpriteKit 的基础知识，包括如何渲染和动画化精灵、添加物理效果和碰撞检测，以及利用加速计控制游戏玩法。你还将了解如何添加粒子发射器来增强游戏的外观。我们将涵盖你创建自己的
  SpriteKit 游戏所需了解的一切。© James Goodwill 和 Wesley Matlock 2017，James Goodwill 和 Wesley
  Matlock *《Beginning Swift Games Development for iOS》* 10.1007/978-1-4842-2310-9_1


  '
- "# 1. 设置游戏场景并添加第一个精灵\n\nJames Goodwill¹ 和 Wesley Matlock²  \n(1) 美国科罗拉多州海兰兹牧场  \n\
  (2) 美国密苏里州堪萨斯城\n\nSpriteKit 是 Apple 令人兴奋的 2D 游戏框架，于 2013 年 9 月随 iOS 7 首次发布。它是一个动画和图形渲染框架，能够让你轻松地为纹理图像添加动画、播放视频、渲染文本以及添加粒子效果。它还集成了一个物理库。SpriteKit\
  \ 是第一个正式内置于 iOS SDK 中的游戏引擎。在本章中，你将了解 SpriteKit 是什么，以及如何使用 Xcode 创建一个新的 SpriteKit\
  \ 游戏。接着，你将从头开始创建一个 SpriteKit 游戏的初步框架。你将学习关于`SKNodes`及其子类的知识，并使用`SKSpriteNode`为你的游戏添加一个背景节点和一个玩家节点。\n\
  \n### 你需要了解并拥有的东西\n\n本书的这一部分假设你具备使用 Xcode 和 Xcode 模拟器构建 iPhone 应用程序的基本理解。同时，它也假设你对\
  \ iOS/Mac 编程语言 Swift 有基本了解。如果你不熟悉 Swift，本书末尾的附录中有简要介绍。本书不涵盖编程方法，只专注于 SpriteKit 游戏编程。要完成本书中的所有示例，你需要一台搭载\
  \ OS X 10.11（El Capitan）或更新版本的 Intel 架构 Mac 电脑。你还需要安装 Xcode 8+。这两者都可以在 Apple App\
  \ Store 中找到。\n\n### 介绍 SuperSpaceMan\n\n我们认为学习任何东西的最佳方式就是动手去做。因此，在本章中，你将直接投入并创建自己的游戏。你将从一个\
  \ 2D 游戏的基本代码开始，并在我们每章引入新主题时，向游戏中添加新功能。在本书结束时，你将拥有一个完整的游戏。你要创建的游戏灵感来自 Sega 广受欢迎的\
  \ Sonic Jump Fever（[`itunes.apple.com/us/app/sonic-jump-fever/id794528112?mt=8`](https://itunes.apple.com/us/app/sonic-jump-fever/id794528112?mt=8)）。这是一个垂直卷轴游戏，主角在障碍物和收集品之间加速前进，通过收集戒指来增加分数。我们的游戏类似，也是一个垂直卷轴游戏，但你的主角将是一名太空人，他在太空中疾驰，收集能量球，同时努力避开会摧毁他的黑洞。\n\
  \n### 创建一个 Swift SpriteKit 项目\n\n在开始之前，你需要创建一个 Swift SpriteKit 项目。打开 Xcode 并完成以下步骤：\n\
  \n1. 点击 文件 ➤ 新建 ➤ 项目。\n2. 选择 iOS。\n3. 从应用程序组中选择游戏图标。此时选择模板对话框应如图 1-1 所示。![A330720_2_En_1_Fig1_HTML.jpg](img/A330720_2_En_1_Fig1_HTML.jpg)\
  \  \n图 1-1. 选择模板对话框\n4. 点击下一步按钮继续。\n5. 输入 `SuperSpaceMan` 作为产品名称，`Apress` 作为组织名称，`com.apress`\
  \ 作为组织标识符。\n6. 确保选择 `Swift` 作为语言，`SpriteKit` 作为游戏技术，以及 `iPhone` 作为设备。\n7. 在点击下一步之前，查看图\
  \ 1-2。如果一切与此一致，点击下一步并选择一个合适的位置来存储你的项目文件。点击创建。![A330720_2_En_1_Fig2_HTML.jpg](img/A330720_2_En_1_Fig2_HTML.jpg)\
  \  \n图 1-2. 选择项目选项对话框\n\n注意：你会注意到你正在创建一个仅限 iPhone 的游戏。这只是因为你创建的游戏更适合 iPhone。我们在本书中介绍的所有内容同样适用于\
  \ iPad。现在你有了一个可运行的 SpriteKit 项目。继续点击播放按钮，看看你创建了什么。如果一切顺利，你将看到你的新应用在模拟器中运行。注意：在某些较慢的机器上，Xcode\
  \ 模拟器可能需要一段时间才能启动。模拟 SpriteKit 应用可能会对处理器造成较大负担。目前它还没有太多功能，但不仅仅只是显示“Hello, World!”而已。点击模拟器屏幕几次。你会在每次点击的位置看到旋转的方块。根据你点击的位置，你应该会看到类似于图\
  \ 1-3 的内容。![A330720_2_En_1_Fig3_HTML.jpg](img/A330720_2_En_1_Fig3_HTML.jpg)  \n\
  图 1-3. SpriteKit 示例应用\n\n### 从头开始\n\n尽管标准的 SpriteKit 模板很好用，但你将从头开始。从零开始能让你看到 SpriteKit\
  \ 游戏中的所有工作组件，并使你对自己正在创建的内容有更深入的理解。你需要做的第一件事是确保你的游戏仅在竖屏模式下运行。为此，请按照以下步骤操作：\n\n1.\
  \ 在项目资源管理器中选中 SuperSpaceMan 项目。\n2. 然后在 Targets 下选择 SuperSpaceMan。\n3. 取消勾选横屏向左和横屏向右。\n\
  \n\n\n此时，你的目标设置应如图 1-4 所示。\n\n![A330720_2_En_1_Fig4_HTML.jpg](img/A330720_2_En_1_Fig4_HTML.jpg)\
  \ 图 1-4. SuperSpaceMan 目标设置\n\n接下来需要删除 `GameScene.sks` 和 `Actions.sks` 文件。在本书中你不会用到关卡编辑器。你可以在\
  \ `SuperSpaceMan` 组中找到这些文件，如图 1-5 所示。\n\n![A330720_2_En_1_Fig5_HTML.jpg](img/A330720_2_En_1_Fig5_HTML.jpg)\
  \ 图 1-5. 删除 SKS 文件\n\n删除这些文件后，打开 `GameScene.swift` 并将其内容替换为清单 1-1 中的类。\n\n```\n\
  import SpriteKit\n\nclass GameScene: SKScene {\n    required init?(coder aDecoder:\
  \ NSCoder) {\n        super.init(coder: aDecoder)\n    }\n\n    override init(size:\
  \ CGSize) {\n        super.init(size: size)\n        backgroundColor = SKColor(red:\
  \ 0.0, green: 0.0, blue: 0.0, alpha: 1.0)\n    }\n}\n```\n\n清单 1-1. `GameScene.swift`：SuperSpaceMan\
  \ 主游戏场景\n\n在检查你的基线项目之前，还需要做一处修改。打开 `GameViewController.swift` 并将其内容替换为清单 1-2 中同一类的版本。\n\
  \n```\nimport SpriteKit\n\nclass GameViewController: UIViewController {\n    var\
  \ scene: GameScene!\n    override var prefersStatusBarHidden: Bool {\n        return\
  \ true\n    }\n\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
  \n        // 1. 配置主视图\n        let skView = view as! SKView\n        skView.showsFPS\
  \ = true\n\n        // 2. 创建并配置游戏场景\n        scene = GameScene(size: skView.bounds.size)\n\
  \        scene.scaleMode = .aspectFill\n\n        // 3. 显示场景\n        skView.presentScene(scene)\n\
  \    }\n}\n```\n\n清单 1-2. `GameViewController.swift`：SuperSpaceMan 主 UIViewController\n\
  \n保存所有更改，然后再次点击播放按钮。哇，嗯，这并不令人兴奋。如果你完成了所有更改，现在应该面对着一个完全黑色的屏幕，只显示当前帧率。这正是预期效果，你确实是从零开始。\n\
  \n让我们花点时间检查新游戏的每个组件。首先，打开 `Main.storyboard`。这里的一切看起来应该相当正常。你应该会看到一个包含单个 `UIViewController`\
  \ 的单个故事板。在 Storyboard 资源管理器中展开 `Game View Controller Scene` 并选择 `Game View Controller`，如图\
  \ 1-6 所示。\n\n![A330720_2_En_1_Fig6_HTML.jpg](img/A330720_2_En_1_Fig6_HTML.jpg) 图\
  \ 1-6. Game View Controller 场景\n\n现在展开 Xcode 右侧的实用工具视图，并点击“显示标识检查器”按钮。你会看到这个 `UIViewController`\
  \ 的自定义类正是你的 `GameViewController.swift`。图 1-7 展示了这一连接。\n\n![A330720_2_En_1_Fig7_HTML.jpg](img/A330720_2_En_1_Fig7_HTML.jpg)\
  \ 图 1-7. 自定义类 `GameViewController`\n\n在回到本教程的代码部分之前，还有最后一件事要检查。回到实用工具视图并选择连接检查器。注意\
  \ `View` 出口已连接到你的 `GameViewController.view`。图 1-8 展示了这一连接。\n\n![A330720_2_En_1_Fig8_HTML.jpg](img/A330720_2_En_1_Fig8_HTML.jpg)\
  \ 图 1-8. View 出口\n\n进行故事板检查的目的在于说明，尽管 `SpriteKit` 用于创建游戏，但创建游戏所使用的技术与创建任何现代 iOS\
  \ 应用所采用的技术并无二致。\n\n#### `GameViewController` 类\n\n让我们回到代码。你可以忽略 `AppDelegate.swift`——这是启动所有\
  \ iOS Swift 应用时使用的标准样板代码。`GameViewController.swift` 是最佳的起点。我们之前已经包含它，但为方便起见，这里再次列出：\n\
  \n```\nimport SpriteKit\n\nclass GameViewController: UIViewController {\n    var\
  \ scene: GameScene!\n    override var prefersStatusBarHidden: Bool {\n        return\
  \ true\n    }\n\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
  \n        // 1. 配置主视图\n        let skView = view as! SKView\n        skView.showsFPS\
  \ = true\n\n        // 2. 创建并配置游戏场景\n        scene = GameScene(size: skView.bounds.size)\n\
  \        scene.scaleMode = .aspectFill\n\n        // 3. 显示场景\n        skView.presentScene(scene)\n\
  \    }\n}\n```\n\n从这个控制器的第一行开始，你看到一条简单的 `import`，包含了 `SpriteKit` 框架。这一行使所有 `SpriteKit`\
  \ 相关的类可用于你的 `GameViewController`。之后是一个标准的类定义——`GameViewController` 继承自 `UIViewController`。在类定义之后，你看到了可选变量\
  \ `scene` 的声明，其类型被声明为 `GameScene`。`GameScene` 是将承担大部分工作的类，你将在其中添加游戏逻辑。我们将在下一节中查看这个类。\n\
  \n请注意关于 `scene` 变量的一点：它是一个可选类型。你知道它是可选类型，因为其声明后跟有一个感叹号（`!`）。你将其声明为可选类型，是因为你打算等到\
  \ `viewDidLoad()` 方法触发时才对其进行初始化，而 Swift 要求你在类中要么在声明时初始化所有属性，要么在 `init()` 中初始化。如果你没有在这两个位置中的任何一个初始化属性，则必须将该属性声明为可选类型。在本书的例子中，我们将多次用到可选类型。\n\
  \n在 `scene` 声明之后，你看到了对 `UIViewController` 的 `viewDidLoad()` 方法的重写。此处你返回了 `true`，因为你不想在游戏中显示状态栏。\n\
  \n接下来要检查的是 `viewDidLoad()` 方法。这是你真正开始看到第一个活跃的 `SpriteKit` 代码的地方。在调用 `super.viewDidLoad()`\
  \ 之后，你做的第一件事就是配置主视图。在第一步中，你将标准的 `UIView` 向下转换为 `SKView`。`SKView` 是承载之前提到的游戏场景的视图。在大多数情况下，`SKView`\
  \ 的行为与任何 `UIView` 类似，不同之处在于它拥有一系列与游戏相关的属性和实用方法，例如向下转换之后的这一行：\n\n```\nskView.showsFPS\
  \ = true\n```\n\n`SKView` 的这个属性用于显示或隐藏应用程序正在渲染的每秒帧数——帧率越高越好。\n\n配置主视图后，你创建并配置了 `GameScene`：\n\
  \n```\nscene = GameScene(size: skView.bounds.size)\nscene.scaleMode = .aspectFill\n\
  ```\n\n第一行创建了一个新的 `GameScene` 实例，并将其大小初始化为与承载场景的视图大小一致。之后，你将 `scaleMode` 设置为 `.aspectFill`。`scaleMode`（由枚举\
  \ `SKSceneScaleMode` 实现）用于确定场景将如何缩放以匹配容纳它的视图。表 1-1 描述了所有可用的 `scaleMode` 属性。\n\n\
  表 1-1. `SKSceneScaleModes`\n\n\n\n| `SKSceneScaleMode` | 定义 |\n| --- | --- |\n|\
  \ `SKSceneScaleMode.fill` | fill 缩放模式将填满整个 `SKView`，不考虑宽高比。 |\n| `SKSceneScaleMode.aspectFill`\
  \ | aspectFill 模式会缩放场景以填满宿主 `SKView`，同时保持场景的宽高比，但如果宿主 `SKView` 的宽高比不同，则可能会发生裁剪。这是你在本游戏中使用的模式。\
  \ |\n| `SKSceneScaleMode.aspectFit` | aspectFit 模式会缩放场景以填满宿主 `SKView`，同时保持场景的宽高比，但如果宿主\
  \ `SKView` 的宽高比不同，则可能会出现黑边。 |\n| `SKSceneScaleMode.resizeFill` | resizeFill 模式会修改场景的大小，以精确适配宿主视图。\
  \ |\n\n注意：在设置场景的 `scaleMode` 属性时，你正在使用一种简写语法来表示所设置的模式，具体是 `.aspectFill` 模式。你可以使用这种点语法，是因为你知道\
  \ `scaleMode` 属性的类型是 `SKSceneScaleMode`，这是一个包含所有缩放模式的枚举。一旦你配置好了视图和场景，就只剩下最后一件事了：呈现场景。这通过\
  \ `viewDidLoad()` 中的最后一行代码完成：`skView.presentScene(scene)`\n\n#### `GameScene` 类\n\
  \n现在我们已经带你逐行了解了 `GameViewController` 类，是时候讨论 `GameScene` 类了。同样，为方便起见，我们再次附上 `GameScene.swift`\
  \ 文件的源代码：\n\n```\nimport SpriteKit\nclass GameScene: SKScene {\n    required init?(coder\
  \ aDecoder: NSCoder) {\n        super.init(coder: aDecoder)\n    }\n    override\
  \ init(size: CGSize) {\n        super.init(size: size)\n        backgroundColor\
  \ = SKColor(red: 0.0, green: 0.0, blue: 0.0, alpha: 1.0)\n    }\n}\n```\n\n当你查看\
  \ `GameScene` 时，会发现它其实没有太多内容。它继承自 `SKScene` 并实现了两个 `init()` 方法；第一个接收 `NSCoder` 参数的\
  \ `init()` 可以忽略。你感兴趣的是第二个 `init()` 方法，它接收一个 `CGSize` 参数，表示你希望场景的大小（在此例中，是你从 `GameViewController`\
  \ 传入的大小）。之后，你将大小传递给父类，然后将背景颜色设置为黑色。虽然你当前的 `GameScene` 内容不多，但这里将是你完成几乎所有 SpriteKit\
  \ 工作的地方。`SKScene` 及其子类是所有 SpriteKit 内容的根节点，随着本书的深入，你的 `GameScene` 会变得相当庞大。\n\n###\
  \ 添加背景和玩家精灵\n\n本章我们已经说得够多了。让我们回到游戏本身。在本章的最后一节中，你将直接动手，向场景中添加游戏背景和玩家精灵，并看看它们的效果。在此之前，你需要一些图像文件。你可以在\
  \ [www.apress.com](http://www.apress.com) 上找到本书所需的所有资源，文件名为 `assets.zip`（搜索本书标题即可）。请下载并解压该文件。在解压后的文件夹中，你会看到两个文件夹：一个名为\
  \ `Images`，另一个名为 `sprites.atlas`。将整个 `sprites.atlas` 文件夹直接复制到同一项目的 `SuperSpaceMan`\
  \ 文件夹中。接下来，在 Xcode 中打开 `Assets.xcassets` 文件夹。你会看到类似于图 1-9 的内容。![A330720_2_En_1_Fig9_HTML.jpg](img/A330720_2_En_1_Fig9_HTML.jpg)\
  \ 图 1-9. 添加图像资源 现在选择 `Spaceship` 资源并将其删除。之后，使用 Finder 浏览到之前下载的 zip 文件中的 `Images`\
  \ 文件夹。选择 `Images` 目录下的四个文件夹，然后将它们拖拽到 xcassets 面板中，直接放在 `Spaceship` 资源下方。文件添加完成后，你的\
  \ xcassets 面板将如图 1-10 所示。![A330720_2_En_1_Fig10_HTML.jpg](img/A330720_2_En_1_Fig10_HTML.jpg)\
  \ 图 1-10. 已添加的图像资源\n\n现在所有图像都已添加到项目中，让我们来好好利用它们。回到 `GameScene.swift`，并在 `GameScene`\
  \ 类的开头添加以下两行代码：\n\n```\nlet backgroundNode = SKSpriteNode(imageNamed: \"Background\"\
  )\nlet playerNode = SKSpriteNode(imageNamed: \"Player\")\n```\n\n这里你添加了两个常量，`backgroundNode`\
  \ 和 `playerNode`，它们都被初始化为 `Image.xcassets` 文件夹中对应的图像。请注意每个常量的类型：它们都是 `SKSpriteNode`。`SKSpriteNode`\
  \ 是 `SKNode` 的子类，而 `SKNode` 是几乎所有 SpriteKit 内容的主要构建块。`SKNode` 本身不绘制任何视觉元素，但基于 SpriteKit\
  \ 的应用中的所有视觉元素都是使用 `SKNode` 的子类绘制的。表 1-2 定义了用于渲染视觉元素的 `SKNode` 的主要子类。\n\n表 1-2. 渲染视觉元素的\
  \ `SKNode` 子类\n\n| 类 | 描述 |\n| --- | --- |\n| `SKSpriteNode` | 用于绘制纹理精灵的节点 |\n|\
  \ `SKVideoNode` | 用于呈现视频内容的节点 |\n| `SKLabelNode` | 用于绘制文本字符串的节点 |\n| `SKShapeNode`\
  \ | 用于基于 Core Graphics 路径绘制形状的节点 |\n| `SKEmitterNode` | 用于创建和渲染粒子的节点 |\n| `SKCropNode`\
  \ | 用于使用蒙版裁剪子节点的节点 |\n| `SKEffectNode` | 用于对其子节点应用 Core Image 滤镜的节点 |\n\n\n\n在本书中，你将使用\
  \ `SKNode` 的三个子类：`SKSpriteNode`、`SKLabelNode` 和 `SKEmitterNode`。添加两个 `SKSpriteNodes`\
  \ 后，删除设置背景色的代码行，并在 `GameScene.init(size: CGSize)` 方法的底部添加以下几行代码：\n\n```\nbackgroundNode.size.width\
  \ = frame.size.width\nbackgroundNode.anchorPoint = CGPoint(x: 0.5, y: 0.0)\nbackgroundNode.position\
  \ = CGPoint(x: size.width / 2.0, y: 0.0)\naddChild(backgroundNode)\n```\n\n这段代码的第一行将\
  \ `backgroundNode` 的宽度设置为视图框架的宽度。下一行代码决定了新节点在场景中的锚点位置。目前无需过度关注这一点；我们将在下一章详细讨论锚点。只需知道锚点\
  \ `(0.5, 0.0)` 将背景节点的锚点设置到节点的底部中央即可。接下来，你设置了 `backgroundNode` 的位置。这里将节点的 x 坐标设为场景宽度的一半（即场景中央），将\
  \ y 坐标设为 `0.0`（即场景底部）。代码片段中的最后一行将 `backgroundNode` 添加到了场景中。\n\n若要查看刚才完成的效果，请保存你的工作并再次运行应用程序。现在你应该能看到背景显示出来了，如图\
  \ 1-11 所示。\n\n![A330720_2_En_1_Fig11_HTML.jpg](img/A330720_2_En_1_Fig11_HTML.jpg)\n\
  \n图 1-11. 已添加到 `GameScene` 的 `backgroundNode`\n\n这很简单。现在，让我们将玩家添加到场景中。添加玩家节点与添加背景一样简单。请看下面的代码片段：\n\
  \n```\nplayerNode.position = CGPoint(x: size.width / 2.0, y: 80.0)\naddChild(playerNode)\n\
  ```\n\n如你所见，这段代码设置了 `playerNode` 的位置并将其添加到场景中。请注意这里的一个区别：你没有设置 `playerNode` 的锚点。这是因为所有\
  \ `SKNodes` 的默认锚点都是 `(0.5, 0.5)`，即节点的中心点。同样，暂时不必担心这些位置或 `anchorPoints`。我们会在下一章讨论它们。\n\
  \n继续将这段代码添加到 `GameScene.init()` 方法的底部并保存更改。然后再次运行应用程序。现在你会看到 `SuperSpaceMan` 出现在之前添加的\
  \ `backgroundNode` 前面，如图 1-12 所示。\n\n![A330720_2_En_1_Fig12_HTML.jpg](img/A330720_2_En_1_Fig12_HTML.jpg)\n\
  \n图 1-12. 已添加到 `GameScene` 的 `playerNode`\n\n完成这些更改后，你的新 `GameScene.swift` 文件应如下所示（代码清单\
  \ 1-3）。\n\n```\nimport SpriteKit\n\nclass GameScene: SKScene {\n    let backgroundNode\
  \ = SKSpriteNode(imageNamed: \"Background\")\n    let playerNode = SKSpriteNode(imageNamed:\
  \ \"Player\")\n\n    required init?(coder aDecoder: NSCoder) {\n        super.init(coder:\
  \ aDecoder)\n    }\n\n    override init(size: CGSize) {\n        super.init(size:\
  \ size)\n\n        // 添加背景\n        backgroundNode.size.width = frame.size.width\n\
  \        backgroundNode.anchorPoint = CGPoint(x: 0.5, y: 0.0)\n        backgroundNode.position\
  \ = CGPoint(x: size.width / 2.0, y: 0.0)\n        addChild(backgroundNode)\n\n \
  \       // 添加玩家\n        playerNode.position = CGPoint(x: size.width / 2.0, y: 80.0)\n\
  \        addChild(playerNode)\n    }\n}\n```\n\n代码清单 1-3. `GameScene.swift`：修改后的\
  \ `GameScene.swift`\n\n### 本章小结\n\n在本章中，你学习了什么是 SpriteKit，以及如何使用 Xcode 创建全新的 SpriteKit\
  \ 游戏。然后你深入其中，从头开始创建了一个 SpriteKit 游戏的雏形。你学习了 `SKNodes` 及其子类，并使用 `SKSpriteNode` 添加了背景节点和玩家节点。在下一章中，你将更深入地探讨\
  \ SpriteKit，并详细讨论 `SKScene` 的相关内容，包括坐标系和锚点。你还会了解场景的节点树是如何构建的。\n\n© James Goodwill\
  \ 与 Wesley Matlock 2017  \nJames Goodwill 与 Wesley Matlock  \n*Beginning Swift Games\
  \ Development for iOS*  \n10.1007/978-1-4842-2310-9_2\n\n"
- "# 2. SpriteKit 场景与 SKNode 定位\n\nJames Goodwill¹ 与 Wesley Matlock²  \n\n(1) 美国科罗拉多州海兰兹牧场\
  \  \n(2) 美国密苏里州堪萨斯城  \n\n第 1 章论述了什么是 SpriteKit 以及如何使用它创建 2D 游戏。它展示了如何开始使用 `SKSpriteNode`\
  \ 创建背景和玩家精灵，然后展示了如何将它们添加到游戏场景中。本章将稍作回顾，更深入地探讨 SpriteKit 场景，包括场景的构建方式以及构建顺序为何会改变你的游戏。最后，我们将讨论与\
  \ `SKNodes` 相关的 SpriteKit 坐标系和锚点。\n\n### 什么是 SKScene？\n\n我们在第 1 章中使用了 `SKScene`\
  \ 对象来承载背景和玩家节点，但并未真正解释我们使用的场景。我们只是用它来添加精灵，然后就结束了。现在是时候深入探究 `SKScene` 的真正工作原理了。我们将从定义\
  \ `SKScene` 对象开始。一个 `SKScene` 对象代表 SpriteKit 游戏中一个场景的内容。它继承自 `SKEffectNode`、`SKNode`、`UIResponder`，当然还有\
  \ `NSObject`。它的构建过程是：首先创建场景，然后向其添加 *n* 个其他 `SKNodes`。场景及其所有子节点被称为节点树，而场景是节点树的根。场景中包含的节点提供了场景将要动画和渲染显示的内容。\n\
  \n以下是你上一章为创建节点树所执行的步骤。它们是你在设置游戏场景时始终会完成的基本步骤：\n\n1. 创建 `GameViewController`。\n2.\
  \ 让 `GameViewController` 创建其 `UIView`。\n3. 在 `GameViewController.viewDidLoad()`\
  \ 方法内，将 `UIView` 向下转型为 `SKView`，并设置 `showFPS` 属性为 `true`：\n\n```\nlet skView = view\
  \ as! SKView\nskView.showsFPS = true\n```\n\n4. 创建一个名为 `GameScene` 的 `SKScene` 实例，在构造函数中传入其大小，并设置\
  \ `scaleMode` 属性：\n\n```\nscene = GameScene(size: skView.bounds.size)\nscene.scaleMode\
  \ = .aspectFill\n```\n\n5. 在 `GameScene` 的 `init()` 方法内，更新场景中的 `backgroundNode`\
  \ 和 `playerNode` 对象：\n\n```\nbackgroundNode.anchorPoint = CGPoint(x: 0.5, y: 0.0)\n\
  backgroundNode.position = CGPoint(x: size.width / 2.0, y: 0.0)\naddChild(backgroundNode)\n\
  \nplayerNode.position = CGPoint(x: size.width / 2.0, y: 80.0)\naddChild(playerNode!)\n\
  ```\n\n6. 在 `GameViewController.viewDidLoad()` 方法中展示完整的场景：\n\n```\nskView.presentScene(scene)\n\
  ```\n\n至此，你就拥有了一个包含完整节点树的完整场景。你可以随时根据游戏进展添加更多节点，但这些是你在创建新 `SKScene` 时始终会完成的基本步骤。\n\
  \n\n\n### SKScene 渲染循环\n\n在本节中，我们将介绍 `SKView` 展示 `SKScene` 后所发生的一切。在更传统的 iOS 应用程序中，你只需要渲染视图内容一次，然后它就会保持静态，直到视图所呈现的模型发生变化。这对商业应用来说没问题，但游戏的内容可能持续变化。由于这种动态特性，SpriteKit\
  \ 会不断更新场景及其内容。这种持续更新被称为渲染循环（见图 2-1）。![A330720_2_En_2_Fig1_HTML.jpg](img/A330720_2_En_2_Fig1_HTML.jpg)\
  \ 图 2-1. SpriteKit 渲染循环\n\n循环的每次迭代都会生成场景中的下一帧。生成场景下一帧所涉及的步骤如下：\n\n1.  场景调用其 `update()`\
  \ 方法。这是放置大部分游戏逻辑的地方。通常，你会在这里移动节点、向现有节点添加新动作以及处理用户输入。（我们将在第 4 章中讨论 `update()` 方法。）\n\
  2.  接着，场景对其所有子节点执行所有编程设定的动作。在此步骤中，场景会执行你可能在步骤 1 中设置的任何动作。（我们将在第 5 章中讨论动作。）\n3. \
  \ 然后，场景调用 `didEvaluateActions()` 方法。此处可用于放置任何动作后的游戏逻辑。例如，在动作执行后测试节点的位置并做出相应响应。\n\
  4.  接下来，场景对场景中的物理体执行所有物理模拟。（我们将在第 3 章中讨论物理。）\n5.  场景调用 `didSimulatePhysics()` 方法。这与\
  \ `didEvaluateActions()` 方法非常相似，你可以在此处添加所有物理模拟完成后要执行的任何游戏逻辑。这是在场景渲染之前执行任何游戏逻辑的最后机会。\n\
  6.  渲染场景。\n\n随着你阅读本书各章节的深入，你将会看到渲染循环中每个步骤的示例。\n\n**注意：**当你在 `SKView` 中设置了 `showsFPS`\
  \ 时，你将看到游戏每秒渲染的帧数。每个被渲染的帧代表渲染循环的一次迭代。\n\n### 构建场景的节点树\n\n在本章前面部分，我们讨论了如何使用背景节点和玩家节点来设置一个简单的\
  \ `SKScene`。你是通过 `SKScene.addChild()` 方法实现这一点的。本节将更深入地探讨场景是如何创建的。我们还提到了 `SKScene`\
  \ 类扩展的类型。其中一种类型是 `SKNode`。`SKNode` 是用于保存 `SKScene` 对象节点树中所有节点的类。它还定义了用于操作此节点树的方法。其中最常用的方法是\
  \ `addChild()`、`insertChild()` 和 `removeFromParent()`，如表 2-1 所述。\n\n表 2-1. `SKNode`\
  \ 节点树操作方法\n\n| 方法 | 用途 |\n| --- | --- |\n| `addChild()` | `addChild(_:)` 方法将一个节点添加到接收者的子节点集合的末尾。\
  \ |\n| `insertChild(_:at:)` | `insertChild(_:at:)` 方法将一个子节点插入到接收者的子节点集合中的特定位置。 |\n\
  | `removeFromParent()` | `removeFromParent()` 将接收节点从其父节点中移除。 |\n\n这是你将用于构建场景节点树的三种方法。了解这些方法如何工作的最简单方式是通过一个简单的示例。请看以下序列：\n\
  \n```\nvar gameScene = SKScene(size: CGSizeMake(320.0, 568.0))\nvar node1 = SKSpriteNode()\n\
  var node2 = SKSpriteNode()\nvar node3 = SKSpriteNode()\ngameScene.addChild(node1)\n\
  gameScene.addChild(node2)\ngameScene.addChild(node3)\n```\n\n这里你创建了一个名为 `gameScene`\
  \ 的 `SKScene`。然后你创建了三个节点并将它们添加到 `gameScene` 中。此时，`gameScene` 的节点树如图 2-2 所示。![A330720_2_En_2_Fig2_HTML.gif](img/A330720_2_En_2_Fig2_HTML.gif)\
  \ 图 2-2. 添加三个节点后的 `gameScene` 的 children 属性\n\n**注意：**图 2-2 及后续几个图中的线条表示每个节点被添加的顺序。它并不表示节点本身彼此相关。例如，`node2`\
  \ 并未添加到 `node1` 上。`node2` 只是在 `node1` 之后被添加的。\n\n此时，节点树包含三个节点：`node1`、`node2` 和\
  \ `node3`（按此顺序）。现在，如果你执行以下代码片段，你将得到一个如图 2-3 所示的节点树：\n\n![A330720_2_En_2_Fig3_HTML.gif](img/A330720_2_En_2_Fig3_HTML.gif)\
  \ 图 2-3. 插入第四个节点后的 `gameScene` 节点树\n\n```\nvar node4 = SKSpriteNode()\ngameScene.insertChild(node4,\
  \ at: 2)\n```\n\n`insertChild()` 方法在节点树的给定位置插入一个节点。在这个例子中，你要求将节点插入到第三个位置（第一个节点位于位置\
  \ 0）。children 属性现在包含四个节点，`node4` 被插入到 `node2` 和 `node3` 之间。\n\n让我们做最后一件事，移除一个节点：\n\
  \n```\nnode2.removeFromParent()\n```\n\n通过调用 `node2` 的 `removeFromParent` 方法，你已将\
  \ `node2` 从其父节点（在本例中为 `gameScene`）中移除。现在节点树如图 2-4 所示。\n\n![A330720_2_En_2_Fig4_HTML.gif](img/A330720_2_En_2_Fig4_HTML.gif)\
  \ 图 2-4. 移除 `node4` 后的 `gameScene` 节点树\n\n还有最后一点你需要了解，那就是嵌套节点。因为节点树是 `SKNode` 的一部分，而\
  \ `SKSpriteNode` 是从 `SKNode` 扩展而来的，所以它可以拥有嵌套节点。嵌套相关节点的好处在于，当你更改父节点时，相同的更改将应用于所有子节点。\n\
  \n为了了解嵌套节点在节点树中是如何表示的，让我们回到图 2-4 所表示的节点树。如果你想在 `node4` 内部嵌套额外的节点，可以在刚刚执行的 `node2.removeFromParent()`\
  \ 之后立即执行以下代码片段来实现。图 2-5 展示了此代码片段的结果：\n\n![A330720_2_En_2_Fig5_HTML.gif](img/A330720_2_En_2_Fig5_HTML.gif)\
  \ 图 2-5. 节点嵌套在 `node4` 内部的 `gameScene` 节点树\n\n```\nvar node4a = SKSpriteNode()\n\
  var node4b = SKSpriteNode()\nvar node4c = SKSpriteNode()\nnode4.addChild(node4a)\n\
  node4.addChild(node4b)\nnode4.addChild(node4c)\n```\n\n\n\n#### 渲染节点树\n\n现在你已经了解了如何构建节点树，接下来看看节点树是如何渲染的。向场景中添加节点的顺序非常重要。当渲染循环结束时对场景进行渲染时，其渲染顺序与构建顺序相反。以图\
  \ 2-3 所示的节点树为例。当渲染这棵节点树时，场景将按以下顺序渲染每个节点：\n\n1. `node3`\n2. `node4`\n3. `node2`\n\
  4. `node1`\n\n注意，最后渲染的节点是第一个添加到场景中的节点。嵌套节点也以其添加顺序的逆序进行渲染。如果要渲染图 2-5 所示的节点树，渲染顺序如下：\n\
  \n1. `node3`\n2. `node4`\n   - `node4c`\n   - `node4b`\n   - `node4a`\n3. `node1`\n\
  \n这一点很重要，因为根据每个节点的位置，场景中的节点可能会发生重叠，从而导致某些节点被部分或完全遮挡。这一点同样重要，还因为 SpriteKit 执行命中测试的方式。当\
  \ SpriteKit 处理触摸事件或鼠标事件时，它会遍历场景，找到最想接收该事件的节点。如果第一个节点不处理该事件，SpriteKit 会检查下一个最近的节点，并重复此过程，直到事件被处理或被忽略。与场景渲染顺序一样，命中测试的执行顺序也与绘制顺序相反。要了解在示例应用中如何体现，请将\
  \ `GameScene.init()` 方法的当前内容替换为以下代码：\n\n```\nsuper.init(size: size)\nbackgroundColor\
  \ = SKColor(red: 0.0, green: 0.0, blue: 0.0, alpha: 1.0)\n// 添加背景\nbackgroundNode.anchorPoint\
  \ = CGPoint(x: 0.5, y: 0.0)\nbackgroundNode.position = CGPoint(x: size.width / 2.0,\
  \ y: 0.0)\naddChild(backgroundNode)\n// 添加玩家\nlet playerNode1 = SKSpriteNode(imageNamed:\
  \ \"Player\")\nplayerNode1.position = CGPoint(x: size.width / 2.0, y: 80.0)\naddChild(playerNode1)\n\
  let playerNode2 = SKSpriteNode(imageNamed: \"Player\")\nplayerNode2.position = CGPoint(x:\
  \ size.width / 2.0, y: 100.0)\naddChild(playerNode2)\nlet playerNode3 = SKSpriteNode(imageNamed:\
  \ \"Player\")\nplayerNode3.position = CGPoint(x: size.width / 2.0, y: 120.0)\naddChild(playerNode3)\n\
  ```\n\n在这段代码中，三个玩家节点被添加到场景中，每个节点都比上一个添加的节点低 20 点。要查看结果，请再次运行项目。你会看到重叠的玩家，其中第一个添加的玩家位于最上方，如图\
  \ 2-6 所示。\n\n![A330720_2_En_2_Fig6_HTML.jpg](img/A330720_2_En_2_Fig6_HTML.jpg)\n\
  \n*图 2-6. 带有重叠玩家节点的 GameScene*\n\n#### 搜索节点树\n\n在进入坐标系统和锚点之前，我们还有最后一个主题要介绍：如何搜索节点树。我们之前尚未讨论\
  \ `SKNode` 的 `name` 属性。`SKNode.name` 是一个 `String` 属性，可用于标识特定的精灵或一组精灵。例如，可以为唯一的 `playerNode`\
  \ 命名为 `Player`。假设你在 `GameScene` 内部，并且确实将 `playerNode` 命名为 `Player`，那么可以使用以下代码行在\
  \ `GameScene` 中搜索名为 `Player` 的唯一节点：\n\n```\nchildNode(withName: \"Player\")\n```\n\
  \n此方法返回一个可选的 `SKNode`。如果多个子节点共享同一名称，则返回 `children` 数组中的第一个节点。如果未找到具有该名称的子节点，则返回值为空。另一个例子可能是为一组精灵赋予相同的名称。例如，你可以为一组具有相同圆形纹理的精灵命名为\
  \ `orb`。然后搜索所有具有该名称的精灵，并在一次调用中应用一组动作。你可以使用 `SKNode` 的 `enumerateChildNodes(withName:using:)`\
  \ 方法实现这一点。此方法搜索所有具有传入名称的节点，并对每个找到的节点执行代码块中的代码。同样，假设你在 `GameScene` 内部，并且添加了多个名为 `orb`\
  \ 的精灵，可以使用以下代码片段搜索所有 `orb` 节点并对每个节点执行代码块：\n\n```\nenumerateChildNodes(withName:\
  \ \"orb\", using: {\n    node, stop in\n    // 对 node 或 stop 进行操作\n})\n```\n\n除了每次找到名为\
  \ `orb` 的节点时传递给代码块的参数外，一切看起来都很直观。第一个参数是对所找到节点的引用——这没问题。第二个参数 `stop` 是一个指向布尔值的指针，可用于停止迭代。如果你想停止遍历每个找到的节点，将\
  \ `stop` 参数的 `memory` 属性设置为 `true`，如下例所示：\n\n```\nstop.memory = true\n```\n\n###\
  \ 了解 SKSpriteNode 坐标和锚点\n\n到目前为止，我们已经讨论了如何创建 `SKScene` 对象以及它如何被渲染。现在我们讨论如何定位场景中的节点。首先，让我们看看场景的坐标系统。确保将\
  \ `GameScene.init()` 方法更改回以下内容：\n\n```\ninit(size: CGSize) {\n    super.init(size:\
  \ size)\n    backgroundColor = SKColor(red: 0.0, green: 0.0, blue: 0.0, alpha: 1.0)\n\
  \    // 添加背景\n    backgroundNode.anchorPoint = CGPoint(x: 0.5, y: 0.0)\n    backgroundNode.position\
  \ = CGPoint(x: size.width / 2.0, y: 0.0)\n    addChild(backgroundNode)\n    // 添加玩家\n\
  \    playerNode.position = CGPoint(x: size.width / 2.0, y: 80.0)\n    addChild(playerNode)\n\
  }\n```\n\n\n\n#### 坐标\n\n当场景首次初始化时，其 `size` 属性会在初始化器中设置，正如你之前所看到的。场景的 `size` 表示场景可见部分的大小，它并不定义游戏世界的整体尺寸。你可以将场景的\
  \ `size` 视为进入游戏世界的视口。默认情况下，`SKScene` 的原点位于其呈现视图的左下角，代表该原点的坐标为 `(0, 0)`。回到上一章的游戏，在\
  \ `GameScene.init()` 方法中，紧接在 `super.init()` 调用之后添加这行代码：`print(\"The size is (\\\
  (size)\")`。现在使用 iPhone 6s 模拟器再次运行该应用程序。之后，查看控制台窗口，你将看到以下输出：`The size is: (375.0,\
  \ 667.0)`。这是在 iPhone 6s 上运行的场景的大小。你可以尝试在 iPhone SE 或 6+ 模拟器上再次运行，这些值告诉你场景的大小（进入游戏世界的视口）。如果你想将\
  \ `SKNode` 对象定位到游戏的可见世界中，你必须在 iPhone 6s 上将其位置设置在 `(0, 0)` 到 `(375, 667)` 的范围内，或者在\
  \ iPhone SE 上设置在 `(0, 0)` 到 `(320, 568)` 的范围内。\n\n花点时间尝试一下坐标系统。回到 `GameScene.init()`\
  \ 方法，使用以下代码行更改 `playerNode` 的位置：`playerNode.position = CGPoint(x: size.width / 2,\
  \ y: size.height / 2)`。通过这一更改，你将 `playerNode` 定位到了场景的中心。要查看位置变化，请在模拟器中再次运行该应用。你现在会看到你的玩家位于场景中央，如图\
  \ 2-7 所示。\n\n![A330720_2_En_2_Fig7_HTML.jpg](img/A330720_2_En_2_Fig7_HTML.jpg) \
  \ \n图 2-7. 位于场景中央的 `playerNode`\n\n继续之前，再做一次位置更改。使用以下代码行更改 `playerNode` 的位置：`playerNode.position\
  \ = CGPoint(x: size.width, y: size.height)`。正如你所看到的，新位置被设置为场景可视区域的最大 `(x, y)` 值。在模拟器中再次运行该应用。你会看到你的玩家位于场景的右上角，如图\
  \ 2-8 所示。\n\n![A330720_2_En_2_Fig8_HTML.jpg](img/A330720_2_En_2_Fig8_HTML.jpg) \
  \ \n图 2-8. 位于场景右上角的 `playerNode`\n\n虽然你成功地将玩家定位到了场景的右上角，但你会注意到一件有点奇怪的事情——`playerNode`\
  \ 只有左下角的四分之一是可见的。在下一节我们专注于锚点时，你就会明白为什么会这样。\n\n#### 锚点\n\n正如你在上一节中看到的，当你将 `playerNode`\
  \ 定位到场景的右上角时，节点只有左下角的四分之一在场景中可见。这是因为 `SKSpriteNode` 的默认锚点位于节点的中心。精灵的 `anchorPoint`\
  \ 属性用于设置 `SKSpriteNode` 框架内的点，精灵的 `position` 属性将应用于该点。这听起来有点复杂，但实际上相当简单。请看图 2-9。\n\
  \n![A330720_2_En_2_Fig9_HTML.gif](img/A330720_2_En_2_Fig9_HTML.gif)  \n图 2-9. `SKSpriteNode`\
  \ 的锚点单位坐标系\n\n该图显示了 `SKSpriteNode` 的锚点坐标系。注意位于 `(0.5, 0.5)` 的点，这是默认的锚点。图 2-10 展示了一些常见的锚点。\n\
  \n![A330720_2_En_2_Fig10_HTML.jpg](img/A330720_2_En_2_Fig10_HTML.jpg)  \n图 2-10.\
  \ `SKSpriteNode` 的锚点示例\n\n在图 2-10 中，有四个常见的锚点，它们与所应用的精灵相关。看看这些示例，你会明白，如果你希望将 `playerNode`\
  \ 定位到场景的最右上角位置，并且仍然让整个 `spriteNode` 在场景中可见，你需要将精灵的 `anchorPoint` 属性设置为 `(1.0, 1.0)`。现在就这样做，在\
  \ `playerNode` 构造之后直接添加以下代码行：`playerNode.anchorPoint = CGPoint(x: 1.0, y: 1.0)`。现在再次运行该应用。你将看到整个\
  \ `playerNode` 都位于场景的右上角，如图 2-11 所示。\n\n![A330720_2_En_2_Fig11_HTML.jpg](img/A330720_2_En_2_Fig11_HTML.jpg)\
  \  \n图 2-11. 位于场景右上角的整个 `playerNode`\n\n要掌握锚点，请尝试为 `playerNode` 设置不同的锚点与位置，看看每个不同的锚点如何影响\
  \ `playerNode` 的定位。理解 `position` 和 `anchorPoint` 属性如何协同工作非常重要。\n\n> 注：当你完成对 `playerNode`\
  \ 的 `position` 和 `anchorPoint` 的实验后，请撤销所有代码更改，将项目恢复到第一章 1 留下的状态。\n\n### 总结\n\n本章涵盖了大量信息，包括什么是\
  \ `SKScene` 以及它们是如何构建的。我们还讨论了 `SKScene` 的渲染循环，以及场景节点树的构建顺序如何影响节点的外观和交互性。在本章末尾，我们探讨了场景的坐标系统和节点锚点。第三章\
  \ 3 将介绍 SpriteKit 的物理引擎和碰撞检测。那一章会非常有趣，你将开始看到你的游戏逐渐变得生动起来。\n\n© James Goodwill and\
  \ Wesley Matlock 2017  \nJames Goodwill 和 Wesley Matlock *Beginning Swift Games\
  \ Development for iOS*  \nDOI: 10.1007/978-1-4842-2310-9_3\n\n"
- "# 3. 为游戏添加物理与碰撞检测\n\nJames Goodwill¹ 和 Wesley Matlock²  \n(1) 美国科罗拉多州海兰兹牧场  \n\
  (2) 美国密苏里州堪萨斯城\n\n本章介绍 SpriteKit 的物理引擎和碰撞检测。我们首先讨论 `SKPhysicsBody`——用于模拟碰撞检测的类。然后你将在游戏世界中启用重力，并观察它如何影响节点。之后，你将添加一个触摸响应器来将\
  \ `playerNode` 推向空中。在本章结尾，我会讨论如何处理节点碰撞。\n\n### 什么是 SKPhysicsBody？\n\n为了在 SpriteKit\
  \ 游戏中模拟物理，你需要向场景或节点添加一个物理体。物理体由 SpriteKit 类 `SKPhysicsBody` 实现，它是一个模拟对象，附加到场景节点树中的节点上。`SKPhysicsBody`\
  \ 类使用节点的属性，如 `position` 和 `velocity`，并与其自身属性结合，来模拟物理力是如何作用到模拟游戏世界中的。它在渲染循环的每次迭代中进行计算来执行这些模拟。\n\
  \n有三种类型的物理体：动态体积、静态体积和边缘。\n\n- **动态体积** 是一个具有体积和质量的物理体，会受物理模拟中的碰撞和力的影响。附着有动态体积的节点是游戏中的活跃节点。\n\
  - **静态体积** 物理体与动态体积类似，但力和碰撞对其没有影响。静态体积体通常用作游戏中的屏障。当动态体与静态体碰撞时，动态体会受到碰撞影响，而静态体保持不变。\n\
  - **边缘** 是一种没有体积的静态体。模拟永远不会移动边缘，且边缘的质量不会影响其他节点的模拟。边缘代表场景内的负空间。\n\n### 为游戏世界添加物理\n\
  \n\n\n### 理解 SpriteKit 中的物理体\n\n要理解这一切是如何运作的，最简单的方法就是直接动手实践。让我们先创建一个 `SKPhysicsBody`\
  \ 并将其与 `playerNode` 关联起来。在 `GameScene` 的 `.init(size: CGSize)` 方法中，紧随 `playerNode`\
  \ 构造代码之后，添加以下两行代码：\n\n```\nplayerNode.physicsBody = SKPhysicsBody(circleOfRadius:\
  \ playerNode.size.width / 2)\nplayerNode.physicsBody?.isDynamic = true\n```\n\n\
  仔细看看这两行代码。第一行创建了一个 `SKPhysicsBody`，并向其初始化方法传入了一个名为 `circleOfRadius`、值为 `CGFloat`\
  \ 类型的参数。`SpriteKit` 提供了几种标准的物理体形状，包括圆形（`circleOfRadius`）、矩形（`rectangleOfSize`）以及基于路径的多边形（`polygonFromPath`）。这些形状中，圆形的效率最高，而基于路径的多边形效率最低。由于圆形是最高效的节点形状，因此本游戏中的所有物理体都将使用它。\n\
  \n在这个例子中，传入构造函数的参数值是 `playerNode` 的宽度除以 2。我们使用这个值是因为，我们希望以 `playerNode` 的中心为圆心，以节点宽度的一半为半径，创建一个包围该节点的圆形。这样就能得到一个完全包裹\
  \ `playerNode` 的圆。如果存在 `SKPhysicsBody(circleOfDiameter:)` 这样的构造函数，我们就不需要将宽度除以 2\
  \ 了，但并没有这样的构造函数。\n\n现在来看这段代码的第二行。第二行将 `playerNode` 转变为一个具有动态体积的物理体。此后，它将响应场景中的重力以及其他物理体。完成这些修改后，你的新玩家设置代码应该如下所示：\n\
  \n```\n// 添加玩家\nplayerNode.physicsBody = SKPhysicsBody(circleOfRadius: playerNode?.size.width\
  \ / 2)\nplayerNode.physicsBody?.isDynamic = true\nplayerNode.position = CGPoint(x:\
  \ size.width / 2.0, y: 80.0)\naddChild(playerNode)\n```\n\n现在，回到 Xcode 并再次运行应用。如果你没有仔细观察，你只会看到游戏的背景节点。这是因为\
  \ `SpriteKit` 中的默认重力设置与地球引力一致，玩家节点现在正快速地向地心坠落。要想让下落速度变慢，你需要调整游戏世界的重力设置，直到找到一个你满意的重力值。\n\
  \n回到 `GameScene.init(size: CGSize)` 方法，在 `super.init(size: size)` 调用之后立即添加以下代码行，然后再次运行应用：\n\
  \n```\nphysicsWorld.gravity = CGVector(dx: 0.0, dy: -0.1)\n```\n\n现在你会看到玩家慢慢地从屏幕底部飘落。你刚才所做的是通过\
  \ `SKScene` 的 `physicsWorld.gravity` 属性修改了世界重力，并将其设置成一个能大幅减缓 `playerNode` 下落速度的值。请注意，你设置给重力属性的值是一个向量，其\
  \ x 坐标为 `0.0`，y 坐标为 `–0.1`。你将 x 坐标设为 `0.0`，是因为重力只沿 y 轴方向施加力。这个向量的结果是一个将物体向场景底部拉拽的重力。\n\
  \n虽然将 y 坐标设为 `–0.1` 有助于我们看到 `playerNode` 掉落出场景，但这对于游戏玩法来说并不实用。一个更合理的值应该是 `–2.0`。将重力属性设置为\
  \ `CGVector(dx: 0.0, dy: -2.0)`，然后再次尝试运行。你会看到玩家掉出屏幕，但速度更适合游戏玩法。\n\n**注意：** 在本节中，你将世界的重力属性修改为了一个与地球实际重力不一致的值。我们之所以让你这样做，是因为你的目标不是模拟地球引力，而是创建一个让玩家感到有趣的模拟游戏世界。当你开始创建自己的游戏时，你会发现自己经常这样做。毕竟，游戏的核心是让玩家玩得开心，而不是与现实世界一致。\n\
  \n### 向 SKPhysicsBody 施加力\n\n\n\n## 排版后的内容\n\n此时，你的玩家已经能响应游戏世界的物理属性，并且你也调整了引力，防止玩家从可视场景底部掉落。这很棒，但看着角色掉出屏幕可没什么乐趣。现在，是时候向玩家施加一些力，让他能对抗重力并留在可视场景中了。\n\
  \n改变 `SKPhysicsBody` 速度的两种最常见方法是施加力（`applyForce()`）和施加冲量（`applyImpulse()`）。当向 `SKPhysicsBody`\
  \ 施加力时，该力的作用时间基于渲染循环两次调用之间经过的时间长度。力通常用于连续的速度变化。你使用 `SKPhysicsBody` 的 `applyForce()`\
  \ 方法来施加力。当向 `SKPhysicsBody` 施加冲量时，你是在对物体的速度施加一个瞬时改变，这个改变与经过的模拟时间无关。当你需要立即改变节点速度时，会使用冲量。你使用\
  \ `SKPhysicsBody` 的 `applyImpulse()` 方法来施加冲量。\n\n本游戏将使用冲量来修改玩家的速度，因此会使用 `applyImpulse()`\
  \ 方法。在你能向玩家的物理体施加冲量之前，你需要让用户能够告知游戏何时施加冲量。因为 `SKNode` 继承了 `UIResponder`，并且 `SKScene`\
  \ 是一个 `SKNode`，你可以通过重写 `GameScene` 的 `UIResponder.touchesBegan()` 方法来测试场景中的触摸。为此，你需要完成两步。\n\
  \n首先，在创建 `backgroundNode` 的代码行之前，添加以下一行代码以开启场景中的用户交互：\n`isUserInteractionEnabled\
  \ = true`\n\n然后，通过在 `GameScene` 类中添加以下方法来重写 `UIResponder.touchesBegan()`：\n```\n\
  override func touchesBegan(_ touches: Set<UITouch>, with event: UIEvent?) {\n  \
  \  playerNode.physicsBody?.applyImpulse(CGVector(dx: 0.0, dy: 40.0))\n}\n```\n\n\
  将此方法添加到 `GameScene` 类定义的底部，然后重新运行 `SuperSpaceMan` 应用程序。在应用运行时，根据需要多次点击屏幕，让玩家飞回场景中。所需的点击次数取决于\
  \ `playerNode` 掉出场景的远近。\n\n在尝试了触摸响应器之后，看看 `touchesBegan()` 方法中的单行代码。这行代码在每次点击屏幕时向\
  \ `playerNode` 的物理体施加一个冲量。冲量的方向和强度取决于你传递给 `applyImpulse()` 方法的向量。这里，你创建了一个 x 值为\
  \ 0.0（因为你只想沿着 y 轴线性施加冲量）且 y 值为 40.0 的向量，这会产生一个将玩家向重力相反方向弹起的脉冲。\n\n在继续之前，尝试调整创建此向量的\
  \ y 值。这能帮助你理解该值如何影响脉冲的大小。完成后，将 y 值恢复为 40.0，让我们继续。\n\n一旦玩家在场景中可见，点击屏幕直到玩家到达可视场景顶部，然后观察它下落。关于\
  \ `playerNode` 下落方式，需要注意一点：玩家下落时，仿佛没有任何表面积来减缓其速度。这看起来不太对劲。为了解决这个问题，`SpriteKit` 的\
  \ `SKPhysicsBody` 提供了一个 `linearDamping` 属性。此属性默认值为 0.1，用于减小物理体的线性速度，以模拟流体或空气摩擦力。这里，你在模拟空气摩擦力。\n\
  \n要了解如何使用此属性，请在 `playerNode` 定位代码之后立即添加以下代码行，然后再次运行应用程序：\n`playerNode.physicsBody?.linearDamping\
  \ = 1.0`\n\n现在点击屏幕直到玩家到达屏幕顶部，让它再次下落。这一次，`playerNode` 下落的更慢，模拟了在空气中下落时的阻力。\n\n在进入本章的碰撞检测部分之前，请确保你的\
  \ `GameScene.swift` 文件看起来如 3-1 所示。\n\n```\nimport SpriteKit\nclass GameScene: SKScene\
  \ {\n    let backgroundNode = SKSpriteNode(imageNamed: \"Background\")\n    let\
  \ playerNode = SKSpriteNode(imageNamed: \"Player\")\n    required init?(coder aDecoder:\
  \ NSCoder) {\n        super.init(coder: aDecoder)\n    }\n    override init(size:\
  \ CGSize) {\n        super.init(size: size)\n        physicsWorld.gravity = CGVector(dx:\
  \ 0.0, dy: -2.0);\n        backgroundColor = SKColor(red: 0.0, green: 0.0, blue:\
  \ 0.0, alpha: 1.0)\n        isUserInteractionEnabled = true\n        // adding the\
  \ background\n        backgroundNode.size.width = frame.size.width\n        backgroundNode.anchorPoint\
  \ = CGPoint(x: 0.5, y: 0.0)\n        backgroundNode.position = CGPoint(x: size.width\
  \ / 2.0, y: 0.0)\n        addChild(backgroundNode)        \n        // add the player\n\
  \        playerNode.physicsBody = SKPhysicsBody(circleOfRadius: playerNode.size.width\
  \ / 2)\n        playerNode.physicsBody?.isDynamic = true\n        playerNode.position\
  \ = CGPoint(x: size.width / 2.0, y: 80.0)\n        playerNode.physicsBody?.linearDamping\
  \ = 1.0\n        addChild(playerNode!)\n    }\n    override func touchesBegan(_\
  \ touches: Set<UITouch>, with event: UIEvent?) {\n        playerNode.physicsBody?.applyImpulse(CGVector(dx:\
  \ 0.0, dy: 40.0))\n    }\n}\n```\n\n**列表 3-1** `GameScene.swift`：`SuperSpaceMan`\
  \ 主要修改后的 `GameScene`\n\n### 向 `SKNode` 添加碰撞检测\n\n目前，游戏拥有一个响应重力和冲量的 `playerNode`；现在是时候添加另一个玩家可以交互的节点了。在本节中，你将在游戏中添加另一个代表宝珠的精灵。你将首先添加宝珠并将其定位在玩家上方。之后，你将修改宝珠的属性，使玩家和宝珠在游戏中自然交互。最后，你将添加检测玩家与宝珠碰撞的代码，并在它们碰撞时将宝珠从场景中移除。\n\
  \n\n\n#### 添加碰撞节点\n\n我们开始吧。首先，你需要在 `GameScene` 中添加一个能量球精灵，位置设定在玩家节点左上方稍远处。在 `sprites.atlas`\
  \ 图册中，用于能量球的图片名为 `PowerUp`。添加这个精灵没有什么特别之处——操作方式与添加玩家节点完全相同。\n\n首先，在 `playerNode`\
  \ 声明之后立即添加新节点的声明：\n\n```\nlet orbNode = SKSpriteNode(imageNamed: \"PowerUp\")\n\
  ```\n\n添加 `orbNode` 的声明后，在 `GameScene.init(size: CGSize)` 方法的末尾添加以下代码：\n\n```\n\
  orbNode.position = CGPoint(x: 150.0, y: size.height - 25)\norbNode.physicsBody =\
  \ SKPhysicsBody(circleOfRadius: orbNode.size.width / 2)\norbNode.physicsBody?.isDynamic\
  \ = false\naddChild(orbNode)\n```\n\n查看这段代码片段，你会发现它与添加 `playerNode` 的代码相似，但有两点不同。首先，`orbNode`\
  \ 被放置在场景顶部下方 25 个点、玩家左方稍远处。其次，`orbNode.physicsBody.isDynamic` 属性被设置为 `false`。这是因为你不希望这个节点对其他节点做出反应。你希望\
  \ `playerNode` 穿过场景收集能量球作为上升燃料。这就是为什么你要为 `orbNode` 的物理体赋予一个静态体积。\n\n现在继续运行应用，但这次点击屏幕直到\
  \ `playerNode` 与 `orbNode` 碰撞。由于 `playerNode` 是动态体，它会弹开并旋转着飞向远处；而 `orbNode` 是静态体，它会保持原地不动。仅用这么少的代码就能实现这样的效果，相当不错。但在继续检测碰撞并移除能量球之前，你还需要做一件事。\n\
  \n你可能会注意到，当 `playerNode` 与 `orbNode` 碰撞时，`playerNode` 开始旋转。在很多情况下这是正确的反应，但对于这个游戏，你希望\
  \ `playerNode` 直接穿过能量球而不旋转。SpriteKit 提供了一种简单的方法来防止这种旋转：`physicsBody.allowsRotation`\
  \ 属性。\n\n在将 `playerNode` 添加到场景之前的代码处，添加以下一行代码：\n\n```\nplayerNode.physicsBody?.allowsRotation\
  \ = false\n```\n\n现在再次运行应用。这次当玩家与能量球碰撞时，会弹开但不会旋转。\n\n#### 添加碰撞检测\n\n现在你的 `playerNode`\
  \ 和 `orbNode` 已经能够正确碰撞并做出反应。是时候添加显式代码来检测玩家与能量球之间的碰撞，并在碰撞时从场景中移除能量球。运行游戏时，你确实能看到能量球与玩家之间的碰撞，但现在你要做的是检测碰撞何时发生，并移除参与碰撞的能量球。在后续游戏开发中，你还会添加燃料元素，让能量球为玩家提供燃料，使其越升越高。\n\
  \n为了能够检测 `SKNode` 之间的接触，你首先需要在 `GameScene` 类中实现 SpriteKit 的协议 `SKPhysicsContactDelegate`，然后实现游戏中所需的方法。\n\
  \n`SKPhysicsContactDelegate` 协议定义了两个用于检测 `SKNode` 相互接触的方法：`didBeginContact` 和 `didEndContact()`\
  \ 方法。以下代码片段展示了该协议：\n\n```\npublic protocol SKPhysicsContactDelegate : NSObjectProtocol\
  \ {\n    optional public func didBegin(_ contact: SKPhysicsContact)\n    optional\
  \ public func didEnd(_ contact: SKPhysicsContact)\n}\n```\n\n方法名直接反映了其功能。`didBegin(_\
  \ contact: SKPhysicsContact)` 方法在接触开始时被调用，而 `didEnd(_ contact: SKPhysicsContact)`\
  \ 方法在接触结束时被调用。对于这个游戏，你只关心第一个方法 `didBegin(_ contact: SKPhysicsContact)`，因为你不想让 `playerNode`\
  \ 穿过能量球。你希望在 `playerNode` 接触能量球的瞬间将其从场景中移除。\n\n回到 `GameScene.swift` 文件，在 `GameScene`\
  \ 类的结束大括号 `}` 之后创建一个类扩展，添加以下代码片段：\n\n```\nextension GameScene: SKPhysicsContactDelegate\
  \ {\n}\n```\n\n添加扩展后，在 `GameScene` 类的末尾添加 `didBegin(_ contact: SKPhysicsContact)`\
  \ 方法的实现：\n\n```\nfunc didBegin(_ contact: SKPhysicsContact) {\n    print(\"发生了接触。\"\
  )\n}\n```\n\n最后，你需要让 `GameScene` 成为场景 `physicsWorld.contactDelegate` 的代理。为此，在 `GameScene.init(size:\
  \ CGSize)` 方法中，紧接在 `super.init(size: size)` 调用之后添加以下一行代码：\n\n```\nphysicsWorld.contactDelegate\
  \ = self\n```\n\n#### 为 SKPhysicsBody 添加位掩码\n\n所有设置都已就绪，可以接收接触通知了。接下来你需要做的是告诉 SpriteKit\
  \ 你想要接收哪些对象的接触通知。你可以使用一种称为位掩码的概念来实现。`SKPhysicsBody` 有三个位掩码属性，可用于定义物理体在游戏世界中与其他物理体的交互方式：`collisionBitMask`、`categoryBitMask`\
  \ 和 `contactTestBitMask`。每个属性在表 3-1 中有详细说明。\n\n**表 3-1. SKPhysicsBody 的三个位掩码属性**\n\
  \n| 属性 | 用途 |\n| --- | --- |\n| `collisionBitMask` | 定义你的 `SKPhysicsBody` 会碰撞到的碰撞类别。所有其他物理体将被穿透。\
  \ |\n| `categoryBitMask` | 定义物理体所属的碰撞类别。 |\n| `contactTestBitMask` | 确定此物理体与哪些类别发生接触。在你的游戏中，一个例子是与能量球接触。你希望\
  \ SpriteKit 在 `playerNode` 与 `orbNode` 接触时通知你。 |\n\n\n目前应用程序只有两个节点：一个玩家节点和一个能量球节点。这使得对它们进行分类变得容易。你可以将玩家放入`CollisionCategoryPlayer`类别，将所有能量球节点（目前只有一个）放入名为`CollisionCategoryPowerUpOrbs`的类别。这两个类别位掩码定义如下：\n\
  ```\nlet CollisionCategoryPlayer  : UInt32 = 0x1 << 1\nlet CollisionCategoryPowerUpOrbs\
  \ : UInt32 = 0x1 << 2\n```\n\n这里有`CollisionCategoryPlayer`和`CollisionCategoryPowerUpOrbs`两个位掩码，每个都是无符号\
  \ 32 位整数。这一点很重要，因为碰撞位掩码是 32 位的，你最多只能有 32 个唯一类别。继续在`GameScene`中，紧跟在`orbNode`声明之后、第一个`init()`方法之前添加以下两行：\n\
  ```\nlet CollisionCategoryPlayer  : UInt32 = 0x1 << 1\nlet CollisionCategoryPowerUpOrbs\
  \ : UInt32 = 0x1 << 2\n```\n\n让我们看看如何使用这两个节点设置碰撞检测属性。先从`playerNode`开始。以下三行设置了玩家的碰撞属性：\n\
  ```\nplayerNode.physicsBody?.categoryBitMask = CollisionCategoryPlayer\nplayerNode.physicsBody?.contactTestBitMask\
  \ = CollisionCategoryPowerUpOrbs\nplayerNode.physicsBody?.collisionBitMask = 0\n\
  ```\n\n第一行将`playerNode.physicsBody`的类别位掩码关联到`CollisionCategoryPlayer`。第二行告诉 SpriteKit，每当你的物理体与属于`CollisionCategoryPowerUpOrbs`类别的另一个物理体发生接触时，你想要收到通知。最后一行将`playerNode.physicsBody`的`collisionBitMask`设置为`0`，告诉\
  \ SpriteKit 不要为你处理碰撞。游戏将在`didBegin()`方法中自行处理碰撞。继续在`GameScene.init(size: CGSize)`方法中，紧跟在以下行之后添加这三行：\n\
  `playerNode.physicsBody?.allowsRotation = false`\n\n接下来，我们来配置`orbNode`的物理体。配置`orbNode`的物理体比配置`playerNode`更简单，只需要两行代码：\n\
  ```\norbNode.physicsBody?.categoryBitMask = CollisionCategoryPowerUpOrbs\norbNode.physicsBody?.collisionBitMask\
  \ = 0\n```\n\n第一行将`orbNode`的物理体关联到`CollisionCategoryPowerUpOrbs`类别。第二行与配置玩家时一样，设置为`0`，因为你要自己处理碰撞。这里需要注意一点：配置能量球节点时，你没有设置`contactTestBitMask`，因为不需要这样做。由于已经在`playerNode`中设置了接触测试，你仍然会收到接触通知。在`GameScene.init(size:\
  \ CGSize)`方法中，紧挨在将`orbNode`添加到场景之前，添加这两行：\n```\norbNode.physicsBody?.categoryBitMask\
  \ = CollisionCategoryPowerUpOrbs\norbNode.physicsBody?.collisionBitMask = 0\n```\n\
  \n此时，两个节点都已配置好碰撞检测，每当`playerNode`与`orbNode`发生接触时，`didBegin(_contact: SKPhysicsContact)`方法将被调用。让我们测试一下。保存所有更改并运行应用程序，在点击屏幕时注意控制台输出。现在，当玩家与能量球接触时，你会在控制台中看到以下文本：\n\
  `There has been contact.`\n另外，请注意这次玩家穿过了能量球。这是因为你在两个节点中都将物理体的`collisionBitMask`属性设置为`0`。\n\
  \n#### 收到接触消息时移除能量球\n\n最后要做的，是添加在`playerNode`与能量球接触时移除`orbNode`的功能。为此，你需要做一些修改。首先，如第\
  \ 2 章所述，`SKNode`有一个`name`属性，用于标识单个节点或一组节点，因此你需要使用该属性来判断玩家是否遇到了能量球。要命名能量球节点，请在`GameScene.init(size:\
  \ CGSize)`方法中，紧挨在将`orbNode`添加到场景之前，添加以下代码行：\n`orbNode.name = \"POWER_UP_ORB\"`\n\
  \n最后需要做的是，修改`didBegin(_contact: SKPhysicsContact)`方法，检查与玩家`SKNode`接触的节点是否具有等于`\"\
  POWER_UP_ORB\"`的`name`属性，如果有，则将该节点从场景中移除。修改后的`didBegin(_contact: SKPhysicsContact)`方法如下所示：\n\
  ```\nfunc didBegin(_ contact: SKPhysicsContact) {\n    let nodeB = contact.bodyB.node\n\
  \    if nodeB?.name == \"POWER_UP_ORB\" {\n        nodeB?.removeFromParent()\n \
  \   }\n}\n```\n\n在这个方法中，首先要注意的是传递给方法的参数。这里有一个类型为`SKPhysicsContact`的`contact`参数。`SKPhysicsContact`包含了处理节点接触所需的所有信息。`SKPhysicsContact`类包含五个属性，帮助你确定接触的特性，定义在表\
  \ 3-2 中。\n\n**表 3-2. SKPhysicsContact 属性**\n\n| 方法 | 用途 |\n| --- | --- |\n| `bodyA`\
  \ | `bodyA`属性（`SKPhysicsBody`类型）表示接触中的第一个物体。（这将是`playerNode`。） |\n| `bodyB` | `bodyB`属性（`SKPhysicsBody`类型）表示接触中的第二个物体。（这将是`orbNode`。）\
  \ |\n| `contactPoint` | `contactPoint`（`CGPoint`类型）表示场景坐标中两个物理体之间的接触点。 |\n| `collisionImpulse`\
  \ | `contactImpulse`（`CGFloat`类型）以牛顿·秒为单位，指定这两个物体碰撞的力度。 |\n| `collisionNormal` |\
  \ `collisionNormal`（`CGVector`类型）指定碰撞的方向。 |\n\n\n您感兴趣的是这两个属性中的第二个：`bodyB`。回到`didBegin(_contact:\
  \ SKPhysicsContact)`方法，注意该方法的第二行。在这里，您引用了碰撞体的`bodyB`属性，正如我们之前提到的，这是一个`SKPhysicsContact`。一旦获得此引用，您就可以通过`bodyB.node`属性获取`SKNode`实例，它代表了碰撞中的第二个节点。获取到碰撞中的第二个`SKNode`后，您可以检查它的名称是否为`POWER_UP_ORB`。如果是，则调用该节点的`removeFromParent()`方法，顾名思义，该方法会将`orbNode`从场景中移除。继续操作，将当前`didBegin(_contact:\
  \ SKPhysicsContact`方法的内容替换为此版本，并最后一次运行应用程序。这一次，当`playerNode`与`orbNode`碰撞时，`orbNode`将从场景中消失。在本章末尾，新的`GameScene.swift`应如代码清单\
  \ 3-2 所示。\n\n```swift\nimport SpriteKit\n\nclass GameScene: SKScene {\n    let backgroundNode\
  \ = SKSpriteNode(imageNamed: \"Background\")\n    let playerNode = SKSpriteNode(imageNamed:\
  \ \"Player\")\n    let orbNode = SKSpriteNode(imageNamed: \"PowerUp\")\n    let\
  \ CollisionCategoryPlayer: UInt32 = 0x1 << 1\n    let CollisionCategoryPowerUpOrbs:\
  \ UInt32 = 0x1 << 2\n\n    required init?(coder aDecoder: NSCoder) {\n        super.init(coder:\
  \ aDecoder)\n    }\n\n    override init(size: CGSize) {\n        super.init(size:\
  \ size)\n        physicsWorld.contactDelegate = self\n        physicsWorld.gravity\
  \ = CGVector(dx: 0.0, dy: -2.0)\n        backgroundColor = SKColor(red: 0.0, green:\
  \ 0.0, blue: 0.0, alpha: 1.0)\n        isUserInteractionEnabled = true\n\n     \
  \   // adding the background\n        backgroundNode.size.width = frame.size.width\n\
  \        backgroundNode.anchorPoint = CGPoint(x: 0.5, y: 0.0)\n        backgroundNode.position\
  \ = CGPoint(x: size.width / 2.0, y: 0.0)\n        addChild(backgroundNode)\n\n \
  \       // add the player\n        playerNode.physicsBody = SKPhysicsBody(circleOfRadius:\
  \ playerNode.size.width / 2)\n        playerNode.physicsBody?.isDynamic = true\n\
  \        playerNode.position = CGPoint(x: size.width / 2.0, y: 80.0)\n        playerNode.physicsBody?.linearDamping\
  \ = 1.0\n        playerNode.physicsBody?.allowsRotation = false\n        playerNode.physicsBody?.categoryBitMask\
  \ = CollisionCategoryPlayer\n        playerNode.physicsBody?.contactTestBitMask\
  \ = CollisionCategoryPowerUpOrbs\n        playerNode.physicsBody?.collisionBitMask\
  \ = 0\n        addChild(playerNode)\n\n        orbNode.position = CGPoint(x: 150.0,\
  \ y: size.height - 25)\n        orbNode.physicsBody = SKPhysicsBody(circleOfRadius:\
  \ orbNode.size.width / 2)\n        orbNode.physicsBody?.isDynamic = false\n    \
  \    orbNode.physicsBody?.categoryBitMask = CollisionCategoryPowerUpOrbs\n     \
  \   orbNode.physicsBody?.collisionBitMask = 0\n        orbNode.name = \"POWER_UP_ORB\"\
  \n        addChild(orbNode)\n    }\n\n    override func touchesBegan(_ touches:\
  \ Set<UITouch>, with event: UIEvent?) {\n        playerNode.physicsBody?.applyImpulse(CGVector(dx:\
  \ 0.0, dy: 40.0))\n    }\n}\n\nextension GameScene: SKPhysicsContactDelegate {\n\
  \    func didBegin(_ contact: SKPhysicsContact) {\n        let nodeB = contact.bodyB.node\n\
  \        if nodeB?.name == \"POWER_UP_ORB\" {\n            nodeB?.removeFromParent()\n\
  \        }\n    }\n}\n```\n\n**代码清单 3-2.** `GameScene.swift`：带有碰撞检测的超级太空人游戏场景\n\n\
  ### 总结\n\n本章讨论了 SpriteKit 的物理引擎和碰撞检测。我们先讨论了`SKPhysicsBody`。接着，你开启了游戏世界的重力，这将玩家角色下拉到场景底部。之后，你添加了一个触摸响应器，将`playerNode`向上推回太空。最后，我们讨论了如何处理碰撞。在第\
  \ 4 章中，你将向场景添加滚动功能，这样玩家就可以在场景中飞得更高，而不会飞出场景顶部。你还将集成加速度计，为玩家提供额外的控制。\n\n© James Goodwill\
  \ 和 Wesley Matlock 2017  \nJames Goodwill 和 Wesley Matlock  \n《Beginning Swift Games\
  \ Development for iOS》  \n10.1007/978-1-4842-2310-9_4\n\n"
- "# 第 4 章 添加场景滚动与游戏控制\n\nJames Goodwill^(1 ) 和 Wesley Matlock²  \n(1) 美国科罗拉多州高地牧场\
  \  \n(2) 美国密苏里州堪萨斯城  \n\n在本章中，你将开始为游戏添加一些真正的功能。你将首先对当前的`GameScene`做一些小的改动。之后，你将添加更多的轨道节点用于碰撞。然后，你将向场景添加滚动功能，使其看起来像玩家在太空中飞行收集能量球。最后，你将开始使用手机的加速度计让玩家沿\
  \ x 轴移动。\n\n### 重新组织 GameScene\n\n\n\n### 改进游戏场景代码\n\n在继续添加滚动和加速计功能之前，你需要对现有`GameScene`进行一些小的代码更改。在前面的章节中，有大量代码展示了如何在`SpriteKit`中执行某些操作。你在这里要做的更改是重组性的，旨在为继续游戏开发做好准备。\n\
  \n你需要更改的第一件事是游戏物理世界中的重力强度。你将通过将表示重力力的向量从`(0.0, –2.0)`改为`(0.0, –5.0)`来实现这一点。继续找到设置`physicsWorld.gravity`属性的位置，并将其更改为以下内容：\n\
  \n```\nphysicsWorld.gravity = CGVector(dx: 0.0, dy: -5.0)\n```\n\n为了准备下一节的内容（你将在其中开始滚动游戏场景中的不同层），你需要向场景中添加另一个层来容纳所有精灵。你将通过添加另一个名为`foregroundNode`的`SKSpriteNode`来实现这一点。该节点将容纳所有会影响游戏玩法的精灵。\n\
  \n那么，让我们添加这个节点，并将玩家添加到其中。首先，在`backgroundNode`声明之后立即添加以下`foregroundNode`声明：\n\n```\n\
  let foregroundNode = SKSpriteNode()\n```\n\n接下来，通过在你将`backgroundNode`添加到场景的那行代码之后立即添加以下代码行，将`foregroundNode`实例添加到场景中：\n\
  \n```\naddChild(foregroundNode)\n```\n\n现在，找到`init()`方法中你将`playerNode`和`orbNode`添加到场景的位置，并将`addChild()`调用更改为以下内容：\n\
  \n```\nforegroundNode.addChild(playerNode)\nforegroundNode.addChild(orbNode)\n```\n\
  \n一旦你将`playerNode`和`orbNode`添加到新的`foregroundNode`中，找到你设置`playerNode`位置的位置，并使用以下`CGPoint`更改其`position`属性：\n\
  \n```\nplayerNode.position = CGPoint(x: size.width / 2.0, y: 180.0)\n```\n\n现在，找到你设置`playerNode.physicsBody.dynamic`属性的位置，并关闭玩家的动态体积：\n\
  \n```\nplayerNode.physicsBody?.isDynamic = false\n```\n\n你这样做的目的是，如果你没有及时点击屏幕，玩家就不会掉出屏幕。\n\
  \n接下来，在`orbNode`定义之后立即向`GameScene`添加以下新属性：\n\n```\nvar impulseCount = 4\n```\n\n\
  现在将`touchesBegan()`方法更改为以下内容：\n\n```\noverride func touchesBegan(_ touches: Set<UITouch>,\
  \ with event: UIEvent?) {\n    if !playerNode.physicsBody!.isDynamic {\n       \
  \ playerNode.physicsBody?.isDynamic = true\n    }\n    if impulseCount > 0 {\n \
  \       playerNode.physicsBody!.applyImpulse(CGVector(dx: 0.0, dy: 40.0))\n    \
  \    impulseCount -= 1\n    }\n}\n```\n\n这段代码的作用是：如果玩家的动态体积是关闭的，则将其重新打开，这样玩家将再次开始对重力做出反应。之后，它检查`impulseCount`属性。如果该值大于\
  \ 0，则向玩家施加一个冲量，并将`impulseCount`属性减 1。\n\n这段代码的目的是让游戏处于初始启动状态，玩家保持静止，直到你点击屏幕开始游戏。当屏幕第一次被点击时，游戏开始。\n\
  \n添加`impulseCount`属性是为了引入一个新的游戏元素。游戏将使用`impulseCount`属性为用户提供有限次数的可用于推进的冲量。每当`playerNode`与能量球接触时，`impulseCount`属性会增加；每当玩家点击屏幕时，该属性会减少。这意味着用户必须善于收集能量球，否则他们最终会坠入深渊并输掉游戏。\n\
  \n接下来需要更改的是能量球节点添加到场景的方式。你需要添加更多能量球节点。在添加额外节点之前，需要移除当前添加这些节点的代码。要移除这些代码，首先从`GameScene`类的顶部移除`orbNode`属性。在`GameScene`的声明部分找到以下行并将其移除：\n\
  \n```\nlet orbNode = SKSpriteNode(imageNamed: \"PowerUp\")\n```\n\n然后移除所有以下用于添加单个节点的代码行：\n\
  \n```\norbNode.position = CGPoint(x: 150.0, y: size.height - 25)\norbNode.physicsBody\
  \ = SKPhysicsBody(circleOfRadius: orbNode.size.width / 2)\norbNode.physicsBody?.isDynamic\
  \ = false\norbNode.physicsBody?.categoryBitMask = CollisionCategoryPowerUpOrbs\n\
  orbNode.physicsBody?.collisionBitMask = 0\norbNode.name = \"POWER_UP_ORB\"\nforegroundNode.addChild(orbNode)\n\
  ```\n\n### 向场景添加更多能量球\n\n\n\n游戏场景已准备好开始添加一些真实的游戏组件，第一个将是一组额外的能量球节点。这些能量球将排成两行，位于玩家上方。第一行能量球共\
  \ 20 个，居中排列，起始位置在`playNode`上方 100 点，每个节点的`anchorPoint`之间间隔 140 点。第二组能量球节点也将是 20\
  \ 个节点的一串，但它们位于玩家右侧 50 点。添加第一组能量球节点的代码如下所示：\n\n```swift\nvar orbNodePosition = CGPoint(x:\
  \ playerNode.position.x, y: playerNode.position.y + 100)\nfor _ in 0...19 {\n  \
  \  let orbNode = SKSpriteNode(imageNamed: \"PowerUp\")\n    orbNodePosition.y +=\
  \ 140\n    orbNode.position = orbNodePosition\n    orbNode.physicsBody = SKPhysicsBody(circleOfRadius:\
  \ orbNode.size.width / 2)\n    orbNode.physicsBody?.isDynamic = false\n    orbNode.physicsBody?.categoryBitMask\
  \ = CollisionCategoryPowerUpOrbs\n    orbNode.physicsBody?.collisionBitMask = 0\n\
  \    orbNode.name = \"POWER_UP_ORB\"\n    foregroundNode.addChild(orbNode)\n}\n\
  ```\n\n查看这段代码，你会看到一个名为`orbNodePosition`的变量，其`x`坐标与`playerNode`的`x`坐标匹配，`y`坐标在`playerNode`上方\
  \ 100 点。之后是一个`for`循环，在玩家上方居中添加 20 个`orbNode`对象，每个节点位于前一个节点的`anchorPoint`上方 140 点。请将此代码添加到`GameScene`的`init()`方法底部，然后我们继续处理第二组`orbNode`对象。\n\
  \n要添加第二组节点，你需要使用以下类似的代码：\n\n```swift\norbNodePosition = CGPoint(x: playerNode.position.x\
  \ + 50, y: orbNodePosition.y)\nfor _ in 0...19 {\n    let orbNode = SKSpriteNode(imageNamed:\
  \ \"PowerUp\")\n    orbNodePosition.y += 140\n    orbNode.position = orbNodePosition\n\
  \    orbNode.physicsBody = SKPhysicsBody(circleOfRadius: orbNode.size.width / 2)\n\
  \    orbNode.physicsBody?.isDynamic = false\n    orbNode.physicsBody?.categoryBitMask\
  \ = CollisionCategoryPowerUpOrbs\n    orbNode.physicsBody?.collisionBitMask = 0\n\
  \    orbNode.name = \"POWER_UP_ORB\"\n    foregroundNode.addChild(orbNode)\n}\n\
  ```\n\n查看这段代码，你会发现唯一的变化是修改了变量`orbNodePosition`。`orbNodePosition`的`x`坐标值增加了 50，其他所有内容都相同。你可以轻松地将此代码重构为一个方法，并传入新的`x`坐标，但当前的目标是了解一切如何运作。它将在后续章节中被重构。在继续之前，请将此代码添加到`GameScene`的`init()`方法中上一个循环之后。\n\
  \n将所有代码添加到游戏场景后，运行应用程序。你的屏幕现在将如图[4-1]所示。\n\n![A330720_2_En_4_Fig1_HTML.jpg](img/A330720_2_En_4_Fig1_HTML.jpg)\
  \  \n**图 4-1.** 添加了额外能量球后的修改场景\n\n在向游戏添加滚动之前，你需要做的最后一件事是更改能量球碰撞的处理方式。如果你还记得第[3]章，每当`playerNode`与`orbNode`接触时，`orbNode`会从场景中移除。这种情况仍会发生，但现在碰撞还会增加`impulseCount`变量，为玩家提供额外的脉冲。为此，将当前的`didBeginContact()`方法更改为以下内容：\n\
  \n```swift\nfunc didBegin(_ contact: SKPhysicsContact) {\n    let nodeB = contact.bodyB.node!\n\
  \    if nodeB.name == \"POWER_UP_ORB\" {\n        impulseCount += 1\n        nodeB.removeFromParent()\n\
  \    }\n}\n```\n\n新的`didBeginContact()`每次玩家与能量球接触时都会增加`impulseCount`属性，然后移除能量球。现在玩家有了额外的燃料来避免坠落到行星表面。要查看此更改的效果，请保存更改并再次运行游戏。这一次，当你点击屏幕时，玩家将被向上推起并击中第一个能量球，然后是第二个，依此类推，直到飞出屏幕顶部。如果你点击足够长的时间，玩家最终会用完脉冲并从游戏底部坠落。\n\
  \n### 滚动场景\n\n在本节中，你将开始为游戏世界添加移动。在进行任何额外的代码更改之前，返回到 Xcode 并选择`Images.xcassets`文件夹中的第一个背景图像（箭头\
  \ 1），如图[4-2]所示。选中第一个背景后（箭头 2 和 3），展开 Xcode 的“工具”区域（箭头 4），然后点击“显示属性检查器”按钮（箭头 5）。注意“图像”属性（箭头\
  \ 6）。图像的高度远大于当前任何可用设备的高度（箭头 6）。\n\n![A330720_2_En_4_Fig2_HTML.jpg](img/A330720_2_En_4_Fig2_HTML.jpg)\
  \  \n**图 4-2.** 背景图像尺寸\n\n背景之所以这么大，是因为它将向下滚动，以模拟`playerNode`在太空中向上飞行。这将通过利用游戏渲染循环中的`update()`方法来实现。滚动背景的第一步是根据玩家在游戏中的位置更改背景的位置。每当玩家在场景中向上移动时，背景将向下移动。以下代码正是实现这一点的，你稍后需要将其添加到`GameScene`中：\n\
  \n```swift\noverride func update(_ currentTime: TimeInterval) {\n    backgroundNode.position\
  \ =\n        CGPoint(x: backgroundNode.position.x,\n                y: -((playerNode.position.y\
  \ - 180.0)/8))\n}\n```\n\n这个`update()`方法的实现根据玩家的当前位置更改背景节点的位置。具体来说，它将`backgroundNode`的位置设置为与自身相同的`x`值，但使用的`y`值位于玩家位置下方\
  \ 180 点，然后除以 8。目前不必担心这些数字。我们稍后会详细讨论它们。请将此`update`方法添加到`GameScene`的末尾，然后再次运行游戏。当你点击屏幕时，你会看到背景随着玩家飞出屏幕顶部而缓慢向场景底部移动。这很酷，但玩家仍然在飞离场景。还需要对`update()`方法进行一次修改。看一下这个修改后的`update()`：\n\
  \n```swift\noverride func update(_ currentTime: TimeInterval) {\n    if playerNode.position.y\
  \ >= 180.0 {\n        backgroundNode.position =\n            CGPoint(x: backgroundNode.position.x,\n\
  \                    y: -((playerNode.position.y - 180.0)/8))\n        foregroundNode.position\
  \ =\n            CGPoint(x: foregroundNode.position.x,\n                    y: -(playerNode.position.y\
  \ - 180.0))\n    }\n}\n```\n\n注意进行了两处修改。首先，该方法检查`playerNode`是否已至少向上移动了 180 点。如果`playerNode`已移动到此高度，则`backgroundNode`以玩家速度的八分之一向下移动，而前景以与玩家完全相同的速度移动。以与玩家相同的速度移动前景可防止玩家飞得太高而离开场景。将当前的`update()`方法修改为与此相同，然后再次运行应用程序。当你点击屏幕时，背景会缓慢向下移动，而超级太空人不会飞出屏幕顶部。这很棒，但有一件事除外：当`playerNode`到达第一行能量球的顶部时，玩家无法再向上移动，因为下一组能量球在右侧，玩家无法到达它们。这个问题将在下一节中解决，届时我们将向你展示如何使用加速度计为玩家添加水平移动。\n\
  \n### 使用加速度计控制玩家移动\n\n\n\n### 添加加速计控制\n\n在上一节中，当下一组需要玩家向上继续前进的能量球位于右侧 50 个点处时，玩家遇到了无法水平移动而无法触及它们的问题。现在，你将通过使用手机的加速计来控制玩家沿\
  \ x 轴的运动来解决这个问题。\n\n要在你的游戏中使用加速计，首先需要将 `CoreMotion` 框架添加到你的 `GameScene` 中。为此，请在\
  \ `GameScene.swift` 文件的顶部添加以下导入语句：\n\n```swift\nimport CoreMotion\n```\n\n之后，你需要添加一个新的属性。该属性将保存一个\
  \ `CMMotionManager` 对象的实例，该对象用于监测水平移动。在之前添加的 `impulseCount` 变量之后，直接将该变量添加到 `GameScene`\
  \ 中：\n\n```swift\nlet coreMotionManager = CMMotionManager()\n```\n\n这段代码创建了一个 `CMMotionManager`\
  \ 的实例，并将其存储在常量 `coreMotionManager` 中。我们稍微讨论一下 `CMMotionManager` 的作用。`CMMotionManager`\
  \ 对象是用于访问 iOS 提供的运动服务的对象。这些服务包括访问加速计、磁力计、旋转速率和其他设备运动传感器。你特别感兴趣的是设备沿 x 轴的加速度。这些信息通过使用加速计来访问。\n\
  \n你将使用 `CMMotionManager` 让加速计以特定时间间隔更新当前设备加速度给应用程序。实现此功能的代码如下所示：\n\n```swift\ncoreMotionManager.accelerometerUpdateInterval\
  \ = 0.3\ncoreMotionManager.startAccelerometerUpdates()\n```\n\n花点时间看看这段代码。第一行告诉\
  \ `coreMotionManager` 加速计将用于更新应用程序当前加速度的时间间隔（以秒为单位）。该值设置为 0.3 秒，提供了相当平滑的更新速率。你可以尝试调整此值，看看它如何影响应用程序。第二行代码实际启动了加速计更新。\n\
  \n继续将此代码添加到 `GameScene` 的 `touchesBegan()` 方法中，放在 `playerNode.physicsBody.dynamic`\
  \ 属性设置为 `true` 之后。修改后的 `touchesBegan()` 方法如下所示：\n\n```swift\noverride func touchesBegan(_\
  \ touches: Set<UITouch>, with event: UIEvent?) {\n    if !playerNode.physicsBody!.isDynamic\
  \ {\n        playerNode.physicsBody?.isDynamic = true\n        coreMotionManager.accelerometerUpdateInterval\
  \ = 0.3\n        coreMotionManager.startAccelerometerUpdates()\n    }\n    if impulseCount\
  \ > 0 {\n        playerNode.physicsBody!.applyImpulse(CGVector(dx: 0.0, dy: 40.0))\n\
  \        impulseCount -= 1\n    }\n}\n```\n\n现在是时候利用这些信息做点什么了。起初，使用 `update()` 方法似乎是使用这些数据的逻辑选择，但\
  \ `update()` 方法是在渲染循环评估场景中所有物理体之前调用的。场景中与其他节点的碰撞可能会改变玩家沿 x 轴的速度，而这种改变应该在使用加速计改变玩家速度之前发生。尽管在这个游戏中不会发生这种情况——因为\
  \ `playerNode` 是游戏中唯一的动态体积——但了解这一点是有好处的。\n\n考虑到所有物理变化应该在玩家 x 轴速度被修改之前进行评估，渲染过程中实际上只有一个地方可以处理加速计的变化，那就是在渲染循环的\
  \ `didSimulatePhysics()` 方法中。要重写当前的 `didSimulatePhysics()`，请在 `GameScene` 的底部添加以下代码：\n\
  \n```swift\noverride func didSimulatePhysics() {\n    if let accelerometerData =\
  \ coreMotionManager.accelerometerData {\n        playerNode.physicsBody!.velocity\
  \ =\n                CGVector(dx: CGFloat(accelerometerData.acceleration.x * 380.0),\n\
  \                         dy: playerNode.physicsBody!.velocity.dy)\n    }\n    if\
  \ playerNode.position.x < -(playerNode.size.width / 2) {\n        playerNode.position\
  \ =\n            CGPoint(x: size.width - playerNode.size.width / 2,\n          \
  \          y: playerNode.position.y);\n    }\n    else if playerNode.position.x\
  \ > self.size.width {\n        playerNode.position = CGPoint(x: playerNode.size.width\
  \ / 2,\n                                      y: playerNode.position.y);\n    }\n\
  }\n```\n\n将这段代码添加到 `GameScene` 后，保存文件，然后这次在你的实体 iPhone 上运行应用程序。（模拟器不模拟加速计活动。）当应用程序在你的设备上运行时，点击屏幕并尝试收集所有的\
  \ `orbNode`。请记住，你收集的能量球越多，玩家可用的脉冲就越多，以便继续前进。\n\n在稍微尝试了一下加速计之后，让我们看看你刚才添加的代码。第一行是改变\
  \ `playerNode` 速度的地方。这是通过创建一个新的向量来实现的，该向量的 x 值是最新的加速计 x 轴加速度值乘以 `380.0`，y 值是玩家当前的\
  \ y 轴速度，最后将其设置为玩家的新整体速度。\n\n修改玩家的速度后，有两个 `if` 语句用于判断玩家是否飞出了场景的左侧或右侧。如果发生这两种情况中的任何一种，玩家将被移动到场景的另一边。请注意，当测试\
  \ `playerNode` 的位置时，检查的是 `playerNode` 的一半是否离开了场景。这样做是因为 `playerNode` 的锚点是 `(0.5,\
  \ 0.5)`。\n\n还有最后一个需要修改的地方：当不再使用 `GameScene` 时，关闭加速计更新。为此，在 `GameScene` 的底部添加以下 `deinit()`\
  \ 方法并保存你的更改：\n\n```swift\ndeinit {\n    coreMotionManager.stopAccelerometerUpdates()\n\
  }\n```\n\n### 总结\n\n在本章中，你开始为你的游戏添加一些真正的功能。首先，你对游戏开始部分做了一些小的结构重组。然后，你添加了更多的 `orbNode`\
  \ 以进行碰撞。添加新的 `orbNode` 后，你为游戏场景添加了滚动效果，使其看起来像玩家在太空中飞行收集能量球。最后，你通过使用手机的加速计来控制玩家沿\
  \ x 轴移动，结束了本章。在下一章中，你将继续添加新的游戏元素，并开始为你的 `SKSpriteKitNode` 制作动画。正是在那章中，你将开始将你的游戏转变为一个真正的、可玩的游戏。\n\
  \n© James Goodwill 和 Wesley Matlock 2017  \nJames Goodwill 和 Wesley Matlock，*Beginning\
  \ Swift Games Development for iOS*  \n10.1007/978-1-4842-2310-9_5\n\n"
- "# 5. 添加动作和动画\n\nJames Goodwill¹ 和 Wesley Matlock²  \n(1) 美国科罗拉多州海兰兹牧场  \n(2) 美国密苏里州堪萨斯城\n\
  \n在本章中，你将最后一次重构能量球节点的布局，以增强可玩性。之后，我们将向你展示如何使用 `SKActions` 让 `SKSpriteNode` 在场景中来回移动，并让同一个节点无限旋转。最后，我们将介绍如何使用颜色化动作为\
  \ `SKSpriteNode` 添加着色效果，以此来结束本章。\n\n\n\n### 最后一次重构轨道节点布局\n\n在开始讨论`SKActions`之前，需要对轨道节点的布局方式做一些调整。第\
  \ 4 章曾提到过对轨道节点布局进行重构。在本节中，我们不仅要将其布局重构为一个方法，还要最后一次修改轨道节点的布局方式。本次修改的目标是让轨道排列更接近游戏风格。新方法如下：\n\
  \n```\nfunc addOrbsToForeground() {\n    var orbNodePosition = CGPoint(x: playerNode.position.x,\
  \ y: playerNode.position.y + 100)\n    var orbXShift : CGFloat = -1.0\n    for _\
  \ in 1...50 {\n        let orbNode = SKSpriteNode(imageNamed: \"PowerUp\")\n   \
  \     if orbNodePosition.x - (orbNode.size.width * 2) <= 0 {\n            orbXShift\
  \ = 1.0\n        }\n        if orbNodePosition.x + orbNode.size.width >= size.width\
  \ {\n            orbXShift = -1.0\n        }\n        orbNodePosition.x += 40.0\
  \ * orbXShift\n        orbNodePosition.y += 120\n        orbNode.position = orbNodePosition\n\
  \        orbNode.physicsBody = SKPhysicsBody(circleOfRadius: orbNode.size.width\
  \ / 2)\n        orbNode.physicsBody?.isDynamic = false\n        orbNode.physicsBody?.categoryBitMask\
  \ = CollisionCategoryPowerUpOrbs\n        orbNode.physicsBody?.collisionBitMask\
  \ = 0\n        orbNode.name = \"POWER_UP_ORB\"\n        foregroundNode.addChild(orbNode)\n\
  \    }\n}\n```\n\n查看这个方法，你会发现它并没有什么特别之处。它首先将第一个轨道的初始位置设为玩家节点正上方 100 个点。然后依次添加 50\
  \ 个轨道，在 x 轴上间隔 40 个点，y 轴上间隔 120 个点，在场景中从右向左移动，直到所有节点添加完毕。请直接将此方法添加到`GameScene`中`init()`方法的后面。将`addOrbsToForeground()`方法添加到游戏场景后，还需要添加一个调用该方法的语句。在`GameScene`的`init()`方法末尾添加以下方法调用：\n\
  \n```\naddOrbsToForeground()\n```\n\n在调用这个新方法之前，需要将`init()`方法中旧的轨道添加代码移除。为此，请找到以下代码并将其从`init()`中删除：\n\
  \n```\nvar orbNodePosition = CGPoint(x: playerNode.position.x, y: playerNode.position.y\
  \ + 100)\nfor _ in 0...19 {\n    let orbNode = SKSpriteNode(imageNamed: \"PowerUp\"\
  )\n    orbNodePosition.y += 140\n    orbNode.position = orbNodePosition\n    orbNode.physicsBody\
  \ = SKPhysicsBody(circleOfRadius: orbNode.size.width / 2)\n    orbNode.physicsBody?.isDynamic\
  \ = false\n    orbNode.physicsBody?.categoryBitMask = CollisionCategoryPowerUpOrbs\n\
  \    orbNode.physicsBody?.collisionBitMask = 0\n    orbNode.name = \"POWER_UP_ORB\"\
  \n    foregroundNode.addChild(orbNode)\n}\norbNodePosition = CGPoint(x: playerNode.position.x\
  \ + 50, y: orbNodePosition.y)\nfor _ in 0...19 {\n    let orbNode = SKSpriteNode(imageNamed:\
  \ \"PowerUp\")\n    orbNodePosition.y += 140\n    orbNode.position = orbNodePosition\n\
  \    orbNode.physicsBody = SKPhysicsBody(circleOfRadius: orbNode.size.width / 2)\n\
  \    orbNode.physicsBody?.isDynamic = false\n    orbNode.physicsBody?.categoryBitMask\
  \ = CollisionCategoryPowerUpOrbs\n    orbNode.physicsBody?.collisionBitMask = 0\n\
  \    orbNode.name = \"POWER_UP_ORB\"\n    foregroundNode.addChild(orbNode)\n}\n\
  ```\n\n完成所有修改并保存后，再次运行应用，查看新的布局。效果应如图 5-1 所示。\n\n![A330720_2_En_5_Fig1_HTML.jpg](img/A330720_2_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1.** 新的轨道布局\n\n重启应用后，不妨体验一下新布局。这比单纯的垂直上升有趣多了。现在你需要左右飞行来收集轨道。\n\n### Sprite\
  \ Kit 动作\n\n在 Sprite Kit 中，当你想要移动、修改或对`SKNode`执行某些操作时，大多数情况下会使用`SKAction`来实现变更。苹果对`SKAction`的定义是：“动作是一个对象，用于定义你想要对场景做出的改变”。`SKActions`有许多不同的用途，但其中一些常见用法如下：\n\
  \n*   通过一系列纹理为节点制作动画\n*   使用节点的`position`属性修改其位置\n*   使用节点的`hidden`属性改变其可见性\n* \
  \  使用节点的`alpha`属性调整其透明度\n*   使用节点的`size`属性修改其大小\n*   播放简单音效\n*   为节点着色\n\n要使用`SKAction`，只需执行两个步骤：创建你想要执行的动作，然后告诉要执行该动作的节点去运行它。下面是一个示例，该示例在两秒内将一个节点移动到场景的右侧：\n\
  \n```\nvar moveRightAction = SKAction.moveToX(size.width, duration: 2.0)\nsampleNode.runAction(moveRightAction)\n\
  ```\n\n`SKActions`另一个非常酷的功能是能够将动作链接在一起。请看这个示例：\n\n```\nvar moveRightAction = SKAction.moveToX(size.width,\
  \ duration: 2.0)\nvar moveLeftAction = SKAction.moveToX(0.0, duration: 2.0)\nvar\
  \ actionSequence = SKAction.sequence([moveRightAction, moveLeftAction])\nsampleNode.runAction(actionSequence)\n\
  ```\n\n这段代码会先将节点移动到场景右侧，当该动作完成后，再将同一个节点移动到场景左侧。\n\n`SKAction`的另一个好功能是能够重复执行一个动作。请看这段代码片段：\n\
  \n```\nlet moveLeftAction = SKAction.moveTo(x: 0.0, duration: 2.0)\nlet moveRightAction\
  \ = SKAction.moveTo(x: size.width, duration: 2.0)\nlet actionSequence = SKAction.sequence([moveLeftAction,\
  \ moveRightAction])\nlet moveAction = SKAction.repeatForever(actionSequence)\nsampleNode.runAction(moveActionSequence)\n\
  ```\n\n这里你看到了之前的示例，但现在又多了一个动作`repeatForever`，它会使`moveAction`永远运行下去。仅此而已——只需一行代码就能让之前的所有动作永远运行。\n\
  \n虽然这是一组简单的`SKAction`示例，但你在游戏中利用动作的方式几乎没有限制。在接下来的章节中，我们将展示如何使用部分相同的代码，让一组节点在场景中来回移动，同时通过一系列纹理旋转节点，营造出节点旋转的视觉效果。\n\
  \n**注意：** 在继续之前，请查看用于创建`SKActions`的所有方法。注意所有这些方法都是类方法。这是创建所有`SKActions`所用的模式。目前`SKAction`类没有扩展。\n\
  \n#### 使用动作在场景中移动节点\n\n\n\n在前面的章节中，我们提到要展示如何在游戏场景中来回移动一组节点。你已经了解了如何使用`moveToX`、`sequence`和`repeatForever`动作来实现这一点。将在场景中移动的节点是一个新节点。如果你打开`sprites.atlas`文件夹，会看到几张`BlackHoleX.png`图像。选择列表中的第一张图像`BlackHole0.png`，它应该看起来像图\
  \ 5-2。  \n![A330720_2_En_5_Fig2_HTML.jpg](img/A330720_2_En_5_Fig2_HTML.jpg)  \n\
  **图 5-2.** `BlackHole`节点  \n\n该节点的作用是代表一个在场景中来回移动的黑洞。如果玩家节点与这个节点发生接触，玩家将停止响应物理世界，并缓慢坠落直至死亡。要将这个新节点添加到场景中，你需要创建一个新的`SKSpriteNode`实例，并向其传入`BlackHole0`图像。你可以在以下名为`addBlackHolesToForeground()`的方法中找到实现此功能的代码：\
  \  \n\n```\nfunc addBlackHolesToForeground() {\n    let blackHoleNode = SKSpriteNode(imageNamed:\
  \ \"BlackHole0\")\n    blackHoleNode.position = CGPoint(x: size.width - 80.0, y:\
  \ 600.0)\n    blackHoleNode.physicsBody =\n        SKPhysicsBody(circleOfRadius:\
  \ blackHoleNode.size.width / 2)\n    blackHoleNode.physicsBody?.isDynamic = false\n\
  \    blackHoleNode.name = \"BLACK_HOLE\"\n    foregroundNode.addChild(blackHoleNode)\n\
  }\n```\n\n你之前已经见过所有这些代码。它首先使用名为`BlackHole0`的图像创建了`blackHoleNode`的新实例，然后将该节点添加到场景，设置节点`physicsBody`的属性，并将节点命名为`BLACK_HOLE`。现在，请将此代码紧跟在`addOrbsToForeground()`方法之后添加。然后在调用`addOrbsToForeground()`方法之前，添加对`addBlackHolesToForeground()`方法的调用。完成这些更改后，再次运行应用程序。这次你会看到`blackHoleNode`悬浮在玩家节点的右上方，如图\
  \ 5-3 所示。  \n![A330720_2_En_5_Fig3_HTML.jpg](img/A330720_2_En_5_Fig3_HTML.jpg) \
  \ \n**图 5-3.** 添加到场景中的`BlackHole`节点  \n\n在继续对该节点执行动作之前，需要将处理`playerNode`与`blackHoleNode`之间接触的代码添加到`GameScene`类中。你之前已经见过所有这些代码，因此我们将快速过一遍，不做过多解释。首先，需要配置`blackHoleNode`的`categoryBitMask`，并修改`playerNode`的`contactBitMask`，使其包含`blackHoleNode`的`categoryBitMask`。为此，请在其他两个类别定义下方直接添加`CollisionCategoryBlackHoles`常量的定义，如下所示：\
  \  \n\n```\nlet CollisionCategoryPlayer : UInt32 = 0x1 << 1\nlet CollisionCategoryPowerUpOrbs\
  \ : UInt32 = 0x1 << 2\nlet CollisionCategoryBlackHoles : UInt32 = 0x1 << 3\n```\n\
  \n接下来，设置`blackHoleNode.physicsBody`的`categoryBitMask`和`collisionBitMask`，如以下代码片段所示。在`addBlackHolesToForeground()`方法中将`blackHoleNode`添加到前景之前，直接添加这些行：\
  \  \n\n```\nblackHoleNode.physicsBody?.categoryBitMask = CollisionCategoryBlackHoles\n\
  blackHoleNode.physicsBody?.collisionBitMask = 0\n```\n\n配置好`blackHoleNode.physicsBody`的位掩码后，需要将`CollisionCategoryBlackHoles`添加到`playerNode.physicsBody`的`contactTestBitMask`中，如下所示。找到设置`playerNode.physicsBody.contactTestBitMask`的位置，并将其修改为如下一行代码：\
  \  \n\n```\nplayerNode.physicsBody?.contactTestBitMask =\n    CollisionCategoryPowerUpOrbs\
  \ | CollisionCategoryBlackHoles\n```\n\n你还需要做一处修改：修改`didBeginContact()`方法，使其在节点与`playerNode`接触时检测`BLACK_HOLE`节点。最简单的方法是在方法当前的`if`语句中添加一个`if\
  \ else`条件。此更改如以下代码片段所示：  \n\n```\nif nodeB.name == \"POWER_UP_ORB\"  {\n    impulseCount\
  \ += 1\n    nodeB.removeFromParent()\n} else if nodeB.name == \"BLACK_HOLE\"  {\
  \            \n    playerNode.physicsBody?.contactTestBitMask = 0\n    impulseCount\
  \ = 0\n}\n```\n\n对`didBeginContact()`方法进行此更改，然后再次运行应用程序。这次进行游戏时，尝试让玩家与新黑洞发生接触。当接触发生时，你会注意到玩家停止响应点击和其他节点的接触，然后缓慢坠落，直到掉出场景底部。此时，游戏基本结束了。\
  \  \n\n好了，终于是时候使用一些`SKAction`了。如果还记得前一节的内容，使用`SKAction`涉及两个步骤。首先，创建你想要使用的动作，然后告诉要应用动作的节点来运行该动作。让我们从本章前面使用过的动作序列开始：\
  \  \n\n```\nlet moveLeftAction = SKAction.moveTo(x: 0.0, duration: 2.0)\nlet moveRightAction\
  \ = SKAction.moveTo(x: size.width, duration: 2.0)\nlet actionSequence = SKAction.sequence([moveLeftAction,\
  \ moveRightAction])\nlet moveAction = SKAction.repeatForever(actionSequence)\n```\n\
  \n查看这段代码时，你会认出它来自本章前面首次介绍`SKAction`的部分。第一行创建了一个动作，该动作会将运行它的节点移动到 x 轴上的 0.0 点；第二行将节点移回场景的最右侧。之后，这两个动作被用来创建一个动作序列，这个新动作存储在变量`actionSequence`中。最后，使用`SKAction.repeatForever()`类方法，利用`actionSequence`创建了一个重复动作。\
  \  \n\n仔细阅读这段代码后，将其复制到`addBlackHolesToForeground()`方法的顶部。让黑洞在场景中来回移动的最后一步，是告诉`blackHoleNode`实际运行该动作。你可以使用下面这行代码来实现：\
  \  \n\n```\nblackHoleNode.run(moveAction)\n```\n\n将这行代码添加到`addBlackHolesToForeground()`方法的末尾，然后再次运行应用程序。这次你会看到，只要游戏在运行，黑洞就会在场景中来回移动。\
  \  \n\n在继续之前，我们还希望对`addBlackHolesToForeground()`方法做一件事。你可能已经注意到，`addBlackHolesToForeground()`方法的名称暗示了不止一个黑洞——这是有意为之。我们认为游戏需要多个黑洞来增加游戏难度。请看这里展示的新版`addBlackHolesToForeground()`方法：\
  \  \n\n```\nfunc addBlackHolesToForeground() {\n    let moveLeftAction = SKAction.moveTo(x:\
  \ 0.0, duration: 2.0)\n    let moveRightAction = SKAction.moveTo(x: size.width,\
  \ duration: 2.0)\n    let actionSequence = SKAction.sequence([moveLeftAction, moveRightAction])\n\
  \    let moveAction = SKAction.repeatForever(actionSequence)\n    for i in 1...10\
  \ {\n        let blackHoleNode = SKSpriteNode(imageNamed: \"BlackHole0\")\n    \
  \    blackHoleNode.position = CGPoint(x: size.width - 80.0, y: 600.0 * CGFloat(i))\n\
  \        blackHoleNode.physicsBody = SKPhysicsBody(circleOfRadius: blackHoleNode.size.width\
  \ / 2)\n        blackHoleNode.physicsBody?.isDynamic = false\n        blackHoleNode.physicsBody?.categoryBitMask\
  \ = CollisionCategoryBlackHoles\n        blackHoleNode.physicsBody?.collisionBitMask\
  \ = 0\n        blackHoleNode.name = \"BLACK_HOLE\"\n        blackHoleNode.run(moveAction)\n\
  \        blackHoleNode.run(rotateAction)\n        foregroundNode.addChild(blackHoleNode)\n\
  \    }\n}\n```\n\n请注意，这段代码遍历了一个`for`循环 10 次，每在之前黑洞的上方 600 个点处添加一个黑洞。在此过程中，它告诉每个新节点运行之前创建的`moveAction`。要查看此更改的效果，请使用此代码替换当前的`addBlackHolesToForeground()`方法并运行应用程序。这次运行应用程序时，你会看到沿着场景高度方向向上分布着更多的黑洞。\n\
  \n\n\n#### 使用 SKActions 为精灵添加动画\n\n本节将向你展示如何利用 SKActions 为你刚刚添加到场景中的黑洞节点添加动画。在这个过程中，会介绍几个新的类：`SKTexture`\
  \ 和 `SKTextureAtlas`。\n\n`SKTexture` 是一个对象，它持有一张图像，用于 `SKSpriteNode`、`SKShapeNode`，或由\
  \ `SKEmitterNode` 创建的粒子。你在本书中创建 `SKSpriteNode` 时一直在使用 `SKTexture`。用来创建 `SKSpriteNode`\
  \ 的每个图像，在内部都表示为一个 `SKTexture`。\n\n`SKTextureAtlas` 是从存储在应用程序资源包中的纹理图集创建的一组 `SKTexture`\
  \ 对象的集合。回到你在 Xcode 中的项目，打开名为 `sprites.atlas` 的文件夹。你会看到本游戏中使用的所有图像（背景图像除外）。如果你想将这个图集文件夹中的所有图像加载到一个\
  \ `SKTextureAtlas` 中，你可以执行以下代码：\n\n```\nlet textureAtlas = SKTextureAtlas(named:\
  \ \"sprites.atlas\")\n```\n\n这一行代码会读取 `sprites.atlas` 文件夹中的所有单个文件，并将它们添加到 `SKTextureAtlas`\
  \ 中，每个文件作为一个 `SKTexture`，可以通过原始文件名进行查找。将这行代码添加到 `addBlackHolesToForeground()` 方法的顶部，然后我们继续。\n\
  \n要检索一个 `SKTexture`，你可以使用 `SKTextureAtlas.textureNamed()` 方法，并传入你想要检索的纹理名称。下面是一个示例，它从\
  \ `textureAtlas` 中检索第一个黑洞纹理：\n\n```\nlet frame0 = textureAtlas.textureNamed(\"BlackHole0\"\
  )\n```\n\n这行代码检索由名称 `BlackHole0` 表示的 `SKTexture`，并将其存储在常量 `frame0` 中。要使用所有黑洞图像创建一个动画，你需要从\
  \ `textureAtlas` 中逐一检索它们，并将它们添加到一个数组中，该数组表示每个纹理在动画中显示的顺序。这段代码如以下片段所示：\n\n```\nlet\
  \ frame0 = textureAtlas.textureNamed(\"BlackHole0\")\nlet frame1 = textureAtlas.textureNamed(\"\
  BlackHole1\")\nlet frame2 = textureAtlas.textureNamed(\"BlackHole2\")\nlet frame3\
  \ = textureAtlas.textureNamed(\"BlackHole3\")\nlet frame4 = textureAtlas.textureNamed(\"\
  BlackHole4\")\nlet blackHoleTextures = [frame0, frame1, frame2, frame3, frame4]\n\
  ```\n\n检查完这段代码后，将它添加到 `addBlackHolesToForeground()` 方法的顶部，紧跟在创建 `textureAtlas` 的代码之后。\n\
  \n现在，实现黑洞动画所需做的就是使用 `SKAction.animate()` 方法创建一个新的动作，传入纹理数组以及每帧显示的时间（以秒为单位）。看一下以下几行代码：\n\
  \n```\nlet animateAction = SKAction.animate(with: blackHoleTextures, timePerFrame:\
  \ 0.2)\nlet rotateAction = SKAction.repeatForever(animateAction)\n```\n\n第一行创建了一个动作，它将每\
  \ 0.2 秒显示 `textureAtlas` 数组中的每个纹理。要让黑洞节点永远动画下去，第二行创建了另一个动作，它将永久执行该动画动作。\n\n要查看你的新动画效果，将所有这段代码复制到\
  \ `addBlackHolesToForeground()` 方法的顶部，紧跟在 `blackHoleTextures` 数组之后，然后在将每个 `blackHoleNode`\
  \ 添加到场景之前，添加下面这行代码来运行动作：\n\n```\nblackHoleNode.runAction(rotateAction)\n```\n\n\
  当你对 `addBlackHolesToForeground()` 方法进行了所有这些更改后，新方法将如下所示：\n\n```\nfunc addBlackHolesToForeground()\
  \ {\n    let textureAtlas = SKTextureAtlas(named: \"sprites.atlas\")\n    let frame0\
  \ = textureAtlas.textureNamed(\"BlackHole0\")\n    let frame1 = textureAtlas.textureNamed(\"\
  BlackHole1\")\n    let frame2 = textureAtlas.textureNamed(\"BlackHole2\")\n    let\
  \ frame3 = textureAtlas.textureNamed(\"BlackHole3\")\n    let frame4 = textureAtlas.textureNamed(\"\
  BlackHole4\")\n    let blackHoleTextures = [frame0, frame1, frame2, frame3, frame4]\n\
  \    let animateAction = SKAction.animate(with: blackHoleTextures, timePerFrame:\
  \ 0.2)\n    let rotateAction = SKAction.repeatForever(animateAction)\n    let moveLeftAction\
  \ = SKAction.moveTo(x: 0.0, duration: 2.0)\n    let moveRightAction = SKAction.moveTo(x:\
  \ size.width, duration: 2.0)\n    let actionSequence = SKAction.sequence([moveLeftAction,\
  \ moveRightAction])\n    let moveAction = SKAction.repeatForever(actionSequence)\n\
  \    for i in 1...10 {\n        let blackHoleNode = SKSpriteNode(imageNamed: \"\
  BlackHole0\")\n        blackHoleNode.position = CGPoint(x: size.width - 80.0, y:\
  \ 600.0 * CGFloat(i))\n        blackHoleNode.physicsBody = SKPhysicsBody(circleOfRadius:\
  \ blackHoleNode.size.width / 2)\n        blackHoleNode.physicsBody?.isDynamic =\
  \ false\n        blackHoleNode.physicsBody?.categoryBitMask = CollisionCategoryBlackHoles\n\
  \        blackHoleNode.physicsBody?.collisionBitMask = 0\n        blackHoleNode.name\
  \ = \"BLACK_HOLE\"\n        blackHoleNode.run(moveAction)\n        blackHoleNode.run(rotateAction)\n\
  \        foregroundNode.addChild(blackHoleNode)\n    }\n}\n```\n\n完成所有这些更改后，保存你的工作并再次运行应用程序。这一次你会看到，当黑洞在场景中来回移动时，它们也会随着\
  \ `blackHoleTextures` 数组中的每个纹理进行动画而旋转。\n\n### 为 GameScene 添加一些额外的闪光点\n\n\n\n现在，你已经将所有能量球整齐地布置好，黑洞也在游戏场景中来回穿梭，是时候再添加一些炫酷效果，让游戏场景看起来更棒了。具体来说，我们将演示如何为场景添加更多星星、一个行星表面，以及在\
  \ `playerNode` 与黑洞接触时如何为其着色。\n\n#### 向背景添加星星\n\n首先，让我们开始向背景添加一些星星。首先，在 Xcode 中打开\
  \ `Images.xcassets` 文件夹，选择 `Stars` 图片。要将此图片添加到场景中，首先添加一个声明语句，用于保存对引用 `Stars` 图片的\
  \ `SKSpriteNode` 的引用。此声明应添加到 `GameScene` 中，紧跟在 `backgroundNode` 声明之后：\n\n```\nlet\
  \ backgroundNode = SKSpriteNode(imageNamed: \"Background\")\nlet backgroundStarsNode\
  \ = SKSpriteNode(imageNamed: \"Stars\")\n```\n\n添加声明后，将以下代码行添加到 `GameScene.init(size:\
  \ CGSize)` 方法中，紧跟在将 `backgroundNode` 添加到场景的那一行之后：\n\n```\naddChild(backgroundNode)\n\
  backgroundStarsNode.size.width = frame.size.width\nbackgroundStarsNode.anchorPoint\
  \ = CGPoint(x: 0.5, y: 0.0)\nbackgroundStarsNode.position = CGPoint(x: 160.0, y:\
  \ 0.0)\naddChild(backgroundStarsNode)\n```\n\n在运行应用并查看新星星之前，你还需要做最后一件事：让星星相对于 `playerNode`\
  \ 移动。让星星相对于玩家移动相当直接，但我们希望通过让星星的移动速度与背景略有不同来增加一些酷炫效果。我们修改了 `update()` 方法来实现这一点。请看：\n\
  \n```\noverride func update(_ currentTime: TimeInterval) {\n    if playerNode.position.y\
  \ >= 180.0 {\n        backgroundNode.position = CGPoint(x: backgroundNode.position.x,\
  \ y:\n            -((playerNode.position.y - 180.0)/8));\n                 backgroundStarsNode.position\
  \ = CGPoint(x: backgroundStarsNode.position.x, y:\n                    -((playerNode.position.y\
  \ - 180.0)/6))\n        foregroundNode.position = CGPoint (x: foregroundNode.position.x,\
  \ y:\n            -(playerNode.position.y - 180.0));\n    }\n}\n```\n\n注意修改后的 `update()`\
  \ 方法中加粗的部分。通过这两行代码，我们将星星相对于 `playerNode` 移动，但移动速度比 `backgroundNode` 稍慢。这让人产生 `backgroundStarsNode`\
  \ 更接近场景视口的错觉。对 `update()` 方法进行此更改，然后再次运行应用。首次启动游戏时，你将看到如图 5-4 所示的场景。\n\n![A330720_2_En_5_Fig4_HTML.jpg](img/A330720_2_En_5_Fig4_HTML.jpg)\n\
  \n**图 5-4.** 向场景添加的一层星星\n\n继续开始玩游戏。当你越升越高时，你会注意到星星的移动速度比背景稍快。这种效果称为视差效果。\n\n####\
  \ 添加行星表面\n\n接下来要做的是添加一种感知效果，让 `playerNode` 看起来是从一个行星表面开始起飞的。回到 Xcode，再次打开 `Images.xcassets`\
  \ 文件夹，找到 `PlanetStart` 图片。这张图片将作为行星表面。将此新图片添加到场景中并不复杂，你之前已经见识过。与向场景添加星星的唯一区别在于，你将让行星与背景节点以相同速度移动。这将使行星表面随着玩家在场景中越升越高而逐渐远离。\n\
  \n让我们开始这样做。首先，在 `backgroundStarsNode` 声明之后直接添加一个新的 `SKSpriteNode` 声明：\n\n```\nlet\
  \ backgroundStarsNode = SKSpriteNode(imageNamed: \"Stars\")\nlet backgroundPlanetNode\
  \ = SKSpriteNode(imageNamed: \"PlanetStart\")\n```\n\n接下来，插入将 `backgroundPlanetNode`\
  \ 添加到场景的代码。这段代码应紧跟在添加 `backgroundStarsNode` 之后，如下所示：\n\n```\naddChild(backgroundStarsNode)\n\
  backgroundPlanetNode.size.width = frame.size.width\nbackgroundPlanetNode.anchorPoint\
  \ = CGPoint(x: 0.5, y: 0.0)\nbackgroundPlanetNode.position = CGPoint(x: size.width\
  \ / 2.0, y: 0.0)\naddChild(backgroundPlanetNode)\n```\n\n现在，找到设置 `playerNode` 位置的那行代码（在\
  \ `init(size: CGSize)` 方法中），并将其位置修改为以下内容：\n\n```\nplayerNode.position = CGPoint(x:\
  \ size.width / 2.0, y: 220.0)\n```\n\n最后，修改 `update` 方法，让 `backgroundPlanetNode`\
  \ 与 `backgroundNode` 以相同速度移动：\n\n```\noverride func update(_ currentTime: TimeInterval)\
  \ {\n    if playerNode.position.y >= 180.0 {\n        backgroundNode.position =\
  \ CGPoint(x: backgroundNode.position.x, y: -((playerNode.position.y - 180.0)/8));\n\
  \        backgroundStarsNode.position = CGPoint(x: backgroundStarsNode.position.x,\
  \ y: -((playerNode.position.y - 180.0)/6));\n        backgroundPlanetNode.position\
  \ = CGPoint(x: backgroundPlanetNode.position.x, y: -((playerNode.position.y - 180.0)/8));\n\
  \        foregroundNode.position = CGPoint(x: foregroundNode.position.x, y: -(playerNode.position.y\
  \ - 180.0));\n    }\n}\n```\n\n完成所有这些修改后，再次运行应用并欣赏你的杰作。现在你应该看到场景底部有一个行星，`playerNode`\
  \ 站在其顶端。轻触屏幕几次。行星和背景将一起移动，给人以 `playerNode` 正飞离行星表面进入太空的印象。图 5-5 显示了新场景。\n\n![A330720_2_En_5_Fig5_HTML.jpg](img/A330720_2_En_5_Fig5_HTML.jpg)\n\
  \n**图 5-5.** 向场景添加的行星表面\n\n#### 添加视觉死亡指示器\n\n我们还有最后一项更改要做。如果你最近让玩家撞上过黑洞，你就会知道这有点虎头蛇尾。我们想添加一个视觉指示器来显示玩家已死亡。一个简单的方法是使用着色动作。着色动作会在一段指定的时间内将第二种颜色混合到\
  \ `SKNode` 中。以下是创建 `colorizeAction` 的示例：\n\n```\nSKAction.colorize(with: UIColor.red(),\
  \ colorBlendFactor: 0.5, duration: 1)\n```\n\n当在 `SKNode` 上运行此动作时，它会在 1 秒内以 0.5\
  \ 的混合因子混合红色。这类似于我们希望在 `playerNode` 与黑洞接触时对其应用的效果。请看修改后的 `didBeginContact` 方法的最后两行：\n\
  \n```\nextension GameScene: SKPhysicsContactDelegate {\n    func didBegin(_ contact:\
  \ SKPhysicsContact) {\n        let nodeB = contact.bodyB.node!\n        if nodeB.name\
  \ == \"POWER_UP_ORB\"  {\n            impulseCount += 1\n            nodeB.removeFromParent()\n\
  \        }\n        else if nodeB.name == \"BLACK_HOLE\"  {\n            playerNode.physicsBody?.contactTestBitMask\
  \ = 0\n            impulseCount = 0\n            let colorizeAction = SKAction.colorize(with:\
  \ UIColor.red, colorBlendFactor: 1.0, duration: 1)\n            playerNode.run(colorizeAction)\n\
  \        }\n    }\n}\n```\n\n这两行代码创建了一个着色动作，每当玩家撞上黑洞时，它会在 1 秒内将红色完全混合到 `playerNode`\
  \ 上。进行这些更改，然后再次运行应用。这次运行时，务必让玩家撞上黑洞。注意观察，当玩家撞上时，他会慢慢变红并坠落到行星表面——效果要好得多。\n\n\n\n\
  ### 小结\n\n在本章中，你为了增强可玩性，最后一次重构了轨道节点的布局。之后，你学习了如何使用 `SKActions` 让一个 `SKSpriteNode`\
  \ 在场景中来回移动，并让同一个节点永久旋转。在本章最后，你了解了如何通过颜色化动作（colorize action）为 `SKSpriteNode` 添加着色效果。下一章，我们将重点介绍如何在\
  \ Sprite Kit 游戏中使用粒子发射器并发挥其作用。接着，我们会展示如何利用它们，在每次向 `physicsBody` 施加冲量时，为 `playerNode`\
  \ 添加引擎尾焰效果。\n\n"
- "# 6. 使用发射器节点为游戏添加粒子效果\n\n在本章中，我们将展示如何定义粒子发射器以及如何在 SpriteKit 游戏中利用它们。接着，我们会展示如何利用它们，在每次向\
  \ `physicsBody` 施加冲量时，为 `playerNode` 添加引擎尾焰效果。\n\n**注意：** 我们仅介绍在 SuperSpaceMan 游戏中会用到的属性。如果你想查看完整的属性列表，请查阅\
  \ Apple 开发者文档：[`developer.apple.com/library/ios/documentation/SpriteKit/Reference/SKEmitterNode_Ref/index.html`](https://developer.apple.com/library/ios/documentation/SpriteKit/Reference/SKEmitterNode_Ref/index.html)\
  \ 和 [`developer.apple.com/library/ios/documentation/IDEs/Conceptual/xcode_guide-particle_emitter/Introduction/Introduction.html`](https://developer.apple.com/library/ios/documentation/IDEs/Conceptual/xcode_guide-particle_emitter/Introduction/Introduction.html)。\n\
  \n粒子发射器是 SpriteKit 提供的一项非常酷且易于使用的功能。你可以用它们创建特效，模拟从火焰到雨水的各种效果。SpriteKit 通过 `SKEmitterNode`\
  \ 类实现这些效果。`SKEmitterNode` 对象是一个节点，用于创建和渲染微小的粒子精灵。这些精灵归 SpriteKit 所有，你的游戏无法直接访问。你无法单独修改每个精灵，但可以修改\
  \ `SKEmitterNode` 实例的属性。你可以手动创建粒子发射器，但使用 Xcode 内置的粒子发射器编辑器（Particle Emitter Editor）来创建要容易得多。粒子发射器编辑器是\
  \ Xcode 内置的一个图形化编辑器，提供了一个可视化环境，让你可以设计自定义粒子效果。图 6-1 展示了 Xcode 的粒子发射器编辑器。\n\n![A330720_2_En_6_Fig1_HTML.jpg](img/A330720_2_En_6_Fig1_HTML.jpg)\n\
  *图 6-1. Xcode 的粒子发射器编辑器*\n\n### 使用粒子发射器模板\n\n除了能够创建自定义效果之外，粒子发射器编辑器还提供了一系列预先构建的粒子模板。这些模板为你创建自己的自定义效果提供了绝佳的起点。表\
  \ 6-1 描述了每个模板。\n\n**表 6-1.** Xcode 预置的粒子发射器模板\n\n| 模板名称 | 用途 |\n| --- | --- |\n\
  | Bokeh（散景） | 此模板创建一个六边形粒子集合，粒子会生长、模糊，并在其生命周期结束时淡出。 |\n| Fire（火焰） | 此模板创建一个火焰效果，可用作火炬，或者，或许可以作为太空人的尾焰。\
  \ |\n| Fireflies（萤火虫） | 萤火虫模板创建一个黄色粒子集合，这些粒子在生长、模糊的同时会随机移动一小段距离，并在生命周期结束时淡出。 |\n\
  | Magic（魔法） | 魔法模板创建一个绿色（默认情况下）粒子集合，这些粒子在生长、模糊直至生命周期结束淡出之前，也会随机移动一小段距离。 |\n| Rain（雨）\
  \ | 雨模板的功能正如你所料：它创建一个粒子集合，从发射器顶部开始，向屏幕底部移动，旨在模拟一场暴风雨。 |\n| Smoke（烟雾） | 烟雾模板会创建多个大型黑色粒子，从发射器底部开始，向屏幕顶部移动。每个粒子在向屏幕顶部移动时，会慢慢淡出。\
  \ |\n| Snow（雪） | 雪模板创建白色、漫射、圆形的粒子，从发射器顶部开始，像雨粒子一样向屏幕底部移动。 |\n| Spark（火花） | 火花模板创建短暂存在的金色粒子，它们会向四面八方（360\
  \ 度）从发射器中爆射出来，然后逐渐消失。 |\n\n### 创建粒子发射器\n\n让我们开始尝试使用这些粒子发射器。在 Xcode 中，使用 Game 模板创建一个新的\
  \ iOS 项目。随意命名，并将项目保存到任意位置。这个项目将是一个“一次性”项目，仅用作你进行发射器实验的游乐场。项目创建完成后，点击 **File** >\
  \ **New**，然后从 iOS > Resource 类别中选择 **SpriteKit Particle File** 模板，如图 6-2 所示。\n\n\
  ![A330720_2_En_6_Fig2_HTML.jpg](img/A330720_2_En_6_Fig2_HTML.jpg)\n*图 6-2. 选择模板对话框*\n\
  \n现在点击 **Next** 按钮，并选择 **Spark** 粒子模板，如图 6-3 所示。\n\n![A330720_2_En_6_Fig3_HTML.jpg](img/A330720_2_En_6_Fig3_HTML.jpg)\n\
  *图 6-3. 选择文件选项对话框*\n\n确保选择了正确的粒子模板后，再次点击 **Next**，并将文件命名为 `MySparkParticle`。接着，选择\
  \ `MySparkParticle.sks` 文件。这次你将看到类似于图 6-4 的图像。\n\n![A330720_2_En_6_Fig4_HTML.jpg](img/A330720_2_En_6_Fig4_HTML.jpg)\n\
  *图 6-4. 生成的火花粒子发射器*\n\n你在这里看到的是白点图像（`spark.png`）的众多版本集合，每个版本代表该粒子发射器生成的单个粒子。每个粒子看起来与\
  \ `spark.png` 文件差异如此之大的原因是，发射器根据其属性设置修改了每个粒子图像。\n\n### 粒子发射器属性\n\n要查看这些属性是如何设置的，在选中\
  \ `MySparkParticle.sks` 文件的情况下，打开 Xcode 右侧的实用工具面板（Utilities pane），然后点击 **Show the\
  \ SKNode inspector** 按钮。这将显示当前粒子发射器的每个属性。你可以在图 6-5 中看到这些属性。\n\n![A330720_2_En_6_Fig5_HTML.jpg](img/A330720_2_En_6_Fig5_HTML.jpg)\n\
  *图 6-5. SpriteKit 粒子发射器属性*\n\n粒子发射器编辑器中的每个属性都会改变每个粒子的发射方式。一旦你修改了感兴趣的每个发射器属性，Xcode\
  \ 就会将发射器属性保存到一个扩展名为 `.sks` 的 SpriteKit 粒子文件中。生成的文件包含一个归档的 `SKEmitterNode` 对象，该对象被配置为运行在编辑器中设计的粒子效果。当你想在游戏中使用该粒子发射器时，首先从\
  \ `mainBundle` 中获取 `.sks` 文件的路径；然后使用这个路径来解档 `SKEmitterNode` 对象，并将该节点添加到场景或其他 `SKNode`\
  \ 中：\n\n```swift\nlet pathToEmitter = \n    Bundle.main.path(forResource: \"MySparkParticle\"\
  , ofType: \"sks\")\nlet emitter = \n    NSKeyedUnarchiver.unarchiveObject(withFile:\
  \ pathToEmitter!) as? SKEmitterNode\naddChild(emitter!)\n```\n\n这是创建粒子发射器并将其添加到游戏中最常见的过程。让我们来看看\
  \ SuperSpaceMan 游戏中会使用到的属性。\n\n\n\n#### 粒子生命周期属性\n\n粒子生命周期属性决定了创建粒子的数量、可创建粒子的最大数量以及每个已创建粒子的存在时间。共有四个属性控制粒子的生命周期，如图\
  \ 6-6 所示。  \n![A330720_2_En_6_Fig6_HTML.jpg](img/A330720_2_En_6_Fig6_HTML.jpg) \
  \ \n图 6-6. SpriteKit 粒子生命周期属性\n\n##### 发射器出生速率与最大粒子数属性\n\n前两个生命周期属性是发射器的 `Birthrate`（出生速率）和\
  \ `Maximum`（最大粒子数）属性。`Birthrate` 属性定义了每秒发射新粒子的速率。该值越高，生成新粒子的速度越快。`Maximum` 粒子生命周期属性决定了发射器要发射的粒子总数。值为\
  \ `0` 时，粒子会无限期发射。任何其他值都会导致发射器在达到该数值时停止发射。要查看这两个属性如何协同工作，请返回 Xcode 中的 SpriteKit 粒子发射器属性编辑器，将\
  \ `Birthrate` 属性改为 `20`，将 `Maximum` 属性改为 `0`。观察发生了什么——发射器每秒生成 `20` 个粒子。现在保持 `Birthrate`\
  \ 属性为 `20`，将 `Maximum` 属性改为 `20`，并查看发射器如何变化。这一次，发射器将在 `1` 秒内发射 `20` 个粒子，然后停止 `1`\
  \ 秒，接着再发射 `20` 个粒子。它将永远重复这个过程。当你完成对这两个属性的调试后，请将 `Birthrate` 属性改回 `2000`，并将 `Maximum`\
  \ 属性改回 `0`。\n\n#### 生命周期起始值与范围属性\n\n接下来的两个粒子生命周期属性是 `Start`（起始值）和 `Range`（范围）属性。这些属性控制已发射粒子的存在时间。`Start`\
  \ 属性控制粒子可见的平均时长（以秒为单位）。时间一到，粒子就会逐渐消失。`Range` 属性提供了一种改变粒子在屏幕上存在时间的方法。当你将此属性设置为除 `0`\
  \ 以外的任何数字时，系统会生成一个介于 `0` 和输入数字之间的随机数。然后，该数字的一半会随机地加到 `Start` 值上或从其中减去，从而得出粒子的最终存在时间。如果你输入\
  \ `0`，那么所有粒子的可见时间都将相同。\n\n#### 粒子运动属性\n\n有五组属性会影响所发射粒子的运动，如图 6-7 所示，并在以下章节中说明。 \
  \ \n![A330720_2_En_6_Fig7_HTML.jpg](img/A330720_2_En_6_Fig7_HTML.jpg)  \n图 6-7.\
  \ SpriteKit 粒子运动属性\n\n##### 位置范围属性\n\n`Position Range`（位置范围）属性定义了创建发射粒子的区域。粒子是在由\
  \ `Position Range` 属性的 X 和 Y 值定义的矩形内创建的。要了解其工作原理，请返回 `MySparkParticle.sks` 文件，将\
  \ `Position Range` 属性的 X 值改为 `300`，Y 值改为 `300`，并观察这对粒子发射的影响。你现在会看到粒子在一个 `300×300`\
  \ 的方框内发射。请自行调试这些属性，直到熟悉它们的工作方式为止。\n\n##### Z 位置属性\n\n`Z-position`（Z 位置）属性控制粒子沿 z\
  \ 轴的平均起始深度。你可以将这个属性理解为控制粒子放置位置离视口的远近。\n\n##### 角度属性\n\n下一个粒子运动属性是 `Angle`（角度）属性。`Angle`\
  \ 属性定义了粒子从创建点以逆时针方向运动的角度。有两个 `Angle` 值：`Start`（起始值）和 `Range`（范围值）。`Start` 值定义了粒子发射的方向（以度为单位），而\
  \ `Range` 值定义了粒子初始角度的变化范围（数值的正负一半）。这听起来很复杂，所以让我们实际调试这些值，看看会发生什么。如果你查看火花发射器 `Angle`\
  \ 属性的初始值，你会发现它大约是 `90` 度，而 `Range` 属性大约设置为 `360` 度。要了解这些值如何影响粒子发射，最简单的方法是同时设置 `Start`\
  \ 和 `Range` 值。目前，`Range` 设置为 `360` 度，这意味着粒子发射范围是一个完整的圆。将 `Range` 值减小到 `90` 度，将 `Start`\
  \ 值设置为 `0` 度，看看会发生什么。你将看到粒子开始向屏幕右侧发射，并大致分散到初始发射点上下 `45` 度范围内。现在将 `Start` 值增加到 `90`\
  \ 度。注意粒子现在是如何开始垂直向上发射的。再将 `Start` 值增加 `90` 度，使其成为 `180` 度。这次粒子向屏幕左侧发射。调试这些值之后，你会发现\
  \ `Start` 值从 `0` 度开始，围绕发射点中心逆时针旋转到 `360` 度，并从 `Start` 值开始，以 `Range` 值的一半向外扩散。\n\n\
  ##### 速度属性\n\n`Speed`（速度）属性相当直接。它定义了粒子在创建时的初始运动速度。你可以使用 `Start` 值指定初始速度，然后可以使用 `Range`\
  \ 值来调整粒子的初始速度（数值的正负一半）。将 `Range` 值设置为 `0` 意味着所有粒子以相同速度运动。\n\n##### 加速度属性\n\n最后一个粒子运动属性是\
  \ `Acceleration`（加速度）属性。`Acceleration` 属性控制粒子在发射后沿 X 和 Y 方向加速或减速的程度。你使用 X 值来沿 x\
  \ 轴施加加速度，使用 Y 值来沿 y 轴施加加速度。通常使用 `Acceleration` 属性来模拟重力效果。要了解其工作原理，最简单的方法是将所有发射器属性更改为与图\
  \ 6-8 中的值相匹配。  \n![A330720_2_En_6_Fig8_HTML.jpg](img/A330720_2_En_6_Fig8_HTML.jpg)\
  \  \n图 6-8. 修改后的粒子发射器属性  \n如果图中未显示某个属性，则无需更改。完成这些更改后，你将看到一个粒子沿 y 轴垂直向上运动。粒子垂直向上的原因是所有加速度都沿\
  \ y 轴方向。将 `Acceleration` 属性的 X 值改为 `500`，看看会发生什么。粒子现在会沿 y 轴向上移动，同时沿 x 轴向右移动。接下来，将\
  \ `Acceleration` 属性的 X 值改为 `–500`。你将看到粒子再次沿 y 轴向上移动，但这次它沿 x 轴向左移动。这是因为你应用了负的 X 方向加速度。\n\
  \n### 为玩家添加尾迹\n\n现在是时候将这一新知识付诸实践了。让我们使用粒子发射器为 `playerNode` 添加一个尾迹。为此，你需要切换回 `SuperSpaceMan`\
  \ 项目，并向项目添加一个新的粒子发射器。你之前已经看到过这个过程，但这里给出简化的步骤：\n\n1.  选择 **File ➤ New File** 菜单，并从\
  \ **iOS ➤ Resource** 类别中选择 **SpriteKit Particle File** 模板，以添加一个新的 SpriteKit 粒子文件。\
  \  \n2.  选择 **Fire** 作为粒子模板，并点击 **Next** 按钮。  \n3.  将粒子发射器命名为 `EngineExhaust`，然后点击\
  \ **Create** 按钮。\n\n\n\n完成以上步骤后，选择新创建的 `EngineExhaust.sks` 文件。你会看到类似图 6-9 的画面。![A330720_2_En_6_Fig9_HTML.jpg](img/A330720_2_En_6_Fig9_HTML.jpg)\
  \ 图 6-9. 默认火焰粒子发射器 效果看起来不错，但为了模拟太空人向上飞行时的尾气排放，需要将火焰的发射角度旋转 180 度。具体操作是：将`角度`属性的`起始`值改为\
  \ 270 度；为了调整火焰宽度，将`位置范围`的`X`值减小为 23。图 6-10 展示了这些改动。![A330720_2_En_6_Fig10_HTML.jpg](img/A330720_2_En_6_Fig10_HTML.jpg)\
  \ 图 6-10. 反向火焰粒子发射器的属性修改 完成这些修改后，你会看到火焰现在朝屏幕下方发射，且火焰宽度已减小。效果明显更好，但我们认为如果火焰更柔和一些，表现力会更佳。最简单的实现方法是降低粒子的`出生率`值。如图\
  \ 6-11 所示，将粒子`出生率`值减小为 100。![A330720_2_En_6_Fig11_HTML.jpg](img/A330720_2_En_6_Fig11_HTML.jpg)\
  \ 图 6-11. 减小后的粒子`出生率`值 太棒了。保存修改，让我们看看图 6-12 所示的新粒子发射器。![A330720_2_En_6_Fig12_HTML.jpg](img/A330720_2_En_6_Fig12_HTML.jpg)\
  \ 图 6-12. 最终粒子发射器 这正是我们需要的。火焰正以正确方向发射，且大小和`出生率`值非常适合附着在`playerNode`上。现在让我们开始使用这个新发射器。如果你还记得前面的内容，一旦发射器效果满意，将其添加到场景中是非常简单的。首先需要加载\
  \ `SKEmitterNode`，并使用新的 `SKS` 文件。这相当简单，只需在第一个 `GameScene.init()` 方法之前添加一个名为 `engineExhaust`\
  \ 的新 `SKEmitterNode`。声明如下：\n\n```\nvar engineExhaust: SKEmitterNode?\n```\n\n完成此修改后，将以下代码行添加到第二个\
  \ `GameScene.init()` 方法的末尾：\n\n```\nlet engineExhaustPath = Bundle.main.path(forResource:\
  \ \"EngineExhaust\", ofType: \"sks\")\nengineExhaust = NSKeyedUnarchiver.unarchiveObject(withFile:\
  \ engineExhaustPath!) as? SKEmitterNode\nengineExhaust?.position = CGPoint(x: 0.0,\
  \ y: -(playerNode.size.height / 2))\n```\n\n除了最后一行，这些代码你之前都见过。最后一行将发射器的位置设置为点 (`0.0`,\
  \ `-(self.playerNode.size.height / 2)`)。使用这个点的原因在于发射器需要添加到 `playerNode` 上，而 `playerNode`\
  \ 的锚点位于玩家中心。使用 `playerNode` 一半高度的负值将把发射器放置在 `playerNode` 的底部。 好了，目前已经加载了发射器节点，准备将其添加到\
  \ `playerNode` 中。可以通过以下两行代码实现：\n\n```\nplayerNode.addChild(engineExhaust!)\nengineExhaust?.isHidden\
  \ = true\n```\n\n查看这段修改，你会发现代码非常直接。首先将 `engineExhaust` 发射器节点添加到 `playerNode`，然后将尾气隐藏。这里隐藏尾气是因为我们希望在游戏玩家点击屏幕时，尾气发射器才可见。将这段代码添加在设置\
  \ `engineExhaust` 节点位置的代码行之后。 还有一件事需要做，即当用户点击屏幕时使 `engineExhaust` 可见。为此，在 `touchesBegan()`\
  \ 方法的第二个 `if` 语句末尾添加以下代码行，然后再次运行游戏：\n\n```\nengineExhaust?.isHidden = false\n```\n\
  \n注意，这次点击屏幕时，太空人不仅会向上飞行，而且 `playerNode` 底部还会出现一股尾气流。效果很棒，但有一个问题：即使你停止点击屏幕，尾气发射器仍然可见。发射器应该在一段时间后消失，以模拟一个短暂的爆发力，并在短时间内消散。\
  \ 使用 `NSTimer` 可以轻松解决这个问题。修复方法是修改 `touchesBegan()` 方法，在每次点击屏幕并施加冲量时启动一个计时器。修改后的\
  \ `if` 语句如下所示：\n\n```\nif impulseCount > 0 {\n    playerNode.physicsBody?.applyImpulse(CGVector(dx:\
  \ 0.0, dy: 40.0))\n    impulseCount -= 1\n    engineExhaust?.isHidden = false\n\
  \    Timer.scheduledTimer(timeInterval: 0.5,\n        target: self,\n        selector:\
  \ #selector(GameScene.hideEngineExaust(_:)),\n        userInfo: nil,\n        repeats:\
  \ false)\n}\n```\n\n查看这些修改，你会注意到在 `if` 语句末尾创建了一个新的计时器，它将在预定后 0.5 秒执行 `hideEngineExhaust()`\
  \ 方法。将要调用的 `hideEngineExhaust()` 方法如下：\n\n```\nfunc hideEngineExaust(_ timer:Timer!)\
  \ {\n    if !engineExhaust!.isHidden {\n        engineExhaust?.isHidden = true\n\
  \    }\n}\n```\n\n检查 `hideEngineExhaust()` 方法，你会发现它的功能与名称完全一致：首先检查 `engineExhaust`\
  \ 是否可见，如果可见则将其隐藏。 对 `touchesBegan()` 方法进行这些修改，并将 `hideEngineExhaust()` 方法添加到 `GameScene`\
  \ 的底部。完成这些修改后，再次运行应用。这次你会注意到，每次点击屏幕时，尾气会添加到 `playerNode` 上，并在最后一次点击后 0.5 秒从 `playerNode`\
  \ 上移除。效果明显更好了。 在结束本章之前，请确保最终的 `touchesBegan()` 方法如下所示：\n\n```\noverride func touchesBegan(_\
  \ touches: Set<UITouch>, with event: UIEvent?) {\n    if !playerNode.physicsBody!.isDynamic\
  \ {\n        playerNode.physicsBody?.isDynamic = true\n        coreMotionManager.accelerometerUpdateInterval\
  \ = 0.3\n        coreMotionManager.startAccelerometerUpdates()\n    }\n    if impulseCount\
  \ > 0 {\n        playerNode.physicsBody?.applyImpulse(CGVector(dx: 0.0, dy: 40.0))\n\
  \        impulseCount -= 1\n        engineExhaust!.isHidden = false\n    Timer.scheduledTimer(timeInterval:\
  \ 0.5,\n        target: self,\n        selector: #selector(GameScene.hideEngineExaust(_:)),\n\
  \        userInfo: nil,\n        repeats: false)\n    }\n}\n```\n\n### 总结\n\n在本章中，我们简要介绍了粒子发射器，包括快速浏览了\
  \ Xcode 的一些模板发射器。之后，我们演示了如何将粒子发射器添加到 `playerNode` 中，以便在每次对 `physicsBody` 施加冲量时模拟发动机尾气。在第\
  \ 7 章中，你将首次了解 SpriteKit 的 `SKTextNode`，届时我们将展示如何为 SuperSpaceMan 游戏添加计分功能。之后，你还将看到\
  \ `SKAction` 的另一种用途——为 SuperSpaceMan 游戏添加音效。© James Goodwill and Wesley Matlock 2017\
  \ James Goodwill and Wesley MatlockBeginning Swift Games Development for iOS10.1007/978-1-4842-2310-9_7\n\
