  \  = SCNVector3(-200, 1.5, 0)\n        tubeNode.position = position\n        //\
  \ 4 为节点赋予颜色\n        tubeNode.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n\
  \        tubeNode.geometry?.firstMaterial?.shininess = 1.0\n        tubeNode.physicsBody\
  \ = SCNPhysicsBody(type: .static, shape: nil)\n        return tubeNode\n    }\n\
  \    class func cylinderNode() -> SCNNode {\n        // 1 创建 SCNGeometry 类型\n  \
  \      let cylinder = SCNCylinder(radius: 6, height: 16)\n        // 2 使用几何体类型创建节点\n\
  \        let cylinderNode = SCNNode(geometry: cylinder)\n        cylinderNode.name\
  \ = \"cylinder\"\n        // 3 设置节点位置\n        let position = SCNVector3(300, 8,\
  \ 300)\n        cylinderNode.position = position\n        // 4 为节点赋予颜色\n       \
  \ cylinderNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green\n     \
  \   cylinderNode.geometry?.firstMaterial?.shininess = 0.5\n        cylinderNode.physicsBody\
  \ = SCNPhysicsBody(type: .static, shape: nil)\n        return cylinderNode\n   \
  \ }\n    class func torusNode() -> SCNNode {\n        // 1 创建 SCNGeometry 类型\n \
  \       let torus = SCNTorus(ringRadius: 14, pipeRadius: 4)\n        // 2 使用几何体类型创建节点\n\
  \        let torusNode = SCNNode(geometry: torus)\n        // 3 设置节点位置\n       \
  \ let position =  SCNVector3(-300, 3, -300)\n        torusNode.position = position\n\
  \        // 4 为节点赋予颜色\n        torusNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.orange\n        torusNode.geometry?.firstMaterial?.shininess = 1.0\n\
  \        torusNode.physicsBody = SCNPhysicsBody(type: .static, shape: nil)\n   \
  \     return torusNode\n    }\n}\n```\n\n**清单 14-1.** 为所有对象设置了 `SCNPhysicBody` 的\
  \ `Collectible.swift`\n\n让碰撞检测工作的下一步是创建位掩码，这些位掩码将用于确定一个对象是否以及何时触碰另一个对象。碰撞检测基于使用位掩码创建一个表格，以确定两个对象是否应发生碰撞。为此，你将创建一个名为`SharedConstants.swift`的新文件，并使用该文件创建将用于所有对象的位掩码变量。清单\
  \ 14-2 包含了需要添加到此新文件中的代码：\n\n```\nlet CollisionCategoryHero = 2\nlet CollisionCategoryCollectibleLowValue\
  \ = 4\nlet CollisionCategoryCollectibleMidValue = 6\nlet CollisionCategoryCollectibleHighValue\
  \ = 8\nlet CollisionCategoryFloor = 10\n```\n\n**清单 14-2.** 位掩码的 `SharedConstants.swift`\
  \ 内容\n\n现在你已经有了将用于位掩码的变量，需要再次更新所有节点。如前所述，这些变量将用于创建一个表格，以确定一个对象是否应与另一个对象碰撞。`SCNPhysicsBody`有几个参数需要设置，才能使碰撞检测工作。这两个参数中的第一个是类别位掩码：\n\
  \n`heroNode?.physicsBody?.categoryBitMask = CollisionCategoryHero`\n\n第二个要设置的参数是碰撞位掩码：\n\
  \n`heroNode?.physicsBody?.collisionBitMask = CollisionCategoryCollectibleLowValue\
  \ | CollisionCategoryCollectibleMidValue | CollisionCategoryCollectibleHighValue`\n\
  \n基本上，你正在做的是：这个节点是主角，它将与不同价值的可收集节点交互。清单 14-3 显示了必须在每个节点上设置的所有`categoryBitMask`和`collisionBitMask`值。请确保在`SCNPhysicsBody`被初始化并设置在节点上之后再进行此操作。同样重要的是，在将`SCNNode`的`physicsBody`添加为场景的子节点之前对其进行初始化。\n\
  \n```\n// 将以下行添加到 GameViewController 的 createMainScene() 方法中，位于 physicsBody 初始化之后：\n\
  heroNode?.physicsBody?.categoryBitMask = CollisionCategoryHero\nheroNode?.physicsBody?.collisionBitMask\
  \ = CollisionCategoryCollectibleLowValue | CollisionCategoryCollectibleMidValue\
  \ | CollisionCategoryCollectibleHighValue\n\n// 将以下行添加到 Collectible 的 pyramidNode()\
  \ 方法中，位于 physicsBody 初始化之后：\npyramidNode.physicsBody?.categoryBitMask = CollisionCategoryCollectibleLowValue\n\
  pyramidNode.physicsBody?.collisionBitMask = CollisionCategoryHero\n\n// 将以下行添加到\
  \ Collectible 的 sphereNode() 方法中，位于 physicsBody 初始化之后：\nglobeNode.physicsBody?.categoryBitMask\
  \ = CollisionCategoryCollectibleHighValue\nglobeNode.physicsBody?.collisionBitMask\
  \ = CollisionCategoryHero\n\n// 将以下行添加到 Collectible 的 boxNode() 方法中，位于 physicsBody\
  \ 初始化之后：\nboxNode.physicsBody?.categoryBitMask = CollisionCategoryCollectibleMidValue\n\
  boxNode.physicsBody?.collisionBitMask = CollisionCategoryHero\n\n// 将以下行添加到 Collectible\
  \ 的 tubeNode() 方法中，位于 physicsBody 初始化之后：\ntubeNode.physicsBody?.categoryBitMask\
  \ = CollisionCategoryCollectibleLowValue\ntubeNode.physicsBody?.collisionBitMask\
  \ = CollisionCategoryHero\n\n// 将以下行添加到 Collectible 的 cylinderNode() 方法中，位于 physicsBody\
  \ 初始化之后：\ncylinderNode.physicsBody?.categoryBitMask = CollisionCategoryCollectibleHighValue\n\
  cylinderNode.physicsBody?.collisionBitMask = CollisionCategoryHero\n\n// 将以下行添加到\
  \ Collectible 的 torusNode() 方法中，位于 physicsBody 初始化之后：\ntorusNode.physicsBody?.categoryBitMask\
  \ = CollisionCategoryCollectibleMidValue\ntorusNode.physicsBody?.collisionBitMask\
  \ = CollisionCategoryHero\n```\n\n**清单 14-3.** `SCNPhysicsBody` 的 `categoryBitMask`\
  \ 和 `collisionBitMask`\n\n现在是时候检查你的工作了。构建并运行游戏，你应该能够移动太空人——只不过这次他可以穿过场景中的节点，可以越过一些物体，并且会被墙壁挡住。虽然这很好，但你还需要一种方式让他对这些碰撞做出反应。因为你正在制作一个捉迷藏游戏，你会想知道何时找到了敌人。要找到敌人，你必须抓住或撞到他。这通过使用`SCNPhysicsContactDelegate`来实现。\n\
  \n首先要做的是告诉你的类你想要接收`SCNPhysicsContactDelegate`：\n\n`class GameViewController: UIViewController,\
  \ SCNSceneRendererDelegate, SCNPhysicsContactDelegate {`\n\n与此结合，你还需要将委托设置给一个将响应这些碰撞的类。在这种情况下，你将把`mainScene`的`contactDelegate`设置为`self`，以便`GameViewController`能够对碰撞做出反应。在`createMainScene()`中，在`return`语句之前添加这一行：\n\
  \n`mainScene?.physicsWorld.contactDelegate = self`\n\n`SCNPhysicsContactDelegate`有三个你可以使用的协议，如清单\
  \ 14-4 所示。\n\n```\nfunc physicsWorld(_ world: SCNPhysicsWorld, didBegin contact:\
  \ SCNPhysicsContact) {\n    print(\"didBeginContact\")\n}\n\nfunc physicsWorld(_\
  \ world: SCNPhysicsWorld, didEnd contact: SCNPhysicsContact) {\n    print(\"didEndContact\"\
  )\n}\n\nfunc physicsWorld(_ world: SCNPhysicsWorld, didUpdate contact: SCNPhysicsContact)\
  \ {\n    print(\"didUpdateContact\")\n}\n```\n\n**清单 14-4.** `SCNPhysicsContact`\
  \ 协议\n\n你应该将清单 14-4 添加到你的`GameViewController`中。这次当你运行游戏时，当你的太空人移动并与环境交互时，你将收到通知。不过，对于这个游戏，你只会使用`didBeginContact`协议。此时，你将检查接触对象是否包含主角节点和可收集物节点。为此，你将保持简单，并在清单\
  \ 14-5 中检查`nodeB`以确定发生了哪种类型的接触。\n\n```\nfunc physicsWorld(_ world: SCNPhysicsWorld,\
  \ didBegin contact: SCNPhysicsContact) {\n    switch contact.nodeB.physicsBody!.collisionBitMask\
  \ {\n    case CollisionCategorycollectibleLowValue:\n        print(\"Hit a low value\
  \ collectible.\")\n    case CollisionCategorycollectibleMidValue:\n        print(\"\
  Hit a mid value collectible.\")\n    case CollisionCategorycollectibleHighValue:\n\
  \        print(\"Hit a high value collectible.\")\n    default:\n        print(\"\
  Hit something other than a collectible.\")\n    }\n}\n```\n\n**清单 14-5.** `SCNPhysicsWorld`\
  \ 的 `didBeginContact` 协议\n\n现在你只需在碰到敌人或障碍物时打印一行信息。所以，现在运行你的游戏，让太空人在游戏场地上移动。留意控制台日志，当你碰到障碍物或敌人时，会输出相应的信息。\n\
  \n\n\n### 摘要\n\n在本章中，你做了大量工作让太空人动起来。现在，太空人能够与物体发生碰撞，而不是直接穿过它们。至此，捉迷藏游戏已接近完成。在第 15\
  \ 章中，你将使用这个碰撞协议来更新分数。即将创建的记分板将位于 SpriteKit 视图中。这样一来，你就能了解如何将 SpriteKit 视图与 SceneKit\
  \ 场景结合使用。© James Goodwill 和 Wesley Matlock 2017，James Goodwill 和 Wesley Matlock，《Beginning\
  \ Swift Games Development for iOS》10.1007/978-1-4842-2310-9_15\n\n"
- "# 15. SceneKit 与 SpriteKit 的交互\n\nJames Goodwill¹ 与 Wesley Matlock² (1) 美国科罗拉多州海兰兹牧场\
  \ (2) 美国密苏里州堪萨斯城\n\n在前面的章节中，你一直在 SceneKit 框架下工作；不过，苹果提供了一种方式，让你可以添加一个 2D 场景作为 3D\
  \ 场景的叠加层。在本章中，你将添加一个 2D 场景，用于计时器，以便追踪你和你朋友找到并捕获敌人的耗时。\n\n### SpriteKit 集成\n\nSceneKit\
  \ 提供了一个属性来添加 SpriteKit 场景：`var overlaySKScene: SKScene! { get set }`。此属性可以渲染一个 2D\
  \ 场景，并将其覆盖在 SceneKit 场景之上。为了提供更好的性能，SceneKit 和 SpriteKit 使用相同的 OpenGL 上下文和资源来渲染场景。对于这个游戏，你将在场景顶部添加一个记分板。首先，创建一个新的\
  \ Swift 文件，并将其命名为 `GameOverlay.swift`。文件创建完成后，你需要导入 SceneKit 和 SpriteKit：\n\n```\n\
  import SceneKit\nimport SpriteKit\n\nclass GameOverlay: SKScene { }\n```\n\n你的类应该类似于上面的代码片段。你的\
  \ `GameOverlay` 类是 `SKScene` 的子类，这看起来应该和前面章节类似。在这个类中，你将添加一个节点用于显示分数，另一个节点用于记录玩家的生命值。首先，你需要创建一个变量来保存\
  \ `SKLabelNode` 对象。因为你将使用 `Date` 的时间间隔，所以还需要创建一个 `NumberFormatter`：\n\n```\nvar\
  \ timerNode: SKLabelNode!\nvar scoreNode: SKLabelNode!\nvar timerFormat: NumberFormatter!\n\
  ```\n\n有了这些变量，你需要在使用它们之前进行初始化。列表 15-1 展示了重写后的 `init(size: CGSize)` 函数。\n\n```\n\
  override init(size: CGSize) {\n    super.init(size: size)\n    anchorPoint = CGPoint(x:\
  \ 0.5, y: 0.5)\n    scaleMode = .resizeFill\n    timerNode = SKLabelNode(fontNamed:\
  \ \"AvenirNext-Bold\")\n    timerNode.text = \"Time: 0.0\"\n    timerNode.fontColor\
  \ = .red\n    timerNode.horizontalAlignmentMode = .left\n    timerNode.verticalAlignmentMode\
  \ = .bottom\n    timerNode.position = CGPoint(x: -size.width/2 + 20, y: size.height/2\
  \ - 40)\n    timerNode.name = \"timer\"\n    addChild(timerNode)\n    timerFormat\
  \ = NumberFormatter()\n    timerFormat.numberStyle = .decimal\n    timerFormat.minimumFractionDigits\
  \ = 1\n    timerFormat.maximumFractionDigits = 1\n}\n```\n\n*列表 15-1. GameView.init*\n\
  \n在这个初始化函数中，你做了一些事情，在继续之前需要停下来看看。第一部分是创建 `SKLabelNode`，它将用于显示计时器的计时。你可以根据需要更改字体和颜色，使其更符合你的需求；不过，红色配铜板字体（Copperplate）在这个游戏中看起来相当不错。在\
  \ `SKLabelNode` 设置之后是 `NumberFomatter` 设置部分。`NumberFomatter` 允许你将数字表示为 `String`\
  \ 文本。你将设置一个小数位数，最多和最少都是一位。这样你就可以将计时器显示精确到十分之一秒。\n\n别忘了，你还需要重写必需的初始化器，如列表 15-2 所示。\n\
  \n```\nrequired init?(coder aDecoder: NSCoder) {\n    fatalError(\"init(coder:)\
  \ has not been implemented\")\n}\n```\n\n*列表 15-2. 必需初始化器*\n\n当游戏开始时，你需要启动计时器，以便用户知道他们多快能到达敌人身边。为此，你将创建一个用于启动计时器的函数，它会为玩家更新你的\
  \ `SKLabelNode`。列表 15-3 展示了用于此目的的 `startTimer()`。\n\n```\nfunc startTimer() {\n\
  \    let startTime = NSDate.timeIntervalSinceReferenceDate\n    let timerNode =\
  \ childNode(withName: \"timer\") as! SKLabelNode\n    let timerAction = SKAction.run({\
  \ () -> Void in\n        let now = NSDate.timeIntervalSinceReferenceDate\n     \
  \   let elapsedTime = TimeInterval( now - startTime )\n        let tempString =\
  \ String(format: \"%@\", self.timerFormat.string(from: NSNumber(value: elapsedTime))!)\n\
  \        timerNode.text = \"Time: \" + tempString\n    })\n    let startDelay =\
  \ SKAction.wait(forDuration: 0.5)\n    let timerDelay = SKAction.sequence([timerAction,\
  \ startDelay])\n    let timer = SKAction.repeatForever(timerDelay)\n    timerNode.run(timer,\
  \ withKey: \"timerAction\")\n}\n```\n\n*列表 15-3. GameOverlay.startTimer( )*\n\n\
  你需要添加到 `GameOverlay` 类的下一个函数是，当收集完所有可收集物品时停止计时器。如果你查看列表 15-4，会发现它相当简单。你将获取在 start\
  \ 函数中命名为 `timer` 的节点，然后使用一个名为 `timerAction` 的新函数停止该动作。\n\n```\nfunc stopTimer()\
  \ {\n    let timerNode = childNode(withName: \"timer\") as! SKLabelNode\n    timerNode.removeAction(forKey:\
  \ \"timerAction\")\n}\n```\n\n*列表 15-4. GameOverlay.stopTimer*\n\n至此，你的 `GameOverlay`\
  \ 类已经完成。现在你需要更新 `GameViewController` 以使用这个类，并将其放置在 3D SceneKit 场景之上。\n\n\n\n###\
  \ 将控制器连接到覆盖层\n\n现在你已经完成了 `GameOverlay` 类，是时候将其连接到 `GameViewController` 了。首先，你需要创建一个类级变量来访问\
  \ `GameOverlay` 类。这样，你就能轻松调用其方法启动计时器。你还需要创建一个布尔值来追踪游戏的启动状态：\n\n```\nvar gameOverlay:\
  \ GameOverlay!\ngameStarted = false\n```\n\n在 `GameViewController` 的 `viewDidLoad`\
  \ 函数中，将这个 `GameOverlay` 添加到 `SCNScene` 中。这样做可以让 SceneKit 框架将你的 `GameOverlay` 叠加到当前场景上：\n\
  \n```\nsceneView.overlaySKScene = GameOverlay(size: view.frame.size)\ngameOverlay\
  \ = sceneView.overlaySKScene as! GameOverlay\n```\n\n现在是运行游戏并查看覆盖层计时器出现在你一直在处理的场景顶部的好时机。运行游戏后，你将看到类似图\
  \ 15-1 的场景。\n\n![A330720_2_En_15_Fig1_HTML.jpg](img/A330720_2_En_15_Fig1_HTML.jpg)\n\
  \n**图 15-1.** 带有计时器的覆盖层场景\n\n现在你有了覆盖层，需要在玩家开始移动太空人时启动计时器。因为你将使用 `sceneView` 中的 `touchCount`\
  \ 来启动计时器，所以还需要确保玩家尚未启动游戏——否则，每次触摸都会重置计时器。在 `GameViewController` 类定义之后，你将添加另一个变量作为游戏开始时的标志，并将其初始化为\
  \ false：\n\n```\nvar gameStarted = false\n```\n\n现在，当玩家开始游戏时，你将其设置为 true，然后在游戏结束时再设置回\
  \ false。为此，你需要在 `GameViewController` 的 `didSimulatePhysicsAtTime` 函数中添加一些逻辑：\n\n\
  ```\nfunc renderer(aRenderer: SCNSceneRenderer, didSimulatePhysicsAtTime time: TimeInterval)\
  \ {\n```\n\n在这个函数中，你将在函数顶部添加清单 15-5。这段代码检查用户是否触摸了屏幕，如果是，则启动计时器并设置 `gameStarted`\
  \ 标志。稍后你将在代码中使用这个标志。\n\n```\nif touchCount > 0 && !gameStarted {\n    gameOverlay.startTimer()\n\
  \    gameStarted = true\n}\n```\n\n**清单 15-5.** 在 `didSimulatePhysicsAtTime` 协议中启动计时器\n\
  \n这次运行游戏时，你会注意到当你触摸设备时，计时器开始运行，如图 15-2 所示。\n\n![A330720_2_En_15_Fig2_HTML.jpg](img/A330720_2_En_15_Fig2_HTML.jpg)\n\
  \n**图 15-2.** 计时器运行中\n\n对于计时器，你最后需要做的是在收集完所有可收集物品时调用 `stopTimer()` 方法。最好的位置是在 `SCNPhysicsWorld`\
  \ 的 `didBeginContact` 协议中。你将在 switch 语句之后检查分数是否超过一定数量——在本例中是 50 分：\n\n```\nif gameOverlay.score\
  \ >= 50 {\n    gameOverlay.stopTimer()\n}\n```\n\n这次当你运行游戏并操控英雄收集物品时，当分数达到进入下一关所需分数时，计时器将停止，同时也会记录达到该分数所花费的时间。\n\
  \n### “游戏结束”画面\n\n现在你有了一个可运行的游戏，但如果能有一个“游戏结束”画面来显示你的时间和分数，并能够重新开始游戏，那不是很好吗？你将创建另一个视图，当英雄达到分数时更新\
  \ `sceneView.overlaySKScene`。像之前一样创建一个名为 `GameOverView.swift` 的新 Swift 文件。`GameOverView`\
  \ 看起来会似曾相识——清单 15-6 包含了你需要放入 `GameOverView` 类的代码。\n\n```\nimport SpriteKit\n\nclass\
  \ GameOverView: SKScene {\n    required init?(coder aDecoder: NSCoder) {\n     \
  \   super.init(coder: aDecoder)\n    }\n\n    init(size: CGSize, score: String)\
  \ {\n        super.init(size: size)\n        backgroundColor = .red\n\n        let\
  \ backgroundNode = SKSpriteNode(imageNamed: \"GameOverBackground\")\n        backgroundNode.anchorPoint\
  \ = CGPoint(x: 0.5, y: 0.0)\n        backgroundNode.position = CGPoint(x: 160.0,\
  \ y: 0.0)\n        addChild(backgroundNode)\n\n        let scoreTextNode = SKLabelNode(fontNamed:\
  \ \"Copperplate\")\n        scoreTextNode.text = \"SCORE :  \\(score)\"\n      \
  \  scoreTextNode.horizontalAlignmentMode = .center\n        scoreTextNode.verticalAlignmentMode\
  \ = .center\n        scoreTextNode.fontSize = 20\n        scoreTextNode.fontColor\
  \ = .white\n        scoreTextNode.position = CGPoint(x: size.width / 2.0, y: size.height\
  \ - 75.0)\n        addChild(scoreTextNode)\n\n        let tryAgainText = SKLabelNode(fontNamed:\
  \ \"Copperplate\")\n        tryAgainText.text = \"TAP ANYWHERE TO PLAY AGAIN!\"\n\
  \        tryAgainText.horizontalAlignmentMode = .center\n        tryAgainText.verticalAlignmentMode\
  \ = .center\n        tryAgainText.fontSize = 20\n        tryAgainText.fontColor\
  \ = .white\n        tryAgainText.position = CGPoint(x: size.width / 2.0, y: size.height\
  \ - 200)\n        addChild(tryAgainText)\n    }\n}\n```\n\n**清单 15-6.** `GameOverView`\n\
  \n清单 15-7 显示了更新后的 `didBeginContact` 方法。玩家与可收集物品接触，分数随之更新。接下来，如果玩家达到了该关卡的分数，计时器将停止。如果发生这种情况，你将向用户显示“游戏结束”视图。\n\
  \n```\nif gameOverlay.score >= 50 {\n    gameOverlay.stopTimer()\n    sceneView.overlaySKScene\
  \ = GameOverView(size: view.bounds.size, score: String(gameOverlay.score))\n}\n\
  ```\n\n**清单 15-7.** 分数检查与显示游戏结束场景\n\n现在当你运行游戏并遇到敌人时，玩家将看到一个“游戏结束”视图及其所用时间。还有一件事需要处理，那就是将\
  \ `sceneView.overlaySKScene` 更新回原始的计时器画面。要重新开始游戏，只需触摸屏幕任意位置即可，如图 15-3 所示。\n\n![A330720_2_En_15_Fig3_HTML.jpg](img/A330720_2_En_15_Fig3_HTML.jpg)\n\
  \n**图 15-3.** “游戏结束”画面\n\n### 总结\n\n现在你有了一个包含计时器的 SpriteKit 覆盖层场景，并且你在场景中随机放置了物体。你可以扩展这个覆盖层场景，并根据需要为游戏添加更多\
  \ SpriteKit 功能。现在你已经创建了一个使用 Apple SceneKit 库的简单游戏。你学习了什么是场景图，以及 SceneKit 如何利用这个图在设备\
  \ GPU 上显示 3D 对象。尝试在模拟器上运行这个游戏而不是在设备上运行，你会看到 GPU 对性能的提升有多大。\n\n© James Goodwill and\
  \ Wesley Matlock 2017  \nJames Goodwill and Wesley Matlock, *Beginning Swift Games\
  \ Development for iOS*  \n10.1007/978-1-4842-2310-9_16\n\n"
- "# 16. SceneKit 编辑器\n\nJames Goodwill¹ and Wesley Matlock²  \n(1) 美国科罗拉多州海兰兹牧场 \
  \ \n(2) 美国密苏里州堪萨斯城\n\n现在你已对 SceneKit 的工作原理有了基本了解，可以使用渲染循环来创建、控制和动画化 `SCNodes`。在之前的章节中，你一直使用代码来操作这些对象。在本章中，你将学习如何在\
  \ SceneKit 编辑器中完成同样的操作。\n\n\n\n### SceneKit 场景\n\n如果尚未从 Apress 网站下载源代码，本部分需要先完成下载。Xcode\
  \ 项目包含本章所需的所有图形资源。请从 [www.apress.com/97814823093](http://www.apress.com/97814823093)\
  \ 下载。打开 `Swiftystein3D` 项目（如果尚未打开）。首先要做的是从“添加新文件”的“资源”部分添加一个新的 SceneKit 文件。现在，右键单击项目以向项目中添加文件，如图\
  \ 16-1 所示。![A330720_2_En_16_Fig1_HTML.jpg](img/A330720_2_En_16_Fig1_HTML.jpg) 图\
  \ 16-1. 添加新文件 选择“新文件”后，下一个屏幕将类似于图 16-2。您可能需要向下滚动才能看到“SceneKit 场景资源”。![A330720_2_En_16_Fig2_HTML.jpg](img/A330720_2_En_16_Fig2_HTML.jpg)\
  \ 图 16-2. SceneKit 场景文件选择 选择“SceneKit 场景文件”后，您将得到这个 `Level1.scn` 文件。现在您有了一个空白的 `Level1`\
  \ 场景，可以用它来创建一个类似之前通过编程方式创建的简单场景。图 16-3 显示了我们将要讲解的整个 SceneKit 编辑器。![A330720_2_En_16_Fig3_HTML.jpg](img/A330720_2_En_16_Fig3_HTML.jpg)\
  \ 图 16-3. SceneKit 编辑器 以下是 SceneKit 编辑器的概述：\n\n1.  场景图：此部分包含场景中的每个节点/元素。在此树中，您可以控制节点的子-父关系。\n\
  2.  设计区：您可以在此区域中将物体从对象库（4）拖放进来。您将看到所有节点的可视化表示，从而可以轻松移动物体并更改其属性。\n3.  检查器/属性：当您在设计区中选择对象时，将有许多属性可供调整和控制。进行调整时，您可以立即直观地看到效果。\n\
  4.  对象库：此部分包含可以添加到场景中的所有对象。您只需拖放所需对象，然后在检查器/属性中进行调整。\n5.  动作：此部分允许您向所选节点添加动作。\n\n\
  ### 创建场景\n\n要开始创建场景，首先需要删除最初添加新文件时默认添加的摄像机。在场景图部分，只需单击摄像机并将其删除即可。\n\n#### 添加地板\n\
  \n首先从对象库中添加一个地板节点。找到地板并将其拖放到设计区。如您所知，地板节点会自动无限延伸。不过，现在地板只是一个透明对象，因此需要为其添加材质。在检查器部分，选择材质检查器。这将显示您可以调整节点材质的所有属性。我们关注的是“漫反射”属性。选择此属性，然后在选项中找到\
  \ `sceneFloor.png`。完成此步骤后，屏幕应如图 16-4 所示。![A330720_2_En_16_Fig4_HTML.jpg](img/A330720_2_En_16_Fig4_HTML.jpg)\
  \ 图 16-4. 地板节点场景\n\n#### 添加英雄角色\n\n在场景编辑器中，一个非常强大的功能是您可以简单地拖放其他场景（包括 DAE 文件）到当前关卡场景中。此功能允许您的图形设计师创建精美的对象，然后供您在游戏关卡中使用。在之前通过编程方式创建场景的章节中，我们已经使用过\
  \ `hero.dea`。这次，您需要将该文件拖放到编辑器的 `Level1` 设计区中。将新场景拖放到当前场景时，实际上是在创建对原始文件的引用。通过创建引用，如果您在多个场景（此处指关卡）中使用同一个对象，则只需更新原始文件，所有其他引用都会自动更新。例如，如果您决定更改英雄角色的纹理，只需在\
  \ `Hero.dea` 文件中进行修改，那么所有引用该文件的地方都会随之更新。图 16-5 显示了场景应有的样子。![A330720_2_En_16_Fig5_HTML.jpg](img/A330720_2_En_16_Fig5_HTML.jpg)\
  \ 图 16-5. 放置到场景中的英雄节点 如果英雄节点的放置位置与图 16-5 不完全一致，无需担心。现在您已经有了几个节点，让我们来看看可以用来操作节点的检查器属性。请确保选中了英雄引用节点。图\
  \ 16-6 显示了节点检查器，其中可调整的属性包括节点的位置、缩放和角度。如您所见，还有其他几个属性可供使用。为了简单起见，我们现在保持大部分默认设置。不过，请随意探索每个属性——这正是\
  \ SceneKit 编辑器的美妙之处。![A330720_2_En_16_Fig6_HTML.jpg](img/A330720_2_En_16_Fig6_HTML.jpg)\
  \ 图 16-6. 节点检查器\n\n#### 添加摄像机\n\n现在英雄角色已就位，您需要添加一个摄像机，以便在游戏运行时能够跟随英雄角色移动。将摄像机节点从对象库拖放到场景图中。无需担心摄像机的放置位置——您将在节点检查器中进行调整，更改位置和欧拉角，使摄像机位于英雄角色的正上方和后方。图\
  \ 16-7 显示了需要对摄像机进行的设置。![A330720_2_En_16_Fig7_HTML.jpg](img/A330720_2_En_16_Fig7_HTML.jpg)\
  \ 图 16-7. 摄像机节点检查器设置 接下来，我们将介绍图 16-8 所示的属性检查器，您可以看到 Apple 在 iOS 10 SceneKit 中引入的一些令人兴奋的新属性。![A330720_2_En_16_Fig8_HTML.jpg](img/A330720_2_En_16_Fig8_HTML.jpg)\
  \ 图 16-8. 摄像机属性检查器 我们将探讨的属性如下：\n\n*   **HDR**：现在可以为场景启用高动态范围技术。这会产生更大的光照动态范围。“平均灰度”是用于光照曲线映射的中间色调值。“白点”是用于光照曲线映射的较高色调值。\n\
  *   **自适应**：这是一个有趣的效果，控制玩家眼睛在光照从亮变暗或从暗变亮时的适应方式。可以想象成场景从一个黑暗的地牢过渡到明亮的室外。\n*   **曝光**：基本上是场景的明暗程度。\n\
  *   **辉光**：这是您在明亮区域周围看到的那种朦胧效果。\n*   **景深**：这些项目已在之前章节中出现并介绍过。\n*   **后处理**：iOS\
  \ 10 中引入的更多新属性：\n    *   **暗角**：允许您控制场景边缘的亮暗。\n    *   **色差**：为场景中节点周围添加一些颜色混合效果。\n\
  \    *   **色彩分级**：允许您增强渲染场景的整体色彩饱和度。\n*   **运动模糊**：此属性为所有运动中的对象添加模糊效果。\n\n摄像机设置完成后，图\
  \ 16-9 显示了场景现在的样子。![A330720_2_En_16_Fig9_HTML.jpg](img/A330720_2_En_16_Fig9_HTML.jpg)\
  \ 图 16-9. 当前带摄像机的场景\n\n\n\n#### 添加节点\n\n现在你可以开始添加可收集的节点，就像在前面章节中以编程方式所做的那样。在对象库中，只需拖放几种不同类型的节点。例如，拖出一个金字塔、球体、胶囊体以及任何你想要使用的其他类型。图\
  \ 16-10 展示了拖出球体节点并在检查器中手动设置位置的过程。为了精细调整节点的位置，你将需要执行这个操作。\n\n![A330720_2_En_16_Fig10_HTML.jpg](img/A330720_2_En_16_Fig10_HTML.jpg)\n\
  图 16-10. 球体节点放置\n\n你还需要在属性检查器中对每个节点进行一些尺寸调整。图 16-11 显示了我们为球体设置的参数，但请记住，每个节点将根据所选节点类型拥有各自的属性设置。\n\
  \n![A330720_2_En_16_Fig11_HTML.jpg](img/A330720_2_En_16_Fig11_HTML.jpg)\n图 16-11.\
  \ 球体属性检查器\n\n现在是一个查看几个不同节点及其属性的好时机。你已经在屏幕周围放置了一些节点，效果应如图 16-12 所示。这里我们在屏幕周围设置了三个不同的节点。别忘了在节点检查器、材质检查器和属性检查器中进行调整。\n\
  \n![A330720_2_En_16_Fig12_HTML.jpg](img/A330720_2_En_16_Fig12_HTML.jpg)\n图 16-12.\
  \ 多个节点\n\n### 总结\n\n\n\n## 第 1 章：SceneKit 编辑器简介\n\n本章仅旨在让你初步领略 `SceneKit Editor`\
