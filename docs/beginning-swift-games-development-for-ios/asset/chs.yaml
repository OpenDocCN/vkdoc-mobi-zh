- "# 7. 添加分数和音效\n\nJames Goodwill^(1 ) and Wesley Matlock² (1) 美国科罗拉多州海兰兹牧场 (2) 美国密苏里州堪萨斯城\
  \   在本章中，我们将讨论如何使用 `SKLabelNode` 为 SpriteKit 游戏添加标签。具体来说，我们将演示如何添加一个标签来跟踪 SuperSpaceMan\
  \ 剩余的可使用冲量次数，然后演示如何为游戏添加计分功能，以跟踪 SuperSpaceMan 已收集的能量球数量。在本章末尾，你将有机会重新审视 `SKAction`，届时我们将展示如何使用它们来添加简单的游戏音效。\n\
  \n\n\n### 介绍 SKLabelNodes\n\n如前所述，SpriteKit 使用名为 `SKLabelNode` 的类来实现文本标签。`SKLabelNode`\
  \ 类与你目前见到的所有节点一样，都是 `SKNode` 的子类。它是一个非常简单的类，只有两个 `init()` 方法和少量属性，全部聚焦于设置标签字体、颜色和布局。\n\
  \n使用 `SKLabelNode` 的最简单方式如下所示：\n\n```\nlet simpleLabel = SKLabelNode(fontNamed:\
  \ \"Copperplate\")\nsimpleLabel.text = \"Hello, SpriteKit!\";\nsimpleLabel.fontSize\
  \ = 40;\nsimpleLabel.position = CGPoint(x: size.width / 2.0, y: size.height / 2.0)\n\
  addChild(simpleLabel)\n```\n\n查看这段代码，可以看到它首先通过向 `init()` 方法传入你想要使用的字体名称来创建 `SKLabelNode`\
  \ 类。之后，你设置标签的 `text` 属性。接着设置 `fontSize` 和 `position` 属性。最后，将标签节点添加到场景中。\n\n让我们在示例应用中尝试一下。回到\
  \ Xcode 并创建一个使用 Swift 语言的新 Game 项目。现在，就像你在第 1 章中所做的那样，删除 `GameScene.sks` 和 `Actions.sks`\
  \ 文件。打开 `GameViewController.swift` 并将其内容替换为代码清单 7-1 中的类。\n\n```\nimport SpriteKit\n\
  \nclass GameViewController: UIViewController {\n    var scene: GameScene!\n    override\
  \ func viewDidLoad() {\n        super.viewDidLoad()\n        // 1. 配置主视图\n     \
  \   let skView = view as! SKView\n        skView.showsFPS = true\n        // 2.\
  \ 创建并配置我们的游戏场景\n        scene = GameScene(size: skView.bounds.size)\n        scene.scaleMode\
  \ = .aspectFill\n        // 3. 显示场景。\n        skView.presentScene(scene)\n    }\n\
  }\n```\n\n**代码清单 7-1.** `GameViewController.swift`：主 `UIViewController`\n\n修改完 `GameViewController`\
  \ 后，转到 `GameScene.swift` 文件，将其主体改为与代码清单 7-2 一致。\n\n```\nimport SpriteKit\n\nclass\
  \ GameScene: SKScene {\n    required init?(coder aDecoder: NSCoder) {\n        fatalError(\"\
  init(coder:) has not been implemented\")\n    }\n    override init(size: CGSize)\
  \ {\n        super.init(size: size)\n        let simpleLabel = SKLabelNode(fontNamed:\
  \ \"Copperplate\")\n        simpleLabel.text = \"Hello, SpriteKit!\"\n        simpleLabel.fontSize\
  \ = 40\n        simpleLabel.position = CGPoint(x: size.width / 2.0, y: size.height\
  \ / 2.0)\n        addChild(simpleLabel)\n    }\n}\n```\n\n**代码清单 7-2.** 新的 `GameScene`\
  \ 类\n\n请注意，此代码清单包含两个 `init()` 方法。第一个方法是必需的，并接受一个 `NSCoder`。因为我们手动管理场景，所以可以忽略这个 `init()`\
  \ 方法。第二个 `init()` 方法接受一个 `CGSize`。在该 `init()` 方法内部，先调用了 `super.init()` 方法，然后你就看到了与\
  \ `SKLabel` 相关的代码。这段代码看起来与之前添加 `SKLabelNode` 的片段完全一样。\n\n运行应用并查看结果。新的应用应如图 7-1 所示。\n\
  \n![A330720_2_En_7_Fig1_HTML.jpg](img/A330720_2_En_7_Fig1_HTML.jpg)\n\n**图 7-1.**\
  \ 一个简单的 `SKLabelNode` 示例\n\n如你所见，`SKLabelNode` 使用起来非常简单。`SKLabelNode` 的大部分属性都很直观，但有两个属性你可能没见过。这两个\
  \ `SKLabelNode` 属性是 `horizontalAlignmentMode` 和 `verticalAlignmentMode`。每个属性将在以下章节中描述。\n\
  \n### 更改标签节点的水平对齐方式\n\n`SKLabelNode` 的 `horizontalAlignmentMode` 用于设置文本相对于节点位置的水平位置。共有三个水平对齐选项，均由枚举\
  \ `SKLabelHorizontalAlignmentMode` 定义。这三个选项分别是 `SKLabelHorizontalAlignmentMode.left`、`SKLabelHorizontalAlignmentMode.center`\
  \ 和 `SKLabelHorizontalAlignmentMode.right`。\n\n要了解该属性及这些选项如何改变标签节点的布局，请在设置标签节点位置的那一行代码之后立即添加以下代码行：\n\
  \n```\nsimpleLabel.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.left\n\
  ```\n\n现在再次运行应用。这次你会看到标签向右偏移了，如图 7-2 所示。\n\n![A330720_2_En_7_Fig2_HTML.jpg](img/A330720_2_En_7_Fig2_HTML.jpg)\n\
  \n**图 7-2.** 一个简单的 `SKLabelNode` 示例，其 `horizontalAlignmentMode` 设置为 `SKLabelHorizontalAlignmentMode.right`\n\
  \n将此对齐方式设置为 `SKLabelHorizontalAlignmentMode.left` 会告诉 SpriteKit 将 `SKLabelNode`\
  \ 的左侧放置在标签节点的原点位置。`horizontalAlignmentMode` 的默认值是 `SKLabelHorizontalAlignmentMode.center`，该值将标签的中心放置在标签的\
  \ `position` 属性处。你在图 7-1 中看到了这种模式。\n\n在继续之前，再尝试一件事。将 `horizontalAlignmentMode` 属性的值从\
  \ `SKLabelHorizontalAlignmentMode.left` 更改为 `SKLabelHorizontalAlignmentMode.right`，如下所示，然后再次运行应用：\n\
  \n```\nsimpleLabel.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.right\n\
  ```\n\n这次标签的右侧被放置在 `SKLabelNode` 的 `position` 属性所在点，如图 7-3 所示。\n\n![A330720_2_En_7_Fig3_HTML.jpg](img/A330720_2_En_7_Fig3_HTML.jpg)\n\
  \n**图 7-3.** 一个简单的 `SKLabelNode` 示例，其 `horizontalAlignmentMode` 设置为 `SKLabelHorizontalAlignmentMode.left`\n\
  \n### 更改标签节点的垂直对齐方式\n\n\n\n在上一节中，你已经了解了如何通过 `SKLabelNode` 的 `horizontalAlignmentMode`\
  \ 属性来更改其水平对齐方式。本节中，你将学习如何更改 `SKLabelNode` 的垂直对齐方式。开始之前，请返回 `GameScene.swift` 文件，将其内容修改为与代码清单\
  \ 7-3 一致。\n\n```\nimport SpriteKit\nclass GameScene: SKScene {\n    required init?(coder\
  \ aDecoder: NSCoder) {\n        fatalError(\"init(coder:) has not been implemented\"\
  )\n    }\n    override init(size: CGSize) {\n        super.init(size: size)\n  \
  \      let simpleLabel = SKLabelNode(fontNamed: \"Copperplate\")\n        simpleLabel.text\
  \ = \"Hello, SpriteKit!\"\n        simpleLabel.fontSize = 40\n        simpleLabel.position\
  \ =\n            CGPoint(x: size.width / 2.0,\n                    y: frame.height\
  \ - simpleLabel.frame.height)\n        simpleLabel.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.center\n\
  \        addChild(simpleLabel)\n    }\n}\n```\n\n*代码清单 7-3. 在场景顶部包含简单标签的 GameScene\
  \ 类*\n\n请注意，此代码与上一节中使用的代码类似，不同之处在于 `SKLabelNode` 已被放置到场景顶部，并且 `horizontalAlignmentMode`\
  \ 已明确设置为 `center`。要查看效果，请再次运行应用程序。现在应如图 7-4 所示。\n\n![A330720_2_En_7_Fig4_HTML.jpg](img/A330720_2_En_7_Fig4_HTML.jpg)\n\
  \n*图 7-4. 位于场景顶部中央的简单 `SKLabelNode`*\n\n我们将标签移至场景顶部，是为了让你更直观地看到垂直对齐方式的改变如何影响节点的呈现。用于更改垂直对齐方式的\
  \ `SKLabelNode` 属性是 `verticalAlignmentMode`。此属性可设置为四个值，它们由 `SKLabelVerticalAlignmentMode`\
  \ 枚举定义。\n\n第一个选项 `SKLabelVerticalAlignmentMode.baseline` 是默认值，它会使文本的基线位于节点的原点。你已在图\
  \ 7-4 中看到该选项的示例，当时未设置 `verticalAlignmentMode`，因此默认使用了 `SKLabelVerticalAlignmentMode.baseline`\
  \ 值。\n\n第二个选项是 `SKLabelVerticalAlignmentMode` 枚举值 `SKLabelVerticalAlignmentMode.center`，用于将文本在垂直方向上居中对齐于节点的原点。要查看该值如何改变文本布局，请在\
  \ `GameScene` 的 `init()` 方法中、将 `simpleLabel` 添加到场景之前添加以下代码行：\n\n```\nsimpleLabel.verticalAlignmentMode\
  \ = SKLabelVerticalAlignmentMode.center\n```\n\n完成此更改后，再次运行应用程序。你将看到文本向下移动，使得文本的垂直中心点位于\
  \ `simpleLabel` 的原点，如图 7-5 所示。\n\n![A330720_2_En_7_Fig5_HTML.jpg](img/A330720_2_En_7_Fig5_HTML.jpg)\n\
  \n*图 7-5. 将 `verticalAlignmentMode` 设置为 `SKLabelVerticalAlignmentMode.center` 的简单\
  \ `SKLabelNode` 示例*\n\n下一个垂直对齐选项是 `SKLabelVerticalAlignmentMode.top`。此值用于将文本定位为文本顶部位于节点原点。要查看该值如何改变文本布局，请将\
  \ `simpleLabel` 的 `verticalAlignmentMode` 值设置为 `SKLabelVerticalAlignmentMode.top`，如下所示：\n\
  \n```\nsimpleLabel.verticalAlignmentMode = SKLabelVerticalAlignmentMode.top\n```\n\
  \n完成此更改后，再次运行应用程序。你将看到文本进一步向下移动，使得文本顶部位于 `simpleLabel` 的原点，如图 7-6 所示。\n\n![A330720_2_En_7_Fig6_HTML.jpg](img/A330720_2_En_7_Fig6_HTML.jpg)\n\
  \n*图 7-6. 将 `verticalAlignmentMode` 设置为 `SKLabelVerticalAlignmentMode.top` 的简单 `SKLabelNode`\
  \ 示例*\n\n最后一个垂直对齐选项是 `SKLabelVerticalAlignmentMode.bottom`。此值用于将文本定位为文本底部位于节点原点。要查看该值如何改变文本布局，请将\
  \ `simpleLabel` 的 `verticalAlignmentMode` 设置为 `SKLabelVerticalAlignmentMode.bottom`，如下所示：\n\
  \n```\nsimpleLabel.verticalAlignmentMode = SKLabelVerticalAlignmentMode.bottom\n\
  ```\n\n完成此更改后，再次运行应用程序。你将看到文本向上移动，使得文本底部位于 `simpleLabel` 的原点，如图 7-7 所示。\n\n![A330720_2_En_7_Fig7_HTML.jpg](img/A330720_2_En_7_Fig7_HTML.jpg)\n\
  \n*图 7-7. 将 `verticalAlignmentMode` 设置为 `SKLabelVerticalAlignmentMode.bottom` 的简单\
  \ `SKLabelNode` 示例*\n\n\n\n现在你已经知道如何使用 `SKLabelNode`，是时候将其付诸实践了。正如本书开头所述，本游戏的目标是在不与黑洞碰撞或耗尽冲量的情况下尽可能多地收集能量球。在本节中，你终于要为游戏添加计分功能了。具体来说，你需要在场景的右上角添加一个\
  \ `SKLabelNode`，初始文本为“SCORE : 0”。每当 `playerNode` 与能量球节点接触时，这个数值就会增加——收集的能量球越多，分数就越高。让我们回到\
  \ `SuperSpaceman` 项目来实现这一功能。\n\n要在 `GameScene` 中添加计分标签，第一步是创建一个变量来保存分数（收集的能量球数量）以及一个\
  \ `SKLabelNode` 常量来保存标签。你可以通过以下两行代码来实现：\n\n```\nvar score = 0\nlet scoreTextNode\
  \ = SKLabelNode(fontNamed: \"Copperplate\")\n```\n\n这段代码非常直接：它创建了一个名为 `score` 的整数变量并将其初始化为\
  \ `0`（这在游戏开始时是合理的），然后创建了一个字体为 `Copperplate` 的 `SKLabelNode`。我们选择 `Copperplate` 是因为我们认为它与已有的图像搭配起来效果不错，但你可以选择任何你喜欢的字体。\n\
  \n查看这段代码后，将其添加到 `GameScene` 声明部分的末尾，紧接在第一个 `init()` 方法之前：\n\n```\nvar score = 0\n\
  let scoreTextNode = SKLabelNode(fontNamed: \"Copperplate\")\n\nrequired init?(coder\
  \ aDecoder: NSCoder) {\n    super.init(coder: aDecoder)\n}\n```\n\n接下来你需要做的是设置 `SKLabelNode`\
  \ 的所有属性，并将其添加到 `GameScene` 中。这可以通过以下代码片段完成：\n\n```\nscoreTextNode.text = \"SCORE\
  \ : \\(score)\"\nscoreTextNode.fontSize = 20\nscoreTextNode.fontColor = SKColor.white\n\
  scoreTextNode.position = CGPoint(x: size.width - 10, y: size.height - 20)\nscoreTextNode.horizontalAlignmentMode\
  \ = SKLabelHorizontalAlignmentMode.right\naddChild(scoreTextNode)\n```\n\n所有这些你之前都见过，但在继续之前，我们还是回顾一下。第一行将标签的文本设置为“SCORE\
  \ :”加上变量 `score` 的当前值。第二行和第三行分别设置了字体大小和字体颜色。片段中的第四行和第五行非常重要：第四行将 `scoreTextNode`\
  \ 的位置（原点）设置为距离场景右侧边缘 10 点、距离场景顶部 20 点；第五行将节点的水平对齐方式设置为 `SKLabelHorizontalAlignmentMode.right`，这将使标签节点的右侧距离场景最右侧\
  \ 10 点。之后，`scoreTextNode` 被添加到场景中。\n\n查看这段代码后，将其添加到 `init(size: CGSize)` 方法的底部，然后我们继续。\n\
  \n在重新运行应用并开始挑战你的最高分之前，还需要完成最后一步。找到 `GameScene` 扩展中的 `didBegin(_ contact: SKPhysicsContact)`\
  \ 方法，并将处理与能量球节点接触的 `if` 语句修改为以下内容：\n\n```\nif nodeB.name == \"POWER_UP_ORB\" {\n\
  \    impulseCount += 1\n    score += 1\n    scoreTextNode.text = \"SCORE : \\(score)\"\
  \n    nodeB.removeFromParent()\n}\n```\n\n保存更改后，看一下在移除节点之前添加的两行代码。第一行将分数加 1，第二行更改\
  \ `scoreTextNode` 的文本以反映这一增量。确保你已经完成了所有这些更改，然后再次运行游戏。你现在会在场景的右上角看到计分标签，如图 7-8 所示。\n\
  \n![A330720_2_En_7_Fig8_HTML.jpg](img/A330720_2_En_7_Fig8_HTML.jpg)\n\n**图 7-8.**\
  \ 带有计分标签的 `GameScene`\n\n开始点击屏幕并尝试收集一些能量球。请注意，每当你的玩家与能量球接触时，分数就会增加。游戏终于有了计分功能。\n\
  \n### 为游戏添加冲量计数器\n\n\n\n现在你已经实现了计分功能，是时候让玩家知道他们还剩多少次冲刺次数，之后便会耗尽并开始坠落。这跟之前添加分数标签的方法很相似。最大的区别在于，你要将冲刺次数标签对齐在场景的左上角。\n\
  \n首先，你需要在`GameScene`的声明部分添加一个常量来保存冲刺次数标签。这行代码如下所示：\n\n`let impulseTextNode = SKLabelNode(fontNamed:\
  \ \"Copperplate\")`\n\n将这一行直接添加到`scoreTextNode`常量的定义之后。\n\n接下来，修改`impulseTextNode`的属性。实现此操作的代码如下所示：\n\
  \n```\nimpulseTextNode.text = \"IMPULSES : \\(impulseCount)\"\nimpulseTextNode.fontSize\
  \ = 20\nimpulseTextNode.fontColor = SKColor.white\nimpulseTextNode.position = CGPoint(x:\
  \ 10.0, y: size.height - 20)\nimpulseTextNode.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.left\n\
  addChild(impulseTextNode)\n```\n\n这些代码你之前都见过。这段代码将节点的文本设置为 \"IMPULSES :\" 加上实例变量`impulseCount`中当前存储的值。然后它将字体大小设为\
  \ 20，颜色设为白色。之后，它将标签节点的位置设置为距离场景左侧 10 点、距离场景顶部 20 点。最后一个属性更改是将`horizontalAlignmentMode`设为`SKLabelHorizontalAlignmentMode.left`，这样文本的左侧就会锚定在节点的原点。之后，`impulseTextNode`就被添加到了场景中。\n\
  \n将这段代码添加到`GameScene`的`init(size: CGSize)`方法的底部，然后保存你的工作。\n\n你还需要进行两项更改来更新显示的冲刺次数。第一项是修改`impulseTextNode`中的文本，以反映玩家每次收集能量球的情况；第二项是每次玩家使用一次冲刺时，修改`impulseTextNode`。\n\
  \n首先从增加冲刺次数开始，你需要再次修改`didBegin(_ contact: SKPhysicsContact)`方法。具体来说，你需要修改处理与能量球节点接触的`if`语句。请看下面的代码片段：\n\
  \n```\nif nodeB.name == \"POWER_UP_ORB\"  {\n    impulseCount += 1\n    impulseTextNode.text\
  \ = \"IMPULSES : \\(impulseCount)\"\n    score += 1\n    scoreTextNode.text = \"\
  SCORE : \\(score)\"\n    nodeB.removeFromParent()\n}\n```\n\n除了冲刺次数递增后的那一行之外，其他所有内容都与上一节相同。这一行将`impulseTextNode`的文本设置为\
  \ \"IMPULSES :\" 加上刚刚在上一行递增后的`impulseCount`变量的值。对`if`语句进行这些修改并保存更改。\n\n为了显示当前冲刺次数，你需要做的最后一项更改是每次玩家使用一次冲刺时修改`impulseTextNode`。为此，你需要回到`GameScene`的`touchesBegan()`方法，将向`playerNode`施加冲量的`if`语句修改为如下所示：\n\
  \n```\nif impulseCount > 0 {\n    playerNode.physicsBody?.applyImpulse(CGVector\
  \ (dx: 0.0, dy: 40.0))\n    impulseCount -= 1\n    impulseTextNode.text = \"IMPULSES\
  \ : \\(impulseCount)\"\n    engineExhaust!.isHidden = false\n    Timer.scheduledTimer(timeInterval:\
  \ 0.5, target: self,\n        selector:#selector(GameScene.hideEngineExhaust(_:))\
  \ , userInfo: nil, repeats: false)\n}\n```\n\n这个`if`语句的主体只有一处更改，那就是在`impulseCount`实例变量递减之后的那一行。在这一行中，`impulseTextNode`的`text`属性被修改，就像你之前做的那样，但这一次文本节点会被设置为\
  \ \"IMPULSES :\" 加上刚刚递减后的`impulseCount`。\n\n看完这段代码后，保存更改并再次运行游戏。现在你会看到左上角新增了冲刺次数标签，如图\
  \ 7-9 所示。\n\n![A330720_2_En_7_Fig9_HTML.jpg](img/A330720_2_En_7_Fig9_HTML.jpg)\n\
  \n**图 7-9.** 带有冲刺次数标签的 GameScene\n\n继续操作，轻点屏幕几次。注意冲刺次数标签节点如何在你每次轻点屏幕时减少，以及在你每次与能量球节点接触时增加。\n\
  \n### 为游戏添加简单音效\n\n在进入下一章之前，还有一件事需要介绍。我们相信你已经注意到，这个游戏没有声音——太无聊了。在本节中，你将重新学习`SKAction`，以便添加在每次收集到能量球节点时播放音效的功能。\n\
  \n你将用于创建播放音效动作的`SKAction`方法是`playSoundFileNamed()`方法。它的签名如下所示：\n\n```\nclass func\
  \ playSoundFileNamed(soundFile: String,\n                              waitForCompletion\
  \ wait: Bool) -> SKAction\n```\n\n这个方法接受你应用程序包中的音频文件名和一个`Bool`值，该值指示你是否希望等待音效播放完毕再执行下一行代码。传递给这个方法的文件可以是以下任意格式及更多：MP3、M4A、CAF、WAV。\n\
  \n该方法的使用示例如下两行代码所示：\n\n```\nlet playSoundAction = SKAction.playSoundFileNamed(\"\
  sound.wav\",\n                                               waitForCompletion:\
  \ false)\nrunAction(playSoundAction)\n```\n\n这两行代码会创建一个`SKAction`，它将播放`sound.wav`文件，并在音效播放完毕前继续执行后续代码。\n\
  \n让我们为 SuperSpaceMan 游戏添加一些音效。在进行下一步之前，找到你在第 1 章下载的 zip 文件。这个文件包含了你需要的所有图片，此外还有一个名为`sounds`的文件夹。在这个目录中，你会找到一个名为`orb_pop.wav`的文件。将此文件复制到你项目的\
  \ SuperSpaceMan 文件夹中。\n\n将音效文件添加到项目后，第一步是创建将播放该音效的`SKAction`。以下代码实现了这一点：\n\n```\n\
  let orbPopAction = SKAction.playSoundFileNamed(\"orb_pop.wav\",\n              \
  \                                 waitForCompletion: false)\n```\n\n这段代码创建了一个名为`orbPopAction`的常量，它持有一个`SKAction`，当该动作运行时将播放`orb_pop.wav`音效文件。将这行代码添加到`GameScene`的声明部分，紧接在第一个`init()`方法之前：\n\
  \n```\nlet orbPopAction = SKAction.playSoundFileNamed(\"orb_pop.wav\",\n       \
  \ waitForCompletion: false)\nrequired init?(coder aDecoder: NSCoder) {\n    super.init(coder:\
  \ aDecoder)\n}\n```\n\n现在你已经有了一个能播放`orb_pop.wav`文件的动作。接下来需要添加代码来播放音效。为此，你需要再次修改`didBegin(_\
  \ contact: SKPhysicsContact)`方法，添加运行新动作的代码。请看修改后的处理能量球接触的`if`语句，如下所示：\n\n```\nif\
  \ nodeB.name == \"POWER_UP_ORB\" {\n     run(orbPopAction)\n    impulseCount +=\
  \ 1\n    impulseTextNode.text = \"IMPULSES : \\(impulseCount)\"\n    score += 1\n\
  \    scoreTextNode.text = \"SCORE : \\(score)\"\n    nodeB.removeFromParent()\n\
  }\n```\n\n在这里你可以看到`if`语句的开头新增了一行，每当被接触的节点名称为`POWER_UP_ORB`时，便会运行`orbPopAction`。对`if`语句进行此更改，然后再次运行游戏。现在，每次`playerNode`与能量球节点接触时，都会播放`orb_pop.wav`音效。\n\
  \n\n\n### 总结\n\n在本章中，你学习了如何使用`SKLabelNodes`为你的 SpriteKit 游戏添加标签。具体来说，你了解了如何显示剩余脉冲次数，以及如何为游戏添加计分功能，以跟踪太空人收集的能量球数量。在本章末尾，你还有机会在游戏添加音效时重新学习了`SKActions`。在下一章中，你将有机会为游戏添加新场景，并在添加菜单功能和开始新游戏的能力时进行场景切换。\n\
  \n© James Goodwill 和 Wesley Matlock 2017 James Goodwill 和 Wesley Matlock  \n*Beginning\
  \ Swift Games Development for iOS*  \n10.1007/978-1-4842-2310-9_8\n\n"
- "# 8. 场景之间的切换\n\nJames Goodwill¹ 和 Wesley Matlock²  \n(1) 美国科罗拉多州海兰兹牧场  \n(2) 美国密苏里州堪萨斯城\
  \  \n\n在本章中，你将学习如何使用 SpriteKit 的 `SKTransition` 类来实现场景切换。你将了解 SpriteKit 为你提供的几种不同类型的内置切换。你还将看到如何在切换过程中控制每个场景。在本章末尾，你将运用新学到的知识，为你的\
  \ SuperSpaceMan 游戏添加一个菜单场景。如你所知，`SKScenes` 是用于向用户呈现游戏内容的组件，一个设计良好的游戏会将相关内容分组到各个场景中。例如，你可以使用不同的场景来呈现游戏的不同关卡，或者使用一个场景向玩家展示选项菜单。为了在场景之间提供平滑的切换，SpriteKit\
  \ 提供了 `SKTransition` 类。使用 `SKTransitions` 需要三个步骤：\n\n1. 创建你想要切换到的 `SKScene`。\n2.\
  \ 使用一个类级别的 `SKTransition` 方法来创建你想要的切换效果。\n3. 使用 `SKView` 的 `presentScene()` 方法来呈现新场景。\n\
  \n你可以使用 `SKTransition` 的 `init()` 方法创建自定义切换，但更常见的是使用 13 种内置的类级别 `SKTransition` 方法之一：\n\
  \n```\nclass func crossFade(withDuration: TimeInterval)\nclass func doorsCloseHorizontal(withDuration:\
  \ TimeInterval)\nclass func doorsCloseVertical(withDuration: TimeInterval)\nclass\
  \ func doorsOpenHorizontal(withDuration: TimeInterval)\nclass func doorsOpenVertical(withDuration:\
  \ TimeInterval)\nclass func doorway(withDuration: TimeInterval)\nclass func fade(with:\
  \ UIColor, duration: TimeInterval)\nclass func fade(withDuration: TimeInterval)\n\
  class func flipHorizontal(withDuration: TimeInterval)\nclass func flipVertical(withDuration:\
  \ TimeInterval)\nclass func moveIn(with: SKTransitionDirection, duration: TimeInterval)\n\
  class func push(with: SKTransitionDirection, duration: TimeInterval)\nclass func\
  \ reveal(with: SKTransitionDirection, duration: TimeInterval)\n```\n\n如你所见，SpriteKit\
  \ 提供了一套相当完整的内置切换效果。以下代码片段展示了这些切换的一个使用示例：\n\n```\nlet transition = SKTransition.fade(withDuration:\
  \ 2.0)\nlet sceneTwo = SceneTwo(size: size)\nview?.presentScene(sceneTwo, transition:\
  \ transition)\n```\n\n看看这段代码。片段的第一行创建了一个切换，它会淡出为黑色，然后在两秒内淡入到新场景。第二行创建了你要切换到的场景，最后一行则实际使用该切换呈现了场景。\n\
  \n### 在切换期间暂停场景\n\n在场景之间进行切换时，你需要注意两个重要的 `SKTransition` 属性：`pausesIncomingScene`\
  \ 和 `pausesOutgoingScene`。这些属性是 `Bool` 类型，分别用于暂停进入场景和离开场景的动画。如果你希望场景的动画在切换期间继续运行，只需在呈现场景前将相应的属性设置为\
  \ `false`。这两个属性的默认值都是 `true`。\n\n### 检测新场景何时被呈现\n\nSpriteKit 在 `SKScene` 类中提供了两个你可以重写的方法，用于检测场景何时被切换离开或切换进入。第一个方法是\
  \ `SKScene` 的 `willMove()` 方法。当一个 `SKScene` 即将从视图中被移除时，会调用此方法。要重写此方法，请在你的 `SKScene`\
  \ 实现中添加以下代码：\n\n```\noverride func willMove(from: SKView) {\n    // 插入代码\n}\n```\n\
  \n第二个方法是 `SKScene` 的 `didMove()` 方法。当一个场景刚刚被视图呈现完成时，会调用此方法。要重写此方法，请在你的 `SKScene`\
  \ 实现中添加以下代码：\n\n```\noverride func didMove(to: SKView) {\n    // 插入代码\n}\n```\n\n\
  ### 为 SuperSpaceMan 添加新场景\n\n在本节中，你将运用新学到的场景切换知识，为 SuperSpaceMan 游戏添加一个新场景。此场景的目的是让用户看到最近一局的得分，并让他们能够开始新游戏。在进行任何操作之前，我们先添加一条简单的消息，告诉游戏玩家点击屏幕开始游戏。如你所知，游戏在点击屏幕时已经开始。这个标签只是为了开始整理用户界面而添加的便利功能。\n\
  \n要添加此标签，请转到 `GameScene` 的声明部分，并在第一个 `init()` 方法之前直接添加下面一行代码：\n\n```\nlet startGameTextNode\
  \ = SKLabelNode(fontNamed: \"Copperplate\")\n```\n\n添加完这一行后，转到 `GameScene` 的 `init(size:\
  \ CGSize)` 方法的末尾，并将以下代码块添加到此方法的底部：\n\n```\nstartGameTextNode.text = \"TAP ANYWHERE\
  \ TO START!\"\nstartGameTextNode.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.center\n\
  startGameTextNode.verticalAlignmentMode = SKLabelVerticalAlignmentMode.center\n\
  startGameTextNode.fontSize = 20\nstartGameTextNode.fontColor = SKColor.white\nstartGameTextNode.position\
  \ =\n    CGPoint(x: scene!.size.width / 2, y: scene!.size.height / 2)\naddChild(startGameTextNode)\n\
  ```\n\n请注意，你在第 7 章中见过类似的代码。查看更改后，再次运行游戏。你现在会看到一个新的白色文字标签“TAP ANYWHERE TO START!”，显示在场景中央，如图\
  \ 8-1 所示。\n\n![A330720_2_En_8_Fig1_HTML.jpg](img/A330720_2_En_8_Fig1_HTML.jpg) \
  \ \n**图 8-1.** 显示“TAP ANYWHERE TO START!” `SKLabelNode` 的 `GameScene`\n\n在继续之前，再做一件事：添加代码，当屏幕被点击时，从场景中移除\
  \ `startGameTextNode` 标签。你可以通过在 `touchedBegan()` 方法的第一个 `if` 语句中添加以下一行代码来实现这一点：\n\
  \n```\nstartGameTextNode.removeFromParent()\n```\n\n### 结束游戏\n\n现在是时候添加用于判断 SuperSpaceMan\
  \ 游戏何时结束的代码了。游戏结束的方式实际上只有两种：要么玩家躲避所有黑洞并收集能量球，直到到达场景顶部获胜；要么玩家从场景底部掉落而失败。在位置更新时检查玩家位置的最简单地方是在\
  \ `GameScene` 的 `update()` 方法中。让我们回到那个方法，并添加必要的代码来实现这一点。目前，`update()` 方法中有一个简单的\
  \ `if` 语句，只要 `playerNode` 的 y 坐标大于或等于 180.0，它就会根据 `playerNode` 的位置移动前景和背景节点。这意味着\
  \ `playerNode` 可能会离开 `backgroundNodes` 并飞入黑暗的太空。我们真的不喜欢这种效果。为了阻止这种情况发生，请修改当前的 `if`\
  \ 语句，使其看起来像下面这样：\n\n```\nif playerNode.position.y >= 180.0 &&\n   playerNode.position.y\
  \ < 6400.0 {\n```\n\n保存此更改并再次运行游戏。尝试到达游戏顶部，看看会发生什么。这一次，当你到达场景顶部时，背景和前景将停止移动，而 `playerNode`\
  \ 将继续移出视口。这样稍微好一些了。\n\n\n\n#### 赢得游戏\n\n至此，玩家即将飞离场景上方，但你需要通过测试来确认玩家何时真正飞出场景，以判定其是否获胜。为此，请在\
  \ `update()` 方法的当前 `if` 代码块中添加以下 `else if` 语句：  \n`else if playerNode.position.y\
  \ > 7000.0 { gameOverWithResult(true) }`  \n这段代码用于检查 `playerNode` 是否已向上飞出场景超过 7000\
  \ 点的距离。若条件成立，则会调用一个新的实例方法 `gameOverWithResult()`，并向其传入 `true`，表示玩家获胜。请进行这些修改，然后查看如下所示的\
  \ `gameOverWithResult()` 方法：\n\n```\nfunc gameOverWithResult(_ gameResult: Bool)\
  \ {\n    playerNode.removeFromParent()\n    if gameResult {\n        print(\"YOU\
  \ WON!\")\n    }\n    else {\n        print(\"YOU LOSE!\")\n    }\n}\n```\n\n请注意，这个方法目前功能有限。它首先从场景中移除\
  \ `playerNode`，然后将 `node` 设置为 `nil`。接着，它会测试传入的 `gameResult` 布尔值，并打印玩家是否获胜的信息。目前无需过于担心这个方法，你很快将对其进行修改。现在，请将此方法添加到\
  \ `GameScene` 的底部，然后让我们开始判断玩家是否输掉游戏。\n\n注意：当显示屏的高度远远不及 `6400.0` 和 `7000.0` 这些数值时，它们似乎显得不可思议。请记住，你将\
  \ `playerNode` 添加到了 `foregroundNode` 中，并且你一直在向下移动 `foregroundNode`，而 `playerNode`\
  \ 实际上却在场景中持续向上。这就是玩家 Y 坐标远高于设备视口高度的原因。\n\n#### 输掉游戏\n\n现在你已知道玩家何时获胜，是时候测试玩家是否输掉游戏了。为此，请返回\
  \ `update()` 方法，并在 `if` 语句的底部（紧接你刚刚添加的 `else if` 之后）添加以下 `else if`：  \n`else if\
  \ playerNode.position.y < 0.0 { gameOverWithResult(false) }`  \n这段代码很容易理解。如果 `playerNode`\
  \ 的 Y 坐标小于 `0.0`，则说明玩家已从场景底部坠落，此时会调用 `gameOverWithResult()` 方法，并向其传入 `false`，表示玩家输掉了游戏。\n\
  \n在切换到新场景之前，还有最后一步需要完成。在 `gameOverWithResult()` 方法中，你已将 `playerNode` 从其父节点移除并设置为\
  \ `nil`。这样做完全没问题，但你需要确保在未检查该属性是否为 `nil` 之前，不会尝试使用它。目前你只有两个地方会用到这个属性。第一个是在 `update()`\
  \ 方法中每次检查 `playerNode` 位置时。为了确保不会解引用一个为 `nil` 的 `playerNode`，你需要用 `if` 语句包围 `update()`\
  \ 方法的主体，以确认 `playerNode` 属性不为 `nil`。你可以在如下所示的新 `update()` 方法中看到这一改动：\n\n```\noverride\
  \ func update(_ currentTime: TimeInterval) {\n    if playerNode.position.y >= 180.0\
  \ {\n        backgroundNode.position =\n            CGPoint(x: backgroundNode.position.x,\n\
  \                    y: -((playerNode.position.y - 180.0)/8));\n        backgroundStarsNode.position\
  \ =\n            CGPoint(x: backgroundStarsNode.position.x,\n                  \
  \  y: -((playerNode.position.y - 180.0)/6));\n        backgroundPlanetNode.position\
  \ =\n            CGPoint(x: backgroundPlanetNode.position.x,\n                 \
  \   y: -((playerNode.position.y - 180.0)/8));\n        foregroundNode.position =\n\
  \            CGPoint(x: foregroundNode.position.x,\n                    y: -(playerNode.position.y\
  \ - 180.0));\n    }\n    else if playerNode.position.y > 7000.0 {\n        gameOverWithResult(true)\n\
  \    }\n    else if playerNode.position.y + playerNode.size.height < 0.0 {\n   \
  \     gameOverWithResult(false)\n    }\n}\n```\n\n查看这些改动后，请将你的 `update()` 方法修改成上述形式，然后我们继续添加实际的场景过渡动画。\n\
  \n#### 添加过渡动画\n\n\n\n在你能过渡到一个新场景之前，你需要有一个可过渡的目标场景。这个游戏需要的场景是：告知玩家上一局得分，并允许他们开始新游戏。要创建新场景，请选择\
  \ **文件 ➤ 新建 ➤ 文件** 菜单项，然后选择 **iOS ➤ 源 ➤ Swift 文件**；点击 **下一步** 按钮。确保选中了 `SuperSpaceMan`\
  \ 文件夹，将文件命名为 `MenuScene`，然后点击 **创建**。现在你会得到一个几乎为空的名为 `MenuScene.swift` 的新文件。将其内容替换为代码清单\
  \ 8-1 中的内容：\n\n```swift\nimport SpriteKit\n\nclass MenuScene: SKScene {\n    required\
  \ init?(coder aDecoder: NSCoder) {\n        super.init(coder: aDecoder)\n    }\n\
  \n    init(size: CGSize, gameResult: Bool, score: Int) {\n        super.init(size:\
  \ size)\n\n        let backgroundNode = SKSpriteNode(imageNamed: \"Background\"\
  )\n        backgroundNode.size.width = self.frame.size.width\n        backgroundNode.position\
  \ = CGPoint(x: size.width / 2, y: 0.0)\n        backgroundNode.anchorPoint = CGPoint(x:\
  \ 0.5, y: 0.0)\n        addChild(backgroundNode)\n\n        let gameResultTextNode\
  \ = SKLabelNode(fontNamed: \"Copperplate\")\n        gameResultTextNode.text = \"\
  YOU \" + (gameResult ? \"WON\" : \"LOST\")\n        gameResultTextNode.horizontalAlignmentMode\
  \ = SKLabelHorizontalAlignmentMode.center\n        gameResultTextNode.verticalAlignmentMode\
  \ = SKLabelVerticalAlignmentMode.center\n        gameResultTextNode.fontSize = 20\n\
  \        gameResultTextNode.fontColor = SKColor.white\n        gameResultTextNode.position\
  \ = CGPoint(x: size.width / 2.0, y: size.height - 200.0)\n        addChild(gameResultTextNode)\n\
  \n        let scoreTextNode = SKLabelNode(fontNamed: \"Copperplate\")\n        scoreTextNode.text\
  \ = \"SCORE :  \\(score)\"\n        scoreTextNode.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.center\n\
  \        scoreTextNode.verticalAlignmentMode = SKLabelVerticalAlignmentMode.center\n\
  \        scoreTextNode.fontSize = 20\n        scoreTextNode.fontColor = SKColor.white\n\
  \        scoreTextNode.position = CGPoint(x: size.width / 2.0, y: gameResultTextNode.position.y\
  \ - 40.0)\n        addChild(scoreTextNode)\n\n        let tryAgainTextNodeLine1\
  \ = SKLabelNode(fontNamed: \"Copperplate\")\n        tryAgainTextNodeLine1.text\
  \ = \"TAP ANYWHERE\"\n        tryAgainTextNodeLine1.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.center\n\
  \        tryAgainTextNodeLine1.verticalAlignmentMode = SKLabelVerticalAlignmentMode.center\n\
  \        tryAgainTextNodeLine1.fontSize = 20\n        tryAgainTextNodeLine1.fontColor\
  \ = SKColor.white\n        tryAgainTextNodeLine1.position = CGPoint(x: size.width\
  \ / 2.0, y: 100.0)\n        addChild(tryAgainTextNodeLine1)\n\n        let tryAgainTextNodeLine2\
  \ = SKLabelNode(fontNamed: \"Copperplate\")\n        tryAgainTextNodeLine2.text\
  \ = \"TO PLAY AGAIN!\"\n        tryAgainTextNodeLine2.horizontalAlignmentMode =\
  \ SKLabelHorizontalAlignmentMode.center\n        tryAgainTextNodeLine2.verticalAlignmentMode\
  \ = SKLabelVerticalAlignmentMode.center\n        tryAgainTextNodeLine2.fontSize\
  \ = 20\n        tryAgainTextNodeLine2.fontColor = SKColor.white\n        tryAgainTextNodeLine2.position\
  \ = CGPoint(x: size.width / 2.0, y: tryAgainTextNodeLine1.position.y - 40.0)\n \
  \       addChild(tryAgainTextNodeLine2)\n    }\n\n    override func touchesBegan(_\
  \ touches: Set<UITouch>, with event: UIEvent?) {\n        let transition = SKTransition.doorsOpenHorizontal(withDuration:\
  \ 2.0)\n        let gameScene = GameScene(size: size)\n        view?.presentScene(gameScene,\
  \ transition: transition)\n    }\n}\n```\n\n**代码清单 8-1.** `MenuScene.swift`：SuperSpaceMan\
  \ 的 `MenuScene`\n\n请注意，第二个 `init()` 方法接受三个参数：场景的尺寸、以 `Bool` 类型表示的游戏结果以及玩家的分数。如你所知，`size`\
  \ 参数用于设置场景的尺寸，而第三个和第四个参数将用于向用户显示游戏结果信息。在 `init()` 方法内部，首先添加了一张背景图。所使用的图片与你之前在 `GameScene`\
  \ 中使用的图片相同。之后，该方法向场景中添加了几个标签，其中包括两个位于场景中央的标签。第一个标签告知用户他们是赢了还是输了比赛，第二个标签则显示他们的分数。接下来，场景底部添加了两个标签，提示玩家点击屏幕任意位置以重新开始游戏。将代码添加到\
  \ `MenuScene.swift` 文件后，保存你的工作，然后让我们回到 `GameScene.swift` 文件。现在你有了一个可过渡的场景，因此让我们添加执行过渡的代码。用于实现此过渡的代码如下所示：\n\
  \n```swift\nlet transition = SKTransition.crossFade(withDuration: 2.0)\nlet menuScene\
  \ = MenuScene(size: size,\n                          gameResult: gameResult,\n \
  \                         score: score)\nview?.presentScene(menuScene, transition:\
  \ transition)\n```\n\n这段代码的第一行创建了一个交叉淡入淡出的过渡效果，该效果会在两秒内淡入新场景。第二行创建了 `MenuScene`\
  \ 本身，并向其传递当前场景的尺寸，以及游戏结果和玩家的分数。第三行则实际呈现 `MenuScene`，它会使用第一行创建的过渡效果替换当前场景。阅读这段代码后，请将其添加到\
  \ `GameScene` 的 `gameOverWithResult()` 方法底部，如下所示：\n\n```swift\nfunc gameOverWithResult(_\
  \ gameResult: Bool) {\n    playerNode.removeFromParent()\n\n    let transition =\
  \ SKTransition.crossFade(withDuration: 2.0)\n    let menuScene = MenuScene(size:\
  \ size,\n                        gameResult: gameResult,\n                     \
  \        score: score)\n    view?.presentScene(menuScene, transition: transition)\n\
  }\n```\n\n现在运行游戏，试着赢一局或输一局。无论哪种方式，游戏结束时，你都会看到新场景淡入，如图 8-2 所示。\n\n![A330720_2_En_8_Fig2_HTML.jpg](img/A330720_2_En_8_Fig2_HTML.jpg)\n\
  \n**图 8-2.** 游戏结束时的 `MenuScene`\n\n太棒了。你现在已经添加了一个简单的场景过渡，它能够传达玩家是赢了还是输了游戏，以及游戏结束时的得分。在进入下一章之前，你还需要做最后一个改动：添加另一个过渡，当玩家点击\
  \ `MenuScene` 时，该过渡将开始一个新游戏。实现此功能的代码显示在以下对 `MenuScene` 的 `touchesBegan()` 方法的重写中：\n\
  \n```swift\noverride func touchesBegan(_ touches: Set<UITouch>, with event: UIEvent?)\
  \ {\n    let transition = SKTransition.doorsOpenHorizontal(withDuration: 2.0)\n\
  \    let gameScene = GameScene(size: size)\n    view?.presentScene(gameScene, transition:\
  \ transition)\n}\n```\n\n此方法创建了一个 `doorsOpenHorizontalWithDuration` 过渡和一个新的 `GameScene`\
  \ 实例，然后使用新过渡呈现新的 `GameScene`。将此方法添加到 `MenuScene` 类的底部，然后再次运行应用程序。这次，当游戏结束并显示 `MenuScene`\
  \ 时，点击屏幕，你就能开始新一局游戏了。\n\n\n\n### 总结\n\n在本章中，你学习了如何使用 SpriteKit 的 `SKTransition`\
  \ 类来实现场景转场。你了解了 SpriteKit 为你提供的几种不同类型的内置转场效果。你还看到了如何在转场过程中控制每个场景。在本章末尾，你运用新学到的场景转场知识，为你的\
  \ `SuperSpaceMan` 游戏添加了一个菜单场景。在第九章（#A330720_2_En_9_Chapter.html）中，你将聚焦 SpriteKit\
  \ 最佳实践，以此结束使用 Swift 进行 SpriteKit 编程的学习。在本章末尾，你还会花一点时间通过重构来清理 `SuperSpaceMan` 应用程序。©\
