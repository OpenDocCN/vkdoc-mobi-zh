  \ * CGFloat(i))\n        blackHoleNode.run(moveAction)\n        foregroundNode.addChild(blackHoleNode)\n\
  \    }\n}\n```\n\n至此，所有 `SKSpriteNode` 都重复使用了同一个 `SKTextureAtlas`，这将加快每个节点纹理的检索速度。\n\
  \n### 外部化你的游戏数据\n\n\n\n接下来要讨论的最佳实践不一定会提升游戏性能，但有助于开发和测试。到目前为止，每个游戏节点的位置都硬编码在`SuperSpaceMan`的\
  \ Swift 代码中。如果你正在开发一个简单的游戏，并且同时担任设计师和开发者，这样没问题；但如果你的团队有明确分工，你可能希望让设计师或测试人员无需修改 Swift\
  \ 代码就能调整游戏玩法。一种实现方式是将游戏节点的位置外部化。在`SuperSpaceMan`游戏中，一个简单的做法是把能量球和黑洞的位置移到 plist 文件中。然后你可以通过`NSBundle`加载节点位置。这样设计师或测试人员只需修改\
  \ plist 文件就能改变整个游戏的布局。\n\n下面是一个包含前三个能量球节点位置的 plist 示例：\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\"\
  \ \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist version=\"1.0\">\n\
  <dict>\n    <key>positions</key>\n    <array>\n    <dict>\n        <key>x</key>\n\
  \        <real>120.0</real>\n        <key>y</key>\n        <real>440.0</real>\n\
  \    </dict>\n    <dict>\n        <key>x</key>\n        <real>80.0</real>\n    \
  \    <key>y</key>\n        <real>560.0</real>\n    </dict>\n    <dict>\n       \
  \ <key>x</key>\n        <real>120.0</real>\n        <key>y</key>\n        <real>680.0</real>\n\
  \    </dict>\n    ...\n    </array>\n</dict>\n</plist>\n```\n\n在这个文件中，你可以看到一个字典数组，每个字典包含能量球节点的\
  \ x 坐标和 y 坐标。无需自己创建这个文件。你可以在之前下载的、包含精灵图片的 zip 压缩包中找到`orbs.plist`和`blackholes.plist`文件。将这两个文件复制到项目的`SupportingFiles`组中，然后我们继续使用它们。\n\
  \n将两个 plist 文件复制到项目后，你可以通过主 bundle 加载它们。看看下面修改后的`addOrbsToForeground()`方法：\n\n```\n\
  func addOrbsToForeground() {\n    let orbPlistPath = Bundle.main.path(forResource:\
  \ \"orbs\", ofType: \"plist\")\n    let orbDataDictionary = NSDictionary(contentsOfFile:\
  \ orbPlistPath!)\n    if let positionDictionary = orbDataDictionary {\n        let\
  \ positions = positionDictionary.object(forKey: \"positions\") as! NSArray\n   \
  \     for position in positions {\n            let orbNode = Orb(textureAtlas: SKTextureAtlas(named:\
  \ \"sprites.atlas\"))\n            let x = (position as AnyObject).object(forKey:\
  \ \"x\") as! CGFloat\n            let y = (position as AnyObject).object(forKey:\
  \ \"y\") as! CGFloat\n            orbNode.position = CGPoint(x: x, y: y)\n     \
  \       foregroundNode.addChild(orbNode)\n        }\n    }\n}\n```\n\n在新的`addOrbsToForeground()`方法中，你可以看到它首先加载`orbs.plist`的内容。然后从字典中获取位置数组，最后遍历所有位置，将每个`orbNode`添加到对应位置的`foregroundNode`上。现在你可以通过修改\
  \ plist 来改变所有能量球节点的数量和布局。\n\n对`addOrbsToForeground()`方法进行这些修改，然后对黑洞做同样的处理。你已经将`blackholes.plist`文件复制到项目中，因此可以跳过复制步骤，直接修改`addBlackHolesToForeground()`方法，从\
  \ plist 加载黑洞位置。新的`addBlackHolesToForeground()`方法如下：\n\n```\nfunc addBlackHolesToForeground()\
  \ {\n    let moveLeftAction = SKAction.moveTo(x: 0.0, duration: 2.0)\n    let moveRightAction\
  \ = SKAction.moveTo(x: size.width, duration: 2.0)\n    let actionSequence = SKAction.sequence([moveLeftAction,\
  \ moveRightAction])\n    let moveAction = SKAction.repeatForever(actionSequence)\n\
  \    let blackHolePlistPath = Bundle.main.path(forResource: \"blackholes\", ofType:\
  \ \"plist\")\n    let blackHoleDataDictionary = NSDictionary(contentsOfFile: blackHolePlistPath!)\n\
  \    if let positionDictionary = blackHoleDataDictionary {\n        let positions\
  \ = positionDictionary.object(forKey: \"positions\") as! NSArray\n        for position\
  \ in positions {\n            let blackHoleNode = BlackHole(textureAtlas: SKTextureAtlas(named:\
  \ \"sprites.atlas\"))\n            let x = (position as AnyObject).object(forKey:\
  \ \"x\") as! CGFloat\n            let y = (position as AnyObject).object(forKey:\
  \ \"y\") as! CGFloat\n            blackHoleNode.position = CGPoint(x: x, y: y)\n\
  \            blackHoleNode.run(moveAction)\n            foregroundNode.addChild(blackHoleNode)\n\
  \        }\n    }\n}\n```\n\n请注意，现在的`addBlackHolesToForeground()`方法与`addOrbsToForeground()`方法类似，都是从\
  \ plist 中读取所有黑洞节点位置，然后将每个`blackHoleNode`添加到读取到的对应位置。进行修改后再次运行游戏。你会发现没有变化，但现在那些几乎没有开发经验的人也能完全改变游戏了。\n\
  \n\n\n### 保持节点树的精简\n\n在 `SuperSpaceMan` 游戏中要实现的最佳实践是，移除所有掉落至可见场景底部的 `SKNode`。从游戏中移除不必要的节点，能够提升节点树渲染的整体性能，并减少节点树中容纳所有节点所占用的内存。要从\
  \ `GameScene` 中移除不必要的节点，一个简单的方法是创建一个方法，移除所有具有指定名称且位于 `playerNode` 下方一个场景长度之下的节点。请看以下\
  \ `removeOutOfSceneNodesWithName()` 方法：\n\n```\nfunc removeOutOfSceneNodesWithName(_\
  \ name: String) {\n    foregroundNode.enumerateChildNodes(withName: name, using:\
  \ {\n        node, stop in\n        if self.playerNode.position.y - node.position.y\
  \ > self.size.height {\n            node.removeFromParent()\n        }\n    })\n\
  }\n```\n\n该方法接受一个代表要测试的每个 `SKNode` 名称的单个 `String`，并使用 `enumerateChildNodesWithName()`\
  \ 方法来检查这些节点是否位于 `playerNode` 下方一个场景长度的位置。如果返回的节点位置超出这个长度，则将其从场景中移除。关于这个方法有一点需要注意：在\
  \ `enumerateChildNodesWithName()` 方法内部，它首先检查 `playerNode` 是否为 `nil`。如果 `playerNode`\
  \ 为 `nil`，则通过将 `stop.memory` 属性设置为 `true` 来停止对子节点的搜索。将此方法添加到 `GameScene` 的底部。\n\n\
  要使用 `removeOutOfSceneNodesWithName()`，你需要在 `GameScene` 的 `update()` 方法底部，为每个可以从场景中移除的节点添加对该方法的调用。在本例中，可能掉落至场景外的两个节点是\
  \ `BLACK_HOLE` 和 `POWER_UP_ORB` 节点。请看修改后的 `update()` 方法，该方法末尾添加了这两个调用，如下所示：\n\n\
  ```\noverride func update(_ currentTime: TimeInterval) {\n    if playerNode.position.y\
  \ >= 180.0 &&\n        playerNode.position.y < 6400.0 {\n        backgroundNode.position\
  \ =\n            CGPoint(x: backgroundNode.position.x,\n                    y: -((playerNode.position.y\
  \ - 180.0)/8))\n        backgroundStarsNode.position =\n            CGPoint(x: backgroundStarsNode.position.x,\n\
  \                    y: -((playerNode.position.y - 180.0)/6))\n        backgroundPlanetNode.position\
  \ =\n            CGPoint(x: backgroundPlanetNode.position.x,\n                 \
  \   y: -((playerNode.position.y - 180.0)/8))\n        foregroundNode.position =\n\
  \            CGPoint(x: foregroundNode.position.x,\n                    y: -(playerNode.position.y\
  \ - 180.0))\n    }\n    else if playerNode.position.y > 7000.0 {\n        gameOverWithResult(true)\n\
  \    }\n    else if playerNode.position.y + playerNode.size.height < 0.0 {\n   \
  \     gameOverWithResult(false)\n    }\n    removeOutOfSceneNodesWithName(\"BLACK_HOLE\"\
  )\n    removeOutOfSceneNodesWithName(\"POWER_UP_ORB\")\n}\n```\n\n新的 `update()`\
  \ 方法现在会在每次场景渲染结束时调用 `removeOutOfSceneNodesWithName()` 方法，移除所有不必要的节点。对 `update()`\
  \ 方法进行此修改，并最后一次运行 `SuperSpaceMan` 游戏。这次运行游戏时，点击屏幕直到即将赢得游戏，然后停止点击，使 `playerNode`\
  \ 开始下落。这次在你下落的过程中，之前经过的能量球和黑洞节点已从场景中被移除。\n\n### 总结\n\n在本章中，你学习了一些 SpriteKit 的最佳实践，包括如何创建你自己的\
  \ `SKSpriteNode` 子类，以便更好地复用节点。接着，你将游戏改为将所有精灵加载到单一纹理中。之后，你学习了将游戏数据外部化。最后，你修剪了节点树，移除了所有掉落至屏幕底部的节点。在第\
  \ 10 章中，你将开启 SceneKit 的学习之旅。祝愉快。\n\n"
- "# 第二部分  \nSceneKit 入门\n\n© James Goodwill 和 Wesley Matlock 2017 James Goodwill\
  \ 与 Wesley Matlock 《iOS 10 初学者 Swift 游戏开发》 10.1007/978-1-4842-2310-9_10\n\n"
- "# 10. 创建你的第一个 SceneKit 项目\n\nJames Goodwill¹ 和 Wesley Matlock² (1) 美国科罗拉多州海兰兹牧场\
  \ (2) 美国密苏里州堪萨斯城\n\n在本章中，你将直接动手创建自己的游戏。这个游戏将致敬经典的《德军总部 3D》。首先，你将学习如何以编程方式创建场景并向场景中添加节点。在你对这些原理有了基本了解之后，你将在后续章节中学习如何使用强大的\
  \ SceneKit 编辑器。\n\n### SceneKit 入门\n\n`SceneKit` 是 Apple 强大的 3D 图形框架，使创建休闲 3D 游戏变得简单。通过使用\
  \ `SceneKit API`，你无需了解 OpenGL 即可创建完全沉浸式的 3D 游戏。`SceneKit` 最初发布于 OS X Mountain Lion，自\
  \ iOS 8 发布以来，开发者已用它创建了众多令人惊叹的 3D 游戏。随着 iOS 10 的发布，开发者现在可以为所有 Apple 设备（iOS、tvOS、macOS\
  \ 和 watchOS）创建 3D 游戏。`SceneKit` 用于创建场景图，其中包含一个场景和节点的层次结构，如图 10-1 所示。`SceneKit` 使用这些节点在视图中显示场景，并通过图形处理单元\
  \ (GPU) 来处理场景图。这提升了在设备上渲染帧的性能。\n\n![A330720_2_En_10_Fig1_HTML.gif](img/A330720_2_En_10_Fig1_HTML.gif)\n\
  \n**图 10-1.** 场景图\n\nApple 已将 SpriteKit 集成到 `SceneKit` 技术栈中。这种集成将允许你运用 SpriteKit\
  \ 知识来创建休闲 3D 游戏。表 10-1 概述了各种类，并描述了这些 `SceneKit` 类。\n\n**表 10-1.** SceneKit 类\n\n\
  | 类 | 描述 |\n| --- | --- |\n| `SCNView` | 此视图用于显示 `SceneKit` 对象。 |\n| `SCNScene`\
  \ | 一个场景可以通过编程方式创建，或使用来自图形工具的 3D 文件创建。 |\n| `SCNNode` | 这是创建场景的起点。 |\n| `SCNCamera`\
  \ | 这是场景的视角。 |\n| `SCNGeometry` | 这是一个用于附加到节点的 3D 对象。它也可以使用来自图形工具的 3D 文件。 |\n| `SCNMaterial`\
  \ | 材质用于描述节点的表面将如何渲染。 |\n| `SCNLight` | 这是附加到节点上的光源，用于提供场景的着色和光照。 |\n\n#### SceneKit\
  \ 动画\n\n`SceneKit` 还与 ImageKit 和 CoreAnimation 集成，因此你无需任何 3D 编程的高级知识。当你创建场景时，你可以创建在场景属性的不同值之间优雅过渡的动画。`SceneKit`\
  \ 使用 `SCNTransaction` 类创建一个原子运行循环，以组合你所有的隐式动画更改。这类更改理想情况下是几乎立即发生的小型原子更改，并且你可以增加持续时间。这些类型的动画属性会自动动画化。由于\
  \ `SceneKit` 基于 CoreAnimation，你可以显式创建动画对象并将其附加到动画场景中。对于这种更复杂的动画，你需要对 `CAAnimation`\
  \ 进行子类化。使用键值编码创建此子类后，设置动画参数并将其附加到场景中的节点或元素上。`CAAnimation` 类还能够使用来自第三方图形创作工具的对象。\n\
  \n\n\n#### 需要了解的知识\n\n`SceneKit` 是一个基于 3D 的 API，因此你需要对坐标系统、3D 几何等图形学概念有基础了解。\n\n\
  - **点**：在本文档中，点是三维空间中的一个位置。\n- **向量**：你主要会使用向量来表示方向。\n- **笛卡尔坐标系**：由两个轴组成：沿水平面延伸的\
  \ X 轴和垂直于 X 轴的 Y 轴。\n- **欧几里得空间**：即三维坐标系，并增加了表示景深的 Z 轴。\n- **变换**：许多操作会涉及变换，但现阶段你只需处理用于点和旋转的运算符。可以将其理解为将一个点变换到另一个点，或将一个向量（方向）应用到物体的旋转上。\n\
  \n有关计算机图形编程的更多信息，我们建议参考 John Vince 所著的 *Geometric Algebra for Computer Graphics*（Apress，2008\
  \ 年）。默认情况下，摄像机或用户视角沿 Z 轴方向（图 10-2）。  \n![A330720_2_En_10_Fig2_HTML.jpg](img/A330720_2_En_10_Fig2_HTML.jpg)\
  \  \n图 10-2. SceneKit 坐标系统\n\n### 创建 SceneKit 项目\n\n学习的最好方法就是直接动手，从零开始。你将创建一个使用\
  \ Swift 作为编程语言、`SceneKit` 作为游戏技术的游戏项目。要创建项目，请打开 `Xcode` 并完成以下步骤：\n\n1. 选择 **文件**\
  \ ➤ **新建项目**。\n2. 从 iOS 分组中选择 **应用程序**。\n3. 选择 **游戏** 图标。此时“选择模板”对话框应如图 10-3 所示。\
  \  \n   ![A330720_2_En_10_Fig3_HTML.jpg](img/A330720_2_En_10_Fig3_HTML.jpg)  \n\
  \   图 10-3. 选择模板对话框\n4. 点击 **下一步** 按钮继续。\n5. 在 **产品名称** 中输入 `SuperSpaceMan3D`，在\
  \ **组织名称** 中输入 `Apress`，在 **组织标识符** 中输入 `com.apress`。\n6. 确保 **Swift** 为所选语言，**SceneKit**\
  \ 为所选游戏技术，**iPhone** 为所选设备。\n7. 在点击 **下一步** 按钮之前，请查看图 10-4。如果一切与此图一致，请点击 **下一步**\
  \ 按钮，并选择一个合适的位置来存储你的项目文件。  \n   ![A330720_2_En_10_Fig4_HTML.jpg](img/A330720_2_En_10_Fig4_HTML.jpg)\
  \  \n   图 10-4. 为项目选择选项\n\n> **注意：** 你正在创建一个仅限 iPhone 的游戏，但这是因为该游戏更适合在 iPhone 上运行。我们书中介绍的所有内容都适用于任何\
  \ iOS 设备。点击 **下一步** 后，系统会询问你希望将项目保存在哪里。你现在有了一个可运行的 `SceneKit` 项目，可以点击 **播放** 按钮来查看默认的\
  \ `SceneKit` 游戏。如果一切正常，你将看到新应用在模拟器中运行。虽然目前它还不能做什么，但你应该能看到一个旋转的喷气式飞机 3D 渲染效果，类似于图\
  \ 10-5。  \n![A330720_2_En_10_Fig5_HTML.jpg](img/A330720_2_En_10_Fig5_HTML.jpg) \
  \ \n图 10-5. SceneKit 示例应用程序\n\n### 连接并构建场景\n\n现在你已经有了一个基础项目，并对 `SceneKit` 有所了解，是时候真正学习如何将这些类组合起来并创建游戏了。目前你的项目正在运行苹果的默认示例代码。在本节中，你将移除这些代码，并为太空人创建一个地板和新环境。\n\
  \n#### Swiftystein3D\n\n在继续之前，让我们彻底清理项目，以便从零开始。与之前仅支持竖屏的游戏不同，这次你将仅支持横屏，因此需要更改目标设置，使其如图\
  \ 10-6 所示。  \n![A330720_2_En_10_Fig6_HTML.jpg](img/A330720_2_En_10_Fig6_HTML.jpg)\
  \  \n图 10-6. SuperSpaceMan3D 设备方向\n\n接下来要做的是将 `GameViewController.swift` 文件的内容替换为列表\
  \ 10-1 中的类。你需要重写 `viewDidLoad()` 方法并创建一个空的 `SCNScene`。\n\n```swift\nimport UIKit\n\
  import QuartzCore\nimport SceneKit\n\nclass GameViewController: UIViewController\
  \ {\n    override func viewDidLoad() {\n        super.viewDidLoad()\n        //\
  \ 创建一个新场景\n        view.SCNView()\n    }\n}\n```\n\n列表 10-1. GameViewController.swift：GameViewController\n\
  \n现在如果你运行游戏，将看到一个空白屏幕，这是一个开始游戏的好起点。\n\n#### 项目资源\n\n你需要准备的其中一项是本书中将要使用的图像资源。你应该从\
  \ [www.apress.com/97814823093](http://www.apress.com/97814823093) 下载这些资源。`Xcode`\
  \ 使用 `art.scnassests` 文件夹来优化你的 3D 资源，以便在运行时快速加载和流畅渲染。查看你的项目，会有一个名为 `art.scnassets`\
  \ 的文件夹，其中包含默认图像 `ship.dea` 和 `texture.png`。请直接删除这两个文件，因为不会用到它们。\n\n既然已经删除了 `ship.dea`\
  \ 和 `texture.png` 文件，现在可以通过 **访达** 应用程序将游戏资源复制到此文件夹，然后将图像拖入 `Xcode`。示例如图 10-7 所示。\
  \  \n![A330720_2_En_10_Fig7_HTML.jpg](img/A330720_2_En_10_Fig7_HTML.jpg)  \n图 10-7.\
  \ 美术资源\n\n现在这些文件已在项目中，你需要将静态图像添加到项目。这次你只需将图像从“访达”中的文件夹直接拖到 `Xcode` 项目中，并放入 `Xcode`\
  \ 的图像资源目录：`Images.xcassets`。本游戏将用到的所有图像都将在此次添加。\n\n#### 构建场景\n\n\n\n### 开始使用 SceneKit\n\
  \n一个不错的起点是`GameViewController`类。你需要移除`viewDidLoad()`方法中的临时代码，即之前创建空`SCNScene`的部分：\n\
  \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n}\n```\n\n在这个类中，你将创建一个类属性来存储主场景变量。就在类声明之后，继续创建用于存储主场景的变量：\n\
  \n```\nclass GameViewController: UIViewController {\n    var mainScene: SCNScene!\n\
  ```\n\n根据上一节的最佳实践，你将使用独立的函数来创建游戏对象。这有助于你理解当前的操作，并在后续需要时更容易重构：\n\n```\nfunc createMainScene()\
  \ -> SCNScene {\n    let mainScene = SCNScene(named: \"art.scnassets/hero.dae\"\
  )\n    return mainScene!\n}\n```\n\n这个方法虽小但功能强大；这正是 SceneKit 强大之处开始显现的地方。如你所见，你正在加载一个由\
  \ 3D 美术师提供的 Collada 文件（`.dae`）。一旦完成场景编码，只需再添加几行代码，你就能让英雄以华丽的 3D 形态呈现。\n\n现在，将创建好的场景添加到你的视图中。在`viewDidLoad()`方法中，你将通过调用刚创建的函数来初始化`mainScene`，然后将该场景添加到`GameViewController`的视图中：\n\
  \n```\n// create a new scene\nmainScene = createMainScene()\nlet sceneView = self.view\
  \ as! SCNView\nsceneView.scene = mainScene\n\n// Optional, but nice to be turned\
  \ on during developement\nsceneView.showsStatistics = true\nsceneView.allowsCameraControl\
  \ = true\n```\n\n这段代码会获取视图，然后将场景添加到视图的场景中。既然你在这里，为什么不添加`showStatistics`，以便查看 SceneKit\
  \ 处理 3D 对象的性能呢？你还可以将`allowsCameraControl`设置为`true`，这样就能通过手势操控视图。捏合和缩放可以拉近拉远场景，而平移则允许你围绕场景移动视角。\n\
  \n现在，你应该能够运行项目并在完整的 3D 中看到英雄，如图 10-8 所示。你还可以旋转他，从各个角度观察。\n\n![A330720_2_En_10_Fig8_HTML.jpg](img/A330720_2_En_10_Fig8_HTML.jpg)\n\
  \n**图 10-8.** 3D 中的太空人\n\n在继续之前，你的`GameViewController`应类似于代码清单 10-2：\n\n```\nclass\
  \ GameViewController: UIViewController {\n    var mainScene: SCNScene!\n\n    override\
  \ func viewDidLoad() {\n        super.viewDidLoad()\n\n        // create a new scene\n\
  \        mainScene = createMainScene()\n        let sceneView = self.view as! SCNView\n\
  \        sceneView.scene = mainScene\n\n        // Optional, but nice to be turned\
  \ on during developement\n        sceneView.showsStatistics = true\n        sceneView.allowsCameraControl\
  \ = true\n    }\n\n    func createMainScene() -> SCNScene {\n        let mainScene\
  \ = SCNScene(named: \"art.scnassets/hero.dae\")\n        return mainScene!\n   \
  \ }\n}\n```\n\n**代码清单 10-2.** 设置 `GameViewController` 类\n\n接下来，你将为太空人创建一个可供行走的地面。在`GameViewController`类中，你将创建一个新方法来创建地面节点。暂时不必过多担心`SCNNode`——我将在后续章节中详细讨论它。然而，节点是\
  \ SceneKit 场景中使用的基本对象。在函数声明中，你可以看到你将返回一个`SCNNode`给调用者：\n\n```\nfunc createFloorNode()\
  \ -> SCNNode {\n\n}\n```\n\n接下来，你创建一个变量，其返回值类型为`SCNNode`，并将该节点的几何体设置为`SCNFloor`。`SCNFloor`是一个特殊的\
  \ SceneKit 类，用于创建一个无限平面。需要注意的是，这个平面将沿着 x 轴和 z 轴延伸，而 y 坐标设置为零：\n\n```\nlet floorNode\
  \ = SCNNode()\nfloorNode.geometry = SCNFloor()\nfloorNode.geometry?.firstMaterial?.diffuse.contents\
  \ = \"Floor\"\nreturn floorNode\n```\n\n在这段代码中，你为`floorNode`设置了几何体。一个节点只能被赋予一个几何体，因此要创建动画几何体，你需要创建一个空节点并向其添加子节点。对于`floorNode`，你不会创建动画几何体，但这部分内容我们会在后续创建游戏时涉及。你还为节点添加了一个材质，在本例中是你之前复制到`Assets.xcassets`中的“Floor”图像。现在，你可以简单地将材质理解为一种颜色或图像。同样，稍后你会深入学习材质相关内容。\n\
  \n现在，你已经有了一个可以为地面创建新`SCNNode`的方法。接下来，你需要将它添加到主场景中，以便你能看到并与此节点交互。返回到`createMainScene`方法，在创建主场景之后，添加以下代码：\n\
  \n```\nmainScene!.rootNode.addChildNode(createFloorNode())\n```\n\n现在运行游戏，你会注意到太空人站在地面之上，而不是悬浮在空中，如图\
  \ 10-9 所示。\n\n![A330720_2_En_10_Fig9_HTML.jpg](img/A330720_2_En_10_Fig9_HTML.jpg)\n\
  \n**图 10-9.** 站在地面上的太空人\n\n现在运行游戏，你将能够围绕物体移动视图的视角（即摄像机），并确认你确实拥有一个 3D 场景。这是因为你将摄像机控制设置为`true`。使用捏合缩放和平移手势在场景中移动。如果你在模拟器中运行，请注意每秒帧数（fps），并观察它是否从未接近\
  \ 60 fps。在我的模拟器上，它从未超过 20 fps。这次，请在装有 iOS 10 的 iPhone 上运行游戏。现在当你移动摄像头时，你应该会看到 fps\
  \ 保持在接近 60 fps。这是否意味着你的小 iPhone 比 Mac 更强大？很可能不是。模拟器只是模拟不同的设备，以便作为开发者的你快速测试代码。然而，当你在真实设备上运行游戏时，你可以看到\
  \ SceneKit 的强大之处。SceneKit 使用 GPU 来渲染场景和节点。这也是苹果建议在将应用提交到 App Store 审核之前，始终在设备上运行应用的原因之一。\n\
  \n在 SceneKit 可用之前，你必须使用其他第三方库或 OpenGL 来实现这一点。要达到你现在用不到 50 行代码所完成的功能，可能需要数千行代码。\n\
  \n### 总结\n\n恭喜！你现在已经拥有了一个运行中的简单 3D 场景。在本章中，你学习到了 SceneKit 提供的一些强大功能。你创建了一个后续将继续构建的项目。在第\
  \ 11 章中，你将了解什么是场景图以及 SceneKit 如何使用场景图工作。你还将开始使用 SceneKit 的一些内置类，这些类将允许你创建游戏中将要使用的障碍物。\n\
  \n© James Goodwill and Wesley Matlock 2017  \nJames Goodwill 和 Wesley Matlock  \n\
  *Beginning Swift Games Development for iOS*  \n10.1007/978-1-4842-2310-9_11\n\n"
- "# 11. 场景与节点\n\nJames Goodwill¹ 和 Wesley Matlock²  \n(1) 美国科罗拉多州海兰兹牧场  \n(2) 美国密苏里州堪萨斯城\n\
  \n在本章中，你将学习 SceneKit 如何使用场景图来渲染场景中的对象。一旦你理解了场景图，你将进一步了解如何使用 SceneKit 的内置模型。你将使用这些模型在游戏中创建障碍物，供英雄躲避，并为敌人提供掩护。\n\
  \n\n\n### 场景图 (Scene Graph)\n\n基本上，场景图 `SCNScene` 是场景图树形结构的基础，如图 11-1 所示。在图形编程的早期，场景图是用场景数据建模的，其行为是通过过程化方式创建的，这通常会导致代码混乱。开发者无法在整个应用程序中轻松地复用节点或其他对象。通过关注点分离，你可以在场景及其渲染方式之间建立清晰的边界。图\
  \ 11-1 展示了这种结构的一个示例。\n\n![A330720_2_En_11_Fig1_HTML.gif](img/A330720_2_En_11_Fig1_HTML.gif)\n\
  图 11-1. 场景图示例\n\n场景中的每个节点都有一个父节点，除了最顶层的节点——换句话说，即根节点。见图 11-2。\n\n![A330720_2_En_11_Fig2_HTML.gif](img/A330720_2_En_11_Fig2_HTML.gif)\n\
  图 11-2. 场景节点\n\n包含其他子节点的节点被视为组节点。在图 11-2 中，你可以看到一个父节点和几个子节点。\n\n-   节点树（组节点）就是在场景中呈现的内容。节点的位置由其父节点定义的坐标系确定。\n\
  -   叶节点是实际被渲染的节点。这些节点执行动画，并为节点树指定材质和光照。\n\n### SceneKit 内置模型类\n\nSceneKit 提供了创建沉浸式游戏所需的几乎所有基本几何体。你将使用这些简单的几何体来创建游戏的第一关，从而熟悉这些节点类型。\n\
  \n#### SCNGeometry 对象\n\nSceneKit 提供了几种不同的几何体。当你创建这些几何体中的任何一个时，其中心点位于其局部坐标系的原点。换句话说，如果你创建一个宽度、长度和高度均为\
  \ 20.0 的 `SCNBox`，这些数值将分别沿 x、y、z 轴分布在 10.0 和 –10.0 的位置。以下是 SceneKit 原始几何体类型列表：\n\
  \n-   ![A330720_2_En_11_Figa_HTML.jpg](img/A330720_2_En_11_Figa_HTML.jpg) `SCNBox`：这是一个基本的六面多面体，各个面均为矩形。如果需要，你还可以为每个面单独创建\
  \ `SCNMaterial`。\n-   ![A330720_2_En_11_Figb_HTML.jpg](img/A330720_2_En_11_Figb_HTML.jpg)\
  \ `SCNCapsule`：这是一个两端带有半球形封盖的圆柱体。你可以定义半球半径和高度。\n-   ![A330720_2_En_11_Figc_HTML.jpg](img/A330720_2_En_11_Figc_HTML.jpg)\
  \ `SCNCone`：这是一个具有圆形底部的几何体，其侧面在圆心处收拢。通过指定底部的半径和侧面的高度来创建 `SCNCone`。\n-   ![A330720_2_En_11_Figd_HTML.jpg](img/A330720_2_En_11_Figd_HTML.jpg)\
  \ `SCNCylinder`：要创建 `SCNCylinder`，你需要指定半径和高度。\n-   ![A330720_2_En_11_Fige_HTML.jpg](img/A330720_2_En_11_Fige_HTML.jpg)\
  \ `SCNFloor`：这是一个沿 x 轴和 z 轴无限延伸的平面。\n-   ![A330720_2_En_11_Figf_HTML.jpg](img/A330720_2_En_11_Figf_HTML.jpg)\
  \ `SCNPlane`：这是一个沿 x 轴和 y 轴展开的单面表面。\n-   ![A330720_2_En_11_Figg_HTML.jpg](img/A330720_2_En_11_Figg_HTML.jpg)\
  \ `SCNPyramid`：初始化 `SCNPyramid` 时，你需要指定金字塔的高度、宽度和长度。\n-   ![A330720_2_En_11_Figh_HTML.jpg](img/A330720_2_En_11_Figh_HTML.jpg)\
  \ `SCNSphere`：它具有球体的几何形状。实例化 `SCNSphere` 时，你需要提供用于 `SCNSphere` 的半径。\n-   ![A330720_2_En_11_Figi_HTML.jpg](img/A330720_2_En_11_Figi_HTML.jpg)\
  \ `SCNTorus`：圆环体简单地说是围绕一个共面轴的圆，形状像甜甜圈。你需要为它的圆提供内半径和外半径。\n-   ![A330720_2_En_11_Figj_HTML.jpg](img/A330720_2_En_11_Figj_HTML.jpg)\
  \ `SCNTube`：这是一个管子或管道。你需要指定内半径、外半径和管子的高度。\n-   `SCNShape`：这种几何形状由贝塞尔路径创建。`SCNShape`\
  \ 让你对 3D 对象的形状有最大的控制权。\n-   `SCNText`：你需要提供一个 `NSString` 或 `NSAttributedString`，用于从该字符串创建一个\
  \ 3D 对象。\n\n如你所见，Apple 提供了你所需的大部分形状。你可以组合这些原始形状来创建复杂的对象。不过，对于这个游戏，目前你将继续使用基本几何体。让我们回到代码中，开始添加一些障碍物，让宇航员能够操纵飞船绕过它们以找到敌人。\n\
  \n### 添加可收集节点\n\n既然你已经对不同类型的几何节点有了一些了解，我们将把它们用作游戏第一关中简单的“可收集物”。让我们继续创建一些几何节点，作为角色可以收集的物品。首先，通过右键点击\
  \ `Swifystein3D` 文件夹并选择“新建文件”，或者选择 文件 ➤ 新建 ➤ 文件 来创建一个新文件。无论采用哪种方式，你都会进入文件模板选择界面，如图\
  \ 11-3 所示。\n\n![A330720_2_En_11_Fig3_HTML.jpg](img/A330720_2_En_11_Fig3_HTML.jpg)\n\
  图 11-3. 新建文件\n\n在下一个屏幕上，将你的文件命名为 `Collectable.swift`，如图 11-4 所示。\n\n![A330720_2_En_11_Fig4_HTML.jpg](img/A330720_2_En_11_Fig4_HTML.jpg)\n\
  图 11-4. 创建新的 Swift 文件\n\n现在你有了一个新的空白文件，用于创建游戏关卡中的可收集物品。你需要做的第一件事是导入 `SceneKit`，因为你需要创建\
  \ `SCNNodes`。然后，创建 `Collectable` 类；完成后，你的文件应类似于清单 11-1 中的代码：\n\n```swift\nimport\
  \ Foundation\nimport SceneKit\nclass Collectable {\n\n}\n```\n清单 11-1. Collectable\
  \ 类\n\n在这个类中，你将以不同的方式做一些事情：创建类级方法。如果你熟悉其他语言，这与静态方法类似。这样做是为了让你接触另一种编码范式。对于第一个可收集物，让我们创建一个\
  \ `pyramidNode()` 方法，如清单 11-2 所示：\n\n```swift\nclass func pyramidNode() -> SCNNode\
  \ {\n    // 1 创建 SCNGeometry 类型\n    let pyramid = SCNPyramid(width: 3.0, height:\
  \ 6.0, length: 3.0)\n    // 2 使用几何类型创建节点\n    let pyramidNode = SCNNode(geometry:\
  \ pyramid)\n    pyramidNode.name = \"pyramid\"\n    //3 设置节点位置\n    let position\
  \ = SCNVector3Make(30, 0, -40)\n    pyramidNode.position = position\n    return\
  \ pyramidNode\n}\n```\n清单 11-2. 金字塔节点\n\n现在让我们详细看看这个方法中发生了什么：\n\n1.  首先，你使用 `SCNPyramid`\
  \ `SCNGeometry` 类型创建了一个几何对象。这允许你像操作任何 `SCNNode` 一样轻松地操作这个金字塔。\n2.  接下来，你基于金字塔对象创建了一个\
  \ `SCNNode`。你还将此节点命名为 `pyramid`。给节点命名将有助于我们在本书后面学习碰撞检测时使用。\n3.  现在，你为 `pyramidNode`\
  \ 在场景中指定了一个位置。\n\n\n\n创建几何体节点大概就是这样。接下来，你需要将其添加到场景中，这样在运行游戏时才能实际看到它。前往 `GameViewController`\
  \ 类。在该类中找到 `createMainScene()` 方法。你需要在 `mainScene.rootNode.addChildNode(createFloorNode())`\
  \ 之后添加 `mainScene.rootNode.addChildNode(Collectable.pyramidNode())`。务必在 `createFloorNode()`\
  \ 之后添加这个新的子节点。添加完这行代码后，运行游戏。现在你会看到一个金字塔位于英雄角色后面不远处，如图 11-5 所示。\n\n![A330720_2_En_11_Fig5_HTML.jpg](img/A330720_2_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5. 金字塔节点\n\n好了，现在屏幕中央出现了一个金字塔。不过，它的外观并不太好看。我们还没讨论节点材质的问题。你将在下一章学习更多关于材质和\
  \ `SCNMaterial` 对象的知识，但至少应该先给这个金字塔以及后续创建的其他可收集物品添加一些颜色。回到 `Collectable` 类，找到 `pyramidNode`\
  \ 方法。在设置位置的那行代码之后，继续添加如下代码：\n\n```\n// 4 给节点添加颜色\npyramidNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.blue\npyramidNode.geometry?.firstMaterial?.shininess = 1.0\n```\n\n\
  这里所做的就是将 `firstMaterial` 设置为蓝色。请记住，我们会在下一章更详细地讲解 `diffuse` 和 `shininess`。目前，我们只是让\
  \ `pyramidNode` 发出蓝色光泽。如果你想使用其他 `UIColor` 的默认颜色，可以随意更换。实际上，稍后你还会创建几种其他几何体类型的节点，并为它们设置不同的颜色。\n\
  \n现在再运行游戏，你的金字塔会变成蓝色，或者你设置的其他任何颜色。你现在已经掌握了创建基本 SceneKit 几何体对象的基础知识。接下来，请确保你仍在 `Collectable`\
  \ 类中，并按照 `pyramidNode` 中的相同模式创建更多对象。让我们继续添加另一个可收集物品，创建一个球体节点。在 `pyramidNode` 方法下方，添加代码清单\
  \ 11-3 所示的代码。\n\n```\nclass func sphereNode() -> SCNNode {\n    // 1 创建 SCNGeometry\
  \ 类型\n    let sphere = SCNSphere(radius: 6.0)\n    // 2 使用几何体类型创建节点\n    let sphereNode\
  \ = SCNNode(geometry: sphere)\n    sphereNode.name = \"sphere\"\n    //3 设置节点位置\n\
  \    let position  = SCNVector3Make(35, 0, -60)\n    sphereNode.position = position\n\
  \    // 4 给节点添加颜色\n    sphereNode.geometry?.firstMaterial?.diffuse.contents = UIColor.red\n\
  \    sphereNode.geometry?.firstMaterial?.shininess = 1.0\n    return sphereNode\n\
  }\n```\n\n代码清单 11-3. 球体节点\n\n现在有了这个方法，接下来需要将其添加到场景中。再次前往 `GameViewController`，并将它添加到\
  \ `mainScene` 中。暂时先将 `addChildNode(Collectable.pyramidNode())` 注释掉，然后在下方为球体节点添加如下代码：\n\
  \n```\n// mainScene.rootNode.addChildNode(Collectable.pyramidNode())\nmainScene.rootNode.addChildNode(Collectable.sphereNode())\n\
  ```\n\n现在运行游戏，你会看到一个红色球体漂浮在地板上，如图 11-6 所示。你可能需要移动并缩放摄像头视角才能近距离看到球体。\n\n![A330720_2_En_11_Fig6_HTML.jpg](img/A330720_2_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6. 球体节点\n\n我们确信你已经注意到球体穿过了地板。这正是我们不希望出现的情况。这些几何体类型中有几种，其轴线位于物体的中心。因此，在这种情况下，如果你想让它悬浮在地板之上，就需要调整\
  \ y 轴坐标，使其等于球体的半径。在 `Collectable` 类中，将 `sphereNode.position` 改为：`let position =\
  \ SCNVector3Make(35, 6, -50)`。这次重新运行游戏，你会看到球体按我们期望的那样悬浮在地板上方，如图 11-7 所示。\n\n![A330720_2_En_11_Fig7_HTML.jpg](img/A330720_2_En_11_Fig7_HTML.jpg)\n\
  \n图 11-7. 悬浮的球体节点\n\n请随意调整位置，观察节点在场景中如何移动。现在，你将在 `Collectable` 类中添加更多几何体节点类型。代码清单\
  \ 11-4 为该类添加了立方体、管状体、圆柱体和环面体。\n\n```\nclass func boxNode() -> SCNNode {\n    //\
  \ 1 创建 SCNGeometry 类型\n    let box = SCNBox(width: 3, height: 3, length: 3, chamferRadius:\
  \ 0)\n    // 2 使用几何体类型创建节点\n    let boxNode = SCNNode(geometry: box)\n    boxNode.name\
  \ = \"box\"\n    //3 设置节点位置\n    let position  = SCNVector3Make(20, 1.5, -20)\n\
  \    boxNode.position = position\n    // 4 给节点添加颜色\n    boxNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.brown\n    boxNode.geometry?.firstMaterial?.shininess = 1.0\n    return\
  \ boxNode\n}\n\nclass func tubeNode() -> SCNNode {\n    // 1 创建 SCNGeometry 类型\n\
  \    let tube = SCNTube(innerRadius: 1, outerRadius: 1.5, height: 2.0)\n    // 2\
  \ 使用几何体类型创建节点\n    let tubeNode = SCNNode(geometry: tube)\n    tubeNode.name = \"\
  tube\"\n    //3 设置节点位置\n    let position  = SCNVector3Make(-10, 0.75, -75)\n   \
  \ tubeNode.position = position\n    // 4 给节点添加颜色\n    tubeNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.yellow\n    tubeNode.geometry?.firstMaterial?.shininess = 1.0\n    return\
  \ tubeNode\n}\n\nclass func cylinderNode() -> SCNNode {\n    // 1 创建 SCNGeometry\
  \ 类型\n    let cylinder = SCNCylinder(radius: 3, height: 8)\n    // 2 使用几何体类型创建节点\n\
  \    let cylinderNode = SCNNode(geometry: cylinder)\n    cylinderNode.name = \"\
  cylinder\"\n    //3 设置节点位置\n    let position = SCNVector3Make(0, 4, -25)\n    cylinderNode.position\
  \ = position\n    // 4 给节点添加颜色\n    cylinderNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.green\n    cylinderNode.geometry?.firstMaterial?.shininess = 1.0\n \
  \   return cylinderNode\n}\n\nclass func torusNode() -> SCNNode {\n    // 1 创建 SCNGeometry\
  \ 类型\n    let torus = SCNTorus(ringRadius: 7, pipeRadius: 2)\n    // 2 使用几何体类型创建节点\n\
  \    let torusNode = SCNNode(geometry: torus)\n    //3 设置节点位置\n    let position\
  \ =  SCNVector3Make(75, 1, -80)\n    torusNode.position = position\n    // 4 给节点添加颜色\n\
  \    torusNode.geometry?.firstMaterial?.diffuse.contents = UIColor.orange\n    torusNode.geometry?.firstMaterial?.shininess\
  \ = 1.0\n    return torusNode\n}\n```\n\n代码清单 11-4. Collectable 类的更多几何体节点类型\n\n\
  完成 `Collectable` 类的更新后，别忘了你还需要在 `GameViewController` 的 `mainScene` 中添加它们：\n\n```\n\
  let mainScene = SCNScene()\nmainScene.rootNode.addChildNode(createFloorNode())\n\
  mainScene.rootNode.addChildNode(Collectable.pyramidNode())\nmainScene.rootNode.addChildNode(Collectable.sphereNode())\n\
  mainScene.rootNode.addChildNode(Collectable.boxNode())\nmainScene.rootNode.addChildNode(Collectable.tubeNode())\n\
  mainScene.rootNode.addChildNode(Collectable.cylinderNode())\nmainScene.rootNode.addChildNode(Collectable.torusNode())\n\
  ```\n\n现在运行游戏，效果应该与图 11-8 类似。你需要移动摄像头（平移并缩小视角）才能看到所有物体。\n\n![A330720_2_En_11_Fig8_HTML.jpg](img/A330720_2_En_11_Fig8_HTML.jpg)\n\
  \n图 11-8. 几何体节点布局——可收集物品\n\n目前它们还没什么用，看起来也不是很有趣。你可以自由调整它们的大小和位置，以便更好地理解这些变量如何改变物体。花些时间调整这些物体的位置，制作属于你自己的可收集物品布局。在示例代码中，我们将这些物体放置在一个大圆圈中。\n\
  \n\n\n*   `Pyramid`（金字塔）位置：`let position = SCNVector3Make(0, 0, 200)`\n*   `Sphere`（球体）位置：`let\
  \ position = SCNVector3Make(0, 6, -200)`\n*   `Box`（立方体）位置：`let position = SCNVector3Make(200,\
  \ 3.0, 0)`\n*   `Tube`（管道）位置：`let position = SCNVector3Make(-200, 1.5, 0)`\n*  \
  \ `Cylinder`（圆柱体）位置：`let position = SCNVector3Make(300, 8, 300)`\n*   `Toru`（环面）位置：`let\
  \ position = SCNVector3Make(-300, 0, 300)`\n\n### 总结\n\n在本章中，你进一步了解了 SceneKit 如何利用久经考验的场景图来渲染对象。你还深入了解了\
  \ SceneKit 库中提供的原始对象。随着你在本书中的不断深入学习，你将扩展这些原始对象，创建出一个简单但有趣的游戏。在第 12 章中，你将学习如何操纵摄像机，从而控制用户的视角。另一个需要重点研究的方面是，光照和材质如何彻底改变游戏的外观和感觉。©\
  \ James Goodwill 和 Wesley Matlock 2017 James Goodwill 和 Wesley Matlock 《Beginning\
  \ Swift Games Development for iOS》10.1007/978-1-4842-2310-9_12\n\n"
- "# 12. SceneKit 中的光照、摄像机和材质效果\n\nJames Goodwill (1) 和 Wesley Matlock (2) (1) 美国科罗拉多州海兰兹牧场\
  \ (2) 美国密苏里州堪萨斯城\n\n在本章中，你将探索摄像机以及摄像机的不同视角。你还将学习场景光照的工作原理，以及 SceneKit 中可用的不同类型的光源。除了光照，你还将学习对象的材质在决定对象如何被照亮以及如何呈现给用户方面所起的重要作用。\n\
  \n### SceneKit 摄像机用法\n\n摄像机对象用于从摄像机位置所在的视角将场景呈现给用户。你可以使用摄像机对象来设置和调整视野、近远可见距离以及摄像机的焦距。图\
  \ 12-1 展示了视野的主要参数。这些变量如下：\n\n*   `xFOV`：这是 x 轴可见的角度。\n*   `yFOV`：这是 y 轴可见的角度。\n\
  *   `zNear`：此参数是摄像机与表面之间的最小距离。任何比此距离更靠近摄像机的对象都不会显示。\n*   `zFar`：此参数是摄像机与表面之间的最大距离。任何超出此距离的对象都不会显示。\n\
  \n![图 12-1. 摄像机视野示意图](img/A330720_2_En_12_Fig1_HTML.gif) SceneKit 提供了两种不同类型的摄像机，你可以在游戏中使用。\n\
  \n*   **正交投影**：这种类型的摄像机将三维环境表示为二维。你暂时不会使用这种摄像机。\n*   **透视投影**：这种类型的摄像机主要用于 3D 第一人称射击游戏，就像你正在编写的这种。\n\
  \n代码编写的下一步是找到 `createMainScene()` 方法。在此方法中，你将添加一个对 `createHeroCamera()` 的调用。你需要在\
  \ `mainScene` 变量初始化之后的任意位置添加此方法调用。此时你应该会遇到一个未解决的错误；现在你将创建缺少的 `createHeroCamera()`\
  \ 方法，如代码清单 12-1 所示。\n\n```swift\nfunc createHeroCamera() {\n    let cameraNode =\
  \ mainScene.rootNode.childNode(withName: \"mainCamera\", recursively: true)\n  \
  \  cameraNode?.camera?.zFar = 500\n    cameraNode?.position = SCNVector3(x: 50,\
  \ y: 0, z: -20)\n    cameraNode?.rotation = SCNVector4(x: 0, y: 0, z: 0, w: Float.pi/4\
  \ * 0.5)\n    cameraNode?.eulerAngles = SCNVector3(x: -70, y: 0, z: 0) //Float(-M_PI_4*0.75))\n\
  \    let heroNode = mainScene.rootNode.childNode(withName: \"hero\", recursively:\
  \ true)\n    heroNode?.addChildNode(cameraNode!)\n    mainScene.rootNode.childNode(withName:\
  \ \"hero\", recursively: true)?.addChildNode(cameraNode!)\n}\n```\n\n**代码清单 12-1.**\
  \ `createHeroCamera()` 方法 让我们详细看看这段代码：\n\n*   首先将 `cameraNode` 初始化为一个场景节点（`SCNNode()`）。\n\
  *   初始化节点后，再为该节点初始化摄像机参数。\n*   对于此摄像机，你需要设置 `zFar` 参数。`zFar` 参数是摄像机与可见表面之间的最大距离。\n\
  *   摄像机还需要一个位置；你将其位置设置为初始时略在太空人后方和上方。在后续的游戏开发中，你将调整此位置，使其跟随太空人移动。\n*   现在你需要设置摄像机的旋转。目前摄像机是直指向前的；但是，由于你将摄像机放在了太空人的略上方，你需要将其稍微向下旋转。这正是设置\
  \ `SCNVector4` 中的 `w:` 参数所起的作用。\n\n现在你已完成此方法，错误应该消失了。如果你现在运行游戏，你将看到摄像机被设置在太空人的上方和后方。\n\
  \n\n\n### 点亮场景\n\n随便问一位导演或摄影师，他们都会告诉你，场景中最重要的元素之一就是照明。你很幸运，因为 SceneKit 提供了几种可操控的照明类型，能让你的场景脱颖而出。在\
  \ SceneKit 中，你将使用`SCNLight`对象在场景中创建光源。你需要将光源类型设置为 SceneKit 提供的四种不同光源类型之一。\n\n* \
  \  `SCNLightTypeAmbient`：这种光会从所有方向照亮场景；光源的位置或方向对场景照明没有影响。![A330720_2_En_12_Figa_HTML.jpg](img/A330720_2_En_12_Figa_HTML.jpg)\n\
  *   `SCNLightTypeOmni`：这种光会从某个点照亮场景。![A330720_2_En_12_Figb_HTML.jpg](img/A330720_2_En_12_Figb_HTML.jpg)\n\
  *   `SCNLightTypeDirectional`：这种光会从同一方向均匀地照亮场景中所有物体。![A330720_2_En_12_Figc_HTML.jpg](img/A330720_2_En_12_Figc_HTML.jpg)\n\
  *   `SCNLightTypeSpot`：这种光会像摇滚明星一样照亮你的场景！![A330720_2_En_12_Figd_HTML.jpg](img/A330720_2_En_12_Figd_HTML.jpg)\n\
  \n所以，这些就是你在游戏中能够使用的光源类型。请注意，物体的材质会影响其被照亮的方式。此外，你可以完全控制光的颜色。SceneKit 在利用照明更新场景时，确实遵循一些“规则”，以确保场景高效显示：\n\
  \n*   照明只影响场景中移动的物体。\n*   SceneKit 每个节点最多只使用八个光源，因此创建超过这个数量是多余的。实际上，Apple 建议最多使用三个照明效果和一个环境光。\n\
  \n我们相信你已经准备好动手写代码了。对于你的主角，你将创建一个漂亮的环境光和一个聚光灯，这样他就永远不会身处黑暗。为了方便起见，现在你将在`GameViewController`中控制所有照明。如果你没有打开`GameViewController`，请打开它。你需要为聚光灯创建一个新的类变量。在类的顶部，继续创建你的新变量：`var\
  \ spotLight: SCNNode!`。创建好这个变量后，你就可以创建`setupLighting()`方法，如代码清单 12-2 所示。\n\n```\n\
  func setupLighting(scene:SCNScene) {\n    let ambientLight = SCNNode()\n    ambientLight.light\
  \ = SCNLight()\n    ambientLight.light!.type = SCNLight.LightType.ambient\n    ambientLight.light!.color\
  \ = UIColor.white\n    scene.rootNode.addChildNode(ambientLight)\n\n    let lightNode\
  \ = SCNNode()\n    lightNode.light = SCNLight()\n    lightNode.light!.type = SCNLight.LightType.spot\n\
  \    lightNode.light!.castsShadow = true\n    lightNode.light!.color = UIColor(white:\
  \ 0.8, alpha: 1.0)\n    lightNode.position = SCNVector3Make(0, 80, 30)\n    lightNode.rotation\
  \ = SCNVector4Make(1, 0, 0, Float(-M_PI/2.8))\n    lightNode.light!.spotInnerAngle\
  \ = 0\n    lightNode.light!.spotOuterAngle = 50\n    lightNode.light!.shadowColor\
  \ = UIColor.black\n    lightNode.light!.zFar = 500\n    lightNode.light!.zNear =\
  \ 50\n    scene.rootNode.addChildNode(lightNode)\n}\n```\n\n代码清单 12-2. `setupLighting()`\
  \ 方法\n\n首先，你创建了`SCNLight`和`SCNNode`对象。如你所见，你将光源类型设置为该光对象。`SCNLightTypeAmbient`类型的光源无需设置方向、位置、衰减、聚光角度或阴影，因为环境光是为整个场景服务的。别忘了在`createMainScene()`方法中调用此方法，类似`setupLighting(mainScene)`这样的形式。\n\
  \n### 材质\n\n现在让我们来看看 SceneKit 如何管理物体的视觉属性。SceneKit 使用`SCNMaterial`类来控制`SCNNode`几何体的照明和着色属性。SceneKit\
  \ 提供了八种不同的属性供你设置这些属性：\n\n*   **漫反射（Diffuse）**：漫反射着色是指向所有方向反射的光量和颜色。![A330720_2_En_12_Fige_HTML.jpg](img/A330720_2_En_12_Fige_HTML.jpg)\n\
  *   **环境光（Ambient）**：环境光以固定的强度和固定的颜色从表面的所有点反射。如果场景中没有环境光对象，该属性对节点没有影响。![A330720_2_En_12_Figf_HTML.jpg](img/A330720_2_En_12_Figf_HTML.jpg)\n\
  *   **高光（Specular）**：高光是直接反射给用户的光，类似于镜子反射光的方式。它是物体上看起来发亮的光斑。此属性默认是黑色，会使材质看起来暗淡无光。![A330720_2_En_12_Figg_HTML.jpg](img/A330720_2_En_12_Figg_HTML.jpg)\n\
  *   **法线（Normal）**：法线照明是一种在材质表面创建光照效果的技术。它基本上试图计算出材质的凹凸纹理，以提供更真实的光照效果。![A330720_2_En_12_Figh_HTML.jpg](img/A330720_2_En_12_Figh_HTML.jpg)\n\
  *   **反射（Reflective）**：反射照明是反射环境中的镜面表面。该表面实际上并不会反射场景中的其他物体。![A330720_2_En_12_Figi_HTML.jpg](img/A330720_2_En_12_Figi_HTML.jpg)\n\
  *   **自发光（Emission）**：自发光是表面发出的颜色。默认情况下，此属性设置为黑色，意味着没有光被反射。如果你提供一种颜色，该颜色就会被反射；如果你想更花哨一点，还可以提供一张图片。SceneKit\
  \ 将根据材质使用这张图片来提供“发光”效果。![A330720_2_En_12_Figj_HTML.jpg](img/A330720_2_En_12_Figj_HTML.jpg)\n\
  *   **透明（Transparent）**：透明是材质的不透明度。该属性主要用于使材质的部分区域不可见。![A330720_2_En_12_Figk_HTML.jpg](img/A330720_2_En_12_Figk_HTML.jpg)\n\
  *   **倍增（Multiply）**：该属性在所有其他属性计算之后计算，为材质添加一种颜色。![A330720_2_En_12_Figl_HTML.jpg](img/A330720_2_En_12_Figl_HTML.jpg)\n\
  \n### 为障碍物应用材质\n\n\n\n现在你已经对 `SCNMaterial` 的属性有了基本了解，让我们转到 `Collectible` 类，为你的可收集物添加一些材质。首先，将\
  \ `PyramidNode` 设置为漂亮的蓝色，如代码清单 12-3 所示。\n\n```\npyramidNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.blue\npyramidNode.geometry?.firstMaterial?.shininess = 1.0\n```\n\n\
  **代码清单 12-3.** PyramidNode 材质\n\n在这个游戏中，你会保持简单，只使用一种材质。SceneKit 通过 `firstMaterial`\
  \ 对象提供了便捷的访问方式。你将 `diffuse` 内容设置为蓝色。同时希望这个物体有光泽，因此提高 `shininess` 至 1。你可以尝试不同的颜色和光泽度，观察这些属性如何影响你的\
  \ `PyramidNode`。\n\n接下来是你的 `SphereNode`。代码清单 12-4 演示了如何添加一些元素使其看起来更像个微缩地球。\n\n```\n\
  sphereNode.geometry?.firstMaterial?.diffuse.contents = #imageLiteral(resourceName:\
  \ \"earthDiffuse\")\nsphereNode.geometry?.firstMaterial?.ambient.contents = #imageLiteral(resourceName:\
  \ \"earthAmbient\")\nsphereNode.geometry?.firstMaterial?.specular.contents = #imageLiteral(resourceName:\
  \ \"earthSpecular\")\nsphereNode.geometry?.firstMaterial?.normal.contents = #imageLiteral(resourceName:\
  \ \"earthNormal\")\nsphereNode.geometry?.firstMaterial?.diffuse.mipFilter = SCNFilterMode.linear\n\
  sphereNode.geometry?.firstMaterial?.shininess = 1.0\n```\n\n**代码清单 12-4.** GlobeNode\
  \ 光照增强\n\n通过 `GlobeNode`，你进一步扩展了 `NSMaterial` 的使用，创建了一个更逼真的地球。查看每个 JPG 文件，你会看到这些文件如何影响\
  \ SceneKit 和 `NSMaterial` 的输出。最新版本的 Xcode 允许你使用 JPG 文件的图像字面量。因此，输入此代码时，你无需包含 `#imageLiteral(resourceName:\
  \ \"earthSpecular\")`。你只需开始输入图像文件的名称，例如 `earthSpecular`，Xcode 就会自动显示该图像。为 `diffuse`\
  \ 属性添加 `mipFilter` 可以让 SceneKit 在以更小尺寸渲染纹理图像时提升性能。\n\n现在，你将向 `BoxNode` 添加一些材质。SceneKit\
  \ 允许你向 `materials` 属性应用一个数组，并将其应用到几何体上。对于 `BoxNode`，你将应用六种不同的材质，使其拥有六个不同的面，如代码清单\
  \ 12-5 所示。\n\n```\nvar materials = [SCNMaterial]()\nlet boxImage = \"boxSide\"\n\
  for index in 1...6 {\n    let material = SCNMaterial()\n    material.diffuse.contents\
  \ = UIImage(named: boxImage + String(index))\n    materials.append(material)\n}\n\
  boxNode.geometry?.materials = materials\n```\n\n**代码清单 12-5.** BoxNode 材质\n\n对于其他障碍物类型，添加颜色的方式与处理\
  \ `PyramidNode` 类似。代码清单 12-6 是其余障碍物的代码，如果你手头有可用的图片，可以自由使用不同的颜色和图像。\n\n```\nclass\
  \ func tubeNode() -> SCNNode {\n    // 1 创建 SCNGeometry 类型\n    let tube = SCNTube(innerRadius:\
  \ 8, outerRadius: 10.0, height: 10.0)\n    // 2 使用几何体类型创建节点\n    let tubeNode =\
  \ SCNNode(geometry: tube)\n    tubeNode.name = \"tube\"\n    // 3 设置节点位置\n    let\
  \ position  = SCNVector3(-200, 1.5, 0)\n    tubeNode.position = position\n    //\
  \ 4 为节点添加颜色\n    tubeNode.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n\
  \    tubeNode.geometry?.firstMaterial?.shininess = 1.0\n    return tubeNode\n}\n\
  \nclass func cylinderNode() -> SCNNode {\n    // 1 创建 SCNGeometry 类型\n    let cylinder\
  \ = SCNCylinder(radius: 6, height: 16)\n    // 2 使用几何体类型创建节点\n    let cylinderNode\
  \ = SCNNode(geometry: cylinder)\n    cylinderNode.name = \"cylinder\"\n    // 3\
  \ 设置节点位置\n    let position = SCNVector3(300, 8, 300)\n    cylinderNode.position\
  \ = position\n    // 4 为节点添加颜色\n    cylinderNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.green\n    cylinderNode.geometry?.firstMaterial?.shininess = 0.5\n \
  \   return cylinderNode\n}\n\nclass func torusNode() -> SCNNode {\n    // 1 创建 SCNGeometry\
  \ 类型\n    let torus = SCNTorus(ringRadius: 14, pipeRadius: 4)\n    // 2 使用几何体类型创建节点\n\
  \    let torusNode = SCNNode(geometry: torus)\n    // 3 设置节点位置\n    let position\
  \ =  SCNVector3(-300, 3, -300)\n    torusNode.position = position\n    // 4 为节点添加颜色\n\
  \    torusNode.geometry?.firstMaterial?.diffuse.contents = UIColor.orange\n    torusNode.geometry?.firstMaterial?.shininess\
  \ = 1.0\n    return torusNode\n}\n```\n\n**代码清单 12-6.** 其余障碍物材质\n\n### 总结\n\n本章内容非常丰富。你学习了\
  \ SceneKit 提供的几种不同类型的照明。花些时间在代码库中进行实验，看看光照的细微变化如何影响游戏的可玩性。另一个学习体验是 SceneKit 如何使用材质让你的物体看起来更真实或更具未来感。在第\
  \ 13 章中，你将研究 SceneKit 如何通过动画来移动物体。\n\n© James Goodwill 和 Wesley Matlock 2017  \n\
