  \    }\n}\n```\n\n将这些节点移动到它们自己的类中，使得每个节点的重用更加容易，同时也清理了`GameScene`。\n\n### 重用纹理\n\
  \n\n\n### 使用单一的 `SKTextureAtlas` 实例\n\n另一个最佳实践是使用单一 `SKTextureAtlas` 实例来加载所有精灵图像，并在设置所有精灵的纹理时重复使用该图集。第一步是创建一个\
  \ `SKTextureAtlas` 并将其传递给节点，以便它们可以检索自己的纹理。\n\n在 `GameScene` 类的第一个 `init()` 方法之前立即添加以下代码行：\n\
  \n```swift\nlet textureAtlas = SKTextureAtlas(named: \"sprites.atlas\")\n```\n\n\
  创建纹理图集后，你需要修改每个 `SKSpriteNode` 的 `init()` 方法，使其接受一个 `SKTextureAtlas` 作为参数。一旦 `SKSpriteNode`\
  \ 获得了对 `SKTextureAtlas` 的引用，你就可以更改每个节点中的纹理加载代码，以使用这个传入的 `textureAtlas`。\n\n以下 `init()`\
  \ 方法展示了在 `SpaceMan` 类中进行的这一修改：\n\n```swift\ninit(textureAtlas: SKTextureAtlas) {\n\
  \    let texture = textureAtlas.textureNamed(\"Player\")\n    super.init(texture:\
  \ texture, color: UIColor.clear, size: texture.size())\n    physicsBody = SKPhysicsBody(circleOfRadius:\
  \ size.width / 2)\n    physicsBody?.isDynamic = false\n    physicsBody?.linearDamping\
  \ = 1.0\n    physicsBody?.allowsRotation = false\n    physicsBody?.categoryBitMask\
  \ = CollisionCategoryPlayer\n    physicsBody?.contactTestBitMask =\n        CollisionCategoryPowerUpOrbs\
  \ | CollisionCategoryBlackHoles\n    physicsBody?.collisionBitMask = 0\n}\n```\n\
  \n请注意，`init()` 方法的参数列表现在接受一个 `SKTextureAtlas` 参数，并且 `init()` 方法的第一行使用这个 `SKTextureAtlas`\
  \ 来加载 `Player` 纹理。另外注意，`init()` 方法不再重写默认的 `init()`，因此我们去掉了 `override` 关键字。\n\n对\
  \ `SpaceMan.swift` 的 `init()` 方法进行此更改，然后我们回到 `GameScene` 类并更改 `playerNode` 的声明。要使用新的\
  \ `SpaceMan.init()` 方法，你需要做一些更改。\n\n在 `GameScene` 类中，首先将类顶部的 `playerNode` 构造代码更改为如下所示：\n\
  \n```swift\nvar playerNode: SpaceMan!\n```\n\n接下来，在 `init()` 方法中添加一行代码，用于用正确的 `SpaceMan`\
  \ `SKSpriteNode` 实例来初始化 `playerNode`。在设置 `playerNode.position` 的代码上方，添加以下行：\n\n\
  ```swift\nplayerNode = SpaceMan(textureAtlas: textureAtlas)\n```\n\n完成所有 `SpaceMan`\
  \ 的更改后，我们继续对 `Orb` 和 `BlackHole` 类进行相同的修改。首先，更改 `Orb` 的 `init()` 方法，使其接受一个 `SKTextureAtlas`：\n\
  \n```swift\ninit(textureAtlas: SKTextureAtlas) {\n    let texture = textureAtlas.textureNamed(\"\
  PowerUp\")\n    super.init(texture: texture, color: UIColor.clear, size: texture.size())\n\
  \    physicsBody = SKPhysicsBody(circleOfRadius: size.width / 2)\n    physicsBody?.isDynamic\
  \ = false\n    physicsBody?.categoryBitMask = CollisionCategoryPowerUpOrbs\n   \
  \ physicsBody?.collisionBitMask = 0\n    name = \"POWER_UP_ORB\"\n}\n```\n\n更改 `Orb`\
  \ 的 `init()` 方法后，将 `GameScene` 的 `addOrbsToForeground()` 方法修改为如下所示：\n\n```swift\n\
  func addOrbsToForeground() {\n    var orbNodePosition =\n        CGPoint(x: playerNode.position.x,\
  \ y: playerNode.position.y + 100)\n    var orbXShift : CGFloat = -1.0\n    for _\
  \ in 0...49 {\n        let orbNode = Orb(textureAtlas: SKTextureAtlas(named: \"\
  sprites.atlas\"))\n        if orbNodePosition.x - (orbNode.size.width * 2) <= 0\
  \ {\n            orbXShift = 1.0\n        }\n        if orbNodePosition.x + orbNode.size.width\
