  \ 引言\n\n### 本书涵盖哪个版本的 Swift？\n\n本书涵盖 Swift 3 版本和 iOS 10 版本。随着新版本的发布，我们将在 Apress.com\
  \ 网站和詹姆斯·古德威尔的博客（[www.jgoodwill.org](http://www.jgoodwill.org)）上更新本书的源代码。\n\n###\
  \ 本书内容\n\n游戏应用是 Apple iTunes 应用商店中最受欢迎的类别之一。而新的 Swift 编程语言的引入，将使游戏开发对现有和未来的 iOS\
  \ 应用开发者更具吸引力且更易上手。为此，詹姆斯·古德威尔、韦斯利·马特洛克和 Apress 向您呈上这本《iOS Swift 游戏开发入门》。在本书中，您将学习如何将新\
  \ Swift 语言的基本元素应用于 iOS 的 2D 和 3D 游戏开发，并分别使用`SpriteKit`和`SceneKit`。\n\n### 你需要了解的知识\n\
  \n本书假定您已经基本了解如何使用`Xcode`创建 iPhone 应用程序。您还需要对 Apple 的新编程语言 Swift 3 有基本了解。我们假设您能够下载、安装并使用最新版本的`Xcode`来创建应用程序，并在\
  \ iPhone 模拟器上运行它。\n\n### 你需要具备的条件\n\n在硬件方面，您需要一台运行 Mountain Lion（OS X 10.8）或更高版本的\
  \ Intel-based Macintosh。在软件方面，您需要`Xcode 8.x`，因为这是当前包含 Swift 3 的版本。您可以从 App Store\
  \ 或 Apple 开发者网站（[`developer.apple.com`](http://developer.apple.com)）下载`Xcode`。\n\
  \n\n\n"
- '# 本书内容概览


  在第 1 章中，你将了解什么是 Sprite Kit，以及如何使用 Xcode 创建新的 Sprite Kit 游戏。然后，你将从头开始，着手创建一个 Sprite
  Kit 游戏的雏形。你将学习 `SKNode` 及其子类，并使用 `SKSpriteNode` 添加背景节点和玩家节点。在第 2 章中，我们将稍作停顿，让你更深入地了解
  Sprite Kit 场景，包括场景的构建方式以及构建顺序为何会影响你的游戏。本章将以讨论 Sprite Kit 坐标系以及与 `SKNode` 相关的锚点来结束。在第
  3 章中，你将使用 Sprite Kit 的物理引擎和碰撞检测。本章将从讨论 `SKPhysicsBody`（用于模拟碰撞检测的类）开始。然后，你将在游戏世界中开启重力，并观察它如何影响节点。之后，你将添加一个触摸响应器，将
  `playerNode` 推入空中，最后你将学习如何处理节点碰撞。在第 4 章中，你将开始为游戏添加一些实际功能。首先，你会对当前的 `GameScene` 做一些小的改动。之后，你将添加更多的轨道节点以供碰撞。接着，你将向场景中添加滚动功能，使玩家看起来像是在太空中飞行收集球体。最后，你将开始使用手机的加速度计来让玩家沿
  x 轴移动。在第 5 章中，为了增强可玩性，你将最后一次重构轨道节点的布局。之后，你将学习如何使用 `SKAction` 让 `SKSpriteNode` 在场景中来回移动，然后让同一个节点无限旋转。本章将以探讨如何使用着色动作给
  `SKSpriteNode` 添加色彩效果来结束。在第 6 章中，你将了解如何定义粒子发射器以及如何在 Sprite Kit 游戏中利用它们。之后，你将学习如何在每次对
  `physicsBody` 施加冲量时，使用它们为 `playerNode` 添加引擎尾迹。在第 7 章中，你将看到如何使用 `SKLabelNode` 向 Sprite
  Kit 游戏添加文本。具体来说，你将学习如何添加一个标签来记录太空人剩余的冲量次数，然后你将学习如何为游戏添加计分功能，以记录太空人收集的球体数量。在第 8 章中，你将学习如何使用
  Sprite Kit 的 `SKTransition` 类实现场景转换。你将了解 Sprite Kit 为你提供的几种不同类型的内置转换。你还将看到如何在转换过程中控制每个场景。在本章末尾，你将运用新学到的知识，为你的
  SuperSpaceMan 游戏添加一个菜单场景。在第 9 章中，你将学习一些 Sprite Kit 的最佳实践；具体来说，你将看到如何创建自己的 `SKSpriteNode`
  子类，以便更好地重用节点。然后，你将改进游戏，将所有精灵加载到一个单一的纹理图集中，以便在创建所有未来的精灵时引用。之后，你将把部分游戏数据外部化，以便设计师和测试人员可以调整游戏玩法。最后，你将清理节点树中所有已掉落屏幕底部的节点，以此结束本章。在第
  10 章中，你将了解什么是 Scene Kit，以及如何使用 Xcode 创建新的 Scene Kit 游戏。然后，你将从头开始，着手创建一个 Scene Kit
  游戏的雏形。你将通过 Scene Kit 入门指南学习 `SCNScene` 和 `SCNode`。在第 11 章中，你将进一步了解场景图和一些 Scene Kit
  的基础知识。你将通过从 Collada 文件中加载太空人来开始创建游戏。你还将学习 Scene Kit 的基本几何体，并将它们添加为太空人需要避开的物体。在第
  12 章中，你将了解 Scene Kit 如何使用光照以及 Scene Kit 中可用的光照类型。你还将研究材质如何添加到 `SCNNode` 上，以及摄像机如何在场景中使用。在第
  13 章中，你将学习游戏中物体动画的基础知识。你将看到几种不同的节点动画方式，为你提供多种动画实现方法。完成本章后，你所有的物体都将在场景中移动。在第 14 章中，你将学习场景内的碰撞检测。你将学习如何让太空人在场景中移动。一旦太空人开始移动，你将学习如何检测太空人撞到障碍物的情况。在第
  15 章中，你将学习如何在 Scene Kit 场景中使用 Sprite Kit 场景。本章将向你展示如何创建一个屏幕来显示计时器，该计时器将在用户开始游戏时启动。本章还将向你展示如何显示“游戏结束”屏幕，然后重新开始游戏。在第
  16 章中，你将学习 SceneKit 编辑器的基础知识。本章将使你对如何在编辑器中直观地创建场景和各种节点有一个基本的理解。这不需要编写代码，而是通过拖放节点并使用各种编辑器来操作物体。


