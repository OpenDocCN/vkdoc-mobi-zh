    \ 60 次（即每 1/60 秒更新一次）。由于更新频率很高，你不想占用游戏的主循环，因此创建了一个更新队列。这个队列接收一个闭包，并在每次加速度计更新时调用此函数。\n\
    \n当函数被调用时，你创建了一些变量来存储英雄的当前位置。为了简化，你检查 y 轴是否发生了特定量的变化。负方向变化表示用户向右倾斜了设备，因此需要将英雄向右移动；正方向变化表示用户向左倾斜了设备。这里使用了`0.20`作为阈值，如果你想要更精细的调整，可以减小这个数值。利用这些信息，你为英雄创建了一个移动一定距离的动画。\n\
    \n剩下的唯一事情就是将`setupAccelerometer()`调用添加到`GameViewController`的`viewDidLoad()`方法中。完成所有这些后，又是一个运行游戏并查看成果的好时机。当英雄可以通过触摸设备移动时，向左或向右倾斜设备，你会看到英雄朝对应方向移动。你可以调整一些变量让他移动得更快或更慢。你应该返回并修改渲染函数中的`moveDistance`，看看这对移动有何影响。同时，调整`setupAccelerometer`函数中的`threshold`，观察设备响应如何变化。\n\
    \n## 总结\n\n在本章中，你做了大量工作来让太空人移动起来。你还让太空人与物体发生碰撞，而不是穿过它们。在下一章中，你将研究碰撞协议来更新分数，并对可收集物品进行一些动画处理。©\
    \ James Goodwill and Wesley Matlock 2017 James Goodwill and Wesley Matlock, *Beginning\
    \ Swift Games Development for iOS*, 10.1007/978-1-4842-2310-9_14\n\n# 14. 碰撞检测\n\
    \nJames Goodwill¹ and Wesley Matlock²\n\n(1) 美国科罗拉多州海兰兹牧场  \n(2) 美国密苏里州堪萨斯城\n\n\
    现在你已经让角色在屏幕上移动，接下来需要一种方法来确定英雄何时找到可收集物品。为此，你将使用碰撞检测来知道不同节点何时相互接触。\n\n## 碰撞检测\n\n\
    现在英雄可以四处移动，并且场景中有多个可收集物品，你需要确定英雄何时与其中一个碰撞。`SceneKit`使用`SCNPhysicsBody`对象为节点添加物理模拟。在渲染场景期间，`SceneKit`会准备执行物理计算的帧。这些计算包括重力、摩擦以及与其他节点的碰撞。\n\
    \n`SCNPhysicsBody`类有几个属性，你需要为每个`SCNNode`设置这些属性才能检测碰撞。首先，你将物理体设置到英雄节点上。由于节点是通过`createMainScene`方法中的`let\
    \ mainScene = SCNScene(named: \"art.scnassets/hero.dae\")`调用加载到场景中的，因此你将从这里开始。在`return`语句之前，向该方法添加以下代码行：\n\
    \n```\nlet heroNode = mainScene.rootNode.childNode(withName: \"hero\", recursively:\
    \ true)\nheroNode?.physicsBody = SCNPhysicsBody(type: .dynamic, shape: nil)\n\
    ```\n\n首先，你从主场景中获取了英雄节点。然后，将物理体设置到节点上。`SceneKit`有三种不同类型的物理体：\n\n*   **静态（Static）**：这种类型的物理体不受力或碰撞的影响。你将用它来设置地板、障碍物和墙壁，因为它们会与其他物体碰撞，但自身不会移动。\n\
    *   **动态（Dynamic）**：这种类型的物理体受力或碰撞的影响。你将用它来设置太空人和敌人。\n*   **运动（Kinematic）**：这种类型不受力或碰撞的影响，但可以在物理世界中引发碰撞。你不会用到这种类型，但它可以用于一个不可见的节点，该节点代表用户触摸物体时的手指。\n"
- fmt: "`Shape`是初始化器中的下一个参数。`Shape`定义了用于碰撞检测的主体。在你的调用中，你需要将`shape`设置为`nil`，这将允许`SceneKit`根据节点的几何属性自动创建物理形状。如果你希望更精确地控制`SceneKit`用于碰撞检测的实际形状，可以将其设置为不同的形状。就你的目的而言，让`SceneKit`定义形状就足够了。清单[14-1](#A330720_2_En_14_Chapter.html#Par16)给出了你需要在所有节点上设置的`physicsBody`。请花些时间在每个位置设置每个节点。\n\
    \n然而，如果你现在运行游戏，会发现主角直接坠落并消失在地板下方。你可能已经猜到，由于主角现在有了物理主体，它正在与地板交互，而地板目前还没有物理主体，因此重力直接将主角拉入了虚无区域。让我们来修复这个问题。在`createFloorNode()`方法中，在`return`语句之前将代码更新为以下语句：`floorNode.physicsBody\
    \ = SCNPhysicsBody(type: .static, shape: nil)`。现在当你运行游戏时，主角将停留在地板上而不会掉下去。\n\n\
    接下来你需要做的是，将物理主体添加到`Collectible`类中的所有可收集物上。这样主角就不会直接穿过它们，而是会撞到它们。为确保你走在正确的道路上，清单[14-1](#A330720_2_En_14_Chapter.html#Par16)展示了添加完所有`SCNPhysicsBody`后`Collectible`类的完整代码。\n\
    \n```\n//\n//  Collectible.swift\n//  Swifystein3D\n//\n//  Copyright © 2016 Apress.\
    \ All rights reserved.\n//\n\nimport Foundation\nimport SceneKit\n\nclass Collectible\
    \ {\n    class func pyramidNode() -> SCNNode {\n        // 1 Creating the SCNGeometry\
    \ type\n        let pyramid = SCNPyramid(width: 3.0, height: 6.0, length: 3.0)\n\
    \        // 2 Create the node using the geometry type\n        let pyramidNode\
    \ = SCNNode(geometry: pyramid)\n        pyramidNode.name = \"pyramid\"\n     \
    \   //3 Setting the node position\n        let position = SCNVector3(0, 0, 200)\n\
    \        pyramidNode.position = position\n        // 4 Giving the node some color.\n\
    \        pyramidNode.geometry?.firstMaterial?.diffuse.contents = UIColor.blue\n\
    \        pyramidNode.geometry?.firstMaterial?.shininess = 1.0\n        pyramidNode.physicsBody\
    \ = SCNPhysicsBody(type: .static, shape: nil)\n        return pyramidNode\n  \
    \  }\n    class func sphereNode() -> SCNNode {\n        // 1 Creating the SCNGeometry\
    \ type\n        let sphere = SCNSphere(radius: 6.0)\n        // 2 Create the node\
    \ using the geometry type\n        let sphereNode = SCNNode(geometry: sphere)\n\
    \        sphereNode.name = \"sphere\"\n        //3 Setting the node position\n\
    \        let position  = SCNVector3(0, 6, -200)\n        sphereNode.position =\
    \ position\n        // 4 Giving the node some color.\n        sphereNode.geometry?.firstMaterial?.diffuse.contents\
    \ = #imageLiteral(resourceName: \"earthDiffuse\")\n        sphereNode.geometry?.firstMaterial?.ambient.contents\
    \ = #imageLiteral(resourceName: \"earthAmbient\")\n        sphereNode.geometry?.firstMaterial?.specular.contents\
    \ = #imageLiteral(resourceName: \"earthSpecular\")\n        sphereNode.geometry?.firstMaterial?.normal.contents\
    \ = #imageLiteral(resourceName: \"earthNormal\")\n        sphereNode.geometry?.firstMaterial?.diffuse.mipFilter\
    \ = SCNFilterMode.linear\n        sphereNode.geometry?.firstMaterial?.shininess\
    \ = 1.0\n        sphereNode.physicsBody = SCNPhysicsBody(type: .static, shape:\
    \ nil)\n        return sphereNode\n    }\n    class func boxNode() -> SCNNode\
    \ {\n        // 1 Creating the SCNGeometry type\n        let box = SCNBox(width:\
    \ 6, height: 6, length: 6, chamferRadius: 0)\n        // 2 Create the node using\
    \ the geometry type\n        let boxNode = SCNNode(geometry: box)\n        boxNode.name\
    \ = \"box\"\n        //3 Setting the node position\n        let position  = SCNVector3(200,\
    \ 3.0, 0)\n        boxNode.position = position\n        // 4 Giving the node some\
    \ color.\n        var materials = [SCNMaterial]()\n        let boxImage = \"boxSide\"\
    \n        for index in 1...6 {\n            let material = SCNMaterial()\n   \
    \         material.diffuse.contents = UIImage(named: boxImage + String(index))\n\
    \            materials.append(material)\n        }\n        boxNode.geometry?.materials\
    \ = materials\n        boxNode.physicsBody = SCNPhysicsBody(type: .static, shape:\
    \ nil)\n        return boxNode\n    }\n    class func tubeNode() -> SCNNode {\n\
    \        // 1 Creating the SCNGeometry type\n        let tube = SCNTube(innerRadius:\
    \ 8, outerRadius: 10.0, height: 10.0)\n        // 2 Create the node using the\
    \ geometry type\n        let tubeNode = SCNNode(geometry: tube)\n        tubeNode.name\
    \ = \"tube\"\n        //3 Setting the node position\n        let position  = SCNVector3(-200,\
    \ 1.5, 0)\n        tubeNode.position = position\n        // 4 Giving the node\
    \ some color.\n        tubeNode.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n\
    \        tubeNode.geometry?.firstMaterial?.shininess = 1.0\n        tubeNode.physicsBody\
    \ = SCNPhysicsBody(type: .static, shape: nil)\n        return tubeNode\n    }\n\
    \    class func cylinderNode() -> SCNNode {\n        // 1 Creating the SCNGeometry\
    \ type\n        let cylinder = SCNCylinder(radius: 6, height: 16)\n        //\
    \ 2 Create the node using the geometry type\n        let cylinderNode = SCNNode(geometry:\
    \ cylinder)\n        cylinderNode.name = \"cylinder\"\n        //3 Setting the\
    \ node position\n        let position = SCNVector3(300, 8, 300)\n        cylinderNode.position\
    \ = position\n        // 4 Giving the node some color.\n        cylinderNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.green\n        cylinderNode.geometry?.firstMaterial?.shininess = 0.5\n\
    \        cylinderNode.physicsBody = SCNPhysicsBody(type: .static, shape: nil)\n\
    \        return cylinderNode\n    }\n    class func torusNode() -> SCNNode {\n\
    \        // 1 Creating the SCNGeometry type\n        let torus = SCNTorus(ringRadius:\
    \ 14, pipeRadius: 4)\n        // 2 Create the node using the geometry type\n \
    \       let torusNode = SCNNode(geometry: torus)\n        //3 Setting the node\
    \ position\n        let position =  SCNVector3(-300, 3, -300)\n        torusNode.position\
    \ = position\n        // 4 Giving the node some color.\n        torusNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.orange\n        torusNode.geometry?.firstMaterial?.shininess = 1.0\n\
    \        torusNode.physicsBody = SCNPhysicsBody(type: .static, shape: nil)\n \
    \       return torusNode\n    }\n}\n```\n\n**Listing 14-1.** `Collectible.swift`\
    \ with the `SCNPhysicBody` Set for All Objects\n\n让碰撞检测工作的下一步是创建位掩码，这些位掩码将用于确定一个对象是否以及何时触碰另一个对象。碰撞检测基于使用位掩码创建一个表格，以确定两个对象是否应发生碰撞。为此，你将创建一个名为`SharedConstants.swift`的新文件，并使用该文件创建将用于所有对象的位掩码变量。清单[14-2](#A330720_2_En_14_Chapter.html#Par18)包含了需要添加到此新文件中的代码：\n\
    \n```\nlet CollisionCategoryHero = 2\nlet CollisionCategoryCollectibleLowValue\
    \ = 4\nlet CollisionCategoryCollectibleMidValue = 6\nlet CollisionCategoryCollectibleHighValue\
    \ = 8\nlet CollisionCategoryFloor = 10\n```\n\n**Listing 14-2.** `SharedConstants.swift`\
    \ Contents for the Bit Mask\n\n现在你已经有了将用于位掩码的变量，需要再次更新所有节点。如前所述，这些变量将用于创建一个表格，以确定一个对象是否应与另一个对象碰撞。`SCNPhysicsBody`有几个参数需要设置，才能使碰撞检测工作。这两个参数中的第一个是类别位掩码：\n\
    \n`heroNode?.physicsBody?.categoryBitMask = CollisionCategoryHero`\n\n第二个要设置的参数是碰撞位掩码：\n\
    \n`heroNode?.physicsBody?.collisionBitMask = CollisionCategoryCollectibleLowValue\
    \ | CollisionCategoryCollectibleMidValue | CollisionCategoryCollectibleHighValue`\n\
    \n基本上，你正在做的是：这个节点是主角，它将与不同价值的可收集节点交互。清单[14-3](#A330720_2_En_14_Chapter.html#Par26)显示了必须在每个节点上设置的所有`categoryBitMask`和`collisionBitMask`值。请确保在`SCNPhysicsBody`被初始化并设置在节点上之后再进行此操作。同样重要的是，在将`SCNNode`的`physicsBody`添加为场景的子节点之前对其进行初始化。\n\
    \n```\n// Add the following line to the GameViewController createMainScene() after\
    \ the physicsBody initialization:\nheroNode?.physicsBody?.categoryBitMask = CollisionCategoryHero\n\
    heroNode?.physicsBody?.collisionBitMask = CollisionCategoryCollectibleLowValue\
    \ | CollisionCategoryCollectibleMidValue | CollisionCategoryCollectibleHighValue\n\
    \n//Add the following line to the Collectible pyramidNode() after the physicsBody\
    \ initialization:\npyramidNode.physicsBody?.categoryBitMask = CollisionCategoryCollectibleLowValue\n\
    pyramidNode.physicsBody?.collisionBitMask = CollisionCategoryHero\n\n//Add the\
    \ following line to the Collectible sphereNode() after the physicsBody initialization:\n\
    globeNode.physicsBody?.categoryBitMask = CollisionCategoryCollectibleHighValue\n\
    globeNode.physicsBody?.collisionBitMask = CollisionCategoryHero\n\n//Add the following\
    \ line to the Collectible boxNode() after the physicsBody initialization:\nboxNode.physicsBody?.categoryBitMask\
    \ = CollisionCategoryCollectibleMidValue\nboxNode.physicsBody?.collisionBitMask\
    \ = CollisionCategoryHero\n\n//Add the following line to the Collectible tubeNode()\
    \ after the physicsBody initialization:\ntubeNode.physicsBody?.categoryBitMask\
    \ = CollisionCategoryCollectibleLowValue\ntubeNode.physicsBody?.collisionBitMask\
    \ = CollisionCategoryHero\n\n//Add the following line to the Collectible cylinderNode()\
    \ after the physicsBody initialization:\ncylinderNode.physicsBody?.categoryBitMask\
    \ = CollisionCategoryCollectibleHighValue\ncylinderNode.physicsBody?.collisionBitMask\
    \ = CollisionCategoryHero\n\n//Add the following line to the Collectible torusNode()\
    \ after the physicsBody initialization:\ntorusNode.physicsBody?.categoryBitMask\
    \ = CollisionCategoryCollectibleMidValue\ntorusNode.physicsBody?.collisionBitMask\
    \ = CollisionCategoryHero\n```\n\n**Listing 14-3.** `SCNPhysicsBody` `categoryBitMask`\
    \ and `collisionBitMask`\n\n现在是时候检查你的工作了。构建并运行游戏，你应该能够移动太空人——只不过这次他可以穿过场景中的节点，可以越过一些物体，并且会被墙壁挡住。虽然这很好，但你还需要一种方式让他对这些碰撞做出反应。因为你正在制作一个捉迷藏游戏，你会想知道何时找到了敌人。要找到敌人，你必须抓住或撞到他。这通过使用`SCNPhysicsContactDelegate`来实现。\n\
    \n首先要做的是告诉你的类你想要接收`SCNPhysicsContactDelegate`：\n\n`class GameViewController: UIViewController,\
    \ SCNSceneRendererDelegate, SCNPhysicsContactDelegate {`\n\n与此结合，你还需要将委托设置给一个将响应这些碰撞的类。在这种情况下，你将把`mainScene`的`contactDelegate`设置为`self`，以便`GameViewController`能够对碰撞做出反应。在`createMainScene()`中，在`return`语句之前添加这一行：\n\
    \n`mainScene?.physicsWorld.contactDelegate = self`\n\n`SCNPhysicsContactDelegate`有三个你可以使用的协议，如清单[14-4](#A330720_2_En_14_Chapter.html#Par34)所示。\n\
    \n```\nfunc physicsWorld(_ world: SCNPhysicsWorld, didBegin contact: SCNPhysicsContact)\
    \ {\n    print(\"didBeginContact\")\n}\n\nfunc physicsWorld(_ world: SCNPhysicsWorld,\
    \ didEnd contact: SCNPhysicsContact) {\n    print(\"didEndContact\")\n}\n\nfunc\
    \ physicsWorld(_ world: SCNPhysicsWorld, didUpdate contact: SCNPhysicsContact)\
    \ {\n    print(\"didUpdateContact\")\n}\n```\n\n**Listing 14-4.** `SCNPhysicsContact`\
    \ Protocols\n\n你应该将清单[14-4](#A330720_2_En_14_Chapter.html#Par34)添加到你的`GameViewController`中。这次当你运行游戏时，当你的太空人移动并与环境交互时，你将收到通知。不过，对于这个游戏，你只会使用`didBeginContact`协议。此时，你将检查接触对象是否包含主角节点和可收集物节点。为此，你将保持简单，并在清单[14-5](#A330720_2_En_14_Chapter.html#Par36)中检查`nodeB`以确定发生了哪种类型的接触。\n\
    \n```\nfunc physicsWorld(_ world: SCNPhysicsWorld, didBegin contact: SCNPhysicsContact)\
    \ {\n    switch contact.nodeB.physicsBody!.collisionBitMask {\n    case CollisionCategorycollectibleLowValue:\n\
    \        print(\"Hit a low value collectible.\")\n    case CollisionCategorycollectibleMidValue:\n\
    \        print(\"Hit a mid value collectible.\")\n    case CollisionCategorycollectibleHighValue:\n\
    \        print(\"Hit a high value collectible.\")\n    default:\n        print(\"\
    Hit something other than a collectible.\")\n    }\n}\n```\n\n**Listing 14-5.**\
    \ `SCNPhysicsWorld` `didBeginContact` Protocol\n\n现在你只需在碰到敌人或障碍物时打印一行信息。所以，现在运行你的游戏，让太空人在游戏场地上移动。留意控制台日志，当你碰到障碍物或敌人时，会输出相应的信息。"
