  trans: '

    ### 添加节点


    现在你可以开始添加可收集的节点，就像在前面章节中以编程方式所做的那样。在对象库中，只需拖放几种不同类型的节点。例如，拖出一个金字塔、球体、胶囊体以及任何你想要使用的其他类型。图
    16-10 展示了拖出球体节点并在检查器中手动设置位置的过程。为了精细调整节点的位置，你将需要执行这个操作。


    ![A330720_2_En_16_Fig10_HTML.jpg](img/A330720_2_En_16_Fig10_HTML.jpg)

    图 16-10. 球体节点放置


    你还需要在属性检查器中对每个节点进行一些尺寸调整。图 16-11 显示了我们为球体设置的参数，但请记住，每个节点将根据所选节点类型拥有各自的属性设置。


    ![A330720_2_En_16_Fig11_HTML.jpg](img/A330720_2_En_16_Fig11_HTML.jpg)

    图 16-11. 球体属性检查器


    现在是一个查看几个不同节点及其属性的好时机。你已经在屏幕周围放置了一些节点，效果应如图 16-12 所示。这里我们在屏幕周围设置了三个不同的节点。别忘了在节点检查器、材质检查器和属性检查器中进行调整。


    ![A330720_2_En_16_Fig12_HTML.jpg](img/A330720_2_En_16_Fig12_HTML.jpg)

    图 16-12. 多个节点


    ## 总结

