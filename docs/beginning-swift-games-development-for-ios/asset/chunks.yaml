    Run the app and take a look at the results. The new app should look like Figure
    [7-1](#A330720_2_En_7_Chapter.html#Fig1). ![A330720_2_En_7_Fig1_HTML.jpg](OEBPS/A330720_2_En_7_Fig1_HTML.jpg)
    Figure 7-1. A simple SKLabelNode example As you can see, the SKLabelNode is pretty
