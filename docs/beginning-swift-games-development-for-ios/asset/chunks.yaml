        let timerNode = childNode(withName: "timer") as! SKLabelNode     let timerAction
    = SKAction.run({ () -> Void in         let now = NSDate.timeIntervalSinceReferenceDate
            let elapsedTime = TimeInterval( now - startTime )         let tempString
