    \ the default camera that was originally added when you initially added the new\
    \ file. In the scene graph section, simply click the camera and delete it.\n\n\
    ### Adding the Floor\n\nStart by adding a floor node from the object library .\
    \ Simply find the floor and drag and drop it into the design section. As you already\
    \ know, a floor node will grow infinitely automatically. However, right now the\
    \ floor is simply a clear object, so it’s time to add a material to the floor.\
    \ In the inspector section, select the material inspector. This shows all the\
    \ properties that you can adjust for the node’s material. The one you’re interested\
    \ in is the Diffuse property. Select this property and scroll through your choices\
    \ to sceneFloor.png. Once you’ve completed this step, your screen should look\
    \ like Figure [16-4](#A330720_2_En_16_Chapter.html#Fig4). ![A330720_2_En_16_Fig4_HTML.jpg](OEBPS/A330720_2_En_16_Fig4_HTML.jpg)\
    \ Figure 16-4. Flood node scene\n\n### Adding the Hero\n\nOne very powerful thing\
    \ you can do with in the Scene Editor is simply drag and drop other scenes, including\
    \ DAE files , onto this level scene. This capability allows your graphic designer\
    \ to create beautiful objects that you can use in your game level. You’ve used\
    \ hero.dea in previous chapters when you programmatically created the scene. This\
    \ time you’ll drag and drop that file on to the Level1 design section of the Editor.\
    \ When you drag and drop a new scene into the current scene, you’re actually creating\
    \ a reference to the original file. By creating a reference if you have an object\
    \ in multiple scenes (Levels, in this case), you would only need to update the\
    \ original file, and then all the other references would be updated. For example,\
    \ if you decided you wanted to change the textures of the hero, you would only\
    \ have to make those changes on the Hero .dea file. Then anywhere that file is\
    \ referenced it would be updated. Figure [16-5](#A330720_2_En_16_Chapter.html#Fig5)\
    \ shows what your scene should resemble. ![A330720_2_En_16_Fig5_HTML.jpg](OEBPS/A330720_2_En_16_Fig5_HTML.jpg)\
    \ Figure 16-5. Hero node placed into scene If your placement of the hero node\
    \ doesn’t look exactly like Figure [16-5](#A330720_2_En_16_Chapter.html#Fig5),\
    \ don’t worry. Now that you have a couple of nodes, let’s go over some of the\
    \ inspector properties that you can use to manipulate the node. Make sure you’ve\
    \ selected the hero reference node. Figure [16-6](#A330720_2_En_16_Chapter.html#Fig6)\
    \ shows the node inspector, and one of the properties you can adjust is the position\
    \ of the node, the scale, and the angle at which the node is located. As you can\
    \ see, there are several other properties at your disposal. Because we’re keeping\
    \ things simple, we’ll leave most of the at the default for now. However, feel\
    \ free to explore each of these properties—that’s the beauty of the SceneKit Editor.\
    \ ![A330720_2_En_16_Fig6_HTML.jpg](OEBPS/A330720_2_En_16_Fig6_HTML.jpg) Figure\
    \ 16-6. Node inspector\n\n### Adding in the Camera\n\nNow that you have the hero\
    \ in place, you need to add a camera so that when you play the game you can follow\
    \ the hero around. Drag the camera node from the object library into the scene\
    \ graph. Don’t worry about where the camera is placed—you’ll make the adjustments\
    \ in the node inspector and change the position and Euler angle so that the camera\
    \ is right above and behind the hero. Figure [16-7](#A330720_2_En_16_Chapter.html#Fig7)\
    \ shows the settings to make to the camera. ![A330720_2_En_16_Fig7_HTML.jpg](OEBPS/A330720_2_En_16_Fig7_HTML.jpg)\
    \ Figure 16-7. Camera node inspector settings Now we’ll go over the attribute\
    \ inspector shown in Figure [16-8](#A330720_2_En_16_Chapter.html#Fig8), and you\
    \ can see some of the new and exciting attributes that Apple introduced into iOS\
    \ 10 SceneKit . ![A330720_2_En_16_Fig8_HTML.jpg](OEBPS/A330720_2_En_16_Fig8_HTML.jpg)\
    \ Figure 16-8. Camera attribute inspector The properties we will explore are as\
    \ follows:\n\n*   HDR: You can now enable the High Dynamic Range technique for\
    \ your scene. This produces a greater dynamic range of lighting. Average Gray\
    \ is the middle of the lighting tone used in the mapping of the light curve. White\
    \ Point is the higher level of lighting tone used in the mapping of the light\
    \ curve.\n*   Adaption: This is an interesting effect that controls the way the\
    \ player’s eyes adjust when the lightening changes from light to dark and vice\
    \ versa. Think of this as when your scene transitions from inside a dark dungeon\
    \ to the bright outside.\n*   Exposure: Basically, the darkness and lightness\
    \ of the scene.\n*   Bloom: This is that haziness you see around a brightly light\
    \ area.\n*   Depth of Field: These items have been around and reviewed in previous\
    \ sections.\n*   Post Processing: More newness attributes introduced in iOS 10:\n\
    \    *   Vignetting: Allows you to control the lightening around the edges of\
    \ the scene\n    *   Color Fringe: Gives your scene some color mixing around nodes\n\
    \    *   Color Grading: Allows you to enhance the overall color saturation of\
    \ the rendered scene\n*   Motion Blur: This property adds the blurring effect\
    \ to all objects that are in motion.\n\nOnce you have the camera set up, Figure\
    \ [16-9](#A330720_2_En_16_Chapter.html#Fig9) shows how your scene should look\
    \ now. ![A330720_2_En_16_Fig9_HTML.jpg](OEBPS/A330720_2_En_16_Fig9_HTML.jpg) Figure\
    \ 16-9. Current scene with camera"
  trans: "\n# SceneKit 场景\n\n如果尚未从 Apress 网站下载源代码，本部分需要先完成下载。Xcode 项目包含本章所需的所有图形资源。请从\
    \ [www.apress.com/97814823093](http://www.apress.com/97814823093) 下载。打开 `Swiftystein3D`\
    \ 项目（如果尚未打开）。首先要做的是从“添加新文件”的“资源”部分添加一个新的 SceneKit 文件。现在，右键单击项目以向项目中添加文件，如图 16-1\
    \ 所示。![A330720_2_En_16_Fig1_HTML.jpg](img/A330720_2_En_16_Fig1_HTML.jpg) 图 16-1.\
    \ 添加新文件 选择“新文件”后，下一个屏幕将类似于图 16-2。您可能需要向下滚动才能看到“SceneKit 场景资源”。![A330720_2_En_16_Fig2_HTML.jpg](img/A330720_2_En_16_Fig2_HTML.jpg)\
    \ 图 16-2. SceneKit 场景文件选择 选择“SceneKit 场景文件”后，您将得到这个 `Level1.scn` 文件。现在您有了一个空白的\
    \ `Level1` 场景，可以用它来创建一个类似之前通过编程方式创建的简单场景。图 16-3 显示了我们将要讲解的整个 SceneKit 编辑器。![A330720_2_En_16_Fig3_HTML.jpg](img/A330720_2_En_16_Fig3_HTML.jpg)\
    \ 图 16-3. SceneKit 编辑器 以下是 SceneKit 编辑器的概述：\n\n1.  场景图：此部分包含场景中的每个节点/元素。在此树中，您可以控制节点的子-父关系。\n\
    2.  设计区：您可以在此区域中将物体从对象库（4）拖放进来。您将看到所有节点的可视化表示，从而可以轻松移动物体并更改其属性。\n3.  检查器/属性：当您在设计区中选择对象时，将有许多属性可供调整和控制。进行调整时，您可以立即直观地看到效果。\n\
    4.  对象库：此部分包含可以添加到场景中的所有对象。您只需拖放所需对象，然后在检查器/属性中进行调整。\n5.  动作：此部分允许您向所选节点添加动作。\n\
    \n## 创建场景\n\n要开始创建场景，首先需要删除最初添加新文件时默认添加的摄像机。在场景图部分，只需单击摄像机并将其删除即可。\n\n### 添加地板\n\
    \n首先从对象库中添加一个地板节点。找到地板并将其拖放到设计区。如您所知，地板节点会自动无限延伸。不过，现在地板只是一个透明对象，因此需要为其添加材质。在检查器部分，选择材质检查器。这将显示您可以调整节点材质的所有属性。我们关注的是“漫反射”属性。选择此属性，然后在选项中找到\
    \ `sceneFloor.png`。完成此步骤后，屏幕应如图 16-4 所示。![A330720_2_En_16_Fig4_HTML.jpg](img/A330720_2_En_16_Fig4_HTML.jpg)\
    \ 图 16-4. 地板节点场景\n\n### 添加英雄角色\n\n在场景编辑器中，一个非常强大的功能是您可以简单地拖放其他场景（包括 DAE 文件）到当前关卡场景中。此功能允许您的图形设计师创建精美的对象，然后供您在游戏关卡中使用。在之前通过编程方式创建场景的章节中，我们已经使用过\
    \ `hero.dea`。这次，您需要将该文件拖放到编辑器的 `Level1` 设计区中。将新场景拖放到当前场景时，实际上是在创建对原始文件的引用。通过创建引用，如果您在多个场景（此处指关卡）中使用同一个对象，则只需更新原始文件，所有其他引用都会自动更新。例如，如果您决定更改英雄角色的纹理，只需在\
    \ `Hero.dea` 文件中进行修改，那么所有引用该文件的地方都会随之更新。图 16-5 显示了场景应有的样子。![A330720_2_En_16_Fig5_HTML.jpg](img/A330720_2_En_16_Fig5_HTML.jpg)\
    \ 图 16-5. 放置到场景中的英雄节点 如果英雄节点的放置位置与图 16-5 不完全一致，无需担心。现在您已经有了几个节点，让我们来看看可以用来操作节点的检查器属性。请确保选中了英雄引用节点。图\
    \ 16-6 显示了节点检查器，其中可调整的属性包括节点的位置、缩放和角度。如您所见，还有其他几个属性可供使用。为了简单起见，我们现在保持大部分默认设置。不过，请随意探索每个属性——这正是\
    \ SceneKit 编辑器的美妙之处。![A330720_2_En_16_Fig6_HTML.jpg](img/A330720_2_En_16_Fig6_HTML.jpg)\
    \ 图 16-6. 节点检查器\n\n### 添加摄像机\n\n现在英雄角色已就位，您需要添加一个摄像机，以便在游戏运行时能够跟随英雄角色移动。将摄像机节点从对象库拖放到场景图中。无需担心摄像机的放置位置——您将在节点检查器中进行调整，更改位置和欧拉角，使摄像机位于英雄角色的正上方和后方。图\
    \ 16-7 显示了需要对摄像机进行的设置。![A330720_2_En_16_Fig7_HTML.jpg](img/A330720_2_En_16_Fig7_HTML.jpg)\
    \ 图 16-7. 摄像机节点检查器设置 接下来，我们将介绍图 16-8 所示的属性检查器，您可以看到 Apple 在 iOS 10 SceneKit 中引入的一些令人兴奋的新属性。![A330720_2_En_16_Fig8_HTML.jpg](img/A330720_2_En_16_Fig8_HTML.jpg)\
    \ 图 16-8. 摄像机属性检查器 我们将探讨的属性如下：\n\n*   **HDR**：现在可以为场景启用高动态范围技术。这会产生更大的光照动态范围。“平均灰度”是用于光照曲线映射的中间色调值。“白点”是用于光照曲线映射的较高色调值。\n\
    *   **自适应**：这是一个有趣的效果，控制玩家眼睛在光照从亮变暗或从暗变亮时的适应方式。可以想象成场景从一个黑暗的地牢过渡到明亮的室外。\n*   **曝光**：基本上是场景的明暗程度。\n\
    *   **辉光**：这是您在明亮区域周围看到的那种朦胧效果。\n*   **景深**：这些项目已在之前章节中出现并介绍过。\n*   **后处理**：iOS\
    \ 10 中引入的更多新属性：\n    *   **暗角**：允许您控制场景边缘的亮暗。\n    *   **色差**：为场景中节点周围添加一些颜色混合效果。\n\
    \    *   **色彩分级**：允许您增强渲染场景的整体色彩饱和度。\n*   **运动模糊**：此属性为所有运动中的对象添加模糊效果。\n\n摄像机设置完成后，图\
    \ 16-9 显示了场景现在的样子。![A330720_2_En_16_Fig9_HTML.jpg](img/A330720_2_En_16_Fig9_HTML.jpg)\
    \ 图 16-9. 当前带摄像机的场景\n"
- fmt: '### Adding in Nodes


    Now you can start adding in the collectible nodes just as you did programmatically
    in earlier chapters. In the object library, simply drag and drop in a few of the
    different types of nodes. For example, drag out a pyramid, sphere, capsule, and
    any other type you want to use. Figure 16-10 depicts dragging out the sphere node
    and setting the location manually in the inspector. This is something you’ll have
    to do in order to fine-tune your placement of the nodes.


    ![A330720_2_En_16_Fig10_HTML.jpg](OEBPS/A330720_2_En_16_Fig10_HTML.jpg)

    Figure 16-10. Sphere node placement


    You’ll also have to make some size adjustments in the attribute inspector for
    each of these nodes. Figure 16-11 shows the settings we used for the sphere, but
    remember that each node will have their own attributes setting based on the type
    of node chosen.


    ![A330720_2_En_16_Fig11_HTML.jpg](OEBPS/A330720_2_En_16_Fig11_HTML.jpg)

    Figure 16-11. Sphere Attributes Inspector


    Now would be a good time to look at several different nodes and their attributes.
    You have some nodes placed around your screen, which should look like Figure 16-12.
    Here we’ve set out three different nodes around the screen. Don’t forget to make
    the adjustments in the node inspector, material inspector, and attributes inspector.


    ![A330720_2_En_16_Fig12_HTML.jpg](OEBPS/A330720_2_En_16_Fig12_HTML.jpg)

    Figure 16-12. Multiple nodes


    ## Summary'
