    class-level variable that will store the CoreMotion manager. The reason you do
    this is because once you set up the CoreMotion manager, you’ll create an NSOperationQueue
    that will run in the background and detect the movements from the accelerometer.
    After you have the class declaration, add var motionManager: CMMotionManager.
    Now you can create a method that will set up the accelerometer and capture the
    input from the accelerometer, as in Listing [13-4](#A330720_2_En_13_Chapter.html#Par35).
    func setupAccelerometer() {     // Create the motion manager to receive the input
        let motionManager = CMMotionManager()     if  motionManager.isAccelerometerAvailable
    {         motionManager.accelerometerUpdateInterval = 1/60.0         motionManager.startAccelerometerUpdates(to:
    OperationQueue()) {             (data, error) in             let heroNode =  self.mainScene.rootNode.childNode(withName:
    "hero", recursively: true)?.presentation             // Get the current location.
                let currentX =  heroNode?.position.x             let currentY =  heroNode?.position.y
                let currentZ =  heroNode?.position.z             let threshold = 0.20
                // Moving right             if (data?.acceleration.y)! < -threshold
    {                 let destinationX = (Float((data?.acceleration.y)!) * 10.0 +
    Float(currentX!))                 let destinationY = Float(currentY!)                 let
    destinationZ = Float(currentZ!)                 let action = SCNAction.move(to:
    SCNVector3(destinationX, destinationY, destinationZ), duration: 1)                 heroNode?.runAction(action)
                }             else if (data?.acceleration.y)! > threshold {                 let
    destinationX = (Float((data?.acceleration.y)!) * 10.0 + Float(currentX!))                 let
    destinationY = Float(currentY!)                 let destinationZ = Float(currentZ!)
                    let action = SCNAction.move(to: SCNVector3(destinationX, destinationY,
    destinationZ), duration: 1)                 heroNode?.runAction(action)             }
            }     } } Listing 13-4. setupAccelerometer Function Now that you’ve created
    this function, you can take a closer look at what is happening here. The first
    thing you do is create a CMMotionManager. This is one of the entry points into
    the CoreMotion framework. Then you check to make sure you have an accelerometer.
    If you don’t do this and run this code without the check, you’ll get a crash whenever
    you try to use the manager. Also, some devices such as older iPods don’t have
    accelerometers. Remember, your games and applications can run on just about any
    iOS device. Now that you know there is an accelerometer, you’ll want to set the
    update interval to be used. In some games, you may want to have the interval be
    slower or faster. For this game, you’re going to get an update every 1/60th of
    a second. And because you’re getting updated every 1/60th of a second, you don’t
    want to tie up the main cycle of the game, so you’ll create an update queue. This
    queue will take a closure and run this function every time the accelerometer update
    is called. When the function is called, you create a few variables to store the
    current location of your hero. To keep things simple, you’ll check to see whether
    the y-axis has changed a certain amount. A negative change indicates the user
    has tilted the device right, so you need to move the hero to the right; a positive
    change indicates the user has tilted the device left. Here you’re using 0.20,
    but if you want a fine-grained adjustment, you can decrease that number. Using
    this information, you simply create an animation for the hero to move a certain
    distance. The only thing left now is to add the setupAccelerometer() call to your
    viewDidLoad() method in the GameViewController. Once you’ve added all that, it’s
    another good time to run the game and see what you’ve accomplished. When you have
    your hero moving by touching the device, tilt it to the left or right, and you’ll
    see him move in that direction. There are some variables that you can adjust to
    have him move faster or slower. You should go back and modify the moveDistance
    in the render function to see how this affects the movement. Also, adjust the
    threshold in the setupAccelerometer function to see how the device response changes
    .


    ## Summary


    In this chapter, you did a lot to get the spaceman moving. You also have the spaceman
    colliding with objects instead of going through them. In the next chapter, you’ll
    examine the collision protocol to update the score and do a little animation on
    the collectible.© James Goodwill and Wesley Matlock 2017 James Goodwill and Wesley MatlockBeginning
    Swift Games Development for iOS10.1007/978-1-4842-2310-9_14


    # 14. Collision Detection


    James Goodwill^(1 ) and Wesley Matlock² (1) Highlands Ranch, Colorado, USA (2)
    Kansas City, Missouri, USA   Now that you have the character moving around the
    screen, you will now need a way to identify when the hero finds a collectible.
    To do this you will use Collision Detection to know when the different nodes touch
    one another.


    ## Collision Detection


    Now that you have the hero moving around and several collectibles for him to collect,
    you need to determine when your hero collides with one of them. SceneKit uses
    the SCNPhysicsBody object to add physics simulations to a node. During the render
    of a scene, SceneKit prepares the frame in which it will perform physics calculations.
    These calculations include gravity, friction, and collisions with other nodes.
    The SCNPhysicsBody class has a couple of properties that you need to set for each
    of your SCNNodes in order to detect the collisions. First thing you’ll do is set
    the physics body to the hero node. Because the node is being loaded in the scene
    via the let mainScene = SCNScene(named: "art.scnassets/hero.dae") call in the
    createMainScene method, that’s where you’ll start. Before the return statement,
    add the following lines to that method: let heroNode = mainScene.rootNode.childNode(withName:
    "hero", recursively: true)         heroNode heroNode?.physicsBody = SCNPhysicsBody(type:
    .dynamic, shape: nil) The first thing you did was get the hero node from the main
    scene. Now you set the physics body to the node. SceneKit has three different
    types of physics bodies:


    *   Static : This type of physics body is unaffected by forces or collisions.
    You’ll use this for the floor, obstacles, and walls because they will collide
    with objects, but they themselves won’t move.

    *   Dynamic : This type of physics body is affected by forces or collisions. You’ll
    use this type for the spaceman and enemy.

    *   Kinematic : This type is unaffected by forces or collisions but can cause
    collisions to occur within the physic world. You won’t use this type, but it could
    be used for an invisible node that would represent the user’s finger when touching
    an object.'
