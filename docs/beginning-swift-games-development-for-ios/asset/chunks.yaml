    \ { gameOverWithResult(true) }`  \n这段代码用于检查 `playerNode` 是否已向上飞出场景超过 7000 点的距离。若条件成立，则会调用一个新的实例方法\
    \ `gameOverWithResult()`，并向其传入 `true`，表示玩家获胜。请进行这些修改，然后查看如下所示的 `gameOverWithResult()`\
    \ 方法：\n\n```\nfunc gameOverWithResult(_ gameResult: Bool) {\n    playerNode.removeFromParent()\n\
    \    if gameResult {\n        print(\"YOU WON!\")\n    }\n    else {\n       \
    \ print(\"YOU LOSE!\")\n    }\n}\n```\n\n请注意，这个方法目前功能有限。它首先从场景中移除 `playerNode`，然后将\
    \ `node` 设置为 `nil`。接着，它会测试传入的 `gameResult` 布尔值，并打印玩家是否获胜的信息。目前无需过于担心这个方法，你很快将对其进行修改。现在，请将此方法添加到\
    \ `GameScene` 的底部，然后让我们开始判断玩家是否输掉游戏。\n\n注意：当显示屏的高度远远不及 `6400.0` 和 `7000.0` 这些数值时，它们似乎显得不可思议。请记住，你将\
    \ `playerNode` 添加到了 `foregroundNode` 中，并且你一直在向下移动 `foregroundNode`，而 `playerNode`\
    \ 实际上却在场景中持续向上。这就是玩家 Y 坐标远高于设备视口高度的原因。\n\n### 输掉游戏\n\n现在你已知道玩家何时获胜，是时候测试玩家是否输掉游戏了。为此，请返回\
    \ `update()` 方法，并在 `if` 语句的底部（紧接你刚刚添加的 `else if` 之后）添加以下 `else if`：  \n`else if\
    \ playerNode.position.y < 0.0 { gameOverWithResult(false) }`  \n这段代码很容易理解。如果 `playerNode`\
    \ 的 Y 坐标小于 `0.0`，则说明玩家已从场景底部坠落，此时会调用 `gameOverWithResult()` 方法，并向其传入 `false`，表示玩家输掉了游戏。\n\
    \n在切换到新场景之前，还有最后一步需要完成。在 `gameOverWithResult()` 方法中，你已将 `playerNode` 从其父节点移除并设置为\
    \ `nil`。这样做完全没问题，但你需要确保在未检查该属性是否为 `nil` 之前，不会尝试使用它。目前你只有两个地方会用到这个属性。第一个是在 `update()`\
    \ 方法中每次检查 `playerNode` 位置时。为了确保不会解引用一个为 `nil` 的 `playerNode`，你需要用 `if` 语句包围 `update()`\
    \ 方法的主体，以确认 `playerNode` 属性不为 `nil`。你可以在如下所示的新 `update()` 方法中看到这一改动：\n\n```\n\
    override func update(_ currentTime: TimeInterval) {\n    if playerNode.position.y\
    \ >= 180.0 {\n        backgroundNode.position =\n            CGPoint(x: backgroundNode.position.x,\n\
    \                    y: -((playerNode.position.y - 180.0)/8));\n        backgroundStarsNode.position\
    \ =\n            CGPoint(x: backgroundStarsNode.position.x,\n                \
    \    y: -((playerNode.position.y - 180.0)/6));\n        backgroundPlanetNode.position\
    \ =\n            CGPoint(x: backgroundPlanetNode.position.x,\n               \
    \     y: -((playerNode.position.y - 180.0)/8));\n        foregroundNode.position\
    \ =\n            CGPoint(x: foregroundNode.position.x,\n                    y:\
    \ -(playerNode.position.y - 180.0));\n    }\n    else if playerNode.position.y\
    \ > 7000.0 {\n        gameOverWithResult(true)\n    }\n    else if playerNode.position.y\
    \ + playerNode.size.height < 0.0 {\n        gameOverWithResult(false)\n    }\n\
    }\n```\n\n查看这些改动后，请将你的 `update()` 方法修改成上述形式，然后我们继续添加实际的场景过渡动画。\n\n### 添加过渡动画\n"
- fmt: "Before you can transition to a new scene, you need to have a scene to transition\
    \ to. The scene this game needs is a scene that tells the player the score they\
    \ achieved in the most recent game and lets them play a new game. To create the\
    \ new scene, select the **File ➤ New ➤ File** menu item and then choose **iOS\
    \ ➤ Source ➤ Swift File**; click the **Next** button. Make sure you have the `SuperSpaceMan`\
    \ folder selected, name the file `MenuScene`, and click **Create**. You’ll now\
    \ have an almost empty new file named `MenuScene.swift`. Replace its contents\
    \ with the contents of Listing 8-1:\n\n```swift\nimport SpriteKit\n\nclass MenuScene:\
    \ SKScene {\n    required init?(coder aDecoder: NSCoder) {\n        super.init(coder:\
    \ aDecoder)\n    }\n\n    init(size: CGSize, gameResult: Bool, score: Int) {\n\
    \        super.init(size: size)\n\n        let backgroundNode = SKSpriteNode(imageNamed:\
    \ \"Background\")\n        backgroundNode.size.width = self.frame.size.width\n\
    \        backgroundNode.position = CGPoint(x: size.width / 2, y: 0.0)\n      \
    \  backgroundNode.anchorPoint = CGPoint(x: 0.5, y: 0.0)\n        addChild(backgroundNode)\n\
    \n        let gameResultTextNode = SKLabelNode(fontNamed: \"Copperplate\")\n \
    \       gameResultTextNode.text = \"YOU \" + (gameResult ? \"WON\" : \"LOST\"\
    )\n        gameResultTextNode.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.center\n\
    \        gameResultTextNode.verticalAlignmentMode = SKLabelVerticalAlignmentMode.center\n\
    \        gameResultTextNode.fontSize = 20\n        gameResultTextNode.fontColor\
    \ = SKColor.white\n        gameResultTextNode.position = CGPoint(x: size.width\
    \ / 2.0, y: size.height - 200.0)\n        addChild(gameResultTextNode)\n\n   \
    \     let scoreTextNode = SKLabelNode(fontNamed: \"Copperplate\")\n        scoreTextNode.text\
    \ = \"SCORE :  \\(score)\"\n        scoreTextNode.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.center\n\
    \        scoreTextNode.verticalAlignmentMode = SKLabelVerticalAlignmentMode.center\n\
    \        scoreTextNode.fontSize = 20\n        scoreTextNode.fontColor = SKColor.white\n\
    \        scoreTextNode.position = CGPoint(x: size.width / 2.0, y: gameResultTextNode.position.y\
    \ - 40.0)\n        addChild(scoreTextNode)\n\n        let tryAgainTextNodeLine1\
    \ = SKLabelNode(fontNamed: \"Copperplate\")\n        tryAgainTextNodeLine1.text\
    \ = \"TAP ANYWHERE\"\n        tryAgainTextNodeLine1.horizontalAlignmentMode =\
    \ SKLabelHorizontalAlignmentMode.center\n        tryAgainTextNodeLine1.verticalAlignmentMode\
    \ = SKLabelVerticalAlignmentMode.center\n        tryAgainTextNodeLine1.fontSize\
    \ = 20\n        tryAgainTextNodeLine1.fontColor = SKColor.white\n        tryAgainTextNodeLine1.position\
    \ = CGPoint(x: size.width / 2.0, y: 100.0)\n        addChild(tryAgainTextNodeLine1)\n\
    \n        let tryAgainTextNodeLine2 = SKLabelNode(fontNamed: \"Copperplate\")\n\
    \        tryAgainTextNodeLine2.text = \"TO PLAY AGAIN!\"\n        tryAgainTextNodeLine2.horizontalAlignmentMode\
    \ = SKLabelHorizontalAlignmentMode.center\n        tryAgainTextNodeLine2.verticalAlignmentMode\
    \ = SKLabelVerticalAlignmentMode.center\n        tryAgainTextNodeLine2.fontSize\
    \ = 20\n        tryAgainTextNodeLine2.fontColor = SKColor.white\n        tryAgainTextNodeLine2.position\
    \ = CGPoint(x: size.width / 2.0, y: tryAgainTextNodeLine1.position.y - 40.0)\n\
    \        addChild(tryAgainTextNodeLine2)\n    }\n\n    override func touchesBegan(_\
    \ touches: Set<UITouch>, with event: UIEvent?) {\n        let transition = SKTransition.doorsOpenHorizontal(withDuration:\
    \ 2.0)\n        let gameScene = GameScene(size: size)\n        view?.presentScene(gameScene,\
    \ transition: transition)\n    }\n}\n```\n\n**Listing 8-1.** `MenuScene.swift`:\
    \ The SuperSpaceMan `MenuScene`\n\nNote that the second `init()` method takes\
    \ three parameters: the size of the scene, the result of the game as a `Bool`,\
    \ and the player’s score. The `size` parameter, as you know, is used to set the\
    \ size of the scene, and the third and fourth parameters will be used to display\
    \ information about the result of the game to the user. Inside the `init()` method,\
    \ it starts off by adding a background image. The image used is the same image\
    \ you used in the `GameScene`. After that, it adds several labels to the scene,\
    \ including two labels that are added to the middle of the scene. The first tells\
    \ the user whether they won or lost the game, and the second tells them their\
    \ score. Next, two labels are added to the bottom of the scene, telling the player\
    \ to tap the screen anywhere to play again. Once you’ve added the code to the\
    \ `MenuScene.swift` file, save your work, and let’s go back to the `GameScene.swift`\
    \ file. You now have a scene to transition to, so let’s add the code to perform\
    \ the transition. The code to make this transition is shown in the following snippet:\n\
    \n```swift\nlet transition = SKTransition.crossFade(withDuration: 2.0)\nlet menuScene\
    \ = MenuScene(size: size,\n                          gameResult: gameResult,\n\
    \                          score: score)\nview?.presentScene(menuScene, transition:\
    \ transition)\n```\n\nThe first line of this snippet creates a cross-fade transition\
    \ that will fade in the scene over a two-second duration. The second line creates\
    \ the `MenuScene` itself, passing it the size of the current scene followed by\
    \ the result of the game and the player’s score. The third line of this snippet\
    \ actually presents the `MenuScene`, which replaces the current scene using the\
    \ transition created on the first line. After reading this code, add it to the\
    \ bottom of the `GameScene`’s `gameOverWithResult()` method, as shown here:\n\n\
    ```swift\nfunc gameOverWithResult(_ gameResult: Bool) {\n    playerNode.removeFromParent()\n\
    \n    let transition = SKTransition.crossFade(withDuration: 2.0)\n    let menuScene\
    \ = MenuScene(size: size,\n                        gameResult: gameResult,\n \
    \                            score: score)\n    view?.presentScene(menuScene,\
    \ transition: transition)\n}\n```\n\nNow run the game and either play to win or\
    \ play to lose. Either way, you’ll see the new scene fade in, as shown in Figure\
    \ 8-2, when the game is over.\n\n![A330720_2_En_8_Fig2_HTML.jpg](OEBPS/A330720_2_En_8_Fig2_HTML.jpg)\n\
    \n**Figure 8-2.** The `MenuScene` when the game is over\n\nAwesome. You’ve now\
    \ added a simple scene transition that communicates whether the player won or\
    \ lost the game and what their score was when the game ended. There’s one last\
    \ change you need to make before moving on to the next chapter: add another transition\
    \ that will start a new game when the player taps the `MenuScene`. The code to\
    \ do this is shown in the following override of the `MenuScene`’s `touchesBegan()`\
    \ method:\n\n```swift\noverride func touchesBegan(_ touches: Set<UITouch>, with\
    \ event: UIEvent?) {\n    let transition = SKTransition.doorsOpenHorizontal(withDuration:\
    \ 2.0)\n    let gameScene = GameScene(size: size)\n    view?.presentScene(gameScene,\
    \ transition: transition)\n}\n```\n\nThis method creates a `doorsOpenHorizontalWithDuration`\
    \ transition and a new instance of the `GameScene` and then presents the new `GameScene`\
    \ using the new transition. Add this method to the bottom of the `MenuScene` class\
    \ and run the application again. This time, when the game is over and you are\
    \ presented with the `MenuScene`, tap the screen, and you’ll be able to play another\
    \ game."
