    -1.0         }         orbNodePosition.x += 40.0 * orbXShift         orbNodePosition.y
    += 120         orbNode.position = orbNodePosition         foregroundNode.addChild(orbNode)
        } } Next, change the init() method of the BlackHole to take an SKTextureAtlas
    and then use this texture atlas to load all the textures going forward. This change
    is shown in the following snippet: init(textureAtlas: SKTextureAtlas) {     let
    frame0 = textureAtlas.textureNamed("BlackHole0")     let frame1 = textureAtlas.textureNamed("BlackHole1")
        let frame2 = textureAtlas.textureNamed("BlackHole2")     let frame3 = textureAtlas.textureNamed("BlackHole3")
        let frame4 = textureAtlas.textureNamed("BlackHole4")     let blackHoleTextures
    = [frame0, frame1, frame2, frame3, frame4];     let animateAction = SKAction.animate(with:
    blackHoleTextures, timePerFrame: 0.2)     let rotateAction = SKAction.repeatForever(animateAction)
        super.init(texture: frame0, color: UIColor.clear, size: frame0.size())     physicsBody
    = SKPhysicsBody(circleOfRadius: size.width / 2)     physicsBody?.isDynamic = false
        physicsBody?.categoryBitMask = CollisionCategoryBlackHoles     physicsBody?.collisionBitMask
    = 0     name = "BLACK_HOLE"     run(rotateAction) } Finally, change GameScene’s
    addBlackHolesToForeground() so that it passes the SKTextureAtlas to the BlackHole,
    as shown here: func addBlackHolesToForeground() {     let moveLeftAction = SKAction.moveTo(x:
    0.0, duration: 2.0)     let moveRightAction = SKAction.moveTo(x: size.width, duration:
    2.0)     let actionSequence = SKAction.sequence([moveLeftAction, moveRightAction])
        let moveAction = SKAction.repeatForever(actionSequence)     for i in 1...10
    {         // new black hole usage code         let blackHoleNode = BlackHole(textureAtlas:
                SKTextureAtlas(named: "sprites.atlas"))         blackHoleNode.position
    = CGPoint(x: size.width - 80.0,                                          y: 600.0
    * CGFloat(i))         blackHoleNode.run(moveAction)         foregroundNode.addChild(blackHoleNode)
        } } At this point, all the SKSpriteNodes reuse the same SKTextureAtlas, which
    will speed up the retrieval of each of your node’s textures.


    ## Externalizing Your Game Data'
  trans: "\n# 使用单一的 `SKTextureAtlas` 实例\n\n另一个最佳实践是使用单一 `SKTextureAtlas` 实例来加载所有精灵图像，并在设置所有精灵的纹理时重复使用该图集。第一步是创建一个\
    \ `SKTextureAtlas` 并将其传递给节点，以便它们可以检索自己的纹理。\n\n在 `GameScene` 类的第一个 `init()` 方法之前立即添加以下代码行：\n\
    \n```swift\nlet textureAtlas = SKTextureAtlas(named: \"sprites.atlas\")\n```\n\
    \n创建纹理图集后，你需要修改每个 `SKSpriteNode` 的 `init()` 方法，使其接受一个 `SKTextureAtlas` 作为参数。一旦\
    \ `SKSpriteNode` 获得了对 `SKTextureAtlas` 的引用，你就可以更改每个节点中的纹理加载代码，以使用这个传入的 `textureAtlas`。\n\
    \n以下 `init()` 方法展示了在 `SpaceMan` 类中进行的这一修改：\n\n```swift\ninit(textureAtlas: SKTextureAtlas)\
    \ {\n    let texture = textureAtlas.textureNamed(\"Player\")\n    super.init(texture:\
    \ texture, color: UIColor.clear, size: texture.size())\n    physicsBody = SKPhysicsBody(circleOfRadius:\
    \ size.width / 2)\n    physicsBody?.isDynamic = false\n    physicsBody?.linearDamping\
    \ = 1.0\n    physicsBody?.allowsRotation = false\n    physicsBody?.categoryBitMask\
    \ = CollisionCategoryPlayer\n    physicsBody?.contactTestBitMask =\n        CollisionCategoryPowerUpOrbs\
    \ | CollisionCategoryBlackHoles\n    physicsBody?.collisionBitMask = 0\n}\n```\n\
    \n请注意，`init()` 方法的参数列表现在接受一个 `SKTextureAtlas` 参数，并且 `init()` 方法的第一行使用这个 `SKTextureAtlas`\
    \ 来加载 `Player` 纹理。另外注意，`init()` 方法不再重写默认的 `init()`，因此我们去掉了 `override` 关键字。\n\n\
    对 `SpaceMan.swift` 的 `init()` 方法进行此更改，然后我们回到 `GameScene` 类并更改 `playerNode` 的声明。要使用新的\
    \ `SpaceMan.init()` 方法，你需要做一些更改。\n\n在 `GameScene` 类中，首先将类顶部的 `playerNode` 构造代码更改为如下所示：\n\
    \n```swift\nvar playerNode: SpaceMan!\n```\n\n接下来，在 `init()` 方法中添加一行代码，用于用正确的\
    \ `SpaceMan` `SKSpriteNode` 实例来初始化 `playerNode`。在设置 `playerNode.position` 的代码上方，添加以下行：\n\
    \n```swift\nplayerNode = SpaceMan(textureAtlas: textureAtlas)\n```\n\n完成所有 `SpaceMan`\
    \ 的更改后，我们继续对 `Orb` 和 `BlackHole` 类进行相同的修改。首先，更改 `Orb` 的 `init()` 方法，使其接受一个 `SKTextureAtlas`：\n\
    \n```swift\ninit(textureAtlas: SKTextureAtlas) {\n    let texture = textureAtlas.textureNamed(\"\
    PowerUp\")\n    super.init(texture: texture, color: UIColor.clear, size: texture.size())\n\
    \    physicsBody = SKPhysicsBody(circleOfRadius: size.width / 2)\n    physicsBody?.isDynamic\
    \ = false\n    physicsBody?.categoryBitMask = CollisionCategoryPowerUpOrbs\n \
    \   physicsBody?.collisionBitMask = 0\n    name = \"POWER_UP_ORB\"\n}\n```\n\n\
    更改 `Orb` 的 `init()` 方法后，将 `GameScene` 的 `addOrbsToForeground()` 方法修改为如下所示：\n\n\
    ```swift\nfunc addOrbsToForeground() {\n    var orbNodePosition =\n        CGPoint(x:\
    \ playerNode.position.x, y: playerNode.position.y + 100)\n    var orbXShift :\
    \ CGFloat = -1.0\n    for _ in 0...49 {\n        let orbNode = Orb(textureAtlas:\
    \ SKTextureAtlas(named: \"sprites.atlas\"))\n        if orbNodePosition.x - (orbNode.size.width\
    \ * 2) <= 0 {\n            orbXShift = 1.0\n        }\n        if orbNodePosition.x\
    \ + orbNode.size.width >= size.width {\n            orbXShift = -1.0\n       \
    \ }\n        orbNodePosition.x += 40.0 * orbXShift\n        orbNodePosition.y\
    \ += 120\n        orbNode.position = orbNodePosition\n        foregroundNode.addChild(orbNode)\n\
    \    }\n}\n```\n\n接下来，更改 `BlackHole` 的 `init()` 方法，使其接受一个 `SKTextureAtlas`，然后使用这个纹理图集加载所有后续的纹理。此更改如下代码片段所示：\n\
    \n```swift\ninit(textureAtlas: SKTextureAtlas) {\n    let frame0 = textureAtlas.textureNamed(\"\
    BlackHole0\")\n    let frame1 = textureAtlas.textureNamed(\"BlackHole1\")\n  \
    \  let frame2 = textureAtlas.textureNamed(\"BlackHole2\")\n    let frame3 = textureAtlas.textureNamed(\"\
    BlackHole3\")\n    let frame4 = textureAtlas.textureNamed(\"BlackHole4\")\n  \
    \  let blackHoleTextures = [frame0, frame1, frame2, frame3, frame4];\n    let\
    \ animateAction = SKAction.animate(with: blackHoleTextures, timePerFrame: 0.2)\n\
    \    let rotateAction = SKAction.repeatForever(animateAction)\n    super.init(texture:\
    \ frame0, color: UIColor.clear, size: frame0.size())\n    physicsBody = SKPhysicsBody(circleOfRadius:\
    \ size.width / 2)\n    physicsBody?.isDynamic = false\n    physicsBody?.categoryBitMask\
    \ = CollisionCategoryBlackHoles\n    physicsBody?.collisionBitMask = 0\n    name\
    \ = \"BLACK_HOLE\"\n    run(rotateAction)\n}\n```\n\n最后，修改 `GameScene` 的 `addBlackHolesToForeground()`\
    \ 方法，使其将 `SKTextureAtlas` 传递给 `BlackHole`，如下所示：\n\n```swift\nfunc addBlackHolesToForeground()\
    \ {\n    let moveLeftAction = SKAction.moveTo(x: 0.0, duration: 2.0)\n    let\
    \ moveRightAction = SKAction.moveTo(x: size.width, duration: 2.0)\n    let actionSequence\
    \ = SKAction.sequence([moveLeftAction, moveRightAction])\n    let moveAction =\
    \ SKAction.repeatForever(actionSequence)\n    for i in 1...10 {\n        // 新的黑洞使用代码\n\
    \        let blackHoleNode = BlackHole(textureAtlas:\n            SKTextureAtlas(named:\
    \ \"sprites.atlas\"))\n        blackHoleNode.position = CGPoint(x: size.width\
    \ - 80.0,\n                                         y: 600.0 * CGFloat(i))\n \
    \       blackHoleNode.run(moveAction)\n        foregroundNode.addChild(blackHoleNode)\n\
    \    }\n}\n```\n\n至此，所有 `SKSpriteNode` 都重复使用了同一个 `SKTextureAtlas`，这将加快每个节点纹理的检索速度。\n\
    \n## 外部化你的游戏数据\n"
- fmt: "The next best practice we want to talk about won’t necessarily improve the\
    \ performance of your game, but it will help during development and testing. So\
    \ far, all the positions of each game node are hard-coded in the `SuperSpaceMan`\
    \ Swift code. This is fine if you’re creating a simple game, with you being both\
    \ the designer and the developer of the game; if you have a team with clearly\
    \ defined roles, you may want to make it possible for a designer or tester to\
    \ change the play of the game without changing the Swift code. One way to do this\
    \ is to externalize the positions of your game nodes. A simple way to do this\
    \ in the `SuperSpaceMan` game is to move the orb and black hole positions to plist\
    \ files. You can then load the node positions using an `NSBundle`. This will make\
    \ it possible for a designer or tester to just change a plist to change the layout\
    \ of the whole game.\n\nAn example plist that holds the first three orb node positions\
    \ is shown here:\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE\
    \ plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"\
    >\n<plist version=\"1.0\">\n<dict>\n    <key>positions</key>\n    <array>\n  \
    \  <dict>\n        <key>x</key>\n        <real>120.0</real>\n        <key>y</key>\n\
    \        <real>440.0</real>\n    </dict>\n    <dict>\n        <key>x</key>\n \
    \       <real>80.0</real>\n        <key>y</key>\n        <real>560.0</real>\n\
    \    </dict>\n    <dict>\n        <key>x</key>\n        <real>120.0</real>\n \
    \       <key>y</key>\n        <real>680.0</real>\n    </dict>\n    ...\n    </array>\n\
    </dict>\n</plist>\n```\n\nIn this file, you can see an array of dictionaries each\
    \ containing the x- and y-positions of the orb nodes. Don’t worry about creating\
    \ this file yourself. You can find an `orbs.plist` file and a `blackholes.plist`\
    \ file in the previously downloaded zip file containing the images you used for\
    \ your sprites. Copy both of these files into the `SupportingFiles` groups of\
    \ your project, and let’s move on to using each of these files.\n\nOnce you’ve\
    \ copied both plist files into your project, you can then load them using the\
    \ main bundle. Take a look at the following modified `addOrbsToForeground()` method:\n\
    \n```\nfunc addOrbsToForeground() {\n    let orbPlistPath = Bundle.main.path(forResource:\
    \ \"orbs\", ofType: \"plist\")\n    let orbDataDictionary = NSDictionary(contentsOfFile:\
    \ orbPlistPath!)\n    if let positionDictionary = orbDataDictionary {\n      \
    \  let positions = positionDictionary.object(forKey: \"positions\") as! NSArray\n\
    \        for position in positions {\n            let orbNode = Orb(textureAtlas:\
    \ SKTextureAtlas(named: \"sprites.atlas\"))\n            let x = (position as\
    \ AnyObject).object(forKey: \"x\") as! CGFloat\n            let y = (position\
    \ as AnyObject).object(forKey: \"y\") as! CGFloat\n            orbNode.position\
    \ = CGPoint(x: x, y: y)\n            foregroundNode.addChild(orbNode)\n      \
    \  }\n    }\n}\n```\n\nIn the new `addOrbsToForeground()` method, you can see\
    \ that it first loads the contents of `orbs.plist`. After that, it grabs the array\
    \ of positions out of the dictionary, and finally it iterates over all the positions,\
    \ adding each `orbNode` to the `foregroundNode` at that position. Now you can\
    \ change the number and layout of all the orb nodes by simply changing the plist.\n\
    \nMake these changes to the `addOrbsToForeground()` method, and let’s do the same\
    \ thing with the black holes. You’ve already copied the `blackholes.plist` file\
    \ into your project, so you can skip that step and move on to modifying the `addBlackHolesToForeground()`\
    \ method to load the black hole positions from the plist. The new `addBlackHolesToForeground()`\
    \ method is shown here:\n\n```\nfunc addBlackHolesToForeground() {\n    let moveLeftAction\
    \ = SKAction.moveTo(x: 0.0, duration: 2.0)\n    let moveRightAction = SKAction.moveTo(x:\
    \ size.width, duration: 2.0)\n    let actionSequence = SKAction.sequence([moveLeftAction,\
    \ moveRightAction])\n    let moveAction = SKAction.repeatForever(actionSequence)\n\
    \    let blackHolePlistPath = Bundle.main.path(forResource: \"blackholes\", ofType:\
    \ \"plist\")\n    let blackHoleDataDictionary = NSDictionary(contentsOfFile: blackHolePlistPath!)\n\
    \    if let positionDictionary = blackHoleDataDictionary {\n        let positions\
    \ = positionDictionary.object(forKey: \"positions\") as! NSArray\n        for\
    \ position in positions {\n            let blackHoleNode = BlackHole(textureAtlas:\
    \ SKTextureAtlas(named: \"sprites.atlas\"))\n            let x = (position as\
    \ AnyObject).object(forKey: \"x\") as! CGFloat\n            let y = (position\
    \ as AnyObject).object(forKey: \"y\") as! CGFloat\n            blackHoleNode.position\
    \ = CGPoint(x: x, y: y)\n            blackHoleNode.run(moveAction)\n         \
    \   foregroundNode.addChild(blackHoleNode)\n        }\n    }\n}\n```\n\nNote that\
    \ now the `addBlackHolesToForeground()` method, just like the `addOrbsToForeground()`\
    \ method, reads all the black hole node positions from the plist and then adds\
    \ each of the `blackHoleNodes` at those read-in positions. Make this change and\
    \ run your game again. You’ll see no difference, but now people with little to\
    \ no development experience can completely change the game."
