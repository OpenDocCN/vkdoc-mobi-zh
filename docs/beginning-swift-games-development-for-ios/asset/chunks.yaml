- fmt: '# Part I

    Introduction to SpriteKit


    ## Swift and SpriteKit


    In this part of this book, we will cover the basics of SpriteKit including how
    you render and animate sprites, add physics and collision detection, and control
    your game play with the accelerometer. You will also look at how you add particle
    emitters to enhance the appearance of your game. We will cover everything you
    need to know to create your own SpriteKit game. © James Goodwill and Wesley Matlock
    2017 James Goodwill and Wesley Matlock *Beginning Swift Games Development for
    iOS* 10.1007/978-1-4842-2310-9_1


    # 1. Setting Up Your Game Scene and Adding Your First Sprites


    James Goodwill¹ and Wesley Matlock² (1) Highlands Ranch, Colorado, USA (2) Kansas
    City, Missouri, USA


    SpriteKit is Apple’s exciting 2D game framework that was first released in September
    2013 with iOS 7. It is an animation and graphics rendering framework that gives
    you the power to easily animate textured images, play video, render text, and
    add particle effects. It also includes an integrated physics library. SpriteKit
    is the first-ever game engine formally built into the iOS SDK. In this chapter
    you will learn what SpriteKit is and how to create a new SpriteKit game using
    Xcode. You will then move on and create the beginnings of a SpriteKit game starting
    from scratch. You’ll learn about `SKNodes` and their subclasses and you’ll use
    an `SKSpriteNode` to add both a background node and a player node to your game.


    ## What You Need to Know and Have


    This section of this book assumes you have a basic understanding of how to build
    iPhone applications using Xcode and the Xcode Simulator. It also assumes you have
    a basic knowledge of the iOS/Mac programming language Swift. If you are not familiar
    with Swift, there is a brief introduction in the appendix at the back of this
    book. This book doesn’t cover how to program. It focuses only on SpriteKit game
    programming. To complete all the examples in the book, you will need to have an
    Intel-based Macintosh running OS X 10.11 (El Capitan) or newer. You will also
    need Xcode 8+ installed. You can find both of these in the Apple App Store.


    ## Introducing SuperSpaceMan


    We feel the best way to learn anything is to do it. Therefore, in this book you
    are going to dive right in and create your own game. You will start off with the
    basic code for a 2D game, and you will add new features to the game as we introduce
    new topics with each chapter. At the end of the book, you will have a complete
    game. The game you are going to create is inspired by Sega’s popular Sonic Jump
    Fever ( [https://itunes.apple.com/us/app/sonic-jump-fever/id794528112?mt=8](https://itunes.apple.com/us/app/sonic-jump-fever/id794528112?mt=8)
    ). It is a vertical scroller that accelerates the main character through obstacles
    and collectables, increasing your score as you collect rings. This game is similar
    in that it is a vertical scroller, but your main character is going to be a spaceman
    who hurtles through space collecting power orbs while trying to avoid black holes
    that will destroy him.


    ## Creating a Swift SpriteKit Project


    Before you can get started, you will need to create a Swift SpriteKit project.
    Open Xcode and complete the following steps:


    1. Click File ➤ New ➤ Project.

    2. Select iOS.

    3. Select the Game icon from the Application group. The choose template dialog
    should look like Figure [1-1](#A330720_2_En_1_Chapter.html#Fig1). ![A330720_2_En_1_Fig1_HTML.jpg](OEBPS/A330720_2_En_1_Fig1_HTML.jpg)
    Figure 1-1. The choose template dialog

    4. To move on, click the Next button.

    5. Enter `SuperSpaceMan` for Product Name, `Apress` for Organization Name, and
    `com.apress` for Organization Identifier.

    6. Make sure that `Swift` is the selected language, `SpriteKit` is the selected
    game technology, and `iPhone` is the selected device.

    7. Before you click Next, look at Figure [1-2](#A330720_2_En_1_Chapter.html#Fig2).
    If everything looks like that, click Next and select a good place to store your
    project files. Click Create. ![A330720_2_En_1_Fig2_HTML.jpg](OEBPS/A330720_2_En_1_Fig2_HTML.jpg)
    Figure 1-2. The choose project options dialog


    Note: You will notice you are creating an iPhone-only game. That’s only because
    the game you are creating lends itself better to the iPhone. Everything we cover
    in this book translates to the iPad just as well. You now have a working SpriteKit
    project. Go ahead and click the Play button to see what you have created. If everything
    went OK, you will see your new app running in the simulator. Note: The Xcode simulator
    may take a while to start on some slower machines. Simulating SpriteKit apps can
    be very taxing on your processors. It doesn’t do a whole lot yet, but there is
    more to it than displaying “Hello, World!” Tap the simulator screen a few times.
    You will see rotating boxes displayed wherever you tap. Depending on where you
    tapped, you should see something similar to Figure [1-3](#A330720_2_En_1_Chapter.html#Fig3).
    ![A330720_2_En_1_Fig3_HTML.jpg](OEBPS/A330720_2_En_1_Fig3_HTML.jpg) Figure 1-3.
    The SpriteKit sample application


    ## Starting from Scratch


    Although the standard SpriteKit template works great, you are going to be starting
    from scratch. Starting from nothing will allow you to see all the working parts
    in a SpriteKit game and will give you a much better understanding of what you
    are creating. The first thing you need to do is make sure your game runs only
    in portrait mode. To do that, follow these steps:


    1. Select the SuperSpaceMan project in the Project Explorer.

    2. Then select SuperSpaceMan from Targets.

    3. Deselect Landscape Left and Landscape Right.'
