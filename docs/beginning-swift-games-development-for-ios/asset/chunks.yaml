- fmt: "Now that you have scoring in place, it’s time to start telling the player\
    \ how many impulses they have left before they run out and start falling to their\
    \ demise. This will be much like adding the score label from the previous section.\
    \ The biggest difference is that you’re going to align the impulse label at the\
    \ top left of the scene.\n\nTo get started with this, the first thing you need\
    \ to do is add a constant to hold the impulse count label in the declarations\
    \ section of the `GameScene`. This line is shown here:\n\n`let impulseTextNode\
    \ = SKLabelNode(fontNamed: \"Copperplate\")`\n\nAdd this line directly after the\
    \ definition of the `scoreTextNode` constant.\n\nNext, modify the properties of\
    \ the `impulseTextNode`. The code to do this is in the following snippet:\n\n\
    ```\nimpulseTextNode.text = \"IMPULSES : \\(impulseCount)\"\nimpulseTextNode.fontSize\
    \ = 20\nimpulseTextNode.fontColor = SKColor.white\nimpulseTextNode.position =\
    \ CGPoint(x: 10.0, y: size.height - 20)\nimpulseTextNode.horizontalAlignmentMode\
    \ = SKLabelHorizontalAlignmentMode.left\naddChild(impulseTextNode)\n```\n\nYou’ve\
    \ seen all this before. This code sets the text of the node to “IMPULSES :” plus\
    \ the value currently stored in the instance variable `impulseCount`. It then\
    \ sets the font size to 20 and the color to white. After that, it sets the position\
    \ of the label node to 10 points from the left side of the scene and 20 points\
    \ from the top of the scene. The final property change sets `horizontalAlignementMode`\
    \ to `SKLabelHorizontalAlignmentMode.left` so that the left side of the text is\
    \ anchored to the node’s origin. After that, the `impulseTextNode` is added to\
    \ the scene.\n\nAdd this snippet to bottom of the `GameScene`’s `init(size: CGSize)`\
    \ method and save your work.\n\nThere are two more changes you need to make to\
    \ update the displayed impulse count. The first is to modify the text in the `impulseTextNode`\
    \ to reflect each time the player collects an orb, and the second is to modify\
    \ the `impulseTextNode` each time the player uses an impulse.\n\nStarting with\
    \ incrementing the impulse count, you need to modify the `didBegin(_ contact:\
    \ SKPhysicsContact)` method again. Specifically, you need to modify the `if` statement\
    \ that handles contact with orb nodes. Take a look at the following snippet:\n\
    \n```\nif nodeB.name == \"POWER_UP_ORB\"  {\n    impulseCount += 1\n    impulseTextNode.text\
    \ = \"IMPULSES : \\(impulseCount)\"\n    score += 1\n    scoreTextNode.text =\
    \ \"SCORE : \\(score)\"\n    nodeB.removeFromParent()\n}\n```\n\nEverything is\
    \ the same from the previous section except the line following the increment of\
    \ the impulse count. This line sets the text of the `impulseTextNode` to “IMPULSES\
    \ :” plus the value of the `impulseCount` variable that was just incremented on\
    \ the line before. Make these changes to the `if` statement and save your changes.\n\
    \nThe last change you need to make to display the current impulse count is to\
    \ modify the `impulseTextNode` each time an impulse is used by the player. To\
    \ do this, you need to go back to the `GameScene`’s `touchesBegan()` method and\
    \ modify the `if` statement that applies the impulse to the `playerNode` to look\
    \ like the following snippet:\n\n```\nif impulseCount > 0 {\n    playerNode.physicsBody?.applyImpulse(CGVector\
    \ (dx: 0.0, dy: 40.0))\n    impulseCount -= 1\n    impulseTextNode.text = \"IMPULSES\
    \ : \\(impulseCount)\"\n    engineExhaust!.isHidden = false\n    Timer.scheduledTimer(timeInterval:\
    \ 0.5, target: self,\n        selector:#selector(GameScene.hideEngineExhaust(_:))\
    \ , userInfo: nil, repeats: false)\n}\n```\n\nThere’s only one change to the body\
    \ of this `if` statement, and that’s the line following the decrement of the `impulseCount`\
    \ instance variable. On this line, the `impulseTextNode`’s `text` property is\
    \ being modified just like you did before, except this time the text node will\
    \ be set to “IMPULSES :” plus the recently decremented `impulseCount`.\n\nWhen\
    \ you’re finished looking at this snippet, save your changes and run the game\
    \ again. You’ll now see the addition of the impulse count label in the top-left\
    \ corner, as shown in Figure 7-9.\n\n![A330720_2_En_7_Fig9_HTML.jpg](OEBPS/A330720_2_En_7_Fig9_HTML.jpg)\n\
    \n**Figure 7-9.** The GameScene with an impulse count label\n\nGo ahead and tap\
    \ the screen a few times. Note how the impulse count label node decreases each\
    \ time you tap the screen and increases each time you come into contact with an\
    \ orb node.\n\n## Adding Simple Sounds to the Game\n\nThere’s one more thing to\
    \ cover before moving on to the next chapter. As we’re sure you’ve noticed, there’s\
    \ no sound in this game—boring. In this section, you’ll revisit `SKAction`s so\
    \ that you can add the functionality to play a sound each time an orb node is\
    \ collected.\n\nThe `SKAction` method you’ll use to create the action to play\
    \ a sound is the `playSoundFileNamed()` method. Its signature is shown here:\n\
    \n```\nclass func playSoundFileNamed(soundFile: String,\n                    \
    \          waitForCompletion wait: Bool) -> SKAction\n```\n\nThis method takes\
    \ the name of an audio file in your application bundle and a `Bool` that indicates\
    \ whether you want to wait until the sound is finished playing before moving on\
    \ to the next line of code. The file you pass to this method can be any of these\
    \ formats and more: MP3, M4A, CAF, WAV.\n\nAn example usage of this method is\
    \ shown in the following two lines:\n\n```\nlet playSoundAction = SKAction.playSoundFileNamed(\"\
    sound.wav\",\n                                               waitForCompletion:\
    \ false)\nrunAction(playSoundAction)\n```\n\nThese two lines will create an `SKAction`\
    \ that will play the file `sound.wav` and move on before the sound has finished\
    \ playing.\n\nLet’s add some sound to the SuperSpaceMan game. Before going any\
    \ further, find the zip file you downloaded in Chapter 1. This file contained\
    \ all the images you need, plus it has a folder named `sounds`. In this directory\
    \ you’ll find a file named `orb_pop.wav`. Copy this file into the SuperSpaceMan\
    \ folder of your project.\n\nOnce you’ve added the sound file to your project,\
    \ the first step is to create the `SKAction` that will play the sound. The following\
    \ code does that:\n\n```\nlet orbPopAction = SKAction.playSoundFileNamed(\"orb_pop.wav\"\
    ,\n                                               waitForCompletion: false)\n\
    ```\n\nThis code creates a constant named `orbPopAction` that holds an `SKAction`\
    \ that will play the sound file `orb_pop.wav` whenever the action is run. Add\
    \ this line to the declarations section of the `GameScene` immediately before\
    \ the first `init()` method:\n\n```\nlet orbPopAction = SKAction.playSoundFileNamed(\"\
    orb_pop.wav\",\n        waitForCompletion: false)\nrequired init?(coder aDecoder:\
    \ NSCoder) {\n    super.init(coder: aDecoder)\n}\n```\n\nYou now have an action\
    \ that will play the `orb_pop.wav` file. It’s now time to add the code to play\
    \ the sounds. To do that, you need to make one more modification to the `didBegin(_\
    \ contact: SKPhysicsContact)` method to add the code to run your new action. Take\
    \ a look at the modified `if` statement that handles orb contact, shown here:\n\
    \n```\nif nodeB.name == \"POWER_UP_ORB\" {\n     run(orbPopAction)\n    impulseCount\
    \ += 1\n    impulseTextNode.text = \"IMPULSES : \\(impulseCount)\"\n    score\
    \ += 1\n    scoreTextNode.text = \"SCORE : \\(score)\"\n    nodeB.removeFromParent()\n\
    }\n```\n\nHere you can see a new line, at the beginning of the `if` statement,\
    \ that runs the `orbPopAction` whenever the contacted node’s name is `POWER_UP_ORB`.\
    \ Make this change to the `if` statement and run the game again. Now every time\
    \ the `playerNode` comes into contact with an orb node, the `orb_pop.wav` sound\
    \ is played."
