    func setupLighting(scene:SCNScene) {     let ambientLight = SCNNode()     ambientLight.light
    = SCNLight()     ambientLight.light!.type = SCNLight.LightType.ambient     ambientLight.light!.color
    = UIColor.white     scene.rootNode.addChildNode(ambientLight)     let lightNode
