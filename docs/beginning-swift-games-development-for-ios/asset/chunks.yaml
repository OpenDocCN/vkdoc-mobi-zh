    \ now time to dig in and see how `SKScene` really works. We’ll start by defining\
    \ an `SKScene` object. An `SKScene` object represents a scene of content in a\
    \ SpriteKit game. It inherits from `SKEffectNode`, `SKNode`, `UIResponder`, and,\
    \ of course, `NSObject`. It is constructed first by creating the scene and then\
    \ by adding *n* number of other `SKNodes` to it. The scene and all its child nodes\
    \ are called the node tree, and the scene is the root of the node tree. The nodes\
    \ contained in a scene provide the content the scene will animate and render for\
