    each of the nodes and also cleans up the GameScene.


    ## Reusing Textures'
  trans: "\n我们想讨论的第一个最佳实践是将精灵节点重构为它们各自的类。这样做不仅能清理场景代码，还能将每个节点的特定代码封装到它自己的类中。可以抽象到独立类中的三个节点分别是玩家节点、能量球节点和黑洞节点。在开始这个过程之前，你需要创建一个新文件来存放常量。这个文件的目的是保存所有将在各个节点间使用的碰撞类别。创建这个新文件并将其命名为`SharedConstants.swift`。文件就位后，将所有碰撞类别从`GameScene.swift`文件移动到该文件中。完成后，你的新文件应如代码清单\
    \ 9-1 所示。\n\n```swift\nlet CollisionCategoryPlayer : UInt32 = 0x1 << 1\nlet CollisionCategoryPowerUpOrbs\
    \ : UInt32 = 0x1 << 2\nlet CollisionCategoryBlackHoles : UInt32 = 0x1 << 3\n```\n\
    *代码清单 9-1. `SharedConstants.swift`：用于存储多个类中使用的常量的文件*\n\n设置好常量后，再创建另一个名为`SpaceMan.swift`的新文件。这个文件将存放你重构后的`playerNode`的类。创建文件后，将代码清单\
    \ 9-2 中的代码复制进去并保存。\n\n```swift\nimport Foundation\nimport SpriteKit\n\nclass SpaceMan:\
    \ SKSpriteNode {\n    required init?(coder aDecoder: NSCoder) {\n        fatalError(\"\
    init(coder:) has not been implemented\")\n    }\n\n    init() {\n        let texture\
    \ = SKTexture(imageNamed: \"Player\")\n        super.init(texture: texture, color:\
    \ UIColor.clear, size: texture.size())\n        physicsBody = SKPhysicsBody(circleOfRadius:\
    \ size.width / 2)\n        physicsBody?.isDynamic = false\n        physicsBody?.linearDamping\
    \ = 1.0\n        physicsBody?.allowsRotation = false\n        physicsBody?.categoryBitMask\
    \ = CollisionCategoryPlayer\n        physicsBody?.contactTestBitMask = CollisionCategoryPowerUpOrbs\
    \ | CollisionCategoryBlackHoles\n        physicsBody?.collisionBitMask = 0\n \
    \   }\n}\n```\n*代码清单 9-2. `SpaceMan.swift`：新的`SpaceMan`类*\n\n`SpaceMan`类继承自`SKSpriteNode`，所有与设置太空人纹理和`physicsBody`相关的代码都已移入太空人的`init()`方法中。需要注意的是，在`init()`方法的开头，我们使用`\"\
    Player\"`图像创建了一个纹理，然后调用了所需的`super.init()`方法。这是因为我们正在子类化`SKSpriteNode`，而这是必需的初始化方法。我们将在本章后面的部分更详细地讨论纹理。现在我们已经将所有内容移到了这个类中，在游戏场景中使用它会容易得多。\n\
    \n一旦你有了新的`SpaceMan`类，就可以移除`GameScene`中以下九行代码：\n\n```swift\nplayerNode.physicsBody\
    \ = SKPhysicsBody(circleOfRadius: playerNode.size.width / 2)\nplayerNode.physicsBody?.dynamic\
    \ = false\nplayerNode.position = CGPoint(x: size.width / 2.0, y: 220.0)\nplayerNode.physicsBody?.linearDamping\
    \ = 1.0\nplayerNode.physicsBody?.allowsRotation = false\nplayerNode.physicsBody?.categoryBitMask\
    \ = CollisionCategoryPlayer\nplayerNode.physicsBody?.contactTestBitMask = CollisionCategoryPowerUpOrbs\
    \ | CollisionCategoryBlackHoles\nplayerNode.physicsBody?.collisionBitMask = 0\n\
    ```\n\n从`GameScene`的`init(size: CGSize)`方法中移除上述代码片段后，请确保保留下面这行代码：\n\n```swift\n\
    playerNode.position = CGPoint(x: size.width / 2.0, y: 220.0)\n```\n\n使用新的`SpaceMan`类，你需要做的最后一步是将节点的声明从：\n\
    \n```swift\nlet playerNode = SKSpriteNode(imageNamed: \"Player\")\n```\n\n改为：\n\
    \n```swift\nlet playerNode = SpaceMan()\n```\n\n接下来你需要创建的类，是一个封装所有与能量球节点相关代码的类。为此，创建另一个名为`Orb.swift`的文件，并将代码清单\
    \ 9-3 的内容复制进去。\n\n```swift\nimport Foundation\nimport SpriteKit\n\nclass Orb:\
    \ SKSpriteNode {\n    required init?(coder aDecoder: NSCoder) {\n        fatalError(\"\
    init(coder:) has not been implemented\")\n    }\n\n    init() {\n        let texture\
    \ = SKTexture(imageNamed: \"PowerUp\")\n        super.init(texture: texture,\n\
    \                   color: UIColor.clear,\n                   size: texture.size())\n\
    \        physicsBody =\n            SKPhysicsBody(circleOfRadius: self.size.width\
    \ / 2)\n        physicsBody?.isDynamic = false\n        physicsBody?.categoryBitMask\
    \ = CollisionCategoryPowerUpOrbs\n        physicsBody?.collisionBitMask = 0\n\
    \        name = \"POWER_UP_ORB\"\n    }\n}\n```\n*代码清单 9-3. `Orb.swift`：新的`Orb`类*\n\
    \n这个新的`Orb`类，与`SpaceMan`类非常相似，包含了所有设置节点纹理和其`physicsBody`的代码。一旦新的`Orb`类就位，你就可以将`addOrbsToForeground()`方法修改为如下简化版本：\n\
    \n```swift\nfunc addOrbsToForeground() {\n    var orbNodePosition =\n        \
    \  CGPoint(x: playerNode.position.x, y: playerNode.position.y + 100)\n    var\
    \ orbXShift : CGFloat = -1.0\n    for _ in 0...49 {\n        // new code to use\
    \ an orb\n        let orbNode = Orb()\n        if orbNodePosition.x - (orbNode.size.width\
    \ * 2) <= 0 {\n            orbXShift = 1.0\n        }\n        if orbNodePosition.x\
    \ + orbNode.size.width >= size.width {\n            orbXShift = -1.0\n       \
    \ }\n        orbNodePosition.x += 40.0 * orbXShift\n        orbNodePosition.y\
    \ += 120\n        orbNode.position = orbNodePosition\n        foregroundNode.addChild(orbNode)\n\
    \    }\n}\n```\n\n`addOrbsToForeground()`方法现在简单多了。它只执行三个步骤：创建每个能量球节点，设置它们各自的位置，然后将它们添加到场景中。\n\
    \n你要创建的最后一个节点类是`BlackHole`类。正如你可能猜到的，这个类将包含所有与黑洞相关的代码。创建另一个名为`BlackHole.swift`的新文件，并将代码清单\
    \ 9-4 的内容复制进去。\n\n```swift\nimport Foundation\nimport SpriteKit\n\nclass BlackHole:\
    \ SKSpriteNode {\n    required init?(coder aDecoder: NSCoder) {\n        fatalError(\"\
    init(coder:) has not been implemented\")\n    }\n\n    init() {\n        let frame0\
    \ = SKTexture(imageNamed: \"BlackHole0\")\n        let frame1 = SKTexture(imageNamed:\
    \ \"BlackHole1\")\n        let frame2 = SKTexture(imageNamed: \"BlackHole2\")\n\
    \        let frame3 = SKTexture(imageNamed: \"BlackHole3\")\n        let frame4\
    \ = SKTexture(imageNamed: \"BlackHole4\")\n        let blackHoleTextures = [frame0,\
    \ frame1, frame2, frame3, frame4]\n        let animateAction =\n            SKAction.animate(with:\
    \ blackHoleTextures, timePerFrame: 0.2)\n        let rotateAction = SKAction.repeatForever(animateAction)\n\
    \        super.init(texture: frame0,\n                   color: UIColor.clear,\n\
    \                   size: frame0.size())\n        physicsBody = SKPhysicsBody(circleOfRadius:\
    \ size.width / 2)\n        physicsBody?.isDynamic = false\n        physicsBody?.categoryBitMask\
    \ = CollisionCategoryBlackHoles\n        physicsBody?.collisionBitMask = 0\n \
    \       name = \"BLACK_HOLE\"\n        run(rotateAction)\n    }\n}\n```\n*代码清单\
    \ 9-4. `BlackHole.swift`：新的`BlackHole`类*\n\n一旦新的`BlackHole`类就位，你就可以将`addBlackHolesToForeground()`方法修改为如下简化版本：\n\
    \n```swift\nfunc addBlackHolesToForeground() {\n    let moveLeftAction = SKAction.moveTo(x:\
    \ 0.0, duration: 2.0)\n    let moveRightAction = SKAction.moveTo(x: size.width,\
    \ duration: 2.0)\n    let actionSequence = SKAction.sequence([moveLeftAction,\
    \ moveRightAction])\n    let moveAction = SKAction.repeatForever(actionSequence)\n\
    \    for i in 1...10 {\n        // new black hole usage code\n        let blackHoleNode\
    \ = BlackHole()\n        blackHoleNode.position = CGPoint(x: size.width - 80.0,\
    \ y: 600.0 * CGFloat(i))\n        blackHoleNode.run(moveAction)\n        foregroundNode.addChild(blackHoleNode)\n\
    \    }\n}\n```\n\n将这些节点移动到它们自己的类中，使得每个节点的重用更加容易，同时也清理了`GameScene`。\n\n## 重用纹理\n"
- fmt: "# Using a Single SKTextureAtlas Instance\n\nThe next best practice is using\
    \ a single instance of an `SKTextureAtlas` to load all the sprite images and then\
    \ reusing the atlas when setting all your sprite's textures. The first step is\
    \ to create an `SKTextureAtlas` and pass it to nodes so they can retrieve their\
    \ own textures.\n\nAdd this line of code immediately before the first `init()`\
    \ method in the `GameScene` class:\n\n```swift\nlet textureAtlas = SKTextureAtlas(named:\
    \ \"sprites.atlas\")\n```\n\nAfter you've created the texture atlas, you need\
    \ to change the `init()` method of each of the recently created `SKSpriteNode`s\
    \ to take an `SKTextureAtlas` as a parameter. Once the `SKSpriteNode` has a reference\
    \ to the `SKTextureAtlas`, you can change the texture-loading code in each node\
    \ to use this passed-in `textureAtlas`.\n\nThe following `init()` method shows\
    \ this change made to the `SpaceMan` class:\n\n```swift\ninit(textureAtlas: SKTextureAtlas)\
    \ {\n    let texture = textureAtlas.textureNamed(\"Player\")\n    super.init(texture:\
    \ texture, color: UIColor.clear, size: texture.size())\n    physicsBody = SKPhysicsBody(circleOfRadius:\
    \ size.width / 2)\n    physicsBody?.isDynamic = false\n    physicsBody?.linearDamping\
    \ = 1.0\n    physicsBody?.allowsRotation = false\n    physicsBody?.categoryBitMask\
    \ = CollisionCategoryPlayer\n    physicsBody?.contactTestBitMask =\n        CollisionCategoryPowerUpOrbs\
    \ | CollisionCategoryBlackHoles\n    physicsBody?.collisionBitMask = 0\n}\n```\n\
    \nNotice the `init()` method's parameter list now takes an `SKTextureAtlas` parameter,\
    \ and the first line of the `init()` method uses this `SKTextureAtlas` to load\
    \ the `Player` texture. Also note that the `init()` method no longer overrides\
    \ the default `init()`, and therefore we've removed the `override` keyword.\n\n\
    Make this change to the `SpaceMan.swift`'s `init()` method, and let's go back\
    \ to the `GameScene` class and change the `playerNode` declaration. To use the\
    \ new `SpaceMan.init()` method, you will need to make a few changes.\n\nIn the\
    \ `GameScene` class, first change the construction of the `playerNode` at the\
    \ top of the class to look like the following line:\n\n```swift\nvar playerNode:\
    \ SpaceMan!\n```\n\nNext, add a line in the `init()` that will initialize the\
    \ `playerNode` with the correct `SpaceMan` `SKSpriteNode`. Right above the code\
    \ where you set the `playerNode.position`, add the following line:\n\n```swift\n\
    playerNode = SpaceMan(textureAtlas: textureAtlas)\n```\n\nAfter you've made all\
    \ the `SpaceMan` changes, let's move on to doing the same to both the `Orb` and\
    \ `BlackHole` classes. First, change the `init()` method of the `Orb` to take\
    \ an `SKTextureAtlas`:\n\n```swift\ninit(textureAtlas: SKTextureAtlas) {\n   \
    \ let texture = textureAtlas.textureNamed(\"PowerUp\")\n    super.init(texture:\
    \ texture, color: UIColor.clear, size: texture.size())\n    physicsBody = SKPhysicsBody(circleOfRadius:\
    \ size.width / 2)\n    physicsBody?.isDynamic = false\n    physicsBody?.categoryBitMask\
    \ = CollisionCategoryPowerUpOrbs\n    physicsBody?.collisionBitMask = 0\n    name\
    \ = \"POWER_UP_ORB\"\n}\n```\n\nAfter changing the `Orb`'s `init()` method, change\
    \ `GameScene`'s `addOrbsToForeground()` to look like the following:\n\n```swift\n\
    func addOrbsToForeground() {\n    var orbNodePosition =\n        CGPoint(x: playerNode.position.x,\
    \ y: playerNode.position.y + 100)\n    var orbXShift : CGFloat = -1.0\n    for\
    \ _ in 0...49 {\n        let orbNode = Orb(textureAtlas: SKTextureAtlas(named:\
    \ \"sprites.atlas\"))\n        if orbNodePosition.x - (orbNode.size.width * 2)\
    \ <= 0 {\n            orbXShift = 1.0\n        }\n        if orbNodePosition.x\
    \ + orbNode.size.width >= size.width {\n            orbXShift = -1.0\n       \
    \ }\n        orbNodePosition.x += 40.0 * orbXShift\n        orbNodePosition.y\
    \ += 120\n        orbNode.position = orbNodePosition\n        foregroundNode.addChild(orbNode)\n\
    \    }\n}\n```\n\nNext, change the `init()` method of the `BlackHole` to take\
    \ an `SKTextureAtlas` and then use this texture atlas to load all the textures\
    \ going forward. This change is shown in the following snippet:\n\n```swift\n\
    init(textureAtlas: SKTextureAtlas) {\n    let frame0 = textureAtlas.textureNamed(\"\
    BlackHole0\")\n    let frame1 = textureAtlas.textureNamed(\"BlackHole1\")\n  \
    \  let frame2 = textureAtlas.textureNamed(\"BlackHole2\")\n    let frame3 = textureAtlas.textureNamed(\"\
    BlackHole3\")\n    let frame4 = textureAtlas.textureNamed(\"BlackHole4\")\n  \
    \  let blackHoleTextures = [frame0, frame1, frame2, frame3, frame4];\n    let\
    \ animateAction = SKAction.animate(with: blackHoleTextures, timePerFrame: 0.2)\n\
    \    let rotateAction = SKAction.repeatForever(animateAction)\n    super.init(texture:\
    \ frame0, color: UIColor.clear, size: frame0.size())\n    physicsBody = SKPhysicsBody(circleOfRadius:\
    \ size.width / 2)\n    physicsBody?.isDynamic = false\n    physicsBody?.categoryBitMask\
    \ = CollisionCategoryBlackHoles\n    physicsBody?.collisionBitMask = 0\n    name\
    \ = \"BLACK_HOLE\"\n    run(rotateAction)\n}\n```\n\nFinally, change `GameScene`'s\
    \ `addBlackHolesToForeground()` so that it passes the `SKTextureAtlas` to the\
    \ `BlackHole`, as shown here:\n\n```swift\nfunc addBlackHolesToForeground() {\n\
    \    let moveLeftAction = SKAction.moveTo(x: 0.0, duration: 2.0)\n    let moveRightAction\
    \ = SKAction.moveTo(x: size.width, duration: 2.0)\n    let actionSequence = SKAction.sequence([moveLeftAction,\
    \ moveRightAction])\n    let moveAction = SKAction.repeatForever(actionSequence)\n\
    \    for i in 1...10 {\n        // new black hole usage code\n        let blackHoleNode\
    \ = BlackHole(textureAtlas:\n            SKTextureAtlas(named: \"sprites.atlas\"\
    ))\n        blackHoleNode.position = CGPoint(x: size.width - 80.0,\n         \
    \                                y: 600.0 * CGFloat(i))\n        blackHoleNode.run(moveAction)\n\
    \        foregroundNode.addChild(blackHoleNode)\n    }\n}\n```\n\nAt this point,\
    \ all the `SKSpriteNode`s reuse the same `SKTextureAtlas`, which will speed up\
    \ the retrieval of each of your node's textures.\n\n## Externalizing Your Game\
    \ Data"
