    \ 方法内，将 `UIView` 向下转型为 `SKView`，并设置 `showFPS` 属性为 `true`：\n\n```\nlet skView =\
    \ view as! SKView\nskView.showsFPS = true\n```\n\n4. 创建一个名为 `GameScene` 的 `SKScene`\
    \ 实例，在构造函数中传入其大小，并设置 `scaleMode` 属性：\n\n```\nscene = GameScene(size: skView.bounds.size)\n\
