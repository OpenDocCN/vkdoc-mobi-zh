  trans: "\n接下来要讨论的最佳实践不一定会提升游戏性能，但有助于开发和测试。到目前为止，每个游戏节点的位置都硬编码在`SuperSpaceMan`的 Swift\
    \ 代码中。如果你正在开发一个简单的游戏，并且同时担任设计师和开发者，这样没问题；但如果你的团队有明确分工，你可能希望让设计师或测试人员无需修改 Swift\
    \ 代码就能调整游戏玩法。一种实现方式是将游戏节点的位置外部化。在`SuperSpaceMan`游戏中，一个简单的做法是把能量球和黑洞的位置移到 plist\
    \ 文件中。然后你可以通过`NSBundle`加载节点位置。这样设计师或测试人员只需修改 plist 文件就能改变整个游戏的布局。\n\n下面是一个包含前三个能量球节点位置的\
    \ plist 示例：\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist\
    \ PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"\
    >\n<plist version=\"1.0\">\n<dict>\n    <key>positions</key>\n    <array>\n  \
    \  <dict>\n        <key>x</key>\n        <real>120.0</real>\n        <key>y</key>\n\
    \        <real>440.0</real>\n    </dict>\n    <dict>\n        <key>x</key>\n \
    \       <real>80.0</real>\n        <key>y</key>\n        <real>560.0</real>\n\
    \    </dict>\n    <dict>\n        <key>x</key>\n        <real>120.0</real>\n \
    \       <key>y</key>\n        <real>680.0</real>\n    </dict>\n    ...\n    </array>\n\
    </dict>\n</plist>\n```\n\n在这个文件中，你可以看到一个字典数组，每个字典包含能量球节点的 x 坐标和 y 坐标。无需自己创建这个文件。你可以在之前下载的、包含精灵图片的\
    \ zip 压缩包中找到`orbs.plist`和`blackholes.plist`文件。将这两个文件复制到项目的`SupportingFiles`组中，然后我们继续使用它们。\n\
    \n将两个 plist 文件复制到项目后，你可以通过主 bundle 加载它们。看看下面修改后的`addOrbsToForeground()`方法：\n\n\
    ```\nfunc addOrbsToForeground() {\n    let orbPlistPath = Bundle.main.path(forResource:\
    \ \"orbs\", ofType: \"plist\")\n    let orbDataDictionary = NSDictionary(contentsOfFile:\
    \ orbPlistPath!)\n    if let positionDictionary = orbDataDictionary {\n      \
    \  let positions = positionDictionary.object(forKey: \"positions\") as! NSArray\n\
    \        for position in positions {\n            let orbNode = Orb(textureAtlas:\
    \ SKTextureAtlas(named: \"sprites.atlas\"))\n            let x = (position as\
    \ AnyObject).object(forKey: \"x\") as! CGFloat\n            let y = (position\
    \ as AnyObject).object(forKey: \"y\") as! CGFloat\n            orbNode.position\
    \ = CGPoint(x: x, y: y)\n            foregroundNode.addChild(orbNode)\n      \
    \  }\n    }\n}\n```\n\n在新的`addOrbsToForeground()`方法中，你可以看到它首先加载`orbs.plist`的内容。然后从字典中获取位置数组，最后遍历所有位置，将每个`orbNode`添加到对应位置的`foregroundNode`上。现在你可以通过修改\
    \ plist 来改变所有能量球节点的数量和布局。\n\n对`addOrbsToForeground()`方法进行这些修改，然后对黑洞做同样的处理。你已经将`blackholes.plist`文件复制到项目中，因此可以跳过复制步骤，直接修改`addBlackHolesToForeground()`方法，从\
    \ plist 加载黑洞位置。新的`addBlackHolesToForeground()`方法如下：\n\n```\nfunc addBlackHolesToForeground()\
    \ {\n    let moveLeftAction = SKAction.moveTo(x: 0.0, duration: 2.0)\n    let\
    \ moveRightAction = SKAction.moveTo(x: size.width, duration: 2.0)\n    let actionSequence\
    \ = SKAction.sequence([moveLeftAction, moveRightAction])\n    let moveAction =\
    \ SKAction.repeatForever(actionSequence)\n    let blackHolePlistPath = Bundle.main.path(forResource:\
    \ \"blackholes\", ofType: \"plist\")\n    let blackHoleDataDictionary = NSDictionary(contentsOfFile:\
    \ blackHolePlistPath!)\n    if let positionDictionary = blackHoleDataDictionary\
    \ {\n        let positions = positionDictionary.object(forKey: \"positions\")\
    \ as! NSArray\n        for position in positions {\n            let blackHoleNode\
    \ = BlackHole(textureAtlas: SKTextureAtlas(named: \"sprites.atlas\"))\n      \
    \      let x = (position as AnyObject).object(forKey: \"x\") as! CGFloat\n   \
    \         let y = (position as AnyObject).object(forKey: \"y\") as! CGFloat\n\
    \            blackHoleNode.position = CGPoint(x: x, y: y)\n            blackHoleNode.run(moveAction)\n\
    \            foregroundNode.addChild(blackHoleNode)\n        }\n    }\n}\n```\n\
    \n请注意，现在的`addBlackHolesToForeground()`方法与`addOrbsToForeground()`方法类似，都是从 plist\
    \ 中读取所有黑洞节点位置，然后将每个`blackHoleNode`添加到读取到的对应位置。进行修改后再次运行游戏。你会发现没有变化，但现在那些几乎没有开发经验的人也能完全改变游戏了。\n"
- fmt: "# Keeping Your Node Tree Pruned\n\nThe final best practice to implement in\
    \ the `SuperSpaceMan` game is to remove all `SKNode`s that have dropped off the\
    \ bottom of the viewable scene. Removing unnecessary nodes from your games will\
    \ improve the overall performance of node tree rendering and reduce the amount\
    \ of memory used to hold all the nodes in your node tree. A simple way to remove\
    \ unnecessary nodes from `GameScene` is to create a method that will remove all\
    \ nodes with a given name that are one scene length below the `playerNode`. Take\
    \ a look at the following `removeOutOfSceneNodesWithName()` method:\n\n```\nfunc\
    \ removeOutOfSceneNodesWithName(_ name: String) {\n    foregroundNode.enumerateChildNodes(withName:\
    \ name, using: {\n        node, stop in\n        if self.playerNode.position.y\
    \ - node.position.y > self.size.height {\n            node.removeFromParent()\n\
    \        }\n    })\n}\n```\n\nThis method takes a single `String` representing\
    \ the name of each `SKNode` you want to test and uses the `enumerateChildNodesWithName()`\
    \ method to check to see whether those nodes are positioned one scene length below\
    \ the `playerNode`. If the returned node is greater than one scene length, it’s\
    \ removed from the scene. Notice one thing about this method: inside the `enumerateChildNodesWithName()`\
    \ method it first checks to see whether the `playerNode` is `nil`. If the `playerNode`\
    \ is `nil`, then it stops the search for child nodes by setting the `stop.memory`\
    \ property to `true`. Add this method to the bottom of the `GameScene`.\n\nTo\
    \ use the `removeOutOfSceneNodesWithName()`, you need to add a call to this method,\
    \ for each node that can be removed from the scene, to the bottom of `GameScene`’s\
    \ `update()` method. In this instance, the two nodes that can fall out of the\
    \ scene are the `BLACK_HOLE` and `POWER_UP_ORB` nodes. Take a look at the modified\
    \ `update()` method with these two calls added to the end of the method, shown\
    \ here:\n\n```\noverride func update(_ currentTime: TimeInterval) {\n    if playerNode.position.y\
    \ >= 180.0 &&\n        playerNode.position.y < 6400.0 {\n        backgroundNode.position\
    \ =\n            CGPoint(x: backgroundNode.position.x,\n                    y:\
    \ -((playerNode.position.y - 180.0)/8))\n        backgroundStarsNode.position\
    \ =\n            CGPoint(x: backgroundStarsNode.position.x,\n                \
    \    y: -((playerNode.position.y - 180.0)/6))\n        backgroundPlanetNode.position\
    \ =\n            CGPoint(x: backgroundPlanetNode.position.x,\n               \
    \     y: -((playerNode.position.y - 180.0)/8))\n        foregroundNode.position\
    \ =\n            CGPoint(x: foregroundNode.position.x,\n                    y:\
    \ -(playerNode.position.y - 180.0))\n    }\n    else if playerNode.position.y\
    \ > 7000.0 {\n        gameOverWithResult(true)\n    }\n    else if playerNode.position.y\
    \ + playerNode.size.height < 0.0 {\n        gameOverWithResult(false)\n    }\n\
    \    removeOutOfSceneNodesWithName(\"BLACK_HOLE\")\n    removeOutOfSceneNodesWithName(\"\
    POWER_UP_ORB\")\n}\n```\n\nThe new `update()` method now calls the `removeOutOfSceneNodesWithName()`\
    \ method at the end of every scene rendering, removing all unnecessary nodes.\
    \ Make this change to the `update()` method and run the `SuperSpaceMan` game one\
    \ last time. When you play the game this time, tap the screen until you’re about\
    \ to win the game and then stop tapping so that the `playerNode` starts to fall.\
    \ This time as you fall, the passed-up orb and black hole nodes have been removed\
    \ from the scene.\n\n## Summary\n\nIn this chapter, you learned some SpriteKit\
    \ best practices, including how to create your own subclasses of `SKSpriteNode`\
    \ so that you can better reuse your nodes. You then moved on to changing your\
    \ game to load all the sprites into a single texture. After that, you moved on\
    \ to externalizing your game data. Finally, you pruned your node tree of all nodes\
    \ that had fallen off the bottom of the screen. In Chapter [10](#A330720_2_En_10_Chapter.html),\
    \ you’ll begin your journey into SceneKit. Have fun.\n\n# Part II  \nIntroduction\
    \ to Scenekit\n\n© James Goodwill and Wesley Matlock 2017 James Goodwill and Wesley\
    \ Matlock Beginning Swift Games Development for iOS 10.1007/978-1-4842-2310-9_10\n\
    \n# 10. Creating Your First SceneKit Project\n\nJames Goodwill^(1) and Wesley\
    \ Matlock² (1) Highlands Ranch, Colorado, USA (2) Kansas City, Missouri, USA\n\
    \nIn this chapter, you will dive right in and create your own game. For this game\
    \ you’ll make an homage to the classic Wolfenstein 3D game. First you’ll learn\
    \ how to programmatically create a scene and add nodes into the scene. After you\
    \ have a basic understanding of these principles, you’ll learn how to use the\
    \ powerful SceneKit Editor in later chapters.\n\n## SceneKit Primer\n\n`SceneKit`\
    \ is Apple’s powerful 3D graphics framework that makes creating casual 3D games\
    \ simple. By using the `SceneKit` API, you can create fully immersive 3D games\
    \ without needing knowledge of OpenGL. `SceneKit` was first released for OS X\
    \ Mountain Lion, and since the release of iOS 8, developers have created amazing\
    \ 3D games with it. With the release of iOS 10 developers can now create 3D games\
    \ for all Apple’s devices: iOS, tvOS, macOS, and watchOS. `SceneKit` is used to\
    \ create a scene graph, which contains a scene and a hierarchy of nodes, as shown\
    \ in Figure [10-1](#A330720_2_En_10_Chapter.html#Fig1). `SceneKit` uses these\
    \ nodes to display scenes in a view and processes the scene graph using the graphics\
    \ processing unit (GPU). This improves the performance of rendering the frames\
    \ on the device.\n\n![A330720_2_En_10_Fig1_HTML.gif](OEBPS/A330720_2_En_10_Fig1_HTML.gif)\n\
    \n**Figure 10-1.** Scene graph\n\nApple has integrated SpriteKit within the `SceneKit`\
    \ technology stack. This integration will allow you to use your SpriteKit knowledge\
    \ to create your casual 3D game. Table [10-1](#A330720_2_En_10_Chapter.html#Tab1)\
    \ gives you an overview of the various classes and describes each of these `SceneKit`\
    \ classes.\n\n**Table 10-1.** SceneKit Classes\n\n| Class | Description |\n| ---\
    \ | --- |\n| `SCNView` | This view is used to display `SceneKit` objects. |\n\
    | `SCNScene` | A scene can be created programmatically or by using a 3D file from\
    \ graphic tools. |\n| `SCNNode` | This is the starting point to create a scene.\
    \ |\n| `SCNCamera` | This is the point of view for the scene. |\n| `SCNGeometry`\
    \ | This is a 3D object used to attach to a node. This also can use 3D files from\
    \ graphic tools. |\n| `SCNMaterial` | Material is used to describe how the surface\
    \ of the node will be rendered. |\n| `SCNLight` | This is a light source attached\
    \ to a node to provide shading and lighting of the scene. |\n\n### SceneKit Animation\n\
    \n`SceneKit` is also integrated with ImageKit and CoreAnimation, so you don’t\
    \ need any advanced knowledge of 3D programming. When you create scenes, you can\
    \ create animations that transition elegantly between different values of the\
    \ scene’s properties. `SceneKit` uses the `SCNTransaction` class to create an\
    \ atomic run loop to combine all your implicit animation changes. These types\
    \ of changes are ideally small atomic changes that occur almost immediately, and\
    \ you can increase the duration. These types of animated properties automatically\
    \ animate. Because `SceneKit` is based on CoreAnimation, you can explicitly create\
    \ animation objects and attach them to the animated scene. For this more complex\
    \ animation, you subclass `CAAnimation`. After creating this subclass using key-value\
    \ coding, set the animation parameters and attach them to the node or elements\
    \ in the scene. The `CAAnimation` class is also able to use objects from third-party\
    \ graphic authoring tools."
  raw: '## Keeping Your Node Tree Pruned


    The final best practice to implement in the SuperSpaceMan game is to remove all
    SKNodes that have dropped off the bottom of the viewable scene. Removing unnecessary
    nodes from your games will improve the overall performance of node tree rendering
    and reduce the amount of memory used to hold all the nodes in your node tree.
    A simple way to remove unnecessary nodes from GameScene is to create a method
    that will remove all nodes with a given name that are one scene length below the
    playerNode. Take a look at the following removeOutOfSceneNodesWithName() method:
    func removeOutOfSceneNodesWithName(_ name: String) {     foregroundNode.enumerateChildNodes(withName:
    name, using: {         node, stop in         if self.playerNode.position.y - node.position.y
    > self.size.height {             node.removeFromParent()         }     }) } This
    method takes a single String representing the name of each SKNode you want to
    test and uses the enumerateChildNodesWithName() method to check to see whether
    those nodes are positioned one scene length below the playerNode. If the returned
    node is greater than one scene length, it’s removed from the scene. Notice one
    thing about this method: inside the enumerateChildNodesWithName() method it first
    checks to see whether the playerNode is nil. If the playerNode is nil, then it
    stops the search for child nodes by setting the stop.memory property to true.
    Add this method to the bottom of the GameScene. To use the removeOutOfSceneNodesWithName(),
    you need to add a call to this method, for each node that can be removed from
    the scene, to the bottom of GameScene’s update() method. In this instance, the
    two nodes that can fall out of the scene are the BLACK_HOLE and POWER_UP_ORB nodes.
    Take a look at the modified update() method with these two calls added to the
    end of the method, shown here: override func update(_ currentTime: TimeInterval)
    {     if playerNode.position.y >= 180.0 &&         playerNode.position.y < 6400.0
    {         backgroundNode.position =             CGPoint(x: backgroundNode.position.x,
                        y: -((playerNode.position.y - 180.0)/8))         backgroundStarsNode.position
    =             CGPoint(x: backgroundStarsNode.position.x,                     y:
    -((playerNode.position.y - 180.0)/6))         backgroundPlanetNode.position =
                CGPoint(x: backgroundPlanetNode.position.x,                     y:
    -((playerNode.position.y - 180.0)/8))         foregroundNode.position =             CGPoint(x:
    foregroundNode.position.x,                     y: -(playerNode.position.y - 180.0))
        }     else if playerNode.position.y > 7000.0 {         gameOverWithResult(true)
        }     else if playerNode.position.y + playerNode.size.height < 0.0 {         gameOverWithResult(false)
        }     removeOutOfSceneNodesWithName("BLACK_HOLE")     removeOutOfSceneNodesWithName("POWER_UP_ORB")
    } The new update() method now calls the removeOutOfSceneNodesWithName() method
    at the end of every scene rendering, removing all unnecessary nodes. Make this
    change to the update() method and run the SuperSpaceMan game one last time. When
    you play the game this time, tap the screen until you’re about to win the game
    and then stop tapping so that the playerNode starts to fall. This time as you
    fall, the passed-up orb and black hole nodes have been removed from the scene.


    ## Summary


    In this chapter, you learned some SpriteKit best practices, including how to create
    your own subclasses of SKSpriteNode so that you can better reuse your nodes. You
    then moved on to changing your game to load all the sprites into a single texture.
    After that, you moved on to externalizing your game data. Finally, you pruned
    your node tree of all nodes that had fallen off the bottom of the screen. In Chapter
    [10](#A330720_2_En_10_Chapter.html), you’ll begin your journey into SceneKit.
    Have fun.


    # Part II

    Introduction to Scenekit


    © James Goodwill and Wesley Matlock 2017 James Goodwill and Wesley MatlockBeginning
    Swift Games Development for iOS10.1007/978-1-4842-2310-9_10


    # 10. Creating Your First SceneKit Project


    James Goodwill^(1 ) and Wesley Matlock² (1) Highlands Ranch, Colorado, USA (2)
    Kansas City, Missouri, USA   In this chapter, you will dive right in and create
    your own game. For this game you’ll make an homage to the classic Wolfenstein
    3D game. First you’ll learn how to programmatically create a scene and add nodes
    into the scene. After you have a basic understanding of these principles, you’ll
    learn how to use the powerful SceneKit Editor in later chapters.


    ## SceneKit Primer


    SceneKit is Apple’s powerful 3D graphics framework that makes creating casual
    3D games simple. By using the SceneKit API, you can create fully immersive 3D
    games without needing knowledge of OpenGL . SceneKit was first released for OS
    X Mountain Lion, and since the release of iOS 8, developers have created amazing
    3D games with it. With the release of iOS 10 developers can now create 3D games
    for all Apples devices: iOS, tvOS, macOS, and watchOS. SceneKit is used to create
    a scene graph , which contains a scene and a hierarchy of nodes, as shown in Figure
    [10-1](#A330720_2_En_10_Chapter.html#Fig1). SceneKit uses these nodes to display
    scenes in a view and processes the scene graph using the graphics processing unit
    (GPU) . This improves the performance of rendering the frames on the device. ![A330720_2_En_10_Fig1_HTML.gif](OEBPS/A330720_2_En_10_Fig1_HTML.gif)
    Figure 10-1. Scene graph Apple has integrate d SpriteKit within the SceneKit technology
    stack. This integration will allow you to use your SpriteKit knowledge to create
    your casual 3D game. Table [10-1](#A330720_2_En_10_Chapter.html#Tab1) gives you
    an overview of the various classes and describes each of these SceneKit classes.
    Table 10-1. SceneKit Classes


    | Class | Description |

    | --- | --- |

    | SCNView | This view is used to display SceneKit objects. |

    | SCNScene | A scene can be created programmatically or by using a 3D file from
    graphic tools. |

    | SCNNode | This is the starting point to create a scene. |

    | SCNCamera | This is the point of view for the scene. |

    | SCNGeometry | This is a 3D object used to attach to a node. This also can use
    3D files from graphic tools. |

    | SCNMaterial | Material is used to describe how the surface of the node will
    be rendered. |

    | SCNLight | This is a light source attached to a node to provide shadi ng and
    lighting of the scene. |


    ### SceneKit Animation


    SceneKit is also integrated with ImageKit and CoreAnimation, so you don’t need
    any advanced knowledge of 3D programming. When you create scenes, you can create
    animations that transition elegantly between different values of the scene’s properties.
    SceneKit uses the SCNTransaction class to create an atomic run loop to combine
    all your implicit animation changes. These types of changes are ideally small
    atomic changes that occur almost immediately, and you can increase the duration.
    These types of animated properties automatically animate. Because SceneKit is
    based on CoreAnimation, you can explicitly create animation objects and attach
    them to the animated scene. For this more complex animation, you subclass CAAnimation.
    After creating this subclass using key-value coding, set the animation parameters
    and attach them to the node or elements in the scene. The CAAnimation class is
    also able to use objects from third-party graphic authoring tools.'
  trans: "\n# 保持节点树的精简\n\n在 `SuperSpaceMan` 游戏中要实现的最佳实践是，移除所有掉落至可见场景底部的 `SKNode`。从游戏中移除不必要的节点，能够提升节点树渲染的整体性能，并减少节点树中容纳所有节点所占用的内存。要从\
    \ `GameScene` 中移除不必要的节点，一个简单的方法是创建一个方法，移除所有具有指定名称且位于 `playerNode` 下方一个场景长度之下的节点。请看以下\
    \ `removeOutOfSceneNodesWithName()` 方法：\n\n```\nfunc removeOutOfSceneNodesWithName(_\
    \ name: String) {\n    foregroundNode.enumerateChildNodes(withName: name, using:\
    \ {\n        node, stop in\n        if self.playerNode.position.y - node.position.y\
    \ > self.size.height {\n            node.removeFromParent()\n        }\n    })\n\
    }\n```\n\n该方法接受一个代表要测试的每个 `SKNode` 名称的单个 `String`，并使用 `enumerateChildNodesWithName()`\
    \ 方法来检查这些节点是否位于 `playerNode` 下方一个场景长度的位置。如果返回的节点位置超出这个长度，则将其从场景中移除。关于这个方法有一点需要注意：在\
    \ `enumerateChildNodesWithName()` 方法内部，它首先检查 `playerNode` 是否为 `nil`。如果 `playerNode`\
    \ 为 `nil`，则通过将 `stop.memory` 属性设置为 `true` 来停止对子节点的搜索。将此方法添加到 `GameScene` 的底部。\n\
    \n要使用 `removeOutOfSceneNodesWithName()`，你需要在 `GameScene` 的 `update()` 方法底部，为每个可以从场景中移除的节点添加对该方法的调用。在本例中，可能掉落至场景外的两个节点是\
    \ `BLACK_HOLE` 和 `POWER_UP_ORB` 节点。请看修改后的 `update()` 方法，该方法末尾添加了这两个调用，如下所示：\n\n\
    ```\noverride func update(_ currentTime: TimeInterval) {\n    if playerNode.position.y\
    \ >= 180.0 &&\n        playerNode.position.y < 6400.0 {\n        backgroundNode.position\
    \ =\n            CGPoint(x: backgroundNode.position.x,\n                    y:\
    \ -((playerNode.position.y - 180.0)/8))\n        backgroundStarsNode.position\
    \ =\n            CGPoint(x: backgroundStarsNode.position.x,\n                \
    \    y: -((playerNode.position.y - 180.0)/6))\n        backgroundPlanetNode.position\
    \ =\n            CGPoint(x: backgroundPlanetNode.position.x,\n               \
    \     y: -((playerNode.position.y - 180.0)/8))\n        foregroundNode.position\
    \ =\n            CGPoint(x: foregroundNode.position.x,\n                    y:\
    \ -(playerNode.position.y - 180.0))\n    }\n    else if playerNode.position.y\
    \ > 7000.0 {\n        gameOverWithResult(true)\n    }\n    else if playerNode.position.y\
    \ + playerNode.size.height < 0.0 {\n        gameOverWithResult(false)\n    }\n\
    \    removeOutOfSceneNodesWithName(\"BLACK_HOLE\")\n    removeOutOfSceneNodesWithName(\"\
    POWER_UP_ORB\")\n}\n```\n\n新的 `update()` 方法现在会在每次场景渲染结束时调用 `removeOutOfSceneNodesWithName()`\
    \ 方法，移除所有不必要的节点。对 `update()` 方法进行此修改，并最后一次运行 `SuperSpaceMan` 游戏。这次运行游戏时，点击屏幕直到即将赢得游戏，然后停止点击，使\
    \ `playerNode` 开始下落。这次在你下落的过程中，之前经过的能量球和黑洞节点已从场景中被移除。\n\n## 总结\n\n在本章中，你学习了一些\
    \ SpriteKit 的最佳实践，包括如何创建你自己的 `SKSpriteNode` 子类，以便更好地复用节点。接着，你将游戏改为将所有精灵加载到单一纹理中。之后，你学习了将游戏数据外部化。最后，你修剪了节点树，移除了所有掉落至屏幕底部的节点。在第\
    \ 10 章中，你将开启 SceneKit 的学习之旅。祝愉快。\n\n# 第二部分  \nSceneKit 入门\n\n© James Goodwill\
    \ 和 Wesley Matlock 2017 James Goodwill 与 Wesley Matlock 《iOS 10 初学者 Swift 游戏开发》\
    \ 10.1007/978-1-4842-2310-9_10\n\n# 10. 创建你的第一个 SceneKit 项目\n\nJames Goodwill¹\
    \ 和 Wesley Matlock² (1) 美国科罗拉多州海兰兹牧场 (2) 美国密苏里州堪萨斯城\n\n在本章中，你将直接动手创建自己的游戏。这个游戏将致敬经典的《德军总部\
    \ 3D》。首先，你将学习如何以编程方式创建场景并向场景中添加节点。在你对这些原理有了基本了解之后，你将在后续章节中学习如何使用强大的 SceneKit 编辑器。\n\
    \n## SceneKit 入门\n\n`SceneKit` 是 Apple 强大的 3D 图形框架，使创建休闲 3D 游戏变得简单。通过使用 `SceneKit\
    \ API`，你无需了解 OpenGL 即可创建完全沉浸式的 3D 游戏。`SceneKit` 最初发布于 OS X Mountain Lion，自 iOS\
    \ 8 发布以来，开发者已用它创建了众多令人惊叹的 3D 游戏。随着 iOS 10 的发布，开发者现在可以为所有 Apple 设备（iOS、tvOS、macOS\
    \ 和 watchOS）创建 3D 游戏。`SceneKit` 用于创建场景图，其中包含一个场景和节点的层次结构，如图 10-1 所示。`SceneKit`\
    \ 使用这些节点在视图中显示场景，并通过图形处理单元 (GPU) 来处理场景图。这提升了在设备上渲染帧的性能。\n\n![A330720_2_En_10_Fig1_HTML.gif](img/A330720_2_En_10_Fig1_HTML.gif)\n\
    \n**图 10-1.** 场景图\n\nApple 已将 SpriteKit 集成到 `SceneKit` 技术栈中。这种集成将允许你运用 SpriteKit\
    \ 知识来创建休闲 3D 游戏。表 10-1 概述了各种类，并描述了这些 `SceneKit` 类。\n\n**表 10-1.** SceneKit 类\n\
    \n| 类 | 描述 |\n| --- | --- |\n| `SCNView` | 此视图用于显示 `SceneKit` 对象。 |\n| `SCNScene`\
    \ | 一个场景可以通过编程方式创建，或使用来自图形工具的 3D 文件创建。 |\n| `SCNNode` | 这是创建场景的起点。 |\n| `SCNCamera`\
    \ | 这是场景的视角。 |\n| `SCNGeometry` | 这是一个用于附加到节点的 3D 对象。它也可以使用来自图形工具的 3D 文件。 |\n\
    | `SCNMaterial` | 材质用于描述节点的表面将如何渲染。 |\n| `SCNLight` | 这是附加到节点上的光源，用于提供场景的着色和光照。\
    \ |\n\n### SceneKit 动画\n\n`SceneKit` 还与 ImageKit 和 CoreAnimation 集成，因此你无需任何 3D\
    \ 编程的高级知识。当你创建场景时，你可以创建在场景属性的不同值之间优雅过渡的动画。`SceneKit` 使用 `SCNTransaction` 类创建一个原子运行循环，以组合你所有的隐式动画更改。这类更改理想情况下是几乎立即发生的小型原子更改，并且你可以增加持续时间。这些类型的动画属性会自动动画化。由于\
    \ `SceneKit` 基于 CoreAnimation，你可以显式创建动画对象并将其附加到动画场景中。对于这种更复杂的动画，你需要对 `CAAnimation`\
    \ 进行子类化。使用键值编码创建此子类后，设置动画参数并将其附加到场景中的节点或元素上。`CAAnimation` 类还能够使用来自第三方图形创作工具的对象。\n"
- fmt: "### What You Need to Know\n\n`SceneKit` is a 3D-based API, so you should have\
    \ a basic understanding of graphing concepts such as coordinate systems and 3D\
    \ geometry.\n\n- **Points**: In this context, a point is a position in a three-dimensional\
    \ space.\n- **Vectors**: You will use vectors mostly for directions.\n- **Cartesian\
    \ coordinate system**: This comprises two axes: the x-axis that extends along\
    \ the horizontal plane and the y-axis that extends perpendicular to the x-axis.\n\
    - **Euclidean space**: This is simply the 3D coordinate system, with the addition\
    \ of the z-axis that represents the depth of view.\n- **Transformations**: Many\
    \ operations do transformations, but for now you’ll be dealing with operators\
    \ that will be used for points and rotations. Think of this as transforming a\
    \ point to a different point or applying a vector (direction) to the rotation\
    \ of the object.\n\nFor more information on computer graphics programming, we\
    \ suggest looking at *Geometric Algebra for Computer Graphics* by John Vince (Apress,\
    \ 2008). By default, the camera, or user view angle, is along the z-axis (Figure\
    \ [10-2](#A330720_2_En_10_Chapter.html#Fig2)).  \n![A330720_2_En_10_Fig2_HTML.jpg](OEBPS/A330720_2_En_10_Fig2_HTML.jpg)\
    \  \nFigure 10-2. SceneKit coordinate system\n\n## Creating the SceneKit Project\n\
    \nThe best way to learn this is to simply dive in and start from scratch. You\
    \ will create a game project using Swift as the language and `SceneKit` as the\
    \ game technology. To create the project, open `Xcode` and complete the following\
    \ steps:\n\n1. Select **File** ➤ **New Project**.\n2. Select **Application** from\
    \ the iOS group.\n3. Select the **Game** icon. The Choose Template dialog should\
    \ now look like Figure [10-3](#A330720_2_En_10_Chapter.html#Fig3).  \n   ![A330720_2_En_10_Fig3_HTML.jpg](OEBPS/A330720_2_En_10_Fig3_HTML.jpg)\
    \  \n   Figure 10-3. The Choose Template dialog\n4. To move on, click the **Next**\
    \ button.\n5. Enter `SuperSpaceMan3D` for **Product Name**, `Apress` for **Organization\
    \ Name**, and `com.apress` for **Organization Identifier**.\n6. Make sure **Swift**\
    \ is the selected language, **SceneKit** is the selected game technology, and\
    \ **iPhone** is the selected device.\n7. Before you click the **Next** button,\
    \ take a look at Figure [10-4](#A330720_2_En_10_Chapter.html#Fig4). If everything\
    \ looks like this image, click the **Next** button and select a good place to\
    \ store your project files.  \n   ![A330720_2_En_10_Fig4_HTML.jpg](OEBPS/A330720_2_En_10_Fig4_HTML.jpg)\
    \  \n   Figure 10-4. Choosing options for your project\n\n> **Note:** You’re creating\
    \ an iPhone-only game, but that’s because this game lends itself better to the\
    \ iPhone. Everything we cover in this book translates to any iOS device. Once\
    \ you click **Next** you’ll be asked where you want to save the project. You now\
    \ have a working `SceneKit` project, and you can click the **Play** button to\
    \ see the default `SceneKit` game. If everything went OK, you’ll see your new\
    \ app running in the simulator. It doesn’t do much yet, but you should see a spinning\
    \ 3D rendition of a jet plane, similar to Figure [10-5](#A330720_2_En_10_Chapter.html#Fig5).\
    \  \n![A330720_2_En_10_Fig5_HTML.jpg](OEBPS/A330720_2_En_10_Fig5_HTML.jpg)  \n\
    Figure 10-5. The SceneKit sample application\n\n## Wiring Up and Building a Scene\n\
    \nNow that you have a basic project and an understanding of `SceneKit`, it’s time\
    \ to actually learn how to put these classes together and create a game. Right\
    \ now you have a project that’s running the default Apple sample code. In this\
    \ section, you’ll remove that code and create a floor and the spaceman in his\
    \ new environment.\n\n### Swiftystein3D\n\nBefore you move on, let’s get the project\
    \ fully cleaned out so that you can start from scratch. Unlike the previous game\
    \ that was in portrait orientation only, this time you will go with landscape\
    \ orientation only, so you will need to change your target settings so they look\
    \ like Figure [10-6](#A330720_2_En_10_Chapter.html#Fig6).  \n![A330720_2_En_10_Fig6_HTML.jpg](OEBPS/A330720_2_En_10_Fig6_HTML.jpg)\
    \  \nFigure 10-6. The SuperSpaceMan3D device orientation\n\nThe next thing to\
    \ do is to replace the `GameViewController.swift` file’s contents with the class\
    \ in Listing [10-1](#A330720_2_En_10_Chapter.html#Par28). You want to override\
    \ the `viewDidLoad()` method and create an empty `SCNScene`.\n\n```swift\nimport\
    \ UIKit\nimport QuartzCore\nimport SceneKit\n\nclass GameViewController: UIViewController\
    \ {\n    override func viewDidLoad() {\n        super.viewDidLoad()\n        //\
    \ create a new scene\n        view.SCNView()\n    }\n}\n```\n\nListing 10-1. GameViewController.swift:\
    \ The GameViewController\n\nNow if you run the game, you’ll see a blank screen,\
    \ which is a great place for you to start the game.\n\n### Project Resources\n\
    \nOne thing you’ll need is the image assets that will be used throughout the book.\
    \ You should download these items from [www.apress.com/97814823093](http://www.apress.com/97814823093).\
    \ `Xcode` uses the folder `art.scnassests` to optimize your 3D assets for quick\
    \ loading and smooth rendering at runtime. If you look at your project, you will\
    \ have a folder named `art.scnassets` that contains the default images `ship.dea`\
    \ and `texture.png`. Go ahead and delete those two files because you won’t use\
    \ them.\n\nNow that you’ve removed the `ship.dea` and `texture.png` files, you\
    \ can copy the game assets into this folder using the **Finder** application and\
    \ dragging the images into `Xcode`. See Figure [10-7](#A330720_2_En_10_Chapter.html#Fig7)\
    \ for an example.  \n![A330720_2_En_10_Fig7_HTML.jpg](OEBPS/A330720_2_En_10_Fig7_HTML.jpg)\
    \  \nFigure 10-7. Art assets\n\nNow that you have these files in the project,\
    \ you need to add the static images to the project. This time you can simply drag\
    \ the image from your folder in the Finder to the `Xcode` project and drop them\
    \ into `Xcode`’s image asset catalog: `Images.xcassets`. All the images that you’ll\
    \ be using for this game will be added at this time.\n\n### Building the Scene"
  raw: '### What You Need to Know


    SceneKit is a 3D-based API, so you should have a basic understanding of graphing
    concepts such as coordinate systems and 3D geometry.


    *   Points: In this context, a point is a position in a three-dimensional space.

    *   Vectors: You will use vectors mostly for directions.

    *   Cartesian coordinate system : This comprises two axes: the x-axis that extends
    along the horizontal plane and the y-axis that extends perpendicular to the x-axis.

    *   Euclidean space : This is simply the 3D coordinate system, with the addition
    of the z-axis that represents the depth of view.

    *   Transformations: Many operations do transformations, but for now you’ll be
    dealing with operators that will be used for points and rotations. Think of this
    as transforming a point to a different point or applying a vector (direction)
    to the rotation of the object.


    For more information on computer graphics programming, we suggest looking at Geometric
    Algebra for Computer Graphics by John Vince (Apress, 2008). By default, the camera,
    or user view angle, is along the z-axis (Figure [10-2](#A330720_2_En_10_Chapter.html#Fig2)).
    ![A330720_2_En_10_Fig2_HTML.jpg](OEBPS/A330720_2_En_10_Fig2_HTML.jpg) Figure 10-2.
    SceneKit coordinate system


    ## Creating the SceneKit Project


    The best way to learn this is to simply dive in and start from scratch. You will
    create a game project using Swift as the language and SceneKit as the game technology.
    To create the project, open Xcode and complete the following steps:


    1.  1. Select File ➤ New Project.  

    2.  2. Select Application from the iOS group.  

    3.  3. Select the Game icon. The Choose Template dialog should now look like Figure
    [10-3](#A330720_2_En_10_Chapter.html#Fig3). ![A330720_2_En_10_Fig3_HTML.jpg](OEBPS/A330720_2_En_10_Fig3_HTML.jpg)
    Figure 10-3. The Choose Template dialog  

    4.  4. To move on, click the Next button.  

    5.  5. Enter SuperSpaceMan3D for Product Name, Apress for Organization Name, and
    com.apress for Organization Identifier.  

    6.  6. Make sure Swift is the selected language, SceneKit is the selected game
    technology, and iPhone is the selected device.  

    7.  7. Before you click the Next button, take a look at Figure [10-4](#A330720_2_En_10_Chapter.html#Fig4).
    If everything looks like this image, click the Next button and select a good place
    to store your project files. ![A330720_2_En_10_Fig4_HTML.jpg](OEBPS/A330720_2_En_10_Fig4_HTML.jpg)
    Figure 10-4. Choosing options for your project  


    Note You’re creating an iPhone-only game, but that’s because this game lends itself
    better to the iPhone. Everything we cover in this book translates to any iOS device.
    Once you click Next you’ll be asked where you want to save the project. You now
    have a working SceneKit project, and you can click the Play button to see the
    default SceneKit game. If everything went OK, you’ll see your new app running
    in the simulator. It doesn’t do much yet, but you should see a spinning 3D rendition
    of a jet plane, similar t o Figure [10-5](#A330720_2_En_10_Chapter.html#Fig5).
    ![A330720_2_En_10_Fig5_HTML.jpg](OEBPS/A330720_2_En_10_Fig5_HTML.jpg) Figure 10-5.
    The SceneKit sample application


    ## Wiring Up and Building a Scene


    Now that you have a basic project and an understanding of SceneKit, it’s time
    to actually learn how to put these classes together and create a game. Right now
    you have a project that’s running the default Apple sample code. In this section,
    you’ll remove that code and create a floor and the spaceman in his new environment.


    ### Swiftystein3D


    Before you move on, let’s get the project fully cleaned out so that you can start
    from scratch. Unlike the previous game that was in portrait orientation only,
    this time you will go with landscape orientation only, so you will need to change
    your target settings so they look like Figure [10-6](#A330720_2_En_10_Chapter.html#Fig6).
    ![A330720_2_En_10_Fig6_HTML.jpg](OEBPS/A330720_2_En_10_Fig6_HTML.jpg) Figure 10-6.
    The SuperSpaceMan3D device orientation The next thing to do is to replace the
    GameViewController.swift file’s contents with the class in Listing [10-1](#A330720_2_En_10_Chapter.html#Par28).
    You want to override the viewDidLoad() method and create an empty SCNScene. import
    UIKit import QuartzCore import SceneKit class GameViewController: UIViewController
    {     override func viewDidLoad() {         super.viewDidLoad()         // create
    a new scene         view.SCNView()     } } Listing 10-1. GameViewController.swift:
    The GameViewController Now if you run the game , you’ll see a blank screen, which
    is a great place for you to start the game.


    ### Project Resources


    One thing you’ll need is the image assets that will be used throughout the book.
    You should download these items from [www.apress.com/97814823093](http://www.apress.com/97814823093)
    . Xcode uses the folder art.scnassests to optimize your 3D assets for quick loading
    and smooth rendering at runtime. If you look at your project, you will have a
    folder named art.scnassets that contains the default images ship.dea and texture.png.
    Go ahead and delete those two files because you won’t use them. Now that you’ve
    removed the ship.dea and texture.png files, you can copy the game assets into
    this folder using the Finder application and dragging the images into Xcode. See
    Figure [10-7](#A330720_2_En_10_Chapter.html#Fig7) for an example. ![A330720_2_En_10_Fig7_HTML.jpg](OEBPS/A330720_2_En_10_Fig7_HTML.jpg)
    Figure 10-7. Art assets Now that you have these files in the project, you need
    to add the static images to the project. This time you can simply drag the image
    from your folder in the Finder to the Xcode project and drop them into Xcode’s
    image asset catalog: Images.xcassets. All the images that you’ll be using for
    this game will be added at this time.


    ### Building the Scene'
  trans: "\n### 需要了解的知识\n\n`SceneKit` 是一个基于 3D 的 API，因此你需要对坐标系统、3D 几何等图形学概念有基础了解。\n\
    \n- **点**：在本文档中，点是三维空间中的一个位置。\n- **向量**：你主要会使用向量来表示方向。\n- **笛卡尔坐标系**：由两个轴组成：沿水平面延伸的\
    \ X 轴和垂直于 X 轴的 Y 轴。\n- **欧几里得空间**：即三维坐标系，并增加了表示景深的 Z 轴。\n- **变换**：许多操作会涉及变换，但现阶段你只需处理用于点和旋转的运算符。可以将其理解为将一个点变换到另一个点，或将一个向量（方向）应用到物体的旋转上。\n\
    \n有关计算机图形编程的更多信息，我们建议参考 John Vince 所著的 *Geometric Algebra for Computer Graphics*（Apress，2008\
    \ 年）。默认情况下，摄像机或用户视角沿 Z 轴方向（图 10-2）。  \n![A330720_2_En_10_Fig2_HTML.jpg](img/A330720_2_En_10_Fig2_HTML.jpg)\
    \  \n图 10-2. SceneKit 坐标系统\n\n## 创建 SceneKit 项目\n\n学习的最好方法就是直接动手，从零开始。你将创建一个使用\
    \ Swift 作为编程语言、`SceneKit` 作为游戏技术的游戏项目。要创建项目，请打开 `Xcode` 并完成以下步骤：\n\n1. 选择 **文件**\
    \ ➤ **新建项目**。\n2. 从 iOS 分组中选择 **应用程序**。\n3. 选择 **游戏** 图标。此时“选择模板”对话框应如图 10-3 所示。\
    \  \n   ![A330720_2_En_10_Fig3_HTML.jpg](img/A330720_2_En_10_Fig3_HTML.jpg)  \n\
    \   图 10-3. 选择模板对话框\n4. 点击 **下一步** 按钮继续。\n5. 在 **产品名称** 中输入 `SuperSpaceMan3D`，在\
    \ **组织名称** 中输入 `Apress`，在 **组织标识符** 中输入 `com.apress`。\n6. 确保 **Swift** 为所选语言，**SceneKit**\
    \ 为所选游戏技术，**iPhone** 为所选设备。\n7. 在点击 **下一步** 按钮之前，请查看图 10-4。如果一切与此图一致，请点击 **下一步**\
    \ 按钮，并选择一个合适的位置来存储你的项目文件。  \n   ![A330720_2_En_10_Fig4_HTML.jpg](img/A330720_2_En_10_Fig4_HTML.jpg)\
    \  \n   图 10-4. 为项目选择选项\n\n> **注意：** 你正在创建一个仅限 iPhone 的游戏，但这是因为该游戏更适合在 iPhone\
    \ 上运行。我们书中介绍的所有内容都适用于任何 iOS 设备。点击 **下一步** 后，系统会询问你希望将项目保存在哪里。你现在有了一个可运行的 `SceneKit`\
    \ 项目，可以点击 **播放** 按钮来查看默认的 `SceneKit` 游戏。如果一切正常，你将看到新应用在模拟器中运行。虽然目前它还不能做什么，但你应该能看到一个旋转的喷气式飞机\
    \ 3D 渲染效果，类似于图 10-5。  \n![A330720_2_En_10_Fig5_HTML.jpg](img/A330720_2_En_10_Fig5_HTML.jpg)\
    \  \n图 10-5. SceneKit 示例应用程序\n\n## 连接并构建场景\n\n现在你已经有了一个基础项目，并对 `SceneKit` 有所了解，是时候真正学习如何将这些类组合起来并创建游戏了。目前你的项目正在运行苹果的默认示例代码。在本节中，你将移除这些代码，并为太空人创建一个地板和新环境。\n\
    \n### Swiftystein3D\n\n在继续之前，让我们彻底清理项目，以便从零开始。与之前仅支持竖屏的游戏不同，这次你将仅支持横屏，因此需要更改目标设置，使其如图\
    \ 10-6 所示。  \n![A330720_2_En_10_Fig6_HTML.jpg](img/A330720_2_En_10_Fig6_HTML.jpg)\
    \  \n图 10-6. SuperSpaceMan3D 设备方向\n\n接下来要做的是将 `GameViewController.swift` 文件的内容替换为列表\
    \ 10-1 中的类。你需要重写 `viewDidLoad()` 方法并创建一个空的 `SCNScene`。\n\n```swift\nimport UIKit\n\
    import QuartzCore\nimport SceneKit\n\nclass GameViewController: UIViewController\
    \ {\n    override func viewDidLoad() {\n        super.viewDidLoad()\n        //\
    \ 创建一个新场景\n        view.SCNView()\n    }\n}\n```\n\n列表 10-1. GameViewController.swift：GameViewController\n\
    \n现在如果你运行游戏，将看到一个空白屏幕，这是一个开始游戏的好起点。\n\n### 项目资源\n\n你需要准备的其中一项是本书中将要使用的图像资源。你应该从\
    \ [www.apress.com/97814823093](http://www.apress.com/97814823093) 下载这些资源。`Xcode`\
    \ 使用 `art.scnassests` 文件夹来优化你的 3D 资源，以便在运行时快速加载和流畅渲染。查看你的项目，会有一个名为 `art.scnassets`\
    \ 的文件夹，其中包含默认图像 `ship.dea` 和 `texture.png`。请直接删除这两个文件，因为不会用到它们。\n\n既然已经删除了 `ship.dea`\
    \ 和 `texture.png` 文件，现在可以通过 **访达** 应用程序将游戏资源复制到此文件夹，然后将图像拖入 `Xcode`。示例如图 10-7\
    \ 所示。  \n![A330720_2_En_10_Fig7_HTML.jpg](img/A330720_2_En_10_Fig7_HTML.jpg) \
    \ \n图 10-7. 美术资源\n\n现在这些文件已在项目中，你需要将静态图像添加到项目。这次你只需将图像从“访达”中的文件夹直接拖到 `Xcode` 项目中，并放入\
    \ `Xcode` 的图像资源目录：`Images.xcassets`。本游戏将用到的所有图像都将在此次添加。\n\n### 构建场景\n"
- fmt: "# 开始使用 SceneKit\n\n一个不错的起点是`GameViewController`类。你需要移除`viewDidLoad()`方法中的临时代码，即之前创建空`SCNScene`的部分：\n\
    \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n}\n```\n\n在这个类中，你将创建一个类属性来存储主场景变量。就在类声明之后，继续创建用于存储主场景的变量：\n\
    \n```\nclass GameViewController: UIViewController {\n    var mainScene: SCNScene!\n\
    ```\n\n根据上一节的最佳实践，你将使用独立的函数来创建游戏对象。这有助于你理解当前的操作，并在后续需要时更容易重构：\n\n```\nfunc createMainScene()\
    \ -> SCNScene {\n    let mainScene = SCNScene(named: \"art.scnassets/hero.dae\"\
    )\n    return mainScene!\n}\n```\n\n这个方法虽小但功能强大；这正是 SceneKit 强大之处开始显现的地方。如你所见，你正在加载一个由\
    \ 3D 美术师提供的 Collada 文件（`.dae`）。一旦完成场景编码，只需再添加几行代码，你就能让英雄以华丽的 3D 形态呈现。\n\n现在，将创建好的场景添加到你的视图中。在`viewDidLoad()`方法中，你将通过调用刚创建的函数来初始化`mainScene`，然后将该场景添加到`GameViewController`的视图中：\n\
    \n```\n// create a new scene\nmainScene = createMainScene()\nlet sceneView = self.view\
    \ as! SCNView\nsceneView.scene = mainScene\n\n// Optional, but nice to be turned\
    \ on during developement\nsceneView.showsStatistics = true\nsceneView.allowsCameraControl\
    \ = true\n```\n\n这段代码会获取视图，然后将场景添加到视图的场景中。既然你在这里，为什么不添加`showStatistics`，以便查看 SceneKit\
    \ 处理 3D 对象的性能呢？你还可以将`allowsCameraControl`设置为`true`，这样就能通过手势操控视图。捏合和缩放可以拉近拉远场景，而平移则允许你围绕场景移动视角。\n\
    \n现在，你应该能够运行项目并在完整的 3D 中看到英雄，如图[10-8](#A330720_2_En_10_Chapter.html#Fig8)所示。你还可以旋转他，从各个角度观察。\n\
    \n![A330720_2_En_10_Fig8_HTML.jpg](OEBPS/A330720_2_En_10_Fig8_HTML.jpg)\n\n**图\
    \ 10-8.** 3D 中的太空人\n\n在继续之前，你的`GameViewController`应类似于代码清单[10-2](#A330720_2_En_10_Chapter.html#Par45)：\n\
    \n```\nclass GameViewController: UIViewController {\n    var mainScene: SCNScene!\n\
    \n    override func viewDidLoad() {\n        super.viewDidLoad()\n\n        //\
    \ create a new scene\n        mainScene = createMainScene()\n        let sceneView\
    \ = self.view as! SCNView\n        sceneView.scene = mainScene\n\n        // Optional,\
    \ but nice to be turned on during developement\n        sceneView.showsStatistics\
    \ = true\n        sceneView.allowsCameraControl = true\n    }\n\n    func createMainScene()\
    \ -> SCNScene {\n        let mainScene = SCNScene(named: \"art.scnassets/hero.dae\"\
    )\n        return mainScene!\n    }\n}\n```\n\n**代码清单 10-2.** 设置 `GameViewController`\
    \ 类\n\n接下来，你将为太空人创建一个可供行走的地面。在`GameViewController`类中，你将创建一个新方法来创建地面节点。暂时不必过多担心`SCNNode`——我将在后续章节中详细讨论它。然而，节点是\
    \ SceneKit 场景中使用的基本对象。在函数声明中，你可以看到你将返回一个`SCNNode`给调用者：\n\n```\nfunc createFloorNode()\
    \ -> SCNNode {\n\n}\n```\n\n接下来，你创建一个变量，其返回值类型为`SCNNode`，并将该节点的几何体设置为`SCNFloor`。`SCNFloor`是一个特殊的\
    \ SceneKit 类，用于创建一个无限平面。需要注意的是，这个平面将沿着 x 轴和 z 轴延伸，而 y 坐标设置为零：\n\n```\nlet floorNode\
    \ = SCNNode()\nfloorNode.geometry = SCNFloor()\nfloorNode.geometry?.firstMaterial?.diffuse.contents\
    \ = \"Floor\"\nreturn floorNode\n```\n\n在这段代码中，你为`floorNode`设置了几何体。一个节点只能被赋予一个几何体，因此要创建动画几何体，你需要创建一个空节点并向其添加子节点。对于`floorNode`，你不会创建动画几何体，但这部分内容我们会在后续创建游戏时涉及。你还为节点添加了一个材质，在本例中是你之前复制到`Assets.xcassets`中的“Floor”图像。现在，你可以简单地将材质理解为一种颜色或图像。同样，稍后你会深入学习材质相关内容。\n\
    \n现在，你已经有了一个可以为地面创建新`SCNNode`的方法。接下来，你需要将它添加到主场景中，以便你能看到并与此节点交互。返回到`createMainScene`方法，在创建主场景之后，添加以下代码：\n\
    \n```\nmainScene!.rootNode.addChildNode(createFloorNode())\n```\n\n现在运行游戏，你会注意到太空人站在地面之上，而不是悬浮在空中，如图[10-9](#A330720_2_En_10_Chapter.html#Fig9)所示。\n\
    \n![A330720_2_En_10_Fig9_HTML.jpg](OEBPS/A330720_2_En_10_Fig9_HTML.jpg)\n\n**图\
    \ 10-9.** 站在地面上的太空人\n\n现在运行游戏，你将能够围绕物体移动视图的视角（即摄像机），并确认你确实拥有一个 3D 场景。这是因为你将摄像机控制设置为`true`。使用捏合缩放和平移手势在场景中移动。如果你在模拟器中运行，请注意每秒帧数（fps），并观察它是否从未接近\
    \ 60 fps。在我的模拟器上，它从未超过 20 fps。这次，请在装有 iOS 10 的 iPhone 上运行游戏。现在当你移动摄像头时，你应该会看到\
    \ fps 保持在接近 60 fps。这是否意味着你的小 iPhone 比 Mac 更强大？很可能不是。模拟器只是模拟不同的设备，以便作为开发者的你快速测试代码。然而，当你在真实设备上运行游戏时，你可以看到\
    \ SceneKit 的强大之处。SceneKit 使用 GPU 来渲染场景和节点。这也是苹果建议在将应用提交到 App Store 审核之前，始终在设备上运行应用的原因之一。\n\
    \n在 SceneKit 可用之前，你必须使用其他第三方库或 OpenGL 来实现这一点。要达到你现在用不到 50 行代码所完成的功能，可能需要数千行代码。\n\
    \n## 总结\n\n恭喜！你现在已经拥有了一个运行中的简单 3D 场景。在本章中，你学习到了 SceneKit 提供的一些强大功能。你创建了一个后续将继续构建的项目。在第[11](#A330720_2_En_11_Chapter.html)章中，你将了解什么是场景图以及\
    \ SceneKit 如何使用场景图工作。你还将开始使用 SceneKit 的一些内置类，这些类将允许你创建游戏中将要使用的障碍物。\n\n© James\
    \ Goodwill and Wesley Matlock 2017  \nJames Goodwill 和 Wesley Matlock  \n*Beginning\
    \ Swift Games Development for iOS*  \n10.1007/978-1-4842-2310-9_11\n\n# 11. 场景与节点\n\
    \nJames Goodwill¹ 和 Wesley Matlock²  \n(1) 美国科罗拉多州海兰兹牧场  \n(2) 美国密苏里州堪萨斯城\n\n\
    在本章中，你将学习 SceneKit 如何使用场景图来渲染场景中的对象。一旦你理解了场景图，你将进一步了解如何使用 SceneKit 的内置模型。你将使用这些模型在游戏中创建障碍物，供英雄躲避，并为敌人提供掩护。"
  raw: 'A good place to start is in the GameViewController class. You need to remove
    the temporary code in the viewDidLoad() method where you were creating an empty
    SCNScene: override func viewDidLoad() {   super.viewDidLoad() } In this class
    you’ll create a class property that will be used to store the main scene variable.
    Right after the class declaration, go ahead and create the variable that will
    be used to store the main scene: class GameViewController: UIViewController {
        var mainScene: SCNScene! Using the best practices from the precious section,
    you’ll use separate functions to create the objects for the game. This will allow
    you to understand what’s going on and make it easier to refactor later if you
    want: func createMainScene() -> SCNScene {     let mainScene = SCNScene(named:
    "art.scnassets/hero.dae")     return mainScene! } This method is small but powerful;
    this is where SceneKit’s power starts to show. As you can see, you’re loading
    a Collada file (.dae) that a 3D artist has provided you. Once you finish coding
    the scene, with just a few more lines of code you’ll have the hero in his glorious
    3D-ness. Now let’s add the scene that’s being created to your view. In the viewDidLoad()
    method , you’ll initialize the mainScene by calling your newly created function
    and then adding that scene to your GameViewController’s view: // create a new
    scene mainScene = createMainScene() let sceneView = self.view as! SCNView sceneView.scene
    = mainScene // Optional, but nice to be turned on during developement sceneView.showsStatistics
    = true sceneView.allowsCameraControl = true This code will get the view, and then
    you add the scene to the view’s scene. Since you’re here, why not add showStatistics
    so you can see how well SceneKit handles 3D objects? You can also add allowsCameraControl
    = true so that you can manipulate the view using gestures. Pinching and zooming
    will zoom into the scene, and panning will allow you to pan around the scene.
    Now you should be able to run the project and see the hero in full 3D , as shown
    in Figure [10-8](#A330720_2_En_10_Chapter.html#Fig8). You can also spin him around
    and see him from all sides. ![A330720_2_En_10_Fig8_HTML.jpg](OEBPS/A330720_2_En_10_Fig8_HTML.jpg)
    Figure 10-8. Spaceman in 3D Before moving on, your GameViewController should look
    similar to Listing [10-2](#A330720_2_En_10_Chapter.html#Par45). class GameViewController:
    UIViewController {     var mainScene: SCNScene!     override func viewDidLoad()
    {         super.viewDidLoad()         // create a new scene         mainScene
    = createMainScene()         let sceneView = self.view as! SCNView         sceneView.scene
    = mainScene         // Optional, but nice to be turned on during developement
            sceneView.showsStatistics = true         sceneView.allowsCameraControl
    = true     }     func createMainScene() -> SCNScene {         let mainScene =
    SCNScene(named: "art.scnassets/hero.dae")         return mainScene!     } } Listing
    10-2. GameViewController Class Setup Next you’ll create a floor for the spaceman
    to walk on. In the GameViewController class, you’ll create a new method that will
    create the floor node. Don’t worry too much about an SCNNode—I discuse that in
    more detail in later chapters. However, nodes are the basic objects that are used
    in SceneKit scenes. In the function declaration, you can see you’ll return an
    SCNNode to the caller: func createFloorNode() -> SCNNode { }       Next you create
    a variable that will be the return SCNNode type, and you’ll make the geometry
    of the node a SCNFloor. The SCNFloor is a special SceneKit class that creates
    an infinite plane. It’s important to know that this plane will extend along the
    x- and z-coordinates, with the y-coordinate set to zero: let floorNode = SCNNode()
    floorNode.geometry = SCNFloor() floorNode.geometry?.firstMaterial?.diffuse.contents
    = "Floor" return floorNode In this section of code, you set up the geometry for
    the floorNode . A node can have only one geometry assigned to it, so to create
    animated geometries, you’d create an empty node and add child nodes to it. For
    the floorNode, you won’t be creating animated geometries, but that’s something
    we touch on later in creating the game. You’re also adding a material to the node,
    which in this case is the “Floor” image that you copied into the Assets.xcassets
    earlier in this chapter. You can simply think of the material as a color or image
    for now. Again, you’ll dive deep into materials later. You now have a method that
    will create a new SCNNode for the floor. Next you need to add it to your main
    scene so that you’ll be able to see and interact with this node. Head back up
    to the createMainScene met hod, and after you create the main scene, add the following:
    mainScene!.rootNode.addChildNode(createFloorNode()) Run the game now, and you’ll
    notice that the spaceman is standing on a floor instead of in the middle of nowhere,
    as shown i n Figure [10-9](#A330720_2_En_10_Chapter.html#Fig9). ![A330720_2_En_10_Fig9_HTML.jpg](OEBPS/A330720_2_En_10_Fig9_HTML.jpg)
    Figure 10-9. Spaceman standing on the floor Run the game now, and you’ll be able
    to move the view’s perspective—in other words, a camera—around the object and
    see that you do have a 3D scene. You can do this because you set the camera control
    to true. Use the pinch-zoom and panning gestures to move around the scene. If
    you are running this in the simulator, notice the frames per second (fps) and
    see that it is never near 60 fps. On my simulator, it never gets above 20 fps.
    This time, run the game on your iPhone that has iOS 10 installed. Now when you
    move the camera around, you should see the fps stays closer to 60 fps. Does this
    mean your little iPhone is more powerful than your Mac? Probably not. The simulator
    is simply simulating the different devices to allow you as a developer to quickly
    test your code. However, when you run the game on an actual device, you can see
    the power of SceneKit. SceneKit is using the GPU to render the scene and nodes.
    This one reason why Apple recommends you always run the application on a device
    before submitting it to the App Store for approval. Before SceneKit was available,
    you had to use other third-party libraries or OpenGL in order to accomplish this.
    That could take more than several thousand lines of code to accomplish what you
    have done in less than 50 lines.


    ## Summary


    Congratulations! You now have a simple 3D scene running. In this chapter, you
    learned some of the power that SceneKit provides. You created a project you will
    build upon. In Chapter [11](#A330720_2_En_11_Chapter.html), you’ll examine what
    a scene graph is and how SceneKit works with a scene graph. You’ll also start
    using some of SceneKit’s built-in classes that will allow you to create the obstacles
    that will be used within the game.© James Goodwill and Wesley Matlock 2017 James Goodwill
    and Wesley MatlockBeginning Swift Games Development for iOS10.1007/978-1-4842-2310-9_11


    # 11. Scenes and Nodes


    James Goodwill^(1 ) and Wesley Matlock² (1) Highlands Ranch, Colorado, USA (2)
    Kansas City, Missouri, USA   In this chapter, you’ll learn how SceneKit uses the
    scene graph to render the objects in the scene. Once you have an understanding
    of the scene graph, you’ll then see how to use the built-in models from SceneKit.
    You’ll use the models to make obstacles in your game for the hero to avoid and
    for the enemy to hide behind.'
  trans: "\n# 开始使用 SceneKit\n\n一个不错的起点是`GameViewController`类。你需要移除`viewDidLoad()`方法中的临时代码，即之前创建空`SCNScene`的部分：\n\
    \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n}\n```\n\n在这个类中，你将创建一个类属性来存储主场景变量。就在类声明之后，继续创建用于存储主场景的变量：\n\
    \n```\nclass GameViewController: UIViewController {\n    var mainScene: SCNScene!\n\
    ```\n\n根据上一节的最佳实践，你将使用独立的函数来创建游戏对象。这有助于你理解当前的操作，并在后续需要时更容易重构：\n\n```\nfunc createMainScene()\
    \ -> SCNScene {\n    let mainScene = SCNScene(named: \"art.scnassets/hero.dae\"\
    )\n    return mainScene!\n}\n```\n\n这个方法虽小但功能强大；这正是 SceneKit 强大之处开始显现的地方。如你所见，你正在加载一个由\
    \ 3D 美术师提供的 Collada 文件（`.dae`）。一旦完成场景编码，只需再添加几行代码，你就能让英雄以华丽的 3D 形态呈现。\n\n现在，将创建好的场景添加到你的视图中。在`viewDidLoad()`方法中，你将通过调用刚创建的函数来初始化`mainScene`，然后将该场景添加到`GameViewController`的视图中：\n\
    \n```\n// create a new scene\nmainScene = createMainScene()\nlet sceneView = self.view\
    \ as! SCNView\nsceneView.scene = mainScene\n\n// Optional, but nice to be turned\
    \ on during developement\nsceneView.showsStatistics = true\nsceneView.allowsCameraControl\
    \ = true\n```\n\n这段代码会获取视图，然后将场景添加到视图的场景中。既然你在这里，为什么不添加`showStatistics`，以便查看 SceneKit\
    \ 处理 3D 对象的性能呢？你还可以将`allowsCameraControl`设置为`true`，这样就能通过手势操控视图。捏合和缩放可以拉近拉远场景，而平移则允许你围绕场景移动视角。\n\
    \n现在，你应该能够运行项目并在完整的 3D 中看到英雄，如图 10-8 所示。你还可以旋转他，从各个角度观察。\n\n![A330720_2_En_10_Fig8_HTML.jpg](img/A330720_2_En_10_Fig8_HTML.jpg)\n\
    \n**图 10-8.** 3D 中的太空人\n\n在继续之前，你的`GameViewController`应类似于代码清单 10-2：\n\n```\n\
    class GameViewController: UIViewController {\n    var mainScene: SCNScene!\n\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n\n        //\
    \ create a new scene\n        mainScene = createMainScene()\n        let sceneView\
    \ = self.view as! SCNView\n        sceneView.scene = mainScene\n\n        // Optional,\
    \ but nice to be turned on during developement\n        sceneView.showsStatistics\
    \ = true\n        sceneView.allowsCameraControl = true\n    }\n\n    func createMainScene()\
    \ -> SCNScene {\n        let mainScene = SCNScene(named: \"art.scnassets/hero.dae\"\
    )\n        return mainScene!\n    }\n}\n```\n\n**代码清单 10-2.** 设置 `GameViewController`\
    \ 类\n\n接下来，你将为太空人创建一个可供行走的地面。在`GameViewController`类中，你将创建一个新方法来创建地面节点。暂时不必过多担心`SCNNode`——我将在后续章节中详细讨论它。然而，节点是\
    \ SceneKit 场景中使用的基本对象。在函数声明中，你可以看到你将返回一个`SCNNode`给调用者：\n\n```\nfunc createFloorNode()\
    \ -> SCNNode {\n\n}\n```\n\n接下来，你创建一个变量，其返回值类型为`SCNNode`，并将该节点的几何体设置为`SCNFloor`。`SCNFloor`是一个特殊的\
    \ SceneKit 类，用于创建一个无限平面。需要注意的是，这个平面将沿着 x 轴和 z 轴延伸，而 y 坐标设置为零：\n\n```\nlet floorNode\
    \ = SCNNode()\nfloorNode.geometry = SCNFloor()\nfloorNode.geometry?.firstMaterial?.diffuse.contents\
    \ = \"Floor\"\nreturn floorNode\n```\n\n在这段代码中，你为`floorNode`设置了几何体。一个节点只能被赋予一个几何体，因此要创建动画几何体，你需要创建一个空节点并向其添加子节点。对于`floorNode`，你不会创建动画几何体，但这部分内容我们会在后续创建游戏时涉及。你还为节点添加了一个材质，在本例中是你之前复制到`Assets.xcassets`中的“Floor”图像。现在，你可以简单地将材质理解为一种颜色或图像。同样，稍后你会深入学习材质相关内容。\n\
    \n现在，你已经有了一个可以为地面创建新`SCNNode`的方法。接下来，你需要将它添加到主场景中，以便你能看到并与此节点交互。返回到`createMainScene`方法，在创建主场景之后，添加以下代码：\n\
    \n```\nmainScene!.rootNode.addChildNode(createFloorNode())\n```\n\n现在运行游戏，你会注意到太空人站在地面之上，而不是悬浮在空中，如图\
    \ 10-9 所示。\n\n![A330720_2_En_10_Fig9_HTML.jpg](img/A330720_2_En_10_Fig9_HTML.jpg)\n\
    \n**图 10-9.** 站在地面上的太空人\n\n现在运行游戏，你将能够围绕物体移动视图的视角（即摄像机），并确认你确实拥有一个 3D 场景。这是因为你将摄像机控制设置为`true`。使用捏合缩放和平移手势在场景中移动。如果你在模拟器中运行，请注意每秒帧数（fps），并观察它是否从未接近\
    \ 60 fps。在我的模拟器上，它从未超过 20 fps。这次，请在装有 iOS 10 的 iPhone 上运行游戏。现在当你移动摄像头时，你应该会看到\
    \ fps 保持在接近 60 fps。这是否意味着你的小 iPhone 比 Mac 更强大？很可能不是。模拟器只是模拟不同的设备，以便作为开发者的你快速测试代码。然而，当你在真实设备上运行游戏时，你可以看到\
    \ SceneKit 的强大之处。SceneKit 使用 GPU 来渲染场景和节点。这也是苹果建议在将应用提交到 App Store 审核之前，始终在设备上运行应用的原因之一。\n\
    \n在 SceneKit 可用之前，你必须使用其他第三方库或 OpenGL 来实现这一点。要达到你现在用不到 50 行代码所完成的功能，可能需要数千行代码。\n\
    \n## 总结\n\n恭喜！你现在已经拥有了一个运行中的简单 3D 场景。在本章中，你学习到了 SceneKit 提供的一些强大功能。你创建了一个后续将继续构建的项目。在第\
    \ 11 章中，你将了解什么是场景图以及 SceneKit 如何使用场景图工作。你还将开始使用 SceneKit 的一些内置类，这些类将允许你创建游戏中将要使用的障碍物。\n\
    \n© James Goodwill and Wesley Matlock 2017  \nJames Goodwill 和 Wesley Matlock\
    \  \n*Beginning Swift Games Development for iOS*  \n10.1007/978-1-4842-2310-9_11\n\
    \n# 11. 场景与节点\n\nJames Goodwill¹ 和 Wesley Matlock²  \n(1) 美国科罗拉多州海兰兹牧场  \n(2)\
    \ 美国密苏里州堪萨斯城\n\n在本章中，你将学习 SceneKit 如何使用场景图来渲染场景中的对象。一旦你理解了场景图，你将进一步了解如何使用 SceneKit\
    \ 的内置模型。你将使用这些模型在游戏中创建障碍物，供英雄躲避，并为敌人提供掩护。\n"
- fmt: "# Scene Graph\n\nBasically, the scene graph `SCNScene` is the base for a tree\
    \ structure of the scene graph, as shown in Figure [11-1](#A330720_2_En_11_Chapter.html#Fig1).\
    \ In the early days of graphic programming, the scene graph was modeled with scene\
    \ data, and its behavior was created procedurally, which usually led to a mess\
    \ of code. Developers were unable to easily reuse your nodes or other objects\
    \ through the application. A separation of concerns allows you to have a clean\
    \ boundary between your scenes and how they’re rendered. Figure [11-1](#A330720_2_En_11_Chapter.html#Fig1)\
    \ shows an example of how this looks.\n\n![A330720_2_En_11_Fig1_HTML.gif](OEBPS/A330720_2_En_11_Fig1_HTML.gif)\n\
    Figure 11-1. Scene graph example\n\nEvery node in a scene has a parent except\
    \ the topmost node—in other words, the root node. See Figure [11-2](#A330720_2_En_11_Chapter.html#Fig2).\n\
    \n![A330720_2_En_11_Fig2_HTML.gif](OEBPS/A330720_2_En_11_Fig2_HTML.gif)\nFigure\
    \ 11-2. Scene nodes\n\nNodes that contain other child nodes are considered group\
    \ nodes. In Figure [11-2](#A330720_2_En_11_Chapter.html#Fig2), you can see a parent\
    \ node and several child nodes.\n\n- Node trees (group nodes) are what appear\
    \ in the scene. Node positions are defined in the coordinate system defined by\
    \ its parent node.\n- Leaf nodes are the ones that are actually rendered. These\
    \ execute the animation and specify the material and lighting for the node tree.\n\
    \n## SceneKit’s Built-in Model Classes\n\nSceneKit provides almost all the primitive\
    \ geometries that you’ll need in order to create immersive games. You’re going\
    \ to use these simple geometries to create the first level of this game, so you\
    \ can become familiar with these node types.\n\n### SCNGeometry Objects\n\nSceneKit\
    \ provides several different geometries. When you create any of these geometries,\
    \ the center is around its local coordinate system. In other words, if you create\
    \ an `SCNBox` with the width, length, and height of 20.0, these will be along\
    \ the x-, y-, and z-axes at 10.0 and –10.0. Here is a list of the SceneKit primitive\
    \ geometries types:\n\n- ![A330720_2_En_11_Figa_HTML.jpg](OEBPS/A330720_2_En_11_Figa_HTML.jpg)\
    \ `SCNBox`: This is a basic six-sided polyhedron with rectangles for faces. You’ll\
    \ also be able to create an `SCNMaterial` for each of these sides if you want.\n\
    - ![A330720_2_En_11_Figb_HTML.jpg](OEBPS/A330720_2_En_11_Figb_HTML.jpg) `SCNCapsule`:\
    \ This is a cylinder that is capped at both ends by a hemisphere. You can define\
    \ the hemisphere radius and the height.\n- ![A330720_2_En_11_Figc_HTML.jpg](OEBPS/A330720_2_En_11_Figc_HTML.jpg)\
    \ `SCNCone`: This is a geometric feature that has a circular base, and its sides\
    \ taper at the center of the circle. You create an `SCNCone` by giving it a radius\
    \ for the bottom and a height for the sides.\n- ![A330720_2_En_11_Figd_HTML.jpg](OEBPS/A330720_2_En_11_Figd_HTML.jpg)\
    \ `SCNCylinder`: To create an `SCNCylinder`, you give it a radius and a height.\n\
    - ![A330720_2_En_11_Fige_HTML.jpg](OEBPS/A330720_2_En_11_Fige_HTML.jpg) `SCNFloor`:\
    \ This is an infinitely expanded plane along the x- and z-axes.\n- ![A330720_2_En_11_Figf_HTML.jpg](OEBPS/A330720_2_En_11_Figf_HTML.jpg)\
    \ `SCNPlane`: This is a one-sided surface that expands along the x- and y-axes.\n\
    - ![A330720_2_En_11_Figg_HTML.jpg](OEBPS/A330720_2_En_11_Figg_HTML.jpg) `SCNPyramid`:\
    \ When initializing an `SCNPyramid`, you give the height, width, and length for\
    \ the pyramid.\n- ![A330720_2_En_11_Figh_HTML.jpg](OEBPS/A330720_2_En_11_Figh_HTML.jpg)\
    \ `SCNSphere`: This has the geometric shape of a globe. When instantiating an\
    \ `SCNSphere`, you provide the radius to be used for the `SCNSphere`.\n- ![A330720_2_En_11_Figi_HTML.jpg](OEBPS/A330720_2_En_11_Figi_HTML.jpg)\
    \ `SCNTorus`: A torus is simply a circle around a coplanar axis, like a donut.\
    \ You provide an inner radius and an outer radius for its circles.\n- ![A330720_2_En_11_Figj_HTML.jpg](OEBPS/A330720_2_En_11_Figj_HTML.jpg)\
    \ `SCNTube`: This is a tube or pipe. You give it an inner radius, an outer radius,\
    \ and the height for the tube.\n- `SCNShape`: This geometric shape is created\
    \ from a Bezier path. `SCNShape` gives you the most control over the shape of\
    \ your 3D object.\n- `SCNText`: You provide an `NSString` or `NSAttributedString`\
    \ that is used to create a 3D object from this string.\n\nAs you can see, Apple\
    \ has provided you with most of the shapes you’ll need. You can combine these\
    \ primitive shapes to create complex objects. However, for this game, you’ll stick\
    \ to the basic primitives for now. Let’s get back into the code and start adding\
    \ some obstacles for the spaceman to maneuver around in order to find the enemy.\n\
    \n## Adding Collectable Nodes\n\nNow that you understand a little of the different\
    \ type of geometric nodes we are going to use those as our “collectables” on this\
    \ first simple level of your game. Let’s go ahead and create some geometric nodes\
    \ that you’ll use as collectable for your character to get. First you’ll create\
    \ a new file by either right-clicking the `Swifystein3D` folder and choosing New\
    \ File or by choosing File ➤ New ➤ File. Either way you do it, you’ll get to the\
    \ File Template Selection, as shown in Figure [11-3](#A330720_2_En_11_Chapter.html#Fig3).\n\
    \n![A330720_2_En_11_Fig3_HTML.jpg](OEBPS/A330720_2_En_11_Fig3_HTML.jpg)\nFigure\
    \ 11-3. New file creation\n\nOn the next screen name your file `Collectable.swift`,\
    \ as shown in Figure [11-4](#A330720_2_En_11_Chapter.html#Fig4).\n\n![A330720_2_En_11_Fig4_HTML.jpg](OEBPS/A330720_2_En_11_Fig4_HTML.jpg)\n\
    Figure 11-4. Creating a new Swift file\n\nNow you have a new blank file that you’ll\
    \ use to create the collectibles for the level of the game. The first thing you’ll\
    \ need to do is import `SceneKit` because you’ll need to create `SCNNodes`. You’ll\
    \ then create the `Collectable` class; once this is done your file should look\
    \ like the code in Listing [11-1](#A330720_2_En_11_Chapter.html#Par27):\n\n```swift\n\
    import Foundation\nimport SceneKit\nclass Collectable {\n\n}\n```\nListing 11-1.\
    \ Collectable Class\n\nYou’ll do a few things differently in this class, in that\
    \ you’ll create class-level methods. If you are familiar with other languages,\
    \ this is similar to static methods. Doing it this way is to expose you to another\
    \ coding paradigm. For your first collectable, let’s create a `pyramidNode()`\
    \ method, as in Listing [11-2](#A330720_2_En_11_Chapter.html#Par30):\n\n```swift\n\
    class func pyramidNode() -> SCNNode {\n    // 1 Creating the SCNGeometry type\n\
    \    let pyramid = SCNPyramid(width: 3.0, height: 6.0, length: 3.0)\n    // 2\
    \ Create the node using the geometry type\n    let pyramidNode = SCNNode(geometry:\
    \ pyramid)\n    pyramidNode.name = \"pyramid\"\n    //3 Setting the node position\n\
    \    let position = SCNVector3Make(30, 0, -40)\n    pyramidNode.position = position\n\
    \    return pyramidNode\n}\n```\nListing 11-2. Pyramid Node\n\nNow let’s go over\
    \ this method and see what’s going on:\n\n1. You first created a geometric object\
    \ using the `SCNPyramid` `SCNGeometry` type. This allows you to easily manipulate\
    \ the pyramid as you would any `SCNNode`.\n2. Next you created a `SCNNode` based\
    \ of the pyramid object. You also named this node `pyramid`. This naming of the\
    \ node will help us later when you learn about collision detection later in the\
    \ book.\n3. You now give the `pyramidNode` a position in the scene."
  raw: '## Scene Graph


    Basically, the scene graph The SCNScene is the base for a tree structure of the
    scene graph, as shown in Figure [11-1](#A330720_2_En_11_Chapter.html#Fig1). In
    the early days of graphic programming, the scene graph was modeled with scene
    data, and its behavior was created procedurally, which usually led to a mess of
    code. Developers were unable to easily reuse your nodes or other objects through
    the application. A separation of concerns allows you to have a clean boundary
    between your scenes and how they’re rendered. Figure [11-1](#A330720_2_En_11_Chapter.html#Fig1)
    shows an example of how this looks. ![A330720_2_En_11_Fig1_HTML.gif](OEBPS/A330720_2_En_11_Fig1_HTML.gif)
    Figure 11-1. Scene graph example Every node in a scene has a parent except the
    topmost node—in other words, the root node. See Figure [11-2](#A330720_2_En_11_Chapter.html#Fig2).
    ![A330720_2_En_11_Fig2_HTML.gif](OEBPS/A330720_2_En_11_Fig2_HTML.gif) Figure 11-2.
    Scene nodes Nodes that contain other child nodes are considered group nodes. In
    Figure [11-2](#A330720_2_En_11_Chapter.html#Fig2), you can see a parent node and
    several child nodes.


    *   Node trees (group nodes) are what appear in the scene. Node positions are
    defined in the coordinate system defined by its parent node.

    *   Leaf nodes are the ones that are actually rendered. These execute the animation
    and specify the material and lighting for the node tree.


    ## SceneKit’s Built-in Model Classes


    SceneKit provides almost all the primitive geometries that you’ll need in order
    to create immersive games. You’re going to use these simple geometries to create
    the first level of this game, so you can become familiar with these node types.


    ### SCNGeometry Objects


    SceneKit provides several different geometries . When you create any of these
    geometries, the center is around its local coordinate system. In other words,
    if you create an SCNBox with the width, length, and height of 20.0, these will
    be along the x-, y-, and z-axes at 10.0 and –10.0. Here is a list of the SceneKit
    primitive geometries types:


    *   ![A330720_2_En_11_Figa_HTML.jpg](OEBPS/A330720_2_En_11_Figa_HTML.jpg) SCNBox:
    This is a basic six-sided polyhedron with rectangles for faces. You’ll also be
    able to create an SCNMaterial for each of these sides if you want.

    *   ![A330720_2_En_11_Figb_HTML.jpg](OEBPS/A330720_2_En_11_Figb_HTML.jpg) SCNCapsule:
    This is a cylinder that is capped at both ends by a hemisphere. You can define
    the hemisphere radius and the height.

    *   ![A330720_2_En_11_Figc_HTML.jpg](OEBPS/A330720_2_En_11_Figc_HTML.jpg) SCNCone:
    This is a geometric feature that has a circular base , and its sides taper at
    the center of the circle. You create an SCNCone by giving it a radius for the
    bottom and a height for the sides.

    *   ![A330720_2_En_11_Figd_HTML.jpg](OEBPS/A330720_2_En_11_Figd_HTML.jpg) SCNCylinder:
    To create an SCNCylinder, you give it a radius and a height.

    *   ![A330720_2_En_11_Fige_HTML.jpg](OEBPS/A330720_2_En_11_Fige_HTML.jpg) SCNFloor:
    This is an infinitely expanded plane along the x- and z-axes.

    *   ![A330720_2_En_11_Figf_HTML.jpg](OEBPS/A330720_2_En_11_Figf_HTML.jpg) SCNPlane:
    This is a one-sided surface that expands along the x- and y-axes.

    *   ![A330720_2_En_11_Figg_HTML.jpg](OEBPS/A330720_2_En_11_Figg_HTML.jpg) SCNPyramid:
    When initializing an SCNPyramid, you give the height, width, and length for the
    pyramid .

    *   ![A330720_2_En_11_Figh_HTML.jpg](OEBPS/A330720_2_En_11_Figh_HTML.jpg) SCNSphere:
    This has the geometric shape of a globe. When instantiating an SCNSphere, you
    provide the radius to be used for the SCNSphere.

    *   ![A330720_2_En_11_Figi_HTML.jpg](OEBPS/A330720_2_En_11_Figi_HTML.jpg) SCNTorus:
    A torus is simply a circle around a coplanar axis, like a donut. You provide an
    inner radius and an outer radius for its circles.

    *   ![A330720_2_En_11_Figj_HTML.jpg](OEBPS/A330720_2_En_11_Figj_HTML.jpg) SCNTube:
    This is a tube or pipe. You give it an inner radius, an outer radius, and the
    height for the tube.

    *   SCNShape: This geometric shape is created from a Bezier path. SCNShape gives
    you the most control over the shape of your 3D object. 3D object.

    *   SCNText: You provide an NSString or NSAttributedString that is used to create
    a 3D object from this string.


    As you can see, Apple has provided you with most of the shapes you’ll need. You
    can combine these primitive shapes to create complex objects. However, for this
    game, you’ll stick to the basic primitives for now. Let’s get back into the code
    and start adding some obstacles for the spaceman to maneuver around in order to
    find the enemy .


    ## Adding Collectable Nodes


    Now that you understand a little of the different type of geometric nodes we are
    going to use those as our “collectables” on this first simple level of your game
    . Let’s go ahead and create some geometric nodes that you’ll use as collectable
    for your character to get. First you’ll create a new file by either right-clicking
    the Swifystein3D folder and choosing New File or by choosing File ➤ New ➤ File.
    Either way you do it, you’ll get to the File Template Selection, as shown in Figure
    [11-3](#A330720_2_En_11_Chapter.html#Fig3). ![A330720_2_En_11_Fig3_HTML.jpg](OEBPS/A330720_2_En_11_Fig3_HTML.jpg)
    Figure 11-3. New file creation On the next screen name your file Collectable.swift,
    as shown in Figure [11-4](#A330720_2_En_11_Chapter.html#Fig4). ![A330720_2_En_11_Fig4_HTML.jpg](OEBPS/A330720_2_En_11_Fig4_HTML.jpg)
    Figure 11-4. Creating a new Swift file Now you have a new blank file that you’ll
    use to create the collectibles for the level of the game. The first thing you’ll
    need to do is import SceneKit because you’ll need to create SNNodes. You’ll then
    create the Collectable class ; once this is done your file should look like the
    code in Listing [11-1](#A330720_2_En_11_Chapter.html#Par27): import Foundation
    import SceneKit class Collectable { } Listing 11-1. Collectable Class You’ll do
    a few things differently in this class, in that you’ll create class-level methods.
    If you are familiar with other languages, this is similar to static methods. Doing
    it this way is to expose you to another coding paradigm. For your first collectable,
    let’s create a PyramidNode method , as in Listing [11-2](#A330720_2_En_11_Chapter.html#Par30):
    class func pyramidNode() -> SCNNode {     // 1 Creating the SCNGeometry type     let
    pyramid = SCNPyramid(width: 3.0, height: 6.0, length: 3.0)     // 2 Create the
    node using the geometry type     let pyramidNode = SCNNode(geometry: pyramid)
        pyramidNode.name = "pyramid"     //3 Setting the node position     let position
    = SCNVector3Make(30, 0, -40)     pyramidNode.position = position     return pyramidNode
    } Listing 11-2. Pyramid Node Now let’s go over this method and see what’s going
    on:


    1.  1. You first created a geometric object using the SCNPyramid SCNGeometry type.
    This allows you to easily manipulate the pyramid as you would any SCNNode.  

    2.  2. Next you created a SNNode based of the pyramid object. You also named this
    node pyramid. This naming of the node will help us later when you learn about
    collision detection later in the book.  

    3.  3. You now give the pyramidNode a position in the scene.'
  trans: "\n# 场景图 (Scene Graph)\n\n基本上，场景图 `SCNScene` 是场景图树形结构的基础，如图 11-1 所示。在图形编程的早期，场景图是用场景数据建模的，其行为是通过过程化方式创建的，这通常会导致代码混乱。开发者无法在整个应用程序中轻松地复用节点或其他对象。通过关注点分离，你可以在场景及其渲染方式之间建立清晰的边界。图\
    \ 11-1 展示了这种结构的一个示例。\n\n![A330720_2_En_11_Fig1_HTML.gif](img/A330720_2_En_11_Fig1_HTML.gif)\n\
    图 11-1. 场景图示例\n\n场景中的每个节点都有一个父节点，除了最顶层的节点——换句话说，即根节点。见图 11-2。\n\n![A330720_2_En_11_Fig2_HTML.gif](img/A330720_2_En_11_Fig2_HTML.gif)\n\
    图 11-2. 场景节点\n\n包含其他子节点的节点被视为组节点。在图 11-2 中，你可以看到一个父节点和几个子节点。\n\n-   节点树（组节点）就是在场景中呈现的内容。节点的位置由其父节点定义的坐标系确定。\n\
    -   叶节点是实际被渲染的节点。这些节点执行动画，并为节点树指定材质和光照。\n\n## SceneKit 内置模型类\n\nSceneKit 提供了创建沉浸式游戏所需的几乎所有基本几何体。你将使用这些简单的几何体来创建游戏的第一关，从而熟悉这些节点类型。\n\
    \n### SCNGeometry 对象\n\nSceneKit 提供了几种不同的几何体。当你创建这些几何体中的任何一个时，其中心点位于其局部坐标系的原点。换句话说，如果你创建一个宽度、长度和高度均为\
    \ 20.0 的 `SCNBox`，这些数值将分别沿 x、y、z 轴分布在 10.0 和 –10.0 的位置。以下是 SceneKit 原始几何体类型列表：\n\
    \n-   ![A330720_2_En_11_Figa_HTML.jpg](img/A330720_2_En_11_Figa_HTML.jpg) `SCNBox`：这是一个基本的六面多面体，各个面均为矩形。如果需要，你还可以为每个面单独创建\
    \ `SCNMaterial`。\n-   ![A330720_2_En_11_Figb_HTML.jpg](img/A330720_2_En_11_Figb_HTML.jpg)\
    \ `SCNCapsule`：这是一个两端带有半球形封盖的圆柱体。你可以定义半球半径和高度。\n-   ![A330720_2_En_11_Figc_HTML.jpg](img/A330720_2_En_11_Figc_HTML.jpg)\
    \ `SCNCone`：这是一个具有圆形底部的几何体，其侧面在圆心处收拢。通过指定底部的半径和侧面的高度来创建 `SCNCone`。\n-   ![A330720_2_En_11_Figd_HTML.jpg](img/A330720_2_En_11_Figd_HTML.jpg)\
    \ `SCNCylinder`：要创建 `SCNCylinder`，你需要指定半径和高度。\n-   ![A330720_2_En_11_Fige_HTML.jpg](img/A330720_2_En_11_Fige_HTML.jpg)\
    \ `SCNFloor`：这是一个沿 x 轴和 z 轴无限延伸的平面。\n-   ![A330720_2_En_11_Figf_HTML.jpg](img/A330720_2_En_11_Figf_HTML.jpg)\
    \ `SCNPlane`：这是一个沿 x 轴和 y 轴展开的单面表面。\n-   ![A330720_2_En_11_Figg_HTML.jpg](img/A330720_2_En_11_Figg_HTML.jpg)\
    \ `SCNPyramid`：初始化 `SCNPyramid` 时，你需要指定金字塔的高度、宽度和长度。\n-   ![A330720_2_En_11_Figh_HTML.jpg](img/A330720_2_En_11_Figh_HTML.jpg)\
    \ `SCNSphere`：它具有球体的几何形状。实例化 `SCNSphere` 时，你需要提供用于 `SCNSphere` 的半径。\n-   ![A330720_2_En_11_Figi_HTML.jpg](img/A330720_2_En_11_Figi_HTML.jpg)\
    \ `SCNTorus`：圆环体简单地说是围绕一个共面轴的圆，形状像甜甜圈。你需要为它的圆提供内半径和外半径。\n-   ![A330720_2_En_11_Figj_HTML.jpg](img/A330720_2_En_11_Figj_HTML.jpg)\
    \ `SCNTube`：这是一个管子或管道。你需要指定内半径、外半径和管子的高度。\n-   `SCNShape`：这种几何形状由贝塞尔路径创建。`SCNShape`\
    \ 让你对 3D 对象的形状有最大的控制权。\n-   `SCNText`：你需要提供一个 `NSString` 或 `NSAttributedString`，用于从该字符串创建一个\
    \ 3D 对象。\n\n如你所见，Apple 提供了你所需的大部分形状。你可以组合这些原始形状来创建复杂的对象。不过，对于这个游戏，目前你将继续使用基本几何体。让我们回到代码中，开始添加一些障碍物，让宇航员能够操纵飞船绕过它们以找到敌人。\n\
    \n## 添加可收集节点\n\n既然你已经对不同类型的几何节点有了一些了解，我们将把它们用作游戏第一关中简单的“可收集物”。让我们继续创建一些几何节点，作为角色可以收集的物品。首先，通过右键点击\
    \ `Swifystein3D` 文件夹并选择“新建文件”，或者选择 文件 ➤ 新建 ➤ 文件 来创建一个新文件。无论采用哪种方式，你都会进入文件模板选择界面，如图\
    \ 11-3 所示。\n\n![A330720_2_En_11_Fig3_HTML.jpg](img/A330720_2_En_11_Fig3_HTML.jpg)\n\
    图 11-3. 新建文件\n\n在下一个屏幕上，将你的文件命名为 `Collectable.swift`，如图 11-4 所示。\n\n![A330720_2_En_11_Fig4_HTML.jpg](img/A330720_2_En_11_Fig4_HTML.jpg)\n\
    图 11-4. 创建新的 Swift 文件\n\n现在你有了一个新的空白文件，用于创建游戏关卡中的可收集物品。你需要做的第一件事是导入 `SceneKit`，因为你需要创建\
    \ `SCNNodes`。然后，创建 `Collectable` 类；完成后，你的文件应类似于清单 11-1 中的代码：\n\n```swift\nimport\
    \ Foundation\nimport SceneKit\nclass Collectable {\n\n}\n```\n清单 11-1. Collectable\
    \ 类\n\n在这个类中，你将以不同的方式做一些事情：创建类级方法。如果你熟悉其他语言，这与静态方法类似。这样做是为了让你接触另一种编码范式。对于第一个可收集物，让我们创建一个\
    \ `pyramidNode()` 方法，如清单 11-2 所示：\n\n```swift\nclass func pyramidNode() -> SCNNode\
    \ {\n    // 1 创建 SCNGeometry 类型\n    let pyramid = SCNPyramid(width: 3.0, height:\
    \ 6.0, length: 3.0)\n    // 2 使用几何类型创建节点\n    let pyramidNode = SCNNode(geometry:\
    \ pyramid)\n    pyramidNode.name = \"pyramid\"\n    //3 设置节点位置\n    let position\
    \ = SCNVector3Make(30, 0, -40)\n    pyramidNode.position = position\n    return\
    \ pyramidNode\n}\n```\n清单 11-2. 金字塔节点\n\n现在让我们详细看看这个方法中发生了什么：\n\n1.  首先，你使用 `SCNPyramid`\
    \ `SCNGeometry` 类型创建了一个几何对象。这允许你像操作任何 `SCNNode` 一样轻松地操作这个金字塔。\n2.  接下来，你基于金字塔对象创建了一个\
    \ `SCNNode`。你还将此节点命名为 `pyramid`。给节点命名将有助于我们在本书后面学习碰撞检测时使用。\n3.  现在，你为 `pyramidNode`\
    \ 在场景中指定了一个位置。\n"
- fmt: "That’s about it for creating a geometric node. The next thing you’ll need\
    \ to do is add this to the scene so you can actually see it when you run the game.\
    \ Head to the `GameViewController` class. In this class, find the `createMainScene()`\
    \ method. You’ll add `mainScene.rootNode.addChildNode(Collectable.pyramidNode())`\
    \ after `mainScene.rootNode.addChildNode(createFloorNode())`. It’s important to\
    \ add the new child node after `createFloorNode()`. After adding the line of code,\
    \ run the game. Now you see a pyramid slightly behind your hero, as shown in Figure\
    \ 11-5.\n\n![A330720_2_En_11_Fig5_HTML.jpg](OEBPS/A330720_2_En_11_Fig5_HTML.jpg)\n\
    \nFigure 11-5. Pyramid node\n\nWell, there you have a pyramid in the middle of\
    \ the screen. However, it isn’t really nice to look at. One thing we haven’t discussed\
    \ is the material of a node. You’ll learn more about material and the `SCNMaterial`\
    \ object in the next chapter, but you should at least add some color to this pyramid\
    \ and the other collectables as you create them. Go back to the `Collectable`\
    \ class and find the `pyramidNode` method. After the code line where you set the\
    \ position, go ahead and add the following code:\n\n```\n// 4 Giving the node\
    \ some color.\npyramidNode.geometry?.firstMaterial?.diffuse.contents = UIColor.blue\n\
    pyramidNode.geometry?.firstMaterial?.shininess = 1.0\n```\n\nWhat you’re doing\
    \ is setting the `firstMaterial` to the color blue. Remember, we’ll go more into\
    \ the `diffuse` and `shininess` in the next chapter. Right now you’re just making\
    \ the `pyramidNode` shine blue. Feel free to use any of the other `UIColor` defaults\
    \ if you want. In fact, you’ll create several more geometry type nodes with different\
    \ colors here in a few minutes.\n\nNow when you run the game your pyramid will\
    \ be blue, or whatever other color you set it to. You now have some basic knowledge\
    \ of how to create a primitive SceneKit geometric object. Now make sure you’re\
    \ in the `Collectable` class and using the same pattern in the `pyramidNode` create\
    \ some more objects. Let’s continue to add another collectable and create a sphere\
    \ node. Below the `pyramidNode` method, add the code shown in Listing 11-3.\n\n\
    ```\nclass func sphereNode() -> SCNNode {\n    // 1 Creating the SCNGeometry type\n\
    \    let sphere = SCNSphere(radius: 6.0)\n    // 2 Create the node using the geometry\
    \ type\n    let sphereNode = SCNNode(geometry: sphere)\n    sphereNode.name =\
    \ \"sphere\"\n    //3 Setting the node position\n    let position  = SCNVector3Make(35,\
    \ 0, -60)\n    sphereNode.position = position\n    // 4 Giving the node some color.\n\
    \    sphereNode.geometry?.firstMaterial?.diffuse.contents = UIColor.red\n    sphereNode.geometry?.firstMaterial?.shininess\
    \ = 1.0\n    return sphereNode\n}\n```\n\nListing 11-3. Globe Node\n\nNow that\
    \ you have this method, the next thing is to add it to the scene. Again go to\
    \ the `GameViewController` and you’ll add this to the `mainScene`. For now go\
    \ ahead and comment out `addChildNode(Collectable.pyramidNode())` and below that\
    \ add the following in the globe node:\n\n```\n// mainScene.rootNode.addChildNode(Collectable.pyramidNode())\n\
    mainScene.rootNode.addChildNode(Collectable.sphereNode())\n```\n\nNow when you\
    \ run the game you’ll have a red sphere floating on your floor, as seen in Figure\
    \ 11-6. You may have to move and zoom the camera around in order to see the sphere\
    \ up close.\n\n![A330720_2_En_11_Fig6_HTML.jpg](OEBPS/A330720_2_En_11_Fig6_HTML.jpg)\n\
    \nFigure 11-6. Sphere node\n\nWe’re sure you noticed that the sphere is going\
    \ through your floor. This is not how we want the sphere to be. Several of these\
    \ geometric types’ axes are through the middle of the object. So, in this case,\
    \ if you want it to float above the floor you’ll need to adjust the y-axis to\
    \ the radius of the sphere. In the `Collectable` class, change the `sphereNode.position`\
    \ to: `let position = SCNVector3Make(35, 6, -50)`. This time rerun the game and\
    \ you’ll see the sphere floating on top of the floor like we want it to be, as\
    \ shown in Figure 11-7.\n\n![A330720_2_En_11_Fig7_HTML.jpg](OEBPS/A330720_2_En_11_Fig7_HTML.jpg)\n\
    \nFigure 11-7. Floating sphere node\n\nFeel free to adjust the position and see\
    \ how the node moves around the scene. You’ll now add in several more geometric\
    \ node types to the `Collectable` class. Listing 11-4 adds a box, tube, cylinder,\
    \ and torus to the class.\n\n```\nclass func boxNode() -> SCNNode {\n    // 1\
    \ Creating the SCNGeometry type\n    let box = SCNBox(width: 3, height: 3, length:\
    \ 3, chamferRadius: 0)\n    // 2 Create the node using the geometry type\n   \
    \ let boxNode = SCNNode(geometry: box)\n    boxNode.name = \"box\"\n    //3 Setting\
    \ the node position\n    let position  = SCNVector3Make(20, 1.5, -20)\n    boxNode.position\
    \ = position\n    // 4 Giving the node some color.\n    boxNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.brown\n    boxNode.geometry?.firstMaterial?.shininess = 1.0\n    return\
    \ boxNode\n}\n\nclass func tubeNode() -> SCNNode {\n    // 1 Creating the SCNGeometry\
    \ type\n    let tube = SCNTube(innerRadius: 1, outerRadius: 1.5, height: 2.0)\n\
    \    // 2 Create the node using the geometry type\n    let tubeNode = SCNNode(geometry:\
    \ tube)\n    tubeNode.name = \"tube\"\n    //3 Setting the node position\n   \
    \ let position  = SCNVector3Make(-10, 0.75, -75)\n    tubeNode.position = position\n\
    \    // 4 Giving the node some color.\n    tubeNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.yellow\n    tubeNode.geometry?.firstMaterial?.shininess = 1.0\n  \
    \  return tubeNode\n}\n\nclass func cylinderNode() -> SCNNode {\n    // 1 Creating\
    \ the SCNGeometry type\n    let cylinder = SCNCylinder(radius: 3, height: 8)\n\
    \    // 2 Create the node using the geometry type\n    let cylinderNode = SCNNode(geometry:\
    \ cylinder)\n    cylinderNode.name = \"cylinder\"\n    //3 Setting the node position\n\
    \    let position = SCNVector3Make(0, 4, -25)\n    cylinderNode.position = position\n\
    \    // 4 Giving the node some color.\n    cylinderNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.green\n    cylinderNode.geometry?.firstMaterial?.shininess = 1.0\n\
    \    return cylinderNode\n}\n\nclass func torusNode() -> SCNNode {\n    // 1 Creating\
    \ the SCNGeometry type\n    let torus = SCNTorus(ringRadius: 7, pipeRadius: 2)\n\
    \    // 2 Create the node using the geometry type\n    let torusNode = SCNNode(geometry:\
    \ torus)\n    //3 Setting the node position\n    let position =  SCNVector3Make(75,\
    \ 1, -80)\n    torusNode.position = position\n    // 4 Giving the node some color.\n\
    \    torusNode.geometry?.firstMaterial?.diffuse.contents = UIColor.orange\n  \
    \  torusNode.geometry?.firstMaterial?.shininess = 1.0\n    return torusNode\n\
    }\n```\n\nListing 11-4. More Geometric Node Types for the Collectable Class\n\n\
    After you’ve completed updating the `Collectable` class, don’t forget you’ll need\
    \ to add them to the `mainScene` in the `GameViewController`:\n\n```\nlet mainScene\
    \ = SCNScene()\nmainScene.rootNode.addChildNode(createFloorNode())\nmainScene.rootNode.addChildNode(Collectable.pyramidNode())\n\
    mainScene.rootNode.addChildNode(Collectable.sphereNode())\nmainScene.rootNode.addChildNode(Collectable.boxNode())\n\
    mainScene.rootNode.addChildNode(Collectable.tubeNode())\nmainScene.rootNode.addChildNode(Collectable.cylinderNode())\n\
    mainScene.rootNode.addChildNode(Collectable.torusNode())\n```\n\nRun the game\
    \ now, and it should look similar to Figure 11-8. You’ll have to move the camera\
    \ around (pan and zoom out) in order to see everything.\n\n![A330720_2_En_11_Fig8_HTML.jpg](OEBPS/A330720_2_En_11_Fig8_HTML.jpg)\n\
    \nFigure 11-8. Geometric node layout — collectibles\n\nRight now they don’t do\
    \ much, and they’re not all that interesting to see. Feel free to adjust the sizes\
    \ and locations so that you can get a better understanding of how these variables\
    \ change the object. Take some time to adjust the position of these objects to\
    \ make your own layout of these collectables. For the sample code, we put the\
    \ objects in a large circle."
