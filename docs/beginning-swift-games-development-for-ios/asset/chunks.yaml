  trans: "\n# 介绍 SKLabelNodes\n\n如前所述，SpriteKit 使用名为 `SKLabelNode` 的类来实现文本标签。`SKLabelNode`\
    \ 类与你目前见到的所有节点一样，都是 `SKNode` 的子类。它是一个非常简单的类，只有两个 `init()` 方法和少量属性，全部聚焦于设置标签字体、颜色和布局。\n\
    \n使用 `SKLabelNode` 的最简单方式如下所示：\n\n```\nlet simpleLabel = SKLabelNode(fontNamed:\
    \ \"Copperplate\")\nsimpleLabel.text = \"Hello, SpriteKit!\";\nsimpleLabel.fontSize\
    \ = 40;\nsimpleLabel.position = CGPoint(x: size.width / 2.0, y: size.height /\
    \ 2.0)\naddChild(simpleLabel)\n```\n\n查看这段代码，可以看到它首先通过向 `init()` 方法传入你想要使用的字体名称来创建\
    \ `SKLabelNode` 类。之后，你设置标签的 `text` 属性。接着设置 `fontSize` 和 `position` 属性。最后，将标签节点添加到场景中。\n\
    \n让我们在示例应用中尝试一下。回到 Xcode 并创建一个使用 Swift 语言的新 Game 项目。现在，就像你在第 1 章中所做的那样，删除 `GameScene.sks`\
    \ 和 `Actions.sks` 文件。打开 `GameViewController.swift` 并将其内容替换为代码清单 7-1 中的类。\n\n```\n\
    import SpriteKit\n\nclass GameViewController: UIViewController {\n    var scene:\
    \ GameScene!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // 1. 配置主视图\n        let skView = view as! SKView\n        skView.showsFPS\
    \ = true\n        // 2. 创建并配置我们的游戏场景\n        scene = GameScene(size: skView.bounds.size)\n\
    \        scene.scaleMode = .aspectFill\n        // 3. 显示场景。\n        skView.presentScene(scene)\n\
    \    }\n}\n```\n\n**代码清单 7-1.** `GameViewController.swift`：主 `UIViewController`\n\
    \n修改完 `GameViewController` 后，转到 `GameScene.swift` 文件，将其主体改为与代码清单 7-2 一致。\n\n```\n\
    import SpriteKit\n\nclass GameScene: SKScene {\n    required init?(coder aDecoder:\
    \ NSCoder) {\n        fatalError(\"init(coder:) has not been implemented\")\n\
    \    }\n    override init(size: CGSize) {\n        super.init(size: size)\n  \
    \      let simpleLabel = SKLabelNode(fontNamed: \"Copperplate\")\n        simpleLabel.text\
    \ = \"Hello, SpriteKit!\"\n        simpleLabel.fontSize = 40\n        simpleLabel.position\
    \ = CGPoint(x: size.width / 2.0, y: size.height / 2.0)\n        addChild(simpleLabel)\n\
    \    }\n}\n```\n\n**代码清单 7-2.** 新的 `GameScene` 类\n\n请注意，此代码清单包含两个 `init()` 方法。第一个方法是必需的，并接受一个\
    \ `NSCoder`。因为我们手动管理场景，所以可以忽略这个 `init()` 方法。第二个 `init()` 方法接受一个 `CGSize`。在该 `init()`\
    \ 方法内部，先调用了 `super.init()` 方法，然后你就看到了与 `SKLabel` 相关的代码。这段代码看起来与之前添加 `SKLabelNode`\
    \ 的片段完全一样。\n\n运行应用并查看结果。新的应用应如图 7-1 所示。\n\n![A330720_2_En_7_Fig1_HTML.jpg](img/A330720_2_En_7_Fig1_HTML.jpg)\n\
    \n**图 7-1.** 一个简单的 `SKLabelNode` 示例\n\n如你所见，`SKLabelNode` 使用起来非常简单。`SKLabelNode`\
    \ 的大部分属性都很直观，但有两个属性你可能没见过。这两个 `SKLabelNode` 属性是 `horizontalAlignmentMode` 和 `verticalAlignmentMode`。每个属性将在以下章节中描述。\n\
    \n## 更改标签节点的水平对齐方式\n\n`SKLabelNode` 的 `horizontalAlignmentMode` 用于设置文本相对于节点位置的水平位置。共有三个水平对齐选项，均由枚举\
    \ `SKLabelHorizontalAlignmentMode` 定义。这三个选项分别是 `SKLabelHorizontalAlignmentMode.left`、`SKLabelHorizontalAlignmentMode.center`\
    \ 和 `SKLabelHorizontalAlignmentMode.right`。\n\n要了解该属性及这些选项如何改变标签节点的布局，请在设置标签节点位置的那一行代码之后立即添加以下代码行：\n\
    \n```\nsimpleLabel.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.left\n\
    ```\n\n现在再次运行应用。这次你会看到标签向右偏移了，如图 7-2 所示。\n\n![A330720_2_En_7_Fig2_HTML.jpg](img/A330720_2_En_7_Fig2_HTML.jpg)\n\
    \n**图 7-2.** 一个简单的 `SKLabelNode` 示例，其 `horizontalAlignmentMode` 设置为 `SKLabelHorizontalAlignmentMode.right`\n\
    \n将此对齐方式设置为 `SKLabelHorizontalAlignmentMode.left` 会告诉 SpriteKit 将 `SKLabelNode`\
    \ 的左侧放置在标签节点的原点位置。`horizontalAlignmentMode` 的默认值是 `SKLabelHorizontalAlignmentMode.center`，该值将标签的中心放置在标签的\
    \ `position` 属性处。你在图 7-1 中看到了这种模式。\n\n在继续之前，再尝试一件事。将 `horizontalAlignmentMode`\
    \ 属性的值从 `SKLabelHorizontalAlignmentMode.left` 更改为 `SKLabelHorizontalAlignmentMode.right`，如下所示，然后再次运行应用：\n\
    \n```\nsimpleLabel.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.right\n\
    ```\n\n这次标签的右侧被放置在 `SKLabelNode` 的 `position` 属性所在点，如图 7-3 所示。\n\n![A330720_2_En_7_Fig3_HTML.jpg](img/A330720_2_En_7_Fig3_HTML.jpg)\n\
    \n**图 7-3.** 一个简单的 `SKLabelNode` 示例，其 `horizontalAlignmentMode` 设置为 `SKLabelHorizontalAlignmentMode.left`\n\
    \n## 更改标签节点的垂直对齐方式\n"
- fmt: "In the previous section, you saw how you can change the horizontal alignment\
    \ of the `SKLabelNode` using `SKLabelNode`’s `horizontalAlignmentMode` property.\
    \ In this section, you will see how you can change `SKLabelNode`’s vertical alignment.\
    \ Before getting started, go back to the `GameScene.swift` file and change its\
    \ contents so they match Listing [7-3](#A330720_2_En_7_Chapter.html#Par24).\n\n\
    ```\nimport SpriteKit\nclass GameScene: SKScene {\n    required init?(coder aDecoder:\
    \ NSCoder) {\n        fatalError(\"init(coder:) has not been implemented\")\n\
    \    }\n    override init(size: CGSize) {\n        super.init(size: size)\n  \
    \      let simpleLabel = SKLabelNode(fontNamed: \"Copperplate\")\n        simpleLabel.text\
    \ = \"Hello, SpriteKit!\"\n        simpleLabel.fontSize = 40\n        simpleLabel.position\
    \ =\n            CGPoint(x: size.width / 2.0,\n                    y: frame.height\
    \ - simpleLabel.frame.height)\n        simpleLabel.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.center\n\
    \        addChild(simpleLabel)\n    }\n}\n```\n\n*Listing 7-3. The GameScene Class\
    \ with the Simple Label at the Top of the Scene*\n\nNote that this looks like\
    \ the code you used in the previous section, except that the `SKLabelNode` has\
    \ been positioned at the top of the scene, and `horizontalAlignmentMode` has been\
    \ explicitly set to the `center`. To see how this looks, run the application again.\
    \ It should now look like Figure [7-4](#A330720_2_En_7_Chapter.html#Fig4).\n\n\
    ![A330720_2_En_7_Fig4_HTML.jpg](OEBPS/A330720_2_En_7_Fig4_HTML.jpg)\n\n*Figure\
    \ 7-4. The simple `SKLabelNode` at the top center of the scene*\n\nThe reason\
    \ we moved the label to the top of the scene was so you can more easily see how\
    \ changing the vertical alignment affects the node’s presentation. The `SKLabelNode`\
    \ property you use to change the vertical alignment is `verticalAlignmentMode`.\
    \ There are four values you can set this property to, and they’re defined by the\
    \ `SKLabelVerticalAlignmentMode` enum.\n\nThe first option, `SKLabelVerticalAlignmentMode.baseline`,\
    \ is the default value and positions the text so that the font’s baseline is on\
    \ the node’s origin. You already saw an example of this option in Figure [7-4](#A330720_2_En_7_Chapter.html#Fig4)\
    \ when `verticalAlignmentMode` was not set, which resulted in the use of the default\
    \ value `SKLabelVerticalAlignmentMode.baseline`.\n\nThe second option is the `SKLabelVerticalAlignmentMode`\
    \ enum value `SKLabelVerticalAlignmentMode.center`, which is used to center the\
    \ text vertically on the node’s origin. To see how the value changes the text\
    \ layout, add the following line to the `GameScene` `init()` method right before\
    \ you add the `simpleLabel` to the scene:\n\n```\nsimpleLabel.verticalAlignmentMode\
    \ = SKLabelVerticalAlignmentMode.center\n```\n\nOnce you’ve made this change,\
    \ run the application again. You’ll now see that the text has shifted down so\
    \ that the vertical center of the text is at the `simpleLabel`’s origin, as shown\
    \ in Figure [7-5](#A330720_2_En_7_Chapter.html#Fig5).\n\n![A330720_2_En_7_Fig5_HTML.jpg](OEBPS/A330720_2_En_7_Fig5_HTML.jpg)\n\
    \n*Figure 7-5. The simple `SKLabelNode` example with its `verticalAlignmentMode`\
    \ set to `SKLabelVerticalAlignmentMode.center`*\n\nThe next vertical alignment\
    \ option is the value `SKLabelVerticalAlignmentMode.top`. This value is used to\
    \ position the text so that the top of the text is on the node’s origin. To see\
    \ how the value changes the text layout, set `simpleLabel`’s `verticalAlignmentMode`\
    \ value to `SKLabelVerticalAlignmentMode.top`, like this:\n\n```\nsimpleLabel.verticalAlignmentMode\
    \ = SKLabelVerticalAlignmentMode.top\n```\n\nOnce you’ve made this change, run\
    \ the application again. You’ll now see that the text has shifted down even further\
    \ so that the top of the text is at `simpleLabel`’s origin, as shown in Figure\
    \ [7-6](#A330720_2_En_7_Chapter.html#Fig6).\n\n![A330720_2_En_7_Fig6_HTML.jpg](OEBPS/A330720_2_En_7_Fig6_HTML.jpg)\n\
    \n*Figure 7-6. The simple `SKLabelNode` example with its `verticalAlignmentMode`\
    \ set to `SKLabelVerticalAlignmentMode.top`*\n\nThe last vertical alignment option\
    \ is the value `SKLabelVerticalAlignmentMode.bottom`. This value is used to position\
    \ the text so that the bottom of the text is on the node’s origin. To see how\
    \ the value changes the text layout, set `simpleLabel`’s `verticalAlignmentMode`\
    \ to `SKLabelVerticalAlignmentMode.bottom`, as shown here:\n\n```\nsimpleLabel.verticalAlignmentMode\
    \ = SKLabelVerticalAlignmentMode.bottom\n```\n\nOnce you’ve made this change,\
    \ run the application again. You’ll now see that the text has shifted up so that\
    \ the bottom of the text is at `simpleLabel`’s origin, as shown in Figure [7-7](#A330720_2_En_7_Chapter.html#Fig7).\n\
    \n![A330720_2_En_7_Fig7_HTML.jpg](OEBPS/A330720_2_En_7_Fig7_HTML.jpg)\n\n*Figure\
    \ 7-7. The simple `SKLabelNode` example with its `verticalAlignmentMode` set to\
    \ `SKLabelVerticalAlignmentMode.bottom`*"
  raw: 'In the previous section, you saw how you can change the horizontal alignment
    of the SKLabelNode using SKLabelNode’s horizontalAlignmentMode property. In this
    section, you will see how you can change SKLabelNode’s vertical alignment. Before
    getting starte d, go back to the GameScene.swift file and change its contents
    so they match Listing [7-3](#A330720_2_En_7_Chapter.html#Par24). import SpriteKit
    class GameScene: SKScene {     required init?(coder aDecoder: NSCoder) {         fatalError("init(coder:)
    has not been implemented")     }     override init(size: CGSize) {         super.init(size:
    size)         let simpleLabel = SKLabelNode(fontNamed: "Copperplate")         simpleLabel.text
    = "Hello, SpriteKit!"         simpleLabel.fontSize = 40         simpleLabel.position
    =             CGPoint(x: size.width / 2.0,                     y: frame.height
    - simpleLabel.frame.height)         simpleLabel.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.center
            addChild(simpleLabel)     } } Listing 7-3. The GameScene Class with the
    Simple Label at the Top of the Scene Note that this looks like the code you used
    in the previous section, except that the SKLabelNode has been positioned at the
    top of the scene, and horizontalAlignmentMode has been explicitly set to the center.
    To see how this looks, run the application again. It should now look like Figure
    [7-4](#A330720_2_En_7_Chapter.html#Fig4). ![A330720_2_En_7_Fig4_HTML.jpg](OEBPS/A330720_2_En_7_Fig4_HTML.jpg)
    Figure 7-4. The simple SKLabelNode at the top center of the scene The reason we
    moved the label to the top of the scene was so you can more easily see how changing
    the vertical alignment affects the node’s presentation. The SKLabelNode property
    you use to change the vertical alignment is verticalAlignmentMode. There are four
    values you can set this property to, and they’re defined by the SKLabel VerticalAlignmentMode
    enum. The first option, SKLabelVerticalAlignmentMode.baseline, is the default
    value and positions the text so that the font’s baseline is on the node’s origin.
    You already saw an example of this option in Figure [7-4](#A330720_2_En_7_Chapter.html#Fig4)
    when verticalAlignmentMode was not set, which resulted in the use of the default
    value SKLabelVerticalAlignmentMode.baseline. The second option is the SKLabelVerticalAlignmentMode
    enum value SKLabelVerticalAlignmentMode.center, which is used to center the text
    vertically on the node’s origin. To see how the value changes the text layout,
    add the following line to the GameScene init() method right before you add the
    simpleLabel to the scene: simpleLabel.verticalAlignmentMode = SKLabelVerticalAlignmentMode.center
    Once you’ve made this change, run the application again. You’ll now see that the
    text has shifted down so that the vertical center of the text is at the simpleLabel’s
    origin, as shown in Figure [7-5](#A330720_2_En_7_Chapter.html#Fig5). ![A330720_2_En_7_Fig5_HTML.jpg](OEBPS/A330720_2_En_7_Fig5_HTML.jpg)
    Figure 7-5. The simple SKLabelNode example with its verticalAlignmentMode set
    to SKLabelVerticalAlignmentMode.center The next vertical alignment option is the
    value SKLabel VerticalAlignmentMode .top. This value is used to position the text
    so that the top of the text is on the node’s origin. To see how the value changes
    the text layout, set simpleLabel’s verticalAlignmentMode value to SKLabelVerticalAlignmentMode.top,
    like this: simpleLabel.verticalAlignmentMode = SKLabelVerticalAlignmentMode.top
    Once you’ve made this change, run the application again. You’ll now see that the
    text has shifted down even further so that the top of the text is at simpleLabel’s
    origin, as shown in Figure [7-6](#A330720_2_En_7_Chapter.html#Fig6). ![A330720_2_En_7_Fig6_HTML.jpg](OEBPS/A330720_2_En_7_Fig6_HTML.jpg)
    Figure 7-6. The simple SKLabelNode example with its verticalAlignmentMode set
    to SKLabelVerticalAlignmentMode.top The last vertical alignment option is the
    value SKLabel VerticalAlignmentMode .bottom. This value is used to position the
    text so that the bottom of the text is on the node’s origin. To see how the value
    changes the text layout, set simpleLabel’s verticalAlignmentMode to SKLabelVerticalAlignmentMode.bottom,
    as shown here: simpleLabel.verticalAlignmentMode = SKLabelVerticalAlignmentMode.bottom
    Once you’ve made this change, run the application again. You’ll now see that the
    text has shifted up so that the bottom of the text is at simpleLabel’s origin,
    as shown in Figure [7-7](#A330720_2_En_7_Chapter.html#Fig7). ![A330720_2_En_7_Fig7_HTML.jpg](OEBPS/A330720_2_En_7_Fig7_HTML.jpg)
    Figure 7-7. The simple SKLabelNode example with its verticalAlignmentMode set
    to SKLabelVerticalAlignmentMode.bottom


    ## Adding Scoring to the Game'
  trans: "\n在上一节中，你已经了解了如何通过 `SKLabelNode` 的 `horizontalAlignmentMode` 属性来更改其水平对齐方式。本节中，你将学习如何更改\
    \ `SKLabelNode` 的垂直对齐方式。开始之前，请返回 `GameScene.swift` 文件，将其内容修改为与代码清单 7-3 一致。\n\n\
    ```\nimport SpriteKit\nclass GameScene: SKScene {\n    required init?(coder aDecoder:\
    \ NSCoder) {\n        fatalError(\"init(coder:) has not been implemented\")\n\
    \    }\n    override init(size: CGSize) {\n        super.init(size: size)\n  \
    \      let simpleLabel = SKLabelNode(fontNamed: \"Copperplate\")\n        simpleLabel.text\
    \ = \"Hello, SpriteKit!\"\n        simpleLabel.fontSize = 40\n        simpleLabel.position\
    \ =\n            CGPoint(x: size.width / 2.0,\n                    y: frame.height\
    \ - simpleLabel.frame.height)\n        simpleLabel.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.center\n\
    \        addChild(simpleLabel)\n    }\n}\n```\n\n*代码清单 7-3. 在场景顶部包含简单标签的 GameScene\
    \ 类*\n\n请注意，此代码与上一节中使用的代码类似，不同之处在于 `SKLabelNode` 已被放置到场景顶部，并且 `horizontalAlignmentMode`\
    \ 已明确设置为 `center`。要查看效果，请再次运行应用程序。现在应如图 7-4 所示。\n\n![A330720_2_En_7_Fig4_HTML.jpg](img/A330720_2_En_7_Fig4_HTML.jpg)\n\
    \n*图 7-4. 位于场景顶部中央的简单 `SKLabelNode`*\n\n我们将标签移至场景顶部，是为了让你更直观地看到垂直对齐方式的改变如何影响节点的呈现。用于更改垂直对齐方式的\
    \ `SKLabelNode` 属性是 `verticalAlignmentMode`。此属性可设置为四个值，它们由 `SKLabelVerticalAlignmentMode`\
    \ 枚举定义。\n\n第一个选项 `SKLabelVerticalAlignmentMode.baseline` 是默认值，它会使文本的基线位于节点的原点。你已在图\
    \ 7-4 中看到该选项的示例，当时未设置 `verticalAlignmentMode`，因此默认使用了 `SKLabelVerticalAlignmentMode.baseline`\
    \ 值。\n\n第二个选项是 `SKLabelVerticalAlignmentMode` 枚举值 `SKLabelVerticalAlignmentMode.center`，用于将文本在垂直方向上居中对齐于节点的原点。要查看该值如何改变文本布局，请在\
    \ `GameScene` 的 `init()` 方法中、将 `simpleLabel` 添加到场景之前添加以下代码行：\n\n```\nsimpleLabel.verticalAlignmentMode\
    \ = SKLabelVerticalAlignmentMode.center\n```\n\n完成此更改后，再次运行应用程序。你将看到文本向下移动，使得文本的垂直中心点位于\
    \ `simpleLabel` 的原点，如图 7-5 所示。\n\n![A330720_2_En_7_Fig5_HTML.jpg](img/A330720_2_En_7_Fig5_HTML.jpg)\n\
    \n*图 7-5. 将 `verticalAlignmentMode` 设置为 `SKLabelVerticalAlignmentMode.center`\
    \ 的简单 `SKLabelNode` 示例*\n\n下一个垂直对齐选项是 `SKLabelVerticalAlignmentMode.top`。此值用于将文本定位为文本顶部位于节点原点。要查看该值如何改变文本布局，请将\
    \ `simpleLabel` 的 `verticalAlignmentMode` 值设置为 `SKLabelVerticalAlignmentMode.top`，如下所示：\n\
    \n```\nsimpleLabel.verticalAlignmentMode = SKLabelVerticalAlignmentMode.top\n\
    ```\n\n完成此更改后，再次运行应用程序。你将看到文本进一步向下移动，使得文本顶部位于 `simpleLabel` 的原点，如图 7-6 所示。\n\n\
    ![A330720_2_En_7_Fig6_HTML.jpg](img/A330720_2_En_7_Fig6_HTML.jpg)\n\n*图 7-6. 将\
    \ `verticalAlignmentMode` 设置为 `SKLabelVerticalAlignmentMode.top` 的简单 `SKLabelNode`\
    \ 示例*\n\n最后一个垂直对齐选项是 `SKLabelVerticalAlignmentMode.bottom`。此值用于将文本定位为文本底部位于节点原点。要查看该值如何改变文本布局，请将\
    \ `simpleLabel` 的 `verticalAlignmentMode` 设置为 `SKLabelVerticalAlignmentMode.bottom`，如下所示：\n\
    \n```\nsimpleLabel.verticalAlignmentMode = SKLabelVerticalAlignmentMode.bottom\n\
    ```\n\n完成此更改后，再次运行应用程序。你将看到文本向上移动，使得文本底部位于 `simpleLabel` 的原点，如图 7-7 所示。\n\n![A330720_2_En_7_Fig7_HTML.jpg](img/A330720_2_En_7_Fig7_HTML.jpg)\n\
    \n*图 7-7. 将 `verticalAlignmentMode` 设置为 `SKLabelVerticalAlignmentMode.bottom`\
    \ 的简单 `SKLabelNode` 示例*\n"
- fmt: "现在你已经知道如何使用 `SKLabelNode`，是时候将其付诸实践了。正如本书开头所述，本游戏的目标是在不与黑洞碰撞或耗尽冲量的情况下尽可能多地收集能量球。在本节中，你终于要为游戏添加计分功能了。具体来说，你需要在场景的右上角添加一个\
    \ `SKLabelNode`，初始文本为“SCORE : 0”。每当 `playerNode` 与能量球节点接触时，这个数值就会增加——收集的能量球越多，分数就越高。让我们回到\
    \ `SuperSpaceman` 项目来实现这一功能。\n\n要在 `GameScene` 中添加计分标签，第一步是创建一个变量来保存分数（收集的能量球数量）以及一个\
    \ `SKLabelNode` 常量来保存标签。你可以通过以下两行代码来实现：\n\n```\nvar score = 0\nlet scoreTextNode\
    \ = SKLabelNode(fontNamed: \"Copperplate\")\n```\n\n这段代码非常直接：它创建了一个名为 `score`\
    \ 的整数变量并将其初始化为 `0`（这在游戏开始时是合理的），然后创建了一个字体为 `Copperplate` 的 `SKLabelNode`。我们选择\
    \ `Copperplate` 是因为我们认为它与已有的图像搭配起来效果不错，但你可以选择任何你喜欢的字体。\n\n查看这段代码后，将其添加到 `GameScene`\
    \ 声明部分的末尾，紧接在第一个 `init()` 方法之前：\n\n```\nvar score = 0\nlet scoreTextNode = SKLabelNode(fontNamed:\
    \ \"Copperplate\")\n\nrequired init?(coder aDecoder: NSCoder) {\n    super.init(coder:\
    \ aDecoder)\n}\n```\n\n接下来你需要做的是设置 `SKLabelNode` 的所有属性，并将其添加到 `GameScene` 中。这可以通过以下代码片段完成：\n\
    \n```\nscoreTextNode.text = \"SCORE : \\(score)\"\nscoreTextNode.fontSize = 20\n\
    scoreTextNode.fontColor = SKColor.white\nscoreTextNode.position = CGPoint(x: size.width\
    \ - 10, y: size.height - 20)\nscoreTextNode.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.right\n\
    addChild(scoreTextNode)\n```\n\n所有这些你之前都见过，但在继续之前，我们还是回顾一下。第一行将标签的文本设置为“SCORE\
    \ :”加上变量 `score` 的当前值。第二行和第三行分别设置了字体大小和字体颜色。片段中的第四行和第五行非常重要：第四行将 `scoreTextNode`\
    \ 的位置（原点）设置为距离场景右侧边缘 10 点、距离场景顶部 20 点；第五行将节点的水平对齐方式设置为 `SKLabelHorizontalAlignmentMode.right`，这将使标签节点的右侧距离场景最右侧\
    \ 10 点。之后，`scoreTextNode` 被添加到场景中。\n\n查看这段代码后，将其添加到 `init(size: CGSize)` 方法的底部，然后我们继续。\n\
    \n在重新运行应用并开始挑战你的最高分之前，还需要完成最后一步。找到 `GameScene` 扩展中的 `didBegin(_ contact: SKPhysicsContact)`\
    \ 方法，并将处理与能量球节点接触的 `if` 语句修改为以下内容：\n\n```\nif nodeB.name == \"POWER_UP_ORB\" {\n\
    \    impulseCount += 1\n    score += 1\n    scoreTextNode.text = \"SCORE : \\\
    (score)\"\n    nodeB.removeFromParent()\n}\n```\n\n保存更改后，看一下在移除节点之前添加的两行代码。第一行将分数加\
    \ 1，第二行更改 `scoreTextNode` 的文本以反映这一增量。确保你已经完成了所有这些更改，然后再次运行游戏。你现在会在场景的右上角看到计分标签，如图\
    \ [7-8](#A330720_2_En_7_Chapter.html#Fig8) 所示。\n\n![A330720_2_En_7_Fig8_HTML.jpg](OEBPS/A330720_2_En_7_Fig8_HTML.jpg)\n\
    \n**图 7-8.** 带有计分标签的 `GameScene`\n\n开始点击屏幕并尝试收集一些能量球。请注意，每当你的玩家与能量球接触时，分数就会增加。游戏终于有了计分功能。\n\
    \n## 为游戏添加冲量计数器"
  raw: 'Now that you know how to use SKLabelNode, it’s time to put it to some good
    use. As mentioned at the beginning of this book, the goal of this game is to collect
    as many orbs as you can without colliding with a black hole or running out of
    impulses. In this section, you’ll finally add some scoring to the game. Specifically,
    you’ll add an SKLabelNode to the top right of the scene. The original text will
    be “SCORE : 0.” This numeric value will increment each time the playerNode comes
    into contact with an orb node—the more orbs collected, the higher your score.
    Let’s make this happen by going back to the SuperSpaceman project. The first step
    you need to take to add a scoring label to the GameScene is to create a variable
    to hold the score (the number of orbs collected) and an SKLabelNode constant to
    hold the label. You can accomplish that with the following two lines of code:
    var score = 0 let scoreTextNode = SKLabelNode(fontNamed: "Copperplate") This code
    is pretty straightforward. It creates an integer variable named score and sets
    it to 0, which makes sense at the beginning of a game, and then it creates an
    SKLabelNode with a font of Copperplate. We chose Copperplate because we thought
    it looked good with the images already in place, but you can choose whatever you
    like. After looking at this code, add it to the end of the GameScene’s declaration
    section immediately before the first init() method: var score = 0 let scoreTextNode
    = SKLabelNode(fontNamed: "Copperplate") required init?(coder aDecoder: NSCoder)
    {     super.init(coder: aDecoder) } The next thing you need to do is set all of
    the SKLabelNode’s properties and add it to the GameScene. This is accomplished
    in the following snippet: scoreTextNode.text = "SCORE : \(score)" scoreTextNode.fontSize
    = 20 scoreTextNode.fontColor = SKColor.white scoreTextNode.position =                        CGPoint(x:
    size.width - 10, y: size.height - 20) scoreTextNode.horizontalAlignmentMode =
    SKLabelHorizontalAlignmentMode.right addChild(scoreTextNode) You’ve seen all this
    before , but let’s go over it before moving on. The first line sets the text of
    the label to “SCORE :” plus the current value in the variable score. The second
    and third lines set the font size and font color, respectively. The fourth and
    fifth lines in the snippet are important. The fourth line sets the position (origin)
    of the scoreTextNode to 10 points to the left of the right side of the scene and
    20 points from the top of the scene. The fifth line of this snippet sets the node’s
    horizontal alignment to SKLabelHorizontalAlignmentMode.right, which will result
    in the label node’s right side being set 10 points from the far-right side of
    the scene. After that, the scoreTextNode is added to the scene. Once you’ve taken
    a look at this code, add it to the bottom of the init(size: CGSize() method and
    let’s move on. You need to complete one last step before you can run the app again
    and start working on your high score. Find the didBegin(_ contact: SKPhysicsContact)
    method in the GameScene extension and change the if statement handling contact
    with the orb nodes to the following: if nodeB.name == "POWER_UP_ORB"  {     impulseCount
    += 1     score += 1     scoreTextNode.text = "SCORE : \(score)"     nodeB.removeFromParent()
    } Once you’ve saved your changes, take a look at the two lines added before the
    node is removed. The first of these two lines increments the score by one, and
    the second of these two lines changes the text of the scoreTextNode to reflect
    this increment. Make sure you’ve made all these changes and run the game again.
    You’ll now see the score label in the top-right corner of the scene, as shown
    in Figure [7-8](#A330720_2_En_7_Chapter.html#Fig8). ![A330720_2_En_7_Fig8_HTML.jpg](OEBPS/A330720_2_En_7_Fig8_HTML.jpg)
    Figure 7-8. The GameScene with a score label Start tapping the screen and try
    to collect some orbs. Note that every time your player comes into contact with
    an orb, the score is incremented. The game finally has scoring.


    ## Adding an Impulse Counter to the Game'
