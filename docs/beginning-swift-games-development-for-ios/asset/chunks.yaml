    1/10th of a second. Don’t forget, you’ll also need to override the required initializer,
    as in Listing [15-2](#A330720_2_En_15_Chapter.html#Par15). required init?(coder
    aDecoder: NSCoder) {     fatalError("init(coder:) has not been implemented") }
