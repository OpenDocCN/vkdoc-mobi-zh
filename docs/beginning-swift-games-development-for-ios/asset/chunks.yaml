    \  \n(2) 美国密苏里州堪萨斯城  \n\n第 1 章论述了什么是 SpriteKit 以及如何使用它创建 2D 游戏。它展示了如何开始使用 `SKSpriteNode`\
    \ 创建背景和玩家精灵，然后展示了如何将它们添加到游戏场景中。本章将稍作回顾，更深入地探讨 SpriteKit 场景，包括场景的构建方式以及构建顺序为何会改变你的游戏。最后，我们将讨论与\
    \ `SKNodes` 相关的 SpriteKit 坐标系和锚点。\n\n## 什么是 SKScene？\n\n我们在第 1 章中使用了 `SKScene`\
    \ 对象来承载背景和玩家节点，但并未真正解释我们使用的场景。我们只是用它来添加精灵，然后就结束了。现在是时候深入探究 `SKScene` 的真正工作原理了。我们将从定义\
    \ `SKScene` 对象开始。一个 `SKScene` 对象代表 SpriteKit 游戏中一个场景的内容。它继承自 `SKEffectNode`、`SKNode`、`UIResponder`，当然还有\
    \ `NSObject`。它的构建过程是：首先创建场景，然后向其添加 *n* 个其他 `SKNodes`。场景及其所有子节点被称为节点树，而场景是节点树的根。场景中包含的节点提供了场景将要动画和渲染显示的内容。\n\
