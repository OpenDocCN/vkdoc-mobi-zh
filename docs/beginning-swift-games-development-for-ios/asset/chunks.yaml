    \nplayerNode.position = CGPoint(x: size.width / 2.0, y: 80.0)\naddChild(playerNode!)\n\
    ```\n\n6. 在 `GameViewController.viewDidLoad()` 方法中展示完整的场景：\n\n```\nskView.presentScene(scene)\n\
    ```\n\n至此，你就拥有了一个包含完整节点树的完整场景。你可以随时根据游戏进展添加更多节点，但这些是你在创建新 `SKScene` 时始终会完成的基本步骤。\n"
- fmt: '# The SKScene Rendering Loop


    In this section, we describe what happens after the `SKScene` is presented by
    the `SKView`. In a more traditional iOS application, you would render the view’s
    content only once, and it would stay static until the model that the view is presenting
    changes. This is fine for a business app, but a game has the potential to constantly
    change. Because of this dynamic characteristic, SpriteKit is constantly updating
    the scene and its contents. This constant updating is called the rendering loop
    (see Figure [2-1](#A330720_2_En_2_Chapter.html#Fig1)). ![A330720_2_En_2_Fig1_HTML.jpg](OEBPS/A330720_2_En_2_Fig1_HTML.jpg)
    Figure 2-1. The SpriteKit rendering loop


    Each iteration of this loop generates the next frame in the scene. The steps involved
    in generating the next frame of a scene are as follows:


    1. The scene calls its `update()` method. This is where you will have most of
    your game logic. More often than not, you will be moving nodes around, adding
    new actions to existing nodes, and handling user input. (We talk about the `update()`
    method in Chapter [4](#A330720_2_En_4_Chapter.html).)

    2. The scene next performs all programmed actions on its children. In this step,
    the scene executes any actions you may have set up in step 1. (We talk about actions
    in Chapter [5](#A330720_2_En_5_Chapter.html).)

    3. The scene then calls the `didEvaluateActions()` method. This is where you would
    put any post-action game logic. An example would be testing the position of a
    node, after the actions were performed, and responding accordingly.

    4. Next the scene executes any physics simulations on physics bodies in the scene.
    (We discuss physics in Chapter [3](#A330720_2_En_3_Chapter.html).)

    5. The scene calls the `didSimulatePhysics()` method. This is much like the `didEvaluateActions()`
    method in that this is where you would add any game logic to be performed after
    all the physics simulations are completed. This is your last chance to perform
    any game logic before the scene is rendered.

    6. The scene is rendered.


    You will see examples of each step in the rendering loop as you progress through
    each chapter of this book.


    **Note:** When you have `showsFPS` in your `SKView`, you will see how many frames
    your game is rendering per second. Each frame being rendered represents a single
    iteration of the render loop.


    ## Building the Scene’s Node Tree


    Earlier in this chapter, we discussed how you set up a simple `SKScene` with a
    background node and a player node. You did this using the `SKScene.addChild()`
    method. This section takes a more in-depth look at how scenes are created. We
    also mentioned the types that the `SKScene` class extends. One of those types
    is `SKNode`. `SKNode` is the class that holds all the nodes in an `SKScene` object’s
    node tree. It also defines the methods that are used to manipulate this node tree.
    The most common of these methods are `addChild()`, `insertChild()`, and `removeFromParent()`,
    as described in Table [2-1](#A330720_2_En_2_Chapter.html#Tab1).


    Table 2-1. The `SKNode` Node Tree Manipulating Methods


    | Method | Purpose |

    | --- | --- |

    | `addChild()` | The `addChild(_:)` method adds a node to the end of the receiver’s
    collection of child nodes. |

    | `insertChild(_:at:)` | The `insertChild(_:at:)` method inserts a child node
    at a specific position in the receiver’s collection of child nodes. |

    | `removeFromParent()` | `removeFromParent()` removes the receiving node from
    its parent. |


    These are the three methods you will use to build the scene’s node tree. The easiest
    way to see how these methods work is through a simple example. Take a look at
    the following sequence:


    ```

    var gameScene = SKScene(size: CGSizeMake(320.0, 568.0))

    var node1 = SKSpriteNode()

    var node2 = SKSpriteNode()

    var node3 = SKSpriteNode()

    gameScene.addChild(node1)

    gameScene.addChild(node2)

    gameScene.addChild(node3)

    ```


    Here you are creating an `SKScene` named `gameScene`. You then create three nodes
    and add them to the `gameScene`. At this point, the `gameScene`’s node tree looks
    like Figure [2-2](#A330720_2_En_2_Chapter.html#Fig2). ![A330720_2_En_2_Fig2_HTML.gif](OEBPS/A330720_2_En_2_Fig2_HTML.gif)
    Figure 2-2. The `gameScene`’s children property after adding three nodes


    **Note:** The line in Figure [2-2](#A330720_2_En_2_Chapter.html#Fig2) and several
    subsequent figures represents the order in which each node was added. It does
    not indicate that the nodes themselves are related to each other. For example,
    `node2` was not added to `node1`. `node2` was just added after `node1`.


    At this point, the node tree contains three nodes: `node1`, `node2`, and `node3`
    (in that order). Now, if you executed the following snippet, you would have a
    node tree that looked like Figure [2-3](#A330720_2_En_2_Chapter.html#Fig3):


    ![A330720_2_En_2_Fig3_HTML.gif](OEBPS/A330720_2_En_2_Fig3_HTML.gif) Figure 2-3.
    The `gameScene`’s node tree after inserting a fourth node


    ```

    var node4 = SKSpriteNode()

    gameScene.insertChild(node4, at: 2)

    ```


    The `insertChild()` method inserts a node at the given location in the node tree.
    In this case you’re saying to insert the node into the third position (the first
    node being located at position 0). The children property now contains four nodes,
    with `node4` being inserted between `node2` and `node3`.


    Let’s do one last thing and remove a node:


    ```

    node2.removeFromParent()

    ```


    By invoking `node2`’s `removeFromParent` method, you have removed `node2` from
    its parent, which is `gameScene` in this case. Now the node tree looks like Figure
    [2-4](#A330720_2_En_2_Chapter.html#Fig4).


    ![A330720_2_En_2_Fig4_HTML.gif](OEBPS/A330720_2_En_2_Fig4_HTML.gif) Figure 2-4.
    The `gameScene`’s node tree after removing `node4`


    There is one last thing you need to look at, and that is nested nodes. Because
    the node tree is part of `SKNode`, and because `SKSpriteNode` is extended from
    `SKNode`, it can have nested nodes. The nice thing about nesting related nodes
    is that when you change the parent node, the same changes will be applied to all
    the child nodes.


    To see how nested nodes are represented in the node tree, let’s go back to the
    node tree represented by Figure [2-4](#A330720_2_En_2_Chapter.html#Fig4). If you
    want to nest additional nodes inside `node4`, you can do so by executing the following
    snippet right after the previously executed `node2.removeFromParent()`. Figure
    [2-5](#A330720_2_En_2_Chapter.html#Fig5) represents the results of this snippet:


    ![A330720_2_En_2_Fig5_HTML.gif](OEBPS/A330720_2_En_2_Fig5_HTML.gif) Figure 2-5.
    The `gameScene`’s node tree with nodes nested inside `node4`


    ```

    var node4a = SKSpriteNode()

    var node4b = SKSpriteNode()

    var node4c = SKSpriteNode()

    node4.addChild(node4a)

    node4.addChild(node4b)

    node4.addChild(node4c)

    ```'
  raw: '## The SKScene Rendering Loop


    In this section, we describe what happens after the SKScene is presented by the
    SKView. In a more traditional iOS application , you would render the view’s content
    only once, and it would stay static until the model that the view is presenting
    changes. This is fine for a business app, but a game has the potential to constantly
    change. Because of this dynamic characteristic, SpriteKit is constantly updating
    the scene and its contents. This constant updating is called the rendering loop
    (see Figure [2-1](#A330720_2_En_2_Chapter.html#Fig1)). ![A330720_2_En_2_Fig1_HTML.jpg](OEBPS/A330720_2_En_2_Fig1_HTML.jpg)
    Figure 2-1. The SpriteKit rendering loop Each iteration of this loop generates
    the next frame in the scene. The steps involved in generating the next frame of
    a scene are as follows:


    1.  1. The scene calls its update() method . This is where you will have most
    of your game logic. More often than not, you will be moving nodes around, adding
    new actions to existing nodes, and handling user input. (We talk about the update()
    method in Chapter [4](#A330720_2_En_4_Chapter.html).)  

    2.  2. The scene next performs all programmed actions on its children. In this
    step, the scene executes any actions you may have set up in step 1\. (We talk
    about actions in Chapter [5](#A330720_2_En_5_Chapter.html).)  

    3.  3. The scene then calls the didEvaluateActions() method . This is where you
    would put any post-action game logic. An example would be testing the position
    of a node, after the actions were performed, and responding accordingly.  

    4.  4. Next the scene executes any physics simulations on physics bodies in the
    scene. (We discuss physics in Chapter [3](#A330720_2_En_3_Chapter.html).)  

    5.  5. The scene calls the didSimulatePhysics() method . This is much like the
    didEvaluateActions() method in that this is where you would add any game logic
    to be performed after all the physics simulations are completed. This is your
    last chance to perform any game logic before the scene is rendered.  

    6.  6. The scene is rendered.  


    You will see examples of each step in the rendering loop as you progress through
    each chapter of this book. Note When you have showsFPS in your SKView, you will
    see how many frames your game is rendering per second. Each frame being rendered
    represents a single iteration of the render loop.


