  trans: '

    # 理解 SpriteKit 中的物理体


    要理解这一切是如何运作的，最简单的方法就是直接动手实践。让我们先创建一个 `SKPhysicsBody` 并将其与 `playerNode` 关联起来。在
    `GameScene` 的 `.init(size: CGSize)` 方法中，紧随 `playerNode` 构造代码之后，添加以下两行代码：


    ```

    playerNode.physicsBody = SKPhysicsBody(circleOfRadius: playerNode.size.width /
    2)

    playerNode.physicsBody?.isDynamic = true

    ```


    仔细看看这两行代码。第一行创建了一个 `SKPhysicsBody`，并向其初始化方法传入了一个名为 `circleOfRadius`、值为 `CGFloat`
    类型的参数。`SpriteKit` 提供了几种标准的物理体形状，包括圆形（`circleOfRadius`）、矩形（`rectangleOfSize`）以及基于路径的多边形（`polygonFromPath`）。这些形状中，圆形的效率最高，而基于路径的多边形效率最低。由于圆形是最高效的节点形状，因此本游戏中的所有物理体都将使用它。


    在这个例子中，传入构造函数的参数值是 `playerNode` 的宽度除以 2。我们使用这个值是因为，我们希望以 `playerNode` 的中心为圆心，以节点宽度的一半为半径，创建一个包围该节点的圆形。这样就能得到一个完全包裹
    `playerNode` 的圆。如果存在 `SKPhysicsBody(circleOfDiameter:)` 这样的构造函数，我们就不需要将宽度除以 2
    了，但并没有这样的构造函数。


    现在来看这段代码的第二行。第二行将 `playerNode` 转变为一个具有动态体积的物理体。此后，它将响应场景中的重力以及其他物理体。完成这些修改后，你的新玩家设置代码应该如下所示：


    ```

    // 添加玩家

    playerNode.physicsBody = SKPhysicsBody(circleOfRadius: playerNode?.size.width
    / 2)

    playerNode.physicsBody?.isDynamic = true

    playerNode.position = CGPoint(x: size.width / 2.0, y: 80.0)

    addChild(playerNode)

    ```


    现在，回到 Xcode 并再次运行应用。如果你没有仔细观察，你只会看到游戏的背景节点。这是因为 `SpriteKit` 中的默认重力设置与地球引力一致，玩家节点现在正快速地向地心坠落。要想让下落速度变慢，你需要调整游戏世界的重力设置，直到找到一个你满意的重力值。


    回到 `GameScene.init(size: CGSize)` 方法，在 `super.init(size: size)` 调用之后立即添加以下代码行，然后再次运行应用：


    ```

    physicsWorld.gravity = CGVector(dx: 0.0, dy: -0.1)

    ```


    现在你会看到玩家慢慢地从屏幕底部飘落。你刚才所做的是通过 `SKScene` 的 `physicsWorld.gravity` 属性修改了世界重力，并将其设置成一个能大幅减缓
    `playerNode` 下落速度的值。请注意，你设置给重力属性的值是一个向量，其 x 坐标为 `0.0`，y 坐标为 `–0.1`。你将 x 坐标设为 `0.0`，是因为重力只沿
    y 轴方向施加力。这个向量的结果是一个将物体向场景底部拉拽的重力。


    虽然将 y 坐标设为 `–0.1` 有助于我们看到 `playerNode` 掉落出场景，但这对于游戏玩法来说并不实用。一个更合理的值应该是 `–2.0`。将重力属性设置为
    `CGVector(dx: 0.0, dy: -2.0)`，然后再次尝试运行。你会看到玩家掉出屏幕，但速度更适合游戏玩法。


    **注意：** 在本节中，你将世界的重力属性修改为了一个与地球实际重力不一致的值。我们之所以让你这样做，是因为你的目标不是模拟地球引力，而是创建一个让玩家感到有趣的模拟游戏世界。当你开始创建自己的游戏时，你会发现自己经常这样做。毕竟，游戏的核心是让玩家玩得开心，而不是与现实世界一致。


    ## 向 SKPhysicsBody 施加力

