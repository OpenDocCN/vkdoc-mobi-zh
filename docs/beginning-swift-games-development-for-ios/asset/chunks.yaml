- fmt: "## 排版后的内容\n\n此时，你的玩家已经能响应游戏世界的物理属性，并且你也调整了引力，防止玩家从可视场景底部掉落。这很棒，但看着角色掉出屏幕可没什么乐趣。现在，是时候向玩家施加一些力，让他能对抗重力并留在可视场景中了。\n\
    \n改变`SKPhysicsBody`速度的两种最常见方法是施加力（`applyForce()`）和施加冲量（`applyImpulse()`）。当向`SKPhysicsBody`施加力时，该力的作用时间基于渲染循环两次调用之间经过的时间长度。力通常用于连续的速度变化。你使用`SKPhysicsBody`的`applyForce()`方法来施加力。当向`SKPhysicsBody`施加冲量时，你是在对物体的速度施加一个瞬时改变，这个改变与经过的模拟时间无关。当你需要立即改变节点速度时，会使用冲量。你使用`SKPhysicsBody`的`applyImpulse()`方法来施加冲量。\n\
    \n本游戏将使用冲量来修改玩家的速度，因此会使用`applyImpulse()`方法。在你能向玩家的物理体施加冲量之前，你需要让用户能够告知游戏何时施加冲量。因为`SKNode`继承了`UIResponder`，并且`SKScene`是一个`SKNode`，你可以通过重写`GameScene`的`UIResponder.touchesBegan()`方法来测试场景中的触摸。为此，你需要完成两步。\n\
    \n首先，在创建`backgroundNode`的代码行之前，添加以下一行代码以开启场景中的用户交互：\n`isUserInteractionEnabled\
    \ = true`\n\n然后，通过在`GameScene`类中添加以下方法来重写`UIResponder.touchesBegan()`：\n```\n\
    override func touchesBegan(_ touches: Set<UITouch>, with event: UIEvent?) {\n\
    \    playerNode.physicsBody?.applyImpulse(CGVector(dx: 0.0, dy: 40.0))\n}\n```\n\
    \n将此方法添加到`GameScene`类定义的底部，然后重新运行`SuperSpaceMan`应用程序。在应用运行时，根据需要多次点击屏幕，让玩家飞回场景中。所需的点击次数取决于`playerNode`掉出场景的远近。\n\
    \n在尝试了触摸响应器之后，看看`touchesBegan()`方法中的单行代码。这行代码在每次点击屏幕时向`playerNode`的物理体施加一个冲量。冲量的方向和强度取决于你传递给`applyImpulse()`方法的向量。这里，你创建了一个x值为0.0（因为你只想沿着y轴线性施加冲量）且y值为40.0的向量，这会产生一个将玩家向重力相反方向弹起的脉冲。\n\
    \n在继续之前，尝试调整创建此向量的y值。这能帮助你理解该值如何影响脉冲的大小。完成后，将y值恢复为40.0，让我们继续。\n\n一旦玩家在场景中可见，点击屏幕直到玩家到达可视场景顶部，然后观察它下落。关于`playerNode`下落方式，需要注意一点：玩家下落时，仿佛没有任何表面积来减缓其速度。这看起来不太对劲。为了解决这个问题，`SpriteKit`的`SKPhysicsBody`提供了一个`linearDamping`属性。此属性默认值为0.1，用于减小物理体的线性速度，以模拟流体或空气摩擦力。这里，你在模拟空气摩擦力。\n\
    \n要了解如何使用此属性，请在`playerNode`定位代码之后立即添加以下代码行，然后再次运行应用程序：\n`playerNode.physicsBody?.linearDamping\
    \ = 1.0`\n\n现在点击屏幕直到玩家到达屏幕顶部，让它再次下落。这一次，`playerNode`下落的更慢，模拟了在空气中下落时的阻力。\n\n在进入本章的碰撞检测部分之前，请确保你的`GameScene.swift`文件看起来像[3-1](#A330720_2_En_3_Chapter.html#Par35)所示。\n\
    \n```\nimport SpriteKit\nclass GameScene: SKScene {\n    let backgroundNode =\
    \ SKSpriteNode(imageNamed: \"Background\")\n    let playerNode = SKSpriteNode(imageNamed:\
    \ \"Player\")\n    required init?(coder aDecoder: NSCoder) {\n        super.init(coder:\
    \ aDecoder)\n    }\n    override init(size: CGSize) {\n        super.init(size:\
    \ size)\n        physicsWorld.gravity = CGVector(dx: 0.0, dy: -2.0);\n       \
    \ backgroundColor = SKColor(red: 0.0, green: 0.0, blue: 0.0, alpha: 1.0)\n   \
    \     isUserInteractionEnabled = true\n        // adding the background\n    \
    \    backgroundNode.size.width = frame.size.width\n        backgroundNode.anchorPoint\
    \ = CGPoint(x: 0.5, y: 0.0)\n        backgroundNode.position = CGPoint(x: size.width\
    \ / 2.0, y: 0.0)\n        addChild(backgroundNode)        \n        // add the\
    \ player\n        playerNode.physicsBody = SKPhysicsBody(circleOfRadius: playerNode.size.width\
    \ / 2)\n        playerNode.physicsBody?.isDynamic = true\n        playerNode.position\
    \ = CGPoint(x: size.width / 2.0, y: 80.0)\n        playerNode.physicsBody?.linearDamping\
    \ = 1.0\n        addChild(playerNode!)\n    }\n    override func touchesBegan(_\
    \ touches: Set<UITouch>, with event: UIEvent?) {\n        playerNode.physicsBody?.applyImpulse(CGVector(dx:\
    \ 0.0, dy: 40.0))\n    }\n}\n```\n\n**列表 3-1** `GameScene.swift`：`SuperSpaceMan`\
    \ 主要修改后的 `GameScene`\n\n## 向 `SKNode` 添加碰撞检测\n\n目前，游戏拥有一个响应重力和冲量的`playerNode`；现在是时候添加另一个玩家可以交互的节点了。在本节中，你将在游戏中添加另一个代表宝珠的精灵。你将首先添加宝珠并将其定位在玩家上方。之后，你将修改宝珠的属性，使玩家和宝珠在游戏中自然交互。最后，你将添加检测玩家与宝珠碰撞的代码，并在它们碰撞时将宝珠从场景中移除。"
  raw: 'At this point you have your player responding to the physical properties of
    your game world, and you’ve also adjusted the gravitational forces that pull the
    player off the bottom of the visible scene. This is great, but watching your character
    fall of the screen is not going to be a whole lot of fun. It’s now time to apply
    some forces to the player to allow him to fight gravity and stay in the visible
    scene. The two most common methods of changing the velocity of an SKPhysicsBody
    are applying a force and applying an impulse. When applying a force to an SKPhysicsBody,
    you apply the force for a length of time based on the amount of time that passes
    between invocations of the rendering loop. Forces are generally used for continuous
    velocity changes. You apply forces using the SKPhysicsBody’s applyForce() method
    . When you apply an impulse to an SKPhysicsBody, you’re applying an instantaneous
    change to the body’s velocity that is independent of the amount of simulation
    time that has passed. Impulses are used when you need to apply an immediate change
    to a node’s velocity. You apply impulses using the SKPhysicsBody’s applyImpulse()
    method . The game is going to use impulses to modify the player’s velocity and
    will therefore use the applyImpulse() method. Before you can apply an impulse
    to the player’s physics body, you need to give the user the ability to tell the
    game when to apply the impulse. Because SKNode extends UIResponder and SKScene
    is an SKNode, you can test for touches in the scene by overriding the GameScene’s
    UIResponder.touchesBegan() method. To do this, you need to complete two steps.
    First, add the following line of code that turns on user interaction in the scene
    immediately before the line of code that creates your backgroundNode : isUserInteractionEnabled
    = true Then override the UIResponder.touchesBegan() by adding the following method
    to the GameScene class: override func touchesBegan(_ touches: Set<UITouch>, with
    event: UIEvent?) {     playerNode.physicsBody?.applyImpulse(CGVector(dx: 0.0,dy:  40.0))
    } Add this method to the bottom of the GameScene class definition and rerun the
    SuperSpaceMan application . While the application is running, tap the screen as
    many times as you need to get the player to fly back into the scene. The number
    of taps it takes will depend on how far the playerNode fell out of the scene.
    After playing around with the touch responder, take a look at the single line
    of code in the touchesBegan() method . This line applies an impulse to the playerNode’s
    physics body every time you tap the screen. The direction and strength of the
    impulse depend on the vector you pass to the applyImpulse() method . In this case,
    you’re creating a vector with an x-value of 0.0 (because you want to apply the
    impulse only linearly along the y-axis) and a y-value of 40.0, which results in
    a pulse that springs the player in the opposite direction of gravity. Before moving
    on, play around with the y-value used to create this vector. It will help you
    understand how this value affects the size of the pulse. When you’re finished,
    put the y-value back to 40.0 and let’s move on. Once you have the player visible
    in the scene, tap the screen until the player is at the top of the visible scene
    and watch him fall. One thing to note about the way the playerNode descends is
    that the player falls as if it has no surface area to dampen its velocity. That
    doesn’t look quite right. To fix this problem, SpriteKit’s SKPhysicsBody provides
    a linearDamping property . This property, which has a default of 0.1, is used
    to reduce a physics body’s linear velocity to simulate fluid or air friction .
    In this case, you are simulating air friction. To see how you can use this property,
    add the following line of code immediately after the positioning of the playerNode
    and run the application again: playerNode.physicsBody?.linearDamping = 1.0 Now
    tap the screen until the player reaches the top of the screen and let it fall
    once more. This time, the playerNode will fall more slowly, simulating the resistance
    of falling through air. Before moving on to the collision-detection section of
    this chapter, make sure your modified GameScene.swift file looks like Listing
    [3-1](#A330720_2_En_3_Chapter.html#Par35). import SpriteKit class GameScene: SKScene
    {     let backgroundNode = SKSpriteNode(imageNamed: "Background")     let playerNode
    = SKSpriteNode(imageNamed: "Player")     required init?(coder aDecoder: NSCoder)
    {         super.init(coder: aDecoder)     }     override init(size: CGSize) {
            super.init(size: size)         physicsWorld.gravity = CGVector(dx: 0.0,
    dy: -2.0);         backgroundColor = SKColor(red: 0.0, green: 0.0, blue: 0.0,
    alpha: 1.0)         isUserInteractionEnabled = true         // adding the background
            backgroundNode.size.width = frame.size.width         backgroundNode.anchorPoint
    = CGPoint(x: 0.5, y: 0.0)         backgroundNode.position = CGPoint(x: size.width
    / 2.0, y: 0.0)         addChild(backgroundNode)                 // add the player
            playerNode.physicsBody = SKPhysicsBody(circleOfRadius: playerNode.size.width
    / 2)         playerNode.physicsBody?.isDynamic = true         playerNode.position
    = CGPoint(x: size.width / 2.0, y: 80.0)         playerNode.physicsBody?.linearDamping
    = 1.0         addChild(playerNode!)     }     override func touchesBegan(_ touches:
    Set<UITouch>, with event: UIEvent?) {         playerNode.physicsBody?.applyImpulse(CGVector(dx:
    0.0, dy: 40.0))     } } Listing 3-1. GameScene.swift: The SuperSpaceMan Main Modified
    GameScene


    ## Adding Collision Detection to Your SKNode


    At this point, the game has a playerNode that responds to gravity and impulses;
    it’s now time to add another node that your player can interact with. In this
    section, you’re going to add another sprite that represents an orb in your game.
    You will begin by adding the orb and positioning it above the player. After that,
    you will modify the orb’s properties so the player and orb interact naturally
    in the game. Finally, you will add code that will detect collisions between the
    player and the orb and remove the orb from the scene when they collide.'
