            physicsBody = SKPhysicsBody(circleOfRadius: size.width / 2)         physicsBody?.isDynamic
    = false         physicsBody?.categoryBitMask = CollisionCategoryBlackHoles         physicsBody?.collisionBitMask
    = 0         name = "BLACK_HOLE"         run(rotateAction)     } } Listing 9-4.
    BlackHole.swift: The New BlackHole Class Once you have the new BlackHole class
