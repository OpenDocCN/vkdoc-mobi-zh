    \n## Summary\n\nIn this chapter, you learned more about how SceneKit uses the\
    \ tried-and-true scene graph to render objects. You also dove into the primitive\
    \ objects that are provided to you in the SceneKit library. You’ll expand on these\
    \ primitives to create a simple yet interesting game as you progress through the\
    \ book. In Chapter [12](#A330720_2_En_12_Chapter.html), you’ll learn how to manipulate\
    \ the camera, which allows you to manipulate the point of view of the user. Another\
    \ important aspect you’ll examine closer is how lighting and materials can totally\
    \ change the look and feel of your game.© James Goodwill and Wesley Matlock 2017\
    \ James Goodwill and Wesley Matlock Beginning Swift Games Development for iOS10.1007/978-1-4842-2310-9_12\n\
    \n# 12. Lighting, Camera, and Material Effects in SceneKit\n\nJames Goodwill (1)\
    \ and Wesley Matlock (2) (1) Highlands Ranch, Colorado, USA (2) Kansas City, Missouri,\
