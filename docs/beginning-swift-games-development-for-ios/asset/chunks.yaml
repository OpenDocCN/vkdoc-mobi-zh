  trans: "\n现在你已经实现了计分功能，是时候让玩家知道他们还剩多少次冲刺次数，之后便会耗尽并开始坠落。这跟之前添加分数标签的方法很相似。最大的区别在于，你要将冲刺次数标签对齐在场景的左上角。\n\
    \n首先，你需要在`GameScene`的声明部分添加一个常量来保存冲刺次数标签。这行代码如下所示：\n\n`let impulseTextNode = SKLabelNode(fontNamed:\
    \ \"Copperplate\")`\n\n将这一行直接添加到`scoreTextNode`常量的定义之后。\n\n接下来，修改`impulseTextNode`的属性。实现此操作的代码如下所示：\n\
    \n```\nimpulseTextNode.text = \"IMPULSES : \\(impulseCount)\"\nimpulseTextNode.fontSize\
    \ = 20\nimpulseTextNode.fontColor = SKColor.white\nimpulseTextNode.position =\
    \ CGPoint(x: 10.0, y: size.height - 20)\nimpulseTextNode.horizontalAlignmentMode\
    \ = SKLabelHorizontalAlignmentMode.left\naddChild(impulseTextNode)\n```\n\n这些代码你之前都见过。这段代码将节点的文本设置为\
    \ \"IMPULSES :\" 加上实例变量`impulseCount`中当前存储的值。然后它将字体大小设为 20，颜色设为白色。之后，它将标签节点的位置设置为距离场景左侧\
    \ 10 点、距离场景顶部 20 点。最后一个属性更改是将`horizontalAlignmentMode`设为`SKLabelHorizontalAlignmentMode.left`，这样文本的左侧就会锚定在节点的原点。之后，`impulseTextNode`就被添加到了场景中。\n\
    \n将这段代码添加到`GameScene`的`init(size: CGSize)`方法的底部，然后保存你的工作。\n\n你还需要进行两项更改来更新显示的冲刺次数。第一项是修改`impulseTextNode`中的文本，以反映玩家每次收集能量球的情况；第二项是每次玩家使用一次冲刺时，修改`impulseTextNode`。\n\
    \n首先从增加冲刺次数开始，你需要再次修改`didBegin(_ contact: SKPhysicsContact)`方法。具体来说，你需要修改处理与能量球节点接触的`if`语句。请看下面的代码片段：\n\
    \n```\nif nodeB.name == \"POWER_UP_ORB\"  {\n    impulseCount += 1\n    impulseTextNode.text\
    \ = \"IMPULSES : \\(impulseCount)\"\n    score += 1\n    scoreTextNode.text =\
    \ \"SCORE : \\(score)\"\n    nodeB.removeFromParent()\n}\n```\n\n除了冲刺次数递增后的那一行之外，其他所有内容都与上一节相同。这一行将`impulseTextNode`的文本设置为\
    \ \"IMPULSES :\" 加上刚刚在上一行递增后的`impulseCount`变量的值。对`if`语句进行这些修改并保存更改。\n\n为了显示当前冲刺次数，你需要做的最后一项更改是每次玩家使用一次冲刺时修改`impulseTextNode`。为此，你需要回到`GameScene`的`touchesBegan()`方法，将向`playerNode`施加冲量的`if`语句修改为如下所示：\n\
    \n```\nif impulseCount > 0 {\n    playerNode.physicsBody?.applyImpulse(CGVector\
    \ (dx: 0.0, dy: 40.0))\n    impulseCount -= 1\n    impulseTextNode.text = \"IMPULSES\
    \ : \\(impulseCount)\"\n    engineExhaust!.isHidden = false\n    Timer.scheduledTimer(timeInterval:\
    \ 0.5, target: self,\n        selector:#selector(GameScene.hideEngineExhaust(_:))\
    \ , userInfo: nil, repeats: false)\n}\n```\n\n这个`if`语句的主体只有一处更改，那就是在`impulseCount`实例变量递减之后的那一行。在这一行中，`impulseTextNode`的`text`属性被修改，就像你之前做的那样，但这一次文本节点会被设置为\
    \ \"IMPULSES :\" 加上刚刚递减后的`impulseCount`。\n\n看完这段代码后，保存更改并再次运行游戏。现在你会看到左上角新增了冲刺次数标签，如图\
    \ 7-9 所示。\n\n![A330720_2_En_7_Fig9_HTML.jpg](img/A330720_2_En_7_Fig9_HTML.jpg)\n\
    \n**图 7-9.** 带有冲刺次数标签的 GameScene\n\n继续操作，轻点屏幕几次。注意冲刺次数标签节点如何在你每次轻点屏幕时减少，以及在你每次与能量球节点接触时增加。\n\
    \n## 为游戏添加简单音效\n\n在进入下一章之前，还有一件事需要介绍。我们相信你已经注意到，这个游戏没有声音——太无聊了。在本节中，你将重新学习`SKAction`，以便添加在每次收集到能量球节点时播放音效的功能。\n\
    \n你将用于创建播放音效动作的`SKAction`方法是`playSoundFileNamed()`方法。它的签名如下所示：\n\n```\nclass func\
    \ playSoundFileNamed(soundFile: String,\n                              waitForCompletion\
    \ wait: Bool) -> SKAction\n```\n\n这个方法接受你应用程序包中的音频文件名和一个`Bool`值，该值指示你是否希望等待音效播放完毕再执行下一行代码。传递给这个方法的文件可以是以下任意格式及更多：MP3、M4A、CAF、WAV。\n\
    \n该方法的使用示例如下两行代码所示：\n\n```\nlet playSoundAction = SKAction.playSoundFileNamed(\"\
    sound.wav\",\n                                               waitForCompletion:\
    \ false)\nrunAction(playSoundAction)\n```\n\n这两行代码会创建一个`SKAction`，它将播放`sound.wav`文件，并在音效播放完毕前继续执行后续代码。\n\
    \n让我们为 SuperSpaceMan 游戏添加一些音效。在进行下一步之前，找到你在第 1 章下载的 zip 文件。这个文件包含了你需要的所有图片，此外还有一个名为`sounds`的文件夹。在这个目录中，你会找到一个名为`orb_pop.wav`的文件。将此文件复制到你项目的\
    \ SuperSpaceMan 文件夹中。\n\n将音效文件添加到项目后，第一步是创建将播放该音效的`SKAction`。以下代码实现了这一点：\n\n```\n\
    let orbPopAction = SKAction.playSoundFileNamed(\"orb_pop.wav\",\n            \
    \                                   waitForCompletion: false)\n```\n\n这段代码创建了一个名为`orbPopAction`的常量，它持有一个`SKAction`，当该动作运行时将播放`orb_pop.wav`音效文件。将这行代码添加到`GameScene`的声明部分，紧接在第一个`init()`方法之前：\n\
    \n```\nlet orbPopAction = SKAction.playSoundFileNamed(\"orb_pop.wav\",\n     \
    \   waitForCompletion: false)\nrequired init?(coder aDecoder: NSCoder) {\n   \
    \ super.init(coder: aDecoder)\n}\n```\n\n现在你已经有了一个能播放`orb_pop.wav`文件的动作。接下来需要添加代码来播放音效。为此，你需要再次修改`didBegin(_\
    \ contact: SKPhysicsContact)`方法，添加运行新动作的代码。请看修改后的处理能量球接触的`if`语句，如下所示：\n\n```\n\
    if nodeB.name == \"POWER_UP_ORB\" {\n     run(orbPopAction)\n    impulseCount\
    \ += 1\n    impulseTextNode.text = \"IMPULSES : \\(impulseCount)\"\n    score\
    \ += 1\n    scoreTextNode.text = \"SCORE : \\(score)\"\n    nodeB.removeFromParent()\n\
    }\n```\n\n在这里你可以看到`if`语句的开头新增了一行，每当被接触的节点名称为`POWER_UP_ORB`时，便会运行`orbPopAction`。对`if`语句进行此更改，然后再次运行游戏。现在，每次`playerNode`与能量球节点接触时，都会播放`orb_pop.wav`音效。\n"
- fmt: "# Summary\n\nIn this chapter, you saw how you can use `SKLabelNodes` to add\
    \ labels to your SpriteKit games. Specifically, you saw how you can display the\
    \ remaining number of impulses and how to add scoring to the game to keep up with\
    \ the number of orbs the spaceman has collected. At the end of the chapter, you\
    \ got a chance to revisit `SKActions` when you added sound to the game. In the\
    \ next chapter, you’ll get a chance to add new scenes to the game and do some\
    \ scene transitions when you add menuing and the ability to start a new game.\n\
    \n© James Goodwill and Wesley Matlock 2017 James Goodwill and Wesley Matlock \
    \ \n*Beginning Swift Games Development for iOS*  \n10.1007/978-1-4842-2310-9_8\n\
    \n# 8. Transitioning Between Scenes\n\nJames Goodwill¹ and Wesley Matlock²  \n\
    (1) Highlands Ranch, Colorado, USA  \n(2) Kansas City, Missouri, USA  \n\nIn this\
    \ chapter you’ll learn how to implement scene transitions using SpriteKit’s `SKTransition`\
    \ class. You’ll get a look at some of the different types of built-in transitions\
    \ SpriteKit makes available to you. And you’ll see how you can control each scene\
    \ during a transition. At the end of the chapter, you’ll take your newfound knowledge\
    \ and add a menu scene to your SuperSpaceMan game. As you already know, `SKScenes`\
    \ are the components you use to present game content to users, and a well-designed\
    \ game will group related content into individual scenes. For example, you could\
    \ use different scenes to present different levels of a game, or you could use\
    \ a scene to present a menu of options to a player. To provide smooth transitions\
    \ between scenes, SpriteKit provides the `SKTransition` class. Using `SKTransitions`\
    \ is accomplished using three steps:\n\n1. Create the `SKScene` you want to transition\
    \ into.\n2. Use one of the class-level `SKTransition` methods to create the transition\
    \ you want to use.\n3. Use the `SKView`'s `presentScene()` method to present the\
    \ new scene.\n\nYou can create your own custom transitions using the `SKTransition`'s\
    \ `init()` method, but it’s more common to use one of the 13 built-in class-level\
    \ `SKTransition` methods:\n\n```\nclass func crossFade(withDuration: TimeInterval)\n\
    class func doorsCloseHorizontal(withDuration: TimeInterval)\nclass func doorsCloseVertical(withDuration:\
    \ TimeInterval)\nclass func doorsOpenHorizontal(withDuration: TimeInterval)\n\
    class func doorsOpenVertical(withDuration: TimeInterval)\nclass func doorway(withDuration:\
    \ TimeInterval)\nclass func fade(with: UIColor, duration: TimeInterval)\nclass\
    \ func fade(withDuration: TimeInterval)\nclass func flipHorizontal(withDuration:\
    \ TimeInterval)\nclass func flipVertical(withDuration: TimeInterval)\nclass func\
    \ moveIn(with: SKTransitionDirection, duration: TimeInterval)\nclass func push(with:\
    \ SKTransitionDirection, duration: TimeInterval)\nclass func reveal(with: SKTransitionDirection,\
    \ duration: TimeInterval)\n```\n\nAs you can see, SpriteKit provides a pretty\
    \ complete set of built-in transitions. An example use of one of these transitions\
    \ is shown in the following snippet:\n\n```\nlet transition = SKTransition.fade(withDuration:\
    \ 2.0)\nlet sceneTwo = SceneTwo(size: size)\nview?.presentScene(sceneTwo, transition:\
    \ transition)\n```\n\nTake a look at this code. The first line of this snippet\
    \ creates a transition that will fade to black and then fade to a new scene over\
    \ a two-second duration. The second line creates the scene you will be transitioning\
    \ into, and the final line actually presents the scene using the transition.\n\
    \n## Pausing Scenes During a Transition\n\nYou should be aware of two important\
    \ `SKTransition` properties when transitioning between scenes: `pausesIncomingScene`\
    \ and `pausesOutgoingScene`. These properties are `Bool` properties used to pause\
    \ the animation of the incoming and outgoing scenes, respectively. If you want\
    \ a scene’s animations to continue during scene transitions, you just set the\
    \ appropriate property to `false` before you present the scene. The default value\
    \ for both properties is `true`.\n\n## Detecting When a New Scene Is Presented\n\
    \nSpriteKit provides two methods in the `SKScene` class that you can override\
    \ to detect when a scene is being transitioned away from or transitioned into.\
    \ The first method is the `SKScene` `willMove()` method. This method is called\
    \ on an `SKScene` when it is about to be removed from a view. To override this\
    \ method, you add the following code to your `SKScene` implementation:\n\n```\n\
    override func willMove(from: SKView) {\n    // insert code\n}\n```\n\nThe second\
    \ method is the `SKScene` `didMove()` method. This method is called when the scene\
    \ has just finished being presented by a view. To override this method, you add\
    \ the following code to your `SKScene` implementation:\n\n```\noverride func didMove(to:\
    \ SKView) {\n    // insert code\n}\n```\n\n## Adding a New Scene to SuperSpaceMan\n\
    \nIn this section, you will use your newfound knowledge of scene transitions and\
    \ add a new scene to the SuperSpaceMan game. The purpose of this scene will be\
    \ to allow the user to see the score of their most recent game and let them start\
    \ a new game. Before you do anything, let’s add a simple message that tells the\
    \ game player to tap the screen to start the game. As you know, the game already\
    \ starts when you tap the screen. This label is just nice to have to start tidying\
    \ up the user interface.\n\nTo add this label, go to the `GameScene`'s declaration\
    \ section and add the following line of code directly before the first `init()`\
    \ method:\n\n```\nlet startGameTextNode = SKLabelNode(fontNamed: \"Copperplate\"\
    )\n```\n\nAfter you’ve added this line, go to the bottom of the `GameScene`'s\
    \ `init(size: CGSize)` method and add the following block of code to the bottom\
    \ of this method:\n\n```\nstartGameTextNode.text = \"TAP ANYWHERE TO START!\"\n\
    startGameTextNode.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.center\n\
    startGameTextNode.verticalAlignmentMode = SKLabelVerticalAlignmentMode.center\n\
    startGameTextNode.fontSize = 20\nstartGameTextNode.fontColor = SKColor.white\n\
    startGameTextNode.position =\n    CGPoint(x: scene!.size.width / 2, y: scene!.size.height\
    \ / 2)\naddChild(startGameTextNode)\n```\n\nNote that you saw code similar to\
    \ this in Chapter 7. Once you look at the changes, run the game again. You’ll\
    \ now see a new label of “TAP ANYWHERE TO START!” in white letters at the center\
    \ of the scene, as shown in Figure 8-1.\n\n![A330720_2_En_8_Fig1_HTML.jpg](OEBPS/A330720_2_En_8_Fig1_HTML.jpg)\
    \  \n**Figure 8-1.** The `GameScene` with the “TAP ANYWHERE TO START!” `SKLabelNode`\n\
    \nBefore moving on, do one more thing: add the code to remove the `startGameTextNode`\
    \ label from the scene when the screen is tapped. You can do this by adding the\
    \ following line to the first `if` statement in the `touchedBegan()` method:\n\
    \n```\nstartGameTextNode.removeFromParent()\n```\n\n## Ending the Game\n\nNow\
    \ it’s time to add the code that will determine when the SuperSpaceMan game ends.\
    \ There are really only two ways the game ends; either the player dodges all the\
    \ black holes and collects orbs until he reaches the top of the scene and wins\
    \ or he falls off the bottom of the scene and loses. The easiest place to check\
    \ the player’s position as it updates is in the `GameScene`'s `update()` method.\
    \ Let’s go back to that method and add the necessary code to do this. Currently,\
    \ the `update()` method has a simple `if` statement that moves the foreground\
    \ and background nodes according to the `playerNode`'s position as long as the\
    \ `playerNode`'s y-position is greater than or equal to 180.0. This means the\
    \ `playerNode` could leave the `backgroundNodes` behind and fly off into the black\
    \ of space. We really don’t like the way that looks. To stop this from happening,\
    \ modify the current `if` statement to look like the following:\n\n```\nif playerNode.position.y\
    \ >= 180.0 &&\n   playerNode.position.y < 6400.0 {\n```\n\nSave this change and\
    \ run the game again. Try making it to the top of the game and see what happens.\
    \ This time, when you reach the top of the scene, the background and foreground\
    \ will stop moving, and the `playerNode` will continue out of the viewport. This\
    \ is a little better."
  raw: '## Summary


    In this chapter, you saw how you can use SKLabelNodes to add labels to your SpriteKit
    games. Specifically, you saw how you can display the remaining number of impulses
    and how to add scoring to the game to keep up with the number of orbs the spaceman
    has collected. At the end of the chapter, you got a chance to revisit SKActions
    when you added sound to the game. In the next chapter, you’ll get a chance to
    add new scenes to the game and do some scene transitions when you add menuing
    and the ability to start a new game.© James Goodwill and Wesley Matlock 2017 James Goodwill
    and Wesley MatlockBeginning Swift Games Development for iOS10.1007/978-1-4842-2310-9_8


    # 8. Transitioning Between Scenes


    James Goodwill^(1 ) and Wesley Matlock² (1) Highlands Ranch, Colorado, USA (2)
    Kansas City, Missouri, USA   In this chapter you’ll learn how to implement scene
    transitions using SpriteKit’s SKTransition class. You’ll get a look at some of
    the different types of built-in transitions SpriteKit makes available to you.
    And you’ll see how you can control each scene during a transition. At the end
    of the chapter, you’ll take your newfound knowledge and add a menu scene to your
    SuperSpaceMan game . As you already know, SKScenes are the components you use
    to present game content to users, and a well-designed game will group related
    content into individual scenes. For example, you could use different scenes to
    present different levels of a game, or you could use a scene to present a menu
    of options to a player. To provide smooth transitions between scenes, SpriteKit
    provides the SKTransition class. Using SKTransitions is accomplished using three
    steps:


    1.  1. Create the SKScene you want to transition into.  

    2.  2. Use one of the class-level SKTransition methods to create the transition
    you want to use.  

    3.  3. Use the SKView’s presentScene() method to present the new scene.  


    You can create your own custom transitions using the SKTransition’s init() method
    , but it’s more common to use one of the 13 built-in class-level SKTransition
    methods: class func crossFade(withDuration: TimeInterval) class func doorsCloseHorizontal(withDuration:
    TimeInterval) class func doorsCloseVertical(withDuration: TimeInterval) class
    func doorsOpenHorizontal(withDuration: TimeInterval) class func doorsOpenVertical(withDuration:
    TimeInterval) class func doorway(withDuration: TimeInterval) class func fade(with:
    UIColor, duration: TimeInterval) class func fade(withDuration: TimeInterval) class
    func flipHorizontal(withDuration: TimeInterval) class func flipVertical(withDuration:
    TimeInterval) class func moveIn(with: SKTransitionDirection, duration: TimeInterval)
    class func push(with: SKTransitionDirection, duration: TimeInterval) class func
    reveal(with: SKTransitionDirection, duration: TimeInterval) As you can see, SpriteKit
    provides a pretty complete set of built-in transitions. An example use of one
    of these transitions is shown in the following snippet: let transition = SKTransition.fade(withDuration:
    2.0) let sceneTwo = SceneTwo(size: size) view?.presentScene(sceneTwo, transition:
    transition) Take a look at this code . The first line of this snippet creates
    a transition that will fade to black and then fade to a new scene over a two-second
    duration. The second line creates the scene you will be transitioning into, and
    the final line actually presents the scene using the transition.


    ## Pausing Scenes During a Transition


    You should be aware of two important SKTransition properties when transitioning
    between scenes: pausesIncomingScene and pausesOutgoingScene. These properties
    are Bool properties used to pause the animation of the incoming and outgoing scenes,
    respectively. If you want a scene’s animations to continue during scene transitions,
    you just set the appropriate property to false before you present the scene. The
    default value for both properties is true.


    ## Detecting When a New Scene Is Presented


    SpriteKit provides two methods in the SKScene class that you can override to detect
    when a scene is being transitioned away from or transitioned into. The first method
    is the SKScene willMove () method . This method is called on an SKScene when it
    is about to be removed from a view. To override this method, you add the following
    code to your SKScene implementation: override func willMove(from: SKView) {     //
    insert code } The second method is the SKScene didMove () method . This method
    is called when the scene has just finished being presented by a view. To override
    this method, you add the following code to your SKScene implementation: override
    func didMove(to: SKView) {     // insert code }


    ## Adding a New Scene to SuperSpaceMan


    In this section, you will use your newfound knowledge of scene transitions and
    add a new scene to the SuperSpaceMan game . The purpose of this scene will be
    to allow the user to see the score of their most recent game and let them start
    a new game. Before you do anything, let’s add a simple message that tells the
    game player to tap the screen to start the game. As you know, the game already
    starts when you tap the screen. This label is just nice to have to start tidying
    up the user interface. To add this label, go to the GameScene’s declaration section
    and add the following line of code directly before the first init() method: let
    startGameTextNode = SKLabelNode(fontNamed: "Copperplate") After you’ve added this
    line, go to the bottom of the GameScene’s init(size: CGSize) method and add the
    following block of code to the bottom of this method: startGameTextNode.text =
    "TAP ANYWHERE TO START!" startGameTextNode.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.center
    startGameTextNode.verticalAlignmentMode = SKLabelVerticalAlignmentMode.center
    startGameTextNode.fontSize = 20 startGameTextNode.fontColor = SKColor.white startGameTextNode.position
    =     CGPoint(x: scene!.size.width / 2, y: scene!.size.height / 2) addChild(startGameTextNode)
    Note that you saw code similar to this in Chapter [7](#A330720_2_En_7_Chapter.html).
    Once you look at the changes, run the game again. You’ll now see a new label of
    “TAP ANYWHERE TO START!” in white letters at the center of the scene, as shown
    in Figure [8-1](#A330720_2_En_8_Chapter.html#Fig1). ![A330720_2_En_8_Fig1_HTML.jpg](OEBPS/A330720_2_En_8_Fig1_HTML.jpg)
    Figure 8-1. The GameScene with the “TAP ANYWHERE TO START!” SKLabelNode Before
    moving on , do one more thing: add the code to remove the startGameTextNode label
    from the scene when the screen is tapped. You can do this by adding the following
    line to the first if statement in the touchedBegan() method : startGameTextNode.removeFromParent()


    ## Ending the Game


    Now it’s time to add the code that will determine when the SuperSpaceMan game
    ends. There are really only two ways the game ends; either the player dodges all
    the black holes and collects orbs until he reaches the top of the scene and wins
    or he falls off the bottom of the scene and loses. The easiest place to check
    the player’s position as it updates is in the GameScene’s update() method. Let’s
    go back to that method and add the necessary code to do this. Currently, the update()
    method has a simple if statement that moves the foreground and background nodes
    according to the playerNode’s position as long as the playerNode’s y-position
    is greater than or equal to 180.0\. This means the playerNode could leave the
    backgroundNodes behind and fly off into the black of space. We really don’t like
    the way that looks. To stop this from happening, modify the current if statement
    to look like the following: if playerNode.position.y >= 180.0 &&    playerNode.position.y
    < 6400.0 { Save this change and run the game again. Try making it to the top of
    the game and see what happens. This time, when you reach the top of the scene,
    the background and foreground will stop moving, and the playerNode will continue
    out of the viewport. This is a little better.'
  trans: "\n# 总结\n\n在本章中，你学习了如何使用`SKLabelNodes`为你的 SpriteKit 游戏添加标签。具体来说，你了解了如何显示剩余脉冲次数，以及如何为游戏添加计分功能，以跟踪太空人收集的能量球数量。在本章末尾，你还有机会在游戏添加音效时重新学习了`SKActions`。在下一章中，你将有机会为游戏添加新场景，并在添加菜单功能和开始新游戏的能力时进行场景切换。\n\
    \n© James Goodwill 和 Wesley Matlock 2017 James Goodwill 和 Wesley Matlock  \n*Beginning\
    \ Swift Games Development for iOS*  \n10.1007/978-1-4842-2310-9_8\n\n# 8. 场景之间的切换\n\
    \nJames Goodwill¹ 和 Wesley Matlock²  \n(1) 美国科罗拉多州海兰兹牧场  \n(2) 美国密苏里州堪萨斯城  \n\n\
    在本章中，你将学习如何使用 SpriteKit 的 `SKTransition` 类来实现场景切换。你将了解 SpriteKit 为你提供的几种不同类型的内置切换。你还将看到如何在切换过程中控制每个场景。在本章末尾，你将运用新学到的知识，为你的\
    \ SuperSpaceMan 游戏添加一个菜单场景。如你所知，`SKScenes` 是用于向用户呈现游戏内容的组件，一个设计良好的游戏会将相关内容分组到各个场景中。例如，你可以使用不同的场景来呈现游戏的不同关卡，或者使用一个场景向玩家展示选项菜单。为了在场景之间提供平滑的切换，SpriteKit\
    \ 提供了 `SKTransition` 类。使用 `SKTransitions` 需要三个步骤：\n\n1. 创建你想要切换到的 `SKScene`。\n\
    2. 使用一个类级别的 `SKTransition` 方法来创建你想要的切换效果。\n3. 使用 `SKView` 的 `presentScene()` 方法来呈现新场景。\n\
    \n你可以使用 `SKTransition` 的 `init()` 方法创建自定义切换，但更常见的是使用 13 种内置的类级别 `SKTransition`\
    \ 方法之一：\n\n```\nclass func crossFade(withDuration: TimeInterval)\nclass func doorsCloseHorizontal(withDuration:\
    \ TimeInterval)\nclass func doorsCloseVertical(withDuration: TimeInterval)\nclass\
    \ func doorsOpenHorizontal(withDuration: TimeInterval)\nclass func doorsOpenVertical(withDuration:\
    \ TimeInterval)\nclass func doorway(withDuration: TimeInterval)\nclass func fade(with:\
    \ UIColor, duration: TimeInterval)\nclass func fade(withDuration: TimeInterval)\n\
    class func flipHorizontal(withDuration: TimeInterval)\nclass func flipVertical(withDuration:\
    \ TimeInterval)\nclass func moveIn(with: SKTransitionDirection, duration: TimeInterval)\n\
    class func push(with: SKTransitionDirection, duration: TimeInterval)\nclass func\
    \ reveal(with: SKTransitionDirection, duration: TimeInterval)\n```\n\n如你所见，SpriteKit\
    \ 提供了一套相当完整的内置切换效果。以下代码片段展示了这些切换的一个使用示例：\n\n```\nlet transition = SKTransition.fade(withDuration:\
    \ 2.0)\nlet sceneTwo = SceneTwo(size: size)\nview?.presentScene(sceneTwo, transition:\
    \ transition)\n```\n\n看看这段代码。片段的第一行创建了一个切换，它会淡出为黑色，然后在两秒内淡入到新场景。第二行创建了你要切换到的场景，最后一行则实际使用该切换呈现了场景。\n\
    \n## 在切换期间暂停场景\n\n在场景之间进行切换时，你需要注意两个重要的 `SKTransition` 属性：`pausesIncomingScene`\
    \ 和 `pausesOutgoingScene`。这些属性是 `Bool` 类型，分别用于暂停进入场景和离开场景的动画。如果你希望场景的动画在切换期间继续运行，只需在呈现场景前将相应的属性设置为\
    \ `false`。这两个属性的默认值都是 `true`。\n\n## 检测新场景何时被呈现\n\nSpriteKit 在 `SKScene` 类中提供了两个你可以重写的方法，用于检测场景何时被切换离开或切换进入。第一个方法是\
    \ `SKScene` 的 `willMove()` 方法。当一个 `SKScene` 即将从视图中被移除时，会调用此方法。要重写此方法，请在你的 `SKScene`\
    \ 实现中添加以下代码：\n\n```\noverride func willMove(from: SKView) {\n    // 插入代码\n}\n\
    ```\n\n第二个方法是 `SKScene` 的 `didMove()` 方法。当一个场景刚刚被视图呈现完成时，会调用此方法。要重写此方法，请在你的 `SKScene`\
    \ 实现中添加以下代码：\n\n```\noverride func didMove(to: SKView) {\n    // 插入代码\n}\n```\n\
    \n## 为 SuperSpaceMan 添加新场景\n\n在本节中，你将运用新学到的场景切换知识，为 SuperSpaceMan 游戏添加一个新场景。此场景的目的是让用户看到最近一局的得分，并让他们能够开始新游戏。在进行任何操作之前，我们先添加一条简单的消息，告诉游戏玩家点击屏幕开始游戏。如你所知，游戏在点击屏幕时已经开始。这个标签只是为了开始整理用户界面而添加的便利功能。\n\
    \n要添加此标签，请转到 `GameScene` 的声明部分，并在第一个 `init()` 方法之前直接添加下面一行代码：\n\n```\nlet startGameTextNode\
    \ = SKLabelNode(fontNamed: \"Copperplate\")\n```\n\n添加完这一行后，转到 `GameScene` 的 `init(size:\
    \ CGSize)` 方法的末尾，并将以下代码块添加到此方法的底部：\n\n```\nstartGameTextNode.text = \"TAP ANYWHERE\
    \ TO START!\"\nstartGameTextNode.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.center\n\
    startGameTextNode.verticalAlignmentMode = SKLabelVerticalAlignmentMode.center\n\
    startGameTextNode.fontSize = 20\nstartGameTextNode.fontColor = SKColor.white\n\
    startGameTextNode.position =\n    CGPoint(x: scene!.size.width / 2, y: scene!.size.height\
    \ / 2)\naddChild(startGameTextNode)\n```\n\n请注意，你在第 7 章中见过类似的代码。查看更改后，再次运行游戏。你现在会看到一个新的白色文字标签“TAP\
    \ ANYWHERE TO START!”，显示在场景中央，如图 8-1 所示。\n\n![A330720_2_En_8_Fig1_HTML.jpg](img/A330720_2_En_8_Fig1_HTML.jpg)\
    \  \n**图 8-1.** 显示“TAP ANYWHERE TO START!” `SKLabelNode` 的 `GameScene`\n\n在继续之前，再做一件事：添加代码，当屏幕被点击时，从场景中移除\
    \ `startGameTextNode` 标签。你可以通过在 `touchedBegan()` 方法的第一个 `if` 语句中添加以下一行代码来实现这一点：\n\
    \n```\nstartGameTextNode.removeFromParent()\n```\n\n## 结束游戏\n\n现在是时候添加用于判断 SuperSpaceMan\
    \ 游戏何时结束的代码了。游戏结束的方式实际上只有两种：要么玩家躲避所有黑洞并收集能量球，直到到达场景顶部获胜；要么玩家从场景底部掉落而失败。在位置更新时检查玩家位置的最简单地方是在\
    \ `GameScene` 的 `update()` 方法中。让我们回到那个方法，并添加必要的代码来实现这一点。目前，`update()` 方法中有一个简单的\
    \ `if` 语句，只要 `playerNode` 的 y 坐标大于或等于 180.0，它就会根据 `playerNode` 的位置移动前景和背景节点。这意味着\
    \ `playerNode` 可能会离开 `backgroundNodes` 并飞入黑暗的太空。我们真的不喜欢这种效果。为了阻止这种情况发生，请修改当前的\
    \ `if` 语句，使其看起来像下面这样：\n\n```\nif playerNode.position.y >= 180.0 &&\n   playerNode.position.y\
    \ < 6400.0 {\n```\n\n保存此更改并再次运行游戏。尝试到达游戏顶部，看看会发生什么。这一次，当你到达场景顶部时，背景和前景将停止移动，而\
    \ `playerNode` 将继续移出视口。这样稍微好一些了。\n"
- fmt: "### Winning the Game\n\nAt this point, you know that the player is about to\
    \ fly off the top of the scene, but you need to test to see when the player actually\
    \ flies off the scene to determine whether he actually wins. To do this, add the\
    \ following `else if` to the current `if` block in the `update()` method:  \n\
    `else if playerNode.position.y > 7000.0 { gameOverWithResult(true) }`  \nThis\
    \ code checks to see whether the `playerNode` has flown more than 7,000 points\
    \ up the scene. If it has, it calls a new instance method `gameOverWithResult()`,\
    \ passing `true` to this method, which indicates that the player won. Make these\
    \ changes, and let’s take a look at the `gameOverWithResult()` method shown here:\n\
    \n```\nfunc gameOverWithResult(_ gameResult: Bool) {\n    playerNode.removeFromParent()\n\
    \    if gameResult {\n        print(\"YOU WON!\")\n    }\n    else {\n       \
    \ print(\"YOU LOSE!\")\n    }\n}\n```\n\nNote that it doesn’t do a whole lot at\
    \ the moment. It first removes the `playerNode` from the scene and then it sets\
    \ `node` to `nil`. After that, it tests the `gameResult` Bool passed to it and\
    \ prints whether the player won the game. Don’t worry too much about this method\
    \ at the moment. You’ll be modifying this code soon enough. For now, add this\
    \ method to the bottom of the `GameScene`, and let’s get to determining whether\
    \ the player lost the game.\n\nNote: Numbers like `6400.0` and `7000.0` may seem\
    \ like crazy numbers when the height of the display is nowhere near either of\
    \ these. Remember, you added the `playerNode` to the `foregroundNode`, and you’ve\
    \ been moving the `foregroundNode` down while the `playerNode`, virtually, continues\
    \ up the scene. This is how the player’s y-position is so much higher than the\
    \ height of the device’s viewport.\n\n### Losing the Game\n\nYou now know when\
    \ the player has won the game. It’s now time to test to see whether the player\
    \ has lost the game. To do that, go back to the `update()` method and add the\
    \ following `else if` to the bottom of the `if` statement (directly following\
    \ the `else if` you just added):  \n`else if playerNode.position.y < 0.0 { gameOverWithResult(false)\
    \ }`  \nThis bit of code is pretty easy to understand. If the `playerNode`’s y-position\
    \ is less than `0.0`, then the player has fallen off the bottom of the scene,\
    \ and the `gameOverWithResult()` method is called with the value `false` being\
    \ passed to it, which indicates that the player has lost the game.\n\nThere’s\
    \ one last thing you need to do before transitioning to a new scene. In the `gameOverWithResult()`\
    \ method, you removed the `playerNode` from the parent and set it to `nil`. That’s\
    \ perfectly fine, but you need to make sure you don’t try to use this property\
    \ without first checking to see whether it’s `nil`. There are only two places\
    \ you currently do this. The first is in the `update()` method with each time\
    \ you’re checking the `playerNode`’s position. To make sure you don’t dereference\
    \ a `nil` `playerNode`, you need to surround the body of the `update()` method\
    \ with an `if`, checking to make sure the `playerNode` property isn’t `nil`. You\
    \ can see this change in the new `update()` method shown here:\n\n```\noverride\
    \ func update(_ currentTime: TimeInterval) {\n    if playerNode.position.y >=\
    \ 180.0 {\n        backgroundNode.position =\n            CGPoint(x: backgroundNode.position.x,\n\
    \                    y: -((playerNode.position.y - 180.0)/8));\n        backgroundStarsNode.position\
    \ =\n            CGPoint(x: backgroundStarsNode.position.x,\n                \
    \    y: -((playerNode.position.y - 180.0)/6));\n        backgroundPlanetNode.position\
    \ =\n            CGPoint(x: backgroundPlanetNode.position.x,\n               \
    \     y: -((playerNode.position.y - 180.0)/8));\n        foregroundNode.position\
    \ =\n            CGPoint(x: foregroundNode.position.x,\n                    y:\
    \ -(playerNode.position.y - 180.0));\n    }\n    else if playerNode.position.y\
    \ > 7000.0 {\n        gameOverWithResult(true)\n    }\n    else if playerNode.position.y\
    \ + playerNode.size.height < 0.0 {\n        gameOverWithResult(false)\n    }\n\
