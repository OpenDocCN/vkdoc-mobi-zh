  trans: "\n# 本书内容概览\n\n在第 1 章中，你将了解什么是 Sprite Kit，以及如何使用 Xcode 创建新的 Sprite Kit 游戏。然后，你将从头开始，着手创建一个\
    \ Sprite Kit 游戏的雏形。你将学习 `SKNode` 及其子类，并使用 `SKSpriteNode` 添加背景节点和玩家节点。在第 2 章中，我们将稍作停顿，让你更深入地了解\
    \ Sprite Kit 场景，包括场景的构建方式以及构建顺序为何会影响你的游戏。本章将以讨论 Sprite Kit 坐标系以及与 `SKNode` 相关的锚点来结束。在第\
    \ 3 章中，你将使用 Sprite Kit 的物理引擎和碰撞检测。本章将从讨论 `SKPhysicsBody`（用于模拟碰撞检测的类）开始。然后，你将在游戏世界中开启重力，并观察它如何影响节点。之后，你将添加一个触摸响应器，将\
    \ `playerNode` 推入空中，最后你将学习如何处理节点碰撞。在第 4 章中，你将开始为游戏添加一些实际功能。首先，你会对当前的 `GameScene`\
    \ 做一些小的改动。之后，你将添加更多的轨道节点以供碰撞。接着，你将向场景中添加滚动功能，使玩家看起来像是在太空中飞行收集球体。最后，你将开始使用手机的加速度计来让玩家沿\
    \ x 轴移动。在第 5 章中，为了增强可玩性，你将最后一次重构轨道节点的布局。之后，你将学习如何使用 `SKAction` 让 `SKSpriteNode`\
    \ 在场景中来回移动，然后让同一个节点无限旋转。本章将以探讨如何使用着色动作给 `SKSpriteNode` 添加色彩效果来结束。在第 6 章中，你将了解如何定义粒子发射器以及如何在\
    \ Sprite Kit 游戏中利用它们。之后，你将学习如何在每次对 `physicsBody` 施加冲量时，使用它们为 `playerNode` 添加引擎尾迹。在第\
    \ 7 章中，你将看到如何使用 `SKLabelNode` 向 Sprite Kit 游戏添加文本。具体来说，你将学习如何添加一个标签来记录太空人剩余的冲量次数，然后你将学习如何为游戏添加计分功能，以记录太空人收集的球体数量。在第\
    \ 8 章中，你将学习如何使用 Sprite Kit 的 `SKTransition` 类实现场景转换。你将了解 Sprite Kit 为你提供的几种不同类型的内置转换。你还将看到如何在转换过程中控制每个场景。在本章末尾，你将运用新学到的知识，为你的\
    \ SuperSpaceMan 游戏添加一个菜单场景。在第 9 章中，你将学习一些 Sprite Kit 的最佳实践；具体来说，你将看到如何创建自己的 `SKSpriteNode`\
    \ 子类，以便更好地重用节点。然后，你将改进游戏，将所有精灵加载到一个单一的纹理图集中，以便在创建所有未来的精灵时引用。之后，你将把部分游戏数据外部化，以便设计师和测试人员可以调整游戏玩法。最后，你将清理节点树中所有已掉落屏幕底部的节点，以此结束本章。在第\
    \ 10 章中，你将了解什么是 Scene Kit，以及如何使用 Xcode 创建新的 Scene Kit 游戏。然后，你将从头开始，着手创建一个 Scene\
    \ Kit 游戏的雏形。你将通过 Scene Kit 入门指南学习 `SCNScene` 和 `SCNode`。在第 11 章中，你将进一步了解场景图和一些\
    \ Scene Kit 的基础知识。你将通过从 Collada 文件中加载太空人来开始创建游戏。你还将学习 Scene Kit 的基本几何体，并将它们添加为太空人需要避开的物体。在第\
    \ 12 章中，你将了解 Scene Kit 如何使用光照以及 Scene Kit 中可用的光照类型。你还将研究材质如何添加到 `SCNNode` 上，以及摄像机如何在场景中使用。在第\
    \ 13 章中，你将学习游戏中物体动画的基础知识。你将看到几种不同的节点动画方式，为你提供多种动画实现方法。完成本章后，你所有的物体都将在场景中移动。在第\
    \ 14 章中，你将学习场景内的碰撞检测。你将学习如何让太空人在场景中移动。一旦太空人开始移动，你将学习如何检测太空人撞到障碍物的情况。在第 15 章中，你将学习如何在\
    \ Scene Kit 场景中使用 Sprite Kit 场景。本章将向你展示如何创建一个屏幕来显示计时器，该计时器将在用户开始游戏时启动。本章还将向你展示如何显示“游戏结束”屏幕，然后重新开始游戏。在第\
    \ 16 章中，你将学习 SceneKit 编辑器的基础知识。本章将使你对如何在编辑器中直观地创建场景和各种节点有一个基本的理解。这不需要编写代码，而是通过拖放节点并使用各种编辑器来操作物体。\n\
