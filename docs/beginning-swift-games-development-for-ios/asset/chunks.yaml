    = 0     lightNode.light!.spotOuterAngle = 50     lightNode.light!.shadowColor
    = UIColor.black     lightNode.light!.zFar = 500     lightNode.light!.zNear = 50
        scene.rootNode.addChildNode(lightNode) } Listing 12-2. setupLighting() Method
    First, you create SCNLight and SCNNode objects. As you can see, you’ll set the
    type of light to the light object. A light type of SCNLightTypeAmbient doesn’t
    need to set a direction, position, attenuation, spotlight angle, or shadows because
    an ambient light is for the entire scene. Don’t forget to call this method in
    the createMainScene() method , similar to setupLighting(mainScene).


    ## Materials


    Now let’s examine how SceneKit manages the visual attributes of your objects.
    SceneKit uses the SCNMaterial class to control the lighting and shading attributes
    for the geometry of your SCNNode. SceneKit provides eight different properties
    you can use to set these attributes:


    *   Diffuse: Diffuse shading is the amount of light and color reflected in all
    directions. ![A330720_2_En_12_Fige_HTML.jpg](OEBPS/A330720_2_En_12_Fige_HTML.jpg)

    *   Ambient: Ambient light is reflected in all points from the surface at a fixed
    intensity and fixed color. If there is no ambient light object in the scene, this
    attribute has no effect on the node. ![A330720_2_En_12_Figf_HTML.jpg](OEBPS/A330720_2_En_12_Figf_HTML.jpg)

    *   Specular : Specular is the light that is reflected straight to the user, similar
    to how a mirror reflects light. This is the bright spot of light that appears
    shiny on an object. This property is defaulted to black, which will cause the
    material to appear dull. ![A330720_2_En_12_Figg_HTML.jpg](OEBPS/A330720_2_En_12_Figg_HTML.jpg)

    *   Normal: Normal lighting is a technique used to create lighting out of the
    surface of the material. Basically it tries to figure out the bumps and dents
    of the material to give more realistic lighting. ![A330720_2_En_12_Figh_HTML.jpg](OEBPS/A330720_2_En_12_Figh_HTML.jpg)

    *   Reflective: Reflective lighting is a mirrored surface from the reflective
    environment. The surface will not actually reflect other objects in the scene.
    ![A330720_2_En_12_Figi_HTML.jpg](OEBPS/A330720_2_En_12_Figi_HTML.jpg)

    *   Emission: Emission is the color that is emitted by the surface. By default,
    this property is set to black, which means no light is reflected. If you provide
    a color, that color will be reflected, and if you really want to get fancy, you
    can provide an image. SceneKit will use this image to provide the “glowing” effect
    based on the material. ![A330720_2_En_12_Figj_HTML.jpg](OEBPS/A330720_2_En_12_Figj_HTML.jpg)

    *   Transparent: Transparent is the opacity of the material. This attribute is
    basically used to make parts of the material invisible. ![A330720_2_En_12_Figk_HTML.jpg](OEBPS/A330720_2_En_12_Figk_HTML.jpg)

    *   Multiply : This attribute is computed after all the other attributes and adds
    a color to the material. ![A330720_2_En_12_Figl_HTML.jpg](OEBPS/A330720_2_En_12_Figl_HTML.jpg)


    ## Applying Materials to Your Obstacles'
  trans: "\n# 点亮场景\n\n随便问一位导演或摄影师，他们都会告诉你，场景中最重要的元素之一就是照明。你很幸运，因为 SceneKit 提供了几种可操控的照明类型，能让你的场景脱颖而出。在\
    \ SceneKit 中，你将使用`SCNLight`对象在场景中创建光源。你需要将光源类型设置为 SceneKit 提供的四种不同光源类型之一。\n\n\
    *   `SCNLightTypeAmbient`：这种光会从所有方向照亮场景；光源的位置或方向对场景照明没有影响。![A330720_2_En_12_Figa_HTML.jpg](img/A330720_2_En_12_Figa_HTML.jpg)\n\
    *   `SCNLightTypeOmni`：这种光会从某个点照亮场景。![A330720_2_En_12_Figb_HTML.jpg](img/A330720_2_En_12_Figb_HTML.jpg)\n\
    *   `SCNLightTypeDirectional`：这种光会从同一方向均匀地照亮场景中所有物体。![A330720_2_En_12_Figc_HTML.jpg](img/A330720_2_En_12_Figc_HTML.jpg)\n\
    *   `SCNLightTypeSpot`：这种光会像摇滚明星一样照亮你的场景！![A330720_2_En_12_Figd_HTML.jpg](img/A330720_2_En_12_Figd_HTML.jpg)\n\
    \n所以，这些就是你在游戏中能够使用的光源类型。请注意，物体的材质会影响其被照亮的方式。此外，你可以完全控制光的颜色。SceneKit 在利用照明更新场景时，确实遵循一些“规则”，以确保场景高效显示：\n\
    \n*   照明只影响场景中移动的物体。\n*   SceneKit 每个节点最多只使用八个光源，因此创建超过这个数量是多余的。实际上，Apple 建议最多使用三个照明效果和一个环境光。\n\
    \n我们相信你已经准备好动手写代码了。对于你的主角，你将创建一个漂亮的环境光和一个聚光灯，这样他就永远不会身处黑暗。为了方便起见，现在你将在`GameViewController`中控制所有照明。如果你没有打开`GameViewController`，请打开它。你需要为聚光灯创建一个新的类变量。在类的顶部，继续创建你的新变量：`var\
    \ spotLight: SCNNode!`。创建好这个变量后，你就可以创建`setupLighting()`方法，如代码清单 12-2 所示。\n\n```\n\
    func setupLighting(scene:SCNScene) {\n    let ambientLight = SCNNode()\n    ambientLight.light\
    \ = SCNLight()\n    ambientLight.light!.type = SCNLight.LightType.ambient\n  \
    \  ambientLight.light!.color = UIColor.white\n    scene.rootNode.addChildNode(ambientLight)\n\
    \n    let lightNode = SCNNode()\n    lightNode.light = SCNLight()\n    lightNode.light!.type\
    \ = SCNLight.LightType.spot\n    lightNode.light!.castsShadow = true\n    lightNode.light!.color\
    \ = UIColor(white: 0.8, alpha: 1.0)\n    lightNode.position = SCNVector3Make(0,\
    \ 80, 30)\n    lightNode.rotation = SCNVector4Make(1, 0, 0, Float(-M_PI/2.8))\n\
    \    lightNode.light!.spotInnerAngle = 0\n    lightNode.light!.spotOuterAngle\
    \ = 50\n    lightNode.light!.shadowColor = UIColor.black\n    lightNode.light!.zFar\
    \ = 500\n    lightNode.light!.zNear = 50\n    scene.rootNode.addChildNode(lightNode)\n\
    }\n```\n\n代码清单 12-2. `setupLighting()` 方法\n\n首先，你创建了`SCNLight`和`SCNNode`对象。如你所见，你将光源类型设置为该光对象。`SCNLightTypeAmbient`类型的光源无需设置方向、位置、衰减、聚光角度或阴影，因为环境光是为整个场景服务的。别忘了在`createMainScene()`方法中调用此方法，类似`setupLighting(mainScene)`这样的形式。\n\
    \n## 材质\n\n现在让我们来看看 SceneKit 如何管理物体的视觉属性。SceneKit 使用`SCNMaterial`类来控制`SCNNode`几何体的照明和着色属性。SceneKit\
    \ 提供了八种不同的属性供你设置这些属性：\n\n*   **漫反射（Diffuse）**：漫反射着色是指向所有方向反射的光量和颜色。![A330720_2_En_12_Fige_HTML.jpg](img/A330720_2_En_12_Fige_HTML.jpg)\n\
    *   **环境光（Ambient）**：环境光以固定的强度和固定的颜色从表面的所有点反射。如果场景中没有环境光对象，该属性对节点没有影响。![A330720_2_En_12_Figf_HTML.jpg](img/A330720_2_En_12_Figf_HTML.jpg)\n\
    *   **高光（Specular）**：高光是直接反射给用户的光，类似于镜子反射光的方式。它是物体上看起来发亮的光斑。此属性默认是黑色，会使材质看起来暗淡无光。![A330720_2_En_12_Figg_HTML.jpg](img/A330720_2_En_12_Figg_HTML.jpg)\n\
    *   **法线（Normal）**：法线照明是一种在材质表面创建光照效果的技术。它基本上试图计算出材质的凹凸纹理，以提供更真实的光照效果。![A330720_2_En_12_Figh_HTML.jpg](img/A330720_2_En_12_Figh_HTML.jpg)\n\
    *   **反射（Reflective）**：反射照明是反射环境中的镜面表面。该表面实际上并不会反射场景中的其他物体。![A330720_2_En_12_Figi_HTML.jpg](img/A330720_2_En_12_Figi_HTML.jpg)\n\
    *   **自发光（Emission）**：自发光是表面发出的颜色。默认情况下，此属性设置为黑色，意味着没有光被反射。如果你提供一种颜色，该颜色就会被反射；如果你想更花哨一点，还可以提供一张图片。SceneKit\
    \ 将根据材质使用这张图片来提供“发光”效果。![A330720_2_En_12_Figj_HTML.jpg](img/A330720_2_En_12_Figj_HTML.jpg)\n\
    *   **透明（Transparent）**：透明是材质的不透明度。该属性主要用于使材质的部分区域不可见。![A330720_2_En_12_Figk_HTML.jpg](img/A330720_2_En_12_Figk_HTML.jpg)\n\
    *   **倍增（Multiply）**：该属性在所有其他属性计算之后计算，为材质添加一种颜色。![A330720_2_En_12_Figl_HTML.jpg](img/A330720_2_En_12_Figl_HTML.jpg)\n\
    \n## 为障碍物应用材质\n"
- fmt: "Now that you have a basic understanding of the attributes to the `SCNMaterial`,\
    \ let’s head over to the `Collectible` class and add some material to your collectibles.\
    \ First, make the `PyramidNode` a nice shade of blue, as in Listing [12-3](#A330720_2_En_12_Chapter.html#Par45).\n\
    \n```\npyramidNode.geometry?.firstMaterial?.diffuse.contents = UIColor.blue\n\
    pyramidNode.geometry?.firstMaterial?.shininess = 1.0\n```\n\n**Listing 12-3.**\
    \ PyramidNode Material\n\nIn this game you’re going to keep it simple and work\
    \ with just one material. SceneKit provides easy access to this via the `firstMaterial`\
    \ object. You set the `diffuse` contents to the color blue. You also want this\
    \ object to be shiny, so go ahead and increase the `shininess` to 1. You can experiment\
    \ with different colors and shininess to see how these attributes affect your\
    \ `PyramidNode`.\n\nNext up is your `SphereNode`. Listing [12-4](#A330720_2_En_12_Chapter.html#Par48)\
    \ shows you how to add some items to make it look more like a miniature Earth.\n\
    \n```\nsphereNode.geometry?.firstMaterial?.diffuse.contents = #imageLiteral(resourceName:\
    \ \"earthDiffuse\")\nsphereNode.geometry?.firstMaterial?.ambient.contents = #imageLiteral(resourceName:\
    \ \"earthAmbient\")\nsphereNode.geometry?.firstMaterial?.specular.contents = #imageLiteral(resourceName:\
    \ \"earthSpecular\")\nsphereNode.geometry?.firstMaterial?.normal.contents = #imageLiteral(resourceName:\
    \ \"earthNormal\")\nsphereNode.geometry?.firstMaterial?.diffuse.mipFilter = SCNFilterMode.linear\n\
    sphereNode.geometry?.firstMaterial?.shininess = 1.0\n```\n\n**Listing 12-4.**\
    \ GlobeNode Lightening Enhancements\n\nWith the `GlobeNode` you’re expanding on\
    \ the `NSMaterial` and creating a more lifelike Earth. If you look at each of\
    \ the JPG files, you’ll see how these files affect the output from SceneKit and\
    \ `NSMaterial`. The latest version of Xcode will allow you to use the image literal\
    \ of the JPG file. So, when you type in this code you won’t need to include the\
    \ `#imageLiteral(resourceName: \"earthSpecular\")`. You’ll simply start typing\
    \ in the name of the image file: `earthSpecular`, for example, and Xcode will\
    \ simply show you the image. Adding in the `mipFilter` to the `diffuse` property\
    \ will allow SceneKit to improve the performance when rendering a texture image\
    \ as a smaller size.\n\nYou’ll now add some materials to the `BoxNode`. SceneKit\
    \ allows you to apply an array to the `materials`, and it will apply this to the\
    \ geometry. With the `BoxNode`, you’ll apply six different materials, so you have\
    \ six different sides, as shown in Listing [12-5](#A330720_2_En_12_Chapter.html#Par51).\n\
    \n```\nvar materials = [SCNMaterial]()\nlet boxImage = \"boxSide\"\nfor index\
    \ in 1...6 {\n    let material = SCNMaterial()\n    material.diffuse.contents\
    \ = UIImage(named: boxImage + String(index))\n    materials.append(material)\n\
    }\nboxNode.geometry?.materials = materials\n```\n\n**Listing 12-5.** BoxNode Materials\n\
    \nFor the other obstacle types, add a color similar to how you did the `PyramidNode`.\
    \ Listing [12-6](#A330720_2_En_12_Chapter.html#Par53) is the rest of the obstacles,\
    \ so feel free to use different colors and images if you happen to have some images\
    \ available.\n\n```\nclass func tubeNode() -> SCNNode {\n    // 1 Creating the\
    \ SCNGeometry type\n    let tube = SCNTube(innerRadius: 8, outerRadius: 10.0,\
    \ height: 10.0)\n    // 2 Create the node using the geometry type\n    let tubeNode\
    \ = SCNNode(geometry: tube)\n    tubeNode.name = \"tube\"\n    //3 Setting the\
    \ node position\n    let position  = SCNVector3(-200, 1.5, 0)\n    tubeNode.position\
    \ = position\n    // 4 Giving the node some color.\n    tubeNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.yellow\n    tubeNode.geometry?.firstMaterial?.shininess = 1.0\n  \
    \  return tubeNode\n}\n\nclass func cylinderNode() -> SCNNode {\n    // 1 Creating\
    \ the SCNGeometry type\n    let cylinder = SCNCylinder(radius: 6, height: 16)\n\
    \    // 2 Create the node using the geometry type\n    let cylinderNode = SCNNode(geometry:\
    \ cylinder)\n    cylinderNode.name = \"cylinder\"\n    //3 Setting the node position\n\
    \    let position = SCNVector3(300, 8, 300)\n    cylinderNode.position = position\n\
    \    // 4 Giving the node some color.\n    cylinderNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.green\n    cylinderNode.geometry?.firstMaterial?.shininess = 0.5\n\
    \    return cylinderNode\n}\n\nclass func torusNode() -> SCNNode {\n    // 1 Creating\
    \ the SCNGeometry type\n    let torus = SCNTorus(ringRadius: 14, pipeRadius: 4)\n\
    \    // 2 Create the node using the geometry type\n    let torusNode = SCNNode(geometry:\
    \ torus)\n    //3 Setting the node position\n    let position =  SCNVector3(-300,\
    \ 3, -300)\n    torusNode.position = position\n    // 4 Giving the node some color.\n\
    \    torusNode.geometry?.firstMaterial?.diffuse.contents = UIColor.orange\n  \
    \  torusNode.geometry?.firstMaterial?.shininess = 1.0\n    return torusNode\n\
    }\n```\n\n**Listing 12-6.** Remaining Obstacle Materials\n\n## Summary\n\nThere\
    \ was a lot in this chapter. You learned that SceneKit provides several different\
    \ types of lighting. Spend some time experimenting with your code base and see\
    \ how subtle changes in lighting can affect the playability of your game. Another\
    \ learning experience was how SceneKit uses materials to make your objects more\
    \ realistic or futuristic. In Chapter [13](#A330720_2_En_13_Chapter.html), you’ll\
    \ examine how SceneKit moves objects around via animations.\n\n© James Goodwill\
    \ and Wesley Matlock 2017  \nJames Goodwill and Wesley Matlock, *Beginning Swift\
    \ Games Development for iOS*  \n10.1007/978-1-4842-2310-9_13\n\n# 13. Render Loop,\
    \ Physics, and Moving Around\n\nJames Goodwill¹ and Wesley Matlock²  \n(1) Highlands\
    \ Ranch, Colorado, USA  \n(2) Kansas City, Missouri, USA\n\nSo far in the game\
    \ you have not moved the hero, and now you need to get him up on his feet and\
    \ moving around. You’re going to keep this simple and use a one-finger touch to\
    \ move forward and two fingers to move back. To move left and right, you’ll use\
    \ the accelerometer. But where in the render loop do you actually put the code\
    \ to move the hero around? Read on.\n\n## What Is the Render Loop?\n\nThe render\
    \ loop is SceneKit’s game loop, and it’s here that the game scene comes alive.\
    \ The render loop happens once for each frame of the game scene that will allow\
    \ you to perform game logic. The render loop has nine sections (see Figure [13-1](#A330720_2_En_13_Chapter.html#Fig1))\
    \ where SceneKit executes certain actions. `SCNSceneRendererDelegate` has five\
    \ delegates where you can customize the game scene programmatically:\n\n1. `renderer(_:updateAtTime)`\
    \ is the first delegate to be called in the render loop. The delegate is where\
    \ you would want to set up any logic that will be needed within the loop.\n2.\
    \ During this phase of the loop, SceneKit runs the actions and animations of the\
    \ nodes in the scene.\n3. `renderer(_:didApplyAnimationsAtTime:)`: After the animations\
    \ have run, this delegate is called by the view.\n4. SceneKit’s next action is\
    \ to apply the physics to the nodes within the scene.\n5. `renderer(_:didSimulatePhysicsAtTime:)`:\
    \ After SceneKit has applied the physics, you have a chance to examine how the\
    \ scene is progressing. This is where we will examine the movement and deal with\
    \ any collisions that have occurred.\n6. SceneKit then evaluates the constraints\
    \ of the view and nodes. These are items you’ll be able to adjust that will allow\
    \ SceneKit to automatically adjust the nodes in the view.\n7. `renderer(_:willRenderScene:atTime:)`:\
    \ After SceneKit has evaluated the constraints and is about to render the scene,\
    \ you have one last-minute delegate to make any adjustments.\n8. The view is rendered\
    \ based on the scene graph.\n9. `renderer(_:willRenderScene:atTime:)`: This is\
    \ the last and final delegate that is called before the loop starts again.\n\n\
    ![A330720_2_En_13_Fig1_HTML.jpg](OEBPS/A330720_2_En_13_Fig1_HTML.jpg)  \n**Figure\
    \ 13-1.** SceneKit render cycle"
