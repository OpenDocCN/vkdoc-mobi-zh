    本章涵盖了大量信息，包括什么是 `SKScene` 以及它们是如何构建的。我们还讨论了 `SKScene` 的渲染循环，以及场景节点树的构建顺序如何影响节点的外观和交互性。在本章末尾，我们探讨了场景的坐标系统和节点锚点。第三章\
    \ 3 将介绍 SpriteKit 的物理引擎和碰撞检测。那一章会非常有趣，你将开始看到你的游戏逐渐变得生动起来。\n\n© James Goodwill\
    \ and Wesley Matlock 2017  \nJames Goodwill 和 Wesley Matlock *Beginning Swift\
    \ Games Development for iOS*  \nDOI: 10.1007/978-1-4842-2310-9_3\n\n# 3. 为游戏添加物理与碰撞检测\n\
    \nJames Goodwill¹ 和 Wesley Matlock²  \n(1) 美国科罗拉多州海兰兹牧场  \n(2) 美国密苏里州堪萨斯城\n\n\
    本章介绍 SpriteKit 的物理引擎和碰撞检测。我们首先讨论 `SKPhysicsBody`——用于模拟碰撞检测的类。然后你将在游戏世界中启用重力，并观察它如何影响节点。之后，你将添加一个触摸响应器来将\
    \ `playerNode` 推向空中。在本章结尾，我会讨论如何处理节点碰撞。\n\n### 什么是 SKPhysicsBody？\n\n为了在 SpriteKit\
    \ 游戏中模拟物理，你需要向场景或节点添加一个物理体。物理体由 SpriteKit 类 `SKPhysicsBody` 实现，它是一个模拟对象，附加到场景节点树中的节点上。`SKPhysicsBody`\
    \ 类使用节点的属性，如 `position` 和 `velocity`，并与其自身属性结合，来模拟物理力是如何作用到模拟游戏世界中的。它在渲染循环的每次迭代中进行计算来执行这些模拟。\n\
    \n有三种类型的物理体：动态体积、静态体积和边缘。\n\n- **动态体积** 是一个具有体积和质量的物理体，会受物理模拟中的碰撞和力的影响。附着有动态体积的节点是游戏中的活跃节点。\n\
    - **静态体积** 物理体与动态体积类似，但力和碰撞对其没有影响。静态体积体通常用作游戏中的屏障。当动态体与静态体碰撞时，动态体会受到碰撞影响，而静态体保持不变。\n\
    - **边缘** 是一种没有体积的静态体。模拟永远不会移动边缘，且边缘的质量不会影响其他节点的模拟。边缘代表场景内的负空间。\n\n### 为游戏世界添加物理\n"
- fmt: '# Understanding Physics Bodies in SpriteKit


    The easiest way to see how all this works is to just do it. Let’s begin by creating
    and associating an `SKPhysicsBody` with the `playerNode`. Add the following lines
    of code to the `GameScene`’s `.init(size: CGSize)` method immediately following
    the construction of the `playerNode`:


    ```

    playerNode.physicsBody = SKPhysicsBody(circleOfRadius: playerNode.size.width /
    2)

    playerNode.physicsBody?.isDynamic = true

    ```


    Take a look at those two lines of code. The first line creates an `SKPhysicsBody`
    passing the initializer a parameter named `circleOfRadius` with a `CGFloat` for
    the value. `SpriteKit` provides a handful of standard shapes for physics bodies,
    including circles (`circleOfRadius`), rectangles (`rectangleOfSize`), and a path-based
    polygon (`polygonFromPath`). The most efficient of these shapes is the circle,
    and the most inefficient is the path-based polygon. Because the circle is the
    most efficient node shape, it will be the shape used for all physics bodies in
    this game.


    The value passed to the constructor, in this instance, is the width of the `playerNode`
    divided by 2. We’re using this value because we want to create a circle around
    the `playerNode` starting from its center with a radius of half the width of the
    node. This will result in a circle that surrounds the `playerNode` completely.
    If there were an `SKPhysicsBody(circleOfDiameter:)` constructor, then we wouldn’t
    need to divide the width by 2, but there is no such constructor.


    Let’s get back to the second line of this snippet. The second line turns the `playerNode`
    into a physics body with a dynamic volume. It will now respond to gravity and
    other physical bodies in the scene. Once you have made these changes, your new
    player setup code should look like the following:


    ```

    // add the player

    playerNode.physicsBody = SKPhysicsBody(circleOfRadius: playerNode?.size.width
    / 2)

    playerNode.physicsBody?.isDynamic = true

    playerNode.position = CGPoint(x: size.width / 2.0, y: 80.0)

    addChild(playerNode)

    ```


    Now, go back to Xcode and run the application once again. If you weren’t paying
    close attention, you would see only the background node of the game. This is because
    the default gravity setting in `SpriteKit` matches the earth’s gravitational forces,
    and the player node is now falling rapidly toward the center of the earth. To
    slow things down, you need to play around with the game world’s gravity settings
    until you have a gravitational force you’re happy with.


    Go back to the `GameScene.init(size: CGSize)` method, add the following line immediately
    following the `super.init(size: size)` invocation, and run the application again:


    ```

    physicsWorld.gravity = CGVector(dx: 0.0, dy: -0.1)

    ```


    Now you will see the player slowly drift off the bottom of the screen. What you
    have done here is modify the world’s gravity using the `SKScene`’s `physicsWorld.gravity`
    property and set it to a value that slows the `playerNode`’s descent considerably.
    Notice the value you set the gravity property to is a vector with a value of `0.0`
    for the x-coordinate and a value of `–0.1` for the y-coordinate. You set the x-coordinate
    to a value of `0.0` because gravity exerts force only along the y-axis. The result
    of this vector is a force that results in a gravitational force pulling toward
    the bottom of the scene.


    Though setting the y-coordinate to `–0.1` helps us see the `playerNode` fall off
    the scene, it’s not practical for game play. A more reasonable value would be
    `–2.0`. Set the gravity property to `CGVector(dx: 0.0, dy: -2.0)` and try running
    it again. You’ll see the player fall off the screen, but at a rate more conducive
    to game play.


    **Note:** In this section you modified the world’s gravity property to a value
    that’s not consistent with the earth’s real gravity. We had you do this because
    rather than trying to match the earth’s gravity, you’re trying to create a simulated
    game world that is fun for your players. You’ll find yourself doing this often
    as you start creating your own games. After all, it’s about your players having
    fun, not matching the real world.


