    the geometry type         let cylinderNode = SCNNode(geometry: cylinder)         cylinderNode.name
    = "cylinder"         //3 Setting the node position         let position = SCNVector3(300,
    8, 300)         cylinderNode.position = position         // 4 Giving the node
    some color.         cylinderNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green
            cylinderNode.geometry?.firstMaterial?.shininess = 0.5         cylinderNode.physicsBody
    = SCNPhysicsBody(type: .static, shape: nil)         return cylinderNode     }
        class func torusNode() -> SCNNode {         // 1 Creating the SCNGeometry
    type         let torus = SCNTorus(ringRadius: 14, pipeRadius: 4)         // 2
    Create the node using the geometry type         let torusNode = SCNNode(geometry:
    torus)         //3 Setting the node position         let position =  SCNVector3(-300,
    3, -300)         torusNode.position = position         // 4 Giving the node some
    color.         torusNode.geometry?.firstMaterial?.diffuse.contents = UIColor.orange
            torusNode.geometry?.firstMaterial?.shininess = 1.0         torusNode.physicsBody
    = SCNPhysicsBody(type: .static, shape: nil)         return torusNode     } } Listing
    14-1. Collectible.swift with the SCNPhysicBody Set for All Objects The next part
    of getting the collision detection working is to create the bit masks that will
    be used to determine when and if an object actually touches another one. Collision
    detection is based on using a bit mask that creates a table in order to determine
    whether two objects should collide. For this you’ll create a new file called SharedConstants.swift
    , and you’ll use this file to create the bit mask variables that will be used
    for all your objects. Listing [14-2](#A330720_2_En_14_Chapter.html#Par18) contains
    the code you need to add to this newly created file: let CollisionCategoryHero
    = 2 let CollisionCategoryCollectibleLowValue = 4 let CollisionCategoryCollectibleMidValue
    = 6 let CollisionCategoryCollectibleHighValue = 8 let CollisionCategoryFloor =
    10 Listing 14-2. SharedConstants.swift Contents for the Bit Mask Now that you
    have the variables that you’ll use for the bit mask, you’ll need to again update
    all your nodes. As mentioned, these variables will be used to create a table to
    determine whether an object should collide with another. SCNPhysicsBody has a
    couple of parameters that you’ll set in order for the collision detection to work.
    The first of the two parameters is the category bitmask: heroNode?.physicsBody?.categoryBitMask
    = CollisionCategoryHero The second parameter to set is the collisionBitMask: heroNode?.physicsBody?.collisionBitMask
    = CollisionCategoryCollectibleLowValue | CollisionCategoryCollectibleMidValue
    | CollisionCategoryCollectibleHighValue Basically, what you’re doing the following:
    this node is the hero, and it will interact with the Collectible nodes of different
    values. Listing [14-3](#A330720_2_En_14_Chapter.html#Par26) shows all the categoryBitMask
    and collisionBitMask values that you have to set on each of the nodes. Make sure
    you do this after the SCNPhysicsBody has been initialized and set on the node.
    It’s also important that you initialize the physicsBody of the SCNode before it’s
    added as a child to your scene. // Add the following line to the GameViewController
    createMainScene() after the physicsBody initialization: heroNode?.physicsBody?.categoryBitMask
    = CollisionCategoryHero heroNode?.physicsBody?.collisionBitMask = CollisionCategoryCollectibleLowValue
    | CollisionCategoryCollectibleMidValue | CollisionCategoryCollectibleHighValue
    //Add the following line to the Collectible pyramidNode() after the physicsBody
    initialization: pyramidNode.physicsBody?.categoryBitMask = CollisionCategoryCollectibleLowValue
    pyramidNode.physicsBody?.collisionBitMask = CollisionCategoryHero //Add the following
    line to the Collectible sphereNode() after the physicsBody initialization: globeNode.physicsBody?.categoryBitMask
    = CollisionCategoryCollectibleHighValue globeNode.physicsBody?.collisionBitMask
    = CollisionCategoryHero //Add the following line to the Collectible boxNode()
    after the physicsBody initialization: boxNode.physicsBody?.categoryBitMask = CollisionCategoryCollectibleMidValue
    boxNode.physicsBody?.collisionBitMask = CollisionCategoryHero //Add the following
    line to the Collectible tubeNode() after the physicsBody initialization: tubeNode.physicsBody?.categoryBitMask
    = CollisionCategoryCollectibleLowValue tubeNode.physicsBody?.collisionBitMask
    = CollisionCategoryHero //Add the following line to the Collectible cylinderNode()
    after the physicsBody initialization: cylinderNode.physicsBody?.categoryBitMask
    = CollisionCategoryCollectibleHighValue cylinderNode.physicsBody?.collisionBitMask
    = CollisionCategoryHero //Add the following line to the Collectible torusNode()
    after the physicsBody initialization: torusNode.physicsBody?.categoryBitMask =
    CollisionCategoryCollectibleMidValue torusNode.physicsBody?.collisionBitMask =
    CollisionCategoryHero Listing 14-3. SCNPhysicsBody categoryBitMask and collisionBitMask
    Now it’s time to check your work. Build and run the game and you should be able
    to move the spaceman around—only this time he can go through the nodes in the
    scene, he can go over some objects, and he is stopped by the walls. Although that’s
    great, you need a way for him to react to these collisions. Because you’re making
    a hide-and-seek game, you’ll want to know when you’ve found the enemy. In finding
    the enemy, you’ll have to catch or collide with him. That’s accomplished by using
    SCNPhysicsContactDelegate. The first thing to do is tell your class that you want
    to receive the SCNPhysicsContactDelegate: class GameViewController: UIViewController,
    SCNSceneRendererDelegate, SCNPhysicsContactDelegate { In conjunction with this,
    you also need to set the delegate to a class that will respond to these collisions.
    In this case, you’ll set the mainScene’s contactDelegate to self so that the GameViewController
    can react to the collisions. In the createMainScene(), add this line before the
    return statement: mainScene?.physicsWorld.contactDelegate = self The SCNPhysicsContactDelegate
    has three protocols you can use, as shown in Listing [14-4](#A330720_2_En_14_Chapter.html#Par34).
    func physicsWorld(_ world: SCNPhysicsWorld, didBegin contact: SCNPhysicsContact)
    {     print("didBeginContact") } func physicsWorld(_ world: SCNPhysicsWorld, didEnd
    contact: SCNPhysicsContact) {     print("didEndContact") } func physicsWorld(_
    world: SCNPhysicsWorld, didUpdate contact: SCNPhysicsContact) {     print("didUpdateContact")
    } Listing 14-4. SCNPhysicsContact Protocols You should add Listing [14-4](#A330720_2_En_14_Chapter.html#Par34)
    to your GameViewController . This time when you run your game, you’ll get the
    notifications when your spaceman moves around and interacts with the environment.
    For this game, though, you’ll be using only the didBeginContact protocol. It will
    be at this time that you check to see whether the contact object has the node
    for the hero and the node for the collectible. To do this, you’ll keep things
    simple and check nodeB for what type of contact was made in Listing [14-5](#A330720_2_En_14_Chapter.html#Par36).
    func physicsWorld(_ world: SCNPhysicsWorld, didBegin contact: SCNPhysicsContact)
    {     switch contact.nodeB.physicsBody!.collisionBitMask {     case CollisionCategorycollectibleLowValue:
            print("Hit a low value collectible.")     case CollisionCategorycollectibleMidValue:
            print("Hit a mid value collectible.")     case CollisionCategorycollectibleHighValue:
            print("Hit a high value collectible.")     default:         print("Hit
    something other than a collectible.")     } } Listing 14-5. SCNPhysicsWorld didBeginContact
    Protocol Now you’re just going to print a line when you hit either the enemy or
    an obstacle. So, run your game now and move the spaceman around the playing field.
    As you keep an eye on the console logs, note that when you run into an obstacle
    or the enemy, the appropriate line is output.'
  trans: "\n`Shape`是初始化器中的下一个参数。`Shape`定义了用于碰撞检测的主体。在你的调用中，你需要将`shape`设置为`nil`，这将允许`SceneKit`根据节点的几何属性自动创建物理形状。如果你希望更精确地控制`SceneKit`用于碰撞检测的实际形状，可以将其设置为不同的形状。就你的目的而言，让`SceneKit`定义形状就足够了。清单\
    \ 14-1 给出了你需要在所有节点上设置的`physicsBody`。请花些时间在每个位置设置每个节点。\n\n然而，如果你现在运行游戏，会发现主角直接坠落并消失在地板下方。你可能已经猜到，由于主角现在有了物理主体，它正在与地板交互，而地板目前还没有物理主体，因此重力直接将主角拉入了虚无区域。让我们来修复这个问题。在`createFloorNode()`方法中，在`return`语句之前将代码更新为以下语句：`floorNode.physicsBody\
    \ = SCNPhysicsBody(type: .static, shape: nil)`。现在当你运行游戏时，主角将停留在地板上而不会掉下去。\n\n\
    接下来你需要做的是，将物理主体添加到`Collectible`类中的所有可收集物上。这样主角就不会直接穿过它们，而是会撞到它们。为确保你走在正确的道路上，清单\
    \ 14-1 展示了添加完所有`SCNPhysicsBody`后`Collectible`类的完整代码。\n\n```\n//\n//  Collectible.swift\n\
    //  Swifystein3D\n//\n//  Copyright © 2016 Apress. All rights reserved.\n//\n\n\
    import Foundation\nimport SceneKit\n\nclass Collectible {\n    class func pyramidNode()\
    \ -> SCNNode {\n        // 1 创建 SCNGeometry 类型\n        let pyramid = SCNPyramid(width:\
    \ 3.0, height: 6.0, length: 3.0)\n        // 2 使用几何体类型创建节点\n        let pyramidNode\
    \ = SCNNode(geometry: pyramid)\n        pyramidNode.name = \"pyramid\"\n     \
    \   // 3 设置节点位置\n        let position = SCNVector3(0, 0, 200)\n        pyramidNode.position\
    \ = position\n        // 4 为节点赋予颜色\n        pyramidNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.blue\n        pyramidNode.geometry?.firstMaterial?.shininess = 1.0\n\
    \        pyramidNode.physicsBody = SCNPhysicsBody(type: .static, shape: nil)\n\
    \        return pyramidNode\n    }\n    class func sphereNode() -> SCNNode {\n\
    \        // 1 创建 SCNGeometry 类型\n        let sphere = SCNSphere(radius: 6.0)\n\
    \        // 2 使用几何体类型创建节点\n        let sphereNode = SCNNode(geometry: sphere)\n\
    \        sphereNode.name = \"sphere\"\n        // 3 设置节点位置\n        let position\
    \  = SCNVector3(0, 6, -200)\n        sphereNode.position = position\n        //\
    \ 4 为节点赋予颜色\n        sphereNode.geometry?.firstMaterial?.diffuse.contents = #imageLiteral(resourceName:\
    \ \"earthDiffuse\")\n        sphereNode.geometry?.firstMaterial?.ambient.contents\
    \ = #imageLiteral(resourceName: \"earthAmbient\")\n        sphereNode.geometry?.firstMaterial?.specular.contents\
    \ = #imageLiteral(resourceName: \"earthSpecular\")\n        sphereNode.geometry?.firstMaterial?.normal.contents\
    \ = #imageLiteral(resourceName: \"earthNormal\")\n        sphereNode.geometry?.firstMaterial?.diffuse.mipFilter\
    \ = SCNFilterMode.linear\n        sphereNode.geometry?.firstMaterial?.shininess\
    \ = 1.0\n        sphereNode.physicsBody = SCNPhysicsBody(type: .static, shape:\
    \ nil)\n        return sphereNode\n    }\n    class func boxNode() -> SCNNode\
    \ {\n        // 1 创建 SCNGeometry 类型\n        let box = SCNBox(width: 6, height:\
    \ 6, length: 6, chamferRadius: 0)\n        // 2 使用几何体类型创建节点\n        let boxNode\
    \ = SCNNode(geometry: box)\n        boxNode.name = \"box\"\n        // 3 设置节点位置\n\
    \        let position  = SCNVector3(200, 3.0, 0)\n        boxNode.position = position\n\
    \        // 4 为节点赋予颜色\n        var materials = [SCNMaterial]()\n        let boxImage\
    \ = \"boxSide\"\n        for index in 1...6 {\n            let material = SCNMaterial()\n\
    \            material.diffuse.contents = UIImage(named: boxImage + String(index))\n\
    \            materials.append(material)\n        }\n        boxNode.geometry?.materials\
    \ = materials\n        boxNode.physicsBody = SCNPhysicsBody(type: .static, shape:\
    \ nil)\n        return boxNode\n    }\n    class func tubeNode() -> SCNNode {\n\
    \        // 1 创建 SCNGeometry 类型\n        let tube = SCNTube(innerRadius: 8, outerRadius:\
    \ 10.0, height: 10.0)\n        // 2 使用几何体类型创建节点\n        let tubeNode = SCNNode(geometry:\
    \ tube)\n        tubeNode.name = \"tube\"\n        // 3 设置节点位置\n        let position\
    \  = SCNVector3(-200, 1.5, 0)\n        tubeNode.position = position\n        //\
    \ 4 为节点赋予颜色\n        tubeNode.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n\
    \        tubeNode.geometry?.firstMaterial?.shininess = 1.0\n        tubeNode.physicsBody\
    \ = SCNPhysicsBody(type: .static, shape: nil)\n        return tubeNode\n    }\n\
    \    class func cylinderNode() -> SCNNode {\n        // 1 创建 SCNGeometry 类型\n\
    \        let cylinder = SCNCylinder(radius: 6, height: 16)\n        // 2 使用几何体类型创建节点\n\
    \        let cylinderNode = SCNNode(geometry: cylinder)\n        cylinderNode.name\
    \ = \"cylinder\"\n        // 3 设置节点位置\n        let position = SCNVector3(300,\
    \ 8, 300)\n        cylinderNode.position = position\n        // 4 为节点赋予颜色\n  \
    \      cylinderNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green\n\
    \        cylinderNode.geometry?.firstMaterial?.shininess = 0.5\n        cylinderNode.physicsBody\
    \ = SCNPhysicsBody(type: .static, shape: nil)\n        return cylinderNode\n \
    \   }\n    class func torusNode() -> SCNNode {\n        // 1 创建 SCNGeometry 类型\n\
    \        let torus = SCNTorus(ringRadius: 14, pipeRadius: 4)\n        // 2 使用几何体类型创建节点\n\
    \        let torusNode = SCNNode(geometry: torus)\n        // 3 设置节点位置\n     \
    \   let position =  SCNVector3(-300, 3, -300)\n        torusNode.position = position\n\
    \        // 4 为节点赋予颜色\n        torusNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.orange\n        torusNode.geometry?.firstMaterial?.shininess = 1.0\n\
    \        torusNode.physicsBody = SCNPhysicsBody(type: .static, shape: nil)\n \
    \       return torusNode\n    }\n}\n```\n\n**清单 14-1.** 为所有对象设置了 `SCNPhysicBody`\
    \ 的 `Collectible.swift`\n\n让碰撞检测工作的下一步是创建位掩码，这些位掩码将用于确定一个对象是否以及何时触碰另一个对象。碰撞检测基于使用位掩码创建一个表格，以确定两个对象是否应发生碰撞。为此，你将创建一个名为`SharedConstants.swift`的新文件，并使用该文件创建将用于所有对象的位掩码变量。清单\
    \ 14-2 包含了需要添加到此新文件中的代码：\n\n```\nlet CollisionCategoryHero = 2\nlet CollisionCategoryCollectibleLowValue\
    \ = 4\nlet CollisionCategoryCollectibleMidValue = 6\nlet CollisionCategoryCollectibleHighValue\
    \ = 8\nlet CollisionCategoryFloor = 10\n```\n\n**清单 14-2.** 位掩码的 `SharedConstants.swift`\
    \ 内容\n\n现在你已经有了将用于位掩码的变量，需要再次更新所有节点。如前所述，这些变量将用于创建一个表格，以确定一个对象是否应与另一个对象碰撞。`SCNPhysicsBody`有几个参数需要设置，才能使碰撞检测工作。这两个参数中的第一个是类别位掩码：\n\
    \n`heroNode?.physicsBody?.categoryBitMask = CollisionCategoryHero`\n\n第二个要设置的参数是碰撞位掩码：\n\
    \n`heroNode?.physicsBody?.collisionBitMask = CollisionCategoryCollectibleLowValue\
    \ | CollisionCategoryCollectibleMidValue | CollisionCategoryCollectibleHighValue`\n\
    \n基本上，你正在做的是：这个节点是主角，它将与不同价值的可收集节点交互。清单 14-3 显示了必须在每个节点上设置的所有`categoryBitMask`和`collisionBitMask`值。请确保在`SCNPhysicsBody`被初始化并设置在节点上之后再进行此操作。同样重要的是，在将`SCNNode`的`physicsBody`添加为场景的子节点之前对其进行初始化。\n\
    \n```\n// 将以下行添加到 GameViewController 的 createMainScene() 方法中，位于 physicsBody 初始化之后：\n\
    heroNode?.physicsBody?.categoryBitMask = CollisionCategoryHero\nheroNode?.physicsBody?.collisionBitMask\
    \ = CollisionCategoryCollectibleLowValue | CollisionCategoryCollectibleMidValue\
    \ | CollisionCategoryCollectibleHighValue\n\n// 将以下行添加到 Collectible 的 pyramidNode()\
    \ 方法中，位于 physicsBody 初始化之后：\npyramidNode.physicsBody?.categoryBitMask = CollisionCategoryCollectibleLowValue\n\
    pyramidNode.physicsBody?.collisionBitMask = CollisionCategoryHero\n\n// 将以下行添加到\
    \ Collectible 的 sphereNode() 方法中，位于 physicsBody 初始化之后：\nglobeNode.physicsBody?.categoryBitMask\
    \ = CollisionCategoryCollectibleHighValue\nglobeNode.physicsBody?.collisionBitMask\
    \ = CollisionCategoryHero\n\n// 将以下行添加到 Collectible 的 boxNode() 方法中，位于 physicsBody\
    \ 初始化之后：\nboxNode.physicsBody?.categoryBitMask = CollisionCategoryCollectibleMidValue\n\
    boxNode.physicsBody?.collisionBitMask = CollisionCategoryHero\n\n// 将以下行添加到 Collectible\
    \ 的 tubeNode() 方法中，位于 physicsBody 初始化之后：\ntubeNode.physicsBody?.categoryBitMask\
    \ = CollisionCategoryCollectibleLowValue\ntubeNode.physicsBody?.collisionBitMask\
    \ = CollisionCategoryHero\n\n// 将以下行添加到 Collectible 的 cylinderNode() 方法中，位于 physicsBody\
    \ 初始化之后：\ncylinderNode.physicsBody?.categoryBitMask = CollisionCategoryCollectibleHighValue\n\
    cylinderNode.physicsBody?.collisionBitMask = CollisionCategoryHero\n\n// 将以下行添加到\
    \ Collectible 的 torusNode() 方法中，位于 physicsBody 初始化之后：\ntorusNode.physicsBody?.categoryBitMask\
    \ = CollisionCategoryCollectibleMidValue\ntorusNode.physicsBody?.collisionBitMask\
    \ = CollisionCategoryHero\n```\n\n**清单 14-3.** `SCNPhysicsBody` 的 `categoryBitMask`\
    \ 和 `collisionBitMask`\n\n现在是时候检查你的工作了。构建并运行游戏，你应该能够移动太空人——只不过这次他可以穿过场景中的节点，可以越过一些物体，并且会被墙壁挡住。虽然这很好，但你还需要一种方式让他对这些碰撞做出反应。因为你正在制作一个捉迷藏游戏，你会想知道何时找到了敌人。要找到敌人，你必须抓住或撞到他。这通过使用`SCNPhysicsContactDelegate`来实现。\n\
    \n首先要做的是告诉你的类你想要接收`SCNPhysicsContactDelegate`：\n\n`class GameViewController: UIViewController,\
    \ SCNSceneRendererDelegate, SCNPhysicsContactDelegate {`\n\n与此结合，你还需要将委托设置给一个将响应这些碰撞的类。在这种情况下，你将把`mainScene`的`contactDelegate`设置为`self`，以便`GameViewController`能够对碰撞做出反应。在`createMainScene()`中，在`return`语句之前添加这一行：\n\
    \n`mainScene?.physicsWorld.contactDelegate = self`\n\n`SCNPhysicsContactDelegate`有三个你可以使用的协议，如清单\
    \ 14-4 所示。\n\n```\nfunc physicsWorld(_ world: SCNPhysicsWorld, didBegin contact:\
    \ SCNPhysicsContact) {\n    print(\"didBeginContact\")\n}\n\nfunc physicsWorld(_\
    \ world: SCNPhysicsWorld, didEnd contact: SCNPhysicsContact) {\n    print(\"didEndContact\"\
    )\n}\n\nfunc physicsWorld(_ world: SCNPhysicsWorld, didUpdate contact: SCNPhysicsContact)\
    \ {\n    print(\"didUpdateContact\")\n}\n```\n\n**清单 14-4.** `SCNPhysicsContact`\
    \ 协议\n\n你应该将清单 14-4 添加到你的`GameViewController`中。这次当你运行游戏时，当你的太空人移动并与环境交互时，你将收到通知。不过，对于这个游戏，你只会使用`didBeginContact`协议。此时，你将检查接触对象是否包含主角节点和可收集物节点。为此，你将保持简单，并在清单\
    \ 14-5 中检查`nodeB`以确定发生了哪种类型的接触。\n\n```\nfunc physicsWorld(_ world: SCNPhysicsWorld,\
    \ didBegin contact: SCNPhysicsContact) {\n    switch contact.nodeB.physicsBody!.collisionBitMask\
    \ {\n    case CollisionCategorycollectibleLowValue:\n        print(\"Hit a low\
    \ value collectible.\")\n    case CollisionCategorycollectibleMidValue:\n    \
    \    print(\"Hit a mid value collectible.\")\n    case CollisionCategorycollectibleHighValue:\n\
    \        print(\"Hit a high value collectible.\")\n    default:\n        print(\"\
    Hit something other than a collectible.\")\n    }\n}\n```\n\n**清单 14-5.** `SCNPhysicsWorld`\
    \ 的 `didBeginContact` 协议\n\n现在你只需在碰到敌人或障碍物时打印一行信息。所以，现在运行你的游戏，让太空人在游戏场地上移动。留意控制台日志，当你碰到障碍物或敌人时，会输出相应的信息。\n"
- fmt: "# Summary\n\nIn this chapter, you did a lot to get the spaceman moving. You\
    \ also now have the spaceman colliding with objects instead of going through them.\
    \ At this point, you're almost finished with the hide-and-seek game. In Chapter\
    \ [15](#A330720_2_En_15_Chapter.html) you'll use this collision protocol to update\
    \ the score. This scoreboard that you'll create will be in a SpriteKit view. This\
    \ way, you can see how to combine a SpriteKit view with in a SceneKit scene.©\
    \ James Goodwill and Wesley Matlock 2017 James Goodwill and Wesley Matlock Beginning\
    \ Swift Games Development for iOS 10.1007/978-1-4842-2310-9_15\n\n# 15. SceneKit\
    \ Interaction with SpriteKit\n\nJames Goodwill^(1) and Wesley Matlock² (1) Highlands\
    \ Ranch, Colorado, USA (2) Kansas City, Missouri, USA\n\nIn the previous chapters,\
    \ you've worked within the SceneKit paradigm; however, Apple has created a way\
    \ for you to add a 2D scene to overlay on your 3D scenes. In this chapter, you'll\
    \ add a 2D scene that will be used for your timer so it can track how long it\
    \ will take you and your friends to find and capture the enemy.\n\n## SpriteKit\
    \ Integration\n\nSceneKit gives you a property to add a SpriteKit scene: `var\
    \ overlaySKScene: SKScene! { get set }` This property can render a 2D scene that\
    \ overlays the SceneKit scene. To provide better performance, SceneKit and SpriteKit\
    \ use the same OpenGL context and resources to render the scene. For this game,\
    \ you'll add a scoreboard to the top of the scene. To get started, create a new\
    \ Swift file and name it `GameOverlay.swift`. Now that you have the file created,\
    \ you need to import both SceneKit and SpriteKit:\n\n```\nimport SceneKit\nimport\
    \ SpriteKit\n\nclass GameOverlay: SKScene { }\n```\n\nYour class should look similar\
    \ to the preceding code snippet. Your `GameOverlay` class is a subclass from the\
    \ `SKScene`, which should look familiar from previous chapters. For this class,\
    \ you'll add a node for the score and another one to keep track of the player's\
    \ lives. The first part you'll need to do is make one variable to hold the `SKLabelNode`\
    \ object. Because you'll be using the time interval from `Date`, you need to create\
    \ a `NumberFormatter`:\n\n```\nvar timerNode: SKLabelNode!\nvar scoreNode: SKLabelNode!\n\
    var timerFormat: NumberFormatter!\n```\n\nNow that you have some variables, you'll\
    \ need to initialize them before you use them. Listing 15-1 shows you the overridden\
    \ `init(size: CGSize)` function.\n\n```\noverride init(size: CGSize) {\n    super.init(size:\
    \ size)\n    anchorPoint = CGPoint(x: 0.5, y: 0.5)\n    scaleMode = .resizeFill\n\
    \    timerNode = SKLabelNode(fontNamed: \"AvenirNext-Bold\")\n    timerNode.text\
    \ = \"Time: 0.0\"\n    timerNode.fontColor = .red\n    timerNode.horizontalAlignmentMode\
    \ = .left\n    timerNode.verticalAlignmentMode = .bottom\n    timerNode.position\
    \ = CGPoint(x: -size.width/2 + 20, y: size.height/2 - 40)\n    timerNode.name\
    \ = \"timer\"\n    addChild(timerNode)\n    timerFormat = NumberFormatter()\n\
    \    timerFormat.numberStyle = .decimal\n    timerFormat.minimumFractionDigits\
    \ = 1\n    timerFormat.maximumFractionDigits = 1\n}\n```\n\n*Listing 15-1. GameView.init*\n\
    \nIn this initializer function, you're doing a few things that you should stop\
    \ and look at before moving on. This first part is creating the `SKLabelNode`\
    \ that will be used to show the timer counting up. You can change the font and\
    \ color, if you want, to something that would suit your needs better; however,\
    \ the red with Copperplate looks pretty decent in this game. Following the `SKLabelNode`\
    \ setup is the `NumberFomatter` setup section. The `NumberFomatter` allows you\
    \ to use numbers to be represented as `String` text. You'll have a maximum and\
    \ minimum of one fraction digit. This will allow you to show the timer within\
    \ 1/10th of a second.\n\nDon't forget, you'll also need to override the required\
    \ initializer, as in Listing 15-2.\n\n```\nrequired init?(coder aDecoder: NSCoder)\
    \ {\n    fatalError(\"init(coder:) has not been implemented\")\n}\n```\n\n*Listing\
    \ 15-2. Required Initializer*\n\nWhen your game starts, you'll need start the\
    \ timer so the user knows how fast he gets to the enemy. To do that, you'll create\
    \ a function that will start the timer, and it will update your `SKLabelNode`\
    \ for the player. Listing 15-3 shows the `startTimer()` for this purpose.\n\n\
    ```\nfunc startTimer() {\n    let startTime = NSDate.timeIntervalSinceReferenceDate\n\
    \    let timerNode = childNode(withName: \"timer\") as! SKLabelNode\n    let timerAction\
    \ = SKAction.run({ () -> Void in\n        let now = NSDate.timeIntervalSinceReferenceDate\n\
    \        let elapsedTime = TimeInterval( now - startTime )\n        let tempString\
    \ = String(format: \"%@\", self.timerFormat.string(from: NSNumber(value: elapsedTime))!)\n\
    \        timerNode.text = \"Time: \" + tempString\n    })\n    let startDelay\
    \ = SKAction.wait(forDuration: 0.5)\n    let timerDelay = SKAction.sequence([timerAction,\
    \ startDelay])\n    let timer = SKAction.repeatForever(timerDelay)\n    timerNode.run(timer,\
    \ withKey: \"timerAction\")\n}\n```\n\n*Listing 15-3. GameOverlay.startTimer( )*\n\
    \nThe next function you need to add to the `GameOverlay` class is to stop the\
    \ timer when you have collected all the collectibles. If you look at Listing 15-4,\
    \ you can see it's pretty simple. You'll get the node that you named `timer` in\
    \ the start function and then stop the action with a new function called: `timerAction`.\n\
    \n```\nfunc stopTimer() {\n    let timerNode = childNode(withName: \"timer\")\
    \ as! SKLabelNode\n    timerNode.removeAction(forKey: \"timerAction\")\n}\n```\n\
    \n*Listing 15-4. GameOverlay.stopTimer*\n\nYou have your `GameOverlay` class completed.\
    \ Now you need to update the `GameViewController` to use this class and place\
    \ it over your 3D SceneKit scene."
  raw: '## Summary


