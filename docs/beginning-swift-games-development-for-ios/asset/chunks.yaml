    # 2. SpriteKit Scenes and SKNode Positioning


    James Goodwill^(1 ) and Wesley Matlock² (1) Highlands Ranch, Colorado, USA (2)
    Kansas City, Missouri, USA   Chapter [1](#A330720_2_En_1_Chapter.html) talked
    about what SpriteKit was and how you can use it to create 2D games. It showed
    how to start working with the SKSpriteNode to create a background and player sprite
    and then showed how to add them to a game scene. This chapter steps back a bit
    for a deeper look at SpriteKit scenes, including how scenes are built and why
    the order they are built in can change your game. We close the chapter with a
    discussion of SpriteKit coordinate systems and anchor points as they relate to
    SKNodes.


    ## What Is an SKScene?


    We used the SKScene object in Chapter [1](#A330720_2_En_1_Chapter.html) to host
    the background and player nodes, but we really didn’t explain the scene we were
    using. We just used it to add the sprites and called it a day. It’s now time to
    dig in and see how SKScene really works. We’ll start by defining an SKScene object.
    An SKScene object represents a scene of content in a SpriteKit game . It inherits
    from SKEffectNode, SKNode, UIResponder, and, of course, NSObject. It is constructed
    first by creating the scene and then by adding n number of other SKNodes to it.
    The scene and all its child nodes are called the node tree , and the scene is
    the root of the node tree. The nodes contained in a scene provide the content
    the scene will animate and render for display. The following are the steps you
    performed in the previous chapter to create the node tree. They are the basic
    steps you will complete whenever setting up a game scene:


    1.  1. Create the GameViewController.  

    2.  2. Have the GameViewController create its UIView.  

    3.  3. Inside the GameViewController.viewDidLoad(), downcast the UIView to an
    SKView and set the showFPS property to true: let skView = view as! SKView skView.showsFPS
    = true  

    4.  4. Create an instance of the SKScene named GameScene, passing it its size
    in the constructor and setting the scaleMode property: scene = GameScene(size:
    skView.bounds.size) scene.scaleMode = .aspectFill  

    5.  5. Inside the init() of the GameScene, update the backgroundNode and playerNode
    objects in the scene: backgroundNode.anchorPoint = CGPoint(x: 0.5, y: 0.0) backgroundNode.position
    = CGPoint(x: size.width / 2.0, y: 0.0) addChild(backgroundNode) playerNode.position
    = CGPoint(x: size.width / 2.0, y: 80.0) addChild(playerNode!)  

    6.  6. Present the complete scene in the GameViewController.viewDidLoad() method:
     


    skView.presentScene(scene) At this point, you have a complete scene with a complete
    node tree . You can always add more nodes as the game progresses, but these are
    the basic steps that you will complete whenever you create a new SKScene.'
