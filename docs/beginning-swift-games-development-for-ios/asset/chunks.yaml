    CGPoint(x: -size.width/2 + 20, y: size.height/2 - 40)     timerNode.name = "timer"
        addChild(timerNode)     timerFormat = NumberFormatter()     timerFormat.numberStyle
    = .decimal     timerFormat.minimumFractionDigits = 1     timerFormat.maximumFractionDigits
    = 1 } Listing 15-1. GameView.init In this initializer function, you’re doing a
    few things that you should stop and look at before moving on. This first part
    is creating the SKLabelNode that will be used to show the timer counting up. You
    can change the font and color, if you want, to something that would suit your
    needs better; however, the red with Copperplate looks pretty decent in this game.
    Following the SKLabelNode setup is the NumberFomatter setup section. The NumberFomatter
