  trans: "\n在你能过渡到一个新场景之前，你需要有一个可过渡的目标场景。这个游戏需要的场景是：告知玩家上一局得分，并允许他们开始新游戏。要创建新场景，请选择\
    \ **文件 ➤ 新建 ➤ 文件** 菜单项，然后选择 **iOS ➤ 源 ➤ Swift 文件**；点击 **下一步** 按钮。确保选中了 `SuperSpaceMan`\
    \ 文件夹，将文件命名为 `MenuScene`，然后点击 **创建**。现在你会得到一个几乎为空的名为 `MenuScene.swift` 的新文件。将其内容替换为代码清单\
    \ 8-1 中的内容：\n\n```swift\nimport SpriteKit\n\nclass MenuScene: SKScene {\n    required\
    \ init?(coder aDecoder: NSCoder) {\n        super.init(coder: aDecoder)\n    }\n\
    \n    init(size: CGSize, gameResult: Bool, score: Int) {\n        super.init(size:\
    \ size)\n\n        let backgroundNode = SKSpriteNode(imageNamed: \"Background\"\
    )\n        backgroundNode.size.width = self.frame.size.width\n        backgroundNode.position\
    \ = CGPoint(x: size.width / 2, y: 0.0)\n        backgroundNode.anchorPoint = CGPoint(x:\
    \ 0.5, y: 0.0)\n        addChild(backgroundNode)\n\n        let gameResultTextNode\
    \ = SKLabelNode(fontNamed: \"Copperplate\")\n        gameResultTextNode.text =\
    \ \"YOU \" + (gameResult ? \"WON\" : \"LOST\")\n        gameResultTextNode.horizontalAlignmentMode\
    \ = SKLabelHorizontalAlignmentMode.center\n        gameResultTextNode.verticalAlignmentMode\
    \ = SKLabelVerticalAlignmentMode.center\n        gameResultTextNode.fontSize =\
    \ 20\n        gameResultTextNode.fontColor = SKColor.white\n        gameResultTextNode.position\
    \ = CGPoint(x: size.width / 2.0, y: size.height - 200.0)\n        addChild(gameResultTextNode)\n\
    \n        let scoreTextNode = SKLabelNode(fontNamed: \"Copperplate\")\n      \
    \  scoreTextNode.text = \"SCORE :  \\(score)\"\n        scoreTextNode.horizontalAlignmentMode\
    \ = SKLabelHorizontalAlignmentMode.center\n        scoreTextNode.verticalAlignmentMode\
    \ = SKLabelVerticalAlignmentMode.center\n        scoreTextNode.fontSize = 20\n\
    \        scoreTextNode.fontColor = SKColor.white\n        scoreTextNode.position\
    \ = CGPoint(x: size.width / 2.0, y: gameResultTextNode.position.y - 40.0)\n  \
    \      addChild(scoreTextNode)\n\n        let tryAgainTextNodeLine1 = SKLabelNode(fontNamed:\
    \ \"Copperplate\")\n        tryAgainTextNodeLine1.text = \"TAP ANYWHERE\"\n  \
    \      tryAgainTextNodeLine1.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.center\n\
    \        tryAgainTextNodeLine1.verticalAlignmentMode = SKLabelVerticalAlignmentMode.center\n\
    \        tryAgainTextNodeLine1.fontSize = 20\n        tryAgainTextNodeLine1.fontColor\
    \ = SKColor.white\n        tryAgainTextNodeLine1.position = CGPoint(x: size.width\
    \ / 2.0, y: 100.0)\n        addChild(tryAgainTextNodeLine1)\n\n        let tryAgainTextNodeLine2\
    \ = SKLabelNode(fontNamed: \"Copperplate\")\n        tryAgainTextNodeLine2.text\
    \ = \"TO PLAY AGAIN!\"\n        tryAgainTextNodeLine2.horizontalAlignmentMode\
    \ = SKLabelHorizontalAlignmentMode.center\n        tryAgainTextNodeLine2.verticalAlignmentMode\
    \ = SKLabelVerticalAlignmentMode.center\n        tryAgainTextNodeLine2.fontSize\
    \ = 20\n        tryAgainTextNodeLine2.fontColor = SKColor.white\n        tryAgainTextNodeLine2.position\
    \ = CGPoint(x: size.width / 2.0, y: tryAgainTextNodeLine1.position.y - 40.0)\n\
    \        addChild(tryAgainTextNodeLine2)\n    }\n\n    override func touchesBegan(_\
    \ touches: Set<UITouch>, with event: UIEvent?) {\n        let transition = SKTransition.doorsOpenHorizontal(withDuration:\
    \ 2.0)\n        let gameScene = GameScene(size: size)\n        view?.presentScene(gameScene,\
    \ transition: transition)\n    }\n}\n```\n\n**代码清单 8-1.** `MenuScene.swift`：SuperSpaceMan\
    \ 的 `MenuScene`\n\n请注意，第二个 `init()` 方法接受三个参数：场景的尺寸、以 `Bool` 类型表示的游戏结果以及玩家的分数。如你所知，`size`\
    \ 参数用于设置场景的尺寸，而第三个和第四个参数将用于向用户显示游戏结果信息。在 `init()` 方法内部，首先添加了一张背景图。所使用的图片与你之前在\
    \ `GameScene` 中使用的图片相同。之后，该方法向场景中添加了几个标签，其中包括两个位于场景中央的标签。第一个标签告知用户他们是赢了还是输了比赛，第二个标签则显示他们的分数。接下来，场景底部添加了两个标签，提示玩家点击屏幕任意位置以重新开始游戏。将代码添加到\
    \ `MenuScene.swift` 文件后，保存你的工作，然后让我们回到 `GameScene.swift` 文件。现在你有了一个可过渡的场景，因此让我们添加执行过渡的代码。用于实现此过渡的代码如下所示：\n\
    \n```swift\nlet transition = SKTransition.crossFade(withDuration: 2.0)\nlet menuScene\
    \ = MenuScene(size: size,\n                          gameResult: gameResult,\n\
    \                          score: score)\nview?.presentScene(menuScene, transition:\
    \ transition)\n```\n\n这段代码的第一行创建了一个交叉淡入淡出的过渡效果，该效果会在两秒内淡入新场景。第二行创建了 `MenuScene`\
    \ 本身，并向其传递当前场景的尺寸，以及游戏结果和玩家的分数。第三行则实际呈现 `MenuScene`，它会使用第一行创建的过渡效果替换当前场景。阅读这段代码后，请将其添加到\
    \ `GameScene` 的 `gameOverWithResult()` 方法底部，如下所示：\n\n```swift\nfunc gameOverWithResult(_\
    \ gameResult: Bool) {\n    playerNode.removeFromParent()\n\n    let transition\
    \ = SKTransition.crossFade(withDuration: 2.0)\n    let menuScene = MenuScene(size:\
    \ size,\n                        gameResult: gameResult,\n                   \
    \          score: score)\n    view?.presentScene(menuScene, transition: transition)\n\
    }\n```\n\n现在运行游戏，试着赢一局或输一局。无论哪种方式，游戏结束时，你都会看到新场景淡入，如图 8-2 所示。\n\n![A330720_2_En_8_Fig2_HTML.jpg](img/A330720_2_En_8_Fig2_HTML.jpg)\n\
    \n**图 8-2.** 游戏结束时的 `MenuScene`\n\n太棒了。你现在已经添加了一个简单的场景过渡，它能够传达玩家是赢了还是输了游戏，以及游戏结束时的得分。在进入下一章之前，你还需要做最后一个改动：添加另一个过渡，当玩家点击\
    \ `MenuScene` 时，该过渡将开始一个新游戏。实现此功能的代码显示在以下对 `MenuScene` 的 `touchesBegan()` 方法的重写中：\n\
    \n```swift\noverride func touchesBegan(_ touches: Set<UITouch>, with event: UIEvent?)\
    \ {\n    let transition = SKTransition.doorsOpenHorizontal(withDuration: 2.0)\n\
    \    let gameScene = GameScene(size: size)\n    view?.presentScene(gameScene,\
    \ transition: transition)\n}\n```\n\n此方法创建了一个 `doorsOpenHorizontalWithDuration`\
    \ 过渡和一个新的 `GameScene` 实例，然后使用新过渡呈现新的 `GameScene`。将此方法添加到 `MenuScene` 类的底部，然后再次运行应用程序。这次，当游戏结束并显示\
    \ `MenuScene` 时，点击屏幕，你就能开始新一局游戏了。\n"
- fmt: "# Summary\n\nIn this chapter, you learned how to implement scene transitions\
    \ using SpriteKit’s `SKTransition` class. You looked at some of the different\
    \ types of built-in transitions SpriteKit makes available to you. You also saw\
    \ how you could control each scene during a transition. At the end of the chapter,\
    \ you took your new knowledge of scene transitions and added a menu scene to your\
    \ `SuperSpaceMan` game. In Chapter [9](#A330720_2_En_9_Chapter.html) you’ll be\
    \ wrapping up your study of SpriteKit programming with Swift when you focus on\
    \ SpriteKit best practices. At the end of the chapter, you’ll spend just a little\
    \ time cleaning up the `SuperSpaceMan` application when you do some refactoring.©\
    \ James Goodwill and Wesley Matlock 2017 James Goodwill and Wesley Matlock Beginning\
    \ Swift Games Development for iOS 10.1007/978-1-4842-2310-9_9\n\n# 9. SpriteKit\
    \ Best Practices\n\nJames Goodwill^(1) and Wesley Matlock²  \n(1) Highlands Ranch,\
    \ Colorado, USA  \n(2) Kansas City, Missouri, USA  \n\nIn this chapter, you’ll\
    \ learn some SpriteKit best practices; specifically, you’ll see how you can create\
    \ your own subclasses of `SKSpriteNode` so that you can better reuse your nodes.\
    \ You’ll then move on to changing your game to load all the sprites into a single\
    \ texture atlas that you can reference when creating all future sprites. After\
    \ that, you’ll move on to externalizing some of your game data so that designers\
    \ and testers can change the game play. Finally, you’ll close out the chapter\
    \ when you prune your node tree of all nodes that have fallen off the bottom of\
    \ the screen.\n\n## Creating Your Own Nodes with Subclassing"
  raw: '## Summary


    In this chapter, you learned how to implement scene transitions using SpriteKit’s
    SKTransition class. You looked at some of the different types of built-in transitions
    SpriteKit makes available to you. You also saw how you could control each scene
    during a transition. At the end of the chapter, you took your new knowledge of
    scene transitions and added a menu scene to your SuperSpaceMan game. In Chapter
    [9](#A330720_2_En_9_Chapter.html) you’ll be wrapping up your study of SpriteKit
    programming with Swift when you focus on SpriteKit best practices. At the end
    of the chapter, you’ll spend just a little time cleaning up the SuperSpaceMan
    application when you do some refactoring.© James Goodwill and Wesley Matlock 2017
    James Goodwill and Wesley MatlockBeginning Swift Games Development for iOS10.1007/978-1-4842-2310-9_9


    # 9. SpriteKit Best Practices


    James Goodwill^(1 ) and Wesley Matlock² (1) Highlands Ranch, Colorado, USA (2)
    Kansas City, Missouri, USA   In this chapter, you’ll learn some SpriteKit best
    practices; specifically, you’ll see how you can create your own subclasses of
    SKSpriteNode so that you can better reuse your nodes. You’ll then move on to changing
    your game to load all the sprites into a single texture atlas that you can reference
    when creating all future sprites. After that, you’ll move on to externalizing
    some of your game data so that designers and testers can change the game play.
    Finally, you’ll close out the chapter when you prune your node tree of all nodes
    that have fallen off the bottom of the screen.


    ## Creating Your Own Nodes with Subclassing'
  trans: "\n# 总结\n\n在本章中，你学习了如何使用 SpriteKit 的 `SKTransition` 类来实现场景转场。你了解了 SpriteKit\
    \ 为你提供的几种不同类型的内置转场效果。你还看到了如何在转场过程中控制每个场景。在本章末尾，你运用新学到的场景转场知识，为你的 `SuperSpaceMan`\
    \ 游戏添加了一个菜单场景。在第九章（#A330720_2_En_9_Chapter.html）中，你将聚焦 SpriteKit 最佳实践，以此结束使用 Swift\
    \ 进行 SpriteKit 编程的学习。在本章末尾，你还会花一点时间通过重构来清理 `SuperSpaceMan` 应用程序。© James Goodwill\
    \ 和 Wesley Matlock，2017 James Goodwill 和 Wesley Matlock《Beginning Swift Games\
    \ Development for iOS》10.1007/978-1-4842-2310-9_9\n\n# 9. SpriteKit 最佳实践\n\nJames\
    \ Goodwill¹ 和 Wesley Matlock²  \n(1) 美国科罗拉多州海兰兹牧场  \n(2) 美国密苏里州堪萨斯城  \n\n在本章中，你将学习一些\
    \ SpriteKit 最佳实践；具体来说，你将看到如何创建自己的 `SKSpriteNode` 子类，以便更好地重用节点。接着你将修改游戏，将所有精灵加载到单个纹理图集中，以便在创建未来所有精灵时引用该图集。之后，你将把部分游戏数据外部化，以便设计人员和测试人员能够调整游戏玩法。最后，你将通过移除所有掉出屏幕底部的节点来修剪节点树，从而结束本章内容。\n\
    \n## 通过子类化创建自己的节点\n"
- fmt: "我们想讨论的第一个最佳实践是将精灵节点重构为它们各自的类。这样做不仅能清理场景代码，还能将每个节点的特定代码封装到它自己的类中。可以抽象到独立类中的三个节点分别是玩家节点、能量球节点和黑洞节点。在开始这个过程之前，你需要创建一个新文件来存放常量。这个文件的目的是保存所有将在各个节点间使用的碰撞类别。创建这个新文件并将其命名为`SharedConstants.swift`。文件就位后，将所有碰撞类别从`GameScene.swift`文件移动到该文件中。完成后，你的新文件应如代码清单\
    \ 9-1 所示。\n\n```swift\nlet CollisionCategoryPlayer : UInt32 = 0x1 << 1\nlet CollisionCategoryPowerUpOrbs\
    \ : UInt32 = 0x1 << 2\nlet CollisionCategoryBlackHoles : UInt32 = 0x1 << 3\n```\n\
    *代码清单 9-1. `SharedConstants.swift`：用于存储多个类中使用的常量的文件*\n\n设置好常量后，再创建另一个名为`SpaceMan.swift`的新文件。这个文件将存放你重构后的`playerNode`的类。创建文件后，将代码清单\
    \ 9-2 中的代码复制进去并保存。\n\n```swift\nimport Foundation\nimport SpriteKit\n\nclass SpaceMan:\
    \ SKSpriteNode {\n    required init?(coder aDecoder: NSCoder) {\n        fatalError(\"\
    init(coder:) has not been implemented\")\n    }\n\n    init() {\n        let texture\
    \ = SKTexture(imageNamed: \"Player\")\n        super.init(texture: texture, color:\
    \ UIColor.clear, size: texture.size())\n        physicsBody = SKPhysicsBody(circleOfRadius:\
    \ size.width / 2)\n        physicsBody?.isDynamic = false\n        physicsBody?.linearDamping\
    \ = 1.0\n        physicsBody?.allowsRotation = false\n        physicsBody?.categoryBitMask\
    \ = CollisionCategoryPlayer\n        physicsBody?.contactTestBitMask = CollisionCategoryPowerUpOrbs\
    \ | CollisionCategoryBlackHoles\n        physicsBody?.collisionBitMask = 0\n \
    \   }\n}\n```\n*代码清单 9-2. `SpaceMan.swift`：新的`SpaceMan`类*\n\n`SpaceMan`类继承自`SKSpriteNode`，所有与设置太空人纹理和`physicsBody`相关的代码都已移入太空人的`init()`方法中。需要注意的是，在`init()`方法的开头，我们使用`\"\
    Player\"`图像创建了一个纹理，然后调用了所需的`super.init()`方法。这是因为我们正在子类化`SKSpriteNode`，而这是必需的初始化方法。我们将在本章后面的部分更详细地讨论纹理。现在我们已经将所有内容移到了这个类中，在游戏场景中使用它会容易得多。\n\
    \n一旦你有了新的`SpaceMan`类，就可以移除`GameScene`中以下九行代码：\n\n```swift\nplayerNode.physicsBody\
    \ = SKPhysicsBody(circleOfRadius: playerNode.size.width / 2)\nplayerNode.physicsBody?.dynamic\
    \ = false\nplayerNode.position = CGPoint(x: size.width / 2.0, y: 220.0)\nplayerNode.physicsBody?.linearDamping\
    \ = 1.0\nplayerNode.physicsBody?.allowsRotation = false\nplayerNode.physicsBody?.categoryBitMask\
    \ = CollisionCategoryPlayer\nplayerNode.physicsBody?.contactTestBitMask = CollisionCategoryPowerUpOrbs\
    \ | CollisionCategoryBlackHoles\nplayerNode.physicsBody?.collisionBitMask = 0\n\
    ```\n\n从`GameScene`的`init(size: CGSize)`方法中移除上述代码片段后，请确保保留下面这行代码：\n\n```swift\n\
    playerNode.position = CGPoint(x: size.width / 2.0, y: 220.0)\n```\n\n使用新的`SpaceMan`类，你需要做的最后一步是将节点的声明从：\n\
    \n```swift\nlet playerNode = SKSpriteNode(imageNamed: \"Player\")\n```\n\n改为：\n\
    \n```swift\nlet playerNode = SpaceMan()\n```\n\n接下来你需要创建的类，是一个封装所有与能量球节点相关代码的类。为此，创建另一个名为`Orb.swift`的文件，并将代码清单\
    \ 9-3 的内容复制进去。\n\n```swift\nimport Foundation\nimport SpriteKit\n\nclass Orb:\
    \ SKSpriteNode {\n    required init?(coder aDecoder: NSCoder) {\n        fatalError(\"\
    init(coder:) has not been implemented\")\n    }\n\n    init() {\n        let texture\
    \ = SKTexture(imageNamed: \"PowerUp\")\n        super.init(texture: texture,\n\
    \                   color: UIColor.clear,\n                   size: texture.size())\n\
    \        physicsBody =\n            SKPhysicsBody(circleOfRadius: self.size.width\
    \ / 2)\n        physicsBody?.isDynamic = false\n        physicsBody?.categoryBitMask\
    \ = CollisionCategoryPowerUpOrbs\n        physicsBody?.collisionBitMask = 0\n\
    \        name = \"POWER_UP_ORB\"\n    }\n}\n```\n*代码清单 9-3. `Orb.swift`：新的`Orb`类*\n\
    \n这个新的`Orb`类，与`SpaceMan`类非常相似，包含了所有设置节点纹理和其`physicsBody`的代码。一旦新的`Orb`类就位，你就可以将`addOrbsToForeground()`方法修改为如下简化版本：\n\
    \n```swift\nfunc addOrbsToForeground() {\n    var orbNodePosition =\n        \
    \  CGPoint(x: playerNode.position.x, y: playerNode.position.y + 100)\n    var\
    \ orbXShift : CGFloat = -1.0\n    for _ in 0...49 {\n        // new code to use\
    \ an orb\n        let orbNode = Orb()\n        if orbNodePosition.x - (orbNode.size.width\
    \ * 2) <= 0 {\n            orbXShift = 1.0\n        }\n        if orbNodePosition.x\
    \ + orbNode.size.width >= size.width {\n            orbXShift = -1.0\n       \
    \ }\n        orbNodePosition.x += 40.0 * orbXShift\n        orbNodePosition.y\
    \ += 120\n        orbNode.position = orbNodePosition\n        foregroundNode.addChild(orbNode)\n\
    \    }\n}\n```\n\n`addOrbsToForeground()`方法现在简单多了。它只执行三个步骤：创建每个能量球节点，设置它们各自的位置，然后将它们添加到场景中。\n\
    \n你要创建的最后一个节点类是`BlackHole`类。正如你可能猜到的，这个类将包含所有与黑洞相关的代码。创建另一个名为`BlackHole.swift`的新文件，并将代码清单\
    \ 9-4 的内容复制进去。\n\n```swift\nimport Foundation\nimport SpriteKit\n\nclass BlackHole:\
    \ SKSpriteNode {\n    required init?(coder aDecoder: NSCoder) {\n        fatalError(\"\
    init(coder:) has not been implemented\")\n    }\n\n    init() {\n        let frame0\
    \ = SKTexture(imageNamed: \"BlackHole0\")\n        let frame1 = SKTexture(imageNamed:\
    \ \"BlackHole1\")\n        let frame2 = SKTexture(imageNamed: \"BlackHole2\")\n\
    \        let frame3 = SKTexture(imageNamed: \"BlackHole3\")\n        let frame4\
    \ = SKTexture(imageNamed: \"BlackHole4\")\n        let blackHoleTextures = [frame0,\
    \ frame1, frame2, frame3, frame4]\n        let animateAction =\n            SKAction.animate(with:\
    \ blackHoleTextures, timePerFrame: 0.2)\n        let rotateAction = SKAction.repeatForever(animateAction)\n\
    \        super.init(texture: frame0,\n                   color: UIColor.clear,\n\
    \                   size: frame0.size())\n        physicsBody = SKPhysicsBody(circleOfRadius:\
    \ size.width / 2)\n        physicsBody?.isDynamic = false\n        physicsBody?.categoryBitMask\
    \ = CollisionCategoryBlackHoles\n        physicsBody?.collisionBitMask = 0\n \
    \       name = \"BLACK_HOLE\"\n        run(rotateAction)\n    }\n}\n```\n*代码清单\
    \ 9-4. `BlackHole.swift`：新的`BlackHole`类*\n\n一旦新的`BlackHole`类就位，你就可以将`addBlackHolesToForeground()`方法修改为如下简化版本：\n\
    \n```swift\nfunc addBlackHolesToForeground() {\n    let moveLeftAction = SKAction.moveTo(x:\
    \ 0.0, duration: 2.0)\n    let moveRightAction = SKAction.moveTo(x: size.width,\
    \ duration: 2.0)\n    let actionSequence = SKAction.sequence([moveLeftAction,\
    \ moveRightAction])\n    let moveAction = SKAction.repeatForever(actionSequence)\n\
    \    for i in 1...10 {\n        // new black hole usage code\n        let blackHoleNode\
    \ = BlackHole()\n        blackHoleNode.position = CGPoint(x: size.width - 80.0,\
    \ y: 600.0 * CGFloat(i))\n        blackHoleNode.run(moveAction)\n        foregroundNode.addChild(blackHoleNode)\n\
    \    }\n}\n```\n\n将这些节点移动到它们自己的类中，使得每个节点的重用更加容易，同时也清理了`GameScene`。\n\n## 重用纹理"
  raw: 'The first best practice we want to talk about is refactoring your sprite nodes
    into their own classes. Doing this will both clean up your scene code and encapsulate
    each node’s specific code to its own class. The three nodes that can be abstracted
    to their own classes are the player, orb, and black hole nodes. Before you can
    start this process, you need to create a new file to share constants. The purpose
    of this file is to hold all the collision categories that will be used across
    each of the nodes. Create this new file and name it SharedConstants.swift. Once
    this file is in place, move all the collision categories from the GameScene.swift
    file to this file. When you’re finished, your new file should look like Listing
    [9-1](#A330720_2_En_9_Chapter.html#Par5). let CollisionCategoryPlayer : UInt32
    = 0x1 << 1 let CollisionCategoryPowerUpOrbs : UInt32 = 0x1 << 2 let CollisionCategoryBlackHoles
    : UInt32 = 0x1 << 3 Listing 9-1. SharedConstants.swift: A File to Hold Constant
    Used in Multiple Classes After you have the constants set up, create another new
    file, named SpaceMan.swift. This is the file that will hold your refactored playerNode’s
    class. Once you’ve created the file, copy the code in Listing [9-2](#A330720_2_En_9_Chapter.html#Par7)
    into it and save your work. import Foundation import SpriteKit class SpaceMan:
    SKSpriteNode {     required init?(coder aDecoder: NSCoder) {         fatalError("init(coder:)
    has not been implemented")     }     init() {         let texture = SKTexture(imageNamed:
    "Player")         super.init(texture: texture, color: UIColor.clear, size: texture.size())
            physicsBody = SKPhysicsBody(circleOfRadius: size.width / 2)         physicsBody?.isDynamic
    = false         physicsBody?.linearDamping = 1.0         physicsBody?.allowsRotation
    = false         physicsBody?.categoryBitMask = CollisionCategoryPlayer         physicsBody?.contactTestBitMask
    = CollisionCategoryPowerUpOrbs | CollisionCategoryBlackHoles         physicsBody?.collisionBitMask
    = 0     } } Listing 9-2. SpaceMan.swift: The New SpaceMan Class The SpaceMan class
    extends SKSpriteNode, and all the code related to setting up the spaceman’s texture
    and physicsBody has been moved into the spaceman’s init() method. The one thing
    to note is that, at the beginning of the init() method, we create a texture with
    the Player image and then you call the required super.init() method. That’s because
    we’re subclassing SKSpriteNode, and this is the required init(). We talk a lot
    more about textures in a later section in this chapter. Now that we have everything
    moved to this class, it will be much easier to use in a game scene. Once you have
    the new SpaceMan class, you can remove the following snippet of nine lines of
    code in the GameScene: playerNode.physicsBody = SKPhysicsBody(circleOfRadius:
    playerNode.size.width / 2) playerNode.physicsBody?.dynamic = false playerNode.position
    = CGPoint(x: size.width / 2.0, y: 220.0) playerNode.physicsBody?.linearDamping
    = 1.0 playerNode.physicsBody?.allowsRotation = false playerNode.physicsBody?.categoryBitMask
    = CollisionCategoryPlayer playerNode.physicsBody?.contactTestBitMask = CollisionCategoryPowerUpOrbs
    | CollisionCategoryBlackHoles playerNode.physicsBody?.collisionBitMask = 0 After
    removing the previous snippet from GameScene’s init(size: CGSize) method, be sure
    to leave the following line in place: playerNode.position = CGPoint(x: size.width
    / 2.0, y: 220.0) The last thing you need to do to use your new SpaceMan class
    is change the declaration of the node from: let playerNode = SKSpriteNode(imageNamed:
    "Player") to: let playerNode = SpaceMan() The next class you need to create is
    a class that will encapsulate all the orb node–related code. To do that, create
    another file, named Orb.swift, and copy the contents of Listing [9-3](#A330720_2_En_9_Chapter.html#Par18)
    into it. import Foundation import SpriteKit class Orb: SKSpriteNode {     required
    init?(coder aDecoder: NSCoder) {         fatalError("init(coder:) has not been
    implemented")     }     init() {         let texture = SKTexture(imageNamed: "PowerUp")
            super.init(texture: texture,                    color: UIColor.clear,
                       size: texture.size())         physicsBody =             SKPhysicsBody(circleOfRadius:
    self.size.width / 2)         physicsBody?.isDynamic = false         physicsBody?.categoryBitMask
    = CollisionCategoryPowerUpOrbs         physicsBody?.collisionBitMask = 0         name
    = "POWER_UP_ORB"     } } Listing 9-3. Orb.swift: The New Orb Class This new Orb
    class, much like the SpaceMan class, contains all the code to set up the node’s
    texture and its physicsBody. Once you have the new Orb class in place, you can
    then change the addOrbsToForeground() method to look like the following simplified
    method: func addOrbsToForeground() {     var orbNodePosition =           CGPoint(x:
    playerNode.position.x, y: playerNode.position.y + 100)     var orbXShift : CGFloat
    = -1.0     for _ in 0...49 {         // new code to use an orb         let orbNode
    = Orb()         if orbNodePosition.x - (orbNode.size.width * 2) <= 0 {             orbXShift
    = 1.0         }         if orbNodePosition.x + orbNode.size.width >= size.width
