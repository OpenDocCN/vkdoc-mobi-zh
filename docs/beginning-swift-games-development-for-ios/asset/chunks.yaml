    # 13. Render Loop, Physics, and Moving Around


    James Goodwill^(1 ) and Wesley Matlock² (1) Highlands Ranch, Colorado, USA (2)
    Kansas City, Missouri, USA   So far in the game you have not moved the hero, and
    now you need to get him up on his feet and moving around. You’re going to keep
    this simple and use a one-finger touch to move forward and two fingers to move
    back. To move left and right, you’ll use the accelerometer . But where in the
    render loop do you actually put the code to move the hero around? Read on.


    ## What Is the Render Loop?


    The render loop is SceneKit’s game loop, and it’s here that the game scene comes
    alive. The render loop happens once for each frame of the game scene that will
    allow you to perform game logic. The render loop has nine sections (see Figure
    [13-1](#A330720_2_En_13_Chapter.html#Fig1)) where SceneKit executes certain actions.
    SCNSceneRendererDelegate has five delegates where you can customize the game scene
    programmatically:


    1.  1. renderer(_:updateAtTime) is the first delegate to be called in the render
    loop. The delegate is where you would want to set up any logic that will be needed
    with in the loop.  

    2.  2. During this phase of the loop, SceneKit runs the actions and animations
    of the nodes in the scene.  

    3.  3. renderer(_:didApplyAnimationsAtTime:): After the animations have fun, this
    delegate is called by the view.  

    4.  4. SceneKit’s next action is to apply the physics to the nodes within the
    scene.  

    5.  5. renderer(_:didSimulatePhysicsAtTime:): After SceneKit has applied the physics,
    you have a chance to examine how the scene is progressing. This is where we will
    examine the movement and deal with any collisions that have occurred.  

    6.  6. SceneKit then evaluates the constraints of the view and nodes. These are
    items you’ll be able to adjust that will allow SceneKit to automatically adjust
    the nodes in the view.  

    7.  7. renderer(_:willRenderScene:atTime:): After SceneKit has evaluated the constraints
    and is about to render the scene, you have one last-minute delegate to make any
    adjustments.  

    8.  8. The view is rendered based on the scene graph.  

    9.  9. renderer(_:willRenderScene:atTime:): This is the last and final delegate
    that is called before the loop starts again.  


    ![A330720_2_En_13_Fig1_HTML.jpg](OEBPS/A330720_2_En_13_Fig1_HTML.jpg) Figure 13-1.
    SceneKit render cycle'
  trans: "\n现在你已经对 `SCNMaterial` 的属性有了基本了解，让我们转到 `Collectible` 类，为你的可收集物添加一些材质。首先，将\
    \ `PyramidNode` 设置为漂亮的蓝色，如代码清单 12-3 所示。\n\n```\npyramidNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.blue\npyramidNode.geometry?.firstMaterial?.shininess = 1.0\n```\n\n\
    **代码清单 12-3.** PyramidNode 材质\n\n在这个游戏中，你会保持简单，只使用一种材质。SceneKit 通过 `firstMaterial`\
    \ 对象提供了便捷的访问方式。你将 `diffuse` 内容设置为蓝色。同时希望这个物体有光泽，因此提高 `shininess` 至 1。你可以尝试不同的颜色和光泽度，观察这些属性如何影响你的\
    \ `PyramidNode`。\n\n接下来是你的 `SphereNode`。代码清单 12-4 演示了如何添加一些元素使其看起来更像个微缩地球。\n\n\
    ```\nsphereNode.geometry?.firstMaterial?.diffuse.contents = #imageLiteral(resourceName:\
    \ \"earthDiffuse\")\nsphereNode.geometry?.firstMaterial?.ambient.contents = #imageLiteral(resourceName:\
    \ \"earthAmbient\")\nsphereNode.geometry?.firstMaterial?.specular.contents = #imageLiteral(resourceName:\
    \ \"earthSpecular\")\nsphereNode.geometry?.firstMaterial?.normal.contents = #imageLiteral(resourceName:\
    \ \"earthNormal\")\nsphereNode.geometry?.firstMaterial?.diffuse.mipFilter = SCNFilterMode.linear\n\
    sphereNode.geometry?.firstMaterial?.shininess = 1.0\n```\n\n**代码清单 12-4.** GlobeNode\
    \ 光照增强\n\n通过 `GlobeNode`，你进一步扩展了 `NSMaterial` 的使用，创建了一个更逼真的地球。查看每个 JPG 文件，你会看到这些文件如何影响\
    \ SceneKit 和 `NSMaterial` 的输出。最新版本的 Xcode 允许你使用 JPG 文件的图像字面量。因此，输入此代码时，你无需包含 `#imageLiteral(resourceName:\
    \ \"earthSpecular\")`。你只需开始输入图像文件的名称，例如 `earthSpecular`，Xcode 就会自动显示该图像。为 `diffuse`\
    \ 属性添加 `mipFilter` 可以让 SceneKit 在以更小尺寸渲染纹理图像时提升性能。\n\n现在，你将向 `BoxNode` 添加一些材质。SceneKit\
    \ 允许你向 `materials` 属性应用一个数组，并将其应用到几何体上。对于 `BoxNode`，你将应用六种不同的材质，使其拥有六个不同的面，如代码清单\
    \ 12-5 所示。\n\n```\nvar materials = [SCNMaterial]()\nlet boxImage = \"boxSide\"\
    \nfor index in 1...6 {\n    let material = SCNMaterial()\n    material.diffuse.contents\
    \ = UIImage(named: boxImage + String(index))\n    materials.append(material)\n\
    }\nboxNode.geometry?.materials = materials\n```\n\n**代码清单 12-5.** BoxNode 材质\n\
    \n对于其他障碍物类型，添加颜色的方式与处理 `PyramidNode` 类似。代码清单 12-6 是其余障碍物的代码，如果你手头有可用的图片，可以自由使用不同的颜色和图像。\n\
    \n```\nclass func tubeNode() -> SCNNode {\n    // 1 创建 SCNGeometry 类型\n    let\
    \ tube = SCNTube(innerRadius: 8, outerRadius: 10.0, height: 10.0)\n    // 2 使用几何体类型创建节点\n\
    \    let tubeNode = SCNNode(geometry: tube)\n    tubeNode.name = \"tube\"\n  \
    \  // 3 设置节点位置\n    let position  = SCNVector3(-200, 1.5, 0)\n    tubeNode.position\
    \ = position\n    // 4 为节点添加颜色\n    tubeNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.yellow\n    tubeNode.geometry?.firstMaterial?.shininess = 1.0\n  \
    \  return tubeNode\n}\n\nclass func cylinderNode() -> SCNNode {\n    // 1 创建 SCNGeometry\
    \ 类型\n    let cylinder = SCNCylinder(radius: 6, height: 16)\n    // 2 使用几何体类型创建节点\n\
    \    let cylinderNode = SCNNode(geometry: cylinder)\n    cylinderNode.name = \"\
    cylinder\"\n    // 3 设置节点位置\n    let position = SCNVector3(300, 8, 300)\n    cylinderNode.position\
    \ = position\n    // 4 为节点添加颜色\n    cylinderNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.green\n    cylinderNode.geometry?.firstMaterial?.shininess = 0.5\n\
    \    return cylinderNode\n}\n\nclass func torusNode() -> SCNNode {\n    // 1 创建\
    \ SCNGeometry 类型\n    let torus = SCNTorus(ringRadius: 14, pipeRadius: 4)\n  \
    \  // 2 使用几何体类型创建节点\n    let torusNode = SCNNode(geometry: torus)\n    // 3 设置节点位置\n\
    \    let position =  SCNVector3(-300, 3, -300)\n    torusNode.position = position\n\
    \    // 4 为节点添加颜色\n    torusNode.geometry?.firstMaterial?.diffuse.contents = UIColor.orange\n\
    \    torusNode.geometry?.firstMaterial?.shininess = 1.0\n    return torusNode\n\
    }\n```\n\n**代码清单 12-6.** 其余障碍物材质\n\n## 总结\n\n本章内容非常丰富。你学习了 SceneKit 提供的几种不同类型的照明。花些时间在代码库中进行实验，看看光照的细微变化如何影响游戏的可玩性。另一个学习体验是\
    \ SceneKit 如何使用材质让你的物体看起来更真实或更具未来感。在第 13 章中，你将研究 SceneKit 如何通过动画来移动物体。\n\n© James\
    \ Goodwill 和 Wesley Matlock 2017  \nJames Goodwill 和 Wesley Matlock，*Beginning\
    \ Swift Games Development for iOS*  \n10.1007/978-1-4842-2310-9_13\n\n# 13. 渲染循环、物理与移动\n\
    \nJames Goodwill¹ 和 Wesley Matlock²  \n(1) 美国科罗拉多州海兰兹牧场  \n(2) 美国密苏里州堪萨斯城\n\n\
    到目前为止，游戏中的英雄还未移动过，现在你需要让他站起来并四处移动。我们将保持简单：使用单指触摸向前移动，双指触摸向后移动。左右移动则使用加速计。但渲染循环中到底应该把移动英雄的代码放在哪里呢？请继续阅读。\n\
    \n## 什么是渲染循环？\n\n渲染循环是 SceneKit 的游戏循环，游戏场景在此处变得生动。渲染循环针对游戏场景的每一帧执行一次，允许你执行游戏逻辑。渲染循环有九个阶段（见图\
    \ 13-1），SceneKit 在其中执行特定操作。`SCNSceneRendererDelegate` 提供了五个代理方法，你可以通过编程方式自定义游戏场景：\n\
    \n1. `renderer(_:updateAtTime)` 是渲染循环中第一个被调用的代理方法。该代理适合设置循环内所需的任何逻辑。\n2. 在循环的这一阶段，SceneKit\
    \ 执行场景中节点的动作和动画。\n3. `renderer(_:didApplyAnimationsAtTime:)`：动画运行后，视图会调用此代理方法。\n\
    4. SceneKit 的下一步是将物理效果应用于场景中的节点。\n5. `renderer(_:didSimulatePhysicsAtTime:)`：应用物理效果后，你有机会检查场景的进展情况。我们将在此处检查移动并处理发生的任何碰撞。\n\
    6. 接着，SceneKit 评估视图和节点的约束。这些是你可以调整的项目，允许 SceneKit 自动调整视图中的节点。\n7. `renderer(_:willRenderScene:atTime:)`：在\
    \ SceneKit 评估完约束并准备渲染场景时，你有最后一次机会通过代理方法进行调整。\n8. 视图基于场景图进行渲染。\n9. `renderer(_:willRenderScene:atTime:)`：这是在循环重新开始之前调用的最后一个代理方法。\n\
    \n![A330720_2_En_13_Fig1_HTML.jpg](img/A330720_2_En_13_Fig1_HTML.jpg)  \n**图 13-1.**\
    \ SceneKit 渲染循环\n"
- fmt: "# `GameView`: Moving the Hero\n\nStart by overriding the `GameViewController`’s\
    \ `touchesBegan` and `touchesEnded` methods. In Listing [13-1](#A330720_2_En_13_Chapter.html#Par13),\
    \ you can see that you’re overriding the `touchesBegan` method and the `touchesEnded`\
    \ method.\n\n```\noverride func touchesBegan(_ touches: Set<UITouch>, with event:\
    \ UIEvent?) {\n    let taps = event?.allTouches\n    touchCount = taps?.count\n\
    }\noverride func touchesEnded(_ touches: Set<UITouch>, with event: UIEvent?) {\n\
    \    touchCount = 0\n}\n```\n\nListing 13-1. `GameViewController.swift`\n\nHere\
    \ you’re overriding the base function `touchesBegan`. You’ll capture the touches\
    \ that occur and assign them to the class variable `touchCount`. After the user\
    \ releases the touch, you have to set the count to zero—otherwise, your poor hero\
    \ would always be running. Now, go fix that error on the `touchCount`. At the\
    \ top of the class add in the variable: `var touchCount: Int?`. You’ll use the\
    \ `render` method in the `GameViewController` to read the `touchCount` variable\
    \ in order to move the hero a direction based on how many touches occur during\
    \ the render cycle of the render loop.\n\nNow that you have the code in place\
    \ to capture a touch, you need to put it somewhere where you can get the update\
    \ from the scene. To do this, you’ll use `SCNSceneRendererDelegate` and put your\
    \ game logic into `renderer.didSimulatePhysicsAtTime`. In Figure [13-1](#A330720_2_En_13_Chapter.html#Fig1),\
    \ you can see this is one of the last times before the scene is drawn for you\
    \ to make adjustments to the scene on a per-frame basis. For you to receive these\
    \ delegate notifications, you’ll need to add `SCNSceneRendererDelegate` to your\
    \ class declaration:\n\n```\nclass GameViewController: UIViewController, SCNSceneRendererDelegate\
    \ {\n```\n\nNow that you have the delegate, you need to assign it to an object\
    \ that will handle the functions. In this case, you’ll use the `GameViewController`\
    \ self as the delegate. Add the following line of code in the `viewDidLoad()`\
    \ function after the `sceneView` is declared:\n\n```\nsceneView.delegate = self\n\
    ```\n\n## Writing the Callback Delegate Function\n\nNow you’ll create the delegate\
    \ function to get the callback from the SceneKit framework for every frame. Listing\
    \ [13-2](#A330720_2_En_13_Chapter.html#Par22) shows the code you need in order\
    \ to get this callback, and then you’ll get the `touchCount` from the `GameView`\
    \ in order to move the hero in one direction.\n\n```\nfunc renderer(aRenderer:\
    \ SCNSceneRenderer, didSimulatePhysicsAtTime time: TimeInterval) {\n    let moveDistance\
    \ = Float(10.0)\n    let moveSpeed = TimeInterval(1.0)\n    let heroNode = mainScene.rootNode.childNode(withName:\
    \ \"hero\", recursively: true)\n    let currentX =  heroNode?.position.x\n   \
    \ let currentY =  heroNode?.position.y\n    let currentZ =  heroNode?.position.z\n\
    \    if touchCount == 1 {\n        let action = SCNAction.move(to: SCNVector3(currentX!,\
    \ currentY!, currentZ! - moveDistance), duration: moveSpeed);\n        heroNode?.runAction(action)\n\
    \    }\n    else if touchCount == 2 {\n        let action = SCNAction.move(to:\
    \ SCNVector3(currentX!, currentY!, currentZ! + moveDistance), duration: moveSpeed)\n\
    \        heroNode?.runAction(action)\n    }\n    else if touchCount == 4 {\n \
    \       let action = SCNAction.move(to: SCNVector3(0, 0, 0), duration: moveSpeed)\n\
    \        heroNode?.runAction(action)\n    }\n    positionCameraWithSpaceman()\n\
    }\n```\n\nListing 13-2. Render Delegate Method\n\nThat was a lot of code, but\
    \ you’re doing several things in this function. You’re also getting an error about\
    \ a missing method, `positionCameraWithSpaceman`—don’t worry about that right\
    \ now because you’ll add that method soon:\n\n* The first part of this code creates\
    \ a few convenience variables to hold the current location of your spaceman as\
    \ well as a couple of variables to control the speed and distance in which the\
    \ spaceman will move during a render cycle.\n* Based on the touch count, you move\
    \ him either forward the `moveDistance` value or backward the `moveDistance` value.\
    \ Feel free to add some “Easter eggs” for your user to find, like that 11-touch\
    \ gesture.\n\n## Moving the Camera\n\nNow that you have your spaceman moving,\
    \ you need to move the camera with him to keep him in the frame. You’ll create\
    \ the missing method `positionCameraWithSpaceman`, as in Listing [13-3](#A330720_2_En_13_Chapter.html#Par27).\n\
    \n```\nfunc positionCameraWithSpaceman() {\n    let heroNode =  mainScene.rootNode.childNode(withName:\
    \ \"hero\", recursively: true)?.presentation\n    let spacemanPosition = heroNode?.position\n\
    \    let cameraDamping:Float = 0.3\n    let targetPosition =  SCNVector3((spacemanPosition?.x)!,\
    \ 30.0, (spacemanPosition?.z)! + 20.0)\n    let cameraNode =  mainScene.rootNode.childNode(withName:\
    \ \"mainCamera\", recursively: true)\n    var cameraPosition = cameraNode?.position\n\
    \    let cameraXPos = cameraPosition!.x * (1.0 - cameraDamping) + targetPosition.x\
    \ * cameraDamping\n    let cameraYPos = cameraPosition!.y * (1.0 - cameraDamping)\
    \ + targetPosition.y * cameraDamping\n    let cameraZPos = cameraPosition!.z *\
    \ (1.0 - cameraDamping) + targetPosition.z * cameraDamping\n    cameraPosition\
    \ = SCNVector3(x: cameraXPos, y: cameraYPos, z: cameraZPos)\n    cameraNode?.position\
    \ = cameraPosition!\n}\n```\n\nListing 13-3. `positionCameraWithHero()`\n\n* You\
    \ get the hero node using the `presentationNode()` method so you can get his current\
    \ position.\n* Next, using a little math and the `SCNVector3` initializer, you\
    \ position the camera above and behind the spaceman.\n* While you’re here, you’ll\
    \ light him up so he’s the star of the game.\n\nNow would be a good time to start\
    \ up the game and check your progress. Once the game starts, notice that when\
    \ you touch the screen, your hero moves forward some distance. Next, when you\
    \ touch with two fingers, your hero moves backward a certain distance. This is\
    \ great, but now you need to have your hero move left and right as well. For this\
    \ you’ll use the accelerometer to capture the tilting of the device. Because this\
    \ book is for SceneKit beginners, we won’t go into too much detail about the CoreMotion\
    \ framework; however, you’ll use that framework to access the device’s accelerometer.\
    \ If you want to learn more about the CoreMotion framework, the Apple documents\
    \ (https://developer.apple.com/library/content/navigation/) are a good place to\
    \ start.\n\n## Introducing CoreMotion Framework"
  raw: '## GameView: Moving the Hero


    Start by overriding the GameViewController’s touchesBegan and touchesEnded methods.
    In Listing [13-1](#A330720_2_En_13_Chapter.html#Par13), you can see that you’re
    overriding the touchesBegan method and the touchesEnded method. override func
    touchesBegan(_ touches: Set<UITouch>, with event: UIEvent?) {     let taps = event?.allTouches
        touchCount = taps?.count } override func touchesEnded(_ touches: Set<UITouch>,
    with event: UIEvent?) {     touchCount = 0 } Listing 13-1. GameViewController.swift
    Here you’re overriding the base function touchesBegan . You’ll capture the touches
    that occur and assign them to the class variable touchCount. After the user releases
    the touch, you have to set the count to zero—otherwise, your poor hero would always
    be running. Now, go fix that error on the touchCount. At the top of the class
    add in the variable: var touchCount: Int?. You’ll use the render method in the
    GameViewController to read the touchCount variable in order to move the hero a
    direction based on how many touches occur during the render cycle of the render
    loop. Now that you have the code in place to capture a touch, you need to put
    it somewhere where you can get the update from the scene. To do this, you’ll use
    SCNSceneRendererDelegate and put your game logic into renderer.didSimulatePhysicsAtTime.
    In Figure [13-1](#A330720_2_En_13_Chapter.html#Fig1), you can see this is one
    of the last times before the scene is drawn for you to make adjustments to the
    scene on a per-frame basis. For you to receive these delegate notifications, you’ll
    need to add SCNSceneRendererDelegate to your class declaration: class GameViewController:
    UIViewController, SCNSceneRendererDelegate { Now that you have the delegate, you
    need to assign it to an object that will handle the functions. In this case, you’ll
    use the GameViewController self as the delegate. Add the following line of code
    in the viewDidLoad() function after the sceneView is declared: sceneView.delegate
    = self


    ### Writing the Callback Delegate Function


    Now you’ll create the delegate function to get the callback from the SceneKit
    framework for every frame. Listing [13-2](#A330720_2_En_13_Chapter.html#Par22)
    shows the code you need in order to get this callback, and then you’ll get the
    touchCount from the GameView in order to move the hero in one direction. func
    renderer(aRenderer: SCNSceneRenderer, didSimulatePhysicsAtTime time: TimeInterval)
    {     let moveDistance = Float(10.0)     let moveSpeed = TimeInterval(1.0)     let
    heroNode = mainScene.rootNode.childNode(withName: "hero", recursively: true)     let
    currentX =  heroNode?.position.x     let currentY =  heroNode?.position.y     let
    currentZ =  heroNode?.position.z     if touchCount == 1 {         let action =
    SCNAction.move(to: SCNVector3(currentX!, currentY!, currentZ! - moveDistance),
    duration: moveSpeed);         heroNode?.runAction(action)     }     else if touchCount
    == 2 {         let action = SCNAction.move(to: SCNVector3(currentX!, currentY!,
    currentZ! + moveDistance), duration: moveSpeed)         heroNode?.runAction(action)
        }     else if touchCount == 4 {         let action = SCNAction.move(to: SCNVector3(0,
    0, 0), duration: moveSpeed)         heroNode?.runAction(action)     }     positionCameraWithSpaceman()
    } Listing 13-2. Render Delegate Method That was a lot of code, but you’re doing
    several things in this function. You’re also getting an error about a missing
    method, positionCameraWithSpaceman—don’t worry about that right now because you’ll
    add that method soon:


    *   The first part of this code creates a few convenience variables to hold the
    current location of your spaceman as well as a couple of variables to control
    the speed and distance in which the spaceman will move during a render cycle.

    *   Based on the touch count, you move him either forward the moveDistance value
    or backward the moveDistance value. Feel free to add some “Easter eggs” for your
    user to find, like that 11-touch gesture.


    ### Moving the Camera


    Now that you have your spaceman moving, you need to move the camera with him to
    keep him in the frame. You’ll create the missing method positionCameraWithSpaceman,
    as in Listing [13-3](#A330720_2_En_13_Chapter.html#Par27). func positionCameraWithSpaceman()
    {     let heroNode =  mainScene.rootNode.childNode(withName: "hero", recursively:
    true)?.presentation     let spacemanPosition = heroNode?.position     let cameraDamping:Float
    = 0.3     let targetPosition =  SCNVector3((spacemanPosition?.x)!, 30.0, (spacemanPosition?.z)!
    + 20.0)     let cameraNode =  mainScene.rootNode.childNode(withName: "mainCamera",
    recursively: true)     var cameraPosition = cameraNode?.position     let cameraXPos
    = cameraPosition!.x * (1.0 - cameraDamping) + targetPosition.x * cameraDamping
        let cameraYPos = cameraPosition!.y * (1.0 - cameraDamping) + targetPosition.y
    * cameraDamping     let cameraZPos = cameraPosition!.z * (1.0 - cameraDamping)
    + targetPosition.z * cameraDamping     cameraPosition = SCNVector3(x: cameraXPos,
    y: cameraYPos, z: cameraZPos)     cameraNode?.position = cameraPosition! } Listing
    13-3. positionCameraWithHero( )


    *   You get the hero node using the presentationNode () method so you can get
    his current position.

    *   Next, using a little math and the SCNVector3 initializer, you position the
    camera above and behind the spaceman.

    *   While you’re here, you’ll light him up so he’s the star of the game.


    Now would be a good time to start up the game and check your progress. Once the
    game starts, notice that when you touch the screen, your hero moves forward some
    distance. Next, when you touch with two fingers, your hero moves backward a certain
    distance. This is great, but now you need to have your hero move left and right
    as well. For this you’ll use the accelerometer to capture the tilting of the device.
    Because this book is for SceneKit beginners, we won’t go into too much detail
    about the CoreMotion framework; however, you’ll use that framework to access the
    device’s accelerometer. If you want to learn more about the CoreMotion framework,
    the Apple documents ([https://developer.apple.com/library/content/navigation/](https://developer.apple.com/library/content/navigation/))
    are a good place to start.


    ## Introducing CoreMotion Framework'
  trans: "\n# `GameView`：移动英雄\n\n首先，重写 `GameViewController` 的 `touchesBegan` 和 `touchesEnded`\
    \ 方法。在代码清单 13-1 中，你会看到正在重写 `touchesBegan` 方法和 `touchesEnded` 方法。\n\n```\noverride\
    \ func touchesBegan(_ touches: Set<UITouch>, with event: UIEvent?) {\n    let\
    \ taps = event?.allTouches\n    touchCount = taps?.count\n}\noverride func touchesEnded(_\
    \ touches: Set<UITouch>, with event: UIEvent?) {\n    touchCount = 0\n}\n```\n\
    \n代码清单 13-1 `GameViewController.swift`\n\n这里你重写了基类函数 `touchesBegan`。你将捕获发生的触摸并将其赋值给类变量\
    \ `touchCount`。当用户松开触摸后，必须将计数设为零——否则，你可怜的英雄会一直奔跑。现在，去修复 `touchCount` 上的那个错误。在类的顶部添加变量：`var\
    \ touchCount: Int?`。你将使用 `GameViewController` 中的 `render` 方法来读取 `touchCount` 变量，以便根据在渲染循环的一个渲染周期内发生的触摸次数，将英雄移向某个方向。\n\
    \n既然你已经有了捕获触摸的代码，就需要把它放在一个可以从场景中获取更新的地方。为此，你将使用 `SCNSceneRendererDelegate`，并将游戏逻辑放入\
    \ `renderer.didSimulatePhysicsAtTime` 中。在图 13-1 中，你可以看到这是在场景绘制前允许你基于逐帧对场景进行调整的最后几次机会之一。为了接收这些委托通知，你需要将\
    \ `SCNSceneRendererDelegate` 添加到你的类声明中：\n\n```\nclass GameViewController: UIViewController,\
    \ SCNSceneRendererDelegate {\n```\n\n既然你已拥有委托，就需要将其分配到一个能处理这些函数的对象上。在这里，你将使用 `GameViewController`\
    \ 自身作为委托。在 `viewDidLoad()` 函数中声明 `sceneView` 之后，添加以下代码行：\n\n```\nsceneView.delegate\
    \ = self\n```\n\n## 编写回调委托函数\n\n现在你将创建委托函数，以便从 SceneKit 框架中获取每一帧的回调。代码清单 13-2\
    \ 展示了获取此回调所需的代码，然后你将从 `GameView` 中获取 `touchCount`，以便将英雄移向一个方向。\n\n```\nfunc renderer(aRenderer:\
    \ SCNSceneRenderer, didSimulatePhysicsAtTime time: TimeInterval) {\n    let moveDistance\
    \ = Float(10.0)\n    let moveSpeed = TimeInterval(1.0)\n    let heroNode = mainScene.rootNode.childNode(withName:\
    \ \"hero\", recursively: true)\n    let currentX =  heroNode?.position.x\n   \
    \ let currentY =  heroNode?.position.y\n    let currentZ =  heroNode?.position.z\n\
    \    if touchCount == 1 {\n        let action = SCNAction.move(to: SCNVector3(currentX!,\
    \ currentY!, currentZ! - moveDistance), duration: moveSpeed);\n        heroNode?.runAction(action)\n\
    \    }\n    else if touchCount == 2 {\n        let action = SCNAction.move(to:\
    \ SCNVector3(currentX!, currentY!, currentZ! + moveDistance), duration: moveSpeed)\n\
    \        heroNode?.runAction(action)\n    }\n    else if touchCount == 4 {\n \
    \       let action = SCNAction.move(to: SCNVector3(0, 0, 0), duration: moveSpeed)\n\
    \        heroNode?.runAction(action)\n    }\n    positionCameraWithSpaceman()\n\
    }\n```\n\n代码清单 13-2 渲染委托方法\n\n代码量很大，但在这个函数中你做了几件事。你还会看到一个关于缺失方法 `positionCameraWithSpaceman`\
    \ 的错误——现在不必担心，因为你很快就会添加这个方法：\n\n* 代码的第一部分创建了几个便捷变量，用来保存你的宇航员的当前位置，以及几个用来控制宇航员在一个渲染周期内移动速度和距离的变量。\n\
    * 根据触摸次数，你让他向前或向后移动 `moveDistance` 值。你可以随意添加一些供用户发现的“彩蛋”，比如那个 11 指触摸手势。\n\n##\
    \ 移动摄像机\n\n既然你的宇航员已经开始移动，你需要让摄像机跟随他以使其保持在画面中。你将创建缺失的方法 `positionCameraWithSpaceman`，如代码清单\
    \ 13-3 所示。\n\n```\nfunc positionCameraWithSpaceman() {\n    let heroNode =  mainScene.rootNode.childNode(withName:\
    \ \"hero\", recursively: true)?.presentation\n    let spacemanPosition = heroNode?.position\n\
    \    let cameraDamping:Float = 0.3\n    let targetPosition =  SCNVector3((spacemanPosition?.x)!,\
    \ 30.0, (spacemanPosition?.z)! + 20.0)\n    let cameraNode =  mainScene.rootNode.childNode(withName:\
    \ \"mainCamera\", recursively: true)\n    var cameraPosition = cameraNode?.position\n\
    \    let cameraXPos = cameraPosition!.x * (1.0 - cameraDamping) + targetPosition.x\
    \ * cameraDamping\n    let cameraYPos = cameraPosition!.y * (1.0 - cameraDamping)\
    \ + targetPosition.y * cameraDamping\n    let cameraZPos = cameraPosition!.z *\
    \ (1.0 - cameraDamping) + targetPosition.z * cameraDamping\n    cameraPosition\
    \ = SCNVector3(x: cameraXPos, y: cameraYPos, z: cameraZPos)\n    cameraNode?.position\
    \ = cameraPosition!\n}\n```\n\n代码清单 13-3 `positionCameraWithHero()`\n\n* 你使用 `presentationNode()`\
    \ 方法获取英雄节点，以便得到他的当前位置。\n* 接着，通过一点数学计算和 `SCNVector3` 初始化器，你将摄像机定位在宇航员的上方和后方。\n\
    * 与此同时，你会给他打光，使他成为游戏中的明星。\n\n现在是时候启动游戏并检查你的进展了。游戏启动后，注意当你触摸屏幕时，你的英雄会向前移动一定距离。接着，当你用两根手指触摸时，你的英雄会向后移动一定距离。这很棒，但现在你需要让你的英雄也能左右移动。为此，你将使用加速度计来捕捉设备的倾斜。由于本书面向\
    \ SceneKit 初学者，我们不会深入讲解 CoreMotion 框架的细节；不过，你将使用该框架来访问设备的加速度计。如果你想了解更多关于 CoreMotion\
    \ 框架的信息，苹果文档（https://developer.apple.com/library/content/navigation/）是一个不错的起点。\n\
    \n## 介绍 CoreMotion 框架\n"
- fmt: "下一步是导入`CoreMotion`框架到你的`GameViewController`类中，使用`import CoreMotion`。导入`CoreMotion`后，你可以创建另一个类级别的变量来存储`CoreMotion`管理器。这样做的原因是，一旦设置好`CoreMotion`管理器，你将创建一个在后台运行并检测加速度计运动的`NSOperationQueue`。在类声明之后，添加`var\
    \ motionManager: CMMotionManager`。现在，你可以创建一个方法来设置加速度计并捕获其输入，如代码清单[13-4](#A330720_2_En_13_Chapter.html#Par35)所示。\n\
    \n```\nfunc setupAccelerometer() {\n    // Create the motion manager to receive\
    \ the input\n    let motionManager = CMMotionManager()\n    if motionManager.isAccelerometerAvailable\
    \ {\n        motionManager.accelerometerUpdateInterval = 1/60.0\n        motionManager.startAccelerometerUpdates(to:\
    \ OperationQueue()) {\n            (data, error) in\n            let heroNode\
    \ = self.mainScene.rootNode.childNode(withName: \"hero\", recursively: true)?.presentation\n\
    \            // Get the current location.\n            let currentX = heroNode?.position.x\n\
    \            let currentY = heroNode?.position.y\n            let currentZ = heroNode?.position.z\n\
    \            let threshold = 0.20\n            // Moving right\n            if\
    \ (data?.acceleration.y)! < -threshold {\n                let destinationX = (Float((data?.acceleration.y)!)\
    \ * 10.0 + Float(currentX!))\n                let destinationY = Float(currentY!)\n\
    \                let destinationZ = Float(currentZ!)\n                let action\
    \ = SCNAction.move(to: SCNVector3(destinationX, destinationY, destinationZ), duration:\
    \ 1)\n                heroNode?.runAction(action)\n            }\n           \
    \ else if (data?.acceleration.y)! > threshold {\n                let destinationX\
    \ = (Float((data?.acceleration.y)!) * 10.0 + Float(currentX!))\n             \
    \   let destinationY = Float(currentY!)\n                let destinationZ = Float(currentZ!)\n\
    \                let action = SCNAction.move(to: SCNVector3(destinationX, destinationY,\
    \ destinationZ), duration: 1)\n                heroNode?.runAction(action)\n \
    \           }\n        }\n    }\n}\n```\n\n**代码清单13-4.** `setupAccelerometer`函数\n\
    \n现在你已经创建了这个函数，可以更仔细地看看这里发生了什么。首先，你创建了一个`CMMotionManager`，这是进入`CoreMotion`框架的入口之一。然后，你检查设备是否有加速度计。如果不做这个检查就直接运行代码，一旦尝试使用管理器就会崩溃。此外，一些设备（如较老的iPod）没有加速度计。记住，你的游戏和应用程序可以运行在几乎任何iOS设备上。\n\
    \n确认有加速度计后，你需要设置更新间隔。在某些游戏中，你可能希望间隔更慢或更快。对于这个游戏，你将每秒更新60次（即每1/60秒更新一次）。由于更新频率很高，你不想占用游戏的主循环，因此创建了一个更新队列。这个队列接收一个闭包，并在每次加速度计更新时调用此函数。\n\
    \n当函数被调用时，你创建了一些变量来存储英雄的当前位置。为了简化，你检查y轴是否发生了特定量的变化。负方向变化表示用户向右倾斜了设备，因此需要将英雄向右移动；正方向变化表示用户向左倾斜了设备。这里使用了`0.20`作为阈值，如果你想要更精细的调整，可以减小这个数值。利用这些信息，你为英雄创建了一个移动一定距离的动画。\n\
    \n剩下的唯一事情就是将`setupAccelerometer()`调用添加到`GameViewController`的`viewDidLoad()`方法中。完成所有这些后，又是一个运行游戏并查看成果的好时机。当英雄可以通过触摸设备移动时，向左或向右倾斜设备，你会看到英雄朝对应方向移动。你可以调整一些变量让他移动得更快或更慢。你应该返回并修改渲染函数中的`moveDistance`，看看这对移动有何影响。同时，调整`setupAccelerometer`函数中的`threshold`，观察设备响应如何变化。\n\
    \n## 总结\n\n在本章中，你做了大量工作来让太空人移动起来。你还让太空人与物体发生碰撞，而不是穿过它们。在下一章中，你将研究碰撞协议来更新分数，并对可收集物品进行一些动画处理。©\
    \ James Goodwill and Wesley Matlock 2017 James Goodwill and Wesley Matlock, *Beginning\
    \ Swift Games Development for iOS*, 10.1007/978-1-4842-2310-9_14\n\n# 14. 碰撞检测\n\
    \nJames Goodwill^(1) and Wesley Matlock²\n\n(1) 美国科罗拉多州海兰兹牧场  \n(2) 美国密苏里州堪萨斯城\n\
    \n现在你已经让角色在屏幕上移动，接下来需要一种方法来确定英雄何时找到可收集物品。为此，你将使用碰撞检测来知道不同节点何时相互接触。\n\n## 碰撞检测\n\
    \n现在英雄可以四处移动，并且场景中有多个可收集物品，你需要确定英雄何时与其中一个碰撞。`SceneKit`使用`SCNPhysicsBody`对象为节点添加物理模拟。在渲染场景期间，`SceneKit`会准备执行物理计算的帧。这些计算包括重力、摩擦以及与其他节点的碰撞。\n\
    \n`SCNPhysicsBody`类有几个属性，你需要为每个`SCNNode`设置这些属性才能检测碰撞。首先，你将物理体设置到英雄节点上。由于节点是通过`createMainScene`方法中的`let\
    \ mainScene = SCNScene(named: \"art.scnassets/hero.dae\")`调用加载到场景中的，因此你将从这里开始。在`return`语句之前，向该方法添加以下代码行：\n\
    \n```\nlet heroNode = mainScene.rootNode.childNode(withName: \"hero\", recursively:\
    \ true)\nheroNode?.physicsBody = SCNPhysicsBody(type: .dynamic, shape: nil)\n\
    ```\n\n首先，你从主场景中获取了英雄节点。然后，将物理体设置到节点上。`SceneKit`有三种不同类型的物理体：\n\n*   **静态（Static）**：这种类型的物理体不受力或碰撞的影响。你将用它来设置地板、障碍物和墙壁，因为它们会与其他物体碰撞，但自身不会移动。\n\
    *   **动态（Dynamic）**：这种类型的物理体受力或碰撞的影响。你将用它来设置太空人和敌人。\n*   **运动（Kinematic）**：这种类型不受力或碰撞的影响，但可以在物理世界中引发碰撞。你不会用到这种类型，但它可以用于一个不可见的节点，该节点代表用户触摸物体时的手指。"
