  trans: "\n# 摘要\n\n在本章中，你做了大量工作让太空人动起来。现在，太空人能够与物体发生碰撞，而不是直接穿过它们。至此，捉迷藏游戏已接近完成。在第\
    \ 15 章中，你将使用这个碰撞协议来更新分数。即将创建的记分板将位于 SpriteKit 视图中。这样一来，你就能了解如何将 SpriteKit 视图与\
    \ SceneKit 场景结合使用。© James Goodwill 和 Wesley Matlock 2017，James Goodwill 和 Wesley\
    \ Matlock，《Beginning Swift Games Development for iOS》10.1007/978-1-4842-2310-9_15\n\
    \n# 15. SceneKit 与 SpriteKit 的交互\n\nJames Goodwill¹ 与 Wesley Matlock² (1) 美国科罗拉多州海兰兹牧场\
    \ (2) 美国密苏里州堪萨斯城\n\n在前面的章节中，你一直在 SceneKit 框架下工作；不过，苹果提供了一种方式，让你可以添加一个 2D 场景作为\
    \ 3D 场景的叠加层。在本章中，你将添加一个 2D 场景，用于计时器，以便追踪你和你朋友找到并捕获敌人的耗时。\n\n## SpriteKit 集成\n\n\
    SceneKit 提供了一个属性来添加 SpriteKit 场景：`var overlaySKScene: SKScene! { get set }`。此属性可以渲染一个\
    \ 2D 场景，并将其覆盖在 SceneKit 场景之上。为了提供更好的性能，SceneKit 和 SpriteKit 使用相同的 OpenGL 上下文和资源来渲染场景。对于这个游戏，你将在场景顶部添加一个记分板。首先，创建一个新的\
    \ Swift 文件，并将其命名为 `GameOverlay.swift`。文件创建完成后，你需要导入 SceneKit 和 SpriteKit：\n\n\
    ```\nimport SceneKit\nimport SpriteKit\n\nclass GameOverlay: SKScene { }\n```\n\
    \n你的类应该类似于上面的代码片段。你的 `GameOverlay` 类是 `SKScene` 的子类，这看起来应该和前面章节类似。在这个类中，你将添加一个节点用于显示分数，另一个节点用于记录玩家的生命值。首先，你需要创建一个变量来保存\
    \ `SKLabelNode` 对象。因为你将使用 `Date` 的时间间隔，所以还需要创建一个 `NumberFormatter`：\n\n```\nvar\
    \ timerNode: SKLabelNode!\nvar scoreNode: SKLabelNode!\nvar timerFormat: NumberFormatter!\n\
    ```\n\n有了这些变量，你需要在使用它们之前进行初始化。列表 15-1 展示了重写后的 `init(size: CGSize)` 函数。\n\n```\n\
    override init(size: CGSize) {\n    super.init(size: size)\n    anchorPoint = CGPoint(x:\
    \ 0.5, y: 0.5)\n    scaleMode = .resizeFill\n    timerNode = SKLabelNode(fontNamed:\
    \ \"AvenirNext-Bold\")\n    timerNode.text = \"Time: 0.0\"\n    timerNode.fontColor\
    \ = .red\n    timerNode.horizontalAlignmentMode = .left\n    timerNode.verticalAlignmentMode\
    \ = .bottom\n    timerNode.position = CGPoint(x: -size.width/2 + 20, y: size.height/2\
    \ - 40)\n    timerNode.name = \"timer\"\n    addChild(timerNode)\n    timerFormat\
    \ = NumberFormatter()\n    timerFormat.numberStyle = .decimal\n    timerFormat.minimumFractionDigits\
    \ = 1\n    timerFormat.maximumFractionDigits = 1\n}\n```\n\n*列表 15-1. GameView.init*\n\
    \n在这个初始化函数中，你做了一些事情，在继续之前需要停下来看看。第一部分是创建 `SKLabelNode`，它将用于显示计时器的计时。你可以根据需要更改字体和颜色，使其更符合你的需求；不过，红色配铜板字体（Copperplate）在这个游戏中看起来相当不错。在\
    \ `SKLabelNode` 设置之后是 `NumberFomatter` 设置部分。`NumberFomatter` 允许你将数字表示为 `String`\
    \ 文本。你将设置一个小数位数，最多和最少都是一位。这样你就可以将计时器显示精确到十分之一秒。\n\n别忘了，你还需要重写必需的初始化器，如列表 15-2\
    \ 所示。\n\n```\nrequired init?(coder aDecoder: NSCoder) {\n    fatalError(\"init(coder:)\
    \ has not been implemented\")\n}\n```\n\n*列表 15-2. 必需初始化器*\n\n当游戏开始时，你需要启动计时器，以便用户知道他们多快能到达敌人身边。为此，你将创建一个用于启动计时器的函数，它会为玩家更新你的\
    \ `SKLabelNode`。列表 15-3 展示了用于此目的的 `startTimer()`。\n\n```\nfunc startTimer() {\n\
    \    let startTime = NSDate.timeIntervalSinceReferenceDate\n    let timerNode\
    \ = childNode(withName: \"timer\") as! SKLabelNode\n    let timerAction = SKAction.run({\
    \ () -> Void in\n        let now = NSDate.timeIntervalSinceReferenceDate\n   \
    \     let elapsedTime = TimeInterval( now - startTime )\n        let tempString\
    \ = String(format: \"%@\", self.timerFormat.string(from: NSNumber(value: elapsedTime))!)\n\
    \        timerNode.text = \"Time: \" + tempString\n    })\n    let startDelay\
    \ = SKAction.wait(forDuration: 0.5)\n    let timerDelay = SKAction.sequence([timerAction,\
    \ startDelay])\n    let timer = SKAction.repeatForever(timerDelay)\n    timerNode.run(timer,\
    \ withKey: \"timerAction\")\n}\n```\n\n*列表 15-3. GameOverlay.startTimer( )*\n\n\
    你需要添加到 `GameOverlay` 类的下一个函数是，当收集完所有可收集物品时停止计时器。如果你查看列表 15-4，会发现它相当简单。你将获取在 start\
    \ 函数中命名为 `timer` 的节点，然后使用一个名为 `timerAction` 的新函数停止该动作。\n\n```\nfunc stopTimer()\
    \ {\n    let timerNode = childNode(withName: \"timer\") as! SKLabelNode\n    timerNode.removeAction(forKey:\
    \ \"timerAction\")\n}\n```\n\n*列表 15-4. GameOverlay.stopTimer*\n\n至此，你的 `GameOverlay`\
    \ 类已经完成。现在你需要更新 `GameViewController` 以使用这个类，并将其放置在 3D SceneKit 场景之上。\n"
- fmt: "# Hooking Up the Controller to the Overlay\n\nYou have the `GameOverlay` class\
    \ complete, so now it’s time to connect it to the `GameViewController`. First,\
    \ you want to create a class-level variable that you’ll use to get access to the\
    \ `GameOverlay` class. Doing so, you’ll easily be able to call the methods to\
    \ start the timer. You’ll also need to create a Boolean that will be used to keep\
    \ track of the starting of the game:\n\n```\nvar gameOverlay: GameOverlay!\ngameStarted\
    \ = false\n```\n\nIn the `GameViewController` `viewDidLoad` function, add this\
    \ `GameOverlay` to the `SCNScene`. Doing so will allow the SceneKit framework\
    \ to overlay your `GameOverlay` onto the current scene:\n\n```\nsceneView.overlaySKScene\
    \ = GameOverlay(size: view.frame.size)\ngameOverlay = sceneView.overlaySKScene\
    \ as! GameOverlay\n```\n\nRight now is a good time to run your game and see the\
    \ overlay timer on top of the scene you’ve been working on. Once you run the game,\
    \ you should have a scene similar to Figure 15-1.\n\n![A330720_2_En_15_Fig1_HTML.jpg](OEBPS/A330720_2_En_15_Fig1_HTML.jpg)\n\
    \n**Figure 15-1.** Overlay scene with a timer\n\nNow that you have the overlay,\
    \ you need to start the timer when the user begins to move the spaceman. Because\
    \ you’ll be using the `touchCount` in the `sceneView` to start the timer, you’ll\
    \ want to also make sure your player hasn’t already started the game—otherwise,\
    \ the timer will always reset itself with every touch. After the `GameViewController`\
    \ class definition, you’ll add another variable that will be used as a flag for\
    \ when the game starts, and you’ll initialize it to false:\n\n```\nvar gameStarted\
    \ = false\n```\n\nNow when your player starts the game, you’ll set this to true\
    \ and then back to false at the end of the game. To accomplish that, you’ll need\
    \ to add some logic into the `didSimulatePhysicsAtTime` function in the `GameViewController`:\n\
    \n```\nfunc renderer(aRenderer: SCNSceneRenderer, didSimulatePhysicsAtTime time:\
    \ TimeInterval) {\n```\n\nIn this function, you’ll add Listing 15-5 at the top\
    \ of the function. This checks to see whether the user has touched the screen,\
    \ and if so it starts the timer and sets the `gameStarted` flag. You’ll use this\
    \ flag later in the code.\n\n```\nif touchCount > 0 && !gameStarted {\n    gameOverlay.startTimer()\n\
    \    gameStarted = true\n}\n```\n\n**Listing 15-5.** Start the Timer in the `didSimulatePhysicsAtTime`\
    \ Protocol\n\nThis time when you run the game, you’ll notice the timer start running\
    \ when you touch the device, as in Figure 15-2.\n\n![A330720_2_En_15_Fig2_HTML.jpg](OEBPS/A330720_2_En_15_Fig2_HTML.jpg)\n\
    \n**Figure 15-2.** Timer running\n\nThe last thing you need to do for the timer\
    \ is to call the `stopTimer()` method when you’ve collected all the collectibles.\
    \ The best place for that will be in the `SCNPhysicsWorld` `didBeginContact` protocol.\
    \ You’ll do a check after the switch statement to see if you have a score over\
    \ a certain amount—in this case, 50 points:\n\n```\nif gameOverlay.score >= 50\
    \ {\n    gameOverlay.stopTimer()\n}\n```\n\nThis time when you run the game and\
    \ maneuver the hero around collecting collectibles, the timer will stop when you’ve\
    \ achieved the score needed to move to the next level, as well as the time it\
    \ took you to get to this amount.\n\n## “Game Over” Screen\n\nYou have a working\
    \ game now, but wouldn’t it be nice to have a “Game Over” screen to show your\
    \ time and score and be able to restart the game? You’ll create another view that\
    \ will update the `sceneView.overlaySKScene` when the hero achieves the score.\
    \ Create a new Swift file called `GameOverView.swift` just as you’ve created in\
    \ the past. The `GameOverView` will look familiar—Listing 15-6 has the code you\
    \ need to put into the `GameOverView` class.\n\n```\nimport SpriteKit\n\nclass\
    \ GameOverView: SKScene {\n    required init?(coder aDecoder: NSCoder) {\n   \
    \     super.init(coder: aDecoder)\n    }\n\n    init(size: CGSize, score: String)\
    \ {\n        super.init(size: size)\n        backgroundColor = .red\n\n      \
    \  let backgroundNode = SKSpriteNode(imageNamed: \"GameOverBackground\")\n   \
    \     backgroundNode.anchorPoint = CGPoint(x: 0.5, y: 0.0)\n        backgroundNode.position\
    \ = CGPoint(x: 160.0, y: 0.0)\n        addChild(backgroundNode)\n\n        let\
    \ scoreTextNode = SKLabelNode(fontNamed: \"Copperplate\")\n        scoreTextNode.text\
    \ = \"SCORE :  \\(score)\"\n        scoreTextNode.horizontalAlignmentMode = .center\n\
    \        scoreTextNode.verticalAlignmentMode = .center\n        scoreTextNode.fontSize\
    \ = 20\n        scoreTextNode.fontColor = .white\n        scoreTextNode.position\
    \ = CGPoint(x: size.width / 2.0, y: size.height - 75.0)\n        addChild(scoreTextNode)\n\
    \n        let tryAgainText = SKLabelNode(fontNamed: \"Copperplate\")\n       \
    \ tryAgainText.text = \"TAP ANYWHERE TO PLAY AGAIN!\"\n        tryAgainText.horizontalAlignmentMode\
    \ = .center\n        tryAgainText.verticalAlignmentMode = .center\n        tryAgainText.fontSize\
    \ = 20\n        tryAgainText.fontColor = .white\n        tryAgainText.position\
    \ = CGPoint(x: size.width / 2.0, y: size.height - 200)\n        addChild(tryAgainText)\n\
    \    }\n}\n```\n\n**Listing 15-6.** `GameOverView`\n\nListing 15-7 shows the updated\
    \ `didBeginContact` method. The player makes contact with a collectible, and the\
    \ score is updated. Next, the time is stopped if the player has achieved the score\
    \ for the level. If this happens, you will then display the “game over” view to\
    \ the user.\n\n```\nif gameOverlay.score >= 50 {\n    gameOverlay.stopTimer()\n\
    \    sceneView.overlaySKScene = GameOverView(size: view.bounds.size, score: String(gameOverlay.score))\n\
    }\n```\n\n**Listing 15-7.** Score Check and Display Game Over Scene\n\nNow when\
    \ you run your game and you get to the enemy, the player will be shown a “game\
    \ over” view and their time. There’s one other item you need to deal with, and\
    \ that’s to update the `sceneView.overlaySKScene` to the original timer screen.\
    \ To restart the player, just touch anywhere on the screen in order to restart\
    \ the game, as shown in Figure 15-3.\n\n![A330720_2_En_15_Fig3_HTML.jpg](OEBPS/A330720_2_En_15_Fig3_HTML.jpg)\n\
    \n**Figure 15-3.** “Game over” screen\n\n## Summary\n\nNow you have an overlay\
    \ SpriteKit scene that has a timer, and you’re randomly placing the objects in\
    \ the scene. You can expand on this overlay scene and add more SpriteKit features\
    \ as you choose to for your games. You now have a simple game that has explored\
    \ Apple’s SceneKit library. You’ve learned what a scene graph is and how SceneKit\
    \ uses this graph to display 3D objects while using the GPU on the device. Try\
    \ running this game in the simulator instead of on the device, and you’ll see\
    \ how much the GPU improves performance.\n\n© James Goodwill and Wesley Matlock\
    \ 2017  \nJames Goodwill and Wesley Matlock, *Beginning Swift Games Development\
    \ for iOS*  \n10.1007/978-1-4842-2310-9_16\n\n# 16. SceneKit Editor\n\nJames Goodwill¹\
    \ and Wesley Matlock²  \n(1) Highlands Ranch, Colorado, USA  \n(2) Kansas City,\
    \ Missouri, USA\n\nNow that you have a basic understanding of how SceneKit works,\
    \ you can now use the render loop to create, control, and animate `SCNodes`. In\
    \ previous chapters, you’ve been using code to manipulate those objects. In this\
    \ chapter, you’ll learn how to do the same thing in the SceneKit Editor."
