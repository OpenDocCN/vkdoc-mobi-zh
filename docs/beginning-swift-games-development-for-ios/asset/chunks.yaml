    render loop has evaluated all the physics bodies in the scene. It’s possible that
    colliding with another node in the scene could have altered the player’s velocity
    along the x-axis, and this change should take place prior to altering the player’s
    velocity with the accelerometer. Although that can’t happen in this game—because
    the playerNode is the only dynamic volume in the game—it’s good to be aware of.
    Given that all the physics changes should be evaluated before the player’s velocity
    on the x-axis is modified, there is really only one place in the render that can
    process accelerometer changes, and that is in the render loop’s didSimulatePhysics()
    method . To override the current didSimulatePhysics(), add the following code
    to the bottom of the GameScene: override func didSimulatePhysics() {     if let
    accelerometerData = coreMotionManager.accelerometerData {         playerNode.physicsBody!.velocity
    =                 CGVector(dx: CGFloat(accelerometerData.acceleration.x * 380.0),
                                     dy: playerNode.physicsBody!.velocity.dy)     }
        if playerNode.position.x < -(playerNode.size.width / 2) {         playerNode.position
    =             CGPoint(x: size.width - playerNode.size.width / 2,                     y:
    playerNode.position.y);     }     else if playerNode.position.x > self.size.width
    {         playerNode.position = CGPoint(x: playerNode.size.width / 2,                                       y:
    playerNode.position.y);     } } Once you’ve added this code to the GameScene,
    save it and this time run the app on your physical iPhone. (The simulator doesn’t
    simulate accelerometer activity.) When the app is running on your device, tap
    the screen and try to collect all the orbNodes. Remember, the more orbs you collect,
    the more impulses the player will have to keep going. Once you’ve played around
    with the accelerometer a bit, let’s look at the code you just added. The first
    line is where the playerNode’s velocity is changed. This is done by creating a
    new vector with the most recent accelerometer x-acceleration value multiplied
    by 380.0 as the x-value, then using the player’s current velocity along the y-axis,
    and finally making this the player’s new overall velocity. After the player’s
    velocity is modified, there are two if statements to determine whether the player
    is flying off the scene either to the left or to the right. If either of these
    two conditions occurs, the player is moved to the opposite side of the scene.
    Notice when the location of the playerNode is tested, the test is checking to
    see whether half the playerNode is off the scene. This is done because the playerNode’s
    anchor point is (0.5, 0.5). There’s one last change that needs to be made: turning
    off accelerometer updates when the GameScene is no longer used. To do that, add
    the following deinit() method to the bottom of the GameScene and save your changes:
    deinit {     coreMotionManager.stopAccelerometerUpdates() }


    ## Summary


    In this chapter you started to add some real functionality to your game. You began
    by making some small restructuring changes to the beginning of the game. Then
    you added additional orbNodes to collide with. After adding the new orbNodes,
    you added scrolling to your game scene, making it look like the player was flying
    through space collecting orbs. Finally, you closed out the chapter using the phone’s
    accelerometer to move the player along the x-axis. In the next chapter, you will
    continue adding new game elements as well as start animating your SKSpriteKitNodes.
    That is the chapter where you will start turning your game into a real, playable
    game.© James Goodwill and Wesley Matlock 2017 James Goodwill and Wesley MatlockBeginning
    Swift Games Development for iOS10.1007/978-1-4842-2310-9_5


    # 5. Adding Actions and Animations


    James Goodwill^(1 ) and Wesley Matlock² (1) Highlands Ranch, Colorado, USA (2)
    Kansas City, Missouri, USA   In this chapter, you will refactor the orb node’s
    layout one last time with the goal of enhancing playability. After that, we’ll
    show you how you can use SKActions to move an SKSpriteNode back and forth across
    the scene and then make that same node rotate forever. We close out the chapter
    with a look at how you can add colorizing effects to an SKSpriteNode using a colorize
    action.'
  trans: "\n# 添加加速计控制\n\n在上一节中，当下一组需要玩家向上继续前进的能量球位于右侧 50 个点处时，玩家遇到了无法水平移动而无法触及它们的问题。现在，你将通过使用手机的加速计来控制玩家沿\
    \ x 轴的运动来解决这个问题。\n\n要在你的游戏中使用加速计，首先需要将 `CoreMotion` 框架添加到你的 `GameScene` 中。为此，请在\
    \ `GameScene.swift` 文件的顶部添加以下导入语句：\n\n```swift\nimport CoreMotion\n```\n\n之后，你需要添加一个新的属性。该属性将保存一个\
    \ `CMMotionManager` 对象的实例，该对象用于监测水平移动。在之前添加的 `impulseCount` 变量之后，直接将该变量添加到 `GameScene`\
    \ 中：\n\n```swift\nlet coreMotionManager = CMMotionManager()\n```\n\n这段代码创建了一个\
    \ `CMMotionManager` 的实例，并将其存储在常量 `coreMotionManager` 中。我们稍微讨论一下 `CMMotionManager`\
    \ 的作用。`CMMotionManager` 对象是用于访问 iOS 提供的运动服务的对象。这些服务包括访问加速计、磁力计、旋转速率和其他设备运动传感器。你特别感兴趣的是设备沿\
    \ x 轴的加速度。这些信息通过使用加速计来访问。\n\n你将使用 `CMMotionManager` 让加速计以特定时间间隔更新当前设备加速度给应用程序。实现此功能的代码如下所示：\n\
    \n```swift\ncoreMotionManager.accelerometerUpdateInterval = 0.3\ncoreMotionManager.startAccelerometerUpdates()\n\
    ```\n\n花点时间看看这段代码。第一行告诉 `coreMotionManager` 加速计将用于更新应用程序当前加速度的时间间隔（以秒为单位）。该值设置为\
    \ 0.3 秒，提供了相当平滑的更新速率。你可以尝试调整此值，看看它如何影响应用程序。第二行代码实际启动了加速计更新。\n\n继续将此代码添加到 `GameScene`\
    \ 的 `touchesBegan()` 方法中，放在 `playerNode.physicsBody.dynamic` 属性设置为 `true` 之后。修改后的\
    \ `touchesBegan()` 方法如下所示：\n\n```swift\noverride func touchesBegan(_ touches:\
    \ Set<UITouch>, with event: UIEvent?) {\n    if !playerNode.physicsBody!.isDynamic\
    \ {\n        playerNode.physicsBody?.isDynamic = true\n        coreMotionManager.accelerometerUpdateInterval\
    \ = 0.3\n        coreMotionManager.startAccelerometerUpdates()\n    }\n    if\
    \ impulseCount > 0 {\n        playerNode.physicsBody!.applyImpulse(CGVector(dx:\
    \ 0.0, dy: 40.0))\n        impulseCount -= 1\n    }\n}\n```\n\n现在是时候利用这些信息做点什么了。起初，使用\
    \ `update()` 方法似乎是使用这些数据的逻辑选择，但 `update()` 方法是在渲染循环评估场景中所有物理体之前调用的。场景中与其他节点的碰撞可能会改变玩家沿\
    \ x 轴的速度，而这种改变应该在使用加速计改变玩家速度之前发生。尽管在这个游戏中不会发生这种情况——因为 `playerNode` 是游戏中唯一的动态体积——但了解这一点是有好处的。\n\
    \n考虑到所有物理变化应该在玩家 x 轴速度被修改之前进行评估，渲染过程中实际上只有一个地方可以处理加速计的变化，那就是在渲染循环的 `didSimulatePhysics()`\
    \ 方法中。要重写当前的 `didSimulatePhysics()`，请在 `GameScene` 的底部添加以下代码：\n\n```swift\noverride\
    \ func didSimulatePhysics() {\n    if let accelerometerData = coreMotionManager.accelerometerData\
    \ {\n        playerNode.physicsBody!.velocity =\n                CGVector(dx:\
    \ CGFloat(accelerometerData.acceleration.x * 380.0),\n                       \
    \  dy: playerNode.physicsBody!.velocity.dy)\n    }\n    if playerNode.position.x\
    \ < -(playerNode.size.width / 2) {\n        playerNode.position =\n          \
    \  CGPoint(x: size.width - playerNode.size.width / 2,\n                    y:\
    \ playerNode.position.y);\n    }\n    else if playerNode.position.x > self.size.width\
    \ {\n        playerNode.position = CGPoint(x: playerNode.size.width / 2,\n   \
    \                                   y: playerNode.position.y);\n    }\n}\n```\n\
    \n将这段代码添加到 `GameScene` 后，保存文件，然后这次在你的实体 iPhone 上运行应用程序。（模拟器不模拟加速计活动。）当应用程序在你的设备上运行时，点击屏幕并尝试收集所有的\
    \ `orbNode`。请记住，你收集的能量球越多，玩家可用的脉冲就越多，以便继续前进。\n\n在稍微尝试了一下加速计之后，让我们看看你刚才添加的代码。第一行是改变\
    \ `playerNode` 速度的地方。这是通过创建一个新的向量来实现的，该向量的 x 值是最新的加速计 x 轴加速度值乘以 `380.0`，y 值是玩家当前的\
    \ y 轴速度，最后将其设置为玩家的新整体速度。\n\n修改玩家的速度后，有两个 `if` 语句用于判断玩家是否飞出了场景的左侧或右侧。如果发生这两种情况中的任何一种，玩家将被移动到场景的另一边。请注意，当测试\
    \ `playerNode` 的位置时，检查的是 `playerNode` 的一半是否离开了场景。这样做是因为 `playerNode` 的锚点是 `(0.5,\
    \ 0.5)`。\n\n还有最后一个需要修改的地方：当不再使用 `GameScene` 时，关闭加速计更新。为此，在 `GameScene` 的底部添加以下\
    \ `deinit()` 方法并保存你的更改：\n\n```swift\ndeinit {\n    coreMotionManager.stopAccelerometerUpdates()\n\
    }\n```\n\n## 总结\n\n在本章中，你开始为你的游戏添加一些真正的功能。首先，你对游戏开始部分做了一些小的结构重组。然后，你添加了更多的 `orbNode`\
    \ 以进行碰撞。添加新的 `orbNode` 后，你为游戏场景添加了滚动效果，使其看起来像玩家在太空中飞行收集能量球。最后，你通过使用手机的加速计来控制玩家沿\
    \ x 轴移动，结束了本章。在下一章中，你将继续添加新的游戏元素，并开始为你的 `SKSpriteKitNode` 制作动画。正是在那章中，你将开始将你的游戏转变为一个真正的、可玩的游戏。\n\
    \n© James Goodwill 和 Wesley Matlock 2017  \nJames Goodwill 和 Wesley Matlock，*Beginning\
    \ Swift Games Development for iOS*  \n10.1007/978-1-4842-2310-9_5\n\n# 5. 添加动作和动画\n\
    \nJames Goodwill¹ 和 Wesley Matlock²  \n(1) 美国科罗拉多州海兰兹牧场  \n(2) 美国密苏里州堪萨斯城\n\n\
    在本章中，你将最后一次重构能量球节点的布局，以增强可玩性。之后，我们将向你展示如何使用 `SKActions` 让 `SKSpriteNode` 在场景中来回移动，并让同一个节点无限旋转。最后，我们将介绍如何使用颜色化动作为\
    \ `SKSpriteNode` 添加着色效果，以此来结束本章。\n"
- fmt: "# Refactoring the Orb Node Layout One Last Time\n\nBefore we start talking\
    \ about `SKActions`, a few changes need to be made to the way the orb nodes are\
    \ laid out. Chapter [4](#A330720_2_En_4_Chapter.html) mentioned refactoring the\
    \ layout of the orb nodes. In this section, we want to not only refactor the layout\
    \ of the nodes into a method but also modify the layout of the orb nodes one last\
    \ time. The goal of this modification is to lay out the orbs in a little more\
    \ gamelike manner. This new method is shown here:\n\n```\nfunc addOrbsToForeground()\
    \ {\n    var orbNodePosition = CGPoint(x: playerNode.position.x, y: playerNode.position.y\
    \ + 100)\n    var orbXShift : CGFloat = -1.0\n    for _ in 1...50 {\n        let\
    \ orbNode = SKSpriteNode(imageNamed: \"PowerUp\")\n        if orbNodePosition.x\
    \ - (orbNode.size.width * 2) <= 0 {\n            orbXShift = 1.0\n        }\n\
    \        if orbNodePosition.x + orbNode.size.width >= size.width {\n         \
    \   orbXShift = -1.0\n        }\n        orbNodePosition.x += 40.0 * orbXShift\n\
    \        orbNodePosition.y += 120\n        orbNode.position = orbNodePosition\n\
    \        orbNode.physicsBody = SKPhysicsBody(circleOfRadius: orbNode.size.width\
    \ / 2)\n        orbNode.physicsBody?.isDynamic = false\n        orbNode.physicsBody?.categoryBitMask\
    \ = CollisionCategoryPowerUpOrbs\n        orbNode.physicsBody?.collisionBitMask\
    \ = 0\n        orbNode.name = \"POWER_UP_ORB\"\n        foregroundNode.addChild(orbNode)\n\
    \    }\n}\n```\n\nAs you look at this method, you’ll see there’s really nothing\
    \ too special about it. It begins by setting the initial position of the first\
    \ orb to be 100 points directly above the player node. It then adds 50 orbs, 40\
    \ points apart on the x-axis and 120 points apart on the y-axis, moving from right\
    \ to left on the scene until all the nodes have been added. Go ahead and add this\
    \ method to the `GameScene` directly after the `init()` method. Once you have\
    \ the `addOrbsToForeground()` method added to the game scene, then you need to\
    \ add a call to invoke this method. Add the following method invocation to the\
    \ end of the `GameScene`’s `init()` method:\n\n```\naddOrbsToForeground()\n```\n\
    \nBefore invoking this new method, you need to remove the old orb-adding code\
    \ from the `init()` method. To do so, find the following code and remove it from\
    \ the `init()`:\n\n```\nvar orbNodePosition = CGPoint(x: playerNode.position.x,\
    \ y: playerNode.position.y + 100)\nfor _ in 0...19 {\n    let orbNode = SKSpriteNode(imageNamed:\
    \ \"PowerUp\")\n    orbNodePosition.y += 140\n    orbNode.position = orbNodePosition\n\
    \    orbNode.physicsBody = SKPhysicsBody(circleOfRadius: orbNode.size.width /\
    \ 2)\n    orbNode.physicsBody?.isDynamic = false\n    orbNode.physicsBody?.categoryBitMask\
    \ = CollisionCategoryPowerUpOrbs\n    orbNode.physicsBody?.collisionBitMask =\
    \ 0\n    orbNode.name = \"POWER_UP_ORB\"\n    foregroundNode.addChild(orbNode)\n\
    }\norbNodePosition = CGPoint(x: playerNode.position.x + 50, y: orbNodePosition.y)\n\
    for _ in 0...19 {\n    let orbNode = SKSpriteNode(imageNamed: \"PowerUp\")\n \
    \   orbNodePosition.y += 140\n    orbNode.position = orbNodePosition\n    orbNode.physicsBody\
    \ = SKPhysicsBody(circleOfRadius: orbNode.size.width / 2)\n    orbNode.physicsBody?.isDynamic\
    \ = false\n    orbNode.physicsBody?.categoryBitMask = CollisionCategoryPowerUpOrbs\n\
    \    orbNode.physicsBody?.collisionBitMask = 0\n    orbNode.name = \"POWER_UP_ORB\"\
    \n    foregroundNode.addChild(orbNode)\n}\n```\n\nOnce you’ve made and saved all\
    \ these changes, run the app again and take a look at the new layout. It should\
    \ look like Figure [5-1](#A330720_2_En_5_Chapter.html#Fig1).\n\n![A330720_2_En_5_Fig1_HTML.jpg](OEBPS/A330720_2_En_5_Fig1_HTML.jpg)\n\
    \n**Figure 5-1.** The new orb layout\n\nAfter restarting the app, play around\
    \ with the new layout. It’s a lot more fun than just going straight up. You now\
    \ have to fly side to side to collect orbs.\n\n## Sprite Kit Actions\n\nIn Sprite\
    \ Kit, whenever you want to move, modify, or perform some action on an `SKNode`,\
    \ you’re going to be, more often than not, applying that change using an `SKAction`.\
    \ Apple defines an `SKAction` as follows: “An action is an object that defines\
    \ a change you want to make to the scene.” There are many different uses for `SKActions`,\
    \ but some of the more common uses of `SKActions` are as follows:\n\n* Animating\
    \ a node through a series of textures\n* Modifying the position of a node using\
    \ its `position` property\n* Changing the visibility of a node using its `hidden`\
    \ property\n* Adjusting the translucency of a node using its `alpha` property\n\
    * Modifying the size of a node using its `size` property\n* Playing simple sounds\n\
    * Colorizing a node\n\nTo use an `SKAction`, you have to perform only two steps:\
    \ you create the action you want to perform, and you tell the node you want to\
    \ perform it on to run the action. Here’s an example of this that moves a node\
    \ to the right side of the scene over a period of two seconds:\n\n```\nvar moveRightAction\
    \ = SKAction.moveToX(size.width, duration: 2.0)\nsampleNode.runAction(moveRightAction)\n\
    ```\n\nAnother really cool feature of `SKActions` is the ability to chain actions\
    \ together. Take a look at this example:\n\n```\nvar moveRightAction = SKAction.moveToX(size.width,\
    \ duration: 2.0)\nvar moveLeftAction = SKAction.moveToX(0.0, duration: 2.0)\n\
    var actionSequence = SKAction.sequence([moveRightAction, moveLeftAction])\nsampleNode.runAction(actionSequence)\n\
    ```\n\nThis bit of code will begin by moving the node to the right of the scene,\
    \ and then when that action is finished, it will move the same node to the left\
    \ side of the scene.\n\nAnother nice feature of `SKAction` is the ability to repeat\
    \ an action. Take a look at this snippet:\n\n```\nlet moveLeftAction = SKAction.moveTo(x:\
    \ 0.0, duration: 2.0)\nlet moveRightAction = SKAction.moveTo(x: size.width, duration:\
    \ 2.0)\nlet actionSequence = SKAction.sequence([moveLeftAction, moveRightAction])\n\
    let moveAction = SKAction.repeatForever(actionSequence)\nsampleNode.runAction(moveActionSequence)\n\
    ```\n\nHere you see the previous example, but now there is another action, `repeatForever`,\
    \ that will run the `moveAction` forever. That’s all it took—one line to make\
    \ all the previous actions run forever.\n\nThough this is a simple set of `SKAction`\
    \ examples, there is almost no limit to how you can leverage actions in your games.\
    \ In the following sections, we show you how to use some of this same code to\
    \ move a collection of nodes back and forth across the scene while also rotating\
    \ the node through a collection of textures, giving the illusion of node rotation.\n\
    \n**Note:** Before moving on, take a look at all the methods used to create the\
    \ `SKActions`. Note that all of these methods are class methods. This is the pattern\
    \ used to create all `SKActions`. Currently there are no extensions of the `SKAction`\
    \ class.\n\n### Using Actions to Move Nodes in the Scene"
  raw: '## Refactoring the Orb Node Layout One Last Time


    Before we start talking about SKActions, a few changes need to be made to the
    way the orb nodes are laid out. Chapter [4](#A330720_2_En_4_Chapter.html) mentioned
    refactoring the layout of the orb nodes. In this section, we want to not only
    refactor the layout of the nodes into a method but also modify the layout of the
    orb nodes one last time. The goal of this modification is to lay out the orbs
    in a little more gamelike manner. This new method is shown here: func addOrbsToForeground()
    {    var orbNodePosition = CGPoint(x: playerNode.position.x, y: playerNode.position.y
    + 100)    var orbXShift : CGFloat = -1.0    for _ in 1...50 {        let orbNode
    = SKSpriteNode(imageNamed: "PowerUp")        if orbNodePosition.x - (orbNode.size.width
    * 2) <= 0 {            orbXShift = 1.0        }        if orbNodePosition.x +
    orbNode.size.width >= size.width {            orbXShift = -1.0        }        orbNodePosition.x
    += 40.0 * orbXShift        orbNodePosition.y += 120        orbNode.position =
    orbNodePosition        orbNode.physicsBody = SKPhysicsBody(circleOfRadius: orbNode.size.width
    / 2)        orbNode.physicsBody?.isDynamic = false        orbNode.physicsBody?.categoryBitMask
    = CollisionCategoryPowerUpOrbs        orbNode.physicsBody?.collisionBitMask =
    0        orbNode.name = "POWER_UP_ORB"        foregroundNode.addChild(orbNode)
       } } As you look at this method, you’ll see there’s really nothing too special
    about it. It begins by setting the initial position of the first orb to be 100
    points directly above the player node. It then adds 50 orbs, 40 points apart on
    the x-axis and 120 points apart on the y-axis, moving from right to left on the
    scene until all the nodes have been added. Go ahead and add this method to the
    GameScene directly after the init() method . Once you have the addOrbsToForeground()
    method added to the game scene, then you need to add a call to invoke this method.
    Add the following method invocation to the end of the GameScene’s init() method:
    addOrbsToForeground() Before invoking this new method, you need to remove the
    old orb-adding code from the init() method. To do so, find the following code
    and remove it from the init(): var orbNodePosition = CGPoint(x: playerNode.position.x,
    y: playerNode.position.y + 100) for _ in 0...19 {     let orbNode = SKSpriteNode(imageNamed:
    "PowerUp")     orbNodePosition.y += 140     orbNode.position = orbNodePosition
        orbNode.physicsBody = SKPhysicsBody(circleOfRadius: orbNode.size.width / 2)
        orbNode.physicsBody?.isDynamic = false     orbNode.physicsBody?.categoryBitMask
    = CollisionCategoryPowerUpOrbs     orbNode.physicsBody?.collisionBitMask = 0     orbNode.name
    = "POWER_UP_ORB"     foregroundNode.addChild(orbNode) } orbNodePosition = CGPoint(x:
    playerNode.position.x + 50, y: orbNodePosition.y) for _ in 0...19 {     let orbNode
    = SKSpriteNode(imageNamed: "PowerUp")     orbNodePosition.y += 140     orbNode.position
    = orbNodePosition     orbNode.physicsBody = SKPhysicsBody(circleOfRadius: orbNode.size.width
    / 2)     orbNode.physicsBody?.isDynamic = false     orbNode.physicsBody?.categoryBitMask
    = CollisionCategoryPowerUpOrbs     orbNode.physicsBody?.collisionBitMask = 0     orbNode.name
    = "POWER_UP_ORB"     foregroundNode.addChild(orbNode) } Once you’ve made and saved
    all these changes, run the app again and take a look at the new layout. It should
    look like Figure [5-1](#A330720_2_En_5_Chapter.html#Fig1). ![A330720_2_En_5_Fig1_HTML.jpg](OEBPS/A330720_2_En_5_Fig1_HTML.jpg)
    Figure 5-1. The new orb layout After restarting the app , play around with the
    new layout. It’s a lot more fun than just going straight up. You now have to fly
    side to side to collect orbs.


    ## Sprite Kit Actions


    In Sprite Kit, whenever you want to move, modify, or perform some action on an
    SKNode, you’re going to be, more often than not, applying that change using an
    SKAction . Apple defines an SKAction as follows: “An action is an object that
    defines a change you want to make to the scene.” There are many different uses
    for SKActions, but some of the more common uses of SKActions are as follows:


    *   Animating a node through a series of textures

    *   Modifying the position of a node using its position property

    *   Changing the visibility of a node using its hidden property

    *   Adjusting the translucency of a node using its alpha property

    *   Modifying the size of a node using its size property

    *   Playing simple sounds

    *   Colorizing a node


    To use an SKAction, you have to perform only two steps : you create the action
    you want to perform, and you tell the node you want to perform it on to run the
    action. Here’s an example of this that moves a node to the right side of the scene
    over a period of two seconds: var moveRightAction = SKAction.moveToX(size.width,
    duration: 2.0) sampleNode.runAction(moveRightAction) Another really cool feature
    of SKActions is the ability to chain actions together. Take a look at this example:
    var moveRightAction = SKAction.moveToX(size.width, duration: 2.0) var moveLeftAction
    = SKAction.moveToX(0.0, duration: 2.0) var actionSequence = SKAction.sequence([moveRightAction,
    moveLeftAction]) sampleNode.runAction(actionSequence) This bit of code will begin
    by moving the node to the right of the scene, and then when that action is finished,
    it will move the same node to the left side of the scene. Another nice feature
    of SKAction is the ability to repeat an action. Take a look at this snippet: let
    moveLeftAction = SKAction.moveTo(x: 0.0, duration: 2.0) let moveRightAction =
    SKAction.moveTo(x: size.width, duration: 2.0) let actionSequence = SKAction.sequence([moveLeftAction,
    moveRightAction]) let moveAction = SKAction.repeatForever(actionSequence) sampleNode.runAction(moveActionSequence)
    Here you see the previous example, but now there is another action, repeatForever,
    that will run the moveAction forever. That’s all it took—one line to make all
    the previous actions run forever. Though this is a simple set of SKAction examples,
    there is almost no limit to how you can leverage actions in your games. In the
    following sections, we show you how to use some of this same code to move a collection
    of nodes back and forth across the scene while also rotating the node through
    a collection of textures, giving the illusion of node rotation. Note Before moving
    on, take a look at all the methods used to create the SKActions. Note that all
    of these methods are class methods. This is the pattern used to create all SKActions.
    Currently there are no extensions of the SKAction class.


    ### Using Actions to Move Nodes in the Scene'
  trans: "\n# 最后一次重构轨道节点布局\n\n在开始讨论`SKActions`之前，需要对轨道节点的布局方式做一些调整。第 4 章曾提到过对轨道节点布局进行重构。在本节中，我们不仅要将其布局重构为一个方法，还要最后一次修改轨道节点的布局方式。本次修改的目标是让轨道排列更接近游戏风格。新方法如下：\n\
    \n```\nfunc addOrbsToForeground() {\n    var orbNodePosition = CGPoint(x: playerNode.position.x,\
    \ y: playerNode.position.y + 100)\n    var orbXShift : CGFloat = -1.0\n    for\
    \ _ in 1...50 {\n        let orbNode = SKSpriteNode(imageNamed: \"PowerUp\")\n\
    \        if orbNodePosition.x - (orbNode.size.width * 2) <= 0 {\n            orbXShift\
    \ = 1.0\n        }\n        if orbNodePosition.x + orbNode.size.width >= size.width\
    \ {\n            orbXShift = -1.0\n        }\n        orbNodePosition.x += 40.0\
    \ * orbXShift\n        orbNodePosition.y += 120\n        orbNode.position = orbNodePosition\n\
    \        orbNode.physicsBody = SKPhysicsBody(circleOfRadius: orbNode.size.width\
    \ / 2)\n        orbNode.physicsBody?.isDynamic = false\n        orbNode.physicsBody?.categoryBitMask\
    \ = CollisionCategoryPowerUpOrbs\n        orbNode.physicsBody?.collisionBitMask\
    \ = 0\n        orbNode.name = \"POWER_UP_ORB\"\n        foregroundNode.addChild(orbNode)\n\
    \    }\n}\n```\n\n查看这个方法，你会发现它并没有什么特别之处。它首先将第一个轨道的初始位置设为玩家节点正上方 100 个点。然后依次添加\
    \ 50 个轨道，在 x 轴上间隔 40 个点，y 轴上间隔 120 个点，在场景中从右向左移动，直到所有节点添加完毕。请直接将此方法添加到`GameScene`中`init()`方法的后面。将`addOrbsToForeground()`方法添加到游戏场景后，还需要添加一个调用该方法的语句。在`GameScene`的`init()`方法末尾添加以下方法调用：\n\
    \n```\naddOrbsToForeground()\n```\n\n在调用这个新方法之前，需要将`init()`方法中旧的轨道添加代码移除。为此，请找到以下代码并将其从`init()`中删除：\n\
    \n```\nvar orbNodePosition = CGPoint(x: playerNode.position.x, y: playerNode.position.y\
    \ + 100)\nfor _ in 0...19 {\n    let orbNode = SKSpriteNode(imageNamed: \"PowerUp\"\
    )\n    orbNodePosition.y += 140\n    orbNode.position = orbNodePosition\n    orbNode.physicsBody\
    \ = SKPhysicsBody(circleOfRadius: orbNode.size.width / 2)\n    orbNode.physicsBody?.isDynamic\
    \ = false\n    orbNode.physicsBody?.categoryBitMask = CollisionCategoryPowerUpOrbs\n\
    \    orbNode.physicsBody?.collisionBitMask = 0\n    orbNode.name = \"POWER_UP_ORB\"\
    \n    foregroundNode.addChild(orbNode)\n}\norbNodePosition = CGPoint(x: playerNode.position.x\
    \ + 50, y: orbNodePosition.y)\nfor _ in 0...19 {\n    let orbNode = SKSpriteNode(imageNamed:\
    \ \"PowerUp\")\n    orbNodePosition.y += 140\n    orbNode.position = orbNodePosition\n\
    \    orbNode.physicsBody = SKPhysicsBody(circleOfRadius: orbNode.size.width /\
    \ 2)\n    orbNode.physicsBody?.isDynamic = false\n    orbNode.physicsBody?.categoryBitMask\
    \ = CollisionCategoryPowerUpOrbs\n    orbNode.physicsBody?.collisionBitMask =\
    \ 0\n    orbNode.name = \"POWER_UP_ORB\"\n    foregroundNode.addChild(orbNode)\n\
    }\n```\n\n完成所有修改并保存后，再次运行应用，查看新的布局。效果应如图 5-1 所示。\n\n![A330720_2_En_5_Fig1_HTML.jpg](img/A330720_2_En_5_Fig1_HTML.jpg)\n\
    \n**图 5-1.** 新的轨道布局\n\n重启应用后，不妨体验一下新布局。这比单纯的垂直上升有趣多了。现在你需要左右飞行来收集轨道。\n\n## Sprite\
    \ Kit 动作\n\n在 Sprite Kit 中，当你想要移动、修改或对`SKNode`执行某些操作时，大多数情况下会使用`SKAction`来实现变更。苹果对`SKAction`的定义是：“动作是一个对象，用于定义你想要对场景做出的改变”。`SKActions`有许多不同的用途，但其中一些常见用法如下：\n\
    \n*   通过一系列纹理为节点制作动画\n*   使用节点的`position`属性修改其位置\n*   使用节点的`hidden`属性改变其可见性\n\
    *   使用节点的`alpha`属性调整其透明度\n*   使用节点的`size`属性修改其大小\n*   播放简单音效\n*   为节点着色\n\n要使用`SKAction`，只需执行两个步骤：创建你想要执行的动作，然后告诉要执行该动作的节点去运行它。下面是一个示例，该示例在两秒内将一个节点移动到场景的右侧：\n\
    \n```\nvar moveRightAction = SKAction.moveToX(size.width, duration: 2.0)\nsampleNode.runAction(moveRightAction)\n\
    ```\n\n`SKActions`另一个非常酷的功能是能够将动作链接在一起。请看这个示例：\n\n```\nvar moveRightAction = SKAction.moveToX(size.width,\
    \ duration: 2.0)\nvar moveLeftAction = SKAction.moveToX(0.0, duration: 2.0)\n\
    var actionSequence = SKAction.sequence([moveRightAction, moveLeftAction])\nsampleNode.runAction(actionSequence)\n\
    ```\n\n这段代码会先将节点移动到场景右侧，当该动作完成后，再将同一个节点移动到场景左侧。\n\n`SKAction`的另一个好功能是能够重复执行一个动作。请看这段代码片段：\n\
    \n```\nlet moveLeftAction = SKAction.moveTo(x: 0.0, duration: 2.0)\nlet moveRightAction\
    \ = SKAction.moveTo(x: size.width, duration: 2.0)\nlet actionSequence = SKAction.sequence([moveLeftAction,\
    \ moveRightAction])\nlet moveAction = SKAction.repeatForever(actionSequence)\n\
    sampleNode.runAction(moveActionSequence)\n```\n\n这里你看到了之前的示例，但现在又多了一个动作`repeatForever`，它会使`moveAction`永远运行下去。仅此而已——只需一行代码就能让之前的所有动作永远运行。\n\
    \n虽然这是一组简单的`SKAction`示例，但你在游戏中利用动作的方式几乎没有限制。在接下来的章节中，我们将展示如何使用部分相同的代码，让一组节点在场景中来回移动，同时通过一系列纹理旋转节点，营造出节点旋转的视觉效果。\n\
    \n**注意：** 在继续之前，请查看用于创建`SKActions`的所有方法。注意所有这些方法都是类方法。这是创建所有`SKActions`所用的模式。目前`SKAction`类没有扩展。\n\
    \n### 使用动作在场景中移动节点\n"
- fmt: "在前面的章节中，我们提到要展示如何在游戏场景中来回移动一组节点。你已经了解了如何使用`moveToX`、`sequence`和`repeatForever`动作来实现这一点。将在场景中移动的节点是一个新节点。如果你打开`sprites.atlas`文件夹，会看到几张`BlackHoleX.png`图像。选择列表中的第一张图像`BlackHole0.png`，它应该看起来像图[5-2](#A330720_2_En_5_Chapter.html#Fig2)。\
    \  \n![A330720_2_En_5_Fig2_HTML.jpg](OEBPS/A330720_2_En_5_Fig2_HTML.jpg)  \n**图\
    \ 5-2.** `BlackHole`节点  \n\n该节点的作用是代表一个在场景中来回移动的黑洞。如果玩家节点与这个节点发生接触，玩家将停止响应物理世界，并缓慢坠落直至死亡。要将这个新节点添加到场景中，你需要创建一个新的`SKSpriteNode`实例，并向其传入`BlackHole0`图像。你可以在以下名为`addBlackHolesToForeground()`的方法中找到实现此功能的代码：\
    \  \n\n```\nfunc addBlackHolesToForeground() {\n    let blackHoleNode = SKSpriteNode(imageNamed:\
    \ \"BlackHole0\")\n    blackHoleNode.position = CGPoint(x: size.width - 80.0,\
    \ y: 600.0)\n    blackHoleNode.physicsBody =\n        SKPhysicsBody(circleOfRadius:\
    \ blackHoleNode.size.width / 2)\n    blackHoleNode.physicsBody?.isDynamic = false\n\
    \    blackHoleNode.name = \"BLACK_HOLE\"\n    foregroundNode.addChild(blackHoleNode)\n\
    }\n```\n\n你之前已经见过所有这些代码。它首先使用名为`BlackHole0`的图像创建了`blackHoleNode`的新实例，然后将该节点添加到场景，设置节点`physicsBody`的属性，并将节点命名为`BLACK_HOLE`。现在，请将此代码紧跟在`addOrbsToForeground()`方法之后添加。然后在调用`addOrbsToForeground()`方法之前，添加对`addBlackHolesToForeground()`方法的调用。完成这些更改后，再次运行应用程序。这次你会看到`blackHoleNode`悬浮在玩家节点的右上方，如图[5-3](#A330720_2_En_5_Chapter.html#Fig3)所示。\
    \  \n![A330720_2_En_5_Fig3_HTML.jpg](OEBPS/A330720_2_En_5_Fig3_HTML.jpg)  \n**图\
    \ 5-3.** 添加到场景中的`BlackHole`节点  \n\n在继续对该节点执行动作之前，需要将处理`playerNode`与`blackHoleNode`之间接触的代码添加到`GameScene`类中。你之前已经见过所有这些代码，因此我们将快速过一遍，不做过多解释。首先，需要配置`blackHoleNode`的`categoryBitMask`，并修改`playerNode`的`contactBitMask`，使其包含`blackHoleNode`的`categoryBitMask`。为此，请在其他两个类别定义下方直接添加`CollisionCategoryBlackHoles`常量的定义，如下所示：\
    \  \n\n```\nlet CollisionCategoryPlayer : UInt32 = 0x1 << 1\nlet CollisionCategoryPowerUpOrbs\
    \ : UInt32 = 0x1 << 2\nlet CollisionCategoryBlackHoles : UInt32 = 0x1 << 3\n```\n\
    \n接下来，设置`blackHoleNode.physicsBody`的`categoryBitMask`和`collisionBitMask`，如以下代码片段所示。在`addBlackHolesToForeground()`方法中将`blackHoleNode`添加到前景之前，直接添加这些行：\
    \  \n\n```\nblackHoleNode.physicsBody?.categoryBitMask = CollisionCategoryBlackHoles\n\
    blackHoleNode.physicsBody?.collisionBitMask = 0\n```\n\n配置好`blackHoleNode.physicsBody`的位掩码后，需要将`CollisionCategoryBlackHoles`添加到`playerNode.physicsBody`的`contactTestBitMask`中，如下所示。找到设置`playerNode.physicsBody.contactTestBitMask`的位置，并将其修改为如下一行代码：\
    \  \n\n```\nplayerNode.physicsBody?.contactTestBitMask =\n    CollisionCategoryPowerUpOrbs\
    \ | CollisionCategoryBlackHoles\n```\n\n你还需要做一处修改：修改`didBeginContact()`方法，使其在节点与`playerNode`接触时检测`BLACK_HOLE`节点。最简单的方法是在方法当前的`if`语句中添加一个`if\
    \ else`条件。此更改如以下代码片段所示：  \n\n```\nif nodeB.name == \"POWER_UP_ORB\"  {\n    impulseCount\
    \ += 1\n    nodeB.removeFromParent()\n} else if nodeB.name == \"BLACK_HOLE\" \
    \ {            \n    playerNode.physicsBody?.contactTestBitMask = 0\n    impulseCount\
    \ = 0\n}\n```\n\n对`didBeginContact()`方法进行此更改，然后再次运行应用程序。这次进行游戏时，尝试让玩家与新黑洞发生接触。当接触发生时，你会注意到玩家停止响应点击和其他节点的接触，然后缓慢坠落，直到掉出场景底部。此时，游戏基本结束了。\
    \  \n\n好了，终于是时候使用一些`SKAction`了。如果还记得前一节的内容，使用`SKAction`涉及两个步骤。首先，创建你想要使用的动作，然后告诉要应用动作的节点来运行该动作。让我们从本章前面使用过的动作序列开始：\
    \  \n\n```\nlet moveLeftAction = SKAction.moveTo(x: 0.0, duration: 2.0)\nlet moveRightAction\
    \ = SKAction.moveTo(x: size.width, duration: 2.0)\nlet actionSequence = SKAction.sequence([moveLeftAction,\
    \ moveRightAction])\nlet moveAction = SKAction.repeatForever(actionSequence)\n\
    ```\n\n查看这段代码时，你会认出它来自本章前面首次介绍`SKAction`的部分。第一行创建了一个动作，该动作会将运行它的节点移动到 x 轴上的 0.0\
    \ 点；第二行将节点移回场景的最右侧。之后，这两个动作被用来创建一个动作序列，这个新动作存储在变量`actionSequence`中。最后，使用`SKAction.repeatForever()`类方法，利用`actionSequence`创建了一个重复动作。\
    \  \n\n仔细阅读这段代码后，将其复制到`addBlackHolesToForeground()`方法的顶部。让黑洞在场景中来回移动的最后一步，是告诉`blackHoleNode`实际运行该动作。你可以使用下面这行代码来实现：\
    \  \n\n```\nblackHoleNode.run(moveAction)\n```\n\n将这行代码添加到`addBlackHolesToForeground()`方法的末尾，然后再次运行应用程序。这次你会看到，只要游戏在运行，黑洞就会在场景中来回移动。\
    \  \n\n在继续之前，我们还希望对`addBlackHolesToForeground()`方法做一件事。你可能已经注意到，`addBlackHolesToForeground()`方法的名称暗示了不止一个黑洞——这是有意为之。我们认为游戏需要多个黑洞来增加游戏难度。请看这里展示的新版`addBlackHolesToForeground()`方法：\
    \  \n\n```\nfunc addBlackHolesToForeground() {\n    let moveLeftAction = SKAction.moveTo(x:\
    \ 0.0, duration: 2.0)\n    let moveRightAction = SKAction.moveTo(x: size.width,\
    \ duration: 2.0)\n    let actionSequence = SKAction.sequence([moveLeftAction,\
    \ moveRightAction])\n    let moveAction = SKAction.repeatForever(actionSequence)\n\
    \    for i in 1...10 {\n        let blackHoleNode = SKSpriteNode(imageNamed: \"\
    BlackHole0\")\n        blackHoleNode.position = CGPoint(x: size.width - 80.0,\
    \ y: 600.0 * CGFloat(i))\n        blackHoleNode.physicsBody = SKPhysicsBody(circleOfRadius:\
    \ blackHoleNode.size.width / 2)\n        blackHoleNode.physicsBody?.isDynamic\
    \ = false\n        blackHoleNode.physicsBody?.categoryBitMask = CollisionCategoryBlackHoles\n\
    \        blackHoleNode.physicsBody?.collisionBitMask = 0\n        blackHoleNode.name\
    \ = \"BLACK_HOLE\"\n        blackHoleNode.run(moveAction)\n        blackHoleNode.run(rotateAction)\n\
    \        foregroundNode.addChild(blackHoleNode)\n    }\n}\n```\n\n请注意，这段代码遍历了一个`for`循环\
    \ 10 次，每在之前黑洞的上方 600 个点处添加一个黑洞。在此过程中，它告诉每个新节点运行之前创建的`moveAction`。要查看此更改的效果，请使用此代码替换当前的`addBlackHolesToForeground()`方法并运行应用程序。这次运行应用程序时，你会看到沿着场景高度方向向上分布着更多的黑洞。"
  raw: 'In the previous section, we told you we were going to show you how to move
    a collection of nodes back and forth across the game scene. You’ve already seen
    how to do this using the moveToX, sequence, and repeatForever actions. The node
    that will be moving across the scene is a new node. If you open the sprites.atlas
    folder, you’ll see several BlackHoleX.png images. Select the first image in the
    list, BlackHole0.png. It should look like Figure [5-2](#A330720_2_En_5_Chapter.html#Fig2).
    ![A330720_2_En_5_Fig2_HTML.jpg](OEBPS/A330720_2_En_5_Fig2_HTML.jpg) Figure 5-2.
    The BlackHole node The purpose of this node will be to represent a black hole
    moving back and forth across the scene. If the player node comes into contact
    with this node, the player will stop responding to the physics world and slowly
    fall to their death . To add this new node to the scene, you need to create a
    new SKSpriteNode instance and pass it the BlackHole0 image. You can find the code
    to do this in the following method, named addBlackHolesToForeground() : func addBlackHolesToForeground()
    {     let blackHoleNode = SKSpriteNode(imageNamed: "BlackHole0")     blackHoleNode.position
    = CGPoint(x: size.width - 80.0, y: 600.0)     blackHoleNode.physicsBody =         SKPhysicsBody(circleOfRadius:
    blackHoleNode.size.width / 2)     blackHoleNode.physicsBody?.isDynamic = false
        blackHoleNode.name = "BLACK_HOLE"     foregroundNode.addChild(blackHoleNode)
    } You’ve seen all this code before. It starts by creating a new instance of the
    blackHoleNode using the image named BlackHole0\. It then adds the node to the
    scene, sets the properties of the node’s physicsBody, and names the node BLACK_HOLE.
    Go ahead and add this code immediately following the addOrbsToForeground() method.
    Then add a call to invoke the addBlackHolesToForeground() method right before
    the invocation of the addOrbsToForeground() method. After you’ve made these changes,
    run the app again. This time you’ll see the blackHoleNode suspended up and to
    the right of the player node, as shown in Figure [5-3](#A330720_2_En_5_Chapter.html#Fig3).
    ![A330720_2_En_5_Fig3_HTML.jpg](OEBPS/A330720_2_En_5_Fig3_HTML.jpg) Figure 5-3.
    The BlackHole node added to the scene Before moving on to performing actions on
    this node, the code to handle contacts between the playerNode and the blackHoleNode
    needs to be added to the GameScene class. You’ve seen all this code before, so
    we’ll go over it quickly without too much explanation. First the categoryBitMask
    of the blackHoleNode needs to be configured, and the playNode’s contactBitMask
    needs to be modified to include the blackHoleNode’s categoryBitMask. To do this,
    add this definition of the CollisionCategoryBlackHoles constant directly below
    the other two category definitions, as shown here: let CollisionCategoryPlayer
    : UInt32 = 0x1 << 1 let CollisionCategoryPowerUpOrbs : UInt32 = 0x1 << 2 let CollisionCategoryBlackHoles
    : UInt32 = 0x1 << 3 Next, set the blackHoleNode.physicsBody’s categoryBitMask
    and collisionBitMask, as shown in the following snippet. Add these lines directly
    before the blackHoleNode is added to the foreground in the addBlackHolesToForeground()
    method: blackHoleNode.physicsBody?.categoryBitMask = CollisionCategoryBlackHoles
    blackHoleNode.physicsBody?.collisionBitMask = 0 After you’ve configured the blackHoleNode.physicsNody’s
    bit masks, you need to add the CollisionCategoryBlackHoles to the playerNode.physicsBody’s
    contactTestBitMask, as shown next. Find where the playerNode.physicsBody’s contactTestBitMask
    is being set and modify it to look like this line: playerNode.physicsBody?.contactTestBitMask
    =     CollisionCategoryPowerUpOrbs | CollisionCategoryBlackHoles You need to make
    one more change: modify the didBeginContact() method so that it tests for the
    BLACK_HOLE node whenever nodes come into contact with the playerNode. The simplest
    way to do this is to add an if else condition to the current if statement in the
    method. This change is shown in the following snippet: if nodeB.name == "POWER_UP_ORB"  {
        impulseCount += 1     nodeB.removeFromParent() } else if nodeB.name == "BLACK_HOLE"  {            
        playerNode.physicsBody?.contactTestBitMask = 0     impulseCount = 0 } Make
    this change to the didBeginContact() method and run the app again. When you play
    this time, try to make the player come into contact with the new black hole. When
    you do, you’ll notice the player quits responding to taps and contact with other
    nodes and then slowly falls until it falls through the bottom of the scene. At
    this point, the game is essentially over. All right, it’s finally time to use
    some SKActions. If you remember from the previous section, there are two steps
    involved when using an SKAction. First, you create the action you’d like to use,
    and then you tell the node that you want to apply the action to run the action.
    Let’s begin with the action sequence used earlier in this chapter: let moveLeftAction
    = SKAction.moveTo(x: 0.0, duration: 2.0) let moveRightAction = SKAction.moveTo(x:
    size.width, duration: 2.0) let actionSequence = SKAction.sequence([moveLeftAction,
    moveRightAction]) let moveAction = SKAction.repeatForever(actionSequence) As you
    look at this code, you will recognize it from earlier in the chapter when we first
    introduced SKActions. The first line creates an action that will move the node
    that runs it to point 0.0 on the x-axis, and the second line moves the node back
    to the far-right side of the scene. After this, both of these actions are used
    to create a sequence of actions, and this new action is stored in the variable
    actionSequence. Finally, the actionSequence is used to create a repeating action
    using the SKAction.repeatForever() class method. After you’ve looked this code
    over a bit, copy it to the top of the addBlackHolesToForeground() method. The
    final step to make the black hole move back and forth across the scene is to tell
    the blackHoleNode to actually run the action. You do that using the following
    single line: blackHoleNode.run(moveAction) Add this line to the end of the addBlackHolesToForeground()
    method and run the app again. This time you’ll see the black hole moving back
    and forth across the scene for as long as the game is being run. There is one
    more thing we want to do with the addBlackHolesToForeground() method before moving
    on. You may have noticed the name of the addBlackHolesToForeground() method mentions
    more than one black hole. This was intentional. We think the game needs several
    black holes to make it more difficult to play. Take a look at the new addBlackHolesToForeground()
    method shown here: func addBlackHolesToForeground() {     let moveLeftAction =
    SKAction.moveTo(x: 0.0, duration: 2.0)     let moveRightAction = SKAction.moveTo(x:
    size.width, duration: 2.0)     let actionSequence = SKAction.sequence([moveLeftAction,
    moveRightAction])     let moveAction = SKAction.repeatForever(actionSequence)
        for i in 1...10 {         let blackHoleNode = SKSpriteNode(imageNamed: "BlackHole0")
            blackHoleNode.position = CGPoint(x: size.width - 80.0, y: 600.0 * CGFloat(i))
            blackHoleNode.physicsBody = SKPhysicsBody(circleOfRadius: blackHoleNode.size.width
    / 2)         blackHoleNode.physicsBody?.isDynamic = false         blackHoleNode.physicsBody?.categoryBitMask
    = CollisionCategoryBlackHoles         blackHoleNode.physicsBody?.collisionBitMask
    = 0         blackHoleNode.name = "BLACK_HOLE"         blackHoleNode.run(moveAction)
            blackHoleNode.run(rotateAction)         foregroundNode.addChild(blackHoleNode)
        } } Note that this code iterates over a for loop 10 times, adding another
    black hole every 600 points above the previous black hole. As it does so, it tells
    each new node to run the moveAction created earlier. To see this change in action,
    use this code to replace the current addBlackHolesToForeground() method and run
    the app. When you run the app this time, you will see additional black holes going
    up the length of the scene.'
  trans: "\n在前面的章节中，我们提到要展示如何在游戏场景中来回移动一组节点。你已经了解了如何使用`moveToX`、`sequence`和`repeatForever`动作来实现这一点。将在场景中移动的节点是一个新节点。如果你打开`sprites.atlas`文件夹，会看到几张`BlackHoleX.png`图像。选择列表中的第一张图像`BlackHole0.png`，它应该看起来像图\
    \ 5-2。  \n![A330720_2_En_5_Fig2_HTML.jpg](img/A330720_2_En_5_Fig2_HTML.jpg)  \n\
    **图 5-2.** `BlackHole`节点  \n\n该节点的作用是代表一个在场景中来回移动的黑洞。如果玩家节点与这个节点发生接触，玩家将停止响应物理世界，并缓慢坠落直至死亡。要将这个新节点添加到场景中，你需要创建一个新的`SKSpriteNode`实例，并向其传入`BlackHole0`图像。你可以在以下名为`addBlackHolesToForeground()`的方法中找到实现此功能的代码：\
    \  \n\n```\nfunc addBlackHolesToForeground() {\n    let blackHoleNode = SKSpriteNode(imageNamed:\
    \ \"BlackHole0\")\n    blackHoleNode.position = CGPoint(x: size.width - 80.0,\
    \ y: 600.0)\n    blackHoleNode.physicsBody =\n        SKPhysicsBody(circleOfRadius:\
    \ blackHoleNode.size.width / 2)\n    blackHoleNode.physicsBody?.isDynamic = false\n\
    \    blackHoleNode.name = \"BLACK_HOLE\"\n    foregroundNode.addChild(blackHoleNode)\n\
    }\n```\n\n你之前已经见过所有这些代码。它首先使用名为`BlackHole0`的图像创建了`blackHoleNode`的新实例，然后将该节点添加到场景，设置节点`physicsBody`的属性，并将节点命名为`BLACK_HOLE`。现在，请将此代码紧跟在`addOrbsToForeground()`方法之后添加。然后在调用`addOrbsToForeground()`方法之前，添加对`addBlackHolesToForeground()`方法的调用。完成这些更改后，再次运行应用程序。这次你会看到`blackHoleNode`悬浮在玩家节点的右上方，如图\
    \ 5-3 所示。  \n![A330720_2_En_5_Fig3_HTML.jpg](img/A330720_2_En_5_Fig3_HTML.jpg)\
    \  \n**图 5-3.** 添加到场景中的`BlackHole`节点  \n\n在继续对该节点执行动作之前，需要将处理`playerNode`与`blackHoleNode`之间接触的代码添加到`GameScene`类中。你之前已经见过所有这些代码，因此我们将快速过一遍，不做过多解释。首先，需要配置`blackHoleNode`的`categoryBitMask`，并修改`playerNode`的`contactBitMask`，使其包含`blackHoleNode`的`categoryBitMask`。为此，请在其他两个类别定义下方直接添加`CollisionCategoryBlackHoles`常量的定义，如下所示：\
    \  \n\n```\nlet CollisionCategoryPlayer : UInt32 = 0x1 << 1\nlet CollisionCategoryPowerUpOrbs\
    \ : UInt32 = 0x1 << 2\nlet CollisionCategoryBlackHoles : UInt32 = 0x1 << 3\n```\n\
    \n接下来，设置`blackHoleNode.physicsBody`的`categoryBitMask`和`collisionBitMask`，如以下代码片段所示。在`addBlackHolesToForeground()`方法中将`blackHoleNode`添加到前景之前，直接添加这些行：\
    \  \n\n```\nblackHoleNode.physicsBody?.categoryBitMask = CollisionCategoryBlackHoles\n\
    blackHoleNode.physicsBody?.collisionBitMask = 0\n```\n\n配置好`blackHoleNode.physicsBody`的位掩码后，需要将`CollisionCategoryBlackHoles`添加到`playerNode.physicsBody`的`contactTestBitMask`中，如下所示。找到设置`playerNode.physicsBody.contactTestBitMask`的位置，并将其修改为如下一行代码：\
    \  \n\n```\nplayerNode.physicsBody?.contactTestBitMask =\n    CollisionCategoryPowerUpOrbs\
    \ | CollisionCategoryBlackHoles\n```\n\n你还需要做一处修改：修改`didBeginContact()`方法，使其在节点与`playerNode`接触时检测`BLACK_HOLE`节点。最简单的方法是在方法当前的`if`语句中添加一个`if\
    \ else`条件。此更改如以下代码片段所示：  \n\n```\nif nodeB.name == \"POWER_UP_ORB\"  {\n    impulseCount\
    \ += 1\n    nodeB.removeFromParent()\n} else if nodeB.name == \"BLACK_HOLE\" \
    \ {            \n    playerNode.physicsBody?.contactTestBitMask = 0\n    impulseCount\
    \ = 0\n}\n```\n\n对`didBeginContact()`方法进行此更改，然后再次运行应用程序。这次进行游戏时，尝试让玩家与新黑洞发生接触。当接触发生时，你会注意到玩家停止响应点击和其他节点的接触，然后缓慢坠落，直到掉出场景底部。此时，游戏基本结束了。\
    \  \n\n好了，终于是时候使用一些`SKAction`了。如果还记得前一节的内容，使用`SKAction`涉及两个步骤。首先，创建你想要使用的动作，然后告诉要应用动作的节点来运行该动作。让我们从本章前面使用过的动作序列开始：\
    \  \n\n```\nlet moveLeftAction = SKAction.moveTo(x: 0.0, duration: 2.0)\nlet moveRightAction\
    \ = SKAction.moveTo(x: size.width, duration: 2.0)\nlet actionSequence = SKAction.sequence([moveLeftAction,\
    \ moveRightAction])\nlet moveAction = SKAction.repeatForever(actionSequence)\n\
    ```\n\n查看这段代码时，你会认出它来自本章前面首次介绍`SKAction`的部分。第一行创建了一个动作，该动作会将运行它的节点移动到 x 轴上的 0.0\
    \ 点；第二行将节点移回场景的最右侧。之后，这两个动作被用来创建一个动作序列，这个新动作存储在变量`actionSequence`中。最后，使用`SKAction.repeatForever()`类方法，利用`actionSequence`创建了一个重复动作。\
    \  \n\n仔细阅读这段代码后，将其复制到`addBlackHolesToForeground()`方法的顶部。让黑洞在场景中来回移动的最后一步，是告诉`blackHoleNode`实际运行该动作。你可以使用下面这行代码来实现：\
    \  \n\n```\nblackHoleNode.run(moveAction)\n```\n\n将这行代码添加到`addBlackHolesToForeground()`方法的末尾，然后再次运行应用程序。这次你会看到，只要游戏在运行，黑洞就会在场景中来回移动。\
    \  \n\n在继续之前，我们还希望对`addBlackHolesToForeground()`方法做一件事。你可能已经注意到，`addBlackHolesToForeground()`方法的名称暗示了不止一个黑洞——这是有意为之。我们认为游戏需要多个黑洞来增加游戏难度。请看这里展示的新版`addBlackHolesToForeground()`方法：\
    \  \n\n```\nfunc addBlackHolesToForeground() {\n    let moveLeftAction = SKAction.moveTo(x:\
    \ 0.0, duration: 2.0)\n    let moveRightAction = SKAction.moveTo(x: size.width,\
    \ duration: 2.0)\n    let actionSequence = SKAction.sequence([moveLeftAction,\
    \ moveRightAction])\n    let moveAction = SKAction.repeatForever(actionSequence)\n\
    \    for i in 1...10 {\n        let blackHoleNode = SKSpriteNode(imageNamed: \"\
    BlackHole0\")\n        blackHoleNode.position = CGPoint(x: size.width - 80.0,\
    \ y: 600.0 * CGFloat(i))\n        blackHoleNode.physicsBody = SKPhysicsBody(circleOfRadius:\
    \ blackHoleNode.size.width / 2)\n        blackHoleNode.physicsBody?.isDynamic\
    \ = false\n        blackHoleNode.physicsBody?.categoryBitMask = CollisionCategoryBlackHoles\n\
    \        blackHoleNode.physicsBody?.collisionBitMask = 0\n        blackHoleNode.name\
    \ = \"BLACK_HOLE\"\n        blackHoleNode.run(moveAction)\n        blackHoleNode.run(rotateAction)\n\
    \        foregroundNode.addChild(blackHoleNode)\n    }\n}\n```\n\n请注意，这段代码遍历了一个`for`循环\
    \ 10 次，每在之前黑洞的上方 600 个点处添加一个黑洞。在此过程中，它告诉每个新节点运行之前创建的`moveAction`。要查看此更改的效果，请使用此代码替换当前的`addBlackHolesToForeground()`方法并运行应用程序。这次运行应用程序时，你会看到沿着场景高度方向向上分布着更多的黑洞。\n"
- fmt: "### Using SKActions to Animate Sprites\n\nThis section shows you how to leverage\
    \ SKActions to animate the black hole nodes that you just added to the scene.\
    \ In doing so, it introduces you to a couple of new classes: `SKTexture` and `SKTextureAtlas`.\n\
    \nAn `SKTexture` is an object that holds an image that is used by `SKSpriteNode`s,\
    \ `SKShapeNode`s, or as the particles created by an `SKEmitterNode`. You’ve been\
    \ using `SKTexture` throughout this book when you’ve created an `SKSpriteNode`.\
    \ Each image used to create an `SKSpriteNode` is internally represented as an\
    \ `SKTexture`.\n\nAn `SKTextureAtlas` is a collection of `SKTexture` objects created\
    \ from a texture atlas stored in an application’s resource bundle. Go back to\
    \ your project in Xcode and open the folder named `sprites.atlas`. You’ll see\
    \ all the images, except background images, used in this game. If you wanted to\
    \ load all of the images in this atlas folder into an `SKTextureAtlas`, you would\
    \ execute the following code:\n\n```\nlet textureAtlas = SKTextureAtlas(named:\
    \ \"sprites.atlas\")\n```\n\nThis single line reads all the individual files in\
    \ the `sprites.atlas` folder and adds them to the `SKTextureAtlas`, each as an\
    \ `SKTexture` that can be looked up by the original file name. Add this line to\
    \ the top of the `addBlackHolesToForeground()` method, and let’s move on.\n\n\
    To retrieve an `SKTexture`, you would use the `SKTextureAtlas.textureNamed()`\
    \ method, passing it the name of the texture you want to retrieve. Here’s an example\
    \ of this that retrieves the first black hole texture in the `textureAtlas`:\n\
    \n```\nlet frame0 = textureAtlas.textureNamed(\"BlackHole0\")\n```\n\nThis line\
    \ of code retrieves the `SKTexture` represented by the name `BlackHole0` and stores\
    \ it in the constant `frame0`. To create an animation using all the black hole\
    \ images, you would retrieve each of them from the `textureAtlas` and add them\
    \ to an array that represents the order each texture will be displayed in the\
    \ animation. This code is shown in the following snippet:\n\n```\nlet frame0 =\
    \ textureAtlas.textureNamed(\"BlackHole0\")\nlet frame1 = textureAtlas.textureNamed(\"\
    BlackHole1\")\nlet frame2 = textureAtlas.textureNamed(\"BlackHole2\")\nlet frame3\
    \ = textureAtlas.textureNamed(\"BlackHole3\")\nlet frame4 = textureAtlas.textureNamed(\"\
    BlackHole4\")\nlet blackHoleTextures = [frame0, frame1, frame2, frame3, frame4]\n\
    ```\n\nOnce you’ve examined this code, add it to the top of the `addBlackHolesToForeground()`\
    \ method immediately after the creation of the `textureAtlas`.\n\nNow, all you\
    \ have to do to animate the black holes is create a new action using the `SKAction.animate()`\
    \ method, passing it the array of textures and the time, in seconds, that each\
    \ frame is to be displayed. Take a look at the following lines:\n\n```\nlet animateAction\
    \ = SKAction.animate(with: blackHoleTextures, timePerFrame: 0.2)\nlet rotateAction\
    \ = SKAction.repeatForever(animateAction)\n```\n\nThe first line creates an action\
    \ that will display each texture in the `textureAtlas` array for 2/10ths of a\
    \ second. To make the black hole nodes animate forever, the second line creates\
    \ another action that will perform the animation action forever.\n\nTo see your\
    \ new animation in action, copy all this code to the top of the `addBlackHolesToForeground()`\
    \ method immediately after the `blackHoleTextures` array and then add the following\
    \ line, which will run the action, right before you add each `blackHoleNode` to\
    \ the scene:\n\n```\nblackHoleNode.runAction(rotateAction)\n```\n\nWhen you’ve\
    \ made all of these changes to the `addBlackHolesToForeground()` method, the new\
    \ method will look like the following:\n\n```\nfunc addBlackHolesToForeground()\
    \ {\n    let textureAtlas = SKTextureAtlas(named: \"sprites.atlas\")\n    let\
    \ frame0 = textureAtlas.textureNamed(\"BlackHole0\")\n    let frame1 = textureAtlas.textureNamed(\"\
    BlackHole1\")\n    let frame2 = textureAtlas.textureNamed(\"BlackHole2\")\n  \
    \  let frame3 = textureAtlas.textureNamed(\"BlackHole3\")\n    let frame4 = textureAtlas.textureNamed(\"\
    BlackHole4\")\n    let blackHoleTextures = [frame0, frame1, frame2, frame3, frame4]\n\
    \    let animateAction = SKAction.animate(with: blackHoleTextures, timePerFrame:\
    \ 0.2)\n    let rotateAction = SKAction.repeatForever(animateAction)\n    let\
    \ moveLeftAction = SKAction.moveTo(x: 0.0, duration: 2.0)\n    let moveRightAction\
    \ = SKAction.moveTo(x: size.width, duration: 2.0)\n    let actionSequence = SKAction.sequence([moveLeftAction,\
    \ moveRightAction])\n    let moveAction = SKAction.repeatForever(actionSequence)\n\
    \    for i in 1...10 {\n        let blackHoleNode = SKSpriteNode(imageNamed: \"\
    BlackHole0\")\n        blackHoleNode.position = CGPoint(x: size.width - 80.0,\
    \ y: 600.0 * CGFloat(i))\n        blackHoleNode.physicsBody = SKPhysicsBody(circleOfRadius:\
    \ blackHoleNode.size.width / 2)\n        blackHoleNode.physicsBody?.isDynamic\
    \ = false\n        blackHoleNode.physicsBody?.categoryBitMask = CollisionCategoryBlackHoles\n\
    \        blackHoleNode.physicsBody?.collisionBitMask = 0\n        blackHoleNode.name\
    \ = \"BLACK_HOLE\"\n        blackHoleNode.run(moveAction)\n        blackHoleNode.run(rotateAction)\n\
    \        foregroundNode.addChild(blackHoleNode)\n    }\n}\n```\n\nOnce you’ve\
    \ made all these changes, save your work and run the application again. This time\
    \ you’ll see that as the black holes are moving back and forth across the scene,\
    \ they’re also rotating as they are animated through each of the textures in the\
    \ `blackHoleTextures` array.\n\n## Adding Some Additional Bling to the GameScene"
  raw: '### Using SKActions to Animate Sprites


    This section shows you how to leverage SKActions to animate the black hole nodes
    that you just added to the scene. In doing so, it introduces you to a couple of
    new classes: SKTexture and SKTextureAtlas . An SKTexture is an object that holds
    an image that is used by SKSpriteNodes, SKShapeNodes, or as the particles created
    by an SKEmitterNode. You’ve been using SKTexture throughout this book when you’ve
    created an SKSpriteNode. Each image used to create an SKSpriteNode is internally
    represented as an SKTexture. An SKTextureAtlas is a collection of SKTexture objects
    created from a texture atlas stored in an application’s resource bundle. Go back
    to your project in Xcode and open the folder named sprites.atlas. You’ll see all
    the images, except background images, used in this game. If you wanted to load
    all of the images in this atlas folder into an SKTextureAtlas, you would execute
    the following code: let textureAtlas = SKTextureAtlas(named: "sprites.atlas")
    This single line reads all the individual files in the sprites.atlas folder and
    adds them to the SKTextureAtlas, each as an SKTexture that can be looked up by
    the original file name. Add this line to the top of the addBlackHolesToForeground()
    method, and let’s move on. To retrieve an SKTexture, you would use the SKTextureAtlas.textureNamed()
    method, passing it the name of the texture you want to retrieve. Here’s an example
    of this that retrieves the first black hole texture in the textureAtlas: let frame0
    = textureAtlas.textureNamed("BlackHole0") This line of code retrieves the SKTexture
    represented by the name BlackHole0 and stores it in the constant frame0. To create
    an animation using all the black hole images, you would retrieve each of them
    from the textureAtlas and add them to an array that represents the order each
    texture will be displayed in the animation. This code is shown in the following
    snippet: let frame0 = textureAtlas.textureNamed("BlackHole0") let frame1 = textureAtlas.textureNamed("BlackHole1")
    let frame2 = textureAtlas.textureNamed("BlackHole2") let frame3 = textureAtlas.textureNamed("BlackHole3")
    let frame4 = textureAtlas.textureNamed("BlackHole4") let blackHoleTextures = [frame0,
    frame1, frame2, frame3, frame4] Once you’ve examined this code, add it to the
    top of the addBlackHolesToForeground() method immediately after the creation of
    the textureAtlas . Now, all you have to do to animate the black holes is create
    a new action using the SKAction.animate() method, passing it the array of textures
    and the time, in seconds, that each frame is to be displayed. Take a look at the
    following lines: let animateAction = SKAction.animate(with: blackHoleTextures,
    timePerFrame: 0.2) let rotateAction = SKAction.repeatForever(animateAction) The
    first line creates an action that will display each texture in the textureAtlas
    array for 2/10ths of a second. To make the black hole nodes animate forever, the
    second line creates another action that will perform the animation action forever.
    To see your new animation in action, copy all this code to the top of the addBlackHolesToForeground()
    method immediately after the blackHoleTextures array and then add the following
    line, which will run the action, right before you add each blackHoleNode to the
    scene: blackHoleNode.runAction(rotateAction) When you’ve made all of these changes
    to the addBlackHolesToForeground() method, the new method will look like the following:
    func addBlackHolesToForeground() {     let textureAtlas = SKTextureAtlas(named:
    "sprites.atlas")     let frame0 = textureAtlas.textureNamed("BlackHole0")     let
    frame1 = textureAtlas.textureNamed("BlackHole1")     let frame2 = textureAtlas.textureNamed("BlackHole2")
        let frame3 = textureAtlas.textureNamed("BlackHole3")     let frame4 = textureAtlas.textureNamed("BlackHole4")
        let blackHoleTextures = [frame0, frame1, frame2, frame3, frame4]     let animateAction
    = SKAction.animate(with: blackHoleTextures, timePerFrame: 0.2)     let rotateAction
    = SKAction.repeatForever(animateAction)     let moveLeftAction = SKAction.moveTo(x:
    0.0, duration: 2.0)     let moveRightAction = SKAction.moveTo(x: size.width, duration:
    2.0)     let actionSequence = SKAction.sequence([moveLeftAction, moveRightAction])
        let moveAction = SKAction.repeatForever(actionSequence)     for i in 1...10
    {         let blackHoleNode = SKSpriteNode(imageNamed: "BlackHole0")         blackHoleNode.position
    = CGPoint(x: size.width - 80.0, y: 600.0 * CGFloat(i))         blackHoleNode.physicsBody
    = SKPhysicsBody(circleOfRadius: blackHoleNode.size.width / 2)         blackHoleNode.physicsBody?.isDynamic
    = false         blackHoleNode.physicsBody?.categoryBitMask = CollisionCategoryBlackHoles
            blackHoleNode.physicsBody?.collisionBitMask = 0         blackHoleNode.name
    = "BLACK_HOLE"         blackHoleNode.run(moveAction)         blackHoleNode.run(rotateAction)
            foregroundNode.addChild(blackHoleNode)     } } Once you’ve made all these
    changes, save your work and run the application again. This time you’ll see that
    as the black holes are moving back and forth across the scene, they’re also rotating
    as they are animated through each of the textures in the blackHoleTextures array.


    ## Adding Some Additional Bling to the GameScene'
  trans: "\n### 使用 SKActions 为精灵添加动画\n\n本节将向你展示如何利用 SKActions 为你刚刚添加到场景中的黑洞节点添加动画。在这个过程中，会介绍几个新的类：`SKTexture`\
    \ 和 `SKTextureAtlas`。\n\n`SKTexture` 是一个对象，它持有一张图像，用于 `SKSpriteNode`、`SKShapeNode`，或由\
    \ `SKEmitterNode` 创建的粒子。你在本书中创建 `SKSpriteNode` 时一直在使用 `SKTexture`。用来创建 `SKSpriteNode`\
    \ 的每个图像，在内部都表示为一个 `SKTexture`。\n\n`SKTextureAtlas` 是从存储在应用程序资源包中的纹理图集创建的一组 `SKTexture`\
    \ 对象的集合。回到你在 Xcode 中的项目，打开名为 `sprites.atlas` 的文件夹。你会看到本游戏中使用的所有图像（背景图像除外）。如果你想将这个图集文件夹中的所有图像加载到一个\
    \ `SKTextureAtlas` 中，你可以执行以下代码：\n\n```\nlet textureAtlas = SKTextureAtlas(named:\
    \ \"sprites.atlas\")\n```\n\n这一行代码会读取 `sprites.atlas` 文件夹中的所有单个文件，并将它们添加到 `SKTextureAtlas`\
    \ 中，每个文件作为一个 `SKTexture`，可以通过原始文件名进行查找。将这行代码添加到 `addBlackHolesToForeground()`\
    \ 方法的顶部，然后我们继续。\n\n要检索一个 `SKTexture`，你可以使用 `SKTextureAtlas.textureNamed()` 方法，并传入你想要检索的纹理名称。下面是一个示例，它从\
    \ `textureAtlas` 中检索第一个黑洞纹理：\n\n```\nlet frame0 = textureAtlas.textureNamed(\"\
    BlackHole0\")\n```\n\n这行代码检索由名称 `BlackHole0` 表示的 `SKTexture`，并将其存储在常量 `frame0`\
    \ 中。要使用所有黑洞图像创建一个动画，你需要从 `textureAtlas` 中逐一检索它们，并将它们添加到一个数组中，该数组表示每个纹理在动画中显示的顺序。这段代码如以下片段所示：\n\
    \n```\nlet frame0 = textureAtlas.textureNamed(\"BlackHole0\")\nlet frame1 = textureAtlas.textureNamed(\"\
    BlackHole1\")\nlet frame2 = textureAtlas.textureNamed(\"BlackHole2\")\nlet frame3\
    \ = textureAtlas.textureNamed(\"BlackHole3\")\nlet frame4 = textureAtlas.textureNamed(\"\
    BlackHole4\")\nlet blackHoleTextures = [frame0, frame1, frame2, frame3, frame4]\n\
    ```\n\n检查完这段代码后，将它添加到 `addBlackHolesToForeground()` 方法的顶部，紧跟在创建 `textureAtlas`\
    \ 的代码之后。\n\n现在，实现黑洞动画所需做的就是使用 `SKAction.animate()` 方法创建一个新的动作，传入纹理数组以及每帧显示的时间（以秒为单位）。看一下以下几行代码：\n\
    \n```\nlet animateAction = SKAction.animate(with: blackHoleTextures, timePerFrame:\
    \ 0.2)\nlet rotateAction = SKAction.repeatForever(animateAction)\n```\n\n第一行创建了一个动作，它将每\
    \ 0.2 秒显示 `textureAtlas` 数组中的每个纹理。要让黑洞节点永远动画下去，第二行创建了另一个动作，它将永久执行该动画动作。\n\n要查看你的新动画效果，将所有这段代码复制到\
    \ `addBlackHolesToForeground()` 方法的顶部，紧跟在 `blackHoleTextures` 数组之后，然后在将每个 `blackHoleNode`\
    \ 添加到场景之前，添加下面这行代码来运行动作：\n\n```\nblackHoleNode.runAction(rotateAction)\n```\n\n\
    当你对 `addBlackHolesToForeground()` 方法进行了所有这些更改后，新方法将如下所示：\n\n```\nfunc addBlackHolesToForeground()\
    \ {\n    let textureAtlas = SKTextureAtlas(named: \"sprites.atlas\")\n    let\
    \ frame0 = textureAtlas.textureNamed(\"BlackHole0\")\n    let frame1 = textureAtlas.textureNamed(\"\
    BlackHole1\")\n    let frame2 = textureAtlas.textureNamed(\"BlackHole2\")\n  \
    \  let frame3 = textureAtlas.textureNamed(\"BlackHole3\")\n    let frame4 = textureAtlas.textureNamed(\"\
    BlackHole4\")\n    let blackHoleTextures = [frame0, frame1, frame2, frame3, frame4]\n\
    \    let animateAction = SKAction.animate(with: blackHoleTextures, timePerFrame:\
    \ 0.2)\n    let rotateAction = SKAction.repeatForever(animateAction)\n    let\
    \ moveLeftAction = SKAction.moveTo(x: 0.0, duration: 2.0)\n    let moveRightAction\
    \ = SKAction.moveTo(x: size.width, duration: 2.0)\n    let actionSequence = SKAction.sequence([moveLeftAction,\
    \ moveRightAction])\n    let moveAction = SKAction.repeatForever(actionSequence)\n\
    \    for i in 1...10 {\n        let blackHoleNode = SKSpriteNode(imageNamed: \"\
    BlackHole0\")\n        blackHoleNode.position = CGPoint(x: size.width - 80.0,\
    \ y: 600.0 * CGFloat(i))\n        blackHoleNode.physicsBody = SKPhysicsBody(circleOfRadius:\
    \ blackHoleNode.size.width / 2)\n        blackHoleNode.physicsBody?.isDynamic\
    \ = false\n        blackHoleNode.physicsBody?.categoryBitMask = CollisionCategoryBlackHoles\n\
    \        blackHoleNode.physicsBody?.collisionBitMask = 0\n        blackHoleNode.name\
    \ = \"BLACK_HOLE\"\n        blackHoleNode.run(moveAction)\n        blackHoleNode.run(rotateAction)\n\
    \        foregroundNode.addChild(blackHoleNode)\n    }\n}\n```\n\n完成所有这些更改后，保存你的工作并再次运行应用程序。这一次你会看到，当黑洞在场景中来回移动时，它们也会随着\
    \ `blackHoleTextures` 数组中的每个纹理进行动画而旋转。\n\n## 为 GameScene 添加一些额外的闪光点\n"
- fmt: "Now that you have all the orbs laid out nicely and the black holes are animating\
    \ back and forth across the game scene, it’s time to add a little more bling to\
    \ make the game scene look just a little better. Specifically, we show how to\
    \ add some additional stars to the scene, a planet surface, and how to colorize\
    \ the `playerNode` when it comes into contact with a black hole.\n\n### Adding\
    \ Stars to the Background\n\nLet’s get started with adding some stars to the background.\
    \ First, open the `Images.xcassets` folder in Xcode and select the image `Stars`.\
    \ To add this image to the scene, first add a declaration statement that will\
    \ hold the reference to the `SKSpriteNode` referencing the `Stars` image. This\
    \ declaration should be added to the `GameScene` directly after the `backgroundNode`\
    \ declaration:\n\n```\nlet backgroundNode = SKSpriteNode(imageNamed: \"Background\"\
    )\nlet backgroundStarsNode = SKSpriteNode(imageNamed: \"Stars\")\n```\n\nAfter\
    \ adding the declaration, add the following lines to the `GameScene.init(size:\
    \ CGSize)` method immediately after the line that adds the `backgroundNode` to\
    \ the scene:\n\n```\naddChild(backgroundNode)\nbackgroundStarsNode.size.width\
    \ = frame.size.width\nbackgroundStarsNode.anchorPoint = CGPoint(x: 0.5, y: 0.0)\n\
    backgroundStarsNode.position = CGPoint(x: 160.0, y: 0.0)\naddChild(backgroundStarsNode)\n\
    ```\n\nYou need to do one last thing before running the app and checking out the\
    \ new stars: move the stars in relation to the `playerNode`. Moving the stars\
    \ in relation to the player is pretty straightforward, but we do want to add a\
    \ little coolness by moving the stars at a slightly different rate than the background.\
    \ We have modified the `update()` method to do just this. Take a look:\n\n```\n\
    override func update(_ currentTime: TimeInterval) {\n    if playerNode.position.y\
    \ >= 180.0 {\n        backgroundNode.position = CGPoint(x: backgroundNode.position.x,\
    \ y:\n            -((playerNode.position.y - 180.0)/8));\n                 backgroundStarsNode.position\
    \ = CGPoint(x: backgroundStarsNode.position.x, y:\n                    -((playerNode.position.y\
    \ - 180.0)/6))\n        foregroundNode.position = CGPoint (x: foregroundNode.position.x,\
    \ y:\n            -(playerNode.position.y - 180.0));\n    }\n}\n```\n\nNotice\
    \ the bolded section of the modified `update()` method there. With these two lines\
    \ we’re moving the stars relative to the `playerNode`, but we’re moving them at\
    \ a slightly slower rate than the `backgroundNode`. This gives the illusion that\
    \ the `backgroundStarsNode` is closer to the viewport of the scene. Make this\
    \ change to the `update()` method and run the application again. When the game\
    \ is first launched, you’ll see a scene that looks like Figure [5-4](#A330720_2_En_5_Chapter.html#Fig4).\n\
    \n![A330720_2_En_5_Fig4_HTML.jpg](OEBPS/A330720_2_En_5_Fig4_HTML.jpg)\n\n**Figure\
    \ 5-4.** A layer of stars added to the scene\n\nGo ahead and start playing the\
    \ game. When you go higher and higher in the scene, you’ll notice that the stars\
    \ are moving just a bit faster than the background. This effect is called parallaxation.\n\
    \n### Adding a Planet Surface\n\nThe next thing you want to do is add the perception\
    \ that the `playerNode` is starting on a planet’s surface. Go back to Xcode, open\
    \ the `Images.xcassets` folder once again, and find the `PlanetStart` image. This\
    \ is the image that will act as the planet’s surface. Adding this new image to\
    \ your scene isn’t complicated, and you’ve seen it before. The only difference\
    \ from adding the stars to the scene is that you’re going to move the planet at\
    \ the same rate as the background node. This will make the planet’s surface fall\
    \ away as the player gets higher and higher in the scene.\n\nLet’s go ahead and\
    \ do this. First, add a new `SKSpriteNode` declaration directly following the\
    \ declaration of the `backgroundStarsNode`:\n\n```\nlet backgroundStarsNode =\
    \ SKSpriteNode(imageNamed: \"Stars\")\nlet backgroundPlanetNode = SKSpriteNode(imageNamed:\
    \ \"PlanetStart\")\n```\n\nNext, insert the code to add the `backgroundPlanetNode`\
    \ to the scene. This code should immediately follow the addition of the `backgroundStarsNode`,\
    \ as shown here:\n\n```\naddChild(backgroundStarsNode)\nbackgroundPlanetNode.size.width\
    \ = frame.size.width\nbackgroundPlanetNode.anchorPoint = CGPoint(x: 0.5, y: 0.0)\n\
    backgroundPlanetNode.position = CGPoint(x: size.width / 2.0, y: 0.0)\naddChild(backgroundPlanetNode)\n\
    ```\n\nNow, find the line of code that sets the position of the `playerNode` (in\
    \ the `init(size: CGSize)` method) and change the position to match the following:\n\
    \n```\nplayerNode.position = CGPoint(x: size.width / 2.0, y: 220.0)\n```\n\nFinally,\
    \ modify the `update` method to move the `backgroundPlanetNode` at the same rate\
    \ as the `backgroundNode`:\n\n```\noverride func update(_ currentTime: TimeInterval)\
    \ {\n    if playerNode.position.y >= 180.0 {\n        backgroundNode.position\
    \ = CGPoint(x: backgroundNode.position.x, y: -((playerNode.position.y - 180.0)/8));\n\
    \        backgroundStarsNode.position = CGPoint(x: backgroundStarsNode.position.x,\
    \ y: -((playerNode.position.y - 180.0)/6));\n        backgroundPlanetNode.position\
    \ = CGPoint(x: backgroundPlanetNode.position.x, y: -((playerNode.position.y -\
    \ 180.0)/8));\n        foregroundNode.position = CGPoint(x: foregroundNode.position.x,\
    \ y: -(playerNode.position.y - 180.0));\n    }\n}\n```\n\nOnce you’ve made all\
    \ these changes, run the app again and admire your handiwork. You should now see\
    \ a planet resting at the bottom of the scene and the `playerNode` standing on\
    \ top of it. Tap the screen a few times. The planet and the background will move\
    \ together, giving the impression that the `playerNode` is flying off the planet’s\
    \ surface and into space. Figure [5-5](#A330720_2_En_5_Chapter.html#Fig5) shows\
    \ the new scene.\n\n![A330720_2_En_5_Fig5_HTML.jpg](OEBPS/A330720_2_En_5_Fig5_HTML.jpg)\n\
    \n**Figure 5-5.** A planet’s surface added to the scene\n\n### Adding a Visual\
    \ Death Indicator\n\nThere’s one last change we would like to make. If you’ve\
    \ had the player run into a black hole recently, you’ll know that it’s a bit anticlimactic.\
    \ We want to add a visual indicator that shows the player is dead. A simple way\
    \ to do this is to use a colorize action. A colorize action will blend a second\
    \ color into an `SKNode` over a specified interval. Here’s an example creation\
    \ of `colorizeAction`:\n\n```\nSKAction.colorize(with: UIColor.red(), colorBlendFactor:\
    \ 0.5, duration: 1)\n```\n\nThis action, when run on an `SKNode`, will blend a\
    \ red color with a blend factor of 0.5 over a period of 1 second. This is similar\
    \ to what we would like to apply to the `playerNode` when it comes into contact\
    \ with a black hole. Take a look at the last two lines of this modified `didBeginContact`'s\
    \ method:\n\n```\nextension GameScene: SKPhysicsContactDelegate {\n    func didBegin(_\
    \ contact: SKPhysicsContact) {\n        let nodeB = contact.bodyB.node!\n    \
    \    if nodeB.name == \"POWER_UP_ORB\"  {\n            impulseCount += 1\n   \
    \         nodeB.removeFromParent()\n        }\n        else if nodeB.name == \"\
    BLACK_HOLE\"  {\n            playerNode.physicsBody?.contactTestBitMask = 0\n\
    \            impulseCount = 0\n            let colorizeAction = SKAction.colorize(with:\
    \ UIColor.red, colorBlendFactor: 1.0, duration: 1)\n            playerNode.run(colorizeAction)\n\
    \        }\n    }\n}\n```\n\nThese two lines create a colorize action that will\
    \ fully blend a red color to the `playerNode` over a period of one second whenever\
    \ the player runs into a black hole. Make these changes and run the application\
    \ one more time. When you run it this time, be sure to run the player into a black\
    \ hole. Notice how, when he does, he will slowly turn red and fall to the planet’s\
    \ surface—much better."
