    tapped, you should see something similar to Figure [1-3](#A330720_2_En_1_Chapter.html#Fig3).
    ![A330720_2_En_1_Fig3_HTML.jpg](OEBPS/A330720_2_En_1_Fig3_HTML.jpg) Figure 1-3.
    The SpriteKit sample application


    ## Starting from Scratch


    Although the standard SpriteKit template works great, you are going to be starting
    from scratch. Starting from nothing will allow you to see all the working parts
    in a SpriteKit game and will give you a much better understanding of what you
    are creating. The first thing you need to do is make sure your game runs only
    in portrait mode . To do that, follow these steps:


    1.  1. Select the SuperSpaceMan project in the Project Explorer.  

    2.  2. Then select SuperSpaceMan from Targets.  

    3.  3. Deselect Landscape Left and Landscape Right.'
  trans: "\n# 第一部分\nSpriteKit 简介\n\n## Swift 与 SpriteKit\n\n在本部分的章节中，我们将介绍 SpriteKit\
    \ 的基础知识，包括如何渲染和动画化精灵、添加物理效果和碰撞检测，以及利用加速计控制游戏玩法。你还将了解如何添加粒子发射器来增强游戏的外观。我们将涵盖你创建自己的\
    \ SpriteKit 游戏所需了解的一切。© James Goodwill 和 Wesley Matlock 2017，James Goodwill 和\
    \ Wesley Matlock *《Beginning Swift Games Development for iOS》* 10.1007/978-1-4842-2310-9_1\n\
    \n# 1. 设置游戏场景并添加第一个精灵\n\nJames Goodwill¹ 和 Wesley Matlock²  \n(1) 美国科罗拉多州海兰兹牧场\
    \  \n(2) 美国密苏里州堪萨斯城\n\nSpriteKit 是 Apple 令人兴奋的 2D 游戏框架，于 2013 年 9 月随 iOS 7 首次发布。它是一个动画和图形渲染框架，能够让你轻松地为纹理图像添加动画、播放视频、渲染文本以及添加粒子效果。它还集成了一个物理库。SpriteKit\
    \ 是第一个正式内置于 iOS SDK 中的游戏引擎。在本章中，你将了解 SpriteKit 是什么，以及如何使用 Xcode 创建一个新的 SpriteKit\
    \ 游戏。接着，你将从头开始创建一个 SpriteKit 游戏的初步框架。你将学习关于`SKNodes`及其子类的知识，并使用`SKSpriteNode`为你的游戏添加一个背景节点和一个玩家节点。\n\
    \n## 你需要了解并拥有的东西\n\n本书的这一部分假设你具备使用 Xcode 和 Xcode 模拟器构建 iPhone 应用程序的基本理解。同时，它也假设你对\
    \ iOS/Mac 编程语言 Swift 有基本了解。如果你不熟悉 Swift，本书末尾的附录中有简要介绍。本书不涵盖编程方法，只专注于 SpriteKit\
    \ 游戏编程。要完成本书中的所有示例，你需要一台搭载 OS X 10.11（El Capitan）或更新版本的 Intel 架构 Mac 电脑。你还需要安装\
    \ Xcode 8+。这两者都可以在 Apple App Store 中找到。\n\n## 介绍 SuperSpaceMan\n\n我们认为学习任何东西的最佳方式就是动手去做。因此，在本章中，你将直接投入并创建自己的游戏。你将从一个\
    \ 2D 游戏的基本代码开始，并在我们每章引入新主题时，向游戏中添加新功能。在本书结束时，你将拥有一个完整的游戏。你要创建的游戏灵感来自 Sega 广受欢迎的\
    \ Sonic Jump Fever（[`itunes.apple.com/us/app/sonic-jump-fever/id794528112?mt=8`](https://itunes.apple.com/us/app/sonic-jump-fever/id794528112?mt=8)）。这是一个垂直卷轴游戏，主角在障碍物和收集品之间加速前进，通过收集戒指来增加分数。我们的游戏类似，也是一个垂直卷轴游戏，但你的主角将是一名太空人，他在太空中疾驰，收集能量球，同时努力避开会摧毁他的黑洞。\n\
    \n## 创建一个 Swift SpriteKit 项目\n\n在开始之前，你需要创建一个 Swift SpriteKit 项目。打开 Xcode 并完成以下步骤：\n\
    \n1. 点击 文件 ➤ 新建 ➤ 项目。\n2. 选择 iOS。\n3. 从应用程序组中选择游戏图标。此时选择模板对话框应如图 1-1 所示。![A330720_2_En_1_Fig1_HTML.jpg](img/A330720_2_En_1_Fig1_HTML.jpg)\
    \  \n图 1-1. 选择模板对话框\n4. 点击下一步按钮继续。\n5. 输入 `SuperSpaceMan` 作为产品名称，`Apress` 作为组织名称，`com.apress`\
    \ 作为组织标识符。\n6. 确保选择 `Swift` 作为语言，`SpriteKit` 作为游戏技术，以及 `iPhone` 作为设备。\n7. 在点击下一步之前，查看图\
    \ 1-2。如果一切与此一致，点击下一步并选择一个合适的位置来存储你的项目文件。点击创建。![A330720_2_En_1_Fig2_HTML.jpg](img/A330720_2_En_1_Fig2_HTML.jpg)\
    \  \n图 1-2. 选择项目选项对话框\n\n注意：你会注意到你正在创建一个仅限 iPhone 的游戏。这只是因为你创建的游戏更适合 iPhone。我们在本书中介绍的所有内容同样适用于\
    \ iPad。现在你有了一个可运行的 SpriteKit 项目。继续点击播放按钮，看看你创建了什么。如果一切顺利，你将看到你的新应用在模拟器中运行。注意：在某些较慢的机器上，Xcode\
    \ 模拟器可能需要一段时间才能启动。模拟 SpriteKit 应用可能会对处理器造成较大负担。目前它还没有太多功能，但不仅仅只是显示“Hello, World!”而已。点击模拟器屏幕几次。你会在每次点击的位置看到旋转的方块。根据你点击的位置，你应该会看到类似于图\
    \ 1-3 的内容。![A330720_2_En_1_Fig3_HTML.jpg](img/A330720_2_En_1_Fig3_HTML.jpg)  \n\
    图 1-3. SpriteKit 示例应用\n\n## 从头开始\n\n尽管标准的 SpriteKit 模板很好用，但你将从头开始。从零开始能让你看到 SpriteKit\
    \ 游戏中的所有工作组件，并使你对自己正在创建的内容有更深入的理解。你需要做的第一件事是确保你的游戏仅在竖屏模式下运行。为此，请按照以下步骤操作：\n\n\
    1. 在项目资源管理器中选中 SuperSpaceMan 项目。\n2. 然后在 Targets 下选择 SuperSpaceMan。\n3. 取消勾选横屏向左和横屏向右。\n"
- fmt: "At this point, your target settings should look like Figure [1-4](#A330720_2_En_1_Chapter.html#Fig4).\
    \ \n\n![A330720_2_En_1_Fig4_HTML.jpg](OEBPS/A330720_2_En_1_Fig4_HTML.jpg) Figure\
    \ 1-4. The SuperSpaceMan target settings\n\nThe next thing you need to do is delete\
    \ the `GameScene.sks` and `Actions.sks` files. You will not be using the level\
    \ editor in this book. You can find these files in the `SuperSpaceMan` group,\
    \ as shown in Figure [1-5](#A330720_2_En_1_Chapter.html#Fig5).\n\n![A330720_2_En_1_Fig5_HTML.jpg](OEBPS/A330720_2_En_1_Fig5_HTML.jpg)\
    \ Figure 1-5. Delete the SKS files\n\nAfter you delete these files, open `GameScene.swift`\
    \ and replace its contents with the class in Listing [1-1](#A330720_2_En_1_Chapter.html#Par29).\n\
    \n```\nimport SpriteKit\n\nclass GameScene: SKScene {\n    required init?(coder\
    \ aDecoder: NSCoder) {\n        super.init(coder: aDecoder)\n    }\n\n    override\
    \ init(size: CGSize) {\n        super.init(size: size)\n        backgroundColor\
    \ = SKColor(red: 0.0, green: 0.0, blue: 0.0, alpha: 1.0)\n    }\n}\n```\n\nListing\
    \ 1-1. `GameScene.swift`: The SuperSpaceMan Main GameScene\n\nThere is one more\
    \ change you need to make before examining your baseline project. Open `GameViewController.swift`\
    \ and replace its contents with the Listing [1-2](#A330720_2_En_1_Chapter.html#Par31)\
    \ version of the same class.\n\n```\nimport SpriteKit\n\nclass GameViewController:\
    \ UIViewController {\n    var scene: GameScene!\n    override var prefersStatusBarHidden:\
    \ Bool {\n        return true\n    }\n\n    override func viewDidLoad() {\n  \
    \      super.viewDidLoad()\n\n        // 1. Configure the main view\n        let\
    \ skView = view as! SKView\n        skView.showsFPS = true\n\n        // 2. Create\
    \ and configure our game scene\n        scene = GameScene(size: skView.bounds.size)\n\
    \        scene.scaleMode = .aspectFill\n\n        // 3. Show the scene.\n    \
    \    skView.presentScene(scene)\n    }\n}\n```\n\nListing 1-2. `GameViewController.swift`:\
    \ The SuperSpaceMan Main UIViewController\n\nSave all your changes and click the\
    \ Play button once more. Wow, um, that was not very exciting. If you made all\
    \ the changes, you should now be staring at a totally black screen with only the\
    \ current frame rate displayed. This was the intent. You truly are starting from\
    \ nothing.\n\nLet’s take a moment and examine each component of your new game.\
    \ First, open `Main.storyboard`. Everything here should look pretty normal. You\
    \ should see a single storyboard with a single `UIViewController`. Expand `Game\
    \ View Controller Scene` in the Storyboard Explorer and select `Game View Controller`,\
    \ as shown in Figure [1-6](#A330720_2_En_1_Chapter.html#Fig6).\n\n![A330720_2_En_1_Fig6_HTML.jpg](OEBPS/A330720_2_En_1_Fig6_HTML.jpg)\
    \ Figure 1-6. Game View Controller Scene\n\nNow expand the Utilities view on the\
    \ right side of Xcode and click the “Show the Identity inspector” button. You\
    \ will see the custom class of this `UIViewController` is your `GameViewController.swift`.\
    \ Figure [1-7](#A330720_2_En_1_Chapter.html#Fig7) shows you this connection.\n\
    \n![A330720_2_En_1_Fig7_HTML.jpg](OEBPS/A330720_2_En_1_Fig7_HTML.jpg) Figure 1-7.\
    \ The custom class `GameViewController`\n\nThere is one last thing to look at\
    \ before you get back to the code portion of this tour. Go back to the Utilities\
    \ view and select the Connections inspector. Notice the `View` outlet is connected\
    \ to your `GameViewController.view`. Figure [1-8](#A330720_2_En_1_Chapter.html#Fig8)\
    \ shows this connection.\n\n![A330720_2_En_1_Fig8_HTML.jpg](OEBPS/A330720_2_En_1_Fig8_HTML.jpg)\
    \ Figure 1-8. The View outlet\n\nThe point of going through this examination of\
    \ the storyboard is to show that although `SpriteKit` is used to create games,\
    \ the technology used to create games is just like what you would use to create\
    \ any modern iOS app.\n\n### The `GameViewController` Class\n\nLet’s get back\
    \ to the code. You can ignore `AppDelegate.swift`—it’s the same boilerplate code\
    \ you use to start all iOS Swift applications. `GameViewController.swift` is the\
    \ best starting point. We included it earlier, but for the sake of convenience,\
    \ here it is again:\n\n```\nimport SpriteKit\n\nclass GameViewController: UIViewController\
    \ {\n    var scene: GameScene!\n    override var prefersStatusBarHidden: Bool\
    \ {\n        return true\n    }\n\n    override func viewDidLoad() {\n       \
    \ super.viewDidLoad()\n\n        // 1. Configure the main view\n        let skView\
    \ = view as! SKView\n        skView.showsFPS = true\n\n        // 2. Create and\
    \ configure our game scene\n        scene = GameScene(size: skView.bounds.size)\n\
    \        scene.scaleMode = .aspectFill\n\n        // 3. Show the scene.\n    \
    \    skView.presentScene(scene)\n    }\n}\n```\n\nStarting with the first line\
    \ of this controller, you see a simple `import` including the `SpriteKit` framework.\
    \ This line makes all the `SpriteKit`-related classes available to your `GameViewController`.\
    \ After that, you have a standard class definition—the `GameViewController` extends\
    \ a `UIViewController`. After the class definition, you see the declaration of\
    \ the optional variable `scene`, which is declared as the type `GameScene`. `GameScene`\
    \ is the class that will be doing most of your work. It is where you will be adding\
    \ the game logic. We will look at this class in the next section.\n\nNotice one\
    \ thing about the `scene` variable: it’s an optional. You know it’s an optional\
    \ because an exclamation point (`!`) follows its declaration. You declared this\
    \ variable as an optional because you are not going to initialize it until the\
    \ `viewDidLoad()` method fires and Swift requires you to initialize all properties\
    \ in a class either at their declaration or in the `init()`. If you don’t initialize\
    \ a property in either of these locations, then you must declare the property\
    \ as optional. We will use optionals throughout the examples in this book.\n\n\
    After the `scene` declaration, you see an override of the `UIViewController`’s\
    \ `viewDidLoad()` method. Here you return `true` because you don’t want a status\
    \ bar displayed in the game.\n\nThe next thing to check out is the `viewDidLoad()`\
    \ method. This is where you really start to see your first active `SpriteKit`\
    \ code. The first thing you do after calling `super.viewDidLoad()` is configure\
    \ your main view. In the first step, you downcast your standard `UIView` to an\
    \ `SKView`. The `SKView` is the view that will host your game scene mentioned\
    \ earlier. For the most part, the `SKView` acts much like any `UIView`, with the\
    \ exception that it has a collection of game-related properties and utility methods\
    \ like the line following the downcast:\n\n```\nskView.showsFPS = true\n```\n\n\
    This property of the `SKView` is used to show or hide the frames per second the\
    \ application is rendering—the higher, the better.\n\nAfter configuring the main\
    \ view, you create and configure the `GameScene`:\n\n```\nscene = GameScene(size:\
    \ skView.bounds.size)\nscene.scaleMode = .aspectFill\n```\n\nThe first line creates\
    \ a new instance of the `GameScene` initializing the size to match the size of\
    \ the view that will host the scene. After that, you set `scaleMode` to `.aspectFill`.\
    \ The `scaleMode` (implemented by the enum `SKSceneScaleMode`) is used to determine\
    \ how the scene will be scaled to match the view that will contain it. Table [1-1](#A330720_2_En_1_Chapter.html#Tab1)\
    \ describes each of the available `scaleMode` properties.\n\nTable 1-1. The `SKSceneScaleModes`"
