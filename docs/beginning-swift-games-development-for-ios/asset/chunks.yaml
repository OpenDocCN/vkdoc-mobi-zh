            timerNode.text = "Time: " + tempString     })     let startDelay = SKAction.wait(forDuration:
    0.5)     let timerDelay = SKAction.sequence([timerAction, startDelay])     let
    timer = SKAction.repeatForever(timerDelay)     timerNode.run(timer, withKey: "timerAction")
    } Listing 15-3. GameOverlay.startTimer( ) The next function you need to add to
