    ## Summary


    This chapter discussed SpriteKit’s physics engine and collision detection. We
    began the chapter with a discussion of the SKPhysicsBody. You then turned on the
    game world’s gravity, which pulled the player down the length of the scene. After
    that you added a touch responder to propel the playerNode back up into space.
    Finally, we closed the chapter with a discussion on how to handle collisions.
    In Chapter [4](#A330720_2_En_4_Chapter.html), you will add scrolling to the scene
    so that the player can fly higher in the scene without flying off the top of the
    scene. You will also add accelerometer integration to give additional controls
    to the player.© James Goodwill and Wesley Matlock 2017 James Goodwill and Wesley MatlockBeginning
    Swift Games Development for iOS10.1007/978-1-4842-2310-9_4


    # 4. Adding Scene Scrolling and Game Control


    James Goodwill^(1 ) and Wesley Matlock² (1) Highlands Ranch, Colorado, USA (2)
    Kansas City, Missouri, USA   In this chapter, you will start adding some real
    functionality to your game. You’ll begin by making some small changes to the current
    GameScene. After that, you will add additional orb nodes to collide into. You
    will then add scrolling to your scene, allowing you to make it look like the player
    is flying through space collecting orbs. Finally, you will start using the phone’s
    accelerometer to move the player along the x-axis.


