    Overlay scene with a timer Now that you have the overlay, you need to start the
    timer when the user begins to move the spaceman. Because you’ll be using the touchCount
    in the sceneView to start the timer, you’ll want to also make sure your player
    hasn’t already started the game—otherwise, the timer will always reset itself
    with every touch. After the GameViewController class definition, you’ll add another
    variable that will be used as a flag for when the game starts, and you’ll initialize
    it to false: var gameStarted = false. Now when your player starts the game, you’ll
    set this to true and then back to false at the end of the game. To accomplish
    that, you’ll need to add some logic into the didSimulatePhysicsAtTime function
    in the GameViewController : func renderer(aRenderer: SCNSceneRenderer, didSimulatePhysicsAtTime
    time: TimeInterval)  { In this function, you’ll add Listing [15-5](#A330720_2_En_15_Chapter.html#Par30)
    at the top of the function. This checks to see whether the user has touched the
    screen, and if so it starts the timer and sets the gameStarted flag. You’ll use
    this flag later in the code. if touchCount > 0 && !gameStarted {     gameOverlay.startTimer()
        gameStarted = true } Listing 15-5. Start the Timer in the didSimulatePhysicsAtTime
    Protocol This time when you run the game, you’ll notice the timer start running
    when you touch the device, as in Figure [15-2](#A330720_2_En_15_Chapter.html#Fig2).
    ![A330720_2_En_15_Fig2_HTML.jpg](OEBPS/A330720_2_En_15_Fig2_HTML.jpg) Figure 15-2.
    Timer running The last thing you need to do for the timer is to call the stopTimer()
    method when you’ve collected all the collectibles. The best place for that will
    be in the SCNPhysicsWorld didBeginContact protocol. You’ll do a check after the
    switch statement to see if you have a score over a certain amount—in this case,
    50 points: if gameOverlay.score >= 50 {     gameOverlay.stopTimer() } This time
    when you run the game and maneuver the hero around collecting collectibles, the
    timer will stop when you’ve achieved the score needed to move to the next level,
    as well as the time it took you to get to this amount.


    ## “Game Over” Screen


    You have a working game now, but wouldn’t it be nice to have a “Game Over” screen
    to show your time and score and be able to restart the game? You’ll create another
    view that will update the sceneView.overlaySKScene when the hero achieves the
    score. Create a new Swift file called GameOverView .swift just as you’ve created
    in the past. The GameOverView will look familiar—Listing [15-6](#A330720_2_En_15_Chapter.html#Par37)
    has the code you need to put into the GameOverView class . import SpriteKit class
    GameOverView: SKScene {     required init?(coder aDecoder: NSCoder) {         super.init(coder:
    aDecoder)     }     init(size: CGSize, score: String) {         super.init(size:
    size)         backgroundColor = .red         let backgroundNode = SKSpriteNode(imageNamed:
    "GameOverBackground")         backgroundNode.anchorPoint = CGPoint(x: 0.5, y:
    0.0)         backgroundNode.position = CGPoint(x: 160.0, y: 0.0)         addChild(backgroundNode)
            let scoreTextNode = SKLabelNode(fontNamed: "Copperplate")         scoreTextNode.text
    = "SCORE :  \(score)"         scoreTextNode.horizontalAlignmentMode = .center
            scoreTextNode.verticalAlignmentMode = .center         scoreTextNode.fontSize
    = 20         scoreTextNode.fontColor = .white         scoreTextNode.position =
    CGPoint(x: size.width / 2.0, y: size.height - 75.0)         addChild(scoreTextNode)
            let tryAgainText = SKLabelNode(fontNamed: "Copperplate")         tryAgainText.text
    = "TAP ANYWHERE TO PLAY AGAIN!"         tryAgainText.horizontalAlignmentMode =
    .center         tryAgainText.verticalAlignmentMode = .center         tryAgainText.fontSize
    = 20         tryAgainText.fontColor = .white         tryAgainText.position = CGPoint(x:
    size.width / 2.0, y: size.height - 200)         addChild(tryAgainText)     } }
    Listing 15-6. GameOverView Listing [15-7](#A330720_2_En_15_Chapter.html#Par39)
    shows the updated didBeginContact method . The player makes contact with a collectible,
    and the score is updated. Next, the time is stopped if the player has achieved
    the score for the level. If this happens, you will then display the “game over”
    view to the user. if gameOverlay.score >= 50 {     gameOverlay.stopTimer()     sceneView.overlaySKScene
    = GameOverView(size: view.bounds.size, score: String(gameOverlay.score)) } Listing
    15-7. Score Check and Display Game Over Scene Now when you run your game and you
    get to the enemy, the player will be shown a “game over” view and their time.
    There’s one other item you need to deal with, and that’s to update the sceneView.overlaySKScene
    to the original timer screen. To restart the player, just touch anywhere on the
    screen in order to restart the game , as shown in Figure [15-3](#A330720_2_En_15_Chapter.html#Fig3).
    ![A330720_2_En_15_Fig3_HTML.jpg](OEBPS/A330720_2_En_15_Fig3_HTML.jpg) Figure 15-3.
    “Game over” screen


    ## Summary


    Now you have an overlay SpriteKit scene that has a timer, and you’re randomly
    placing the objects in the scene. You can expand on this overlay scene and add
    more SpriteKit features as you choose to for your games. You now have a simple
    game that has explored Apple’s SceneKit library . You’ve learned what a scene
    graph is and how SceneKit uses this graph to display 3D objects while using the
    GPU on the device. Try running this game in the simulator instead of on the device,
    and you’ll see how much the GPU improves performance.© James Goodwill and Wesley
    Matlock 2017 James Goodwill and Wesley MatlockBeginning Swift Games Development
    for iOS10.1007/978-1-4842-2310-9_16


    # 16. SceneKit Editor


    James Goodwill^(1 ) and Wesley Matlock² (1) Highlands Ranch, Colorado, USA (2)
    Kansas City, Missouri, USA   Now that you have a basic understanding of how SceneKit
    works, you can now use the render loop to create, control, and animate SCNodes.
    In previous chapters, you’ve been using code to manipulate those objects. In this
    chapter, you’ll learn how to do the same thing in the SceneKit Editor.'
  trans: "\n# 将控制器连接到覆盖层\n\n现在你已经完成了 `GameOverlay` 类，是时候将其连接到 `GameViewController`\
    \ 了。首先，你需要创建一个类级变量来访问 `GameOverlay` 类。这样，你就能轻松调用其方法启动计时器。你还需要创建一个布尔值来追踪游戏的启动状态：\n\
    \n```\nvar gameOverlay: GameOverlay!\ngameStarted = false\n```\n\n在 `GameViewController`\
    \ 的 `viewDidLoad` 函数中，将这个 `GameOverlay` 添加到 `SCNScene` 中。这样做可以让 SceneKit 框架将你的\
    \ `GameOverlay` 叠加到当前场景上：\n\n```\nsceneView.overlaySKScene = GameOverlay(size:\
    \ view.frame.size)\ngameOverlay = sceneView.overlaySKScene as! GameOverlay\n```\n\
    \n现在是运行游戏并查看覆盖层计时器出现在你一直在处理的场景顶部的好时机。运行游戏后，你将看到类似图 15-1 的场景。\n\n![A330720_2_En_15_Fig1_HTML.jpg](img/A330720_2_En_15_Fig1_HTML.jpg)\n\
    \n**图 15-1.** 带有计时器的覆盖层场景\n\n现在你有了覆盖层，需要在玩家开始移动太空人时启动计时器。因为你将使用 `sceneView` 中的\
    \ `touchCount` 来启动计时器，所以还需要确保玩家尚未启动游戏——否则，每次触摸都会重置计时器。在 `GameViewController` 类定义之后，你将添加另一个变量作为游戏开始时的标志，并将其初始化为\
    \ false：\n\n```\nvar gameStarted = false\n```\n\n现在，当玩家开始游戏时，你将其设置为 true，然后在游戏结束时再设置回\
    \ false。为此，你需要在 `GameViewController` 的 `didSimulatePhysicsAtTime` 函数中添加一些逻辑：\n\
    \n```\nfunc renderer(aRenderer: SCNSceneRenderer, didSimulatePhysicsAtTime time:\
    \ TimeInterval) {\n```\n\n在这个函数中，你将在函数顶部添加清单 15-5。这段代码检查用户是否触摸了屏幕，如果是，则启动计时器并设置\
    \ `gameStarted` 标志。稍后你将在代码中使用这个标志。\n\n```\nif touchCount > 0 && !gameStarted {\n\
    \    gameOverlay.startTimer()\n    gameStarted = true\n}\n```\n\n**清单 15-5.**\
    \ 在 `didSimulatePhysicsAtTime` 协议中启动计时器\n\n这次运行游戏时，你会注意到当你触摸设备时，计时器开始运行，如图 15-2\
    \ 所示。\n\n![A330720_2_En_15_Fig2_HTML.jpg](img/A330720_2_En_15_Fig2_HTML.jpg)\n\
    \n**图 15-2.** 计时器运行中\n\n对于计时器，你最后需要做的是在收集完所有可收集物品时调用 `stopTimer()` 方法。最好的位置是在\
    \ `SCNPhysicsWorld` 的 `didBeginContact` 协议中。你将在 switch 语句之后检查分数是否超过一定数量——在本例中是\
    \ 50 分：\n\n```\nif gameOverlay.score >= 50 {\n    gameOverlay.stopTimer()\n}\n\
    ```\n\n这次当你运行游戏并操控英雄收集物品时，当分数达到进入下一关所需分数时，计时器将停止，同时也会记录达到该分数所花费的时间。\n\n## “游戏结束”画面\n\
    \n现在你有了一个可运行的游戏，但如果能有一个“游戏结束”画面来显示你的时间和分数，并能够重新开始游戏，那不是很好吗？你将创建另一个视图，当英雄达到分数时更新\
    \ `sceneView.overlaySKScene`。像之前一样创建一个名为 `GameOverView.swift` 的新 Swift 文件。`GameOverView`\
    \ 看起来会似曾相识——清单 15-6 包含了你需要放入 `GameOverView` 类的代码。\n\n```\nimport SpriteKit\n\n\
    class GameOverView: SKScene {\n    required init?(coder aDecoder: NSCoder) {\n\
    \        super.init(coder: aDecoder)\n    }\n\n    init(size: CGSize, score: String)\
    \ {\n        super.init(size: size)\n        backgroundColor = .red\n\n      \
    \  let backgroundNode = SKSpriteNode(imageNamed: \"GameOverBackground\")\n   \
    \     backgroundNode.anchorPoint = CGPoint(x: 0.5, y: 0.0)\n        backgroundNode.position\
    \ = CGPoint(x: 160.0, y: 0.0)\n        addChild(backgroundNode)\n\n        let\
    \ scoreTextNode = SKLabelNode(fontNamed: \"Copperplate\")\n        scoreTextNode.text\
    \ = \"SCORE :  \\(score)\"\n        scoreTextNode.horizontalAlignmentMode = .center\n\
    \        scoreTextNode.verticalAlignmentMode = .center\n        scoreTextNode.fontSize\
    \ = 20\n        scoreTextNode.fontColor = .white\n        scoreTextNode.position\
    \ = CGPoint(x: size.width / 2.0, y: size.height - 75.0)\n        addChild(scoreTextNode)\n\
    \n        let tryAgainText = SKLabelNode(fontNamed: \"Copperplate\")\n       \
    \ tryAgainText.text = \"TAP ANYWHERE TO PLAY AGAIN!\"\n        tryAgainText.horizontalAlignmentMode\
    \ = .center\n        tryAgainText.verticalAlignmentMode = .center\n        tryAgainText.fontSize\
    \ = 20\n        tryAgainText.fontColor = .white\n        tryAgainText.position\
    \ = CGPoint(x: size.width / 2.0, y: size.height - 200)\n        addChild(tryAgainText)\n\
    \    }\n}\n```\n\n**清单 15-6.** `GameOverView`\n\n清单 15-7 显示了更新后的 `didBeginContact`\
    \ 方法。玩家与可收集物品接触，分数随之更新。接下来，如果玩家达到了该关卡的分数，计时器将停止。如果发生这种情况，你将向用户显示“游戏结束”视图。\n\n\
    ```\nif gameOverlay.score >= 50 {\n    gameOverlay.stopTimer()\n    sceneView.overlaySKScene\
    \ = GameOverView(size: view.bounds.size, score: String(gameOverlay.score))\n}\n\
    ```\n\n**清单 15-7.** 分数检查与显示游戏结束场景\n\n现在当你运行游戏并遇到敌人时，玩家将看到一个“游戏结束”视图及其所用时间。还有一件事需要处理，那就是将\
    \ `sceneView.overlaySKScene` 更新回原始的计时器画面。要重新开始游戏，只需触摸屏幕任意位置即可，如图 15-3 所示。\n\n\
    ![A330720_2_En_15_Fig3_HTML.jpg](img/A330720_2_En_15_Fig3_HTML.jpg)\n\n**图 15-3.**\
    \ “游戏结束”画面\n\n## 总结\n\n现在你有了一个包含计时器的 SpriteKit 覆盖层场景，并且你在场景中随机放置了物体。你可以扩展这个覆盖层场景，并根据需要为游戏添加更多\
    \ SpriteKit 功能。现在你已经创建了一个使用 Apple SceneKit 库的简单游戏。你学习了什么是场景图，以及 SceneKit 如何利用这个图在设备\
    \ GPU 上显示 3D 对象。尝试在模拟器上运行这个游戏而不是在设备上运行，你会看到 GPU 对性能的提升有多大。\n\n© James Goodwill\
    \ and Wesley Matlock 2017  \nJames Goodwill and Wesley Matlock, *Beginning Swift\
    \ Games Development for iOS*  \n10.1007/978-1-4842-2310-9_16\n\n# 16. SceneKit\
    \ 编辑器\n\nJames Goodwill¹ and Wesley Matlock²  \n(1) 美国科罗拉多州海兰兹牧场  \n(2) 美国密苏里州堪萨斯城\n\
    \n现在你已对 SceneKit 的工作原理有了基本了解，可以使用渲染循环来创建、控制和动画化 `SCNodes`。在之前的章节中，你一直使用代码来操作这些对象。在本章中，你将学习如何在\
    \ SceneKit 编辑器中完成同样的操作。\n"
- fmt: "# The SceneKit Scene\n\nIf you haven't downloaded the source code from the\
    \ Apress website, you'll have to for this section. The Xcode project contains\
    \ all the graphical assets you'll need to follow along with this chapter. Download\
    \ it from [www.apress.com/97814823093](http://www.apress.com/97814823093). Open\
    \ the `Swiftystein3D` project if you don't have it open already. First thing you'll\
    \ do is add in a new SceneKit file from the Resources section of the Add New file.\
    \ Now go ahead and right-click the project to add a file to the project, as in\
    \ Figure 16-1. ![A330720_2_En_16_Fig1_HTML.jpg](OEBPS/A330720_2_En_16_Fig1_HTML.jpg)\
    \ Figure 16-1. Adding a new file After you've selected New File, the next screen\
    \ you'll see is similar to Figure 16-2. You may have to scroll down in order to\
    \ see the SceneKit Scene Resource. ![A330720_2_En_16_Fig2_HTML.jpg](OEBPS/A330720_2_En_16_Fig2_HTML.jpg)\
    \ Figure 16-2. SceneKit Scene File selection Once you've selected the SceneKit\
    \ Scene File, you will this file `Level1.scn`. You now have a blank `Level1` scene\
    \ that you'll use to create a simple scene like the simple scene you created programmatically.\
    \ Figure 16-3 shows the entire SceneKit Editor that we'll go over. ![A330720_2_En_16_Fig3_HTML.jpg](OEBPS/A330720_2_En_16_Fig3_HTML.jpg)\
    \ Figure 16-3. SceneKit Editor Here's an overview of the SceneKit Editor:\n\n\
    1.  Scene graph: This section has every node/element in the scene. This tree is\
    \ where you can control the child-parent relationship to the nodes.\n2.  Design\
    \ section: This section is where you'll drag and drop your objects from the object\
    \ library section (4). You'll have a visual representation of all your nodes so\
    \ you can easily move items around and change their properties.\n3.  Inspectors/properties:\
    \ As you select objects in the design section, you'll have many properties that\
    \ you can adjust and control. As you make these adjustments, you'll see right\
    \ away visually what will happen.\n4.  Object library: This section has all the\
    \ objects that you can add to the scene. You simply drag and drop the object you\
    \ want and then adjust in the inspector/properties.\n5.  Actions: This section\
    \ allows you to add actions to a selected node.\n\n## Creating the Scene\n\nTo\
    \ start creating the scene, you first need to delete the default camera that was\
    \ originally added when you initially added the new file. In the scene graph section,\
    \ simply click the camera and delete it.\n\n### Adding the Floor\n\nStart by adding\
    \ a floor node from the object library. Simply find the floor and drag and drop\
    \ it into the design section. As you already know, a floor node will grow infinitely\
    \ automatically. However, right now the floor is simply a clear object, so it's\
    \ time to add a material to the floor. In the inspector section, select the material\
    \ inspector. This shows all the properties that you can adjust for the node's\
    \ material. The one you're interested in is the Diffuse property. Select this\
    \ property and scroll through your choices to `sceneFloor.png`. Once you've completed\
    \ this step, your screen should look like Figure 16-4. ![A330720_2_En_16_Fig4_HTML.jpg](OEBPS/A330720_2_En_16_Fig4_HTML.jpg)\
    \ Figure 16-4. Flood node scene\n\n### Adding the Hero\n\nOne very powerful thing\
    \ you can do with in the Scene Editor is simply drag and drop other scenes, including\
    \ DAE files, onto this level scene. This capability allows your graphic designer\
    \ to create beautiful objects that you can use in your game level. You've used\
    \ `hero.dea` in previous chapters when you programmatically created the scene.\
    \ This time you'll drag and drop that file on to the `Level1` design section of\
    \ the Editor. When you drag and drop a new scene into the current scene, you're\
    \ actually creating a reference to the original file. By creating a reference\
    \ if you have an object in multiple scenes (Levels, in this case), you would only\
    \ need to update the original file, and then all the other references would be\
    \ updated. For example, if you decided you wanted to change the textures of the\
    \ hero, you would only have to make those changes on the `Hero.dea` file. Then\
    \ anywhere that file is referenced it would be updated. Figure 16-5 shows what\
    \ your scene should resemble. ![A330720_2_En_16_Fig5_HTML.jpg](OEBPS/A330720_2_En_16_Fig5_HTML.jpg)\
    \ Figure 16-5. Hero node placed into scene If your placement of the hero node\
    \ doesn't look exactly like Figure 16-5, don't worry. Now that you have a couple\
    \ of nodes, let's go over some of the inspector properties that you can use to\
    \ manipulate the node. Make sure you've selected the hero reference node. Figure\
    \ 16-6 shows the node inspector, and one of the properties you can adjust is the\
    \ position of the node, the scale, and the angle at which the node is located.\
    \ As you can see, there are several other properties at your disposal. Because\
    \ we're keeping things simple, we'll leave most of the at the default for now.\
    \ However, feel free to explore each of these properties—that's the beauty of\
    \ the SceneKit Editor. ![A330720_2_En_16_Fig6_HTML.jpg](OEBPS/A330720_2_En_16_Fig6_HTML.jpg)\
    \ Figure 16-6. Node inspector\n\n### Adding in the Camera\n\nNow that you have\
    \ the hero in place, you need to add a camera so that when you play the game you\
    \ can follow the hero around. Drag the camera node from the object library into\
    \ the scene graph. Don't worry about where the camera is placed—you'll make the\
    \ adjustments in the node inspector and change the position and Euler angle so\
    \ that the camera is right above and behind the hero. Figure 16-7 shows the settings\
    \ to make to the camera. ![A330720_2_En_16_Fig7_HTML.jpg](OEBPS/A330720_2_En_16_Fig7_HTML.jpg)\
    \ Figure 16-7. Camera node inspector settings Now we'll go over the attribute\
    \ inspector shown in Figure 16-8, and you can see some of the new and exciting\
    \ attributes that Apple introduced into iOS 10 SceneKit. ![A330720_2_En_16_Fig8_HTML.jpg](OEBPS/A330720_2_En_16_Fig8_HTML.jpg)\
    \ Figure 16-8. Camera attribute inspector The properties we will explore are as\
    \ follows:\n\n*   HDR: You can now enable the High Dynamic Range technique for\
    \ your scene. This produces a greater dynamic range of lighting. Average Gray\
    \ is the middle of the lighting tone used in the mapping of the light curve. White\
    \ Point is the higher level of lighting tone used in the mapping of the light\
    \ curve.\n*   Adaption: This is an interesting effect that controls the way the\
    \ player's eyes adjust when the lightening changes from light to dark and vice\
    \ versa. Think of this as when your scene transitions from inside a dark dungeon\
    \ to the bright outside.\n*   Exposure: Basically, the darkness and lightness\
    \ of the scene.\n*   Bloom: This is that haziness you see around a brightly light\
    \ area.\n*   Depth of Field: These items have been around and reviewed in previous\
    \ sections.\n*   Post Processing: More newness attributes introduced in iOS 10:\n\
    \    *   Vignetting: Allows you to control the lightening around the edges of\
    \ the scene\n    *   Color Fringe: Gives your scene some color mixing around nodes\n\
    \    *   Color Grading: Allows you to enhance the overall color saturation of\
    \ the rendered scene\n*   Motion Blur: This property adds the blurring effect\
    \ to all objects that are in motion.\n\nOnce you have the camera set up, Figure\
    \ 16-9 shows how your scene should look now. ![A330720_2_En_16_Fig9_HTML.jpg](OEBPS/A330720_2_En_16_Fig9_HTML.jpg)\
    \ Figure 16-9. Current scene with camera"
