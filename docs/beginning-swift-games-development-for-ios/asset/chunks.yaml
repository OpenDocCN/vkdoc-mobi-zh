  trans: "\n创建几何体节点大概就是这样。接下来，你需要将其添加到场景中，这样在运行游戏时才能实际看到它。前往 `GameViewController`\
    \ 类。在该类中找到 `createMainScene()` 方法。你需要在 `mainScene.rootNode.addChildNode(createFloorNode())`\
    \ 之后添加 `mainScene.rootNode.addChildNode(Collectable.pyramidNode())`。务必在 `createFloorNode()`\
    \ 之后添加这个新的子节点。添加完这行代码后，运行游戏。现在你会看到一个金字塔位于英雄角色后面不远处，如图 11-5 所示。\n\n![A330720_2_En_11_Fig5_HTML.jpg](img/A330720_2_En_11_Fig5_HTML.jpg)\n\
    \n图 11-5. 金字塔节点\n\n好了，现在屏幕中央出现了一个金字塔。不过，它的外观并不太好看。我们还没讨论节点材质的问题。你将在下一章学习更多关于材质和\
    \ `SCNMaterial` 对象的知识，但至少应该先给这个金字塔以及后续创建的其他可收集物品添加一些颜色。回到 `Collectable` 类，找到 `pyramidNode`\
    \ 方法。在设置位置的那行代码之后，继续添加如下代码：\n\n```\n// 4 给节点添加颜色\npyramidNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.blue\npyramidNode.geometry?.firstMaterial?.shininess = 1.0\n```\n\n\
    这里所做的就是将 `firstMaterial` 设置为蓝色。请记住，我们会在下一章更详细地讲解 `diffuse` 和 `shininess`。目前，我们只是让\
    \ `pyramidNode` 发出蓝色光泽。如果你想使用其他 `UIColor` 的默认颜色，可以随意更换。实际上，稍后你还会创建几种其他几何体类型的节点，并为它们设置不同的颜色。\n\
    \n现在再运行游戏，你的金字塔会变成蓝色，或者你设置的其他任何颜色。你现在已经掌握了创建基本 SceneKit 几何体对象的基础知识。接下来，请确保你仍在\
    \ `Collectable` 类中，并按照 `pyramidNode` 中的相同模式创建更多对象。让我们继续添加另一个可收集物品，创建一个球体节点。在 `pyramidNode`\
    \ 方法下方，添加代码清单 11-3 所示的代码。\n\n```\nclass func sphereNode() -> SCNNode {\n    //\
    \ 1 创建 SCNGeometry 类型\n    let sphere = SCNSphere(radius: 6.0)\n    // 2 使用几何体类型创建节点\n\
    \    let sphereNode = SCNNode(geometry: sphere)\n    sphereNode.name = \"sphere\"\
    \n    //3 设置节点位置\n    let position  = SCNVector3Make(35, 0, -60)\n    sphereNode.position\
    \ = position\n    // 4 给节点添加颜色\n    sphereNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.red\n    sphereNode.geometry?.firstMaterial?.shininess = 1.0\n   \
    \ return sphereNode\n}\n```\n\n代码清单 11-3. 球体节点\n\n现在有了这个方法，接下来需要将其添加到场景中。再次前往\
    \ `GameViewController`，并将它添加到 `mainScene` 中。暂时先将 `addChildNode(Collectable.pyramidNode())`\
    \ 注释掉，然后在下方为球体节点添加如下代码：\n\n```\n// mainScene.rootNode.addChildNode(Collectable.pyramidNode())\n\
    mainScene.rootNode.addChildNode(Collectable.sphereNode())\n```\n\n现在运行游戏，你会看到一个红色球体漂浮在地板上，如图\
    \ 11-6 所示。你可能需要移动并缩放摄像头视角才能近距离看到球体。\n\n![A330720_2_En_11_Fig6_HTML.jpg](img/A330720_2_En_11_Fig6_HTML.jpg)\n\
    \n图 11-6. 球体节点\n\n我们确信你已经注意到球体穿过了地板。这正是我们不希望出现的情况。这些几何体类型中有几种，其轴线位于物体的中心。因此，在这种情况下，如果你想让它悬浮在地板之上，就需要调整\
    \ y 轴坐标，使其等于球体的半径。在 `Collectable` 类中，将 `sphereNode.position` 改为：`let position\
    \ = SCNVector3Make(35, 6, -50)`。这次重新运行游戏，你会看到球体按我们期望的那样悬浮在地板上方，如图 11-7 所示。\n\n\
    ![A330720_2_En_11_Fig7_HTML.jpg](img/A330720_2_En_11_Fig7_HTML.jpg)\n\n图 11-7.\
    \ 悬浮的球体节点\n\n请随意调整位置，观察节点在场景中如何移动。现在，你将在 `Collectable` 类中添加更多几何体节点类型。代码清单 11-4\
    \ 为该类添加了立方体、管状体、圆柱体和环面体。\n\n```\nclass func boxNode() -> SCNNode {\n    // 1 创建\
    \ SCNGeometry 类型\n    let box = SCNBox(width: 3, height: 3, length: 3, chamferRadius:\
    \ 0)\n    // 2 使用几何体类型创建节点\n    let boxNode = SCNNode(geometry: box)\n    boxNode.name\
    \ = \"box\"\n    //3 设置节点位置\n    let position  = SCNVector3Make(20, 1.5, -20)\n\
    \    boxNode.position = position\n    // 4 给节点添加颜色\n    boxNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.brown\n    boxNode.geometry?.firstMaterial?.shininess = 1.0\n    return\
    \ boxNode\n}\n\nclass func tubeNode() -> SCNNode {\n    // 1 创建 SCNGeometry 类型\n\
    \    let tube = SCNTube(innerRadius: 1, outerRadius: 1.5, height: 2.0)\n    //\
    \ 2 使用几何体类型创建节点\n    let tubeNode = SCNNode(geometry: tube)\n    tubeNode.name\
    \ = \"tube\"\n    //3 设置节点位置\n    let position  = SCNVector3Make(-10, 0.75, -75)\n\
    \    tubeNode.position = position\n    // 4 给节点添加颜色\n    tubeNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.yellow\n    tubeNode.geometry?.firstMaterial?.shininess = 1.0\n  \
    \  return tubeNode\n}\n\nclass func cylinderNode() -> SCNNode {\n    // 1 创建 SCNGeometry\
    \ 类型\n    let cylinder = SCNCylinder(radius: 3, height: 8)\n    // 2 使用几何体类型创建节点\n\
    \    let cylinderNode = SCNNode(geometry: cylinder)\n    cylinderNode.name = \"\
    cylinder\"\n    //3 设置节点位置\n    let position = SCNVector3Make(0, 4, -25)\n   \
    \ cylinderNode.position = position\n    // 4 给节点添加颜色\n    cylinderNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.green\n    cylinderNode.geometry?.firstMaterial?.shininess = 1.0\n\
    \    return cylinderNode\n}\n\nclass func torusNode() -> SCNNode {\n    // 1 创建\
    \ SCNGeometry 类型\n    let torus = SCNTorus(ringRadius: 7, pipeRadius: 2)\n   \
    \ // 2 使用几何体类型创建节点\n    let torusNode = SCNNode(geometry: torus)\n    //3 设置节点位置\n\
    \    let position =  SCNVector3Make(75, 1, -80)\n    torusNode.position = position\n\
    \    // 4 给节点添加颜色\n    torusNode.geometry?.firstMaterial?.diffuse.contents = UIColor.orange\n\
    \    torusNode.geometry?.firstMaterial?.shininess = 1.0\n    return torusNode\n\
    }\n```\n\n代码清单 11-4. Collectable 类的更多几何体节点类型\n\n完成 `Collectable` 类的更新后，别忘了你还需要在\
    \ `GameViewController` 的 `mainScene` 中添加它们：\n\n```\nlet mainScene = SCNScene()\n\
    mainScene.rootNode.addChildNode(createFloorNode())\nmainScene.rootNode.addChildNode(Collectable.pyramidNode())\n\
    mainScene.rootNode.addChildNode(Collectable.sphereNode())\nmainScene.rootNode.addChildNode(Collectable.boxNode())\n\
    mainScene.rootNode.addChildNode(Collectable.tubeNode())\nmainScene.rootNode.addChildNode(Collectable.cylinderNode())\n\
    mainScene.rootNode.addChildNode(Collectable.torusNode())\n```\n\n现在运行游戏，效果应该与图\
    \ 11-8 类似。你需要移动摄像头（平移并缩小视角）才能看到所有物体。\n\n![A330720_2_En_11_Fig8_HTML.jpg](img/A330720_2_En_11_Fig8_HTML.jpg)\n\
    \n图 11-8. 几何体节点布局——可收集物品\n\n目前它们还没什么用，看起来也不是很有趣。你可以自由调整它们的大小和位置，以便更好地理解这些变量如何改变物体。花些时间调整这些物体的位置，制作属于你自己的可收集物品布局。在示例代码中，我们将这些物体放置在一个大圆圈中。\n"
