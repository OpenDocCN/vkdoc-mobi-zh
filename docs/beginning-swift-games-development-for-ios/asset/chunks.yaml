    be applied. That sounds a little complicated, but it’s really pretty straightforward.
    Take a look at Figure [2-9](#A330720_2_En_2_Chapter.html#Fig9). ![A330720_2_En_2_Fig9_HTML.gif](OEBPS/A330720_2_En_2_Fig9_HTML.gif)
    Figure 2-9. SKSpriteNode’s anchor point unit coordinate system This figure shows
    an SKSpriteNode’s anchor point coordinate system . Notice the dot at position
    (0.5, 0.5). This is the default anchor point. Figure [2-10](#A330720_2_En_2_Chapter.html#Fig10)
    shows some common anchor points. ![A330720_2_En_2_Fig10_HTML.jpg](OEBPS/A330720_2_En_2_Fig10_HTML.jpg)
    Figure 2-10. SKSpriteNode example anchor points In Figure [2-10](#A330720_2_En_2_Chapter.html#Fig10)
    there are four common anchor points as they relate to the sprites they’re applied
    to. Looking at these examples, you can see that if you want to position the playerNode
    at the top-rightmost position of the scene and still have the entire spriteNode
    visible in the scene, you would need to set the sprite’s anchorPoint property
    to (1.0, 1.0). Do that now by adding the following line of code directly after
    playerNode’s construction: playerNode.anchorPoint = CGPoint(x: 1.0, y: 1.0) Now
    run the application once more. You will now see the entire playerNode positioned
    at the top right of the scene, as shown in Figure [2-11](#A330720_2_En_2_Chapter.html#Fig11).
    ![A330720_2_En_2_Fig11_HTML.jpg](OEBPS/A330720_2_En_2_Fig11_HTML.jpg) Figure 2-11.
    The entire playerNode at the top right of the scene To get a handle on anchor
    points, play around with different anchor points and positions of the playerNode
    and see how each of the different anchor points affects the positioning of the
    playerNode. It’s really important to understand how the position and anchorPoint
    properties work together. Note When you’re finished playing around with the playerNode’s
    position and anchor point , revert all your code changes until the project is
    back to where you left it in Chapter [1](#A330720_2_En_1_Chapter.html).


    ## Summary


    This chapter covered quite a bit of information, including what SKScenes are and
    how they are built. We also talked about the SKScene rendering loop and how the
    order the scene’s node tree is constructed can affect the look and interactivity
    of the nodes. We closed the chapter with a look at a scene’s coordinate system
    and node anchor points. Chapter [3](#A330720_2_En_3_Chapter.html) covers SpriteKit’s
    physics engine and collision detection. That chapter will be a lot of fun, and
    you’ll start seeing your game coming to life.© James Goodwill and Wesley Matlock 2017
    James Goodwill and Wesley MatlockBeginning Swift Games Development for iOS10.1007/978-1-4842-2310-9_3


    # 3. Adding Physics and Collision Detection to Your Game


    James Goodwill^(1 ) and Wesley Matlock² (1) Highlands Ranch, Colorado, USA (2)
    Kansas City, Missouri, USA   This chapter covers SpriteKit’s physics engine and
    collision detection. We begin with a discussion of SKPhysicsBody—the class used
    to simulate collision detection. You will then turn on gravity in the game world
    and see how that affects the nodes. After that, you will add a touch responder
    to propel the playerNode up into space. I close this chapter with a discussion
    of how to handle node collisions.


    ## What Is an SKPhysicsBody?


    To simulate physics in a SpriteKit game, you add a physics body to a scene or
    node. A physics body, implemented by the SpriteKit class SKPhysicsBody, is a simulated
    object attached to a node in the scene’s node tree. The SKPhysicsBody class uses
    the properties of the node, such as the position and velocity, combined with its
    own properties, to simulate how physical forces are applied to the simulated game
    world. It does the calculations to perform these simulations with each iteration
    of the render loop . There are three types of physics bodies: dynamic volume,
    a static volume, and an edge. A dynamic volume is a physical body with a volume
    and a mass that is affected by collisions and forces in the physics simulation.
    Nodes with a dynamic volume attached to them are the active nodes in games. A
    physics body with a static volume is just like a dynamic volume, except forces
    and collisions don’t affect them. Static volume bodies are often used as barriers
    in a game. When a dynamic body collides with a static body, the dynamic body is
    affected by the collision, and the static body remains constant. An edge is a
    static body without volume. The simulation never moves an edge, and an edge’s
    mass doesn’t affect the simulation of other nodes. Edges represent negative space
    within a scene.


    ## Adding Physics to Your Game World'
