    ## Which Version of Swift Is Covered in This book?


    This book covers version 3 of Swift and iOS version 10\. As new versions are released,
    we will update the source for this book at both the Apress.com web site and James
    Goodwill’s blog at [www.jgoodwill.org](http://www.jgoodwill.org) .


    ## What This Book Is


    Game apps are one of the most popular categories in the Apple iTunes App Store.
    Well, the introduction of the new Swift programming language will make game development
    even more appealing and easier to existing and future iOS app developers. In response,
    James Goodwill, Wesley Matlock, and Apress introduce you to this book, Beginning
    Swift Games Development for iOS . In this book, you’ll learn the fundamental elements
    of the new Swift language as applied to game development for iOS in 2D and 3D
    worlds using both Sprite Kit and Scene Kit, respectively.


    ## What You Need to Know


    This book assumes you have a basic understanding of how to create applications
    for the iPhone using Xcode. You will also need a basic understanding of Apple’s
    new programming language, Swift 3\. We assume that you can download, install,
    and use the latest version of Xcode to create an application and run it on the
    iPhone simulator.


    ## What You Need to Have


    In terms of hardware, you need an Intel-based Macintosh running Mountain Lion
    (OS X 10.8) or later. Regarding software, you need Xcode 8.x since that is the
    current version to include Swift 3\. You can download Xcode from the App Store
    or Apple’s developer web site at [http://developer.apple.com](http://developer.apple.com)
    .'
