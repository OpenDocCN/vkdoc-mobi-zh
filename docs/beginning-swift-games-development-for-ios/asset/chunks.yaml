    spaceman colliding with objects instead of going through them. At this point,
    you’re almost finished with the hide-and-seek game. In Chapter [15](#A330720_2_En_15_Chapter.html)
    you’ll use this collision protocol to update the score. This scoreboard that you’ll
    create will be in a SpriteKit view. This way, you can see how to combine a SpriteKit
    view with in a SceneKit scene.© James Goodwill and Wesley Matlock 2017 James Goodwill
    and Wesley MatlockBeginning Swift Games Development for iOS10.1007/978-1-4842-2310-9_15


    # 15. SceneKit Interaction with SpriteKit


    James Goodwill^(1 ) and Wesley Matlock² (1) Highlands Ranch, Colorado, USA (2)
    Kansas City, Missouri, USA   In the previous chapters, you’ve worked within the
    SceneKit paradigm; however, Apple has created a way for you to add a 2D scene
    to overlay on your 3D scenes. In this chapter, you’ll add a 2D scene that will
    be used for your timer so it can track how long it will take you and your friends
    to find and capture the enemy.


    ## SpriteKit Integration


    SceneKit gives you a property to add a SpriteKit scene: var overlaySKScene: SKScene!
    { get set } This property can render a 2D scene that overlays the SceneKit scene.
    To provide better performance, SceneKit and SpriteKit use the same OpenGL context
    and resources to render the scene. For this game, you’ll add a scoreboard to the
    top of the scene. To get started, create a new Swift file and name it GameOverlay.swift.
    Now that you have the file created, you need to import both SceneKit and SpriteKit:
    import SceneKit import SpriteKit class GameOverlay: SKScene { } Your class should
    look similar to the preceding code snippet. Your GameOverlay class is a subclass
    from the SKScene, which should look familiar from previous chapters. For this
    class, you’ll add a node for the score and another one to keep track of the player’s
    lives. The first part you’ll need to do is make one variable to hold the SKLabelNode
    object . Because you’ll be using the time interval from Date, you need to create
    a NumberFormatter : var timerNode: SKLabelNode! var scoreNode: SKLabelNode! var
    timerFormat: NumberFormatter! Now that you have some variables, you’ll need to
