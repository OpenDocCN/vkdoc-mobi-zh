  trans: "\n完成以上步骤后，选择新创建的 `EngineExhaust.sks` 文件。你会看到类似图 6-9 的画面。![A330720_2_En_6_Fig9_HTML.jpg](img/A330720_2_En_6_Fig9_HTML.jpg)\
    \ 图 6-9. 默认火焰粒子发射器 效果看起来不错，但为了模拟太空人向上飞行时的尾气排放，需要将火焰的发射角度旋转 180 度。具体操作是：将`角度`属性的`起始`值改为\
    \ 270 度；为了调整火焰宽度，将`位置范围`的`X`值减小为 23。图 6-10 展示了这些改动。![A330720_2_En_6_Fig10_HTML.jpg](img/A330720_2_En_6_Fig10_HTML.jpg)\
    \ 图 6-10. 反向火焰粒子发射器的属性修改 完成这些修改后，你会看到火焰现在朝屏幕下方发射，且火焰宽度已减小。效果明显更好，但我们认为如果火焰更柔和一些，表现力会更佳。最简单的实现方法是降低粒子的`出生率`值。如图\
    \ 6-11 所示，将粒子`出生率`值减小为 100。![A330720_2_En_6_Fig11_HTML.jpg](img/A330720_2_En_6_Fig11_HTML.jpg)\
    \ 图 6-11. 减小后的粒子`出生率`值 太棒了。保存修改，让我们看看图 6-12 所示的新粒子发射器。![A330720_2_En_6_Fig12_HTML.jpg](img/A330720_2_En_6_Fig12_HTML.jpg)\
    \ 图 6-12. 最终粒子发射器 这正是我们需要的。火焰正以正确方向发射，且大小和`出生率`值非常适合附着在`playerNode`上。现在让我们开始使用这个新发射器。如果你还记得前面的内容，一旦发射器效果满意，将其添加到场景中是非常简单的。首先需要加载\
    \ `SKEmitterNode`，并使用新的 `SKS` 文件。这相当简单，只需在第一个 `GameScene.init()` 方法之前添加一个名为 `engineExhaust`\
    \ 的新 `SKEmitterNode`。声明如下：\n\n```\nvar engineExhaust: SKEmitterNode?\n```\n\n\
    完成此修改后，将以下代码行添加到第二个 `GameScene.init()` 方法的末尾：\n\n```\nlet engineExhaustPath =\
    \ Bundle.main.path(forResource: \"EngineExhaust\", ofType: \"sks\")\nengineExhaust\
    \ = NSKeyedUnarchiver.unarchiveObject(withFile: engineExhaustPath!) as? SKEmitterNode\n\
    engineExhaust?.position = CGPoint(x: 0.0, y: -(playerNode.size.height / 2))\n\
    ```\n\n除了最后一行，这些代码你之前都见过。最后一行将发射器的位置设置为点 (`0.0`, `-(self.playerNode.size.height\
    \ / 2)`)。使用这个点的原因在于发射器需要添加到 `playerNode` 上，而 `playerNode` 的锚点位于玩家中心。使用 `playerNode`\
    \ 一半高度的负值将把发射器放置在 `playerNode` 的底部。 好了，目前已经加载了发射器节点，准备将其添加到 `playerNode` 中。可以通过以下两行代码实现：\n\
    \n```\nplayerNode.addChild(engineExhaust!)\nengineExhaust?.isHidden = true\n```\n\
    \n查看这段修改，你会发现代码非常直接。首先将 `engineExhaust` 发射器节点添加到 `playerNode`，然后将尾气隐藏。这里隐藏尾气是因为我们希望在游戏玩家点击屏幕时，尾气发射器才可见。将这段代码添加在设置\
    \ `engineExhaust` 节点位置的代码行之后。 还有一件事需要做，即当用户点击屏幕时使 `engineExhaust` 可见。为此，在 `touchesBegan()`\
    \ 方法的第二个 `if` 语句末尾添加以下代码行，然后再次运行游戏：\n\n```\nengineExhaust?.isHidden = false\n\
    ```\n\n注意，这次点击屏幕时，太空人不仅会向上飞行，而且 `playerNode` 底部还会出现一股尾气流。效果很棒，但有一个问题：即使你停止点击屏幕，尾气发射器仍然可见。发射器应该在一段时间后消失，以模拟一个短暂的爆发力，并在短时间内消散。\
    \ 使用 `NSTimer` 可以轻松解决这个问题。修复方法是修改 `touchesBegan()` 方法，在每次点击屏幕并施加冲量时启动一个计时器。修改后的\
    \ `if` 语句如下所示：\n\n```\nif impulseCount > 0 {\n    playerNode.physicsBody?.applyImpulse(CGVector(dx:\
    \ 0.0, dy: 40.0))\n    impulseCount -= 1\n    engineExhaust?.isHidden = false\n\
    \    Timer.scheduledTimer(timeInterval: 0.5,\n        target: self,\n        selector:\
    \ #selector(GameScene.hideEngineExaust(_:)),\n        userInfo: nil,\n       \
    \ repeats: false)\n}\n```\n\n查看这些修改，你会注意到在 `if` 语句末尾创建了一个新的计时器，它将在预定后 0.5 秒执行\
    \ `hideEngineExhaust()` 方法。将要调用的 `hideEngineExhaust()` 方法如下：\n\n```\nfunc hideEngineExaust(_\
    \ timer:Timer!) {\n    if !engineExhaust!.isHidden {\n        engineExhaust?.isHidden\
    \ = true\n    }\n}\n```\n\n检查 `hideEngineExhaust()` 方法，你会发现它的功能与名称完全一致：首先检查 `engineExhaust`\
    \ 是否可见，如果可见则将其隐藏。 对 `touchesBegan()` 方法进行这些修改，并将 `hideEngineExhaust()` 方法添加到 `GameScene`\
    \ 的底部。完成这些修改后，再次运行应用。这次你会注意到，每次点击屏幕时，尾气会添加到 `playerNode` 上，并在最后一次点击后 0.5 秒从 `playerNode`\
    \ 上移除。效果明显更好了。 在结束本章之前，请确保最终的 `touchesBegan()` 方法如下所示：\n\n```\noverride func touchesBegan(_\
    \ touches: Set<UITouch>, with event: UIEvent?) {\n    if !playerNode.physicsBody!.isDynamic\
    \ {\n        playerNode.physicsBody?.isDynamic = true\n        coreMotionManager.accelerometerUpdateInterval\
    \ = 0.3\n        coreMotionManager.startAccelerometerUpdates()\n    }\n    if\
    \ impulseCount > 0 {\n        playerNode.physicsBody?.applyImpulse(CGVector(dx:\
    \ 0.0, dy: 40.0))\n        impulseCount -= 1\n        engineExhaust!.isHidden\
    \ = false\n    Timer.scheduledTimer(timeInterval: 0.5,\n        target: self,\n\
    \        selector: #selector(GameScene.hideEngineExaust(_:)),\n        userInfo:\
    \ nil,\n        repeats: false)\n    }\n}\n```\n\n## 总结\n\n在本章中，我们简要介绍了粒子发射器，包括快速浏览了\
    \ Xcode 的一些模板发射器。之后，我们演示了如何将粒子发射器添加到 `playerNode` 中，以便在每次对 `physicsBody` 施加冲量时模拟发动机尾气。在第\
    \ 7 章中，你将首次了解 SpriteKit 的 `SKTextNode`，届时我们将展示如何为 SuperSpaceMan 游戏添加计分功能。之后，你还将看到\
    \ `SKAction` 的另一种用途——为 SuperSpaceMan 游戏添加音效。© James Goodwill and Wesley Matlock 2017\
    \ James Goodwill and Wesley MatlockBeginning Swift Games Development for iOS10.1007/978-1-4842-2310-9_7\n\
    \n# 7. 添加分数和音效\n\nJames Goodwill^(1 ) and Wesley Matlock² (1) 美国科罗拉多州海兰兹牧场 (2)\
    \ 美国密苏里州堪萨斯城   在本章中，我们将讨论如何使用 `SKLabelNode` 为 SpriteKit 游戏添加标签。具体来说，我们将演示如何添加一个标签来跟踪\
    \ SuperSpaceMan 剩余的可使用冲量次数，然后演示如何为游戏添加计分功能，以跟踪 SuperSpaceMan 已收集的能量球数量。在本章末尾，你将有机会重新审视\
    \ `SKAction`，届时我们将展示如何使用它们来添加简单的游戏音效。\n"
- fmt: "# Introducing SKLabelNodes\n\nAs mentioned, SpriteKit implements text labels\
    \ using a class named `SKLabelNode`. The `SKLabelNode` class, just like all the\
    \ nodes you’ve seen so far, is an extension of `SKNode`. It’s a pretty simple\
    \ class with only two `init()` methods and a handful of properties, all focused\
    \ on setting label fonts, colors, and layout.\n\nThe simplest way to use an `SKLabelNode`\
    \ is shown in the following snippet:\n\n```\nlet simpleLabel = SKLabelNode(fontNamed:\
    \ \"Copperplate\")\nsimpleLabel.text = \"Hello, SpriteKit!\";\nsimpleLabel.fontSize\
    \ = 40;\nsimpleLabel.position = CGPoint(x: size.width / 2.0, y: size.height /\
    \ 2.0)\naddChild(simpleLabel)\n```\n\nAs you look at this code, you can see that\
    \ it first creates the `SKLabelNode` class by passing the `init()` method the\
    \ name of the font you want to use. After that, you set the `text` property of\
    \ the label. You then set the `fontSize` and `position` properties. Finally, you\
    \ add the label node to the scene.\n\nLet’s give this a try in a sample application.\
    \ Go back to Xcode and create a new Game project using Swift as the language.\
    \ Now, just as you did in Chapter [1](#A330720_2_En_1_Chapter.html), delete the\
    \ `GameScene.sks` and `Actions.sks` files. Open `GameViewController.swift` and\
    \ replace its contents with the class in Listing [7-1](#A330720_2_En_7_Chapter.html#Par8).\n\
    \n```\nimport SpriteKit\n\nclass GameViewController: UIViewController {\n    var\
    \ scene: GameScene!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // 1. Configure the main view\n        let skView = view as! SKView\n\
    \        skView.showsFPS = true\n        // 2. Create and configure our game scene\n\
    \        scene = GameScene(size: skView.bounds.size)\n        scene.scaleMode\
    \ = .aspectFill\n        // 3. Show the scene.\n        skView.presentScene(scene)\n\
    \    }\n}\n```\n\n**Listing 7-1.** `GameViewController.swift`: The Main `UIViewController`\n\
    \nWhen you have your `GameViewController` modified, go to the `GameScene.swift`\
    \ file and change its body to match Listing [7-2](#A330720_2_En_7_Chapter.html#Par10).\n\
    \n```\nimport SpriteKit\n\nclass GameScene: SKScene {\n    required init?(coder\
    \ aDecoder: NSCoder) {\n        fatalError(\"init(coder:) has not been implemented\"\
    )\n    }\n    override init(size: CGSize) {\n        super.init(size: size)\n\
    \        let simpleLabel = SKLabelNode(fontNamed: \"Copperplate\")\n        simpleLabel.text\
    \ = \"Hello, SpriteKit!\"\n        simpleLabel.fontSize = 40\n        simpleLabel.position\
    \ = CGPoint(x: size.width / 2.0, y: size.height / 2.0)\n        addChild(simpleLabel)\n\
    \    }\n}\n```\n\n**Listing 7-2.** The New `GameScene` Class\n\nNote this listing\
    \ contains two `init()` methods. The first one is required and takes an `NSCoder`.\
    \ Because we’re managing the scene manually, you can ignore this `init()` method.\
    \ The second `init()` method takes a `CGSize`. Inside the `init()` method this\
    \ `super.init()` method is called, and then you see the `SKLabel`-related code.\
    \ This code looks exactly like the earlier snippet that added an `SKLabelNode`.\n\
    \nRun the app and take a look at the results. The new app should look like Figure\
    \ [7-1](#A330720_2_En_7_Chapter.html#Fig1).\n\n![A330720_2_En_7_Fig1_HTML.jpg](OEBPS/A330720_2_En_7_Fig1_HTML.jpg)\n\
    \n**Figure 7-1.** A simple `SKLabelNode` example\n\nAs you can see, the `SKLabelNode`\
    \ is pretty easy to use. Most of `SKLabelNode`’s properties are straightforward,\
    \ but there are a couple of properties that you may not have seen. The two `SKLabelNode`\
    \ properties are `horizontalAlignmentMode` and `verticalAlignmentMode`. Each of\
    \ these properties is described in the following sections.\n\n## Changing the\
    \ Horizontal Alignment of the Label Node\n\n`SKLabelNode`’s `horizontalAlignmentMode`\
    \ is used to set the horizontal position of the text relative to the node’s position.\
    \ There are three horizontal alignment options, all of which are defined by the\
    \ enum `SKLabelHorizontalAlignmentMode`. The three options are `SKLabelHorizontalAlignmentMode.left`,\
    \ `SKLabelHorizontalAlignmentMode.center`, and `SKLabelHorizontalAlignmentMode.right`.\n\
    \nTo see how this property and these options change the layout of the label node,\
    \ add the following line of code immediately after the line where you set the\
    \ position of the label node:\n\n```\nsimpleLabel.horizontalAlignmentMode = SKLabelHorizontalAlignmentMode.left\n\
    ```\n\nNow run the app again. This time you’ll see that the label has been shifted\
    \ to the right, as shown in Figure [7-2](#A330720_2_En_7_Chapter.html#Fig2).\n\
    \n![A330720_2_En_7_Fig2_HTML.jpg](OEBPS/A330720_2_En_7_Fig2_HTML.jpg)\n\n**Figure\
    \ 7-2.** A simple `SKLabelNode` example with its `horizontalAlignmentMode` set\
    \ to `SKLabelHorizontalAlignmentMode.right`\n\nSetting this alignment to `SKLabelHorizontalAlignmentMode.left`\
    \ tells SpriteKit to place the left side of the `SKLabelNode` at the origin of\
    \ the label node. The default value for the `horizontalAlignmentMode` is `SKLabelHorizontalAlignmentMode.center`,\
    \ which places the center of the label at the `position` property of the label.\
    \ You saw this mode in Figure [7-1](#A330720_2_En_7_Chapter.html#Fig1).\n\nTry\
    \ one more thing before moving on. Change the value of the `horizontalAlignmentMode`\
    \ property from `SKLabelHorizontalAlignmentMode.left` to `SKLabelHorizontalAlignmentMode.right`,\
    \ as shown here, and run the app again:\n\n```\nsimpleLabel.horizontalAlignmentMode\
    \ = SKLabelHorizontalAlignmentMode.right\n```\n\nThis time the right side of the\
    \ label is placed at the point of the `SKLabelNode`’s `position` property, as\
    \ shown in Figure [7-3](#A330720_2_En_7_Chapter.html#Fig3).\n\n![A330720_2_En_7_Fig3_HTML.jpg](OEBPS/A330720_2_En_7_Fig3_HTML.jpg)\n\
    \n**Figure 7-3.** A simple `SKLabelNode` example with its `horizontalAlignmentMode`\
    \ set to `SKLabelHorizontalAlignmentMode.left`\n\n## Changing the Vertical Alignment\
    \ of the Label Node"
