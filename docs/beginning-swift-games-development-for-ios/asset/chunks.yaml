    \ 191\n- Index 203\n\n### About the Authors and About the Technical Reviewer\n\
    \n#### About the Authors\n\n**James Goodwill** is a ten-time published author\
    \ of books about leading technologies such as iOS, Swift, Objective C, Grails,\
    \ Groovy, Java Servlets, JavaServer Pages (JSP), Tomcat, and Struts. He is a senior\
    \ enterprise iOS and Java consultant in the Denver metro area and frequent speaker\
    \ and article writer. You can find additional resources about Sprite Kit, Swift,\
    \ and James himself at his blog at [www.jgoodwill.org](http://www.jgoodwill.org).\
    \ You can also follow James on Twitter at [https://twitter.com/jamesgoodwill](https://twitter.com/jamesgoodwill).\n\
    \n**Wesley Matlock** is a professional independent iOS consultant in the Kansas\
    \ City metro area. He has more than 20 years of development experience in several\
    \ different platforms. He first started doing mobile development on the Compaq\
    \ iPaq in the early 2000s. Today he enjoys developing on the iOS platform and\
    \ bringing new ideas to life.\n\n#### About the Technical Reviewer\n\n**Bruce\
    \ Wade** is a software engineer from British Columbia, Canada. He started software\
    \ development when he was 16 years old by coding his first website. He went on\
    \ to study Computer Information Systems ad DeVry Institute of Technology in Calgary,\
    \ then to further enhance his skills he studied Visual & Game Programming at The\
    \ Art Institute Vancouver. Over the years he has worked for large corporations\
    \ as well as several start-ups. His software experience has led him to utilize\
    \ many different technologies including C/C++, Python, Objective-C, Swift, Postgres,\
    \ and JavaScript. In 2012 he started the company Warply Designed to focus on mobile\
    \ 2D/3D and OS X development. Aside from hacking out new ideas, he enjoys spending\
    \ time hiking with his Boxer Rasco, working out, and exploring new adventures."
  raw: '## What’s in This Book?


    In Chapter [1](#A330720_2_En_1_Chapter.html) , you’ll learn about what Sprite
    Kit is and how you create a new Sprite Kit game using Xcode. You will then dive
    in and create the beginnings of a Sprite Kit game starting from scratch. You will
    learn about SKNode s and their subclasses, and you’ll use an SKSpriteNode to add
    both a background node and a player node. In Chapter [2](#A330720_2_En_2_Chapter.html)
    , we will step back a bit and give you a deeper look at Sprite Kit scenes, including
    how scenes are built and why the order they are built in can change your game.
    The chapter will close with a discussion of Sprite Kit coordinate systems and
    anchor points as they relate to SKNode s. In Chapter [3](#A330720_2_En_3_Chapter.html)
    , you’ll work with Sprite Kit’s physics engine and collision detection. The chapter
    will begin with a discussion of SKPhysicsBody —the class used to simulate collision
    detection. You will then turn on gravity in the game world and see how that affects
    the nodes. After that, you will add a touch responder to propel the playerNode
    up into space, and finally you will learn how to handle node collisions. In Chapter
    [4](#A330720_2_En_4_Chapter.html) , you’ll start adding some real functionality
    to your game. You’ll begin by making some small changes to the current GameScene
    . After that, you will add additional orb nodes to collide into. You will then
    add scrolling to your scene, allowing you to make it look like the player is flying
    through space collecting orbs. Finally, you will start using the phone’s accelerometer
    to move the player along the x-axis. In Chapter [5](#A330720_2_En_5_Chapter.html)
    , you’ll refactor the orb node’s layout one last time with the goal of enhancing
    playability. After that, you will learn how you can use SKAction s to move an
    SKSpriteNode back and forth across the scene and then make that same node rotate
    forever. The chapter will close with a look at how you can add colorizing effects
    to an SKSpriteNode using a colorize action. In Chapter [6](#A330720_2_En_6_Chapter.html)
    , you’ll see how to define particle emitters and how to leverage them in Sprite
    Kit games. After that, you will learn how you can use them to add engine exhaust
    to the playerNode whenever an impulse is applied to the physicsBody . In Chapter
    [7](#A330720_2_En_7_Chapter.html) , you’ll see how you can use SKLabelNode s to
    add text to your Sprite Kit games. Specifically, you’ll see how you how to add
    a label that keeps up with the number of impulses remaining for the spaceman to
    use, and then you’ll see how you can add scoring to the game to keep up with the
    number of orbs the spaceman has collected. In Chapter [8](#A330720_2_En_8_Chapter.html)
    , you’ll learn how to implement scene transitions using Sprite Kit’s SKTransition
    class. You will look at some of the different types of built-in transitions Sprite
    Kit makes available to you. You will also see how you can control each scene during
    a transition. At the end of the chapter, you will take your newfound knowledge
    and add a menu scene to your SuperSpaceMan game. In Chapter [9](#A330720_2_En_9_Chapter.html)
    , you’ll learn some Sprite Kit best practices; specifically, you will see how
    you can create your own subclasses of SKSpriteNode so that you can better reuse
    your nodes. You will then move on to changing your game to load all the sprites
    into a single texture atlas that you can reference when creating all future sprites.
    After that, you will move on to externalizing some of your game data so that designers
    and testers can change the game play. Finally, you will close out the chapter
    when you prune your node tree of all nodes that have fallen off the bottom of
    the screen. In Chapter [10](#A330720_2_En_10_Chapter.html) , you’ll learn about
    what Scene Kit is and how to create a new Scene Kit game using Xcode. You will
    then dive in and create the beginnings of a Scene Kit game starting from scratch.
    You will learn to about SCNScene and SCNode s with a Scene Kit primer. In Chapter
    [11](#A330720_2_En_11_Chapter.html) , you’ll learn more about the scene graph
    and some of the basics of Scene Kit. You will start to create your game by loading
    the spaceman from his Collada file. You will also learn about the Scene Kit primitive
    geometries by adding these as objects for the spaceman to avoid. In Chapter [12](#A330720_2_En_12_Chapter.html)
    , you’ll learn how Scene Kit uses lighting and the type of lighting that is available
    to you in Scene Kit. You will also examine how materials are added onto the SCNNode
    , as well as how the camera is used within the scene. In Chapter [13](#A330720_2_En_13_Chapter.html)
    , you’ll learn about the basics of animating the objects in your game. You will
    see a couple of different ways to animate the nodes to give you more than one
    way to do your animations. Once you have completed this chapter, all your objects
    will move within the scene. In Chapter [14](#A330720_2_En_14_Chapter.html) , you’ll
    learn about collision detection within the scene. You will learn how to move the
    spaceman around the scene. Once you have the spaceman moving, you will learn how
    to detect when the spaceman runs into an obstacle. In Chapter [15](#A330720_2_En_15_Chapter.html)
    , you’ll learn how to use a Sprite Kit scene within the Scene Kit scene. The chapter
    will show you how to create a screen to show you a timer that you will start when
    the user starts the game. The chapter will also show you how to display a “game
    over” screen and then restart the game. In Chapter [16](#A330720_2_En_16_Chapter.html)
    , you will learn the basics of the SceneKit Editor. This chapter will give you
    a basic understanding of creating a scene and various nodes visually in the editor.
    No coding will be done, but rather drag and dropping nodes and using the various
    editors to manipulate the objects.Acknowledgments This book could not have been
    written without the incredible folks at Apress. The idea of a Swift iOS gaming
    book began with a conversation with Steve Anglin and came to life with a great
    discussion about gaming and Apple with Michelle Lowman. Mark Powers and James
    Markham kept the book on the rails and brought it safely into the station. Bruce
    Wade made sure all of the technical statements made sense and the code compiled
    and ran successfully. I thank you all. I want to send out a special thanks to
    Wes Matlock for taking over the Scene Kit section of the book when my father passed.
    I just did not have the time or energy to complete the second section of the book,
    and Wes stepped in without hesitation. I also want to thank Deborah Saez for the
    wonderful artwork in the book. I highly recommend her. She is both very talented
    and a very hard worker. You can find her at [www.deborahsaez.com/](http://www.deborahsaez.com/)
    . Look her up. Finally and most importantly, I want to thank the three girls in
    my life: Christy (my wonderful wife) and our daughters, Abby (who supplied a ton
    of inspiration) and Emma (who did a great technical review of the book). You three
    are the most important people in my life.


    > —James Goodwill


