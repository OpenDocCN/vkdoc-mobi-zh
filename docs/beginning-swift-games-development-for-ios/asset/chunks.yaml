- fmt: "### Adding a Node to Collide Into\n\nLet’s get started. The first thing you’re\
    \ going to do is add the orb sprite to the `GameScene` at a position a little\
    \ to the left of and above the player. The image you’re going to use for the orb,\
    \ in the `sprites.atlas` collection, is named `PowerUp`. There’s nothing special\
    \ about adding this sprite—you do so just like you added the player.\n\nFirst\
    \ add the declaration of the new node to the `GameScene` immediately following\
    \ the declaration of the `playerNode`:\n\n```\nlet orbNode = SKSpriteNode(imageNamed:\
    \ \"PowerUp\")\n```\n\nAfter adding the declaration of the `orbNode`, add this\
    \ code to the end of the `GameScene.init(size: CGSize)` method:\n\n```\norbNode.position\
    \ = CGPoint(x: 150.0, y: size.height - 25)\norbNode.physicsBody = SKPhysicsBody(circleOfRadius:\
    \ orbNode.size.width / 2)\norbNode.physicsBody?.isDynamic = false\naddChild(orbNode)\n\
    ```\n\nAs you look over this snippet, you’ll see that it looks similar to the\
    \ code you used to add the `playerNode`, with a couple exceptions. First, the\
    \ `orbNode` is being positioned 25 points from the top of the scene and a little\
    \ to the left of the player. The second thing to notice is that the `orbNode.physicsBody.isDynamic`\
    \ property is being set to `false`. That’s because you don’t want this node to\
    \ react to other nodes. You want the `playerNode` to pass through the scene collecting\
    \ power-up orbs to fuel its ascent. This is why you’ve given the `orbNode`’s physicsBody\
    \ a static volume.\n\nGo ahead and run the app again, but this time tap the screen\
    \ until the `playNode` collides with the `orbNode`. Because the `playerNode` is\
    \ a dynamic body, it bounces off and goes spinning into the distance, and because\
    \ the `orbNode` is a static body, it remains constant. This is pretty cool for\
    \ so little coding. But before moving on to detecting the collision and removing\
    \ the orb, you need to do one more thing.\n\nAs you will have noticed when the\
    \ `playerNode` collided with the `orbNode`, the `playerNode` started to spin.\
    \ That’s a correct response in a lot of cases, but for this game you want the\
    \ `playerNode` to just keep blasting through the orbs without spinning off. SpriteKit\
    \ provides a simple method of preventing these rotations: the `physicsBody.allowsRotation`\
    \ property.\n\nAdd the following line of code immediately before the `playerNode`\
    \ is added to the scene:\n\n```\nplayerNode.physicsBody?.allowsRotation = false\n\
    ```\n\nNow run the app again. This time when the player collides with the orb,\
    \ it will bounce off but will not spin.\n\n### Adding Collision Detection\n\n\
    You now have your `playerNode` and `orbNode` colliding and reacting to the collisions\
    \ properly. It’s time to add explicit code that will detect collisions between\
    \ the player and the orb and remove the orb from the scene when they collide.\
    \ When you run your game, you do see the collision between the orb and player,\
    \ but what you want to do now is detect when that collision occurs and remove\
    \ the orb that was part of the collision. Later in the game you will be adding\
    \ a fuel element so that the orbs will provide fuel for the player to ascend higher\
    \ and higher.\n\nTo be able to detect when `SKNode`s come into contact with each\
    \ other, you first implement the SpriteKit protocol `SKPhysicsContactDelegate`\
    \ in the `GameScene` class and then implement the methods needed in your game.\n\
    \nThe `SKPhysicsContactDelegate` protocol defines two methods used to detect when\
    \ `SKNode`s touch each other: the `didBeginContact` and the `didEndContact()`\
    \ methods. The following snippet shows the protocol:\n\n```\npublic protocol SKPhysicsContactDelegate\
    \ : NSObjectProtocol {\n    optional public func didBegin(_ contact: SKPhysicsContact)\n\
    \    optional public func didEnd(_ contact: SKPhysicsContact)\n}\n```\n\nThe method\
    \ names make their function pretty straightforward. The `didBegin(_ contact: SKPhysicsContact)`\
    \ method is invoked when the contact first begins, and the `didEnd(_ contact:\
    \ SKPhysicsContact)` method is invoked when contact ends. For this game, you’re\
    \ interested only in the first method, `didBegin(_ contact: SKPhysicsContact)`,\
    \ because you don’t want the `playerNode` to pass through the orb. You want the\
    \ orb to be removed from the scene as soon as the `playerNode` contacts the orb.\n\
    \nGo back to the `GameScene.swift` file, and you will create a class extension\
    \ after the closing `}` for the `GameScene` class, add the following code snippet:\n\
    \n```\nextension GameScene: SKPhysicsContactDelegate {\n}\n```\n\nAfter you add\
    \ the extension, add this implementation of the `didBegin(_ contact: SKPhysicsContact)`\
    \ method to the end of the `GameScene` class:\n\n```\nfunc didBegin(_ contact:\
    \ SKPhysicsContact) {\n    print(\"There has been contact.\")\n}\n```\n\nFinally,\
    \ you need to make the `GameScene` the delegate of the scene’s `physicsWorld.contactDelegate`.\
    \ Do that by adding the following line in the `GameScene.init(size: CGSize)` method\
    \ directly after the call to the `super.init(size: size)`:\n\n```\nphysicsWorld.contactDelegate\
    \ = self\n```\n\n### Adding Bit Masks to Your SKPhysicsBody\n\nEverything is wired\
    \ up to receive contact notifications, so the next thing you need to do is tell\
    \ SpriteKit which objects you want to receive contact notifications. You do that\
    \ using a concept called bit masks. The `SKPhysicsBody` has three bit mask properties\
    \ you can use to define the way your physics body interacts with other physics\
    \ bodies in a game world: `collisionBitMask`, `categoryBitMask`, and `contactTestBitMask`.\
    \ Each of these properties is described in Table 3-1.\n\n**Table 3-1. The SKPhysicsBody’s\
    \ Three Bit Mask Properties**\n\n| Method | Purpose |\n| --- | --- |\n| `collisionBitMask`\
    \ | Defines the collision categories that your `SKPhysicsBody` will bump into.\
    \ All other physics bodies will be passed through. |\n| `categoryBitMask` | Defines\
    \ the collision categories to which a physics body belongs. |\n| `contactTestBitMask`\
    \ | Determines which categories this physics body makes contact with. An example\
    \ used in your game would be coming in contact with the orb. You want SpriteKit\
    \ to tell you when the `playerNode` comes into contact with the `orbNode`. |"
  raw: '### Adding a Node to Collide Into


    Let’s get started. The first thing you’re going to do is add the orb sprite to
    the GameScene at a position a little to the left of and above the player. The
    image you’re going to use for the orb, in the sprites.atlas collection, is named
    PowerUp . There’s nothing special about adding this sprite—you do so just like
    you added the player. First add the declaration of the new node to the GameScene
    immediately following the declaration of the playerNode: let orbNode = SKSpriteNode(imageNamed:
    "PowerUp") After adding the declaration of the orbNode, add this code to the end
    of the GameScene.init(size: CGSize) method: orbNode.position = CGPoint(x: 150.0,
    y: size.height - 25) orbNode.physicsBody = SKPhysicsBody(circleOfRadius: orbNode.size.width
    / 2) orbNode.physicsBody?.isDynamic = false addChild(orbNode) As you look over
    this snippet, you’ll see that it looks similar to the code you used to add the
    playerNode, with a couple exceptions. First, the orbNode is being positioned 25
    points from the top of the scene and a little to the left of the player. The second
    thing to notice is that the orbNode.physicsBody.isDynamic property is being set
    to false. That’s because you don’t want this node to react to other nodes. You
    want the playerNode to pass through the scene collecting power-up orbs to fuel
    its ascent. This is why you’ve given the orbNode’s physicsBody a static volume.
    Go ahead and run the app again, but this time tap the screen until the playNode
    collides with the orbNode. Because the playerNode is a dynamic body, it bounces
    off and goes spinning into the distance, and because the orbNode is a static body,
    it remains constant. This is pretty cool for so little coding. But before moving
    on to detecting the collision and removing the orb, you need to do one more thing.
    As you will have noticed when the playerNode collided with the orbNode, the playerNode
    started to spin. That’s a correct response in a lot of cases, but for this game
    you want the playerNode to just keep blasting through the orbs without spinning
    off. SpriteKit provides a simple method of preventing these rotations: the physicsBody.allowsRotation
    property. Add the following line of code immediately before the playerNode is
    added to the scene: playerNode.physicsBody?.allowsRotation = false Now run the
    app again . This time when the player collides with the orb, it will bounce off
    but will not spin.


    ### Adding Collision Detection


    You now have your playerNode and orbNode colliding and reacting to the collisions
    properly. It’s time to add explicit code that will detect collisions between the
    player and the orb and remove the orb from the scene when they collide. When you
    run your game, you do see the collision between the orb and player, but what you
    want to do now is detect when that collision occurs and remove the orb that was
    part of the collision. Later in the game you will be adding a fuel element so
    that the orbs will provide fuel for the player to ascend higher and higher. To
    be able to detect when SKNodes come into contact with each other, you first implement
    the SpriteKit protocol SKPhysicsContactDelegate in the GameScene class and then
    implement the methods needed in your game. The SKPhysicsContactDelegate protocol
    defines two methods used to detect when SKNodes touch each other: the didBeginContact
    and the didEndContact() methods. The following snippet shows the protocol: public
    protocol SKPhysicsContactDelegate : NSObjectProtocol {     optional public func
    didBegin(_ contact: SKPhysicsContact)     optional public func didEnd(_ contact:
    SKPhysicsContact) } The method names make their function pretty straightforward.
    The didBegin(_ contact: SKPhysicsContact) method is invoked when the contact first
    begins, and the didEnd(_ contact: SKPhysicsContact) method is invoked when contact
    ends. For this game, you’re interested only in the first method, didBegin(_ contact:
    SKPhysicsContact), because you don’t want the playerNode to pass through the orb.
    You want the orb to be removed from the scene as soon as the playerNode contacts
    the orb. Go back to the GameScene.swift file, and you will create a class extension
    after the closing } for the GameScene class, add the following code snippet: extension
    GameScene: SKPhysicsContactDelegate { } After you add the extension, add this
    implementation of the didBegin(_ contact: SKPhysicsContact) method to the end
    of the GameScene class: func didBegin(_ contact: SKPhysicsContact) {     print("There
    has been contact.") } Finally, you need to make the GameScene the delegate of
    the scene’s physicsWorld. contactDelegate . Do that by adding the following line
    in the GameScene.init(size: CGSize) method directly after the call to the super.init(size:
    size): physicsWorld.contactDelegate = self


    ### Adding Bit Masks to Your SKPhysicsBody


    Everything is wired up to receive contact notifications, so the next thing you
    need to do is tell SpriteKit which objects you want to receive contact notifications.
    You do that using a concept called bit masks . The SKPhysicsBody has three bit
    mask properties you can use to define the way your physics body interacts with
    other physics bodies in a game world: collisionBitMask, categoryBitMask, and contactTestBitMask.
    Each of these properties is described in Table [3-1](#A330720_2_En_3_Chapter.html#Tab1).
    Table 3-1. The SKPhysicsBody’s Three Bit Mask Properties


    | Method | Purpose |

    | --- | --- |

    | collisionBitMask | Defines the collision categories that your SKPhysicsBody
    will bump into. All other physics bodies will be passed through. |

    | categoryBitMask | Defines the collision categories to which a physics body belongs.
    |

    | contactTestBitMask | Determines which categories this physics body makes contact
    with. An example used in your game would be coming in contact with the orb. You
    want SpriteKit to tell you when the playerNode comes into contact with the orbNode.
    |'
  trans: "\n### 添加碰撞节点\n\n我们开始吧。首先，你需要在 `GameScene` 中添加一个能量球精灵，位置设定在玩家节点左上方稍远处。在 `sprites.atlas`\
    \ 图册中，用于能量球的图片名为 `PowerUp`。添加这个精灵没有什么特别之处——操作方式与添加玩家节点完全相同。\n\n首先，在 `playerNode`\
    \ 声明之后立即添加新节点的声明：\n\n```\nlet orbNode = SKSpriteNode(imageNamed: \"PowerUp\")\n\
    ```\n\n添加 `orbNode` 的声明后，在 `GameScene.init(size: CGSize)` 方法的末尾添加以下代码：\n\n```\n\
    orbNode.position = CGPoint(x: 150.0, y: size.height - 25)\norbNode.physicsBody\
    \ = SKPhysicsBody(circleOfRadius: orbNode.size.width / 2)\norbNode.physicsBody?.isDynamic\
    \ = false\naddChild(orbNode)\n```\n\n查看这段代码片段，你会发现它与添加 `playerNode` 的代码相似，但有两点不同。首先，`orbNode`\
    \ 被放置在场景顶部下方 25 个点、玩家左方稍远处。其次，`orbNode.physicsBody.isDynamic` 属性被设置为 `false`。这是因为你不希望这个节点对其他节点做出反应。你希望\
    \ `playerNode` 穿过场景收集能量球作为上升燃料。这就是为什么你要为 `orbNode` 的物理体赋予一个静态体积。\n\n现在继续运行应用，但这次点击屏幕直到\
    \ `playerNode` 与 `orbNode` 碰撞。由于 `playerNode` 是动态体，它会弹开并旋转着飞向远处；而 `orbNode` 是静态体，它会保持原地不动。仅用这么少的代码就能实现这样的效果，相当不错。但在继续检测碰撞并移除能量球之前，你还需要做一件事。\n\
    \n你可能会注意到，当 `playerNode` 与 `orbNode` 碰撞时，`playerNode` 开始旋转。在很多情况下这是正确的反应，但对于这个游戏，你希望\
    \ `playerNode` 直接穿过能量球而不旋转。SpriteKit 提供了一种简单的方法来防止这种旋转：`physicsBody.allowsRotation`\
    \ 属性。\n\n在将 `playerNode` 添加到场景之前的代码处，添加以下一行代码：\n\n```\nplayerNode.physicsBody?.allowsRotation\
    \ = false\n```\n\n现在再次运行应用。这次当玩家与能量球碰撞时，会弹开但不会旋转。\n\n### 添加碰撞检测\n\n现在你的 `playerNode`\
    \ 和 `orbNode` 已经能够正确碰撞并做出反应。是时候添加显式代码来检测玩家与能量球之间的碰撞，并在碰撞时从场景中移除能量球。运行游戏时，你确实能看到能量球与玩家之间的碰撞，但现在你要做的是检测碰撞何时发生，并移除参与碰撞的能量球。在后续游戏开发中，你还会添加燃料元素，让能量球为玩家提供燃料，使其越升越高。\n\
    \n为了能够检测 `SKNode` 之间的接触，你首先需要在 `GameScene` 类中实现 SpriteKit 的协议 `SKPhysicsContactDelegate`，然后实现游戏中所需的方法。\n\
    \n`SKPhysicsContactDelegate` 协议定义了两个用于检测 `SKNode` 相互接触的方法：`didBeginContact` 和\
    \ `didEndContact()` 方法。以下代码片段展示了该协议：\n\n```\npublic protocol SKPhysicsContactDelegate\
    \ : NSObjectProtocol {\n    optional public func didBegin(_ contact: SKPhysicsContact)\n\
    \    optional public func didEnd(_ contact: SKPhysicsContact)\n}\n```\n\n方法名直接反映了其功能。`didBegin(_\
    \ contact: SKPhysicsContact)` 方法在接触开始时被调用，而 `didEnd(_ contact: SKPhysicsContact)`\
    \ 方法在接触结束时被调用。对于这个游戏，你只关心第一个方法 `didBegin(_ contact: SKPhysicsContact)`，因为你不想让\
    \ `playerNode` 穿过能量球。你希望在 `playerNode` 接触能量球的瞬间将其从场景中移除。\n\n回到 `GameScene.swift`\
    \ 文件，在 `GameScene` 类的结束大括号 `}` 之后创建一个类扩展，添加以下代码片段：\n\n```\nextension GameScene:\
    \ SKPhysicsContactDelegate {\n}\n```\n\n添加扩展后，在 `GameScene` 类的末尾添加 `didBegin(_\
    \ contact: SKPhysicsContact)` 方法的实现：\n\n```\nfunc didBegin(_ contact: SKPhysicsContact)\
    \ {\n    print(\"发生了接触。\")\n}\n```\n\n最后，你需要让 `GameScene` 成为场景 `physicsWorld.contactDelegate`\
    \ 的代理。为此，在 `GameScene.init(size: CGSize)` 方法中，紧接在 `super.init(size: size)` 调用之后添加以下一行代码：\n\
    \n```\nphysicsWorld.contactDelegate = self\n```\n\n### 为 SKPhysicsBody 添加位掩码\n\
    \n所有设置都已就绪，可以接收接触通知了。接下来你需要做的是告诉 SpriteKit 你想要接收哪些对象的接触通知。你可以使用一种称为位掩码的概念来实现。`SKPhysicsBody`\
    \ 有三个位掩码属性，可用于定义物理体在游戏世界中与其他物理体的交互方式：`collisionBitMask`、`categoryBitMask` 和 `contactTestBitMask`。每个属性在表\
    \ 3-1 中有详细说明。\n\n**表 3-1. SKPhysicsBody 的三个位掩码属性**\n\n| 属性 | 用途 |\n| --- | ---\
    \ |\n| `collisionBitMask` | 定义你的 `SKPhysicsBody` 会碰撞到的碰撞类别。所有其他物理体将被穿透。 |\n| `categoryBitMask`\
    \ | 定义物理体所属的碰撞类别。 |\n| `contactTestBitMask` | 确定此物理体与哪些类别发生接触。在你的游戏中，一个例子是与能量球接触。你希望\
    \ SpriteKit 在 `playerNode` 与 `orbNode` 接触时通知你。 |\n"
- fmt: "目前应用程序只有两个节点：一个玩家节点和一个能量球节点。这使得对它们进行分类变得容易。你可以将玩家放入`CollisionCategoryPlayer`类别，将所有能量球节点（目前只有一个）放入名为`CollisionCategoryPowerUpOrbs`的类别。这两个类别位掩码定义如下：\n\
    ```\nlet CollisionCategoryPlayer  : UInt32 = 0x1 << 1\nlet CollisionCategoryPowerUpOrbs\
    \ : UInt32 = 0x1 << 2\n```\n\n这里有`CollisionCategoryPlayer`和`CollisionCategoryPowerUpOrbs`两个位掩码，每个都是无符号32位整数。这一点很重要，因为碰撞位掩码是32位的，你最多只能有32个唯一类别。继续在`GameScene`中，紧跟在`orbNode`声明之后、第一个`init()`方法之前添加以下两行：\n\
    ```\nlet CollisionCategoryPlayer  : UInt32 = 0x1 << 1\nlet CollisionCategoryPowerUpOrbs\
    \ : UInt32 = 0x1 << 2\n```\n\n让我们看看如何使用这两个节点设置碰撞检测属性。先从`playerNode`开始。以下三行设置了玩家的碰撞属性：\n\
    ```\nplayerNode.physicsBody?.categoryBitMask = CollisionCategoryPlayer\nplayerNode.physicsBody?.contactTestBitMask\
    \ = CollisionCategoryPowerUpOrbs\nplayerNode.physicsBody?.collisionBitMask = 0\n\
    ```\n\n第一行将`playerNode.physicsBody`的类别位掩码关联到`CollisionCategoryPlayer`。第二行告诉SpriteKit，每当你的物理体与属于`CollisionCategoryPowerUpOrbs`类别的另一个物理体发生接触时，你想要收到通知。最后一行将`playerNode.physicsBody`的`collisionBitMask`设置为`0`，告诉SpriteKit不要为你处理碰撞。游戏将在`didBegin()`方法中自行处理碰撞。继续在`GameScene.init(size:\
    \ CGSize)`方法中，紧跟在以下行之后添加这三行：\n`playerNode.physicsBody?.allowsRotation = false`\n\
    \n接下来，我们来配置`orbNode`的物理体。配置`orbNode`的物理体比配置`playerNode`更简单，只需要两行代码：\n```\norbNode.physicsBody?.categoryBitMask\
    \ = CollisionCategoryPowerUpOrbs\norbNode.physicsBody?.collisionBitMask = 0\n\
    ```\n\n第一行将`orbNode`的物理体关联到`CollisionCategoryPowerUpOrbs`类别。第二行与配置玩家时一样，设置为`0`，因为你要自己处理碰撞。这里需要注意一点：配置能量球节点时，你没有设置`contactTestBitMask`，因为不需要这样做。由于已经在`playerNode`中设置了接触测试，你仍然会收到接触通知。在`GameScene.init(size:\
    \ CGSize)`方法中，紧挨在将`orbNode`添加到场景之前，添加这两行：\n```\norbNode.physicsBody?.categoryBitMask\
    \ = CollisionCategoryPowerUpOrbs\norbNode.physicsBody?.collisionBitMask = 0\n\
    ```\n\n此时，两个节点都已配置好碰撞检测，每当`playerNode`与`orbNode`发生接触时，`didBegin(_contact: SKPhysicsContact)`方法将被调用。让我们测试一下。保存所有更改并运行应用程序，在点击屏幕时注意控制台输出。现在，当玩家与能量球接触时，你会在控制台中看到以下文本：\n\
    `There has been contact.`\n另外，请注意这次玩家穿过了能量球。这是因为你在两个节点中都将物理体的`collisionBitMask`属性设置为`0`。\n\
    \n### 收到接触消息时移除能量球\n\n最后要做的，是添加在`playerNode`与能量球接触时移除`orbNode`的功能。为此，你需要做一些修改。首先，如第\
    \ [2](#A330720_2_En_2_Chapter.html) 章所述，`SKNode`有一个`name`属性，用于标识单个节点或一组节点，因此你需要使用该属性来判断玩家是否遇到了能量球。要命名能量球节点，请在`GameScene.init(size:\
    \ CGSize)`方法中，紧挨在将`orbNode`添加到场景之前，添加以下代码行：\n`orbNode.name = \"POWER_UP_ORB\"\
    `\n\n最后需要做的是，修改`didBegin(_contact: SKPhysicsContact)`方法，检查与玩家`SKNode`接触的节点是否具有等于`\"\
    POWER_UP_ORB\"`的`name`属性，如果有，则将该节点从场景中移除。修改后的`didBegin(_contact: SKPhysicsContact)`方法如下所示：\n\
    ```\nfunc didBegin(_ contact: SKPhysicsContact) {\n    let nodeB = contact.bodyB.node\n\
    \    if nodeB?.name == \"POWER_UP_ORB\" {\n        nodeB?.removeFromParent()\n\
    \    }\n}\n```\n\n在这个方法中，首先要注意的是传递给方法的参数。这里有一个类型为`SKPhysicsContact`的`contact`参数。`SKPhysicsContact`包含了处理节点接触所需的所有信息。`SKPhysicsContact`类包含五个属性，帮助你确定接触的特性，定义在表3-2中。\n\
    \n**表 3-2. SKPhysicsContact 属性**\n\n| 方法 | 用途 |\n| --- | --- |\n| `bodyA` | `bodyA`属性（`SKPhysicsBody`类型）表示接触中的第一个物体。（这将是`playerNode`。）\
    \ |\n| `bodyB` | `bodyB`属性（`SKPhysicsBody`类型）表示接触中的第二个物体。（这将是`orbNode`。） |\n|\
    \ `contactPoint` | `contactPoint`（`CGPoint`类型）表示场景坐标中两个物理体之间的接触点。 |\n| `collisionImpulse`\
    \ | `contactImpulse`（`CGFloat`类型）以牛顿·秒为单位，指定这两个物体碰撞的力度。 |\n| `collisionNormal`\
    \ | `collisionNormal`（`CGVector`类型）指定碰撞的方向。 |"
  raw: 'At the moment, the app has only two nodes: a player and an orb. This makes
    it easy to categorize them. You can put the player into the category CollisionCategoryPlayer
    and all the orb nodes (there is only one at the moment) into a category named
    CollisionCategoryPowerUpOrbs . These two category bit masks are defined here:
    let CollisionCategoryPlayer  : UInt32 = 0x1 << 1 let CollisionCategoryPowerUpOrbs
    : UInt32 = 0x1 << 2 Here are two bit masks, CollisionCategoryPlayer and CollisionCategoryPowerUpOrbs
    , each of which is an unsigned 32-bit integer. This is important to note because
    collision bit masks are 32 bits, and you can have only 32 unique categories. Go
    ahead and add these two lines to the GameScene immediately following the declaration
    of the orbNode and before the first init() method: let CollisionCategoryPlayer  :
    UInt32 = 0x1 << 1 let CollisionCategoryPowerUpOrbs : UInt32 = 0x1 << 2 Let’s see
    how to set up the collision-detection properties using the two nodes. Let’s start
    with the playerNode. The following three lines set up the player’s collision properties:
    playerNode.physicsBody?.categoryBitMask = CollisionCategoryPlayer playerNode.physicsBody?.contactTestBitMask
    = CollisionCategoryPowerUpOrbs playerNode.physicsBody?.collisionBitMask = 0 The
    first line associates the playerNode.physicsBody’s category bit mask to the CollisionCategoryPlayer.
    The second line tells SpriteKit that whenever your physics body comes into contact
    with another physics body belonging to the category CollisionCategoryPowerUpOrbs,
    you want to be notified. The final line, setting the playerNode.physicsBody’s
    collisionBitMask to 0, tells SpriteKit not to handle collisions for you. The game
    is going to be doing this itself in the didBegin () method. Go ahead and add these
    three lines to the GameScene.init(size: CGSize) method immediately after this
    line: playerNode.physicsBody?.allowsRotation = false Next, let’s move on to configuring
    the orbNode’s phsyicsBody. Setting up the orbNode’s physics body is even easier
    than setting up the playerNode and can be done with only two lines of code: orbNode.physicsBody?.categoryBitMask
    = CollisionCategoryPowerUpOrbs orbNode.physicsBody?.collisionBitMask = 0 The first
    line associates the orbNode’s physics body to the category CollisionCategoryPowerUpOrbs,
    and the second line, just like when configuring the player, is set to 0 because
    you’re going to handle collisions yourself. There is one thing to note here. When
    configuring the orb node, you’re not setting a contactTestBitMask because it’s
    not necessary. You will be notified of the contact because you already set this
    up in the playerNode. Add these two lines to the GameScene.init(size: CGSize)
    method immediately before adding the orbNode to the scene: orbNode.physicsBody?.categoryBitMask
    = CollisionCategoryPowerUpOrbs orbNode.physicsBody?.collisionBitMask = 0 At this
    point, you have both nodes configured for collision detection, and whenever the
    playerNode comes into contact with the orbNode, the didBegin(_contact: SKPhysicsContact)
    method will be invoked. Let’s give it a try. Save all your changes and run the
    application, paying attention to the console as you’re tapping the screen. Now
    when the player comes into contact with the orb, you will see the following text
    printed in the console: There has been contact. Also, notice that this time the
    player passes through the orb. That’s because you set the physics bodies’ contactTestBitMask
    property to 0 in both nodes.


    ### Removing the Orb When You Receive a Contact Message


    The last thing you’re going to do is add the functionality needed to remove the
    orbNode when the playerNode comes into contact with it. To do that, you need to
    make a couple of changes. First, as mentioned in Chapter [2](#A330720_2_En_2_Chapter.html),
    SKNodes have a name property that is used to identify a single node or group of
    nodes, so you need to use this property to tell you that the player runs into
    an orb. To name the orbNode, add the following line of code to the GameScene.init(size:
    CGSize) method right before you add orbNode to the scene: orbNode.name = "POWER_UP_ORB"
    The last thing you need to do is modify the didBegin(_contact: SKPhysicsContact
    method to see whether the node being contacted by the player SKNode has a name
    property equal to POWER_UP_ORB and, if it does, remove the node from the scene.
    The modified didBegin(_contact: SKPhysicsContact) method is shown here: func didBegin(_
    contact: SKPhysicsContact) {     let nodeB = contact.bodyB.node     if nodeB?.name
    == "POWER_UP_ORB" {         nodeB?.removeFromParent()     } } The first thing
    to look at in this method is the parameter being passed to the method. Here you
    have a contact parameter with a type of SKPhysicsContact. The SKPhysicsContact
    contains all the information you need to handle a node contact . The SKPhysicsContact
    class contains five properties to help you determine the characteristics of the
    contact, defined in Table [3-2](#A330720_2_En_3_Chapter.html#Tab2). Table 3-2.
    The SKPhysicsContact Properties


    | Method | Purpose |

    | --- | --- |

    | bodyA | The bodyA property, an SKPhysicsBody, represents first body in the contact.
    (This will be the playerNode.) |

    | bodyB | The bodyB property, an SKPhysicsBody, represents second body in the
    contact. (This will be the orbNode.) |

    | contactPoint | The contactPoint, a CGPoint, represents the contact point between
    the two physics bodies in the scene coordinates. |

    | collisionImpulse | The contactImpulse, a CGFloat, specifies how hard these two
    bodies struck each other using newton-seconds as the unit of measure. |

    | collisionNormal | The collisionNormal, a CGVector, specifies the direction of
    the collision. |'
  trans: "目前应用程序只有两个节点：一个玩家节点和一个能量球节点。这使得对它们进行分类变得容易。你可以将玩家放入`CollisionCategoryPlayer`类别，将所有能量球节点（目前只有一个）放入名为`CollisionCategoryPowerUpOrbs`的类别。这两个类别位掩码定义如下：\n\
    ```\nlet CollisionCategoryPlayer  : UInt32 = 0x1 << 1\nlet CollisionCategoryPowerUpOrbs\
    \ : UInt32 = 0x1 << 2\n```\n\n这里有`CollisionCategoryPlayer`和`CollisionCategoryPowerUpOrbs`两个位掩码，每个都是无符号\
    \ 32 位整数。这一点很重要，因为碰撞位掩码是 32 位的，你最多只能有 32 个唯一类别。继续在`GameScene`中，紧跟在`orbNode`声明之后、第一个`init()`方法之前添加以下两行：\n\
    ```\nlet CollisionCategoryPlayer  : UInt32 = 0x1 << 1\nlet CollisionCategoryPowerUpOrbs\
    \ : UInt32 = 0x1 << 2\n```\n\n让我们看看如何使用这两个节点设置碰撞检测属性。先从`playerNode`开始。以下三行设置了玩家的碰撞属性：\n\
    ```\nplayerNode.physicsBody?.categoryBitMask = CollisionCategoryPlayer\nplayerNode.physicsBody?.contactTestBitMask\
    \ = CollisionCategoryPowerUpOrbs\nplayerNode.physicsBody?.collisionBitMask = 0\n\
    ```\n\n第一行将`playerNode.physicsBody`的类别位掩码关联到`CollisionCategoryPlayer`。第二行告诉 SpriteKit，每当你的物理体与属于`CollisionCategoryPowerUpOrbs`类别的另一个物理体发生接触时，你想要收到通知。最后一行将`playerNode.physicsBody`的`collisionBitMask`设置为`0`，告诉\
    \ SpriteKit 不要为你处理碰撞。游戏将在`didBegin()`方法中自行处理碰撞。继续在`GameScene.init(size: CGSize)`方法中，紧跟在以下行之后添加这三行：\n\
    `playerNode.physicsBody?.allowsRotation = false`\n\n接下来，我们来配置`orbNode`的物理体。配置`orbNode`的物理体比配置`playerNode`更简单，只需要两行代码：\n\
    ```\norbNode.physicsBody?.categoryBitMask = CollisionCategoryPowerUpOrbs\norbNode.physicsBody?.collisionBitMask\
    \ = 0\n```\n\n第一行将`orbNode`的物理体关联到`CollisionCategoryPowerUpOrbs`类别。第二行与配置玩家时一样，设置为`0`，因为你要自己处理碰撞。这里需要注意一点：配置能量球节点时，你没有设置`contactTestBitMask`，因为不需要这样做。由于已经在`playerNode`中设置了接触测试，你仍然会收到接触通知。在`GameScene.init(size:\
    \ CGSize)`方法中，紧挨在将`orbNode`添加到场景之前，添加这两行：\n```\norbNode.physicsBody?.categoryBitMask\
    \ = CollisionCategoryPowerUpOrbs\norbNode.physicsBody?.collisionBitMask = 0\n\
    ```\n\n此时，两个节点都已配置好碰撞检测，每当`playerNode`与`orbNode`发生接触时，`didBegin(_contact: SKPhysicsContact)`方法将被调用。让我们测试一下。保存所有更改并运行应用程序，在点击屏幕时注意控制台输出。现在，当玩家与能量球接触时，你会在控制台中看到以下文本：\n\
    `There has been contact.`\n另外，请注意这次玩家穿过了能量球。这是因为你在两个节点中都将物理体的`collisionBitMask`属性设置为`0`。\n\
    \n### 收到接触消息时移除能量球\n\n最后要做的，是添加在`playerNode`与能量球接触时移除`orbNode`的功能。为此，你需要做一些修改。首先，如第\
    \ 2 章所述，`SKNode`有一个`name`属性，用于标识单个节点或一组节点，因此你需要使用该属性来判断玩家是否遇到了能量球。要命名能量球节点，请在`GameScene.init(size:\
    \ CGSize)`方法中，紧挨在将`orbNode`添加到场景之前，添加以下代码行：\n`orbNode.name = \"POWER_UP_ORB\"\
    `\n\n最后需要做的是，修改`didBegin(_contact: SKPhysicsContact)`方法，检查与玩家`SKNode`接触的节点是否具有等于`\"\
    POWER_UP_ORB\"`的`name`属性，如果有，则将该节点从场景中移除。修改后的`didBegin(_contact: SKPhysicsContact)`方法如下所示：\n\
    ```\nfunc didBegin(_ contact: SKPhysicsContact) {\n    let nodeB = contact.bodyB.node\n\
    \    if nodeB?.name == \"POWER_UP_ORB\" {\n        nodeB?.removeFromParent()\n\
    \    }\n}\n```\n\n在这个方法中，首先要注意的是传递给方法的参数。这里有一个类型为`SKPhysicsContact`的`contact`参数。`SKPhysicsContact`包含了处理节点接触所需的所有信息。`SKPhysicsContact`类包含五个属性，帮助你确定接触的特性，定义在表\
    \ 3-2 中。\n\n**表 3-2. SKPhysicsContact 属性**\n\n| 方法 | 用途 |\n| --- | --- |\n| `bodyA`\
    \ | `bodyA`属性（`SKPhysicsBody`类型）表示接触中的第一个物体。（这将是`playerNode`。） |\n| `bodyB` |\
    \ `bodyB`属性（`SKPhysicsBody`类型）表示接触中的第二个物体。（这将是`orbNode`。） |\n| `contactPoint`\
    \ | `contactPoint`（`CGPoint`类型）表示场景坐标中两个物理体之间的接触点。 |\n| `collisionImpulse` | `contactImpulse`（`CGFloat`类型）以牛顿·秒为单位，指定这两个物体碰撞的力度。\
    \ |\n| `collisionNormal` | `collisionNormal`（`CGVector`类型）指定碰撞的方向。 |"
- fmt: "您感兴趣的是这两个属性中的第二个：`bodyB`。回到`didBegin(_contact: SKPhysicsContact)`方法，注意该方法的第二行。在这里，您引用了碰撞体的`bodyB`属性，正如我们之前提到的，这是一个`SKPhysicsContact`。一旦获得此引用，您就可以通过`bodyB.node`属性获取`SKNode`实例，它代表了碰撞中的第二个节点。获取到碰撞中的第二个`SKNode`后，您可以检查它的名称是否为`POWER_UP_ORB`。如果是，则调用该节点的`removeFromParent()`方法，顾名思义，该方法会将`orbNode`从场景中移除。继续操作，将当前`didBegin(_contact:\
    \ SKPhysicsContact`方法的内容替换为此版本，并最后一次运行应用程序。这一次，当`playerNode`与`orbNode`碰撞时，`orbNode`将从场景中消失。在本章末尾，新的`GameScene.swift`应如[代码清单3-2](#A330720_2_En_3_Chapter.html#Par82)所示。\n\
    \n```swift\nimport SpriteKit\n\nclass GameScene: SKScene {\n    let backgroundNode\
    \ = SKSpriteNode(imageNamed: \"Background\")\n    let playerNode = SKSpriteNode(imageNamed:\
    \ \"Player\")\n    let orbNode = SKSpriteNode(imageNamed: \"PowerUp\")\n    let\
    \ CollisionCategoryPlayer: UInt32 = 0x1 << 1\n    let CollisionCategoryPowerUpOrbs:\
    \ UInt32 = 0x1 << 2\n\n    required init?(coder aDecoder: NSCoder) {\n       \
    \ super.init(coder: aDecoder)\n    }\n\n    override init(size: CGSize) {\n  \
    \      super.init(size: size)\n        physicsWorld.contactDelegate = self\n \
    \       physicsWorld.gravity = CGVector(dx: 0.0, dy: -2.0)\n        backgroundColor\
    \ = SKColor(red: 0.0, green: 0.0, blue: 0.0, alpha: 1.0)\n        isUserInteractionEnabled\
    \ = true\n\n        // adding the background\n        backgroundNode.size.width\
    \ = frame.size.width\n        backgroundNode.anchorPoint = CGPoint(x: 0.5, y:\
    \ 0.0)\n        backgroundNode.position = CGPoint(x: size.width / 2.0, y: 0.0)\n\
    \        addChild(backgroundNode)\n\n        // add the player\n        playerNode.physicsBody\
    \ = SKPhysicsBody(circleOfRadius: playerNode.size.width / 2)\n        playerNode.physicsBody?.isDynamic\
    \ = true\n        playerNode.position = CGPoint(x: size.width / 2.0, y: 80.0)\n\
    \        playerNode.physicsBody?.linearDamping = 1.0\n        playerNode.physicsBody?.allowsRotation\
    \ = false\n        playerNode.physicsBody?.categoryBitMask = CollisionCategoryPlayer\n\
    \        playerNode.physicsBody?.contactTestBitMask = CollisionCategoryPowerUpOrbs\n\
    \        playerNode.physicsBody?.collisionBitMask = 0\n        addChild(playerNode)\n\
    \n        orbNode.position = CGPoint(x: 150.0, y: size.height - 25)\n        orbNode.physicsBody\
    \ = SKPhysicsBody(circleOfRadius: orbNode.size.width / 2)\n        orbNode.physicsBody?.isDynamic\
    \ = false\n        orbNode.physicsBody?.categoryBitMask = CollisionCategoryPowerUpOrbs\n\
    \        orbNode.physicsBody?.collisionBitMask = 0\n        orbNode.name = \"\
    POWER_UP_ORB\"\n        addChild(orbNode)\n    }\n\n    override func touchesBegan(_\
    \ touches: Set<UITouch>, with event: UIEvent?) {\n        playerNode.physicsBody?.applyImpulse(CGVector(dx:\
    \ 0.0, dy: 40.0))\n    }\n}\n\nextension GameScene: SKPhysicsContactDelegate {\n\
    \    func didBegin(_ contact: SKPhysicsContact) {\n        let nodeB = contact.bodyB.node\n\
    \        if nodeB?.name == \"POWER_UP_ORB\" {\n            nodeB?.removeFromParent()\n\
    \        }\n    }\n}\n```\n\n**代码清单3-2.** `GameScene.swift`：带有碰撞检测的超级太空人游戏场景\n\
    \n## 总结\n\n本章讨论了 SpriteKit 的物理引擎和碰撞检测。我们先讨论了`SKPhysicsBody`。接着，你开启了游戏世界的重力，这将玩家角色下拉到场景底部。之后，你添加了一个触摸响应器，将`playerNode`向上推回太空。最后，我们讨论了如何处理碰撞。在[第4章](#A330720_2_En_4_Chapter.html)中，你将向场景添加滚动功能，这样玩家就可以在场景中飞得更高，而不会飞出场景顶部。你还将集成加速度计，为玩家提供额外的控制。\n\
    \n© James Goodwill 和 Wesley Matlock 2017  \nJames Goodwill 和 Wesley Matlock  \n\
    《Beginning Swift Games Development for iOS》  \n10.1007/978-1-4842-2310-9_4\n\n\
    # 第4章 添加场景滚动与游戏控制\n\nJames Goodwill^(1 ) 和 Wesley Matlock²  \n(1) 美国科罗拉多州高地牧场\
    \  \n(2) 美国密苏里州堪萨斯城  \n\n在本章中，你将开始为游戏添加一些真正的功能。你将首先对当前的`GameScene`做一些小的改动。之后，你将添加更多的轨道节点用于碰撞。然后，你将向场景添加滚动功能，使其看起来像玩家在太空中飞行收集能量球。最后，你将开始使用手机的加速度计让玩家沿\
    \ x 轴移动。\n\n## 重新组织GameScene"
