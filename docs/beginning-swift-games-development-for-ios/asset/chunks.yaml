    the following simplified method: func addBlackHolesToForeground() {     let moveLeftAction
    = SKAction.moveTo(x: 0.0, duration: 2.0)     let moveRightAction = SKAction.moveTo(x:
    size.width, duration: 2.0)     let actionSequence = SKAction.sequence([moveLeftAction,
    moveRightAction])     let moveAction = SKAction.repeatForever(actionSequence)
        for i in 1...10 {         // new black hole usage code         let blackHoleNode
    = BlackHole()         blackHoleNode.position = CGPoint(x: size.width - 80.0, y:
    600.0 * CGFloat(i))         blackHoleNode.run(moveAction)         foregroundNode.addChild(blackHoleNode)
