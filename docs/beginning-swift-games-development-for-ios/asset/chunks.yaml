  trans: "\n此时，你的目标设置应如图 1-4 所示。\n\n![A330720_2_En_1_Fig4_HTML.jpg](img/A330720_2_En_1_Fig4_HTML.jpg)\
    \ 图 1-4. SuperSpaceMan 目标设置\n\n接下来需要删除 `GameScene.sks` 和 `Actions.sks` 文件。在本书中你不会用到关卡编辑器。你可以在\
    \ `SuperSpaceMan` 组中找到这些文件，如图 1-5 所示。\n\n![A330720_2_En_1_Fig5_HTML.jpg](img/A330720_2_En_1_Fig5_HTML.jpg)\
    \ 图 1-5. 删除 SKS 文件\n\n删除这些文件后，打开 `GameScene.swift` 并将其内容替换为清单 1-1 中的类。\n\n```\n\
    import SpriteKit\n\nclass GameScene: SKScene {\n    required init?(coder aDecoder:\
    \ NSCoder) {\n        super.init(coder: aDecoder)\n    }\n\n    override init(size:\
    \ CGSize) {\n        super.init(size: size)\n        backgroundColor = SKColor(red:\
    \ 0.0, green: 0.0, blue: 0.0, alpha: 1.0)\n    }\n}\n```\n\n清单 1-1. `GameScene.swift`：SuperSpaceMan\
    \ 主游戏场景\n\n在检查你的基线项目之前，还需要做一处修改。打开 `GameViewController.swift` 并将其内容替换为清单 1-2 中同一类的版本。\n\
    \n```\nimport SpriteKit\n\nclass GameViewController: UIViewController {\n    var\
    \ scene: GameScene!\n    override var prefersStatusBarHidden: Bool {\n       \
    \ return true\n    }\n\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \n        // 1. 配置主视图\n        let skView = view as! SKView\n        skView.showsFPS\
    \ = true\n\n        // 2. 创建并配置游戏场景\n        scene = GameScene(size: skView.bounds.size)\n\
    \        scene.scaleMode = .aspectFill\n\n        // 3. 显示场景\n        skView.presentScene(scene)\n\
    \    }\n}\n```\n\n清单 1-2. `GameViewController.swift`：SuperSpaceMan 主 UIViewController\n\
    \n保存所有更改，然后再次点击播放按钮。哇，嗯，这并不令人兴奋。如果你完成了所有更改，现在应该面对着一个完全黑色的屏幕，只显示当前帧率。这正是预期效果，你确实是从零开始。\n\
    \n让我们花点时间检查新游戏的每个组件。首先，打开 `Main.storyboard`。这里的一切看起来应该相当正常。你应该会看到一个包含单个 `UIViewController`\
    \ 的单个故事板。在 Storyboard 资源管理器中展开 `Game View Controller Scene` 并选择 `Game View Controller`，如图\
    \ 1-6 所示。\n\n![A330720_2_En_1_Fig6_HTML.jpg](img/A330720_2_En_1_Fig6_HTML.jpg)\
    \ 图 1-6. Game View Controller 场景\n\n现在展开 Xcode 右侧的实用工具视图，并点击“显示标识检查器”按钮。你会看到这个\
    \ `UIViewController` 的自定义类正是你的 `GameViewController.swift`。图 1-7 展示了这一连接。\n\n![A330720_2_En_1_Fig7_HTML.jpg](img/A330720_2_En_1_Fig7_HTML.jpg)\
    \ 图 1-7. 自定义类 `GameViewController`\n\n在回到本教程的代码部分之前，还有最后一件事要检查。回到实用工具视图并选择连接检查器。注意\
    \ `View` 出口已连接到你的 `GameViewController.view`。图 1-8 展示了这一连接。\n\n![A330720_2_En_1_Fig8_HTML.jpg](img/A330720_2_En_1_Fig8_HTML.jpg)\
    \ 图 1-8. View 出口\n\n进行故事板检查的目的在于说明，尽管 `SpriteKit` 用于创建游戏，但创建游戏所使用的技术与创建任何现代 iOS\
    \ 应用所采用的技术并无二致。\n\n### `GameViewController` 类\n\n让我们回到代码。你可以忽略 `AppDelegate.swift`——这是启动所有\
    \ iOS Swift 应用时使用的标准样板代码。`GameViewController.swift` 是最佳的起点。我们之前已经包含它，但为方便起见，这里再次列出：\n\
    \n```\nimport SpriteKit\n\nclass GameViewController: UIViewController {\n    var\
    \ scene: GameScene!\n    override var prefersStatusBarHidden: Bool {\n       \
    \ return true\n    }\n\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \n        // 1. 配置主视图\n        let skView = view as! SKView\n        skView.showsFPS\
    \ = true\n\n        // 2. 创建并配置游戏场景\n        scene = GameScene(size: skView.bounds.size)\n\
    \        scene.scaleMode = .aspectFill\n\n        // 3. 显示场景\n        skView.presentScene(scene)\n\
    \    }\n}\n```\n\n从这个控制器的第一行开始，你看到一条简单的 `import`，包含了 `SpriteKit` 框架。这一行使所有 `SpriteKit`\
    \ 相关的类可用于你的 `GameViewController`。之后是一个标准的类定义——`GameViewController` 继承自 `UIViewController`。在类定义之后，你看到了可选变量\
    \ `scene` 的声明，其类型被声明为 `GameScene`。`GameScene` 是将承担大部分工作的类，你将在其中添加游戏逻辑。我们将在下一节中查看这个类。\n\
    \n请注意关于 `scene` 变量的一点：它是一个可选类型。你知道它是可选类型，因为其声明后跟有一个感叹号（`!`）。你将其声明为可选类型，是因为你打算等到\
    \ `viewDidLoad()` 方法触发时才对其进行初始化，而 Swift 要求你在类中要么在声明时初始化所有属性，要么在 `init()` 中初始化。如果你没有在这两个位置中的任何一个初始化属性，则必须将该属性声明为可选类型。在本书的例子中，我们将多次用到可选类型。\n\
    \n在 `scene` 声明之后，你看到了对 `UIViewController` 的 `viewDidLoad()` 方法的重写。此处你返回了 `true`，因为你不想在游戏中显示状态栏。\n\
    \n接下来要检查的是 `viewDidLoad()` 方法。这是你真正开始看到第一个活跃的 `SpriteKit` 代码的地方。在调用 `super.viewDidLoad()`\
    \ 之后，你做的第一件事就是配置主视图。在第一步中，你将标准的 `UIView` 向下转换为 `SKView`。`SKView` 是承载之前提到的游戏场景的视图。在大多数情况下，`SKView`\
    \ 的行为与任何 `UIView` 类似，不同之处在于它拥有一系列与游戏相关的属性和实用方法，例如向下转换之后的这一行：\n\n```\nskView.showsFPS\
    \ = true\n```\n\n`SKView` 的这个属性用于显示或隐藏应用程序正在渲染的每秒帧数——帧率越高越好。\n\n配置主视图后，你创建并配置了\
    \ `GameScene`：\n\n```\nscene = GameScene(size: skView.bounds.size)\nscene.scaleMode\
    \ = .aspectFill\n```\n\n第一行创建了一个新的 `GameScene` 实例，并将其大小初始化为与承载场景的视图大小一致。之后，你将\
    \ `scaleMode` 设置为 `.aspectFill`。`scaleMode`（由枚举 `SKSceneScaleMode` 实现）用于确定场景将如何缩放以匹配容纳它的视图。表\
    \ 1-1 描述了所有可用的 `scaleMode` 属性。\n\n表 1-1. `SKSceneScaleModes`\n"
- fmt: "| `SKSceneScaleMode` | Definition |\n| --- | --- |\n| `SKSceneScaleMode.fill`\
    \ | The fill scaleMode will fill the entire `SKView` without consideration to\
    \ the ratio of width to height. |\n| `SKSceneScaleMode.aspectFill` | The aspectFill\
    \ mode will scale the scene to fill the hosting `SKView` while maintaining the\
    \ aspect ratio of the scene, but there may be some cropping if the hosting `SKView`'s\
    \ aspect ratio is different. This is the mode you are using in this game. |\n\
    | `SKSceneScaleMode.aspectFit` | The aspectFit mode will scale the scene to fill\
    \ the hosting `SKView` while maintaining the aspect ratio of the scene, but there\
    \ may be some letterboxing if the hosting `SKView`'s aspect ratio is different.\
    \ |\n| `SKSceneScaleMode.resizeFill` | The resizeFill mode will modify the size\
    \ of the scene to fit the hosting view exactly. |\n\nNote: When setting the `scaleMode`\
    \ property of the scene, you are using a shortened syntax to represent the mode\
    \ you are setting, specifically the `.aspectFill` mode. You can use this dot syntax\
    \ because you know the type of the `scaleMode` property is an `SKSceneScaleMode`,\
    \ which is an enum containing all the scale modes. Once you have the view and\
    \ the scene configured, there is only one last thing to do: present the scene.\
    \ This is done with the last line in `viewDidLoad()`: `skView.presentScene(scene)`\n\
    \n### The `GameScene` Class\n\nNow that we've walked you through each line of\
    \ the `GameViewController` class, it is time to talk about the `GameScene` class.\
    \ Again, for convenience's sake, we're including the source for the `GameScene.swift`\
    \ file a second time:\n\n```\nimport SpriteKit\nclass GameScene: SKScene {\n \
    \   required init?(coder aDecoder: NSCoder) {\n        super.init(coder: aDecoder)\n\
    \    }\n    override init(size: CGSize) {\n        super.init(size: size)\n  \
    \      backgroundColor = SKColor(red: 0.0, green: 0.0, blue: 0.0, alpha: 1.0)\n\
    \    }\n}\n```\n\nAs you look over `GameScene`, you will notice there's really\
    \ not much to it. It extends `SKScene` and implements two `init()` methods; the\
    \ first `init()` that takes an `NSCoder` can be ignored. The `init()` you are\
    \ interested in is the second method, which takes a `CGSize` parameter that represents\
    \ the size you want the scene to be (in this case, the size you passed in from\
    \ the `GameViewController`). After that, you pass the size to your superclass\
    \ and then set the background color to black. Although there's not a whole lot\
    \ to your current `GameScene`, this is where you will be doing almost all of your\
    \ SpriteKit work. `SKScene` and the classes that extend them are the root nodes\
    \ of all SpriteKit content, and your `GameScene` will grow considerably as you\
    \ move along in this book.\n\n## Adding a Background and Player Sprite\n\nWe've\
    \ talked enough for one chapter. Let's get back to the game itself. In this, the\
    \ last section of this chapter, you are going to just jump in and add a game background\
    \ and a player sprite to your scene and see how they look. Before you can do this,\
    \ you need some image files. You can find all the necessary assets for this book\
    \ in the file `assets.zip` at [www.apress.com](http://www.apress.com) (search\
    \ for the title of this book). Go ahead and download and unzip this file. Inside\
    \ the unzipped folder you will find two folders: one is named `Images`, and another\
    \ is named `sprites.atlas`. Copy the entire `sprites.atlas` folder directly into\
    \ the `SuperSpaceMan` folder of the same project. Next, open the `Assets.xcassets`\
    \ folder in Xcode. You will see something similar to Figure [1-9](#A330720_2_En_1_Chapter.html#Fig9).\
    \ ![A330720_2_En_1_Fig9_HTML.jpg](OEBPS/A330720_2_En_1_Fig9_HTML.jpg) Figure 1-9.\
    \ Adding image assets Now select the `Spaceship` asset and delete it. After that,\
    \ using Finder, browse to the `Images` folder in the previously downloaded zip\
    \ file. Select the four folders inside the `Images` directory and drag them onto\
    \ the xcassets palette directly below the `Spaceship` asset. When the files have\
    \ been added, your xcassets palette will look like Figure [1-10](#A330720_2_En_1_Chapter.html#Fig10).\
    \ ![A330720_2_En_1_Fig10_HTML.jpg](OEBPS/A330720_2_En_1_Fig10_HTML.jpg) Figure\
    \ 1-10. The added image assets\n\nNow that you have all the images added to your\
    \ project, let's put some of them to good use. Go back to `GameScene.swift` and\
    \ add the following two lines to the beginning of the `GameScene` class:\n\n```\n\
    let backgroundNode = SKSpriteNode(imageNamed: \"Background\")\nlet playerNode\
    \ = SKSpriteNode(imageNamed: \"Player\")\n```\n\nHere you are adding two constants,\
    \ `backgroundNode` and `playerNode`, both of which are being initialized to their\
    \ respective images in the `Image.xcassets` folder. Notice the type of each of\
    \ these constants: they are both `SKSpriteNode`s. `SKSpriteNode` is a descendent\
    \ of an `SKNode`, which is the primary building block of almost all SpriteKit\
    \ content. `SKNode` itself does not draw any visual elements, but all visual elements\
    \ in SpriteKit-based applications are drawn using `SKNode` subclasses. Table [1-2](#A330720_2_En_1_Chapter.html#Tab2)\
    \ defines the main descendants of `SKNode` that render visual elements.\n\nTable\
    \ 1-2. The Descendants of `SKNode` That Render Visual Elements\n\n| Class | Description\
    \ |\n| --- | --- |\n| `SKSpriteNode` | A node that is used to draw textured sprites\
    \ |\n| `SKVideoNode` | A node that presents video content |\n| `SKLabelNode` |\
    \ A node that is used to draw text strings |\n| `SKShapeNode` | A node that is\
    \ used to draw a shape based upon a Core Graphics path |\n| `SKEmitterNode` |\
    \ A node that is used to create and render particles |\n| `SKCropNode` | A node\
    \ that is used to crop child nodes using a mask |\n| `SKEffectNode` | A node that\
    \ is used to apply Core Image filters to its child nodes |"
  raw: '| SKSceneScaleMode | Definition |

    | --- | --- |

    | SKSceneScaleMode.fill | The fill scaleMode will fill the entire SKView without
    consideration to the ratio of width to height. |

    | SKSceneScaleMode. aspectFill | The aspectFill mode will scale the scene to fill
    the hosting SKView while maintaining the aspect ratio of the scene, but there
    may be some cropping if the hosting SKView’s aspect ratio is different. This is
    the mode you are using in this game. |

    | SKSceneScaleMode.aspectFit | The aspectFit mode will scale the scene to fill
    the hosting SKView while maintaining the aspect ratio of the scene, but there
    may be some letterboxing if the hosting SKView’s aspect ratio is different. |

    | SKSceneScaleMode.resizeFill | The resizeFill mode will modify the size of the
    scene to fit the hosting view exactly. |


    Note  When setting the scaleMode property of the scene, you are using a shortened
    syntax to represent the mode you are setting, specifically the .aspectFill mode.
    You can use this dot syntax because you know the type of the scaleMode property
    is an SKSceneScaleMode , which is an enum containing all the scale modes. Once
    you have the view and the scene configured, there is only one last thing to do:
    present the scene. This is done with the last line in viewDidLoad() : skView.presentScene(scene)


    ### The GameScene Class


    Now that we’have walked you through each line of the GameViewController class,
    it is time to talk about the GameScene class. Again, for convenience’s sake, we’re
    including the source for the GameScene.swift file a second time: import SpriteKit
    class GameScene: SKScene {     required init?(coder aDecoder: NSCoder) {         super.init(coder:
    aDecoder)     }     override init(size: CGSize) {         super.init(size: size)
            backgroundColor = SKColor(red: 0.0, green: 0.0, blue: 0.0, alpha: 1.0)
        } } As you look over GameScene, you will notice there’s really not much to
    it. It extends SKScene and implements two init() methods ; the first init() that
    takes an NSCoder can be ignored. The init() you are interested in is the second
    method, which takes a CGSize parameter that represents the size you want the scene
    to be (in this case, the size you passed in from the GameViewController). After
    that, you pass the size to your superclass and then set the background color to
    black. Although there’s not a whole lot to your current GameScene, this is where
    you will be doing almost all of your SpriteKit work. SKScenes and the classes
    that extend them are the root nodes of all SpriteKit content, and your GameScene
    will grow considerably as you move along in this book.


    ## Adding a Background and Player Sprite


    We’ve talked enough for one chapter. Let’s get back to the game itself. In this,
    the last section of this chapter, you are going to just jump in and add a game
    background and a player sprite to your scene and see how they look. Before you
    can do this, you need some image files. You can find all the necessary assets
    for this book in the file assets.zip at [www.apress.com](http://www.apress.com)
    (search for the title of this book). Go ahead and download and unzip this file.
    Inside the unzipped folder you will find two folders: one is named Images, and
    another is named sprites.atlas. Copy the entire sprites. atlas folder directly
    into the SuperSpaceMan folder of the same project. Next, open the Assets.xcassets
    folder in Xcode. You will see something similar to Figure [1-9](#A330720_2_En_1_Chapter.html#Fig9).
    ![A330720_2_En_1_Fig9_HTML.jpg](OEBPS/A330720_2_En_1_Fig9_HTML.jpg) Figure 1-9.
    Adding image assets Now select the Spaceship asset and delete it. After that,
    using Finder, browse to the Images folder in the previously downloaded zip file.
    Select the four folders inside the Images directory and drag them onto the xcassets
    palette directly below the Spaceship asset . When the files have been added, your
    xcassets palette will look like Figure [1-10](#A330720_2_En_1_Chapter.html#Fig10).
    ![A330720_2_En_1_Fig10_HTML.jpg](OEBPS/A330720_2_En_1_Fig10_HTML.jpg) Figure 1-10.
    The added image assets Now that you have all the images added to your project,
    let’s put some of them to good use. Go back to GameScene.swift and add the following
    two lines to the beginning of the GameScene class: let backgroundNode = SKSpriteNode(imageNamed:
    "Background") let playerNode = SKSpriteNode(imageNamed: "Player") Here you are
    adding two constants, backgroundNode and playerNode , both of which are being
    initialized to their respective images in the Image.xcassets folder. Notice the
    type of each of these constants: they are both SKSpriteNodes. SKSpriteNode is
    a descendent of an SKNode, which is the primary building block of almost all SpriteKit
    content. SKNode itself does not draw any visual elements, but all visual elements
    in SpriteKit-based applications are drawn using SKNode subclasses. Table [1-2](#A330720_2_En_1_Chapter.html#Tab2)
    defines the main descendants of SKNode that render visual elements. Table 1-2.
    The Descendants of SKNode That Render Visual Elements


    | Class | Description |

    | --- | --- |

    | SKSpriteNode | A node that is used to draw textured sprites |

    | SKVideoNode | A node that presents video content |

    | SKLabelNode | A node that is used to draw text strings |

    | SKShapeNode | A node that is used to draw a shape based upon a Core Graphics
    path |

    | SKEmitterNode | A node that is used to create and render particles |

    | SKCropNode | A node that is used to crop child nodes using a mask |

    | SKEffectNode | A node that is used to apply Core Image filters to its child
    nodes |'
  trans: "\n| `SKSceneScaleMode` | 定义 |\n| --- | --- |\n| `SKSceneScaleMode.fill`\
    \ | fill 缩放模式将填满整个 `SKView`，不考虑宽高比。 |\n| `SKSceneScaleMode.aspectFill` | aspectFill\
    \ 模式会缩放场景以填满宿主 `SKView`，同时保持场景的宽高比，但如果宿主 `SKView` 的宽高比不同，则可能会发生裁剪。这是你在本游戏中使用的模式。\
    \ |\n| `SKSceneScaleMode.aspectFit` | aspectFit 模式会缩放场景以填满宿主 `SKView`，同时保持场景的宽高比，但如果宿主\
    \ `SKView` 的宽高比不同，则可能会出现黑边。 |\n| `SKSceneScaleMode.resizeFill` | resizeFill 模式会修改场景的大小，以精确适配宿主视图。\
    \ |\n\n注意：在设置场景的 `scaleMode` 属性时，你正在使用一种简写语法来表示所设置的模式，具体是 `.aspectFill` 模式。你可以使用这种点语法，是因为你知道\
    \ `scaleMode` 属性的类型是 `SKSceneScaleMode`，这是一个包含所有缩放模式的枚举。一旦你配置好了视图和场景，就只剩下最后一件事了：呈现场景。这通过\
    \ `viewDidLoad()` 中的最后一行代码完成：`skView.presentScene(scene)`\n\n### `GameScene` 类\n\
    \n现在我们已经带你逐行了解了 `GameViewController` 类，是时候讨论 `GameScene` 类了。同样，为方便起见，我们再次附上 `GameScene.swift`\
    \ 文件的源代码：\n\n```\nimport SpriteKit\nclass GameScene: SKScene {\n    required init?(coder\
    \ aDecoder: NSCoder) {\n        super.init(coder: aDecoder)\n    }\n    override\
    \ init(size: CGSize) {\n        super.init(size: size)\n        backgroundColor\
    \ = SKColor(red: 0.0, green: 0.0, blue: 0.0, alpha: 1.0)\n    }\n}\n```\n\n当你查看\
    \ `GameScene` 时，会发现它其实没有太多内容。它继承自 `SKScene` 并实现了两个 `init()` 方法；第一个接收 `NSCoder`\
    \ 参数的 `init()` 可以忽略。你感兴趣的是第二个 `init()` 方法，它接收一个 `CGSize` 参数，表示你希望场景的大小（在此例中，是你从\
    \ `GameViewController` 传入的大小）。之后，你将大小传递给父类，然后将背景颜色设置为黑色。虽然你当前的 `GameScene` 内容不多，但这里将是你完成几乎所有\
    \ SpriteKit 工作的地方。`SKScene` 及其子类是所有 SpriteKit 内容的根节点，随着本书的深入，你的 `GameScene` 会变得相当庞大。\n\
    \n## 添加背景和玩家精灵\n\n本章我们已经说得够多了。让我们回到游戏本身。在本章的最后一节中，你将直接动手，向场景中添加游戏背景和玩家精灵，并看看它们的效果。在此之前，你需要一些图像文件。你可以在\
    \ [www.apress.com](http://www.apress.com) 上找到本书所需的所有资源，文件名为 `assets.zip`（搜索本书标题即可）。请下载并解压该文件。在解压后的文件夹中，你会看到两个文件夹：一个名为\
    \ `Images`，另一个名为 `sprites.atlas`。将整个 `sprites.atlas` 文件夹直接复制到同一项目的 `SuperSpaceMan`\
    \ 文件夹中。接下来，在 Xcode 中打开 `Assets.xcassets` 文件夹。你会看到类似于图 1-9 的内容。![A330720_2_En_1_Fig9_HTML.jpg](img/A330720_2_En_1_Fig9_HTML.jpg)\
    \ 图 1-9. 添加图像资源 现在选择 `Spaceship` 资源并将其删除。之后，使用 Finder 浏览到之前下载的 zip 文件中的 `Images`\
    \ 文件夹。选择 `Images` 目录下的四个文件夹，然后将它们拖拽到 xcassets 面板中，直接放在 `Spaceship` 资源下方。文件添加完成后，你的\
    \ xcassets 面板将如图 1-10 所示。![A330720_2_En_1_Fig10_HTML.jpg](img/A330720_2_En_1_Fig10_HTML.jpg)\
    \ 图 1-10. 已添加的图像资源\n\n现在所有图像都已添加到项目中，让我们来好好利用它们。回到 `GameScene.swift`，并在 `GameScene`\
    \ 类的开头添加以下两行代码：\n\n```\nlet backgroundNode = SKSpriteNode(imageNamed: \"Background\"\
    )\nlet playerNode = SKSpriteNode(imageNamed: \"Player\")\n```\n\n这里你添加了两个常量，`backgroundNode`\
    \ 和 `playerNode`，它们都被初始化为 `Image.xcassets` 文件夹中对应的图像。请注意每个常量的类型：它们都是 `SKSpriteNode`。`SKSpriteNode`\
    \ 是 `SKNode` 的子类，而 `SKNode` 是几乎所有 SpriteKit 内容的主要构建块。`SKNode` 本身不绘制任何视觉元素，但基于\
    \ SpriteKit 的应用中的所有视觉元素都是使用 `SKNode` 的子类绘制的。表 1-2 定义了用于渲染视觉元素的 `SKNode` 的主要子类。\n\
    \n表 1-2. 渲染视觉元素的 `SKNode` 子类\n\n| 类 | 描述 |\n| --- | --- |\n| `SKSpriteNode` |\
    \ 用于绘制纹理精灵的节点 |\n| `SKVideoNode` | 用于呈现视频内容的节点 |\n| `SKLabelNode` | 用于绘制文本字符串的节点\
    \ |\n| `SKShapeNode` | 用于基于 Core Graphics 路径绘制形状的节点 |\n| `SKEmitterNode` | 用于创建和渲染粒子的节点\
    \ |\n| `SKCropNode` | 用于使用蒙版裁剪子节点的节点 |\n| `SKEffectNode` | 用于对其子节点应用 Core Image\
    \ 滤镜的节点 |\n"
- fmt: "In this book you will be using three subclasses of `SKNode`: `SKSpriteNode`,\
    \ `SKLabelNode`, and `SKEmitterNode`. After adding the two `SKSpriteNodes`, remove\
    \ the line of code that sets the background color and add the following lines\
    \ to the bottom of the `GameScene.init(size: CGSize)` method:\n\n```\nbackgroundNode.size.width\
    \ = frame.size.width\nbackgroundNode.anchorPoint = CGPoint(x: 0.5, y: 0.0)\nbackgroundNode.position\
    \ = CGPoint(x: size.width / 2.0, y: 0.0)\naddChild(backgroundNode)\n```\n\nThe\
    \ first line of this snippet sets the width of the `backgroundNode` to the width\
    \ of the view’s frame. The next line of code determines where the new node will\
    \ be anchored in your scene. Don’t worry too much about this at the moment; we\
    \ discuss anchor points in great detail in the next chapter. Just know that the\
    \ anchor point of `(0.5, 0.0)` sets the anchor point of the background node to\
    \ the bottom center of the node. Next, you set the position of the `backgroundNode`.\
    \ Here you are setting the node’s position to an x-coordinate half the width of\
    \ the scene, which is in the middle of the scene, and setting the y-coordinate\
    \ to `0.0`, which is the bottom of the scene. The final line in the snippet adds\
    \ the `backgroundNode` to your scene.\n\nTo see what you have just accomplished,\
    \ save your work and run the application again. You should now see your background\
    \ displayed, as shown in Figure [1-11](#A330720_2_En_1_Chapter.html#Fig11).\n\n\
    ![A330720_2_En_1_Fig11_HTML.jpg](OEBPS/A330720_2_En_1_Fig11_HTML.jpg)\n\nFigure\
    \ 1-11. The `backgroundNode` added to the `GameScene`\n\nThat was easy enough.\
    \ Now, let’s add your player to your scene. Adding the player node is just as\
    \ easy as adding the background. Take a look at the following snippet:\n\n```\n\
    playerNode.position = CGPoint(x: size.width / 2.0, y: 80.0)\naddChild(playerNode)\n\
    ```\n\nAs you can see, this snippet is setting the position of the `playerNode`\
    \ and adding it to the scene. Notice one difference here. You did not set the\
    \ anchor point of the `playerNode`. That’s because the default anchor point of\
    \ all `SKNodes` is `(0.5, 0.5)`, which is the center of the node. Again, don’t\
    \ worry about the positions or `anchorPoints` for now. We discuss them in the\
    \ next chapter.\n\nGo ahead and add this snippet to the bottom of the `GameScene.init()`\
    \ method and save your changes. Now run the application one more time. You will\
    \ now see the `SuperSpaceMan` positioned in front of the previously added `backgroundNode`,\
    \ as shown in Figure [1-12](#A330720_2_En_1_Chapter.html#Fig12).\n\n![A330720_2_En_1_Fig12_HTML.jpg](OEBPS/A330720_2_En_1_Fig12_HTML.jpg)\n\
    \nFigure 1-12. The `playerNode` added to the `GameScene`\n\nAfter making these\
    \ changes, your new `GameScene.swift` file should look like Listing [1-3](#A330720_2_En_1_Chapter.html#Par76).\n\
    \n```\nimport SpriteKit\n\nclass GameScene: SKScene {\n    let backgroundNode\
    \ = SKSpriteNode(imageNamed: \"Background\")\n    let playerNode = SKSpriteNode(imageNamed:\
    \ \"Player\")\n\n    required init?(coder aDecoder: NSCoder) {\n        super.init(coder:\
    \ aDecoder)\n    }\n\n    override init(size: CGSize) {\n        super.init(size:\
    \ size)\n\n        // adding the background\n        backgroundNode.size.width\
    \ = frame.size.width\n        backgroundNode.anchorPoint = CGPoint(x: 0.5, y:\
    \ 0.0)\n        backgroundNode.position = CGPoint(x: size.width / 2.0, y: 0.0)\n\
    \        addChild(backgroundNode)\n\n        // add the player\n        playerNode.position\
    \ = CGPoint(x: size.width / 2.0, y: 80.0)\n        addChild(playerNode)\n    }\n\
    }\n```\n\nListing 1-3. `GameScene.swift`: The Modified `GameScene.swift`\n\n##\
    \ Summary\n\nIn this chapter you learned what SpriteKit is and how you create\
