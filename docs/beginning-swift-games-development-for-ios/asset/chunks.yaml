- fmt: "# 改进游戏场景代码\n\n在继续添加滚动和加速计功能之前，你需要对现有`GameScene`进行一些小的代码更改。在前面的章节中，有大量代码展示了如何在`SpriteKit`中执行某些操作。你在这里要做的更改是重组性的，旨在为继续游戏开发做好准备。\n\
    \n你需要更改的第一件事是游戏物理世界中的重力强度。你将通过将表示重力力的向量从`(0.0, –2.0)`改为`(0.0, –5.0)`来实现这一点。继续找到设置`physicsWorld.gravity`属性的位置，并将其更改为以下内容：\n\
    \n```\nphysicsWorld.gravity = CGVector(dx: 0.0, dy: -5.0)\n```\n\n为了准备下一节的内容（你将在其中开始滚动游戏场景中的不同层），你需要向场景中添加另一个层来容纳所有精灵。你将通过添加另一个名为`foregroundNode`的`SKSpriteNode`来实现这一点。该节点将容纳所有会影响游戏玩法的精灵。\n\
    \n那么，让我们添加这个节点，并将玩家添加到其中。首先，在`backgroundNode`声明之后立即添加以下`foregroundNode`声明：\n\n\
    ```\nlet foregroundNode = SKSpriteNode()\n```\n\n接下来，通过在你将`backgroundNode`添加到场景的那行代码之后立即添加以下代码行，将`foregroundNode`实例添加到场景中：\n\
    \n```\naddChild(foregroundNode)\n```\n\n现在，找到`init()`方法中你将`playerNode`和`orbNode`添加到场景的位置，并将`addChild()`调用更改为以下内容：\n\
    \n```\nforegroundNode.addChild(playerNode)\nforegroundNode.addChild(orbNode)\n\
    ```\n\n一旦你将`playerNode`和`orbNode`添加到新的`foregroundNode`中，找到你设置`playerNode`位置的位置，并使用以下`CGPoint`更改其`position`属性：\n\
    \n```\nplayerNode.position = CGPoint(x: size.width / 2.0, y: 180.0)\n```\n\n现在，找到你设置`playerNode.physicsBody.dynamic`属性的位置，并关闭玩家的动态体积：\n\
    \n```\nplayerNode.physicsBody?.isDynamic = false\n```\n\n你这样做的目的是，如果你没有及时点击屏幕，玩家就不会掉出屏幕。\n\
    \n接下来，在`orbNode`定义之后立即向`GameScene`添加以下新属性：\n\n```\nvar impulseCount = 4\n```\n\
    \n现在将`touchesBegan()`方法更改为以下内容：\n\n```\noverride func touchesBegan(_ touches:\
    \ Set<UITouch>, with event: UIEvent?) {\n    if !playerNode.physicsBody!.isDynamic\
    \ {\n        playerNode.physicsBody?.isDynamic = true\n    }\n    if impulseCount\
    \ > 0 {\n        playerNode.physicsBody!.applyImpulse(CGVector(dx: 0.0, dy: 40.0))\n\
    \        impulseCount -= 1\n    }\n}\n```\n\n这段代码的作用是：如果玩家的动态体积是关闭的，则将其重新打开，这样玩家将再次开始对重力做出反应。之后，它检查`impulseCount`属性。如果该值大于0，则向玩家施加一个冲量，并将`impulseCount`属性减1。\n\
    \n这段代码的目的是让游戏处于初始启动状态，玩家保持静止，直到你点击屏幕开始游戏。当屏幕第一次被点击时，游戏开始。\n\n添加`impulseCount`属性是为了引入一个新的游戏元素。游戏将使用`impulseCount`属性为用户提供有限次数的可用于推进的冲量。每当`playerNode`与能量球接触时，`impulseCount`属性会增加；每当玩家点击屏幕时，该属性会减少。这意味着用户必须善于收集能量球，否则他们最终会坠入深渊并输掉游戏。\n\
    \n接下来需要更改的是能量球节点添加到场景的方式。你需要添加更多能量球节点。在添加额外节点之前，需要移除当前添加这些节点的代码。要移除这些代码，首先从`GameScene`类的顶部移除`orbNode`属性。在`GameScene`的声明部分找到以下行并将其移除：\n\
    \n```\nlet orbNode = SKSpriteNode(imageNamed: \"PowerUp\")\n```\n\n然后移除所有以下用于添加单个节点的代码行：\n\
    \n```\norbNode.position = CGPoint(x: 150.0, y: size.height - 25)\norbNode.physicsBody\
    \ = SKPhysicsBody(circleOfRadius: orbNode.size.width / 2)\norbNode.physicsBody?.isDynamic\
    \ = false\norbNode.physicsBody?.categoryBitMask = CollisionCategoryPowerUpOrbs\n\
    orbNode.physicsBody?.collisionBitMask = 0\norbNode.name = \"POWER_UP_ORB\"\nforegroundNode.addChild(orbNode)\n\
    ```\n\n## 向场景添加更多能量球"
  raw: 'Before you move on to adding scrolling and the accelerometer, you need to
    do some small code changes in the existing GameScene. In previous chapters there
    was a lot of code that showed how to do certain things in SpriteKit. The changes
    you’ll be making here are reorganizational changes focused on setting up the game
    for continued game development. The first thing you need to change is the strength
    of gravity in the game’s physics world. You are going to do this by changing the
    vector that represents gravity’s force from (0.0, –2.0) to (0.0, –5.0). Go ahead
    and find where you set the physicsWorld.gravity property and change it to the
    following: physicsWorld.gravity = CGVector(dx: 0.0, dy: -5.0) To prepare the scene
    for the next section, where you will start scrolling the different layers in the
    game scene, you need to add another layer to your scene to hold all the sprites.
    You will do this by adding another SKSpriteNode named foregroundNode . This node
    will hold all the sprites that will affect game play. So let’s add this node and
    add the player to it. First, add the following declaration of the foregroundNode
    immediately after the declaration of the backgroundNode: let foregroundNode =
    SKSpriteNode() Next, add the foregroundNode instance to the scene by adding the
    following line of code immediately after where you added the backgroundNode to
    the scene: addChild(foregroundNode) Now find the location in the init() method
    where you added the playerNode and orbNode to the scene and change the addChild()
    invocations to the following: foregroundNode.addChild(playerNode) foregroundNode.addChild(orbNode)
    Once you have the playerNode and orbNode added to the new foregroundNode, find
    where you are setting the position of the playerNode and change its position property
    using the following CGPoint: playerNode.position = CGPoint(x: size.width / 2.0,
    y: 180.0) Now find where you are setting the playerNode.physicsBody.dynamic property
    and turn off the player’s dynamic volume. playerNode.physicsBody?.isDynamic =
    false You’re doing this so the player doesn’t fall off the screen if you don’t
    tap the screen in time. Next, add the following new property to the GameScene
    immediately after the definition of the orbNode: var impulseCount = 4 Now change
    the touchesBegan() method to match the following: override func touchesBegan(_
    touches: Set<UITouch>, with event: UIEvent?) {     if !playerNode.physicsBody!.isDynamic
    {         playerNode.physicsBody?.isDynamic = true     }     if impulseCount >
    0 {         playerNode.physicsBody!.applyImpulse(CGVector(dx: 0.0, dy: 40.0))
            impulseCount -= 1     } } This snippet is turning the player’s dynamic
    volume back on, if it was off, so the player will start reacting to gravity again.
    After that, it checks the impulseCount property. If it is greater than 0, then
    it applies an impulse to the player and decrements the impulseCount property by
    1. The purpose of this code is to put the game in an initial start state with
    the player stationary until you tap the screen to start. When the screen is tapped
    the first time, the game begins. The impulseCount property was added to introduce
    a new game element. The game is going to use the impulseCount property to give
    the user a limited number of impulses that can be used for thrusts. The impulseCount
    property will increment each time the playerNode comes into contact with an orb
    and decrement every time the player taps the screen. This means the user must
    be good at collecting orbs, or they will eventually fall into oblivion and lose
    the game. The next thing that needs to be changed is how the orb nodes are added
    to the scene. You want to add many more. Before adding additional nodes, the code
    that currently adds the nodes needs to be removed. To remove this code, start
    by removing the orbNode property from the top of the GameScene class. Find the
    following line in the declarations section of the GameScene and remove it: let
    orbNode = SKSpriteNode(imageNamed: "PowerUp") Then remove all the following lines,
    which were used earlier to add the single node: orbNode.position = CGPoint(x:
    150.0, y: size.height - 25) orbNode.physicsBody = SKPhysicsBody(circleOfRadius:
    orbNode.size.width / 2) orbNode.physicsBody?.isDynamic = false orbNode.physicsBody?.categoryBitMask
    = CollisionCategoryPowerUpOrbs orbNode.physicsBody?.collisionBitMask = 0 orbNode.name
    = "POWER_UP_ORB" foregroundNode.addChild(orbNode)


    ## Adding More Orbs to the Scene'
  trans: "\n# 改进游戏场景代码\n\n在继续添加滚动和加速计功能之前，你需要对现有`GameScene`进行一些小的代码更改。在前面的章节中，有大量代码展示了如何在`SpriteKit`中执行某些操作。你在这里要做的更改是重组性的，旨在为继续游戏开发做好准备。\n\
    \n你需要更改的第一件事是游戏物理世界中的重力强度。你将通过将表示重力力的向量从`(0.0, –2.0)`改为`(0.0, –5.0)`来实现这一点。继续找到设置`physicsWorld.gravity`属性的位置，并将其更改为以下内容：\n\
    \n```\nphysicsWorld.gravity = CGVector(dx: 0.0, dy: -5.0)\n```\n\n为了准备下一节的内容（你将在其中开始滚动游戏场景中的不同层），你需要向场景中添加另一个层来容纳所有精灵。你将通过添加另一个名为`foregroundNode`的`SKSpriteNode`来实现这一点。该节点将容纳所有会影响游戏玩法的精灵。\n\
    \n那么，让我们添加这个节点，并将玩家添加到其中。首先，在`backgroundNode`声明之后立即添加以下`foregroundNode`声明：\n\n\
    ```\nlet foregroundNode = SKSpriteNode()\n```\n\n接下来，通过在你将`backgroundNode`添加到场景的那行代码之后立即添加以下代码行，将`foregroundNode`实例添加到场景中：\n\
    \n```\naddChild(foregroundNode)\n```\n\n现在，找到`init()`方法中你将`playerNode`和`orbNode`添加到场景的位置，并将`addChild()`调用更改为以下内容：\n\
    \n```\nforegroundNode.addChild(playerNode)\nforegroundNode.addChild(orbNode)\n\
    ```\n\n一旦你将`playerNode`和`orbNode`添加到新的`foregroundNode`中，找到你设置`playerNode`位置的位置，并使用以下`CGPoint`更改其`position`属性：\n\
    \n```\nplayerNode.position = CGPoint(x: size.width / 2.0, y: 180.0)\n```\n\n现在，找到你设置`playerNode.physicsBody.dynamic`属性的位置，并关闭玩家的动态体积：\n\
    \n```\nplayerNode.physicsBody?.isDynamic = false\n```\n\n你这样做的目的是，如果你没有及时点击屏幕，玩家就不会掉出屏幕。\n\
    \n接下来，在`orbNode`定义之后立即向`GameScene`添加以下新属性：\n\n```\nvar impulseCount = 4\n```\n\
    \n现在将`touchesBegan()`方法更改为以下内容：\n\n```\noverride func touchesBegan(_ touches:\
    \ Set<UITouch>, with event: UIEvent?) {\n    if !playerNode.physicsBody!.isDynamic\
    \ {\n        playerNode.physicsBody?.isDynamic = true\n    }\n    if impulseCount\
    \ > 0 {\n        playerNode.physicsBody!.applyImpulse(CGVector(dx: 0.0, dy: 40.0))\n\
    \        impulseCount -= 1\n    }\n}\n```\n\n这段代码的作用是：如果玩家的动态体积是关闭的，则将其重新打开，这样玩家将再次开始对重力做出反应。之后，它检查`impulseCount`属性。如果该值大于\
    \ 0，则向玩家施加一个冲量，并将`impulseCount`属性减 1。\n\n这段代码的目的是让游戏处于初始启动状态，玩家保持静止，直到你点击屏幕开始游戏。当屏幕第一次被点击时，游戏开始。\n\
    \n添加`impulseCount`属性是为了引入一个新的游戏元素。游戏将使用`impulseCount`属性为用户提供有限次数的可用于推进的冲量。每当`playerNode`与能量球接触时，`impulseCount`属性会增加；每当玩家点击屏幕时，该属性会减少。这意味着用户必须善于收集能量球，否则他们最终会坠入深渊并输掉游戏。\n\
    \n接下来需要更改的是能量球节点添加到场景的方式。你需要添加更多能量球节点。在添加额外节点之前，需要移除当前添加这些节点的代码。要移除这些代码，首先从`GameScene`类的顶部移除`orbNode`属性。在`GameScene`的声明部分找到以下行并将其移除：\n\
    \n```\nlet orbNode = SKSpriteNode(imageNamed: \"PowerUp\")\n```\n\n然后移除所有以下用于添加单个节点的代码行：\n\
    \n```\norbNode.position = CGPoint(x: 150.0, y: size.height - 25)\norbNode.physicsBody\
    \ = SKPhysicsBody(circleOfRadius: orbNode.size.width / 2)\norbNode.physicsBody?.isDynamic\
    \ = false\norbNode.physicsBody?.categoryBitMask = CollisionCategoryPowerUpOrbs\n\
    orbNode.physicsBody?.collisionBitMask = 0\norbNode.name = \"POWER_UP_ORB\"\nforegroundNode.addChild(orbNode)\n\
    ```\n\n## 向场景添加更多能量球\n"
- fmt: "游戏场景已准备好开始添加一些真实的游戏组件，第一个将是一组额外的能量球节点。这些能量球将排成两行，位于玩家上方。第一行能量球共20个，居中排列，起始位置在`playNode`上方100点，每个节点的`anchorPoint`之间间隔140点。第二组能量球节点也将是20个节点的一串，但它们位于玩家右侧50点。添加第一组能量球节点的代码如下所示：\n\
    \n```swift\nvar orbNodePosition = CGPoint(x: playerNode.position.x, y: playerNode.position.y\
    \ + 100)\nfor _ in 0...19 {\n    let orbNode = SKSpriteNode(imageNamed: \"PowerUp\"\
    )\n    orbNodePosition.y += 140\n    orbNode.position = orbNodePosition\n    orbNode.physicsBody\
    \ = SKPhysicsBody(circleOfRadius: orbNode.size.width / 2)\n    orbNode.physicsBody?.isDynamic\
    \ = false\n    orbNode.physicsBody?.categoryBitMask = CollisionCategoryPowerUpOrbs\n\
    \    orbNode.physicsBody?.collisionBitMask = 0\n    orbNode.name = \"POWER_UP_ORB\"\
    \n    foregroundNode.addChild(orbNode)\n}\n```\n\n查看这段代码，你会看到一个名为`orbNodePosition`的变量，其`x`坐标与`playerNode`的`x`坐标匹配，`y`坐标在`playerNode`上方100点。之后是一个`for`循环，在玩家上方居中添加20个`orbNode`对象，每个节点位于前一个节点的`anchorPoint`上方140点。请将此代码添加到`GameScene`的`init()`方法底部，然后我们继续处理第二组`orbNode`对象。\n\
    \n要添加第二组节点，你需要使用以下类似的代码：\n\n```swift\norbNodePosition = CGPoint(x: playerNode.position.x\
    \ + 50, y: orbNodePosition.y)\nfor _ in 0...19 {\n    let orbNode = SKSpriteNode(imageNamed:\
    \ \"PowerUp\")\n    orbNodePosition.y += 140\n    orbNode.position = orbNodePosition\n\
    \    orbNode.physicsBody = SKPhysicsBody(circleOfRadius: orbNode.size.width /\
    \ 2)\n    orbNode.physicsBody?.isDynamic = false\n    orbNode.physicsBody?.categoryBitMask\
    \ = CollisionCategoryPowerUpOrbs\n    orbNode.physicsBody?.collisionBitMask =\
    \ 0\n    orbNode.name = \"POWER_UP_ORB\"\n    foregroundNode.addChild(orbNode)\n\
    }\n```\n\n查看这段代码，你会发现唯一的变化是修改了变量`orbNodePosition`。`orbNodePosition`的`x`坐标值增加了50，其他所有内容都相同。你可以轻松地将此代码重构为一个方法，并传入新的`x`坐标，但当前的目标是了解一切如何运作。它将在后续章节中被重构。在继续之前，请将此代码添加到`GameScene`的`init()`方法中上一个循环之后。\n\
    \n将所有代码添加到游戏场景后，运行应用程序。你的屏幕现在将如图[4-1]所示。\n\n![A330720_2_En_4_Fig1_HTML.jpg](OEBPS/A330720_2_En_4_Fig1_HTML.jpg)\
    \  \n**图4-1.** 添加了额外能量球后的修改场景\n\n在向游戏添加滚动之前，你需要做的最后一件事是更改能量球碰撞的处理方式。如果你还记得第[3]章，每当`playerNode`与`orbNode`接触时，`orbNode`会从场景中移除。这种情况仍会发生，但现在碰撞还会增加`impulseCount`变量，为玩家提供额外的脉冲。为此，将当前的`didBeginContact()`方法更改为以下内容：\n\
    \n```swift\nfunc didBegin(_ contact: SKPhysicsContact) {\n    let nodeB = contact.bodyB.node!\n\
    \    if nodeB.name == \"POWER_UP_ORB\" {\n        impulseCount += 1\n        nodeB.removeFromParent()\n\
    \    }\n}\n```\n\n新的`didBeginContact()`每次玩家与能量球接触时都会增加`impulseCount`属性，然后移除能量球。现在玩家有了额外的燃料来避免坠落到行星表面。要查看此更改的效果，请保存更改并再次运行游戏。这一次，当你点击屏幕时，玩家将被向上推起并击中第一个能量球，然后是第二个，依此类推，直到飞出屏幕顶部。如果你点击足够长的时间，玩家最终会用完脉冲并从游戏底部坠落。\n\
    \n## 滚动场景\n\n在本节中，你将开始为游戏世界添加移动。在进行任何额外的代码更改之前，返回到Xcode并选择`Images.xcassets`文件夹中的第一个背景图像（箭头1），如图[4-2]所示。选中第一个背景后（箭头2和3），展开Xcode的“工具”区域（箭头4），然后点击“显示属性检查器”按钮（箭头5）。注意“图像”属性（箭头6）。图像的高度远大于当前任何可用设备的高度（箭头6）。\n\
    \n![A330720_2_En_4_Fig2_HTML.jpg](OEBPS/A330720_2_En_4_Fig2_HTML.jpg)  \n**图4-2.**\
    \ 背景图像尺寸\n\n背景之所以这么大，是因为它将向下滚动，以模拟`playerNode`在太空中向上飞行。这将通过利用游戏渲染循环中的`update()`方法来实现。滚动背景的第一步是根据玩家在游戏中的位置更改背景的位置。每当玩家在场景中向上移动时，背景将向下移动。以下代码正是实现这一点的，你稍后需要将其添加到`GameScene`中：\n\
    \n```swift\noverride func update(_ currentTime: TimeInterval) {\n    backgroundNode.position\
    \ =\n        CGPoint(x: backgroundNode.position.x,\n                y: -((playerNode.position.y\
    \ - 180.0)/8))\n}\n```\n\n这个`update()`方法的实现根据玩家的当前位置更改背景节点的位置。具体来说，它将`backgroundNode`的位置设置为与自身相同的`x`值，但使用的`y`值位于玩家位置下方180点，然后除以8。目前不必担心这些数字。我们稍后会详细讨论它们。请将此`update`方法添加到`GameScene`的末尾，然后再次运行游戏。当你点击屏幕时，你会看到背景随着玩家飞出屏幕顶部而缓慢向场景底部移动。这很酷，但玩家仍然在飞离场景。还需要对`update()`方法进行一次修改。看一下这个修改后的`update()`：\n\
    \n```swift\noverride func update(_ currentTime: TimeInterval) {\n    if playerNode.position.y\
    \ >= 180.0 {\n        backgroundNode.position =\n            CGPoint(x: backgroundNode.position.x,\n\
    \                    y: -((playerNode.position.y - 180.0)/8))\n        foregroundNode.position\
    \ =\n            CGPoint(x: foregroundNode.position.x,\n                    y:\
    \ -(playerNode.position.y - 180.0))\n    }\n}\n```\n\n注意进行了两处修改。首先，该方法检查`playerNode`是否已至少向上移动了180点。如果`playerNode`已移动到此高度，则`backgroundNode`以玩家速度的八分之一向下移动，而前景以与玩家完全相同的速度移动。以与玩家相同的速度移动前景可防止玩家飞得太高而离开场景。将当前的`update()`方法修改为与此相同，然后再次运行应用程序。当你点击屏幕时，背景会缓慢向下移动，而超级太空人不会飞出屏幕顶部。这很棒，但有一件事除外：当`playerNode`到达第一行能量球的顶部时，玩家无法再向上移动，因为下一组能量球在右侧，玩家无法到达它们。这个问题将在下一节中解决，届时我们将向你展示如何使用加速度计为玩家添加水平移动。\n\
    \n## 使用加速度计控制玩家移动"
  raw: 'The game scene is ready to start adding some real game components, the first
    of which is going to be a collection of additional orb nodes . These orbs will
    be laid out in two lines above the player. The first line of orbs, a collection
    of 20, will be centered and will start 100 points above the playNode, with 140
    points in between each node’s anchorPoint. The second set of orb nodes will also
    be a string of 20 nodes, but they will be 50 points to the right of the player.
    The code to add the first set of orb nodes is shown in the following snippet:
    var orbNodePosition = CGPoint(x: playerNode.position.x, y: playerNode.position.y
    + 100) for _ in 0...19 {     let orbNode = SKSpriteNode(imageNamed: "PowerUp")
        orbNodePosition.y += 140     orbNode.position = orbNodePosition     orbNode.physicsBody
    = SKPhysicsBody(circleOfRadius: orbNode.size.width / 2)     orbNode.physicsBody?.isDynamic
    = false     orbNode.physicsBody?.categoryBitMask = CollisionCategoryPowerUpOrbs
        orbNode.physicsBody?.collisionBitMask = 0     orbNode.name = "POWER_UP_ORB"
        foregroundNode.addChild(orbNode) } As you look over this code , you’ll see
    a variable named orbNodePosition that has an x-coordinate matching the playerNode’s
    x-coordinate and a y-coordinate that is 100 points above the playerNode. After
    that there is a for loop that adds 20 orbNode objects centered above the player,
    with each node 140 points above the previous node’s anchorPoint. Go ahead and
    add this code to the bottom of the GameScene’s init() method, and then let’s move
    on to the second set of orbNode objects. To add the second set of nodes , you
    will use the following, similar code: orbNodePosition = CGPoint(x: playerNode.position.x
    + 50, y: orbNodePosition.y) for _ in 0...19 {     let orbNode = SKSpriteNode(imageNamed:
    "PowerUp")     orbNodePosition.y += 140     orbNode.position = orbNodePosition
        orbNode.physicsBody = SKPhysicsBody(circleOfRadius: orbNode.size.width / 2)
        orbNode.physicsBody?.isDynamic = false     orbNode.physicsBody?.categoryBitMask
    = CollisionCategoryPowerUpOrbs     orbNode.physicsBody?.collisionBitMask = 0     orbNode.name
    = "POWER_UP_ORB"     foregroundNode.addChild(orbNode) } As you look over this
    code, you will see that the only change is the modification of the variable orbNode
    Position. The value of the orbNodePosition’s x-coordinate is increasing by 50,
    and everything else is the same. You could easily refactor this code into a method
    and pass it the new x-coordinate, but the goal here is to see how everything works.
    It will be refactored in a later chapter. Before moving on, go ahead and add this
    code after the previous loop in the GameScene’s init() method. After you have
    all this code added to the game scene, run the application. Your screen will now
    look like Figure [4-1](#A330720_2_En_4_Chapter.html#Fig1). ![A330720_2_En_4_Fig1_HTML.jpg](OEBPS/A330720_2_En_4_Fig1_HTML.jpg)
    Figure 4-1. The modified scene with additional orbs The last thing you need to
    do before adding the scrolling to the game is change how orb contacts are handled.
    If you remember from Chapter [3](#A330720_2_En_3_Chapter.html), whenever the playerNode
    came into contact with an orbNode the orbNode was removed from the scene. This
    is still going to happen, but now the contact is going to also increment the impuleCount
    variable, giving the player additional impulses. To do this, change the current
    didBeginContact() method to the following: func didBegin(_ contact: SKPhysicsContact)
    {     let nodeB = contact.bodyB.node!     if nodeB.name == "POWER_UP_ORB"  {         impulseCount
    += 1          nodeB.removeFromParent()     } } The new didBeginContact() increases
    the impulseCount property each time the player comes into contact with an orb
    and then removes the orb. Now the player has additional fuel to keep from crashing
    into the planet’s surface below. To see this change in action, save your changes
    and run the game again. This time, when you tap the screen the player will be
    thrust upward and hit the first orb, then the second, and so on, until it flies
    off the top of the screen. If you tap long enough, the player will eventually
    run out of impulses and fall back through the bottom of the game.


    ## Scrolling the Scene


    In this section you’ll start adding movement to your game world. Before making
    any additional code changes, go back to Xcode and select the first background
    image in the Images.xcassets folder (Arrow 1), as shown in Figure [4-2](#A330720_2_En_4_Chapter.html#Fig2).
    With the first background selected (Arrows 2 & 3), expand the Utilities section
    of Xcode (Arrow 4) and then click the Show Attributes Inspector button (Arrow
    5). Notice the Image properties (Arrow 6). The height of the image is much greater
    than any of the currently available devices (Arrow 6). ![A330720_2_En_4_Fig2_HTML.jpg](OEBPS/A330720_2_En_4_Fig2_HTML.jpg)
    Figure 4-2. The background image size The reason the background is so much bigger
    is because it’s going to scroll downward to simulate the playerNode flying up
    through space. This is going to be accomplished by making use of the update()
    method in the game’s rendering loop. The first step to scroll the background is
    to change the position of the background based upon the location of the player
    in the game. Every time the player goes higher in the scene, the background will
    be moved down in the scene. The following code, which you will need to add to
    the GameScene in a moment, does just this: override func update(_ currentTime:
    TimeInterval) {     backgroundNode.position =         CGPoint(x: backgroundNode.position.x,
                    y: -((playerNode.position.y - 180.0)/8)) } This implementation
    of the update() method changes the position of the background node based on the
    current position of the player. Specifically, it sets the position of the backgroundNode
    to its same x-value but uses a y-value that is 180 points below the position of
    the player, which is then divided by 8\. Don’t worry about these numbers at the
    moment. We’ll talk about them a lot more in just a moment. Go ahead and add this
    update method to the end of the GameScene and then run the game again. When you
    tap the screen this time, you will see the background slowly move toward the bottom
    of the scene as the player flies off the top of the screen. That’s pretty cool,
    but the player is still flying out of the scene. There needs to be one more change
    made to the update() method. Take a look at this modified update(): override func
    update(_ currentTime: TimeInterval) {     if playerNode.position.y >= 180.0 {
            backgroundNode.position =             CGPoint(x: backgroundNode.position.x,
                        y: -((playerNode.position.y - 180.0)/8))         foregroundNode.position
    =             CGPoint(x: foregroundNode.position.x,                     y: -(playerNode.position.y
    - 180.0))     } } Notice two changes have been made. First, the method is checking
    to see whether the playerNode has moved at least 180 points up the scene. If the
    playerNode has moved this high, then the backgroundNode is moved down the scene
    at 1/8th the speed of the player, and the foreground is moved at exactly the same
    rate as the player. Moving the foreground at the same rate as the player prevents
    the player from going too high and leaving the scene. Change the current update()
    method to look like this one and run the application again. When you tap the screen
    this time, the background moves slowly down the screen, and the SuperSpaceMan
    doesn’t fly off the top of the screen. This is great except for one thing: when
    the playerNode gets to the top of the first line of orbs, the player can go no
    higher because the next set of orbs are to the right, and the player has no way
    of getting to them. This problem will be solved in the next section, when we show
    you how to add horizontal movement to the player using the accelerometer.


    ## Controlling Player Movement with the Accelerometer'
  trans: "\n游戏场景已准备好开始添加一些真实的游戏组件，第一个将是一组额外的能量球节点。这些能量球将排成两行，位于玩家上方。第一行能量球共 20 个，居中排列，起始位置在`playNode`上方\
    \ 100 点，每个节点的`anchorPoint`之间间隔 140 点。第二组能量球节点也将是 20 个节点的一串，但它们位于玩家右侧 50 点。添加第一组能量球节点的代码如下所示：\n\
    \n```swift\nvar orbNodePosition = CGPoint(x: playerNode.position.x, y: playerNode.position.y\
    \ + 100)\nfor _ in 0...19 {\n    let orbNode = SKSpriteNode(imageNamed: \"PowerUp\"\
    )\n    orbNodePosition.y += 140\n    orbNode.position = orbNodePosition\n    orbNode.physicsBody\
    \ = SKPhysicsBody(circleOfRadius: orbNode.size.width / 2)\n    orbNode.physicsBody?.isDynamic\
    \ = false\n    orbNode.physicsBody?.categoryBitMask = CollisionCategoryPowerUpOrbs\n\
    \    orbNode.physicsBody?.collisionBitMask = 0\n    orbNode.name = \"POWER_UP_ORB\"\
    \n    foregroundNode.addChild(orbNode)\n}\n```\n\n查看这段代码，你会看到一个名为`orbNodePosition`的变量，其`x`坐标与`playerNode`的`x`坐标匹配，`y`坐标在`playerNode`上方\
    \ 100 点。之后是一个`for`循环，在玩家上方居中添加 20 个`orbNode`对象，每个节点位于前一个节点的`anchorPoint`上方 140\
    \ 点。请将此代码添加到`GameScene`的`init()`方法底部，然后我们继续处理第二组`orbNode`对象。\n\n要添加第二组节点，你需要使用以下类似的代码：\n\
    \n```swift\norbNodePosition = CGPoint(x: playerNode.position.x + 50, y: orbNodePosition.y)\n\
    for _ in 0...19 {\n    let orbNode = SKSpriteNode(imageNamed: \"PowerUp\")\n \
    \   orbNodePosition.y += 140\n    orbNode.position = orbNodePosition\n    orbNode.physicsBody\
    \ = SKPhysicsBody(circleOfRadius: orbNode.size.width / 2)\n    orbNode.physicsBody?.isDynamic\
    \ = false\n    orbNode.physicsBody?.categoryBitMask = CollisionCategoryPowerUpOrbs\n\
    \    orbNode.physicsBody?.collisionBitMask = 0\n    orbNode.name = \"POWER_UP_ORB\"\
    \n    foregroundNode.addChild(orbNode)\n}\n```\n\n查看这段代码，你会发现唯一的变化是修改了变量`orbNodePosition`。`orbNodePosition`的`x`坐标值增加了\
    \ 50，其他所有内容都相同。你可以轻松地将此代码重构为一个方法，并传入新的`x`坐标，但当前的目标是了解一切如何运作。它将在后续章节中被重构。在继续之前，请将此代码添加到`GameScene`的`init()`方法中上一个循环之后。\n\
    \n将所有代码添加到游戏场景后，运行应用程序。你的屏幕现在将如图[4-1]所示。\n\n![A330720_2_En_4_Fig1_HTML.jpg](img/A330720_2_En_4_Fig1_HTML.jpg)\
    \  \n**图 4-1.** 添加了额外能量球后的修改场景\n\n在向游戏添加滚动之前，你需要做的最后一件事是更改能量球碰撞的处理方式。如果你还记得第[3]章，每当`playerNode`与`orbNode`接触时，`orbNode`会从场景中移除。这种情况仍会发生，但现在碰撞还会增加`impulseCount`变量，为玩家提供额外的脉冲。为此，将当前的`didBeginContact()`方法更改为以下内容：\n\
    \n```swift\nfunc didBegin(_ contact: SKPhysicsContact) {\n    let nodeB = contact.bodyB.node!\n\
    \    if nodeB.name == \"POWER_UP_ORB\" {\n        impulseCount += 1\n        nodeB.removeFromParent()\n\
    \    }\n}\n```\n\n新的`didBeginContact()`每次玩家与能量球接触时都会增加`impulseCount`属性，然后移除能量球。现在玩家有了额外的燃料来避免坠落到行星表面。要查看此更改的效果，请保存更改并再次运行游戏。这一次，当你点击屏幕时，玩家将被向上推起并击中第一个能量球，然后是第二个，依此类推，直到飞出屏幕顶部。如果你点击足够长的时间，玩家最终会用完脉冲并从游戏底部坠落。\n\
    \n## 滚动场景\n\n在本节中，你将开始为游戏世界添加移动。在进行任何额外的代码更改之前，返回到 Xcode 并选择`Images.xcassets`文件夹中的第一个背景图像（箭头\
    \ 1），如图[4-2]所示。选中第一个背景后（箭头 2 和 3），展开 Xcode 的“工具”区域（箭头 4），然后点击“显示属性检查器”按钮（箭头 5）。注意“图像”属性（箭头\
    \ 6）。图像的高度远大于当前任何可用设备的高度（箭头 6）。\n\n![A330720_2_En_4_Fig2_HTML.jpg](img/A330720_2_En_4_Fig2_HTML.jpg)\
    \  \n**图 4-2.** 背景图像尺寸\n\n背景之所以这么大，是因为它将向下滚动，以模拟`playerNode`在太空中向上飞行。这将通过利用游戏渲染循环中的`update()`方法来实现。滚动背景的第一步是根据玩家在游戏中的位置更改背景的位置。每当玩家在场景中向上移动时，背景将向下移动。以下代码正是实现这一点的，你稍后需要将其添加到`GameScene`中：\n\
    \n```swift\noverride func update(_ currentTime: TimeInterval) {\n    backgroundNode.position\
    \ =\n        CGPoint(x: backgroundNode.position.x,\n                y: -((playerNode.position.y\
    \ - 180.0)/8))\n}\n```\n\n这个`update()`方法的实现根据玩家的当前位置更改背景节点的位置。具体来说，它将`backgroundNode`的位置设置为与自身相同的`x`值，但使用的`y`值位于玩家位置下方\
    \ 180 点，然后除以 8。目前不必担心这些数字。我们稍后会详细讨论它们。请将此`update`方法添加到`GameScene`的末尾，然后再次运行游戏。当你点击屏幕时，你会看到背景随着玩家飞出屏幕顶部而缓慢向场景底部移动。这很酷，但玩家仍然在飞离场景。还需要对`update()`方法进行一次修改。看一下这个修改后的`update()`：\n\
    \n```swift\noverride func update(_ currentTime: TimeInterval) {\n    if playerNode.position.y\
    \ >= 180.0 {\n        backgroundNode.position =\n            CGPoint(x: backgroundNode.position.x,\n\
    \                    y: -((playerNode.position.y - 180.0)/8))\n        foregroundNode.position\
    \ =\n            CGPoint(x: foregroundNode.position.x,\n                    y:\
    \ -(playerNode.position.y - 180.0))\n    }\n}\n```\n\n注意进行了两处修改。首先，该方法检查`playerNode`是否已至少向上移动了\
    \ 180 点。如果`playerNode`已移动到此高度，则`backgroundNode`以玩家速度的八分之一向下移动，而前景以与玩家完全相同的速度移动。以与玩家相同的速度移动前景可防止玩家飞得太高而离开场景。将当前的`update()`方法修改为与此相同，然后再次运行应用程序。当你点击屏幕时，背景会缓慢向下移动，而超级太空人不会飞出屏幕顶部。这很棒，但有一件事除外：当`playerNode`到达第一行能量球的顶部时，玩家无法再向上移动，因为下一组能量球在右侧，玩家无法到达它们。这个问题将在下一节中解决，届时我们将向你展示如何使用加速度计为玩家添加水平移动。\n\
    \n## 使用加速度计控制玩家移动\n"
- fmt: "# Adding Accelerometer Controls\n\nIn the previous section, the player ran\
    \ into a problem when the next set of orbs needed to continue up the scene were\
    \ 50 points to the right, but the player had no horizontal movement to reach them.\
    \ You will now fix this problem by using the phone’s accelerometer to control\
    \ the player’s movement along the x-axis.\n\nTo use the accelerometer in your\
    \ game, you first need to add the `CoreMotion` framework to your `GameScene`.\
    \ You do this by adding the following import statement to the top of your `GameScene.swift`\
    \ file:\n\n```swift\nimport CoreMotion\n```\n\nAfter this you need to add a new\
    \ property. This property will hold an instance to the `CMMotionManager` object\
    \ that will be used to monitor horizontal movement. Add this variable to the `GameScene`\
    \ directly after the `impulseCount` variable added earlier:\n\n```swift\nlet coreMotionManager\
    \ = CMMotionManager()\n```\n\nThat code creates an instance of the `CMMotionManager`\
    \ and stores it in the constant `coreMotionManager`. Let’s talk a little about\
    \ what `CMMotionManager` does. A `CMMotionManager` object is the object used to\
    \ get access to the motion services provided by iOS. These services include access\
    \ to the accelerometer, magnetometer, rotation rate, and other device motion sensors.\
    \ You are specifically interested in the acceleration along the x-axis of the\
    \ device. This information is accessed using the accelerometer.\n\nYou will be\
    \ using the `CMMotionManager` to get the accelerometer to update the app on a\
    \ specific interval with the current device acceleration. The code to do this\
    \ is shown here:\n\n```swift\ncoreMotionManager.accelerometerUpdateInterval =\
    \ 0.3\ncoreMotionManager.startAccelerometerUpdates()\n```\n\nTake a moment to\
    \ look at this code. The first line tells the `coreMotionManager` the interval,\
    \ in seconds, that the accelerometer will use to update the app with the current\
    \ acceleration. This value is set to 3/10ths of a second, which provides a pretty\
    \ smooth update rate. You can play around with this value and see how it affects\
    \ the app. The second line of this code actually starts the accelerometer updates.\n\
    \nGo ahead and add this code to the `touchesBegan()` method of the `GameScene`\
    \ just after the `playerNode.physicsBody.dynamic` property is set to `true`. The\
    \ modified `touchesBegan()` method is shown here:\n\n```swift\noverride func touchesBegan(_\
    \ touches: Set<UITouch>, with event: UIEvent?) {\n    if !playerNode.physicsBody!.isDynamic\
    \ {\n        playerNode.physicsBody?.isDynamic = true\n        coreMotionManager.accelerometerUpdateInterval\
    \ = 0.3\n        coreMotionManager.startAccelerometerUpdates()\n    }\n    if\
    \ impulseCount > 0 {\n        playerNode.physicsBody!.applyImpulse(CGVector(dx:\
    \ 0.0, dy: 40.0))\n        impulseCount -= 1\n    }\n}\n```\n\nNow it’s time to\
    \ do something with this information. At first, using the `update()` method would\
    \ seem like the logical location to put this data to use, but the `update()` method\
    \ is invoked before the render loop has evaluated all the physics bodies in the\
    \ scene. It’s possible that colliding with another node in the scene could have\
    \ altered the player’s velocity along the x-axis, and this change should take\
    \ place prior to altering the player’s velocity with the accelerometer. Although\
    \ that can’t happen in this game—because the `playerNode` is the only dynamic\
    \ volume in the game—it’s good to be aware of.\n\nGiven that all the physics changes\
    \ should be evaluated before the player’s velocity on the x-axis is modified,\
    \ there is really only one place in the render that can process accelerometer\
    \ changes, and that is in the render loop’s `didSimulatePhysics()` method. To\
    \ override the current `didSimulatePhysics()`, add the following code to the bottom\
    \ of the `GameScene`:\n\n```swift\noverride func didSimulatePhysics() {\n    if\
    \ let accelerometerData = coreMotionManager.accelerometerData {\n        playerNode.physicsBody!.velocity\
    \ =\n                CGVector(dx: CGFloat(accelerometerData.acceleration.x * 380.0),\n\
    \                         dy: playerNode.physicsBody!.velocity.dy)\n    }\n  \
    \  if playerNode.position.x < -(playerNode.size.width / 2) {\n        playerNode.position\
    \ =\n            CGPoint(x: size.width - playerNode.size.width / 2,\n        \
    \            y: playerNode.position.y);\n    }\n    else if playerNode.position.x\
    \ > self.size.width {\n        playerNode.position = CGPoint(x: playerNode.size.width\
    \ / 2,\n                                      y: playerNode.position.y);\n   \
    \ }\n}\n```\n\nOnce you’ve added this code to the `GameScene`, save it and this\
    \ time run the app on your physical iPhone. (The simulator doesn’t simulate accelerometer\
    \ activity.) When the app is running on your device, tap the screen and try to\
    \ collect all the `orbNode`s. Remember, the more orbs you collect, the more impulses\
    \ the player will have to keep going.\n\nOnce you’ve played around with the accelerometer\
    \ a bit, let’s look at the code you just added. The first line is where the `playerNode`’s\
    \ velocity is changed. This is done by creating a new vector with the most recent\
    \ accelerometer x-acceleration value multiplied by `380.0` as the x-value, then\
    \ using the player’s current velocity along the y-axis, and finally making this\
    \ the player’s new overall velocity.\n\nAfter the player’s velocity is modified,\
    \ there are two `if` statements to determine whether the player is flying off\
    \ the scene either to the left or to the right. If either of these two conditions\
    \ occurs, the player is moved to the opposite side of the scene. Notice when the\
    \ location of the `playerNode` is tested, the test is checking to see whether\
    \ half the `playerNode` is off the scene. This is done because the `playerNode`’s\
    \ anchor point is `(0.5, 0.5)`.\n\nThere’s one last change that needs to be made:\
    \ turning off accelerometer updates when the `GameScene` is no longer used. To\
    \ do that, add the following `deinit()` method to the bottom of the `GameScene`\
    \ and save your changes:\n\n```swift\ndeinit {\n    coreMotionManager.stopAccelerometerUpdates()\n\
    }\n```\n\n## Summary\n\nIn this chapter you started to add some real functionality\
    \ to your game. You began by making some small restructuring changes to the beginning\
    \ of the game. Then you added additional `orbNode`s to collide with. After adding\
    \ the new `orbNode`s, you added scrolling to your game scene, making it look like\
    \ the player was flying through space collecting orbs. Finally, you closed out\
    \ the chapter using the phone’s accelerometer to move the player along the x-axis.\
    \ In the next chapter, you will continue adding new game elements as well as start\
    \ animating your `SKSpriteKitNode`s. That is the chapter where you will start\
    \ turning your game into a real, playable game.\n\n© James Goodwill and Wesley\
    \ Matlock 2017  \nJames Goodwill and Wesley Matlock, *Beginning Swift Games Development\
    \ for iOS*  \n10.1007/978-1-4842-2310-9_5\n\n# 5. Adding Actions and Animations\n\
    \nJames Goodwill¹ and Wesley Matlock²  \n(1) Highlands Ranch, Colorado, USA  \n\
    (2) Kansas City, Missouri, USA\n\nIn this chapter, you will refactor the orb node's\
    \ layout one last time with the goal of enhancing playability. After that, we'll\
    \ show you how you can use `SKActions` to move an `SKSpriteNode` back and forth\
    \ across the scene and then make that same node rotate forever. We close out the\
    \ chapter with a look at how you can add colorizing effects to an `SKSpriteNode`\
    \ using a colorize action."
