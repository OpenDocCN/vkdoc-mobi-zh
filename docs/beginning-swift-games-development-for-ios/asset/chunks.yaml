            let frame1 = SKTexture(imageNamed: "BlackHole1")         let frame2 =
    SKTexture(imageNamed: "BlackHole2")         let frame3 = SKTexture(imageNamed:
    "BlackHole3")         let frame4 = SKTexture(imageNamed: "BlackHole4")         let
    blackHoleTextures = [frame0, frame1, frame2, frame3, frame4]         let animateAction
