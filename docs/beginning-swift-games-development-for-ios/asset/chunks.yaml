- fmt: "# Lighting Up the Scene\n\nAsk any director or photographer, and one of the\
    \ most important elements of a scene is lighting. You’re in luck because SceneKit\
    \ provides several types of lighting that you can manipulate to make your scene\
    \ pop. In SceneKit, you’ll use the `SCNLight` object to create a light source\
    \ in your scene. You’ll set the light type to one of four different light types\
    \ provided to you from SceneKit.\n\n*   `SCNLightTypeAmbient` : This light will\
    \ illuminate your scene from all directions; the light’s position or direction\
    \ has no effect on the lighting of the scene. ![A330720_2_En_12_Figa_HTML.jpg](OEBPS/A330720_2_En_12_Figa_HTML.jpg)\n\
    *   `SCNLightTypeOmni` : This light will illuminate your scene from a certain\
    \ point. ![A330720_2_En_12_Figb_HTML.jpg](OEBPS/A330720_2_En_12_Figb_HTML.jpg)\n\
    *   `SCNLightTypeDirectional` : This light will illuminate all objects in your\
    \ scene uniformly from the same direction. ![A330720_2_En_12_Figc_HTML.jpg](OEBPS/A330720_2_En_12_Figc_HTML.jpg)\n\
    *   `SCNLightTypeSpot` : This light will illuminate your scene like a rock star!\
    \ ![A330720_2_En_12_Figd_HTML.jpg](OEBPS/A330720_2_En_12_Figd_HTML.jpg)\n\nSo,\
    \ these are the light types that you’ll be able to use in your games. Note that\
    \ the material of the object influences how the object is illuminated. Also, you’ll\
    \ have full control of the color of the light. SceneKit does have some “rules”\
    \ it uses when updating a scene with lighting to make the scene display efficiently:\n\
    \n*   Lighting affects only moving objects in your scene.\n*   SceneKit uses only\
    \ up to eight light sources per node, so making more than this will be a waste.\
    \ In fact, Apple recommends using no more than three lighting effects and a single\
    \ ambient light.\n\nWe’re sure you’re ready to jump into some code. For your hero,\
    \ you’ll create a nice ambient light for the scene a spotlight so he is never\
    \ in the dark. To make things easy for you, you’ll control all the lighting in\
    \ the `GameViewController` for now. If you don’t have the `GameViewController`\
    \ open, open it up. You’ll need to create a new class variable for the spotlight.\
    \ At the top of the class, go ahead and create your new variable: `var spotLight:\
    \ SCNNode!`. After you’ve created this variable, you can create the `setupLighting()`\
    \ method , as in Listing [12-2](#A330720_2_En_12_Chapter.html#Par30).\n\n```\n\
    func setupLighting(scene:SCNScene) {\n    let ambientLight = SCNNode()\n    ambientLight.light\
    \ = SCNLight()\n    ambientLight.light!.type = SCNLight.LightType.ambient\n  \
    \  ambientLight.light!.color = UIColor.white\n    scene.rootNode.addChildNode(ambientLight)\n\
    \n    let lightNode = SCNNode()\n    lightNode.light = SCNLight()\n    lightNode.light!.type\
    \ = SCNLight.LightType.spot\n    lightNode.light!.castsShadow = true\n    lightNode.light!.color\
    \ = UIColor(white: 0.8, alpha: 1.0)\n    lightNode.position = SCNVector3Make(0,\
    \ 80, 30)\n    lightNode.rotation = SCNVector4Make(1, 0, 0, Float(-M_PI/2.8))\n\
    \    lightNode.light!.spotInnerAngle = 0\n    lightNode.light!.spotOuterAngle\
    \ = 50\n    lightNode.light!.shadowColor = UIColor.black\n    lightNode.light!.zFar\
    \ = 500\n    lightNode.light!.zNear = 50\n    scene.rootNode.addChildNode(lightNode)\n\
    }\n```\n\nListing 12-2. `setupLighting()` Method\n\nFirst, you create `SCNLight`\
    \ and `SCNNode` objects. As you can see, you’ll set the type of light to the light\
    \ object. A light type of `SCNLightTypeAmbient` doesn’t need to set a direction,\
    \ position, attenuation, spotlight angle, or shadows because an ambient light\
    \ is for the entire scene. Don’t forget to call this method in the `createMainScene()`\
    \ method , similar to `setupLighting(mainScene)`.\n\n## Materials\n\nNow let’s\
    \ examine how SceneKit manages the visual attributes of your objects. SceneKit\
    \ uses the `SCNMaterial` class to control the lighting and shading attributes\
    \ for the geometry of your `SCNNode`. SceneKit provides eight different properties\
    \ you can use to set these attributes:\n\n*   **Diffuse**: Diffuse shading is\
    \ the amount of light and color reflected in all directions. ![A330720_2_En_12_Fige_HTML.jpg](OEBPS/A330720_2_En_12_Fige_HTML.jpg)\n\
    *   **Ambient**: Ambient light is reflected in all points from the surface at\
    \ a fixed intensity and fixed color. If there is no ambient light object in the\
    \ scene, this attribute has no effect on the node. ![A330720_2_En_12_Figf_HTML.jpg](OEBPS/A330720_2_En_12_Figf_HTML.jpg)\n\
    *   **Specular**: Specular is the light that is reflected straight to the user,\
    \ similar to how a mirror reflects light. This is the bright spot of light that\
    \ appears shiny on an object. This property is defaulted to black, which will\
    \ cause the material to appear dull. ![A330720_2_En_12_Figg_HTML.jpg](OEBPS/A330720_2_En_12_Figg_HTML.jpg)\n\
    *   **Normal**: Normal lighting is a technique used to create lighting out of\
    \ the surface of the material. Basically it tries to figure out the bumps and\
    \ dents of the material to give more realistic lighting. ![A330720_2_En_12_Figh_HTML.jpg](OEBPS/A330720_2_En_12_Figh_HTML.jpg)\n\
    *   **Reflective**: Reflective lighting is a mirrored surface from the reflective\
    \ environment. The surface will not actually reflect other objects in the scene.\
    \ ![A330720_2_En_12_Figi_HTML.jpg](OEBPS/A330720_2_En_12_Figi_HTML.jpg)\n*   **Emission**:\
    \ Emission is the color that is emitted by the surface. By default, this property\
    \ is set to black, which means no light is reflected. If you provide a color,\
    \ that color will be reflected, and if you really want to get fancy, you can provide\
    \ an image. SceneKit will use this image to provide the “glowing” effect based\
    \ on the material. ![A330720_2_En_12_Figj_HTML.jpg](OEBPS/A330720_2_En_12_Figj_HTML.jpg)\n\
    *   **Transparent**: Transparent is the opacity of the material. This attribute\
    \ is basically used to make parts of the material invisible. ![A330720_2_En_12_Figk_HTML.jpg](OEBPS/A330720_2_En_12_Figk_HTML.jpg)\n\
    *   **Multiply**: This attribute is computed after all the other attributes and\
    \ adds a color to the material. ![A330720_2_En_12_Figl_HTML.jpg](OEBPS/A330720_2_En_12_Figl_HTML.jpg)\n\
    \n## Applying Materials to Your Obstacles"
