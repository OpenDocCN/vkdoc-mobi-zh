  trans: "\n现在，你已经将所有能量球整齐地布置好，黑洞也在游戏场景中来回穿梭，是时候再添加一些炫酷效果，让游戏场景看起来更棒了。具体来说，我们将演示如何为场景添加更多星星、一个行星表面，以及在\
    \ `playerNode` 与黑洞接触时如何为其着色。\n\n### 向背景添加星星\n\n首先，让我们开始向背景添加一些星星。首先，在 Xcode 中打开\
    \ `Images.xcassets` 文件夹，选择 `Stars` 图片。要将此图片添加到场景中，首先添加一个声明语句，用于保存对引用 `Stars` 图片的\
    \ `SKSpriteNode` 的引用。此声明应添加到 `GameScene` 中，紧跟在 `backgroundNode` 声明之后：\n\n```\n\
    let backgroundNode = SKSpriteNode(imageNamed: \"Background\")\nlet backgroundStarsNode\
    \ = SKSpriteNode(imageNamed: \"Stars\")\n```\n\n添加声明后，将以下代码行添加到 `GameScene.init(size:\
    \ CGSize)` 方法中，紧跟在将 `backgroundNode` 添加到场景的那一行之后：\n\n```\naddChild(backgroundNode)\n\
    backgroundStarsNode.size.width = frame.size.width\nbackgroundStarsNode.anchorPoint\
    \ = CGPoint(x: 0.5, y: 0.0)\nbackgroundStarsNode.position = CGPoint(x: 160.0,\
    \ y: 0.0)\naddChild(backgroundStarsNode)\n```\n\n在运行应用并查看新星星之前，你还需要做最后一件事：让星星相对于\
    \ `playerNode` 移动。让星星相对于玩家移动相当直接，但我们希望通过让星星的移动速度与背景略有不同来增加一些酷炫效果。我们修改了 `update()`\
    \ 方法来实现这一点。请看：\n\n```\noverride func update(_ currentTime: TimeInterval) {\n \
    \   if playerNode.position.y >= 180.0 {\n        backgroundNode.position = CGPoint(x:\
    \ backgroundNode.position.x, y:\n            -((playerNode.position.y - 180.0)/8));\n\
    \                 backgroundStarsNode.position = CGPoint(x: backgroundStarsNode.position.x,\
    \ y:\n                    -((playerNode.position.y - 180.0)/6))\n        foregroundNode.position\
    \ = CGPoint (x: foregroundNode.position.x, y:\n            -(playerNode.position.y\
    \ - 180.0));\n    }\n}\n```\n\n注意修改后的 `update()` 方法中加粗的部分。通过这两行代码，我们将星星相对于 `playerNode`\
    \ 移动，但移动速度比 `backgroundNode` 稍慢。这让人产生 `backgroundStarsNode` 更接近场景视口的错觉。对 `update()`\
    \ 方法进行此更改，然后再次运行应用。首次启动游戏时，你将看到如图 5-4 所示的场景。\n\n![A330720_2_En_5_Fig4_HTML.jpg](img/A330720_2_En_5_Fig4_HTML.jpg)\n\
    \n**图 5-4.** 向场景添加的一层星星\n\n继续开始玩游戏。当你越升越高时，你会注意到星星的移动速度比背景稍快。这种效果称为视差效果。\n\n###\
    \ 添加行星表面\n\n接下来要做的是添加一种感知效果，让 `playerNode` 看起来是从一个行星表面开始起飞的。回到 Xcode，再次打开 `Images.xcassets`\
    \ 文件夹，找到 `PlanetStart` 图片。这张图片将作为行星表面。将此新图片添加到场景中并不复杂，你之前已经见识过。与向场景添加星星的唯一区别在于，你将让行星与背景节点以相同速度移动。这将使行星表面随着玩家在场景中越升越高而逐渐远离。\n\
    \n让我们开始这样做。首先，在 `backgroundStarsNode` 声明之后直接添加一个新的 `SKSpriteNode` 声明：\n\n```\n\
    let backgroundStarsNode = SKSpriteNode(imageNamed: \"Stars\")\nlet backgroundPlanetNode\
    \ = SKSpriteNode(imageNamed: \"PlanetStart\")\n```\n\n接下来，插入将 `backgroundPlanetNode`\
    \ 添加到场景的代码。这段代码应紧跟在添加 `backgroundStarsNode` 之后，如下所示：\n\n```\naddChild(backgroundStarsNode)\n\
    backgroundPlanetNode.size.width = frame.size.width\nbackgroundPlanetNode.anchorPoint\
    \ = CGPoint(x: 0.5, y: 0.0)\nbackgroundPlanetNode.position = CGPoint(x: size.width\
    \ / 2.0, y: 0.0)\naddChild(backgroundPlanetNode)\n```\n\n现在，找到设置 `playerNode`\
    \ 位置的那行代码（在 `init(size: CGSize)` 方法中），并将其位置修改为以下内容：\n\n```\nplayerNode.position\
    \ = CGPoint(x: size.width / 2.0, y: 220.0)\n```\n\n最后，修改 `update` 方法，让 `backgroundPlanetNode`\
    \ 与 `backgroundNode` 以相同速度移动：\n\n```\noverride func update(_ currentTime: TimeInterval)\
    \ {\n    if playerNode.position.y >= 180.0 {\n        backgroundNode.position\
    \ = CGPoint(x: backgroundNode.position.x, y: -((playerNode.position.y - 180.0)/8));\n\
    \        backgroundStarsNode.position = CGPoint(x: backgroundStarsNode.position.x,\
    \ y: -((playerNode.position.y - 180.0)/6));\n        backgroundPlanetNode.position\
    \ = CGPoint(x: backgroundPlanetNode.position.x, y: -((playerNode.position.y -\
    \ 180.0)/8));\n        foregroundNode.position = CGPoint(x: foregroundNode.position.x,\
    \ y: -(playerNode.position.y - 180.0));\n    }\n}\n```\n\n完成所有这些修改后，再次运行应用并欣赏你的杰作。现在你应该看到场景底部有一个行星，`playerNode`\
    \ 站在其顶端。轻触屏幕几次。行星和背景将一起移动，给人以 `playerNode` 正飞离行星表面进入太空的印象。图 5-5 显示了新场景。\n\n![A330720_2_En_5_Fig5_HTML.jpg](img/A330720_2_En_5_Fig5_HTML.jpg)\n\
    \n**图 5-5.** 向场景添加的行星表面\n\n### 添加视觉死亡指示器\n\n我们还有最后一项更改要做。如果你最近让玩家撞上过黑洞，你就会知道这有点虎头蛇尾。我们想添加一个视觉指示器来显示玩家已死亡。一个简单的方法是使用着色动作。着色动作会在一段指定的时间内将第二种颜色混合到\
    \ `SKNode` 中。以下是创建 `colorizeAction` 的示例：\n\n```\nSKAction.colorize(with: UIColor.red(),\
    \ colorBlendFactor: 0.5, duration: 1)\n```\n\n当在 `SKNode` 上运行此动作时，它会在 1 秒内以 0.5\
    \ 的混合因子混合红色。这类似于我们希望在 `playerNode` 与黑洞接触时对其应用的效果。请看修改后的 `didBeginContact` 方法的最后两行：\n\
    \n```\nextension GameScene: SKPhysicsContactDelegate {\n    func didBegin(_ contact:\
    \ SKPhysicsContact) {\n        let nodeB = contact.bodyB.node!\n        if nodeB.name\
    \ == \"POWER_UP_ORB\"  {\n            impulseCount += 1\n            nodeB.removeFromParent()\n\
    \        }\n        else if nodeB.name == \"BLACK_HOLE\"  {\n            playerNode.physicsBody?.contactTestBitMask\
    \ = 0\n            impulseCount = 0\n            let colorizeAction = SKAction.colorize(with:\
    \ UIColor.red, colorBlendFactor: 1.0, duration: 1)\n            playerNode.run(colorizeAction)\n\
    \        }\n    }\n}\n```\n\n这两行代码创建了一个着色动作，每当玩家撞上黑洞时，它会在 1 秒内将红色完全混合到 `playerNode`\
    \ 上。进行这些更改，然后再次运行应用。这次运行时，务必让玩家撞上黑洞。注意观察，当玩家撞上时，他会慢慢变红并坠落到行星表面——效果要好得多。\n"
- fmt: "# Summary\n\nIn this chapter, you refactored the orb node’s layout one last\
    \ time with the goal of enhancing playability. After that, you saw how to use\
    \ `SKActions` to move an `SKSpriteNode` back and forth across the scene and then\
    \ make that same node rotate forever. At the end of the chapter, you took a look\
    \ at how you can add colorizing effects to an `SKSpriteNode` using a colorize\
    \ action. In the next chapter, we focus on using particle emitters and how they\
    \ can be leveraged in Sprite Kit games. After that, we show you how they can be\
    \ used to add engine exhaust to the `playerNode` whenever an impulse is applied\
    \ to the `physicsBody`.\n\n# 6. Adding Particle Effects to Your Game with Emitter\
    \ Nodes\n\nIn this chapter, we show you how to define particle emitters and how\
    \ to leverage them in SpriteKit games. After that, we show you how you can use\
    \ them to add engine exhaust to the `playerNode` whenever an impulse is applied\
    \ to the `physicsBody`.\n\n**Note:** We cover only the properties that we’ll be\
    \ using in the SuperSpaceMan game. If you want to see the complete list of properties,\
    \ check out the Apple Developer docs at [https://developer.apple.com/library/ios/documentation/SpriteKit/Reference/SKEmitterNode_Ref/index.html](https://developer.apple.com/library/ios/documentation/SpriteKit/Reference/SKEmitterNode_Ref/index.html)\
    \ and [https://developer.apple.com/library/ios/documentation/IDEs/Conceptual/xcode_guide-particle_emitter/Introduction/Introduction.html](https://developer.apple.com/library/ios/documentation/IDEs/Conceptual/xcode_guide-particle_emitter/Introduction/Introduction.html).\n\
    \nParticle emitters are a really cool and easy-to-use feature provided by SpriteKit.\
    \ You can use them to create special effects that simulate anything from fire\
    \ to rain. SpriteKit implements these effects using the class `SKEmitterNode`.\
    \ An `SKEmitterNode` object is a node that creates and renders small particle\
    \ sprites. These sprites are owned by SpriteKit and are not directly accessible\
    \ by your game. You can’t modify the individual sprites yourself, but you can\
    \ modify the properties of the `SKEmitterNode` instance. You can create particle\
    \ emitters by hand, but it’s much easier to create a particle emitter using Xcode’s\
    \ built-in Particle Emitter Editor. The Particle Emitter Editor is a graphical\
    \ editor built into Xcode that provides a visual environment in which you can\
    \ design custom particle effects. Figure 6-1 shows Xcode’s Particle Emitter Editor.\n\
    \n![A330720_2_En_6_Fig1_HTML.jpg](OEBPS/A330720_2_En_6_Fig1_HTML.jpg)\n*Figure\
    \ 6-1. Xcode’s Particle Emitter Editor*\n\n## Using Particle Emitter Templates\n\
    \nIn addition to being able to create custom effects, the Particle Emitter Editor\
    \ offers a collection of prebuilt particle templates. These templates give you\
    \ a great starting point for creating your own custom effects. Table 6-1 describes\
    \ each of these templates.\n\n**Table 6-1.** Xcode’s Prepackaged Particle Emitter\
    \ Templates\n\n| Template Name | Use |\n| --- | --- |\n| Bokeh | This template\
    \ creates a hexagonal collection of particles that grow and blur and then fade\
    \ out at the end of their life cycles. |\n| Fire | This template creates a fire\
    \ effect that you might use as a torch or, just maybe, as the exhaust of a spaceman.\
    \ |\n| Fireflies | The Fireflies template creates a collection of yellow particles\
    \ that randomly move a short distance while growing and blurring and then fading\
    \ out at the end of their life cycles. |\n| Magic | The Magic template creates\
    \ a collection of green (by default) particles that also randomly move a short\
    \ distance while growing and blurring before fading out at the end of their life\
    \ cycles. |\n| Rain | The Rain template does just what you would think it would:\
    \ it creates a collection of particles that start at the top of the emitter and\
    \ move toward the bottom of the screen with the purpose of emulating a rain storm.\
    \ |\n| Smoke | The Smoke template creates several large black particles that start\
    \ at the bottom of the emitter and move toward the top of the screen. As each\
    \ particle moves toward the top of the screen, it slowly fades out. |\n| Snow\
    \ | The Snow template creates white, diffuse, round particles that start at the\
    \ top of the emitter and, like the Rain particles, move toward the bottom of the\
    \ screen. |\n| Spark | The Spark template creates short-lived, golden particles\
    \ that burst out of the emitter in all 360 degrees before fading out to nothing.\
    \ |\n\n## Creating a Particle Emitter\n\nLet’s start playing around with these\
    \ particle emitters. In Xcode, create a new iOS project, using the Game template.\
    \ Name it whatever you like and save the project wherever you like. This project\
    \ will be a “throwaway” project used only as a play area for your emitter experiments.\
    \ Once you have the project created, click **File** > **New** and choose **SpriteKit\
    \ Particle File** template from the iOS > Resource category, as shown in Figure\
    \ 6-2.\n\n![A330720_2_En_6_Fig2_HTML.jpg](OEBPS/A330720_2_En_6_Fig2_HTML.jpg)\n\
    *Figure 6-2. The Choose Template dialog*\n\nNow click the **Next** button and\
    \ select the **Spark** particle template, as shown in Figure 6-3.\n\n![A330720_2_En_6_Fig3_HTML.jpg](OEBPS/A330720_2_En_6_Fig3_HTML.jpg)\n\
    *Figure 6-3. The Choose File Options dialog*\n\nAfter making sure you have the\
    \ correct particle template selected, click **Next** again and name the file `MySparkParticle`.\
    \ Next, select the `MySparkParticle.sks` file. This time you’ll see an image similar\
    \ to Figure 6-4.\n\n![A330720_2_En_6_Fig4_HTML.jpg](OEBPS/A330720_2_En_6_Fig4_HTML.jpg)\n\
    *Figure 6-4. The generated spark particle emitter*\n\nWhat you’re seeing here\
    \ is a collection of many versions of the white smudge image, each representing\
    \ a single particle generated by this particle emitter. The reason each particle\
    \ looks so different from the `spark.png` file is because the emitter is modifying\
    \ each particle image according to the emitter’s property settings.\n\n## Particle\
    \ Emitter Properties\n\nTo see how these properties are being set, with the `MySparkParticle.sks`\
    \ file selected, open the Utilities pane on the right side of Xcode and click\
    \ the **Show the SKNode inspector** button. This will show each of the properties\
    \ of the current particle emitter. You can see these attributes in Figure 6-5.\n\
    \n![A330720_2_En_6_Fig5_HTML.jpg](OEBPS/A330720_2_En_6_Fig5_HTML.jpg)\n*Figure\
    \ 6-5. The SpriteKit particle emitter properties*\n\nEach of the properties in\
    \ this Particle Emitter Editor changes the way each of the particles is emitted.\
    \ Once you’ve modified each of the emitter properties you’re interested in, Xcode\
    \ saves the emitter properties in a SpriteKit particle file with the `.sks` extension.\
    \ The resulting file contains an archived `SKEmitterNode` object configured to\
    \ run the particle effects designed in the editor. When you want to use the particle\
    \ emitter in your game, you first get the path to the `.sks` file from `mainBundle`;\
    \ then you use this path to unarchive the `SKEmitterNode` object and add the node\
    \ to the scene or another `SKNode`:\n\n```swift\nlet pathToEmitter = \n    Bundle.main.path(forResource:\
    \ \"MySparkParticle\", ofType: \"sks\")\nlet emitter = \n    NSKeyedUnarchiver.unarchiveObject(withFile:\
    \ pathToEmitter!) as? SKEmitterNode\naddChild(emitter!)\n```\n\nThis is the most\
    \ common process of creating and adding particle emitters to your game. Let’s\
    \ take a look at the properties that will be used in the SuperSpaceMan game."
  raw: '## Summary


    In this chapter, you refactored the orb node’s layout one last time with the goal
    of enhancing playability. After that, you saw how to use SKActions to move an
    SKSpriteNode back and forth across the scene and then make that same node rotate
    forever. At the end of the chapter, you took a look at how you can add colorizing
    effects to an SKSpriteNode using a colorize action. In the next chapter, we focus
    on using particle emitters and how they can be leveraged in Sprite Kit games.
    After that, we show you how they can be used to add engine exhaust to the playerNode
    whenever an impulse is applied to the physicsBody.© James Goodwill and Wesley
    Matlock 2017 James Goodwill and Wesley MatlockBeginning Swift Games Development
    for iOS10.1007/978-1-4842-2310-9_6


    # 6. Adding Particle Effects to Your Game with Emitter Nodes


    James Goodwill^(1 ) and Wesley Matlock² (1) Highlands Ranch, Colorado, USA (2)
    Kansas City, Missouri, USA   In this chapter, we show you how to define particle
    emitters and how to leverage them in SpriteKit games. After that, we show you
    how you can use them to add engine exhaust to the playerNode whenever an impulse
    is applied to the physicsBody. Note We cover only the properties that we’ll be
    using in the SuperSpaceMan game. If you want to see the complete list of properties,
    check out the Apple Developer docs at [https://developer.apple.com/library/ios/documentation/SpriteKit/Reference/SKEmitterNode_Ref/index.html](https://developer.apple.com/library/ios/documentation/SpriteKit/Reference/SKEmitterNode_Ref/index.html)
    and [https://developer.apple.com/library/ios/documentation/IDEs/Conceptual/xcode_guide-particle_emitter/Introduction/Introduction.html](https://developer.apple.com/library/ios/documentation/IDEs/Conceptual/xcode_guide-particle_emitter/Introduction/Introduction.html)
    . Particle emitters are a really cool and easy-to-use feature provided by SpriteKit
    . You can use them to create special effects that simulate anything from fire
    to rain. SpriteKit implements these effects using the class SKEmitterNode. An
    SKEmitterNode object is a node that creates and renders small particle sprites.
    These sprites are owned by SpriteKit and are not directly accessible by your game.
    You can’t modify the individual sprites yourself, but you can modify the properties
    of the SKEmitterNode instance. You can create particle emitters by hand, but it’s
    much easier to create a particle emitter using Xcode’s built-in Particle Emitter
    Editor. The Particle Emitter Editor is a graphical editor built into Xcode that
    provides a visual environment in which you can design custom particle effects.
    Figure [6-1](#A330720_2_En_6_Chapter.html#Fig1) shows Xcode’s Particle Emitter
    Editor . ![A330720_2_En_6_Fig1_HTML.jpg](OEBPS/A330720_2_En_6_Fig1_HTML.jpg) Figure
    6-1. Xcode’s Particle Emitter Editor


    ## Using Particle Emitter Templates


    In addition to being able to create custom effects, the Particle Emitter Editor
    offers a collection of prebuilt particle templates. These templates give you a
    great starting point for creating your own custom effects. Table [6-1](#A330720_2_En_6_Chapter.html#Tab1)
    describes each of these templates. Table 6-1. Xcode’s Prepackaged Particle Emitter
    Templates


    | Template Name | Use |

    | --- | --- |

    | Bokeh | This template creates a hexagonal collection of particles that grow
    and blur and then fade out at the end of their life cycles. |

    | Fire | This template creates a fire effect that you might use as a torch or,
    just maybe, as the exhaust of a spaceman. |

    | Fireflies | The Fireflies template creates a collection of yellow particles
    that randomly move a short distance while growing and blurring and then fading
    out at the end of their life cycles. |

    | Magic | The Magic template creates a collection of green (by default) particles
    that also randomly move a short distance while growing and blurring before fading
    out at the end of their life cycles. |

    | Rain | The Rain template does just what you would think it would: it creates
    a collection of particles that start at the top of the emitter and move toward
    the bottom of the screen with the purpose of emulating a rain storm. |

    | Smoke | The Smoke template creates several large black particles that start
    at the bottom of the emitter and move toward the top of the screen. As each particle
    moves toward the top of the screen, it slowly fades out. |

    | Snow | The Snow template creates white, diffuse, round particles that start
    at the top of the emitter and, like the Rain particles, move toward the bottom
    of the screen. |

    | Spark | The Spark template creates short-lived, golden particles that burst
    out of the emitter in all 360 degrees before fading out to nothing . |


    ## Creating a Particle Emitter


    Let’s start playing around with these particle emitters. In Xcode, create a new
    iOS project, using the Game template. Name it whatever you like and save the project
    wherever you like. This project will be a “throwaway” project used only as a play
    area for your emitter experiments. Once you have the project created, click File
    ➤ New and choose SpriteKit Particle File template from the iOS ➤ Resource category,
    as shown in Figure [6-2](#A330720_2_En_6_Chapter.html#Fig2). ![A330720_2_En_6_Fig2_HTML.jpg](OEBPS/A330720_2_En_6_Fig2_HTML.jpg)
    Figure 6-2. The Choose Template dialog Now click the Next button and select the
    Spark particle template , as shown in Figure [6-3](#A330720_2_En_6_Chapter.html#Fig3).
    ![A330720_2_En_6_Fig3_HTML.jpg](OEBPS/A330720_2_En_6_Fig3_HTML.jpg) Figure 6-3.
    The Choose File Options dialog After making sure you have the correct particle
    template selected, click Next again and name the file MySparkParticle. Next, select
    the MySparkParticle.sks file. This time you’ll see an image similar to Figure
    [6-4](#A330720_2_En_6_Chapter.html#Fig4). ![A330720_2_En_6_Fig4_HTML.jpg](OEBPS/A330720_2_En_6_Fig4_HTML.jpg)
    Figure 6-4. The generated spark particle emitter What you’re seeing here is a
    collection of many versions of the white smudge image, each representing a single
    particle generated by this particle emitter. The reason each particle looks so
    different from the spark.png file is because the emitter is modifying each particle
    image according to the emitter’s property settings.


    ## Particle Emitter Properties


    To see how these properties are being set, with the MySparkParticle.sks file selected,
    open the Utilities pane on the right side of Xcode and click the Show the SKNode
    inspector button. This will show each of the properties of the current particle
    emitter. You can see these attributes in Figure [6-5](#A330720_2_En_6_Chapter.html#Fig5).
    ![A330720_2_En_6_Fig5_HTML.jpg](OEBPS/A330720_2_En_6_Fig5_HTML.jpg) Figure 6-5.
    The SpriteKit particle emitter properties Each of the properties in this Particle
    Emitter Editor changes the way each of the particles is emitted. Once you’ve modified
    each of the emitter properties you’re interested in, Xcode saves the emitter properties
    in a SpriteKit particle file with the .sks extension. The resulting file contains
    an archived SKEmitterNode object configured to run the particle effects designed
    in the editor. When you want to use the particle emitter in your game, you first
    get the path to the .sks file from mainBundle; then you use this path to unarchive
    the SKEmitterNode object and add the node to the scene or another SKNode: let
    pathToEmitter =     Bundle.main.path(forResource: "MySparkParticle", ofType: "sks")
    let emitter =     NSKeyedUnarchiver.unarchiveObject(withFile: pathToEmitter!)
    as? SKEmitterNode addChild(emitter!) This is the most common process of creating
    and adding particle emitters to your game. Let’s take a look at the properties
    that will be used in the SuperSpaceMan game.'
  trans: "\n# 小结\n\n在本章中，你为了增强可玩性，最后一次重构了轨道节点的布局。之后，你学习了如何使用 `SKActions` 让一个 `SKSpriteNode`\
    \ 在场景中来回移动，并让同一个节点永久旋转。在本章最后，你了解了如何通过颜色化动作（colorize action）为 `SKSpriteNode` 添加着色效果。下一章，我们将重点介绍如何在\
    \ Sprite Kit 游戏中使用粒子发射器并发挥其作用。接着，我们会展示如何利用它们，在每次向 `physicsBody` 施加冲量时，为 `playerNode`\
    \ 添加引擎尾焰效果。\n\n# 6. 使用发射器节点为游戏添加粒子效果\n\n在本章中，我们将展示如何定义粒子发射器以及如何在 SpriteKit 游戏中利用它们。接着，我们会展示如何利用它们，在每次向\
    \ `physicsBody` 施加冲量时，为 `playerNode` 添加引擎尾焰效果。\n\n**注意：** 我们仅介绍在 SuperSpaceMan\
    \ 游戏中会用到的属性。如果你想查看完整的属性列表，请查阅 Apple 开发者文档：[`developer.apple.com/library/ios/documentation/SpriteKit/Reference/SKEmitterNode_Ref/index.html`](https://developer.apple.com/library/ios/documentation/SpriteKit/Reference/SKEmitterNode_Ref/index.html)\
    \ 和 [`developer.apple.com/library/ios/documentation/IDEs/Conceptual/xcode_guide-particle_emitter/Introduction/Introduction.html`](https://developer.apple.com/library/ios/documentation/IDEs/Conceptual/xcode_guide-particle_emitter/Introduction/Introduction.html)。\n\
    \n粒子发射器是 SpriteKit 提供的一项非常酷且易于使用的功能。你可以用它们创建特效，模拟从火焰到雨水的各种效果。SpriteKit 通过 `SKEmitterNode`\
    \ 类实现这些效果。`SKEmitterNode` 对象是一个节点，用于创建和渲染微小的粒子精灵。这些精灵归 SpriteKit 所有，你的游戏无法直接访问。你无法单独修改每个精灵，但可以修改\
    \ `SKEmitterNode` 实例的属性。你可以手动创建粒子发射器，但使用 Xcode 内置的粒子发射器编辑器（Particle Emitter Editor）来创建要容易得多。粒子发射器编辑器是\
    \ Xcode 内置的一个图形化编辑器，提供了一个可视化环境，让你可以设计自定义粒子效果。图 6-1 展示了 Xcode 的粒子发射器编辑器。\n\n![A330720_2_En_6_Fig1_HTML.jpg](img/A330720_2_En_6_Fig1_HTML.jpg)\n\
    *图 6-1. Xcode 的粒子发射器编辑器*\n\n## 使用粒子发射器模板\n\n除了能够创建自定义效果之外，粒子发射器编辑器还提供了一系列预先构建的粒子模板。这些模板为你创建自己的自定义效果提供了绝佳的起点。表\
    \ 6-1 描述了每个模板。\n\n**表 6-1.** Xcode 预置的粒子发射器模板\n\n| 模板名称 | 用途 |\n| --- | --- |\n\
    | Bokeh（散景） | 此模板创建一个六边形粒子集合，粒子会生长、模糊，并在其生命周期结束时淡出。 |\n| Fire（火焰） | 此模板创建一个火焰效果，可用作火炬，或者，或许可以作为太空人的尾焰。\
    \ |\n| Fireflies（萤火虫） | 萤火虫模板创建一个黄色粒子集合，这些粒子在生长、模糊的同时会随机移动一小段距离，并在生命周期结束时淡出。 |\n\
    | Magic（魔法） | 魔法模板创建一个绿色（默认情况下）粒子集合，这些粒子在生长、模糊直至生命周期结束淡出之前，也会随机移动一小段距离。 |\n| Rain（雨）\
    \ | 雨模板的功能正如你所料：它创建一个粒子集合，从发射器顶部开始，向屏幕底部移动，旨在模拟一场暴风雨。 |\n| Smoke（烟雾） | 烟雾模板会创建多个大型黑色粒子，从发射器底部开始，向屏幕顶部移动。每个粒子在向屏幕顶部移动时，会慢慢淡出。\
    \ |\n| Snow（雪） | 雪模板创建白色、漫射、圆形的粒子，从发射器顶部开始，像雨粒子一样向屏幕底部移动。 |\n| Spark（火花） | 火花模板创建短暂存在的金色粒子，它们会向四面八方（360\
    \ 度）从发射器中爆射出来，然后逐渐消失。 |\n\n## 创建粒子发射器\n\n让我们开始尝试使用这些粒子发射器。在 Xcode 中，使用 Game 模板创建一个新的\
    \ iOS 项目。随意命名，并将项目保存到任意位置。这个项目将是一个“一次性”项目，仅用作你进行发射器实验的游乐场。项目创建完成后，点击 **File**\
    \ > **New**，然后从 iOS > Resource 类别中选择 **SpriteKit Particle File** 模板，如图 6-2 所示。\n\
    \n![A330720_2_En_6_Fig2_HTML.jpg](img/A330720_2_En_6_Fig2_HTML.jpg)\n*图 6-2. 选择模板对话框*\n\
    \n现在点击 **Next** 按钮，并选择 **Spark** 粒子模板，如图 6-3 所示。\n\n![A330720_2_En_6_Fig3_HTML.jpg](img/A330720_2_En_6_Fig3_HTML.jpg)\n\
    *图 6-3. 选择文件选项对话框*\n\n确保选择了正确的粒子模板后，再次点击 **Next**，并将文件命名为 `MySparkParticle`。接着，选择\
    \ `MySparkParticle.sks` 文件。这次你将看到类似于图 6-4 的图像。\n\n![A330720_2_En_6_Fig4_HTML.jpg](img/A330720_2_En_6_Fig4_HTML.jpg)\n\
    *图 6-4. 生成的火花粒子发射器*\n\n你在这里看到的是白点图像（`spark.png`）的众多版本集合，每个版本代表该粒子发射器生成的单个粒子。每个粒子看起来与\
    \ `spark.png` 文件差异如此之大的原因是，发射器根据其属性设置修改了每个粒子图像。\n\n## 粒子发射器属性\n\n要查看这些属性是如何设置的，在选中\
    \ `MySparkParticle.sks` 文件的情况下，打开 Xcode 右侧的实用工具面板（Utilities pane），然后点击 **Show\
    \ the SKNode inspector** 按钮。这将显示当前粒子发射器的每个属性。你可以在图 6-5 中看到这些属性。\n\n![A330720_2_En_6_Fig5_HTML.jpg](img/A330720_2_En_6_Fig5_HTML.jpg)\n\
    *图 6-5. SpriteKit 粒子发射器属性*\n\n粒子发射器编辑器中的每个属性都会改变每个粒子的发射方式。一旦你修改了感兴趣的每个发射器属性，Xcode\
    \ 就会将发射器属性保存到一个扩展名为 `.sks` 的 SpriteKit 粒子文件中。生成的文件包含一个归档的 `SKEmitterNode` 对象，该对象被配置为运行在编辑器中设计的粒子效果。当你想在游戏中使用该粒子发射器时，首先从\
    \ `mainBundle` 中获取 `.sks` 文件的路径；然后使用这个路径来解档 `SKEmitterNode` 对象，并将该节点添加到场景或其他 `SKNode`\
    \ 中：\n\n```swift\nlet pathToEmitter = \n    Bundle.main.path(forResource: \"MySparkParticle\"\
    , ofType: \"sks\")\nlet emitter = \n    NSKeyedUnarchiver.unarchiveObject(withFile:\
    \ pathToEmitter!) as? SKEmitterNode\naddChild(emitter!)\n```\n\n这是创建粒子发射器并将其添加到游戏中最常见的过程。让我们来看看\
    \ SuperSpaceMan 游戏中会使用到的属性。\n"
- fmt: "### The Particle Life-Cycle Properties\n\nThe particle life-cycle properties\
    \ determine how many particles are created, the maximum number of particles that\
    \ can be created, and the lifetime of each of the created particles. There are\
    \ four properties that control the life cycle of a particle, as shown in Figure\
    \ [6-6](#A330720_2_En_6_Chapter.html#Fig6).  \n![A330720_2_En_6_Fig6_HTML.jpg](OEBPS/A330720_2_En_6_Fig6_HTML.jpg)\
    \  \nFigure 6-6. The SpriteKit particle life-cycle properties\n\n#### The Emitter\
    \ Birthrate and Maximum Properties\n\nThe first two life-cycle properties are\
    \ the Emitter `Birthrate` and `Maximum` properties. The `Birthrate` property defines\
    \ the rate at which new particles are emitted per second. The higher the value,\
    \ the faster new particles are generated. The `Maximum` particle life-cycle property\
    \ determines the total number of particles to be emitted by the emitter. A value\
    \ of `0` causes particles to be emitted indefinitely. Any other value will cause\
    \ the emitter to stop emitting when that value is reached. To see how these two\
    \ properties work together, go back to the SpriteKit Particle Emitter properties\
    \ editor in Xcode and change the `Birthrate` property to `20` and the `Maximum`\
    \ property to `0`. Watch what happens—the emitter generates `20` particles per\
    \ second. Now leave the `Birthrate` property at `20`, change the `Maximum` property\
    \ to `20`, and check out how the emitter changes. This time the emitter will emit\
    \ `20` particles over `1` second and then stop for `1` second and then emit another\
    \ `20` particles. It will repeat this process forever. When you have finished\
    \ playing around with these two properties, change the `Birthrate` property back\
    \ to `2000` and the `Maximum` property back to `0`.\n\n### The Lifetime Start\
    \ and Range Properties\n\nThe next two particle life-cycle properties are the\
    \ `Start` and `Range` properties. These properties control the lifetime of the\
    \ emitted particles. The `Start` property controls the average length of time\
    \ in seconds that a particle is visible. When the time elapses, the particle fades\
    \ away. The `Range` property provides a method of varying the time a particle\
    \ is on the screen. When you set this property to any number other than `0`, then\
    \ a random number between `0` and the entered number is generated. Half of that\
    \ number is then randomly added or subtracted to the `Start` value to produce\
    \ the final lifetime of the particle. If you enter `0`, then all particles will\
    \ stay visible for the same amount of time.\n\n### The Particle Movement Properties\n\
    \nThere are five sets of properties that affect the movement of particles being\
    \ emitted, as shown in Figure [6-7](#A330720_2_En_6_Chapter.html#Fig7) and described\
    \ in the following sections.  \n![A330720_2_En_6_Fig7_HTML.jpg](OEBPS/A330720_2_En_6_Fig7_HTML.jpg)\
    \  \nFigure 6-7. The SpriteKit particle movement properties\n\n#### The Position\
    \ Range Property\n\nThe `Position Range` property defines the area in which the\
    \ emitted particles are created. The particles are created within a rectangle\
    \ defined by the `Position Range` property’s X and Y values. To see how this works,\
    \ go back to the `MySparkParticle.sks` file and change the `Position Range` property’s\
    \ X value to `300` and the Y value to `300` and watch how this affects the emission\
    \ of the particles. You will now see the particles being emitted in a `300×300`\
    \ box. Play around with these properties until you are comfortable with how they\
    \ work.\n\n#### The Z-position Property\n\nThe `Z-position` property controls\
    \ the particle’s average starting depth along the z-axis. You can think of this\
    \ property as controlling how near or far the particle will be placed from the\
    \ viewport.\n\n#### The Angle Property\n\nThe next particle movement property\
    \ is the `Angle` property. The `Angle` property defines the angle at which particles\
    \ travel away from the creation point in counterclockwise degrees. There are two\
    \ `Angle` values: `Start` and `Range`. The `Start` value defines the direction,\
    \ in degrees, that a particle is emitted, and the `Range` value defines the number\
    \ of degrees, plus or minus half of the number value, that the particle’s initial\
    \ angle varies. This all sounds complicated, so let’s play around with these values\
    \ and see what happens. If you look at the initial value of the spark emitter’s\
    \ `Angle` property, you’ll see that it’s roughly `90` degrees, and the `Range`\
    \ property is set to roughly `360` degrees. The easiest way to see how these values\
    \ affect particle emission is to set both the `Start` and `Range` values. Currently,\
    \ `Range` is set to `360` degrees, which says the particle emission range is a\
    \ complete circle. Reduce the `Range` value to `90` degrees, set the `Start` value\
    \ to `0` degrees, and see what happens. You’ll now see that the particles start\
    \ out being emitted to the right of the screen and spread out to roughly `45`\
    \ degrees above and below their initial emission point. Now increase the `Start`\
    \ value to `90` degrees. Notice how the particles are now beginning their life\
    \ being emitted straight up. Increase the `Start` value by another `90` degrees,\
    \ making it `180` degrees. This time the particles are being emitted to the left\
    \ side of the screen. After playing around with these values, you will see that\
    \ the `Start` value goes from `0` to `360` degrees counterclockwise around the\
    \ center of the emission point and spreading out from the `Start` value by half\
    \ the value of the `Range` value.\n\n#### The Speed Property\n\nThe `Speed` property\
    \ is pretty straightforward. It defines the initial speed a particle moves at\
    \ creation. You specify the initial speed using the `Start` value, and then you\
    \ can use the `Range` value to adjust the initial speed for a particle, plus or\
    \ minus half the `Range` value. Setting the `Range` value to `0` means that all\
    \ particles travel at the same speed.\n\n#### The Acceleration Property\n\nThe\
    \ final particle movement property is the `Acceleration` property. The `Acceleration`\
    \ property controls the degree to which a particle accelerates or decelerates\
    \ after emission in terms of both X and Y directions. You use the X value to apply\
    \ acceleration along the x-axis and use the Y value to apply acceleration along\
    \ the y-axis. It’s common to use the `Acceleration` property to simulate a gravity\
    \ effect. The easiest way to see how this works is to change all the emitter properties\
    \ so they match the values in Figure [6-8](#A330720_2_En_6_Chapter.html#Fig8).\
    \  \n![A330720_2_En_6_Fig8_HTML.jpg](OEBPS/A330720_2_En_6_Fig8_HTML.jpg)  \nFigure\
    \ 6-8. The modified particle emitter properties  \nIf you don’t see a property\
    \ in this figure, then you don’t have to worry about changing it. After you’ve\
    \ made these changes, you’ll see a single particle moving straight up along the\
    \ y-axis. The reason the particle is going straight up is because all of the acceleration\
    \ is along the y-axis. Change the X value for the `Acceleration` property to `500`\
    \ and see what happens. The particle now moves up the y-axis and to the right\
    \ along the x-axis. Next, change the X value for the `Acceleration` property to\
    \ `–500`. You’ll now see that the particle is again moving up along the y-axis,\
    \ but this time it’s moving left along the x-axis. That’s because you applied\
    \ a negative X acceleration.\n\n## Adding an Exhaust Trail to the Player\n\nIt’s\
    \ now time to put this new knowledge to use. Let’s add an exhaust trail to the\
    \ `playerNode` using a particle emitter. To do that, you need to switch back to\
    \ the `SuperSpaceMan` project and add a new particle emitter to the project. You’ve\
    \ seen this process previously, but here are the abbreviated steps:\n\n1. Add\
    \ a new SpriteKit particle file by selecting the **File ➤ New File** menu and\
    \ choose **SpriteKit Particle File** template from the **iOS ➤ Resource** category.\
    \  \n2. Select **Fire** as the particle template and click the **Next** button.\
    \  \n3. Name the particle emitter `EngineExhaust` and click the **Create** button."
  raw: '### The Particle Life-Cycle Properties


    The particle life-cycle properties determine how many particles are created, the
    maximum number of particles that can be created, and the lifetime of each of the
    created particles. There are four properties that control the life cycle of a
    particle, as shown in Figure [6-6](#A330720_2_En_6_Chapter.html#Fig6). ![A330720_2_En_6_Fig6_HTML.jpg](OEBPS/A330720_2_En_6_Fig6_HTML.jpg)
    Figure 6-6. The SpriteKit particle life-cycle properties


    #### The Emitter Birthrate and Maximum Properties


    The first two life-cycle properties are the Emitter Birthrate and Maximum properties
    . The Birthrate property defines the rate at which new particles are emitted per
    second. The higher the value, the faster new particles are generated. The Maximum
    particle life-cycle property determines the total number of particles to be emitted
    by the emitter. A value of 0 causes particles to be emitted indefinitely. Any
    other value will cause the emitter to stop emitting when that value is reached.
    To see how these two properties work together, go back to the SpriteKit Particle
    Emitter properties editor in Xcode and change the Birthrate property to 20 and
    the Maximum property to 0\. Watch what happens—the emitter generates 20 particles
    per second. Now leave the Birthrate property at 20, change the Maximum property
    to 20, and check out how the emitter changes. This time the emitter will emit
    20 particles over 1 second and then stop for 1 second and then emit another 20
    particles. It will repeat this process forever. When you have finished playing
    around with these two properties, change the Birthrate property back to 2000 and
    the Maximum property back to 0.


    ### The Lifetime Start and Range Properties


    The next two particle life-cycle properties are the Start and Range properties.
    These properties control the lifetime of the emitted particles. The Start property
    controls the average length of time in seconds that a particle is visible. When
    the time elapses, the particle fades away. The Range property provides a method
    of varying the time a particle is on the screen. When you set this property to
    any number other than 0, then a random number between 0 and the entered number
    is generated. Half of that number is then randomly added or subtracted to the
    Start value to produce the final lifetime of the particle. If you enter 0, then
    all particles will stay visible for the same amount of time.


    ### The Particle Movement Properties


    There are five sets of properties that affect the movement of particles being
    emitted, as shown in Figure [6-7](#A330720_2_En_6_Chapter.html#Fig7) and described
    in the following sections. ![A330720_2_En_6_Fig7_HTML.jpg](OEBPS/A330720_2_En_6_Fig7_HTML.jpg)
    Figure 6-7. The SpriteKit particle movement properties


    #### The Position Range Property


    The Position Range property defines the area in which the emitted particles are
    created. The particles are created within a rectangle defined by the Position
    Range property’s X and Y values. To see how this works, go back to the MySparkParticle.sks
    file and change the Position Range property’s X value to 300 and the Y value to
    300 and watch how this affects the emission of the particles. You will now see
    the particles being emitted in a 300×300 box. Play around with these properties
    until you are comfortable with how they work.


    #### The Z-position Property


    The Z-position property controls the particle’s average starting depth along the
    z-axis. You can think of this property as controlling how near or far the particle
    will be placed from the viewport.


    #### The Angle Property


    The next particle movement property is the Angle property. The Angle property
    defines the angle at which particles travel away from the creation point in counterclockwise
    degrees. There are two Angle values: Start and Range. The Start value defines
    the direction, in degrees, that a particle is emitted, and the Range value defines
    the number of degrees, plus or minus half of the number value, that the particle’s
    initial angle varies. This all sounds complicated, so let’s play around with these
    values and see what happens. If you look at the initial value of the spark emitter’s
    Angle property , you’ll see that it’s roughly 90 degrees, and the Range property
    is set to roughly 360 degrees. The easiest way to see how these values affect
    particle emission is to set both the Start and Range values. Currently, Range
    is set to 360 degrees, which says the particle emission range is a complete circle.
    Reduce the Range value to 90 degrees, set the Start value to 0 degrees, and see
    what happens. You’ll now see that the particles start out being emitted to the
    right of the screen and spread out to roughly 45 degrees above and below their
    initial emission point. Now increase the Start value to 90 degrees. Notice how
    the particles are now beginning their life being emitted straight up. Increase
    the Start value by another 90 degrees, making it 180 degrees. This time the particles
    are being emitted to the left side of the screen. After playing around with these
    values, you will see that the Start value goes from 0 to 360 degrees counterclockwise
    around the center of the emission point and spreading out from the Start value
    by half the value of the Range value.


    #### The Speed Property


    The Speed property is pretty straightforward. It defines the initial speed a particle
    moves at creation. You specify the initial speed using the Start value, and then
    you can use the Range value to adjust the initial speed for a particle, plus or
    minus half the Range value. Setting the Range value to 0 means that all particles
    travel at the same speed.


    #### The Acceleration Property


    The final particle movement property is the Acceleration property. The Acceleration
    property controls the degree to which a particle accelerates or decelerates after
    emission in terms of both X and Y directions. You use the X value to apply acceleration
    along the x-axis and use the Y value to apply acceleration along the y-axis. It’s
    common to use the Acceleration property to simulate a gravity effect. The easiest
    way to see how this works is to change all the emitter properties so they match
    the values in Figure [6-8](#A330720_2_En_6_Chapter.html#Fig8). ![A330720_2_En_6_Fig8_HTML.jpg](OEBPS/A330720_2_En_6_Fig8_HTML.jpg)
    Figure 6-8. The modified particle emitter properties If you don’t see a property
    in this figure, then you don’t have to worry about changing it. After you’ve made
    these changes, you’ll see a single particle moving straight up along the y-axis.
    The reason the particle is going straight up is because all of the acceleration
    is along the y-axis. Change the X value for the Acceleration property to 500 and
    see what happens. The particle now moves up the y-axis and to the right along
    the x-axis . Next, change the X value for the Acceleration property to –500\.
    You’ll now see that the particle is again moving up along the y-axis, but this
    time it’s moving left along the x-axis. That’s because you applied a negative
    X acceleration.


    ## Adding an Exhaust Trail to the Player


    It’s now time to put this new knowledge to use. Let’s add an exhaust trail to
    the playerNode using a particle emitter. To do that, you need to switch back to
    the SuperSpaceMan project and add a new particle emitter to the project. You’ve
    seen this process previously, but here are the abbreviated steps:


    1.  1. Add a new SpriteKit particle file by selecting the File ➤ New File Menu
    and choose SpriteKit Particle File template from the iOS ➤ Resource category.
     

    2.  2. Select Fire as the particle template and click the Next button.  

    3.  3. Name the particle emitter EngineExhaust and click the Create button.'
  trans: "\n### 粒子生命周期属性\n\n粒子生命周期属性决定了创建粒子的数量、可创建粒子的最大数量以及每个已创建粒子的存在时间。共有四个属性控制粒子的生命周期，如图\
    \ 6-6 所示。  \n![A330720_2_En_6_Fig6_HTML.jpg](img/A330720_2_En_6_Fig6_HTML.jpg)\
    \  \n图 6-6. SpriteKit 粒子生命周期属性\n\n#### 发射器出生速率与最大粒子数属性\n\n前两个生命周期属性是发射器的 `Birthrate`（出生速率）和\
    \ `Maximum`（最大粒子数）属性。`Birthrate` 属性定义了每秒发射新粒子的速率。该值越高，生成新粒子的速度越快。`Maximum` 粒子生命周期属性决定了发射器要发射的粒子总数。值为\
    \ `0` 时，粒子会无限期发射。任何其他值都会导致发射器在达到该数值时停止发射。要查看这两个属性如何协同工作，请返回 Xcode 中的 SpriteKit\
    \ 粒子发射器属性编辑器，将 `Birthrate` 属性改为 `20`，将 `Maximum` 属性改为 `0`。观察发生了什么——发射器每秒生成 `20`\
    \ 个粒子。现在保持 `Birthrate` 属性为 `20`，将 `Maximum` 属性改为 `20`，并查看发射器如何变化。这一次，发射器将在 `1`\
    \ 秒内发射 `20` 个粒子，然后停止 `1` 秒，接着再发射 `20` 个粒子。它将永远重复这个过程。当你完成对这两个属性的调试后，请将 `Birthrate`\
    \ 属性改回 `2000`，并将 `Maximum` 属性改回 `0`。\n\n### 生命周期起始值与范围属性\n\n接下来的两个粒子生命周期属性是 `Start`（起始值）和\
    \ `Range`（范围）属性。这些属性控制已发射粒子的存在时间。`Start` 属性控制粒子可见的平均时长（以秒为单位）。时间一到，粒子就会逐渐消失。`Range`\
    \ 属性提供了一种改变粒子在屏幕上存在时间的方法。当你将此属性设置为除 `0` 以外的任何数字时，系统会生成一个介于 `0` 和输入数字之间的随机数。然后，该数字的一半会随机地加到\
    \ `Start` 值上或从其中减去，从而得出粒子的最终存在时间。如果你输入 `0`，那么所有粒子的可见时间都将相同。\n\n### 粒子运动属性\n\n\
    有五组属性会影响所发射粒子的运动，如图 6-7 所示，并在以下章节中说明。  \n![A330720_2_En_6_Fig7_HTML.jpg](img/A330720_2_En_6_Fig7_HTML.jpg)\
    \  \n图 6-7. SpriteKit 粒子运动属性\n\n#### 位置范围属性\n\n`Position Range`（位置范围）属性定义了创建发射粒子的区域。粒子是在由\
    \ `Position Range` 属性的 X 和 Y 值定义的矩形内创建的。要了解其工作原理，请返回 `MySparkParticle.sks` 文件，将\
    \ `Position Range` 属性的 X 值改为 `300`，Y 值改为 `300`，并观察这对粒子发射的影响。你现在会看到粒子在一个 `300×300`\
    \ 的方框内发射。请自行调试这些属性，直到熟悉它们的工作方式为止。\n\n#### Z 位置属性\n\n`Z-position`（Z 位置）属性控制粒子沿\
    \ z 轴的平均起始深度。你可以将这个属性理解为控制粒子放置位置离视口的远近。\n\n#### 角度属性\n\n下一个粒子运动属性是 `Angle`（角度）属性。`Angle`\
    \ 属性定义了粒子从创建点以逆时针方向运动的角度。有两个 `Angle` 值：`Start`（起始值）和 `Range`（范围值）。`Start` 值定义了粒子发射的方向（以度为单位），而\
    \ `Range` 值定义了粒子初始角度的变化范围（数值的正负一半）。这听起来很复杂，所以让我们实际调试这些值，看看会发生什么。如果你查看火花发射器 `Angle`\
    \ 属性的初始值，你会发现它大约是 `90` 度，而 `Range` 属性大约设置为 `360` 度。要了解这些值如何影响粒子发射，最简单的方法是同时设置\
    \ `Start` 和 `Range` 值。目前，`Range` 设置为 `360` 度，这意味着粒子发射范围是一个完整的圆。将 `Range` 值减小到\
    \ `90` 度，将 `Start` 值设置为 `0` 度，看看会发生什么。你将看到粒子开始向屏幕右侧发射，并大致分散到初始发射点上下 `45` 度范围内。现在将\
    \ `Start` 值增加到 `90` 度。注意粒子现在是如何开始垂直向上发射的。再将 `Start` 值增加 `90` 度，使其成为 `180` 度。这次粒子向屏幕左侧发射。调试这些值之后，你会发现\
    \ `Start` 值从 `0` 度开始，围绕发射点中心逆时针旋转到 `360` 度，并从 `Start` 值开始，以 `Range` 值的一半向外扩散。\n\
    \n#### 速度属性\n\n`Speed`（速度）属性相当直接。它定义了粒子在创建时的初始运动速度。你可以使用 `Start` 值指定初始速度，然后可以使用\
    \ `Range` 值来调整粒子的初始速度（数值的正负一半）。将 `Range` 值设置为 `0` 意味着所有粒子以相同速度运动。\n\n#### 加速度属性\n\
    \n最后一个粒子运动属性是 `Acceleration`（加速度）属性。`Acceleration` 属性控制粒子在发射后沿 X 和 Y 方向加速或减速的程度。你使用\
    \ X 值来沿 x 轴施加加速度，使用 Y 值来沿 y 轴施加加速度。通常使用 `Acceleration` 属性来模拟重力效果。要了解其工作原理，最简单的方法是将所有发射器属性更改为与图\
    \ 6-8 中的值相匹配。  \n![A330720_2_En_6_Fig8_HTML.jpg](img/A330720_2_En_6_Fig8_HTML.jpg)\
    \  \n图 6-8. 修改后的粒子发射器属性  \n如果图中未显示某个属性，则无需更改。完成这些更改后，你将看到一个粒子沿 y 轴垂直向上运动。粒子垂直向上的原因是所有加速度都沿\
    \ y 轴方向。将 `Acceleration` 属性的 X 值改为 `500`，看看会发生什么。粒子现在会沿 y 轴向上移动，同时沿 x 轴向右移动。接下来，将\
    \ `Acceleration` 属性的 X 值改为 `–500`。你将看到粒子再次沿 y 轴向上移动，但这次它沿 x 轴向左移动。这是因为你应用了负的 X\
    \ 方向加速度。\n\n## 为玩家添加尾迹\n\n现在是时候将这一新知识付诸实践了。让我们使用粒子发射器为 `playerNode` 添加一个尾迹。为此，你需要切换回\
    \ `SuperSpaceMan` 项目，并向项目添加一个新的粒子发射器。你之前已经看到过这个过程，但这里给出简化的步骤：\n\n1.  选择 **File\
    \ ➤ New File** 菜单，并从 **iOS ➤ Resource** 类别中选择 **SpriteKit Particle File** 模板，以添加一个新的\
    \ SpriteKit 粒子文件。  \n2.  选择 **Fire** 作为粒子模板，并点击 **Next** 按钮。  \n3.  将粒子发射器命名为\
    \ `EngineExhaust`，然后点击 **Create** 按钮。\n"
- fmt: "Once you’ve completed these steps, select the newly created `EngineExhaust.sks`\
    \ file. You’ll see an image similar to Figure [6-9](#A330720_2_En_6_Chapter.html#Fig9).\
    \ ![A330720_2_En_6_Fig9_HTML.jpg](OEBPS/A330720_2_En_6_Fig9_HTML.jpg) Figure 6-9.\
    \ The default fire particle emitter This looks really good, but to emulate exhaust\
    \ emitting from the spaceman as he flies up the scene, the angle of the emitting\
    \ fire needs to be rotated by 180 degrees. To make this happen, change the `Start`\
    \ value for the `Angle` property to 270 degrees, and to resize the emitted flame’s\
    \ width, reduce the `Position Range`’s `X` value to 23. Figure [6-10](#A330720_2_En_6_Chapter.html#Fig10)\
    \ shows these changes. ![A330720_2_En_6_Fig10_HTML.jpg](OEBPS/A330720_2_En_6_Fig10_HTML.jpg)\
    \ Figure 6-10. The inverted fire particle emitter property changes Once you’ve\
    \ made these changes, you’ll see that the fire is now being emitted toward the\
    \ bottom of the screen, and the width of the flame has been reduced. This looks\
    \ much better, but we think it would look even better if the flames were a little\
    \ subtler. The easiest way to make this happen is to reduce the `Birthrate` value\
    \ of the particles being emitted. Do that by reducing the particle `Birthrate`\
    \ value to 100, as shown in Figure [6-11](#A330720_2_En_6_Chapter.html#Fig11).\
    \ ![A330720_2_En_6_Fig11_HTML.jpg](OEBPS/A330720_2_En_6_Fig11_HTML.jpg) Figure\
    \ 6-11. The reduced particle `Birthrate` value changes Awesome. Save your changes,\
    \ and let’s take a look at the new particle emitter shown in Figure [6-12](#A330720_2_En_6_Chapter.html#Fig12).\
    \ ![A330720_2_En_6_Fig12_HTML.jpg](OEBPS/A330720_2_En_6_Fig12_HTML.jpg) Figure\
    \ 6-12. The final particle emitter This is exactly what was needed. The fire is\
    \ being emitted in the correct direction, and the size and `Birthrate` values\
    \ will fit nicely attached to the `playerNode`. Let’s start using the new emitter.\
    \ If you remember from the previous sections, once you have the emitter looking\
    \ like you want it to, it’s really easy to add to your scene. The first thing\
    \ you need to do is load the `SKEmitterNode` using your new `SKS` file. This is\
    \ pretty simple and can be accomplished by first adding a new `SKEmitterNode`\
    \ named `engineExhaust` right before the first `GameScene.init()` method. This\
    \ declaration is shown here:\n\n```\nvar engineExhaust: SKEmitterNode?\n```\n\n\
    After you make this change, add the following lines of code to the bottom of the\
    \ second `GameScene.init()` method:\n\n```\nlet engineExhaustPath = Bundle.main.path(forResource:\
    \ \"EngineExhaust\", ofType: \"sks\")\nengineExhaust = NSKeyedUnarchiver.unarchiveObject(withFile:\
    \ engineExhaustPath!) as? SKEmitterNode\nengineExhaust?.position = CGPoint(x:\
    \ 0.0, y: -(playerNode.size.height / 2))\n```\n\nYou’ve seen these lines before,\
    \ with the exception of the last line. That line sets the position of the emitter\
    \ to a point at (`0.0`, `-(self.playerNode.size.height / 2)`). We’re using this\
    \ point because the emitter will need to be added to the `playerNode`, and the\
    \ `playerNode`’s anchor point is the middle of the player. Using the negative\
    \ value of half the size of the `playerNode` will place the emitter at the bottom\
    \ of the `playerNode`. OK, so far you have the emitter node loaded, and you’re\
    \ ready to add it the `playerNode`. You can do that with the following two lines:\n\
    \n```\nplayerNode.addChild(engineExhaust!)\nengineExhaust?.isHidden = true\n```\n\
    \nAs you look over this change, you’ll see that the code is pretty straightforward.\
    \ First the `engineExhaust` emitter node is added to the `playerNode`, and then\
    \ the exhaust is hidden. We’re hiding the exhaust here because we want the exhaust\
    \ emitter to be visible only when the player of the game taps the screen. Add\
    \ this code right after the line that sets the position of the `engineExhaust`\
    \ node. There’s one more thing you need to do, which is make the `engineExhaust`\
    \ visible when the user taps the screen. To do that, add the following line of\
    \ code to the end of the second `if` statement in the `touchesBegan()` method\
    \ and run the game again:\n\n```\nengineExhaust?.isHidden = false\n```\n\nNotice\
    \ that when you tap the screen this time, not only does the spaceman fly up through\
    \ the scene, this time there’s an exhaust stream coming out of the bottom of the\
    \ `playerNode`. This looks great, but there’s one problem. Even when you’re no\
    \ longer tapping the screen, the exhaust emitter is still visible. The emitter\
    \ should be removed after a moment so that it emulates a quick burst of force\
    \ that goes away after a short period of time. This problem can be fixed easily\
    \ enough with an `NSTimer`. To fix this problem, you need to modify the `touchesBegan()`\
    \ method to start a timer each time the screen is tapped and an impulse is applied.\
    \ The modified `if` statement is shown here:\n\n```\nif impulseCount > 0 {\n \
    \   playerNode.physicsBody?.applyImpulse(CGVector(dx: 0.0, dy: 40.0))\n    impulseCount\
    \ -= 1\n    engineExhaust?.isHidden = false\n    Timer.scheduledTimer(timeInterval:\
    \ 0.5,\n        target: self,\n        selector: #selector(GameScene.hideEngineExaust(_:)),\n\
    \        userInfo: nil,\n        repeats: false)\n}\n```\n\nAs you look over these\
    \ changes, you’ll notice that at the end of the `if` statement a new timer is\
    \ created that will run the `hideEngineExhaust()` method half a second after the\
    \ timer is scheduled. The `hideEngineExhaust()` method that will be invoked is\
    \ shown here:\n\n```\nfunc hideEngineExaust(_ timer:Timer!) {\n    if !engineExhaust!.isHidden\
    \ {\n        engineExhaust?.isHidden = true\n    }\n}\n```\n\nExamining the `hideEngineExhaust()`\
    \ method, you’ll see that it does exactly what it sounds like it will do. It first\
    \ checks to see whether the `engineExhaust` is visible and hides it if it is.\
    \ Make these changes to the `touchesBegan()` method and add the `hideEngineExhaust()`\
    \ method to the bottom of the `GameScene`. Once you’ve made these changes, run\
    \ the app again. This time you’ll notice the exhaust is added to the `playerNode`\
    \ each time you tap the screen and will be removed from the `playerNode` half\
    \ a second after the last tap. This looks much better. Before closing out this\
    \ chapter, make sure the final `touchesBegan()` method looks like the following:\n\
    \n```\noverride func touchesBegan(_ touches: Set<UITouch>, with event: UIEvent?)\
    \ {\n    if !playerNode.physicsBody!.isDynamic {\n        playerNode.physicsBody?.isDynamic\
    \ = true\n        coreMotionManager.accelerometerUpdateInterval = 0.3\n      \
    \  coreMotionManager.startAccelerometerUpdates()\n    }\n    if impulseCount >\
    \ 0 {\n        playerNode.physicsBody?.applyImpulse(CGVector(dx: 0.0, dy: 40.0))\n\
    \        impulseCount -= 1\n        engineExhaust!.isHidden = false\n    Timer.scheduledTimer(timeInterval:\
    \ 0.5,\n        target: self,\n        selector: #selector(GameScene.hideEngineExaust(_:)),\n\
    \        userInfo: nil,\n        repeats: false)\n    }\n}\n```\n\n## Summary\n\
    \nIn this chapter, we briefly introduced you to particle emitters, including taking\
    \ a quick look at some of Xcode’s template emitters. After that, we showed you\
    \ how to add a particle emitter to the `playerNode` so that you can emulate engine\
    \ exhaust whenever an impulse is applied to the `physicsBody`. In Chapter [7](#A330720_2_En_7_Chapter.html),\
    \ you’ll get your first look at SpriteKit’s `SKTextNode` when we show you how\
    \ to add scoring to the SuperSpaceMan game. After that, you’ll get a look at another\
    \ use for `SKAction` when you add sound to the SuperSpaceMan game.© James Goodwill\
    \ and Wesley Matlock 2017 James Goodwill and Wesley MatlockBeginning Swift Games\
    \ Development for iOS10.1007/978-1-4842-2310-9_7\n\n# 7. Adding Points and Sound\n\
    \nJames Goodwill^(1 ) and Wesley Matlock² (1) Highlands Ranch, Colorado, USA (2)\
    \ Kansas City, Missouri, USA   In this chapter, we talk about using `SKLabelNode`s\
    \ to add labels to your SpriteKit games. Specifically, we show you how to add\
    \ a label that keeps up with the number of impulses remaining for the SuperSpaceMan\
    \ to use, and then we show you how to add scoring to the game to keep up with\
    \ the number of orbs the SuperSpaceMan has collected. At the end of the chapter,\
    \ you’ll get a chance to revisit `SKAction`s when we show you how to use them\
    \ to add simple game sounds."
