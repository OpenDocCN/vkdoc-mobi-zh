    # SKScene 渲染循环


    在本节中，我们将介绍 `SKView` 展示 `SKScene` 后所发生的一切。在更传统的 iOS 应用程序中，你只需要渲染视图内容一次，然后它就会保持静态，直到视图所呈现的模型发生变化。这对商业应用来说没问题，但游戏的内容可能持续变化。由于这种动态特性，SpriteKit
    会不断更新场景及其内容。这种持续更新被称为渲染循环（见图 2-1）。![A330720_2_En_2_Fig1_HTML.jpg](img/A330720_2_En_2_Fig1_HTML.jpg)
    图 2-1. SpriteKit 渲染循环


    循环的每次迭代都会生成场景中的下一帧。生成场景下一帧所涉及的步骤如下：


    1.  场景调用其 `update()` 方法。这是放置大部分游戏逻辑的地方。通常，你会在这里移动节点、向现有节点添加新动作以及处理用户输入。（我们将在第
    4 章中讨论 `update()` 方法。）

    2.  接着，场景对其所有子节点执行所有编程设定的动作。在此步骤中，场景会执行你可能在步骤 1 中设置的任何动作。（我们将在第 5 章中讨论动作。）

    3.  然后，场景调用 `didEvaluateActions()` 方法。此处可用于放置任何动作后的游戏逻辑。例如，在动作执行后测试节点的位置并做出相应响应。

    4.  接下来，场景对场景中的物理体执行所有物理模拟。（我们将在第 3 章中讨论物理。）

    5.  场景调用 `didSimulatePhysics()` 方法。这与 `didEvaluateActions()` 方法非常相似，你可以在此处添加所有物理模拟完成后要执行的任何游戏逻辑。这是在场景渲染之前执行任何游戏逻辑的最后机会。

    6.  渲染场景。


    随着你阅读本书各章节的深入，你将会看到渲染循环中每个步骤的示例。


    **注意：**当你在 `SKView` 中设置了 `showsFPS` 时，你将看到游戏每秒渲染的帧数。每个被渲染的帧代表渲染循环的一次迭代。


    ## 构建场景的节点树


    在本章前面部分，我们讨论了如何使用背景节点和玩家节点来设置一个简单的 `SKScene`。你是通过 `SKScene.addChild()` 方法实现这一点的。本节将更深入地探讨场景是如何创建的。我们还提到了
    `SKScene` 类扩展的类型。其中一种类型是 `SKNode`。`SKNode` 是用于保存 `SKScene` 对象节点树中所有节点的类。它还定义了用于操作此节点树的方法。其中最常用的方法是
    `addChild()`、`insertChild()` 和 `removeFromParent()`，如表 2-1 所述。


    表 2-1. `SKNode` 节点树操作方法


    | 方法 | 用途 |

    | --- | --- |

    | `addChild()` | `addChild(_:)` 方法将一个节点添加到接收者的子节点集合的末尾。 |

    | `insertChild(_:at:)` | `insertChild(_:at:)` 方法将一个子节点插入到接收者的子节点集合中的特定位置。 |

    | `removeFromParent()` | `removeFromParent()` 将接收节点从其父节点中移除。 |


    这是你将用于构建场景节点树的三种方法。了解这些方法如何工作的最简单方式是通过一个简单的示例。请看以下序列：


    ```

    var gameScene = SKScene(size: CGSizeMake(320.0, 568.0))

    var node1 = SKSpriteNode()

    var node2 = SKSpriteNode()

    var node3 = SKSpriteNode()

    gameScene.addChild(node1)

    gameScene.addChild(node2)

    gameScene.addChild(node3)

    ```


    这里你创建了一个名为 `gameScene` 的 `SKScene`。然后你创建了三个节点并将它们添加到 `gameScene` 中。此时，`gameScene`
    的节点树如图 2-2 所示。![A330720_2_En_2_Fig2_HTML.gif](img/A330720_2_En_2_Fig2_HTML.gif)
    图 2-2. 添加三个节点后的 `gameScene` 的 children 属性


    **注意：**图 2-2 及后续几个图中的线条表示每个节点被添加的顺序。它并不表示节点本身彼此相关。例如，`node2` 并未添加到 `node1` 上。`node2`
    只是在 `node1` 之后被添加的。


    此时，节点树包含三个节点：`node1`、`node2` 和 `node3`（按此顺序）。现在，如果你执行以下代码片段，你将得到一个如图 2-3 所示的节点树：


    ![A330720_2_En_2_Fig3_HTML.gif](img/A330720_2_En_2_Fig3_HTML.gif) 图 2-3. 插入第四个节点后的
    `gameScene` 节点树


    ```

    var node4 = SKSpriteNode()

    gameScene.insertChild(node4, at: 2)

    ```


    `insertChild()` 方法在节点树的给定位置插入一个节点。在这个例子中，你要求将节点插入到第三个位置（第一个节点位于位置 0）。children
    属性现在包含四个节点，`node4` 被插入到 `node2` 和 `node3` 之间。


    让我们做最后一件事，移除一个节点：


    ```

    node2.removeFromParent()

    ```


    通过调用 `node2` 的 `removeFromParent` 方法，你已将 `node2` 从其父节点（在本例中为 `gameScene`）中移除。现在节点树如图
    2-4 所示。


    ![A330720_2_En_2_Fig4_HTML.gif](img/A330720_2_En_2_Fig4_HTML.gif) 图 2-4. 移除 `node4`
    后的 `gameScene` 节点树


    还有最后一点你需要了解，那就是嵌套节点。因为节点树是 `SKNode` 的一部分，而 `SKSpriteNode` 是从 `SKNode` 扩展而来的，所以它可以拥有嵌套节点。嵌套相关节点的好处在于，当你更改父节点时，相同的更改将应用于所有子节点。


    为了了解嵌套节点在节点树中是如何表示的，让我们回到图 2-4 所表示的节点树。如果你想在 `node4` 内部嵌套额外的节点，可以在刚刚执行的 `node2.removeFromParent()`
    之后立即执行以下代码片段来实现。图 2-5 展示了此代码片段的结果：


    ![A330720_2_En_2_Fig5_HTML.gif](img/A330720_2_En_2_Fig5_HTML.gif) 图 2-5. 节点嵌套在
    `node4` 内部的 `gameScene` 节点树


    ```

    var node4a = SKSpriteNode()

    var node4b = SKSpriteNode()

    var node4c = SKSpriteNode()

    node4.addChild(node4a)

    node4.addChild(node4b)

    node4.addChild(node4c)

    ```

    '
- fmt: "### Rendering the Node Tree\n\nNow that you know how to build the node tree,\
    \ it’s time to look at how the node tree is rendered. The order in which you add\
    \ nodes to your scene is important. When the scene is rendered at the end of the\
    \ rendering loop, it’s rendered in reverse order of the way it was built. Let’s\
    \ use the node tree represented by Figure 2-3 as an example. When this node tree\
    \ is rendered, the scene will render each node in the following order:\n\n1. `node3`\n\
    2. `node4`\n3. `node2`\n4. `node1`\n\nNotice the last node rendered was the first\
    \ node added to the scene. Nested nodes are also rendered in the reverse order\
    \ of how they were added. If you were to render the node tree represented by Figure\
    \ 2-5, it would be rendered in the following order:\n\n1. `node3`\n2. `node4`\n\
    \   - `node4c`\n   - `node4b`\n   - `node4a`\n3. `node1`\n\nThis is important\
    \ because, based on the position of each node, there could be some overlapping\
    \ of nodes in the scene, which could lead to partial or completely hidden nodes.\
    \ It’s also important because of the way SpriteKit performs hit testing. When\
    \ SpriteKit processes a touch event or mouse event, it walks the scene to find\
    \ the closest node that wants to receive the event. If the first node doesn’t\
    \ want the event, SpriteKit checks the next closest node and repeats this process\
    \ until the event is handled or ignored. Just like the scene-rendering order,\
    \ the order in which hit testing is performed is the reverse of the drawing order.\
    \ To see how this looks using the sample app, replace the current contents of\
    \ the `GameScene.init()` method with the following code:\n\n```\nsuper.init(size:\
    \ size)\nbackgroundColor = SKColor(red: 0.0, green: 0.0, blue: 0.0, alpha: 1.0)\n\
    // adding the background\nbackgroundNode.anchorPoint = CGPoint(x: 0.5, y: 0.0)\n\
    backgroundNode.position = CGPoint(x: size.width / 2.0, y: 0.0)\naddChild(backgroundNode)\n\
    // add the player\nlet playerNode1 = SKSpriteNode(imageNamed: \"Player\")\nplayerNode1.position\
    \ = CGPoint(x: size.width / 2.0, y: 80.0)\naddChild(playerNode1)\nlet playerNode2\
    \ = SKSpriteNode(imageNamed: \"Player\")\nplayerNode2.position = CGPoint(x: size.width\
    \ / 2.0, y: 100.0)\naddChild(playerNode2)\nlet playerNode3 = SKSpriteNode(imageNamed:\
    \ \"Player\")\nplayerNode3.position = CGPoint(x: size.width / 2.0, y: 120.0)\n\
    addChild(playerNode3)\n```\n\nIn this snippet, three player nodes are being added\
    \ to the scene, each of them 20 points below the most recently added node. To\
    \ see the results, run the project again. You will see the overlapping players,\
    \ with the first player added on top, as shown in Figure 2-6.\n\n![A330720_2_En_2_Fig6_HTML.jpg](OEBPS/A330720_2_En_2_Fig6_HTML.jpg)\n\
    \n*Figure 2-6. The gameScene’s with overlapping player nodes*\n\n### Searching\
    \ the Node Tree\n\nThere is one last topic we want to cover before moving on to\
    \ the coordinate system and anchor points: how you search the node tree. Something\
    \ we’ve not discussed yet is the `name` property of the `SKNode`. The `SKNode.name`\
    \ property is a `String` property that can be used to identify a unique sprite\
    \ or a group of sprites. An example of this would be to give the unique `playerNode`\
    \ a name of `Player`. Assuming you were inside the `GameScene` and you did give\
    \ the `playerNode` a name of `Player`, you could then search the `GameScene` for\
    \ a unique node named `Player` using the following line of code:\n\n```\nchildNode(withName:\
    \ \"Player\")\n```\n\nThis method returns an optional `SKNode`. If more than one\
    \ child shares the same name, then the first node in the `children` array would\
    \ be returned. If no child with this name was found, then return would have no\
    \ value. Another example might be to name a collection of sprites with the same\
    \ name. For example, you could name a collection of sprites with the same circular\
    \ texture, such as `orb`. You could then search for all sprites with that name\
    \ and apply the set of actions in one call. You can do this using `SKNode`’s `enumerateChildNodes(withName:using:)`\
    \ method. This method searches for all nodes with the passed-in name and then\
    \ executes the code in the block on each node found. Again, assuming you were\
    \ inside the `GameScene` and you’ve added several sprites all named `orb`, you\
    \ could search for all the `orb` nodes and execute a block on each one using the\
    \ following snippet:\n\n```\nenumerateChildNodes(withName: \"orb\", using: {\n\
    \    node, stop in\n    // do something with node or stop\n})\n```\n\nEverything\
    \ looks pretty straightforward here except for the parameters being passed to\
    \ the block every time a node with the name `orb` is found. The first parameter\
    \ is a reference to the node that was found—no problem. The second parameter,\
    \ `stop`, is a pointer to a Boolean that can be used to stop the iteration. If\
    \ you want to stop iterating over each node found, set the `stop` parameter’s\
    \ `memory` property to `true`, as in the following example:\n\n```\nstop.memory\
    \ = true\n```\n\n## Looking at SKSpriteNode Coordinates and Anchor Points\n\n\
    So far, we’ve talked about how you create an `SKScene` object and how it is rendered.\
    \ We’re now going to talk about how you position nodes in a scene. Let’s begin\
    \ by looking at the scene’s coordinate system. First, be sure to change the `GameScene.init()`\
    \ method back to the following:\n\n```\ninit(size: CGSize) {\n    super.init(size:\
    \ size)\n    backgroundColor = SKColor(red: 0.0, green: 0.0, blue: 0.0, alpha:\
    \ 1.0)\n    // adding the background\n    backgroundNode.anchorPoint = CGPoint(x:\
    \ 0.5, y: 0.0)\n    backgroundNode.position = CGPoint(x: size.width / 2.0, y:\
    \ 0.0)\n    addChild(backgroundNode)\n    // add the player\n    playerNode.position\
    \ = CGPoint(x: size.width / 2.0, y: 80.0)\n    addChild(playerNode)\n}\n```"
  raw: "### Rendering the Node Tree\n\nNow that you know how to build the node tree,\
    \ it’s time to look at how the node tree is rendered. The order in which you add\
    \ nodes to your scene is important. When the scene is rendered at the end of the\
    \ rendering loop , it’s rendered in reverse order of the way it was built. Let’s\
    \ use the node tree represented by Figure [2-3](#A330720_2_En_2_Chapter.html#Fig3)\
    \ as an example. When this node tree is rendered, the scene will render each node\
    \ in the following order:\n\n1.  1. node3  \n2.  2. node4  \n3.  3. node2  \n\
    4.  4. node1  \n\nNotice the last node rendered was the first node added to the\
    \ scene. Nested nodes are also rendered in the reverse order of how they were\
    \ added. If you were to render the node tree represented by Figure [2-5](#A330720_2_En_2_Chapter.html#Fig5),\
    \ it would be rendered in the following order:\n\n1.  1. node3  \n2.  2. node4\n\
    \    1.  a. node4c  \n    2.  b. node4b  \n    3.  c. node4a   \n3.  3. node1\
    \  \n\nThis is important because, based on the position of each node, there could\
    \ be some overlapping of nodes in the scene, which could lead to partial or completely\
    \ hidden nodes. It’s also important because of the way SpriteKit performs hit\
    \ testing. When SpriteKit processes a touch event or mouse event, it walks the\
    \ scene to find the closest node that wants to receive the event. If the first\
    \ node doesn’t want the event, SpriteKit checks the next closest node and repeats\
    \ this process until the event is handled or ignored. Just like the scene-rendering\
    \ order, the order in which hit testing is performed is the reverse of the drawing\
    \ order. To see how this looks using the sample app, replace the current contents\
    \ of the GameScene.init() method with the following code: super.init(size: size)\
    \ backgroundColor = SKColor(red: 0.0, green: 0.0, blue: 0.0, alpha: 1.0) // adding\
    \ the background backgroundNode.anchorPoint = CGPoint(x: 0.5, y: 0.0) backgroundNode.position\
    \ = CGPoint(x: size.width / 2.0, y: 0.0) addChild(backgroundNode) // add the player\
    \ let playerNode1 = SKSpriteNode(imageNamed: \"Player\") playerNode1.position\
    \ = CGPoint(x: size.width / 2.0, y: 80.0) addChild(playerNode1) let playerNode2\
    \ = SKSpriteNode(imageNamed: \"Player\") playerNode2.position = CGPoint(x: size.width\
    \ / 2.0, y: 100.0) addChild(playerNode2) let playerNode3 = SKSpriteNode(imageNamed:\
    \ \"Player\") playerNode3.position = CGPoint(x: size.width / 2.0, y: 120.0) addChild(playerNode3)\
    \ In this snippet, three player nodes are being added to the scene, each of them\
    \ 20 points below the most recently added node. To see the results, run the project\
    \ again. You will see the overlapping players, with the first player added on\
    \ top, as shown in Figure [2-6](#A330720_2_En_2_Chapter.html#Fig6). ![A330720_2_En_2_Fig6_HTML.jpg](OEBPS/A330720_2_En_2_Fig6_HTML.jpg)\
    \ Figure 2-6. The gameScene’s with overlapping player nodes\n\n### Searching the\
    \ Node Tree\n\nThere is one last topic we want to cover before moving on to the\
    \ coordinate system and anchor points: how you search the node tree. Something\
    \ we’ve not discussed yet is the name property of the SKNode. The SKNode.name\
    \ property is a String property that can be used to identify a unique sprite or\
    \ a group of sprites. An example of this would be to give the unique playerNode\
    \ a name of Player. Assuming you were inside the GameScene and you did give the\
    \ playerNode a name of Player, you could then search the GameScene for a unique\
    \ node named Player using the following line of code: childNode(withName: \"Player\"\
    ) This method returns an optional SKNode. If more than one child shares the same\
    \ name, then the first node in the children array would be returned. If no child\
    \ with this name was found, then return would have no value. Another example might\
    \ be to name a collection of sprites with the same name. For example, you could\
    \ name a collection of sprites with the same circular texture, such as orb. You\
    \ could then search for all sprites with that name and apply the set of actions\
    \ in one call. You can do this using SKNode’s enumerateChildNodes(withName: using:)\
    \ method . This method searches for all nodes with the passed-in name and then\
    \ executes the code in the block on each node found. Again, assuming you were\
    \ inside the GameScene and you’ve added several sprites all named orb, you could\
    \ search for all the orb nodes and execute a block on each one using the following\
    \ snippet: enumerateChildNodes(withName: \"orb\", using: {     node, stop in     //\
    \ do something with node or stop }) Everything looks pretty straightforward here\
    \ except for the parameters being passed to the block every time a node with the\
    \ name orb is found. The first parameter is a reference to the node that was found—no\
    \ problem. The second parameter, stop, is a pointer to a Boolean that can be used\
    \ to stop the iteration. If you want to stop iterating over each node found, set\
    \ the stop parameter’s memory property to true, as in the following example. stop.memory\
    \ = true\n\n## Looking at SKSpriteNode Coordinates and Anchor Points\n\nSo far,\
    \ we’ve talked about how you create an SKScene object and how it is rendered.\
    \ We’re now going to talk about how you position nodes in a scene. Let’s begin\
    \ by looking at the scene’s coordinate system. First, be sure to change the GameScene.init()\
    \ method back to the following: init(size: CGSize) {     super.init(size: size)\
    \     backgroundColor = SKColor(red: 0.0, green: 0.0, blue: 0.0, alpha: 1.0)     //\
    \ adding the background     backgroundNode.anchorPoint = CGPoint(x: 0.5, y: 0.0)\
    \     backgroundNode.position = CGPoint(x: size.width / 2.0, y: 0.0)     addChild(backgroundNode)\
    \     // add the player     playerNode.position = CGPoint(x: size.width / 2.0,\
    \ y: 80.0)     addChild(playerNode) }"
  trans: "\n### 渲染节点树\n\n现在你已经了解了如何构建节点树，接下来看看节点树是如何渲染的。向场景中添加节点的顺序非常重要。当渲染循环结束时对场景进行渲染时，其渲染顺序与构建顺序相反。以图\
    \ 2-3 所示的节点树为例。当渲染这棵节点树时，场景将按以下顺序渲染每个节点：\n\n1. `node3`\n2. `node4`\n3. `node2`\n\
    4. `node1`\n\n注意，最后渲染的节点是第一个添加到场景中的节点。嵌套节点也以其添加顺序的逆序进行渲染。如果要渲染图 2-5 所示的节点树，渲染顺序如下：\n\
    \n1. `node3`\n2. `node4`\n   - `node4c`\n   - `node4b`\n   - `node4a`\n3. `node1`\n\
    \n这一点很重要，因为根据每个节点的位置，场景中的节点可能会发生重叠，从而导致某些节点被部分或完全遮挡。这一点同样重要，还因为 SpriteKit 执行命中测试的方式。当\
    \ SpriteKit 处理触摸事件或鼠标事件时，它会遍历场景，找到最想接收该事件的节点。如果第一个节点不处理该事件，SpriteKit 会检查下一个最近的节点，并重复此过程，直到事件被处理或被忽略。与场景渲染顺序一样，命中测试的执行顺序也与绘制顺序相反。要了解在示例应用中如何体现，请将\
    \ `GameScene.init()` 方法的当前内容替换为以下代码：\n\n```\nsuper.init(size: size)\nbackgroundColor\
    \ = SKColor(red: 0.0, green: 0.0, blue: 0.0, alpha: 1.0)\n// 添加背景\nbackgroundNode.anchorPoint\
    \ = CGPoint(x: 0.5, y: 0.0)\nbackgroundNode.position = CGPoint(x: size.width /\
    \ 2.0, y: 0.0)\naddChild(backgroundNode)\n// 添加玩家\nlet playerNode1 = SKSpriteNode(imageNamed:\
    \ \"Player\")\nplayerNode1.position = CGPoint(x: size.width / 2.0, y: 80.0)\n\
    addChild(playerNode1)\nlet playerNode2 = SKSpriteNode(imageNamed: \"Player\")\n\
    playerNode2.position = CGPoint(x: size.width / 2.0, y: 100.0)\naddChild(playerNode2)\n\
    let playerNode3 = SKSpriteNode(imageNamed: \"Player\")\nplayerNode3.position =\
    \ CGPoint(x: size.width / 2.0, y: 120.0)\naddChild(playerNode3)\n```\n\n在这段代码中，三个玩家节点被添加到场景中，每个节点都比上一个添加的节点低\
    \ 20 点。要查看结果，请再次运行项目。你会看到重叠的玩家，其中第一个添加的玩家位于最上方，如图 2-6 所示。\n\n![A330720_2_En_2_Fig6_HTML.jpg](img/A330720_2_En_2_Fig6_HTML.jpg)\n\
    \n*图 2-6. 带有重叠玩家节点的 GameScene*\n\n### 搜索节点树\n\n在进入坐标系统和锚点之前，我们还有最后一个主题要介绍：如何搜索节点树。我们之前尚未讨论\
    \ `SKNode` 的 `name` 属性。`SKNode.name` 是一个 `String` 属性，可用于标识特定的精灵或一组精灵。例如，可以为唯一的\
    \ `playerNode` 命名为 `Player`。假设你在 `GameScene` 内部，并且确实将 `playerNode` 命名为 `Player`，那么可以使用以下代码行在\
    \ `GameScene` 中搜索名为 `Player` 的唯一节点：\n\n```\nchildNode(withName: \"Player\")\n\
    ```\n\n此方法返回一个可选的 `SKNode`。如果多个子节点共享同一名称，则返回 `children` 数组中的第一个节点。如果未找到具有该名称的子节点，则返回值为空。另一个例子可能是为一组精灵赋予相同的名称。例如，你可以为一组具有相同圆形纹理的精灵命名为\
    \ `orb`。然后搜索所有具有该名称的精灵，并在一次调用中应用一组动作。你可以使用 `SKNode` 的 `enumerateChildNodes(withName:using:)`\
    \ 方法实现这一点。此方法搜索所有具有传入名称的节点，并对每个找到的节点执行代码块中的代码。同样，假设你在 `GameScene` 内部，并且添加了多个名为\
    \ `orb` 的精灵，可以使用以下代码片段搜索所有 `orb` 节点并对每个节点执行代码块：\n\n```\nenumerateChildNodes(withName:\
    \ \"orb\", using: {\n    node, stop in\n    // 对 node 或 stop 进行操作\n})\n```\n\n\
    除了每次找到名为 `orb` 的节点时传递给代码块的参数外，一切看起来都很直观。第一个参数是对所找到节点的引用——这没问题。第二个参数 `stop` 是一个指向布尔值的指针，可用于停止迭代。如果你想停止遍历每个找到的节点，将\
    \ `stop` 参数的 `memory` 属性设置为 `true`，如下例所示：\n\n```\nstop.memory = true\n```\n\n\
    ## 了解 SKSpriteNode 坐标和锚点\n\n到目前为止，我们已经讨论了如何创建 `SKScene` 对象以及它如何被渲染。现在我们讨论如何定位场景中的节点。首先，让我们看看场景的坐标系统。确保将\
    \ `GameScene.init()` 方法更改回以下内容：\n\n```\ninit(size: CGSize) {\n    super.init(size:\
    \ size)\n    backgroundColor = SKColor(red: 0.0, green: 0.0, blue: 0.0, alpha:\
    \ 1.0)\n    // 添加背景\n    backgroundNode.anchorPoint = CGPoint(x: 0.5, y: 0.0)\n\
    \    backgroundNode.position = CGPoint(x: size.width / 2.0, y: 0.0)\n    addChild(backgroundNode)\n\
    \    // 添加玩家\n    playerNode.position = CGPoint(x: size.width / 2.0, y: 80.0)\n\
    \    addChild(playerNode)\n}\n```\n"
- fmt: "### Coordinates\n\nWhen a scene is first initialized, its `size` property\
    \ is set in its initializer, as you saw earlier. The `size` of the scene denotes\
    \ the size of the visible portion of the scene. It doesn’t define the entire size\
    \ of the game world. You can think of the `size` of the scene as the viewport\
    \ into the game world. By default, an `SKScene`’s origin is placed in the bottom-left\
    \ corner of the view presenting it. The coordinate representing this origin is\
    \ `(0, 0)`. Going back to the game from the previous chapter, add this line of\
    \ code to the `GameScene.init()` method immediately following the call to the\
    \ `super.init()`: `print(\"The size is (\\(size)\")`. Now run the application\
    \ again using the iPhone 6s simulator. After you do, look in the console window.\
    \ You will see the following output: `The size is: (375.0, 667.0)`. This is the\
    \ size of the scene running on an iPhone 6s. You can try this again, running on\
    \ either the iPhone SE or 6+ simulators. These values tell you the size of your\
    \ scene (the viewport into your game world). If you want to position `SKNode`\
    \ objects into the visible world of your game, you have to set their positions\
    \ inside the range of `(0, 0)` to `(375, 667)` on the iPhone 6s or from `(0, 0)`\
    \ to `(320, 568)` on the iPhone SE.\n\nTake a moment and play around with the\
    \ coordinate system. Go back to the `GameScene.init()` method and change the position\
    \ of the `playerNode` using the following line: `playerNode.position = CGPoint(x:\
    \ size.width / 2, y: size.height / 2)`. With this change, you are positioning\
    \ the `playerNode` in the center of the scene. To see the position change, run\
    \ the app in the simulator again. You will now see your player in the middle of\
    \ your scene, as shown in Figure [2-7](#A330720_2_En_2_Chapter.html#Fig7).\n\n\
    ![A330720_2_En_2_Fig7_HTML.jpg](OEBPS/A330720_2_En_2_Fig7_HTML.jpg)  \nFigure\
    \ 2-7. The `playerNode` in the middle of the scene\n\nMake one more position change\
    \ before you move on. Change `playerNode`’s position using the following line\
    \ of code: `playerNode.position = CGPoint(x: size.width, y: size.height)`. As\
    \ you can see, the new position is set to the maximum `(x, y)` of the viewable\
    \ area in the scene. Run the app in the simulator again. You will see your player\
    \ in the upper-right corner of your scene, as shown in Figure [2-8](#A330720_2_En_2_Chapter.html#Fig8).\n\
    \n![A330720_2_En_2_Fig8_HTML.jpg](OEBPS/A330720_2_En_2_Fig8_HTML.jpg)  \nFigure\
    \ 2-8. The `playerNode` at the top right of the scene\n\nAlthough you successfully\
    \ positioned your `player` in the upper-right corner of the scene, you will notice\
    \ something a little odd—only the bottom-left quarter of the `playerNode` is visible.\
    \ You will see why this is the case in the next section when we focus on anchor\
    \ points.\n\n### Anchor Points\n\nAs you saw in the previous section, when you\
    \ positioned the `playerNode` in the top-right corner of the scene, only the bottom-left\
    \ quarter of the node was visible in the scene. That’s because the default anchor\
    \ point for `SKSpriteNode`s is positioned at the center of the node. A sprite’s\
    \ `anchorPoint` property is used to set the point in the `SKSpriteNode`’s frame\
    \ in which the sprite’s `position` property will be applied. That sounds a little\
    \ complicated, but it’s really pretty straightforward. Take a look at Figure [2-9](#A330720_2_En_2_Chapter.html#Fig9).\n\
    \n![A330720_2_En_2_Fig9_HTML.gif](OEBPS/A330720_2_En_2_Fig9_HTML.gif)  \nFigure\
    \ 2-9. `SKSpriteNode`’s anchor point unit coordinate system\n\nThis figure shows\
    \ an `SKSpriteNode`’s anchor point coordinate system. Notice the dot at position\
    \ `(0.5, 0.5)`. This is the default anchor point. Figure [2-10](#A330720_2_En_2_Chapter.html#Fig10)\
    \ shows some common anchor points.\n\n![A330720_2_En_2_Fig10_HTML.jpg](OEBPS/A330720_2_En_2_Fig10_HTML.jpg)\
    \  \nFigure 2-10. `SKSpriteNode` example anchor points\n\nIn Figure [2-10](#A330720_2_En_2_Chapter.html#Fig10)\
    \ there are four common anchor points as they relate to the sprites they’re applied\
    \ to. Looking at these examples, you can see that if you want to position the\
    \ `playerNode` at the top-rightmost position of the scene and still have the entire\
    \ `spriteNode` visible in the scene, you would need to set the sprite’s `anchorPoint`\
    \ property to `(1.0, 1.0)`. Do that now by adding the following line of code directly\
    \ after `playerNode`’s construction: `playerNode.anchorPoint = CGPoint(x: 1.0,\
    \ y: 1.0)`. Now run the application once more. You will now see the entire `playerNode`\
    \ positioned at the top right of the scene, as shown in Figure [2-11](#A330720_2_En_2_Chapter.html#Fig11).\n\
    \n![A330720_2_En_2_Fig11_HTML.jpg](OEBPS/A330720_2_En_2_Fig11_HTML.jpg)  \nFigure\
    \ 2-11. The entire `playerNode` at the top right of the scene\n\nTo get a handle\
    \ on anchor points, play around with different anchor points and positions of\
    \ the `playerNode` and see how each of the different anchor points affects the\
    \ positioning of the `playerNode`. It’s really important to understand how the\
    \ `position` and `anchorPoint` properties work together.\n\n> Note: When you’re\
    \ finished playing around with the `playerNode`’s `position` and `anchorPoint`,\
    \ revert all your code changes until the project is back to where you left it\
    \ in Chapter [1](#A330720_2_En_1_Chapter.html).\n\n## Summary\n\nThis chapter\
    \ covered quite a bit of information, including what `SKScene`s are and how they\
    \ are built. We also talked about the `SKScene` rendering loop and how the order\
    \ the scene’s node tree is constructed can affect the look and interactivity of\
    \ the nodes. We closed the chapter with a look at a scene’s coordinate system\
    \ and node anchor points. Chapter [3](#A330720_2_En_3_Chapter.html) covers SpriteKit’s\
    \ physics engine and collision detection. That chapter will be a lot of fun, and\
    \ you’ll start seeing your game coming to life.\n\n© James Goodwill and Wesley\
    \ Matlock 2017  \nJames Goodwill and Wesley Matlock *Beginning Swift Games Development\
    \ for iOS*  \nDOI: 10.1007/978-1-4842-2310-9_3\n\n# 3. Adding Physics and Collision\
    \ Detection to Your Game\n\nJames Goodwill¹ and Wesley Matlock²  \n(1) Highlands\
    \ Ranch, Colorado, USA  \n(2) Kansas City, Missouri, USA\n\nThis chapter covers\
    \ SpriteKit’s physics engine and collision detection. We begin with a discussion\
    \ of `SKPhysicsBody`—the class used to simulate collision detection. You will\
    \ then turn on gravity in the game world and see how that affects the nodes. After\
    \ that, you will add a touch responder to propel the `playerNode` up into space.\
    \ I close this chapter with a discussion of how to handle node collisions.\n\n\
    ### What Is an SKPhysicsBody?\n\nTo simulate physics in a SpriteKit game, you\
    \ add a physics body to a scene or node. A physics body, implemented by the SpriteKit\
    \ class `SKPhysicsBody`, is a simulated object attached to a node in the scene’s\
    \ node tree. The `SKPhysicsBody` class uses the properties of the node, such as\
    \ the `position` and `velocity`, combined with its own properties, to simulate\
    \ how physical forces are applied to the simulated game world. It does the calculations\
    \ to perform these simulations with each iteration of the render loop.\n\nThere\
    \ are three types of physics bodies: dynamic volume, static volume, and edge.\n\
    \n- A **dynamic volume** is a physical body with a volume and a mass that is affected\
    \ by collisions and forces in the physics simulation. Nodes with a dynamic volume\
    \ attached to them are the active nodes in games.\n- A physics body with a **static\
    \ volume** is just like a dynamic volume, except forces and collisions don’t affect\
    \ them. Static volume bodies are often used as barriers in a game. When a dynamic\
    \ body collides with a static body, the dynamic body is affected by the collision,\
    \ and the static body remains constant.\n- An **edge** is a static body without\
    \ volume. The simulation never moves an edge, and an edge’s mass doesn’t affect\
    \ the simulation of other nodes. Edges represent negative space within a scene.\n\
    \n### Adding Physics to Your Game World"
