    \ like this one, and let’s move on to adding the actual transition.\n\n### Adding\
    \ the Transition"
  raw: '## Winning the Game


    At this point, you know that the player is about to fly off the top of the scene,
    but you need to test to see when the player actually flies off the scene to determine
    whether he actually wins. To do this, add the following else if to the current
    if block in the update() method: else if playerNode.position.y > 7000.0 {     gameOverWithResult(true)
    } This code checks to see whether the playerNode has flown more than 7,000 points
    up the scene. If it has, it calls a new instance method gameOverWithResult(),
    passing true to this method, which indicates that the player won. Make these changes,
    and let’s take a look at the gameOverWithResult() method shown here: func gameOverWithResult(_
    gameResult: Bool) {     playerNode.removeFromParent()     if gameResult {         print("YOU
    WON!")     }     else {         print("YOU LOSE!")     } } Note that it doesn’t
    do a whole lot at the moment. It first removes the playerNode from the scene and
    then it sets node to nil. After that, it tests the gameResult Bool passed to it
    and prints whether the player won the game. Don’t worry too much about this method
    at the moment. You’ll be modifying this code soon enough. For now, add this method
    to the bottom of the GameScene, and let’s get to determining whether the player
    lost the game. Note Numbers like 6400.0 and 7000.0 may seem like crazy numbers
    when the height of the display is nowhere near either of these. Remember, you
    added the playerNode to the foregroundNode, and you’ve been moving the foregroundNode
    down while the playerNode, virtually, continues up the scene. This is how the
    player’s y-position is so much higher than the height of the device’s viewport.


    ## Losing the Game


    You now know when the player has won the game. It’s now time to test to see whether
    the player has lost the game. To do that, go back to the update() method and add
    the following else if to the bottom of the if statement (directly following the
    else if you just added): else if playerNode.position.y < 0.0 {     gameOverWithResult(false)
    } This bit of code is pretty easy to understand. If the playerNode’s y-position
    is less than 0.0, then the player has fallen off the bottom of the scene, and
    the gameOverWithResult() method is called with the value false being passed to
    it, which indicates that the player has lost the game. There’s one last thing
    you need to do before transitioning to a new scene. In the gameOverWithResult()
    method , you removed the playerNode from the parent and set it to nil. That’s
    perfectly fine, but you need to make sure you don’t try to use this property without
    first checking to see whether it’s nil. There are only two places you currently
    do this. The first is in the update() method with each time you’re checking the
    playerNode’s position. To make sure you don’t dereference a nil playerNode, you
    need to surround the body of the update() method with an if, checking to make
    sure the playerNode property isn’t nil. You can see this change in the new update()
    method shown here: override func update(_ currentTime: TimeInterval) {     if
    playerNode.position.y >= 180.0 {         backgroundNode.position =             CGPoint(x:
    backgroundNode.position.x,                     y: -((playerNode.position.y - 180.0)/8));
            backgroundStarsNode.position =             CGPoint(x: backgroundStarsNode.position.x,
                        y: -((playerNode.position.y - 180.0)/6));         backgroundPlanetNode.position
    =             CGPoint(x: backgroundPlanetNode.position.x,                     y:
    -((playerNode.position.y - 180.0)/8));         foregroundNode.position =             CGPoint(x:
    foregroundNode.position.x,                     y: -(playerNode.position.y - 180.0));
        }     else if playerNode.position.y > 7000.0 {         gameOverWithResult(true)
        }     else if playerNode.position.y + playerNode.size.height < 0.0 {         gameOverWithResult(false)
        } } After taking a look at these changes, modify your update() to look like
    this one, and let’s move on to adding the actual transition.


    ## Adding the Transition'
  trans: "\n### 赢得游戏\n\n至此，玩家即将飞离场景上方，但你需要通过测试来确认玩家何时真正飞出场景，以判定其是否获胜。为此，请在 `update()`\
