    SKLabelNode(fontNamed: "Copperplate")         simpleLabel.text = "Hello, SpriteKit!"
            simpleLabel.fontSize = 40         simpleLabel.position = CGPoint(x: size.width
    / 2.0, y: size.height / 2.0)         addChild(simpleLabel)     } } Listing 7-2.
    The New GameScene Class Note this listing contains two init() methods. The first
