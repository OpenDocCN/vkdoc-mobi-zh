- fmt: "# Slivers\n\nSlivers are a major topic, enough for a couple more chapters\
    \ so we'll stay surfacy. Our goal will be awareness. If you know what they're\
    \ good for that'll suffice for now. Slivers are for customized scrolling designs.\n\
    \nYou may someday have need to create parallax effects, or sections collapsing\
    \ when they're at the top but scrolling when they're in view, or multiple `ListView`\
    \ s that scroll but you can also scroll between them, or scrollable lists that\
    \ have subheadings, or widgets where you can scroll inside something that is also\
    \ scrollable itself. Slivers enable these advanced scrolling behaviors. Kind of\
    \ mind-blowing, right?\n\nLet's just bottom-line it like this: when the regular\
    \ Flutter widgets aren't enough to meet your out-of-the-box scrolling needs, Slivers\
    \ can help. Slivers are *scrollable portions* of a screen. These are your major\
    \ Sliver widgets:\n\n* `SliverList` – Like `ListView`, but with more flexibility\
    \ for custom scroll effects\n* `SliverFixedExtentList` – Similar to `SliverList`\
    \ but keeps all children at a fixed size for grids or lists with uniform items\n\
    * `SliverAppBar` – An app bar that can collapse or expand as the user scrolls\n\
    * `SliverPadding` – Adds scrolling-aware padding to a sliver element\n* `SliverGrid`\
    \ – Renders a grid layout within the scrollable area\n\nAnd if none of those are\
    \ exactly what you want, perhaps try building your own custom scrollable widget,\
    \ extending the `Sliver` class and overriding `layoutChild` and similar methods.\n\
    \n# Stack Widget\n\nThis is for when you want to layer widgets so that they occupy\
    \ the same X- and Y-position on the screen, overlapping one another. You want\
    \ to … well … *stack* them in the Z-direction. With `Stack`, you'll list some\
    \ number of subwidgets, and they'll be displayed in that order one on top of another.\
    \ The last one will occult (hide) the previous one which will occult the one before\
    \ that and so on.\n\nUsing a `Stack`, you can create some really cool layouts.\
    \ In fact, Material Cards rely on `Stack` s a lot because they embrace background\
    \ images with text on top of it. Maybe we want a card with a person's profile\
    \ pic with their name and info superimposed on top (Figure [16-1](#638603_1_En_16_Chapter.xhtml#Fig1)).\
    \ ^([^(24)](#fn24))\n\n![](images/638603_1_En_16_Chapter/638603_1_En_16_Fig1_HTML.jpg)\n\
    \nFigure 16-1  \nA Card with text on top of an image thanks to a `Stack` widget\n\
    \nHere's how we might accomplish that:\n\n```\nCard(\n  child: Stack(\n    children:\
    \ [\n      Image.asset(\"sandeep.jpg\"),\n      Column(\n        children: [\n\
    \          Text(\"Sandeep Patel\", style: _bigText),\n          Expanded(child:\
    \ Container()), // For the gap\n          Text(\"Email: s.patel@us.com\"),\n \
    \         Text(\"Phone: +1 (555) 786-3512\"),\n        ],\n      ),\n    ],\n\
    \  ),\n),\n```\n\nIn the `Stack`, we placed an image first. Then on top of that,\
    \ we added a `Column` with text elements. Since the `Column` was added *after*\
    \ the image, it appears in front of the image.\n\n## Positioned Widget\n\nIn our\
    \ preceding example, the texts laid out decently because a `Column` centers its\
    \ children and the `Expanded` pushed the `Text`s to the top and bottom. But if\
    \ we just had everything directly in the `Stack`, it would look like Figure [16-2](#638603_1_En_16_Chapter.xhtml#Fig2).\n\
    \n![](images/638603_1_En_16_Chapter/638603_1_En_16_Fig2_HTML.jpg)\n\nFigure 16-2\
    \  \nWithout a `Positioned` widget, everything bunches up in the upper left\n\n\
    When you use a `Stack`, every widget inside it will try to stay in the top-left\
    \ corner. We can accurately place those inner widgets in a `Stack` anywhere we\
    \ want by wrapping them in a `Positioned` widget.^([^(25)](#fn25))\n\n```\nCard(\n\
    \  child: Stack(\n    children: [\n      Image.asset(\"sandeep.jpg\"),\n     \
    \ Positioned(\n        top: 10, left: 10,\n        child: Text(\"Sandeep Patel\"\
    , style: _bigText),\n      ),\n      Positioned(\n        bottom: 30, right: 10,\n\
    \        child: Text(\"Email: s.patel@us.com\"),\n      ),\n      Positioned(\n\
    \        bottom: 10, right: 10,\n        child: Text(\"Phone: +1 (555) 786-3512\"\
    ),\n      ),\n      Positioned(\n        bottom: 0, left: 0, height: 100, width:\
    \ 100,\n        child: FlutterLogo(),\n      ),\n    ],\n  ),\n),\n```\n\nWe threw\
    \ in a `FlutterLogo` for good measure. It now looks like Figure [16-3](#638603_1_En_16_Chapter.xhtml#Fig3).\
    \ Much nicer!\n\n![](images/638603_1_En_16_Chapter/638603_1_En_16_Fig3_HTML.jpg)\n\
    \nFigure 16-3  \nMuch nicer looking with a `Positioned` widget\n\nThe `Positioned`\
    \ widget makes its child a fixed distance from one of the four corners by specifying\
    \ the `top`, `bottom`, `left`, and/or `right` positions.\n\n## Card Widget\n\n\
    You may have noticed that we used a `Card` widget in our preceding example. A\
    \ `Card` feels like the right thing to do in this situation, but it is by no means\
    \ required.\n\nA Flutter `Card` widget was created to implement the Material Design\
    \ look and feel, having properties like `color` for the background, `elevation`\
    \ for a drop shadow size, `borderOnForeground` for the border, and `margin` for\
    \ spacing around it. Granted, all of those could also be accomplished with a `Container`.\
    \ But if you want to do it with a standard look and feel, a `Card` makes it easy:\n\
    \n```\nCard(\n  elevation: 20.0,\n  child: Text(\"This is text in a card\"),\n\
    ),\n```\n\n# The Table Widget\n\nThe `GridView` is great when displaying widgets\
    \ in Rows and Columns that wrap. The wrapping part means that you really don't\
    \ care which children widgets end up in which Row and Column. Location means nothing.\
    \ You just want them to appear neatly.\n\n`Row`s and `Column`s are best when you\
    \ *do* care in which Row and Column each child exists. They're rigid when you\
    \ want them to be. Unfortunately, the columns can't talk to each other so they\
    \ will often be misaligned (Figures [16-4](#638603_1_En_16_Chapter.xhtml#Fig4)\
    \ and [16-5](#638603_1_En_16_Chapter.xhtml#Fig5)).\n\n![](images/638603_1_En_16_Chapter/638603_1_En_16_Fig5_HTML.png)\n\
    \nFigure 16-5  \n`Column`s with nested widgets work but the rows are misaligned\n\
    \n![](images/638603_1_En_16_Chapter/638603_1_En_16_Fig4_HTML.png)\n\nFigure 16-4\
    \  \n`Row`s with nested widgets work but the columns are misaligned\n\nThe `Table`\
    \ widget fixes that problem. It is rigid like nested `Row`s and `Column`s, but\
    \ each Row and Column is aware of the others and lines up nicely (Figure [16-6](#638603_1_En_16_Chapter.xhtml#Fig6)).\n\
    \n![](images/638603_1_En_16_Chapter/638603_1_En_16_Fig6_HTML.png)\n\nFigure 16-6\
    \  \nA `Table` aligns the rows and columns\n\nA `Table` widget will have children,\
    \ a list of `TableRow` widgets. And each `TableRow` widget will have children,\
    \ a list of subwidgets:\n\n```\nreturn Table(\n  children: [\n    // Row #1, the\
    \ header row\n    TableRow(children: [\n      Text('Salesperson', style: _bold),\n\
    \      Text('January', style: _bold),\n      Text('February', style: _bold),\n\
    \      Text('March', style: _bold),\n    ]),\n    // Row #2\n    TableRow(children:\
    \ [\n      Text('Dwight'),\n      Text('3742'),\n      Text('5573'),\n      Text('4323'),\n\
    \    ]),\n    // Row #3\n    TableRow(children: [\n      Text('Phyllis'),\n  \
    \    Text('3823'),\n      Text('4500'),\n      Text('3277'),\n    ]),\n  ],\n\
    );\n```\n\nThe preceding code would produce Figure [16-7](#638603_1_En_16_Chapter.xhtml#Fig7).\n\
    \n![](images/638603_1_En_16_Chapter/638603_1_En_16_Fig7_HTML.jpg)\n\nFigure 16-7\
    \  \nA `Table` widget lines up Rows and Columns simultaneously\n\n**Caution**\n\
    \nAnyone coming from an HTML background knows that laying out a page using HTML\
    \ `<table>` s is possible but a bad idea. `<table>` s are for data, not for layout.\
    \ Well, it's the same thing in Flutter. It is possible, but generally speaking,\
    \ stay away from tables for laying out a page. But if you have data, `Table`s\
    \ are the right choice.\n\nIf you want more control over the Column widths, set\
    \ the `columnWidths` property to a `Map` of Column number to width. The following\
    \ would give the first column 30% of the width and divide the remaining 70% evenly\
    \ across the remaining columns:\n\n```\nreturn Table(\n  columnWidths: {0: FractionColumnWidth(0.3)},\n\
    \  children: [ ...\n```\n\nHow do you span Columns? Like for a table header, for\
    \ example. Unfortunately, you don't with Flutter `Table` – yet. Maybe someday.\
    \ There is a feature request for spanning columns."
