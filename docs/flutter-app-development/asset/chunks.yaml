  trans: '

    # 表单组件


    在 Flutter 中，当有多个相互依赖的字段或需要添加验证逻辑时，`Form` 组件会很有帮助。但并非所有场景都必然需要它。如果不需要，你可以忽略 `Form`
    组件。在真正需要了解 `Form` 组件之前，尽管跳过这一节去读下一章，我完全不会介意。


    ……还在看？好吧。让我们看看 `Form` 组件能为我们做些什么。系好安全带，因为接下来的旅程会有些颠簸……


    表单需要一个 `GlobalKey`。还记得上一章我们介绍过键（keys）吗？当时我们说除了少数情况外，键通常可以忽略。而这里正是需要键的场景之一。如果你决定使用
    `Form`，就需要一个类型为 `FormState` 的 `GlobalKey`：


    ```

    GlobalKey _key = GlobalKey();

    ```


    然后将这个键设置为 `Form` 的一个属性：


    ```

    @override

    Widget build(BuildContext context) {

    return Form(

    key: _key,

    autovalidate: AutovalidateMode.always,

    child: // 所有表单字段都将放在这里

    );

    }

    ```


    乍一看，`Form` 似乎没有带来什么变化。但仔细观察，你会发现我们现在可以访问以下内容：


    *   `autovalidate` – `always` 表示当任何字段发生变化时立即运行验证。`disabled` 表示你需要手动触发验证。`onUserInteraction`
    表示每次用户交互时都运行验证。（我们将在几页后讨论验证。）


    *   键本身，我们在上面的代码中称其为 `_key`。


    这个 `_key` 拥有一个 `currentState` 属性，该属性又包含以下方法：


    1.  `save()` – 通过调用每个字段的 `onSaved` 方法来保存表单内的所有字段。


    2.  `validate()` – 运行每个字段的 `validator` 函数。


    3.  `reset()` – 将表单内的每个字段重置为 `initialValue`。


    **注意：** `currentState` 是一个可空属性。这意味着我们必须使用 `?` 或 `!` 来安抚编译器。记住，`?` 表示如果它为 null，则在此处停止处理（即什么也不做）。而
    `!` 表示我们确信它此时永远不可能为 null。为了简洁起见，你会看到我使用 `!`。


    有了这些，你就可以理解 `Form` 如何处理其嵌套字段了。当你调用这三个方法中的任何一个时，它都会遍历所有内部字段并对每个字段调用相应的方法。在 `Form`
    级别的一次调用将触发所有字段的对应操作。


    但请稍等！如果 `_key.currentState.save()` 调用了字段的 `onSaved()`，我们需要提供一个 `onSaved` 方法，对吗？`validate()`
    调用 `validator` 同理。但是 `TextField`、`DropdownButton`、`Radio`、`Checkbox` 和 `Slider`
    这些组件本身并没有这些方法。现在该怎么办？我们需要将每个字段包裹在一个 `FormField` 组件中，而这个组件**确实**拥有这些方法。（这坑越来越深了。）


    # FormField 组件


    这个组件存在的全部意义就是为内部组件提供 `onSaved` 和 `validator` 事件处理器。`FormField` 组件可以通过 `builder`
    属性包裹任何组件：


    ```

    FormField(

    builder: (state) {

    return TextField(); // 任何字段组件，如 Switch、Radio、Checkbox 或 Slider。

    },

    onSaved: (String initialValue) {

    // 在此处将值推送到仓库或其他地方。

    },

    validator: (String val) {

    // 在此处放置验证逻辑（下文将进一步说明）。

    },

    ),

    ```


    所以，我们首先用 `FormField` 组件包裹每个输入组件，并在一个名为 `builder` 的方法中完成此操作。然后，我们可以添加 `onSaved`
    和 `validator` 方法。


    **注意：** 虽然 `Switch`、`Checkbox` 和 `Slider` 被包裹在 `FormField` 中，但 `Radio` 有所不同。你需要将整个
    `Radio` 组包裹在一个 `FormField` 中。仔细想想，这很合理——因为整个组确定的是一个值——即 `groupValue`。


    ## TextFormField 和 DropdownButtonFormField


    Flutter 团队贴心地为我们提供了一个快捷方式。如果你在 `Form` 内部使用 `TextField`，无需*包裹*它，而是直接*替换*为 `TextFormField`
    组件。这个新组件很容易与 `TextField` 混淆，但它们是不同的。本质上……


    `TextFormField` = `TextField` + `FormField`


    `TextFormField` 拥有 `TextField` 的所有属性，并额外增加了 `onSaved` 和 `validator`：


    ```

    TextFormField(

    initialValue: "一些初始字符串",

    decoration: InputDecoration(labelText: ''邮箱''),

    onSaved: (val) => print("表单已保存: $val"),

    validator: (val) {

    // 在此处放置你的验证逻辑

    },

    ),

    ```


    类似地，当在 `Form` 中使用 `DropdownButton` 时，可以将其替换为 `DropdownButtonFormField`：


    ```

    DropdownButtonFormField(

    onChanged: (val) => _searchType = val,

    onSaved: (val) => _dbRecord["searchType"] == val,

    validator: _searchTypeValidator,

    value: _searchType,

    items: [...],

    ),

    ```


    现在是不是好多了？终于，我们得到了一个让事情变得更简单的喘息之机。复选框没有这个快捷方式，`Radio` 和 `Slider` 也没有。只有 `TextField`
    和 `DropDownButton` 有。


    ## onSaved


    记住，你的 `Form` 有一个键，这个键拥有一个 `currentState`，而 `currentState` 又有一个 `save()` 方法。都记住了吗？没有？不太清楚？我们换个方式理解：当点击“保存”按钮时，你需要编写代码来调用……


    ```

    _key.currentState!.save();

    ```


    ……而它会依次调用 `Form` 中每个 `FormField` 的 `onSaved` 方法。


    ## validator


    类似地，你可能已经猜到可以调用……


    ```

    _key.currentState!.validate();

    ```


    ……然后 Flutter 会调用每个 `FormField` 的 `validator` 方法。每个 `validator` 函数将接收其待验证的值，并返回一个可为空的字符串。你需要编写函数：如果输入值有效，则返回
    `null`；如果无效，则返回一条错误消息。返回的字符串就是 Flutter 会显示给用户的信息：


    ```

    return Form(

    child: TextFormField(

    validator: (val)=> (val == null || val.isEmpty)

    ? "请输入一些文本"

    : null,

    ),

    );

    ```


    ## 提交表单


    我们（终于）准备好实际提交表单了。通常你会在按钮点击时执行此操作，并且只有当所有数据都有效时才希望提交表单。代码可能如下所示：


    ```

    ElevatedButton(

    onPressed: () {

    if (_key.currentState!.validate()) {

    _key.currentState!.save();

    print("表单已保存。");

    }

    },

    child: const Text("提交"),

    );

    ```


    # 一个大型表单示例


    我知道，我知道。这相当复杂。在具体的上下文中看看这些东西是如何组合在一起的可能会有所帮助。请查看代码仓库中名为 `search_form.dart` 的文件，它在一个大型
    `StatefulWidget` 中整合了所有这些部分。


    ## 总结


    理解 Flutter 表单需要一些时间。请不要气馁。当你实际使用表单时，很快就会弄明白。虽然表单这个话题可能让你有点望而生畏，但文本、图片、图标和 SnackBar
    这些内容是非常直观的，对吧？


    在下一章中，我们将学习如何创建各种类型的按钮，并使它们——或任何组件——能够响应点击及其他手势，届时我们的应用将真正活起来！


    # 5. 响应手势


    到目前为止，我们已经取得了很大的进展！你现在知道 Flutter 是关于什么的。你对开发和调试过程的工作原理已经相当熟悉。你明白为什么我们使用组件，并且对上一章的值组件已经相当熟悉了。天呐，你甚至可以创建自己的无状态组件了。但我们仍然缺少一个主要的、基础的功能：事件处理。


    假设你有一个屏幕，用户在其中选择商品并将其放入购物车。他们将需要在一个商品列表中上下滚动（图 5-1）。向上和向下滑动以滚动是一种手势。要选择商品，他们会点击它。那也是一种手势。然后要将其放入购物车，也许会让他们向右滑动。那又是另一种不同的手势。


    ![](img/638603_1_En_5_Fig1_HTML.jpg)


    图 5-1


    一个购物应用


    本章的全部内容就是处理这些手势。我们将手势分为两类：内置组件上的手势和自定义组件上的手势。让我们从内置组件上的手势开始讲起。

