    to meet your out-of-the-box scrolling needs, Slivers can help. Slivers are *scrollable
    portions* of a screen. These are your major Sliver widgets:


    *   SliverList – Like ListView, but with more flexibility for custom scroll effects


    *   SliverFixedExtentList – Similar to SliverList but keeps all children at a
