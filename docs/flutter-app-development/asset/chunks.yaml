    section. Yes, you can tell a Container you want it to have a particular width
    and height, and it will comply *when it is able*. Width and height both take a
    simple number that can range from zero to double.infinity. The value double.infinity
    *hints* to be as large as its parent will allow.


    Now, I know what you’re thinking. “Rap, what do you mean by ‘when it is able’
    and ‘hints’? Aren’t there any hard rules? I want Container sizes to be predictable!”
    And I completely agree. A Container’s size is tough to predict until you know
    its rules. So, how does it decide then?


    Remember two things. First, a Container is built to *contain* a child, but having
    a child is optional. Almost every time it will have a child. On the very rare
    occasions that a Container does not, we’re using it to provide a background color
    or to create spacing for its neighbors/siblings. Second, remember that Flutter
    determines layout in two phases, down the render tree to determine Box Constraints
    and then back up to determine RenderBox (a.k.a. “size,” remember?).


    We go top down:


    *   Flutter limits max size by passing Box Constraints down into the Container
    from its parent.


    *   The Container is laid back as it tells its parent, “If my neighbors need some
    space, go ahead and take it. I’ll be as small as you need me to.”


    *   If height and/or width is set, it honors those up to its max size as determined
    by its Box Constraints. Note that it is not an error for you to list a size greater
    than its Box Constraints, it just won’t grow any larger. This is why you can use
    double.infinity without error.


    Tip


    Setting height and width makes the Container super rigid; it locks in a size.
    While this is handy when you want to fine-tune your layout, the best practice
    is to avoid using them unless you have a darn good reason. You generally want
    to allow widgets to decide their own size.


    Then we go bottom up:


    *   In the 1% of the time that it has no child, it consumes all the remaining
    space up to its max BoxConstraint.


    *   But most of the time, it has a child so the layout engine looks at the child’s
    RenderBox.


    *   If the child’s RenderBox is bigger than my BoxConstraints, it clips the child
    which is a big, fat problem. It’s not technically an error, but it looks bad.
    So avoid it.


    *   If the child’s RenderBox is within my BoxConstraints, there is leftover room.
    Flutter looks at the alignment property. If alignment is *not* set, we put it
    in the upper-left corner and make the container tight – it shrinks to fit the
    child.


    *   If alignment *is* set, it makes the Container greedy. This sort of makes sense
    when you think about it because how will it align top/bottom/left/right if it
    doesn’t add space by growing?


    *   After all this, shrink as needed to honor the margins.


    Yeah, it’s complicated. This is why Container sizing is often misunderstood by
    Flutter devs. Play with it in a sandbox and you’ll get accustomed to it. It takes
    a while.'
  trans: '

    # 容器组件与盒模型


    Flutter 大量借鉴了其他技术，包括 HTML 和 Web，它们拥有边框（border）、内边距（padding）和外边距（margin）的概念。这些统称为盒模型。参见图
    15-1。它们用于在屏幕元素周围及之间创建赏心悦目的间距。这是一个经过实战检验的概念，在 Web 上表现出色，那么为什么不将其借鉴到 Flutter 中呢？


    ![](img/638603_1_En_15_Fig1_HTML.png)


    **图 15-1**


    盒模型定义了内边距、边框和外边距


    假设我们有一个指定尺寸的图片，想要对其进行“装裱”，具体来说，设置内边距为 8、外边距为 10、边框为 1。Flutter 新手可能会首先尝试这样写：


    ```

    Image.network(

    _peopleList[i][''picture''][''thumbnail''],

    padding: 8.0,

    margin: 10.0,

    border: 1.0,

    ),

    ```


    这样是行不通的，因为 `Image` 组件并没有 `padding`、`margin` 或 `border` 属性。但你知道什么有吗？容器（Container）！


    Web 开发者有时会通过将元素包裹在一个名为 `<div>` 的通用容器中，然后应用样式来为网页创建舒适的间距。


    Flutter 没有 `<div>`，但它有一个类似 div 的组件，叫做 `Container`，它的作用就是……嗯……*包含*其他东西。实际上，它存在的全部意义就是对其内部的内容应用布局和样式。一个
    HTML 的 `<div>` 可以包含多个东西，但 Flutter 的 `Container` 只能包含一个子元素。它拥有名为 `padding`、`margin`
    和 `decoration` 的属性。我们将把 `decoration` 留到本章末尾再讲，但 `padding` 和 `margin` 对于创建美观的间距非常有用：


    ```

    Container(

    padding: EdgeInsets.all(8.0),

    margin: EdgeInsets.all(10.0),

    decoration: BoxDecoration(border: Border.all(width: 1.0)),

    child:  Image.network(thePicture),

    ),

    ```


    ## 用于内边距和外边距的 `EdgeInsets`


    如果它们允许我们直接列出代表四个边的四个数值，那么外边距和内边距可能更容易学习。（它们就不能让事情简单点吗？）相反，我们使用一个名为 `EdgeInsets`
    的辅助组件。


    *   `EdgeInsets.all(8.0)` – 相同的值均匀应用于所有四个边。


    *   `EdgeInsets.symmetric(horizontal: 7.0, vertical: 5.0)` – 顶部和底部相同。左侧和右侧相同。


    *   `EdgeInsets.only(top: 20.0, bottom: 40.0, left: 10.0, right: 30.0)` – 左、上、右、下可以全部不同。


    *   `EdgeInsets.fromLTRB(10.0, 20.0, 30.0, 40.0)` – 与上面相同，但输入更少。


    另外请注意，如果你只需要内边距（不需要其他格式），`Padding` 组件是一个简写形式。


    | `Container(``padding: EdgeInsets.all(5),``child: Text("foo"),``),` | `Padding(``padding:
    EdgeInsets.all(5),``child: Text("foo"),``),` |


    这两者是等价的。


    ## 容器内的对齐与定位


    当你将一个小的子组件放置在一个大的 `Container` 中时，`Container` 中的空间会多于其子组件所需的空间。默认情况下，该子组件会位于左上角。你可以选择使用
    *alignment* 属性来定位它：


    ```

    Container(

    width: 150, height: 150,

    alignment: Alignment(1.0, -1.0),

    child:  Image.network(

    _peopleList[i][''picture''][''thumbnail''],

    ),

    ),

    ```


    这些对齐数字代表水平对齐（-1.0 是最左边，0.0 是居中，1.0 是最右边）和垂直对齐（-1.0 是最顶部，0.0 是居中，1.0 是最底部）。参见图
    15-2。


    ![](img/638603_1_En_15_Fig2_HTML.png)


    **图 15-2**


    以 (0,0) 为中心的对齐坐标系


    但你可能更倾向于在可能的情况下使用英文单词而不是数字：


    ```

    Container(

    width: 150, height: 150,

    alignment: Alignment.centerLeft,

    child:  Image.network(

    _peopleList[i][''picture''][''thumbnail''],

    ),

    ),

    ```


    `Alignment` 可以接受以下任何值：`topLeft`、`topCenter`、`topRight`、`centerLeft`、`center`、`centerRight`、`bottomLeft`、`bottomCenter`、`bottomRight`。这样写起来是不是更容易，你的开发者同事读起来也更轻松呢？


    提示


    `Align` 组件是用于指定对齐方式而不指定其他属性的简写形式。`Center` 组件则仅仅是居中的简写形式。


    以下三种写法是等价的，第一种是最底层的，最后一种最简洁清晰：


    ```

    Container(

    alignment: Alignment.center,

    child: Text("foo"),

    ),

    Align(

    alignment: Alignment.center,

    child: Text("foo"),

    ),

    Center(

    child: Text("foo"),

    ),

    ```


    ## 容器的大小并非显而易见


    你可能已经注意到，在上一节中，我试图悄悄地向你引入了 `width` 和 `height`。是的，你可以告诉 `Container` 你想要一个特定的 `width`
    和 `height`，它会 *在能力范围内* 遵守。`width` 和 `height` 都接受一个简单的数字，范围可以从 0 到 `double.infinity`。`double.infinity`
    这个值 *暗示* 要尽可能大到其父级允许的程度。


    现在，我知道你在想什么。“Rap，你说的‘在能力范围内’和‘暗示’是什么意思？难道就没有硬性规则吗？我希望 `Container` 的大小是可预测的！”我完全同意。在你了解其规则之前，`Container`
    的大小确实难以预测。那么，它到底是如何决定的呢？


    记住两件事。首先，`Container` 的构建是为了 *包含* 一个子元素，但拥有子元素是可选的。几乎每次它都会有一个子元素。在极少数情况下，`Container`
    没有子元素，我们会用它来提供背景颜色或为其相邻/同级元素创建间距。其次，请记住 Flutter 分两个阶段确定布局：沿渲染树向下传递以确定盒约束（Box Constraints），然后沿着渲染树向上以确定
    RenderBox（还记得吗？也就是“尺寸”）。


    我们先从上往下看：


    *   Flutter 通过从其父级向 `Container` 传递盒约束来限制最大尺寸。


    *   `Container` 在向上布局时会告诉其父级：“如果我的邻居需要空间，请尽管拿去。我可以变得和你需要的一样小。”


    *   如果设置了 `height` 和/或 `width`，它会遵循这些值，但不超过由盒约束决定的最大尺寸。请注意，你列出的尺寸大于其盒约束并不是错误，只是它不会变得更大。这就是为什么你可以使用
    `double.infinity` 而不会出错的原因。


    提示


    设置 `height` 和 `width` 会使 `Container` 变得非常僵硬；它会锁定一个尺寸。虽然这在你想微调布局时很方便，但最佳实践是避免使用它们，除非你有非常充分的理由。通常，你应该允许组件自行决定它们的大小。


    然后我们自下而上：


    *   在 1% 的情况下（没有子元素时），它会消耗剩余的所有空间，直到其最大盒约束。


    *   但大多数时候，它有一个子元素，因此布局引擎会查看子元素的 RenderBox。


    *   如果子元素的 RenderBox 大于我的盒约束，它会裁剪子元素，这是一个大问题。从技术上讲，这不是错误，但看起来很难看。所以请避免这种情况。


    *   如果子元素的 RenderBox 在我的盒约束范围内，就会有多余的空间。Flutter 会查看 `alignment` 属性。如果 `alignment`
    *没有* 设置，我们会将其放置在左上角，并使容器紧密贴合——它会收缩以适应子元素。


    *   如果 `alignment` *被* 设置了，它会使容器变得“贪婪”。仔细想想，这有点道理，因为如果它不通过增长来增加空间，它又怎么能进行顶部/底部/左侧/右侧的对齐呢？


    *   完成所有这些之后，根据需要缩小以遵守外边距。


    是的，这很复杂。这就是为什么 Flutter 开发者经常误解 Container 大小的原因。在沙盒中玩玩，你会慢慢习惯的。这需要一些时间。

