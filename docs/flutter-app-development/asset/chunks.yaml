    \ affiliations.\n\nThis Apress imprint is published by the registered company\
    \ APress Media, LLC, part of Springer Nature.  \nThe registered company address\
    \ is: 1 New York Plaza, New York, NY 10004, U.S.A.\n\n*This book is dedicated\
    \ to the men and women of the Flutter Community. I’ve never seen a group more\
    \ devoted to the success of others. You’re an inspiration and example to me.*\n\
    \n*Particular thanks to these members of the community who’ve helped me with Flutter\
    \ issues. This Texan owes y’all!*\n\n*Andrew “Red” Brogdon (Columbus, Ohio), Brian\
    \ Egan (Montana), Frederik Schweiger (Düsseldorf, Germany), Jeroen “Jay” Meijer\
    \ (Rotterdam, Netherlands), Jochum van der Ploeg (Zwolle, Netherlands), Martin\
    \ Rybak (New York), Martin Jeret (Estonia), Nash Ramdial (Trinidad), Nilay Yenner\
    \ (San Francisco), Norbert Kozsir (Karlsruhe, Germany), Pooja Bhaumik (Bengaluru,\
    \ India), Randal Schwartz (Portland, Oregon), Raouf Rahiche (Casablanca by way\
    \ of Algeria), Remi Rousselet (Paris), Rohan Tanaja (Berlin), and Scott Stoll\
    \ (Cleveland, Ohio).*\n\n*But especially Simon Lightfoot (London), who we all\
    \ call “The Flutter Whisperer.” He taught me much of what I know about Flutter.*\n\
    \n## Foreword\n\nThe world of mobile development has shifted. Gone are the days\
    \ of separate codebases for iOS and Android. Developers today crave efficiency,\
    \ speed, and the power to reach a wider audience with a single codebase. This\
    \ is where Flutter shines.\n\nAs a Google Developer Expert, I’ve witnessed firsthand\
    \ the transformative potential of Flutter. Its elegant architecture, combined\
    \ with a robust widget library, allows developers to create beautiful and high-performance\
    \ apps with unmatched speed. The magic of hot reload makes experimentation a breeze,\
    \ drastically reducing development time and accelerating the iterative process.\n\
    \nBut don’t let the power of Flutter fool you – it’s not without its challenges.\
    \ Learning a new language and navigating a vast ecosystem of tools and libraries\
    \ can be daunting. This is where this book comes in.\n\nThis book provides a comprehensive\
    \ guide to Flutter, taking you from the very basics of getting started to more\
    \ advanced topics like state management and API integration. It is meticulously\
    \ crafted with clear explanations, practical examples, and hands-on exercises\
    \ that will solidify your understanding and empower you to build amazing apps.\n\
    \nWhether you’re a seasoned developer looking to expand your skillset or a curious\
    \ beginner eager to enter the world of mobile development, this book is your perfect\
    \ companion. It’s a testament to the dedication and expertise of my friend Rap\
    \ Payne, and I am confident that it will equip you with the knowledge and confidence\
    \ to become a successful Flutter developer.\n\nSo, embrace the future of cross-platform\
    \ development and dive into the pages of this invaluable resource. Get ready to\
    \ build beautiful, performant apps with Flutter!\n\nRandal L. Schwartz  \nMay\
    \ 2024\n\n## Worldwide Praise for *Flutter App Development: How to Write for iOS\
    \ and Android at Once*\n\n> “Rap has written a great starting guide full of information\
    \ for those who are new to developing multi-platform apps with Flutter.”\n> \n\
    > —Frederik Schweiger (Düsseldorf, Germany), organizer of the International Flutter\
    \ Hackathon and creator of the Flutter School\n\n> “A great read! This covers\
    \ everything a beginner might want to know, and more. It explains not only what\
    \ Flutter is but why it exists works the way it does. It also provides great tips\
    \ for common pitfalls along the way. Definitely recommended.”\n> \n> —Jeroen “Jay”\
    \ Meijer (Rotterdam, Netherlands), leader of Flutter Community GitHub\n\n> “Rap’s\
    \ book is a great book to get started with Flutter. It covers every important\
    \ topic to write your very first app but also contains valuable information for\
    \ more seasoned developers.”\n> \n> —Norbert Kozsir (Karlsruhe, Germany), Flutter\
    \ Community editor\n\n> “As a non-native English speaker, I’m totally impressed\
    \ by the simplicity of this book and how much I can read and understand without\
    \ getting bored.”\n> \n> —Raouf Rahiche (Algeria), Flutter speaker, developer,\
    \ and instructor\n\n> “As an early adopter and one of the original members of\
    \ the Flutter Community, Rap is one of the world’s foremost authorities on Flutter.\
    \ Where documentation is written for Engineers, by Engineers, Rap is a human who\
    \ (thankfully!) writes in an enjoyable style that can easily be understood by\
    \ other humans.”\n> \n> —Scott Stoll (Cleveland, Ohio), contributor to the Flutter\
    \ codebase and cofounder of the Flutter Study Group\n\n## Who Is This Book For?\n\
    \nIf you’re a developer with experience in some object-oriented language like\
    \ Java, C#, C++, or Objective-C and you want to create Android apps, iOS apps,\
    \ or web apps with Flutter, this book is for you. It is especially important for\
    \ you if you want to create an app that runs on multiple platforms and if you\
    \ are new to Flutter.\n\nIf you’ve got some experience already with Flutter, you’ll\
    \ undoubtedly learn something, but we’re not expecting that you have any prerequisite\
    \ knowledge or experience with Flutter. All of our chapters are written with the\
    \ assumption that everything in Flutter is completely new to you.\n\nIf you know\
    \ anything about iOS development, Android development, or web development, that\
    \ will certainly help with understanding the topics because there are lots of\
    \ analogies in them for Flutter. The more you know about those things, the better,\
    \ especially JavaScript and React. But if you know none of them, don’t fret. They’re\
    \ by no means necessary.\n\nKnowledge of the Dart language also will help. There\
    \ are some unique but very cool Dart features that we consider best practices.\
    \ We could have “simplified” the code by not using these best practices, but in\
    \ the long run, that’s not doing you any favors. Instead, we go ahead and use\
    \ them, but we do explain those things in Appendix A, “Dart Language Overview.”\
    \ In there, we give you a cheat sheet with just enough detail to write code, followed\
    \ by a more in-depth explanation of the features that will be unexpected by developers\
    \ of other languages. Pay special attention to the section called “Unexpected\
    \ Things About Dart.”"
