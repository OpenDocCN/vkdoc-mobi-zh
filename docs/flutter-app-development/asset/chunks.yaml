    PersonCard widget for each with a photo and name. You probably want these to appear
    in rows and columns instead of a list. GridView has the same magic that a ListView
    has but draws things in a wrapping grid.


    You’ll set GridView’s children property to the list of widgets you want to display
    just like you did with Row, Column, Wrap, and ListView. GridView will display
    them in a grid, populating across and then wrapping to the next row, resizing
    its space available until it just fits. And here’s the greatest part, it automatically
    scrolls!


    GridView has two constructors, GridView.extent() and GridView.count().


    #### GridView.extent( )


    The word *extent* refers to the maximum width of the child. GridView will only
    let its kids grow to that size. If they try to get bigger, it puts another element
    on that row and shrinks all children equally until they just fit across the entire
    width. Take a look at this example:


    ```

    Widget build(BuildContext context) {

    return GridView.extent(

    maxCrossAxisExtent: 300.0,

    children: _peopleList

    .map((Person person) => PersonCard(person))

    .toList(),

    );

    }

    ```


    Notice in Figures [13-8](#638603_1_En_13_Chapter.xhtml#Fig8) and [13-9](#638603_1_En_13_Chapter.xhtml#Fig9)
    how the containers resize to something less than 300\. GridView decides that it
    can fit two across in portrait orientation. But when rotated, those two would
    have resized to something bigger than 300 so it puts three on each row.


    ![](images/638603_1_En_13_Chapter/638603_1_En_13_Fig9_HTML.jpg)


    Figure 13-9


    The same GridView.extent() rotated to landscape mode


    ![](images/638603_1_En_13_Chapter/638603_1_En_13_Fig8_HTML.jpg)


    Figure 13-8


    GridView.extent() in portrait


    #### GridView.count( )


    With the count() constructor, you specify how many columns you want *regardless
    of orientation*. GridView takes care of resizing its contents to fit. In the following
    example, we’ve told GridView.count() that we want four columns regardless of the
    orientation and the GridView sizes its children to fit exactly four across. They’re
    pictured in Figures [13-10](#638603_1_En_13_Chapter.xhtml#Fig10) and [13-11](#638603_1_En_13_Chapter.xhtml#Fig11).


    ![](images/638603_1_En_13_Chapter/638603_1_En_13_Fig11_HTML.jpg)


    Figure 13-11


    The same GridView.count() in portrait orientation


    ![](images/638603_1_En_13_Chapter/638603_1_En_13_Fig10_HTML.jpg)


    Figure 13-10


    GridView.count() in landscape orientation


    ```

    Widget build(BuildContext context) {

    return GridView.count(

    crossAxisCount: 4,

    children: _peopleList

    .map((Person person) => PersonCard(person))

    .toList(),

    );

    }

    ```


    GridView.extent() is probably more useful because the contents stay approximately
    the same size regardless of the device, and that’s a more typical desire than
    making the number of columns consistent.


    ## Conclusion


    It may be the most common situation to have more widgets than will fit on a device,
    and it may be the toughest problem to solve gracefully so it’s a significant achievement
    to have made it through this far. In this chapter, we’ve given you a handful of
    solutions to that problem and some help in determining which solution is best
    for a given situation.


    This was part three of our five steps to laying out a scene. Let’s cover how to
    distribute extra space elegantly in part four, the next chapter.


    # 14. Layout – Filling Extra Space


    We’re deep into the process of laying out our scene. Remember, this is the process
    we’re following.


    1.  Layout the entire scene


    2.  Position widgets relative to each other


    3.  Fix overflows, like when your widgets don’t fit on a screen


    4.  Handle extra space, like when your screen is bigger than it needs to be


    5.  Fine-tune the position


    We now know how to handle the entire scene, how to position widgets in relation
    to one another – above and below or side by side – and how to handle it when they’re
    too big to fit. These are steps one, two, and three. Now let’s take on the task
    of filling in the extra space in a Row or Column that may not look so good.


    ## What if There’s Extra Space Left Over?


    Compared to having too little space, this is a good problem to have. The only
    question you really need to answer is how to distribute the extra room. How much
    space do you want to allocate around each of the children widgets? You have several
    options. The easiest and quickest is to use mainAxisAlignment and crossAxisAlignment.


    ## mainAxisAlignment


    MainAxisAlignment is a property of the Row or Column (Figure [14-1](#638603_1_En_14_Chapter.xhtml#Fig1)).
    With it, you control how the extra space is allocated with respect to the widgets
    along the main axis – vertical for Columns and horizontal for Rows:


    ```

    child: Column(

    mainAxisAlignment: MainAxisAlignment.spaceEvenly,

    children: [

    SubWidget(),

    SubWidget(),

    ],

    ),

    ```


    You have a few choices.


    ![](images/638603_1_En_14_Chapter/638603_1_En_14_Fig1_HTML.png)


    Figure 14-1


    mainAxisAlignment says how to distribute the extra space along the main axis


    ### crossAxisAlignment


    crossAxisAlignment is also a property of the Row or Column; it determines where
    to put the extra space if the widgets are of different heights in a Row or widths
    in a Column. In Figure [14-2](#638603_1_En_14_Chapter.xhtml#Fig2), we have one
    member that is purposely made wider than the others. Your options for crossAxisAlignment
    are shown in the figure.


    ![](images/638603_1_En_14_Chapter/638603_1_En_14_Fig2_HTML.png)


    Figure 14-2


    crossAxisAlignment says how to distribute extra space along the cross axis


    There’s also one more: baseline. But it only makes sense in a Row and when you’re
    aligning Text()s of different heights. It lines up the base of the texts.'
  trans: '

    ### 常规 ListView


    此版本的 `ListView` 非常适合显示大量预定义的多样化小部件。你只需将 `children` 属性设置为已经定义好的列表即可。我们上面的代码示例已经展示了这一点。


    但 `ListView` 真正有趣的地方在于，你可以让它根据一个事物列表来构建新小部件——比如人员、产品、商店——任何你可以从数据库或 RESTful 服务中获取的数据。为了显示可滚动条目的动态数量，我们需要使用
    `ListView.builder` 构造方法。


    ### `ListView.builder`：当你需要从对象列表构建小部件时


    `ListView` 的另一个构造方法 `ListView.builder` 接收两个参数：一个 `itemCount` 整数和一个 `itemBuilder`
    函数。`itemBuilder` 函数会根据需要动态创建子小部件。当用户滚动时，`itemBuilder` 函数会运行并创建新的条目。


    `itemCount` 属性是一个整数，它告诉我们将要绘制多少个内容，因此我们通常将其设置为要滚动浏览的数组/集合的长度。`itemBuilder` 函数接收两个参数：上下文
    (context) 和一个整数，该整数对于第一个条目为 0，并且每次运行时递增。


    ```

    Widget build(BuildContext context) {

    return ListView.builder(

    scrollDirection: Axis.horizontal,

    itemCount: words.length,

    itemBuilder: (context, i) => Word("$i - ${words[i]}"),

    );

    }

    ```


    在这个例子中，我们为每个打印出的单词添加了一个索引。请注意，我再次向右滚动了（图 13-7）。


    ![图 13-7](img/638603_1_En_13_Fig7_HTML.jpg)


    `ListView.builder` 动态构建每个子小部件


    创建能够按行或列滚动的小部件列表非常棒。但如果你需要滚动的是方形小部件呢？


    ### GridView 小部件


    让我们调整一下示例。假设我们不再提供一些占位文本，而是给你一个人员列表，我们希望为每个人创建一个小的、大致方形的 `PersonCard` 小部件，其中包含照片和姓名。你可能希望它们以行和列的形式出现，而不是列表形式。`GridView`
    拥有与 `ListView` 相同的魔力，但它会在一个自动换行的网格中绘制内容。


    你可以像使用 `Row`、`Column`、`Wrap` 和 `ListView` 一样，将 `GridView` 的 `children` 属性设置为你想要显示的小部件列表。`GridView`
    会以网格形式显示它们，横向填充然后自动换行到下一行，并调整其可用空间直到刚好合适。最棒的是，它会自动滚动！


    `GridView` 有两个构造方法：`GridView.extent()` 和 `GridView.count()`。


    #### `GridView.extent()`


    *Extent* 这个词指的是子元素的最大宽度。`GridView` 仅允许其子元素增长到该尺寸。如果子元素试图变得更大，它就会在该行上放置另一个元素，并均匀地缩小所有子元素，直到它们刚好能横跨整个宽度。请看这个例子：


    ```

    Widget build(BuildContext context) {

    return GridView.extent(

    maxCrossAxisExtent: 300.0,

    children: _peopleList

    .map((Person person) => PersonCard(person))

    .toList(),

    );

    }

    ```


    请注意在图 13-8 和图 13-9 中，容器是如何调整到小于 300 像素的。`GridView` 决定在竖屏方向上可以并排容纳两个。但当旋转到横屏时，这两个容器本可以调整到大于
    300 像素，所以它每行放置了三个。


    ![图 13-9](img/638603_1_En_13_Fig9_HTML.jpg)


    同样的 `GridView.extent()` 旋转到横屏模式


    ![图 13-8](img/638603_1_En_13_Fig8_HTML.jpg)


    竖屏模式下的 `GridView.extent()`


    #### `GridView.count()`


    使用 `count()` 构造方法时，你可以指定所需的列数，*无论屏幕方向如何*。`GridView` 会负责调整其内容的大小以适应需求。在下面的例子中，我们告诉
    `GridView.count()` 无论屏幕方向如何，我们都想要四列，然后 `GridView` 会调整其子元素的大小，使其恰好并排为四列。这些显示在图
    13-10 和图 13-11 中。


    ![图 13-11](img/638603_1_En_13_Fig11_HTML.jpg)


    竖屏模式下同样的 `GridView.count()`


    ![图 13-10](img/638603_1_En_13_Fig10_HTML.jpg)


    横屏模式下的 `GridView.count()`


    ```

    Widget build(BuildContext context) {

    return GridView.count(

    crossAxisCount: 4,

    children: _peopleList

    .map((Person person) => PersonCard(person))

    .toList(),

    );

    }

    ```


    `GridView.extent()` 可能更有用，因为无论设备如何，内容的大小都大致保持不变，这比保持列数一致更符合常见的需求。


    ## 结论


    设备上容纳不下足够多的小部件可能是最常见的情况，而这也许是最难优雅解决的问题，因此能坚持学到这里本身就是一个重要的成就。在本章中，我们为你提供了针对该问题的多种解决方案，并帮助你判断在给定情况下哪种方案最佳。


    这是我们布局场景五步中的第三步。接下来，让我们在第四部分（下一章）中介绍如何优雅地分配额外空间。


    # 14. 布局——填充额外空间


    我们正深入进行场景布局的过程。请记住，这是我们遵循的步骤。


    1.  布局整个场景

    2.  相对定位小部件

    3.  处理溢出，例如当小部件无法适应屏幕时

    4.  处理额外空间，例如当屏幕比实际需要更大时

    5.  微调位置


    我们现在已经知道如何处理整个场景，如何使小部件彼此相对定位——上下排列或并排显示——以及如何处理它们过大而无法容纳的情况。这些是步骤一、二和三。现在，让我们来处理在
    `Row` 或 `Column` 中填充可能看起来不太美观的额外空间的任务。


    ### 如果留有额外空间怎么办？


    与空间不足相比，这是一个好问题。你真正需要回答的唯一问题是如何分配这些额外空间。你希望在每个子小部件周围分配多少空间？你有几个选择。最简单快捷的方法是使用
    `mainAxisAlignment` 和 `crossAxisAlignment`。


    ### `mainAxisAlignment`


    `mainAxisAlignment` 是 `Row` 或 `Column` 的一个属性（图 14-1）。通过它，你可以控制如何沿着主轴分配额外空间——对于
    `Column` 是垂直方向，对于 `Row` 是水平方向：


    ```

    child: Column(

    mainAxisAlignment: MainAxisAlignment.spaceEvenly,

    children: [

    SubWidget(),

    SubWidget(),

    ],

    ),

    ```


    你有几种选择。


    ![图 14-1](img/638603_1_En_14_Fig1_HTML.png)


    `mainAxisAlignment` 指定如何沿着主轴分配额外空间


    ### `crossAxisAlignment`


    `crossAxisAlignment` 也是 `Row` 或 `Column` 的一个属性；它决定当小部件在 `Row` 中高度不同或在 `Column`
    中宽度不同时，额外空间应放置在哪里。在图 14-2 中，我们有意让其中一个成员比其他成员更宽。图中显示了 `crossAxisAlignment` 的可选值。


    ![图 14-2](img/638603_1_En_14_Fig2_HTML.png)


    `crossAxisAlignment` 指定如何沿着交叉轴分配额外空间


    还有一个选项：baseline。但它仅在 `Row` 中，并且当你对齐不同高度的 `Text()` 组件时才有意义。它会将文本的基线对齐。

