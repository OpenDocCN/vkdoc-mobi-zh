    The “No devices available” error is common, and you can usually ignore that one.
    It just means that at that moment no emulators were running.


    Here’s an example of what we prefer to see – everything checks out:


    ```

    $ flutter doctor

    Doctor summary (to see all details, run flutter doctor -v):

    Flutter (Channel beta, vX.Y.Z, on Mac OS X X.Y.Z, locale en-US)

    Android toolchain - develop for Android devices (SDK version X.Y.Z)

    Xcode - develop for iOS and macOS (Xcode X.Y)

    Android Studio (version X.Y)

    VS Code (version X.Y.Z)

    Connected device (1 available)

    • No issues found!

    ```


    flutter doctor not only detects and reports problems but it usually prescribes
    the fix for each. It will even tell you when it is time to upgrade itself via
    “flutter upgrade.”


    #### Flutter Upgrade


    Yes, the initial installation of the Flutter SDK was a little daunting, but the
    upgrade is a breeze. You’ll literally type two words, “flutter upgrade”:


    ```

    $ flutter upgrade

    Upgrading Flutter from /usr/local/bin/flutter...

    From https://github.com/flutter/flutter

    2d2a1ff..a72edc2  beta       -> origin/beta

    3932ffb..cc3ca9a  dev        -> origin/dev

    5a3a46a..a085635  master     -> origin/master

    * [new branch]      refactor   -> origin/refactor


    * [new tag]         vX.A.B    -> vX.Y.Z

    Updating c382b8e..a72edc2

    11 files changed, 413 insertions(+), 302 deletions(-)

    Building flutter tool...

    Upgrading engine...

    Downloading ios-deploy...                                 0.3s

    Flutter X.Y.Z • channel beta • https://github.com/flutter/flutter.git

    Framework • revision a72e06 (23 hours ago) • 20XX-YY-ZZ 15:41:01 -0700

    Engine • revision b863200c37

    Tools • Dart X.Y.Z

    Running flutter doctor...

    Doctor summary (to see all details, run flutter doctor -v):

    Flutter (Channel beta, vX.Y.Z, on Mac OS X X.Y.Z, locale en-US)

    Android toolchain - develop for Android devices (SDK version X.Y.Z)

    Xcode - develop for iOS and macOS (Xcode X.Y)

    Android Studio (version X.Y)

    VS Code (version X.Y.Z)

    Connected device (1 available)

    • No issues found!

    ```


    Note that flutter doctor is automatically run as the last step, confirming that
    all is well. Upgrading is a piece of cake.


    ## The Flutter Development Process


    Now that we have all the tools installed and up to date; let’s create an app and
    run it through the debugger.


    ### Scaffolding the App and Files


    Create a whole new Flutter app by running …


    ```

    $ flutter create my_app

    ```


    This will create a subfolder under the current folder called my_app. It will be
    full of ready-to-run Dart code.


    Tip


    The app name is case insensitive, so you should make it all lowercase. Dashes
    are illegal characters, so you can’t use kebab-casing. The recommended casing
    is lowercase_with_underscores.


    ### Anatomy of a Flutter Project


    It’s not critical that you know about all of the files and folders that are in
    the project you just created. But if you’re curious, let’s quickly walk through
    a newly created Flutter project shown in Figure [2-6](#638603_1_En_2_Chapter.xhtml#Fig6).


    ![](images/638603_1_En_2_Chapter/638603_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    A fresh Flutter project made by flutter create


    You’ll have these folders:


    *   android, ios, web, linux, windows, macos – These are the platform-specific
    parts of the project. You won’t need to touch these unless you''re doing something
    to make your app run differently on different platforms.


    *   lib – This is the home of all of your Dart source code. You will build your
    app’s hierarchy here. This is where you’ll spend nearly all of your time and attention.


    *   test – If you have unit tests (and you probably should eventually), put them
    here.


    And you’ll have these files:


    *   pubspec.yaml – This is essentially the project file for Dart projects. This
    is where we set our project name, description, dependencies, and more. Be sure
    to read the comments in here to get a better picture of what is suggested and
    possible.


    *   .gitignore and README.md – These will be very familiar to devs who use Git
    and GitHub for their source code repository. Others won’t care.


    *   analysis_options.yaml – Linting rules and setup for your project. This instructs
    the IDE how to warn you when you write ugly code. If it is too aggressive and
    you want to turn off some of the rules, just delete the lines or comment them
    out. An explanation of all of the linting rules can be found here: [`http://dart-lang.github.io/linter/lints/`](http://dart-lang.github.io/linter/lints/).'
