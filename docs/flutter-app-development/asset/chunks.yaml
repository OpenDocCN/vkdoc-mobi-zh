    # 结论


    不算太糟，对吧？我们从对通过 HTTP 读写数据几乎一无所知，到能够使用一些相当高级的技术（如类型化反序列化模式和 `FutureBuilder` 组件）来完成一个综合性示例。


    如果你按照我上面的代码示例操作，你的应用已经能够完美地读取 HTTP 数据。但它看起来仍然不会像截图那样。你看，我使用了样式和主题来让它更赏心悦目。样式对我们来说仍然有点神秘。嘿，让我们在下一章揭开这个谜团吧！


    脚注 1   2   3   4


    # 10. 使用主题进行样式设计


    为组件设置样式对你来说并不完全陌生。我们在之前的章节中已经触及了一些小的样式特性，并且在代码示例中你也看到了样式技术。但本章，我们将深入探讨样式。终于到了！


    你可以始终进行底层样式设计，所以我们先从它开始。然后，我们将过渡到更复杂但更清晰的——使用主题。最后，我们将通过颜色和自定义字体的细节来结束本章。


    ## 思考 Flutter 样式


    Flutter 中的样式借鉴了 Android、iOS 开发和 Web 开发的最佳理念。但它并没有*完全照搬*它们的技术。Flutter 有自己的方式，如果将
    Web 的类比过度延伸，那将是一个错误。Flutter 的样式不是 CSS。虽然 CSS 有某些属性会传递给子元素，但 Flutter 样式*不会*继承。例如，你*不能*在你的自定义组件上设置字体系列，然后让其中所有的
    `Text`、`TextField` 和按钮都立即开始使用该字体渲染。为了实现这种效果，我们需要创建并应用一个主题。但首先，让我们学习如何将样式应用到元素上。


    ## 单独样式


    我们在之前的章节和代码示例中已经窥见过这一点。大多数组件都接受一个 `style` 属性，以及通常与样式相关的属性，如内边距、边框等。你可以（有时也确实会）手动设置这些值，通常是在你只需要对某个组件的单个实例（例如一个单独的
    `Text` 组件）进行样式设置时。


    ### 文本样式设计


    ```

    Text(aString, style: TextStyle(

    fontSize: 12.0,

    fontWeight: FontWeight.bold,

    color: Colors.blue,

    fontStyle: FontStyle.italic,

    )),

    ```


    `Text` 组件有一个 `style` 属性，它接受一个 `TextStyle` 对象（图 10-1）。


    ![](img/638603_1_En_10_Fig1_HTML.jpg)


    图 10-1


    有样式和无样式的对比


    你只需将 `style` 属性设置为一个 `TextStyle` 组件的实例，并设置其属性。`TextStyle` 支持大约 20 个属性。以下是最常用的几个：


    *   `color` – 任何有效的 1600 多万种颜色之一

    *   `decoration` – `TextDecoration.underline`、`overline`、`strikethrough`、`none`

    *   `fontSize` – 双精度浮点数。字符的高度（像素数）。默认大小为 14.0 像素

    *   `fontStyle` – `FontStyle.italic` 或 `normal`

    *   `fontWeight` – `FontWeight.w100` 到 `w900`。或者 `bold`（即 `w700`）或 `normal`（即
    `w400`）

    *   `fontFamily` – 一个字符串


    `fontFamily` 是一个更大的话题，我们将在本章末尾讨论。


    许多组件都有一个 `style` 属性，如果你只需要设置一个组件的样式，这是最佳方式。但最佳实践是尽可能避免使用单独样式。创建并应用一个主题会更好、更清晰。


    ## 批量更改值


    真人真事。我有一个接近完成的应用。它美轮美奂。我从客户的品牌标志中选择了颜色，以为他们会感激我遵循他们的营销方案。嗯，他们的一种颜色是深栗色，我大量使用了它。我的客户讨厌那种颜色，认为它的红色调会传达“危险”或“错误”的信息。你知道吗？他们是对的！我之前就是没建立那种联系。所以我当然想把它全部改掉。


    现在，想象一下我必须做什么。遍历整个应用？在数百个 `Text` 组件、边框、阴影、按钮、卡片和磁贴中找到所有出现该颜色的地方？不。因为我使用了主题，在客户等待的时候，我在一个地方就把它改好了。事实上，我们反复尝试了不同的颜色，直到找到他们喜欢的配色方案。这超级简单，一点也不麻烦！让我们来看看使用主题设置样式的正确方法。


    ## 主题


    当你使用主题时，你可以预先在一个文件中一次性地定义样式。为什么呢？


    1.  你的整个应用会有一致、连贯的外观和感觉。

    2.  在整个应用中更改样式变得几乎不费吹灰之力。


    使用主题包括五个相当简单的步骤：


    1.  设置 `ColorScheme`

    2.  设置 `TextTheme`

    3.  创建特定组件的主题

    4.  将所有内容组合到主题中

    5.  如有需要，覆盖底层组件的样式


    让我们来逐一完成这些步骤。


    ### 1. ColorScheme（配色方案）


    `ColorScheme` 构成了应用的基本颜色：


    *   `primary` – 主要品牌颜色

    *   `secondary` – 强调色

    *   `tertiary` – 较不突出的颜色

    *   `error` – 用于突出显示错误

    *   `background` – 常规背景颜色

    *   `outline` – 用于边框

    *   `surface` – 用于卡片和容器背景色


    其中四种颜色——`primary`、`secondary`、`tertiary` 和 `error`，各自进一步细分为“on”、“container”和“onContainer”。例如，`primary`
    有：


    *   `primary` – 主要品牌颜色

    *   `onPrimary` – 与 `primary` 对比鲜明的颜色；适合阅读

    *   `primaryContainer` – 适合 `primary` 的背景色

    *   `onPrimaryContainer` – 在 `primaryContainer` 背景上可读的文本颜色


    这些都是经过科学选择、看起来赏心悦目的颜色，它们由单一的主色（*种子*颜色）生成。


    ```

    var _scheme = ColorScheme.fromSeed(seedColor: );

    ```


    **注意：** `ColorScheme.fromSwatch( )` 本身并未废弃，但它是为 Material 1 和 2 设计的。如果你使用的是 Material
    3 及更高版本，请使用 `ColorScheme.fromSeed( )`。


    来看看三种不同配色方案下的标准颜色（图 10-2 至 10-4）：


    ![](img/638603_1_En_10_Fig4_HTML.jpg)


    图 10-4


    焦橙色方案


    ![](img/638603_1_En_10_Fig3_HTML.jpg)


    图 10-3


    蓝色方案


    ![](img/638603_1_En_10_Fig2_HTML.jpg)


    图 10-2


    绿色方案


    你当然可以手动创建 `ColorScheme` 对象并设置其每种颜色，但那工作量巨大！相反，让 Flutter 通过 `ColorScheme.fromSeed()`
    为你完成创建初始方案的艰巨工作，并提供你的种子颜色。


    **提示：** 除了上面列出的颜色之外，还有 `shadow`、`scrim`、`surface`、`surfaceVariant` 等——总共大约 30
    种。不必费心去记住它们。既然你已经明白了概念，到时候查一下你需要的即可。


    如果你决定调整一种或多种默认颜色，请使用 `copyWith()`：


    ```

    ColorScheme _colorScheme = ColorScheme.fromSeed(

    seedColor: Colors.green,

    ).copyWith(

    error: Color.fromARGB(255, 191, 87, 0),

    onError: Colors.white,

    );

    ```


    这将用一个命令设置所有颜色。

