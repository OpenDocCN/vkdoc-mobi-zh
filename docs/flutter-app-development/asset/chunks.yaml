  trans: '

    # BLoC 模式


    BLoC 是业务逻辑组件的缩写，它既不是一个库，也不是一个小部件，而是一种设计模式。BLoC 模式最初是为了让代码能够在网页、移动应用和后端之间复用而创建的。由于它诞生于谷歌，Flutter
    社区自然而然地接受了它，并一度使其成为状态管理的代名词。


    BLoC 将数据视为流，并以响应式的方式改变状态。它将 UI（用户界面）与业务逻辑分离，使你的代码更具以下优势：


    *   **可维护性** – 关注点分离更清晰，代码导航和更新更轻松。

    *   **可测试性** – 你可以独立于 UI 交互来测试业务逻辑。

    *   **可扩展性** – 有效处理复杂的应用状态。


    BLoC 包含多个不同的部分：

    *   `StreamControllers`：控制数据流

    *   `StreamTransformers`：在数据流入时进行处理

    *   `StreamBuilders`：在新值到达时运行，并将其渲染到 UI 中


    优点：社区中有很多人可以（并且愿意）帮助你。它是一个可靠且经过充分验证的模式。


    缺点：BLoC 理解起来和写起来都不简单。虽然有 `bloc` 库可以提供帮助，但大多数人在编写 BLoC 组件时并不使用该库，因此它处于非常底层的水平。


    ## 一些库


    ### ScopedModel


    [ScopedModel](https://pub.dartlang.org/packages/scoped_model)^(¹⁵) 是一个由 Brian
    Egan 从 [Fuchsia](https://fuchsia.googlesource.com/)^(¹⁶) 代码库“厚颜无耻地借用”而来的库（嘿，这是
    Brian 自己的话，可不是我的！他是个谦虚的人）。ScopedModel 创建了能够注册监听器的数据模型。每个模型在数据发生变化时通知其监听器，以便它们进行自我更新。巧妙的设计。


    这是由 Brian 维护的一个外部第三方包。它构建在 `InheritedWidget` 之上，提供了一种稍好一些的方式来访问、更新和改变状态。它允许你轻松地将数据模型从父级小部件向下传递给其子孙后代，并在模型更新时重新构建使用该模型的所有子级小部件。


    优点：很好地完成了分离表示层和数据的任务。与本章其他方法相比，它更易于理解。


    缺点：该代码库目前未得到维护，可能是因为开发者倾向于使用更现代的解决方案。一些人认为 `ScopedModel` 在处理复杂应用时存在性能问题。


    ### Redux 与 Hooks


    我之所以包含这两个库，是专为 React 开发者准备的。这两个库都模拟了同名的 React 功能。如果你并非来自 React 世界，请跳过本节。但如果你热爱
    React，这些可能是你最简单的选择。瞧，你已经跨越了学习曲线。[flutter_​redux](https://pub.dartlang.org/packages/flutter_redux)^(¹⁷)
    由我们之前在 `ScopedModel` 中提到过的 Brian Egan 编写，[flutter_​hooks](https://pub.dartlang.org/documentation/flutter_hooks)^(¹⁸)
    则由巴黎的 Rémi Rousselet 编写，你稍后将在 Provider 和 Riverpod 部分了解到他。


    优点：性能非常好。可扩展性很强。


    缺点：除非你已经熟悉 React，否则学习曲线非常陡峭。


    ### Provider


    我在这里提及 Provider，并不是因为你可能会用到它，而是因为你可能会听到它的名字，我不希望你被它诱惑。有更好的选择。Provider 一度是最流行的
    Flutter 状态管理库。但它已被一个更优的选择所取代：Riverpod（在本章最后一节中介绍）。


    优点：一个功能强大且相对简单的包。


    缺点：由于其继任者 Riverpod 的出现，未得到积极维护。


    ### 哇！好多包！


    是不是感到困惑了？这不能怪你。这些包以不同的方式解决同一个问题，有些相似，另一些则采用截然不同的策略。没人期望你除了知道存在这些工具之外还有什么更多了解。当你听到有人说“我们的状态变得混乱了。也许我们应该考虑一下
    BLoC 或 ScopedModel”时，你至少能明白他们在谈论哪种类型的东西。然后，你就可以深入研究这些技术，看看自己可能想用哪一个。


    但是，要是能对一两种实际可用的解决方案有所了解，岂不是很好？让我们为其中两个状态管理解决方案编写一点代码：最简单的 `raw_state`，以及最流行且最健壮的
    `flutter_riverpod`。


    ## Raw State


    `raw_state` ([`https://pub.dev/packages/raw_state`](https://pub.dev/packages/raw_state))
    是学习 Flutter 的理想选择，这也是我们在此介绍它的原因。它也适用于非常简单的应用程序和启动你的 MVP。它通过创建一个名为 `rawState` 的全局变量来解决小部件之间的共享问题。一旦你执行
    `flutter pub add raw_state` 并导入 `raw_state`，这个 `rawState` 变量就会自动定义。


    ```dart

    import ''package:raw_state/raw_state.dart'';

    ```


    然后，在任何小部件中，你可以将任意数量的值写入 `rawState`：


    ```dart

    String foo = "raw_state is stupidly simple";

    rawState.set("aString", foo);

    rawState.set("aDate", DateTime.now());

    rawState.set("aMap", {"foo":"bar","baz":100} );

    ```


    注意


    键可以是任意字符串，值可以是任何东西——`String`、`double`、`int`、`bool`、`Array`、`Map`、对象……等等。


    在任何其他小部件中，你可以从 `rawState` 读取这些值。只需调用 `get` 并传入键即可：


    ```dart

    String foo = rawState.get("aString");

    DateTime someDate = rawState.get("aDate");

    Map aMap = rawState.get<Map>("aMap");

    ```


    提示


    数据类型（即泛型）是可选的，但出于安全原因，这是一种良好的实践。请注意，为了演示，我们在第一次使用时省略了它，但在其余部分都包含了。


    `raw_state` 简单得离谱。也许太简单了。它缺乏许多其他库具备的许多保护机制和任何自动更新功能。因此，让我们把注意力转向最后一个库——Riverpod，它由前面提到的
    Rémi Rousselet 编写。


    ## Riverpod


    在撰写本文时，Riverpod 是首选的状态管理解决方案。它功能完备且健壮，并且比上面的一些库更简单。这是一个成功的组合。


    警告


    请不要误解。我并没有说 Riverpod 很简单。它并不简单。所以，如果你近期不打算使用 Riverpod，直接跳到下一章也没关系。我将列出使用 Riverpod
    最简单的步骤，仅供你入门。但即便如此，它仍令人望而生畏。


    以下是使用 Riverpod 的六个基本步骤。


    一次性前期准备工作：


    1. 安装 `flutter_riverpod`

    2. 用 `ProviderScope` 包裹你的应用

    3. 编写一个 `Provider`


    然后，在每个需要的小部件中：


    1. 继承自 `ConsumerStateWidget`

    2. 使用 `ref.watch()` 读取数据

    3. 使用 `ref.read()` 写入数据


    让我们逐一审视这些步骤。


    ### 1. 安装 `flutter_riverpod`


    这一步很简单。要么将其添加到你的 `pubspec.yaml` 并运行 `flutter pub get`，要么直接运行：


    ```bash

    flutter pub add flutter_riverpod

    ```


    ### 2. 用 `ProviderScope` 包裹你的应用


    记住，在你的 `main` 函数中，我们调用 `runApp(App())`。只需用从 `flutter_riverpod` 导入的 `ProviderScope`
    包裹该应用即可：


    ```dart

    void main() => runApp(

    ProviderScope(

    child: App()

    )

    );

    ```

    '
- fmt: '### 3\. Write a Provider


    Before we can store values, we will create one provider *for each thing* we want
    to share. Let’s say we allow the user to pick their favorite color in one widget
    and then read it in the rest. We might create a `favColorProvier`:


    ```

    final favColorProvider =

    StateProvider((_) => Colors.red);

    ```


    Obviously, `StateProvider` is part of Riverpod.


    #### Wait, What Is This *Provider* You Speak Of?


    We’re done with prep, the steps that are done once and up-front. Before we turn
    to using Riverpod in individual widgets, let’s focus on this provider thing. In
    Riverpod terms, a provider … umm … *provides* a saved value to anyone that asks
    for it. To share values between otherwise encapsulated widgets, we’ll write to
    a provider in one widget and then read from that same provider in another. But
    how?


    With Riverpod, we no longer inherit from `StatefulWidgets`. Instead, we inherit
    from *Consumer*`StateWidgets`. Get it? You write a provider that *provides* a
    value and a consumer that *consumes* that value. Clever, no? This consumer has
    a `ref` property which can see the providers. Check it out …


    ### 4\. Inherit from ConsumerStateWidget


    Every widget that needs access to shared data should be written slightly differently.


    Don’t do this:


    ```

    class FavColor extends StatefulWidget {

    const FavColor({super.key});

    @override

    State createState() => _FavColorState();

    }

    class _FavColorState extends State {}

    ```


    Instead, do this:


    ```

    class FavColor extends ConsumerStatefulWidget {

    const FavColor({super.key});

    @override

    ConsumerState createState() => _FavColorState();

    }

    class _FavColorState extends ConsumerState {}

    ```


    You see, the magic is that these Riverpod-supplied classes have a property called
    `ref`. And `ref` knows about all of the providers you created above. Now let’s
    use it.


    ### 5\. Read Data with `ref.watch( )`


    In a stateful widget, the best way to read data from a given provider is with
    `ref.watch(theProvider)`, which will monitor the provider and trigger its widget
    to re-render when the value in the provider changes.


    ```

    Color favColor = ref.watch(favColorStateProvider);

    int favNumber = ref.watch(favNumberStateProvider);

    Person favPerson = ref.watch(favPersonStateNotifierProvider);

    ```


    Tip


    You can read data with `ref.read()` also. It’s just that `ref.read()` is bound
    one time only; `ref.read()` doesn’t update live but `ref.watch()` does.


    ### 6\. Write Data with `ref.read( )`


    Ironically, you can write with `ref.read()`. There are other ways, but this is
    the most straightforward. Just do this:


    ```

    ref.read(favColorStateProvider.notifier).state = newColor;

    ```


    When you assign the state of this provider, it will set the value and notify all
    the listeners – those who had subscribed earlier with `ref.watch()`.


    There you have it. You can setup, write to, and read from Riverpod providers.
    We’ll stop there. There’s a ton more to this robust and powerful package, but
    you’ve got the idea. We have limited pages to devote and Riverpod will undoubtedly
    change. So if you’re ready to go deeper (and I recommend that you do), start here:
    [`https://pub.dev/packages/riverpod`](https://pub.dev/packages/riverpod). It will
    steer you to Riverpod’s home page and documentation for more.


    ## Conclusion


    The more stateful widgets we have, the more state needs to be passed around between
    them. This can get very complex very quickly so we look to packages like Redux,
    Hooks, raw_state, and ScopedModel, but most popularly, Riverpod to tame state.
    Sure, you could do it by hand using other tools and techniques like BLoC and InheritedWidget
    but that becomes unrealistic when your app approaches a large size.


    Now that we can handle data *within* widgets and *among* widgets, let’s see how
    to handle data between our app and a server somewhere. Let’s look at making HTTP
    calls to read data and write data. Read on!


