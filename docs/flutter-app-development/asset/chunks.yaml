  trans: "\n![](img/979-8-8688-0485-4_CoverFigure.jpg)\n\nISBN 979-8-8688-0484-7 \
    \ \n电子书 ISBN 979-8-8688-0485-4  \n[`doi.org/10.1007/979-8-8688-0485-4`](https://doi.org/10.1007/979-8-8688-0485-4)\n\
    \n© Rap Payne 2024  \n本作品受版权保护。所有权利均独家授权给出版商，涉及材料的全部或部分内容，具体包括翻译、重印、插图复用、朗诵、广播、以微缩胶片或任何其他物理形式复制，以及电子方式的信息传输或存储检索、电子改编、计算机软件，或当前已知或未来开发的类似或不同方法。在本出版物中使用通用描述性名称、注册商标、商标、服务标志等，即使未明确声明，也不意味着这些名称不受相关保护法律和法规的约束，因此可自由使用。出版商、作者和编辑假定本书中的建议和信息在出版之日是真实准确的。出版商、作者或编辑均不对材料内容或可能存在的任何错误或遗漏提供明示或暗示的保证。出版商对已出版地图中的管辖权主张及机构隶属关系保持中立。\n\
    \n本 Apress 印记由隶属于 Springer Nature 的注册公司 APress Media, LLC 出版。  \n注册公司地址为：1 New\
    \ York Plaza, New York, NY 10004, U.S.A.\n\n*本书献给 Flutter 社区的各位同仁。我从未见过一个团体如此致力于帮助他人成功。你们是我的灵感和榜样。*\n\
    \n*特别感谢以下社区成员在 Flutter 问题上给予我的帮助。我这个得克萨斯人欠你们一份情！*\n\n*Andrew “Red” Brogdon（俄亥俄州哥伦布市）、Brian\
    \ Egan（蒙大拿州）、Frederik Schweiger（德国杜塞尔多夫）、Jeroen “Jay” Meijer（荷兰鹿特丹）、Jochum van\
    \ der Ploeg（荷兰兹沃勒）、Martin Rybak（纽约）、Martin Jeret（爱沙尼亚）、Nash Ramdial（特立尼达）、Nilay\
    \ Yenner（旧金山）、Norbert Kozsir（德国卡尔斯鲁厄）、Pooja Bhaumik（印度班加罗尔）、Randal Schwartz（俄勒冈州波特兰市）、Raouf\
    \ Rahiche（经阿尔及利亚的卡萨布兰卡）、Remi Rousselet（巴黎）、Rohan Tanaja（柏林）和 Scott Stoll（俄亥俄州克利夫兰市）。*\n\
    \n*但尤其要感谢 Simon Lightfoot（伦敦），我们都称他为“Flutter 低语者”。我所了解的 Flutter 知识中，有很大一部分是他教给我的。*\n\
    \n## 前言\n\n移动开发的世界已经发生了变化。为 iOS 和 Android 分别维护独立代码库的日子一去不复返。如今的开发者渴望效率、速度，以及用单一代码库触达更广泛受众的能力。这正是\
    \ Flutter 的闪光之处。\n\n作为 Google 开发者专家，我亲眼见证了 Flutter 的变革性潜力。其优雅的架构，结合强大的 widget\
    \ 库，让开发者能够以前所未有的速度创建美观且高性能的应用。热重载的魔力让实验变得轻而易举，大幅缩减了开发时间并加速了迭代过程。\n\n但不要被 Flutter\
    \ 的强大所迷惑——它也并非没有挑战。学习一门新语言并驾驭庞大的工具和库生态系统可能会令人望而生畏。而这正是本书的价值所在。\n\n本书提供了 Flutter\
    \ 的全面指南，带你从最基础的入门知识一直深入到状态管理和 API 集成等更高级的主题。本书精心编排，包含清晰的解释、实用的示例和动手练习，这将巩固你的理解，并赋能你构建出色的应用。\n\
    \n无论你是一位寻求拓展技能栈的经验丰富的开发者，还是一位渴望进入移动开发世界的好奇新手，本书都是你的完美伴侣。它是我朋友 Rap Payne 的奉献和专业知识的证明，我相信它将为你提供成为成功\
    \ Flutter 开发者所需的知识和信心。\n\n那么，拥抱跨平台开发的未来，深入阅读这本宝贵资源的每一页吧。准备好用 Flutter 构建美观且高性能的应用！\n\
    \nRandal L. Schwartz  \n2024 年 5 月\n\n## 全球赞誉：*Flutter App Development: How to\
    \ Write for iOS and Android at Once*\n\n> “Rap 为 Flutter 多平台开发的新手撰写了一本出色的入门指南，内容丰富。”\n\
    > \n> —Frederik Schweiger（德国杜塞尔多夫），国际 Flutter 黑客马拉松组织者，Flutter School 创始人\n\n\
    > “一本很棒的书！它涵盖了一个初学者可能想知道的一切，甚至更多。它不仅解释了 Flutter 是什么，还解释了它为什么以这样的方式存在和工作。同时，它还就沿途常见的陷阱提供了极好的建议。强烈推荐。”\n\
    > \n> —Jeroen “Jay” Meijer（荷兰鹿特丹），Flutter Community GitHub 负责人\n\n> “Rap 的书是一本很好的\
    \ Flutter 入门书籍。它涵盖了编写第一个应用所需的所有重要主题，同时也为更有经验的开发者提供了宝贵的信息。”\n> \n> —Norbert Kozsir（德国卡尔斯鲁厄），Flutter\
    \ Community 编辑\n\n> “作为一名非英语母语者，我对这本书的简洁性以及我能毫不厌倦地阅读和理解这么多内容感到非常震撼。”\n> \n> —Raouf\
    \ Rahiche（阿尔及利亚），Flutter 演讲者、开发者与讲师\n\n> “作为 Flutter 的早期采用者和 Flutter Community\
    \ 的原始成员之一，Rap 是世界上最重要的 Flutter 权威之一。如果说文档是为工程师而写、由工程师所写，那么 Rap 则是一个（谢天谢地！）能用令人愉悦的风格写作并能被其他人类轻松理解的人。”\n\
    > \n> —Scott Stoll（俄亥俄州克利夫兰市），Flutter 代码库贡献者，Flutter Study Group 联合创始人\n\n## 本书适合谁？\n\
    \n如果你是一位具有一定面向对象语言（如 Java、C#、C++ 或 Objective-C）开发经验的开发者，并且希望使用 Flutter 创建 Android\
    \ 应用、iOS 应用或 Web 应用，那么本书适合你。如果你希望创建一个在多个平台上运行的应用，并且是 Flutter 新手，那么本书尤其重要。\n\n\
    如果你已经有一些 Flutter 经验，你无疑会学到新东西，但我们并不假设你具备任何 Flutter 的预备知识或经验。我们编写所有章节时，都假设 Flutter\
    \ 中的一切对你来说都是全新的。\n\n如果你了解任何关于 iOS 开发、Android 开发或 Web 开发的知识，那肯定有助于理解相关主题，因为其中有许多与\
    \ Flutter 的类比。你对这些了解得越多越好，尤其是 JavaScript 和 React。但即使你一无所知，也无需担心。它们绝不是必需的。\n\n\
    了解 Dart 语言也会有帮助。Dart 有一些独特但非常酷的特性，我们认为这些是最佳实践。我们本可以通过不使用这些最佳实践来“简化”代码，但从长远来看，这对你没有好处。相反，我们直接使用它们，但会在附录\
    \ A “Dart 语言概述”中解释这些内容。在那里，我们为你提供一份速查表，其中包含足够编写代码的细节，随后会对那些可能让其他语言开发者感到意外的特性进行更深入的说明。请特别注意名为“关于\
    \ Dart 的意外之处”的部分。\n"
- fmt: '# What Is Covered?


    This book teaches you how to create fully functioning and feature-rich apps that
    run on iOS, Android, desktops, and the Web.


    1.  Hello Flutter – Welcome to Flutter! We’re giving you a feel for why you’re
    here. What problems does Flutter solve? Why the boss would choose Flutter vs.
    some other solution.


    2.  Developing in Flutter – Flutter’s set of tools aren’t always straightforward.
    We explain what each tool does and how to use it. This chapter guides you through
    the process of write-debug-test-run. We get an understanding of the tooling including
    installation and maintenance.


    3.  Everything Is Widgets – Widgets are super important to Flutter since they’re
    the building blocks of every Flutter app. We show why and provide the motivation
    and how-to to create widgets. Topics include composition, UI as code, widget types,
    keys, and stateless vs. stateful widgets.


    4.  Value Widgets – A deep dive into widgets that hold a value, especially user-input
    fields. Topics include `Text`, `Image`, and `Icon` widgets and how to create forms
    in Flutter.


    5.  Responding to Gestures – How to make your program do things in response to
    user actions like taps, swiping, pinching, and the like. We’ll show you the button
    family and the `GestureDetector` widget.


    6.  Navigation and Routing – Navigation is making the app hide one widget and
    show another in response to user actions. This makes them feel like they’re moving
    from one scene to another. We’ll cover stack navigation, tab navigation, and drawer
    navigation.


    7.  Managing State – How to get data from one widget to another and how to change
    that data. We cover how to create `StatefulWidgets` and design them in the best
    way.


    8.  State Management Libraries – An overview of several libraries and a how-to
    for a super-simple library called Raw State and the most popular one – Riverpod.


    9.  Making RESTful API Calls with HTTP – How to read from and write to an HTTP
    API server. This is where we show how to make `GET`, `POST`, `PUT`, `DELETE`,
    and `PATCH` requests.


    10.  Styling with Themes – This is where we answer all the questions needed to
    get a real-world app looking good and staying consistent throughout with styles
    and themes.


    11.  Laying Out Your Widgets – The beginning of the final section, this chapter
    introduces the idea of layouts and steps to control layouts and exposes the Flutter
    layout algorithm.


    12.  Layout – Positioning Widgets – How to control how widgets are placed side
    by side and/or above and below.


    13.  Layout – Fixing Overflows – What to do when you’re trying to draw *more than*
    will fit on a screen.


    14.  Layout – Filling Extra Space – What to do when you’re trying to draw *less
    than* will fit. What do you do with that extra space to make it look nice?


    15.  Layout – Fine-Tuning Positioning – How to adjust the last bits using borders,
    padding, and margins. How to make nonrectangular shapes.


    16.  Layout – Special Presentation Widgets – Widgets for when a simple layout
    won’t do the trick – slivers, stack, card, positioned, and table.


    And we have five appendixes.


    1.  Dart Language Overview – An easy-to-parse cheat sheet for Dart itself broken
    into expected features and pleasant surprises.


    2.  Futures, Async, and Await – Handling asynchronous activities in Flutter.


    3.  Including Packages in Your Flutter App – How to find and include the wealth
    of third-party, publicly available, and free packages. Also how to write and publish
    your own.


    4.  How to Work with Files – Using libraries. Futures, async, and await. Bundling
    files with your app. Reading and writing a file. JSON serialization.


    5.  How to Debug Your Layout – Interpreting what you see in the visual debugger
    in both VS Code and Android Studio.


    ## What Is Not Covered and Where Can I Find It?


    As importantly, you should know what not to expect in the book. We will not give
    you a primer on the Dart programming language beyond the aforementioned appendix.
    We simply didn’t think it was the best use of your time and wanted to dive right
    into Flutter. If you feel you need a primer later on, go here: [`https://dart.dev/guides/language/language-tour`](http://dart.dev/guides/language/language-tour)
    followed by [`https://dart.dev/tutorials`](http://dart.dev/tutorials). We chose
    not to discuss deploying to the app stores. The stores already do a fine job of
    explaining how to submit an app. That, and the process, changes so frequently
    that your definitive resource ought to be the stores themselves. You’ll find instructions
    at [`https://developer.apple.com/ios/submit/`](http://developer.apple.com/ios/submit/)
    and here: [`https://play.google.com/apps/publish`](http://play.google.com/apps/publish).
    And we aren’t going to cover certain advanced topics like device-specific development
    in iOS and Android or adding Flutter to an existing iOS/Android project. These
    and so many other topics can be found on the Web by searching.


    Preface


    Welcome to *Flutter App Development: How to Write for iOS and Android at Once*!
    If you’re familiar with my earlier work, *Beginning App Development with Flutter*,
    you might recognize some echoes here and there. That’s because this book expands
    on and renews the topics covered in the first, incorporating the core concepts
    that made it valuable.


    However, consider this a brand-new journey into the ever-evolving world of Flutter
    development. Since the publication of my first book, Flutter has undergone significant
    advancements, offering exciting new features and improved workflows. This book
    reflects those changes, providing a comprehensive and up-to-date exploration of
    the framework.


    While some sections may contain familiar content, you’ll find a wealth of new
    material within these pages. In the first book, we tried to cover layouts in one
    chapter. Big mistake. In this book, we expanded that to *six* chapters. In the
    first book, we talked about state management libraries but didn’t explain how
    they worked. Thanks to critique by Remi Rousselet, we moved those chapters much
    sooner and wrote a how-to for his Riverpod library. And thanks to certain of my
    clients like Disney and the US State Department, I expanded on existing concepts,
    drilled deeper into specific functionalities, introduced entirely new sections
    that address the latest developments, and rearranged the flow to make it easier
    to learn Flutter.


    Whether you’re an intermediate Flutter developer building on the basics or a newcomer
    embarking on your first project, this book aims to be your trusted companion.
    We’ll guide you through the intricacies of building beautiful and performant iOS
    and Android applications with Flutter, equipping you with the knowledge and skills
    to navigate the ever-evolving landscape.


    So, even if you’ve traveled this path before, get ready to embark on a fresh adventure
    with *Flutter App Development: How to Write for iOS and Android at Once*!


    Rap Payne


    September 2024


