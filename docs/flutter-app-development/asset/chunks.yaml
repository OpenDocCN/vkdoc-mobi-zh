- fmt: "### Filling the Drawer\n\nAdding the drawer is easy. The trick is getting\
    \ entries into the drawer and then making them navigate to another widget. Note\
    \ that `Drawer` has a *child* property that accepts a single widget. To get multiple\
    \ children in your drawer, you will use a widget that supports them such as `Column`\
    \ (doesn’t scroll) or `ListView` (scrolls).\n\nWhichever you choose, you’ll want\
    \ to put something that is tappable because to navigate, you’re going to call\
    \ `Navigator.push()` or `Navigator.pushNamed()` just like you did with stack navigation.\n\
    \n**Tip**  \nThere’s a cool widget called a `DrawerHeader` that is built to take\
    \ up a large area at the top of the drawer. It is great for putting your logo\
    \ or other branding information to sort of remind the user what app they are in.\
    \ It is cosmetic only but it really does look cool.\n\nHere’s the code all together.\
    \ It’s the code that generated the screenshot in Figure [6-4](#638603_1_En_6_Chapter.xhtml#Fig4).\n\
    \n```dart\nreturn Drawer(\n  child: ListView(\n    children: [\n      DrawerHeader(\n\
    \        child: Stack(\n          children: [\n            Image.asset('lib/assets/Logo.jpg'),\n\
    \            Container(\n              alignment: Alignment.bottomRight,\n   \
    \           child: Text('My Brand')),\n          ],\n        ),\n      ),\n  \
    \    ListTile(\n        leading: const Icon(Icons.looks_one),\n        title:\
    \ const Text('Widget 1'),\n        onTap: () => Navigator.pushNamed(context, '/widget1')\n\
    \      ),\n      ListTile(\n        leading: const Icon(Icons.looks_two),\n  \
    \      title: const Text('Widget 2'),\n        onTap: () => Navigator.pushNamed(context,\
    \ '/widget2')\n      ),\n      ListTile(\n        leading: const Icon(Icons.looks_3),\n\
    \        title: const Text('Widget 3'),\n        onTap: () => Navigator.pushNamed(context,\
    \ '/widget3')\n      ),\n    ],\n  ),\n);\n```\n\nDrawer navigation is great and\
    \ all, but UX experts have a few problems with it. They claim^([(12)](#fn12))\
    \ that it drastically reduces the usability of apps, making your app less discoverable\
    \ and more difficult. They say the problem is that the options are hidden until\
    \ the user asks for them. Their objection could be resolved with an affordance\
    \ that is always visible. Speaking of which …\n\n## Tab Navigation\n\nAs you would\
    \ imagine, a tab system matches N tabs with N widgets. When the user presses tab\
    \ 1, they see widget 1 and so forth (Figure [6-5](#638603_1_En_6_Chapter.xhtml#Fig5)).\
    \ The matching is done with a `DefaultTabController`, a `TabBar` widget with `Tab`s,\
    \ and a `TabBarView` widget.\n\n![](images/638603_1_En_6_Chapter/638603_1_En_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6  \nSame `TabBar` with the fourth tab chosen\n\n![](images/638603_1_En_6_Chapter/638603_1_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5  \nA `TabBar` with the second tab chosen\n\n**Tip**  \nWhile there’s\
    \ no hard upper limit on the number of tabs you can have, your app will get frustratingly\
    \ hard to use if you put too many on the `TabBar`. It’s just too tough to press\
    \ those tiny, tiny tabs. If you’re desperate, you can set `isScrollable` to `true`\
    \ and let the user know they can swipe left to scroll the tab list.\n\n### DefaultTabController\n\
    \nThe `DefaultTabController` is the least obvious part. Just know that you have\
    \ to have one or you get the error in Figure [6-7](#638603_1_En_6_Chapter.xhtml#Fig7).\n\
    \n![](images/638603_1_En_6_Chapter/638603_1_En_6_Fig7_HTML.jpg)\n\nFigure 6-7\
    \  \nWhen you forget a `TabController`\n\nThe easiest way to create one is to\
    \ wrap everything in a `DefaultTabController()` with a `length` property. Problem\
    \ solved. This part is pretty simple – so simple you may wonder why Flutter doesn’t\
    \ create one implicitly for you. If you were thinking that, you wouldn’t be wrong:\n\
    \n```dart\nWidget build(BuildContext context) {\n  return DefaultTabController(\n\
    \    length: 5,\n    child: Scaffold(\n      ...\n    );\n  }\n}\n```\n\n### TabBarView\n\
    \nNext you’ll want to add a `TabBarView` widget. This holds the widgets that will\
    \ eventually be shown when the user presses a tab, defining *where* they will\
    \ be shown. Usually this is the entire rest of the screen, but you have the opportunity\
    \ to put widgets above the `TabBarView` or below it or really anywhere around\
    \ it. You should provide the same number of widgets as the `length` property of\
    \ the `DefaultTabController` (duh):\n\n```dart\nchild: Scaffold(\n  ...\n  body:\
    \ TabBarView(\n    children: [\n      WidgetA(),\n      WidgetB(),\n      WidgetC(),\n\
    \      WidgetD(),\n      WidgetE(),\n    ],\n  ),\n```\n\n### TabBar and Tabs\n\
    \nLastly, we define the tabs themselves. Tabs can either hold text or an icon\
    \ or both. Here’s a `TabBar` with five tabs, each having just an icon:\n\n```dart\n\
    child: Scaffold(\n  appBar: AppBar(\n    title: const Text('Tab Navigation Demo'),\n\
    \    bottom: const TabBar(\n      tabs: [\n        Tab(icon: Icon(Icons.looks_one)),\n\
    \        Tab(icon: Icon(Icons.looks_two)),\n        Tab(icon: Icon(Icons.looks_3)),\n\
    \        Tab(icon: Icon(Icons.looks_4)),\n        Tab(icon: Icon(Icons.looks_5)),\n\
    \      ],\n    ),\n  ),\n  ...\n```\n\nTo add text to the `Tab()`, provide a `child`\
    \ property: `Tab(child: Text(‘Choice 1’))`.\n\n**Caution**  \nThere’s a one-to-one\
    \ correspondence between each tab and each `TabBarView` child; they are matched\
    \ positionally. You must have the same number of tabs as you do widgets inside\
    \ the `TabBarView` and in the same order.\n\n### TabBar at the Bottom\n\nNote\
    \ that previously we chose to put the `TabBar` in the `appBar`, which of course\
    \ appears at the top of the screen. But sometimes your design calls for the tabs\
    \ to appear at the bottom of the screen. That’s easy because the `Scaffold` has\
    \ a property called `bottomNavigationBar`, and it is built to hold a `TabBar`:\n\
    \n```dart\nchild: Scaffold(\n  ...\n  bottomNavigationBar: const TabBar(\n   \
    \ tabs: [\n      Tab(icon: Icon(Icons.looks_one)),\n      Tab(icon: Icon(Icons.looks_two)),\n\
    \      Tab(icon: Icon(Icons.looks_3)),\n      Tab(icon: Icon(Icons.looks_4)),\n\
    \      Tab(icon: Icon(Icons.looks_5)),\n    ],\n  ),\n),\n```\n\n![](images/638603_1_En_6_Chapter/638603_1_En_6_Fig8_HTML.jpg)\n\
    \nFigure 6-8  \n`TabBar` at the bottom\n\n**Note**  \nThe `TabBar` has the normal\
    \ appearance of light text on a dark background. Thus, when you place the `TabBar`\
    \ on top of a light background, it may be difficult to see the text (light on\
    \ light). To fix this, wrap your `TabBar` in a `Material` widget with a darker\
    \ background color.\n\n## The Dialog Widget\n\nOur last navigation category is\
    \ arguably not a navigation category at all – dialogs. In one sense, you’re showing\
    \ another widget so … navigation? But in another sense, you’re basically showing\
    \ a pop-up so … not navigation. ¯\\_(ツ)_/¯\n\nEither way, dialogs are a common\
    \ thing and we should cover them. Since they don’t fit well anywhere else in the\
    \ book, let’s pretend for the moment that they are a navigation topic. Hey, work\
    \ with me here.\n\n### `showDialog()` and `AlertDialog`\n\n`showDialog()` is a\
    \ built-in Flutter method. You must supply a `context` and a `builder` method\
    \ that returns a `Widget`, usually either `SimpleDialog` or `AlertDialog`. The\
    \ `AlertDialog` has an *actions* parameter – a `List` of (typically) `FlatButton`s\
    \ that let the user dismiss the dialog (Figure [6-9](#638603_1_En_6_Chapter.xhtml#Fig9)).\n\
    \n![](images/638603_1_En_6_Chapter/638603_1_En_6_Fig9_HTML.jpg)\n\nFigure 6-9\
    \  \nA simple `AlertDialog`\n\n```dart\nElevatedButton(\n  child: const Text('I\
    \ am a button. Press me'),\n  onPressed: () => showDialog(\n    context: context,\n\
    \    builder: (BuildContext context) {\n      return AlertDialog(\n        content:\
    \ const Text('Press OK to continue'),\n        actions: [\n          TextButton(\n\
    \            child: const Text('OK'),\n            onPressed: () => Navigator.pop(context)),\n\
    \        ],\n      );\n    },\n  ),\n),\n```\n\nThis looks more complex than it\
    \ needs to be. And this is the simplest form! It gets more complex if you want\
    \ to give the user choices."
  raw: '### Filling the Drawer


    Adding the drawer is easy. The trick is getting entries into the drawer and then
    making them navigate to another widget. Note that Drawer has a *child* property
    that accepts a single widget. To get multiple children in your drawer, you will
    use a widget that supports them such as Column (doesn’t scroll) or ListView (scrolls).


    Whichever you choose, you’ll want to put something that is tappable because to
    navigate, you’re going to call Navigator.push() or Navigator.pushNamed() just
    like you did with stack navigation.


    Tip


    There’s a cool widget called a DrawerHeader that is built to take up a large area
    at the top of the drawer. It is great for putting your logo or other branding
    information to sort of remind the user what app they are in. It is cosmetic only
    but it really does look cool.


    Here’s the code all together. It’s the code that generated the screenshot in Figure
    [6-4](#638603_1_En_6_Chapter.xhtml#Fig4).


    ```

    return Drawer(

    child: ListView(

    children: [

    DrawerHeader(

    child: Stack(

    children: [

    Image.asset(''lib/assets/Logo.jpg''),

    Container(

    alignment: Alignment.bottomRight,

    child: Text(''My Brand'')),

    ],

    ),

    ),

    ListTile(

    leading: const Icon(Icons.looks_one),

    title: const Text(''Widget 1''),

    onTap: () => Navigator.pushNamed(context, ''/widget1'')

    ),

    ListTile(

    leading: const Icon(Icons.looks_two),

    title: const Text(''Widget 2''),

    onTap: () => Navigator.pushNamed(context, ''/widget2'')

    ),

    ListTile(

    leading: const Icon(Icons.looks_3),

    title: const Text(''Widget 3''),

    onTap: () => Navigator.pushNamed(context, ''/widget3'')

    ),

    ],

    ),

    );

    ```


    Drawer navigation is great and all, but UX experts have a few problems with it.
    They claim^([^(12)](#fn12)) that it drastically reduces the usability of apps,
    making your app less discoverable and more difficult. They say the problem is
    that the options are hidden until the user asks for them. Their objection could
    be resolved with an affordance that is always visible. Speaking of which …


    ## Tab Navigation


    As you would imagine, a tab system matches N tabs with N widgets. When the user
    presses tab 1, they see widget 1 and so forth (Figure [6-5](#638603_1_En_6_Chapter.xhtml#Fig5)).
    The matching is done with a DefaultTabController, a TabBar widget with Tabs, and
    a TabBarView widget.


    ![](images/638603_1_En_6_Chapter/638603_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Same TabBar with the fourth tab chosen


    ![](images/638603_1_En_6_Chapter/638603_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    A TabBar with the second tab chosen


    Tip


    While there’s no hard upper limit on the number of tabs you can have, your app
    will get frustratingly hard to use if you put too many on the TabBar. It’s just
    too tough to press those tiny, tiny tabs. If you’re desperate, you can set isScrollable
    to true and let the user know they can swipe left to scroll the tab list.


    ### DefaultTabController


    The DefaultTabController is the least obvious part. Just know that you have to
    have one or you get the error in Figure [6-7](#638603_1_En_6_Chapter.xhtml#Fig7).


    ![](images/638603_1_En_6_Chapter/638603_1_En_6_Fig7_HTML.jpg)


    Figure 6-7


    When you forget a TabController


    The easiest way to create one is to wrap everything in a DefaultTabController()
    with a length property. Problem solved. This part is pretty simple – so simple
    you may wonder why Flutter doesn’t create one implicitly for you. If you were
    thinking that, you wouldn’t be wrong:


    ```

    Widget build(BuildContext context) {

    return DefaultTabController(

    length: 5,

    child: Scaffold(

    ...

    );

    }

    ```


    ### TabBarView


    Next you’ll want to add a TabBarView widget. This holds the widgets that will
    eventually be shown when the user presses a tab, defining *where* they will be
    shown. Usually this is the entire rest of the screen, but you have the opportunity
    to put widgets above the TabBarView or below it or really anywhere around it.
    You should provide the same number of widgets as the length property of the DefaultTabController
    (duh):


    ```

    child: Scaffold(

    ...

    body: TabBarView(

    children: [

    WidgetA(),

    WidgetB(),

    WidgetC(),

    WidgetD(),

    WidgetE(),

    ],

    ),

    ```


    ### TabBar and Tabs


    Lastly, we define the tabs themselves. Tabs can either hold text or an icon or
    both. Here’s a TabBar with five tabs, each having just an icon:


    ```

    child: Scaffold(

    appBar: AppBar(

    title: const Text(''Tab Navigation Demo''),

    bottom: const TabBar(

    tabs: [

    Tab(icon: Icon(Icons.looks_one)),

    Tab(icon: Icon(Icons.looks_two)),

    Tab(icon: Icon(Icons.looks_3)),

    Tab(icon: Icon(Icons.looks_4)),

    Tab(icon: Icon(Icons.looks_5)),

    ],

    ),

    ),

    ...

    ```


    To add text to the Tab(), provide a child property: Tab(child: Text(‘Choice 1’)).


    Caution


    There’s a one-to-one correspondence between each tab and each TabBarView child;
    they are matched positionally. You must have the same number of tabs as you do
    widgets inside the TabBarView and in the same order.


    ### TabBar at the Bottom


    Note that previously we chose to put the TabBar in the appBar, which of course
    appears at the top of the screen. But sometimes your design calls for the tabs
    to appear at the bottom of the screen. That’s easy because the Scaffold has a
    property called bottomNavigationBar, and it is built to hold a TabBar:


    ```

    child: Scaffold(

    ...

    bottomNavigationBar: const TabBar(

    tabs: [

    Tab(icon: Icon(Icons.looks_one)),

    Tab(icon: Icon(Icons.looks_two)),

    Tab(icon: Icon(Icons.looks_3)),

    Tab(icon: Icon(Icons.looks_4)),

    Tab(icon: Icon(Icons.looks_5)),

    ],

    ),

    ),

    ```


    ![](images/638603_1_En_6_Chapter/638603_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    TabBar at the bottom


    Note


    The TabBar has the normal appearance of light text on a dark background. Thus,
    when you place the TabBar on top of a light background, it may be difficult to
    see the text (light on light). To fix this, wrap your TabBar in a Material widget
    with a darker background color.


    ## The Dialog Widget


    Our last navigation category is arguably not a navigation category at all – dialogs.
    In one sense, you’re showing another widget so … navigation? But in another sense,
    you’re basically showing a pop-up so … not navigation. ¯\_(ツ)_/¯


    Either way, dialogs are a common thing and we should cover them. Since they don’t
    fit well anywhere else in the book, let’s pretend for the moment that they are
    a navigation topic. Hey, work with me here.


    ### showDialog( ) and AlertDialog


    showDialog() is a built-in Flutter method. You must supply a context and a builder
    method that returns a Widget, usually either SimpleDialog or AlertDialog. The
    AlertDialog has an *actions* parameter – a List of (typically) FlatButtons that
    let the user dismiss the dialog (Figure [6-9](#638603_1_En_6_Chapter.xhtml#Fig9)).


    ![](images/638603_1_En_6_Chapter/638603_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    A simple AlertDialog


    ```

    ElevatedButton(

    child: const Text(''I am a button. Press me''),

    onPressed: () => showDialog(

    context: context,

    builder: (BuildContext context) {

    return AlertDialog(

    content: const Text(''Press OK to continue''),

    actions: [

    TextButton(

    child: const Text(''OK''),

    onPressed: () => Navigator.pop(context)),

    ],

    );

    },

    ),

    ),

    ```


    This looks more complex than it needs to be. And this is the simplest form! It
    gets more complex if you want to give the user choices.'
  trans: "\n### 填充抽屉\n\n添加抽屉本身很简单。关键在于如何将条目放入抽屉，并让它们导航到其他组件。请注意，`Drawer` 有一个*child*属性，它只接受单个组件。要让抽屉中有多个子组件，你需要使用支持多个子组件的组件，例如`Column`（不可滚动）或`ListView`（可滚动）。\n\
    \n无论你选择哪种，都需要在其中放入可点击的内容，因为要进行导航，你需要像使用堆栈导航一样调用`Navigator.push()`或`Navigator.pushNamed()`。\n\
    \n**提示**  \n有一个很酷的组件叫`DrawerHeader`，它专门用于占据抽屉顶部的大片区域。它非常适合放置你的 Logo 或其他品牌信息，让用户知道他们正在使用哪个应用。这虽然只是装饰性的，但效果确实很棒。\n\
    \n以下是完整的代码。它生成了图 6-4 中的截图。\n\n```dart\nreturn Drawer(\n  child: ListView(\n  \
    \  children: [\n      DrawerHeader(\n        child: Stack(\n          children:\
    \ [\n            Image.asset('lib/assets/Logo.jpg'),\n            Container(\n\
    \              alignment: Alignment.bottomRight,\n              child: Text('My\
    \ Brand')),\n          ],\n        ),\n      ),\n      ListTile(\n        leading:\
    \ const Icon(Icons.looks_one),\n        title: const Text('Widget 1'),\n     \
    \   onTap: () => Navigator.pushNamed(context, '/widget1')\n      ),\n      ListTile(\n\
    \        leading: const Icon(Icons.looks_two),\n        title: const Text('Widget\
    \ 2'),\n        onTap: () => Navigator.pushNamed(context, '/widget2')\n      ),\n\
    \      ListTile(\n        leading: const Icon(Icons.looks_3),\n        title:\
    \ const Text('Widget 3'),\n        onTap: () => Navigator.pushNamed(context, '/widget3')\n\
    \      ),\n    ],\n  ),\n);\n```\n\n抽屉导航虽然很好，但用户体验专家对此有一些疑虑。他们声称^((12))这会显著降低应用的可用性，使得你的应用更难被发现和操作。他们认为问题在于选项在用户主动请求之前是隐藏的。他们的异议可以通过一个始终可见的提示（affordance）来解决。说到这个……\n\
    \n## 标签导航\n\n正如你所想，标签系统将 N 个标签与 N 个组件一一对应。当用户按下标签 1 时，他们看到组件 1，依此类推（图 6-5）。这种匹配是通过`DefaultTabController`、一个包含`Tab`组件的`TabBar`组件以及一个`TabBarView`组件来实现的。\n\
    \n![](img/638603_1_En_6_Fig6_HTML.jpg)\n\n图 6-6  \n同一个`TabBar`，选中了第四个标签\n\n![](img/638603_1_En_6_Fig5_HTML.jpg)\n\
    \n图 6-5  \n一个`TabBar`，选中了第二个标签\n\n**提示**  \n虽然标签数量没有硬性上限，但如果`TabBar`上的标签太多，你的应用会变得极其难用。因为点击那些微小的标签实在太困难。如果实在没办法，你可以将`isScrollable`设置为`true`，并让用户知道他们可以向左滑动来滚动标签列表。\n\
    \n### DefaultTabController\n\n`DefaultTabController`是最不直观的部分。你只需要知道必须有它，否则你会得到图\
    \ 6-7 中的错误。\n\n![](img/638603_1_En_6_Fig7_HTML.jpg)\n\n图 6-7  \n当你忘记添加`TabController`时\n\
    \n创建它的最简单方法是将所有内容包裹在一个带有`length`属性的`DefaultTabController()`中。问题就解决了。这部分非常简单——简单到你可能会想，为什么\
    \ Flutter 不为你隐式创建一个？如果你这么想，那也不算错：\n\n```dart\nWidget build(BuildContext context)\
    \ {\n  return DefaultTabController(\n    length: 5,\n    child: Scaffold(\n  \
    \    ...\n    );\n  }\n}\n```\n\n### TabBarView\n\n接下来，你需要添加一个`TabBarView`组件。这个组件包含的是当用户按下标签时最终会显示的组件，并定义了它们将显示在*哪里*。通常，这会占据屏幕的其余部分，但你也可以将其他组件放在`TabBarView`的上方、下方或任何位置。你应该提供与`DefaultTabController`的`length`属性相同数量的组件（理所当然）：\n\
    \n```dart\nchild: Scaffold(\n  ...\n  body: TabBarView(\n    children: [\n   \
    \   WidgetA(),\n      WidgetB(),\n      WidgetC(),\n      WidgetD(),\n      WidgetE(),\n\
    \    ],\n  ),\n```\n\n### TabBar 和 标签\n\n最后，我们来定义标签本身。标签可以包含文本、图标，或者两者兼有。下面是一个包含五个标签的`TabBar`，每个标签只有图标：\n\
    \n```dart\nchild: Scaffold(\n  appBar: AppBar(\n    title: const Text('标签导航演示'),\n\
    \    bottom: const TabBar(\n      tabs: [\n        Tab(icon: Icon(Icons.looks_one)),\n\
    \        Tab(icon: Icon(Icons.looks_two)),\n        Tab(icon: Icon(Icons.looks_3)),\n\
    \        Tab(icon: Icon(Icons.looks_4)),\n        Tab(icon: Icon(Icons.looks_5)),\n\
    \      ],\n    ),\n  ),\n  ...\n```\n\n要为`Tab()`添加文本，请提供一个`child`属性：`Tab(child:\
    \ Text('选项 1'))`。\n\n**注意**  \n每个标签与`TabBarView`中的每个子组件存在一一对应的关系，它们按位置进行匹配。你必须有相同数量的标签和`TabBarView`内的组件，并且顺序必须一致。\n\
    \n### 将 TabBar 放在底部\n\n请注意，之前我们选择将`TabBar`放在`appBar`中，它自然出现在屏幕顶部。但有时你的设计需要标签显示在屏幕底部。这很容易实现，因为`Scaffold`有一个名为`bottomNavigationBar`的属性，它设计用于容纳一个`TabBar`：\n\
    \n```dart\nchild: Scaffold(\n  ...\n  bottomNavigationBar: const TabBar(\n   \
    \ tabs: [\n      Tab(icon: Icon(Icons.looks_one)),\n      Tab(icon: Icon(Icons.looks_two)),\n\
    \      Tab(icon: Icon(Icons.looks_3)),\n      Tab(icon: Icon(Icons.looks_4)),\n\
    \      Tab(icon: Icon(Icons.looks_5)),\n    ],\n  ),\n),\n```\n\n![](img/638603_1_En_6_Fig8_HTML.jpg)\n\
    \n图 6-8  \n位于底部的`TabBar`\n\n**注意**  \n`TabBar`的默认外观是在深色背景上显示浅色文字。因此，当你将`TabBar`放置在浅色背景上时，文字可能难以辨认（浅色叠加浅色）。要解决这个问题，可以将你的`TabBar`包裹在一个具有更深背景颜色的`Material`组件中。\n\
    \n## 对话框组件\n\n我们最后一个导航类别严格来说可能根本不算导航类别——对话框。从某种意义上说，你是在显示另一个组件，所以……算导航？但从另一种意义上说，你基本上是在显示一个弹出窗口，所以……不算导航。¯\\\
    _(ツ)_/¯\n\n无论哪种方式，对话框都是常见的东西，我们应该介绍一下。由于它们在本章其他部分不太好归类，我们暂时假装它们是导航主题之一。嗯，配合一下。\n\
    \n### `showDialog()` 和 `AlertDialog`\n\n`showDialog()`是 Flutter 的一个内置方法。你必须提供一个`context`和一个返回`Widget`的`builder`方法，通常返回的是`SimpleDialog`或`AlertDialog`。`AlertDialog`有一个*actions*参数——这是一个由（通常是）`TextButton`组成的`List`，用于让用户关闭对话框（图\
    \ 6-9）。\n\n![](img/638603_1_En_6_Fig9_HTML.jpg)\n\n图 6-9  \n一个简单的`AlertDialog`\n\
    \n```dart\nElevatedButton(\n  child: const Text('我是一个按钮。点我'),\n  onPressed: ()\
    \ => showDialog(\n    context: context,\n    builder: (BuildContext context) {\n\
    \      return AlertDialog(\n        content: const Text('按“确定”继续'),\n        actions:\
    \ [\n          TextButton(\n            child: const Text('确定'),\n           \
    \ onPressed: () => Navigator.pop(context)),\n        ],\n      );\n    },\n  ),\n\
    ),\n```\n\n这看起来比实际需要的更复杂。而这已经是最简单的形式了！如果你想给用户提供更多选择，它会变得更复杂。\n"
- fmt: "### Responses with a Dialog\n\n`showDialog()` returns a `Future<T>`, which\
    \ means that you can have it return a value to its caller. Let’s pretend you want\
    \ the user to respond with yes or no (Figure [6-10](#638603_1_En_6_Chapter.xhtml#Fig10)).\n\
    \n![](images/638603_1_En_6_Chapter/638603_1_En_6_Fig10_HTML.jpg)\n\n**Figure 6-10**\
    \ – `AlertDialog` that returns a value\n\nYou might create the dialog and handle\
    \ the response like this:\n\n```\nElevatedButton(\nchild: const Text('Get a response'),\n\
    onPressed: () async {\n// The builder returns the user's choice here.\n// Since\
    \ it is a Future, we 'await' it to\n// convert it to a String\nString response\
    \ = await showDialog(\ncontext: context,\nbuilder: (BuildContext context) {\n\
    return AlertDialog(\ncontent: const Text('Are you sure?'),\nactions: [\nTextButton(\n\
    child: const Text('Yes'),\n// Return \"Yes\" when dismissed.\nonPressed: () =>\
    \ Navigator.pop(context, 'Yes')),\nTextButton(\nchild: const Text('No'),\n// Return\
    \ \"No\" when dismissed.\nonPressed: () => Navigator.pop(context, 'No')),\n],\n\
    );\n},\n);\n// Do things with the response that we 'await'ed above.\nprint(response);\n\
    },\n),\n```\n\n**Tip** – As the name suggests, the `SimpleDialog` widget is a\
    \ simpler version of the `AlertDialog`. It doesn’t have actions because it’s dismissed\
    \ by tapping anywhere. It has fewer constructor parameters like `titleTextStyle`,\
    \ `contentTextStyle`, and the like. Use it mainly if you don’t need the user to\
    \ respond to the prompt but simply to inform.\n\n## Navigation Methods Can Be\
    \ Combined\n\nWhile you can stack navigate to a widget with a drawer and from\
    \ there to a widget with a tab, you should be careful. The methods are not incompatible,\
    \ but, boy, they can get complex when mixed! Think about it; if you stack navigate\
    \ via `push()` to a widget with a drawer, the back button in the `appBar` is no\
    \ longer available. Android has a soft back button at the bottom, but iOS does\
    \ not. So the user is now stuck with no way to return. Another example, a `TabBarView`\
    \ has widgets, but these are hosted so to speak so they should have no `Scaffold`.\
    \ If you tried to navigate to that same widget using either of the other two methods,\
    \ you have no way to get back … no drawer to show and no back button to tap. Again,\
    \ the user is stuck.\n\nWe recommend sticking to just two different types and\
    \ keeping the levels consistent. For example, it is pretty common to have a tabbed\
    \ navigation experience for the user, and within each tab, you’ll work with stack\
    \ navigation. But get much more complex than that and you may get your hands full.\n\
    \nFootnotes [1](#638603_1_En_6_Chapter.xhtml#Fn1_source)\n\n# 7. Managing State\n\
    \nWe kind of telegraphed this topic since the first chapter because we’ve been\
    \ writing classes that extend a `StatelessWidget`. Now if Flutter has a `State**less**Widget`,\
    \ then you’d think it also has a `State**ful**Widget`. And you’d be right.\n\n\
    But what exactly is a `StatefulWidget`? How does it differ from a stateless one?\
    \ When do we choose one vs. the other? What is the structure of a `StatefulWidget`?\
    \ Are there rules for using one? If the data changes, how do you re-render it?\
    \ Good questions, right? Well, be patient young Jedi and we’ll answer all of those\
    \ and more in this chapter.\n\n**Caution** – This chapter isn’t for the faint-hearted.\
    \ In it, we’re introducing some mind-bending concepts. Not that you can't handle\
    \ it! We’re just giving you a heads up so that when you encounter some of these\
    \ deeper concepts and code, you don’t get discouraged. Just be ready is all.\n\
    \n### What Is State?\n\n> *State is widget data whose change requires a re-render.*\n\
    > \n> *—Rap Payne ;-)*\n\n`StatelessWidgets` might have data, but that data either\
    \ doesn’t change while the widget is alive or doesn’t change how the screen looks.\
    \ Sure, this data may change when Flutter destroys and recreates the widget, but\
    \ that doesn’t count. To be state, it must change while the widget is active.\n\
    \nFlutter gives us certain widgets that are stateful out of the box.\n\n| - `AppBar`\
    \ | - `InputDecorator` |\n| - `BottomNavigationBar` | - `MonthPicker` |\n| - `Checkbox`\
    \ | - `Navigator` |\n| - `DefaultTabController` | - `ProgressIndicator` |\n| -\
    \ `Dismissible` | - `Radio` |\n| - `DrawerController` | - `RefreshIndicator` |\n\
    | - `DropdownButton` | - `Scaffold` |\n| - `EditableText` | - `Scrollbar` |\n\
    | - `Form` | - `Slider` |\n| - `FormField` | - `Switch` |\n| - `GlowingOverscrollIndicator`\
    \ | - `TextField` |\n| - `Image` | - `YearPicker` |\n\n… and many more. These\
    \ all have internal data that must be maintained and monitored so that as it changes,\
    \ Flutter re-renders the widget to display said change to the screen. Is that\
    \ difficult to follow? Let’s take a simple example: a `TextField` widget.\n\n\
    Yes, we’re talking about the built-in widget that behaves like a textbox; the\
    \ end user types characters into it. You realize of course that as the user types,\
    \ the widget is keeping track of and displaying the stuff they’re typing. That,\
    \ my friend, is state – data that changes and is displayed live.\n\nThat’s great\
    \ and all, but how do we write our own `StatefulWidgets`? Read on!"
