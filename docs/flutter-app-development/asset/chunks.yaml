- fmt: '## Adjusting the Soft Keyboard


    Want a special soft keyboard? No problem. Just use the `keyboardType` property.
    Results are shown in Figures [4-7](#638603_1_En_4_Chapter.xhtml#Fig7) through
    [4-10](#638603_1_En_4_Chapter.xhtml#Fig10).


    ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fig10_HTML.jpg)


    Figure 4-10


    `TextInputType.phone`


    ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    `TextInputType.number`


    ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fig8_HTML.jpg)


    Figure 4-8


    `TextInputType.email`. Note the @ sign


    ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fig7_HTML.jpg)


    Figure 4-7


    `TextInputType.datetime`


    ```

    return TextField(

    keyboardType: TextInputType.number,

    );

    ```


    The soft keyboard shows a different keyboard, but it doesn’t control what can
    be put into each field. In other words, you can still get regular text into a
    `FormField()` even if the soft keyboard is of type number. Want to fix that? Here’s
    how …


    ## Restricting the Data That Can Be Typed


    If you want to limit the type of text that is allowed to be entered, you can do
    so with the `TextInput`''s `inputFormatters` property. It’s actually an array
    so you can combine one or more of …


    *   `BlacklistingTextInputFormatter` – Forbids certain characters from being entered.
    They just don’t appear when the user types.

    *   `WhitelistingTextInputFormatter` – Allows only these characters to be entered.
    Anything outside this list doesn’t appear.

    *   `LengthLimitingTextInputFormatter` – Can’t type more than X characters.


    Those first two will allow you to use regular expressions to specify patterns
    that you want (white list) or don’t want (black list). Here’s an example:


    ```

    return TextField(

    inputFormatters: [

    WhitelistingTextInputFormatter(RegExp(''[0-9 -]'')),

    LengthLimitingTextInputFormatter(16)

    ],

    decoration: InputDecoration(

    labelText: ''Credit Card'',

    ),

    );

    ```


    In the `WhitelistingTextInputFormatter`, we’re only allowing numbers 0–9, a space,
    or a dash. Then the `LengthLimitingTextInputFormatter` is keeping to a max of
    16 characters.


    ## Checkboxes


    Flutter checkboxes (Figure [4-11](#638603_1_En_4_Chapter.xhtml#Fig11)) have a
    Boolean `value` property and an `onChanged` method which fires after every change.
    Like all of the other input widgets, the `onChanged` method receives the value
    that the user set. Therefore, in the case of checkboxes, that value is a `bool`.


    ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fig11_HTML.jpg)


    Figure 4-11


    *A Flutter Checkbox widget*


    ```

    Checkbox(

    value: true,

    onChanged: (val) => print(val),

    ),

    ```


    Tip


    A Flutter Switch (Figure [4-12](#638603_1_En_4_Chapter.xhtml#Fig12)) serves the
    same purpose as a checkbox – it is on or off. So the `Switch` widget has the same
    options and works in the same way. It just looks different.


    ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fig12_HTML.jpg)


    Figure 4-12


    A Flutter Switch widget


    ## Radio Buttons


    Of course the magic in a radio button is that if you select one, the others in
    the same group are deselected. So obviously we need to group them somehow. In
    Flutter, `Radio` widgets are grouped when you set the `groupValue` property to
    the same local variable. This variable holds the value of the *one* `Radio` that
    is currently turned on.


    Each `Radio` also has its own `value` property, the value associated with *that*
    particular widget whether it is selected or not. In the `onChanged` method, you’ll
    set the `groupValue` variable to the radio’s value.


    | value | Each radio has its own distinct value |

    | groupValue | The one value currently selected, depending on which radio was
    last clicked. |


    Here’s how they’d work together:


    ```

    SearchLocation? searchLocation;

    //Other code goes here

    Radio(

    groupValue: searchLocation,

    value: SearchLocation.anywhere,

    onChanged: (val) => setState(() => searchLocation = val)),

    const Text(''Search anywhere''),

    Radio(

    groupValue: searchLocation,

    value: SearchLocation.text,

    onChanged: (val) => setState(() => searchLocation = val)),

    const Text(''Search page text''),

    Radio(

    groupValue: searchLocation,

    value: SearchLocation.title,

    onChanged: (val) => setState(() => searchLocation = val)),

    const Text(''Search page title''),

    ```


    Note that each `Radio` has its own value, `SearchLocation.anywhere` for the first,
    `SearchLocation.text` for the second, and `SearchLocation.title` for the third.
    But they all share `groupType` which is what groups them together. Also note that
    when one is selected, its `onChanged` fires and we set the `searchLocation` variable
    to the selected option.


    This simplified code would create something like Figure [4-13](#638603_1_En_4_Chapter.xhtml#Fig13).


    ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fig13_HTML.jpg)


    Figure 4-13


    *Flutter Radio widgets*


    Tip


    Confused about `SearchLocation`? I don''t blame you. It''s an enumeration. Radios
    work really well with enums.


    Here''s how the above `SearchLocation` enum might be created:


    ```

    enum SearchLocation { anywhere, title, text }

    ```


    ## Sliders


    A slider is a handy affordance when you want your user to pick a numeric value
    between an upper and lower limit (Figure [4-14](#638603_1_En_4_Chapter.xhtml#Fig14)).


    ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fig14_HTML.jpg)


    Figure 4-14


    A slider with the value of 25


    To get one in Flutter, you’ll use the `Slider` widget which requires an `onChanged`
    event and a `value` property, a `double`. It also has a `min` which defaults to
    `0.0` and a `max` which defaults to `1.0`. A range of zero to one is rarely useful,
    so you’ll usually change that. It also has an optional `label` property which
    is an indicator telling the user what value they’re choosing.


    ```

    Slider(

    label: numberOfResults.toString(),

    min: 0.0,

    max: 100.0,

    divisions: 100,

    value: numberOfResults.toDouble(),

    onChanged: (val) {

    setState(() => numberOfResults = val.round());

    },

    );

    ```


    ## Dropdowns


    Dropdowns are great for picking one of a small number of things, like in an enumeration.
    Let’s say we have an enum like this:


    ```

    enum SearchType { web, image, news, shopping }

    ```


    Where obviously we’re defining a `SearchType` as either `web`, `image`, `news`,
    or `shopping`. If we wanted our user to choose from one of those, we might present
    them with a `DropdownButton` widget that might look like Figure [4-15](#638603_1_En_4_Chapter.xhtml#Fig15)
    to start with.


    ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fig15_HTML.jpg)


    Figure 4-15


    `DropdownButton` with nothing chosen


    Then, when they tap the dropdown, it looks like Figure [4-16](#638603_1_En_4_Chapter.xhtml#Fig16).


    ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fig16_HTML.jpg)


    Figure 4-16


    `DropdownButton` expanded to show the choices


    And when they tap one of the options, it is chosen (Figure [4-17](#638603_1_En_4_Chapter.xhtml#Fig17)).


    ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fig17_HTML.jpg)


    Figure 4-17


    `DropdownButton` with an option selected


    To create that `DropdownButton`, our Flutter code might look like this:


    ```

    SearchType searchType = SearchType.web;

    //Other code goes here

    return DropdownButton(

    value: searchType,

    items: [

    DropdownMenuItem(

    value: SearchType.web, child: Text(''Web'') ),

    DropdownMenuItem(

    value: SearchType.image, child: Text(''Image'') ),

    DropdownMenuItem(

    value: SearchType.news, child: Text(''News'') ),

    DropdownMenuItem(

    value: SearchType.shopping, child: Text(''Shopping'') ),

    ],

    onChanged: (val) => searchType = val,

    );

    ```


    Note that the items are all of type `DropdownMenuItem`. Those have a `value` and
    a `child`, but the `onChanged` event handler is on the menu and not on the items.
    Kind of makes sense when you think about it.


    ## Putting the Form Widgets Together


    It’s cool that we have all of these different types of fields that look good and
    work great. But you will often want them to be grouped together so that they can
    be somewhat controlled as a group. You’ll do this with a `Form` widget.'
