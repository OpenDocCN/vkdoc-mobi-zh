    Figure 11-10


    Every scene has a widget tree


    Flutter travels down the tree starting at the top. It reads the BoxConstraints
    (max width and max height) of the root widget. It remembers them and then talks
    to each child. For each child, it communicates its BoxConstraints to them and
    then travels to the grandchildren. It keeps doing this all the way to the end
    of every branch. We call this the leaf level.


    It then asks each leaf its RenderBox – how big it would prefer to be. Some children
    are greedy and say “as big as possible.” Others take up a smaller amount. Flutter
    allows the leaf to be drawn at its preferred size *within the constraints* of
    all of its ancestors. If the preferred size is too big for its parent’s BoxConstraints,
    Flutter clips it at runtime – something we work very hard to avoid! If the preferred
    size is too small, Flutter pads it with extra space until it fits.


    It then goes back up a level and tries to fit those branches inside their common
    parent which has its own constraints. And so on all the way back up to the top.


    The result is that each child gets to be its favorite height and width – as long
    as its parent allows it. And no parent has a final size until all of its child
    do.


    So you can see how we’d get the “unbounded height” error. If we had a child who
    tries to be as large as it can and it doesn’t have a parent to tell it to stop,
    Flutter panics because the child is now infinitely tall.


    To solve the problem, the parent simply needs to instruct its child to stop growing.
    In our ListView/Column example, there are several solutions. One is to swap the
    Column and the ListView. A column isn’t greedy so it can live in a ListView. But
    then the header Text scrolls off the page. Another is to wrap the ListView in
    a SizedBox which locks in the size exactly or a LimitedBox which provides a maxWidth
    and maxHeight. But those solutions are both clumsy. A third method is to wrap
    the ListView in an Expanded. We’ll cover Expanded in detail in a few chapters
    but works in our favor in this case because the Expanded expands to take up the
    remaining (not infinite) space and tells its child that it now has BoxConstraints.
    Perfect! Here is all we need to do:


    ```

    Widget build(BuildContext context) {

    List randomTexts = List.generate(80,

    (i) => Text("Random number: ${Random().nextInt(1000)}-$i"));

    return Column(

    crossAxisAlignment: CrossAxisAlignment.center,

    children: [

    Text("Some random strings for you", style: big),

    Expanded(         // <-- Add this widget

    child: ListView(

    children: randomTexts,

    ),

    ),

    ],

    );

    }

    ```


    ## Conclusion


    Do you see why I said it’s important to understand the layout strategy? Until
    you get your head around it, you’re just guessing the solution. It’s a lot of
    work to understand them all, but it’s worth the effort.


    Flutter has a ton of widgets to control size and position. For the next few chapters,
    we’re going to study the most critical of those layout widgets – the ones you
    absolutely must know. We’ll start with Row and Column.


    Footnotes [1](#638603_1_En_11_Chapter.xhtml#Fn1_source)


    # 12. Layout – Positioning Widgets


    Remember that the steps to the visual portion of an app are


    1.  Layout the entire scene


    2.  Position widgets relative to each other


    3.  Fix overflows, like when your widgets don’t fit on a screen


    4.  Handle extra space, like when your screen is bigger than it needs to be


    5.  Fine-tune the position


    In the last chapter, we studied Flutter’s layout algorithm and we’ve learned how
    to set ourselves up for layouts with MaterialApp, Scaffold, and it’s typical children.
    It’s time to move on to step two, Rows and Columns.'
