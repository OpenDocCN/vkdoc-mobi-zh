  trans: '

    ## 调整软键盘


    想要一个特殊的软键盘？没问题。只需使用 `keyboardType` 属性即可。效果分别如图 4-7 至 4-10 所示。


    ![](img/638603_1_En_4_Fig10_HTML.jpg)


    图 4-10


    `TextInputType.phone`


    ![](img/638603_1_En_4_Fig9_HTML.jpg)


    图 4-9


    `TextInputType.number`


    ![](img/638603_1_En_4_Fig8_HTML.jpg)


    图 4-8


    `TextInputType.email`。请注意 @ 符号


    ![](img/638603_1_En_4_Fig7_HTML.jpg)


    图 4-7


    `TextInputType.datetime`


    ```

    return TextField(

    keyboardType: TextInputType.number,

    );

    ```


    软键盘会显示不同的键盘，但它不控制可以在每个字段中输入什么内容。换句话说，即使软键盘是数字类型，你仍然可以将普通文本输入到 `FormField()` 中。想解决这个问题吗？方法如下……


    ## 限制可输入的数据


    如果你想限制允许输入的文本类型，可以通过 `TextInput` 的 `inputFormatters` 属性来实现。它实际上是一个数组，因此你可以组合使用一个或多个以下格式化器：


    *   `BlacklistingTextInputFormatter` – 禁止输入某些字符。用户输入时，这些字符根本不会出现。

    *   `WhitelistingTextInputFormatter` – 只允许输入这些字符。列表之外的任何字符都不会出现。

    *   `LengthLimitingTextInputFormatter` – 最多只能输入 X 个字符。


    前两个格式化器允许你使用正则表达式来指定你想要（白名单）或不想要（黑名单）的模式。示例如下：


    ```

    return TextField(

    inputFormatters: [

    WhitelistingTextInputFormatter(RegExp(''[0-9 -]'')),

    LengthLimitingTextInputFormatter(16)

    ],

    decoration: InputDecoration(

    labelText: ''Credit Card'',

    ),

    );

    ```


    在 `WhitelistingTextInputFormatter` 中，我们只允许输入数字 0-9、空格或短横线。然后 `LengthLimitingTextInputFormatter`
    将最大长度限制为 16 个字符。


    ## 复选框


    Flutter 复选框（图 4-11）具有一个布尔类型的 `value` 属性和一个 `onChanged` 方法，该方法在每次更改后触发。与其他所有输入小部件一样，`onChanged`
    方法接收用户设置的值。因此，在复选框的情况下，该值是 `bool` 类型。


    ![](img/638603_1_En_4_Fig11_HTML.jpg)


    图 4-11


    *一个 Flutter 复选框小部件*


    ```

    Checkbox(

    value: true,

    onChanged: (val) => print(val),

    ),

    ```


    提示


    Flutter 开关（图 4-12）与复选框的用途相同 – 用于表示开或关。因此 `Switch` 小部件具有相同的选项并且工作方式相同，只是外观不同。


    ![](img/638603_1_En_4_Fig12_HTML.jpg)


    图 4-12


    一个 Flutter 开关小部件


    ## 单选按钮


    当然，单选按钮的妙处在于，如果你选中一个，同一组中的其他按钮就会取消选中。所以显然我们需要以某种方式对它们进行分组。在 Flutter 中，当你将 `groupValue`
    属性设置为同一个局部变量时，`Radio` 小部件就会被分组。该变量保存当前处于选中状态的*那个* `Radio` 的值。


    每个 `Radio` 也有自己的 `value` 属性，该属性与*那个*特定小部件相关联（无论它是否被选中）。在 `onChanged` 方法中，你将 `groupValue`
    变量设置为该单选按钮的值。


    | value | 每个单选按钮都有自己独特的值 |

    | groupValue | 当前选中的一个值，取决于最后点击的是哪个单选按钮。 |


    以下是它们协同工作的方式：


    ```

    SearchLocation? searchLocation;

    //其他代码放在这里

    Radio(

    groupValue: searchLocation,

    value: SearchLocation.anywhere,

    onChanged: (val) => setState(() => searchLocation = val)),

    const Text(''Search anywhere''),

    Radio(

    groupValue: searchLocation,

    value: SearchLocation.text,

    onChanged: (val) => setState(() => searchLocation = val)),

    const Text(''Search page text''),

    Radio(

    groupValue: searchLocation,

    value: SearchLocation.title,

    onChanged: (val) => setState(() => searchLocation = val)),

    const Text(''Search page title''),

    ```


    请注意，每个 `Radio` 都有其自己的值，第一个是 `SearchLocation.anywhere`，第二个是 `SearchLocation.text`，第三个是
    `SearchLocation.title`。但它们都共享 `groupType`，正是这个属性将它们分组在一起。还要注意，当选中一个时，其 `onChanged`
    会触发，我们将 `searchLocation` 变量设置为选中的项。


    这段简化后的代码将生成类似图 4-13 的效果。


    ![](img/638603_1_En_4_Fig13_HTML.jpg)


    图 4-13


    *Flutter 单选按钮小部件*


    提示


    对 `SearchLocation` 感到困惑？我不怪你。它是一个枚举。单选按钮与枚举配合使用效果非常好。


    以下是上面提到的 `SearchLocation` 枚举的创建方式：


    ```

    enum SearchLocation { anywhere, title, text }

    ```


    ## 滑块


    当你希望用户选择一个介于上限和下限之间的数值时，滑块是一种方便的交互方式（图 4-14）。


    ![](img/638603_1_En_4_Fig14_HTML.jpg)


    图 4-14


    值为 25 的滑块


    要在 Flutter 中实现一个，你需要使用 `Slider` 小部件，它需要 `onChanged` 事件和 `value` 属性（类型为 `double`）。它还有
    `min`（默认为 `0.0`）和 `max`（默认为 `1.0`）。零到一的范围很少有用，所以你通常会改变它们。它还有一个可选的 `label` 属性，这是一个指示器，用于告知用户他们正在选择的值。


    ```

    Slider(

    label: numberOfResults.toString(),

    min: 0.0,

    max: 100.0,

    divisions: 100,

    value: numberOfResults.toDouble(),

    onChanged: (val) {

    setState(() => numberOfResults = val.round());

    },

    );

    ```


    ## 下拉菜单


    当需要从少量选项中选择一个时（比如枚举），下拉菜单非常有用。假设我们有这样一个枚举：


    ```

    enum SearchType { web, image, news, shopping }

    ```


    显然，我们定义了一个 `SearchType` 类型，它可以是 `web`、`image`、`news` 或 `shopping`。如果我们希望用户从中选择一个，我们可能会向他们展示一个
    `DropdownButton` 小部件，初始状态可能看起来像图 4-15。


    ![](img/638603_1_En_4_Fig15_HTML.jpg)


    图 4-15


    *未选择任何内容时的 `DropdownButton`*


    然后，当他们点击下拉菜单时，它看起来像图 4-16。


    ![](img/638603_1_En_4_Fig16_HTML.jpg)


    图 4-16


    *展开后显示选项的 `DropdownButton`*


    当他们点击其中一个选项时，该选项被选中（图 4-17）。


    ![](img/638603_1_En_4_Fig17_HTML.jpg)


    图 4-17


    *选中了一个选项的 `DropdownButton`*


    要创建这个 `DropdownButton`，我们的 Flutter 代码可能如下所示：


    ```

    SearchType searchType = SearchType.web;

    //其他代码放在这里

    return DropdownButton(

    value: searchType,

    items: [

    DropdownMenuItem(

    value: SearchType.web, child: Text(''Web'') ),

    DropdownMenuItem(

    value: SearchType.image, child: Text(''Image'') ),

    DropdownMenuItem(

    value: SearchType.news, child: Text(''News'') ),

    DropdownMenuItem(

    value: SearchType.shopping, child: Text(''Shopping'') ),

    ],

    onChanged: (val) => searchType = val,

    );

    ```


    请注意，所有项的类型都是 `DropdownMenuItem`。它们有 `value` 和 `child` 属性，但 `onChanged` 事件处理程序位于菜单上，而不是菜单项上。仔细想想，这还挺有道理的。


    ## 整合表单小部件


    我们拥有了所有这些不同类型的字段，它们外观漂亮且功能出色，这很棒。但你通常希望将它们组合在一起，以便可以作为一个组进行某种程度的控制。为此，你将使用 `Form`
    小部件。

    '
- fmt: '# Form Widget


    In Flutter, a `Form` widget helps when you have multiple fields that depend on
    one another and/or if you have validations. That doesn’t happen 100% of the time.
    So feel free to omit a `Form` widget if you don’t need it. And feel free to skip
    reading this next section until you have a need to learn about the `Form` widget.
    Go to the next chapter. My feelings won’t be hurt.


    … Still here? Alright. Let’s see what the `Form` widget can do for us. Strap in,
    because this ride gets bumpy …


    Forms need a `GlobalKey`. Remember that we introduced keys in the last chapter
    and told you that except in a few situations, keys can be ignored. This is one
    place where keys are needed. If you decide to use a `Form`, you need a `GlobalKey`
    of type `FormState`:


    ```

    GlobalKey _key = GlobalKey();

    ```


    You’ll set that key as a property to your `Form`:


    ```

    @override

    Widget build(BuildContext context) {

    return Form(

    key: _key,

    autovalidate: AutovalidateMode.always,

    child: // All the form fields will go here

    );

    }

    ```


    At first glance, the `Form` doesn’t seem to change anything. But a closer look
    reveals that we now have access to:


    *   `autovalidate` – `always` means run validations as soon as any field changes.
    `disabled` means you’ll run it manually. `onUserInteraction` means run them each
    time the user changes anything. (We’ll talk about validations in a few pages.)


    *   The key itself which we called `_key` in the code above.


    That `_key` has a `currentState` property which in turn has these methods:


    1.  `save()` – Saves all fields inside the form by calling each’s `onSaved`


    2.  `validate()` – Runs each field’s `validator` function


    3.  `reset()` – Resets each field inside the form back to its `initialValue`


    **Caution:** `currentState` is a nullable property. This means we must use either
    `?` or `!` to placate the compiler. Remember, `?` means that if it’s null, stop
    processing here (i.e., do nothing). And `!` means that we know it can never be
    null at this point. You’ll see me using `!` for simplicity.


    Armed with all this, you can see how the `Form` handles its nested fields. When
    you call one of these three methods, it iterates all inner fields and calls that
    method on each. One call at the `Form` level fires them all.


    But hang on a second! If `_key.currentState.save()` is calling a field’s `onSaved()`,
    we need to provide an `onSaved` method, right? Same with `validate()` calling
    the `validator`. But the `TextField`, `DropdownButton`, `Radio`, `Checkbox`, and
    `Slider` widgets themselves don’t have those methods. What do we do now? We wrap
    each field in a `FormField` widget which **does** have those methods. (And the
    rabbit hole gets deeper.)


    # FormField Widget


    This widget’s entire purpose in life is to provide `onSaved` and `validator` event
    handlers to an inner widget. The `FormField` widget can wrap any widget using
    a `builder` property:


    ```

    FormField(

    builder: (state) {

    return TextField(); // Any field widget like Switch,

    // Radio, Checkbox, or Slider.

    },

    onSaved: (String initialValue) {

    // Push values to a repository or something here.

    },

    validator: (String val) {

    // Put validation logic here (further explained below).

    },

    ),

    ```


    So we first wrap a `FormField` widget around each input widget, and we do so in
    a method called `builder`. Then we can add the `onSaved` and `validator` methods.


    **Note:** While `Switch`es, `Checkbox`es, and `Slider`s are wrapped in a `FormField`,
    `Radio`s are different. You’re going to wrap the entire `Radio` group in a single
    `FormField`. This makes sense when you think about it – the group is determining
    one value – the `groupValue`.


    ## TextFormField and DropdownButtonFormField


    The Flutter team has kindly given us a shortcut. Instead of *wrapping* a `TextField`,
    *replace* it with a `TextFormField` widget if you use it inside a `Form`. This
    new widget is easy to confuse with a `TextField` but it is different. Basically
    …


    `TextFormField` = `TextField` + `FormField`


    `TextFormField` has all of the properties of a `TextField` but adds an `onSaved`
    and a `validator`:


    ```

    TextFormField(

    initialValue: "Some initial string",

    decoration: InputDecoration(labelText: ''Email''),

    onSaved: (val) => print("Form saved: $val"),

    validator: (val) {

    // Put your validation logic here

    },

    ),

    ```


    Similarly when using a `DropdownButton` in a `Form`, instead replace it with a
    `DropdownButtonFormField`:


    ```

    DropdownButtonFormField(

    onChanged: (val) => _searchType = val,

    onSaved: (val) => _dbRecord["searchType"] == val,

    validator: _searchTypeValidator,

    value: _searchType,

    items: [...],

    ),

    ```


    Now isn’t that nicer? Finally, we catch a break in making things easier. Checkboxes
    don’t have this shortcut. Nor do `Radio`s nor `Slider`s. Only `TextField`s and
    `DropDownButton`s.


    ## onSaved


    Remember, your `Form` has a key which has a `currentState` which has a `save()`
    method. Got all that? No? Not super clear? Let’s try it this way; on a “Save”
    button press, you will write code to call …


    ```

    _key.currentState!.save();

    ```


    … and it in turn invokes the `onSaved` method for each `FormField` in the `Form`.


    ## validator


    Similarly, you probably guessed that you can call …


    ```

    _key.currentState!.validate();

    ```


    … and Flutter will call each `FormField`’s `validator` method. Each `validator`
    function will receive its value to be validated and return a nullable string.
    You’ll write the function to return `null` if the input value is valid and an
    error message if it is invalid. That returned string is what Flutter will show
    your user:


    ```

    return Form(

    child: TextFormField(

    validator: (val)=> (val == null || val.isEmpty)

    ? "Please enter some text"

    : null,

    ),

    );

    ```


    ## Submitting the Form


    We’re (finally) ready to actually submit the form. You’ll usually do this on a
    button press, and you’ll only want to submit the form if all the data is valid.
    Here’s how that might look:


    ```

    ElevatedButton(

    onPressed: () {

    if (_key.currentState!.validate()) {

    _key.currentState!.save();

    print("Form was saved.");

    }

    },

    child: const Text("Submit"),

    );

    ```


    # One Big Form Example


    I know, I know. This is pretty complex stuff. It might help to see these things
    in context – how they all fit together. Please look in the code repository for
    a file called `search_form.dart` which has all of these pieces combined in one
    big `StatefulWidget`.


    ## Conclusion


    It takes a while to understand Flutter forms. Please don’t be discouraged. It
    begins to make sense very quickly as you work with forms. And while the topic
    of Forms might have been a little intimidating to you, Text, Images, Icons, and
    SnackBars were very straightforward, right?


    In the next chapter, we’ll start to see our app come alive because we’re going
    to learn about creating all the different kinds of buttons and making them – or
    any widget for that matter – respond to taps and other gestures!


    # 5. Responding to Gestures


    We’ve made great progress so far! You now know what Flutter is all about. You’re
    well versed in how the development and debugging process works. You know why we
    use widgets and are pretty darn familiar with the value widgets from the last
    chapter. Heck, you can even create your own stateless widgets. But we’re still
    missing a major fundamental feature: event handling.


    Let’s say you have a screen where the user chooses a product and puts it in their
    cart. They’ll have to scroll up and down through a list of products (Figure [5-1](#638603_1_En_5_Chapter.xhtml#Fig1)).
    The swipe up and down to scroll is a gesture. To choose a product, they’ll tap
    on it. That’s a gesture. Then to put it in the cart, maybe we’d have them swipe
    right. That’s a different gesture.


    ![](images/638603_1_En_5_Chapter/638603_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    A shopping app


    This chapter is all about handling those gestures. We’ll fit gestures into two
    categories: gestures on built-in widgets and gestures on your custom widgets.
    Let’s start with gesture on built-in widgets.'
