    # 9\. Making RESTful API Calls with HTTP


    We’re getting really good at managing the state of our application, but where
    will that data come from? A local file? A local database? User-entered? Sure.
    Those are all possibilities, but real-world apps get real-world data from a server
    out in the cloud somewhere. Your application will make HTTP calls, hopefully asynchronous
    RESTful HTTP API calls. It’ll wait for and process the response and usually display
    that data. Wow! That’s a lot of buzzwords, am I right? In this chapter, we’re
    going to learn what those things mean and how to handle HTTP requests and responses
    of all types in your Flutter app. Here’s what we need to know:


    *   What is an API call anyway


    *   Making an HTTP GET or DELETE request


    *   Making an HTTP POST, PUT, or PATCH request


    *   Handling the response in the simplest way


    *   Cleaner handling with `FutureBuilder` and `StreamBuilder`


    *   Even cleaner handling with strongly typed objects


    That’ll be our plan for this chapter. That, and getting in some hands-on practice
    with an API service that allows HTTP requests. And to make sure everyone is on
    the same page (pun definitely intended), we should probably start with what exactly
    an API is. Feel free to skim it or skip altogether if you’re already familiar.


    ## What Is an *API* Call?


    Flutter apps already have the capability to read from a tiny, localized database.
    But it cannot read from one that is located *elsewhere*. In other words, you can’t
    just connect to a SQL Server/MongoDB/PostgresSQL database and read or write records.
    Can’t be done, not even if you have database credentials. I mean, think about
    the security implications if public apps could connect from anywhere and directly
    modify data. So what developers do instead is create a server-side program to
    read and write in a controlled way and then expose that program on your network
    or the Internet at a particular address with a particular protocol, usually `https`.


    To read this server-side data, any user can make `http` requests after having
    sent their credentials in the form of username/password or better yet, a unique
    and secret key called an API key.


    There’s that term *API* again. It stands for Application Programming Interface.
    It means different things in different situations, but its default meaning has
    come to be any Internet address to which developers can send `http` requests for
    the purpose of reading and writing data. There are tons of publicly available
    APIs and many options for creating your own.


    When an API responds, it returns with a stream of data that is almost always in
    JSON^([^(19)](#fn19)) format.'
  raw: '### 3\. Write a Provider


    Before we can store values, we will create one provider *for each thing* we want
    to share. Let’s say we allow the user to pick their favorite color in one widget
    and then read it in the rest. We might create a favColorProvier:


    ```

    final favColorProvider =

    StateProvider((_) => Colors.red);

    ```


    Obviously, StateProvider is part of Riverpod.


    #### Wait, What Is This *Provider* You Speak Of?


    We’re done with prep, the steps that are done once and up-front. Before we turn
    to using Riverpod in individual widgets, let’s focus on this provider thing. In
    Riverpod terms, a provider … umm … *provides* a saved value to anyone that asks
    for it. To share values between otherwise encapsulated widgets, we’ll write to
    a provider in one widget and then read from that same provider in another. But
    how?


    With Riverpod, we no longer inherit from StatefulWidgets. Instead, we inherit
    from *Consumer*StateWidgets. Get it? You write a provider that *provides* a value
    and a consumer that *consumes* that value. Clever, no? This consumer has a ref
    property which can see the providers. Check it out …


    ### 4\. Inherit from ConsumerStateWidget


    Every widget that needs access to shared data should be written slightly differently.


    Don’t do this:


    ```

    class FavColor extends StatefulWidget {

    const FavColor({super.key});

    @override

    State createState() => _FavColorState();

    }

    class _FavColorState extends State {}

    ```


    Instead, do this:


    ```

    class FavColor extends ConsumerStatefulWidget {

    const FavColor({super.key});

    @override

    ConsumerState createState() => _FavColorState();

    }

    class _FavColorState extends ConsumerState {}

    ```


    You see, the magic is that these Riverpod-supplied classes have a property called
    *ref*. And ref knows about all of the providers you created above. Now let’s use
    it.


    ### 5\. Read Data with ref.watch( )


    In a stateful widget, the best way to read data from a given provider is with
    ref.watch(theProvider), which will monitor the provider and trigger its widget
    to re-render when the value in the provider changes.


    ```

    Color favColor = ref.watch(favColorStateProvider);

    int favNumber = ref.watch(favNumberStateProvider);

    Person favPerson = ref.watch(favPersonStateNotifierProvider);

    ```


    Tip


    You can read data with ref.read() also. It’s just that ref.read() is bound one
    time only; ref.read() doesn’t update live but ref.watch() does.


    ### 6\. Write Data with ref.read( )


    Ironically, you can write with ref.read(). There are other ways, but this is the
    most straightforward. Just do this:


    ```

    ref.read(favColorStateProvider.notifier).state = newColor;

    ```


    When you assign the state of this provider, it will set the value and notify all
    the listeners – those who had subscribed earlier with ref.watch().


    There you have it. You can setup, write to, and read from Riverpod providers.
    We’ll stop there. There’s a ton more to this robust and powerful package, but
    you’ve got the idea. We have limited pages to devote and Riverpod will undoubtedly
    change. So if you’re ready to go deeper (and I recommend that you do), start here:
    [`https://pub.dev/packages/riverpod`](https://pub.dev/packages/riverpod). It will
    steer you to Riverpod’s home page and documentation for more.


    ## Conclusion


    The more stateful widgets we have, the more state needs to be passed around between
    them. This can get very complex very quickly so we look to packages like Redux,
    Hooks, raw_state, and ScopedModel, but most popularly, Riverpod to tame state.
    Sure, you could do it by hand using other tools and techniques like BLoC and InheritedWidget
    but that becomes unrealistic when your app approaches a large size.


