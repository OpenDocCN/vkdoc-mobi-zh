    space. It’s all eaten up by the Expanded.


    What if we add another Expanded? Let’s put one around the third and fourth widgets
    also (Figure [14-8](#638603_1_En_14_Chapter.xhtml#Fig8)):


    ![](images/638603_1_En_14_Chapter/638603_1_En_14_Fig8_HTML.jpg)


    Figure 14-8


    Expandeds will divide the free space among them


    ```

    Row(

    children: [

    SubWidget(),

    Expanded(child: SubWidget()),

    Expanded(child: SubWidget()),

    Expanded(child: SubWidget()),

    SubWidget(),

    SubWidget(),

    ],

    ```


    Note that the second one is now smaller because the extra space is shared with
    the third and fourth widgets, divided equally among them.


    But wait! There’s more! We can control how much space each Expanded gets. The
    Expanded has a property called the *flex* factor which is an integer. When the
    Row/Column is laid out, the rigid elements are sized first. Then, the flexible
    ones are expanded according to their flex factor (Figure [14-9](#638603_1_En_14_Chapter.xhtml#Fig9)).
    In the preceding examples, the Expandeds had the default flex factor of 1 so they
    got an equal amount of space. But if we gave them different flex factors, they’ll
    expand at different rates:


    ![](images/638603_1_En_14_Chapter/638603_1_En_14_Fig9_HTML.jpg)


    Figure 14-9


    Expandeds have flex property to control how much extra space each gets


    ```

    Row(

    children: [

    SubWidget(),

    Expanded(flex: 1, child: SubWidget()),

    Expanded(flex: 3, child: SubWidget()),

    Expanded(flex: 2, child: SubWidget()),

    SubWidget(),

    SubWidget(),

    ],

    ),

    ```


    Notice that the free space has still been allocated to the Expandeds but in the
    proportions of 1, 3, and 2 instead of evenly. So the one with a flex factor of
    3 gets three times as much space as the one with a flex factor of 1.


    ### Open Space with Expandeds


    Maybe you want empty space between things like we had with mainAxisAlignment,
    but you also want to control how big those spaces are. This is where Spacer and
    SizedBox widgets can help.


    Spacers put an empty space between widgets in a Row/Column. Each Spacer has a
    flex factor that plays well with all the other flex factors along this axis. So
    if you want to distribute space proportionally, Spacers will do the trick.


    Tip


    A Spacer is actually just an Expanded with an empty Container inside it.


    But sometimes you want to have fixed empty space, like you know precisely how
    many pixels you want to leave open. This is where a SizedBox can help. SizedBoxes
    have height and width properties for fine-grained control. Figure [14-10](#638603_1_En_14_Chapter.xhtml#Fig10)
    shows this.


    ![](images/638603_1_En_14_Chapter/638603_1_En_14_Fig10_HTML.jpg)


    Figure 14-10


    Spacer() and SizedBox() add free space back in but put you in control as to where
    and how much


    ```

    Row(

    children: [

    SubWidget(),

    Spacer(),

    Expanded(flex: 1, child: SubWidget()),

    Spacer(flex: 2),

    Expanded(flex: 3, child: SubWidget()),

    Expanded(flex: 2, child: SubWidget()),

    SubWidget(),

    SizedBox(width: 10.0),

    SubWidget(),

    ],

    ),

    ```


    ## Conclusion


    We’ve covered laying out the scene including what to do if there is extra space
    on the scene or there isn’t enough of it. So let’s learn the last of our five
    topics, how to fine-tune the spacing and position of widgets. We’ll do this by
    exploring the box model.


    # 15. Layout – Fine-Tuning Positioning


    We’re almost finished with our learning journey, discovering how to lay out a
    Flutter scene. You’ve made it through all but the last step.


    1.  Layout the entire scene


    2.  Position widgets relative to each other


    3.  Fix overflows, like when your widgets don’t fit on a screen


    4.  Handle extra space, like when your screen is bigger than it needs to be


    5.  Fine-tune the position


    At this point, we can put anything in a scene and position them next to or on
    top of one another in any imaginable configuration. If we run out of space, we
    can handle the overflows. And if we have too much space, we can expertly distribute
    it.


    Now if you’re ready to play in the big leagues, let’s talk about the fine-tuning.
    In this chapter, we’ll learn fine-grained control over all the pixels on the screen
    and it will center around the box model.'
  trans: '

    ### IntrinsicWidth


    如果你希望 `Column` 的所有子组件宽度一致，但又不一定占满整个屏幕宽度，可以使用 `IntrinsicWidth` 组件。使用 `crossAxisAlignment.stretch`
    时，它们会拉伸至最大宽度（图 14-3），但如果包裹在 `IntrinsicWidth` 中，它们都会和最宽的子组件保持相同尺寸（图 14-4 和 14-5）。


    ![](img/638603_1_En_14_Fig5_HTML.jpg)


    图 14-5


    使用 `IntrinsicWidth`，当有一个更宽的成员时，所有成员都会随之变宽


    ![](img/638603_1_En_14_Fig4_HTML.jpg)


    图 14-4


    使用 `IntrinsicWidth`，它们只会和最宽的成员一样宽


    ![](img/638603_1_En_14_Fig3_HTML.jpg)


    图 14-3


    未使用 `IntrinsicWidth` 时，所有子组件都会拉伸至整个宽度


    ```

    IntrinsicWidth(

    child: Column(

    mainAxisAlignment: MainAxisAlignment.center,

    crossAxisAlignment: CrossAxisAlignment.stretch,

    children: [ ... ],

    ),

    ),

    ```


    注意第三个子组件，在图 14-4 中它原本较长，但在图 14-5 中变得更宽。因此你可以看到，当最宽的子组件变宽时，所有子组件都会随之变宽。


    ## Expanded 组件


    当间距需求明确（比如希望等距分布）时，`mainAxisAlignment` 非常实用。这是常规情况。但如果你根本不需要间距呢？如果你希望子组件扩展以填满剩余空间呢？`Expanded`
    组件来救场！


    以下面的代码为例，如图 14-6 所示。


    ![](img/638603_1_En_14_Fig6_HTML.jpg)


    图 14-6


    这个 `Row` 组件有大量额外空间


    ```

    Row(

    mainAxisAlignment: MainAxisAlignment.spaceAround,

    children: [

    SubWidget(),

    SubWidget(),

    SubWidget(),

    SubWidget(),

    SubWidget(),

    SubWidget(),

    ],

    ),

    ```


    当你用 `Expanded` 组件包裹 `Row`/`Column` 的某个子组件时，该子组件会变得*可伸缩*，这意味着如果有额外空间，它会沿着主轴方向拉伸以填满该空间。


    下面展示同样的代码，只是第二个子组件包裹了 `Expanded()`。请见图 14-7，该组件现在扩展并吞噬了所有可用空间。


    ![](img/638603_1_En_14_Fig7_HTML.jpg)


    图 14-7


    第二个子组件被包裹在 `Expanded` 中


    ```

    Row(

    mainAxisAlignment: MainAxisAlignment.spaceAround,

    children: [

    SubWidget(),

    Expanded(child: SubWidget()),

    SubWidget(),

    SubWidget(),

    SubWidget(),

    SubWidget(),

    ],

    ),

    ```


    注意，此时 `mainAxisAlignment` 不再起作用，因为没有额外空间了——所有空间都被 `Expanded` 占用。


    如果再加一个 `Expanded` 会怎样？让我们把第三个和第四个组件也用该组件包裹（图 14-8）：


    ![](img/638603_1_En_14_Fig8_HTML.jpg)


    图 14-8


    多个 `Expanded` 会平分剩余空间


    ```

    Row(

    children: [

    SubWidget(),

    Expanded(child: SubWidget()),

    Expanded(child: SubWidget()),

    Expanded(child: SubWidget()),

    SubWidget(),

    SubWidget(),

    ],

    ),

    ```


    注意第二个组件现在变小了，因为额外空间被第三和第四个子组件共享，并平均分配。


    等等！还有更多功能！我们可以控制每个 `Expanded` 获取的空间大小。`Expanded` 有一个名为 *flex* 的属性，类型为整数。当布局 `Row`/`Column`
    时，刚性元素会先被确定尺寸，然后弹性元素根据其 flex 系数扩展（图 14-9）。在前面的例子中，`Expanded` 的默认 flex 系数为 1，因此它们获得了等量空间。但如果赋予它们不同的
    flex 系数，它们会以不同速率扩展：


    ![](img/638603_1_En_14_Fig9_HTML.jpg)


    图 14-9


    `Expanded` 的 flex 属性用于控制每个组件获得额外的空间量


    ```

    Row(

    children: [

    SubWidget(),

    Expanded(flex: 1, child: SubWidget()),

    Expanded(flex: 3, child: SubWidget()),

    Expanded(flex: 2, child: SubWidget()),

    SubWidget(),

    SubWidget(),

    ],

    ),

    ```


    请注意，剩余空间仍然分配给 `Expanded`，但比例是 1、3 和 2，而非均分。因此 flex 系数为 3 的组件获得的额外空间是 flex 系数为
    1 的组件的三倍。


    ### 使用 `Expanded` 创建开放空间


    也许你希望像使用 `mainAxisAlignment` 那样在元素之间留出空白，同时又想控制这些空白的大小。这时 `Spacer` 和 `SizedBox`
    组件就能派上用场。


    `Spacer` 在 `Row`/`Column` 的子组件之间插入空白空间。每个 `Spacer` 都有一个 flex 系数，该系数会与该轴上的所有其他
    flex 系数协调工作。因此，如果你想按比例分配空间，`Spacer` 就能实现。


    提示


    `Spacer` 实际上就是内部包含一个空 `Container` 的 `Expanded`。


    但有时你需要固定的空白空间，比如精确知道要留多少像素。这时 `SizedBox` 就有用了。`SizedBox` 拥有 `height` 和 `width`
    属性，可实现精细控制。图 14-10 展示了这一点。


    ![](img/638603_1_En_14_Fig10_HTML.jpg)


    图 14-10


    `Spacer()` 和 `SizedBox()` 重新引入了自由空间，但让你精准控制其位置和大小


    ```

    Row(

    children: [

    SubWidget(),

    Spacer(),

    Expanded(flex: 1, child: SubWidget()),

    Spacer(flex: 2),

    Expanded(flex: 3, child: SubWidget()),

    Expanded(flex: 2, child: SubWidget()),

    SubWidget(),

    SizedBox(width: 10.0),

    SubWidget(),

    ],

    ),

    ```


    ## 总结


    本章涵盖了场景布局的相关内容，包括当场景中有多余空间或空间不足时该如何处理。接下来让我们学习五个主题中的最后一个：如何微调组件的间距和位置。我们将通过探索盒模型来完成这一目标。


    # 15. 布局——微调定位


    我们的学习旅程即将结束，掌握了如何布局 Flutter 场景。你已完成了除最后一步之外的所有步骤。


    1. 布局整个场景


    2. 相对于其他组件定位组件


    3. 处理溢出问题（例如组件无法在屏幕上完整显示）


    4. 处理多余空间（例如屏幕比实际需要更大时）


    5. 微调位置


    至此，我们能够在场景中放置任意内容，并按任何可想象的配置将它们彼此相邻或重叠摆放。如果空间不足，我们可以处理溢出问题；如果空间过多，我们可以熟练地分配空间。


    现在，如果你准备好进入更高阶的阶段，让我们来讨论微调。在本章中，我们将学习如何精细控制屏幕上的每一个像素，而这一切都将围绕盒模型展开。

