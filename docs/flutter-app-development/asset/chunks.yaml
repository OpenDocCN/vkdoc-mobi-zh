- fmt: '# Container Decorations


    We promised at the top of this chapter to discuss borders. We did that because
    borders are not an obvious discussion. How do you add borders to `Text`? You can’t.
    How about a background to an `Icon`? Nope. They don’t have the capacity to have
    those decorations. But you know what does? A `Container`. When you have styling
    problems like these, the answer is almost always to wrap widgets in a `Container`
    and put a decoration on the `Container`.


    So understanding Container decorations solves a lot of problems for many, many
    widgets.


    `Container` has a catch-all styling property that is absent in most other widgets.
    It’s called `decoration`. Here’s an example of how to put a shadow on a container:


    ```

    child: Container(

    width: 300.0,

    height: 300.0,

    decoration: BoxDecoration(

    color: Colors.purple,

    boxShadow: [

    BoxShadow(

    offset: Offset.fromDirection(0.25*pi, 10.0),

    blurRadius: 10.0,

    )

    ],

    ),

    ),

    ```


    Figures [15-3](#638603_1_En_15_Chapter.xhtml#Fig3) and [15-4](#638603_1_En_15_Chapter.xhtml#Fig4)
    show boxes without and with shadows.


    ![](images/638603_1_En_15_Chapter/638603_1_En_15_Fig4_HTML.jpg)


    **Figure 15-4** With a box shadow


    ![](images/638603_1_En_15_Chapter/638603_1_En_15_Fig3_HTML.jpg)


    **Figure 15-3** Without a box shadow


    And this is a terrific example of the wordiness with Flutter. In the Web, this
    would have been done in 17 characters. But in Flutter, we have to remember that
    `boxShadow` is an *array* of `BoxShadow`s, each of which has an offset which takes
    a direction expressed in radians, a size expressed in pixels, and the blur radius
    is in pixels also. Sheesh!


    Blur radius may call for additional explanation. The blur radius is the distance
    over which the shadow dissipates. It’s like putting a lampshade on a lamp. Without
    a shade, the light is harsh and shadows are crisp. With a lampshade, the light
    is softer and the shadows are also. The larger the blur radius, the softer the
    shadow.


    > **Caution:** You cannot specify a color directly on a `Container` if you’re
    also using a `BoxDecoration`. But don’t panic; `BoxDecoration` also has a `color`
    property. Just move your `Container`’s `color` property into the `BoxDecoration`
    for the same effect.


    There are a number of other decorations available. Let’s look at the most useful
    ones: `border`, `borderRadius`, and `BoxShape`.


    ## Border


    Just like you used a `BoxDecoration` for shadows, you also use them to put a border
    on a container. Here’s a red border with four different widths (Figure [15-5](#638603_1_En_15_Chapter.xhtml#Fig5)):


    ![](images/638603_1_En_15_Chapter/638603_1_En_15_Fig5_HTML.jpg)


    **Figure 15-5** Borders with different widths


    ```

    Container(

    decoration: BoxDecoration(

    color: Colors.purple,

    border: Border(

    top: BorderSide(width: 10,color: Colors.red,),

    right: BorderSide(width: 20,color: Colors.red,),

    bottom: BorderSide(width: 30,color: Colors.red,),

    left: BorderSide(width: 40,color: Colors.red,),

    ),

    ),

    )

    ```


    While it’s nice that Flutter allows us to have different widths and even different
    colored borders, how often will you use that? Usually all four sides will be uniform.
    So we commonly use the shorthand `Border.all()`:


    ```

    Container(

    decoration: BoxDecoration(

    color: Colors.purple,

    border: Border.all(width: 10, color: Colors.red,),

    ),

    )

    ```


    Much simpler. Yes, still verbose, but simpler.


    ## BorderRadius


    Rounded corners are a favorite look. You can make a `Container` rounded even if
    it doesn’t have a border (Figure [15-6](#638603_1_En_15_Chapter.xhtml#Fig6)).
    You do this with `BorderRadius`:


    ![](images/638603_1_En_15_Chapter/638603_1_En_15_Fig6_HTML.jpg)


    **Figure 15-6** `BorderRadius` on two corners


    ```

    Container(

    decoration: BoxDecoration(

    color: Colors.purple,

    borderRadius: BorderRadius.only(

    topLeft: Radius.circular(20.0),

    topRight: Radius.circular(60.0),

    ),

    ),

    )

    ```


    We only gave it a `topLeft` and a `topRight` radius, but there is also a `bottomLeft`
    and `bottomRight` property. And although we appreciate the flexibility, it is
    not typical to use it. We ordinarily specify all four the same (Figure [15-7](#638603_1_En_15_Chapter.xhtml#Fig7)):


    ![](images/638603_1_En_15_Chapter/638603_1_En_15_Fig7_HTML.jpg)


    **Figure 15-7** `BorderRadius` on all four corners


    ```

    Container(

    decoration: BoxDecoration(

    color: Colors.purple,

    borderRadius: BorderRadius.all(Radius.circular(20.0),),

    ),

    )

    ```


    ## BoxShape


    Your containers don’t have to always be rectangles. When you need it to be another
    shape, you can make it so with `BoxShape` or `CustomPainter`. `BoxShape` is much
    easier to use, but it only supports circles, as in Figure [15-8](#638603_1_En_15_Chapter.xhtml#Fig8)
    (in addition to the default rectangle, of course):


    ![](images/638603_1_En_15_Chapter/638603_1_En_15_Fig8_HTML.jpg)


    **Figure 15-8** `BoxShape.circle` makes your `Container` round


    ```

    Container(

    decoration: BoxDecoration(

    shape: BoxShape.circle,

    color: Colors.deepOrange,

    ),

    ),

    ```


    `CustomPainter` is way more complex, but it allows infinite shapes. It would be
    distracting to get too deep into the details of `CustomPainter` (Figure [15-9](#638603_1_En_15_Chapter.xhtml#Fig9)),
    but here’s a quick example, a Superman shield:


    ![](images/638603_1_En_15_Chapter/638603_1_En_15_Fig9_HTML.jpg)


    **Figure 15-9** Using a `CustomPainter`


    ```

    Container(

    child: CustomPaint(

    size: Size(200, 200),

    painter: SupermanShieldPainter(),

    ),

    )

    class SupermanShieldPainter extends CustomPainter {

    @override

    void paint(Canvas canvas, Size size) {

    canvas.drawPath(Path()

    ..moveTo(25, 0)

    ..lineTo(125, 0)

    ..lineTo(150,25)

    ..lineTo(75, 125)

    ..lineTo(0,25)

    ..lineTo(25,0),

    Paint()

    ..style=PaintingStyle.fill

    ..color = Colors.red

    );

    }

    @override

    bool shouldRepaint(oldDelegate) => false;

    }

    ```


    See? Quite a bit more involved. Note that your container is still a rectangle.
    It’s just that the background is different. To dive deeper into `CustomPainter`,
    take a look at [`https://api.flutter.dev/flutter/widgets/CustomPaint-class.html`](https://api.flutter.dev/flutter/widgets/CustomPaint-class.html).


    > **Tip:** All of these decorations are applied to the `decoration` property,
    but they can also apply to a property called `foregroundDecoration` which, as
    the name suggests, is applied on a layer *above* the container. Because they’re
    drawn on top of the other things, you’ll want to keep in mind one more modification:
    opacity. Colors can be made semitransparent. The following would create a red
    layer on top of a container that is 50% transparent:

    >

    > ```

    > foregroundDecoration: BoxDecoration(

    > color:Colors.red.withOpacity(0.5),

    > ),

    > ```


    ## Conclusion


    In many ways, the `Container` is the quintessential Flutter widget, allowing tons
    of options to fine-tune your layouts. Heck, you could do the whole thing with
    `Container`s because they’re so versatile! (Don’t actually do this, kids. We’re
    just talking theory here.) But `Container`s are spectacularly useful for fine-tuning
    layouts and for adding visual decorations to so many other widgets.


    Hey, congratulations! You made it through some very tough concepts, all of which
    we hope were made easier to learn in the last few chapters. We’re going to finish
    off the book with a related subject: special presentational widgets. These will
    take your layouts to the next level!


    # 16. Layout – Special Presentation Widgets


    After the prior five chapters on layout, we’ve now covered the tools you’ll need
    for 90% of your layout needs, but there are more. A few are worth a glance just
    so you know what tool to reach for should the situation come up. These widgets
    are designed for very particular layout situations that, while common, aren’t
    everyday but need specialized tools to make happen.


    We’re going to glance at `Sliver`s and then do deep dives into `Stack` and `Table`
    widgets.'
