    # 可怕的“无限高度”错误


    我敢保证，在你的开发生涯中，你一定会遇到 Flutter 抛出这个错误：


    ```

    ══╡ Exception caught by rendering library ╞═════════════

    The following assertion was thrown during performResize(): Vertical viewport was
    given unbounded height.

    Viewports expand in the scrolling direction to fill their container. In this case,
    a vertical viewport was given an unlimited amount of vertical space in which to
    expand. This situation typically happens when a scrollable widget is nested inside
    another scrollable widget. If this widget is always nested in a scrollable widget
    there is no need to use a viewport because there will always be enough vertical
    space for the children. In this case, consider using a Column or Wrap instead.
    Otherwise, consider using a CustomScrollView to concatenate arbitrary slivers
    into a single scrollable.

    ```


    这个错误信息对开发者并不友好，对吧？大多数人在看到这条错误信息时，都会完全搞不懂代码中的问题所在。类似的错误信息可能还会说“RenderFlex children
    have non-zero flex”或者“RenderViewport does not support returning intrinsic dimensions.”这些消息都没什么帮助。如果它们能友好一点，应该会这样说：


    ```

    ══╡ You''re doing it wrong ╞═════════════════════════

    The ListView you''re drawing wants to be infinitely tall and it needs a parent
    widget that will keep it reasonably short. Maybe tell it to be small by wrapping
    it with an Expanded widget?

    ```


    这样是不是清晰多了？你就能明白问题所在以及如何修复。


    让我帮你解读 Flutter 试图告诉我们什么：某些 widget 想要填满所有可用空间。换句话说，它们是“贪婪的”。它们需要一个父 widget 来约束自己。如果它们处于一个拒绝提供这种约束的父
    widget 内，Flutter 就会崩溃，因为它无法绘制无限高的东西。下面用一些代码来说明这个问题。


    这段代码在一个 `Column()` 中绘制了一个标题和 20 个随机的 `Text()`。它看起来很正常（图 11-8）：


    ```

    Widget build(BuildContext context) {

    List randomTexts = List.generate(20,

    (i) => Text("Random number: ${Random().nextInt(1000)}-$i"));

    return Column(

    children: [

    Text("Some random strings for you", style: big),

    Column(

    children: randomTexts,

    ),

    ],

    );

    }

    ```


    ![](img/638603_1_En_11_Fig8_HTML.jpg)


    图 11-8


    一个短小的 Column 绘制得很好。


    当数量增加到 80 个随机的 `Text()` 时，就会溢出视口（图 11-9）。


    ![](img/638603_1_En_11_Fig9_HTML.jpg)


    图 11-9


    子元素过多的 Column 会溢出屏幕


    这看起来很难看，但这不是运行时错误。我们应该怎么做？我知道了！让我们把 `randomTexts` 列表放入一个 `ListView` 中使其可滚动。这是一个完全合乎逻辑的想法。


    ```

    @override

    Widget build(BuildContext context) {

    List randomTexts = List.generate(80,

    (i) => Text("Random number: ${Random().nextInt(1000)}-$i"));

    return Column(

    crossAxisAlignment: CrossAxisAlignment.center,

    children: [

    Text("Some random strings for you", style: big),

    ListView(

    children: randomTexts,

    ),

    ],

    );

    }

    ```


    我们只是把其中一个 widget 从 `Column` 换成了 `ListView`，然后就——砰！它崩溃了。看到了吗？`Column()` 认为它没有责任限制任何子元素的高度。“你想多大就多大，”`Column`
    说。而 `ListView` 会试图变得和它的父 widget 允许的一样大。由于 `ListView` 的父 widget 没有限制它，它就会变得无限高。


    坦白说，这是开发者没有真正理解 Flutter 如何处理布局的典型症状。所以让我试着解释一下 Flutter 的布局算法，希望能预测并避免像上面例子那样的混乱局面。然后我会解释一种解决方法。


    ## 算法本身


    你的 widget 在 `main` 方法的顶部总会有一个根 widget。它有分支、分支的分支，一直延续下去。我们称之为渲染树（图 11-10）。Flutter
    必须决定树中每个 widget 的大小。它通过询问每个 widget 它希望有多大，并询问其父 widget 是否允许这样做来实现。


    ![](img/638603_1_En_11_Fig10_HTML.png)


    图 11-10


    每个场景都有一个 widget 树


    Flutter 从顶部开始向下遍历树。它会读取根 widget 的 `BoxConstraints`（最大宽度和最大高度）。它记住这些约束，然后与每个子 widget
    通信。对于每个子 widget，它会将其 `BoxConstraints` 传递给它，然后继续向下遍历到孙 widget。它会一直这样做，直到每条分支的末端。我们称之为叶子层。


    然后它询问每个叶子的 `RenderBox`——它希望有多大。有些子元素是贪婪的，会说“尽可能大”。其他的则占用较小的空间。Flutter 允许叶子在其所有祖先的*约束之内*以其首选大小绘制。如果首选大小对于其父
    widget 的 `BoxConstraints` 来说太大，Flutter 会在运行时裁剪它——这是我们极力避免的！如果首选大小太小，Flutter 会用额外的空间填充它，直到它合适为止。


    然后它会向上返回一层，尝试将这些分支放入它们的共同父 widget 中，而这个父 widget 有自己的约束。以此类推，一直回到顶部。


    结果是，每个子 widget 都可以得到它喜欢的高度和宽度——只要它的父 widget 允许。并且，在所有子 widget 都有最终大小之前，没有父 widget
    会有最终大小。


    所以你可以看到我们是如何得到“无限高度”错误的。如果我们有一个子 widget 试图变得尽可能大，而又没有父 widget 来阻止它，Flutter 就会恐慌，因为这个子
    widget 现在无限高了。


    要解决这个问题，父 widget 只需要指示它的子 widget 停止增长。在我们的 `ListView`/`Column` 例子中，有几种解决方案。一种是将
    `Column` 和 `ListView` 互换。`Column` 并不贪婪，所以它可以放在 `ListView` 中。但这样一来，标题 `Text` 就会滚动出页面。另一种方法是将
    `ListView` 包裹在 `SizedBox` 中，以精确锁定大小，或者包裹在 `LimitedBox` 中，以提供 `maxWidth` 和 `maxHeight`。但这些解决方案都很笨拙。第三种方法是把
    `ListView` 包裹在一个 `Expanded` 中。我们将在几章后详细讲解 `Expanded`，但在这里它对我们有利，因为 `Expanded`
    会扩展以占据剩余（不是无限的）空间，并告诉它的子 widget 它现在有了 `BoxConstraints`。完美！我们只需要这样做：


    ```

    Widget build(BuildContext context) {

    List randomTexts = List.generate(80,

    (i) => Text("Random number: ${Random().nextInt(1000)}-$i"));

    return Column(

    crossAxisAlignment: CrossAxisAlignment.center,

    children: [

    Text("Some random strings for you", style: big),

    Expanded(         // <-- 添加这个 widget

    child: ListView(

    children: randomTexts,

    ),

    ),

    ],

    );

    }

    ```


    ## 结论


    你明白为什么我说理解布局策略很重要了吗？在你真正搞懂它之前，你只是在猜测解决方案。理解它们需要很多工作，但这是值得的。


    Flutter 有大量的 widget 来控制大小和位置。在接下来的几章中，我们将学习那些最关键的布局 widget——那些你绝对必须掌握的 widget。我们将从
    `Row` 和 `Column` 开始。


    脚注 1


    # 12. 布局 – 定位 Widget


    请记住，应用程序视觉部分的步骤是：


    1.  布局整个场景


    2.  将 widget 相对于彼此进行定位


    3.  修复溢出问题，例如当 widget 不适合屏幕时


    4.  处理多余空间，例如当屏幕比所需空间更大时


    5.  微调位置


    在上一章中，我们学习了 Flutter 的布局算法，并学会了如何使用 `MaterialApp`、`Scaffold` 及其典型子 widget 来为布局做好准备。现在是时候进入第二步了：`Row`
    和 `Column`。

