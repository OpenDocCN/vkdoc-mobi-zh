  trans: '

    ### 调整图像尺寸


    图像几乎总是被放置在一个容器中。这并不是硬性要求，只是我无法想象在实际使用中，图像会不被包裹在其他控件里。容器对图像的绘制尺寸有决定权。如果图像的原始尺寸能恰好匹配容器的尺寸，那将是非常惊人的巧合。实际上，Flutter
    的布局引擎会缩小图像以适配其容器，但不会放大它。这种适配方式被称为 `BoxFit.scaleDown`，并且作为默认行为是合理的。但还有哪些其他选项可用？我们又如何决定使用哪一个呢？表
    4-1 列出了 `BoxFit` 的可用选项。


    **表 4-1** *BoxFit 选项*


    | `fill` | 拉伸图像，使其宽度和高度都精确适配。可能会扭曲图像 | ![](img/638603_1_En_4_Figa_HTML.jpg) |

    | `cover` | 缩小或放大图像，直至填满空间。顶部/底部或两侧可能会被裁剪。不会扭曲图像 | ![](img/638603_1_En_4_Figb_HTML.jpg)
    |

    | `fitHeight` | 使高度精确适配。根据需要裁剪宽度或添加额外空间 | ![](img/638603_1_En_4_Figc_HTML.jpg)
    |

    | `fitWidth` | 使宽度精确适配。根据需要裁剪高度或添加额外空间 | ![](img/638603_1_En_4_Figd_HTML.jpg)
    |

    | `contain` | 缩小图像，直至高度*和*宽度都适配。顶部/底部或两侧可能会留有额外空间 | ![](img/638603_1_En_4_Fige_HTML.jpg)
    |


    *照片来源：[Eye for Ebony](https://unsplash.com/%2540eyeforebony%253Futm_source%253Dunsplash%2526utm_medium%253Dreferral%2526utm_content%253DcreditCopyText)
    在 [Unsplash](https://unsplash.com/search/photos/black-woman%253Futm_source%253Dunsplash%2526utm_medium%253Dreferral%2526utm_content%253DcreditCopyText)
    上发布*


    以上就是所有可选项，但你该如何选择呢？图 4-3 或许能帮助你在不同情况下决定使用哪种适配方式。


    ![](img/638603_1_En_4_Fig3_HTML.png)


    **图 4-3** 如何决定图像的适配方式


    要指定适配方式，你需要设置 `fit` 属性。


    ```

    Image.asset(''assets/images/woman.jpg'', fit: BoxFit.contain,),

    ```


    ### SnackBar 控件


    我知道这个名字很奇怪。听起来像某种美味的小吃，但这个控件实际上是向用户发出通知的标准方式。一个 `SnackBar`（图 4-4）会出现在屏幕底部，遮挡住原本在底部的任何内容，并在短暂时间后自动消失。你可以决定
    `SnackBar` 显示什么文字，甚至可以在其上放置一个按钮供用户执行操作。


    ![](img/638603_1_En_4_Fig4_HTML.jpg)


    **图 4-4** SnackBar 显示一条消息和可选的交互按钮


    你可以在任何场景中显示一个 `SnackBar`，只要这个操作是在嵌套在 `Scaffold` 内部的控件中进行的。你必须：


    1.  创建 `SnackBar`

    2.  调用 `ScaffoldMessenger.of(context).showSnackBar(sb)`

    3.  处理操作按钮（可选）


    请注意，`showSnackBar()` 是异步运行的，以避免阻塞 UI 线程。默认情况下它会显示四秒钟，但可以通过 `duration` 属性覆盖此设置。示例如下：


    ```

    IconButton(

    icon: const Icon(Icons.delete, size: 36),

    onPressed: () {

    bool goAheadAndDeletePerson = true;

    final SnackBar sb = SnackBar(

    content: Text("${person.name} 已删除。"),

    duration: const Duration(seconds: 5),

    action: SnackBarAction(

    label: "撤销",

    onPressed: () => goAheadAndDeletePerson = false,

    ),

    );

    ScaffoldMessenger.of(context).showSnackBar(sb);

    Future.delayed(const Duration(seconds: 5), () {

    if (goAheadAndDeletePerson) {

    deletePerson(person);

    }

    });

    },

    ),

    ```


    在这个例子中，我们对用户撒了个小谎 😲。我们告诉用户记录已被删除，但实际上他们有五秒钟的时间可以通过点击“撤销”来取消删除。`Future.delayed()`
    表示在五秒延迟后，在一个独立的 isolate 中执行 `deletePerson()`。如果用户在此期间点击了“撤销”，那么 `Future` 就会跳过删除操作。


    当然，你可能只想显示一条不带操作按钮的消息。这完全取决于你。


    ### 输入控件


    我们很多人都有 Web 开发的背景，从一开始就接触到了包含 `<input>` 和 `<select>` 的 HTML `<form>`。所有这些元素都是为了使用户能够向
    Web 应用输入数据，而这项活动在移动应用中同样不可或缺。Flutter 提供了类似 Web 上用于输入数据的控件，但它们的工作方式并不相同。创建和使用这些控件需要更多的工作量。对此深表歉意。不过，好的一面是，它们也更安全，并且为我们提供了更多的控制能力。


    造成这种复杂性的部分原因是，这些控件并不维护自己的状态；你需要手动管理。


    另一个复杂之处在于，输入控件彼此之间并不知道对方的存在。换句话说，除非你使用 `Form` 控件将它们组合在一起，否则它们彼此间的协作性并不好。我们最终需要重点学习
    `Form` 控件。但在那之前，让我们先研究如何创建文本字段、复选框、单选按钮、滑块和下拉菜单。


    **警告**


    > 输入控件只有在 `StatefulWidget` 内部使用时才易于操作，因为它们本质上是会改变状态的。请记住，我们在上一章简要提到了 `StatefulWidget`，我们将在第
    7 章“管理状态”中深入讨论它们。但在那之前，请暂且相信我们，目前先把它们放在有状态控件中使用。


    #### 文本字段


    如果你只需要一个简单的文本框，那么 `TextField` 控件可能就是你想要的。下面是一个 `TextField` 控件的简单示例，其上方带有一个 `Text`
    标签：


    ```

    const Text(''搜索词''),

    TextField(

    initialValue: "一些初始值",

    onChanged: (val) => _searchTerm = val,

    ),

    ```


    这里的 `onChanged` 属性是一个事件处理程序，会在每次按键后触发。它接收一个 `String` 类型的值。这是用户正在输入的值。在这个示例中，我们将用户输入的内容赋值给一个名为
    `_searchTerm` 的局部变量。


    你注意到 `Text(''搜索词'')` 了吗？这是我们试图在 `TextField` 上方添加标签的拙劣尝试。其实有更好得多的方法。看看这个……


    ##### 让 TextField 变得更精致


    有很多选项可以让你的 `TextField` 更有用——虽然不是无限的选项，但也很多。所有这些选项都可以通过 `InputDecoration` 控件（图
    4-5）来设置：


    ![](img/638603_1_En_4_Fig5_HTML.jpg)


    **图 4-5** 一个带有 InputDecoration 的 TextField


    ```

    return TextField(

    decoration: InputDecoration(

    labelText: ''邮箱'',

    hintText: ''you@email.com'',

    icon: Icon(Icons.contact_mail),

    ),

    ),

    ```


    表 4-2 列出了更多 `InputDecoration` 的选项。


    **表 4-2** *InputDecoration 选项*


    | 属性 | 描述 |

    | --- | --- |

    | `labelText` | 显示在 `TextField` 上方。告知用户这个 `TextField` 的作用 |

    | `hintText` | `TextField` 内部浅色的提示文字。用户开始输入时消失 |

    | `errorText` | 显示在 `TextField` 下方的错误信息。通常为红色。由验证机制自动设置（稍后介绍），但你也可以在需要时手动设置 |

    | `icon` | 在整个 `TextField` 的左侧绘制一个图标 |

    | `prefixIcon` | 在 `TextField` 内部靠左绘制一个图标 |

    | `suffixIcon` | 与 `prefixIcon` 类似，但位于最右侧 |


    #### 密码框


    要将其变为密码框（图 4-6），将 `obscureText` 属性设置为 `true`。用户输入时，每个字符短暂显示一秒后会替换成一个圆点。


    ![](img/638603_1_En_4_Fig6_HTML.jpg)


    **图 4-6** 设置了 `obscureText` 的密码框


    ```

    return TextField(

    obscureText: true,

    decoration: InputDecoration(

    labelText: ''密码'',

    ),);

    ```

