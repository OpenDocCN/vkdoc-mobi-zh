- fmt: '# Conclusion


    Not too shabby, huh? We went from knowing almost nothing about reading and writing
    data via HTTP to a comprehensive example using some fairly advanced techniques
    like the typed deserialization pattern and the `FutureBuilder` widget.


    If you followed my code examples above, your app reads HTTP data just great. But
    it still wouldn’t look like the screenshots. You see, I used styles and theming
    to make it look pleasing to the eyes. Styling is still a bit of a mystery to us.
    Hey, let’s unwrap that mystery in the next chapter!


    Footnotes [1](#638603_1_En_9_Chapter.xhtml#Fn1_source)   [2](#638603_1_En_9_Chapter.xhtml#Fn2_source)   [3](#638603_1_En_9_Chapter.xhtml#Fn3_source)   [4](#638603_1_En_9_Chapter.xhtml#Fn4_source)


    # 10. Styling with Themes


    Styling your widgets isn’t entirely new to you. We’ve touched on some minor styling
    features in prior chapters, and you’ve seen styling techniques in our code samples.
    But this is the chapter where we’ll take a deep dive on styling. Finally!


    You can always do low-level styling so we’ll start with that. Then we’ll progress
    to the more complex but cleaner way with themes. We’ll bring the chapter to a
    close with the nitty-gritty of colors and custom fonts.


    ## Thinking in Flutter Styles


    Styling in Flutter borrows the best ideas from Android, iOS development, and web
    development. But it doesn’t copy their techniques *exactly*. Flutter does things
    its own way, and it is a mistake to take the web analogies too far. Flutter’s
    styling is not CSS. Whereas CSS has certain properties that are passed down to
    their children, Flutter styles are not inherited. You cannot set a font family
    on your custom widget, for example, and have all of the `Text`s and `TextField`s
    and buttons inside it suddenly begin rendering with that font. To make that kind
    of thing happen, we’ll create and apply a theme. But first, let’s learn how to
    apply styles to elements.


    ## Individual Styles


    We’ve peeked at this in prior chapters and in code examples. Most widgets will
    accept a `style` property and often style-adjacent properties like padding, borders,
    and so forth. You can and sometimes do manually set these values, usually when
    you have styling needs that only apply to one instance of one widget, like an
    individual `Text` widget.


    ### Styling Text


    ```

    Text(aString, style: TextStyle(

    fontSize: 12.0,

    fontWeight: FontWeight.bold,

    color: Colors.blue,

    fontStyle: FontStyle.italic,

    )),

    ```


    `Text` widgets have a `style` property which takes a `TextStyle` object (Figure
    [10-1](#638603_1_En_10_Chapter.xhtml#Fig1)).


    ![](images/638603_1_En_10_Chapter/638603_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    With and without style


    You’ll simply set the `style` property to an instance of a `TextStyle` widget
    and set properties. `TextStyle` supports about 20 properties. Here are the most
    useful:


    *   `color` – Any of the valid 16+ million colors

    *   `decoration` – `TextDecoration.underline`, `overline`, `strikethrough`, `none`

    *   `fontSize` – A double. The number of pixels tall to make the characters. Default
    size 14.0 pixels

    *   `fontStyle` – `FontStyle.italic` or `normal`

    *   `fontWeight` – `FontWeight.w100`-`w900`. Or `bold` (which is `w700`) or `normal`
    (which is `w400`)

    *   `fontFamily` – A string


    `fontFamily` is a bigger topic which we’ll deal with at the end of this chapter.


    Many widgets have a `style` property, and if you need to set the style of just
    one widget, this is the best way. But best practice would be to avoid individual
    styles as much as you can. It’s much better and cleaner to create and apply a
    theme.


    ## Mass-Changing Values


    True story. I had a near-finished app. It was a thing of beauty. I chose colors
    from my client’s corporate logo, assuming they’d appreciate me conforming to their
    marketing scheme. Well, one of their colors was cordovan and I used it liberally.
    My client hated that color, thinking that its reddish hue was communicating “danger”
    or “error.” And you know what? They were right! I just hadn’t made that connection.
    So of course I wanted to change it throughout.


    Now, imagine what I had to do. Go through the entire app? Find all of the occurrences
    of that color in the hundreds of `Text` widgets, borders, shadows, buttons, cards,
    and tiles? Nope. Because I used a theme, I changed it in one place while the client
    waited. In fact, we iterated with different colors until we found a color scheme
    that they loved. It was super easy, barely an inconvenience! Let’s look at the
    right way to set styles with themes.


    ## Themes


    When you use a theme, you define the styles in one file at one time, up front.
    And why?


    1.  There’s a consistent, cohesive look and feel across your entire app.

    2.  Style changes across the entire app become almost effortless.


    To use a theme involves five fairly simple steps:


    1.  Set the `ColorScheme`

    2.  Set the `TextTheme`

    3.  Create widget-specific themes

    4.  Combine all these into the theme

    5.  Override the styles on lower-level widgets if needed


    Let’s work through these.


    ### 1. ColorScheme


    The `ColorScheme` forms the basic colors of your app:


    *   `primary` – The main brand color

    *   `secondary` – An accent color

    *   `tertiary` – A less prominent color

    *   `error` – For spotlighting errors

    *   `background` – The general background color

    *   `outline` – For borders

    *   `surface` – For cards and container backgrounds


    Four of these, `primary`, `secondary`, `tertiary`, and `error`, are each further
    broken into “on,” “container,” and “onContainer.” For example, `primary` has:


    *   `primary` – The main brand color

    *   `onPrimary` – A color that contrasts `primary`; good for readability

    *   `primaryContainer` – A good background color for `primary`

    *   `onPrimaryContainer` – Readable as text on a `primaryContainer` background


    These are all colors that are scientifically selected to look beautiful together,
    and they’re generated from a single primary color, the *seed* color.


    ```

    var _scheme = ColorScheme.fromSeed(seedColor: );

    ```


    **Caution:** `ColorScheme.fromSwatch( )` is not deprecated per se, but it was
    designed to work with Material 1 and 2. If you’re using Material 3 and up, use
    `ColorScheme.fromSeed( )`.


    Take a look at the standard colors in three different schemes (Figures [10-2](#638603_1_En_10_Chapter.xhtml#Fig2)
    through [10-4](#638603_1_En_10_Chapter.xhtml#Fig4)):


    ![](images/638603_1_En_10_Chapter/638603_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    A burnt orange scheme


    ![](images/638603_1_En_10_Chapter/638603_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    A blue scheme


    ![](images/638603_1_En_10_Chapter/638603_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    A green scheme


    You can of course create your `ColorScheme` object and set its every color manually
    but that would be a ton of work! Instead, let Flutter do the hard work of creating
    an initial scheme via `ColorScheme.fromSeed()` and supply your seed color.


    **Tip:** In addition to the colors listed above, there''s also `shadow`, `scrim`,
    `surface`, `surfaceVariant`, and more – about 30 in all. Don''t worry about memorizing
    them. Now that you get the idea, you can look up the ones you want when the time
    comes.


    If you decide to adjust one or more of the default colors, use `copyWith()`:


    ```

    ColorScheme _colorScheme = ColorScheme.fromSeed(

    seedColor: Colors.green,

    ).copyWith(

    error: Color.fromARGB(255, 191, 87, 0),

    onError: Colors.white,

    );

    ```


    This will set all the colors with one command.'
