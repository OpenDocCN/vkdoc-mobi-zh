- fmt: '# The Dreaded “Unbounded Height” Error


    I guarantee that at some point in your career, you’re going to see Flutter throw
    this error:


    ```

    ══╡ Exception caught by rendering library ╞═════════════

    The following assertion was thrown during performResize(): Vertical viewport was
    given unbounded height.

    Viewports expand in the scrolling direction to fill their container. In this case,
    a vertical viewport was given an unlimited amount of vertical space in which to
    expand. This situation typically happens when a scrollable widget is nested inside
    another scrollable widget. If this widget is always nested in a scrollable widget
    there is no need to use a viewport because there will always be enough vertical
    space for the children. In this case, consider using a Column or Wrap instead.
    Otherwise, consider using a CustomScrollView to concatenate arbitrary slivers
    into a single scrollable.

    ```


    It’s not the most developer-friendly error message, is it? Most of us would have
    no hope of understanding the problem in our code with that error message. Similar
    messages may say “RenderFlex children have non-zero flex” error. Or “RenderViewport
    does not support returning intrinsic dimensions.” None of these are very helpful.
    If they were being kind, they’d have said something like:


    ```

    ══╡ You''re doing it wrong ╞═════════════════════════

    The ListView you''re drawing wants to be infinitely tall and it needs a parent
    widget that will keep it reasonably short. Maybe tell it to be small by wrapping
    it with an Expanded widget?

    ```


    Now wouldn’t that have been clearer? You’d understand the problem and how to fix
    it.


    Let me help you interpret what Flutter is trying to tell us; certain widgets want
    to fill all the available space. In other words, they’re greedy. They need a parent
    to constrain them. If they’re inside of a parent who refuses to provide that constraint,
    Flutter freaks out because it can’t draw something infinitely tall. Here’s some
    code to illustrate the problem.


    This code draws a header and 20 random `Text()`s in a `Column()`. It looks just
    fine (Figure [11-8](#638603_1_En_11_Chapter.xhtml#Fig8)):


    ```

    Widget build(BuildContext context) {

    List randomTexts = List.generate(20,

    (i) => Text("Random number: ${Random().nextInt(1000)}-$i"));

    return Column(

    children: [

    Text("Some random strings for you", style: big),

    Column(

    children: randomTexts,

    ),

    ],

    );

    }

    ```


    ![](images/638603_1_En_11_Chapter/638603_1_En_11_Fig8_HTML.jpg)


    Figure 11-8


    A short Column draws just fine.


    Increase that number to 80 random `Text()`s and we overflow the viewport (Figure
    [11-9](#638603_1_En_11_Chapter.xhtml#Fig9)).


    ![](images/638603_1_En_11_Chapter/638603_1_En_11_Fig9_HTML.jpg)


    Figure 11-9


    A Column with too many children overflows the screen


    That’s ugly, but that’s not a runtime error. What should we do? I know! Let’s
    make the list of `randomTexts` scrollable by putting them in a `ListView`. This
    is a perfectly logical thought.


    ```

    @override

    Widget build(BuildContext context) {

    List randomTexts = List.generate(80,

    (i) => Text("Random number: ${Random().nextInt(1000)}-$i"));

    return Column(

    crossAxisAlignment: CrossAxisAlignment.center,

    children: [

    Text("Some random strings for you", style: big),

    ListView(

    children: randomTexts,

    ),

    ],

    );

    }

    ```


    All we did was change one widget from `Column` to `ListView` and BOOM! It blows
    up. See? The `Column()` doesn’t think it’s her responsibility to limit any children’s
    height. “Be as big as you’d like,” `Column` says. `ListView` will try to be as
    big as her parent will let her. Since `ListView`’s parent isn’t limiting her,
    she will be infinitely tall.


    To be blunt, this is a symptom of the developer not really understanding how Flutter
    handles layouts. So let me try to explain Flutter’s layout algorithm in hopes
    of predicting and therefore avoiding snafus like the preceding example. Then I’ll
    explain a way to solve it.


    ## The Algorithm Itself


    Your widgets will always have a root widget at the top of your `main` method.
    It has branches and branches of branches and on and on. Let’s call this the render
    tree (Figure [11-10](#638603_1_En_11_Chapter.xhtml#Fig10)). Flutter has to decide
    how big to make each widget in the tree. It does so by asking each widget how
    big it would prefer to be and asking its parent if that is okay.


    ![](images/638603_1_En_11_Chapter/638603_1_En_11_Fig10_HTML.png)


    Figure 11-10


    Every scene has a widget tree


    Flutter travels down the tree starting at the top. It reads the `BoxConstraints`
    (max width and max height) of the root widget. It remembers them and then talks
    to each child. For each child, it communicates its `BoxConstraints` to them and
    then travels to the grandchildren. It keeps doing this all the way to the end
    of every branch. We call this the leaf level.


    It then asks each leaf its `RenderBox` – how big it would prefer to be. Some children
    are greedy and say “as big as possible.” Others take up a smaller amount. Flutter
    allows the leaf to be drawn at its preferred size *within the constraints* of
    all of its ancestors. If the preferred size is too big for its parent’s `BoxConstraints`,
    Flutter clips it at runtime – something we work very hard to avoid! If the preferred
    size is too small, Flutter pads it with extra space until it fits.


    It then goes back up a level and tries to fit those branches inside their common
    parent which has its own constraints. And so on all the way back up to the top.


    The result is that each child gets to be its favorite height and width – as long
    as its parent allows it. And no parent has a final size until all of its child
    do.


    So you can see how we’d get the “unbounded height” error. If we had a child who
    tries to be as large as it can and it doesn’t have a parent to tell it to stop,
    Flutter panics because the child is now infinitely tall.


    To solve the problem, the parent simply needs to instruct its child to stop growing.
    In our `ListView`/`Column` example, there are several solutions. One is to swap
    the `Column` and the `ListView`. A column isn’t greedy so it can live in a `ListView`.
    But then the header `Text` scrolls off the page. Another is to wrap the `ListView`
    in a `SizedBox` which locks in the size exactly or a `LimitedBox` which provides
    a `maxWidth` and `maxHeight`. But those solutions are both clumsy. A third method
    is to wrap the `ListView` in an `Expanded`. We’ll cover `Expanded` in detail in
    a few chapters but works in our favor in this case because the `Expanded` expands
    to take up the remaining (not infinite) space and tells its child that it now
    has `BoxConstraints`. Perfect! Here is all we need to do:


    ```

    Widget build(BuildContext context) {

    List randomTexts = List.generate(80,

    (i) => Text("Random number: ${Random().nextInt(1000)}-$i"));

    return Column(

    crossAxisAlignment: CrossAxisAlignment.center,

    children: [

    Text("Some random strings for you", style: big),

    Expanded(         // <-- Add this widget

    child: ListView(

    children: randomTexts,

    ),

    ),

    ],

    );

    }

    ```


    ## Conclusion


    Do you see why I said it’s important to understand the layout strategy? Until
    you get your head around it, you’re just guessing the solution. It’s a lot of
    work to understand them all, but it’s worth the effort.


    Flutter has a ton of widgets to control size and position. For the next few chapters,
    we’re going to study the most critical of those layout widgets – the ones you
    absolutely must know. We’ll start with `Row` and `Column`.


    Footnotes [1](#638603_1_En_11_Chapter.xhtml#Fn1_source)


    # 12. Layout – Positioning Widgets


    Remember that the steps to the visual portion of an app are


    1.  Layout the entire scene


    2.  Position widgets relative to each other


    3.  Fix overflows, like when your widgets don’t fit on a screen


    4.  Handle extra space, like when your screen is bigger than it needs to be


    5.  Fine-tune the position


    In the last chapter, we studied Flutter’s layout algorithm and we’ve learned how
    to set ourselves up for layouts with `MaterialApp`, `Scaffold`, and it’s typical
    children. It’s time to move on to step two, Rows and Columns.'
