- fmt: "# Putting Widgets Next to or Below Others\n\n`Row` and `Column`, as the names\
    \ suggest, are made for laying out widgets side by side (`Row`, Figure [12-1](#638603_1_En_12_Chapter.xhtml#Fig1))\
    \ or above and below (`Column`, Figure [12-2](#638603_1_En_12_Chapter.xhtml#Fig2)).\
    \ Other than how they lay out their children, they’re nearly identical.\n\n![Figure\
    \ 12-1](images/638603_1_En_12_Chapter/638603_1_En_12_Fig1_HTML.png)\n\n**Figure\
    \ 12-1** A `Row` widget lays out side by side\n\n```\nRow(\n  children: [\n  \
    \  SomeWidget(),\n    SomeWidget(),\n    SomeWidget(),\n  ],\n),\n```\n\n![Figure\
    \ 12-2](images/638603_1_En_12_Chapter/638603_1_En_12_Fig2_HTML.png)\n\n**Figure\
    \ 12-2** A `Column` widget lays out above and below\n\n```\nColumn(\n  children:\
    \ [\n    SomeWidget(),\n    SomeWidget(),\n    SomeWidget(),\n  ],\n),\n```\n\n\
    Notice that they both have a `children` property which is an array of widgets.\
    \ All widgets in the `children` array will be displayed in the order you add them.\
    \ You can even have rows inside columns and vice versa as many levels deep as\
    \ you like. In this way, you can create nearly any layout imaginable in any app.\n\
    \n`Row`s and `Column`s will be your go-to layout widgets. Yes, there are others,\
    \ but these two are your first calls.\n\n## Responsive Design\n\nResponsive design\
    \ originated in the early 2010s as the Web transitioned from desktop-dominated\
    \ browsing to a world of smartphones and tablets, requiring websites to adapt\
    \ to the new landscape of diverse screen sizes. A web app adjusts its layout in\
    \ response to the screen size and orientation of the device on which it’s being\
    \ viewed. See what I did there? It’s a *design* that is *responsive* to the screen\
    \ size and orientation.\n\n### Responsive Design in Flutter\n\nFlutter UIs need\
    \ to adapt to mobile devices. Responsive Design ensures that your app’s layout\
    \ adjusts to different screen sizes and orientations, whether a user is holding\
    \ their phone in portrait mode or has rotated it to landscape.\n\nImagine using\
    \ your app in portrait mode. The layout is clean and all the elements are easy\
    \ to tap and read. However, when rotated to landscape, the device text might overflow,\
    \ buttons become too close together, or elements are hidden entirely. Using the\
    \ `Flex` widget with `MediaQuery` enables you to create a UI that intelligently\
    \ adapts to the available space. This ensures a frustration-free experience for\
    \ users, regardless of how they choose to hold their device.\n\n### Flex and MediaQuery\n\
    \nJust like a `Row` or `Column`, the `Flex` widget puts its children side by side\
    \ or above and below. But `Flex` is flexible. It has an `orientation` property,\
    \ vertical or horizontal.\n\n- A `Flex` with `orientation` horizontal is exactly\
    \ a `Row()`.\n- A `Flex` with `orientation` vertical is exactly a `Column()`.\n\
    \nNote that this `orientation` property can be made conditional. That’s where\
    \ `MediaQuery` comes in.\n\n`MediaQuery` gets certain data from the device itself.\n\
    \n- `MediaQuery.sizeOf(context)` – Width and height\n- `MediaQuery.displayFeaturesOf(context)`\
    \ – Camera holes, notches, etc.\n- `MediaQuery.platformBrightnessOf(context)`\
    \ – Light or dark mode\n- `MediaQuery.textScaleFactorOr(context)` – Current font\
    \ sizing\n- `MediaQuery.viewInsetsOf(context)` – How much padding is the device\
    \ applying?\n- `MediaQuery.devicePixelRatioOf(context)` – Pixel density\n\n> **Note**\
    \  \n> As far as Flutter is concerned, pixels are actually *logical* pixels. You\
    \ iOS developers call them *points*, and Android devs call them *density-independent\
    \ pixels*. `MediaQuery.devicePixelRatioOf(context)` helps us to determine the\
    \ true pixel density should you ever need it.\n\n- `MediaQuery.orientationOf(context)`\
    \ – Landscape or portrait\n\nThis last one is the key. You’re going to examine\
    \ the orientation, and if it’s landscape, we need a `Row`. Otherwise, it should\
    \ be in a `Column`. Here’s some code:\n\n```\nFlex(\n  direction:\n    MediaQuery.orientationOf(context)\
    \ == Orientation.landscape ?\n    Axis.horizontal : Axis.vertical,\n  children:\
    \ [\n    SomeWidget(),\n    SomeWidget(),\n    SomeWidget(),\n  ],\n),\n```\n\n\
    ## Conclusion\n\nYou now have the ability to place widgets beside one another\
    \ or above and below. You can even `Flex` them responsively when needed. But what\
    \ happens if the layout engine just doesn’t have enough screen real estate to\
    \ show all the content needed? What do we do then? Let’s look at that in the next\
    \ chapter.\n\n# 13. Layout – Fixing Overflows\n\nYour widgets will never fit your\
    \ screen.\n\nIt would be an overwhelming coincidence if the elements fit perfectly\
    \ in a scene. And if they ever fit perfectly, as soon as the app is run on a different\
    \ screen size or rotated from portrait to landscape, that will change. So we need\
    \ to handle two situations:\n\n1. What if there’s not enough space? (too many\
    \ widgets in a given space)\n2. What if there’s extra space left over? (more screen\
    \ than pixels taken up by the widgets)\n\nThese are both likely to happen *simultaneously*\
    \ on different parts of your scene. Let’s tackle insufficient space in this chapter\
    \ and deal with too much space in the next.\n\n## Overflow Warning Bars\n\nTo\
    \ overflow a container isn’t a fatal error, but it’s bad. When any widget overflows\
    \ a screen at debug time, Flutter is kind enough to let you know by showing you\
    \ an overflow warning (Figure [13-1](#638603_1_En_13_Chapter.xhtml#Fig1)). They’re\
    \ yellow-and-black stripes along with some tiny red text saying by how many pixels\
    \ it has overflowed.\n\n![Figure 13-1](images/638603_1_En_13_Chapter/638603_1_En_13_Fig1_HTML.jpg)\n\
    \n**Figure 13-1** Overflow bars\n\n> **Tip**  \n> The warning appears only in\
    \ debug mode. A production app will never show these overflow bars. Instead the\
    \ widget will simply be clipped. I’m not certain that’s better.\n\n## Our Options\
    \ to Correct Overflows\n\nIn the real world, if you have a fixed size container,\
    \ say a cardboard box, and need to put something in it that is too big to fit,\
    \ what would you do?\n\n1. Fold or disassemble the contents (assuming they can\
    \ be disassembled or folded).\n2. Squeeze the contents until they fit (assuming\
    \ they’re squeezable).\n3. Put it in multiple boxes.\n\nLogically, those are our\
    \ only options. Let’s apply this same thinking to Flutter screens. We have the\
    \ same three options:\n\n1. Allow the children to wrap (assuming they can wrap).\n\
    2. Squeeze the children until they fit (assuming they’re scalable).\n3. Allow\
    \ the user to scroll.\n\nLet’s see how we do those three things in Flutter.\n\n\
    ## A Sample Problem to Solve\n\nTo illustrate our three options, we’ve been given\
    \ a list of random lorem ipsum strings. I’ve created a custom widget called `Word()`\
    \ that is merely a wrapper around a `Text()` with a style and some padding. I’ll\
    \ convert those strings into `Word` widgets with `.map` and put them in a `Column`\
    \ like so:\n\n```\nWidget build(BuildContext context) {\n  var wordWidgets = words.map((w)\
    \ => Word(w)).toList();\n  return Column(\n    children: wordWidgets,\n  );\n\
    }\n```\n\nFigure [13-2](#638603_1_En_13_Chapter.xhtml#Fig2) shows what you might\
    \ see from this code.\n\n![Figure 13-2](images/638603_1_En_13_Chapter/638603_1_En_13_Fig2_HTML.jpg)\n\
    \n**Figure 13-2** Looks great in a `Column`\n\nSo far so good? In a `Column`,\
    \ it displays just fine – plenty of room. But when we make it a row:\n\n```\n\
    Widget build(BuildContext context) {\n  var wordWidgets = words.map((w) => Word(w)).toList();\n\
    \  return Row(\n    children: wordWidgets,\n  );\n}\n```\n\nWe have an issue.\
    \ All those words can’t fit across this device and we get overflow bars on the\
    \ right (Figure [13-3](#638603_1_En_13_Chapter.xhtml#Fig3)).\n\n![Figure 13-3](images/638603_1_En_13_Chapter/638603_1_En_13_Fig3_HTML.jpg)\n\
    \n**Figure 13-3** Overflow bars show we’ve overflowed the screen to the right\n\
    \nRemember, we have three options to solve the overflow. The first is probably\
    \ the best in our scenario – allow the `Word` widgets to wrap in their row."
  raw: '## Putting Widgets Next to or Below Others


    Row and Column, as the names suggest, are made for laying out widgets side by
    side (Row, Figure [12-1](#638603_1_En_12_Chapter.xhtml#Fig1)) or above and below
    (Column, Figure [12-2](#638603_1_En_12_Chapter.xhtml#Fig2)). Other than how they
    lay out their children, they’re nearly identical.


    ![](images/638603_1_En_12_Chapter/638603_1_En_12_Fig1_HTML.png)


    Figure 12-1


    A Row widget lays out side by side


    ```

    Row(

    children: [

    SomeWidget(),

    SomeWidget(),

    SomeWidget(),

    ],

    ),

    ```


    ![](images/638603_1_En_12_Chapter/638603_1_En_12_Fig2_HTML.png)


    Figure 12-2


    A Column widget lays out above and below


    ```

    Column(

    children: [

    SomeWidget(),

    SomeWidget(),

    SomeWidget(),

    ],

    ),

    ```


    Notice that they both have a children property which is an array of widgets. All
    widgets in the children array will be displayed in the order you add them. You
    can even have rows inside columns and vice versa as many levels deep as you like.
    In this way, you can create nearly any layout imaginable in any app.


    Rows and Columns will be your go-to layout widgets. Yes, there are others, but
    these two are your first calls.


    ## Responsive Design


    Responsive design originated in the early 2010s as the Web transitioned from desktop-dominated
    browsing to a world of smartphones and tablets, requiring websites to adapt to
    the new landscape of diverse screen sizes. A web app adjusts its layout in response
    to the screen size and orientation of the device on which it’s being viewed. See
    what I did there? It’s a *design* that is *responsive* to the screen size and
    orientation.


    ### Responsive Design in Flutter


    Flutter UIs need to adapt to mobile devices. Responsive Design ensures that your
    app’s layout adjusts to different screen sizes and orientations, whether a user
    is holding their phone in portrait mode or has rotated it to landscape.


    Imagine using your app in portrait mode. The layout is clean and all the elements
    are easy to tap and read. However, when rotated to landscape, the device text
    might overflow, buttons become too close together, or elements are hidden entirely.
    Using the Flex widget with MediaQuery enables you to create a UI that intelligently
    adapts to the available space. This ensures a frustration-free experience for
    users, regardless of how they choose to hold their device.


    ### Flex and MediaQuery


    Just like a Row or Column, the Flex widget puts its children side by side or above
    and below. But Flex is flexible. It has an orientation property, vertical or horizontal.


    *   A Flex with orientation horizontal is exactly a Row().


    *   A Flex with orientation vertical is exactly a Column().


    Note that this orientation property can be made conditional. That’s where MediaQuery
    comes in.


    MediaQuery gets certain data from the device itself.


    *   MediaQuery.sizeOf(context) – Width and height


    *   MediaQuery.displayFeaturesOf(context) – Camera holes, notches, etc.


    *   MediaQuery.platformBrightnessOf(context) – Light or dark mode


    *   MediaQuery.textScaleFactorOr(context) – Current font sizing


    *   MediaQuery.viewInsetsOf(context) – How much padding is the device applying?


    *   MediaQuery.devicePixelRatioOf(context) – Pixel density


    Note


    As far as Flutter is concerned, pixels are actually *logical* pixels. You iOS
    developers call them *points*, and Android devs call them *density-independent
    pixels*. MediaQuery.devicePixelRatioOf(context) helps us to determine the true
    pixel density should you ever need it.


    *   MediaQuery.orientationOf(context) – Landscape or portrait


    This last one is the key. You’re going to examine the orientation, and if it’s
    landscape, we need a Row. Otherwise, it should be in a Column. Here’s some code:


    ```

    Flex(

    direction:

    MediaQuery.orientationOf(context) == Orientation.landscape ?

    Axis.horizontal : Axis.vertical,

    children: [

    SomeWidget(),

    SomeWidget(),

    SomeWidget(),

    ],

    ),

    ```


    ## Conclusion


    You now have the ability to place widgets beside one another or above and below.
    You can even Flex them responsively when needed. But what happens if the layout
    engine just doesn’t have enough screen real estate to show all the content needed?
    What do we do then? Let’s look at that in the next chapter.


    # 13. Layout – Fixing Overflows


    Your widgets will never fit your screen.


    It would be an overwhelming coincidence if the elements fit perfectly in a scene.
    And if they ever fit perfectly, as soon as the app is run on a different screen
    size or rotated from portrait to landscape, that will change. So we need to handle
    two situations:


    1.  What if there’s not enough space? (too many widgets in a given space)


    2.  What if there’s extra space left over? (more screen than pixels taken up by
    the widgets)


    These are both likely to happen *simultaneously* on different parts of your scene.
    Let’s tackle insufficient space in this chapter and deal with too much space in
    the next.


    ## Overflow Warning Bars


    To overflow a container isn’t a fatal error, but it’s bad. When any widget overflows
    a screen at debug time, Flutter is kind enough to let you know by showing you
    an overflow warning (Figure [13-1](#638603_1_En_13_Chapter.xhtml#Fig1)). They’re
    yellow-and-black stripes along with some tiny red text saying by how many pixels
    it has overflowed.


    ![](images/638603_1_En_13_Chapter/638603_1_En_13_Fig1_HTML.jpg)


    Figure 13-1


    Overflow bars


    Tip


    The warning appears only in debug mode. A production app will never show these
    overflow bars. Instead the widget will simply be clipped. I’m not certain that’s
    better.


    ## Our Options to Correct Overflows


    In the real world, if you have a fixed size container, say a cardboard box, and
    need to put something in it that is too big to fit, what would you do?


    1.  Fold or disassemble the contents (assuming they can be disassembled or folded).


    2.  Squeeze the contents until they fit (assuming they’re squeezable).


    3.  Put it in multiple boxes.


    Logically, those are our only options. Let’s apply this same thinking to Flutter
    screens. We have the same three options:


    1.  Allow the children to wrap (assuming they can wrap).


    2.  Squeeze the children until they fit (assuming they’re scalable).


    3.  Allow the user to scroll.


    Let’s see how we do those three things in Flutter.


    ## A Sample Problem to Solve


    To illustrate our three options, we’ve been given a list of random lorem ipsum
    strings. I’ve created a custom widget called Word() that is merely a wrapper around
    a Text() with a style and some padding. I’ll convert those strings into Word widgets
    with .map and put them in a Column like so:


    ```

    Widget build(BuildContext context) {

    var wordWidgets = words.map((w) => Word(w)).toList();

    return Column(

    children: wordWidgets,

    );

    }

    ```


    Figure [13-2](#638603_1_En_13_Chapter.xhtml#Fig2) shows what you might see from
    this code.


    ![](images/638603_1_En_13_Chapter/638603_1_En_13_Fig2_HTML.jpg)


    Figure 13-2


    Looks great in a Column


    So far so good? In a Column, it displays just fine – plenty of room. But when
    we make it a row:


    ```

    Widget build(BuildContext context) {

    var wordWidgets = words.map((w) => Word(w)).toList();

    return Row(

    children: wordWidgets,

    );

    }

    ```


    We have an issue. All those words can’t fit across this device and we get overflow
    bars on the right (Figure [13-3](#638603_1_En_13_Chapter.xhtml#Fig3)).


    ![](images/638603_1_En_13_Chapter/638603_1_En_13_Fig3_HTML.jpg)


    Figure 13-3


    Overflow bars show we’ve overflowed the screen to the right


    Remember, we have three options to solve the overflow. The first is probably the
    best in our scenario – allow the Word widgets to wrap in their row.'
  trans: "\n# 将控件并排或上下排列\n\n顾名思义，`Row` 和 `Column` 分别用于将控件并排（`Row`，如图 12-1 所示）或上下排列（`Column`，如图\
    \ 12-2 所示）。除了子控件的布局方向不同，它们几乎没有区别。\n\n![图 12-1](img/638603_1_En_12_Fig1_HTML.png)\n\
    \n**图 12-1** `Row` 控件用于并排布局\n\n```\nRow(\n  children: [\n    SomeWidget(),\n \
    \   SomeWidget(),\n    SomeWidget(),\n  ],\n),\n```\n\n![图 12-2](img/638603_1_En_12_Fig2_HTML.png)\n\
    \n**图 12-2** `Column` 控件用于上下排列\n\n```\nColumn(\n  children: [\n    SomeWidget(),\n\
    \    SomeWidget(),\n    SomeWidget(),\n  ],\n),\n```\n\n注意，它们都有一个 `children` 属性，该属性是一个控件数组。`children`\
    \ 数组中的所有控件将按照你添加的顺序依次显示。你甚至可以在列中嵌套行，或者在行中嵌套列，嵌套的层数不限。通过这种方式，你几乎可以在任何应用中创建出能想象到的任何布局。\n\
    \n`Row` 和 `Column` 将是你最常用的布局控件。诚然，还有其他布局控件，但这两种会是你的首选。\n\n## 响应式设计\n\n响应式设计诞生于\
    \ 2010 年代初期，当时网络正从以桌面浏览为主的时代，转向智能手机和平板电脑普及的时代，这就要求网站能够适应各种不同屏幕尺寸的新格局。Web 应用会根据其所在设备的屏幕尺寸和方向来调整布局。你明白我的意思了吗？这是一种会对屏幕尺寸和方向做出*响应*的*设计*。\n\
    \n### Flutter 中的响应式设计\n\nFlutter UI 需要适配移动设备。响应式设计确保了你的应用布局能够适应不同的屏幕尺寸和方向，无论用户是竖屏持握手机，还是将其旋转为横屏。\n\
    \n想象一下你在竖屏模式下使用应用的情形：布局整洁，所有元素都易于点击和阅读。然而，当旋转到横屏时，设备的文本可能会溢出，按钮会靠得太近，甚至有些元素会完全被隐藏。使用\
    \ `Flex` 控件配合 `MediaQuery`，你可以创建一个能够智能适应可用空间的 UI。这确保了用户无论以何种方式持握设备，都能获得流畅无阻的体验。\n\
    \n### Flex 与 MediaQuery\n\n与 `Row` 或 `Column` 一样，`Flex` 控件也是将其子控件并排或上下排列。但 `Flex`\
    \ 更加灵活。它有一个 `orientation` 属性，可以设置为垂直或水平方向。\n\n- 方向设置为水平的 `Flex` 实际上等同于 `Row()`。\n\
    - 方向设置为垂直的 `Flex` 实际上等同于 `Column()`。\n\n请注意，这个 `orientation` 属性可以被设置为条件性的。这正是\
    \ `MediaQuery` 的用武之地。\n\n`MediaQuery` 从设备本身获取特定数据。\n\n- `MediaQuery.sizeOf(context)`\
    \ – 宽度和高度\n- `MediaQuery.displayFeaturesOf(context)` – 摄像头开孔、刘海等\n- `MediaQuery.platformBrightnessOf(context)`\
    \ – 浅色或深色模式\n- `MediaQuery.textScaleFactorOr(context)` – 当前字体大小\n- `MediaQuery.viewInsetsOf(context)`\
    \ – 设备应用了多少内边距？\n- `MediaQuery.devicePixelRatioOf(context)` – 像素密度\n\n> **注意**\
    \  \n> 在 Flutter 中，所谓的像素实际上是*逻辑*像素。iOS 开发者称其为*点*，而 Android 开发者则称之为*密度无关像素*。`MediaQuery.devicePixelRatioOf(context)`\
    \ 能帮助我们确定真实的像素密度，以备不时之需。\n\n- `MediaQuery.orientationOf(context)` – 横屏或竖屏\n\n\
    最后这一个属性是关键。你需要检查屏幕方向，如果是横屏，则使用 `Row`；否则，应使用 `Column`。以下是相关代码：\n\n```\nFlex(\n\
    \  direction:\n    MediaQuery.orientationOf(context) == Orientation.landscape\
    \ ?\n    Axis.horizontal : Axis.vertical,\n  children: [\n    SomeWidget(),\n\
    \    SomeWidget(),\n    SomeWidget(),\n  ],\n),\n```\n\n## 总结\n\n现在，你已经能够将控件并排放置或上下排列了。你甚至可以在需要时使用\
    \ `Flex` 来实现响应式布局。但是，如果布局引擎没有足够的屏幕空间来显示所有内容，会发生什么？我们该怎么办？让我们在下一章中探讨这个问题。\n\n#\
    \ 13. 布局 – 解决溢出问题\n\n你的控件永远不可能恰好适配屏幕。\n\n如果所有元素都能完美地适配在一个场景中，那将是一个极其罕见的巧合。即使它们现在完美适配，一旦应用在其他不同尺寸的屏幕上运行，或者从竖屏旋转为横屏，情况就会发生变化。因此，我们需要处理两种情况：\n\
    \n1.  空间不足怎么办？（给定空间内的控件过多）\n2.  如果还有剩余空间怎么办？（屏幕显示面积大于控件占用的像素）\n\n这两种情况很可能*同时*发生在你场景的不同部分。我们将在本章着手解决空间不足的问题，并在下一章处理空间过多的问题。\n\
    \n## 溢出警告条\n\n容器内容溢出并非致命错误，但会造成不良后果。在调试时，如果任何控件溢出屏幕，Flutter 会友好地通过显示溢出警告来通知你（如图\
    \ 13-1 所示）。这些警告是黄黑相间的条纹，旁边还有一些微小的红色文字，显示溢出了多少像素。\n\n![图 13-1](img/638603_1_En_13_Fig1_HTML.jpg)\n\
    \n**图 13-1** 溢出条\n\n> **提示**  \n> 该警告仅在调试模式下显示。正式发布的应用永远不会显示这些溢出条。相反，溢出的控件会被直接裁剪。我不确定这算不算更好。\n\
    \n## 纠正溢出的可选方案\n\n在现实中，如果你有一个固定大小的容器，比如一个纸板箱，你需要放进去一个太大而装不下的东西，你会怎么做？\n\n1.  折叠或拆卸物品（假设它们可以被拆卸或折叠）。\n\
    2.  挤压物品，直到它能被装下（假设它是可挤压的）。\n3.  将其放入多个箱子中。\n\n从逻辑上讲，我们只有这些选择。让我们将同样的思路应用到 Flutter\
    \ 屏幕上。我们有相同的三种选择：\n\n1.  允许子控件换行（假设它们可以换行）。\n2.  挤压子控件，直到它们适应（假设它们可以缩放）。\n3. \
    \ 允许用户滚动。\n\n让我们看看在 Flutter 中如何实现这三件事。\n\n## 待解决的示例问题\n\n为了说明我们的三种方案，我们准备了一个随机的\
    \ lorem ipsum 字符串列表。我创建了一个名为 `Word()` 的自定义控件，它只是 `Text()` 的一个封装，并添加了样式和内边距。我将使用\
    \ `.map` 把这些字符串转换为 `Word` 控件，并将它们放入一个 `Column` 中，如下所示：\n\n```\nWidget build(BuildContext\
    \ context) {\n  var wordWidgets = words.map((w) => Word(w)).toList();\n  return\
    \ Column(\n    children: wordWidgets,\n  );\n}\n```\n\n图 13-2 展示了这段代码可能产生的效果。\n\
    \n![图 13-2](img/638603_1_En_13_Fig2_HTML.jpg)\n\n**图 13-2** 在 `Column` 中显示效果不错\n\
    \n到目前为止还不错？在 `Column` 中，它显示得很好——有足够的空间。但是，当我们把它改成一行时：\n\n```\nWidget build(BuildContext\
    \ context) {\n  var wordWidgets = words.map((w) => Word(w)).toList();\n  return\
    \ Row(\n    children: wordWidgets,\n  );\n}\n```\n\n就出现了问题。所有单词无法在此设备上水平排列，右侧出现了溢出条（如图\
    \ 13-3 所示）。\n\n![图 13-3](img/638603_1_En_13_Fig3_HTML.jpg)\n\n**图 13-3** 溢出条显示我们向右溢出了屏幕\n\
    \n记住，我们有三种方案来解决溢出问题。第一种方案可能最适合我们当前的情况——允许 `Word` 控件在其行内自动换行。\n"
- fmt: "# Allow the Children to Wrap\n\nA `Wrap` widget will do as the name suggests.\
    \ Its contents are allowed to wrap down as many lines as are needed to fit them\
    \ all on the screen.\n\n```dart\nWidget build(BuildContext context) {\n  var wordWidgets\
    \ = words.map((w) => Word(w)).toList();\n  return Wrap(\n    children: wordWidgets,\n\
    \  );\n}\n```\n\nThe only change we’ve made is change the word `Row` to `Wrap`.\
    \ That’s it. It’ll now behave like in Figure [13-4](#638603_1_En_13_Chapter.xhtml#Fig4).\n\
    \n![](images/638603_1_En_13_Chapter/638603_1_En_13_Fig4_HTML.jpg)\n\n**Figure\
    \ 13-4** Wrapping the contents\n\nThis is the ideal solution for any list of words\
    \ like in our current situation. But most times, we’re working with other types\
    \ of widgets. Let’s look at solution number two.\n\n# Squeeze the Children Until\
    \ They Fit\n\nIf your widgets are compressible, a logical option is to squish\
    \ them horizontally for `Row`s or vertically for `Column`s until they fit. Sound\
    \ uncomfortable? It kind of is. And it doesn’t often result in a predictable and\
    \ pleasant presentation. But it’s occasionally exactly what is needed.\n\nOne\
    \ way we can make things smaller is to put them in a `Flexible()`. A `Flexible()`\
    \ says to its kid “I’m going to make you smaller until you fit or until you’re\
    \ as compressed as possible. If you can’t be squeezed enough, I’ll just throw\
    \ up my hands and quit.” This means that `Flexible` is not a guaranteed solution.\n\
    \n> **Tip**  \n> `Flexible` only makes sense directly inside a `Row()` or `Column()`.\n\
    \nA `Flexible` is wrapped around each child in the `Row` or `Column`:\n\n```dart\n\
    Widget build(BuildContext context) {\n  var wordWidgets = words.map((w) => Word(w)).toList();\n\
    \  return Row(\n    children: wordWidgets\n        .map((w) => Flexible(child:\
    \ w))\n        .toList(),\n  );\n}\n```\n\n> **Note**  \n> `Iterable.map()` merely\
    \ takes an array of X and converts it to an array of Y. All we’re doing in that\
    \ code above is nesting *each* `Word()` widget in a `Flexible()` widget. Please\
    \ don’t be distracted by that. Your focus in this chapter should be on the `Flexible`\
    \ and its impact on the scene – it makes each child work together to fit. (Still,\
    \ you’ve got to admit that the `.map()` was a clean method of converting.)\n\n\
    Each `Flexible`, in communication with all the other `Flexible`s in the `Row`,\
    \ squeezes its child along the horizontal axis producing the less-than-pretty\
    \ outcome in Figure [13-5](#638603_1_En_13_Chapter.xhtml#Fig5).\n\n![](images/638603_1_En_13_Chapter/638603_1_En_13_Fig5_HTML.jpg)\n\
    \n**Figure 13-5** `Flexible` widgets squeezing their children\n\n## Another Option\
    \ for Squeezing\n\nRemember, Flutter has hundreds of widgets with much overlap\
    \ in their purpose and functionality. If you want to squeeze the children and\
    \ `Flexible` isn’t doing it for you, look at `FittedBox`.\n\nA child in a `FittedBox`\
    \ will be shrunk and/or clipped according to the `BoxFit` you tell it. Remember\
    \ `BoxFit` from Chapter [4](#638603_1_En_4_Chapter.xhtml), “Value Widgets”? All\
    \ those values apply to a `FittedBox`.\n\n- `fitWidth` – Make the width fit exactly.\
    \ Clip the height or add padding to top/bottom if needed.\n- `fitHeight` – Make\
    \ the height fit exactly. Clip the width or add padding to left/right if needed.\n\
    - `cover` – Fit the smallest dimension (width/height) that will fit. Clip the\
    \ other.\n- `contain` – Fit the biggest dimension (width/height) that will fit.\
    \ Add padding to the other.\n- etc., etc. Refer to Chapter [4](#638603_1_En_4_Chapter.xhtml),\
    \ “Value Widgets,” for more details.\n\nNot the best option in this case but great\
    \ when you know exactly how many things you want to squeeze and precisely how\
    \ many pixels one or more can have.\n\n# Allow the User to Scroll\n\nOur final\
    \ option to fix an overflow is to allow the user to scroll. Frankly, this is the\
    \ most often-chosen option, making perfect sense in most situations. It is the\
    \ easiest option to understand and perhaps the easiest to implement. I saved the\
    \ best for last!\n\nAs is typical of Flutter, there are many options for scrolling.\
    \ We’ll look at three: `SingleChildScrollView`, `ListView`, and `GridView`.\n\n\
    ## SingleChildScrollView Widget\n\nA `SingleChildScrollView` is well named. It\
    \ wraps a *single child* and allows you to *scroll*. Instead of clipping that\
    \ child, Flutter will let the user swipe to scroll either horizontally or vertically\
    \ (the default). Here’s our code with a `SingleChildScrollView`:\n\n```dart\n\
    Widget build(BuildContext context) {\n  var wordWidgets = words.map((w) => Word(w)).toList();\n\
    \  return SingleChildScrollView(\n    scrollDirection: Axis.horizontal,\n    child:\
    \ Row(\n      children: wordWidgets,\n    ),\n  );\n}\n```\n\nAnd Figure [13-6](#638603_1_En_13_Chapter.xhtml#Fig6)\
    \ shows us how it looks. Hey, no overflow bars! Comparing to prior screenshots,\
    \ you can see that the position of the text has moved.\n\n![](images/638603_1_En_13_Chapter/638603_1_En_13_Fig6_HTML.jpg)\n\
    \n**Figure 13-6** Wrapped with a `SingleChildScrollView` allows scrolling\n\n\
    > **Tip**  \n> A `SingleChildScrollView` allows scrolling horizontally *or* vertically\
    \ but not both. An `InteractiveViewer` widget allows both. If you need to show\
    \ something too big in both dimensions, look into an `InteractiveViewer` which\
    \ allows panning/scrolling in both directions and allows us to zoom in and zoom\
    \ out by pinching. This is great for hi-res pictures or large maps.\n\n## The\
    \ ListView Widget\n\nA `ListView` does not have a `child` property, it has a *children*\
    \ property. So if we converted our `Row` to a `ListView` and set its `scrollDirection`\
    \ property to horizontal, it looks and behaves just like the `SingleChildScrollView`.\n\
    \n```dart\nWidget build(BuildContext context) {\n  var wordWidgets = words.map((w)\
    \ => Word(w)).toList();\n  return ListView(\n    scrollDirection: Axis.horizontal,\n\
    \    children: wordWidgets,\n  );\n}\n```\n\nBut `ListView` has superpowers that\
    \ `SingleChildScrollView` does not. `ListView` is much more memory efficient,\
    \ and it is much more flexible.\n\n### ListView Is Memory Efficient\n\nA `SingleChildScrollView`\
    \ builds its child and all of its descendants in memory, no matter how big or\
    \ how many, before it displays them. `ListView` is different. A `ListView` keeps\
    \ track of which children are currently being displayed and which are just off-screen.\
    \ It only builds those. Therefore, while the user is preoccupied reading or scrolling\
    \ what is on screen, Flutter is busily building more widgets that may appear soon.\
    \ If the user is scrolling down, Flutter will be building widgets below the current\
    \ viewport. If the user is scrolling back up, Flutter builds the widgets above.\
    \ Get it?\n\nIt also pages out of memory those widgets that have scrolled off,\
    \ so no matter how big your list gets, only a few are ever in memory at a time.\n\
    \nYou smart readers have already seen a couple of flaws in this. First, it is\
    \ possible to scroll faster than Flutter can create widgets. That’s no big deal;\
    \ it’ll just show empty spots for a moment and then displays widgets as soon as\
    \ they’re created. Second, if the user scrolls up and down and up and down and\
    \ keeps doing that, Flutter will have wasted some time disposing of and recreating\
    \ the same widgets. Sure, these are issues, but they’re minor, well worth the\
    \ cost when you look at the efficiency you’re gaining.\n\n> **Tip**  \n> `ListView`\
    \ is the best option when you have a massive – even infinite! – list of items\
    \ to display. Only those near the viewport are in memory.\n\n### ListView Is Very\
    \ Flexible\n\n`ListView` has four different ways to use it:\n\n1. **New `ListView`**\
    \ – Normal use. It has a `children` property that takes a collection of static\
    \ widgets.\n2. **`ListView.builder`** – For dynamically creating children from\
    \ a list of items.\n3. **`ListView.separated`** – Like builder but also puts a\
    \ widget *between* each item. Great for inserting ads in the list periodically.\
    \ Read more at [`http://bit.ly/flutter_listview_separated`](http://bit.ly/flutter_listview_separated).\n\
    4. **`ListView.custom`** – For rolling your own advanced `ListView`s. Read more\
    \ at [`http://bit.ly/flutter_listview_custom`](http://bit.ly/flutter_listview_custom).\n\
    \nLet’s take a look at the first two options starting with the regular `ListView`."
