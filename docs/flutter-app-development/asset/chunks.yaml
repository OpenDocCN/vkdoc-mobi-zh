    But it has been supplanted by a better option: Riverpod (covered in the last section
    in this chapter).


    Pros: A very capable package that is comparatively simple to use.


    Cons: Not being actively maintained because of its successor, Riverpod.


    ### Whoa! That’s a Lot of Packages!


    Confused yet? I don’t blame you. These packages all solve the same problem in
