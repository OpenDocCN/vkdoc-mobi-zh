    ```\nImage.network(imageUrl),\n```\n\nAs you’d expect, these are slower than embedded\
    \ images because there’s a delay while the request is being sent to a server over\
    \ the Internet and the image is being downloaded by your device. The advantage\
    \ is that these images are live; any image can be loaded dynamically by simply\
    \ changing the image URL."
  raw: '### So Which One Should I Create?


    The short answer is create a stateless widget. Never use a stateful widget until
    you must. Assume all widgets you make will be stateless and start them out that
    way. Refactor them into stateful widgets when you’re sure you really do need state.
    But recognize that state can be avoided more often than developers think. Avoid
    it when you can to make widgets simpler and therefore easier to write, to maintain,
    and to extend. Your team members will thank you for it.


    Note


    There is actually a third type of widget, the InheritedWidget. You set a value
    in your InheritedWidget and any descendent can reach back up through the tree
    and ask for that data directly. You can read more about it in Chapter [8](#638603_1_En_8_Chapter.xhtml),
    “State Management Libraries,” or watch a concise overview of InheritedWidget here:
    [`http://bit.ly/inheritedWidget`](http://bit.ly/inheritedWidget).


    ## Conclusion


    So now we know that Flutter apps are all about widgets. You’ll compose your own
    custom stateless or stateful widgets that have a build method which will render
    a tree of built-in Flutter widgets. So clearly we need to know about the built-in
    Flutter widgets which we’ll learn beginning in the next chapter.


    Footnotes [1](#638603_1_En_3_Chapter.xhtml#Fn1_source)   [2](#638603_1_En_3_Chapter.xhtml#Fn2_source)
      [3](#638603_1_En_3_Chapter.xhtml#Fn3_source)   [4](#638603_1_En_3_Chapter.xhtml#Fn4_source)
      [5](#638603_1_En_3_Chapter.xhtml#Fn5_source)


    # 4. Value Widgets


    We learned in the last chapter that *everything is a widget.* Everything you create
    is a widget, and everything that Flutter provides us is a widget. Sure, there
    are exceptions to that, but it never hurts to think of it this way, especially
    as you’re getting started in Flutter. In this chapter, we’re going to drill down
    into the most fundamental group of widgets that Flutter provides us – the ones
    that hold a value. We’ll talk about the Text widget, the Icon widget, and the
    Image widget, all of which display exactly what their names imply. We’ll briefly
    glance at the SnackBar widget. Then we’ll dive into the input widgets – ones designed
    to get input from the user.


    ## The Text Widget


    If you want to display a string to the screen, the Text widget is what you’ll
    need. It takes a string as input, the actual text you want to show, and displays
    it on the screen. By default, it shows everything on a single line, but if the
    container isn’t wide enough, it will naturally wrap to multiple lines.


    ```

    Widget build(BuildContext context) {

    String str = ''Hello world'';

    return Text(str);

    }

    ```


    Tip


    If your Text is a literal, put the word const in front of it and the widget will
    be created at compile time instead of runtime. Your apk/ipa file will be slightly
    larger, but they’ll run faster on the device. Well worth it.


    You have control over the Text’s size, font, weight, color, and more with its
    style property. But we’ll cover that in Chapter [10](#638603_1_En_10_Chapter.xhtml),
    “Styling with Themes.”


    Text() handles most of your single-style text needs. But what if you want different
    parts of the text to have different styles? That’s where RichText comes in. It
    allows you to mix and match styles within the same text widget using TextSpan
    objects.


    ## The Icon Widget


    Flutter comes with a huge set of built-in icons (Figure [4-1](#638603_1_En_4_Chapter.xhtml#Fig1)),
    from cameras to people to cards to vehicles to arrows to batteries to Android/iOS
    devices. A full list can be found here: [`https://api.flutter.dev/flutter/material/Icons-class.html`](https://api.flutter.dev/flutter/material/Icons-class.html),
    but that’s not easy to search. So here’s a place to search by name: [`https://fonts.google.com/icons`](https://fonts.google.com/icons).


    ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    An assortment of Flutter’s built-in widgets in random colors


    To place an icon, you use the Icon widget. No surprise there. You use the Icons
    class to specify which one. This class has hundreds of static values like Icons.phone_android
    and Icons.phone_iphone and Icons.cake. Each points to a different icon like the
    ones pictured previously. Here’s how you’d put a big red birthday cake (Figure
    [4-2](#638603_1_En_4_Chapter.xhtml#Fig2)) on your app:


    ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    The red cake icon


    ```

    Icon(

    Icons.cake,

    color: Colors.red,

    size: 200,

    )

    ```


    If the almost 9,000 built-in icons are not enough for you, it is very possible
    to use other icon sets. Font Awesome is available for Flutter at [`https://pub.dev/packages/font_awesome_flutter`](https://pub.dev/packages/font_awesome_flutter).
    It makes another 2,000 icons available. And the icons_flutter package at [`https://pub.dev/packages/icons_flutter`](https://pub.dev/packages/icons_flutter)
    has another 14,000\. That should tide you over for a while.


    ## The Image Widget


    Displaying images in Flutter is a bit more complex than Text or Icons. It involves
    a few things:


    1.  Getting the Image Source – This could be an image embedded in the app itself
    or fetched live from the Internet. If the image will never change through the
    life of your app like a logo or decorations, it should be an embedded image.


    2.  Sizing It – Scaling it up or down to the right size and shape.


    ### Embedded Images


    Embedded images are much faster at run time but will increase your app’s install
    size at compile time. To embed the image, put the image file in your project folder.
    Anywhere in your project will be fine but the convention is to put it in a subfolder
    called assets, probably in a sub-subfolder just to keep things straight. Something
    like assets/images will do nicely.


    Then edit pubspec.yaml. Add this to it:


    ```

    flutter:

    assets:

    - assets/images/photo1.png

    - assets/images/photo2.jpg

    ```


    Save the file and run “flutter pub get” from the command line to have your project
    process the file.


    Tip


    The pubspec.yaml file holds all kinds of great information about your project.
    It holds project metadata like the name, description, repository location, and
    version number. It lists library dependencies and fonts. It is the go-to location
    for other developers new to your project. For any of you JavaScript developers,
    it is the package.json file of your Dart project. See Appendix C, “Including Packages
    in your Flutter App,” for more information.


    You’ll put the image in your widget by calling the asset() constructor like this:


    ```

    Image.asset(''assets/images/photo1.jpg''),

    ```


    ### Network Images


    Network images are much more like what web developers might be accustomed to.
    It is simply fetching an image over the Internet via HTTP. You’ll use the network
    constructor and pass in a URL as a string.


    ```

    Image.network(imageUrl),

    ```


    As you’d expect, these are slower than embedded images because there’s a delay
    while the request is being sent to a server over the Internet and the image is
    being downloaded by your device. The advantage is that these images are live;
    any image can be loaded dynamically by simply changing the image URL.'
