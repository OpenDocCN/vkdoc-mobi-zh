  trans: '

    ### 3\. 编写一个 Provider


    在存储值之前，我们需要为*每项*要共享的内容创建一个 provider。假设我们允许用户在一个 widget 中选择他们最喜欢的颜色，然后在其余 widget
    中读取它。我们可以创建一个 `favColorProvier`:


    ```

    final favColorProvider =

    StateProvider((_) => Colors.red);

    ```


    显然，`StateProvider` 是 Riverpod 的一部分。


    #### 等等，你所说的这个 *Provider* 到底是什么？


    准备工作已经完成，这些步骤只需一次性预先完成。在我们将注意力转向在单个 widget 中使用 Riverpod 之前，让我们先聚焦于这个 provider
    本身。用 Riverpod 的术语来说，provider……嗯……*提供*一个保存的值给任何请求它的对象。为了在彼此封装、相互独立的 widget 之间共享值，我们会在一个
    widget 中写入 provider，然后在另一个 widget 中从同一个 provider 读取。但是如何做到呢？


    使用 Riverpod，我们不再继承自 `StatefulWidgets`。相反，我们要继承自 *Consumer*`StateWidgets`。明白了吗？你编写一个*提供*值的
    provider，以及一个*消费*该值的 consumer。很巧妙，对吧？这个 consumer 拥有一个可以访问所有 provider 的 `ref` 属性。来看看……


    ### 4\. 继承自 ConsumerStateWidget


    每个需要访问共享数据的 widget 都应该以略微不同的方式编写。


    **不要这样做：**


    ```

    class FavColor extends StatefulWidget {

    const FavColor({super.key});

    @override

    State createState() => _FavColorState();

    }

    class _FavColorState extends State {}

    ```


    **相反，应该这样做：**


    ```

    class FavColor extends ConsumerStatefulWidget {

    const FavColor({super.key});

    @override

    ConsumerState createState() => _FavColorState();

    }

    class _FavColorState extends ConsumerState {}

    ```


    你看，神奇之处在于这些 Riverpod 提供的类有一个名为 `ref` 的属性。而 `ref` 知道所有你在上面创建的 provider。现在让我们来使用它。


    ### 5\. 使用 `ref.watch( )` 读取数据


    在状态化 widget 中，从给定 provider 读取数据的最佳方式是使用 `ref.watch(theProvider)`，它会监视该 provider，并在
    provider 中的值发生变化时，触发其所属的 widget 重新渲染。


    ```

    Color favColor = ref.watch(favColorStateProvider);

    int favNumber = ref.watch(favNumberStateProvider);

    Person favPerson = ref.watch(favPersonStateNotifierProvider);

    ```


    提示


    你也可以使用 `ref.read()` 读取数据。只是 `ref.read()` 只绑定一次；`ref.read()` 不会实时更新，而 `ref.watch()`
    可以。


    ### 6\. 使用 `ref.read( )` 写入数据


    具有讽刺意味的是，你可以用 `ref.read()` 来写入数据。虽然还有其他方法，但这是最直接的方式。只需这样做：


    ```

    ref.read(favColorStateProvider.notifier).state = newColor;

    ```


    当你为这个 provider 的状态赋值时，它会设置值并通知所有监听者——那些之前使用 `ref.watch()` 订阅过的对象。


    就是这样。你可以设置、写入和读取 Riverpod provider。我们就先讲到这里。这个健壮而强大的包还有更多内容，但你已经掌握了基本概念。我们的篇幅有限，而且
    Riverpod 无疑会继续发展。所以，如果你准备深入探索（我建议你这样做），可以从这里开始：[`https://pub.dev/packages/riverpod`](https://pub.dev/packages/riverpod)。它会引导你前往
    Riverpod 的主页和文档，获取更多信息。


    ## 结论


    我们拥有的状态化 widget 越多，需要在它们之间传递的状态就越多。这可能会很快变得非常复杂，因此我们求助于像 Redux、Hooks、raw_state
    和 ScopedModel 这样的包，但最流行的是 Riverpod，用以管理状态。当然，你也可以手动使用其他工具和技术，如 BLoC 和 InheritedWidget
    来实现，但当你的应用规模变大时，这种方法就变得不切实际了。


    既然我们现在可以处理 widget *内部*和 widget *之间*的数据，接下来让我们看看如何处理我们的应用与某个远程服务器之间的数据。让我们探讨如何发起
    HTTP 调用来读取和写入数据。继续往下读！


    脚注 1 2 3 4 5


    # 9\. 使用 HTTP 进行 RESTful API 调用


    我们已经非常擅长管理应用程序的状态，但这些数据从何而来？本地文件？本地数据库？用户输入？当然可以。这些都是可能的来源，但真实的应用程序会从云端的某台服务器获取真实数据。你的应用程序会发起
    HTTP 调用，最好是异步的 RESTful HTTP API 调用。它会等待并处理响应，然后通常显示这些数据。哇！这有很多流行词，对吧？在本章中，我们将学习这些术语的含义，以及如何在
    Flutter 应用中处理所有类型的 HTTP 请求和响应。以下是需要了解的内容：


    *   究竟什么是 API 调用

    *   发起 HTTP GET 或 DELETE 请求

    *   发起 HTTP POST、PUT 或 PATCH 请求

    *   以最简单的方式处理响应

    *   使用 `FutureBuilder` 和 `StreamBuilder` 进行更清晰的处理

    *   使用强类型对象实现更清晰的代码


    这将是我们本章的计划。此外，还将通过一个允许 HTTP 请求的 API 服务进行动手实践。为了确保大家在同一页面上（这里绝对是双关语），我们可能应该从 API
    究竟是什么开始讲起。如果你已经熟悉，可以随意浏览或跳过。


    ## 什么是 *API* 调用？


    Flutter 应用程序已经具备从微小的本地数据库读取数据的能力。但它无法读取位于*其他地方*的数据库。换句话说，你不能直接连接到 SQL Server/MongoDB/PostgresSQL
    数据库并读取或写入记录。这是不可能做到的，即使你拥有数据库凭据。我的意思是，想想如果公共应用可以从任何地方连接并直接修改数据，会带来多么严重的安全隐患。因此，开发人员的做法是创建一个服务器端程序，以可控的方式进行读写，然后通过特定的协议（通常是
    `https`）在特定地址上，将该程序暴露在你的网络或互联网上。


    为了读取这些服务器端数据，任何用户都可以在发送其凭据（形式为用户名/密码，或更佳的方式是使用一个称为 API 密钥的唯一且秘密的密钥）后，发起 `http`
    请求。


    又是 *API* 这个术语。它代表应用程序编程接口（Application Programming Interface）。在不同情境下含义不同，但其默认含义已演变为开发人员为了读写数据而向其发送
    `http` 请求的任何互联网地址。有大量公开可用的 API，也有许多选项供你自己创建。


    当 API 响应时，它会返回一个数据流，这些数据几乎总是以 JSON^(¹⁹) 格式呈现。

