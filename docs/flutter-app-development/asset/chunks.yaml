  trans: "\n### 响应式对话框\n\n`showDialog()` 返回一个 `Future<T>`，这意味着它可以向调用者返回一个值。假设你想要用户通过“是”或“否”来回应（图\
    \ 6-10）。\n\n![](img/638603_1_En_6_Fig10_HTML.jpg)\n\n**图 6-10** – 可返回值的 `AlertDialog`\n\
    \n你可以像这样创建对话框并处理响应：\n\n```\nElevatedButton(\nchild: const Text('获取响应'),\nonPressed:\
    \ () async {\n// 构建器在此处返回用户的选择。\n// 由于这是一个 Future，我们使用 'await' 来\n// 将其转换为 String\n\
    String response = await showDialog(\ncontext: context,\nbuilder: (BuildContext\
    \ context) {\nreturn AlertDialog(\ncontent: const Text('你确定吗？'),\nactions: [\n\
    TextButton(\nchild: const Text('是'),\n// 关闭时返回 \"是\"。\nonPressed: () => Navigator.pop(context,\
    \ '是')),\nTextButton(\nchild: const Text('否'),\n// 关闭时返回 \"否\"。\nonPressed: ()\
    \ => Navigator.pop(context, '否')),\n],\n);\n},\n);\n// 对上面 'await' 得到的响应进行处理。\n\
    print(response);\n},\n),\n```\n\n**提示** – 顾名思义，`SimpleDialog` 组件是 `AlertDialog`\
    \ 的简化版本。它没有操作按钮，因为点击任意位置即可关闭。它的构造函数参数较少，例如 `titleTextStyle`、`contentTextStyle`\
    \ 等。当你不需要用户对提示做出响应，而只是进行通知时，主要使用它。\n\n## 导航方法可以组合使用\n\n虽然你可以通过堆叠导航进入带抽屉的组件，再从那里导航到带选项卡的组件，但你需要谨慎。这些方法并非不兼容，但混合使用时可能会变得相当复杂！试想一下；如果你通过\
    \ `push()` 堆叠导航到一个带抽屉的组件，`appBar` 中的返回按钮将不再可用。Android 底部有软返回按钮，但 iOS 没有。因此用户将陷入无法返回的困境。另一个例子，`TabBarView`\
    \ 包含组件，但这些组件可以说是被托管的，因此它们不应该有 `Scaffold`。如果你尝试使用另外两种方法中的任何一种导航到同一个组件，你将无法返回……既没有抽屉可显示，也没有返回按钮可点击。用户再次陷入困境。\n\
    \n我们建议只坚持使用两种不同的类型，并保持层级一致。例如，为用户提供带选项卡的导航体验非常常见，而在每个选项卡内部，你可以使用堆叠导航。但若设计得比这复杂得多，你可能会忙得不可开交。\n\
    \n脚注 1\n\n# 7. 管理状态\n\n我们从第一章开始就一直铺垫这个主题，因为我们一直在编写继承自 `StatelessWidget` 的类。既然\
    \ Flutter 有一个 `State**less**Widget`，那么你可能会想它也应该有一个 `State**ful**Widget`。没错，你想对了。\n\
    \n但究竟什么是 `StatefulWidget`？它与无状态组件有何不同？我们何时选择一种而非另一种？`StatefulWidget` 的结构是怎样的？使用它有什么规则吗？如果数据发生变化，如何重新渲染？都是好问题，对吧？耐心点，年轻的绝地武士，我们将在本章中回答所有这些以及更多问题。\n\
    \n**警告** – 本章不适合胆小者。本章将介绍一些令人费解的概念。不是说你应付不了！我们只是提前给你打个预防针，这样当你遇到一些更深层次的概念和代码时，不会灰心。做好准备就好。\n\
    \n### 什么是状态？\n\n> *状态是值发生变化时需要重新渲染的组件数据。*\n> \n> *——Rap Payne ;-)*\n\n`StatelessWidgets`\
    \ 可能包含数据，但这些数据要么在组件存活期间不会改变，要么不会改变屏幕的外观。当然，当 Flutter 销毁并重新创建组件时，这些数据可能会改变，但这不算。要成为状态，它必须在组件处于活动状态时发生变化。\n\
    \nFlutter 提供了一些开箱即用且自带状态的组件。\n\n| - `AppBar` | - `InputDecorator` |\n| - `BottomNavigationBar`\
    \ | - `MonthPicker` |\n| - `Checkbox` | - `Navigator` |\n| - `DefaultTabController`\
    \ | - `ProgressIndicator` |\n| - `Dismissible` | - `Radio` |\n| - `DrawerController`\
    \ | - `RefreshIndicator` |\n| - `DropdownButton` | - `Scaffold` |\n| - `EditableText`\
    \ | - `Scrollbar` |\n| - `Form` | - `Slider` |\n| - `FormField` | - `Switch` |\n\
    | - `GlowingOverscrollIndicator` | - `TextField` |\n| - `Image` | - `YearPicker`\
    \ |\n\n……以及更多。这些组件都拥有需要维护和监控的内部数据，以便当其变化时，Flutter 能重新渲染组件以在屏幕上显示所述变化。这很难理解吗？让我们举一个简单的例子：`TextField`\
    \ 组件。\n\n是的，我们正在讨论这个行为类似于文本框的内置组件；最终用户可以在其中输入字符。你当然意识到，当用户输入时，组件会跟踪并显示他们正在输入的内容。我的朋友，这就是状态——发生变化并实时显示的数据。\n\
    \n这听起来很棒，但我们如何编写自己的 `StatefulWidget` 呢？请继续阅读！\n"
- fmt: "## The Shape of a `StatefulWidget`\n\nHere’s how every `StatefulWidget` looks:\n\
    \n```\nclass Foo extends StatefulWidget {\n  @override\n  State createState()\
    \ => _FooState();\n}\n\nclass _FooState extends State {\n  // Private variables\
    \ here are considered the 'state'\n  @override\n  Widget build(BuildContext context)\
    \ {\n    return someWidget;\n  }\n}\n```\n\n**Note:** There are two classes: the\
    \ widget class and a state class!\n\nAny stateful widget appears complex at first,\
    \ but once you get accustomed to its structure, it becomes second nature. We traditionally\
    \ write both classes in a single Dart file. The widget class inherits from `StatefulWidget`\
    \ and is public because it is the thing that will be placed in other widgets.\n\
    \nThe state class is always private because the current widget is the only thing\
    \ that will ever see this class. The state class is responsible to:\n\n1.  Define\
    \ and maintain the state data.\n2.  Define the `build()` method – It knows how\
    \ to draw the widget on screen.\n3.  Define any callback functions needed for\
    \ data gathering or event handling.\n\nWhat does that leave for the widget class?\
    \ Not much. The widget class just kind of gets out of the way.\n\nSo then why\
    \ separate them? There are two reasons. First, the [single responsibility principle](https://en.wikipedia.org/wiki/Single_responsibility_principle)\
    \ (the SRP) suggests that we should have one thing responsible for drawing the\
    \ widget and another thing responsible for dealing with data. That’s just good\
    \ software design. Other frameworks suggest that you separate UI from state management,\
    \ but most don’t enforce it. Flutter does.\n\nSecond is performance. Redrawing\
    \ takes time. Recalculating state takes time. When we separate them like this,\
    \ we are giving Flutter a chance to handle these two things independently. Sometimes\
    \ a redraw doesn’t need to happen just because state changes. So we save the cycles\
    \ of redrawing.\n\nAlso, when we redraw, Flutter creates and draws a whole new\
    \ widget. The old widget in memory is no longer needed so it is dereferenced and\
    \ eventually garbage collected. That’s awesome but state is still needed. If Flutter\
    \ retains that old state object, it can be reused instead of being garbage collected\
    \ and recreated. By separating these objects, Flutter decouples them so they can\
    \ each be handled in its own most efficient way. It’s a brilliant design!\n\n\
    ## The Most Important Rule About State!\n\nAll changes to state data must be made:\n\
    \n1.  In the state class\n2.  Inside a function call to `setState()`:\n\n```\n\
    setState(() {\n  // Make all changes to state variables here...\n  _value = 42;\
    \ // <-- ... Like this\n});\n```\n\n`setState()` takes a function which is run\
    \ … uh … soon. The Flutter subsystem batches changes and runs them all at a time\
    \ that it decides is optimal. This is extremely efficient because, among other\
    \ reasons, it will reduce the number of screen redraws.\n\n`setState()` not only\
    \ sets the variables in the most efficient and controlled way, but it always forces\
    \ a re-render of this widget to occur. It invokes `build()` behind the scenes.\
    \ The end result: when you change a value, the widget redraws itself and your\
    \ user sees the new version. Note that if this widget has subwidgets inside of\
    \ it (aka *inner* widgets), they’ll be in the `build()` method, so a call to `setState()`\
    \ actually redraws **everything** in this widget including all of its subtrees.\n\
    \nIf this causes you to panic for a second, please remember that Flutter uses\
    \ a virtual widget tree, so even though we are telling it to draw everything,\
    \ it is smart enough to know what parts of the screen don’t need a refresh and\
    \ it only technically redraws those parts that do need it. It is super efficient!\n\
    \n## Passing State Down\n\nOkay, you got me. Technically, you can’t pass state\
    \ from a host widget into an inner widget because state only exists *within* a\
    \ widget. But we definitely want to pass data down. That data may be stateful\
    \ data in the host widget, and it may be moved to state in the inner widget.\n\
    \nBut this is nothing new. We did it with `StatelessWidget`s. As a reminder, you\
    \ simply declare class-scoped final variables and supply their initial values\
    \ in constructor parameters.\n\nBut how is the passed value visible in the State\
    \ class? Flutter provides us an object called `widget` which represents the `StatefulWidget`.\
    \ In other words, if there is a variable called `\"x\"` in the `StatefulWidget`,\
    \ it is visible in the `State` class as `widget.x`:\n\n```\nclass Foo extends\
    \ StatefulWidget {\n  // Value passed in from its host\n  Foo({required this.passedIn,\
    \ super.key});\n  final String passedIn;\n\n  State createState() => _FooState();\n\
    }\n\nclass _FooState extends State {\n  @override\n  Widget build(BuildContext\
    \ context) {\n    return Text(widget.passedIn); // <-- See? \"widget.\"!\n  }\n\
    }\n```\n\nNow that we know how to pass data down from host widget to inner widget,\
    \ let’s go the other way and see how to pass data back up from the inner widget\
    \ to the host.\n\n## Lifting State Back Up\n\nAaaaand you got me again. You can’t\
    \ pass state. But it gets worse. With Flutter, you can’t pass anything *up*.\n\
    \nFlutter has one-way data flow. Period. Data can only flow down from a host widget\
    \ to an inner widget. We’ve been doing this for, what, about 200 pages now? But\
    \ sometimes we need data to flow from an inner back up to a host.\n\nFor instance,\
    \ let’s say we have a `Login` widget with username/password `TextField`s and a\
    \ submit button. We’d place this `Login` in other widgets provided that the user\
    \ is not already logged in. The business logic to log in must be in the `Login`\
    \ widget itself. But when they successfully log in, we really need to let the\
    \ host widget – or even all widgets – know the user is now authenticated. The\
    \ token needs to be passed back up. But how do we do that when we can’t pass data\
    \ (state) up to a host?\n\nHere’s the trick. Don’t pass the data *up*. Pass the\
    \ handler method *down*! In Dart, functions are first-class objects. This means\
    \ that their references can be passed around like data. This also means that you\
    \ can pass a function from a host widget down into inner widgets. Now that the\
    \ inner widget has a handle to this function, it can invoke it as if it were its\
    \ own. But of course when the inner widget invokes it, if it passes a value into\
    \ that function, the value is seen in the host where the function was originally\
    \ defined.\n\nThis technique is called *lifting state up* (Figure 7-1).\n\n![](images/638603_1_En_7_Chapter/638603_1_En_7_Fig1_HTML.png)\n\
    \n**Figure 7-1** Lifting the state up"
  raw: '## The Shape of a StatefulWidget


    Here’s how every StatefulWidget looks:


    ```

    class Foo extends StatefulWidget {

    @override

    State createState() => _FooState();

    }

    class _FooState extends State {

    //Private variables here are considered the ''state''

    @override

    Widget build(BuildContext context) {

    return someWidget;

    }

    }

    ```


    Note


    There are two classes: the widget class and a state class!


    Any stateful widget appears complex at first, but once you get accustomed to its
    structure, it becomes second nature. We traditionally write both classes in a
    single Dart file. The widget class inherits from StatefulWidget and is public
    because it is the thing that will be placed in other widgets.


    The state class is always private because the current widget is the only thing
    that will ever see this class. The state class is responsible to …


    1.  Define and maintain the state data.


    2.  Define the build() method – It knows how to draw the widget on screen.


    3.  Define any callback functions needed for data gathering or event handling.


    What does that leave for the widget class? Not much. The widget class just kind
    of gets out of the way.


    So then why separate them? There are two reasons. First, the [single responsibility
    principle](https://en.wikipedia.org/wiki/Single_responsibility_principle)^([^(13)](#fn13))
    (the SRP) suggests that we should have one thing responsible for drawing the widget
    and another thing responsible for dealing with data. That’s just good software
    design. Other frameworks suggest that you separate UI from state management, but
    most don’t enforce it. Flutter does.


    Second is performance. Redrawing takes time. Recalculating state takes time. When
    we separate them like this, we are giving Flutter a chance to handle these two
    things independently. Sometimes a redraw doesn’t need to happen just because state
    changes. So we save the cycles of redrawing.


    Also, when we redraw, Flutter creates and draws a whole new widget. The old widget
    in memory is no longer needed so it is dereferenced and eventually garbage collected.
    That’s awesome but state is still needed. If Flutter retains that old state object,
    it can be reused instead of being garbage collected and recreated. By separating
    these objects, Flutter decouples them so they can each be handled in its own most
    efficient way. It’s a brilliant design!


    ## The Most Important Rule About State!


    All changes to state data must be made …


    1.  In the state class


    2.  Inside a function call to setState():


    ```

    setState(() {

    // Make all changes to state variables here...

    _value = 42; // <-- ... Like this

    });

    ```


    setState() takes a function which is run … uh … soon. The Flutter subsystem batches
    changes and runs them all at a time that it decides is optimal. This is extremely
    efficient because, among other reasons, it will reduce the number of screen redraws.


    setState() not only sets the variables in the most efficient and controlled way,
    but it always forces a re-render of this widget to occur. It invokes build() behind
    the scenes. The end result: when you change a value, the widget redraws itself
    and your user sees the new version. Note that if this widget has subwidgets inside
    of it (aka *inner* widgets), they’ll be in the build() method, so a call to setState()
    actually redraws ***everything*** in this widget including all of its subtrees.


    If this causes you to panic for a second, please remember that Flutter uses a
    virtual widget tree, so even though we are telling it to draw everything, it is
    smart enough to know what parts of the screen don’t need a refresh and it only
    technically redraws those parts that do need it. It is superefficient!


    ## Passing State Down


    Okay, you got me. Technically, you can’t pass state from a host widget into an
    inner widget because state only exists *within* a widget. But we definitely want
    to pass data down. That data may be stateful data in the host widget, and it may
    be moved to state in the inner widget.


    But this is nothing new. We did it with Stateless Widgets. As a reminder, you
    simply declare class-scoped final variables and supply their initial values in
    constructor parameters.


    But how is the passed value visible in the State class? Flutter provides us an
    object called *widget* which represents the StatefulWidget. In other words, if
    there is a variable called “x” in the StatefulWidget, it is visible in the State
    class as “widget.x”:


    ```

    class Foo extends StatefulWidget {

    // Value passed in from its host

    Foo({required this.passedIn, super.key});

    final String passedIn;

    State createState() => _FooState();

    }

    class _FooState extends State {

    @override

    Widget build(BuildContext context) {

    return Text(widget.passedIn,); // <-- See? "widget."!

    }

    }

    ```


    Now that we know how to pass data down from host widget to inner widget, let’s
    go the other way and see how to pass data back up from the inner widget to the
    host.


    ## Lifting State Back Up


    Aaaaand you got me again. You can’t pass state. But it gets worse. With Flutter,
    you can’t pass anything *up*.


    Flutter has one-way data flow. Period. Data can only flow down from a host widget
    to an inner widget. We’ve been doing this for, what, about 200 pages now? But
    sometimes we need data to flow from an inner back up to a host.


    For instance, let’s say we have a Login widget with username/password TextFields
    and a submit button. We’d place this Login in other widgets provided that the
    user is not already logged in. The business logic to log in must be in the Login
    widget itself. But when they successfully log in, we really need to let the host
    widget – or even all widgets – know the user is now authenticated. The token needs
    to be passed back up. But how do we do that when we can’t pass data (state) up
    to a host?


    Here’s the trick. Don’t pass the data *up*. Pass the handler method *down*! In
    Dart, functions are first-class objects. This means that their references can
    be passed around like data. This also means that you can pass a function from
    a host widget down into inner widgets. Now that the inner widget has a handle
    to this function, it can invoke it as if it were its own. But of course when the
    inner widget invokes it, if it passes a value into that function, the value is
    seen in the host where the function was originally defined.


    This technique is called *lifting state up* (Figure [7-1](#638603_1_En_7_Chapter.xhtml#Fig1)).


    ![](images/638603_1_En_7_Chapter/638603_1_En_7_Fig1_HTML.png)


    Figure 7-1


    Lifting the state up'
  trans: "\n## `StatefulWidget` 的结构\n\n每个 `StatefulWidget` 看起来都是这样的：\n\n```\nclass\
    \ Foo extends StatefulWidget {\n  @override\n  State createState() => _FooState();\n\
    }\n\nclass _FooState extends State {\n  // 这里的私有变量即被视为“状态”\n  @override\n  Widget\
    \ build(BuildContext context) {\n    return someWidget;\n  }\n}\n```\n\n**注意：**\
    \ 这里有两个类：一个是组件类，一个是状态类！\n\n任何有状态的组件初看都很复杂，但一旦你熟悉了它的结构，就会变得得心应手。我们通常将这两个类写在同一个\
    \ Dart 文件中。组件类继承自 `StatefulWidget`，并且是公开的，因为它会被放置在其他组件中。\n\n状态类始终是私有的，因为只有当前组件才能访问到这个类。状态类负责以下工作：\n\
    \n1. 定义和维护状态数据。\n2. 定义 `build()` 方法——它知道如何在屏幕上绘制组件。\n3. 定义数据收集或事件处理所需的任何回调函数。\n\
    \n那么组件类还剩下什么工作呢？不多了。组件类基本上只是让出空间而已。\n\n那么为什么要把它们分开呢？有两个原因。首先，[单一职责原则](https://en.wikipedia.org/wiki/Single_responsibility_principle)（SRP）建议我们由一个部分负责绘制组件，另一个部分负责处理数据。这是良好的软件设计。其他框架也建议你将\
    \ UI 与状态管理分离，但大多数并不强制要求。Flutter 则强制执行。\n\n其次是性能。重绘需要时间。重新计算状态也需要时间。当我们像这样分离它们时，Flutter\
    \ 就有机会独立处理这两件事。有时，仅仅因为状态发生变化，并不需要进行重绘。这样我们就节省了重绘的周期。\n\n此外，当我们重绘时，Flutter 会创建并绘制一个全新的组件。内存中的旧组件不再需要，因此会被取消引用并最终被垃圾回收。这很棒，但状态仍然需要保留。如果\
    \ Flutter 保留那个旧的状态对象，它就可以被重用，而不是被垃圾回收和重新创建。通过分离这些对象，Flutter 解耦了它们，使它们能够各自以最高效的方式被处理。这是一个精妙的设计！\n\
    \n## 关于状态的最重要规则！\n\n对状态数据的所有更改都必须满足以下条件：\n\n1. 在状态类中\n2. 在 `setState()` 的函数调用内部：\n\
    \n```\nsetState(() {\n  // 在此处对所有状态变量进行更改...\n  _value = 42; // <-- ...就像这样\n\
    });\n```\n\n`setState()` 接收一个函数，这个函数会在……嗯……不久之后运行。Flutter 子系统会批量处理这些更改，并在它认为最优的时间统一执行。这极其高效，原因之一就是它会减少屏幕重绘的次数。\n\
    \n`setState()` 不仅以最高效、最可控的方式设置变量，而且它总是强制此组件重新渲染。它会在幕后调用 `build()`。最终结果是：当你更改一个值时，组件会自行重绘，用户就能看到新版本。请注意，如果此组件内部包含子组件（即*内部*组件），它们也会在\
    \ `build()` 方法中，因此调用 `setState()` 实际上会重绘此组件中的**所有内容**，包括其所有子树。\n\n如果这让你瞬间惊慌，请记住\
    \ Flutter 使用的是虚拟组件树，所以即使我们告诉它绘制所有内容，它也能智能地判断屏幕的哪些部分不需要刷新，并且只在技术上重绘那些真正需要更新的部分。它超级高效！\n\
    \n## 向下传递状态\n\n好吧，被你说中了。从技术上讲，你不能将状态从宿主组件传递给内部组件，因为状态只存在于组件*内部*。但我们确实想向下传递数据。这些数据可能是宿主组件中的有状态数据，并且可能会被转移到内部组件的状态中。\n\
    \n但这并不新鲜。我们在 `StatelessWidget` 中已经这样做过。提醒一下，你只需声明类级别的 final 变量，并在构造函数参数中提供它们的初始值即可。\n\
    \n但是，传递进来的值如何在状态类中可见呢？Flutter 为我们提供了一个名为 `widget` 的对象，它代表了 `StatefulWidget`。换句话说，如果在\
    \ `StatefulWidget` 中有一个名为 `\"x\"` 的变量，那么在 `State` 类中就可以通过 `widget.x` 来访问它：\n\n\
    ```\nclass Foo extends StatefulWidget {\n  // 从其宿主传递进来的值\n  Foo({required this.passedIn,\
    \ super.key});\n  final String passedIn;\n\n  State createState() => _FooState();\n\
    }\n\nclass _FooState extends State {\n  @override\n  Widget build(BuildContext\
    \ context) {\n    return Text(widget.passedIn); // <-- 看到了吗？\"widget.\"！\n  }\n\
    }\n```\n\n现在我们知道了如何将数据从宿主组件向下传递给内部组件，接下来我们反其道而行之，看看如何将数据从内部组件向上传递回宿主组件。\n\n##\
    \ 将状态向上提升\n\n又……又被你说中了。你不能传递状态。但情况更糟。在 Flutter 中，你什么都不能往*上*传。\n\nFlutter 的数据流是单向的。没有例外。数据只能从宿主组件向下流向内部组件。我们这样做已经，大概，有\
    \ 200 页了吧？但有时我们需要数据从内部组件向上流回宿主组件。\n\n例如，假设我们有一个 `Login` 组件，包含用户名/密码的 `TextField`\
    \ 和一个提交按钮。我们会把这个 `Login` 组件放在其他组件中，前提是用户尚未登录。登录的业务逻辑必须放在 `Login` 组件本身。但当用户成功登录后，我们确实需要让宿主组件——甚至所有组件——知道用户现在已经认证通过。令牌需要被传回上层。但当我们无法将数据（状态）向上传递给宿主时，该怎么做呢？\n\
    \n诀窍在这里。不要将数据往*上*传。而是将处理方法往*下*传！在 Dart 中，函数是一等公民。这意味着它们的引用可以像数据一样被传递。这也意味着你可以将一个函数从宿主组件向下传递给内部组件。现在内部组件拥有了这个函数的句柄，它可以像调用自己的函数一样调用它。当然，当内部组件调用它时，如果它往这个函数传递了一个值，那么该值就会在最初定义该函数的宿主组件中可见。\n\
    \n这种技术被称为*提升状态*（图 7-1）。\n\n![](img/638603_1_En_7_Fig1_HTML.png)\n\n**图 7-1** 提升状态\n"
- fmt: "# An Example of State Management\n\nWe should probably look at some code to\
    \ solidify these concepts. Let’s say we have an app that allows its user to create\
    \ a color by adjusting red, green, and blue values on three sliders. These will\
    \ mix the colors and show it in a bigger circle (Figure 7-2).\n\n![](images/638603_1_En_7_Chapter/638603_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2  \nAn example Stateful Widget\n\nClearly the big circle needs to\
    \ redraw as slider data changes. Changing data that requires a redraw is state!\
    \ While we technically could have all of this in one big widget called `ColorMixer`,\
    \ we’ve learned in this book to decompose large widgets into smaller, more specialized\
    \ ones. Let’s extract the `ColorCircle` and use it for the big circle at the top\
    \ and also for the favorite colors at the bottom. And since we’ve got three sliders\
    \ with labels, all doing the same thing, we should probably extract the slider/label\
    \ also into a `ColorValueChanger`. So how about the layout in Figure 7-3?\n\n\
    ![](images/638603_1_En_7_Chapter/638603_1_En_7_Fig3_HTML.png)\n\nFigure 7-3  \n\
    How we might lay out the widget tree\n\nThe `ColorMixer` must be stateful:\n\n\
    ```\nimport 'package:flutter/material.dart';\nimport 'color_circle.dart';\nimport\
    \ 'color_value_changer.dart';\n\n// The stateful widget\nclass ColorMixer extends\
    \ StatefulWidget {\n  const ColorMixer({super.key});\n\n  @override\n  State createState()\
    \ => _ColorMixerState();\n}\n\n// The state class\nclass _ColorMixerState extends\
    \ State {\n  // These three variables are the 'state' of the widget\n  int _redColor\
    \ = 0;\n  int _blueColor = 0;\n  int _greenColor = 0;\n\n  @override\n  Widget\
    \ build(BuildContext context) {\n    return Column(\n      children: [\n     \
    \   // This widget uses the variables (aka state)\n        ColorCircle(\n    \
    \      color: Color.fromRGBO(\n              _redColor, _greenColor, _blueColor,\
    \ 1),\n          radius: 200,\n        ),\n        // These three pass the _setColor\
    \ function down so that\n        // the state *here* can be changed at lower levels.\
    \ This\n        // is called \"lifting state up\".\n        ColorValueChanger(property:\
    \ \"Red\", value: _redColor,\n            changeColorValue: _setColor),\n    \
    \    ColorValueChanger(property:\"Green\",value:_greenColor,\n            changeColorValue:_setColor),\n\
    \        ColorValueChanger(property: \"Blue\",value:_blueColor,\n            changeColorValue:\
    \ _setColor),\n      ],\n    );\n  }\n\n  void _setColor(String property, int\
    \ value) {\n    setState(() {\n      _redColor = (property == \"Red\") ? value\
    \ : _redColor;\n      _greenColor = (property == \"Green\") ? value : _greenColor;\n\
    \      _blueColor = (property == \"Blue\") ? value : _blueColor;\n    });\n  }\n\
    }\n```\n\nDon’t miss this: we’re passing 100% of what `ColorCircle` needs into\
    \ it – a color and a size. Neither of those change inside `ColorCircle`, so it\
    \ can be stateless. If `ColorMixer`’s state changes, we simply call `setState()`,\
    \ thereby re-rendering it and consequently all instances of its child, `ColorCircle`.\
    \ Do you see it? The child(ren) `ColorCircle` can be stateless because its state*ful*\
    \ parent `ColorMixer` passes state variables down!\n\nIn the same manner, we pass\
    \ an initial value into each `ColorValueChanger`, and we pass a reference to the\
    \ `_setColor` method. Remember, passing a function down makes it available and\
    \ therefore executable in the child widget. Although the child widget executes\
    \ it, the function actually exists in the parent widget!\n\nHere’s how it would\
    \ look in the inner `ColorValueChanger` widget:\n\n```\nimport 'package:flutter/material.dart';\n\
    \nclass ColorValueChanger extends StatefulWidget {\n  // Value passed in from\
    \ its host\n  const ColorValueChanger({\n    required this.property,\n    required\
    \ this.value,\n    required this.changeColorValue, super.key});\n\n  final String\
    \ property;\n  final int value;\n  final Function changeColorValue; // createState()\
    \ => _ColorValueChangerState();\n}\n\nclass _ColorValueChangerState extends State\
    \ {\n  int _value = 0;\n\n  @override\n  Widget build(BuildContext context) {\n\
    \    _value = widget.value;\n    return Column(\n      children: [\n        Text(widget.property),\n\
    \        Slider(\n          min: 0, max: 255,\n          value: _value.toDouble(),\n\
    \          label: widget.property,\n          onChanged: _onChanged,\n       \
    \ )\n      ],\n    );\n  }\n\n  _onChanged(double value) {\n    setState(() =>\
    \ _value = value.round());\n    // And this is where we call the setter function\
    \ passed\n    // in from the host (parent) widget.\n    widget.changeColorValue(widget.property,\
    \ value.round());\n  }\n}\n```\n\n## When Should We Use State?\n\nBut you know\
    \ what? The very best way to avoid complex state is to avoid having state at all.\
    \ Just about every expert agrees that if you can avoid state altogether, do. But\
    \ it can be confusing as to when you need state and when you don’t.\n\nFor example,\
    \ the label on our color picker is data within the component. Should that be state?\
    \ No, of course not; it doesn’t change. How about a loop counter on a `for` loop?\
    \ Nope; it never affects anything in the `build()` method, so it doesn’t need\
    \ to be put in a `setState()`. See? State can sometimes be simplified or eliminated.\n\
    \nFigure 7-4 provides a summary of how to decide.\n\n![](images/638603_1_En_7_Chapter/638603_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4  \nHow you might go about deciding whether state should actually\
    \ be used in a widget\n\n## Conclusion\n\nSo now you know. State is data that\
    \ is likely to change and will affect the display somehow. It must be changed\
    \ inside a `setState()` method or it will never be seen by the user. It can only\
    \ exist privately in a `StatefulWidget` – it is inaccessible by other widgets.\n\
    \nBut this poses a major, major problem. If state is truly private, what happens\
    \ when we need to share data between different widgets? We can pass data down\
    \ through the constructor, and we can lift it up by passing a function down. But\
    \ what about between distant relatives? What about sharing tons of complex data?\
    \ We have a few solutions for you and that’s the subject of the next chapter –\
    \ state management libraries!\n\nFootnotes\n\n# State Management Libraries\n\n\
    What we learned in the last chapter would work as advertised even when the widget\
    \ tree gets infinitely deep. We could continue to lift state up and pass state\
    \ down forever. But please realize that as your app gets bigger and bigger, state\
    \ management becomes more and more complex. When it gets too complex, you will\
    \ be better served by using a more advanced state management pattern. These patterns\
    \ are not usually easy to learn, but at some point in your app’s growth, they\
    \ become worth the effort to master.\n\nIn this chapter, we’re going to look at\
    \ a few patterns, a few widgets, and a few libraries. Then we’ll focus in on two\
    \ libraries: a simple one and the one that is currently the most popular, Riverpod.\n\
    \n## The InheritedWidget\n\nThis is a relatively simple solution, maybe too simple\
    \ for most needs. `InheritedWidget` is a built-in Flutter widget. Essentially,\
    \ it exposes a small set of variables that are made available to all descendants\
    \ in its tree. In a sense, it creates pseudo-global variables. They’re available\
    \ everywhere beneath the `InheritedWidget` but only in a very controlled way.\
    \ The `InheritedWidget` defines the variables that need to be shared among all\
    \ descendants. Then the descendant widgets are able to query up the chain for\
    \ the `InheritedWidget` and access those variables. Several of the other methods\
    \ (Provider, Redux, Riverpod, etc.) are wrappers around `InheritedWidget`.\n\n\
    Pros: Simplest of all of the solutions in this chapter.\n\nCons: And despite that,\
    \ it is still daunting for many new Flutter users. It is spartan and only appropriate\
    \ for the most rudimentary application state."
  raw: '## An Example of State Management


    We should probably look at some code to solidify these concepts. Let’s say we
    have an app that allows its user to create a color by adjusting red, green, and
    blue values on three sliders. These will mix the colors and show it in a bigger
    circle (Figure [7-2](#638603_1_En_7_Chapter.xhtml#Fig2)).


    ![](images/638603_1_En_7_Chapter/638603_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    An example Stateful Widget


    Clearly the big circle needs to redraw as slider data changes. Changing data that
    requires a redraw is state! While we technically could have all of this in one
    big widget called ColorMixer, we’ve learned in this book to decompose large widgets
    into smaller, more specialized ones. Let’s extract the ColorCircle and use it
    for the big circle at the top and also for the favorite colors at the bottom.
    And since we’ve got three sliders with labels, all doing the same thing, we should
    probably extract the slider/label also into a ColorValueChanger. So how about
    the layout in Figure [7-3](#638603_1_En_7_Chapter.xhtml#Fig3)?


    ![](images/638603_1_En_7_Chapter/638603_1_En_7_Fig3_HTML.png)


    Figure 7-3


    How we might lay out the widget tree


    The ColorMixer must be stateful:


    ```

    import ''package:flutter/material.dart'';

    import ''color_circle.dart'';

    import ''color_value_changer.dart'';

    // The stateful widget

    class ColorMixer extends StatefulWidget {

    const ColorMixer({super.key});

    @override

    State createState() => _ColorMixerState();

    }

    // The state class

    class _ColorMixerState extends State {

    // These three variables are the ''state'' of the widget

    int _redColor = 0;

    int _blueColor = 0;

    int _greenColor = 0;

    @override

    Widget build(BuildContext context) {

    return Column(

    children: [

    // This widget uses the variables (aka state)

    ColorCircle(

    color: Color.fromRGBO(

    _redColor, _greenColor, _blueColor, 1),

    radius: 200,

    ),

    // These three pass the _setColor function down so that

    // the state *here* can be changed at lower levels. This

    // is called "lifting state up".

    ColorValueChanger(property: "Red", value: _redColor,

    changeColorValue: _setColor),

    ColorValueChanger(property:"Green",value:_greenColor,

    changeColorValue:_setColor),

    ColorValueChanger(property: "Blue",value:_blueColor,

    changeColorValue: _setColor),

    ],

    );

    }

    void _setColor(String property, int value) {

    setState(() {

    _redColor = (property == "Red") ? value : _redColor;

    _greenColor = (property == "Green") ? value : _greenColor;

    _blueColor = (property == "Blue") ? value : _blueColor;

    });

    }

    }

    ```


    Don’t miss this: we’re passing 100% of what ColorCircle needs into it – a color
    and a size. Neither of those change inside ColorCircle, so it can be stateless.
    If ColorMixer’s state changes, we simply call setState(), thereby re-rendering
    it and consequently all instances of its child, ColorCircle. Do you see it? The
    child(ren) ColorCircle can be stateless because its state*ful* parent ColorMixer
    passes state variables down!


    In the same manner, we pass an initial value into each ColorValueChanger, and
    we pass a reference to the _setColor method. Remember, passing a function down
    makes it available and therefore executable in the child widget. Although the
    child widget executes it, the function actually exists in the parent widget!


    Here’s how it would look in the inner ColorValueChanger widget:


    ```

    import ''package:flutter/material.dart'';

    class ColorValueChanger extends StatefulWidget {

    // Value passed in from its host

    const ColorValueChanger({

    required this.property,

    required this.value,

    required this.changeColorValue, super.key});

    final String property;

    final int value;

    final Function changeColorValue; // createState() =>

    _ColorValueChangerState();

    }

    class _ColorValueChangerState extends State {

    int _value = 0;

    @override

    Widget build(BuildContext context) {

    _value = widget.value;

    return Column(

    children: [

    Text(widget.property),

    Slider(

    min: 0, max: 255,

    value: _value.toDouble(),

    label: widget.property,

    onChanged: _onChanged,

    )

    ],

    );

    }

    _onChanged(double value) {

    setState(() => _value = value.round());

    // And this is where we call the setter function passed

    // in from the host (parent) widget.

    widget.changeColorValue(widget.property, value.round());

    }

    }

    ```


    ## When Should We Use State?


    But you know what? The very best way to avoid complex state is to avoid having
    state at all. Just about every expert agrees that if you can avoid state altogether,
    do. But it can be confusing as to when you need state and when you don’t.


    For example, the label on our color picker is data within the component. Should
    that be state? No, of course not; it doesn’t change. How about a loop counter
    on a for loop? Nope; it never affects anything in the build() method, so it doesn’t
    need to be put in a setState(). See? State can sometimes be simplified or eliminated.


    Figure [7-4](#638603_1_En_7_Chapter.xhtml#Fig4) provides a summary of how to decide.


    ![](images/638603_1_En_7_Chapter/638603_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    How you might go about deciding whether state should actually be used in a widget


    ## Conclusion


    So now you know. State is data that is likely to change and will affect the display
    somehow. It must be changed inside a setState() method or it will never be seen
    by the user. It can only exist privately in a StatefulWidget – it is inaccessible
    by other widgets.


    But this poses a major, major problem. If state is truly private, what happens
    when we need to share data between different widgets? We can pass data down through
    the constructor, and we can lift it up by passing a function down. But what about
    between distant relatives? What about sharing tons of complex data? We have a
    few solutions for you and that’s the subject of the next chapter – state management
    libraries!


    Footnotes [1](#638603_1_En_7_Chapter.xhtml#Fn1_source)


    # 8. State Management Libraries


    What we learned in the last chapter would work as advertised even when the widget
    tree gets infinitely deep. We could continue to lift state up and pass state down
    forever. But please realize that as your app gets bigger and bigger, state management
    becomes more and more complex. When it gets too complex, you will be better served
    by using a more advanced state management pattern. These patterns are not usually
    easy to learn, but at some point in your app’s growth, they become worth the effort
    to master.


    In this chapter, we’re going to look at a few patterns, a few widgets, and a few
    libraries. Then we’ll focus in on two libraries: a simple one and the one that
    is currently the most popular, Riverpod.


    ## The InheritedWidget


    This is a relatively simple solution, maybe too simple for most needs. [InheritedWidget](https://docs.flutter.io/flutter/widgets/InheritedWidget-class.html)
    ^([^(14)](#fn14)) is a built-in Flutter widget. Essentially, it exposes a small
    set of variables that are made available to all descendants in its tree. In a
    sense, it creates pseudo-global variables. They’re available everywhere beneath
    the InheritedWidget but only in a very controlled way. The InheritedWidget defines
    the variables that need to be shared among all descendants. Then the descendant
    widgets are able to query up the chain for the InheritedWidget and access those
    variables. Several of the other methods (Provider, Redux, Riverpod, etc.) are
    wrappers around InheritedWidget.


    Pros: Simplest of all of the solutions in this chapter.


    Cons: And despite that, it is still daunting for many new Flutter users. It is
    spartan and only appropriate for the most rudimentary application state.'
  trans: "\n# 状态管理示例\n\n我们最好通过一些代码来巩固这些概念。假设有一个应用，允许用户通过三个滑块分别调节红、绿、蓝数值来创建颜色。这些颜色会混合并显示在一个大圆中（图\
    \ 7-2）。\n\n![](img/638603_1_En_7_Fig2_HTML.jpg)\n\n图 7-2  \n一个有状态组件的示例\n\n显然，当滑块数据变化时，大圆需要重绘。这种需要触发重绘的变化数据就是状态！虽然我们可以在技术上把所有内容都放在一个名为`ColorMixer`的大组件中，但本书已经讲过，要将大组件拆分为更小、更专一的小组件。让我们提取出`ColorCircle`，用于顶部的大圆和底部的收藏颜色。既然我们有三个带标签的滑块，它们的功能完全相同，那么最好也将滑块/标签提取为一个`ColorValueChanger`组件。那么，图\
    \ 7-3 中的布局如何？\n\n![](img/638603_1_En_7_Fig3_HTML.png)\n\n图 7-3  \n组件树的可能布局方式\n\
    \n`ColorMixer`必须是有状态的：\n\n```\nimport 'package:flutter/material.dart';\nimport\
    \ 'color_circle.dart';\nimport 'color_value_changer.dart';\n\n// 有状态组件\nclass\
    \ ColorMixer extends StatefulWidget {\n  const ColorMixer({super.key});\n\n  @override\n\
    \  State createState() => _ColorMixerState();\n}\n\n// 状态类\nclass _ColorMixerState\
    \ extends State {\n  // 这三个变量是组件的'状态'\n  int _redColor = 0;\n  int _blueColor\
    \ = 0;\n  int _greenColor = 0;\n\n  @override\n  Widget build(BuildContext context)\
    \ {\n    return Column(\n      children: [\n        // 该组件使用了变量（即状态）\n       \
    \ ColorCircle(\n          color: Color.fromRGBO(\n              _redColor, _greenColor,\
    \ _blueColor, 1),\n          radius: 200,\n        ),\n        // 以下三个组件将 _setColor\
    \ 函数向下传递，以便\n        // *此处*的状态能在下层被修改。这被称为\"状态提升\"。\n        ColorValueChanger(property:\
    \ \"Red\", value: _redColor,\n            changeColorValue: _setColor),\n    \
    \    ColorValueChanger(property:\"Green\",value:_greenColor,\n            changeColorValue:_setColor),\n\
    \        ColorValueChanger(property: \"Blue\",value:_blueColor,\n            changeColorValue:\
    \ _setColor),\n      ],\n    );\n  }\n\n  void _setColor(String property, int\
    \ value) {\n    setState(() {\n      _redColor = (property == \"Red\") ? value\
    \ : _redColor;\n      _greenColor = (property == \"Green\") ? value : _greenColor;\n\
    \      _blueColor = (property == \"Blue\") ? value : _blueColor;\n    });\n  }\n\
    }\n```\n\n请注意这一点：我们将`ColorCircle`所需的一切——颜色和尺寸——全部传递给了它。这两者在`ColorCircle`内部都不会改变，因此它可以是无状态的。如果`ColorMixer`的状态发生变化，我们只需调用`setState()`，从而重新渲染它，并进而重新渲染其所有子组件`ColorCircle`的实例。你看到了吗？子组件`ColorCircle`可以保持无状态，因为其有状态的父组件`ColorMixer`将状态变量向下传递了！\n\
    \n同样地，我们向每个`ColorValueChanger`传递一个初始值，并传递一个对`_setColor`方法的引用。请记住，向下传递一个函数意味着该函数在子组件中可用并可执行。尽管是子组件执行它，但该函数实际上存在于父组件中！\n\
    \n以下是在内部的`ColorValueChanger`组件中的实现方式：\n\n```\nimport 'package:flutter/material.dart';\n\
    \nclass ColorValueChanger extends StatefulWidget {\n  // 从宿主组件传入的值\n  const ColorValueChanger({\n\
    \    required this.property,\n    required this.value,\n    required this.changeColorValue,\
    \ super.key});\n\n  final String property;\n  final int value;\n  final Function\
    \ changeColorValue; // createState() => _ColorValueChangerState();\n}\n\nclass\
    \ _ColorValueChangerState extends State {\n  int _value = 0;\n\n  @override\n\
    \  Widget build(BuildContext context) {\n    _value = widget.value;\n    return\
    \ Column(\n      children: [\n        Text(widget.property),\n        Slider(\n\
    \          min: 0, max: 255,\n          value: _value.toDouble(),\n          label:\
    \ widget.property,\n          onChanged: _onChanged,\n        )\n      ],\n  \
    \  );\n  }\n\n  _onChanged(double value) {\n    setState(() => _value = value.round());\n\
    \    // 这里是调用从宿主（父）组件传入的设置函数的地方。\n    widget.changeColorValue(widget.property,\
    \ value.round());\n  }\n}\n```\n\n## 何时使用状态？\n\n但你知道吗？避免复杂状态的最佳方法就是完全避免状态。几乎每一位专家都同意，如果能够完全避免状态，那就这样做。但何时需要状态、何时不需要，有时会令人困惑。\n\
    \n例如，颜色选择器上的标签是组件内的数据。这应该是状态吗？不，当然不是；它不会改变。`for`循环中的循环计数器呢？也不是；它从不会影响`build()`方法中的任何内容，因此不需要放入`setState()`中。看到了吗？状态有时是可以简化或消除的。\n\
    \n图 7-4 总结了如何判断。\n\n![](img/638603_1_En_7_Fig4_HTML.jpg)\n\n图 7-4  \n如何判断是否应在组件中使用状态\n\
    \n## 结论\n\n现在你明白了。状态是可能发生变化并会以某种方式影响显示的数据。它必须在`setState()`方法内修改，否则用户永远无法看到变化。它只能私有地存在于`StatefulWidget`中——其他组件无法访问。\n\
    \n但这带来了一个非常、非常大的问题。如果状态是完全私有的，那么当我们需要在多个不同的组件之间共享数据时该怎么办？我们可以通过构造函数向下传递数据，也可以通过传递函数向上提升状态。但远亲组件之间呢？共享大量复杂数据呢？我们为你准备了几种解决方案，这正是下一章的主题——状态管理库！\n\
    \n脚注\n\n# 状态管理库\n\n我们在上一章学到的内容，即使组件树变得无限深，也能按预期工作。我们可以一直将状态向上提升并向下传递。但请意识到，随着你的应用变得越来越大，状态管理也会变得愈发复杂。当复杂度太高时，使用更高级的状态管理模式会更好。这些模式通常不易学习，但在你的应用发展到一定阶段时，它们就值得你付出努力去掌握。\n\
    \n在本章中，我们将探讨几种模式、几个组件和几个库。然后，我们将重点介绍两个库：一个简单的库，以及目前最流行的库——`Riverpod`。\n\n## InheritedWidget\n\
    \n这是一个相对简单的解决方案，可能对于大多数需求来说过于简单了。`InheritedWidget`是 Flutter 内置的一个组件。本质上，它暴露了一小部分变量，这些变量对其组件树中的所有后代组件都是可用的。从某种意义上说，它创建了伪全局变量。它们在`InheritedWidget`之下的任何地方都可用，但只能以非常可控的方式访问。`InheritedWidget`定义了需要在其所有后代组件之间共享的变量。然后，后代组件可以沿着组件链向上查询`InheritedWidget`并访问这些变量。其他几种方法（Provider、Redux、Riverpod\
    \ 等）都是对`InheritedWidget`的封装。\n\n优点：是本章所有解决方案中最简单的。\n\n缺点：尽管如此，对于许多 Flutter 新手来说，它仍然令人望而却步。它功能简陋，只适用于最基础的应用状态。\n"
- fmt: '# The BLoC Pattern


    BLoC, an acronym for business logic components, is neither a library nor a widget.
    It is a design pattern. The BLoC pattern was originally created to allow the reuse
    of the code across the Web, mobile applications, and backend. Because it was created
    at Google, it was natural that the Flutter Community embraced it where it became
    synonymous with state management, at least for a while.


    BLoC involves treating data as streams and altering state reactively. It separates
    the UI (user interface) from the business logic, making your code more:


    * Maintainable – Clearer separation of concerns leads to easier code navigation
    and updates.

    * Testable – You can test business logic independently of UI interactions.

    * Scalable – Handle complex app states effectively.


    BLoC has many different parts:

    * `StreamControllers` that control the streams of data

    * `StreamTransformers` that can process the data as it flows in

    * `StreamBuilders` that run when a new value arrives and render it in the UI


    Pros: Lots of folks in the community can and will help you. It is a solid, well-vetted
    pattern.


    Cons: BLoC is anything but simple to understand and to write. There is a `bloc`
    library that can help, but most people write BLoC components without the library
    so it is very low-level.


    ## Some Libraries


    ### ScopedModel


    [ScopedModel](https://pub.dartlang.org/packages/scoped_model)^([^(15)](#fn15))
    is a library "shamelessly borrowed" from the [Fuchsia](https://fuchsia.googlesource.com/)^([^(16)](#fn16))
    codebase by Brian Egan. (Hey, these are Brian''s own words, not mine! He''s a
    humble guy.) ScopedModel creates data models with the ability to register listeners.
    Each model notifies its listeners when the data has changed so they can update
    themselves. Clever design.


    It is an external third-party package maintained by Brian. It is built on top
    of `InheritedWidget` offering a slightly better way to access, update, and mutate
    the state. It allows you to easily pass a data model from a parent widget down
    to its descendants and rebuilds all the children that use the model when the model
    is updated.


    Pros: Does its job of separating presentation and data very well. Compared to
    others in this chapter, it is simpler to understand.


    Cons: The code base isn''t currently being maintained, probably because developers
    are leaning on more modern solutions. Some have said that `ScopedModel` has performance
    problems for complex apps.


    ### Redux and Hooks


    I only include these two libraries for you React devs. Both of these are libraries
    that emulate the React features of the same name. If you''re not coming from the
    world of React, skip this section. But if you love yourself some React, these
    may be your simplest options. Heck, you''ve already mastered the learning curve.
    [flutter_​redux](https://pub.dartlang.org/packages/flutter_redux)^([^(17)](#fn17))
    was written by Brian Egan who we heard about earlier from `ScopedModel`, and [flutter_​hooks](https://pub.dartlang.org/documentation/flutter_hooks)^([^(18)](#fn18))
    was written by Rémi Rousselet of Paris who you''ll hear about in a minute from
    Provider and Riverpod.


    Pros: Very performant. Very scalable.


    Cons: Very steep learning curves unless you already know React.


    ### Provider


    I include Provider here not because you''re likely to use it but because you''re
    likely to hear about it, and I don''t want you to be tempted. There is a better
    option. At one point, Provider was the most popular Flutter state management library.
    But it has been supplanted by a better option: Riverpod (covered in the last section
    in this chapter).


    Pros: A very capable package that is comparatively simple to use.


    Cons: Not being actively maintained because of its successor, Riverpod.


    ### Whoa! That''s a Lot of Packages!


    Confused yet? I don''t blame you. These packages all solve the same problem in
    different ways, some similarly and others using wildly different strategies. No
    one has any expectations that you''ll have anything more than an awareness that
    there are tools out there. When you hear someone say something like "Our state
    is getting messy. Maybe we should take a look at BLoC or ScopedModel," you''ll
    at least know that type of thing they''re talking about. Then you can dig into
    the technologies to see which you might want to use.


    But wouldn''t it be nice to have an idea of a solution or two that you could actually
    use? Let''s write a little code for two of these state management solutions: the
    simplest one, `raw_state`, and the most popular and robust one, `flutter_riverpod`.


    ## Raw State


    `raw_state` ([`https://pub.dev/packages/raw_state`](https://pub.dev/packages/raw_state))
    is ideal for learning Flutter which is why we''re including it here. It''s also
    decent for a very simple application and for getting your MVP off the ground.
    It solves the problem of sharing between widgets by creating a global variable
    called `rawState`. As soon as you `flutter pub add raw_state` and then import
    `raw_state`, this `rawState` variable is automatically defined.


    ```

    import ''package:raw_state/raw_state.dart'';

    ```


    Then in any widget, you write any number of values to `rawState`:


    ```

    String foo = "raw_state is stupidly simple";

    rawState.set("aString", foo);

    rawState.set("aDate", DateTime.now());

    rawState.set("aMap", {"foo":"bar","baz":100} );

    ```


    Note


    The keys can be any string and the values can be anything – `String`, `double`,
    `int`, `bool`, `Array`, `Map`, object … whatever.


    In any other widget, you can read those values from `rawState`. Merely call `get`,
    passing in the key:


    ```

    String foo = rawState.get("aString");

    DateTime someDate = rawState.get("aDate");

    Map aMap =

    rawState.get>("aMap");

    ```


    Tip


    The data type (a.k.a. generics) is optional but is a good practice for safety
    reasons. Note that for the sake of demonstrations, we omitted it in the first
    but included it for the rest.


    `raw_state` is ridiculously simple. Maybe too simple. It lacks lots of protections
    and any auto-updating capabilities that many of the other libraries have. So let''s
    turn our attention to one last library, Riverpod, written by the aforementioned
    Rémi Rousselet.


    ## Riverpod


    At the time of writing, Riverpod is the go-to state management solution. It is
    complete and robust and less complicated than some of the libraries above. A winning
    combination.


    Caution


    Please don''t misunderstand. I didn''t say that Riverpod is simple. It''s not.
    So if you''re not planning to use Riverpod soon, don''t feel bad about skipping
    to the next chapter. I''m going to lay out the simplest possible steps to use
    Riverpod just to get you started. But even then, it''s daunting.


    Here are the six basic steps to use Riverpod.


    One-time, up-front preparation:


    1. Install `flutter_riverpod`

    2. Wrap your App with a `ProviderScope`

    3. Write a `Provider`


    Then in every widget where needed:


    1. Inherit from `ConsumerStateWidget`

    2. Read data with `ref.watch()`

    3. Write data with `ref.read()`


    Let''s examine these steps.


    ### 1. Install `flutter_riverpod`


    This step is simple. Either add it to your `pubspec.yaml` and run `flutter pub
    get` or run:


    ```

    flutter pub add flutter_riverpod

    ```


    ### 2. Wrap Your App with a `ProviderScope`


    Remember that in your `main`, we call `runApp(App())`. Merely wrap that app with
    a `ProviderScope` that has been imported from `flutter_riverpod`:


    ```

    void main() => runApp(

    ProviderScope(

    child: App()

    )

    );

    ```'
  raw: '## The BLoC Pattern


    BLoC, an acronym for business logic components, is neither a library nor a widget.
    It is a design pattern. The BLoC pattern was originally created to allow the reuse
    of the code across the Web, mobile applications, and backend. Because it was created
    at Google, it was natural that the Flutter Community embraced it where it became
    synonymous with state management, at least for a while.


    BLoC involves treating data as streams and altering state reactively. It separates
    the UI (user interface) from the business logic, making your code more


    *   Maintainable – Clearer separation of concerns leads to easier code navigation
    and updates.


    *   Testable – You can test business logic independently of UI interactions.


    *   Scalable – Handle complex app states effectively.


    BLoC has many different parts:


    *   StreamControllers that control the streams of data


    *   StreamTransformers that can process the data as it flows in


    *   StreamBuilders that run when a new value arrives and render it in the UI


    Pros: Lots of folks in the community can and will help you. It is a solid, well-vetted
    pattern.


    Cons: BLoC is anything but simple to understand and to write. There is a bloc
    library that can help, but most people write BLoC components without the library
    so it is very low-level.


