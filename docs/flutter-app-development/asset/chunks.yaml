  trans: '

    # 涵盖内容


    本书将教你如何创建功能完备且特性丰富的应用程序，使其能够运行在 iOS、Android、桌面端和 Web 端。


    1.  Hello Flutter – 欢迎来到 Flutter！我们会让你感受到为何选择它。Flutter 解决了哪些问题？为什么老板会选择 Flutter
    而非其他解决方案。


    2.  Flutter 开发 – Flutter 的工具集并非总是简单明了。我们会解释每个工具的用途及使用方法。本章将引导你完成编写-调试-测试-运行的流程，让你了解包括安装和维护在内的工具使用。


    3.  万物皆 Widget – Widget 对 Flutter 至关重要，因为它们是每个 Flutter 应用的构建块。我们将展示其重要性，并提供创建
    Widget 的动机和方法。主题包括组合、UI 即代码、Widget 类型、键值、无状态与有状态 Widget。


    4.  值 Widget – 深入探讨承载值的 Widget，特别是用户输入字段。主题包括 `Text`、`Image` 和 `Icon` Widget，以及如何在
    Flutter 中创建表单。


    5.  响应手势 – 如何让你的程序响应用户操作，如点击、滑动、捏合等。我们将介绍按钮家族和 `GestureDetector` Widget。


    6.  导航与路由 – 导航是指应用根据用户操作隐藏一个 Widget 并显示另一个，让用户感觉在不同场景间切换。我们将涵盖堆栈导航、标签导航和抽屉导航。


    7.  状态管理 – 如何在 Widget 之间传递数据以及如何修改这些数据。我们将介绍如何创建 `StatefulWidgets` 并以最佳方式设计它们。


    8.  状态管理库 – 概述多个库，并详细介绍一个超级简单的库——Raw State，以及最流行的库——Riverpod。


    9.  使用 HTTP 进行 RESTful API 调用 – 如何从 HTTP API 服务器读取数据和向其写入数据。这里将展示如何发起 `GET`、`POST`、`PUT`、`DELETE`
    和 `PATCH` 请求。


    10. 使用主题美化样式 – 本章将解答所有必要问题，让实际应用外观美观且通过样式和主题保持一致性。


    11. 布局你的 Widget – 作为最后部分的开始，本章介绍布局的概念、控制布局的步骤，并揭示 Flutter 的布局算法。


    12. 布局 – Widget 定位 – 如何控制 Widget 并排或上下排列。


    13. 布局 – 解决溢出 – 当试图绘制*超出*屏幕可容纳范围时的处理方法。


    14. 布局 – 填充额外空间 – 当试图绘制*少于*可容纳范围时的处理方法。如何利用多余空间使其看起来美观？


    15. 布局 – 微调定位 – 如何使用边框、内边距和外边距调整最后细节。如何制作非矩形形状。


    16. 布局 – 特殊展示 Widget – 当简单布局无法满足需求时的 Widget——滑动列表、Stack、Card、Positioned 和 Table。


    此外，我们还提供了五个附录。


    1.  Dart 语言概述 – 一份易于查阅的 Dart 速查表，涵盖预期功能和令人惊喜的特性。


    2.  Futures、Async 和 Await – 处理 Flutter 中的异步活动。


    3.  在 Flutter 应用中引入包 – 如何查找并引入丰富的第三方、公开且免费的包。同时介绍如何编写和发布自己的包。


    4.  如何处理文件 – 使用库、Futures、async 和 await。将文件捆绑到应用中。读写文件。JSON 序列化。


    5.  如何调试布局 – 解读在 VS Code 和 Android Studio 可视化调试器中看到的内容。


    ## 未涵盖的内容及查找途径


    同样重要的是，你应该了解本书不涵盖哪些内容。除了上述附录外，我们不会提供 Dart 编程语言入门。我们只是认为这并非对你时间的最佳利用，而是希望直接深入 Flutter。如果你后续觉得需要入门指导，请访问：[`https://dart.dev/guides/language/language-tour`](http://dart.dev/guides/language/language-tour)，接着是
    [`https://dart.dev/tutorials`](http://dart.dev/tutorials)。我们选择不讨论如何部署到应用商店。商店本身已经很好地解释了如何提交应用。此外，流程变化频繁，因此你的最终参考资源应是商店本身。你可以在
    [`https://developer.apple.com/ios/submit/`](http://developer.apple.com/ios/submit/)
    和 [`https://play.google.com/apps/publish`](http://play.google.com/apps/publish)
    找到说明。我们也不会涵盖某些高级主题，如 iOS 和 Android 的设备特定开发，或将 Flutter 添加到现有 iOS/Android 项目。这些及其他众多主题可以通过网络搜索找到。


    序言


    欢迎阅读《Flutter 应用开发：如何同时为 iOS 和 Android 编写代码》！如果你熟悉我之前的工作《Flutter 入门应用开发》，你可能会在这里那里发现一些熟悉的影子。这是因为本书在第一本的基础上扩展并更新了主题，融入了使其有价值的核心概念。


    然而，请将此视为一次全新的旅程，进入不断发展的 Flutter 开发世界。自从我的第一本书出版以来，Flutter 已经取得了显著进步，提供了令人兴奋的新功能和改进的工作流程。本书反映了这些变化，对该框架进行了全面且最新的探索。


    虽然某些部分可能包含熟悉的内容，但你会在这些页面中找到大量新材料。在第一本书中，我们试图用一章来涵盖布局。这是个重大错误。在本书中，我们将其扩展到*六*章。在第一本书中，我们讨论了状态管理库，但没有解释它们的工作原理。感谢
    Remi Rousselet 的批评，我们将这些章节提前了许多，并编写了关于他的 Riverpod 库的使用指南。感谢迪士尼和美国国务院等客户，我扩展了现有概念，深入探讨了特定功能，引入了涵盖最新发展的全新章节，并重新调整了流程以使学习
    Flutter 更加容易。


    无论你是基于基础进行构建的中级 Flutter 开发者，还是开始第一个项目的新手，本书都旨在成为你可信赖的伙伴。我们将引导你掌握使用 Flutter 构建美观且高性能的
    iOS 和 Android 应用的复杂性，为你提供在不断发展变化的环境中游刃有余的知识和技能。


    所以，即使你以前走过这条路，也请准备好与《Flutter 应用开发：如何同时为 iOS 和 Android 编写代码》一起踏上新的冒险之旅！


    拉普·佩恩

    2024 年 9 月


    关于作者 关于技术审阅者

