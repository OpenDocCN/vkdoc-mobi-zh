  raw: '## Meet the Button Family


    Some gestures are super easy because they’re pre-baked into certain widgets. For
    instance, the creators of button widgets know their sole purpose in life is to
    be pressed and then to do something in response to it. So all buttons come with
    a property called onPressed. To use it, you’ll simply point it to a function to
    run when the user presses it:


    ```

    IconButton(

    icon: const Icon(Icons.delete),

    // The callback function must return void

    onPressed: () => print("tapped"),

    )

    ```


    Figure [5-2](#638603_1_En_5_Chapter.xhtml#Fig2) shows the output.


    ![](images/638603_1_En_5_Chapter/638603_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    An IconButton


    You could think of a Button as the base class for all of the other buttons. It
    isn’t really, but it wouldn’t hurt for you to think of all of the others as a
    Button with some specialties. For instance, these are all widgets that are specialized
    types of buttons.


    | TextButton | ![](images/638603_1_En_5_Chapter/638603_1_En_5_Figa_HTML.jpg) |

    | ElevatedButton | ![](images/638603_1_En_5_Chapter/638603_1_En_5_Figb_HTML.jpg)
    |

    | IconButton | ![](images/638603_1_En_5_Chapter/638603_1_En_5_Figc_HTML.jpg) |

    | FloatingActionButton | ![](images/638603_1_En_5_Chapter/638603_1_En_5_Figd_HTML.jpg)
    |

    | SegmentedButton | ![](images/638603_1_En_5_Chapter/638603_1_En_5_Fige_HTML.jpg)
    |

    | CupertinoButton | ![](images/638603_1_En_5_Chapter/638603_1_En_5_Figf_HTML.jpg)
    |


    Let''s take a closer look at them.


    ### ElevatedButton


    This one is a button that appears like it’s floating above the page:


    ```

    ElevatedButton(

    onPressed: () => {},

    child: const Text("ElevatedButton"),

    ),

    ```


    ### TextButton and IconButton


    These are kind of the anti-ElevatedButton. They just appear completely flat. They
    are subtle, having simple text or an icon that don’t scream to be pressed, like
    an UNDO button or BACK button.


    ```

    IconButton(

    icon: const Icon(Icons.delete),

    onPressed: () => {},

    ),

    TextButton(

    onPressed: () => {},

    child: const Text("TextButton"),

    ),

    ```


    ### FloatingActionButton (FAB)


    This is that button you often see in the lower right of the screen. It is usually
    rounded and is an unmistakable hint to the user on how to progress to the next
    step in the workflow (Figure [5-3](#638603_1_En_5_Chapter.xhtml#Fig3)).


    ![](images/638603_1_En_5_Chapter/638603_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Floating action button


    In Flutter, FABs are one of the three main parts of a scaffold. You’ll usually
    see it included sort of like this:


    ```

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: ...,

    body: ...,

    floatingActionButton: FloatingActionButton(

    child: const Icon(Icons.help),

    onPressed: (){},

    ),

    );

    }

    ```


    ### SegmentedButton


    This is a group of buttons treated as one unit. One thing can be chosen or multiple
    can.


    ```

    SegmentedButton(

    emptySelectionAllowed: true,

    multiSelectionEnabled: true,

    selected: selectedValue, // The currently selected value(s)

    onSelectionChanged: (value) =>

    setState(() => selectedValue = value),

    segments: const [

    ButtonSegment(label: Text(''Option 1''), value: ''option1''),

    ButtonSegment(label: Text(''Option 2''), value: ''option2''),

    ButtonSegment(label: Text(''Option 3''), value: ''option3''),

    ],

    ),

    ```


    ### CupertinoButton


    An iOS-style button. Looks great on iPhones, but it is kind of strange to have
    an iOS feel on an Android device. If you use it, you probably intend to wrap it
    in a CupertinoApp instead of a MaterialApp like the others in this chapter. If
    you do, make sure you add this to the top of your dart file:


    ```

    import ''package:flutter/cupertino.dart'';

    ```


    ## Dismissible


    Buttons are all created for one purpose: to respond to a press. Similarly, a Dismissible
    is created for one purpose: to respond to a swipe. To use it, you’ll usually build
    a widget and wrap it with a Dismissible. When you do, that widget can then respond
    to the swipe gesture:


    ```

    Dismissible(

    // Give it a blue background if swiped right and

    // a red background if swiped left

    background: Container(color: Colors.blue),

    secondaryBackground: Container(color: Colors.red),

    onDismissed: (direction) => print("You swiped $direction"),

    child: SomeWidget(),

    );

    ```


    Note that as the name suggests, this is used to dismiss a widget, removing it
    from the view as you “swipe it away.” But what if I want to swipe it but not dismiss
    it? This calls for a custom gesture.


    ## Custom Gestures for Your Custom Widgets


    Why does the dismissible understand the swipe gesture? Why do the buttons understand
    the onPressed gesture? Because the developers wrote them in. Your custom widgets
    will need to have gestures programmed as well. But since *you’re* the one writing
    them, you get to create your own gestures. And you can create gestures that are
    way more interesting than a simple press. You can have your widget respond to
    swipes, long presses, double-presses, and pinch-to-zoom.


    | Tap | a.k.a. press. Includes double-tapping (tap-tap) |

    | LongPress | Pressing on the screen for a longer time – like a second or two
    |

    | Scale | a.k.a. pinching or unpinching, when you separate your fingers |

    | Drag | a.k.a. swiping |


    Note


    There’s also a Pan, which is similar enough to a Drag that we’re omitting for
    simplicity.


    Responding to custom gestures will require these steps:


    1.  Decide on your gestures and behaviors.


    2.  Create your custom widget as normal.


    3.  Add a GestureDetector widget.


    4.  Associate your gesture with its behavior.


    ### Step 1: Decide on Your Gestures and Behaviors


    This step is simple. Your UX expert might have already done it by the time you
    get ahold of the design. You simply list out the gestures you want to respond
    to and what they should do when that gesture is detected.


    We’ll work through an example. Say our user sees a list of people and has to choose
    the ones they like and the ones they don’t. Let’s have the user swipe right on
    each thing they like and swipe left on the ones they don’t. And let’s say that
    occasionally the user will want to add a new person between two others. We’ll
    have them separate the two people with their fingers – kind of like making room
    between them for the new item. And lastly maybe we’ll have the user long press
    to delete the person.


    | Gesture | Action |

    | --- | --- |

    | Swipe right | Add them to the *nice* list |

    | Swipe left | Add them to the *naughty* list |

    | Pinch (actually reverse-pinch) | Insert a new person |

    | Long press | Delete that person |


    ### Step 2: Create Your Custom Widget


    Write the Dart code like we’ve learned in our past chapters. Here’s a list of
    people:


    ```

    class ManagePeople extends StatelessWidget {

    List fetchPeople() {

    return [

    {"first":"Kevin", "last":"Malone"},

    {"first":"Kelly", "last":"Kapoor"},

    {"first":"Creed", "last":"Bratton"},

    {"first":"Dwight", "last":"Schrute"},

    {"first":"Andy", "last":"Bernard"},

    {"first":"Pam", "last":"Beasley"},

    {"first":"Jim", "last":"Halpert"},

    {"first":"Robert", "last":"California"},

    {"first":"David", "last":"Wallace"},

    {"first":"Ryan", "last":"Howard"},

    ];

    }

    @override

    Widget build(BuildContext context) {

    var _peopleObjects = fetchPeople();

    return ListView(

    children: _peopleObjects.map((person) =>

    Person(person:person)).toList(),

    );

    }

    }

    ```


    ### Step 3: Add a GestureDetector widget


    The GestureDetector widget is different to most UX widgets – you can’t see it.
    You either wrap a GestureDetector around some widget or nest it in the child property;
    it’s flexible. Either way, it detects and handles the gestures for that other
    widget. Since you can’t see it, it’s not bloated with any properties besides `child`
    or methods other than `build`, just what you’d expect. The events are where the
    action is!


    Here, we''re wrapping each Person in a GestureDetector:


    ```

    return ListView(

    children: _peopleObjects

    .map((person) =>

    GestureDetector(child: Person(person: person))

    ).toList(),

    );

    ```'
  trans: "\n# 认识按钮家族\n\n有些手势非常简单，因为它们是某些小部件的内置功能。例如，按钮小部件的创建者知道它们存在的唯一目的就是被按下，然后做出相应的响应。因此，所有按钮都有一个名为\
    \ `onPressed` 的属性。要使用它，你只需将其指向用户按下按钮时想要运行的函数：\n\n```\nIconButton(\n  icon: const\
    \ Icon(Icons.delete),\n  // 回调函数必须返回 void\n  onPressed: () => print(\"tapped\"\
    ),\n)\n```\n\n图 5-2 显示了输出结果。\n\n![](img/638603_1_En_5_Fig2_HTML.jpg)\n\n**图 5-2**\
    \ 一个 `IconButton`\n\n你可以把 `Button` 看作是所有其他按钮的基类。实际并非如此，但你把其他所有按钮都看作是具有某些特殊功能的\
    \ `Button` 也没什么坏处。例如，以下这些都是按钮的专用类型的小部件。\n\n| `TextButton` | ![](img/638603_1_En_5_Figa_HTML.jpg)\
    \ |\n| `ElevatedButton` | ![](img/638603_1_En_5_Figb_HTML.jpg) |\n| `IconButton`\
    \ | ![](img/638603_1_En_5_Figc_HTML.jpg) |\n| `FloatingActionButton` | ![](img/638603_1_En_5_Figd_HTML.jpg)\
    \ |\n| `SegmentedButton` | ![](img/638603_1_En_5_Fige_HTML.jpg) |\n| `CupertinoButton`\
    \ | ![](img/638603_1_En_5_Figf_HTML.jpg) |\n\n让我们仔细看看它们。\n\n## `ElevatedButton`\n\
    \n这种按钮看起来像是浮动在页面上方：\n\n```\nElevatedButton(\n  onPressed: () => {},\n  child:\
    \ const Text(\"ElevatedButton\"),\n),\n```\n\n## `TextButton` 和 `IconButton`\n\
    \n这两种按钮有点像是 `ElevatedButton` 的对立面。它们看起来完全是扁平的，很不起眼，只有简单的文字或图标，不会强烈暗示用户去按下，比如“撤销”按钮或“返回”按钮。\n\
    \n```\nIconButton(\n  icon: const Icon(Icons.delete),\n  onPressed: () => {},\n\
    ),\nTextButton(\n  onPressed: () => {},\n  child: const Text(\"TextButton\"),\n\
    ),\n```\n\n## `FloatingActionButton` (FAB)\n\n这是你常在屏幕右下角看到的那种按钮。它通常是圆形的，明确地向用户提示如何进入工作流的下一步（图\
    \ 5-3）。\n\n![](img/638603_1_En_5_Fig3_HTML.jpg)\n\n**图 5-3** 浮动操作按钮\n\n在 Flutter\
    \ 中，FAB 是 Scaffold 的三个主要组成部分之一。你通常会看到它像这样被包含进来：\n\n```\nWidget build(BuildContext\
    \ context) {\n  return Scaffold(\n    appBar: ...,\n    body: ...,\n    floatingActionButton:\
    \ FloatingActionButton(\n      child: const Icon(Icons.help),\n      onPressed:\
    \ (){},\n    ),\n  );\n}\n```\n\n## `SegmentedButton`\n\n这是一组被视为一个整体的按钮。可以选择一项，也可以选择多项。\n\
    \n```\nSegmentedButton(\n  emptySelectionAllowed: true,\n  multiSelectionEnabled:\
    \ true,\n  selected: selectedValue, // 当前选中的值\n  onSelectionChanged: (value) =>\n\
    \    setState(() => selectedValue = value),\n  segments: const [\n    ButtonSegment(label:\
    \ Text('Option 1'), value: 'option1'),\n    ButtonSegment(label: Text('Option\
    \ 2'), value: 'option2'),\n    ButtonSegment(label: Text('Option 3'), value: 'option3'),\n\
    \  ],\n),\n```\n\n## `CupertinoButton`\n\n一种 iOS 风格的按钮。在 iPhone 上看起来很棒，但在 Android\
    \ 设备上使用 iOS 风格会感觉有点奇怪。如果你使用它，可能打算将它包裹在 `CupertinoApp` 中，而不是本章中其他按钮使用的 `MaterialApp`。如果这样做，请确保在\
    \ Dart 文件顶部添加以下内容：\n\n```\nimport 'package:flutter/cupertino.dart';\n```\n\n#\
    \ `Dismissible`\n\n所有按钮的创建目的只有一个：响应按下操作。类似地，`Dismissible` 的创建目的也只有一个：响应滑动操作。要使用它，你通常需要构建一个小部件，然后用\
    \ `Dismissible` 将其包裹起来。这样，该小部件就能响应滑动手势：\n\n```\nDismissible(\n  // 向右滑动时给蓝色背景，\n\
    \  // 向左滑动时给红色背景\n  background: Container(color: Colors.blue),\n  secondaryBackground:\
    \ Container(color: Colors.red),\n  onDismissed: (direction) => print(\"You swiped\
    \ $direction\"),\n  child: SomeWidget(),\n);\n```\n\n注意，顾名思义，它用于取消（dismiss）一个小部件，在将其“滑走”时从视图中移除它。但如果我只想滑动它，而不想取消它呢？这就需要自定义手势了。\n\
    \n# 为自定义小部件创建自定义手势\n\n为什么 `Dismissible` 能理解滑动手势？为什么按钮能理解 `onPressed` 手势？因为开发者将它们写入了代码中。你的自定义小部件也需要编写手势程序。但由于是*你*在编写它们，你可以创建自己的手势。并且你可以创建比简单按下更有趣的手势。你可以让你的小部件响应滑动、长按、双击和捏合缩放。\n\
    \n| `Tap` | 即按下。包括双击（点按两次） |\n| `LongPress` | 长时间按在屏幕上——大约一两秒钟 |\n| `Scale` |\
    \ 即捏合或展开，当你的手指分开时 |\n| `Drag` | 即滑动 |\n\n**注意**\n\n还有一个 `Pan` 手势，它与 `Drag` 非常相似，为了简化，我们在此略过。\n\
    \n响应自定义手势需要以下步骤：\n\n1.  确定你的手势及其行为。\n2.  正常创建你的自定义小部件。\n3.  添加一个 `GestureDetector`\
    \ 小部件。\n4.  将手势与其行为关联起来。\n\n## 第一步：确定你的手势及其行为\n\n这一步很简单。你的用户体验专家可能在你拿到设计稿之前就已经完成了。你只需列出你想响应的手势，以及检测到该手势时应执行的操作。\n\
    \n我们将通过一个例子来演示。假设用户看到一个人物列表，需要选择他们喜欢和不喜欢的人。我们让用户向右滑动他们喜欢的每个人，向左滑动他们不喜欢的每个人。再假设用户有时想在两个人之间添加一个新人物。我们会让他们用双指将两个人分开——就像在他们之间为新条目腾出空间一样。最后，也许我们会让用户长按来删除一个人物。\n\
    \n| 手势 | 动作 |\n| --- | --- |\n| 向右滑动 | 将他们添加到“喜欢”列表 |\n| 向左滑动 | 将他们添加到“不喜欢”列表\
    \ |\n| 捏合（实际上是反向捏合） | 插入一个新人物 |\n| 长按 | 删除那个人物 |\n\n## 第二步：创建你的自定义小部件\n\n按照我们在前几章中学到的方法编写\
    \ Dart 代码。这是一个人物列表：\n\n```\nclass ManagePeople extends StatelessWidget {\n  List\
    \ fetchPeople() {\n    return [\n      {\"first\":\"Kevin\", \"last\":\"Malone\"\
    },\n      {\"first\":\"Kelly\", \"last\":\"Kapoor\"},\n      {\"first\":\"Creed\"\
    , \"last\":\"Bratton\"},\n      {\"first\":\"Dwight\", \"last\":\"Schrute\"},\n\
    \      {\"first\":\"Andy\", \"last\":\"Bernard\"},\n      {\"first\":\"Pam\",\
    \ \"last\":\"Beasley\"},\n      {\"first\":\"Jim\", \"last\":\"Halpert\"},\n \
    \     {\"first\":\"Robert\", \"last\":\"California\"},\n      {\"first\":\"David\"\
    , \"last\":\"Wallace\"},\n      {\"first\":\"Ryan\", \"last\":\"Howard\"},\n \
    \   ];\n  }\n\n  @override\n  Widget build(BuildContext context) {\n    var _peopleObjects\
    \ = fetchPeople();\n    return ListView(\n      children: _peopleObjects.map((person)\
    \ =>\n        Person(person:person)).toList(),\n    );\n  }\n}\n```\n\n## 第三步：添加一个\
    \ `GestureDetector` 小部件\n\n`GestureDetector` 小部件与大多数 UX 小部件不同——它是不可见的。你可以将某个小部件用\
    \ `GestureDetector` 包裹起来，或者将其嵌套在 `child` 属性中；它非常灵活。无论哪种方式，它都能检测并处理该小部件的手势。由于看不见它，它除了\
    \ `child` 属性或 `build` 方法之外没有多余的其他属性或方法，正如你所期望的那样。事件才是关键所在！\n\n在这里，我们用 `GestureDetector`\
    \ 包裹每个 `Person`：\n\n```\nreturn ListView(\n  children: _peopleObjects\n    .map((person)\
    \ =>\n      GestureDetector(child: Person(person: person))\n    ).toList(),\n\
    );\n```\n"
- fmt: "### Step 4: Associate Your Gesture with Its Behavior\n\nLast step. For each\
    \ event that you designed in step 1, assign a method. Now `GestureDetector` supports\
    \ tons of events^([^(10)](#fn10)) so they get really confusing. We’ve boiled them\
    \ down to the most useful ones here.\n\n| Gesture | Event(s) to use |\n| --- |\
    \ --- |\n| Tap (press) | `onTap` |\n| Double-tap | `onDoubleTap` |\n| Long press\
    \ | `onLongPress` |\n| Side-to-side swipe | `onHorizontalDragUpdate`, `Start`,\
    \ `End` |\n| Up-and-down swipe | `onVerticalDragUpdate`, `Start`, `End` |\n| Diagonal\
    \ swipe | `onPanUpdate`, `Start`, `End` |\n| Pinch | `onScaleUpdate`, `Start`,\
    \ `End` |\n\n### Example 1: Reacting to a Long Press\n\nA long press (Figure [5-4](#638603_1_En_5_Chapter.xhtml#Fig4))\
    \ will ignore simple taps but will fire when the user presses for an extended\
    \ time – like a second or two. Let’s say our UX people decided that a long press\
    \ will signal that our user wants to delete a user.\n\n![](images/638603_1_En_5_Chapter/638603_1_En_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4\n\nA long press\n\nTo make this happen, we’ll add the `onLongPress`\
    \ event handler:\n\n```\nGestureDetector(\n  child: Person(person: person),\n\
    \  onLongPress: () {\n    _people.remove(person);\n    print(\"Deleted ${person['first']}\"\
    );\n  },\n);\n```\n\n### Example 2: Pinching to Add a New Item\n\nLet’s say our\
    \ UX expert suggested that users would want to add items to the list and specify\
    \ where in the list they want it inserted. To communicate that, they will open\
    \ the list by unpinching two items (Figure [5-5](#638603_1_En_5_Chapter.xhtml#Fig5)).\n\
    \n![](images/638603_1_En_5_Chapter/638603_1_En_5_Fig5_HTML.jpg)\n\nFigure 5-5\n\
    \nPinching\n\nWe want to detect if the user was pinching in or pinching out. A\
    \ normal pinch in should be ignored. But a pinch out – where they spread their\
    \ fingers out – means we’re adding a new person. Note that some event handlers\
    \ receive in an event object. This object holds information about that particular\
    \ event. In the case of a scale/pinch, it holds a property called `scale`. If\
    \ `scale` is greater than 1.0, this is a pinch out. Let’s say that if the user\
    \ pinches out twice the normal scale, we’ll assume they’re wanting to add a new\
    \ person to the list:\n\n```\nonScaleUpdate: (e) {\n  if (e.scale > 2.0)\n   \
    \ addPerson(context);\n},\n```\n\n### Example 3: Swiping Left or Right\n\nNow\
    \ our UX team has decided that if the user swipes right on a person in our list,\
    \ we should add them to the “nice” list, and if the user swipes left, we’ll add\
    \ them to the “naughty” list (Figure [5-6](#638603_1_En_5_Chapter.xhtml#Fig6)).\n\
    \n![](images/638603_1_En_5_Chapter/638603_1_En_5_Fig6_HTML.jpg)\n\nFigure 5-6\n\
    \nSwiping\n\nTo detect a swipe, we’d look for a drag or a pan. A pan is called\
    \ for when we expect the user to be able to swipe *diagonally*. `HorizontalDrag`s\
    \ are only for left and right; it ignores Y-direction. `VerticalDrag`s are only\
    \ for up and down; it ignores any change in the X-direction. Since we only really\
    \ care about left swipe or right swipe, we’ll zero in on a `HorizontalDrag` gesture.\n\
    \nOur app can respond to any old swipe by using the `onHorizontalDragEnd` event.\
    \ In this case, we also care about the direction of the swipe; was it left to\
    \ right or right to left? So we have to look at the event object in each case.\
    \ At the drag start, we save the X-position of where the user’s finger was. Then\
    \ with every pixel move, the drag update event captures the current X-location.\
    \ Finally, on drag end, we do a simple calculation; if the end X-position is greater,\
    \ we know it was a swipe right. Otherwise, it was a swipe left:\n\n```\ndouble\
    \ swipeStartX = 0;\nString swipeDirection = \"\";\nreturn GestureDetector(\n \
    \ child: Person(person: person),\n  onHorizontalDragStart: (e) {\n    swipeStartX\
    \ = e.globalPosition.dx;\n  },\n  onHorizontalDragUpdate: (e) {\n    swipeDirection\
    \ =\n      (e.globalPosition.dx > swipeStartX) ? \"Right\" : \"Left\";\n  },\n\
    \  onHorizontalDragEnd: (e) {\n    if (_swipeDirection == \"Right\")\n      updatePerson(person,\
    \ status: \"nice\");\n    else\n      updatePerson(person, status: \"naughty\"\
    );\n  },\n);\n```\n\n## Conclusion\n\nFlutter gestures are intuitive. They work\
    \ like the average developer would expect them to, making it easy for us to code\
    \ and easy for our users to use. When triggered, all events will run on a separate\
    \ thread so it is totally okay to have them return an `Async<>` object. Therefore,\
    \ feel free to mark your event handling functions as `async` and fill them full\
    \ of `await`s.^([^(11)](#fn11))\n\nFootnotes [1](#638603_1_En_5_Chapter.xhtml#Fn1_source)\
    \ [2](#638603_1_En_5_Chapter.xhtml#Fn2_source)\n\n# 6. Navigation and Routing\n\
    \nAll apps have the concept of *moving* from one screen to another. The user clicks\
    \ the cart button, and we go to the card scene. The user clicks “continue shopping”\
    \ button, and we get to browse for more products to buy. Some app developers call\
    \ it routing. Others call it navigation. Whatever you want to call it, this is\
    \ one area that Flutter makes easy because there are only four ways of navigating:\n\
    \n- **Stacks** – Each widget is full screen. The user taps buttons to go through\
    \ a predefined workflow. History is maintained, and they can travel back by hitting\
    \ a back button.\n- **Drawers** – Most of the screen shows a widget, but on the\
    \ left edge, a drawer is peeking out at the user. When they press it or swipe\
    \ it right, it slides out revealing a menu of choices. Pressing one changes the\
    \ widget in the main part of the screen.\n- **Tabs** – Some room is reserved for\
    \ a set of tabs at the top or the bottom of the screen. When you press on a tab,\
    \ we show the widget that corresponds to that tab.\n- **Dialogs** – While these\
    \ aren’t technically part of navigation, they are a way to see another widget,\
    \ so we’ll allow it. Dialogs are modal (a.k.a. pop-up windows) that stay until\
    \ the user dismisses them.\n\nEach of these methods depends on your app having\
    \ a `MaterialWidget` as its ancestor. Let’s drill into these methods starting\
    \ with stack navigation.\n\n## Stack Navigation\n\nIf you’re an experienced developer,\
    \ you’re familiar with queues and stacks. If not, let me explain briefly. Let’s\
    \ say you work in a kitchen. As plates are cleaned, they’re stacked, right? Each\
    \ plate is put on the top of the stack. This is called *pushing* onto the stack.\
    \ When it is time to serve some food, you naturally take the last plate added,\
    \ the one on top of the stack. This is called *popping* off the top of the stack.\n\
    \nFlutter’s navigation works with stacks. When you want to send the user to a\
    \ new scene, you will `push()` a widget on the top of the stack and the user sees\
    \ that widget. Each time you `push()`, you’re making the stack of scenes taller\
    \ and taller. When you are ready for them to go back to where they were before,\
    \ you’ll `pop()` the last scene off the top of the stack, and what is revealed?\
    \ The previous scene.\n\nWith Flutter’s stack, you’ll typically predefine the\
    \ scenes (a.k.a. routes) and give each a name. This must be done at the `MaterialApp`\
    \ level like so:\n\n```\nWidget build(BuildContext context) {\n  return MaterialApp(\n\
    \    title: 'Shopping App',\n    initialRoute: '/',\n    routes: {\n      '/':\
    \ (ctx) => LandingScene(),\n      '/browse': (ctx) => Browse(),\n      '/product':\
    \ (ctx) => ViewProduct(),\n      '/checkout': (ctx) => Checkout(),\n    },\n \
    \ );\n}\n```\n\nNote that with routing, we no longer use the `home` property.\
    \ Instead, use the `initialRoute` property.\n\nTip\n\nIf your `initialRoute` is\
    \ `\"/\"`, you can omit it altogether and Flutter assumes it is `\"/\"`."
  raw: '### Step 4: Associate Your Gesture with Its Behavior


    Last step. For each event that you designed in step 1, assign a method. Now GestureDetector
    supports tons of events^([^(10)](#fn10)) so they get really confusing. We’ve boiled
    them down to the most useful ones here.


    | Gesture | Event(s) to use |

    | --- | --- |

    | Tap (press) | onTap |

    | Double-tap | onDoubleTap |

    | Long press | onLongPress |

    | Side-to-side swipe | onHorizontalDragUpdate, Start, End |

    | Up-and-down swipe | onVerticalDragUpdate, Start, End |

    | Diagonal swipe | onPanUpdate, Start, End |

    | Pinch | onScaleUpdate, Start, End |


    ### Example 1: Reacting to a Long Press


    A long press (Figure [5-4](#638603_1_En_5_Chapter.xhtml#Fig4)) will ignore simple
    taps but will fire when the user presses for an extended time – like a second
    or two. Let’s say our UX people decided that a long press will signal that our
    user wants to delete a user.


    ![](images/638603_1_En_5_Chapter/638603_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    A long press


    To make this happen, we’ll add the onLongPress event handler:


    ```

    GestureDetector(

    child: Person(person: person),

    onLongPress: () {

    _people.remove(person);

    print("Deleted ${person[''first'']}");

    },

    );

    ```


    ### Example 2: Pinching to Add a New Item


    Let’s say our UX expert suggested that users would want to add items to the list
    and specify where in the list they want it inserted. To communicate that, they
    will open the list by unpinching two items (Figure [5-5](#638603_1_En_5_Chapter.xhtml#Fig5)).


    ![](images/638603_1_En_5_Chapter/638603_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Pinching


    We want to detect if the user was pinching in or pinching out. A normal pinch
    in should be ignored. But a pinch out – where they spread their fingers out –
    means we’re adding a new person. Note that some event handlers receive in an event
    object. This object holds information about that particular event. In the case
    of a scale/pinch, it holds a property called scale. If scale is greater than 1.0,
    this is a pinch out. Let’s say that if the user pinches out twice the normal scale,
    we’ll assume they’re wanting to add a new person to the list:


    ```

    onScaleUpdate: (e) {

    if (e.scale > 2.0)

    addPerson(context);

    },

    ```


    ### Example 3: Swiping Left or Right


    Now our UX team has decided that if the user swipes right on a person in our list,
    we should add them to the “nice” list, and if the user swipes left, we’ll add
    them to the “naughty” list (Figure [5-6](#638603_1_En_5_Chapter.xhtml#Fig6)).


    ![](images/638603_1_En_5_Chapter/638603_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Swiping


    To detect a swipe, we’d look for a drag or a pan. A pan is called for when we
    expect the user to be able to swipe *diagonally*. HorizontalDrags are only for
    left and right; it ignores Y-direction. VerticalDrags are only for up and down;
    it ignores any change in the X-direction. Since we only really care about left
    swipe or right swipe, we’ll zero in on a HorizontalDrag gesture.


    Our app can respond to any old swipe by using the onHorizontalDragEnd event. In
    this case, we also care about the direction of the swipe; was it left to right
    or right to left? So we have to look at the event object in each case. At the
    drag start, we save the X-position of where the user’s finger was. Then with every
    pixel move, the drag update event captures the current X-location. Finally, on
    drag end, we do a simple calculation; if the end X-position is greater, we know
    it was a swipe right. Otherwise, it was a swipe left:


    ```

    double swipeStartX = 0;

    String swipeDirection = "";

    return GestureDetector(

    child: Person(person: person),

    onHorizontalDragStart: (e) {

    swipeStartX = e.globalPosition.dx;

    },

    onHorizontalDragUpdate: (e) {

    swipeDirection =

    (e.globalPosition.dx > swipeStartX) ? "Right" : "Left";

    },

    onHorizontalDragEnd: (e) {

    if (_swipeDirection == "Right")

    updatePerson(person, status: "nice");

    else

    updatePerson(person, status: "naughty");

    },

    );

    ```


    ## Conclusion


    Flutter gestures are intuitive. They work like the average developer would expect
    them to, making it easy for us to code and easy for our users to use. When triggered,
    all events will run on a separate thread so it is totally okay to have them return
    an Async<> object. Therefore, feel free to mark your event handling functions
    as async and fill them full of awaits.^([^(11)](#fn11))


    Footnotes [1](#638603_1_En_5_Chapter.xhtml#Fn1_source)   [2](#638603_1_En_5_Chapter.xhtml#Fn2_source)


    # 6. Navigation and Routing


    All apps have the concept of *moving* from one screen to another. The user clicks
    the cart button, and we go to the card scene. The user clicks “continue shopping”
    button, and we get to browse for more products to buy. Some app developers call
    it routing. Others call it navigation. Whatever you want to call it, this is one
    area that Flutter makes easy because there are only four ways of navigating:


    *   Stacks – Each widget is full screen. The user taps buttons to go through a
    predefined workflow. History is maintained, and they can travel back by hitting
    a back button.


    *   Drawers – Most of the screen shows a widget, but on the left edge, a drawer
    is peeking out at the user. When they press it or swipe it right, it slides out
    revealing a menu of choices. Pressing one changes the widget in the main part
    of the screen.


    *   Tabs – Some room is reserved for a set of tabs at the top or the bottom of
    the screen. When you press on a tab, we show the widget that corresponds to that
    tab.


    *   Dialogs – While these aren’t technically part of navigation, they are a way
    to see another widget, so we’ll allow it. Dialogs are modal (a.k.a. pop-up windows)
    that stay until the user dismisses them.


    Each of these methods depends on your app having a MaterialWidget as its ancestor.
    Let’s drill into these methods starting with stack navigation.


    ## Stack Navigation


    If you’re an experienced developer, you’re familiar with queues and stacks. If
    not, let me explain briefly. Let’s say you work in a kitchen. As plates are cleaned,
    they’re stacked, right? Each plate is put on the top of the stack. This is called
    *pushing* onto the stack. When it is time to serve some food, you naturally take
    the last plate added, the one on top of the stack. This is called *popping* off
    the top of the stack.


    Flutter’s navigation works with stacks. When you want to send the user to a new
    scene, you will push() a widget on the top of the stack and the user sees that
    widget. Each time you push(), you’re making the stack of scenes taller and taller.
    When you are ready for them to go back to where they were before, you’ll pop()
    the last scene off the top of the stack, and what is revealed? The previous scene.


    With Flutter’s stack, you’ll typically predefine the scenes (a.k.a. routes) and
    give each a name. This must be done at the MaterialApp level like so:


    ```

    Widget build(BuildContext context) {

    return MaterialApp(

    title: ''Shopping App'',

    initialRoute: ''/'',

    routes: {

    ''/'': (ctx) => LandingScene(),

    ''/browse'': (ctx) => Browse(),

    ''/product'': (ctx) => ViewProduct(),

    ''/checkout: (ctx) => Checkout(),

    },

    );

    }

    ```


    Note that with routing, we no longer use the home property. Instead, use the intialRoute
    property.


    Tip


    If your initialRoute is “/”, you can omit it altogether and Flutter assumes it
    is “/”.'
  trans: "\n### 第四步：将手势与其行为关联起来\n\n最后一步。为你在第一步中设计的每个事件分配一个方法。`GestureDetector`（手势检测器）支持大量事件^(¹⁰)，因此它们可能会让人感到非常困惑。我们在这里将其归纳为最常用的一些事件。\n\
    \n| 手势 | 要使用的事件 |\n| --- | --- |\n| 点击（按下） | `onTap` |\n| 双击 | `onDoubleTap` |\n\
    | 长按 | `onLongPress` |\n| 左右滑动 | `onHorizontalDragUpdate`、`Start`、`End` |\n| 上下滑动\
    \ | `onVerticalDragUpdate`、`Start`、`End` |\n| 斜向滑动 | `onPanUpdate`、`Start`、`End`\
    \ |\n| 捏合 | `onScaleUpdate`、`Start`、`End` |\n\n### 示例 1：响应长按\n\n长按（图 5-4）会忽略简单的点击，但当用户持续按下较长时间（比如一两秒）时会触发。假设我们的用户体验设计团队决定，长按将表示用户想要删除一个用户。\n\
    \n![](img/638603_1_En_5_Fig4_HTML.jpg)\n\n图 5-4\n\n长按\n\n为了实现这一点，我们将添加 `onLongPress`\
    \ 事件处理器：\n\n```\nGestureDetector(\n  child: Person(person: person),\n  onLongPress:\
    \ () {\n    _people.remove(person);\n    print(\"已删除 ${person['first']}\");\n\
    \  },\n);\n```\n\n### 示例 2：通过捏合添加新项目\n\n假设我们的用户体验专家建议，用户可能想要向列表中添加项目，并指定插入的位置。为了表达这一点，他们将通过反向捏合（双指张开）来展开列表（图\
    \ 5-5）。\n\n![](img/638603_1_En_5_Fig5_HTML.jpg)\n\n图 5-5\n\n捏合\n\n我们需要检测用户是在向内捏合还是向外张开。正常的向内捏合应该被忽略。但向外张开——即他们张开手指——意味着我们正在添加一个新用户。请注意，某些事件处理器会接收到一个事件对象。这个对象包含了关于该特定事件的信息。在缩放/捏合的情况下，它包含一个名为\
    \ `scale` 的属性。如果 `scale` 大于 1.0，则这是一个向外张开（放大）。假设如果用户进行的向外张开操作达到正常缩放的两倍，我们就认为他们想要向列表中添加一个新用户：\n\
    \n```\nonScaleUpdate: (e) {\n  if (e.scale > 2.0)\n    addPerson(context);\n},\n\
    ```\n\n### 示例 3：向左或向右滑动\n\n现在，我们的用户体验团队决定，如果用户在列表中的某个人上向右滑动，我们应该将其添加到“好人”列表；如果用户向左滑动，则将其添加到“坏人”列表（图\
    \ 5-6）。\n\n![](img/638603_1_En_5_Fig6_HTML.jpg)\n\n图 5-6\n\n滑动\n\n要检测滑动，我们会寻找拖拽或平移。当我们预期用户可能进行*斜向*滑动时，会使用平移（pan）。`HorizontalDrag`（水平拖拽）仅针对左和右；它会忽略\
    \ Y 方向。`VerticalDrag`（垂直拖拽）仅针对上和下；它会忽略 X 方向上的任何变化。由于我们只关心左滑或右滑，我们将专注于 `HorizontalDrag`\
    \ 手势。\n\n我们的应用可以通过使用 `onHorizontalDragEnd` 事件来响应任何滑动。在这种情况下，我们还需要关注滑动的方向：是从左到右还是从右到左？因此，我们必须在每种情况下都查看事件对象。在拖拽开始时，我们保存用户手指所在的\
    \ X 位置。然后随着每个像素的移动，拖拽更新事件会捕获当前的 X 位置。最后，在拖拽结束时，我们做一个简单的计算；如果结束时的 X 位置更大，我们就知道是向右滑动了。否则，就是向左滑动：\n\
    \n```\ndouble swipeStartX = 0;\nString swipeDirection = \"\";\nreturn GestureDetector(\n\
    \  child: Person(person: person),\n  onHorizontalDragStart: (e) {\n    swipeStartX\
    \ = e.globalPosition.dx;\n  },\n  onHorizontalDragUpdate: (e) {\n    swipeDirection\
    \ =\n      (e.globalPosition.dx > swipeStartX) ? \"Right\" : \"Left\";\n  },\n\
    \  onHorizontalDragEnd: (e) {\n    if (_swipeDirection == \"Right\")\n      updatePerson(person,\
    \ status: \"nice\");\n    else\n      updatePerson(person, status: \"naughty\"\
    );\n  },\n);\n```\n\n## 结论\n\nFlutter 的手势直观易懂。它们的工作方式与普通开发者预期的一致，使我们易于编写代码，也让用户易于使用。当被触发时，所有事件都会在单独的线程上运行，因此让它们返回\
    \ `Async<>` 对象是完全没问题的。因此，请随意将你的事件处理函数标记为 `async`，并用 `await` 来填充它们。^(¹¹)\n\n脚注\
    \ 1 2\n\n# 6. 导航与路由\n\n所有应用都涉及从一个屏幕*移动*到另一个屏幕的概念。用户点击购物车按钮，我们就进入购物车场景。用户点击“继续购物”按钮，我们就继续浏览以购买更多商品。一些应用开发者称之为路由。另一些则称之为导航。不管你怎么称呼它，这都是\
    \ Flutter 让事情变得简单的领域之一，因为只有四种导航方式：\n\n- **堆栈（Stacks）** – 每个 widget 都是全屏的。用户通过点击按钮来遍历预定义的工作流程。历史记录会被维护，用户可以通过按返回按钮回溯。\n\
    - **抽屉（Drawers）** – 屏幕的大部分区域显示一个 widget，但在左边缘，有一个抽屉正对着用户。当用户按下它或向右滑动它时，它会滑出并显示一个菜单选项。按下一个选项会更改主屏幕区域的\
    \ widget。\n- **标签页（Tabs）** – 在屏幕的顶部或底部会预留一些空间来放置一组标签页。当你点击某个标签页时，我们会显示与该标签页对应的\
    \ widget。\n- **对话框（Dialogs）** – 虽然严格来说它们不属于导航的一部分，但它们也是一种查看另一个 widget 的方式，所以我们将其纳入。对话框是模态的（即弹出窗口），会一直显示直到用户将其关闭。\n\
    \n这些方法中的每一种都依赖于你的应用拥有一个 `MaterialWidget` 作为其祖先。让我们从堆栈导航开始，深入探讨这些方法。\n\n## 堆栈导航\n\
    \n如果你是一位经验丰富的开发者，你对队列和堆栈应该不陌生。如果不是，让我简要解释一下。假设你在厨房工作。盘子洗完后，会被堆叠起来，对吧？每个盘子都被放在堆栈的顶部。这被称为*压入（pushing）*堆栈。当需要上菜时，你自然会拿起最后一个放入的盘子，也就是堆栈顶部的那个。这被称为从堆栈顶部*弹出（popping）*。\n\
    \nFlutter 的导航就是使用堆栈工作的。当你想将用户带到一个新场景时，你会将一个 widget `push()` 到堆栈的顶部，用户就会看到该 widget。每次你\
    \ `push()` 时，都会使场景堆栈变得越来越高。当你希望用户返回到他们之前的位置时，你会从堆栈顶部 `pop()` 掉最后一个场景，然后会露出什么？是之前的那个场景。\n\
    \n使用 Flutter 的堆栈，你通常会预先定义场景（也称为路由）并为每个场景命名。这必须在 `MaterialApp` 层面完成，如下所示：\n\n```\n\
    Widget build(BuildContext context) {\n  return MaterialApp(\n    title: '购物应用',\n\
    \    initialRoute: '/',\n    routes: {\n      '/': (ctx) => LandingScene(),\n\
    \      '/browse': (ctx) => Browse(),\n      '/product': (ctx) => ViewProduct(),\n\
    \      '/checkout': (ctx) => Checkout(),\n    },\n  );\n}\n```\n\n请注意，使用路由时，我们不再使用\
    \ `home` 属性。取而代之的是使用 `initialRoute` 属性。\n\n提示\n\n如果你的 `initialRoute` 是 `\"/\"\
    `，你可以完全省略它，Flutter 会假定它是 `\"/\"`。\n"
- fmt: '### Navigating Forward and Back


    To navigate between scenes, you’ll use `Navigator.pushNamed(context, route)` and
    `Navigator.pop(context)`.


    To push a user to another route:


    ```

    RaisedButton(

    child: const Text(''Check out''),

    onPressed: () => Navigator.pushNamed(context, ''/checkout''),

    ),

    ```


    Once they’re finished and want to go back:


    ```

    RaisedButton(

    child: const Text(''Go back''),

    onPressed: () => Navigator.pop(context),

    ),

    ```


    But wait, there’s more! Notice that if you have a `Scaffold`, a back arrow is
    automatically added to the `appBar` (Figure 6-1). When tapped, it works to go
    back. And if your user is on Android, the ubiquitous Android back button works
    also (Figure 6-2).


    ![](images/638603_1_En_6_Chapter/638603_1_En_6_Fig2_HTML.jpg)


    Figure 6-2 — The Android back button works with stacks


    ![](images/638603_1_En_6_Chapter/638603_1_En_6_Fig1_HTML.jpg)


    Figure 6-1 — The back arrow in the appBar


    ### Using Anonymous Routes


    With named routes, your routing scheme is self-documenting. When your teammates
    want to review the scene-level widgets, they merely go to the `MaterialApp` and
    find the routes. Voila! There are the places you can go.


    There is another flavor of routing that doesn’t use a predefined routing table
    in your `MaterialApp`. Instead, you generate the route on the fly. We call this
    anonymous routing because there’s no name. Anonymous routing is more ad hoc and
    more flexible but it’s also more unpredictable for your teammates.


    At any time, you can


    ```

    Navigator.push(

    context,

    MaterialPageRoute(builder:

    (BuildContext context) => SecondRoute()

    )

    );

    ```


    As you can see, it’s quite a bit more complex. But it is popular if you want custom
    transitions or just don’t want predefined routes. With this, you can navigate
    to any widget whether it is in the named route listing or not.


    ### Get Result After a Scene Is Closed


    With stack navigation, every `pop()` returns to its caller. Therefore, it is possible
    to return a value from each scene. This isn’t extremely common, but it can be
    super useful when you’re moving the user through a workflow. Let’s say you have
    a section of your app that maintains a person object. The person object is defined
    in `MyPersonWidget`, and we provide one button to modify the login credentials,
    another to modify the phone number, and yet another to modify the X/Twitter handle.
    When the user taps each button, we might `push()` them to a route where they change
    the data. If so, we’ll need to return that changed data to the `MyPersonWidget`
    when we `pop()`. In this case, we will `push()` a little differently; we’ll have
    a variable to receive the returned value:


    ```

    // The ''async'' is needed here because we are ''await''ing below.

    onPressed:  () async {

    _person.xHandle =

    await Navigator.pushNamed(context, ''/xHandle'');

    },

    ```


    Note


    The `await` keyword implies that `pushNamed()` returns a `Future`. Also note that
    any value returned from this route will be assigned to `_person.xHandle`.


    So how does this value get returned from the `XWidget`? In the `pop()` of course!


    ```

    Navigator.pop(context, xHandle);

    ```


    `Navigator.pop()` is overloaded. If you add a second parameter, it will be returned
    to the widget that called `push()` in the first place. In the preceding example,
    `xHandle` will be returned.


    Apps that are shallow work great with `push()` and `pop()`. But your app may have
    a deep navigation tree with lots of choices. Apps like that aren’t usually best
    served by having umpteen buttons to `push()` and `pop()`. Instead, they should
    have a navigation menu. Flutter provides us with two types. Simpler apps can have
    tabs. More complex apps will have drawers. Let’s look at drawers next.


    ## Drawer Navigation


    Drawers are great when we have a lot of navigation choices – too many choices
    to fit in a tab. In a lot of responsive websites, you’ll see a menu across the
    top of the page with links to other pages on the site. Then when the site is viewed
    on a small device or even a narrow browser, that menu is replaced by a hamburger
    menu that, when clicked, will drop down a menu filled with the same choices. Basically,
    this is the site responding to limited screen real estate, providing menu choices
    that are hidden until the user asks for them.


    Since most phones already have limited screen real estate, you may opt to put
    your menu choices in a drawer that doesn’t gobble up that precious screen real
    estate until the user is ready to see them (Figure 6-3). They will hit the now-familiar
    hamburger menu (that icon with three lines) and the choices slide out from the
    left (Figure 6-4). When the user chooses one, we’ll `Navigator.push()` them to
    a new route.


    ![](images/638603_1_En_6_Chapter/638603_1_En_6_Fig4_HTML.jpg)


    Figure 6-4 — A scene with the drawer open


    ![](images/638603_1_En_6_Chapter/638603_1_En_6_Fig3_HTML.jpg)


    Figure 6-3 — A scene with the drawer closed


    ### The Drawer Widget


    You’ll need a `NavigationDrawer` widget, a built-in Flutter widget that has the
    ability to slide out, slide in, and contain menu choices. When you use a drawer,
    you always include it in a `Scaffold`’s `drawer` property, like this:


    ```

    Widget build(BuildContext context) {

    return Scaffold(

    body: SomeFullPageWidget(),

    drawer: NavigationDrawer(child: Column(

    children: [

    Text(''Option 1''),

    Text(''Option 2''),

    Text(''Option 3''),

    ],

    ),),

    );

    }

    ```


    Notice that when you have a drawer in your `Scaffold`, its hamburger icon replaces
    the `appBar`’s back button. You can’t see both buttons simultaneously unless you
    create your own buttons manually. So while drawer navigation and stack navigation
    *can* work together, it can be kind of awkward. One example of them working really
    well together is to have a Drawer at the topmost level, and then use stack navigation
    at all levels below that.


    Tip


    Do you want a consistent drawer to be available across your entire app? If so,
    we generally put a `Scaffold` on every scene and include the drawer in it. Therefore,
    it is best to put your Drawer in its own widget and include it.


    ```

    return Scaffold(

    appBar: AppBar(

    title: const Text(''Drawer Navigation''),

    ),

    body: const Text(''DrawerNavigation''),

    drawer: MyDrawer(),

    );

    ```'
