    return Stack(

    children: [

    Image.network(imageUrl,

    height: 300, width: 300, fit: BoxFit.cover),

    Text("$name"),

    ],

    ),

    },

    );

    );

    },

    );

    ```


    Tip


    Writing code like this, code that wakes up and updates itself based on newly arriving
    data has a term: *reactive programming*. Reactive programming happens when we
    make our app aware of its external influences and tell it to react somehow. You
    may have heard of reactive extensions like rxJava, rxJS, and rx.NET which are
    libraries with classes and functions made for this style. Well, there is one for
    Flutter unsurprisingly called rxDart. You can find it at [`https://github.com/ReactiveX/rxdart`](https://github.com/ReactiveX/rxdart).


    ## Strongly Typed Classes


    At this point, you now know how to make HTTP calls against an API, and when you
    get a response, you know how to unwrap that data and use it. This puts us in a
    great position to convert that data into a strongly typed class using the typed
    deserialization pattern.


    Note


    This is not required in order to make HTTP calls. It is merely a cleaner way of
    processing the call and pulling it into a structure that is predictable. HTTP
    data is by nature unstructured. This is a best practice used by many Flutter developers
    but is by no means required. So if you don’t like it, feel free to skip it.


    Typed deserialization happens in three simple steps:


    1.  Create the business class.


    2.  Write a .fromJSON() method and/or a .fromJSONArray() method.


    3.  When reading from HTTP calls, use .fromJSON() to hydrate the object.


    ### Create a Business Class


    Let’s say we’re reading and writing data for people. We should create a Person
    class:


    ```

    class Person {

    String? name;

    String? email;

    String? imageUrl;

    }

    ```


    ### Write a .fromJSON( ) Method


    This should be a static method that will return an instance of the business class,
    Person in this case:


    ```

    class Person {

    // More class code here

    static Person fromJson(String jsonString) {

    Map data = jsonDecode(jsonString);

    return Person()

    ..name = data[''name'']

    ..email = data[''email'']

    ..imageUrl = data[''imageUrl''];

    }

    // and more class code here maybe

    }

    ```


    Note the use of Dart’s cascade operators and omission of the *new* operator. Both
    are best practices also.


    ### Use .fromJSON( ) to Hydrate the Object


    The word *hydrate* literally means “add water.” In this context, the data is the
    water, and we’re creating a new Person object by adding the data to it. You read
    data from an HTTP service using the .get() method and you pass it into .fromJSON()
    like this:


    ```

    // Make the HTTP call

    final Response res = await get(url);

    // Hydrate a Person from the response body - a JSON string

    Person p = Person.fromJson(res.body);

    ```


    See how clean and straightforward the code is?


    I imagine that at this point, you’d like to exercise all of this newfound knowledge.
    Let’s do that with a free API service next.


    ## One Big Example


    A real API service will involve a database with exposed GET, POST, DELETE, PUT,
    and/or PATCH endpoints which all require some hefty setup on the server. You’re
    going to want to get there eventually, but unless you’re a full-stack developer,
    that’s for the backend people. For now, let’s make use of JSONPlaceholder, a free
    service for testing APIs. Read about it at [`https://jsonplaceholder.typicode.com/guide`](https://jsonplaceholder.typicode.com/guide).


    Note


    JSONPlaceholder accepts all types of RESTful requests, but for obvious reasons,
    they can’t have the world PUTting, POSTing, and DELETEing data unauthenticated.
    So they don''t actually change any server data. The code we write would change
    server data if they honored it, but since they don’t, please don’t expect to see
    your changes persisted.


    If you want to test the server, point your favorite browser at [`https://jsonplaceholder.typicode.com/users`](https://jsonplaceholder.typicode.com/users),
    and you’ll see the first ten people. Congratulations, you’ve just made a GET request.
    Do another one at [`https://jsonplaceholder.typicode.com/users/1`](https://jsonplaceholder.typicode.com/users/1),
    and you’ll see the person with a user ID of 1\. In fact, try a few different IDs
    to see different users.


    The other three HTTP methods are less simple. You’ll want to use a tool like cURL,
    Postman, or SoapUI that can make POST, PUT, or DELETE requests.


    | Method | URL | What happens |

    | --- | --- | --- |

    | DELETE | [`https://jsonplaceholder.typicode.com/users/1`](https://jsonplaceholder.typicode.com/users/1)
    | Delete person #1 |

    | PUT | [`https://jsonplaceholder.typicode.com/users/1`](https://jsonplaceholder.typicode.com/users/1)
    | Update person #1 |

    | POST | [`https://jsonplaceholder.typicode.com/users`](https://jsonplaceholder.typicode.com/users)
    | Create a new person |


    And how will we apply these in our app? Read on!'
  trans: '

    ###  `FutureBuilder` – 更优雅的方式


    更好的解决方案可能是使用 `FutureBuilder` 组件。当你面临一个 `Future`，其完成后产生的数据需要在 Flutter 组件中渲染时，请考虑使用
    `FutureBuilder`。这个场景听起来熟悉吗？应该很熟悉，因为这正是我们在 Flutter 中使用 `Future` 的主要原因。之前那个简单的代码示例，使用
    `FutureBuilder` 可以更加简洁地实现：


    ```

    FutureBuilder(

    future: get(uri),

    builder: (ctx, AsyncSnapshot snapshot) {

    if (snapshot.connectionState != ConnectionState.done) {

    return const CircularProgressIndicator();

    }

    if (snapshot.hasError) {

    return Text(''噢不！出错了！ ${snapshot.error}'');

    }

    if (!snapshot.hasData) {

    return const Text(''没有可显示的内容'');

    }

    final Map body =

    json.decode(snapshot.data.body);

    final int statusCode = snapshot.data.statusCode;

    if (statusCode > 299) {

    return Text(''服务器错误：$statusCode'');

    }

    String first = body[''name''];

    String imageUrl = body[''profilePictureUrl''];

    return Stack(

    children: [

    Image.network(imageUrl,

    height: 300, width: 300, fit: BoxFit.cover),

    Text("$name"),

    ],

    );

    },

    );

    ```


    这里不再需要 `setState()`，因为 `FutureBuilder` 可以直接访问 `Future` 本身，从而知晓何时以及如何重绘自身。在上面的例子中，你可以看到它能够针对每种情况渲染不同的内容：在等待
    `Future` 完成时显示 `ProgressIndicator`，出现错误时显示错误信息，`Future` 中没有数据时显示提示，当然，数据成功返回时则显示对应的组件。


    **注意**


    在访问 `snapshot.data` 之前，务必检查 `snapshot.hasData` 和/或 `snapshot.hasError`。同时要留意 HTTP
    状态码，它位于 `response.statusCode` 中。如果该数字是 4xx 或 5xx，说明你从服务器收到了一个有效响应，但请求本身有问题，此时你的数据将是
    `null`。


    ###  `StreamBuilder`


    `FutureBuilder` 对 `Future` 的处理方式，就是 `StreamBuilder` 对 `Stream` 的处理方式。这两个类几乎完全相同，具有相同的格式，使用相同形式的快照，并同样检查
    `snapshot.hasError` 和 `snapshot.hasData`。但有时候，我们处理的不是像 Future 那样的一次性数据返回，而是一个*数据流*，它可能以间断或连续的方式不断到达。在这种情况下，你应该使用
    `StreamBuilder`：


    ```

    StreamBuilder(

    stream: anythingThatReturnsAStream(),

    builder: (BuildContext ctx, AsyncSnapshot snapshot){

    // 以下大部分内容与 FutureBuilder 类似，

    // 但这里的数据是一个文档集合，每个文档代表一条记录

    if (snapshot.connectionState != ConnectionState.done) {

    return const CircularProgressIndicator();

    }

    if (snapshot.hasError) {

    return Text(''噢不！出错了！ ${snapshot.error}'');

    }

    if (!snapshot.hasData) {

    return const Text(''暂无数据，请稍候...'');

    }

    return ListView.builder(

    itemCount: snapshot.data.documents.length,

    itemBuilder: (BuildContext context, int i) {

    String first = snapshot.data.documents[i][''name''];

    String imageUrl =

    snapshot.data.documents[i][''imageUrl''];

    return Stack(

    children: [

    Image.network(imageUrl,

    height: 300, width: 300, fit: BoxFit.cover),

    Text("$name"),

    ],

    ),

    },

    );

    );

    },

    );

    ```


    **提示**


    像这样编写能够根据新到达的数据自动唤醒并更新自身的代码，有一个专门的术语：*响应式编程*。当我们的应用能够感知外部影响并指示其做出相应反应时，就实现了响应式编程。你可能听说过像
    `rxJava`、`rxJS` 和 `rx.NET` 这样的响应式扩展，它们是为这种风格设计的类库。毫无疑问，Flutter 也有一个对应的库，名为 `rxDart`。你可以在
    [`https://github.com/ReactiveX/rxdart`](https://github.com/ReactiveX/rxdart) 找到它。


    ## 强类型类


    至此，你已经知道如何对 API 发起 HTTP 调用，并在收到响应后如何解包数据并使用它。这为我们使用类型化反序列化模式将这些数据转换为强类型类提供了绝佳条件。


    **注意**


    发起 HTTP 调用并不强制要求这样做。这仅仅是一种更清晰的处理调用并将数据拉取到可预测结构中的方法。HTTP 数据本质上是非结构化的。这是许多 Flutter
    开发者使用的一种最佳实践，但并非强制要求。所以，如果你不喜欢，完全可以跳过。


    类型化反序列化通过三个简单步骤完成：


    1.  创建业务类。


    2.  编写一个 `.fromJSON()` 方法和/或一个 `.fromJSONArray()` 方法。


    3.  在通过 HTTP 调用读取数据时，使用 `.fromJSON()` 来实例化对象。


    ### 创建一个业务类


    假设我们要读写人员数据。我们应该创建一个 `Person` 类：


    ```

    class Person {

    String? name;

    String? email;

    String? imageUrl;

    }

    ```


    ### 编写一个 `.fromJSON()` 方法


    这应该是一个静态方法，它会返回业务类（这里是 `Person`）的一个实例：


    ```

    class Person {

    // 此处编写更多类代码

    static Person fromJson(String jsonString) {

    Map data = jsonDecode(jsonString);

    return Person()

    ..name = data[''name'']

    ..email = data[''email'']

    ..imageUrl = data[''imageUrl''];

    }

    // 可能这里还有更多类代码

    }

    ```


    注意这里使用了 Dart 的级联运算符，并省略了 `new` 关键字。两者都是最佳实践。


    ### 使用 `.fromJSON()` 来实例化对象


    “实例化”这个词的字面意思是“注水”。在这个上下文中，数据就是水，我们通过将数据添加到新创建的 `Person` 对象中来“注水”。你可以使用 `.get()`
    方法从 HTTP 服务读取数据，然后像这样将其传入 `.fromJSON()`：


    ```

    // 发起 HTTP 调用

    final Response res = await get(url);

    // 从响应体（一个 JSON 字符串）中实例化一个 Person 对象

    Person p = Person.fromJson(res.body);

    ```


    看到代码是多么简洁和直接了吗？


    我想此刻，你可能想要实践一下这些新学到的知识。接下来，我们就通过一个免费的 API 服务来练习。


    ## 一个大综合示例


    一个真正的 API 服务会涉及一个数据库，并暴露 GET、POST、DELETE、PUT 和/或 PATCH 等端点，这些都需要在服务器端进行大量设置。你最终肯定想达到那种水平，但除非你是全栈开发者，否则那是后端人员的事情。现在，我们先使用
    `JSONPlaceholder`，一个用于测试 API 的免费服务。你可以从 [`https://jsonplaceholder.typicode.com/guide`](https://jsonplaceholder.typicode.com/guide)
    了解它。


    **注意**


    `JSONPlaceholder` 接受所有类型的 RESTful 请求，但出于显而易见的原因，他们不能让全世界在未经认证的情况下进行 `PUT`、`POST`
    和 `DELETE` 操作。所以他们实际上不会更改任何服务器数据。如果该服务支持，我们编写的代码本可以更改服务器数据，但既然它不支持，请勿期望看到你的更改被持久化。


    如果你想测试这个服务器，可以在你喜欢的浏览器中打开 [`https://jsonplaceholder.typicode.com/users`](https://jsonplaceholder.typicode.com/users)，你将看到前十位用户。恭喜，你已经成功发起了一个
    GET 请求。再试试打开 [`https://jsonplaceholder.typicode.com/users/1`](https://jsonplaceholder.typicode.com/users/1)，你将看到用户
    ID 为 1 的那个人。事实上，你可以尝试不同的 ID 来查看不同的用户。


    另外三种 HTTP 方法则不那么简单。你需要使用像 `cURL`、`Postman` 或 `SoapUI` 这样的工具来发送 `POST`、`PUT` 或
    `DELETE` 请求。


    | 方法 | URL | 功能 |

    | --- | --- | --- |

    | `DELETE` | [`https://jsonplaceholder.typicode.com/users/1`](https://jsonplaceholder.typicode.com/users/1)
    | 删除用户 #1 |

    | `PUT` | [`https://jsonplaceholder.typicode.com/users/1`](https://jsonplaceholder.typicode.com/users/1)
    | 更新用户 #1 |

    | `POST` | [`https://jsonplaceholder.typicode.com/users`](https://jsonplaceholder.typicode.com/users)
    | 创建新用户 |


    那么我们如何在应用中使用这些方法呢？继续往下看吧！

