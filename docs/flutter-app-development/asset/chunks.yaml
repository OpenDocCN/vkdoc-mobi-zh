    \ 和 `Icons.cake`。每个值都指向一个不同的图标，就像上面展示的那些。以下是如何在你的应用中放置一个红色大生日蛋糕（图 4-2）的代码：\n\n\
    ![](img/638603_1_En_4_Fig2_HTML.jpg)\n\n图 4-2：红色蛋糕图标\n\n```\nIcon(\n  Icons.cake,\n\
    \  color: Colors.red,\n  size: 200,\n)\n```\n\n如果近 9000 个内置图标仍不能满足你的需求，你完全可以引入其他图标集。Flutter\
    \ 可以使用 Font Awesome，它可在 [`https://pub.dev/packages/font_awesome_flutter`](https://pub.dev/packages/font_awesome_flutter)\
    \ 获取，能提供另外 2000 个图标。而 [`https://pub.dev/packages/icons_flutter`](https://pub.dev/packages/icons_flutter)\
    \ 上的 `icons_flutter` 包则提供了另外 14,000 个图标。这些应该足够你用一阵子了。\n\n## Image Widget\n\n在\
    \ Flutter 中显示图片比使用 `Text` 或 `Icons` 要复杂一些。它涉及几个方面：\n\n1.  **获取图片来源**——图片可以嵌入在应用本身内，也可以从互联网实时获取。如果图片在应用整个生命周期内都不会改变（例如标志或装饰图案），则应该使用嵌入图片。\n\
    \n2.  **调整大小**——将图片缩放或裁剪到合适的尺寸和形状。\n\n### 嵌入图片\n\n嵌入图片在运行时速度更快，但会在编译时增加应用的安装包大小。要嵌入图片，请将图片文件放入你的项目文件夹中。放在项目中的任何位置都可以，但惯例是将其放在名为\
    \ `assets` 的子文件夹中，可能还需要一个子文件夹以保持结构清晰。像 `assets/images` 这样的路径就很合适。\n\n然后编辑 `pubspec.yaml`\
    \ 文件。添加以下内容：\n\n```\nflutter:\n  assets:\n    - assets/images/photo1.png\n   \
    \ - assets/images/photo2.jpg\n```\n\n保存文件并在命令行中运行 `flutter pub get`，让项目处理该文件。\n\
    \n> **提示**  \n> `pubspec.yaml` 文件保存了关于你项目的各种重要信息。它包含项目元数据，如名称、描述、仓库位置和版本号。它列出了库依赖项和字体。对于刚接触你项目的其他开发者来说，这是首要查看的文件。对于\
    \ JavaScript 开发者来说，它相当于 Dart 项目中的 `package.json` 文件。更多信息请参见附录 C“在你的 Flutter 应用中包含包”。\n\
    \n你可以通过调用 `asset()` 构造器将图片放入 widget，如下所示：\n\n```\nImage.asset('assets/images/photo1.jpg'),\n\
    ```\n\n### 网络图片\n\n网络图片更接近 Web 开发者所习惯的方式。它只是通过 HTTP 从互联网上获取图片。你需要使用 `network`\
    \ 构造器，并传入一个 URL 字符串作为参数。\n\n```\nImage.network(imageUrl),\n```\n\n正如你所料，这些图片比嵌入图片慢，因为在通过互联网向服务器发送请求和你的设备下载图片的过程中存在延迟。其优势在于这些图片是实时的；只需更改图片\
    \ URL，就可以动态加载任何图片。\n"
- fmt: '### Sizing an Image


    Images are nearly always put in a container. Not that this is a requirement, it’s
    just that I can’t imagine a real-world use case where it won’t be inside another
    widget. The container has a say in the size that an image is drawn. It would be
    an amazing coincidence if the image’s natural size fit its container’s size perfectly.
    Instead, Flutter’s layout engine will shrink the image to fit its container, but
    not grow it. This fit is called `BoxFit.scaleDown`, and it makes sense for the
    default behavior. But what other options are available and how do we decide which
    to use? Table [4-1](#638603_1_En_4_Chapter.xhtml#Tab1) provides your `BoxFit`
    options.


    **Table 4-1** *BoxFit options*


    | `fill` | Stretch it so that both the width and the height fit exactly. It may
    distort the image | ![](images/638603_1_En_4_Chapter/638603_1_En_4_Figa_HTML.jpg)
    |

    | `cover` | Shrink or grow until the space is filled. The top/bottom or sides
    may be clipped. Does not distort the image | ![](images/638603_1_En_4_Chapter/638603_1_En_4_Figb_HTML.jpg)
    |

    | `fitHeight` | Make the height fit exactly. Clip the width or add extra space
    as needed | ![](images/638603_1_En_4_Chapter/638603_1_En_4_Figc_HTML.jpg) |

    | `fitWidth` | Make the width fit exactly. Clip the height or add extra space
    as needed | ![](images/638603_1_En_4_Chapter/638603_1_En_4_Figd_HTML.jpg) |

    | `contain` | Shrink until both the height *and* the width fit. There may be extra
    space on the top/bottom or sides | ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fige_HTML.jpg)
    |


    *Photo courtesy of* [*Eye for Ebony*](https://unsplash.com/%2540eyeforebony%253Futm_source%253Dunsplash%2526utm_medium%253Dreferral%2526utm_content%253DcreditCopyText)
    *on* [*Unsplash*](https://unsplash.com/search/photos/black-woman%253Futm_source%253Dunsplash%2526utm_medium%253Dreferral%2526utm_content%253DcreditCopyText)


    So those are your options, but how do you choose? Figure [4-3](#638603_1_En_4_Chapter.xhtml#Fig3)
    may help you decide which fit to use in different situations.


    ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fig3_HTML.png)


    **Figure 4-3** How to decide an image’s fit


    To specify the fit, you’ll set the `fit` property.


    ```

    Image.asset(''assets/images/woman.jpg'', fit: BoxFit.contain,),

    ```


    ### SnackBar Widget


    Weird name, I know. Sounds like something delicious, but this widget is really
    a standard way to alert your user to something. A `SnackBar` (Figure [4-4](#638603_1_En_4_Chapter.xhtml#Fig4))
    will appear at the bottom of your screen, occulting whatever is already down there
    and will disappear after a short time. You get to decide what the `SnackBar` says,
    and you can even place a button on it for the user to take action.


    ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fig4_HTML.jpg)


    **Figure 4-4** A SnackBar shows a message and optional actions


    You can show a `SnackBar` in any scene you like as long as you do it in a widget
    that is nested inside a `Scaffold`. You must:


    1.  Create the `SnackBar`

    2.  Call `ScaffoldMessenger.of(context).showSnackBar(sb)`

    3.  Handle the action button (optional)


    Note that `showSnackBar()` runs asynchronously so as to not block the UI thread.
    It will stay up for four seconds by default but that can be overridden by the
    `duration` property. Here’s an example:


    ```

    IconButton(

    icon: const Icon(Icons.delete, size: 36),

    onPressed: () {

    bool goAheadAndDeletePerson = true;

    final SnackBar sb = SnackBar(

    content: Text("${person.name} deleted."),

    duration: const Duration(seconds: 5),

    action: SnackBarAction(

    label: "UNDO",

    onPressed: () => goAheadAndDeletePerson = false,

    ),

    );

    ScaffoldMessenger.of(context).showSnackBar(sb);

    Future.delayed(const Duration(seconds: 5), () {

    if (goAheadAndDeletePerson) {

    deletePerson(person);

    }

    });

    },

    ),

    ```


    In this example, we’re lying to the user 😲. We’re telling them that the record
    has already been deleted but they really have five seconds to cancel that by hitting
    UNDO. The `Future.delayed()` says to run `deletePerson()` in a separate isolate
    after a five-second delay. If they hit UNDO within that timeframe, the `Future`
    skips the delete.


    Of course you may just want to bring up a message only with no action. It’s up
    to you.


    ### Input Widgets


    Many of us came from a web background where from the very beginning there were
    HTML `<form>`s with `<input>`s and `<select>`s. All of these exist to enable the
    user to get data into web apps, an activity we can’t live without in mobile apps
    as well. Flutter provides widgets for entering data like we have on the Web, but
    they don’t work the same way. They take much more work to create and use. Sorry
    about that. On the plus side, though, they are also safer and give us much more
    control.


    Part of the complication is that these widgets don’t maintain their own state;
    you have to do it manually.


    Another part of the complication is that input widgets are unaware of each other.
    In other words, they don’t play well together until you group them with a `Form`
    widget. We eventually need to focus on the `Form` widget. But before we do, let’s
    study how to create text fields, checkboxes, radio buttons, sliders, and dropdowns.


    **Caution**


    > Input widgets are really tough to work with unless they are used within a `StatefulWidget`
    because by nature, they change state. Remember that we mentioned `StatefulWidget`s
    briefly in the last chapter and we’re going to talk about them in depth in Chapter
    [7](#638603_1_En_7_Chapter.xhtml), “Managing State.” But until then, please just
    take our word for it and put them in a stateful widget for now.


    #### Text Fields


    If all you have is a single textbox, you probably want a `TextField` widget. Here’s
    a simple example of the `TextField` widget with a `Text` label above it:


    ```

    const Text(''Search terms''),

    TextField(

    initialValue: "Some initial value",

    onChanged: (val) => _searchTerm = val,

    ),

    ```


    That `onChanged` property is an event handler that fires after every keystroke.
    It receives a single value – a `String`. This is the value that the user is typing.
    In this example, we’re setting a local variable called `_searchTerm` to whatever
    the user types.


    Did you notice the `Text(''Search terms'')`? That is our lame attempt at putting
    a label above the `TextField`. There’s a much, much better way. Check this out
    …


    ##### Making Your TextField Fancy


    There’s a ton of options to make your `TextField` more useful – not infinite options,
    but lots. And they’re all available through the `InputDecoration` widget (Figure
    [4-5](#638603_1_En_4_Chapter.xhtml#Fig5)):


    ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fig5_HTML.jpg)


    **Figure 4-5** A TextField with an InputDecoration


    ```

    return TextField(

    decoration: InputDecoration(

    labelText: ''Email'',

    hintText: ''you@email.com'',

    icon: Icon(Icons.contact_mail),

    ),

    ),

    ```


    Table [4-2](#638603_1_En_4_Chapter.xhtml#Tab2) presents some more `InputDecoration`
    options.


    **Table 4-2** *InputDecoration options*


    | Property | Description |

    | --- | --- |

    | `labelText` | Appears above the `TextField`. Tells the user what this `TextField`
    is for |

    | `hintText` | Light ghost text inside the `TextField`. Disappears as the user
    begins typing |

    | `errorText` | Error message that appears below the `TextField`. Usually in red.
    It is set automatically by validation (covered later), but you can set it manually
    if you need to |

    | `icon` | Draws an icon to the left of the entire `TextField` |

    | `prefixIcon` | Draws one inside the `TextField` to the left |

    | `suffixIcon` | Same as `prefixIcon` but to the far right |


    #### Password Boxes


    To make it a password box (Figure [4-6](#638603_1_En_4_Chapter.xhtml#Fig6)), set
    `obscureText` property to `true`. As the user types, each character appears for
    a second and is replaced by a dot.


    ![](images/638603_1_En_4_Chapter/638603_1_En_4_Fig6_HTML.jpg)


    **Figure 4-6** A password box with `obscureText`


    ```

    return TextField(

    obscureText: true,

    decoration: InputDecoration(

    labelText: ''Password'',

    ),);

    ```'
