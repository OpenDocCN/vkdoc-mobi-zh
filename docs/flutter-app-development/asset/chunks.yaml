    \n## HTTP 响应到组件\n\n有几种方法可以等待 `Future` 解析然后显示数据。我们通过向你展示三种方法来简化说明：\n\n1.  暴力法\n\
    2.  `FutureBuilder`\n3.  `StreamBuilder`\n\n暴力法显而易见且易于理解，但我认为你会更喜欢 `FutureBuilder`/`StreamBuilder`，因为它们更简洁、更优雅。\n\
    \n### 暴力法——简单的方式\n\n你已经拥有了显示数据所需的所有工具：你理解 `Future`，也知道如何告诉有状态组件用新数据重绘自身——`setState()`。因此，只需在\
