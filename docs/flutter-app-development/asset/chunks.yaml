  trans: '

    # 3. 万物皆组件


    假设你是一个极具天赋的乐高迷，并且获得了令人垂涎的乐高大师建造师职位之一。恭喜！我们再假设你的第一个任务是用 26,000 块乐高积木建造一个六英尺高的雷神托尔（图
    3-1）。


    ![](img/638603_1_En_3_Fig1_HTML.png)


    ***图 3-1***

    *乐高版托尔。作者曾在一家电影院拍下这张照片*


    你会怎么做？想一想。别急，我们等着。


    你会直接抓起积木然后拼在一起吗？可能不会。你会先铺好托尔的脚底，然后从下往上搭建吗？也不会。我猜你的常识性策略是这样的：


    1.  对你建造的东西有个整体构想，先想清楚全貌。

    2.  意识到整个项目太复杂，无法一蹴而就。

    3.  将项目分解成各个部分（腿、左臂、右臂、躯干、左手剑、右手剑、头盔、披风、头部）。

    4.  意识到每个部分仍然过于复杂。

    5.  对于每个部分，再将其分解成子部分。

    6.  重复步骤 4 和 5，直到得到足够简单的组件，使得你和你的队友都能轻松理解、构建和维护。

    7.  创建每个简单的组件。

    8.  将简单组件组合成更大、更复杂的组件。

    9.  重复步骤 7 和 8，直到完成整个项目。


    这个过程有一个名字，叫做*组件化*，这正是我们在 Flutter 应用中要遵循的思考过程。


    组件化并非什么新鲜事物。实际上，它早在 1968 年就被提出了。^(⁵) 但得益于 Angular、React、Vue、Svelte、SolidJS 以及原生
    Web 组件等 Web 框架，这项技术近年来才迅速流行起来。如今，似乎所有酷孩子都在做软件组件。将复杂部分递归分解为更简单部分的想法称为*分解*。而将编写好的部分重新组合成更大组件的行为称为*组合*。


    在 Flutter 的世界里，这些组件被称为*widget*。Flutter 社区的人喜欢说“万物皆 widget”，这意味着你和我都会使用 Flutter
    自带的內建 widget。我们会将它们组合在一起来创建自定义 widget。然后，我们的自定义 widget 会再被组合，创建出越来越复杂的自定义 widget。这个过程一直持续，直到你构建出一个完整的应用。


    每个应用都可以从两个方面来考虑：


    1.  **行为** – 软件的功能。所有的业务逻辑都在这里：数据读取、写入和处理。

    2.  **呈现** – 软件的外观。用户界面。如按钮、文本框和标签。


    而 Flutter 将这两者融合在了一种语言中，而不是两种。


    ## 界面即代码


    其他开发框架已经证明了组件化是正确的发展方向。Flutter 团队公开表示，他们深受基于组件化的 React^(⁶)的启发。事实上，所有框架的创造者似乎都在相互借鉴。但
    Flutter 在用户界面表达方式上是独一无二的。开发者使用同一种 Dart 语言来同时描述应用的图形用户界面和行为（表 3-1）。我们称之为“UI as
    code（界面即代码）”。


    ***表 3-1***

    *只有 Flutter 使用同一种语言来处理呈现和行为*


    | 框架 | 行为用…表达 | 界面用…表达 |

    | --- | --- | --- |

    | Maui | C# | XAML |

    | React Native | JavaScript | JSX |

    | NativeScript | JavaScript | XML |

    | Flutter | Dart | Dart |


    那么，这个界面是如何创建的呢？像许多其他框架和语言一样，Flutter 应用从一个`main`函数开始。在 Flutter 中，`main`会调用一个名为`runApp()`的函数。这个`runApp()`接收一个
    widget，即根 widget，它可以被任意命名，但它必须是一个继承了 Flutter `StatefulWidget`/`StatelessWidget`的类。它看起来像这样：


    ```

    // 导入所有 Flutter 应用所需的 Dart 包

    import ''package:flutter/material.dart'';

    // 这里是 main 调用 runApp

    void main() => runApp(RootWidget());

    // 这是你的根 widget

    class RootWidget extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Text("Hello world");

    }

    }

    ```


    这就是在 Flutter 中创建一个“Hello world”所需的全部代码。


    但是等等……这个`Text()`是什么东西？它是一个內建的 Flutter widget。由于这些內建 widget 非常重要，我们需要仔细看看它们。


    ## 內建 Flutter Widget


    Flutter 的基础 widget 是我们构建一切事物的基石，而且数量众多——上次统计有超过 1300 个。^(⁷) 这对于你我来说需要了解的数量相当大。但是，如果你在脑海中将它们进行分类整理，就会容易管理得多。


    它们大致可分为以下几类：


    *   数值型 widget

    *   布局型 widget

    *   导航型 widget

    *   其他 widget


    > **注意**

    > 这些并非 Flutter 官方分类列表。其 15 个官方分类列在此处：[`https://flutter.dev/docs/development/ui/widgets`](https://flutter.dev/docs/development/ui/widgets)。我们只是觉得重新组织一下有助于理清思路。


    我们将通过一两个例子快速浏览每个类别，然后在后续章节中进行深入探讨。让我们从数值型 widget 开始。


    ### 数值型 Widget


    某些 widget 持有数值，这些数值可能来自本地存储、互联网服务或用户本身。它们用于向用户显示数值，以及从用户那里获取数值进入应用。典型的例子是`Text`
    widget，它用于显示一小段文本。另一个是`Image` widget，用于显示 `.jpg`、`.png` 或其他图片。


    以下是更多数值型 widget：


    | AlertDialog Badge Checkbox Chip CircularProgressIndicator Date & Time Pickers
    DataTable DropdownButton ElevatedButton FlatButton | FloatingActionButton FlutterLogo
    Form FormField Icon IconButton Image LinearProgressIndicator Menu PopupMenuButton
    Radio | RawImage RefreshIndicator RichText SegmentedButton Slider SnackBar Switch
    Text TextField Tooltip |


    我们将在下一章更详细地探索数值型 widget。


    ### 布局型 Widget


    布局型 widget 赋予我们大量控制能力，使场景能够正确布局——使用`Row` widget 将 widget 并排放置，或使用`Column` widget
    上下堆叠；使用`SingleChildScrollView`使它们可滚动，使用`Wrap`使其自动换行，使用`Padding`确定 widget 周围的空间以避免拥挤感，等等：


    | Align AppBar AspectRatio BottomAppBar BottomSheet Card Center Column ConstrainedBox
    Container Divider Expanded ExpansionPanel FittedBox | Flow FractionallySizedBox
    GridView IntrinsicHeight IntrinsicWidth LayoutBuilder LimitedBox ListTile ListView
    MediaQuery NestedScrollView OverflowBox Padding PageView | Placeholder Row Scaffold
    Scrollable Scrollbar SingleChildScrollView SizedBox SizedOverflowBox Slivers*
    SnackBar Stack Table Transform Wrap |


    这是一个庞大的主题，我们将在本书的最后六章进行介绍。


    ### 导航型 Widget


    当你的应用有多个场景（“屏幕”、“页面”，随便你怎么称呼）时，你需要某种方式在它们之间切换。导航型 widget 就派上用场了。它们将控制用户如何看到一个场景，然后移动到下一个。通常，当用户点击按钮时会发生这种切换。有时，导航按钮位于标签栏或从屏幕左侧滑入的抽屉中。以下是一些导航型
    widget：


    | AlertDialog Drawer MaterialApp NavigationBar | NavigationDrawer NavigationRail
    Navigator | SimpleDialog TabBar TabBarView |


    我们将在第六章“导航与路由”中学习它们的工作原理。

    '
- fmt: '### Other Widgets


    And no, not all widgets fall into these neat categories. Let’s lump the rest into
    a miscellaneous category. Here are some miscellaneous widgets:


    | `ClipPath` `Cupertino` `Dismissible` | `FutureBuilder` `GestureDetector` `Semantics`
    | `StreamBuilder` `Theme` `Transitions` |


    Many of these miscellaneous widgets are covered throughout the book where they
    fit naturally. `GestureDetector` and `Dismissible` appear in Chapter [5](#638603_1_En_5_Chapter.xhtml),
    “Responding to Gestures.” `Theme` is covered in Chapter [10](#638603_1_En_10_Chapter.xhtml),
    “Styling with Themes.” `FutureBuilder` and `StreamBuilder` are in Chapter [9](#638603_1_En_9_Chapter.xhtml),
    “Making RESTful API Calls with HTTP.”


    ### How to Create Your Own Stateless Widgets


    So we know that we will be composing these built-in widgets to form our own custom
    widgets which will then be composed with other built-in widgets to eventually
    form an app.


    Widgets are masterfully designed because each widget is easy to understand and
    therefore easy to maintain. Widgets are abstract from the outside while being
    logical and predictable on the inside. They are a dream to work with.


    Every widget is a class that can have properties and methods. Every widget can
    have a constructor with zero or more parameters. And most importantly, every widget
    has a `build` method which receives a `BuildContext`^([⁸](#fn8)) and returns a
    single Flutter widget.


    **Tip**


    If you’re ever wondering how a widget got to look the way it does, locate its
    `build` method.


    ```

    class RootWidget extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Text(''Hello world'');

    }

    }

    ```


    In this hello world example which we repeated from earlier in the chapter, we’re
    displaying a `Text` widget (Figure [3-2](#638603_1_En_3_Chapter.xhtml#Fig2)).
    A single inner widget works but real-world apps will be a whole lot more complex.
    The root widget could be composed of many other subwidgets:


    ![](images/638603_1_En_3_Chapter/638603_1_En_3_Fig2_HTML.jpg)


    **Figure 3-2** The app created by this simple widget


    ```

    class FancyHelloWidget extends StatelessWidget {

    Widget build(BuildContext context) {

    return MaterialApp(

    home: Scaffold(

    appBar: AppBar(

    title: Text("A fancier app"),

    ),

    body: Container(

    alignment: Alignment.center,

    child: Text("Hello world"),

    ),

    floatingActionButton: FloatingActionButton(

    child: Icon(Icons.thumb_up),

    onPressed: () => {},

    ),

    ),

    );

    }

    }

    ```


    So as you can see, the `build` method is returning a single widget, a `MaterialApp`,
    but it contains a `Scaffold` which contains three subwidgets: an `AppBar`, a `Container`,
    and a `FloatingActionButton` (Figure [3-3](#638603_1_En_3_Chapter.xhtml#Fig3)).
    Each of those in turn contains sub-subwidgets of their own.


    ![](images/638603_1_En_3_Chapter/638603_1_En_3_Fig3_HTML.png)


    **Figure 3-3** The widget tree from our example app above


    This is how your `build` method will always work. It will return a single, massive,
    nested expression. It is widgets inside widgets inside widgets that enable you
    to create your own elaborate custom widget.


    ### Widgets Have Keys


    Let''s talk Flutter architecture for a minute. Flutter would be slow if it tried
    to re-render the entire screen every time a tiny change was made. Instead, Flutter
    applies state changes to an in-memory copy of the screen called the element tree.
    This is very fast because they''re not actually painted on the screen. The painting
    is reserved for the "render tree."


    Well, here''s the beauty of this structure – when the render tree is drawn, it
    reuses all the widgets that have *not* changed since the last render. Only those
    widgets that need a re-render get a re-render. But how does Flutter know? It uses
    keys.


    Every widget has a unique key. It gets one automatically but you may assign the
    key manually if you prefer. When a widget needs to redraw, it is recreated in
    memory and gets a new key. Flutter assumes that any widget whose type and key
    have not changed can be left alone.


    But occasionally, Flutter gets confused when matching the widgets in the element
    trees. You’ll know to manually assign keys if your widgets get drawn in the wrong
    location, the data isn’t updated on the screen, or your scroll position isn’t
    preserved.


    Typically you don’t need to worry about keys. They''re needed so rarely that we’re
    going to be satisfied if you understand that …


    1.  Keys exist and why Flutter may need them.

    2.  Keys may solve problems when your widgets aren’t being redrawn as you might
    expect.

    3.  You have the opportunity to assign keys to widgets.


    If that’s not enough to satisfy you for now, the great Emily Fortuna has recorded
    a super 10-minute video on keys.^([⁹](#fn9))


    ### Passing a Value into Your Widget


    Do you know what this formula means?


    *y = f(x)*


    Math majors will recognize this as reading “*y* is a function of *x*.” It concisely
    communicates that as *x* (the independent variable) changes, *y* (the dependent
    variable) will change in a predictable way. Flutter lives on this idea, but in
    Flutter, the formula reads like this:


    *Scene = f(Data)*


    In other words, as the data in your app changes, the screen will change accordingly.
    And you, the developer, get to decide how that data is presented as you write
    a `build` method in your widgets. It is a foundational concept of Flutter.


    Now how might that data change? There are two ways:


    1.  The widget can be re-rendered with new data passed from outside.

    2.  Data can be maintained *within* certain widgets.


    Let’s talk about the first. To pass data into a widget, you’ll send it in as constructor
    parameters:


    ```

    Widget build(BuildContext context) {

    return Person(firstName: "Sarah", lastName: "Ali");

    }

    ```


    Here’s how you’d write your widget to receive that value:


    ```

    class Person extends StatelessWidget {

    final String firstName;

    final String lastName;

    Person({this.firstName = "", this.lastName = ""}) {}

    @override

    Widget build(BuildContext context) {

    return Text(''$firstName $lastName'');

    }

    }

    ```


    We''re passing the first and last name in to the widget. There are other ways
    of writing a Dart constructor. Take a look at Appendix A, “Dart Language Overview,”
    or a Dart reference to see them.


    **Tip**


    Note that in the preceding example, we are using a `Person` class that might have
    been defined in the same dart file where you’re using it. But a better practice
    is to create each class in a separate dart file and import it into other dart
    files where it is used.


    `import ''Person.dart'';`


    ### State*less* and State*ful* Widgets


    So far we’ve been going out of our way to create stateless widgets. So you probably
    guessed that there’s also a stateful widget. You were right. A state*less* widget
    is one that doesn’t maintain its own state. A state*ful* widget does.


    “State” in this context refers to data within the widget that can change during
    its lifetime. Think about our `Person` widget from earlier. If it’s a widget that
    just displays the person’s information, it should be stateless. But if it is a
    person **maintenance** widget where we allow the user to change the data by typing
    into a `TextField`, then we’d need a `StatefulWidget`.


    There’s a whole chapter on stateful widgets later. If you just can’t wait to know
    more about them, you can read Chapter [7](#638603_1_En_7_Chapter.xhtml), “Managing
    State,” later in this book. Then come back here.'
