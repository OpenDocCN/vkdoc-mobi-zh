- fmt: "## The Flavors of API Requests\n\nCommunication with API servers is done in\
    \ one of just a few flavors (Table [9-1](#638603_1_En_9_Chapter.xhtml#Tab1)).\n\
    \n**Table 9-1** HTTP methods and descriptions\n\n| HTTP method | Intent | Notes\
    \ |\n| --- | --- | --- |\n| `GET` | Reading records | Like a database read, merely\
    \ asking for data from a server |\n| `DELETE` | Deleting records | Delete the\
    \ record pointed to by the supplied ID. No data is returned |\n| `POST` | Inserting\
    \ new records | Create a new record even if there’s already a record like this\
    \ one |\n| `PUT` | Replacing existing records | Clobber the existing record with\
    \ this one. Delete the old record completely and add this one in its place |\n\
    | `PATCH` | Updating existing records | Keep the old record in place but update\
    \ its fields with the data from this request |\n\nThere’s also `HEAD`, `CONNECT`,\
    \ `OPTIONS`, and `TRACE` for other types of requests. These are seldom used by\
    \ typical apps. Read about them at [`http://bit.ly/HTTPMethods`](http://bit.ly/HTTPMethods)\
    \ if you want.\n\nIt is rare for developers to use anything other than `GET`,\
    \ `POST`, `PUT`, `PATCH`, and `DELETE`. They’re all done in Flutter by using one\
    \ Dart library which you’ll get by importing `http.dart`.\n\nFirst, you’ll add\
    \ the `http` package to the dependencies section of your `pubspec.yaml`. When\
    \ you add and run `flutter pub get`, the package will be downloaded from [`https://pub.dev/packages/http`](https://pub.dev/packages/http).\n\
    \nThen you’ll import `http.dart` in any Dart file that needs to make these requests:\n\
    \n```dart\nimport 'package:http/http.dart';\n```\n\nThis will expose the `http`\
    \ class which has methods corresponding to each HTTP method. Now, let’s look at\
    \ sending requests using this library.\n\n## Making an HTTP GET or DELETE Request\n\
    \nWe’ll begin with `GET` and `DELETE` requests first because they are the simplest;\
    \ they never have a body.^([^(20)](#fn20)) In fact, the only complexity is that\
    \ HTTP requests are done asynchronously. They return a `Future`^([^(21)](#fn21))\
    \ which you either need to handle with a `.then()` or `await` it. So maybe make\
    \ your request like this:\n\n```dart\nUri uri = Uri.parse('https://us.com/people/1234');\n\
    Response response = await get(uri);\nprint(response.statusCode); // 200, we hope\n\
    Map person = json.decode(response.body);\nprint(person['name']);\nprint(person['phone']);\n\
    print(person['email']);\n```\n\nor with a `.then()` like this:\n\n```dart\nget(uri).then((Response\
    \ res) {\n  print(res.statusCode); // 200, we hope\n  Map person = jsonDecode(res.body);\n\
    \  print(person['name']);\n  print(person['phone']);\n  print(person['email']);\n\
    });\n```\n\n`DELETE` requests are done in the same way. In fact, they are often\
    \ simpler because they often have no response values. The `DELETE` either succeeds\
    \ and has no return value or fails with a 400- or 500-series response:\n\n```dart\n\
    Response response = await delete(uri);\n```\n\n**Caution**\n\nWhen making HTTP\
    \ requests of any type, you should always encode the URL before sending. This\
    \ will help to ensure that the URL is valid and can also help with security, especially\
    \ when taking input from the user. You can do this with `Uri.encodeComponent()`,\
    \ `Uri.encodeQueryComponent()`, and/or with `Uri.encodeFull()`. Call `Uri.encodeFull`\
    \ like this:\n\n```dart\nString url = Uri.encodeFull('http://us.com/api/ppl?query=Jo\
    \ Ki');\n```\n\nFor simplicity’s sake, we’re going to omit encoding in the examples.\
    \ But in the real world, remember to do this.\n\n## Making an HTTP PUT, POST,\
    \ or PATCH Request\n\n`PUT`, `POST`, and `PATCH` are very similar to `GET` and\
    \ `DELETE`. The biggest difference is that `PUT`, `POST`, and `PATCH` all require\
    \ a body for the request – usually a string with JSON-formatted keys and values:\n\
    \n```dart\nString payload = '''\n{\"first\": \"Kamala\", \"last\": \"Khan\", \"\
    id\": 374}\n''';\nResponse response = await post(uri, body: payload);\n```\n\n\
    This response is unwrapped just as with `GET` and `DELETE` requests.\n\n**Note**\n\
    \nWith `POST`, `PUT`, and `PATCH`, we’re sending data from the client to the server.\
    \ It is prudent and sometimes required to also tell the server how we’ve encoded\
    \ that data. We’ll do that in an HTTP header that we include in the request. Provide\
    \ a key called `Content-Type` with a value of `application/json`. And we’ll do\
    \ that like so:\n\n```dart\nMap<String, String> headers = {'Content-Type': 'application/json'};\n\
    Response res = await post(url, headers: headers, body: payload);\n```\n\nWhile\
    \ we’re on the subject, there are many header variables that you might find helpful\
    \ like `Accept`, `Accept-Encoding`, `Authorization`, `Content-MD5`, `Cookie`,\
    \ `Date`, `Host`, `If-Modified-Since`, and others. Read about them here: [`https://en.wikipedia.org/wiki/List_of_HTTP_header_fields#Request_fields`](https://en.wikipedia.org/wiki/List_of_HTTP_header_fields%2523Request_fields).\n\
    \nMaking HTTP requests from an API wasn’t so bad, now was it? Very quickly we’ve\
    \ made our Flutter apps capable of making requests, deserializing the response,\
    \ and printing that to the debug console. But Flutter is all about displaying\
    \ that data in cool-looking widgets. So how do we integrate the requests into\
    \ widgets?\n\n## HTTP Responses to Widgets\n\nThere’s a handful of ways to wait\
    \ on the `Future` to resolve and then display it. We’re going to simplify things\
    \ by showing you three:\n\n1.  The brute force way\n2.  `FutureBuilder`\n3.  `StreamBuilder`\n\
    \nBrute force is obvious and easy to understand, but I think you’ll like `FutureBuilder`/`StreamBuilder`\
    \ because they are cleaner and more elegant.\n\n### Brute Force – The Easy Way\n\
    \nYou already have all the tools you need to display the data: you understand\
    \ `Future`s and you know how to tell the stateful widget to redraw itself with\
    \ new data – `setState()`. So it can be as simple as putting a `setState()` inside\
    \ the `.then()` or after the `await`:\n\n```dart\nUri uri = Uri.parse('http://us.com/api/people/12345');\n\
    Response response = await get(uri);\nMap body = json.decode(response.body);\n\
    String first = body['name'];\nString email = body['email'];\nString imageUrl =\
    \ body['profilePictureUrl'];\nWidget card = Stack(\n  children: [\n    Image.network(imageUrl,\n\
    \        height: 300, width: 300, fit: BoxFit.cover),\n    Text(\"$name\"),\n\
    \  ],\n);\nsetState(() => _cardWidget = card);\n```\n\nAnd of course as long as\
    \ your build method is displaying `card` somewhere, it will be rendered with proper\
    \ data as soon as the `Future` is resolved which only happens once the HTTP `GET`\
    \ request returns data. Piece of cake! But it isn’t the most elegant thing."
  raw: '## The Flavors of API Requests


    Communication with API servers is done in one of just a few flavors (Table [9-1](#638603_1_En_9_Chapter.xhtml#Tab1)).


    Table 9-1


    HTTP methods and descriptions


    | HTTP method | Intent | Notes |

    | --- | --- | --- |

    | GET | Reading records | Like a database read, merely asking for data from a
    server |

    | DELETE | Deleting records | Delete the record pointed to by the supplied ID.
    No data is returned |

    | POST | Inserting new records | Create a new record even if there’s already a
    record like this one |

    | PUT | Replacing existing records | Clobber the existing record with this one.
    Delete the old record completely and add this one in its place |

    | PATCH | Updating existing records | Keep the old record in place but update
    its fields with the data from this request |


    There’s also HEAD, CONNECT, OPTIONS, and TRACE for other types of requests. These
    are seldom used by typical apps. Read about them at [`http://bit.ly/HTTPMethods`](http://bit.ly/HTTPMethods)
    if you want.


    It is rare for developers to use anything other than GET, POST, PUT, PATCH, and
    DELETE. They’re all done in Flutter by using one Dart library which you’ll get
    by importing http.dart.


    First, you’ll add the http package to the dependencies section of your pubspec.yaml.
    When you add and run “flutter pub get,” the package will be downloaded from [`https://pub.dev/packages/http`](https://pub.dev/packages/http).


    Then you’ll import http.dart in any Dart file that needs to make these requests:


    ```

    import ''package:http/http.dart'';

    ```


    This will expose the http class which has methods corresponding to each HTTP method.
    Now, let’s look at sending requests using this library.


    ## Making an HTTP GET or DELETE Request


    We’ll begin with GET and DELETE requests first because they are the simplest;
    they never have a body.^([^(20)](#fn20)) In fact, the only complexity is that
    HTTP requests are done asynchronously. They return a Future^([^(21)](#fn21)) which
    you either need to handle with a .then() or await it. So maybe make your request
    like this:


    ```

    Uri uri = Uri.parse(''https://us.com/people/1234'');

    Response response = await get(uri);

    print(response.statusCode); // 200, we hope

    Map person = json.decode(response.body);

    print(person[''name'']);

    print(person[''phone'']);

    print(person[''email'']);

    ```


    or with a .then() like this:


    ```

    get(uri).then((Response res) {

    print(res.statusCode); // 200, we hope

    Map person = jsonDecode(res.body);

    print(person[''name'']);

    print(person[''phone'']);

    print(person[''email'']);

    });

    ```


    Delete requests are done in the same way. In fact, they are often simpler because
    they often have no response values. The DELETE either succeeds and has no return
    value or fails with a 400- or 500-series response:


    ```

    Response response = await delete(uri);

    ```


    Caution


    When making HTTP requests of any type, you should always encode the URL before
    sending. This will help to ensure that the URL is valid and can also help with
    security, especially when taking input from the user. You can do this with Uri.encodeComponent(),
    Uri.encodeQueryComponent(), and/or with Uri.encodeFull(). Call Uri.encodeFull
    like this:


    `String url = Uri.encodeFull(''`[`http://us.com/api/ppl?query=Jo`](http://us.com/api/ppl%253Fquery%253DJo)
    `Ki'');`


    For simplicity’s sake, we’re going to omit encoding in the examples. But in the
    real world, remember to do this.


    ## Making an HTTP PUT, POST, or PATCH Request


    PUT, POST, and PATCH are very similar to GET and DELETE. The biggest difference
    is that PUT, POST, and PATCH all require a body for the request – usually a string
    with JSON-formatted keys and values:


    ```

    String payload = ''''''

    {"first": "Kamala", "last": "Khan", "id": 374}

    '''''';

    Response response = await post(uri, body: payload);

    ```


    This response is unwrapped just as with GET and DELETE requests.


    Note


    With POST, PUT, and PATCH, we’re sending data from the client to the server. It
    is prudent and sometimes required to also tell the server how we’ve encoded that
    data. We’ll do that in an HTTP header that we include in the request. Provide
    a key called “Content-Type” with a value of “application/json”. And we’ll do that
    like so:


    `Map<String, String> headers= {''Content-Type'':''application/json''};`


    `Response res = await post(url,` `headers:headers``, body:payload);`


    While we’re on the subject, there are many header variables that you might find
    helpful like Accept, Accept-Encoding, Authorization, Content-MD5, Cookie, Date,
    Host, If-Modified-Since, and others. Read about them here: [`https://en.wikipedia.org/wiki/List_of_HTTP_header_fields#Request_fields`](https://en.wikipedia.org/wiki/List_of_HTTP_header_fields%2523Request_fields).


    Making HTTP requests from an API wasn’t so bad, now was it? Very quickly we’ve
    made our Flutter apps capable of making requests, deserializing the response,
    and printing that to the debug console. But Flutter is all about displaying that
    data in cool-looking widgets. So how do we integrate the requests into widgets?


    ## HTTP Responses to Widgets


    There’s a handful of ways to wait on the Future to resolve and then display it.
    We’re going to simplify things by showing you three:


    1.  The brute force way


    2.  FutureBuilder


    3.  StreamBuilder


    Brute force is obvious and easy to understand, but I think you’ll like FutureBuilder/StreamBuilder
    because they are cleaner and more elegant.


    ### Brute Force – The Easy Way


    You already have all the tools you need to display the data: you understand Futures
    and you know how to tell the stateful widget to redraw itself with new data –
    setState(). So it can be as simple as putting a setState() inside the .then()
    or after the await:


    ```

    Uri uri = Uri.parse(''http://us.com/api/people/12345'');

    Response response = await get(uri);

    Map body = json.decode(response.body);

    String first = body[''name''];

    String email = body[''email''];

    String imageUrl = body[''profilePictureUrl''];

    Widget card = Stack(

    children: [

    Image.network(imageUrl,

    height: 300, width: 300, fit: BoxFit.cover),

    Text("$name"),

    ],

    );

    setState(() =>_cardWidget = card);

    ```


    And of course as long as your build method is displaying *card* somewhere, it
    will be rendered with proper data as soon as the Future is resolved which only
    happens once the HTTP GET request returns data. Piece of cake! But it isn’t the
    most elegant thing.'
