    \n脚注 1   2   3   4   5\n\n# 4. 数值型 Widget\n\n在上一章我们了解到，*万物皆 widget。* 你创建的所有东西都是\
    \ widget，Flutter 提供给我们的所有东西也都是 widget。当然，也存在例外，但这样思考并无坏处，尤其是在你刚入门 Flutter 的时候。在本章中，我们将深入探讨\
    \ Flutter 提供的最基础的一组 widget——那些承载数值的 widget。我们将介绍 `Text` widget、`Icon` widget 和\
    \ `Image` widget，它们所显示的内容正如其名。我们还会简单了解 `SnackBar` widget。然后，我们将深入讲解输入型 widget——那些设计用来获取用户输入的\
    \ widget。\n\n## Text Widget\n\n如果你想在屏幕上显示一个字符串，`Text` widget 就是你需要的工具。它接收一个字符串作为输入（即你想要显示的文本），并将其显示在屏幕上。默认情况下，所有文本都在一行内显示，但如果容器宽度不够，它会自动换行到多行。\n\
    \n```\nWidget build(BuildContext context) {\n  String str = 'Hello world';\n \
    \ return Text(str);\n}\n```\n\n> **提示**  \n> 如果你的 `Text` 内容是字面量，在其前面加上 `const`\
    \ 关键字，该 widget 将在编译时而非运行时创建。你的 `apk/ipa` 文件会略微增大，但它们能在设备上运行得更快。这点付出是值得的。\n\n你可以通过\
    \ `style` 属性控制 `Text` 的大小、字体、粗细、颜色等。但我们将在第 10 章“使用主题进行样式设计”中介绍这部分内容。\n\n`Text()`\
    \ 能满足大部分单一风格文本的需求。但如果文本的不同部分需要不同的样式呢？这时就需要用到 `RichText`。它允许你在同一个文本 widget 内，使用\
    \ `TextSpan` 对象混合搭配不同的样式。\n\n## Icon Widget\n\nFlutter 内置了大量图标（图 4-1），从相机、人物、卡片、交通工具、箭头、电池到\
