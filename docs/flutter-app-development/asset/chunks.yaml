    \  ],\n);\nsetState(() => _cardWidget = card);\n```\n\n当然，只要你的构建方法在某处显示了 `card`，一旦\
    \ `Future` 解析完毕（这只有在 HTTP `GET` 请求返回数据时才会发生），它就会用正确的数据进行渲染。小菜一碟！但这并非最优雅的方式。\n"
- fmt: '###  `FutureBuilder` – The Clean Way


    A better solution may be the `FutureBuilder` widget. If you’re ever in a spot
    where you have a `Future` that, when fulfilled, has data that must be rendered
    in a Flutter widget, look to `FutureBuilder`. Does this scenario sound familiar?
    It should because it is the major reason we have `Future`s in Flutter. The simple
    code example from earlier can be done much more cleanly with a `FutureBuilder`:


    ```

    FutureBuilder(

    future: get(uri),

    builder: (ctx, AsyncSnapshot snapshot) {

    if (snapshot.connectionState != ConnectionState.done) {

    return const CircularProgressIndicator();

    }

    if (snapshot.hasError) {

    return Text(''Oh no! Error! ${snapshot.error}'');

    }

    if (!snapshot.hasData) {

    return const Text(''Nothing to show'');

    }

    final Map body =

    json.decode(snapshot.data.body);

    final int statusCode = snapshot.data.statusCode;

    if (statusCode > 299) {

    return Text(''Server error: $statusCode'');

    }

    String first = body[''name''];

    String imageUrl = body[''profilePictureUrl''];

    return Stack(

    children: [

    Image.network(imageUrl,

    height: 300, width: 300, fit: BoxFit.cover),

    Text("$name"),

    ],

    );

    },

    );

    ```


    There’s no need for a `setState()` since the `FutureBuilder` has access to the
    `Future` itself so it knows when and how to redraw itself. In the preceding example,
    you can see how it is capable of rendering something different for each situation:
    a `ProgressIndicator` while we’re waiting on the resolution of the `Future`, an
    error if something is wrong, a notification if the `Future` has nothing in it,
    and of course the widget when the data arrives successfully!


    **Caution**


    Always check `snapshot.hasData` and/or `snapshot.hasError` before accessing `snapshot.data`.
    Also be careful about the HTTP status code which can be found in `response.statusCode`.
    If that number is in the 400s or 500s, you’ve gotten a valid response from the
    server, but it is a problem and your data will be `null`.


    ###  `StreamBuilder`


    What `FutureBuilder` does with futures, `StreamBuilder` does with streams. These
    two classes are nearly identical, having the same format, using the same shape
    of snapshots, and checking `snapshot.hasError` and `snapshot.hasData`. But sometimes
    we’re not dealing with a single return of data as with a future, we’re dealing
    with a *stream* of data that may hit us in spurts or waves. When this is the situation,
    you’ll want to use a `StreamBuilder` instead:


    ```

    StreamBuilder(

    stream: anythingThatReturnsAStream(),

    builder: (BuildContext ctx, AsyncSnapshot snapshot){

    // Everything below this is pretty much the

    // same as FutureBuilder but the data is a

    // collection of documents, each being a record

    if (snapshot.connectionState != ConnectionState.done) {

    return const CircularProgressIndicator();

    }

    if (snapshot.hasError) {

    return Text(''Oh no! Error! ${snapshot.error}'');

    }

    if (!snapshot.hasData) {

    return const Text(''Nothing yet. Please wait ...'');

    }

    return ListView.builder(

    itemCount: snapshot.data.documents.length,

    itemBuilder: (BuildContext context, int i) {

    String first = snapshot.data.documents[i][''name''];

    String imageUrl =

    snapshot.data.documents[i][''imageUrl''];

    return Stack(

    children: [

    Image.network(imageUrl,

    height: 300, width: 300, fit: BoxFit.cover),

    Text("$name"),

    ],

    ),

    },

    );

    );

    },

    );

    ```


    **Tip**


    Writing code like this, code that wakes up and updates itself based on newly arriving
    data has a term: *reactive programming*. Reactive programming happens when we
    make our app aware of its external influences and tell it to react somehow. You
    may have heard of reactive extensions like `rxJava`, `rxJS`, and `rx.NET` which
    are libraries with classes and functions made for this style. Well, there is one
    for Flutter unsurprisingly called `rxDart`. You can find it at [`https://github.com/ReactiveX/rxdart`](https://github.com/ReactiveX/rxdart).


    ## Strongly Typed Classes


    At this point, you now know how to make HTTP calls against an API, and when you
    get a response, you know how to unwrap that data and use it. This puts us in a
    great position to convert that data into a strongly typed class using the typed
    deserialization pattern.


    **Note**


    This is not required in order to make HTTP calls. It is merely a cleaner way of
    processing the call and pulling it into a structure that is predictable. HTTP
    data is by nature unstructured. This is a best practice used by many Flutter developers
    but is by no means required. So if you don’t like it, feel free to skip it.


    Typed deserialization happens in three simple steps:


    1.  Create the business class.


    2.  Write a `.fromJSON()` method and/or a `.fromJSONArray()` method.


    3.  When reading from HTTP calls, use `.fromJSON()` to hydrate the object.


    ### Create a Business Class


    Let’s say we’re reading and writing data for people. We should create a `Person`
    class:


    ```

    class Person {

    String? name;

    String? email;

    String? imageUrl;

    }

    ```


    ### Write a `.fromJSON()` Method


    This should be a static method that will return an instance of the business class,
    `Person` in this case:


    ```

    class Person {

    // More class code here

    static Person fromJson(String jsonString) {

    Map data = jsonDecode(jsonString);

    return Person()

    ..name = data[''name'']

    ..email = data[''email'']

    ..imageUrl = data[''imageUrl''];

    }

    // and more class code here maybe

    }

    ```


    Note the use of Dart’s cascade operators and omission of the *new* operator. Both
    are best practices also.


    ### Use `.fromJSON()` to Hydrate the Object


    The word *hydrate* literally means “add water.” In this context, the data is the
    water, and we’re creating a new `Person` object by adding the data to it. You
    read data from an HTTP service using the `.get()` method and you pass it into
    `.fromJSON()` like this:


    ```

    // Make the HTTP call

    final Response res = await get(url);

    // Hydrate a Person from the response body - a JSON string

    Person p = Person.fromJson(res.body);

    ```


    See how clean and straightforward the code is?


    I imagine that at this point, you’d like to exercise all of this newfound knowledge.
    Let’s do that with a free API service next.


    ## One Big Example


    A real API service will involve a database with exposed GET, POST, DELETE, PUT,
    and/or PATCH endpoints which all require some hefty setup on the server. You’re
    going to want to get there eventually, but unless you’re a full-stack developer,
    that’s for the backend people. For now, let’s make use of `JSONPlaceholder`, a
    free service for testing APIs. Read about it at [`https://jsonplaceholder.typicode.com/guide`](https://jsonplaceholder.typicode.com/guide).


    **Note**


    `JSONPlaceholder` accepts all types of RESTful requests, but for obvious reasons,
    they can’t have the world `PUT`ting, `POST`ing, and `DELETE`ing data unauthenticated.
    So they don''t actually change any server data. The code we write would change
    server data if they honored it, but since they don’t, please don’t expect to see
    your changes persisted.


    If you want to test the server, point your favorite browser at [`https://jsonplaceholder.typicode.com/users`](https://jsonplaceholder.typicode.com/users),
    and you’ll see the first ten people. Congratulations, you’ve just made a GET request.
    Do another one at [`https://jsonplaceholder.typicode.com/users/1`](https://jsonplaceholder.typicode.com/users/1),
    and you’ll see the person with a user ID of 1. In fact, try a few different IDs
    to see different users.


    The other three HTTP methods are less simple. You’ll want to use a tool like `cURL`,
    `Postman`, or `SoapUI` that can make `POST`, `PUT`, or `DELETE` requests.


    | Method | URL | What happens |

    | --- | --- | --- |

    | `DELETE` | [`https://jsonplaceholder.typicode.com/users/1`](https://jsonplaceholder.typicode.com/users/1)
    | Delete person #1 |

    | `PUT` | [`https://jsonplaceholder.typicode.com/users/1`](https://jsonplaceholder.typicode.com/users/1)
    | Update person #1 |

    | `POST` | [`https://jsonplaceholder.typicode.com/users`](https://jsonplaceholder.typicode.com/users)
    | Create a new person |


    And how will we apply these in our app? Read on!'
