- fmt: '### Overview of the App


    On startup, the app will send a `GET` request to read a list of users and draw
    a screen to display them (Figure [9-1](#638603_1_En_9_Chapter.xhtml#Fig1)).


    ![](images/638603_1_En_9_Chapter/638603_1_En_9_Fig1_HTML.jpg)


    Figure 9-1: A list of people cards


    When the user taps the trash can icon, the app will send a `DELETE` request to
    delete that person.


    When they tap any user card, we’ll show them a form with the user’s current information
    (Figure [9-2](#638603_1_En_9_Chapter.xhtml#Fig2)) that they can then change and
    save. Hitting the save FAB will send a `PUT` request to the server.


    ![](images/638603_1_En_9_Chapter/638603_1_En_9_Fig2_HTML.jpg)


    Figure 9-2: The “upsert” form to add or update a person


    Similarly, when they tap the “+” FAB on the people list, we’ll show them this
    same form but with blank fields so they can create a new user.


    ### Create the Flutter App


    This project will be kind of fun because for the first time we’re combining topics
    from throughout the book. First, create the flutter app with `flutter create people_maintenance`.
    Next, make sure the `http` package is installed.


    ```

    flutter pub add http

    ```


    Open `main.dart` and find your `MaterialApp` widget. Remove the “home” property
    and add two named routes to it:


    ```

    routes: {

    ''/'': (_) => const ListPeople(),

    ''/upsert'': (_) => const UpsertPerson(),

    },

    ```


    Then make two new `StatefulWidget`s, one called `list_people.dart` and the other
    called `upsert_person.dart`. We’ll fill in their details in a minute. But first,
    it may be a good idea to create a business class to represent a `Person` object.


    ### Making a Strongly Typed Business Class


    Since we’re working with `Person`s, it might be a good idea to create a `Person`
    class to hold each person. This very optional best practice may help us to avoid
    bugs serializing and deserializing the server data and give us a centralized place
    to manage all of our `Person`-related logic:


    ```

    import ''dart:convert'' show jsonDecode;

    class Person {

    Person({this.id, this.name, this.email, this.phone});

    int? id;

    String? name;

    String? email;

    String? phone;

    // The typed deserialization pattern for a single person

    static Person fromJson(String jsonString) {

    Map json = jsonDecode(jsonString);

    return Person(

    id: json[''id''],

    email: json[''email''],

    name: json[''name''],

    phone: json[''phone'']);

    }

    Map toJson() =>

    {''id'': id, ''email'': email, ''name'': name, ''phone'': phone};

    // The typed deserialization pattern for a List uses .map()

    static List fromJsonArray(String jsonString) {

    List json = jsonDecode(jsonString);

    return json

    .map((p) => Person(

    id: p[''id''],   email: p[''email''],

    name: p[''name''], phone: p[''phone'']))

    .toList();

    }

    }

    ```


    ### list_people.dart


    We’ll soon read a list of people from the RESTful service and will want to display
    their data. The `PeopleList` widget is responsible for showing that list of people:


    ```

    import ''package:flutter/material.dart'';

    import ''./people.dart'';

    import ''./person_widget.dart'';

    import ''./person.dart'';

    class ListPeople extends StatefulWidget {

    const ListPeople({super.key});

    @override

    State createState() => _ListPeopleState();

    }

    class _ListPeopleState extends State {

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: AppBar(title: const Text(''People'')),

    body: scaffoldBody,

    floatingActionButton: FloatingActionButton(

    child: const Icon(Icons.add),

    onPressed: () {

    Navigator.pushNamed(context, ''/upsert'');

    },

    ),

    );

    }

    // Note how we pull out details to make the widget more

    // abstract for you. We do the same with PersonWidget below.

    Widget get scaffoldBody {

    return FutureBuilder(

    future: fetchPeople(), // How we''ll get the people

    builder: (ctx, snapshot) {

    if (snapshot.hasError) {

    return Text(''Oh no! Error! ${snapshot.error}'');

    }

    if (!snapshot.hasData) {

    return const Text(''No people found'');

    }

    // Convert the JSON data to an array of Persons

    List people =

    Person.fromJsonArray(snapshot.data.body);

    // Convert the list of persons to a list of widgets

    List personTiles = people

    .map((Person person) => PersonWidget(

    person: person,

    editPerson: () => setState(() {

    Navigator.of(context)

    .pushNamed(''/upsert'', arguments: person);

    })))

    .toList();

    // Display all the person tiles in a scrollable ListView

    return ListView(

    children: personTiles,

    );

    },

    );

    }

    }

    ```


    `PersonWidget` is the widget that draws each `Person` on the screen (Figure [9-3](#638603_1_En_9_Chapter.xhtml#Fig3)).
    We’re sparing you the details as of right now since that’s not the focus of this
    chapter. But you can look in the GitHub repository for the details.


    ![](images/638603_1_En_9_Chapter/638603_1_En_9_Fig3_HTML.jpg)


    Figure 9-3: Each `PersonWidget` displays one person


    ### A GET Request in Flutter


    Look back at `getScaffoldBody()` method. It has a `FutureBuilder`. The `future`
    property points to a method called `fetchPeople()` which simply makes a `GET`
    request to the URL that will respond with a JSON array of `Person` records:


    ```

    const String _baseUrl =

    ''https://jsonplaceholder.typicode.com'';

    Future fetchPeople() {

    Uri uri = Uri.parse(''$_baseUrl/users'');

    return get(uri);

    }

    ```


    The `GET` request is pretty simple once you get the Flutter infrastructure created,
    huh?


    ### A DELETE Request in Flutter


    Each `PersonWidget` has a trashcan `IconButton` on the right. A tap on it calls
    `deletePerson()`, receiving the person we want to get rid of. This `deletePerson()`
    method should send an HTTP `DELETE` request, pointing to that person by ID:


    ```

    Future deletePerson(person) {

    Uri uri = Uri.parse(''$_baseUrl/users/${person.id}'');

    return delete(uri);

    }

    ```


    ### upsert_person.dart


    We’ve taken care of reading people and deleting a person. But adding a new person
    will require a form for the user to enter information. Sharp readers will notice
    that an identical form is needed for updating existing persons. To adhere to the
    DRY principle,^([^(22)](#fn22)) let’s create one form and reuse it for both adding
    and updating.


    ```

    class _UpsertPersonState extends State {

    late Person person;

    @override

    Widget build(BuildContext context){

    // Get the ''current'' person set during navigation. If

    // this person is null, we''re adding a new person and

    // we must instantiate one. If this person is not null,

    // then we''re updating that person.

    Person? routePerson =

    ModalRoute.of(context)?.settings.arguments as Person?;

    person = (routePerson == null) ? Person() : routePerson;

    return Scaffold(

    appBar: AppBar(

    title: Text(

    (person.id == null) ? ''Add a person'' : ''Update a person'',

    ),

    ),

    body: _body,

    floatingActionButton: FloatingActionButton(

    onPressed: () {

    // Save the person

    upsertPerson(person);

    // And go back to where we came from

    Navigator.pop(context);

    },

    child: const Icon(Icons.save),

    ),

    );

    }

    Widget get _body {

    // Look in github for the Form code.

    }

    }

    ```


    Notice that in the FAB’s `onPressed` handler, we’re saving the form data and calling
    `upsertPerson()`. Here’s what that looks like:


    ### A POST and PUT Request in Flutter


    If it is an Add operation, we want to make a `POST` call. If it is an Update operation,
    we want to make a `PUT` call:


    ```

    Future upsertPerson(Person person) {

    final String payload = ''''''

    {

    "id": ${person.id},

    "name":"${person.name}",

    "phone":"${person.phone}",

    "email":"${person.email}"

    }

    '''''';

    final headers = {''Content-type'': ''application/json''};

    // If id is null, we''re adding. If not, we''re updating.

    if (person.id == null) {

    Uri uri = Uri.parse(''$_baseUrl/people'');

    return post(uri, headers: headers, body: payload);

    } else {

    Uri uri = Uri.parse(''$_baseUrl/people/${person.id}'');

    return put(uri, headers: headers, body: payload);

    }

    }

    ```'
