    Flexible widgets squeezing their children


    **Another option for squeezing**


    Remember, Flutter has hundreds of widgets with much overlap in their purpose and
    functionality. If you want to squeeze the children and Flexible isn’t doing it
    for you, look at FittedBox.


    A child in a FittedBox will be shrunk and/or clipped according to the BoxFit you
    tell it. Remember BoxFit from Chapter [4](#638603_1_En_4_Chapter.xhtml), “Value
    Widgets”? All those values apply it to a FittedBox.


    *   fitWidth – Make the width fit exactly. Clip the height or add padding to top/bottom
    if needed.


    *   fitHeight – Make the height fit exactly. Clip the width or add padding to
    left/right if needed.


    *   cover – Fit the smallest dimension (width/height) that will fit. Clip the
    other.


    *   contain – Fit the biggest dimension (width/height) that will fit. Add padding
    to the other.


    *   etc., etc. Refer to Chapter [4](#638603_1_En_4_Chapter.xhtml), “Value Widgets,”
    for more details.


    Not the best option in this case but great when you know exactly how many things
    you want to squeeze and precisely how many pixels one or more can have.


    ## 3\. Allow the User to Scroll


    Our final option to fix an overflow is to allow the user to scroll. Frankly, this
    is the most often-chosen option, making perfect sense in most situations. It is
    the easiest option to understand and perhaps the easiest to implement. I saved
    the best for last!


    As is typical of Flutter, there are many options for scrolling. We’ll look at
    three, SingleChildScrollView, ListView, and GridView.


    ### SingleChildScrollView Widget


    A SingleChildScrollView is well named. It wraps a *single child* and allows you
    to *scroll*. Instead of clipping that child, Flutter will let the user swipe to
    scroll either horizontally or vertically (the default). Here’s our code with a
    SingleChildScrollView:


    ```

    Widget build(BuildContext context) {

    var wordWidgets = words.map((w) => Word(w)).toList();

    return SingleChildScrollView(

    scrollDirection: Axis.horizontal,

    child: Row(

    children: wordWidgets,

    ),

    );

    }

    ```


    And Figure [13-6](#638603_1_En_13_Chapter.xhtml#Fig6) shows us how it looks. Hey,
    no overflow bars! Comparing to prior screenshots, you can see that the position
    of the text has moved.


    ![](images/638603_1_En_13_Chapter/638603_1_En_13_Fig6_HTML.jpg)


    Figure 13-6


    Wrapped with a SingleChildScrollView allows scrolling


    Tip


    A SingleChildScrollView allows scrolling horizontally *or* vertically but not
    both. An InteractiveViewer widget allows both. If you need to show something too
    big in both dimensions, look into an InteractiveViewer which allows panning/scrolling
    in both directions and allows us to zoom in and zoom out by pinching. This is
    great for hi-res pictures or large maps.


    ### The ListView Widget


    A ListView does not have a child property, it has a *children* property. So if
    we converted our Row to a ListView and set its scrollDirection property to horizontal,
    it looks and behaves just like the SingleChildScrollView.


    ```

    Widget build(BuildContext context) {

    var wordWidgets = words.map((w) => Word(w)).toList();

    return ListView(

    scrollDirection: Axis.horizontal,

    children: wordWidgets,

    );

    }

    ```


    But ListView has superpowers that SingleChildScrollView does not. ListView is
    much more memory efficient, and it is much more flexible.


    #### ListView Is Memory Efficient


    A SingleChildScrollView builds its child and all of its descendents in memory,
    no matter how big or how many, before it displays them. ListView is different.
    A ListView keeps track of which children are currently being displayed and which
    are just off-screen. It only builds those. Therefore, while the user is preoccupied
    reading or scrolling what is on screen, Flutter is busily building more widgets
    that may appear soon. If the user is scrolling down, Flutter will be building
    widgets below the current viewport. If the user is scrolling back up, Flutter
    builds the widgets above. Get it?


    It also pages out of memory those widgets that have scrolled off, so no matter
    how big your list gets, only a few are ever in memory at a time.


    You smart readers have already seen a couple of flaws in this. First, it is possible
    to scroll faster than Flutter can create widgets. That’s no big deal; it’ll just
    show empty spots for a moment and then displays widgets as soon as they’re created.
    Second, if the user scrolls up and down and up and down and keeps doing that,
    Flutter will have wasted some time disposing of and recreating the same widgets.
    Sure, these are issues, but they’re minor, well worth the cost when you look at
    the efficiency you’re gaining.


    Tip


    ListView is the best option when you have a massive – even infinite! – list of
    items to display. Only those near the viewport are in memory.


    #### ListView Is Very Flexible


    ListView has four different ways to use it:


    1.  New ListView – Normal use. It has a children property that takes a collection
    of static widgets.


    2.  ListView.builder – For dynamically creating children from a list of items.


    3.  ListView.separated – Like builder but also puts a widget *between* each item.
    Great for inserting ads in the list periodically. Read more at [`http://bit.ly/flutter_listview_separated`](http://bit.ly/flutter_listview_separated).


    4.  ListView.custom – For rolling your own advanced ListViews. Read more at [`http://bit.ly/flutter_listview_custom`](http://bit.ly/flutter_listview_custom).


    Let’s take a look at the first two options starting with the regular ListView.'
  trans: "\n# 让子控件自动换行\n\n顾名思义，`Wrap` 控件的作用就是“包裹”。它的子控件可以自动换行，显示成所需的任意行数，直到所有内容都能在屏幕上完整显示。\n\
    \n```dart\nWidget build(BuildContext context) {\n  var wordWidgets = words.map((w)\
    \ => Word(w)).toList();\n  return Wrap(\n    children: wordWidgets,\n  );\n}\n\
    ```\n\n我们只做了一处改动，就是把 `Row` 换成了 `Wrap`。仅此而已。它现在的效果如图 13-4 所示。\n\n![](img/638603_1_En_13_Fig4_HTML.jpg)\n\
    \n**图 13-4** 子控件自动换行\n\n对于我们当前这种单词列表的场景，这是理想的解决方案。但大多数情况下，我们会处理其他类型的控件。接下来我们看看第二种解决方案。\n\
    \n# 挤压子控件直至适配\n\n如果你的控件是可压缩的，一个合乎逻辑的选择就是水平挤压`Row`的子控件，或垂直挤压`Column`的子控件，直到它们适配。听起来不舒服？确实有点。这种方式通常不会带来可预测且美观的呈现效果。但偶尔，这也正是我们需要的。\n\
    \n让内容变小的一种方法是将它们放入 `Flexible()` 控件中。`Flexible()` 会对它的子控件说：“我会把你缩小，直到你适配，或者直到你被压缩到极限。如果你无法被压缩到足够的程度，那我就干脆放弃。”这意味着\
    \ `Flexible` 并不是一个万无一失的解决方案。\n\n> **提示**  \n> `Flexible` 只有在 `Row()` 或 `Column()`\
    \ 内部直接使用时才有意义。\n\n`Flexible` 包裹着 `Row` 或 `Column` 中的每一个子控件：\n\n```dart\nWidget\
    \ build(BuildContext context) {\n  var wordWidgets = words.map((w) => Word(w)).toList();\n\
    \  return Row(\n    children: wordWidgets\n        .map((w) => Flexible(child:\
    \ w))\n        .toList(),\n  );\n}\n```\n\n> **注意**  \n> `Iterable.map()` 只是将一个\
    \ X 数组转换成一个 Y 数组。在上面的代码中，我们所做的就是将*每一个* `Word()` 控件都嵌套在一个 `Flexible()` 控件中。请不要为此分心。本章你应重点关注的是\
    \ `Flexible` 及其对场景的影响——它让每个子控件协同工作以适配空间。（不过，你不得不承认，`.map()` 是一种简洁的转换方法。）\n\n每个\
    \ `Flexible` 会与 `Row` 中所有其他的 `Flexible` 进行“沟通”，沿着水平轴挤压它的子控件，从而产生了图 13-5 中不太美观的结果。\n\
    \n![](img/638603_1_En_13_Fig5_HTML.jpg)\n\n**图 13-5** `Flexible` 控件挤压其子控件\n\n\
    ## 挤压的另一种选择\n\n请记住，Flutter 有数百个控件，它们在用途和功能上有很多重叠。如果你想挤压子控件，而 `Flexible` 不能满足需求，可以考虑\
    \ `FittedBox`。\n\n位于 `FittedBox` 中的子控件会根据你指定的 `BoxFit` 进行缩放和/或裁剪。还记得第 4 章“值控件”中的\
    \ `BoxFit` 吗？所有这些值都适用于 `FittedBox`。\n\n- `fitWidth` – 使宽度完全适配。如果需要，则裁剪高度或在顶部/底部添加内边距。\n\
    - `fitHeight` – 使高度完全适配。如果需要，则裁剪宽度或在左侧/右侧添加内边距。\n- `cover` – 适配最小的尺寸（宽/高），裁剪另一侧。\n\
    - `contain` – 适配最大的尺寸（宽/高），为另一侧添加内边距。\n- 等等。更多细节请参考第 4 章“值控件”。\n\n在这种情况下，这不是最佳选择，但当您确切知道要压缩多少内容以及一个或多个控件可以占用多少像素时，它非常适用。\n\
    \n# 允许用户滚动\n\n解决溢出问题的最后一个选项是允许用户滚动。坦白说，这是最常选择的方案，在大多数情况下都非常合理。它也是最容易理解的选项，也许也是实现起来最简单的。我把最好的留到了最后！\n\
    \n和 Flutter 的典型风格一样，有很多滚动选项可供选择。我们将介绍三种：`SingleChildScrollView`、`ListView` 和 `GridView`。\n\
    \n## SingleChildScrollView 控件\n\n`SingleChildScrollView` 这个名字很形象。它包裹一个*单一子控件*并允许*滚动*。Flutter\
    \ 不会裁剪该子控件，而是让用户通过滑动来水平或垂直（默认）滚动。这是使用 `SingleChildScrollView` 的代码：\n\n```dart\n\
    Widget build(BuildContext context) {\n  var wordWidgets = words.map((w) => Word(w)).toList();\n\
    \  return SingleChildScrollView(\n    scrollDirection: Axis.horizontal,\n    child:\
    \ Row(\n      children: wordWidgets,\n    ),\n  );\n}\n```\n\n图 13-6 展示了它的样子。嘿，没有溢出条了！与之前的截图相比，可以看到文本的位置发生了变化。\n\
    \n![](img/638603_1_En_13_Fig6_HTML.jpg)\n\n**图 13-6** 使用 `SingleChildScrollView`\
    \ 包裹后允许滚动\n\n> **提示**  \n> `SingleChildScrollView` 允许水平*或*垂直滚动，但不能同时进行。`InteractiveViewer`\
    \ 控件则允许两者同时进行。如果你需要显示某个在水平和垂直方向上都过大的内容，可以了解一下 `InteractiveViewer`，它允许在两个方向上平移/滚动，并支持通过捏合进行放大和缩小。这对于高分辨率图片或大型地图非常有用。\n\
    \n## ListView 控件\n\n`ListView` 没有 `child` 属性，它有 `children` 属性。因此，如果我们将 `Row` 转换为\
    \ `ListView` 并将其 `scrollDirection` 属性设置为水平，它的外观和行为就与 `SingleChildScrollView` 非常相似。\n\
    \n```dart\nWidget build(BuildContext context) {\n  var wordWidgets = words.map((w)\
    \ => Word(w)).toList();\n  return ListView(\n    scrollDirection: Axis.horizontal,\n\
    \    children: wordWidgets,\n  );\n}\n```\n\n但 `ListView` 拥有 `SingleChildScrollView`\
    \ 所不具备的超能力。`ListView` 在内存上更高效，也更灵活。\n\n### ListView 内存效率更高\n\n`SingleChildScrollView`\
    \ 在显示其子控件及其所有后代控件之前，会将它们全部构建到内存中，无论其大小或数量如何。`ListView` 则不同。`ListView` 会跟踪哪些子控件当前正在显示，哪些即将离开屏幕。它只构建这些控件。因此，当用户专注于阅读或滚动屏幕上的内容时，Flutter\
    \ 正在忙于构建更多可能很快就会出现的控件。如果用户向下滚动，Flutter 会构建当前视口下方的控件。如果用户向上滚动，Flutter 则构建上方的控件。明白了吗？\n\
    \n它还会将滚动离屏的控件从内存中移出，因此无论你的列表有多大，任何时候都只有少数几个控件在内存中。\n\n聪明的读者可能已经发现了其中的几个缺陷。首先，用户滚动速度可能超过\
    \ Flutter 创建控件的速度。这没什么大不了的；它只是会短暂地显示空白区域，一旦控件创建完成就会立即显示。其次，如果用户反复上下滚动，Flutter\
    \ 将会浪费一些时间来销毁和重新创建相同的控件。诚然，这些都是问题，但它们很次要，当你考虑所获得的效率提升时，这点代价是完全值得的。\n\n> **提示**\
    \  \n> 当你有大量（甚至是无限！）的项目需要显示时，`ListView` 是最佳选择。只有靠近视口的那些项目才会在内存中。\n\n### ListView\
    \ 非常灵活\n\n`ListView` 有四种不同的使用方式：\n\n1. **常规 `ListView`** – 常规用法。它有一个 `children`\
    \ 属性，用于接收静态控件的集合。\n2. **`ListView.builder`** – 用于根据项目列表动态创建子控件。\n3. **`ListView.separated`**\
    \ – 类似于 builder，但在每个项目*之间*放置一个控件。非常适合在列表中定期插入广告。更多信息请阅读 [`http://bit.ly/flutter_listview_separated`](http://bit.ly/flutter_listview_separated)。\n\
    4. **`ListView.custom`** – 用于创建自定义的高级 `ListView`。更多信息请阅读 [`http://bit.ly/flutter_listview_custom`](http://bit.ly/flutter_listview_custom)。\n\
    \n让我们先看看前两个选项，从常规的 `ListView` 开始。\n"
- fmt: '### Regular ListView


    This version of `ListView` is great for a number of predefined, diverse widgets
    to display. All you do is set the `children` property to a list that you’ve defined
    already. Our code example above showed this.


    But where `ListView` really gets fun is when you tell it to build a new widget
    from a list of things – people, products, stores – anything you’d retrieve from
    a database or RESTful service. For displaying an dynamic number of scrollable
    items, we’ll want the `ListView.builder` constructor.


    ### `ListView.builder`: When You’re Building Widgets from a List of Objects


    `ListView`’s alternative constructor, `ListView.builder`, receives two parameters,
    an `itemCount` integer and an `itemBuilder` function. The `itemBuilder` function
    dynamically creates children widgets on demand. As the user scrolls, `itemBuilder`
    function runs, creating new items.


    The `itemCount` property is an integer that tells us how many things we’re going
    to draw so we usually set it to the length of the array/collection of things we’re
    scrolling through. The `itemBuilder` function receives two parameters: the context
    and an integer which is 0 for the first item and increments each time it is run.


    ```

    Widget build(BuildContext context) {

    return ListView.builder(

    scrollDirection: Axis.horizontal,

    itemCount: words.length,

    itemBuilder: (context, i) => Word("$i - ${words[i]}"),

    );

    }

    ```


    In this example, we’re now adding an index to each printed word. Note how I’ve
    again scrolled to the right (Figure [13-7](#638603_1_En_13_Chapter.xhtml#Fig7)).


    ![Figure 13-7](images/638603_1_En_13_Chapter/638603_1_En_13_Fig7_HTML.jpg)


    `ListView.builder` dynamically builds each child widget


    Creating lists of widgets that scroll in rows or columns is great. But what if
    you had square widgets that needed to be scrolled?


    ### GridView Widget


    Let’s adjust our example. Instead of being provided some lorem ipsum words, let’s
    say you’re given a list of people and we want to create a small, roughly square-shaped
    `PersonCard` widget for each with a photo and name. You probably want these to
    appear in rows and columns instead of a list. `GridView` has the same magic that
    a `ListView` has but draws things in a wrapping grid.


    You’ll set `GridView`’s `children` property to the list of widgets you want to
    display just like you did with `Row`, `Column`, `Wrap`, and `ListView`. `GridView`
    will display them in a grid, populating across and then wrapping to the next row,
    resizing its space available until it just fits. And here’s the greatest part,
    it automatically scrolls!


    `GridView` has two constructors, `GridView.extent()` and `GridView.count()`.


    #### `GridView.extent()`


    The word *extent* refers to the maximum width of the child. `GridView` will only
    let its kids grow to that size. If they try to get bigger, it puts another element
    on that row and shrinks all children equally until they just fit across the entire
    width. Take a look at this example:


    ```

    Widget build(BuildContext context) {

    return GridView.extent(

    maxCrossAxisExtent: 300.0,

    children: _peopleList

    .map((Person person) => PersonCard(person))

    .toList(),

    );

    }

    ```


    Notice in Figures [13-8](#638603_1_En_13_Chapter.xhtml#Fig8) and [13-9](#638603_1_En_13_Chapter.xhtml#Fig9)
    how the containers resize to something less than 300. `GridView` decides that
    it can fit two across in portrait orientation. But when rotated, those two would
    have resized to something bigger than 300 so it puts three on each row.


    ![Figure 13-9](images/638603_1_En_13_Chapter/638603_1_En_13_Fig9_HTML.jpg)


    The same `GridView.extent()` rotated to landscape mode


    ![Figure 13-8](images/638603_1_En_13_Chapter/638603_1_En_13_Fig8_HTML.jpg)


    `GridView.extent()` in portrait


    #### `GridView.count()`


    With the `count()` constructor, you specify how many columns you want *regardless
    of orientation*. `GridView` takes care of resizing its contents to fit. In the
    following example, we’ve told `GridView.count()` that we want four columns regardless
    of the orientation and the `GridView` sizes its children to fit exactly four across.
    They’re pictured in Figures [13-10](#638603_1_En_13_Chapter.xhtml#Fig10) and [13-11](#638603_1_En_13_Chapter.xhtml#Fig11).


    ![Figure 13-11](images/638603_1_En_13_Chapter/638603_1_En_13_Fig11_HTML.jpg)


    The same `GridView.count()` in portrait orientation


    ![Figure 13-10](images/638603_1_En_13_Chapter/638603_1_En_13_Fig10_HTML.jpg)


    `GridView.count()` in landscape orientation


    ```

    Widget build(BuildContext context) {

    return GridView.count(

    crossAxisCount: 4,

    children: _peopleList

    .map((Person person) => PersonCard(person))

    .toList(),

    );

    }

    ```


    `GridView.extent()` is probably more useful because the contents stay approximately
    the same size regardless of the device, and that’s a more typical desire than
    making the number of columns consistent.


    ## Conclusion


    It may be the most common situation to have more widgets than will fit on a device,
    and it may be the toughest problem to solve gracefully so it’s a significant achievement
    to have made it through this far. In this chapter, we’ve given you a handful of
    solutions to that problem and some help in determining which solution is best
    for a given situation.


    This was part three of our five steps to laying out a scene. Let’s cover how to
    distribute extra space elegantly in part four, the next chapter.


    # 14. Layout – Filling Extra Space


    We’re deep into the process of laying out our scene. Remember, this is the process
    we’re following.


    1.  Layout the entire scene

    2.  Position widgets relative to each other

    3.  Fix overflows, like when your widgets don’t fit on a screen

    4.  Handle extra space, like when your screen is bigger than it needs to be

    5.  Fine-tune the position


    We now know how to handle the entire scene, how to position widgets in relation
    to one another – above and below or side by side – and how to handle it when they’re
    too big to fit. These are steps one, two, and three. Now let’s take on the task
    of filling in the extra space in a `Row` or `Column` that may not look so good.


    ### What if There’s Extra Space Left Over?


    Compared to having too little space, this is a good problem to have. The only
    question you really need to answer is how to distribute the extra room. How much
    space do you want to allocate around each of the children widgets? You have several
    options. The easiest and quickest is to use `mainAxisAlignment` and `crossAxisAlignment`.


    ### `mainAxisAlignment`


    `MainAxisAlignment` is a property of the `Row` or `Column` (Figure [14-1](#638603_1_En_14_Chapter.xhtml#Fig1)).
    With it, you control how the extra space is allocated with respect to the widgets
    along the main axis – vertical for `Column`s and horizontal for `Row`s:


    ```

    child: Column(

    mainAxisAlignment: MainAxisAlignment.spaceEvenly,

    children: [

    SubWidget(),

    SubWidget(),

    ],

    ),

    ```


    You have a few choices.


    ![Figure 14-1](images/638603_1_En_14_Chapter/638603_1_En_14_Fig1_HTML.png)


    `mainAxisAlignment` says how to distribute the extra space along the main axis


    ### `crossAxisAlignment`


    `crossAxisAlignment` is also a property of the `Row` or `Column`; it determines
    where to put the extra space if the widgets are of different heights in a `Row`
    or widths in a `Column`. In Figure [14-2](#638603_1_En_14_Chapter.xhtml#Fig2),
    we have one member that is purposely made wider than the others. Your options
    for `crossAxisAlignment` are shown in the figure.


    ![Figure 14-2](images/638603_1_En_14_Chapter/638603_1_En_14_Fig2_HTML.png)


    `crossAxisAlignment` says how to distribute extra space along the cross axis


    There’s also one more: baseline. But it only makes sense in a `Row` and when you’re
    aligning `Text()`s of different heights. It lines up the base of the texts.'
