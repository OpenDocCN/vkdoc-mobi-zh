- fmt: "# Running Your App\n\nYou now have a Flutter app created. Let’s go run it.\
    \ There are multiple ways of running your app. The most popular way is to hit\
    \ the green “Play” button in either Android Studio/IntelliJ or VS Code (Figure\
    \ [2-7](#638603_1_En_2_Chapter.xhtml#Fig7)). You’ll have the option of debugging\
    \ your app by setting breakpoints and stepping through the code using the developer\
    \ tools (Figure [2-8](#638603_1_En_2_Chapter.xhtml#Fig8)).\n\nFigure 2-8  \nThe\
    \ Play button is in the upper left in VS Code  \n\nFigure 2-7  \nThe Play and\
    \ Debug buttons are at the top in Android Studio\n\nObviously, you’ll need to\
    \ run your app in a device of some kind. There are several: the Chrome browser\
    \ for a web app, emulators, or a physical device that is tethered to your development\
    \ machine via a cable. When you click the Play/Debug button, you get to choose\
    \ which device you want to run at that moment. Notice that in the preceding screenshot\
    \ of Android Studio, there’s a dropdown menu with a list of available devices.\
    \ In VS Code, hit the Play button, and a menu immediately pops up with your choices.\
    \ With either IDE, you are in control.\n\n> **Tip**  \n> You can check what devices\
    \ are currently available to you by running `flutter devices` from the command\
    \ line.\n\n```\n$ flutter devices\n3 connected devices:\nVivo XL3   • 55S...KF\
    \ • android-arm64 • Android 8.0.0 (API 26)\nAndroid SDK • emul...4 • android-x86\
    \   • Android 9 (API 28)\niPhone X    • E6...39A • ios • com.apple...OS-12-1 (simulator)\n\
    ```\n\nThe preceding sample output tells us that we have three devices. The first\
    \ and second are Android devices and the third runs iOS. The first device is a\
    \ tethered physical device. The second and third are emulators.\n\nNote that this\
    \ command is different from the `flutter emulators` command which tells you all\
    \ *possible* emulators you could potentially choose from. The `flutter devices`\
    \ command tells you which devices are *currently* available to run your app.\n\
    \n## Running It As a Web App\n\nThis is the easiest option. Flutter considers\
    \ your browser to be a device when you’re running as a web app. So all that is\
    \ needed to run as a web app is to enable the Google Chrome web browser as a device.\
    \ When you get a list of devices on which to run your app, “Chrome” will appear\
    \ as one of them. Simply choose to run your app in Chrome and the IDE will load\
    \ your web app in it.\n\n## Running It on a Tethered Device\n\nThere are times\
    \ when you need to run your app on a physical device. For example, I was developing\
    \ a project that involved printing labels to a physical printer connected by Bluetooth.\
    \ Emulators don’t pair via Bluetooth. To test the printing, I needed an actual\
    \ physical device that was already paired to my Bluetooth printer.\n\nTo tether\
    \ a physical device to your development machine, you’ll use a physical cable.\n\
    \n> **Tips**  \n> #1 When connecting an Android device, it will initially think\
    \ you’re trying to charge it or transfer photos. To let it know you’re trying\
    \ to debug, open the Developer Options screen on the device and select “Enable\
    \ USB debugging.”  \n> #2 Many connection issues can be caused by an inferior\
    \ cable. Counterintuitively, not all cables are created equal. Switch to a higher-quality\
    \ cable if you still can’t connect after changing settings.\n\n### Hot Reloading\n\
    \nThe initial compile may be a little slow. But once the app is running in your\
    \ emulator/browser/physical device/whatever, you’ll make changes to the source\
    \ code and rerun. Here’s the really cool thing: any time you save a change to\
    \ the source code, it is recompiled and the new version is loaded instantly. Your\
    \ app picks up where you left off – in the same spot, with the same state, and\
    \ same data. We call it “hot reloading,” and it makes the development cycle ridiculously\
    \ fast and frictionless.\n\n### Debugging\n\nBoth IDEs have essentially the same\
    \ debugging tools you’ve become accustomed to in all IDEs. When you start your\
    \ project running, the debugging tools will appear.\n\nIn Android Studio, the\
    \ debug window opens, usually at the bottom of the IDE. It has a tiny toolbar\
    \ which looks like Figure [2-9](#638603_1_En_2_Chapter.xhtml#Fig9).\n\nFigure\
    \ 2-9  \nThe debugging toolbar in Android Studio  \n\nThe options are “step over,”\
    \ “step into,” “force step into,” and “step out” from left to right.\n\nIn VS\
    \ Code, the toolbar appears floating over your source code (Figure [2-10](#638603_1_En_2_Chapter.xhtml#Fig10)).\n\
    \nFigure 2-10  \nThe debugging toolbar in VS Code  \n\nIts options are “play/pause,”\
    \ “step over,” “step into,” “step out,” “hot reload,” “restart,” and “stop debugging.”\n\
    \n> **Note**  \n> Flutter is pickier when you’re debugging than when running for\
    \ real in a device. This is a good thing because during debugging, it makes obvious\
    \ certain errors that you should probably fix but aren’t necessarily fatal. In\
    \ the release version, it swallows those same errors and (hopefully) allows our\
    \ users to continue running our app.\n\nOne family of those errors is “runtime\
    \ assertions.” You’ll know you’re dealing with one of these when the debugger\
    \ gives you an error like this:\n\n```\n════════ Exception caught by gesture ════════\n\
    The following assertion was thrown while handling a gesture:\nsetState() callback\
    \ argument returned a Future.\nThe setState() method on _FooState#236 was called\
    \ with a closure or method that returned a Future. Maybe it is marked as \"async\"\
    .\netc. etc. etc.\n```\n\nYour takeaway is this: when you see one of these, fix\
    \ the problem. It’s the right thing to do. But don’t be confused if you don’t\
    \ see that same problem after you’ve deployed it.\n\n## Conclusion\n\nLook, I\
    \ know that this is a lot of stuff to absorb. The nature of cross-platform development\
    \ makes the tooling hairy. But the worst is behind us. Once you’ve got the Flutter\
    \ SDK and an IDE (VS Code/Android Studio/IntelliJ IDEA) installed, that’s all\
    \ you really need. And granted, the DevTools and an emulator or two can really\
    \ help. All that’s left is getting some repetitions in for practice. You’re going\
    \ to be great!\n\nSo now that we’ve seen the Flutter toolchain, let’s start creating\
    \ widgets!\n\n---\n\nFootnotes [1](#638603_1_En_2_Chapter.xhtml#Fn1_source) [2](#638603_1_En_2_Chapter.xhtml#Fn2_source)"
  raw: '### Running Your App


    You now have a Flutter app created. Let’s go run it. There are multiple ways of
    running your app. The most popular way is to hit the green “Play” button in either
    Android Studio/IntelliJ or VS Code (Figure [2-7](#638603_1_En_2_Chapter.xhtml#Fig7)).
    You’ll have the option of debugging your app by setting breakpoints and stepping
    through the code using the developer tools (Figure [2-8](#638603_1_En_2_Chapter.xhtml#Fig8)).


    ![](images/638603_1_En_2_Chapter/638603_1_En_2_Fig8_HTML.jpg)


    Figure 2-8


    The Play button is in the upper left in VS Code


    ![](images/638603_1_En_2_Chapter/638603_1_En_2_Fig7_HTML.jpg)


    Figure 2-7


    The Play and Debug buttons are at the top in Android Studio


    Obviously, you’ll need to run your app in a device of some kind. There are several:
    the Chrome browser for a web app, emulators, or a physical device that is tethered
    to your development machine via a cable. When you click the Play/Debug button,
    you get to choose which device you want to run at that moment. Notice that in
    the preceding screenshot of Android Studio, there’s a dropdown menu with a list
    of available devices. In VS Code, hit the Play button, and a menu immediately
    pops up with your choices. With either IDE, you are in control.


    Tip


    You can check what devices are currently available to you by running “flutter
    devices” from the command line.


    ```

    $ flutter devices

    3 connected devices:

    Vivo XL3   • 55S...KF • android-arm64 • Android 8.0.0 (API 26)

    Android SDK • emul...4 • android-x86   • Android 9 (API 28)

    iPhone X    • E6...39A • ios • com.apple...OS-12-1 (simulator)

    ```


    The preceding sample output tells us that we have three devices. The first and
    second are Android devices and the third runs iOS. The first device is a tethered
    physical device. The second and third are emulators.


    Note that this command is different from the “flutter emulators” command which
    tells you all *possible* emulators you could potentially choose from. The flutter
    devices command tells you which devices are *currently* available to run your
    app.


    ### Running It As a Web App


    This is the easiest option. Flutter considers your browser to be a device when
    you’re running as a web app. So all that is needed to run as a web app is to enable
    the Google Chrome web browser as a device. When you get a list of devices on which
    to run your app, “Chrome” will appear as one of them. Simply choose to run your
    app in Chrome and the IDE will load your web app in it.


    ### Running It on a Tethered Device


    There are times when you need to run your app on a physical device. For example,
    I was developing a project that involved printing labels to a physical printer
    connected by Bluetooth. Emulators don’t pair via Bluetooth. To test the printing,
    I needed an actual physical device that was already paired to my Bluetooth printer.


    To tether a physical device to your development machine, you’ll use a physical
    cable.


    Tips


    #1 When connecting an Android device, it will initially think you’re trying to
    charge it or transfer photos. To let it know you’re trying to debug, open the
    Developer Options screen on the device and select “Enable USB debugging.”


    #2 Many connection issues can be caused by an inferior cable. Counterintuitively,
    not all cables are created equal. Switch to a higher-quality cable if you still
    can’t connect after changing settings.


    #### Hot Reloading


    The initial compile may be a little slow. But once the app is running in your
    emulator/browser/physical device/whatever, you’ll make changes to the source code
    and rerun. Here’s the really cool thing: any time you save a change to the source
    code, it is recompiled and the new version is loaded instantly. Your app picks
    up where you left off – in the same spot, with the same state, and same data.
    We call it “hot reloading,” and it makes the development cycle ridiculously fast
    and frictionless.


    #### Debugging


    Both IDEs have essentially the same debugging tools you’ve become accustomed to
    in all IDEs. When you start your project running, the debugging tools will appear.


    In Android Studio, the debug window opens, usually at the bottom of the IDE. It
    has a tiny toolbar which looks like Figure [2-9](#638603_1_En_2_Chapter.xhtml#Fig9).


    ![](images/638603_1_En_2_Chapter/638603_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    The debugging toolbar in Android Studio


    The options are “step over,” “step into,” “force step into,” and “step out” from
    left to right.


    In VS Code, the toolbar appears floating over your source code (Figure [2-10](#638603_1_En_2_Chapter.xhtml#Fig10)).


    ![](images/638603_1_En_2_Chapter/638603_1_En_2_Fig10_HTML.jpg)


    Figure 2-10


    The debugging toolbar in VS Code


    Its options are “play/pause,” “step over,” “step into,” “step out,” “hot reload,”
    “restart,” and “stop debugging.”


    Note


    Flutter is pickier when you’re debugging than when running for real in a device.
    This is a good thing because during debugging, it makes obvious certain errors
    that you should probably fix but aren’t necessarily fatal. In the release version,
    it swallows those same errors and (hopefully) allows our users to continue running
    our app.


    One family of those errors is “runtime assertions.” You’ll know you’re dealing
    with one of these when the debugger gives you an error like this:


    ```

    ════════ Exception caught by gesture ════════

    The following assertion was thrown while handling a gesture:

    setState() callback argument returned a Future.

    The setState() method on _FooState#236 was called with a closure or method that
    returned a Future. Maybe it is marked as "async".

    etc. etc. etc.

    ```


    Your takeaway is this: when you see one of these, fix the problem. It’s the right
    thing to do. But don’t be confused if you don’t see that same problem after you’ve
    deployed it.


    ## Conclusion


    Look, I know that this is a lot of stuff to absorb. The nature of cross-platform
    development makes the tooling hairy. But the worst is behind us. Once you’ve got
    the Flutter SDK and an IDE (VS Code/Android Studio/IntelliJ IDEA) installed, that’s
    all you really need. And granted, the DevTools and an emulator or two can really
    help. All that’s left is getting some repetitions in for practice. You’re going
    to be great!


    So now that we’ve seen the Flutter toolchain, let’s start creating widgets!


    Footnotes [1](#638603_1_En_2_Chapter.xhtml#Fn1_source)   [2](#638603_1_En_2_Chapter.xhtml#Fn2_source)'
  trans: "\n# 运行你的应用\n\n现在你已经创建了一个 Flutter 应用，让我们来运行它。有多种方式可以运行你的应用。最常用的方法是点击 Android\
    \ Studio/IntelliJ 或 VS Code 中的绿色“播放”按钮（图 2-7）。你可以通过设置断点并使用开发者工具单步执行代码来调试应用（图 2-8）。\n\
    \n图 2-8  \nVS Code 中的播放按钮位于左上角\n\n图 2-7  \nAndroid Studio 中的播放和调试按钮位于顶部\n\n显然，你需要在某种设备上运行你的应用。有几种选择：用于\
    \ Web 应用的 Chrome 浏览器、模拟器，或者通过数据线连接到开发机的物理设备。当你点击播放/调试按钮时，你可以选择当前要运行的设备。请注意，在前面的\
    \ Android Studio 截图中，有一个下拉菜单列出了可用的设备。在 VS Code 中，点击播放按钮，会立即弹出一个菜单供你选择。无论使用哪种 IDE，都由你掌控。\n\
    \n> **提示**  \n> 你可以通过从命令行运行 `flutter devices` 来检查当前可用的设备。\n\n```\n$ flutter devices\n\
    3 connected devices:\nVivo XL3   • 55S...KF • android-arm64 • Android 8.0.0 (API\
    \ 26)\nAndroid SDK • emul...4 • android-x86   • Android 9 (API 28)\niPhone X \
    \   • E6...39A • ios • com.apple...OS-12-1 (simulator)\n```\n\n上面的示例输出告诉我们有三台设备。第一台和第二台是\
    \ Android 设备，第三台运行的是 iOS。第一台设备是连接线连接的物理设备，第二台和第三台是模拟器。\n\n请注意，此命令与 `flutter emulators`\
    \ 命令不同，后者会告诉你所有*可能*选择的模拟器。而 `flutter devices` 命令会告诉你哪些设备是*当前*可用于运行你的应用的。\n\n##\
    \ 作为 Web 应用运行\n\n这是最简单的选择。当你作为 Web 应用运行时，Flutter 会将你的浏览器视为一个设备。因此，作为 Web 应用运行所需的全部操作就是启用\
    \ Google Chrome 浏览器作为设备。当你获得运行应用的可选设备列表时，“Chrome”会出现在其中。只需选择在 Chrome 中运行你的应用，IDE\
    \ 就会在其中加载你的 Web 应用。\n\n## 在连接线的设备上运行\n\n有时你需要在物理设备上运行你的应用。例如，我正在开发一个涉及通过蓝牙连接到物理打印机打印标签的项目。模拟器无法通过蓝牙配对。为了测试打印功能，我需要一个已经与我的蓝牙打印机配对的真实物理设备。\n\
    \n要将物理设备连接到你的开发机，你需要使用物理数据线。\n\n> **提示**  \n> #1 连接 Android 设备时，它最初会认为你正在尝试充电或传输照片。要让设备知道你正在尝试调试，请打开设备上的“开发者选项”屏幕，并选择“启用\
    \ USB 调试”。  \n> #2 许多连接问题可能是由劣质数据线引起的。与直觉相反，并非所有数据线都一样。如果在更改设置后仍然无法连接，请换用质量更高的数据线。\n\
    \n### 热重载\n\n初始编译可能会有点慢。但是一旦应用在你的模拟器/浏览器/物理设备或其他设备上运行，你就可以对源代码进行修改并重新运行。这里有一个非常酷的特性：每次你保存对源代码的更改，它都会被重新编译，并且新版本会立即加载。你的应用会从你离开的地方继续运行——在相同的位置，具有相同的状态和相同的数据。我们称之为“热重载”，它使开发周期变得异常快速且无摩擦。\n\
    \n### 调试\n\n两种 IDE 都拥有你在所有 IDE 中已经习惯的基本调试工具。当你启动项目运行时，调试工具将会出现。\n\n在 Android Studio\
    \ 中，调试窗口会打开，通常位于 IDE 底部。它有一个小工具栏，如图 2-9 所示。\n\n图 2-9  \nAndroid Studio 中的调试工具栏\
    \  \n\n从左到右的选项分别是“单步跳过”、“单步进入”、“强制单步进入”和“单步跳出”。\n\n在 VS Code 中，工具栏会浮动显示在你的源代码上方（图\
    \ 2-10）。\n\n图 2-10  \nVS Code 中的调试工具栏  \n\n其选项包括“播放/暂停”、“单步跳过”、“单步进入”、“单步跳出”、“热重载”、“重启”和“停止调试”。\n\
    \n> **注意**  \n> Flutter 在调试时比在实际设备上运行时更挑剔。这是一件好事，因为在调试过程中，它会明确显示某些你本应修复但不一定是致命的错误。在发布版本中，它会忽略这些相同的错误，并（希望如此）允许我们的用户继续运行我们的应用。\n\
    \n其中一类错误是“运行时断言”。当你调试器给出如下错误时，你就会知道正在处理这类问题：\n\n```\n════════ Exception caught\
    \ by gesture ════════\nThe following assertion was thrown while handling a gesture:\n\
    setState() callback argument returned a Future.\nThe setState() method on _FooState#236\
    \ was called with a closure or method that returned a Future. Maybe it is marked\
    \ as \"async\".\n等等，等等，等等。\n```\n\n你要记住的是：当你看到这类问题时，请修复它。这是正确的做法。但如果在部署后发现同样的问题，请不要感到困惑。\n\
    \n## 结论\n\n我知道，这些内容很多，需要吸收。跨平台开发的本质使得工具链变得棘手。但最困难的部分已经过去了。一旦你安装了 Flutter SDK 和\
    \ IDE（VS Code/Android Studio/IntelliJ IDEA），你就拥有了真正需要的一切。当然，DevTools 和一两个模拟器确实会很有帮助。剩下的就是多多练习。你会变得非常出色！\n\
    \n那么，既然我们已经了解了 Flutter 工具链，让我们开始创建小部件吧！\n\n---\n\n脚注 1 2\n"
- fmt: '# 3. Everything Is Widgets


    Let’s pretend that you are an insanely talented Lego nerd and got offered one
    of the few coveted jobs as a Lego Master Builder. Congrats! Let’s also say that
    your first assignment is to build a six-foot-tall Thor made from 26,000 Legos
    (Figure [3-1](#638603_1_En_3_Chapter.xhtml#Fig1)).


    ![](images/638603_1_En_3_Chapter/638603_1_En_3_Fig1_HTML.png)


    Figure 3-1


    A Lego Thor. The author snapped this picture at a movie theater once


    How would you go about doing that? Ponder that for a minute. Go ahead, we’ll wait.


    Would you just start grabbing bricks and putting them together? Probably not.
    Would you lay out the soles of Thor’s feet and build from the bottom up? Again,
    no. Here’s my guess as to your commonsense strategy:


    1. You’d get a vision of what you’re building. Figure the whole thing out.

    2. Realize that the entire project is too complex to build at once.

    3. Break the project into sections (legs, left arm, right arm, torso, left sword,
    right sword, helmet, cape, head).

    4. Realize that each of them is still too complex.

    5. For each section, you break it into subsections.

    6. Repeat steps 4 and 5 until you’ve got simple enough components that each is
    easy to understand, build, and maintain – for you and for any teammates that you
    may have.

    7. Create each simple component.

    8. Combine simple components to form the larger, more complex components.

    9. Repeat steps 7 and 8 until you’ve got your entire project created.


    This process has a name, *componentization*, and is exactly the thought process
    we’ll go through with our Flutter apps.


    Componentization is not something new. In fact, it was proposed as far back as
    1968.^([⁵](#fn5)) But the technique has recently exploded in popularity thanks
    to web frameworks like Angular, React, Vue, Svelte, SolidJS, and native web components.
    Seems like all the cool kids are doing software components these days. The idea
    of recursively breaking down the complex bits into simpler bits is called *decomposition*.
    And the act of putting the written pieces back together into larger components
    is called *composition*.


    In the world of Flutter, these components are referred to as *widgets*. Flutter
    people like to say “everything is widgets,” meaning that you and I will be using
    the built-in widgets that ship with Flutter. We’ll compose them together to create
    our own custom widgets. And our custom widgets will be composed together to create
    more and more complex custom widgets. This continues until you’ve got yourself
    a full-blown app.


    Every app can be thought of in two parts:


    1. **Behavior** – What the software does. All of the business logic goes here:
    the data reading, writing, and processing.

    2. **Presentation** – How the software looks. The user interface. The buttons,
    textboxes, and labels.


    Only Flutter combines these into one language instead of two.


    ## UI As Code


    Other development frameworks have proven componentization to be the way to go.
    The Flutter team has openly stated that they were heavily inspired by React^([⁶](#fn6))
    which is based on componentization. In fact, all framework makers seem to borrow
    heavily from one another. But Flutter is unique in the way that the user interface
    is expressed. Developers use the same Dart language to express an app’s graphical
    user interface as well as the behavior (Table [3-1](#638603_1_En_3_Chapter.xhtml#Tab1)).
    We call this “UI as code.”


    Table 3-1


    Only Flutter uses the same language for presentation and behavior


    | Framework | Behavior expressed in … | UI expressed in … |

    | --- | --- | --- |

    | Maui | C# | XAML |

    | React Native | JavaScript | JSX |

    | NativeScript | JavaScript | XML |

    | Flutter | Dart | Dart |


    So how does this UI get created? Like many other frameworks and languages, a flutter
    app starts with a `main` function. In Flutter, `main` will call a function called
    `runApp()`. This `runApp()` receives one widget, the root widget which can be
    named anything, but it should be a class that extends a Flutter `StatefulWidget`/`StatelessWidget`.
    It looks like this:


    ```

    // import the Dart package needed for all Flutter apps

    import ''package:flutter/material.dart'';

    // Here is main calling runApp

    void main() => runApp(RootWidget());

    // And here is your root widget

    class RootWidget extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return Text("Hello world");

    }

    }

    ```


    And that’s all you need to create a “Hello world” in Flutter.


    But wait … what is this `Text()` thing? It’s a built-in Flutter widget. Since
    these built-in widgets are so important, we need to take a look at them.


    ## Built-In Flutter Widgets


    Flutter’s foundational widgets are the building blocks of everything we create,
    and there are tons of them – over 1300 at last count.^([⁷](#fn7)) This is a lot
    of widgets for you and I to know. But if you mentally organize them, it becomes
    much more manageable.


    They fall into these major categories:


    * Value widgets

    * Layout widgets

    * Navigation widgets

    * Other widgets


    > **Note**

    > These are not Flutter’s official list of categories. Their 15 categories are
    listed here: [`https://flutter.dev/docs/development/ui/widgets`](https://flutter.dev/docs/development/ui/widgets).
    We just felt that reorganizing them helps to keep them straight.


    We’ll take a brief look at each of these categories with an example or two, and
    then we’ll do some deep dives in later chapters. Let’s start with value widgets.


    ### Value Widgets


    Certain widgets hold a value, maybe values that came from local storage, a service
    on the Internet, or from the user themselves. These are used to display values
    to the user and to get values from the user into the app. The seminal example
    is the `Text` widget which displays a little bit of text. Another is the `Image`
    widget which displays a `.jpg`, `.png`, or another picture.


    Here are some more value widgets:


    | AlertDialog Badge Checkbox Chip CircularProgressIndicator Date & Time Pickers
    DataTable DropdownButton ElevatedButton FlatButton | FloatingActionButton FlutterLogo
    Form FormField Icon IconButton Image LinearProgressIndicator Menu PopupMenuButton
    Radio | RawImage RefreshIndicator RichText SegmentedButton Slider SnackBar Switch
    Text TextField Tooltip |


    We’ll explore value widgets in more detail in the next chapter.


    ### Layout Widgets


    Layout widgets give us tons of control in making our scene lay out properly –
    placing widgets side by side with a `Row` widget or above and beneath, with a
    `Column` widget making them scrollable with a `SingleChildScrollView`, making
    them wrap with `Wrap`, determining the space around widgets with `Padding` so
    they don’t feel crowded, and so on:


    | Align AppBar AspectRatio BottomAppBar BottomSheet Card Center Column ConstrainedBox
    Container Divider Expanded ExpansionPanel FittedBox | Flow FractionallySizedBox
    GridView IntrinsicHeight IntrinsicWidth LayoutBuilder LimitedBox ListTile ListView
    MediaQuery NestedScrollView OverflowBox Padding PageView | Placeholder Row Scaffold
    Scrollable Scrollbar SingleChildScrollView SizedBox SizedOverflowBox Slivers*
    SnackBar Stack Table Transform Wrap |


    This is a huge topic which we’re covering in the final six chapters of the book.


    ### Navigation Widgets


    When your app has multiple scenes (“screens,” “pages,” whatever you want to call
    them), you’ll need some way to move between them. That’s where navigation widgets
    come in. These will control how your user sees one scene and then moves to the
    next. Usually this is done when the user taps a button. And sometimes the navigation
    button is located on a tab bar or in a drawer that slides in from the left side
    of the screen. Here are some navigation widgets:


    | AlertDialog Drawer MaterialApp NavigationBar | NavigationDrawer NavigationRail
    Navigator | SimpleDialog TabBar TabBarView |


    We’ll learn how they work in Chapter [6](#638603_1_En_6_Chapter.xhtml), “Navigation
    and Routing.”'
