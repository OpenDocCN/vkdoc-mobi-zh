    \n[1] Source reference for Eric Seidel’s example.  \n[2] Source reference for\
    \ Flutter being a pleasure to code in."
  raw: '# 1. Hello Flutter


    Picture this in your mind’s eye. You are the CEO of a new business. Obviously,
    your mission is to maximize sales while minimizing expenses. “Hmmm,” you think.
    “I can really increase sales if I make our products available on the Web.” So
    you ask your friends how to create a web app and they say …


    “You need to hire a web developer. They should know HTML, CSS, JavaScript, and
    probably some framework like React, Vue, or Angular.”


    It’s expensive but you do it and your gamble pays off. Sales increase markedly.
    Trying to keep on top of demand, you monitor social media and engage your customers.
    You hear them say that this web app is great and all but “We’d have been here
    earlier if you had an app in the App Store.” So you talk to your team who, while
    being experts in the Web, are not iOS developers. They tell you …


    “You need to hire an iOS expert. They should know iOS, Swift or Objective-C, Xcode,
    macOS, and CocoaPods for development.”


    Your research shows that this person is *even more* specialized and therefore
    expensive than your web devs. But again, it seems to be the right thing to do,
    so you bite the bullet and hire them. But even while this app is being developed,
    you see that the feedback was not isolated to iOS apps, but instead was looking
    at all mobile devices. And – oh, snap! – 85% of devices worldwide run Android,
    not iOS. You bury your head in your hands as you ponder whether or not you can
    afford to ignore 85% of your potential customers. Your advisors tell you …


    “You need to hire an Android expert. They should know the Android OS, Gradle,
    Android SDK, XML, Android Studio, and Java or Kotlin.”


    “Really?!? Another developer?”, you say. “Yes. And one just as expensive as your
    iOS developer,” they respond.


    Isn’t there one person who can do all three things? Some way to share the code
    between all those environments? Then you could hire just one person. In fact,
    they could write the code one time and deploy it to the Web, to the App Store,
    and to the Google Play Store. One codebase to maintain. One place to make improvements
    and upgrades. One place to squash bugs.


    Ladies and gentlemen, allow me to introduce you to Flutter!


    ## What Is Flutter?


    Flutter is a set of tooling that allows us to create beautiful apps that run on
    iOS, Android, the Web, Windows, MacOS, and Linux desktops.


    Flutter is …


    *   Free (as in free beer; no cost)


    *   Open source (that’s the other sense of the word “free”)


    *   Backed by and originated at Google


    *   Being enhanced and maintained by a team of developers at Google and hundreds
    of non-Google contributors around the globe


    *   Currently being used by thousands of developers in organizations across the
    world for production apps


    *   Fast because it compiles to truly native apps that don’t use crutches like
    WebViews and JavaScript bridges


    *   Written one place and compiled to a web app for billions of browsers, an iOS
    app for iPhones and iPads, and an Android app for all of the rest of the phones
    and tablets out there


    ## Why Flutter?


    Google’s mission with Flutter is …


    > *To build a better way to develop for mobile*


    Notice what is *not* in that mission. There’s no mention of Android (which is
    also owned by Google) nor of iOS nor of the Web. Flutter’s goal is to create a
    better way to develop for all devices. In other words, Flutter should be better
    to create iOS apps than Swift. It should be better to create Android apps than
    Kotlin. It should be better to create web apps than HTML/JavaScript. And if you
    get all of those things simultaneously with one codebase, all the better.


    The Flutter team has succeeded spectacularly with this mission.


    As proof, Eric Seidel offers this example.^([¹](#fn1)) The Google CRM team used
    Flutter to build an internal Android app and did it **three times** faster than
    with their traditional Android toolchain!


    Note


    Flutter has delivered on their promise to create web apps and desktop apps. But
    we must note that relatively few people are choosing Flutter for those apps. The
    real success story of Flutter has been iOS and Android apps. Consider the other
    platforms icing on the cake, not the main course.


    But it turns out that Flutter isn’t the only game in town for cross-platform.
    You have other options.


    ## The Other Options


    Cross-platform development comes in three general flavors listed in Table [1-1](#638603_1_En_1_Chapter.xhtml#Tab1).


    Table 1-1


    Cross-platform development categories


    |   | Some technologies | Cons | Pros |

    | --- | --- | --- | --- |

    | Progressive web apps (PWA) | HTML/CSS, React, Vue, Angular | Not a real app.
    Runs in a web browser. Not available in app stores. Hard to create a desktop shortcut.
    Cannot access many of the device’s resources like background processing, compass,
    proximity sensor, Bluetooth, NFC, and more | Easy to write |

    | Hybrid | PhoneGap, Cordova, Sencha, Capacitor, Ionic | Runs in a WebView so
    it can be slow. Nearly impossible to share code with the web app | Easier for
    web devs to learn because it uses HTML and JavaScript as its language and structure
    |

    | Compile-to-native solutions | React Native, NativeScript, Flutter, Maui | Learning
    a framework may be difficult. Mastering the toolchain definitely is | Real apps
    that can be found in the stores and run fast |


    If you have a captive audience, one where users value your app so much that they’re
    willing to accept a poorer user experience, the cheapest solution is to create
    a PWA. If your app is extremely naive and speed is not expected to be an issue,
    a hybrid solution might be appropriate. But if speed, smoothness, and sophisticated
    capability are important, you will need to go with a native solution.


    ## Native Solutions


    As of today, there are four fairly popular compile-to-native solutions (Table
    [1-2](#638603_1_En_1_Chapter.xhtml#Tab2)).


    Table 1-2


    Compile-to-native cross-platform frameworks


    |   | ![](images/638603_1_En_1_Chapter/638603_1_En_1_Figa_HTML.jpg)Maui | ![](images/638603_1_En_1_Chapter/638603_1_En_1_Figb_HTML.jpg)NativeScript
    | ![](images/638603_1_En_1_Chapter/638603_1_En_1_Figc_HTML.jpg)React Native |
    ![](images/638603_1_En_1_Chapter/638603_1_En_1_Figd_HTML.jpg)Flutter |

    | --- | --- | --- | --- | --- |

    | Year introduced | 2011 | 2014 | 2015 | 2018 |

    | Backed by | Microsoft | Telerik | Facebook | Google |

    | Presentation language | XAML and/or xamarin.forms | Proprietary but looks like
    XML | Proprietary but looks like JSX | Dart |

    | Procedural language | C# | JavaScript | JavaScript | Dart |


    These are all decent options. All are free to develop in and are well tested,
    having many production applications created. All have been used in large organizations.


    Flutter is the latest of these frameworks to be released. As such, it has a distinct
    advantage of observing those that had come before. The Flutter team took note
    of what worked well with other frameworks and what failed. In addition, Flutter
    added new innovations and ideas – all baked in from the start rather than being
    bolted on as improvements are made.


    But I suspect that if you’ve bought this book, you don’t need much convincing,
    so I’ll stop. Suffice it to say that Flutter is amazing! It is easy to write,
    elegant, and well designed – an absolute pleasure to code in.^([²](#fn2))


    ## Conclusion


    Now, if you’re the kind of developer I hope you are, you’re ready to get your
    hands dirty writing some code! So let’s get to it. We’ll start by installing and
    learning the Flutter development toolchain.


    Footnotes [1](#638603_1_En_1_Chapter.xhtml#Fn1_source)   [2](#638603_1_En_1_Chapter.xhtml#Fn2_source)'
  trans: '

    # 你好，Flutter


    请在你的脑海中想象这样一幅画面：你是一家新公司的 CEO。显然，你的使命是在最小化成本的同时最大化销售额。“嗯，”你思索着，“如果我把产品放到网上，确实能大幅提升销量。”于是你向朋友们请教如何制作一个网页应用，他们回答说……


    “你需要雇一个网页开发者。他们必须掌握`HTML`、`CSS`、`JavaScript`，很可能还需要某个框架，比如`React`、`Vue`或`Angular`。”


    这虽然开销不菲，但你还是照做了，并且你的冒险得到了回报。销售额显著增长。为了紧跟需求，你时刻关注社交媒体并与客户互动。你听到他们说这个网页应用很棒，但是“如果你们在
    App Store 里有个应用，我们早就来了。”于是你找到你的团队——他们虽然是网页专家，但并非 iOS 开发者。他们告诉你……


    “你需要雇一个 iOS 专家。他们必须精通 iOS、`Swift`或`Objective-C`、`Xcode`、`macOS`以及用于开发的`CocoaPods`。”


    你的调研显示，这类人才比你的网页开发者更为*专业*，因此也更昂贵。但再一次，这似乎是正确的选择，所以你咬咬牙雇用了他们。然而，就在这个应用还在开发时，你发现客户的反馈并不仅仅针对
    iOS 应用，而是关注所有移动设备。而且——哦，糟糕！——全球 85%的设备运行的是 Android，而非 iOS。你双手抱头，纠结着是否能够承受忽略 85%潜在客户的代价。你的顾问告诉你……


    “你需要雇一个 Android 专家。他们必须了解 Android 操作系统、`Gradle`、`Android SDK`、`XML`、`Android Studio`以及`Java`或`Kotlin`。”


    “真的吗？！还要再招一个开发者？”你问道。“是的，而且费用和你那位 iOS 开发者一样高，”他们回答。


    难道就没有一个人能同时胜任这三项工作吗？有没有办法在这些不同的环境之间共享代码？那样你只需要雇用一个人。事实上，他们可以一次编写代码，然后将其部署到网页、App
    Store 和 Google Play Store。只需维护一套代码库。在一个地方进行改进和升级。在一个地方修复缺陷。


    女士们，先生们，请允许我向你们介绍 Flutter！


    ## Flutter 是什么？


    Flutter 是一套工具集，它使我们能够创建在 iOS、Android、网页、Windows、MacOS 以及 Linux 桌面系统上运行的漂亮应用。


    Flutter 是……


    *   免费（如同免费啤酒；不收费）

    *   开源（这是“免费”这个词的另一种含义）

    *   由谷歌支持并起源于谷歌

    *   由谷歌的开发团队和全球数百名非谷歌贡献者共同增强和维护

    *   目前被全球众多组织的数千名开发者用于生产环境应用

    *   速度飞快，因为它编译成真正的原生应用，无需依赖像`WebViews`和 JavaScript 桥接这样的辅助工具

    *   一次编写，然后编译成面向数十亿浏览器的网页应用、面向 iPhone 和 iPad 的 iOS 应用，以及面向其他所有手机和平板的 Android 应用


    ## 为什么选择 Flutter？


    谷歌对 Flutter 的使命是……


    > *为移动端开发打造更优方式*


    请注意这个使命中*没有*提到什么。它既没有提及 Android（同样归谷歌所有），也没有提及 iOS 或网页。Flutter 的目标是为所有设备创造一种更好的开发方式。换句话说，Flutter
    应该比`Swift`更适合创建 iOS 应用。它应该比`Kotlin`更适合创建 Android 应用。它应该比`HTML`/`JavaScript`更适合创建网页应用。而如果你能用一套代码库同时实现所有这些，那就更好了。


    Flutter 团队已经出色地完成了这一使命。


    作为证明，Eric Seidel 提供了这样一个例子^(¹)：谷歌 CRM 团队使用 Flutter 构建了一个内部 Android 应用，速度比使用他们传统的
    Android 工具链快了**三倍**！


    > **注意**

    >

    > Flutter 已经兑现了创建网页应用和桌面应用的承诺。但我们必须指出，相对而言，选择使用 Flutter 开发这些应用的人并不多。Flutter 真正成功的领域是
    iOS 和 Android 应用。请将其他平台看作是锦上添花，而非主菜。


    但事实证明，Flutter 并不是跨平台开发的唯一选择。你还有其他选项。


    ## 其他选项


    跨平台开发通常分为三大类，如表 1-1 所示。


    **表 1-1** 跨平台开发分类


    | | 部分技术 | 缺点 | 优点 |

    | --- | --- | --- | --- |

    | 渐进式网页应用 (PWA) | `HTML`/`CSS`、`React`、`Vue`、`Angular` | 不是真正的应用。在网页浏览器中运行。不在应用商店中提供。难以创建桌面快捷方式。无法访问设备的许多资源，如后台处理、指南针、接近传感器、蓝牙、NFC
    等 | 易于编写 |

    | 混合应用 | `PhoneGap`、`Cordova`、`Sencha`、`Capacitor`、`Ionic` | 在`WebView`中运行，因此可能速度较慢。几乎不可能与网页应用共享代码
    | 网页开发者更容易学习，因为它使用 HTML 和 JavaScript 作为语言和结构 |

    | 编译为原生方案 | `React Native`、`NativeScript`、`Flutter`、`Maui` | 学习框架可能比较困难。掌握工具链绝对是个挑战
    | 是真正的应用，可以在应用商店中找到并且运行速度快 |


    如果你的用户群体别无选择，他们非常看重你的应用以至于愿意接受较差的用户体验，那么最便宜的方案是创建一个 PWA。如果你的应用极其简单且速度预计不成问题，那么混合方案可能适合。但如果速度、流畅度和复杂功能很重要，你将需要选择原生方案。


    ## 原生方案


    截至目前，有四个相当流行的编译为原生方案（表 1-2）。


    **表 1-2** 编译为原生的跨平台框架


    | | Maui | NativeScript | React Native | Flutter |

    | --- | --- | --- | --- | --- |

    | 推出年份 | 2011 | 2014 | 2015 | 2018 |

    | 支持方 | 微软 | Telerik | 脸书 | 谷歌 |

    | 界面呈现语言 | XAML | 专有但类似 XML | 专有但类似 JSX | `Dart` |

    | 过程式语言 | `C#` | `JavaScript` | `JavaScript` | `Dart` |


    这些都是相当不错的选择。它们都可免费用于开发，且经过了充分测试，已有大量生产应用被创建出来。它们都已被大型组织所使用。


    Flutter 是这些框架中最新发布的。正因如此，它在观察前驱者方面拥有独特的优势。Flutter 团队留意了其他框架中哪些做得好、哪些失败了。此外，Flutter
    还加入了新的创新和理念——所有这些从一开始就内置其中，而不是事后作为改进修补上去的。


    不过，我猜想既然你买了这本书，可能不需要我过多说服，那么我就此打住。只需说一句：Flutter 太棒了！它易于编写、优雅且设计精良——用它编码绝对是一种享受^(²)。


    ## 结论


    现在，如果你是我所期望的那种开发者，你已经准备好撸起袖子编写代码了！那么，我们开始吧。我们将从安装和学习 Flutter 开发工具链入手。


    ---


    **脚注**


    [1] Eric Seidel 例子的出处参考。

    [2] Flutter 编码体验愉快的出处参考。

    '
- fmt: '# 2. Developing in Flutter


    As we saw in the last chapter, Flutter enables us to create apps that run on the
    Web, on desktop computers, and on mobile devices (which really is the main draw).
    But wait a second, how exactly do we create these apps? What editor should we
    use? What is needed in the Flutter project? How do you compile the Dart source
    code? Do we need any other tools to support the project? How do you get it into
    a browser or on a device in order to test it out? Good questions, right?


    Let’s answer those questions and more in this chapter. Let’s cover two significant
    topics:


    1.  **Tools Needed** – How to install and maintain the Flutter toolchain

    2.  **The Development Process** – How to create the app, run it, and debug it


    > **Caution**

    >

    > By its nature, cross-platform app development tooling involves an awful lot
    of moving parts from various organizations, few of whom consult with the others
    before making changes. And since we’re dealing with boundary-pushing and young
    technology, changes happen frequently. We’ve tried in this chapter to stick with
    timeless information but even it is likely to become stale eventually. Please
    check with the authors of these tools for the latest and greatest information.


    ## The Flutter Toolchain


    There is no end to the list of helpful tools that the development community has
    produced. It is truly overwhelming. We’re making no attempt at covering them all.
    We want to give you just enough for you to be proficient but not so many that
    you’re overburdened. Forgive me if I’ve skipped your favorite.


    ### The Flutter SDK


    The Flutter SDK is the only indispensable tool. It includes the Flutter compiler,
    project creator, device manager, test runner, and tools that diagnose – and even
    correct – problems with the Flutter configuration.


    #### Installing the Flutter SDK


    The installation instructions are found here: [`https://flutter.dev/docs/get-started/install`](https://flutter.dev/docs/get-started/install).
    Long story short – it will involve downloading the latest zip file of tools and
    setting your `PATH` to point to the folder where you unzipped them. The steps
    vary per operating system, but they’re very plain on that website.


    > **Tip**

    >

    > This step seems very low level and sounds intimidating, but after this step,
    things get easier and less error prone. Don’t let it discourage you.


    ### IDEs


    In theory, an IDE isn’t really needed. Flutter can be written using any editor
    and then compiled and run using the Flutter SDK that you installed earlier. But
    in reality, almost nobody ever does that. Why would they? The following IDEs have
    Flutter support built right in!


    #### VS Code from Microsoft


    VS Code is from Microsoft. Its official name is “Microsoft Visual Studio Code,”
    but most of us just call it VS Code. Whatever you call it, please do not confuse
    it with Microsoft’s other product called “Microsoft Visual Studio.” They are not
    the same thing regardless of the similar names.


    You can get VS Code here: [`https://code.visualstudio.com`](https://code.visualstudio.com).


    #### Android Studio/IntelliJ from JetBrains


    Android Studio and IntelliJ are essentially the same thing. They are built from
    the same codebase and have the same features.


    You can get Android Studio at [`https://developer.android.com/studio`](https://developer.android.com/studio)
    and IntelliJ IDEA here: [`www.jetbrains.com/idea/download`](http://www.jetbrains.com/idea/download).


    #### Which IDE Should I Use?


    Both VS Code and Android Studio/IntelliJ are free and open source. Both run cross-platform
    on Windows, Mac, and Linux. Both are roughly equally popular with Flutter developers,^([³](#fn3))
    neither having a clear market advantage over the other. You can’t go wrong with
    either one.


    But if you must choose one, what we’ve found is that your background may affect
    how you like the tools. Developers from the web development world, those who use
    tech like HTML, CSS, JavaScript, NodeJS, React, Angular, or Vue, strongly prefer
    VS Code. On the other hand, those developers who came from a Java world, especially
    Android developers, seem to lean toward Android Studio/IntelliJ.


    The good news is that this is a very low-pressure choice. It is trivial to switch
    editors – even while working on a given project. Start in one and see how you
    like it. If you don’t, you can give the other a test drive for a while. Go back
    and forth a couple of times until you have a strong preference. It’s really no
    big deal to switch.


    ### IDE DevTools


    While those IDEs are great, they’re not built for Flutter exclusively; they’re
    used for developing in other languages and frameworks as well. So to improve the
    Flutter development flow, we should install the Flutter DevTools. It adds in debugger
    support, lets you look at logs, connects seamlessly with emulators, and a few
    more things.


    Installing the DevTools is done from *within* each IDE. Within Android Studio/IntelliJ,
    go to “Preferences ➤ Plugins” from the main menu (Figure [2-1](#638603_1_En_2_Chapter.xhtml#Fig1)).
    In VS Code, go to “View ➤ Extensions” (Figure [2-2](#638603_1_En_2_Chapter.xhtml#Fig2)).
    The Flutter DevTools are simply called “Flutter,” and a search will turn them
    up. In either platform, hit the green “Install” button.


    ![DevTools install in Android Studio](images/638603_1_En_2_Chapter/638603_1_En_2_Fig1_HTML.jpg)


    **Figure 2-1** DevTools install in Android Studio


    ![DevTools install in VS Code](images/638603_1_En_2_Chapter/638603_1_En_2_Fig2_HTML.jpg)


    **Figure 2-2** DevTools install in VS Code


    You may need to restart the IDE after you install.


    ### Emulators


    Once you’ve got the IDE and DevTools installed, you’re ready to compile your app.
    To run it, let''s get it on a device. An emulator – a virtual device that runs
    on your laptop/desktop – makes it really easy to run, test, debug, and show your
    app. You’ll probably want to test on both iOS and Android, so you’ll want emulators
    for each. There are several emulators available, but I’ll mention just a couple,
    Xcode’s iOS simulator and AVD’s Android emulator.


    #### iOS Simulator


    If you don’t own a Mac, you won’t be running an iOS emulator or even compiling
    for iOS for that matter.^([⁴](#fn4)) But if you do and you have Xcode installed,
    you’re in luck; you have the iOS simulator already. To run it, you open Xcode,
    then go to **Xcode ➤ Open Developer Tool ➤ Simulator** (Figure [2-3](#638603_1_En_2_Chapter.xhtml#Fig3)).
    The simulator will start up, and from within it, you can select any iOS device
    including iPhones and iPads.


    ![Opening the iOS simulator from Xcode](images/638603_1_En_2_Chapter/638603_1_En_2_Fig3_HTML.jpg)


    **Figure 2-3** Opening the iOS simulator from Xcode


    #### Android Emulator


    Just like there are tons of Android models, so are there tons of Android emulators,
    but there is only one popular way to interact with them: AVD (Android Virtual
    Device) Manager. The AVD Manager is found in Android Studio under **Tools** (Figure
    [2-4](#638603_1_En_2_Chapter.xhtml#Fig4)).


    ![Finding the AVD Manager in Android Studio](images/638603_1_En_2_Chapter/638603_1_En_2_Fig4_HTML.jpg)


    **Figure 2-4** Finding the AVD Manager in Android Studio


    Once opened, you’ll see a list of your currently installed emulators. It should
    start out empty at first. You’ll have the ability to install one or more of the
    hundreds of Android device emulators available by hitting the “Create Device”
    button at the top (Figure [2-5](#638603_1_En_2_Chapter.xhtml#Fig5)).


    ![AVD Manager has a list of available devices. Click “Create Device” to add more](images/638603_1_En_2_Chapter/638603_1_En_2_Fig5_HTML.jpg)


    **Figure 2-5** AVD Manager has a list of available devices. Click “Create Device”
    to add more


    Hit it and you can choose from all kinds of devices or create one of your own.
    You’ll only need to install a device once. After it’s installed, that emulated
    device is usable from any IDE, whether IntelliJ/Android Studio or VS Code. No
    need for a separate setup on VS Code.'
  raw: '# 2. Developing in Flutter


    As we saw in the last chapter, Flutter enables us to create apps that run on the
    Web, on desktop computers, and on mobile devices (which really is the main draw).
    But wait a second, how exactly do we create these apps? What editor should we
    use? What is needed in the Flutter project? How do you compile the Dart source
    code? Do we need any other tools to support the project? How do you get it into
    a browser or on a device in order to test it out? Good questions, right?


    Let’s answer those questions and more in this chapter. Let’s cover two significant
    topics:


    1.  Tools Needed – How to install and maintain the Flutter toolchain


    2.  The Development Process – How to create the app, run it, and debug it


    Caution


    By its nature, cross-platform app development tooling involves an awful lot of
    moving parts from various organizations, few of whom consult with the others before
    making changes. And since we’re dealing with boundary-pushing and young technology,
    changes happen frequently. We’ve tried in this chapter to stick with timeless
    information but even it is likely to become stale eventually. Please check with
    the authors of these tools for the latest and greatest information.


    ## The Flutter Toolchain


    There is no end to the list of helpful tools that the development community has
    produced. It is truly overwhelming. We’re making no attempt at covering them all.
    We want to give you just enough for you to be proficient but not so many that
    you’re overburdened. Forgive me if I’ve skipped your favorite.


    ### The Flutter SDK


    The Flutter SDK is the only indispensable tool. It includes the Flutter compiler,
    project creator, device manager, test runner, and tools that diagnose – and even
    correct – problems with the Flutter configuration.


    #### Installing the Flutter SDK


    The installation instructions are found here: [`https://flutter.dev/docs/get-started/install`](https://flutter.dev/docs/get-started/install).
    Long story short – it will involve downloading the latest zip file of tools and
    setting your PATH to point to the folder where you unzipped them. The steps vary
    per operating system, but they’re very plain on that website.


    Tip


    This step seems very low level and sounds intimidating, but after this step, things
    get easier and less error prone. Don’t let it discourage you.


    ### IDEs


    In theory, an IDE isn’t really needed. Flutter can be written using any editor
    and then compiled and run using the Flutter SDK that you installed earlier. But
    in reality, almost nobody ever does that. Why would they? The following IDEs have
    Flutter support built right in!


    #### VS Code from Microsoft


    VS Code is from Microsoft. Its official name is “Microsoft Visual Studio Code,”
    but most of us just call it *VS Code*. Whatever you call it, please do not confuse
    it with Microsoft’s other product called “Microsoft Visual Studio.” They are not
    the same thing regardless of the similar names.


    You can get VS Code here: [`https://code.visualstudio.com`](https://code.visualstudio.com).


    #### Android Studio/IntelliJ from JetBrains


    Android Studio and IntelliJ are essentially the same thing. They are built from
    the same codebase and have the same features.


    You can get Android Studio at [`https://developer.android.com/studio`](https://developer.android.com/studio)
    and IntelliJ IDEA here: [`www.jetbrains.com/idea/download`](http://www.jetbrains.com/idea/download).


    #### Which IDE Should I Use?


    Both VS Code and Android Studio/IntelliJ are free and open source. Both run cross-platform
    on Windows, Mac, and Linux. Both are roughly equally popular with Flutter developers,^([³](#fn3))
    neither having a clear market advantage over the other. You can’t go wrong with
    either one.


    But if you must choose one, what we’ve found is that your background may affect
    how you like the tools. Developers from the web development world, those who use
    tech like HTML, CSS, JavaScript, NodeJS, React, Angular, or Vue, strongly prefer
    VS Code. On the other hand, those developers who came from a Java world, especially
    Android developers, seem to lean toward Android Studio/IntelliJ.


    The good news is that this is a very low-pressure choice. It is trivial to switch
    editors – even while working on a given project. Start in one and see how you
    like it. If you don’t, you can give the other a test drive for a while. Go back
    and forth a couple of times until you have a strong preference. It’s really no
    big deal to switch.


    ### IDE DevTools


    While those IDEs are great, they’re not built for Flutter exclusively; they’re
    used for developing in other languages and frameworks as well. So to improve the
    Flutter development flow, we should install the Flutter DevTools. It adds in debugger
    support, lets you look at logs, connects seamlessly with emulators, and a few
    more things.


    Installing the DevTools is done from *within* each IDE. Within Android Studio/IntelliJ,
    go to “Preferences ➤ Plugins” from the main menu (Figure [2-1](#638603_1_En_2_Chapter.xhtml#Fig1)).
    In VS Code, go to “View ➤ Extensions” (Figure [2-2](#638603_1_En_2_Chapter.xhtml#Fig2)).
    The Flutter DevTools are simply called “Flutter,” and a search will turn them
    up. In either platform, hit the green “Install” button.


    ![](images/638603_1_En_2_Chapter/638603_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    DevTools install in VS Code


    ![](images/638603_1_En_2_Chapter/638603_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    DevTools install in Android Studio


    You may need to restart the IDE after you install.


    ### Emulators


    Once you’ve got the IDE and DevTools installed, you’re ready to compile your app.
    To run it, let''s get it on a device. An emulator – a virtual device that runs
    on your laptop/desktop – makes it really easy to run, test, debug, and show your
    app. You’ll probably want to test on both iOS and Android, so you’ll want emulators
    for each. There are several emulators available, but I’ll mention just a couple,
    Xcode’s iOS simulator and AVD’s Android emulator.


    #### iOS Simulator


    If you don’t own a Mac, you won’t be running an iOS emulator or even compiling
    for iOS for that matter.^([⁴](#fn4)) But if you do and you have Xcode installed,
    you’re in luck; you have the iOS simulator already. To run it, you open Xcode,
    then go to Xcode ➤ Open Developer Tool ➤ Simulator (Figure [2-3](#638603_1_En_2_Chapter.xhtml#Fig3)).
    The simulator will start up, and from within it, you can select any iOS device
    including iPhones and iPads.


    ![](images/638603_1_En_2_Chapter/638603_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Opening the iOS simulator from Xcode


    #### Android Emulator


    Just like there are tons of Android models, so are there tons of Android emulators,
    but there is only one popular ways to interact with them: AVD (Android Virtual
    Device) Manager. The AVD Manager is found in Android Studio under Tools (Figure
    [2-4](#638603_1_En_2_Chapter.xhtml#Fig4)).


    ![](images/638603_1_En_2_Chapter/638603_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Finding the AVD Manager in Android Studio


    Once opened, you’ll see a list of your currently installed emulators. It should
    start out empty at first. You’ll have the ability to install one or more of the
    hundreds of Android device emulators available by hitting the “Create Device”
    button at the top (Figure [2-5](#638603_1_En_2_Chapter.xhtml#Fig5)).


    ![](images/638603_1_En_2_Chapter/638603_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    AVD Manager has a list of available devices. Click “Create Device” to add more


    Hit it and you can choose from all kinds of devices or create one of your own.
    You’ll only need to install a device once. After it’s installed, that emulated
    device is usable from any IDE, whether IntelliJ/Android Studio or VS Code. No
    need for a separate setup on VS Code.'
  trans: '

    # 2. 使用 Flutter 进行开发


    如上一章所述，Flutter 让我们能够创建在 Web、桌面电脑和移动设备上运行的应用程序（这确实是其主要吸引力所在）。但稍等片刻，我们究竟如何创建这些应用程序？应该使用哪种编辑器？Flutter
    项目中需要什么？如何编译 Dart 源代码？我们是否需要其他工具来支持项目？如何将其部署到浏览器或设备上进行测试？都是好问题，对吧？


    让我们在本章中解答这些问题以及更多内容。我们将涵盖两个重要主题：


    1.  **所需工具** – 如何安装和维护 Flutter 工具链

    2.  **开发流程** – 如何创建、运行和调试应用程序


    > **注意**

    >

    > 就其性质而言，跨平台应用开发工具涉及来自各个组织的大量变动部件，而这些组织在做出更改前很少相互协商。并且，由于我们面对的是前沿且年轻的技术，变化频繁发生。在本章中，我们尽量坚持提供永恒不变的信息，但即便如此，信息最终也可能变得过时。请查阅这些工具的开发者以获取最新和最好的信息。


    ## Flutter 工具链


    开发社区生产的有用工具不胜枚举，真可谓令人眼花缭乱。我们不打算涵盖所有工具。我们只想提供足够让你变得熟练，但又不会让你感到负担过重的信息。如果我跳过了你最喜欢的工具，还请见谅。


    ### Flutter SDK


    Flutter SDK 是唯一必不可少的工具。它包含 Flutter 编译器、项目创建器、设备管理器、测试运行器以及用于诊断甚至修复 Flutter 配置问题的工具。


    #### 安装 Flutter SDK


    安装说明可在此处找到：[`https://flutter.dev/docs/get-started/install`](https://flutter.dev/docs/get-started/install)。简而言之——这将涉及下载最新的工具压缩包，并设置你的
    `PATH` 环境变量指向你解压该压缩包的文件夹。具体的步骤因操作系统而异，但该网站上的说明非常清晰。


    > **提示**

    >

    > 这一步看起来非常底层，而且听起来令人生畏，但完成这一步后，事情会变得更容易，也更不容易出错。不要让它使你气馁。


    ### 集成开发环境（IDE）


    理论上来说，并不真正需要 IDE。可以使用任何编辑器编写 Flutter 代码，然后使用你之前安装的 Flutter SDK 进行编译和运行。但实际上，几乎没有人会这么做。他们为什么要这么做呢？以下
    IDE 都内置了 Flutter 支持！


    #### 来自微软的 VS Code


    VS Code 来自微软。它的官方名称是“Microsoft Visual Studio Code”，但我们大多数人只是叫它 VS Code。无论你怎么称呼它，请不要将其与微软的另一款名为“Microsoft
    Visual Studio”的产品混淆。尽管名称相似，但它们不是同一回事。


    你可以在此处获取 VS Code：[`https://code.visualstudio.com`](https://code.visualstudio.com)。


    #### 来自 JetBrains 的 Android Studio/IntelliJ


    Android Studio 和 IntelliJ 本质上是同一回事。它们基于相同的代码库构建，并具有相同的功能。


    你可以在此处获取 Android Studio：[`https://developer.android.com/studio`](https://developer.android.com/studio)，此处获取
    IntelliJ IDEA：[`www.jetbrains.com/idea/download`](http://www.jetbrains.com/idea/download)。


    #### 我应该使用哪个 IDE？


    VS Code 和 Android Studio/IntelliJ 都是免费且开源的。它们都跨平台运行于 Windows、Mac 和 Linux 上。两者在
    Flutter 开发者中的受欢迎程度大致相当^(³)，彼此之间都没有明显的市场优势。选择哪一个都不会错。


    但如果你必须选一个，我们发现你的背景可能会影响你对工具的喜好。来自 Web 开发领域、使用诸如 HTML、CSS、JavaScript、NodeJS、React、Angular
    或 Vue 等技术栈的开发者，强烈倾向于 VS Code。另一方面，来自 Java 世界的开发者，尤其是 Android 开发者，似乎更倾向于 Android
    Studio/IntelliJ。


    好消息是，这是一个压力很小的选择。切换编辑器非常容易——即使在处理特定项目时也是如此。从其中一个开始，看看你是否喜欢它。如果不喜欢，你可以试用另一个一段时间。来回切换几次，直到你有了强烈的偏好。切换真的不是什么大问题。


    ### IDE 开发工具


    虽然这些 IDE 很棒，但它们并非专为 Flutter 构建；它们也用于其他语言和框架的开发。因此，为了改善 Flutter 的开发流程，我们应该安装 Flutter
    DevTools。它增加了调试器支持，让你可以查看日志，与模拟器无缝连接，以及提供一些其他功能。


    安装 DevTools 是在每个 IDE *内部*完成的。在 Android Studio/IntelliJ 中，从主菜单进入“偏好设置 ➤ 插件”（图 2-1）。在
    VS Code 中，进入“视图 ➤ 扩展”（图 2-2）。Flutter DevTools 被简称为“Flutter”，搜索一下就能找到。在任一平台上，点击绿色的“安装”按钮。


    ![在 Android Studio 中安装 DevTools](img/638603_1_En_2_Fig1_HTML.jpg)


    **图 2-1** 在 Android Studio 中安装 DevTools


    ![在 VS Code 中安装 DevTools](img/638603_1_En_2_Fig2_HTML.jpg)


    **图 2-2** 在 VS Code 中安装 DevTools


    安装后，你可能需要重启 IDE。


    ### 模拟器


    一旦你安装好了 IDE 和 DevTools，就可以编译你的应用了。要运行它，让我们将它部署到设备上。模拟器——一种在你的笔记本电脑/台式机上运行的虚拟设备——使得运行、测试、调试和展示你的应用变得非常容易。你可能希望在
    iOS 和 Android 上都进行测试，因此你需要两者的模拟器。有几种可用的模拟器，但我只提两个，Xcode 的 iOS 模拟器和 AVD 的 Android
    模拟器。


    #### iOS 模拟器


    如果你没有 Mac 电脑，你就无法运行 iOS 模拟器，甚至无法为 iOS 进行编译。^(⁴) 但如果你有 Mac 并且安装了 Xcode，那么你很幸运；你已经拥有了
    iOS 模拟器。要运行它，打开 Xcode，然后转到 **Xcode ➤ 打开开发者工具 ➤ 模拟器**（图 2-3）。模拟器将启动，在其中，你可以选择任何
    iOS 设备，包括 iPhone 和 iPad。


    ![从 Xcode 打开 iOS 模拟器](img/638603_1_En_2_Fig3_HTML.jpg)


    **图 2-3** 从 Xcode 打开 iOS 模拟器


    #### Android 模拟器


    就像有大量的 Android 机型一样，也有大量的 Android 模拟器，但与它们交互只有一种流行方式：AVD（Android 虚拟设备）管理器。AVD
    管理器可以在 Android Studio 的 **工具** 菜单下找到（图 2-4）。


    ![在 Android Studio 中查找 AVD 管理器](img/638603_1_En_2_Fig4_HTML.jpg)


    **图 2-4** 在 Android Studio 中查找 AVD 管理器


    打开后，你将看到当前已安装的模拟器列表。一开始应该是空的。通过点击顶部的“创建设备”按钮（图 2-5），你可以安装数百种可用的 Android 设备模拟器中的一个或多个。


    ![AVD 管理器显示可用设备列表。点击“创建设备”以添加更多](img/638603_1_En_2_Fig5_HTML.jpg)


    **图 2-5** AVD 管理器显示可用设备列表。点击“创建设备”以添加更多


    点击它，你可以从各种设备中选择，或者创建你自己的设备。你只需安装一个设备一次。安装完成后，该模拟设备就可从任何 IDE 中使用，无论是 IntelliJ/Android
    Studio 还是 VS Code。无需在 VS Code 上进行单独设置。

