    Container(

    decoration: BoxDecoration(

    color: Colors.purple,

    borderRadius: BorderRadius.only(

    topLeft: Radius.circular(20.0),

    topRight: Radius.circular(60.0),

    ),

    ),

    )

    ```


    We only gave it a topLeft and a topRight radius, but there is also a bottomLeft
    and bottomRight property. And although we appreciate the flexibility, it is not
    typical to use it. We ordinarily specify all four the same (Figure [15-7](#638603_1_En_15_Chapter.xhtml#Fig7)):


    ![](images/638603_1_En_15_Chapter/638603_1_En_15_Fig7_HTML.jpg)


    Figure 15-7


    BorderRadius on all four corners


    ```

    Container(

    decoration: BoxDecoration(

    color: Colors.purple,

    borderRadius: BorderRadius.all(Radius.circular(20.0),),

    ),

    )

    ```


    ### BoxShape


    Your containers don’t have to always be rectangles. When you need it to be another
    shape, you can make it so with BoxShape or CustomPainter. BoxShape is much easier
    to use, but it only supports circles, as in Figure [15-8](#638603_1_En_15_Chapter.xhtml#Fig8)
    (in addition to the default rectangle, of course):


    ![](images/638603_1_En_15_Chapter/638603_1_En_15_Fig8_HTML.jpg)


    Figure 15-8


    BoxShape.circle makes your Container round


    ```

    Container(

    decoration: BoxDecoration(

    shape: BoxShape.circle,

    color: Colors.deepOrange,

    ),

    ),

    ```


    CustomPainter is way more complex, but it allows infinite shapes. It would be
    distracting to get too deep into the details of CustomPainter (Figure [15-9](#638603_1_En_15_Chapter.xhtml#Fig9)),
    but here’s a quick example, a Superman shield:


    ![](images/638603_1_En_15_Chapter/638603_1_En_15_Fig9_HTML.jpg)


    Figure 15-9


    Using a CustomPainter


    ```

    Container(

    child: CustomPaint(

    size: Size(200, 200),

    painter: SupermanShieldPainter(),

    ),

    )

    class SupermanShieldPainter extends CustomPainter {

    @override

    void paint(Canvas canvas, Size size) {

    canvas.drawPath(Path()

    ..moveTo(25, 0)

    ..lineTo(125, 0)

    ..lineTo(150,25)

    ..lineTo(75, 125)

    ..lineTo(0,25)

    ..lineTo(25,0),

    Paint()

    ..style=PaintingStyle.fill

    ..color = Colors.red

    );

    }

    @override

    bool shouldRepaint(oldDelegate) => false;

    }

    ```


    See? Quite a bit more involved. Note that your container is still a rectangle.
    It’s just that the background is different. To dive deeper into CustomPainter,
    take a look at [`https://api.flutter.dev/flutter/widgets/CustomPaint-class.html`](https://api.flutter.dev/flutter/widgets/CustomPaint-class.html).


    Tip


    All of these decorations are applied to the decoration property, but they can
    also apply to a property called foregroundDecoration which, as the name suggests,
    is applied on a layer *above* the container. Because they’re drawn on top of the
    other things, you’ll want to keep in mind one more modification: opacity. Colors
    can be made semitransparent. The following would create a red layer on top of
    a container that is 50% transparent:


    ```

    foregroundDecoration: BoxDecoration(

    color:Colors.red.withOpacity(0.5),

    ),

    ```


    ## Conclusion


    In many ways, the Container is the quintessential Flutter widget, allowing tons
    of options to fine-tune your layouts. Heck, you could do the whole thing with
    Containers because they’re so versatile! (Don’t actually do this, kids. We’re
    just talking theory here.) But Containers are spectacularly useful for fine-tuning
    layouts and for adding visual decorations to so many other widgets.


    Hey, congratulations! You made it through some very tough concepts, all of which
    we hope were made easier to learn in the last few chapters. We’re going to finish
    off the book with a related subject: special presentational widgets. These will
    take your layouts to the next level!


    # 16. Layout – Special Presentation Widgets


    After the prior five chapters on layout, we’ve now covered the tools you’ll need
    for 90% of your layout needs, but there are more. A few are worth a glance just
    so you know what tool to reach for should the situation come up. These widgets
    are designed for very particular layout situations that, while common, aren’t
    everyday but need specialized tools to make happen.


    We’re going to glance at Slivers and then do deep dives into Stack and Table widgets.'
