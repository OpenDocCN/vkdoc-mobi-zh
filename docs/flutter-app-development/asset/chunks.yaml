- fmt: "### 2\\. `TextTheme`\n\n您的`textTheme`由15个`TextStyle`组成。设置它们将自动设置某些小部件的样式。例如，更改`bodyMedium`的`textStyle`将依次改变您添加的每个`Text`小部件、每个`ListItem`和每个`Navigator`的外观。设置`labelLarge`的`textStyle`将依次设置您添加的每个`TextButton`、每个`ElevatedButton`、每个`FAB`和每个`Chip`。您有以下通用分组：\n\
    \n*   Display\n*   Headline\n*   Title\n*   Body\n*   Label\n\n在每个组别背后，您都有 `small`、`medium`\
    \ 和 `large` 三种尺寸。图[10-5](#638603_1_En_10_Chapter.xhtml#Fig5)展示了它们的外观。\n\n![](images/638603_1_En_10_Chapter/638603_1_En_10_Fig5_HTML.jpg)\n\
    \n**Figure 10-5** 实际尺寸下的 `TextTheme` 文本样式\n\n同样，我建议使用`.copyWith()`来更改默认值。例如，如果您想让每个`Text`小部件更大，可以这样做：\n\
    \n```dart\nTextTheme _textTheme = const TextTheme().copyWith(\n  bodyMedium: const\
    \ TextStyle().copyWith(fontSize: 18.0),\n);\n```\n\n> **小贴士**\n> `.copyWith()`\
    \ 是 Dart 中一种常见的模式。许多许多类都编写了`.copyWith()`方法，允许您对实例的副本进行增量更改。留意这种模式，您会惊讶于它出现的频率。事实上，在您自己的类中编写一个`.copyWith()`方法，您的开发者同行们会感谢您的。\n\
    \n### 3\\. 小部件特定主题\n\n当您不喜欢默认样式时，许多其他显示小部件也具有您可以覆盖的样式。例如，如果您想更改所有`AppBar`和所有`ListTile`的外观该怎么办？\n\
    \n```dart\n// Widget-specific themes\nAppBarTheme _appBarTheme = const AppBarTheme().copyWith(\n\
    \  foregroundColor: _colorScheme.onTertiaryContainer,\n  color: _colorScheme.tertiary,\n\
    \  titleTextStyle: _textTheme.displayLarge!\n    .copyWith(fontFamily: 'Courier'));\n\
    ListTileThemeData _listTileThemeData = ListTileThemeData(\n  tileColor: _colorScheme.secondary,\n\
    \  textColor: _colorScheme.onSecondary,\n  contentPadding: const EdgeInsets.all(10.0));\n\
    ```\n\n请注意，这些主题的层级要低得多，并且仅适用于那些特定的部件。许多小部件都有自己的主题，这些主题由特定于该小部件类型的样式组成。当然，一旦在`Theme`中设置并应用于`MaterialApp`，所有该类型的小部件都将遵循该主题。实际上，您拥有相当多的小部件主题：\n\
    \n`appBarTheme`, `textButtonTheme`, `elevatedButtonTheme`, `cardTheme`, `inputDecorationTheme`,\
    \ `iconTheme`, `sliderTheme`, `tabBarTheme`, `drawerTheme`, `tooltipTheme`, `chipTheme`,\
    \ `dialogTheme`, `pageTransitionTheme`, `floatingActionButtonTheme`, `NavigationRailTheme`,\
    \ `snackBarTheme`, `bottomSheetTheme`, `popupMenuTheme`, `bannerTheme`, `buttonBarTheme`,\
    \ `bottomNavigationBarTheme`, `timePickerTheme`, `outlinedButtonTheme`, `textSelectionTheme`,\
    \ `dataTableTheme`, `checkboxTheme`, `radioButtonTheme`, `sliderTheme`, `switchTheme`,\
    \ `progressIndicatorTheme`。\n\n### 4\\. 将它们整合到一个主题中\n\n是时候将所有这些整合到一个主题中了。我们已经写了很多代码，对吧？主题比您预期的要冗长得多，所以我建议在一个单独的文件中创建它，例如在`theme.dart`中：\n\
    \n```dart\nThemeData themeData = ThemeData(\n  colorScheme: _colorScheme,\n  textTheme:\
    \ _textTheme,\n  // Widget-specific themes only when needed\n  appBarTheme: _appBarTheme,\n\
    \  listTileTheme: _listTileThemeData,\n  // Optionally set other specialized things\
    \ here\n  fontFamily: 'Courier',\n  fontFamilyFallback: const ['monospace', 'serif'],\n\
    );\n```\n\n然后将该主题导入到您的`main.dart`文件中，并将其应用于您的`MaterialApp`：\n\n```dart\nimport\
    \ './theme.dart';\nclass MyApp extends StatelessWidget {\n  @override\n  Widget\
    \ build(BuildContext context) {\n    return MaterialApp(\n      title: 'Themes\
    \ and Styles Demo',\n      theme: themeData,\n      routes: {\n        \"/\":\
    \ (_) => const Dashboard(),\n        ...,\n      },\n    );\n  }\n}\n```\n\n就是这样！运行您的应用并观察您出色设计的辉煌！无需其他操作。除非，您需要零星地应用单个样式。\n\
    \n### 5\\. 覆盖单个小部件的样式\n\n最后一步。设置您的`ColorScheme`、`TextTheme`和单个小部件主题为您的应用建立了默认的外观和感觉。但有时我们希望某个单独的小部件具有特殊样式。也许您放在页面顶部的`Text()`应该作为页面标题。或者如果您希望一个按钮看起来不同。比如一个“您确定吗？”按钮。也许我们希望那一个按钮——仅仅那一个——从其他按钮中脱颖而出。因此，我们偶尔需要为单个小部件设置样式。当您有主题时，最佳实践是基于主题样式创建一个样式，使用`.copyWith()`来扩展它。然后将其应用于您的特殊小部件。\n\
    \n```dart\n// First, copy the default style & apply your customizations\nTextStyle\
    \ dangerButtonStyle = Theme.of(context)\n    .textTheme\n    .labelLarge\n   \
    \ .copyWith(\n        fontSize: 18.0,\n        fontWeight: FontWeight.bold,\n\
    \        color: Colors.red,\n    );\n// Use the custom style in your button widget\n\
    TextButton(\n    onPressed: () => deleteEverything(),\n    child: Text(\"Are you\
    \ sure?\", style: dangerButtonStyle),\n);\n```\n\n> **小贴士**\n> 我们已经看到`MaterialApp`有一个*theme*。碰巧这个主题就是`lightTheme`。`MaterialApp`还有一个*`darkTheme`*。像创建常规（亮色）主题一样创建一个`darkTheme`，并将`MaterialApp`指向它。现在，您的应用可以响应操作系统的亮色和暗色主题变化。\n\
    \n## 关于样式设计的最后思考\n\n在我们结束样式设计这个话题之前，我们确实应该简要讨论一下颜色和字体。如果这些不是您当前立即感兴趣的内容，请随意跳到本章结尾。当您有迫切需求时，再回来看这部分。但在Flutter中，颜色和字体并非完全简单明了。有一些需要注意的陷阱我们将进行讨论。\n\
    \n### 关于颜色的补充说明\n\n大多数Flutter样式的应用范围非常狭窄；它们仅对某些严格定义的情况有意义。另一方面，颜色几乎应用于所有地方（图[10-6](#638603_1_En_10_Chapter.xhtml#Fig6)）。边框、文本、背景、图标、按钮和阴影都有颜色。并且它们都以相同的方式指定。例如，下面是一个红色容器中的白色文本，带有黄色边框，所有这些小部件都使用语法`color:\
    \ Colors.somethingOrOther`进行着色：\n\n![](images/638603_1_En_10_Chapter/638603_1_En_10_Fig6_HTML.jpg)\n\
    \n**Figure 10-6** Flutter 中的颜色无处不在\n\n```dart\nchild: Container(\n  decoration:\
    \ BoxDecoration(\n    color: Colors.red,\n    border: Border.all(color: Colors.yellow)\n\
    \  ),\n  child: Text('Colors!',\n    style: TextStyle(color: Colors.white,),\n\
    \  ),\n),\n```\n\n您看到背景中那些彩色方块了吗？它们的创建方式如下：\n\n```dart\nList _randomColors() {\n\
    \  Random rnd = Random();\n  return List.generate(25,\n    (int i) => Container(\n\
    \      color: Color.fromRGBO(\n        rnd.nextInt(255), rnd.nextInt(255),\n \
    \       rnd.nextInt(255), 1.0),\n    ));\n}\n```\n\n因此，您可以使用`Color.fromRGBO(red,\
    \ green, blue, opacity)`创建超过1600万种颜色中的任何一种，其中三个RGB颜色分量每个都是0到255之间的数字，`opacity`（不透明度）为1.0表示完全不透明，0.0表示完全透明。还有一个`Color.fromARGB(alpha,\
    \ red, green, blue)`，它执行相同的功能，只是将不透明度作为`alpha`移到前面，它是一个介于0（完全透明）到255（完全不透明）之间的数字。\n\
    \n如果您有Web开发背景，您可能更习惯使用十六进制数字创建颜色。这同样有效：\n\n```dart\ncolor: Color(0xFFFF7F00),\n\
    ```\n\n> **注意**\n> 请小心。那个十六进制数字实际上是“ARGB”，其中前两个十六进制字符是alpha通道。如果您忘记了这一点，例如写成`Color(0xFFF700)`，您将绘制出完全透明的颜色，并且永远看不到它。请记住，如果您的颜色不显示，请将典型的网页十六进制数字前面加上“FF”。"
  raw: '### 2\. TextTheme


    Your textTheme is comprised of 15 TextStyles. Setting them will automatically
    set the styles for certain widgets. For instance, changing the bodyMedium textStyle
    will in turn change the appearance of every Text widget, every ListItem, and every
    Navigator that you add. Setting the labelLarge textStyle will in turn set every
    TextButton, every ElevatedButton, every FAB, and every Chip you add. You have
    these general groupings:


    *   Display


    *   Headline


    *   Title


    *   Body


    *   Label


    And behind each of these, you have a small, a medium, and a large. Figure [10-5](#638603_1_En_10_Chapter.xhtml#Fig5)
    shows how they look.


    ![](images/638603_1_En_10_Chapter/638603_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    The TextTheme text styles in actual size


    Again, I recommend using .copyWith() to change the defaults. Like if you wanted
    to make every Text widget larger, you may do this:


    ```

    TextTheme _textTheme = const TextTheme().copyWith(

    bodyMedium: const TextStyle().copyWith(fontSize: 18.0),

    );

    ```


    Tip


    .copyWith() is a familiar pattern in Dart. Many, many classes are written to have
    a .copyWith() method that allows you to make incremental changes to a copy of
    an instance. Look for this pattern and you’ll be surprised how many times it turns
    up. In fact, write a .copyWith() method in your own classes and your fellow developers
    will thank you.


    ### 3\. Widget-Specific Themes


    Many of the other display widgets have styles that you can override when you don’t
    like the defaults. For instance, what if you wanted to change the way that all
    AppBars look? And all ListTiles?


    ```

    // Widget-specific themes

    AppBarTheme _appBarTheme = const AppBarTheme().copyWith(

    foregroundColor: _colorScheme.onTertiaryContainer,

    color: _colorScheme.tertiary,

    titleTextStyle: _textTheme.displayLarge!

    .copyWith(fontFamily: ''Courier''));

    ListTileThemeData _listTileThemeData = ListTileThemeData(

    tileColor: _colorScheme.secondary,

    textColor: _colorScheme.onSecondary,

    contentPadding: const EdgeInsets.all(10.0));

    ```


    Note that these are much lower-level and only apply to those particular widgets.
    Many widgets carry their own themes consisting of styles that are particular to
    that widget type. And of course once set in the Theme and applied to the MaterialApp,
    all widgets of that type will adhere. You’ve actually got quite a few widget themes:


    appBarTheme, textButtonTheme, elevatedButtonTheme, cardTheme, inputDecorationTheme,
    iconTheme, sliderTheme, tabBarTheme,drawerTheme, tooltipTheme, chipTheme, dialogTheme,
    pageTransitionTheme, floatingActionButtonTheme, NavigationRailTheme, snackBarTheme,
    bottomSheetTheme, popupMenuTheme, bannerTheme, buttonBarTheme, bottomNavigationBarTheme,
    timePickerTheme, outlinedButtonTheme, textSelectionTheme, dataTableTheme, checkboxTheme,
    radioButtonTheme, sliderTheme, switchTheme, progressIndicatorTheme.


    ### 4\. Put Them Together in a Theme


    It’s time to put all of this together in a theme. We’ve written a lot of code
    already, right? Themes are more verbose than you’d anticipate, so I recommend
    creating it in a separate file, say in theme.dart:


    ```

    ThemeData themeData = ThemeData(

    colorScheme: _colorScheme,

    textTheme: _textTheme,

    // Widget-specific themes only when needed

    appBarTheme: _appBarTheme,

    listTileTheme: _listTileThemeData,

    // Optionally set other specialized things here

    fontFamily: ''Courier'',

    fontFamilyFallback: const [''monospace'', ''serif''],

    );

    ```


    Then import that theme into your main.dart file and apply it to your MaterialApp:


    ```

    import ''./theme.dart'';

    class MyApp extends StatelessWidget {

    @override

    Widget build(BuildContext context) {

    return MaterialApp(

    title: ''Themes and Styles Demo'',

    theme: themeData,

    routes: {

    "/": (_) => const Dashboard(),

    ...,

    },

    );

    }

    }

    ```


    That’s it! Run your app and observe the glory of your awesome design! Nothing
    else is needed. Unless, that is, you need to apply individual styles sporadically.


    ### 5\. Override the Styles on Individual Widgets


    Last step. Setting your ColorScheme, your TextTheme, and your individual widget
    themes establishes the default look and feel for your app. But sometimes we want
    the one widget to be specially styled. Maybe a Text() you have at the top of the
    page should function as a page heading. Or what if you want one button to look
    different. Like an “Are you sure?” button. Maybe we want that one – just that
    one – to stand out from the others. So occasionally we want to set the style on
    an individual widget. When you have a theme, the best practice is to create a
    style based on a theme style, using .copyWith() to extend it. Then apply it to
    your special widget.


    ```

    // First, copy the default style & apply your customizations

    TextStyle dangerButtonStyle = Theme.of(context)

    .TextTheme.labelLarge.copyWith(

    fontSize: 18.0,

    fontWeight: FontWeight.bold,

    color: Colors.red,

    );

    // Use the custom style in your button widget

    TextButton(

    onPressed: () => deleteEverything(),

    child: Text("Are you sure?", style: dangerButtonStyle),

    );

    ```


    Tip


    We’ve seen that MaterialApp has a *theme*. It so happens that the theme is the
    lightTheme. MaterialApp also has a *darkTheme*. Create a darkTheme just like you
    did the regular (light) theme and point the MaterialApp to it. Now, your app can
    respond to the OS’s light and dark theme changes.


    ## Final Styling Thoughts


    Before we leave the subject of styling, we really should briefly discuss colors
    and fonts. If these don’t interest you immediately, feel free to skip to the end
    of the chapter. Come back to read this when you have a pressing need. But colors
    and fonts are not completely straightforward in Flutter. There are a few gotchas
    which we’ll discuss.


    ### A Word About Colors


    Most Flutter styles are very narrowly applied; they only make sense for certain
    tightly defined situations. On the other hand, colors are applied nearly everywhere
    (Figure [10-6](#638603_1_En_10_Chapter.xhtml#Fig6)). Borders, text, backgrounds,
    icons, buttons, and shadows all have colors. And they’re all specified in the
    same manner. For example, here’s white Text in a red container with a yellow border,
    and all of those widgets are colored identically with the syntax “color: Colors.somethingOrOther”:


    ![](images/638603_1_En_10_Chapter/638603_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    Colors are everywhere in Flutter


    ```

    child: Container(

    decoration: BoxDecoration(

    color: Colors.red,

    border: Border.all(color: Colors.yellow)

    ),

    child: Text(''Colors!'',

    style: TextStyle(color: Colors.white,),

    ),

    ),

    ```


    And you see those colored blocks in the background? Those were created like this:


    ```

    List _randomColors() {

    Random rnd = Random();

    return List.generate(25,

    (int i) => Container(

    color: Color.fromRGBO(

    rnd.nextInt(255), rnd.nextInt(255),

    rnd.nextInt(255), 1.0),

    ));

    }

    ```


    So you can create any of the 16+ million colors with Color.fromRGBO(red, green,
    blue, opacity) where each of the three RGB colors is a number between 0 and 255
    and the opacity is 1.0 for fully opaque and 0.0 for fully transparent. There’s
    also a Color.fromARGB(alpha, red, green, blue) which does the same things except
    moves the opacity to the front as alpha which is a number between 0 (fully transparent)
    to 255 (fully opaque).


    If you come from a web background, you might be more comfortable creating colors
    using hex numbers. This works also:


    ```

    color: Color(0xFFFF7F00),

    ```


    Caution


    Be careful. That hex number is actually “ARGB” where the first two hexadecimal
    characters are the alpha channel. If you forget it, like Color(0xFFF700), you’ll
    be painting it full transparent and you’ll never see it. Just remember that if
    your colors don’t show up, take that typical web hex number and put an “FF” in
    front of it.'
  trans: "\n### 2\\. `TextTheme`\n\n您的`textTheme`由 15 个`TextStyle`组成。设置它们将自动设置某些小部件的样式。例如，更改`bodyMedium`的`textStyle`将依次改变您添加的每个`Text`小部件、每个`ListItem`和每个`Navigator`的外观。设置`labelLarge`的`textStyle`将依次设置您添加的每个`TextButton`、每个`ElevatedButton`、每个`FAB`和每个`Chip`。您有以下通用分组：\n\
    \n*   Display\n*   Headline\n*   Title\n*   Body\n*   Label\n\n在每个组别背后，您都有 `small`、`medium`\
    \ 和 `large` 三种尺寸。图 10-5 展示了它们的外观。\n\n![](img/638603_1_En_10_Fig5_HTML.jpg)\n\n\
    **Figure 10-5** 实际尺寸下的 `TextTheme` 文本样式\n\n同样，我建议使用`.copyWith()`来更改默认值。例如，如果您想让每个`Text`小部件更大，可以这样做：\n\
    \n```dart\nTextTheme _textTheme = const TextTheme().copyWith(\n  bodyMedium: const\
    \ TextStyle().copyWith(fontSize: 18.0),\n);\n```\n\n> **小贴士**\n> `.copyWith()`\
    \ 是 Dart 中一种常见的模式。许多许多类都编写了`.copyWith()`方法，允许您对实例的副本进行增量更改。留意这种模式，您会惊讶于它出现的频率。事实上，在您自己的类中编写一个`.copyWith()`方法，您的开发者同行们会感谢您的。\n\
    \n### 3\\. 小部件特定主题\n\n当您不喜欢默认样式时，许多其他显示小部件也具有您可以覆盖的样式。例如，如果您想更改所有`AppBar`和所有`ListTile`的外观该怎么办？\n\
    \n```dart\n// Widget-specific themes\nAppBarTheme _appBarTheme = const AppBarTheme().copyWith(\n\
    \  foregroundColor: _colorScheme.onTertiaryContainer,\n  color: _colorScheme.tertiary,\n\
    \  titleTextStyle: _textTheme.displayLarge!\n    .copyWith(fontFamily: 'Courier'));\n\
    ListTileThemeData _listTileThemeData = ListTileThemeData(\n  tileColor: _colorScheme.secondary,\n\
    \  textColor: _colorScheme.onSecondary,\n  contentPadding: const EdgeInsets.all(10.0));\n\
    ```\n\n请注意，这些主题的层级要低得多，并且仅适用于那些特定的部件。许多小部件都有自己的主题，这些主题由特定于该小部件类型的样式组成。当然，一旦在`Theme`中设置并应用于`MaterialApp`，所有该类型的小部件都将遵循该主题。实际上，您拥有相当多的小部件主题：\n\
    \n`appBarTheme`, `textButtonTheme`, `elevatedButtonTheme`, `cardTheme`, `inputDecorationTheme`,\
    \ `iconTheme`, `sliderTheme`, `tabBarTheme`, `drawerTheme`, `tooltipTheme`, `chipTheme`,\
    \ `dialogTheme`, `pageTransitionTheme`, `floatingActionButtonTheme`, `NavigationRailTheme`,\
    \ `snackBarTheme`, `bottomSheetTheme`, `popupMenuTheme`, `bannerTheme`, `buttonBarTheme`,\
    \ `bottomNavigationBarTheme`, `timePickerTheme`, `outlinedButtonTheme`, `textSelectionTheme`,\
    \ `dataTableTheme`, `checkboxTheme`, `radioButtonTheme`, `sliderTheme`, `switchTheme`,\
    \ `progressIndicatorTheme`。\n\n### 4\\. 将它们整合到一个主题中\n\n是时候将所有这些整合到一个主题中了。我们已经写了很多代码，对吧？主题比您预期的要冗长得多，所以我建议在一个单独的文件中创建它，例如在`theme.dart`中：\n\
    \n```dart\nThemeData themeData = ThemeData(\n  colorScheme: _colorScheme,\n  textTheme:\
    \ _textTheme,\n  // Widget-specific themes only when needed\n  appBarTheme: _appBarTheme,\n\
    \  listTileTheme: _listTileThemeData,\n  // Optionally set other specialized things\
    \ here\n  fontFamily: 'Courier',\n  fontFamilyFallback: const ['monospace', 'serif'],\n\
    );\n```\n\n然后将该主题导入到您的`main.dart`文件中，并将其应用于您的`MaterialApp`：\n\n```dart\nimport\
    \ './theme.dart';\nclass MyApp extends StatelessWidget {\n  @override\n  Widget\
    \ build(BuildContext context) {\n    return MaterialApp(\n      title: 'Themes\
    \ and Styles Demo',\n      theme: themeData,\n      routes: {\n        \"/\":\
    \ (_) => const Dashboard(),\n        ...,\n      },\n    );\n  }\n}\n```\n\n就是这样！运行您的应用并观察您出色设计的辉煌！无需其他操作。除非，您需要零星地应用单个样式。\n\
    \n### 5\\. 覆盖单个小部件的样式\n\n最后一步。设置您的`ColorScheme`、`TextTheme`和单个小部件主题为您的应用建立了默认的外观和感觉。但有时我们希望某个单独的小部件具有特殊样式。也许您放在页面顶部的`Text()`应该作为页面标题。或者如果您希望一个按钮看起来不同。比如一个“您确定吗？”按钮。也许我们希望那一个按钮——仅仅那一个——从其他按钮中脱颖而出。因此，我们偶尔需要为单个小部件设置样式。当您有主题时，最佳实践是基于主题样式创建一个样式，使用`.copyWith()`来扩展它。然后将其应用于您的特殊小部件。\n\
    \n```dart\n// First, copy the default style & apply your customizations\nTextStyle\
    \ dangerButtonStyle = Theme.of(context)\n    .textTheme\n    .labelLarge\n   \
    \ .copyWith(\n        fontSize: 18.0,\n        fontWeight: FontWeight.bold,\n\
    \        color: Colors.red,\n    );\n// Use the custom style in your button widget\n\
    TextButton(\n    onPressed: () => deleteEverything(),\n    child: Text(\"Are you\
    \ sure?\", style: dangerButtonStyle),\n);\n```\n\n> **小贴士**\n> 我们已经看到`MaterialApp`有一个*theme*。碰巧这个主题就是`lightTheme`。`MaterialApp`还有一个*`darkTheme`*。像创建常规（亮色）主题一样创建一个`darkTheme`，并将`MaterialApp`指向它。现在，您的应用可以响应操作系统的亮色和暗色主题变化。\n\
    \n## 关于样式设计的最后思考\n\n在我们结束样式设计这个话题之前，我们确实应该简要讨论一下颜色和字体。如果这些不是您当前立即感兴趣的内容，请随意跳到本章结尾。当您有迫切需求时，再回来看这部分。但在\
    \ Flutter 中，颜色和字体并非完全简单明了。有一些需要注意的陷阱我们将进行讨论。\n\n### 关于颜色的补充说明\n\n大多数 Flutter 样式的应用范围非常狭窄；它们仅对某些严格定义的情况有意义。另一方面，颜色几乎应用于所有地方（图\
    \ 10-6）。边框、文本、背景、图标、按钮和阴影都有颜色。并且它们都以相同的方式指定。例如，下面是一个红色容器中的白色文本，带有黄色边框，所有这些小部件都使用语法`color:\
    \ Colors.somethingOrOther`进行着色：\n\n![](img/638603_1_En_10_Fig6_HTML.jpg)\n\n**Figure\
    \ 10-6** Flutter 中的颜色无处不在\n\n```dart\nchild: Container(\n  decoration: BoxDecoration(\n\
    \    color: Colors.red,\n    border: Border.all(color: Colors.yellow)\n  ),\n\
    \  child: Text('Colors!',\n    style: TextStyle(color: Colors.white,),\n  ),\n\
    ),\n```\n\n您看到背景中那些彩色方块了吗？它们的创建方式如下：\n\n```dart\nList _randomColors() {\n  Random\
    \ rnd = Random();\n  return List.generate(25,\n    (int i) => Container(\n   \
    \   color: Color.fromRGBO(\n        rnd.nextInt(255), rnd.nextInt(255),\n    \
    \    rnd.nextInt(255), 1.0),\n    ));\n}\n```\n\n因此，您可以使用`Color.fromRGBO(red,\
    \ green, blue, opacity)`创建超过 1600 万种颜色中的任何一种，其中三个 RGB 颜色分量每个都是 0 到 255 之间的数字，`opacity`（不透明度）为\
    \ 1.0 表示完全不透明，0.0 表示完全透明。还有一个`Color.fromARGB(alpha, red, green, blue)`，它执行相同的功能，只是将不透明度作为`alpha`移到前面，它是一个介于\
    \ 0（完全透明）到 255（完全不透明）之间的数字。\n\n如果您有 Web 开发背景，您可能更习惯使用十六进制数字创建颜色。这同样有效：\n\n```dart\n\
    color: Color(0xFFFF7F00),\n```\n\n> **注意**\n> 请小心。那个十六进制数字实际上是“ARGB”，其中前两个十六进制字符是\
    \ alpha 通道。如果您忘记了这一点，例如写成`Color(0xFFF700)`，您将绘制出完全透明的颜色，并且永远看不到它。请记住，如果您的颜色不显示，请将典型的网页十六进制数字前面加上“FF”。\n"
- fmt: "### Custom Fonts\n\nThere are some fonts that are built-in like `Courier`,\
    \ `Times New Roman`, `serif`, and a bunch more. How many more? It depends on the\
    \ type of device on which the app is running. Since we don’t have control over\
    \ the users’ devices, the best practice is for you to stick to the default font\
    \ family unless you install and use a custom font. Let’s talk about how to do\
    \ that.\n\nCertain designers call for custom fonts when they design scenes. It\
    \ turns out with Flutter, using custom fonts is easy to implement, and they work\
    \ cross-platform. It involves three steps:\n\n![](images/638603_1_En_10_Chapter/638603_1_En_10_Fig7_HTML.jpg)\n\
    \nFigure 10-7: Fonts are usually stored in a folder called `fonts`\n\n1.  Download\
    \ the custom font files which are in `ttf`, `woff`, or `woff2` format. These are\
    \ customarily stored in a root-level folder called `fonts`, but the name is up\
    \ to you (Figure [10-7](#638603_1_En_10_Chapter.xhtml#Fig7)).\n\n    **Tip:**\
    \ You can find some excellent and free fonts at `http://fonts.google.com`. Search\
    \ through them by type, see samples, and download them easily.\n\n2.  Add the\
    \ font files to the `pubspec.yaml` file under `flutter/fonts` so that the compiler\
    \ is notified to bundle them in the installation file.\n\n    ```\n    flutter:\n\
    \      fonts:\n        - family: MrDafoe\n          fonts:\n            - asset:\
    \ fonts/MrDafoe-Regular.ttf\n        - family: NanumBrushScript\n          fonts:\n\
    \            - asset: fonts/NanumBrushScript-Regular.ttf\n    ```\n\n3.  Use the\
    \ case-insensitive font name in the `fontFamily` property of the `TextStyle` widget\
    \ like we talked about in the previous sections:\n\n    ```\n    Text(loremIpsums[0]),\
    \  // Unstyled\n    Text(loremIpsums[1],   // Some, like Courier may be built-in\n\
    \          style: TextStyle(fontFamily: 'Courier'),),\n    Text(loremIpsums[2],\n\
    \          style: TextStyle(fontFamily: 'NanumBrushScript'),),\n    Text(loremIpsums[3],\n\
    \          style: TextStyle(fontFamily: 'MrDafoe'),),\n    ```\n\nThe preceding\
    \ example might look like Figure [10-8](#638603_1_En_10_Chapter.xhtml#Fig8).\n\
    \n![](images/638603_1_En_10_Chapter/638603_1_En_10_Fig8_HTML.jpg)\n\nFigure 10-8:\
    \ Available fonts\n\n## Conclusion\n\nAs you can see, the options for styling\
    \ things in Flutter are near infinite. Flutter styling is by no means the same\
    \ as CSS. First, it is more verbose. Second, it doesn’t inherit. Some people may\
    \ resent these characteristics, but others will like the cleanness that it creates.\n\
    \nRegardless of how you feel about that, you’ve got to be impressed with the styling\
    \ power that Flutter provides, especially when you think about how styles are\
    \ organized in themes so we can present a consistent, professional look and feel\
    \ throughout our app.\n\nNow, for the moment you’ve all been waiting for … let’s\
    \ learn how to layout our widgets in a scene!\n\n# 11. Laying Out Your Widgets\n\
    \nWe’ve made a ton of progress, but a major topic remains – controlling the visual\
    \ layout of your app’s widgets. We need fine-grained control of how widgets appear\
    \ on the screen – size, location, and spacing. Here’s how we’ll tackle this.\n\
    \n## Our Approach\n\nTo master layouts, we must know how to do five things:\n\n\
    1.  Layout the entire scene\n2.  Position widgets relative to each other\n3. \
    \ Fix overflows, like when your widgets don’t fit on a screen\n4.  Handle extra\
    \ space, like when your screen is bigger than it needs to be\n5.  Fine-tune the\
    \ position\n\nThis will be our plan for the next five chapters, one step for each\
    \ chapter.\n\n### 1. Layout the Entire Screen (a.k.a. Scene)\n\nIn the current\
    \ chapter, we’ll learn how Flutter thinks when it lays out. We’ll set the look\
    \ and feel of the entire app (with `MaterialApp`) and create the outer structure\
    \ of the scene like the title and menus (with a `Scaffold`) (Figure [11-1](#638603_1_En_11_Chapter.xhtml#Fig1)).\n\
    \n![](images/638603_1_En_11_Chapter/638603_1_En_11_Fig1_HTML.jpg)\n\nFigure 11-1:\
    \ Title and menu appear at the top along with other things like action buttons\n\
    \n### 2. Position Widgets Above and Below Each Other or Side by Side\n\nWhen designing\
    \ any scene, we break it into widgets and place them on the screen. For example,\
    \ the following scene (Figure [11-2](#638603_1_En_11_Chapter.xhtml#Fig2)) must\
    \ be broken into widgets. Since it is a list of people, we might create a bunch\
    \ of custom `PersonCard` widgets (Figure [11-3](#638603_1_En_11_Chapter.xhtml#Fig3)),\
    \ placing them above and below each other. We might do that with a `Column` widget.\n\
    \n![](images/638603_1_En_11_Chapter/638603_1_En_11_Fig3_HTML.jpg)\n\nFigure 11-3:\
    \ We might create a `PersonCard` widget\n\n![](images/638603_1_En_11_Chapter/638603_1_En_11_Fig2_HTML.jpg)\n\
    \nFigure 11-2: A `Column` can place widgets above and below each other\n\nThen\
    \ in turn, each `PersonCard` widget should have an image side by side with text\
    \ (Figure [11-4](#638603_1_En_11_Chapter.xhtml#Fig4)). How do you get the text\
    \ next to the image? We’ll use a `Row` widget. Also notice that the text is a\
    \ series of data about that person. How do you get the text above and below? We’ll\
    \ use a `Column` widget again.\n\n![](images/638603_1_En_11_Chapter/638603_1_En_11_Fig4_HTML.jpg)\n\
    \nFigure 11-4: `Row` widgets and `Column` widgets can be used to place things\n\
    \nPlacing widgets will be the subject of Chapter [12](#638603_1_En_12_Chapter.xhtml),\
    \ “Layout – Positioning Widgets.”\n\n### 3. Handle Situations When We Run Out\
    \ of Space and Overflow the Scene\n\nIn the scene with all of the `PersonCard`s,\
    \ we have more people than we have screen so we’ve overflowed it. This normally\
    \ throws an error, but there are several ways to fix the situation. We’ll look\
    \ at the strategies in Chapter [13](#638603_1_En_13_Chapter.xhtml), “Layout –\
    \ Fixing Overflows.”\n\n### 4. Handle Extra Space in the Scene\n\nHey, there’s\
    \ extra space on the right side of each Person. What if we wanted that space to\
    \ be on the between the picture and text? Or what if we wanted to put some of\
    \ that extra space on the left of the image? Chapter [14](#638603_1_En_14_Chapter.xhtml),\
    \ “Layout – Filling Extra Space,” will show us how to distribute that space in\
    \ eye-pleasing ways.\n\n### 5. Make Finer Adjustments in Positioning\n\nAnd for\
    \ the last step in layouts, you’ll probably want to perfect your scene by making\
    \ tweaks to padding, margin, and alignment. This will keep our scene from feeling\
    \ crowded. What can we do to create a little elbow room? In Chapter [15](#638603_1_En_15_Chapter.xhtml),\
    \ “Layout – Fine-Tuning Positioning,” we’ll learn to make the layout look a little\
    \ more like Figure [11-5](#638603_1_En_11_Chapter.xhtml#Fig5).\n\n![](images/638603_1_En_11_Chapter/638603_1_En_11_Fig5_HTML.jpg)\n\
    \nFigure 11-5: Fine-tuned spacing\n\nAlright, so there’s our plan for the entire\
    \ section of the book. We’ll do a deep dive into each of the five steps in a chapter\
    \ each. Ready for step one? Let’s go!\n\n## Laying Out the Whole Scene\n\nHere’s\
    \ a tip for you: Apps should never surprise their users.^([^(23)](#fn23)) When\
    \ apps do things in the way that the user expects, they think the app is friendly,\
    \ simple, and easy. Users have been trained to see a status bar at the top followed\
    \ by a title bar. And while other screen affordances will vary based on need,\
    \ there are definite conventions. Flutter has widgets to make your layouts feel\
    \ … well … *normal*."
  raw: "### Custom Fonts\n\nThere are some fonts that are built-in like Courier, Times\
    \ New Roman, serif, and a bunch more. How many more? It depends on the type of\
    \ device on which the app is running. Since we don’t have control over the users’\
    \ devices, the best practice is for you to stick to the default font family unless\
    \ you install and use a custom font. Let’s talk about how to do that.\n\nCertain\
    \ designers call for custom fonts when they design scenes. It turns out with Flutter,\
    \ using custom fonts is easy to implement, and they work cross-platform. It involves\
    \ three steps:\n\n![](images/638603_1_En_10_Chapter/638603_1_En_10_Fig7_HTML.jpg)\n\
    \nFigure 10-7\n\nFonts are usually stored in a folder called fonts\n\n1.  Download\
    \ the custom font files which are in ttf, woff, or woff2 format. These are customarily\
    \ stored in a root-level folder called fonts, but the name is up to you (Figure\
    \ [10-7](#638603_1_En_10_Chapter.xhtml#Fig7)).\n\nTip\n\nYou can find some excellent\
    \ and free fonts at [`http://fonts.google.com`](http://fonts.google.com). Search\
    \ through them by type, see samples, and download them easily.\n\n1.  Add the\
    \ font files to the pubspec.yaml file under flutter/fonts so that the compiler\
    \ is notified to bundle them in the installation file.\n\n    ```\n    flutter:\n\
    \    fonts:\n    - family: MrDafoe\n    fonts:\n    - asset: fonts/MrDafoe-Regular.ttf\n\
    \    - family: NanumBrushScript\n    fonts:\n    - asset: fonts/NanumBrushScript-Regular.ttf\n\
    \    ```\n\n2.  Use the case-insensitive font name in the fontFamily property\
    \ of the TextStyle widget like we talked about in the previous sections:\n\n \
    \   ```\n    Text(loremIpsums[0]),  // Unstyled\n    Text(loremIpsums[1],   //\
    \ Some, like Courier may be built-in\n    style: TextStyle(fontFamily: 'Courier'),),\n\
    \    Text(loremIpsums[2],\n    style: TextStyle(fontFamily: 'NanumBrushScript'),),\n\
    \    Text(loremIpsums[3],\n    style: TextStyle(fontFamily: 'MrDafoe'),),\n  \
    \  ```\n\nThe preceding example might look like Figure [10-8](#638603_1_En_10_Chapter.xhtml#Fig8).\n\
    \n![](images/638603_1_En_10_Chapter/638603_1_En_10_Fig8_HTML.jpg)\n\nFigure 10-8\n\
    \nAvailable fonts\n\n## Conclusion\n\nAs you can see, the options for styling\
    \ things in Flutter are near infinite. Flutter styling is by no means the same\
    \ as CSS. First, it is more verbose. Second, it doesn’t inherit. Some people may\
    \ resent these characteristics, but others will like the cleanness that it creates.\n\
    \nRegardless of how you feel about that, you’ve got to be impressed with the styling\
    \ power that Flutter provides, especially when you think about how styles are\
    \ organized in themes so we can present a consistent, professional look and feel\
    \ throughout our app.\n\nNow, for the moment you’ve all been waiting for … let’s\
    \ learn how to lay out our widgets in a scene!\n\n# 11. Laying Out Your Widgets\n\
    \nWe’ve made a ton of progress, but a major topic remains – controlling the visual\
    \ layout of your app’s widgets. We need fine-grained control of how widgets appear\
    \ on the screen – size, location, and spacing. Here’s how we’ll tackle this.\n\
    \n## Our Approach\n\nTo master layouts, we must know how to do five things:\n\n\
    1.  Layout the entire scene\n\n2.  Position widgets relative to each other\n\n\
    3.  Fix overflows, like when your widgets don’t fit on a screen\n\n4.  Handle\
    \ extra space, like when your screen is bigger than it needs to be\n\n5.  Fine-tune\
    \ the position\n\nThis will be our plan for the next five chapters, one step for\
    \ each chapter.\n\n### 1\\. Layout the Entire Screen (a.k.a. Scene)\n\nIn the\
    \ current chapter, we’ll learn how Flutter thinks when it lays out. We’ll set\
    \ the look and feel of the entire app (with MaterialApp) and create the outer\
    \ structure of the scene like the title and menus (with a Scaffold) (Figure [11-1](#638603_1_En_11_Chapter.xhtml#Fig1)).\n\
    \n![](images/638603_1_En_11_Chapter/638603_1_En_11_Fig1_HTML.jpg)\n\nFigure 11-1\n\
    \nTitle and menu appear at the top along with other things like action buttons\n\
    \n### 2\\. Position Widgets Above and Below Each Other or Side by Side\n\nWhen\
    \ designing any scene, we break it into widgets and place them on the screen.\
    \ For example, the following scene (Figure [11-2](#638603_1_En_11_Chapter.xhtml#Fig2))\
    \ must be broken into widgets. Since it is a list of people, we might create a\
    \ bunch of custom PersonCard widgets (Figure [11-3](#638603_1_En_11_Chapter.xhtml#Fig3)),\
    \ placing them above and below each other. We’d might do that with a Column widget.\n\
    \n![](images/638603_1_En_11_Chapter/638603_1_En_11_Fig3_HTML.jpg)\n\nFigure 11-3\n\
    \nWe might create a PersonCard widget\n\n![](images/638603_1_En_11_Chapter/638603_1_En_11_Fig2_HTML.jpg)\n\
    \nFigure 11-2\n\nA Column can place widgets above and below each other\n\nThen\
    \ in turn, each PersonCard widget should have an image side by side with text\
    \ (Figure [11-4](#638603_1_En_11_Chapter.xhtml#Fig4)). How do you get the text\
    \ next to the image? We’ll use a Row widget. Also notice that the text is a series\
    \ of data about that person. How do you get the text above and below? We’ll use\
    \ a Column widget again.\n\n![](images/638603_1_En_11_Chapter/638603_1_En_11_Fig4_HTML.jpg)\n\
    \nFigure 11-4\n\nRow widgets and Column widgets can be used to place things\n\n\
    Placing widgets will be the subject of Chapter [12](#638603_1_En_12_Chapter.xhtml),\
    \ “Layout – Positioning Widgets.”\n\n### 3\\. Handle Situations When We Run Out\
    \ of Space and Overflow the Scene\n\nIn the scene with all of the PersonCards,\
    \ we have more people than we have screen so we’ve overflowed it. This normally\
    \ throws an error, but there are several ways to fix the situation. We’ll look\
    \ at the strategies in Chapter [13](#638603_1_En_13_Chapter.xhtml), “Layout –\
    \ Fixing Overflows.”\n\n### 4\\. Handle Extra Space in the Scene\n\nHey, there’s\
    \ extra space on the right side of each Person. What if we wanted that space to\
    \ be on the between the picture and text? Or what if we wanted to put some of\
    \ that extra space on the left of the image? Chapter [14](#638603_1_En_14_Chapter.xhtml),\
    \ “Layout – Filling Extra Space,” will show us how to distribute that space in\
    \ eye-pleasing ways.\n\n### 5\\. Make Finer Adjustments in Positioning\n\nAnd\
    \ for the last step in layouts, you’ll probably want to perfect your scene by\
    \ making tweaks to padding, margin, and alignment. This will keep our scene from\
    \ feeling crowded. What can we do to create a little elbow room? In Chapter [15](#638603_1_En_15_Chapter.xhtml),\
    \ “Layout – Fine-Tuning Positioning,” we’ll learn to make the layout look a little\
    \ more like Figure [11-5](#638603_1_En_11_Chapter.xhtml#Fig5).\n\n![](images/638603_1_En_11_Chapter/638603_1_En_11_Fig5_HTML.jpg)\n\
    \nFigure 11-5\n\nFine-tuned spacing\n\nAlright, so there’s our plan for the entire\
    \ section of the book. We’ll do a deep dive into each of the five steps in a chapter\
    \ each. Ready for step one? Let’s go!\n\n## Laying Out the Whole Scene\n\nHere’s\
    \ a tip for you: Apps should never surprise their users.^([^(23)](#fn23)) When\
    \ apps do things in the way that the user expects, they think the app is friendly,\
    \ simple, and easy. Users have been trained to see a status bar at the top followed\
    \ by a title bar. And while other screen affordances will vary based on need,\
    \ there are definite conventions. Flutter has widgets to make your layouts feel\
    \ … well … *normal*."
  trans: "\n### 自定义字体\n\n有一些内置字体，例如 `Courier`、`Times New Roman`、`serif` 等等。还有多少种？这取决于应用运行的设备类型。由于我们无法控制用户的设备，最佳实践是坚持使用默认字体系列，除非你安装并使用自定义字体。我们来谈谈如何做到这一点。\n\
    \n某些设计师在设计场景时会要求使用自定义字体。事实证明，使用 Flutter 实现自定义字体非常简单，并且它们可以跨平台工作。这涉及三个步骤：\n\n![](img/638603_1_En_10_Fig7_HTML.jpg)\n\
    \n图 10-7：字体通常存储在一个名为 `fonts` 的文件夹中\n\n1.  下载格式为 `ttf`、`woff` 或 `woff2` 的自定义字体文件。这些文件通常存储在根级别的\
    \ `fonts` 文件夹中，但名称由你决定（图 10-7）。\n\n    **提示：** 你可以在 `http://fonts.google.com`\
    \ 找到一些优秀的免费字体。可以通过类型搜索它们，查看示例，并轻松下载。\n\n2.  将字体文件添加到 `pubspec.yaml` 文件的 `flutter/fonts`\
    \ 部分，以便通知编译器将它们打包到安装文件中。\n\n    ```\n    flutter:\n      fonts:\n        - family:\
    \ MrDafoe\n          fonts:\n            - asset: fonts/MrDafoe-Regular.ttf\n\
    \        - family: NanumBrushScript\n          fonts:\n            - asset: fonts/NanumBrushScript-Regular.ttf\n\
    \    ```\n\n3.  像我们在前几节中讨论的那样，在 `TextStyle`  widget 的 `fontFamily` 属性中使用不区分大小写的字体名称：\n\
    \n    ```\n    Text(loremIpsums[0]),  // 无样式\n    Text(loremIpsums[1],   // 有些字体，比如\
    \ Courier，可能是内置的\n          style: TextStyle(fontFamily: 'Courier'),),\n    Text(loremIpsums[2],\n\
    \          style: TextStyle(fontFamily: 'NanumBrushScript'),),\n    Text(loremIpsums[3],\n\
    \          style: TextStyle(fontFamily: 'MrDafoe'),),\n    ```\n\n上述示例可能看起来像图\
    \ 10-8。\n\n![](img/638603_1_En_10_Fig8_HTML.jpg)\n\n图 10-8：可用的字体\n\n## 结论\n\n\
    如你所见，在 Flutter 中设置样式的选项几乎是无限的。Flutter 的样式设置与 CSS 完全不同。首先，它更加冗长。其次，它不支持继承。有些人可能不喜欢这些特性，但另一些人则会喜欢由此带来的简洁性。\n\
    \n无论你对此有何看法，你都会对 Flutter 提供的样式能力印象深刻，尤其是当你考虑到样式是如何在主题中组织，以便我们可以在整个应用中呈现一致且专业的观感时。\n\
    \n现在，大家期待已久的时刻到了……让我们学习如何在场景中布局我们的 widget！\n\n# 11. 布局你的 Widget\n\n我们已经取得了很大进展，但一个主要话题仍然存在——控制应用\
    \ app 的视觉布局。我们需要精细控制 widget 在屏幕上的显示方式——大小、位置和间距。以下是我们将如何解决这个问题。\n\n## 我们的方法\n\n\
    要掌握布局，我们需要知道如何做五件事：\n\n1.  布局整个场景\n2.  相对于彼此定位 widget\n3.  解决溢出问题，例如当你的 widget\
    \ 无法在屏幕上容纳时\n4.  处理额外空间，例如当你的屏幕比所需空间更大时\n5.  微调位置\n\n这将是我们接下来五章的计划，每章一步。\n\n###\
    \ 1. 布局整个屏幕（即场景）\n\n在本章中，我们将学习 Flutter 在布局时的思考方式。我们将设置整个应用的观感（使用 `MaterialApp`），并创建场景的外部结构，例如标题和菜单（使用\
    \ `Scaffold`）（图 11-1）。\n\n![](img/638603_1_En_11_Fig1_HTML.jpg)\n\n图 11-1：标题和菜单出现在顶部，此外还有其他元素，如操作按钮\n\
    \n### 2. 将 Widget 上下放置或并排放置\n\n在设计任何场景时，我们将其分解为 widget 并放置在屏幕上。例如，以下场景（图 11-2）必须分解为\
    \ widget 。由于这是一个人员列表，我们可能会创建一堆自定义的 `PersonCard` widget（图 11-3），并将它们上下放置。我们可以使用\
    \ `Column` widget 来实现这一点。\n\n![](img/638603_1_En_11_Fig3_HTML.jpg)\n\n图 11-3：我们可能会创建一个\
    \ `PersonCard` widget\n\n![](img/638603_1_En_11_Fig2_HTML.jpg)\n\n图 11-2：`Column`\
    \ 可以将 widget 上下放置\n\n然后反过来，每个 `PersonCard` widget 应该有一个图像与文本并排放置（图 11-4）。如何让文本出现在图像旁边？我们将使用\
    \ `Row` widget。还要注意，文本是关于该人员的一系列数据。如何让文本上下排列？我们将再次使用 `Column` widget。\n\n![](img/638603_1_En_11_Fig4_HTML.jpg)\n\
    \n图 11-4：`Row` widget 和 `Column` widget 可用于放置元素\n\n放置 widget 将是第 12 章“布局 – 定位\
    \ Widget”的主题。\n\n### 3. 处理空间不足和场景溢出的情况\n\n在包含所有 `PersonCard` 的场景中，我们的人数超过了屏幕的显示能力，因此发生了溢出。这通常会导致错误，但有几种方法可以解决这个问题。我们将在第\
    \ 13 章“布局 – 解决溢出”中探讨相关策略。\n\n### 4. 处理场景中的额外空间\n\n嘿，每个人的右侧都有额外的空间。如果我们希望将这部分空间放置在图片和文本之间会怎样？或者如果我们希望将部分额外空间放在图片的左侧会怎样？第\
    \ 14 章“布局 – 填充额外空间”将向我们展示如何以悦目的方式分配这些空间。\n\n### 5. 对定位进行更精细的调整\n\n对于布局的最后一步，你可能会希望通过调整内边距、外边距和对齐方式来完善你的场景。这样可以防止场景显得拥挤。我们能做些什么来创造一些活动空间？在第\
    \ 15 章“布局 – 微调定位”中，我们将学习如何使布局看起来更像图 11-5。\n\n![](img/638603_1_En_11_Fig5_HTML.jpg)\n\
    \n图 11-5：微调后的间距\n\n好了，这就是我们在本书整个部分的计划。我们将在每章中深入探讨这五个步骤中的每一个。准备好开始第一步了吗？开始吧！\n\n\
    ## 布局整个场景\n\n这里有一个提示给你：应用永远不应该让用户感到惊讶。^((23)) 当应用以用户期望的方式运行时，用户会认为该应用友好、简单且易用。用户已经被训练成习惯在顶部看到一个状态栏，后面跟着一个标题栏。虽然其他屏幕功能会根据需要有所不同，但存在明确的约定。Flutter\
    \ 拥有使你的布局感觉……嗯……*正常* 的 widget。\n"
- fmt: "### `MaterialApp` Widget\n\nThe Root App widget creates the outer framework\
    \ for your app. As important as it is, the user never sees the App widget because\
    \ no parts of it are technically visible. It wraps your entire app, allowing an\
    \ app title so that when iOS/Android moves the app into the background, it’ll\
    \ have a name. The App widget is where you’ll apply the default theme for your\
    \ app – fonts, sizes, colors, and so forth. It’s also the place to specify routes.\n\
    \nYou have three choices for an App, a `MaterialApp`, a `CupertinoApp`, or a custom\
    \ App widget that you create.\n\nMost Flutter widgets work in any of the three\
    \ Apps. The App widget merely lets you choose your base look and feel. If you\
    \ place Cupertino widgets in a `CupertinoApp`, they’ll look exactly like iOS apps.\
    \ If you place Material-conforming widgets in a `MaterialApp`, they’ll look more\
    \ like an Android app.\n\n“Yeah, but I need it to look like iOS on iOS and Android\
    \ on Android!”, you say. Okay, I get it. That’s doable. You can create your own\
    \ custom App widget that inherits from `WidgetApp` and perform a lot of conditional\
    \ drawing like this:\n\n```\nPlatform.isIOS ? CupertinoButton(...) : ElevatedButton(...)\n\
    ```\n\nBut, yikes! That’s a lot of low-level code to write and frankly negates\
    \ the benefit of cross-platform so most devs don’t bother with this. In the community,\
    \ over 95% of projects use `MaterialApp`. Only a small fraction use `CupertinoApp`\
    \ or a custom App widget derived from `WidgetApp`. Using `MaterialApp` is standard\
    \ practice.\n\n|   | `MaterialApp` | `CupertinoApp` | `WidgetApp` |\n| --- | ---\
    \ | --- | --- |\n| Conforms to standard | Google’s Material Design Guidelines\
    \ | Apple’s Human Interface Guidelines | None |\n| Look-and-feel | Google/Android\
    \ | iOS | Generic and flexible |\n| Real-world use | Most apps | iOS-first or\
    \ iOS-only apps | Base class for custom App widget creation |\n\nHere’s how a\
    \ `MaterialApp` may look:\n\n```\nWidget build(BuildContext context) {\n  return\
    \ MaterialApp(\n    home: MainWidget(),\n    title: \"My Cool App\",\n    theme:\
    \ _themeDefinedElsewhere,\n    routes: ({\n      '/scene1': (ctx) => MyWidget1(),\n\
    \      '/scene2': (ctx) => MyWidget2(),\n      '/scene3': (ctx) => MyWidget3(),\n\
    \    },\n    debugShowCheckedModeBanner: false,\n  );\n}\n```\n\n### The `Scaffold`\
    \ Widget\n\nWhereas the `MaterialApp` widget creates an **outer invisible** framework,\
    \ the `Scaffold` widget creates the **inner visible** framework.\n\n`Scaffold`\
    \ has one purpose in life: to lay out the visible structure of each scene to give\
    \ it the predictable and therefore usable layout that so many other apps have.\
    \ It creates, among other things:\n\n*   An `AppBar` for the title\n*   A section\
    \ for the body\n*   A navbar at the bottom or a navigation drawer to the left\n\
    *   A floating action button\n*   A bottom sheet – A section that is usually collapsed\
    \ but can be slid up to reveal context-aware information for the current scene\n\
    \n```\n@override\nWidget build(BuildContext context) {\n  return Scaffold(\n \
    \   appBar: MyAppBar(),\n    drawer: MyNavigationDrawer(),\n    body: TheRealContentOfThisPartOfTheApp(),\n\
    \    floatingActionButton: FloatingActionButton(\n      child: Icon(Icons.add),\n\
    \      onPressed: () { /* Do things here */},\n    ),\n    bottomSheet: MyBottomSheet,\n\
    \  );\n}\n```\n\nAll parts of the `Scaffold` are optional. That kind of makes\
    \ sense because you don’t always want a `floatingActionButton` or a `drawer` or\
    \ a `bottomNavigationBar`. Our screen designs will dictate which parts we want\
    \ and which we don’t.\n\n### The `AppBar` Widget\n\nTo create a header bar at\
    \ the top of the screen, use an `AppBar` widget (Figure [11-6](#638603_1_En_11_Chapter.xhtml#Fig6)).\
    \ This is strictly optional. But your users are totally going to expect an `AppBar`\
    \ for almost every app that isn’t a game. You’ll almost always have a title. And\
    \ you may want to add an Icon at the start. An Icon is the *leading* property:\n\
    \n![](images/638603_1_En_11_Chapter/638603_1_En_11_Fig6_HTML.jpg)\n\nFigure 11-6\n\
    \nThe `AppBar` widget with a leading icon and a title\n\n```\nreturn Scaffold(\n\
    \  appBar: AppBar(\n    leading: Icon(Icons.traffic),\n    title: Text(\"My Cool\
    \ App\"),\n  ),\n  /* More stuff here. FAB, body, drawer, etc. */\n);\n```\n\n\
    One problem though. If you have the leading icon and also a navigation drawer,\
    \ then Flutter can’t use that space to display the hamburger menu (Figure [11-7](#638603_1_En_11_Chapter.xhtml#Fig7)):\n\
    \n![](images/638603_1_En_11_Chapter/638603_1_En_11_Fig7_HTML.jpg)\n\nFigure 11-7\n\
    \nAn `AppBar` without a leading icon is able to display a hamburger menu icon\n\
    \n```\nreturn Scaffold(\n  appBar: AppBar(\n    /* No leading this time. */\n\
    \    title: Text(\"My Cool App\"),\n  ),\n  /* More stuff here. FAB, body, drawer,\
    \ etc. */\n);\n```\n\nIf you have a navigation drawer, you’re probably going to\
    \ want to omit the leading icon.\n\n### `SafeArea` Widget\n\nPhysical device screens\
    \ are seldom neat rectangles. They have rounded corners and notches and status\
    \ bars at the top. If we ignored those things, certain parts of our app would\
    \ be cut off or hidden. Don’t want that? Simply wrap the `SafeArea` widget around\
    \ all of your body content, and it will constrain your app to rendering below\
    \ notches, status bars, and rounded corners. Putting it inside the `Scaffold`\
    \ but around the body is a terrific place:\n\n```\nWidget build(BuildContext context)\
    \ {\n  return Scaffold(\n    drawer: LayoutDrawer(),\n    body: SafeArea(\n  \
    \    child: MyNormalBody(),\n    ),\n    floatingActionButton: FloatingActionButton(\n\
    \      child: Icon(Icons.next),\n      onPressed: () {},\n    ),\n  );\n}\n```\n\
    \n## Flutter’s Layout Algorithm\n\nBrace yourself, friends. This final section\
    \ of the chapter is not for the faint of heart. It’s some pretty high-level thinking\
    \ but to just skip it would be a disservice to you. Once you get your head around\
    \ how Flutter lays out, so many widgets and their proper usage suddenly make sense.\
    \ Without this understanding, we just hack at the code until it works – barely.\
    \ This is frustrating and produces easily-breakable code.\n\nSo dig deep with\
    \ me and let’s talk about Flutter’s layout algorithm. We’ll start with …"
  raw: '### MaterialApp Widget


    The Root App widget creates the outer framework for your app. As important as
    it is, the user never sees the App widget because no parts of it are technically
    visible. It wraps your entire app, allowing an app title so that when iOS/Android
    moves the app into the background, it’ll have a name. The App widget is where
    you’ll apply the default theme for your app – fonts, sizes, colors, and so forth.
    It’s also the place to specify routes.


    You have three choices for an App, a MaterialApp, a CupertinoApp, or a custom
    App widget that you create.


    Most Flutter widgets work in any of the three Apps. The App widget merely lets
    you choose your base look and feel. If you place Cupertino widgets in a CupertinoApp,
    they’ll look exactly like iOS apps. If you place Material-conforming widgets in
    a MaterialApp, they’ll look more like an Android app.


    “Yeah, but I need it to look like iOS on iOS and Android on Android!”, you say.
    Okay, I get it. That’s doable. You can create your own custom App widget that
    inherits from WidgetApp and perform a lot of conditional drawing like this:


    ```

    Platform.isIOS ? CupertinoButton(...) : ElevatedButton(...)

    ```


    But, yikes! That’s a lot of low-level code to write and frankly negates the benefit
    of cross-platform so most devs don’t bother with this. In the community, over
    95% of projects use MaterialApp. Only a small fraction use CupertinoApp or a custom
    App widget derived from WidgetApp. Using MaterialApp is standard practice.


    |   | MaterialApp | CupertinoApp | WidgetApp |

    | --- | --- | --- | --- |

    | Conforms to standard | Google’s Material Design Guidelines | Apple’s Human Interface
    Guidelines | None |

    | Look-and-feel | Google/Android | iOS | Generic and flexible |

    | Real-world use | Most apps | iOS-first or iOS-only apps | Base class for custom
    App widget creation |


    Here’s how a MaterialApp may look:


    ```

    Widget build(BuildContext context) {

    return MaterialApp(

    home: MainWidget(),

    title: "My Cool App",

    theme: _themeDefinedElsewhere,

    routes: ({

    ''/scene1'': (ctx) => MyWidget1(),

    ''/scene2'': (ctx) => MyWidget2(),

    ''/scene3'': (ctx) => MyWidget3(),

    },

    debugShowCheckedModeBanner: false,

    );

    }

    ```


    ### The Scaffold Widget


    Whereas the MaterialApp widget creates an **outer invisible** framework, the Scaffold
    widget creates the **inner visible** framework.


    Scaffold has one purpose in life: to lay out the visible structure of each scene
    to give it the predictable and therefore usable layout that so many other apps
    have. It creates, among other things:


    *   An AppBar for the title


    *   A section for the body


    *   A navbar at the bottom or a navigation drawer to the left


    *   A floating action button


    *   A bottom sheet – A section that is usually collapsed but can be slid up to
    reveal context-aware information for the current scene


    ```

    @override

    Widget build(BuildContext context) {

    return Scaffold(

    appBar: MyAppBar(),

    drawer: MyNavigationDrawer(),

    body: TheRealContentOfThisPartOfTheApp(),

    floatingActionButton: FloatingActionButton(

    child: Icon(Icons.add),

    onPressed: () { /* Do things here */},

    ),

    bottomSheet: MyBottomSheet,

    );

    }

    ```


    All parts of the Scaffold are optional. That kind of makes sense because you don’t
    always want a floatingActionButton or a drawer or a bottomNavigationBar. Our screen
    designs will dictate which parts we want and which we don’t.


    ### The AppBar Widget


    To create a header bar at the top of the screen, use an AppBar widget (Figure
    [11-6](#638603_1_En_11_Chapter.xhtml#Fig6)). This is strictly optional. But your
    users are totally going to expect an AppBar for almost every app that isn’t a
    game. You’ll almost always have a title. And you may want to add an Icon at the
    start. An Icon is the *leading* property:


    ![](images/638603_1_En_11_Chapter/638603_1_En_11_Fig6_HTML.jpg)


    Figure 11-6


    The AppBar widget with a leading icon and a title


    ```

    return Scaffold(

    appBar: AppBar(

    leading: Icon(Icons.traffic),

    title: Text("My Cool App"),

    ),

    /* More stuff here. FAB, body, drawer, etc. */

    );

    ```


    One problem though. If you have the leading icon and also a navigation drawer,
    then Flutter can’t use that space to display the hamburger menu (Figure [11-7](#638603_1_En_11_Chapter.xhtml#Fig7)):


    ![](images/638603_1_En_11_Chapter/638603_1_En_11_Fig7_HTML.jpg)


    Figure 11-7


    An AppBar without a leading icon is able to display a hamburger menu icon


    ```

    return Scaffold(

    appBar: AppBar(

    /* No leading this time. */

    title: Text("My Cool App"),

    ),

    /* More stuff here. FAB, body, drawer, etc. */

    );

    ```


    If you have a navigation drawer, you’re probably going to want to omit the leading
    icon.


    ### SafeArea Widget


    Physical device screens are seldom neat rectangles. They have rounded corners
    and notches and status bars at the top. If we ignored those things, certain parts
    of our app would be cut off or hidden. Don’t want that? Simply wrap the SafeArea
    widget around all of your body content, and it will constrain your app to rendering
    below notches, status bars, and rounded corners. Putting it inside the Scaffold
    but around the body is a terrific place:


    ```

    Widget build(BuildContext context) {

    return Scaffold(

    drawer: LayoutDrawer(),

    body: SafeArea(

    child: MyNormalBody(),

    ),

    floatingActionButton: FloatingActionButton(

    child: Icon(Icons.next),

    onPressed: () {},

    ),

    );

    }

    ```


    ## Flutter’s Layout Algorithm


    Brace yourself, friends. This final section of the chapter is not for the faint
    of heart. It’s some pretty high-level thinking but to just skip it would be a
    disservice to you. Once you get your head around how Flutter lays out, so many
    widgets and their proper usage suddenly make sense. Without this understanding,
    we just hack at the code until it works – barely. This is frustrating and produces
    easily-breakable code.


    So dig deep with me and let’s talk about Flutter’s layout algorithm. We’ll start
    with …'
