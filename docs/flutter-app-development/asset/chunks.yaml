- fmt: '### IntrinsicWidth


    If you want the children of a `Column` to all be the same width but not necessarily
    the entire width of the screen, use the `IntrinsicWidth` widget. With `crossAxisAlignment.stretch`,
    they all stretch to the maximum width (Figure [14-3](#638603_1_En_14_Chapter.xhtml#Fig3)),
    but wrapped in an `IntrinsicWidth`, they’ll all be the same size as the largest
    widget (Figures [14-4](#638603_1_En_14_Chapter.xhtml#Fig4) and [14-5](#638603_1_En_14_Chapter.xhtml#Fig5)).


    ![](images/638603_1_En_14_Chapter/638603_1_En_14_Fig5_HTML.jpg)


    Figure 14-5


    With `IntrinsicWidth` and a wider member, all are made wider


    ![](images/638603_1_En_14_Chapter/638603_1_En_14_Fig4_HTML.jpg)


    Figure 14-4


    With `IntrinsicWidth`, they’ll only be as wide as the widest member


    ![](images/638603_1_En_14_Chapter/638603_1_En_14_Fig3_HTML.jpg)


    Figure 14-3


    Without `IntrinsicWidth`, all children will stretch to the entire width


    ```

    IntrinsicWidth(

    child: Column(

    mainAxisAlignment: MainAxisAlignment.center,

    crossAxisAlignment: CrossAxisAlignment.stretch,

    children: [ ... ],

    ),

    ),

    ```


    Notice the third child widget, how in Figure [14-4](#638603_1_En_14_Chapter.xhtml#Fig4),
    it’s long but grows in Figure [14-5](#638603_1_En_14_Chapter.xhtml#Fig5). So you
    can see that as the width of the widest child increases, so do they all.


    ## Expanded Widget


    `mainAxisAlignment` is awesome if the spacing is cut and dried – you want equal
    spacing. This is the normal case. But what if you don’t want spacing at all? What
    if you want the widgets to expand to fill the remaining space? `Expanded` widget
    to the rescue!


    Let’s take this code for an example. It’s pictured in Figure [14-6](#638603_1_En_14_Chapter.xhtml#Fig6).


    ![](images/638603_1_En_14_Chapter/638603_1_En_14_Fig6_HTML.jpg)


    Figure 14-6


    This `Row` widget has lots of extra space


    ```

    Row(

    mainAxisAlignment: MainAxisAlignment.spaceAround,

    children: [

    SubWidget(),

    SubWidget(),

    SubWidget(),

    SubWidget(),

    SubWidget(),

    SubWidget(),

    ],

    ),

    ```


    When you wrap a `Row`/`Column`’s child in an `Expanded` widget, it makes that
    child *flexible,* meaning that if there is extra space, it will stretch along
    the main axis to fill that space.


    Here’s the same thing but with an `Expanded()` around the second widget. See in
    Figure [14-7](#638603_1_En_14_Chapter.xhtml#Fig7) how that widget now expands
    to gobble up all free space?


    ![](images/638603_1_En_14_Chapter/638603_1_En_14_Fig7_HTML.jpg)


    Figure 14-7


    The second widget is wrapped in an `Expanded`


    ```

    Row(

    mainAxisAlignment: MainAxisAlignment.spaceAround,

    children: [

    SubWidget(),

    Expanded(child: SubWidget()),

    SubWidget(),

    SubWidget(),

    SubWidget(),

    SubWidget(),

    ],

    ),

    ```


    Note that the `mainAxisAlignment` now makes no difference because there is no
    extra space. It’s all eaten up by the `Expanded`.


    What if we add another `Expanded`? Let’s put one around the third and fourth widgets
    also (Figure [14-8](#638603_1_En_14_Chapter.xhtml#Fig8)):


    ![](images/638603_1_En_14_Chapter/638603_1_En_14_Fig8_HTML.jpg)


    Figure 14-8


    `Expanded`s will divide the free space among them


    ```

    Row(

    children: [

    SubWidget(),

    Expanded(child: SubWidget()),

    Expanded(child: SubWidget()),

    Expanded(child: SubWidget()),

    SubWidget(),

    SubWidget(),

    ],

    ),

    ```


    Note that the second one is now smaller because the extra space is shared with
    the third and fourth widgets, divided equally among them.


    But wait! There’s more! We can control how much space each `Expanded` gets. The
    `Expanded` has a property called the *flex* factor which is an integer. When the
    `Row`/`Column` is laid out, the rigid elements are sized first. Then, the flexible
    ones are expanded according to their flex factor (Figure [14-9](#638603_1_En_14_Chapter.xhtml#Fig9)).
    In the preceding examples, the `Expanded`s had the default flex factor of 1 so
    they got an equal amount of space. But if we gave them different flex factors,
    they’ll expand at different rates:


    ![](images/638603_1_En_14_Chapter/638603_1_En_14_Fig9_HTML.jpg)


    Figure 14-9


    `Expanded`s have flex property to control how much extra space each gets


    ```

    Row(

    children: [

    SubWidget(),

    Expanded(flex: 1, child: SubWidget()),

    Expanded(flex: 3, child: SubWidget()),

    Expanded(flex: 2, child: SubWidget()),

    SubWidget(),

    SubWidget(),

    ],

    ),

    ```


    Notice that the free space has still been allocated to the `Expanded`s but in
    the proportions of 1, 3, and 2 instead of evenly. So the one with a flex factor
    of 3 gets three times as much space as the one with a flex factor of 1.


    ### Open Space with `Expanded`s


    Maybe you want empty space between things like we had with `mainAxisAlignment`,
    but you also want to control how big those spaces are. This is where `Spacer`
    and `SizedBox` widgets can help.


    `Spacer`s put an empty space between widgets in a `Row`/`Column`. Each `Spacer`
    has a flex factor that plays well with all the other flex factors along this axis.
    So if you want to distribute space proportionally, `Spacer`s will do the trick.


    Tip


    A `Spacer` is actually just an `Expanded` with an empty `Container` inside it.


    But sometimes you want to have fixed empty space, like you know precisely how
    many pixels you want to leave open. This is where a `SizedBox` can help. `SizedBox`es
    have `height` and `width` properties for fine-grained control. Figure [14-10](#638603_1_En_14_Chapter.xhtml#Fig10)
    shows this.


    ![](images/638603_1_En_14_Chapter/638603_1_En_14_Fig10_HTML.jpg)


    Figure 14-10


    `Spacer()` and `SizedBox()` add free space back in but put you in control as to
    where and how much


    ```

    Row(

    children: [

    SubWidget(),

    Spacer(),

    Expanded(flex: 1, child: SubWidget()),

    Spacer(flex: 2),

    Expanded(flex: 3, child: SubWidget()),

    Expanded(flex: 2, child: SubWidget()),

    SubWidget(),

    SizedBox(width: 10.0),

    SubWidget(),

    ],

    ),

    ```


    ## Conclusion


    We’ve covered laying out the scene including what to do if there is extra space
    on the scene or there isn’t enough of it. So let’s learn the last of our five
    topics, how to fine-tune the spacing and position of widgets. We’ll do this by
    exploring the box model.


    # 15. Layout – Fine-Tuning Positioning


    We’re almost finished with our learning journey, discovering how to lay out a
    Flutter scene. You’ve made it through all but the last step.


    1. Layout the entire scene


    2. Position widgets relative to each other


    3. Fix overflows, like when your widgets don’t fit on a screen


    4. Handle extra space, like when your screen is bigger than it needs to be


    5. Fine-tune the position


    At this point, we can put anything in a scene and position them next to or on
    top of one another in any imaginable configuration. If we run out of space, we
    can handle the overflows. And if we have too much space, we can expertly distribute
    it.


    Now if you’re ready to play in the big leagues, let’s talk about the fine-tuning.
    In this chapter, we’ll learn fine-grained control over all the pixels on the screen
    and it will center around the box model.'
