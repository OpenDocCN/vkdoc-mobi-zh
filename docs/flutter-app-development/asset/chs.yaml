- "# 2. 使用 Flutter 进行开发\n\n如上一章所述，Flutter 让我们能够创建在 Web、桌面电脑和移动设备上运行的应用程序（这确实是其主要吸引力所在）。但稍等片刻，我们究竟如何创建这些应用程序？应该使用哪种编辑器？Flutter\
  \ 项目中需要什么？如何编译 Dart 源代码？我们是否需要其他工具来支持项目？如何将其部署到浏览器或设备上进行测试？都是好问题，对吧？\n\n让我们在本章中解答这些问题以及更多内容。我们将涵盖两个重要主题：\n\
  \n1.  **所需工具** – 如何安装和维护 Flutter 工具链\n2.  **开发流程** – 如何创建、运行和调试应用程序\n\n> **注意**\n\
  >\n> 就其性质而言，跨平台应用开发工具涉及来自各个组织的大量变动部件，而这些组织在做出更改前很少相互协商。并且，由于我们面对的是前沿且年轻的技术，变化频繁发生。在本章中，我们尽量坚持提供永恒不变的信息，但即便如此，信息最终也可能变得过时。请查阅这些工具的开发者以获取最新和最好的信息。\n\
  \n## Flutter 工具链\n\n开发社区生产的有用工具不胜枚举，真可谓令人眼花缭乱。我们不打算涵盖所有工具。我们只想提供足够让你变得熟练，但又不会让你感到负担过重的信息。如果我跳过了你最喜欢的工具，还请见谅。\n\
  \n### Flutter SDK\n\nFlutter SDK 是唯一必不可少的工具。它包含 Flutter 编译器、项目创建器、设备管理器、测试运行器以及用于诊断甚至修复\
  \ Flutter 配置问题的工具。\n\n#### 安装 Flutter SDK\n\n安装说明可在此处找到：[`https://flutter.dev/docs/get-started/install`](https://flutter.dev/docs/get-started/install)。简而言之——这将涉及下载最新的工具压缩包，并设置你的\
  \ `PATH` 环境变量指向你解压该压缩包的文件夹。具体的步骤因操作系统而异，但该网站上的说明非常清晰。\n\n> **提示**\n>\n> 这一步看起来非常底层，而且听起来令人生畏，但完成这一步后，事情会变得更容易，也更不容易出错。不要让它使你气馁。\n\
  \n### 集成开发环境（IDE）\n\n理论上来说，并不真正需要 IDE。可以使用任何编辑器编写 Flutter 代码，然后使用你之前安装的 Flutter\
  \ SDK 进行编译和运行。但实际上，几乎没有人会这么做。他们为什么要这么做呢？以下 IDE 都内置了 Flutter 支持！\n\n#### 来自微软的 VS\
  \ Code\n\nVS Code 来自微软。它的官方名称是“Microsoft Visual Studio Code”，但我们大多数人只是叫它 VS Code。无论你怎么称呼它，请不要将其与微软的另一款名为“Microsoft\
  \ Visual Studio”的产品混淆。尽管名称相似，但它们不是同一回事。\n\n你可以在此处获取 VS Code：[`https://code.visualstudio.com`](https://code.visualstudio.com)。\n\
  \n#### 来自 JetBrains 的 Android Studio/IntelliJ\n\nAndroid Studio 和 IntelliJ 本质上是同一回事。它们基于相同的代码库构建，并具有相同的功能。\n\
  \n你可以在此处获取 Android Studio：[`https://developer.android.com/studio`](https://developer.android.com/studio)，此处获取\
  \ IntelliJ IDEA：[`www.jetbrains.com/idea/download`](http://www.jetbrains.com/idea/download)。\n\
  \n#### 我应该使用哪个 IDE？\n\nVS Code 和 Android Studio/IntelliJ 都是免费且开源的。它们都跨平台运行于 Windows、Mac\
  \ 和 Linux 上。两者在 Flutter 开发者中的受欢迎程度大致相当^(³)，彼此之间都没有明显的市场优势。选择哪一个都不会错。\n\n但如果你必须选一个，我们发现你的背景可能会影响你对工具的喜好。来自\
  \ Web 开发领域、使用诸如 HTML、CSS、JavaScript、NodeJS、React、Angular 或 Vue 等技术栈的开发者，强烈倾向于 VS\
  \ Code。另一方面，来自 Java 世界的开发者，尤其是 Android 开发者，似乎更倾向于 Android Studio/IntelliJ。\n\n好消息是，这是一个压力很小的选择。切换编辑器非常容易——即使在处理特定项目时也是如此。从其中一个开始，看看你是否喜欢它。如果不喜欢，你可以试用另一个一段时间。来回切换几次，直到你有了强烈的偏好。切换真的不是什么大问题。\n\
  \n### IDE 开发工具\n\n虽然这些 IDE 很棒，但它们并非专为 Flutter 构建；它们也用于其他语言和框架的开发。因此，为了改善 Flutter\
  \ 的开发流程，我们应该安装 Flutter DevTools。它增加了调试器支持，让你可以查看日志，与模拟器无缝连接，以及提供一些其他功能。\n\n安装 DevTools\
  \ 是在每个 IDE *内部*完成的。在 Android Studio/IntelliJ 中，从主菜单进入“偏好设置 ➤ 插件”（图 2-1）。在 VS Code\
  \ 中，进入“视图 ➤ 扩展”（图 2-2）。Flutter DevTools 被简称为“Flutter”，搜索一下就能找到。在任一平台上，点击绿色的“安装”按钮。\n\
  \n![在 Android Studio 中安装 DevTools](img/638603_1_En_2_Fig1_HTML.jpg)\n\n**图 2-1**\
  \ 在 Android Studio 中安装 DevTools\n\n![在 VS Code 中安装 DevTools](img/638603_1_En_2_Fig2_HTML.jpg)\n\
  \n**图 2-2** 在 VS Code 中安装 DevTools\n\n安装后，你可能需要重启 IDE。\n\n### 模拟器\n\n一旦你安装好了 IDE\
  \ 和 DevTools，就可以编译你的应用了。要运行它，让我们将它部署到设备上。模拟器——一种在你的笔记本电脑/台式机上运行的虚拟设备——使得运行、测试、调试和展示你的应用变得非常容易。你可能希望在\
  \ iOS 和 Android 上都进行测试，因此你需要两者的模拟器。有几种可用的模拟器，但我只提两个，Xcode 的 iOS 模拟器和 AVD 的 Android\
  \ 模拟器。\n\n#### iOS 模拟器\n\n如果你没有 Mac 电脑，你就无法运行 iOS 模拟器，甚至无法为 iOS 进行编译。^(⁴) 但如果你有\
  \ Mac 并且安装了 Xcode，那么你很幸运；你已经拥有了 iOS 模拟器。要运行它，打开 Xcode，然后转到 **Xcode ➤ 打开开发者工具 ➤ 模拟器**（图\
  \ 2-3）。模拟器将启动，在其中，你可以选择任何 iOS 设备，包括 iPhone 和 iPad。\n\n![从 Xcode 打开 iOS 模拟器](img/638603_1_En_2_Fig3_HTML.jpg)\n\
  \n**图 2-3** 从 Xcode 打开 iOS 模拟器\n\n#### Android 模拟器\n\n就像有大量的 Android 机型一样，也有大量的\
  \ Android 模拟器，但与它们交互只有一种流行方式：AVD（Android 虚拟设备）管理器。AVD 管理器可以在 Android Studio 的 **工具**\
  \ 菜单下找到（图 2-4）。\n\n![在 Android Studio 中查找 AVD 管理器](img/638603_1_En_2_Fig4_HTML.jpg)\n\
  \n**图 2-4** 在 Android Studio 中查找 AVD 管理器\n\n打开后，你将看到当前已安装的模拟器列表。一开始应该是空的。通过点击顶部的“创建设备”按钮（图\
  \ 2-5），你可以安装数百种可用的 Android 设备模拟器中的一个或多个。\n\n![AVD 管理器显示可用设备列表。点击“创建设备”以添加更多](img/638603_1_En_2_Fig5_HTML.jpg)\n\
  \n**图 2-5** AVD 管理器显示可用设备列表。点击“创建设备”以添加更多\n\n点击它，你可以从各种设备中选择，或者创建你自己的设备。你只需安装一个设备一次。安装完成后，该模拟设备就可从任何\
  \ IDE 中使用，无论是 IntelliJ/Android Studio 还是 VS Code。无需在 VS Code 上进行单独设置。\n\n\n\n###\
  \ 保持工具更新\n\n早期，使用 `Xamarin` 和 `React Native` 这类工具进行跨平台开发极其困难，原因在于涉及的工具数量庞大且相互依赖。那段痛苦的经历至今让我心有余悸。\n\
  \n但由于 `Flutter` 面世较晚，它能够借鉴前人的教训。`Flutter` 团队意识到了这些痛点，为我们提供了一项创新工具来管理其余的工具链。它会检查你的开发机，寻找开发\
  \ `Flutter` 应用所需的所有工具、你当前安装的版本、可用的版本以及它们之间的依赖关系，然后对问题进行诊断。它甚至能针对这些问题给出解决方案。“检查、诊断并开药方？”听起来像是医生，对吧？那么，让我来介绍\
  \ `flutter doctor`！\n\n#### Flutter doctor\n\n你可以在命令行中运行 `flutter doctor`。它会检查工具链中的所有工具，并报告遇到的任何问题。下面是一个\
  \ `Xcode` 需要处理的示例：\n\n```\n$ flutter doctor\nDoctor summary (to see all details,\
  \ run flutter doctor -v):\nFlutter (Channel beta, vX.Y.Z, on Mac OS X X.Y.Z, locale\
  \ en-US)\nAndroid toolchain - develop for Android devices (SDK version X.Y.Z)\n\
  Xcode - develop for iOS and macOS (Xcode X.Y)\nXcode requires additional components\
  \ to be installed in\norder to run.\nLaunch Xcode and install additional required\
  \ components\nwhen prompted.\nAndroid Studio (version X.Y)\nVS Code (version X.Y.Z)\n\
  Connected device\nNo devices available\nDoctor found issues in 2 categories.\n$\n\
  ```\n\n“No devices available”这个错误很常见，通常可以忽略。它仅仅表示此刻没有模拟器在运行。\n\n以下是我们更希望看到的结果——一切检查通过：\n\
  \n```\n$ flutter doctor\nDoctor summary (to see all details, run flutter doctor\
  \ -v):\nFlutter (Channel beta, vX.Y.Z, on Mac OS X X.Y.Z, locale en-US)\nAndroid\
  \ toolchain - develop for Android devices (SDK version X.Y.Z)\nXcode - develop for\
  \ iOS and macOS (Xcode X.Y)\nAndroid Studio (version X.Y)\nVS Code (version X.Y.Z)\n\
  Connected device (1 available)\n• No issues found!\n```\n\n`flutter doctor` 不仅能检测并报告问题，通常还会针对每个问题给出修复方案。它甚至会在需要升级自身时，通过\
  \ `flutter upgrade` 命令提示你。\n\n#### Flutter Upgrade\n\n没错，首次安装 `Flutter` SDK 时可能会有些令人望而生畏，但升级过程却轻而易举。你只需输入两个单词：`flutter\
  \ upgrade`：\n\n```\n$ flutter upgrade\nUpgrading Flutter from /usr/local/bin/flutter...\n\
  From https://github.com/flutter/flutter\n2d2a1ff..a72edc2  beta       -> origin/beta\n\
  3932ffb..cc3ca9a  dev        -> origin/dev\n5a3a46a..a085635  master     -> origin/master\n\
  * [new branch]      refactor   -> origin/refactor\n\n* [new tag]         vX.A.B\
  \    -> vX.Y.Z\nUpdating c382b8e..a72edc2\n11 files changed, 413 insertions(+),\
  \ 302 deletions(-)\nBuilding flutter tool...\nUpgrading engine...\nDownloading ios-deploy...\
  \                                 0.3s\nFlutter X.Y.Z • channel beta • https://github.com/flutter/flutter.git\n\
  Framework • revision a72e06 (23 hours ago) • 20XX-YY-ZZ 15:41:01 -0700\nEngine •\
  \ revision b863200c37\nTools • Dart X.Y.Z\nRunning flutter doctor...\nDoctor summary\
  \ (to see all details, run flutter doctor -v):\nFlutter (Channel beta, vX.Y.Z, on\
  \ Mac OS X X.Y.Z, locale en-US)\nAndroid toolchain - develop for Android devices\
  \ (SDK version X.Y.Z)\nXcode - develop for iOS and macOS (Xcode X.Y)\nAndroid Studio\
  \ (version X.Y)\nVS Code (version X.Y.Z)\nConnected device (1 available)\n• No issues\
  \ found!\n```\n\n请注意，`flutter doctor` 作为最后一步自动运行，以确认一切正常。升级简直是小菜一碟。\n\n## Flutter\
  \ 开发流程\n\n现在我们已经安装并更新了所有工具，接下来让我们创建一个应用并通过调试器运行它。\n\n### 搭建应用和文件架构\n\n通过运行以下命令创建一个全新的\
  \ `Flutter` 应用……\n\n```\n$ flutter create my_app\n```\n\n这将在当前文件夹下创建一个名为 `my_app`\
  \ 的子文件夹。其中将包含大量可直接运行的 `Dart` 代码。\n\n提示\n\n应用名称不区分大小写，因此建议全部使用小写。连字符是非法的字符，所以不能使用烤串命名法。推荐的命名方式是\
  \ `小写字母加下划线`。\n\n### Flutter 项目结构剖析\n\n了解你刚刚创建的项目中所有文件和文件夹并非至关重要。但如果你好奇，我们可以快速浏览一下图\
  \ 2-6 所示的新创建的 `Flutter` 项目结构。\n\n![](img/638603_1_En_2_Fig6_HTML.jpg)\n\n图 2-6\n\
  \n由 `flutter create` 生成的一个崭新的 `Flutter` 项目\n\n你将看到以下这些文件夹：\n\n*   `android`, `ios`,\
  \ `web`, `linux`, `windows`, `macos` – 这些是项目中平台相关的部分。除非你需要让应用在不同平台上有不同表现，否则通常无需修改它们。\n\
  \n*   `lib` – 这是你所有 `Dart` 源代码的存放位置。你将在此构建应用的层级结构。这里将占据你绝大部分的时间和精力。\n\n*   `test`\
  \ – 如果你有单元测试（最终你很可能需要它们），请放在这里。\n\n你还会看到以下这些文件：\n\n*   `pubspec.yaml` – 这本质上是 `Dart`\
  \ 项目的项目文件。我们可以在这里设置项目名称、描述、依赖项等。请务必阅读其中的注释，以便更好地了解建议和可能的配置。\n\n*   `.gitignore`\
  \ 和 `README.md` – 对于使用 `Git` 和 `GitHub` 作为源代码仓库的开发者来说，这些文件非常熟悉。其他人则无需关注。\n\n*  \
  \ `analysis_options.yaml` – 项目的代码检查规则和配置。它指示 `IDE` 如何在编写不规范的代码时发出警告。如果规则过于严苛，你想关闭某些规则，只需删除相应行或用注释符号将其注释掉即可。所有代码检查规则的说明可在此处找到：[`http://dart-lang.github.io/linter/lints/`](http://dart-lang.github.io/linter/lints/)。\n\
  \n\n\n## 运行你的应用\n\n现在你已经创建了一个 Flutter 应用，让我们来运行它。有多种方式可以运行你的应用。最常用的方法是点击 Android\
  \ Studio/IntelliJ 或 VS Code 中的绿色“播放”按钮（图 2-7）。你可以通过设置断点并使用开发者工具单步执行代码来调试应用（图 2-8）。\n\
  \n图 2-8  \nVS Code 中的播放按钮位于左上角\n\n图 2-7  \nAndroid Studio 中的播放和调试按钮位于顶部\n\n显然，你需要在某种设备上运行你的应用。有几种选择：用于\
  \ Web 应用的 Chrome 浏览器、模拟器，或者通过数据线连接到开发机的物理设备。当你点击播放/调试按钮时，你可以选择当前要运行的设备。请注意，在前面的\
  \ Android Studio 截图中，有一个下拉菜单列出了可用的设备。在 VS Code 中，点击播放按钮，会立即弹出一个菜单供你选择。无论使用哪种 IDE，都由你掌控。\n\
  \n> **提示**  \n> 你可以通过从命令行运行 `flutter devices` 来检查当前可用的设备。\n\n```\n$ flutter devices\n\
  3 connected devices:\nVivo XL3   • 55S...KF • android-arm64 • Android 8.0.0 (API\
  \ 26)\nAndroid SDK • emul...4 • android-x86   • Android 9 (API 28)\niPhone X   \
  \ • E6...39A • ios • com.apple...OS-12-1 (simulator)\n```\n\n上面的示例输出告诉我们有三台设备。第一台和第二台是\
  \ Android 设备，第三台运行的是 iOS。第一台设备是连接线连接的物理设备，第二台和第三台是模拟器。\n\n请注意，此命令与 `flutter emulators`\
  \ 命令不同，后者会告诉你所有*可能*选择的模拟器。而 `flutter devices` 命令会告诉你哪些设备是*当前*可用于运行你的应用的。\n\n###\
  \ 作为 Web 应用运行\n\n这是最简单的选择。当你作为 Web 应用运行时，Flutter 会将你的浏览器视为一个设备。因此，作为 Web 应用运行所需的全部操作就是启用\
  \ Google Chrome 浏览器作为设备。当你获得运行应用的可选设备列表时，“Chrome”会出现在其中。只需选择在 Chrome 中运行你的应用，IDE\
  \ 就会在其中加载你的 Web 应用。\n\n## 在连接线的设备上运行\n\n有时你需要在物理设备上运行你的应用。例如，我正在开发一个涉及通过蓝牙连接到物理打印机打印标签的项目。模拟器无法通过蓝牙配对。为了测试打印功能，我需要一个已经与我的蓝牙打印机配对的真实物理设备。\n\
  \n要将物理设备连接到你的开发机，你需要使用物理数据线。\n\n> **提示**  \n> #1 连接 Android 设备时，它最初会认为你正在尝试充电或传输照片。要让设备知道你正在尝试调试，请打开设备上的“开发者选项”屏幕，并选择“启用\
  \ USB 调试”。  \n> #2 许多连接问题可能是由劣质数据线引起的。与直觉相反，并非所有数据线都一样。如果在更改设置后仍然无法连接，请换用质量更高的数据线。\n\
  \n#### 热重载\n\n初始编译可能会有点慢。但是一旦应用在你的模拟器/浏览器/物理设备或其他设备上运行，你就可以对源代码进行修改并重新运行。这里有一个非常酷的特性：每次你保存对源代码的更改，它都会被重新编译，并且新版本会立即加载。你的应用会从你离开的地方继续运行——在相同的位置，具有相同的状态和相同的数据。我们称之为“热重载”，它使开发周期变得异常快速且无摩擦。\n\
  \n#### 调试\n\n两种 IDE 都拥有你在所有 IDE 中已经习惯的基本调试工具。当你启动项目运行时，调试工具将会出现。\n\n在 Android Studio\
  \ 中，调试窗口会打开，通常位于 IDE 底部。它有一个小工具栏，如图 2-9 所示。\n\n图 2-9  \nAndroid Studio 中的调试工具栏 \
  \ \n\n从左到右的选项分别是“单步跳过”、“单步进入”、“强制单步进入”和“单步跳出”。\n\n在 VS Code 中，工具栏会浮动显示在你的源代码上方（图\
  \ 2-10）。\n\n图 2-10  \nVS Code 中的调试工具栏  \n\n其选项包括“播放/暂停”、“单步跳过”、“单步进入”、“单步跳出”、“热重载”、“重启”和“停止调试”。\n\
  \n> **注意**  \n> Flutter 在调试时比在实际设备上运行时更挑剔。这是一件好事，因为在调试过程中，它会明确显示某些你本应修复但不一定是致命的错误。在发布版本中，它会忽略这些相同的错误，并（希望如此）允许我们的用户继续运行我们的应用。\n\
  \n其中一类错误是“运行时断言”。当你调试器给出如下错误时，你就会知道正在处理这类问题：\n\n```\n════════ Exception caught by\
  \ gesture ════════\nThe following assertion was thrown while handling a gesture:\n\
  setState() callback argument returned a Future.\nThe setState() method on _FooState#236\
  \ was called with a closure or method that returned a Future. Maybe it is marked\
  \ as \"async\".\n等等，等等，等等。\n```\n\n你要记住的是：当你看到这类问题时，请修复它。这是正确的做法。但如果在部署后发现同样的问题，请不要感到困惑。\n\
  \n## 结论\n\n我知道，这些内容很多，需要吸收。跨平台开发的本质使得工具链变得棘手。但最困难的部分已经过去了。一旦你安装了 Flutter SDK 和 IDE（VS\
  \ Code/Android Studio/IntelliJ IDEA），你就拥有了真正需要的一切。当然，DevTools 和一两个模拟器确实会很有帮助。剩下的就是多多练习。你会变得非常出色！\n\
  \n那么，既然我们已经了解了 Flutter 工具链，让我们开始创建小部件吧！\n\n---\n\n脚注 1 2\n\n\n\n"
- "# 3. 万物皆组件\n\n假设你是一个极具天赋的乐高迷，并且获得了令人垂涎的乐高大师建造师职位之一。恭喜！我们再假设你的第一个任务是用 26,000 块乐高积木建造一个六英尺高的雷神托尔（图\
  \ 3-1）。\n\n![](img/638603_1_En_3_Fig1_HTML.png)\n\n***图 3-1***\n*乐高版托尔。作者曾在一家电影院拍下这张照片*\n\
  \n你会怎么做？想一想。别急，我们等着。\n\n你会直接抓起积木然后拼在一起吗？可能不会。你会先铺好托尔的脚底，然后从下往上搭建吗？也不会。我猜你的常识性策略是这样的：\n\
  \n1.  对你建造的东西有个整体构想，先想清楚全貌。\n2.  意识到整个项目太复杂，无法一蹴而就。\n3.  将项目分解成各个部分（腿、左臂、右臂、躯干、左手剑、右手剑、头盔、披风、头部）。\n\
  4.  意识到每个部分仍然过于复杂。\n5.  对于每个部分，再将其分解成子部分。\n6.  重复步骤 4 和 5，直到得到足够简单的组件，使得你和你的队友都能轻松理解、构建和维护。\n\
  7.  创建每个简单的组件。\n8.  将简单组件组合成更大、更复杂的组件。\n9.  重复步骤 7 和 8，直到完成整个项目。\n\n这个过程有一个名字，叫做*组件化*，这正是我们在\
  \ Flutter 应用中要遵循的思考过程。\n\n组件化并非什么新鲜事物。实际上，它早在 1968 年就被提出了。^(⁵) 但得益于 Angular、React、Vue、Svelte、SolidJS\
  \ 以及原生 Web 组件等 Web 框架，这项技术近年来才迅速流行起来。如今，似乎所有酷孩子都在做软件组件。将复杂部分递归分解为更简单部分的想法称为*分解*。而将编写好的部分重新组合成更大组件的行为称为*组合*。\n\
  \n在 Flutter 的世界里，这些组件被称为*widget*。Flutter 社区的人喜欢说“万物皆 widget”，这意味着你和我都会使用 Flutter\
  \ 自带的內建 widget。我们会将它们组合在一起来创建自定义 widget。然后，我们的自定义 widget 会再被组合，创建出越来越复杂的自定义 widget。这个过程一直持续，直到你构建出一个完整的应用。\n\
  \n每个应用都可以从两个方面来考虑：\n\n1.  **行为** – 软件的功能。所有的业务逻辑都在这里：数据读取、写入和处理。\n2.  **呈现** – 软件的外观。用户界面。如按钮、文本框和标签。\n\
  \n而 Flutter 将这两者融合在了一种语言中，而不是两种。\n\n## 界面即代码\n\n其他开发框架已经证明了组件化是正确的发展方向。Flutter 团队公开表示，他们深受基于组件化的\
  \ React^(⁶)的启发。事实上，所有框架的创造者似乎都在相互借鉴。但 Flutter 在用户界面表达方式上是独一无二的。开发者使用同一种 Dart 语言来同时描述应用的图形用户界面和行为（表\
  \ 3-1）。我们称之为“UI as code（界面即代码）”。\n\n***表 3-1***\n*只有 Flutter 使用同一种语言来处理呈现和行为*\n\n\
  | 框架 | 行为用…表达 | 界面用…表达 |\n| --- | --- | --- |\n| Maui | C# | XAML |\n| React Native\
  \ | JavaScript | JSX |\n| NativeScript | JavaScript | XML |\n| Flutter | Dart |\
  \ Dart |\n\n那么，这个界面是如何创建的呢？像许多其他框架和语言一样，Flutter 应用从一个`main`函数开始。在 Flutter 中，`main`会调用一个名为`runApp()`的函数。这个`runApp()`接收一个\
  \ widget，即根 widget，它可以被任意命名，但它必须是一个继承了 Flutter `StatefulWidget`/`StatelessWidget`的类。它看起来像这样：\n\
  \n```\n// 导入所有 Flutter 应用所需的 Dart 包\nimport 'package:flutter/material.dart';\n//\
  \ 这里是 main 调用 runApp\nvoid main() => runApp(RootWidget());\n// 这是你的根 widget\nclass\
  \ RootWidget extends StatelessWidget {\n@override\nWidget build(BuildContext context)\
  \ {\nreturn Text(\"Hello world\");\n}\n}\n```\n\n这就是在 Flutter 中创建一个“Hello world”所需的全部代码。\n\
  \n但是等等……这个`Text()`是什么东西？它是一个內建的 Flutter widget。由于这些內建 widget 非常重要，我们需要仔细看看它们。\n\n\
  ## 內建 Flutter Widget\n\nFlutter 的基础 widget 是我们构建一切事物的基石，而且数量众多——上次统计有超过 1300 个。^(⁷)\
  \ 这对于你我来说需要了解的数量相当大。但是，如果你在脑海中将它们进行分类整理，就会容易管理得多。\n\n它们大致可分为以下几类：\n\n*   数值型 widget\n\
  *   布局型 widget\n*   导航型 widget\n*   其他 widget\n\n> **注意**\n> 这些并非 Flutter 官方分类列表。其\
  \ 15 个官方分类列在此处：[`https://flutter.dev/docs/development/ui/widgets`](https://flutter.dev/docs/development/ui/widgets)。我们只是觉得重新组织一下有助于理清思路。\n\
  \n我们将通过一两个例子快速浏览每个类别，然后在后续章节中进行深入探讨。让我们从数值型 widget 开始。\n\n### 数值型 Widget\n\n某些 widget\
  \ 持有数值，这些数值可能来自本地存储、互联网服务或用户本身。它们用于向用户显示数值，以及从用户那里获取数值进入应用。典型的例子是`Text` widget，它用于显示一小段文本。另一个是`Image`\
  \ widget，用于显示 `.jpg`、`.png` 或其他图片。\n\n以下是更多数值型 widget：\n\n| AlertDialog Badge Checkbox\
  \ Chip CircularProgressIndicator Date & Time Pickers DataTable DropdownButton ElevatedButton\
  \ FlatButton | FloatingActionButton FlutterLogo Form FormField Icon IconButton Image\
  \ LinearProgressIndicator Menu PopupMenuButton Radio | RawImage RefreshIndicator\
  \ RichText SegmentedButton Slider SnackBar Switch Text TextField Tooltip |\n\n我们将在下一章更详细地探索数值型\
  \ widget。\n\n### 布局型 Widget\n\n布局型 widget 赋予我们大量控制能力，使场景能够正确布局——使用`Row` widget 将\
  \ widget 并排放置，或使用`Column` widget 上下堆叠；使用`SingleChildScrollView`使它们可滚动，使用`Wrap`使其自动换行，使用`Padding`确定\
  \ widget 周围的空间以避免拥挤感，等等：\n\n| Align AppBar AspectRatio BottomAppBar BottomSheet\
  \ Card Center Column ConstrainedBox Container Divider Expanded ExpansionPanel FittedBox\
  \ | Flow FractionallySizedBox GridView IntrinsicHeight IntrinsicWidth LayoutBuilder\
  \ LimitedBox ListTile ListView MediaQuery NestedScrollView OverflowBox Padding PageView\
  \ | Placeholder Row Scaffold Scrollable Scrollbar SingleChildScrollView SizedBox\
  \ SizedOverflowBox Slivers* SnackBar Stack Table Transform Wrap |\n\n这是一个庞大的主题，我们将在本书的最后六章进行介绍。\n\
  \n### 导航型 Widget\n\n当你的应用有多个场景（“屏幕”、“页面”，随便你怎么称呼）时，你需要某种方式在它们之间切换。导航型 widget 就派上用场了。它们将控制用户如何看到一个场景，然后移动到下一个。通常，当用户点击按钮时会发生这种切换。有时，导航按钮位于标签栏或从屏幕左侧滑入的抽屉中。以下是一些导航型\
  \ widget：\n\n| AlertDialog Drawer MaterialApp NavigationBar | NavigationDrawer NavigationRail\
  \ Navigator | SimpleDialog TabBar TabBarView |\n\n我们将在第六章“导航与路由”中学习它们的工作原理。\n\n\n\
  \n### 其他小组件\n\n当然，并非所有小组件都能归入这些整齐的类别。让我们把其余部分归为一个杂项类别。以下是一些杂项组件：\n\n| `ClipPath`\
  \ `Cupertino` `Dismissible` | `FutureBuilder` `GestureDetector` `Semantics` | `StreamBuilder`\
  \ `Theme` `Transitions` |\n\n本书会在各章节中自然而然地介绍这些杂项组件中的许多内容。`GestureDetector` 和 `Dismissible`\
  \ 出现在第 5 章“响应手势”中。`Theme` 在第 10 章“使用主题进行样式设计”中介绍。`FutureBuilder` 和 `StreamBuilder`\
  \ 在第 9 章“使用 HTTP 进行 RESTful API 调用”中介绍。\n\n### 如何创建你自己的无状态组件\n\n我们知道，我们将组合这些内置组件来形成我们自己的自定义组件，然后这些自定义组件再与其他内置组件组合，最终形成一个应用。\n\
  \n组件设计得非常巧妙，因为每个组件都易于理解，因此也易于维护。组件从外部看是抽象的，而在内部则是逻辑清晰且可预测的。它们用起来令人愉悦。\n\n每个组件都是一个类，可以拥有属性和方法。每个组件都可以有一个包含零个或多个参数的构造函数。最重要的是，每个组件都有一个\
  \ `build` 方法，该方法接收一个 `BuildContext`^(⁸) 并返回一个单一的 Flutter 组件。\n\n**提示**\n\n如果你曾好奇某个组件的外观是如何形成的，请找到它的\
  \ `build` 方法。\n\n```\nclass RootWidget extends StatelessWidget {\n@override\nWidget\
  \ build(BuildContext context) {\nreturn Text('Hello world');\n}\n}\n```\n\n在这个我们本章前面重复过的\
  \ hello world 示例中，我们展示了一个 `Text` 组件（图 3-2）。一个单独的内部组件是可以工作的，但现实世界的应用会复杂得多。根组件可以由许多其他子组件组成：\n\
  \n![](img/638603_1_En_3_Fig2_HTML.jpg)\n\n**图 3-2** 这个简单组件创建的应用\n\n```\nclass FancyHelloWidget\
  \ extends StatelessWidget {\nWidget build(BuildContext context) {\nreturn MaterialApp(\n\
  home: Scaffold(\nappBar: AppBar(\ntitle: Text(\"一个更花哨的应用\"),\n),\nbody: Container(\n\
  alignment: Alignment.center,\nchild: Text(\"Hello world\"),\n),\nfloatingActionButton:\
  \ FloatingActionButton(\nchild: Icon(Icons.thumb_up),\nonPressed: () => {},\n),\n\
  ),\n);\n}\n}\n```\n\n所以正如你所见，`build` 方法返回一个单一的组件 `MaterialApp`，但它包含一个 `Scaffold`，其中又包含三个子组件：一个\
  \ `AppBar`、一个 `Container` 和一个 `FloatingActionButton`（图 3-3）。这些组件中的每一个又分别包含它们自己的子子组件。\n\
  \n![](img/638603_1_En_3_Fig3_HTML.png)\n\n**图 3-3** 上面示例应用中的组件树\n\n这就是你的 `build`\
  \ 方法始终的工作方式。它将返回一个单一的、庞大的、嵌套的表达式。正是组件内部的组件内部的组件，使你能够创建自己精心设计的自定义组件。\n\n### 组件拥有键\n\
  \n让我们暂时谈谈 Flutter 的架构。如果 Flutter 在每次做出微小更改时都尝试重新渲染整个屏幕，那将会很慢。相反，Flutter 将状态更改应用到屏幕的内存副本上，这个副本被称为元素树。这非常快，因为它们实际上并没有绘制在屏幕上。绘制工作保留给了“渲染树”。\n\
  \n嗯，这种结构的美妙之处在于——当渲染树被绘制时，它会重用所有自上次渲染以来*没有*改变的组件。只有那些需要重新渲染的组件才会被重新渲染。但 Flutter\
  \ 是如何知道的呢？它使用了键。\n\n每个组件都有一个唯一的键。它会自动获得一个键，但如果你愿意，也可以手动分配键。当一个组件需要重绘时，它会在内存中被重新创建并获得一个新键。Flutter\
  \ 假定任何类型和键都没有改变的组件都可以保持不变。\n\n但偶尔，Flutter 在匹配元素树中的组件时也会出错。如果你的组件被绘制到了错误的位置、屏幕上的数据没有更新，或者滚动位置没有保留，你就会知道需要手动分配键了。\n\
  \n通常你不需要担心键的问题。它们很少被需要，以至于如果你能理解以下几点，我们就很满意了……\n\n1.  键是存在的，以及为什么 Flutter 可能需要它们。\n\
  2.  当你的组件没有按预期重绘时，键可能可以解决问题。\n3.  你有机会为组件分配键。\n\n如果这对你来说还不够，那么伟大的 Emily Fortuna\
  \ 已经录制了一个关于键的超级 10 分钟视频。^(⁹)\n\n### 向组件传递值\n\n你知道这个公式是什么意思吗？\n\n*y = f(x)*\n\n数学专业的人会认出这读作“*y*\
  \ 是 *x* 的函数”。它简洁地传达了当 *x*（自变量）变化时，*y*（因变量）将以可预测的方式变化。Flutter 依赖于这个理念，但在 Flutter\
  \ 中，这个公式读作：\n\n*场景 = f(数据)*\n\n换句话说，随着你应用中数据的变化，屏幕也会相应变化。而你，作为开发者，可以在编写组件的 `build`\
  \ 方法时决定如何呈现这些数据。这是 Flutter 的一个基本概念。\n\n那么数据可能如何变化呢？有两种方式：\n\n1.  组件可以使用从外部传入的新数据进行重新渲染。\n\
  2.  数据可以在某些组件*内部*维护。\n\n让我们谈谈第一种方式。要将数据传入组件，你可以将其作为构造函数参数发送：\n\n```\nWidget build(BuildContext\
  \ context) {\nreturn Person(firstName: \"Sarah\", lastName: \"Ali\");\n}\n```\n\n\
  下面是你如何编写组件来接收这个值：\n\n```\nclass Person extends StatelessWidget {\nfinal String firstName;\n\
  final String lastName;\nPerson({this.firstName = \"\", this.lastName = \"\"}) {}\n\
  @override\nWidget build(BuildContext context) {\nreturn Text('$firstName $lastName');\n\
  }\n}\n```\n\n我们将名字和姓氏传递给了组件。编写 Dart 构造函数还有别的方法。请查看附录 A“Dart 语言概述”或 Dart 参考文档来了解它们。\n\
  \n**提示**\n\n请注意，在前面的示例中，我们使用了一个 `Person` 类，该类可能是在你使用它的同一个 dart 文件中定义的。但更好的做法是，在每个单独的\
  \ dart 文件中创建类，并将其导入到使用它的其他 dart 文件中。\n\n`import 'Person.dart';`\n\n### 无*状态*组件和*有*状态组件\n\
  \n到目前为止，我们一直在刻意创建无状态组件。所以你可能已经猜到还有一种有状态组件。你猜对了。无*状态*组件是不维护自身状态的组件。有*状态*组件则维护自身状态。\n\
  \n在此上下文中，“状态”指的是组件内在其生命周期中可以更改的数据。想想我们之前的 `Person` 组件。如果它只是一个显示人员信息的组件，那么它应该是无状态的。但如果它是一个人员**维护**组件，我们允许用户通过在\
  \ `TextField` 中输入数据来更改信息，那么我们就需要一个 `StatefulWidget`。\n\n后面有一整章是关于有状态组件的。如果你等不及想了解更多关于它们的信息，可以阅读本书后面的第\
  \ 7 章“管理状态”。然后再回到这里。\n\n\n\n### 那么我该创建哪种 Widget？\n\n简而言之，创建无状态 widget。除非万不得已，永远不要使用有状态\
  \ widget。假设你创建的所有 widget 都是无状态的，并以此为基础开始开发。当你确信确实需要状态时，再将它们重构为有状态 widget。但要认识到，状态其实比开发者想象的更容易避免。尽可能避免状态的使用，这能让\
  \ widget 更简单，从而更易于编写、维护和扩展。你的团队成员会因此感谢你。\n\n> **注意**  \n> 实际上还有第三种 widget，即 `InheritedWidget`。你可以在\
  \ `InheritedWidget` 中设置一个值，任何后代 widget 都可以沿 widget 树向上追溯，直接请求该数据。你可以在第 8 章“状态管理库”中了解更多信息，或者在此处观看关于\
  \ `InheritedWidget` 的简明概述：[`http://bit.ly/inheritedWidget`](http://bit.ly/inheritedWidget)。\n\
  \n## 总结\n\n现在我们知道了 Flutter 应用的核心就是 widget。你将组合自定义的无状态或有状态 widget，它们包含一个 `build`\
  \ 方法，该方法会渲染出一棵由 Flutter 内置 widget 组成的树。因此，我们显然需要了解这些内置的 Flutter widget，我们将在下一章开始学习它们。\n\
  \n脚注 1   2   3   4   5\n\n"
- "# 4. 数值型 Widget\n\n在上一章我们了解到，*万物皆 widget。* 你创建的所有东西都是 widget，Flutter 提供给我们的所有东西也都是\
  \ widget。当然，也存在例外，但这样思考并无坏处，尤其是在你刚入门 Flutter 的时候。在本章中，我们将深入探讨 Flutter 提供的最基础的一组\
  \ widget——那些承载数值的 widget。我们将介绍 `Text` widget、`Icon` widget 和 `Image` widget，它们所显示的内容正如其名。我们还会简单了解\
  \ `SnackBar` widget。然后，我们将深入讲解输入型 widget——那些设计用来获取用户输入的 widget。\n\n## Text Widget\n\
  \n如果你想在屏幕上显示一个字符串，`Text` widget 就是你需要的工具。它接收一个字符串作为输入（即你想要显示的文本），并将其显示在屏幕上。默认情况下，所有文本都在一行内显示，但如果容器宽度不够，它会自动换行到多行。\n\
  \n```\nWidget build(BuildContext context) {\n  String str = 'Hello world';\n  return\
  \ Text(str);\n}\n```\n\n> **提示**  \n> 如果你的 `Text` 内容是字面量，在其前面加上 `const` 关键字，该 widget\
  \ 将在编译时而非运行时创建。你的 `apk/ipa` 文件会略微增大，但它们能在设备上运行得更快。这点付出是值得的。\n\n你可以通过 `style` 属性控制\
  \ `Text` 的大小、字体、粗细、颜色等。但我们将在第 10 章“使用主题进行样式设计”中介绍这部分内容。\n\n`Text()` 能满足大部分单一风格文本的需求。但如果文本的不同部分需要不同的样式呢？这时就需要用到\
  \ `RichText`。它允许你在同一个文本 widget 内，使用 `TextSpan` 对象混合搭配不同的样式。\n\n## Icon Widget\n\n\
  Flutter 内置了大量图标（图 4-1），从相机、人物、卡片、交通工具、箭头、电池到 Android/iOS 设备，应有尽有。完整列表可以在这里找到：[`https://api.flutter.dev/flutter/material/Icons-class.html`](https://api.flutter.dev/flutter/material/Icons-class.html)，但该页面不太容易搜索。这里有一个可以按名称搜索的网站：[`https://fonts.google.com/icons`](https://fonts.google.com/icons)。\n\
  \n![](img/638603_1_En_4_Fig1_HTML.jpg)\n\n图 4-1：一组随机颜色的 Flutter 内置图标\n\n要放置一个图标，你需要使用\
  \ `Icon` widget。这并不意外。你需要使用 `Icons` 类来指定具体图标。这个类拥有数百个静态值，例如 `Icons.phone_android`、`Icons.phone_iphone`\
  \ 和 `Icons.cake`。每个值都指向一个不同的图标，就像上面展示的那些。以下是如何在你的应用中放置一个红色大生日蛋糕（图 4-2）的代码：\n\n![](img/638603_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2：红色蛋糕图标\n\n```\nIcon(\n  Icons.cake,\n  color: Colors.red,\n  size: 200,\n\
  )\n```\n\n如果近 9000 个内置图标仍不能满足你的需求，你完全可以引入其他图标集。Flutter 可以使用 Font Awesome，它可在 [`https://pub.dev/packages/font_awesome_flutter`](https://pub.dev/packages/font_awesome_flutter)\
  \ 获取，能提供另外 2000 个图标。而 [`https://pub.dev/packages/icons_flutter`](https://pub.dev/packages/icons_flutter)\
  \ 上的 `icons_flutter` 包则提供了另外 14,000 个图标。这些应该足够你用一阵子了。\n\n## Image Widget\n\n在 Flutter\
  \ 中显示图片比使用 `Text` 或 `Icons` 要复杂一些。它涉及几个方面：\n\n1.  **获取图片来源**——图片可以嵌入在应用本身内，也可以从互联网实时获取。如果图片在应用整个生命周期内都不会改变（例如标志或装饰图案），则应该使用嵌入图片。\n\
  \n2.  **调整大小**——将图片缩放或裁剪到合适的尺寸和形状。\n\n### 嵌入图片\n\n嵌入图片在运行时速度更快，但会在编译时增加应用的安装包大小。要嵌入图片，请将图片文件放入你的项目文件夹中。放在项目中的任何位置都可以，但惯例是将其放在名为\
  \ `assets` 的子文件夹中，可能还需要一个子文件夹以保持结构清晰。像 `assets/images` 这样的路径就很合适。\n\n然后编辑 `pubspec.yaml`\
  \ 文件。添加以下内容：\n\n```\nflutter:\n  assets:\n    - assets/images/photo1.png\n    -\
  \ assets/images/photo2.jpg\n```\n\n保存文件并在命令行中运行 `flutter pub get`，让项目处理该文件。\n\n\
  > **提示**  \n> `pubspec.yaml` 文件保存了关于你项目的各种重要信息。它包含项目元数据，如名称、描述、仓库位置和版本号。它列出了库依赖项和字体。对于刚接触你项目的其他开发者来说，这是首要查看的文件。对于\
  \ JavaScript 开发者来说，它相当于 Dart 项目中的 `package.json` 文件。更多信息请参见附录 C“在你的 Flutter 应用中包含包”。\n\
  \n你可以通过调用 `asset()` 构造器将图片放入 widget，如下所示：\n\n```\nImage.asset('assets/images/photo1.jpg'),\n\
  ```\n\n### 网络图片\n\n网络图片更接近 Web 开发者所习惯的方式。它只是通过 HTTP 从互联网上获取图片。你需要使用 `network` 构造器，并传入一个\
  \ URL 字符串作为参数。\n\n```\nImage.network(imageUrl),\n```\n\n正如你所料，这些图片比嵌入图片慢，因为在通过互联网向服务器发送请求和你的设备下载图片的过程中存在延迟。其优势在于这些图片是实时的；只需更改图片\
  \ URL，就可以动态加载任何图片。\n\n\n\n### 调整图像尺寸\n\n图像几乎总是被放置在一个容器中。这并不是硬性要求，只是我无法想象在实际使用中，图像会不被包裹在其他控件里。容器对图像的绘制尺寸有决定权。如果图像的原始尺寸能恰好匹配容器的尺寸，那将是非常惊人的巧合。实际上，Flutter\
  \ 的布局引擎会缩小图像以适配其容器，但不会放大它。这种适配方式被称为 `BoxFit.scaleDown`，并且作为默认行为是合理的。但还有哪些其他选项可用？我们又如何决定使用哪一个呢？表\
  \ 4-1 列出了 `BoxFit` 的可用选项。\n\n**表 4-1** *BoxFit 选项*\n\n| `fill` | 拉伸图像，使其宽度和高度都精确适配。可能会扭曲图像\
  \ | ![](img/638603_1_En_4_Figa_HTML.jpg) |\n| `cover` | 缩小或放大图像，直至填满空间。顶部/底部或两侧可能会被裁剪。不会扭曲图像\
  \ | ![](img/638603_1_En_4_Figb_HTML.jpg) |\n| `fitHeight` | 使高度精确适配。根据需要裁剪宽度或添加额外空间\
  \ | ![](img/638603_1_En_4_Figc_HTML.jpg) |\n| `fitWidth` | 使宽度精确适配。根据需要裁剪高度或添加额外空间\
  \ | ![](img/638603_1_En_4_Figd_HTML.jpg) |\n| `contain` | 缩小图像，直至高度*和*宽度都适配。顶部/底部或两侧可能会留有额外空间\
  \ | ![](img/638603_1_En_4_Fige_HTML.jpg) |\n\n*照片来源：[Eye for Ebony](https://unsplash.com/%2540eyeforebony%253Futm_source%253Dunsplash%2526utm_medium%253Dreferral%2526utm_content%253DcreditCopyText)\
  \ 在 [Unsplash](https://unsplash.com/search/photos/black-woman%253Futm_source%253Dunsplash%2526utm_medium%253Dreferral%2526utm_content%253DcreditCopyText)\
  \ 上发布*\n\n以上就是所有可选项，但你该如何选择呢？图 4-3 或许能帮助你在不同情况下决定使用哪种适配方式。\n\n![](img/638603_1_En_4_Fig3_HTML.png)\n\
  \n**图 4-3** 如何决定图像的适配方式\n\n要指定适配方式，你需要设置 `fit` 属性。\n\n```\nImage.asset('assets/images/woman.jpg',\
  \ fit: BoxFit.contain,),\n```\n\n### SnackBar 控件\n\n我知道这个名字很奇怪。听起来像某种美味的小吃，但这个控件实际上是向用户发出通知的标准方式。一个\
  \ `SnackBar`（图 4-4）会出现在屏幕底部，遮挡住原本在底部的任何内容，并在短暂时间后自动消失。你可以决定 `SnackBar` 显示什么文字，甚至可以在其上放置一个按钮供用户执行操作。\n\
  \n![](img/638603_1_En_4_Fig4_HTML.jpg)\n\n**图 4-4** SnackBar 显示一条消息和可选的交互按钮\n\n\
  你可以在任何场景中显示一个 `SnackBar`，只要这个操作是在嵌套在 `Scaffold` 内部的控件中进行的。你必须：\n\n1.  创建 `SnackBar`\n\
  2.  调用 `ScaffoldMessenger.of(context).showSnackBar(sb)`\n3.  处理操作按钮（可选）\n\n请注意，`showSnackBar()`\
  \ 是异步运行的，以避免阻塞 UI 线程。默认情况下它会显示四秒钟，但可以通过 `duration` 属性覆盖此设置。示例如下：\n\n```\nIconButton(\n\
  icon: const Icon(Icons.delete, size: 36),\nonPressed: () {\nbool goAheadAndDeletePerson\
  \ = true;\nfinal SnackBar sb = SnackBar(\ncontent: Text(\"${person.name} 已删除。\"\
  ),\nduration: const Duration(seconds: 5),\naction: SnackBarAction(\nlabel: \"撤销\"\
  ,\nonPressed: () => goAheadAndDeletePerson = false,\n),\n);\nScaffoldMessenger.of(context).showSnackBar(sb);\n\
  Future.delayed(const Duration(seconds: 5), () {\nif (goAheadAndDeletePerson) {\n\
  deletePerson(person);\n}\n});\n},\n),\n```\n\n在这个例子中，我们对用户撒了个小谎 \U0001F632。我们告诉用户记录已被删除，但实际上他们有五秒钟的时间可以通过点击“撤销”来取消删除。`Future.delayed()`\
  \ 表示在五秒延迟后，在一个独立的 isolate 中执行 `deletePerson()`。如果用户在此期间点击了“撤销”，那么 `Future` 就会跳过删除操作。\n\
  \n当然，你可能只想显示一条不带操作按钮的消息。这完全取决于你。\n\n### 输入控件\n\n我们很多人都有 Web 开发的背景，从一开始就接触到了包含 `<input>`\
  \ 和 `<select>` 的 HTML `<form>`。所有这些元素都是为了使用户能够向 Web 应用输入数据，而这项活动在移动应用中同样不可或缺。Flutter\
  \ 提供了类似 Web 上用于输入数据的控件，但它们的工作方式并不相同。创建和使用这些控件需要更多的工作量。对此深表歉意。不过，好的一面是，它们也更安全，并且为我们提供了更多的控制能力。\n\
  \n造成这种复杂性的部分原因是，这些控件并不维护自己的状态；你需要手动管理。\n\n另一个复杂之处在于，输入控件彼此之间并不知道对方的存在。换句话说，除非你使用\
  \ `Form` 控件将它们组合在一起，否则它们彼此间的协作性并不好。我们最终需要重点学习 `Form` 控件。但在那之前，让我们先研究如何创建文本字段、复选框、单选按钮、滑块和下拉菜单。\n\
  \n**警告**\n\n> 输入控件只有在 `StatefulWidget` 内部使用时才易于操作，因为它们本质上是会改变状态的。请记住，我们在上一章简要提到了\
  \ `StatefulWidget`，我们将在第 7 章“管理状态”中深入讨论它们。但在那之前，请暂且相信我们，目前先把它们放在有状态控件中使用。\n\n####\
  \ 文本字段\n\n如果你只需要一个简单的文本框，那么 `TextField` 控件可能就是你想要的。下面是一个 `TextField` 控件的简单示例，其上方带有一个\
  \ `Text` 标签：\n\n```\nconst Text('搜索词'),\nTextField(\ninitialValue: \"一些初始值\",\n\
  onChanged: (val) => _searchTerm = val,\n),\n```\n\n这里的 `onChanged` 属性是一个事件处理程序，会在每次按键后触发。它接收一个\
  \ `String` 类型的值。这是用户正在输入的值。在这个示例中，我们将用户输入的内容赋值给一个名为 `_searchTerm` 的局部变量。\n\n你注意到\
  \ `Text('搜索词')` 了吗？这是我们试图在 `TextField` 上方添加标签的拙劣尝试。其实有更好得多的方法。看看这个……\n\n##### 让\
  \ TextField 变得更精致\n\n有很多选项可以让你的 `TextField` 更有用——虽然不是无限的选项，但也很多。所有这些选项都可以通过 `InputDecoration`\
  \ 控件（图 4-5）来设置：\n\n![](img/638603_1_En_4_Fig5_HTML.jpg)\n\n**图 4-5** 一个带有 InputDecoration\
  \ 的 TextField\n\n```\nreturn TextField(\ndecoration: InputDecoration(\nlabelText:\
  \ '邮箱',\nhintText: 'you@email.com',\nicon: Icon(Icons.contact_mail),\n),\n),\n```\n\
  \n表 4-2 列出了更多 `InputDecoration` 的选项。\n\n**表 4-2** *InputDecoration 选项*\n\n| 属性 |\
  \ 描述 |\n| --- | --- |\n| `labelText` | 显示在 `TextField` 上方。告知用户这个 `TextField` 的作用\
  \ |\n| `hintText` | `TextField` 内部浅色的提示文字。用户开始输入时消失 |\n| `errorText` | 显示在 `TextField`\
  \ 下方的错误信息。通常为红色。由验证机制自动设置（稍后介绍），但你也可以在需要时手动设置 |\n| `icon` | 在整个 `TextField` 的左侧绘制一个图标\
  \ |\n| `prefixIcon` | 在 `TextField` 内部靠左绘制一个图标 |\n| `suffixIcon` | 与 `prefixIcon`\
  \ 类似，但位于最右侧 |\n\n#### 密码框\n\n要将其变为密码框（图 4-6），将 `obscureText` 属性设置为 `true`。用户输入时，每个字符短暂显示一秒后会替换成一个圆点。\n\
  \n![](img/638603_1_En_4_Fig6_HTML.jpg)\n\n**图 4-6** 设置了 `obscureText` 的密码框\n\n```\n\
  return TextField(\nobscureText: true,\ndecoration: InputDecoration(\nlabelText:\
  \ '密码',\n),);\n```\n\n\n\n## 调整软键盘\n\n想要一个特殊的软键盘？没问题。只需使用 `keyboardType` 属性即可。效果分别如图\
  \ 4-7 至 4-10 所示。\n\n![](img/638603_1_En_4_Fig10_HTML.jpg)\n\n图 4-10\n\n`TextInputType.phone`\n\
  \n![](img/638603_1_En_4_Fig9_HTML.jpg)\n\n图 4-9\n\n`TextInputType.number`\n\n![](img/638603_1_En_4_Fig8_HTML.jpg)\n\
  \n图 4-8\n\n`TextInputType.email`。请注意 @ 符号\n\n![](img/638603_1_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7\n\n`TextInputType.datetime`\n\n```\nreturn TextField(\nkeyboardType: TextInputType.number,\n\
  );\n```\n\n软键盘会显示不同的键盘，但它不控制可以在每个字段中输入什么内容。换句话说，即使软键盘是数字类型，你仍然可以将普通文本输入到 `FormField()`\
  \ 中。想解决这个问题吗？方法如下……\n\n## 限制可输入的数据\n\n如果你想限制允许输入的文本类型，可以通过 `TextInput` 的 `inputFormatters`\
  \ 属性来实现。它实际上是一个数组，因此你可以组合使用一个或多个以下格式化器：\n\n*   `BlacklistingTextInputFormatter`\
  \ – 禁止输入某些字符。用户输入时，这些字符根本不会出现。\n*   `WhitelistingTextInputFormatter` – 只允许输入这些字符。列表之外的任何字符都不会出现。\n\
  *   `LengthLimitingTextInputFormatter` – 最多只能输入 X 个字符。\n\n前两个格式化器允许你使用正则表达式来指定你想要（白名单）或不想要（黑名单）的模式。示例如下：\n\
  \n```\nreturn TextField(\ninputFormatters: [\nWhitelistingTextInputFormatter(RegExp('[0-9\
  \ -]')),\nLengthLimitingTextInputFormatter(16)\n],\ndecoration: InputDecoration(\n\
  labelText: 'Credit Card',\n),\n);\n```\n\n在 `WhitelistingTextInputFormatter` 中，我们只允许输入数字\
  \ 0-9、空格或短横线。然后 `LengthLimitingTextInputFormatter` 将最大长度限制为 16 个字符。\n\n## 复选框\n\n\
  Flutter 复选框（图 4-11）具有一个布尔类型的 `value` 属性和一个 `onChanged` 方法，该方法在每次更改后触发。与其他所有输入小部件一样，`onChanged`\
  \ 方法接收用户设置的值。因此，在复选框的情况下，该值是 `bool` 类型。\n\n![](img/638603_1_En_4_Fig11_HTML.jpg)\n\
  \n图 4-11\n\n*一个 Flutter 复选框小部件*\n\n```\nCheckbox(\nvalue: true,\nonChanged: (val)\
  \ => print(val),\n),\n```\n\n提示\n\nFlutter 开关（图 4-12）与复选框的用途相同 – 用于表示开或关。因此 `Switch`\
  \ 小部件具有相同的选项并且工作方式相同，只是外观不同。\n\n![](img/638603_1_En_4_Fig12_HTML.jpg)\n\n图 4-12\n\
  \n一个 Flutter 开关小部件\n\n## 单选按钮\n\n当然，单选按钮的妙处在于，如果你选中一个，同一组中的其他按钮就会取消选中。所以显然我们需要以某种方式对它们进行分组。在\
  \ Flutter 中，当你将 `groupValue` 属性设置为同一个局部变量时，`Radio` 小部件就会被分组。该变量保存当前处于选中状态的*那个* `Radio`\
  \ 的值。\n\n每个 `Radio` 也有自己的 `value` 属性，该属性与*那个*特定小部件相关联（无论它是否被选中）。在 `onChanged` 方法中，你将\
  \ `groupValue` 变量设置为该单选按钮的值。\n\n| value | 每个单选按钮都有自己独特的值 |\n| groupValue | 当前选中的一个值，取决于最后点击的是哪个单选按钮。\
  \ |\n\n以下是它们协同工作的方式：\n\n```\nSearchLocation? searchLocation;\n//其他代码放在这里\nRadio(\n\
  groupValue: searchLocation,\nvalue: SearchLocation.anywhere,\nonChanged: (val) =>\
  \ setState(() => searchLocation = val)),\nconst Text('Search anywhere'),\nRadio(\n\
  groupValue: searchLocation,\nvalue: SearchLocation.text,\nonChanged: (val) => setState(()\
  \ => searchLocation = val)),\nconst Text('Search page text'),\nRadio(\ngroupValue:\
  \ searchLocation,\nvalue: SearchLocation.title,\nonChanged: (val) => setState(()\
  \ => searchLocation = val)),\nconst Text('Search page title'),\n```\n\n请注意，每个 `Radio`\
  \ 都有其自己的值，第一个是 `SearchLocation.anywhere`，第二个是 `SearchLocation.text`，第三个是 `SearchLocation.title`。但它们都共享\
  \ `groupType`，正是这个属性将它们分组在一起。还要注意，当选中一个时，其 `onChanged` 会触发，我们将 `searchLocation`\
  \ 变量设置为选中的项。\n\n这段简化后的代码将生成类似图 4-13 的效果。\n\n![](img/638603_1_En_4_Fig13_HTML.jpg)\n\
  \n图 4-13\n\n*Flutter 单选按钮小部件*\n\n提示\n\n对 `SearchLocation` 感到困惑？我不怪你。它是一个枚举。单选按钮与枚举配合使用效果非常好。\n\
  \n以下是上面提到的 `SearchLocation` 枚举的创建方式：\n\n```\nenum SearchLocation { anywhere, title,\
  \ text }\n```\n\n## 滑块\n\n当你希望用户选择一个介于上限和下限之间的数值时，滑块是一种方便的交互方式（图 4-14）。\n\n![](img/638603_1_En_4_Fig14_HTML.jpg)\n\
  \n图 4-14\n\n值为 25 的滑块\n\n要在 Flutter 中实现一个，你需要使用 `Slider` 小部件，它需要 `onChanged` 事件和\
  \ `value` 属性（类型为 `double`）。它还有 `min`（默认为 `0.0`）和 `max`（默认为 `1.0`）。零到一的范围很少有用，所以你通常会改变它们。它还有一个可选的\
  \ `label` 属性，这是一个指示器，用于告知用户他们正在选择的值。\n\n```\nSlider(\nlabel: numberOfResults.toString(),\n\
  min: 0.0,\nmax: 100.0,\ndivisions: 100,\nvalue: numberOfResults.toDouble(),\nonChanged:\
  \ (val) {\nsetState(() => numberOfResults = val.round());\n},\n);\n```\n\n## 下拉菜单\n\
  \n当需要从少量选项中选择一个时（比如枚举），下拉菜单非常有用。假设我们有这样一个枚举：\n\n```\nenum SearchType { web, image,\
  \ news, shopping }\n```\n\n显然，我们定义了一个 `SearchType` 类型，它可以是 `web`、`image`、`news`\
  \ 或 `shopping`。如果我们希望用户从中选择一个，我们可能会向他们展示一个 `DropdownButton` 小部件，初始状态可能看起来像图 4-15。\n\
  \n![](img/638603_1_En_4_Fig15_HTML.jpg)\n\n图 4-15\n\n*未选择任何内容时的 `DropdownButton`*\n\
  \n然后，当他们点击下拉菜单时，它看起来像图 4-16。\n\n![](img/638603_1_En_4_Fig16_HTML.jpg)\n\n图 4-16\n\
  \n*展开后显示选项的 `DropdownButton`*\n\n当他们点击其中一个选项时，该选项被选中（图 4-17）。\n\n![](img/638603_1_En_4_Fig17_HTML.jpg)\n\
  \n图 4-17\n\n*选中了一个选项的 `DropdownButton`*\n\n要创建这个 `DropdownButton`，我们的 Flutter 代码可能如下所示：\n\
  \n```\nSearchType searchType = SearchType.web;\n//其他代码放在这里\nreturn DropdownButton(\n\
  value: searchType,\nitems: [\nDropdownMenuItem(\nvalue: SearchType.web, child: Text('Web')\
  \ ),\nDropdownMenuItem(\nvalue: SearchType.image, child: Text('Image') ),\nDropdownMenuItem(\n\
  value: SearchType.news, child: Text('News') ),\nDropdownMenuItem(\nvalue: SearchType.shopping,\
  \ child: Text('Shopping') ),\n],\nonChanged: (val) => searchType = val,\n);\n```\n\
  \n请注意，所有项的类型都是 `DropdownMenuItem`。它们有 `value` 和 `child` 属性，但 `onChanged` 事件处理程序位于菜单上，而不是菜单项上。仔细想想，这还挺有道理的。\n\
  \n## 整合表单小部件\n\n我们拥有了所有这些不同类型的字段，它们外观漂亮且功能出色，这很棒。但你通常希望将它们组合在一起，以便可以作为一个组进行某种程度的控制。为此，你将使用\
  \ `Form` 小部件。\n\n\n\n## 表单组件\n\n在 Flutter 中，当有多个相互依赖的字段或需要添加验证逻辑时，`Form` 组件会很有帮助。但并非所有场景都必然需要它。如果不需要，你可以忽略\
  \ `Form` 组件。在真正需要了解 `Form` 组件之前，尽管跳过这一节去读下一章，我完全不会介意。\n\n……还在看？好吧。让我们看看 `Form` 组件能为我们做些什么。系好安全带，因为接下来的旅程会有些颠簸……\n\
  \n表单需要一个 `GlobalKey`。还记得上一章我们介绍过键（keys）吗？当时我们说除了少数情况外，键通常可以忽略。而这里正是需要键的场景之一。如果你决定使用\
  \ `Form`，就需要一个类型为 `FormState` 的 `GlobalKey`：\n\n```\nGlobalKey _key = GlobalKey();\n\
  ```\n\n然后将这个键设置为 `Form` 的一个属性：\n\n```\n@override\nWidget build(BuildContext context)\
  \ {\nreturn Form(\nkey: _key,\nautovalidate: AutovalidateMode.always,\nchild: //\
  \ 所有表单字段都将放在这里\n);\n}\n```\n\n乍一看，`Form` 似乎没有带来什么变化。但仔细观察，你会发现我们现在可以访问以下内容：\n\n\
  *   `autovalidate` – `always` 表示当任何字段发生变化时立即运行验证。`disabled` 表示你需要手动触发验证。`onUserInteraction`\
  \ 表示每次用户交互时都运行验证。（我们将在几页后讨论验证。）\n\n*   键本身，我们在上面的代码中称其为 `_key`。\n\n这个 `_key` 拥有一个\
  \ `currentState` 属性，该属性又包含以下方法：\n\n1.  `save()` – 通过调用每个字段的 `onSaved` 方法来保存表单内的所有字段。\n\
  \n2.  `validate()` – 运行每个字段的 `validator` 函数。\n\n3.  `reset()` – 将表单内的每个字段重置为 `initialValue`。\n\
  \n**注意：** `currentState` 是一个可空属性。这意味着我们必须使用 `?` 或 `!` 来安抚编译器。记住，`?` 表示如果它为 null，则在此处停止处理（即什么也不做）。而\
  \ `!` 表示我们确信它此时永远不可能为 null。为了简洁起见，你会看到我使用 `!`。\n\n有了这些，你就可以理解 `Form` 如何处理其嵌套字段了。当你调用这三个方法中的任何一个时，它都会遍历所有内部字段并对每个字段调用相应的方法。在\
  \ `Form` 级别的一次调用将触发所有字段的对应操作。\n\n但请稍等！如果 `_key.currentState.save()` 调用了字段的 `onSaved()`，我们需要提供一个\
  \ `onSaved` 方法，对吗？`validate()` 调用 `validator` 同理。但是 `TextField`、`DropdownButton`、`Radio`、`Checkbox`\
  \ 和 `Slider` 这些组件本身并没有这些方法。现在该怎么办？我们需要将每个字段包裹在一个 `FormField` 组件中，而这个组件**确实**拥有这些方法。（这坑越来越深了。）\n\
  \n### FormField 组件\n\n这个组件存在的全部意义就是为内部组件提供 `onSaved` 和 `validator` 事件处理器。`FormField`\
  \ 组件可以通过 `builder` 属性包裹任何组件：\n\n```\nFormField(\nbuilder: (state) {\nreturn TextField();\
  \ // 任何字段组件，如 Switch、Radio、Checkbox 或 Slider。\n},\nonSaved: (String initialValue)\
  \ {\n// 在此处将值推送到仓库或其他地方。\n},\nvalidator: (String val) {\n// 在此处放置验证逻辑（下文将进一步说明）。\n\
  },\n),\n```\n\n所以，我们首先用 `FormField` 组件包裹每个输入组件，并在一个名为 `builder` 的方法中完成此操作。然后，我们可以添加\
  \ `onSaved` 和 `validator` 方法。\n\n**注意：** 虽然 `Switch`、`Checkbox` 和 `Slider` 被包裹在\
  \ `FormField` 中，但 `Radio` 有所不同。你需要将整个 `Radio` 组包裹在一个 `FormField` 中。仔细想想，这很合理——因为整个组确定的是一个值——即\
  \ `groupValue`。\n\n### TextFormField 和 DropdownButtonFormField\n\nFlutter 团队贴心地为我们提供了一个快捷方式。如果你在\
  \ `Form` 内部使用 `TextField`，无需*包裹*它，而是直接*替换*为 `TextFormField` 组件。这个新组件很容易与 `TextField`\
  \ 混淆，但它们是不同的。本质上……\n\n`TextFormField` = `TextField` + `FormField`\n\n`TextFormField`\
  \ 拥有 `TextField` 的所有属性，并额外增加了 `onSaved` 和 `validator`：\n\n```\nTextFormField(\n\
  initialValue: \"一些初始字符串\",\ndecoration: InputDecoration(labelText: '邮箱'),\nonSaved:\
  \ (val) => print(\"表单已保存: $val\"),\nvalidator: (val) {\n// 在此处放置你的验证逻辑\n},\n),\n\
  ```\n\n类似地，当在 `Form` 中使用 `DropdownButton` 时，可以将其替换为 `DropdownButtonFormField`：\n\
  \n```\nDropdownButtonFormField(\nonChanged: (val) => _searchType = val,\nonSaved:\
  \ (val) => _dbRecord[\"searchType\"] == val,\nvalidator: _searchTypeValidator,\n\
  value: _searchType,\nitems: [...],\n),\n```\n\n现在是不是好多了？终于，我们得到了一个让事情变得更简单的喘息之机。复选框没有这个快捷方式，`Radio`\
  \ 和 `Slider` 也没有。只有 `TextField` 和 `DropDownButton` 有。\n\n#### onSaved\n\n记住，你的 `Form`\
  \ 有一个键，这个键拥有一个 `currentState`，而 `currentState` 又有一个 `save()` 方法。都记住了吗？没有？不太清楚？我们换个方式理解：当点击“保存”按钮时，你需要编写代码来调用……\n\
  \n```\n_key.currentState!.save();\n```\n\n……而它会依次调用 `Form` 中每个 `FormField` 的 `onSaved`\
  \ 方法。\n\n#### validator\n\n类似地，你可能已经猜到可以调用……\n\n```\n_key.currentState!.validate();\n\
  ```\n\n……然后 Flutter 会调用每个 `FormField` 的 `validator` 方法。每个 `validator` 函数将接收其待验证的值，并返回一个可为空的字符串。你需要编写函数：如果输入值有效，则返回\
  \ `null`；如果无效，则返回一条错误消息。返回的字符串就是 Flutter 会显示给用户的信息：\n\n```\nreturn Form(\nchild:\
  \ TextFormField(\nvalidator: (val)=> (val == null || val.isEmpty)\n? \"请输入一些文本\"\
  \n: null,\n),\n);\n```\n\n#### 提交表单\n\n我们（终于）准备好实际提交表单了。通常你会在按钮点击时执行此操作，并且只有当所有数据都有效时才希望提交表单。代码可能如下所示：\n\
  \n```\nElevatedButton(\nonPressed: () {\nif (_key.currentState!.validate()) {\n\
  _key.currentState!.save();\nprint(\"表单已保存。\");\n}\n},\nchild: const Text(\"提交\"\
  ),\n);\n```\n\n## 一个大型表单示例\n\n我知道，我知道。这相当复杂。在具体的上下文中看看这些东西是如何组合在一起的可能会有所帮助。请查看代码仓库中名为\
  \ `search_form.dart` 的文件，它在一个大型 `StatefulWidget` 中整合了所有这些部分。\n\n## 总结\n\n理解 Flutter\
  \ 表单需要一些时间。请不要气馁。当你实际使用表单时，很快就会弄明白。虽然表单这个话题可能让你有点望而生畏，但文本、图片、图标和 SnackBar 这些内容是非常直观的，对吧？\n\
  \n在下一章中，我们将学习如何创建各种类型的按钮，并使它们——或任何组件——能够响应点击及其他手势，届时我们的应用将真正活起来！\n\n"
- "# 5. 响应手势\n\n到目前为止，我们已经取得了很大的进展！你现在知道 Flutter 是关于什么的。你对开发和调试过程的工作原理已经相当熟悉。你明白为什么我们使用组件，并且对上一章的值组件已经相当熟悉了。天呐，你甚至可以创建自己的无状态组件了。但我们仍然缺少一个主要的、基础的功能：事件处理。\n\
  \n假设你有一个屏幕，用户在其中选择商品并将其放入购物车。他们将需要在一个商品列表中上下滚动（图 5-1）。向上和向下滑动以滚动是一种手势。要选择商品，他们会点击它。那也是一种手势。然后要将其放入购物车，也许会让他们向右滑动。那又是另一种不同的手势。\n\
  \n![](img/638603_1_En_5_Fig1_HTML.jpg)\n\n图 5-1\n\n一个购物应用\n\n本章的全部内容就是处理这些手势。我们将手势分为两类：内置组件上的手势和自定义组件上的手势。让我们从内置组件上的手势开始讲起。\n\
  \n\n\n## 认识按钮家族\n\n有些手势非常简单，因为它们是某些小部件的内置功能。例如，按钮小部件的创建者知道它们存在的唯一目的就是被按下，然后做出相应的响应。因此，所有按钮都有一个名为\
  \ `onPressed` 的属性。要使用它，你只需将其指向用户按下按钮时想要运行的函数：\n\n```\nIconButton(\n  icon: const\
  \ Icon(Icons.delete),\n  // 回调函数必须返回 void\n  onPressed: () => print(\"tapped\"),\n\
  )\n```\n\n图 5-2 显示了输出结果。\n\n![](img/638603_1_En_5_Fig2_HTML.jpg)\n\n**图 5-2** 一个\
  \ `IconButton`\n\n你可以把 `Button` 看作是所有其他按钮的基类。实际并非如此，但你把其他所有按钮都看作是具有某些特殊功能的 `Button`\
  \ 也没什么坏处。例如，以下这些都是按钮的专用类型的小部件。\n\n| `TextButton` | ![](img/638603_1_En_5_Figa_HTML.jpg)\
  \ |\n| `ElevatedButton` | ![](img/638603_1_En_5_Figb_HTML.jpg) |\n| `IconButton`\
  \ | ![](img/638603_1_En_5_Figc_HTML.jpg) |\n| `FloatingActionButton` | ![](img/638603_1_En_5_Figd_HTML.jpg)\
  \ |\n| `SegmentedButton` | ![](img/638603_1_En_5_Fige_HTML.jpg) |\n| `CupertinoButton`\
  \ | ![](img/638603_1_En_5_Figf_HTML.jpg) |\n\n让我们仔细看看它们。\n\n### `ElevatedButton`\n\
  \n这种按钮看起来像是浮动在页面上方：\n\n```\nElevatedButton(\n  onPressed: () => {},\n  child: const\
  \ Text(\"ElevatedButton\"),\n),\n```\n\n### `TextButton` 和 `IconButton`\n\n这两种按钮有点像是\
  \ `ElevatedButton` 的对立面。它们看起来完全是扁平的，很不起眼，只有简单的文字或图标，不会强烈暗示用户去按下，比如“撤销”按钮或“返回”按钮。\n\
  \n```\nIconButton(\n  icon: const Icon(Icons.delete),\n  onPressed: () => {},\n\
  ),\nTextButton(\n  onPressed: () => {},\n  child: const Text(\"TextButton\"),\n\
  ),\n```\n\n### `FloatingActionButton` (FAB)\n\n这是你常在屏幕右下角看到的那种按钮。它通常是圆形的，明确地向用户提示如何进入工作流的下一步（图\
  \ 5-3）。\n\n![](img/638603_1_En_5_Fig3_HTML.jpg)\n\n**图 5-3** 浮动操作按钮\n\n在 Flutter\
  \ 中，FAB 是 Scaffold 的三个主要组成部分之一。你通常会看到它像这样被包含进来：\n\n```\nWidget build(BuildContext\
  \ context) {\n  return Scaffold(\n    appBar: ...,\n    body: ...,\n    floatingActionButton:\
  \ FloatingActionButton(\n      child: const Icon(Icons.help),\n      onPressed:\
  \ (){},\n    ),\n  );\n}\n```\n\n### `SegmentedButton`\n\n这是一组被视为一个整体的按钮。可以选择一项，也可以选择多项。\n\
  \n```\nSegmentedButton(\n  emptySelectionAllowed: true,\n  multiSelectionEnabled:\
  \ true,\n  selected: selectedValue, // 当前选中的值\n  onSelectionChanged: (value) =>\n\
  \    setState(() => selectedValue = value),\n  segments: const [\n    ButtonSegment(label:\
  \ Text('Option 1'), value: 'option1'),\n    ButtonSegment(label: Text('Option 2'),\
  \ value: 'option2'),\n    ButtonSegment(label: Text('Option 3'), value: 'option3'),\n\
  \  ],\n),\n```\n\n### `CupertinoButton`\n\n一种 iOS 风格的按钮。在 iPhone 上看起来很棒，但在 Android\
  \ 设备上使用 iOS 风格会感觉有点奇怪。如果你使用它，可能打算将它包裹在 `CupertinoApp` 中，而不是本章中其他按钮使用的 `MaterialApp`。如果这样做，请确保在\
  \ Dart 文件顶部添加以下内容：\n\n```\nimport 'package:flutter/cupertino.dart';\n```\n\n## `Dismissible`\n\
  \n所有按钮的创建目的只有一个：响应按下操作。类似地，`Dismissible` 的创建目的也只有一个：响应滑动操作。要使用它，你通常需要构建一个小部件，然后用\
  \ `Dismissible` 将其包裹起来。这样，该小部件就能响应滑动手势：\n\n```\nDismissible(\n  // 向右滑动时给蓝色背景，\n\
  \  // 向左滑动时给红色背景\n  background: Container(color: Colors.blue),\n  secondaryBackground:\
  \ Container(color: Colors.red),\n  onDismissed: (direction) => print(\"You swiped\
  \ $direction\"),\n  child: SomeWidget(),\n);\n```\n\n注意，顾名思义，它用于取消（dismiss）一个小部件，在将其“滑走”时从视图中移除它。但如果我只想滑动它，而不想取消它呢？这就需要自定义手势了。\n\
  \n## 为自定义小部件创建自定义手势\n\n为什么 `Dismissible` 能理解滑动手势？为什么按钮能理解 `onPressed` 手势？因为开发者将它们写入了代码中。你的自定义小部件也需要编写手势程序。但由于是*你*在编写它们，你可以创建自己的手势。并且你可以创建比简单按下更有趣的手势。你可以让你的小部件响应滑动、长按、双击和捏合缩放。\n\
  \n| `Tap` | 即按下。包括双击（点按两次） |\n| `LongPress` | 长时间按在屏幕上——大约一两秒钟 |\n| `Scale` | 即捏合或展开，当你的手指分开时\
  \ |\n| `Drag` | 即滑动 |\n\n**注意**\n\n还有一个 `Pan` 手势，它与 `Drag` 非常相似，为了简化，我们在此略过。\n\n\
  响应自定义手势需要以下步骤：\n\n1.  确定你的手势及其行为。\n2.  正常创建你的自定义小部件。\n3.  添加一个 `GestureDetector`\
  \ 小部件。\n4.  将手势与其行为关联起来。\n\n### 第一步：确定你的手势及其行为\n\n这一步很简单。你的用户体验专家可能在你拿到设计稿之前就已经完成了。你只需列出你想响应的手势，以及检测到该手势时应执行的操作。\n\
  \n我们将通过一个例子来演示。假设用户看到一个人物列表，需要选择他们喜欢和不喜欢的人。我们让用户向右滑动他们喜欢的每个人，向左滑动他们不喜欢的每个人。再假设用户有时想在两个人之间添加一个新人物。我们会让他们用双指将两个人分开——就像在他们之间为新条目腾出空间一样。最后，也许我们会让用户长按来删除一个人物。\n\
  \n| 手势 | 动作 |\n| --- | --- |\n| 向右滑动 | 将他们添加到“喜欢”列表 |\n| 向左滑动 | 将他们添加到“不喜欢”列表 |\n\
  | 捏合（实际上是反向捏合） | 插入一个新人物 |\n| 长按 | 删除那个人物 |\n\n### 第二步：创建你的自定义小部件\n\n按照我们在前几章中学到的方法编写\
  \ Dart 代码。这是一个人物列表：\n\n```\nclass ManagePeople extends StatelessWidget {\n  List\
  \ fetchPeople() {\n    return [\n      {\"first\":\"Kevin\", \"last\":\"Malone\"\
  },\n      {\"first\":\"Kelly\", \"last\":\"Kapoor\"},\n      {\"first\":\"Creed\"\
  , \"last\":\"Bratton\"},\n      {\"first\":\"Dwight\", \"last\":\"Schrute\"},\n\
  \      {\"first\":\"Andy\", \"last\":\"Bernard\"},\n      {\"first\":\"Pam\", \"\
  last\":\"Beasley\"},\n      {\"first\":\"Jim\", \"last\":\"Halpert\"},\n      {\"\
  first\":\"Robert\", \"last\":\"California\"},\n      {\"first\":\"David\", \"last\"\
  :\"Wallace\"},\n      {\"first\":\"Ryan\", \"last\":\"Howard\"},\n    ];\n  }\n\n\
  \  @override\n  Widget build(BuildContext context) {\n    var _peopleObjects = fetchPeople();\n\
  \    return ListView(\n      children: _peopleObjects.map((person) =>\n        Person(person:person)).toList(),\n\
  \    );\n  }\n}\n```\n\n### 第三步：添加一个 `GestureDetector` 小部件\n\n`GestureDetector`\
  \ 小部件与大多数 UX 小部件不同——它是不可见的。你可以将某个小部件用 `GestureDetector` 包裹起来，或者将其嵌套在 `child` 属性中；它非常灵活。无论哪种方式，它都能检测并处理该小部件的手势。由于看不见它，它除了\
  \ `child` 属性或 `build` 方法之外没有多余的其他属性或方法，正如你所期望的那样。事件才是关键所在！\n\n在这里，我们用 `GestureDetector`\
  \ 包裹每个 `Person`：\n\n```\nreturn ListView(\n  children: _peopleObjects\n    .map((person)\
  \ =>\n      GestureDetector(child: Person(person: person))\n    ).toList(),\n);\n\
  ```\n\n\n\n#### 第四步：将手势与其行为关联起来\n\n最后一步。为你在第一步中设计的每个事件分配一个方法。`GestureDetector`（手势检测器）支持大量事件^(¹⁰)，因此它们可能会让人感到非常困惑。我们在这里将其归纳为最常用的一些事件。\n\
  \n| 手势 | 要使用的事件 |\n| --- | --- |\n| 点击（按下） | `onTap` |\n| 双击 | `onDoubleTap` |\n\
  | 长按 | `onLongPress` |\n| 左右滑动 | `onHorizontalDragUpdate`、`Start`、`End` |\n| 上下滑动\
  \ | `onVerticalDragUpdate`、`Start`、`End` |\n| 斜向滑动 | `onPanUpdate`、`Start`、`End`\
  \ |\n| 捏合 | `onScaleUpdate`、`Start`、`End` |\n\n#### 示例 1：响应长按\n\n长按（图 5-4）会忽略简单的点击，但当用户持续按下较长时间（比如一两秒）时会触发。假设我们的用户体验设计团队决定，长按将表示用户想要删除一个用户。\n\
  \n![](img/638603_1_En_5_Fig4_HTML.jpg)\n\n图 5-4\n\n长按\n\n为了实现这一点，我们将添加 `onLongPress`\
  \ 事件处理器：\n\n```\nGestureDetector(\n  child: Person(person: person),\n  onLongPress:\
  \ () {\n    _people.remove(person);\n    print(\"已删除 ${person['first']}\");\n  },\n\
  );\n```\n\n#### 示例 2：通过捏合添加新项目\n\n假设我们的用户体验专家建议，用户可能想要向列表中添加项目，并指定插入的位置。为了表达这一点，他们将通过反向捏合（双指张开）来展开列表（图\
  \ 5-5）。\n\n![](img/638603_1_En_5_Fig5_HTML.jpg)\n\n图 5-5\n\n捏合\n\n我们需要检测用户是在向内捏合还是向外张开。正常的向内捏合应该被忽略。但向外张开——即他们张开手指——意味着我们正在添加一个新用户。请注意，某些事件处理器会接收到一个事件对象。这个对象包含了关于该特定事件的信息。在缩放/捏合的情况下，它包含一个名为\
  \ `scale` 的属性。如果 `scale` 大于 1.0，则这是一个向外张开（放大）。假设如果用户进行的向外张开操作达到正常缩放的两倍，我们就认为他们想要向列表中添加一个新用户：\n\
  \n```\nonScaleUpdate: (e) {\n  if (e.scale > 2.0)\n    addPerson(context);\n},\n\
  ```\n\n#### 示例 3：向左或向右滑动\n\n现在，我们的用户体验团队决定，如果用户在列表中的某个人上向右滑动，我们应该将其添加到“好人”列表；如果用户向左滑动，则将其添加到“坏人”列表（图\
  \ 5-6）。\n\n![](img/638603_1_En_5_Fig6_HTML.jpg)\n\n图 5-6\n\n滑动\n\n要检测滑动，我们会寻找拖拽或平移。当我们预期用户可能进行*斜向*滑动时，会使用平移（pan）。`HorizontalDrag`（水平拖拽）仅针对左和右；它会忽略\
  \ Y 方向。`VerticalDrag`（垂直拖拽）仅针对上和下；它会忽略 X 方向上的任何变化。由于我们只关心左滑或右滑，我们将专注于 `HorizontalDrag`\
  \ 手势。\n\n我们的应用可以通过使用 `onHorizontalDragEnd` 事件来响应任何滑动。在这种情况下，我们还需要关注滑动的方向：是从左到右还是从右到左？因此，我们必须在每种情况下都查看事件对象。在拖拽开始时，我们保存用户手指所在的\
  \ X 位置。然后随着每个像素的移动，拖拽更新事件会捕获当前的 X 位置。最后，在拖拽结束时，我们做一个简单的计算；如果结束时的 X 位置更大，我们就知道是向右滑动了。否则，就是向左滑动：\n\
  \n```\ndouble swipeStartX = 0;\nString swipeDirection = \"\";\nreturn GestureDetector(\n\
  \  child: Person(person: person),\n  onHorizontalDragStart: (e) {\n    swipeStartX\
  \ = e.globalPosition.dx;\n  },\n  onHorizontalDragUpdate: (e) {\n    swipeDirection\
  \ =\n      (e.globalPosition.dx > swipeStartX) ? \"Right\" : \"Left\";\n  },\n \
  \ onHorizontalDragEnd: (e) {\n    if (_swipeDirection == \"Right\")\n      updatePerson(person,\
  \ status: \"nice\");\n    else\n      updatePerson(person, status: \"naughty\");\n\
  \  },\n);\n```\n\n## 结论\n\nFlutter 的手势直观易懂。它们的工作方式与普通开发者预期的一致，使我们易于编写代码，也让用户易于使用。当被触发时，所有事件都会在单独的线程上运行，因此让它们返回\
  \ `Async<>` 对象是完全没问题的。因此，请随意将你的事件处理函数标记为 `async`，并用 `await` 来填充它们。^(¹¹)\n\n脚注 1\
  \ 2\n\n"
- "# 6. 导航与路由\n\n所有应用都涉及从一个屏幕*移动*到另一个屏幕的概念。用户点击购物车按钮，我们就进入购物车场景。用户点击“继续购物”按钮，我们就继续浏览以购买更多商品。一些应用开发者称之为路由。另一些则称之为导航。不管你怎么称呼它，这都是\
  \ Flutter 让事情变得简单的领域之一，因为只有四种导航方式：\n\n- **堆栈（Stacks）** – 每个 widget 都是全屏的。用户通过点击按钮来遍历预定义的工作流程。历史记录会被维护，用户可以通过按返回按钮回溯。\n\
  - **抽屉（Drawers）** – 屏幕的大部分区域显示一个 widget，但在左边缘，有一个抽屉正对着用户。当用户按下它或向右滑动它时，它会滑出并显示一个菜单选项。按下一个选项会更改主屏幕区域的\
  \ widget。\n- **标签页（Tabs）** – 在屏幕的顶部或底部会预留一些空间来放置一组标签页。当你点击某个标签页时，我们会显示与该标签页对应的 widget。\n\
  - **对话框（Dialogs）** – 虽然严格来说它们不属于导航的一部分，但它们也是一种查看另一个 widget 的方式，所以我们将其纳入。对话框是模态的（即弹出窗口），会一直显示直到用户将其关闭。\n\
  \n这些方法中的每一种都依赖于你的应用拥有一个 `MaterialWidget` 作为其祖先。让我们从堆栈导航开始，深入探讨这些方法。\n\n## 堆栈导航\n\
  \n如果你是一位经验丰富的开发者，你对队列和堆栈应该不陌生。如果不是，让我简要解释一下。假设你在厨房工作。盘子洗完后，会被堆叠起来，对吧？每个盘子都被放在堆栈的顶部。这被称为*压入（pushing）*堆栈。当需要上菜时，你自然会拿起最后一个放入的盘子，也就是堆栈顶部的那个。这被称为从堆栈顶部*弹出（popping）*。\n\
  \nFlutter 的导航就是使用堆栈工作的。当你想将用户带到一个新场景时，你会将一个 widget `push()` 到堆栈的顶部，用户就会看到该 widget。每次你\
  \ `push()` 时，都会使场景堆栈变得越来越高。当你希望用户返回到他们之前的位置时，你会从堆栈顶部 `pop()` 掉最后一个场景，然后会露出什么？是之前的那个场景。\n\
  \n使用 Flutter 的堆栈，你通常会预先定义场景（也称为路由）并为每个场景命名。这必须在 `MaterialApp` 层面完成，如下所示：\n\n```\n\
  Widget build(BuildContext context) {\n  return MaterialApp(\n    title: '购物应用',\n\
  \    initialRoute: '/',\n    routes: {\n      '/': (ctx) => LandingScene(),\n  \
  \    '/browse': (ctx) => Browse(),\n      '/product': (ctx) => ViewProduct(),\n\
  \      '/checkout': (ctx) => Checkout(),\n    },\n  );\n}\n```\n\n请注意，使用路由时，我们不再使用\
  \ `home` 属性。取而代之的是使用 `initialRoute` 属性。\n\n提示\n\n如果你的 `initialRoute` 是 `\"/\"`，你可以完全省略它，Flutter\
  \ 会假定它是 `\"/\"`。\n\n\n\n### 向前与向后导航\n\n要在场景间导航，你需要使用 `Navigator.pushNamed(context,\
  \ route)` 和 `Navigator.pop(context)`。\n\n要将用户推送到另一个路由：\n\n```\nRaisedButton(\nchild:\
  \ const Text('结账'),\nonPressed: () => Navigator.pushNamed(context, '/checkout'),\n\
  ),\n```\n\n当他们完成任务并想要返回时：\n\n```\nRaisedButton(\nchild: const Text('返回'),\nonPressed:\
  \ () => Navigator.pop(context),\n),\n```\n\n等等，还有更多！注意，如果你使用了 `Scaffold`，`appBar`\
  \ 中会自动添加一个返回箭头（图 6-1）。点击它即可返回。如果你的用户在 Android 设备上，无处不在的 Android 返回键也同样有效（图 6-2）。\n\
  \n![](img/638603_1_En_6_Fig2_HTML.jpg)\n\n图 6-2 —— Android 返回键与栈协同工作\n\n![](img/638603_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1 —— `appBar` 中的返回箭头\n\n### 使用匿名路由\n\n使用命名路由时，你的路由方案是自文档化的。当你的团队成员想要审查场景级别的组件时，只需前往\
  \ `MaterialApp` 找到路由即可。瞧！所有可访问的页面一目了然。\n\n还有一种路由方式，不需要在 `MaterialApp` 中预定义路由表。相反，你可以动态生成路由。由于没有名称，我们将之称为匿名路由。匿名路由更加即兴和灵活，但对于你的团队成员来说，也更容易变得不可预测。\n\
  \n你随时可以：\n\n```\nNavigator.push(\ncontext,\nMaterialPageRoute(builder:\n(BuildContext\
  \ context) => SecondRoute()\n)\n);\n```\n\n如你所见，这种方式要复杂得多。但如果想要自定义过渡效果，或者不想使用预定义路由，它就很受欢迎。通过这种方式，你可以导航到任意组件，无论它是否在命名路由列表中。\n\
  \n### 场景关闭后获取结果\n\n使用栈式导航时，每次调用 `pop()` 都会返回其调用者。因此，每个场景都有可能返回一个值。这虽然不常见，但在将用户引导至工作流时却非常有用。假设你的应用有一个维护\
  \ `person` 对象的区域。该 `person` 对象在 `MyPersonWidget` 中定义，我们提供了一个按钮来修改登录凭据，另一个按钮来修改电话号码，还有一个按钮来修改\
  \ X/Twitter 账号。当用户点击每个按钮时，我们可能会通过 `push()` 将他们导航到一个路由来修改数据。如果这样，当我们在 `pop()` 时，需要将修改后的数据返回给\
  \ `MyPersonWidget`。在这种情况下，我们会以略微不同的方式使用 `push()`；我们需要一个变量来接收返回值：\n\n```\n// 这里需要\
  \ 'async'，因为下面要使用 'await'。\nonPressed:  () async {\n_person.xHandle =\nawait Navigator.pushNamed(context,\
  \ '/xHandle');\n},\n```\n\n注意\n\n`await` 关键字意味着 `pushNamed()` 返回一个 `Future`。同时请注意，从此路由返回的任何值都将赋值给\
  \ `_person.xHandle`。\n\n那么这个值是如何从 `XWidget` 返回的呢？当然是在 `pop()` 中！\n\n```\nNavigator.pop(context,\
  \ xHandle);\n```\n\n`Navigator.pop()` 是重载的。如果你添加第二个参数，它将会被返回给最初调用 `push()` 的组件。在上述示例中，`xHandle`\
  \ 将被返回。\n\n对于层级较浅的应用，使用 `push()` 和 `pop()` 的效果很好。但你的应用可能具有深层导航树且包含大量选项。这类应用通常不适合用大量按钮来进行\
  \ `push()` 和 `pop()`。相反，它们应该有一个导航菜单。Flutter 为我们提供了两种类型。较简单的应用可以使用标签页。更复杂的应用则可以使用抽屉。下面我们来看看抽屉。\n\
  \n## 抽屉导航\n\n当我们有大量导航选项——多到无法放入标签页时，抽屉是非常好的选择。在许多响应式网站上，你会看到页面顶部有一个菜单，包含指向网站其他页面的链接。当网站被放置在小型设备或甚至狭窄的浏览器窗口中查看时，该菜单会被一个汉堡菜单替代，点击后会下拉出一个包含相同选项的菜单。本质上，这是网站对有限屏幕空间的响应，提供了用户需要时才显示的菜单选项。\n\
  \n由于大多数手机屏幕空间已经有限，你可能会选择将菜单选项放在抽屉里，这样在用户准备好查看之前，它不会占用宝贵的屏幕空间（图 6-3）。用户将点击如今常见的汉堡菜单（那个有三条横线的图标），选项会从左侧滑出（图\
  \ 6-4）。当用户选择某个选项后，我们将通过 `Navigator.push()` 将他们导航到一个新的路由。\n\n![](img/638603_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4 —— 抽屉打开时的场景\n\n![](img/638603_1_En_6_Fig3_HTML.jpg)\n\n图 6-3 —— 抽屉关闭时的场景\n\
  \n### 抽屉组件\n\n你需要一个 `NavigationDrawer` 组件，这是一个内置的 Flutter 组件，具有滑出、滑入以及包含菜单选项的功能。使用抽屉时，你总是将其放在\
  \ `Scaffold` 的 `drawer` 属性中，如下所示：\n\n```\nWidget build(BuildContext context) {\n\
  return Scaffold(\nbody: SomeFullPageWidget(),\ndrawer: NavigationDrawer(child: Column(\n\
  children: [\nText('选项 1'),\nText('选项 2'),\nText('选项 3'),\n],\n),),\n);\n}\n```\n\
  \n请注意，当你的 `Scaffold` 中有抽屉时，它的汉堡图标会取代 `appBar` 的返回按钮。除非你手动创建自己的按钮，否则这两个按钮无法同时显示。因此，虽然抽屉导航和栈式导航*可以*协同工作，但可能会显得有些尴尬。一个让它们很好配合的例子是，在顶层使用抽屉，然后在所有下层使用栈式导航。\n\
  \n提示\n\n你希望整个应用都能使用一致的抽屉吗？如果是，我们通常在每个场景中放置一个 `Scaffold`，并在其中包含抽屉。因此，最好将抽屉放在独立的组件中，然后包含它。\n\
  \n```\nreturn Scaffold(\nappBar: AppBar(\ntitle: const Text('抽屉导航'),\n),\nbody:\
  \ const Text('抽屉导航'),\ndrawer: MyDrawer(),\n);\n```\n\n\n\n### 填充抽屉\n\n添加抽屉本身很简单。关键在于如何将条目放入抽屉，并让它们导航到其他组件。请注意，`Drawer`\
  \ 有一个*child*属性，它只接受单个组件。要让抽屉中有多个子组件，你需要使用支持多个子组件的组件，例如`Column`（不可滚动）或`ListView`（可滚动）。\n\
  \n无论你选择哪种，都需要在其中放入可点击的内容，因为要进行导航，你需要像使用堆栈导航一样调用`Navigator.push()`或`Navigator.pushNamed()`。\n\
  \n**提示**  \n有一个很酷的组件叫`DrawerHeader`，它专门用于占据抽屉顶部的大片区域。它非常适合放置你的 Logo 或其他品牌信息，让用户知道他们正在使用哪个应用。这虽然只是装饰性的，但效果确实很棒。\n\
  \n以下是完整的代码。它生成了图 6-4 中的截图。\n\n```dart\nreturn Drawer(\n  child: ListView(\n    children:\
  \ [\n      DrawerHeader(\n        child: Stack(\n          children: [\n       \
  \     Image.asset('lib/assets/Logo.jpg'),\n            Container(\n            \
  \  alignment: Alignment.bottomRight,\n              child: Text('My Brand')),\n\
  \          ],\n        ),\n      ),\n      ListTile(\n        leading: const Icon(Icons.looks_one),\n\
  \        title: const Text('Widget 1'),\n        onTap: () => Navigator.pushNamed(context,\
  \ '/widget1')\n      ),\n      ListTile(\n        leading: const Icon(Icons.looks_two),\n\
  \        title: const Text('Widget 2'),\n        onTap: () => Navigator.pushNamed(context,\
  \ '/widget2')\n      ),\n      ListTile(\n        leading: const Icon(Icons.looks_3),\n\
  \        title: const Text('Widget 3'),\n        onTap: () => Navigator.pushNamed(context,\
  \ '/widget3')\n      ),\n    ],\n  ),\n);\n```\n\n抽屉导航虽然很好，但用户体验专家对此有一些疑虑。他们声称^((12))这会显著降低应用的可用性，使得你的应用更难被发现和操作。他们认为问题在于选项在用户主动请求之前是隐藏的。他们的异议可以通过一个始终可见的提示（affordance）来解决。说到这个……\n\
  \n## 标签导航\n\n正如你所想，标签系统将 N 个标签与 N 个组件一一对应。当用户按下标签 1 时，他们看到组件 1，依此类推（图 6-5）。这种匹配是通过`DefaultTabController`、一个包含`Tab`组件的`TabBar`组件以及一个`TabBarView`组件来实现的。\n\
  \n![](img/638603_1_En_6_Fig6_HTML.jpg)\n\n图 6-6  \n同一个`TabBar`，选中了第四个标签\n\n![](img/638603_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5  \n一个`TabBar`，选中了第二个标签\n\n**提示**  \n虽然标签数量没有硬性上限，但如果`TabBar`上的标签太多，你的应用会变得极其难用。因为点击那些微小的标签实在太困难。如果实在没办法，你可以将`isScrollable`设置为`true`，并让用户知道他们可以向左滑动来滚动标签列表。\n\
  \n### DefaultTabController\n\n`DefaultTabController`是最不直观的部分。你只需要知道必须有它，否则你会得到图\
  \ 6-7 中的错误。\n\n![](img/638603_1_En_6_Fig7_HTML.jpg)\n\n图 6-7  \n当你忘记添加`TabController`时\n\
  \n创建它的最简单方法是将所有内容包裹在一个带有`length`属性的`DefaultTabController()`中。问题就解决了。这部分非常简单——简单到你可能会想，为什么\
  \ Flutter 不为你隐式创建一个？如果你这么想，那也不算错：\n\n```dart\nWidget build(BuildContext context)\
  \ {\n  return DefaultTabController(\n    length: 5,\n    child: Scaffold(\n    \
  \  ...\n    );\n  }\n}\n```\n\n### TabBarView\n\n接下来，你需要添加一个`TabBarView`组件。这个组件包含的是当用户按下标签时最终会显示的组件，并定义了它们将显示在*哪里*。通常，这会占据屏幕的其余部分，但你也可以将其他组件放在`TabBarView`的上方、下方或任何位置。你应该提供与`DefaultTabController`的`length`属性相同数量的组件（理所当然）：\n\
  \n```dart\nchild: Scaffold(\n  ...\n  body: TabBarView(\n    children: [\n     \
  \ WidgetA(),\n      WidgetB(),\n      WidgetC(),\n      WidgetD(),\n      WidgetE(),\n\
  \    ],\n  ),\n```\n\n### TabBar 和 标签\n\n最后，我们来定义标签本身。标签可以包含文本、图标，或者两者兼有。下面是一个包含五个标签的`TabBar`，每个标签只有图标：\n\
  \n```dart\nchild: Scaffold(\n  appBar: AppBar(\n    title: const Text('标签导航演示'),\n\
  \    bottom: const TabBar(\n      tabs: [\n        Tab(icon: Icon(Icons.looks_one)),\n\
  \        Tab(icon: Icon(Icons.looks_two)),\n        Tab(icon: Icon(Icons.looks_3)),\n\
  \        Tab(icon: Icon(Icons.looks_4)),\n        Tab(icon: Icon(Icons.looks_5)),\n\
  \      ],\n    ),\n  ),\n  ...\n```\n\n要为`Tab()`添加文本，请提供一个`child`属性：`Tab(child:\
  \ Text('选项 1'))`。\n\n**注意**  \n每个标签与`TabBarView`中的每个子组件存在一一对应的关系，它们按位置进行匹配。你必须有相同数量的标签和`TabBarView`内的组件，并且顺序必须一致。\n\
  \n### 将 TabBar 放在底部\n\n请注意，之前我们选择将`TabBar`放在`appBar`中，它自然出现在屏幕顶部。但有时你的设计需要标签显示在屏幕底部。这很容易实现，因为`Scaffold`有一个名为`bottomNavigationBar`的属性，它设计用于容纳一个`TabBar`：\n\
  \n```dart\nchild: Scaffold(\n  ...\n  bottomNavigationBar: const TabBar(\n    tabs:\
  \ [\n      Tab(icon: Icon(Icons.looks_one)),\n      Tab(icon: Icon(Icons.looks_two)),\n\
  \      Tab(icon: Icon(Icons.looks_3)),\n      Tab(icon: Icon(Icons.looks_4)),\n\
  \      Tab(icon: Icon(Icons.looks_5)),\n    ],\n  ),\n),\n```\n\n![](img/638603_1_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8  \n位于底部的`TabBar`\n\n**注意**  \n`TabBar`的默认外观是在深色背景上显示浅色文字。因此，当你将`TabBar`放置在浅色背景上时，文字可能难以辨认（浅色叠加浅色）。要解决这个问题，可以将你的`TabBar`包裹在一个具有更深背景颜色的`Material`组件中。\n\
  \n## 对话框组件\n\n我们最后一个导航类别严格来说可能根本不算导航类别——对话框。从某种意义上说，你是在显示另一个组件，所以……算导航？但从另一种意义上说，你基本上是在显示一个弹出窗口，所以……不算导航。¯\\\
  _(ツ)_/¯\n\n无论哪种方式，对话框都是常见的东西，我们应该介绍一下。由于它们在本章其他部分不太好归类，我们暂时假装它们是导航主题之一。嗯，配合一下。\n\
  \n### `showDialog()` 和 `AlertDialog`\n\n`showDialog()`是 Flutter 的一个内置方法。你必须提供一个`context`和一个返回`Widget`的`builder`方法，通常返回的是`SimpleDialog`或`AlertDialog`。`AlertDialog`有一个*actions*参数——这是一个由（通常是）`TextButton`组成的`List`，用于让用户关闭对话框（图\
  \ 6-9）。\n\n![](img/638603_1_En_6_Fig9_HTML.jpg)\n\n图 6-9  \n一个简单的`AlertDialog`\n\
  \n```dart\nElevatedButton(\n  child: const Text('我是一个按钮。点我'),\n  onPressed: () =>\
  \ showDialog(\n    context: context,\n    builder: (BuildContext context) {\n  \
  \    return AlertDialog(\n        content: const Text('按“确定”继续'),\n        actions:\
  \ [\n          TextButton(\n            child: const Text('确定'),\n            onPressed:\
  \ () => Navigator.pop(context)),\n        ],\n      );\n    },\n  ),\n),\n```\n\n\
  这看起来比实际需要的更复杂。而这已经是最简单的形式了！如果你想给用户提供更多选择，它会变得更复杂。\n\n\n\n### 响应式对话框\n\n`showDialog()`\
  \ 返回一个 `Future<T>`，这意味着它可以向调用者返回一个值。假设你想要用户通过“是”或“否”来回应（图 6-10）。\n\n![](img/638603_1_En_6_Fig10_HTML.jpg)\n\
  \n**图 6-10** – 可返回值的 `AlertDialog`\n\n你可以像这样创建对话框并处理响应：\n\n```\nElevatedButton(\n\
  child: const Text('获取响应'),\nonPressed: () async {\n// 构建器在此处返回用户的选择。\n// 由于这是一个\
  \ Future，我们使用 'await' 来\n// 将其转换为 String\nString response = await showDialog(\n\
  context: context,\nbuilder: (BuildContext context) {\nreturn AlertDialog(\ncontent:\
  \ const Text('你确定吗？'),\nactions: [\nTextButton(\nchild: const Text('是'),\n// 关闭时返回\
  \ \"是\"。\nonPressed: () => Navigator.pop(context, '是')),\nTextButton(\nchild: const\
  \ Text('否'),\n// 关闭时返回 \"否\"。\nonPressed: () => Navigator.pop(context, '否')),\n\
  ],\n);\n},\n);\n// 对上面 'await' 得到的响应进行处理。\nprint(response);\n},\n),\n```\n\n**提示**\
  \ – 顾名思义，`SimpleDialog` 组件是 `AlertDialog` 的简化版本。它没有操作按钮，因为点击任意位置即可关闭。它的构造函数参数较少，例如\
  \ `titleTextStyle`、`contentTextStyle` 等。当你不需要用户对提示做出响应，而只是进行通知时，主要使用它。\n\n## 导航方法可以组合使用\n\
  \n虽然你可以通过堆叠导航进入带抽屉的组件，再从那里导航到带选项卡的组件，但你需要谨慎。这些方法并非不兼容，但混合使用时可能会变得相当复杂！试想一下；如果你通过\
  \ `push()` 堆叠导航到一个带抽屉的组件，`appBar` 中的返回按钮将不再可用。Android 底部有软返回按钮，但 iOS 没有。因此用户将陷入无法返回的困境。另一个例子，`TabBarView`\
  \ 包含组件，但这些组件可以说是被托管的，因此它们不应该有 `Scaffold`。如果你尝试使用另外两种方法中的任何一种导航到同一个组件，你将无法返回……既没有抽屉可显示，也没有返回按钮可点击。用户再次陷入困境。\n\
  \n我们建议只坚持使用两种不同的类型，并保持层级一致。例如，为用户提供带选项卡的导航体验非常常见，而在每个选项卡内部，你可以使用堆叠导航。但若设计得比这复杂得多，你可能会忙得不可开交。\n\
