- "# 7. 管理状态\n\n我们从第一章开始就一直铺垫这个主题，因为我们一直在编写继承自 `StatelessWidget` 的类。既然 Flutter 有一个\
  \ `State**less**Widget`，那么你可能会想它也应该有一个 `State**ful**Widget`。没错，你想对了。\n\n但究竟什么是 `StatefulWidget`？它与无状态组件有何不同？我们何时选择一种而非另一种？`StatefulWidget`\
  \ 的结构是怎样的？使用它有什么规则吗？如果数据发生变化，如何重新渲染？都是好问题，对吧？耐心点，年轻的绝地武士，我们将在本章中回答所有这些以及更多问题。\n\n\
  **警告** – 本章不适合胆小者。本章将介绍一些令人费解的概念。不是说你应付不了！我们只是提前给你打个预防针，这样当你遇到一些更深层次的概念和代码时，不会灰心。做好准备就好。\n\
  \n### 什么是状态？\n\n> *状态是值发生变化时需要重新渲染的组件数据。*\n> \n> *——Rap Payne ;-)*\n\n`StatelessWidgets`\
  \ 可能包含数据，但这些数据要么在组件存活期间不会改变，要么不会改变屏幕的外观。当然，当 Flutter 销毁并重新创建组件时，这些数据可能会改变，但这不算。要成为状态，它必须在组件处于活动状态时发生变化。\n\
  \nFlutter 提供了一些开箱即用且自带状态的组件。\n\n| - `AppBar` | - `InputDecorator` |\n| - `BottomNavigationBar`\
  \ | - `MonthPicker` |\n| - `Checkbox` | - `Navigator` |\n| - `DefaultTabController`\
  \ | - `ProgressIndicator` |\n| - `Dismissible` | - `Radio` |\n| - `DrawerController`\
  \ | - `RefreshIndicator` |\n| - `DropdownButton` | - `Scaffold` |\n| - `EditableText`\
  \ | - `Scrollbar` |\n| - `Form` | - `Slider` |\n| - `FormField` | - `Switch` |\n\
  | - `GlowingOverscrollIndicator` | - `TextField` |\n| - `Image` | - `YearPicker`\
  \ |\n\n……以及更多。这些组件都拥有需要维护和监控的内部数据，以便当其变化时，Flutter 能重新渲染组件以在屏幕上显示所述变化。这很难理解吗？让我们举一个简单的例子：`TextField`\
  \ 组件。\n\n是的，我们正在讨论这个行为类似于文本框的内置组件；最终用户可以在其中输入字符。你当然意识到，当用户输入时，组件会跟踪并显示他们正在输入的内容。我的朋友，这就是状态——发生变化并实时显示的数据。\n\
  \n这听起来很棒，但我们如何编写自己的 `StatefulWidget` 呢？请继续阅读！\n\n\n\n## `StatefulWidget` 的结构\n\n\
  每个 `StatefulWidget` 看起来都是这样的：\n\n```\nclass Foo extends StatefulWidget {\n  @override\n\
  \  State createState() => _FooState();\n}\n\nclass _FooState extends State {\n \
  \ // 这里的私有变量即被视为“状态”\n  @override\n  Widget build(BuildContext context) {\n    return\
  \ someWidget;\n  }\n}\n```\n\n**注意：** 这里有两个类：一个是组件类，一个是状态类！\n\n任何有状态的组件初看都很复杂，但一旦你熟悉了它的结构，就会变得得心应手。我们通常将这两个类写在同一个\
  \ Dart 文件中。组件类继承自 `StatefulWidget`，并且是公开的，因为它会被放置在其他组件中。\n\n状态类始终是私有的，因为只有当前组件才能访问到这个类。状态类负责以下工作：\n\
  \n1. 定义和维护状态数据。\n2. 定义 `build()` 方法——它知道如何在屏幕上绘制组件。\n3. 定义数据收集或事件处理所需的任何回调函数。\n\n\
  那么组件类还剩下什么工作呢？不多了。组件类基本上只是让出空间而已。\n\n那么为什么要把它们分开呢？有两个原因。首先，[单一职责原则](https://en.wikipedia.org/wiki/Single_responsibility_principle)（SRP）建议我们由一个部分负责绘制组件，另一个部分负责处理数据。这是良好的软件设计。其他框架也建议你将\
  \ UI 与状态管理分离，但大多数并不强制要求。Flutter 则强制执行。\n\n其次是性能。重绘需要时间。重新计算状态也需要时间。当我们像这样分离它们时，Flutter\
  \ 就有机会独立处理这两件事。有时，仅仅因为状态发生变化，并不需要进行重绘。这样我们就节省了重绘的周期。\n\n此外，当我们重绘时，Flutter 会创建并绘制一个全新的组件。内存中的旧组件不再需要，因此会被取消引用并最终被垃圾回收。这很棒，但状态仍然需要保留。如果\
  \ Flutter 保留那个旧的状态对象，它就可以被重用，而不是被垃圾回收和重新创建。通过分离这些对象，Flutter 解耦了它们，使它们能够各自以最高效的方式被处理。这是一个精妙的设计！\n\
  \n## 关于状态的最重要规则！\n\n对状态数据的所有更改都必须满足以下条件：\n\n1. 在状态类中\n2. 在 `setState()` 的函数调用内部：\n\
  \n```\nsetState(() {\n  // 在此处对所有状态变量进行更改...\n  _value = 42; // <-- ...就像这样\n});\n\
  ```\n\n`setState()` 接收一个函数，这个函数会在……嗯……不久之后运行。Flutter 子系统会批量处理这些更改，并在它认为最优的时间统一执行。这极其高效，原因之一就是它会减少屏幕重绘的次数。\n\
  \n`setState()` 不仅以最高效、最可控的方式设置变量，而且它总是强制此组件重新渲染。它会在幕后调用 `build()`。最终结果是：当你更改一个值时，组件会自行重绘，用户就能看到新版本。请注意，如果此组件内部包含子组件（即*内部*组件），它们也会在\
  \ `build()` 方法中，因此调用 `setState()` 实际上会重绘此组件中的**所有内容**，包括其所有子树。\n\n如果这让你瞬间惊慌，请记住\
  \ Flutter 使用的是虚拟组件树，所以即使我们告诉它绘制所有内容，它也能智能地判断屏幕的哪些部分不需要刷新，并且只在技术上重绘那些真正需要更新的部分。它超级高效！\n\
  \n## 向下传递状态\n\n好吧，被你说中了。从技术上讲，你不能将状态从宿主组件传递给内部组件，因为状态只存在于组件*内部*。但我们确实想向下传递数据。这些数据可能是宿主组件中的有状态数据，并且可能会被转移到内部组件的状态中。\n\
  \n但这并不新鲜。我们在 `StatelessWidget` 中已经这样做过。提醒一下，你只需声明类级别的 final 变量，并在构造函数参数中提供它们的初始值即可。\n\
  \n但是，传递进来的值如何在状态类中可见呢？Flutter 为我们提供了一个名为 `widget` 的对象，它代表了 `StatefulWidget`。换句话说，如果在\
  \ `StatefulWidget` 中有一个名为 `\"x\"` 的变量，那么在 `State` 类中就可以通过 `widget.x` 来访问它：\n\n```\n\
  class Foo extends StatefulWidget {\n  // 从其宿主传递进来的值\n  Foo({required this.passedIn,\
  \ super.key});\n  final String passedIn;\n\n  State createState() => _FooState();\n\
  }\n\nclass _FooState extends State {\n  @override\n  Widget build(BuildContext context)\
  \ {\n    return Text(widget.passedIn); // <-- 看到了吗？\"widget.\"！\n  }\n}\n```\n\n\
  现在我们知道了如何将数据从宿主组件向下传递给内部组件，接下来我们反其道而行之，看看如何将数据从内部组件向上传递回宿主组件。\n\n## 将状态向上提升\n\n\
  又……又被你说中了。你不能传递状态。但情况更糟。在 Flutter 中，你什么都不能往*上*传。\n\nFlutter 的数据流是单向的。没有例外。数据只能从宿主组件向下流向内部组件。我们这样做已经，大概，有\
  \ 200 页了吧？但有时我们需要数据从内部组件向上流回宿主组件。\n\n例如，假设我们有一个 `Login` 组件，包含用户名/密码的 `TextField`\
  \ 和一个提交按钮。我们会把这个 `Login` 组件放在其他组件中，前提是用户尚未登录。登录的业务逻辑必须放在 `Login` 组件本身。但当用户成功登录后，我们确实需要让宿主组件——甚至所有组件——知道用户现在已经认证通过。令牌需要被传回上层。但当我们无法将数据（状态）向上传递给宿主时，该怎么做呢？\n\
  \n诀窍在这里。不要将数据往*上*传。而是将处理方法往*下*传！在 Dart 中，函数是一等公民。这意味着它们的引用可以像数据一样被传递。这也意味着你可以将一个函数从宿主组件向下传递给内部组件。现在内部组件拥有了这个函数的句柄，它可以像调用自己的函数一样调用它。当然，当内部组件调用它时，如果它往这个函数传递了一个值，那么该值就会在最初定义该函数的宿主组件中可见。\n\
  \n这种技术被称为*提升状态*（图 7-1）。\n\n![](img/638603_1_En_7_Fig1_HTML.png)\n\n**图 7-1** 提升状态\n\
  \n\n\n## 状态管理示例\n\n我们最好通过一些代码来巩固这些概念。假设有一个应用，允许用户通过三个滑块分别调节红、绿、蓝数值来创建颜色。这些颜色会混合并显示在一个大圆中（图\
  \ 7-2）。\n\n![](img/638603_1_En_7_Fig2_HTML.jpg)\n\n图 7-2  \n一个有状态组件的示例\n\n显然，当滑块数据变化时，大圆需要重绘。这种需要触发重绘的变化数据就是状态！虽然我们可以在技术上把所有内容都放在一个名为`ColorMixer`的大组件中，但本书已经讲过，要将大组件拆分为更小、更专一的小组件。让我们提取出`ColorCircle`，用于顶部的大圆和底部的收藏颜色。既然我们有三个带标签的滑块，它们的功能完全相同，那么最好也将滑块/标签提取为一个`ColorValueChanger`组件。那么，图\
  \ 7-3 中的布局如何？\n\n![](img/638603_1_En_7_Fig3_HTML.png)\n\n图 7-3  \n组件树的可能布局方式\n\n\
  `ColorMixer`必须是有状态的：\n\n```\nimport 'package:flutter/material.dart';\nimport 'color_circle.dart';\n\
  import 'color_value_changer.dart';\n\n// 有状态组件\nclass ColorMixer extends StatefulWidget\
  \ {\n  const ColorMixer({super.key});\n\n  @override\n  State createState() => _ColorMixerState();\n\
  }\n\n// 状态类\nclass _ColorMixerState extends State {\n  // 这三个变量是组件的'状态'\n  int _redColor\
  \ = 0;\n  int _blueColor = 0;\n  int _greenColor = 0;\n\n  @override\n  Widget build(BuildContext\
  \ context) {\n    return Column(\n      children: [\n        // 该组件使用了变量（即状态）\n\
  \        ColorCircle(\n          color: Color.fromRGBO(\n              _redColor,\
  \ _greenColor, _blueColor, 1),\n          radius: 200,\n        ),\n        // 以下三个组件将\
  \ _setColor 函数向下传递，以便\n        // *此处*的状态能在下层被修改。这被称为\"状态提升\"。\n        ColorValueChanger(property:\
  \ \"Red\", value: _redColor,\n            changeColorValue: _setColor),\n      \
  \  ColorValueChanger(property:\"Green\",value:_greenColor,\n            changeColorValue:_setColor),\n\
  \        ColorValueChanger(property: \"Blue\",value:_blueColor,\n            changeColorValue:\
  \ _setColor),\n      ],\n    );\n  }\n\n  void _setColor(String property, int value)\
  \ {\n    setState(() {\n      _redColor = (property == \"Red\") ? value : _redColor;\n\
  \      _greenColor = (property == \"Green\") ? value : _greenColor;\n      _blueColor\
  \ = (property == \"Blue\") ? value : _blueColor;\n    });\n  }\n}\n```\n\n请注意这一点：我们将`ColorCircle`所需的一切——颜色和尺寸——全部传递给了它。这两者在`ColorCircle`内部都不会改变，因此它可以是无状态的。如果`ColorMixer`的状态发生变化，我们只需调用`setState()`，从而重新渲染它，并进而重新渲染其所有子组件`ColorCircle`的实例。你看到了吗？子组件`ColorCircle`可以保持无状态，因为其有状态的父组件`ColorMixer`将状态变量向下传递了！\n\
  \n同样地，我们向每个`ColorValueChanger`传递一个初始值，并传递一个对`_setColor`方法的引用。请记住，向下传递一个函数意味着该函数在子组件中可用并可执行。尽管是子组件执行它，但该函数实际上存在于父组件中！\n\
  \n以下是在内部的`ColorValueChanger`组件中的实现方式：\n\n```\nimport 'package:flutter/material.dart';\n\
  \nclass ColorValueChanger extends StatefulWidget {\n  // 从宿主组件传入的值\n  const ColorValueChanger({\n\
  \    required this.property,\n    required this.value,\n    required this.changeColorValue,\
  \ super.key});\n\n  final String property;\n  final int value;\n  final Function\
  \ changeColorValue; // createState() => _ColorValueChangerState();\n}\n\nclass _ColorValueChangerState\
  \ extends State {\n  int _value = 0;\n\n  @override\n  Widget build(BuildContext\
  \ context) {\n    _value = widget.value;\n    return Column(\n      children: [\n\
  \        Text(widget.property),\n        Slider(\n          min: 0, max: 255,\n\
  \          value: _value.toDouble(),\n          label: widget.property,\n      \
  \    onChanged: _onChanged,\n        )\n      ],\n    );\n  }\n\n  _onChanged(double\
  \ value) {\n    setState(() => _value = value.round());\n    // 这里是调用从宿主（父）组件传入的设置函数的地方。\n\
  \    widget.changeColorValue(widget.property, value.round());\n  }\n}\n```\n\n##\
  \ 何时使用状态？\n\n但你知道吗？避免复杂状态的最佳方法就是完全避免状态。几乎每一位专家都同意，如果能够完全避免状态，那就这样做。但何时需要状态、何时不需要，有时会令人困惑。\n\
  \n例如，颜色选择器上的标签是组件内的数据。这应该是状态吗？不，当然不是；它不会改变。`for`循环中的循环计数器呢？也不是；它从不会影响`build()`方法中的任何内容，因此不需要放入`setState()`中。看到了吗？状态有时是可以简化或消除的。\n\
  \n图 7-4 总结了如何判断。\n\n![](img/638603_1_En_7_Fig4_HTML.jpg)\n\n图 7-4  \n如何判断是否应在组件中使用状态\n\
  \n## 结论\n\n现在你明白了。状态是可能发生变化并会以某种方式影响显示的数据。它必须在`setState()`方法内修改，否则用户永远无法看到变化。它只能私有地存在于`StatefulWidget`中——其他组件无法访问。\n\
  \n但这带来了一个非常、非常大的问题。如果状态是完全私有的，那么当我们需要在多个不同的组件之间共享数据时该怎么办？我们可以通过构造函数向下传递数据，也可以通过传递函数向上提升状态。但远亲组件之间呢？共享大量复杂数据呢？我们为你准备了几种解决方案，这正是下一章的主题——状态管理库！\n\
  \n脚注\n\n## 状态管理库\n\n我们在上一章学到的内容，即使组件树变得无限深，也能按预期工作。我们可以一直将状态向上提升并向下传递。但请意识到，随着你的应用变得越来越大，状态管理也会变得愈发复杂。当复杂度太高时，使用更高级的状态管理模式会更好。这些模式通常不易学习，但在你的应用发展到一定阶段时，它们就值得你付出努力去掌握。\n\
  \n在本章中，我们将探讨几种模式、几个组件和几个库。然后，我们将重点介绍两个库：一个简单的库，以及目前最流行的库——`Riverpod`。\n\n### InheritedWidget\n\
  \n这是一个相对简单的解决方案，可能对于大多数需求来说过于简单了。`InheritedWidget`是 Flutter 内置的一个组件。本质上，它暴露了一小部分变量，这些变量对其组件树中的所有后代组件都是可用的。从某种意义上说，它创建了伪全局变量。它们在`InheritedWidget`之下的任何地方都可用，但只能以非常可控的方式访问。`InheritedWidget`定义了需要在其所有后代组件之间共享的变量。然后，后代组件可以沿着组件链向上查询`InheritedWidget`并访问这些变量。其他几种方法（Provider、Redux、Riverpod\
  \ 等）都是对`InheritedWidget`的封装。\n\n优点：是本章所有解决方案中最简单的。\n\n缺点：尽管如此，对于许多 Flutter 新手来说，它仍然令人望而却步。它功能简陋，只适用于最基础的应用状态。\n\
  \n\n\n### BLoC 模式\n\nBLoC 是业务逻辑组件的缩写，它既不是一个库，也不是一个小部件，而是一种设计模式。BLoC 模式最初是为了让代码能够在网页、移动应用和后端之间复用而创建的。由于它诞生于谷歌，Flutter\
  \ 社区自然而然地接受了它，并一度使其成为状态管理的代名词。\n\nBLoC 将数据视为流，并以响应式的方式改变状态。它将 UI（用户界面）与业务逻辑分离，使你的代码更具以下优势：\n\
  \n*   **可维护性** – 关注点分离更清晰，代码导航和更新更轻松。\n*   **可测试性** – 你可以独立于 UI 交互来测试业务逻辑。\n*  \
  \ **可扩展性** – 有效处理复杂的应用状态。\n\nBLoC 包含多个不同的部分：\n*   `StreamControllers`：控制数据流\n* \
  \  `StreamTransformers`：在数据流入时进行处理\n*   `StreamBuilders`：在新值到达时运行，并将其渲染到 UI 中\n\n\
  优点：社区中有很多人可以（并且愿意）帮助你。它是一个可靠且经过充分验证的模式。\n\n缺点：BLoC 理解起来和写起来都不简单。虽然有 `bloc` 库可以提供帮助，但大多数人在编写\
  \ BLoC 组件时并不使用该库，因此它处于非常底层的水平。\n\n#### 一些库\n\n##### ScopedModel\n\n[ScopedModel](https://pub.dartlang.org/packages/scoped_model)^(¹⁵)\
  \ 是一个由 Brian Egan 从 [Fuchsia](https://fuchsia.googlesource.com/)^(¹⁶) 代码库“厚颜无耻地借用”而来的库（嘿，这是\
  \ Brian 自己的话，可不是我的！他是个谦虚的人）。ScopedModel 创建了能够注册监听器的数据模型。每个模型在数据发生变化时通知其监听器，以便它们进行自我更新。巧妙的设计。\n\
  \n这是由 Brian 维护的一个外部第三方包。它构建在 `InheritedWidget` 之上，提供了一种稍好一些的方式来访问、更新和改变状态。它允许你轻松地将数据模型从父级小部件向下传递给其子孙后代，并在模型更新时重新构建使用该模型的所有子级小部件。\n\
  \n优点：很好地完成了分离表示层和数据的任务。与本章其他方法相比，它更易于理解。\n\n缺点：该代码库目前未得到维护，可能是因为开发者倾向于使用更现代的解决方案。一些人认为\
  \ `ScopedModel` 在处理复杂应用时存在性能问题。\n\n##### Redux 与 Hooks\n\n我之所以包含这两个库，是专为 React 开发者准备的。这两个库都模拟了同名的\
  \ React 功能。如果你并非来自 React 世界，请跳过本节。但如果你热爱 React，这些可能是你最简单的选择。瞧，你已经跨越了学习曲线。[flutter_​redux](https://pub.dartlang.org/packages/flutter_redux)^(¹⁷)\
  \ 由我们之前在 `ScopedModel` 中提到过的 Brian Egan 编写，[flutter_​hooks](https://pub.dartlang.org/documentation/flutter_hooks)^(¹⁸)\
  \ 则由巴黎的 Rémi Rousselet 编写，你稍后将在 Provider 和 Riverpod 部分了解到他。\n\n优点：性能非常好。可扩展性很强。\n\
  \n缺点：除非你已经熟悉 React，否则学习曲线非常陡峭。\n\n##### Provider\n\n我在这里提及 Provider，并不是因为你可能会用到它，而是因为你可能会听到它的名字，我不希望你被它诱惑。有更好的选择。Provider\
  \ 一度是最流行的 Flutter 状态管理库。但它已被一个更优的选择所取代：Riverpod（在本章最后一节中介绍）。\n\n优点：一个功能强大且相对简单的包。\n\
  \n缺点：由于其继任者 Riverpod 的出现，未得到积极维护。\n\n##### 哇！好多包！\n\n是不是感到困惑了？这不能怪你。这些包以不同的方式解决同一个问题，有些相似，另一些则采用截然不同的策略。没人期望你除了知道存在这些工具之外还有什么更多了解。当你听到有人说“我们的状态变得混乱了。也许我们应该考虑一下\
  \ BLoC 或 ScopedModel”时，你至少能明白他们在谈论哪种类型的东西。然后，你就可以深入研究这些技术，看看自己可能想用哪一个。\n\n但是，要是能对一两种实际可用的解决方案有所了解，岂不是很好？让我们为其中两个状态管理解决方案编写一点代码：最简单的\
  \ `raw_state`，以及最流行且最健壮的 `flutter_riverpod`。\n\n### Raw State\n\n`raw_state` ([`https://pub.dev/packages/raw_state`](https://pub.dev/packages/raw_state))\
  \ 是学习 Flutter 的理想选择，这也是我们在此介绍它的原因。它也适用于非常简单的应用程序和启动你的 MVP。它通过创建一个名为 `rawState` 的全局变量来解决小部件之间的共享问题。一旦你执行\
  \ `flutter pub add raw_state` 并导入 `raw_state`，这个 `rawState` 变量就会自动定义。\n\n```dart\n\
  import 'package:raw_state/raw_state.dart';\n```\n\n然后，在任何小部件中，你可以将任意数量的值写入 `rawState`：\n\
  \n```dart\nString foo = \"raw_state is stupidly simple\";\nrawState.set(\"aString\"\
  , foo);\nrawState.set(\"aDate\", DateTime.now());\nrawState.set(\"aMap\", {\"foo\"\
  :\"bar\",\"baz\":100} );\n```\n\n注意\n\n键可以是任意字符串，值可以是任何东西——`String`、`double`、`int`、`bool`、`Array`、`Map`、对象……等等。\n\
  \n在任何其他小部件中，你可以从 `rawState` 读取这些值。只需调用 `get` 并传入键即可：\n\n```dart\nString foo = rawState.get(\"\
  aString\");\nDateTime someDate = rawState.get(\"aDate\");\nMap aMap = rawState.get<Map>(\"\
  aMap\");\n```\n\n提示\n\n数据类型（即泛型）是可选的，但出于安全原因，这是一种良好的实践。请注意，为了演示，我们在第一次使用时省略了它，但在其余部分都包含了。\n\
  \n`raw_state` 简单得离谱。也许太简单了。它缺乏许多其他库具备的许多保护机制和任何自动更新功能。因此，让我们把注意力转向最后一个库——Riverpod，它由前面提到的\
  \ Rémi Rousselet 编写。\n\n### Riverpod\n\n在撰写本文时，Riverpod 是首选的状态管理解决方案。它功能完备且健壮，并且比上面的一些库更简单。这是一个成功的组合。\n\
  \n警告\n\n请不要误解。我并没有说 Riverpod 很简单。它并不简单。所以，如果你近期不打算使用 Riverpod，直接跳到下一章也没关系。我将列出使用\
  \ Riverpod 最简单的步骤，仅供你入门。但即便如此，它仍令人望而生畏。\n\n以下是使用 Riverpod 的六个基本步骤。\n\n一次性前期准备工作：\n\
  \n1. 安装 `flutter_riverpod`\n2. 用 `ProviderScope` 包裹你的应用\n3. 编写一个 `Provider`\n\n\
  然后，在每个需要的小部件中：\n\n1. 继承自 `ConsumerStateWidget`\n2. 使用 `ref.watch()` 读取数据\n3. 使用\
  \ `ref.read()` 写入数据\n\n让我们逐一审视这些步骤。\n\n#### 1. 安装 `flutter_riverpod`\n\n这一步很简单。要么将其添加到你的\
  \ `pubspec.yaml` 并运行 `flutter pub get`，要么直接运行：\n\n```bash\nflutter pub add flutter_riverpod\n\
  ```\n\n#### 2. 用 `ProviderScope` 包裹你的应用\n\n记住，在你的 `main` 函数中，我们调用 `runApp(App())`。只需用从\
  \ `flutter_riverpod` 导入的 `ProviderScope` 包裹该应用即可：\n\n```dart\nvoid main() => runApp(\n\
  ProviderScope(\nchild: App()\n)\n);\n```\n\n\n\n### 3\\. 编写一个 Provider\n\n在存储值之前，我们需要为*每项*要共享的内容创建一个\
  \ provider。假设我们允许用户在一个 widget 中选择他们最喜欢的颜色，然后在其余 widget 中读取它。我们可以创建一个 `favColorProvier`:\n\
  \n```\nfinal favColorProvider =\nStateProvider((_) => Colors.red);\n```\n\n显然，`StateProvider`\
  \ 是 Riverpod 的一部分。\n\n##### 等等，你所说的这个 *Provider* 到底是什么？\n\n准备工作已经完成，这些步骤只需一次性预先完成。在我们将注意力转向在单个\
  \ widget 中使用 Riverpod 之前，让我们先聚焦于这个 provider 本身。用 Riverpod 的术语来说，provider……嗯……*提供*一个保存的值给任何请求它的对象。为了在彼此封装、相互独立的\
  \ widget 之间共享值，我们会在一个 widget 中写入 provider，然后在另一个 widget 中从同一个 provider 读取。但是如何做到呢？\n\
  \n使用 Riverpod，我们不再继承自 `StatefulWidgets`。相反，我们要继承自 *Consumer*`StateWidgets`。明白了吗？你编写一个*提供*值的\
  \ provider，以及一个*消费*该值的 consumer。很巧妙，对吧？这个 consumer 拥有一个可以访问所有 provider 的 `ref` 属性。来看看……\n\
  \n### 4\\. 继承自 ConsumerStateWidget\n\n每个需要访问共享数据的 widget 都应该以略微不同的方式编写。\n\n**不要这样做：**\n\
  \n```\nclass FavColor extends StatefulWidget {\nconst FavColor({super.key});\n@override\n\
  State createState() => _FavColorState();\n}\nclass _FavColorState extends State\
  \ {}\n```\n\n**相反，应该这样做：**\n\n```\nclass FavColor extends ConsumerStatefulWidget\
  \ {\nconst FavColor({super.key});\n@override\nConsumerState createState() => _FavColorState();\n\
  }\nclass _FavColorState extends ConsumerState {}\n```\n\n你看，神奇之处在于这些 Riverpod 提供的类有一个名为\
  \ `ref` 的属性。而 `ref` 知道所有你在上面创建的 provider。现在让我们来使用它。\n\n### 5\\. 使用 `ref.watch( )`\
  \ 读取数据\n\n在状态化 widget 中，从给定 provider 读取数据的最佳方式是使用 `ref.watch(theProvider)`，它会监视该\
  \ provider，并在 provider 中的值发生变化时，触发其所属的 widget 重新渲染。\n\n```\nColor favColor = ref.watch(favColorStateProvider);\n\
  int favNumber = ref.watch(favNumberStateProvider);\nPerson favPerson = ref.watch(favPersonStateNotifierProvider);\n\
  ```\n\n提示\n\n你也可以使用 `ref.read()` 读取数据。只是 `ref.read()` 只绑定一次；`ref.read()` 不会实时更新，而\
  \ `ref.watch()` 可以。\n\n### 6\\. 使用 `ref.read( )` 写入数据\n\n具有讽刺意味的是，你可以用 `ref.read()`\
  \ 来写入数据。虽然还有其他方法，但这是最直接的方式。只需这样做：\n\n```\nref.read(favColorStateProvider.notifier).state\
  \ = newColor;\n```\n\n当你为这个 provider 的状态赋值时，它会设置值并通知所有监听者——那些之前使用 `ref.watch()`\
  \ 订阅过的对象。\n\n就是这样。你可以设置、写入和读取 Riverpod provider。我们就先讲到这里。这个健壮而强大的包还有更多内容，但你已经掌握了基本概念。我们的篇幅有限，而且\
  \ Riverpod 无疑会继续发展。所以，如果你准备深入探索（我建议你这样做），可以从这里开始：[`https://pub.dev/packages/riverpod`](https://pub.dev/packages/riverpod)。它会引导你前往\
  \ Riverpod 的主页和文档，获取更多信息。\n\n## 结论\n\n我们拥有的状态化 widget 越多，需要在它们之间传递的状态就越多。这可能会很快变得非常复杂，因此我们求助于像\
  \ Redux、Hooks、raw_state 和 ScopedModel 这样的包，但最流行的是 Riverpod，用以管理状态。当然，你也可以手动使用其他工具和技术，如\
  \ BLoC 和 InheritedWidget 来实现，但当你的应用规模变大时，这种方法就变得不切实际了。\n\n既然我们现在可以处理 widget *内部*和\
  \ widget *之间*的数据，接下来让我们看看如何处理我们的应用与某个远程服务器之间的数据。让我们探讨如何发起 HTTP 调用来读取和写入数据。继续往下读！\n\
  \n脚注 1 2 3 4 5\n\n"
- "# 9\\. 使用 HTTP 进行 RESTful API 调用\n\n我们已经非常擅长管理应用程序的状态，但这些数据从何而来？本地文件？本地数据库？用户输入？当然可以。这些都是可能的来源，但真实的应用程序会从云端的某台服务器获取真实数据。你的应用程序会发起\
  \ HTTP 调用，最好是异步的 RESTful HTTP API 调用。它会等待并处理响应，然后通常显示这些数据。哇！这有很多流行词，对吧？在本章中，我们将学习这些术语的含义，以及如何在\
  \ Flutter 应用中处理所有类型的 HTTP 请求和响应。以下是需要了解的内容：\n\n*   究竟什么是 API 调用\n*   发起 HTTP GET\
  \ 或 DELETE 请求\n*   发起 HTTP POST、PUT 或 PATCH 请求\n*   以最简单的方式处理响应\n*   使用 `FutureBuilder`\
  \ 和 `StreamBuilder` 进行更清晰的处理\n*   使用强类型对象实现更清晰的代码\n\n这将是我们本章的计划。此外，还将通过一个允许 HTTP\
  \ 请求的 API 服务进行动手实践。为了确保大家在同一页面上（这里绝对是双关语），我们可能应该从 API 究竟是什么开始讲起。如果你已经熟悉，可以随意浏览或跳过。\n\
  \n## 什么是 *API* 调用？\n\nFlutter 应用程序已经具备从微小的本地数据库读取数据的能力。但它无法读取位于*其他地方*的数据库。换句话说，你不能直接连接到\
  \ SQL Server/MongoDB/PostgresSQL 数据库并读取或写入记录。这是不可能做到的，即使你拥有数据库凭据。我的意思是，想想如果公共应用可以从任何地方连接并直接修改数据，会带来多么严重的安全隐患。因此，开发人员的做法是创建一个服务器端程序，以可控的方式进行读写，然后通过特定的协议（通常是\
  \ `https`）在特定地址上，将该程序暴露在你的网络或互联网上。\n\n为了读取这些服务器端数据，任何用户都可以在发送其凭据（形式为用户名/密码，或更佳的方式是使用一个称为\
  \ API 密钥的唯一且秘密的密钥）后，发起 `http` 请求。\n\n又是 *API* 这个术语。它代表应用程序编程接口（Application Programming\
  \ Interface）。在不同情境下含义不同，但其默认含义已演变为开发人员为了读写数据而向其发送 `http` 请求的任何互联网地址。有大量公开可用的 API，也有许多选项供你自己创建。\n\
  \n当 API 响应时，它会返回一个数据流，这些数据几乎总是以 JSON^(¹⁹) 格式呈现。\n\n\n\n## API 请求的几种类型\n\n与 API 服务器的通信只通过少数几种类型完成（表\
  \ 9-1）。\n\n**表 9-1** HTTP 方法及描述\n\n| HTTP 方法 | 意图 | 说明 |\n| --- | --- | --- |\n\
  | `GET` | 读取记录 | 类似于数据库读取，仅向服务器请求数据 |\n| `DELETE` | 删除记录 | 删除由提供的 ID 指向的记录，不返回数据\
  \ |\n| `POST` | 插入新记录 | 即使已存在类似记录，也创建一条新记录 |\n| `PUT` | 替换现有记录 | 用此记录覆盖现有记录，完全删除旧记录并在此位置添加新记录\
  \ |\n| `PATCH` | 更新现有记录 | 保留原有记录，但用此请求中的数据更新其字段 |\n\n此外还有 `HEAD`、`CONNECT`、`OPTIONS`\
  \ 和 `TRACE` 用于其他类型的请求。典型应用很少使用这些方法。想了解的话，可以查阅 [`http://bit.ly/HTTPMethods`](http://bit.ly/HTTPMethods)。\n\
  \n开发者很少使用除 `GET`、`POST`、`PUT`、`PATCH` 和 `DELETE` 之外的方法。在 Flutter 中，所有这些都是通过导入 `http.dart`\
  \ 使用一个 Dart 库来完成的。\n\n首先，你需要在 `pubspec.yaml` 的依赖部分添加 `http` 包。当你运行 `flutter pub\
  \ get` 后，该包将从 [`https://pub.dev/packages/http`](https://pub.dev/packages/http) 下载。\n\
  \n然后，在任何需要发出这些请求的 Dart 文件中导入 `http.dart`：\n\n```dart\nimport 'package:http/http.dart';\n\
  ```\n\n这将暴露 `http` 类，该类包含与每个 HTTP 方法对应的方法。现在，让我们看看如何使用这个库发送请求。\n\n## 发送 HTTP GET\
  \ 或 DELETE 请求\n\n我们先介绍 `GET` 和 `DELETE` 请求，因为它们是最简单的——它们永远没有请求体。^(²⁰) 事实上，唯一的复杂性在于\
  \ HTTP 请求是异步执行的。它们返回一个 `Future`^(²¹)，你需要用 `.then()` 处理或使用 `await` 等待它。所以你可以这样发出请求：\n\
  \n```dart\nUri uri = Uri.parse('https://us.com/people/1234');\nResponse response\
  \ = await get(uri);\nprint(response.statusCode); // 希望是 200\nMap person = json.decode(response.body);\n\
  print(person['name']);\nprint(person['phone']);\nprint(person['email']);\n```\n\n\
  或者像这样使用 `.then()`：\n\n```dart\nget(uri).then((Response res) {\n  print(res.statusCode);\
  \ // 希望是 200\n  Map person = jsonDecode(res.body);\n  print(person['name']);\n \
  \ print(person['phone']);\n  print(person['email']);\n});\n```\n\n`DELETE` 请求以相同方式完成。实际上，它们通常更简单，因为它们常常没有响应值。`DELETE`\
  \ 要么成功且无返回值，要么失败并返回 400 或 500 系列的响应：\n\n```dart\nResponse response = await delete(uri);\n\
  ```\n\n**注意**\n\n在发送任何类型的 HTTP 请求时，你应该始终在发送之前对 URL 进行编码。这有助于确保 URL 有效，也有助于安全性，尤其是在获取用户输入时。你可以使用\
  \ `Uri.encodeComponent()`、`Uri.encodeQueryComponent()` 和/或 `Uri.encodeFull()` 来实现。像这样调用\
  \ `Uri.encodeFull`：\n\n```dart\nString url = Uri.encodeFull('http://us.com/api/ppl?query=Jo\
  \ Ki');\n```\n\n为简单起见，我们将在示例中省略编码。但在实际开发中，请记住这一点。\n\n## 发送 HTTP PUT、POST 或 PATCH\
  \ 请求\n\n`PUT`、`POST` 和 `PATCH` 与 `GET` 和 `DELETE` 非常相似。最大的区别在于 `PUT`、`POST` 和 `PATCH`\
  \ 都需要请求体——通常是包含 JSON 格式键值对的字符串：\n\n```dart\nString payload = '''\n{\"first\": \"\
  Kamala\", \"last\": \"Khan\", \"id\": 374}\n''';\nResponse response = await post(uri,\
  \ body: payload);\n```\n\n与 `GET` 和 `DELETE` 请求一样，对此响应进行解析。\n\n**注**\n\n使用 `POST`、`PUT`\
  \ 和 `PATCH` 时，我们正在将数据从客户端发送到服务器。明智的做法（有时也是必要的要求）是同时告知服务器我们是如何编码这些数据的。我们将在请求的 HTTP\
  \ 标头中完成此操作。提供一个名为 `Content-Type` 的键，其值为 `application/json`。具体操作如下：\n\n```dart\n\
  Map<String, String> headers = {'Content-Type': 'application/json'};\nResponse res\
  \ = await post(url, headers: headers, body: payload);\n```\n\n既然说到这里，还有许多你可能觉得有用的标头变量，例如\
  \ `Accept`、`Accept-Encoding`、`Authorization`、`Content-MD5`、`Cookie`、`Date`、`Host`、`If-Modified-Since`\
  \ 等。在此处了解它们：[`https://en.wikipedia.org/wiki/List_of_HTTP_header_fields#Request_fields`](https://en.wikipedia.org/wiki/List_of_HTTP_header_fields%2523Request_fields)。\n\
  \n从 API 发送 HTTP 请求并不难，对吧？我们很快就让 Flutter 应用能够发送请求、反序列化响应并将其打印到调试控制台。但 Flutter 的核心在于将这些数据显示在炫酷的组件中。那么，我们该如何将请求集成到组件中呢？\n\
  \n## HTTP 响应到组件\n\n有几种方法可以等待 `Future` 解析然后显示数据。我们通过向你展示三种方法来简化说明：\n\n1.  暴力法\n2.\
  \  `FutureBuilder`\n3.  `StreamBuilder`\n\n暴力法显而易见且易于理解，但我认为你会更喜欢 `FutureBuilder`/`StreamBuilder`，因为它们更简洁、更优雅。\n\
  \n### 暴力法——简单的方式\n\n你已经拥有了显示数据所需的所有工具：你理解 `Future`，也知道如何告诉有状态组件用新数据重绘自身——`setState()`。因此，只需在\
  \ `.then()` 内部或 `await` 之后放置一个 `setState()` 即可：\n\n```dart\nUri uri = Uri.parse('http://us.com/api/people/12345');\n\
  Response response = await get(uri);\nMap body = json.decode(response.body);\nString\
  \ first = body['name'];\nString email = body['email'];\nString imageUrl = body['profilePictureUrl'];\n\
  Widget card = Stack(\n  children: [\n    Image.network(imageUrl,\n        height:\
  \ 300, width: 300, fit: BoxFit.cover),\n    Text(\"$name\"),\n  ],\n);\nsetState(()\
  \ => _cardWidget = card);\n```\n\n当然，只要你的构建方法在某处显示了 `card`，一旦 `Future` 解析完毕（这只有在\
  \ HTTP `GET` 请求返回数据时才会发生），它就会用正确的数据进行渲染。小菜一碟！但这并非最优雅的方式。\n\n\n\n### `FutureBuilder`\
  \ – 更优雅的方式\n\n更好的解决方案可能是使用 `FutureBuilder` 组件。当你面临一个 `Future`，其完成后产生的数据需要在 Flutter\
  \ 组件中渲染时，请考虑使用 `FutureBuilder`。这个场景听起来熟悉吗？应该很熟悉，因为这正是我们在 Flutter 中使用 `Future` 的主要原因。之前那个简单的代码示例，使用\
  \ `FutureBuilder` 可以更加简洁地实现：\n\n```\nFutureBuilder(\nfuture: get(uri),\nbuilder:\
  \ (ctx, AsyncSnapshot snapshot) {\nif (snapshot.connectionState != ConnectionState.done)\
  \ {\nreturn const CircularProgressIndicator();\n}\nif (snapshot.hasError) {\nreturn\
  \ Text('噢不！出错了！ ${snapshot.error}');\n}\nif (!snapshot.hasData) {\nreturn const\
  \ Text('没有可显示的内容');\n}\nfinal Map body =\njson.decode(snapshot.data.body);\nfinal\
  \ int statusCode = snapshot.data.statusCode;\nif (statusCode > 299) {\nreturn Text('服务器错误：$statusCode');\n\
  }\nString first = body['name'];\nString imageUrl = body['profilePictureUrl'];\n\
  return Stack(\nchildren: [\nImage.network(imageUrl,\nheight: 300, width: 300, fit:\
  \ BoxFit.cover),\nText(\"$name\"),\n],\n);\n},\n);\n```\n\n这里不再需要 `setState()`，因为\
  \ `FutureBuilder` 可以直接访问 `Future` 本身，从而知晓何时以及如何重绘自身。在上面的例子中，你可以看到它能够针对每种情况渲染不同的内容：在等待\
  \ `Future` 完成时显示 `ProgressIndicator`，出现错误时显示错误信息，`Future` 中没有数据时显示提示，当然，数据成功返回时则显示对应的组件。\n\
  \n**注意**\n\n在访问 `snapshot.data` 之前，务必检查 `snapshot.hasData` 和/或 `snapshot.hasError`。同时要留意\
  \ HTTP 状态码，它位于 `response.statusCode` 中。如果该数字是 4xx 或 5xx，说明你从服务器收到了一个有效响应，但请求本身有问题，此时你的数据将是\
  \ `null`。\n\n### `StreamBuilder`\n\n`FutureBuilder` 对 `Future` 的处理方式，就是 `StreamBuilder`\
  \ 对 `Stream` 的处理方式。这两个类几乎完全相同，具有相同的格式，使用相同形式的快照，并同样检查 `snapshot.hasError` 和 `snapshot.hasData`。但有时候，我们处理的不是像\
  \ Future 那样的一次性数据返回，而是一个*数据流*，它可能以间断或连续的方式不断到达。在这种情况下，你应该使用 `StreamBuilder`：\n\n\
  ```\nStreamBuilder(\nstream: anythingThatReturnsAStream(),\nbuilder: (BuildContext\
  \ ctx, AsyncSnapshot snapshot){\n// 以下大部分内容与 FutureBuilder 类似，\n// 但这里的数据是一个文档集合，每个文档代表一条记录\n\
  if (snapshot.connectionState != ConnectionState.done) {\nreturn const CircularProgressIndicator();\n\
  }\nif (snapshot.hasError) {\nreturn Text('噢不！出错了！ ${snapshot.error}');\n}\nif (!snapshot.hasData)\
  \ {\nreturn const Text('暂无数据，请稍候...');\n}\nreturn ListView.builder(\nitemCount:\
  \ snapshot.data.documents.length,\nitemBuilder: (BuildContext context, int i) {\n\
  String first = snapshot.data.documents[i]['name'];\nString imageUrl =\nsnapshot.data.documents[i]['imageUrl'];\n\
  return Stack(\nchildren: [\nImage.network(imageUrl,\nheight: 300, width: 300, fit:\
  \ BoxFit.cover),\nText(\"$name\"),\n],\n),\n},\n);\n);\n},\n);\n```\n\n**提示**\n\n\
  像这样编写能够根据新到达的数据自动唤醒并更新自身的代码，有一个专门的术语：*响应式编程*。当我们的应用能够感知外部影响并指示其做出相应反应时，就实现了响应式编程。你可能听说过像\
  \ `rxJava`、`rxJS` 和 `rx.NET` 这样的响应式扩展，它们是为这种风格设计的类库。毫无疑问，Flutter 也有一个对应的库，名为 `rxDart`。你可以在\
  \ [`https://github.com/ReactiveX/rxdart`](https://github.com/ReactiveX/rxdart) 找到它。\n\
  \n## 强类型类\n\n至此，你已经知道如何对 API 发起 HTTP 调用，并在收到响应后如何解包数据并使用它。这为我们使用类型化反序列化模式将这些数据转换为强类型类提供了绝佳条件。\n\
  \n**注意**\n\n发起 HTTP 调用并不强制要求这样做。这仅仅是一种更清晰的处理调用并将数据拉取到可预测结构中的方法。HTTP 数据本质上是非结构化的。这是许多\
  \ Flutter 开发者使用的一种最佳实践，但并非强制要求。所以，如果你不喜欢，完全可以跳过。\n\n类型化反序列化通过三个简单步骤完成：\n\n1.  创建业务类。\n\
  \n2.  编写一个 `.fromJSON()` 方法和/或一个 `.fromJSONArray()` 方法。\n\n3.  在通过 HTTP 调用读取数据时，使用\
  \ `.fromJSON()` 来实例化对象。\n\n### 创建一个业务类\n\n假设我们要读写人员数据。我们应该创建一个 `Person` 类：\n\n```\n\
  class Person {\nString? name;\nString? email;\nString? imageUrl;\n}\n```\n\n###\
  \ 编写一个 `.fromJSON()` 方法\n\n这应该是一个静态方法，它会返回业务类（这里是 `Person`）的一个实例：\n\n```\nclass\
  \ Person {\n// 此处编写更多类代码\nstatic Person fromJson(String jsonString) {\nMap data\
  \ = jsonDecode(jsonString);\nreturn Person()\n..name = data['name']\n..email = data['email']\n\
  ..imageUrl = data['imageUrl'];\n}\n// 可能这里还有更多类代码\n}\n```\n\n注意这里使用了 Dart 的级联运算符，并省略了\
  \ `new` 关键字。两者都是最佳实践。\n\n### 使用 `.fromJSON()` 来实例化对象\n\n“实例化”这个词的字面意思是“注水”。在这个上下文中，数据就是水，我们通过将数据添加到新创建的\
  \ `Person` 对象中来“注水”。你可以使用 `.get()` 方法从 HTTP 服务读取数据，然后像这样将其传入 `.fromJSON()`：\n\n\
  ```\n// 发起 HTTP 调用\nfinal Response res = await get(url);\n// 从响应体（一个 JSON 字符串）中实例化一个\
  \ Person 对象\nPerson p = Person.fromJson(res.body);\n```\n\n看到代码是多么简洁和直接了吗？\n\n我想此刻，你可能想要实践一下这些新学到的知识。接下来，我们就通过一个免费的\
  \ API 服务来练习。\n\n## 一个大综合示例\n\n一个真正的 API 服务会涉及一个数据库，并暴露 GET、POST、DELETE、PUT 和/或 PATCH\
  \ 等端点，这些都需要在服务器端进行大量设置。你最终肯定想达到那种水平，但除非你是全栈开发者，否则那是后端人员的事情。现在，我们先使用 `JSONPlaceholder`，一个用于测试\
  \ API 的免费服务。你可以从 [`https://jsonplaceholder.typicode.com/guide`](https://jsonplaceholder.typicode.com/guide)\
  \ 了解它。\n\n**注意**\n\n`JSONPlaceholder` 接受所有类型的 RESTful 请求，但出于显而易见的原因，他们不能让全世界在未经认证的情况下进行\
  \ `PUT`、`POST` 和 `DELETE` 操作。所以他们实际上不会更改任何服务器数据。如果该服务支持，我们编写的代码本可以更改服务器数据，但既然它不支持，请勿期望看到你的更改被持久化。\n\
  \n如果你想测试这个服务器，可以在你喜欢的浏览器中打开 [`https://jsonplaceholder.typicode.com/users`](https://jsonplaceholder.typicode.com/users)，你将看到前十位用户。恭喜，你已经成功发起了一个\
  \ GET 请求。再试试打开 [`https://jsonplaceholder.typicode.com/users/1`](https://jsonplaceholder.typicode.com/users/1)，你将看到用户\
  \ ID 为 1 的那个人。事实上，你可以尝试不同的 ID 来查看不同的用户。\n\n另外三种 HTTP 方法则不那么简单。你需要使用像 `cURL`、`Postman`\
  \ 或 `SoapUI` 这样的工具来发送 `POST`、`PUT` 或 `DELETE` 请求。\n\n| 方法 | URL | 功能 |\n| --- |\
  \ --- | --- |\n| `DELETE` | [`https://jsonplaceholder.typicode.com/users/1`](https://jsonplaceholder.typicode.com/users/1)\
  \ | 删除用户 #1 |\n| `PUT` | [`https://jsonplaceholder.typicode.com/users/1`](https://jsonplaceholder.typicode.com/users/1)\
  \ | 更新用户 #1 |\n| `POST` | [`https://jsonplaceholder.typicode.com/users`](https://jsonplaceholder.typicode.com/users)\
  \ | 创建新用户 |\n\n那么我们如何在应用中使用这些方法呢？继续往下看吧！\n\n\n\n### 应用程序概览\n\n启动时，应用程序会发送一个 `GET`\
  \ 请求来读取用户列表，并绘制屏幕来显示这些用户（图 9-1）。\n\n![](img/638603_1_En_9_Fig1_HTML.jpg)\n\n图 9-1：人物卡片列表\n\
  \n当用户点击垃圾桶图标时，应用程序会发送一个 `DELETE` 请求来删除该人员。\n\n当用户点击任意用户卡片时，我们会显示一个包含该用户当前信息的表单（图\
  \ 9-2），用户可进行修改并保存。点击保存的 FAB 按钮会向服务器发送一个 `PUT` 请求。\n\n![](img/638603_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2：用于添加或更新人员的“upsert”表单\n\n类似地，当用户点击人员列表上的“+”FAB 按钮时，我们会显示相同的表单，但字段为空，以便他们创建新用户。\n\
  \n### 创建 Flutter 应用\n\n这个项目会很有趣，因为这是我们第一次将本书中的多个主题结合起来。首先，使用 `flutter create people_maintenance`\
  \ 创建 flutter 应用。接下来，确保已安装 `http` 包。\n\n```\nflutter pub add http\n```\n\n打开 `main.dart`\
  \ 并找到你的 `MaterialApp` 组件。移除“home”属性，并添加两个命名路由：\n\n```\nroutes: {\n'/': (_) => const\
  \ ListPeople(),\n'/upsert': (_) => const UpsertPerson(),\n},\n```\n\n然后创建两个新的 `StatefulWidget`，一个命名为\
  \ `list_people.dart`，另一个命名为 `upsert_person.dart`。我们稍后会填充它们的细节。但首先，创建一个业务类来表示 `Person`\
  \ 对象可能是个好主意。\n\n### 创建强类型业务类\n\n由于我们要处理 `Person` 对象，创建一个 `Person` 类来保存每个人员可能是个好主意。这个可选的最佳实践有助于避免在序列化和反序列化服务器数据时出现错误，并为我们提供一个集中管理所有与\
  \ `Person` 相关逻辑的地方：\n\n```\nimport 'dart:convert' show jsonDecode;\nclass Person\
  \ {\nPerson({this.id, this.name, this.email, this.phone});\nint? id;\nString? name;\n\
  String? email;\nString? phone;\n// 单个人员的类型化反序列化模式\nstatic Person fromJson(String\
  \ jsonString) {\nMap json = jsonDecode(jsonString);\nreturn Person(\nid: json['id'],\n\
  email: json['email'],\nname: json['name'],\nphone: json['phone']);\n}\nMap toJson()\
  \ =>\n{'id': id, 'email': email, 'name': name, 'phone': phone};\n// List 的类型化反序列化模式使用\
  \ .map() 方法\nstatic List fromJsonArray(String jsonString) {\nList json = jsonDecode(jsonString);\n\
  return json\n.map((p) => Person(\nid: p['id'],   email: p['email'],\nname: p['name'],\
  \ phone: p['phone']))\n.toList();\n}\n}\n```\n\n### list_people.dart\n\n我们很快会从 RESTful\
  \ 服务中读取人员列表，并希望显示他们的数据。`PeopleList` 组件负责显示这个人员列表：\n\n```\nimport 'package:flutter/material.dart';\n\
  import './people.dart';\nimport './person_widget.dart';\nimport './person.dart';\n\
  class ListPeople extends StatefulWidget {\nconst ListPeople({super.key});\n@override\n\
  State createState() => _ListPeopleState();\n}\nclass _ListPeopleState extends State\
  \ {\n@override\nWidget build(BuildContext context) {\nreturn Scaffold(\nappBar:\
  \ AppBar(title: const Text('People')),\nbody: scaffoldBody,\nfloatingActionButton:\
  \ FloatingActionButton(\nchild: const Icon(Icons.add),\nonPressed: () {\nNavigator.pushNamed(context,\
  \ '/upsert');\n},\n),\n);\n}\n// 注意我们如何提取细节以便让组件对你更抽象。\n// 下面我们对 PersonWidget 也做了同样处理。\n\
  Widget get scaffoldBody {\nreturn FutureBuilder(\nfuture: fetchPeople(), // 获取人员列表的方法\n\
  builder: (ctx, snapshot) {\nif (snapshot.hasError) {\nreturn Text('哦不！出错了！ ${snapshot.error}');\n\
  }\nif (!snapshot.hasData) {\nreturn const Text('未找到人员');\n}\n// 将 JSON 数据转换为 Person\
  \ 数组\nList people =\nPerson.fromJsonArray(snapshot.data.body);\n// 将人员列表转换为组件列表\n\
  List personTiles = people\n.map((Person person) => PersonWidget(\nperson: person,\n\
  editPerson: () => setState(() {\nNavigator.of(context)\n.pushNamed('/upsert', arguments:\
  \ person);\n})))\n.toList();\n// 在可滚动的 ListView 中显示所有人员卡片\nreturn ListView(\nchildren:\
  \ personTiles,\n);\n},\n);\n}\n}\n```\n\n`PersonWidget` 是在屏幕上绘制每个 `Person` 的组件（图\
  \ 9-3）。由于这不是本章的重点，我们暂时省略其细节。但你可以查看 GitHub 仓库以了解细节。\n\n![](img/638603_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3：每个 `PersonWidget` 显示一个人员\n\n### Flutter 中的 GET 请求\n\n回顾一下 `getScaffoldBody()`\
  \ 方法。它包含一个 `FutureBuilder`。`future` 属性指向一个名为 `fetchPeople()` 的方法，该方法只是向 URL 发送一个\
  \ `GET` 请求，该 URL 会以 JSON 数组的形式返回 `Person` 记录：\n\n```\nconst String _baseUrl =\n\
  'https://jsonplaceholder.typicode.com';\nFuture fetchPeople() {\nUri uri = Uri.parse('$_baseUrl/users');\n\
  return get(uri);\n}\n```\n\n一旦你创建了 Flutter 基础设施，`GET` 请求就相当简单，对吧？\n\n### Flutter\
  \ 中的 DELETE 请求\n\n每个 `PersonWidget` 右侧都有一个垃圾桶 `IconButton`。点击它会调用 `deletePerson()`\
  \ 方法，接收我们想要删除的人员。这个 `deletePerson()` 方法应该发送一个 HTTP `DELETE` 请求，通过 ID 指定要删除的人员：\n\
  \n```\nFuture deletePerson(person) {\nUri uri = Uri.parse('$_baseUrl/users/${person.id}');\n\
  return delete(uri);\n}\n```\n\n### upsert_person.dart\n\n我们已经处理了读取人员和删除人员的功能。但添加新人员需要一个表单供用户输入信息。细心的读者会注意到，更新现有人员也需要一个相同的表单。为了遵循\
  \ DRY 原则^(²²)，让我们创建一个表单并同时用于添加和更新操作。\n\n```\nclass _UpsertPersonState extends State\
  \ {\nlate Person person;\n@override\nWidget build(BuildContext context){\n// 获取导航期间设置的'当前'人员。如果该人员\n\
  // 为 null，则我们正在添加新人员，必须实例化一个。\n// 如果该人员不为 null，则我们正在更新该人员。\nPerson? routePerson\
  \ =\nModalRoute.of(context)?.settings.arguments as Person?;\nperson = (routePerson\
  \ == null) ? Person() : routePerson;\nreturn Scaffold(\nappBar: AppBar(\ntitle:\
  \ Text(\n(person.id == null) ? '添加人员' : '更新人员',\n),\n),\nbody: _body,\nfloatingActionButton:\
  \ FloatingActionButton(\nonPressed: () {\n// 保存人员信息\nupsertPerson(person);\n// 然后返回到来的地方\n\
  Navigator.pop(context);\n},\nchild: const Icon(Icons.save),\n),\n);\n}\nWidget get\
  \ _body {\n// 表单代码请查看 github。\n}\n}\n```\n\n注意，在 FAB 的 `onPressed` 处理程序中，我们保存了表单数据并调用了\
  \ `upsertPerson()`。以下是它的实现：\n\n### Flutter 中的 POST 和 PUT 请求\n\n如果是添加操作，我们希望进行 `POST`\
  \ 调用。如果是更新操作，我们希望进行 `PUT` 调用：\n\n```\nFuture upsertPerson(Person person) {\nfinal\
  \ String payload = '''\n{\n\"id\": ${person.id},\n\"name\":\"${person.name}\",\n\
  \"phone\":\"${person.phone}\",\n\"email\":\"${person.email}\"\n}\n''';\nfinal headers\
  \ = {'Content-type': 'application/json'};\n// 如果 id 为 null，则是在添加。如果不是，则是在更新。\nif\
  \ (person.id == null) {\nUri uri = Uri.parse('$_baseUrl/people');\nreturn post(uri,\
  \ headers: headers, body: payload);\n} else {\nUri uri = Uri.parse('$_baseUrl/people/${person.id}');\n\
  return put(uri, headers: headers, body: payload);\n}\n}\n```\n\n\n\n## 结论\n\n不算太糟，对吧？我们从对通过\
  \ HTTP 读写数据几乎一无所知，到能够使用一些相当高级的技术（如类型化反序列化模式和 `FutureBuilder` 组件）来完成一个综合性示例。\n\n\
  如果你按照我上面的代码示例操作，你的应用已经能够完美地读取 HTTP 数据。但它看起来仍然不会像截图那样。你看，我使用了样式和主题来让它更赏心悦目。样式对我们来说仍然有点神秘。嘿，让我们在下一章揭开这个谜团吧！\n\
  \n脚注 1   2   3   4\n\n"
- "# 10. 使用主题进行样式设计\n\n为组件设置样式对你来说并不完全陌生。我们在之前的章节中已经触及了一些小的样式特性，并且在代码示例中你也看到了样式技术。但本章，我们将深入探讨样式。终于到了！\n\
  \n你可以始终进行底层样式设计，所以我们先从它开始。然后，我们将过渡到更复杂但更清晰的——使用主题。最后，我们将通过颜色和自定义字体的细节来结束本章。\n\n\
  ## 思考 Flutter 样式\n\nFlutter 中的样式借鉴了 Android、iOS 开发和 Web 开发的最佳理念。但它并没有*完全照搬*它们的技术。Flutter\
  \ 有自己的方式，如果将 Web 的类比过度延伸，那将是一个错误。Flutter 的样式不是 CSS。虽然 CSS 有某些属性会传递给子元素，但 Flutter\
  \ 样式*不会*继承。例如，你*不能*在你的自定义组件上设置字体系列，然后让其中所有的 `Text`、`TextField` 和按钮都立即开始使用该字体渲染。为了实现这种效果，我们需要创建并应用一个主题。但首先，让我们学习如何将样式应用到元素上。\n\
  \n## 单独样式\n\n我们在之前的章节和代码示例中已经窥见过这一点。大多数组件都接受一个 `style` 属性，以及通常与样式相关的属性，如内边距、边框等。你可以（有时也确实会）手动设置这些值，通常是在你只需要对某个组件的单个实例（例如一个单独的\
  \ `Text` 组件）进行样式设置时。\n\n### 文本样式设计\n\n```\nText(aString, style: TextStyle(\nfontSize:\
  \ 12.0,\nfontWeight: FontWeight.bold,\ncolor: Colors.blue,\nfontStyle: FontStyle.italic,\n\
  )),\n```\n\n`Text` 组件有一个 `style` 属性，它接受一个 `TextStyle` 对象（图 10-1）。\n\n![](img/638603_1_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1\n\n有样式和无样式的对比\n\n你只需将 `style` 属性设置为一个 `TextStyle` 组件的实例，并设置其属性。`TextStyle`\
  \ 支持大约 20 个属性。以下是最常用的几个：\n\n*   `color` – 任何有效的 1600 多万种颜色之一\n*   `decoration` –\
  \ `TextDecoration.underline`、`overline`、`strikethrough`、`none`\n*   `fontSize` –\
  \ 双精度浮点数。字符的高度（像素数）。默认大小为 14.0 像素\n*   `fontStyle` – `FontStyle.italic` 或 `normal`\n\
  *   `fontWeight` – `FontWeight.w100` 到 `w900`。或者 `bold`（即 `w700`）或 `normal`（即 `w400`）\n\
  *   `fontFamily` – 一个字符串\n\n`fontFamily` 是一个更大的话题，我们将在本章末尾讨论。\n\n许多组件都有一个 `style`\
  \ 属性，如果你只需要设置一个组件的样式，这是最佳方式。但最佳实践是尽可能避免使用单独样式。创建并应用一个主题会更好、更清晰。\n\n## 批量更改值\n\n\
  真人真事。我有一个接近完成的应用。它美轮美奂。我从客户的品牌标志中选择了颜色，以为他们会感激我遵循他们的营销方案。嗯，他们的一种颜色是深栗色，我大量使用了它。我的客户讨厌那种颜色，认为它的红色调会传达“危险”或“错误”的信息。你知道吗？他们是对的！我之前就是没建立那种联系。所以我当然想把它全部改掉。\n\
  \n现在，想象一下我必须做什么。遍历整个应用？在数百个 `Text` 组件、边框、阴影、按钮、卡片和磁贴中找到所有出现该颜色的地方？不。因为我使用了主题，在客户等待的时候，我在一个地方就把它改好了。事实上，我们反复尝试了不同的颜色，直到找到他们喜欢的配色方案。这超级简单，一点也不麻烦！让我们来看看使用主题设置样式的正确方法。\n\
  \n## 主题\n\n当你使用主题时，你可以预先在一个文件中一次性地定义样式。为什么呢？\n\n1.  你的整个应用会有一致、连贯的外观和感觉。\n2.  在整个应用中更改样式变得几乎不费吹灰之力。\n\
  \n使用主题包括五个相当简单的步骤：\n\n1.  设置 `ColorScheme`\n2.  设置 `TextTheme`\n3.  创建特定组件的主题\n\
  4.  将所有内容组合到主题中\n5.  如有需要，覆盖底层组件的样式\n\n让我们来逐一完成这些步骤。\n\n### 1. ColorScheme（配色方案）\n\
  \n`ColorScheme` 构成了应用的基本颜色：\n\n*   `primary` – 主要品牌颜色\n*   `secondary` – 强调色\n*\
  \   `tertiary` – 较不突出的颜色\n*   `error` – 用于突出显示错误\n*   `background` – 常规背景颜色\n* \
  \  `outline` – 用于边框\n*   `surface` – 用于卡片和容器背景色\n\n其中四种颜色——`primary`、`secondary`、`tertiary`\
  \ 和 `error`，各自进一步细分为“on”、“container”和“onContainer”。例如，`primary` 有：\n\n*   `primary`\
  \ – 主要品牌颜色\n*   `onPrimary` – 与 `primary` 对比鲜明的颜色；适合阅读\n*   `primaryContainer` –\
  \ 适合 `primary` 的背景色\n*   `onPrimaryContainer` – 在 `primaryContainer` 背景上可读的文本颜色\n\
  \n这些都是经过科学选择、看起来赏心悦目的颜色，它们由单一的主色（*种子*颜色）生成。\n\n```\nvar _scheme = ColorScheme.fromSeed(seedColor:\
  \ );\n```\n\n**注意：** `ColorScheme.fromSwatch( )` 本身并未废弃，但它是为 Material 1 和 2 设计的。如果你使用的是\
  \ Material 3 及更高版本，请使用 `ColorScheme.fromSeed( )`。\n\n来看看三种不同配色方案下的标准颜色（图 10-2 至\
  \ 10-4）：\n\n![](img/638603_1_En_10_Fig4_HTML.jpg)\n\n图 10-4\n\n焦橙色方案\n\n![](img/638603_1_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3\n\n蓝色方案\n\n![](img/638603_1_En_10_Fig2_HTML.jpg)\n\n图 10-2\n\n绿色方案\n\n\
  你当然可以手动创建 `ColorScheme` 对象并设置其每种颜色，但那工作量巨大！相反，让 Flutter 通过 `ColorScheme.fromSeed()`\
  \ 为你完成创建初始方案的艰巨工作，并提供你的种子颜色。\n\n**提示：** 除了上面列出的颜色之外，还有 `shadow`、`scrim`、`surface`、`surfaceVariant`\
  \ 等——总共大约 30 种。不必费心去记住它们。既然你已经明白了概念，到时候查一下你需要的即可。\n\n如果你决定调整一种或多种默认颜色，请使用 `copyWith()`：\n\
  \n```\nColorScheme _colorScheme = ColorScheme.fromSeed(\nseedColor: Colors.green,\n\
  ).copyWith(\nerror: Color.fromARGB(255, 191, 87, 0),\nonError: Colors.white,\n);\n\
  ```\n\n这将用一个命令设置所有颜色。\n\n\n\n### 2\\. `TextTheme`\n\n您的`textTheme`由 15 个`TextStyle`组成。设置它们将自动设置某些小部件的样式。例如，更改`bodyMedium`的`textStyle`将依次改变您添加的每个`Text`小部件、每个`ListItem`和每个`Navigator`的外观。设置`labelLarge`的`textStyle`将依次设置您添加的每个`TextButton`、每个`ElevatedButton`、每个`FAB`和每个`Chip`。您有以下通用分组：\n\
  \n*   Display\n*   Headline\n*   Title\n*   Body\n*   Label\n\n在每个组别背后，您都有 `small`、`medium`\
  \ 和 `large` 三种尺寸。图 10-5 展示了它们的外观。\n\n![](img/638603_1_En_10_Fig5_HTML.jpg)\n\n**Figure\
  \ 10-5** 实际尺寸下的 `TextTheme` 文本样式\n\n同样，我建议使用`.copyWith()`来更改默认值。例如，如果您想让每个`Text`小部件更大，可以这样做：\n\
  \n```dart\nTextTheme _textTheme = const TextTheme().copyWith(\n  bodyMedium: const\
  \ TextStyle().copyWith(fontSize: 18.0),\n);\n```\n\n> **小贴士**\n> `.copyWith()` 是\
  \ Dart 中一种常见的模式。许多许多类都编写了`.copyWith()`方法，允许您对实例的副本进行增量更改。留意这种模式，您会惊讶于它出现的频率。事实上，在您自己的类中编写一个`.copyWith()`方法，您的开发者同行们会感谢您的。\n\
  \n### 3\\. 小部件特定主题\n\n当您不喜欢默认样式时，许多其他显示小部件也具有您可以覆盖的样式。例如，如果您想更改所有`AppBar`和所有`ListTile`的外观该怎么办？\n\
  \n```dart\n// Widget-specific themes\nAppBarTheme _appBarTheme = const AppBarTheme().copyWith(\n\
  \  foregroundColor: _colorScheme.onTertiaryContainer,\n  color: _colorScheme.tertiary,\n\
  \  titleTextStyle: _textTheme.displayLarge!\n    .copyWith(fontFamily: 'Courier'));\n\
  ListTileThemeData _listTileThemeData = ListTileThemeData(\n  tileColor: _colorScheme.secondary,\n\
  \  textColor: _colorScheme.onSecondary,\n  contentPadding: const EdgeInsets.all(10.0));\n\
  ```\n\n请注意，这些主题的层级要低得多，并且仅适用于那些特定的部件。许多小部件都有自己的主题，这些主题由特定于该小部件类型的样式组成。当然，一旦在`Theme`中设置并应用于`MaterialApp`，所有该类型的小部件都将遵循该主题。实际上，您拥有相当多的小部件主题：\n\
  \n`appBarTheme`, `textButtonTheme`, `elevatedButtonTheme`, `cardTheme`, `inputDecorationTheme`,\
  \ `iconTheme`, `sliderTheme`, `tabBarTheme`, `drawerTheme`, `tooltipTheme`, `chipTheme`,\
  \ `dialogTheme`, `pageTransitionTheme`, `floatingActionButtonTheme`, `NavigationRailTheme`,\
  \ `snackBarTheme`, `bottomSheetTheme`, `popupMenuTheme`, `bannerTheme`, `buttonBarTheme`,\
  \ `bottomNavigationBarTheme`, `timePickerTheme`, `outlinedButtonTheme`, `textSelectionTheme`,\
  \ `dataTableTheme`, `checkboxTheme`, `radioButtonTheme`, `sliderTheme`, `switchTheme`,\
  \ `progressIndicatorTheme`。\n\n### 4\\. 将它们整合到一个主题中\n\n是时候将所有这些整合到一个主题中了。我们已经写了很多代码，对吧？主题比您预期的要冗长得多，所以我建议在一个单独的文件中创建它，例如在`theme.dart`中：\n\
  \n```dart\nThemeData themeData = ThemeData(\n  colorScheme: _colorScheme,\n  textTheme:\
  \ _textTheme,\n  // Widget-specific themes only when needed\n  appBarTheme: _appBarTheme,\n\
  \  listTileTheme: _listTileThemeData,\n  // Optionally set other specialized things\
  \ here\n  fontFamily: 'Courier',\n  fontFamilyFallback: const ['monospace', 'serif'],\n\
  );\n```\n\n然后将该主题导入到您的`main.dart`文件中，并将其应用于您的`MaterialApp`：\n\n```dart\nimport './theme.dart';\n\
  class MyApp extends StatelessWidget {\n  @override\n  Widget build(BuildContext\
  \ context) {\n    return MaterialApp(\n      title: 'Themes and Styles Demo',\n\
  \      theme: themeData,\n      routes: {\n        \"/\": (_) => const Dashboard(),\n\
  \        ...,\n      },\n    );\n  }\n}\n```\n\n就是这样！运行您的应用并观察您出色设计的辉煌！无需其他操作。除非，您需要零星地应用单个样式。\n\
  \n### 5\\. 覆盖单个小部件的样式\n\n最后一步。设置您的`ColorScheme`、`TextTheme`和单个小部件主题为您的应用建立了默认的外观和感觉。但有时我们希望某个单独的小部件具有特殊样式。也许您放在页面顶部的`Text()`应该作为页面标题。或者如果您希望一个按钮看起来不同。比如一个“您确定吗？”按钮。也许我们希望那一个按钮——仅仅那一个——从其他按钮中脱颖而出。因此，我们偶尔需要为单个小部件设置样式。当您有主题时，最佳实践是基于主题样式创建一个样式，使用`.copyWith()`来扩展它。然后将其应用于您的特殊小部件。\n\
  \n```dart\n// First, copy the default style & apply your customizations\nTextStyle\
  \ dangerButtonStyle = Theme.of(context)\n    .textTheme\n    .labelLarge\n    .copyWith(\n\
  \        fontSize: 18.0,\n        fontWeight: FontWeight.bold,\n        color: Colors.red,\n\
  \    );\n// Use the custom style in your button widget\nTextButton(\n    onPressed:\
  \ () => deleteEverything(),\n    child: Text(\"Are you sure?\", style: dangerButtonStyle),\n\
  );\n```\n\n> **小贴士**\n> 我们已经看到`MaterialApp`有一个*theme*。碰巧这个主题就是`lightTheme`。`MaterialApp`还有一个*`darkTheme`*。像创建常规（亮色）主题一样创建一个`darkTheme`，并将`MaterialApp`指向它。现在，您的应用可以响应操作系统的亮色和暗色主题变化。\n\
  \n## 关于样式设计的最后思考\n\n在我们结束样式设计这个话题之前，我们确实应该简要讨论一下颜色和字体。如果这些不是您当前立即感兴趣的内容，请随意跳到本章结尾。当您有迫切需求时，再回来看这部分。但在\
  \ Flutter 中，颜色和字体并非完全简单明了。有一些需要注意的陷阱我们将进行讨论。\n\n### 关于颜色的补充说明\n\n大多数 Flutter 样式的应用范围非常狭窄；它们仅对某些严格定义的情况有意义。另一方面，颜色几乎应用于所有地方（图\
  \ 10-6）。边框、文本、背景、图标、按钮和阴影都有颜色。并且它们都以相同的方式指定。例如，下面是一个红色容器中的白色文本，带有黄色边框，所有这些小部件都使用语法`color:\
  \ Colors.somethingOrOther`进行着色：\n\n![](img/638603_1_En_10_Fig6_HTML.jpg)\n\n**Figure\
  \ 10-6** Flutter 中的颜色无处不在\n\n```dart\nchild: Container(\n  decoration: BoxDecoration(\n\
  \    color: Colors.red,\n    border: Border.all(color: Colors.yellow)\n  ),\n  child:\
  \ Text('Colors!',\n    style: TextStyle(color: Colors.white,),\n  ),\n),\n```\n\n\
  您看到背景中那些彩色方块了吗？它们的创建方式如下：\n\n```dart\nList _randomColors() {\n  Random rnd = Random();\n\
  \  return List.generate(25,\n    (int i) => Container(\n      color: Color.fromRGBO(\n\
  \        rnd.nextInt(255), rnd.nextInt(255),\n        rnd.nextInt(255), 1.0),\n\
  \    ));\n}\n```\n\n因此，您可以使用`Color.fromRGBO(red, green, blue, opacity)`创建超过 1600\
  \ 万种颜色中的任何一种，其中三个 RGB 颜色分量每个都是 0 到 255 之间的数字，`opacity`（不透明度）为 1.0 表示完全不透明，0.0 表示完全透明。还有一个`Color.fromARGB(alpha,\
  \ red, green, blue)`，它执行相同的功能，只是将不透明度作为`alpha`移到前面，它是一个介于 0（完全透明）到 255（完全不透明）之间的数字。\n\
  \n如果您有 Web 开发背景，您可能更习惯使用十六进制数字创建颜色。这同样有效：\n\n```dart\ncolor: Color(0xFFFF7F00),\n\
  ```\n\n> **注意**\n> 请小心。那个十六进制数字实际上是“ARGB”，其中前两个十六进制字符是 alpha 通道。如果您忘记了这一点，例如写成`Color(0xFFF700)`，您将绘制出完全透明的颜色，并且永远看不到它。请记住，如果您的颜色不显示，请将典型的网页十六进制数字前面加上“FF”。\n\
  \n\n\n### 自定义字体\n\n有一些内置字体，例如 `Courier`、`Times New Roman`、`serif` 等等。还有多少种？这取决于应用运行的设备类型。由于我们无法控制用户的设备，最佳实践是坚持使用默认字体系列，除非你安装并使用自定义字体。我们来谈谈如何做到这一点。\n\
  \n某些设计师在设计场景时会要求使用自定义字体。事实证明，使用 Flutter 实现自定义字体非常简单，并且它们可以跨平台工作。这涉及三个步骤：\n\n![](img/638603_1_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7：字体通常存储在一个名为 `fonts` 的文件夹中\n\n1.  下载格式为 `ttf`、`woff` 或 `woff2` 的自定义字体文件。这些文件通常存储在根级别的\
  \ `fonts` 文件夹中，但名称由你决定（图 10-7）。\n\n    **提示：** 你可以在 `http://fonts.google.com` 找到一些优秀的免费字体。可以通过类型搜索它们，查看示例，并轻松下载。\n\
  \n2.  将字体文件添加到 `pubspec.yaml` 文件的 `flutter/fonts` 部分，以便通知编译器将它们打包到安装文件中。\n\n   \
  \ ```\n    flutter:\n      fonts:\n        - family: MrDafoe\n          fonts:\n\
  \            - asset: fonts/MrDafoe-Regular.ttf\n        - family: NanumBrushScript\n\
  \          fonts:\n            - asset: fonts/NanumBrushScript-Regular.ttf\n   \
  \ ```\n\n3.  像我们在前几节中讨论的那样，在 `TextStyle`  widget 的 `fontFamily` 属性中使用不区分大小写的字体名称：\n\
  \n    ```\n    Text(loremIpsums[0]),  // 无样式\n    Text(loremIpsums[1],   // 有些字体，比如\
  \ Courier，可能是内置的\n          style: TextStyle(fontFamily: 'Courier'),),\n    Text(loremIpsums[2],\n\
  \          style: TextStyle(fontFamily: 'NanumBrushScript'),),\n    Text(loremIpsums[3],\n\
  \          style: TextStyle(fontFamily: 'MrDafoe'),),\n    ```\n\n上述示例可能看起来像图 10-8。\n\
  \n![](img/638603_1_En_10_Fig8_HTML.jpg)\n\n图 10-8：可用的字体\n\n## 结论\n\n如你所见，在 Flutter\
  \ 中设置样式的选项几乎是无限的。Flutter 的样式设置与 CSS 完全不同。首先，它更加冗长。其次，它不支持继承。有些人可能不喜欢这些特性，但另一些人则会喜欢由此带来的简洁性。\n\
  \n无论你对此有何看法，你都会对 Flutter 提供的样式能力印象深刻，尤其是当你考虑到样式是如何在主题中组织，以便我们可以在整个应用中呈现一致且专业的观感时。\n\
  \n现在，大家期待已久的时刻到了……让我们学习如何在场景中布局我们的 widget！\n\n"
- "# 11. 布局你的 Widget\n\n我们已经取得了很大进展，但一个主要话题仍然存在——控制应用 app 的视觉布局。我们需要精细控制 widget 在屏幕上的显示方式——大小、位置和间距。以下是我们将如何解决这个问题。\n\
  \n## 我们的方法\n\n要掌握布局，我们需要知道如何做五件事：\n\n1.  布局整个场景\n2.  相对于彼此定位 widget\n3.  解决溢出问题，例如当你的\
  \ widget 无法在屏幕上容纳时\n4.  处理额外空间，例如当你的屏幕比所需空间更大时\n5.  微调位置\n\n这将是我们接下来五章的计划，每章一步。\n\
  \n### 1. 布局整个屏幕（即场景）\n\n在本章中，我们将学习 Flutter 在布局时的思考方式。我们将设置整个应用的观感（使用 `MaterialApp`），并创建场景的外部结构，例如标题和菜单（使用\
  \ `Scaffold`）（图 11-1）。\n\n![](img/638603_1_En_11_Fig1_HTML.jpg)\n\n图 11-1：标题和菜单出现在顶部，此外还有其他元素，如操作按钮\n\
  \n### 2. 将 Widget 上下放置或并排放置\n\n在设计任何场景时，我们将其分解为 widget 并放置在屏幕上。例如，以下场景（图 11-2）必须分解为\
  \ widget 。由于这是一个人员列表，我们可能会创建一堆自定义的 `PersonCard` widget（图 11-3），并将它们上下放置。我们可以使用 `Column`\
  \ widget 来实现这一点。\n\n![](img/638603_1_En_11_Fig3_HTML.jpg)\n\n图 11-3：我们可能会创建一个 `PersonCard`\
  \ widget\n\n![](img/638603_1_En_11_Fig2_HTML.jpg)\n\n图 11-2：`Column` 可以将 widget\
  \ 上下放置\n\n然后反过来，每个 `PersonCard` widget 应该有一个图像与文本并排放置（图 11-4）。如何让文本出现在图像旁边？我们将使用\
  \ `Row` widget。还要注意，文本是关于该人员的一系列数据。如何让文本上下排列？我们将再次使用 `Column` widget。\n\n![](img/638603_1_En_11_Fig4_HTML.jpg)\n\
  \n图 11-4：`Row` widget 和 `Column` widget 可用于放置元素\n\n放置 widget 将是第 12 章“布局 – 定位 Widget”的主题。\n\
  \n### 3. 处理空间不足和场景溢出的情况\n\n在包含所有 `PersonCard` 的场景中，我们的人数超过了屏幕的显示能力，因此发生了溢出。这通常会导致错误，但有几种方法可以解决这个问题。我们将在第\
  \ 13 章“布局 – 解决溢出”中探讨相关策略。\n\n### 4. 处理场景中的额外空间\n\n嘿，每个人的右侧都有额外的空间。如果我们希望将这部分空间放置在图片和文本之间会怎样？或者如果我们希望将部分额外空间放在图片的左侧会怎样？第\
  \ 14 章“布局 – 填充额外空间”将向我们展示如何以悦目的方式分配这些空间。\n\n### 5. 对定位进行更精细的调整\n\n对于布局的最后一步，你可能会希望通过调整内边距、外边距和对齐方式来完善你的场景。这样可以防止场景显得拥挤。我们能做些什么来创造一些活动空间？在第\
  \ 15 章“布局 – 微调定位”中，我们将学习如何使布局看起来更像图 11-5。\n\n![](img/638603_1_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5：微调后的间距\n\n好了，这就是我们在本书整个部分的计划。我们将在每章中深入探讨这五个步骤中的每一个。准备好开始第一步了吗？开始吧！\n\n\
  ## 布局整个场景\n\n这里有一个提示给你：应用永远不应该让用户感到惊讶。^((23)) 当应用以用户期望的方式运行时，用户会认为该应用友好、简单且易用。用户已经被训练成习惯在顶部看到一个状态栏，后面跟着一个标题栏。虽然其他屏幕功能会根据需要有所不同，但存在明确的约定。Flutter\
  \ 拥有使你的布局感觉……嗯……*正常* 的 widget。\n\n\n\n### `MaterialApp` 组件\n\n根应用组件为你的应用创建了外层框架。尽管它至关重要，用户却从未见过应用组件，因为其任何部分在技术上都不可见。它包裹着整个应用，允许设置应用标题，以便当\
  \ iOS/Android 将应用移至后台时能显示名称。应用组件是设置应用默认主题的地方——包括字体、大小、颜色等。它也是指定路由的地方。\n\n对于应用，你有三种选择：`MaterialApp`、`CupertinoApp`\
  \ 或自定义的应用组件。\n\n大多数 Flutter 组件在这三种应用中都能工作。应用组件只是让你选择基础的外观和感觉。如果你在 `CupertinoApp`\
  \ 中放置 Cupertino 组件，它们看起来会完全像 iOS 应用。如果你在 `MaterialApp` 中放置符合 Material 规范的组件，它们看起来会更像\
  \ Android 应用。\n\n“没错，但我需要它在 iOS 上像 iOS，在 Android 上像 Android！”你说。好吧，我明白。这是可行的。你可以创建自己的自定义应用组件，它继承自\
  \ `WidgetApp`，并进行大量条件绘制，就像这样：\n\n```\nPlatform.isIOS ? CupertinoButton(...) : ElevatedButton(...)\n\
  ```\n\n但是，哎呀！这需要编写大量底层代码，坦白说这抵消了跨平台的优势，所以大多数开发者不会费这个功夫。在社区中，超过 95% 的项目使用 `MaterialApp`。只有一小部分使用\
  \ `CupertinoApp` 或从 `WidgetApp` 派生的自定义应用组件。使用 `MaterialApp` 是标准做法。\n\n|   | `MaterialApp`\
  \ | `CupertinoApp` | `WidgetApp` |\n| --- | --- | --- | --- |\n| 遵循的标准 | Google\
  \ 的 Material 设计指南 | Apple 的人机界面指南 | 无 |\n| 外观和感觉 | Google/Android | iOS | 通用且灵活\
  \ |\n| 实际使用情况 | 大多数应用 | 优先适配 iOS 或仅 iOS 应用 | 自定义应用组件创建的基类 |\n\n以下是 `MaterialApp`\
  \ 可能的样子：\n\n```\nWidget build(BuildContext context) {\n  return MaterialApp(\n \
  \   home: MainWidget(),\n    title: \"我的酷应用\",\n    theme: _themeDefinedElsewhere,\n\
  \    routes: ({\n      '/scene1': (ctx) => MyWidget1(),\n      '/scene2': (ctx)\
  \ => MyWidget2(),\n      '/scene3': (ctx) => MyWidget3(),\n    },\n    debugShowCheckedModeBanner:\
  \ false,\n  );\n}\n```\n\n### `Scaffold` 组件\n\n`MaterialApp` 组件创建了一个**外层不可见**的框架，而\
  \ `Scaffold` 组件则创建了**内层可见**的框架。\n\n`Scaffold` 只有一个使命：为每个场景的可见结构进行布局，赋予其可预测且因此可用的布局——就像许多其他应用一样。它创建的内容包括：\n\
  \n*   用于标题的 `AppBar`\n*   用于主体内容的部分\n*   底部的导航栏或左侧的导航抽屉\n*   浮动操作按钮\n*   底部面板——通常处于折叠状态，但可以向上滑动以显示当前场景的上下文相关信息\n\
  \n```\n@override\nWidget build(BuildContext context) {\n  return Scaffold(\n   \
  \ appBar: MyAppBar(),\n    drawer: MyNavigationDrawer(),\n    body: TheRealContentOfThisPartOfTheApp(),\n\
  \    floatingActionButton: FloatingActionButton(\n      child: Icon(Icons.add),\n\
  \      onPressed: () { /* 在这里执行操作 */},\n    ),\n    bottomSheet: MyBottomSheet,\n\
  \  );\n}\n```\n\n`Scaffold` 的所有部分都是可选的。这很合理，因为你并不总是需要 `floatingActionButton`、`drawer`\
  \ 或 `bottomNavigationBar`。我们的屏幕设计将决定我们需要哪些部分，不需要哪些部分。\n\n### `AppBar` 组件\n\n要在屏幕顶部创建一个标题栏，请使用\
  \ `AppBar` 组件（图 11-6）。这严格来说是可选的。但你的用户几乎完全期望每个非游戏类应用都有 `AppBar`。你几乎总是需要一个标题。并且你可能希望在开头添加一个图标。图标是\
  \ *leading* 属性：\n\n![](img/638603_1_En_11_Fig6_HTML.jpg)\n\n图 11-6\n\n带有 leading\
  \ 图标和标题的 `AppBar` 组件\n\n```\nreturn Scaffold(\n  appBar: AppBar(\n    leading: Icon(Icons.traffic),\n\
  \    title: Text(\"我的酷应用\"),\n  ),\n  /* 此处更多内容：浮动操作按钮、主体、抽屉等。 */\n);\n```\n\n不过有一个问题。如果你同时设置了\
  \ leading 图标和导航抽屉，Flutter 就无法使用该空间来显示汉堡菜单（图 11-7）：\n\n![](img/638603_1_En_11_Fig7_HTML.jpg)\n\
  \n图 11-7\n\n没有 leading 图标的 `AppBar` 能够显示汉堡菜单图标\n\n```\nreturn Scaffold(\n  appBar:\
  \ AppBar(\n    /* 这次没有 leading。 */\n    title: Text(\"我的酷应用\"),\n  ),\n  /* 此处更多内容：浮动操作按钮、主体、抽屉等。\
  \ */\n);\n```\n\n如果你有导航抽屉，你可能希望省略 leading 图标。\n\n### `SafeArea` 组件\n\n物理设备屏幕很少是整齐的矩形。它们有圆角、刘海和顶部的状态栏。如果我们忽略这些，应用的某些部分就会被裁剪或隐藏。不想这样？只需用\
  \ `SafeArea` 组件包裹所有主体内容，它就会限制你的应用渲染在刘海、状态栏和圆角下方。将其放在 `Scaffold` 内部但包裹主体内容是一个绝佳的位置：\n\
  \n```\nWidget build(BuildContext context) {\n  return Scaffold(\n    drawer: LayoutDrawer(),\n\
  \    body: SafeArea(\n      child: MyNormalBody(),\n    ),\n    floatingActionButton:\
  \ FloatingActionButton(\n      child: Icon(Icons.next),\n      onPressed: () {},\n\
  \    ),\n  );\n}\n```\n\n## Flutter 的布局算法\n\n朋友们，请做好准备。本章的最后一部分并不适合胆小者。这是相当高层次的思考，但直接跳过会是对你的不负责任。一旦你理解了\
  \ Flutter 是如何布局的，许多组件及其正确用法就会突然变得清晰。没有这种理解，我们只能胡乱修改代码，直到它勉强能工作——这令人沮丧，并且会产生脆弱的代码。\n\
  \n所以，和我一起深入探究，我们来谈谈 Flutter 的布局算法。我们先从……\n\n\n\n### 可怕的“无限高度”错误\n\n我敢保证，在你的开发生涯中，你一定会遇到\
  \ Flutter 抛出这个错误：\n\n```\n══╡ Exception caught by rendering library ╞═════════════\n\
  The following assertion was thrown during performResize(): Vertical viewport was\
  \ given unbounded height.\nViewports expand in the scrolling direction to fill their\
  \ container. In this case, a vertical viewport was given an unlimited amount of\
  \ vertical space in which to expand. This situation typically happens when a scrollable\
  \ widget is nested inside another scrollable widget. If this widget is always nested\
  \ in a scrollable widget there is no need to use a viewport because there will always\
  \ be enough vertical space for the children. In this case, consider using a Column\
  \ or Wrap instead. Otherwise, consider using a CustomScrollView to concatenate arbitrary\
  \ slivers into a single scrollable.\n```\n\n这个错误信息对开发者并不友好，对吧？大多数人在看到这条错误信息时，都会完全搞不懂代码中的问题所在。类似的错误信息可能还会说“RenderFlex\
  \ children have non-zero flex”或者“RenderViewport does not support returning intrinsic\
  \ dimensions.”这些消息都没什么帮助。如果它们能友好一点，应该会这样说：\n\n```\n══╡ You're doing it wrong ╞═════════════════════════\n\
  The ListView you're drawing wants to be infinitely tall and it needs a parent widget\
  \ that will keep it reasonably short. Maybe tell it to be small by wrapping it with\
  \ an Expanded widget?\n```\n\n这样是不是清晰多了？你就能明白问题所在以及如何修复。\n\n让我帮你解读 Flutter 试图告诉我们什么：某些\
  \ widget 想要填满所有可用空间。换句话说，它们是“贪婪的”。它们需要一个父 widget 来约束自己。如果它们处于一个拒绝提供这种约束的父 widget\
  \ 内，Flutter 就会崩溃，因为它无法绘制无限高的东西。下面用一些代码来说明这个问题。\n\n这段代码在一个 `Column()` 中绘制了一个标题和 20\
  \ 个随机的 `Text()`。它看起来很正常（图 11-8）：\n\n```\nWidget build(BuildContext context) {\n\
  List randomTexts = List.generate(20,\n(i) => Text(\"Random number: ${Random().nextInt(1000)}-$i\"\
  ));\nreturn Column(\nchildren: [\nText(\"Some random strings for you\", style: big),\n\
  Column(\nchildren: randomTexts,\n),\n],\n);\n}\n```\n\n![](img/638603_1_En_11_Fig8_HTML.jpg)\n\
  \n图 11-8\n\n一个短小的 Column 绘制得很好。\n\n当数量增加到 80 个随机的 `Text()` 时，就会溢出视口（图 11-9）。\n\n\
  ![](img/638603_1_En_11_Fig9_HTML.jpg)\n\n图 11-9\n\n子元素过多的 Column 会溢出屏幕\n\n这看起来很难看，但这不是运行时错误。我们应该怎么做？我知道了！让我们把\
  \ `randomTexts` 列表放入一个 `ListView` 中使其可滚动。这是一个完全合乎逻辑的想法。\n\n```\n@override\nWidget\
  \ build(BuildContext context) {\nList randomTexts = List.generate(80,\n(i) => Text(\"\
  Random number: ${Random().nextInt(1000)}-$i\"));\nreturn Column(\ncrossAxisAlignment:\
  \ CrossAxisAlignment.center,\nchildren: [\nText(\"Some random strings for you\"\
  , style: big),\nListView(\nchildren: randomTexts,\n),\n],\n);\n}\n```\n\n我们只是把其中一个\
  \ widget 从 `Column` 换成了 `ListView`，然后就——砰！它崩溃了。看到了吗？`Column()` 认为它没有责任限制任何子元素的高度。“你想多大就多大，”`Column`\
  \ 说。而 `ListView` 会试图变得和它的父 widget 允许的一样大。由于 `ListView` 的父 widget 没有限制它，它就会变得无限高。\n\
  \n坦白说，这是开发者没有真正理解 Flutter 如何处理布局的典型症状。所以让我试着解释一下 Flutter 的布局算法，希望能预测并避免像上面例子那样的混乱局面。然后我会解释一种解决方法。\n\
  \n### 算法本身\n\n你的 widget 在 `main` 方法的顶部总会有一个根 widget。它有分支、分支的分支，一直延续下去。我们称之为渲染树（图\
  \ 11-10）。Flutter 必须决定树中每个 widget 的大小。它通过询问每个 widget 它希望有多大，并询问其父 widget 是否允许这样做来实现。\n\
  \n![](img/638603_1_En_11_Fig10_HTML.png)\n\n图 11-10\n\n每个场景都有一个 widget 树\n\nFlutter\
  \ 从顶部开始向下遍历树。它会读取根 widget 的 `BoxConstraints`（最大宽度和最大高度）。它记住这些约束，然后与每个子 widget 通信。对于每个子\
  \ widget，它会将其 `BoxConstraints` 传递给它，然后继续向下遍历到孙 widget。它会一直这样做，直到每条分支的末端。我们称之为叶子层。\n\
  \n然后它询问每个叶子的 `RenderBox`——它希望有多大。有些子元素是贪婪的，会说“尽可能大”。其他的则占用较小的空间。Flutter 允许叶子在其所有祖先的*约束之内*以其首选大小绘制。如果首选大小对于其父\
  \ widget 的 `BoxConstraints` 来说太大，Flutter 会在运行时裁剪它——这是我们极力避免的！如果首选大小太小，Flutter 会用额外的空间填充它，直到它合适为止。\n\
  \n然后它会向上返回一层，尝试将这些分支放入它们的共同父 widget 中，而这个父 widget 有自己的约束。以此类推，一直回到顶部。\n\n结果是，每个子\
  \ widget 都可以得到它喜欢的高度和宽度——只要它的父 widget 允许。并且，在所有子 widget 都有最终大小之前，没有父 widget 会有最终大小。\n\
  \n所以你可以看到我们是如何得到“无限高度”错误的。如果我们有一个子 widget 试图变得尽可能大，而又没有父 widget 来阻止它，Flutter 就会恐慌，因为这个子\
  \ widget 现在无限高了。\n\n要解决这个问题，父 widget 只需要指示它的子 widget 停止增长。在我们的 `ListView`/`Column`\
  \ 例子中，有几种解决方案。一种是将 `Column` 和 `ListView` 互换。`Column` 并不贪婪，所以它可以放在 `ListView` 中。但这样一来，标题\
  \ `Text` 就会滚动出页面。另一种方法是将 `ListView` 包裹在 `SizedBox` 中，以精确锁定大小，或者包裹在 `LimitedBox`\
  \ 中，以提供 `maxWidth` 和 `maxHeight`。但这些解决方案都很笨拙。第三种方法是把 `ListView` 包裹在一个 `Expanded`\
  \ 中。我们将在几章后详细讲解 `Expanded`，但在这里它对我们有利，因为 `Expanded` 会扩展以占据剩余（不是无限的）空间，并告诉它的子 widget\
  \ 它现在有了 `BoxConstraints`。完美！我们只需要这样做：\n\n```\nWidget build(BuildContext context)\
  \ {\nList randomTexts = List.generate(80,\n(i) => Text(\"Random number: ${Random().nextInt(1000)}-$i\"\
  ));\nreturn Column(\ncrossAxisAlignment: CrossAxisAlignment.center,\nchildren: [\n\
  Text(\"Some random strings for you\", style: big),\nExpanded(         // <-- 添加这个\
  \ widget\nchild: ListView(\nchildren: randomTexts,\n),\n),\n],\n);\n}\n```\n\n##\
  \ 结论\n\n你明白为什么我说理解布局策略很重要了吗？在你真正搞懂它之前，你只是在猜测解决方案。理解它们需要很多工作，但这是值得的。\n\nFlutter 有大量的\
  \ widget 来控制大小和位置。在接下来的几章中，我们将学习那些最关键的布局 widget——那些你绝对必须掌握的 widget。我们将从 `Row` 和\
  \ `Column` 开始。\n\n脚注 1\n\n"
- "# 12. 布局 – 定位 Widget\n\n请记住，应用程序视觉部分的步骤是：\n\n1.  布局整个场景\n\n2.  将 widget 相对于彼此进行定位\n\
  \n3.  修复溢出问题，例如当 widget 不适合屏幕时\n\n4.  处理多余空间，例如当屏幕比所需空间更大时\n\n5.  微调位置\n\n在上一章中，我们学习了\
  \ Flutter 的布局算法，并学会了如何使用 `MaterialApp`、`Scaffold` 及其典型子 widget 来为布局做好准备。现在是时候进入第二步了：`Row`\
  \ 和 `Column`。\n\n\n\n## 将控件并排或上下排列\n\n顾名思义，`Row` 和 `Column` 分别用于将控件并排（`Row`，如图 12-1\
  \ 所示）或上下排列（`Column`，如图 12-2 所示）。除了子控件的布局方向不同，它们几乎没有区别。\n\n![图 12-1](img/638603_1_En_12_Fig1_HTML.png)\n\
  \n**图 12-1** `Row` 控件用于并排布局\n\n```\nRow(\n  children: [\n    SomeWidget(),\n   \
  \ SomeWidget(),\n    SomeWidget(),\n  ],\n),\n```\n\n![图 12-2](img/638603_1_En_12_Fig2_HTML.png)\n\
  \n**图 12-2** `Column` 控件用于上下排列\n\n```\nColumn(\n  children: [\n    SomeWidget(),\n\
  \    SomeWidget(),\n    SomeWidget(),\n  ],\n),\n```\n\n注意，它们都有一个 `children` 属性，该属性是一个控件数组。`children`\
  \ 数组中的所有控件将按照你添加的顺序依次显示。你甚至可以在列中嵌套行，或者在行中嵌套列，嵌套的层数不限。通过这种方式，你几乎可以在任何应用中创建出能想象到的任何布局。\n\
  \n`Row` 和 `Column` 将是你最常用的布局控件。诚然，还有其他布局控件，但这两种会是你的首选。\n\n## 响应式设计\n\n响应式设计诞生于 2010\
  \ 年代初期，当时网络正从以桌面浏览为主的时代，转向智能手机和平板电脑普及的时代，这就要求网站能够适应各种不同屏幕尺寸的新格局。Web 应用会根据其所在设备的屏幕尺寸和方向来调整布局。你明白我的意思了吗？这是一种会对屏幕尺寸和方向做出*响应*的*设计*。\n\
  \n### Flutter 中的响应式设计\n\nFlutter UI 需要适配移动设备。响应式设计确保了你的应用布局能够适应不同的屏幕尺寸和方向，无论用户是竖屏持握手机，还是将其旋转为横屏。\n\
  \n想象一下你在竖屏模式下使用应用的情形：布局整洁，所有元素都易于点击和阅读。然而，当旋转到横屏时，设备的文本可能会溢出，按钮会靠得太近，甚至有些元素会完全被隐藏。使用\
  \ `Flex` 控件配合 `MediaQuery`，你可以创建一个能够智能适应可用空间的 UI。这确保了用户无论以何种方式持握设备，都能获得流畅无阻的体验。\n\
  \n### Flex 与 MediaQuery\n\n与 `Row` 或 `Column` 一样，`Flex` 控件也是将其子控件并排或上下排列。但 `Flex`\
  \ 更加灵活。它有一个 `orientation` 属性，可以设置为垂直或水平方向。\n\n- 方向设置为水平的 `Flex` 实际上等同于 `Row()`。\n\
  - 方向设置为垂直的 `Flex` 实际上等同于 `Column()`。\n\n请注意，这个 `orientation` 属性可以被设置为条件性的。这正是 `MediaQuery`\
  \ 的用武之地。\n\n`MediaQuery` 从设备本身获取特定数据。\n\n- `MediaQuery.sizeOf(context)` – 宽度和高度\n\
  - `MediaQuery.displayFeaturesOf(context)` – 摄像头开孔、刘海等\n- `MediaQuery.platformBrightnessOf(context)`\
  \ – 浅色或深色模式\n- `MediaQuery.textScaleFactorOr(context)` – 当前字体大小\n- `MediaQuery.viewInsetsOf(context)`\
  \ – 设备应用了多少内边距？\n- `MediaQuery.devicePixelRatioOf(context)` – 像素密度\n\n> **注意** \
  \ \n> 在 Flutter 中，所谓的像素实际上是*逻辑*像素。iOS 开发者称其为*点*，而 Android 开发者则称之为*密度无关像素*。`MediaQuery.devicePixelRatioOf(context)`\
  \ 能帮助我们确定真实的像素密度，以备不时之需。\n\n- `MediaQuery.orientationOf(context)` – 横屏或竖屏\n\n最后这一个属性是关键。你需要检查屏幕方向，如果是横屏，则使用\
  \ `Row`；否则，应使用 `Column`。以下是相关代码：\n\n```\nFlex(\n  direction:\n    MediaQuery.orientationOf(context)\
  \ == Orientation.landscape ?\n    Axis.horizontal : Axis.vertical,\n  children:\
  \ [\n    SomeWidget(),\n    SomeWidget(),\n    SomeWidget(),\n  ],\n),\n```\n\n\
  ## 总结\n\n现在，你已经能够将控件并排放置或上下排列了。你甚至可以在需要时使用 `Flex` 来实现响应式布局。但是，如果布局引擎没有足够的屏幕空间来显示所有内容，会发生什么？我们该怎么办？让我们在下一章中探讨这个问题。\n\
  \n"
- "# 13. 布局 – 解决溢出问题\n\n你的控件永远不可能恰好适配屏幕。\n\n如果所有元素都能完美地适配在一个场景中，那将是一个极其罕见的巧合。即使它们现在完美适配，一旦应用在其他不同尺寸的屏幕上运行，或者从竖屏旋转为横屏，情况就会发生变化。因此，我们需要处理两种情况：\n\
  \n1.  空间不足怎么办？（给定空间内的控件过多）\n2.  如果还有剩余空间怎么办？（屏幕显示面积大于控件占用的像素）\n\n这两种情况很可能*同时*发生在你场景的不同部分。我们将在本章着手解决空间不足的问题，并在下一章处理空间过多的问题。\n\
  \n## 溢出警告条\n\n容器内容溢出并非致命错误，但会造成不良后果。在调试时，如果任何控件溢出屏幕，Flutter 会友好地通过显示溢出警告来通知你（如图\
  \ 13-1 所示）。这些警告是黄黑相间的条纹，旁边还有一些微小的红色文字，显示溢出了多少像素。\n\n![图 13-1](img/638603_1_En_13_Fig1_HTML.jpg)\n\
  \n**图 13-1** 溢出条\n\n> **提示**  \n> 该警告仅在调试模式下显示。正式发布的应用永远不会显示这些溢出条。相反，溢出的控件会被直接裁剪。我不确定这算不算更好。\n\
  \n## 纠正溢出的可选方案\n\n在现实中，如果你有一个固定大小的容器，比如一个纸板箱，你需要放进去一个太大而装不下的东西，你会怎么做？\n\n1.  折叠或拆卸物品（假设它们可以被拆卸或折叠）。\n\
  2.  挤压物品，直到它能被装下（假设它是可挤压的）。\n3.  将其放入多个箱子中。\n\n从逻辑上讲，我们只有这些选择。让我们将同样的思路应用到 Flutter\
  \ 屏幕上。我们有相同的三种选择：\n\n1.  允许子控件换行（假设它们可以换行）。\n2.  挤压子控件，直到它们适应（假设它们可以缩放）。\n3.  允许用户滚动。\n\
  \n让我们看看在 Flutter 中如何实现这三件事。\n\n## 待解决的示例问题\n\n为了说明我们的三种方案，我们准备了一个随机的 lorem ipsum\
  \ 字符串列表。我创建了一个名为 `Word()` 的自定义控件，它只是 `Text()` 的一个封装，并添加了样式和内边距。我将使用 `.map` 把这些字符串转换为\
  \ `Word` 控件，并将它们放入一个 `Column` 中，如下所示：\n\n```\nWidget build(BuildContext context)\
  \ {\n  var wordWidgets = words.map((w) => Word(w)).toList();\n  return Column(\n\
  \    children: wordWidgets,\n  );\n}\n```\n\n图 13-2 展示了这段代码可能产生的效果。\n\n![图 13-2](img/638603_1_En_13_Fig2_HTML.jpg)\n\
  \n**图 13-2** 在 `Column` 中显示效果不错\n\n到目前为止还不错？在 `Column` 中，它显示得很好——有足够的空间。但是，当我们把它改成一行时：\n\
  \n```\nWidget build(BuildContext context) {\n  var wordWidgets = words.map((w) =>\
  \ Word(w)).toList();\n  return Row(\n    children: wordWidgets,\n  );\n}\n```\n\n\
  就出现了问题。所有单词无法在此设备上水平排列，右侧出现了溢出条（如图 13-3 所示）。\n\n![图 13-3](img/638603_1_En_13_Fig3_HTML.jpg)\n\
  \n**图 13-3** 溢出条显示我们向右溢出了屏幕\n\n记住，我们有三种方案来解决溢出问题。第一种方案可能最适合我们当前的情况——允许 `Word` 控件在其行内自动换行。\n\
  \n\n\n### 让子控件自动换行\n\n顾名思义，`Wrap` 控件的作用就是“包裹”。它的子控件可以自动换行，显示成所需的任意行数，直到所有内容都能在屏幕上完整显示。\n\
  \n```dart\nWidget build(BuildContext context) {\n  var wordWidgets = words.map((w)\
  \ => Word(w)).toList();\n  return Wrap(\n    children: wordWidgets,\n  );\n}\n```\n\
  \n我们只做了一处改动，就是把 `Row` 换成了 `Wrap`。仅此而已。它现在的效果如图 13-4 所示。\n\n![](img/638603_1_En_13_Fig4_HTML.jpg)\n\
  \n**图 13-4** 子控件自动换行\n\n对于我们当前这种单词列表的场景，这是理想的解决方案。但大多数情况下，我们会处理其他类型的控件。接下来我们看看第二种解决方案。\n\
  \n### 挤压子控件直至适配\n\n如果你的控件是可压缩的，一个合乎逻辑的选择就是水平挤压`Row`的子控件，或垂直挤压`Column`的子控件，直到它们适配。听起来不舒服？确实有点。这种方式通常不会带来可预测且美观的呈现效果。但偶尔，这也正是我们需要的。\n\
  \n让内容变小的一种方法是将它们放入 `Flexible()` 控件中。`Flexible()` 会对它的子控件说：“我会把你缩小，直到你适配，或者直到你被压缩到极限。如果你无法被压缩到足够的程度，那我就干脆放弃。”这意味着\
  \ `Flexible` 并不是一个万无一失的解决方案。\n\n> **提示**  \n> `Flexible` 只有在 `Row()` 或 `Column()`\
  \ 内部直接使用时才有意义。\n\n`Flexible` 包裹着 `Row` 或 `Column` 中的每一个子控件：\n\n```dart\nWidget build(BuildContext\
  \ context) {\n  var wordWidgets = words.map((w) => Word(w)).toList();\n  return\
  \ Row(\n    children: wordWidgets\n        .map((w) => Flexible(child: w))\n   \
  \     .toList(),\n  );\n}\n```\n\n> **注意**  \n> `Iterable.map()` 只是将一个 X 数组转换成一个\
  \ Y 数组。在上面的代码中，我们所做的就是将*每一个* `Word()` 控件都嵌套在一个 `Flexible()` 控件中。请不要为此分心。本章你应重点关注的是\
  \ `Flexible` 及其对场景的影响——它让每个子控件协同工作以适配空间。（不过，你不得不承认，`.map()` 是一种简洁的转换方法。）\n\n每个 `Flexible`\
  \ 会与 `Row` 中所有其他的 `Flexible` 进行“沟通”，沿着水平轴挤压它的子控件，从而产生了图 13-5 中不太美观的结果。\n\n![](img/638603_1_En_13_Fig5_HTML.jpg)\n\
  \n**图 13-5** `Flexible` 控件挤压其子控件\n\n#### 挤压的另一种选择\n\n请记住，Flutter 有数百个控件，它们在用途和功能上有很多重叠。如果你想挤压子控件，而\
  \ `Flexible` 不能满足需求，可以考虑 `FittedBox`。\n\n位于 `FittedBox` 中的子控件会根据你指定的 `BoxFit` 进行缩放和/或裁剪。还记得第\
  \ 4 章“值控件”中的 `BoxFit` 吗？所有这些值都适用于 `FittedBox`。\n\n- `fitWidth` – 使宽度完全适配。如果需要，则裁剪高度或在顶部/底部添加内边距。\n\
  - `fitHeight` – 使高度完全适配。如果需要，则裁剪宽度或在左侧/右侧添加内边距。\n- `cover` – 适配最小的尺寸（宽/高），裁剪另一侧。\n\
  - `contain` – 适配最大的尺寸（宽/高），为另一侧添加内边距。\n- 等等。更多细节请参考第 4 章“值控件”。\n\n在这种情况下，这不是最佳选择，但当您确切知道要压缩多少内容以及一个或多个控件可以占用多少像素时，它非常适用。\n\
  \n### 允许用户滚动\n\n解决溢出问题的最后一个选项是允许用户滚动。坦白说，这是最常选择的方案，在大多数情况下都非常合理。它也是最容易理解的选项，也许也是实现起来最简单的。我把最好的留到了最后！\n\
  \n和 Flutter 的典型风格一样，有很多滚动选项可供选择。我们将介绍三种：`SingleChildScrollView`、`ListView` 和 `GridView`。\n\
  \n#### SingleChildScrollView 控件\n\n`SingleChildScrollView` 这个名字很形象。它包裹一个*单一子控件*并允许*滚动*。Flutter\
  \ 不会裁剪该子控件，而是让用户通过滑动来水平或垂直（默认）滚动。这是使用 `SingleChildScrollView` 的代码：\n\n```dart\n\
  Widget build(BuildContext context) {\n  var wordWidgets = words.map((w) => Word(w)).toList();\n\
  \  return SingleChildScrollView(\n    scrollDirection: Axis.horizontal,\n    child:\
  \ Row(\n      children: wordWidgets,\n    ),\n  );\n}\n```\n\n图 13-6 展示了它的样子。嘿，没有溢出条了！与之前的截图相比，可以看到文本的位置发生了变化。\n\
  \n![](img/638603_1_En_13_Fig6_HTML.jpg)\n\n**图 13-6** 使用 `SingleChildScrollView`\
  \ 包裹后允许滚动\n\n> **提示**  \n> `SingleChildScrollView` 允许水平*或*垂直滚动，但不能同时进行。`InteractiveViewer`\
  \ 控件则允许两者同时进行。如果你需要显示某个在水平和垂直方向上都过大的内容，可以了解一下 `InteractiveViewer`，它允许在两个方向上平移/滚动，并支持通过捏合进行放大和缩小。这对于高分辨率图片或大型地图非常有用。\n\
  \n#### ListView 控件\n\n`ListView` 没有 `child` 属性，它有 `children` 属性。因此，如果我们将 `Row` 转换为\
  \ `ListView` 并将其 `scrollDirection` 属性设置为水平，它的外观和行为就与 `SingleChildScrollView` 非常相似。\n\
  \n```dart\nWidget build(BuildContext context) {\n  var wordWidgets = words.map((w)\
  \ => Word(w)).toList();\n  return ListView(\n    scrollDirection: Axis.horizontal,\n\
  \    children: wordWidgets,\n  );\n}\n```\n\n但 `ListView` 拥有 `SingleChildScrollView`\
  \ 所不具备的超能力。`ListView` 在内存上更高效，也更灵活。\n\n##### ListView 内存效率更高\n\n`SingleChildScrollView`\
  \ 在显示其子控件及其所有后代控件之前，会将它们全部构建到内存中，无论其大小或数量如何。`ListView` 则不同。`ListView` 会跟踪哪些子控件当前正在显示，哪些即将离开屏幕。它只构建这些控件。因此，当用户专注于阅读或滚动屏幕上的内容时，Flutter\
  \ 正在忙于构建更多可能很快就会出现的控件。如果用户向下滚动，Flutter 会构建当前视口下方的控件。如果用户向上滚动，Flutter 则构建上方的控件。明白了吗？\n\
  \n它还会将滚动离屏的控件从内存中移出，因此无论你的列表有多大，任何时候都只有少数几个控件在内存中。\n\n聪明的读者可能已经发现了其中的几个缺陷。首先，用户滚动速度可能超过\
  \ Flutter 创建控件的速度。这没什么大不了的；它只是会短暂地显示空白区域，一旦控件创建完成就会立即显示。其次，如果用户反复上下滚动，Flutter 将会浪费一些时间来销毁和重新创建相同的控件。诚然，这些都是问题，但它们很次要，当你考虑所获得的效率提升时，这点代价是完全值得的。\n\
  \n> **提示**  \n> 当你有大量（甚至是无限！）的项目需要显示时，`ListView` 是最佳选择。只有靠近视口的那些项目才会在内存中。\n\n#####\
  \ ListView 非常灵活\n\n`ListView` 有四种不同的使用方式：\n\n1. **常规 `ListView`** – 常规用法。它有一个 `children`\
  \ 属性，用于接收静态控件的集合。\n2. **`ListView.builder`** – 用于根据项目列表动态创建子控件。\n3. **`ListView.separated`**\
  \ – 类似于 builder，但在每个项目*之间*放置一个控件。非常适合在列表中定期插入广告。更多信息请阅读 [`http://bit.ly/flutter_listview_separated`](http://bit.ly/flutter_listview_separated)。\n\
  4. **`ListView.custom`** – 用于创建自定义的高级 `ListView`。更多信息请阅读 [`http://bit.ly/flutter_listview_custom`](http://bit.ly/flutter_listview_custom)。\n\
  \n让我们先看看前两个选项，从常规的 `ListView` 开始。\n\n\n\n##### 常规 ListView\n\n此版本的 `ListView` 非常适合显示大量预定义的多样化小部件。你只需将\
  \ `children` 属性设置为已经定义好的列表即可。我们上面的代码示例已经展示了这一点。\n\n但 `ListView` 真正有趣的地方在于，你可以让它根据一个事物列表来构建新小部件——比如人员、产品、商店——任何你可以从数据库或\
  \ RESTful 服务中获取的数据。为了显示可滚动条目的动态数量，我们需要使用 `ListView.builder` 构造方法。\n\n##### `ListView.builder`：当你需要从对象列表构建小部件时\n\
  \n`ListView` 的另一个构造方法 `ListView.builder` 接收两个参数：一个 `itemCount` 整数和一个 `itemBuilder`\
  \ 函数。`itemBuilder` 函数会根据需要动态创建子小部件。当用户滚动时，`itemBuilder` 函数会运行并创建新的条目。\n\n`itemCount`\
  \ 属性是一个整数，它告诉我们将要绘制多少个内容，因此我们通常将其设置为要滚动浏览的数组/集合的长度。`itemBuilder` 函数接收两个参数：上下文 (context)\
  \ 和一个整数，该整数对于第一个条目为 0，并且每次运行时递增。\n\n```\nWidget build(BuildContext context) {\n\
  return ListView.builder(\nscrollDirection: Axis.horizontal,\nitemCount: words.length,\n\
  itemBuilder: (context, i) => Word(\"$i - ${words[i]}\"),\n);\n}\n```\n\n在这个例子中，我们为每个打印出的单词添加了一个索引。请注意，我再次向右滚动了（图\
  \ 13-7）。\n\n![图 13-7](img/638603_1_En_13_Fig7_HTML.jpg)\n\n`ListView.builder` 动态构建每个子小部件\n\
  \n创建能够按行或列滚动的小部件列表非常棒。但如果你需要滚动的是方形小部件呢？\n\n#### GridView 小部件\n\n让我们调整一下示例。假设我们不再提供一些占位文本，而是给你一个人员列表，我们希望为每个人创建一个小的、大致方形的\
  \ `PersonCard` 小部件，其中包含照片和姓名。你可能希望它们以行和列的形式出现，而不是列表形式。`GridView` 拥有与 `ListView`\
  \ 相同的魔力，但它会在一个自动换行的网格中绘制内容。\n\n你可以像使用 `Row`、`Column`、`Wrap` 和 `ListView` 一样，将 `GridView`\
  \ 的 `children` 属性设置为你想要显示的小部件列表。`GridView` 会以网格形式显示它们，横向填充然后自动换行到下一行，并调整其可用空间直到刚好合适。最棒的是，它会自动滚动！\n\
  \n`GridView` 有两个构造方法：`GridView.extent()` 和 `GridView.count()`。\n\n##### `GridView.extent()`\n\
  \n*Extent* 这个词指的是子元素的最大宽度。`GridView` 仅允许其子元素增长到该尺寸。如果子元素试图变得更大，它就会在该行上放置另一个元素，并均匀地缩小所有子元素，直到它们刚好能横跨整个宽度。请看这个例子：\n\
  \n```\nWidget build(BuildContext context) {\nreturn GridView.extent(\nmaxCrossAxisExtent:\
  \ 300.0,\nchildren: _peopleList\n.map((Person person) => PersonCard(person))\n.toList(),\n\
  );\n}\n```\n\n请注意在图 13-8 和图 13-9 中，容器是如何调整到小于 300 像素的。`GridView` 决定在竖屏方向上可以并排容纳两个。但当旋转到横屏时，这两个容器本可以调整到大于\
  \ 300 像素，所以它每行放置了三个。\n\n![图 13-9](img/638603_1_En_13_Fig9_HTML.jpg)\n\n同样的 `GridView.extent()`\
  \ 旋转到横屏模式\n\n![图 13-8](img/638603_1_En_13_Fig8_HTML.jpg)\n\n竖屏模式下的 `GridView.extent()`\n\
  \n##### `GridView.count()`\n\n使用 `count()` 构造方法时，你可以指定所需的列数，*无论屏幕方向如何*。`GridView`\
  \ 会负责调整其内容的大小以适应需求。在下面的例子中，我们告诉 `GridView.count()` 无论屏幕方向如何，我们都想要四列，然后 `GridView`\
  \ 会调整其子元素的大小，使其恰好并排为四列。这些显示在图 13-10 和图 13-11 中。\n\n![图 13-11](img/638603_1_En_13_Fig11_HTML.jpg)\n\
  \n竖屏模式下同样的 `GridView.count()`\n\n![图 13-10](img/638603_1_En_13_Fig10_HTML.jpg)\n\
  \n横屏模式下的 `GridView.count()`\n\n```\nWidget build(BuildContext context) {\nreturn\
  \ GridView.count(\ncrossAxisCount: 4,\nchildren: _peopleList\n.map((Person person)\
  \ => PersonCard(person))\n.toList(),\n);\n}\n```\n\n`GridView.extent()` 可能更有用，因为无论设备如何，内容的大小都大致保持不变，这比保持列数一致更符合常见的需求。\n\
  \n## 结论\n\n设备上容纳不下足够多的小部件可能是最常见的情况，而这也许是最难优雅解决的问题，因此能坚持学到这里本身就是一个重要的成就。在本章中，我们为你提供了针对该问题的多种解决方案，并帮助你判断在给定情况下哪种方案最佳。\n\
  \n这是我们布局场景五步中的第三步。接下来，让我们在第四部分（下一章）中介绍如何优雅地分配额外空间。\n\n"
- '# 14. 布局——填充额外空间


  我们正深入进行场景布局的过程。请记住，这是我们遵循的步骤。


  1.  布局整个场景

  2.  相对定位小部件

  3.  处理溢出，例如当小部件无法适应屏幕时

  4.  处理额外空间，例如当屏幕比实际需要更大时

  5.  微调位置


  我们现在已经知道如何处理整个场景，如何使小部件彼此相对定位——上下排列或并排显示——以及如何处理它们过大而无法容纳的情况。这些是步骤一、二和三。现在，让我们来处理在
  `Row` 或 `Column` 中填充可能看起来不太美观的额外空间的任务。


  ### 如果留有额外空间怎么办？


  与空间不足相比，这是一个好问题。你真正需要回答的唯一问题是如何分配这些额外空间。你希望在每个子小部件周围分配多少空间？你有几个选择。最简单快捷的方法是使用 `mainAxisAlignment`
  和 `crossAxisAlignment`。


  ### `mainAxisAlignment`


  `mainAxisAlignment` 是 `Row` 或 `Column` 的一个属性（图 14-1）。通过它，你可以控制如何沿着主轴分配额外空间——对于 `Column`
  是垂直方向，对于 `Row` 是水平方向：


  ```

  child: Column(

  mainAxisAlignment: MainAxisAlignment.spaceEvenly,

  children: [

  SubWidget(),

  SubWidget(),

  ],

  ),

  ```


  你有几种选择。


  ![图 14-1](img/638603_1_En_14_Fig1_HTML.png)


  `mainAxisAlignment` 指定如何沿着主轴分配额外空间


  ### `crossAxisAlignment`


  `crossAxisAlignment` 也是 `Row` 或 `Column` 的一个属性；它决定当小部件在 `Row` 中高度不同或在 `Column` 中宽度不同时，额外空间应放置在哪里。在图
  14-2 中，我们有意让其中一个成员比其他成员更宽。图中显示了 `crossAxisAlignment` 的可选值。


  ![图 14-2](img/638603_1_En_14_Fig2_HTML.png)


  `crossAxisAlignment` 指定如何沿着交叉轴分配额外空间


  还有一个选项：baseline。但它仅在 `Row` 中，并且当你对齐不同高度的 `Text()` 组件时才有意义。它会将文本的基线对齐。




  ### IntrinsicWidth


  如果你希望 `Column` 的所有子组件宽度一致，但又不一定占满整个屏幕宽度，可以使用 `IntrinsicWidth` 组件。使用 `crossAxisAlignment.stretch`
  时，它们会拉伸至最大宽度（图 14-3），但如果包裹在 `IntrinsicWidth` 中，它们都会和最宽的子组件保持相同尺寸（图 14-4 和 14-5）。


  ![](img/638603_1_En_14_Fig5_HTML.jpg)


  图 14-5


  使用 `IntrinsicWidth`，当有一个更宽的成员时，所有成员都会随之变宽


  ![](img/638603_1_En_14_Fig4_HTML.jpg)


  图 14-4


  使用 `IntrinsicWidth`，它们只会和最宽的成员一样宽


  ![](img/638603_1_En_14_Fig3_HTML.jpg)


  图 14-3


  未使用 `IntrinsicWidth` 时，所有子组件都会拉伸至整个宽度


  ```

  IntrinsicWidth(

  child: Column(

  mainAxisAlignment: MainAxisAlignment.center,

  crossAxisAlignment: CrossAxisAlignment.stretch,

  children: [ ... ],

  ),

  ),

  ```


  注意第三个子组件，在图 14-4 中它原本较长，但在图 14-5 中变得更宽。因此你可以看到，当最宽的子组件变宽时，所有子组件都会随之变宽。


  ## Expanded 组件


  当间距需求明确（比如希望等距分布）时，`mainAxisAlignment` 非常实用。这是常规情况。但如果你根本不需要间距呢？如果你希望子组件扩展以填满剩余空间呢？`Expanded`
  组件来救场！


  以下面的代码为例，如图 14-6 所示。


  ![](img/638603_1_En_14_Fig6_HTML.jpg)


  图 14-6


  这个 `Row` 组件有大量额外空间


  ```

  Row(

  mainAxisAlignment: MainAxisAlignment.spaceAround,

  children: [

  SubWidget(),

  SubWidget(),

  SubWidget(),

  SubWidget(),

  SubWidget(),

  SubWidget(),

  ],

  ),

  ```


  当你用 `Expanded` 组件包裹 `Row`/`Column` 的某个子组件时，该子组件会变得*可伸缩*，这意味着如果有额外空间，它会沿着主轴方向拉伸以填满该空间。


  下面展示同样的代码，只是第二个子组件包裹了 `Expanded()`。请见图 14-7，该组件现在扩展并吞噬了所有可用空间。


  ![](img/638603_1_En_14_Fig7_HTML.jpg)


  图 14-7


  第二个子组件被包裹在 `Expanded` 中


  ```

  Row(

  mainAxisAlignment: MainAxisAlignment.spaceAround,

  children: [

  SubWidget(),

  Expanded(child: SubWidget()),

  SubWidget(),

  SubWidget(),

  SubWidget(),

  SubWidget(),

  ],

  ),

  ```


  注意，此时 `mainAxisAlignment` 不再起作用，因为没有额外空间了——所有空间都被 `Expanded` 占用。


  如果再加一个 `Expanded` 会怎样？让我们把第三个和第四个组件也用该组件包裹（图 14-8）：


  ![](img/638603_1_En_14_Fig8_HTML.jpg)


  图 14-8


  多个 `Expanded` 会平分剩余空间


  ```

  Row(

  children: [

  SubWidget(),

  Expanded(child: SubWidget()),

  Expanded(child: SubWidget()),

  Expanded(child: SubWidget()),

  SubWidget(),

  SubWidget(),

  ],

  ),

  ```


  注意第二个组件现在变小了，因为额外空间被第三和第四个子组件共享，并平均分配。


  等等！还有更多功能！我们可以控制每个 `Expanded` 获取的空间大小。`Expanded` 有一个名为 *flex* 的属性，类型为整数。当布局 `Row`/`Column`
  时，刚性元素会先被确定尺寸，然后弹性元素根据其 flex 系数扩展（图 14-9）。在前面的例子中，`Expanded` 的默认 flex 系数为 1，因此它们获得了等量空间。但如果赋予它们不同的
  flex 系数，它们会以不同速率扩展：


  ![](img/638603_1_En_14_Fig9_HTML.jpg)


  图 14-9


  `Expanded` 的 flex 属性用于控制每个组件获得额外的空间量


  ```

  Row(

  children: [

  SubWidget(),

  Expanded(flex: 1, child: SubWidget()),

  Expanded(flex: 3, child: SubWidget()),

  Expanded(flex: 2, child: SubWidget()),

  SubWidget(),

  SubWidget(),

  ],

  ),

  ```


  请注意，剩余空间仍然分配给 `Expanded`，但比例是 1、3 和 2，而非均分。因此 flex 系数为 3 的组件获得的额外空间是 flex 系数为 1
  的组件的三倍。


  ### 使用 `Expanded` 创建开放空间


  也许你希望像使用 `mainAxisAlignment` 那样在元素之间留出空白，同时又想控制这些空白的大小。这时 `Spacer` 和 `SizedBox`
  组件就能派上用场。


  `Spacer` 在 `Row`/`Column` 的子组件之间插入空白空间。每个 `Spacer` 都有一个 flex 系数，该系数会与该轴上的所有其他 flex
  系数协调工作。因此，如果你想按比例分配空间，`Spacer` 就能实现。


  提示


  `Spacer` 实际上就是内部包含一个空 `Container` 的 `Expanded`。


  但有时你需要固定的空白空间，比如精确知道要留多少像素。这时 `SizedBox` 就有用了。`SizedBox` 拥有 `height` 和 `width` 属性，可实现精细控制。图
  14-10 展示了这一点。


  ![](img/638603_1_En_14_Fig10_HTML.jpg)


  图 14-10


  `Spacer()` 和 `SizedBox()` 重新引入了自由空间，但让你精准控制其位置和大小


  ```

  Row(

  children: [

  SubWidget(),

  Spacer(),

  Expanded(flex: 1, child: SubWidget()),

  Spacer(flex: 2),

  Expanded(flex: 3, child: SubWidget()),

  Expanded(flex: 2, child: SubWidget()),

  SubWidget(),

  SizedBox(width: 10.0),

  SubWidget(),

  ],

  ),

  ```


  ## 总结


  本章涵盖了场景布局的相关内容，包括当场景中有多余空间或空间不足时该如何处理。接下来让我们学习五个主题中的最后一个：如何微调组件的间距和位置。我们将通过探索盒模型来完成这一目标。


  '
- '# 15. 布局——微调定位


  我们的学习旅程即将结束，掌握了如何布局 Flutter 场景。你已完成了除最后一步之外的所有步骤。


  1. 布局整个场景


  2. 相对于其他组件定位组件


  3. 处理溢出问题（例如组件无法在屏幕上完整显示）


  4. 处理多余空间（例如屏幕比实际需要更大时）


  5. 微调位置


  至此，我们能够在场景中放置任意内容，并按任何可想象的配置将它们彼此相邻或重叠摆放。如果空间不足，我们可以处理溢出问题；如果空间过多，我们可以熟练地分配空间。


  现在，如果你准备好进入更高阶的阶段，让我们来讨论微调。在本章中，我们将学习如何精细控制屏幕上的每一个像素，而这一切都将围绕盒模型展开。




  ## 容器组件与盒模型


  Flutter 大量借鉴了其他技术，包括 HTML 和 Web，它们拥有边框（border）、内边距（padding）和外边距（margin）的概念。这些统称为盒模型。参见图
  15-1。它们用于在屏幕元素周围及之间创建赏心悦目的间距。这是一个经过实战检验的概念，在 Web 上表现出色，那么为什么不将其借鉴到 Flutter 中呢？


  ![](img/638603_1_En_15_Fig1_HTML.png)


  **图 15-1**


  盒模型定义了内边距、边框和外边距


  假设我们有一个指定尺寸的图片，想要对其进行“装裱”，具体来说，设置内边距为 8、外边距为 10、边框为 1。Flutter 新手可能会首先尝试这样写：


  ```

  Image.network(

  _peopleList[i][''picture''][''thumbnail''],

  padding: 8.0,

  margin: 10.0,

  border: 1.0,

  ),

  ```


  这样是行不通的，因为 `Image` 组件并没有 `padding`、`margin` 或 `border` 属性。但你知道什么有吗？容器（Container）！


  Web 开发者有时会通过将元素包裹在一个名为 `<div>` 的通用容器中，然后应用样式来为网页创建舒适的间距。


  Flutter 没有 `<div>`，但它有一个类似 div 的组件，叫做 `Container`，它的作用就是……嗯……*包含*其他东西。实际上，它存在的全部意义就是对其内部的内容应用布局和样式。一个
  HTML 的 `<div>` 可以包含多个东西，但 Flutter 的 `Container` 只能包含一个子元素。它拥有名为 `padding`、`margin`
  和 `decoration` 的属性。我们将把 `decoration` 留到本章末尾再讲，但 `padding` 和 `margin` 对于创建美观的间距非常有用：


  ```

  Container(

  padding: EdgeInsets.all(8.0),

  margin: EdgeInsets.all(10.0),

  decoration: BoxDecoration(border: Border.all(width: 1.0)),

  child:  Image.network(thePicture),

  ),

  ```


  ### 用于内边距和外边距的 `EdgeInsets`


  如果它们允许我们直接列出代表四个边的四个数值，那么外边距和内边距可能更容易学习。（它们就不能让事情简单点吗？）相反，我们使用一个名为 `EdgeInsets`
  的辅助组件。


  *   `EdgeInsets.all(8.0)` – 相同的值均匀应用于所有四个边。


  *   `EdgeInsets.symmetric(horizontal: 7.0, vertical: 5.0)` – 顶部和底部相同。左侧和右侧相同。


  *   `EdgeInsets.only(top: 20.0, bottom: 40.0, left: 10.0, right: 30.0)` – 左、上、右、下可以全部不同。


  *   `EdgeInsets.fromLTRB(10.0, 20.0, 30.0, 40.0)` – 与上面相同，但输入更少。


  另外请注意，如果你只需要内边距（不需要其他格式），`Padding` 组件是一个简写形式。


  | `Container(``padding: EdgeInsets.all(5),``child: Text("foo"),``),` | `Padding(``padding:
  EdgeInsets.all(5),``child: Text("foo"),``),` |


  这两者是等价的。


  ### 容器内的对齐与定位


  当你将一个小的子组件放置在一个大的 `Container` 中时，`Container` 中的空间会多于其子组件所需的空间。默认情况下，该子组件会位于左上角。你可以选择使用
  *alignment* 属性来定位它：


  ```

  Container(

  width: 150, height: 150,

  alignment: Alignment(1.0, -1.0),

  child:  Image.network(

  _peopleList[i][''picture''][''thumbnail''],

  ),

  ),

  ```


  这些对齐数字代表水平对齐（-1.0 是最左边，0.0 是居中，1.0 是最右边）和垂直对齐（-1.0 是最顶部，0.0 是居中，1.0 是最底部）。参见图 15-2。


  ![](img/638603_1_En_15_Fig2_HTML.png)


  **图 15-2**


  以 (0,0) 为中心的对齐坐标系


  但你可能更倾向于在可能的情况下使用英文单词而不是数字：


  ```

  Container(

  width: 150, height: 150,

  alignment: Alignment.centerLeft,

  child:  Image.network(

  _peopleList[i][''picture''][''thumbnail''],

  ),

  ),

  ```


  `Alignment` 可以接受以下任何值：`topLeft`、`topCenter`、`topRight`、`centerLeft`、`center`、`centerRight`、`bottomLeft`、`bottomCenter`、`bottomRight`。这样写起来是不是更容易，你的开发者同事读起来也更轻松呢？


  提示


  `Align` 组件是用于指定对齐方式而不指定其他属性的简写形式。`Center` 组件则仅仅是居中的简写形式。


  以下三种写法是等价的，第一种是最底层的，最后一种最简洁清晰：


  ```

  Container(

  alignment: Alignment.center,

  child: Text("foo"),

  ),

  Align(

  alignment: Alignment.center,

  child: Text("foo"),

  ),

  Center(

  child: Text("foo"),

  ),

  ```


  ### 容器的大小并非显而易见


  你可能已经注意到，在上一节中，我试图悄悄地向你引入了 `width` 和 `height`。是的，你可以告诉 `Container` 你想要一个特定的 `width`
  和 `height`，它会 *在能力范围内* 遵守。`width` 和 `height` 都接受一个简单的数字，范围可以从 0 到 `double.infinity`。`double.infinity`
  这个值 *暗示* 要尽可能大到其父级允许的程度。


  现在，我知道你在想什么。“Rap，你说的‘在能力范围内’和‘暗示’是什么意思？难道就没有硬性规则吗？我希望 `Container` 的大小是可预测的！”我完全同意。在你了解其规则之前，`Container`
  的大小确实难以预测。那么，它到底是如何决定的呢？


  记住两件事。首先，`Container` 的构建是为了 *包含* 一个子元素，但拥有子元素是可选的。几乎每次它都会有一个子元素。在极少数情况下，`Container`
  没有子元素，我们会用它来提供背景颜色或为其相邻/同级元素创建间距。其次，请记住 Flutter 分两个阶段确定布局：沿渲染树向下传递以确定盒约束（Box Constraints），然后沿着渲染树向上以确定
  RenderBox（还记得吗？也就是“尺寸”）。


  我们先从上往下看：


  *   Flutter 通过从其父级向 `Container` 传递盒约束来限制最大尺寸。


  *   `Container` 在向上布局时会告诉其父级：“如果我的邻居需要空间，请尽管拿去。我可以变得和你需要的一样小。”


  *   如果设置了 `height` 和/或 `width`，它会遵循这些值，但不超过由盒约束决定的最大尺寸。请注意，你列出的尺寸大于其盒约束并不是错误，只是它不会变得更大。这就是为什么你可以使用
  `double.infinity` 而不会出错的原因。


  提示


  设置 `height` 和 `width` 会使 `Container` 变得非常僵硬；它会锁定一个尺寸。虽然这在你想微调布局时很方便，但最佳实践是避免使用它们，除非你有非常充分的理由。通常，你应该允许组件自行决定它们的大小。


  然后我们自下而上：


  *   在 1% 的情况下（没有子元素时），它会消耗剩余的所有空间，直到其最大盒约束。


  *   但大多数时候，它有一个子元素，因此布局引擎会查看子元素的 RenderBox。


  *   如果子元素的 RenderBox 大于我的盒约束，它会裁剪子元素，这是一个大问题。从技术上讲，这不是错误，但看起来很难看。所以请避免这种情况。


  *   如果子元素的 RenderBox 在我的盒约束范围内，就会有多余的空间。Flutter 会查看 `alignment` 属性。如果 `alignment`
  *没有* 设置，我们会将其放置在左上角，并使容器紧密贴合——它会收缩以适应子元素。


  *   如果 `alignment` *被* 设置了，它会使容器变得“贪婪”。仔细想想，这有点道理，因为如果它不通过增长来增加空间，它又怎么能进行顶部/底部/左侧/右侧的对齐呢？


  *   完成所有这些之后，根据需要缩小以遵守外边距。


  是的，这很复杂。这就是为什么 Flutter 开发者经常误解 Container 大小的原因。在沙盒中玩玩，你会慢慢习惯的。这需要一些时间。




  ## 容器装饰


  我们在本章开头承诺过要讨论边框。之所以这样安排，是因为边框并非显而易见的议题。如何给`Text`添加边框？你做不到。如何给`Icon`设置背景？也不行。这些组件本身不具备承载装饰的能力。但你知道什么可以吗？`Container`。当你遇到这类样式问题时，答案几乎总是：将部件包裹在`Container`中，然后为其添加装饰。


  因此，理解容器装饰能够解决许多部件面临的样式难题。


  `Container`具备一个大多数其他部件所没有的全能样式属性，名为`decoration`。以下示例展示了如何为容器添加阴影：


  ```

  child: Container(

  width: 300.0,

  height: 300.0,

  decoration: BoxDecoration(

  color: Colors.purple,

  boxShadow: [

  BoxShadow(

  offset: Offset.fromDirection(0.25*pi, 10.0),

  blurRadius: 10.0,

  )

  ],

  ),

  ),

  ```


  图 15-3 和 15-4 分别展示了无阴影和有阴影的盒子。


  ![](img/638603_1_En_15_Fig4_HTML.jpg)


  **图 15-4** 带盒阴影的效果


  ![](img/638603_1_En_15_Fig3_HTML.jpg)


  **图 15-3** 无盒阴影的效果


  这是 Flutter 冗长特性的典型案例。在 Web 中，实现同样效果只需 17 个字符。但在 Flutter 中，我们必须记住`boxShadow`是一个`BoxShadow`的*数组*，每个阴影对象包含偏移量（方向以弧度表示）、尺寸（以像素为单位）以及模糊半径（同样以像素计）。唉！


  模糊半径可能需要额外解释。模糊半径是指阴影消散的距离。这就像给灯加了个灯罩——不加罩子时，光线刺眼，阴影边缘清晰；加上灯罩后，光线柔和，阴影也随之变得柔和。模糊半径值越大，阴影越柔和。


  > **注意：** 如果同时使用了`BoxDecoration`，则无法直接在`Container`上指定颜色属性。但别慌；`BoxDecoration`本身也包含`color`属性。只需将`Container`的`color`属性移到`BoxDecoration`中，即可达到相同效果。


  还有其他几种装饰可用。让我们看看最实用的几个：`border`、`borderRadius`和`BoxShape`。


  ### 边框


  正如你用`BoxDecoration`实现阴影，你也可以用它为容器添加边框。以下是一个具有四种不同宽度的红色边框（图 15-5）：


  ![](img/638603_1_En_15_Fig5_HTML.jpg)


  **图 15-5** 不同宽度的边框


  ```

  Container(

  decoration: BoxDecoration(

  color: Colors.purple,

  border: Border(

  top: BorderSide(width: 10,color: Colors.red,),

  right: BorderSide(width: 20,color: Colors.red,),

  bottom: BorderSide(width: 30,color: Colors.red,),

  left: BorderSide(width: 40,color: Colors.red,),

  ),

  ),

  )

  ```


  虽然 Flutter 允许我们设置不同宽度甚至不同颜色的边框确实不错，但你多久会用到这个功能呢？通常四边都是统一的。所以我们常用简写形式`Border.all()`：


  ```

  Container(

  decoration: BoxDecoration(

  color: Colors.purple,

  border: Border.all(width: 10, color: Colors.red,),

  ),

  )

  ```


  这样简单多了。没错，依然冗长，但更简洁。


  ### 圆角半径


  圆角是备受青睐的外观。即使没有边框，你也可以让`Container`变得圆润（图 15-6）。通过`BorderRadius`实现：


  ![](img/638603_1_En_15_Fig6_HTML.jpg)


  **图 15-6** 两个角应用`BorderRadius`


  ```

  Container(

  decoration: BoxDecoration(

  color: Colors.purple,

  borderRadius: BorderRadius.only(

  topLeft: Radius.circular(20.0),

  topRight: Radius.circular(60.0),

  ),

  ),

  )

  ```


  我们只设置了`topLeft`和`topRight`的圆角半径，但同时也存在`bottomLeft`和`bottomRight`属性。尽管我们欣赏这种灵活性，但实际应用中并不常用。我们通常会让四个角保持一致（图
  15-7）：


  ![](img/638603_1_En_15_Fig7_HTML.jpg)


  **图 15-7** 四个角都应用`BorderRadius`


  ```

  Container(

  decoration: BoxDecoration(

  color: Colors.purple,

  borderRadius: BorderRadius.all(Radius.circular(20.0),),

  ),

  )

  ```


  ### 盒子形状


  你的容器不必总是矩形。当需要其他形状时，可以通过`BoxShape`或`CustomPainter`实现。`BoxShape`使用更为简便，但它只支持圆形（除了默认的矩形外），如图
  15-8 所示：


  ![](img/638603_1_En_15_Fig8_HTML.jpg)


  **图 15-8** `BoxShape.circle`让你的`Container`变圆形


  ```

  Container(

  decoration: BoxDecoration(

  shape: BoxShape.circle,

  color: Colors.deepOrange,

  ),

  ),

  ```


  `CustomPainter`则复杂得多，但支持无限种形状。深入`CustomPainter`的细节可能会分散注意力（图 15-9），但这里提供一个快速示例——超人盾牌：


  ![](img/638603_1_En_15_Fig9_HTML.jpg)


  **图 15-9** 使用`CustomPainter`


  ```

  Container(

  child: CustomPaint(

  size: Size(200, 200),

  painter: SupermanShieldPainter(),

  ),

  )

  class SupermanShieldPainter extends CustomPainter {

  @override

  void paint(Canvas canvas, Size size) {

  canvas.drawPath(Path()

  ..moveTo(25, 0)

  ..lineTo(125, 0)

  ..lineTo(150,25)

  ..lineTo(75, 125)

  ..lineTo(0,25)

  ..lineTo(25,0),

  Paint()

  ..style=PaintingStyle.fill

  ..color = Colors.red

  );

  }

  @override

  bool shouldRepaint(oldDelegate) => false;

  }

  ```


  看到了吗？相当复杂。请注意，你的容器仍然是矩形，只是背景发生了改变。若要深入了解`CustomPainter`，请查阅[`https://api.flutter.dev/flutter/widgets/CustomPaint-class.html`](https://api.flutter.dev/flutter/widgets/CustomPaint-class.html)。


  > **提示：** 所有这些装饰都应用于`decoration`属性，但它们同样可以应用于名为`foregroundDecoration`的属性——顾名思义，该属性应用于容器*之上*的图层。由于它们绘制在其他元素上方，你需要记住另一个修改项：不透明度。颜色可以设置为半透明。以下代码将在容器顶部创建一个
  50%透明的红色图层：

  >

  > ```

  > foregroundDecoration: BoxDecoration(

  > color:Colors.red.withOpacity(0.5),

  > ),

  > ```


  ## 结论


  从很多方面来看，`Container`是 Flutter 中最为典型的部件，提供了大量选项来微调布局。天哪，你甚至可以用`Container`完成整个布局，因为它们实在太万能了！（小朋友们，可千万别真这么干。我们只是理论探讨。）但`Container`对于微调布局和为众多其他部件添加视觉装饰来说，确实非常有用。


  嘿，恭喜你！你已经掌握了一些非常难的概念，我们希望在前几章中这些内容学起来更容易。我们将用一个相关主题来结束本书：特殊展示部件。它们会将你的布局提升到新高度！


