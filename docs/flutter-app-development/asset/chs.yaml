  ```\nreturn Table(\n  columnWidths: {0: FractionColumnWidth(0.3)},\n  children:\
  \ [ ...\n```\n\n如何实现跨列？例如用于表格标题。遗憾的是，在 Flutter 的 `Table` 中还不能直接实现——目前不行。也许将来可以。已经有关于跨列的\
  \ feature request 了。\n\n\n\n## 结语\n\nFlutter 丰富多样的组件既是其优势，也造成了诸多困惑——这无疑是一把双刃剑。在经历了这第六篇（没错！）关于布局组件的章节后，相信你已掌握足够的知识来应对大部分布局难题。本章我们重点介绍了一些特殊的布局组件，这将赋予你构建极具创意的\
