- '# 引言


  ## 前言


  本书探讨的是 iOS 和 OS X 中的 ARC、Block 及 Grand Central Dispatch。它与其他书籍略有不同。简而言之，本书内容相当深入，并解释了以下要点：


  - ARC：为 iOS 5 和 OS X Lion 新引入的内存管理机制。

  - Block 和 Grand Central Dispatch：为 iOS 4 和 OS X Snow Leopard 引入，主要用于编写多线程应用程序。


  这些新技术是开发 iOS 5 和 OS X Lion 应用所必需的。虽然它们看似容易理解，但实际上，如果您未能真正掌握它们，将会遇到各种陷阱。在本书中，我将结合苹果的源代码进行讲解，帮助您获得比仅仅阅读苹果官方参考资料更深入的理解。


  ## 本书适合的读者


  - 了解 C/C++，但对 Objective-C 不太熟悉的读者

  - 希望了解 Objective-C 源码如何工作的读者

  - 正在开发 iOS 或 Mac 应用，并希望提升知识水平以实现进阶的读者


  ## 第 1 章




  '
- '# 自动引用计数的前世今生


  OSX Lion 和 iOS5 现在提供了一种名为自动引用计数（Automatic Reference Counting，ARC）的应用程序内存管理机制。简而言之，`ARC`将内存管理工作从程序员转移给了编译器，这通常会显著提升性能。


  在第 2 章和第 3 章中，您将了解到`ARC`的强大之处。但在进入这个理想世界之前，最好先回顾一下非`ARC`环境下内存管理的基础知识。通过这样做，您将更深入地理解`ARC`所提供的便利，并在接下来两章深入探讨`ARC`时打下更坚实的基础。


  我们从内存管理及其概念的概述开始，然后介绍诸如`alloc`、`dealloc`和`autorelease`等功能的实现。


  ## 引用计数内存管理概述


  在`Objective-C`的许多情况下，我们可以将“内存管理”重新表述为“引用计数”。内存管理意味着程序员在程序需要时分配一块内存区域，并在程序不再需要时释放它。未被正确释放的不需要的内存区域会浪费资源，也可能导致应用程序崩溃。引用计数由乔治·E·柯林斯（George
  E. Collins）于 1960 年发明，用于简化内存管理。


  为了说明什么是引用计数，让我们以办公室里的灯为例进行类比（图 1–1）。


  ![images](img/9781430241164_Fig01-01.jpg)


  **图 1–1.** *办公室里的灯*


  假设办公室里只有一盏灯。早上，当有人进入办公室时，他因为需要而打开灯。当他离开办公室时，他不再需要灯，所以关掉它。如果多个人在进出时都开关灯会发生什么？每当有人离开时，他就关掉灯，这意味着即使其他人还在工作，办公室也会变暗（图
  1–2）。


  ![images](img/9781430241164_Fig01-02.jpg)


  **图 1–2.** *灯的问题*


  为了解决这个问题，我们需要一些规则来确保当有一个人或多个人在场时灯是亮着的，只有当没人在场时灯才关闭。


  1.  当有人进入空办公室时，她打开灯。

  2.  随后进入房间的人也要使用这盏灯。

  3.  当有人离开时，此人不再需要这盏灯。

  4.  当最后一个人离开时，他关掉灯。


  为了遵守这些规则，我们引入一个计数器来了解有多少人。让我们看看它是如何工作的。


  1.  当有人进入空办公室时，计数器 +1。它从零变成一。于是灯打开。

  2.  当另一个人进入时，计数器 +1；例如，它从一变成二。

  3.  当有人离开时，计数器 –1；例如，它从二变成一。

  4.  当最后一个人离开时，计数器变为零，因此灯关闭。


  如图 1–3 所示，通过计数器我们可以正确控制灯。只有在所有人都离开时灯才关闭。


  ![images](img/9781430241164_Fig01-03.jpg)


  **图 1–3.** *管理办公室的灯*


  让我们看看这个比喻如何帮助我们理解内存管理。在`Objective-C`中，灯对应于一个对象。虽然办公室只有一盏灯，但在`Objective-C`中我们可以拥有许多对象，直至计算机资源的限制。


  每个人对应于`Objective-C`的每个上下文。上下文用于表示一段程序代码、一个变量、一个变量作用域或一个对象。它意味着某种处理目标对象的东西。表 1–1
  突出了办公室灯与`Objective-C`中对象的关系。


  ![images](img/t0101.jpg)


  正如我们可以用计数器管理灯一样，我们可以在`Objective-C`中管理应用程序内存。换句话说，我们可以通过引用计数来管理`Objective-C`的对象，如图
  1–4 所示。


  ![images](img/9781430241164_Fig01-04.jpg)


  **图 1–4.** *使用引用计数进行内存管理*


  此图说明了引用计数内存管理的概念。在接下来的部分中，我们将深入探讨这个概念并给出一些例子。


  ## 进一步探索内存管理


  对于引用计数，您可能认为需要记住引用计数器本身的值或什么引用了对象等等。但您不应该这样想。相反，您应该按照以下规则来思考引用计数。


  *   您拥有您创建的任何对象的所有权。

  *   您可以使用`retain`获取对象的所有权。

  *   当不再需要时，您必须放弃您拥有的对象的所有权。

  *   您绝不能放弃您不拥有的对象的所有权。


  以上是引用计数的所有规则。您所需要做的就是遵循这些规则。您无需再担心引用计数器。


  规则中的“创建”、“获取所有权”和“放弃所有权”以及“释放”是引用计数中非常常见的短语。表 1–2 显示了这些短语如何对应于`Objective-C`方法。


  ![images](img/t0102.jpg)


  基本上，您`alloc`一个对象，在某个时刻`retain`它，然后为您发送的每个`alloc`/`retain`发送一个`release`。当对象即将从内存中移除时，会调用其`dealloc`方法。


  **注意：** 如果您使用了一次`alloc`然后又`retain`了一次，那么您需要`release`两次。


  这些方法不是由`Objective-C`语言本身提供的。它们是作为`Cocoa`框架一部分的`Foundation`框架的特性。在`Foundation`框架中，`NSObject`拥有一个类方法`alloc`和实例方法`retain`、`release`和`dealloc`来处理内存管理（图
  1–5）。关于如何实现这一点，将在后面的“实现`alloc`、`retain`、`release`和`dealloc`”部分中展示。


  ![images](img/9781430241164_Fig01-05.jpg)


  **图 1–5.** *`Cocoa`框架、`Foundation`框架和`NSObject`类的关系*


  让我们逐一研究每条规则。




  '
- "# 你拥有所创建的任何对象的所有权\n\n当你使用的方法名以下列内容开头时，意味着你在创建一个对象并拥有其所有权。\n\n*   `alloc`\n*   `new`\n\
  *   `copy`\n*   `mutableCopy`\n\n让我们通过一些示例源码来看看如何创建一个对象。下面的示例使用了 `alloc` 方法来创建并拥有一个对象的所有权。\n\
  \n```\n/*\n * 你创建一个对象并拥有所有权。\n */\n\nid obj = [[NSObject alloc] init];\n\n/*\n *\
  \ 现在，你拥有了该对象的所有权。\n */\n```\n\n通过调用 `NSObject` 的类方法 `alloc`，你创建了一个对象并获得了它的所有权。变量\
  \ `obj` 持有一个指向所创建对象的指针。你也可以使用类方法 `new` 来创建它。`[NSObject new]` 和 `[[NSObject alloc]\
  \ init]` 的功能完全相同。\n\n```\n/*\n * 你创建一个对象并拥有所有权。\n */\n\nid obj = [NSObject new];\n\
  \n/*\n * 现在你拥有了该对象的所有权。\n */\n```\n\n`NSObject` 的实例方法 `copy` 创建一个对象的副本，该对象的类必须遵循\
  \ `NSCopying` 协议，并且 `copyWithZone:` 方法必须正确实现。同样地，`NSObject` 的实例方法 `mutableCopy`\
  \ 创建一个对象的可变副本，该对象的类必须遵循 `NSMutableCopying` 协议，并且 `mutableCopyWithZone:` 方法必须正确实现。`copy`\
  \ 和 `mutableCopy` 的区别类似于 `NSArray` 和 `NSMutableArray` 的区别。这些方法创建新对象的方式与 `alloc`\
  \ 和 `new` 相同；因此，你拥有其所有权。\n\n如前所述，当你使用名称以 `alloc`、`new`、`copy` 或 `mutableCopy` 开头的方法时，你会创建一个对象并拥有其所有权。以下是方法名的一些示例。\n\
  \n*   `allocMyObject`\n*   `newThatObject`\n*   `copyThis`\n*   `mutableCopyYourObject`\n\
  \n然而，这种命名约定并不适用于以下方法。\n\n*   `allocate`\n*   `newer`\n*   `copying`\n*   `mutableCopyed`\n\
  \n**注意：** 请对方法名使用驼峰命名法。驼峰命名法是一种书写复合词或短语的实践，其中各元素之间无空格连接，且每个元素的首字母在复合词中大写。对于方法名，首字母应为小写，即小驼峰命名法。请参考维基百科的“CamelCase”条目\
  \ [`http://en.wikipedia.org/wiki/CamelCase`](http://en.wikipedia.org/wiki/CamelCase)。\n\
  \n"
- "# 你可以使用 `retain` 获取对象的所有权\n\n有时，不属于 `alloc`/`new`/`copy`/`mutableCopy` 方法组的方法会返回一个对象。在这种情况下，你并未创建它，因此你对其没有所有权。以下是使用\
  \ `NSMutableArray` 类方法 `array` 的示例。\n\n```\n/*\n * 获取一个对象，而不自行创建或拥有所有权\n */\n\n\
  id obj = [NSMutableArray array];\n\n/*\n * 获取的对象存在，但你对其没有所有权。\n */\n```\n\n变量 `obj`\
  \ 持有对 `NSMutableArray` 对象的引用，但你并不拥有其所有权。要获取所有权，你必须使用 `retain` 方法。\n\n```\n/*\n *\
  \ 获取一个对象，而不自行创建或拥有所有权\n */\n\nid obj = [NSMutableArray array];\n\n/*\n * 获取的对象存在，但你对其没有所有权。\n\
  \ */\n\n[obj retain];\n\n/*\n * 现在你拥有了该对象的所有权。\n */\n\n[obj release];\n\n/*\n *\
  \ 对象的所有权已被释放。\n *\n * 虽然变量 obj 还持有指向该对象的指针，\n * 但你不能继续访问该对象了。\n */\n```\n\n调用 `retain`\
  \ 方法后，你就拥有了该对象的所有权，就好像你是通过 `alloc`/`new`/`copy`/`mutableCopy` 方法组获得它一样。\n\n"
- "# 不再需要时，你必须放弃你所拥有的对象的所有权\n\n当你拥有一个对象的所有权，但不再需要它时，你必须通过调用 `release` 方法来放弃所有权。\n\n\
  ```\n/*\n * 你创建一个对象并拥有所有权。\n */\n\nid obj = [[NSObject alloc] init];\n\n/*\n * 现在你拥有了该对象的所有权。\n\
  \ */\n\n[obj release];\n\n/*\n * 对象的所有权已被释放。\n *\n * 虽然变量 obj 还持有指向该对象的指针，\n * 但你不能继续访问该对象了。\n\
  \ */\n```\n\n在上面的例子中，通过 `alloc` 创建对象并获取所有权后，你通过 `release` 方法释放了它。对于通过 `retain` 获取所有权的对象，你可以执行类似的操作，如下所示。\n\
  \n## 放弃 retain 对象的所有权\n\n```\n/*\n * 获取一个对象，而不自行创建或拥有所有权\n */\n\nid obj = [NSMutableArray\
  \ array];\n\n/*\n * 获取的对象存在，但你对其没有所有权。\n */\n\n[obj retain];\n\n/*\n * 现在你拥有了该对象的所有权。\n\
  \ */\n\n[obj release];\n\n/*\n *  对象的所有权已被释放。\n * 你不能继续访问该对象了。\n */\n```\n\n无论是在以下哪种情况：通过调用\
  \ `alloc`/`new`/`copy`/`mutableCopy` 方法组创建对象并拥有所有权，还是通过调用 `retain` 方法拥有所有权，当你拥有一个对象的所有权时，都必须使用\
  \ `release` 方法放弃所有权。\n\n接下来，让我们看看一个方法如何返回一个已创建的对象。\n\n## 放弃 retain 对象的所有权\n\n下面的示例展示了一个方法如何返回一个已创建的对象。\n\
  \n```\n- (id)allocObject\n{\n      /*\n       * 你创建一个对象并拥有所有权。\n       */\n    \n\
  \    id obj = [[NSObject alloc] init];\n    \n     /*\n      * 此时，此方法拥有该对象的所有权。\n\
  \      */\n    \n    return obj;\n}\n```\n\n如果一个方法返回了一个它拥有所有权的对象，那么所有权会传递给调用者。另外，请注意，为了归属于\
  \ `alloc`/`new`/`copy`/`mutableCopy` 方法组，方法名必须以 `alloc` 开头。\n\n```\n/*\n * 获取一个对象，而不自行创建或拥有所有权\n\
  \ */\n\nid obj1 = [obj0 allocObject];\n\n/*\n * 现在你拥有了该对象的所有权。\n */\n```\n\n你调用了\
  \ `allocObject` 方法，因为方法名以 `alloc` 开头，这意味着你创建了一个对象并拥有其所有权。\n\n接下来，让我们看看如何实现像 `[NSMutableArray\
  \ array]` 这样的方法。\n\n## 返回一个不附带所有权的新对象\n\n`[NSMutableArray array]` 方法返回一个新对象，但调用者不获取其所有权。让我们看看如何实现这类方法。\n\
  \n我们不能用 `alloc`/`new`/`copy`/`mutableCopy` 开头来命名这类方法。在下面的例子中，我们使用 `object` 作为方法名。\n\
  \n```\n- (id)object\n{\n    id obj = [[NSObject alloc] init];\n    \n     /*\n \
  \     * 此时，此方法拥有该对象的所有权。\n      */\n    \n    [obj autorelease];\n    \n     /*\n\
  \      * 对象存在，但你对其没有所有权。\n      */\n    \n    return obj;\n}\n```\n\n为了实现此类方法，我们像上面那样使用\
  \ `autorelease` 方法（参见 图 1-6）。通过调用 `autorelease`，你可以在返回所创建的对象时不附带所有权。自动释放提供了一种机制，可以在对象的生命周期结束时妥善地释放它们。\n\
  \n![images](img/9781430241164_Fig01-06.jpg)\n\n**图 1-6.** *release 和 autorelease\
  \ 的区别*\n\n例如，`NSMutableArray` 的类方法 `array` 就是这样实现的。请注意，根据命名规则，该方法名不以 `alloc`/`new`/`copy`/`mutableCopy`\
  \ 开头。\n\n```\nid obj1 = [obj0 object];\n\n/*\n * 获取的对象存在，但你对其没有所有权。\n */\n```\n\n\
  你可以通过 `retain` 方法获取这个自动释放对象的所有权。\n\n```\nid obj1 = [obj0 object];\n/*\n * 获取的对象存在，但你对其没有所有权。\n\
  \ */\n\n[obj1 retain];\n\n/*\n * 现在你拥有了该对象的所有权。\n */\n```\n\n我将在后面的章节中更详细地解释 `autorelease`。\n\
  \n\n\n"
- "# 你必须不能放弃一个你不拥有所有权的对象\n\n如前所述，当你拥有对象的所有权时，你必须通过调用`release`方法来放弃它们。但是，当你通过其他方式获得对象时，绝对不能调用`release`方法。如果你这样做了，应用程序会崩溃。例如，在释放了一个你拥有所有权的对象后，如果你再次释放它，应用程序将会崩溃。\n\
  \n```\n/*\n * 你创建了一个对象并拥有其所有权。\n */\nid obj = [[NSObject alloc] init];\n\n/*\n *\
  \ 现在你拥有了该对象的所有权。\n */\n[obj release];\n\n/*\n * 对象的所有权已被放弃。\n */\n[obj release];\n\
  \n/*\n * 你放弃了一个你不拥有所有权的对象！\n * 应用程序将会崩溃！\n *\n * 在这些情况下应用程序会崩溃：\n * 当你对一个已经被销毁的对象调用\
  \ release 方法时。\n * 当你访问一个已经被销毁的对象时。\n */\n```\n\n另外，以下是一个释放你不拥有所有权的对象的示例：\n\n```\n\
  id obj1 = [obj0 object];\n\n/*\n * 获得的对象存在，但你并不拥有其所有权。\n */\n[obj1 release];\n\n\
  /*\n * 你放弃了一个你不拥有所有权的对象！\n * 应用程序迟早会崩溃。\n */\n```\n\n如这些示例所示，你绝对不能放弃任何你不拥有所有权的对象。这会导致应用程序崩溃。\n\
  \n我们已经学习了四条规则，这些就是你在引用计数内存管理中需要考虑的全部内容。接下来，我们将学习`alloc`、`retain`、`release`和`dealloc`是如何实现的以及它们的工作原理。\n\
  \n## 实现 alloc、retain、release 和 dealloc\n\nOS X 和 iOS 的许多部分在 Apple Open Source 中以开源软件的形式公开。如上所述，`alloc`、`retain`、`release`和`dealloc`是\
  \ Cocoa Framework 中 Foundation Framework 内的`NSObject`类的方法。不幸的是，Foundation Framework\
  \ 不是 Apple Open Source 的一部分。幸运的是，由于 Core Foundation Framework 是 Apple Open Source\
  \ 的一部分，因此从`NSObject`使用的内存管理源代码是公开的。但是，如果没有`NSObject`本身的实现，就很难看到全貌。因此，让我们从 GNUstep\
  \ 查看一个替代源代码。\n\nGNUstep 是与 Cocoa Framework 兼容的实现。虽然我们不能期望它与 Apple 的实现完全相同，但它以相同的方式工作，并且实现应该类似。理解\
  \ GNUstep 的源代码有助于我们推测 Apple 的 Cocoa 实现。\n\n### `alloc`方法\n\n让我们从 GNUstep 中`NSObject`类的`alloc`方法开始。作为旁注，本书中的一些源代码可能已经被修改以明确重要部分。\n\
  \n`NSObject`类的`alloc`方法被调用如下：\n\n```\nid obj = [NSObject alloc];\n```\n\n`alloc`\
  \ 在 `NSObject.m` 中的实现如 [Listing 1–1] 所示。\n\n**Listing 1–1.** *GNUstep/modules/core/base/Source/NSObject.m\
  \ alloc*\n\n```\n+ (id) alloc\n{\n    return [self allocWithZone: NSDefaultMallocZone()];\n\
  }\n\n+ (id) allocWithZone: (NSZone*)z\n{\n    return NSAllocateObject (self, 0,\
  \ z);\n}\n```\n\n在`allocWithZone:`方法内部，通过`NSAllocateObject`函数分配一个对象。实现如 [Listing\
  \ 1–2] 所示。\n\n__________\n\n¹ Apple, “Apple open source,” [`http://opensource.apple.com/`](http://opensource.apple.com/)\n\
  \n² GNUstep, “GNUstep.org,” [`http://gnustep.org/`](http://gnustep.org/)\n\n**Listing\
  \ 1–2.** *GNUstep/Modules/Core/Base/Source/NSObject.m NSAllocateObject*\n\n```\n\
  struct obj_layout {\n    NSUInteger  retained;\n};\n\ninline id\nNSAllocateObject\
  \ (Class aClass, NSUInteger extraBytes, NSZone *zone)\n{\n    int size = /* 存储对象所需的尺寸\
  \ */\n    id new = NSZoneMalloc(zone, size);\n    memset(new, 0, size);\n    new\
  \ = (id)&((struct obj_layout *)new)[1];\n}\n```\n\n`NSAllocateObject`函数调用`NSZoneMalloc`来分配一个内存区域。之后，该区域被填充为零，并返回该区域的指针。\n\
  \n**注意：** 最初，`NSZone`用于防止内存碎片化（[Figure 1–7]）。通过在不同情况下切换区域，内存分配可以更有效。\n\n但如今，正如你在“Transition\
  \ to ARC Release Notes”中所看到的，Objective-C 运行时只是忽略了区域。因为近期的运行时内存管理算法已经足够有效，由于复杂性，使用区域被认为没有意义或不值得。\n\
  \n![images](img/9781430241164_Fig01-07.jpg)\n\n**Figure 1–7.** *使用多个区域防止碎片化。*\n\n\
  通过移除与`NSZone`相关的代码，`alloc`方法可以简单地重写为 [Listing 1–3] 所示。\n\n__________\n\n³ Apple,\
  \ “Transition to ARC Release Notes.”, [`http://developer.apple.com/library/mac/#releasenotes/ObjectiveC/RN-TransitioningToARC/_index.html`](http://developer.apple.com/library/mac/#releasenotes/ObjectiveC/RN-TransitioningToARC/_index.html)\n\
  \n**Listing 1–3.** *GNUstep/modules/core/base/Source/NSObject.m alloc 简化版*\n\n```\n\
  struct obj_layout {\n    NSUInteger  retained;\n};\n\n+ (id) alloc\n{\n    int size\
  \ = sizeof(struct obj_layout) + size_of_the_object;\n    struct obj_layout *p =\
  \ (struct obj_layout *)calloc(1, size);\n    return (id)(p + 1);\n}\n```\n\n现在你已经理解了`alloc`方法的工作原理，让我们继续学习`retain`。\n\
  \n\n\n#### `retain` 方法\n\n`alloc` 方法返回一个用零填充的内存块，其中包含一个 `struct obj_layout` 头部，该头部有一个变量\
  \ `retained` 用于存储引用次数。这个数字被称为引用计数。图 1-8 展示了 GNUstep 实现中对象的结构。\n\n![images](img/9781430241164_Fig01-08.jpg)\n\
  \n**图 1-8.** *`alloc` 返回的对象的内存映像*\n\n你可以通过调用 `retainCount` 方法获取引用计数的值。\n\n```objectivec\n\
  id obj = [[NSObject alloc] init];\nNSLog(@\"retainCount=%d\", [obj retainCount]);\n\
  \n/*\n  * 显示 retainCount=1\n  */\n```\n\n就在 `alloc` 被调用之后，引用计数为 1。下面的源代码展示了在 GNUstep\
  \ 中 `retainCount` 函数是如何实现的。\n\n**代码清单 1-4.** *GNUstep/Modules/Core/Base/Source/NSObject.m\
  \ retainCount*\n\n```objectivec\n- (NSUInteger) retainCount\n{\n    return NSExtraRefCount(self)\
  \ + 1;\n}\n\ninline NSUInteger\nNSExtraRefCount(id anObject)\n{\n    return ((struct\
  \ obj_layout *)anObject)[-1].retained;\n}\n```\n\n该源代码从对象指针中查找头部，并获取 `retained`\
  \ 变量的值（图 1-9）。\n\n![images](img/9781430241164_Fig01-09.jpg)\n\n**图 1-9.** *从对象访问头部*\n\
  \n由于内存块在分配时被零填充，因此 `retained` 的值为零。`retainCount` 函数通过 `NSExtraRefCount(self) + 1`\
  \ 返回 1。我们可以推测，`retain` 或 `release` 方法会通过加 1 或减 1 来修改这个值。\n\n```objectivec\n[obj\
  \ retain];\n```\n\n让我们检查一下 `retain` 方法的实现，如代码清单 1-5 所示。\n\n**代码清单 1-5.** *GNUstep/Modules/Core/Base/Source/NSObject.m\
  \ retain*\n\n```objectivec\n- (id) retain\n{\n    NSIncrementExtraRefCount(self);\n\
  \    return self;\n}\n\ninline void\nNSIncrementExtraRefCount(id anObject)\n{\n\
  \    if (((struct obj_layout *)anObject)[-1].retained == UINT_MAX - 1)\n       \
  \ [NSException raise: NSInternalInconsistencyException\n            format: @\"\
  NSIncrementExtraRefCount() asked to increment too far\"];\n\n    ((struct obj_layout\
  \ *)anObject)[-1].retained++;\n}\n```\n\n虽然有一些代码行用于在变量 `retained` 溢出时抛出异常，但根本上它是在\
  \ `retained++` 这一行上加一。接下来，我们学习功能与 `retained` 方法相反的 `release` 方法。\n\n#### `release`\
  \ 方法\n\n我们可以轻松猜测到 `release` 方法会包含 `retained--`。同时，当该值变为零时，它也应该包含一些代码。\n\n```objectivec\n\
  [obj release];\n```\n\n`release` 方法的实现如代码清单 1-6 所示。\n\n**代码清单 1-6.** *GNUstep/Modules/Core/Base/Source/NSObject.m\
  \ release*\n\n```objectivec\n- (void) release\n{\n    if (NSDecrementExtraRefCountWasZero(self))\n\
  \    [self dealloc];\n}\n\nBOOL\nNSDecrementExtraRefCountWasZero(id anObject)\n\
  {\n    if (((struct obj_layout *)anObject)[-1].retained == 0) {\n        return\
  \ YES;\n    } else {\n        ((struct obj_layout *)anObject)[-1].retained--;\n\
  \        return NO;\n    }\n}\n```\n\n正如我们所料，`retained` 被减一。如果该值为零，则对象将通过 `dealloc`\
  \ 方法被释放。让我们看看 `dealloc` 方法是如何实现的。\n\n#### `dealloc` 方法\n\n代码清单 1-7 是 `dealloc` 方法的实现。\n\
  \n**代码清单 1-7.** *GNUstep/Modules/Core/Base/Source/NSObject.m dealloc*\n\n```objectivec\n\
  - (void) dealloc\n{\n    NSDeallocateObject (self);\n}\n\ninline void\nNSDeallocateObject(id\
  \ anObject)\n{\n    struct obj_layout *o = &((struct obj_layout *)anObject)[-1];\n\
  \    free(o);\n}\n```\n\n它只是释放了一个内存块。\n\n我们已经看到了 GNUstep 中 `alloc`、`retain`、`release`\
  \ 和 `dealloc` 的实现，并了解了以下内容。\n\n- 所有 Objective-C 对象都有一个称为引用计数的整数值。\n- 当调用 `alloc`/`new`/`copy`/`mutableCopy`\
  \ 或 `retain` 之一时，引用计数加一。\n- 当调用 `release` 时，它减一。\n- 当整数计数器变为零时，会调用 `Dealloc`。\n\n\
  接下来，让我们检查 Apple 的实现。\n\n\n\n### Apple 对 `alloc`、`retain`、`release` 和 `dealloc` 的实现\n\
  \n如前所述，`NSObject` 类本身的源代码并未公开。我们通过使用 Xcode 调试器（`lldb`）对 iOS 应用进行调试，来探究其实现方式。首先，在\
  \ `NSObject` 的类方法 `alloc` 处设置一个断点，观察调试器中发生的情况。以下是 `alloc` 内部调用的函数列表。\n\n```\n+alloc\n\
  +allocWithZone:\nclass_createInstance\ncalloc\n```\n\n`NSObject` 的类方法 `alloc` 会调用\
  \ `allocWithZone:`。随后，通过 Objective-C Runtime 参考文档中记载的 `class_createInstance` 函数，调用了\
  \ `calloc` 函数来分配内存块。^(4) 这与 GNUstep 的实现似乎没有太大差异。我们可以在 `objc4` 库的 `runtime/objc-runtime-new.mm`\
  \ 文件中看到 `class_createInstance` 函数的源代码。^(5)\n\n那么 `NSObject` 的实例方法 `retainCount`、`retain`\
  \ 和 `release` 又是如何实现的呢？以下是它们内部调用的函数。\n\n```\n-retainCount\n__CFDoExternRefOperation\n\
  CFBasicHashGetCountOfKey\n\n-retain\n__CFDoExternRefOperation\nCFBasicHashAddValue\n\
  \n-release\n__CFDoExternRefOperation\nCFBasicHashRemoveValue\n```\n\n__________\n\
  \n⁴ Apple，“Objective-C Runtime Reference”，[`http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/ObjCRuntimeRef/Reference/reference.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/ObjCRuntimeRef/Reference/reference.html)\n\
  \n⁵ Apple，“Source Browser”，[`http://www.opensource.apple.com/source/objc4/`](http://www.opensource.apple.com/source/objc4/)\n\
  \n（此外，当 `CFBasicHashRemoveValue` 返回 0 时，`-dealloc` 也会被调用。）\n\n在上述所有方法中，都调用了 `__CFDoExternRefOperation`\
  \ 函数。然后该函数会调用名称相似的函数。这些函数是公开的。如你所见，如果函数名以 `CF` 开头，你可以在 Core Foundation 框架中找到其源代码。^(6)\
  \ 以下代码清单 1-8 是 `CFRuntime.c` 中简化后的 `__CFDoExternRefOperation` 实现。\n\n**清单 1-8.**\
  \ *CF/CFRuntime.c `__CFDoExternRefOperation`*\n\n```\nint __CFDoExternRefOperation(uintptr_t\
  \ op, id obj) {\n    CFBasicHashRef table = get hashtable from obj;\n    int count;\n\
  \n    switch (op) {\n    case OPERATION_retainCount:\n        count = CFBasicHashGetCountOfKey(table,\
  \ obj);\n        return count;\n\n    case OPERATION_retain:\n        CFBasicHashAddValue(table,\
  \ obj);\n        return obj;\n\n    case OPERATION_release:\n        count = CFBasicHashRemoveValue(table,\
  \ obj);\n        return 0 == count;\n    }\n}\n```\n\n`__CFDoExternRefOperation`\
  \ 函数是一个分发器，它为 `retainCount`、`retain` 或 `release` 调用不同的函数。我们可以推测这些方法的实现如下所示。\n\n\
  ```\n- (NSUInteger) retainCount\n{\n    return (NSUInteger)__CFDoExternRefOperation(OPERATION_retainCount,\
  \ self);\n}\n\n- (id) retain\n{\n    return (id)__CFDoExternRefOperation(OPERATION_retain,\
  \ self);\n}\n\n- (void) release\n{\n    return __CFDoExternRefOperation(OPERATION_release,\
  \ self);\n}\n```\n\n__________\n\n⁶ Apple，“Source Browser”，[`http://www.opensource.apple.com/source/CF/`](http://www.opensource.apple.com/source/CF/)\n\
  \n如上面的 `__CFDoExternRefOperation` 函数所示，Apple 的实现似乎通过一个哈希表（引用计数表）来处理引用计数，如图 1-10\
  \ 所示。\n\n![images](img/9781430241164_Fig01-10.jpg)\n\n**图 1-10**. *使用哈希表管理引用计数*\n\
  \n在 GNUstep 的实现中，引用计数位于每个对象内存块的头部。但在 Apple 的实现中，所有引用计数都存储在哈希表的条目中。尽管 GNUstep 的实现看起来更简单、更快，但\
  \ Apple 的实现也有其优点。\n\n如果将引用计数存储在对象头部（如 GNUstep 的实现），其优点如下：\n\n*   代码量更少。\n*   生命周期管理非常简单，因为引用计数本身的内存区域就包含在对象的内存区域中。\n\
  \n那么，如果像 Apple 那样将引用计数存储在哈希表中，又有哪些优点呢？\n\n*   每个对象没有头部信息，因此无需担心头部区域的对齐问题。\n*   通过遍历哈希表条目，可以访问每个对象的内存块。\n\
  \n后者对于调试尤其有用。当某些对象的内存区域损坏而哈希表仍然存在时，调试器可以访问这些对象的指针（图 1-11）。\n\n![images](img/9781430241164_Fig01-11.jpg)\n\
  \n**图 1-11.** *在引用计数表中查找对象*\n\n此外，为了检测内存泄漏，Instruments 工具会检查哈希表的条目，以确定是否有人拥有每个对象的所有权。\n\
  \n以上就是关于 Apple 实现的介绍。现在我们对 Apple 的实现方式有了更好的理解，还需要学习关于 Objective-C 内存管理的另一个知识点：自动释放池（autorelease）。\n\
  \n### 自动释放池\n\n鉴于其名称，你可能会认为 `autorelease` 类似于 ARC。但事实并非如此。它更像是 C 语言中的“自动变量”。^(7)\n\
  \n让我们先回顾一下 C 语言中的自动变量是什么。然后，我们将查看 GNUstep 的源代码，以了解 `autorelease` 的工作原理，接着再介绍 Apple\
  \ 对 `autorelease` 的实现。\n\n\n\n### 自动变量\n\n*自动变量*是一种词法作用域变量，当执行流程离开其作用域时，会被自动销毁。\n\
  \n```\n{\n    int a;\n}\n```\n\n```\n/*\n   * 由于变量作用域已离开，\n   * 自动变量 'int a' 被销毁，无法再访问。\n\
  \   */\n```\n\n使用 `autorelease`，你可以像操作自动变量一样使用对象，这意味着当执行流程离开代码块时，会自动对该对象调用 `release`\
  \ 方法。你也可以自行控制代码块本身。\n\n__________\n\n⁷ 维基百科，“自动变量”，[`en.wikipedia.org/wiki/Automatic_variable`](http://en.wikipedia.org/wiki/Automatic_variable)\n\
  \n以下步骤和图 1-12 展示了如何使用 `autorelease` 实例方法。\n\n1.  创建一个 `NSAutoreleasePool` 对象。\n\
  2.  对已分配的对象调用 `autorelease`。\n3.  销毁 `NSAutoreleasePool` 对象。\n\n![images](img/9781430241164_Fig01-12.jpg)\n\
  \n**图 1-12.** *NSAutoreleasePool 对象的生命周期*\n\n从创建 `NSAutoreleasePool` 对象到销毁它之间的代码块，等价于\
  \ C 语言中的变量作用域。当 `NSAutoreleasePool` 对象被销毁时，会自动对所有已自动释放的对象调用 `release` 方法。部分示例源代码如下。\n\
  \n```\nNSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];\nid obj = [[NSObject\
  \ alloc] init];\n[obj autorelease];\n[pool drain];\n```\n\n在上述源代码的最后一行，`[pool drain]`\
  \ 将会执行 `[obj release]`。\n\n在 Cocoa 框架中，`NSAutoreleasePool` 对象会在各处被创建、持有或销毁，例如在应用的主循环\
  \ `NSRunLoop` 中（图 1-13）。因此，你通常不需要显式地使用 `NSAutoreleasePool` 对象。\n\n![images](img/9781430241164_Fig01-13.jpg)\n\
  \n**图 1-13.** *在 NSRunLoop 中，每次都会创建和销毁一个 NSAutoreleasePool 对象。*\n\n但是，当自动释放的对象过多时，应用程序的内存会变得紧张（图\
  \ 1-14）。这是因为这些对象会一直存在，直到 `NSAutoreleasePool` 对象被销毁。一个典型的例子是加载并调整大量图片大小。届时，许多自动释放的对象，比如用于读取文件的\
  \ `NSData` 对象、表示数据的 `UImage` 对象以及调整大小后的图片，会同时存在。\n\n```\nfor (int i = 0; i < numberOfImages;\
  \ ++i) {\n    /*\n      * 处理图片，例如加载等。\n      * 由于 NSAutoreleasePool 对象未被销毁，\n  \
  \    * 存在过多自动释放的对象。\n      * 到某个时刻，会导致内存不足。\n      */\n}\n```\n![images](img/9781430241164_Fig01-14.jpg)\n\
  \n**图 1-14.** *自动释放对象数量不断增长*\n\n在这种情况下，你应该在适当的时机自行显式地创建并销毁一个 `NSAutoreleasePool`\
  \ 对象（图 1-15）。\n\n```\nfor (int i = 0; i < numberOfImages; ++i) {\n    NSAutoreleasePool\
  \ *pool = [[NSAutoreleasePool alloc] init];\n\n    /*\n      * 加载图片等。\n      * 存在过多自动释放的对象。\n\
  \      */\n\n    [pool drain];\n\n    /*\n      * 所有自动释放的对象都通过 [pool drain] 被释放。\n\
  \      */\n}\n```\n![images](img/9781430241164_Fig01-15.jpg)\n\n**图 1-15.** *自动释放的对象应被妥善释放。*\n\
  \n在 Cocoa 框架中，你会看到许多类方法会返回自动释放的对象，例如 `NSMutableArray` 类的 `arrayWithCapacity` 方法。\n\
  \n```\nid array = [NSMutableArray arrayWithCapacity:1];\n```\n\n上述源代码等价于：\n\n```\n\
  id array = [[[NSMutableArray alloc] initWithCapacity:1] autorelease];\n```\n\n###\
  \ 实现 autorelease\n\n在本节中，我们将像之前讨论 `alloc`、`retain`、`release` 和 `dealloc` 的实现那样，讨论\
  \ GNUstep 中 `autorelease` 的实现，以深入了解其工作原理。\n\n```\n[obj autorelease];\n```\n\n这行源代码调用了\
  \ `NSObject` 的实例方法 `autorelease`。代码清单 1-9 展示了 `autorelease` 方法的实现。\n\n**代码清单 1-9.**\
  \ *GNUstep/Modules/Core/Base/Source/NSObject.m 中的 autorelease*\n\n```\n- (id) autorelease\n\
  {\n    [NSAutoreleasePool addObject:self];\n}\n```\n\n实际上，`autorelease` 只是调用了 `NSAutoreleasePool`\
  \ 的类方法 `addObject`。在 GNUstep 中，其实现略有不同，但这只是出于优化目的，如下所示。\n\n**关于 Objective-C 方法调用的优化**\n\
  \n在 GNUstep 中，`autorelease` 方法出于优化目的以一种非常规方式实现。由于在 iOS 和 OSX 应用中 `autorelease` 的调用非常频繁，它拥有一种称为\
  \ IMP 缓存的特殊机制。当框架初始化时，它会缓存一些查询结果，例如函数指针以及类和方法的名称解析。如果没有这种机制，每次调用 `autorelease` 时都需要执行这些过程。\n\
  \n```\nid autorelease_class = [NSAutoreleasePool class];\nSEL autorelease_sel =\
  \ @selector(addObject:);\nIMP autorelease_imp = [autorelease_class methodForSelector:\
  \ autorelease_sel];\n```\n\n当方法被调用时，它仅返回一个缓存值。\n\n```\n- (id) autorelease\n{\n \
  \   (*autorelease_imp)(autorelease_class, autorelease_sel, self);\n}\n```\n\n以上是使用\
  \ IMP 缓存的方法调用。如果没有 IMP 缓存，它可以重写为如下形式。尽管速度取决于具体环境，但使用缓存机制大约可以快两倍。\n\n```\n- (id)\
  \ autorelease\n{\n    [NSAutoreleasePool addObject:self];\n}\n```\n\n让我们来看看 `NSAutoreleasePool`\
  \ 类的实现。代码清单 1-10 是 `NSAutoreleasePool` 中简化后的源代码。\n\n**代码清单 1-10.** *GNUstep/Modules/Core/Base/Source/NSAutoreleasePool.m\
  \ 中的 addObject*\n\n```\n+ (void) addObject: (id)anObj\n{\n    NSAutoreleasePool\
  \ *pool = 获取当前活跃的 NSAutoreleasePool;\n    if (pool != nil) {\n        [pool addObject:anObj];\n\
  \    } else {\n        NSLog(@\"在没有活跃的 NSAutoreleasePool 的情况下调用了 autorelease。\"\
  );\n    }\n}\n```\n\n类方法 `addObject` 对活跃的 `NSAutoreleasePool` 对象调用其实例方法 `addObject`。在下一个例子中，变量\
  \ `pool` 就是活跃的 `NSAutoreleasePool` 对象。\n\n```\nNSAutoreleasePool *pool = [[NSAutoreleasePool\
  \ alloc] init];\nid obj = [[NSObject alloc] init];\n[obj autorelease];\n```\n\n\
  当创建了多个嵌套的 `NSAutoreleasePool` 对象时，最内层的对象变为活跃状态。在下一个例子中，`pool2` 是活跃的。\n\n```\nNSAutoreleasePool\
  \ *pool0 = [[NSAutoreleasePool alloc] init];\n\n    NSAutoreleasePool *pool1 = [[NSAutoreleasePool\
  \ alloc] init];\n\n        NSAutoreleasePool *pool2 = [[NSAutoreleasePool alloc]\
  \ init];\n\n        id obj = [[NSObject alloc] init];\n        [obj autorelease];\n\
  \n        [pool2 drain];\n\n    [pool1 drain];\n\n[pool0 drain];\n```\n\n接下来，让我们也看看\
  \ `NSAutoreleasePool` 实例方法 `addObject` 的实现（代码清单 1-11）。\n\n**代码清单 1-11.** *GNUstep/Modules/Core/Base/Source/NSAutoreleasePool.m\
  \ 中的 addObject*\n\n```\n- (void) addObject: (id)anObj\n{\n    [array addObject:anObj];\n\
  }\n```\n\n它将对象添加到一个可变数组中。在原始的 GNUstep 实现中，使用的是链表而非数组。无论如何，对象都被存储在一个容器中，这意味着当调用 `NSObject`\
  \ 的实例方法 `autorelease` 时，该对象会被添加到活跃的 `NSAutoreleasePool` 对象的容器中。\n\n```\n[pool drain];\n\
  ```\n\n接下来，让我们看看当调用 `drain` 时，活跃的 `NSAutoreleasePool` 对象是如何被销毁的（代码清单 1-12）。\n\n\
  **代码清单 1-12.** *GNUstep/Modules/Core/Base/Source/NSAutoreleasePool.m 中的 drain*\n\
  \n```\n- (void) drain\n{\n    [self dealloc];\n}\n\n- (void) dealloc\n{\n    [self\
  \ emptyPool];\n    [array release];\n}\n\n- (void) emptyPool\n{\n    for (id obj\
  \ in array) {\n        [obj release];\n    }\n}\n```\n\n我们可以看到，池中的所有对象都被调用了 `release`\
  \ 方法。\n\n\n\n#### Apple 对 `autorelease` 的实现\n\n我们可以在 `objc4` 库的 `runtime/objc-arr.mm`\
  \ 文件中看到 Apple 对 `autorelease` 的实现。其源码如代码清单 1–13 所示。\n\n**代码清单 1–13.** *`objc4/runtime/objc-arr.mm`\
  \ 中的 `AutoreleasePoolPage` 类*\n\n```\nclass AutoreleasePoolPage\n{\n    static inline\
  \ void *push()\n    {\n        /* 对应 NSAutoreleasePool 对象的创建和所有权获取 */\n    }\n\n\
  \    static inline void pop(void *token)\n    {\n        /* 对应 NSAutoreleasePool\
  \ 对象的释放 */\n        releaseAll();\n    }\n\n    static inline id autorelease(id\
  \ obj)\n    {\n        /* 对应 NSAutoreleasePool 的类方法 addObject: */\n        AutoreleasePoolPage\
  \ *autoreleasePoolPage = /* 获取当前活跃的 AutoreleasePoolPage 对象 */\n        autoreleasePoolPage->add(obj);\n\
  \    }\n\n    id *add(id obj)\n    {\n        /* 将 obj 添加到内部数组; */\n    }\n\n  \
  \  void releaseAll()\n    {\n        /* 对内部数组中所有对象调用 release */\n    }\n};\n\nvoid\
  \ *objc_autoreleasePoolPush(void)\n{\n    return AutoreleasePoolPage::push();\n\
  }\n\nvoid objc_autoreleasePoolPop(void *ctxt)\n{\n    return AutoreleasePoolPage::pop(ctxt);\n\
  }\n\nid objc_autorelease(id obj)\n{\n    return AutoreleasePoolPage::autorelease(obj);\n\
  }\n```\n\n这些函数和 `AutoreleasePoolPage` 类是通过 C++ 类和动态数组实现的。这些函数似乎与 GNUstep 中的实现方式相同。正如我们之前使用调试器所做的那样，我们探究在\
  \ `autorelease` 和 `NSAutoreleasePool` 类方法中调用了哪些函数。这些方法会调用与 `autorelease` 相关的 `objc4`\
  \ 函数：\n\n```\nNSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];\n/* 等同于\
  \ objc_autoreleasePoolPush() */\n\nid obj = [[NSObject alloc] init];\n\n[obj autorelease];\n\
  /* 等同于 objc_autorelease(obj) */\n\n[pool drain];\n/* 等同于 objc_autoreleasePoolPop(pool)\
  \ */\n```\n\n顺便提一下，在 iOS 中，`NSAutoreleasePool` 类有一个方法用来检查已被 `autorelease` 的对象的当前状态。该方法\
  \ `showPools` 会将 `NSAutoreleasePool` 的当前状态输出到控制台。因为它是一个私有方法，所以只能用于调试目的。你可以这样使用它：\n\
  \n```\n[NSAutoreleasePool showPools];\n```\n\n在最新的 Objective-C 运行时环境中，由于 `showPools`\
  \ 方法只能在 iOS 中工作，因此提供了 `_objc_autoreleasePoolPrint()` 方法来替代它。该方法也是一个私有方法，因此你也只能将其用于调试目的。\n\
  \n```\n/* 声明函数 */\nextern void _objc_autoreleasePoolPrint();\n\n/* 用于调试：显示 autoreleasepool\
  \ 状态 */\n_objc_autoreleasePoolPrint();\n```\n\n然后你就可以看到 `AutoreleasePoolPage` 的状态。结果如下所示：\n\
  \n```\nobjc[14481]: ##############\nobjc[14481]: AUTORELEASE POOLS for thread 0xad0892c0\n\
  objc[14481]: 14 releases pending.\nobjc[14481]: [0x6a85000]  ................  PAGE\
  \  (hot) (cold)\nobjc[14481]: [0x6a85028]  ################  POOL 0x6a85028\nobjc[14481]:\
  \ [0x6a8502c]         0x6719e40  __NSCFString\nobjc[14481]: [0x6a85030]  ################\
  \  POOL 0x6a85030\nobjc[14481]: [0x6a85034]         0x7608100  __NSArrayI\nobjc[14481]:\
  \ [0x6a85038]         0x7609a60  __NSCFData\nobjc[14481]: [0x6a8503c]  ################\
  \  POOL 0x6a8503c\nobjc[14481]: [0x6a85040]         0x8808df0  __NSCFDictionary\n\
  objc[14481]: [0x6a85044]         0x760ab50  NSConcreteValue\nobjc[14481]: [0x6a85048]\
  \         0x760afe0  NSConcreteValue\nobjc[14481]: [0x6a8504c]         0x760b280\
  \  NSConcreteValue\nobjc[14481]: [0x6a85050]         0x760b2f0  __NSCFNumber\nobjc[14481]:\
  \ [0x6a851a8]  ################  POOL 0x6a851a8\nobjc[14481]: [0x6a851ac]      \
  \   0x741d1e0  Test\nobjc[14481]: [0x6a851b0]         0x671c660  NSObject\nobjc[14481]:\
  \ ##############\n```\n\n了解某些对象是否已被 `autorelease` 是非常有用的，如下面的侧边栏所述。\n\n**将 AUTORELEASE\
  \ 发送给 NSAUTORELEASEPOOL 对象**\n\n问题：如果对 `NSAutoreleasePool` 对象调用 `autorelease` 会发生什么？\n\
  \n```\nNSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];\n[pool autorelease];\n\
  ```\n\n答案：应用程序将会被终止。\n\n```\n*** Terminating app due to uncaught exception 'NSInvalidArgumentException'\n\
  reason: '*** -[NSAutoreleasePool autorelease]:\nCannot autorelease an autorelease\
  \ pool'\n```\n\n当在 Foundation 框架中使用 Objective-C 调用 `autorelease` 时，绝大多数情况下会调用 `NSObject`\
  \ 的实例方法。然而，`NSAutoreleasePool` 类重写了 `autorelease` 方法，以便在自动释放池对象上调用 `autorelease`\
  \ 时显示一个错误。\n\n### 小结\n\n在本章中，你已经学习了以下内容。\n\n*   引用计数内存管理的概念\n*   `alloc`、`retain`、`release`\
  \ 和 `dealloc` 方法是如何实现的\n*   `autorelease` 的机制及其实现\n\n这些内容非常重要，即使引入了 ARC，它们仍然适用。在下一章中，我们将学习情况将发生怎样的变化。\n\
  \n## 第 2 章\n\n## ARC 规则\n\n在上一章中，我们回顾了非 ARC 环境中 Objective-C 的内存管理。但是当启用 ARC 时会发生什么呢？本章探讨了采用\
  \ ARC 时所引发的变化。在第 1 章中简要介绍了自动引用计数，但苹果公司自己的表述最能概括其精髓：\n\n> *Objective-C 中的自动引用计数（ARC）将内存管理变成了编译器的工作。通过启用新的\
  \ Apple LLVM 编译器中的 ARC，你将永远不需要再输入 `retain` 或 `release`，从而极大地简化了开发过程，同时减少了崩溃和内存泄漏。编译器能够完全理解你的对象，并在每个对象不再被使用时立即释放它，因此应用程序能以一如既往的速度运行，并具有可预测且流畅的性能表现。^(1)*\n\
  \n首先，我们将展示引用计数规则与 ARC 的关系，同时我们将逐一学习 ARC 新引入的所有权修饰符。此外，ARC 还为我们带来了新的属性。最重要的是，我们将学习使你的代码符合\
  \ ARC 规范的规则：只需遵循这些规则，你就能有信心地编写 ARC 代码。\n\n## 概述\n\n实际上，引用计数仍然是 ARC 的基础，但是当你遵循本章中解释的规则时，ARC\
  \ 会帮助引用计数机制自动运行。\n\n事实上，我们可以为每个可编译单元启用或禁用 ARC。例如，如图图 2–1 所示，我们可以为每个源文件启用或禁用 ARC。\n\
  \n__________\n\n¹ Apple, “iOS 5 for developers,” [`http://developer.apple.com/technologies/ios5/`](http://developer.apple.com/technologies/ios5/)\n\
  \n![images](img/9781430241164_Fig02-01.jpg)\n\n**图 2–1.** *在一个应用程序中针对每个源文件启用或禁用\
  \ ARC*\n\n总而言之，ARC 最重要的部分在于，作为开发者的你不再需要调用 `retain` 或 `release`。在以下条件下，你的源代码将会在启用\
  \ ARC 的情况下自动编译：\n\n*   `clang` (LLVM 编译器) 3.0 及更新版本\n*   编译选项 `-fobjc-arc`\n\nClang\
  \ 是默认的编译器，并且在 Xcode 4.2 中 `-fobjc-arc` 选项被设置为默认选项。因此，当你在 Xcode 4.2 中工作时，不需要做任何特殊操作。\n\
  \n从现在开始，所有的源代码都适用于启用了 ARC 的环境。如果源代码是用于非 ARC 环境的，我们将添加注释 `/* non-ARC */`。在下一节中，我们将展示当启用\
  \ ARC 时，引用计数机制是如何改变的。\n\n\n\n## 引用计数机制的变更\n\n如前所述，引用计数规则如下：\n\n-   你对你创建的任何对象拥有所有权。\n\
  -   你可以使用 `retain` 获取一个对象的所有权。\n-   当你不再需要某个对象时，必须放弃你对其拥有的所有权。\n-   你绝不能放弃你不拥有所有权的某个对象。\n\
  \n即便在启用 ARC 的情况下，这些规则仍然适用。但你需要对源代码进行一些修改。为此，你首先需要理解 ARC 中新增的所有权修饰符。\n\n## 所有权修饰符\n\
  \n在 Objective-C 中，`id` 或每个对象类型都用于表示对象变量类型。\n\n对象类型是 Objective-C 类的指针类型，例如 `NSObject\
  \ *`。`id` 类型用于隐藏其类名。`id` 等价于 C 语言中的 `void*`。\n\n使用 ARC 时，`id` 和对象类型变量必须具有以下四个所有权修饰符之一：\n\
  \n-   `__strong`\n-   `__weak`\n-   `__unsafe_unretained`\n-   `__autoreleasing`\n\
  \n你需要决定源代码中所有 `id` 和对象类型变量使用哪个所有权修饰符。在本章中，我将逐一解释应如何选择每个修饰符。\n\n### `__strong` 所有权修饰符\n\
  \n`__strong` 所有权修饰符是 `id` 和对象类型的默认修饰符。这意味着以下源代码中的变量 `obj` 被隐式地修饰为 `__strong`。\n\n\
  ```\nid obj = [[NSObject alloc] init];\n```\n\n在没有显式修饰的情况下，`id` 或对象被视为 `__strong`。上述代码等同于：\n\
  \n```\nid __strong obj = [[NSObject alloc] init];\n```\n\n以下是非 ARC 环境下的相同源代码：\n\n\
  ```\n/* non-ARC */\nid obj = [[NSObject alloc] init];\n```\n\n到目前为止，两者没有区别。让我们看下一个例子：\n\
  \n```\n{\n    id __strong obj = [[NSObject alloc] init];\n}\n```\n\n这里有意添加了局部变量的作用域。该源代码的非\
  \ ARC 版本是：\n\n```\n/* non-ARC */\n{\n    id obj = [[NSObject alloc] init];\n   \
  \ [obj release];\n}\n```\n\n这意味着在 ARC 环境下，`release` 方法会被自动添加，用于释放创建的对象及其所有权。当控制流离开变量\
  \ `obj` 的作用域时，由于变量 `obj` 被 `__strong` 修饰，`release` 方法会被调用。\n\n顾名思义，`__strong` 这个所有权修饰符表示对对象的强引用。当控制流离开变量作用域时，强引用消失，所分配的对象被释放。让我们在源代码中找出所有权状态：\n\
  \n```\n{\n    id __strong obj = [[NSObject alloc] init];\n}\n```\n\n这段代码创建了一个对象并拥有其所有权。我们在所有权状态上添加注释：\n\
  \n```\n{\n     /*\n      * 你创建了一个对象并拥有所有权。\n      */\n\n    id __strong obj = [[NSObject\
  \ alloc] init];\n\n      /*\n       * 变量 obj 被 __strong 修饰。\n       * 这意味着它拥有该对象的所有权。\n\
  \       */\n\n}\n\n  /*\n   * 离开变量 obj 的作用域，其强引用消失。\n   * 该对象被自动释放。\n   * 因为没有人拥有所有权，所以该对象被销毁。\n\
  \   */\n```\n\n#### 赋值给 `__strong` 修饰的变量\n\n对象的所有权和生命周期非常清晰。接下来，我们看看当你并非自己创建或尚未拥有所有权时获取一个对象会发生什么：\n\
  \n```\n{\n    id __strong obj = [NSMutableArray array];\n}\n```\n\n它调用了 `NSMutableArray`\
  \ 的类方法 `array` 来获取一个对象，但并不是自己创建或拥有其所有权。\n\n```\n{\n     /*\n      * 获取一个对象，并非自己创建或拥有所有权\n\
  \      */\n\n    id __strong obj = [NSMutableArray array];\n\n     /*\n      * 变量\
  \ obj 被 __strong 修饰。\n      * 这意味着它拥有该对象的所有权。\n      */\n\n}\n /*\n  * 离开变量 obj\
  \ 的作用域，其强引用消失。\n  * 该对象被自动释放。\n  */\n```\n\n在这种情况下，对象的所有权和生命周期也非常清晰。当然，你可以在 `__strong`\
  \ 修饰的变量之间交换值，如下所示：\n\n```\nid __strong obj0 = [[NSObject alloc] init];\nid __strong\
  \ obj1 = [[NSObject alloc] init];\nid __strong obj2 = nil;\nobj0 = obj1;\nobj2 =\
  \ obj0;\nobj1 = nil;\n\nobj0 = nil;\nobj2 = nil;\n```\n\n\n\n#### 强引用的工作原理\n\n我们通过带注释的示例来理解强引用的工作原理，如代码清单\
  \ 2-1 所示。\n\n**代码清单 2-1.** *强引用的工作原理*\n\n```\nid __strong obj0 = [[NSObject alloc]\
  \ init];  /* 对象 A */\n/*\n * obj0 持有对对象 A 的强引用\n */\n\nid __strong obj1 = [[NSObject\
  \ alloc] init];  /* 对象 B */\n/*\n * obj1 持有对对象 B 的强引用\n */\n\nid __strong obj2 =\
  \ nil;\n/*\n * obj2 不持有任何引用\n */\n\nobj0 = obj1;\n/*\n * obj0 持有对对象 B 的强引用，该引用是从\
  \ obj1 赋值而来的。\n * 因此，obj0 不再持有对对象 A 的强引用。\n * 由于没有任何对象拥有对象 A 的所有权，对象 A 被销毁。\n *\n\
  \ * 此时，obj0 和 obj1 都持有对对象 B 的强引用。\n */\n\nobj2 = obj0;\n/*\n * 通过 obj0，obj2 持有对对象\
  \ B 的强引用。\n *\n * 此时，obj0、obj1 和 obj2 都持有对对象 B 的强引用。\n */\n\nobj1 = nil;\n/*\n *\
  \ 由于 nil 被赋值给 obj1，对对象 B 的强引用消失。\n *\n * 此时，obj0 和 obj2 持有对对象 B 的强引用。\n */\n\nobj0\
  \ = nil;\n/*\n * 由于 nil 被赋值给 obj0，对对象 B 的强引用消失。\n *\n * 此时，obj2 持有对对象 B 的强引用。\n\
  \ */\n\nobj2 = nil;\n/*\n * 由于 nil 被赋值给 obj2，对对象 B 的强引用消失。\n * 由于没有任何对象拥有对象 B 的所有权，对象\
  \ B 被销毁。\n */\n```\n\n如示例（代码清单 2-1）所示，所有权不仅通过变量作用域来妥善管理，还通过变量之间的赋值来管理，这些变量都使用 `__strong`\
  \ 修饰。当然，`__strong` 修饰符也可以用作 Objective-C 类的成员变量或方法的任意参数，如代码清单 2-2 所示。\n\n**代码清单 2-2.**\
  \ *成员变量和方法参数的强引用修饰符*\n\n```\n@interface Test : NSObject\n{\n    id __strong obj_;\n\
  }\n- (void)setObject:(id __strong)obj;\n@end\n\n@implementation Test\n- (id)init\n\
  {\n    self = [super init];\n    return self;\n}\n\n- (void)setObject:(id __strong)obj\n\
  {\n    obj_ = obj;\n}\n@end\n```\n\n让我们看看如何使用这个类。\n\n```\n{\n    id __strong test\
  \ = [[Test alloc] init];\n    [test setObject:[[NSObject alloc] init]];\n}\n```\n\
  \n像往常一样，我们逐行分析并添加一些注释（代码清单 2-3）。\n\n**代码清单 2-3.** *带注释的成员变量和方法参数的强引用修饰符*\n\n```\n\
  {\n    id __strong test = [[Test alloc] init];\n\n/*\n * test 持有对 Test 对象的强引用\n\
  \ */\n\n[test setObject:[[NSObject alloc] init]];\n\n /*\n * 对象的成员变量 obj_\n * 持有对\
  \ NSObject 实例的强引用\n */\n\n}\n /*\n * 离开变量 test 的作用域后，其强引用消失。\n * Test 对象被释放。\n *\
  \ 由于没有任何对象拥有其所有权，它被销毁。\n *\n * 当它被销毁时，\n * 其成员变量 obj_ 所持有的强引用也一并消失。\n * NSObject\
  \ 对象被释放。\n * 同样因为没有对象拥有其所有权，它被销毁。\n */\n```\n\n如上例所示，在类成员和方法参数中使用 `__strong` 所有权修饰符非常方便。在后面的章节中，我将解释如何将其用于类属性。\n\
  \n顺便提一下，所有使用 `__strong`、`__weak` 和 `__autoreleasing` 修饰的变量，都会被初始化为 `nil`。我们通过一个示例来看一下。\n\
  \n```\nid __strong obj0;\nid __weak obj1;\nid __autoreleasing obj2;\n```\n\n上述源代码等价于以下代码。\n\
  \n```\nid __strong obj0 = nil;\nid __weak obj1 = nil;\nid __autoreleasing obj2 =\
  \ nil;\n```\n\n正如我们之前所见，Apple 表示你不再需要手动输入 `retain` 或 `release`。请注意，以下关于引用计数的规则仍然适用。\n\
  \n* 你拥有你创建的任何对象的所有权。\n* 你可以通过 `retain` 获取对象的所有权。\n* 当你不再需要某个对象时，你必须放弃你拥有的该对象的所有权。\n\
  * 你绝不能放弃你不拥有所有权的对象的所有权。\n\n前两条规则通过将值赋给 `__strong` 变量来实现。第三条规则通过离开变量作用域、给变量赋值或丢弃包含成员变量的对象来自动实现。最后一条规则非常明确，因为从来不需要手动输入\
  \ `release`。因此，所有规则仍然得到满足。\n\n你甚至不需要输入 `__strong`，因为它对于 `id` 和对象类型来说是默认的。只需启用 ARC，这些规则就会自动得到满足。\n\
  \n## `__weak` 所有权修饰符\n\n似乎编译器仅使用 `__strong` 所有权修饰符就能执行内存管理。遗憾的是，情况并非如此，因为有一个大问题无法解决：循环引用\
  \ [图 2-2]。以下描述了循环引用是如何发生的。\n\n![图片](img/9781430241164_Fig02-02.jpg)\n\n**图 2-2.**\
  \ *循环引用*\n\n\n\n#### 循环引用\n\n本节中的示例展示了循环引用是如何发生的。例如，当一个类的成员变量持有对某个对象的引用时，就会发生这种情况。假设我们有一个如代码清单\
  \ 2–4 所示的类。\n\n**代码清单 2–4.** *一个可能导致循环引用的类*\n\n```\n@interface Test : NSObject\n\
  {\n    id __strong obj_;\n}\n- (void)setObject:(id __strong)obj;\n@end\n\n@implementation\
  \ Test\n- (id)init\n{\n    self = [super init];\n    return self;\n}\n\n- (void)setObject:(id\
  \ __strong)obj\n{\n    obj_ = obj;\n}\n@end\n```\n\n我们可以很容易地用这个类产生一个循环引用问题，如代码清单\
  \ 2–5 所示。\n\n**代码清单 2–5.** *产生循环引用*\n\n```\n{\n    id test0 = [[Test alloc] init];\n\
  \n    id test1 = [[Test alloc] init];\n    [test0 setObject:test1];\n    [test1\
  \ setObject:test0];\n}\n```\n\n添加一些注释可以让我们更清晰地分析这个例子（代码清单 2–6）。\n\n**代码清单 2–6.**\
  \ *带注释的产生循环引用的代码*\n\n```\n{\n    id test0 = [[Test alloc] init]; /* 对象 A */\n\n\
  \     /*\n      * test0 持有对象 A 的强引用\n      */\n\n    id test1 = [[Test alloc] init];\
  \ /* 对象 B */\n\n     /*\n      * test1 持有对象 B 的强引用\n      */\n\n    [test0 setObject:test1];\n\
  \n     /*\n      * 对象 A 的成员变量 obj_ 持有对象 B 的强引用。\n      *\n      * 此时，对象 A 的 obj_\
  \ 和 test1 都持有对象 B 的强引用。\n     */\n\n    [test1 setObject:test0];\n\n     /*\n  \
  \    * 对象 B 的成员变量 obj_ 持有对象 A 的强引用。\n      *\n      * 此时，对象 B 的 obj_ 和 test0 都持有对象\
  \ A 的强引用。\n      */\n\n}\n /*\n  * 离开变量 test0 的作用域，它的强引用消失。\n  * 对象 A 被自动释放。\n \
  \ *\n  * 离开变量 test1 的作用域，它的强引用消失。\n  * 对象 B 被自动释放。\n  *\n  * 此时，对象 B 的 obj_ 仍然持有对象\
  \ A 的强引用。\n  *\n  * 此时，对象 A 的 obj_ 仍然持有对象 B 的强引用。\n  *\n  * 内存泄漏！！\n  */\n```\n\n\
  图 2–3 说明了这种情况。\n\n![images](img/9781430241164_Fig02-03.jpg)\n\n**图 2–3.** *带有类成员变量的循环引用*\n\
  \n循环引用经常导致内存泄漏。内存泄漏意味着一些对象在被认为应该被丢弃后，仍然保留在内存中。\n\n在这个例子中，当控制流离开 `test0` 和 `test1`\
  \ 的变量作用域时，对象 A 和对象 B 本应被丢弃。此时，它们应该被释放，因为没有人再持有指向这些对象的入口点。但由于循环引用，它们仍然保留在内存中。\n\n\
  #### 自引用\n\n下一个例子展示了即使是一个对象，通过引用自身，也可能产生循环引用。这有时被称为“自引用”，如图 2–4 所示。\n\n```\nid test\
  \ = [[Test alloc] init];\n[test setObject:test];\n```\n\n![images](img/9781430241164_Fig02-04.jpg)\n\
  \n**图 2–4.** *自引用*\n\n如何避免这种情况？既然我们有了 `__strong` 所有权修饰符，你可能已经注意到还有一个 `__weak` 所有权修饰符。通过使用\
  \ `__weak` 所有权修饰符，我们可以避免循环引用，如图 2–5 所示。\n\n`__weak` 所有权修饰符提供弱引用。弱引用不拥有对象的所有权。让我们看下一个例子。\n\
  \n```\nid __weak obj = [[NSObject alloc] init];\n```\n\n变量 `obj` 被 `__weak` 修饰。当编译源代码时，编译器会显示一条警告消息。\n\
  \n```\nwarning: assigning retained obj to weak variable; obj will be\n         \
  \ released after assignment [-Warc-unsafe-retained-assign]\n            id __weak\
  \ obj = [[NSObject alloc] init];\n                      ^     ~~~~~~~~~~~~~~~~~~~~~~~\n\
  ```\n\n在这个例子中，创建的对象被赋值给一个用 `__weak` 修饰的变量 `obj`。因此，变量 `obj` 持有对该对象的弱引用，这意味着该变量不拥有所有权。由于没有人能获得这个创建对象的所有权，该对象在创建后就会被立即释放。编译器会针对这种情况给出警告。如果你先将对象赋值给一个\
  \ `__strong` 变量，警告就会消失，如下所示。\n\n```\n{\n    id __strong obj0 = [[NSObject alloc]\
  \ init];\n    id __weak obj1 = obj0;\n}\n```\n\n让我们看看带有所有权状态注释的源代码。\n\n```\n{\n\
  \     /*\n      * 你创建了一个对象并拥有它的所有权。\n      */\n\n    id __strong obj0 = [[NSObject\
  \ alloc] init];\n\n     /*\n      * 变量 obj0 由 __strong 修饰。\n      * 这意味着它拥有该对象的所有权。\n\
  \      */\n\n    id __weak obj1 = obj0;\n\n     /*\n      * 变量 obj1 持有该创建对象的弱引用。\n\
  \      */\n\n}\n /*\n  * 离开变量 obj0 的作用域，它的强引用消失。\n  * 该对象被自动释放。\n  * 因为没有人拥有所有权，该对象被丢弃。\n\
  \  */\n```\n\n因为 `__weak` 引用不拥有所有权，所以当控制流离开变量作用域时，该对象就会被释放。现在我们知道了应该使用 `__weak`\
  \ 所有权修饰符来避免循环引用。我们可以将前面的例子重写如下。\n\n```\n@interface Test : NSObject\n{\n    id __weak\
  \ obj_;\n}\n- (void)setObject:(id __strong)obj;\n@end\n```\n\n![images](img/9781430241164_Fig02-05.jpg)\n\
  \n**图 2–5.** *使用 __weak 所有权修饰符避免循环引用*\n\n#### 弱引用自动失效\n\n并且，关于 `__weak` 所有权修饰符，还有一件事你应该知道。当一个变量引用了一个对象，而该对象被丢弃时，弱引用也会自动失效，这意味着该变量会被赋值为\
  \ `nil`。让我们通过一个例子来验证（代码清单 2–7）。  \n\n**代码清单 2–7.** *弱引用自动失效*\n\n```\nid __weak obj1\
  \ = nil;\n{\n    id __strong obj0 = [[NSObject alloc] init];\n\n    obj1 = obj0;\n\
  \n    NSLog(@\"A: %@\", obj1);\n}\n\nNSLog(@\"B: %@\", obj1);\n```\n\n输出结果是：\n\n\
  ```\nA: <NSObject: 0x753e180>\nB: (null)\n```\n\n让我们再次查看带有所有权状态注释的源代码（代码清单 2–8）。\n\
  \n**代码清单 2–8.** *带注释的弱引用自动失效代码*\n\n```\nid __weak obj1 = nil;\n\n{\n     /*\n  \
  \    * 你创建了一个对象并拥有它的所有权。\n      */\n\n    id __strong obj0 = [[NSObject alloc] init];\n\
  \n     /*\n      * 变量 obj0 由 __strong 修饰。\n      * 这意味着它拥有该对象的所有权。\n      */\n\n\
  \    obj1 = obj0;\n\n     /*\n      * 变量 obj1 持有该对象的弱引用。\n      */\n\n    NSLog(@\"\
  A: %@\", obj0);\n\n     /*\n      * 显示变量 obj0 持有强引用的那个对象。\n      */\n\n}\n /*\n\
  \  * 离开变量 obj0 的作用域，它的强引用消失。\n  * 该对象被释放。\n  * 由于没有人拥有所有权，它被丢弃。\n  *\n  * 当它被丢弃时，\n\
  \  * 弱引用被销毁，并且 nil 被赋值给 obj1。\n  */\n\nNSLog(@\"B: %@\", obj1);\n\n /*\n  * 显示 obj1\
  \ 的值，即 nil。\n  */\n```\n\n使用 `__weak` 所有权修饰符，我们可以避免循环引用。同时，通过检查 `__weak` 变量是否为 `nil`，我们可以知道对象是仍然存在还是已经被丢弃。\n\
  \n不幸的是，`__weak` 所有权修饰符仅适用于目标为 iOS5（或更高版本）或 OSX Lion（或更高版本）的应用程序。对于目标为更旧环境的应用程序，必须使用\
  \ `__unsafe_unretained` 替代。\n\n\n\n## `__unsafe_unretained` 所有权修饰符\n\n顾名思义，`__unsafe_unretained`\
  \ 所有权修饰符是绝对不安全的。通常，由于 ARC 的存在，编译器会执行内存管理。但任何使用 `__unsafe_unretained` 修饰的变量都被排除在此机制之外。因此，你需要手动管理这些变量。\n\
  \n```\nid __unsafe_unretained obj = [[NSObject alloc] init];\n```\n\n这段代码将一个对象赋值给了一个用\
  \ `__unsafe_unretained` 修饰的变量。编译器会显示以下警告信息。\n\n```\nwarning: assigning retained\
  \ obj to unsafe_unretained variable;\n          obj will be released after assignment\
  \ [-Warc-unsafe-retained-assign]\n        id __unsafe_unretained obj = [[NSObject\
  \ alloc] init];\n                                                      ^     ~~~~~~~~~~~~~~~~~~~~~~~\n\
  ```\n\n与 `__weak` 一样，`__unsafe_unretained` 变量不拥有对象的所有权。在上述示例中，对象在创建后立即被释放。看起来 `__unsafe_unretained`\
  \ 和 `__weak` 修饰符的作用似乎相同。你将在下文（清单 2–9）中看到 `__unsafe_unretained` 与 `__weak` 的区别。\n\
  \n**清单 2–9.** `__unsafe_unretained` 修饰符\n\n```\nid __unsafe_unretained obj1 = nil;\n\
  \n{\n    id __strong obj0 = [[NSObject alloc] init];\n\n    obj1 = obj0;\n\n   \
  \ NSLog(@\"A: %@\", obj1);\n}\n\nNSLog(@\"B: %@\", obj1);\n```\n\n输出结果为：\n\n```\n\
  A: <NSObject: 0x753e180>\nB: <NSObject: 0x753e180>\n```\n\n像往常一样，我们通过添加注释来重新查看这段源代码（清单\
  \ 2–10）。\n\n**清单 2–10.** 带注释的 `__unsafe_unretained` 修饰符\n\n```\nid __unsafe_unretained\
  \ obj1 = nil;\n\n{\n     /*\n      * 你创建了一个对象，并拥有其所有权。\n      */\n\n    id __strong\
  \ obj0 = [[NSObject alloc] init];\n\n     /*\n      * 变量 obj0 使用 __strong 修饰。\n\
  \      * 这意味着它拥有该对象的所有权。\n      */\n\n    obj1 = obj0;\n\n     /*\n      * 变量 obj1\
  \ 从变量 obj0 赋值，\n      * obj1 既没有强引用也没有弱引用。\n      */\n\n    NSLog(@\"A: %@\", obj1);\n\
  \n     /*\n      * 显示 obj1 的值\n      */\n\n}\n /*\n  * 离开变量 obj0 的作用域后，它的强引用消失。\n\
  \  * 对象被自动释放。\n  * 由于没有人拥有所有权，该对象被丢弃。\n  */\n\nNSLog(@\"B: %@\", obj1);\n\n /*\n\
  \  * 显示 obj1 的值\n  *\n  * obj1 所引用的对象已被丢弃。\n  * 这被称为悬垂指针。\n  * 非法访问！！\n  */\n```\n\
  \n虽然最后的 `NSLog` 看起来没问题，但这只是巧合。应用程序可能会在某些条件下崩溃。要将对象赋值给使用 `__unsafe_unretained` 修饰的变量，你必须确保该对象存在，并且已被赋值给某些使用\
  \ `__strong` 修饰的变量。我建议你重新考虑需要使用 `__unsafe_unretained` 的原因。你需要完全理解为什么需要它；例如，可能是由于应用程序需要支持\
  \ iOS4 或 OS X Snow Leopard，因此你需要用它来代替 `__weak`。此外，你必须确保被赋值的对象在变量的生命周期内始终存在。如果做不到，应用程序将会崩溃，也就没有人会使用你的应用程序了。\n\
  \n## `__autoreleasing` 所有权修饰符\n\n让我们看看 ARC 环境下自动释放是否有什么变化。简单来说，你不能再使用 `autorelease`\
  \ 方法，也不能再使用 `NSAutoreleasePool` 类。我稍后会结合一些规则来解释。尽管不能直接使用 `autorelease`，但自动释放的机制仍然存在。在没有\
  \ ARC 的情况下，我们曾这样使用 `autorelease`：\n\n```\n/* 非 ARC 环境 */\n\nNSAutoreleasePool *pool\
  \ = [[NSAutoreleasePool alloc] init];\n\nid obj = [[NSObject alloc] init];\n\n[obj\
  \ autorelease];\n\n[pool drain];\n```\n\n这段代码可以重写为 ARC 启用环境下的形式：\n\n```\n@autoreleasepool\
  \ {\n\n    id __autoreleasing obj = [[NSObject alloc] init];\n\n}\n```\n\n你无需再创建、持有和销毁\
  \ `NSAutoreleasePool` 类对象，而是需要将代码包围在 `@autoreleasepool` 块中。无需再调用 `autorelease` 方法，而是需要将对象赋值给使用\
  \ `__autoreleasing` 修饰的变量。将对象赋值给 `__autoreleasing` 修饰的变量，等同于在非 ARC 环境下调用 `autorelease`。通过这样做，该对象会被注册到自动释放池中。因此，在启用\
  \ ARC 的情况下，你只需使用 `@autoreleasepool` 代替 `NSAutoreleasePool` 类，并使用 `__autoreleasing`\
  \ 修饰的变量代替 `autorelease` 方法，如图 2–6 所示。\n\n![images](img/9781430241164_Fig02-06.jpg)\n\
  \n**图 2–6.** `@autoreleasepool` 与使用 `__autoreleasing` 修饰符的变量\n\n但实际上，很少需要显式地写出 `__autoreleasing`。接下来我们看看为什么不需要经常使用\
  \ `__autoreleasing`。\n\n\n\n#### 编译器自动处理 `__autoreleasing`\n\n要获取一个非自己创建的对象，你需要使用不属于\
  \ `alloc`/`new`/`copy`/`mutableCopy` 方法组的方法。这种情况下，该对象会被自动注册到 `autoreleasepool` 中。这与获取一个自动释放的对象是相同的。当一个对象从方法返回时，编译器会检查方法名是否以\
  \ `alloc`/`new`/`copy`/`mutableCopy` 开头，如果不是，则返回的对象会自动注册到自动释放池中。有一个例外：任何以 `init`\
  \ 开头的方法，不会将返回值注册到 `autoreleasepool`。请参见下方关于这条新规则的更多说明：必须遵循与对象创建相关的方法命名规则。\n\n```\n\
  @autoreleasepool {\n    id __strong obj = [NSMutableArray array];\n}\n```\n\n让我们看看带有所有权状态注释的源代码。\n\
  \n```\n@autoreleasepool {\n     /*\n      * 获取一个非自己创建的对象，且你不拥有所有权\n      */\n\n\
  \    id __strong obj = [NSMutableArray array];\n\n     /*\n      * 变量 obj 用 __strong\
  \ 修饰。\n      * 这意味着它拥有该对象的所有权。\n      * 而该对象已被注册到 autoreleasepool 中，\n      * 因为编译器通过检查方法名做出了这一决定。\n\
  \      */\n\n}\n     /*\n      * 离开变量 obj 的作用域后，其强引用消失。\n      * 该对象被自动释放。\n   \
  \   *\n      * 离开 @autoreleasepool 块后，\n      * 所有注册在 autoreleasepool 中的对象都会被自动释放。\n\
  \      *\n      * 由于无人拥有所有权，该对象被销毁。\n      */\n```\n\n如示例所示，即使没有 `__autoreleasing`\
  \ 修饰符，对象也会被注册到 `autoreleasepool` 中。接下来，让我们看看上述示例中用于获取非自己创建对象的方法的示例实现。\n\n```\n+\
  \ (id) array\n{\n    return [[NSMutableArray alloc] init];\n}\n```\n\n这段代码也没有使用\
  \ `__autoreleasing` 修饰符。它也可以写成如下形式。\n\n```\n+ (id) array\n{\n\n    id obj = [[NSMutableArray\
  \ alloc] init];\n\n    return obj;\n\n}\n```\n\n“`id obj`” 没有修饰符，因此它默认用 `__strong`\
  \ 修饰。当执行 `return` 语句时，变量作用域结束，强引用消失，因此该对象会被自动释放。在此之前，如果编译器检测到该对象会被传递给调用方，则该对象会被注册到\
  \ `autoreleasepool` 中。\n\n下一个示例是关于 `__weak` 所有权修饰符的。如你所知，`__weak` 所有权修饰符用于避免循环引用。当使用带有\
  \ `__weak` 修饰符的变量时，该对象总是会被注册到 `autoreleasepool` 中。\n\n```\nid __weak obj1 = obj0;\n\
  NSLog(@\"class=%@\", [obj1 class]);\n```\n\n上述源代码等价于：\n\n```\nid __weak obj1 = obj0;\n\
  id __autoreleasing tmp = obj1;\nNSLog(@\"class=%@\", [tmp class]);\n```\n\n为什么为了通过\
  \ `__weak` 修饰的变量使用对象，需要将其注册到 `autoreleasepool` 中？因为用 `__weak` 修饰的变量没有强引用，对象随时可能被销毁。如果对象被注册到\
  \ `autoreleasepool` 中，那么在离开 `@autoreleasepool` 块之前，该对象必然存在。因此，为了安全地通过 `__weak` 变量使用对象，该对象会被自动注册到\
  \ `autoreleasepool` 中。\n\n让我们再看最后一个关于隐式 `__autoreleasing` 的示例。如前所述，“`id obj`” 等同于\
  \ “`id __strong obj`”。\n\n那么 “`id *obj`” 呢？它等同于 “`id __strong *obj`” 吗？\n\n答案是 “`id\
  \ __autoreleasing *obj`”。\n\n并且，“`NSObject **obj`” 等同于 “`NSObject * __autoreleasing\
  \ *obj`”。\n\n任何指向 `id` 或对象类型的指针默认都用 `__autoreleasing` 修饰。\n\n有时，方法会通过 `NSError`\
  \ 对象的指针类型参数（而非其返回值）来传递错误信息。Cocoa 框架在许多方法中都使用了这种技术，例如 `NSString` 的类方法 `stringWithContentsOfFile:encoding:error`。其用法类似于：\n\
  \n```\nNSError *error = nil;\nBOOL result = [obj performOperationWithError:&error];\n\
  ```\n\n该方法的声明是：\n\n```\n- (BOOL) performOperationWithError:(NSError **)error;\n\
  ```\n\n由于指向 `id` 或对象类型的指针默认用 `__autoreleasing` 修饰，因此这个声明等价于：\n\n```\n- (BOOL) performOperationWithError:(NSError\
  \ * __autoreleasing *)error;\n```\n\n\n\n#### 将结果作为参数返回\n\n以 `NSError` 指针作为参数的方法需要根据结果自行创建\
  \ `NSError` 对象。调用者将通过参数获取该对象，这意味着调用者并非通过 alloc/new/copy/mutableCopy 方法组获取它。为遵循内存管理规则，当你并非通过\
  \ `alloc`/`new`/`copy`/`mutableCopy` 方法组获取对象时，该对象必须以无所有权的方式传递。通过 `__autoreleasing`\
  \ 所有权修饰符，这一规则得以满足。\n\n例如，`performOperationWithError` 的实现如下所示。\n\n```\n- (BOOL) performOperationWithError:(NSError\
  \ * __autoreleasing *)error\n{\n    /* 发生错误。设置 errorCode */\n\n    return NO;\n\
  }\n```\n\n通过赋值给 `*error`（其类型为 `NSError * __autoreleasing *`），一个对象可以在注册到自动释放池后传递给其调用者。\n\
  \n以下源代码会导致编译错误。\n\n```\nNSError *error = nil;\nNSError **pError = &error;\n```\n\
  \n要赋值对象指针，两个所有权修饰符必须相同。编译器会显示以下错误。\n\n```\nerror: initializing 'NSError *__autoreleasing\
  \ *' with an expression\n          of type 'NSError *__strong *' changes retain/release\
  \ properties of pointer\n        NSError **pError = &error;\n                  \
  \            ^        ~~~~~~\n```\n\n在这种情况下，必须添加 `__strong` 所有权修饰符。\n\n```\nNSError\
  \ *error = nil;\nNSError * __strong *pError = &error;\n/* 无编译错误 */\n```\n\n此规则同样适用于所有其他所有权修饰符。\n\
  \n```\nNSError __weak *error = nil;\nNSError * __weak *pError = &error;\n/* 无编译错误\
  \ */\n```\n\n```\nNSError __unsafe_unretained *unsafeError = nil;\nNSError * __unsafe_unretained\
  \ *pUnsafeError = &unsafeError;\n/* 无编译错误 */\n```\n\n顺便说一下，在前面的例子中，方法将参数作为对象类型的指针，并使用\
  \ `__autoreleasing` 进行限定。\n\n```\n- (BOOL) performOperationWithError:(NSError *\
  \ __autoreleasing *)error;\n```\n\n而调用者传递的是使用 `__strong` 限定的对象类型指针。\n\n```\nNSError\
  \ __strong *error = nil;\nBOOL result = [obj performOperationWithError:&error];\n\
  ```\n\n正如我们所见，要交换对象指针，两个变量必须具有相同的限定符。但上述例子并非如此。它是如何工作的呢？以下是编译器处理方式的解释。\n\n```\n\
  NSError __strong *error = nil;\nNSError __autoreleasing *tmp = error;\nBOOL result\
  \ = [obj performOperationWithError:&tmp];\nerror = tmp;\n```\n\n此外，你也可以像下面这样为对象指针类型显式地声明所有权修饰符。\n\
  \n```\n- (BOOL) performOperationWithError:(NSError * __strong *)error;\n```\n\n\
  此声明展示了如何在不将对象注册到自动释放池的情况下传递对象。虽然这可行，但你不应该这样做。从调用者的角度来看，要创建一个带所有权的对象，该方法必须属于 alloc/new/copy/mutableCopy\
  \ 组。如果它不属于该组，调用者应获取一个无所有权的对象。因此，参数应使用 `__autoreleasing` 进行限定。\n\n并且，当你显式使用 `__autoreleasing`\
  \ 所有权修饰符时，该变量必须是自动变量，例如局部变量或方法/函数的参数。\n\n接下来，让我们进一步了解 `@autoreleasepool`。在非 ARC\
  \ 环境中，自动释放池的使用方式如下。\n\n```\n/* 非 ARC */\n\nNSAutoreleasePool *pool0 = [[NSAutoreleasePool\
  \ alloc] init];\n    NSAutoreleasePool *pool1 = [[NSAutoreleasePool alloc] init];\n\
  \        NSAutoreleasePool *pool2 = [[NSAutoreleasePool alloc] init];\n        id\
  \ obj = [[NSObject alloc] init];\n        [obj autorelease];\n        [pool2 drain];\n\
  \    [pool1 drain];\n[pool0 drain];\n```\n\n`@autoreleasepool` 块同样可以嵌套。\n\n```\n\
  @autoreleasepool {\n    @autoreleasepool {\n        @autoreleasepool {\n       \
  \     id __autoreleasing obj = [[NSObject alloc] init];\n        }\n    }\n}\n```\n\
  \n例如，从 iOS 应用模板生成的应用程序 main 函数，使用 `@autoreleasepool` 块来包含所有应用程序代码。\n\n```\nint main(int\
  \ argc, char *argv[])\n{\n    @autoreleasepool {\n        return UIApplicationMain(argc,\
  \ argv, nil,\n            NSStringFromClass([AppDelegate class]));\n    }\n}\n```\n\
  \n同样地，`NSRunLoop` 拥有自动释放池，用于在每个循环中释放所有对象。此机制在启用和禁用 ARC 的环境中是相同的。顺便说一下，即使在非 ARC 环境中也可以使用\
  \ `@autoreleasepool` 块，但必须使用 LLVM 3.0 或更高版本的编译器进行编译。在这种情况下，源代码应如下所示。\n\n```\n/*\
  \ 非 ARC */\n@autoreleasepool {\n    id obj = [[NSObject alloc] init];\n    [obj\
  \ autorelease];\n}\n```\n\n我建议即使在非 ARC 环境中也使用 `@autoreleasepool` 而不是 `NSAutoreleasePool`。原因在于，自动释放池的作用域以块的形式编写，因此其可读性要好得多。\n\
  \n此外，`_objc_autoreleasePoolPrint()`（参见 Apple 在第一章中的实现）既可用于启用 ARC 的环境，也可用于禁用 ARC\
  \ 的环境。\n\n```\n_objc_autoreleasePoolPrint();\n```\n\n请有效利用它以调试自动释放池中的对象。\n\n###\
  \ `__strong` 与 `__weak`\n\n`__strong` 和 `__weak` 变量的概念与 C++ 中的智能指针非常相似。它们分别被称为 `std::shared_ptr`\
  \ 和 `std::weak_ptr`。`std::shared_ptr` 使用引用计数来管理 C++ 类对象的所有权。`std::weak_ptr` 用于避免循环引用。如果将来需要使用\
  \ C++，强烈建议使用这些智能指针。\n\n* -1999 `boost::shared_ptr` 成为 Boost C++ 库的一部分\n\n* 2002\
  \ `boost::weak_ptr` 被添加到该库\n\n* 2005 `tr1::shared_ptr` 和 `tr1::weak_ptr` 被标准 C++\
  \ 库草案 TR1 采纳。在某些环境中，可以使用 `std::shared_ptr` 和 `std::weak_ptr`\n\n* `std::shared_ptr`\
  \ 和 `std::weak_ptr` 被 C++ 标准 C++11（即 C++0x）采纳\n\n## 规则\n\n为了编写和编译 ARC 的源代码，你需要注意几件事。只需遵循下面列表中的规则，你就可以自信地为\
  \ ARC 启用环境编写源代码。\n\n*   忘记使用 `retain`、`release`、`retainCount` 和 `autorelease`。\n\
  *   忘记使用 `NSAllocateObject` 和 `NSDeallocateObject`。\n*   遵循与对象创建相关的方法命名规则。\n*  \
  \ 忘记显式调用 `dealloc`。\n*   使用 `@autoreleasepool` 代替 `NSAutoreleasePool`。\n*   忘记使用\
  \ Zone（`NSZone`）。\n*   C 语言中 `struct` 或 `union` 的成员不能是对象类型变量。\n*   `id` 和 `void*`\
  \ 必须进行显式转换。\n\n以下逐条解释这些规则。\n\n### 忘记使用 Retain、Release、RetainCount 或 Autorelease\n\
  \n如你所知，编译器会执行内存管理，因此你不需要调用与内存管理相关的方法，例如 `retain`、`release`、`retainCount` 和 `autorelease`。\n\
  \n苹果公司曾说：\n\n> 通过使用全新的 Apple LLVM 编译器启用 ARC，您将永远不再需要键入 `retain` 或 `release`\n\n\
  但实际上，你**无法**使用它们。当你使用它们时，会发生如下编译错误。\n\n```\nerror: ARC forbids explicit message\
  \ send of 'release'\n        [o release];\n         ^ ~~~~~~~\n```\n\n所以，事实上，苹果公司应该说：\n\
  \n“通过使用全新的 Apple LLVM 编译器启用 ARC，您可以忘记过去那些长时间辛苦键入 `retain` 和 `release` 的日子。”\n\n\
  并且，`retainCount` 和 `release` 方法也会导致编译错误，因此以下代码无法与 ARC 一起使用。\n\n```\nfor (;;) {\n\
  \    NSUInteger count = [obj retainCount];\n    [obj release];\n    if (count ==\
  \ 1)\n        break;\n}\n```\n\n这段源代码不符合对引用计数的正确理解。因此，这应该不是问题。总之，`retain`、`release`、`retainCount`\
  \ 和 `autorelease` 方法只能在非 ARC 环境中使用。\n\n\n\n### 忘记使用 `NSAllocateObject` 或 `NSDeallocateObject`\n\
  \n你已知，要创建具有所有权的对象，需要使用 `alloc` 方法。\n\n```\nid obj = [NSObject alloc];\n```\n\n实际上，正如我们在\
  \ GNUstep 的 `alloc` 实现中看到的，在非 ARC 环境中，可以通过调用 `NSAllocateObject` 函数来创建具有所有权的对象。^(2)\
  \ 使用 ARC 时，`NSAllocateObject` 函数不能使用。它会导致编译错误，就像使用了 `retain` 一样。\n\n```\nerror:\
  \ 'NSAllocateObject' is unavailable:\n        not available in automatic reference\
  \ counting mode\n```\n\n此外，`NSDeallocateObject` 函数也不能使用。\n\n### 遵循与对象创建相关的方法命名规则\n\
  \n如第 1 章所述，与对象创建相关的方法存在命名规则。\n\n*   `alloc`\n*   `new`\n*   `copy`\n*   `mutableCopy`\n\
  \n当某些方法返回对象时，如果方法名以列表中的词开头，则调用者拥有该对象的所有权。此规则在 ARC 下仍然适用。同时，还增加了一个前缀。\n\n*   `init`\n\
  \n对于任何以 `init` 开头的方法，存在一些比 `alloc/new/copy/mutableCopy` 方法组更严格的规则。\n\n- 该方法必须是实例方法。\n\
  - 它必须返回一个对象。\n- 返回类型必须是 `id` 类型，或者其类、父类或子类的类型。\n- 它与 `alloc/new/copy/mutableCopy`\
  \ 方法组一样，返回一个没有注册到自动释放池的对象，这意味着调用者拥有所有权。基本上，它初始化由 `alloc` 返回的对象，并返回相同的对象，如下所示。\n\n\
  ```\nid obj = [[NSObject alloc] init];\n```\n\n__________\n\n² Apple, “Foundation\
  \ Functions Reference,” [`http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/Foundation/Miscellaneous/Foundation_Functions/Reference/reference.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/Foundation/Miscellaneous/Foundation_Functions/Reference/reference.html)\n\
  \n上述源代码调用了 `alloc` 方法获取一个对象，然后对该对象调用 `init` 方法进行初始化。之后，`init` 方法返回相同的对象。现在，让我们看看其他示例。\n\
  \n```\n- (id) initWithObject:(id)obj;\n```\n\n这个方法声明符合规则。尽管以下方法也符合命名规则，但它没有返回对象，因此你无法使用。\n\
  \n```\n- (void) initThisObject;\n```\n\n例外情况是，名为 `initialize` 的方法不包含在此 `init` 组中。因此，你可以像往常一样使用以下方法。\n\
  \n```\n- (void) initialize;\n```\n\n### 忘记显式调用 `dealloc`\n\n当所有所有权被释放时，对象将被销毁。这与非\
  \ ARC 环境中的工作方式相同。当被销毁时，会调用其 `dealloc` 方法。\n\n```\n- (void) dealloc\n{\n     /*\n\
  \      * 在此处编写需要妥善处理的代码。\n      */\n}\n```\n\n例如，当你使用用 C 编写的库并分配了内存缓冲区时，你需要在 `dealloc`\
  \ 方法中释放它。\n\n```\n- (void) dealloc\n{\n    free(buffer_);\n}\n```\n\n在许多情况下，`dealloc`\
  \ 是从委托或观察者中移除对象的合适位置。\n\n```\n- (void) dealloc\n{\n    [[NSNotificationCenter defaultCenter]\
  \ removeObserver:self];\n}\n```\n\n顺便说一下，在非 ARC 环境中，你必须每次都像这样键入 `[super dealloc]`。\n\
  \n```\n/* non-ARC */\n\n- (void) dealloc\n{\n    /* 对该对象执行一些操作。 */\n\n    [super\
  \ dealloc];\n}\n```\n\n使用 ARC 时，这会导致编译错误，就像调用 `release` 方法时一样。\n\n```\nerror: ARC\
  \ forbids explicit message send of 'dealloc'\n        [super dealloc];\n       \
  \  ^     ~~~~~~~\n```\n\n你不能显式调用 `[super dealloc]`。它由 ARC 自动完成。你可以忘记一次又一次地键入它。\n\
  \n### 使用 `@autoreleasepool` 代替 `NSAutoreleasePool`\n\n如前一节所述，你必须使用 `@autoreleasepool`\
  \ 块来代替 `NSAutoreleasePool`。如果你使用 `NSAutoreleasePool` 类，则会发生编译错误。\n\n```\nerror:\
  \ 'NSAutoreleasePool' is unavailable:\n        not available in automatic reference\
  \ counting mode\n        NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];\n\
  \        ^\n```\n\n### 忘记使用 Zone (`NSZone`)\n\n使用 ARC 时，Zone (`NSZone`) 不可用。如前所述（参见“Zone”专栏），无论是否启用\
  \ ARC，最近的 Objective-C 运行时（定义了编译器宏 `__OBJC2__` 的环境）都会忽略 zones。\n\n### C 语言的 struct\
  \ 或 union 中的成员变量不能是对象类型\n\n当你向 C 语言的 `struct` 或 `union` 添加 Objective-C 对象类型的成员变量时，会导致编译错误。\n\
  \n```\nstruct Data {\n    NSMutableArray *array;\n};\n```\n\n```\nerror: ARC forbids\
  \ Objective-C objs in structs or unions\n    NSMutableArray *array;\n          \
  \          ^\n```\n\n即使使用 LLVM 编译器 3.0，由于 C 语言规范的限制，也无法管理 C `struct` 的生命周期。^(3)\
  \ 使用 ARC 时，编译器需要了解并管理对象的生命周期才能执行内存管理。例如，自动变量（局部变量）可以被管理，因为编译器可以将生命周期视为变量的作用域。由于\
  \ C `struct` 成员没有此类信息，编译器无法为 C `struct` 执行内存管理。如果你仍然想向 C `struct` 放入一个对象，可以通过将对象转换为\
  \ `void *`（参见下一节）或使用 `__unsafe_unretained` 所有权修饰符（参见“所有权修饰符”一节）来实现。\n\n__________\n\
  \n³ LLVM.org “4.3.5. Ownership-qualified fields of structs and unions,” [`http://clang.llvm.org/docs/AutomaticReferenceCounting.html#ownership.restrictions.records`](http://clang.llvm.org/docs/AutomaticReferenceCounting.html#ownership.restrictions.records)\n\
  \n```\nstruct Data {\n        NSMutableArray __unsafe_unretained *array;\n    };\n\
  ```\n\n如前所述，编译器不会管理带有 `__unsafe_unretained` 所有权修饰符的变量。你必须自己管理所有权以避免内存泄漏，否则应用程序会崩溃。\n\
  \n### `id` 和 `void*` 必须显式转换\n\n在非 ARC 环境中，从 `id` 转换为 `void*` 可以正常工作，如下所示。\n\n```\n\
  /* non-ARC */\nid obj = [[NSObject alloc] init];\nvoid *p = obj;\n```\n\n同样，通过从\
  \ `void*` 赋值回来的 `id` 变量调用方法也没有问题，如下所示。\n\n```\n/* non-ARC */\nid o = p;\n[o release];\n\
  ```\n\n但这些源代码在 ARC 下会导致编译错误。\n\n```\nerror: implicit conversion of an Objective-C\
  \ pointer\n    to 'void *' is disallowed with ARC\n        void *p = obj;\n    \
  \              ^\n\n    error: implicit conversion of a non-Objective-C pointer\n\
  \        type 'void *' to 'id' is disallowed with ARC\n        id o = p;\n     \
  \           ^\n```\n\n要在 `id` 或对象类型与 `void*` 之间进行转换，你必须使用一种特殊的转换。仅用于赋值时，你可以使用 `__bridge`\
  \ 转换。\n\n#### `__bridge` 转换\n\n你可以这样使用 `__bridge` 转换：\n\n```\nid obj = [[NSObject\
  \ alloc] init];\n\nvoid *p = (__bridge void *)obj;\n\nid o = (__bridge id)p;\n```\n\
  \n使用 `__bridge` 转换，你可以将 `id` 转换为 `void*`，反之亦然。但是，将 `__bridge` 转换为 `void*` 甚至比 `__unsafe_unretained`\
  \ 限定的变量更危险。你必须小心地自己管理对象的所有权，否则会因为悬空指针而崩溃。此外，还有另外两种转换：`__bridge_retained` 和 `__bridge_transfer`。\n\
  \n\n\n#### `__bridge_retained` Cast\n\n`__bridge_retained` 转型操作使得被赋值的变量仿佛拥有了对象的所有权。\n\
  \n```\nid obj = [[NSObject alloc] init];\nvoid *p = (__bridge_retained void *)obj;\n\
  ```\n\n上述源代码可以在非 ARC 环境下重写为如下形式。\n\n```\n/* non-ARC */\n\nid obj = [[NSObject alloc]\
  \ init];\n\nvoid *p = obj;\n[(id)p retain];\n```\n\n`__bridge_retained` 转型已被 `retain`\
  \ 所替代。变量 `obj` 和 `p` 都拥有该对象的所有权。让我们看看其他示例。\n\n```\nvoid *p = 0;\n\n{\n    id obj\
  \ = [[NSObject alloc] init];\n    p = (__bridge_retained void *)obj;\n}\n\nNSLog(@\"\
  class=%@\", [(__bridge id)p class]);\n```\n\n当离开变量 `obj` 的作用域时，其强引用消失，对象被释放。由于变量\
  \ `p` 也拥有所有权，因此对象不会被丢弃。我们像往常一样在非 ARC 环境下重写它。\n\n```\n/* non-ARC */\n\nvoid *p =\
  \ 0;\n\n{\n    id obj = [[NSObject alloc] init];\n    /* [obj retainCount] -> 1\
  \ */\n\n    p = [obj retain];\n    /* [obj retainCount] -> 2 */\n\n    [obj release];\n\
  \    /* [obj retainCount] -> 1 */\n}\n\n     /*\n      * [(id)p retainCount] ->\
  \ 1\n      * 这意味着，\n      * [obj retainCount] -> 1\n      * 所以，该对象仍然存在。\n      */\n\
  \nNSLog(@\"class=%@\", [(__bridge id)p class]);\n```\n\n相反地，`__bridge_transfer`\
  \ 转型会在赋值完成后立即释放该对象。\n\n#### `__bridge_transfer` Cast\n\n你可以像这样使用 `__bridge_transfer`\
  \ 转型：\n\n```\nid obj = (__bridge_transfer id)p;\n```\n\n这段源代码可以在非 ARC 环境下重写。\n\n\
  ```\n/* non-ARC */\nid obj = (id)p;\n[obj retain];\n[(id)p release];\n```\n\n正如\
  \ `__bridge_retained` 转型被替换为 `retain`，`__bridge_transfer` 转型被替换为 `release`。变量 `obj`\
  \ 被保留了，因为它被 `__strong` 修饰。通过这两种转型，你可以在不使用 `id` 或对象类型变量的情况下创建、拥有和释放任何对象。但这并不推荐。请谨慎使用它们。再看一个例子。\n\
  \n```\nvoid *p = (__bridge_retained void *)[[NSObject alloc] init];\nNSLog(@\"class=%@\"\
  , [(__bridge id)p class]);\n(void)(__bridge_transfer id)p;\n```\n\n这段源代码可以在非 ARC\
  \ 环境下重写如下。\n\n```\n/* non-ARC */\n\nid p = [[NSObject alloc] init];\nNSLog(@\"class=%@\"\
  , [p class]);\n[p release];\n```\n\n这些转型常用于转换 Objective-C 对象和 Core Foundation 对象。\n\
  \n#### Objective-C 对象与 Core Foundation 对象\n\nCore Foundation 对象是用于 Core Foundation\
  \ 框架的对象。它主要用 C 语言编写，并具有引用计数。在 Core Foundation 框架中，`CFRetain` 和 `CFRelease` 是 Objective-C\
  \ 在非 ARC 环境下 `retain` 和 `release` 的等效函数。\n\nCore Foundation 对象和 Objective-C 对象之间的差异非常小。或多或少只在于创建方式的不同：要么是使用\
  \ Objective-C 的 Foundation 框架（Cocoa）创建，要么是使用 Core Foundation 框架创建。创建之后，它可以透明地在两种框架的方式下使用。例如，即使一个对象是用\
  \ Foundation 框架 API 创建的，它也可以用 Core Foundation 框架 API 释放，反之亦然。\n\n实际上，Core Foundation\
  \ 对象本身和 Objective-C 对象本身之间没有区别。因此，在非 ARC 环境下转换对象时，仅使用 C 语言风格的转型就足够了。这种转换被称为“无缝桥接”（Toll-Free\
  \ Bridge），因为仅进行转型对 CPU 来说没有开销。\n\n你可以在以下文档中查看无缝桥接类的列表。\n\nToll-Free Bridged Types\n\
  [`http://developer.apple.com/library/mac/documentation/CoreFoundation/Conceptual/CFDesignConcepts/Articles/tollFreeBridgedTypes.html`](http://developer.apple.com/library/mac/documentation/CoreFoundation/Conceptual/CFDesignConcepts/Articles/tollFreeBridgedTypes.html)\n\
  \n对于启用了 ARC 的环境，为了在 Objective-C 和 Core Foundation 之间转换对象，换句话说，为了进行无缝桥接转型，提供了以下函数。\n\
  \n```\nCFTypeRef CFBridgingRetain(id X) {\n    return (__bridge_retained CFTypeRef)X;\n\
  }\n\nid CFBridgingRelease(CFTypeRef X) {\n    return (__bridge_transfer id)X;\n\
  }\n```\n\n让我们看看如何使用这些函数。\n\n#### `CFBridgingRetain` 函数\n\n清单 2-11 创建了一个具备所有权的 `NSMutableArray`\
  \ 对象，并将该对象用作 Core Foundation 对象。\n\n**清单 2-11.** *CFBridgingRetain*\n\n```\nCFMutableArrayRef\
  \ cfObject = NULL;\n{\n    id obj = [[NSMutableArray alloc] init];\n    cfObject\
  \ = CFBridgingRetain(obj);\n    CFShow(cfObject);\n    printf(\"retain count = %d\\\
  n\", CFGetRetainCount(cfObject));\n}\nprintf(\"retain count after the scope = %d\\\
  n\", CFGetRetainCount(cfObject));\nCFRelease(cfObject);\n```\n\n结果如下所示。`()` 表示一个空数组。\n\
  \n```\n()\nretain count = 2\nretain count after the scope = 1\n```\n\n现在我们已经了解到，Foundation\
  \ 框架中的 Objective-C 对象可以用作 Core Foundation 对象。此外，该对象也可以使用 `CFRelease` 来释放。在示例中，你也可以使用\
  \ `__bridge_retained` 转型来代替 `CFBridgingRetain`，如下所示。选择你喜欢的任意一种方式即可。\n\n```\nCFMutableArrayRef\
  \ cfObject = (__bridge_retained CFMutableArrayRef)obj;\n```\n\n让我们看看带有所有权状态注释和 `CFGetRetainCount`\
  \ 值的源代码（清单 2-12）。\n\n**清单 2-12.** *带有注释的 CFBridgingRetain*\n\n```\nCFMutableArrayRef\
  \ cfObject = NULL;\n{\n    id obj = [[NSMutableArray alloc] init];\n\n     /*\n\
  \      * 变量 obj 持有对该对象的强引用\n      */\n    cfObject = CFBridgingRetain(obj);\n\n\
  \     /*\n      * CFBridgingRetain 的作用等同于调用了 CFRetain，\n      * 并且该对象被赋值给变量 cfObject\n\
  \      */\n\n    CFShow(cfObject);\n    printf(\"retain count = %d\\n\", CFGetRetainCount(cfObject));\n\
  \n     /*\n      * 引用计数为 2。一个来自变量 obj 的强引用，\n      * 另一个来自 CFBridgingRetain。\n \
  \     */\n}\n\n /*\n  * 离开变量 obj 的作用域，其强引用消失。\n  * 引用计数为 1。\n  */\n\nprintf(\"retain\
  \ count after the scope = %d\\n\", CFGetRetainCount(cfObject));\nCFRelease(cfObject);\n\
  \n/*\n* 由于 CFRelease，引用计数变为 0。\n* 因此，该对象被丢弃。\n*/\n```\n\n接下来，让我们看看如果使用 `__bridge`\
  \ 转型而不是 `CFBridgingRetain` 或 `__bridge_retained` 转型会发生什么（清单 2-13）。\n\n**清单 2-13.**\
  \ *使用 `__bridge` 转型代替 `__bridge_retained` 转型*\n\n```\nCFMutableArrayRef cfObject\
  \ = NULL;\n{\n    id obj = [[NSMutableArray alloc] init];\n\n     /*\n      * 变量\
  \ obj 持有对该对象的强引用\n      */\n\n    cfObject = (__bridge CFMutableArrayRef)obj;\n\
  \    CFShow(cfObject);\n    printf(\"retain count = %d\\n\", CFGetRetainCount(cfObject));\n\
  \n     /*\n      * __bridge 转型不涉及所有权状态的变化。\n      * 引用计数为 1，来自变量 obj 的强引用。\n   \
  \   */\n}\n\n /*\n  * 离开变量 obj 的作用域，其强引用消失。\n  * 该对象被自动释放。\n  * 由于没有任何人拥有所有权，该对象被丢弃。\n\
  \  */\n\n /*\n  * 从此处开始，对该对象的任何访问都是无效的！（悬垂指针）\n  */\n\nprintf(\"retain count after\
  \ the scope = %d\\n\", CFGetRetainCount(cfObject));\nCFRelease(cfObject);\n```\n\
  \n现在，我们理解了为什么需要 `CFBridgingRetain` 或 `__bridge_retained` 转型。\n\n\n\n#### CFBridgingRelease\
  \ 函数\n\n列表 2-14 展示了如何以相反的方式使用 Core Foundation API 创建一个 `NSMutableArray` 对象。它使用了\
  \ `CFBridgingRelease` 函数。\n\n**列表 2-14.** 创建 `NSMutableArray` 对象\n\n```\n{\n   \
  \ CFMutableArrayRef cfObject =\n        CFArrayCreateMutable(kCFAllocatorDefault,\
  \ 0, NULL);\n    printf(\"retain count = %d\\n\", CFGetRetainCount(cfObject));\n\
  \    id obj = CFBridgingRelease(cfObject);\n    printf(\"retain count after the\
  \ cast = %d\\n\", CFGetRetainCount(cfObject));\n    NSLog(@\"class=%@\", obj);\n\
  }\n```\n\n可以看到，该对象是通过 Core Foundation Framework API 创建并持有所有权的。与前一个示例相反，该对象被用作 Objective-C\
  \ 对象。结果如下所示。\n\n```\nretain count = 1\nretain count after the cast = 1\n```\n\n\
  当然，你也可以使用 `bridge_transfer` 来替代 `CFBridgingRelease`。\n\n```\nid obj = (__bridge_transfer\
  \ id)cfObject;\n```\n\n接下来，像往常一样，我们来看一下带有所有权状态注释的源代码（列表 2-15）。\n\n**列表 2-15.** 创建带注释的\
  \ `NSMutableArray` 对象\n\n```\n{\n    CFMutableArrayRef cfObject =\n    CFArrayCreateMutable(kCFAllocatorDefault,\
  \ 0, NULL);\n    printf(\"retain count = %d\\n\", CFGetRetainCount(cfObject));\n\
  \n     /*\n      * 该对象通过 Core Foundation Framework API 创建并持有所有权。\n      * 引用计数为\
  \ 1。\n      */\n\n    id obj = CFBridgingRelease(cfObject);\n\n     /*\n      *\
  \ 经过 CFBridgingRelease 赋值后，\n      * 变量 obj 持有一个强引用，然后\n      * 该对象通过 CFRelease\
  \ 被释放。\n      */\n\n    printf(\"retain count after the cast = %d\\n\", CFGetRetainCount(cfObject));\n\
  \n     /*\n      * 只有变量 obj 持有该对象的强引用，\n      * 因此引用计数为 1。\n      *\n      * 并且，经过\
  \ CFBridgingRelease 转换后，\n      * 存储在变量 cfObject 中的指针仍然有效。\n      */\n\n    NSLog(@\"\
  class=%@\", obj);\n}\n\n /*\n  * 离开变量 obj 的作用域后，其强引用消失。\n  * 该对象会被自动释放。\n  * 由于没有持有者，该对象被销毁。\n\
  \  */\n```\n\n让我们看看使用 `__bridge` 转换代替 `CFBridgingRelease` 或 `__bridge_transfer`\
  \ 转换时会发生什么（列表 2-16）。\n\n**列表 2-16.** 使用 `__bridge` 转换代替 `__bridge_transfer` 转换\n\
  \n```\n{\n    CFMutableArrayRef cfObject =\n    CFArrayCreateMutable(kCFAllocatorDefault,\
  \ 0, NULL);\n    printf(\"retain count = %d\\n\", CFGetRetainCount(cfObject));\n\
  \n     /*\n      * 该对象通过 Core Foundation Framework API 创建并持有所有权。\n      * 引用计数为\
  \ 1。\n      */\n\n    id obj = (__bridge id)cfObject;\n\n     /*\n      * 变量 obj\
  \ 持有一个强引用，因为它是通过 __strong 限定的。\n      */\n\n    printf(\"retain count after the\
  \ cast = %d\\n\", CFGetRetainCount(cfObject));\n\n     /*\n      * 因为变量 obj 持有一个强引用，并且\n\
  \      * CFRelease 未被调用，\n      * 引用计数为 2。\n      */\n\n    NSLog(@\"class=%@\"\
  , obj);\n}\n\n /*\n  * 离开变量 obj 的作用域后，其强引用消失。\n  * 该对象被释放。\n  */\n\n /*\n  * 因为引用计数为\
  \ 1，它不会被销毁。内存泄漏！\n  */\n```\n\n如上例所示，你必须正确使用 `CFBridgingRetain`/`CFBridgingRelease`\
  \ 或 `__bridge_retained`/`__bridge_transfer` 转换。当你需要将 Objective-C 对象赋值给 C 类型（如 `void*`）的变量时，必须极其小心地实现。\n\
  \n## 属性\n\n使用 ARC 后，Objective-C 类属性引入了新的修饰符，如下所示。\n\n```\n@property (nonatomic,\
  \ strong) NSString *name;\n```\n\n作为属性修饰符，你可以在启用 ARC 的环境中使用 表 2-1 中列出的限定符。\n\n![图片](img/t0201.jpg)\n\
  \n对属性赋值等同于对具有相应所有权限定符的变量进行赋值。`copy` 修饰符不仅仅是赋值。它通过 `NSCopying` 协议的 `copyWithZone:`\
  \ 方法复制对象，然后进行赋值。\n\n当你同时为属性手动声明实例变量时，该实例变量必须具有与属性相同的所有权限定符。我们通过一个例子来看一下。\n\n```\n\
  @interface SomeObject : NSObject {\n    id obj;\n}\n@end\n```\n\n成员变量 `obj` 被声明为\
  \ `id` 类型。同时，如果属性被声明为带有弱所有权限定符，如下所示：\n\n```\n@property (nonatomic, weak) id obj;\n\
  ```\n\n这会导致编译错误。\n\n```\nerror: existing ivar 'obj' for __weak property 'obj' must\
  \ be __weak\n    @synthesize obj;\n                ^\n    note: property declared\
  \ here\n    @property (nonatomic, weak) id obj;\n                              \
  \     ^\n```\n\n在这种情况下，成员变量必须使用 `__weak` 进行限定。\n\n```\n@interface SomeObject : NSObject\
  \ {\n    id _weak obj;\n} @end\n```\n\n或者，该属性必须使用修饰符 \"strong\"。\n\n```\n@property\
  \ (nonatomic, strong) id obj;\n```\n\n接下来，我们来了解一些在使用带 ARC 的数组时需要注意的事项。\n\n\n\n###\
  \ 数组\n\n我在之前用 `id` 或对象类型变量解释了所有权说明符。在本节中，我将解释如何在数组中使用这些说明符。\n\n以下源代码展示了如何使用使用 `__strong`\
  \ 限定的静态变量数组。\n\n```\nid objs[10];\n```\n\n对于 `__weak`、`__autoreleasing` 或 `__unsafe_unretained`，操作方式相同。\n\
  \n```\nid __weak objs[10];\n```\n\n顺便提一下，任何使用 `__strong`、`__weak` 或 `__autoreleasing`（`__unsafe_unretained`\
  \ 除外）限定的变量都会被初始化为 `nil`。这同样适用于静态数组。任何使用 `__strong`、`__weak` 或 `__autoreleasing`\
  \ 限定的变量数组，都会被初始化为 `nil`。让我们看看如何使用它们。\n\n```\n{\n    id objs[2];\n    objs[0] = [[NSObject\
  \ alloc] init];\n    objs[1] = [NSMutableArray array];\n}\n```\n\n当控制流离开数组的作用域时，数组中所有持有强引用的变量都会消失。所赋值的对象会被自动释放。这与非数组中的变量行为一致。\n\
  \n动态数组的情况又是怎样的呢？基本上，你应该使用 Foundation 框架中的容器，例如 `NSMutableArray`、`NSMutableDictionary`\
  \ 或 `NSMutableSet`。这样存储的对象将会被妥善管理。这些容器是更优的选择，但你仍然可以使用带有 `__strong` 限定变量的动态 C 数组。不过，你需要记住几点。按照惯例，我们通过一个示例来看看。\n\
  \n首先，声明一个指向动态 C 数组的指针：\n\n```\nid __strong *array = nil;\n```\n\n如前所述，`id *` 类型意味着\
  \ `id __autoreleasing *`。因此，在这种情况下，你必须显式写出 `__strong` 限定符。虽然带有 `__strong` 所有权限定符的\
  \ `id` 类型变量会被初始化为 `nil`，但带有 `__strong` 限定的 `id` 指针类型变量却不会。因此，你必须显式地将其赋值为 `nil`。\n\
  \n或者，如果你更喜欢使用类类型而不是 `id`，也可以像下面这样声明：\n\n```\nNSObject * __strong *array = nil;\n\
  ```\n\n接下来，使用 `calloc` 函数为数组中的变量分配一个内存块。\n\n```\narray = (id __strong *)calloc(entries,\
  \ sizeof(id));\n```\n\n在这段源代码中，为“entries”个元素分配了一个内存块。请注意，使用 `__strong` 限定的变量必须初始化为\
  \ `nil`。这里使用 `calloc` 函数是为了在分配后用零填充内存。除了 `calloc` 函数，你也可以先使用 `malloc` 函数分配内存，再使用\
  \ `memset` 函数用零填充，如下所示。\n\n```\narray = (id __strong *)malloc(entries * sizeof(id));\n\
  memset(array, 0, entries * sizeof(id));\n```\n\n然而，像下面这样赋值为 `nil` 是非常危险的。\n\n```\n\
  array = (id __strong *)malloc(sizeof(id) * entries);\nfor (NSUInteger i = 0; i <\
  \ entries; ++i)\n    array[i] = nil;\n```\n\n在这段源代码中，由 `malloc` 分配的内存区域并未被初始化为零。因此，在每次赋值之前，`release`\
  \ 方法会在无效的地址上被调用。所以，推荐直接使用 `calloc` 函数。之后，你可以像操作静态数组一样，对动态数组进行任何操作。\n\n```\narray[0]\
  \ = [[NSObject alloc] init];\n```\n\n但是，当你使用完带有 `__strong` 限定的动态变量数组后，必须自行释放所有元素。这与静态数组有很大的不同。像下面这样仅仅使用\
  \ `free` 函数释放内存块会导致内存泄漏，因为每个元素永远不会被释放。\n\n```\nfree(array);\n```\n\n对于静态数组，当变量作用域结束时，编译器会自动插入代码来释放所有元素。但对于动态数组，编译器无法检测其生命周期。通过将所有元素设置为\
  \ `nil`，你可以移除元素的所有强引用，从而释放所有对象。然后，你还必须释放内存块本身。\n\n```\nfor (NSUInteger i = 0; i\
  \ < entries; ++i)\n    array[i] = nil;\n\nfree(array);\n```\n\n与初始化相反，你不能使用 `memset`\
  \ 函数来释放对象，因为这会导致内存泄漏。这样做非常危险。你必须手动将所有元素赋值为 `nil`，以便让编译器检测到。\n\n同样地，使用 `memcpy` 复制任何元素或使用\
  \ `realloc` 调整内存块大小也是危险的。这样做可能导致对象未被释放，或者同一对象被多次释放。因此，严格禁止使用这些函数。\n\n另外，你也可以像使用\
  \ `__strong` 那样，以同样的方式使用带有 `__weak` 限定的动态变量数组。最好不要与 `__autoreleasing` 一起使用，因为这会产生意想不到的状态。由于\
  \ `__unsafe_unretained` 限定的变量不受编译器控制，你可以像使用 `void*` 等 C 指针类型变量一样来使用它们。\n\n## 总结\n\
  \n在本章中，我们学习了：\n\n*   引用计数规则在 ARC 下如何依然适用\n*   ARC 新引入的所有权限定符\n*   为 ARC 新增的特性\n\
  *   使用 ARC 时必须了解的规则\n\n在下一章中，我们将结合 ARC 本身的实现来详细讨论这些内容。\n\n## 第 3 章\n\n## ARC 实现\n\
  \n在本章中，我们将通过讨论 ARC 本身的实现来回顾上一章所学的内容，详细解释 ARC 是什么以及它是如何工作的。\n\n苹果公司说：“Objective-C\
  \ 中的自动引用计数（ARC）使内存管理成为编译器的工作”，但事实上，ARC 并非仅仅是编译器的工作。Objective-C 运行时也需要提供帮助，因此 ARC\
  \ 实际上是由工具和库共同实现的：\n\n*   编译器：clang (LLVM 编译器) 3.0 或更高版本\n*   Objective-C 运行时库：`objc4`\
  \ 493.9 或更高版本\n\n**注意：**正如苹果公司所说，如果 ARC 仅仅是编译器的工作，那么 `__weak` 所有权说明符也可以在 iOS4 或\
  \ OS X Snow Leopard 上使用。\n\n当应用程序为 iOS4 或 OS X Snow Leopard 编译时，会链接 `libarclite_iphoneos.a`\
  \ 或 `libarclite_macosx.a` 以使 ARC 工作。即使链接了 ARC 支持库，在对象被废弃后，仍然无法为 `__weak` 限定的变量设置\
  \ `nil`（零化弱引用）。我猜这是旧版框架和运行时库的限制。不过，由于我们无法看到 `libarclite` 的源代码，这只是我的猜测。\n\n但现在，我们先不操心旧版操作系统；在本章中，我们将专注于\
  \ ARC 本身的实现，并查看 clang 汇编器的输出以及 `objc4` 库中 `runtime/objc-arr.mm` 的源代码。\n\n在接下来的部分中，我们将展示每个限定符对应的\
  \ ARC 源代码。我们已经学习了这些限定符是什么以及如何使用它们。在接下来的部分中，我们将详细了解它们是如何工作的。让我们从 `__strong` 所有权限定符开始。\n\
  \n## __strong 所有权限定符\n\n让我们以 `NSMutableArray` 类方法 `array` 为例，看看使用 `__strong` 限定的变量是如何工作的。我们将深入了解调用该方法时的底层机制以及该方法内部的机制。在此之前，请参考以下源代码。\n\
  \n```\n{\n    id __strong obj = [[NSObject alloc] init];\n}\n```\n\nClang 可以将其输出显示为汇编/机器代码。为了易读性，我们在下面将每个摘录表示为等价的\
  \ ObjC 代码。结合输出和 `objc4` 库的源代码，我们能够看到底层发生了什么。上述源代码被重写如下。请注意，有时我们会使用伪代码使其更易于理解。\n\n\
  ```\n/* 编译器的伪代码 */\nid obj = objc_msgSend(NSObject, @selector(alloc));\nobjc_msgSend(obj,\
  \ @selector(init));\nobjc_release(obj);\n```\n\n你可以看到，`objc_msgSend` 被调用了两次，分别用于调用\
  \ `alloc` 和 `init` 方法。之后，当变量作用域结束时，会调用 `objc_release` 来释放对象。虽然你不能显式地调用 `release`\
  \ 方法，但可以看到在伪代码中 `release` 被自动插入了。\n\n\n\n### 调用数组方法\n\n接下来，我们看看当一个对象不是通过 `alloc/new/copy/mutableCopy`\
  \ 方法组获取时会发生什么。原始代码如下所示。\n\n```\n{\n    id __strong obj = [NSMutableArray array];\n\
  }\n```\n\n这是一个看起来很普通的 `NSMutableArray` 类方法 `array`。它的伪代码与之前的略有不同。\n\n```\n/* 编译器生成的伪代码\
  \ */\nid obj = objc_msgSend(NSMutableArray, @selector(array));\nobjc_retainAutoreleasedReturnValue(obj);\n\
  objc_release(obj);\n```\n\n第一个用于 `array` 方法的 `objc_msgSend` 和最后一个 `objc_release`\
  \ 与之前相同。那么这个 `objc_retainAutoreleasedReturnValue` 函数调用是什么呢？\n\n`objc_retainAutoreleasedReturnValue`\
  \ 函数是为了性能优化。之所以插入它，是因为 `NSMutableArray` 的类方法 `array` 不在 `alloc/new/copy/mutableCopy`\
  \ 方法组中。每当调用的方法不属于该组时，编译器都会在调用该方法后立即插入这个函数。顾名思义，它会在一个对象被添加到自动释放池后，保留从方法或函数返回的该对象。\n\
  \n`objc_retainAutoreleasedReturnValue` 函数期望在方法内部已经调用了 `objc_autoreleaseReturnValue`\
  \ 函数。任何不在 `alloc/new/copy/mutableCopy` 组中的方法都必须调用 `objc_autoreleaseReturnValue`。例如，`NSMutableArray`\
  \ 的类方法 `array` 就调用了这个函数。\n\n### 深入 array 方法内部\n\n我们来看看编译器生成的 `NSMutableArray` 类方法\
  \ `array` 的实现代码。\n\n```\n+ (id) array\n{\n    return [[NSMutableArray alloc] init];\n\
  }\n```\n\n这段源代码被转换如下。它在最后调用了 `objc_autoreleaseReturnValue` 函数。\n\n```\n/* 编译器生成的伪代码\
  \ */\n+ (id) array\n{\n    id obj = objc_msgSend(NSMutableArray, @selector(alloc));\n\
  \    objc_msgSend(obj, @selector(init));\n    return objc_autoreleaseReturnValue(obj);\n\
  }\n```\n\n任何返回已添加到自动释放池的对象的方法，都会像上面的例子一样调用 `objc_autoreleaseReturnValue` 函数。它会将一个对象添加到自动释放池并返回它。但实际上，`objc_autoreleaseReturnValue`\
  \ 并不总是将该对象注册到自动释放池中。\n\n`objc_autoreleaseReturnValue` 会检查调用方的可执行代码，如果该代码在调用此方法后立即调用\
  \ `objc_retainAutoreleasedReturnValue` 函数，则它会跳过向自动释放池的注册，直接将对象返回给调用方。`objc_retainAutoreleasedReturnValue`\
  \ 函数的实现目的是，即使 `objc_autoreleaseReturnValue` 没有将对象注册到自动释放池，也能正确地获取这样一个对象。通过 `objc_autoreleaseReturnValue`\
  \ 和 `objc_retainAutoreleasedReturnValue` 的协同工作，对象会绕过添加到自动释放池的过程，如图 3-1 所示。这样，性能就会得到提升。^(1)\n\
  \n__________\n\n¹ 在 `objc4` 版本 493.9 中，此优化仅在 OS X 64 位环境下有效。\n\n![images](img/9781430241164_Fig03-01.jpg)\n\
  \n**图 3–1.** *跳过向自动释放池的注册*\n\n## `__weak` 所有权修饰符\n\n接下来，我们学习 `__weak` 所有权修饰符。我们将展示当对象被废弃或新创建的对象被赋值时会发生什么，以及对象如何被自动添加到自动释放池中。\n\
  \n如第 2 章所述，`__weak` 所有权修饰符提供以下特性。\n\n*   当所引用的对象被废弃时，任何使用 `__weak` 修饰的变量都会被赋值为 nil。\n\
  *   当通过 `__weak` 修饰的变量访问对象时，该对象会被添加到自动释放池中。\n\n我们从以下示例开始，看看幕后发生了什么。\n\n```\n{\n\
  \    id __weak obj1 = obj;\n}\n```\n\n这里，假设变量 `obj` 被存储在某个使用 `__strong` 修饰的变量中。\n\
  \n```\n/* 编译器生成的伪代码 */\nid obj1;\nobjc_initWeak(&obj1, obj);\nobjc_destroyWeak(&obj1);\n\
  ```\n\n使用 `__weak` 修饰的变量由 `objc_initWeak` 函数初始化。当离开变量作用域时，`objc_destroyWeak` 函数会销毁它。\n\
  \n`objc_initWeak` 函数实现如下源代码所示。它会清空使用 `__weak` 修饰的变量，然后调用 `objc_storeWeak` 函数，并传入要赋值的对象。\n\
  \n```\nobj1 = 0;\nobjc_storeWeak(&obj1, obj);\n```\n\n`objc_destroyWeak` 函数会调用 `objc_storeWeak`\
  \ 函数，并将 0 作为参数传入，如下所示。\n\n```\nobjc_storeWeak(&obj1, 0);\n```\n\n因此，示例代码等同于：\n\n\
  ```\n/* 编译器生成的伪代码 */\nid obj1;\nobj1 = 0;\nobjc_storeWeak(&obj1, obj);\nobjc_storeWeak(&obj1,\
  \ 0);\n```\n\n`objc_storeWeak` 函数将一个键值对注册到一个称为弱表的表中。键是第二个参数，即要赋值的对象的地址。值是第一个参数，即指向使用\
  \ `__weak` 修饰的变量的地址。如果第二个参数为 0，则从表中移除该条目。\n\n与引用计数表一样，弱表也被实现为一个哈希表（参见第 1 章 ，“Apple\
  \ 的实现”一节）。这样，当一个对象被废弃时，可以以合理的性能从该对象搜索到使用 `__weak` 修饰的变量。当以同一个对象作为键调用该函数时，多个使用 `__weak`\
  \ 修饰的变量将注册到同一个对象。\n\n### 探究对象被废弃时的底层机制\n\n接下来，我们看看当某个对象不再被任何所有者拥有而被废弃时调用的函数。对象通过\
  \ `objc_release` 函数被释放。\n\n1.  `objc_release`。\n2.  因为引用计数变为零，调用 `dealloc`。\n3.\
  \  `_objc_rootDealloc`。\n4.  `object_dispose`。\n5.  `objc_destructInstance`。\n6.\
  \  `objc_clear_deallocating`。\n\n最后调用 `objc_clear_deallocating` 函数。它执行以下操作。\n\n\
  1.  从弱表中，获取键为要被废弃的对象的条目。\n2.  将该条目中所有使用 `__weak` 所有权修饰的变量设置为 nil。\n3.  从表中移除该条目。\n\
  4.  对于要被废弃的对象，从引用表中移除其键。\n\n这就是其实现，让我们得以了解当所引用的对象被废弃时，如何将使用 `__weak` 修饰的变量设置为 nil。同时，这也告诉我们，如果使用了太多的\
  \ `__weak` 所有权修饰变量，会在一定程度上消耗 CPU 资源。因此，`__weak` 所有权修饰变量应仅用于避免循环引用。\n\n\n\n#### 分配新创建的对象\n\
  \n如前所述，以下源代码会触发一条警告。\n\n```\n{\n    id __weak obj = [[NSObject alloc] init];\n}\n\
  ```\n\n它试图将一个新对象赋值给变量。但由于变量使用了`__weak`修饰，没有任何对象能持有其所有权。因此，该对象会立即被释放并废弃。这就是警告产生的原因。\n\
  \n```\nwarning: assigning retained obj to weak variable; obj will be\n         \
  \ released after assignment [-Warc-unsafe-retained-assign]\n            id __weak\
  \ obj = [[NSObject alloc] init];\n                               ^     ~~~~~~~~~~~~~~\n\
  ```\n\n让我们看看编译器如何处理这段源代码。\n\n```\n/* 编译器伪代码 */\nid obj;\nid tmp = objc_msgSend(NSObject,\
  \ @selector(alloc));\nobjc_msgSend(tmp, @selector(init));\nobjc_initWeak(&obj, tmp);\n\
  objc_release(tmp);\nobjc_destroyWeak(&object);\n```\n\n`objc_initWeak` 函数将新对象赋值给了使用\
  \ `__weak` 修饰的变量。同时，编译器检测到没有任何对象持有所有权，并插入了 `objc_release` 函数。\n\n当 `objc_release`\
  \ 被调用时，对象将被废弃，并且使用 `__weak` 修饰的变量会变成 nil。让我们用 `NSLog` 来验证结果：\n\n```\n{\n    id __weak\
  \ obj = [[NSObject alloc] init];\n    NSLog(@\"obj=%@\", obj);\n}\n```\n\n结果如下所示。它显示了使用\
  \ `@\"%@\"` 格式化后的 nil。\n\n```\nobj=(null)\n```\n\n如果一个对象被创建后就直接废弃，会发生什么？我们将在下一节中通过具体实现来了解。\n\
  \n#### 对象的立即废弃\n\n正如我们所述，以下源代码会导致编译器警告。\n\n```\nid __weak obj = [[NSObject alloc]\
  \ init];\n```\n\n这是因为编译器检测到没有人拥有这个新对象的所有权。那么 `__unsafe_unretained` 的情况又如何呢？\n\n\
  ```\nid __unsafe_unretained obj = [[NSObject alloc] init];\n```\n\n与 `__weak` 类似，编译器检测到没有人拥有该对象的所有权。\n\
  \n```\nwarning: assigning retained object to unsafe_unretained variable;\n     \
  \   obj will be released after assignment [-Warc-unsafe-retained-assign]\n     \
  \   id __unsafe_unretained obj = [[NSObject alloc] init];\n                    \
  \                                   ^     ~~~~~~~~~~~~~\n```\n\n该源代码等价于：\n\n```\n\
  /* 编译器伪代码 */\nid obj = objc_msgSend(NSObject, @selector(alloc));\nobjc_msgSend(obj,\
  \ @selector(init));\nobjc_release(obj);\n```\n\n新对象通过 `objc_release` 函数被释放，而变量 `obj`\
  \ 仍然持有一个悬垂指针。如果对象没有赋值给任何变量，会发生什么？在没有 ARC 的情况下，这只会导致内存泄漏。\n\n```\n[[NSObject alloc]\
  \ init];\n```\n\n在 ARC 下，编译器会因为返回值从未被使用而给出警告。\n\n```\nwarning: expression result\
  \ unused [-Wunused-value]\n    [[NSObject alloc] init];\n    ^~~~~~~~~~~~~\n```\n\
  \n你可以通过将其强制转换为 `void` 来隐藏警告。\n\n```\n(void)[[NSObject alloc] init];\n```\n\n无论是否进行强制转换，这段源代码都会被转换为以下形式。\n\
  \n```\n/* 编译器伪代码 */\nid tmp = objc_msgSend(NSObject, @selector(alloc));\nobjc_msgSend(tmp,\
  \ @selector(init));\nobjc_release(tmp);\n```\n\n除非对象未被赋值给变量，否则其代码与使用 `__unsafe_unretained`\
  \ 的情况相同。因为没有人拥有所有权，所以编译器会生成 `objc_release` 函数调用。由于 ARC 的存在，不会发生内存泄漏。\n\n还有一个问题：我们能否像下面这样，对这些立即丢弃的对象调用实例方法？\n\
  \n```\n(void)[[[NSObject alloc] init] hash];\n```\n\n这等价于：\n\n```\n/* 编译器伪代码 */\n\
  id tmp = objc_msgSend(NSObject, @selector(alloc));\nobjc_msgSend(tmp, @selector(init));\n\
  objc_msgSend(tmp, @selector(hash));\nobjc_release(tmp);\n```\n\n对象会在方法调用后被释放。正如苹果公司所说，编译器妥善处理了内存管理！\n\
  \n#### 自动添加到自动释放池\n\n如前所述，当通过使用 `__weak` 修饰的变量访问对象时，该对象会被添加到自动释放池中。让我们看看它是如何工作的。\n\
  \n```\n{\n    id __weak obj1 = obj;\n    NSLog(@\"%@\", obj1);\n}\n```\n\n该源代码等价于以下内容。\n\
  \n```\n/* 编译器伪代码 */\nid obj1;\nobjc_initWeak(&obj1, obj);\nid tmp = objc_loadWeakRetained(&obj1);\n\
  objc_autorelease(tmp);\nNSLog(@\"%@\", tmp);\nobjc_destroyWeak(&obj1);\n```\n\n\
  `objc_loadWeakRetained` 和 `objc_autorelease` 函数调用是新插入的，这在之前的示例中没有出现。这是因为变量被实际使用了。这些函数的作用如下：\n\
  \n1. `objc_loadWeakRetained` 函数会保留由使用 `__weak` 修饰的变量所引用的对象。\n2. `objc_autorelease`\
  \ 函数会将对象添加到自动释放池中。\n\n这意味着，赋值给使用 `__weak` 修饰的变量的对象，会被添加到自动释放池中，以便该变量可以在离开 `@autoreleasepool`\
  \ 块之前安全使用。\n\n**注意：** 如果你过度使用 `__weak` 修饰的变量，自动释放池中将会存储过多的对象。\n\n为了避免这种存储问题，我建议你在使用\
  \ `__weak` 修饰的变量时，也应将对象赋值给一个 `__strong` 修饰的变量。例如，下面的示例中，变量 `o`（使用 `__weak` 修饰）被使用了五次。\n\
  \n```\n{\n    id __weak o = obj;\n    NSLog(@\"1 %@\", o);\n    NSLog(@\"2 %@\"\
  , o);\n    NSLog(@\"3 %@\", o);\n    NSLog(@\"4 %@\", o);\n    NSLog(@\"5 %@\",\
  \ o);\n}\n```\n\n该对象会被添加到自动释放池五次：\n\n```\nobjc[14481]: ##############\nobjc[14481]:\
  \ AUTORELEASE POOLS for thread 0xad0892c0\nobjc[14481]: 6 releases pending.\nobjc[14481]:\
  \ [0x6a85000]  ................  PAGE  (hot) (cold)\nobjc[14481]: [0x6a85028]  ################\
  \  POOL 0x6a85028\nobjc[14481]: [0x6a8502c]         0x6719e40  NSObject\nobjc[14481]:\
  \ [0x6a85030]         0x6719e40  NSObject\nobjc[14481]: [0x6a85034]         0x6719e40\
  \  NSObject\nobjc[14481]: [0x6a85038]         0x6719e40  NSObject\nobjc[14481]:\
  \ [0x6a8503c]         0x6719e40  NSObject\nobjc[14481]: ##############\n```\n\n\
  你可以通过将对象赋值给使用 `__strong` 修饰的变量来避免这种情况。\n\n```\n{\n    id __weak o = obj;\n    id\
  \ tmp = o;\n    NSLog(@\"1 %@\", tmp);\n    NSLog(@\"2 %@\", tmp);\n    NSLog(@\"\
  3 %@\", tmp);\n    NSLog(@\"4 %@\", tmp);\n    NSLog(@\"5 %@\", tmp);\n}\n```\n\n\
  在这种情况下，对象仅在 `tmp = o;` 这一行被添加到自动释放池一次。\n\n```\nobjc[14481]: ##############\nobjc[14481]:\
  \ AUTORELEASE POOLS for thread 0xad0892c0\nobjc[14481]: 2 releases pending.\nobjc[14481]:\
  \ [0x6a85000]  ................  PAGE  (hot) (cold)\nobjc[14481]: [0x6a85028]  ################\
  \  POOL 0x6a85028\nobjc[14481]: [0x6a8502c]         0x6719e40  NSObject\nobjc[14481]:\
  \ ##############\n```\n\n如前所述，`__weak` 修饰符不能用于 iOS4 或 OS X Snow Leopard。此外，在其他一些情况下，由于某些类不支持\
  \ `__weak` 修饰的变量，因此无法使用 `__weak` 所有权修饰符。\n\n例如，`NSMachPort` 类的对象不能赋值给任何使用 `__weak`\
  \ 修饰的变量。这些类重写了 `retain`/`release` 方法，并在其原始实现中拥有自己的引用计数。当一个对象被赋值给 `__weak` 修饰的变量时，编译器必须正确插入\
  \ `objc4` 函数，因此许多此类类无法支持 `__weak` 修饰。这些不支持的类在类声明中带有一个属性 `__attribute__((objc_arc_weak_reference_unavailable))`，该属性被定义为\
  \ `NS_AUTOMATED_REFCOUNT_WEAK_UNAVAILABLE`。即使你将此类对象赋值给一个使用 `__weak` 修饰的变量，编译器也会正确地生成错误。这些类非常罕见，所以你无需过分担心。\n\
  \n**ALLOWSWEAKREFERENCE 和 RETAINWEAKREFERENCE 方法**\n\n\n\n还有一种情况无法使用 `__weak` 所有权修饰符。当\
  \ `NSObject` 实例方法 `allowsWeakReference` 或 `retainWeakReference` 返回 `NO` 时，该对象不能被赋值给用\
  \ `__weak` 修饰的变量。这些方法在 `NSObject` 协议中没有文档说明，其声明如下：\n\n```\n- (BOOL)allowsWeakReference;\n\
  - (BOOL)retainWeakReference;\n```\n\n当对象被赋值给用 `__weak` 修饰的变量时，会调用 `allowsWeakReference`\
  \ 方法。如果该方法返回 `NO`，你的应用程序将会终止：\n\n`cannot form weak reference to instance (0x753e180)\
  \ of class MyObject`\n\n这意味着你不应该将此类实例赋值给用 `__weak` 修饰的变量。你应该能在类的参考文档中了解到该类是否有此限制。\n\
  \n当 `retainWeakReference` 方法返回 `NO` 时，用户获取到的值为 `nil`。让我们通过一个例子来看一下。\n\n```\n{\n\
  \    id __strong obj = [[NSObject alloc] init];\n    id __weak o = obj;\n    NSLog(@\"\
  1 %@\", o);\n    NSLog(@\"2 %@\", o);\n    NSLog(@\"3 %@\", o);\n    NSLog(@\"4\
  \ %@\", o);\n    NSLog(@\"5 %@\", o);\n}\n```\n\n对象在变量 `obj` 的作用域结束之前一直存在。因此，在此期间变量\
  \ `o` 是可用的。结果如下：\n\n```\n1 <NSObject: 0x753e180>\n2 <NSObject: 0x753e180>\n3 <NSObject:\
  \ 0x753e180>\n4 <NSObject: 0x753e180>\n5 <NSObject: 0x753e180>\n```\n\n让我们看看如果 `retainWeakReference`\
  \ 返回 `NO` 会发生什么。下面的源代码展示了如何实现 `retainWeakReference`。\n\n```\n@interface MyObject\
  \ : NSObject\n{\n    NSUInteger count;\n}\n@end\n\n@implementation MyObject\n- (id)init\n\
  {\n    self = [super init];\n    return self;\n}\n- (BOOL)retainWeakReference\n\
  {\n    if (++count > 3)\n        return NO;\n    return [super retainWeakReference];\n\
  }\n@end\n```\n\n在这个例子中，`retainWeakReference` 方法在被调用超过三次后返回 `NO`。然后将上面的例子从 `NSObject`\
  \ 修改为 `MyObject`。\n\n```\n{\n    id __strong obj = [[MyObject alloc] init];\n  \
  \  id __weak o = obj;\n    NSLog(@\"1 %@\", o);\n    NSLog(@\"2 %@\", o);\n    NSLog(@\"\
  3 %@\", o);\n    NSLog(@\"4 %@\", o);\n    NSLog(@\"5 %@\", o);\n}\n```\n\n结果如下：\n\
  \n```\n1 <MyObject: 0x753e180>\n2 <MyObject: 0x753e180>\n3 <MyObject: 0x753e180>\n\
  4 (null)\n5 (null)\n```\n\n当 `retainWeakReference` 方法返回 `NO` 时，对象将无法被访问。如果框架中的某些类使用了这种机制，其类参考文档应该对此有所说明。此外，`allowsWeakReference`\
  \ 和 `retainWeakReference` 方法是由运行时库在与 `__weak` 修饰符相关的流程中调用的。因此，如果在这些方法内部调用了某些运行时库的\
  \ API，你的应用程序可能会挂起。这些方法没有文档说明，应用程序开发者也不应该实现它们。但如果你出于某种原因需要实现它们，你则需要充分理解它们的工作原理。\n\
  \n## `__autoreleasing` 所有权修饰符\n\n将对象赋值给任何用 `__autoreleasing` 修饰的变量，等同于在非 ARC 环境中调用\
  \ `autorelease` 方法。让我们通过源代码来看它是如何工作的。\n\n```\n@autoreleasepool {\n    id __autoreleasing\
  \ obj = [[NSObject alloc] init];\n}\n```\n\n它将一个 `NSObject` 类的实例添加到自动释放池中。让我们看看编译器是如何翻译它的。\n\
  \n```\n/* 编译器的伪代码 */\nid pool = objc_autoreleasePoolPush();\nid obj = objc_msgSend(NSObject,\
  \ @selector(alloc));\nobjc_msgSend(obj, @selector(init));\nobjc_autorelease(obj);\n\
  objc_autoreleasePoolPop(pool);\n```\n\n它的工作方式正如我之前根据 Apple 的实现所解释的那样。（参见第 1 章，“Apple\
  \ 对 autorelease 的实现”部分。）`autorelease` 机制本身的工作方式与非 ARC 环境完全相同，尽管源代码有所不同。\n\n如果对象不是通过\
  \ `alloc`/`new`/`copy`/`mutableCopy` 方法组获取的，会发生什么？让我们看看下一个使用 `NSMutableArray` 类方法\
  \ `array` 的例子。\n\n```\n@autoreleasepool {\n    id __autoreleasing obj = [NSMutableArray\
  \ array];\n}\n```\n\n让我们检查一下它与前面的例子有何不同。\n\n```\n/* 编译器的伪代码 */\nid pool = objc_autoreleasePoolPush();\n\
  id obj = objc_msgSend(NSMutableArray, @selector(array));\nobjc_retainAutoreleasedReturnValue(obj);\n\
  objc_autorelease(obj);\nobjc_autoreleasePoolPop(pool);\n```\n\n尽管使用了 `objc_retainAutoreleasedReturnValue`，但其他与自动释放池相关的代码与前面的例子完全相同。\n\
  \n## `__unsafe_unretained` 所有权修饰符\n\n最后一个所有权修饰符是 `__unsafe_unretained`。正如我在“对象的立即销毁”部分中所解释的，对用\
  \ `__unsafe_unretained` 修饰的变量进行赋值，在伪代码中从不出现。与其他所有权修饰符不同，编译器对此修饰符不做任何特殊处理。它就像 C 语言中的赋值一样工作。\n\
  \n现在我们已经了解了每个所有权修饰符的实现。你现在应该对 ARC 有了更好的理解。在最后的章节中，对引用计数的数量讨论得并不多。在下一节中，我终于会对此进行解释。\n\
  \n\n\n### 引用计数\n\n本书有意不对引用计数的数值本身做过多解释，因为要正确看待引用计数，就不应关注数值本身。若你仍想了解实际数值，可通过以下方式获取：\n\
  \n`uintptr_t _objc_rootRetainCount(id obj)`\n\n调用 `_objc_rootRetainCount` 函数，即可获得引用计数的数值。来看一个示例。\n\
  \n```\n{\n    id __strong obj = [[NSObject alloc] init];\n    NSLog(@\"retain count\
  \ = %d\", _objc_rootRetainCount(obj));\n}\n```\n\n在上述代码中，变量 `obj` 仅有一个强引用。因此，它会显示：\n\
  \n`retain count = 1`\n\n我们再用 `__weak` 所有权修饰符来验证一下。\n\n```\n{\n    id __strong obj\
  \ = [[NSObject alloc] init];\n    id __weak o = obj;\n    NSLog(@\"retain count\
  \ = %d\", _objc_rootRetainCount(obj));\n}\n```\n\n用 `__weak` 修饰的变量不具备所有权，因此引用计数的数值不应发生变化。\n\
  \n`retain count = 1`\n\n没错，正如我们所料。那么，使用 `__autoreleasing` 的情况又是怎样的呢？\n\n```\n@autoreleasepool\
  \ {\n    id __strong obj = [[NSObject alloc] init];\n    id __autoreleasing o =\
  \ obj;\n    NSLog(@\"retain count = %d\", _objc_rootRetainCount(obj));\n}\n```\n\
  \n结果是：\n\n`retain count = 2`\n\n数值为 2，是因为一个强引用以及该对象已被添加到自动释放池中。我们来看看离开 `@autoreleasepool`\
  \ 块后的数值。\n\n```\n{\n    id __strong obj = [[NSObject alloc] init];\n    @autoreleasepool\
  \ {\n        id __autoreleasing o = obj;\n        NSLog(@\"retain count = %d in\
  \ @autoreleasepool\", _objc_rootRetainCount(obj));\n    }\n    NSLog(@\"retain count\
  \ = %d\", _objc_rootRetainCount(obj));\n}\n```\n\n以下是结果：\n\n`retain count = 2 in\
  \ @autoreleasepool`\n`retain count = 1`\n\n对象如预期般被释放了。\n\n此外，我们再来确认一下，当对象通过 `__weak`\
  \ 修饰的变量使用时，它是否会被添加到自动释放池中。可以通过 `objc_autoreleasePoolPrint` 函数查看自动释放池的状态。\n\n```\n\
  @autoreleasepool {\n    id __strong obj = [[NSObject alloc] init];\n    _objc_autoreleasePoolPrint();\n\
  \    id __weak o = obj;\n    NSLog(@\"before using __weak: retain count = %d\",\
  \ _objc_rootRetainCount(obj));\n    NSLog(@\"class = %@\", [o class]);\n    NSLog(@\"\
  after using __weak: retain count = %d\", _objc_rootRetainCount(obj));\n    _objc_autoreleasePoolPrint();\n\
  }\n```\n\n结果如下：\n\n```\nobjc[14481]: ##############\nobjc[14481]: AUTORELEASE POOLS\
  \ for thread 0xad0892c0\nobjc[14481]: 1 releases pending.\nobjc[14481]: [0x6a85000]\
  \  ................  APAGE  (hot) (cold)\nobjc[14481]: [0x6a85028]  ################\
  \  POOL 0x6a85028\nobjc[14481]: ##############\nbefore using __weak: retain count\
  \ = 1\nclass = NSObject\nafter using __weak: retain count = 2\nobjc[14481]: ##############\n\
  objc[14481]: AUTORELEASE POOLS for thread 0xad0892c0\nobjc[14481]: 2 releases pending.\n\
  objc[14481]: [0x6a85000]  ................  PAGE  (hot) (cold)\nobjc[14481]: [0x6a85028]\
  \  ################  POOL 0x6a85028\nobjc[14481]: [0x6a8502c]         0x6719e40\
  \  NSObject\nobjc[14481]: ##############\n```\n\n上述结果表明，当对象通过 `__weak` 修饰的变量使用时，即便没有使用\
  \ `__autoreleasing`，该对象也会被添加到自动释放池中。\n\n顺便提一下，`_objc_rootRetainCount` 函数并非每次都能返回可靠的数值。在某些情况下，即使对象已被废弃或地址无效，它也可能返回\
  \ 1。此外，如果对象在多个线程中使用，由于竞态条件问题，该数值可能不准确。^(2) 尽管 `_objc_rootRetainCount` 函数有助于调试，但使用时仍需谨慎。\n\
  \n### 小结\n\n在 第 1 章 中，我们学习了引用计数的内存管理。在 第 2 章 中，我们了解了启用 ARC 后会发生什么变化以及必须遵守哪些规则。在本章中，我们通过查看伪代码学习了\
  \ ARC 是如何实现的。\n\n现在你已经学习了 ARC。请在 OSX 和 iOS 开发中有效利用它。\n\n__________\n\n² 维基百科，“竞态条件”，[`en.wikipedia.org/wiki/Race_condition`](http://en.wikipedia.org/wiki/Race_condition)\n\
  \n## 第 4 章\n\n## Blocks 入门\n\nBlocks 是为 OSX Snow Leopard、iOS4 及更高版本引入的 C 语言扩展。本章将详细讲解\
  \ Blocks 是什么，以便下一章介绍其实现时更有意义。了解实现有助于理解如何使用它们以及它们的工作原理。为了正确认识 Blocks，请看以下场景。\n\n\
  当你阅读 iOS 或 OSX 应用程序源代码时，可能会发现其中有一些奇怪的语句。这些语句在函数内部包含了函数声明。根据以往的经验，我们在 C 和 Objective-C\
  \ 中并未发现过这种语法。GameKit 组件（iOS4 中的新组件）经常使用这种语法来使应用程序源代码更优雅。我们来看一个示例。\n\n```\n- (void)reportScore:(int64_t)score\
  \ forCategory:(NSString*)category\n{\n        /* 省略 */\n        [scoreReporter reportScoreWithCompletionHandler:^(NSError\
  \ *error) {  \n                    /* 分数报告后要执行的任务 */\n                if (error\
  \ != nil)\n                 {\n                    /* 报告时发生错误时要执行的任务 */\n      \
  \          }\n        }]\n}\n```\n\n这个示例展示了如何使用 GameKit API 来报告游戏分数。对用户来说，最重要的是要知道分数是否已成功报告给服务器。应用程序必须监控其完成情况并检查是否发生错误。在这种情况下，指定在报告完成后自动执行的任务非常有用。而且，如果你能非常轻松地编写这些任务，那就更方便了。\n\
  \n在 GameKit 组件中，你可以通过使用 Blocks 来实现这一点。在示例中，“分数报告后要执行的任务”这部分注释所在的位置就是 Blocks。这部分代码在分数报告完成之后执行，而不是在\
  \ `reportScoreWithCompletionHandler:` 方法被调用之后。如示例所示，你无需监控报告何时完成，通过使用 Blocks 就能非常优雅地编写这些任务。\n\
  \n在本章中，你将学习如何使用 Blocks。我们将从了解什么是 Block 以及为什么需要 Blocks 开始。然后，我们将学习如何在应用程序中使用 Blocks，例如如何按字面形式编写\
  \ Block，以及如何在 Block 中使用变量（如源代码示例所示）。\n\n## Blocks 初探\n\n如前所述，Blocks 是 C 语言的一个新扩展。简而言之，它们可以被解释为“带有自动（局部）变量的匿名函数”。让我们快速了解一下这两个部分以及它们是如何实现的。\n\
  \n\n\n### 匿名函数\n\n顾名思义，匿名函数就是没有名称的函数。然而在标准 C 与 Objective-C 中，若不借助块（blocks）则无法创建此类函数。C++\
  \ 中与块概念相同的 lambda 表达式终于在 C++11 中引入。\n\n例如：\n\n```\nint func(int count);\n```\n\n\
  在这段源代码中，声明了一个名为 `func` 的函数。若要调用该函数，必须像下面这样使用名称 `func`：\n\n```\nint result = func(10);\n\
  ```\n\n你可能会认为可以通过函数指针在不知道名称的情况下调用函数：\n\n```\nint result = (*funcptr)(10);\n```\n\
  \n实际上，要将函数赋值给指针，仍然需要其名称，如下所示：\n\n```\nint (*funcptr)(int) = &func;\nint result =\
  \ (*funcptr)(10);\n```\n\n正如本章各示例所示，要使用函数，你必须为其命名。但通过使用块（Blocks），你不再需要这样做。借助块，可以使用匿名函数。程序员需要为众多事物命名，包括函数、变量、方法、属性、类、框架等等，因此据说“命名”是程序员的基本工作。所以函数不需要名字是件很棒的事！在“块字面量语法”一节中，我将详细解释块是如何实现匿名函数的。\n\
  \n现在你已了解什么是匿名函数，理解“连同自动（局部）变量一起使用”的含义至关重要。\n\n### 变量\n\n我们来看看 C 语言中哪些变量可以使用。\n\n\
  - 自动变量（局部变量）\n- 函数参数\n- 静态变量（静态局部变量）\n- 静态全局变量\n- 全局变量\n\n在这些变量类型中，静态变量、静态全局变量和全局变量能够跨函数调用保持值不变，并且它们存储在应用程序的一个内存区域中。\n\
  \n从这种意义上说，这三种类型除了作用域不同外，其他方面都是一样的。即使跨函数调用，这些变量也始终保留它们的值。换句话说，应用程序中任何地方使用的都必须是同一个变量值。为了说明这一点，我们来看一个按钮事件的回调函数示例。\n\
  \n```\nint buttonId = 0;\nvoid buttonCallback(int event)\n{\n    printf(\"buttonId:%d\
  \ event=%d\\n\", buttonId, event);\n}\n```\n\n如果应用程序中只有一个按钮，这段源代码可以正常工作。但如果像下面这样有多个按钮呢？\n\
  \n```\nint buttonId;\nvoid buttonCallback(int event)\n{\n    printf(\"buttonId:%d\
  \ event=%d\\n\", buttonId, event);\n}\n\nvoid setButtonCallbacks()\n{\n    for (int\
  \ i = 0; i < BUTTON_MAX; ++i) {\n        buttonId = i;\n        setButtonCallback(BUTTON_IDOFFSET\
  \ + i, &buttonCallback);\n    }\n}\n```\n\n这段源代码的问题很明显。全局变量 `buttonId` 只有一个，被所有回调共享。循环结束后，所有回调都使用了同一个值。当然，你可以通过将按钮\
  \ ID 作为回调函数的参数来解决这个问题。\n\n```\nvoid buttonCallback(int buttonId, int event)\n{\n\
      printf(\"buttonId:%d event=%d\\n\", buttonId, event);\n}\n```\n\n在这种情况下，调用者不仅需要存储函数指针，还需要存储按钮\
  \ ID。顺便提一下，在 C++ 和 Objective-C 中，针对这种情况会使用类。首先，你声明一个包含成员变量的类，然后从该类创建对象，将值存储在成员变量中。以下源代码展示了如何对按钮回调示例使用类。\n\
  \n```\n@interface ButtonCallbackObject : NSObject\n{\n    int buttonId_;\n}\n@end\n\
  \n@implementation ButtonCallbackObject\n- (id) initWithButtonId:(int)buttonId\n\
  {\n    self = [super init];\n    buttonId_ = buttonId;\n    return self;\n}\n\n\
  - (void) callback:(int)event\n{\n    NSLog(@\"buttonId:%d event=%d\\n\", buttonId_,\
  \ event);\n}\n@end\n```\n\n回调的调用者只需存储对象即可，因为该类也可以保存按钮 ID 的值。\n\n```\nvoid setButtonCallbacks()\n\
  {\n    for (int i = 0; i < BUTTON_MAX; ++i) {\n        ButtonCallbackObject *callbackObj\
  \ =\n            [[ButtonCallbackObject alloc] initWithButtonId:i];\n        setButtonCallbackUsingObject(BUTTON_IDOFFSET,\
  \ callbackObj);\n    }\n}\n```\n\n如你所见，在 C++ 和 Objective-C 中，类的声明和实现需要多行源代码。然而，这可以通过块（Blocks）来解决。\n\
  \n### 块的救赎\n\n块提供了像 C++ 或 Objective-C 中类一样保存变量的功能，但代码量少得多。其源代码数量几乎与函数相同。正如我所说“连同自动（局部）变量一起使用”，块保存了自动变量的值。以下代码展示了如何用块编写前面的示例。\n\
  \n```\nvoid setButtonCallbacks()\n{\n    for (int i = 0; i < BUTTON_MAX; ++i) {\n\
          setButtonCallbackUsingBlock(BUTTON_IDOFFSET + i, ^(int event) {\n            printf(\"\
  buttonId:%d event=%d\\n\", i, event); });\n    }\n}\n```\n\n其语法在“块字面量语法”一节中解释，自动变量如何被存储则在“捕获自动变量”一节中说明。在这段源代码中，带有变量\
  \ `i` 值的匿名函数被设置为回调。使用块时，匿名函数被称为“块字面量”或简称为“块”。正如我所说，借助块，你可以将匿名函数与自动（局部）变量一起使用，这意味着块能够解决使用静态（或全局）变量时的问题，并且你可以用更少的源代码实现与\
  \ C++ 或 Objective-C 类相同的功能。\n\n请注意，“将匿名函数与自动（局部）变量一起使用”并非新概念。事实上，它在许多语言中都很常见。在计算机科学中，这被称为“闭包”或“lambda\
  \ 演算”。表 4-1 展示了它在其他语言中的名称。\n\n![images](img/t0401.jpg)\n\n在接下来的章节中，我们将从块字面量的语法开始，学习如何使用块。\n\
  \n\n\n## 块字面量语法\n\n本节介绍如何编写块字面量。通过示例来解释块字面量的语法。阅读完本节后，您将能够编写块字面量。\n\n首先，让我们看看如何用\
  \ C 语言声明一个函数。\n\n```\nvoid func(int event) {\n    printf(\"buttonId:%d event=%d\\\
  n\", i, event);\n}\n```\n\n这意味着它由返回类型、函数名、参数列表及其实现来声明。接下来看看块字面量是如何编写的。在前面几节中，块字面量是以缩略形式编写的，如下所示\n\
  \n```\n^(int event) {\n    printf(\"buttonId:%d event=%d\\n\", i, event);\n}\n```\n\
  \n您也可以将其完整地写为\n\n```\n^void (int event) {\n    printf(\"buttonId:%d event=%d\\n\"\
  , i, event);\n}\n```\n\n这个块字面量与 C 语言的函数声明之间只有两个区别：没有函数名，并且有一个脱字符号（`^`）。\n\n块字面量没有函数名称。这使其成为一个匿名函数。第二个区别意味着，对于块字面量，`^`（脱字符）正好写在函数的返回类型之前。从现在开始，您很可能会更频繁地看到这个符号，因为\
  \ Blocks 将会在 OSX 和 iOS 应用中变得常见。\n\n为了确认，以下是块字面量语法的 BNF。^(1)\n\n```\nBlock_literal_expression\
  \ ::= ^ block_decl compound_statement_body\nblock_decl ::= return_type\nblock_decl\
  \ ::= parameter_list\nblock_decl ::= type_expression\n```\n\n即使您对 BNF 一无所知，您也可能能猜到它的含义。请参见\
  \ 图 4-1。\n\n![images](img/9781430241164_Fig04-01.jpg)\n\n**图 4-1.** *块字面量语法*\n\n\
  返回类型与 C 语言中函数声明的返回类型完全相同。参数列表和表达式也是相同的。当然，如果存在返回语句，返回类型必须与之匹配。例如，我们可以按如下方式使用块字面量。\n\
  \n```\n^int (int count){return count + 1;}\n```\n\n正如前面的例子所示，有些项是可以省略的。首先，你可以省略返回类型，如\
  \ 图 4-2 所示。\n\n![images](img/9781430241164_Fig04-02.jpg)\n\n**图 4-2.** *不带返回类型的块字面量语法*\n\
  \n当省略返回类型时，会使用返回语句中的变量类型替代。当块字面量没有返回语句时，则使用 `void`。当 Block 有多个返回语句时，它们的所有变量类型必须相同。当返回类型被省略时，写法如下\n\
  \n```\n^(int count){return count + 1;}\n```\n\n在这个块字面量中，由于其返回语句，返回类型是 `int`。\n\n\
  __________\n\n¹ 维基百科，“巴科斯-诺尔范式” [`http://en.wikipedia.org/wiki/Backus-Naur_Form`](http://en.wikipedia.org/wiki/Backus-Naur_Form)\n\
  \n如果函数不带参数，参数列表也可以省略。下一个源代码是一个不带参数的 Block 示例。\n\n```\n^void (void){printf(\"Blocks\\\
  n\");}\n```\n\n这可以简写如下。\n\n```\n^{printf(\"Blocks\\n\");}\n```\n\n这个简写的块字面量（图 4-3）将证明是您最熟悉的形式。\n\
  \n![images](img/9781430241164_Fig04-03.jpg)\n\n**图 4-3.** *不带返回类型和参数列表的块字面量语法*\n\
  \n## Block 类型变量\n\n正如我们所学，块字面量看起来与函数定义相同，只是它没有名称并且带有 `^` 符号。对于 C 函数，函数的地址可以赋值给函数指针类型的变量。\n\
  \n```\nint func(int count)\n{\n    return count + 1;\n}\nint (*funcptr)(int) = &func;\n\
  ```\n\n在示例中，函数 `func` 的地址被赋值给了变量 `funcptr`。\n\n以类似的方式，块字面量可以赋值给 Block 类型的变量，这意味着当源代码中存在一个块字面量时，会生成一个值。该值可以赋值给\
  \ Block 类型的变量。在 Blocks 中，这个生成的值也被称为 Block。“Block” 这个术语既用于表示源代码中的块字面量本身，也用于表示由块字面量生成的值。接下来，让我们看看如何声明\
  \ Block 类型变量。\n\n```\nint (^blk)(int);\n```\n\n如果您比较之前函数指针的源代码，您会看到 Block 类型的变量声明与函数指针类型的声明相同，只是将\
  \ `*` 替换为了 `^`。与普通的 C 变量类型一样，此声明可用于：\n\n*   自动变量\n*   函数参数\n*   静态变量\n*   静态全局变量\n\
  *   全局变量\n\n接下来，让我们看看如何将一个 Block 从块字面量赋值给变量。\n\n```\nint (^blk)(int) = ^(int count){return\
  \ count + 1;};\n```\n\n一个 Block 是从以 `^` 开头的块字面量生成的。然后该 Block 被赋值给变量 `blk`。当然，您可以将该值赋值给其他\
  \ Block 类型的变量。\n\n```\nint (^blk1)(int) = blk;\nint (^blk2)(int);\nblk2 = blk1;\n\
  ```\n\n函数可以接受 Block 类型的参数。\n\n```\nvoid func(int (^blk)(int))\n{\n```\n\n同样，函数也可以返回一个\
  \ Block。\n\n```\nint (^func()(int))     {\n    return ^(int count){return count\
  \ + 1;};\n}\n```\n\n如您所见，带有 Block 类型的源代码会变得复杂，尤其是当它用于函数参数或其返回类型时。您可以像处理函数指针那样，通过使用\
  \ `typedef` 来避免这种复杂性。\n\n```\ntypedef int (^blk_t)(int);\n```\n\n使用这个 `typedef`，您可以声明\
  \ `blk_t` 类型的变量。因此，之前的源代码可以修改如下。\n\n```\n/* 原始代码\nvoid func(int (^blk)(int))\n*/\n\
  void func(blk_t blk)\n{\n\n/* 原始代码\nint (^func()(int))\n*/\nblk_t func()\n{\n```\n\
  \n使用 `typedef` 后，函数定义变得非常简单。\n\n顺便说一下，您可以像调用函数一样执行赋值给变量的 Block，并且执行 Block 的方式与调用赋值给变量的函数几乎完全相同。调用函数指针类型的变量\
  \ `funcptr` 的方式如下\n\n```\nint result = (*funcptr)(10);\n```\n\n调用 Block 类型的变量 `blk`\
  \ 的方式如下\n\n```\nint result = blk(10);\n```\n\n如您所见，调用 Block 类型变量的方式与调用 C 函数完全相同。下一个示例展示了如何执行通过函数参数传递的\
  \ Block。\n\n```\nint func(blk_t blk, int rate)\n{\n    return blk(rate);\n}\n```\n\
  \n当然，Block 也可以与 Objective-C 方法一起使用。\n\n```\n- (int) methodUsingBlock:(blk_t)blk\
  \ rate:(int)rate     {\n        return blk(rate);\n}\n```\n\n您可以像使用 C 语言中的变量一样使用\
  \ Block 类型变量。您也可以使用指向 Block 类型变量的指针，这意味着您可以使用 Block 指针类型的变量。\n\n```\ntypedef int\
  \ (^blk_t)(int);\nblk_t blk = ^(int count){return count + 1;};\nblk_t *blkptr =\
  \ &blk;\n(*blkptr)(10);\n```\n\n\n\n### 捕获自动变量\n\n你已经了解了 Block 字面量和 Block 类型变量，现在应该理解了“带有自动（局部）变量的匿名函数”中的“匿名函数”部分。\n\
  \n接下来，你需要学习“带有自动（局部）变量”这部分含义。对于 Block 而言，这可以重新表述为“捕获自动变量的值”。下面的示例展示了如何实现这种捕获。\n\n\
  ```\nint main()\n{\n    int dmy = 256;\n    int val = 10;\n    const char *fmt =\
  \ \"val = %d\\n\";\n    void (^blk)(void) = ^{printf(fmt, val);};\n\n    val = 2;\n\
  \    fmt = \"These values were changed. val = %d\\n\";\n\n    blk();\n\n    return\
  \ 0;\n}\n```\n\n在这段源代码中，声明了自动变量 `fmt` 和 `val`，然后在 Block 字面量中使用了它们。在编写 Block 字面量的地方，会自动变量的值将被捕获：这些值会在执行\
  \ Block 字面量时被存储起来。由于值已经被捕获，即使在 Block 字面量执行之后修改它们，Block 中变量的值也不会受到影响。在这段源代码中，自动变量\
  \ `fmt` 和 `val` 在 Block 字面量之后被修改。结果是：\n\n```\nval = 10\n```\n\n它不会显示“These values\
  \ were changed. val = 2”。它显示的是执行 Block 字面量时变量的值。当执行时，自动变量 `fmt` 指向 `\"val = %d\\\
  n\"`，而 `val` 的整数值为 10。这些值在该时刻被捕获，并在 Block 执行时使用。\n\n以上就是关于捕获自动变量的总结。接下来你需要学习一个说明符，它被称为\
  \ `__block` 说明符。通过使用它，你可以在不捕获变量的情况下修改自动变量。该说明符将在下一节中解释。\n\n### `__block` 说明符\n\n\
  当自动变量被捕获时，这些值在 Block 内是只读的。这些变量不能被修改。下面的源代码尝试将 1 赋值给自动变量 `val`。\n\n```\nint val\
  \ = 0;\nvoid (^blk)(void) = ^{val = 1;};\nblk();\nprintf(\"val = %d\\n\", val);\n\
  ```\n\n在这个源代码中，一个值被赋值给在 Block 字面量外部声明的自动变量。这会导致如下编译错误。\n\n```\nerror: variable is\
  \ not assignable (missing __block type specifier)\n         void (^blk)(void) =\
  \ ^{val = 1;};\n                           ~~~ ^\n```\n\n当在 Block 字面量外部声明自动变量时，你可以使用\
  \ `__block` 说明符在 Block 内部给该变量赋值。以下源代码为自动变量 `val` 使用了 `__block` 说明符，使得该变量在 Block\
  \ 内部可以被赋值。\n\n```\n__block int val = 0;    \nvoid (^blk)(void) = ^{val = 1;};\n\
  blk();\nprintf(\"val = %d\\n\", val);\n```\n\n结果是：\n\n```\nval = 1\n```\n\n通过使用\
  \ `__block` 说明符声明变量，你可以在 Block 内部给该变量赋值。这些由 `__block` 指定的自动变量被称为“`__block` 变量”。\n\
  \n### 被捕获的自动变量\n\n如前所述，如果给一个被捕获的自动变量赋值，则会发生编译错误。\n\n```\nint val = 0;\nvoid (^blk)(void)\
  \ = ^{val = 1;};\n```\n\n这会导致以下编译错误。\n\n```\nerror: variable is not assignable (missing\
  \ __block type specifier)        \n    void (^blk)(void) = ^{val = 1;};\n      \
  \                ~~~ ^\n```\n\n当捕获 Objective-C 对象并调用方法修改对象本身时，会发生什么？它也会导致编译错误吗？\n\
  \n```\nid array = [[NSMutableArray alloc] init];\nvoid (^blk)(void) = ^{\n    id\
  \ obj = [[NSObject alloc] init];\n    [array addObject:obj];\n};\n```\n\n没有问题。只有当某个值被赋值给被捕获的变量\
  \ `array` 本身时，才会发生错误。在这段源代码中，被捕获变量的值是 `NSMutableArray` 类的一个对象。用 C 语言术语来说，该值是一个指向\
  \ `NSMutableArray` 类对象结构体实例的指针。如果将某个值赋值给被捕获的变量 `array`，则会发生编译错误。\n\n下面的源代码将一个值赋值给了被捕获的自动变量，因此会发生编译错误。\n\
  \n```\nid array = [[NSMutableArray alloc] init];\nvoid (^blk)(void) = ^{\n    array\
  \ = [[NSMutableArray alloc] init];\n};\n```\n\n```\nerror: variable is not assignable\
  \ (missing __block type specifier)\n    array = [[NSMutableArray alloc] init];\n\
  \  ~~~~ ^\n```\n\n为此，自动变量需要使用 `__block` 说明符。\n\n```\n__block id array = [[NSMutableArray\
  \ alloc] init];\nvoid (^blk)(void) = ^{\n    array = [[NSMutableArray alloc] init];\n\
  };\n```\n\n还有一点。当你使用 C 数组时，必须有意识地使用指针。示例如下。\n\n```\nconst char text[] = \"hello\"\
  ;\n\nvoid (^blk)(void) = ^{\n     printf(\"%c\\n\", text[2]);\n};\n```\n\n它使用了一个包含\
  \ C 字符串字面量的数组。没有值被赋值给被捕获的自动变量。看起来没有问题，但会导致如下编译错误。\n\n```\nerror: cannot refer to\
  \ declaration with an array type inside block\n            printf(\"%c\\n\", text[2]);\n\
  \nnote: declared here\n        const char text[] = \"hello\";\n       ^\n```\n\n\
  这是因为当前的 Block 实现无法捕获 C 数组。你可以像下面这样通过使用指针来避免这个问题。\n\n```\nconst char *text = \"hello\"\
  ;\nvoid (^blk)(void) = ^{\n    printf(\"%c\\n\", text[2]);\n};\n```\n\n## 总结\n\n\
  本章解释了 Block。你已经了解到 Block 是“带有自动（局部）变量的匿名函数”。下一章将展示 Block 是如何实现的，以便你更好地理解其用法。\n\n"
- "# 第 5 章：Block 的实现\n\n在前面的章节中，我们了解到 Block 是一个带有自动变量的匿名函数。在本章中，我们将通过其实现来详细了解 Block\
  \ 的运作机制。我们将从 Block 实现的基本概念开始，然后展示各种情况以了解 Block 的工作方式，例如自动变量是如何被捕获的，Block 和 `__block`\
  \ 变量是如何存储在内存中的，以及对象是如何被 Block 捕获的。此外，我们还会展示一些与循环引用和 copy/release 方法相关的 Block 陷阱。除非特别说明，所有示例源代码均假设启用了\
  \ ARC。\n\n## 揭开 Block 的底层原理\n\n你可能会认为 Block 语法是某种特殊的东西。但实际上，编译器将其视为普通的 C 语言源代码。支持\
  \ Block 的编译器会将包含 Block 的源代码转换为标准的 C 源代码；然后像往常一样进行编译。\n\n这只是一个概念性的解释。实际上，编译器从不生成人类可读的源代码。但是，`clang`（LLVM\
  \ 编译器）具有生成人类可读转换后源代码的功能。\n\n在本节中，我们将借助转换后的源代码来展示 Block 是如何实现的。源代码有些复杂，因此我们将逐步进行阐述。首先概览一下，然后再深入细节。\n\
  \n\n\n### 转换源码\n\n使用 `\"-rewrite-objc\"` 编译器选项，包含 Block 语法的源码可以转换成标准 C++ 源码。虽然生成的源码是\
  \ C++，但除了使用 struct 的构造函数外，它几乎完全用 C 语言编写。\n\n`clang -rewrite-objc file_name_of_the_source_code`\n\
  \n让我们看看源码（清单 5-1）是如何被转换的。\n\n**清单 5-1.** *包含简单 Block 的示例*\n\n```\nint main()\n{\n\
  \    void (^blk)(void) = ^{printf(\"Block\\n\");};\n    blk();\n    return 0;\n\
  }\n```\n\n这段源码包含一个最简单的 Block 字面量，它没有返回值类型，也没有参数列表。Clang 将源码转换为如清单 5-2 所示。\n\n**清单\
  \ 5-2.** *清单 5-1 的转换后源码*\n\n```\nstruct __block_impl {\n    void *isa;\n    int\
  \ Flags;\n    int Reserved;\n    void *FuncPtr;\n};\n\nstruct __main_block_impl_0\
  \ {\n    struct __block_impl impl;\n    struct __main_block_desc_0* Desc;\n\n  \
  \  __main_block_impl_0(void *fp, struct __main_block_desc_0 *desc, int flags=0)\
  \ {\n        impl.isa = &_NSConcreteStackBlock;\n        impl.Flags = flags;\n \
  \       impl.FuncPtr = fp;\n        Desc = desc;\n    }\n};\n\nstatic void __main_block_func_0(struct\
  \ __main_block_impl_0 *__cself)\n{\n    printf(\"Block\\n\");\n}\n\nstatic struct\
  \ __main_block_desc_0\n{\n    unsigned long reserved;\n    unsigned long Block_size;\n\
  } __main_block_desc_0_DATA = {\n    0,\n    sizeof(struct __main_block_impl_0)\n\
  };\n\nint main() {\n    void (*blk)(void) =\n        (void (*)(void))&__main_block_impl_0(\n\
  \            (void *)__main_block_func_0, &__main_block_desc_0_DATA);\n\n    ((void\
  \ (*)(struct __block_impl *))(\n        (struct __block_impl *)blk)->FuncPtr)((struct\
  \ __block_impl *)blk);\n\n    return 0;\n}\n```\n\n它从 8 行增加到了 43 行！但当你仔细看时，会发现它并没有那么复杂。我们将从原始源码中的\
  \ Block 字面量开始，逐步学习。\n\n`^{printf(\"Block\\n\")};`\n\n在转换后的源码中，你可以看到同样的语句。\n\n```\n\
  static void __main_block_func_0(struct __main_block_impl_0 *__cself)\n{\n    printf(\"\
  Block\\n\");\n}\n```\n\n如转换后的源码所示，匿名函数被转换为 C 函数。函数名是自动生成的，由 Block 字面量所在的函数名及其在函数中出现顺序的编号组成。在示例中，函数名是\
  \ `\"main\"`，并且它是第一个 Block 字面量（序号为 0）。\n\n该函数的参数 `__cself` 类似于 Objective-C 实例方法中的\
  \ `\"self\"` 或 C++ 实例方法中的 `\"this\"`。我们接下来会讨论这些。\n\n### C++ 中的 this 与 Objective-C\
  \ 中的 self\n\n在 C++ 中，类的实例方法定义如下。\n\n```\nvoid MyClass::method(int arg)\n{\n    printf(\"\
  %p %d\\n\", this, arg);\n}\n```\n\nC++ 编译器会将其转换为一个 C 函数。\n\n```\nvoid __ZN7MyClass6methodEi(MyClass\
  \ *this, int arg)\n{\n    printf(\"%p %d\\n\", this, arg);\n}\n```\n\n`__ZN7MyClass6methodEi`\
  \ 函数是 `MyClass::method` 的底层实现。参数 `\"this\"` 被传递给该函数。这个方法是这样调用的：\n\n```\nMyClass\
  \ cls;\ncls.method(10);\n```\n\nC++ 编译器会将其转换为调用 C 函数的源码，如下所示。\n\n```\nstruct MyClass\
  \ cls;\n__ZN7MyClass6methodEi(&cls, 10);\n```\n\n`\"this\"` 是 `MyClass` 类（struct）本身的实例。此外，让我们检查一下\
  \ Objective-C 中的实例方法。\n\n```\n- (void) method:(int)arg\n{\n    NSLog(@\"%p %d\\\
  n\", self, arg);\n}\n```\n\n与 C++ 方法相同，Objective-C 编译器会将方法转换为一个 C 函数。\n\n```\nvoid\
  \ _I_MyObject_method_(struct MyObject *self, SEL _cmd, int arg)\n{\n    NSLog(@\"\
  %p %d\\n\", self, arg);\n}\n```\n\n并且，与 C++ 中的 `\"this\"` 一样，`\"self\"` 作为第一个参数传递。我们再看看它的调用者。\n\
  \n```\nMyObject *obj = [[MyObject alloc] init];\n[obj method:10];\n```\n\n使用 `clang`\
  \ 的 `-rewrite-objc` 选项，我们可以看到它如何被转换：\n\n```\nMyObject *obj = objc_msgSend(\n   \
  \ objc_getClass(\"MyObject\"), sel_registerName(\"alloc\"));\nobj = objc_msgSend(obj,\
  \ sel_registerName(\"init\"));\nobjc_msgSend(obj, sel_registerName(\"method:\"),\
  \ 10);\n```\n\n`objc_msgSend` 函数根据对象和方法名搜索 `_I_MyObject_method_` 函数的指针。之后，它调用该函数指针，并将第一个参数\
  \ `\"obj\"` 传递给 `_I_MyObject_method_` 函数作为其第一个参数 `\"self\"`。与 C++ 一样，`\"self\"`\
  \ 是 `MyObject` 类自身的对象。\n\n### 声明 _cself\n\n让我们继续阅读示例。不幸的是，从 Block 语法转换而来的 `__main_block_func_0`\
  \ 函数并未使用参数 `__cself`。稍后我们会展示 `__cself` 是如何被使用的。现在，我只解释参数 `\"__cself\"` 是如何声明的。\n\
  \n`struct __main_block_impl_0 *__cself`\n\n如同 Objective-C 中的 `\"self\"` 或 C++ 中的\
  \ `\"this\"`，参数 `__cself` 是一个指向 `struct __main_block_impl_0` 的指针。`struct __main_block_impl_0`\
  \ 是如何声明的？\n\n```\nstruct __main_block_impl_0 {\n    struct __block_impl impl;\n\
  \    struct __main_block_desc_0* Desc;\n}\n```\n\n转换后的源码因为在其内部声明了构造函数而略显复杂。移除构造函数后，`struct\
  \ __main_block_impl_0` 就变得如上所示非常简单。接下来，让我们检查一下 `struct __block_impl` 是如何声明的，它被用作第一个成员变量\
  \ `\"impl\"`。\n\n```\nstruct __block_impl {\n    void *isa;\n    int Flags;\n  \
  \  int Reserved;\n    void *FuncPtr;\n};\n```\n\n从其名称来看，我们可以大致猜出成员变量的用途，例如标志位、为未来版本预留的区域以及函数指针。目前我们暂且跳过它们。首先，我们来看看用于第二个成员变量\
  \ `\"Desc\"` 的 `__main_block_desc_0` 结构体。\n\n```\nstruct __main_block_desc_0 {\n\
  \    unsigned long reserved;\n    unsigned long Block_size;\n};\n```\n\n正如我们可以从名称中猜测到的，它包含一个预留区域和一个\
  \ Block 的大小。\n\n### __main_block_impl_0 结构体的构造函数\n\n接下来，让我们检查一下构造函数，它用于初始化包含这些结构体的\
  \ `__main_block_impl_0` 结构体。\n\n```\n__main_block_impl_0(void *fp, struct __main_block_desc_0\
  \ *desc, int flags=0) {\n    impl.isa = &_NSConcreteStackBlock;\n    impl.Flags\
  \ = flags;\n    impl.FuncPtr = fp;\n    Desc = desc;\n}\n```\n\n它仅仅是初始化 `__main_block_impl_0`\
  \ 结构体的成员变量。虽然你可能对 `_NSConcreteStackBlock` 感兴趣，它用于初始化我们之前跳过的 `__block_impl` 结构体中的\
  \ `\"isa\"` 变量，但我们首先要检查构造函数是如何被调用的。\n\n```\nvoid (*blk)(void) =\n    (void (*)(void))&__main_block_impl_0(\n\
  \        (void *)__main_block_func_0, &__main_block_desc_0_DATA);\n```\n\n这里有太多类型转换，难以理解。我们先把它们全部移除。\n\
  \n```\nstruct __main_block_impl_0 tmp =\n    __main_block_impl_0(__main_block_func_0,\
  \ &__main_block_desc_0_DATA);\n\nstruct __main_block_impl_0 *blk = &tmp;\n```\n\n\
  现在，它就容易理解了。一个自动变量的指针被赋值给了变量 `\"blk\"`，该变量的类型是 `__main_block_impl_0` 结构体的指针。这意味着在栈上创建了一个\
  \ `__main_block_impl_0` 结构体的实例，并且其指针被赋值给了该变量。\n\n```\nvoid (^blk)(void) = ^{printf(\"\
  Block\\n\");};\n```\n\n由 Block 字面量创建的 Block 被赋值给了 Block 类型变量 `\"blk\"`。因此，这等同于将\
  \ `__main_block_impl_0` 结构体实例的指针赋值给变量 `\"blk\"`。该 Block 等价于 `__main_block_impl_0`\
  \ 结构体类型的自动变量。换句话说，Block 是在栈上创建的 `__main_block_impl_0` 结构体的实例。\n\n\n\n### 初始化 `__main_block_impl_0`\
  \ 实例\n\n接下来，我们来看一下 `__main_block_impl_0` 结构体的实例是如何初始化的。其构造函数的参数如下：\n\n`__main_block_impl_0(__main_block_func_0,\
  \ &__main_block_desc_0_DATA);`\n\n第一个参数是一个函数指针，由 Block 字面量转换而来。第二个参数是指向 `__main_block_desc_0`\
  \ 结构体实例的指针，该实例被初始化为一个静态全局变量。下面我们来检查 `__main_block_desc_0` 结构体实例是如何初始化的：\n\n```\n\
  static struct __main_block_desc_0 __main_block_desc_0_DATA = {\n    0,\n    sizeof(struct\
  \ __main_block_impl_0)\n};\n```\n\n它使用 Block 的大小（即 `__main_block_impl_0` 结构体的大小）进行初始化。\n\
  \n下面我们来看看 Stack 上的 `__main_block_impl_0` 结构体实例（即 Block）是如何通过这些参数进行初始化的。如果展开 `__block_impl`，`__main_block_impl_0`\
  \ 结构体可以重写为：\n\n```\nstruct __main_block_impl_0 {\n    void *isa;\n    int Flags;\n\
  \    int Reserved;\n    void *FuncPtr;\n    struct __main_block_desc_0* Desc;\n\
  }\n```\n\n该结构体通过构造函数初始化如下：\n\n```\nisa = &_NSConcreteStackBlock;\nFlags = 0;\nReserved\
  \ = 0;\nFuncPtr = __main_block_func_0;\nDesc = &__main_block_desc_0_DATA;\n```\n\
  \n你或许会对 `_NSConcreteStackBlock` 感兴趣，不过我们先暂且略过。先来看其他部分。`__main_block_func_0` 函数的指针被赋值给了其成员变量\
  \ `FuncPtr`。它会在以下位置被使用：\n\n`blk();`\n\n这会被转换为：\n\n```\n((void (*)(struct __block_impl\
  \ *))(\n    (struct __block_impl *)blk)->FuncPtr)((struct __block_impl *)blk);\n\
  ```\n\n再次去除类型转换：\n\n```\n(*blk->impl.FuncPtr)(blk);\n```\n\n这是一个通过函数指针进行的简单函数调用。正如我们所检查过的，成员变量\
  \ `FuncPtr` 包含了 `__main_block_func_0` 函数的指针，而该函数由 Block 字面量转换而来。此外，我们还了解到 `__main_block_func_0`\
  \ 函数的参数 `__cself` 就是 Block 本身。通过这段源码，我们可以确认 Block 作为参数 `__cself` 传入。\n\n### 回顾 `_NSConcreteStackBlock`\n\
  \n我们已经大致了解了 Block 的内部机制。但还有一个多次被我们跳过的问题。`_NSConcreteStackBlock` 是什么？\n\n`isa = &_NSConcreteStackBlock;`\n\
  \n`_NSConcreteStackBlock` 的指针被赋值给了 Block 的结构体中的成员变量 `isa`。要理解其含义，我们需要了解 Objective-C\
  \ 中类和对象是如何实现的。实际上，Block 在 Objective-C 中也是一个对象。\n\n如你所知，变量类型 `id` 用于存储 Objective-C\
  \ 对象。我们通常在 Objective-C 源码中随意使用它，就像在 C 语言中使用 `void *` 一样。令人惊讶的是，`id` 类型是在 C 语言中声明的。其声明位于\
  \ `/usr/include/objc/objc.h`。\n\n```\ntypedef struct objc_object {\n    Class isa;\n\
  } *id;\n```\n\n这意味着 `id` 是一个指向 `objc_object` 结构体的指针类型。我们来看看 `Class` 是什么。\n\n```\n\
  typedef struct objc_class *Class;\n```\n\n`Class` 是一个指向 `objc_class` 结构体的指针类型。`objc_class`\
  \ 结构体声明在 `/usr/include/objc/runtime.h` 中。\n\n```\nstruct objc_class {\n    Class\
  \ isa;\n};\n```\n\n它与 `objc_object` 结构体相同。请注意，`objc_object` 结构体和 `objc_class` 结构体分别作为每个对象和类的基结构体使用。我们通过下面这个简单的\
  \ Objective-C 类声明来验证一下。\n\n```\n@interface MyObject : NSObject\n{\n    int val0;\n\
  \    int val1;\n}\n@end\n```\n\n这个类对应的结构体基于 `objc_object` 结构体，如下所示：\n\n```\nstruct\
  \ MyObject {\n    Class isa;\n    int val0;\n    int val1;\n};\n```\n\n`MyObject`\
  \ 类的实例变量 `val0` 和 `val1` 直接被声明为该对象结构体的成员变量。在 Objective-C 中创建一个类的对象，等同于从该类生成的结构体中创建出一个实例。每个创建出的对象（即每个对象结构体的实例）在其成员变量\
  \ `isa` 中都有一个指向其类结构体实例的指针，如图 5-1 所示。\n\n![images](img/9781430241164_Fig05-01.jpg)\n\
  \n**图 5-1.** *Objective-C 类与对象*\n\n每个类的结构体是一个基于 `objc_class` 结构体的 `class_t` 结构体。`class_t`\
  \ 结构体在 `objc4` 运行时库的 `runtime/objc-runtime-new.h` 中声明。\n\n```\nstruct class_t {\n\
  \    struct class_t *isa;\n    struct class_t *superclass;\n    Cache cache;\n \
  \   IMP *vtable;\n    uintptr_t data_NEVER_USE;\n};\n```\n\n在 Objective-C 中，会为所有类创建并存储\
  \ `class_t` 结构体的实例。例如，会创建 `NSObject` 的 `class_t` 结构体实例，以及 `NSMutableArray` 的 `class_t`\
  \ 结构体实例。这些实例包含了声明的成员变量名称、方法名称、方法实现（即函数指针）、属性以及指向其父类的指针。Objective-C 运行时库会使用这些信息。\n\
  \n现在，我们理解了 Objective-C 中类和对象的实现方式，可以继续下一步了。让我们再来审视一下 Block 的结构体：\n\n```\nstruct\
  \ __main_block_impl_0 {\n    void *isa;\n    int Flags;\n    int Reserved;\n   \
  \ void *FuncPtr;\n    struct __main_block_desc_0* Desc;\n}\n```\n\n这个 `__main_block_impl_0`\
  \ 结构体基于 `objc_object` 结构体，是一个适用于 Objective-C 类对象的结构体。并且，它的成员变量 `isa` 被如下初始化：\n\n\
  `isa = &_NSConcreteStackBlock;`\n\n这意味着 `_NSConcreteStackBlock` 是 `class_t` 结构体的一个实例。当\
  \ Block 被当作 Objective-C 对象对待时，`_NSConcreteStackBlock` 包含了其类的所有信息。至此，我们已经了解了 Block\
  \ 的内部机制，同时也知道了 Block 是一个 Objective-C 对象。\n\n\n### 捕获自动变量\n\n接下来，我们来看看捕获自动变量的实现方式，同时讨论匿名函数特性的实现原理。捕获自动变量的原始源代码如代码清单\
  \ 5-3 所示。\n\n**代码清单 5-3.** *捕获自动变量*\n\n```\nint main() {\n    int dmy = 256;\n \
  \   int val = 10;\n    const char *fmt = \"val = %d\\n\";\n    void (^blk)(void)\
  \ = ^{printf(fmt, val);};\n    return 0;\n}\n```\n\n沿用之前的方法，我们用`clang`对源代码进行转换，转换结果如代码清单\
  \ 5-4 所示。\n\n**代码清单 5-4.** *代码清单 5-3 的转换后源代码*\n\n```\nstruct __main_block_impl_0\
  \ {\n    struct __block_impl impl;\n    struct __main_block_desc_0* Desc;\n    const\
  \ char *fmt;\n    int val;\n\n    __main_block_impl_0(void *fp, struct __main_block_desc_0\
  \ *desc,\n            const char *_fmt, int _val, int flags=0) : fmt(_fmt), val(_val)\
  \ {\n        impl.isa = &_NSConcreteStackBlock;\n        impl.Flags = flags;\n \
  \       impl.FuncPtr = fp;\n        Desc = desc;\n    }\n};\n\nstatic void __main_block_func_0(struct\
  \ __main_block_impl_0 *__cself)\n{\n    const char *fmt = __cself->fmt;\n    int\
  \ val = __cself->val;\n    printf(fmt, val);\n}\n\nstatic struct __main_block_desc_0\
  \ {\n    unsigned long reserved;\n    unsigned long Block_size;\n} __main_block_desc_0_DATA\
  \ = {\n    0,\n    sizeof(struct __main_block_impl_0)\n};\n\nint main() {\n    int\
  \ dmy = 256;\n    int val = 10;\n    const char *fmt = \"val = %d\\n\";\n    void\
  \ (*blk)(void) = &__main_block_impl_0(\n        __main_block_func_0, &__main_block_desc_0_DATA,\
  \ fmt, val);\n\n    return 0;\n}\n```\n\n让我们对比转换后的代码与上一个示例的差异。在 Block 字面量中使用的自动变量，会被添加为`__main_block_impl_0`结构体的成员变量。\n\
  \n```\nstruct __main_block_impl_0 {\n    struct __block_impl impl;\n    struct __main_block_desc_0*\
  \ Desc;\n    const char *fmt;\n    int val;\n};\n```\n\n请注意，只有 Block 内部使用到的变量才会被捕获。在这个例子中，`dmy`并未被使用，因此没有被添加。\n\
  \n```\n__main_block_impl_0(void *fp, struct __main_block_desc_0 *desc,\n       \
  \ const char *_fmt, int _val, int flags=0) : fmt(_fmt), val(_val) {\n```\n\n当结构体实例被初始化时，通过构造函数参数来初始化那些由自动变量添加而来的成员变量。我们来看看传递给构造函数的实际参数。\n\
  \n```\nvoid (*blk)(void) = &__main_block_impl_0(\n    __main_block_func_0, &__main_block_desc_0_DATA,\
  \ fmt, val);\n```\n\n`__main_block_impl_0`结构体的实例通过自动变量`fmt`和`val`进行初始化，这两个变量存储的是\
  \ Block 字面量声明时刻的值。这意味着`__main_block_impl_0`结构体实例的初始化过程如下：\n\n```\nimpl.isa = &_NSConcreteStackBlock;\n\
  impl.Flags = 0;\nimpl.FuncPtr = __main_block_func_0;\nDesc = &__main_block_desc_0_DATA;\n\
  fmt = \"val = %d\\n\";\nval = 10;\n```\n\n至此，我们理解了自动变量的值是如何被捕获到`__main_block_impl_0`结构体实例（即\
  \ Block）中的。\n\n### 匿名函数\n\n接下来，让我们看看使用 Block 实现的匿名函数。原始的 Block 字面量如下所示：\n\n```\n\
  ^{printf(fmt, val);}\n```\n\n这段代码被转换为一个函数。\n\n```\nstatic void __main_block_func_0(struct\
  \ __main_block_impl_0 *__cself)\n{\n    const char *fmt = __cself->fmt;\n    int\
  \ val = __cself->val;\n    printf(fmt, val);\n}\n```\n\n在转换后的源代码中，为了使捕获的自动变量在该函数内可用，在由\
  \ Block 字面量生成的表达式之前，声明并定义了自动变量。这样，Block 字面量中的原始表达式就能使用这些捕获到的自动变量。\n\n总结来说，捕获自动变量意味着：当\
  \ Block 字面量被执行时，其中用到的自动变量的值，会被赋值给 Block 对应的结构体实例的成员变量，而这个实例就是 Block 本身。\n\n顺便提一下，如第\
  \ 4 章所述，C 数组类型的自动变量不能直接在 Block 中使用。正如我们所学，要捕获自动变量，需要将其值通过构造函数传递给结构体。如果 C 数组从 Block\
  \ 中使用，其转换后的源代码大致如下所示。\n\n如果将 C 数组传递给 Block 对应的结构体构造函数：\n\n```\nvoid func(char a[10])\n\
  {\n    printf(\"%d\\n\", a[0]);\n}\n\nint main()\n{\n     char a[10] = {2};\n  \
  \  func(a);\n}\n```\n\n这段代码可以编译并正常运行。之后，构造函数会将参数赋值给成员变量。由 Block 字面量转换而来的函数，则会将成员变量赋值给自动变量。源代码会变成下面这样：\n\
  \n```\nvoid func(char a[10])\n{\n    char b[10] = a;\n    printf(\"%d\\n\", b[0]);\n\
  }\n\nint main()\n{\n    char a[10] = {2};\n    func(a);\n}\n```\n\n这段代码试图将一个 C 数组变量赋值给另一个\
  \ C 数组变量，但无法通过编译。即使类型和数组长度都相同，C 语言规范也不允许这种赋值操作。当然，存在一些方法可以实现该目的，但在 Block 的实现中，遵循\
  \ C 语言规范似乎被视作一个重要的原则。\n\n## 可写变量\n\n接下来，我们展示变量如何在 Block 内变得可写。我们将探讨两种使变量可写的方法，并从回顾\
  \ Block 中使用的自动变量开始。再次参考捕获自动变量的例子（代码清单 5-3）。\n\n```\n^{printf(fmt, val);}\n```\n\n\
  这段源代码被转换为以下形式：\n\n```\nstatic void __main_block_func_0(struct __main_block_impl_0\
  \ *__cself)\n{\n    const char *fmt = __cself->fmt;\n    int val = __cself->val;\n\
  \n    printf(fmt, val);\n}\n```\n\n你可能已经注意到了一些问题。Block 只捕获了其所用自动变量的值。正如我解释过的，因为“匿名函数与自动（局部）变量相结合”，在\
  \ Block 使用这些值之后，它们永远不会被写回 Block 结构体的实例，也不会写回原始的自动变量。\n\n接下来，这段源代码试图在 Block 内部修改自动变量`val`。\n\
  \n```\nint val = 0;\nvoid (^blk)(void) = ^{val = 1;};\n```\n\n这会导致以下编译错误：\n\n```\n\
  error: variable is not assignable (missing __block type specifier)\n    void (^blk)(void)\
  \ = ^{val = 1;};\n                      ~~~ ^\n```\n\n正如我们之前所学，Block 的实现机制永远不会回写变量的修改值。因此，当编译器检测到对捕获的自动变量进行赋值操作时，会引发编译错误。但如果永远无法修改变量值，这种限制会显得非常不便。为了解决这个问题，你有两个选择：使用另一种类型的变量，或者使用`__block`说明符。我们先来讨论另一种类型的变量。\n\
  \n\n\n### 静态变量或全局变量\n\n在 C 语言中，存在可写变量：\n\n-   静态变量\n-   静态全局变量\n-   全局变量\n\nBlock\
  \ 字面量中的匿名函数部分会被直接转换成 C 函数。在转换后的函数中，可以访问静态全局变量和全局变量。它们可以毫无问题地运行。但静态变量则不同。由于转换后的函数声明在原始函数之外——也就是\
  \ Block 字面量所在的位置——静态变量因变量作用域而无法访问。我们通过以下源代码来验证这一点。\n\n```\nint global_val = 1;\n\
  static int static_global_val = 2;\n\nint main()\n{\n    static int static_val =\
  \ 3;\n    void (^blk)(void) = ^{\n        global_val *= 1;\n        static_global_val\
  \ *= 2;\n        static_val *= 3;\n    };\n    return 0;\n}\n```\n\n在 Block 中，静态变量\
  \ `static_val`、静态全局变量 `static_global_val` 和全局变量 `global_val` 被修改。该源代码将如何转换？\n\n\
  ```\nint global_val = 1;\nstatic int static_global_val = 2;\n\nstruct __main_block_impl_0\
  \ {\n    struct __block_impl impl;\n    struct __main_block_desc_0* Desc;\n    int\
  \ *static_val;\n    __main_block_impl_0(void *fp, struct __main_block_desc_0 *desc,\n\
  \            int *_static_val, int flags=0) : static_val(_static_val) {\n      \
  \  impl.isa = &_NSConcreteStackBlock;\n        impl.Flags = flags;\n        impl.FuncPtr\
  \ = fp;\n        Desc = desc;\n    }\n};\n\nstatic void __main_block_func_0(struct\
  \ __main_block_impl_0 *__cself) {\n    int *static_val = __cself->static_val;\n\n\
  \    global_val *= 1;\n    static_global_val *= 2;\n    (*static_val) *= 3;\n}\n\
  \nstatic struct __main_block_desc_0 {\n    unsigned long reserved;\n    unsigned\
  \ long Block_size;\n} __main_block_desc_0_DATA = {\n    0,\n    sizeof(struct __main_block_impl_0)\n\
  };\n\nint main()\n{\n    static int static_val = 3;\n\n    blk = &__main_block_impl_0(\n\
  \        __main_block_func_0, &__main_block_desc_0_DATA, &static_val);\n\n    return\
  \ 0;\n}\n```\n\n转换后的源代码看起来似曾相识。静态全局变量 `static_global_val` 和全局变量 `global_val` 的访问方式与原始源代码中完全相同。那么静态变量\
  \ `static_val` 呢？以下部分展示了该变量在 Block 内部的使用方式。\n\n```\nstatic void __main_block_func_0(struct\
  \ __main_block_impl_0 *__cself) {\n    int *static_val = __cself->static_val;\n\n\
  \    (*static_val) *= 3;\n}\n```\n\n静态变量 `static_val` 通过其指针进行访问。该变量的指针被传递给了 `__main_block_impl_0`\
  \ 结构体的构造函数，然后由构造函数赋值。这是在变量作用域之外使用变量的最简单方法。\n\n你可能会想，访问自动变量的方式也可以与静态变量相同。为什么不这样做呢？因为即使在捕获的自动变量离开作用域之后，Block\
  \ 也必须能够存在。当变量离开作用域时，自动变量会被销毁。这意味着 Block 无法再访问该自动变量。因此，自动变量不能像静态变量那样实现。我们将在下一节中了解这些细节。\n\
  \n### `__block` 说明符\n\n如前所述，避免这个问题的另一个选择是使用 `__block` 说明符。准确地说，它被称为 `__block` 存储类说明符。在\
  \ C 语言中，存储类说明符如下所示。\n\n-   `typedef`\n-   `extern`\n-   `static`\n-   `auto`\n-\
  \   `register`\n\n`__block` 说明符类似于 `static`、`auto` 和 `register`。它们指定变量的存储位置。使用 `auto`\
  \ 时，值作为自动变量存储在栈上。使用 `static` 时，值作为静态变量存储在数据段中，以此类推。\n\n让我们看看 `__block` 说明符是如何工作的。\n\
  \n当你想要从 Block 中修改自动变量时，会使用 `__block` 说明符。让我们在上一个导致编译错误的源代码中使用 `__block` 说明符。当 `__block`\
  \ 说明符被添加到自动变量声明中时，会发生什么？\n\n```\n__block int val = 10;\n\nvoid (^blk)(void) = ^{val\
  \ = 1;};\n```\n\n这段源代码可以毫无问题地编译。它的转换结果如 代码清单 5–5 所示。\n\n**代码清单 5–5.** *使用 __block\
  \ 说明符的转换后源代码*\n\n```\nstruct __Block_byref_val_0 {\n    void *__isa;\n    __Block_byref_val_0\
  \ *__forwarding;\n    int __flags;\n    int __size;\n    int val;\n};\n\nstruct\
  \ __main_block_impl_0 {\n    struct __block_impl impl;\n    struct __main_block_desc_0*\
  \ Desc;\n    __Block_byref_val_0 *val;\n    __main_block_impl_0(void *fp, struct\
  \ __main_block_desc_0 *desc,\n            __Block_byref_val_0 *_val, int flags=0)\
  \ : val(_val->__forwarding) {\n        impl.isa = &_NSConcreteStackBlock;\n    \
  \    impl.Flags = flags;\n        impl.FuncPtr = fp;\n        Desc = desc;\n   \
  \ }\n};\n\nstatic void __main_block_func_0(struct __main_block_impl_0 *__cself)\n\
  {\n    __Block_byref_val_0 *val = __cself->val;\n\n    (val->__forwarding->val)\
  \ = 1;\n}\n\nstatic void __main_block_copy_0(     struct __main_block_impl_0*dst,\
  \ struct __main_block_impl_0*src)\n{\n    _Block_object_assign(&dst->val, src->val,\
  \ BLOCK_FIELD_IS_BYREF);\n}\n\nstatic void __main_block_dispose_0(struct __main_block_impl_0*src)\
  \ {\n    _Block_object_dispose(src->val, BLOCK_FIELD_IS_BYREF);\n}\n\nstatic struct\
  \ __main_block_desc_0 {\n    unsigned long reserved;\n    unsigned long Block_size;\n\
  \    void (*copy)(struct __main_block_impl_0*, struct __main_block_impl_0*);\n \
  \   void (*dispose)(struct __main_block_impl_0*);\n} __main_block_desc_0_DATA =\
  \ {\n    0,\n    sizeof(struct __main_block_impl_0),\n     __main_block_copy_0,\n\
  \    __main_block_dispose_0\n};\n\nint main()\n{\n    __Block_byref_val_0 val =\
  \ {\n        0,\n        &val,\n        0,\n        sizeof(__Block_byref_val_0),\n\
  \        10\n    };\n\n    blk = &__main_block_impl_0(\n        __main_block_func_0,\
  \ &__main_block_desc_0_DATA, &val, 0x22000000);\n\n    return 0;\n}\n```\n\n当为自动变量添加\
  \ `__block` 说明符时，源代码变得相当庞大。接下来，我们讨论为什么仅仅为了 `__block` 说明符就需要如此庞大的源代码。\n\n在原始源代码中，`__block`\
  \ 说明符的使用如下：\n\n```\n__block int val = 10;\n```\n\n那么 `__block` 变量 `val` 是如何转换的呢？\n\
  \n```\n__Block_byref_val_0 val = {\n    0,\n    &val,\n    0,\n    sizeof(__Block_byref_val_0),\n\
  \    10\n};\n```\n\n令人惊讶的是，它被转换成了一个结构体实例。`__block` 变量是 `__Block_byref_val_0` 结构体的自动变量，就像\
  \ Block 一样，这意味着 `__block` 变量是栈上 `__Block_byref_val_0` 结构体的一个实例。`__block` 变量被初始化为\
  \ `10`。你可以看到该结构体实例被初始化为 `10`，这意味着该结构体将原始自动变量的值存储在其成员变量中。\n\n让我们检查该结构体的声明。\n\n```\n\
  struct __Block_byref_val_0 {\n    void *__isa;\n    __Block_byref_val_0 *__forwarding;\n\
  \    int __flags;\n    int __size;\n    int val;\n};\n```\n\n\n\n"
- "# 排版后的文档\n\n如我们在初始化部分所见，结构体 `\"val\"` 中的最后一个成员变量，如其名所示，存储了原始的自动变量。\n\n`__block`\
  \ 变量的赋值是如何工作的？\n\n```\n^{val = 1;}\n```\n\n这段源代码被转换如下：\n\n```\nstatic void __main_block_func_0(struct\
  \ __main_block_impl_0 *__cself)\n{\n    __Block_byref_val_0 *val = __cself->val;\n\
  \    (val->__forwarding->val) = 1;\n}\n```\n\n如我们所学，要从 Block 中赋值给静态变量，需要使用指向该静态变量的指针。然而，赋值给\
  \ `__block` 变量则更为复杂。用于 Block 的 `__main_block_impl_0` 结构体实例包含一个指针，指向用于 `__block`\
  \ 变量的 `__Block_byref_val_0` 结构体实例。\n\n`__Block_byref_val_0` 结构体的实例在成员变量 `\"__forwarding\"\
  ` 中保存了一个指向自身结构体实例的指针。通过该 `\"__forwarding\"` 成员变量，可以访问到与原始自动变量对应的成员变量 `\"val\"`（见图\
  \ 5-2）。\n\n![images](img/9781430241164_Fig05-02.jpg)\n\n**图 5-2.** *访问 __block 变量*\n\
  \n我们稍后会回到 `\"forwarding\"` 这个话题。它将在接下来的两节——“Block 的内存段”和“`__block` 变量的内存段”中进一步解释。现在，我们先来看一下\
  \ `__Block_byref_val_0` 结构体中那些不在 `__main_block_impl_0` 结构体里的成员变量。`__Block_byref_val_0`\
  \ 结构体被分离出来的原因是为了让 `__block` 变量能被多个 Block 使用。请看下面的例子：\n\n```\n__block int val = 10;\n\
  \nvoid (^blk0)(void) = ^{val = 0;};\n\nvoid (^blk1)(void) = ^{val = 1;};\n```\n\n\
  Block 类型的变量 `\"blk0\"` 和 `\"blk1\"` 都访问了 `__block` 变量 `\"val\"`。它被转换为：\n\n```\n\
  __Block_byref_val_0 val = {0, &val, 0, sizeof(__Block_byref_val_0), 10};\n\nblk0\
  \ = &__main_block_impl_0(\n    __main_block_func_0, &__main_block_desc_0_DATA, &val,\
  \ 0x22000000);\n\nblk1 = &__main_block_impl_1(\n    __main_block_func_1, &__main_block_desc_1_DATA,\
  \ &val, 0x22000000);\n```\n\n两个 Block 都使用了指向同一个 `__Block_byref_val_0` 结构体实例 `\"\
  val\"` 的指针，这意味着多个 Block 可以共享同一个 `__block` 变量。另一方面，一个 Block 也可以共享多个 `__block` 变量。多个\
  \ `__block` 变量可以通过在 Block 的结构体中添加成员变量，并在构造函数中增加参数来实现。\n\n至此，我们几乎已经学习了关于 `__block`\
  \ 变量的全部内容。在下一节中，我们将学习之前跳过的话题：\n\n- 为什么 Block 不能超越其变量作用域而存在？\n- 用于 `__block` 变量的结构体中的\
  \ `\"__forwarding\"` 成员变量存在的目的是什么？\n\n另外，在“捕获对象”一节中，我将解释 `__main_block_desc_0` 结构体中新增的成员变量\
  \ `\"copy\"` 和 `\"dispose\"`。\n\n### Block 的内存段\n\n在前面的小节中，我们了解到 Block 被实现为结构体的自动变量，并且会为该\
  \ Block 生成相应的结构体。同样，`__block` 变量也被实现为结构体的自动变量，并会为该 `__block` 变量生成相应的结构体。由于它们都被实现为结构体的自动变量，其实例创建在栈上，如表\
  \ 5-1 所示。\n\n![images](img/t0501.jpg)\n\n此外，在前面的小节中，我们还了解到 Block 本身也是一个 Objective-C\
  \ 对象。如果将 Block 视为 Objective-C 的对象，它的类是 `_NSConcreteStackBlock`。虽然之前没有提到，但还有几个与 `_NSConcreteStackBlock`\
  \ 类似的类：\n\n- `_NSConcreteStackBlock`\n- `_NSConcreteGlobalBlock`\n- `_NSConcreteMallocBlock`\n\
  \n首先你可能会注意到 `_NSConcreteStackBlock` 类名中带有“stack”（栈），这意味着该类的对象存在于栈上。同时，`_NSConcreteGlobalBlock`\
  \ 类的对象，如其类名中的“global”（全局）所示，与全局变量一样存储在数据段中，如图 5-3 所示。\n\n`_NSConcreteMallocBlock`\
  \ 类的对象，你可以从其名称猜出，存储在堆上，就像通过 `\"malloc\"` 函数分配的内存块一样。\n\n![images](img/9781430241164_Fig05-03.jpg)\n\
  \n**图 5-3.** *Block 的内存段*\n\n\n\n### 作为 `NSConcreteGlobalBlock` 类对象的块\n\n前述示例中的块均使用了\
  \ `_NSConcreteStackBlock` 类；也就是说，所有块都存储在栈上。接下来，我将说明其他类类型的使用方式。\n\n首先，当块字面量写在全局变量位置时，该块会被创建为\
  \ `_NSConcreteGlobalBlock` 类对象。来看一个示例。\n\n```\nvoid (^blk)(void) = ^{printf(\"Global\
  \ Block\\n\");};\n```\n\n```\nint main()\n{\n```\n\n在这段源代码中，块字面量是作为全局变量声明编写的。当它被转换时，其处理方式类似于“揭开块的面纱”一节中的示例，唯一的区别是块结构体中的成员变量\
  \ `isa` 会按如下方式初始化。\n\n```\nimpl.isa = &_NSConcreteGlobalBlock;\n```\n\n因此，这个块的类是\
  \ `_NSConcreteGlobalBlock`，这意味着块的结构体实例存储在数据段中。由于全局变量声明处不可能存在自动变量，所以不会发生捕获。换句话说，块实例的成员变量不依赖于执行上下文。一个应用程序中只需一个实例，该实例与全局变量一样存储在数据段中。\n\
  \n块的结构体实例仅在捕获自动变量时才会被修改。例如，下面的源代码多次使用了同一个块，但在每次 for 循环中自动变量都会被改变并被捕获。\n\n```\ntypedef\
  \ int (^blk_t)(int);\n\nfor (int rate = 0; rate < 10; ++rate) {\n    blk_t blk =\
  \ ^(int count){return rate * count;};\n}\n```\n\n由于每次 for 循环捕获的自动变量不同，块的结构体实例也各不相同。但如果块不捕获任何变量，块的结构体实例则是相同的：\n\
  \n```\ntypedef int (^blk_t)(int);\n\nfor (int rate = 0; rate < 10; ++rate) {\n \
  \   blk_t blk = ^(int count){return count;};\n}\n```\n\n不仅当块位于全局变量处时，其结构体实例存储在程序的数据段中；当块字面量位于函数内部且不捕获任何自动变量时，也是如此。\n\
  \n在使用 clang 转换的源代码中，虽然总是使用 `_NSConcreteStackBlock` 类，但具体实现有所不同。我们可以总结如下。\n\n- 当块字面量写在全局变量处时\n\
  - 当块字面量中的语法未使用任何需要捕获的自动变量时\n\n在这两种情况下，该块将是 `_NSConcreteGlobalBlock` 类对象，并存储在数据段中。任何由其他类型的块字面量创建的块都将是\
  \ `_NSConcreteStackBlock` 类的对象，并存储在栈上。\n\n`_NSConcreteMallocBlock` 类在何时使用，块又在何时存储在堆上？这正好回答了前一节提出的问题。\n\
  \n- 为什么块不能存在于变量作用域之外？\n- 为什么 `__block` 变量的结构体中存在成员变量 `__forwarding`？\n\n像全局变量一样存储在数据段中的块，可以在任何变量作用域之外通过指针安全地访问。但其他存储在栈上的块，在离开块的作用域后就会被销毁。同样，`__block`\
  \ 变量也存储在栈上，因此当离开作用域时，`__block` 变量也会被销毁（图 5-4）。\n\n![images](img/9781430241164_Fig05-04.jpg)\n\
  \n**图 5–4.** *栈上的块和 `__block` 变量*\n\n为了解决这个问题，块提供了一种将块或 `__block` 变量从栈复制到堆的功能。接下来，我们将学习块是如何被复制到堆上的。\n\
  \n### 堆上的块\n\n正如我们所学，块可以被复制到堆上。通过复制块，复制到堆上的块即使在离开作用域后也能继续存在，如图 5-5 所示。让我们看看让块正常工作的技巧是什么。\n\
  \n![images](img/9781430241164_Fig05-05.jpg)\n\n**图 5–5.** *从栈复制到堆的块和 `__block` 变量*\n\
  \n复制到堆上的块的结构体中的成员变量 `isa` 会被重写，使得该块成为 `_NSConcreteMallocBlock` 类对象。\n\n```\nimpl.isa\
  \ = &_NSConcreteMallocBlock;\n```\n\n同时，无论 `__block` 变量位于栈还是堆上，都必须能被正确访问。这用到了 `__block`\
  \ 变量结构体中的成员变量 `__forwarding`。\n\n即使 `__block` 变量已被复制到堆上，在某些情况下仍可能访问栈上的 `__block`\
  \ 变量。由于栈上实例的成员变量 `__forwarding` 指向堆上的实例，因此无论 `__block` 变量位于栈还是堆上，都能被正确访问。我将在“`__Block`\
  \ 变量的内存段”一节中再次解释这一点。\n\n### 自动复制块\n\n那么，块是如何提供复制功能的呢？事实上，在启用 ARC 的情况下，编译器在许多情况下会自动检测并将块从栈复制到堆。来看下一个示例，该示例调用了一个返回块的函数。\n\
  \n```\ntypedef int (^blk_t)(int);\n\nblk_t func(int rate)\n{\n    return ^(int count){return\
  \ rate * count;};\n}\n```\n\n函数返回一个存储在栈上的块；也就是说，当控制流返回给调用者时，变量作用域被离开，栈上的块被销毁。这看起来有问题。让我们检查一下在启用\
  \ ARC 时它是如何被转换的。\n\n```\nblk_t func(int rate)\n{\n    blk_t tmp = &__func_block_impl_0(\n\
  \        __func_block_func_0, &__func_block_desc_0_DATA, rate);\n\n    tmp = objc_retainBlock(tmp);\n\
  \n    return objc_autoreleaseReturnValue(tmp);\n}\n```\n\n由于启用了 ARC，`blk_ttmp` 等同于\
  \ `blk_t __strong tmp`，这意味着该变量被 `__strong` 修饰。\n\n如果你阅读过 objc4 运行时库中的源代码 `runtime/objc-arr.mm`，你会发现\
  \ `objc_retainBlock` 函数等同于 `_Block_copy` 函数。因此，上述源代码等同于：\n\n```\ntmp = _Block_copy(tmp);\n\
  return objc_autoreleaseReturnValue(tmp);\n```\n\n让我们通过注释来了解发生了什么：\n\n```\n/*\n *\
  \ 将块从字面量赋值给变量 'tmp'，\n * 这意味着该变量持有栈上块的结构体实例。\n * Block_copy 函数将块从栈复制到堆。\n * 复制后，堆上的地址被赋值给变量\
  \ 'tmp'。\n */\n\ntmp = _Block_copy(tmp);\n\n/*\n * 然后，堆上的块作为 Objective-C 对象注册到自动释放池中。\n\
  \ * 之后，该块被返回。\n */\n\nreturn objc_autoreleaseReturnValue(tmp);\n```\n\n这意味着当函数返回块时，编译器会自动将其复制到堆上。\n\
  \n\n\n### 手动管理 Block\n\n我提到过“在多数情况下，编译器会自动检测”。但当编译器未能检测到时，你就需要手动将 Block 从栈复制到堆。为此，你可以使用实例方法\
  \ `copy`。我们在第一部分多次见过的 `copy` 方法，属于 alloc/new/copy/mutableCopy 方法组。那么，编译器在什么情况下无法检测到呢？\n\
  \n答案是：\n\n- 当 Block 作为参数传递给方法或函数时\n\n但如果方法或函数在内部复制了该参数，则调用者无需手动复制，例如：\n\n- Cocoa\
  \ 框架中名称包含 `usingBlock` 的方法\n- Grand Central Dispatch API\n\n例如，在使用 `NSArray` 实例方法\
  \ `enumerateObjectsUsingBlock` 或 `dispatch_async` 函数时，你无需进行复制。相反，当你将 Block 传递给 `NSArray`\
  \ 类实例方法 `initWithObjects` 时，则需要复制 Block。下面通过示例来说明。\n\n```\n- (id) getBlockArray\n\
  {\n    int val = 10;\n\n    return [[NSArray alloc] initWithObjects:\n        ^{NSLog(@\"\
  blk0:%d\", val);},\n        ^{NSLog(@\"blk1:%d\", val);}, nil];\n}\n```\n\n`getBlockArray`\
  \ 方法在栈上创建了两个 Block，并将它们传递给 `NSArray` 类实例方法 `initWithObjects`。当从 `NSArray` 对象获取 Block\
  \ 并在调用者中执行时，会发生什么？\n\n```\nid obj = getBlockArray();\n\ntypedef void (^blk_t)(void);\n\
  \nblk_t blk = (blk_t)[obj objectAtIndex:0];\n\nblk();\n```\n\n应用会在执行 `blk()` 时崩溃。换句话说，Block\
  \ 的执行会抛出异常。从 `getBlockArray` 函数返回后，栈上的 Block 已被销毁。不幸的是，在这种情况下，编译器无法检测是否需要复制。虽然编译器可以在不检测是否需要复制的情况下每次都复制所有\
  \ Block，但当 Block 从栈复制到堆时会消耗过多的 CPU 资源。如果栈上的 Block 已经足够用，却仍然被复制到堆上，CPU 性能就被白白浪费了。因此，编译器不会这样做。但反过来，有时你就需要手动复制\
  \ Block。\n\n修改后的源码如下，可以正常工作。\n\n```\n- (id) getBlockArray\n{\n    int val = 10;\n\
  \n    return [[NSArray alloc] initWithObjects:\n        [^{NSLog(@\"blk0:%d\", val);}\
  \ copy],\n        [^{NSLog(@\"blk1:%d\", val);} copy], nil];\n}\n```\n\n看起来有点奇怪，但可以直接对\
  \ Block 字面量调用 `copy` 方法。当然，你也可以通过 Block 类型的变量来调用 `copy` 方法。\n\n```\ntypedef int\
  \ (^blk_t)(int);\n\nblk_t blk = ^(int count){return rate * count;};\n\nblk = [blk\
  \ copy];\n```\n\n顺便问一下，如果对堆上或数据段中的 Block 调用 `copy` 方法，会发生什么？表 5-2 总结了这些情况。\n\n![images](img/t0502.jpg)\n\
  \n无论 Block 存储在何处，调用 `copy` 方法都不会产生不良后果。如果你不确定是否需要复制，那么直接对 Block 调用 `copy` 是安全的选择。\n\
  \n但是，多次调用 `copy` 可以吗？因为在 ARC 下，我们不能调用 `release`。\n\n#### 多次复制 Block\n\n```\nblk\
  \ = [[[[blk copy] copy] copy] copy];\n```\n\n这可以重写为如下形式。\n\n```\n{\n    blk_t tmp\
  \ = [blk copy];\n    blk = tmp;\n}\n{\n    blk_t tmp = [blk copy];\n    blk = tmp;\n\
  }\n{\n    blk_t tmp = [blk copy];\n    blk = tmp;\n}\n{\n    blk_t tmp = [blk copy];\n\
  \    blk = tmp;\n}\n```\n\n让我们用 代码清单 5-6 中带注释的源码来检查一下。\n\n**代码清单 5-6.** *带注释的多次复制*\n\
  \n```\n     /*\n      * 假设一个栈上的 Block 已被赋值给变量 'blk'\n      */\n\n    blk_t tmp =\
  \ [blk copy];\n\n     /*\n      * 一个堆上的 Block 被赋值给变量 'tmp'。\n      * 由于强引用，'tmp'\
  \ 拥有该 Block 的所有权。\n      */\n\n    blk = tmp;\n\n     /*\n      * 变量 'tmp' 中的 Block\
  \ 被赋值给变量 'blk'。\n      * 由于强引用，'blk' 拥有该 Block 的所有权。\n      *\n      * 最初赋值给 'blk'\
  \ 的那个 Block 不受此赋值影响，因为它位于栈上。\n      *\n      * 此时，变量 'blk' 和 'tmp' 都拥有该 Block 的所有权。\n\
  \      */\n\n}\n     /*\n      * 离开变量作用域 'tmp'，\n      * 其强引用消失，Block 被释放。\n   \
  \   *\n      * 由于变量 'blk' 拥有该 Block 的所有权，因此该 Block 不会被销毁。\n      */\n{\n     /*\n\
  \      * 变量 'blk' 持有一个堆上的 Block。\n      * 由于强引用，'blk' 拥有该 Block 的所有权。\n      */\n\
  \n    blk_t tmp = [blk copy];\n\n     /*\n      * 一个堆上的 Block 被赋值给变量 'tmp'。\n  \
  \    * 由于强引用，'tmp' 拥有该 Block 的所有权。\n      */\n\n    blk = tmp;\n\n     /*\n    \
  \  * 由于不同的值被赋值给变量 'blk'，\n      * 对之前赋值给变量 'blk' 的 Block 的强引用消失，\n      * 该 Block\
  \ 被释放。\n      *\n      * 变量 'tmp' 拥有该 Block 的所有权，\n      * 因此该 Block 不会被销毁。\n  \
  \    *\n      * 变量 'tmp' 中的 Block 被赋值给变量 'blk'。\n      * 由于强引用，变量 'blk' 拥有了所有权。\n\
  \      *\n      * 此时，变量 'blk' 和 'tmp' 都拥有该 Block 的所有权。\n      */\n\n}\n     /*\n\
  \      * 离开变量作用域 'tmp'，\n      * 其强引用消失，Block 被释放。\n      *\n      * 由于变量 'blk'\
  \ 拥有该 Block 的所有权，因此该 Block 不会被销毁。\n      */\n\n     /*\n      * 重复 ...\n      */\n\
  ```\n\n在 ARC 下，这可以正常工作，没有问题。\n\n\n\n### `__block` 变量的内存段\n\n在上一节中，我们只学习了 Block。那么\
  \ `__block` 变量呢？当 Block 使用了 `__block` 变量并从栈复制到堆时，`__block` 变量会受到影响。表 5-3 对此进行了总结。\n\
  \n![images](img/t0503.jpg)\n\n当 Block 从栈复制到堆，并且它使用了 `__block` 变量，但其他 Block 未使用这些\
  \ `__block` 变量时，这些 `__block` 变量必须在栈上。此时，所有 `__block` 变量也会从栈复制到堆，并且该 Block 拥有这些 `__block`\
  \ 变量的所有权，如图 5-6 所示。\n\n当堆上的 Block 再次被复制时，`__block` 变量不会受到影响。\n\n![images](img/9781430241164_Fig05-06.jpg)\n\
  \n**图 5-6.** *一个 Block 使用 __block 变量*\n\n如果 `__block` 变量被多个 Block 使用会发生什么？起初，所有\
  \ Block 和 `__block` 变量都在栈上。当其中一个 Block 从栈复制到堆时，`__block` 变量也会从栈复制到堆。并且该 Block 拥有这些变量的所有权。当另一个\
  \ Block 从栈复制到堆时，被复制的 Block 拥有这些 `__block` 变量的所有权（图 5-7）。换句话说，`__block` 变量的引用计数会增加\
  \ 1。\n\n![images](img/9781430241164_Fig05-07.jpg)\n\n**图 5-7.** *多个 Block 使用一个 __block\
  \ 变量*\n\n当堆上的 Block 被释放时，Block 中使用的 `__block` 变量也会被释放，如图 5-8 所示。\n\n![images](img/9781430241164_Fig05-08.jpg)\n\
  \n**图 5-8.** *Block 被释放，__block 变量也被释放*\n\n这个概念与 Objective-C 中基于引用计数的内存管理完全一致。当\
  \ Block 使用 `__block` 变量时，Block 拥有该变量的所有权。当 Block 被释放时，所有权消失，`__block` 变量也被释放。\n\n\
  现在我们已经了解了 `__block` 变量如何存储在应用程序内存中。接下来，让我们学习 `__forwarding`。\n\n### `__forwarding`\n\
  \n`__forwarding` 用于正确访问 `__block` 变量，正如我在“Block 的内存段”一节中所解释的。接下来，让我们检查当 Block 被复制到堆时它是如何工作的。\n\
  \n我已经解释过，栈上实例的成员变量“`__forwarding`”会指向堆上实例的指针，这样无论变量在栈上还是堆上，都能被正确访问。\n\n当 Block 被复制时，`__block`\
  \ 变量也会从栈复制到堆。在这种情况下，栈上和堆上的 `__block` 变量可能同时被访问。让我们看看下面的例子。\n\n```\n__block int val\
  \ = 0;\n\nvoid (^blk)(void) = [^{++val;} copy];\n\n++val;\n\nblk();\n\nNSLog(@\"\
  %d\", val);\n```\n\n当使用 `__block` 变量的 Block 通过“copy”方法复制时，不仅 Block，`__block` 变量也会从栈复制到堆。\n\
  \n让我们看看 `__block` 变量是在哪里使用的。初始化之后，它在 Block 字面量内部被使用。\n\n```\n^{++val;}\n```\n\n\
  在 Block 字面量之后，它也在 Block 外部被使用：\n\n```\n++val;\n```\n\n这两个源代码都会被转换成如下形式。\n\n```\n\
  ++(val.__forwarding->val);\n```\n\n在从 Block 字面量转换而来的函数中，变量“val”是堆上用于 `__block` 变量的结构体实例。Block\
  \ 外部的另一个变量“val”则在栈上。当 `__block` 变量从栈复制到堆时，栈上实例的成员变量“`__forwarding`”会被修改为堆上复制实例的地址，如图\
  \ 5-9 所示。\n\n![images](img/9781430241164_Fig05-09.jpg)\n\n**图 5-9.** *复制 __block\
  \ 变量*\n\n通过这种机制，无论 `__block` 变量是在栈上还是堆上，我们都可以从任何地方（Block 字面量内部或 Block 字面量外部）访问同一个\
  \ `__block` 变量。\n\n\n\n### 捕获对象\n\n前面我们看到了使用整型变量的例子。接下来，让我们看看在 Block 中使用对象时会发生什么。在下面的源代码中，创建了一个\
  \ `NSMutableArray` 类的对象，并且赋值的变量拥有其所有权。由于使用 `__strong` 修饰的变量的作用域即将结束，该对象被释放并销毁。\n\
  \n```\n{\n    id array = [[NSMutableArray alloc] init];\n}\n```\n\n代码清单 5-7 在 Block\
  \ 字面量中使用了变量 `array`。\n\n**代码清单 5-7.** *捕获一个对象*\n\n```\nblk_t blk;\n{\n    id array\
  \ = [[NSMutableArray alloc] init];\n    blk = [^(id obj) {\n        [array addObject:obj];\n\
  \        NSLog(@\"array count = %ld\", [array count]);\n    } copy];\n}\nblk([[NSObject\
  \ alloc] init]);\nblk([[NSObject alloc] init]);\nblk([[NSObject alloc] init]);\n\
  ```\n\n由于变量 `array` 的强引用消失，赋给变量 `array` 的 `NSMutableArray` 类对象理应被释放并销毁。但结果显示它运行无误。\n\
  \n```\narray count = 1\narray count = 2\narray count = 3\n```\n\n这意味着，在源代码执行 Block\
  \ 的最后部分时，即使变量作用域已经结束，赋给变量 `array` 的 `NSMutableArray` 类对象仍然存在。源代码的转换结果如代码清单 5-8 所示。\n\
  \n**代码清单 5-8.** *代码清单 5-7 的转换后源代码*\n\n```\n/* Block 的结构体和相关函数 */\n\nstruct __main_block_impl_0\
  \ {\n    struct __block_impl impl;\n    struct __main_block_desc_0* Desc;\n    id\
  \ __strong array;\n    __main_block_impl_0(void *fp, struct __main_block_desc_0\
  \ *desc,\n    id __strong _array, int flags=0) : array(_array) {\n        impl.isa\
  \ = &_NSConcreteStackBlock;\n        impl.Flags = flags;\n        impl.FuncPtr =\
  \ fp;\n        Desc = desc;\n    }\n};\n\nstatic void __main_block_func_0(struct\
  \ __main_block_impl_0 *__cself, id obj)\n{\n    id __strong array = __cself->array;\n\
  \    [array addObject:obj];\n    NSLog(@\"array count = %ld\", [array count]);\n\
  }\n\nstatic void __main_block_copy_0(struct __main_block_impl_0 *dst,         struct\n\
  __main_block_impl_0 *src)\n{\n    _Block_object_assign(&dst->array, src->array,\
  \ BLOCK_FIELD_IS_OBJECT);\n}\n\nstatic void __main_block_dispose_0(struct __main_block_impl_0\
  \ *src)\n{\n    _Block_object_dispose(src->array, BLOCK_FIELD_IS_OBJECT);\n}\n\n\
  static struct __main_block_desc_0 {\n    unsigned long reserved;\n    unsigned long\
  \ Block_size;\n    void (*copy)(struct __main_block_impl_0*, struct __main_block_impl_0*);\n\
  \    void (*dispose)(struct __main_block_impl_0*);\n} __main_block_desc_0_DATA =\
  \ {\n    0,\n    sizeof(struct __main_block_impl_0),\n    __main_block_copy_0,\n\
  \    __main_block_dispose_0\n};\n\n/* Block 字面量及执行 Block */\n\nblk_t blk;\n{\n \
  \   id __strong array = [[NSMutableArray alloc] init];\n\n    blk = &__main_block_impl_0(\n\
  \        __main_block_func_0, &__main_block_desc_0_DATA, array, 0x22000000);\n \
  \   blk = [blk copy];\n}\n\n(*blk->impl.FuncPtr)(blk, [[NSObject alloc] init]);\n\
  (*blk->impl.FuncPtr)(blk, [[NSObject alloc] init]);\n(*blk->impl.FuncPtr)(blk, [[NSObject\
  \ alloc] init]);\n```\n\n请特别注意捕获的自动变量 `array`，它存储了 `NSMutableArray` 类的对象。你可以看到，用于\
  \ Block 的结构体包含了一个拥有 `__strong` 所有权修饰符的成员变量 `array`。\n\n```\nstruct __main_block_impl_0\
  \ {\n    struct __block_impl impl;\n    struct __main_block_desc_0* Desc;\n    id\
  \ __strong array;\n};\n```\n\n在 Objective-C 中，正如我们在第 2 章中学到的，C 结构体不能包含使用 `__strong`\
  \ 修饰的成员变量。原因在于编译器无法检测 C 结构体何时被初始化或销毁，从而无法进行正确的内存管理。\n\n然而，Objective-C 运行时库可以检测到\
  \ Block 何时从栈复制到堆，以及堆上的 Block 何时被销毁。因此，如果 Block 的结构体包含使用 `__strong` 或 `__weak` 修饰的变量，编译器就可以正确地初始化和销毁它们。为此，`struct\
  \ __main_block_desc_0` 中添加了 `copy` 和 `dispose` 成员变量，并为其分配了 `__main_block_copy_0`\
  \ 和 `__main_block_dispose_0` 函数。\n\n在源代码中，Block 的结构体包含一个使用 `__strong` 修饰的对象类型变量\
  \ `array`。由于编译器需要正确管理变量 `array` 中的对象，`__main_block_copy_0` 函数会调用 `_Block_object_assign`\
  \ 函数，将目标对象赋值给成员变量 `array` 并获取其所有权。\n\n```\nstatic void __main_block_copy_0(struct\
  \ __main_block_impl_0 *dst,\n        struct __main_block_impl_0 *src)\n{\n     _Block_object_assign(&dst->array,\
  \ src->array, BLOCK_FIELD_IS_OBJECT);\n}\n```\n\n`_Block_object_assign` 函数将对象赋值给成员变量，并调用一个相当于\
  \ `retain` 方法的函数。\n\n同样，`__main_block_dispose_0` 函数会调用 `_Block_object_dispose` 函数，以释放\
  \ Block 结构体中赋值给成员变量 `array` 的对象。\n\n```\nstatic void __main_block_dispose_0(struct\
  \ __main_block_impl_0 *src)\n{\n_Block_object_dispose(src->array, BLOCK_FIELD_IS_OBJECT);\n\
  }\n```\n\n`_Block_object_dispose` 函数会在结构体目标成员变量中的对象上调用一个相当于实例方法 `release` 的函数。\n\
  \n顺便提一下，`__main_block_copy_0` 函数（本书后续简称“copy 函数”）和 `__main_block_dispose_0` 函数（本书后续简称“dispose\
  \ 函数”）被赋值给了 `__main_block_desc_0` 结构体中的 `copy` 和 `dispose` 成员变量。但在转换后的源代码中，包括通过指针调用在内，这些函数完全没有被调用。那么这些函数是如何被使用的呢？\n\
  \n这些函数会在 Block 从栈复制到堆时，以及堆上的 Block 被销毁时被调用（参见表 5-4）。\n\n![images](img/t0504.jpg)\n\
  \n栈上的 Block 何时会被复制到堆上？\n\n*   当在 Block 上调用实例方法 `copy` 时\n*   当 Block 作为函数返回值时\n\
  *   当 Block 被赋值给使用 `__strong` 修饰的 `id` 类型或 Block 类型的类成员变量时\n*   当 Block 被传递给方法（包括\
  \ Cocoa 框架中的 `usingBlock` 方法或 Grand Central Dispatch API）时\n\n“当在 Block 上调用实例方法\
  \ `copy` 时”，如果 Block 在栈上，则会被复制到堆上。“当 Block 作为函数返回值时”或“当 Block 被赋值给使用 `__strong`\
  \ 修饰的 `id` 类型或 Block 类型的类成员变量时”，编译器会自动调用以目标 Block 为参数的 `_Block_copy` 函数，这相当于在 Block\
  \ 上调用 `copy` 实例方法。“当 Block 被传递给方法（包括 Cocoa 框架中的 `usingBlock` 方法或 Grand Central Dispatch\
  \ API）时”，会在方法或函数内部调用 Block 的实例方法 `copy`，或以 Block 为参数调用 `_Block_copy` 函数。\n\n栈上的\
  \ Block 会以这种方式在各种情况下被复制，但从某种意义上说，所有这些情况其实都是相同的。实际上，Block 只会在调用 `_Block_copy` 函数时被复制。\n\
  \n\n\n相反，当堆上的 Block 因无人拥有所有权而被释放和销毁时，会调用 `dispose` 函数。它相当于对象的 `dealloc` 方法。通过这种机制，Block\
  \ 捕获的对象可以通过赋值给带有 `__strong` 限定符的自动变量，从而在变量作用域之外继续存在。虽然我们在“`__block` 说明符”一节中跳过了这部分内容，但这种包含\
  \ `copy` 和 `dispose` 函数的机制同样适用于 `__block` 变量。\n\n```\nstatic void __main_block_copy_0(\n\
  \    struct __main_block_impl_0*dst, struct __main_block_impl_0*src)\n{\n    _Block_object_assign(&dst->val,\
  \ src->val, BLOCK_FIELD_IS_BYREF);\n}\n\nstatic void __main_block_dispose_0(struct\
  \ __main_block_impl_0*src) {\n    _Block_object_dispose(src->val, BLOCK_FIELD_IS_BYREF);\n\
  }\n```\n\n在转换后的源代码中，与 Block 结构体相关的部分几乎相同，唯一的区别列在表 5-5 中。\n\n![images](img/t0505.jpg)\n\
  \n参数 `BLOCK_FIELD_IS_OBJECT` 和 `BLOCK_FIELD_IS_BYREF` 用于切换 `copy` 和 `dispose` 函数的目标是对象还是\
  \ `__block` 变量。\n\n与通过 `copy` 函数获取捕获对象的所有权、通过 `dispose` 函数释放所有权的方式相同，Block 也通过 `copy`\
  \ 函数获取 `__block` 变量的所有权，并通过 `dispose` 函数释放所有权。\n\n现在我们已经了解到，当对象被赋值给带有 `__strong`\
  \ 的自动变量时，该对象可以在变量作用域之外继续存在；而当 `__block` 变量被复制到堆上，并且堆上的 Block 拥有其所有权时，它也可以在变量作用域之外继续存在。\n\
  \n### 何时应调用“copy”方法\n\n顺便问一下，在前面的源代码中，如果没有对 Block 调用实例方法 `copy`，会发生什么？\n\n```\n\
  blk_t blk;\n\n{\n    id array = [[NSMutableArray alloc] init];\n    blk = ^(id obj)\
  \ {\n        [array addObject:obj];\n        NSLog(@\"array count = %ld\", [array\
  \ count]);\n    };\n}\n\nblk([[NSObject alloc] init]);\nblk([[NSObject alloc] init]);\n\
  blk([[NSObject alloc] init]);\n```\n\n结果是应用程序终止。\n\n只有当调用了 `_Block_copy` 函数时，才会获取被捕获的、带有\
  \ `__strong` 限定符的对象类型自动变量的所有权。因此，举个例子，如果没有调用 `_Block_copy` 函数，即使对象被捕获，它也会被销毁。所以，当你在\
  \ Block 内部使用对象类型的自动变量时，应该对 Block 调用实例方法 `copy`，但以下情况除外。\n\n* 当 Block 从函数返回时\n* 当\
  \ Block 被赋值给 `id` 类型或 Block 类型类的成员变量，且该变量带有 `__strong` 限定符时\n* 当 Block 被传递给 Cocoa\
  \ 框架中包含 `usingBlock` 的方法，或 Grand Central Dispatch API 时\n\n接下来，让我们看看当对象存储在 `__block`\
  \ 变量中时会发生什么。\n\n### `__block` 变量与对象\n\n`__block` 说明符可用于任何类型的自动变量。接下来看看如何使用它来将一个\
  \ Objective-C 对象赋值给一个 `id` 类型的自动变量。\n\n```\n__block id obj = [[NSObject alloc] init];\n\
  ```\n\n这等价于：\n\n```\n__block id __strong obj = [[NSObject alloc] init];\n```\n\n\
  当启用 ARC 时，`id` 或对象类型的变量总是带有所有权限定符，并且其默认值是 `__strong`。clang 会按如下方式进行转换。\n\n```\n\
  /* __block 变量的结构体 */\n\nstruct __Block_byref_obj_0 {\n    void *__isa;\n    __Block_byref_obj_0\
  \ *__forwarding;\n    int __flags;\n    int __size;\n    void (*__Block_byref_id_object_copy)(void*,\
  \ void*);\n    void (*__Block_byref_id_object_dispose)(void*);\n    __strong id\
  \ obj;\n};\n\nstatic void __Block_byref_id_object_copy_131(void *dst, void *src)\
  \ {\n    _Block_object_assign((char*)dst + 40, *(void * *) ((char*)src + 40), 131);\n\
  }\n\nstatic void __Block_byref_id_object_dispose_131(void *src) {\n    _Block_object_dispose(*(void\
  \ * *) ((char*)src + 40), 131);\n}\n\n/* __block 变量声明 */\n\n __Block_byref_obj_0\
  \ obj = {\n    0,\n    &obj,\n    0x2000000,\n    sizeof(__Block_byref_obj_0),\n\
  \    __Block_byref_id_object_copy_131,\n    __Block_byref_id_object_dispose_131,\n\
  \    [[NSObject alloc] init]\n};\n```\n\n这里使用了上一节中解释过的 `_Block_object_assign` 和\
  \ `_Block_object_dispose` 函数。\n\n当一个 `id` 或对象类型的自动变量被 Block 捕获，并且 Block 从栈复制到堆时，会调用\
  \ `_Block_object_assign` 函数，以便 Block 获取被捕获对象的所有权。当堆上的 Block 被销毁时，会调用 `_Block_object_dispose`\
  \ 函数来释放被捕获的对象。\n\n当带有 `__strong` 限定符的 `id` 或对象类型的自动变量同时具有 `__block` 说明符时，也会发生同样的情况。当\
  \ `__block` 变量从栈复制到堆时，会调用 `_Block_object_assign` 函数，以便 Block 获取 `__block` 变量的所有权。当堆上的\
  \ `__block` 变量被销毁时，会调用 `_Block_object_dispose` 函数来释放 `__block` 变量中的对象。\n\n现在我们明白了，只要带有\
  \ `__strong` 限定符的对象类型 `__block` 变量存在于堆上，赋值给该 `__block` 变量的对象同样会存在，并且其所有权得到妥善管理。这就好比一个被赋值给带有\
  \ `__strong` 限定符的对象类型自动变量的对象，在 Block 内部被使用一样。\n\n顺便提一下，到目前为止，我们只学习了带有 `__strong`\
  \ 限定符的 `id` 或对象类型的自动变量。其他所有权限定符的情况又如何呢？使用 `__weak` 所有权限定符会发生什么？下面的源代码是关于带有 `__weak`\
  \ 限定符的 `id` 类型变量。\n\n```\nblk_t blk;\n\n{\n    id array = [[NSMutableArray alloc]\
  \ init];\n    id __weak array2 = array;\n    blk = [^(id obj) {\n\n        [array2\
  \ addObject:obj];\n\n        NSLog(@\"array2 count = %ld\", [array2 count]);\n\n\
  \    } copy];\n}\n\nblk([[NSObject alloc] init]);\nblk([[NSObject alloc] init]);\n\
  blk([[NSObject alloc] init]);\n```\n\n结果与“捕获对象”一节中的结果不同。\n\n```\narray2 count =\
  \ 0\narray2 count = 0\narray2 count = 0\n```\n\n这是因为当离开变量作用域时，变量 `array` 被释放并丢弃，并且将\
  \ `nil` 赋值给了变量 `array2`。这正如所预期的那样工作。\n\n如果同时使用 `__block` 说明符和 `__weak` 所有权限定符，会发生什么？\n\
  \n```\nblk_t blk;\n\n{\n    id array = [[NSMutableArray alloc] init];\n    __block\
  \ id __weak array2 = array;\n\n    blk = [^(id obj) {\n\n        [array2 addObject:obj];\n\
  \n        NSLog(@\"array2 count = %ld\", [array2 count]);\n    } copy];\n}\n\nblk([[NSObject\
  \ alloc] init]);\nblk([[NSObject alloc] init]);\nblk([[NSObject alloc] init]);\n\
  ```\n\n结果与上一个相同。\n\n```\narray2 count = 0\narray2 count = 0\narray2 count = 0\n\
  ```\n\n\n\n即使带有`__block`说明符，当变量作用域结束，具有`__strong`修饰符的变量“array”会被释放并丢弃，然后因为“array2”被`__weak`修饰，`nil`会被赋值给变量“array2”。\n\
  \n具有`__unsafe_unretained`修饰符的变量就像一个简单的指针。无论它如何在 Block 内部使用或带有`__block`说明符，`__strong`或`__weak`修饰符的机制都不会起作用。因此，当你使用具有`__unsafe_unretained`修饰符的变量时，请注意不要通过悬垂指针访问已丢弃的对象。请参见第\
  \ 2 章，“`__unsafe_unretained`所有权修饰符”一节。\n\n`__autoreleasing`修饰符假定不与 Block 一起使用，因此不应使用它。如果你将其与`__block`说明符一起使用，会发生编译错误。\n\
  \n```\n__block id __autoreleasing obj = [[NSObject alloc] init];\n```\n\n因为对变量“obj”同时使用了`__autoreleasing`所有权修饰符和`__block`说明符，会发生编译错误：\n\
  \n```\nerror: __block variables cannot have __autoreleasing ownership\n    __block\
  \ id __autoreleasing obj = [[NSObject alloc] init];\n                          \
  \                             ^\n```\n\n### Blocks 的循环引用\n\n如果 Block 使用了具有`__strong`修饰符的对象类型的自动变量，当\
  \ Block 从栈复制到堆时，Block 将拥有该对象的所有权。这很容易导致循环引用。让我们看下面的例子。\n\n```\ntypedef void (^blk_t)(void);\n\
  \n@interface MyObject : NSObject\n{\n    blk_t blk_;\n}\n@end\n\n@implementation\
  \ MyObject\n\n- (id)init\n{\n    self = [super init];\n    blk_ = ^{NSLog(@\"self\
  \ = %@\", self);};\n    return self;\n}\n\n- (void)dealloc\n{\n    NSLog(@\"dealloc\"\
  );\n}\n@end\n\nint main()\n{\n    id o = [[MyObject alloc] init];\n    NSLog(@\"\
  %@\", o);\n    return 0;\n}\n```\n\n在这个例子中，`MyObject`类的实例方法“dealloc”永远不会被调用。\n\n\
  `MyObject`类的对象强引用了 Block，该 Block 被赋值给 Block 类型成员变量“blk_”，这意味着`MyObject`类的对象拥有该 Block\
  \ 的所有权。Block 字面量在实例方法“init”中执行，并且它使用了具有`__strong`修饰符的`id`类型变量“self”。当 Block 字面量被赋值给成员变量“blk_”时，由该字面量生成的\
  \ Block 从栈被复制到堆。因为 Block 使用了“self”，所以 Block 拥有“self”的所有权。\n\n因此，“self”拥有 Block 的所有权，Block\
  \ 也拥有“self”的所有权。这就形成了如图 5-10 所示的循环引用。\n\n![images](img/9781430241164_Fig05-10.jpg)\n\
  \n**图 5–10.** *Block 成员变量的循环引用*\n\n在这种情况下，编译器可以检测到循环引用。警告消息会正确显示。\n\n```\nwarning:\
  \ capturing 'self' strongly in this block is likely to lead\n        to a retain\
  \ cycle [-Warc-retain-cycles]\n            blk_ = ^{NSLog(@\"self = %@\", self);};\n\
  \                                         ^~~~\n\nnote: Block will be retained by\
  \ an object strongly retained by the\n        captured object\n            blk_\
  \ = ^{NSLog(@\"self = %@\", self);};\n            ^~~~\n```\n\n为了避免循环引用，例如，你可以使用`__weak`修饰符声明一个变量，并将“self”赋值给它（图\
  \ 5–11）。\n\n```\n- (id)init\n{\n    self = [super init];\n    id __weak tmp = self;\n\
  \    blk_ = ^{NSLog(@\"self = %@\", tmp);};\n    return self;\n}\n```\n\n![images](img/9781430241164_Fig05-11.jpg)\n\
  \n**图 5–11.** *避免 Block 成员变量的循环引用*\n\n在源代码中，只要 Block 存在，拥有该 Block 所有权的`MyObject`类的对象也就存在，这意味着赋值给变量“tmp”的“self”始终存在。因此，你不需要检查“tmp”是否为`nil`。\n\
  \n对于 iOS 4 或 Snow Leopard 应用程序，你必须使用`__unsafe_unretained`所有权修饰符来代替`__weak`。在这个例子中，你可以使用它而无需担心悬垂指针。\n\
  \n```\n- (id)init {\n    self = [super init];\n    id __unsafe_unretained tmp =\
  \ self;\n    blk_ = ^{NSLog(@\"self = %@\", tmp);};\n    return self;\n}\n```\n\n\
  并且，在接下来的源代码中，即使 Block 中没有使用到`self`，但因为捕获了`self`，所以会发生循环引用。\n\n```\n@interface MyObject\
  \ : NSObject\n{\n    blk_t blk_;\n    id obj_;\n}\n@end\n\n@implementation MyObject\n\
  - (id)init\n{\n    self = [super init];\n    blk_ = ^{NSLog(@\"obj_ = %@\", obj_);};\n\
  \    return self;\n}\n```\n\n你可以从警告消息中发现原因：\n\n```\nwarning: capturing 'self' strongly\
  \ in this Block is likely to lead\n        to a retain cycle [-Warc-retain-cycles]\n\
  \            blk_ = ^{NSLog(@\"obj_ = %@\", obj_);};\n                         \
  \                                           ^~~~\nnote: Block will be retained by\
  \ an object strongly retained by the\n         captured object\n            blk_\
  \ = ^{NSLog(@\"obj_ = %@\", obj_);};\n            ^~~~\n```\n\n\n\n因为 Block 字面量使用了\
  \ `obj_`，所以 `self` 被捕获。实际上，对于编译器而言，`obj_` 只是对象对应结构体中的一个成员变量，如下所示。\n\n```\nblk_ =\
  \ ^{NSLog(@\"obj_ = %@\", self->obj_);};\n```\n\n你可以像上一个示例那样，使用 `__weak` 所有权修饰符来避免循环引用。出于同样的原因，在此示例中，你也可以安全地使用\
  \ `__unsafe_unretained` 所有权修饰符。\n\n```\n- (id)init\n{\n    self = [super init];\n\
  \    id __weak obj = obj_;\n    blk_ = ^{NSLog(@\"obj_ = %@\", obj);};\n    return\
  \ self;\n}\n```\n\n当你使用 `__weak` 所有权修饰符来避免循环引用时，即使可以通过检查变量是否为 `nil` 来知晓对象是否存在，但在你使用该变量的整个过程中，对象应该一直存在。\n\
  \n此外，还有另一种避免循环引用的方法。你可以通过使用 `__block` 变量来实现，如下所示。\n\n```\ntypedef void (^blk_t)(void);\n\
  \n@interface MyObject : NSObject\n{\n    blk_t blk_;\n}\n@end\n\n@implementation\
  \ MyObject\n\n- (id)init\n{\n        self = [super init];\n    __block id tmp =\
  \ self;\n    blk_ = ^{\n        NSLog(@\"self = %@\", tmp);\n        tmp = nil;\n\
  \    };\n    return self;\n}\n\n- (void)execBlock\n{\n    blk_();\n}\n\n- (void)dealloc\n\
  {\nNSLog(@\"dealloc\");\n}\n@end\n\nint main()\n{\n    id o = [[MyObject alloc]\
  \ init];\n    [o execBlock];\n    return 0;\n}\n```\n\n这段源码不会引起循环引用。然而，如果不调用实例方法\
  \ `execBlock`，换句话说，如果赋值给成员变量 `blk_` 的 Block 没有被执行，就会产生循环引用，如图 Figure 5–12 所示。\n\n\
  在 `MyObject` 类的对象被创建后，循环引用便存在了，因为：\n\n*   `MyObject` 类的对象拥有 Block 的所有权。\n*   Block\
  \ 拥有 `__block` 变量的所有权。\n*   `__block` 变量拥有 `MyObject` 类对象的所有权。\n\n![images](img/9781430241164_Fig05-12.jpg)\n\
  \n**Figure 5–12.** *循环引用*\n\n如果实例方法 `execBlock` 没有被调用，循环引用会导致内存泄漏。通过调用实例方法 `execBlock`，Block\
  \ 会被执行，并且 `nil` 会被赋值给 `__block` 变量 `tmp`。\n\n```\nblk_ = ^{\n    NSLog(@\"self =\
  \ %@\", tmp);\n    tmp = nil;\n};\n```\n\n此后，`__block` 变量 `tmp` 不再强引用 `MyObject`\
  \ 类对象。因此，循环引用消失了，如图 Figure 5–13 所示。其关系如下：\n\n*   `MyObject` 类的对象拥有 Block 的所有权。\n\
  *   Block 拥有 `__block` 变量的所有权。\n\n![images](img/9781430241164_Fig05-13.jpg)\n\n\
  **Figure 5–13.** *避免循环引用*\n\n比较两种方法：一种是使用 `__block` 变量，另一种是使用 `__weak` 或 `__unsafe_unretained`\
  \ 所有权修饰符。\n\n使用 `__block` 变量的优势在于：\n\n*   你可以通过控制 `__block` 变量来控制对象的生命周期。\n*   即使在不支持\
  \ `__weak` 所有权修饰符的环境中，也无需使用 `__unsafe_unretained` 所有权修饰符，并且不必担心野指针的问题。\n\n这意味着，在\
  \ Block 执行期间，你可以动态地将 `nil` 或其他对象赋值给 `__block` 变量。\n\n相比之下，使用 `__block` 变量的劣势在于：\n\
  \n*   你必须执行 Block 才能避免循环引用。\n\n在 Block 字面量被执行后，如果应用程序没有执行该 Block，则无法避免循环引用。如果因为\
  \ Block 导致了循环引用，你需要根据 Block 的使用方式，来决定是使用 `__block` 变量，还是使用 `__weak` 或 `__unsafe_unretained`\
  \ 所有权修饰符来解决。\n\n### Copy/Release\n\n当 ARC 被禁用时，要手动将 Block 从栈复制到堆。并且，由于 ARC 被禁用，你也必须手动释放该\
  \ Block。你可以使用实例方法 `copy` 和 `release`，如下所示。\n\n```\nvoid (^blk_on_heap)(void) = [blk_on_stack\
  \ copy];\n\n[blk_on_heap release];\n```\n\n此外，你可以使用实例方法 `retain` 获取一个已经复制到堆上的 Block\
  \ 的所有权。\n\n```\n[blk_on_heap retain];\n```\n\n不幸的是，当你对栈上的 Block 调用 `retain` 时，什么都不会发生。\n\
  \n```\n[blk_on_stack retain];\n```\n\n在这段源码中，对赋值给 `blk_on_stack` 的栈上 Block 调用了实例方法\
  \ `retain`，但实际上什么也没发生。因此，要获取 Block 的所有权，我建议你始终调用实例方法 `copy`。\n\n另外，由于 Block 是 C\
  \ 语言的扩展，你可以在 C 语言中使用 Block 语法。在这种情况下，你可以使用 `Block_copy` 和 `Block_release` 函数，而不是\
  \ Objective-C 中的 `copy` 和 `release` 方法。引用计数的概念以及使用方法与 `copy` 和 `release` 方法完全相同。\n\
  \n```\nvoid (^blk_on_heap)(void) = Block_copy(blk_on_stack);\n\nBlock_release(blk_on_heap);\n\
  ```\n\n`Block_copy` 函数的工作方式与我们之前学到的 `_Block_copy` 类似。这个函数是为 C 语言提供的，实际上，Objective-C\
  \ 运行时库也使用它。同样地，当堆上的 Block 被释放时，Objective-C 运行时库会调用 `Block_release` 函数。\n\n顺便提一下，在没有\
  \ ARC 的情况下，`__block` 说明符可用于避免 Block 引起的循环引用。因为，根据其规范，当 Block 从栈复制到堆，并且使用了 `id` 或对象类型的自动变量时，如果该变量没有\
  \ `__block` 说明符，该对象会被 retain；相反，如果有 `__block` 说明符，该对象不会被 retain。例如，无论 ARC 是否启用，以下源码都会引起循环引用，因为\
  \ Block 拥有 `self` 的所有权，而 `self` 又拥有 Block 的所有权。\n\n```\ntypedef void (^blk_t)(void);\n\
  \n@interface MyObject : NSObject\n{\n    blk_t blk_;\n}\n@end\n\n@implementation\
  \ MyObject\n- (id)init\n{\n    self = [super init];\n    blk_ = ^{NSLog(@\"self\
  \ = %@\", self);};\n    return self;\n}\n\n- (void)dealloc\n{\n    NSLog(@\"dealloc\"\
  );\n}\n@end\n\nint main()\n{\n    id o = [[MyObject alloc] init];\n    NSLog(@\"\
  %@\", o);\n    return 0;\n}\n```\n\n对于 ARC 被禁用的环境，你可以使用 `__block` 变量来解决这个问题。\n\n\
  ```\n- (id)init {\n    self = [super init];\n    __block id tmp = self;\n    blk_\
  \ = ^{NSLog(@\"self = %@\", tmp);};\n    return self;\n}\n```\n\n它的工作方式类似于 ARC 启用环境下的\
  \ `__unsafe_unretained` 所有权修饰符。`__block` 说明符的用途在 ARC 启用和禁用时大相径庭。因此，你必须注意源码是用于 ARC\
  \ 启用环境还是禁用环境。\n\n## 总结\n\n在本章中，我们深入讨论了 Block，了解了 Block 是如何通过 Clang 编译的。特别是，我们学习了：\n\
  \n*   自动变量是如何被捕获的\n*   `__block` 变量是如何实现的\n*   由于捕获对象导致的循环引用问题是如何发生的，以及如何解决它\n\n\
  如果你将 Block 与接下来章节中要讨论的 Grand Central Dispatch 结合使用，Block 会非常强大。\n\n## 第 6 章\n\n\
  ## Grand Central Dispatch\n\n在最后的三章中，我们将讨论 Grand Central Dispatch（GCD）。这个新特性是为 OS\
  \ X Snow Leopard 和 iOS 4 或更高版本引入的，以帮助进行多线程编程。我将结合其实现来解释多线程编程将如何改变。\n\n在本章中，我们首先快速看一个使用\
  \ GCD 的示例。然后，我们会回顾在当前多线程编程中 GCD 带来的好处，以及 GCD 出现之前传统的多线程编程是如何进行的。\n\n\n\n## Grand\
  \ Central Dispatch 概览\n\n我们来看看苹果公司对 Grand Central Dispatch 的描述：\n\n> *异步执行任务的技术之一便是\
  \ Grand Central Dispatch（GCD）。这项技术会将你通常在应用程序中编写的线程管理代码，下放到系统层面。你只需定义要执行的任务，并将它们添加到合适的调度队列中即可。GCD\
  \ 会负责创建所需的线程，并安排你的任务在这些线程上运行。由于线程管理现在已成为系统的一部分，GCD 提供了整体性的任务管理和执行方法，其效率远超传统线程。*\n\
  \nGrand Central Dispatch 似乎是一项创新技术，它能让多线程源代码变得出奇地优雅。我们通过一个例子来看看这是否属实，以及它是如何实现的。尽管这个例子有点抽象，但它展示了\
  \ GCD 的强大之处。\n\n```\ndispatch_async(queue_for_background_threads, ^{\n    /*\n \
  \    * 此处处理耗时任务\n     * 例如 AR 图像处理、数据库访问等\n     */\n\n    /*\n     * 任务完成。然后，在主线程上使用结果，如下所示。\n\
  \     */\n\n    dispatch_async(dispatch_get_main_queue(), ^{\n\n        /*\n   \
  \      * 此处放置只在主线程工作的任务，例如\n         * 更新用户界面等\n         */\n    });\n});\n```\n\
  \n这个例子演示了在后台线程处理耗时任务，然后在主线程上使用结果。\n`dispatch_async(queue_for_background_threads,\
  \ ^{`\n这一行代码就让任务在后台线程中运行。\n`dispatch_async(dispatch_get_main_queue(), ^{`\n这一行代码同样让任务在主线程中运行。如你所见，这里使用了脱字符\
  \ `^` 和 Block，使得源代码变得简单，正如我们在前几章中学到的那样。看来苹果公司所言非虚。接下来，我们简要回顾一下多线程源代码是什么样子的。在 GCD\
  \ 引入之前，Cocoa 框架已有支持多线程编程的机制，例如 `NSObject` 类的实例方法 `performSelectorInBackground:withObject`、`performSelectorOnMainThread`\
  \ 等等。\n\n我们来看看之前的例子如何用 `performSelector` 方法族来编写。\n\n```\n/*\n * 通过 NSObject 的 performSelectorInBackground:withObject:\
  \ 方法\n * 在后台线程启动一个任务\n */\n- (void) launchThreadByNSObject_performSelectorInBackground_withObject\n\
  {\n    [self performSelectorInBackground:@selector(doWork) withObject:nil];\n}\n\
  \n/*\n * 在后台线程上执行的方法\n */\n- (void) doWork\n{\n    NSAutoreleasePool *pool = [[NSAutoreleasePool\
  \ alloc] init];\n\n    /*\n     * 此处处理耗时任务，\n     * 例如 AR 图像处理、\n     * 数据库访问等\n\
  \     */\n\n    /*\n     * 任务完成。接下来，在主线程上使用结果，如下所示。\n     */\n\n    [self performSelectorOnMainThread:@selector(doneWork)\n\
  \        withObject:nil waitUntilDone:NO];\n    [pool drain];\n}\n\n/*\n * 在主线程上执行的方法\n\
  \ */\n- (void) doneWork\n{\n    /*\n     * 只能在主线程上执行的任务应放在此处，\n     * 例如更新用户界面等\n\
  \     */\n}\n```\n\n虽然使用 `performSelector` 方法族进行多线程编程的源代码比使用 `NSThread` 类的源代码更简单，但使用\
  \ GCD 的源代码显然是最简洁的。\n\n使用 GCD 进行多线程编程比使用 `performSelector` 方法族更加优雅。你无需使用 `NSThread`\
  \ 类或 `performSelector` 方法族那些凌乱的 API。而且，它的效率也更高。简直百利而无一害！\n\n**注意：** 当你想要释放 `NSAutoreleasePool`\
  \ 对象时，建议调用 `drain` 而非 `release`。通过 `drain`，即使在启用了垃圾回收的环境中，池也会立即被释放。如果不使用垃圾回收，直接使用\
  \ `release` 也没有问题。\n\n## 多线程编程\n\n正如所解释的那样，GCD 是一项让多线程编程变得优雅的技术。在学习 GCD 本身之前，我们先回顾一下传统的多线程编程。\n\
  \n此外，要充分利用多线程的优势，你应该对应用程序如何在 Mac 或 iPhone 上执行有一个基本的了解。我们先来看看这些内容。\n\n请浏览一下非常简单的\
  \ Objective-C 源代码。\n\n```\nint main()\n{\n    id o = [[MyObject alloc] init];\n\n\
  \    [o execBlock];\n\n    return 0;\n}\n```\n\n这里有一些方法调用，但基本上，它是如 图 6-1 所示，从上到下执行的。\n\
  \n![图片](img/9781430241164_Fig06-01.jpg)\n\n**图 6-1.** *CPU 执行 CPU 字节码*\n\n你知道这段源代码在\
  \ Mac 或 iPhone 上是如何工作的吗？为了在计算机上执行它，编译器会将其转换为如下的 CPU 字节码。你不需要理解所有含义，但我们可以知道，简单的源代码被转换成了很长的指令序列。\n\
  \n```\n000001ac:     b590 push {r4, r7, lr}\n000001ae: f240019c movw r1, :lower16:0x260-0x1c0+0xfffffffc\n\
  000001b2:     af01 add  r7, sp, #4\n000001b4: f2c00100 movt r1, :upper16:0x260-0x1c0+0xfffffffc\n\
  000001b8: f24010be movw r0, :lower16:0x384-0x1c2+0xfffffffc\n000001bc: f2c00000\
  \ movt r0, :upper16:0x384-0x1c2+0xfffffffc\n000001c0:     4479 add  r1, pc\n000001c2:\
  \     4478 add  r0, pc\n000001c4:     6809 ldr  r1, [r1, #0]\n000001c6:     6800\
  \ ldr  r0, [r0, #0]\n000001c8: f7ffef1a blx  _objc_msgSend\n000001cc: f2400180 movw\
  \ r1, :lower16:0x258-0x1d4+0xfffffffc\n000001d0: f2c00100 movt r1, :upper16:0x258-0x1d4+0xfffffffc\n\
  000001d4:     4479 add  r1, pc\n000001d6:     6809 ldr  r1, [r1, #0]\n000001d8:\
  \ f7ffef12 blx  _objc_msgSend\n000001dc:     4604 mov  r4, r0\n000001de: f240007a\
  \ movw r0, :lower16:0x264-0x1e6+0xfffffffc\n000001e2: f2c00000 movt r0, :upper16:0x264-0x1e6+0xfffffffc\n\
  000001e6:     4478 add  r0, pc\n000001e8:     6801 ldr  r1, [r0, #0]\n000001ea:\
  \     4620 mov  r0, r4\n000001ec: f7ffef08 blx  _objc_msgSend\n000001f0:     4620\
  \ mov  r0, r4\n000001f2: f7ffef06 blx  _objc_release\n000001f6:     2000 movs r0,\
  \ #0\n000001f8:     bd90 pop  {r4, r7, pc}\n```\n\n\n\n### CPU 如何执行应用程序\n\n如我们所见，源代码会被转换成\
  \ CPU 字节码。应用程序将这些字节码连同数据打包在一起，安装到 Mac 或 iPhone 上。当用户在 Mac 的 OSX 或 iPhone 的 iOS 等操作系统上启动应用程序时，字节码会被分配到内存中，CPU\
  \ 从应用程序指定的起始地址开始，逐条执行这些字节码。\n\n在示例中，首先执行起始地址 `1ac` 处的指令 `push`。接着，执行指针移动到下一个地址。地址\
  \ `1ae` 处的下一条指令 `movw` 被执行，然后是地址 `1b2` 处的指令，依此类推。\n\n通过诸如 `if`、`for` 等控制语句或 Objective-C\
  \ 中的函数调用，执行地址可以跳转到一个较远的地址。一个 CPU 在同一个时刻只能执行一条指令。执行过程不会分裂成两条并发的指令。有时会用路径的类比来解释 CPU\
  \ 上的执行过程。\n\n线程相当于 CPU 执行的一条路径。如今，有些 CPU 拥有 64 个 CPU 核心；有些则作为两个虚拟 CPU 工作。一台计算机拥有多个\
  \ CPU 核心是非常普遍的情况。但一个 CPU 核心仍然只运行一条路径。多线程是指一个应用程序拥有多条路径。如图 Figure 6–2 所示，多线程应用程序可以并发地执行多条路径。\n\
  \n![images](img/9781430241164_Fig06-02.jpg)\n\n**图 6–2.** *CPU 在多线程上执行字节码*\n\n与\
  \ CPU 相关的技术很多，而且发展迅速，但一个 CPU 核心一次仍然只能执行一条 CPU 字节码。多线程应用程序是如何在多个路径上执行字节码的呢？\n\n作为\
  \ OS X 和 iOS 核心部分的 XNU 内核会在固定的时间间隔以及收到系统调用等操作系统事件时，在这些路径之间进行切换。一条路径的执行状态（包括 CPU\
  \ 寄存器）会被存储到分配给每条路径的内存块之一。然后，另一条路径的执行状态会从另一个内存块复制回 CPU 寄存器，如此反复；也就是说，CPU 会继续在这个新路径上执行。这种机制被称为*上下文切换*。多线程程序会反复不断地进行上下文切换。正因为如此，一个\
  \ CPU 可以虚拟地执行多个线程。当存在多个 CPU 核心时，每个核心可以并行运行一个线程。在这种情况下，真正能并行运行的线程数就等于 CPU 核心数。针对多线程的编程技术被称为*多线程编程*。\n\
  \n### 多线程编程的优缺点\n\n多线程编程会引发许多问题。例如，当多个线程竞争更新同一资源时，会导致数据不一致（称为*竞态条件*）。当多个线程同时等待某个事件时（*死锁*），这些线程会堆积起来。当使用过多线程时，应用程序的内存会变得紧张，等等（图\
  \ 6–3）。\n\n![images](img/9781430241164_Fig06-03.jpg)\n\n**图 6–3.** *多线程编程的问题*\n\n\
  当然，有许多方法可以避免这些问题，但源代码会迅速变得过于复杂。既然存在这些问题，为什么还要使用多线程编程呢？\n\n原因是为了让应用程序具有高响应性。在一个应用程序中，启动后就会立即启动一个线程。这个线程负责绘制用户界面、处理触摸面板的事件等。这个线程被称为*主线程*。如果主线程执行一个耗时的任务，比如增强现实的图像处理或数据库访问，那么这个任务会阻塞主线程上的所有其他任务。在\
  \ OSX 和 iOS 上，主线程上的主循环（称为 RunLoop）不应被阻塞，因为只有主线程才能更新用户界面。一旦被阻塞，用户界面将无法更新，并且同一张静态图片会显示相当长的时间。为了避免这种情况，耗时的任务应该在其他线程上执行，如图\
  \ Figure 6–4 所示。\n\n![images](img/9781430241164_Fig06-04.jpg)\n\n**图 6–4.** *多线程编程的优点*\n\
  \n在多线程应用程序中，当耗时任务正在运行时，用户界面仍然可以保持响应。GCD 也让多线程编程变得非常优雅。在下一章中，我们将展示如何使用 GCD API。\n\
  \n## 总结\n\n在本章中，我们学习了什么是多线程编程以及它的优缺点。在下一章中，我们将学习 GCD 的基本机制和 GCD API。我们还将展示 GCD 相比传统多线程编程的优势所在。\n\
  \n## 第 7 章\n\n## GCD 基础\n\n在本章中，我们将展示如何使用 GCD。首先，我们从 GCD 的核心概念——调度队列开始，并展示如何向队列中添加任务。之后，我们将设计一个\
  \ API 来控制队列和任务。最后，我们还将展示如何使用 GCD 调度 I/O 来控制文件。\n\n## 调度队列\n\n顾名思义，调度队列是一个用于存储待执行任务的队列。应用程序开发者可以将任务编写成块字面量，并通过\
  \ `dispatch_async` 函数等将其添加到调度队列中。然后，调度队列会按照添加的顺序，即先进先出（FIFO）的方式执行这些任务，如图 Figure\
  \ 7–1 所示。\n\n![images](img/9781430241164_Fig07-01.jpg)\n\n**图 7–1.** *调度队列上的执行过程*\n\
  \n如图 Figure 7–2 所示，有两种类型的调度队列。一种是串行调度队列，它会等待当前运行的任务完成后再启动另一个任务。另一种是并发调度队列，它不会等待。\n\
  \n![images](img/9781430241164_Fig07-02.jpg)\n\n**图 7–2.** *串行调度队列与并发调度队列*\n\n###\
  \ 两种类型的调度队列\n\n让我们来比较这两种类型的调度队列。下面的源代码使用 `dispatch_async` 函数将任务添加到调度队列。\n\n```\n\
  dispatch_async(queue, blk0);\ndispatch_async(queue, blk1);\ndispatch_async(queue,\
  \ blk2);\ndispatch_async(queue, blk3);\ndispatch_async(queue, blk4);\ndispatch_async(queue,\
  \ blk5);\ndispatch_async(queue, blk6);\ndispatch_async(queue, blk7);\n```\n\n让我们来看看当变量\
  \ `queue` 是一个串行调度队列（它会等待当前运行的任务完成）时，它是如何工作的。\n\n### 串行调度队列\n\n首先，`blk0` 启动。接着，`blk0`\
  \ 完成后，`blk1` 启动。然后 `blk1` 完成后，`blk2` 启动，依此类推。每次只运行一个任务，这意味着结果总是相同的。这些块将按如下顺序执行：\n\
  \n```\nblk0\nblk1\nblk2\nblk3\nblk4\nblk5\nblk6\nblk7\n```\n\n接下来，让我们看看当变量 `queue`\
  \ 是一个并发调度队列（它不会等待正在运行的任务完成）时，它是如何工作的。\n\n\n\n### 并发调度队列\n\n首先启动 `blk0`，无论它是否完成，都会启动\
  \ `blk1`，接着无论 `blk1` 是否结束，都会启动 `blk2`，以此类推。它不会等待任务完成，多个任务会同时运行，但请注意，并发运行的任务数量取决于当前系统的状态；也就是说，iOS\
  \ 或 OS X 会根据当前系统状态（例如调度队列中的任务数量、CPU 核心数或 CPU 使用率）来决定数量。多个任务可以通过底层使用多线程同时运行，如图 7-3\
  \ 所示。\n\n![images](img/9781430241164_Fig07-03.jpg)\n\n**图 7-3.** *串行调度队列、并发调度队列与线程的关系*\n\
  \niOS 和 OS X 的核心部分——XNU 内核负责决定线程数量，并创建线程来执行任务。当一个任务完成、运行中的任务数量减少时，XNU 内核会终止不再需要的线程。只需使用并发调度队列，XNU\
  \ 内核就能完美地管理多个线程以同时运行任务。例如，源代码会像表 7-1 所示那样在多个线程上执行。\n\n![images](img/t0701.jpg)\n\
  \n假设并发调度队列准备了四个线程。首先，`blk0` 在 `thread0` 上启动。接着，`blk1` 在 `thread1` 上启动，`blk2` 在 `thread2`\
  \ 上启动，`blk3` 在 `thread3` 上启动。然后，由于 `blk0` 已完成，`blk4` 在 `thread0` 上启动。接下来，由于 `blk1`\
  \ 仍在 `thread1` 上运行，而 `blk2` 已在 `thread2` 上完成，`blk5` 在 `thread2` 上启动。\n\n以这种方式，当使用并发调度队列时，执行顺序取决于任务本身、系统状态等因素。任务的顺序不像串行调度队列那样固定。当执行顺序很重要或任务不应同时运行时，应使用串行调度队列。\n\
  \n现在我们知道有两种类型的调度队列：串行调度队列和并发调度队列。如何获取这些队列呢？即将揭晓。\n\n## 获取调度队列\n\n有两种方法：使用 `dispatch_queue_create`\
  \ 以及使用 `主调度队列` / `全局调度队列`。下面将讨论这两种方法。\n\n### dispatch_queue_create\n\n`dispatch_queue_create`\
  \ 是一个用于创建调度队列的函数。通过此函数，你可以获取一个新的调度队列。接下来，源代码展示了如何创建串行调度队列，当然也可以创建并发调度队列，稍后会在本节中说明。\n\
  \n```\ndispatch_queue_t mySerialDispatchQueue =\ndispatch_queue_create(\"com.example.gcd.MySerialDispatchQueue\"\
  , NULL);\n```\n\n当你创建一个串行调度队列时，它与其他串行队列相互独立，即便它们每次只执行一个任务。例如，四个独立的串行队列各自有一个任务，如果同时启动，它们会同时开始执行，如图\
  \ 7-4 所示。\n\n![images](img/9781430241164_Fig07-04.jpg)\n\n**图 7-4.** *多个串行调度队列*\n\
  \n有一点我们必须了解。当创建一个串行调度队列并添加任务时，系统会为每个串行调度队列创建一个线程。如果创建了 2000 个串行调度队列，就会创建 2000 个线程。正如我所解释的，线程过多会消耗过多内存，过多的上下文切换会导致系统变慢，如图\
  \ 7-5 所示。\n\n![images](img/9781430241164_Fig07-05.jpg)\n\n**图 7-5.** *多个串行调度队列的问题*\n\
  \n这就是为什么只应在避免因多线程更新同一数据而导致的**数据不一致**（竞态条件）时使用串行调度队列，这曾是我提到的多线程编程问题之一（图 7-6）。\n\n\
  ![images](img/9781430241164_Fig07-06.jpg)\n\n**图 7-6.** *应使用串行调度队列的情形*\n\n串行调度队列的数量应与实际需求相同。例如，更新数据库时，应为每个表创建一个串行调度队列。更新文件时，应为该文件或每个单独的文件块创建一个串行调度队列。即使你认为可以比使用并发调度队列创建更多线程，也不要创建过多的串行调度队列。如果任务不会引起数据不一致等问题，并且你希望它们并发执行，则应使用并发调度队列。即使反复创建并发调度队列，也不会有问题，因为这些队列只是使用由\
  \ XNU 内核有效管理的线程。\n\n让我们回到 `dispatch_queue_create` 函数。该函数的第一个参数是串行调度队列的名称。如源代码所示，建议使用反向\
  \ DNS 格式的完全限定域名。当你在 Xcode 或 Instruments 中调试时，它会显示为调度队列的名称。应用程序崩溃时生成的崩溃日志也包含该名称。因此，这个名称对你作为应用程序开发者来说应该是可理解的，并且对用户来说也不会造成困扰。如果你觉得麻烦，可以直接使用\
  \ `NULL`，但在调试应用程序时你可能会后悔这个决定。\n\n至于第二个参数，要创建串行调度队列，应传递 `NULL`。要创建并发调度队列，则像下面这样传递\
  \ `DISPATCH_QUEUE_CONCURRENT`。\n\n```\ndispatch_queue_t myConcurrentDispatchQueue\
  \ = dispatch_queue_create(\n    \"com.example.gcd.MyConcurrentDispatchQueue\", \
  \ DISPATCH_QUEUE_CONCURRENT);\n```\n\n`dispatch_queue_create` 函数的返回类型是 `dispatch_queue_t`，这是用于调度队列的变量类型。在之前的所有例子中，变量\
  \ `queue` 都是 `dispatch_queue_t` 类型。\n\n```\ndispatch_queue_t myConcurrentDispatchQueue\
  \ = dispatch_queue_create(\n    \"com.example.gcd.MyConcurrentDispatchQueue\", DISPATCH_QUEUE_CONCURRENT);\n\
  \ndispatch_async(myConcurrentDispatchQueue,\n    ^{NSLog(@\"block on myConcurrentDispatchQueue\"\
  );});\n```\n\n在这段源代码中，Block 会在并发调度队列中运行。\n\n\n\n遗憾的是，尽管编译器拥有出色的自动内存管理机制 ARC，但应用程序开发者必须手动释放创建的调度队列，因为调度队列与\
  \ Block 不同，它不被视为 Objective-C 对象。当你不再需要它时，必须调用 `dispatch_release` 函数来释放由 `dispatch_queue_create`\
  \ 函数创建的调度队列。\n\n`dispatch_release(mySerialDispatchQueue);`\n\n既然名字中包含 “release”，自然也存在\
  \ `dispatch_retain` 函数。\n\n`dispatch_retain(myConcurrentDispatchQueue);`\n\n这意味着，调度队列必须通过\
  \ `dispatch_retain` 和 `dispatch_release` 函数，采用与 Objective-C 对象类似的引用计数技术进行管理。在之前的源代码中，由\
  \ `dispatch_queue_create` 函数创建并赋值给变量 `myConcurrentDispatchQueue` 的并发调度队列，必须被释放。\n\
  \n```\ndispatch_queue_t myConcurrentDispatchQueue = dispatch_queue_create(\n   \
  \ \"com.example.gcd.MyConcurrentDispatchQueue\", DISPATCH_QUEUE_CONCURRENT);\n\n\
  dispatch_async(myConcurrentDispatchQueue,\n    ^{NSLog(@\"block on myConcurrentDispatchQueue\"\
  );});\n\ndispatch_release(myConcurrentDispatchQueue);\n```\n\n并发调度队列使用多个线程来执行任务。在这个例子中，就在通过\
  \ `dispatch_async` 函数添加 Block 之后，并发调度队列就被 `dispatch_release` 函数释放了。这样操作安全吗？\n\n\
  这是完全安全的。当一个 Block 通过 `dispatch_async` 函数被添加到调度队列时，可以说，Block 通过 `dispatch_retain`\
  \ 函数拥有了该调度队列的所有权。这对于串行调度队列和并发调度队列都是一样的。然后，当 Block 执行完毕后，它会通过 `dispatch_release`\
  \ 函数释放该调度队列。\n\n即使在通过 `dispatch_async` 函数将 Block 添加到调度队列之后立即释放了该调度队列，这个调度队列也不会被销毁，Block\
  \ 依然可以执行。Block 执行完后，它会释放调度队列，调度队列随即被丢弃。`dispatch_retain` 和 `dispatch_release` 函数不仅适用于调度队列。从今往后，我们会看到许多名称中包含\
  \ “create” 的 GCD API。当你通过这些 API 获取到某些对象后，在不再需要它们时，必须使用 `dispatch_release` 函数进行释放。如果你通过其他方式获取它们，则必须通过\
  \ `dispatch_retain` 函数获取所有权，并在之后通过 `dispatch_release` 函数释放。\n\n### 主调度队列 / 全局调度队列\n\
  \n获取调度队列的另一种方式是直接获取系统已经提供的调度队列。实际上，系统提供了一些你无需创建的调度队列：主调度队列和全局调度队列。\n\n主调度队列，正如其名中的\
  \ “main” 所示，是用于在主线程上执行任务的队列。由于只有一个主线程，因此主调度队列是一个串行调度队列。主调度队列中的任务会在主线程的 RunLoop 中执行，如图\
  \ [Figure 7–7]（#Chapter07.html#fig_7_7）所示。由于它们是在主线程上执行的，你应该将其用于必须在主线程上完成的任务，例如更新用户界面等。它类似于\
  \ `NSObject` 类的 `performSelectorOnMainThread` 实例方法。\n\n![图片](img/9781430241164_Fig07-07.jpg)\n\
  \n**Figure 7–7.** *主调度队列*\n\n系统提供的其他队列称为全局调度队列。它们是并发调度队列，可以在应用程序的任何位置使用。除非有特殊原因（稍后会解释），在大多数情况下，你不需要通过\
  \ `dispatch_queue_create` 函数自行创建并发调度队列。你只需获取一个全局调度队列并使用即可。共有四个全局调度队列，它们各自具有不同的优先级：高、默认、低和后台。XNU\
  \ 内核管理着全局调度队列的线程，并且这些线程具有与每个全局调度队列优先级相对应的优先级。当你向全局调度队列添加任务时，应该选择一个具有适当优先级的全局调度队列。XNU\
  \ 内核并不保证线程的实时性。因此，这些优先级仅作为参考。例如，当你不太关心任务是否立即执行时，应该使用后台优先级。让我们通过 [Table 7–2]（#Chapter07.html#tab_7_2）来看看系统中提供了哪些类型的调度队列。\n\
  \n![图片](img/t0702.jpg)\n\n获取每个调度队列的方法如 [Listing 7–1]（#Chapter07.html#list_7_1）所示。\n\
  \n**Listing 7–1.** *获取调度队列*\n\n```\n /*\n  * 如何获取主调度队列\n  */\ndispatch_queue_t mainDispatchQueue\
  \ = dispatch_get_main_queue();\n\n /*\n  * 如何获取高优先级的全局调度队列\n  */\ndispatch_queue_t\
  \ globalDispatchQueueHigh =\n        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_HIGH,\
  \ 0);\n\n /*\n  * 如何获取默认优先级的全局调度队列\n  */\ndispatch_queue_t globalDispatchQueueDefault\
  \ =\n        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);\n\n\
  \ /*\n  * 如何获取低优先级的全局调度队列\n  */\ndispatch_queue_t globalDispatchQueueLow =\n   \
  \     dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_LOW, 0);\n\n /*\n  * 如何获取后台优先级的全局调度队列\n\
  \  */\ndispatch_queue_t globalDispatchQueueBackground =\n        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND,\
  \ 0);\n```\n\n顺便提一下，如果在主调度队列或全局调度队列上调用 `dispatch_retain` 或 `dispatch_release` 函数，不会有任何效果，也不会出现问题。这就是为什么获取并使用一个全局调度队列，比自己创建、使用然后释放一个并发调度队列要容易得多。当然，取决于你的源代码，如果将该调度队列视为由\
  \ `dispatch_queue_create` 函数创建的那样处理更方便，你也可以遵循引用计数的规则，即使是对于主调度队列或全局调度队列，也调用 `dispatch_retain`\
  \ 或 `dispatch_release` 函数。\n\n在本节末尾，有一个如何使用主调度队列和全局调度队列的示例，如 [Listing 7–2]（#Chapter07.html#list_7_2）所示。\n\
  \n**Listing 7–2.** *执行任务*\n\n```\n /*\n  * 在默认优先级的全局调度队列上执行一个 Block。\n  */\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), ^{\n\n     /*\n      * 这里是一些需要并发执行的任务\n      */\n\n     /*\n      * 然后，在主调度队列上执行一个\
  \ Block\n      */\n\n    dispatch_async(dispatch_get_main_queue(), ^{\n\n      \
  \   /*\n          * 这里是一些只能在主线程上执行的任务。\n          */\n    });\n\n});\n```\n\n我们已经学习了使用\
  \ GCD 使任务并行执行的基础知识。在下一节中，我将解释用于控制队列以使它们更加有用的 API。\n\n## 控制调度队列\n\nGCD 还提供了许多有用的\
  \ API 来控制调度队列中的任务。让我们逐一查看这些 API，探索 GCD 的强大之处。\n\n\n\n"
- "# `dispatch_set_target_queue`\n\n`dispatch_set_target_queue`函数用于设置一个“目标”队列。这主要用于为新创建的队列设置优先级。对于串行和并发调度队列，当通过`dispatch_queue_create`函数创建调度队列时，线程的优先级与默认优先级的全局调度队列相同。要修改创建后的调度队列的优先级，可以使用此函数进行修改。以下源代码展示了如何让一个串行调度队列在后台优先级上执行。\n\
  \n```\ndispatch_queue_t mySerialDispatchQueue =\n    dispatch_queue_create(\"com.example.gcd.MySerialDispatchQueue\"\
  , NULL);\n\ndispatch_queue_t globalDispatchQueueBackground =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND,\
  \ 0);\n\ndispatch_set_target_queue(mySerialDispatchQueue, globalDispatchQueueBackground);\n\
  ```\n\n在源代码中，将调度队列作为`dispatch_set_target_queue`函数的第一个参数传递，以更改该调度队列的优先级。第二个参数则传入一个全局调度队列作为其目标。其机制稍后会解释，但结果是将该调度队列的优先级更改为与目标队列相同的优先级。当将主队列或系统提供的全局调度队列作为第一个参数传递时，其行为是未定义的，因此不应这样做。使用`dispatch_set_target_queue`函数，不仅可以更改优先级，还可以创建如图\
  \ 7–8 所示的调度队列层级结构。当将多个并发执行的串行调度队列通过`dispatch_set_target_queue`函数设置为同一个目标串行队列时，同时只有一个队列会在该目标串行队列上执行。\n\
  \n![images](img/9781430241164_Fig07-08.jpg)\n\n**图 7–8.** *调度队列执行层级结构*\n\n通过这样做，如果你有一些不允许并发执行的任务，并且它们必须被添加到不同的串行调度队列中，你可以防止这些任务并发执行。不过，实际上我并不知道有这样的场景。\n\
  \n## `dispatch_after`\n\n`dispatch_after`用于设置在队列中启动任务的时机。有时你可能希望在三秒后执行一个任务。当你想在指定时间过去后执行一个任务时，可以使用`dispatch_after`函数。例如，以下源代码将指定的\
  \ Block 在三秒后添加到主调度队列中。\n\n```\ndispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW,\
  \ 3ull * NSEC_PER_SEC);\n\ndispatch_after(time, dispatch_get_main_queue(), ^{\n\
  \        NSLog(@\"waited at least three seconds.\");\n});\n```\n\n在源代码中，“ull”是 C\
  \ 语言中用于指定类型的字面量。“ull”代表“unsigned long long”类型。请注意，`dispatch_after`函数并不会在指定时间后立即执行任务。它是在指定时间过后将任务添加到调度队列中，这意味着此源代码的效果等同于在三秒后通过`dispatch_async`函数将该\
  \ Block 添加到主调度队列。主调度队列在主线程的 RunLoop 中执行。因此，例如，如果 RunLoop 以每秒 1/60 秒的间隔执行，则该 Block\
  \ 会在三秒后到三秒加 1/60 秒之间的某个时刻执行。如果主调度队列中添加了许多任务，或者主线程被延迟了，执行可能会滞后。因此，将其用作精确的计时器是有问题的，但如果你只是想大致延迟一个任务，这个函数非常有用。第二个参数指定一个要添加任务的调度队列，第三个参数是要执行的\
  \ Block。\n\n第一个参数是`dispatch_time_t`类型的值，用于指定时间。该值由`dispatch_time`或`dispatch_walltime`函数创建。`dispatch_time`函数创建一个时间值，表示在`dispatch_time_t`类型的起始时间（第一个参数）之后经过的纳秒数（第二个参数）。如示例所示，`DISPATCH_TIME_NOW`通常用作第一个参数，以指定当前时间。在以下源代码中，你可以获取一个`dispatch_time_t`类型的变量，用于表示从现在开始的一秒后。\n\
  \n```\ndispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW, 1ull * NSEC_PER_SEC);\n\
  ```\n\n数值与`NSEC_PER_SEC`的乘积会生成以纳秒为单位的时间。使用`NSEC_PER_MSEC`，你可以生成毫秒单位的值。以下源代码展示了如何获取从现在开始的\
  \ 150 毫秒后的时间。\n\n```\ndispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW, 150ull\
  \ * NSEC_PER_MSEC);\n```\n\n`dispatch_walltime`函数从 POSIX 中使用的`struct timespec`类型的时间创建一个`dispatch_time_t`类型的时间。`dispatch_time`函数主要用于创建相对时间。相比之下，`dispatch_walltime`函数用于创建绝对时间。例如，你可以使用`dispatch_walltime`来获取一个绝对时间，比如\
  \ 2011 年 11 月 11 日 11:11:11，用于`dispatch_after`函数。你可以用它来创建一个闹钟，但它的精度较低。如清单 7–3 所示，`struct\
  \ timespec`类型的时间可以轻松地从`NSDate`类对象创建。\n\n**清单 7–3**. *从 NSDate 创建 dispatch_time_t*\n\
  \n```\ndispatch_time_t getDispatchTimeByDate(NSDate *date)\n{\n    NSTimeInterval\
  \ interval;\n    double second, subsecond;\n    struct timespec time;\n    dispatch_time_t\
  \ milestone;\n\n    interval = [date timeIntervalSince1970];\n    subsecond = modf(interval,\
  \ &second);\n    time.tv_sec = second;\n    time.tv_nsec = subsecond * NSEC_PER_SEC;\n\
  \    milestone = dispatch_walltime(&time, 0);\n\n    return milestone;\n}\n```\n\
  \n在源代码中，从`NSDate`类对象创建了一个`dispatch_time_t`类型的值，并将其传递给`dispatch_after`函数。\n\n\n\n\
  ### Dispatch Group（调度组）\n\nDispatch Group 用于创建一个队列组。你可能希望在调度队列中的所有任务完成后，启动一个任务来完成某些收尾工作。当所有任务都在一个串行调度队列中时，你只需将一个收尾任务添加到该队列的末尾即可。但当使用并发调度队列或多个调度队列时，情况就会变得复杂。在这种情况下，你可以使用调度组。以下源代码展示了如何将三个\
  \ Block 添加到一个全局调度队列中，当所有 Block 都执行完毕后，一个用于收尾的 Block 将在主调度队列上执行。\n\n```\ndispatch_queue_t\
  \ queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);\n\
  dispatch_group_t group = dispatch_group_create();\n\ndispatch_group_async(group,\
  \ queue, ^{NSLog(@\"blk0\");});\ndispatch_group_async(group, queue, ^{NSLog(@\"\
  blk1\");});\ndispatch_group_async(group, queue, ^{NSLog(@\"blk2\");});\n\ndispatch_group_notify(group,\n\
  \    dispatch_get_main_queue(), ^{NSLog(@\"done\");});\ndispatch_release(group);\n\
  ```\n\n结果将类似于：\n\n```\nblk1\nblk2\nblk0\ndone\n```\n\n任务的执行顺序并不固定，因为它们处于一个全局调度队列（这是一个并发调度队列）中；也就是说，这些任务会在多个线程上并发执行。其执行时机是不确定的。尽管如此，每次执行结束时，都会显示\
  \ “done”。调度组可以监控任务的完成情况，无论这些任务位于何种类型的调度队列中。当它检测到所有任务都已完成时，会将收尾任务添加到调度队列中。这就是调度组的用法。首先，通过\
  \ `dispatch_group_create` 函数创建一个类型为 `dispatch_group_t` 的调度组。由于函数名包含 “create”，因此当不再需要该调度组时，必须释放它。你应该像处理调度队列一样，使用\
  \ `dispatch_release` 函数进行释放。`dispatch_group_async` 函数与 `dispatch_async` 函数一样，将一个\
  \ Block 添加到指定的调度队列中。它与 `dispatch_async` 函数的不同之处在于，其第一个参数传入的是已创建的调度组。当调用 `dispatch_group_async`\
  \ 函数时，指定的 Block 会与该调度组关联起来。当一个 Block 与一个调度组关联时，该 Block 会通过 `dispatch_retain` 函数拥有该调度组的所有权，就像\
  \ Block 被添加到调度队列中一样。当 Block 执行完毕时，它会通过 `dispatch_release` 函数释放该调度组。当你不再需要该调度组时，只需调用\
  \ `dispatch_release` 来释放它即可。你无需关心与该调度组关联的 Block 是如何执行的。\n\n如示例所示，`dispatch_group_notify`\
  \ 函数指定了一个要添加到调度队列中的 Block。当调度组内的所有任务都完成时，该 Block 将被执行。第一个参数是要监控的调度组。当与该组关联的所有任务都完成时，Block（第三个参数）将被添加到调度队列（第二个参数）中。无论传递给\
  \ `dispatch_group_notify` 函数的是何种类型的调度队列，当该 Block 被添加时，与该调度组关联的所有任务都必须已经完成。\n\n此外，你也可以简单地使用调度组来等待所有任务完成。你可以使用\
  \ `dispatch_group_wait` 函数，如代码清单 7–4 所示。\n\n**代码清单 7–4.** *dispatch_group_wait*\n\
  \n```\ndispatch_queue_t queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0);\ndispatch_group_t group = dispatch_group_create();\n\ndispatch_group_async(group,\
  \ queue, ^{NSLog(@\"blk0\");});\ndispatch_group_async(group, queue, ^{NSLog(@\"\
  blk1\");});\ndispatch_group_async(group, queue, ^{NSLog(@\"blk2\");});\n\ndispatch_group_wait(group,\
  \ DISPATCH_TIME_FOREVER);\ndispatch_release(group);\n```\n\n`dispatch_group_wait`\
  \ 函数的第二个参数是一个超时时间，用于指定等待时长。该变量是 `dispatch_time_t` 类型。此示例使用了 `DISPATCH_TIME_FOREVER`\
  \ 来永久等待。它会一直等待，直到与该调度组关联的所有任务都完成。你无法中途取消等待。\n\n正如我们在学习 `dispatch_after` 函数时了解到的，你可以通过以下源代码等待\
  \ 1 秒。\n\n```\ndispatch_time_t time = dispatch_time(DISPATCH_TIME_NOW, 1ull * NSEC_PER_SEC);\n\
  \nlong result = dispatch_group_wait(group, time);\n\nif (result == 0) {\n\n    \
  \ /*\n      * 所有与该调度组关联的任务都已完成\n      */\n\n} else {\n\n     /*\n      * 仍有部分与该调度组关联的任务正在运行。\n\
  \      */\n}\n```\n\n当 `dispatch_group_wait` 函数返回值不为 0 时，表示即使指定的时间已过，仍有部分与该调度组关联的任务正在运行。当它返回\
  \ 0 时，表示所有任务都已完成。如果使用 `DISPATCH_TIME_FOREVER`，`dispatch_group_wait` 函数将返回 0，因为所有任务必定已经完成。\n\
  \n顺便一提，“等待”是什么意思？它意味着当调用 `dispatch_group_wait` 函数时，该函数不会立即返回。执行 `dispatch_group_wait`\
  \ 函数的当前线程将会停止。在传递给 `dispatch_group_wait` 函数的时间到期之前，或者在与该调度组关联的所有任务完成之前，执行该函数的线程会一直处于停止状态。\n\
  \n当使用 `DISPATCH_TIME_NOW` 时，你可以检查与该调度组关联的任务是否已经完成。\n\n```\nlong result = dispatch_group_wait(group,\
  \ DISPATCH_TIME_NOW);\n```\n\n例如，你可以在主线程的 RunLoop 的每个循环中检查任务是否已经完成，而无需任何延迟。尽管这是可行的，但我建议改用\
  \ `dispatch_group_notify` 将收尾任务添加到主调度队列中。这样你的代码会更优雅。GCD 中仍然有许多有用的函数。我将在后续章节中进行讲解。让我们从\
  \ `dispatch_barrier_async` 开始。\n\n\n\n### dispatch_barrier_async\n\n`dispatch_barrier_async`\
  \ 是一个用于等待队列中其他任务完成的函数。如前所述，当你访问数据库或文件时，可以使用串行调度队列来避免数据不一致。实际上，数据更新任务不应与其他更新任务或读取任务同时执行。而读取任务则可能可以与其他读取任务并发执行，这意味着为了高效访问数据，应将读取任务添加到并发调度队列中，只有更新任务需要在没有其他更新任务运行时，置于串行调度队列中。你必须确保在更新任务完成之前，读取任务不会开始。虽然你可以使用\
  \ `dispatch group` 和 `dispatch_set_target_queue` 函数来实现这一功能，但这似乎很复杂。GCD 提供了一个更好的解决方案——`dispatch_barrier_async`\
  \ 函数。该函数与通过 `dispatch_queue_create` 函数创建的并发调度队列一起使用。以下源代码使用 `dispatch_queue_create`\
  \ 函数创建了一个并发调度队列，并通过 `dispatch_async` 添加了一些读取任务。\n\n```\ndispatch_queue_t queue =\
  \ dispatch_queue_create(\n    \"com.example.gcd.ForBarrier\", DISPATCH_QUEUE_CONCURRENT);\n\
  \ndispatch_async(queue, blk0_for_reading);\ndispatch_async(queue, blk1_for_reading);\n\
  dispatch_async(queue, blk2_for_reading);\ndispatch_async(queue, blk3_for_reading);\n\
  dispatch_async(queue, blk4_for_reading);\ndispatch_async(queue, blk5_for_reading);\n\
  dispatch_async(queue, blk6_for_reading);\ndispatch_async(queue, blk7_for_reading);\n\
  \ndispatch_release(queue);\n```\n\n接下来，例如，考虑在 `blk3_for_reading` 和 `blk4_for_reading`\
  \ 之间写入数据，并且 `blk4_for_reading` 及之后的任务应读取更新后的数据。\n\n```\ndispatch_async(queue, blk0_for_reading);\n\
  dispatch_async(queue, blk1_for_reading);\ndispatch_async(queue, blk2_for_reading);\n\
  dispatch_async(queue, blk3_for_reading);\n\n /*\n  * 写入数据\n  *\n  * 从现在开始，所有任务都应读取更新后的数据。\n\
  \  */\n\ndispatch_async(queue, blk4_for_reading);\ndispatch_async(queue, blk5_for_reading);\n\
  dispatch_async(queue, blk6_for_reading);\ndispatch_async(queue, blk7_for_reading);\n\
  ```\n\n如果我们仅使用 `dispatch_async` 函数放置写入任务，如下一个源代码所示，即使是写入任务之前添加的任务，也可能意外地读取到更新后的数据。应用程序甚至可能因为无效访问而崩溃。这就是并发调度队列的特性。此外，如果你添加多个写入任务，将导致数据不一致，并引发更多问题。\n\
  \n```\ndispatch_async(queue, blk0_for_reading);\ndispatch_async(queue, blk1_for_reading);\n\
  dispatch_async(queue, blk2_for_reading);\ndispatch_async(queue, blk3_for_reading);\n\
  dispatch_async(queue, blk_for_writing);\ndispatch_async(queue, blk4_for_reading);\n\
  dispatch_async(queue, blk5_for_reading);\ndispatch_async(queue, blk6_for_reading);\n\
  dispatch_async(queue, blk7_for_reading);\n```\n\n这时就轮到 `dispatch_barrier_async`\
  \ 函数登场了。使用 `dispatch_barrier_async` 函数，你可以在并发调度队列中所有现有任务都完成时，向该队列添加一个任务。当通过 `dispatch_barrier_async`\
  \ 函数添加的任务完成时，并发调度队列将恢复正常，即如同往常一样并发执行任务，如图 7–9 所示。\n\n```\ndispatch_async(queue,\
  \ blk0_for_reading);\ndispatch_async(queue, blk1_for_reading);\ndispatch_async(queue,\
  \ blk2_for_reading);\ndispatch_async(queue, blk3_for_reading);\ndispatch_barrier_async(queue,\
  \ blk_for_writing);\ndispatch_async(queue, blk4_for_reading);\ndispatch_async(queue,\
  \ blk5_for_reading);\ndispatch_async(queue, blk6_for_reading);\ndispatch_async(queue,\
  \ blk7_for_reading);\n```\n\n如你所见，这非常简单。只需将 `dispatch_async` 函数替换为 `dispatch_barrier_async`\
  \ 函数即可。仅此而已。\n\n![images](img/9781430241164_Fig07-09.jpg)\n\n**图 7–9.** *使用 dispatch_barrier_async\
  \ 函数的执行过程*\n\n请使用并发调度队列和 `dispatch_barrier_async` 函数来实现高效的数据库或文件访问。接下来，让我们看看与 `dispatch_async`\
  \ 函数相似的 `dispatch_sync` 函数。\n\n### dispatch_sync\n\n`dispatch_sync` 是一个与 `dispatch_async`\
  \ 类似的函数，但它会等待任务被添加完成。`dispatch_async` 函数名称中的“async”代表异步。因此，它会将一个 Block 添加到调度队列中，并且该任务会异步执行。`dispatch_async`\
  \ 函数不会等待任何东西，如图 7–10 所示。\n\n![images](img/9781430241164_Fig07-10.jpg)\n\n**图 7–10.**\
  \ *dispatch_async 函数的行为*\n\n当然也存在同步版本——`dispatch_sync` 函数。它会同步地将 Block 添加到调度队列中。`dispatch_sync`\
  \ 函数会等待添加的 Block 执行完毕，如图 7–11 所示。\n\n![images](img/9781430241164_Fig07-11.jpg)\n\
  \n**图 7–11.** *dispatch_sync 函数的行为*\n\n就像我在“调度组”部分解释 `dispatch_group_wait` 函数时所说的，“等待”意味着当前线程停止。例如，在主调度队列上，你可能希望使用另一个线程上的全局调度队列中某个任务的执行结果。在这种情形下，你可以使用\
  \ `dispatch_sync` 函数。\n\n```\ndispatch_queue_t queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0);\n\ndispatch_sync(queue, ^{/* 一个任务 */});\n```\n\n在调用 `dispatch_sync` 函数后，该函数会一直等待，直到指定的任务完成。它类似于一个简略版的\
  \ `dispatch_group_wait` 函数。如你所见，源代码非常简单。你可以非常容易地使用 `dispatch_sync` 函数，尽管它可能引发一个称为死锁的问题。例如，当以下源代码在主线程上执行时，会导致死锁。\n\
  \n```\ndispatch_queue_t queue = dispatch_get_main_queue();\ndispatch_sync(queue,\
  \ ^{NSLog(@\"Hello?\");});\n```\n\n这段源代码将一个 Block 添加到了主调度队列；也就是说，该 Block 将在主线程上执行。与此同时，它又在等待该\
  \ Block 完成。由于代码本身就在主线程上运行，因此主调度队列中的这个 Block 永远得不到执行。让我们再看另一个例子：\n\n```\ndispatch_queue_t\
  \ queue = dispatch_get_main_queue();\ndispatch_async(queue, ^{\n    dispatch_sync(queue,\
  \ ^{NSLog(@\"Hello?\");});\n});\n```\n\n这个正在主调度队列上运行的 Block 正在等待另一个也将要在主调度队列上运行的\
  \ Block 完成，这会导致死锁。\n\n当然，在串行调度队列上也会发生同样的情况。\n\n```\ndispatch_queue_t queue =\n \
  \   dispatch_queue_create(\"com.example.gcd.MySerialDispatchQueue\", NULL);\ndispatch_async(queue,\
  \ ^{\n    dispatch_sync(queue, ^{NSLog(@\"Hello?\");});\n});\n```\n\n与 `dispatch_barrier_async`\
  \ 函数名称中包含“async”类似，也存在一个同步版本 `dispatch_barrier_sync`。当调度队列中的所有任务都完成时，指定的任务会像 `dispatch_barrier_async`\
  \ 函数那样被添加到队列中。它类似于 `dispatch_sync` 函数，会等待指定的任务执行完毕。当你使用诸如 `dispatch_sync` 这类等待任务完成的同步\
  \ API 时，你必须问自己为什么要使用这个 API。你肯定不希望你的应用程序发生死锁，对吧？\n\n\n\n### `dispatch_apply`\n\n\
  `dispatch_apply`是一个与`dispatch_sync`函数和调度组相关的函数。`dispatch_apply`函数用于向调度队列多次添加一个 Block，然后等待直到所有任务完成。\n\
  \n```\ndispatch_queue_t queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0);\ndispatch_apply(10, queue, ^(size_t index) {\n    NSLog(@\"%zu\", index);\n\
  });\nNSLog(@\"done\");\n```\n\n结果类似于：\n\n```\n4\n1\n0\n3\n5\n2\n6\n8\n9\n7\ndone\n\
  ```\n\n因为它是在全局调度队列上执行的，每个任务的执行时机并不固定。`done`一定是最后一个输出的，因为`dispatch_apply`函数会等待所有任务完成。\n\
  \n第一个参数是重复次数，第二个参数是目标调度队列，第三个参数是要添加到队列中的任务。在这个例子中，第三个参数中的 Block 接受一个参数来区分每个 Block，因为\
  \ Block 被添加了多次。例如，当你想要对`NSArray`类对象中的每个条目执行某个操作时，你不需要编写`for`循环。请看下面的源代码，它假设`NSArray`类对象被赋值给了一个名为“array”的变量。\n\
  \n```\ndispatch_queue_t queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0);\ndispatch_apply([array count], queue, ^(size_t index) {\n    NSLog(@\"%zu:\
  \ %@\", index, [array objectAtIndex:index]);\n});\n```\n\n在全局调度队列上为数组中的所有条目执行 Block\
  \ 非常容易。`dispatch_apply`函数会等待所有任务的执行，就像`dispatch_sync`函数所做的那样。我建议将`dispatch_apply`函数与`dispatch_async`函数一起使用，以异步方式运行它，如列表\
  \ 7-5 所示。\n\n**列表 7-5.** `dispatch_apply`\n\n```\ndispatch_queue_t queue =\n   \
  \ dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);\n\n /*\n  * 在全局调度队列上异步执行\n\
  \  */\n\ndispatch_async(queue, ^{\n\n     /*\n      * 在全局调度队列上，dispatch_apply 函数会等待所有任务完成。\n\
  \      */\n\n    dispatch_apply([array count], queue, ^(size_t index) {\n\n    \
  \     /*\n          * 与 NSArray 对象中的所有对象并发执行某些操作\n          */\n\n        NSLog(@\"\
  %zu: %@\", index, [array objectAtIndex:index]);\n\n    });\n\n     /*\n      * dispatch_apply\
  \ 函数的所有任务已完成。\n      */\n\n     /*\n      * 在主调度队列上异步执行\n      */\n\n    dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n\n         /*\n          * 在主调度队列上执行。\n          * 例如更新用户界面等。\n          */\n\
  \n        NSLog(@\"done\");\n\n    });\n});\n```\n\n接下来，让我们看看控制已添加任务执行的`dispatch_suspend`和`dispatch_resume`函数。\n\
  \n### `dispatch_suspend` / `dispatch_resume`\n\n这些函数用于暂停或恢复队列的执行。当你向调度队列添加许多任务时，有时你可能希望在完成添加所有任务之前不执行这些任务。当某个\
  \ Block 捕获了可能受其他任务影响的值时，你可能需要这样做。你可以暂停一个调度队列，稍后如果你希望执行它，再恢复它。调度队列可以通过`dispatch_suspend`函数暂停：\n\
  \n```\ndispatch_suspend(queue);\n```\n\n它可以通过`dispatch_resume`函数恢复：\n\n```\ndispatch_resume(queue);\n\
  ```\n\n这不会影响任何正在运行的任务。它只会阻止启动调度队列中尚未开始的任务。当它们被恢复后，这些任务将会执行。\n\n### 调度信号量\n\n如果你需要对源代码中粒度比串行调度队列或`dispatch_barrier_async`函数更小的部分进行并发控制，调度信号量会很有用。\n\
  \n正如前面所解释的，如果数据被并发更新，可能会导致数据不一致或应用程序崩溃。你可以通过使用串行调度队列或`dispatch_barrier_async`函数来避免这种情况。但有时并发控制需要在更小的粒度上进行。让我们看一个示例，演示当顺序不重要时如何将所有数据添加到一个`NSMutableArray`中，如列表\
  \ 7-6 所示。\n\n**列表 7-6.** 向`NSMutableArray`添加数据\n\n```\ndispatch_queue_t queue =\n\
  \    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);\n\nNSMutableArray\
  \ *array = [[NSMutableArray alloc] init];\n\nfor (int i = 0; i < 100000; ++i) {\n\
  \    dispatch_async(queue, ^{\n\n        [array addObject:[NSNumber numberWithInt:i]];\n\
  \n    });\n}\n```\n\n在这段源代码中，`NSMutableArray`类的对象在全局调度队列上被更新，这意味着该对象被多个线程同时更新。因为`NSMutableArray`类不支持多线程，当从多个线程更新该对象时，它会被损坏。应用程序可能会因为内存相关问题而崩溃。这是一个竞态条件。在这种情况下，我们可以使用调度信号量。尽管调度信号量应该用于更小的粒度，但我们使用这个例子来解释如何使用调度信号量。调度信号量是一个带有计数器的信号量，在多线程编程中被称为计数信号量。信号量得名于使用旗帜进行交通管制。当可以通行时，旗帜升起；当不能通行时，旗帜降下。调度信号量有一个计数器来模拟这个旗帜。当计数器为零时，执行会等待。当计数器大于零时，它在递减计数器后继续执行。让我们看看如何使用调度信号量。下面的源代码使用`dispatch_semaphore_create`函数创建了一个调度信号量。\n\
  \n```\ndispatch_semaphore_t semaphore = dispatch_semaphore_create(1);\n```\n\n参数是计数器的初始值。在示例中，计数器被初始化为\
  \ 1。正如其名称中包含“create”一样，你必须像对待调度队列或调度组一样，使用`dispatch_release`函数来释放它。你也可以通过调用`dispatch_retain`函数来获得所有权。\n\
  \n```\ndispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER);\n```\n\n`dispatch_semaphore_wait`函数会等待，直到调度信号量的计数器变为\
  \ 1 或更大。当计数器为 1 或更大时，或者当它在等待过程中计数器变为 1 或更大时，它会减小计数器并从`dispatch_semaphore_wait`函数返回。第二个参数以`dispatch_time_t`类型指定等待时间。在此示例中，它会永远等待。`dispatch_semaphore_wait`函数的返回值与`dispatch_group_wait`函数的返回值相同。你可以根据返回值切换行为，如列表\
  \ 7-7 所示。\n\n**列表 7-7.** `dispatch_semaphore_wait`\n\n```\ndispatch_time_t time\
  \ = dispatch_time(DISPATCH_TIME_NOW, 1ull * NSEC_PER_SEC);\n\nlong result = dispatch_semaphore_wait(semaphore,\
  \ time);\n\nif (result == 0) {\n\n     /*\n      * 调度信号量的计数器大于一。\n      * 或者在指定超时时间前它变为一或更大。\n\
  \      * 计数器会自动减一。\n      *\n      * 在这里，你可以执行需要并发控制的任务。\n      */\n\n} else {\n\
  \n     /*\n      * 因为调度信号量的计数器为零，\n      * 它一直等待到指定的超时时间。\n      */\n\n}\n```\n\n\
  \n\n## 排版后\n\n当 `dispatch_semaphore_wait` 函数返回零时，可以安全地执行需要并发控制的任务。完成任务后，必须调用 `dispatch_semaphore_signal`\
  \ 函数将调度信号量的计数器加一。代码清单 7–8 展示了如何为之前的源代码（代码清单 7–6）使用调度信号量。\n\n**代码清单 7–8.** *使用调度信号量向*\
  \ `NSMutableArray` *添加数据*\n\n```\ndispatch_queue_t queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0);\n\n /*\n  * 创建一个调度信号量\n  *\n  * 将调度信号量的计数器初始值设为 1\n  * 以确保同一时间只有一个线程能访问\n\
  \  * NSMutableArray 类的对象。\n  */\n\ndispatch_semaphore_t semaphore = dispatch_semaphore_create(1);\n\
  \nNSMutableArray *array = [[NSMutableArray alloc] init];\n\nfor (int i = 0; i <\
  \ 100000; ++i) {\n    dispatch_async(queue, ^{\n\n             /*\n            \
  \  * 等待调度信号量\n              *\n              * 永久等待，直到调度信号量的计数器大于或等于 1。\n      \
  \        */\n\n            dispatch_semaphore_wait(semaphore, DISPATCH_TIME_FOREVER);\n\
  \n             /*\n              * 由于调度信号量的计数器为 1 或更大，\n              * 计数器减一，程序流程已从\n\
  \              * dispatch_semaphore_wait 函数返回。\n              *\n              *\
  \ 至此，调度信号量的计数器始终为零。\n              *\n              * 因为同一时间只有一个线程能访问 NSMutableArray\
  \ 类的对象，\n              * 所以可以安全地更新该对象。\n              */\n\n            [array addObject:[NSNumber\
  \ numberWithInt:i]];\n\n             /*\n              * 由于需要并发控制的任务已完成，\n     \
  \         * 必须调用 dispatch_semaphore_signal 函数\n              * 来增加调度信号量的计数器。\n \
  \             *\n              * 如果有线程正在 dispatch_semaphore_wait 处等待\n         \
  \     * 调度信号量计数器的增加，则第一个等待的线程将被启动。\n              */\n\n            dispatch_semaphore_signal(semaphore);\n\
  \    });\n}\n\n /*\n  * 通常，由于不再需要该调度信号量，\n  * 你需要释放它。\n  *\n  * dispatch_release(semaphore);\n\
  \  */\n```\n\n接下来，让我们看看 `dispatch_once` 函数。\n\n#### `dispatch_once`\n\n`dispatch_once`\
  \ 函数用于确保指定的任务在应用程序的生命周期内仅执行一次。以下是用于初始化某些内容的典型源代码。通过使用 `dispatch_once` 函数，可以使其变得更加优雅。\n\
  \n```\nstatic int initialized = NO;\n\nif (initialized == NO)\n{\n\n     /*\n  \
  \    * 初始化\n      */\n\n    initialized = YES;\n}\n```\n\n使用 `dispatch_once` 函数后，代码修改如下。\n\
  \n```\nstatic dispatch_once_t pred;\n\ndispatch_once(&pred, ^{\n\n     /*\n    \
  \  * 初始化\n      */\n\n});\n```\n\n这两种源代码差别不大。使用 `dispatch_once` 函数，即使在多线程环境中也能安全运行。前一种源代码在大多数情况下也是安全的。但在多核\
  \ CPU 上，存在一种微小可能性：当 `initialized` 变量的值被覆盖的同时，该变量可能被读取。这将导致初始化被执行多次。然而，如果你使用 `dispatch_once`\
  \ 函数实现，就无需担心了。`dispatch_once` 函数对于创建所谓的“单例模式”中的单例对象非常有用。\n\n### Dispatch I/O\n\n\
  要加载一个大文件，你可能会认为，与常规方式相比，使用全局调度队列并发地将其作为小块加载会更快。就现今的 I/O 硬件而言，这可能确实如此。并发加载可能比在单个线程上加载更快。为了实现这一点，你可以使用\
  \ Dispatch I/O 和 Dispatch Data。当你使用 Dispatch I/O 读取或写入文件时，一个文件会被分割成特定大小，并在全局调度队列上进行访问。\n\
  \n```\ndispatch_async(queue, ^{/* 加载文件从 0 到 8191 字节的部分 */});\ndispatch_async(queue,\
  \ ^{/* 加载文件从 8192 到 16383 字节的部分 */});\ndispatch_async(queue, ^{/* 加载文件从 16384 到\
  \ 24575 字节的部分 */});\ndispatch_async(queue, ^{/* 加载文件从 24576 到 32767 字节的部分 */});\n\
  dispatch_async(queue, ^{/* 加载文件从 32768 到 40959 字节的部分 */});\ndispatch_async(queue,\
  \ ^{/* 加载文件从 40960 到 49151 字节的部分 */});\ndispatch_async(queue, ^{/* 加载文件从 49152 到\
  \ 57343 字节的部分 */});\ndispatch_async(queue, ^{/* 加载文件从 57344 到 65535 字节的部分 */});\n\
  ```\n\n如同上述源代码所示，加载操作会在每个分割块上进行。Dispatch Data 可以比手动操作更轻松地合并（或拆分）加载的数据。让我们看看 代码清单\
  \ 7–9 中 Apple 提供的 Dispatch I/O 和 Dispatch Data 示例。\n\n**代码清单 7–9.** *Dispatch I/O*\n\
  \n```\npipe_q = dispatch_queue_create(\"PipeQ\", NULL);\npipe_channel = dispatch_io_create(DISPATCH_IO_STREAM,\
  \ fd, pipe_q, ^(int err){\n        close(fd);\n});\n\n*out_fd = fdpair[1];\n\ndispatch_io_set_low_water(pipe_channel,\
  \ SIZE_MAX);\n\ndispatch_io_read(pipe_channel, 0, SIZE_MAX, pipe_q,\n        ^(bool\
  \ done, dispatch_data_t pipedata, int err){\n    if (err == 0)\n    {\n        size_t\
  \ len = dispatch_data_get_size(pipedata);\n        if (len > 0)\n        {\n   \
  \         const char *bytes = NULL;\n            char *encoded;\n\n            dispatch_data_t\
  \ md = dispatch_data_create_map(\n                pipedata, (const void **)&bytes,\
  \ &len);\n            encoded = asl_core_encode_buffer(bytes, len);\n          \
  \  asl_set((aslmsg)merged_msg, ASL_KEY_AUX_DATA, encoded);\n            free(encoded);\n\
  \            _asl_send_message(NULL, merged_msg, -1, NULL);\n            asl_msg_release(merged_msg);\n\
  \            dispatch_release(md);\n        }\n    }\n\n    if (done)\n    {\n \
  \       dispatch_semaphore_signal(sem);\n        dispatch_release(pipe_channel);\n\
  \        dispatch_release(pipe_q);\n    }\n});\n```\n\n这段代码取自 Apple 系统日志 API（Libc-763.11\
  \ gen/asl.c）的源代码。`dispatch_io_create` 函数创建一个 Dispatch I/O。它指定了在发生错误时执行的 Block 以及执行该\
  \ Block 的调度队列。`dispatch_io_set_low_water` 函数设置每次读取的大小（数据被分割成此大小）。`dispatch_io_read`\
  \ 函数开始在全局调度队列上进行读取。每当其中一个分割数据块被读取时，该 Dispatch Data 将作为参数传递给在 `dispatch_io_read`\
  \ 中设置为读取完成回调的 Block。因此，该 Block 可以扫描或合并这些 Dispatch Data。如果你想以比常规方式稍快的速度读取文件，请尝试使用\
  \ Dispatch I/O。\n\n## 总结\n\n在本章中，我们详细学习了如何使用 GCD API。我们还学习了：\n\n*   调度队列与线程的关系\n\
  *   如何执行同步或异步的 Block\n*   如何避免竞态条件\n\n在下一章中，我们将展示 GCD 的实现，以便更深入地理解它。\n\n"
- '# 第 8 章


  '
- "# GCD 实现\n\n在本章中，我将解释 GCD 是如何实现的，以便你更好地理解其工作原理。然后我将解释 GCD 的一种称为“数据源”的功能，它与 XNU\
  \ 内核事件相关。\n\n## 调度队列\n\n本节展示了 GCD 是如何实现的。我们将特别关注 GCD 的结构，然后了解 Block 是如何在调度队列上执行的。\n\
  \n\n\n### 内核级实现\n\n从功能上来看，我们可以推测 GCD 使用了以下组件。\n\n*   一个 C 语言层面的 FIFO 队列，用于管理添加的\
  \ Block\n*   通过原子函数实现并发控制的轻量级信号量\n*   一个 C 语言层面的容器，用于管理线程\n\n如果仅此而已，那么它并不需要内核级的实现。^(1)\
  \ 换句话说，如果应用程序员能够使用线程编写具有相同功能的应用程序源代码，那么 GCD 似乎就没有必要了。我们为什么需要 GCD？\n\n让我们再来看看苹果的说法。\n\
  \n> *这项技术会将你通常在应用程序中编写的线程管理代码，下放到系统层面去处理。*\n\n__________\n\n¹ 实际上，存在一个移植到通用 Linux\
  \ 操作系统上的 GCD 实现：Portable libdispatch [`https://www.heily.com/trac/libdispatch`](https://www.heily.com/trac/libdispatch)\n\
  \n它指出线程管理代码位于“系统层面”，这意味着它是在应用程序员无法触及的范围内完成的。\n\n事实上，GCD 包含一些被称为 XNU 内核的系统级实现，而 XNU\
  \ 内核是 iOS 和 OS X 的核心。由应用程序员自行管理线程的应用程序，其性能永远无法与使用基于 XNU 内核级别实现的 GCD 的应用程序相比。换句话说，GCD\
  \ 优于使用 `pthreads` 或 `NSThread` 的普通多线程编程。而且，使用 GCD，你无需一遍又一遍地编写重复代码（即所谓的模板代码）。你可以专注于任务本身。这只会带来好处！你应该使用\
  \ GCD，或者底层使用了 GCD 的 Cocoa 框架中的 `NSOperationQueue` 类。\n\n### GCD 结构\n\n表 8–1 列出了用于实现调度队列的软件组件。\n\
  \n![images](img/t0801.jpg)\n\n所有面向应用程序员的 GCD API 都是 `libdispatch` 库中的 C 语言函数。调度队列是一个实现为结构体和链表的\
  \ FIFO 队列。这个 FIFO 队列管理通过 `dispatch_async` 等函数添加的 Block。Block 并非直接添加到 FIFO 队列中。首先，它被添加到一个名为\
  \ `dispatch_continuation_t` 类型的结构体（称为 dispatch continuation）中，然后再被添加到 FIFO 队列。dispatch\
  \ continuation 是所谓的执行上下文，它存储了与该 Block 关联的调度组等信息。\n\n如你所知，可以通过 `dispatch_set_target_queue`\
  \ 函数为调度队列设置目标队列。一个调度队列在其目标调度队列上执行。这些目标可以串联起来。串联的末端必须是主调度队列、某个全局调度队列，或者为各种优先级的串行调度队列预先准备的全局调度队列。主调度队列是一种在\
  \ `RunLoop` 中执行 Block 的机制。这里并没有太多令人兴奋的技巧。\n\n### 全局调度队列与 `pthread_workqueue`\n\n\
  存在以下几种全局调度队列。\n\n*   全局调度队列（高优先级）\n*   全局调度队列（默认优先级）\n*   全局调度队列（低优先级）\n*   全局调度队列（后台优先级）\n\
  *   全局调度队列（高过量提交优先级）\n*   全局调度队列（默认过量提交优先级）\n*   全局调度队列（低过量提交优先级）\n*   全局调度队列（后台过量提交优先级）\n\
  \n这四个带有过量提交优先级的队列被用作串行调度队列。正如其名“过量提交”所暗示的，这些调度队列会无视系统状态，强制创建线程。每个全局调度队列都使用自己的 `pthread_workqueue`。在\
  \ GCD 初始化时，`pthread_workqueue_create_np` 函数会初始化这些 `pthread_workqueue`。\n\n`pthread_workqueue`\
  \ 是 Libc 中的一个私有 pthread API。`pthread_workqueue` 通过 `bsdthread_register` 系统调用和 `workq_open`\
  \ 系统调用在 XNU 内核中初始化一个工作队列，以获取关于该工作队列的信息。XNU 内核有四个工作队列。\n\n*   `WORKQUEUE_HIGH_PRIOQUEUE`\n\
  *   `WORKQUEUE_DEFAULT_PRIOQUEUE`\n*   `WORKQUEUE_LOW_PRIOQUEUE`\n*   `WORKQUEUE_BG_PRIOQUEUE`\n\
  \n每个工作队列都有不同的优先级（图 8–1）。这些优先级与全局调度队列的四个优先级是对应的。\n\n![images](img/9781430241164_Fig08-01.jpg)\n\
  \n**图 8–1.** *全局调度队列、`pthread_workqueue` 与工作队列之间的关系*\n\n让我们来看看 Block 是如何在调度队列上执行的。\n\
  \n### 执行 Block\n\n当 Block 在全局调度队列上执行时，`libdispatch` 会从作为 FIFO 队列的全局调度队列本身中取出一个 dispatch\
  \ continuation。它会调用 `pthread_workqueue_additem_np` 函数，并将全局调度队列、与该全局调度队列优先级相同的工作队列信息，以及一个用于执行\
  \ dispatch continuation 的回调函数作为参数传递进去。`pthread_workqueue_additem_np` 函数通过使用 `workq_kernreturn`\
  \ 系统调用来通知工作队列有新的待执行项添加进来了。当 XNU 内核收到该通知时，它会根据系统状态决定是否应该创建一个线程。对于带有过量提交优先级的全局调度队列，它会随时创建一个线程。在这里，线程的含义几乎等同于普通\
  \ iOS 或 OS X 编程中使用的线程，但某些 `pthread` API 不能使用。更多信息，请参阅苹果公司的《并发编程指南》中的“与 POSIX 线程的兼容性”部分。\n\
  \n用于工作队列的线程由一种专为工作队列实现的特殊线程调度器管理。它的上下文切换与普通线程略有不同。这是我们应当使用 GCD 的原因之一。一个工作队列的线程会调用\
  \ `pthread_workqueue` 函数。该函数会调用 `libdispatch` 中的一个回调函数。然后，它执行 dispatch continuation\
  \ 中的 Block。当 Block 执行完毕时，会通知调度组，并释放 dispatch continuation。最后，它准备好执行全局调度队列中的下一个 Block。这就是调度队列大致的执行流程。\n\
  \n无论如何，我们了解到，应用程序员想要实现一个比 GCD 更高效的方案是不可能的。\n\n\n## Dispatch Source\n\n本节我们将学习 GCD\
  \ 的另一个特性——*dispatch source*。这是一个实用的功能，用于从应用程序侧处理内核事件。虽然这是一个底层特性，但在某些应用中可能很有用。Dispatch\
  \ source 是对 `kqueue` 的封装，而 `kqueue` 是 BSD 内核中非常常见的特性。`Kqueue` 是一种机制，用于在 XNU 内核事件发生时，在应用程序中执行任务。它非常轻量，不会消耗太多资源（包括\
  \ CPU 负载）。可以说，`kqueue` 是在应用程序侧处理 XNU 内核事件的最佳机制。Dispatch source 可以处理表 8–2 中列出的事件。\n\
  \n![图片](img/t0802.jpg)\n\n当某个事件发生时，分配给该事件的任务将在指定的调度队列上执行。\n\n代码清单 8–1 展示了如何使用 `DISPATCH_SOURCE_TYPE_READ`\
  \ 读取异步文件描述符。\n\n**代码清单 8–1.** *使用 dispatch source 读取文件*\n\n```\n__block size_t total\
  \ = 0;\nsize_t size = how many bytes you want to get;\nchar *buff = (char *)malloc(size);\n\
  \ /*\n  * 将 'sockfd'（一个文件描述符）设置为异步（NONBLOCK）描述符\n  */\nfcntl(sockfd, F_SETFL, O_NONBLOCK);\n\
  \n /*\n  * 获取一个全局调度队列，用于添加事件处理器。\n  */\ndispatch_queue_t queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0);\n\n /*\n  * 创建一个带有 READ 事件的 dispatch source。\n  */\ndispatch_source_t source\
  \ =\n    dispatch_source_create(DISPATCH_SOURCE_TYPE_READ, sockfd, 0, queue);\n\n\
  \ /*\n  * 为 READ 事件分配一个任务。\n  */\ndispatch_source_set_event_handler(source, ^{\n\
  \     /*\n      * 获取可用数据大小。\n      */\n    size_t available = dispatch_source_get_data(source);\n\
  \n     /*\n      * 从描述符读取数据\n      */\n    int length = read(sockfd, buff, available);\n\
  \n     /*\n      * 当发生错误时，取消 dispatch source。\n      */\n    if (length < 0) {\n\
  \         /*\n          * 错误处理\n          */\n\n        dispatch_source_cancel(source);\n\
  \    }\n\n    total += length;\n\n    if (total == size) {\n\n         /*\n    \
  \      * 处理 buff\n          */\n\n         /*\n          * 取消 dispatch source 以结束它\n\
  \          */\n        dispatch_source_cancel(source);\n    }\n});\n\n /*\n  * 为\
  \ dispatch source 的取消分配一个任务\n  */\ndispatch_source_set_cancel_handler(source, ^{\n\
  \    free(buff);\n    close(sockfd);\n\n     /*\n      * 释放 dispatch source 本身\n\
  \      */\n    dispatch_release(timer);\n});\n\n /*\n  * 恢复 dispatch source\n  */\n\
  dispatch_resume(source);\n```\n\n在 `CFSocket`（Core Foundation 框架的异步网络 API）中，有一个与此示例非常相似的源代码。由于\
  \ Foundation 框架中的异步网络 API 是使用 `CFSocket` 实现的，因此你可以享受到 dispatch source 的优势。换句话说，仅通过使用\
  \ Foundation 框架，你就可以享受到 GCD 的好处。\n\n## 使用 Dispatch Source 的示例\n\n最后，让我们来看一个使用 `DISPATCH_SOURCE_TYPE_TIMER`\
  \ 的定时器示例（代码清单 8–2）。它可用于网络编程中的连接超时。\n\n**代码清单 8–2.** *使用 dispatch source 的定时器*\n\n\
  ```\n /*\n  * 创建一个带有 DISPATCH_SOURCE_TYPE_TIMER 的 dispatch source\n  *\n  * 当指定时间过去后，一个任务将被添加到主调度队列\n\
  \  */\ndispatch_source_t timer = dispatch_source_create(\n    DISPATCH_SOURCE_TYPE_TIMER,\
  \ 0, 0, dispatch_get_main_queue());\n\n /*\n  * 将定时器设置为 15 秒后触发，\n  * 不重复，\n  *\
  \ 允许一秒的延迟\n  */\ndispatch_source_set_timer(timer,\n    dispatch_time(DISPATCH_TIME_NOW,\
  \ 15ull * NSEC_PER_SEC),\n        DISPATCH_TIME_FOREVER, 1ull * NSEC_PER_SEC);\n\
  \n /*\n  * 设置在指定时间过去时执行的任务。\n  */\ndispatch_source_set_event_handler(timer, ^{\n\
  \    NSLog(@\"wakeup!\");\n\n     /*\n      * 取消 dispatch source\n      */\n   \
  \ dispatch_source_cancel(timer);\n});\n\n /*\n  * 为 dispatch source 的取消分配一个任务\n\
  \  */\ndispatch_source_set_cancel_handler(timer, ^{\n    NSLog(@\"canceled\");\n\
  \n     /*\n      * 释放 dispatch source 本身\n      */\n    dispatch_release(timer);\n\
  });\n\n /*\n  * 恢复 dispatch source\n  */\ndispatch_resume(timer);\n```\n\n当你看到前面读取异步文件描述符的源代码或定时器的源代码时，你可能已经注意到了一些事情。\n\
  \n调度队列没有“取消”的概念。当一个任务被添加到调度队列时，你无法将其移除或取消。你可能需要自己编写代码来取消它、放弃取消操作，或者选择其他 API，例如 `NSOperationQueue`。而使用\
  \ dispatch source，你可以实现取消。你可以将一个任务作为 Block 分配给 dispatch source，并附带一个用于取消的回调。因此，使用\
  \ dispatch source 比直接使用 `kqueue` 更容易处理 XNU 内核中的事件。当需要执行与 `kqueue` 相关的操作时，你应该使用 dispatch\
  \ source。它能使源代码更简洁。\n\n## 总结\n\n在本章中，我们学习了调度队列的实现以及如何使用 dispatch source。\n\n通过本书，你已从基础到细节，并结合其实现，掌握了\
  \ ARC、Block 和 GCD：ARC——由编译器实现的自动内存管理；Block——一种新的语法，能极大地缩短应用程序代码；以及 GCD——一种非常高效的多线程编程模型。\n\
  \n当你理解这些技术并恰当地使用它们时，你的应用程序将具有高响应性和高质量。请开始使用这些技术吧。希望你的优秀应用能登上 App Store 排行榜前十名！\n\
  \n### 附录 A\n\n\n\n"
- "# ARC、Block 与 GCD 示例\n\n让我们来看一个结合使用 ARC、Block 和 GCD 的示例。以下源代码从 URL 读取数据并在主线程上显示结果。这是\
  \ iOS 应用中非常典型的用例，你可以将其作为应用程序的一部分直接使用。它展示了 ARC、Block 和 GCD 如何用于开发诸如 Twitter 或 Tumblr\
  \ 客户端之类的应用。\n\n源代码随附了注释进行说明。\n\n```objectivec\nNSString *url = @\"http://images.apple.com/\"\
  \n    \"jp/iphone/features/includes/camera-gallery/03-20100607.jpg\"\n\n/*\n * 在主线程上，从指定的\
  \ URL 开始异步下载数据。\n */\n\n[ASyncURLConnection request:url completeBlock:^(NSData *data)\
  \ {\n\n    dispatch_queue_t queue =\n        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0);\n    dispatch_async(queue, ^{\n\n         /*\n          * 在全局派发队列上处理已下载的数据。\n\
  \          * 这不会阻塞主线程，因此该任务可以执行较长时间。\n          */\n\n        dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n\n             /*\n              * 这里在主派发队列上使用处理结果。\n              * 在用户界面上显示结果。\n\
  \              */\n        });\n    });\n\n} errorBlock:^(NSError *error) {\n\n\
  \     /*\n      * 发生错误时\n      */\n\n    NSLog(@\"error %@\", error);\n}];\n```\n\
  \n处理已下载的数据在其他线程上执行，以避免阻塞主线程。`dispatch_get_global_queue` 函数用于获取一个默认优先级的全局派发队列，`dispatch_async`\
  \ 函数则在全局派发队列上处理数据。当处理完成后，必须在主线程上更新用户界面以显示结果。这通过 `dispatch_get_main_queue` 函数获取主派发队列，再使用\
  \ `dispatch_async` 函数执行任务来实现。\n\n顺便提一下，下载操作本身是否应该使用 GCD 实现，以使其在其他线程上运行从而避免阻塞主线程？答案是否定的。对于网络编程，强烈建议使用异步\
  \ API。请参阅以下 WWDC 2010 的视频讲座。\n\n-   WWDC 2010 Session 207 — 针对 iPhone OS 的网络应用，第一部分\n\
  -   WWDC 2010 Session 208 — 针对 iPhone OS 的网络应用，第二部分\n\n这些是关于网络编程的讲座。其中明确提到，对于网络编程，“线程是有害的™”。当使用线程进行网络编程时，容易产生过多线程。例如，如果为每个连接创建一个线程，每个线程的栈会瞬间消耗大量内存。Cocoa\
  \ 框架中已有现成的异步网络 API。请务必使用异步网络 API。**切勿**为网络操作使用线程。\n\n源代码中的 `ASyncURLConnection`\
  \ 类是一个用于网络编程的类，其基类为 Foundation 框架中的 `NSURLConnection`，该类用于通过网络异步加载数据。现在让我们来看看这个类是如何实现的。\n\
  \n## `ASyncURLConnection.h`\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
  \n/*\n * 通过为 Block 类型变量使用 typedef，\n * 源代码将具备更好的可读性。\n */\n\ntypedef void (^completeBlock_t)(NSData\
  \ *data);\ntypedef void (^errorBlock_t)(NSError *error);\n\n@interface ASyncURLConnection\
  \ : NSURLConnection\n{\n     /*\n      * 由于启用了 ARC，以下所有变量\n      * 在未显式指定修饰符时，均使用\
  \ __strong 进行修饰。\n      */\n\n    NSMutableData *data_;\n    completeBlock_t completeBlock_;\n\
  \    errorBlock_t errorBlock_;\n}\n\n/*\n * 为提高源代码可读性，\n * 参数中使用了经过 typedef 定义的\
  \ Block 类型变量。\n */\n\n+ (id)request:(NSString *)requestUrl\n    completeBlock:(completeBlock_t)completeBlock\n\
  \    errorBlock:(errorBlock_t)errorBlock;\n\n- (id)initWithRequest:(NSString *)requestUrl\n\
  \    completeBlock:(completeBlock_t)completeBlock\n    errorBlock:(errorBlock_t)errorBlock;\n\
  @end\n```\n\n## `ASyncURLConnection.m`\n\n```objectivec\n#import \"ASyncURLConnection.h\"\
  \n\n@implementation ASyncURLConnection\n\n+ (id)request:(NSString *)requestUrl\n\
  \    completeBlock:(completeBlock_t)completeBlock\n    errorBlock:(errorBlock_t)errorBlock\n\
  {\n     /*\n      * 如果禁用了 ARC，\n      * 此方法应在调用 autorelease 后返回对象：\n      *    \
  \      * id obj = [[[self alloc] initWithRequest:requestUrl\n      *   completeBlock:completeBlock\
  \ errorBlock:errorBlock];\n      * return [obj autorelease];\n      *\n      * 由于此方法名不以\
  \ alloc/new/copy/mutableCopy 开头，\n      * 返回的对象已自动注册到 autoreleasepool 中。\n     \
  \ */\n\n    return [[self alloc] initWithRequest:requestUrl\n        completeBlock:completeBlock\
  \ errorBlock:errorBlock];\n}\n\n- (id)initWithRequest:(NSString *)requestUrl\n \
  \   completeBlock:(completeBlock_t)completeBlock\n    errorBlock:(errorBlock_t)errorBlock\n\
  {\n    NSURL *url = [NSURL URLWithString:requestUrl];\n    NSURLRequest *request\
  \ = [NSURLRequest requestWithURL:url];\n\n    if ((self = [super initWithRequest:request\n\
  \            delegate:self startImmediately:NO])) {\n        data_ = [[NSMutableData\
  \ alloc] init];\n\n         /*\n          * 为确保安全使用传入的 Block，\n          * 调用实例方法\
  \ 'copy' 将 Block 复制到堆上。\n          */\n        completeBlock_ = [completeBlock copy];\n\
  \        errorBlock_ = [errorBlock copy];\n\n        [self start];\n    }\n\n  \
  \   /*\n      * 具有 __strong 修饰符的成员变量\n      * 拥有所创建的 NSMutableData 类对象的所有权。\n  \
  \    *\n      * 当该对象被废弃时，带有 __strong 修饰符的成员变量的强引用消失。\n      * NSMutableData 类对象和\
  \ Block 将被自动释放。\n      *\n      * 因此，无需显式实现 dealloc 实例方法。\n      */\n\n    return\
  \ self;\n}\n\n- (void)connection:(NSURLConnection *)connection\n    didReceiveResponse:(NSURLResponse\
  \ *)response\n{\n    [data_ setLength:0];\n}\n\n- (void)connection:(NSURLConnection\
  \ *)connection\n    didReceiveData:(NSData *)data\n{\n    [data_ appendData:data];\n\
  }\n\n- (void)connectionDidFinishLoading:(NSURLConnection *)connection\n{\n     /*\n\
  \      * 执行分配给下载成功回调的 Block。\n      * 传统的委托回调可以替换为 Block。\n      */\n\n    completeBlock_(data_);\n\
  }\n\n- (void)connection:(NSURLConnection *)connection\n    didFailWithError:(NSError\
  \ *)error\n{\n     /*\n      * 执行分配给错误的 Block。\n      */\n\n    errorBlock_(error);\n\
  }\n\n@end\n```\n\n当下载完成或发生错误时，`NSURLConnection` 类会调用其委托对象上的方法。`ASyncURLConnection`\
  \ 类继承自 `NSURLConnection` 类，并且可以将 Block 设置为下载完成和错误发生时的回调。使用这个类，应用程序的源代码可以更简洁。ARC\
  \ 能够妥善管理用于存储已下载数据的 `NSMutableData` 类对象以及用于回调的 Block。由于成员变量使用 `__strong` 修饰，你无需显式调用\
  \ `retain` 或 `release` 方法。实际上，在启用 ARC 的环境中，你也不能调用这些方法。而且，你也不需要实现 `dealloc` 实例方法。\n\
  \n即使在这段简单的源代码中，你也必须认识到 ARC、Block 和 Grand Central Dispatch 的强大之处。\n\n## 附录 B\n\n\n\
  \n## 过渡至 ARC 版本说明\n\n- [`http://developer.apple.com/library/mac/#releasenotes/ObjectiveC/RN-TransitioningToARC/_index.html`](http://developer.apple.com/library/mac/#releasenotes/ObjectiveC/RN-TransitioningToARC/_index.html)\n\
  \n## Apple 官方 ARC 编程指南\n\n如果想知道关于 ARC 的知识，应当首先阅读本文档。如果你在阅读本文档之前正在看这本书，那也没关系 :-)，但稍后还是建议你读一下。\n\
  \n## LLVM 文档——自动引用计数\n\n- [`http://clang.llvm.org/docs/AutomaticReferenceCounting.html`](http://clang.llvm.org/docs/AutomaticReferenceCounting.html)\n\
  \n这份文档类似于 ARC 的规范文档。当你需要确认其规范细节时，请查阅此文档。\n\n## 高级内存管理编程指南\n\n- [`http://developer.apple.com/library/ios/documentation/Cocoa/Conceptual/MemoryMgmt/Articles/MemoryMgmt.html`](http://developer.apple.com/library/ios/documentation/Cocoa/Conceptual/MemoryMgmt/Articles/MemoryMgmt.html)\n\
  \n这是一份由 Apple 撰写的文档，详细解释了引用计数方式的内存管理。\n\n## 入门指南：构建并运行 Clang\n\n- [`http://clang.llvm.org/get_started.html`](http://clang.llvm.org/get_started.html)\n\
  - Subversion 仓库 [`http://llvm.org/svn/llvm-project/cfe/trunk`](http://llvm.org/svn/llvm-project/cfe/trunk)\n\
  \n本文解释了如何获取支持 ARC 的编译器 clang（LLVM 编译器 3.0）的源代码。其中也包含了该源代码的仓库。例如，仓库中的以下源代码包含 ARC\
  \ 的实现代码：\n\n- `llvm/tools/clang/lib/CodeGen/CGObjC.cpp`\n- `llvm/tools/clang/lib/CodeGen/CGObjCMac.cpp`\n\
  \n## objc4 版本 493.9\n\n- [`http://www.opensource.apple.com/source/objc4/objc4-493.9/`](http://www.opensource.apple.com/source/objc4/objc4-493.9/)\n\
  \n这是 Apple 的 Objective-C 运行时库的一个实现，源代码是开放的。上述文档“LLVM 文档——自动引用计数”中解释的 Objective-C\
  \ 运行时 API 正是在这个库中实现的。\n\n与 ARC 相关的 API 多数位于以下文件中：\n\n- `runtime/objc-arr.mm`\n\n\
  与 `__weak` 限定符相关的 API 位于：\n\n- `runtime/objc-weak.mm`\n\n## GNUstep libobjc2 版本\
  \ 1.5\n\n- [`http://gnustep.blogspot.com/2011/07/gnustep-objective-c-runtime-15-released.html`](http://gnustep.blogspot.com/2011/07/gnustep-objective-c-runtime-15-released.html)\n\
  - [`http://thread.gmane.org/gmane.comp.lib.gnustep.general/36358`](http://thread.gmane.org/gmane.comp.lib.gnustep.general/36358)\n\
  - [`http://svn.gna.org/viewcvs/gnustep/libs/libobjc2/1.5/`](http://svn.gna.org/viewcvs/gnustep/libs/libobjc2/1.5/)\n\
  \n`libobjc2` 是 GNUstep 项目提供的支持 ARC 的 Objective-C 运行时库实现。它相当于 Apple 的 Objective-C\
  \ 运行时库 `objc4`。\n\n## Apple 对 C 语言的扩展\n\n- [`http://www.open-std.org/jtc1/sc22/wg14/www/docs/n1370.pdf`](http://www.open-std.org/jtc1/sc22/wg14/www/docs/n1370.pdf)\n\
  \n这是一份关于 Apple 实现的 C 语言扩展的概览文档。从中我们可以看出，ARC 的基本思想，即 `__strong` 限定符和 `__weak` 限定符，在实现\
  \ Blocks 期间就已经被实现了。\n\n## Blocks 提案，N1451\n\n- [`http://www.open-std.org/jtc1/sc22/wg14/www/docs/n1451.pdf`](http://www.open-std.org/jtc1/sc22/wg14/www/docs/n1451.pdf)\n\
  \n这是针对 C 语言规范“ISO/IEC 9899:1999(E) Programming Language-C (Second Edition)”（即 C99）中\
  \ Blocks 的一份提案。它由 Apple 提交给 C 语言国际标准化工作组 ISO/IEC JTC1/SC22/WG14（负责 C 语言标准化的组织）。目前看来，似乎还没有将\
  \ Blocks 添加到 C 标准中的相关行动。\n\n## 关于 Blocks 的演示文稿\n\n- [`http://www.open-std.org/jtc1/sc22/wg14/www/docs/n1457.pdf`](http://www.open-std.org/jtc1/sc22/wg14/www/docs/n1457.pdf)\n\
  \n这是 Apple 关于 Blocks 的一份演示文稿。它似乎被用于向 WG14 工作组推广 Blocks。这份文稿有助于概览性地了解 Blocks。\n\n\
  ## Blocks 语言规范\n\n- [`http://clang.llvm.org/docs/BlockLanguageSpec.txt`](http://clang.llvm.org/docs/BlockLanguageSpec.txt)\n\
  \n这是 LLVM 中包含的 Blocks 语言规范。通过结合下方的“Blocks 实现规范”一同阅读，你可以学习如何实现一个支持 Blocks 的编译器和运行时库。如果你想让一个编译器支持\
  \ Blocks，则必须阅读本文档。\n\n## Blocks 实现规范\n\n- [`http://clang.llvm.org/docs/Block-ABI-Apple.txt`](http://clang.llvm.org/docs/Block-ABI-Apple.txt)\n\
  \n这是 LLVM 中包含的 Blocks 实现规范。当你拥有支持 Blocks 的编译器，但缺少运行时库时，通过阅读本文档可以找到解决方案。\n\n## libclosure\
  \ 版本 53\n\n- [`http://www.opensource.apple.com/source/libclosure/libclosure-53/`](http://www.opensource.apple.com/source/libclosure/libclosure-53/)\n\
  \n`libclosure` 是 Apple 提供的 Blocks 运行时库。该库提供了诸如 `Block_copy` 和 `Block_release` 函数等用于\
  \ Blocks 的 API。\n\n## plblocks\n\n- [`http://code.google.com/p/plblocks/`](http://code.google.com/p/plblocks/)\n\
  \n这是一个运行时库，用于在不支持 Blocks 的旧版操作系统（如 OS X 10.5 Snow Leopard 和 iOS 3.0）上支持 Blocks。在这些旧版操作系统中，运行时库没有提供诸如\
  \ `Block_copy` 或 `Block_release` 这样与 Block 相关的函数。通过使用 `plblocks` 自身实现的这些功能，Blocks\
  \ 即可在旧版操作系统上正常工作。\n\n## libdispatch 版本 187.5\n\n- [`http://www.opensource.apple.com/source/libdispatch/libdispatch-187.5/`](http://www.opensource.apple.com/source/libdispatch/libdispatch-187.5/)\n\
  \n`libdispatch` 是 Apple 提供的一个库，用于提供诸如调度队列 (dispatch queues) 等 GCD API。\n\n## Libc\
  \ 版本 763.11\n\n- [`http://www.opensource.apple.com/source/Libc/Libc-763.11/`](http://www.opensource.apple.com/source/Libc/Libc-763.11/)\n\
  \n其中实现了 `pthread_workqueue` API。该 API 源自于 GCD 的 `pthread_workqueue`。\n\n相关 API 的源代码位于：\n\
  \n- `pthreads/pthread.c`\n- `pthreads/pthread_workqueue.h`\n\n## xnu 版本 1699.22.81\n\
  \n- [`http://www.opensource.apple.com/source/xnu/xnu-1699.22.81/`](http://www.opensource.apple.com/source/xnu/xnu-1699.22.81/)\n\
  \n这是 XNU 内核的源代码，XNU 是 Mac OS X 和 iOS 的核心。你可以在以下源代码中看到 XNU 内核的工作队列 (workqueue) 实现：\n\
  \n- `bsd/kern/pthread_synch.c`\n- `osfmk/kern/thread.c`\n\n## libdispatch 项目页面\n\
  \n- [`http://libdispatch.macosforge.org/`](http://libdispatch.macosforge.org/)\n\
  \n这是 Apple 的 `libdispatch` 开源项目页面。你可以阅读 `libdispatch` 的邮件列表、将 `libdispatch` 移植到其他操作系统的相关信息等。\n\
  \n## libdispatch 移植项目\n\n- [`https://www.heily.com/trac/libdispatch`](https://www.heily.com/trac/libdispatch)\n\
  \n这是 `libdispatch` 的移植项目页面。它分发经过修改以便在诸如以下其他操作系统上编译的 `libdispatch`：\n\n- FreeBSD\n\
  - Linux\n- Solaris\n- Windows\n\n如果你需要为 Mac OS X 或 iOS 之外的操作系统编写应用程序，我推荐使用它。\n\n"
