    这些方法不是由`Objective-C`语言本身提供的。它们是作为`Cocoa`框架一部分的`Foundation`框架的特性。在`Foundation`框架中，`NSObject`拥有一个类方法`alloc`和实例方法`retain`、`release`和`dealloc`来处理内存管理（[图1–5](#Chapter01.html#fig_1_5)）。关于如何实现这一点，将在后面的“实现`alloc`、`retain`、`release`和`dealloc`”部分中展示。


    ![images](images/9781430241164_Fig01-05.jpg)


    **图1–5.** *`Cocoa`框架、`Foundation`框架和`NSObject`类的关系*


    让我们逐一研究每条规则。'
  raw: '## Life Before Automatic Reference Counting


    OSX Lion and iOS5 now offer an application memory management mechanism called
    Automatic Reference Counting (ARC). In short, ARC makes memory management the
    job of the compiler rather than the programmer, which quite often increases performance
    significantly.


    In [Chapters 2](#Chapter02.html#ch2) and [3](#Chapter03.html#ch3), you see just
    how powerful ARC is. But before entering such a dream world, it’s best to review
    the basics of memory management in a non-ARC environment. In doing so, you’ll
    form a greater appreciation of all that ARC has to offer and build a stronger
    foundation for when we delve into ARC in the next two chapters.


    We start with an overview of memory management and its concepts followed by the
    implementation of features such as alloc, dealloc, and autorelease.


    ### Reference Counted Memory Management Overview


    In many cases in Objective-C, we can rephrase “memory management” as “reference
    counting.” Memory management means that a programmer allocates a memory area when
    the program needs it and frees it when the program no longer needs it. Unneeded
    memory areas that are not freed properly are a waste of resources. Also it may
    crash the application. Reference counting, invented by George E. Collins in 1960,
    is used to make memory management simple.


    To illustrate what reference counting is let’s use the following light in an office
    analogy ([Figure 1–1](#Chapter01.html#fig_1_1)).


    ![images](images/9781430241164_Fig01-01.jpg)


    **Figure 1–1.** *A lamp in an office*


    Imagine that there is only one light in an office. In the morning, when someone
    comes into the office, he turns on the light because he needs it. When he leaves
    the office, he does not need it anymore so he turns it off. What will happen if
    more than one person turns it on and off when they move in and out? Whenever he
    leaves, he just turns off the light, which means it becomes dark even though others
    still work there ([Figure 1–2](#Chapter01.html#fig_1_2)).


    ![images](images/9781430241164_Fig01-02.jpg)


    **Figure 1–2.** *Problem of light*


    To solve this problem, we need some rules to ensure that the light is on when
    one or more person is there and off only when no one is there.


    1.  When someone comes into an empty office, she turns on the light.

    2.  Any following people entering the room use the light as well.

    3.  When someone leaves, that person no longer needs the light.

    4.  When the last person leaves, he turns the light off.


    For these rules, we introduce a counter to know how many persons there are. Let’s
    see how it works.


    1.  When someone comes into an empty office, the counter is +1\. It becomes one
    from zero. So the light turns on.

    2.  When another person comes in, the counter is +1; for instance, it becomes
    two from one.

    3.  When someone leaves, the counter is –1; for instance, it becomes one from
    two.

    4.  When the last person leaves, the counter becomes zero so the light turns off.


    As shown in [Figure 1–3](#Chapter01.html#fig_1_3), with the counter we can control
    the light properly. The light is off only when everyone is out.


    ![images](images/9781430241164_Fig01-03.jpg)


    **Figure 1–3.** *Managing the light in the office*


    Let’s see how this metaphor helps us to understand memory management. In Objective-
    C, the light corresponds to an object. Although the office has only one light,
    in Objective-C we can have many objects up to the limit of the computer’s resources.


    Each person corresponds to each context of Objective-C. Context is used for a
    bunch of program code, a variable, a variable scope, or an object. It means something
    handling a target object. [Table 1–1](#Chapter01.html#tab_1_1) highlights the
    relationship of the office light and an object in Objective-C.


    ![images](images/t0101.jpg)


    As we can manage the light with a counter, we can manage application memory in
    Objective-C. In other words, we can manage objects of Objective-C with reference
    counting, as shown in [Figure 1–4](#Chapter01.html#fig_1_4).


    ![images](images/9781430241164_Fig01-04.jpg)


    **Figure 1–4.** *Memory management with reference counting*


    This figure illustrates the concept of memory management with reference counting.
    In the following sections, we dig deeper into this concept and give some examples.


    ### Exploring Memory Management Further


    With reference counting, you may think that you need to remember the value of
    the reference counter itself or what refers to the object, and so on. But you
    shouldn’t. Instead, you should think about reference counting as in the following
    rules.


    *   You have ownership of any objects you create.

    *   You can take ownership of an object using retain.

    *   When no longer needed, you must relinquish ownership of an object you own.

    *   You must not relinquish ownership of an object you don’t own.


    Above are all the rules about reference counting. All you have to do is just follow
    the rules. You don’t need to worry any more about the reference counter.


    “Create”, “take ownership,” and “relinquish ownership” in the rules, and “dispose”
    are very common phrases for reference counting. [Table 1–2](#Chapter01.html#tab_1_2)
    shows how these phrases correspond to Objective-C methods.


    ![images](images/t0102.jpg)


    Basically, you alloc an object, retain it at some point, and then send one release
    for each alloc/retain you sent. The dealloc method is called on an object when
    it is being removed from memory.


    **NOTE:** If you used alloc once and then retain once, you need to release twice.


    These methods are not provided by the Objective-C language itself. These are features
    of the Foundation Framework as part of the Cocoa Framework. In the Foundation
    Framework, NSObject has a class method alloc, and instance methods retain, release,
    and dealloc to handle memory management ([Figure 1–5](#Chapter01.html#fig_1_5)).
    Just how this is accomplished is shown later in the “Implementing `alloc`, `retain`,
    `release`, and `dealloc`” section.


    ![images](images/9781430241164_Fig01-05.jpg)


    **Figure 1–5.** *Relationship of Cocoa Framework, Foundation Framework, and NSObject
    class*


    Let’s study each rule one by one.'
