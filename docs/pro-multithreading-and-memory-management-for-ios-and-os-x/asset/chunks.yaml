    \n## 第 4 章\n\n## Blocks 入门\n\nBlocks 是为 OSX Snow Leopard、iOS4 及更高版本引入的 C 语言扩展。本章将详细讲解\
    \ Blocks 是什么，以便下一章介绍其实现时更有意义。了解实现有助于理解如何使用它们以及它们的工作原理。为了正确认识 Blocks，请看以下场景。\n\n\
    当你阅读 iOS 或 OSX 应用程序源代码时，可能会发现其中有一些奇怪的语句。这些语句在函数内部包含了函数声明。根据以往的经验，我们在 C 和 Objective-C\
    \ 中并未发现过这种语法。GameKit 组件（iOS4 中的新组件）经常使用这种语法来使应用程序源代码更优雅。我们来看一个示例。\n\n```\n- (void)reportScore:(int64_t)score\
    \ forCategory:(NSString*)category\n{\n        /* 省略 */\n        [scoreReporter\
    \ reportScoreWithCompletionHandler:^(NSError *error) {  \n                   \
    \ /* 分数报告后要执行的任务 */\n                if (error != nil)\n                 {\n \
    \                   /* 报告时发生错误时要执行的任务 */\n                }\n        }]\n}\n```\n\
    \n这个示例展示了如何使用 GameKit API 来报告游戏分数。对用户来说，最重要的是要知道分数是否已成功报告给服务器。应用程序必须监控其完成情况并检查是否发生错误。在这种情况下，指定在报告完成后自动执行的任务非常有用。而且，如果你能非常轻松地编写这些任务，那就更方便了。\n\
    \n在 GameKit 组件中，你可以通过使用 Blocks 来实现这一点。在示例中，“分数报告后要执行的任务”这部分注释所在的位置就是 Blocks。这部分代码在分数报告完成之后执行，而不是在\
    \ `reportScoreWithCompletionHandler:` 方法被调用之后。如示例所示，你无需监控报告何时完成，通过使用 Blocks 就能非常优雅地编写这些任务。\n\
    \n在本章中，你将学习如何使用 Blocks。我们将从了解什么是 Block 以及为什么需要 Blocks 开始。然后，我们将学习如何在应用程序中使用 Blocks，例如如何按字面形式编写\
    \ Block，以及如何在 Block 中使用变量（如源代码示例所示）。\n\n### Blocks 初探\n\n如前所述，Blocks 是 C 语言的一个新扩展。简而言之，它们可以被解释为“带有自动（局部）变量的匿名函数”。让我们快速了解一下这两个部分以及它们是如何实现的。\n"
- fmt: '#### Anonymous functions


    An anonymous function is, as the name suggests, a function without a name. In
    standard C and Objective-C, however, you can’t create such functions without the
    help of blocks. In C++, lambda that has same concept of Blocks is finally introduced
    in C++11.


    For example:


    ```

    int func(int count);

    ```


    In this source code, a function is declared with a name `func`. To call the function,
    you have to use the name “func” as follows.


    ```

    int result = func(10);

    ```


    You might think that you could call the function without knowing the name by using
    the function pointer:


    ```

    int result = (*funcptr)(10);

    ```


    In fact, to assign a function to the pointer, you still need its name as follows.


    ```

    int (*funcptr)(int) = &func;

    int result = (*funcptr)(10);

    ```


    As in the examples throughout this chapter, in order to use a function, you have
    to name it. By using Blocks, you no longer have to do that. With Blocks, though,
    anonymous functions can be used. Programmers need to name so many things including
    functions, variables, methods, properties, classes, frameworks, and so on that
    it’s been said that naming things is the programmer’s fundamental work. So it’s
    great that a function doesn’t need its name! In the “Block Literal Syntax” section,
    I explain how Blocks achieve anonymous functions in detail.


    Now that you know what an anonymous function is, it’s important to understand
    what “together with automatic (local) variables” means.


    #### Variables


    Let’s see which of the following variables can be used in the C language.


    - Automatic variables (local variables)

    - Function arguments

    - Static variables (static local variables)

    - Static global variables

    - Global variables


    Among these variable types, static, static global, and global can keep the values
    beyond each function call and they are stored in one memory area for the application.


    In that sense, these three types are all the same except for variable scope. Even
    when used beyond function calls, these variables have always kept their values.
    In other words, the same value of the variable must be used anywhere in the application.
    To illustrate this, let’s look at an example of a callback function for a button
    event.


    ```

    int buttonId = 0;

    void buttonCallback(int event)

    {

        printf("buttonId:%d event=%d\n", buttonId, event);

    }

    ```


    If there is only one button in the application, this source code works fine. But
    how about when there are multiple buttons as follows?


    ```

    int buttonId;

    void buttonCallback(int event)

    {

        printf("buttonId:%d event=%d\n", buttonId, event);

    }


    void setButtonCallbacks()

    {

        for (int i = 0; i < BUTTON_MAX; ++i) {

            buttonId = i;

            setButtonCallback(BUTTON_IDOFFSET + i, &buttonCallback);

        }

    }

    ```


    The problem in the source code is obvious. The global variable `buttonId` is the
    only one and shared. All the callbacks use the same value after the for-loop.
    Of course, you can solve the problem by passing the button id as an argument for
    the callback function.


    ```

    void buttonCallback(int buttonId, int event)

    {

        printf("buttonId:%d event=%d\n", buttonId, event);

    }

    ```


    In this case, the caller has to store not only function pointers but also button
    ids. By the way, in C++ and Objective-C, a class is used for this kind of situation.
    At first, you declare a class with a member variable and then create an object
    from the class to store the value in the member variable. The following source
    code shows how to use a class for the button callback example.


    ```

    @interface ButtonCallbackObject : NSObject

    {

        int buttonId_;

    }

    @end


    @implementation ButtonCallbackObject

    - (id) initWithButtonId:(int)buttonId

    {

        self = [super init];

        buttonId_ = buttonId;

        return self;

    }


    - (void) callback:(int)event

    {

        NSLog(@"buttonId:%d event=%d\n", buttonId_, event);

    }

    @end

    ```


    The caller of the callback only has to store the object, because the class can
    keep the value of the button id as well.


    ```

    void setButtonCallbacks()

    {

        for (int i = 0; i < BUTTON_MAX; ++i) {

            ButtonCallbackObject *callbackObj =

                [[ButtonCallbackObject alloc] initWithButtonId:i];

            setButtonCallbackUsingObject(BUTTON_IDOFFSET, callbackObj);

        }

    }

    ```


    As you see, in C++ and Objective-C, the declaration and implementation for a class
    need many lines of source code. However, this can be solved with Blocks.


    #### Blocks to the Rescue


    Blocks offer features to keep variables as classes in C++ or Objective-C, with
    far less code. It’s almost the same amount of source code as for functions. As
    I said “together with automatic (local) variables,” Blocks hold values of auto
    variables. The following code shows how the previous example can be written with
    Blocks.


    ```

    void setButtonCallbacks()

    {

        for (int i = 0; i < BUTTON_MAX; ++i) {

            setButtonCallbackUsingBlock(BUTTON_IDOFFSET + i, ^(int event) {

                printf("buttonId:%d event=%d\n", i, event); });

        }

    }

    ```


    Its syntax is explained in the section, “Block Literal Syntax,” and how automatic
    variables are stored is explained in the section, “Capturing automatic variables.”
    In this source code, anonymous functions, with values of the variable `i`, are
    set as callbacks. With Blocks, an anonymous function is called a “Block Literal”
    or “Block” for short. As I said, with Blocks, you can use anonymous functions
    together with automatic (local) variables, meaning that Blocks can solve the problem
    when static (or global) variables are used, and you can have the same functionality
    of C++ or Objective-C classes, with far less source code.


    Please note that “anonymous functions together with automatic (local) variables”
    is not a new idea. In fact, it is common in many languages. In computer science,
    it is called “Closure” or “lambda calculus.” [Table 4–1](#Chapter04.html#tab_4_1)
    shows what it is called in other languages.


    ![images](images/t0401.jpg)


    In the following sections, we will learn how to use Blocks, starting with the
    syntax of Block literal.'
