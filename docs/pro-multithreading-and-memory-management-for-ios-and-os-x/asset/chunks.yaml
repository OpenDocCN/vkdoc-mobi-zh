    \ : NSObject {\n    id _weak obj;\n} @end\n```\n\n或者，该属性必须使用修饰符 \"strong\"。\n\n\
    ```\n@property (nonatomic, strong) id obj;\n```\n\n接下来，我们来了解一些在使用带 ARC 的数组时需要注意的事项。\n"
- fmt: "### Array\n\nI explained the ownership specifiers with ‘id’ or object type\
    \ variables. In this section, I explain how we can use the specifiers with arrays.\n\
    \nThe following source code shows how to use a static array of variables qualified\
    \ with `__strong`.\n\n```\nid objs[10];\n```\n\nYou can do the same with `__weak`,\
    \ `__autoreleasing`, or `__unsafe_unretained`.\n\n```\nid __weak objs[10];\n```\n\
    \nBy the way, any variables qualified with `__strong`, `__weak`, or `__autoreleasing`\
    \ other than `__unsafe_unretained`, are initialized with `nil`. This is also applied\
    \ for static array. Any arrays of variables, which qualified with `__strong`,\
    \ `__weak`, or `__autoreleasing`, are initialized with `nil`. Let’s see how to\
    \ use them.\n\n```\n{\n    id objs[2];\n    objs[0] = [[NSObject alloc] init];\n\
    \    objs[1] = [NSMutableArray array];\n}\n```\n\nWhen the control flow leaves\
    \ the scope of the array, all the variables that have strong references in the\
    \ array disappear. The assigned objects are released automatically. It is identical\
    \ to variables not in arrays.\n\nWhat will happen with a dynamic array? Basically,\
    \ you should use containers in the Foundation Framework such as `NSMutableArray`,\
    \ `NSMutableDictionary`, or `NSMutableSet`. Then the stored objects will be properly\
    \ managed. These containers are the better choice, but you can still use a dynamic\
    \ C array with variables qualified with `__strong`. But you have to remember a\
    \ few things. As usual, let’s see them with an example.\n\nFirst, declare a pointer\
    \ to a dynamic C array:\n\n```\nid __strong *array = nil;\n```\n\nAs described\
    \ previously, `id *` type means `id __autoreleasing *`. So, in this case, you\
    \ have to type `__strong` qualifier. Although `id` type variables with a `__strong`\
    \ ownership qualifier are initialized as `nil`, `id` pointer type variables qualified\
    \ with `__strong` are not. So, you have to assign `nil` explicitly.\n\nOr, you\
    \ can declare it as follows, if you prefer class type instead of `id`.\n\n```\n\
    NSObject * __strong *array = nil;\n```\n\nNext, allocate a memory block for the\
    \ variables in the array with the `calloc` function.\n\n```\narray = (id __strong\
    \ *)calloc(entries, sizeof(id));\n```\n\nIn this source code, a memory block is\
    \ allocated for the number of “entries” elements. Note that variables qualified\
    \ with `__strong` have to be initialized with `nil`. The `calloc` function is\
    \ used to fill with zero after allocation. Instead of the `calloc` function, you\
    \ can use the `malloc` function to allocate and the `memset` function to fill\
    \ with zero as follows.\n\n```\narray = (id __strong *)malloc(entries * sizeof(id));\n\
    memset(array, 0, entries * sizeof(id));\n```\n\nHowever, it is very dangerous\
    \ to assign `nil` as follows.\n\n```\narray = (id __strong *)malloc(sizeof(id)\
    \ * entries);\nfor (NSUInteger i = 0; i < entries; ++i)\n    array[i] = nil;\n\
    ```\n\nIn this source code, the memory area allocated by `malloc` isn’t initialized\
    \ by zero. So, before each assignment, release methods are called on invalid addresses.\
    \ Therefore simply using the `calloc` function is recommended. After that, you\
    \ can do anything for the dynamic array that you can for the static array.\n\n\
    ```\narray[0] = [[NSObject alloc] init];\n```\n\nBut after you finish using a\
    \ dynamic array of variables qualified with `__strong`, you have to release all\
    \ the entries yourself. This is very different from static array. Just disposing\
    \ of the memory block with `free` function as in the following causes a memory\
    \ leak because each entry will never be released.\n\n```\nfree(array);\n```\n\n\
    For static arrays, the compiler will insert code to release all the entries automatically\
    \ when the variable scope is left. But for dynamic arrays, the compiler can’t\
    \ detect their lifetimes. By setting all the entries to `nil`, you can remove\
    \ all the strong references of the entries so that all the objects will be released.\
    \ And then, you have to dispose of the memory block itself as well.\n\n```\nfor\
    \ (NSUInteger i = 0; i < entries; ++i)\n    array[i] = nil;\n\nfree(array);\n\
    ```\n\nAs opposed to the initialization, you can’t release objects with the `memset`\
    \ function as it causes memory leak. It is just dangerous. You have to assign\
    \ `nil` to all the entries manually to let the compiler detect it.\n\nLikewise,\
    \ copying any entries by `memcpy` or `realloc` the memory block is dangerous as\
    \ well. By doing so the object might not be disposed of, or the same object might\
    \ be disposed of more than once. So, using these functions is strictly prohibited.\n\
    \nAlso, you can use dynamic arrays of variables qualified with `__weak` in the\
    \ same manner as with `__strong`. It is better not to use with `__autoreleasing`,\
    \ because that produces an unexpected state. Because any variables qualified with\
    \ `__unsafe_unretained` are not in control of the compiler, you can use them just\
    \ as you would C pointer type variables such as `void*`.\n\n### Summary\n\nIn\
    \ this chapter, we learned:\n\n*   How the reference counting rules are still\
    \ applicable with ARC\n*   The ownership qualifiers that are newly added with\
    \ ARC\n*   New properties that are added for ARC\n*   Rules you must know to use\
    \ ARC\n\nIn the next chapter, we discuss these items in detail with the implementation\
    \ of ARC itself.\n\n## Chapter 3\n\n## ARC Implementation\n\nIn this chapter,\
    \ we discuss the implementation of ARC itself to review what we learned in the\
    \ last chapter, explaining in detail what ARC is and how it works.\n\nApple says,\
    \ “Automatic Reference Counting (ARC) in Objective-C makes memory management the\
    \ job of the compiler,” but the truth is, ARC isn’t the only job of the compiler.\
    \ The Objective-C runtime needs to help as well, so ARC is actually achieved by\
    \ both tool and library:\n\n*   Compiler: clang (LLVM compiler) 3.0 or later\n\
    *   Objective-C runtime library: objc4 493.9 or later\n\n**NOTE:** As Apple says,\
    \ if ARC is the only compiler’s job, the `__weak` ownership specifier can also\
    \ be usable on iOS4 or OS X Snow Leopard.\n\nWhen the application is compiled\
    \ for iOS4 or OS X Snow Leopard, `libarclite_iphoneos.a` or `libarclite_macosx.a`\
    \ is linked to make ARC work. Even if the ARC supporting library is linked, it\
    \ is still impossible to set `nil` for the `__weak` qualified variable after the\
    \ object is discarded (zeroing weak references). I guess that it is a limitation\
    \ of legacy frameworks and the runtime library. Inasmuch as we can’t see the source\
    \ code of `libarclite`, it is just my guess, though.\n\nFor now, however, let’s\
    \ not worry about the older operating systems; instead in this chapter we concentrate\
    \ on the implementations of ARC itself and look at the output of clang assembler\
    \ and the source codes of `runtime/objc-arr.mm` in the `objc4` library.\n\nIn\
    \ the following sections, we show ARC’s source code for each qualifier. We’ve\
    \ already learned what the qualifiers are and how we use them. In the following\
    \ sections we learn how they work in detail. Let’s start with the `__strong` ownership\
    \ qualifier.\n\n### __strong ownership qualifier\n\nLet’s see how the variables\
    \ that are qualified with `__strong` work, using `NSMutableArray` class method\
    \ “array” as an example. We see under the hood of calling the method and inside\
    \ the method itself. Before that, please see the following source code.\n\n```\n\
    {\n    id __strong obj = [[NSObject alloc] init];\n}\n```\n\nClang can display\
    \ its output as assembly/machine code. For the sake of readability we have represented\
    \ each excerpt below as its ObjC equivalent. With the output and the source code\
    \ of the `objc4` library, we are able to see what is going on under the hood.\
    \ The above source code is rewritten as follows. Please note that sometimes we\
    \ use pseudo code to make it more understandable.\n\n```\n/* pseudo code by the\
    \ compiler */\nid obj = objc_msgSend(NSObject, @selector(alloc));\nobjc_msgSend(obj,\
    \ @selector(init));\nobjc_release(obj);\n```\n\nYou can see that `objc_msgSend`\
    \ is called twice for `alloc` and `init` method invocation. After that, `objc_release`\
    \ is called to release the object when the variable scope is left. Although you\
    \ can’t call the `release` method explicitly, you can see that `release` is automatically\
    \ inserted in the pseudo code."
  raw: '### Array


    I explained the ownership specifiers with ‘id’ or object type variables. In this
    section, I explain how we can use the specifiers with arrays.


    The following source code shows how to use a static array of variables qualified
    with __strong.


    `id objs[10];`


    You can do the same with __weak, __autoreleasing, or __unsafe_unretained.


    `id __weak objs[10];`


    By the way, any variables qualified with __strong, __weak, or __autoreleasing
    other than __unsafe_unretained, are initialized with nil. This is also applied
    for static array. Any arrays of variables, which qualified with __strong, __weak,
    or __autoreleasing, are initialized with nil. Let’s see how to use them.


    `{`

    `    id objs[2];`

    `    objs[0] = [[NSObject alloc] init];`

    `    objs[1] = [NSMutableArray array];`

    `}`


    When the control flow leaves the scope of the array, all the variables that have
    strong references in the array disappear. The assigned objects are released automatically.
    It is identical to variables not in arrays.


    What will happen with a dynamic array? Basically, you should use containers in
    the Foundation Framework such as NSMutableArray, NSMutableDictionary, or NSMutableSet.
    Then the stored objects will be properly managed. These containers are the better
    choice, but you can still use a dynamic C array with variables qualified with
    __strong. But you have to remember a few things. As usual, let’s see them with
    an example.


    First, declare a pointer to a dynamic C array:


    `id __strong *array = nil;`


    As described previously, ‘id *’ type means ‘id __autoreleasing *’. So, in this
    case, you have to type __strong qualifier. Although ‘id’ type variables with a
    __strong ownership qualifier are initialized as nil, id pointer type variables
    qualified with __strong are not. So, you have to assign nil explicitly.


    Or, you can declare it as follows, if you prefer class type instead of ‘id’.


    `NSObject * __strong *array = nil;`


    Next, allocate a memory block for the variables in the array with the calloc function.


    `array = (id __strong *)calloc(entries, sizeof(id));`


    In this source code, a memory block is allocated for the number of “entries” elements.
    Note that variables qualified with __strong have to be initialized with nil. The
    calloc function is used to fill with zero after allocation. Instead of the calloc
    function, you can use the malloc function to allocate and the memset function
    to fill with zero as follows.


    `array = (id __strong *)malloc(entries * sizeof(id));`

    `memset(array, 0, entries * sizeof(id));`


    However, it is very dangerous to assign nil as follows.


    `array = (id __strong *)malloc(sizeof(id) * entries);`

    `for (NSUInteger i = 0; i < entries; ++i)`

    `    array[i] = nil;`


    In this source code, the memory area allocated by malloc isn’t initialized by
    zero. So, before each assignment, release methods are called on invalid addresses.
    Therefore simply using the calloc function is recommended. After that, you can
    do anything for the dynamic array that you can for the static array.


    `array[0] = [[NSObject alloc] init];`


    But after you finish using a dynamic array of variables qualified with __strong,
    you have to release all the entries yourself. This is very different from static
    array. Just disposing of the memory block with free function as in the following
    causes a memory leak because each entry will never be released.


    `free(array);`


    For static arrays, the compiler will insert code to release all the entries automatically
    when the variable scope is left. But for dynamic arrays, the compiler can’t detect
    their lifetimes. By setting all the entries to nil, you can remove all the strong
    references of the entries so that all the objects will be released. And then,
    you have to dispose of the memory block itself as well.


    `for (NSUInteger i = 0; i < entries; ++i)`

    `    array[i] = nil;`


    `free(array);`


    As opposed to the initialization, you can’t release objects with the memset function
    as it causes memory leak. It is just dangerous. You have to assign nil to all
    the entries manually to let the compiler detect it.


    Likewise, copying any entries by memcpy or realloc the memory block is dangerous
    as well. By doing so the object might not be disposed of, or the same object might
    be disposed of more than once. So, using these functions is strictly prohibited.


    Also, you can use dynamic arrays of variables qualified with __weak in the same
    manner as with __strong. It is better not to use with __autoreleasing, because
    that produces an unexpected state. Because any variables qualified with __unsafe_unretained
    are not in control of the compiler, you can use them just as you would C pointer
    type variables such as void*.


    ### Summary


    In this chapter, we learned:


    *   How the reference counting rules are still applicable with ARC

    *   The ownership qualifiers that are newly added with ARC

    *   New properties that are added for ARC

    *   Rules you must know to use ARC


    In the next chapter, we discuss these items in detail with the implementation
    of ARC itself.


    ## Chapter 3


    ## ARC Implementation


    In this chapter, we discuss the implementation of ARC itself to review what we
    learned in the last chapter, explaining in detail what ARC is and how it works.


    Apple says, “Automatic Reference Counting (ARC) in Objective-C makes memory management
    the job of the compiler,” but the truth is, ARC isn’t the only job of the compiler.
    The objective-C runtime needs to help as well, so ARC is actually achieved by
    both tool and library:


    *   Compiler: clang (LLVM compiler) 3.0 or later

    *   Objective-C runtime library: objc4 493.9 or later


    **NOTE:** As Apple says, if ARC is the only compiler’s job, the __weak ownership
    specifier can also be usable on iOS4 or OS X Snow Leopard.


    When the application is compiled for iOS4 or OS X Snow Leopard, libarclite_iphoneos.a
    or libarclite_macosx.a is linked to make ARC work. Even if the ARC supporting
    library is linked, it is still impossible to set nil for the __weak qualified
    variable after the object is discarded (zeroing weak references). I guess that
    it is a limitation of legacy frameworks and the runtime library. Inasmuch as we
    can’t see the source code of libarclite, it is just my guess, though.


    For now, however, let’s not worry about the older operating systems; instead in
    this chapter we concentrate on the implementations of ARC itself and look at the
    output of clang assembler and the source codes of runtime/objc-arr.mm in the objc4
    library.


    In the following sections, we show ARC’s source code for each qualifier. We’ve
    already learned what the qualifiers are and how we use them. In the following
    sections we learn how they work in detail. Let’s start with the __strong ownership
    qualifier.


    ### __strong ownership qualifier


    Let’s see how the variables that are qualified with __strong work, using NSMutableArray
    class method “array” as an example. We see under the hood of calling the method
    and inside the method itself. Before that, please see the following source code.


    `{`

    `    id __strong obj = [[NSObject alloc] init];`

    `}`


    Clang can display its output as assembly/machine code. For the sake of readability
    we have represented each excerpt below as its ObjC equivalent. With the output
    and the source code of the objc4 library, we are able to see what is going on
    under the hood. The above source code is rewritten as follows. Please note that
    sometimes we use pseudo code to make it more understandable.


    `/* pseudo code by the compiler */`

    `id obj = objc_msgSend(NSObject, @selector(alloc));`

    `objc_msgSend(obj, @selector(init));`

    `objc_release(obj);`


    You can see that objc_msgSend is called twice for alloc and init method invocation.
    After that, objc_release is called to release the object when the variable scope
    is left. Although you can’t call the release method explicitly, you can see that
    release is automatically inserted in the pseudo code.'
  trans: "\n### 数组\n\n我在之前用 `id` 或对象类型变量解释了所有权说明符。在本节中，我将解释如何在数组中使用这些说明符。\n\n以下源代码展示了如何使用使用\
    \ `__strong` 限定的静态变量数组。\n\n```\nid objs[10];\n```\n\n对于 `__weak`、`__autoreleasing`\
    \ 或 `__unsafe_unretained`，操作方式相同。\n\n```\nid __weak objs[10];\n```\n\n顺便提一下，任何使用\
    \ `__strong`、`__weak` 或 `__autoreleasing`（`__unsafe_unretained` 除外）限定的变量都会被初始化为\
    \ `nil`。这同样适用于静态数组。任何使用 `__strong`、`__weak` 或 `__autoreleasing` 限定的变量数组，都会被初始化为\
    \ `nil`。让我们看看如何使用它们。\n\n```\n{\n    id objs[2];\n    objs[0] = [[NSObject alloc]\
    \ init];\n    objs[1] = [NSMutableArray array];\n}\n```\n\n当控制流离开数组的作用域时，数组中所有持有强引用的变量都会消失。所赋值的对象会被自动释放。这与非数组中的变量行为一致。\n\
    \n动态数组的情况又是怎样的呢？基本上，你应该使用 Foundation 框架中的容器，例如 `NSMutableArray`、`NSMutableDictionary`\
    \ 或 `NSMutableSet`。这样存储的对象将会被妥善管理。这些容器是更优的选择，但你仍然可以使用带有 `__strong` 限定变量的动态 C 数组。不过，你需要记住几点。按照惯例，我们通过一个示例来看看。\n\
    \n首先，声明一个指向动态 C 数组的指针：\n\n```\nid __strong *array = nil;\n```\n\n如前所述，`id *` 类型意味着\
    \ `id __autoreleasing *`。因此，在这种情况下，你必须显式写出 `__strong` 限定符。虽然带有 `__strong` 所有权限定符的\
    \ `id` 类型变量会被初始化为 `nil`，但带有 `__strong` 限定的 `id` 指针类型变量却不会。因此，你必须显式地将其赋值为 `nil`。\n\
    \n或者，如果你更喜欢使用类类型而不是 `id`，也可以像下面这样声明：\n\n```\nNSObject * __strong *array = nil;\n\
    ```\n\n接下来，使用 `calloc` 函数为数组中的变量分配一个内存块。\n\n```\narray = (id __strong *)calloc(entries,\
    \ sizeof(id));\n```\n\n在这段源代码中，为“entries”个元素分配了一个内存块。请注意，使用 `__strong` 限定的变量必须初始化为\
    \ `nil`。这里使用 `calloc` 函数是为了在分配后用零填充内存。除了 `calloc` 函数，你也可以先使用 `malloc` 函数分配内存，再使用\
    \ `memset` 函数用零填充，如下所示。\n\n```\narray = (id __strong *)malloc(entries * sizeof(id));\n\
    memset(array, 0, entries * sizeof(id));\n```\n\n然而，像下面这样赋值为 `nil` 是非常危险的。\n\n\
    ```\narray = (id __strong *)malloc(sizeof(id) * entries);\nfor (NSUInteger i =\
    \ 0; i < entries; ++i)\n    array[i] = nil;\n```\n\n在这段源代码中，由 `malloc` 分配的内存区域并未被初始化为零。因此，在每次赋值之前，`release`\
    \ 方法会在无效的地址上被调用。所以，推荐直接使用 `calloc` 函数。之后，你可以像操作静态数组一样，对动态数组进行任何操作。\n\n```\narray[0]\
    \ = [[NSObject alloc] init];\n```\n\n但是，当你使用完带有 `__strong` 限定的动态变量数组后，必须自行释放所有元素。这与静态数组有很大的不同。像下面这样仅仅使用\
    \ `free` 函数释放内存块会导致内存泄漏，因为每个元素永远不会被释放。\n\n```\nfree(array);\n```\n\n对于静态数组，当变量作用域结束时，编译器会自动插入代码来释放所有元素。但对于动态数组，编译器无法检测其生命周期。通过将所有元素设置为\
    \ `nil`，你可以移除元素的所有强引用，从而释放所有对象。然后，你还必须释放内存块本身。\n\n```\nfor (NSUInteger i = 0;\
    \ i < entries; ++i)\n    array[i] = nil;\n\nfree(array);\n```\n\n与初始化相反，你不能使用\
    \ `memset` 函数来释放对象，因为这会导致内存泄漏。这样做非常危险。你必须手动将所有元素赋值为 `nil`，以便让编译器检测到。\n\n同样地，使用\
    \ `memcpy` 复制任何元素或使用 `realloc` 调整内存块大小也是危险的。这样做可能导致对象未被释放，或者同一对象被多次释放。因此，严格禁止使用这些函数。\n\
    \n另外，你也可以像使用 `__strong` 那样，以同样的方式使用带有 `__weak` 限定的动态变量数组。最好不要与 `__autoreleasing`\
    \ 一起使用，因为这会产生意想不到的状态。由于 `__unsafe_unretained` 限定的变量不受编译器控制，你可以像使用 `void*` 等 C\
    \ 指针类型变量一样来使用它们。\n\n### 总结\n\n在本章中，我们学习了：\n\n*   引用计数规则在 ARC 下如何依然适用\n*   ARC\
    \ 新引入的所有权限定符\n*   为 ARC 新增的特性\n*   使用 ARC 时必须了解的规则\n\n在下一章中，我们将结合 ARC 本身的实现来详细讨论这些内容。\n\
    \n## 第 3 章\n\n## ARC 实现\n\n在本章中，我们将通过讨论 ARC 本身的实现来回顾上一章所学的内容，详细解释 ARC 是什么以及它是如何工作的。\n\
    \n苹果公司说：“Objective-C 中的自动引用计数（ARC）使内存管理成为编译器的工作”，但事实上，ARC 并非仅仅是编译器的工作。Objective-C\
    \ 运行时也需要提供帮助，因此 ARC 实际上是由工具和库共同实现的：\n\n*   编译器：clang (LLVM 编译器) 3.0 或更高版本\n* \
    \  Objective-C 运行时库：`objc4` 493.9 或更高版本\n\n**注意：**正如苹果公司所说，如果 ARC 仅仅是编译器的工作，那么\
    \ `__weak` 所有权说明符也可以在 iOS4 或 OS X Snow Leopard 上使用。\n\n当应用程序为 iOS4 或 OS X Snow\
    \ Leopard 编译时，会链接 `libarclite_iphoneos.a` 或 `libarclite_macosx.a` 以使 ARC 工作。即使链接了\
    \ ARC 支持库，在对象被废弃后，仍然无法为 `__weak` 限定的变量设置 `nil`（零化弱引用）。我猜这是旧版框架和运行时库的限制。不过，由于我们无法看到\
    \ `libarclite` 的源代码，这只是我的猜测。\n\n但现在，我们先不操心旧版操作系统；在本章中，我们将专注于 ARC 本身的实现，并查看 clang\
    \ 汇编器的输出以及 `objc4` 库中 `runtime/objc-arr.mm` 的源代码。\n\n在接下来的部分中，我们将展示每个限定符对应的 ARC\
    \ 源代码。我们已经学习了这些限定符是什么以及如何使用它们。在接下来的部分中，我们将详细了解它们是如何工作的。让我们从 `__strong` 所有权限定符开始。\n\
    \n### __strong 所有权限定符\n\n让我们以 `NSMutableArray` 类方法 `array` 为例，看看使用 `__strong`\
    \ 限定的变量是如何工作的。我们将深入了解调用该方法时的底层机制以及该方法内部的机制。在此之前，请参考以下源代码。\n\n```\n{\n    id __strong\
    \ obj = [[NSObject alloc] init];\n}\n```\n\nClang 可以将其输出显示为汇编/机器代码。为了易读性，我们在下面将每个摘录表示为等价的\
    \ ObjC 代码。结合输出和 `objc4` 库的源代码，我们能够看到底层发生了什么。上述源代码被重写如下。请注意，有时我们会使用伪代码使其更易于理解。\n\
    \n```\n/* 编译器的伪代码 */\nid obj = objc_msgSend(NSObject, @selector(alloc));\nobjc_msgSend(obj,\
    \ @selector(init));\nobjc_release(obj);\n```\n\n你可以看到，`objc_msgSend` 被调用了两次，分别用于调用\
    \ `alloc` 和 `init` 方法。之后，当变量作用域结束时，会调用 `objc_release` 来释放对象。虽然你不能显式地调用 `release`\
    \ 方法，但可以看到在伪代码中 `release` 被自动插入了。\n"
- fmt: "#### Calling the array method\n\nNext, let’s see what happens when an object\
    \ is not obtained by the `alloc/new/copy/mutableCopy` method group. The original\
    \ source code is as follows.\n\n```\n{\n    id __strong obj = [NSMutableArray\
    \ array];\n}\n```\n\nThis is ordinary-looking `NSMutableArray` class method `array`.\
    \ The pseudo code of this is a bit different from the previous one.\n\n```\n/*\
    \ pseudo code by the compiler */\nid obj = objc_msgSend(NSMutableArray, @selector(array));\n\
    objc_retainAutoreleasedReturnValue(obj);\nobjc_release(obj);\n```\n\nThe first\
    \ `objc_msgSend` for the `array` method and the last `objc_release` are the same\
    \ as the previous one. What is the `objc_retainAutoreleasedReturnValue` function\
    \ call?\n\n`objc_retainAutoreleasedReturnValue` function is for performance optimization.\
    \ It is inserted because the `NSMutableArray` class method `array` is not in the\
    \ `alloc/new/copy/mutableCopy` method group. The compiler inserts this function\
    \ every time just after the invocation of a method if the method is not in the\
    \ group. As the name suggests, it retains an object returned from a method or\
    \ function after the object is added in autorelease pool.\n\n`objc_retainAutoreleasedReturnValue`\
    \ function expects that an `objc_autoreleaseReturnValue` function has been called\
    \ inside the method. Any methods, that are not in the `alloc/new/copy/mutableCopy`\
    \ group, have to call `objc_autoreleaseReturnValue`. For instance, `NSMutableArray`\
    \ class method `array` calls this function.\n\n#### Inside the array Method\n\n\
    Let’s see the implementation of the `NSMutableArray` class method `array` as the\
    \ compiler-generated code.\n\n```\n+ (id) array\n{\n    return [[NSMutableArray\
    \ alloc] init];\n}\n```\n\nThis source code is converted as follows. It calls\
    \ `objc_autoreleaseReturnValue` function at the last.\n\n```\n/* pseudo code by\
    \ the compiler */\n+ (id) array\n{\n    id obj = objc_msgSend(NSMutableArray,\
    \ @selector(alloc));\n    objc_msgSend(obj, @selector(init));\n    return objc_autoreleaseReturnValue(obj);\n\
    }\n```\n\nAny methods that return an object added to autorelease pool call `objc_autoreleaseReturnValue`\
    \ function as in the above example. It adds an object to autorelease pool and\
    \ returns it. But, in reality, `objc_autoreleaseReturnValue` doesn’t register\
    \ it to autorelease pool all the time.\n\n`objc_autoreleaseReturnValue` checks\
    \ the caller’s executable code and if the code calls `objc_retainAutoreleasedReturnValue`\
    \ function just after calling this method, it skips registering to the autorelease\
    \ pool and just returns the object to the caller. `objc_retainAutoreleasedReturnValue`\
    \ function is implemented to obtain such an object properly even if `objc_autoreleaseReturnValue`\
    \ didn’t register the object to the autorelease pool. By co-operation of `objc_autoreleaseReturnValue`\
    \ and `objc_retainAutoreleasedReturnValue`, the object bypasses being added to\
    \ autorelease pool as shown in [Figure3–1](#Chapter03.html#fig_3_1). So, performance\
    \ will be improved.^([1](#Chapter03.html#CHP-3-FN-1))\n\n__________\n\n¹ With\
    \ `objc4` version 493.9, the optimization works only in an OS X 64-bit environment.\n\
    \n![images](images/9781430241164_Fig03-01.jpg)\n\n**Figure 3–1.** *Skip registration\
    \ to the autorelease pool*\n\n### `__weak` ownership qualifier\n\nNext, we learn\
    \ about the `__weak` ownership qualifier. We show what happens when an object\
    \ is disposed of or when a newly created object is assigned and how an object\
    \ is added to the autorelease pool automatically.\n\nAs described previously in\
    \ [Chapter 2](#Chapter02.html#ch2), the `__weak` ownership qualifier provides\
    \ the following features.\n\n*   Nil is assigned to any variables qualified with\
    \ `__weak` when referencing object is discarded.\n*   When an object is accessed\
    \ through a `__weak` qualified variable, the object is added to the autorelease\
    \ pool.\n\nLet’s start with the following example to see what is going on behind\
    \ the scenes.\n\n```\n{\n    id __weak obj1 = obj;\n}\n```\n\nHere, assume that\
    \ the variable `obj` is stored in some variables qualified with `__strong`.\n\n\
    ```\n/* pseudo code by the compiler */\nid obj1;\nobjc_initWeak(&obj1, obj);\n\
    objc_destroyWeak(&obj1);\n```\n\nThe variable qualified with `__weak` is initialized\
    \ by the `objc_initWeak` function. When the variable scope is left, the `objc_destroyWeak`\
    \ function destroys it.\n\nThe `objc_initWeak` function is implemented as the\
    \ following source code. It clears the variable qualified with `__weak`, and then\
    \ calls the `objc_storeWeak` function with the object to be assigned.\n\n```\n\
    obj1 = 0;\nobjc_storeWeak(&obj1, obj);\n```\n\nThe `objc_destroyWeak` function\
    \ calls `objc_storeWeak` function with zero as argument as follows.\n\n```\nobjc_storeWeak(&obj1,\
    \ 0);\n```\n\nSo, the example code is equivalent to:\n\n```\n/* pseudo code by\
    \ the compiler */\nid obj1;\nobj1 = 0;\nobjc_storeWeak(&obj1, obj);\nobjc_storeWeak(&obj1,\
    \ 0);\n```\n\n`objc_storeWeak` function registers a key-value to a table, called\
    \ a weak table. The key is the second argument, the address of the object to be\
    \ assigned. The value is the first argument, the address of a variable that qualified\
    \ with `__weak`. If the second argument is zero, the entry is removed from the\
    \ table.\n\nThe weak table is implemented as a hash table as a reference count\
    \ table (see [Chapter 1](#Chapter01.html#ch1), Section “The Implementation by\
    \ Apple”). With that, variables qualified with `__weak` can be searched from a\
    \ disposing object with reasonable performance. When the function is called with\
    \ the same object for key, multiple `__weak` qualified variables will be registered\
    \ for the same object.\n\n#### Looking Under the Hood When an Object Is Discarded\n\
    \nNext, let’s see the function calls when an object is disposed of when no one\
    \ has ownership of it. Objects are relinquished by `objc_release` function.\n\n\
    1.  `objc_release`.\n2.  `dealloc` is called because retain count becomes zero.\n\
    3.  `_objc_rootDealloc`.\n4.  `object_dispose`.\n5.  `objc_destructInstance`.\n\
    6.  `objc_clear_deallocating`.\n\n`objc_clear_deallocating` function is called\
    \ last. It does the following.\n\n1.  From the weak table, get an entry of which\
    \ the key is the object to be discarded.\n2.  Set nil to all the `__weak` ownership\
    \ qualified variables in the entry.\n3.  Remove the entry from the table.\n4.\
    \  For the object to be disposed of, remove its key from the reference table.\n\
    \nThis is the implementation and it lets us know how nil is assigned to any variables\
    \ qualified with `__weak` when the referencing object is discarded. Also, it tells\
    \ us that if too many `__weak` ownership qualified variables are used, it consumes\
    \ CPU resources at some level. So, `__weak` ownership qualified variables should\
    \ be used only to avoid circular references."
  raw: '#### Calling the array method


    Next, let’s see what happens when an object is not obtained by the alloc/new/copy/mutableCopy
    method group. The original source code is as follows.


    `{`

    `    id __strong obj = [NSMutableArray array];`

    `}`


    This is ordinary-looking NSMutableArray class method “array”. The pseudo code
    of this is a bit different from the previous one.


    `/* pseudo code by the compiler */`

    `id obj = objc_msgSend(NSMutableArray, @selector(array));`

    `objc_retainAutoreleasedReturnValue(obj);`

    `objc_release(obj);`


    The first objc_msgSend for the array method and the last objc_release are the
    same as the previous one. What is the objc_retainAutoreleasedReturnValue function
    call?


    objc_retainAutoreleasedReturnValue function is for performance optimization. It
    is inserted because the NSMutableArray class method array is not in the alloc/new/copy/mutableCopy
    method group. The compiler inserts this function every time just after the invocation
    of a method if the method is not in the group. As the name suggests, it retains
    an object returned from a method or function after the object is added in autorelease
    pool.


    objc_retainAutoreleasedReturnValue function expects that an objc_autoreleaseReturnValue
    function has been called inside the method. Any methods, that are not in the alloc/new/copy/mutableCopy
    group, have to call objc_autoreleaseReturnValue. For instance, NSMutableArray
    class method “array” calls this function.


    #### Inside the array Method


    Let’s see the implementation of the NSMutableArray class method “array” as the
    compiler-generated code.


    `+ (id) array`

    `{`

    `    return [[NSMutableArray alloc] init];`

    `}`


    This source code is converted as follows. It calls objc_autoreleaseReturnValue
    function at the last.


    `/* pseudo code by the compiler */`

    `+ (id) array`

    `{`

    `    id obj = objc_msgSend(NSMutableArray, @selector(alloc));`

    `    objc_msgSend(obj, @selector(init));`

    `    return objc_autoreleaseReturnValue(obj);`

    `}`


    Any methods that return an object added to autorelease pool call objc_autoreleaseReturnValue
    function as in the above example. It adds an object to autorelease pool and returns
    it. But, in reality, objc_autoreleaseReturnValue doesn’t register it to autorelease
    pool all the time.


    objc_autoreleaseReturnValue checks the caller’s executable code and if the code
    calls objc_retainAutoreleasedReturnValue function just after calling this method,
    it skips registering to the autorelease pool and just returns the object to the
    caller. objc_retainAutoreleasedReturnValue function is implemented to obtain such
    an object properly even if objc_autoreleaseReturnValue didn’t register the object
    to the autorelease pool. By co-operation of objc_autoreleaseReturnValue and objc_retainAutoreleasedReturnValue,
    the object bypasses being added to autorelease pool as shown in [Figure3–1](#Chapter03.html#fig_3_1).
    So, performance will be improved.^([1](#Chapter03.html#CHP-3-FN-1))


    __________


    ¹ With objc4 version 493.9, the optimization works only in an OS X 64-bit environment.


    ![images](images/9781430241164_Fig03-01.jpg)


    **Figure 3–1.** *Skip registration to the autorelease pool*


    ### __weak ownership qualifier


    Next, we learn about the __weak ownership qualifier. We show what happens when
    an object is disposed of or when a newly created object is assigned and how an
    object is added to the autorelease pool automatically.


    As described previously in [Chapter 2](#Chapter02.html#ch2), the __weak ownership
    qualifier provides the following features.


    *   Nil is assigned to any variables qualified with __weak when referencing object
    is discarded.

    *   When an object is accessed through a __weak qualified variable, the object
    is added to the autorelease pool.


    Let’s start with the following example to see what is going on behind the scenes.


    `{`

    `    id __weak obj1 = obj;`

    `}`


    Here, assume that the variable obj is stored in some variables qualified with
    __strong.


    `/* pseudo code by the compiler */`

    `id obj1;`

    `objc_initWeak(&obj1, obj);`

    `objc_destroyWeak(&obj1);`


    The variable qualified with __weak is initialized by the objc_initWeak function.
    When the variable scope is left, the objc_destroyWeak function destroys it.


    The objc_initWeak function is implemented as the following source code. It clears
    the variable qualified with __weak, and then calls the objc_storeWeak function
    with the object to be assigned.


    `obj1 = 0;`

    `objc_storeWeak(&obj1, obj);`


    The objc_destroyWeak function calls objc_storeWeak function with zero as argument
    as follows.


    `objc_storeWeak(&obj1, 0);`


    So, the example code is equivalent to:


    `/* pseudo code by the compiler */`

    `id obj1;`

    `obj1 = 0;`

    `objc_storeWeak(&obj1, obj);`

    `objc_storeWeak(&obj1, 0);`


    objc_storeWeak function registers a key-value to a table, called a weak table.
    The key is the second argument, the address of the object to be assigned. The
    value is the first argument, the address of a variable that qualified with __weak.
    If the second argument is zero, the entry is removed from the table.


    The weak table is implemented as a hash table as a reference count table (see
    [Chapter 1](#Chapter01.html#ch1), Section “The Implementation by Apple”). With
    that, variables qualified with __weak can be searched from a disposing object
    with reasonable performance. When the function is called with the same object
    for key, multiple __weak qualified variables will be registered for the same object.


    #### Looking Under the Hood When an Object Is Discarded


    Next, let’s see the function calls when an object is disposed of when no one has
    ownership of it. Objects are relinquished by objc_release function.


    1.  objc_release.

    2.  dealloc is called because retain count becomes zero.

    3.  _objc_rootDealloc.

    4.  object_dispose.

    5.  objc_destructInstance.

    6.  objc_clear_deallocating.


    objc_clear_deallocating function is called last. It does the following.


    1.  From the weak table, get an entry of which the key is the object to be discarded.

    2.  Set nil to all the __weak ownership qualified variables in the entry.

    3.  Remove the entry from the table.

    4.  For the object to be disposed of, remove its key from the reference table.


    This is the implementation and it lets us know how nil is assigned to any variables
    qualified with __weak when the referencing object is discarded. Also, it tells
    us that if too many __weak ownership qualified variables are used, it consumes
    CPU resources at some level. So, __weak ownership qualified variables should be
    used only to avoid circular references.'
  trans: "\n#### 调用数组方法\n\n接下来，我们看看当一个对象不是通过 `alloc/new/copy/mutableCopy` 方法组获取时会发生什么。原始代码如下所示。\n\
    \n```\n{\n    id __strong obj = [NSMutableArray array];\n}\n```\n\n这是一个看起来很普通的\
    \ `NSMutableArray` 类方法 `array`。它的伪代码与之前的略有不同。\n\n```\n/* 编译器生成的伪代码 */\nid obj\
    \ = objc_msgSend(NSMutableArray, @selector(array));\nobjc_retainAutoreleasedReturnValue(obj);\n\
    objc_release(obj);\n```\n\n第一个用于 `array` 方法的 `objc_msgSend` 和最后一个 `objc_release`\
    \ 与之前相同。那么这个 `objc_retainAutoreleasedReturnValue` 函数调用是什么呢？\n\n`objc_retainAutoreleasedReturnValue`\
    \ 函数是为了性能优化。之所以插入它，是因为 `NSMutableArray` 的类方法 `array` 不在 `alloc/new/copy/mutableCopy`\
    \ 方法组中。每当调用的方法不属于该组时，编译器都会在调用该方法后立即插入这个函数。顾名思义，它会在一个对象被添加到自动释放池后，保留从方法或函数返回的该对象。\n\
    \n`objc_retainAutoreleasedReturnValue` 函数期望在方法内部已经调用了 `objc_autoreleaseReturnValue`\
    \ 函数。任何不在 `alloc/new/copy/mutableCopy` 组中的方法都必须调用 `objc_autoreleaseReturnValue`。例如，`NSMutableArray`\
    \ 的类方法 `array` 就调用了这个函数。\n\n#### 深入 array 方法内部\n\n我们来看看编译器生成的 `NSMutableArray`\
    \ 类方法 `array` 的实现代码。\n\n```\n+ (id) array\n{\n    return [[NSMutableArray alloc]\
    \ init];\n}\n```\n\n这段源代码被转换如下。它在最后调用了 `objc_autoreleaseReturnValue` 函数。\n\n```\n\
    /* 编译器生成的伪代码 */\n+ (id) array\n{\n    id obj = objc_msgSend(NSMutableArray, @selector(alloc));\n\
    \    objc_msgSend(obj, @selector(init));\n    return objc_autoreleaseReturnValue(obj);\n\
    }\n```\n\n任何返回已添加到自动释放池的对象的方法，都会像上面的例子一样调用 `objc_autoreleaseReturnValue` 函数。它会将一个对象添加到自动释放池并返回它。但实际上，`objc_autoreleaseReturnValue`\
    \ 并不总是将该对象注册到自动释放池中。\n\n`objc_autoreleaseReturnValue` 会检查调用方的可执行代码，如果该代码在调用此方法后立即调用\
    \ `objc_retainAutoreleasedReturnValue` 函数，则它会跳过向自动释放池的注册，直接将对象返回给调用方。`objc_retainAutoreleasedReturnValue`\
    \ 函数的实现目的是，即使 `objc_autoreleaseReturnValue` 没有将对象注册到自动释放池，也能正确地获取这样一个对象。通过 `objc_autoreleaseReturnValue`\
    \ 和 `objc_retainAutoreleasedReturnValue` 的协同工作，对象会绕过添加到自动释放池的过程，如图 3-1 所示。这样，性能就会得到提升。^(1)\n\
    \n__________\n\n¹ 在 `objc4` 版本 493.9 中，此优化仅在 OS X 64 位环境下有效。\n\n![images](img/9781430241164_Fig03-01.jpg)\n\
    \n**图 3–1.** *跳过向自动释放池的注册*\n\n### `__weak` 所有权修饰符\n\n接下来，我们学习 `__weak` 所有权修饰符。我们将展示当对象被废弃或新创建的对象被赋值时会发生什么，以及对象如何被自动添加到自动释放池中。\n\
    \n如第 2 章所述，`__weak` 所有权修饰符提供以下特性。\n\n*   当所引用的对象被废弃时，任何使用 `__weak` 修饰的变量都会被赋值为\
    \ nil。\n*   当通过 `__weak` 修饰的变量访问对象时，该对象会被添加到自动释放池中。\n\n我们从以下示例开始，看看幕后发生了什么。\n\n\
    ```\n{\n    id __weak obj1 = obj;\n}\n```\n\n这里，假设变量 `obj` 被存储在某个使用 `__strong`\
    \ 修饰的变量中。\n\n```\n/* 编译器生成的伪代码 */\nid obj1;\nobjc_initWeak(&obj1, obj);\nobjc_destroyWeak(&obj1);\n\
    ```\n\n使用 `__weak` 修饰的变量由 `objc_initWeak` 函数初始化。当离开变量作用域时，`objc_destroyWeak` 函数会销毁它。\n\
    \n`objc_initWeak` 函数实现如下源代码所示。它会清空使用 `__weak` 修饰的变量，然后调用 `objc_storeWeak` 函数，并传入要赋值的对象。\n\
    \n```\nobj1 = 0;\nobjc_storeWeak(&obj1, obj);\n```\n\n`objc_destroyWeak` 函数会调用\
    \ `objc_storeWeak` 函数，并将 0 作为参数传入，如下所示。\n\n```\nobjc_storeWeak(&obj1, 0);\n```\n\
    \n因此，示例代码等同于：\n\n```\n/* 编译器生成的伪代码 */\nid obj1;\nobj1 = 0;\nobjc_storeWeak(&obj1,\
    \ obj);\nobjc_storeWeak(&obj1, 0);\n```\n\n`objc_storeWeak` 函数将一个键值对注册到一个称为弱表的表中。键是第二个参数，即要赋值的对象的地址。值是第一个参数，即指向使用\
    \ `__weak` 修饰的变量的地址。如果第二个参数为 0，则从表中移除该条目。\n\n与引用计数表一样，弱表也被实现为一个哈希表（参见第 1 章 ，“Apple\
    \ 的实现”一节）。这样，当一个对象被废弃时，可以以合理的性能从该对象搜索到使用 `__weak` 修饰的变量。当以同一个对象作为键调用该函数时，多个使用\
    \ `__weak` 修饰的变量将注册到同一个对象。\n\n#### 探究对象被废弃时的底层机制\n\n接下来，我们看看当某个对象不再被任何所有者拥有而被废弃时调用的函数。对象通过\
    \ `objc_release` 函数被释放。\n\n1.  `objc_release`。\n2.  因为引用计数变为零，调用 `dealloc`。\n\
    3.  `_objc_rootDealloc`。\n4.  `object_dispose`。\n5.  `objc_destructInstance`。\n\
    6.  `objc_clear_deallocating`。\n\n最后调用 `objc_clear_deallocating` 函数。它执行以下操作。\n\
    \n1.  从弱表中，获取键为要被废弃的对象的条目。\n2.  将该条目中所有使用 `__weak` 所有权修饰的变量设置为 nil。\n3.  从表中移除该条目。\n\
    4.  对于要被废弃的对象，从引用表中移除其键。\n\n这就是其实现，让我们得以了解当所引用的对象被废弃时，如何将使用 `__weak` 修饰的变量设置为\
    \ nil。同时，这也告诉我们，如果使用了太多的 `__weak` 所有权修饰变量，会在一定程度上消耗 CPU 资源。因此，`__weak` 所有权修饰变量应仅用于避免循环引用。\n"
- fmt: "# Assigning a Newly Created Object\n\nAs described previously, the following\
    \ source code causes a warning.\n\n```\n{\n    id __weak obj = [[NSObject alloc]\
    \ init];\n}\n```\n\nIt tries to assign a new object to a variable. But no one\
    \ can have ownership because the variable is qualified with `__weak`. So, the\
    \ object is immediately released and discarded. That is the reason for the warning.\n\
    \n```\nwarning: assigning retained obj to weak variable; obj will be\n       \
    \   released after assignment [-Warc-unsafe-retained-assign]\n            id __weak\
    \ obj = [[NSObject alloc] init];\n                               ^     ~~~~~~~~~~~~~~\n\
    ```\n\nLet’s see how the compiler handles the source code.\n\n```\n/* pseudo code\
    \ by the compiler */\nid obj;\nid tmp = objc_msgSend(NSObject, @selector(alloc));\n\
    objc_msgSend(tmp, @selector(init));\nobjc_initWeak(&obj, tmp);\nobjc_release(tmp);\n\
    objc_destroyWeak(&object);\n```\n\n`objc_initWeak` function assigns the new object\
    \ to the variable, which is qualified with `__weak`. Also, the compiler detects\
    \ that no one has ownership and inserts the `objc_release` function.\n\nWhen `objc_release`\
    \ is called, the object will be discarded and the variable qualified with `__weak`\
    \ becomes nil. Let’s check the result with `NSLog`:\n\n```\n{\n    id __weak obj\
    \ = [[NSObject alloc] init];\n    NSLog(@\"obj=%@\", obj);\n}\n```\n\nThe result\
    \ is as follows. It shows nil formatted with `@\"%@\"`.\n\n```\nobj=(null)\n```\n\
    \nWhat will happen if an object is created and just discarded? Let’s see it in\
    \ the next section with its implementation.\n\n# Immediate Disposal of Objects\n\
    \nAs we described, the following source code causes a compiler warning.\n\n```\n\
    id __weak obj = [[NSObject alloc] init];\n```\n\nThis is because the compiler\
    \ detects that no one has ownership of the new object. How about `__unsafe_unretained`?\n\
    \n```\nid __unsafe_unretained obj = [[NSObject alloc] init];\n```\n\nThe same\
    \ as `__weak`, the compiler detects that no one has ownership of the object.\n\
    \n```\nwarning: assigning retained object to unsafe_unretained variable;\n   \
    \     obj will be released after assignment [-Warc-unsafe-retained-assign]\n \
    \       id __unsafe_unretained obj = [[NSObject alloc] init];\n              \
    \                                         ^     ~~~~~~~~~~~~~\n```\n\nThe source\
    \ code is equivalent to:\n\n```\n/* pseudo code by the compiler */\nid obj = objc_msgSend(NSObject,\
    \ @selector(alloc));\nobjc_msgSend(obj, @selector(init));\nobjc_release(obj);\n\
    ```\n\nThe new object is released by the `objc_release` function, and the variable\
    \ `obj` still has a dangling pointer. What will happen if the object is not assigned\
    \ to any variables? Without ARC, it just causes a memory leak.\n\n```\n[[NSObject\
    \ alloc] init];\n```\n\nWith ARC, the compiler gives a warning because the returned\
    \ value is never used.\n\n```\nwarning: expression result unused [-Wunused-value]\n\
    \    [[NSObject alloc] init];\n    ^~~~~~~~~~~~~\n```\n\nYou can hide the warning\
    \ by casting it to `void`.\n\n```\n(void)[[NSObject alloc] init];\n```\n\nThis\
    \ source code is converted to the following, with or without cast.\n\n```\n/*\
    \ pseudo code by the compiler */\nid tmp = objc_msgSend(NSObject, @selector(alloc));\n\
    objc_msgSend(tmp, @selector(init));\nobjc_release(tmp);\n```\n\nUnless the object\
    \ is not assigned to a variable, the code is the same as with `__unsafe_unretained`.\
    \ Because no one has ownership, the compiler generates an `objc_release` function\
    \ call. Because of ARC, no memory leak occurs.\n\nOne more question: can we call\
    \ instance methods for these immediately disposed of objects as follows?\n\n```\n\
    (void)[[[NSObject alloc] init] hash];\n```\n\nThis is equivalent to:\n\n```\n\
    /* pseudo code by the compiler */\nid tmp = objc_msgSend(NSObject, @selector(alloc));\n\
    objc_msgSend(tmp, @selector(init));\nobjc_msgSend(tmp, @selector(hash));\nobjc_release(tmp);\n\
    ```\n\nThe object is released after the method is called. The compiler handles\
    \ memory management properly as Apple says!\n\n# Adding to Autorelease Pool Automatically\n\
    \nAs described previously, when an object is accessed through a `__weak` qualified\
    \ variable, the object has been added to the autorelease pool. Let’s see how it\
    \ works.\n\n```\n{\n    id __weak obj1 = obj;\n    NSLog(@\"%@\", obj1);\n}\n\
    ```\n\nThe source code is equivalent to the following.\n\n```\n/* pseudo code\
    \ by the compiler */\nid obj1;\nobjc_initWeak(&obj1, obj);\nid tmp = objc_loadWeakRetained(&obj1);\n\
    objc_autorelease(tmp);\nNSLog(@\"%@\", tmp);\nobjc_destroyWeak(&obj1);\n```\n\n\
    `objc_loadWeakRetained` and `objc_autorelease` function calls are newly inserted,\
    \ which are not in the previous examples. This is because the variable is used\
    \ somehow. These functions do the following:\n\n1. `objc_loadWeakRetained` function\
    \ retains the object referenced by the variable qualified with `__weak`.\n2. `objc_autorelease`\
    \ function adds the object to the autorelease pool.\n\nThis means that an object\
    \ assigned to a variable with `__weak`, is added to the autorelease pool so that\
    \ the variable can be used safely until `@autoreleasepool` block is left.\n\n\
    **NOTE:** If you use `__weak` qualified variables too often, too many objects\
    \ will be stored in autorelease pool.\n\nTo avoid this storage issue, I recommend\
    \ that when you use a `__weak` qualified variable, you should assign the object\
    \ to a `__strong` qualified variable as well. For example, the next example uses\
    \ variable `o` five times, which is qualified with `__weak`.\n\n```\n{\n    id\
    \ __weak o = obj;\n    NSLog(@\"1 %@\", o);\n    NSLog(@\"2 %@\", o);\n    NSLog(@\"\
    3 %@\", o);\n    NSLog(@\"4 %@\", o);\n    NSLog(@\"5 %@\", o);\n}\n```\n\nThe\
    \ object is added to the autorelease pool five times:\n\n```\nobjc[14481]: ##############\n\
    objc[14481]: AUTORELEASE POOLS for thread 0xad0892c0\nobjc[14481]: 6 releases\
    \ pending.\nobjc[14481]: [0x6a85000]  ................  PAGE  (hot) (cold)\nobjc[14481]:\
    \ [0x6a85028]  ################  POOL 0x6a85028\nobjc[14481]: [0x6a8502c]    \
    \     0x6719e40  NSObject\nobjc[14481]: [0x6a85030]         0x6719e40  NSObject\n\
    objc[14481]: [0x6a85034]         0x6719e40  NSObject\nobjc[14481]: [0x6a85038]\
    \         0x6719e40  NSObject\nobjc[14481]: [0x6a8503c]         0x6719e40  NSObject\n\
    objc[14481]: ##############\n```\n\nYou can avoid that by assigning the object\
    \ to a variable qualified with `__strong`.\n\n```\n{\n    id __weak o = obj;\n\
    \    id tmp = o;\n    NSLog(@\"1 %@\", tmp);\n    NSLog(@\"2 %@\", tmp);\n   \
    \ NSLog(@\"3 %@\", tmp);\n    NSLog(@\"4 %@\", tmp);\n    NSLog(@\"5 %@\", tmp);\n\
    }\n```\n\nIn this case, the object is added to the autorelease pool just once\
    \ at the line `tmp = o;`\n\n```\nobjc[14481]: ##############\nobjc[14481]: AUTORELEASE\
    \ POOLS for thread 0xad0892c0\nobjc[14481]: 2 releases pending.\nobjc[14481]:\
    \ [0x6a85000]  ................  PAGE  (hot) (cold)\nobjc[14481]: [0x6a85028]\
    \  ################  POOL 0x6a85028\nobjc[14481]: [0x6a8502c]         0x6719e40\
    \  NSObject\nobjc[14481]: ##############\n```\n\nAs described previously, a `__weak`\
    \ qualifier can’t be used for iOS4 or OS X Snow Leopard. Also, in some other cases,\
    \ a `__weak` ownership qualifier can’t be used because some classes don’t support\
    \ `__weak` qualified variables.\n\nFor example, an `NSMachPort` class can’t be\
    \ assigned to any variables qualified with `__weak`. These classes override `retain`/`release`\
    \ and have their own reference counts in their original implementation. When an\
    \ object is assigned to a `__weak` qualified variable, the compiler has to insert\
    \ `objc4` functions properly, so many of these classes can’t support a `__weak`\
    \ qualification. These unsupported classes have an attribute `__attribute__((objc_arc_weak_reference_unavailable))`\
    \ in class declaration, which is defined as `NS_AUTOMATED_REFCOUNT_WEAK_UNAVAILABLE`.\
    \ Even if you assign an object of these classes to a variable, qualified with\
    \ `__weak`, the compiler properly generates an error. These classes are very rare,\
    \ so you don’t need to worry about it too much.\n\n**ALLOWSWEAKREFERENCE AND RETAINWEAKREFERENCE\
    \ METHODS**"
  raw: '#### Assigning a Newly Created Object


    As described previously, the following source code causes a warning.


    `{`

    `    id __weak obj = [[NSObject alloc] init];`

    `}`


    It tries to assign a new object to a variable. But no one can have ownership because
    the variable is qualified with __weak. So, the object is immediately released
    and discarded. That is the reason for the warning.


    `warning: assigning retained obj to weak variable; obj will be`

    `          released after assignment [-Warc-unsafe-retained-assign]`

    `            id __weak obj = [[NSObject alloc] init];`

    `                               ^     ~~~~~~~~~~~~~~`


    Let’s see how the compiler handles the source code.


    `/* pseudo code by the compiler */`

    `id obj;`

    `id tmp = objc_msgSend(NSObject, @selector(alloc));`

    `objc_msgSend(tmp, @selector(init));`

    `objc_initWeak(&obj, tmp);`

    `objc_release(tmp);`

    `objc_destroyWeak(&object);`


    objc_initWeak function assigns the new object to the variable, which is qualified
    with __weak. Also, the compiler detects that no one has ownership and inserts
    the objc_release function.


    When objc_release is called, the object will be discarded and the variable qualified
    with __weak becomes nil. Let’s check the result with NSLog:


    `{`

    `    id __weak obj = [[NSObject alloc] init];`

    `    NSLog(@"obj=%@", obj);`

    `}`


    The result is as follows. It shows nil formatted with “%@”.


    `obj=(null)`


    What will happen if an object is created and just discarded? Let’s see it in the
    next section with its implementation.


    #### Immediate Disposal of Objects


    As we described, the following source code causes a compiler warning.


    `id __weak obj = [[NSObject alloc] init];`


    This is because the compiler detects that no one has ownership of the new object.
    How about __unsafe_unretained?


    `id __unsafe_unretained obj = [[NSObject alloc] init];`


    The same as __weak, the compiler detects that no one has ownership of the object.


    `warning: assigning retained object to unsafe_unretained variable;`

    `        obj will be released after assignment [-Warc-unsafe-retained-assign]`

    `        id __unsafe_unretained obj = [[NSObject alloc] init];`

    `                                                       ^     ~~~~~~~~~~~~~`


    The source code is equivalent to:


    `/* pseudo code by the compiler */`

    `id obj = objc_msgSend(NSObject, @selector(alloc));`

    `objc_msgSend(obj, @selector(init));`

    `objc_release(obj);`


    The new object is released by the objc_release function, and the variable obj
    still has a dangling pointer. What will happen if the object is not assigned to
    any variables? Without ARC, it just causes a memory leak.


    `[[NSObject alloc] init];`


    With ARC, the compiler gives a warning because the returned value is never used.


    `warning: expression result unused [-Wunused-value]`

    `    [[NSObject alloc] init];`

    `    ^~~~~~~~~~~~~`


    You can hide the warning by casting it to void.


    `(void)[[NSObject alloc] init];`


    This source code is converted to the following, with or without cast.


    `/* pseudo code by the compiler */`

    `id tmp = objc_msgSend(NSObject, @selector(alloc));`

    `objc_msgSend(tmp, @selector(init));`

    `objc_release(tmp);`


    Unless the object is not assigned to a variable, the code is the same as with
    __unsafe_unretained. Because no one has ownership, the compiler generates an objc_release
    function call. Because of ARC, no memory leak occurs.


    One more question: can we call instance methods for these immediately disposed
    of objects as follows?


    `(void)[[[NSObject alloc] init] hash];`


    This is equivalent to:


    `/* pseudo code by the compiler */`

    `id tmp = objc_msgSend(NSObject, @selector(alloc));`

    `objc_msgSend(tmp, @selector(init));`

    `objc_msgSend(tmp, @selector(hash));`

    `objc_release(tmp);`


    The object is released after the method is called. The compiler handles memory
    management properly as Apple says!


    #### Adding to autorelease pool Automatically


    As described previously, when an object is accessed through a __weak qualified
    variable, the object has been added to the autorelease pool. Let’s see how it
    works.


    `{`

    `    id __weak obj1 = obj;`

    `    NSLog(@"%@", obj1);`

    `}`


    The source code is equivalent to the following.


    `/* pseudo code by the compiler */`

    `id obj1;`

    `objc_initWeak(&obj1, obj);`

    `id tmp = objc_loadWeakRetained(&obj1);`

    `objc_autorelease(tmp);`

    `NSLog(@"%@", tmp);`

    `objc_destroyWeak(&obj1);`


    objc_loadWeakRetained and objc_autorelease function calls are newly inserted,
    which are not in the previous examples. This is because the variable is used somehow.
    These functions do the following.


    1.  objc_loadWeakRetained function retains the object referenced by the variable
    qualified with __weak.

    2.  objc_autorelease function adds the object to the autorelease pool.


    This means that an object assigned to a variable with __weak, is added to the
    autorelease pool so that the variable can be used safely until @autoreleasepool
    block is left.


    **NOTE:** If you use __weak qualified variables too often, too many objects will
    be stored in autorelease pool.


    To avoid this storage issue, I recommend that when you use a __weak qualified
    variable, you should assign the object to a __strong qualified variable as well.
    For example, the next example uses variable o five times, which is qualified with
    __weak.


    `{`

    `    id __weak o = obj;`

    `    NSLog(@"1 %@", o);`

    `    NSLog(@"2 %@", o);`

    `    NSLog(@"3 %@", o);`

    `    NSLog(@"4 %@", o);`

    `    NSLog(@"5 %@", o);`

    `}`


    The object is added to the autorelease pool five times:


    `objc[14481]: ##############`

    `objc[14481]: AUTORELEASE POOLS for thread 0xad0892c0`

    `objc[14481]: 6 releases pending.`

    `objc[14481]: [0x6a85000]  ................  PAGE  (hot) (cold)`

    `objc[14481]: [0x6a85028]  ################  POOL 0x6a85028`

    `objc[14481]: [0x6a8502c]         0x6719e40  NSObject`

    `objc[14481]: [0x6a85030]         0x6719e40  NSObject`

    `objc[14481]: [0x6a85034]         0x6719e40  NSObject`

    `objc[14481]: [0x6a85038]         0x6719e40  NSObject`

    `objc[14481]: [0x6a8503c]         0x6719e40  NSObject`

    `objc[14481]: ##############`


    You can avoid that by assigning the object to a variable qualified with __strong.


    `{`

    `    id __weak o = obj;`

    `    id tmp = o;`

    `    NSLog(@"1 %@", tmp);`

    `    NSLog(@"2 %@", tmp);`

    `    NSLog(@"3 %@", tmp);`

    `    NSLog(@"4 %@", tmp);`

    `    NSLog(@"5 %@", tmp);`

    `}`


    In this case, the object is added to the autorelease pool just once at the line
    “tmp = o;”


    `objc[14481]: ##############`

    `objc[14481]: AUTORELEASE POOLS for thread 0xad0892c0`

    `objc[14481]: 2 releases pending.`

    `objc[14481]: [0x6a85000]  ................  PAGE  (hot) (cold)`

    `objc[14481]: [0x6a85028]  ################  POOL 0x6a85028`

    `objc[14481]: [0x6a8502c]         0x6719e40  NSObject`

    `objc[14481]: ##############`


    As described previously, a __weak qualifier can’t be used for iOS4 or OS X Snow
    Leopard. Also, in some other cases, a __weak ownership qualifier can’t be used
    because some classes don’t support __weak qualified variables.


    For example, an NSMachPort class can’t be assigned to any variables qualified
    with __weak. These classes override retain/release and have their own reference
    counts in their original implementation. When an object is assigned to a __weak
    qualified variable, the compiler has to insert objc4 functions properly, so many
    of these classes can’t support a __weak qualification. These unsupported classes
    have an attribute __attribute__((objc_arc_weak_reference_unavailable)) in class
    declaration, which is defined as NS_AUTOMATED_REFCOUNT_WEAK_UNAVAILABLE. Even
    if you assign an object of these classes to a variable, qualified with __weak,
    the compiler properly generates an error. These classes are very rare, so you
    don’t need to worry about it too much.


    **ALLOWSWEAKREFERENCE AND RETAINWEAKREFERENCE METHODS**'
  trans: "\n# 分配新创建的对象\n\n如前所述，以下源代码会触发一条警告。\n\n```\n{\n    id __weak obj = [[NSObject\
    \ alloc] init];\n}\n```\n\n它试图将一个新对象赋值给变量。但由于变量使用了`__weak`修饰，没有任何对象能持有其所有权。因此，该对象会立即被释放并废弃。这就是警告产生的原因。\n\
    \n```\nwarning: assigning retained obj to weak variable; obj will be\n       \
    \   released after assignment [-Warc-unsafe-retained-assign]\n            id __weak\
    \ obj = [[NSObject alloc] init];\n                               ^     ~~~~~~~~~~~~~~\n\
    ```\n\n让我们看看编译器如何处理这段源代码。\n\n```\n/* 编译器伪代码 */\nid obj;\nid tmp = objc_msgSend(NSObject,\
    \ @selector(alloc));\nobjc_msgSend(tmp, @selector(init));\nobjc_initWeak(&obj,\
    \ tmp);\nobjc_release(tmp);\nobjc_destroyWeak(&object);\n```\n\n`objc_initWeak`\
    \ 函数将新对象赋值给了使用 `__weak` 修饰的变量。同时，编译器检测到没有任何对象持有所有权，并插入了 `objc_release` 函数。\n\n\
    当 `objc_release` 被调用时，对象将被废弃，并且使用 `__weak` 修饰的变量会变成 nil。让我们用 `NSLog` 来验证结果：\n\n\
    ```\n{\n    id __weak obj = [[NSObject alloc] init];\n    NSLog(@\"obj=%@\", obj);\n\
    }\n```\n\n结果如下所示。它显示了使用 `@\"%@\"` 格式化后的 nil。\n\n```\nobj=(null)\n```\n\n如果一个对象被创建后就直接废弃，会发生什么？我们将在下一节中通过具体实现来了解。\n\
    \n# 对象的立即废弃\n\n正如我们所述，以下源代码会导致编译器警告。\n\n```\nid __weak obj = [[NSObject alloc]\
    \ init];\n```\n\n这是因为编译器检测到没有人拥有这个新对象的所有权。那么 `__unsafe_unretained` 的情况又如何呢？\n\n\
    ```\nid __unsafe_unretained obj = [[NSObject alloc] init];\n```\n\n与 `__weak`\
    \ 类似，编译器检测到没有人拥有该对象的所有权。\n\n```\nwarning: assigning retained object to unsafe_unretained\
    \ variable;\n        obj will be released after assignment [-Warc-unsafe-retained-assign]\n\
    \        id __unsafe_unretained obj = [[NSObject alloc] init];\n             \
    \                                          ^     ~~~~~~~~~~~~~\n```\n\n该源代码等价于：\n\
    \n```\n/* 编译器伪代码 */\nid obj = objc_msgSend(NSObject, @selector(alloc));\nobjc_msgSend(obj,\
    \ @selector(init));\nobjc_release(obj);\n```\n\n新对象通过 `objc_release` 函数被释放，而变量\
    \ `obj` 仍然持有一个悬垂指针。如果对象没有赋值给任何变量，会发生什么？在没有 ARC 的情况下，这只会导致内存泄漏。\n\n```\n[[NSObject\
    \ alloc] init];\n```\n\n在 ARC 下，编译器会因为返回值从未被使用而给出警告。\n\n```\nwarning: expression\
    \ result unused [-Wunused-value]\n    [[NSObject alloc] init];\n    ^~~~~~~~~~~~~\n\
    ```\n\n你可以通过将其强制转换为 `void` 来隐藏警告。\n\n```\n(void)[[NSObject alloc] init];\n```\n\
    \n无论是否进行强制转换，这段源代码都会被转换为以下形式。\n\n```\n/* 编译器伪代码 */\nid tmp = objc_msgSend(NSObject,\
    \ @selector(alloc));\nobjc_msgSend(tmp, @selector(init));\nobjc_release(tmp);\n\
    ```\n\n除非对象未被赋值给变量，否则其代码与使用 `__unsafe_unretained` 的情况相同。因为没有人拥有所有权，所以编译器会生成 `objc_release`\
    \ 函数调用。由于 ARC 的存在，不会发生内存泄漏。\n\n还有一个问题：我们能否像下面这样，对这些立即丢弃的对象调用实例方法？\n\n```\n(void)[[[NSObject\
    \ alloc] init] hash];\n```\n\n这等价于：\n\n```\n/* 编译器伪代码 */\nid tmp = objc_msgSend(NSObject,\
    \ @selector(alloc));\nobjc_msgSend(tmp, @selector(init));\nobjc_msgSend(tmp, @selector(hash));\n\
    objc_release(tmp);\n```\n\n对象会在方法调用后被释放。正如苹果公司所说，编译器妥善处理了内存管理！\n\n# 自动添加到自动释放池\n\
    \n如前所述，当通过使用 `__weak` 修饰的变量访问对象时，该对象会被添加到自动释放池中。让我们看看它是如何工作的。\n\n```\n{\n    id\
    \ __weak obj1 = obj;\n    NSLog(@\"%@\", obj1);\n}\n```\n\n该源代码等价于以下内容。\n\n```\n\
    /* 编译器伪代码 */\nid obj1;\nobjc_initWeak(&obj1, obj);\nid tmp = objc_loadWeakRetained(&obj1);\n\
    objc_autorelease(tmp);\nNSLog(@\"%@\", tmp);\nobjc_destroyWeak(&obj1);\n```\n\n\
    `objc_loadWeakRetained` 和 `objc_autorelease` 函数调用是新插入的，这在之前的示例中没有出现。这是因为变量被实际使用了。这些函数的作用如下：\n\
    \n1. `objc_loadWeakRetained` 函数会保留由使用 `__weak` 修饰的变量所引用的对象。\n2. `objc_autorelease`\
    \ 函数会将对象添加到自动释放池中。\n\n这意味着，赋值给使用 `__weak` 修饰的变量的对象，会被添加到自动释放池中，以便该变量可以在离开 `@autoreleasepool`\
    \ 块之前安全使用。\n\n**注意：** 如果你过度使用 `__weak` 修饰的变量，自动释放池中将会存储过多的对象。\n\n为了避免这种存储问题，我建议你在使用\
    \ `__weak` 修饰的变量时，也应将对象赋值给一个 `__strong` 修饰的变量。例如，下面的示例中，变量 `o`（使用 `__weak` 修饰）被使用了五次。\n\
    \n```\n{\n    id __weak o = obj;\n    NSLog(@\"1 %@\", o);\n    NSLog(@\"2 %@\"\
    , o);\n    NSLog(@\"3 %@\", o);\n    NSLog(@\"4 %@\", o);\n    NSLog(@\"5 %@\"\
    , o);\n}\n```\n\n该对象会被添加到自动释放池五次：\n\n```\nobjc[14481]: ##############\nobjc[14481]:\
    \ AUTORELEASE POOLS for thread 0xad0892c0\nobjc[14481]: 6 releases pending.\n\
    objc[14481]: [0x6a85000]  ................  PAGE  (hot) (cold)\nobjc[14481]: [0x6a85028]\
    \  ################  POOL 0x6a85028\nobjc[14481]: [0x6a8502c]         0x6719e40\
    \  NSObject\nobjc[14481]: [0x6a85030]         0x6719e40  NSObject\nobjc[14481]:\
    \ [0x6a85034]         0x6719e40  NSObject\nobjc[14481]: [0x6a85038]         0x6719e40\
    \  NSObject\nobjc[14481]: [0x6a8503c]         0x6719e40  NSObject\nobjc[14481]:\
    \ ##############\n```\n\n你可以通过将对象赋值给使用 `__strong` 修饰的变量来避免这种情况。\n\n```\n{\n  \
    \  id __weak o = obj;\n    id tmp = o;\n    NSLog(@\"1 %@\", tmp);\n    NSLog(@\"\
    2 %@\", tmp);\n    NSLog(@\"3 %@\", tmp);\n    NSLog(@\"4 %@\", tmp);\n    NSLog(@\"\
    5 %@\", tmp);\n}\n```\n\n在这种情况下，对象仅在 `tmp = o;` 这一行被添加到自动释放池一次。\n\n```\nobjc[14481]:\
    \ ##############\nobjc[14481]: AUTORELEASE POOLS for thread 0xad0892c0\nobjc[14481]:\
    \ 2 releases pending.\nobjc[14481]: [0x6a85000]  ................  PAGE  (hot)\
    \ (cold)\nobjc[14481]: [0x6a85028]  ################  POOL 0x6a85028\nobjc[14481]:\
    \ [0x6a8502c]         0x6719e40  NSObject\nobjc[14481]: ##############\n```\n\n\
    如前所述，`__weak` 修饰符不能用于 iOS4 或 OS X Snow Leopard。此外，在其他一些情况下，由于某些类不支持 `__weak` 修饰的变量，因此无法使用\
    \ `__weak` 所有权修饰符。\n\n例如，`NSMachPort` 类的对象不能赋值给任何使用 `__weak` 修饰的变量。这些类重写了 `retain`/`release`\
    \ 方法，并在其原始实现中拥有自己的引用计数。当一个对象被赋值给 `__weak` 修饰的变量时，编译器必须正确插入 `objc4` 函数，因此许多此类类无法支持\
    \ `__weak` 修饰。这些不支持的类在类声明中带有一个属性 `__attribute__((objc_arc_weak_reference_unavailable))`，该属性被定义为\
    \ `NS_AUTOMATED_REFCOUNT_WEAK_UNAVAILABLE`。即使你将此类对象赋值给一个使用 `__weak` 修饰的变量，编译器也会正确地生成错误。这些类非常罕见，所以你无需过分担心。\n\
    \n**ALLOWSWEAKREFERENCE 和 RETAINWEAKREFERENCE 方法**\n"
- fmt: "There is the other case where you can’t use the `__weak` ownership qualifier.\
    \ When an `NSObject` instance method `allowsWeakReference` or `retainWeakReference`\
    \ returns `NO`, the object can’t be assigned to a variable qualified with `__weak`.\
    \ These methods are not documented in the `NSObject` protocol. The declaration\
    \ is as follows.\n\n```\n- (BOOL)allowsWeakReference;\n- (BOOL)retainWeakReference;\n\
    ```\n\nWhen an object is assigned to a variable qualified with `__weak`, `allowsWeakReference`\
    \ is called. If it returns `NO`, your application will be aborted:\n\n`cannot\
    \ form weak reference to instance (0x753e180) of class MyObject`\n\nThis means\
    \ you should not assign an object of such a class to a variable qualified with\
    \ `__weak`. You should be able to know if the class has such a restriction in\
    \ the class reference.\n\nWhen `retainWeakReference` method returns `NO`, the\
    \ user gets value `nil`. Let’s see it with an example.\n\n```\n{\n    id __strong\
    \ obj = [[NSObject alloc] init];\n    id __weak o = obj;\n    NSLog(@\"1 %@\"\
    , o);\n    NSLog(@\"2 %@\", o);\n    NSLog(@\"3 %@\", o);\n    NSLog(@\"4 %@\"\
    , o);\n    NSLog(@\"5 %@\", o);\n}\n```\n\nThe object exists until the scope of\
    \ the variable `obj` is left. Therefore the variable `o` is usable during that\
    \ time. The result is as follows.\n\n```\n1 <NSObject: 0x753e180>\n2 <NSObject:\
    \ 0x753e180>\n3 <NSObject: 0x753e180>\n4 <NSObject: 0x753e180>\n5 <NSObject: 0x753e180>\n\
    ```\n\nLet’s see what happens if `retainWeakReference` returns `NO`. The next\
    \ source code illustrates how `retainWeakReference` can be implemented.\n\n```\n\
    @interface MyObject : NSObject\n{\n    NSUInteger count;\n}\n@end\n\n@implementation\
    \ MyObject\n- (id)init\n{\n    self = [super init];\n    return self;\n}\n- (BOOL)retainWeakReference\n\
    {\n    if (++count > 3)\n        return NO;\n    return [super retainWeakReference];\n\
    }\n@end\n```\n\nIn this example, `retainWeakReference` method returns `NO` when\
    \ it is called more than three times. And the above example is modified from `NSObject`\
    \ to `MyObject`.\n\n```\n{\n    id __strong obj = [[MyObject alloc] init];\n \
    \   id __weak o = obj;\n    NSLog(@\"1 %@\", o);\n    NSLog(@\"2 %@\", o);\n \
    \   NSLog(@\"3 %@\", o);\n    NSLog(@\"4 %@\", o);\n    NSLog(@\"5 %@\", o);\n\
    }\n```\n\nThe result is as follows.\n\n```\n1 <MyObject: 0x753e180>\n2 <MyObject:\
    \ 0x753e180>\n3 <MyObject: 0x753e180>\n4 (null)\n5 (null)\n```\n\nWhen `retainWeakReference`\
    \ method returns `NO`, the object can’t be accessed. If some classes in Framework\
    \ use this mechanism, the class reference should have a comment about that. Also,\
    \ `allowsWeakReference` and `retainWeakReference` methods are called by the runtime\
    \ library in the middle of `__weak` qualification-related procedures. So, if some\
    \ runtime library APIs are called inside these methods, your application might\
    \ hang. These methods are undocumented and an application developer shouldn’t\
    \ implement them. But if you need to implement them for any reason, you need to\
    \ have a good understanding of how they work.\n\n## `__autoreleasing` ownership\
    \ qualifier\n\nAssigning an object to any variables qualified with `__autoreleasing`\
    \ is equivalent to calling the `autorelease` method in a non-ARC environment.\
    \ Let’s see how it works with source code.\n\n```\n@autoreleasepool {\n    id\
    \ __autoreleasing obj = [[NSObject alloc] init];\n}\n```\n\nIt adds an object\
    \ of `NSObject` class to the autorelease pool. Let’s see how the compiler translates\
    \ it.\n\n```\n/* pseudo code by the compiler */\nid pool = objc_autoreleasePoolPush();\n\
    id obj = objc_msgSend(NSObject, @selector(alloc));\nobjc_msgSend(obj, @selector(init));\n\
    objc_autorelease(obj);\nobjc_autoreleasePoolPop(pool);\n```\n\nIt just works as\
    \ I explained with Apple’s implementation. (See [Chapter 1](#Chapter01.html#ch1),\
    \ Section \"Apple’s Implementation of autorelease.\") The `autorelease` mechanism\
    \ itself works exactly same as in a non-ARC environment although the source codes\
    \ are different.\n\nWhat happens if the object is not obtained by the `alloc`/`new`/`copy`/`mutableCopy`\
    \ method group? Let’s see the next example with `NSMutableArray` class method\
    \ `array`.\n\n```\n@autoreleasepool {\n    id __autoreleasing obj = [NSMutableArray\
    \ array];\n}\n```\n\nLet’s check what is different from the previous example.\n\
    \n```\n/* pseudo code by the compiler */\nid pool = objc_autoreleasePoolPush();\n\
    id obj = objc_msgSend(NSMutableArray, @selector(array));\nobjc_retainAutoreleasedReturnValue(obj);\n\
    objc_autorelease(obj);\nobjc_autoreleasePoolPop(pool);\n```\n\nAlthough, `objc_retainAutoreleasedReturnValue`\
    \ is used, other autorelease pool-related codes are exactly the same as the previous\
    \ example.\n\n## `__unsafe_unretained` ownership qualifier\n\nThe last ownership\
    \ qualifier is `__unsafe_unretained`. As I explained in the Section \"Immediate\
    \ Disposal of Objects,\" assignment to a variable that is qualified with `__unsafe_unretained`\
    \ never appears in pseudo code. Unlike the other ownership qualifiers, the compiler\
    \ does nothing special for the qualifier. It just works as an assignment in C\
    \ language.\n\nNow we learned the implementations of each ownership qualifier.\
    \ You should now have a better understanding of ARC. In the last chapters, the\
    \ number of reference counts is not discussed much. In the next section, I explain\
    \ it at last."
  raw: 'There is the other case where you can’t use the __weak ownership qualifier.
    When an NSObject instance method allowsWeakReference or retainWeakReference returns
    NO, the object can’t be assigned to a variable qualified with __weak. These methods
    are not documented in the NSObject protocol. The declaration is as follows.


    `- (BOOL)allowsWeakReference;`

    `- (BOOL)retainWeakReference;`


    When an object is assigned to a variable qualified with __weak, allowsWeakReference
    is called. If it returns NO, your application will be aborted:


    `cannot form weak reference to instance (0x753e180) of class MyObject`


    This means you should not assign an object of such a class to a variable qualified
    with __weak. You should be able to know if the class has such a restriction in
    the class reference.


    When retainWeakReference method returns NO, the user gets value nil. Let’s see
    it with an example.


    `{`

    `    id __strong obj = [[NSObjectalloc] init];`

    `    id __weak o = obj;`

    `    NSLog(@"1 %@", o);`

    `    NSLog(@"2 %@", o);`

    `    NSLog(@"3 %@", o);`

    `    NSLog(@"4 %@", o);`

    `    NSLog(@"5 %@", o);`

    `}`


    The object exists until the scope of the variable obj is left. Therefore the variable
    o is usable during that time. The result is as follows.


    `1 <NSObject: 0x753e180>`

    `2 <NSObject: 0x753e180>`

    `3 <NSObject: 0x753e180>`

    `4 <NSObject: 0x753e180>`

    `5 <NSObject: 0x753e180>`


    Let’s see what happens if retainWeakReference returns NO. The next source code
    illustrates how retainWeakReference can be implemented.


    `@interfaceMyObject : NSObject`

    `{`

    `    NSUInteger count;`

    `}`

    `@end`


    `@implementationMyObject`

    `- (id)init`

    `{`

    `    self = [super init];`

    `    return self;`

    `}`

    `- (BOOL)retainWeakReference`

    `{`

    `    if (++count > 3)`

    `        return NO;`

    `    return [super retainWeakReference];`

    `}`

    `@end`


    In this example, retainWeakReference method returns NO when it is called more
    than three times. And the above example is modified from NSObject to MyObject.


    `{`

    `    id __strong obj = [[MyObjectalloc] init];`

    `    id __weak o = obj;`

    `    NSLog(@"1 %@", o);`

    `    NSLog(@"2 %@", o);`

    `    NSLog(@"3 %@", o);`

    `    NSLog(@"4 %@", o);`

    `    NSLog(@"5 %@", o);`

    `}`


    The result is as follows.


    `1 <MyObject: 0x753e180>`

    `2 <MyObject: 0x753e180>`

    `3 <MyObject: 0x753e180>`

    `4 (null)`

    `5 (null)`


    When retainWeakReference method returns NO, the object can’t be accessed. If some
    classes in Framework use this mechanism, the class reference should have a comment
    about that. Also, allowsWeakReference and retainWeakReference methods are called
    by the runtime library in the middle of __weak qualification-related procedures.
    So, if some runtime library APIs are called inside these methods, your application
    might hang. These methods are undocumented and an application developer shouldn’t
    implement them. But if you need to implement them for any reason, you need to
    have a good understanding of how they work.


    ### __autoreleasing ownership qualifier


    Assigning an object to any variables qualified with __autoreleasing is equivalent
    to calling the autorelease method in a non-ARC environment. Let’s see how it works
    with source code.


    `@autoreleasepool {`

    `    id __autoreleasing obj = [[NSObject alloc] init];`

    `}`


    It adds an object of NSObject class to the autorelease pool. Let’s see how the
    compiler translates it.


    `/* pseudo code by the compiler */`

    `id pool = objc_autoreleasePoolPush();`

    `id obj = objc_msgSend(NSObject, @selector(alloc));`

    `objc_msgSend(obj, @selector(init));`

    `objc_autorelease(obj);`

    `objc_autoreleasePoolPop(pool);`


    It just works as I explained with Apple’s implementation. (See [Chapter 1](#Chapter01.html#ch1),
    Section “Apple’s Implementation of autorelease.”) The autorelease mechanism itself
    works exactly same as in a non-ARC environment although the source codes are different.


    What happens if the object is not obtained by the alloc/new/copy/mutableCopy method
    group? Let’s see the next example with NSMutableArray class method “array”.


    `@autoreleasepool {`

    `    id __autoreleasing obj = [NSMutableArray array];`

    `}`


    Let’s check what is different from the previous example.


    `/* pseudo code by the compiler */`

    `id pool = objc_autoreleasePoolPush();`

    `id obj = objc_msgSend(NSMutableArray, @selector(array));`

    `objc_retainAutoreleasedReturnValue(obj);`

    `objc_autorelease(obj);`

    `objc_autoreleasePoolPop(pool);`


    Although, objc_retainAutoreleasedReturnValue is used, other autorelease pool-related
    codes are exactly the same as the previous example.


    ### __unsafe_unretained ownership qualifier


    The last ownership qualifier is __unsafe_unretained. As I explained in the Section
    “Immediate Disposal of Objects,” assignment to a variable that is qualified with
    __unsafe_unretained never appears in pseudo code. Unlike the other ownership qualifiers,
    the compiler does nothing special for the qualifier. It just works as an assignment
    in C language.


    Now we learned the implementations of each ownership qualifier. You should now
    have a better understanding of ARC. In the last chapters, the number of reference
    counts is not discussed much. In the next section, I explain it at last.'
  trans: "\n还有一种情况无法使用 `__weak` 所有权修饰符。当 `NSObject` 实例方法 `allowsWeakReference` 或 `retainWeakReference`\
    \ 返回 `NO` 时，该对象不能被赋值给用 `__weak` 修饰的变量。这些方法在 `NSObject` 协议中没有文档说明，其声明如下：\n\n```\n\
    - (BOOL)allowsWeakReference;\n- (BOOL)retainWeakReference;\n```\n\n当对象被赋值给用 `__weak`\
    \ 修饰的变量时，会调用 `allowsWeakReference` 方法。如果该方法返回 `NO`，你的应用程序将会终止：\n\n`cannot form\
    \ weak reference to instance (0x753e180) of class MyObject`\n\n这意味着你不应该将此类实例赋值给用\
    \ `__weak` 修饰的变量。你应该能在类的参考文档中了解到该类是否有此限制。\n\n当 `retainWeakReference` 方法返回 `NO`\
    \ 时，用户获取到的值为 `nil`。让我们通过一个例子来看一下。\n\n```\n{\n    id __strong obj = [[NSObject\
    \ alloc] init];\n    id __weak o = obj;\n    NSLog(@\"1 %@\", o);\n    NSLog(@\"\
    2 %@\", o);\n    NSLog(@\"3 %@\", o);\n    NSLog(@\"4 %@\", o);\n    NSLog(@\"\
    5 %@\", o);\n}\n```\n\n对象在变量 `obj` 的作用域结束之前一直存在。因此，在此期间变量 `o` 是可用的。结果如下：\n\n```\n\
    1 <NSObject: 0x753e180>\n2 <NSObject: 0x753e180>\n3 <NSObject: 0x753e180>\n4 <NSObject:\
    \ 0x753e180>\n5 <NSObject: 0x753e180>\n```\n\n让我们看看如果 `retainWeakReference` 返回\
    \ `NO` 会发生什么。下面的源代码展示了如何实现 `retainWeakReference`。\n\n```\n@interface MyObject\
    \ : NSObject\n{\n    NSUInteger count;\n}\n@end\n\n@implementation MyObject\n\
    - (id)init\n{\n    self = [super init];\n    return self;\n}\n- (BOOL)retainWeakReference\n\
    {\n    if (++count > 3)\n        return NO;\n    return [super retainWeakReference];\n\
    }\n@end\n```\n\n在这个例子中，`retainWeakReference` 方法在被调用超过三次后返回 `NO`。然后将上面的例子从 `NSObject`\
    \ 修改为 `MyObject`。\n\n```\n{\n    id __strong obj = [[MyObject alloc] init];\n\
    \    id __weak o = obj;\n    NSLog(@\"1 %@\", o);\n    NSLog(@\"2 %@\", o);\n\
    \    NSLog(@\"3 %@\", o);\n    NSLog(@\"4 %@\", o);\n    NSLog(@\"5 %@\", o);\n\
    }\n```\n\n结果如下：\n\n```\n1 <MyObject: 0x753e180>\n2 <MyObject: 0x753e180>\n3 <MyObject:\
    \ 0x753e180>\n4 (null)\n5 (null)\n```\n\n当 `retainWeakReference` 方法返回 `NO` 时，对象将无法被访问。如果框架中的某些类使用了这种机制，其类参考文档应该对此有所说明。此外，`allowsWeakReference`\
    \ 和 `retainWeakReference` 方法是由运行时库在与 `__weak` 修饰符相关的流程中调用的。因此，如果在这些方法内部调用了某些运行时库的\
    \ API，你的应用程序可能会挂起。这些方法没有文档说明，应用程序开发者也不应该实现它们。但如果你出于某种原因需要实现它们，你则需要充分理解它们的工作原理。\n\
    \n## `__autoreleasing` 所有权修饰符\n\n将对象赋值给任何用 `__autoreleasing` 修饰的变量，等同于在非 ARC 环境中调用\
    \ `autorelease` 方法。让我们通过源代码来看它是如何工作的。\n\n```\n@autoreleasepool {\n    id __autoreleasing\
    \ obj = [[NSObject alloc] init];\n}\n```\n\n它将一个 `NSObject` 类的实例添加到自动释放池中。让我们看看编译器是如何翻译它的。\n\
    \n```\n/* 编译器的伪代码 */\nid pool = objc_autoreleasePoolPush();\nid obj = objc_msgSend(NSObject,\
    \ @selector(alloc));\nobjc_msgSend(obj, @selector(init));\nobjc_autorelease(obj);\n\
    objc_autoreleasePoolPop(pool);\n```\n\n它的工作方式正如我之前根据 Apple 的实现所解释的那样。（参见第 1 章，“Apple\
    \ 对 autorelease 的实现”部分。）`autorelease` 机制本身的工作方式与非 ARC 环境完全相同，尽管源代码有所不同。\n\n如果对象不是通过\
    \ `alloc`/`new`/`copy`/`mutableCopy` 方法组获取的，会发生什么？让我们看看下一个使用 `NSMutableArray`\
    \ 类方法 `array` 的例子。\n\n```\n@autoreleasepool {\n    id __autoreleasing obj = [NSMutableArray\
    \ array];\n}\n```\n\n让我们检查一下它与前面的例子有何不同。\n\n```\n/* 编译器的伪代码 */\nid pool = objc_autoreleasePoolPush();\n\
    id obj = objc_msgSend(NSMutableArray, @selector(array));\nobjc_retainAutoreleasedReturnValue(obj);\n\
    objc_autorelease(obj);\nobjc_autoreleasePoolPop(pool);\n```\n\n尽管使用了 `objc_retainAutoreleasedReturnValue`，但其他与自动释放池相关的代码与前面的例子完全相同。\n\
    \n## `__unsafe_unretained` 所有权修饰符\n\n最后一个所有权修饰符是 `__unsafe_unretained`。正如我在“对象的立即销毁”部分中所解释的，对用\
    \ `__unsafe_unretained` 修饰的变量进行赋值，在伪代码中从不出现。与其他所有权修饰符不同，编译器对此修饰符不做任何特殊处理。它就像 C\
    \ 语言中的赋值一样工作。\n\n现在我们已经了解了每个所有权修饰符的实现。你现在应该对 ARC 有了更好的理解。在最后的章节中，对引用计数的数量讨论得并不多。在下一节中，我终于会对此进行解释。\n"
- fmt: "### Reference Count\n\nIn this book, the number of reference counts itself\
    \ is intentionally not explained much because to have the correct perspective\
    \ on reference counting, you should not care for the number itself. If you still\
    \ want to know the actual number, you can find it with:\n\n`uintptr_t _objc_rootRetainCount(id\
    \ obj)`\n\nBy calling the `_objc_rootRetainCount` function, you can get the reference\
    \ count number. Let’s see an example.\n\n```\n{\n    id __strong obj = [[NSObject\
    \ alloc] init];\n    NSLog(@\"retain count = %d\", _objc_rootRetainCount(obj));\n\
    }\n```\n\nIn the source code, the variable `obj` only has a strong reference.\
    \ So, it displays:\n\n`retain count = 1`\n\nLet’s check it with the `__weak` ownership\
    \ qualifier as well.\n\n```\n{\n    id __strong obj = [[NSObject alloc] init];\n\
    \    id __weak o = obj;\n    NSLog(@\"retain count = %d\", _objc_rootRetainCount(obj));\n\
    }\n```\n\nA variable qualified with `__weak` does not have ownership, so the value\
    \ should not be changed.\n\n`retain count = 1`\n\nYes, it is just as we expected.\
    \ How about this with `__autoreleasing`?\n\n```\n@autoreleasepool {\n    id __strong\
    \ obj = [[NSObject alloc] init];\n    id __autoreleasing o = obj;\n    NSLog(@\"\
    retain count = %d\", _objc_rootRetainCount(obj));\n}\n```\n\nThe result is:\n\n\
    `retain count = 2`\n\nIt is two due to a strong reference and having been added\
    \ to an autorelease pool. Let’s see the value after leaving `@autoreleasepool`\
    \ block.\n\n```\n{\n    id __strong obj = [[NSObject alloc] init];\n    @autoreleasepool\
    \ {\n        id __autoreleasing o = obj;\n        NSLog(@\"retain count = %d in\
    \ @autoreleasepool\", _objc_rootRetainCount(obj));\n    }\n    NSLog(@\"retain\
    \ count = %d\", _objc_rootRetainCount(obj));\n}\n```\n\nHere is the result.\n\n\
    `retain count = 2 in @autoreleasepool`\n`retain count = 1`\n\nThe object is released\
    \ as expected.\n\nAlso, let’s confirm that an object will be added to an autorelease\
    \ pool, when the object is used through a variable qualified with `__weak`. We\
    \ can see the status of autorelease pool by `objc_autoreleasePoolPrint` function.\n\
    \n```\n@autoreleasepool {\n    id __strong obj = [[NSObject alloc] init];\n  \
    \  _objc_autoreleasePoolPrint();\n    id __weak o = obj;\n    NSLog(@\"before\
    \ using __weak: retain count = %d\", _objc_rootRetainCount(obj));\n    NSLog(@\"\
    class = %@\", [o class]);\n    NSLog(@\"after using __weak: retain count = %d\"\
    , _objc_rootRetainCount(obj));\n    _objc_autoreleasePoolPrint();\n}\n```\n\n\
    The result is:\n\n```\nobjc[14481]: ##############\nobjc[14481]: AUTORELEASE POOLS\
    \ for thread 0xad0892c0\nobjc[14481]: 1 releases pending.\nobjc[14481]: [0x6a85000]\
    \  ................  APAGE  (hot) (cold)\nobjc[14481]: [0x6a85028]  ################\
    \  POOL 0x6a85028\nobjc[14481]: ##############\nbefore using __weak: retain count\
    \ = 1\nclass = NSObject\nafter using __weak: retain count = 2\nobjc[14481]: ##############\n\
    objc[14481]: AUTORELEASE POOLS for thread 0xad0892c0\nobjc[14481]: 2 releases\
    \ pending.\nobjc[14481]: [0x6a85000]  ................  PAGE  (hot) (cold)\nobjc[14481]:\
    \ [0x6a85028]  ################  POOL 0x6a85028\nobjc[14481]: [0x6a8502c]    \
    \     0x6719e40  NSObject\nobjc[14481]: ##############\n```\n\nThe above result\
    \ shows that the object is added to an autorelease pool, when the object is used\
    \ via a `__weak` qualified variable, even without using `__autoreleasing`.\n\n\
    As a side note, `_objc_rootRetainCount` function does not actually return a reliable\
    \ number every time. In some cases, it might return 1 even for a discarded object\
    \ or invalid address. Also, if the object is used in multiple threads, the number\
    \ might not be accurate because of a race condition problem.^([2](#Chapter03.html#CHP-3-FN-2))\
    \ Although the `_objc_rootRetainCount` function is helpful for debugging, be careful\
    \ when using it.\n\n### Summary\n\nIn [Chapter 1](#Chapter01.html#ch1), we learned\
    \ reference counting memory management. In [Chapter 2](#Chapter02.html#ch2), we\
    \ learned what is changed when ARC is enabled and what rules you must follow.\
    \ And, in this chapter, we learned how ARC is implemented by seeing the pseudo\
    \ codes.\n\nNow you have learned about ARC. Please take advantage of it effectively\
    \ in your development on OSX and iOS.\n\n__________\n\n² Wikipedia, “Race condition,”\
    \ [http://en.wikipedia.org/wiki/Race_condition](http://en.wikipedia.org/wiki/Race_condition)\n\
    \n## Chapter 4\n\n## Getting Started with Blocks\n\nBlocks are C language extensions\
    \ introduced for OSX Snow Leopard, iOS4, or later. This chapter shows what Blocks\
    \ are in detail so that their implementation (covered in the next chapter) will\
    \ hold more meaning. Checking the implementation leads to an understanding of\
    \ how to use them and how they work. To put Blocks in perspective, consider the\
    \ following scenario.\n\nWhen you read iOS or OSX application source code, you\
    \ might find some strange sentences in it. Such sentences have function declarations\
