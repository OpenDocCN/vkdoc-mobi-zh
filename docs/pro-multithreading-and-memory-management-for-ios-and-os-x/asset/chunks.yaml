    \ The first argument for the `dispatch_queue_create` function is the name of a\
    \ serial dispatch queue. As in the source code, reverse-order FQDN is recommended\
    \ for it. It is displayed as the name of the dispatch queue when you are debugging\
    \ with Xcode or Instruments. The CrashLog that is generated when the application\
