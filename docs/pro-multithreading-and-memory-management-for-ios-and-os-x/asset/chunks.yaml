- fmt: "因为 Block 字面量使用了 `obj_`，所以 `self` 被捕获。实际上，对于编译器而言，`obj_` 只是对象对应结构体中的一个成员变量，如下所示。\n\
    \n```\nblk_ = ^{NSLog(@\"obj_ = %@\", self->obj_);};\n```\n\n你可以像上一个示例那样，使用 `__weak`\
    \ 所有权修饰符来避免循环引用。出于同样的原因，在此示例中，你也可以安全地使用 `__unsafe_unretained` 所有权修饰符。\n\n```\n\
    - (id)init\n{\n    self = [super init];\n    id __weak obj = obj_;\n    blk_ =\
    \ ^{NSLog(@\"obj_ = %@\", obj);};\n    return self;\n}\n```\n\n当你使用 `__weak` 所有权修饰符来避免循环引用时，即使可以通过检查变量是否为\
    \ `nil` 来知晓对象是否存在，但在你使用该变量的整个过程中，对象应该一直存在。\n\n此外，还有另一种避免循环引用的方法。你可以通过使用 `__block`\
    \ 变量来实现，如下所示。\n\n```\ntypedef void (^blk_t)(void);\n\n@interface MyObject : NSObject\n\
    {\n    blk_t blk_;\n}\n@end\n\n@implementation MyObject\n\n- (id)init\n{\n   \
    \     self = [super init];\n    __block id tmp = self;\n    blk_ = ^{\n      \
    \  NSLog(@\"self = %@\", tmp);\n        tmp = nil;\n    };\n    return self;\n\
    }\n\n- (void)execBlock\n{\n    blk_();\n}\n\n- (void)dealloc\n{\nNSLog(@\"dealloc\"\
    );\n}\n@end\n\nint main()\n{\n    id o = [[MyObject alloc] init];\n    [o execBlock];\n\
    \    return 0;\n}\n```\n\n这段源码不会引起循环引用。然而，如果不调用实例方法 `execBlock`，换句话说，如果赋值给成员变量\
    \ `blk_` 的 Block 没有被执行，就会产生循环引用，如图 [Figure 5–12](#Chapter05.html#fig_5_12) 所示。\n\
    \n在 `MyObject` 类的对象被创建后，循环引用便存在了，因为：\n\n*   `MyObject` 类的对象拥有 Block 的所有权。\n* \
    \  Block 拥有 `__block` 变量的所有权。\n*   `__block` 变量拥有 `MyObject` 类对象的所有权。\n\n![images](images/9781430241164_Fig05-12.jpg)\n\
    \n**Figure 5–12.** *循环引用*\n\n如果实例方法 `execBlock` 没有被调用，循环引用会导致内存泄漏。通过调用实例方法 `execBlock`，Block\
    \ 会被执行，并且 `nil` 会被赋值给 `__block` 变量 `tmp`。\n\n```\nblk_ = ^{\n    NSLog(@\"self\
    \ = %@\", tmp);\n    tmp = nil;\n};\n```\n\n此后，`__block` 变量 `tmp` 不再强引用 `MyObject`\
    \ 类对象。因此，循环引用消失了，如图 [Figure 5–13](#Chapter05.html#fig_5_13) 所示。其关系如下：\n\n*   `MyObject`\
    \ 类的对象拥有 Block 的所有权。\n*   Block 拥有 `__block` 变量的所有权。\n\n![images](images/9781430241164_Fig05-13.jpg)\n\
    \n**Figure 5–13.** *避免循环引用*\n\n比较两种方法：一种是使用 `__block` 变量，另一种是使用 `__weak` 或 `__unsafe_unretained`\
    \ 所有权修饰符。\n\n使用 `__block` 变量的优势在于：\n\n*   你可以通过控制 `__block` 变量来控制对象的生命周期。\n* \
    \  即使在不支持 `__weak` 所有权修饰符的环境中，也无需使用 `__unsafe_unretained` 所有权修饰符，并且不必担心野指针的问题。\n\
    \n这意味着，在 Block 执行期间，你可以动态地将 `nil` 或其他对象赋值给 `__block` 变量。\n\n相比之下，使用 `__block`\
    \ 变量的劣势在于：\n\n*   你必须执行 Block 才能避免循环引用。\n\n在 Block 字面量被执行后，如果应用程序没有执行该 Block，则无法避免循环引用。如果因为\
    \ Block 导致了循环引用，你需要根据 Block 的使用方式，来决定是使用 `__block` 变量，还是使用 `__weak` 或 `__unsafe_unretained`\
    \ 所有权修饰符来解决。\n\n### Copy/Release\n\n当 ARC 被禁用时，要手动将 Block 从栈复制到堆。并且，由于 ARC 被禁用，你也必须手动释放该\
    \ Block。你可以使用实例方法 `copy` 和 `release`，如下所示。\n\n```\nvoid (^blk_on_heap)(void) =\
    \ [blk_on_stack copy];\n\n[blk_on_heap release];\n```\n\n此外，你可以使用实例方法 `retain`\
    \ 获取一个已经复制到堆上的 Block 的所有权。\n\n```\n[blk_on_heap retain];\n```\n\n不幸的是，当你对栈上的 Block\
    \ 调用 `retain` 时，什么都不会发生。\n\n```\n[blk_on_stack retain];\n```\n\n在这段源码中，对赋值给 `blk_on_stack`\
    \ 的栈上 Block 调用了实例方法 `retain`，但实际上什么也没发生。因此，要获取 Block 的所有权，我建议你始终调用实例方法 `copy`。\n\
    \n另外，由于 Block 是 C 语言的扩展，你可以在 C 语言中使用 Block 语法。在这种情况下，你可以使用 `Block_copy` 和 `Block_release`\
    \ 函数，而不是 Objective-C 中的 `copy` 和 `release` 方法。引用计数的概念以及使用方法与 `copy` 和 `release`\
    \ 方法完全相同。\n\n```\nvoid (^blk_on_heap)(void) = Block_copy(blk_on_stack);\n\nBlock_release(blk_on_heap);\n\
    ```\n\n`Block_copy` 函数的工作方式与我们之前学到的 `_Block_copy` 类似。这个函数是为 C 语言提供的，实际上，Objective-C\
    \ 运行时库也使用它。同样地，当堆上的 Block 被释放时，Objective-C 运行时库会调用 `Block_release` 函数。\n\n顺便提一下，在没有\
    \ ARC 的情况下，`__block` 说明符可用于避免 Block 引起的循环引用。因为，根据其规范，当 Block 从栈复制到堆，并且使用了 `id`\
    \ 或对象类型的自动变量时，如果该变量没有 `__block` 说明符，该对象会被 retain；相反，如果有 `__block` 说明符，该对象不会被 retain。例如，无论\
    \ ARC 是否启用，以下源码都会引起循环引用，因为 Block 拥有 `self` 的所有权，而 `self` 又拥有 Block 的所有权。\n\n```\n\
    typedef void (^blk_t)(void);\n\n@interface MyObject : NSObject\n{\n    blk_t blk_;\n\
    }\n@end\n\n@implementation MyObject\n- (id)init\n{\n    self = [super init];\n\
    \    blk_ = ^{NSLog(@\"self = %@\", self);};\n    return self;\n}\n\n- (void)dealloc\n\
    {\n    NSLog(@\"dealloc\");\n}\n@end\n\nint main()\n{\n    id o = [[MyObject alloc]\
    \ init];\n    NSLog(@\"%@\", o);\n    return 0;\n}\n```\n\n对于 ARC 被禁用的环境，你可以使用\
    \ `__block` 变量来解决这个问题。\n\n```\n- (id)init {\n    self = [super init];\n    __block\
    \ id tmp = self;\n    blk_ = ^{NSLog(@\"self = %@\", tmp);};\n    return self;\n\
    }\n```\n\n它的工作方式类似于 ARC 启用环境下的 `__unsafe_unretained` 所有权修饰符。`__block` 说明符的用途在\
    \ ARC 启用和禁用时大相径庭。因此，你必须注意源码是用于 ARC 启用环境还是禁用环境。\n\n### 总结\n\n在本章中，我们深入讨论了 Block，了解了\
    \ Block 是如何通过 Clang 编译的。特别是，我们学习了：\n\n*   自动变量是如何被捕获的\n*   `__block` 变量是如何实现的\n\
    *   由于捕获对象导致的循环引用问题是如何发生的，以及如何解决它\n\n如果你将 Block 与接下来章节中要讨论的 Grand Central Dispatch\
    \ 结合使用，Block 会非常强大。\n\n## 第 6 章\n\n## Grand Central Dispatch\n\n在最后的三章中，我们将讨论\
    \ Grand Central Dispatch（GCD）。这个新特性是为 OS X Snow Leopard 和 iOS 4 或更高版本引入的，以帮助进行多线程编程。我将结合其实现来解释多线程编程将如何改变。\n\
    \n在本章中，我们首先快速看一个使用 GCD 的示例。然后，我们会回顾在当前多线程编程中 GCD 带来的好处，以及 GCD 出现之前传统的多线程编程是如何进行的。"
  raw: 'Because the Block literal uses “obj_”, self is captured. In fact, for the
    compiler, “obj_” is just a member variable of the struct for the object as follows.


    `blk_ = ^{NSLog(@"obj_ = %@", self->obj_);};`


    You can avoid the circular reference using a __weak ownership qualifier for “obj_”
    as for the previous example. In this example, you can use a __unsafe_unretained
    ownership qualifier safely as well for the same reason.


    `- (id)init`

    `{`

    `    self = [super init];`

    `    id __weak obj = obj_;`

    `    blk_ = ^{NSLog(@"obj_ = %@", obj);};`

    `    return self;`

    `}`


    When you use a __weak ownership qualifier to avoid circular reference, even though
    you can check whether the variable is nil to know that the object exists, the
    object should exist the entire time you use the variable.


    Also, there is another way to avoid a circular reference. You can do that by using
    __block variable as follows.


    `typedef void (^blk_t)(void);`


    `@interface MyObject : NSObject`

    `{`

    `    blk_t blk_;`

    `}`

    `@end`


    `@implementation MyObject`


    `- (id)init`

    `{`

    `        self = [super init];`

    `    __block id tmp = self;`

    `    blk_ = ^{`

    `        NSLog(@"self = %@", tmp);`

    `        tmp = nil;`

    `    };`

    `    return self;`

    `}`


    `- (void)execBlock`

    `{`

    `    blk_();`

    `}`


    `- (void)dealloc`

    `{`

    `NSLog(@"dealloc");`

    `}`

    `@end`


    `int main()`

    `{`

    `    id o = [[MyObject alloc] init];`

    `    [o execBlock];`

    `    return 0;`

    `}`


    This source code doesn’t cause a circular reference. However, if you don’t call
    the instance method “execBlock”, in other words, if the Block assigned to the
    member variable “blk_” isn’t executed, a circular reference will occur as in [Figure
    5–12](#Chapter05.html#fig_5_12).


    After the object of the MyObject class is created, circular reference exists there
    because:


    *   The object of MyObject class has ownership of the Block.

    *   The Block has ownership of the __block variable.

    *   The __block variable has ownership of the MyObject class object.


    ![images](images/9781430241164_Fig05-12.jpg)


    **Figure 5–12.** *Circular reference*


    If the instance method “execBlock” isn’t called, the circular reference causes
    a memory leak. By calling the instance method “execBlock”, the Block is executed
    and nil is assigned to the __block variable “tmp”.


    `blk_ = ^{`

    `    NSLog(@"self = %@", tmp);`

    `    tmp = nil;`

    `};`


    After that the __block variable “tmp” doesn’t have the strong reference to the
    MyObject class object anymore. So, the circular reference disappears as shown
    in [Figure 5–13](#Chapter05.html#fig_5_13). The relationship is:


    *   The object of MyObject class has ownership of the Block.

    *   The Block has ownership of the __block variable.


    ![images](images/9781430241164_Fig05-13.jpg)


    **Figure 5–13.** *Avoiding circular reference*


    Compare the two approaches: one with __block variable and the other with the __weak
    or __unsafe_unretained ownership qualifier.


    The advantages of the approach with __block variable are:


    *   You can control the lifetime of the object by controlling __block variable.

    *   Even for an environment that doesn’t support the __weak ownership qualifier,
    you don’t need to use the __unsafe_unretained ownership qualifier and you don’t
    need to be afraid of a dangling pointer.


    This means that while the Block is executed, you can control assigning nil or
    another object to the __block variable dynamically.


    In contrast, the disadvantage of the approach with a __block variable is that


    *   You have to execute the Block to avoid a circular reference.


    After the Block literal is executed, if the application doesn’t execute the Block,
    circular reference can’t be avoided. If a circular reference occurs because of
    the Block, you have to decide how to solve it with a __block variable or __weak
    or __unsafe_unretained ownership qualifier, depending on how the Block is used.


    ### Copy/Release


    When ARC is disabled, to copy a Block from the stack to the heap, you always have
    to do it manually. And, because ARC is disabled, you have to release the Block
    manually as well. You use an instance method “copy” and “release” as follows.


    `void (^blk_on_heap)(void) = [blk_on_stack copy];`


    `[blk_on_heap release];`


    Also, you can take ownership of a Block, which is already copied to the heap,
    with the instance method “retain”.


    `[blk_on_heap retain];`


    When you call “retain”to a Block on the stack, unfortunately, nothing happens.


    `[blk_on_stack retain];`


    In this source code, the instance method “retain” is called to a Block on the
    stack, which is assigned to the “blk_on_stack” and nothing really happens. So,
    to take ownership of a Block, I recommend that you always call instance method
    “copy”.


    Also, because Block is a C language extension, you can use Block syntax in C.
    In this case, you can use “Block_copy” and “Block_release” functions, instead
    of “copy” and “release” methods in Objective-C. The concept of the reference count
    and how to use it are just same as the copy and release methods.


    `void (^blk_on_heap)(void) = Block_copy(blk_on_stack);`


    `Block_release(blk_on_heap);`


    The “Block_copy” function works just like _Block_copy, which we’ve already learned.
    This function is there for C language and, in fact, the Objective-C runtime library
    uses it. In the same manner, when a Block on the heap is released, the “Block_release”
    function is called from the Objective-C runtime library.


    By the way, without ARC, a __block specifier can be used to avoid a circular reference,
    which a Block causes. Because, as its specification says, when a Block is copied
    from the stack to the heap, and uses an id or object type automatic variable,
    if the variable is without a __block specifier, the object is retained; on the
    contrary, with a __block specifier, the object isn’t retained. For example, regardless
    of whether ARC is enabled or disabled, the following source code causes circular
    reference because a Block has ownership of self, and self has ownership of the
    Block.


    `typedef void (^blk_t)(void);`


    `@interface MyObject : NSObject`

    `{`

    `    blk_t blk_;`

    `}`

    `@end`


    `@implementation MyObject`

    `- (id)init`

    `{`

    `    self = [super init];`

    `    blk_ = ^{NSLog(@"self = %@", self);};`

    `    return self;`

    `}`


    `- (void)dealloc`

    `{`

    `    NSLog(@"dealloc");`

    `}`

    `@end`


    `int main()`

    `{`

    `    id o = [[MyObject alloc] init];`

    `    NSLog(@"%@", o);`

    `    return 0;`

    `}`


    For an ARC-disabled environment, you can use a __block variable to solve the problem.


    `- (id)init {`

    `    self = [super init];`

    `    __block id tmp = self;`

    `    blk_ = ^{NSLog(@"self = %@", tmp);};`

    `    return self;`

    `}`


    It works just like the __unsafe_unretained ownership qualifier in an ARC-enabled
    environment. The purpose of __block specifier is much different depending on ARC
    being enabled or disabled. So, you have to take care that the source code is for
    an ARC-enabled environment or not.


    ### Summary


    In this chapter, we had deep discussions of Blocks, seeing how Blocks are compiled
    using clang. Especially, we learned:


    *   How automatic variables are captured

    *   How __block variables are achieved

    *   How a circular reference problem occurs due to captured objects and how to
    solve it


    Blocks are very powerful if you use them with Grand Central Dispatch which we
    cover in the next chapters.


    ## Chapter 6


    ## Grand Central Dispatch


    In the final three chapters, we discuss Grand Central Dispatch (GCD). This new
    feature is introduced for OS X Snow Leopard and iOS 4 or later to help multithreaded
    programming. I explain it with the implementation to see how multithreaded programming
    would be changed.


    In this chapter, we first take a glance at an example that uses GCD. We then review
    what multithreading is now with the benefit of GCD and how traditional multithreading
    programming was used prior to GCD.'
