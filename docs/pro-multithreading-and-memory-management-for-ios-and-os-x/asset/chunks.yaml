    \ = ^(int count){return count + 1;};\nblk_t *blkptr = &blk;\n(*blkptr)(10);\n\
    ```\n"
- fmt: "### Capturing Automatic Variables\n\nYou’ve learned about Block literals and\
    \ Block-type variables, and should now understand the “anonymous function” part\
    \ of “anonymous functions together with auto (local) variables.”\n\nNext, you\
    \ need to learn what the “together with automatic (local) variables” part means.\
    \ For Blocks, this can be rephrased as “capturing the value of automatic variables.”\
    \ The next example shows how this capture is accomplished.\n\n```\nint main()\n\
    {\n    int dmy = 256;\n    int val = 10;\n    const char *fmt = \"val = %d\\n\"\
    ;\n    void (^blk)(void) = ^{printf(fmt, val);};\n\n    val = 2;\n    fmt = \"\
    These values were changed. val = %d\\n\";\n\n    blk();\n\n    return 0;\n}\n\
    ```\n\nIn this source code, automatic variables `fmt` and `val` are declared and\
    \ then used in the Block literal. Values of the automatic variables will be captured\
    \ where the Block literal is written: the values will be stored when the Block\
    \ literal is executed. Because the values have already been captured, even if\
    \ they are modified after the Block literal is executed, values of the variables\
    \ in the Block are never affected. In this source code, the automatic variables\
    \ `fmt` and `val` are modified after the Block literal. The result is:\n\n```\n\
    val = 10\n```\n\nIt doesn’t display, “These values were changed. val = 2”. It\
    \ displays the result with the values at the time the Block literal is executed.\
    \ When it is executed, the automatic variable `fmt` has a pointer to `\"val =\
    \ %d\\n\"` and the `val` has integer value 10\\. These values are captured at\
    \ that time and then used when the Block is executed.\n\nThat sums up capturing\
    \ automatic variables. There is a specifier you should learn next. It is called\
    \ the `__block` specifier. By using it, you can modify automatic variables without\
    \ capturing them. The specifier is explained in the following section.\n\n####\
    \ `__block` Specifier\n\nWhen automatic variables are captured, the values are\
    \ read-only in the Block. The variables can’t be modified. Next the source code\
    \ tries to assign 1 to the automatic variable `val`.\n\n```\nint val = 0;\nvoid\
    \ (^blk)(void) = ^{val = 1;};\nblk();\nprintf(\"val = %d\\n\", val);\n```\n\n\
    In the source code, a value is assigned to the automatic variable, which is declared\
    \ outside the Block literal. This causes a compile error as follows.\n\n```\n\
    error: variable is not assignable (missing __block type specifier)\n         void\
    \ (^blk)(void) = ^{val = 1;};\n                           ~~~ ^\n```\n\nWhen an\
    \ automatic variable is declared outside a Block literal, you can use `__block`\
    \ specifier to assign a value to the variable inside the Block. The following\
    \ source code uses `__block` specifier for the automatic variable `val` so that\
    \ the variable will be assignable inside the Block.\n\n```\n__block int val =\
    \ 0;    \nvoid (^blk)(void) = ^{val = 1;};\nblk();\nprintf(\"val = %d\\n\", val);\n\
    ```\n\nThe result is:\n\n```\nval = 1\n```\n\nBy declaring the variable with `__block`\
    \ specifier, you can assign values to the variable inside a Block. The `__block`-specified\
    \ automatic variables are called “`__block` variables”.\n\n#### Captured Automatic\
    \ Variables\n\nAs described previously, if you assign values to a captured automatic\
    \ variable, a compilation error occurs.\n\n```\nint val = 0;\nvoid (^blk)(void)\
    \ = ^{val = 1;};\n```\n\nIt causes the following compilation error.\n\n```\nerror:\
    \ variable is not assignable (missing __block type specifier)        \n    void\
    \ (^blk)(void) = ^{val = 1;};\n                      ~~~ ^\n```\n\nWhat happens\
    \ when Objective-C objects are captured and a method is called to modify the object\
    \ itself? Does it cause a compilation error as well?\n\n```\nid array = [[NSMutableArray\
    \ alloc] init];\nvoid (^blk)(void) = ^{\n    id obj = [[NSObject alloc] init];\n\
    \    [array addObject:obj];\n};\n```\n\nNo problem. An error will occur only if\
    \ some value is assigned to the captured variable `array` itself. In this source\
    \ code, the value of the captured variable is an object of the `NSMutableArray`\
    \ class. To rephrase it in C language terms, the value is a pointer to the instance\
    \ of the struct for the `NSMutableArray` class object. If a value is assigned\
    \ to the captured variable `array`, a compilation error will occur.\n\nThe following\
    \ source code assigns a value to the captured automatic variable, so a compilation\
    \ error occurs.\n\n```\nid array = [[NSMutableArray alloc] init];\nvoid (^blk)(void)\
    \ = ^{\n    array = [[NSMutableArray alloc] init];\n};\n```\n\n```\nerror: variable\
    \ is not assignable (missing __block type specifier)\n    array = [[NSMutableArray\
    \ alloc] init];\n  ~~~~ ^\n```\n\nTo do that, `__block` specifier is needed for\
    \ the automatic variable.\n\n```\n__block id array = [[NSMutableArray alloc] init];\n\
    void (^blk)(void) = ^{\n    array = [[NSMutableArray alloc] init];\n};\n```\n\n\
    One more thing. When you use a C array, you have to use a pointer intentionally.\
    \ Here is an example.\n\n```\nconst char text[] = \"hello\";\n\nvoid (^blk)(void)\
    \ = ^{\n     printf(\"%c\\n\", text[2]);\n};\n```\n\nIt uses an array, which has\
    \ a C string literal. Nothing is assigned to the captured automatic variable.\
    \ It looks to be no problem, but it causes a compilation error as follows.\n\n\
    ```\nerror: cannot refer to declaration with an array type inside block\n    \
    \        printf(\"%c\\n\", text[2]);\n\nnote: declared here\n        const char\
    \ text[] = \"hello\";\n       ^\n```\n\nThat is because a C array can’t be captured\
    \ by the current implementation of Blocks. You can avoid it by using a pointer\
    \ as follows.\n\n```\nconst char *text = \"hello\";\nvoid (^blk)(void) = ^{\n\
    \    printf(\"%c\\n\", text[2]);\n};\n```\n\n### Summary\n\nIn this chapter, Blocks\
    \ are explained. You’ve learned that Blocks are “anonymous functions together\
    \ with automatic (local) variables.” The next chapter shows how Blocks are implemented,\
    \ giving you a better understanding of their use.\n\n## Chapter 5: Blocks Implementation\n\
    \nIn the previous chapters, we learned that a Block is an anonymous function together\
    \ with automatic variables. In this chapter, we look at the details of a Block\
    \ with its implementation to see what happens under the hood of Blocks. We start\
    \ with the basic idea of the Block’s implementation and then we show various situations\
    \ to see how the Blocks work, such as how automatic variables are captured, how\
    \ Blocks and `__block` variables are stored in memory, and how objects are captured\
    \ by Blocks. Also, we show some pitfalls of Blocks related to circular reference\
    \ and copy/release methods. All the example source code assumes ARC is enabled\
    \ except where specified.\n\n### Under the Blocks’ Hood\n\nYou might think that\
    \ the Block syntax is something special. But, in reality, the compiler treats\
    \ it as normal C language source code. The compiler, which supports Blocks, converts\
    \ the source code with Blocks to standard C source code; then it just compiles\
    \ as usual.\n\nThis is just a conceptual explanation. In reality, the compiler\
    \ never generates a human-readable source code. But, `clang` (LLVM compiler) has\
    \ a functionality to generate a human-readable converted source code.\n\nIn this\
    \ section, with the converted source code, we show how the Block is implemented.\
    \ The source code is bit complicated, so we delineate it step by step. First we\
    \ take a glance at it, and then we go into detail."
  raw: '### Capturing automatic variables


    You’ve learned about Block literals and Block-type variables, and should now understand
    the “anonymous function” part of “anonymous functions together with auto (local)
    variables.”


    Next, you need to learn what the “together with automatic (local) variables” part
    means. For Blocks, this can be rephrased as “capturing the value of automatic
    variables.” The next example shows how this capture is accomplished.


    `int main()`

    `{`

    `    int dmy = 256;`

    `    int val = 10;`

    `    const char *fmt = "val = %d\n";`

    `    void (^blk)(void) = ^{printf(fmt, val);};`


    `    val = 2;`

    `    fmt = "These values were changed. val = %d\n";`


    `    blk();`


    `    return 0;`

    `}`


    In this source code, automatic variables “fmt” and “val” are declared and then
    used in the Block literal. Values of the automatic variables will be captured
    where the Block literal is written: the values will be stored when the Block literal
    is executed. Because the values have already been captured, even if they are modified
    after the Block literal is executed, values of the variables in the Block are
    never affected. In this source code, the automatic variables “fmt” and “val” are
    modified after the Block literal. The result is:


    `val = 10`


    It doesn’t display, “These values were changed. val = 2”. It displays the result
    with the values at the time the Block literal is executed. When it is executed,
    the automatic variable “fmt” has a pointer to “val = %d\n” and the “val” has integer
    value 10\. These values are captured at that time and then used when the Block
    is executed.


    That sums up capturing automatic variables. There is a specifier you should learn
    next. It is called the __block specifier. By using it, you can modify automatic
    variables without capturing them. The specifier is explained in the following
    section.


    #### __blockspecifier


    When automatic variables are captured, the values are read-only in the Block.
    The variables can’t be modified. Next the source code tries to assign 1 to the
    automatic variable “val”.


    `int val = 0;`

    `void (^blk)(void) = ^{val = 1;};`

    `blk();`

    `printf("val = %d\n", val);`


    In the source code, a value is assigned to the automatic variable, which is declared
    outside the Block literal. This causes a compile error as follows.


    `error: variable is not assignable (missing __block type specifier)`

    `         void (^blk)(void) = ^{val = 1;};`

    `                           ~~~ ^`


    When an automatic variable is declared outside a Block literal, you can use __block
    specifier to assign a value to the variable inside the Block. The following source
    code uses __block specifier for the automatic variable “val” so that the variable
    will be assignable inside the Block.


    `__block int val = 0;    `

    `void (^blk)(void) = ^{val = 1;};`

    `blk();`

    `printf("val = %d\n", val);`


    The result is:


    `val = 1`


    By declaring the variable with __block specifier, you can assign values to the
    variable inside a Block. The __block-specified automatic variables are called
    “__block variables”.


    #### Captured automatic variables


    As described previously, if you assign values to a captured automatic variable,
    a compilation error occurs.


    `int val = 0;`

    `void (^blk)(void) = ^{val = 1;};`


    It causes the following compilation error.


    `error: variable is not assignable (missing __block type specifier)        `

    `    void (^blk)(void) = ^{val = 1;};`

    `                      ~~~ ^`


    What happens when Objective-C objects are captured and a method is called to modify
    the object itself? Does it cause a compilation error as well?


    `id array = [[NSMutableArray alloc] init];`

    `void (^blk)(void) = ^{`

    `    id obj = [[NSObject alloc] init];`

    `    [array addObject:obj];`

    `};`


    No problem. An error will occur only if some value is assigned to the captured
    variable “array” itself. In this source code, the value of the captured variable
    is an object of the NS- MutableArray class. To rephrase it in C language terms,
    the value is a pointer to the instance of the struct for the NSMutableArray class
    object. If a value is assigned to the captured variable “array”, a compilation
    error will occur.


    The following source code assigns a value to the captured automatic variable,
    so a compilation error occurs.


    `id array = [[NSMutableArray alloc] init];`

    `void (^blk)(void) = ^{`

    `    array = [[NSMutableArray alloc] init];`

    `};`


    `error: variable is not assignable (missing __block type specifier)`

    `    array = [[NSMutableArray alloc] init];`

    `  ~~~~ ^`


    To do that, __block specifier is needed for the automatic variable.


    `__block id array = [[NSMutableArray alloc] init];`

    `void (^blk)(void) = ^{`

    `    array = [[NSMutableArray alloc] init];`

    `};`


    One more thing. When you use a C array, you have to use a pointer intentionally.
    Here is an example.


    `const char text[] = "hello";`


    `void (^blk)(void) = ^{`

    `     printf("%c\n", text[2]);`

    `};`


    It uses an array, which has a C string literal. Nothing is assigned to the captured
    automatic variable. It looks to be no problem, but it causes a compilation error
    as follows.


    `error: cannot refer to declaration with an array type inside block`

    `            printf("%c\n", text[2]);`


    `note: declared here`

    `        const char text[] = "hello";`

    `       ^`


    That is because a C array can’t be captured by the current implementation of Blocks.
    You can avoid it by using a pointer as follows.


    `const char *text = "hello";`

    `void (^blk)(void) = ^{`

    `    printf("%c\n", text[2]);`

    `};`


    ### Summary


    In this chapter, Blocks are explained. You’ve learned that Blocks are “anonymous
    functions together with automatic (local) variables.” The next chapter shows how
    Blocks are implemented, giving you a better understanding of their use.


    ## Chapter 5


    ## Blocks Implementation


    In the previous chapters, we learned that a Block is an anonymous function together
    with automatic variables. In this chapter, we look at the details of a Block with
    its implementation to see what happens under the hood of Blocks. We start with
    the basic idea of the Block’s implementation and then we show various situations
    to see how the Blocks work, such as how automatic variables are captured, how
    Blocks and __block variables are stored in memory, and how objects are captured
    by Blocks. Also, we show some pitfalls of Blocks related to circular reference
    and copy/release methods. All the example source code assumes ARC is enabled except
    where specified.


    ### Under the Blocks’ Hood


    You might think that the Block syntax is something special. But, in reality, the
    compiler treats it as normal C language source code. The compiler, which supports
    Blocks, converts the source code with Blocks to standard C source code; then it
    just compiles as usual.


    This is just a conceptual explanation. In reality, the compiler never generates
    a human-readable source code. But, clang (LLVM compiler) has a functionality to
    generate a human-readable converted source code.


    In this section, with the converted source code, we show how the Block is implemented.
    The source code is bit complicated, so we delineate it step by step. First we
    take a glance at it, and then we go into detail.'
