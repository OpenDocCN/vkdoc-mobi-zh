  trans: '

    #### 内核级实现


    从功能上来看，我们可以推测 GCD 使用了以下组件。


    *   一个 C 语言层面的 FIFO 队列，用于管理添加的 Block

    *   通过原子函数实现并发控制的轻量级信号量

    *   一个 C 语言层面的容器，用于管理线程


    如果仅此而已，那么它并不需要内核级的实现。^(1) 换句话说，如果应用程序员能够使用线程编写具有相同功能的应用程序源代码，那么 GCD 似乎就没有必要了。我们为什么需要
    GCD？


    让我们再来看看苹果的说法。


    > *这项技术会将你通常在应用程序中编写的线程管理代码，下放到系统层面去处理。*


    __________


    ¹ 实际上，存在一个移植到通用 Linux 操作系统上的 GCD 实现：Portable libdispatch [`https://www.heily.com/trac/libdispatch`](https://www.heily.com/trac/libdispatch)


    它指出线程管理代码位于“系统层面”，这意味着它是在应用程序员无法触及的范围内完成的。


    事实上，GCD 包含一些被称为 XNU 内核的系统级实现，而 XNU 内核是 iOS 和 OS X 的核心。由应用程序员自行管理线程的应用程序，其性能永远无法与使用基于
    XNU 内核级别实现的 GCD 的应用程序相比。换句话说，GCD 优于使用 `pthreads` 或 `NSThread` 的普通多线程编程。而且，使用 GCD，你无需一遍又一遍地编写重复代码（即所谓的模板代码）。你可以专注于任务本身。这只会带来好处！你应该使用
    GCD，或者底层使用了 GCD 的 Cocoa 框架中的 `NSOperationQueue` 类。


    #### GCD 结构


    表 8–1 列出了用于实现调度队列的软件组件。


    ![images](img/t0801.jpg)


    所有面向应用程序员的 GCD API 都是 `libdispatch` 库中的 C 语言函数。调度队列是一个实现为结构体和链表的 FIFO 队列。这个 FIFO
    队列管理通过 `dispatch_async` 等函数添加的 Block。Block 并非直接添加到 FIFO 队列中。首先，它被添加到一个名为 `dispatch_continuation_t`
    类型的结构体（称为 dispatch continuation）中，然后再被添加到 FIFO 队列。dispatch continuation 是所谓的执行上下文，它存储了与该
    Block 关联的调度组等信息。


    如你所知，可以通过 `dispatch_set_target_queue` 函数为调度队列设置目标队列。一个调度队列在其目标调度队列上执行。这些目标可以串联起来。串联的末端必须是主调度队列、某个全局调度队列，或者为各种优先级的串行调度队列预先准备的全局调度队列。主调度队列是一种在
    `RunLoop` 中执行 Block 的机制。这里并没有太多令人兴奋的技巧。


    #### 全局调度队列与 `pthread_workqueue`


    存在以下几种全局调度队列。


    *   全局调度队列（高优先级）

    *   全局调度队列（默认优先级）

    *   全局调度队列（低优先级）

    *   全局调度队列（后台优先级）

    *   全局调度队列（高过量提交优先级）

    *   全局调度队列（默认过量提交优先级）

    *   全局调度队列（低过量提交优先级）

    *   全局调度队列（后台过量提交优先级）


    这四个带有过量提交优先级的队列被用作串行调度队列。正如其名“过量提交”所暗示的，这些调度队列会无视系统状态，强制创建线程。每个全局调度队列都使用自己的 `pthread_workqueue`。在
    GCD 初始化时，`pthread_workqueue_create_np` 函数会初始化这些 `pthread_workqueue`。


    `pthread_workqueue` 是 Libc 中的一个私有 pthread API。`pthread_workqueue` 通过 `bsdthread_register`
    系统调用和 `workq_open` 系统调用在 XNU 内核中初始化一个工作队列，以获取关于该工作队列的信息。XNU 内核有四个工作队列。


    *   `WORKQUEUE_HIGH_PRIOQUEUE`

    *   `WORKQUEUE_DEFAULT_PRIOQUEUE`

    *   `WORKQUEUE_LOW_PRIOQUEUE`

    *   `WORKQUEUE_BG_PRIOQUEUE`


    每个工作队列都有不同的优先级（图 8–1）。这些优先级与全局调度队列的四个优先级是对应的。


    ![images](img/9781430241164_Fig08-01.jpg)


    **图 8–1.** *全局调度队列、`pthread_workqueue` 与工作队列之间的关系*


    让我们来看看 Block 是如何在调度队列上执行的。


    #### 执行 Block


    当 Block 在全局调度队列上执行时，`libdispatch` 会从作为 FIFO 队列的全局调度队列本身中取出一个 dispatch continuation。它会调用
    `pthread_workqueue_additem_np` 函数，并将全局调度队列、与该全局调度队列优先级相同的工作队列信息，以及一个用于执行 dispatch
    continuation 的回调函数作为参数传递进去。`pthread_workqueue_additem_np` 函数通过使用 `workq_kernreturn`
    系统调用来通知工作队列有新的待执行项添加进来了。当 XNU 内核收到该通知时，它会根据系统状态决定是否应该创建一个线程。对于带有过量提交优先级的全局调度队列，它会随时创建一个线程。在这里，线程的含义几乎等同于普通
    iOS 或 OS X 编程中使用的线程，但某些 `pthread` API 不能使用。更多信息，请参阅苹果公司的《并发编程指南》中的“与 POSIX 线程的兼容性”部分。


    用于工作队列的线程由一种专为工作队列实现的特殊线程调度器管理。它的上下文切换与普通线程略有不同。这是我们应当使用 GCD 的原因之一。一个工作队列的线程会调用
    `pthread_workqueue` 函数。该函数会调用 `libdispatch` 中的一个回调函数。然后，它执行 dispatch continuation
    中的 Block。当 Block 执行完毕时，会通知调度组，并释放 dispatch continuation。最后，它准备好执行全局调度队列中的下一个 Block。这就是调度队列大致的执行流程。


    无论如何，我们了解到，应用程序员想要实现一个比 GCD 更高效的方案是不可能的。'
- fmt: "### Dispatch Source\n\nIn this section, we learn one more feature of GCD called\
    \ the *dispatch source*. This is a useful functionality to handle kernel events\
    \ from the application side. This is a low-level feature, although it might be\
    \ useful in some applications. A dispatch source is a wrapper for a `kqueue` that\
    \ is a very common feature in the BSD kernel. `Kqueue` is a mechanism to execute\
    \ a task in the application program when an XNU kernel event occurs. It is very\
    \ lightweight and does not consume many resources including CPU load. We can say\
    \ that `kqueue` is the best mechanism to process an XNU kernel event on the application\
    \ side. Dispatch source can handle the events listed in [Table 8–2](#Chapter08.html#tab_8_2).\n\
    \n![images](images/t0802.jpg)\n\nWhen an event occurs, a task that is assigned\
    \ to the event will be executed on the specified dispatch queue.\n\n[Listing 8–1](#Chapter08.html#list_8_1)\
    \ shows how an asynchronous file descriptor is read with `DISPATCH_SOURCE_TYPE_READ`.\n\
    \n**Listing 8–1.** *File reading using dispatch source*\n\n```\n__block size_t\
    \ total = 0;\nsize_t size = how many bytes you want to get;\nchar *buff = (char\
    \ *)malloc(size);\n /*\n  * Set as an asynchronous (NONBLOCK) descripter for 'sockfd',\
    \ a file descripter\n  */\nfcntl(sockfd, F_SETFL, O_NONBLOCK);\n\n /*\n  * Obtain\
    \ a global dispatch queue to add an event handler.\n  */\ndispatch_queue_t queue\
    \ =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);\n\n /*\n\
    \  * Create a dispatch source with READ event.\n  */\ndispatch_source_t source\
    \ =\n    dispatch_source_create(DISPATCH_SOURCE_TYPE_READ, sockfd, 0, queue);\n\
    \n /*\n  * Assign a task with the READ event.\n  */\ndispatch_source_set_event_handler(source,\
    \ ^{\n     /*\n      * Get the available data size.\n      */\n    size_t available\
    \ = dispatch_source_get_data(source);\n\n     /*\n      * Read data from the descriptor\n\
    \      */\n    int length = read(sockfd, buff, available);\n\n     /*\n      *\
    \ When an error occurs, cancel the dispatch source.\n      */\n    if (length\
    \ < 0) {\n         /*\n          * error handling\n          */\n\n        dispatch_source_cancel(source);\n\
    \    }\n\n    total += length;\n\n    if (total == size) {\n\n         /*\n  \
    \        * Process the buff\n          */\n\n         /*\n          * Cancel the\
    \ dispatch source to finalize it\n          */\n        dispatch_source_cancel(source);\n\
    \    }\n});\n\n /*\n  * Assign a task for the cancellation of the dispatch source\n\
    \  */\ndispatch_source_set_cancel_handler(source, ^{\n    free(buff);\n    close(sockfd);\n\
    \n     /*\n      * Release the dispatch source itself\n      */\n    dispatch_release(timer);\n\
    });\n\n /*\n  * Resume the dispatch source\n  */\ndispatch_resume(source);\n```\n\
    \nThere is very similar source code for this example in a `CFSocket`, an asynchronous\
    \ network API of the Core Foundation Framework. Because asynchronous network APIs\
    \ in the Foundation Framework are implemented with the `CFSocket`, you can get\
    \ the benefit of a dispatch source. In other words, you can get the benefit of\
    \ GCD just by using the Foundation Framework.\n\n### Example Using Dispatch Source\n\
    \nTo wrap up, let’s see an example of a timer using `DISPATCH_SOURCE_TYPE_TIMER`\
    \ ([Listing 8–2](#Chapter08.html#list_8_2)). It can be used for a connection timeout\
    \ in network programming.\n\n**Listing 8–2.** *Timer using dispatch source*\n\n\
    ```\n /*\n  * Create a dispatch source with DISPATCH_SOURCE_TYPE_TIMER\n  *\n\
    \  * When a specified time is elapsed, a task will be added to the main dispatch\
    \ queue\n  */\ndispatch_source_t timer = dispatch_source_create(\n    DISPATCH_SOURCE_TYPE_TIMER,\
    \ 0, 0, dispatch_get_main_queue());\n\n /*\n  * Set the timer to 15 seconds later,\n\
    \  * Without repeating,\n  * Allow one-second delay\n  */\ndispatch_source_set_timer(timer,\n\
    \    dispatch_time(DISPATCH_TIME_NOW, 15ull * NSEC_PER_SEC),\n        DISPATCH_TIME_FOREVER,\
    \ 1ull * NSEC_PER_SEC);\n\n /*\n  * Set a task to be executed when the specified\
    \ time is passed.\n  */\ndispatch_source_set_event_handler(timer, ^{\n    NSLog(@\"\
    wakeup!\");\n\n     /*\n      * Cancel the dispatch source\n      */\n    dispatch_source_cancel(timer);\n\
    });\n\n /*\n  * Assign a task for the cancellation of the dispatch source\n  */\n\
    dispatch_source_set_cancel_handler(timer, ^{\n    NSLog(@\"canceled\");\n\n  \
    \   /*\n      * Release the dispatch source itself\n      */\n    dispatch_release(timer);\n\
    });\n\n /*\n  * Resume the dispatch source\n  */\ndispatch_resume(timer);\n```\n\
    \nWhen you saw the previous source code reading an asynchronous file descriptor\
    \ or the source code of a timer, you might have noticed something.\n\nA dispatch\
    \ queue doesn’t have the concept of “cancel.” When a task is added to a dispatch\
    \ queue, you can’t remove it or cancel it. You might write a code to cancel it\
    \ for yourself, give up the cancellation, or you might choose other APIs such\
    \ as `NSOperationQueue`. With dispatch sources, you can cancel that. You can assign\
    \ a task as a Block with a callback for cancellation. Because of that, it is easier\
    \ to handle an event in the XNU kernel with a dispatch source than directly with\
    \ `kqueue`. When you have to do something related to `kqueue`, you should use\
    \ a dispatch source. It makes the source code simple.\n\n### Summary\n\nIn this\
    \ chapter, we learned the implementation of the dispatch queue, and how to use\
    \ dispatch source.\n\nIn this book, you’ve mastered ARC, Block, and GCD from the\
    \ basics to the details with their implementations: ARC, the automatic memory\
    \ management by the compiler, Block, as a new syntax to make application code\
    \ unbelievably short, and GCD, the very effective multithread programming model.\n\
    \nWhen you understand these technologies and use them properly, your application\
    \ will become highly responsive and of high quality. Please start using these\
    \ technologies. I hope your great applications are on the App Store top 10 list!\n\
    \n### Appendix A"
  raw: '### Dispatch Source


    In this section, we learn one more feature of GCD called the *dispatch source*.
    This is a useful functionality to handle kernel events from the application side.
    This is a low-level feature, although it might be useful in some applications.
    A dispatch source is a wrapper for a kqueue that is a very common feature in the
    BSD kernel. Kqueue is a mechanism to execute a task in the application program
    when an XNU kernel event occurs. It is very lightweight and does not consume many
    resources including CPU load. We can say that kqueue is the best mechanism to
    process an XNU kernel event on the application side. Dispatch source can handle
    the events listed in [Table 8–2](#Chapter08.html#tab_8_2).


    ![images](images/t0802.jpg)


    When an event occurs, a task that is assigned to the event will be executed on
    the specified dispatch queue.


    [Listing 8–1](#Chapter08.html#list_8_1) shows how an asynchronous file descriptor
    is read with DISPATCH_SOURCE_TYPE_READ.


    **Listing 8–1.** *File reading using dispatch source*


    `__block size_t total = 0;`

    `size_t size = how many bytes you want to get;`

    `char *buff = (char *)malloc(size);`

    ` /*`

    `  * Set as an asynchronous (NONBLOCK) descripter for ‘sockfd’, a file descripter`

    `  */`

    `fcntl(sockfd, F_SETFL, O_NONBLOCK);`


    ` /*`

    `  * Obtain a global dispatch queue to add an event handler.`

    `  */`

    `dispatch_queue_t queue =`

    `    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);`


    ` /*`

    `  * Create a dispatch source with READ event.`

    `  */`

    `dispatch_source_t source =`

    `    dispatch_source_create(DISPATCH_SOURCE_TYPE_READ, sockfd, 0, queue);`


    ` /*`

    `  * Assign a task with the READ event.`

    `  */`

    `dispatch_source_set_event_handler(source, ^{`

    `     /*`

    `      * Get the available data size.`

    `      */`

    `    size_t available = dispatch_source_get_data(source);`


    `     /*`

    `      * Read data from the descriptor`

    `      */`

    `    int length = read(sockfd, buff, available);`


    `     /*`

    `      * When an error occurs, cancel the dispatch source.`

    `      */`

    `    if (length < 0) {`

    `         /*`

    `          * error handling`

    `          */`


    `        dispatch_source_cancel(source);`

    `    }`


    `    total += length;`


    `    if (total == size) {`


    `         /*`

    `          * Process the buff`

    `          */`


    `         /*`

    `          * Cancel the dispatch source to finalize it`

    `          */`

    `        dispatch_source_cancel(source);`

    `    }`

    `});`


    ` /*`

    `  * Assign a task for the cancellation of the dispatch source`

    `  */`

    `dispatch_source_set_cancel_handler(source, ^{`

    `    free(buff);`

    `    close(sockfd);`


    `     /*`

    `      * Release the dispatch source itself`

    `      */`

    `    dispatch_release(timer);`

    `});`


    ` /*`

    `  * Resume the dispatch source`

    `  */`

    `dispatch_resume(source);`


    There is very similar source code for this example in a CFSocket, an asynchronous
    network API of the Core Foundation Framework. Because asynchronous network APIs
    in the Foundation Framework are implemented with the CFSocket, you can get the
    benefit of a dispatch source. In other words, you can get the benefit of GCD just
    by using the Foundation Framework.


    ### Example Using Dispatch Source


    To wrap up, let’s see an example of a timer using DISPATCH_SOURCE_TYPE_TIMER ([Listing
    8–2](#Chapter08.html#list_8_2)). It can be used for a connection timeout in network
    programming.


    **Listing 8–2.** *Timer using dispatch source*


    ` /*`

    `  * Create a dispatch source with DISPATCH_SOURCE_TYPE_TIMER`

    `  *`

    `  * When a specified time is elapsed, a task will be added to the main dispatch
    queue`

    `  */`

    `dispatch_source_t timer = dispatch_source_create(`

    `    DISPATCH_SOURCE_TYPE_TIMER, 0, 0, dispatch_get_main_queue());`


    ` /*`

    `  * Set the timer to 15 seconds later,`

    `  * Without repeating,`

    `  * Allow one-second delay`

    `  */`

    `dispatch_source_set_timer(timer,`

    `    dispatch_time(DISPATCH_TIME_NOW, 15ull * NSEC_PER_SEC),`

    `        DISPATCH_TIME_FOREVER, 1ull * NSEC_PER_SEC);`


    ` /*`

    `  * Set a task to be executed when the specified time is passed.`

    `  */`

    `dispatch_source_set_event_handler(timer, ^{`

    `    NSLog(@"wakeup!");`


    `     /*`

    `      * Cancel the dispatch source`

    `      */`

    `    dispatch_source_cancel(timer);`

    `});`


    ` /*`

    `  * Assign a task for the cancellation of the dispatch source`

    `  */`

    `dispatch_source_set_cancel_handler(timer, ^{`

    `    NSLog(@"canceled");`


    `     /*`

    `      * Release the dispatch source itself`

    `      */`

    `    dispatch_release(timer);`

    `});`


    ` /*`

    `  * Resume the dispatch source`

    `  */`

    `dispatch_resume(timer);`


    When you saw the previous source code reading an asynchronous file descriptor
    or the source code of a timer, you might have noticed something.


    A dispatch queue doesn’t have the concept of “cancel.” When a task is added to
    a dispatch queue, you can’t remove it or cancel it. You might write a code to
    cancel it for yourself, give up the cancellation, or you might choose other APIs
    such as NSOperationQueue. With dispatch sources, you can cancel that. You can
    assign a task as a Block with a callback for cancellation. Because of that, it
    is easier to handle an event in the XNU kernel with a dispatch source than directly
    with kqueue. When you have to do something related to kqueue, you should use a
    dispatch source. It makes the source code simple.


    ### Summary


    In this chapter, we learned the implementation of the dispatch queue, and how
    to use dispatch source.


    In this book, you’ve mastered ARC, Block, and GCD from the basics to the details
    with their implementations: ARC, the automatic memory management by the compiler,
    Block, as a new syntax to make application code unbelievably short, and GCD, the
    very effective multithread programming model.


    When you understand these technologies and use them properly, your application
    will become highly responsive and of high quality. Please start using these technologies.
    I hope your great applications are on the App Store top 10 list!


    ## Appendix A'
  trans: "\n### Dispatch Source\n\n本节我们将学习 GCD 的另一个特性——*dispatch source*。这是一个实用的功能，用于从应用程序侧处理内核事件。虽然这是一个底层特性，但在某些应用中可能很有用。Dispatch\
    \ source 是对 `kqueue` 的封装，而 `kqueue` 是 BSD 内核中非常常见的特性。`Kqueue` 是一种机制，用于在 XNU 内核事件发生时，在应用程序中执行任务。它非常轻量，不会消耗太多资源（包括\
    \ CPU 负载）。可以说，`kqueue` 是在应用程序侧处理 XNU 内核事件的最佳机制。Dispatch source 可以处理表 8–2 中列出的事件。\n\
    \n![图片](img/t0802.jpg)\n\n当某个事件发生时，分配给该事件的任务将在指定的调度队列上执行。\n\n代码清单 8–1 展示了如何使用\
    \ `DISPATCH_SOURCE_TYPE_READ` 读取异步文件描述符。\n\n**代码清单 8–1.** *使用 dispatch source\
    \ 读取文件*\n\n```\n__block size_t total = 0;\nsize_t size = how many bytes you want\
    \ to get;\nchar *buff = (char *)malloc(size);\n /*\n  * 将 'sockfd'（一个文件描述符）设置为异步（NONBLOCK）描述符\n\
    \  */\nfcntl(sockfd, F_SETFL, O_NONBLOCK);\n\n /*\n  * 获取一个全局调度队列，用于添加事件处理器。\n\
    \  */\ndispatch_queue_t queue =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0);\n\n /*\n  * 创建一个带有 READ 事件的 dispatch source。\n  */\ndispatch_source_t source\
    \ =\n    dispatch_source_create(DISPATCH_SOURCE_TYPE_READ, sockfd, 0, queue);\n\
    \n /*\n  * 为 READ 事件分配一个任务。\n  */\ndispatch_source_set_event_handler(source, ^{\n\
    \     /*\n      * 获取可用数据大小。\n      */\n    size_t available = dispatch_source_get_data(source);\n\
    \n     /*\n      * 从描述符读取数据\n      */\n    int length = read(sockfd, buff, available);\n\
    \n     /*\n      * 当发生错误时，取消 dispatch source。\n      */\n    if (length < 0) {\n\
    \         /*\n          * 错误处理\n          */\n\n        dispatch_source_cancel(source);\n\
    \    }\n\n    total += length;\n\n    if (total == size) {\n\n         /*\n  \
    \        * 处理 buff\n          */\n\n         /*\n          * 取消 dispatch source\
    \ 以结束它\n          */\n        dispatch_source_cancel(source);\n    }\n});\n\n\
    \ /*\n  * 为 dispatch source 的取消分配一个任务\n  */\ndispatch_source_set_cancel_handler(source,\
    \ ^{\n    free(buff);\n    close(sockfd);\n\n     /*\n      * 释放 dispatch source\
    \ 本身\n      */\n    dispatch_release(timer);\n});\n\n /*\n  * 恢复 dispatch source\n\
    \  */\ndispatch_resume(source);\n```\n\n在 `CFSocket`（Core Foundation 框架的异步网络 API）中，有一个与此示例非常相似的源代码。由于\
    \ Foundation 框架中的异步网络 API 是使用 `CFSocket` 实现的，因此你可以享受到 dispatch source 的优势。换句话说，仅通过使用\
    \ Foundation 框架，你就可以享受到 GCD 的好处。\n\n### 使用 Dispatch Source 的示例\n\n最后，让我们来看一个使用\
    \ `DISPATCH_SOURCE_TYPE_TIMER` 的定时器示例（代码清单 8–2）。它可用于网络编程中的连接超时。\n\n**代码清单 8–2.**\
    \ *使用 dispatch source 的定时器*\n\n```\n /*\n  * 创建一个带有 DISPATCH_SOURCE_TYPE_TIMER\
    \ 的 dispatch source\n  *\n  * 当指定时间过去后，一个任务将被添加到主调度队列\n  */\ndispatch_source_t\
    \ timer = dispatch_source_create(\n    DISPATCH_SOURCE_TYPE_TIMER, 0, 0, dispatch_get_main_queue());\n\
    \n /*\n  * 将定时器设置为 15 秒后触发，\n  * 不重复，\n  * 允许一秒的延迟\n  */\ndispatch_source_set_timer(timer,\n\
    \    dispatch_time(DISPATCH_TIME_NOW, 15ull * NSEC_PER_SEC),\n        DISPATCH_TIME_FOREVER,\
    \ 1ull * NSEC_PER_SEC);\n\n /*\n  * 设置在指定时间过去时执行的任务。\n  */\ndispatch_source_set_event_handler(timer,\
    \ ^{\n    NSLog(@\"wakeup!\");\n\n     /*\n      * 取消 dispatch source\n      */\n\
    \    dispatch_source_cancel(timer);\n});\n\n /*\n  * 为 dispatch source 的取消分配一个任务\n\
    \  */\ndispatch_source_set_cancel_handler(timer, ^{\n    NSLog(@\"canceled\");\n\
    \n     /*\n      * 释放 dispatch source 本身\n      */\n    dispatch_release(timer);\n\
    });\n\n /*\n  * 恢复 dispatch source\n  */\ndispatch_resume(timer);\n```\n\n当你看到前面读取异步文件描述符的源代码或定时器的源代码时，你可能已经注意到了一些事情。\n\
    \n调度队列没有“取消”的概念。当一个任务被添加到调度队列时，你无法将其移除或取消。你可能需要自己编写代码来取消它、放弃取消操作，或者选择其他 API，例如\
    \ `NSOperationQueue`。而使用 dispatch source，你可以实现取消。你可以将一个任务作为 Block 分配给 dispatch\
    \ source，并附带一个用于取消的回调。因此，使用 dispatch source 比直接使用 `kqueue` 更容易处理 XNU 内核中的事件。当需要执行与\
    \ `kqueue` 相关的操作时，你应该使用 dispatch source。它能使源代码更简洁。\n\n### 总结\n\n在本章中，我们学习了调度队列的实现以及如何使用\
    \ dispatch source。\n\n通过本书，你已从基础到细节，并结合其实现，掌握了 ARC、Block 和 GCD：ARC——由编译器实现的自动内存管理；Block——一种新的语法，能极大地缩短应用程序代码；以及\
    \ GCD——一种非常高效的多线程编程模型。\n\n当你理解这些技术并恰当地使用它们时，你的应用程序将具有高响应性和高质量。请开始使用这些技术吧。希望你的优秀应用能登上\
    \ App Store 排行榜前十名！\n\n### 附录 A\n"
- fmt: "# Example of ARC, Blocks, and GCD\n\nLet's see an example using ARC, Blocks,\
    \ and GCD. The following source code reads data from a URL and displays the result\
    \ on the main thread. That is a very typical use case in iOS applications so you\
    \ can paste this as a part of your application. This shows you how ARC, Block,\
    \ and GCD can be used for an application such as a twitter or Tumblr client.\n\
    \nThe source code is explained with its comments.\n\n```objectivec\nNSString *url\
    \ = @\"http://images.apple.com/\"\n    \"jp/iphone/features/includes/camera-gallery/03-20100607.jpg\"\
    \n\n/*\n * On the main thread, downloading data from the specified URL starts\
    \ asynchronously.\n */\n\n[ASyncURLConnection request:url completeBlock:^(NSData\
    \ *data) {\n\n    dispatch_queue_t queue =\n        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0);\n    dispatch_async(queue, ^{\n\n         /*\n          * On a global dispatch\
    \ queue, processing the downloaded data\n          * It doesn't prevent the main\
    \ thread, which means this task can take long.\n          */\n\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n\n             /*\n              * Here, it uses the result on the main\
    \ dispatch queue.\n              * Displays the result on the user interface.\n\
    \              */\n        });\n    });\n\n} errorBlock:^(NSError *error) {\n\n\
    \     /*\n      * Error occurred\n      */\n\n    NSLog(@\"error %@\", error);\n\
    }];\n```\n\nProcessing the downloaded data is executed on the other thread to\
    \ avoid preventing the main thread. The `dispatch_get_global_queue` function obtains\
    \ a global dispatch queue with default priority, and the `dispatch_async` function\
    \ processes the data on the global dispatch queue. When the processing is finished,\
    \ the user interface has to be updated on the main thread to show the result.\
    \ This is done by the `dispatch_get_main_queue` function to obtain the main dispatch\
    \ queue and by the `dispatch_async` function to execute the task.\n\nBy the way,\
    \ should the downloading itself be implemented with GCD to run on the other threads\
    \ to avoid preventing the main thread? The answer is no. For network programming,\
    \ an asynchronous API is strongly recommended. Please see the following WWDC 2010\
    \ sessions.\n\n- WWDC 2010 Session 207—Network Apps for iPhone OS, Part 1\n- WWDC\
    \ 2010 Session 208—Network Apps for iPhone OS, Part 2\n\nThese are the sessions\
    \ about network programming. It definitely says \"Threads Are Evil™\" for network\
    \ programming. When threads are used for network programming, it tends to use\
    \ too many threads. For example, if a thread is created for each connection, stacks\
    \ for each thread will consume too much memory instantly. There are asynchronous\
    \ network APIs in the Cocoa Framework. Please make sure to use an asynchronous\
    \ network API. You must not use threads for networks.\n\nAn `ASyncURLConnection`\
    \ class in the source code is a class for network programming and has a base class\
    \ `NSURLConnection` in the Foundation Framework, which is to load data asynchronously\
    \ via a network. Let's see how the class is implemented.\n\n## `ASyncURLConnection.h`\n\
    \n```objectivec\n#import <Foundation/Foundation.h>\n\n/*\n * By using typedef\
    \ for a Block type variables,\n * Source code will have better readability.\n\
    \ */\n\ntypedef void (^completeBlock_t)(NSData *data);\ntypedef void (^errorBlock_t)(NSError\
    \ *error);\n\n@interface ASyncURLConnection : NSURLConnection\n{\n     /*\n  \
    \    * Because ARC is enabled, all the variables below are\n      * qualified\
    \ with __strong  when it doesn't have an explicit qualifier.\n      */\n\n   \
    \ NSMutableData *data_;\n    completeBlock_t completeBlock_;\n    errorBlock_t\
    \ errorBlock_;\n}\n\n/*\n * To give the source code better readability,\n * The\
    \ typedefined Block type variable is used for the argument.\n */\n\n+ (id)request:(NSString\
    \ *)requestUrl\n    completeBlock:(completeBlock_t)completeBlock\n    errorBlock:(errorBlock_t)errorBlock;\n\
    \n- (id)initWithRequest:(NSString *)requestUrl\n    completeBlock:(completeBlock_t)completeBlock\n\
    \    errorBlock:(errorBlock_t)errorBlock;\n@end\n```\n\n## `ASyncURLConnection.m`\n\
    \n```objectivec\n#import \"ASyncURLConnection.h\"\n\n@implementation ASyncURLConnection\n\
    \n+ (id)request:(NSString *)requestUrl\n    completeBlock:(completeBlock_t)completeBlock\n\
    \    errorBlock:(errorBlock_t)errorBlock\n{\n     /*\n      * If ARC is disabled,\n\
    \      * This method should return an object after autorelease is called:\n  \
    \    *          * id obj = [[[self alloc] initWithRequest:requestUrl\n      *\
    \   completeBlock:completeBlock errorBlock:errorBlock];\n      * return [obj autorelease];\n\
    \      *\n      * Because this method name doesn't begin with alloc/new/copy/mutableCopy,\n\
    \      * the returned object has been automatically registered in autoreleasepool.\n\
    \      */\n\n    return [[self alloc] initWithRequest:requestUrl\n        completeBlock:completeBlock\
    \ errorBlock:errorBlock];\n}\n\n- (id)initWithRequest:(NSString *)requestUrl\n\
    \    completeBlock:(completeBlock_t)completeBlock\n    errorBlock:(errorBlock_t)errorBlock\n\
    {\n    NSURL *url = [NSURL URLWithString:requestUrl];\n    NSURLRequest *request\
    \ = [NSURLRequest requestWithURL:url];\n\n    if ((self = [super initWithRequest:request\n\
    \            delegate:self startImmediately:NO])) {\n        data_ = [[NSMutableData\
    \ alloc] init];\n\n         /*\n          * To make sure that you can use the\
    \ passed Block safely,\n          * the instance method 'copy' is called to put\
    \ the Block on the heap.\n          */\n        completeBlock_ = [completeBlock\
    \ copy];\n        errorBlock_ = [errorBlock copy];\n\n        [self start];\n\
    \    }\n\n     /*\n      * Member variables that have a __strong qualifier\n \
    \     * have ownership of the created NSMutableData class object\n      *\n  \
    \    * When the object is discarded, the strong references\n      * of the member\
    \ variables with the __strong qualifier disappear.\n      * The NSMutableData\
    \ class object and the Block will be released automatically.\n      *\n      *\
    \ So, you don't need to implement the dealloc instance method explicitly.\n  \
    \    */\n\n    return self;\n}\n\n- (void)connection:(NSURLConnection *)connection\n\
    \    didReceiveResponse:(NSURLResponse *)response\n{\n    [data_ setLength:0];\n\
    }\n\n- (void)connection:(NSURLConnection *)connection\n    didReceiveData:(NSData\
    \ *)data\n{\n    [data_ appendData:data];\n}\n\n- (void)connectionDidFinishLoading:(NSURLConnection\
    \ *)connection\n{\n     /*\n      * Execute the Block assigned as callback for\
    \ downloading success.\n      * The legacy delegate callback can be replaced by\
    \ Block.\n      */\n\n    completeBlock_(data_);\n}\n\n- (void)connection:(NSURLConnection\
    \ *)connection\n    didFailWithError:(NSError *)error\n{\n     /*\n      * Execute\
    \ the Block that is assigned for error.\n      */\n\n    errorBlock_(error);\n\
    }\n\n@end\n```\n\nWhen the downloading is finished or an error occurs, the `NSURLConnection`\
    \ class calls a method on an object that is assigned to its delegate. The `ASyncURLConnection`\
    \ class inherits the `NSURLConnection` class and Blocks can be set as callback\
    \ for download finished and an error occurred. With this class, an application\
    \ source code can be simpler. ARC manages the object of the `NSMutableData` class\
    \ that is to store the downloaded data and the Blocks for callbacks properly.\
    \ Because the member variables are qualified with `__strong`, you don't need to\
    \ call the `retain` or `release` method explicitly. Actually, you can't call them\
    \ in an ARC-enabled environment. And, you don't need to implement the `dealloc`\
    \ instance method.\n\nYou must realize that ARC, Blocks, and Grand Central Dispatch\
    \ are powerful even in such a simple source code.\n\n## Appendix B"
  raw: '## Example of ARC, Blocks, and GCD


    Let’s see an example using ARC, Blocks, and GCD. The following source code reads
    data from a URL and displays the result on the main thread. That is a very typical
    use case in iOS applications so you can paste this as a part of your application.
    This shows you how ARC, Block, and GCD can be used for an application such as
    a twitter or Tumblr client.


    The source code is explained with its comments.


    `NSString *url = @"http://images.apple.com/"`

    `    "jp/iphone/features/includes/camera-gallery/03-20100607.jpg"`


    ` /*`

    `  * On the main thread, downloading data from the specified URL starts asynchronously.`

    `  */`


    `[ASyncURLConnection request:url completeBlock:^(NSData *data) {`


    `    dispatch_queue_t queue =`

    `        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);`

    `    dispatch_async(queue, ^{`


    `         /*`

    `          * On a global dispatch queue, processing the downloaded data`

    `          * It doesn''t prevent the main thread, which means this task can take
    long.`

    `          */`


    `        dispatch_async(dispatch_get_main_queue(), ^{`


    `             /*`

    `              * Here, it uses the result on the main dispatch queue.`

    `              * Displays the result on the user interface.`

    `              */`

    `        });`

    `    });`


    `} errorBlock:^(NSError *error) {`


    `     /*`

    `      * Error occurred`

    `      */`


    `    NSLog(@"error %@", error);`

    `}];`


    Processing the downloaded data is executed on the other thread to avoid preventing
    the main thread. The dispatch_get_global_queue function obtains a global dispatch
    queue with default priority, and the dispatch_async function processes the data
    on the global dispatch queue. When the processing is finished, the user interface
    has to be updated on the main thread to show the result. This is done by the dispatch_get_main_queue
    function to obtain the main dispatch queue and by the dispatch_async function
    to execute the task.


    By the way, should the downloading itself be implemented with GCD to run on the
    other threads to avoid preventing the main thread? The answer is no. For network
    programming, an asynchronous API is strongly recommended. Please see the following
    WWDC 2010 sessions.


    *   WWDC 2010 Session 207—Network Apps for iPhone OS, Part 1

    *   WWDC 2010 Session 208—Network Apps for iPhone OS, Part 2


    These are the sessions about network programming. It definitely says “Threads
    Are Evil™” for network programming. When threads are used for network programming,
    it tends to use too many threads. For example, if a thread is created for each
    connection, stacks for each thread will consume too much memory instantly. There
    are asynchronous network APIs in the Cocoa Framework. Please make sure to use
    an asynchronous network API. You must not use threads for networks.


    An ASyncURLConnection class in the source code is a class for network programming
    and has a base class NSURLConnection in the Foundation Framework, which is to
    load data asynchronously via a network. Let’s see how the class is implemented.


    **`ASyncURLConnection.h`**

    `#import <Foundation/Foundation.h>`


    ` /*`

    `  * By using typedef for a Block type variables,`

    `  * Source code will have better readability.`

    `  */`


    `typedef void (^completeBlock_t)(NSData *data);`

    `typedef void (^errorBlock_t)(NSError *error);`


    `@interface ASyncURLConnection : NSURLConnection`

    `{`

    `     /*`

    `      * Because ARC is enabled, all the variables below are`

    `      * qualified with __strong  when it doesn''t have an explicit qualifier.`

    `      */`


    `    NSMutableData *data_;`

    `    completeBlock_t completeBlock_;`

    `    errorBlock_t errorBlock_;`

    `}`


    ` /*`

    `  * To give the source code better readability,`

    `  * The typedefined Block type variable is used for the argument.`

    `  */`


    `+ (id)request:(NSString *)requestUrl`

    `    completeBlock:(completeBlock_t)completeBlock`

    `    errorBlock:(errorBlock_t)errorBlock;`


    `- (id)initWithRequest:(NSString *)requestUrl`

    `    completeBlock:(completeBlock_t)completeBlock`

    `    errorBlock:(errorBlock_t)errorBlock;`

    `@end`


    **`ASyncURLConnection.m`**

    `#import "ASyncURLConnection.h"`


    `@implementation ASyncURLConnection`


    `+ (id)request:(NSString *)requestUrl`

    `    completeBlock:(completeBlock_t)completeBlock`

    `    errorBlock:(errorBlock_t)errorBlock`

    `{`

    `     /*`

    `      * If ARC is disabled,`

    `      * This method should return an object after autorelease is called:`

    `      *          * id obj = [[[self alloc] initWithRequest:requestUrl`

    `      *   completeBlock:completeBlock errorBlock:errorBlock];`

    `      * return [obj autorelease];`

    `      *`

    `      * Because this method name doesn''t begin with alloc/new/copy/mutableCopy,`

    `      * the returned object has been automatically registered in autoreleasepool.`

    `      */`


    `    return [[self alloc] initWithRequest:requestUrl`

    `        completeBlock:completeBlock errorBlock:errorBlock];`

    `}`


    `- (id)initWithRequest:(NSString *)requestUrl`

    `    completeBlock:(completeBlock_t)completeBlock`

    `    errorBlock:(errorBlock_t)errorBlock`

    `{`

    `    NSURL *url = [NSURL URLWithString:requestUrl];`

    `    NSURLRequest *request = [NSURLRequest requestWithURL:url];`


    `    if ((self = [super initWithRequest:request`

    `            delegate:self startImmediately:NO])) {`

    `        data_ = [[NSMutableData alloc] init];`


    `         /*`

    `          * To make sure that you can use the passed Block safely,`

    `          * the instance method ''copy'' is called to put the Block on the heap.`

    `          */`

    `        completeBlock_ = [completeBlock copy];`

    `        errorBlock_ = [errorBlock copy];`


    `        [self start];`

    `    }`


    `     /*`

    `      * Member variables that have a __strong qualifier`

    `      * have ownership of the created NSMutableData class object`

    `      *`

    `      * When the object is discarded, the strong references`

    `      * of the member variables with the __strong qualifier disappear.`

    `      * The NSMutableData class object and the Block will be released automatically.`

    `      *`

    `      * So, you don''t need to implement the dealloc instance method explicitly.`

    `      */`


    `    return self;`

    `}`


    `- (void)connection:(NSURLConnection *)connection`

    `    didReceiveResponse:(NSURLResponse *)response`

    `{`

    `    [data_ setLength:0];`

    `}`


    `- (void)connection:(NSURLConnection *)connection`

    `    didReceiveData:(NSData *)data`

    `{`

    `    [data_ appendData:data];`

    `}`


    `- (void)connectionDidFinishLoading:(NSURLConnection *)connection`

    `{`

    `     /*`

    `      * Execute the Block assigned as callback for downloading success.`

    `      * The legacy delegate callback can be replaced by Block.`

    `      */`


    `    completeBlock_(data_);`

    `}`


    `- (void)connection:(NSURLConnection *)connection`

    `    didFailWithError:(NSError *)error`

    `{`

    `     /*`

    `      * Execute the Block that is assigned for error.`

    `      */`


    `    errorBlock_(error);`

    `}`


    `@end`


    When the downloading is finished or an error occurs, the NSURLConnection class
    calls a method on an object that is assigned to its delegate. The ASyncURLConnection
    class inherits the NSURLConnection class and Blocks can be set as callback for
    download finished and an error occurred. With this class, an application source
    code can be simpler. ARC manages the object of the NSMutableData class that is
    to store the downloaded data and the Blocks for callbacks properly. Because the
    member variables are qualified with __strong, you don’t need to call the retain
    or release method explicitly, Actually, you can’t call them in an ARC-enabled
    environment. And, you don’t need to implement the dealloc instance method.


    You must realize that ARC, Blocks, and Grand Central Dispatch are powerful even
    in such a simple source code.


    ## Appendix B'
  trans: "\n# ARC、Block 与 GCD 示例\n\n让我们来看一个结合使用 ARC、Block 和 GCD 的示例。以下源代码从 URL 读取数据并在主线程上显示结果。这是\
    \ iOS 应用中非常典型的用例，你可以将其作为应用程序的一部分直接使用。它展示了 ARC、Block 和 GCD 如何用于开发诸如 Twitter 或 Tumblr\
    \ 客户端之类的应用。\n\n源代码随附了注释进行说明。\n\n```objectivec\nNSString *url = @\"http://images.apple.com/\"\
    \n    \"jp/iphone/features/includes/camera-gallery/03-20100607.jpg\"\n\n/*\n *\
    \ 在主线程上，从指定的 URL 开始异步下载数据。\n */\n\n[ASyncURLConnection request:url completeBlock:^(NSData\
    \ *data) {\n\n    dispatch_queue_t queue =\n        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0);\n    dispatch_async(queue, ^{\n\n         /*\n          * 在全局派发队列上处理已下载的数据。\n\
    \          * 这不会阻塞主线程，因此该任务可以执行较长时间。\n          */\n\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n\n             /*\n              * 这里在主派发队列上使用处理结果。\n              * 在用户界面上显示结果。\n\
    \              */\n        });\n    });\n\n} errorBlock:^(NSError *error) {\n\n\
    \     /*\n      * 发生错误时\n      */\n\n    NSLog(@\"error %@\", error);\n}];\n```\n\
    \n处理已下载的数据在其他线程上执行，以避免阻塞主线程。`dispatch_get_global_queue` 函数用于获取一个默认优先级的全局派发队列，`dispatch_async`\
    \ 函数则在全局派发队列上处理数据。当处理完成后，必须在主线程上更新用户界面以显示结果。这通过 `dispatch_get_main_queue` 函数获取主派发队列，再使用\
    \ `dispatch_async` 函数执行任务来实现。\n\n顺便提一下，下载操作本身是否应该使用 GCD 实现，以使其在其他线程上运行从而避免阻塞主线程？答案是否定的。对于网络编程，强烈建议使用异步\
    \ API。请参阅以下 WWDC 2010 的视频讲座。\n\n-   WWDC 2010 Session 207 — 针对 iPhone OS 的网络应用，第一部分\n\
    -   WWDC 2010 Session 208 — 针对 iPhone OS 的网络应用，第二部分\n\n这些是关于网络编程的讲座。其中明确提到，对于网络编程，“线程是有害的™”。当使用线程进行网络编程时，容易产生过多线程。例如，如果为每个连接创建一个线程，每个线程的栈会瞬间消耗大量内存。Cocoa\
    \ 框架中已有现成的异步网络 API。请务必使用异步网络 API。**切勿**为网络操作使用线程。\n\n源代码中的 `ASyncURLConnection`\
    \ 类是一个用于网络编程的类，其基类为 Foundation 框架中的 `NSURLConnection`，该类用于通过网络异步加载数据。现在让我们来看看这个类是如何实现的。\n\
    \n## `ASyncURLConnection.h`\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
    \n/*\n * 通过为 Block 类型变量使用 typedef，\n * 源代码将具备更好的可读性。\n */\n\ntypedef void (^completeBlock_t)(NSData\
    \ *data);\ntypedef void (^errorBlock_t)(NSError *error);\n\n@interface ASyncURLConnection\
    \ : NSURLConnection\n{\n     /*\n      * 由于启用了 ARC，以下所有变量\n      * 在未显式指定修饰符时，均使用\
    \ __strong 进行修饰。\n      */\n\n    NSMutableData *data_;\n    completeBlock_t completeBlock_;\n\
    \    errorBlock_t errorBlock_;\n}\n\n/*\n * 为提高源代码可读性，\n * 参数中使用了经过 typedef 定义的\
    \ Block 类型变量。\n */\n\n+ (id)request:(NSString *)requestUrl\n    completeBlock:(completeBlock_t)completeBlock\n\
    \    errorBlock:(errorBlock_t)errorBlock;\n\n- (id)initWithRequest:(NSString *)requestUrl\n\
    \    completeBlock:(completeBlock_t)completeBlock\n    errorBlock:(errorBlock_t)errorBlock;\n\
    @end\n```\n\n## `ASyncURLConnection.m`\n\n```objectivec\n#import \"ASyncURLConnection.h\"\
    \n\n@implementation ASyncURLConnection\n\n+ (id)request:(NSString *)requestUrl\n\
    \    completeBlock:(completeBlock_t)completeBlock\n    errorBlock:(errorBlock_t)errorBlock\n\
    {\n     /*\n      * 如果禁用了 ARC，\n      * 此方法应在调用 autorelease 后返回对象：\n      *  \
    \        * id obj = [[[self alloc] initWithRequest:requestUrl\n      *   completeBlock:completeBlock\
    \ errorBlock:errorBlock];\n      * return [obj autorelease];\n      *\n      *\
    \ 由于此方法名不以 alloc/new/copy/mutableCopy 开头，\n      * 返回的对象已自动注册到 autoreleasepool\
    \ 中。\n      */\n\n    return [[self alloc] initWithRequest:requestUrl\n      \
    \  completeBlock:completeBlock errorBlock:errorBlock];\n}\n\n- (id)initWithRequest:(NSString\
    \ *)requestUrl\n    completeBlock:(completeBlock_t)completeBlock\n    errorBlock:(errorBlock_t)errorBlock\n\
    {\n    NSURL *url = [NSURL URLWithString:requestUrl];\n    NSURLRequest *request\
    \ = [NSURLRequest requestWithURL:url];\n\n    if ((self = [super initWithRequest:request\n\
    \            delegate:self startImmediately:NO])) {\n        data_ = [[NSMutableData\
    \ alloc] init];\n\n         /*\n          * 为确保安全使用传入的 Block，\n          * 调用实例方法\
    \ 'copy' 将 Block 复制到堆上。\n          */\n        completeBlock_ = [completeBlock\
    \ copy];\n        errorBlock_ = [errorBlock copy];\n\n        [self start];\n\
    \    }\n\n     /*\n      * 具有 __strong 修饰符的成员变量\n      * 拥有所创建的 NSMutableData\
    \ 类对象的所有权。\n      *\n      * 当该对象被废弃时，带有 __strong 修饰符的成员变量的强引用消失。\n      * NSMutableData\
    \ 类对象和 Block 将被自动释放。\n      *\n      * 因此，无需显式实现 dealloc 实例方法。\n      */\n\n \
    \   return self;\n}\n\n- (void)connection:(NSURLConnection *)connection\n    didReceiveResponse:(NSURLResponse\
    \ *)response\n{\n    [data_ setLength:0];\n}\n\n- (void)connection:(NSURLConnection\
    \ *)connection\n    didReceiveData:(NSData *)data\n{\n    [data_ appendData:data];\n\
    }\n\n- (void)connectionDidFinishLoading:(NSURLConnection *)connection\n{\n   \
    \  /*\n      * 执行分配给下载成功回调的 Block。\n      * 传统的委托回调可以替换为 Block。\n      */\n\n\
    \    completeBlock_(data_);\n}\n\n- (void)connection:(NSURLConnection *)connection\n\
    \    didFailWithError:(NSError *)error\n{\n     /*\n      * 执行分配给错误的 Block。\n\
    \      */\n\n    errorBlock_(error);\n}\n\n@end\n```\n\n当下载完成或发生错误时，`NSURLConnection`\
    \ 类会调用其委托对象上的方法。`ASyncURLConnection` 类继承自 `NSURLConnection` 类，并且可以将 Block 设置为下载完成和错误发生时的回调。使用这个类，应用程序的源代码可以更简洁。ARC\
    \ 能够妥善管理用于存储已下载数据的 `NSMutableData` 类对象以及用于回调的 Block。由于成员变量使用 `__strong` 修饰，你无需显式调用\
    \ `retain` 或 `release` 方法。实际上，在启用 ARC 的环境中，你也不能调用这些方法。而且，你也不需要实现 `dealloc` 实例方法。\n\
    \n即使在这段简单的源代码中，你也必须认识到 ARC、Block 和 Grand Central Dispatch 的强大之处。\n\n## 附录 B\n"
- fmt: '# Transitioning to ARC Release Notes


    - [`http://developer.apple.com/library/mac/#releasenotes/ObjectiveC/RN-TransitioningToARC/_index.html`](http://developer.apple.com/library/mac/#releasenotes/ObjectiveC/RN-TransitioningToARC/_index.html)


    # ARC Programming Guide by Apple


    When you want to know something about ARC, you should read this document first.
    If you’re reading this book before it, it is ok :-), but you should read it later.


    # LLVM Document—Automatic Reference Counting


    - [`http://clang.llvm.org/docs/AutomaticReferenceCounting.html`](http://clang.llvm.org/docs/AutomaticReferenceCounting.html)


    This document is something like the specification of ARC. When you want to make
    sure of its specification, please check this out.


    # Advanced Memory Management Programming Guide


    - [`http://developer.apple.com/library/ios/documentation/Cocoa/Conceptual/MemoryMgmt/Articles/MemoryMgmt.html`](http://developer.apple.com/library/ios/documentation/Cocoa/Conceptual/MemoryMgmt/Articles/MemoryMgmt.html)


    This is a document by Apple that explains memory management with reference counting
    in detail.


    # Getting Started: Building and Running Clang


    - [`http://clang.llvm.org/get_started.html`](http://clang.llvm.org/get_started.html)

    - Subversion repository [`http://llvm.org/svn/llvm-project/cfe/trunk`](http://llvm.org/svn/llvm-project/cfe/trunk)


    This explains how to get the source code of clang (LLVM compiler 3.0), which is
    the compiler supporting ARC. The repository of the source code is there, too.
    For example, the following source codes in the repository have the implementation
    to achieve ARC.


    - `llvm/tools/clang/lib/CodeGen/CGObjC.cpp`

    - `llvm/tools/clang/lib/CodeGen/CGObjCMac.cpp`


    # objc4 version 493.9


    - [`http://www.opensource.apple.com/source/objc4/objc4-493.9/`](http://www.opensource.apple.com/source/objc4/objc4-493.9/)


    This is an implementation of the Objective-C runtime library by Apple. The source
    code is available. The Objective-C runtime APIs that are explained in the above
    document “LLVM Document—Automatic Reference Counting” are implemented in this
    library.


    ARC-related APIs are mostly in the following file.


    - `runtime/objc-arr.mm`


    APIs that are related to the `__weak` qualifier are in:


    - `runtime/objc-weak.mm`


    # GNUstep libobjc2 version 1.5


    - [`http://gnustep.blogspot.com/2011/07/gnustep-objective-c-runtime-15-released.html`](http://gnustep.blogspot.com/2011/07/gnustep-objective-c-runtime-15-released.html)

    - [`http://thread.gmane.org/gmane.comp.lib.gnustep.general/36358`](http://thread.gmane.org/gmane.comp.lib.gnustep.general/36358)

    - [`http://svn.gna.org/viewcvs/gnustep/libs/libobjc2/1.5/`](http://svn.gna.org/viewcvs/gnustep/libs/libobjc2/1.5/)


    `libobjc2` is an implementation of the Objective-C runtime library supporting
    ARC by the GNUstep project. It is equivalent to `objc4`, that is, the Objective-C
    runtime library by Apple.


    # APPLE’S EXTENSIONS TO C


    - [`http://www.open-std.org/jtc1/sc22/wg14/www/docs/n1370.pdf`](http://www.open-std.org/jtc1/sc22/wg14/www/docs/n1370.pdf)


    This is an overview document about C language extensions that are implemented
    by Apple. We can see that the basic ideas of ARC, `__strong` qualifier and `__weak`
    qualifier, have already been implemented during the Blocks implementation.


    # BLOCKS PROPOSAL, N1451


    - [`http://www.open-std.org/jtc1/sc22/wg14/www/docs/n1451.pdf`](http://www.open-std.org/jtc1/sc22/wg14/www/docs/n1451.pdf)


    Here is a proposal of Blocks for C99, the C language specification “ISO/IEC 9899:1999(E)
    Programming Language-C (Second Edition).” It is proposed by Apple to the ISO/IEC
    JTC1/SC22/WG14 international standardization working group for the C programming
    language, an organization to standardize the C language. At this moment, there
    does not seem to be activity to add Blocks to the C standard.


    # Presentation About Blocks


    - [`http://www.open-std.org/jtc1/sc22/wg14/www/docs/n1457.pdf`](http://www.open-std.org/jtc1/sc22/wg14/www/docs/n1457.pdf)


    This is a presentation about Blocks by Apple. It seems to be used to promote Blocks
    to the WG14 working group. It is useful as an overview of Blocks.


    # Language Specification for Blocks


    - [`http://clang.llvm.org/docs/BlockLanguageSpec.txt`](http://clang.llvm.org/docs/BlockLanguageSpec.txt)


    This is a Blocks language specification included in LLVM. By reading this along
    with “Block Implementation Specification” below, you can learn how to implement
    a compiler and a runtime library supporting Blocks. If you want to make a compiler
    support Blocks, you must read this.


    # Block Implementation Specification


    - [`http://clang.llvm.org/docs/Block-ABI-Apple.txt`](http://clang.llvm.org/docs/Block-ABI-Apple.txt)


    Here is a Blocks implementation specification that is included in LLVM. When you
    have a compiler supporting Blocks, but don’t have a runtime library, you can find
    a solution by reading this.


    # libclosure version 53


    - [`http://www.opensource.apple.com/source/libclosure/libclosure-53/`](http://www.opensource.apple.com/source/libclosure/libclosure-53/)


    `libclosure` is a runtime library for Blocks by Apple. This library provides APIs
    for Blocks such as `Block_copy` and `Block_release` functions.


    # plblocks


    - [`http://code.google.com/p/plblocks/`](http://code.google.com/p/plblocks/)


    It is a runtime library to support Blocks on old OSs, which don’t support Blocks,
    such as OS X 10.5 Snow Leopard and iOS 3.0\. On the old OSs, the runtime libraries
    don’t have Block-related functions such as `Block_copy` or `Block_release`. By
    using its own implementation in `plblocks`, Blocks will work on the old OSs.


    # libdispatch version 187.5


    - [`http://www.opensource.apple.com/source/libdispatch/libdispatch-187.5/`](http://www.opensource.apple.com/source/libdispatch/libdispatch-187.5/)


    `libdispatch` is a library by Apple to provide GCD API, such as dispatch queues,
    and the like.


    # Libc version 763.11


    - [`http://www.opensource.apple.com/source/Libc/Libc-763.11/`](http://www.opensource.apple.com/source/Libc/Libc-763.11/)


    The `pthread_workqueue` API is implemented. This API stems from the GCD `pthread_workqueue`.


    API-related source codes are:


    - `pthreads/pthread.c`

    - `pthreads/pthread_workqueue.h`


    # xnu version 1699.22.81


    - [`http://www.opensource.apple.com/source/xnu/xnu-1699.22.81/`](http://www.opensource.apple.com/source/xnu/xnu-1699.22.81/)


    This is the source code of the XNU kernel, which is a core of Mac OS X and iOS.
    You can see the workqueue implementations of the XNU kernel in the following source
    code.


    - `bsd/kern/pthread_synch.c`

    - `osfmk/kern/thread.c`


    # libdispatch project page


    - [`http://libdispatch.macosforge.org/`](http://libdispatch.macosforge.org/)


    This is a `libdispatch` open source project page by Apple. You can read `libdispatch`
    mailing lists, porting information of `libdispatch` to the other OSs, and so on.


    # libdispatch Porting Project


    - [`https://www.heily.com/trac/libdispatch`](https://www.heily.com/trac/libdispatch)


    This is the project page for porting projects of `libdispatch`. It distributes
    the `libdispatch` with modifications to compile on other OSs such as the following.


    - FreeBSD

    - Linux

    - Solaris

    - Windows


    If you have to write an application for an operating system other than Mac OS
    X or iOS, I recommend using it.


