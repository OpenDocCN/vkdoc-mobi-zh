    \ `funcptr`。\n\n以类似的方式，块字面量可以赋值给 Block 类型的变量，这意味着当源代码中存在一个块字面量时，会生成一个值。该值可以赋值给\
    \ Block 类型的变量。在 Blocks 中，这个生成的值也被称为 Block。“Block” 这个术语既用于表示源代码中的块字面量本身，也用于表示由块字面量生成的值。接下来，让我们看看如何声明\
    \ Block 类型变量。\n\n```\nint (^blk)(int);\n```\n\n如果您比较之前函数指针的源代码，您会看到 Block 类型的变量声明与函数指针类型的声明相同，只是将\
