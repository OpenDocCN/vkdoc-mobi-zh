    Two Blocks use pointers to the same instance “val” of the __Block_byref_val_0
    struct, which means that multiple Blocks can share the same __block variable.
    On the other hand, one Block can share multiple __block variables as well. Multiple
    __block variables can be used by the member variables in the struct for Block
    and the arguments for the constructor are just added.


