    \ code, the Block runs in the concurrent dispatch queue."
  raw: '#### Concurrent Dispatch Queue


    Firstly, blk0 is started, and whether it finishes or not, blk1 is started, then
    regardless of whether blk1 is finished, blk2 is started, and so on. It doesn’t
    wait until the tasks are finished and multiple tasks run concurrently, but please
    note that the number of tasks running concurrently depends on the status of the
    current system; that is, iOS or OS X decides the number based on the current system
    status, such as how many tasks are in the dispatch queue, the number of CPU cores,
    or the CPU usage level. The multiple tasks can run concurrently by using multiple
    threads under the hood as shown in [Figure 7–3](#Chapter07.html#fig_7_3).


    ![images](images/9781430241164_Fig07-03.jpg)


    **Figure 7–3.** *Relationship of Serial Dispatch Queue, Concurrent Dispatch Queue,
    and threads*


    The XNU kernel, which is a core part of iOS and OS X, decides the number of threads.
    It also creates threads to execute the tasks. When a task is finished and the
    number of running tasks is decreased, the XNU kernel terminates an unneeded thread.
    Just by using a concurrent dispatch queue, the XNU kernel manages multiple threads
    perfectly to run tasks concurrently. For instance, the source code is executed
    on multiple threads as in shown in [Table 7–1](#Chapter07.html#tab_7_1).


    ![images](images/t0701.jpg)


    Let’s assume that four threads are prepared for the concurrent dispatch queue.
    At first, blk0 is started on thread0\. Next, blk1 is started on thread1, blk2
    on thread2, and blk3 on thread3\. Then, blk4 is started on thread0 because blk0
    is finished. Next, blk5 is started on thread2 because blk1 is still running on
    thread1 and blk2 is finished on thread2.


    In that manner, when a concurrent dispatch queue is used, the execution order
    depends on the tasks themselves, the system status, and so on. The order of the
    tasks isn’t constant as with a serial dispatch queue. You should use the serial
    dispatch queue when the order is important or the tasks shouldn’t be running concurrently.


    Now we know that there are two types of dispatch queues, a serial dispatch queue
    and a concurrent dispatch queue. How can we obtain these queues? You’re about
    to find out.


    ### Obtaining Dispatch Queues


    There are two ways to do that, with `dispatch_queue_create` and `main dispatch
    queue` / `global dispatch queue`. The following sections discuss both of these.


    #### dispatch_queue_create


    The dispatch_queue_create is a function for creating a dispatch queue. You can
    obtain a new dispatch queue with this function. Next, the source code shows how
    to create a serial dispatch queue. You can also create a concurrent dispatch queue
    as well. I explain it later in this section.


    `dispatch_queue_t mySerialDispatchQueue =`

    `dispatch_queue_create("com.example.gcd.MySerialDispatchQueue", NULL);`


    When you create a serial dispatch queue, it is independent of other serial queues,
    even though they all only execute one task at a time. For example, four separate
    serial queues with one task each, all started at the same time, would start executing
    simultaneously as shown in [Figure 7–4](#Chapter07.html#fig_7_4).


    ![images](images/9781430241164_Fig07-04.jpg)


    **Figure 7–4.** *Multiple Serial Dispatch Queues*


    We must know one thing related to that. When a serial dispatch queue is created
    and a task is added, the system creates one thread for each serial dispatch queue.
    If 2,000 serial dispatch queues are created, 2,000 threads are created. As I explained,
    too many threads consume too much memory and too many context switches cause the
    system to slow down as shown in [Figure 7–5](#Chapter07.html#fig_7_5).


    ![images](images/9781430241164_Fig07-05.jpg)


    **Figure 7–5.** *Problem of multiple Serial Dispatch Queues*


    That is why you should use a serial dispatch queue only to avoid inconsistent
    data (race condition) that occurs because multiple threads update the same data,
    which I explained as one of the problems of multithreaded programming ([Figure7–6](#Chapter07.html#fig_7_6)).


    ![images](images/9781430241164_Fig07-06.jpg)


    **Figure 7–6.** *Situation where a Serial Dispatch Queue should be used*


    The number of serial dispatch queues should be the same amount that you need.
    For example, when you update a database, you should create one serial dispatch
    queue for each table. When you update a file, you should create a serial dispatch
    queue for the file or for each separated file block. Don’t create too many serial
    dispatch queues even if you think that you can create more threads than using
    a concurrent dispatch queue. If the tasks don’t cause problems such as inconsistent
    data and you want to execute them concurrently, you should use a concurrent dispatch
    queue. Even if a concurrent dispatch queue is created again and again, there is
    no problem because the queues just use threads that are managed efficiently by
    the XNU kernel.


    Let’s get back to the dispatch_queue_create function. The first argument for the
    dispatch_queue_create function is the name of a serial dispatch queue. As in the
    source code, reverse-order FQDN is recommended for it. It is displayed as the
    name of the dispatch queue when you are debugging with Xcode or Instruments. The
    CrashLog that is generated when the application crashes includes that as well.
    So, it should be something understandable for you, as the application programmer,
    and not embarrassing for users. If you feel bothered, you can just use NULL. You’ll
    regret it when you debug the application, though.


    For the second argument, you should pass NULL to create a serial dispatch queue.
    To create a concurrent dispatch queue, pass DISPATCH_QUEUE_CONCURRENT as follows.


    `dispatch_queue_t myConcurrentDispatchQueue = dispatch_queue_create(`

    `    "com.example.gcd.MyConcurrentDispatchQueue",  DISPATCH_QUEUE_CONCURRENT);`


    The return type of the dispatch_queue_create function is dispatch_queue_t, which
    is a variable type for dispatch queues. In all the previous examples, a variable
    “queue” is a dispatch_queue_t type.


    `dispatch_queue_t myConcurrentDispatchQueue = dispatch_queue_create(`

    `    "com.example.gcd.MyConcurrentDispatchQueue", DISPATCH_QUEUE_CONCURRENT);`


    `dispatch_async(myConcurrentDispatchQueue,`

    `    ^{NSLog(@"block on myConcurrentDispatchQueue");});`


    In this source code, the Block runs in the concurrent dispatch queue.'
  trans: "\n#### 并发调度队列\n\n首先启动 `blk0`，无论它是否完成，都会启动 `blk1`，接着无论 `blk1` 是否结束，都会启动 `blk2`，以此类推。它不会等待任务完成，多个任务会同时运行，但请注意，并发运行的任务数量取决于当前系统的状态；也就是说，iOS\
    \ 或 OS X 会根据当前系统状态（例如调度队列中的任务数量、CPU 核心数或 CPU 使用率）来决定数量。多个任务可以通过底层使用多线程同时运行，如图\
    \ 7-3 所示。\n\n![images](img/9781430241164_Fig07-03.jpg)\n\n**图 7-3.** *串行调度队列、并发调度队列与线程的关系*\n\
    \niOS 和 OS X 的核心部分——XNU 内核负责决定线程数量，并创建线程来执行任务。当一个任务完成、运行中的任务数量减少时，XNU 内核会终止不再需要的线程。只需使用并发调度队列，XNU\
    \ 内核就能完美地管理多个线程以同时运行任务。例如，源代码会像表 7-1 所示那样在多个线程上执行。\n\n![images](img/t0701.jpg)\n\
    \n假设并发调度队列准备了四个线程。首先，`blk0` 在 `thread0` 上启动。接着，`blk1` 在 `thread1` 上启动，`blk2` 在\
    \ `thread2` 上启动，`blk3` 在 `thread3` 上启动。然后，由于 `blk0` 已完成，`blk4` 在 `thread0` 上启动。接下来，由于\
    \ `blk1` 仍在 `thread1` 上运行，而 `blk2` 已在 `thread2` 上完成，`blk5` 在 `thread2` 上启动。\n\n\
    以这种方式，当使用并发调度队列时，执行顺序取决于任务本身、系统状态等因素。任务的顺序不像串行调度队列那样固定。当执行顺序很重要或任务不应同时运行时，应使用串行调度队列。\n\
    \n现在我们知道有两种类型的调度队列：串行调度队列和并发调度队列。如何获取这些队列呢？即将揭晓。\n\n### 获取调度队列\n\n有两种方法：使用 `dispatch_queue_create`\
    \ 以及使用 `主调度队列` / `全局调度队列`。下面将讨论这两种方法。\n\n#### dispatch_queue_create\n\n`dispatch_queue_create`\
    \ 是一个用于创建调度队列的函数。通过此函数，你可以获取一个新的调度队列。接下来，源代码展示了如何创建串行调度队列，当然也可以创建并发调度队列，稍后会在本节中说明。\n\
    \n```\ndispatch_queue_t mySerialDispatchQueue =\ndispatch_queue_create(\"com.example.gcd.MySerialDispatchQueue\"\
    , NULL);\n```\n\n当你创建一个串行调度队列时，它与其他串行队列相互独立，即便它们每次只执行一个任务。例如，四个独立的串行队列各自有一个任务，如果同时启动，它们会同时开始执行，如图\
    \ 7-4 所示。\n\n![images](img/9781430241164_Fig07-04.jpg)\n\n**图 7-4.** *多个串行调度队列*\n\
    \n有一点我们必须了解。当创建一个串行调度队列并添加任务时，系统会为每个串行调度队列创建一个线程。如果创建了 2000 个串行调度队列，就会创建 2000\
    \ 个线程。正如我所解释的，线程过多会消耗过多内存，过多的上下文切换会导致系统变慢，如图 7-5 所示。\n\n![images](img/9781430241164_Fig07-05.jpg)\n\
    \n**图 7-5.** *多个串行调度队列的问题*\n\n这就是为什么只应在避免因多线程更新同一数据而导致的**数据不一致**（竞态条件）时使用串行调度队列，这曾是我提到的多线程编程问题之一（图\
    \ 7-6）。\n\n![images](img/9781430241164_Fig07-06.jpg)\n\n**图 7-6.** *应使用串行调度队列的情形*\n\
    \n串行调度队列的数量应与实际需求相同。例如，更新数据库时，应为每个表创建一个串行调度队列。更新文件时，应为该文件或每个单独的文件块创建一个串行调度队列。即使你认为可以比使用并发调度队列创建更多线程，也不要创建过多的串行调度队列。如果任务不会引起数据不一致等问题，并且你希望它们并发执行，则应使用并发调度队列。即使反复创建并发调度队列，也不会有问题，因为这些队列只是使用由\
    \ XNU 内核有效管理的线程。\n\n让我们回到 `dispatch_queue_create` 函数。该函数的第一个参数是串行调度队列的名称。如源代码所示，建议使用反向\
    \ DNS 格式的完全限定域名。当你在 Xcode 或 Instruments 中调试时，它会显示为调度队列的名称。应用程序崩溃时生成的崩溃日志也包含该名称。因此，这个名称对你作为应用程序开发者来说应该是可理解的，并且对用户来说也不会造成困扰。如果你觉得麻烦，可以直接使用\
    \ `NULL`，但在调试应用程序时你可能会后悔这个决定。\n\n至于第二个参数，要创建串行调度队列，应传递 `NULL`。要创建并发调度队列，则像下面这样传递\
    \ `DISPATCH_QUEUE_CONCURRENT`。\n\n```\ndispatch_queue_t myConcurrentDispatchQueue\
    \ = dispatch_queue_create(\n    \"com.example.gcd.MyConcurrentDispatchQueue\"\
    ,  DISPATCH_QUEUE_CONCURRENT);\n```\n\n`dispatch_queue_create` 函数的返回类型是 `dispatch_queue_t`，这是用于调度队列的变量类型。在之前的所有例子中，变量\
    \ `queue` 都是 `dispatch_queue_t` 类型。\n\n```\ndispatch_queue_t myConcurrentDispatchQueue\
    \ = dispatch_queue_create(\n    \"com.example.gcd.MyConcurrentDispatchQueue\"\
    , DISPATCH_QUEUE_CONCURRENT);\n\ndispatch_async(myConcurrentDispatchQueue,\n \
    \   ^{NSLog(@\"block on myConcurrentDispatchQueue\");});\n```\n\n在这段源代码中，Block\
    \ 会在并发调度队列中运行。\n"
- fmt: "Unfortunately, although the compiler has a great automatic memory management\
    \ mechanism, ARC, application programmers have to release created dispatch queues\
    \ manually because a dispatch queue, unlike a Block, isn’t treated as an Objective-C\
    \ object. When you no longer need it, you have to call the `dispatch_release`\
    \ function to release the dispatch queue that is created by `dispatch_queue_create`\
    \ function.\n\n`dispatch_release(mySerialDispatchQueue);`\n\nAs the name contains\
    \ “release”, the `dispatch_retain` function is there as well.\n\n`dispatch_retain(myConcurrentDispatchQueue);`\n\
    \nThis means that dispatch queues have to be managed by the `dispatch_retain`\
    \ and `dispatch_release` functions with the reference counting technique as for\
    \ objects in Objective-C. In the previous source code, the concurrent dispatch\
    \ queue that is created by the `dispatch_queue_create` function and is assigned\
    \ to the variable `myConcurrentDispatchQueue` has to be released.\n\n```\ndispatch_queue_t\
    \ myConcurrentDispatchQueue = dispatch_queue_create(\n    \"com.example.gcd.MyConcurrentDispatchQueue\"\
    , DISPATCH_QUEUE_CONCURRENT);\n\ndispatch_async(myConcurrentDispatchQueue,\n \
    \   ^{NSLog(@\"block on myConcurrentDispatchQueue\");});\n\ndispatch_release(myConcurrentDispatchQueue);\n\
    ```\n\nA concurrent dispatch queue executes tasks using multiple threads. In this\
    \ example, the concurrent dispatch queue is released by the `dispatch_release`\
    \ function just after a Block is added by the `dispatch_async` function. Does\
    \ it work safely?\n\nIt works just fine. When a Block is added to a dispatch queue\
    \ by a `dispatch_async` function, say, the Block has ownership of the dispatch\
    \ queue by the `dispatch_retain` function. It is the same for both a serial and\
    \ a concurrent dispatch queue. Then, when it finishes the execution of the Block,\
    \ the Block releases the dispatch queue by the `dispatch_release` function.\n\n\
    Even if a dispatch queue is released just after a Block is added to the dispatch\
    \ queue by the `dispatch_async` function, the dispatch queue still isn’t disposed\
    \ of and the Block can be executed. After the Block is finished, the Block releases\
    \ the dispatch queue and it is discarded. The `dispatch_retain` and `dispatch_release`\
    \ functions are not only for dispatch queues. From now on, we will see many GCD\
    \ APIs that contain “create” in their names. When you get something from these\
    \ APIs, you have to release them with the `dispatch_release` function when you\
    \ don’t need them anymore. When you get them via some other method, you have to\
    \ take ownership by the `dispatch_retain` function and you have to release them\
    \ by the `dispatch_release` function.\n\n## Main Dispatch Queue/Global Dispatch\
    \ Queue\n\nThe other way to obtain a dispatch queue is to get a dispatch queue\
    \ that the system has already provided. Actually, the system has dispatch queues\
    \ that you don’t create: the main dispatch and global dispatch queues.\n\nThe\
    \ main dispatch queue is, as “main” is in its name, a queue to execute tasks on\
    \ the main thread. As there exists only one main thread, the main dispatch queue\
    \ is a serial dispatch queue. Tasks in the main dispatch queue are executed in\
    \ RunLoop on the main thread as shown in [Figure 7–7](#Chapter07.html#fig_7_7).\
    \ Because they are executed on the main thread, you should use it for tasks that\
    \ must be done on the main thread such as updating the user interface, and the\
    \ like. It is just like the `performSelectorOnMainThread` instance method of the\
    \ `NSObject` class.\n\n![images](images/9781430241164_Fig07-07.jpg)\n\n**Figure\
    \ 7–7.** *Main Dispatch Queue*\n\nThe other queues that the system provides are\
    \ called global dispatch queues. They are concurrent dispatch queues that are\
    \ usable anywhere in the application. If you don’t have any specific reason, as\
    \ explained later, you don’t need to create a concurrent dispatch queue by the\
    \ `dispatch_queue_create` function in most cases. You can just obtain a global\
    \ dispatch queue and use it. There are four global dispatch queues and they each\
    \ have a different priority: high, default, low, and background. The XNU kernel\
    \ manages threads for the global dispatch queues and the threads have priorities\
    \ corresponding to each priority of the global dispatch queues. When you add tasks\
    \ to a global dispatch queue, you should choose a global dispatch queue having\
    \ the appropriate priority. The XNU kernel doesn’t assure the realtimeness for\
    \ threads. So, the priorities can be used just as a guide. For example, you should\
    \ use a background priority when you don’t much care if a task is executed. Let’s\
    \ see what types of dispatch queues are provided in the system in [Table 7–2](#Chapter07.html#tab_7_2).\n\
    \n![images](images/t0702.jpg)\n\nEach dispatch queue can be obtained as shown\
    \ in [Listing 7–1](#Chapter07.html#list_7_1).\n\n**Listing 7–1.** *Obtaining dispatch\
    \ queues*\n\n```\n /*\n  * How to get the main dispatch queue\n  */\ndispatch_queue_t\
    \ mainDispatchQueue = dispatch_get_main_queue();\n\n /*\n  * How to get a global\
    \ dispatch queue of high priority\n  */\ndispatch_queue_t globalDispatchQueueHigh\
    \ =\n        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_HIGH, 0);\n\n /*\n\
    \  * How to get a global dispatch queue of default priority\n  */\ndispatch_queue_t\
    \ globalDispatchQueueDefault =\n        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0);\n\n /*\n  * How to get a global dispatch queue of low priority\n  */\ndispatch_queue_t\
    \ globalDispatchQueueLow =\n        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_LOW,\
    \ 0);\n\n /*\n  * How to get a global dispatch queue of background priority\n\
    \  */\ndispatch_queue_t globalDispatchQueueBackground =\n        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND,\
    \ 0);\n```\n\nBy the way, if you call the `dispatch_retain` or `dispatch_release`\
    \ function on the main dispatch queue or on a global dispatch queue, nothing happens.\
    \ No problem. That is why it is easier to obtain and use a global dispatch queue\
    \ than to create, use, and release a concurrent dispatch queue yourself. Of course,\
    \ depending on your source code, if it is easier for the dispatch queue to be\
    \ treated as it is created by the `dispatch_queue_create` function, you can follow\
    \ the concept of reference counting rules and call the `dispatch_retain` or `dispatch_release`\
    \ function even for the main dispatch queue or a global dispatch queue.\n\nAt\
    \ the end of this section, there is an example of how to use the main dispatch\
    \ queue and global dispatch queues as shown in [Listing 7–2](#Chapter07.html#list_7_2).\n\
    \n**Listing 7–2.** *Executing tasks*\n\n```\n /*\n  * Execute a Block on a global\
    \ dispatch queue of default priority.\n  */\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^{\n\n     /*\n      * some tasks here to be executed concurrently\n   \
    \   */\n\n     /*\n      * Then, execute a Block on the main dispatch queue\n\
    \      */\n\n    dispatch_async(dispatch_get_main_queue(), ^{\n\n         /*\n\
    \          * Here, some tasks that can work only on the main thread.\n       \
    \   */\n    });\n\n});\n```\n\nWe’ve learned the basics of GCD for making tasks\
    \ run in parallel. In the following section, I explain APIs to control the queues\
    \ to make them more useful.\n\n## Controlling Dispatch Queues\n\nGCD also provides\
    \ many useful APIs to control the tasks in the dispatch queues. Let’s see the\
    \ APIs one by one to explore how GCD is so powerful."
