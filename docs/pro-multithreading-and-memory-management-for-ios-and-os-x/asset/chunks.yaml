  raw: '### Reference Count


    In this book, the number of reference counts itself is intentionally not explained
    much because to have the correct perspective on reference counting, you should
    not care for the number itself. If you still want to know the actual number, you
    can find it with:


    `uintptr_t _objc_rootRetainCount(id obj)`


    By calling the _objc_rootRetainCount function, you can get the reference count
    number. Let’s see an example.


    `{`

    `    id __strong obj = [[NSObject alloc] init];`

    `    NSLog(@"retain count = %d", _objc_rootRetainCount(obj));`

    `}`


    In the source code, the variable obj only has a strong reference. So, it displays:


    `retain count = 1`


    Let’s check it with the__weak ownership qualifier as well.


    `{`

    `    id __strong obj = [[NSObject alloc] init];`

    `    id __weak o = obj;`

    `    NSLog(@"retain count = %d", _objc_rootRetainCount(obj));`

    `}`


    A variable qualified with __weak does not have ownership, so the value should
    not be changed.


    `retain count = 1`


    Yes, it is just as we expected. How about this with __autoreleasing?


    `@autoreleasepool {`

    `    id __strong obj = [[NSObject alloc] init];`

    `    id __autoreleasing o = obj;`

    `    NSLog(@"retain count = %d", _objc_rootRetainCount(obj));`

    `}`


    The result is:


    `retain count = 2`


    It is two due to a strong reference and having been added to an autorelease pool.
    Let’s see the value after leaving @autoreleasepool block.


    `{`

    `    id __strong obj = [[NSObject alloc] init];`

    `    @autoreleasepool {`

    `        id __autoreleasing o = obj;`

    `        NSLog(@"retain count = %d in @autoreleasepool", _objc_rootRetainCount(obj));`

    `    }`

    `    NSLog(@"retain count = %d", _objc_rootRetainCount(obj));`

    `}`


    Here is the result.


    `retain count = 2 in @autoreleasepool`

    `retain count = 1`


    The object is released as expected.


    Also, let’s confirm that an object will be added to an autorelease pool, when
    the object is used through a variable qualified with __weak. We can see the status
    of autorelease pool by objc_autoreleasePoolPrint function.


    `@autoreleasepool {`

    `    id __strong obj = [[NSObject alloc] init];`

    `    _objc_autoreleasePoolPrint();`

    `    id __weak o = obj;`

    `    NSLog(@"before using __weak: retain count = %d", _objc_rootRetainCount(obj));`

    `    NSLog(@"class = %@", [o class]);`

    `    NSLog(@"after using __weak: retain count = %d", _objc_rootRetainCount(obj));`

    `    _objc_autoreleasePoolPrint();`

    `}`


    The result is:


    `objc[14481]: ##############`

    `objc[14481]: AUTORELEASE POOLS for thread 0xad0892c0`

    `objc[14481]: 1 releases pending.`

    `objc[14481]: [0x6a85000]  ................  APAGE  (hot) (cold)`

    `objc[14481]: [0x6a85028]  ################  POOL 0x6a85028`

    `objc[14481]: ##############`

    `before using __weak: retain count = 1`

    `class = NSObject`

    `after using __weak: retain count = 2`

    `objc[14481]: ##############`

    `objc[14481]: AUTORELEASE POOLS for thread 0xad0892c0`

    `objc[14481]: 2 releases pending.`

    `objc[14481]: [0x6a85000]  ................  PAGE  (hot) (cold)`

    `objc[14481]: [0x6a85028]  ################  POOL 0x6a85028`

    `objc[14481]: [0x6a8502c]         0x6719e40  NSObject`

    `objc[14481]: ##############`


    The above result shows that the object is added to an autorelease pool, when the
    object is used via a __weak qualified variable, even without using __autoreleasing.


    As a side note, _objc_rootRetainCount function does not actually return a reliable
    number every time. In some cases, it might return 1 even for a discarded object
    or invalid address. Also, if the object is used in multiple threads, the number
    might not be accurate because of a race condition problem.^([2](#Chapter03.html#CHP-3-FN-2))
    Although the _objc_rootRetainCount function is helpful for debugging, be careful
    when using it.


    ### Summary


    In [Chapter 1](#Chapter01.html#ch1), we learned reference counting memory management.
    In [Chapter 2](#Chapter02.html#ch2), we learned what is changed when ARC is enabled
    and what rules you must follow. And, in this chapter, we learned how ARC is implemented
    by seeing the pseudo codes.


    Now you have learned about ARC. Please take advantage of it effectively in your
    development on OSX and iOS.


    __________


    ² Wikipedia, “Race condition,” [`http://en.wikipedia.org/wiki/Race_condition`](http://en.wikipedia.org/wiki/Race_condition)


    ## Chapter 4


    ## Getting Started with Blocks


    Blocks are Clanguage extensions introduced for OSX Snow Leopard, iOS4, or later.
    This chapter shows what Blocks are in detail so that their implementation (covered
    in the next chapter) will hold more meaning. Checking the implementation leads
    to an understanding of how to use them and how they work. To put Blocks in perspective,
    consider the following scenario.


    When you read iOS or OSX application source code, you might find some strange
    sentences in it. Such sentences have function declarations inside a function.
    In our experience this syntax has not been found previously with C and Objective-C.
    The GameKit component (new in iOS4) uses the syntax quite often to make the application
    source code elegant. Let’s see an example of it.


    `- (void)reportScore:(int64_t)score forCategory:(NSString*)category`

    `{`

    `        /* snip */`

    `        [scoreReporter reportScoreWithCompletionHandler:^(NSError *error) {  `

    `                    /* Tasks to be executed just after the score is reported
    */`

    `                if (error != nil)`

    `                 {`

    `                    /* Tasks to be executed when an error is occurred while reporting
    */`

    `                }`

    `        }]`

    `}`


    This example shows how to use the GameKit API to report a game score. The most
    important thing for users is to know whether the score has been successfully reported
    to the server. The application has to watch it finish and check if an error occurred.
    In such cases, it is very helpful for tasks to be specified to execute automatically
    when the reporting is done. Also it is more convenient if you can write those
    tasks quite easily.


    In the GameKit component, you can do that by using Blocks. Blocks is where the
    comment, “Tasks to be executed just after the score is reported” is written in
    the example. This part is executed just after the reporting score is finished
    and not after the reportScoreWithCompletionHandler: method is called. As in the
    example, you don’t have to monitor when the reporting is finished and you can
    write the tasks very elegantly by using Blocks.


    In this chapter, you will learn how to use Blocks. We will start with learning
    what is a Block and why Blocks are needed. Then, we will learn how to use Blocks
    in your application, such as how to write Blocks literally and how you can use
    variables in the Block (as found in the source code example).


    ### Blocks Primer


    As noted, Blocks are a new extension for the C language. In short, they can be
    explained as “anonymous functions together with automatic (local) variables.”
    Let’s take a quick look at these two pieces and how they are implemented.'
