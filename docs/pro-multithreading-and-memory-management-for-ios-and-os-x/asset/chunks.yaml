    \ The syntax of Block literal is explained with examples. After reading this,\
    \ you should be able to write Block literals.\n\nFirst, let’s see how to declare\
    \ a function in C.\n\n```\nvoid func(int event) {\n    printf(\"buttonId:%d event=%d\\\
    n\", i, event);\n}\n```\n\nwhich means it is declared by the return type, function\
    \ name, argument list, and its implementation. Let’s see how a Block literal is\
    \ written. In previous sections, a Block literal was written in an abbreviated\
    \ form as\n\n```\n^(int event) {\n    printf(\"buttonId:%d event=%d\\n\", i, event);\n\
    }\n```\n\nYou can also write it in full as\n\n```\n^void (int event) {\n    printf(\"\
    buttonId:%d event=%d\\n\", i, event);\n}\n```\n\nThere are only two differences\
    \ between this Block literal and a function declaration in C: there is no function\
    \ name and there is a caret symbol (`^`).\n\nBlock literal has no name for the\
    \ function. It makes it an anonymous function. The second one means that for Block\
    \ literal, a `^` (caret) is written just before the return type of the function.\
    \ It is very probable that you will see this symbol more often from now on because\
    \ Blocks will become common in OSX and iOS applications.\n\nAs confirmation, the\
    \ following is a BNF of Block literal syntax.^([1](#Chapter04.html#CHP-4-FN-1))\n\
    \n```\nBlock_literal_expression ::= ^ block_decl compound_statement_body\nblock_decl\
    \ ::= return_type\nblock_decl ::= parameter_list\nblock_decl ::= type_expression\n\
    ```\n\nEven if you have no idea about BNF, you might be able to guess what it\
    \ means. Please see [Figure 4–1](#Chapter04.html#fig_4_1).\n\n![images](images/9781430241164_Fig04-01.jpg)\n\
    \n**Figure 4–1.** *Block literal syntax*\n\nThe return type is just same as that\
    \ of a function declaration in C. The parameter list and expressions are also\
    \ the same. Of course the return type has to match its “return” sentence if there\
    \ is one. For example, we can use a Block literal as follows.\n\n```\n^int (int\
    \ count){return count + 1;}\n```\n\nAs in the previous example, some items can\
    \ be omitted. First, you can omit the return type as shown in [Figure 4–2](#Chapter04.html#fig_4_2).\n\
    \n![images](images/9781430241164_Fig04-02.jpg)\n\n**Figure 4–2.** *Block literal\
    \ syntax without return type*\n\nWhen the return type is omitted, the variable\
    \ type in the return sentence is used instead. When the Block literal doesn’t\
    \ have a return sentence, `void` is used. When the Block has multiple return sentences,\
    \ all of their variable types must be the same. When the return type is omitted,\
    \ it is written as\n\n```\n^(int count){return count + 1;}\n```\n\nIn this Block\
    \ literal, the return type is `int` because of its return sentence.\n\n__________\n\
    \n¹ Wikipedia, “Backus—Naur Form” [`http://en.wikipedia.org/wiki/Backus-Naur_Form`](http://en.wikipedia.org/wiki/Backus-Naur_Form)\n\
    \nIf the function takes no arguments, the argument list can be omitted as well.\
    \ The next source code is an example of a Block with no argument.\n\n```\n^void\
    \ (void){printf(\"Blocks\\n\");}\n```\n\nThis can be abbreviated as follows.\n\
    \n```\n^{printf(\"Blocks\\n\");}\n```\n\nThis abbreviated Block literal ([Figure\
    \ 4–3](#Chapter04.html#fig_4_3)) will prove to be the most familiar form for you.\n\
    \n![images](images/9781430241164_Fig04-03.jpg)\n\n**Figure 4–3.** *Block literal\
    \ syntax without return type and argument list*\n\n### Block type variables\n\n\
    As we’ve learned, a Block literal looks the same as a function definition except\
    \ it has no name and it has the `^` symbol. For the C function, the address of\
    \ the function can be assigned to a variable of the function pointer type.\n\n\
    ```\nint func(int count)\n{\n    return count + 1;\n}\nint (*funcptr)(int) = &func;\n\
    ```\n\nIn the example, the address of function `func` is assigned to a variable\
    \ `funcptr`.\n\nIn a similar manner, a Block literal can be assigned to a Block-type\
    \ variable, which means that when a Block literal is in source code, a value is\
    \ generated. The value can be assigned to a variable of the Block type. In Blocks,\
    \ the generated value is called Block as well. “Block” is used both for a Block\
    \ literal itself in a source code and the value generated from the Block literal.\
    \ Next, let’s see how to declare Block-type variables.\n\n```\nint (^blk)(int);\n\
    ```\n\nIf you compare the previous source code of a function pointer, you will\
    \ see that the variable declaration of the Block type is the same as that of the\
    \ function pointer type except for `*` and `^`. Just as with normal C variable\
    \ types, this declaration can be used for:\n\n*   Automatic variables\n*   Function\
    \ arguments\n*   Static variables\n*   Static global variables\n*   Global variables\n\
    \nNext, let’s see how you can assign a Block to the variable from a Block literal.\n\
    \n```\nint (^blk)(int) = ^(int count){return count + 1;};\n```\n\nA Block is generated\
    \ from the Block literal starting with `^`. And the Block is assigned to the variable\
    \ `blk`. Of course you can assign the value to other variables of the Block type.\n\
    \n```\nint (^blk1)(int) = blk;\nint (^blk2)(int);\nblk2 = blk1;\n```\n\nFunctions\
    \ can take arguments of Block type.\n\n```\nvoid func(int (^blk)(int))\n{\n```\n\
    \nAlso, functions can return a Block.\n\n```\nint (^func()(int))     {\n    return\
    \ ^(int count){return count + 1;};\n}\n```\n\nAs you’ve seen, source code with\
    \ a Block type becomes complex, especially when it is used for function arguments\
    \ or its return type. You can avoid the complexity by using `typedef` as is done\
    \ for function pointers.\n\n```\ntypedef int (^blk_t)(int);\n```\n\nWith this\
    \ `typedef`, you can declare variables of `blk_t` type. So, the previous source\
    \ code can be modified as follows.\n\n```\n/* original\nvoid func(int (^blk)(int))\n\
    */\nvoid func(blk_t blk)\n{\n\n/* original\nint (^func()(int))\n*/\nblk_t func()\n\
    {\n```\n\nWith the `typedef`, the function definitions become very simple.\n\n\
    Incidentally, you can execute a Block, which is assigned in a variable, the same\
    \ way you call a function and you can execute the Block in almost the same way\
    \ as calling a function that is assigned to a variable. A variable `funcptr` of\
    \ a function pointer type is called as\n\n```\nint result = (*funcptr)(10);\n\
    ```\n\nA variable `blk` of a Block type can be called as\n\n```\nint result =\
    \ blk(10);\n```\n\nAs you see, you can call a Block-type variable in exactly the\
    \ same way as a C function. The next example shows how to execute a Block, which\
    \ is passed by the argument of a function.\n\n```\nint func(blk_t blk, int rate)\n\
    {\n    return blk(rate);\n}\n```\n\nOf course, a Block can be used with the Objective-C\
    \ method as well.\n\n```\n- (int) methodUsingBlock:(blk_t)blk rate:(int)rate \
    \    {\n        return blk(rate);\n}\n```\n\nYou can use Block-type variables\
    \ in the same way as variables in C. You can also use a pointer to Block-type\
    \ variables, meaning that you can use variables of Block pointer type.\n\n```\n\
    typedef int (^blk_t)(int);\nblk_t blk = ^(int count){return count + 1;};\nblk_t\
    \ *blkptr = &blk;\n(*blkptr)(10);\n```"
  raw: '### Block Literal Syntax


    This section shows how to write Block literal. The syntax of Block literal is
    explained with examples. After reading this, you should be able to write Block
    literals.


    First, let’s see how to declare a function in C.


    `void  func(int event) {`

    `    printf("buttonId:%d event=%d\n", i, event);`

    `}`


    which means it is declared by the return type, function name, argument list, and
    its implementation. Let’s see how a Block literal is written. In previous sections,
    a Block literal was written in an abbreviated form as


    `^(int event) {`

    `    printf("buttonId:%d event=%d\n", i, event);`

    `}`


    You can also write it in full as


    `^void (int event) {`

    `    printf("buttonId:%d event=%d\n", i, event);`

    `}`


    There are only two differences between this Block literal and a function declaration
    in C: there is no function name and there is a caret symbol (^).


    Block literal has no name for the function. It makes it an anonymous function.
    The second one means that for Block literal, a ^ (caret) is written just before
    the return type of the function. It is very probable that you will see this symbol
    more often from now on because Blocks will become common in OSX and iOS applications.


    As confirmation, the following is a BNF of Block literal syntax.^([1](#Chapter04.html#CHP-4-FN-1))


    `Block_literal_expression ::= ^ block_decl compound_statement_body`

    `block_decl ::= return_type`

    `block_decl ::= parameter_list    `

    `block_decl ::= type_expression`


    Even if you have no idea about BNF, you might be able to guess what it means.
    Please see [Figure 4–1](#Chapter04.html#fig_4_1).


    ![images](images/9781430241164_Fig04-01.jpg)


    **Figure 4–1.** *Block literal syntax*


    The return type is just same as that of a function declaration in C. The parameter
    list and expressions are also the same. Of course the return type has to match
    its “return” sentence if there is one. For example, we can use a Block literal
    as follows.


    `^int (int count){return count + 1;}`


    As in the previous example, some items can be omitted. First, you can omit the
    return type as shown in [Figure 4–2](#Chapter04.html#fig_4_2).


    ![images](images/9781430241164_Fig04-02.jpg)


    **Figure 4–2.** *Block literal syntax without return type*


    When the return type is omitted, the variable type in the return sentence is used
    instead. When the Block literal doesn’t have a return sentence, “void” is used.
    When the Block has multiple return sentences, all of their variable types must
    be the same. When the return type is omitted, it is written as


    `^(int count){return count + 1;}`


    In this Block literal, the return type is int because of its return sentence.


    __________


    ¹ Wikipedia, “Backus—Naur Form” [`http://en.wikipedia.org/wiki/Backus-Naur_Form`](http://en.wikipedia.org/wiki/Backus-Naur_Form)


    If the function takes no arguments, the argument list can be omitted as well.
    The next source code is an example of a Block with no argument.


    `^void (void){printf("Blocks\n");}`


    This can be abbreviated as follows.


    `^{printf("Blocks\n");}`


    This abbreviated Block literal ([Figure 4–3](#Chapter04.html#fig_4_3)) will prove
    to be the most familiar form for you.


    ![images](images/9781430241164_Fig04-03.jpg)


    **Figure 4–3.** *Block literal syntax without return type and argument list*


    ### Block type variables


    As we’ve learned, a Block literal looks the same as a function definition except
    it has no name and it has the “^” symbol. For the C function, the address of the
    function can be assigned to a variable of the function pointer type.


    `int func(int count)`

    `{`

    `    return count + 1;`

    `}`

    `int (*funcptr)(int) = &func;`


    In the example, the address of function “func” is assigned to a variable “funcptr”.


    In a similar manner, a Block literal can be assigned to a Block-type variable,
    which means that when a Block literal is in source code, a value is generated.
    The value can be assigned to a variable of the Block type. In Blocks, the generated
    value is called Block as well. “Block” is used both for a Block literal itself
    in a source code and the value generated from the Block literal. Next, let’s see
    how to declare Block-type variables.


    `int (^blk)(int);`


    If you compare the previous source code of a function pointer, you will see that
    the variable declaration of the Block type is the same as that of the function
    pointer type except for “*” and “^”. Just as with normal C variable types, this
    declaration can be used for:


    *   Automatic variables

    *   Function arguments

    *   Static variables

    *   Static global variables

    *   Global variables


    Next, let’s see how you can assign a Block to the variable from a Block literal.


    `int (^blk)(int) = ^(int count){return count + 1;};`


    A Block is generated from the Block literal starting with “^”. And the Block is
    assigned to the variable “blk”. Of course you can assign the value to other variables
    of the Block type.


    `int (^blk1)(int) = blk;`


    `int (^blk2)(int);`

    `blk2 = blk1;`


    Functions can take arguments of Block type.


    `void func(int (^blk)(int))`

    `{`


    Also, functions can return a Block.


    `int (^func()(int))     {`

    `    return ^(int count){return count + 1;};`

    `}`


    As you’ve seen, source code with a Block type becomes complex, especially when
    it is used for function arguments or its return type. You can avoid the complexity
    by using typedef as is done for function pointers.


    `typedef int (^blk_t)(int);`


    With this typedef, you can declare variables of “blk_t” type. So, the previous
    source code can be modified as follows.


    `/* original`

    `void func(int (^blk)(int))`

    `*/`


    `void func(blk_t blk)`

    `{`


    `/* original`

    `int (^func()(int))`

    `*/`


    `blk_t func()`

    `{`


    With the typedef, the function definitions become very simple.


    Incidentally, you can execute a Block, which is assigned in a variable, the same
    way you call a function and you can execute the Block in almost the same way as
    calling a function that is assigned to a variable. A variable “funcptr” of a function
    pointer type is called as


    `int result = (*funcptr)(10);`


    A variable “blk” of a Block type can be called as


    `int result = blk(10);`


    As you see, you can call a Block-type variable in exactly the same way as a C
    function. The next example shows how to execute a Block, which is passed by the
    argument of a function.


    `int func(blk_t blk, int rate)`

    `{`

    `    return blk(rate);`

    `}`


    Of course, a Block can be used with the Objective-C method as well.


    `- (int) methodUsingBlock:(blk_t)blk rate:(int)rate     {`

    `        return blk(rate);`

    `}`


    You can use Block-type variables in the same way as variables in C. You can also
    use a pointer to Block-type variables, meaning that you can use variables of Block
    pointer type.


    `typedef int (^blk_t)(int);`

    `blk_t blk = ^(int count){return count + 1;};`

    `blk_t *blkptr = &blk;`

    ` (*blkptr)(10);`'
