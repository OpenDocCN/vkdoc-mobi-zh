    \ 1 */\n\n    p = [obj retain];\n    /* [obj retainCount] -> 2 */\n\n    [obj\
    \ release];\n    /* [obj retainCount] -> 1 */\n}\n\n     /*\n      * [(id)p retainCount]\
    \ -> 1\n      * 这意味着，\n      * [obj retainCount] -> 1\n      * 所以，该对象仍然存在。\n \
    \     */\n\nNSLog(@\"class=%@\", [(__bridge id)p class]);\n```\n\n相反地，`__bridge_transfer`\
