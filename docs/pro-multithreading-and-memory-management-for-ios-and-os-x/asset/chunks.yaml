    \    });\n}\n\n /*\n  * 通常，由于不再需要该调度信号量，\n  * 你需要释放它。\n  *\n  * dispatch_release(semaphore);\n\
    \  */\n```\n\n接下来，让我们看看 `dispatch_once` 函数。\n\n#### `dispatch_once`\n\n`dispatch_once`\
    \ 函数用于确保指定的任务在应用程序的生命周期内仅执行一次。以下是用于初始化某些内容的典型源代码。通过使用 `dispatch_once` 函数，可以使其变得更加优雅。\n\
    \n```\nstatic int initialized = NO;\n\nif (initialized == NO)\n{\n\n     /*\n\
    \      * 初始化\n      */\n\n    initialized = YES;\n}\n```\n\n使用 `dispatch_once`\
    \ 函数后，代码修改如下。\n\n```\nstatic dispatch_once_t pred;\n\ndispatch_once(&pred, ^{\n\
    \n     /*\n      * 初始化\n      */\n\n});\n```\n\n这两种源代码差别不大。使用 `dispatch_once`\
    \ 函数，即使在多线程环境中也能安全运行。前一种源代码在大多数情况下也是安全的。但在多核 CPU 上，存在一种微小可能性：当 `initialized` 变量的值被覆盖的同时，该变量可能被读取。这将导致初始化被执行多次。然而，如果你使用\
    \ `dispatch_once` 函数实现，就无需担心了。`dispatch_once` 函数对于创建所谓的“单例模式”中的单例对象非常有用。\n\n###\
    \ Dispatch I/O\n\n要加载一个大文件，你可能会认为，与常规方式相比，使用全局调度队列并发地将其作为小块加载会更快。就现今的 I/O 硬件而言，这可能确实如此。并发加载可能比在单个线程上加载更快。为了实现这一点，你可以使用\
    \ Dispatch I/O 和 Dispatch Data。当你使用 Dispatch I/O 读取或写入文件时，一个文件会被分割成特定大小，并在全局调度队列上进行访问。\n\
    \n```\ndispatch_async(queue, ^{/* 加载文件从 0 到 8191 字节的部分 */});\ndispatch_async(queue,\
    \ ^{/* 加载文件从 8192 到 16383 字节的部分 */});\ndispatch_async(queue, ^{/* 加载文件从 16384\
    \ 到 24575 字节的部分 */});\ndispatch_async(queue, ^{/* 加载文件从 24576 到 32767 字节的部分 */});\n\
    dispatch_async(queue, ^{/* 加载文件从 32768 到 40959 字节的部分 */});\ndispatch_async(queue,\
    \ ^{/* 加载文件从 40960 到 49151 字节的部分 */});\ndispatch_async(queue, ^{/* 加载文件从 49152\
    \ 到 57343 字节的部分 */});\ndispatch_async(queue, ^{/* 加载文件从 57344 到 65535 字节的部分 */});\n\
    ```\n\n如同上述源代码所示，加载操作会在每个分割块上进行。Dispatch Data 可以比手动操作更轻松地合并（或拆分）加载的数据。让我们看看 代码清单\
    \ 7–9 中 Apple 提供的 Dispatch I/O 和 Dispatch Data 示例。\n\n**代码清单 7–9.** *Dispatch\
    \ I/O*\n\n```\npipe_q = dispatch_queue_create(\"PipeQ\", NULL);\npipe_channel\
    \ = dispatch_io_create(DISPATCH_IO_STREAM, fd, pipe_q, ^(int err){\n        close(fd);\n\
    });\n\n*out_fd = fdpair[1];\n\ndispatch_io_set_low_water(pipe_channel, SIZE_MAX);\n\
    \ndispatch_io_read(pipe_channel, 0, SIZE_MAX, pipe_q,\n        ^(bool done, dispatch_data_t\
    \ pipedata, int err){\n    if (err == 0)\n    {\n        size_t len = dispatch_data_get_size(pipedata);\n\
    \        if (len > 0)\n        {\n            const char *bytes = NULL;\n    \
    \        char *encoded;\n\n            dispatch_data_t md = dispatch_data_create_map(\n\
    \                pipedata, (const void **)&bytes, &len);\n            encoded\
    \ = asl_core_encode_buffer(bytes, len);\n            asl_set((aslmsg)merged_msg,\
    \ ASL_KEY_AUX_DATA, encoded);\n            free(encoded);\n            _asl_send_message(NULL,\
    \ merged_msg, -1, NULL);\n            asl_msg_release(merged_msg);\n         \
    \   dispatch_release(md);\n        }\n    }\n\n    if (done)\n    {\n        dispatch_semaphore_signal(sem);\n\
    \        dispatch_release(pipe_channel);\n        dispatch_release(pipe_q);\n\
    \    }\n});\n```\n\n这段代码取自 Apple 系统日志 API（Libc-763.11 gen/asl.c）的源代码。`dispatch_io_create`\
    \ 函数创建一个 Dispatch I/O。它指定了在发生错误时执行的 Block 以及执行该 Block 的调度队列。`dispatch_io_set_low_water`\
    \ 函数设置每次读取的大小（数据被分割成此大小）。`dispatch_io_read` 函数开始在全局调度队列上进行读取。每当其中一个分割数据块被读取时，该\
    \ Dispatch Data 将作为参数传递给在 `dispatch_io_read` 中设置为读取完成回调的 Block。因此，该 Block 可以扫描或合并这些\
    \ Dispatch Data。如果你想以比常规方式稍快的速度读取文件，请尝试使用 Dispatch I/O。\n\n### 总结\n\n在本章中，我们详细学习了如何使用\
    \ GCD API。我们还学习了：\n\n*   调度队列与线程的关系\n*   如何执行同步或异步的 Block\n*   如何避免竞态条件\n\n在下一章中，我们将展示\
    \ GCD 的实现，以便更深入地理解它。\n\n# 第 8 章\n\n# GCD 实现\n\n在本章中，我将解释 GCD 是如何实现的，以便你更好地理解其工作原理。然后我将解释\
    \ GCD 的一种称为“数据源”的功能，它与 XNU 内核事件相关。\n\n### 调度队列\n\n本节展示了 GCD 是如何实现的。我们将特别关注 GCD\
    \ 的结构，然后了解 Block 是如何在调度队列上执行的。\n"
- fmt: '#### Kernel-Level Implementation


    From its functionality, we can guess that GCD uses the following components.


    * A FIFO queue in the C language-level to manage the added Blocks

    * Lightweight semaphore for concurrency control by atomic functions

    * A container in the C language-level to manage threads


    If that is all, it doesn’t need kernel-level implementation.^([1](#Chapter08.html#CHP-8-FN-1))
    In other words, if an application programmer could write application source code
    that has the same functionality using threads, GCD seems unnecessary. Why do we
    need GCD?


    Again, let’s see what Apple says.


    > *This technology takes the thread management code you would normally write in
    your own applications and moves that code down to the system level.*


    __________


    ¹ Actually, there is an implementation of GCD ported for the common Linux operating
    system: Portable libdispatch [`https://www.heily.com/trac/libdispatch`](https://www.heily.com/trac/libdispatch)


    It says that the thread management code is in the “system level,” which means
    that it is done beyond the reach of the application programmer.


    In fact, GCD has some system-level implementations called the XNU kernel that
    is a core of iOS and OS X. An application that manages threads by the application
    programmer can never have better performance than an application using GCD that
    is implemented in the XNU kernel-level. In other words, GCD is better than normal
    multithreaded programming with `pthreads` or `NSThread`. And, with GCD, you don’t
    need to write the same code again and again (it’s called a boilerplate code).
    You can concentrate on the task itself. Only good things happen! You should just
    use the GCD or `NSOperationQueue` class in the Cocoa Framework that uses GCD under
    the hood.


    #### GCD Structure


    [Table 8–1](#Chapter08.html#tab_8_1) lists the software components that are used
    to implement dispatch queues.


    ![images](images/t0801.jpg)


    All the GCD APIs for application programmers are C language functions in the `libdispatch`
    library. A dispatch queue is a FIFO queue implemented as a struct and a linked
    list. This FIFO queue manages Blocks that are added by the `dispatch_async` function
    and the like. A Block isn’t added to a FIFO queue directly. At first it is added
    to a struct of `dispatch_continuation_t` type, called dispatch continuation, and
    then it is added to a FIFO queue. A dispatch continuation is so-called execution
    context, which stores a dispatch group with which the Block is associated, and
    so on.


    As you know, a dispatch queue can be a target by the `dispatch_set_target_queue`
    function. A dispatch queue is executed on its target dispatch queue. The targets
    can be linked in a row. The end of the link must be the main dispatch queue, one
    of the global dispatch queues, or a global dispatch queue that is prepared for
    each serial dispatch queue of various priorities. The main dispatch queue is a
    mechanism to execute Blocks in the `RunLoop`. There are not many exciting tricks
    there.


    #### Global Dispatch Queue and `pthread_workqueue`


    There are global dispatch queues as in the following list.


    * Global Dispatch Queue (High priority)

    * Global Dispatch Queue (Default priority)

    * Global Dispatch Queue (Low priority)

    * Global Dispatch Queue (Background priority)

    * Global Dispatch Queue (High overcommit priority)

    * Global Dispatch Queue (Default overcommit priority)

    * Global Dispatch Queue (Low overcommit priority)

    * Global Dispatch Queue (Background overcommit priority)


    The four queues with overcommit priority are used as serial dispatch queues. As
    the name “overcommit” suggests, these dispatch queues create threads forcibly
    regardless of the system status. Each global dispatch queue uses its own `pthread_workqueue`.
    While GCD is initialized, the `pthread_workqueue_create_np` function initializes
    the `pthread_workqueues`.


    A `pthread_workqueue` is a private pthread API in Libc. A `pthread_workqueue`
    initializes a workqueue in the XNU kernel by a `bsdthread_register` system call
    and a `workq_open` system call to get information about the workqueue. The XNU
    kernel has four workqueues.


    * `WORKQUEUE_HIGH_PRIOQUEUE`

    * `WORKQUEUE_DEFAULT_PRIOQUEUE`

    * `WORKQUEUE_LOW_PRIOQUEUE`

    * `WORKQUEUE_BG_PRIOQUEUE`


    Each workqueue has a different priority ([Figure 8–1](#Chapter08.html#fig_8_1)).
    These priorities are equivalent to the four priorities of global dispatch queues.


    ![images](images/9781430241164_Fig08-01.jpg)


    **Figure 8–1.** *Relationship of Global Dispatch Queue, `pthread_workqueue`, and
    workqueue*


    Let’s see how a Block is executed on a dispatch queue.


    #### Executing Blocks


    When a Block is executed on a global dispatch queue, `libdispatch` picks up a
    dispatch continuation from a FIFO queue, the global dispatch queue itself. It
    calls the `pthread_workqueue_additem_np` function with arguments of the global
    dispatch queue, workqueue information having the same priority as the global dispatch
    queue, and a callback function to execute the dispatch continuation. The `pthread_workqueue_additem_np`
    function notifies that an item to be executed is added to the workqueue, using
    the `workq_kernreturn` system call. When the XNU kernel gets the notification,
    it decides, based on the system status, whether it should create a thread. For
    a global dispatch queue with overcommit priority, a thread is created at any time.
    Here, the thread has almost the same meaning as a thread that is used in normal
    iOS or OS X programming, but some `pthread` APIs can’t be used. For more information,
    see the “Compatibility with POSIX Threads” section in Apple’s *Concurrency Programming
    Guide*.


    The threads for workqueues are managed by a special thread scheduler that is implemented
    specially for workqueues. Its context switch is a bit different from the normal
    thread. This is one of the reasons we should use GCD. A thread for a workqueue
    calls a `pthread_workqueue` function. The function calls a callback function in
    `libdispatch`. Then it executes a Block in the dispatch continuation. When the
    Block is finished, a dispatch group is notified, and the dispatch continuation
    is released. Finally, it prepares to execute the next Block in the global dispatch
    queue. That is the rough execution flow of a dispatch queue.


    Anyway, we’ve learned that it is impossible for an application programmer to have
    a more effective implementation than GCD.'
