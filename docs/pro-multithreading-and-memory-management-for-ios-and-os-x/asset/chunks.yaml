    accessed ([Figure 5–2](#Chapter05.html#fig_5_2)).


    ![images](images/9781430241164_Fig05-02.jpg)


    **Figure 5–2.** *Accessing __block variable*


    We get back to “forwarding” in a bit. It is explained further in the next two
    sections, “Memory Segments for Blocks” and “Memory Segments for __block Variables.”
    For now, let’s look at the member variables of the __Block_byref_val_0 struct,
    which are not included in the __main_block_impl_0 struct. The reason why __Block_byref_val_0
    struct is separated is to make the __block variable usable from more than one
    Block. Let’s see the following example.


    `__block int val = 10;`


    `void (^blk0)(void) = ^{val = 0;};`


    `void (^blk1)(void) = ^{val = 1;};`


    The variables “blk0” and “blk1” of the Block type access the __block variable
    “val”. It is converted as


    `__Block_byref_val_0 val = {0, &val, 0, sizeof(__Block_byref_val_0), 10};`


    `blk0 = &__main_block_impl_0(`

