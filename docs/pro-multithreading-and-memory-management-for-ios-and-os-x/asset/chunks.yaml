    \ 或对象类型的自动变量时，如果该变量没有 `__block` 说明符，该对象会被 retain；相反，如果有 `__block` 说明符，该对象不会被 retain。例如，无论\
    \ ARC 是否启用，以下源码都会引起循环引用，因为 Block 拥有 `self` 的所有权，而 `self` 又拥有 Block 的所有权。\n\n```\n\
    typedef void (^blk_t)(void);\n\n@interface MyObject : NSObject\n{\n    blk_t blk_;\n\
    }\n@end\n\n@implementation MyObject\n- (id)init\n{\n    self = [super init];\n\
    \    blk_ = ^{NSLog(@\"self = %@\", self);};\n    return self;\n}\n\n- (void)dealloc\n\
    {\n    NSLog(@\"dealloc\");\n}\n@end\n\nint main()\n{\n    id o = [[MyObject alloc]\
    \ init];\n    NSLog(@\"%@\", o);\n    return 0;\n}\n```\n\n对于 ARC 被禁用的环境，你可以使用\
    \ `__block` 变量来解决这个问题。\n\n```\n- (id)init {\n    self = [super init];\n    __block\
    \ id tmp = self;\n    blk_ = ^{NSLog(@\"self = %@\", tmp);};\n    return self;\n\
    }\n```\n\n它的工作方式类似于 ARC 启用环境下的 `__unsafe_unretained` 所有权修饰符。`__block` 说明符的用途在\
    \ ARC 启用和禁用时大相径庭。因此，你必须注意源码是用于 ARC 启用环境还是禁用环境。\n\n### 总结\n\n在本章中，我们深入讨论了 Block，了解了\
    \ Block 是如何通过 Clang 编译的。特别是，我们学习了：\n\n*   自动变量是如何被捕获的\n*   `__block` 变量是如何实现的\n\
    *   由于捕获对象导致的循环引用问题是如何发生的，以及如何解决它\n\n如果你将 Block 与接下来章节中要讨论的 Grand Central Dispatch\
    \ 结合使用，Block 会非常强大。\n\n## 第 6 章\n\n## Grand Central Dispatch\n\n在最后的三章中，我们将讨论\
    \ Grand Central Dispatch（GCD）。这个新特性是为 OS X Snow Leopard 和 iOS 4 或更高版本引入的，以帮助进行多线程编程。我将结合其实现来解释多线程编程将如何改变。\n\
    \n在本章中，我们首先快速看一个使用 GCD 的示例。然后，我们会回顾在当前多线程编程中 GCD 带来的好处，以及 GCD 出现之前传统的多线程编程是如何进行的。\n"
- fmt: "### Grand Central Dispatch Overview\n\nLet’s see what Apple says about Grand\
    \ Central Dispatch:\n\n> *One of the technologies for starting tasks asynchronously\
    \ is Grand Central Dispatch (GCD). This technology takes the thread management\
    \ code you would normally write in your own applications and moves that code down\
    \ to the system level. All you have to do is define the tasks you want to execute\
    \ and add them to an appropriate dispatch queue. GCD takes care of creating the\
    \ needed threads and of scheduling your tasks to run on those threads. Because\
    \ the thread management is now part of the system, GCD provides a holistic approach\
    \ to task management and execution, providing better efficiency than traditional\
    \ threads.*\n\nIt seems that Grand Central Dispatch is an innovative technology\
    \ to make multithreaded source code unbelievably elegant. Let’s see if that is\
    \ true and how it is achieved with an example. Although it is a bit abstract,\
    \ it shows the power of GCD.\n\n```\ndispatch_async(queue_for_background_threads,\
    \ ^{\n    /*\n     * Here, processing a time-consuming task\n     * such as AR\
    \ image processing, database accessing, etc.\n     */\n\n    /*\n     * The task\
    \ is completed. Then, use the result on the main thread as follows.\n     */\n\
    \n    dispatch_async(dispatch_get_main_queue(), ^{\n\n        /*\n         * Here,\
    \ tasks that work only on the main, such as\n         * updating user interface,\
    \ etc.\n         */\n    });\n});\n```\n\nThis example is for processing a time-consuming\
    \ task on a background thread and using the result on the main thread.  \n`dispatch_async(queue_for_background_threads,\
    \ ^{`  \nThis single line makes the task work on a background thread.  \n`dispatch_async(dispatch_get_main_queue(),\
    \ ^{`  \nThis single line also makes a task work on the main thread. As you can\
    \ see, carets `^` and Blocks are used to make the source code simple as we’ve\
    \ learned in the previous chapters. It seems that what Apple says is true. Next,\
    \ let’s briefly review what multithreaded source code looks like. Before GCD was\
    \ introduced, Cocoa Framework had mechanisms to support multithreaded programming,\
    \ such as `NSObject` class instance methods, `performSelectorInBackground:withObject`,\
    \ `performSelectorOnMainThread`, and so on.\n\nLet’s see how the previous example\
    \ could be written with the `performSelector` method family.\n\n```\n/*\n * Start\
    \ a task on a background thread\n * by NSObject performSelectorInBackground:withObject:\
    \ method.\n */\n- (void) launchThreadByNSObject_performSelectorInBackground_withObject\n\
    {\n    [self performSelectorInBackground:@selector(doWork) withObject:nil];\n\
    }\n\n/*\n * A method to be executed on a background thread.\n */\n- (void) doWork\n\
    {\n    NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];\n\n    /*\n\
    \     * Here, processing a time-consuming task,\n     * such as AR image processing,\n\
    \     * database accessing, etc.\n     */\n\n    /*\n     * The task is completed.\
    \ Next, use the result on the main thread as follows.\n     */\n\n    [self performSelectorOnMainThread:@selector(doneWork)\n\
    \        withObject:nil waitUntilDone:NO];\n    [pool drain];\n}\n\n/*\n * A method\
    \ to be executed on the main thread.\n */\n- (void) doneWork\n{\n    /*\n    \
    \ * A task that can work only on the main thread should be here,\n     * such\
    \ as updating user interface, etc.\n     */\n}\n```\n\nAlthough the source code\
    \ for multithreaded programming using the `performSelector` method family is easier\
    \ than a source code using the `NSThread` class, the source code with GCD is obviously\
    \ the simplest.\n\nMultithreaded programming with GCD is more elegant than with\
    \ the `performSelector` method family. You don’t need to use messy APIs of the\
    \ `NSThread` class or the `performSelector` method family. Also, it works more\
    \ effectively. It’s just all good!\n\n**NOTE:** When you’d like to release the\
    \ `NSAutoreleasePool` object, calling `drain` instead of `release` is recommended.\
    \ By `drain` the pool is released immediately even in an environment with garbage\
    \ collection enabled. If garbage collection is not used, there is no problem in\
    \ simply using `release`.\n\n### Multithreaded Programming\n\nAs explained, GCD\
    \ is a technology to make multithreading programming elegant. Before learning\
    \ GCD itself, we review traditional multithreaded programming.\n\nAlso, to take\
    \ proper advantage of multithreading, you should have a basic idea of how your\
    \ application is executed on a Mac or iPhone. Let’s take a look at them first.\n\
    \nPlease glance at some very simple Objective-C source code.\n\n```\nint main()\n\
    {\n    id o = [[MyObject alloc] init];\n\n    [o execBlock];\n\n    return 0;\n\
    }\n```\n\nThere are some method calls but, basically, it is just executed top\
    \ to bottom as shown in [Figure 6–1](#Chapter06.html#fig_6_1).\n\n![images](images/9781430241164_Fig06-01.jpg)\n\
    \n**Figure 6–1.** *A CPU executes CPU bytecodes*\n\nDo you know how the source\
    \ code works on the Mac or iPhone? To execute it on a computer, the compiler converts\
    \ it to CPU bytecodes as follows. You don’t need to understand all the meanings,\
    \ but we can know that the simple source code is converted to the long sequence\
    \ of commands.\n\n```\n000001ac:     b590 push {r4, r7, lr}\n000001ae: f240019c\
    \ movw r1, :lower16:0x260-0x1c0+0xfffffffc\n000001b2:     af01 add  r7, sp, #4\n\
    000001b4: f2c00100 movt r1, :upper16:0x260-0x1c0+0xfffffffc\n000001b8: f24010be\
    \ movw r0, :lower16:0x384-0x1c2+0xfffffffc\n000001bc: f2c00000 movt r0, :upper16:0x384-0x1c2+0xfffffffc\n\
    000001c0:     4479 add  r1, pc\n000001c2:     4478 add  r0, pc\n000001c4:    \
    \ 6809 ldr  r1, [r1, #0]\n000001c6:     6800 ldr  r0, [r0, #0]\n000001c8: f7ffef1a\
    \ blx  _objc_msgSend\n000001cc: f2400180 movw r1, :lower16:0x258-0x1d4+0xfffffffc\n\
    000001d0: f2c00100 movt r1, :upper16:0x258-0x1d4+0xfffffffc\n000001d4:     4479\
    \ add  r1, pc\n000001d6:     6809 ldr  r1, [r1, #0]\n000001d8: f7ffef12 blx  _objc_msgSend\n\
    000001dc:     4604 mov  r4, r0\n000001de: f240007a movw r0, :lower16:0x264-0x1e6+0xfffffffc\n\
    000001e2: f2c00000 movt r0, :upper16:0x264-0x1e6+0xfffffffc\n000001e6:     4478\
    \ add  r0, pc\n000001e8:     6801 ldr  r1, [r0, #0]\n000001ea:     4620 mov  r0,\
    \ r4\n000001ec: f7ffef08 blx  _objc_msgSend\n000001f0:     4620 mov  r0, r4\n\
    000001f2: f7ffef06 blx  _objc_release\n000001f6:     2000 movs r0, #0\n000001f8:\
    \     bd90 pop  {r4, r7, pc}\n```"
  raw: '### Grand Central Dispatch Overview


    Let’s see what Apple says about Grand Central Dispatch:


    > *One of the technologies for starting tasks asynchronously is Grand Central
    Dispatch (GCD). This technology takes the thread management code you would normally
    write in your own applications and moves that code down to the system level. All
    you have to do is define the tasks you want to execute and add them to an appropriate
    dispatch queue. GCD takes care of creating the needed threads and of scheduling
    your tasks to run on those threads. Because the thread management is now part
    of the system, GCD provides a holistic approach to task management and execution,
    providing better efficiency than traditional threads.*


    It seems that Grand Central Dispatch is an innovative technology to make multithreaded
    source code unbelievably elegant. Let’s see if that is true and how it is achieved
    with an example. Although it is a bit abstract, it shows the power of GCD.


    `dispatch_async(queue_for_background_threads, ^{`

    `     /*`

    `      * Here, processing a time-consuming task`

    `      * such as AR image processing, database accessing, etc.`

    `      */`


    `     /*`

    `      * The task is completed. Then, use the result on the main thread as follows.`

    `      */`


    `    dispatch_async(dispatch_get_main_queue(), ^{`


    `         /*`

    `          * Here, tasks that work only on the main, such as`

    `          * updating user inteface, etc.`

    `          */`

    `    });`

    `});`


    This example is for processing a time-consuming task on a background thread and
    using the result on the main thread.


    `dispatch_async(queue_for_background_threads, ^{`


    This single line makes the task work on a background thread.


    `dispatch_async(dispatch_get_main_queue(), ^{`


    This single line also makes a task work on the main thread. As you can see, carets
    “^” and Blocks are used to make the source code simple as we’ve learned in the
    previous chapters. It seems that what Apple says is true. Next, let’s briefly
    review what multithreaded source code looks like. Before GCD was introduced, Cocoa
    Framework had mechanisms to support multithreaded programming, such as NSObject
    class instance methods, performSelectorInBackground:withObject, performSelectorOnMainThread,
    and so on.


    Let’s see how the previous example could be written with the performSelector method
    family.


    ` /*`

    `  * Start a task on a background thread`

    `  * by NSObject performSelectorInBackground:withObject: method.`

    `  */`

    `- (void) launchThreadByNSObject_performSelectorInBackground_withObject`

    `{`

    `     [self performSelectorInBackground:@selector(doWork) withObject:nil];`

    `}`


    ` /*`

    `  * A method to be executed on a background thread.`

    `  */`

    `- (void) doWork`

    `{`

    `    NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];`


    `     /*`

    `      * Here, processing a time-consuming task,`

    `      * such as AR image processing,`

    `      * database accessing, etc.`

    `      */`


    `     /*`

    `      * The task is completed. Next, use the result on the main thread as follows.`

    `      */`


    `    [self performSelectorOnMainThread:@selector(doneWork)`

    `        withObject:nil waitUntilDone:NO];`

    `    [pool drain];`

    `}`


    ` /*`

    `  * A method to be executed on the main thread.`

    `  */`

    `- (void) doneWork`

    `{`

    `     /*`

    `      * A task that can work only on the main thread should be here,`

    `      * such as updating user interface, etc.`

    `      */`

    `}`


    Although the source code for multithreaded programming using the performSelector
    method family is easier than a source code using the NSThread class, the source
    code with GCD is obviously the simplest.


    Multithreaded programming with GCD is more elegant than with the performSelector
    method family. You don’t need to use messy APIs of the NSThread class or the performSelector
    method family. Also, it works more effectively. It’s just all good!


    **NOTE:** When you’d like to release the NSAutorelease Pool object, calling “drain”
    instead of “release” is recommended. By “drain” the pool is released immediately
    even in an environment with garbage collection enabled. If garbage collection
    is not used, there is no problem in simply using “release.”


    ### Multithreaded Programming


    As explained, GCD is a technology to make multithreading programming elegant.
    Before learning GCD itself, we review traditional multithreaded programming.


    Also, to take proper advantage of multithreading, you should have a basic idea
    of how your application is executed on a Mac or iPhone. Let’s take a look at them
    first.


    Please glance at some very simple Objective-C source code.


    `int main()`

    `{`

    `    id o = [[MyObject alloc] init];`


    `    [o execBlock];`


    `    return 0;`

    `}`


    There are some method calls but, basically, it is just executed top to bottom
    as shown in [Figure 6–1](#Chapter06.html#fig_6_1).


    ![images](images/9781430241164_Fig06-01.jpg)


    **Figure 6–1.** *A CPU executes CPU bytecodes*


    Do you know how the source code works on the Mac or iPhone? To execute it on a
    computer, the compiler converts it to CPU bytecodes as follows. You don’t need
    to understand all the meanings, but we can know that the simple source code is
    converted to the long sequence of commands.


    `000001ac:     b590 push {r4, r7, lr}`

    `000001ae: f240019c movw r1, :lower16:0x260-0x1c0+0xfffffffc`

    `000001b2:     af01 add  r7, sp, #4`

    `000001b4: f2c00100 movt r1, :upper16:0x260-0x1c0+0xfffffffc`

    `000001b8: f24010be movw r0, :lower16:0x384-0x1c2+0xfffffffc`

    `000001bc: f2c00000 movt r0, :upper16:0x384-0x1c2+0xfffffffc`

    `000001c0:     4479 add  r1, pc`

    `000001c2:     4478 add  r0, pc`

    `000001c4:     6809 ldr  r1, [r1, #0]`

    `000001c6:     6800 ldr  r0, [r0, #0]`

    `000001c8: f7ffef1a blx  _objc_msgSend`

    `000001cc: f2400180 movw r1, :lower16:0x258-0x1d4+0xfffffffc`

    `000001d0: f2c00100 movt r1, :upper16:0x258-0x1d4+0xfffffffc`

    `000001d4:     4479 add  r1, pc`

    `000001d6:     6809 ldr  r1, [r1, #0]`

    `000001d8: f7ffef12 blx  _objc_msgSend`

    `000001dc:     4604 mov  r4, r0`

    `000001de: f240007a movw r0, :lower16:0x264-0x1e6+0xfffffffc`

    `000001e2: f2c00000 movt r0, :upper16:0x264-0x1e6+0xfffffffc`

    `000001e6:     4478 add  r0, pc`

    `000001e8:     6801 ldr  r1, [r0, #0]`

    `000001ea:     4620 mov  r0, r4`

    `000001ec: f7ffef08 blx  _objc_msgSend`

    `000001f0:     4620 mov  r0, r4`

    `000001f2: f7ffef06 blx  _objc_release`

    `000001f6:     2000 movs r0, #0`

    `000001f8:     bd90 pop  {r4, r7, pc}`'
  trans: "\n### Grand Central Dispatch 概览\n\n我们来看看苹果公司对 Grand Central Dispatch 的描述：\n\
    \n> *异步执行任务的技术之一便是 Grand Central Dispatch（GCD）。这项技术会将你通常在应用程序中编写的线程管理代码，下放到系统层面。你只需定义要执行的任务，并将它们添加到合适的调度队列中即可。GCD\
    \ 会负责创建所需的线程，并安排你的任务在这些线程上运行。由于线程管理现在已成为系统的一部分，GCD 提供了整体性的任务管理和执行方法，其效率远超传统线程。*\n\
    \nGrand Central Dispatch 似乎是一项创新技术，它能让多线程源代码变得出奇地优雅。我们通过一个例子来看看这是否属实，以及它是如何实现的。尽管这个例子有点抽象，但它展示了\
    \ GCD 的强大之处。\n\n```\ndispatch_async(queue_for_background_threads, ^{\n    /*\n\
    \     * 此处处理耗时任务\n     * 例如 AR 图像处理、数据库访问等\n     */\n\n    /*\n     * 任务完成。然后，在主线程上使用结果，如下所示。\n\
    \     */\n\n    dispatch_async(dispatch_get_main_queue(), ^{\n\n        /*\n \
    \        * 此处放置只在主线程工作的任务，例如\n         * 更新用户界面等\n         */\n    });\n});\n\
    ```\n\n这个例子演示了在后台线程处理耗时任务，然后在主线程上使用结果。\n`dispatch_async(queue_for_background_threads,\
    \ ^{`\n这一行代码就让任务在后台线程中运行。\n`dispatch_async(dispatch_get_main_queue(), ^{`\n这一行代码同样让任务在主线程中运行。如你所见，这里使用了脱字符\
    \ `^` 和 Block，使得源代码变得简单，正如我们在前几章中学到的那样。看来苹果公司所言非虚。接下来，我们简要回顾一下多线程源代码是什么样子的。在 GCD\
    \ 引入之前，Cocoa 框架已有支持多线程编程的机制，例如 `NSObject` 类的实例方法 `performSelectorInBackground:withObject`、`performSelectorOnMainThread`\
    \ 等等。\n\n我们来看看之前的例子如何用 `performSelector` 方法族来编写。\n\n```\n/*\n * 通过 NSObject 的\
    \ performSelectorInBackground:withObject: 方法\n * 在后台线程启动一个任务\n */\n- (void) launchThreadByNSObject_performSelectorInBackground_withObject\n\
    {\n    [self performSelectorInBackground:@selector(doWork) withObject:nil];\n\
    }\n\n/*\n * 在后台线程上执行的方法\n */\n- (void) doWork\n{\n    NSAutoreleasePool *pool\
    \ = [[NSAutoreleasePool alloc] init];\n\n    /*\n     * 此处处理耗时任务，\n     * 例如 AR\
    \ 图像处理、\n     * 数据库访问等\n     */\n\n    /*\n     * 任务完成。接下来，在主线程上使用结果，如下所示。\n \
    \    */\n\n    [self performSelectorOnMainThread:@selector(doneWork)\n       \
    \ withObject:nil waitUntilDone:NO];\n    [pool drain];\n}\n\n/*\n * 在主线程上执行的方法\n\
    \ */\n- (void) doneWork\n{\n    /*\n     * 只能在主线程上执行的任务应放在此处，\n     * 例如更新用户界面等\n\
    \     */\n}\n```\n\n虽然使用 `performSelector` 方法族进行多线程编程的源代码比使用 `NSThread` 类的源代码更简单，但使用\
    \ GCD 的源代码显然是最简洁的。\n\n使用 GCD 进行多线程编程比使用 `performSelector` 方法族更加优雅。你无需使用 `NSThread`\
    \ 类或 `performSelector` 方法族那些凌乱的 API。而且，它的效率也更高。简直百利而无一害！\n\n**注意：** 当你想要释放 `NSAutoreleasePool`\
    \ 对象时，建议调用 `drain` 而非 `release`。通过 `drain`，即使在启用了垃圾回收的环境中，池也会立即被释放。如果不使用垃圾回收，直接使用\
    \ `release` 也没有问题。\n\n### 多线程编程\n\n正如所解释的那样，GCD 是一项让多线程编程变得优雅的技术。在学习 GCD 本身之前，我们先回顾一下传统的多线程编程。\n\
    \n此外，要充分利用多线程的优势，你应该对应用程序如何在 Mac 或 iPhone 上执行有一个基本的了解。我们先来看看这些内容。\n\n请浏览一下非常简单的\
    \ Objective-C 源代码。\n\n```\nint main()\n{\n    id o = [[MyObject alloc] init];\n\
    \n    [o execBlock];\n\n    return 0;\n}\n```\n\n这里有一些方法调用，但基本上，它是如 图 6-1 所示，从上到下执行的。\n\
    \n![图片](img/9781430241164_Fig06-01.jpg)\n\n**图 6-1.** *CPU 执行 CPU 字节码*\n\n你知道这段源代码在\
    \ Mac 或 iPhone 上是如何工作的吗？为了在计算机上执行它，编译器会将其转换为如下的 CPU 字节码。你不需要理解所有含义，但我们可以知道，简单的源代码被转换成了很长的指令序列。\n\
    \n```\n000001ac:     b590 push {r4, r7, lr}\n000001ae: f240019c movw r1, :lower16:0x260-0x1c0+0xfffffffc\n\
    000001b2:     af01 add  r7, sp, #4\n000001b4: f2c00100 movt r1, :upper16:0x260-0x1c0+0xfffffffc\n\
    000001b8: f24010be movw r0, :lower16:0x384-0x1c2+0xfffffffc\n000001bc: f2c00000\
    \ movt r0, :upper16:0x384-0x1c2+0xfffffffc\n000001c0:     4479 add  r1, pc\n000001c2:\
    \     4478 add  r0, pc\n000001c4:     6809 ldr  r1, [r1, #0]\n000001c6:     6800\
    \ ldr  r0, [r0, #0]\n000001c8: f7ffef1a blx  _objc_msgSend\n000001cc: f2400180\
