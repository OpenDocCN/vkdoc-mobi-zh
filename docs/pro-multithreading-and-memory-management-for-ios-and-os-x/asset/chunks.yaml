    `  */`


    Though the last NSLog looks fine, it just works by chance. The application crashes
    depending on conditions. To assign an object to a variable qualified with __unsafe_unretained,
    you have to make sure that the object exists and has been assigned to some variables
    qualified with __strong. I recommend reconsidering the reason why you need __unsafe_unretained.
    You need to understand why completely; for example, you might need it because
    the application has to support iOS4 or OS X Snow Leopard and you need to use it
    instead of __weak. Also, you have to be sure that the assigned object exists during
    the lifetime of the variable. If it fails, the application will crash and no one
    will use your application.


    #### __autoreleasing ownership qualifier


    Let’s see if there are any changes related to autorelease with ARC. To put simply,
    you can’t use the autorelease method. You can’t use the NSAutoreleasePool class
    either. I explain it later with some rules. Although you can’t directly use autorelease,
    there is a mechanism of autorelease still. Without ARC, we’ve used autorelease
    as follows.


    `/* non-ARC */`


    `NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];`


    `id obj = [[NSObject alloc] init];`


    `[obj autorelease];`


    `[pool drain];`


    This source code can be rewritten for an ARC-enabled environment.


    `@autoreleasepool {`


    `    id __autoreleasing obj = [[NSObject alloc] init];`


    `}`


    Instead of creating, having, and discarding an NSAutoreleasePool class object,
    you have to enclose codes with @autoreleasepool block. Instead of calling the
    autorelease method, you have to assign the object to a variable qualified with
    __autoreleasing. Assigning the object to the __autoreleasing qualified variable
    is equivalent to calling autorelease on a non-ARC environment. By doing it, the
    object is registered to an autoreleasepool. So, with ARC enabled, you just have
    to use @autoreleasepool instead of NSAutoreleasePool class and use the __autoreleasing
    qualified variable instead of the autorelease method as shown in [Figure 2–6](#Chapter02.html#fig_2_6).


    ![images](images/9781430241164_Fig02-06.jpg)


    **Figure 2–6.** *@autoreleasepool and a variable with __autoreleasing qualifier*


    But in reality, it is very rare to type __autoreleasing explicitly. Let’s see
    why you don’t need to type __autoreleasing very often.'
  trans: "\n#### `__unsafe_unretained` 所有权修饰符\n\n顾名思义，`__unsafe_unretained` 所有权修饰符是绝对不安全的。通常，由于\
    \ ARC 的存在，编译器会执行内存管理。但任何使用 `__unsafe_unretained` 修饰的变量都被排除在此机制之外。因此，你需要手动管理这些变量。\n\
    \n```\nid __unsafe_unretained obj = [[NSObject alloc] init];\n```\n\n这段代码将一个对象赋值给了一个用\
    \ `__unsafe_unretained` 修饰的变量。编译器会显示以下警告信息。\n\n```\nwarning: assigning retained\
    \ obj to unsafe_unretained variable;\n          obj will be released after assignment\
    \ [-Warc-unsafe-retained-assign]\n        id __unsafe_unretained obj = [[NSObject\
    \ alloc] init];\n                                                      ^     ~~~~~~~~~~~~~~~~~~~~~~~\n\
    ```\n\n与 `__weak` 一样，`__unsafe_unretained` 变量不拥有对象的所有权。在上述示例中，对象在创建后立即被释放。看起来\
    \ `__unsafe_unretained` 和 `__weak` 修饰符的作用似乎相同。你将在下文（清单 2–9）中看到 `__unsafe_unretained`\
    \ 与 `__weak` 的区别。\n\n**清单 2–9.** `__unsafe_unretained` 修饰符\n\n```\nid __unsafe_unretained\
    \ obj1 = nil;\n\n{\n    id __strong obj0 = [[NSObject alloc] init];\n\n    obj1\
    \ = obj0;\n\n    NSLog(@\"A: %@\", obj1);\n}\n\nNSLog(@\"B: %@\", obj1);\n```\n\
    \n输出结果为：\n\n```\nA: <NSObject: 0x753e180>\nB: <NSObject: 0x753e180>\n```\n\n像往常一样，我们通过添加注释来重新查看这段源代码（清单\
    \ 2–10）。\n\n**清单 2–10.** 带注释的 `__unsafe_unretained` 修饰符\n\n```\nid __unsafe_unretained\
    \ obj1 = nil;\n\n{\n     /*\n      * 你创建了一个对象，并拥有其所有权。\n      */\n\n    id __strong\
    \ obj0 = [[NSObject alloc] init];\n\n     /*\n      * 变量 obj0 使用 __strong 修饰。\n\
    \      * 这意味着它拥有该对象的所有权。\n      */\n\n    obj1 = obj0;\n\n     /*\n      * 变量\
    \ obj1 从变量 obj0 赋值，\n      * obj1 既没有强引用也没有弱引用。\n      */\n\n    NSLog(@\"A: %@\"\
    , obj1);\n\n     /*\n      * 显示 obj1 的值\n      */\n\n}\n /*\n  * 离开变量 obj0 的作用域后，它的强引用消失。\n\
    \  * 对象被自动释放。\n  * 由于没有人拥有所有权，该对象被丢弃。\n  */\n\nNSLog(@\"B: %@\", obj1);\n\n /*\n\
    \  * 显示 obj1 的值\n  *\n  * obj1 所引用的对象已被丢弃。\n  * 这被称为悬垂指针。\n  * 非法访问！！\n  */\n\
    ```\n\n虽然最后的 `NSLog` 看起来没问题，但这只是巧合。应用程序可能会在某些条件下崩溃。要将对象赋值给使用 `__unsafe_unretained`\
    \ 修饰的变量，你必须确保该对象存在，并且已被赋值给某些使用 `__strong` 修饰的变量。我建议你重新考虑需要使用 `__unsafe_unretained`\
    \ 的原因。你需要完全理解为什么需要它；例如，可能是由于应用程序需要支持 iOS4 或 OS X Snow Leopard，因此你需要用它来代替 `__weak`。此外，你必须确保被赋值的对象在变量的生命周期内始终存在。如果做不到，应用程序将会崩溃，也就没有人会使用你的应用程序了。\n\
    \n#### `__autoreleasing` 所有权修饰符\n\n让我们看看 ARC 环境下自动释放是否有什么变化。简单来说，你不能再使用 `autorelease`\
    \ 方法，也不能再使用 `NSAutoreleasePool` 类。我稍后会结合一些规则来解释。尽管不能直接使用 `autorelease`，但自动释放的机制仍然存在。在没有\
    \ ARC 的情况下，我们曾这样使用 `autorelease`：\n\n```\n/* 非 ARC 环境 */\n\nNSAutoreleasePool\
    \ *pool = [[NSAutoreleasePool alloc] init];\n\nid obj = [[NSObject alloc] init];\n\
    \n[obj autorelease];\n\n[pool drain];\n```\n\n这段代码可以重写为 ARC 启用环境下的形式：\n\n```\n\
    @autoreleasepool {\n\n    id __autoreleasing obj = [[NSObject alloc] init];\n\n\
    }\n```\n\n你无需再创建、持有和销毁 `NSAutoreleasePool` 类对象，而是需要将代码包围在 `@autoreleasepool` 块中。无需再调用\
    \ `autorelease` 方法，而是需要将对象赋值给使用 `__autoreleasing` 修饰的变量。将对象赋值给 `__autoreleasing`\
    \ 修饰的变量，等同于在非 ARC 环境下调用 `autorelease`。通过这样做，该对象会被注册到自动释放池中。因此，在启用 ARC 的情况下，你只需使用\
    \ `@autoreleasepool` 代替 `NSAutoreleasePool` 类，并使用 `__autoreleasing` 修饰的变量代替 `autorelease`\
    \ 方法，如图 2–6 所示。\n\n![images](img/9781430241164_Fig02-06.jpg)\n\n**图 2–6.** `@autoreleasepool`\
    \ 与使用 `__autoreleasing` 修饰符的变量\n\n但实际上，很少需要显式地写出 `__autoreleasing`。接下来我们看看为什么不需要经常使用\
    \ `__autoreleasing`。\n"
- fmt: "##### Compiler Cares `__autoreleasing` Automatically\n\nTo obtain an object\
    \ without creation, you use some methods not in the `alloc`/`new`/`copy`/`mutableCopy`\
    \ method group. In this case, the object is automatically registered to the `autoreleasepool`.\
    \ It is same as obtaining an autoreleased object. When an object is returned from\
    \ a method, the compiler checks if the method begins with `alloc`/`new`/`copy`/`mutableCopy`,\
    \ and if not, the returned object is automatically registered to the autorelease\
    \ pool. Exceptionally, any method whose name begins with `init`, doesn’t register\
    \ the return value to `autoreleasepool`. Please see below for more about this\
    \ new rule: the naming rule for methods related to object creation must be followed.\n\
    \n```\n@autoreleasepool {\n    id __strong obj = [NSMutableArray array];\n}\n\
    ```\n\nLet’s see the source code with comments on ownership status.\n\n```\n@autoreleasepool\
    \ {\n     /*\n      * Obtain an object without creating it yourself and you don't\
    \ have ownership\n      */\n\n    id __strong obj = [NSMutableArray array];\n\n\
    \     /*\n      * The variable obj is qualified with __strong.\n      * Which\
    \ means, it has ownership of the object.\n      * And the object is registered\
    \ in autoreleasepool,\n      * because the compiler decides it by checking the\
    \ method name.\n      */\n\n}\n     /*\n      * Leaving the scope of variable\
    \ obj, its strong reference disappears.\n      * The object is released automatically.\n\
    \      *\n      * Leaving @autoreleasepool block,\n      * all the objects registered\
    \ in the autoreleasepool are released automatically.\n      *\n      * The object\
    \ is discarded because no one has ownership.\n      */\n```\n\nAs the example\
    \ shows, objects are registered to an `autoreleasepool` even without the `__autoreleasing`\
    \ qualifier. Next, let’s see a sample implementation of the method, which is used\
    \ in the above example to obtain an object without creating it.\n\n```\n+ (id)\
    \ array\n{\n    return [[NSMutableArray alloc] init];\n}\n```\n\nThis code also\
    \ doesn’t use the `__autoreleasing` qualifier. It too can be written as follows.\n\
    \n```\n+ (id) array\n{\n\n    id obj = [[NSMutableArray alloc] init];\n\n    return\
    \ obj;\n\n}\n```\n\n“id obj” does not have a qualifier. So it is qualified with\
    \ `__strong`. When the `return` sentence is executed, the variable scope is left\
    \ and the strong reference disappears. Therefore the object will be released automatically.\
    \ Before that, if the compiler detects that the object will be passed to the caller,\
    \ the object is registered in `autoreleasepool`.\n\nThe next example is about\
    \ the `__weak` ownership qualifier. As you know, the `__weak` ownership qualifier\
    \ is used to avoid cyclic reference. When a variable with a `__weak` qualifier\
    \ is used, the object is always registered in `autoreleasepool`.\n\n```\nid __weak\
    \ obj1 = obj0;\nNSLog(@\"class=%@\", [obj1 class]);\n```\n\nThe above source code\
    \ is equivalent to:\n\n```\nid __weak obj1 = obj0;\nid __autoreleasing tmp = obj1;\n\
    NSLog(@\"class=%@\", [tmp class]);\n```\n\nWhy does the object need to be registered\
    \ in `autoreleasepool` in order to use the object via the `__weak` qualified variable?\
    \ Because a variable, which is qualified with `__weak`, does not have a strong\
    \ reference, the object might be disposed of at any point. If the object is registered\
    \ in `autoreleasepool`, until `@autoreleasepool` block is left, the object must\
    \ exist. So, to use the objects via `__weak` variable safely, the object is registered\
    \ in `autoreleasepool` automatically.\n\nLet’s see one more final example about\
    \ implicit `__autoreleasing`. As explained, “`id obj`” is the same as “`id __strong\
    \ obj`”.\n\nHow about “`id *obj`” ? Does it mean “`id __strong *obj`” ?\n\nThe\
    \ answer is “`id __autoreleasing *obj`”.\n\nAnd, “`NSObject **obj`” means “`NSObject\
    \ * __autoreleasing *obj`”.\n\nAny pointers to `id` or object types are qualified\
    \ with `__autoreleasing` as default.\n\nSometimes, a method passes the error information\
    \ via an argument with a pointer type of `NSError` object instead of its return\
    \ value. Cocoa Framework uses this technique for many methods such as the `NSString`\
    \ class method `stringWithContentsOfFile:encoding:error`. It is like:\n\n```\n\
    NSError *error = nil;\nBOOL result = [obj performOperationWithError:&error];\n\
    ```\n\nThe declaration of this method is:\n\n```\n- (BOOL) performOperationWithError:(NSError\
    \ **)error;\n```\n\nBecause the pointer to `id` or object types is qualified with\
    \ `__autoreleasing` as default, this declaration is equivalent to:\n\n```\n- (BOOL)\
    \ performOperationWithError:(NSError * __autoreleasing *)error;\n```"
  raw: '##### Compiler Cares __autoreleasing Automatically


    To obtain an object without creation, you use some methods not in the alloc/new/copy/mutableCopy
    method group. In this case, the object is automatically registered to the autoreleasepool.
    It is same as obtaining an autoreleased object. When an object is returned from
    a method, the compiler checks if the method begins with alloc/new/copy/mutableCopy,
    and if not, the returned object is automatically registered to the autorelease
    pool. Exceptionally, any method whose name begins with init, doesn’t register
    the return value to autoreleasepool. Please see below for more about this new
    rule: the naming rule for methods related to object creation must be followed.


    `@autoreleasepool {`

    `    id __strong obj = [NSMutableArray array];`

    `}`


    Let’s see the source code with comments on ownership status.


    `@autoreleasepool {`

    `     /*`

    `      * Obtain an object without creating it yourself and you don''t have ownership`

    `      */`


    `    id __strong obj = [NSMutableArray array];`


    `     /*`

    `      * The variable obj is qualified with __strong.`

    `      * Which means, it has ownership of the object.`

    `      * And the object is registered in autoreleasepool,`

    `      * because the compiler decides it by checking the method name.`

    `      */`


    `}`

    `     /*`

    `      * Leaving the scope of variable obj, its strong reference disappears.`

    `      * The object is released automatically.`

    `      *`

    `      * Leaving @autoreleasepool block,`

    `      * all the objects registered in the autoreleasepool are released automatically.`

    `      *`

    `      * The object is discarded because no one has ownership.`

    `      */`


    As the example shows, objects are registered to an autoreleasepool even without
    the __autoreleasing qualifier. Next, let’s see a sample implementation of the
    method, which is used in the above example to obtain an object without creating
    it.


    `+ (id) array`

    `{`

    `    return [[NSMutableArray alloc] init];`

    `}`


    This code also doesn’t use the __autoreleasing qualifier. It too can be written
    as follows.


    `+ (id) array`

    `{`


    `    id obj = [[NSMutableArray alloc] init];`


    `    return obj;`


    `}`


    “id obj” does not have a qualifier. So it is qualified with __strong. When the
    “return” sentence is executed, the variable scope is left and the strong reference
    disappears. Therefore the object will be released automatically. Before that,
    if the compiler detects that the object will be passed to the caller, the object
    is registered in autoreleasepool.


    The next example is about the __weak ownership qualifier. As you know, the __weak
    ownership qualifier is used to avoid cyclic reference. When a variable with a
    __weak qualifier is used, the object is always registered in autoreleasepool.


    `id __weak obj1 = obj0;`

    `NSLog(@"class=%@", [obj1 class]);`


    The above source code is equivalent to:


    `id __weak obj1 = obj0;`

    `id __autoreleasing tmp = obj1;`

    `NSLog(@"class=%@", [tmp class]);`


    Why does the object need to be registered in autoreleasepool in order to use the
    object via the __weak qualified variable? Because a variable, which is qualified
    with __weak, does not have a strong reference, the object might be disposed of
    at any point. If the object is registered in autoreleasepool, until @autoreleasepool
    block is left, the object must exist. So, to use the objects via __weak variable
    safely, the object is registered in autoreleasepool automatically.


    Let’s see one more final example about implicit __autoreleasing. As explained,
    “id obj” is the same as “id __strong obj”.


    How about “id *obj” ? Does it mean “id __strong *obj” ?


    The answer is “id __autoreleasing *obj”.


    And, “NSObject **obj” means “NSObject * __autoreleasing *obj”.


    Any pointers to ‘id’ or object types are qualified with __autoreleasing as default.


    Sometimes, a method passes the error information via an argument with a pointer
    type of NSError object instead of its return value. Cocoa Framework uses this
    technique for many methods such as the NSString class method stringWithContentsOfFile:encoding:error.
    It is like:


    `NSError *error = nil;`

    `BOOL result = [obj performOperationWithError:&error];`


    The declaration of this method is:


    `- (BOOL) performOperationWithError:(NSError **)error;`


    Because the pointer to ‘id’ or object types is qualified with __autoreleasing
    as default, this declaration is equivalent to:


    `- (BOOL) performOperationWithError:(NSError * __autoreleasing *)error;`'
  trans: "\n##### 编译器自动处理 `__autoreleasing`\n\n要获取一个非自己创建的对象，你需要使用不属于 `alloc`/`new`/`copy`/`mutableCopy`\
    \ 方法组的方法。这种情况下，该对象会被自动注册到 `autoreleasepool` 中。这与获取一个自动释放的对象是相同的。当一个对象从方法返回时，编译器会检查方法名是否以\
    \ `alloc`/`new`/`copy`/`mutableCopy` 开头，如果不是，则返回的对象会自动注册到自动释放池中。有一个例外：任何以 `init`\
    \ 开头的方法，不会将返回值注册到 `autoreleasepool`。请参见下方关于这条新规则的更多说明：必须遵循与对象创建相关的方法命名规则。\n\n\
    ```\n@autoreleasepool {\n    id __strong obj = [NSMutableArray array];\n}\n```\n\
    \n让我们看看带有所有权状态注释的源代码。\n\n```\n@autoreleasepool {\n     /*\n      * 获取一个非自己创建的对象，且你不拥有所有权\n\
    \      */\n\n    id __strong obj = [NSMutableArray array];\n\n     /*\n      *\
    \ 变量 obj 用 __strong 修饰。\n      * 这意味着它拥有该对象的所有权。\n      * 而该对象已被注册到 autoreleasepool\
    \ 中，\n      * 因为编译器通过检查方法名做出了这一决定。\n      */\n\n}\n     /*\n      * 离开变量 obj 的作用域后，其强引用消失。\n\
    \      * 该对象被自动释放。\n      *\n      * 离开 @autoreleasepool 块后，\n      * 所有注册在 autoreleasepool\
    \ 中的对象都会被自动释放。\n      *\n      * 由于无人拥有所有权，该对象被销毁。\n      */\n```\n\n如示例所示，即使没有\
    \ `__autoreleasing` 修饰符，对象也会被注册到 `autoreleasepool` 中。接下来，让我们看看上述示例中用于获取非自己创建对象的方法的示例实现。\n\
    \n```\n+ (id) array\n{\n    return [[NSMutableArray alloc] init];\n}\n```\n\n\
    这段代码也没有使用 `__autoreleasing` 修饰符。它也可以写成如下形式。\n\n```\n+ (id) array\n{\n\n    id\
    \ obj = [[NSMutableArray alloc] init];\n\n    return obj;\n\n}\n```\n\n“`id obj`”\
    \ 没有修饰符，因此它默认用 `__strong` 修饰。当执行 `return` 语句时，变量作用域结束，强引用消失，因此该对象会被自动释放。在此之前，如果编译器检测到该对象会被传递给调用方，则该对象会被注册到\
    \ `autoreleasepool` 中。\n\n下一个示例是关于 `__weak` 所有权修饰符的。如你所知，`__weak` 所有权修饰符用于避免循环引用。当使用带有\
    \ `__weak` 修饰符的变量时，该对象总是会被注册到 `autoreleasepool` 中。\n\n```\nid __weak obj1 = obj0;\n\
    NSLog(@\"class=%@\", [obj1 class]);\n```\n\n上述源代码等价于：\n\n```\nid __weak obj1 =\
    \ obj0;\nid __autoreleasing tmp = obj1;\nNSLog(@\"class=%@\", [tmp class]);\n\
    ```\n\n为什么为了通过 `__weak` 修饰的变量使用对象，需要将其注册到 `autoreleasepool` 中？因为用 `__weak` 修饰的变量没有强引用，对象随时可能被销毁。如果对象被注册到\
    \ `autoreleasepool` 中，那么在离开 `@autoreleasepool` 块之前，该对象必然存在。因此，为了安全地通过 `__weak`\
    \ 变量使用对象，该对象会被自动注册到 `autoreleasepool` 中。\n\n让我们再看最后一个关于隐式 `__autoreleasing` 的示例。如前所述，“`id\
    \ obj`” 等同于 “`id __strong obj`”。\n\n那么 “`id *obj`” 呢？它等同于 “`id __strong *obj`”\
    \ 吗？\n\n答案是 “`id __autoreleasing *obj`”。\n\n并且，“`NSObject **obj`” 等同于 “`NSObject\
    \ * __autoreleasing *obj`”。\n\n任何指向 `id` 或对象类型的指针默认都用 `__autoreleasing` 修饰。\n\n\
    有时，方法会通过 `NSError` 对象的指针类型参数（而非其返回值）来传递错误信息。Cocoa 框架在许多方法中都使用了这种技术，例如 `NSString`\
    \ 的类方法 `stringWithContentsOfFile:encoding:error`。其用法类似于：\n\n```\nNSError *error\
    \ = nil;\nBOOL result = [obj performOperationWithError:&error];\n```\n\n该方法的声明是：\n\
    \n```\n- (BOOL) performOperationWithError:(NSError **)error;\n```\n\n由于指向 `id`\
    \ 或对象类型的指针默认用 `__autoreleasing` 修饰，因此这个声明等价于：\n\n```\n- (BOOL) performOperationWithError:(NSError\
    \ * __autoreleasing *)error;\n```\n"
- fmt: "### Returning a Result as the Argument\n\nMethods taking `NSError` pointer\
    \ as an argument need to create an `NSError` object itself depending on the result.\
    \ The caller will obtain the object as an argument, which means that the caller\
    \ does not obtain it from the alloc/new/copy/mutableCopy method group. To follow\
    \ the memory management rules, when you do not obtain an object by the `alloc`/`new`/`copy`/`mutableCopy`\
    \ method group, the object has to be passed without ownership. By the `__autoreleasing`\
    \ ownership qualifier, the rule is fulfilled.\n\nFor example, `performOperationWithError`\
    \ is implemented as follows.\n\n```\n- (BOOL) performOperationWithError:(NSError\
    \ * __autoreleasing *)error\n{\n    /* Error occurred. Set errorCode */\n\n  \
    \  return NO;\n}\n```\n\nBy assigning to `*error`, which is `NSError * __autoreleasing\
    \ *` type, an object can be passed to its caller after being registered in autoreleasepool.\n\
    \nThe following source code causes a compile error.\n\n```\nNSError *error = nil;\n\
    NSError **pError = &error;\n```\n\nTo assign an object pointer, both ownership\
    \ qualifiers have to be the same. The compiler shows the following error.\n\n\
    ```\nerror: initializing 'NSError *__autoreleasing *' with an expression\n   \
    \       of type 'NSError *__strong *' changes retain/release properties of pointer\n\
    \        NSError **pError = &error;\n                              ^        ~~~~~~\n\
    ```\n\nIn this case, a `__strong` ownership qualifier has to be added.\n\n```\n\
    NSError *error = nil;\nNSError * __strong *pError = &error;\n/* No compile error\
    \ */\n```\n\nThis rule applies to all the other ownership qualifiers as well.\n\
    \n```\nNSError __weak *error = nil;\nNSError * __weak *pError = &error;\n/* No\
    \ compile error */\n```\n\n```\nNSError __unsafe_unretained *unsafeError = nil;\n\
    NSError * __unsafe_unretained *pUnsafeError = &unsafeError;\n/* No compile error\
    \ */\n```\n\nBy the way, in the previous example, the method takes an argument\
    \ as the pointer of object type, which is qualified with `__autoreleasing`.\n\n\
    ```\n- (BOOL) performOperationWithError:(NSError * __autoreleasing *)error;\n\
    ```\n\nAnd the caller passes the pointer of object type, which qualified with\
    \ `__strong`.\n\n```\nNSError __strong *error = nil;\nBOOL result = [obj performOperationWithError:&error];\n\
    ```\n\nAs we have seen, to exchange object pointers, both variables must be identically\
    \ qualified. But the example is not. How does it work? The following explains\
    \ how the compiler handles it.\n\n```\nNSError __strong *error = nil;\nNSError\
    \ __autoreleasing *tmp = error;\nBOOL result = [obj performOperationWithError:&tmp];\n\
    error = tmp;\n```\n\nAlso, you can type the ownership qualifier explicitly for\
    \ the object pointer type as follows.\n\n```\n- (BOOL) performOperationWithError:(NSError\
    \ * __strong *)error;\n```\n\nThis declaration shows how to pass an object without\
    \ registering it to autoreleasepool. Although it is possible, you should not do\
    \ that. From the caller’s point of view, to create an object with ownership, the\
    \ method has to be in the alloc/new/copy/mutableCopy group. If it is not in the\
    \ group, the caller should obtain an object without ownership. So, the argument\
    \ should be qualified with `__autoreleasing`.\n\nAnd, when you use the `__autoreleasing`\
    \ ownership qualifier explicitly, the variable has to be an automatic variable,\
    \ such as a local variable, or an argument of method/function.\n\nNext, let’s\
    \ see `@autoreleasepool` a bit more. In a non-ARC environment, autoreleasepools\
    \ are used as follows.\n\n```\n/* non-ARC */\n\nNSAutoreleasePool *pool0 = [[NSAutoreleasePool\
    \ alloc] init];\n    NSAutoreleasePool *pool1 = [[NSAutoreleasePool alloc] init];\n\
    \        NSAutoreleasePool *pool2 = [[NSAutoreleasePool alloc] init];\n      \
    \  id obj = [[NSObject alloc] init];\n        [obj autorelease];\n        [pool2\
    \ drain];\n    [pool1 drain];\n[pool0 drain];\n```\n\nThe `@autoreleasepool` block\
    \ can be nested as well.\n\n```\n@autoreleasepool {\n    @autoreleasepool {\n\
    \        @autoreleasepool {\n            id __autoreleasing obj = [[NSObject alloc]\
    \ init];\n        }\n    }\n}\n```\n\nFor instance, Application’s main function,\
    \ which is generated from the iOS application template, has `@autoreleasepool`\
    \ block to enclose all the application code.\n\n```\nint main(int argc, char *argv[])\n\
    {\n    @autoreleasepool {\n        return UIApplicationMain(argc, argv, nil,\n\
    \            NSStringFromClass([AppDelegate class]));\n    }\n}\n```\n\nAlso,\
    \ `NSRunLoop` has autoreleasepool to release all the objects once in each loop.\
    \ This mechanism is the same both on ARC-enabled and -disabled environments. By\
    \ the way, `@autoreleasepool` block can be used even in a non-ARC environment,\
    \ but it has to be compiled with an LLVM compiler 3.0 or later. In this case,\
    \ the source code should be as follows.\n\n```\n/* non-ARC */\n@autoreleasepool\
    \ {\n    id obj = [[NSObject alloc] init];\n    [obj autorelease];\n}\n```\n\n\
    I recommend using `@autoreleasepool` even in a non-ARC environment, rather than\
    \ `NSAutoreleasePool`. The reason is that the scope of autoreleasepool is written\
    \ as blocks, so its readability is far better.\n\nAlso, the `_objc_autoreleasePoolPrint()`\
    \ (see the implementation by Apple in [Chapter 1](#Chapter01.html#ch1)) can be\
    \ used for both an ARC-enabled or -disabled environment.\n\n```\n_objc_autoreleasePoolPrint();\n\
    ```\n\nPlease use it effectively to debug objects in autoreleasepool.\n\n### `__strong`\
    \ and `__weak`\n\nThe concept of `__strong` and `__weak` variables is very similar\
    \ to that of smart pointers in C++. They are called `std::shared_ptr` and `std::weak_ptr`.\
    \ `std::shared_ptr` uses reference counting to manage ownership of C++ class objects.\
    \ `std::weak_ptr` is used to avoid cyclic reference. If you have to use C++ some\
    \ time, using these smart pointers is strongly recommended.\n\n* -1999 `boost::shared_ptr`\
    \ is part of the Boost C++ library\n\n* 2002 `boost::weak_ptr` is added to the\
    \ library\n\n* 2005 `tr1::shared_ptr` and `tr1::weak_ptr` are adopted by standard\
    \ C++ Library draft TR1. In some environments, `std::shared_ptr` and `std::weak_ptr`\
    \ can be used\n\n* `std::shared_ptr` and `std::weak_ptr` are adopted by C++ Standard\
    \ C++11 (known as C++0x)\n\n## Rules\n\nTo write and compile source code for ARC,\
    \ you have to take care of a few things. Just by following the rules in the list\
    \ below, you can write source code for an ARC-enabled environment with confidence.\n\
    \n*   Forget about using `retain`, `release`, `retainCount`, and `autorelease`.\n\
    *   Forget about using `NSAllocateObject` and `NSDeallocateObject`.\n*   Follow\
    \ the naming rule for methods related to object creation.\n*   Forget about calling\
    \ `dealloc` explicitly.\n*   Use `@autoreleasepool` instead of `NSAutoreleasePool`.\n\
    *   Forget about using Zone (`NSZone`).\n*   Object type variables can’t be members\
    \ of `struct` or `union` in C language.\n*   `id` and `void*` have to be cast\
    \ explicitly.\n\nThe rules are explained one by one.\n\n### Forget About Using\
    \ Retain, Release, RetainCount, or Autorelease\n\nAs you know, the compiler will\
    \ perform memory management, therefore you don’t need to call memory management-related\
    \ methods, such as `retain`, `release`, `retainCount`, and `autorelease`.\n\n\
    Apple says:\n\n> By enabling ARC with the new Apple LLVM compiler, you will never\
    \ need to type `retain` or `release` again\n\nBut, in reality, you can’t use them.\
    \ When you use them, a compile error occurs as follows.\n\n```\nerror: ARC forbids\
    \ explicit message send of 'release'\n        [o release];\n         ^ ~~~~~~~\n\
    ```\n\nSo, in fact, Apple should say:\n\n“By enabling ARC with the new Apple LLVM\
    \ compiler, you can forget about the long hard days of typing `retain` and `release`.”\n\
    \nAnd, the `retainCount` and `release` methods also cause compile errors, thus\
    \ the following code can’t be used with ARC.\n\n```\nfor (;;) {\n    NSUInteger\
    \ count = [obj retainCount];\n    [obj release];\n    if (count == 1)\n      \
    \  break;\n}\n```\n\nThis source code does not fit into proper understanding of\
    \ reference counting. So it should not be a problem. Anyway, `retain`, `release`,\
    \ `retainCount`, and `autorelease` methods can be used only in a non-ARC environment."
  raw: '##### Returning a Result as the Argument


    Methods taking NSError pointer as an argument need to create an NSError object
    itself depending on the result. The caller will obtain the object as an argument,
    which means that the caller does not obtain it from the alloc/new/copy/mutableCopy
    method group. To follow the memory management rules, when you do not obtain an
    object by the alloc/new/copy/mutableCopy method group, the object has to be passed
    without ownership. By the __autoreleasing ownership qualifier, the rule is fulfilled.


    For example, performOperationWithError is implemented as follows.


    `- (BOOL) performOperationWithError:(NSError * __autoreleasing *)error`

    `{`

    `    /* Error occurred. Set errorCode */`


    `    return NO;`

    `}`


    By assigning to *error, which is NSError * __autoreleasing * type, an object can
    be passed to its caller after being registered in autoreleasepool.


    The following source code causes a compile error.


    `NSError *error = nil;`

    `NSError **pError = &error;`


    To assign an object pointer, both ownership qualifiers have to be the same. The
    compiler shows the following error.


    `error: initializing ''NSError *__autoreleasing *'' with an expression`

    `          of type ''NSError *__strong *'' changes retain/release properties of
    pointer`

    `        NSError **pError = &error;`

    `                              ^        ~~~~~~`


    In this case, a __strong ownership qualifier has to be added.


    `NSError *error = nil;`

    `NSError * __strong *pError = &error;`

    `/* No compile error */`


    This rule applies to all the other ownership qualifiers as well.


    `NSError __weak *error = nil;`

    `NSError * __weak *pError = &error;`

    `/* No compile error */`


    `NSError __unsafe_unretained *unsafeError = nil;`

    `NSError * __unsafe_unretained *pUnsafeError = &unsafeError;`

    `/* No compile error */`


    By the way, in the previous example, the method takes an argument as the pointer
    of object type, which is qualified with __autoreleasing.


    `- (BOOL) performOperationWithError:(NSError * __autoreleasing *)error;`


    And the caller passes the pointer of object type, which qualified with __strong.


    `NSError __strong *error = nil;`

    `BOOL result = [obj performOperationWithError:&error];`


    As we have seen, to exchange object pointers, both variables must be identically
    qualified. But the example is not. How does it work? The following explains how
    the compiler handles it.


    `NSError __strong *error = nil;`

    `NSError __autoreleasing *tmp = error;`

    `BOOL result = [obj performOperationWithError:&tmp];`

    `error = tmp;`


    Also, you can type the ownership qualifier explicitly for the object pointer type
    as follows.


    `- (BOOL) performOperationWithError:(NSError * __strong *)error;`


    This declaration shows how to pass an object without registering it to autoreleasepool.
    Although it is possible, you should not do that. From the caller’s point of view,
    to create an object with ownership, the method has to be in the alloc/new/copy/mutableCopy
    group. If it is not in the group, the caller should obtain an object without ownership.
    So, the argument should be qualified with __autoreleasing.


    And, when you use the __autoreleasing ownership qualifier explicitly, the variable
    has to be an automatic variable, such as a local variable, or an argument of method/function.


    Next, let’s see @autoreleasepool a bit more. In a non-ARC environment, autoreleasepools
    are used as follows.


    `/* non-ARC */`


    `NSAutoreleasePool *pool0 = [[NSAutoreleasePool alloc] init];`

    `    NSAutoreleasePool *pool1 = [[NSAutoreleasePool alloc] init];`

    `        NSAutoreleasePool *pool2 = [[NSAutoreleasePool alloc] init];`

    `        id obj = [[NSObject alloc] init];`

    `        [obj autorelease];`

    `        [pool2 drain];`

    `    [pool1 drain];`

    `[pool0 drain];`


    The @autoreleasepool block can be nested as well.


    `@autoreleasepool {`

    `    @autoreleasepool {`

    `        @autoreleasepool {`

    `            id __autoreleasing obj = [[NSObject alloc] init];`

    `        }`

    `    }`

    `}`


    For instance, Application’s main function, which is generated from the iOS application
    template, has @autoreleasepool block to enclose all the application code.


    `int main(int argc, char *argv[])`

    `{`

    `    @autoreleasepool {`

    `        return UIApplicationMain(argc, argv, nil,`

    `            NSStringFromClass([AppDelegate class]));`

    `    }`

    `}`


    Also, NSRunLoop has autoreleasepool to release all the objects once in each loop.
    This mechanism is the same both on ARC-enabled and -disabled environments. By
    the way, @autoreleasepool block can be used even in a non-ARC environment, but
    it has to be compiled with an LLVM compiler 3.0 or later. In this case, the source
    code should be as follows.


    `/* non-ARC */`

    `@autoreleasepool {`

    `    id obj = [[NSObject alloc] init];`

    `    [obj autorelease];`

    `}`


    I recommend using @autoreleasepool even in a non-ARC environment, rather than
    NSAutoreleasePool. The reason is that the scope of autoreleasepool is written
    as blocks, so its readability is far better.


    Also, the _objc_autoreleasePoolPrint() (see the implementation by Apple in [Chapter
    1](#Chapter01.html#ch1)) can be used for both an ARC-enabled or -disabled environment.


    `_objc_autoreleasePoolPrint();`


    Please use it effectively to debug objects in autoreleasepool.


    ##### __strong and __weak


    The concept of __strong and __weak variables is very similar to that of smart
    pointers in C++. They are called std::shared_ptr and std::weak_ptr. std::shared_ptr
    uses reference counting to manage ownership of C++ class objects. Std::weak_ptr
    is used to avoid cyclic reference. If you have to use C++ some time, using these
    smart pointers is strongly recommended.


    * -1999 boost::shared_ptr is part of the Boost C++ library


    * 2002 boost::weak_ptr is added to the library


    * 2005 tr1::shared_ptr and tr1::weak_ptr are adopted by standard C++ Library draft
    TR1\. In some environments, std::shared_ptr and std::weak_ptr can be used


    * std::shared_ptr and std::weak_ptr are adopted by C++Standard C++11 (known as
    C++0x)


    ### Rules


    To write and compile source code for ARC, you have to take care of a few things.
    Just by following the rules in the list below, you can write source code for an
    ARC-enabled environment with confidence.


    *   Forget about using retain, release, retainCount, and autorelease.

    *   Forget about using NSAllocateObject and NSDeallocateObject.

    *   Follow the naming rule for methods related to object creation.

    *   Forget about calling dealloc explicitly.

    *   Use @autoreleasepool instead of NSAutoreleasePool.

    *   Forget about using Zone (NSZone).

    *   Object type variables can’t be members of struct or union in C language.

    *   ‘id’ and ‘void*’ have to be cast explicitly.


    The rules are explained one by one.


    #### Forget About Using Retain, Release, RetainCount, or Autorelease


    As you know, the compiler will perform memory management, therefore you don’t
    need to call memory management-related methods, such as retain, release, retainCount,
    and autorelease.


    Apple says:


    > *By enabling ARC with the new Apple LLVM compiler, you will never need to type
    retain or release again*


    But, in reality, you can’t use them. When you use them, a compile error occurs
    as follows.


    `error: ARC forbids explicit message send of ''release''`

    `        [o release];`

    `         ^ ~~~~~~~`


    So, In fact, Apple should say:


    “By enabling ARC with the new Apple LLVM compiler, you can forget about the long
    hard days of typing retain and release.”


    And, the retainCount and release methods also cause compile errors, thus the following
    code can’t be used with ARC.


    `for (;;) {`

    `    NSUInteger count = [obj retainCount];`

    `    [obj release];`

    `    if (count == 1)`

    `        break;`

    `}`


    This source code does not fit into proper understanding of reference counting.
    So it should not be a problem. Anyway, retain, release, retainCount, and autorelease
    methods can be used only in a non-ARC environment.'
  trans: "\n### 将结果作为参数返回\n\n以 `NSError` 指针作为参数的方法需要根据结果自行创建 `NSError` 对象。调用者将通过参数获取该对象，这意味着调用者并非通过\
    \ alloc/new/copy/mutableCopy 方法组获取它。为遵循内存管理规则，当你并非通过 `alloc`/`new`/`copy`/`mutableCopy`\
    \ 方法组获取对象时，该对象必须以无所有权的方式传递。通过 `__autoreleasing` 所有权修饰符，这一规则得以满足。\n\n例如，`performOperationWithError`\
    \ 的实现如下所示。\n\n```\n- (BOOL) performOperationWithError:(NSError * __autoreleasing\
    \ *)error\n{\n    /* 发生错误。设置 errorCode */\n\n    return NO;\n}\n```\n\n通过赋值给 `*error`（其类型为\
    \ `NSError * __autoreleasing *`），一个对象可以在注册到自动释放池后传递给其调用者。\n\n以下源代码会导致编译错误。\n\n\
    ```\nNSError *error = nil;\nNSError **pError = &error;\n```\n\n要赋值对象指针，两个所有权修饰符必须相同。编译器会显示以下错误。\n\
    \n```\nerror: initializing 'NSError *__autoreleasing *' with an expression\n \
    \         of type 'NSError *__strong *' changes retain/release properties of pointer\n\
    \        NSError **pError = &error;\n                              ^        ~~~~~~\n\
    ```\n\n在这种情况下，必须添加 `__strong` 所有权修饰符。\n\n```\nNSError *error = nil;\nNSError *\
    \ __strong *pError = &error;\n/* 无编译错误 */\n```\n\n此规则同样适用于所有其他所有权修饰符。\n\n```\n\
    NSError __weak *error = nil;\nNSError * __weak *pError = &error;\n/* 无编译错误 */\n\
    ```\n\n```\nNSError __unsafe_unretained *unsafeError = nil;\nNSError * __unsafe_unretained\
    \ *pUnsafeError = &unsafeError;\n/* 无编译错误 */\n```\n\n顺便说一下，在前面的例子中，方法将参数作为对象类型的指针，并使用\
    \ `__autoreleasing` 进行限定。\n\n```\n- (BOOL) performOperationWithError:(NSError\
    \ * __autoreleasing *)error;\n```\n\n而调用者传递的是使用 `__strong` 限定的对象类型指针。\n\n```\n\
    NSError __strong *error = nil;\nBOOL result = [obj performOperationWithError:&error];\n\
    ```\n\n正如我们所见，要交换对象指针，两个变量必须具有相同的限定符。但上述例子并非如此。它是如何工作的呢？以下是编译器处理方式的解释。\n\n```\n\
    NSError __strong *error = nil;\nNSError __autoreleasing *tmp = error;\nBOOL result\
    \ = [obj performOperationWithError:&tmp];\nerror = tmp;\n```\n\n此外，你也可以像下面这样为对象指针类型显式地声明所有权修饰符。\n\
    \n```\n- (BOOL) performOperationWithError:(NSError * __strong *)error;\n```\n\n\
    此声明展示了如何在不将对象注册到自动释放池的情况下传递对象。虽然这可行，但你不应该这样做。从调用者的角度来看，要创建一个带所有权的对象，该方法必须属于 alloc/new/copy/mutableCopy\
    \ 组。如果它不属于该组，调用者应获取一个无所有权的对象。因此，参数应使用 `__autoreleasing` 进行限定。\n\n并且，当你显式使用 `__autoreleasing`\
    \ 所有权修饰符时，该变量必须是自动变量，例如局部变量或方法/函数的参数。\n\n接下来，让我们进一步了解 `@autoreleasepool`。在非 ARC\
    \ 环境中，自动释放池的使用方式如下。\n\n```\n/* 非 ARC */\n\nNSAutoreleasePool *pool0 = [[NSAutoreleasePool\
    \ alloc] init];\n    NSAutoreleasePool *pool1 = [[NSAutoreleasePool alloc] init];\n\
    \        NSAutoreleasePool *pool2 = [[NSAutoreleasePool alloc] init];\n      \
    \  id obj = [[NSObject alloc] init];\n        [obj autorelease];\n        [pool2\
    \ drain];\n    [pool1 drain];\n[pool0 drain];\n```\n\n`@autoreleasepool` 块同样可以嵌套。\n\
    \n```\n@autoreleasepool {\n    @autoreleasepool {\n        @autoreleasepool {\n\
    \            id __autoreleasing obj = [[NSObject alloc] init];\n        }\n  \
    \  }\n}\n```\n\n例如，从 iOS 应用模板生成的应用程序 main 函数，使用 `@autoreleasepool` 块来包含所有应用程序代码。\n\
    \n```\nint main(int argc, char *argv[])\n{\n    @autoreleasepool {\n        return\
    \ UIApplicationMain(argc, argv, nil,\n            NSStringFromClass([AppDelegate\
    \ class]));\n    }\n}\n```\n\n同样地，`NSRunLoop` 拥有自动释放池，用于在每个循环中释放所有对象。此机制在启用和禁用\
    \ ARC 的环境中是相同的。顺便说一下，即使在非 ARC 环境中也可以使用 `@autoreleasepool` 块，但必须使用 LLVM 3.0 或更高版本的编译器进行编译。在这种情况下，源代码应如下所示。\n\
    \n```\n/* 非 ARC */\n@autoreleasepool {\n    id obj = [[NSObject alloc] init];\n\
    \    [obj autorelease];\n}\n```\n\n我建议即使在非 ARC 环境中也使用 `@autoreleasepool` 而不是 `NSAutoreleasePool`。原因在于，自动释放池的作用域以块的形式编写，因此其可读性要好得多。\n\
    \n此外，`_objc_autoreleasePoolPrint()`（参见 Apple 在第一章中的实现）既可用于启用 ARC 的环境，也可用于禁用 ARC\
    \ 的环境。\n\n```\n_objc_autoreleasePoolPrint();\n```\n\n请有效利用它以调试自动释放池中的对象。\n\n###\
    \ `__strong` 与 `__weak`\n\n`__strong` 和 `__weak` 变量的概念与 C++ 中的智能指针非常相似。它们分别被称为\
    \ `std::shared_ptr` 和 `std::weak_ptr`。`std::shared_ptr` 使用引用计数来管理 C++ 类对象的所有权。`std::weak_ptr`\
    \ 用于避免循环引用。如果将来需要使用 C++，强烈建议使用这些智能指针。\n\n* -1999 `boost::shared_ptr` 成为 Boost\
    \ C++ 库的一部分\n\n* 2002 `boost::weak_ptr` 被添加到该库\n\n* 2005 `tr1::shared_ptr` 和 `tr1::weak_ptr`\
    \ 被标准 C++ 库草案 TR1 采纳。在某些环境中，可以使用 `std::shared_ptr` 和 `std::weak_ptr`\n\n* `std::shared_ptr`\
    \ 和 `std::weak_ptr` 被 C++ 标准 C++11（即 C++0x）采纳\n\n## 规则\n\n为了编写和编译 ARC 的源代码，你需要注意几件事。只需遵循下面列表中的规则，你就可以自信地为\
    \ ARC 启用环境编写源代码。\n\n*   忘记使用 `retain`、`release`、`retainCount` 和 `autorelease`。\n\
    *   忘记使用 `NSAllocateObject` 和 `NSDeallocateObject`。\n*   遵循与对象创建相关的方法命名规则。\n*\
    \   忘记显式调用 `dealloc`。\n*   使用 `@autoreleasepool` 代替 `NSAutoreleasePool`。\n*  \
    \ 忘记使用 Zone（`NSZone`）。\n*   C 语言中 `struct` 或 `union` 的成员不能是对象类型变量。\n*   `id` 和\
    \ `void*` 必须进行显式转换。\n\n以下逐条解释这些规则。\n\n### 忘记使用 Retain、Release、RetainCount 或 Autorelease\n\
    \n如你所知，编译器会执行内存管理，因此你不需要调用与内存管理相关的方法，例如 `retain`、`release`、`retainCount` 和 `autorelease`。\n\
    \n苹果公司曾说：\n\n> 通过使用全新的 Apple LLVM 编译器启用 ARC，您将永远不再需要键入 `retain` 或 `release`\n\n\
    但实际上，你**无法**使用它们。当你使用它们时，会发生如下编译错误。\n\n```\nerror: ARC forbids explicit message\
    \ send of 'release'\n        [o release];\n         ^ ~~~~~~~\n```\n\n所以，事实上，苹果公司应该说：\n\
    \n“通过使用全新的 Apple LLVM 编译器启用 ARC，您可以忘记过去那些长时间辛苦键入 `retain` 和 `release` 的日子。”\n\n\
    并且，`retainCount` 和 `release` 方法也会导致编译错误，因此以下代码无法与 ARC 一起使用。\n\n```\nfor (;;) {\n\
    \    NSUInteger count = [obj retainCount];\n    [obj release];\n    if (count\
    \ == 1)\n        break;\n}\n```\n\n这段源代码不符合对引用计数的正确理解。因此，这应该不是问题。总之，`retain`、`release`、`retainCount`\
    \ 和 `autorelease` 方法只能在非 ARC 环境中使用。\n"
- fmt: "### 忘记使用 `NSAllocateObject` 或 `NSDeallocateObject`\n\n你已知，要创建具有所有权的对象，需要使用\
    \ `alloc` 方法。\n\n```\nid obj = [NSObject alloc];\n```\n\n实际上，正如我们在 GNUstep 的 `alloc`\
    \ 实现中看到的，在非 ARC 环境中，可以通过调用 `NSAllocateObject` 函数来创建具有所有权的对象。^([2](#Chapter02.html#CHP-2-FN-2))\
    \ 使用 ARC 时，`NSAllocateObject` 函数不能使用。它会导致编译错误，就像使用了 `retain` 一样。\n\n```\nerror:\
    \ 'NSAllocateObject' is unavailable:\n        not available in automatic reference\
    \ counting mode\n```\n\n此外，`NSDeallocateObject` 函数也不能使用。\n\n### 遵循与对象创建相关的方法命名规则\n\
    \n如[第 1 章](#Chapter01.html#ch1)所述，与对象创建相关的方法存在命名规则。\n\n*   `alloc`\n*   `new`\n\
    *   `copy`\n*   `mutableCopy`\n\n当某些方法返回对象时，如果方法名以列表中的词开头，则调用者拥有该对象的所有权。此规则在 ARC\
    \ 下仍然适用。同时，还增加了一个前缀。\n\n*   `init`\n\n对于任何以 `init` 开头的方法，存在一些比 `alloc/new/copy/mutableCopy`\
    \ 方法组更严格的规则。\n\n- 该方法必须是实例方法。\n- 它必须返回一个对象。\n- 返回类型必须是 `id` 类型，或者其类、父类或子类的类型。\n\
    - 它与 `alloc/new/copy/mutableCopy` 方法组一样，返回一个没有注册到自动释放池的对象，这意味着调用者拥有所有权。基本上，它初始化由\
    \ `alloc` 返回的对象，并返回相同的对象，如下所示。\n\n```\nid obj = [[NSObject alloc] init];\n```\n\
    \n__________\n\n² Apple, “Foundation Functions Reference,” [`http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/Foundation/Miscellaneous/Foundation_Functions/Reference/reference.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/Foundation/Miscellaneous/Foundation_Functions/Reference/reference.html)\n\
    \n上述源代码调用了 `alloc` 方法获取一个对象，然后对该对象调用 `init` 方法进行初始化。之后，`init` 方法返回相同的对象。现在，让我们看看其他示例。\n\
    \n```\n- (id) initWithObject:(id)obj;\n```\n\n这个方法声明符合规则。尽管以下方法也符合命名规则，但它没有返回对象，因此你无法使用。\n\
    \n```\n- (void) initThisObject;\n```\n\n例外情况是，名为 `initialize` 的方法不包含在此 `init`\
    \ 组中。因此，你可以像往常一样使用以下方法。\n\n```\n- (void) initialize;\n```\n\n### 忘记显式调用 `dealloc`\n\
    \n当所有所有权被释放时，对象将被销毁。这与非 ARC 环境中的工作方式相同。当被销毁时，会调用其 `dealloc` 方法。\n\n```\n- (void)\
    \ dealloc\n{\n     /*\n      * 在此处编写需要妥善处理的代码。\n      */\n}\n```\n\n例如，当你使用用 C\
    \ 编写的库并分配了内存缓冲区时，你需要在 `dealloc` 方法中释放它。\n\n```\n- (void) dealloc\n{\n    free(buffer_);\n\
    }\n```\n\n在许多情况下，`dealloc` 是从委托或观察者中移除对象的合适位置。\n\n```\n- (void) dealloc\n{\n \
    \   [[NSNotificationCenter defaultCenter] removeObserver:self];\n}\n```\n\n顺便说一下，在非\
    \ ARC 环境中，你必须每次都像这样键入 `[super dealloc]`。\n\n```\n/* non-ARC */\n\n- (void) dealloc\n\
    {\n    /* 对该对象执行一些操作。 */\n\n    [super dealloc];\n}\n```\n\n使用 ARC 时，这会导致编译错误，就像调用\
    \ `release` 方法时一样。\n\n```\nerror: ARC forbids explicit message send of 'dealloc'\n\
    \        [super dealloc];\n         ^     ~~~~~~~\n```\n\n你不能显式调用 `[super dealloc]`。它由\
    \ ARC 自动完成。你可以忘记一次又一次地键入它。\n\n### 使用 `@autoreleasepool` 代替 `NSAutoreleasePool`\n\
    \n如前一节所述，你必须使用 `@autoreleasepool` 块来代替 `NSAutoreleasePool`。如果你使用 `NSAutoreleasePool`\
    \ 类，则会发生编译错误。\n\n```\nerror: 'NSAutoreleasePool' is unavailable:\n        not\
    \ available in automatic reference counting mode\n        NSAutoreleasePool *pool\
    \ = [[NSAutoreleasePool alloc] init];\n        ^\n```\n\n### 忘记使用 Zone (`NSZone`)\n\
    \n使用 ARC 时，Zone (`NSZone`) 不可用。如前所述（参见“Zone”专栏），无论是否启用 ARC，最近的 Objective-C 运行时（定义了编译器宏\
    \ `__OBJC2__` 的环境）都会忽略 zones。\n\n### C 语言的 struct 或 union 中的成员变量不能是对象类型\n\n当你向\
    \ C 语言的 `struct` 或 `union` 添加 Objective-C 对象类型的成员变量时，会导致编译错误。\n\n```\nstruct Data\
    \ {\n    NSMutableArray *array;\n};\n```\n\n```\nerror: ARC forbids Objective-C\
    \ objs in structs or unions\n    NSMutableArray *array;\n                    ^\n\
    ```\n\n即使使用 LLVM 编译器 3.0，由于 C 语言规范的限制，也无法管理 C `struct` 的生命周期。^([3](#Chapter02.html#CHP-2-FN-3))\
    \ 使用 ARC 时，编译器需要了解并管理对象的生命周期才能执行内存管理。例如，自动变量（局部变量）可以被管理，因为编译器可以将生命周期视为变量的作用域。由于\
    \ C `struct` 成员没有此类信息，编译器无法为 C `struct` 执行内存管理。如果你仍然想向 C `struct` 放入一个对象，可以通过将对象转换为\
    \ `void *`（参见下一节）或使用 `__unsafe_unretained` 所有权修饰符（参见“所有权修饰符”一节）来实现。\n\n__________\n\
    \n³ LLVM.org “4.3.5. Ownership-qualified fields of structs and unions,” [`http://clang.llvm.org/docs/AutomaticReferenceCounting.html#ownership.restrictions.records`](http://clang.llvm.org/docs/AutomaticReferenceCounting.html#ownership.restrictions.records)\n\
    \n```\nstruct Data {\n        NSMutableArray __unsafe_unretained *array;\n   \
    \ };\n```\n\n如前所述，编译器不会管理带有 `__unsafe_unretained` 所有权修饰符的变量。你必须自己管理所有权以避免内存泄漏，否则应用程序会崩溃。\n\
    \n### `id` 和 `void*` 必须显式转换\n\n在非 ARC 环境中，从 `id` 转换为 `void*` 可以正常工作，如下所示。\n\n\
    ```\n/* non-ARC */\nid obj = [[NSObject alloc] init];\nvoid *p = obj;\n```\n\n\
    同样，通过从 `void*` 赋值回来的 `id` 变量调用方法也没有问题，如下所示。\n\n```\n/* non-ARC */\nid o = p;\n\
    [o release];\n```\n\n但这些源代码在 ARC 下会导致编译错误。\n\n```\nerror: implicit conversion\
    \ of an Objective-C pointer\n    to 'void *' is disallowed with ARC\n        void\
    \ *p = obj;\n                  ^\n\n    error: implicit conversion of a non-Objective-C\
    \ pointer\n        type 'void *' to 'id' is disallowed with ARC\n        id o\
    \ = p;\n                ^\n```\n\n要在 `id` 或对象类型与 `void*` 之间进行转换，你必须使用一种特殊的转换。仅用于赋值时，你可以使用\
    \ `__bridge` 转换。\n\n#### `__bridge` 转换\n\n你可以这样使用 `__bridge` 转换：\n\n```\nid obj\
    \ = [[NSObject alloc] init];\n\nvoid *p = (__bridge void *)obj;\n\nid o = (__bridge\
    \ id)p;\n```\n\n使用 `__bridge` 转换，你可以将 `id` 转换为 `void*`，反之亦然。但是，将 `__bridge` 转换为\
    \ `void*` 甚至比 `__unsafe_unretained` 限定的变量更危险。你必须小心地自己管理对象的所有权，否则会因为悬空指针而崩溃。此外，还有另外两种转换：`__bridge_retained`\
    \ 和 `__bridge_transfer`。"
  raw: '#### Forget About Using NSAllocateObject or NSDeallocateObject


    As you know, to create an object with ownership, you use an alloc method.


    `id obj = [NSObject alloc];`


    Actually, as we have seen in the implementation of alloc in GNUstep, in a non-ARC
    environment, it is possible to create an object and with ownership by calling
    NSAllocateObject function.^([2](#Chapter02.html#CHP-2-FN-2)) With ARC, NSAllocateObject
    function can’t be used. It causes a compile error as if retain were used.


    `error: ''NSAllocateObject'' is unavailable:`

    `        not available in automatic reference counting mode`


    Also, NSDeallocateObject function can‘t be used.


    #### Follow the Naming Rule for Methods Related to Object Creation


    As explained in [Chapter 1](#Chapter01.html#ch1), there are naming rules for methods
    related to object creation with ownership.


    *   alloc

    *   new

    *   copy

    *   mutableCopy


    When an object is returned by certain methods, where the name begins with one
    of the above list, the caller has ownership of the object. This rule is still
    applicable with ARC. Also, one more prefix is added along with it.


    *   init


    For any method where the name begins with init, there are some rules that are
    stricter than for the alloc/new/copy/mutableCopy method group.


    The method has to be an instance method.


    It has to return an object.


    The return type has to be ‘id’ type, or types of its class, superclass, or subclass.


    It returns an object without registering in autoreleasepool, as alloc/new/copy/mutableCopy
    method group does, which means the caller has ownership. Basically, it initializes
    an object, which is returned by alloc, and returns the same object as follows.


    `id obj = [[NSObject alloc] init];`


    __________


    ² Apple, “Foundation Functions Reference,” [`http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/Foundation/Miscellaneous/Foundation_Functions/Reference/reference.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/Foundation/Miscellaneous/Foundation_Functions/Reference/reference.html)


    The above source code calls the alloc method to obtain an object and then calls
    the init method on the same object to initialize it. After that, init method returns
    the same object. Now, let’s see other examples.


    `- (id) initWithObject:(id)obj;`


    This method declaration meets the rules. Although the following method also meets
    the naming rule, it doesn’t return an object, so you can’t use it.


    `- (void) initThisObject;`


    Exceptionally, a method named “initialize” is not included in this init group.
    Therefore, you can use the following method as usual.


    `- (void) initialize;`


    #### Forget About Calling dealloc Explicitly


    When all of the ownerships are released, the object will be discarded. It works
    just the same as a non-ARC environment. When disposed of, its dealloc method is
    called.


    `- (void) dealloc`

    `{`

    `     /*`

    `      * Write here to be disposed of properly.`

    `      */`

    `}`


    For example, when you are using a library written in C and allocate a memory buffer,
    you need to free it in the dealloc method.


    `- (void) dealloc`

    `{`

    `    free(buffer_);`

    `}`


    In many cases, dealloc is a suitable place to remove the object from delegate
    or observers.


    `- (void) dealloc`

    `{`

    `    [[NSNotificationCenter defaultCenter] removeObserver:self];`

    `}`


    By the way, in a non-ARC environment, you have to type [super dealloc] every time
    as follows.


    `/* non-ARC */`


    `- (void) dealloc`

    `{`

    `    /* Do something for this object. */`


    `    [super dealloc];`

    `}`


    With ARC, it causes a compile error, as when you call the release method.


    `error: ARC forbids explicit message send of ''dealloc''`

    `        [super dealloc];`

    `         ^     ~~~~~~~`


    You can’t call [super dealloc] explicitly. It is just done automatically by ARC.
    You can forget typing it again and again.


    #### Use @autoreleasepool Instead of NSAutoreleasePool


    As described in the previous section, you have to use the @autoreleasepool block
    instead of NSAutoreleasePool. If you use the NSAutoreleasePool class, a compile
    error occurs.


    `error: ''NSAutoreleasePool'' is unavailable:`

    `        not available in automatic reference counting mode`

    `        NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];`

    `        ^`


    #### Forget About Using Zone (NSZone)


    With ARC, Zone (NSZone) is not usable. As explained previously (see column “Zone”),
    regardless of whether ARC is enabled, the recent objective-C runtime (the environment
    in which compiler macro __OBJC2__ is defined) just ignores zones.


    #### Object Type Variables Cannot Be Members of struct or union in C Language


    When you add a member variable of Objective-C object type to C struct or union,
    a compile error occurs.


    `struct Data {`

    `    NSMutableArray *array;`

    `};`


    `error: ARC forbids Objective-C objs in structs or unions`

    `    NSMutableArray *array;`

    `                    ^`


    Even with the LLVM compiler 3.0, there is no way to manage the lifetime of C struct
    because of the C language spec limitation.^([3](#Chapter02.html#CHP-2-FN-3)) With
    ARC, the compiler has to know and manage an object’s lifetime in order to perform
    memory management. For example, automatic variables (local variables) can be managed
    because the compiler can know the lifetime as the scope of the variable. Because
    there is no such information for C struct members, it is impossible for the compiler
    to perform memory management for C struct. If you still want to put an object
    to C struct, you can do it by casting the object to “void *” (see next section)
    or by using an __unsafe_unretained ownership qualifier (see “Ownership qualifiers”
    section).


    __________


    ³ LLVM.org “4.3.5\. Ownership-qualified fields of structs and unions,” [`http://clang.llvm.org/docs/AutomaticReferenceCounting.html#ownership.restrictions.records`](http://clang.llvm.org/docs/AutomaticReferenceCounting.html#ownership.restrictions.records)


    `struct Data {`

    `        NSMutableArray __unsafe_unretained *array;`

    `    };`


    As described previously, the compiler doesn’t manage variables with the __unsafe_unretained
    ownership qualifier. You have to take care of ownership yourself to avoid a memory
    leak or the application will crash.


    #### ‘id’ and ‘void*’ Have to Be Cast Explicitly


    In a non-ARC environment, casting from ‘id’ to ‘void*’ works without any problems
    as follows.


    `/* non-ARC */`

    `id obj = [[NSObject alloc] init];`

    `void *p = obj;`


    Also, it is no problem to call methods through ‘id’ variables, which are assigned
    back from void * as follows.


    `/* non-ARC */`

    `id o = p;`

    `[o release];`


    But these source codes cause a compile error with ARC.


    `error: implicit conversion of an Objective-C pointer`

    `    to ''void *'' is disallowed with ARC`

    `        void *p = obj;`

    `                  ^`


    `    error: implicit conversion of a non-Objective-C pointer`

    `        type ''void *'' to ''id'' is disallowed with ARC`

    `        id o = p;`

    `                ^`


    To cast between ‘id’ or object types and ‘void*’, you have to use a special kind
    of cast. Just for assignment, you can use __bridge cast.


    ##### __bridge cast


    You can use __bridge cast as


    `id obj = [[NSObject alloc] init];`


    `void *p = (__bridge void *)obj;`


    `id o = (__bridge id)p;`


    With __bridge cast, you can cast ‘id’ to ‘void*’, and vice versa. But __bridge
    cast to void * is even more dangerous than an __unsafe_unretained qualified variable.
    You have to manage ownership of the object yourself carefully, or it crashes because
    of the dangling pointer. Also, there are two other kinds of casts: __bridge_retained
    and __bridge_transfer.'
