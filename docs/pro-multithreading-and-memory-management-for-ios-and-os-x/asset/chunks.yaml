    \n```\n{\n    id array = [[NSMutableArray alloc] init];\n}\n```\n\n代码清单 5-7 在\
    \ Block 字面量中使用了变量 `array`。\n\n**代码清单 5-7.** *捕获一个对象*\n\n```\nblk_t blk;\n{\n \
