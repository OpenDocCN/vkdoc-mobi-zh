    `  * memory leaked!!`

    `  */`


    [Figure 2–3](#Chapter02.html#fig_2_3) illustrates this situation.


    ![images](images/9781430241164_Fig02-03.jpg)


    **Figure 2–3.** *Circular reference with class member variables*


    With circular reference, memory leaks happen very often. A memory leak means that
    some objects still remain in memory even after they are thought to be discarded.


    In the example, when the control flow leaves the variable scope of test0 and test1,
    object A and object B were planned to be discarded. At this point, they should
    be disposed of because no one has an entry point to the objects. But because of
    circular reference, they remain.


    ##### Self Reference


    The next example shows that even one object can produce a circular reference by
    referencing the object itself. It is sometimes called “self reference” as shown
    in [Figure 2–4](#Chapter02.html#fig_2_4).


    `id test = [[Test alloc] init];`

    `[test setObject:test];` ![images](images/9781430241164_Fig02-04.jpg)


    **Figure 2–4.** *Self reference*


    How can we avoid this situation? As we have a __strong ownership qualifier, you
    might have noticed there is a __weak ownership qualifier. By using a __weak ownership
    qualifier, we can avoid a circular reference as shown in [Figure 2–5](#Chapter02.html#fig_2_5).


    A __weak ownership qualifier provides a weak reference. A weak reference does
    not have ownership of the object. Let’s see the next example.


    `id __weak obj = [[NSObject alloc] init];`


    The variable obj is qualified with __weak. When the source code is compiled, the
    compiler shows a warning message.


    `warning: assigning retained obj to weak variable; obj will be`

    `          released after assignment [-Warc-unsafe-retained-assign]`

    `            id __weak obj = [[NSObject alloc] init];`

    `                      ^     ~~~~~~~~~~~~~~~~~~~~~~~`


    In the example, a created object is assigned to a variable obj, which has been
    qualified with __weak. So, the variable obj has a weak reference to the object,
    which means the variable doesn’t have ownership. Because no one can take ownership
    of the created object, the object will be released just after creation. The compiler
    warns about that case. If you assign the object to a __strong variable at first,
    the warning will disappear as follows.


    `{`

    `    id __strong obj0 = [[NSObject alloc] init];`

    `    id __weak obj1 = obj0;`

    `}`


    Let’s see the source code with comments on ownership status.


    `{`

    `     /*`

    `      * You create an object and have ownership.`

    `      */`


    `    id __strong obj0 = [[NSObject alloc] init];`


    `     /*`

    `      * The variable obj0 is qualified with __strong.`

    `      * Which means, it has ownership of the object.`

    `      */`


    `    id __weak obj1 = obj0;`


    `     /*`

    `      * variable obj1 has a weak reference of the created object`

    `      */`


    `}`

    ` /*`

    `  * Leaving the scope of variable obj0, its strong reference disappears.`

    `  * The object is released automatically.`

    `  * Because no one has ownership, the object is discarded.`

    `  */`


    Because a __weak reference does not have ownership, the object is disposed of
    when the control flow leaves the variable scope. Now we’ve learned that we should
    use the __weak ownership qualifier to avoid cyclic reference. We can rewrite the
    previous example as follows.


    `@interface Test : NSObject`

    `{`

    `    id __weak obj_;`

    `}`

    `- (void)setObject:(id __strong)obj;`

    `@end` ![images](images/9781430241164_Fig02-05.jpg)


    **Figure 2–5.** *Avoid circular reference with the __weak ownership qualifier*


    ##### Weak Reference Disappears


    And, there is one more thing you should know about the __weak ownership qualifier.
    When a variable has a reference to an object and the object is discarded, the
    weak reference also disappears automatically, which means that the variable is
    assigned to nil. Let’s check it with an example ([Listing 2–7](#Chapter02.html#list_2_7)).


    **Listing 2–7.** *Weak reference disappears*


    `id __weak obj1 = nil;`

    `{`

    `    id __strong obj0 = [[NSObject alloc] init];`


    `    obj1 = obj0;`


    `    NSLog(@"A: %@", obj1);`

    `}`


    `NSLog(@"B: %@", obj1);`


    The result is:


    `A: <NSObject: 0x753e180>`

    `B: (null)`


    Let’s see the source code again with comments on ownership status ([Listing 2–8](#Chapter02.html#list_2_8)).


    **Listing 2–8.** *Weak reference disappears with comments*


    `id __weak obj1 = nil;`


    `{`

    `     /*`

    `      * You create an object and have ownership.`

    `      */`


    `    id __strong obj0 = [[NSObject alloc] init];`


    `     /*`

    `      * The variable obj0 is qualified with __strong.`

    `      * Which means, it has ownership of the object.`

    `      */`


    `    obj1 = obj0;`


    `     /*`

    `      * variable obj1 has a weak reference of the object`

    `      */`


    `    NSLog(@"A: %@", obj0);`


    `     /*`

    `      * The object, to which the variable obj0 has a strong reference, is displayed`

    `      */`


    `}`

    ` /*`

    `  * Leaving the scope of variable obj0, its strong reference disappears.`

    `  * The object is released.`

    `  * It is disposed of because no one has ownership.`

    `  *`

    `  * When it is disposed of,`

    `  * weak reference is destroyed and nil is assigned to the obj1.`

    `  */`


    `NSLog(@"B: %@", obj1);`


    ` /*`

    `  * The value of obj1, nil is displayed`

    `  */`


    With the __weak ownership qualifier, we can avoid cyclic reference. Also by checking
    if the __weak variable is nil, we can know if the object still exists or is already
    discarded.


    Unfortunately the __weak ownership qualifier is usable only for applications targeting
    iOS5 (or later) or OSX Lion (or later). For applications targeting older environments,
    __unsafe_unretained must be used instead.'
  trans: "\n### 循环引用\n\n本节中的示例展示了循环引用是如何发生的。例如，当一个类的成员变量持有对某个对象的引用时，就会发生这种情况。假设我们有一个如代码清单\
    \ 2–4 所示的类。\n\n**代码清单 2–4.** *一个可能导致循环引用的类*\n\n```\n@interface Test : NSObject\n\
    {\n    id __strong obj_;\n}\n- (void)setObject:(id __strong)obj;\n@end\n\n@implementation\
    \ Test\n- (id)init\n{\n    self = [super init];\n    return self;\n}\n\n- (void)setObject:(id\
    \ __strong)obj\n{\n    obj_ = obj;\n}\n@end\n```\n\n我们可以很容易地用这个类产生一个循环引用问题，如代码清单\
    \ 2–5 所示。\n\n**代码清单 2–5.** *产生循环引用*\n\n```\n{\n    id test0 = [[Test alloc] init];\n\
    \n    id test1 = [[Test alloc] init];\n    [test0 setObject:test1];\n    [test1\
    \ setObject:test0];\n}\n```\n\n添加一些注释可以让我们更清晰地分析这个例子（代码清单 2–6）。\n\n**代码清单 2–6.**\
    \ *带注释的产生循环引用的代码*\n\n```\n{\n    id test0 = [[Test alloc] init]; /* 对象 A */\n\n\
    \     /*\n      * test0 持有对象 A 的强引用\n      */\n\n    id test1 = [[Test alloc]\
    \ init]; /* 对象 B */\n\n     /*\n      * test1 持有对象 B 的强引用\n      */\n\n    [test0\
    \ setObject:test1];\n\n     /*\n      * 对象 A 的成员变量 obj_ 持有对象 B 的强引用。\n      *\n\
    \      * 此时，对象 A 的 obj_ 和 test1 都持有对象 B 的强引用。\n     */\n\n    [test1 setObject:test0];\n\
    \n     /*\n      * 对象 B 的成员变量 obj_ 持有对象 A 的强引用。\n      *\n      * 此时，对象 B 的 obj_\
    \ 和 test0 都持有对象 A 的强引用。\n      */\n\n}\n /*\n  * 离开变量 test0 的作用域，它的强引用消失。\n  *\
    \ 对象 A 被自动释放。\n  *\n  * 离开变量 test1 的作用域，它的强引用消失。\n  * 对象 B 被自动释放。\n  *\n  * 此时，对象\
    \ B 的 obj_ 仍然持有对象 A 的强引用。\n  *\n  * 此时，对象 A 的 obj_ 仍然持有对象 B 的强引用。\n  *\n  * 内存泄漏！！\n\
    \  */\n```\n\n图 2–3 说明了这种情况。\n\n![images](img/9781430241164_Fig02-03.jpg)\n\n\
    **图 2–3.** *带有类成员变量的循环引用*\n\n循环引用经常导致内存泄漏。内存泄漏意味着一些对象在被认为应该被丢弃后，仍然保留在内存中。\n\n\
    在这个例子中，当控制流离开 `test0` 和 `test1` 的变量作用域时，对象 A 和对象 B 本应被丢弃。此时，它们应该被释放，因为没有人再持有指向这些对象的入口点。但由于循环引用，它们仍然保留在内存中。\n\
    \n### 自引用\n\n下一个例子展示了即使是一个对象，通过引用自身，也可能产生循环引用。这有时被称为“自引用”，如图 2–4 所示。\n\n```\n\
    id test = [[Test alloc] init];\n[test setObject:test];\n```\n\n![images](img/9781430241164_Fig02-04.jpg)\n\
    \n**图 2–4.** *自引用*\n\n如何避免这种情况？既然我们有了 `__strong` 所有权修饰符，你可能已经注意到还有一个 `__weak`\
    \ 所有权修饰符。通过使用 `__weak` 所有权修饰符，我们可以避免循环引用，如图 2–5 所示。\n\n`__weak` 所有权修饰符提供弱引用。弱引用不拥有对象的所有权。让我们看下一个例子。\n\
    \n```\nid __weak obj = [[NSObject alloc] init];\n```\n\n变量 `obj` 被 `__weak` 修饰。当编译源代码时，编译器会显示一条警告消息。\n\
    \n```\nwarning: assigning retained obj to weak variable; obj will be\n       \
    \   released after assignment [-Warc-unsafe-retained-assign]\n            id __weak\
    \ obj = [[NSObject alloc] init];\n                      ^     ~~~~~~~~~~~~~~~~~~~~~~~\n\
    ```\n\n在这个例子中，创建的对象被赋值给一个用 `__weak` 修饰的变量 `obj`。因此，变量 `obj` 持有对该对象的弱引用，这意味着该变量不拥有所有权。由于没有人能获得这个创建对象的所有权，该对象在创建后就会被立即释放。编译器会针对这种情况给出警告。如果你先将对象赋值给一个\
    \ `__strong` 变量，警告就会消失，如下所示。\n\n```\n{\n    id __strong obj0 = [[NSObject alloc]\
    \ init];\n    id __weak obj1 = obj0;\n}\n```\n\n让我们看看带有所有权状态注释的源代码。\n\n```\n{\n\
    \     /*\n      * 你创建了一个对象并拥有它的所有权。\n      */\n\n    id __strong obj0 = [[NSObject\
    \ alloc] init];\n\n     /*\n      * 变量 obj0 由 __strong 修饰。\n      * 这意味着它拥有该对象的所有权。\n\
    \      */\n\n    id __weak obj1 = obj0;\n\n     /*\n      * 变量 obj1 持有该创建对象的弱引用。\n\
    \      */\n\n}\n /*\n  * 离开变量 obj0 的作用域，它的强引用消失。\n  * 该对象被自动释放。\n  * 因为没有人拥有所有权，该对象被丢弃。\n\
    \  */\n```\n\n因为 `__weak` 引用不拥有所有权，所以当控制流离开变量作用域时，该对象就会被释放。现在我们知道了应该使用 `__weak`\
    \ 所有权修饰符来避免循环引用。我们可以将前面的例子重写如下。\n\n```\n@interface Test : NSObject\n{\n    id\
    \ __weak obj_;\n}\n- (void)setObject:(id __strong)obj;\n@end\n```\n\n![images](img/9781430241164_Fig02-05.jpg)\n\
    \n**图 2–5.** *使用 __weak 所有权修饰符避免循环引用*\n\n### 弱引用自动失效\n\n并且，关于 `__weak` 所有权修饰符，还有一件事你应该知道。当一个变量引用了一个对象，而该对象被丢弃时，弱引用也会自动失效，这意味着该变量会被赋值为\
    \ `nil`。让我们通过一个例子来验证（代码清单 2–7）。  \n\n**代码清单 2–7.** *弱引用自动失效*\n\n```\nid __weak\
    \ obj1 = nil;\n{\n    id __strong obj0 = [[NSObject alloc] init];\n\n    obj1\
    \ = obj0;\n\n    NSLog(@\"A: %@\", obj1);\n}\n\nNSLog(@\"B: %@\", obj1);\n```\n\
    \n输出结果是：\n\n```\nA: <NSObject: 0x753e180>\nB: (null)\n```\n\n让我们再次查看带有所有权状态注释的源代码（代码清单\
    \ 2–8）。\n\n**代码清单 2–8.** *带注释的弱引用自动失效代码*\n\n```\nid __weak obj1 = nil;\n\n{\n\
    \     /*\n      * 你创建了一个对象并拥有它的所有权。\n      */\n\n    id __strong obj0 = [[NSObject\
    \ alloc] init];\n\n     /*\n      * 变量 obj0 由 __strong 修饰。\n      * 这意味着它拥有该对象的所有权。\n\
    \      */\n\n    obj1 = obj0;\n\n     /*\n      * 变量 obj1 持有该对象的弱引用。\n      */\n\
    \n    NSLog(@\"A: %@\", obj0);\n\n     /*\n      * 显示变量 obj0 持有强引用的那个对象。\n   \
    \   */\n\n}\n /*\n  * 离开变量 obj0 的作用域，它的强引用消失。\n  * 该对象被释放。\n  * 由于没有人拥有所有权，它被丢弃。\n\
    \  *\n  * 当它被丢弃时，\n  * 弱引用被销毁，并且 nil 被赋值给 obj1。\n  */\n\nNSLog(@\"B: %@\", obj1);\n\
    \n /*\n  * 显示 obj1 的值，即 nil。\n  */\n```\n\n使用 `__weak` 所有权修饰符，我们可以避免循环引用。同时，通过检查\
    \ `__weak` 变量是否为 `nil`，我们可以知道对象是仍然存在还是已经被丢弃。\n\n不幸的是，`__weak` 所有权修饰符仅适用于目标为 iOS5（或更高版本）或\
    \ OSX Lion（或更高版本）的应用程序。对于目标为更旧环境的应用程序，必须使用 `__unsafe_unretained` 替代。\n"
- fmt: "#### `__unsafe_unretained` ownership qualifier\n\nThe `__unsafe_unretained`\
    \ ownership qualifier is, as the name suggests, absolutely unsafe. Normally, due\
    \ to ARC, the compiler executes memory management. But any variables qualified\
    \ with `__unsafe_unretained` are excluded from the mechanism. So, you have to\
    \ take care of the variables manually.\n\n```\nid __unsafe_unretained obj = [[NSObject\
    \ alloc] init];\n```\n\nThis source code is to assign an object to a variable,\
    \ which is qualified with `__unsafe_unretained`. The compiler shows the following\
    \ warning message.\n\n```\nwarning: assigning retained obj to unsafe_unretained\
    \ variable;\n          obj will be released after assignment [-Warc-unsafe-retained-assign]\n\
    \        id __unsafe_unretained obj = [[NSObject alloc] init];\n             \
    \                                         ^     ~~~~~~~~~~~~~~~~~~~~~~~\n```\n\
    \n`__unsafe_unretained` variables don’t have ownership of an object, the same\
    \ as `__weak`. In the above example, the object is released just after the object\
    \ is created. It seems that `__unsafe_unretained` and `__weak` qualifier work\
    \ the same. You will see how `__unsafe_unretained` is different from `__weak`\
    \ in the following ([Listing 2–9](#Chapter02.html#list_2_9)).\n\n**Listing 2–9.**\
    \ `__unsafe_unretained` qualifier\n\n```\nid __unsafe_unretained obj1 = nil;\n\
    \n{\n    id __strong obj0 = [[NSObject alloc] init];\n\n    obj1 = obj0;\n\n \
    \   NSLog(@\"A: %@\", obj1);\n}\n\nNSLog(@\"B: %@\", obj1);\n```\n\nThe result\
    \ is:\n\n```\nA: <NSObject: 0x753e180>\nB: <NSObject: 0x753e180>\n```\n\nLet’s\
    \ see the source code again with comments as usual ([Listing 2–10](#Chapter02.html#list_2_10)).\n\
    \n**Listing 2–10.** `__unsafe_unretained` qualifier with comments\n\n```\nid __unsafe_unretained\
    \ obj1 = nil;\n\n{\n     /*\n      * You create an object and have ownership.\n\
    \      */\n\n    id __strong obj0 = [[NSObject alloc] init];\n\n     /*\n    \
    \  * The variable obj0 is qualified with __strong.\n      * Which means, it has\
    \ ownership of the object.\n      */\n\n    obj1 = obj0;\n\n     /*\n      * variable\
    \ obj1 is assigned from variable obj0,\n      * obj1 does not have either strong\
    \ or weak reference\n      */\n\n    NSLog(@\"A: %@\", obj1);\n\n     /*\n   \
    \   * Display the value of obj1\n      */\n\n}\n /*\n  * Leaving the scope of\
    \ variable obj0, its strong reference disappears.\n  * The object is released\
    \ automatically.\n  * Because no one has ownership, the object is discarded.\n\
    \  */\n\nNSLog(@\"B: %@\", obj1);\n\n /*\n  * Display the value of obj1\n  *\n\
    \  * The object referenced from obj1 is already discarded.\n  * It is called dangling\
    \ pointer.\n  * Invalid access!!\n  */\n```\n\nThough the last `NSLog` looks fine,\
    \ it just works by chance. The application crashes depending on conditions. To\
    \ assign an object to a variable qualified with `__unsafe_unretained`, you have\
    \ to make sure that the object exists and has been assigned to some variables\
    \ qualified with `__strong`. I recommend reconsidering the reason why you need\
    \ `__unsafe_unretained`. You need to understand why completely; for example, you\
    \ might need it because the application has to support iOS4 or OS X Snow Leopard\
    \ and you need to use it instead of `__weak`. Also, you have to be sure that the\
    \ assigned object exists during the lifetime of the variable. If it fails, the\
    \ application will crash and no one will use your application.\n\n#### `__autoreleasing`\
    \ ownership qualifier\n\nLet’s see if there are any changes related to autorelease\
    \ with ARC. To put simply, you can’t use the `autorelease` method. You can’t use\
    \ the `NSAutoreleasePool` class either. I explain it later with some rules. Although\
    \ you can’t directly use `autorelease`, there is a mechanism of autorelease still.\
    \ Without ARC, we’ve used `autorelease` as follows.\n\n```\n/* non-ARC */\n\n\
    NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];\n\nid obj = [[NSObject\
    \ alloc] init];\n\n[obj autorelease];\n\n[pool drain];\n```\n\nThis source code\
    \ can be rewritten for an ARC-enabled environment.\n\n```\n@autoreleasepool {\n\
    \n    id __autoreleasing obj = [[NSObject alloc] init];\n\n}\n```\n\nInstead of\
    \ creating, having, and discarding an `NSAutoreleasePool` class object, you have\
    \ to enclose codes with `@autoreleasepool` block. Instead of calling the `autorelease`\
    \ method, you have to assign the object to a variable qualified with `__autoreleasing`.\
    \ Assigning the object to the `__autoreleasing` qualified variable is equivalent\
    \ to calling `autorelease` on a non-ARC environment. By doing it, the object is\
    \ registered to an autoreleasepool. So, with ARC enabled, you just have to use\
    \ `@autoreleasepool` instead of `NSAutoreleasePool` class and use the `__autoreleasing`\
    \ qualified variable instead of the `autorelease` method as shown in [Figure 2–6](#Chapter02.html#fig_2_6).\n\
    \n![images](images/9781430241164_Fig02-06.jpg)\n\n**Figure 2–6.** `@autoreleasepool`\
    \ and a variable with `__autoreleasing` qualifier\n\nBut in reality, it is very\
    \ rare to type `__autoreleasing` explicitly. Let’s see why you don’t need to type\
    \ `__autoreleasing` very often."
